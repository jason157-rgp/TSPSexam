<!DOCTYPE html>

<title>TRK 軀幹 · 整外專科考古題</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px calc(112px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id":"6000","sub":"T5","src":"GS","years":[110,112,113,114],"stem":"在變性手術penile inversion vaginoplasty中由glans penis所形成的neoclitoris，其提供性刺激及性高潮的神經為?","opts":{"A":"Dorsal penile nerve","B":"Pudendal nerve","C":"Ilioinguinal nerve","D":"Clitoral nerve","E":"Genital branch of genitofemoral nerve"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：penile inversion vaginoplasty 的 neoclitoris 感覺神經支配與神經血管蒂保留原則。\n\n1. 現代 gender-affirming vaginoplasty 中，neoclitoris 由 glans penis 之一部分（dorsal aspect）裁切塑形而成，必須連同「dorsal neurovascular bundle」一併掀起以維持感覺與血供。\n2. 提供 neoclitoris 觸覺、性刺激與 orgasm 的神經即為 **dorsal (penile) nerve**，走行於 Buck's fascia 深面、陰莖背側正中兩側，供應 glans 大部分感覺。\n3. 血供則由 dorsal penile artery 及 deep dorsal vein 構成同一 pedicle，故保留 dorsal neurovascular pedicle 是保留性功能的關鍵術式原則。\n4. 觀念釐清：dorsal penile nerve 雖然是 pudendal nerve 的終末分支，但本題問「直接形成 neoclitoris 感覺」的神經，答案取最精確的末梢命名。","peropt":{"A":"◎ Dorsal penile nerve：直接支配 glans penis 感覺，隨 dorsal neurovascular bundle 保留至 neoclitoris，負責性刺激與高潮。","B":"Pudendal nerve 為主幹上游來源，並非直接形成 neoclitoris 的末梢神經，題目要末梢命名故不選。","C":"Ilioinguinal nerve 支配陰阜、陰囊前部與大陰唇區皮膚，不供應 glans。","D":"Clitoral nerve 為女性原生解剖名詞，非陰莖倒轉術中被保留的既有神經。","E":"Genital branch of genitofemoral nerve 支配 cremaster 與陰囊/大陰唇局部皮膚，與 neoclitoris 感覺無關。"},"cite":"Neligan Plastic Surgery 5e, Vol. Genitourinary / gender-affirming surgery","conflict":""},{"id":"6001","sub":"T3","src":"GS","years":[110],"stem":"對於一個因chordoma而接受right S3 level partial sacrectomy的患者，下列何者為較恰當的重建方式?","opts":{"A":"Bilateral paraspinous muscle flaps","B":"Right superior gluteal artery perforator flap","C":"Left superior gluteal artery perforator flap","D":"Vertical rectus abdominis myocutaneous flap","E":"Reverse latissimus dorsi flap"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：partial sacrectomy（chordoma）缺損重建時 flap 側別選擇——同側血管受腫瘤切除破壞時，改用「對側」perforator flap。\n\n1. Chordoma 為薦骨最常見原發惡性骨腫瘤，right S3 partial sacrectomy 會犧牲/破壞右側 sacral 及部分 superior gluteal 血管系統與周邊軟組織。\n2. Superior gluteal artery perforator (SGAP) flap 為薦部/臀部缺損理想的局部穿枝皮瓣，但**必須選用血管未受手術波及的一側**。\n3. 右側切除 → 右側 superior gluteal 血管與 perforator 完整性存疑，故選 **左側（對側）SGAP flap** 旋轉覆蓋中線缺損，血供最可靠。\n4. VRAM 雖可用於薦部/會陰重建（經腹或經會陰），但屬較大型皮瓣，對 S3 level 的中低位缺損，局部對側 SGAP 為較恰當、供區併發症較低之選擇。","peropt":{"A":"Bilateral paraspinous muscle flaps 適合更高位（腰薦交界以上）中線傷口，難以填補 S3 臀薦部軟組織缺損。","B":"Right SGAP：同側血管於 right sacrectomy 中恐已受損，血供不可靠故不宜。","C":"◎ Left SGAP flap：對側血管完整、可靠旋轉覆蓋 S3 中線缺損，為最恰當選擇。","D":"VRAM 為可行的較大皮瓣，但相對局部 SGAP 而言供區代價高，非本題「較恰當」的首選。","E":"Reverse latissimus dorsi flap 供應範圍偏胸腰段，難以到達薦部 S3 level。"},"cite":"Neligan 5e, Reconstruction of the trunk / posterior trunk & sacrum","conflict":""},{"id":"6002","sub":"T1","src":"GS","years":[111],"stem":"下列為重建前胸壁缺損的myocutaneous flaps, 何者除外?","opts":{"A":"Pectoralis major","B":"Rectus abdominis","C":"Latissimus dorsi","D":"Serratus anterior","E":"External oblique"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：前胸壁重建可用之「肌皮瓣（myocutaneous）」清單與各肌肉皮膚島可靠度。\n\n1. Pectoralis major、Rectus abdominis (TRAM/VRAM)、Latissimus dorsi、External oblique 皆可攜帶可靠皮膚島作為 myocutaneous flap。\n2. **Serratus anterior** 臨床上主要作為「muscle flap」或與 latissimus 合併之嵌合皮瓣，其自身覆蓋皮膚的穿枝不可靠、無獨立穩定的 skin paddle，故不歸類為標準前胸壁 myocutaneous flap。\n3. 命題邏輯：問「何者除外」，答案取無可靠皮島者。","peropt":{"A":"Pectoralis major 為前胸壁重建主力 myocutaneous flap（thoracoacromial 蒂），可攜皮島。","B":"Rectus abdominis 可作 VRAM/TRAM 攜帶皮島修補胸壁下段。","C":"Latissimus dorsi 為典型可靠 myocutaneous flap。","D":"◎ Serratus anterior：主要為肌肉瓣，皮膚穿枝不可靠、無標準 skin paddle，故為除外項。","E":"External oblique 可作為攜皮之肌皮瓣用於上腹/下胸壁重建。"},"cite":"Grabb & Smith 9e, Chest wall reconstruction","conflict":""},{"id":"6003","sub":"T2","src":"GS","years":[111,112],"stem":"下列皮瓣與腹部下三分之一的腹疝修補(lower third abdominal hernia repair)有關, 何者除外?","opts":{"A":"Anterior lateral thigh","B":"Rectus abdominis","C":"Tensor fascia lata","D":"Gracilis","E":"External oblique"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：下三分之一腹壁疝氣修補之可用皮瓣，及各皮瓣的解剖位置對應。\n\n1. 下腹壁缺損需自「下方/外側」帶血供之組織填補：ALT（股前外側）、Rectus abdominis（下腹肌皮瓣）、Tensor fascia lata (TFL)、Gracilis 皆可到達下腹/鼠蹊/會陰。\n2. **External oblique** 及其構造走行於「上/中腹壁外側」，作為推進或旋轉瓣主要適用於上腹壁缺損，難以覆蓋下三分之一缺損，故除外。","peropt":{"A":"Anterolateral thigh flap 弧度長、供區併發症低，是中下腹壁缺損常用選項。","B":"Rectus abdominis 下腹肌皮瓣可用於下腹壁重建。","C":"Tensor fascia lata flap 為下腹壁/鼠蹊部經典帶蒂皮瓣。","D":"Gracilis flap 適用下腹、鼠蹊、會陰缺損。","E":"◎ External oblique：位於上/中腹壁外側，主要用於上腹壁，難達下三分之一，為除外項。"},"cite":"Neligan 5e, Abdominal wall reconstruction","conflict":""},{"id":"6004","sub":"T3","src":"GS","years":[111,112,113,114,115],"stem":"長期坐輪椅會導致下列部位的褥瘡，何者除外？","opts":{"A":"肩胛骨(scapula)","B":"坐骨(ischium)","C":"後膝(posterior knee)","D":"腳底(sole)","E":"足跟(heel)"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：長期輪椅使用者之壓瘡好發部位（受壓點解剖）。\n\n1. 坐姿受力點：ischial tuberosity（坐骨，最典型）、scapula（靠背受壓）、posterior knee/popliteal（座墊前緣壓迫）、sole（腳底置於腳踏板受壓）。\n2. **Heel（足跟）** 為「仰臥」臥床病人之典型壓瘡點，並非坐輪椅的主要受力區，故為除外項。\n3. 對照：臥床好發 sacrum/heel/occiput；坐姿好發 ischium。","peropt":{"A":"Scapula 坐姿靠背受壓，可發生壓瘡。","B":"Ischium 為坐姿最典型壓瘡點。","C":"Posterior knee 受座墊前緣壓迫可能受損。","D":"Sole 腳底置於腳踏板長期受壓可發生。","E":"◎ Heel（足跟）：為仰臥臥床病人之壓瘡點，非輪椅坐姿受力區，故除外。"},"cite":"Grabb & Smith 9e, Pressure sores","conflict":"⚠ 同題歷屆重出：長期坐輪椅褥瘡「何者除外」，兩題正解均為足跟(heel)。差異僅選項順序調換——6004(111/112/114/115)將heel置於E、故答案E；6007(113)將heel置於A、故答案A。核心考點完全相同，屬純選項重排(規則A)。合併後記憶點：坐輪椅壓瘡好發於肩胛/坐骨/後膝/腳底，heel為除外。"},{"id":"6005","sub":"T1","src":"GS","years":[112],"stem":"A 65-year-old man with an anterior chest wall defect due to liposarcoma resection undergoes latissimus dorsi rotational flap reconstruction. Postoperatively, he reports unsightly and uncomfortable motion of his flap when moving the ipsilateral arm. This result is most likely due to which of the following?","opts":{"A":"Absence of postoperative complete shoulder immobilization","B":"Failure to divide the thoracodorsal nerve during flap dissection","C":"Inadequate security of inset into recipient site","D":"Maintenance of insertion into the numerus","E":"Fracture of underlying ribs during sarcoma resection"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：latissimus dorsi 旋轉肌瓣用於胸壁重建後，出現隨上肢活動而不自主抽動（unsightly/uncomfortable motion）的成因與預防。\n\n1. Latissimus 由 thoracodorsal nerve 支配；若 flap 掀起時**未切斷 thoracodorsal nerve**，肌肉仍保留神經支配，上肢活動（內收/內旋/後伸）時會誘發肌肉收縮，使皮瓣在胸壁上跳動變形。\n2. 預防原則：作為胸壁覆蓋之旋轉肌瓣時，應「切斷 thoracodorsal nerve」以去神經化，避免收縮與後續肌肉肥大牽動。\n3. 另可考慮切斷 humeral insertion 以減張與去除牽動，但本題最直接的成因為神經未切斷。","peropt":{"A":"術後未完全固定肩膀並非肌肉自主抽動的根本機轉。","B":"◎ 未切斷 thoracodorsal nerve：肌肉保留神經支配，隨上肢活動收縮而不自主跳動，為最可能原因。","C":"Inset 固定不牢會造成移位/裂開，但不會造成「隨手臂動作」的規律抽動。","D":"保留 humeral insertion 會加重牽動，但去神經（切斷 thoracodorsal nerve）才是消除收縮的關鍵；本題最貼切者為 B。","E":"肋骨骨折與皮瓣隨手臂活動抽動無因果關係。"},"cite":"Grabb & Smith 9e, Chest wall reconstruction (latissimus flap denervation)","conflict":""},{"id":"6006","sub":"T2","src":"GS","years":[113],"stem":"下列皮瓣與腹部下三分之一的腹疝修補(lower third abdominal hernia repair)有關? (複選)","opts":{"A":"Anterior lateral thigh.","B":"Rectus abdominis","C":"Tensor fascia lata","D":"Gracilis","E":"External oblique"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 本題考點（複選）：下三分之一腹壁疝氣修補可用皮瓣的全面盤點，與 6003 同一知識點。\n\n1. 可到達並覆蓋下腹壁的帶血供皮瓣：**A. ALT、B. Rectus abdominis、C. TFL、D. Gracilis** 皆屬正解。\n2. External oblique 位於上/中腹壁外側，主要供上腹壁重建，無法覆蓋下三分之一，故排除。\n3. 選擇時再依缺損大小、是否需筋膜張力支撐、供區狀況綜合判斷。","peropt":{"A":"◎ ALT：長弧、供區併發症低，中下腹壁常用。","B":"◎ Rectus abdominis：下腹肌皮瓣可修補下腹壁。","C":"◎ TFL：下腹壁/鼠蹊部經典帶蒂皮瓣。","D":"◎ Gracilis：適用下腹、鼠蹊、會陰。","E":"External oblique：位置偏上/中腹壁，無法覆蓋下三分之一，故不選。"},"cite":"Neligan 5e, Abdominal wall reconstruction","conflict":""},{"id":"6008","sub":"T2","src":"GS","years":[114],"stem":"關於腹壁重建中常用的皮瓣選擇與應用，下列敘述何者正確？(複選)","opts":{"A":"旋轉腹直肌肌皮瓣（Rectus abdominis myocutaneous flap）可依其血供分為以上腹壁動脈的皮瓣與以下腹壁動脈的皮瓣。","B":"闊筋膜張肌皮瓣（Tensor fasciae latae flap）主要應用於上腹壁缺損的重建。","C":"股前外側皮瓣（Anterolateral thigh flap）常用於中下腹壁缺損，且供區併發症較少。","D":"背闊肌皮瓣（Latissimus dorsi flap）通常用於中上腹壁缺損的重建。","E":"股薄肌皮瓣（Gracilis flap）適用於下腹壁、鼠蹊部及會陰部缺損的重建。"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考點（複選）：腹壁重建各皮瓣的血供分型、適用區域與供區併發症。\n\n1. **A ◎** Rectus abdominis 肌皮瓣依血供分為以 superior epigastric 為蒂（供上腹）與以 deep inferior epigastric 為蒂（供下腹/游離 DIEP/TRAM）。\n2. **C ◎** ALT flap 弧長、供區代價低，常用於中下腹壁缺損。\n3. **D ◎** Latissimus dorsi flap（帶蒂或 reverse）常用於中上腹壁缺損。\n4. **E ◎** Gracilis flap 適用下腹壁、鼠蹊與會陰重建。\n5. **B 錯**：Tensor fasciae latae flap 主要供「下腹壁/鼠蹊」缺損，而非上腹壁，故敘述錯誤被排除。","peropt":{"A":"◎ Rectus abdominis 依 superior vs deep inferior epigastric 分為上/下腹壁血供皮瓣，正確。","B":"TFL flap 主要用於下腹壁/鼠蹊，非上腹壁；敘述錯誤故排除。","C":"◎ ALT flap 常用於中下腹壁且供區併發症較少，正確。","D":"◎ Latissimus dorsi flap 用於中上腹壁缺損，正確。","E":"◎ Gracilis flap 適用下腹壁、鼠蹊、會陰，正確。"},"cite":"Neligan 5e, Abdominal wall reconstruction","conflict":""},{"id":"6009","sub":"T3","src":"GS","years":[114],"stem":"一位 62 歲女性，患有轉移性乳癌及脊椎轉移，曾接受脊椎外部放射線治療，因 T8 病理性骨折，由神經外科緊急進行鈦合金骨釘後方固定手術。術後傷口癒合不良並有膿性分泌物。此時最佳的初步處置應為何？","opts":{"A":"照會感染科並給予廣效性靜脈注射抗生素 48 至 72 小時。","B":"安排含螢光標記白血球的骨骼掃描，以確定感染範圍及是否有骨髓炎。","C":"手術清創、沖洗、使用背部脊椎旁肌肉皮瓣覆蓋骨釘，並採取傷口檢體進行細菌培養以指導後續抗生素治療。","D":"照會神經外科移除所有骨釘。","E":"應用負壓傷口治療設備並灌注抗生素，直到有健康的肉芽組織生成且感染清除。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：脊椎轉移放療後、後方鈦釘固定術後傷口裂開合併膿性分泌物（hardware exposure/infection）之最佳初步處置。\n\n1. 面對「暴露的內固定物 + 感染」，現代原則為**及早手術清創、大量沖洗、以血供良好之肌肉皮瓣（paraspinous/erector spinae muscle flap）覆蓋硬體**，並於術中取深部檢體培養以指導抗生素。\n2. 於腫瘤放療背景下，內固定物尚提供脊椎穩定，不應貿然移除；以健康帶血肌瓣填補死腔並覆蓋是控制感染、保住硬體的關鍵。\n3. 單靠靜脈抗生素或影像檢查會延誤清創；VAC 灌注僅為輔助，無法取代對暴露硬體的皮瓣覆蓋。","peropt":{"A":"單純照會感染科給抗生素 48–72 小時，會延誤必要之手術清創與皮瓣覆蓋。","B":"螢光標記白血球骨掃描屬耗時輔助檢查，不能取代對暴露硬體的即時清創覆蓋。","C":"◎ 手術清創、沖洗、脊椎旁肌肉皮瓣覆蓋骨釘並取培養：符合現代 hardware salvage 原則，為最佳初步處置。","D":"貿然移除所有骨釘會犧牲脊椎穩定，且非首要處置。","E":"NPWT 加抗生素灌注僅為輔助，無法覆蓋暴露硬體、根本解決感染。"},"cite":"Neligan 5e / Grabb & Smith 9e, Posterior trunk & spinal wound reconstruction","conflict":""},{"id":"6010","sub":"T1","src":"GS","years":[114],"stem":"一位 50 歲女性被診斷出右側乳房有 6 公分、合併黴菌感染、局部晚期浸潤性乳腺癌，已侵犯到胸大肌及肋間肌。計劃進行改良式根除性乳房切除術並切除部分胸壁。預計移除後的肌肉骨骼胸壁缺損直徑為 5 公分。下列何者為最適合的重建策略？","opts":{"A":"兩階段乳房重建，先置入組織擴張器，之後更換為永久性乳房植入物。","B":"使用聚乙烯網膜搭配甲基丙烯酸甲酯（methylmethacrylate）重建骨性胸壁，隨後使用游離腹部下腹壁穿枝皮瓣（DIEP flap）進行乳房重建。","C":"使用帶蒂闊背肌皮瓣，隨後進行分層植皮。","D":"使用生物人工網膜（bioprosthetic mesh）重建骨性胸壁，隨後使用游離前外側大腿皮瓣（ALT flap）覆蓋胸壁。","E":"直接進行傷口清創並關閉。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：局部晚期乳癌合併胸壁全層切除（直徑約 5 cm）之骨性與軟組織重建策略選擇。\n\n1. 全層胸壁缺損重建兩要素：(a) 骨性穩定/避免反常呼吸，(b) 血供良好之軟組織覆蓋。\n2. 於「腫瘤污染/黴菌感染」背景下，應避免使用永久性合成植入物與 methylmethacrylate（感染風險高、需二次移除）；改用**生物人工網膜（bioprosthetic mesh）**重建骨性胸壁較能耐受污染環境。\n3. 軟組織以**游離 ALT flap** 提供大面積、可靠、與病灶無關供區之覆蓋。\n4. 故最適策略為 **D：bioprosthetic mesh + free ALT flap**。相對地，此污染環境不宜做組織擴張器/植入物式乳房重建或 DIEP 美容重建。","peropt":{"A":"污染/感染傷口做擴張器與永久植入物重建，感染與外露風險極高，不適當。","B":"Polyethylene + methylmethacrylate 於污染環境易感染需移除；且此情境優先為腫瘤缺損覆蓋而非 DIEP 美容重建。","C":"帶蒂闊背肌 + 植皮無法提供可靠的骨性穩定，覆蓋品質亦較差。","D":"◎ 生物人工網膜重建骨性胸壁 + 游離 ALT flap 覆蓋：耐污染、供區可靠，為最適策略。","E":"單純清創直接關閉無法處理全層胸壁缺損，張力大且會反常呼吸。"},"cite":"Neligan 5e, Chest wall reconstruction (contaminated field, bioprosthetic mesh)","conflict":""},{"id":"6011","sub":"T1","src":"GS","years":[115],"stem":"常用來重建chest wall defect之locoregional flap及其所對應的供應血流來源，以下何者錯誤？","opts":{"A":"Latissimus dorsi / Thoracodorsal vessels","B":"Rectus abdominis / Superior and deep inferior epigastric vessels","C":"Omentum / Left and right gastric vessels","D":"External oblique / Perforators of lumber vessels","E":"Serratus anterior / Lateral thoracic vessels"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：胸壁重建常用 locoregional flap 與其主要供應血管的正確配對。\n\n1. Latissimus dorsi → thoracodorsal vessels（正確）。\n2. Rectus abdominis → superior epigastric（帶蒂）及 deep inferior epigastric vessels（正確）。\n3. **Omentum → 由 right and left gastroepiploic vessels 供應（源自 gastroduodenal 與 splenic）**，而非「gastric vessels」，故 C 敘述錯誤。\n4. External oblique → 下位肋間及 lumbar perforators（正確）。\n5. Serratus anterior → lateral thoracic（及 thoracodorsal 分支）vessels（正確）。","peropt":{"A":"Latissimus dorsi / thoracodorsal vessels，配對正確。","B":"Rectus abdominis / superior 與 deep inferior epigastric vessels，配對正確。","C":"◎ Omentum 應為 right/left gastroepiploic vessels 供應，非 gastric vessels，故此配對錯誤。","D":"External oblique / lumbar（及肋間）perforators，配對正確。","E":"Serratus anterior / lateral thoracic vessels，配對正確。"},"cite":"Grabb & Smith 9e, Chest wall flaps & vascular supply","conflict":""},{"id":"6012","sub":"T2","src":"GS","years":[115],"stem":"以下何種縫合技巧有最高的腹部疝氣復發率？","opts":{"A":"以雙側anterior components separation直接關閉fascia，並使用onlay porcine dermal mesh","B":"使用retrorectus sutureless, self-adhering synthetic mesh，並直接關閉anterior及posterior rectus sheaths","C":"使用onlay microporous midweight polypropylene mesh，並以fibrin glue固定","D":"使用barrier-coated porcine dermal mesh為intraperitoneal underlay且各方向重疊4cm，並直接關閉fascia","E":"使用cross-linked porcine dermal mesh用以bridge橫跨fascial edges的gap，並使用#0-PDS加固mesh至fascia上"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：腹壁疝氣修補中「橋接（bridging）vs 加強（reinforcement）」與 mesh 使用方式對復發率的影響。\n\n1. 核心原則：mesh 應作為「reinforcement（於已對合筋膜之上/下加強）」，而非「bridging（跨越無法對合的筋膜缺口）」。**Bridging repair 復發率最高**。\n2. 選項 E 使用 cross-linked porcine dermal mesh「bridge 橫跨 fascial edges 的 gap」——即典型橋接式修補，加上生物網膜於張力橋接下易鬆弛/膨出，復發率最高。\n3. 對照：A（components separation 達成筋膜對合 + onlay）、B（retrorectus/Rives-Stoppa，復發率最低族群之一）、C（onlay reinforcement）、D（IPOM underlay 重疊 4 cm 且筋膜對合）皆為「加強」而非橋接，復發率較低。","peropt":{"A":"雙側 components separation 直接對合筋膜 + onlay mesh 屬加強式，復發率低。","B":"Retrorectus（Rives-Stoppa 概念）並對合前後鞘，為復發率最低之術式之一。","C":"Onlay polypropylene 加強且筋膜可對合，復發率相對低。","D":"Barrier-coated underlay 重疊 4 cm 且對合筋膜，屬加強式，復發率低。","E":"◎ Cross-linked porcine dermal mesh 橋接跨越 fascial gap（bridging）：無法對合筋膜、生物網膜易鬆弛，復發率最高。"},"cite":"Neligan 5e, Abdominal wall reconstruction (bridging vs reinforcement)","conflict":""},{"id":"6013","sub":"T4","src":"GS","years":[115],"stem":"一位52歲女性接受局部晚期直腸癌手術，行abdominoperineal resection (APR)合併後陰道壁切除，術前已接受neoadjuvant chemoradiation。依Cordeiro分類，此陰道缺損屬Type IB。下列何種重建方式最為適合？","opts":{"A":"Pudendal thigh flap（Singapore flap）","B":"Gluteal V-Y advancement flap","C":"Vertical rectus abdominis myocutaneous (VRAM) flap","D":"Superficial circumflex iliac artery perforator (SCIP) flap","E":"Internal pudendal artery perforator flap"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：APR 合併後陰道壁切除、放療後之陰道缺損重建；Cordeiro 分類 Type IB 的皮瓣選擇。\n\n1. Cordeiro 陰道缺損分類：Type I = 部分缺損（partial）；其中 **IA = 前壁/側壁**，**IB = 後壁或環周下段**。Type II = 環周缺損（circumferential）。\n2. 後壁缺損（IB）伴放療後盆底、且有 APR 造成之會陰死腔，需**帶血供且能填補盆腔死腔的皮瓣 → VRAM (vertical rectus abdominis myocutaneous flap)** 最適合，可同時重建後陰道壁與填塞骨盆死腔。\n3. VRAM 以 deep inferior epigastric vessels 為蒂，經腹拉入會陰，為 APR 後盆底/陰道重建的主力皮瓣。","peropt":{"A":"Pudendal thigh (Singapore) flap 較適合 Type IA 前/側壁淺層缺損，且放療後會陰皮膚品質差、無法填塞盆腔死腔。","B":"Gluteal V-Y advancement 主要處理會陰皮膚缺損，非後陰道壁重建與死腔填塞。","C":"◎ VRAM flap：帶血供、可重建後陰道壁並填塞 APR 盆腔死腔，為 Type IB 最適選擇。","D":"SCIP flap 為薄型游離穿枝皮瓣，體積不足以填塞盆腔死腔。","E":"Internal pudendal artery perforator flap 用於較局限之會陰/陰道缺損，放療後可靠度與體積不如 VRAM。"},"cite":"Neligan 5e, Reconstruction of acquired vaginal defects (Cordeiro classification)","conflict":""},{"id":"6014","sub":"T2","src":"NG","years":[104],"stem":"As regards abdominal hernia, which of the following statements are true? (複選)","opts":{"A":"Obesity, diabetes, smoking, nutritional deficiency are among the common risk factors","B":"Some of the failures comes from undiagnosed multiple defects","C":"Mesh prosthesis repair has a less favorable result ( higher recurrence rate) when compared with primary suture techniques","D":"the component separation method is to separate the transversus /rectus unit from the external/internal oblique muscles","E":"cyclical fatigue due to abdomen movement, lack of true bioincorporation into the mesh, or biofilm seeding may be the etiologic cause of the synthetic mesh device failure."},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考點（複選）：腹壁疝氣的危險因子、失敗成因與 mesh 修補之實證。\n\n1. **A ◎** 肥胖、糖尿病、抽菸、營養不良為公認危險因子。\n2. **B ◎** 部分失敗源自未診斷出的多發性筋膜缺損（multiple defects）。\n3. **E ◎** 合成 mesh 失敗成因包含腹部活動之循環性疲勞、缺乏真正生物整合、biofilm 定植感染。\n4. **C 錯**：Mesh 修補復發率「低於」primary suture，敘述將優劣顛倒，故排除。\n5. **D 錯**：Components separation 是將 external oblique 自 internal oblique 分離（釋放外斜肌腱膜），敘述之「transversus/rectus unit 自 external/internal oblique 分離」錯誤，故排除。","peropt":{"A":"◎ 肥胖、糖尿病、抽菸、營養不良為常見危險因子，正確。","B":"◎ 部分失敗來自未被診斷之多發缺損，正確。","C":"Mesh 修補復發率其實低於 primary suture；敘述顛倒故錯誤。","D":"Components separation 為分離 external 與 internal oblique（釋放外斜肌），非題述之層次；故錯誤。","E":"◎ 循環性疲勞、缺乏生物整合、biofilm 皆為合成 mesh 失敗成因，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, Abdominal wall / hernia","conflict":""},{"id":"6015","sub":"T3","src":"NG","years":[104],"stem":"關於pressure sore 導致的osteomyelitis 以下敘述何者錯誤?","opts":{"A":"Unrecognized osteomyelitis is a major source of morbidity and increased costs.","B":"Bone scan and CT scans were expensive but very sensitive.","C":"MRI is superior to CT for the evaluation of osteomyelitis.","D":"If bone biopsy and bone culture are both positive, delayed flap reconstruction is suggested.","E":"If bone biopsy and bone culture are both negative, perioperative antibiotics for 48 hours is suggested."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：壓瘡合併骨髓炎（osteomyelitis）之診斷影像與處置原則，找出錯誤敘述。\n\n1. 影像特性：**Bone scan 敏感但特異性低**（發炎、骨折、術後皆偽陽性），CT 對軟組織/骨髓炎的評估不如 MRI；故稱「bone scan 與 CT 都昂貴但『非常敏感（且可靠）』」為錯誤——B 為錯誤敘述。\n2. **MRI 對骨髓炎評估優於 CT**（C 正確）。\n3. 處置：骨切片 + 骨培養皆陽性 → 需先控制感染，建議延遲皮瓣重建（D 正確）；皆陰性 → 圍手術期抗生素 48 小時即可（E 正確）。\n4. 未辨識之骨髓炎是壓瘡治療失敗、成本與併發症的重要來源（A 正確）。","peropt":{"A":"未察覺之骨髓炎確為 morbidity 與費用增加的重要來源，正確。","B":"◎ 「Bone scan 與 CT 昂貴但非常敏感」錯誤：bone scan 敏感但特異性低，CT 亦非骨髓炎最佳評估工具，故為錯誤敘述。","C":"MRI 評估骨髓炎優於 CT，正確。","D":"骨切片與培養皆陽性建議延遲皮瓣重建（先治感染），正確。","E":"骨切片與培養皆陰性給予圍手術期抗生素 48 小時，正確。"},"cite":"Grabb & Smith 9e, Pressure sores & osteomyelitis","conflict":""},{"id":"6016","sub":"T4","src":"NG","years":[104],"stem":"關於reconstruction of acquired vaginal defects以下敘述何者正確? (複選)","opts":{"A":"acquired vaginal defects are most commonly the result of oncologic resection","B":"最常用的acquired vaginal defects classification有三種basic types","C":"the modified Singapore flap is ideal for type IA","D":"the modified Singapore flap is based on the posterior labial arteries","E":"flap selection is based on both the type of defect and the individual patient's characteristics."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考點（複選）：後天性陰道缺損重建的病因、分類、Singapore flap 血供與皮瓣選擇原則。\n\n1. **A ◎** 後天性陰道缺損最常見成因為腫瘤切除（oncologic resection）。\n2. **C ◎** Modified Singapore flap 適合 Type IA（前/側壁部分缺損）。\n3. **D ◎** Modified Singapore flap 以 **posterior labial arteries**（internal pudendal 分支）為血供基礎。\n4. **E ◎** 皮瓣選擇依缺損型態與病人個別狀況綜合判斷。\n5. **B 錯**：常用之後天陰道缺損分類（Cordeiro）為「兩種基本型別（Type I 部分、Type II 環周）」加亞型，非「三種 basic types」，故排除。","peropt":{"A":"◎ 後天性陰道缺損最常見來自腫瘤切除，正確。","B":"常用分類為兩種基本型別（partial/circumferential）而非三種，敘述錯誤故排除。","C":"◎ Modified Singapore flap 適合 Type IA，正確。","D":"◎ Modified Singapore flap 以 posterior labial arteries 為蒂，正確。","E":"◎ 皮瓣選擇依缺損型態與病人特性決定，正確。"},"cite":"Neligan 5e, Reconstruction of acquired vaginal defects","conflict":""},{"id":"6017","sub":"T5","src":"NG","years":[104],"stem":"關於testicular reattachment的敘述以下何者正確? (複選)","opts":{"A":"最好的情況下可以預期reattached testicle recover its sperm-producing function with the normal sperm count","B":"最好的情況下可以預期患者可以有maintenance of testosterone secretion","C":"devascularized testicle has its reattachment value even 缺血超過 6hrs","D":"在devascularized testicle的三條血管中only the testicular artery has the adequate caliber for anastomosis","E":"the post –reattachment psychological well-being of the patient must be considered"},"ans":"BDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考點（複選）：睪丸離斷再接（testicular reattachment）之功能預後與顯微吻合技術。\n\n1. **B ◎** 最佳情況下可維持睪固酮分泌（Leydig cell 內分泌功能較能保留）。\n2. **D ◎** 睪丸三條血管（testicular/內精索、deferential、cremasteric）中，唯 testicular (internal spermatic) artery 口徑足供顯微吻合。\n3. **E ◎** 再接後病人心理層面（身體完整性/性別認同）須納入考量。\n4. **A 錯**：即便最佳情況，生精功能與正常精子數多無法可靠恢復（曲細精管對缺血敏感），故不可期待 normal sperm count。\n5. **C 排除**：本卷權威答案未納入 C；離斷過久（>6hr）之去血管睪丸再接價值受質疑（生殖細胞對溫缺血耐受有限）。","peropt":{"A":"不應期待恢復正常精子數與生精功能，生殖上皮對缺血敏感，故錯誤。","B":"◎ 可維持睪固酮（內分泌）分泌，正確。","C":"缺血逾 6 小時之再接價值受質疑，本卷不列為正解故排除。","D":"◎ 三條血管中僅 testicular artery 口徑足供吻合，正確。","E":"◎ 再接後之心理健康須納入評估，正確。"},"cite":"Neligan 5e, Genital reconstruction (testicular replantation)","conflict":""},{"id":"6018","sub":"T1","src":"NG","years":[105],"stem":"How many regions are there in chest wall ?","opts":{"A":"2","B":"3","C":"4","D":"5","E":"6"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：胸壁的解剖分區數目。\n\n1. 胸壁重建概念上分為 **3 個 regions**（依教科書分區）。\n2. 分區有助於依缺損位置選擇對應之 locoregional flap 與是否需骨性支撐。","peropt":{"A":"2 個非教科書所述之胸壁分區數。","B":"◎ 3：胸壁分為 3 個 regions，正確。","C":"4 非正解。","D":"5 非正解。","E":"6 非正解。"},"cite":"Grabb & Smith 9e, Chest wall reconstruction","conflict":""},{"id":"6019","sub":"T3","src":"NG","years":[105],"stem":"Which below is not a possible flap choice for spine closure?","opts":{"A":"Erector spinae muscle flap","B":"Latissimus muscle or myocutaneous flap","C":"Trapezius muscle flap","D":"Superior gluteal artery perforator flap","E":"All of above are possible"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考點：脊椎/背部傷口關閉之可用皮瓣選項（找出『不可用』者）。\n\n1. 依脊椎缺損之高低位，可選：**Erector spinae (paraspinous) muscle flap**（中線各節段主力）、**Latissimus muscle/myocutaneous flap**（胸段）、**Trapezius muscle flap**（頸胸段）、**Superior gluteal artery perforator flap**（腰薦段）。\n2. 四者皆為可行選項，故『不可用』者不存在，答案為 **E：以上皆為可行選項**。","peropt":{"A":"Erector spinae muscle flap 為脊椎中線關閉主力，可用。","B":"Latissimus muscle/myocutaneous flap 用於胸段脊椎傷口，可用。","C":"Trapezius muscle flap 用於頸胸段，可用。","D":"Superior gluteal artery perforator flap 用於腰薦段，可用。","E":"◎ All of above are possible：四者皆可行，故不存在『不可用』者，此為正解。"},"cite":"Neligan 5e, Posterior trunk / spine reconstruction","conflict":""},{"id":"6021","sub":"T4","src":"NG","years":[105,107,109,110,111],"stem":"下列哪一個皮瓣為最常使用於陰道type IA defect (partial defect involving anterior or lateral wall)之重建？","opts":{"A":"Moberg flap","B":"Muscle-sparing rectus myocutaneous flap","C":"Pedicled jejunum flap","D":"Singapore flap","E":"Medial sural flap"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【考點：陰道缺損分型與皮瓣選擇 — Cordeiro/MSKCC分類】\n\n**Cordeiro分類**將陰道缺損分為：\n- **Type I（partial defect）**：\n  - **Type IA**：涉及anterior或lateral wall（前壁/側壁）→ 需要**薄、可彎折的筋膜皮瓣**\n  - **Type IB**：涉及posterior wall（後壁）\n- **Type II（circumferential/total defect）**：需要有體積、能捲成管狀的組織（如rectus myocutaneous flap或jejunum）\n\n**Type IA的重建首選 = Singapore flap（pudendal-thigh flap／新加坡皮瓣）**：\n- 位於groin crease內側，質地薄、柔軟，正好貼合anterior/lateral wall\n- 血供來自**posterior labial artery**（superficial perineal artery分支，源自internal pudendal）\n- 供區隱藏、可雙側使用、感覺神經（posterior labial/perineal branch of pudendal）可保留\n- 相較rectus flap體積過大（較適合Type II circumferential缺損），Singapore flap對partial anterior/lateral缺損最理想。","peropt":{"A":"Moberg flap是拇指掌側推進皮瓣（volar advancement），屬手外科重建，與陰道無關。","B":"Muscle-sparing rectus myocutaneous flap體積大、可捲管狀，適合Type II circumferential或posterior大缺損，非IA partial首選。","C":"Pedicled jejunum flap用於全陰道/circumferential重建（提供潤滑管腔），非薄壁partial缺損。","D":"◎ Singapore（pudendal-thigh）flap薄軟、以posterior labial artery供血，是Type IA anterior/lateral partial缺損的首選。","E":"Medial sural flap為小腿內側皮瓣，用於四肢/頭頸重建，非陰道重建常規。"},"cite":"Neligan Plastic Surgery 5e, Vol.4 Trunk & Lower Extremity — Vaginal reconstruction (Cordeiro classification)","conflict":"⚠ 同題歷屆重出：陰道type IA缺損(anterior/lateral wall partial defect)最常用/首選皮瓣＝Singapore flap。三版本：6021(105/109/111,中文,答案D)、6038(107,英文,答案C)、6056(110,中文/泌尿腫瘤情境,答案C)。干擾選項各異、中英互譯，考點一致(規則A)。答案字母雖為D/C/C，均指向Singapore flap，記概念不記字母。"},{"id":"6022","sub":"T3","src":"NG","years":[105],"stem":"下列哪一個flap比較不適合用來修補ischial pressure ulcer缺損？","opts":{"A":"Gluteal thigh flap","B":"Anterolateral thigh fasciocutaneous island flap","C":"Rectus abdominis musculocutaneous flap","D":"Sliding gluteus maximus flap","E":"Vertical lumbosacral flap"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Ischial（坐骨）壓瘡的皮瓣選擇原則】\n\nIschial壓瘡因坐姿承重、剪力大、復發率高，需要**帶血供肌肉/大體積可靠皮瓣**，且要保留鄰近組織供未來復發使用。\n\n**適合ischial的皮瓣：**\n- **Gluteal thigh flap（posterior thigh flap，以descending branch of inferior gluteal artery供血）**：ischial最常用之一\n- **Inferior gluteus maximus / sliding gluteus maximus flap**\n- **Hamstring V-Y advancement flap**、**gracilis flap**\n- **Pedicled ALT flap**、**rectus abdominis myocutaneous（可經皮下tunnel達會陰/坐骨區）**\n\n**不適合者 = Vertical lumbosacral flap（垂直腰薦皮瓣）**：\n- 其血供基礎與弧度設計位於**lumbosacral / sacral區域**，主要用於**sacral壓瘡**\n- 位置與坐骨區距離遠、旋轉弧（arc of rotation）無法涵蓋ischium，故最不適合坐骨缺損。","peropt":{"A":"Gluteal（posterior）thigh flap以inferior gluteal artery降支供血，是ischial壓瘡主力皮瓣，適合。","B":"ALT fasciocutaneous island flap可帶蒂轉至會陰/坐骨區，適合ischial重建。","C":"Rectus abdominis myocutaneous flap可經tunnel達坐骨/會陰，適合大缺損。","D":"Sliding gluteus maximus flap為坐骨與薦骨常用選項，適合ischial。","E":"◎ Vertical lumbosacral flap設計於腰薦區、旋轉弧涵蓋sacrum，最不適合坐骨壓瘡。"},"cite":"Neligan Plastic Surgery 5e — Pressure sores; Grabb & Smith 8e Ch.86","conflict":""},{"id":"6025","sub":"T1","src":"NG","years":[106],"stem":"Which of the following is incorrect about classification of infected sternotomy wounds?","opts":{"A":"Type 1 wounds occur in the first several postoperative days and are usually sterile.","B":"Type 2 infections, occurring in the first several weeks postoperatively.","C":"Type 3 infections, presenting months to years later, represent chronic wound infection. They are usually confined to the sternum and overlying skin and may be related to osteonecrosis or persistent foreign body.","D":"Type 2 infections are consistent with acute deep sternal wound infection, including sternal dehiscence, positive wound cultures, and cellulitis","E":"Type 3 infections commonly represent true mediastinitis."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Infected sternotomy wounds 分類（Pairolero & Arnold三型）】\n\n**Pairolero分類**依感染出現的時序與深度分三型：\n- **Type 1**：術後**前幾天（first several days）**出現，漿液血性引流，傷口培養通常**無菌（sterile）**，無骨髓炎/軟骨炎\n- **Type 2**：術後**數週內（first several weeks）**出現，為**急性深部胸骨傷口感染** — 化膿、cellulitis、sternal dehiscence、傷口培養陽性、常合併**mediastinitis（縱膈炎）**\n- **Type 3**：術後**數月至數年**才出現，為**慢性傷口感染** — 局限於胸骨與表皮，常與osteonecrosis或persistent foreign body（鋼絲）相關；**不代表真正的mediastinitis**\n\n**選項E錯誤**：Type 3並非常見的true mediastinitis；反而是**Type 2**才典型合併縱膈炎。故E為「不正確」的敘述（本題問incorrect）。","peropt":{"A":"Type 1術後前幾天、通常無菌 — 正確。","B":"Type 2發生於術後數週 — 正確。","C":"Type 3數月至數年後、慢性、局限胸骨與皮膚、與osteonecrosis/異物有關 — 正確。","D":"Type 2為急性深部胸骨感染，含dehiscence、培養陽性、cellulitis — 正確。","E":"◎ Type 3並非常見true mediastinitis（真正縱膈炎多見於Type 2），此敘述錯誤，為正解。"},"cite":"Neligan Plastic Surgery 5e — Chest wall reconstruction (Pairolero classification of sternal wound infection)","conflict":""},{"id":"6026","sub":"T2","src":"NG","years":[106],"stem":"Abdominal wall simple defect can be reconstructed by? (複選)","opts":{"A":"Primary closure","B":"Fascial grafts such as fascia lata","C":"Tissue-expander to expand both skin and fascia","D":"Local flaps such as a \"components separation\"","E":"Free flap"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：腹壁simple defect的重建階梯（reconstructive ladder）】\n\n**Abdominal wall simple（非complex）defect**可用多種方式重建，全部皆為可行選項：\n- **Primary closure（一期縫合）**：小缺損首選\n- **Fascial grafts（fascia lata等自體筋膜移植）**：橋接筋膜缺損\n- **Tissue expander**：可同時擴張skin與fascia，供分階段修補\n- **Local flaps含components separation（Ramirez組件分離術）**：rectus/oblique肌筋膜推進，回復linea alba\n- **Free flap（如free TFL、ALT、latissimus）**：大型或複雜缺損\n\n本題為複選且**ABCDE皆正確** — 涵蓋整個重建階梯。","peropt":{"A":"◎ Primary closure為小缺損首選，正確。","B":"◎ Fascia lata等fascial graft可修補筋膜缺損，正確。","C":"◎ Tissue expander可同時擴張皮膚與筋膜，正確。","D":"◎ Components separation為腹壁重建核心local flap技術，正確。","E":"◎ Free flap適用於大型/複雜缺損，正確。"},"cite":"Neligan Plastic Surgery 5e — Abdominal wall reconstruction","conflict":""},{"id":"6027","sub":"T5","src":"NG","years":[106],"stem":"因 Fournier's gangrene 造成的penile or scrotal skin necrosis ，若要重建皮膚缺損，以下幾種重建方式，哪種最不適合?","opts":{"A":"STSG, 0.018 inch thickness ,1:1 meshed nonexpanded skin graft","B":"STSG, 0.018 inch thickness ,scalpel puncture skin graft","C":"FTSG","D":"pedicled ALT flap","E":"tissue expansion"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Fournier's gangrene 陰莖/陰囊皮膚缺損重建】\n\nFournier's gangrene為會陰/生殖器壞死性筋膜炎，清創後多為**大範圍、感染污染、床面條件不佳**的傷口。重建原則以**能耐受污染床、快速覆蓋**為主：\n- **STSG（薄中厚植皮，meshed或puncture）**：陰囊/陰莖皮膚缺損最常用，睪丸可放回或暫置大腿袋\n- **FTSG**：適合陰莖shaft（美觀、較少攣縮）\n- **Pedicled ALT flap**：大範圍或深層缺損可提供帶血供組織\n\n**最不適合 = Tissue expansion（組織擴張術，E）**：\n- 需在**乾淨、無感染的床**上分階段進行，**耗時數週至數月**\n- Fournier為急性壞死性感染，組織條件與時間壓力皆不允許放置擴張器（感染/外露風險極高）\n- 故E最不適合。","peropt":{"A":"0.018吋1:1 meshed STSG可覆蓋陰囊/陰莖缺損，適合。","B":"Scalpel puncture（開孔）STSG利於引流、貼合，適合污染床。","C":"FTSG適合陰莖shaft、攣縮少，可行。","D":"Pedicled ALT flap提供帶血供組織覆蓋深層/大缺損，適合。","E":"◎ Tissue expansion需乾淨床且耗時數月，於急性壞死性感染最不適合，為正解。"},"cite":"Neligan Plastic Surgery 5e — Genital reconstruction; Fournier's gangrene","conflict":""},{"id":"6028","sub":"T4","src":"NG","years":[105,106],"stem":"局部陰道缺損，需要薄的組織重建時，modified Singapore flap是常用的皮瓣之一，請問供應modified Singapore flap皮瓣的血管是?","opts":{"A":"posterior labial artery","B":"inferior rectal artery","C":"medial femoral circumflex artery","D":"obturator artery","E":"superficial epigastric artery"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Modified Singapore flap 血供 — 與6024同源】\n\n局部陰道缺損需**薄組織**時，**modified Singapore flap（modified pudendal-thigh flap）**為常用選項。\n- 傳統Singapore flap以**posterior labial artery**（superficial perineal branch of internal pudendal artery）為軸\n- Modified版本仍保留此**posterior labial artery**軸型供血，改良處在於保留更寬的皮下蒂與外側界線以增加安全與感覺保留\n- 薄、柔軟、有感覺，適合anterior/lateral partial（Type IA）缺損。\n\n**正解A（posterior labial artery）**。","peropt":{"A":"◎ Posterior labial artery（源自internal pudendal）為modified Singapore flap血供，正確。","B":"Inferior rectal artery供應肛門/後會陰，非此皮瓣。","C":"Medial femoral circumflex artery供應gracilis/內收肌群，非Singapore flap。","D":"Obturator artery供應內收肌區，非Singapore flap軸。","E":"Superficial epigastric artery供應下腹壁淺層，非此皮瓣。"},"cite":"Neligan Plastic Surgery 5e — Vaginal reconstruction (modified pudendal-thigh flap)","conflict":"⚠ 同題歷屆重出：(modified) Singapore flap血供，正解均為posterior labial artery。6024(105,答案A)、6028(106,答案A)。干擾選項略異(6024列superior gluteal/lateral sacral，6028列medial femoral circumflex/superficial epigastric)，考點不變(規則A/B)。"},{"id":"6029","sub":"T5","src":"NG","years":[106],"stem":"以下有關變性手術 gender reassignment surgery 的描述，何者為是?","opts":{"A":"須經精神科醫師評估為變性慾患者 transsexualism 。","B":"建議手術前以性別轉換的角色生活一段時間，包括衣著、行為、人際關係的轉換，輔與賀爾蒙治療。以確認是否能適應手術後的生活。","C":"男變女手術通常以intestinal transposition 來重建新陰道，優點是比較潮濕潤滑。","D":"男變女手術期間，仍需持續給予賀爾蒙藥物。","E":"女變男手術以尿道重建部分最為困難，手術併發症也最多 。"},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：Gender reassignment surgery（性別重置手術）現代原則】\n\n**正確者為 A、B、E：**\n- **A ✓**：術前須經**精神科（精神專科）評估確認為gender dysphoria／transsexualism**，符合WPATH Standards of Care的把關流程。\n- **B ✓**：術前需經**real-life experience（真實生活體驗）** — 以目標性別的衣著、行為、人際關係生活一段時間，並輔以荷爾蒙治療，確認術後適應能力。\n- **E ✓**：**女變男（FtM）**手術中以**尿道重建（urethral lengthening / phalloplasty urethroplasty）最困難、併發症（尿道瘻管、狹窄）最多**，為公認難點。\n\n**錯誤者：**\n- **C ✗**：男變女（MtF）**首選為penile-scrotal skin inversion（陰莖-陰囊皮膚翻轉）**建立新陰道，intestinal（sigmoid）transposition僅為次選/特定情況（雖較潮濕但有分泌物異味、狹窄風險），非「通常」使用。\n- **D ✗**：MtF術後睪丸切除，**外源性雌激素仍需持續**，但敘述「手術期間仍需持續給予」不符臨床 — 術前常需**停用荷爾蒙以降低VTE（靜脈血栓）風險**，故D錯。","peropt":{"A":"◎ 須經精神科評估確認為transsexualism/gender dysphoria，正確。","B":"◎ 術前real-life experience加荷爾蒙治療以確認適應，正確。","C":"MtF通常以penile-scrotal skin inversion重建新陰道，intestinal transposition非首選，錯誤。","D":"圍手術期常需停用荷爾蒙以降低血栓風險，「手術期間持續給予」敘述錯誤。","E":"◎ FtM以尿道重建最困難、併發症最多，正確。"},"cite":"Neligan Plastic Surgery 5e — Surgery for gender identity disorder; WPATH SOC","conflict":""},{"id":"6030","sub":"T3","src":"NG","years":[106],"stem":"有關造成褥瘡 pressure sore的原因，以下何者正確?","opts":{"A":"皮膚及皮下組織受到持續壓力pressure，壓迫微血管，造成組織缺血而引起組織傷害，進一步壞死。","B":"壓力超過32 mmHg會造成微血管閉塞 (capillary closing)","C":"剪力(shear force)增加，可以增強組織抵抗壓力的傷害","D":"剪力(shear force)是指介於皮膚與接觸面(例如床墊)之間的作用力。","E":"在坐姿時，坐骨處(ischial tuberosities)的壓力最高可達60 mmHg"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯【考點：Pressure sore（褥瘡）成因與壓力生理】\n\n**正確者 A、B：**\n- **A ✓**：持續**壓力（pressure）壓迫微血管 → 局部缺血（ischemia）→ 組織壞死**，為壓瘡核心機轉。\n- **B ✓**：當外壓超過**capillary closing pressure ≈ 32 mmHg**時，微血管閉塞、灌流中斷。\n\n**錯誤者：**\n- **C ✗**：剪力（shear）會**降低**組織抵抗壓力的能力、扭曲穿通血管、**加重**缺血，並非「增強抵抗」。\n- **D ✗**：Shear force定義為組織**內部各層之間（或深部組織相對於骨骼）的切向力**，並非「皮膚與接觸面之間」— 後者是friction（摩擦力）。\n- **E ✗**：坐姿時ischial tuberosity的壓力可高達**約300 mmHg（甚至更高）**，遠超60 mmHg，故E的數字嚴重低估。","peropt":{"A":"◎ 持續壓力壓迫微血管致缺血壞死，正確。","B":"◎ 壓力超過約32 mmHg造成capillary closing，正確。","C":"剪力削弱組織抗壓能力、加重缺血，非增強抵抗，錯誤。","D":"剪力為組織內部/深層切向力，皮膚與床面間為friction，定義錯誤。","E":"坐姿ischial壓力可達約300 mmHg，遠高於60 mmHg，數字錯誤。"},"cite":"Neligan Plastic Surgery 5e — Pressure sores (pathophysiology)","conflict":""},{"id":"6031","sub":"T3","src":"NG","years":[106],"stem":"治療pressure sores的傷口，以下幾種治療方式，哪種成功率最高?","opts":{"A":"conservative wound therapy with pressure release maneuvers","B":"STSG","C":"excision of bone with ulcer and primary closure","D":"excision of bone with ulcer and closure by large rotation flap","E":"Negative-pressure wound therapy ( vacuum-assisted closure system)"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Pressure sore治療成功率 — 徹底清創＋大型皮瓣重建】\n\n褥瘡（尤其stage III/IV合併骨突暴露、bursa、osteomyelitis）之最高成功率治療為：\n**Excision of bone with ulcer（含病灶假囊與受累骨突之ostectomy）＋ closure by large rotation/musculocutaneous flap**\n- 徹底切除潰瘍、瘢痕bursa、鈣化與感染骨（bursectomy + ostectomy）\n- 以**大型旋轉/肌皮瓣**帶入健康帶血供、有襯墊（padding）的組織，消除死腔、覆蓋骨突\n- 相較保守治療、單純植皮、切除後直接縫合、NPWT，皮瓣重建的**長期癒合率與抗復發能力最高**。\n\n**正解D**。","peropt":{"A":"保守傷口治療加減壓僅適合早期/淺層，深部潰瘍成功率低。","B":"STSG於承重、骨突部位耐用性差、易破裂，成功率低。","C":"切骨後直接primary closure張力大、死腔未除，復發率高。","D":"◎ 徹底切除潰瘍與受累骨突並以大型rotation/肌皮瓣覆蓋，成功率最高，為正解。","E":"NPWT為過渡/輔助療法（bridging），非終極封閉手段，成功率不及皮瓣。"},"cite":"Grabb & Smith 8e / Neligan 5e — Surgical treatment of pressure sores","conflict":""},{"id":"6032","sub":"T1","src":"NG","years":[107],"stem":"Which description about pectus excavatum is wrong?","opts":{"A":"Pectus excavatum is the most common congenital anterior thoracic wall deformity, as known as funnel chest","B":"Pectus excavatum is a male dominant disease, which has a 3:1 ration of male to female","C":"Pectus defomities often carry a familial component","D":"Surgery usually occurred with pectus severty index (PSI) greater than 2.25","E":"Surgical correction is considered safe in children older than 7 years old"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Pectus excavatum（漏斗胸）特徵與手術適應症】\n\n**錯誤者 = D**，關於手術適應指標的**數值**：\n- 客觀嚴重度以**Haller index（CT測量的横徑/前後徑比）**評估，**Haller index > 3.25**為手術適應症的公認閾值（正常約2.5）。\n- 題目寫「pectus severity index (PSI) greater than **2.25**」— 數值錯誤（應為3.25），故D為wrong。\n\n**其餘正確：**\n- A ✓ 漏斗胸（funnel chest）為最常見的先天前胸壁畸形。\n- B ✓ 男性為主，男女比約3:1。\n- C ✓ 常有家族傾向（familial component）。\n- E ✓ 手術（Nuss / Ravitch）在7歲以上兒童被認為安全，青春期前後為理想時機。","peropt":{"A":"漏斗胸為最常見先天前胸壁畸形，正確。","B":"男性為主、男女比約3:1，正確。","C":"常帶家族性成分，正確。","D":"◎ 手術閾值應為Haller index > 3.25，題目寫2.25數值錯誤，為正解。","E":"7歲以上兒童手術矯正被認為安全，正確。"},"cite":"Neligan Plastic Surgery 5e — Chest wall reconstruction / pectus deformities (Haller index)","conflict":""},{"id":"6033","sub":"T5","src":"NG","years":[107],"stem":"Which description about reconstruction of congenital urogenital defects is wrong?","opts":{"A":"Hypospadias is common, perhaps increasing in incidence, and may be managed through multiple surgical approaches","B":"Vaginal agenesis is associated with Mayer-Rokitansy-Kuster-Hauser syndrome, wherein the distal one-thirds of the vagina is absent","C":"Cloacal exstrophy occurs when the anterior rectal and bladder walls do not develop","D":"Hypospadias occurs when the development of the urethral spongiosum and prepuce halts, resulting in a meatal location proximal to that of the distal glans","E":"Bladder exstrophy tends to occur in nulliparous and young females' offspring's."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：先天泌尿生殖缺損重建 — MRKH與陰道發育不全】\n\n**錯誤者 = B**：\n- **Vaginal agenesis**與**Mayer-Rokitansky-Küster-Hauser（MRKH）syndrome**相關 — 為**müllerian aplasia**：**子宮與陰道上2/3（upper two-thirds）缺如**，卵巢與外陰正常、染色體46,XX。\n- 題目寫「distal one-third of the vagina is absent（陰道遠1/3缺如）」— **完全相反**（缺的是近端/上2/3，遠端由urogenital sinus發育而來多存在），故B錯誤。\n\n**其餘正確：**\n- A ✓ 尿道下裂常見、發生率可能上升、有多種術式。\n- C ✓ Cloacal exstrophy為前方直腸與膀胱壁未發育。\n- D ✓ 尿道下裂為尿道海綿體與包皮發育中止，開口位於較近端（distal glans之近側）。\n- E ✓ Bladder exstrophy較常見於年輕、初產婦的後代。","peropt":{"A":"尿道下裂常見、發生率可能上升、有多種手術方式，正確。","B":"◎ MRKH為子宮與陰道上2/3缺如，非遠1/3缺如，敘述錯誤，為正解。","C":"Cloacal exstrophy為前方直腸與膀胱壁未發育，正確。","D":"尿道下裂為尿道海綿體/包皮發育中止致開口偏近端，正確。","E":"膀胱外翻好發於年輕初產婦的後代，正確。"},"cite":"Neligan Plastic Surgery 5e — Reconstruction of congenital urogenital defects (MRKH)","conflict":""},{"id":"6034","sub":"T1","src":"NG","years":[107],"stem":"有關infected sternotomy wounds, 下列何者為非?","opts":{"A":"分成type I, type II, type III 三類.","B":"type I 發生在術後前幾天, 局部的cellulitis","C":"type II 發生在術後幾周, 有化膿並且sternal dehiscence","D":"type III 發生術後幾個月甚至數年, 慢性傷口感染","E":"Mediastinitis occurred in 0.25-5% of patient undergoing sternotomy, and mortality rate approached to 50%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Infected sternotomy wounds — 與6025同分類，聚焦Type I定義】\n\nPairolero三型分類：\n- **Type I**：術後**前幾天**，漿液血性引流、**通常無菌**，**尚無化膿或cellulitis**\n- **Type II**：術後**數週**，化膿、cellulitis、sternal dehiscence、常合併mediastinitis\n- **Type III**：術後**數月至數年**，慢性傷口感染，與骨壞死/異物有關\n\n**錯誤者 = B**：題目將**Type I描述為「局部cellulitis」**，但Type I典型為**無菌漿液血性引流、無明顯感染徵象**；cellulitis屬Type II（急性深部感染）的表現。故B為「為非」（正解）。\n\nE補充正確：mediastinitis發生率約0.25–5%，死亡率可接近50%（高致死）。","peropt":{"A":"分為type I、II、III三類，正確。","B":"◎ Type I通常無菌、無感染徵象；「局部cellulitis」屬Type II，敘述錯誤，為正解。","C":"Type II術後數週、化膿並sternal dehiscence，正確。","D":"Type III術後數月至數年之慢性感染，正確。","E":"縱膈炎發生率0.25–5%、死亡率近50%，正確。"},"cite":"Neligan Plastic Surgery 5e — Chest wall reconstruction (Pairolero sternal wound infection)","conflict":""},{"id":"6035","sub":"T1","src":"NG","years":[107],"stem":"〔複選〕\n複選1. 有關chest & trunk anatomy, 下列敘述何者為是? (複選)","opts":{"A":"suprascapular artery is a branch of thyrocervical trunk, and supply upper scapula and scapular muscle","B":"subscapular artery arise from 3rd portion of axillary artery","C":"Pectoralis major muscle is Methes and Nahai type IV muscle flap","D":"Chest wall又分成 anterior, lateral and posterior, 3 regions","E":"Internal mammary artery branches from subclavian artery and runs 1-2 cm lateral to sternal"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：胸壁與軀幹解剖 — 動脈來源、肌皮瓣分型】\n\n**正確者 A、B、D、E：**\n- **A ✓**：Suprascapular artery為**thyrocervical trunk**分支，供應upper scapula與肩胛肌群。\n- **B ✓**：Subscapular artery源自**axillary artery第3段（3rd portion）**，為腋動脈最大分支。\n- **D ✓**：Chest wall分為anterior、lateral、posterior三區。\n- **E ✓**：Internal mammary（thoracic）artery源自**subclavian artery**，於胸骨外側約**1–2 cm**下行。\n\n**錯誤者：**\n- **C ✗**：Pectoralis major（胸大肌）依**Mathes-Nahai分類為Type V**（一個dominant pedicle＝thoracoacromial，加上secondary segmental pedicles＝internal mammary perforators），**非Type IV**。Type IV為多節段血供（如sartorius、tibialis anterior），可靠性差。故C錯。","peropt":{"A":"◎ Suprascapular artery為thyrocervical trunk分支，供上肩胛，正確。","B":"◎ Subscapular artery源自腋動脈第3段，正確。","C":"Pectoralis major為Mathes-Nahai Type V（非Type IV），錯誤。","D":"◎ 胸壁分anterior、lateral、posterior三區，正確。","E":"◎ Internal mammary artery源自subclavian、於胸骨外1–2 cm，正確。"},"cite":"Neligan Plastic Surgery 5e — Chest/trunk anatomy; Mathes-Nahai muscle flap classification","conflict":""},{"id":"6036","sub":"T2","src":"NG","years":[105,107],"stem":"複選3. Which complications often happened in abdominal wall reconstruction? (複選)","opts":{"A":"Recurrence of hernia","B":"Wound breakdown","C":"Adhesions","D":"Seroma","E":"Pain"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：腹壁重建常見併發症】\n\n**Abdominal wall reconstruction**（含mesh、components separation、free/pedicled flap）之常見併發症，本題複選**ABCDE皆是**：\n- **A Recurrence of hernia（疝氣復發）**：最重要的長期併發症，尤與mesh選擇、張力、感染相關\n- **B Wound breakdown / dehiscence（傷口裂開）**：張力與血流不足所致\n- **C Adhesions（腹腔內沾黏）**：尤其mesh直接接觸腸道（需用composite/防沾黏mesh）\n- **D Seroma（血清腫）**：大範圍剝離、死腔、components separation後常見\n- **E Pain（慢性疼痛）**：與mesh固定、神經受累（如ilioinguinal/iliohypogastric）相關\n\n⚠答案疑義：本題原始資料標註跨版本（Neligan 3e p.105 vs p.107）措辭差異 — 有版本以「Secondary hernias」取代E的「Pain」、以「Recurrence」取代A的「Recurrence of hernia」。惟就臨床事實，ABCDE皆屬腹壁重建公認併發症，全選正確無誤。","peropt":{"A":"◎ 疝氣復發為腹壁重建最關鍵長期併發症，正確。","B":"◎ 傷口裂開/壞死常見，正確。","C":"◎ 腹腔內沾黏（mesh接觸腸道）常見，正確。","D":"◎ Seroma（血清腫）於廣泛剝離後常見，正確。","E":"◎ 慢性疼痛（mesh固定/神經受累）為公認併發症，正確。"},"cite":"Neligan Plastic Surgery 5e/3e — Abdominal wall reconstruction (complications)","conflict":"跨年數值差異（Neligan 3e vs Neligan 3e）：A: 105「Recurrence」 vs 107「Recurrence of hernia」；E: 105「Secondary hernias」 vs 107「Pain」 ｜ ⚠ 同題歷屆重出：腹壁重建常見併發症(複選)，兩題答案均全選ABCDE。6020(105)：A=Recurrence、E=Secondary hernias；6036(107)：A改為Recurrence of hernia、E改為Pain。僅E項替換且新舊選項皆為真實併發症，考點不變(規則B)。"},{"id":"6037","sub":"T5","src":"NG","years":[107],"stem":"Which statement about male genital anatomy is wrong?","opts":{"A":"The deep penile fascia (Buck fascia) carries important neurovascular structures, including the deep dorsal vein and arteries, the deep dorsal nerves of the penis, the circumflex arteries and veins, and the penile lymphatics.","B":"The sensation of penile shaft was provided mainly by dorsal nerve of the penis.","C":"There are two separate arterial sources of male genitalia : deep internal pudendal arteries and superficial external pudendal arteries.","D":"In most of anatomic studies, the superficial dorsal vein empties into the left saphenous vein","E":"The pudendal nerve is a mixed motor, sensory, and autonomic nerve, originating from the sacral roots (S2-S4)"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：男性生殖器解剖 — 陰莖感覺神經支配】\n\n**錯誤者 = B**：\n- 題目稱「penile **shaft（陰莖體）**的感覺主要由dorsal nerve of the penis提供」— 此敘述不正確。\n- **Dorsal nerve of the penis（陰部神經分支）**主要提供**glans penis（龜頭）**與遠端的感覺；陰莖**shaft皮膚**的感覺則主要來自更廣泛的來源。經典描述龜頭感覺由dorsal nerve主導，故將「shaft」歸於dorsal nerve為錯誤 → B為wrong。\n\n**其餘正確：**\n- A ✓ Buck fascia（deep penile fascia）內含deep dorsal vein、arteries、deep dorsal nerves、circumflex vessels與淋巴。\n- C ✓ 男性生殖器有兩套動脈來源：deep internal pudendal arteries與superficial external pudendal arteries。\n- D ✓ Superficial dorsal vein多數解剖研究注入**左側saphenous vein**。\n- E ✓ Pudendal nerve為混合性（運動、感覺、自律）神經，源自**S2–S4**薦神經根。","peropt":{"A":"Buck fascia內含deep dorsal vein/arteries/nerves、circumflex vessels與淋巴，正確。","B":"◎ 陰莖shaft感覺主要由dorsal nerve提供之敘述錯誤（dorsal nerve主司龜頭），為正解。","C":"男性生殖器有deep internal pudendal與superficial external pudendal兩動脈來源，正確。","D":"Superficial dorsal vein多注入左側saphenous vein，正確。","E":"Pudendal nerve為S2–S4之混合性神經，正確。"},"cite":"Neligan Plastic Surgery 5e — Male genital anatomy","conflict":""},{"id":"6039","sub":"T3","src":"NG","years":[105,107],"stem":"Braden scale is used for predicting pressure injury risk. Which of the following item is not included in this scale?","opts":{"A":"Sensory perception","B":"Activity degree of physical activity","C":"Nutrition","D":"Skin moisture","E":"Family support"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Braden Scale 項目 — 與6023同】\n\n**Braden Scale**六大次量表：\n1. Sensory perception（感覺認知）\n2. Moisture（皮膚潮濕度）\n3. Activity（活動度）\n4. Mobility（移動能力）\n5. Nutrition（營養）\n6. Friction and shear（摩擦與剪力）\n\n**Family support（家庭支持）不屬於Braden scale**，屬社會心理因素。故正解E。","peropt":{"A":"Sensory perception為Braden六大subscale之一。","B":"Activity（活動度）為Braden六大subscale之一。","C":"Nutrition（營養）為Braden六大subscale之一。","D":"Skin moisture（潮濕度）為Braden六大subscale之一。","E":"◎ Family support（家庭支持）不屬Braden scale，為正解。"},"cite":"Neligan Plastic Surgery 5e — Pressure sores (Braden Scale)","conflict":"⚠ 同題歷屆重出：Braden scale「何者不是subscale之一」，正解均指向『家庭』一項（非Braden六項subscale）。6023(105,中文,Family relationship=D)、6039(107,英文,Family support=E)。干擾選項略有替換(6023用Friction and shear，6039用Sensory perception，二者皆為真正subscale)、家庭用詞微調，考點不變(規則A/B)。註：正向複選版6050(見keep_separate)因是非/單複選翻轉另計。"},{"id":"6040","sub":"T3","src":"NG","years":[107],"stem":"Which statement about surgical treatment of pressure injury is wrong?","opts":{"A":"Complete debridement is the crucial first step in surgical treatment of pressure injury.","B":"Flaps from the posterior thigh are common options for ischial reconstruction, because they have the advantage of leaving the lateral hip and buttock for use in trochanteric and sacral lesions.","C":"Patients with proven osteomyelitis in the bone underlying their pressure injury should be treated with at least partial ostectomy.","D":"Marjolin's ulcer arising from pressure injury is possible and early recognition is important.","E":"Free flap reconstruction has lowest recurrence rates so it is the common option nowadays"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Pressure injury手術治療原則 — Free flap的角色】\n\n**錯誤者 = E**：\n- 敘述「Free flap reconstruction有最低復發率，故為現今常用選項」— **不正確**。\n- 壓瘡重建首選仍是**局部肌皮瓣/筋膜皮瓣（local musculocutaneous/fasciocutaneous flaps）**，因其技術較簡便、供區近、可靠且保留未來重建選項；**free flap屬保留手段（reserved）**，僅在局部選項耗盡（multiple recurrences）時採用，並非「因復發率最低而常用」。壓瘡復發主要取決於病人減壓照護與潛在因素，而非皮瓣是否為free。\n\n**其餘正確：**\n- A ✓ 徹底清創為手術首要關鍵步驟。\n- B ✓ 後大腿皮瓣（posterior thigh）常用於ischial，保留外側髖/臀供trochanteric與sacral病灶。\n- C ✓ 合併骨髓炎者至少需部分ostectomy（切骨）。\n- D ✓ 壓瘡可能長期演變為Marjolin's ulcer（鱗狀細胞癌），須早期辨識。","peropt":{"A":"徹底清創為壓瘡手術首要步驟，正確。","B":"後大腿皮瓣為ischial常用選項並保留鄰近供區，正確。","C":"合併骨髓炎至少需部分ostectomy，正確。","D":"壓瘡可惡變為Marjolin's ulcer，需早期辨識，正確。","E":"◎ Free flap為保留手段而非因復發率最低而常用，敘述錯誤，為正解。"},"cite":"Neligan Plastic Surgery 5e — Surgical treatment of pressure injury","conflict":""},{"id":"6041","sub":"T1","src":"NG","years":[108],"stem":"Majority of patients with pectus excavatum present with:","opts":{"A":"Dyspnea","B":"Palpitation","C":"Chest pain","D":"Limitation of activity","E":"Are asymptomatic"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Pectus excavatum臨床表現 — 多為無症狀】\n\n**大多數漏斗胸（pectus excavatum）病人 = asymptomatic（無症狀），正解E**：\n- 就診主訴以**外觀/心理（body image）困擾**為主，而非生理症狀\n- 部分病人在重度或運動時可有dyspnea、運動耐受下降、心悸（因心臟受壓/移位）、非典型chest pain，但**多數人並無明顯心肺症狀**\n- 客觀評估以Haller index（>3.25）、肺功能、心臟影像判定是否需手術。\n\n故majority為asymptomatic。","peropt":{"A":"Dyspnea（呼吸困難）僅部分重度或運動時出現，非多數表現。","B":"Palpitation（心悸）為少數（心臟受壓）表現，非多數。","C":"Chest pain（胸痛）非多數病人主要表現。","D":"Limitation of activity（活動受限）僅部分病人出現，非多數。","E":"◎ 多數漏斗胸病人為無症狀，就診以外觀/心理為主，正確。"},"cite":"Neligan Plastic Surgery 5e — Chest wall reconstruction / pectus excavatum presentation","conflict":""},{"id":"6042","sub":"T5","src":"NG","years":[108],"stem":"The congenital absence of vaginal is due to failure in developmental process affecting the:","opts":{"A":"Wolffian duct","B":"Mullerian duct","C":"Ectodermal pouch","D":"Urogenital sinus","E":"Urogenital sinus and Mullerian duct"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：陰道的胚胎發生學（vaginal embryology）與先天無陰道（vaginal agenesis, 如 MRKH syndrome）的成因。\n\n- 陰道具有「雙重胚胎來源（dual origin）」：\n  1. 上 2/3：源自 **paramesonephric (Müllerian) ducts** 融合形成的 uterovaginal canal。\n  2. 下 1/3：源自 **urogenital sinus** 向頭側增生的 sinovaginal bulbs（形成 vaginal plate）。\n- 完整陰道的形成需 Müllerian duct 與 urogenital sinus 兩者交會、canalization。任一環節失敗即造成陰道發育不全。\n- 典型代表為 **Mayer–Rokitansky–Küster–Hauser (MRKH) syndrome**：Müllerian 發育不全導致子宮與上段陰道缺如，但因卵巢（源自生殖腺）正常，第二性徵與染色體 46,XX 皆正常。\n- Wolffian (mesonephric) duct 為男性生殖管道前驅（epididymis、vas deferens、seminal vesicle），與陰道形成無關，屬誘答。\n- 故本題強調「兩者共同參與」，答案取涵蓋 urogenital sinus 與 Müllerian duct 的 E。","peropt":{"A":"Wolffian (mesonephric) duct 分化為男性附屬生殖管道，與陰道無關，錯。","B":"Müllerian duct 僅負責陰道上 2/3，單獨列出不完整，非最佳答案。","C":"陰道並非源自單純 ectodermal pouch（此為誘答概念），錯。","D":"Urogenital sinus 僅形成陰道下 1/3，單獨列出不完整。","E":"◎ 陰道為 urogenital sinus（下 1/3）與 Müllerian duct（上 2/3）共同衍生，兩者發育失敗即造成先天無陰道，最完整。"},"cite":"Neligan Plastic Surgery 5e, Genital/Vaginal reconstruction; MRKH embryology","conflict":""},{"id":"6043","sub":"T2","src":"NG","years":[108],"stem":"有關Ventral hernia repair 下列敘述何者有誤？","opts":{"A":"Ventral hernia最常見的原因,是laparotomy之後的併發症。","B":"處理Ventral hernia的indication中，不包含影響病患的bowel habits。","C":"Ramirez et. al. 提出component separation(CS) 的觀念來協助處理Ventral hernia repair。","D":"component separation的技術，仍有可能必須搭配mesh的使用。","E":"Mesh放置的位置可以是onlay, intraperitoneal inlay 或 retrorectal inlay。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：腹壁 ventral (incisional) hernia 的成因、手術適應症與 component separation / mesh 觀念。本題為「選出敘述有誤者」。\n\n- **成因**：ventral hernia 最常見為剖腹手術（laparotomy）後的 incisional hernia，發生率可達 10–20%。\n- **手術適應症（indications）**：不僅是外觀或不適，凡出現 incarceration、strangulation、腸阻塞（bowel obstruction）而影響 bowel habits，或反覆疼痛、皮膚破損，皆為修補指徵。故「不包含影響 bowel habits」的說法錯誤——腸道症狀正是重要適應症。\n- **Component separation (CS)**：Ramirez et al. (1990) 提出的觀念，藉由釋放 external oblique aponeurosis 使 rectus complex 向中線推進，達成 tension-free myofascial closure。\n- CS 仍常需搭配 **mesh reinforcement** 以降低復發。\n- **Mesh 放置層次**：onlay（筋膜淺層）、intraperitoneal/underlay inlay、retrorectus (sublay) inlay 等皆為可行位置。\n- 故錯誤者為 B。","peropt":{"A":"Ventral hernia 最常見為 laparotomy 後 incisional hernia，正確。","B":"◎ 影響 bowel habits（腸阻塞/嵌頓）正是手術適應症之一，說「不包含」為錯誤敘述，即本題答案。","C":"Ramirez et al. 確為 component separation 概念的提出者，正確。","D":"CS 常需合併 mesh 補強以降低復發，正確。","E":"Mesh 可置於 onlay、intraperitoneal inlay 或 retrorectus inlay，正確。"},"cite":"Grabb & Smith 9e, Abdominal wall reconstruction; Ramirez 1990","conflict":""},{"id":"6044","sub":"T1","src":"NG","years":[108],"stem":"有關胸壁的重建，下列何者錯誤？","opts":{"A":"Pectoralis muscle是重要的組織，可重建胸骨及前胸的缺損。","B":"Latissimus muscle也是很有幫助的皮瓣，因為較大且有足夠的自由度。","C":"Serratus muscle體積較小，無法覆蓋胸廓外側的缺損。","D":"Rectus abdominis可以用來重建胸骨或胸廓前端的缺損。","E":"Omentus由於面積較廣可重建任何位置的胸壁缺損"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：胸壁重建常用皮瓣（workhorse flaps）及其覆蓋範圍。本題選「錯誤者」。\n\n- **Pectoralis major**：前胸與胸骨（sternal）缺損主力，可作 advancement 或 turnover flap（後者依賴 internal mammary perforators）。\n- **Latissimus dorsi**：體積大、弧度自由度高，可覆蓋前、外、後胸壁大範圍缺損，為 workhorse。\n- **Serratus anterior**：體積雖較小，但柔軟、可作 intrathoracic 死腔填塞及**外側胸壁**覆蓋；說它「無法覆蓋胸廓外側缺損」是錯誤——臨床正是常用於外側與胸腔內。\n- **Rectus abdominis (VRAM)**：依 superior epigastric artery 供血，可重建胸骨下段與前胸缺損。\n- **Omentum**：面積廣、延展性佳、pedicle 可藉分割 arcades 延長，幾乎可達任何胸壁缺損，並具良好抗感染與填塞死腔能力。\n- 故錯誤者為 C。","peropt":{"A":"Pectoralis major 為胸骨與前胸重建重要皮瓣，正確。","B":"Latissimus dorsi 體積大、自由度高，覆蓋範圍廣，正確。","C":"◎ Serratus anterior 雖小仍可覆蓋外側胸壁與胸腔內缺損，說「無法覆蓋外側」為錯誤，即答案。","D":"Rectus abdominis 可重建胸骨/前胸廓缺損，正確。","E":"Omentum 面積廣、延展性佳，幾可達任何胸壁缺損，正確。"},"cite":"Neligan 5e, Chest wall reconstruction","conflict":""},{"id":"6046","sub":"T2","src":"NG","years":[109],"stem":"Which of the statement about trunk anatomy is true ? (複選)","opts":{"A":"The rectus abdominis originates at the pubic symphysis and pubic crest. It inserts into the xiphoid process and costal cartilage of ribs 5–7, was classified as Mathes and Nahai type II","B":"The serratus has a dual blood supply to its upper and lower muscular slips from the lateral thoracic and thoracodorsal system, classifying it as Mathes and Nahai type III","C":"The main vascular pedicle of the latissimus dorsi is the thoracodorsal artery, with segmental blood supply arising from intercostals and lumbar perforators medially. It was described as Mathes and Nahai type IV muscle","D":"The pectoralis major received perforators from the pectoral branch of the thoracoacromial trunk, internal mammary artery perforators along its medial border, and the thoracic intercostal vessels. The blood supply is Mathes and Nahai type V","E":"Innervation to the vulvar structures is via the ilioinguinal nerve, genitofemoral nerve, and the perineal branch of the femoral cutaneous nerve of the thigh"},"ans":"BDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：軀幹肌肉皮瓣的 Mathes–Nahai 血供分類與外陰神經支配。複選，正解 BDE。\n\n- **A（錯誤）**：Rectus abdominis 起於恥骨聯合與恥骨嵴、止於劍突與第 5–7 肋軟骨，敘述無誤，但其血供為 **Mathes–Nahai type III（兩條 dominant pedicle：superior 與 inferior epigastric artery）**，非 type II。\n- **B（正確）**：Serratus anterior 上、下肌束分別由 lateral thoracic 與 thoracodorsal 系統雙重供血，屬 **type III**。\n- **C（錯誤）**：Latissimus dorsi 主 pedicle 為 thoracodorsal artery，另有 intercostal/lumbar segmental perforators，屬 **Mathes–Nahai type V**（one dominant + secondary segmental），非 type IV。\n- **D（正確）**：Pectoralis major 主由 thoracoacromial trunk pectoral branch 供血，內側緣有 internal mammary perforators 之 segmental supply，屬 **type V**。\n- **E（正確）**：外陰（vulva）之神經支配包含 ilioinguinal nerve、genitofemoral nerve 及 posterior femoral cutaneous nerve 之 perineal branch。\n- 故正解 BDE。","peropt":{"A":"Rectus abdominis 應為 Mathes–Nahai type III（雙 dominant epigastric pedicle），非 type II，錯。","B":"◎ Serratus anterior 上下肌束雙重供血，屬 type III，正確。","C":"Latissimus dorsi 應為 type V（thoracodorsal 主 + 節段性），非 type IV，錯。","D":"◎ Pectoralis major 由 thoracoacromial 主供、IMA perforator 節段供血，屬 type V，正確。","E":"◎ 外陰神經支配含 ilioinguinal、genitofemoral 及股後皮神經 perineal branch，正確。"},"cite":"Mathes & Nahai classification; Neligan 5e trunk anatomy","conflict":""},{"id":"6047","sub":"T1","src":"NG","years":[109],"stem":"Regarding of reconstruction of chest, which of the following is true ?","opts":{"A":"Type I infected sternotomy wound occurs within first few weeks","B":"Mediastinitis occurs in 5-15 % of patients undergoing median sternotomy. Historically, mortality approached 50% in these patients","C":"The most common benign tumor of chest is osteochondroma and should always be resected.","D":"The omentum can reach almost any chest wall defect. Its greatest advantage is its pedicle length, which can be extended by dividing the arcades","E":"When the wound involves the upper two-thirds of the sternum, pectoralis major muscle advancement or turnover flaps are easily harvested and are the first line therapy for wound closure Caution is advised for turnover flaps when the contralateral internal mammary artery has been harvested for coronary artery bypass graft"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：胸部（縱膈/胸骨）重建——sternotomy 感染分類、mediastinitis 流行病學、良性腫瘤與 omentum/pectoralis 皮瓣特性。本題選「正確者」。\n\n- **A（錯誤）**：Pairolero Type I 感染性 sternotomy 傷口發生於術後「數日內（first few days）」，呈 serosanguineous 分泌、無 osteomyelitis；非「數週」。\n- **B（錯誤）**：median sternotomy 後 mediastinitis 發生率約 **0.5–5%（≈1–5%）**，非 5–15%；歷史上死亡率確可近 50%（此半句正確，但整體數字錯誤）。\n- **C（錯誤）**：胸壁最常見良性腫瘤為 chondroma/osteochondroma，但「應一律切除（always resected）」過於絕對，錯。\n- **D（正確）**：Omentum 幾可達任何胸壁缺損，最大優勢在於 pedicle 長度可藉分割 gastroepiploic arcades 進一步延長。\n- **E（錯誤）**：pectoralis turnover flap 依賴同側 internal mammary artery perforators，故 CABG 若取用「同側（ipsilateral）」IMA 才須警惕；此句誤植為 contralateral。\n- 故正解 D。","peropt":{"A":"Type I sternotomy 感染發生於術後數日內而非數週，錯。","B":"Mediastinitis 發生率約 1–5%（非 5–15%），數字有誤，錯。","C":"良性腫瘤未必一律切除，'always resected' 過絕對，錯。","D":"◎ Omentum 幾達任何胸壁缺損，優勢在可延長之 pedicle，正確。","E":"turnover flap 須警惕的是同側 IMA 已被取用，非對側，錯。"},"cite":"Pairolero classification; Neligan 5e chest wall/mediastinitis","conflict":""},{"id":"6048","sub":"T5","src":"NG","years":[109,111],"stem":"下列哪一條血管為主要支配陰莖的血液循環?","opts":{"A":"internal pudendal artery","B":"deep pudendal artery","C":"Superficial pudendal artery","D":"femoral artery","E":"Deep epigastric artery"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 考點：陰莖（penis）主要血液供應。\n\n- 陰莖主要動脈供應源自 **internal pudendal artery**（internal iliac artery 之分支）。\n- Internal pudendal artery 進入會陰後分為：\n  1. **Dorsal artery of penis**（供 glans 與皮膚）\n  2. **Deep (cavernosal) artery of penis**（供 corpus cavernosum，勃起主力）\n  3. **Bulbourethral artery**（供 corpus spongiosum 與尿道）\n- **Superficial/external pudendal artery**（源自 femoral artery）僅供陰莖皮膚淺層與陰囊，非主要供血。\n- 故答案為 A。","peropt":{"A":"◎ Internal pudendal artery 為陰莖主要血液供應來源，正確。","B":"'Deep pudendal artery' 非標準主供名稱，屬誘答，錯。","C":"Superficial (external) pudendal artery 僅供淺層皮膚，非主供，錯。","D":"Femoral artery 為近端來源，非直接主供陰莖，錯。","E":"Deep (inferior) epigastric artery 供腹壁，與陰莖無關，錯。"},"cite":"Neligan 5e, Penile anatomy/blood supply","conflict":""},{"id":"6049","sub":"T5","src":"NG","years":[109,111,114],"stem":"在變性手術中，Metaidoioplasty是什麼意思？","opts":{"A":"男變女中的clitoris重建手術","B":"男變女中的urethra的lengthening手術","C":"女變男中用其他組織如radial forearm flap的phalloplasty手術","D":"女變男中用clitoris及urethra lengthening的phalloplasty手術","E":"女變男中用局部組織如pudendal thigh ;lap 的phalloplasty手術"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：變性（gender-affirming）手術術語——Metaidoioplasty 定義。\n\n- **Metaidoioplasty** 為 **female-to-male (FtM)** 陰莖成形術式之一。\n- 原理：長期雄性素（testosterone）治療使 **clitoris 肥大**，術中將肥大之 clitoris 釋放（分離 suspensory ligament、切開 chordee）作為 neophallus，並合併 **urethral lengthening（尿道延長）** 使能站立排尿。\n- 相對於 radial forearm flap 或 ALT 之 phalloplasty，metaidoioplasty 不需大範圍皮瓣、保留感覺與勃起能力，但 neophallus 較小、通常無法插入性交。\n- 故符合「女變男中用 clitoris 及 urethral lengthening 的 phalloplasty」，答案 D。","peropt":{"A":"男變女之 clitoroplasty 與 metaidoioplasty 無關，錯。","B":"男變女尿道延長非本術語所指，錯。","C":"以 radial forearm flap 之 phalloplasty 屬另一術式，非 metaidoioplasty，錯。","D":"◎ FtM 以肥大 clitoris 加尿道延長構成 neophallus，即 metaidoioplasty，正確。","E":"pudendal thigh flap 之局部皮瓣 phalloplasty 非 metaidoioplasty 定義，錯。"},"cite":"Neligan 5e, Gender-affirming surgery / metoidioplasty","conflict":"⚠ 同題歷屆重出：Metoidioplasty定義（女變男，利用賀爾蒙肥大之clitoris＋urethral lengthening行phalloplasty）。中英雙語版本：6049(109/111,中文,答案D)、6073(114,英文,答案D)。兩題選項語意逐一對應，僅語言翻譯(規則A)。答案一致無疑義。"},{"id":"6050","sub":"T3","src":"NG","years":[109,111],"stem":"Braden scale是評估壓瘡最為廣泛使用的工具；以下哪些是subscale？(複選)","opts":{"A":"Skin moisture","B":"Activity","C":"Friction and shear","D":"Family relationship","E":"Nutrition"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：Braden Scale 之 6 項 subscale（壓瘡風險評估工具）。複選，正解 ABCE。\n\n- Braden Scale 為臨床最廣用之壓瘡（pressure ulcer）風險評估，總分 6–23 分，分數越低風險越高。\n- 六大 subscale：\n  1. **Sensory perception（感覺知覺）**\n  2. **Moisture（皮膚潮濕度）** → 對應 A\n  3. **Activity（活動量）** → 對應 B\n  4. **Mobility（移動能力）**\n  5. **Nutrition（營養狀態）** → 對應 E\n  6. **Friction and shear（摩擦與剪力）** → 對應 C\n- **Family relationship（家庭關係）** 非評估項目，屬誘答。\n- 故正解 ABCE。","peropt":{"A":"◎ Skin moisture（潮濕度）為 Braden 子項，正確。","B":"◎ Activity（活動量）為 Braden 子項，正確。","C":"◎ Friction and shear（摩擦剪力）為 Braden 子項，正確。","D":"Family relationship 非 Braden 評估項目，錯（此為誘答）。","E":"◎ Nutrition（營養）為 Braden 子項，正確。"},"cite":"Braden Scale; Neligan 5e pressure sores","conflict":""},{"id":"6051","sub":"T4","src":"NG","years":[109,111],"stem":"有關陰道重建(neovagina teconstructim)所用的〝Singapore flap〞)下列敘述，何者為非？","opts":{"A":"是屬於 fasciocutaneous flap","B":"是一種 neurovascular pudendal thigh flap","C":"是個 inferiorly based axial pattern flap","D":"其供應血流的 internal pudendal artery 在 flap base，adductor muscle ß","E":"好處是不會帶到毛髮，減少日後困擾"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：陰道重建之 Singapore flap（pudendal thigh flap）解剖與特性。本題選「何者為非」。\n\n- **Singapore flap** = **neurovascular pudendal thigh flap**，取自 groin crease 外側之大腿內側區。\n- 屬 **fasciocutaneous、axial pattern flap**，通常為 **inferiorly based**。\n- 血供來自 **posterior labial/內含 internal pudendal artery 系統之終末分支**，flap base 位於會陰旁、adductor 肌群外緣。\n- 神經支配含 posterior labial nerves（源自 pudendal nerve），故為 neurovascular，可保留感覺。\n- **缺點/常見錯誤**：此皮瓣取自鄰近會陰之大腿內側，**可能帶有毛髮**，日後於新陰道內生長毛髮造成困擾；故「不會帶到毛髮」為錯誤敘述。\n- 故答案 E。","peropt":{"A":"Singapore flap 屬 fasciocutaneous flap，正確。","B":"為 neurovascular pudendal thigh flap，正確。","C":"通常為 inferiorly based axial pattern flap，正確。","D":"血供源自 internal pudendal artery 系統、flap base 近 adductor 肌群，正確。","E":"◎ 此皮瓣取自大腿內側可能帶毛髮，說'不會帶毛髮'為錯誤敘述，即答案。"},"cite":"Neligan 5e, Vaginal reconstruction / Singapore (pudendal thigh) flap","conflict":""},{"id":"6052","sub":"T1","src":"NG","years":[110,111,112,113],"stem":"Which description about pectus excavatum is wrong?","opts":{"A":"Pectus excavatum is the most common congenital anterior thoracic wall deformity.","B":"Most patients complain of subjective dyspnea or chest pain","C":"Male dominant","D":"pectus severity index (PSI) >3.25 is considered one of the criteria for operative intervention","E":"Pectus deformities often carry a familial component, with 37–47% of patients reporting a family history"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：漏斗胸（pectus excavatum）之流行病學、症狀與手術適應症。本題選「錯誤者」。\n\n- **A（正確）**：pectus excavatum 為最常見之先天前胸壁畸形（約佔 90%）。\n- **B（錯誤，即答案）**：多數病人「無症狀」或主訴以外觀為主；僅部分嚴重者出現運動耐受下降、呼吸困難或胸痛。說「大多數病人主訴主觀呼吸困難或胸痛」與臨床不符。\n- **C（正確）**：男性為主（male:female ≈ 3–4:1）。\n- **D（正確）**：**Haller index / pectus severity index (PSI) > 3.25** 為手術介入標準之一（另含心肺功能受損、進行性惡化等）。\n- **E（正確）**：具家族傾向，約 37–47% 病人有家族史。\n- 跨年提醒：本題與 NG112-B09-Q05 之「正解選項文字」有改動，答案字母雖同但內容不同，須依各年原文作答。\n- 故答案 B。","peropt":{"A":"pectus excavatum 為最常見先天前胸壁畸形，正確。","B":"◎ 多數病人無症狀、以外觀為主訴，說'大多主訴呼吸困難或胸痛'錯誤，即答案。","C":"男性為主（約 3–4:1），正確。","D":"PSI/Haller index > 3.25 為手術標準之一，正確。","E":"約 37–47% 有家族史，正確。"},"cite":"Neligan 5e, Pectus excavatum; Haller index","conflict":"跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG112-B09-Q05）"},{"id":"6053","sub":"T1","src":"NG","years":[110],"stem":"Regarding to chest wall reconstruction, which flap of the following rarely being used?","opts":{"A":"Latissimus dorsi","B":"Pectoralis major","C":"Omentum","D":"Internal oblique","E":"Serratus anterior"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：胸壁重建常用皮瓣的取捨，選「甚少使用者」。\n\n- 胸壁重建 workhorse：**Latissimus dorsi、Pectoralis major、Rectus abdominis (VRAM)、Serratus anterior、Omentum**。\n- **Internal oblique** 為腹壁側肌，血供有限、位置不利、體積小，於**胸壁重建甚少使用**（較常見於口腔/上顎或作 osteomuscular flap），屬本題正解。\n- Serratus anterior 雖體積小仍常用於胸腔內與外側胸壁；omentum 為萬用填塞。\n- 故答案 D。","peropt":{"A":"Latissimus dorsi 為胸壁重建主力皮瓣，常用，非答案。","B":"Pectoralis major 為前胸/胸骨重建主力，常用，非答案。","C":"Omentum 為萬用填塞皮瓣，常用，非答案。","D":"◎ Internal oblique 於胸壁重建甚少使用，即答案。","E":"Serratus anterior 常用於胸腔內及外側胸壁，非答案。"},"cite":"Neligan 5e, Chest wall reconstruction flap options","conflict":""},{"id":"6054","sub":"T3","src":"NG","years":[110],"stem":"For reconstruction of lumbosacral defect, superior gluteal artery based flap is the first choice. If not available, which of the following is not true?","opts":{"A":"The erector spinae muscles are thin and laterally displaced in this area, precluding their use","B":"Latissimus dorsi flap can be mobilized to reach this area, but may not sufficient to fill the entire cavity.","C":"The vertical rectus abdominis myocutaneous (VRAM) flap is an uncommon design to achieve wound closure.","D":"Pure perforator flap based on superior gluteal artery can be done for the majority of patients.","E":"All of the above are true"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：Lumbosacral（腰薦部）缺損重建，首選 superior gluteal artery（SGAP/gluteal）皮瓣，若不可用時之替代方案。本題選「何者為非（不正確）」。\n\n- **A（正確）**：此區 erector spinae 肌群較薄且外移，單獨使用不足以填補缺損。\n- **B（正確）**：Latissimus dorsi 可下移延伸至此區，但常不足以完全填滿大死腔（需 turnover 或合併其他皮瓣）。\n- **C（錯誤，即答案）**：VRAM（vertical rectus abdominis myocutaneous flap）事實上是腰薦/骨盆與會陰缺損之常見且可靠選擇，並非「uncommon design」；此敘述與臨床不符。\n- **D（正確）**：多數病人可施行純 SGAP perforator flap 達成閉合。\n- 故答案 C（不正確者）。","peropt":{"A":"此區 erector spinae 薄且外移，難單獨使用，正確。","B":"Latissimus dorsi 可移動至此但常不足填滿死腔，正確。","C":"◎ VRAM 為腰薦/骨盆缺損之常見可靠選項，說其'uncommon'不正確，即答案。","D":"純 SGAP perforator flap 於多數病人可行，正確。","E":"並非全部皆真（因 C 錯），故非答案。"},"cite":"Neligan 5e, Posterior trunk / lumbosacral reconstruction","conflict":""},{"id":"6055","sub":"T2","src":"NG","years":[110],"stem":"For abdominal ventral hernia repair, component separation (CS) with mesh reinforcement is particularly useful. Which of the following is not true?","opts":{"A":"Open CS often allows tension-free closure of large defects, the major limitation is the wound morbidity associated with large skin flaps necessary to access the lateral abdominal wall.","B":"Laparoscopic CS is performed through a 1cm incision below the tip of the 11th rib overlying the external oblique muscle.","C":"A standard inguinal hernia balloon dissector is placed between the external and internal oblique muscles.","D":"The external oblique aponeurosis is incised from beneath the external oblique muscle at least 2 cm lateral to the linea semilunaris.","E":"All the above are correct"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：腹壁 ventral hernia 之 component separation（開放式與腹腔鏡/內視鏡式）技術細節。本題選「何者為非」，答案為 E（即 A–D 皆正確，無錯誤者）。\n\n- **A（正確）**：Open CS 可達大缺損之 tension-free closure，主要限制在於為到達側腹壁而掀起大範圍皮瓣所致之傷口併發症（wound morbidity）。\n- **B（正確）**：Endoscopic/minimally invasive CS 常經第 11 肋尖下方、覆於 external oblique 之約 1 cm 小切口進入。\n- **C（正確）**：以標準腹股溝疝氣 balloon dissector 於 external 與 internal oblique 之間建立平面。\n- **D（正確）**：於 linea semilunaris 外側至少 2 cm 處，自 external oblique 肌下方切開其 aponeurosis。\n- 以上 A–D 均為正確描述，故「所有以上皆正確」的 E 成立，本題答案 E。","peropt":{"A":"Open CS 主要限制為掀大皮瓣造成之傷口併發症，正確。","B":"MIS/endoscopic CS 經第 11 肋尖下 1cm 切口進入，正確。","C":"以腹股溝疝氣 balloon dissector 建立 external/internal oblique 間平面，正確。","D":"於 linea semilunaris 外側至少 2cm 切開 external oblique aponeurosis，正確。","E":"◎ A–D 皆正確，故'All the above are correct'成立，即答案。"},"cite":"Grabb & Smith 9e, Component separation technique (open & endoscopic)","conflict":""},{"id":"6058","sub":"T5","src":"NG","years":[110],"stem":"針對先天陰莖發育不全(congenital penile insufficiency)的患者,帶血管莖前外側大腿皮瓣（pedicled antrolateral thigh flap）與橈側前臂皮瓣(radial forearm flap)相比,前者似乎是更佳的選擇,以下考量針對上述何者正確？(複選)","opts":{"A":"不需顯微血管吻合,縮短手術時間","B":"與前臂相比,大腿的疤痕較不明顯","C":"合併膀胱外翻(bladder exstrophy)的病人,可能因過去的重建手術導致局部的血管構造改變,造成血管吻合更困難","D":"供應前外側大腿皮瓣(anterolateral thigh flap)的血管為外側旋股動脈的上升支(Ascending branch of lateral femoral circumflex artery)","E":"可以合併吻合外側股皮神經(lateral femoral cutaneous nerve)與背陰莖神經(dorsal penile nerve),促使後續性刺激的復原"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：先天陰莖發育不全（congenital penile insufficiency）之 phalloplasty——pedicled ALT flap vs radial forearm flap 的比較。複選，正解 ABCE。\n\n- **A（正確）**：Pedicled ALT flap 為帶蒂皮瓣，**不需顯微血管吻合**，可縮短手術時間並免除吻合失敗風險。\n- **B（正確）**：大腿供皮區疤痕較前臂（暴露、外觀顯眼）**較不明顯**、隱蔽性佳。\n- **C（正確）**：合併 bladder exstrophy 之病人，過去多次骨盆/會陰重建可能改變局部血管解剖，使受區顯微吻合更困難——此正是傾向選 pedicled ALT 的理由。\n- **D（錯誤）**：ALT flap 之供養血管為 lateral circumflex femoral artery 之 **descending branch（降支）**，非 ascending branch（升支）。\n- **E（正確）**：可將 **lateral femoral cutaneous nerve** 與 **dorsal penile nerve** 吻合，重建感覺、促進日後性刺激反應。\n- 故正解 ABCE。","peropt":{"A":"◎ Pedicled ALT 不需顯微吻合、縮短手術時間，正確。","B":"◎ 大腿疤痕較前臂隱蔽，正確。","C":"◎ bladder exstrophy 病人受區血管改變使吻合困難，正確。","D":"ALT 由 lateral circumflex femoral artery 之'降支'供養，非升支，錯。","E":"◎ 可吻合 lateral femoral cutaneous nerve 與 dorsal penile nerve 重建感覺，正確。"},"cite":"Neligan 5e, Phalloplasty (pedicled ALT vs RFF)","conflict":""},{"id":"6059","sub":"T1","src":"NG","years":[112],"stem":"Which of the following statements regarding reconstruction of the chest is correct? (複選)","opts":{"A":"Pectoralis major is the workhorse for chest wall reconstruction. It will easily cover sternal and anterior chest wall defects as an advancement flap or as a turnover flap .","B":"Latissimus dorsi is often recruited for chest wall reconstruction especially when significant bulk and mobility is required. It can also be turned over and based upon the lumbar perforators. In this fashion, it can reach across the midline and back again.","C":"More commonly, Serratus anterior is used for intrathoracic and lateral chest wall defects coverage","D":"When rectus abdominus is taken with overlying fascia, there is a risk for resultant hernia, and at times, mesh reinforcement of the abdominal wall is necessary.","E":"The omentum can reach almost any chest wall defect due to its long pedicle length, which can be extended by dividing the arcades."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：胸部重建皮瓣特性之整合，複選，五者皆正確（ABCDE）。\n\n- **A（正確）**：Pectoralis major 為胸壁重建 workhorse，可作 advancement 或 turnover flap 覆蓋胸骨與前胸缺損。\n- **B（正確）**：Latissimus dorsi 於需大體積與活動度時常被徵召，並可基於 lumbar perforators 作 turnover，跨越中線再折返。\n- **C（正確）**：Serratus anterior 較常用於胸腔內（intrathoracic）與外側胸壁缺損之覆蓋/死腔填塞。\n- **D（正確）**：Rectus abdominis 連同前鞘取用時有腹壁疝氣風險，必要時須以 mesh 補強腹壁。\n- **E（正確）**：Omentum 因 pedicle 長（可藉分割 arcades 延長）幾可達任何胸壁缺損。\n- 故正解 ABCDE。","peropt":{"A":"◎ Pectoralis major 為 workhorse，可作 advancement/turnover 覆蓋胸骨與前胸，正確。","B":"◎ Latissimus dorsi 可基於 lumbar perforators turnover 跨中線，正確。","C":"◎ Serratus anterior 常用於胸腔內與外側胸壁，正確。","D":"◎ Rectus abdominis 取前鞘後有疝氣風險、必要時 mesh 補強，正確。","E":"◎ Omentum pedicle 長可延長、幾達任何胸壁缺損，正確。"},"cite":"Neligan 5e, Chest wall reconstruction (flap summary)","conflict":""},{"id":"6060","sub":"T2","src":"NG","years":[109,112],"stem":"Successful abdominal wall reconstruction requires complete fascial coaptation, inset of mesh under physiologic tension, and reduction of subcutaneous dead space with quilting sutures. Regarding of the operative consideration, which of the following is true ? (複選)","opts":{"A":"Mesh reinforcement of fascial closure is advised for hernia defects larger than 74 cm2, even when the myofascia can be closed without tension","B":"The location of mesh placement plays a critical role in optimiz
