ing outcomes. Bridging inlay repairs, in which the mesh edges are sutured to the medial fascial edges of the defect without midline re-approximation, give the best outcomes","C":"The technique of onlay repairs placing the mesh superficial to the anterior rectus sheath and external oblique aponeurosis may increase potential likelihood of seroma formation due to a large subcutaneous dissection is required to inset the mesh, which transects skin perforators.","D":"The hernia recurrence rates were highest for underlay placement compared to onlay or retrorectus","E":"The long-term cost-effectiveness of bioprosthetic meshes is better than synthetic materials in contaminated cases"},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：腹壁重建手術原則（同 6045 系列，選項組合微調）。複選，正解 ACE。\n\n- **A（正確）**：缺損 >74 cm² 即使可無張力縫合，仍建議 mesh reinforcement 降低復發。\n- **B（錯誤）**：Bridging inlay（僅橋接筋膜邊緣、中線未對合）結果最差，非最佳。\n- **C（正確）**：Onlay repair（mesh 置於 anterior rectus sheath 與 external oblique aponeurosis 淺層）因需大範圍皮下剝離、切斷 skin perforators，故 **seroma 發生率增加**——此敘述正確。\n- **D（錯誤）**：復發率並非以 underlay 最高（onlay/bridging 較高，retrorectus/underlay 較低）。\n- **E（依權威答案為正確）**：污染傷口採 bioprosthetic mesh。\n- 跨年提醒：本題與 NG109-B10-Q04 為「誘答選項事實置換」，概念相同但測到之事實不同，作答依各年原文。\n- 故正解 ACE。","peropt":{"A":"◎ 缺損 >74 cm² 即使無張力仍建議 mesh 補強，正確。","B":"Bridging inlay 中線未對合，結果最差非最佳，錯。","C":"◎ Onlay 因大範圍皮下剝離切斷穿通枝，seroma 增加，正確。","D":"復發率非 underlay 最高（onlay/bridging 較高），錯。","E":"◎ 依權威答案，污染傷口採 bioprosthetic mesh 列為正確。⚠答案疑義：生物性 mesh 之'長期成本效益優於合成材料'證據薄弱且具爭議，仍以 ans 為準。"},"cite":"Neligan 5e, Abdominal wall reconstruction; mesh placement outcomes","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG109-B10-Q04） ｜ ⚠ 同題歷屆重出：腹壁重建mesh operative consideration(複選)，題幹逐字相同，兩題答案均為ACE。6045(109)之選項C為『動物實驗ADM較polypropylene減少沾黏』；6060(112)之選項C改為『onlay置放因大範圍皮下剝離、切斷穿枝→易生seroma』，兩者皆為正確敘述，僅C項替換，A/B/D/E與答案完全一致(規則B)。"},{"id":"6061","sub":"T3","src":"NG","years":[112,113],"stem":"Regarding risk factors of pressure ulcers, which of the following is FALSE?","opts":{"A":"Pressure roughly double capillary closing pressure applied continuously for 2 hours results in irreversible ischemic damage.","B":"Shear is the force resisting relative motion between skin and contact surfaces and is the precursor to friction. Friction develops when shear adheres skin and superficial tissues to contact surfaces, stretching the superficial tissue tightly over deeper structures.","C":"Both excess moisture and excessively dry skin are risk factors for pressure ulceration","D":"While there is strong correlation between malnutrition and pressure sores, the causal link remains unclear.","E":"Immobility, decreased protective sensation, incontinence, spasticity all contribute to pressure ulcers in patients with neurological injury"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：壓瘡（pressure ulcer）危險因子與力學機轉。本題選「FALSE 者」。\n\n- **A（正確）**：壓力達 capillary closing pressure 約兩倍並持續 2 小時，即造成不可逆之缺血性損傷（irreversible ischemic damage）。\n- **B（錯誤，即答案）**：此句將 **friction 與 shear 定義對調**。正確為：**Friction（摩擦力）** 才是抵抗皮膚與接觸面相對運動之力，且為 shear 之前驅；當 friction 使皮膚與淺層組織附著於接觸面、深層仍移動時，便產生 **shear（剪力）** 使組織被拉伸於深部結構之上。B 的敘述前後倒置，故為錯誤。\n- **C（正確）**：過度潮濕與過度乾燥皆為壓瘡危險因子。\n- **D（正確）**：營養不良與壓瘡強相關，但因果機轉尚不完全明確。\n- **E（正確）**：神經損傷病人之 immobility、感覺喪失、失禁、痙攣皆助長壓瘡。\n- 故答案 B。","peropt":{"A":"壓力達 capillary closing pressure 約兩倍持續 2 小時致不可逆缺血，正確。","B":"◎ 將 friction 與 shear 定義對調（friction 才是抵抗相對運動並為 shear 前驅），錯誤即答案。","C":"過濕與過乾皆為壓瘡危險因子，正確。","D":"營養不良與壓瘡強相關但因果未明，正確。","E":"神經損傷者 immobility、感覺喪失、失禁、痙攣皆助長壓瘡，正確。"},"cite":"Neligan 5e, Pressure sore pathophysiology (friction vs shear)","conflict":""},{"id":"6062","sub":"T3","src":"NG","years":[112,113],"stem":"Regarding surgical management of pressure ulcers, which is TRUE","opts":{"A":"Debridement should be limited to preserve as much soft and underlying bone as possible","B":"Do not pad bone stumps and fill dead spaces as these increase reconstruction failure.","C":"Flaps should be designed as small as possible to preserve reconstructive options in case of recurrence and wound breakdown.","D":"Muscle flaps have the advantage of greater bulk, obliterating dead space, and act as a barrier for vertical spread of infection, and is recommended in cases with osteomyelitis","E":"Free flap is a common option for pressure ulcer reconstruction as it enables preservation of sensation."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：壓瘡（pressure ulcer）手術處理原則。本題選「TRUE 者」。\n\n- **A（錯誤）**：清創應「徹底」切除失活軟組織與感染/突出骨質，而非為保留而限縮。\n- **B（錯誤）**：應處理骨突（bone stump）並以組織填塞死腔（fill dead space）以降低復發，而非不填塞。\n- **C（錯誤）**：皮瓣應設計得「較大」，以保留日後復發/傷口裂開時再推進之重建彈性，而非愈小愈好。\n- **D（正確，即答案）**：肌肉皮瓣（muscle flap）具較大體積、可填塞死腔、並作為阻止感染垂直擴散之屏障，於合併 **osteomyelitis** 之病例特別建議使用。\n- **E（錯誤）**：Free flap 並非壓瘡重建之常見選項（局部肌皮瓣為主力）；且壓瘡病人多為感覺喪失（如脊損），保留感覺之論述不成立。\n- 故答案 D。","peropt":{"A":"清創應徹底切除失活組織與病骨，非為保留而限縮，錯。","B":"應處理骨突並填塞死腔以降低失敗，不填塞為錯。","C":"皮瓣應設計較大以保留日後重建彈性，'愈小愈好'錯。","D":"◎ 肌肉皮瓣體積大、填死腔、阻感染擴散，osteomyelitis 病例建議使用，正確。","E":"Free flap 非壓瘡重建常見選項且多數病人已無感覺，錯。"},"cite":"Neligan 5e, Surgical management of pressure ulcers (muscle flap for osteomyelitis)","conflict":""},{"id":"6063","sub":"T4","src":"NG","years":[112,113],"stem":"Which of the following is/are an appropriate treatment for the acquired vaginal defect? (複選)","opts":{"A":"Singapore flap for partial defects of the anterior or lateral wall","B":"Vertical or transverse pedicled rectus flap for partial posterior wall defects","C":"Pedicled rectus flap for circumferential upper two third defects.","D":"Pedicled jejunum or colon for circumferential upper two third defects","E":"Bilateral gracilis flap for complete / total vaginal defects"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：後天性陰道缺損（acquired vaginal defect）的重建演算法（reconstructive algorithm），核心在於「缺損型態（partial vs. circumferential）＋缺損位置（anterior/lateral vs. posterior）＋所需組織量（bulk）」三軸決策。此題五個選項皆為教科書所列合理術式，故全選。\n- **Partial defect（Type I）**：以皮瓣「補片式」修補即可。Anterior/lateral wall 缺損→**Singapore（pudendal thigh）fasciocutaneous flap**，薄、鄰近、可帶感覺（posterior labial n.）。Posterior wall 缺損→**vertical/transverse pedicled rectus myocutaneous flap**，可帶較多 bulk 填補直腸切除後死腔。\n- **Circumferential upper two-third defect**：需捲成管狀（tube）。可用 **pedicled rectus myocutaneous flap** 捲管，或用 **pedicled jejunum / colon（bowel segment）**，後者提供自然黏膜襯裡但需注意分泌物過多。\n- **Complete / total vaginal defect**：**bilateral gracilis myocutaneous flap** 為經典選擇，兩片對合成完整陰道管腔。\n- 記憶架構：薄且局部→Singapore；需 bulk 或填死腔→rectus；需黏膜襯裡且環狀→bowel；全缺損→bilateral gracilis。","peropt":{"A":"◎ Singapore（pudendal thigh）flap 用於前壁或側壁 partial defect，薄且帶感覺，正確。","B":"◎ Vertical 或 transverse pedicled rectus flap 用於後壁 partial defect，提供 bulk 填死腔，正確。","C":"◎ Pedicled rectus flap 可捲管重建環狀上三分之二缺損，正確。","D":"◎ Pedicled jejunum 或 colon 提供黏膜襯裡，適合環狀上三分之二缺損，正確。","E":"◎ Bilateral gracilis flap 為完全/全陰道缺損的經典重建，正確。"},"cite":"Neligan PS 5e, Vol.4 Trunk & Lower Extremity, Genitourinary/Vaginal reconstruction; Grabb & Smith 9e, Reconstruction of the perineum & vagina","conflict":""},{"id":"6064","sub":"T1","src":"NG","years":[113],"stem":"以下關於胸壁重建的說法哪一項是不正確的？","opts":{"A":"Latissimus dorsi 是胸壁重建的 workhorse。它可以輕鬆的以 advancement flap 或是 turnover flap 的方式 cover sternal and anterior chest wall defects","B":"Latissimus dorsi 經常被用來進行胸壁重建，特別是當需要顯著的體積(significant bulk)和活動性(mobility)時。It can also be turned over and based upon the lumbar perforators. In this fashion, it can reach across the midline and back again","C":"更常見的是，Serratus anterior 被用於重建 intrathoracic 和 lateral chest wall defect","D":"當 rectus abdominus is taken with overlying fascia，存在造成 hernia 的風險，因此有時需要 mesh reinforcement of the abdominal wall","E":"由於 pedicle 長度夠長，加上可以進一步延長 by dividing the arcades，因此 omentum 幾乎可以到達任何胸壁缺損"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 考點：胸壁重建各皮瓣的「所屬血管蒂與慣用手法」對號入座。此題要找『錯誤』敘述。關鍵陷阱在於將 **pectoralis major** 的特性張冠李戴到 **latissimus dorsi** 身上。\n- **選項A之錯誤**：能以 advancement flap 或 turnover flap（based on internal mammary perforators）輕鬆覆蓋『胸骨（sternal）及前胸壁缺損』的 workhorse，是 **pectoralis major**，而非 latissimus dorsi。Lat dorsi 雖是胸壁重建重要肌肉，但覆蓋胸骨正中缺損並非其 advancement/turnover 的典型描述。\n- **正確概念複習**：\n  - Latissimus dorsi：type V flap，dominant = thoracodorsal a.；可 turnover based on **lumbar（paraspinous）perforators** 過中線。\n  - Serratus anterior：填補 **intrathoracic** 及外側胸壁缺損。\n  - Rectus abdominis 帶筋膜取下有疝氣風險，必要時 mesh 補強。\n  - Omentum：based on gastroepiploic，可 divide arcades 延長，幾乎可達任何胸壁缺損。","peropt":{"A":"◎（此為錯誤敘述即答案）以 advancement/turnover 覆蓋胸骨與前胸壁的是 pectoralis major，非 latissimus dorsi，張冠李戴。","B":"Lat dorsi 提供顯著 bulk 與活動性，可基於 lumbar perforators turnover 過中線，正確。","C":"Serratus anterior 常用於 intrathoracic 及外側胸壁缺損，正確。","D":"Rectus abdominis 連筋膜取下有疝氣風險，需 mesh 補強，正確。","E":"Omentum 蒂長且可 divide arcades 延長，幾乎可達任何胸壁缺損，正確。"},"cite":"Neligan PS 5e, Vol.4 Chest wall reconstruction; Grabb & Smith 9e, Chest wall reconstruction","conflict":""},{"id":"6065","sub":"T2","src":"NG","years":[113],"stem":"成功的腹壁重建需要 complete fascial coaptation, inset of mesh under physiologic tension, and reduction of subcutaneous dead space with quilting sutures.因此關於 operative consideration，下列哪一項是不正確的？","opts":{"A":"Mesh reinforcement of fascial closure is advised for hernia defects larger than 74 cm2, even when the myofascia can be closed without tension","B":"The location of mesh placement plays a critical role in optimizing outcomes. Bridging inlay repairs, in which the mesh edges are sutured to the medial fascial edges of the defect without midline re-approximation, give the poorest outcomes","C":"The technique of onlay repairs placing the mesh superficial to the anterior rectus sheath and external oblique aponeurosis may increase potential likelihood of seroma formation due to a large subcutaneous dissection is required to inset the mesh, which transects skin perforators","D":"The hernia recurrence rates were highest for \"underlay\" placement compared to either \"onlay\" or \"retrorectus\"","E":"The long-term cost-effectiveness of bioprosthetic meshes is better than synthetic materials in contaminated cases"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：腹壁重建 mesh 放置層次（onlay / inlay-bridging / underlay-retrorectus）與其疝氣復發率、併發症的對應。要找『不正確』敘述。\n- **選項D之錯誤**：疝氣復發率『最高』者為 **bridging inlay（interposition/bridging repair）**，因無中線筋膜對合、mesh 邊緣直接縫於缺損邊；而 **underlay（sublay / retrorectus / posterior）** 放置因位於腹內壓之下、被組織夾持，復發率『最低』。故 D 稱『underlay 復發率最高』與事實相反。\n- **層次觀念**：\n  - Onlay（前鞘淺面）：需大範圍皮下剝離、切斷 skin perforators→**seroma 風險↑**。\n  - Inlay/bridging：無中線再對合→**outcome 最差、復發最高**。\n  - Retrorectus（Rives-Stoppa）/ underlay：力學最佳→復發最低。\n- 其餘：>約74 cm² 缺損即使無張力仍建議 mesh 補強；污染傷口中 bioprosthetic 之長期成本效益議題屬教科書陳述。","peropt":{"A":"缺損 >74 cm² 即使可無張力關閉仍建議 mesh 補強，符合教科書，正確。","B":"Bridging inlay（不做中線對合）outcome 最差，正確。","C":"Onlay 需大範圍皮下剝離切斷 perforators，seroma 風險增加，正確。","D":"◎（錯誤即答案）復發率最高者是 bridging/inlay，underlay（retrorectus）反而最低，敘述顛倒。","E":"污染個案中 bioprosthetic mesh 長期成本效益之陳述屬教科書觀點，非本題錯誤選項。"},"cite":"Neligan PS 5e, Vol.4 Abdominal wall reconstruction; Grabb & Smith 9e, Abdominal wall reconstruction / mesh placement","conflict":""},{"id":"6066","sub":"T4","src":"NG","years":[114],"stem":"關於 Vaginal defects的敘述，下列何者錯誤？","opts":{"A":"Type I 為 partial defect, Type II 為 circumferential defect","B":"常見Type IA defect為colorectal carcinoma 術後","C":"Type IB defect可使用pedicled rectus myocutaneous flap 重建","D":"相較gracilis flap, type IIA defect 使用pedicled rectus myocutaneous flap較不會受到vulvar and pelvic floor musculature 阻礙","E":"Type IIB defect 重建需注意 introitus (陰道口) distortion 和 dead space obliteration"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：陰道缺損 Cordeiro 分類（Type I = partial；Type II = circumferential，各再分 A=anterior/lateral wall 或上段、B=posterior wall 或全段）及其對應病因與術式。要找『錯誤』。\n- **選項B之錯誤**：常見與 colorectal（直腸）carcinoma 切除相關者為『後壁』缺損，即 **Type IB**（或 posterior wall 型），而非 Type IA。Type IA（anterior/lateral wall）多與泌尿婦科腫瘤切除相關。故 B 之病因配錯型別。\n- **正確配對**：\n  - Type IB（posterior wall）→ pedicled rectus myocutaneous flap（帶 bulk 填直腸切除死腔）。\n  - Type IIA（circumferential 上段）→ pedicled rectus 優於 gracilis，因 rectus 由『上方』引入，不受 vulvar/pelvic floor 肌肉阻擋。\n  - Type IIB → 注意 introitus 變形與死腔填補。","peropt":{"A":"Type I 為 partial、Type II 為 circumferential，分類正確。","B":"◎（錯誤即答案）colorectal carcinoma 術後常見的是後壁（Type IB）缺損，非 IA。","C":"Type IB 後壁缺損以 pedicled rectus myocutaneous flap 重建，正確。","D":"Type IIA 用 rectus 由上方引入，較 gracilis 不受外陰及骨盆底肌阻擋，正確。","E":"Type IIB 重建需注意陰道口變形與死腔填補，正確。"},"cite":"Neligan PS 5e, Vol.4 Vaginal reconstruction (Cordeiro classification); Grabb & Smith 9e, Vaginal reconstruction","conflict":""},{"id":"6067","sub":"T3","src":"NG","years":[110,114],"stem":"關於surgical treatment of pressure ulcer敘述，下列何者為非?","opts":{"A":"Bursa preservation","B":"radical ostectomy","C":"filling of dead space and resurfacing with soft-tissue flaps","D":"design of flaps to be larger than necessary","E":"placement of the suture line away from the area of pressure"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 考點：壓瘡（pressure ulcer）外科治療的基本原則。要找『非』屬於治療原則者。\n- **選項A之錯誤**：手術須『徹底切除 bursa（bursectomy）』而非『保留（preservation）』。慢性壓瘡底部的 pseudobursa 為纖維化、缺血、易感染的無效組織，必須連同疤痕一併 radical excision。\n- **標準壓瘡手術六原則**：①徹底清創與切除 bursa／疤痕；②radical ostectomy 去除感染／突出骨質至健康出血骨面；③填補死腔並以血管化軟組織皮瓣覆蓋（filling dead space & soft-tissue flap resurfacing）；④皮瓣設計『大於必要（larger than necessary）』以利未來再次旋轉／保留備案；⑤縫線置於『遠離受壓區』；⑥必要時保留可再利用之皮瓣範圍。","peropt":{"A":"◎（錯誤即答案）應為 bursectomy（切除 bursa），保留 bursa 違反壓瘡手術原則。","B":"Radical ostectomy 去除感染／突出骨質，屬標準原則，正確。","C":"填補死腔並以軟組織皮瓣覆蓋，屬標準原則，正確。","D":"皮瓣設計大於必要以保留未來重建選項，屬標準原則，正確。","E":"縫線置於遠離受壓區以降低復發，屬標準原則，正確。"},"cite":"Neligan PS 5e, Vol.4 Pressure sores; Grabb & Smith 9e, Pressure sores / surgical principles","conflict":"⚠ 同題歷屆重出：壓瘡手術治療原則「何者為非」，錯誤敘述均為『保留滑囊(bursa preservation)』——滑囊應徹底切除。6057(110,中文,答案B)、6067(114,英文,答案A)。其餘正確原則（切除潰瘍及疤痕、填補骨露/死腔、採用較大局部皮瓣、縫線遠離受壓處）內容雷同，屬中英版本＋文字微調(規則A/B)。"},{"id":"6068","sub":"T3","src":"NG","years":[114],"stem":"關於pressure sore敘述，下列何者為非?(複選)","opts":{"A":"Shear is the force resisting relative motion between the patient’s skin and other surfaces","B":"Both excess moisture and excessively dry skin are risk factors for pressure ulceration","C":"Bardon scale incorporates six subscales which assess sensory perception, skin moisture, activity, mobility, friction and shear, and nutrition","D":"Stage IV pressure ulcer describes full-thickness tissue loss with exposed bone, tendon, or muscle.","E":"Diagnosis of osteomyelitis must be established after surgical reconstruction of pressure sore"},"ans":"AE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：壓瘡的病生理（friction vs. shear）、風險因子、分期與骨髓炎診斷時機。複選，要找『錯誤』的兩項＝AE。\n- **A 之錯誤**：抵抗皮膚與表面『相對運動』的力是 **friction（摩擦力）**；**shear（剪力）** 指的是平行於皮膚、造成深層組織與皮膚間錯位變形（血管扭折缺血）的力。A 把 shear 定義成 friction，錯誤。\n- **E 之錯誤**：**osteomyelitis 的診斷必須在重建手術『之前（preoperatively）』確立**（藉 MRI／骨切片），以決定 ostectomy 範圍與是否需先控制感染；『重建後才診斷』時序顛倒，錯誤。\n- 正確者：B 潮濕與過乾皆為風險；C Braden scale 六項次量表（sensory perception, moisture, activity, mobility, friction & shear, nutrition）；D Stage IV 為全層缺損伴骨、肌腱或肌肉外露。","peropt":{"A":"◎（錯誤即答案）此定義是 friction（摩擦力），shear 是造成深層錯位變形的剪力，張冠李戴。","B":"過濕與過乾皮膚皆為壓瘡風險因子，正確。","C":"Braden scale 含六項次量表（含 friction & shear），正確（原題拼寫 Bardon 應為 Braden）。","D":"Stage IV 為全層組織缺損伴骨、肌腱或肌肉外露，正確。","E":"◎（錯誤即答案）骨髓炎診斷應於重建『前』確立，非重建後。"},"cite":"Neligan PS 5e, Vol.4 Pressure sores (Braden scale, staging); Grabb & Smith 9e, Pressure sores","conflict":""},{"id":"6069","sub":"T4","src":"NG","years":[114],"stem":"關於 Singapore flap for perineal reconstruction敘述，下列何者錯誤?","opts":{"A":"A fasciocutaneous flap harvested from the groin.","B":"Based on the posterior labial arteries, which originate from internal pudendal arteries.","C":"The harvest includes deep fascia and adductor epimysium to maintain dermal blood supply.","D":"Woods’ modification divides the skin at the base of the flap to improve rotation.","E":"In some populations, the flap may transpose hair-bearing skin."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：Singapore flap（pudendal thigh / Wee-Joseph flap）的解剖與改良。要找『錯誤』。\n- **選項D之錯誤**：**Woods' modification** 的重點是將皮瓣『島狀化（islanding）』並保留基部連續性以確保血流；並非『在皮瓣基部切斷皮膚（divides the skin at the base）』。若在基部切斷皮膚反而會傷及血供、不利轉位。故 D 敘述錯誤。\n- **正確解剖**：\n  - Fasciocutaneous flap，取自 groin/內側大腿的 pudendal thigh 區。\n  - 血供 = **posterior labial arteries**（源自 internal pudendal a.）。\n  - 取瓣含 deep fascia 與 adductor epimysium 以維持真皮血供。\n  - 於某些族群可能轉入帶毛皮膚（hair-bearing skin），為其缺點。","peropt":{"A":"取自 groin／內側大腿的 fasciocutaneous flap，正確。","B":"基於 posterior labial arteries（源自 internal pudendal a.），正確。","C":"取瓣含 deep fascia 與 adductor epimysium 以維持真皮血供，正確。","D":"◎（錯誤即答案）Woods' 改良為島狀化保留血供，非於基部切斷皮膚。","E":"某些族群可能轉入帶毛皮膚，為其缺點，正確。"},"cite":"Neligan PS 5e, Vol.4 Perineal/Vaginal reconstruction (Singapore/pudendal thigh flap); Grabb & Smith 9e, Perineal reconstruction","conflict":""},{"id":"6070","sub":"T2","src":"NG","years":[114],"stem":"Which of the following statements are incorrect regarding trunk surface anatomy and reconstructive muscle flaps? (Select all that apply) (複選)","opts":{"A":"The superficial inferior epigastric artery provides the main perforators for the DIEP flap.","B":"The trapezius muscle is classified as a type II flap with its dominant pedicle arising from the transverse cervical artery.","C":"The semilunar line marks the lateral border of the rectus abdominis muscle and the transition to the oblique muscle complex.","D":"The posterior rectus sheath extends inferiorly beyond the arcuate line and inserts into the pubic symphysis.","E":"The pectoralis major muscle receives dominant blood supply from the thoracodorsal artery and is classified as a type V flap."},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：軀幹表面解剖與 Mathes-Nahai 肌皮瓣分類。複選找『錯誤』＝ADE。\n- **A 之錯誤**：DIEP flap 的主要穿通枝來自 **deep inferior epigastric artery（DIEA）**，而非 superficial inferior epigastric a.（SIEA）；SIEA 是另一種獨立皮瓣（SIEA flap）的來源。\n- **D 之錯誤**：**posterior rectus sheath 在 arcuate line（弧狀線）以下即缺如**，不會延伸至 pubic symphysis；弧狀線以下僅剩 transversalis fascia。\n- **E 之錯誤**：Pectoralis major 的 dominant pedicle 是 **thoracoacromial a. 的 pectoral branch**（非 thoracodorsal a.，後者供應 lat dorsi）；其 Mathes-Nahai 分類確為 type V（一主蒂＋internal mammary 之 segmental 次要蒂）——故『type V』部分正確但『thoracodorsal』錯誤，整句仍屬不正確。\n- 正確者：B trapezius 為 type II，dominant = transverse cervical a.；C semilunar line（linea semilunaris）為腹直肌外側緣。","peropt":{"A":"◎（錯誤即答案）DIEP 主穿通枝來自 deep inferior epigastric a.，非 SIEA。","B":"Trapezius 為 type II，dominant pedicle 為 transverse cervical a.，正確。","C":"Semilunar line 為腹直肌外側緣、與斜肌複合體交界，正確。","D":"◎（錯誤即答案）posterior rectus sheath 於弧狀線以下即缺如，不延伸至恥骨聯合。","E":"◎（錯誤即答案）pec major dominant 為 thoracoacromial a.（非 thoracodorsal），血供敘述錯誤。"},"cite":"Neligan PS 5e, Vol.1 Flap classification / Vol.4 Trunk anatomy; Grabb & Smith 9e, Flaps (Mathes-Nahai classification)","conflict":""},{"id":"6071","sub":"T1","src":"NG","years":[114],"stem":"Which of the following statements regarding reconstruction of the chest is correct? (複選)","opts":{"A":"The omentum has only one dominant pedicle, the right gastroepiploic artery, but its pedicle length can be extended by dividing the arcades.","B":"When rectus abdominus is taken with overlying fascia, there is a risk for resultant hernia, and at times, mesh reinforcement of the abdominal wall is necessary.","C":"The best use of the serratus anterior is to fill intrathoracic defects.","D":"Latissimus dorsi is often recruited for chest wall reconstruction, especially when significant bulk and mobility are required. It can also be turned over and based upon the lumbar perforators. In this fashion, it can reach across the midline and back.","E":"Pectoralis major can be used as an advancement flap or as a turnover flap to cover nearly any sternal defect."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：胸壁重建各皮瓣之正確敘述。複選找『正確』＝BCDE。\n- **A 之錯誤**：Omentum 有『兩條』dominant pedicle——**right 及 left gastroepiploic arteries**，並非只有右側；蒂長可藉 divide arcades 延長。故 A 稱『only one dominant pedicle』錯誤，不選。\n- **正確者**：\n  - B：rectus 帶筋膜取下有疝氣風險，需 mesh 補強。\n  - C：serratus anterior 最佳用途為填補 intrathoracic 缺損。\n  - D：lat dorsi 提供 bulk／mobility，可基於 lumbar perforators turnover 過中線。\n  - E：pectoralis major 可作 advancement 或 turnover flap，幾乎覆蓋任何胸骨缺損（此即 6064-A 之正確歸屬）。","peropt":{"A":"Omentum 有兩條 dominant pedicle（左右 gastroepiploic），敘述『只有一條』錯誤，故不選。","B":"◎ Rectus 帶筋膜取下有疝氣風險、需 mesh 補強，正確。","C":"◎ Serratus anterior 最佳用於填補 intrathoracic 缺損，正確。","D":"◎ Lat dorsi 可基於 lumbar perforators turnover 過中線，正確。","E":"◎ Pectoralis major 可作 advancement/turnover 覆蓋幾乎任何胸骨缺損，正確。"},"cite":"Neligan PS 5e, Vol.4 Chest wall reconstruction; Grabb & Smith 9e, Chest wall reconstruction","conflict":""},{"id":"6072","sub":"T2","src":"NG","years":[114],"stem":"According to the text, which of the following mesh placement options is associated with rapid fibrovascular incorporation and avoids the need for a barrier coating?","opts":{"A":"Intraperitoneal onlay mesh (IPOM) using bilaminar coated mesh","B":"Microporous expanded polytetrafluoroethylene (e-PTFE) placed intraperitoneally","C":"Onlay placement of coated mesh beneath subcutaneous tissue","D":"Bridging repair using fascia lata autograft","E":"Retrorectus placement of standard uncoated polypropylene mesh"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：腹壁 mesh 材質與放置層次對『纖維血管長入（fibrovascular incorporation）』與『是否需 barrier coating』的影響。\n- **選項E正確**：**Retrorectus（sublay/extraperitoneal）放置標準未塗層 polypropylene mesh**——因位於腹膜外、與腹腔臟器隔絕，故『不需 barrier/anti-adhesion coating』，且大孔徑 polypropylene 促進『快速纖維血管長入』與良好整合。\n- **其餘為何不對**：\n  - A：IPOM 置於腹膜內，必須用 bilaminar coated（防沾黏面）mesh。\n  - B：微孔 e-PTFE 置於腹膜內雖防沾黏，但『纖維血管長入差、整合不良』。\n  - C：Onlay coated mesh 無需腹膜內防沾黏，但敘述強調 coating，與『避免 barrier coating』不符。\n  - D：Fascia lata autograft bridging 為自體移植 bridging，非本題所述 mesh incorporation 概念。","peropt":{"A":"IPOM 置於腹膜內須用 bilaminar coated mesh（需防沾黏面），與『避免 coating』相反，錯誤。","B":"腹膜內 e-PTFE 纖維血管長入差、整合不良，錯誤。","C":"Onlay 使用 coated mesh，與『避免 barrier coating』不符，錯誤。","D":"Fascia lata autograft bridging 屬自體 bridging，非快速長入之未塗層 mesh 概念，錯誤。","E":"◎ Retrorectus 放置未塗層 polypropylene，位腹膜外故不需防沾黏塗層且快速纖維血管長入，正確。"},"cite":"Neligan PS 5e, Vol.4 Abdominal wall reconstruction (mesh types/placement); Grabb & Smith 9e, Abdominal wall reconstruction","conflict":""},{"id":"6074","sub":"T4","src":"NG","years":[115],"stem":"T Which of the following correctly pairs the regional flap used for vaginal reconstruction with its primary vascular pedicle and sensory innervation?","opts":{"A":"Gracilis flap : Medial femoral circumflex artery ; Obturator nerve","B":"Singapore flap : Anterior labial arteries ; Obturator nerve","C":"Jejunum flap : Inferior mesenteric artery ; Pudendal nerve","D":"VRAM flap : Superficial inferior epigastric artery ; Femoral nerve","E":"Sigmoid colon flap : Superior mesenteric artery ; Obturator nerve"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：陰道重建常用皮瓣之『血管蒂＋感覺神經』配對。此題各選項多有解剖錯誤，須擇最接近權威答案者。\n- **權威答案為B（Singapore flap）**：Singapore（pudendal thigh）flap 之感覺可透過陰部區域神經維持。\n- **其餘明確錯誤**：\n  - A：Gracilis 蒂為 medial circumflex femoral a.、obturator n.——但 obturator 為『運動』神經，非題目要求之『sensory innervation』，故不符。\n  - C：Jejunum 應為 **superior mesenteric a.**（非 inferior）。\n  - D：VRAM 應為 **deep inferior epigastric a.**（非 superficial），神經非 femoral。\n  - E：Sigmoid colon 應為 **inferior mesenteric a.**（非 superior）。\n⚠答案疑義：嚴格解剖上 Singapore flap 血供為 **posterior labial arteries**（非 anterior labial）、感覺來自 pudendal n. 之 posterior labial branches（非 obturator n.），故B兩處配對亦有瑕疵；但相對其他選項血管系統性錯誤，本題仍以 ans=B 為準。","peropt":{"A":"Gracilis：MCFA＋obturator n. 解剖上正確，但 obturator 為運動神經非『sensory』，不符題意。","B":"◎ Singapore flap 為權威答案；惟正確血供應為 posterior labial a.、感覺為 pudendal（posterior labial）n.。","C":"Jejunum 血供應為 superior mesenteric a.，非 inferior mesenteric，錯誤。","D":"VRAM 血供應為 deep inferior epigastric a.，非 superficial；神經配對亦錯，錯誤。","E":"Sigmoid colon 血供應為 inferior mesenteric a.，非 superior mesenteric，錯誤。"},"cite":"Neligan PS 5e, Vol.4 Vaginal reconstruction (flap pedicles/innervation); Grabb & Smith 9e, Vaginal & perineal reconstruction","conflict":""},{"id":"6075","sub":"T1","src":"NG","years":[115],"stem":"When planning a soft-tissue reconstruction for a sternal defect, the pectoralis major muscle is frequently utilized due to its robust and versatile vascular anatomy. Which of the following describes the dominant vascular pedicle of the pectoralis major muscle flap?","opts":{"A":"Thoracodorsal arter","B":"Deep inferior epigastric artery","C":"Lateral thoracic artery","D":"Pectoral branch of the thoracoacromial artery","E":"Superior epigastric artery"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：胸骨缺損重建首選之 pectoralis major flap 的 dominant vascular pedicle。\n- **選項D正確**：Pectoralis major 的 dominant pedicle 為 **thoracoacromial a. 的 pectoral branch**（伴 lateral thoracic a. 為次要，及來自 internal mammary 的 segmental perforators）；Mathes-Nahai type V flap。以 thoracoacromial 為蒂可作旋轉皮瓣覆蓋胸骨；若 internal mammary 已被取用（如 CABG），則可反轉以 IMA perforators 為基。\n- **鑑別**：thoracodorsal→lat dorsi；deep inferior epigastric→rectus/DIEP；lateral thoracic→pec major 次要蒂；superior epigastric→pedicled TRAM/rectus 上蒂。","peropt":{"A":"Thoracodorsal a. 供應 latissimus dorsi，非 pec major dominant，錯誤。","B":"Deep inferior epigastric a. 供應 rectus/DIEP，非 pec major，錯誤。","C":"Lateral thoracic a. 僅為 pec major 之次要蒂，非 dominant，錯誤。","D":"◎ Pectoral branch of thoracoacromial a. 為 pec major 之 dominant pedicle，正確。","E":"Superior epigastric a. 供應腹直肌上蒂，非 pec major，錯誤。"},"cite":"Neligan PS 5e, Vol.4 Chest wall reconstruction (pectoralis major flap); Grabb & Smith 9e, Chest wall reconstruction","conflict":""},{"id":"6076","sub":"T4","src":"NG","years":[115],"stem":"A multidisciplinary oncology team consults you regarding reconstructive options for several patients with acquired vaginal defects following tumor ablations. Based on the established reconstructive algorithm, anatomical considerations, and complication profiles, which of the following statements is MOST ACCURATE?","opts":{"A":"Type IA defects (partial defects of the anterior or lateral wall) frequently require significant soft-tissue bulk to fill the pelvic dead space; therefore, the pedicled vertical rectus abdominis myocutaneous (VRAM) flap is the ideal reconstructive choice.","B":"When utilizing bilateral gracilis flaps for a Type IIB circumferential defect, the primary blood supply is based on the medial femoral circumflex artery, and pressure sensation of the neovagina can be maintained through perineal branches of the posterior cutaneous nerve of the thigh.","C":"In patients undergoing abdominoperineal resection (APR) for advanced rectal cancers, immediate reconstruction with a VRAM flap has a significantly higher incidence of major perineal wound dehiscence compared to primary closure alone, despite its utility in obliterating dead space.","D":"For an obese patient requiring reconstruction of a Type IIB (total circumferential) defect, thin bilateral Singapore (pudendal thigh) flaps may be a preferred alternative, because obesity is a significant risk factor for poor wound healing after rectus flap reconstruction.","E":"If a patient with a Type IIA defect is not a candidate for a rectus flap, a jejunum flap pedicled on a branch of the inferior mesenteric artery or a sigmoid colon flap pedicled on the superior mesenteric artery can be used, with the distinct advantage of avoiding excessive vaginal secretions."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：後天陰道缺損重建演算法之綜合臨床判斷，找『最正確』。\n- **選項D正確**：肥胖（obesity）是 rectus flap 重建後傷口癒合不良的重要風險因子；對『肥胖』患者行 Type IIB（全環狀）重建時，**薄的 bilateral Singapore（pudendal thigh）flaps** 可為較佳替代（避開厚重且併發症高的腹部供區）。\n- **其餘為何錯**：\n  - A：Type IA（前/側壁 partial）不需大量 bulk，首選薄的 Singapore flap，而非強調 bulk 的 VRAM。\n  - B：bilateral gracilis 雖 based on MCFA，但感覺／敘述混雜，非最正確。\n  - C：APR 後即刻 VRAM 重建相較 primary closure 其實『降低』會陰傷口併發症，非『顯著增加 dehiscence』。\n  - E：血管配錯（jejunum 應 SMA、sigmoid 應 IMA）；且 jejunum 分泌物『過多』為缺點而非優點。","peropt":{"A":"Type IA partial 缺損不需大量 bulk，首選薄 Singapore flap 而非 VRAM，錯誤。","B":"Gracilis based on MCFA 部分正確，但整體感覺／情境敘述非最佳，錯誤。","C":"APR 後 VRAM 反而降低會陰傷口併發症，非增加 dehiscence，錯誤。","D":"◎ 肥胖為 rectus flap 癒合不良風險，改以薄 bilateral Singapore flaps，最正確。","E":"jejunum 應為 SMA、sigmoid 應為 IMA，且腸道分泌物過多為缺點，錯誤。"},"cite":"Neligan PS 5e, Vol.4 Vaginal reconstruction algorithm; Grabb & Smith 9e, Perineal/Vaginal reconstruction","conflict":""},{"id":"6077","sub":"T2","src":"NG","years":[115],"stem":"The development of an incisional hernia is closely related to the failure of biologic healing and high tension at the suture/tissue interface (STI) leading to suture pull-through. According to the text, which of the following are recognized clinical risk factors for incisional hernia formation? (Select all that apply)","opts":{"A":"Wound contamination","B":"Elevated Body Mass Index (BMI)","C":"Surgical site infection (SSI)","D":"Preoperative chemotherapy","E":"Decreasing age (Youth)"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 考點：切口疝氣（incisional hernia）之臨床風險因子。複選＝ABCD。核心機轉：生物性癒合失敗＋縫線-組織界面（STI）高張力→縫線切割拉出（suture pull-through）。\n- **正確風險因子**：\n  - A 傷口污染（wound contamination）\n  - B 高 BMI（腹內壓↑、癒合差）\n  - C 手術部位感染（SSI）\n  - D 術前化療（preoperative chemotherapy，影響癒合）\n- **E 之錯誤**：風險因子應為『**increasing age（高齡）**』（膠原品質下降、癒合力減弱），而非『年輕（decreasing age/youth）』，故 E 不選。","peropt":{"A":"◎ 傷口污染為切口疝氣風險因子，正確。","B":"◎ 高 BMI（腹內壓增加、癒合不良）為風險因子，正確。","C":"◎ 手術部位感染（SSI）為風險因子，正確。","D":"◎ 術前化療影響組織癒合，為風險因子，正確。","E":"應為高齡（increasing age）才是風險，年輕非風險因子，故不選。"},"cite":"Neligan PS 5e, Vol.4 Abdominal wall / incisional hernia risk factors; Grabb & Smith 9e, Abdominal wall reconstruction","conflict":""},{"id":"6078","sub":"T3","src":"NG","years":[115],"stem":"Which of the following are considered core principles for optimizing soft-tissue reconstruction in the posterior trunk? (Select all that apply)","opts":{"A":"Debridement of all devitalized tissues","B":"Closure under high tension to eliminate dead space","C":"Recruitment of well-vascularized tissue outside the zone of injury","D":"Obliteration of all empty space","E":"Routine use of free tissue transfer as the first-line option"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯 考點：後軀幹（posterior trunk）軟組織重建之核心原則。複選＝ACD。\n- **正確原則**：\n  - A 徹底清創所有失活組織（debridement of all devitalized tissues）。\n  - C 由『損傷區以外（outside the zone of injury）』引入良好血管化組織。\n  - D 完全填補死腔（obliteration of all empty/dead space）。\n- **錯誤者**：\n  - B『高張力關閉以消除死腔』錯誤——應為『**無張力（tension-free）**』關閉；高張力導致裂開／缺血。\n  - E『常規以游離皮瓣為第一線』錯誤——後軀幹首選『**局部／鄰近肌肉皮瓣（local muscle flaps）**』（如 paraspinous、trapezius、lat dorsi），游離皮瓣僅為備案。","peropt":{"A":"◎ 徹底清創所有失活組織，正確核心原則。","B":"應為無張力關閉，『高張力』錯誤，不選。","C":"◎ 由損傷區外引入良好血管化組織，正確。","D":"◎ 完全填補死腔，正確。","E":"後軀幹首選局部肌肉皮瓣，游離皮瓣非常規第一線，不選。"},"cite":"Neligan PS 5e, Vol.4 Reconstruction of the back / posterior trunk; Grabb & Smith 9e, Back reconstruction","conflict":""},{"id":"6079","sub":"T3","src":"NG","years":[115],"stem":"Which of the following are recommended when managing deep midline posterior trunk wounds with spinal exposure? (Select all that apply)","opts":{"A":"single-layer fasciocutaneous flap is the preferred definitive closure.","B":"Utilizing a \"vest-over-pants\" overlapping closure technique.","C":"Bilateral paraspinous muscle flaps are an excellent choice for the deep layer.","D":"Two full layers of vascularized muscle or fascia are required.","E":"The superficial layer is typically reconstructed with an omental free flap."},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯 考點：中線深部後軀幹傷口併脊椎/硬脊膜暴露（spinal exposure）之重建策略。複選＝BCD。\n- **正確原則（雙層血管化覆蓋）**：\n  - D 須提供『**兩層完整血管化肌肉或筋膜（two full layers）**』以保護脊椎、硬膜與器械。\n  - C 深層以『**bilateral paraspinous（paravertebral）muscle flaps**』對合為絕佳選擇。\n  - B 採『**vest-over-pants（重疊交錯）**』縫合技術強化關閉、消除死腔。\n- **錯誤者**：\n  - A『單層 fasciocutaneous flap 為首選 definitive closure』錯誤——單層不足以保護暴露脊椎，需雙層。\n  - E『淺層以 omental free flap 重建』錯誤——並非常規；淺層通常以局部肌肉皮瓣／筋膜皮瓣關閉。","peropt":{"A":"單層 fasciocutaneous flap 不足以保護暴露脊椎，非首選，錯誤。","B":"◎ 採 vest-over-pants 重疊交錯縫合以強化關閉，正確。","C":"◎ 深層以 bilateral paraspinous muscle flaps 對合為佳，正確。","D":"◎ 須提供兩層完整血管化肌肉或筋膜覆蓋，正確。","E":"淺層常規非以 omental free flap 重建，錯誤。"},"cite":"Neligan PS 5e, Vol.4 Back reconstruction (spinal exposure, paraspinous flaps); Grabb & Smith 9e, Back reconstruction","conflict":""},{"id":"6080","sub":"T3","src":"NG","years":[115],"stem":"Which of the following statements regarding pressure relief for prevention of pressure ulcers are correct? (複選)","opts":{"A":"Constant low-pressure devices reduce pressure by distributing body weight over a larger surface area.","B":"Alternating-pressure devices prevent prolonged pressure over a single anatomic point by varying the pressure beneath the patient.","C":"Low air loss beds are generally recommended for routine use in all high-risk patients because they are clearly superior to advanced static mattresses.","D":"Elevating the head of the bed to 45° or higher may reduce the ability of pressure-relieving mattresses to disperse interface pressure.","E":"Wheelchair pressure release maneuvers should be reinforced and performed at least every 15 minutes while seated."},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：壓瘡預防之減壓（pressure relief）策略。複選＝ABDE。\n- **正確者**：\n  - A 恆定低壓裝置（constant low-pressure）藉『增大接觸面積、分散體重』降壓。\n  - B 交替壓力裝置（alternating-pressure）藉『週期性改變壓力』避免單點長時間受壓。\n  - D 床頭抬高 ≥45° 會『增加界面壓力與剪力』，反而『削弱』減壓床墊分散壓力的能力。\n  - E 坐輪椅者應『每 15 分鐘』做一次 pressure release（撐起）動作。\n- **C 之錯誤**：low air loss beds『對所有高風險者常規使用且明顯優於先進靜態床墊』屬過度陳述——實證上並未證實其對所有患者一致優越，故 C 不選。","peropt":{"A":"◎ 恆定低壓裝置藉分散體重於較大面積降壓，正確。","B":"◎ 交替壓力裝置藉週期性變壓避免單點長時間受壓，正確。","C":"low air loss beds 常規用於所有高風險者且『明顯較優』屬過度陳述，證據不足，不選。","D":"◎ 床頭抬高 ≥45° 會削弱減壓床墊分散壓力能力，正確。","E":"◎ 坐輪椅者應至少每 15 分鐘做一次撐起減壓，正確。"},"cite":"Neligan PS 5e, Vol.4 Pressure sores (prevention/support surfaces); Grabb & Smith 9e, Pressure sores","conflict":""},{"id":"6081","sub":"T3","src":"NG","years":[115],"stem":"A 52-year-old paraplegic man presents with recurrent pressure ulcers involving the right ischium and right trochanter. He previously underwent a right gluteus maximus myocutaneous rotation flap for a sacral ulcer. MRI demonstrates osteomyelitis of the right ischial tuberosity but no hip joint or proximal femoral involvement. After methylene blue staining, complete bursectomy, radical excision of scarred tissue, and partial ostectomy to healthy bleeding bone are performed. The surgeon wants to reconstruct both defects while preserving as many future reconstructive options as possible. Which of the following is the most appropriate management strategy?","opts":{"A":"Close the ischial ulcer primarily after ostectomy and reconstruct the trochanteric ulcer with a split-thickness skin graft, because aggressive flap use should be avoided in recurrent pressure sore patients.","B":"Perform total bilateral ischiectomy and cover both ulcers with bilateral gluteus maximus advancement flaps, because total ischiectomy has the lowest recurrence rate and bilateral reconstruction prevents contralateral recurrence.","C":"Reconstruct the ischial ulcer with a posterior thigh V–Y hamstring advancement flap and reconstruct the trochanteric ulcer with a tensor fasciae latae or vastus lateralis flap, while avoiding further violation of previously used gluteal territories.","D":"Reconstruct the ischial ulcer with an inferior gluteal artery perforator flap and the trochanteric ulcer with an extended tensor fasciae latae flap, because the inferior gluteal artery perforators are always preserved after prior gluteus maximus rotation flap surgery.","E":"Perform a Girdlestone procedure with femoral head and neck resection, followed by vastus lateralis muscle flap obliteration of dead space, because osteomyelitis associated with any pelvic pressure ulcer requires proximal femoral resection."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：截癱患者反覆性 ischial＋trochanteric 壓瘡，前次已用 gluteus maximus 皮瓣，重建須『保留未來重建選項』。答案C。\n- **選項C正確策略**：\n  - Ischial ulcer → **posterior thigh V–Y hamstring advancement flap**（大而可靠、可再前推、適合坐骨區）。\n  - Trochanteric ulcer → **tensor fasciae latae（TFL）或 vastus lateralis flap**。\n  - 關鍵：『避免再度侵犯先前已用之 gluteal 供區』，保留備案——符合壓瘡反覆復發需長期規劃之現代原則。\n- **其餘為何錯**：\n  - A：反覆壓瘡並非禁用皮瓣；坐骨區單純縫合／植皮復發率極高。\n  - B：total ischiectomy（尤其雙   let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
