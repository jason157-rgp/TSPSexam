sceptible than smaller ones to graft volume loss.","E":"Preserved cartilage has the advantage of a more abundant supply without the risk of infection that is associated with the use of fresh cartilage."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：軟骨異體移植（Cartilage allograft）之免疫與生物學（何者為錯）\n• 【免疫原性】軟骨細胞（chondrocytes）表面表現 HLA 抗原、具免疫原性；但被 matrix 包覆，故完整軟骨基質（matrix）僅弱抗原性 → allograft 相對耐受。\n• 【破壞基質加速吸收】手術劃刻（scoring）或切碎（dicing）暴露同種異體細胞 → 加速免疫性吸收（reabsorption）。\n• 【臨床應用】常經放射線預處理（irradiation pretreatment）之異體軟骨用於顏面骨架體積擴增。\n• 【保存軟骨優點】供應充足、避免新鮮軟骨之感染風險。\n• 【本題答案 D】『較大之移植物比較小者更易體積流失』敘述錯誤——實際上較小的移植物（表面積/體積比大、暴露多）較易吸收流失；較大者相對較不易 → 本敘述相反，為錯（選 D）。","peropt":{"A":"正確。chondrocytes 具免疫原性、matrix 弱抗原性。","B":"正確。scoring/dicing 暴露細胞加速吸收。","C":"正確。放射線預處理軟骨用於顏面體積擴增。","D":"◎ 正解（不正確）。應為較小移植物較易體積流失；此敘述相反。","E":"正確。保存軟骨供應充足且降低感染風險。"},"cite":"Neligan 5e / Grabb & Smith 9e Transplant immunology — cartilage allograft","conflict":""},{"id":"9070","sub":"B3","src":"NG","years":[104],"stem":"During the process of expansion, multiple sites over the implant has revealed a significant increase except for: (複選)","opts":{"A":"Skin area","B":"Dermal thickness","C":"Hair follicles","D":"Muscle","E":"Underlying bone"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：組織擴張（Tissue expansion）過程中組織之變化（何者未顯著增加，複選）\n• 【顯著增加者】表皮（Epidermis）增厚、表皮細胞有絲分裂增加；皮膚表面積（skin area）增加（機械潛變 mechanical creep＋生物潛變 biologic creep）。\n• 【減少/變薄者】真皮（Dermis）變薄、皮下脂肪萎縮、被覆之肌肉萎縮變薄、下方骨骼受壓吸收/凹陷（bone resorption/erosion）。\n• 【毛囊】毛囊數目不增加（僅被伸展、密度下降）。\n• 【本題答案 BCDE】除 A『Skin area（皮膚面積）』顯著增加外，B 真皮厚度、C 毛囊、D 肌肉、E 下方骨頭皆未增加（反而變薄/減少/受壓）。","peropt":{"A":"正確（唯一顯著增加者）。皮膚表面積增加，故非答案。","B":"◎ 正解（未增加）。真皮厚度反而變薄。","C":"◎ 正解（未增加）。毛囊數不增加，密度下降。","D":"◎ 正解（未增加）。被覆肌肉萎縮變薄。","E":"◎ 正解（未增加）。下方骨頭受壓吸收/凹陷。"},"cite":"Neligan 5e / Grabb & Smith 9e Tissue expansion physiology","conflict":""},{"id":"9072","sub":"B10","src":"NG","years":[105],"stem":"下列哪種病患較適宜接受整形手術？","opts":{"A":"明確知道自己想要進行整形的部位","B":"無法仔細考量萬一發生不如預期的手術結果","C":"對於手術有不切實際的期待，且經由解說仍無法改變","D":"罹患精神疾患且未接受治療","E":"病患抱怨周遭人士反對自己進行手術"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形手術病人選擇（patient selection）與心理適應\n• 【適合之病人特徵】\n  - 對想改善之部位有明確、具體且合理之認知（如 A：明確知道想整形部位）。\n  - 動機出於自我、期待實際（realistic expectation）、能理解手術限制與可能結果。\n  - 心理穩定、無未治療之精神疾患。\n• 【警訊/不適合（red flags）】\n  - 對不如預期之結果無法妥善面對（B）。\n  - 不切實際之期待，經解說仍無法調整（C）— 需警惕 BDD（body dysmorphic disorder）。\n  - 罹患精神疾患且未接受治療（D）。\n  - 主要因周遭人反對或為取悅他人而手術（E，外在動機）。\n• 【本題答案 A】明確知道欲改善部位者較適宜接受手術。","peropt":{"A":"◎ 正解。明確知道想整形部位者較適合。","B":"不適合。無法面對不如預期結果為警訊。","C":"不適合。不切實際期待且無法調整（警惕 BDD）。","D":"不適合。未治療之精神疾患。","E":"不適合/警訊。動機受他人影響、外在動機。"},"cite":"Neligan 5e Aesthetic — patient selection / psychology; 整外倫理章","conflict":""},{"id":"9073","sub":"B10","src":"NG","years":[105],"stem":"下列對於整型手術的廣告行為何者違反倫理道德原則？","opts":{"A":"整形手術是可以進行廣告行為的","B":"使用無誇大渲染且具有品味的廣告","C":"不使用買一送一等促銷手段","D":"使用完美手術前後對照圖像並宣稱這是任何人都能獲得的典型結果","E":"不使用數位修圖軟體進行如去斑美白等相片美化"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形手術廣告之醫學倫理（何者違反倫理）\n• 【符合倫理之廣告】\n  - 整形手術可進行廣告（A）。\n  - 使用不誇大渲染、具品味之內容（B）。\n  - 避免買一送一等促銷/招攬手段（C）。\n  - 不以數位修圖美化（去斑美白）誤導（E）。\n• 【違反倫理者 D】使用『完美術前後對照圖』並宣稱『這是任何人都能獲得的典型結果』——屬誇大、誤導性陳述（misleading/guaranteeing results），暗示保證療效、忽略個體差異，違反誠實與不誤導原則 → 本題答案 D。","peropt":{"A":"符合倫理。整形手術可廣告。","B":"符合倫理。不誇大、具品味之廣告。","C":"符合倫理。不用買一送一促銷。","D":"◎ 正解（違反倫理）。宣稱完美對照為人人可得之典型結果，屬誤導/保證療效。","E":"符合倫理。不以修圖美化誤導。"},"cite":"Neligan 5e / 醫學倫理 — advertising in aesthetic surgery","conflict":""},{"id":"9075","sub":"B11","src":"NG","years":[105],"stem":"請依實證等級(evidence-based level)由高至低排列下述研究類型：(1)expert opinion (2)case-control study (3)randomized controlled trial (4)case series (5)prospective cohort study","opts":{"A":"35421","B":"35241","C":"32541","D":"53241","E":"54321"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：實證醫學證據等級(Level of Evidence, EBM hierarchy)。\n- 由高至低正確順序：RCT(隨機對照試驗)＞Prospective cohort(前瞻性世代)＞Case-control(病例對照)＞Case series(病例系列)＞Expert opinion(專家意見)。\n- 對應題號：3(RCT)→5(prospective cohort)→2(case-control)→4(case series)→1(expert opinion)＝『35241』。\n- 記憶架構(Oxford/實證金字塔)：Level I=RCT/systematic review of RCT；Level II=cohort；Level III=case-control；Level IV=case series；Level V=expert opinion/bench research。\n- 關鍵區辨：Cohort(依exposure分組、往前追蹤outcome)證據力優於case-control(依outcome回溯exposure，易受recall bias、selection bias影響)。","peropt":{"A":"35421，順序將case series(4)置於case-control(2)之前，等級顛倒，錯。","B":"◎ 35241：RCT＞prospective cohort＞case-control＞case series＞expert opinion，完全符合EBM金字塔。","C":"32541，將case-control(2)置於cohort(5)之上，錯。","D":"53241，將cohort(5)置於RCT(3)之上，RCT才是最高等級，錯。","E":"54321，反向排列(由低到高)，錯。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Evidence-based medicine/Levels of evidence；Oxford Centre for EBM Levels of Evidence。","conflict":""},{"id":"9076","sub":"B8","src":"NG","years":[105],"stem":"下列何者並非使用adenovirus進行基因療法(gene delivery technique)的優點？","opts":{"A":"幾乎對各種細胞皆有效，細胞分裂中或非細胞分裂狀態皆可以","B":"良好的轉染(transfection)效率","C":"不易引發宿主免疫反應","D":"不會嵌入宿主的染色體","E":"可攜帶較大的基因"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Adenovirus(腺病毒)基因治療載體之優缺點。\n【Adenovirus優點】\n- 對分裂中(dividing)與非分裂(non-dividing)細胞皆可感染，宿主範圍廣。\n- 轉染(transfection)效率高。\n- 為episomal(游離型)，不嵌入宿主染色體→無insertional mutagenesis風險。\n- 可攜帶較大之基因片段。\n【Adenovirus最大缺點】\n- 具強烈免疫原性(highly immunogenic)，會引發顯著宿主免疫反應與發炎→表現短暫、重複給藥效果差(如Jesse Gelsinger案例致死)。\n- 故C『不易引發宿主免疫反應』並非優點，反為其最大限制→為正解。\n【對照Retrovirus/AAV】Retrovirus會嵌入染色體、僅感染分裂細胞；AAV免疫原性低但攜帶量小。","peropt":{"A":"幾乎對各種細胞有效、分裂或非分裂皆可——此為adenovirus優點，非答案。","B":"良好轉染效率——為adenovirus優點，非答案。","C":"◎ 『不易引發宿主免疫反應』——錯誤，adenovirus免疫原性強、易誘發強烈免疫發炎反應，此非其優點，故為正解。","D":"不會嵌入宿主染色體(episomal)——為adenovirus優點(避免insertional mutagenesis)，非答案。","E":"可攜帶較大基因——為adenovirus優點，非答案。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Tissue engineering/Gene therapy vectors；Grabb & Smith 9e – Molecular biology/Gene therapy。","conflict":""},{"id":"9077","sub":"B11","src":"NG","years":[105,111,112,114],"stem":"下列何者於1597年發表著作詳細說明及圖示運用手臂皮瓣進行鼻部重建的器械、適應症、步驟、包紮及結果等細節，因而被認為是整形外科學的先驅？","opts":{"A":"Leonardo Fioravanti","B":"Gaspare Tagliacozzi","C":"Joseph Constantine Carpue","D":"Harold Gillies","E":"Carl Ferdinand von Gräfe"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形外科醫學史——Gaspare Tagliacozzi。\n- 1597年出版《De Curtorum Chirurgia per Insitionem》，詳述以上臂(brachial/arm flap，即Italian method)行鼻部重建之器械、適應症、步驟、包紮與結果，被譽為整形外科學先驅、『重建外科之父』。\n- 此為分段延遲上臂皮瓣(delayed pedicled arm flap)之經典，與印度式前額皮瓣(Indian forehead flap)並列鼻再造兩大古典法。\n【他人對照】\n- Carpue(1816)於英國復興印度式前額皮瓣。\n- von Gräfe(1818)著《Rhinoplastik》。\n- Gillies、McIndoe為一戰/二戰現代整形外科奠基者。","peropt":{"A":"Leonardo Fioravanti——16世紀外科醫師，非1597鼻再造著作之作者，錯。","B":"◎ Gaspare Tagliacozzi——1597年著作圖示上臂皮瓣鼻再造，整外先驅，正解。","C":"Joseph Constantine Carpue——1816年復興印度式前額皮瓣，時代不符，錯。","D":"Harold Gillies——一次大戰現代整外之父(20世紀)，錯。","E":"Carl Ferdinand von Gräfe——1818年《Rhinoplastik》，錯。"},"cite":"Neligan Plastic Surgery 5e – History of plastic surgery；Grabb & Smith 9e Ch.1 History。","conflict":""},{"id":"9078","sub":"B11","src":"NG","years":[105],"stem":"下列哪些是拍攝臉部相片的基本原則？(複選)","opts":{"A":"拍攝包含anterior-posterior view, right and left oblique view, right and left lateral view共五種角度的相片","B":"頭部上方留下約10%相片高度的背景","C":"相片下緣約在下巴的位置","D":"除非另有考量，臉部肌肉應呈放鬆狀態","E":"在oblique view鼻尖的位置應稍微超過或恰好位於顴骨隆凸(malar eminence)外緣"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：標準臉部攝影(facial photography)基本原則。(複選，選正確者)\n- 標準五視角：AP(正面)、右/左斜位(oblique)、右/左側位(lateral)共5張(A正確)。\n- 構圖：頭頂上方約留10%相片高度作背景(B正確)。\n- 臉部肌肉應放鬆(repose)，除非特別要拍動態(如微笑、抬眉)(D正確)。\n- Oblique view：鼻尖應恰好或稍微超過顴突(malar eminence)外緣，為判斷投影之標準(E正確)。\n- C錯誤：相片下緣不應僅止於下巴，構圖應包含頸部/至胸鎖上區，下緣『約在下巴』會截去頸部資訊、失去比例參考，故C為不正確敘述而未入選。\n【標準化重點】固定相機、光圈、快門、白平衡、背景、距離與病人擺位，確保術前後可比性。","peropt":{"A":"◎ 五種標準視角(AP、雙斜、雙側位)——正確。","B":"◎ 頭頂上方留約10%背景——正確構圖原則。","C":"相片下緣約在下巴——錯誤，應含頸部/更下緣，故未選為正解之一。","D":"◎ 臉部肌肉放鬆(repose)——正確。","E":"◎ Oblique view鼻尖稍超過或恰位於malar eminence外緣——正確標準。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Photography in plastic surgery。","conflict":""},{"id":"9079","sub":"B10","src":"NG","years":[105],"stem":"下列關於整形手術病人安全的敘述何者正確？(複選)","opts":{"A":"隆乳手術後發生呼吸窘迫之情形可能是氣胸所造成","B":"臉部手術時高血壓(收縮壓大於150 mmHg)與術後血腫形成並無明顯相關","C":"有睡眠呼吸中止症(sleep apnea)的病患不適宜使用深度鎮靜合併局部麻醉的方式進行手術","D":"American Society of Anesthesiologists (ASA) classification是常見的評估手術風險的分類法，而ASA V(第五級)指的是病患有嚴重全身性疾病且帶有危及生命之風險","E":"肥胖(BMI>30)、靜脈疾患病史、糖尿病、術後無下床活動及抽菸史等皆會提高發生深部靜脈栓塞(deep venous thrombosis)的風險"},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯考點：整形手術病人安全(patient safety)。(複選，選正確者)\n- A正確：隆乳(尤其subpectoral剝離或肋間局麻)後呼吸窘迫，須警覺氣胸(pneumothorax)。\n- C正確：睡眠呼吸中止症(OSA)病患不宜深度鎮靜合併局麻(呼吸道阻塞、缺氧、無保護呼吸道之風險高)。\n- E正確：DVT危險因子=肥胖BMI>30、靜脈疾患史、糖尿病、術後不下床(immobilization)、抽菸(對應Caprini score)。\n- B錯誤：臉部手術收縮壓>150 mmHg之高血壓與術後血腫(hematoma)『明顯相關』，控制血壓可降低血腫，故B敘述錯誤未入選。\n- D錯誤：ASA V指『瀕死病患，不論手術與否24小時內預期死亡』；『嚴重全身性疾病且持續威脅生命』為ASA IV，故D定義錯誤未入選。","peropt":{"A":"◎ 隆乳後呼吸窘迫可能為氣胸——正確。","B":"臉部手術高血壓與術後血腫『無關』——錯誤，兩者明顯相關，未選。","C":"◎ OSA病患不宜深度鎮靜＋局麻——正確。","D":"ASA V=嚴重全身病+危及生命——錯誤，此為ASA IV，ASA V為瀕死病患，未選。","E":"◎ 肥胖、靜脈疾患、糖尿病、不下床、抽菸提高DVT風險——正確。"},"cite":"Neligan Plastic Surgery 5e – Patient safety in plastic surgery；ASA Physical Status Classification。","conflict":""},{"id":"9080","sub":"B7","src":"NG","years":[105],"stem":"下列關於局部麻醉相關用藥的敘述何者正確？(複選)","opts":{"A":"Lidocaine的標準建議最大劑量為20 mg/kg body weight","B":"於大量稀釋的條件下使用，lidocaine的最大劑量可提高到35 mg/kg body weight","C":"一般lidocaine的pH值約為6.4，會造成注射時的疼痛，使用sodium bicarbonate調整到pH 7.4會改善這種情形","D":"Lorazepam可在手術前一天及當天給予以用來減輕病患焦慮之情形","E":"Epinephrine是常額外添加的血管收縮劑，它會造成周邊神經的缺血因而阻斷神經傳導，一樣有麻醉的效果"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：局部麻醉用藥(local anesthetics)藥理與安全。(複選，選正確者)\n- Lidocaine最大安全劑量：純lidocaine約4.5 mg/kg，加epinephrine約7 mg/kg。\n- A錯誤：『標準最大劑量20 mg/kg』過高，非標準值，故未選。\n- B正確：於tumescent(大量稀釋+epinephrine)技術下，lidocaine最大劑量可提高至約35–55 mg/kg(藥物釋放緩慢、血中濃度峰值延後)。\n- C正確：Lidocaine溶液pH約6.4(酸性)造成注射刺痛，加sodium bicarbonate緩衝至接近pH 7.4可減痛、加速起效。\n- D正確：Lorazepam(benzodiazepine)可術前一日及當日給予以緩解焦慮。\n- E正確：Epinephrine為血管收縮劑，除延長麻醉、減少出血外，其造成周邊缺血亦具阻斷神經傳導之輔助麻醉作用。","peropt":{"A":"Lidocaine標準最大劑量20 mg/kg——錯誤(純藥約4.5、加腎上腺素約7 mg/kg)，未選。","B":"◎ 大量稀釋(tumescent)下lidocaine可提高至約35 mg/kg——正確。","C":"◎ Lidocaine pH約6.4致痛，加碳酸氫鈉緩衝至pH 7.4減痛——正確。","D":"◎ Lorazepam術前一日及當日給予減焦慮——正確。","E":"◎ Epinephrine血管收縮致周邊缺血、輔助阻斷神經傳導——正確。"},"cite":"Neligan Plastic Surgery 5e – Local anesthetics；Grabb & Smith 9e – Anesthesia/Tumescent technique。","conflict":""},{"id":"9081","sub":"B2","src":"NG","years":[105],"stem":"The Vancouver Scar Scale的評估項目,下列何者為非?","opts":{"A":"Pigmentation","B":"Vascularity","C":"Pliability","D":"Hight","E":"Width"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Vancouver Scar Scale(VSS)評估項目。\n- VSS四大評估面向：\n  1. Pigmentation(色素沉著)\n  2. Vascularity(血管性/紅度)\n  3. Pliability(柔軟度/可塑性)\n  4. Height/Thickness(高度/厚度)\n- E『Width(寬度)』非VSS評估項目→為正解(問何者為非)。\n【延伸】VSS為最常用之疤痕評估工具；POSAS(Patient and Observer Scar Assessment Scale)另納入病人主觀感受(疼痛、癢)，更全面。","peropt":{"A":"Pigmentation——為VSS項目，非答案。","B":"Vascularity——為VSS項目，非答案。","C":"Pliability——為VSS項目，非答案。","D":"Height(高度)——為VSS項目，非答案。","E":"◎ Width(寬度)——非VSS評估項目，故為正解。"},"cite":"Neligan Plastic Surgery 5e – Scar assessment/Vancouver Scar Scale。","conflict":""},{"id":"9082","sub":"B6","src":"NG","years":[105],"stem":"有關周邊神經的受傷和修補，下列敘述何者錯誤?","opts":{"A":"Primary neurorrhaphy is the gold standard of nerve injury","B":"The major limitation to peripheral nerve recovery is the time limit of nerve regeneration","C":"Nerve autograft is the gold standard for reconstructing a nerve gap","D":"A little tension to achieve primary coaptation is unacceptable","E":"The sural nerve is the most common source for autologous nerve graft."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：周邊神經受傷與修復原則。(選錯誤者)\n- A正確：Primary(tension-free)neurorrhaphy為神經損傷修復之gold standard。\n- B正確：周邊神經恢復之主要限制為『神經再生的時間限制』(軸突以約1 mm/day再生，運動終板不可逆退化前須到達)。\n- C正確：Nerve autograft(自體神經移植)為重建nerve gap之gold standard(sural nerve最常用)。\n- D錯誤(正解)：修復核心原則為『tension-free coaptation』，但『少許張力(a little tension)以達primary coaptation是不可接受的』此敘述過度絕對——臨床上可接受極小之生理張力以完成一期無間隙接合；真正禁忌是『過度張力(excessive tension)』會導致缺血與纖維化。故D為錯誤敘述。\n- E正確：Sural nerve為最常用之自體神經移植來源。","peropt":{"A":"Primary neurorrhaphy為金標準——正確敘述，非答案。","B":"神經再生時間限制為恢復主要限制——正確，非答案。","C":"Nerve autograft為nerve gap重建金標準——正確，非答案。","D":"◎ 『少許張力以達primary coaptation不可接受』——此敘述錯誤(可接受極小張力，禁忌為過度張力)，故為正解。","E":"Sural nerve為最常用自體移植來源——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e, Vol.6 – Peripheral nerve repair/grafting；Grabb & Smith 9e – Nerve injury。","conflict":""},{"id":"9083","sub":"B6","src":"NG","years":[105,107],"stem":"影響神經修補的預後原因，何者錯誤?","opts":{"A":"The age of the patient seems to be the most predominant factor.","B":"Proximal nerve injury 比 distal injury 重建困難,Crush and Avulsion injuries 比 sharp injury預後差","C":"Good prognosis is expected if the repair occurs before 6 months and best results occur if the repair is performed before 3 weeks.","D":"Technique of repair has minimal effect on prognosis","E":"Earlier repair led to better prognosis"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：神經修復預後影響因子。(選錯誤者)\n- A正確：病人年齡似為最重要之預後因子(兒童/年輕者恢復佳)。\n- B正確：近端(proximal)損傷較遠端(distal)重建困難(再生距離長、運動終板退化)；壓砸/撕脫傷(crush/avulsion)較銳器(sharp)損傷預後差。\n- C正確：6個月內修復預後佳，最佳結果在3週內修復(避免end-organ與運動終板不可逆退化)。\n- D錯誤(正解)：『修復技術對預後影響極小(minimal effect)』為錯誤——tension-free、精準fascicular alignment、顯微技術對預後至關重要。\n- E正確：越早修復預後越好。","peropt":{"A":"年齡為最主要預後因子——正確，非答案。","B":"Proximal較distal難、crush/avulsion較sharp差——正確，非答案。","C":"6個月內修復預後佳、3週內最佳——正確，非答案。","D":"◎ 『修復技術對預後影響極小』——錯誤，技術影響重大，故為正解。","E":"越早修復預後越好——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e, Vol.6 – Nerve repair prognostic factors。","conflict":""},{"id":"9084","sub":"B3","src":"NG","years":[105],"stem":"Which following description is not the indication for vascularized bone flaps?","opts":{"A":"biologic failure due to infection, scarring, or irradiation","B":"segmental defects of greater than 6–8 cm after traumatic or oncologic bone loss","C":"composite tissue loss","D":"small bone gaps as a result of trauma or comminuted fractures","E":"need growth potential when including a growth plate in the vascularized graft"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：血管化骨瓣(vascularized bone flap)之適應症。(選非適應症者)\n【適應症】\n- A：因感染、疤痕、放射線導致骨癒合失敗(biologic failure)之受床(缺血受床需帶血供之骨)。\n- B：外傷或腫瘤切除後之節段性(segmental)骨缺損>6–8 cm(超過non-vascularized graft安全上限)。\n- C：複合組織(composite)缺損(需同時帶骨+皮/肌)。\n- E：需生長潛能時可含生長板(growth plate)之血管化移植(如兒童腓骨帶骨骺)。\n【非適應症】\n- D正解：外傷或粉碎性骨折造成之『小骨缺損(small bone gaps)』——可用non-vascularized bone graft即可癒合，不需血管化骨瓣，故為非適應症。\n【原則】<5–6 cm且受床良好→傳統骨移植；>6–8 cm或受床不良(放射/感染/疤痕)→血管化骨瓣(如free fibula)。","peropt":{"A":"感染/疤痕/放射致骨癒合失敗——為適應症，非答案。","B":"外傷/腫瘤>6–8 cm節段缺損——為適應症，非答案。","C":"複合組織缺損——為適應症，非答案。","D":"◎ 外傷/粉碎骨折之小骨缺損——非血管化骨瓣適應症(用傳統骨移植即可)，故為正解。","E":"需含生長板之生長潛能——為適應症，非答案。"},"cite":"Neligan Plastic Surgery 5e – Vascularized bone flaps/Free fibula；Grabb & Smith 9e – Bone grafts and flaps。","conflict":""},{"id":"9085","sub":"B3","src":"NG","years":[105,107],"stem":"The only documented method to increase skin flap survival is the delay procedure. It is a permanent and irreversible process involving multiplication and hypertrophy of the cells in each layer of the vessel wall. When will its maximal effect occur after operation?","opts":{"A":"6~12 hours","B":"6~12 days","C":"48~72 hours","D":"48~72 days","E":"6~8 months"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：皮瓣延遲手術(delay procedure)之最大效應時間。\n- Delay procedure為目前唯一有實證可增加皮瓣存活之方法。\n- 機轉：為永久且不可逆之過程，涉及血管壁各層細胞之增生與肥大(multiplication & hypertrophy)，並使choke vessels擴張、血流重新導向、對抗sympathetic vasoconstriction(去神經化)。\n- 最大效應出現於術後『48–72小時』(ans C)；一般認為delay效應在術後約2週趨於成熟穩定。\n【臨床意義】延遲可安全延伸皮瓣捕獲(capture)相鄰angiosome之血流，增加可存活長度。","peropt":{"A":"6–12小時——過早，錯。","B":"6–12天——過晚，錯。","C":"◎ 48–72小時——delay效應之最大效應時間，正解。","D":"48–72天——過長，錯。","E":"6–8個月——過長，錯。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Flap physiology/Delay phenomenon。","conflict":""},{"id":"9086","sub":"B8","src":"NG","years":[105],"stem":"有關Adipose-derived stromal cells(ASCs)脂肪幹細胞的處理流程，下列敘述何者正確? (複選)","opts":{"A":"Even following ultrasonic-assisted liposuction, the adipose-derived stromal cells(ASCs) retain their ability to undergo osteogenic differentiation","B":"The adipose tissue should be processed as soon as possible","C":"Fat can be harvested .from thigh ,abodomen ,flank and buttock","D":"Tissues should then be subsequently digested with type II collagenase in Hank's balanced salt solution at 37°C","E":"10mL of starting adipose tissue will allow the harvest of 1 million human ASCs."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：脂肪幹細胞(Adipose-derived stromal/stem cells, ASCs)之取得與處理流程。(複選，全部正確)\n- A正確：即使經過超音波輔助抽脂(ultrasonic-assisted liposuction)，ASCs仍保有成骨(osteogenic)分化能力。\n- B正確：抽出之脂肪組織應盡快處理(維持細胞活性)。\n- C正確：脂肪可取自大腿(thigh)、腹部(abdomen)、腰腹側(flank)、臀部(buttock)。\n- D正確：組織以type II collagenase於Hank's balanced salt solution、37°C消化。\n- E正確：起始約10 mL脂肪組織可分離出約100萬(1 million)人類ASCs。\n【核心】離心/膠原酶消化後之SVF(stromal vascular fraction)含ASCs，具多向分化(脂肪、骨、軟骨)潛能→再生醫學與脂肪移植之關鍵。","peropt":{"A":"◎ 超音波抽脂後ASCs仍保有成骨分化能力——正確。","B":"◎ 脂肪組織應盡快處理——正確。","C":"◎ 可取自大腿、腹部、腰腹側、臀部——正確。","D":"◎ 以type II collagenase於HBSS、37°C消化——正確。","E":"◎ 10 mL脂肪可分離約1百萬ASCs——正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Stem cells and regenerative medicine/Adipose-derived stem cells。","conflict":""},{"id":"9087","sub":"B2","src":"NG","years":[105],"stem":"有關Scar的特質有哪些是正確的敘述。(複選)","opts":{"A":"Mature scars restore only 70% of the tensile strength of normal skin","B":"Scar remodeling occurs for 6 months after the initial injury, complete restoration of the normal ECM architecture can be achieved.","C":"Keloids grow beyond the boundaries of the original wounds and rarely regress","D":"There is a strong genetic predisposition to keloid disease.","E":"Kypertrophic scars stay within the boundaries of the original wounds and usually regress spontaneously"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：疤痕(scar)特性與蟹足腫/肥厚性疤痕鑑別。(複選，選正確者)\n- A正確：成熟疤痕僅恢復正常皮膚約70%之抗張強度(tensile strength)——疤痕永遠無法完全恢復。\n- C正確：Keloid(蟹足腫)生長『超出』原傷口邊界、極少自行消退(rarely regress)。\n- D正確：Keloid具強烈遺傳傾向(genetic predisposition，好發深膚色人種、家族史)。\n- E正確：Hypertrophic scar(肥厚性疤痕)侷限於原傷口邊界內，常會自行消退(spontaneous regression)。\n- B錯誤：疤痕重塑(remodeling)可持續6個月至1年以上，但『無法完全恢復正常ECM架構』——膠原排列仍紊亂，故B敘述錯誤未入選。","peropt":{"A":"◎ 成熟疤痕僅恢復約70%抗張強度——正確。","B":"疤痕重塑6個月且可完全恢復正常ECM架構——錯誤，永遠無法完全復原，未選。","C":"◎ Keloid超出原傷口邊界、極少消退——正確。","D":"◎ Keloid具強烈遺傳傾向——正確。","E":"◎ 肥厚性疤痕侷限原傷口內、常自行消退——正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Wound healing/Scar；Grabb & Smith 9e – Keloids and hypertrophic scars。","conflict":""},{"id":"9088","sub":"B3","src":"NG","years":[105],"stem":"The anatomic concepts provide an overview of the blood supply to the integument and to the deep tissues. Which are the anatomic concepts related to flap design?(複選)","opts":{"A":"Vessels \"hitchhike\" with nerves","B":"Arteries radiate from fixed to mobile areas and veins converge from mobile to fixed areas","C":"Vessels have a constant destination and origin","D":"Vessels obey the law of equilibrium","E":"Muscles are the prime movers of venous return"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：皮瓣設計相關之血液供應解剖概念(Taylor/Cormack-Lamberty原則)。(複選，選正確者)\n- A正確：血管常伴隨神經走行(vessels hitchhike with nerves)→neurocutaneous/隨神經血管概念。\n- B正確：動脈由固定區向可動區放射、靜脈由可動區向固定區匯聚(arteries radiate from fixed to mobile；veins converge from mobile to fixed)。\n- D正確：血管遵循平衡法則(law of equilibrium)——某區血供不足時鄰區代償(choke anastomoses)。\n- E正確：肌肉為靜脈回流之主要驅動(muscles are prime movers of venous return，肌肉幫浦)。\n- C錯誤：血管『來源與去向固定(constant origin and destination)』並非正確原則——實際上血管路徑常有變異；經典原則之一為『血管大小與供應組織之阻力/需求相關』，故C敘述未入選。","peropt":{"A":"◎ 血管伴神經走行(hitchhike with nerves)——正確概念。","B":"◎ 動脈由固定向可動放射、靜脈由可動向固定匯聚——正確。","C":"血管來源與去向固定——非正確設計概念，未選。","D":"◎ 血管遵循平衡法則(law of equilibrium)——正確。","E":"◎ 肌肉為靜脈回流主要驅動——正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Vascular anatomy of the integument/Angiosome (Taylor)。","conflict":""},{"id":"9089","sub":"B3","src":"NG","years":[105],"stem":"在Tissue expansion的過程中, 有許多組織生理變化, 下列敘述何者為正確: (複選)","opts":{"A":"Increase in skin area","B":"Increase in dermal thickness","C":"Increase in number of hair follicles","D":"hypertrophy of muscle","E":"Thinning of dermis"},"ans":"AE","multi":true,"etype":"ai","expl":"","key":"🎯考點：組織擴張(tissue expansion)之組織生理變化。(複選，選正確者)\n- A正確：皮膚面積增加(increase in skin area)——擴張之主要目的與結果。\n- E正確：真皮變薄(thinning of dermis)——擴張下真皮受壓變薄。\n【錯誤選項辨析】\n- B錯誤：真皮『變薄』而非增厚(表皮epidermis反而增厚)，故B錯。\n- C錯誤：毛囊數目不變，僅因面積增加而密度下降(follicles spread apart)，並非數目增加。\n- D錯誤：擴張下肌肉受壓『萎縮變薄(atrophy)』而非肥大。\n【總結】擴張時：表皮增厚、真皮變薄、皮膚面積增加、纖維囊(capsule)形成、血管增生(neovascularization，類delay效應)。","peropt":{"A":"◎ 皮膚面積增加——正確。","B":"真皮厚度增加——錯誤(真皮變薄、表皮增厚)，未選。","C":"毛囊數目增加——錯誤(數目不變、密度下降)，未選。","D":"肌肉肥大——錯誤(受壓萎縮變薄)，未選。","E":"◎ 真皮變薄(thinning of dermis)——正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Tissue expansion physiology。","conflict":""},{"id":"9090","sub":"B5","src":"NG","years":[104,105],"stem":"有關顯微手術血管吻合時遇到 size-discrepant vessels, 下列敘述何者為錯: (複選)","opts":{"A":"Various techniques are used to deal with this, and vessel mismatches of up to 4 : 1 can be safely anastomosed end-to-end.","B":"Placing a fish-mouth incision or obliquely cutting the smaller vessel can reduce the discrepancy.","C":"Angles of the fish-mouth incision or obliquely cutting more than 30° will allow stronger flow which may avoid vessel occlusion.","D":"When the discrepancy is greater than 3 : 1, consider an end-to-side anastomosis, a vein graft to graduate the discrepancy, or using a side branch of the larger vessel, which may be a better size match.","E":"The best way is to dilate the smaller vessel maximally and sutured as widely as possible to the larger vessel."},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"🎯考點：顯微血管吻合處理口徑不符(size-discrepant vessels)。(複選，選錯誤者)\n【正確做法(非答案)】\n- A：口徑差可達4:1仍能安全行端對端(end-to-end)吻合。\n- B：於較小血管作魚嘴切開(fish-mouth incision)或斜切(oblique cut)可縮小口徑差。\n- D：差距>3:1時，可考慮end-to-side吻合、以vein graft漸進過渡、或利用大血管之側枝(side branch)以求口徑匹配。\n【錯誤做法(正解CE)】\n- C錯誤(正解)：魚嘴/斜切角度『大於30°會產生更強血流以避免阻塞』——敘述錯誤；斜切/魚嘴目的在調整口徑匹配而非追求更強流速，過度切開反造成亂流/內膜損傷、增加栓塞。\n- E錯誤(正解)：『最好方法是將小血管最大程度擴張並盡量寬地縫合到大血管』——過度機械擴張(over-dilatation)會損傷內皮、促成栓塞，並非最佳法。","peropt":{"A":"口徑差達4:1可安全端對端吻合——正確敘述，非答案。","B":"魚嘴切開/斜切小血管縮小口徑差——正確敘述，非答案。","C":"◎ 魚嘴/斜切>30°產生更強血流避免阻塞——錯誤敘述，故為正解。","D":">3:1時end-to-side/vein graft/利用側枝——正確敘述，非答案。","E":"◎ 『最佳法為最大擴張小血管並盡量寬縫』——錯誤(過度擴張損傷內皮致栓塞)，故為正解。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 – Microsurgery/Vessel size discrepancy techniques。","conflict":"⚠ 同題歷屆重出(跨中英雙語)：size-discrepant vessels吻合技巧何者為錯(複選)。差異僅B選項(切開較大↔較小血管)造成B對錯翻動；共同錯誤敘述C(斜切>30°增流)、E(過度擴張小血管硬縫)不變。104年(9069,英)答BCE、105年(9090,中)答CE。屬文字微調同考點。"},{"id":"9091","sub":"B8","src":"NG","years":[104,105],"stem":"下列敘述有關 acellular dermal matrix (ADM)何者是錯的?","opts":{"A":"ADM is largely replacing the use of synthetic meshes in contaminated abdominal wall defects. These bioprosthesis are thought to incorporate into infected tissue without becoming infected.","B":"ADM is thought to incorporate into surrounding tissue and eventually be replaced with host collagen.","C":"ADM provides a tissue substitute that is pliable, easy to shape and suture, and can be used in the setting of infection.","D":"An early ACM, AlloDerm®, was placed on the market in 1994 and has now been used in over 1 million cases. Recently, innovative plastic surgeons have popularized the use of ACM in implant-based breast reconstruction. ACM is used to provide additional coverage of implant-based reconstructions, support for faster inferior pole expansion.","E":"ADM is a dermal graft in which the dermis is separated from the epidermis and all cellular elements, to avoid tissue rejection and graft failure. These bioprosthesis are harvested from human cadavers, porcine or bovine donors."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：無細胞真皮基質(Acellular Dermal Matrix, ADM)特性。(選錯誤者)\n- B正確：ADM可與周圍組織整合(incorporate)並最終由宿主膠原取代。\n- C正確：ADM柔軟、易塑形與縫合，可用於感染環境。\n- D正確：早期AlloDerm®1994年上市，已用逾百萬例；廣泛用於implant-based乳房重建以增加覆蓋、支撐下極(inferior pole)擴張。\n- E正確：ADM為去除表皮與所有細胞成分之真皮移植物(避免排斥)，來源為人類屍體、豬或牛。\n- A錯誤(正解)：敘述『ADM大量取代合成網片用於污染腹壁缺損、可整合入感染組織而不會被感染』過度樂觀——實際上ADM(biologic mesh)在污染/感染腹壁修補之優勢證據有限，且ADM仍可能被感染、發生降解與疝氣復發，並未『大量取代』合成網片，故A為錯誤敘述。","peropt":{"A":"◎ 『ADM大量取代合成網片、整合入感染組織而不會被感染』——過度絕對且不符實證，故為正解。","B":"ADM整合入周圍組織、由宿主膠原取代——正確，非答案。","C":"ADM柔軟易塑形縫合、可用於感染環境——正確，非答案。","D":"AlloDerm®1994上市、廣用於植入式乳房重建——正確，非答案。","E":"ADM為去表皮及細胞之真皮移植物、來源人/豬/牛——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e – Acellular dermal matrix；Grabb & Smith 9e – Biomaterials/Abdominal wall reconstruction。","conflict":"⚠ 同題歷屆重出：ADM何者為誤。關鍵偽敘述皆『ADM可用於污染腹壁取代合成網、嵌入感染組織而不受感染』；純選項重排，104年(9068)答E、105年(9091)答A。"},{"id":"9092","sub":"B8","src":"NG","years":[105],"stem":"When is the craniocaudal (head to tail) axis established?","opts":{"A":"By the end of the 2nd and beginning of the 3rd gestational week","B":"By the end of the 3rd and beginning of the 4h gestational week","C":"By the end of the 4th and beginning of the 5th gestational week","D":"By the end of the 5th and beginning of the 6th gestational week","E":"By the end of the 6th and beginning of the 7th gestational week"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：胚胎頭尾軸(craniocaudal/head-to-tail axis)之建立時機。\n- 本題權威答案為C：於第4週末、第5週初(end of 4th/beginning of 5th gestational week)建立頭尾軸。\n- 胚胎軸向建立涉及gastrulation(原腸胚形成)、primitive streak(原線)與Hensen's node、以及Hox基因沿前後軸之定序表現。\n- 頭尾(前後)軸之極性由原線頭端(node)決定，並隨神經管閉合、體節(somites)分節而顯現於外觀。\n【應試提醒】依權威答案選C。\n⚠答案疑義：標準胚胎學認為頭尾(前後)軸之極性隨原線(primitive streak)於妊娠第3週形成即已建立，選項B(第3週末/第4週初)在一般發育生物學上更接近；惟本題一律以權威答案C為準。","peropt":{"A":"第2週末/第3週初——依權威答案非正解。","B":"第3週末/第4週初——依權威答案非正解。","C":"◎ 第4週末/第5週初建立頭尾軸——為本題權威答案。","D":"第5週末/第6週初——非正解。","E":"第6週末/第7週初——非正解。"},"cite":"Neligan Plastic Surgery 5e – Embryology/Craniofacial development。","conflict":""},{"id":"9093","sub":"B9","src":"NG","years":[106],"stem":"下列何位整形外科醫師，因完成第一例成功腎移植手術而榮獲1990年諾貝爾生理醫學獎？","opts":{"A":"Peter Neligan","B":"Paul Tessier","C":"Joseph Murray","D":"Harold Gillies","E":"Archibald McIndoe"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形外科醫學史——Joseph Murray與器官移植免疫。\n- Joseph E. Murray為整形外科醫師，1954年完成人類史上第一例成功之腎臟移植(同卵雙胞胎間)，1990年因『器官與細胞移植於人類疾病治療之發現』榮獲諾貝爾生理醫學獎(與E. Donnall Thomas共享)。\n- 其貢獻奠定移植免疫學(transplantation immunology)與同種異體移植(allotransplantation)基礎，亦與現代顏面/複合組織移植(VCA)之發展一脈相承。\n【對照】Paul Tessier=顱顏外科之父；Gillies/McIndoe=現代整外先驅；Neligan=當代教科書主編。","peropt":{"A":"Peter Neligan——當代整外教科書主編，非諾貝爾得主，錯。","B":"Paul Tessier——顱顏外科之父，非腎移植，錯。","C":"◎ Joseph Murray——首例成功腎移植、1990諾貝爾獎，正解。","D":"Harold Gillies——現代整外先驅，錯。","E":"Archibald McIndoe——二戰燒傷重建先驅，錯。"},"cite":"Neligan Plastic Surgery 5e – History；Nobel Prize in Physiology or Medicine 1990。","conflict":""},{"id":"9094","sub":"B10","src":"NG","years":[106],"stem":"Which of the followings about the effects of depression on plastic surgery is wrong?","opts":{"A":"Depression might negatively affect the course of healing and postoperative recover.","B":"NK cell activity, Helper (CD4) and suppressor (CD8) cell activity, and numbers of T lymphocytes can be negatively affected by depression.","C":"As many as 50% of depressions may be \"masked\", that is, not obvious or easily recognized.","D":"If the surgeon suspects a depressive disorder, he or she should refer the patient for a psychiatric consultation.","E":"Plastic surgeons should not attempt to avoid performing an elective procedure on a depressed individual."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：憂鬱症(depression)對整形手術之影響。(選錯誤者)\n- A正確：憂鬱可負面影響傷口癒合與術後恢復。\n- B正確：憂鬱可負面影響NK細胞活性、CD4(helper)/CD8(suppressor)活性與T淋巴球數目(精神神經免疫學, psychoneuroimmunology)。\n- C正確：高達50%之憂鬱為『被掩蔽(masked)』、不易察覺。\n- D正確：懷疑憂鬱症時應轉介精神科評估。\n- E錯誤(正解)：『整形外科醫師不應試圖避免對憂鬱病患執行選擇性手術』——敘述錯誤；對未經治療/控制不佳之憂鬱病患，應審慎並考慮延後選擇性(elective)手術，先處理精神狀態，故E為錯誤敘述。","peropt":{"A":"憂鬱負面影響傷口癒合與術後恢復——正確，非答案。","B":"憂鬱負面影響NK/CD4/CD8/T淋巴球——正確，非答案。","C":"高達50%憂鬱為masked——正確，非答案。","D":"懷疑憂鬱應轉介精神科——正確，非答案。","E":"◎ 『不應避免對憂鬱病患執行選擇性手術』——錯誤，應審慎/考慮延後，故為正解。"},"cite":"Neligan Plastic Surgery 5e – Psychological aspects of plastic surgery。","conflict":""},{"id":"9095","sub":"B11","src":"NG","years":[106],"stem":"下列有關拍攝術前術後照片基本原則，何者為非？","opts":{"A":"應儘量使用同一台相機，並維持同樣光圈、快門、白平衡與色溫設定","B":"鼻部攝影應包含anterior-posterior (AP) view, right and left oblique, right and C. left lateral，五個基本角度外，還應加上worm's eye view或chin-up view 數位相機應至少2000萬畫素以上","C":"數位相機應至少2000萬畫素以上","D":"一份完整詳盡的影像使用同意書是必須的","E":"病患不可以選擇與控制其術前術後影相如何使用"},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"🎯考點：術前術後攝影(pre-/postoperative photography)基本原則。(複選，選錯誤者)\n【正確原則(非答案)】\n- A：盡量用同一台相機並固定光圈、快門、白平衡、色溫→確保可比性。\n- B：鼻部攝影除AP、雙斜、雙側位五個基本角度外，應加拍worm's eye/chin-up view以評估鼻底、鼻孔對稱。\n- D：完整詳盡之影像使用同意書為必須。\n【錯誤敘述(正解CE)】\n- C錯誤(正解)：『數位相機應至少2000萬畫素以上』——臨床標準攝影並不需2000萬畫素以上，一般數百萬~約1200萬畫素即足以記錄，此門檻敘述過高，故C錯。\n- E錯誤(正解)：『病患不可以選擇與控制其術前術後影像如何使用』——錯誤；病患對其影像之使用具自主權(autonomy)與知情同意權，可選擇/限制使用範圍，故E錯。","peropt":{"A":"同一相機並固定光圈/快門/白平衡/色溫——正確原則，非答案。","B":"鼻部除五視角外加worm's eye/chin-up view——正確，非答案。","C":"◎ 數位相機須≥2000萬畫素——錯誤(門檻過高、非必要)，故為正解。","D":"完整影像使用同意書為必須——正確，非答案。","E":"◎ 『病患不可選擇/控制影像使用』——錯誤(違反病人自主與知情同意)，故為正解。"},"cite":"Neligan Plastic Surgery 5e – Photography/Medicolegal & consent。","conflict":""},{"id":"9096","sub":"B7","src":"NG","years":[106],"stem":"下列有關病患手術與麻醉風險的敘述，何者為非?","opts":{"A":"根據2004年法國所做研究，麻醉相關死亡率在American Society of Anesthesiologists (ASA) classification 的category I為百萬分之4，category IV為百萬分之554","B":"術中監測儀器如血氧濃度及二氧化碳監測儀可減少術中死亡率","C":"年齡超過65歲的病患在術中發生心血管問題的機率是65歲以下病患的2倍","D":"所謂ASA IV是指病患有輕度單一系統疾病但控制良好，疾病不影響其日常生活","E":"美國整形外科醫學會建議門診抽脂手術總抽出量應少於5000cc"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：手術與麻醉風險及ASA分級。(選錯誤者)\n- A正確：2004法國研究顯示麻醉相關死亡率ASA I約百萬分之4、ASA IV約百萬分之554(隨ASA升高劇增)。\n- B正確：術中監測(pulse oximetry血氧、capnography二氧化碳)可降低術中死亡率。\n- C正確：>65歲病患術中心血管事件風險約為<65歲者之2倍。\n- E正確：美國整形外科醫學會建議門診抽脂總抽出量應<5000 cc。\n- D錯誤(正解)：『ASA IV=病患有輕度單一系統疾病但控制良好、不影響日常生活』——此為ASA II之描述；ASA IV應為『嚴重全身性疾病且持續威脅生命(constant threat to life)』，故D定義錯誤。\n【ASA速記】I=健康；II=輕度系統疾病；III=嚴重系統疾病但未持續危及生命；IV=嚴重系統疾病持續威脅生命；V=瀕死；VI=腦死器捐。","peropt":{"A":"麻醉死亡率ASA I 4/百萬、IV 554/百萬——正確，非答案。","B":"術中血氧/二氧化碳監測降低死亡率——正確，非答案。","C":">65歲術中心血管風險為<65歲2倍——正確，非答案。","D":"◎ 『ASA IV=輕度單一系統疾病控制良好』——錯誤(此為ASA II，IV為持續危及生命)，故為正解。","E":"門診抽脂總量應<5000 cc——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e – Patient safety/Anesthesia risk；ASA Physical Status Classification。","conflict":""},{"id":"9097","sub":"B7","src":"NG","years":[106],"stem":"下列有關抽脂手術安全的敘述，何者為非？","opts":{"A":"抽脂手術時，血中lidocaine濃度高峰是在tumescent solution注射後10-12小時後","B":"Tumescent solution注射於血液循環較好的區域如頭頸部，血中lidocaine濃度高峰約在注射後六小時，同時其濃度也較注射於其他區域來的高","C":"根據臨床研究，抽脂手術時注射的wetting solution約有70%會在抽脂手術中被抽出，30%會殘留在脂肪組織而被吸收","D":"研究顯示在496245次抽脂手術的95個死亡病例中，14.6%是因為腹壁及臟器穿孔破裂所導致","E":"因腹部手術病史及腹壁疝氣可能增加腹部抽脂後腹壁穿孔破裂機會，術前詳細腹部理學檢查及對疑似腹壁缺損病患進行影像學檢查可減少此合併症的發生"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：抽脂手術(liposuction)安全與tumescent lidocaine藥動學。(選錯誤者)\n- A正確：抽脂時血中lidocaine濃度高峰約在tumescent solution注射後10–12小時(緩慢吸收、峰值延後)。\n- B正確：注射於血流豐富區(如頭頸部)吸收快，血中lidocaine峰值約在注射後6小時且濃度較高。\n- D正確：496,245次抽脂之95例死亡中，約14.6%因腹壁及臟器穿孔破裂所致。\n- E正確：腹部手術史與腹壁疝氣增加穿孔風險，術前理學檢查+疑似缺損者影像學檢查可減少此併發症。\n- C錯誤(正解)：wetting solution約有『70%殘留被吸收、僅約30%被抽出』；題目C敘述『70%被抽出、30%殘留』方向顛倒，故為錯誤敘述。","peropt":{"A":"血中lidocaine峰值於注射後10–12小時——正確，非答案。","B":"頭頸等血流豐富區峰值約6小時且濃度較高——正確，非答案。","C":"◎ 『70%被抽出、30%殘留吸收』——錯誤(實為約30%抽出、70%殘留吸收，方向顛倒)，故為正解。","D":"死亡病例中14.6%因腹壁/臟器穿孔——正確，非答案。","E":"腹部手術史/疝氣增加穿孔風險、術前檢查可減少——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e – Liposuction safety/Tumescent lidocaine pharmacokinetics。","conflict":""},{"id":"9098","sub":"B8","src":"NG","years":[106],"stem":"下列有關gene delivery approach的敘述何者有誤？","opts":{"A":"Direct injection of naked/plasmid DNA送入細胞的效率不高，基因表現時間短暫，但潛在毒性小且不易引起免疫反應","B":"Liposome技術簡單可轉染各種細胞，但缺少專一性，且轉染效率低","C":"Retrovirus可將目標基因嵌入細胞染色體，可長期表現所需蛋白，但只能感染分裂中的細胞，且嵌入基因時可能造成突變","D":"Adenovirus可以感染分裂與不分裂細胞且不會引起免疫反應，所以是理想的基因治療載體","E":"Herpes simplex virus 1可感染神經細胞"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：基因傳遞方法(gene delivery approaches)之優缺點。(選錯誤者)\n- A正確：直接注射naked/plasmid DNA效率低、表現短暫，但毒性小、不易引起免疫反應。\n- B正確：Liposome技術簡單、可轉染各種細胞，但缺專一性且轉染效率低。\n- C正確：Retrovirus可將目標基因嵌入宿主染色體、長期表現，但僅感染分裂中細胞，且嵌入可能造成insertional mutagenesis。\n- E正確：Herpes simplex virus type 1(HSV-1)具嗜神經性，可感染神經細胞(neurotropic)。\n- D錯誤(正解)：『Adenovirus可感染分裂與非分裂細胞且不會引起免疫反應，故為理想載體』——錯誤；adenovirus免疫原性強、會引發顯著宿主免疫反應致表現短暫，並非理想之長期載體。","peropt":{"A":"Naked/plasmid DNA效率低、表現短、毒性小免疫低——正確，非答案。","B":"Liposome簡單可轉染多種細胞但缺專一性、效率低——正確，非答案。","C":"Retrovirus嵌入染色體長期表現、僅感染分裂細胞、可致突變——正確，非答案。","D":"◎ 『Adenovirus可感染分裂/非分裂且不引起免疫反應為理想載體』——錯誤(免疫原性強)，故為正解。","E":"HSV-1可感染神經細胞——正確，非答案。"},"cite":"Neligan Plastic Surgery 5e – Gene therapy vectors；Grabb & Smith 9e – Gene delivery。","conflict":""},{"id":"9099","sub":"B9","src":"NG","years":[106],"stem":"下列有關癌症治療敘述何者為是？","opts":{"A":"手術是實質固態癌症單一治療方式中最成功的一種","B":"\"bigger is better\"仍是目前癌症手術的原則","C":"癌症治療中，手術合併放療與化療可縮小手術範圍但仍維持存活率","D":"對於任何有任何轉移病灶的癌症患者如extremity sacroma合併單一或少數肺轉移，手術不能提供任何好處","E":"Neoadjuvant treatment可以縮小腫瘤，但是也可能增加手術的合併症如在乳癌病患接受neoadjuvant chemotherapy後的六周內接受顯微乳房重建手術，傷口合併症的比例會上升。"},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯考點：癌症治療原則(oncology)與整形重建之關聯。(複選，選正確者)\n- A正確：手術為實質固態癌(solid tumor)單一治療模式中最成功者。\n- C正確：手術合併放療/化療(multimodality)可縮小手術範圍(如乳癌保乳)但仍維持存活率。\n- E正確：Neoadjuvant治療可縮小腫瘤但增加手術併發症——如乳癌病患接受neoadjuvant chemotherapy後6週內接受顯微乳房重建，傷口併發症比例上升。\n【錯誤選項辨析】\n- B錯誤：『bigger is better』已非現代原則——現代趨向器官保留、multimodality治療。\n- D錯誤：並非任何轉移即無手術益處——寡轉移(oligometastasis，如extremity sarcoma合併單一/少數肺轉移)之metastasectomy可提供存活益處。","peropt":{"A":"◎ 手術為固態癌單一治療最成功——正確。","B":"『bigger is better』仍為原則——錯誤(現代趨向保留+多模式)，未選。","C":"◎ 手術+放/化療可縮小手術範圍且維持存活——正確。","D":"任何轉移即手術無益——錯誤(寡轉移metastasectomy有益)，未選。","E":"◎ Neoadjuvant縮小腫瘤但增併發症(化療後6週內顯微乳房重建傷口併發症上升)——正確。"},"cite":"Neligan Plastic Surgery 5e – Oncology principles/Breast reconstruction timing；Grabb & Smith 9e – Cancer principles。","conflict":""},{"id":"9100","sub":"B9","src":"NG","years":[106],"stem":"下列敘述有關癌症免疫治療(immunotherapy)的敘述何者為非？","opts":{"A":"Immunotherapy 可分為passive 和 active immunotherapy，都是利用免疫機制來殺死癌細胞","B":"Passive immunothreapy的一種是利用單株抗體針對癌細胞外特殊腫瘤抗原，如trastuzumab會結合HER2/neu receptor","C":"Tumor-infiltrating lymphocyte於體外培養並以interleukin-2 (IL-2)刺激也是一種用於治療melanoma的immunotherapy","D":"在melanoma病患給予IL-2和interferon-alpha是一種non-specific form active immunotherapy","E":"利用病患的癌細胞抗原所製作的tumor vaccination是不具專一性的passive immunotherapy"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯癌症免疫治療(immunotherapy)分類架構\n- 依作用機轉分兩大類:\n  1. Passive immunotherapy(被動): 給予外源性免疫效應分子/細胞,不依賴病人自身免疫反應。包含:①monoclonal antibody(如trastuzumab/Herceptin結合HER2/neu、cetuximab抗EGFR);②adoptive cell transfer(如TIL體外擴增+IL-2治療melanoma)。\n  2. Active immunotherapy(主動): 刺激病人自身免疫系統。再細分:\n     - Specific(專一性): tumor vaccine,利用病人腫瘤抗原誘發專一性抗腫瘤免疫。\n     - Non-specific(非專一性): IL-2、IFN-α、BCG等廣泛免疫刺激。\n- E選項錯誤點: tumor vaccination屬「active且specific」,非「passive且non-specific」,概念完全顛倒。","peropt":{"A":"正確。免疫治療分passive與active,兩者皆利用免疫機制殺死癌細胞。","B":"正確。passive之一為單株抗體,trastuzumab結合HER2/neu receptor,典型ADCC/訊號阻斷。","C":"正確。TIL體外培養+IL-2刺激為adoptive immunotherapy,用於治療melanoma。","D":"正確。IL-2與IFN-α為non-specific form之active immunotherapy。","E":"◎(即為非/答案)。tumor vaccine為active specific immunotherapy,並非不具專一性之passive,敘述錯誤。"},"cite":"Grabb & Smith's Plastic Surgery 9th, Principles of Cancer Management/Tumor Immunology; Neligan Plastic Surgery 5th Vol.1.","conflict":""},{"id":"9101","sub":"B10","src":"NG","years":[106],"stem":"關於整形外科的倫理議題，何者不恰當(複選)?","opts":{"A":"醫師應評估病患的需求，與自身的技術後，始決定手術indications","B":"醫師應術前告知預期的效果及可能無法達成病患期望的部分","C":"雷射廣告刊登: 保證減少臉部皺紋，無效退費","D":"隆乳廣告刊登: buy one implant, get one free","E":"隆乳廣告刊登: before-and after照片"},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"🎯整形外科倫理與醫療廣告規範\n- 核心倫理: 手術indications須結合病人真實需求與醫師技術能力評估;術前充分告知(informed consent),含預期效果與無法達成期望之風險。\n- 醫療廣告紅線(不恰當):\n  1. 「保證療效/無效退費」→ 誇大不實、保證性宣稱違反醫療法。\n  2. 「買一送一(buy one, get one free)」→ 以促銷手法招攬手術,違反醫療業非商業化原則。\n  3. 未經同意刊登before-and-after對比照 → 涉病人隱私與誤導性宣傳,亦屬不當。","peropt":{"A":"恰當。評估病人需求與自身技術後再決定手術indications,符合倫理。","B":"恰當。術前告知預期效果與可能無法達成之部分,即informed consent。","C":"◎不恰當。雷射廣告「保證減少皺紋、無效退費」屬保證療效之不實廣告。","D":"◎不恰當。「buy one implant get one free」以商業促銷招攬手術,違反醫療倫理。","E":"◎不恰當。刊登before-and-after照片作廣告易誤導且涉隱私,屬不當醫療廣告。"},"cite":"Grabb & Smith's 9th, Ethics in Plastic Surgery; 台灣醫療法醫療廣告規範。","conflict":""},{"id":"9102","sub":"B10","src":"NG","years":[106],"stem":"對於\"Difficult patient\"之management，何者錯誤?","opts":{"A":"Hateful patient: To understand why they inspire negative feeling, to manage their treatment on the basis of specific treatment.","B":"The depent clinger: To set limits relative to appointments and telephone contacts","C":"The self-destructive denier: To set realistic expectations relative the patient's ability to get well","D":"The entitled demander: To let them know how underserving they are of what they demand.","E":"Manipulative help rejecting complainers: Try to help them and to share their pessimism that they can be \"cured\"."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯困難病人(difficult patient)之處置(Groves四型)\n- Dependent clinger(依賴糾纏型): 明確設定就診與電話聯絡界限(set limits)。\n- Entitled demander(理直氣壯要求型): 承認其權利但重新導向合理期待,不宜正面貶低。\n- Manipulative help-rejecting complainer(操縱型拒絕協助抱怨者): 不宜與其分享「可被治癒」的樂觀,反而應共享其悲觀、降低期待、規律追蹤,避免落入被操縱循環。\n- Self-destructive denier: 設定符合病人復原能力的實際期待。\n- E錯誤: 對help-rejecting complainer「盡力幫助並分享其可被治癒的樂觀」是錯誤策略。","peropt":{"A":"正確。Hateful patient應理解其引發負面情緒的原因,並依specific treatment處置。","B":"正確。Dependent clinger應設定就診與電話聯絡的界限。","C":"正確。Self-destructive denier應設定符合病人復原能力之實際期待。","D":"正確。Entitled demander的處理是讓其知其要求之不合理界限(原則性引導)。","E":"◎(錯誤)。對manipulative help-rejecting complainer不應分享其「可被治癒」的樂觀,應共享悲觀並降低期待。"},"cite":"Grabb & Smith's 9th, The Difficult Patient / Psychological aspects; Groves JE, NEJM 1978.","conflict":""},{"id":"9103","sub":"B5","src":"NG","years":[106],"stem":"Vasospasm是導致failing flap一個重要的原因，microsurgical procedures發生vasospasm的比率是多少?","opts":{"A":"2-5%","B":"5-10%","C":"10-15%","D":"15-20%","E":"20-25%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯顯微手術中血管痙攣(vasospasm)\n- 定義: 血管平滑肌因機械刺激、寒冷、低血容、疼痛/交感興奮而收縮,為failing flap重要可逆原因。\n- 發生率: microsurgical procedures約5–10%。\n- 處置: 溫熱、局部papaverine/lidocaine、2%利多卡因外敷、topical verapamil、外膜切除(adventitial stripping)、維持體溫與容積、止痛。","peropt":{"A":"非。2–5%過低。","B":"◎正確。vasospasm發生率約5–10%。","C":"非。10–15%偏高。","D":"非。15–20%不符。","E":"非。20–25%不符。"},"cite":"Grabb & Smith's 9th, Microsurgery; Neligan 5th Vol.1 Flap physiology.","conflict":""},{"id":"9104","sub":"B8","src":"NG","years":[106],"stem":"In implants and biomaterials, which is not the advantage of Titanium alloys compared with other metal implants","opts":{"A":"stronger,","B":"less inflammation","C":"higher resistance to corrosion","D":"more stress shielding","E":"lighter"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯鈦合金(Titanium alloys)生物材料特性\n- 優點: 高強度重量比(strong yet lighter)、優異抗腐蝕性(passive TiO2氧化層)、生物相容性佳、發炎反應少、可骨整合(osseointegration)、MRI相容性佳。\n- Stress shielding(應力遮蔽)為缺點而非優點: 植入物承載過多應力使周邊骨質因Wolff's law而失用性骨吸收;鈦楊氏模數雖低於不鏽鋼(較接近骨),仍有此現象,但『more stress shielding』被列為相對劣勢。","peropt":{"A":"為優點。stronger(強度高)。","B":"為優點。less inflammation(發炎反應較少)。","C":"為優點。higher resistance to corrosion(抗腐蝕性高)。","D":"◎(非優點/答案)。more stress shielding為缺點,並非優於其他金屬之處。","E":"為優點。lighter(重量較輕)。"},"cite":"Grabb & Smith's 9th, Biomaterials/Implants; Neligan 5th Vol.1.","conflict":""},{"id":"9105","sub":"B9","src":"NG","years":[106],"stem":"Which is the action of Alemtuzumab as Antilymphocyte Agent in transplantation in plastic surgery","opts":{"A":"Promotes T-cell clearance through complement-mediated lysis","B":"Eliminates T cells by the reticuloendothelial system;","C":"Eliminates T cells by antibody-dependent cellular cytotoxicity","D":"Eliminates T cells by the reticuloendothelial system","E":"Limits T-cell expansion; acts only on activated cells"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯Alemtuzumab(anti-CD52)於移植免疫抑制\n- 機轉: 人源化抗CD52單株抗體,CD52廣泛表現於T/B淋巴球、NK、單核球;主要經antibody-dependent cellular cytotoxicity(ADCC)、及補體介導與凋亡途徑造成長期而深度的淋巴球耗竭(profound depletion)。\n- 臨床: 用於誘導治療(induction),可減少維持性免疫抑制,應用於複合組織異體移植(VCA,如face/hand transplant)。\n- 對比: ATG經reticuloendothelial system清除+補體溶解;basiliximab(anti-CD25)限制活化T細胞擴增。","peropt":{"A":"非本題機轉描述。complement-mediated lysis並非Alemtuzumab被指定之主要答案。","B":"非。此為ATG/reticuloendothelial清除之描述。","C":"◎正確。Alemtuzumab經antibody-dependent cellular cytotoxicity(ADCC)清除T細胞。","D":"非。與B重複之reticuloendothelial system描述。","E":"非。此為anti-CD25(basiliximab)僅作用於活化T細胞之機轉。"},"cite":"Neligan 5th Vol.1, Transplantation immunology in plastic surgery(VCA); Grabb & Smith's 9th.","conflict":""},{"id":"9106","sub":"B1","src":"NG","years":[106],"stem":"Which is not the mechanisms of negative pressure wound therapy(NPWT)?","opts":{"A":"Granulation tissue formation","B":"Reduction in edema","C":"Reduce bacterial load","D":"Improved perfusion","E":"Fluid exudate removal"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯負壓傷口治療(NPWT)機轉\n- 已證實之機轉:\n  1. Macrodeformation → 傷口收縮、促進granulation tissue formation。\n  2. Microdeformation → 細胞層次機械牽張刺激增殖與血管新生。\n  3. 移除滲液(fluid exudate removal)與水腫減少(reduction in edema)。\n  4. 改善局部灌流(improved perfusion)、穩定傷口環境。\n- 「降低細菌量(reduce bacterial load)」為具爭議且非公認之核心機轉;部分研究顯示菌量未必降低甚至部分菌種增加。","peropt":{"A":"為機轉。促進granulation tissue formation。","B":"為機轉。reduction in edema(水腫減少)。","C":"◎(非機轉/答案)。reduce bacterial load非公認核心機轉,證據具爭議。","D":"為機轉。improved perfusion(灌流改善)。","E":"為機轉。fluid exudate removal(移除滲液)。"},"cite":"Grabb & Smith's 9th, Wound Healing/NPWT; Neligan 5th Vol.1.","conflict":""},{"id":"9107","sub":"B5","src":"NG","years":[106],"stem":"下列何者不是常用的anticoagulant agents?(複選)","opts":{"A":"Lidocaine","B":"Heparinn","C":"Streptokinase","D":"Aspirin","E":"Dextra"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"🎯顯微手術常用抗凝/抗栓劑\n- 抗凝/抗血栓藥: Heparin(抗凝,活化antithrombin III)、Aspirin(抗血小板,抑制COX/TXA2)、Dextran(降低血小板凝集與血液黏稠、擴容,但過敏與肺水腫風險)。\n- 溶栓劑(thrombolytic)非抗凝劑但常於flap salvage使用: Streptokinase、Urokinase、tPA(直接溶解已形成血栓,機轉不同於抗凝)。\n- Lidocaine為局部麻醉劑,並非抗凝劑(可用於解痙)。\n- 本題答案AC: Lidocaine與Streptokinase不屬『anticoagulant』。","peropt":{"A":"◎(非抗凝劑/答案)。Lidocaine為局部麻醉劑,非抗凝。","B":"為抗凝劑。Heparin。","C":"◎(非抗凝劑/答案)。Streptokinase為溶栓劑(thrombolytic),機轉不同,非anticoagulant。","D":"為抗血小板劑(廣義抗栓)。Aspirin。","E":"為抗栓/流變劑。Dextran。"},"cite":"Grabb & Smith's 9th, Microsurgery pharmacology; Neligan 5th Vol.1 Flap monitoring/pharmacology.","conflict":""},{"id":"9108","sub":"B11","src":"NG","years":[106],"stem":"The advantages of a robotic arm include?(複選)","opts":{"A":"saving the patient the time and cost","B":"more function and cosmesis","C":"susceptibility to the elements","D":"specialized functions","E":"no stereognosis"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯機械義肢/機器手臂(robotic arm prosthesis)之優缺點\n- 優點: 節省病人時間與費用(相較多次手術/客製)、提供specialized functions(專門化功能)、以肌電/感測驅動達成更多動作。\n- 缺點/限制: 缺乏立體感覺(no stereognosis)、對環境因素敏感(susceptibility to the elements,如水、灰塵、電磁)、費用與維護、需訓練。\n- 本題答案ABD為『優點』;C與E為缺點。","peropt":{"A":"◎優點。可節省病人時間與費用。","B":"◎優點。提供更多功能與外觀(function and cosmesis)。","C":"非優點(為缺點)。susceptibility to the elements對環境敏感。","D":"◎優點。具specialized functions專門化功能。","E":"非優點(為缺點)。no stereognosis缺乏立體覺。"},"cite":"Grabb & Smith's 9th, Prosthetics/Upper extremity reconstruction; Neligan 5th Vol.6.","conflict":""},{"id":"9109","sub":"B3","src":"NG","years":[106],"stem":"Which is the Basic principles for Incision planning and implant selection?(複選)","opts":{"A":"incisions are incorporated into tissue that will become one margin of the flap","B":"the use of one large expanders is better than the use of multiple small expander","C":"tension on suture lines is reduced","D":"aesthetic units are reconstructed","E":"scars are in minimally conspicuous locations"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯組織擴張與皮瓣切口規劃基本原則\n- 切口置於將成為皮瓣邊緣之組織(incision incorporated into one margin of the flap),使疤痕隱藏於皮瓣交界。\n- 減少縫線張力(tension on suture lines reduced),提升癒合與美觀。\n- 依aesthetic units(美學單位)重建。\n- 疤痕置於不顯眼位置(minimally conspicuous locations)。\n- B選項錯誤: 並非『單一大型擴張器優於多個小型擴張器』;臨床上常依部位選用多個較小擴張器以獲更佳形狀與安全,故B非正確原則。","peropt":{"A":"◎正確原則。切口併入將成為皮瓣一側邊緣之組織。","B":"非。並非『一個大擴張器優於多個小擴張器』,此敘述不成立。","C":"◎正確原則。降低縫線張力。","D":"◎正確原則。依美學單位(aesthetic units)重建。","E":"◎正確原則。疤痕置於最不顯眼位置。"},"cite":"Neligan 5th Vol.1, Tissue expansion; Grabb & Smith's 9th, Flap design principles.","conflict":""},{"id":"9110","sub":"B3","src":"NG","years":[106],"stem":"The following flaps can be harvested with bone and cutaneous tissue, except?","opts":{"A":"Radial forearm flap","B":"Medial sural flap","C":"Groin flap","D":"Lateral arm flap","E":"Parascapular flap"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯可含骨與皮膚之骨皮瓣(osteocutaneous flap)\n- 常見骨皮瓣: Radial forearm flap(橈骨)、Fibula flap(腓骨)、Iliac crest/Groin flap(髂骨)、Lateral arm flap(肱骨外髁)、Scapular/Parascapular flap(肩胛骨)。\n- Medial sural artery perforator(MSAP)flap為腓腸內側肌之穿通枝皮瓣/肌皮瓣,不含可靠之骨組織成分,無法作為osteocutaneous flap。\n- 故本題答案為B(medial sural)。","peropt":{"A":"可含骨。Radial forearm可帶橈骨。","B":"◎(不可含骨/答案)。Medial sural flap無可靠骨成分,非骨皮瓣。","C":"可含骨。Groin flap可帶髂骨(iliac crest)。","D":"可含骨。Lateral arm flap可帶肱骨外髁骨段。","E":"可含骨。Parascapular flap可帶肩胛骨外緣。"},"cite":"Grabb & Smith's 9th, Free flaps/Osteocutaneous flaps; Neligan 5th Vol.1.","conflict":""},{"id":"9111","sub":"B3","src":"NG","years":[106],"stem":"A compound flap consists of multiple tissue components linked together in a manner that allows their simultaneous transfer. Which of the following about compound flap is true? (複選)","opts":{"A":"According to Hallock's classification, the subdivisions of compound flaps are those with a solitary source of vascularization and those with combinations of sources of vascularization.","B":"Those with a solitary source include composite flaps, defined as multiple tissue components, all served by the same single vascular supply, and thereby consisting of dependent parts.","C":"Those flaps with combinations of sources of vascularization include conjoined flaps and chimeric flaps.","D":"Conjoined flaps are defined as multiple flap territories, dependent because of some common physical junction, yet each retains its independent vascular supply.","E":"The chimeric flaps are defined as multiple flap territories, each with an independent vascular supply, and independent of any physical interconnection, except where linked by a common source vessel."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯Compound flap之Hallock分類\n- Compound flap: 多種組織成分連結、可同步轉移。\n- 依血供來源分兩大次類:\n  1. 單一血供來源(solitary source): composite flap(複合皮瓣)—多組織由同一血管供應,彼此為相依成分。\n  2. 多重血供來源組合(combinations): 含conjoined flap與chimeric flap。\n- Conjoined flap: 多個flap territory因共同物理連接而相依,但各自保有獨立血供。\n- Chimeric flap: 多個flap territory,各具獨立血供,彼此無物理連接,僅經共同source vessel相連。\n- 五項敘述皆正確,故答案ABCDE。","peropt":{"A":"◎正確。Hallock分類分為單一血供與多重血供組合兩次類。","B":"◎正確。單一血供者含composite flap,由同一血管供應之相依成分。","C":"◎正確。多重血供組合含conjoined與chimeric flaps。","D":"◎正確。Conjoined flap因共同物理連接而相依,各保有獨立血供。","E":"◎正確。Chimeric flap各具獨立血供,僅由共同source vessel相連。"},"cite":"Hallock GG, compound flap classification; Neligan 5th Vol.1 Flap classification; Grabb & Smith's 9th.","conflict":""},{"id":"9112","sub":"B7","src":"NG","years":[105,107],"stem":"The effect of local anesthesia is achieved by which mechanism?","opts":{"A":"Chemical nerve blockade","B":"Compression of the nerves","C":"Distension of the nerves","D":"Ischemia of the nerves produced by vasoconstrictors","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯局部麻醉之作用機轉(綜合)\n- 主要機轉: 化學性神經阻斷(chemical nerve blockade)—阻斷電位敏感Na+ channel,阻止動作電位傳導。\n- 次要輔助機轉(整體效果): 注射液體造成神經受壓(compression)與撐張(distension)、血管收縮劑(epinephrine)造成局部缺血(ischemia)延長並增強阻斷。\n- 故『以上皆是』最完整,答案E。","peropt":{"A":"為機轉之一。化學性神經阻斷(主要)。","B":"為機轉之一。注射造成神經受壓。","C":"為機轉之一。注射造成神經撐張。","D":"為機轉之一。血管收縮劑造成之缺血。","E":"◎正確。上述機轉綜合共同達成局麻效果(All of above)。"},"cite":"Grabb & Smith's 9th, Local anesthetics; Neligan 5th Vol.1 Anesthesia.","conflict":"⚠ 同題歷屆重出(跨中英雙語)：局部麻醉藥作用機轉＝以上皆是(chemical blockade/compression/distension/vasoconstrictor ischemia)。105年(9074,中)與107年(9112,英)答案皆E。純中英翻譯同考點。"},{"id":"9113","sub":"B7","src":"NG","years":[107],"stem":"The effect of the anesthetic depends on which factor?","opts":{"A":"The concentration of the drugs","B":"The use of epinephrine","C":"The blood supply of the area injected","D":"The thickness of the nerves","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯影響局部麻醉效果之因素\n- 藥物濃度(concentration): 濃度越高擴散與阻斷越強。\n- 是否併用epinephrine: 血管收縮延緩吸收、延長作用、降低毒性、減少出血。\n- 注射區血流(blood supply): 血流豐富區吸收快、作用短、全身毒性風險上升。\n- 神經粗細(thickness): 有髓/粗神經需較高濃度或較長時間阻斷。\n- 故答案E(以上皆是)。","peropt":{"A":"為影響因素。藥物濃度。","B":"為影響因素。是否使用epinephrine。","C":"為影響因素。注射區血流供應。","D":"為影響因素。神經粗細。","E":"◎正確。上述因素皆影響麻醉效果(All of above)。"},"cite":"Grabb & Smith's 9th, Pharmacology of local anesthetics; Neligan 5th Vol.1.","conflict":""},{"id":"9114","sub":"B11","src":"NG","years":[107],"stem":"\"Case-control study\"根據levels of evidence為level?","opts":{"A":"Level I","B":"Level II","C":"Level III","D":"Level IV","E":"Level V"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯實證醫學證據等級(Levels of Evidence, ASPS/整外)\n- Level I: 高品質RCT / systematic review of RCT。\n- Level II: 較低品質RCT、prospective cohort。\n- Level III: retrospective cohort、case-control study(回溯性比較研究)。\n- Level IV: case series。\n- Level V: expert opinion、case report、mechanism-based reasoning。\n- Case-control study屬Level III。","peropt":{"A":"非。Level I為高品質RCT/SR。","B":"非。Level II為次級RCT/前瞻cohort。","C":"◎正確。Case-control study為Level III。","D":"非。Level IV為case series。","E":"非。Level V為專家意見/case report。"},"cite":"ASPS/PRS Levels of Evidence; Grabb & Smith's 9th, Evidence-based medicine.","conflict":""},{"id":"9115","sub":"B8","src":"NG","years":[107],"stem":"下列何種方法是gene delivery ?","opts":{"A":"Direct injection of naked DNA","B":"Gene gun","C":"Microseeding","D":"Electroporation","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯基因傳遞(gene delivery)之非病毒物理法\n- 常見物理性/非病毒gene delivery:\n  1. Direct injection of naked DNA(裸DNA直接注射)。\n  2. Gene gun(基因槍,金/鎢微粒攜DNA高速轟擊)。\n  3. Microseeding(以微針多點沉積導入)。\n  4. Electroporation(電穿孔,瞬間電場增加細胞膜通透)。\n- 另有病毒載體(retrovirus、adenovirus、AAV、lentivirus)與脂質體(liposome)等。\n- 本題四者皆屬gene delivery方法,答案E。","peropt":{"A":"為方法。裸DNA直接注射。","B":"為方法。Gene gun基因槍。","C":"為方法。Microseeding。","D":"為方法。Electroporation電穿孔。","E":"◎正確。上述皆為gene delivery方法(All of above)。"},"cite":"Grabb & Smith's 9th, Tissue engineering/Gene therapy; Neligan 5th Vol.1 Regenerative medicine.","conflict":""},{"id":"9116","sub":"B11","src":"NG","years":[107],"stem":"下列有關整形外科手術拍照的key principles何者錯誤？","opts":{"A":"只要解析度一樣，相機不同沒關係","B":"快門跟光圈必須保持一樣","C":"閃光燈設備跟燈光要相同","D":"藉著靠近或者遠離病人來對焦","E":"不要改變白平衡，並且保持與藍色背景光源同步"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯整形外科臨床攝影標準化原則(standardization)\n- 為確保術前後可比性,須固定:\n  1. 相機/鏡頭與設定(非僅解析度相同即可;不同相機色彩、鏡頭焦距、失真皆不同)。\n  2. 快門與光圈固定一致。\n  3. 閃光燈與環境燈光一致。\n  4. 以移動相機/病人維持固定放大率與構圖對焦,而非變焦。\n  5. 固定白平衡與一致(藍色)背景與光源。\n- A錯誤: 『只要解析度一樣,相機不同沒關係』違反標準化,相機須一致。","peropt":{"A":"◎(錯誤/答案)。相機須一致;僅解析度相同不足以標準化,不同相機影響色彩與幾何。","B":"正確。快門與光圈須保持一致。","C":"正確。閃光燈與燈光須相同。","D":"正確。以靠近/遠離病人維持固定放大率對焦。","E":"正確。維持白平衡並與藍色背景光源同步。"},"cite":"Grabb & Smith's 9th, Clinical Photography in Plastic Surgery; Neligan 5th Vol.1.","conflict":""},{"id":"9117","sub":"B4","src":"NG","years":[107],"stem":"Who is the first one performed autologous skin graft in a ram?","opts":{"A":"Archibald Mclndoe","B":"Joseph Murray","C":"Giuseppe Baronio","D":"Paul Tessier","E":"Harold Gillies"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯整形外科史—自體皮膚移植首例\n- Giuseppe Baronio(義大利,1804)在《Degli innesti animali》中,以綿羊(ram)成功完成首例自體皮膚移植(autologous skin graft)實驗,證實自體移植可存活、異體移植排斥。\n- 其他人物: Baronio(自體移植先驅)、McIndoe(二戰燒傷/Guinea Pig Club)、Murray(1954首例腎臟移植,諾貝爾獎)、Tessier(顱顏外科之父)、Gillies(現代整形外科之父)。","peropt":{"A":"非。Archibald McIndoe為二戰燒傷重建先驅。","B":"非。Joseph Murray為首例腎移植。","C":"◎正確。Giuseppe Baronio首例於綿羊完成自體皮膚移植。","D":"非。Paul Tessier為顱顏外科之父。","E":"非。Harold Gillies為現代整形外科之父。"},"cite":"Grabb & Smith's 9th, History of Plastic Surgery; Baronio G, 1804.","conflict":""},{"id":"9118","sub":"B7","src":"NG","years":[107],"stem":"〔複選〕\n複選1. 下列關於局部麻醉相關用藥的敘述何者正確？(複選)","opts":{"A":"為了增加鎮定藥物的代謝可以使用小劑量的Atropine+ glucose solution+ Vitamin C","B":"在深層鎮定的病人，做常見的氣道阻塞原因是因為分泌物過多","C":"Tachycardia一般由於使用epinephrine或ketamine","D":"早期的藥物中毒症狀心臟早於中樞神經出現","E":"Bradycardia 很少見是由於使用epinephrine或ketamine"},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯局部麻醉/鎮靜相關用藥安全\n- 心搏過速(tachycardia): 常因epinephrine或ketamine引起(交感興奮)。\n- 心搏過緩(bradycardia): 較少由epinephrine/ketamine造成(此兩者多致心搏加速),故『bradycardia很少由epi/ketamine引起』為正確敘述。\n- 促進鎮靜藥代謝之輔助: 小劑量Atropine+glucose+Vitamin C(傳統經驗用法)—題目視為正確。\n- 深層鎮靜氣道阻塞主因: 為舌後墜/軟組織塌陷(loss of airway tone),非分泌物過多,故B錯誤。\n- 局麻毒性早期: 中樞神經(CNS)症狀早於心臟出現(先耳鳴、口周麻、抽搐,後才心血管抑制),故D錯誤。\n- 答案ACE。","peropt":{"A":"◎正確。小劑量Atropine+glucose+Vitamin C被視為促進鎮靜藥代謝之輔助用法。","B":"非(錯誤敘述)。深層鎮靜氣道阻塞主因為軟組織/舌後墜氣道張力喪失,非分泌物過多。","C":"◎正確。Tachycardia常由epinephrine或ketamine引起。","D":"非(錯誤敘述)。局麻毒性早期為CNS症狀先於心臟,而非心臟早於中樞。","E":"◎正確。Bradycardia很少由epinephrine或ketamine引起(此兩者多致心搏加速)。"},"cite":"Grabb & Smith's 9th, Local anesthesia & sedation safety; LAST management guidelines.","conflict":""},{"id":"9119","sub":"B10","src":"NG","years":[107],"stem":"複選2. 要如何處理對整形外科手術術後不滿意的病人？(複選)","opts":{"A":"病人的不滿意經常是短暫的，要讓病人抒發他的感受","B":"如果病人抱怨，馬上安排修正手術滿足病人需求","C":"不要對病人生氣，生氣只會造成反效果，甚至出現訴訟","D":"常常關心病人，讓他覺得你有在解決問題","E":"如果你認為病人的抱怨是合理的，就算沒法做得更好也要幫病人安排修正手術"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯術後不滿意病人之處置原則\n- 傾聽與同理: 不滿意常為短暫情緒,讓病人抒發感受(ventilation)。\n- 情緒管理: 醫師不可對病人生氣,以免激化甚至導致訴訟。\n- 持續關懷與追蹤: 讓病人感受到問題被重視與處理。\n- 修正手術須審慎: 不可一抱怨就立即安排修正手術(B錯誤);應待組織穩定、確認技術上可改善且合理才考慮。若抱怨合理但客觀上無法做得更好,不應盲目承諾修正手術(E錯誤)。\n- 答案ACD。","peropt":{"A":"◎正確。不滿意常短暫,應讓病人抒發感受。","B":"非(不當)。不應一抱怨即立刻安排修正手術。","C":"◎正確。不對病人生氣,避免反效果與訴訟。","D":"◎正確。持續關心,讓病人感到問題被解決。","E":"非(不當)。若客觀上無法做得更好,不應僅因合理抱怨即勉強安排修正手術。"},"cite":"Grabb & Smith's 9th, Managing the dissatisfied patient / Psychology in aesthetic surgery.","conflict":""},{"id":"9120","sub":"B10","src":"NG","years":[107],"stem":"複選3. 下列關於身體畸形恐懼症（Body dysmorphic disorder ）何者正確？(複選)","opts":{"A":"是一種強迫症(OCD)","B":"病人常常沒有病識感","C":"病人會有一些重複強迫的行為例如: 經常照鏡子，過度打扮","D":"病人常會去找整形外科醫師尋求美容手術","E":"證據顯示病人並不會因為接受美容手術而得到好處"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯身體畸形恐懼症(Body Dysmorphic Disorder, BDD)\n- 分類: 屬obsessive-compulsive and related disorders(強迫症譜系,DSM-5)。\n- 臨床: 對輕微或不存在之外觀缺陷過度先占(preoccupation),多缺乏病識感(poor insight)。\n- 重複強迫行為: 反覆照鏡、過度打扮、尋求保證、比較外觀。\n- 常求助整形外科追求美容手術(surgery-seeking)。\n- 手術結果: 證據顯示美容手術非但無益,常使症狀惡化或轉移,為美容手術相對禁忌;應轉介精神科(SSRI+CBT)。\n- 五項皆正確,答案ABCDE。","peropt":{"A":"◎正確。BDD屬強迫症(OCD)譜系。","B":"◎正確。病人常缺乏病識感。","C":"◎正確。有反覆照鏡、過度打扮等強迫行為。","D":"◎正確。常求助整形外科尋求美容手術。","E":"◎正確。證據顯示美容手術無益,甚至惡化,為相對禁忌。"},"cite":"Grabb & Smith's 9th, Psychological aspects/BDD; DSM-5; Neligan 5th Vol.1.","conflict":""},{"id":"9121","sub":"B2","src":"NG","years":[107],"stem":"有關 Scar 的特質下列何者為非？","opts":{"A":"The tensile strength of wounded skin at best only reaches approximately 80% that of unwounded skin","B":"Scar remodeling occurs for 6 months after the initial injury, complete restoration of the normal ECM architecture can be achieved.","C":"Keloids grow beyond the boundaries of the original wounds and rarely regress","D":"Keloid scar has a genetic predisposition with autosomal-dominant features.","E":"Hypertrophic scars are defined as pathologic scars that have not overgrown the original wound boundaries but are instead raised."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯疤痕(scar)生物學特質\n- 傷口皮膚張力強度(tensile strength)最終最多僅約達正常未受傷皮膚之70–80%,永不完全恢復。\n- Remodeling期可持續數月至一年以上,但ECM膠原重排『永遠無法完全恢復正常皮膚之ECM架構』—故B錯誤(『complete restoration of normal ECM architecture can be achieved』為錯)。\n- Keloid: 超越原始傷口邊界、極少自行消退、具遺傳傾向(autosomal-dominant,不完全外顯)。\n- Hypertrophic scar: 隆起但不超出原傷口邊界。","peropt":{"A":"正確。傷口皮膚張力最多約達正常之80%。","B":"◎(為非/答案)。remodeling後『可完全恢復正常ECM架構』錯誤;正常架構永不能完全復原。","C":"正確。Keloid超越原傷口邊界且極少消退。","D":"正確。Keloid有遺傳傾向,呈autosomal-dominant特徵。","E":"正確。Hypertrophic scar隆起但不超出原傷口邊界。"},"cite":"Grabb & Smith's 9th, Wound Healing & Scar; Neligan 5th Vol.1.","conflict":""},{"id":"9122","sub":"B1","src":"NG","years":[107],"stem":"Absence of which cells has severe consequences for wound healings ?","opts":{"A":"macropahges","B":"neutrophil","C":"lymphocytes.","D":"mast cells.","E":"eosinophil"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯傷口癒合中巨噬細胞(macrophage)之關鍵角色\n- Macrophage為傷口癒合『orchestrator/協調者』,缺乏之後果最嚴重:\n  1. 清除壞死組織與細菌(phagocytosis)。\n  2. 分泌生長因子(TGF-β、PDGF、VEGF、FGF)驅動纖維母細胞增生、血管新生、膠原合成。\n  3. M1(促發炎)→M2(促修復)極化調控發炎轉增生期。\n- 相較之下,neutrophil缺乏(無菌環境下)癒合仍可進行;macrophage缺乏則嚴重損害肉芽、血管新生與纖維化。\n- 答案A(macrophages)。","peropt":{"A":"◎正確。缺乏macrophage對傷口癒合後果最嚴重(協調發炎轉增生、分泌生長因子)。","B":"非。缺乏neutrophil(在無感染下)癒合仍可進行。","C":"非。lymphocyte缺乏影響較次要。","D":"非。mast cell非癒合之必要主導細胞。","E":"非。eosinophil非傷口癒合關鍵細胞。"},"cite":"Grabb & Smith's 9th, Wound Healing (inflammatory phase); Neligan 5th Vol.1.","conflict":""},{"id":"9123","sub":"B3","src":"NG","years":[107],"stem":"〔複選〕\n複選1. 關於Muscle and musculocutaneous flaps及Mathes and Nahai分類的敍述，下列何者為非?(複選)","opts":{"A":"Type I是one vascular pedicle，例如Brachioradialis，Gracilis，Trapezius，Soleus等","B":"Type II為dominant vascular pedicle and minor pedicle，例如Colon，Gastrocnemius，Tensor fascia lata，Vastus lateralis等","C":"Type III為two dominant pedicles，例如Gluteus maximus，Intercostal，Omentum，Pectoralis minor，Temporalis等","D":"Type IV為segmental vascular pedicles，例如Extensor digitorum longus，Extensor hallucis longus，Flexor digitorum longus，Flexor hallucis longus，tibialis anterior等","E":"Type V為one dominant vascular pedicle and secondary segmental vascular pedicles，例如Fibula，Internal oblique，Latissimus dorsi，Pectoralis major等"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯肌肉/肌皮瓣Mathes–Nahai血流分類\n- Type I: 單一血管蒂(one vascular pedicle),例: Tensor fascia lata、Gastrocnemius、Vastus lateralis等(非Brachioradialis/Gracilis/Trapezius/Soleus所全屬)。\n- Type II: 主蒂+次要蒂(dominant + minor),最常見型,例: Gracilis、Trapezius、Soleus、Biceps femoris等。\n- Type III: 兩個主要蒂(two dominant),例: Gluteus maximus、Rectus abdominis、Serratus、Temporalis。\n- Type IV: 節段性血管蒂(segmental),例: Sartorius、Tibialis anterior、EDL、FDL。\n- Type V: 一主蒂+次要節段蒂,例: Latissimus dorsi、Pectoralis major、Fibula、Internal oblique。\n- A、B之例證分類錯誤(將Type II肌肉誤置Type I等),故答案AB。","peropt":{"A":"◎(為非/答案)。Type I例證錯誤;Gracilis、Trapezius、Soleus實屬Type II而非Type I。","B":"◎(為非/答案)。Type II例證錯誤;所列如Colon等歸類不當,經典Type II為Gracilis/Trapezius/Soleus等。","C":"正確。Type III為two dominant pedicles,例Gluteus maximus、Temporalis等。","D":"正確。Type IV為segmental pedicles,例EDL、EHL、FDL、FHL、tibialis anterior。","E":"正確。Type V為one dominant + secondary segmental,例Latissimus dorsi、Pectoralis major、Fibula、Internal oblique。"},"cite":"Mathes & Nahai classification of muscle flaps; Grabb & Smith's 9th; Neligan 5th Vol.1.","conflict":""},{"id":"9124","sub":"B1","src":"NG","years":[107],"stem":"複選2. 關於contraction和contracture下列所述何者為非？ (複選)","opts":{"A":"Contraction 及Contracture的定義不同","B":"在臨床上Contraction定義為組織縮短變形，以致降低了關節的活動能力","C":"Contraction會發生在所有傷口，不論是open wound，還是closed surgical incisions","D":"Scar contracture是疤痕長度比原始傷口長度縮短","E":"Scar contracture有機會經由手術矯正"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯Contraction(收縮)與Contracture(攣縮)之區辨\n- Contraction: 傷口癒合『動態過程』,由myofibroblast牽引使開放性傷口面積縮小;主要發生於開放性/肉芽傷口,而非已縫合之closed surgical incision。\n- Contracture: 為攣縮之『最終固定結果』,疤痕跨越關節造成組織縮短變形、限制關節活動;可經手術(Z-plasty、皮瓣、植皮、release)矯正。\n- 選項辨誤:\n  - B錯誤: 『組織縮短變形以致降低關節活動能力』為contracture定義,非contraction。\n  - C錯誤: contraction並非發生於所有傷口;closed surgical incision不發生明顯contraction。\n  - D錯誤: 將contracture僅定義為『疤痕長度比原傷口縮短』過度簡化且不正確,contracture強調功能性固定攣縮。\n- 答案BCD。","peropt":{"A":"正確(非答案)。Contraction與contracture定義確實不同。","B":"◎(為非/答案)。『組織縮短變形降低關節活動』實為contracture之定義,非contraction。","C":"◎(為非/答案)。Contraction非發生於所有傷口;closed surgical incision不會有明顯contraction。","D":"◎(為非/答案)。將scar contracture僅定義為疤痕較原傷口縮短並不正確。","E":"正確(非答案)。Scar contracture有機會經手術(release/Z-plasty/皮瓣)矯正。"},"cite":"Grabb & Smith's 9th, Wound Healing (contraction vs contracture); Neligan 5th Vol.1.","conflict":""},{"id":"9125","sub":"B6","src":"NG","years":[107],"stem":"複選3. 按照Seddon's classification of nerve injury，Axonotmesis對應了哪幾種degree of injury？(複選)","opts":{"A":"I","B":"II","C":"III","D":"IV","E":"V"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯 Seddon vs. Sunderland 神經損傷分類對應\n\n**Seddon（1943，三分類）↔ Sunderland（1951，五分類）對照：**\n- **Neurapraxia** = Sunderland **degree I**：僅局部脫髓鞘（demyelination）/傳導阻斷（conduction block），軸突連續性完整，無 Wallerian degeneration，可完全自發恢復。\n- **Axonotmesis** = Sunderland **degree II、III、IV**：軸突（axon）中斷並發生 Wallerian degeneration，但支持結締組織不同程度保留。\n  - **degree II**：endoneurium 完整，可完全恢復（不需手術）。\n  - **degree III**：endoneurium 受損、perineurium 完整，恢復不完全（可能需手術）。\n  - **degree IV**：只剩 epineurium 連續（neuroma-in-continuity），無法自發恢復，須手術。\n- **Neurotmesis** = Sunderland **degree V**：神經完全橫斷，必須手術修復。\n- （Mackinnon 另補 **degree VI** = 混合型 mixed injury）。\n\n**考點結論**：Axonotmesis 橫跨 Sunderland II–IV → 答案 **BCD**。","peropt":{"A":"Sunderland degree I = Neurapraxia（脫髓鞘、傳導阻斷），非 Axonotmesis。","B":"◎ Sunderland degree II：軸突斷裂但 endoneurium 完整，屬 Axonotmesis 且可完全恢復。","C":"◎ Sunderland degree III：endoneurium 受損、perineurium 完整，屬 Axonotmesis。","D":"◎ Sunderland degree IV：僅 epineurium 連續，屬 Axonotmesis（severe）。","E":"Sunderland degree V = Neurotmesis（完全橫斷），非 Axonotmesis。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Ch.28 Nerve injury classification；Grabb & Smith 9e 周邊神經章 (Seddon/Sunderland classification)。","conflict":""},{"id":"9126","sub":"B3","src":"NG","years":[107],"stem":"Which one is the proven method for augmenting skin and muscle flap viability?","opts":{"A":"Xanthine oxidase inhibitor treatment (allopurinol 25 mg/ kg i.v., b.i.d.) starting 2 days before ischemia.","B":"Postoperative dextran 40 i.v., q.d. for 5 days","C":"Low-dose aspirin (40-325 mg) before the operation","D":"Surgical and vascular delay technique","E":"All above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 增進皮瓣（skin/muscle flap）存活的『已證實』方法\n\n**核心觀念：真正被人體臨床證實有效的只有 delay phenomenon（延遲現象）。**\n- **Surgical delay / vascular delay technique（外科延遲/血管延遲）**：\n  - 機轉：分次切斷部分供血 → 誘發交感神經去神經化（sympathectomy）、血管擴張、既存 choke vessels 開放、代謝適應缺氧 → 提升皮瓣可存活長度。\n  - 是唯一在 human 有一致證據支持的方法。\n- **藥物與抗凝製劑（allopurinol、dextran、aspirin）**：多屬動物實驗或缺乏一致人體證據；Dextran 40 因過敏/腎損/心衰風險，臨床多不建議常規使用。\n- 因此 A、B、C 均非『proven』，E（all above）錯誤。\n\n**考點結論**：答案 **D**。","peropt":{"A":"Xanthine oxidase inhibitor（allopurinol）→ 減少 ischemia-reperfusion 自由基屬動物實驗概念，非人體證實。","B":"術後 Dextran 40 缺乏一致證據，且併發症風險高，非 proven。","C":"低劑量 aspirin 抗血小板在皮瓣存活無一致人體實證。","D":"◎ Surgical / vascular delay technique：唯一在人體證實可增進皮瓣存活的方法。","E":"『All above』錯誤，因 A/B/C 皆非 proven。"},"cite":"Neligan 5e Vol.1 Ch.23 Flap physiology / delay phenomenon；Grabb & Smith 9e Ch. Flap physiology。","conflict":""},{"id":"9128","sub":"B9","src":"NG","years":[107],"stem":"Which is WRONG about specific toxicities and complications of radiation?","opts":{"A":"ORN is a necrotic wound manifested in irradiated bone that persists without healing for 3-6 months, in the absence of tumor recurrence.","B":"Exposure to 1 Sv increases the lifetime risk of fatal cancer by approximately 10%.","C":"Radiation can impede bone development in children, leading to limb shortening.","D":"The majority of lymphedema in breast cancer survivors is mild.","E":"Radiation-induced malignancies usually present 20-40 years after treatment."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 放射線特異毒性與併發症（哪一敘述『錯誤』）\n\n**逐項核對：**\n- **A 正確**：ORN（Osteoradionecrosis）定義為受照射骨在無腫瘤復發下持續 3–6 個月不癒合的壞死性傷口。\n- **B 錯誤（本題答案）**：ICRP 標準為每暴露 **1 Sv 約增加致死性癌症終生風險 5%**（非 10%）。此為誘答數值錯誤。\n- **C 正確**：兒童放射線可抑制骨骼發育 → 肢體/臉部發育不全、肢體縮短。\n- **D 正確**：多數乳癌存活者的淋巴水腫程度為輕度（mild）。\n- **E 正確**：放射線誘發之惡性腫瘤（radiation-induced malignancy）通常在治療後 20–40 年出現。\n\n**考點結論**：答案 **B**（5% 被寫成 10%）。","peropt":{"A":"正確：ORN = 照射骨持續 3–6 個月不癒合、無腫瘤復發之壞死傷口。","B":"◎ 錯誤：1 Sv 增加致死癌症終生風險約 5%（非 10%）。","C":"正確：放射線抑制兒童骨骼發育導致肢體縮短。","D":"正確：乳癌相關淋巴水腫多屬輕度。","E":"正確：放射誘發惡性腫瘤多在 20–40 年後出現。"},"cite":"Neligan 5e radiation therapy / complications 章；ICRP fatal cancer risk 5% per Sv。","conflict":""},{"id":"9129","sub":"B3","src":"NG","years":[107],"stem":"〔複選〕\n複選1. 有關tissue expander的使用原則，下列哪些為是？(複選)","opts":{"A":"Noncompliant or mentally impaired patients are poor candidates.","B":"Smokers have a higher risk of complications.","C":"Implants should be totally deflated after wound closure to minimize the tension of the wound.","D":"Complication rates are directly proportional to the number of expansion procedures performed.","E":"Reconstruction of major defects of the nose may be facilitated by pre-expanding the forehead skin because the color and texture of the forehead are ideally suited."},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 組織擴張器（Tissue Expander）使用原則（複選，選『正確』）\n\n**逐項核對：**\n- **A 正確**：不合作/認知障礙病患（noncompliant / mentally impaired）為不良適應症（因需長期回診注水）。\n- **B 正確**：吸菸者併發症（感染、皮膚壞死、擴張器外露）風險較高。\n- **C 錯誤**：傷口關閉後『不應』完全洩空（deflate）——保留部分容量以維持擴張的皮膚並利後續重建；完全洩空反失去擴張效益。\n- **D 正確**：併發症率與擴張手術次數/操作次數成正比。\n- **E 正確**：鼻部大缺損重建可先預擴張前額皮膚（forehead flap），因其顏色/質地最適合鼻部。\n\n**考點結論**：正確者為 **ABDE**（C 為唯一錯誤敘述）。","peropt":{"A":"◎ 不合作/認知障礙者為不良候選人。","B":"◎ 吸菸者併發症風險較高。","C":"錯誤：關閉傷口後不應完全洩空擴張器。","D":"◎ 併發症率與擴張操作次數成正比。","E":"◎ 鼻缺損可利用預擴張前額皮膚重建（forehead flap 色澤質地最佳）。"},"cite":"Neligan 5e Vol.1 Tissue expansion 章；Grabb & Smith 9e Tissue expansion principles。","conflict":""},{"id":"9130","sub":"B9","src":"NG","years":[107],"stem":"[A選項建議改內容或此題不要出]\n\n複選3. Which current immunosuppressive drugs have nephrotoxicity? (複選)","opts":{"A":"Cyclosporine","B":"Corticosteroids","C":"Mycophenolate mofetil","D":"Sirolimus","E":"Tacrolimus"},"ans":"AE","multi":true,"etype":"ai","expl":"","key":"🎯 具腎毒性（nephrotoxicity）的免疫抑制劑（複選）\n\n**核心：Calcineurin inhibitors（CNIs）為典型腎毒性藥物。**\n- **A Cyclosporine（環孢素）**：CNI，典型腎毒性（入球小動脈收縮、慢性間質纖維化）。\n- **E Tacrolimus（FK506）**：CNI，同樣具腎毒性（另有神經毒/糖尿病風險）。\n- **B Corticosteroids**：無腎毒性（副作用為高血糖、骨鬆、傷口癒合不良）。\n- **C Mycophenolate mofetil（MMF）**：無腎毒性（主要為腸胃道與骨髓抑制）。\n- **D Sirolimus（rapamycin, mTOR inhibitor）**：非典型腎毒性（主要副作用為高血脂、蛋白尿、傷口癒合不良）。\n\n**考點結論**：答案 **AE**（兩個 CNIs）。\n（原檔 A 選項為考生建議保留項，答案不受影響。）","peropt":{"A":"◎ Cyclosporine：CNI，典型腎毒性。","B":"Corticosteroids：無腎毒性。","C":"MMF：主要腸胃道/血液毒性，非腎毒性。","D":"Sirolimus（mTOR i）：主要高血脂/蛋白尿/傷口癒合差，非典型腎毒性。","E":"◎ Tacrolimus：CNI，具腎毒性。"},"cite":"Neligan 5e transplant immunology / VCA 章；免疫抑制劑藥理（CNI nephrotoxicity）。","conflict":""},{"id":"9131","sub":"B4","src":"NG","years":[104,107],"stem":"複選2. The basic principles of conventional free bone grafting are as follows, which are the correct ones? (複選)","opts":{"A":"bone-to-bone contact must be established to facilitate creeping substitution","B":"require a well-vascularized bed","C":"free of underlying infection","D":"there should be consistent, slight motion at the fracture site","E":"bony defects should be kept at 5~6 cm or less in length"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 傳統（非血管化）游離骨移植的基本原則（複選，選『正確』）\n\n**逐項核對：**\n- **A 正確**：須建立 bone-to-bone contact 以利 creeping substitution（爬行替代）。\n- **B 正確**：需要良好血管化的受床（well-vascularized bed）。\n- **C 正確**：受區須無感染（infection 為骨移植失敗主因）。\n- **D 錯誤**：骨折/移植部位應為『剛性固定、無動作』；持續微動（consistent slight motion）會妨礙骨癒合、促成纖維聯合。\n- **E 正確**：非血管化骨移植的骨缺損應控制在約 5–6 cm 以下；超過此長度應改用血管化骨移植（vascularized bone flap）。\n\n**考點結論**：正確者為 **ABCE**（D 錯）。\n⚠ 提醒：不同版本題幹對缺損臨界長度數值有差異（跨版本 conflict），但不影響 D 為錯誤、答案 ABCE。","peropt":{"A":"◎ 須 bone-to-bone contact 以利 creeping substitution。","B":"◎ 需良好血管化受床。","C":"◎ 須無底下感染。","D":"錯誤：應剛性固定、無微動；持續微動妨礙骨癒合。","E":"◎ 非血管化骨移植缺損宜 ≤5–6 cm，超過改血管化骨瓣。"},"cite":"Neligan 5e bone graft / bone healing 章；Grabb & Smith 9e bone graft principles。","conflict":"跨年數值差異（Neligan 3e vs Neligan 3e）：題幹數值不同 ｜ ⚠ 同題歷屆重出：conventional free bone grafting基本原則(複選)，選項逐字相同(僅9131多『複選2.』前綴)。104年(9071)與107年(9131)答案皆ABCE(D錯:應為no motion/rigid fixation)。"},{"id":"9132","sub":"B11","src":"NG","years":[108],"stem":"Evidence-based medicine中，證據等級共分五級，其中Randomized controlled trial為第幾級","opts":{"A":"Level I","B":"Level II","C":"Level III","D":"Level IV","E":"Level V"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 實證醫學（EBM）證據等級——RCT 屬第幾級\n\n**Level of Evidence（Sackett/常用五級制，以治療性研究為例）：**\n- **Level I**：高品質 **Randomized Controlled Trial（RCT）**（或其系統性回顧/meta-analysis of RCTs）——證據力最高。\n- **Level II**：品質較低的 RCT 或前瞻性世代研究（prospective cohort）。\n- **Level III**：病例對照研究（case-control）/回溯性世代。\n- **Level IV**：病例系列（case series）。\n- **Level V**：專家意見（expert opinion）/機轉推論。\n\n**考點結論**：RCT = **Level I** → 答案 **A**。","peropt":{"A":"◎ Level I：高品質 RCT（及其 meta-analysis），證據力最高。","B":"Level II：低品質 RCT 或前瞻世代研究。","C":"Level III：case-control / 回溯世代。","D":"Level IV：case series。","E":"Level V：專家意見。"},"cite":"Neligan 5e Evidence-based medicine 章；Grabb & Smith 9e EBM levels of evidence。","conflict":""},{"id":"9133","sub":"B8","src":"NG","years":[108],"stem":"關於stem cell之特性，下述哪三個正確? (複選)","opts":{"A":"Self-renewal","B":"Clonality","C":"Differentiation potential","D":"Apoptosis","E":"Auto-regulation"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"🎯 幹細胞（Stem Cell）之定義性特性（複選，選『三個正確』）\n\n**幹細胞三大核心特性：**\n- **A Self-renewal（自我更新）**：能對稱/不對稱分裂維持自身幹細胞池。\n- **B Clonality（單株性）**：能由單一細胞衍生出整個細胞族群（clonogenic）。\n- **C Differentiation potential（分化潛能）**：能分化為一種或多種成熟細胞型（potency）。\n- **D Apoptosis（細胞凋亡）**：為一般細胞死亡機轉，非幹細胞定義特性。\n- **E Auto-regulation**：非幹細胞的標準定義特性。\n\n**考點結論**：答案 **ABC**。","peropt":{"A":"◎ Self-renewal：自我更新能力。","B":"◎ Clonality：單一細胞可衍生族群。","C":"◎ Differentiation potential：分化潛能。","D":"Apoptosis：細胞凋亡，非幹細胞定義特性。","E":"Auto-regulation：非標準幹細胞定義特性。"},"cite":"Neligan 5e Stem cells & regenerative medicine 章；Grabb & Smith 9e tissue engineering/stem cell。","conflict":""},{"id":"9134","sub":"B11","src":"NG","years":[108],"stem":"關於Plastic Surgery照相使用之背景顏色，以下哪兩種較佳? (複選)","opts":{"A":"Medium Blue","B":"18% Gray","C":"Light Yellow","D":"Dark Green","E":"Light green"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯 整形外科臨床攝影（clinical photography）之背景顏色\n\n**理想背景需中性、不反光、不干擾膚色判讀：**\n- **A Medium Blue（中藍）**：最常推薦，與膚色/紅色病灶對比佳、不造成色偏。\n- **B 18% Gray（18% 中灰）**：攝影標準中性灰，測光基準、色彩最中性，利於標準化與白平衡。\n- Light Yellow / Dark Green / Light green 皆會造成色偏或膚色判讀干擾，非理想背景。\n\n**考點結論**：答案 **AB**。","peropt":{"A":"◎ Medium Blue：最常用理想背景色。","B":"◎ 18% Gray：攝影標準中性灰，利標準化與白平衡。","C":"Light Yellow：造成暖色偏，干擾膚色判讀。","D":"Dark Green：非標準背景，干擾判讀。","E":"Light green：非標準背景，色偏。"},"cite":"Neligan 5e / Grabb & Smith 9e clinical photography 章（背景色建議 medium blue 或 18% gray）。","conflict":""},{"id":"9135","sub":"B11","src":"NG","years":[108],"stem":"關於全臉(full face)之照相紀錄，以下何者不是5個standard views之一:","opts":{"A":"Posterior-Anterior (PA) view","B":"Right Oblique view","C":"Right lateral view","D":"Left Oblique view","E":"Left lateral view"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 全臉（full face）標準攝影 5 個 standard views\n\n**標準五視角（five standard facial views）：**\n1. **Frontal / Anterior-Posterior（AP）view（正面）**\n2. **Right lateral view（右側面）**\n3. **Left lateral view（左側面）**\n4. **Right oblique view（右斜 45°）**\n5. **Left oblique view（左斜 45°）**\n\n**題目問『何者不是』：Posterior-Anterior（PA）view 並非標準臉部視角**（標準為 AP/frontal，非 PA；PA 為放射學/胸部術語）。\n\n**考點結論**：答案 **A**。","peropt":{"A":"◎ Posterior-Anterior（PA）view 非標準臉部視角（標準為 AP/frontal）。","B":"Right Oblique view 為 5 標準視角之一。","C":"Right lateral view 為標準視角之一。","D":"Left Oblique view 為標準視角之一。","E":"Left lateral view 為標準視角之一。"},"cite":"Neligan 5e / Grabb & Smith 9e facial photography standard views。","conflict":""},{"id":"9136","sub":"B7","src":"NG","years":[108],"stem":"抽脂手術打入的wetting solution約有多少比例不會被抽脂抽掉，而會留在adipose tissue後續再進入central circulation","opts":{"A":"1%","B":"5%","C":"20%","D":"70%","E":"99%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 抽脂（liposuction）wetting solution 之殘留與吸收\n\n**核心數值：打入的濕潤液（wetting solution，含 lidocaine + epinephrine）約 70% 不會被抽出，殘留於脂肪組織後緩慢進入中央循環（central circulation）。**\n- 僅約 **30%** 隨抽吸物（aspirate）被移除。\n- 約 **70%** 留在脂肪組織，日後才被吸收 → 這也是 lidocaine 血中濃度高峰延遲（術後 8–12 小時甚至更晚）、須注意 tumescent lidocaine 累積毒性的原因。\n- 攸關手術安全（BAS）——大量抽脂須計算 lidocaine 總劑量（tumescent 可達 35–55 mg/kg）與體液平衡。\n\n**考點結論**：答案 **D（70%）**。","peropt":{"A":"1%：過低，與臨床藥動不符。","B":"5%：過低。","C":"20%：低估殘留量。","D":"◎ 70%：約 70% 濕潤液殘留脂肪組織後續進入循環。","E":"99%：過高，約 30% 隨抽吸物移除。"},"cite":"Neligan 5e liposuction / body contouring 章（wetting solution ~70% retained）；tumescent lidocaine 藥動。","conflict":""},{"id":"9137","sub":"B7","src":"NG","years":[108],"stem":"執行局部麻醉技術時，下列何種技巧可以減低病患疼痛感? (複選)","opts":{"A":"Buffer lidocaine and epinephrine with 8.4% sodium","B":"Warm the local anesthetic bicarbonate","C":"Use larger needles","D":"Use Smaller needles","E":"Always reinsert needles within 1 cm of blanched areas"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 局部麻醉（local anesthesia）減痛技巧（複選，選正確）\n\n**降低注射疼痛的實證技巧：**\n- **A 正確**：以 **8.4% sodium bicarbonate 緩衝** lidocaine/epinephrine，提高 pH → 減少注射灼痛（酸性 anesthetic 是痛感主因）。\n- **B 正確**：**加溫**局麻藥（warm the local anesthetic）至體溫可減少疼痛。\n- **C 錯誤**：使用『較大』針頭會增加疼痛。\n- **D 正確**：使用**較小口徑針頭**（smaller needle, e.g. 27–30G）減痛。\n- **E 正確**：後續進針點應在**已泛白（blanched）已麻醉區域 1 cm 內**重新進針，利用已麻醉區減痛。\n\n**考點結論**：答案 **ABDE**（C 錯）。\n（註：A、B 選項文字似有斷句錯置，語意仍為『以碳酸氫鈉緩衝』及『加溫局麻藥』。）","peropt":{"A":"◎ 以 8.4% NaHCO3 緩衝局麻藥提高 pH → 減注射痛。","B":"◎ 加溫局麻藥至體溫可減痛。","C":"錯誤：較大針頭增加疼痛。","D":"◎ 使用較小口徑針頭減痛。","E":"◎ 於已泛白/已麻醉區 1 cm 內重新進針減痛。"},"cite":"Neligan 5e / Grabb & Smith 9e local anesthesia techniques（buffering, warming, small needle）。","conflict":""},{"id":"9138","sub":"B7","src":"NG","years":[108],"stem":"使用Lidocaine+ Epinephrine做局部麻醉時，上限劑量為多少?","opts":{"A":"0.7 mg/kg","B":"7 mg/kg","C":"17 mg/kg","D":"27 mg/kg","E":"37 mg/kg"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 Lidocaine + Epinephrine 局部麻醉上限劑量\n\n**最大安全劑量（maximum safe dose）：**\n- **Lidocaine 純（不含 epinephrine）**：約 **4.5 mg/kg**（常記 3–5 mg/kg）。\n- **Lidocaine + Epinephrine**：約 **7 mg/kg**（epinephrine 血管收縮 → 減緩吸收 → 可用較高劑量）。\n- （抽脂 tumescent 技術為特例，因大量稀釋與 70% 殘留，可達 35–55 mg/kg。）\n\n**考點結論**：答案 **B（7 mg/kg）**。","peropt":{"A":"0.7 mg/kg：過低。","B":"◎ 7 mg/kg：lidocaine + epinephrine 標準上限。","C":"17 mg/kg：過高（非一般浸潤上限）。","D":"27 mg/kg：過高。","E":"37 mg/kg：接近 tumescent 特例範圍，非一般上限。"},"cite":"Neligan 5e / Grabb & Smith 9e local anesthetics 最大劑量（lidocaine w/ epi 7 mg/kg）。","conflict":""},{"id":"9139","sub":"B7","src":"NG","years":[108],"stem":"Lidocaine使用超過上限劑量發生isolated neurologic event(如Seizures) 可使用何種藥物治療","opts":{"A":"benzodiazepines","B":"Morphine","C":"Calcium channel blocker","D":"Epinephrine","E":"Anti-histamine"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 Local anesthetic systemic toxicity（LAST）——孤立性神經事件（seizure）之處置\n\n**Lidocaine 過量之毒性進程：CNS（耳鳴、口周麻木、躁動 → 抽搐 seizure）先於 CVS（心律不整、心跳停止）。**\n- **孤立性 seizure**：首選 **Benzodiazepines（如 midazolam / lorazepam）** 終止抽搐、抬高癲癇閾值，且對心血管抑制最小。\n- 支持性照護：確保氧合與通氣（airway/oxygenation）。\n- 若進展至心血管崩潰：**Lipid emulsion（20% intralipid）** 為特異解毒。\n- （避免使用大量 propofol 於血流動力不穩者。）\n\n**考點結論**：答案 **A（benzodiazepines）**。","peropt":{"A":"◎ Benzodiazepines：孤立性 LAST 抽搐首選（提高癲癇閾值、心血管抑制小）。","B":"Morphine：無抗抽搐作用，且抑制呼吸。","C":"Calcium channel blocker：非抽搐處置，且惡化 LAST 心臟毒性。","D":"Epinephrine：非抽搐首選（大劑量反不利，用於循環崩潰復甦）。","E":"Anti-histamine：無關抽搐處置。"},"cite":"Neligan 5e / ASRA LAST guideline（benzodiazepine for seizure；lipid emulsion for CV collapse）。","conflict":""},{"id":"9140","sub":"B7","src":"NG","years":[108],"stem":"Opioid therapy 用於手術止痛時，以下何者會增加Opioid adverse effect風險?","opts":{"A":"Obstructive sleep apnea","B":"Obesity","C":"Elderly","D":"Patients with chronic opioid therapy","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 手術止痛 Opioid therapy——增加不良反應（尤其呼吸抑制）風險族群\n\n**增加 opioid adverse effect（呼吸抑制、鎮靜過度）風險的因子：**\n- **A 阻塞性睡眠呼吸中止（OSA）**：上呼吸道易塌陷 + opioid 抑制呼吸驅動 → 高危。\n- **B 肥胖（obesity）**：常合併 OSA/低通氣，風險升高。\n- **C 高齡（elderly）**：藥物清除下降、對 opioid 敏感度增加。\n- **D 慢性 opioid 使用者**：耐受性/痛覺過敏、劑量調控複雜，不良反應與過量風險上升。\n- **E All of above**：以上皆是。\n\n**考點結論**：答案 **E**。","peropt":{"A":"OSA：呼吸抑制高危族群。","B":"Obesity：常合併 OSA/低通氣，風險升高。","C":"Elderly：藥物清除下降、敏感度增加。","D":"慢性 opioid 使用者：耐受/過敏，不良反應風險高。","E":"◎ All of above：以上皆增加 opioid 不良反應風險。"},"cite":"Neligan 5e perioperative pain / opioid safety 章。","conflict":""},{"id":"9141","sub":"B4","src":"NG","years":[108],"stem":"About bone repair and bone graft, which of following statements is/are correct?\n\na. The purpose of reduction of fracture fragments to anatomic position and rigid fixation is for callus bone repair to occur.\n\nb. Iliac crest is one of typical sources of cortical bone grafts.\n\nc. Iliac crest is one of typical sources of cancellus bone grafts.\n\nd. Cancellous bone grafts are more quickly incorporated and revascularized and are indicated in nonstress-bearing areas less than 6cm.\n\ne. Incorporation of cortical bone graft relies on plasmatic imbibition and creeping substitution, and cortical grafts provide immediate structural support.","opts":{"A":"abcde","B":"bcde","C":"cde","D":"bde"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 骨修復與骨移植（bone repair & bone graft）——選『正確』組合\n\n**逐項核對（答案 B = bcde，故 a 為錯）：**\n- **a 錯誤**：將骨折片解剖復位並剛性固定（rigid fixation）的目的是達成『直接/一級骨癒合（primary/direct bone healing，無 callus）』，而『非』callus（骨痂）修復；callus 形成見於相對穩定/有微動的二級癒合。\n- **b 正確**：髂骨嵴（iliac crest）為皮質骨（cortical bone graft）典型來源之一。\n- **c 正確**：髂骨嵴亦為海綿骨（cancellous bone graft）典型來源之一。\n- **d 正確**：海綿骨移植血管化與整合較快，適用於非承重區、缺損 <6 cm。\n- **e 正確**：皮質骨移植整合靠 plasmatic imbibition + creeping substitution，且提供『立即結構支撐』。\n\n**考點結論**：答案 **B（bcde）**。","peropt":{"A":"abcde：含 a（錯述 callus 目的），不選。","B":"◎ bcde：b/c/d/e 皆正確，a 錯。","C":"cde：漏掉正確的 b。","D":"bde：漏掉正確的 c（髂骨亦為海綿骨來源）。"},"cite":"Neligan 5e bone graft & healing 章（primary vs secondary bone healing；cortical vs cancellous graft）。","conflict":""},{"id":"9142","sub":"B6","src":"NG","years":[108],"stem":"About nerve repair and regeneration, which of following statements is/are correct?\n\na. In stretch and avulsion injuries, the nerves tend to be avulsed around areas of tethering, such as bony foramina or the spinal cord. If the proximal nerve is not accessible, grafting of the nerve is needed..\n\nb. If nerve injury is resulted by a sharp penetration, the injury should be explored within 72 hours.\n\nc. In blunt penetration and blast injuries, local tissue edema may cause a neurapraxia, which has potential for spontaneous recovery. Therefore, serial clinical examination and electrodiagnostic studies are considered.\n\nd. Crush injuries may cause a temporary neurapraxia. The greater compression is the more likelihood of a permanent injury. Exploration is warranted if there is no evidence of recovery in the form of motor unit potentials (MUPs) by 3 to 4 months.\n\ne. Once Wallerain degeneration occurs, the electrodiagnostic signs of an axontmetic injury, particularly fibrillations and positive sharp waves present.","opts":{"A":"abcde","B":"bcde","C":"abde","D":"be"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 神經修復與再生（nerve repair & regeneration）——選『正確』組合\n\n**逐項核對（答案 B = bcde，故 a 為錯）：**\n- **a 錯誤**：拉扯/撕脫傷（stretch/avulsion）中神經常於固定點（bony foramina、脊髓）被撕脫；若近端不可及，處理應為『神經轉位（nerve transfer）』而非單純 grafting——原敘述將處置窄化為 grafting，故判為錯。\n- **b 正確**：銳器穿刺（sharp penetration）造成之神經橫斷應於 **72 小時內探查/一期修復**。\n- **c 正確**：鈍性穿刺/爆震傷（blunt/blast）局部水腫可致 neurapraxia，有自發恢復潛能 → 採連續臨床檢查 + 電生理追蹤。\n- **d 正確**：壓砸傷（crush）可致暫時 neurapraxia，壓力越大永久損傷可能越高；若 3–4 個月無 MUP 恢復跡象則須探查。\n- **e 正確**：Wallerian degeneration 發生後，axonotmesis 之電生理表現（fibrillations、positive sharp waves）出現。\n\n**考點結論**：答案 **B（bcde）**。","peropt":{"A":"abcde：含 a（撕脫傷處置窄化為 grafting，未提 nerve transfer），不選。","B":"◎ bcde：b/c/d/e 皆正確。","C":"abde：含錯誤 a、漏正確 c。","D":"be：漏掉正確的 c、d。"},"cite":"Neligan 5e Vol.1 nerve injury/repair 章（sharp injury 72h 探查；MUP 3–4 個月追蹤；Wallerian degeneration 電生理）。","conflict":""},{"id":"9143","sub":"B3","src":"NG","years":[108],"stem":"The perforasome theory by Saint-Cyr reported four major characteristics of a perforator flap, which can clinically guide to the harvest of a safer free or pedicle perforator flap. Which of the following statement is incorrect?","opts":{"A":"Each perforasome is linked with adjacent perforasomes by means of direct and indirect linking vessels.","B":"Flap design and skin paddle orientation should be based on the direction of the linking vessels, which is axial in the extremities and perpendicular to the midline in the trunk.","C":"Filling of the perforasomes occurs within perforasomes of the same source artery first followed by perforators of the other adjacent source arteries.","D":"Mass vascularity of a perforator found adjacent to an articulation is
