<!DOCTYPE html>
<html lang="zh-Hant"><head>

<title>BAS 基礎 · 整外專科考古題</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}
</style></head><body>

<script>
const DATA=[{"id":"9000","sub":"B5","src":"GS","years":[107,110],"stem":"下列何者與顯微手術的失敗率有關？","opts":{"A":"糖尿病","B":"吸煙者","C":"過重","D":"年齡大於65歲","E":"年齡小於18歲"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【顯微游離皮瓣失敗之危險因子】\n- 現代大型系列(如Nahabedian、Kroll)分析free flap failure，需區分「全皮瓣壞死(total flap loss)」與「傷口/局部併發症」。\n- 全身性因子中，肥胖／過重(obesity/overweight, BMI↑)被多數研究列為與皮瓣失敗及傷口併發症獨立相關：微血管環境不良、脂肪組織灌流差、血栓與感染風險↑。\n- 糖尿病、高齡本身多與「傷口癒合／內科併發症」相關，但對「單純皮瓣存活」的獨立影響在文獻中較弱或不一致。\n- 吸菸主要影響末梢皮膚灌流與傷口癒合(skin necrosis)，但對已完成吻合之游離皮瓣「總壞死率」的關聯，數個系列顯示未達統計顯著。\n- 本題以權威答案C(過重)為準。","peropt":{"A":"糖尿病主要與傷口癒合及內科併發症相關，對單純皮瓣存活的獨立影響較弱。","B":"吸菸影響末梢皮膚灌流與傷口癒合，但對游離皮瓣總壞死率的關聯文獻常未達顯著。","C":"◎過重／肥胖為皮瓣失敗與傷口併發症之獨立危險因子，本題正解。","D":"年齡大於65歲多反映共病，非皮瓣失敗之獨立決定因子。","E":"年齡小於18歲與皮瓣失敗率無明確正相關。"},"cite":"Neligan Vol.1 Microsurgery; Grabb & Smith Ch. free tissue transfer","conflict":"⚠ 同題歷屆重出(跨中英雙語)：影響顯微手術成敗/血管通暢之患者因子＝obesity(過重)。干擾項不同(9000:糖尿病/吸菸/年齡；9127:age/smoking/2:1 mismatch/all)但正解一致；107年(9127,英)答C、110年(9000,中)答C皆指肥胖。"},{"id":"9002","sub":"B2","src":"GS","years":[110,113],"stem":"比較肥厚性疤痕(Hypertrophic Scar)與蟹足腫，下列何者為是？","opts":{"A":"肥厚性疤痕組織的Transforming growth factor beta(TGF-beta)含量低。","B":"蟹足腫組織的Transforming growth factor beta(TGF-beta)含量高。","C":"嚴重燒傷或創傷是導致蟹足腫最常見的原因。","D":"傷口長時間癒合不良不會導致肥厚性疤痕的產生。","E":"肥厚性疤痕病患常伴有家族病史。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【肥厚性疤痕(HTS) vs 蟹足腫(Keloid)之鑑別】\n- Keloid特徵：TGF-β↑↑、膠原過度堆積且「超越原始傷口界線」、好發張力區(耳垂、前胸、肩)、深膚色與家族史相關、復發率高。\n- HTS特徵：侷限於原傷口界線、常見於燒傷／張力／傷口延遲癒合、可隨時間自行變平。\n- 記憶要點：家族史、超越界線、對放射／類固醇反應差 → 偏Keloid。","peropt":{"A":"HTS的TGF-β並非偏低，其纖維化亦與TGF-β上調相關，敘述錯誤。","B":"◎Keloid組織TGF-β含量高，符合其過度纖維化機轉，正解。","C":"嚴重燒傷／創傷是「肥厚性疤痕」常見成因，而非蟹足腫，敘述錯誤。","D":"傷口長期癒合不良正是HTS的重要成因，敘述錯誤。","E":"家族史為蟹足腫的特徵，非典型肥厚性疤痕，敘述錯誤。"},"cite":"Neligan Vol.1 Scar; Grabb & Smith Ch. Wound Healing/Scar","conflict":""},{"id":"9003","sub":"B3","src":"GS","years":[110,113],"stem":"依據Mathes and Nahai 五種肌肉血流供應的分類，下列何者為非？","opts":{"A":"Tensor fascia lata 是Type I。","B":"Gracilis是Type II，Gluteus maximus 是Type III。","C":"Sartorius 的血流供應主要是來自兩個dominant pedicles，故屬於Type IV。","D":"Gluteus maximus 的血流供應主要是來自兩個dominant pedicles，故屬於Type III。","E":"Latissimus dorsi 的血流供應包括一個dominant pedicle和一個secondary segmental pedicle。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Mathes-Nahai 肌肉血流五分類】\n- Type I：單一血管蒂(TFL、gastrocnemius)。\n- Type II：主血管蒂＋次要小蒂(gracilis、soleus)——最常見型。\n- Type III：兩個dominant pedicles(gluteus maximus、rectus abdominis)。\n- Type IV：多條分段式(segmental)血管蒂(sartorius、tibialis anterior)——非「兩條主蒂」。\n- Type V：一個dominant pedicle＋數條secondary segmental(latissimus dorsi、pectoralis major)。\n- 本題問「何者為非」。","peropt":{"A":"TFL為Type I(單一血管蒂)，正確。","B":"Gracilis為Type II、Gluteus maximus為Type III，正確。","C":"◎Sartorius確屬Type IV，但其為『多條分段式(segmental)』供應，非『兩個dominant pedicles』，敘述錯誤，為本題正解。","D":"Gluteus maximus由上、下臀動脈兩個dominant pedicle供應，屬Type III，正確。","E":"Latissimus dorsi為一dominant＋secondary segmental(Type V)之描述，正確。"},"cite":"Mathes & Nahai classification; Grabb & Smith Ch. Muscle Flaps","conflict":""},{"id":"9004","sub":"B3","src":"GS","years":[110,111],"stem":"以下關於組織瓣(flap)的敘述何者為真?","opts":{"A":"螺旋槳皮瓣(propeller flap)的血管穿通枝位置的選擇，宜盡量遠離重建缺損部位，以得到皮瓣較大的旋轉角度(angle of rotation)，減少血管根蒂的張力。","B":"關鍵石皮瓣(keystone flap)在設計時，皮瓣的尺寸往往比缺損面積大。而整塊皮瓣周圍都與鄰近皮膚切開時，可以增加皮瓣的移動自由度。","C":"自由形式皮瓣(free style flap)在設計時比較隨興，通常不需要使用儀器探測穿通枝血管。","D":"橈側前臂皮瓣(radial forearm flap)無法設計成為帶骨皮膚筋膜皮瓣(osteo-fasciocutaneous flap)。","E":"胸大肌在肌肉血管分類上是屬於第四類的肌肉瓣，為多處分段式(multiple segmental)血流供應"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【現代皮瓣設計原理綜整】\n- Propeller flap：以穿通枝為軸旋轉，穿通枝宜「靠近缺損」以減少張力並利旋轉，非愈遠愈好。\n- Keystone flap：設計常大於缺損，四周切開釋放可增加移動度(隨VY推進原理)。\n- Freestyle flap：仍須以Doppler/影像定位穿通枝，非隨興不探測。\n- Radial forearm：可帶橈骨設計為osteo-fasciocutaneous flap。\n- Pectoralis major：屬Type V(胸肩峰動脈主蒂＋分段)，非Type IV。","peropt":{"A":"propeller穿通枝應靠近缺損以降低張力，『遠離』之敘述錯誤。","B":"◎keystone皮瓣常大於缺損，周邊切開可增加移動自由度，正解。","C":"freestyle仍需儀器探測穿通枝，敘述錯誤。","D":"radial forearm可帶橈骨成骨皮膚筋膜瓣，敘述錯誤。","E":"胸大肌屬Type V而非Type IV，敘述錯誤。"},"cite":"Neligan Vol.1 Perforator/Local Flaps","conflict":""},{"id":"9006","sub":"B6","src":"GS","years":[110,111],"stem":"有關principles of nerve repair，以下何者錯誤?","opts":{"A":"須盡量達到Tension-free","B":"精細的顯微外科技術及縫合","C":"可考慮使用nerve graft","D":"目前研究顯示，在大部分的情況下interfascicular fascicular repair 較epineural suture techniques 好","E":"於受傷區域的神經can be mobilized"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【周邊神經修復原則(Principles of Nerve Repair)】\n- 核心目標：無張力(tension-free)、精準對合fascicle、顯微技術。\n- 缺損過大時可用nerve graft(如sural nerve)或conduit。\n- 受傷區神經可適度游離(mobilization)以達無張力。\n- 實證重點：多數研究並「未」證實interfascicular(group fascicular)修復優於epineural suture；除非有明確的運動/感覺束分群需求，否則epineural repair仍為標準。","peropt":{"A":"無張力修復為基本原則，正確。","B":"精細顯微縫合為標準技術，正確。","C":"缺損可用nerve graft重建，正確。","D":"◎多數研究未顯示interfascicular修復優於epineural，敘述錯誤，為本題正解。","E":"受傷區神經可適度游離以達無張力，正確。"},"cite":"Neligan Vol.6 Peripheral Nerve; Grabb & Smith Ch. Nerve Repair","conflict":""},{"id":"9008","sub":"B6","src":"GS","years":[110,111],"stem":"Regarding nerve repair, choose the correct descriptions (複選)","opts":{"A":"Acute nerve transection injuries are best treated with primary, tensionless repair.","B":"Autologous nerve grafts are the most reliable method to reconstruct segmental nerve gaps.","C":"Electrodiagnostic studies (EMG/NCV) can be used to help diagnose nerve injuries as well as track nerve regeneration.","D":"Restoring appropriate alignment of corresponding fascicles in the proximal and distal nerve segments is important for optimizing outcomes in primary neurorrhaphy.","E":"In crush or avulsion nerve lesions where the zone of nerve injury is unclear, the viability of injured nerve should be allowed to demarcate before definitive reconstruction is attempted."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【神經修復要點(複選)】\n- 急性完全橫斷(sharp transection)：首選一期無張力吻合(primary tensionless repair)。\n- 節段性缺損：autologous nerve graft為最可靠重建。\n- 電生理(EMG/NCV)：協助診斷神經損傷並追蹤再生(如Tinel前進、運動單位再現)。\n- 束對合(fascicular alignment)對神經吻合預後至關重要。\n- 壓砸/撕脫傷(crush/avulsion)損傷帶不明時，應待損傷區demarcation再行確定性重建。\n- 五項全正確。","peropt":{"A":"◎急性橫斷首選一期無張力修復，正確。","B":"◎自體神經移植為節段缺損最可靠方法，正確。","C":"◎EMG/NCV可診斷並追蹤神經再生，正確。","D":"◎近遠端對應束的正確對合可優化預後，正確。","E":"◎壓砸/撕脫傷宜待損傷區demarcation再確定重建，正確。"},"cite":"Neligan Vol.6 Peripheral Nerve","conflict":""},{"id":"9009","sub":"B7","src":"GS","years":[110],"stem":"About the preoperative screening for coagulation disorders, which of the statement below is right?","opts":{"A":"History should guide preoperative testing for bleeding or coagulation disorders.","B":"Routine screening laboratory tests do not necessarily correlate with clinical findings and therefore may only confound the picture.","C":"A history of bruising, bleeding, or thromboembolism should prompt further investigation.","D":"Patients with a known hypocoagulable or hypercoagulable disorder should be referred to a hematologist","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【術前凝血功能篩檢原則】\n- 病史(history)是引導篩檢的核心：出血傾向、瘀青、血栓栓塞史應觸發進一步檢查。\n- 常規(routine)凝血檢驗與臨床出血風險相關性差，缺乏病史支持時反易造成假陽性混淆。\n- 已知低／高凝血狀態者，應轉介血液科(hematologist)評估與周術期橋接。\n- 五敘述皆正確，故選E(以上皆是)。","peropt":{"A":"病史應主導術前出血/凝血篩檢，正確。","B":"常規實驗室篩檢未必反映臨床，可能徒增混淆，正確。","C":"瘀青/出血/血栓史應觸發進一步檢查，正確。","D":"已知凝血異常者應轉介血液科，正確。","E":"◎以上皆是，為本題正解。"},"cite":"Neligan Vol.1 Patient Safety/Preoperative Evaluation","conflict":""},{"id":"9010","sub":"B11","src":"GS","years":[110],"stem":"Which statement is wrong about the principles of photography in plastic surgery?","opts":{"A":"High-quality photography is critical in the presentation of surgical outcomes, assurance of standards, and advancement of surgical education","B":"The key to great medical photography is consistency—taking every photograph the exact same way every time.","C":"After multiple tests of different background colors, the Clinical Photography Committee has decided that a sky blue background is the most visually pleasing","D":"Defining and promoting a standardized set of guidelines when shooting different areas of interest on the body promotes effective analyses and comparison of outcomes.","E":"None of the above is wrong"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【整外臨床攝影原則】\n- 高品質攝影對成果呈現、標準化與教育至關重要。\n- 一致性(consistency)為醫學攝影核心：相同角度、距離、光源、背景、姿勢。\n- 標準化拍攝指引利於客觀分析與前後比較。\n- 依委員會測試，天空藍(sky blue)背景被認為最具視覺舒適度與對比。\n- 各敘述皆正確，故選E(none is wrong)。","peropt":{"A":"高品質攝影對成果與教育重要，正確。","B":"一致性為醫學攝影關鍵，正確。","C":"天空藍背景經測試最佳，正確。","D":"標準化指引利於分析比較，正確。","E":"◎以上皆無錯誤，為本題正解。"},"cite":"Neligan Vol.1 Photography in Plastic Surgery","conflict":""},{"id":"9011","sub":"B8","src":"GS","years":[110],"stem":"In its modern formulation, strategies have been used in tissue engineering and regenerative medicine currently, which of the following is wrong?","opts":{"A":"Implantation of isolated or cultured cells for injection and subsequent healing","B":"Implantation of in vivo assembled constructs containing cells and scaffolds","C":"Implantation of ex vivo assembled constructs containing cells and scaffolds","D":"In situ directed tissue regeneration","E":"None of the above is correct wrong"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【組織工程與再生醫學之現代策略】\n- 現代三大策略：\n  1. 植入分離/培養細胞(isolated/cultured cells)注射後自癒。\n  2. 植入ex vivo組裝之細胞＋支架構建體。\n  3. In situ導向組織再生(引導支架＋內源性細胞)。\n- 「in vivo assembled constructs」並非標準策略敘述(構建體應為ex vivo組裝後植入)，故為錯誤選項。","peropt":{"A":"植入分離/培養細胞注射後自癒，為正確策略。","B":"◎『in vivo組裝含細胞與支架之構建體』敘述錯誤(應為ex vivo組裝)，為本題正解。","C":"植入ex vivo組裝之細胞-支架構建體，正確策略。","D":"In situ導向組織再生，正確策略。","E":"並非『以上皆正確』，故非答案。"},"cite":"Grabb & Smith Ch. Tissue Engineering & Regenerative Medicine","conflict":""},{"id":"9012","sub":"B10","src":"GS","years":[110],"stem":"Which of the following is wrong about the Diagnostic Principles for Body Dysmorphic Disorder ?","opts":{"A":"The patient is preoccupied with one or multiple more subjective flaws in his or her appearance that would be objectively considered minimal or within the range of normal by others.","B":"This preoccupation hinders patient functioning in some way (social, professional, etc.).","C":"This preoccupation is or has been associated with repetitive behaviors, such as frequent mirror checking, manipulation of the body feature in question, etc.","D":"There is a better-suited diagnosis that would explain the patient's symptoms.","E":"None of the above is wrong"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【身體臆形症(BDD)診斷原則】\n- 專注於他人眼中極輕微或正常範圍的外觀『瑕疵』(可為單一或多處)。\n- 此專注造成功能損害(社交、職業等)。\n- 伴重複行為(反覆照鏡、觸摸/掩飾該部位、與他人比較)。\n- 排除準則：症狀『不能被另一更適切的診斷』(如飲食障礙)所解釋——故『有更適切診斷可解釋』本身為錯誤敘述。","peropt":{"A":"專注於極輕微/正常範圍之外觀瑕疵，正確診斷要點。","B":"此專注造成功能損害，正確。","C":"伴反覆照鏡等重複行為，正確。","D":"◎BDD要求『無』更適切診斷可解釋；此敘述與排除準則矛盾，為本題正解(錯誤者)。","E":"非『以上皆無錯誤』，故非答案。"},"cite":"DSM-5 BDD; Neligan Vol.1 Psychological Aspects/BDD","conflict":""},{"id":"9013","sub":"B11","src":"GS","years":[110],"stem":"Adapting the PICOS criteria can be helpful in systematically defining the scope of our questions. Which of the following are included in PICOS criteria? (複選)","opts":{"A":"Patient or population","B":"Intervention","C":"Comparison","D":"Outcome","E":"Study design"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【PICOS 架構(系統性界定研究問題)】\n- P：Patient/Population(病患/族群)。\n- I：Intervention(介入)。\n- C：Comparison(對照)。\n- O：Outcome(結果)。\n- S：Study design(研究設計)。\n- 用於系統性文獻回顧與臨床問題界定，五項全數屬於PICOS。","peropt":{"A":"◎Patient/Population，正確。","B":"◎Intervention，正確。","C":"◎Comparison，正確。","D":"◎Outcome，正確。","E":"◎Study design，正確。"},"cite":"EBM/PICOS framework; Neligan Vol.1 Evidence-Based Medicine","conflict":""},{"id":"9014","sub":"B9","src":"GS","years":[110],"stem":"在Cutaneous radiation toxicities中，可分為acute toxicities與late toxicities；其中acute toxicities可能為transient，但late toxicities則一定需要介入治療才能達到症狀上的緩解。請問下列哪些情形屬於late toxicities? (複選)","opts":{"A":"Telangiectasia","B":"Infected wounds","C":"Moist desquamation","D":"Erythema","E":"Severe fibrosis"},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯【皮膚放射線毒性：急性 vs 晚期】\n- 急性(acute)：紅斑(erythema)、乾/濕性脫屑(dry/moist desquamation)、可能感染，多為暫時性可回復。\n- 晚期(late)：微血管擴張(telangiectasia)、嚴重纖維化(severe fibrosis)、慢性/感染性難癒傷口、萎縮、壞死，常需介入。\n- 本題晚期毒性為A(telangiectasia)、B(infected wounds)、E(severe fibrosis)。\n- (註：紅斑與濕性脫屑屬急性。)","peropt":{"A":"◎微血管擴張為晚期毒性，正確。","B":"◎感染性難癒傷口屬晚期毒性表現，正確。","C":"濕性脫屑(moist desquamation)屬急性毒性，非晚期。","D":"紅斑(erythema)屬急性毒性，非晚期。","E":"◎嚴重纖維化為典型晚期毒性，正確。"},"cite":"Neligan Vol.1 Radiation effects on tissue","conflict":""},{"id":"9015","sub":"B3","src":"GS","years":[110,111,112,114],"stem":"通常認為腓骨游離皮瓣如果打斷所需保持的最短長度為下列何者?","opts":{"A":"0.5cm","B":"1cm","C":"2cm","D":"3cm","E":"4cm"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【腓骨游離皮瓣塑形之最短節段長度】\n- 為維持骨膜(periosteal)血流供應，於osteotomy分段塑形(如下顎重建)時，每段骨長度不宜過短。\n- 一般建議每一骨段最短保留約2cm，以確保骨膜灌流、避免缺血性骨壞死與癒合不良。\n- 另需注意近端(腓總神經)與遠端(踝關節穩定)各保留約6cm安全區——與本題塑形段長概念不同。","peropt":{"A":"0.5cm過短，骨膜血流不足，錯誤。","B":"1cm仍偏短，非建議最短長度。","C":"◎約2cm為維持骨膜灌流之建議最短節段長度，正解。","D":"3cm非『最短』門檻。","E":"4cm非最短保留長度標準。"},"cite":"Grabb & Smith Ch. Mandible Reconstruction/Fibula Flap","conflict":""},{"id":"9016","sub":"B10","src":"GS","years":[111,112,114],"stem":"一位65歲女性接受abdominoperineal resection合併pedicled ORAM flap重建。術後第一天，醫師發現perineum處的skin paddle of the ORAM flap呈現mottled with several areas of blistering；此外醫師注意到病患術後常維持坐姿。下列哪一項fundamental plastic surgery principle可能沒有遵從？","opts":{"A":"Make an informed decision to operate or not operate.","B":"Perform adequate debridement prior to reconstruction.","C":"If possible, replace like with like.","D":"Protect the surgical site postoperatively.","E":"Have a backup plan."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【整外基本原則：術後保護術區(Protect the surgical site)】\n- 情境：ORAM皮瓣重建會陰後，病患久坐 → 皮瓣受壓 → skin paddle出現mottling與水泡(壓迫性缺血/venous congestion)。\n- 違反原則：未於術後保護術區、避免受壓(如避免久坐、俯臥/側臥、使用減壓措施)。\n- 其他原則(充分清創、like with like、備案)雖重要，但此情境的直接失誤在於術後保護不足。","peropt":{"A":"是否手術之判斷與本情境併發症無直接關聯。","B":"清創是否充分非本例皮瓣受壓之主因。","C":"以相似組織重建與久坐受壓無直接關聯。","D":"◎病患久坐壓迫皮瓣，未遵守『術後保護術區』原則，正解。","E":"備案(backup plan)非本例術後受壓之根本失誤。"},"cite":"Grabb & Smith Ch. Fundamental Principles of Plastic Surgery","conflict":""},{"id":"9017","sub":"B1","src":"GS","years":[111,112,114],"stem":"關於wound healing，下列敘述何者錯誤？","opts":{"A":"chronic wound定義為傷口持續超過4週","B":"在remoldeling phase，granulation tissue會被轉變成type III collagen","C":"final scar tissue只有原先組織的90%強度","D":"A及B錯","E":"A, B, C皆錯"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【傷口癒合常見錯誤觀念糾正】\n- 慢性傷口：多定義為未於預期時程(常引用>3個月，或未依序癒合)修復者；『>4週』之絕對定義並不精確。\n- 重塑期(remodeling)：是將Type III膠原轉為Type I膠原(非轉成Type III)。\n- 最終疤痕強度僅約原組織之70–80%，非90%。\n- 三項敘述皆有誤，故選E。","peropt":{"A":"慢性傷口定義以『>4週』表述並不精確，敘述有誤。","B":"重塑期是Type III轉為Type I膠原，非轉成Type III，敘述錯誤。","C":"最終疤痕強度約70–80%，非90%，敘述錯誤。","D":"非僅A、B錯(C亦錯)，故非答案。","E":"◎A、B、C皆錯，為本題正解。"},"cite":"Grabb & Smith Ch. Wound Healing (collagen remodeling, tensile strength)","conflict":""},{"id":"9018","sub":"B2","src":"GS","years":[111,112,114],"stem":"Common complications from corticosteroid injection for scar treatment include:","opts":{"A":"Skin atrophy","B":"Cushing disease","C":"Hypopigmentation","D":"a, b, and c","E":"a and c"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【疤痕內類固醇注射(intralesional corticosteroid)併發症】\n- 常見：皮膚萎縮(skin atrophy)、色素脫失(hypopigmentation)、微血管擴張(telangiectasia)。\n- 皆為局部效應；『Cushing disease』(庫欣『病』指腦下垂體ACTH腺瘤)非局部注射之併發症——局部注射過量最多為醫源性Cushingoid features，與Cushing disease不同。\n- 故正確為a與c(E)。","peropt":{"A":"皮膚萎縮為常見局部併發症，正確。","B":"Cushing disease(垂體性)非局部注射併發症，敘述不當。","C":"色素脫失為常見局部併發症，正確。","D":"含b(Cushing disease)故不正確。","E":"◎a與c(皮膚萎縮＋色素脫失)為正解。"},"cite":"Neligan Vol.1 Scar management (steroid injection complications)","conflict":""},{"id":"9019","sub":"B3","src":"GS","years":[111,112,114],"stem":"An otherwise fit 30-year-old man, following a compound fracture of the distal third of the tibia, previously treated by the orthopedist with open reduction and internal fixation, presents with a small open wound breakdown (4 × 3 cm) with exposed hardware. He has good pulses. After further debridement and removal of hardware and application of an external fixator, the soft tissue defect is repaired with a local propeller perforator flap, based on a posterior tibial artery perforator. During flap dissection and inset, the flap becomes progressively more congested along its entire length. Which of the following is the most appropriate next step in management?","opts":{"A":"Observation","B":"Application of nitropaste","C":"Postoperative leech therapy","D":"Proximal perforator dissection to source vessel","E":"Free flap salvage"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Propeller穿通枝皮瓣術中鬱血之處置】\n- 情境：propeller flap掀起與嵌入時『整條』漸進性鬱血(congestion)——提示旋轉/扭轉(twist)使穿通枝靜脈回流受阻或蒂部張力。\n- 最適處置：向近端(proximal)進一步游離穿通枝至source vessel(如posterior tibial artery)，鬆解蒂部、減少扭轉張力、恢復靜脈回流。\n- 蛭療、硝酸甘油膏為次要/暫時措施；直接轉游離皮瓣為過度且非首選。","peropt":{"A":"整條進行性鬱血非可單純觀察者，錯誤。","B":"硝酸甘油膏對蒂部扭轉造成的靜脈鬱血效果有限。","C":"蛭療為暫時輔助，非解決蒂部扭轉之根本處置。","D":"◎向近端游離穿通枝至源血管以鬆解扭轉/張力、恢復回流，正解。","E":"尚未嘗試蒂部鬆解即改游離皮瓣為過度，非首選。"},"cite":"Neligan Vol.4 Lower Extremity/Propeller Flap","conflict":""},{"id":"9020","sub":"B4","src":"GS","years":[111,112,114],"stem":"關於skin graft，下列敘述何者正確(複選)","opts":{"A":"As the grafts absorb serum, they become edematous and gain as much as 40% of their initial weight in the first 24 hours","B":"During imbibition, metabolism within the graft becomes anaerobic and the pH level falls, reaching a pH of 6.8","C":"During inosculation, blood vessels from the underlying wound bed connect with existing vessels in the skin graft at the graft interface","D":"During the first 4 days after grafting, the epidermis of the graft doubles in thickness","E":"Fibroblasts within the dermis of a healing skin graft are not native graft fibroblasts."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【皮膚移植(Skin Graft)存活生理(複選)】\n- Imbibition(血漿吸取, 0–48h)：吸收漿液使移植體水腫，24h內重量可增約40%；代謝轉為無氧、pH下降至約6.8。\n- Inosculation(血管吻合)：傷口床血管與移植體既有血管於界面對接。\n- Revascularization：術後數日內新生血管長入。\n- 上皮於術後前4天可增厚約一倍；癒合真皮之fibroblast最終由宿主(受區)纖維母細胞取代，非原移植體來源。\n- 五項皆正確。","peropt":{"A":"◎吸收漿液後水腫，24h內增重約40%，正確。","B":"◎imbibition期代謝轉無氧、pH降至約6.8，正確。","C":"◎inosculation期傷口床血管與移植體血管於界面對接，正確。","D":"◎術後前4天表皮厚度約增倍，正確。","E":"◎癒合真皮之纖維母細胞最終由宿主取代，非原生移植體來源，正確。"},"cite":"Grabb & Smith Ch. Skin Grafts (imbibition/inosculation/revascularization)","conflict":""},{"id":"9022","sub":"B11","src":"GS","years":[111,112,113,114],"stem":"What color background has been proven to be the most effective and visually pleasing?","opts":{"A":"Green","B":"Black","C":"White","D":"Sky blue","E":"Brown"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【臨床攝影最佳背景色】\n- 經比較測試，天空藍(sky blue)背景在對比度與視覺舒適度上最佳，能凸顯膚色與病灶邊界並減少反光。\n- 標準化背景亦利於前後與跨病例比較。","peropt":{"A":"綠色非公認最佳醫學攝影背景。","B":"黑色對深膚色對比不佳，非最佳。","C":"白色易反光、對比不足，非最佳。","D":"◎天空藍背景最有效且視覺舒適，正解。","E":"棕色非建議背景色。"},"cite":"Neligan Vol.1 Photography (background standardization)","conflict":""},{"id":"9023","sub":"B7","src":"GS","years":[111,112,113,114],"stem":"A 45-year-old woman is referred for immediate breast reconstruction after mastectomy scheduled in 12 days. She has had two vaginal deliveries and desires autologous breast reconstruction. She smokes seven cigarettes a day and is otherwise healthy. What is the best approach?","opts":{"A":"Ask her to quit immediately and proceed with surgery","B":"Proceed with surgery, as this is a cancer-related procedure","C":"Deny her surgery for her smoking habit","D":"Refer her to another physician willing to operate on smokers","E":"Delay her reconstruction until she is nicotine free for at least 4 weeks"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【吸菸者之自體乳房重建術前優化】\n- 尼古丁造成血管收縮、微循環灌流下降 → 皮瓣壞死、脂肪壞死、傷口癒合不良、傷口裂開風險顯著上升(自體重建尤其在意皮瓣灌流)。\n- 標準建議：術前戒菸至少4週(理想更久)並達nicotine-free，再行自體重建；此為非急迫、可延後之選擇性優化。\n- 相較之下，倉促手術(A)、以癌症為由忽略風險(B)、單純拒絕(C)或轉診(D)皆非最佳實證與病人安全作法。","peropt":{"A":"『立刻戒菸即開刀』無法逆轉尼古丁對微循環之影響，非最佳。","B":"以癌症為由忽略吸菸風險而貿然自體重建，違反病人安全，錯誤。","C":"單純拒絕手術非以病人利益為中心之最佳處置。","D":"轉診他院非解決根本風險之最佳作法。","E":"◎延後重建至戒菸(nicotine-free)至少4週，為最佳實證作法，正解。"},"cite":"Neligan Vol.1 Patient Safety/Smoking optimization; breast reconstruction","conflict":""},{"id":"9024","sub":"B10","src":"GS","years":[111,112,113,114],"stem":"Which of the following must you do to maintain patient privacy when using photos of them?","opts":{"A":"Take the photos on an encrypted device.","B":"Obtain informed consent for all intended uses.","C":"Store photos on an encrypted drive.","D":"Shown only to those individuals involved in the care of the patient.","E":"All of the above."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【病患照片之隱私維護(HIPAA原則)】\n- 需以加密裝置拍攝、加密硬碟儲存。\n- 取得所有預期用途之知情同意(informed consent for all intended uses)。\n- 僅提供予參與該病患照護之人員檢視(need-to-know)。\n- 上述皆為維護隱私之必要作為，故選E(以上皆是)。","peropt":{"A":"以加密裝置拍攝，為必要隱私措施。","B":"取得所有用途之知情同意，為必要。","C":"以加密硬碟儲存，為必要。","D":"僅限照護相關人員檢視，為必要。","E":"◎以上皆是，為本題正解。"},"cite":"Neligan Vol.1 Photography/Privacy (HIPAA)","conflict":""},{"id":"9025","sub":"B11","src":"GS","years":[111,112,113,114],"stem":"Sensitivity refers to:","opts":{"A":"The ability of the test to detect every instance where disease is present","B":"The probability that if a test is positive, this represents a true positive","C":"The ratio of the true negatives to true positives","D":"The ability to detect all the true negatives in a population","E":"The ratio of the true positives to true negatives"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【Sensitivity 敏感度定義】\n• **Sensitivity（敏感度）= True Positive Rate**：在「真正有病」的族群中，檢驗能正確判為陽性的比例。\n• 公式：**Sensitivity = TP / (TP + FN)**；高敏感度可「抓出每一個真正有病者」，false negative 極少。\n• 記憶法 **SnNOut**：高 Sensitivity 檢驗若結果為 Negative → 可有效 rule OUT 疾病（適合篩檢 screening）。\n• 對照組 **Specificity（特異度）= TN/(TN+FP)**：正確判定無病者的能力；**SpPIn**：高特異度陽性 → rule IN。\n• 選項 B 描述的是 **PPV (Positive Predictive Value)**；C、E 為無臨床意義的比值陷阱；D 描述的是 Specificity。","peropt":{"A":"◎ 正解。Sensitivity 即在有病族群中偵測出每一個 true positive 的能力 = TP/(TP+FN)，false negative 最少。","B":"此為 PPV（陽性預測值）之定義：檢驗陽性者實際有病的機率，非 sensitivity。","C":"TN 與 TP 的比值不具標準統計學意義，為混淆陷阱。","D":"偵測所有 true negative 者為 Specificity（特異度），非 sensitivity。","E":"TP 與 TN 的比值非標準診斷測試參數，錯誤。"},"cite":"Neligan PS 5e, Vol.1 Evidence-Based Medicine / diagnostic test statistics; Grabb & Smith 9e, Ch. EBM.","conflict":""},{"id":"9026","sub":"B11","src":"GS","years":[111],"stem":"PRS has published a study examining the pre-to-post change in patient satisfaction with breast reconstruction comparing a new implant sling technique (n = 13) with conventional implant placement (n = 28). What is the most appropriate test to use to determine if a statistically significant difference in satisfaction exists between groups?","opts":{"A":"Paired t-test","B":"Independent t-test","C":"Wilcoxon signed-rank test","D":"One-way ANOVA","E":"None of the above"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【統計檢定選擇：兩獨立小樣本 pre-post change 之比較】\n• 本題比較「新技術 (n=13)」與「傳統 (n=28)」兩組**獨立 (independent)、不成對**族群之滿意度**變化量**是否有差異。\n• 兩組互為 independent → 排除 **paired t-test** 與 **Wilcoxon signed-rank test（成對用）**；但此二者中 Wilcoxon signed-rank 本應是成對，故正解需再看「常態性假設」。\n• 關鍵：**n=13 為小樣本**，無法確保滿意度變化服從常態分布 (normality)；且量表分數多為 ordinal/skewed 資料 → 應採**無母數 (non-parametric)** 檢定。\n• 權威答案取 **C（Wilcoxon）**：此處視為兩組 rank-based 比較的無母數版本（相對於 independent t-test 的 parametric 假設不成立）。\n• **Independent t-test** 需符合常態性與變異數同質；小樣本 (n=13) 常違反 → 不宜。ANOVA 用於 ≥3 組。\n⚠答案疑義：嚴格而言，兩「獨立」組別的無母數比較標準應為 **Mann-Whitney U (Wilcoxon rank-sum)**，而非「signed-rank（成對用）」；C 選項用詞與 independent 設計不完全吻合，但依 ans 以 C 為準（命題意旨為『小樣本應選無母數而非 t-test』）。","peropt":{"A":"Paired t-test 用於同一受試者前後成對比較；本題兩組為獨立不同病人，且小樣本違反常態，不適用。","B":"Independent t-test 為 parametric，需常態性與變異數同質；n=13 小樣本難保證常態，非最佳。","C":"◎ 依權威答案。命題意旨：小樣本、滿意度序位資料違反常態假設 → 應選無母數檢定而非 t-test。","D":"One-way ANOVA 用於三組以上比較，本題僅兩組，不適用。","E":"已有適當檢定可選，非 None of the above。"},"cite":"Neligan PS 5e Vol.1, Biostatistics & study design; PRS Evidence-Based Medicine special topics.","conflict":""},{"id":"9027","sub":"B9","src":"GS","years":[112],"stem":"Most upper extremity and face transplant patients experience episodes of acute rejection during the first year post transplant. In which tissue component of the graft dose acute rejection predominately manifest in VCA?","opts":{"A":"Muscle","B":"Vasculature","C":"Bone","D":"Skin","E":"Nerves"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【VCA 急性排斥的主要標的組織 = Skin】\n• **VCA (Vascularized Composite Allotransplantation)**：如手部、顏面移植，含皮膚、肌肉、骨、血管、神經多種組織。\n• **急性排斥 (acute rejection) 主要表現於 SKIN（皮膚）**：皮膚免疫原性 (immunogenicity) 最高，富含 Langerhans cells、dermal DC、T-cell 浸潤標的。\n• 臨床表徵：紅斑 (erythema)、斑丘疹 (maculopapular rash)、水腫；皮膚可直接目視監測與切片 → 為 VCA 排斥的**哨兵組織 (sentinel)**。\n• 分級採 **Banff 2007 VCA classification**（Grade 0–IV，依表皮/真皮淋巴球浸潤與角質細胞壞死程度）。\n• 大多數手/臉移植病人第一年會經歷至少一次急性排斥，以皮膚為主，經加強免疫抑制多可逆轉。","peropt":{"A":"Muscle 非急性排斥主要標的；肌肉受累多見於嚴重/慢性病程。","B":"血管內膜受累 (graft vasculopathy) 是**慢性**排斥特徵，非急性主要表現。","C":"Bone 非急性排斥主要標的組織。","D":"◎ 正解。皮膚免疫原性最高，為急性排斥主要表現與監測哨兵組織，Banff 分級即以皮膚為依據。","E":"Nerve 非急性排斥的主要標的。"},"cite":"Neligan PS 5e Vol.1, Transplantation & VCA; Banff 2007 working classification of skin-containing composite tissue allograft rejection.","conflict":""},{"id":"9029","sub":"B8","src":"GS","years":[111,112,113,114],"stem":"What are current three main strategies of tissue engineering and regenerative medicine? (複選)","opts":{"A":"Implantation of isolated or cultured cells for injection and subsequent healing","B":"In situ directed tissue regeneration","C":"Ex vivo tissue regeneration","D":"Implantation of ex vivo assembled constructs containing cells and scaffolds","E":"Implantation of in vitro assembled constructs containing cells and scaffolds"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯【組織工程與再生醫學三大策略】\n• 現代 tissue engineering / regenerative medicine 三大核心策略 (Langer & Vacanti 架構)：\n  1. **Cells alone**：植入分離或培養的細胞（isolated/cultured cells）注射後再生 (選項 A)。\n  2. **In situ tissue regeneration**：以生長因子/scaffold 引導體內原位再生 (選項 B)。\n  3. **Cell + Scaffold constructs (ex vivo assembled)**：體外組裝含細胞與支架之構造物後植入 (選項 D)。\n• 三大要素 (triad)：**Cells（幹細胞/前驅細胞）+ Scaffold（支架）+ Signals（生長因子/機械刺激）**。\n• 選項 C『Ex vivo tissue regeneration』與 E『in vitro assembled』屬用詞混淆/非標準三分類，非權威答案。","peropt":{"A":"◎ 正確。植入分離或培養細胞供注射後再生 = cells-alone 策略。","B":"◎ 正確。In situ directed tissue regeneration = 原位引導再生策略。","C":"非標準三大策略之一（Ex vivo tissue regeneration 用詞不屬經典分類）。","D":"◎ 正確。植入 ex vivo 組裝含細胞與支架之構造物。","E":"『in vitro assembled constructs』與 D 概念重疊但非權威列舉之標準三策略，非答案。"},"cite":"Neligan PS 5e Vol.1, Tissue engineering & regenerative medicine (Langer/Vacanti strategies).","conflict":"⚠ 同題歷屆重出：tissue engineering三大策略(複選)＝細胞注射/原位誘導再生(in situ)/ex vivo建構(cells+scaffold)。選項重排使『ex vivo assembled』位置由C移至D；111年(9021)答ABC、112-114年(9029)答ABD，指向同三策略。"},{"id":"9030","sub":"B11","src":"GS","years":[112,113,114],"stem":"Which statement is correct about the basic statistics? (複選)","opts":{"A":"P-value. This number indicates the probability that the between-groups difference in the data set is not real and that the population the groups and data represent are not different (the null hypothesis [H0]).","B":"Clinical significance cannot be present when findings are not statistically significant.","C":"Statistically significant findings may not be clinically significant.","D":"In the world of big data because merely increasing sample size increases your chances of between-group differences becoming statistically significant.","E":"The relationship of P-value to sample size is described by the skewedness."},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯【基礎統計觀念（複選，選正確）】\n• **P-value**：在虛無假設 (H0) 為真的前提下，觀察到目前或更極端組間差異的機率；p 小 → 差異『非偶然』(選項 A 之表述)。\n• **統計顯著 ≠ 臨床顯著**：統計上顯著的差異未必具臨床意義 (選項 C 正確)。\n• 反之，**未達統計顯著≠沒有臨床意義**：故『findings 未達統計顯著時就不可能有 clinical significance』(B) 為錯。\n• **Big data / 大樣本效應**：只要 sample size 夠大，微小組間差異也易變成統計顯著 (選項 D 正確) → 需看 effect size。\n• 選項 E『P-value 與樣本數關係以 skewedness 描述』為錯誤敘述（無此對應）。","peropt":{"A":"◎ 正確（依權威答案）。P-value 反映在 H0 下觀察到差異純屬偶然之機率之表述。","B":"錯誤。臨床意義可獨立存在；未達統計顯著不代表無臨床意義。","C":"◎ 正確。統計顯著未必等於臨床顯著。","D":"◎ 正確。大數據下僅增加樣本數即易使組間差異達統計顯著。","E":"錯誤。P-value 與樣本數之關係並非以 skewedness（偏態）描述。"},"cite":"Neligan PS 5e Vol.1, Biostatistics; PRS EBM series.","conflict":""},{"id":"9031","sub":"B10","src":"GS","years":[113],"stem":"What is not the fundamental principles of plastic surgery?","opts":{"A":"There is an inexorable connection between cosmetic surgery and reconstruction surgery because every plastic surgery operation aims to restore both form and function.","B":"Elective surgeries should be pursued only after considering whether the benefits of surgery will outweigh the risks.","C":"Outcomes in plastic surgery can be enhanced by addressing modifiable patient factors, adequately preparing wounds prior to reconstruction, replacing lost structures with tissues of similar quality, ensuring optimal vascularity, minimizing donor site morbidity, and deliberately protecting the surgical site","D":"A plastic surgeon is always prepared to confront complications with a series of surgical backup plans.","E":"It is better to use conservative and mature surgical techniques rather than innovative and unproven surgeries to reduce the chance of complications."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【整形外科基本原則 Fundamental Principles（選『非』原則者）】\n• 核心原則：整形手術兼顧 **form & function（形態與功能）**，美容與重建密不可分 (A 正確)。\n• **Risk–benefit 評估**：選擇性手術須確認利大於弊 (B 正確)。\n• 優化可控因子、充分準備傷口、以類似組織替補、確保血供、減少捐贈區併發症、保護術區 (C 正確 — 經典整外原則清單)。\n• 隨時備有多套 **surgical backup plan** 應對併發症 (D 正確)。\n• 選項 E『一律保守成熟術式而拒絕創新未經驗證的手術』**過度絕對化**，非整外基本原則：整外重視在實證與病人安全前提下**適當創新 (innovation)**，而非全然排斥。故 E 為『非原則』= 答案。","peropt":{"A":"屬正確原則：整外兼顧形態與功能，美容與重建相連，非答案。","B":"屬正確原則：選擇性手術須權衡 risk–benefit，非答案。","C":"屬正確原則：優化可控因子、備妥傷口、類似組織替補、確保血供、減少捐贈區併發症，非答案。","D":"屬正確原則：整外醫師應備多套後備手術計畫，非答案。","E":"◎ 正解（非原則）。『一律保守、拒絕創新』過度絕對；整外在實證與安全下鼓勵適當創新，故此非基本原則。"},"cite":"Neligan PS 5e Vol.1, Principles of plastic surgery; Gillies & Millard 'Principles'.","conflict":""},{"id":"9032","sub":"B1","src":"GS","years":[110,113],"stem":"下列何種傷口環境能在proliferation phase促進血管增生(angiogenesis)？","opts":{"A":"缺氧","B":"潮濕","C":"乾燥","D":"酸性","E":"溫度上升"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【增生期血管新生的促進環境：缺氧 Hypoxia】\n• **傷口低氧 (hypoxia)** 是 **angiogenesis** 的關鍵驅動：低氧穩定 **HIF-1α (Hypoxia-Inducible Factor-1α)** → 上調 **VEGF**、bFGF、PDGF → 內皮細胞遷移增生形成新生血管。\n• 傷口中央相對缺氧、周邊含氧的**氧梯度 (oxygen gradient)** 是引導血管向內生長的訊號。\n• 注意區分：**膠原合成 (collagen synthesis)** 中 proline/lysine hydroxylation 需 **氧氣、維生素C、鐵**（此為需氧步驟）；但『啟動血管新生訊號』的觸發者是低氧。\n• 其他選項：潮濕環境利於上皮化 (moist wound healing) 但非 angiogenesis 直接驅動因子；乾燥、酸性、單純升溫皆非血管新生主要促進因子。","peropt":{"A":"◎ 正解。缺氧 → HIF-1α 穩定 → VEGF 表現↑ → 驅動增生期血管新生 (angiogenesis)。","B":"潮濕環境促進上皮化 (epithelialization)，非血管新生的直接驅動訊號。","C":"乾燥環境不利癒合，非促血管新生。","D":"酸性 pH 非增生期血管新生之主要促進因子。","E":"單純溫度上升非血管新生的核心驅動訊號。"},"cite":"Neligan PS 5e Vol.1, Wound healing (HIF-1α/VEGF); Grabb & Smith 9e, Ch.1 Wound healing.","conflict":"⚠ 同題歷屆重出：均考『缺氧(hypoxia)促進angiogenesis』。110年(9001)問一般傷口環境、115...實為113年(9032)限定proliferation phase，選項D/E微調(高壓↔酸性/溫度上升)，兩年答案皆A(缺氧)。屬選項微調同考點。"},{"id":"9033","sub":"B5","src":"GS","years":[113],"stem":"下列有關principles of microsurgery的敘述何者為非？(複選)","opts":{"A":"Heparin, aspirin, and dextran are all commonly used postoperatively to reduce platelet aggregation and clot formation.","B":"Tissues tolerance levels to ischemia: Connective tissue > Skin and subcutaneous tissue > Muscle","C":"The blood vessel anastomosis should be examined with patent test routinely to check whether there is any obstruction.","D":"Early failure is often related to anastomotic imperfections or pedicle positioning.","E":"Regardless of the monitoring technique, flap checks should be performed by an experienced observer at least once every hour for 7 days."},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯【顯微手術原則（複選，選『為非』者）】\n• **A（為非）**：Heparin、aspirin、dextran 三者機轉不同 — heparin 抑制凝血級聯 (anticoagulant)、aspirin 抑制血小板 (antiplatelet)、dextran 為擴容/抗血小板黏附；將三者統稱『皆用於減少血小板凝集』**不精確 → 為非**。\n• **B（正確敘述）**：組織對缺血耐受度 Connective tissue > Skin/subcutaneous > Muscle；肌肉對缺血最敏感，此排序正確 → 非答案。\n• **C（為非）**：**Patency test 不應 routine 執行**；反覆擠壓易傷內皮、誘發血栓，僅在懷疑阻塞時謹慎使用 → 為非。\n• **D（正確敘述）**：早期皮瓣失敗常源於吻合缺陷或 pedicle 位置/扭轉、壓迫 → 非答案。\n• **E（為非）**：『每小時檢查、連續 7 天』過度；監測強度應在術後 48–72 小時最密集後遞減，非 7 天皆每小時 → 為非。\n• 故『為非』= A、C、E。","peropt":{"A":"◎ 為非。Heparin(抗凝)、aspirin(抗血小板)、dextran(擴容/抗黏附)機轉不同，統稱皆『減少血小板凝集』不精確。","B":"此為正確敘述（缺血耐受度 結締組織>皮膚皮下>肌肉，肌肉最敏感），非本題『為非』選項。","C":"◎ 為非。Patency (patent) test 不應常規執行，反覆操作傷內皮易致血栓，僅懷疑阻塞時使用。","D":"此為正確敘述（早期失敗常因吻合缺陷或 pedicle 位置），非『為非』選項。","E":"◎ 為非。每小時檢查連續 7 天過度；監測應於術後 48–72 小時最密集後遞減。"},"cite":"Neligan PS 5e Vol.1, Principles of microsurgery & flap monitoring; Grabb & Smith 9e, Microsurgery.","conflict":""},{"id":"9034","sub":"B1","src":"GS","years":[113],"stem":"關於傷口癒合下列何者錯誤？","opts":{"A":"Steroid 抑制發炎過程，導致傷口癒合不良可透過以Vitamin E 刺激巨噬細胞的方式逆轉，steroid造成的影響。","B":"NSAID 實驗上會導致纖維母細胞(fibroblast)和角質形成細胞數量減少、影響傷口收縮和上皮化，但目前沒有實證有延長傷口癒合時間的報告。","C":"Macrophage 分為M1M2 type 可以分為，在發炎期（inflammation phase）過渡到增生期(proliferation phase)，有比例上的差異。","D":"鋅:是DNA 和RNA 聚合酶的輔助因子，在細胞分裂中發揮重要作用。","E":"化療藥物等藥物會促進發炎反應，影響細胞增生和分化，進而延緩傷口癒合。"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【傷口癒合影響因子（選『錯誤』）】\n• **A（錯誤 → 答案）**：類固醇抑制發炎、纖維母細胞與膠原合成致癒合不良；文獻上可用 **Vitamin A（非 Vitamin E）** 部分逆轉 steroid 對發炎期的抑制。Vitamin E 反而可能抑制發炎、干擾癒合，故『以 Vitamin E 刺激巨噬細胞逆轉』**錯誤**。\n• B：NSAID 實驗上減少纖維母細胞/角質細胞、影響收縮與上皮化；臨床延長癒合時間之實證仍不一致（敘述可接受）。\n• C：Macrophage 有 **M1（促發炎）→ M2（促修復/重塑）** 表型轉換，主導發炎期過渡至增生期，比例改變正確。\n• D：**鋅 (Zinc)** 為 DNA/RNA polymerase 輔因子，參與細胞分裂，正確。\n• E：化療藥物抑制細胞增生分化、干擾各期反應而延緩癒合，正確。\n• 關鍵記憶：**Vitamin A 逆轉類固醇**對傷口的抑制（steroid → 補 Vit A）。","peropt":{"A":"◎ 正解（錯誤敘述）。逆轉類固醇對傷口抑制的是 **Vitamin A**，非 Vitamin E；Vit E 反而可能抑制發炎、干擾癒合。","B":"正確。NSAID 實驗上減少纖維母細胞/角質細胞並影響收縮上皮化，臨床延長癒合之實證仍不一致，非答案。","C":"正確。巨噬細胞 M1→M2 表型轉換主導發炎期過渡增生期，比例改變，非答案。","D":"正確。鋅為 DNA/RNA polymerase 輔因子，參與細胞分裂，非答案。","E":"正確。化療藥物抑制細胞增生分化、延緩傷口癒合，非答案。"},"cite":"Neligan PS 5e Vol.1, Wound healing (Vitamin A reverses steroid effect); Grabb & Smith 9e, Ch.1.","conflict":""},{"id":"9037","sub":"B7","src":"GS","years":[113],"stem":"關於局部麻醉劑的毒性，以下哪項描述是正確的？","opts":{"A":"局部麻醉劑的心血管系統(CVS)毒性通常在較低劑量時發生，比中樞神經系統(CNS)毒性更常見。","B":"局部麻醉劑的中樞神經系統(CNS)毒性包括頭暈、耳鳴、顫抖和唇舌麻木等症狀。","C":"注射局部麻醉劑時不需要抽吸確認針尖位置，以減少藥物滲入血管的風險。","D":"當使用大劑量局部麻醉劑時，苯二氮平類藥物不能用作預防性治療來調整癲癇閾值。","E":"局部麻醉劑在心肌和心臟傳導系統上的直接作用會促進心臟活動和提高血壓。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【局部麻醉劑毒性 LAST (Local Anesthetic Systemic Toxicity)】\n• **B（正解）**：**CNS 毒性早期症狀**包括頭暈、耳鳴 (tinnitus)、口周/唇舌麻木 (circumoral numbness)、金屬味、視覺障礙、肌肉顫抖 (tremor)，續而抽搐、意識喪失。\n• **毒性順序**：一般**CNS 毒性先於 CVS 毒性**（CNS 閾值較低，先出現）；故 A『CVS 毒性較低劑量且較常見』錯誤。\n• C 錯：注射前**必須回抽 (aspiration)** 確認未入血管以降低血管內注射風險。\n• D 錯：大劑量局麻時 **benzodiazepine 可用於提高抽搐閾值**（前處置/處理 seizure），故『不能用』錯誤。\n• E 錯：局麻對心肌與傳導系統為**抑制 (negative inotropic / 傳導阻滯)**，導致低血壓、心律不整，而非促進心臟活動升壓。\n• 處置：**20% Lipid emulsion (Intralipid)** 為 LAST 之解毒治療。","peropt":{"A":"錯誤。一般 CNS 毒性閾值較低、先於 CVS 出現；CVS 毒性反而在更高劑量。","B":"◎ 正解。CNS 毒性早期：頭暈、耳鳴、唇舌/口周麻木、顫抖等。","C":"錯誤。注射前必須回抽確認針尖未在血管內，以降低血管內注射風險。","D":"錯誤。Benzodiazepine 可提高抽搐閾值、預防/處理 seizure，可作為輔助。","E":"錯誤。局麻對心肌與傳導系統為抑制作用（負性肌力、傳導阻滯、降壓），非促進升壓。"},"cite":"Neligan PS 5e Vol.1, Local anesthetics & LAST; ASRA LAST guideline (lipid emulsion rescue).","conflict":""},{"id":"9038","sub":"B6","src":"GS","years":[113,114],"stem":"關於急性外傷性周邊神經損傷的管理，以下哪項描述是正確的？","opts":{"A":"所有急性外傷性周邊神經損傷應立即進行手術探查和修復。","B":"在輕微神經挫傷的情況下，患者通常需要立即進行手術探查和神經修復。","C":"高度損傷的神經，如從爆炸機制造成的傷害，不會顯示任何恢復的跡象。","D":"如果神經功能恢復的證據停滯不前或無恢復跡象，則應考慮進行神經探查手術，進一步的手術處理將根據手術中的發現來決定。","E":"骯髒傷口中的神經撕脫傷應該在受傷後立即縫合，以防止神經末端的收縮。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【急性外傷性周邊神經損傷之處置（同型題）】\n• **D（正解）**：功能恢復證據**停滯或無恢復跡象**時 → 考慮**神經探查手術**，進一步處置依**術中發現**決定。\n• A 錯：非所有急性損傷須立即探查修復；閉鎖/挫傷型先觀察。\n• B 錯：輕微挫傷 (neurapraxia) 通常不需立即手術。\n• C 錯：高能量/爆炸傷神經仍可能顯示恢復，不可斷定完全不恢復。\n• E 錯：污染傷口之神經撕脫**不應**立即一期縫合，應清創標記後延遲修復。\n• 核心：乾淨銳割 → 一期修復；污染/挫壓/爆炸 → 延遲修復＋序列追蹤。","peropt":{"A":"錯誤。並非所有急性損傷須立即探查修復。","B":"錯誤。輕微挫傷型多可自行恢復，不需立即手術。","C":"錯誤。高能量/爆炸傷仍可能顯示部分恢復。","D":"◎ 正解。恢復停滯或無跡象時考慮探查，處置依術中發現決定。","E":"錯誤。污染傷口神經撕脫不應立即一期縫合，應清創後延遲修復。"},"cite":"Neligan PS 5e Vol.1, Acute peripheral nerve injury management.","conflict":"⚠ 同題歷屆重出：急性外傷性周邊神經損傷管理何者正確。正解皆『恢復停滯或無跡象時應考慮神經探查，術中所見決定後續』；D/E位置對調之純重排，113年(9036)答E、114年(9038)答D。"},{"id":"9039","sub":"B6","src":"GS","years":[113,114],"stem":"關於神經瘤形成的描述，以下哪項是正確的？","opts":{"A":"神經瘤形成是由於再生生長突觸成功接觸到周邊受器後的結果。","B":"目標肌肉再神經和周邊神經吻合為再生軸突提供了生理目標，因此可有效預防神經瘤形成。","C":"神經瘤形成通常與成功的再神經化相關，很少伴隨神經性疼痛。","D":"切斷的細小感覺神經即使沒有修復也不太可能導致嚴重的神經瘤疼痛。","E":"神經瘤主要形成於周邊神經的中段，而非神經的斷端。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【神經瘤 Neuroma 形成（同型題，選正確）】\n• **B（正解）**：**TMR（目標肌肉再神經化）**與周邊神經吻合為再生軸突提供**生理性標的**，可有效**預防神經瘤**形成並改善殘肢/幻肢痛。\n• A 錯：神經瘤是再生軸突**未能**成功接觸周邊受器（缺標的）之結果。\n• C 錯：神經瘤常伴**神經性疼痛**，非與成功再神經化相關且少痛。\n• D 錯：細小感覺神經斷裂未修復**仍可能**形成痛性神經瘤。\n• E 錯：神經瘤主要形成於**斷端**，非神經中段。","peropt":{"A":"錯誤。神經瘤源於再生軸突未成功接觸周邊受器（缺乏標的）。","B":"◎ 正解。TMR/神經吻合提供生理性標的，有效預防神經瘤形成。","C":"錯誤。神經瘤常伴神經性疼痛，非與成功再神經化相關。","D":"錯誤。細小感覺神經未修復仍可能形成痛性神經瘤。","E":"錯誤。神經瘤主要形成於神經斷端，非中段。"},"cite":"Neligan PS 5e Vol.1, Neuroma pathophysiology & TMR.","conflict":"⚠ 同題歷屆重出：神經瘤形成何者正確。正解皆『目標肌肉再神經(TMR)/周邊神經吻合提供再生軸突生理目標→預防神經瘤』；純選項重排，113年(9035)答E、114年(9039)答B。"},{"id":"9040","sub":"B3","src":"GS","years":[110,111,114],"stem":"trainee is working on preoperative planning and is marking landmarks and planned incisions for a gracilis muscle flap harvest for use in facial reanimation. The patient is placed in a frog leg position and the most prominent longitudinal medial thigh structure palpable through the skin is which of the following?","opts":{"A":"Gracilis muscle","B":"Rectus femoris muscle","C":"Sartorius muscle","D":"Adductor longus muscle","E":"Tensor fascia lata muscle"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Gracilis 皮瓣取材：大腿內側 landmark】\n• 病人置於 **frog-leg position（髖外展外旋、屈膝）**，大腿內側**最明顯可觸摸的縱向凸起 (most prominent longitudinal structure)** 為 **Adductor longus 之肌腱/肌腹**（起於恥骨、形成內收肌群前緣的明顯條索）。\n• **手術定位法**：Adductor longus 為體表可觸的可靠標記；**Gracilis** 位於其**後方約 2 指幅**、內收肌群最後側、較薄且不易直接觸及。\n• Gracilis 血管蒂：**Medial circumflex femoral artery（旋股內動脈）分支**，位近端約距恥骨結節 8–10 cm；運動神經為 **obturator nerve 前支**。\n• 其他選項（Rectus femoris、Sartorius、TFL）位於大腿前/外側，非內側最明顯觸診標記。","peropt":{"A":"Gracilis 位於內收肌群最後側、較薄，不是最明顯可觸及的凸起（其定位需以 adductor longus 為參考）。","B":"Rectus femoris 位於大腿前側 (股四頭肌)，非內側標記。","C":"Sartorius 斜行於大腿前內，但非 frog-leg 下最明顯的縱向內側凸起標記。","D":"◎ 正解。Frog-leg position 下大腿內側最明顯可觸摸的縱向結構為 Adductor longus。","E":"Tensor fascia lata 位於大腿外側近端，非內側標記。"},"cite":"Neligan PS 5e Vol.2, Gracilis flap for facial reanimation; Grabb & Smith 9e, Flap anatomy.","conflict":"⚠ 同題歷屆重出：gracilis flap顏面重建時最突出之內側大腿可觸構造＝adductor longus。純選項重排，110/111年(9005)答C、114年(9040)答D，皆指adductor longus。"},{"id":"9041","sub":"B3","src":"GS","years":[110,111,112,114],"stem":"Concerning tissue expansion, which description is not true?","opts":{"A":"The epidermal layer thickens in reaction to tissue expansion, whereas the dermal layer becomes thinner.","B":"Up to 50% of the scalp can be reconstructed utilizing tissue expansion.","C":"Increased size and number of mitochondria were found in muscle.","D":"VEGF is responsible for the increased vascularity and angiogenesis found in animal studies following tissue expansion.","E":"Tissue expansion of the trunk is associated with high rates of morbidity and mortality. The hernia recurrences rates appear to be not low."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【組織擴張 Tissue Expansion（選『非』真者）】\n• A 真：**表皮 (epidermis) 增厚、真皮 (dermis) 變薄**（棘層增生、真皮膠原重排），此為擴張後典型組織學變化。\n• B 真：**頭皮可擴張重建達約 50%**。\n• C 真：肌肉內**粒線體 (mitochondria) 大小與數目增加**（代謝適應）。\n• D 真：**VEGF** 介導擴張後血管密度↑與 angiogenesis（動物研究）。\n• **E（非真 → 答案）**：軀幹組織擴張的敘述誇大死亡率；且用於腹壁重建時擴張反而**改善組織量、降低疝氣復發**；『疝氣復發率並不低 (not low)』與擴張改善結果之實證不符 → 為『非真』。","peropt":{"A":"真敘述：表皮增厚、真皮變薄，非答案。","B":"真敘述：頭皮可擴張重建達約 50%，非答案。","C":"真敘述：肌肉粒線體大小與數目增加，非答案。","D":"真敘述：VEGF 介導擴張後血管增生，非答案。","E":"◎ 正解（非真）。軀幹擴張並非高死亡率；用於腹壁重建可改善組織量、疝氣復發率並非偏高。"},"cite":"Neligan PS 5e Vol.1, Tissue expansion — biology & histology.","conflict":"⚠ 同題歷屆重出：tissue expansion何者非真。C/E位置對調之純重排，關鍵偽敘述皆為『軀幹組織擴張死亡率高、疝氣復發率不低』；110-112年(9007)答C、114年(9041)答E。"},{"id":"9042","sub":"B6","src":"GS","years":[112,114],"stem":"有關principles of nerve repair, 下列何者正確？(複選)","opts":{"A":"須盡量達到Tension-free","B":"精細的顯微外科技術及縫合","C":"於受傷區域的神經不能mobilized","D":"目前研究顯示,在大部分的情況下epineural suture technique比interfascicular fascicular repair好","E":"可考慮使用nerve graft"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯【周邊神經修復原則（同型題，選正確）】\n• A 正確：**Tension-free** 為核心原則。\n• B 正確：需**精細顯微技術與縫合**。\n• C 錯：受傷區神經**可適度 mobilize** 以減張，『不能 mobilized』錯誤 → 非答案。\n• D 正確（依 ans）：實證上 **epineural suture 不劣於（≥）interfascicular fascicular repair**，且較簡單快速；此題以『epineural 優於/不劣於 interfascicular』為正確陳述。\n• E 正確：缺損時**可考慮 nerve graft**。\n• 故正確 = A、B、D、E。（與 9028 一致：兩題皆表達 epineural ≥ interfascicular）","peropt":{"A":"◎ 正確。Tension-free 為神經修復核心原則。","B":"◎ 正確。需精細顯微外科技術與縫合。","C":"錯誤。受傷區神經可適度游離 (mobilize) 減張，非『不能 mobilized』。","D":"◎ 正確（依 ans）。實證顯示 epineural suture 不劣於 interfascicular fascicular repair 且較簡便。","E":"◎ 正確。缺損無法無張力對合時可考慮 nerve graft。"},"cite":"Neligan PS 5e Vol.1, Nerve repair — epineural vs. fascicular repair evidence.","conflict":"⚠ 同題歷屆重出：principles of nerve repair何者正確(複選)。五概念(tension-free/顯微技術/可用nerve graft/epineural≥interfascicular/神經可mobilize)不變；選項重排且D方向對調(interfascicular>epineural↔epineural>interfascicular)使答案不同。112年(9028)答ABC、114年(9042)答ABDE。"},{"id":"9043","sub":"B1","src":"GS","years":[115],"stem":"正常傷口癒合過程中，傷口的生物力學強度 (biomechanical strength) 在受傷後3週及6週時，分別約達原始強度的多少？","opts":{"A":"3週約5%；6週約30-40%","B":"3週約20%；6週約70-80%","C":"3週約40%；6週約90%","D":"3週約50%；6週約100%","E":"3週約10%；6週約50%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【傷口生物力學強度時序 Tensile Strength Timeline】\n• 傷口 tensile strength 隨膠原沉積與重塑逐漸恢復：\n  - **1 週**：約 3–5%（極弱，仍靠縫線）。\n  - **3 週**：約 **20%**（膠原重塑中期）。\n  - **6 週**：約 **70–80%**（重塑成熟）。\n  - **最終 (數月~1年)**：達原始強度 **~80%**（永遠無法回到 100%）。\n• 對應正解 **B（3週~20%；6週~70–80%）**。\n• 機轉：早期 type III collagen → 逐漸由 **type I collagen** 取代，並經 cross-linking 與 MMP 重塑，強度上升但上限約 80%。","peropt":{"A":"數值偏低（6週僅 30–40% 過低），不符合經典時序。","B":"◎ 正解。3 週約 20%、6 週約 70–80%，符合膠原重塑時序。","C":"6 週達 90% 過高，不符。","D":"6 週達 100% 錯誤；傷口最終強度僅約 80%，不可能回到 100%。","E":"6 週僅 50% 偏低，不符經典數值。"},"cite":"Neligan PS 5e Vol.1, Wound healing — tensile strength recovery; Grabb & Smith 9e, Ch.1.","conflict":""},{"id":"9044","sub":"B2","src":"GS","years":[115],"stem":"矽膠凝膠 (silicone gel) 改善術後疤痕的主要作用機制為何？","opts":{"A":"透過封閉疤痕部位及角質層保濕 (hydration of the stratum corneum)，降低膠原蛋白生成並調節癒合相關生長因子","B":"直接殺滅傷口中的細菌以減少感染所致的過度疤痕形成","C":"提供持續的機械性牽引力以拉伸並軟化疤痕組織","D":"直接刺激黑色素細胞增生以均勻化色素沉著","E":"透過局部加熱促進疤痕組織溶解再吸收"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【矽膠凝膠 Silicone Gel 改善疤痕機轉】\n• **主要機轉：封閉 (occlusion) + 角質層保濕 (hydration of stratum corneum)** → 降低經表皮水分散失 (TEWL)，抑制角質細胞訊號、下調纖維母細胞活性與膠原過度生成，並調節 TGF-β 等生長因子 → 減少肥厚性疤痕/蟹足腫。\n• 次要：降低微血管活性、減少 mast cell 介導的膠原沉積；並非靠加壓、加熱或殺菌。\n• **第一線非侵入性疤痕預防**（silicone sheet / gel）；使用需持續數月。\n• 對應正解 **A**。","peropt":{"A":"◎ 正解。封閉疤痕與角質層保濕 → 降低膠原生成並調節癒合相關生長因子 (TGF-β)。","B":"錯誤。矽膠非靠殺菌作用改善疤痕。","C":"錯誤。改善機轉非機械性牽引軟化（此為 pressure/tension 概念）。","D":"錯誤。非靠刺激黑色素細胞均勻色素。","E":"錯誤。非靠局部加熱溶解再吸收疤痕。"},"cite":"Neligan PS 5e Vol.1, Scar management — silicone gel/sheeting mechanism; international scar management guideline.","conflict":""},{"id":"9045","sub":"B5","src":"GS","years":[115],"stem":"靜脈吻合器 (venous coupler) 被認為是顯微外科技術的重大進展，關於其臨床特性，下列何者正確？","opts":{"A":"靜脈吻合器僅適用於管徑大於5mm的粗大靜脈","B":"使用靜脈吻合器後無需進行術後血流監測","C":"使用靜脈吻合器後，術後血栓發生率顯著高於手工縫合","D":"靜脈吻合器同樣廣泛適用於動脈端對端吻合，效果優於靜脈吻合","E":"靜脈吻合器可改善手術效率、縮短吻合時間，且通暢率 (patency rate) 至少與手工縫合相當"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【靜脈吻合器 Venous Coupler 臨床特性】\n• **E（正解）**：coupler（如 Synovis GEM microvascular anastomotic coupler）能**縮短吻合時間、提升效率**，其**通暢率 (patency) 至少與手工縫合相當甚至更佳**（外翻對合、內膜貼合佳、減少異物於管腔內）。\n• A 錯：coupler 適用於**廣泛管徑**（常見 1.5–4mm），非僅 >5mm。\n• B 錯：使用 coupler 後**仍須術後皮瓣/血流監測**。\n• C 錯：coupler 血栓率**不高於**手工縫合（通暢率相當或更好）。\n• D 錯：coupler **主要用於靜脈**；動脈壁厚、彈性強、壓力高，coupler 於動脈端使用受限，並非『動脈效果優於靜脈』。\n• 靜脈壁薄易塌陷 → coupler 對靜脈吻合尤具優勢。","peropt":{"A":"錯誤。Coupler 適用於廣泛管徑（約 1.5–4mm），非僅限 >5mm 粗大靜脈。","B":"錯誤。使用 coupler 後仍需常規術後血流/皮瓣監測。","C":"錯誤。Coupler 術後血栓率不高於手工縫合，通暢率相當或更佳。","D":"錯誤。Coupler 主要用於靜脈；動脈壁厚高壓使用受限，非『動脈優於靜脈』。","E":"◎ 正解。Coupler 提升效率、縮短吻合時間，通暢率至少與手工縫合相當。"},"cite":"Neligan PS 5e Vol.1, Microsurgical anastomotic coupler; Grabb & Smith 9e, Microsurgery.","conflict":""},{"id":"9046","sub":"B4","src":"GS","years":[115],"stem":"皮膚移植物 (skin graft) 在植入後存活的傳統三個依序發生的階段，正確的時序排列為何？","opts":{"A":"炎症期 (inflammation) → 增生期 (proliferation) → 成熟期 (remodeling)","B":"血漿浸潤 (imbibition) → 血管接通 (inosculation) → 再血管化 (revascularization)","C":"止血 (hemostasis) → 炎症 (inflammation) → 增生 (proliferation)","D":"貼附 (adhesion) → 角化 (keratinization) → 收縮 (contraction)","E":"擴散 (diffusion) → 吻合 (anastomosis) → 融合 (fusion)"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【皮膚移植物 Skin Graft 存活三階段】\n• 傳統依序三階段：\n  1. **Plasmatic imbibition（血漿浸潤，0–48h）**：graft 靠受區滲出的血漿營養被動擴散存活、吸水水腫。\n  2. **Inosculation（血管接通，~48–72h）**：graft 與受區既有血管**斷端對接吻合**。\n  3. **Revascularization / Capillary ingrowth（再血管化，~4–7天）**：新生血管長入、建立循環。\n• 對應正解 **B**。\n• 臨床意涵：早期 (前 48h) graft 最脆弱，**剪力 (shear)、血腫 (hematoma)、感染** 為存活失敗主因 → 需固定 (tie-over/bolster) 與制動。\n• 其他選項為傷口癒合期/其他流程之混淆。","peropt":{"A":"此為一般傷口癒合分期 (發炎→增生→成熟)，非 skin graft 三階段。","B":"◎ 正解。Imbibition（血漿浸潤）→ Inosculation（血管接通）→ Revascularization（再血管化）。","C":"止血→發炎→增生為傷口癒合序列，非 graft take 三階段。","D":"貼附→角化→收縮非公認 graft 存活三階段用語。","E":"擴散→吻合→融合為混淆非標準術語。"},"cite":"Neligan PS 5e Vol.1, Skin grafts — imbibition/inosculation/revascularization; Grabb & Smith 9e, Grafts.","conflict":""},{"id":"9047","sub":"B3","src":"GS","years":[115],"stem":"關於延遲現象 (delay phenomenon / vascular delay) 在皮瓣重建中的原理與應用，下列哪些陳述正確？","opts":{"A":"延遲現象又稱缺血預適應 (ischemic preconditioning)，透過次致命性缺血改善皮瓣血供","B":"其機制包含「choke 血管 (choke vessels)」的開放、皮瓣內血管縱向擴張及新生血管形成 (angiogenesis)","C":"臨床上第二次皮瓣移轉手術通常在第一次手術後約2週執行，以達最大血流增強效果","D":"對具有吸菸史、糖尿病、肥胖或放射線治療史等微循環受損的患者特別有臨床價值","E":"延遲現象僅能透過手術方式達成，不存在任何藥物性或非手術性的延遲方法"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯【延遲現象 Delay Phenomenon（複選，選正確）】\n• A 正確：延遲現象本質類似**缺血預適應 (ischemic preconditioning)**，藉次致命性缺血提升皮瓣對後續缺血的耐受、改善血供與存活。\n• B 正確：機轉含 **choke vessels 開放/擴張**、皮瓣內血管**縱向重定向擴張 (reorganization)** 與 **angiogenesis 新生血管**，交感神經去神經化使血管擴張。\n• C 正確：臨床上二期皮瓣移轉多於首次手術後**約 2 週**執行以達最大血流增益。\n• D 正確：對**吸菸、糖尿病、肥胖、放射線治療**等微循環受損高危病人特別有價值。\n• **E（錯誤）**：延遲**不僅限手術**；亦有**藥物性/化學性 delay**（如血管活性藥物、局部藥劑）等非手術方法，故 E 錯，非答案。","peropt":{"A":"◎ 正確。延遲現象即缺血預適應，藉次致命性缺血改善皮瓣血供與耐受。","B":"◎ 正確。機轉含 choke vessels 開放、血管縱向擴張與 angiogenesis。","C":"◎ 正確。二期皮瓣移轉通常於首次手術後約 2 週執行以達最大血流增益。","D":"◎ 正確。對吸菸、糖尿病、肥胖、放療等微循環受損病人特別有臨床價值。","E":"錯誤。延遲不僅限手術；亦存在藥物性/非手術性延遲方法，故非正確陳述。"},"cite":"Neligan PS 5e Vol.1, Flap physiology — delay phenomenon & choke vessels; Taylor angiosome concept.","conflict":""},{"id":"9048","sub":"B3","src":"GS","years":[115],"stem":"進行 gracilis muscle flap 作為 facial reanimation 時，其主要運動神經來源為下列何者？","opts":{"A":"Femoral nerve","B":"Obturator nerve","C":"Sciatic nerve","D":"Superior gluteal nerve","E":"Common peroneal nerve"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【Gracilis 皮瓣運動神經 = Obturator nerve】\n• **Gracilis muscle 運動神經**：**Obturator nerve（閉孔神經）之前支 (anterior branch)**；此神經於血管蒂 (medial circumflex femoral vessels) 近端進入肌肉。\n• 於 **facial reanimation（微笑重建）**：以 gracilis 為 free functional muscle transfer，將其 obturator nerve 分支吻合至**對側顏面神經 (cross-face nerve graft)** 或 **同側咬肌神經 (masseteric nerve, CN V₃分支)** 以驅動微笑。\n• 感覺/其他：gracilis 血供屬 **Mathes-Nahai type II**（主蒂 medial circumflex femoral）。\n• 其他選項神經皆不支配 gracilis：Femoral（股四頭肌/縫匠肌）、Sciatic（後大腿/小腿）、Superior gluteal（臀中/小肌、TFL）、Common peroneal（小腿前外/腓側）。","peropt":{"A":"Femoral nerve 支配股四頭肌、縫匠肌、恥骨肌，非 gracilis。","B":"◎ 正解。Gracilis 運動神經為 Obturator nerve（前支）。","C":"Sciatic nerve 支配後大腿與小腿肌群，非 gracilis。","D":"Superior gluteal nerve 支配臀中/小肌與 TFL，非 gracilis。","E":"Common peroneal nerve 支配小腿前/外側肌群，非 gracilis。"},"cite":"Neligan PS 5e Vol.2, Free gracilis for facial reanimation (obturator nerve); Grabb & Smith 9e, Flap anatomy.","conflict":""},{"id":"9049","sub":"B3","src":"GS","years":[115],"stem":"關於 tissue expansion 後皮膚與軟組織的組織學變化，下列何者較正確？","opts":{"A":"epidermis會變厚，而 dermis 會變薄","B":"dermis 會變厚，但 epidermis 會萎縮","C":"血管密度會下降","D":"expanded skin 不會增加表面積，只是暫時被拉長","E":"肌肉粒線體大小與數目一定減少"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【組織擴張後之組織學變化（選較正確）】\n• **A（正解）**：擴張後**表皮 (epidermis) 增厚**（棘層/角質層增生、細胞分裂↑），而**真皮 (dermis) 變薄**（膠原重排、部分萎縮）。\n• 其他變化：血管密度**增加**（VEGF 介導 angiogenesis）、皮瓣真實表面積**增加**（非僅暫時拉長 = 有 biologic creep 生物性蠕變 + mechanical creep）、肌肉粒線體大小數目**增加**。\n• B 錯：真皮變薄非變厚、表皮增厚非萎縮。\n• C 錯：血管密度**上升**非下降。\n• D 錯：擴張皮膚**真實增加表面積**（生物性生長），非僅暫時拉長。\n• E 錯：肌肉粒線體大小數目**增加**非減少。","peropt":{"A":"◎ 正解。組織擴張後表皮增厚、真皮變薄。","B":"錯誤。應為真皮變薄、表皮增厚，與此相反。","C":"錯誤。擴張後血管密度上升（VEGF/angiogenesis），非下降。","D":"錯誤。擴張皮膚真實增加表面積（biologic creep），非僅暫時拉長。","E":"錯誤。肌肉粒線體大小與數目增加，非減少。"},"cite":"Neligan PS 5e Vol.1, Tissue expansion histology (biologic vs mechanical creep).","conflict":""},{"id":"9050","sub":"B6","src":"GS","years":[115],"stem":"對於乾淨、銳利切割造成且兩端可無張力對合的急性周邊神經斷裂，下列何者通常較適當？","opts":{"A":"永久觀察，不需追蹤功能恢復","B":"早期 primary nerve repair","C":"立即截肢以避免 neuroma","D":"只做傷口縫合，神經斷端不需處理","E":"常規以放射治療促進神經再生"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：急性周邊神經斷裂之修復時機與方式（Primary vs Secondary nerve repair）\n• 【最佳適應症】乾淨、銳利（clean, sharp）切割傷且兩斷端可無張力（tension-free）對合 → 首選 early primary (epineurial) repair，一般於受傷後數天內（<72小時至1週）進行，此時斷端可清楚辨識、無明顯纖維化，結果最佳。\n• 【生理基礎】神經修復成功仰賴軸突（axon）沿 endoneurial tube 以約 1 mm/day 速度再生（Wallerian degeneration 後由遠端 Schwann cell 形成 Büngner bands 導引）；無張力對合可避免缺血與纖維化，提高再神經化。\n• 【張力處理】若有間隙（gap）致無法無張力對合 → 應以 nerve graft（如 sural nerve）或 conduit/nerve transfer 橋接，切勿勉強拉攏縫合造成張力性缺血。\n• 【延遲修復適應症】污染傷口、crush/avulsion（傷害區範圍不明）→ 可先清創、標記斷端，待傷害範圍界定（demarcation）後行 secondary repair。\n• 現代觀念：即刻截肢、放射治療促進神經再生皆無實證且錯誤。","peropt":{"A":"錯誤。可修復之銳利斷裂不應消極觀察，會形成 neuroma 與功能喪失。","B":"◎ 正解。銳利、無張力可對合之急性斷裂 → 早期一期神經修復，結果最佳。","C":"錯誤。截肢為極端且無指徵之處置；neuroma 可以修復或 TMR/RPNI 預防。","D":"錯誤。僅縫皮而不處理神經斷端將導致 painful neuroma 及功能缺損。","E":"錯誤。放射治療對神經再生無促進作用，反而有害。"},"cite":"Neligan Plastic Surgery 5e, Vol.6 Peripheral nerve repair; Grabb & Smith 9e 周邊神經章","conflict":""},{"id":"9051","sub":"B6","src":"GS","years":[115],"stem":"關於 painful terminal neuroma 的形成與處置原則，下列何者最正確？","opts":{"A":"neuroma 只會發生在神經中段，不會發生在斷端","B":"neuroma 形成代表再神經化一定成功","C":"單純將神經斷端剪短即可保證不再疼痛","D":"提供再生軸突適當的生理目標，例如 targeted muscle reinnervation 或 regenerative peripheral nerve interface，可作為預防或治療策略之一","E":"所有細小感覺神經切斷後皆不可能造成疼痛"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Painful terminal neuroma 之形成機轉與現代處置（TMR / RPNI）\n• 【形成機轉】神經被切斷後，近端再生軸突（regenerating axons）失去遠端 target，於斷端與 Schwann cells、纖維母細胞纏結形成 disorganized neuroma；機械或化學刺激下產生異位放電 → 神經瘤性疼痛（neuroma pain）。可發生於任何被切斷之神經斷端，包含細小感覺神經。\n• 【核心觀念】給予再生軸突「適當的生理目標」以防止雜亂纏結是預防／治療關鍵：\n  - TMR（Targeted Muscle Reinnervation）：將神經接到新去神經化之運動神經分支/肌肉，提供軸突再生標的。\n  - RPNI（Regenerative Peripheral Nerve Interface）：將神經斷端包埋入游離肌肉小片（free muscle graft）提供標的，可同時作為義肢訊號界面。\n• 【傳統方法】單純剪短（traction neurectomy）、埋入肌肉/骨、酒精注射等效果不穩定，無法保證止痛。\n• neuroma 形成不代表功能性再神經化成功。","peropt":{"A":"錯誤。斷端（terminal/end neuroma）為最常見型，並非只發生於中段（in-continuity）。","B":"錯誤。neuroma 是雜亂再生，並不代表功能性再神經化成功。","C":"錯誤。單純剪短無法保證不再疼痛，常復發。","D":"◎ 正解。提供軸突生理標的（TMR、RPNI）為現代預防／治療 painful neuroma 之策略。","E":"錯誤。細小感覺神經切斷後亦可能形成痛性神經瘤。"},"cite":"Neligan 5e Peripheral nerve / neuroma management; TMR (Dumanian), RPNI (Cederna) 相關文獻","conflict":""},{"id":"9052","sub":"B8","src":"GS","years":[115],"stem":"關於 tissue engineering 的基本概念與 scaffold materials，下列何者正確？(複選)","opts":{"A":"Tissue-engineered solutions typically combine biomaterial scaffolds, cell sources, and biologic cues to guide tissue development.","B":"Tissue-engineered solutions are essentially inert prosthetic implants and do not aim for biologic integration with host tissue.","C":"Polycaprolactone (PCL), polylactic acid (PLA), polyglycolic acid (PGA), and PLGA are examples of biodegradable synthetic polymers used in tissue engineering.","D":"Collagen, elastin, hyaluronic acid, fibrin, alginate, and silk are examples of biologically derived scaffold materials.","E":"The mechanical properties of a scaffold have minimal influence on embedded or host cells and do not affect stem cell differentiation."},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯考點：組織工程（Tissue Engineering）三大要素與 scaffold materials（複選）\n• 【三大支柱 Triad】(1) Scaffold（支架/生物材料）、(2) Cells（細胞來源，如幹細胞）、(3) Signals/biologic cues（生長因子等生物訊號）— 目標為引導組織發育並與宿主生物性整合（biologic integration），而非惰性義肢。\n• 【合成可降解聚合物 synthetic biodegradable polymers】PCL（polycaprolactone）、PLA（polylactic acid）、PGA（polyglycolic acid）、PLGA — 可調控降解速率與機械強度。\n• 【天然/生物來源 scaffold】collagen、elastin、hyaluronic acid、fibrin、alginate、silk — 生物相容、含細胞辨識訊號。\n• 【機械性質關鍵】支架之硬度/彈性（stiffness/matrix elasticity）會經 mechanotransduction 顯著影響幹細胞分化命運（如 Engler 研究：基質硬度導向 neurogenic/myogenic/osteogenic 分化）→ 故 E 敘述『機械性質影響極小』為錯。","peropt":{"A":"◎ 正確。組織工程結合 scaffold＋cells＋biologic cues 引導組織發育。","B":"錯誤。組織工程追求生物整合與再生，非惰性義肢。","C":"◎ 正確。PCL/PLA/PGA/PLGA 為可降解合成聚合物。","D":"◎ 正確。collagen/elastin/HA/fibrin/alginate/silk 為生物來源支架。","E":"錯誤。支架機械性質經 mechanotransduction 明顯影響細胞行為與幹細胞分化。"},"cite":"Neligan 5e Vol.1 Tissue engineering / biomaterials; Grabb & Smith 9e 再生醫學章","conflict":""},{"id":"9053","sub":"B11","src":"GS","years":[115],"stem":"A researcher is interested in investigating quality of free flap reconstruction. When discussing available datasets, their mentor asks what the focus on the project will be. The Donabedian framework proposes three domains of quality:","opts":{"A":"Patient, Surgeon, Hospital","B":"Structure, Process, Outcome","C":"Diagnosis, Treatment, Morbidity","D":"Intervention, Comparison, Outcome","E":"Population, Intervention, Outcomes"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Donabedian 醫療品質三構面（Quality of care framework）\n• Avedis Donabedian 提出評估醫療品質三大 domain：\n  - Structure（結構）：資源、設施、人力、設備、組織架構（如醫院是否具顯微重建能力）。\n  - Process（過程）：實際提供的照護行為與流程（如手術執行、術後照護是否遵循指引）。\n  - Outcome（結果）：對病患健康狀態之影響（如皮瓣存活率、併發症、生活品質）。\n• 【應用】研究游離皮瓣重建品質時，須先界定聚焦於結構、過程或結果何者。\n• 【易混淆】PICO（Population, Intervention, Comparison, Outcome）為實證醫學問題架構，非品質三構面。","peropt":{"A":"錯誤。非 Donabedian 三構面。","B":"◎ 正解。Structure、Process、Outcome 為 Donabedian 品質三構面。","C":"錯誤。非此架構。","D":"錯誤。屬 PICO 之部分元素，非品質三構面。","E":"錯誤。此為 PICO（實證問題架構）。"},"cite":"Neligan 5e Evidence-based medicine / quality; Donabedian 1966","conflict":""},{"id":"9054","sub":"B4","src":"GS","years":[115],"stem":"According to the theory of spherical graft replacement originally described by Eto et al., what is the characteristic cellular fate within the middle \"regenerating zone\" of a transplanted fat particle during the initial 3-month post-grafting period?","opts":{"A":"Both adipocytes and adipose-derived stem cells (ASCs) survive because they are in direct contact with the surrounding recipient tissue.","B":"Both adipocytes and ASCs die without regeneration due to their location being farthest from the recipient tissue, which causes relative ischemia.","C":"Grafted adipocytes die while ASCs survive, become activated, and differentiate into mature adipocytes to replace the dead cells.","D":"Grafted adipocytes survive and proliferate, while ASCs undergo immediate necrosis and form oil cysts or fibrosis regardless of the recipient site conditions."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：脂肪移植 Eto 球型置換理論（Spherical graft replacement theory）之三區帶\n• Eto 等人以移植脂肪顆粒之球型模型描述三個同心區帶：\n  - 【Surviving zone（外層）】距受區組織最近（<~300 µm），adipocytes 與 ASCs 皆存活。\n  - 【Regenerating zone（中層）】相對缺血：成熟脂肪細胞（adipocytes）死亡，但較耐缺氧之 adipose-derived stem cells（ASCs）存活、被活化，於前3個月分化為新的成熟脂肪細胞取代死亡細胞 → 本題答案 C。\n  - 【Necrotizing zone（核心）】距受區最遠，adipocytes 與 ASCs 皆死亡 → 形成 oil cyst、纖維化、鈣化。\n• 【臨床意義】說明脂肪移植早期體積維持與 ASC 之再生角色，強調受區血流與顆粒大小對 graft take 之影響（小顆粒、良好血床有利存活）。","peropt":{"A":"錯誤（描述 surviving zone 外層，非中層 regenerating zone）。","B":"錯誤（描述 necrotizing zone 核心，非中層）。","C":"◎ 正解。中層 regenerating zone：adipocytes 死亡、ASCs 存活活化並分化為新成熟脂肪細胞。","D":"錯誤。ASCs 較耐缺血並非立即壞死；此描述與理論相反。"},"cite":"Eto et al., Plast Reconstr Surg 2012（spherical graft replacement）; Neligan 5e Fat grafting","conflict":""},{"id":"9055","sub":"B8","src":"NG","years":[104],"stem":"Plastic surgeon 對幹細胞及再生醫學之興趣，下列何者為非?","opts":{"A":"整外醫師容易從抽脂手術中取得大量之adipose derived stromal cell","B":"整外醫師希望有天能利用幹細胞在prefabricated biomimetic scafford來重建身體上之任何組織缺損","C":"Stem cells 可以在in vitro 及 in vivo 分化成不同之cell types","D":"Stem cell 可來自於 embryonic or postnatal sources","E":"Stem cell 無法再生成新的stem cell"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：幹細胞與再生醫學基本原則（何者為非）\n• 【幹細胞定義兩大特性】(1) Self-renewal（自我更新）：可分裂產生與自身相同之幹細胞；(2) Multipotency/pluripotency（多向分化）：可分化為多種細胞型 → 故 E『幹細胞無法再生成新的幹細胞』違反 self-renewal 定義，為錯（本題答案）。\n• 【來源】胚胎（embryonic, pluripotent）與出生後（postnatal/adult, 如 MSC、ASC；及 iPSC）皆可。\n• 【整外優勢】抽脂（lipoaspirate）可大量取得 adipose-derived stromal/stem cells（ASCs），為整外再生醫學重要細胞來源。\n• 【願景】結合 prefabricated biomimetic scaffold 與幹細胞重建各式組織缺損。\n• 幹細胞可於 in vitro 與 in vivo 分化為不同細胞型。","peropt":{"A":"正確。抽脂可取得大量 ASC。","B":"正確。以幹細胞＋biomimetic scaffold 重建組織為再生醫學願景。","C":"正確。幹細胞可於體外與體內分化為不同細胞型。","D":"正確。幹細胞來源含胚胎與出生後組織。","E":"◎ 正解（為非）。幹細胞具 self-renewal，能再生成新的幹細胞，此敘述錯誤。"},"cite":"Neligan 5e Stem cells & regenerative medicine; Grabb & Smith 9e","conflict":""},{"id":"9056","sub":"B1","src":"NG","years":[104],"stem":"慢性傷口( chronic wound ) 是指超過多久尚未癒合之傷口?","opts":{"A":"4 weeks","B":"8 weeks","C":"10 weeks","D":"16 weeks","E":"6 months"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：慢性傷口（Chronic wound）定義\n• 慢性傷口定義：未能依正常有序、及時之修復過程達到解剖與功能完整性，或雖癒合但未回復持久性完整；操作型定義為 >4週（4 weeks）仍未癒合之傷口 → 本題答案 A。\n• 【機轉】卡在發炎期（inflammatory phase）：慢性發炎、過量 MMPs（基質金屬蛋白酶）降解 ECM 與生長因子、老化/衰竭之纖維母細胞、細菌生物膜（biofilm）、組織缺氧。\n• 【區別】急性傷口依序經 hemostasis → inflammation → proliferation → remodeling。","peropt":{"A":"◎ 正解。慢性傷口 = >4週未癒合。","B":"錯誤。8週非標準定義門檻。","C":"錯誤。10週非定義。","D":"錯誤。16週非定義。","E":"錯誤。6個月非定義門檻。"},"cite":"Neligan 5e Wound healing (chronic wounds); Grabb & Smith 9e 傷口癒合章","conflict":""},{"id":"9057","sub":"B1","src":"NG","years":[104],"stem":"慢性傷口( chronic wound ) 有以下主要分類，何者為非?","opts":{"A":"Venous ulcer","B":"Arterial ulcer","C":"Diabetic ulcer","D":"Pressure sore","E":"Lymphatic ulcer"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：慢性傷口主要分類（何者為非）\n• 常見慢性傷口四大類：\n  - Venous ulcer（靜脈潰瘍）：下肢內踝 gaiter 區、靜脈高壓、含鐵血黃素沉著。\n  - Arterial ulcer（動脈/缺血性潰瘍）：末端、疼痛、邊緣清楚。\n  - Diabetic (neuropathic) ulcer：足底受壓點、神經病變＋缺血。\n  - Pressure sore/injury（壓瘡）：骨突處持續受壓。\n• 【誘答】E『Lymphatic ulcer』並非慣用之慢性傷口標準分類（淋巴水腫主要造成組織纖維化與感染風險，非典型潰瘍分類）→ 本題答案 E（為非）。","peropt":{"A":"正確分類（靜脈潰瘍）。","B":"正確分類（動脈/缺血性潰瘍）。","C":"正確分類（糖尿病神經病變潰瘍）。","D":"正確分類（壓瘡）。","E":"◎ 正解（為非）。Lymphatic ulcer 非標準慢性傷口主要分類。"},"cite":"Neligan 5e Chronic wounds classification","conflict":""},{"id":"9058","sub":"B2","src":"NG","years":[104,107],"stem":"Keloid及hypertrophic scar之分別，下列何者為非?","opts":{"A":"Keloid 之 type I collagen 與 type III collagen比增加","B":"Keloid 沒有a-smooth-muscle actin expressing myofibroblasts","C":"Hypertrophic scar 有a-smooth-muscle actin expressing myofibroblasts","D":"Keloid 及 Hypertrophic scar 之 fibroblast density 皆增加, 但Keloid之中心部位為acellular","E":"Hypertrophic scar 之 collagen fibers 較大較粗, 與 epidermis平行"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Keloid vs Hypertrophic scar（HTS）之組織學/分子差異（何者為非）\n• 【共同】皆為異常疤痕、fibroblast density 增加、膠原過度沉積。\n• 【Keloid】超出原傷口界線（跨越 wound margin）、不會自行消退、好發深膚色與特定部位（耳垂、胸骨、肩、下顎）；type I/III collagen 比值增加；中心呈 acellular hyalinized collagen（玻璃樣、粗大、不規則、無方向性）；缺乏明顯 α-SMA(+) myofibroblasts。\n• 【HTS】侷限於原傷口界線、常隨時間部分消退、與張力/關節屈側相關；富含 α-SMA(+) myofibroblasts（造成攣縮）；膠原較細、呈波浪狀結節、與表皮平行且較規則。\n• 【本題錯述 E】『HTS 之 collagen fibers 較大較粗』有誤——較大較粗、玻璃樣者為 keloid；HTS 膠原較細。故 E 為非（答案）。","peropt":{"A":"正確。Keloid type I/III collagen 比值增加。","B":"正確。Keloid 缺乏明顯 α-SMA(+) myofibroblasts。","C":"正確。HTS 富含 α-SMA(+) myofibroblasts。","D":"正確。兩者 fibroblast density 增加，且 keloid 中心呈 acellular。","E":"◎ 正解（為非）。膠原較大較粗者為 keloid；HTS 膠原較細，敘述錯誤。"},"cite":"Neligan 5e Scar (keloid vs hypertrophic scar); Grabb & Smith 9e","conflict":""},{"id":"9059","sub":"B6","src":"NG","years":[104],"stem":"影響 Nerve repair outcome之因素, 下列何者為非?","opts":{"A":"年齡及性別","B":"受傷3週內縫合，結果最好","C":"Crush and Avulsion injuries 比 sharp injury 差","D":"Proximal injury 比 distal injury 之重建困難","E":"在 Zone of injury探查重建，結果都較差"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：影響神經修復預後之因素（何者為非）\n• 【有利/影響因素】\n  - 年齡：越年輕預後越好（兒童再生佳）；性別非顯著因素。\n  - 修復時機：越早越好，一般受傷數週內（本題稱3週內）縫合結果較佳。\n  - 傷害型態：crush/avulsion（擠壓/撕脫）因傷害區範圍大、纖維化重，預後比 sharp injury 差。\n  - 位置：Proximal injury 因再生距離長、target 遠、易 motor/sensory misdirection，重建較 distal 困難。\n  - 於 zone of injury（受傷區）內探查/修復，因瘢痕與血運差，結果較差。\n• 【本題答案 A】『年齡及性別』——年齡確為因素，但性別並非公認之預後決定因子，故此組合敘述為非（答案 A）。","peropt":{"A":"◎ 正解（為非）。年齡為因素但性別非公認預後因子，此組合敘述不成立。","B":"正確。早期（數週內）修復結果較佳。","C":"正確。crush/avulsion 預後較 sharp 差。","D":"正確。近端損傷重建較遠端困難。","E":"正確。於 zone of injury 內修復結果較差。"},"cite":"Neligan 5e Peripheral nerve repair — prognostic factors","conflict":""},{"id":"9060","sub":"B3","src":"NG","years":[104],"stem":"若以神經支配來分類 muscle，下列何者為非?","opts":{"A":"Type I 為 single unbranched nerve entering muscle","B":"Type II 為 single branched nerve entering muscle","C":"Type III 為 multiple branches from same nerve trunk","D":"Type IV 為 multiple branches from different nerve trunk","E":"Type V 為 multiple branches from multiple nerve trunk"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：以神經支配型態分類 muscle（何者為非）— 此為功能性肌肉/肌皮瓣移植之神經型態分類\n• Type I：single unbranched nerve entering muscle（單一未分支神經進入）。\n• Type II：single branched nerve entering muscle（單一神經進入後分支）。\n• Type III：multiple branches from same nerve trunk（來自同一神經幹之多分支）。\n• Type IV：multiple branches from different nerve trunk（來自不同神經幹之多分支）。\n• 【本題答案 E】此分類僅 Type I–IV，並無所謂『Type V：multiple branches from multiple nerve trunks』，故 E 為非（虛構分類）。\n• 【臨床意義】神經型態影響肌肉可否作為功能性肌肉轉移（如 Type I/II 適合單一神經之功能重建）。","peropt":{"A":"正確。Type I：單一未分支神經。","B":"正確。Type II：單一分支神經。","C":"正確。Type III：同一神經幹多分支。","D":"正確。Type IV：不同神經幹多分支。","E":"◎ 正解（為非）。並無 Type V 分類，此為虛構。"},"cite":"Neligan 5e / Mathes & Nahai 肌肉神經支配型態分類","conflict":""},{"id":"9061","sub":"B3","src":"NG","years":[104],"stem":"有關delay phenomenon之敘述, 下列何者為非?","opts":{"A":"The only documented method 來增加 skin flap survival 即是 delay procedure.","B":"Delay procedure 可以從計劃中之 flap margin 部份切開.","C":"Delay procedure 可以是 ligation of non-pedicle vessels supplying the flap.","D":"Delay 之生理效果是使存在於 flap axis 之動脈變更大.","E":"The maximal effect 是在術後一週產生"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Delay phenomenon（皮瓣延遲現象，何者為非）\n• 【定義】在皮瓣完全掀起前，先部分切斷其部分血流供應（部分切開 flap margin 或結紮非蒂部血管），經一段時間後再完成掀瓣，可增加皮瓣存活長度。\n• 【機轉】(1) 使既存之 choke vessels 擴張、真血管重塑（true vessel enlargement），血流沿 flap axis 之動脈變大；(2) 缺血預適應（ischemic preconditioning）、交感神經去神經化致血管擴張、代謝適應。\n• 【時程】delay 之效果隨時間累積，最大存活效益一般在術後約 2–3 週（非一週）才充分建立 → 本題 E『最大效果在術後一週產生』為錯述，即為本題答案（為非）。\n• 【A 敘述】delay 為經典且documented 增加皮瓣存活之方法（並非『唯一』方法——尚有藥物、缺血預適應等；官方仍以 A 為正確敘述、E 為錯）。\n• ⚠備註：本題曾有考生質疑，惟權威答案 E（『術後一週』為錯述→即『為非』之正解）成立，予以保留，答案不變。","peropt":{"A":"正確（官方採認）。delay 為經典 documented 增加皮瓣存活之方法。","B":"正確。可自計畫皮瓣邊緣部分切開。","C":"正確。可結紮供應皮瓣之非蒂部血管。","D":"正確。生理效果使 flap axis 之動脈變大。","E":"◎ 正解（為非）。最大效果約需2–3週而非術後一週，敘述錯誤。"},"cite":"Neligan 5e Flap physiology — delay phenomenon; Grabb & Smith 9e 皮瓣章","conflict":""},{"id":"9062","sub":"B3","src":"NG","years":[104],"stem":"根據 Mathes-Nahai classification of muscle and musculocutaneous flap, 下列何者為非? (複選)","opts":{"A":"Type I : Tensor fascia lata, Gastrocnemius","B":"Type II: Gracilis , soleus","C":"Type III: Gluteus maximus, Trapezius","D":"Type IV: Sartorius, rectus abdominis","E":"Type V : Latissimus dorsi, pectoralis major"},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"🎯考點：Mathes–Nahai 肌肉/肌皮瓣血流供應分類（何者為非，複選）\n• Type I（單一血管蒂）：Tensor fascia lata、Gastrocnemius。\n• Type II（一主要＋數個次要蒂，最常見型）：Gracilis、Soleus。\n• Type III（兩個支配性蒂 dominant pedicles）：Gluteus maximus、Rectus abdominis（並非 Trapezius）→ C 誤置 Trapezius，為非。\n• Type IV（多節段性蒂 segmental pedicles）：Sartorius、Tibialis anterior（Rectus abdominis 屬 Type III，非 IV）→ D 誤置 rectus abdominis，為非。\n• Type V（一主要蒂＋次要節段蒂）：Latissimus dorsi、Pectoralis major。\n• 【本題答案 CD】C（Trapezius 應屬 Type II）、D（rectus abdominis 應屬 Type III）配對錯誤。","peropt":{"A":"正確配對（Type I：TFL、Gastrocnemius）。","B":"正確配對（Type II：Gracilis、Soleus）。","C":"◎ 正解（為非）。Type III 為 Gluteus maximus、Rectus abdominis；Trapezius 屬 Type II，配對錯誤。","D":"◎ 正解（為非）。Type IV 為 Sartorius、Tibialis anterior 等；Rectus abdominis 屬 Type III，配對錯誤。","E":"正確配對（Type V：Latissimus dorsi、Pectoralis major）。"},"cite":"Mathes & Nahai classification; Neligan 5e / Grabb & Smith 9e 皮瓣章","conflict":""},{"id":"9063","sub":"B2","src":"NG","years":[104],"stem":"下列何者已在臨床上應用於 scar prevention and reduction scar therapy? (複選)","opts":{"A":"Scar excision","B":"Steroid injection.","C":"5-Fluorouracil","D":"Vit B and K","E":"Calcium channel blocker ( verapamil )"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"🎯考點：疤痕預防與治療之臨床應用（複選）\n• 【已有臨床應用之方式】\n  - Scar excision（手術切除，常結合其他輔助以防復發）。\n  - Steroid injection（病灶內 triamcinolone，第一線；抑制 collagen 合成、促進膠原分解）。\n  - 5-Fluorouracil（5-FU，抑制纖維母細胞增生，常與類固醇合併）。\n• 【本題答案 ABC】上述三者為臨床確立之疤痕/蟹足腫治療。\n• 【D、E 非最佳答案】Vitamin B/K 缺乏充分實證支持作為疤痕治療；Calcium channel blocker（verapamil）雖有文獻探討可調節 ECM 生成，但屬新興/研究性、非經典臨床確立第一線（官方未計入）。","peropt":{"A":"◎ 正確。Scar excision 為臨床疤痕治療方式。","B":"◎ 正確。類固醇注射為第一線。","C":"◎ 正確。5-FU 為臨床應用之抗疤痕藥。","D":"未計入。Vit B/K 缺乏疤痕治療之充分實證。","E":"未計入。Verapamil 屬新興/研究性，非官方採認之確立療法。"},"cite":"Neligan 5e Scar management; Grabb & Smith 9e","conflict":""},{"id":"9065","sub":"B5","src":"NG","years":[104,105],"stem":"Pathogenic mechanisms have been suggested to play a central role in the development of no-reflow phenomenon in the skeletal muscle of laboratory animals, choose the irrelevant one:","opts":{"A":"oxygen-derived free radicals causing damage in the endothelial and parenchymal cells","B":"cell membrane damage allowing Ca2+ influx, resulting in intracellular overload","C":"release of the vasorelaxing factor NO attenuated pedicle skin flap ischemic necrosis","D":"change in arachidonic acid metabolism resulting in synthesis of less vasodilating and antithrombotic PGI2 by the endothelium","E":"increased synthesis of vasoconstricting and thrombotic TXA2 by platelets"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：No-reflow phenomenon 之致病機轉（選出無關者）— 骨骼肌缺血-再灌流傷害\n• No-reflow：組織經一段缺血後恢復灌流，微循環仍無法有效再灌注（微血管栓塞、內皮腫脹）之現象，為皮瓣/斷肢再植缺血-再灌流傷害（ischemia-reperfusion injury）核心。\n• 【致病機轉】\n  - Oxygen-derived free radicals（氧自由基）造成內皮與實質細胞傷害。\n  - 細胞膜受損 → Ca²⁺ 內流、細胞內鈣過載。\n  - Arachidonic acid 代謝改變 → 內皮合成較少之血管擴張/抗栓 PGI2。\n  - 血小板合成較多之血管收縮/促栓 TXA2。\n  - 中性球活化、微血管栓塞、內皮腫脹。\n• 【本題答案 C】『NO（血管舒張因子）之釋放減輕皮瓣缺血壞死』屬保護性/治療性效應，並非造成 no-reflow 之致病機轉 → 為無關者（選 C）。","peropt":{"A":"相關（致病）。氧自由基傷害內皮與實質細胞。","B":"相關（致病）。細胞膜受損致 Ca²⁺ 內流過載。","C":"◎ 正解（無關者）。NO 釋放為保護性效應，非致病機轉。","D":"相關（致病）。PGI2 減少利於血栓/血管收縮。","E":"相關（致病）。TXA2 增加促血管收縮與血栓。"},"cite":"Neligan 5e Ischemia-reperfusion / no-reflow; 皮瓣缺血生理","conflict":""},{"id":"9066","sub":"B8","src":"NG","years":[104,105],"stem":"Regarding properties of an ideal implant, choose wrong answers:","opts":{"A":"Minimal foreign-body reaction.","B":"Good tensile strength.","C":"Tolerates infected environment.","D":"Minimal wound complications.","E":"Be inexpensive."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：理想植入物（ideal implant）之特性（選出錯誤者）\n• 【理想生物材料植入物特性】\n  - 最小異物反應（minimal foreign-body reaction）、生物相容。\n  - 良好機械/抗張強度（good tensile strength）、耐用不易疲勞。\n  - 抗感染環境（tolerates infected environment，於污染場合仍不易感染）。\n  - 最小傷口併發症（minimal wound complications）。\n  - 易塑形、可滅菌、化學惰性、不致癌、不致敏。\n• 【本題答案 E】『Be inexpensive（便宜）』屬經濟考量，並非植入物之生物/物理『理想特性』本身 → 為錯誤（選 E）。","peropt":{"A":"正確特性（最小異物反應）。","B":"正確特性（良好抗張強度）。","C":"正確特性（可耐受感染環境）。","D":"正確特性（最小傷口併發症）。","E":"◎ 正解（錯誤/為非）。價格便宜為經濟考量，非理想植入物之特性。"},"cite":"Neligan 5e / Grabb & Smith 9e Biomaterials — properties of ideal implant","conflict":""},{"id":"9067","sub":"B9","src":"NG","years":[104,105],"stem":"The following description which one is incorrect about the cartilage allograft?","opts":{"A":"Chondrocytes express HLA antigens on their surface and are immunogenic. The matrix is only weakly antigenic.","B":"Surgical scoring or dicing with resultant exposure of allogeneic cells has been shown to hasten reabsorption of allogeneic cartilage.","C":"Cartilage allograft, usually with irradiation pretreatment, has been used for volume augmentation in the facial skeleton.","D":"It has also been noted that larger grafts are less su
