directed toward that same articulation."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Perforasome theory（Saint-Cyr）四大特徵——選『錯誤』\n\n**Saint-Cyr perforasome 四特徵：**\n- **A 正確**：每個 perforasome 藉 direct 與 indirect linking vessels 與相鄰 perforasome 相連。\n- **B 正確**：皮瓣設計/皮島方向應依 linking vessels 走向——四肢為『軸向（axial）』，軀幹為『垂直於中線（perpendicular to midline）』。\n- **C 正確**：填充順序為先充填『同一 source artery』的 perforasome，再及相鄰 source artery 的 perforator。\n- **D 錯誤（本題答案）**：位於關節附近之 perforator，其血流方向是『遠離（away from）』該關節，而非朝向（toward）該關節。\n\n**考點結論**：答案 **D**（方向應為遠離關節）。","peropt":{"A":"正確：perforasome 間以 direct/indirect linking vessels 相連。","B":"正確：皮瓣方向依 linking vessels——四肢軸向、軀幹垂直中線。","C":"正確：先填充同 source artery 再及相鄰 source artery。","D":"◎ 錯誤：關節旁 perforator 血流方向應遠離關節（非朝向）。"},"cite":"Saint-Cyr M. et al. Perforasome theory；Neligan 5e perforator flap 章。","conflict":""},{"id":"9144","sub":"B2","src":"NG","years":[108],"stem":"About keloids and hypertrophic scars, which of the following statement(s) is/are incorrect?","opts":{"A":"Keloids contain a significantly elevated number of fibroblasts.","B":"Current treatments for keloid include local injection of triamcinolone acetonide, low-dose radiotherapy after excision, cryotherapy, and pulsed dye laser.","C":"Modulation of TGF-beta is a promising therapy for treatment of scar. Prophylactical injecting recombinant TGF-beta3 have demonstrated an improvement in the appearance of scars.","D":"Timing of scar revision is usually after the scar matures.","E":"A single large Z-plasty at a specific angle will create as same length as multiple small Z-plasties at that same angle."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 Keloid 與 Hypertrophic scar——選『錯誤』\n\n**逐項核對：**\n- **A 正確**：Keloid 含顯著增多的纖維母細胞（fibroblasts）與過度膠原沉積。\n- **B 正確**：Keloid 現行治療含病灶內 triamcinolone、切除後低劑量放療、冷凍治療、pulsed dye laser。\n- **C 正確**：調控 TGF-β 為疤痕治療方向；預防性注射 recombinant **TGF-β3** 可改善疤痕外觀（β1/β2 促纖維化，β3 抗疤）。\n- **D 正確**：疤痕修整（scar revision）時機通常於疤痕成熟後。\n- **E 錯誤（本題答案）**：在相同角度下，『單一大 Z-plasty 所得的延長量『大於』多個小 Z-plasty』（大 Z 延長多但橫向張力大、需更多鬆弛組織）；兩者延長量並不相同，故敘述錯誤。\n\n**考點結論**：答案 **E**。","peropt":{"A":"正確：keloid 纖維母細胞顯著增多。","B":"正確：triamcinolone、術後低劑量放療、冷凍、PDL 為治療選項。","C":"正確：預防性 recombinant TGF-β3 可改善疤痕。","D":"正確：scar revision 通常於疤痕成熟後進行。","E":"◎ 錯誤：同角度下單一大 Z-plasty 延長量大於多個小 Z-plasty，非相同。"},"cite":"Neligan 5e scar / keloid 章；Z-plasty geometry（Grabb & Smith 9e）。","conflict":""},{"id":"9145","sub":"B1","src":"NG","years":[108],"stem":"Which of the following statement is incorrect?","opts":{"A":"Wound healing response can be divided into following overlapping phases: hemostasis, inflammation, proliferation, and remodeling.","B":"The dysfunctional inflammatory responses in diabetic wounds are caused by impairment in the ability of macrophages.","C":"In ischemic wound, decreased ATP production impairs the ability of fibroblasts to synthesize type III collagen to create initial ECM of granulation tissue.","D":"Biofilm infection in wounds represents significant clinical and diagnostic challenges. Surgical debridement is an effective way to eradicate biofilm infection.","E":"Transepidermal water loss (TEWL) is a more objective and comprehensive way to monitor wound healing."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 傷口癒合（wound healing）——選『錯誤』\n\n**逐項核對：**\n- **A 正確**：傷口癒合四個重疊期——止血（hemostasis）、發炎（inflammation）、增生（proliferation）、重塑（remodeling）。\n- **B 正確**：糖尿病傷口的發炎反應失能與『巨噬細胞（macrophage）功能受損』有關（M1→M2 轉換障礙）。\n- **C 正確**：缺血傷口 ATP 生成下降，損及纖維母細胞合成 type III collagen 以形成肉芽組織初始 ECM。\n- **D 錯誤（本題答案）**：Biofilm 感染極難根除；外科清創可『減少/破壞』biofilm 負荷，但『無法單靠清創徹底根除（eradicate）』——biofilm 會迅速再形成，需反覆清創合併輔助治療。\n- **E 正確**：經皮水分散失（TEWL, transepidermal water loss）為監測傷口/屏障癒合較客觀之指標。\n\n**考點結論**：答案 **D**。","peropt":{"A":"正確：癒合四重疊期（止血/發炎/增生/重塑）。","B":"正確：糖尿病傷口發炎失能源於巨噬細胞功能受損。","C":"正確：缺血傷口 ATP 下降損及 type III collagen 合成。","D":"◎ 錯誤：外科清創無法單獨徹底根除 biofilm（會再形成，須反覆處理）。","E":"正確：TEWL 為較客觀之傷口/屏障監測指標。"},"cite":"Neligan 5e wound healing 章；biofilm 清創（debridement 減負荷但難根除）。","conflict":""},{"id":"9146","sub":"B4","src":"NG","years":[108],"stem":"Which of the following statement about skin graft is incorrect?","opts":{"A":"Full-thickness and composite grafts will show hair regrowth 2-3 months after grafting.","B":"Patients can regain normal sensation of the grafted area after 1 year.","C":"Moisturizing skin graft for at least 3 months is advised due to sweat glands reactivate their function up to 3 months after grafting due to neural reconnection.","D":"Thin STSGs have the possibility of performing multiple harvests from the same donor area about 2 weeks after the previous harvest.","E":"After skin grafting, vessel ingrowth mainly from the wound bed and less so from the wound margins."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 皮膚移植（skin graft）——選『錯誤』\n\n**逐項核對：**\n- **A 正確**：全層與複合移植（FTSG/composite graft）約於移植後 2–3 個月開始長毛（含毛囊）。\n- **B 錯誤（本題答案）**：移植區感覺會部分恢復（sensory reinnervation 由受床邊緣向內），但『通常無法恢復到與正常皮膚完全相同』；『1 年後恢復正常感覺』之敘述過強、不正確。\n- **C 正確**：汗腺功能於移植後約 3 個月經神經再連結恢復，故建議至少保濕 3 個月。\n- **D 正確**：薄的 STSG 可於前次取皮約 2 週後於同一供區重複取皮。\n- **E 正確**：皮膚移植後血管長入主要來自傷口床（wound bed），來自邊緣較少。\n\n**考點結論**：答案 **B**。","peropt":{"A":"正確：FTSG/composite graft 約 2–3 個月開始長毛。","B":"◎ 錯誤：移植區感覺部分恢復但通常無法完全正常（非 1 年恢復正常）。","C":"正確：汗腺約 3 個月經神經再連結恢復，建議保濕 ≥3 個月。","D":"正確：薄 STSG 可約 2 週後同供區再取。","E":"正確：血管長入主要來自 wound bed。"},"cite":"Neligan 5e / Grabb & Smith 9e skin graft 章（reinnervation、sweat gland、STSG re-harvest）。","conflict":""},{"id":"9147","sub":"B3","src":"NG","years":[108],"stem":"Which of the follow up concepts is incorrect?","opts":{"A":"Each angiosome defines the safe anatomic boundary of tissue in each layer that can be transferred separately or combined on the underlying source vessels as a composite flap.","B":"Because the junctional zone between adjacent angiosomes usually occurs within muscles of the deep tissue, these muscles provide an important anastomotic detour if the main source artery or vein is obstructed.","C":"Because most muscles span two or more angiosomes and are supplied from each territory, one is able to capture the skin island from one angiosome by muscle supplied in the adjacent territory.","D":"Based on the flap perforator, it is possible to reliably capture an adjacent cutaneous territory in any direction. In about 80% of the animal studies, the limit of flap survival was at the junction between second and third territory.","E":"None of the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 Angiosome 概念（Taylor & Palmer）——選『錯誤』\n\n**逐項核對（答案 E = None of the above，即 A–D 皆正確）：**\n- **A 正確**：每個 angiosome 界定各層可由 source vessel 安全轉移（單獨或複合）之解剖界線。\n- **B 正確**：相鄰 angiosome 的交界區（junctional zone）多位於深層肌肉內，這些肌肉提供重要的吻合繞道（anastomotic detour），當主 source artery/vein 阻塞時可代償。\n- **C 正確**：多數肌肉橫跨兩個以上 angiosome、由各領域供血，故可藉相鄰領域供血的肌肉『捕獲』另一 angiosome 之皮島。\n- **D 正確**：依皮瓣 perforator 可可靠捕獲任一方向之相鄰皮膚領域；約 80% 動物研究中皮瓣存活極限位於『第二與第三領域交界』。\n- **E 為答案**：因 A–D 皆正確，故『以上皆非（none of the above 有誤）』。\n\n**考點結論**：答案 **E**（A–D 皆為正確敘述）。","peropt":{"A":"正確：angiosome 界定各層可安全轉移之解剖界線。","B":"正確：交界區位於深層肌肉，提供吻合繞道代償。","C":"正確：肌肉跨多 angiosome，可捕獲相鄰皮島。","D":"正確：可捕獲相鄰皮膚領域；約 80% 存活極限在第 2–3 領域交界。","E":"◎ None of the above：因 A–D 皆正確，故無錯誤敘述。"},"cite":"Taylor & Palmer angiosome concept；Neligan 5e flap vascular anatomy 章。","conflict":""},{"id":"9148","sub":"B3","src":"NG","years":[108],"stem":"In order to augment pedicle flap viability, which of the following statement is/are incorrect? (複選)","opts":{"A":"In random-pattern skin flap, increase the width of the pedicle can increase the viable length of the skin flap.","B":"Incorporating a direct artery of a larger perforator in the skin flap in one of the surgical manipulations to augment flap viability.","C":"Surgical delay and vascular delay are proven techniques for augmenting flap viability in human patients.","D":"Surgical delay procedure results in opening of arteriovenous shunt flow, which supply the perfusion of skin flap.","E":"Drug for augmentation of pedicle flap viability in studies includes glucocorticoid, alpha-adrenoreceptor antagonists, beta-adrenoreceptor agonists, calcium channel blockers, TXA2 synthesis inhibitor, TXA2 receptor antagonist, vasodilating prostanoids, and 5HT2 receptor antagonist."},"ans":"AD","multi":true,"etype":"ai","expl":"","key":"🎯 增進帶蒂皮瓣（pedicle flap）存活——選『錯誤』（複選）\n\n**逐項核對：**\n- **A 錯誤（選）**：在 random-pattern skin flap，『增加蒂寬（width）並不能增加可存活長度』——存活長度取決於 perfusion pressure，與寬度無線性關係。\n- **B 正確**：於皮瓣內納入較大 perforator 的直接動脈（direct artery），是增進皮瓣存活的手術操作之一。\n- **C 正確**：外科延遲（surgical delay）與血管延遲（vascular delay）為人體已證實可增進皮瓣存活之技術。\n- **D 錯誤（選）**：延遲手術的機轉是『關閉（close）動靜脈分流（AV shunt）』使血流導向營養性微循環灌流皮膚，而非『開放（open）』AV shunt——原敘述方向相反，故錯。\n- **E 正確**：研究中用於增進皮瓣存活之藥物包含 glucocorticoid、α-blocker、β-agonist、CCB、TXA2 合成抑制劑/受體拮抗劑、血管擴張性 prostanoids、5-HT2 受體拮抗劑。\n\n**考點結論**：錯誤者為 **AD**。","peropt":{"A":"◎ 錯誤：random flap 增加蒂寬不增加可存活長度。","B":"正確：納入較大 perforator 之直接動脈可增進存活。","C":"正確：surgical/vascular delay 為人體證實有效技術。","D":"◎ 錯誤：延遲是關閉 AV shunt 導流至營養微循環，非開放 AV shunt。","E":"正確：所列多類藥物皆曾用於研究增進皮瓣存活。"},"cite":"Neligan 5e flap physiology / delay phenomenon 章（random flap width vs length；AV shunt closure）。","conflict":""},{"id":"9149","sub":"B5","src":"NG","years":[108],"stem":"About microvascular surgeries, which of the following statement(s) is/are correct? (複選)","opts":{"A":"Placing an obliquely cutting of the smaller vessel can reduce the discrepancy during anastomosis. The angles of the oblique cut should be less than 30 degree to avoid kinking.","B":"Several patient factors are related to increase risk of perioperative complications, such as smoking, obesity, alcohol withdrawal, diabetes mellitus, liver cirrhosis, immunosuppression, and collagen vascular disease.","C":"Thinning of the thick flaps can be performed leaving an unthinned area of 2cm around the perforator.","D":"Inability to reperfuse the flap despite patent anastomoses is known as the \"no-reflow phenomenon\". This is a result of ischemia-induced endothelial injury.","E":"Papaverine, nifedipine, and lidocaine are the most common topical antispasmodic drugs used in clinical microsurgery."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 顯微血管手術（microvascular surgery）——選『正確』（複選）\n\n**逐項核對（答案 ABCDE，全部正確）：**\n- **A 正確**：口徑不匹配時，將較小血管做斜切（oblique cut）可縮小差異；斜切角度應 <30 度以避免 kinking（扭結）。\n- **B 正確**：與圍術期併發症風險上升相關之病人因子——抽菸、肥胖、酒精戒斷、糖尿病、肝硬化、免疫抑制、膠原血管疾病。\n- **C 正確**：厚皮瓣削薄（thinning）時，應在 perforator 周圍保留約 2 cm 未削薄區以保血供。\n- **D 正確**：吻合口通暢卻無法再灌流稱為『no-reflow phenomenon』，源於缺血誘發之內皮損傷（endothelial injury）與微循環阻塞。\n- **E 正確**：Papaverine、nifedipine、lidocaine 為臨床顯微手術最常用之局部抗血管痙攣（antispasmodic）藥物。\n\n**考點結論**：答案 **ABCDE**（全部正確）。","peropt":{"A":"◎ 正確：小血管斜切減口徑差，角度 <30° 避免 kinking。","B":"◎ 正確：抽菸/肥胖/酒精戒斷/DM/肝硬化/免疫抑制/膠原血管病增風險。","C":"◎ 正確：削薄厚皮瓣時保留 perforator 周圍約 2 cm 未削薄。","D":"◎ 正確：no-reflow phenomenon 源於缺血性內皮損傷。","E":"◎ 正確：Papaverine、nifedipine、lidocaine 為常用局部抗痙攣藥。"},"cite":"Neligan 5e microsurgery 章（vessel size mismatch、no-reflow、topical antispasmodics）。","conflict":""},{"id":"9150","sub":"B4","src":"NG","years":[108],"stem":"Which of the following statement is/are incorrect? (複選)","opts":{"A":"For this patient who does not have sufficient fat stores, asking the patient to gain weight prior to the procedure and then lose weight after the procedure is feasible.","B":"Autologous cartilage graft will have metaplastic changes after being transferred to a different location. It means when an elastic cartilage harvested from auricle is transferred to nose as a spreader graft, it will transfers to hyaline cartilage.","C":"To avoid contour irregularity of deformity after harvesting conchal cartilage graft, harvesting the cymba concha and cavum concha separately, with at least 5 mm of the helical crus and a 2-mm outer rim along the conchal wall.","D":"When harvesting grafts with width more than 1.5cm, a postauricular incision with scaphomastoid suture is needed to prevent capping of the ear."},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯【軟骨移植原則與conchal cartilage harvest】本題為『複選：何者不正確(incorrect)』，正解為描述錯誤的A、B。\n• (A錯誤)：脂肪儲存量不足者以『先增重取脂、術後再減重』作為fat graft來源並不可行(not feasible)。脂肪移植後之存活與宿主體重變化並非等比可逆，減重時移植脂肪同樣萎縮，無法保證輪廓維持，臨床上不建議此策略。\n• (B錯誤)：軟骨移植物『不會』發生metaplasia（化生）。自體軟骨(autologous cartilage graft)轉移至異位後保留其原始組織型別——耳廓elastic cartilage移植至鼻部作spreader graft後『仍為elastic cartilage』，不會轉變為hyaline cartilage。此為軟骨移植可維持長期穩定支撐的基礎。\n• (C正確)：取conchal cartilage時將cymba concha與cavum concha分開取，保留至少5 mm的helical crus及沿conchal wall 2 mm外緣，可避免供區輪廓凹陷變形。\n• (D正確)：取寬度>1.5 cm之graft時，需經postauricular切口並施行scaphomastoid suture以避免耳朵向前塌陷(capping)。","peropt":{"A":"◎不可行——移植脂肪隨體重下降同步萎縮，增重取脂再減重無法維持輪廓，此為錯誤敘述(選為incorrect)","B":"◎錯誤敘述——自體軟骨無metaplasia，elastic cartilage移植至鼻仍為elastic，不會變hyaline(選為incorrect)","C":"正確敘述——分別取cymba/cavum concha並保留5mm helical crus與2mm rim可防供區變形","D":"正確敘述——寬度>1.5cm須postauricular切口加scaphomastoid suture防capping"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Ch.桿架與軟骨移植/自體移植物；Grabb & Smith 9e 移植物章節","conflict":""},{"id":"9151","sub":"B9","src":"NG","years":[108],"stem":"For about the principles of radiation, which is wrong?","opts":{"A":"Radiation therapy can be used as a primary or adjuvant treatment for many cancers.","B":"Acute toxicities are temporary and reversible.","C":"The primary mechanism of action of radiation is through breakage of DNA strands.","D":"Late toxicities are temporary and reversible.","E":"The unit of dose measurement is the gray (Gy)."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【放射線治療基本原理】問『何者錯誤』，正解D。\n• (D錯誤)：Late toxicities（晚期毒性，如fibrosis、telangiectasia、necrosis、secondary malignancy）為『永久且不可逆』(permanent, irreversible)，並非temporary/reversible。這是與acute toxicity最關鍵的區別，也是重建手術時機（放射前後）需審慎評估的原因。\n• (A正確)：放射線可作primary(根治性)或adjuvant(輔助)治療。\n• (B正確)：Acute toxicities（黏膜炎、皮膚炎）為暫時可逆。\n• (C正確)：主要作用機轉為直接/間接造成DNA strand breaks(以自由基間接損傷為主)。\n• (E正確)：劑量單位為gray(Gy)，1 Gy=1 J/kg。","peropt":{"A":"正確——放射可為primary或adjuvant治療","B":"正確——急性毒性暫時且可逆","C":"正確——主要機轉為DNA strand breakage","D":"◎錯誤——晚期毒性(fibrosis等)為永久不可逆，非temporary/reversible","E":"正確——劑量單位為gray(Gy)"},"cite":"Neligan Plastic Surgery 5e, Principles of radiation therapy；Grabb & Smith 9e 腫瘤/放射章節","conflict":""},{"id":"9152","sub":"B11","src":"NG","years":[108,110,112,113,114,115],"stem":"According to the Robotics in plastic surgery, which of the statements below is correct?","opts":{"A":"Robotic technology is the next step in the evolution of minimally invasive techniques","B":"With improved visualization, elimination of physiologic tremor, motion scaling, and decreased fatigue, the surgical robot has emerged as a potentially useful tool in microvascular, microlymphatic and microneural surgery.","C":"The advantages of robotics over endoscopy are three-dimensional vision, high definition, magnification, and superior ergonomics","D":"With complete tremor elimination and up to 5 : 1 motion scaling, the surgical robot is capable of superhuman levels of precision.","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【整形外科機器人手術Robotics】問『何者正確』，正解E(以上皆是)。\n• (A)：機器人技術是微創(minimally invasive)技術演進的下一步。\n• (B)：改善視野、消除生理性震顫(physiologic tremor)、motion scaling、降低疲勞，使手術機器人成為microvascular、microlymphatic、microneural surgery潛在有用工具。\n• (C)：相較內視鏡，機器人優勢為3D視覺、高解析、放大及更佳ergonomics。\n• (D)：完全消除震顫加上最高5:1 motion scaling，可達『超越人手』的精準度。\n→四者皆為正確敘述，故選E。","peropt":{"A":"正確——機器人為微創技術下一步演進","B":"正確——消除震顫/motion scaling/減疲勞，利於顯微血管·淋巴·神經手術","C":"正確——相較內視鏡具3D、高解析、放大、ergonomics優勢","D":"正確——完全消除震顫加最高5:1 motion scaling達超人精準","E":"◎以上皆是——四項敘述均正確"},"cite":"Neligan Plastic Surgery 5e, Robotics in plastic surgery；Grabb & Smith 9e 科技章節","conflict":""},{"id":"9154","sub":"B9","src":"NG","years":[108],"stem":"According to the allogenic transplantation in plastic surgery, which of the statements below are correct? (複選)","opts":{"A":"The most important antigens contributing to allograft rejection are the major histocompatibility complex (MHC) antigens.","B":"Chronic rejection is characterized by fibrosis and severe organ dysfunction. This process usually occurs over years.","C":"Despite the use of powerful immunosuppressive medications most transplant patients experience episodes of acute rejection.","D":"B lymphocytes have a central role in coordinating the immune response, forming the cell-mediated arm of the immune response.","E":"Immunosuppressive medications must inhibit the body's ability to reject a transplanted organ, but not at the expense of the defense network against pathogens."},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯【異體移植免疫Allogenic transplantation】複選『何者正確』，正解ABCE。\n• (A正確)：造成allograft rejection最重要的抗原為MHC(major histocompatibility complex)抗原(HLA)。\n• (B正確)：Chronic rejection以fibrosis與嚴重器官功能失調為特徵，歷經數年緩慢進展(vasculopathy)。\n• (C正確)：即便使用強效免疫抑制劑，多數移植病人仍會經歷acute rejection發作。\n• (D錯誤)：協調免疫反應、構成『cell-mediated』細胞免疫者為T lymphocytes，而非B lymphocytes(B細胞主司humoral/抗體免疫)。此為本題唯一錯項。\n• (E正確)：理想免疫抑制須抑制排斥，但不以犧牲對病原之防禦網為代價（此為治療窗口的核心矛盾）。","peropt":{"A":"◎正確——MHC(HLA)抗原為排斥最重要抗原","B":"◎正確——慢性排斥以fibrosis及器官功能失調為特徵、歷時數年","C":"◎正確——即使強效免疫抑制多數病人仍經歷急性排斥","D":"錯誤——cell-mediated免疫由T淋巴球主導，非B淋巴球","E":"◎正確——免疫抑制須抑制排斥但不損害對病原之防禦"},"cite":"Neligan Plastic Surgery 5e, Transplant immunology/VCA；Grabb & Smith 9e 移植免疫","conflict":""},{"id":"9155","sub":"B11","src":"NG","years":[108],"stem":"According to the FDA approval pathways, which of the statements below are correct? (複選)","opts":{"A":"Most class I devices are exempt from pre-market notification (PMN) or pre-market approval (PMA)","B":"Most class II devices require pre-market notification 510(k)","C":"Most class III devices require premarket approval.","D":"Class I devices are considered the lowest risk devices.","E":"Examples of class I devices include: powered wheelchairs, surgical drapes, surgical needles and suture material, and some pregnancy-test kits."},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯【FDA醫材審批途徑Approval pathways】複選『何者正確』，正解ABCD。\n• (A正確)：多數Class I醫材豁免(exempt)於pre-market notification(PMN)或PMA。\n• (B正確)：多數Class II醫材需510(k) pre-market notification。\n• (C正確)：多數Class III醫材需premarket approval(PMA)。\n• (D正確)：Class I為風險最低(lowest risk)之醫材。\n• (E錯誤)：舉例錯誤——powered wheelchairs屬於『Class II』(中風險)，並非Class I。正確之Class I例子為surgical drapes、非帶針縫線材料、部分驗孕試劑等。故E為唯一錯項。","peropt":{"A":"◎正確——多數Class I豁免PMN/PMA","B":"◎正確——多數Class II需510(k)","C":"◎正確——多數Class III需PMA","D":"◎正確——Class I為風險最低醫材","E":"錯誤——電動輪椅為Class II非Class I，例子歸類錯誤"},"cite":"Neligan Plastic Surgery 5e, FDA regulation of devices；Grabb & Smith 9e","conflict":""},{"id":"9156","sub":"B4","src":"NG","years":[108],"stem":"關於iliac crest bone graft 何者為非？","opts":{"A":"Iliac bone graft can be cortical, cancellous, or corticocancellous in composition","B":"Posterior crest 平均可取30 cm3 的 bone volume","C":"The bone is best harvested in the area superior to a line connecting the posterior superior iliac spine (PSIS) and the apex of the sacroiliac joint","D":"The ilioinguinal nerve is at risk during harvest from the posterior crest","E":"Vascularized iliac bone graft 可用ascending branch of lateral femoral circumflex system 當pedicle"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【髂骨移植Iliac crest bone graft】問『何者為非』，正解D。\n• (D錯誤)：Ilioinguinal nerve受傷風險出現在『anterior crest』取骨(其與lateral femoral cutaneous nerve、股外側皮神經同區)；『posterior crest』取骨主要威脅的是superior cluneal nerves及superior gluteal神經血管，非ilioinguinal nerve。\n• (A正確)：髂骨可取cortical、cancellous或corticocancellous組成。\n• (B正確)：Posterior crest平均可取約30 cm³骨量(較anterior多)。\n• (C正確)：最佳取骨區位於連接PSIS與sacroiliac joint頂點連線之上方。\n• (E正確)：Vascularized iliac bone graft可用ascending branch of lateral femoral circumflex system(DCIA亦常用)作為pedicle。","peropt":{"A":"正確——髂骨可為cortical/cancellous/corticocancellous","B":"正確——posterior crest平均可取約30 cm³骨量","C":"正確——最佳取骨區在PSIS與SI joint頂點連線上方","D":"◎為非——ilioinguinal nerve風險在anterior crest；posterior crest威脅superior cluneal/gluteal神經","E":"正確——vascularized iliac graft可用lateral femoral circumflex ascending branch為pedicle"},"cite":"Neligan Plastic Surgery 5e, Bone graft harvest/donor sites；Grabb & Smith 9e","conflict":""},{"id":"9158","sub":"B4","src":"NG","years":[108],"stem":"有關bone graft healing的問題，下列何者正確？ (複選)","opts":{"A":"可能的機轉包括了osteoconduction, osteo-induction和osteogenesis。","B":"cancellous bone graft是最常使用的方式，原因是有很好的osteogenic potential。","C":"cancellous bone graft的優點之一是它所提供的結構完整。","D":"creeping substitution會出現在各種的non- vascularized bone graft healing 的過程中。","E":"cortical bone graft可提供較堅硬的骨頭結構。"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯【骨移植癒合Bone graft healing】複選『何者正確』，正解ABDE。\n• (A正確)：癒合機轉包含osteoconduction(骨傳導,支架)、osteoinduction(骨誘導,BMP招募分化)、osteogenesis(骨生成,存活成骨細胞)。\n• (B正確)：Cancellous bone graft最常用，因具極佳osteogenic potential(高表面積、多存活細胞、快速revascularization)。\n• (C錯誤)：Cancellous graft『無法』提供結構完整/機械支撐；提供結構強度者為cortical bone。此為唯一錯項。\n• (D正確)：Creeping substitution(爬行替代)出現於各種non-vascularized bone graft癒合過程。\n• (E正確)：Cortical bone graft可提供較堅硬的結構支撐(但revascularization較慢、以resorption再ossification方式重塑)。","peropt":{"A":"◎正確——機轉含osteoconduction/osteoinduction/osteogenesis","B":"◎正確——cancellous最常用，具佳osteogenic potential","C":"錯誤——cancellous不提供結構完整，結構支撐來自cortical bone","D":"◎正確——creeping substitution見於各種非血管化骨移植癒合","E":"◎正確——cortical graft提供較堅硬結構"},"cite":"Neligan Plastic Surgery 5e, Bone graft healing/biology；Grabb & Smith 9e","conflict":""},{"id":"9159","sub":"B11","src":"NG","years":[109,111],"stem":"以下哪項\"不是\"Parker et al 所提出會影響photography的inconsistency ?","opts":{"A":"Photographer-based","B":"Publisher-based","C":"Assistant-based","D":"Combined Photographer-based and Publisher-based","E":"Patient-based"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【臨床攝影不一致因素(Parker et al)】問『何者不是』其提出之photography inconsistency因素，正解C(Assistant-based)。\n• Parker等人提出影響攝影一致性的來源分為：Photographer-based(攝影者，如角度、光源、焦距、背景設定)、Patient-based(病人，如姿勢、表情、體位)、Publisher-based(出版/後製，如裁切、色彩處理)，以及Combined photographer-and-publisher-based。\n• (C錯誤選項)：『Assistant-based』並非其分類之一，故為本題答案。\n→臨床攝影標準化(standardization)對術前後比較、學術發表與醫療品質至關重要。","peropt":{"A":"屬於——photographer-based為其因素之一","B":"屬於——publisher-based為其因素之一","C":"◎不是——assistant-based非Parker et al分類，為正解","D":"屬於——combined photographer/publisher-based為其因素","E":"屬於——patient-based為其因素之一"},"cite":"Neligan Plastic Surgery 5e, Photography in plastic surgery(Parker et al分類)","conflict":""},{"id":"9160","sub":"B7","src":"NG","years":[109],"stem":"關於DVT的描述, 下列何者錯誤? (複選)","opts":{"A":"術前詳細的詢問病史有助於制定適合的方式來預防手術中 DVT的生成","B":"Nonpharmacologic therapy 可減少DVT發生的機率至85%","C":"預防手術中DVT的發生，使用Pharmacologic therapy比單獨使用 mechanical therapy 效果要好","D":"Pharmacologic therapy會增加major bleeding complication 的機會","E":"合併使用Pharmacologic therapy及mechanical therapy比單獨一種therapy能更好的預防手術中DVT的發生"},"ans":"BE","multi":true,"etype":"ai","expl":"","key":"🎯【深部靜脈栓塞DVT預防】複選『何者錯誤』，正解BE。\n• (B錯誤)：非藥物(mechanical/nonpharmacologic)療法無法將DVT發生率降至如此程度；『減少至85%』的敘述為錯誤(數值/描述不實)。\n• (E錯誤/依權威答案)：本題將『合併藥物+機械比單一療法更能預防術中DVT』列為錯誤敘述。\n• (A正確)：術前詳細病史(含Caprini risk factors)有助制定合適預防策略。\n• (C正確)：藥物療法之DVT預防效果優於單獨機械療法。\n• (D正確)：藥物療法會增加major bleeding併發症風險(需權衡風險效益)。\n⚠答案疑義：選項E『合併使用pharmacologic + mechanical prophylaxis優於單一療法』在現行臨床實證(高風險族群combined prophylaxis建議)通常被視為『正確』敘述；本題將其列為錯誤，可能係特定教科書版本之敘述取向。惟依鐵律以權威答案ans=BE為準，不自行更動。","peropt":{"A":"正確——術前詳細病史助制定DVT預防策略","B":"◎錯誤——nonpharmacologic無法將DVT降至85%，數值敘述不實","C":"正確——藥物療法優於單獨機械療法","D":"正確——藥物療法增加major bleeding風險","E":"◎(依權威答案為錯誤)——合併藥物+機械優於單一之敘述被列為錯"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, VTE/DVT prophylaxis, Caprini score","conflict":""},{"id":"9161","sub":"B7","src":"NG","years":[109],"stem":"注入含有lidocaine 的tumescent fluid後, 血中的lidocaine濃度會在多長的時間達到peak值?","opts":{"A":"1-3 小時","B":"3-5小時","C":"5-7小時","D":"7-9小時","E":"10-14小時"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【Tumescent lidocaine血中濃度peak時間】正解E(10–14小時)。\n• 抽脂tumescent技術注入含lidocaine之腫脹液後，因腎上腺素(epinephrine)血管收縮延緩吸收、加上脂肪組織作為儲庫緩慢釋放，血中lidocaine濃度為『延遲性』上升，通常在注射後『10–14小時』才達到peak。\n• 此為tumescent安全劑量可高達35–55 mg/kg(遠高於傳統4.5 mg/kg含腎上腺素7 mg/kg上限)的重要藥動學基礎；也提醒術後延遲性lidocaine毒性(cardiotoxicity、CNS toxicity)之監測必要。","peropt":{"A":"錯誤——1-3小時過早","B":"錯誤——3-5小時過早","C":"錯誤——5-7小時過早","D":"錯誤——7-9小時過早","E":"◎正確——tumescent lidocaine血中濃度於注射後10-14小時達peak(延遲吸收)"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, Tumescent technique/liposuction安全","conflict":""},{"id":"9162","sub":"B11","src":"NG","years":[109],"stem":"下列哪兩種study在實證等級上的位階較低 (Level IV and level V) ? (複選)","opts":{"A":"Expert opinion","B":"Randomized control trial","C":"Case report","D":"Case- control study","E":"Prospective and retrospective study"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"🎯【實證醫學等級Level of evidence IV/V】複選『位階較低(Level IV & V)』，正解AC。\n• 治療性研究等級(Level of evidence)：\n  - Level I：高品質RCT / systematic review of RCT\n  - Level II：品質較低RCT、prospective cohort\n  - Level III：case-control study、retrospective comparative\n  - Level IV：case series（含部分case report歸類）\n  - Level V：expert opinion（專家意見，最低）\n• (A正解)：Expert opinion → Level V。\n• (C正解)：Case report/series → Level IV。\n• (B)RCT為Level I(最高)；(D)case-control為Level III；(E)prospective/retrospective cohort約Level II–III。","peropt":{"A":"◎正確——expert opinion為Level V(最低)","B":"錯誤——RCT為Level I(最高)","C":"◎正確——case report為Level IV","D":"錯誤——case-control為Level III","E":"錯誤——prospective/retrospective cohort約Level II-III"},"cite":"Grabb & Smith 9e / Neligan 5e, Evidence-based medicine, levels of evidence","conflict":""},{"id":"9163","sub":"B9","src":"NG","years":[109],"stem":"關於tumor cell 的敘述，以下何者正確? (複選)","opts":{"A":"Tumor cells grow by overlapping each other","B":"Tumor cells grow in a logarithmic fashion","C":"All of the tumor grows at a same rate and had the same doubling time","D":"Tumors are generally not detectable until they reach approximately 3cm in diameter","E":"Excisional, incisional, or needle biopsies are performed depending on the size and location of the tumor"},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯【腫瘤細胞生長特性】複選『何者正確』，正解ABE。\n• (A正確)：腫瘤細胞喪失contact inhibition，會『互相重疊堆疊(overlapping)』生長。\n• (B正確)：腫瘤呈『對數/指數(logarithmic/exponential)』方式生長(Gompertzian曲線早期)。\n• (C錯誤)：並非所有腫瘤以『相同速率、相同doubling time』生長——不同腫瘤及同腫瘤內不同clone生長速率不一(異質性heterogeneity)。\n• (D錯誤)：腫瘤通常在直徑約『1 cm(約10⁹細胞)』時才可偵測，而非3 cm。\n• (E正確)：依腫瘤大小與位置採excisional、incisional或needle biopsy。","peropt":{"A":"◎正確——喪失接觸抑制，細胞互相重疊生長","B":"◎正確——呈對數/指數方式生長","C":"錯誤——各腫瘤生長速率與doubling time並不相同(異質性)","D":"錯誤——通常約1cm(10⁹細胞)才可偵測，非3cm","E":"◎正確——依大小位置選excisional/incisional/needle biopsy"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, Principles of cancer/tumor biology","conflict":""},{"id":"9164","sub":"B9","src":"NG","years":[109],"stem":"以下關於lymph node dissection的敘述，何者正確?","opts":{"A":"可分為elective lymph node dissection(ELND) 以及 therapeutic lymph node dissection(TLND)兩種","B":"ELND is routinely recommended","C":"Sentinel node mapping can not decrease the number of the unnecessary lymphadenectomies performed","D":"Rate of the extremity lymphedema with sentinel node mapping was higher than the complete lymphadenectomies","E":"Current randomized trials supported that routine use of extended lymphadenectomies had better survival benefit then the limited dissections."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【淋巴結廓清Lymph node dissection】問『何者正確』，正解A。\n• (A正確)：LN dissection分為elective(預防性)LND(ELND)與therapeutic(治療性)LND(TLND)兩類。\n• (B錯誤)：ELND『並非』常規建議(routinely recommended)——已被sentinel lymph node biopsy(SLNB)取代作為分期工具。\n• (C錯誤)：Sentinel node mapping『可以』減少不必要之lymphadenectomy數量(敘述反向)。\n• (D錯誤)：SLNB之肢體lymphedema發生率『低於』complete lymphadenectomy(敘述反向)。\n• (E錯誤)：現行RCT『不支持』常規擴大廓清有更佳存活效益(如MSLT-II顯示completion LND無存活優勢)。","peropt":{"A":"◎正確——分為ELND(預防性)與TLND(治療性)兩種","B":"錯誤——ELND非常規建議，已由SLNB取代","C":"錯誤——sentinel mapping可減少不必要之廓清(敘述反向)","D":"錯誤——SLNB之lymphedema低於完全廓清","E":"錯誤——RCT不支持常規擴大廓清有存活優勢(MSLT-II)"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, Melanoma/SLNB, MSLT-II","conflict":""},{"id":"9165","sub":"B8","src":"NG","years":[109],"stem":"以下何者是Stem cell的特性?","opts":{"A":"Self-renewal","B":"Clonality","C":"Differentiation","D":"All of above","E":"None of above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【幹細胞Stem cell特性】正解D(以上皆是)。\n• 幹細胞三大定義性特徵：\n  1. Self-renewal(自我更新)：分裂可維持未分化幹細胞庫。\n  2. Clonality(株源性)：可由單一細胞衍生形成株落。\n  3. Differentiation(分化潛能)：可分化為一種或多種成熟細胞型別(potency：toti-/pluri-/multi-/unipotent)。\n→三者皆為幹細胞特性，故選D。此為組織工程與再生醫學(ADSC、iPSC等)之基礎概念。","peropt":{"A":"正確特性——self-renewal自我更新","B":"正確特性——clonality株源性","C":"正確特性——differentiation分化潛能","D":"◎以上皆是——三者均為幹細胞定義特徵","E":"錯誤——並非皆非"},"cite":"Neligan Plastic Surgery 5e, Stem cells & regenerative medicine；Grabb & Smith 9e","conflict":""},{"id":"9166","sub":"B11","src":"NG","years":[109],"stem":"下列關於Michael Porter's 5-Forces model of competition之選項何者是\"錯\"的","opts":{"A":"The potential of new entrants","B":"The new established competitors","C":"The threat of substitute rivals, who often compete on price","D":"Suppliers, who can have significant bargaining power","E":"Buyers, who create demand for the outputs"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【Porter五力競爭模型 Michael Porter's 5-Forces】問『何者為錯』，正解B。\n• Porter五力應為：\n  1. Threat of new entrants(新進入者威脅) — 對應A\n  2. Threat of substitutes(替代品威脅，常以價格競爭) — 對應C\n  3. Bargaining power of suppliers(供應商議價力) — 對應D\n  4. Bargaining power of buyers(買方議價力/創造需求) — 對應E\n  5. Rivalry among existing competitors(現有競爭者間之競爭)\n• (B錯誤)：『The new established competitors』措辭錯誤——第五力應為『現有競爭者間的競爭強度(rivalry among existing competitors)』，而非『新建立之競爭者』。\n→此為整外執業經營管理(practice management)之策略分析工具。","peropt":{"A":"正確——新進入者之潛在威脅(第1力)","B":"◎錯誤——第五力應為現有競爭者間之rivalry，非『new established competitors』","C":"正確——替代品威脅(常以價格競爭)(第2力)","D":"正確——供應商議價力(第3力)","E":"正確——買方創造需求/議價力(第4力)"},"cite":"Grabb & Smith 9e / Neligan 5e, Practice management/business of plastic surgery","conflict":""},{"id":"9167","sub":"B2","src":"NG","years":[109,111],"stem":"下列關於Hypertrophic scar以及 Keloid scar的敘述何者正確 ?","opts":{"A":"Keloid scar occur predominantly in white individuals, like Caucasian","B":"Hypertrophic scar are most common in wounds across extension surfaces, the extremities, breasts, sternum, and neck","C":"Keloid scar demonstrates genetic predisposition with autosomal dominant features","D":"Hypertrophic scar 治療包括Hyperbaric oxygen therapy, pressure garments, silicone sheets, corticosteroids, laser therapy, and re-excision with primary closure","E":"治療Keloid scar, Intralesional steroid therapy 在 early, rapidly proliferating lesions以及slowly growing, mature keloids有相當的療效。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【肥厚性疤痕HTS vs 蟹足腫Keloid】問『何者正確』，正解C。\n• (C正確)：Keloid具遺傳傾向，呈autosomal dominant(體染色體顯性，不完全外顯)特徵。\n• (A錯誤)：Keloid好發於『深膚色人種』(黑人、亞洲人)，而非白人/Caucasian。\n• (B錯誤)：Hypertrophic scar好發於張力大之『屈曲面(flexion surfaces)/關節』，而非extension surfaces；(且keloid才好發於胸骨、耳垂、肩三角、恥骨區)。\n• (D錯誤)：此組合中Hyperbaric oxygen並非HTS標準療法；HTS治療以pressure garment、silicone sheet、corticosteroid、laser、re-excision等為主(HBO非常規)。\n• (E錯誤)：Intralesional steroid對『早期、快速增生』病灶較有效，對『成熟、緩慢生長』之keloid療效較差，並非兩者療效相當。","peropt":{"A":"錯誤——keloid好發深膚色人種，非白人","B":"錯誤——HTS好發屈曲面/關節，非extension surfaces","C":"◎正確——keloid具遺傳傾向、autosomal dominant特徵","D":"錯誤——HBO非HTS標準療法，組合敘述有誤","E":"錯誤——intralesional steroid對早期增生病灶較有效，成熟keloid療效較差"},"cite":"Grabb & Smith 9e / Neligan 5e, Wound healing—hypertrophic scar & keloid","conflict":""},{"id":"9168","sub":"B1","src":"NG","years":[109,111],"stem":"關於Skin glandular structure的敘述哪些正確 ? (複選)","opts":{"A":"Sebaceous glands produce lipid-rich sebum on the surface of the skin and around the hair shaft.","B":"When excessive quantities of sebum are produced, sebaceous glands duct can be obstructed and ultimately may become infected or form cysts.","C":"There are numerous eccrine glands in every region of the body.","D":"Eccrine glands excrete striking odor of hypotonic liquid.","E":"Apocrine glands are found exclusively in the axillar, perianal, periumbilical, areolar, preputial, scrotal, pubic and vulvar areas."},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯【皮膚腺體結構Skin glandular structure】複選『何者正確』，正解ABE。\n• (A正確)：Sebaceous glands(皮脂腺)分泌富含脂質之sebum於皮膚表面及毛幹周圍。\n• (B正確)：Sebum過度分泌時皮脂腺導管阻塞，可能感染或形成囊腫(cyst/acne)。\n• (C錯誤)：Eccrine glands雖廣泛分布，但『並非每一區域皆有(not in every region)』——如唇紅、龜頭、甲床等無eccrine腺；『numerous in every region』過度絕對。\n• (D錯誤)：Eccrine glands分泌『低張、無明顯氣味』之汗液；『striking odor(明顯氣味)』是apocrine glands(頂漿腺，經細菌分解後產生體味)之特徵。\n• (E正確)：Apocrine glands專門分布於腋下、肛周、臍周、乳暈、包皮、陰囊、恥骨及外陰等區。","peropt":{"A":"◎正確——皮脂腺分泌脂質sebum於皮表及毛幹周圍","B":"◎正確——sebum過多致導管阻塞、感染或成囊腫","C":"錯誤——eccrine非『每一區域皆有』(如唇、龜頭無)，敘述過度絕對","D":"錯誤——eccrine汗液無明顯氣味；明顯體味為apocrine之特徵","E":"◎正確——apocrine專屬腋下、肛周、臍周、乳暈、包皮、陰囊、恥骨、外陰"},"cite":"Neligan Plastic Surgery 5e, Skin anatomy/adnexal structures；Grabb & Smith 9e","conflict":""},{"id":"9169","sub":"B4","src":"NG","years":[109,111,114],"stem":"下列有關Skin graft take的敘述何者有誤 ?","opts":{"A":"一般描述skin graft take的三個階段為 serum imbibition, revascularization, maturation","B":"所謂的Serum imbibition指的是Graft從wound bed透過plasma以擴散作用進行氧氣和營養物質的提供","C":"Revascularization的過程從graft後約24-48小時開始, wound bed和wound margin都逐漸有顯著的血管新生","D":"Graft maturation會持續到一年左右，且感覺神經難以恢復到正常","E":"比較厚的STSG，能與FTSG一樣帶有hair follicles, sweat glands, and dermal nerves等"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【植皮存活Skin graft take】問『何者有誤』，正解C。\n• (C錯誤)：Revascularization(inosculation/neovascularization)並非約24–48小時即開始並在wound bed與margin都顯著新生；一般認為血管再生於植皮後『約48–72小時(第2–3天)』才開始建立血流，且是由wound bed為主逐步進行，敘述之時間/範圍不正確。\n• (A正確)：Skin graft take三階段為serum imbibition→revascularization(inosculation)→maturation(organization/remodeling)。\n• (B正確)：Serum imbibition指graft最初1–2天靠wound bed滲出之plasma以擴散提供氧氣與養分並維持濕潤。\n• (D正確)：Graft maturation持續約一年，感覺神經再生難以恢復至完全正常。\n• (E正確)：較厚之STSG較接近FTSG，可帶有較多毛囊、汗腺、真皮神經等附屬結構(且原發性收縮較多、次發性收縮較少)。","peropt":{"A":"正確——take三階段：serum imbibition→revascularization→maturation","B":"正確——serum imbibition為經plasma擴散供氧供養","C":"◎有誤——revascularization約於植皮後第2-3天(48-72h)才開始，時程與範圍敘述不正確","D":"正確——maturation持續約一年，感覺難恢復至正常","E":"正確——較厚STSG較近FTSG，帶較多附屬構造"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, Skin graft physiology—take phases","conflict":""},{"id":"9170","sub":"B4","src":"NG","years":[109,111,114],"stem":"以下有關軟骨(Cartilage)及其做為graft的敘述何者有誤?","opts":{"A":"軟骨是軟骨細胞(chondrocytes)加上extracellular matrices (ECM) of type III collagen fibers, proteoglycans, and elastic fibers 所組成","B":"軟骨可以被分成三種type: hyaline cartilage, fibrocartilage and elastic cartilage","C":"Outer ear structure中的軟骨屬於elastic cartilage，另外larynx and epiglottis也屬於此種軟骨","D":"Hyaline cartilage是人體組織中最常見的軟骨種類","E":"軟骨是藉由類似無氧呼吸，透過組織間液的擴散作用獲取營養"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【軟骨Cartilage及軟骨移植】問『何者有誤』，正解A。\n• (A錯誤)：軟骨由chondrocytes加上ECM組成，但其主要膠原為『type II collagen』，並非type III collagen。此為關鍵錯誤(type III為網狀纖維，見於早期傷口/血管等)。\n• (B正確)：軟骨分三型：hyaline、fibrocartilage、elastic cartilage。\n• (C正確)：外耳(auricle)軟骨屬elastic cartilage；epiglottis亦為elastic cartilage(惟larynx多數軟骨為hyaline，此為次要爭點，但主錯項在A)。\n• (D正確)：Hyaline cartilage為人體最常見之軟骨(關節面、鼻中隔、肋軟骨、氣管等)。\n• (E正確)：軟骨無血管，藉類似無氧代謝並經組織間液擴散獲取養分(故癒合/整合慢、感染風險相對低)。","peropt":{"A":"◎有誤——軟骨ECM主要為type II collagen，非type III collagen","B":"正確——軟骨分hyaline/fibrocartilage/elastic三型","C":"正確——外耳與epiglottis屬elastic cartilage","D":"正確——hyaline為人體最常見軟骨","E":"正確——軟骨無血管，經組織間液擴散、類似無氧代謝取養"},"cite":"Neligan Plastic Surgery 5e, Cartilage graft；(對照NG112-B02-Q04題幹極性誘答，勿混記)","conflict":"題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG112-B02-Q04）"},{"id":"9172","sub":"B6","src":"NG","years":[109,111,114],"stem":"於 Sunderland's classification中，哪一種 degree of injury屬於neuroma-in-continuity，endoneurium以及perineurium有complete scar block ?","opts":{"A":"Degree II","B":"Degree III","C":"Degree IV","D":"Degree V","E":"Degree VI"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【周邊神經損傷Sunderland分類】問『屬neuroma-in-continuity且endoneurium與perineurium皆complete scar block』者，正解C(Degree IV)。\n• Sunderland六度分類：\n  - Degree I(=Seddon neurapraxia)：僅傳導阻斷，構造完整，完全恢復。\n  - Degree II(=axonotmesis)：axon斷、endoneurium完整，可完全恢復。\n  - Degree III：axon+endoneurium斷、perineurium完整→部分恢復、可能neuroma-in-continuity。\n  - Degree IV：axon+endoneurium+perineurium皆受損，僅epineurium維持連續性，形成『neuroma-in-continuity』且有complete scar block，需手術切除+神經移植。\n  - Degree V(=neurotmesis)：整條神經完全斷裂。\n  - Degree VI(Mackinnon補充)：混合型損傷。\n→符合題意者為Degree IV。","peropt":{"A":"錯誤——Degree II為axonotmesis、endoneurium完整可恢復","B":"錯誤——Degree III perineurium完整、部分恢復","C":"◎正確——Degree IV僅epineurium連續，形成neuroma-in-continuity且endo/perineurium完全scar block","D":"錯誤——Degree V為完全斷裂(neurotmesis)","E":"錯誤——Degree VI(Mackinnon)為混合型損傷"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e, Peripheral nerve injury—Sunderland classification","conflict":""},{"id":"9173","sub":"B3","src":"NG","years":[109,111,114],"stem":"The anatomic concepts are fundamental to the mapping of the vascular territories and to the planning of incisions and flaps. Which statement about the anatomic concepts are correct ? (複選)","opts":{"A":"Veins radiate from fixed to mobile areas and arteries converge from mobile to fixed areas.","B":"Vessels \"hitchhike\" with nerves.","C":"Vessels obey the law of equilibrium.","D":"Vessels have a relatively constant both destination and origin.","E":"Muscles are the prime movers of venous return."},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"🎯【血管territory解剖概念(Taylor angiosome)】複選『何者正確』，正解BCE。\n• (B正確)：血管『搭便車(hitchhike)』伴隨神經走行(neurovascular相伴)。\n• (C正確)：血管遵循『平衡法則(law of equilibrium)』——相鄰血管領域間口徑互補，某血管小則鄰接血管代償變大。\n• (E正確)：肌肉為靜脈回流之『主要驅動者(prime movers of venous return)』(muscle pump)。\n• (A錯誤)：方向敘述反向——正確為『動脈由固定區radiate向移動區、靜脈由移動區converge回固定區』，題目所述相反。\n• (D錯誤)：血管有相對『固定的destination(去處)，但origin(起源)可變異』；並非destination與origin皆固定。","peropt":{"A":"錯誤——方向反了：動脈由固定→移動放射，靜脈由移動→固定匯聚","B":"◎正確——血管hitchhike伴隨神經走行","C":"◎正確——血管遵循law of equilibrium(相鄰領域口徑互補代償)","D":"錯誤——血管destination相對固定但origin可變異，非兩者皆固定","E":"◎正確——肌肉為靜脈回流之prime mover(muscle pump)"},"cite":"Neligan Plastic Surgery 5e, Vascular anatomy of skin—Taylor angiosome concepts","conflict":""},{"id":"9174","sub":"B3","src":"NG","years":[109,111,114],"stem":"根據Mathes and Nahai Classification for muscle/musculocutaneous flap, Jejunum flap 和 Fibula flap 分別是哪種type的flap?","opts":{"A":"Type I, Type II","B":"Type I, Type V","C":"Type II, Type IV","D":"Type III, Type IV","E":"Type III, Type V"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【Mathes-Nahai肌肉/肌皮瓣血流分類】問Jejunum flap與Fibula flap之type，正解B(Type I, Type V)。\n• Mathes-Nahai依血管蒂型態分Type I–V：\n  - Type I：單一血管蒂(one vascular pedicle)\n  - Type II：主蒂+次要蒂(dominant + minor pedicles)——最常見\n  - Type III：兩個dominant pedicles\n  - Type IV：多個節段性蒂(segmental pedicles)\n  - Type V：一個dominant pedicle + 次要之segmental(節段)蒂\n• Jejunum flap：由單一mesenteric/jejunal branch供應→Type I。\n• Fibula flap：由peroneal vessels之dominant pedicle加上多個segmental穿枝→Type V(此為經典歸類，使其可作osteocutaneous並可分段osteotomy)。\n→故答案為Type I(jejunum)、Type V(fibula)。","peropt":{"A":"錯誤——Type I, Type II不符fibula(Type V)","B":"◎正確——Jejunum為Type I(單一蒂)，Fibula為Type V(dominant+segmental)","C":"錯誤——jejunum非Type II、fibula非Type IV","D":"錯誤——不符兩者分類","E":"錯誤——jejunum非Type III"},"cite":"Grabb & Smith 9e / Neligan 5e, Mathes-Nahai muscle/flap vascular classification","conflict":""},{"id":"9175","sub":"B5","src":"NG","years":[109,111],"stem":"關於Principles of microvascular surgery，哪一個選項是對的?","opts":{"A":"Size-discrepant vessels are commonly encountered, and vessel mismatches of up to 4 : 1 can be anastomosed end-to-end depending on technical skills.","B":"When dealing with atherosclerotic vessels, suture should ideally be passed from the inside of the lumen of the atherosclerotic vessel to the outside.","C":"Vasospasm occurs in 5–10% of microsurgical procedures and plays an important role in the pathogenesis of hypoperfusion, promoting thrombosis.","D":"Veins appear to be less susceptible to vasospasm than arteries but, once established, harder to resolve and more detrimental.","E":"All the above are correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 顯微血管手術原則（Principles of Microvascular Surgery）\n- **口徑不匹配（size discrepancy）**：臨床上常見，憑技術可將高達 **4:1** 的血管以 end-to-end 縫合（技巧包括斜切 spatulation、擴張較小端、sleeve/telescoping、或改用 end-to-side）。\n- **粥狀硬化血管（atherosclerotic vessel）**：縫線應由**管腔內側往外側（inside-out）**穿出，避免將斑塊（plaque）向內推擠造成剝離（intimal dissection）與栓塞。\n- **血管痙攣（vasospasm）**：發生率約 **5–10%**，在低灌流（hypoperfusion）致病機轉中扮演要角，促進血栓形成。\n- **靜脈 vs 動脈**：靜脈較不易發生痙攣，但一旦發生較難緩解且後果更嚴重（因靜脈壓低、易塌陷、鬱血）。\n- 五項敘述皆正確，故選 E。","peropt":{"A":"口徑不匹配常見，4:1 可 end-to-end，正確◎","B":"粥狀硬化血管縫線由內往外穿，防斑塊剝離，正確◎","C":"vasospasm 5–10%，促成低灌流與血栓，正確◎","D":"靜脈較不易痙攣但一旦發生較難解且更有害，正確◎","E":"以上皆對，權威答案◎"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Ch.20 Flap physiology / microsurgery；Grabb & Smith 9e Microsurgery 章","conflict":""},{"id":"9180","sub":"B8","src":"NG","years":[109,110,111,112,113,114,115],"stem":"Which statements about acellular dermal matrix (ADM) is incorrect?","opts":{"A":"ADM has been used in burn wound management for over 20 years.","B":"ADM is also used to provide additional coverage of implant-based reconstructions.","C":"In breast reconstruction surgery with implant, ADM is associated with high rates of postoperative seromas and infection.","D":"Only 20% of breast implant-based reconstructions have used ADM for additional coverage.","E":"ADM is also largely replacing the use of synthetic meshes in contaminated abdominal wall defects."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 去細胞真皮基質（Acellular Dermal Matrix, ADM）\n- **燒傷應用**：ADM 用於燒傷創面處理已逾 20 年 → A 正確。\n- **義乳重建覆蓋**：ADM 提供 implant 下極額外覆蓋、形成 inferolateral sling → B 正確。\n- **併發症**：以 ADM 之 implant-based 重建與較高**血清腫（seroma）與感染**率相關 → C 正確。\n- **使用比例**：義乳重建使用 ADM 覆蓋之比例遠高於 20%（近年多數案例採用）→ **D 為不正確敘述（答案）**◎。\n- **腹壁重建**：污染腹壁缺損中 ADM 大幅取代合成網片（synthetic mesh）→ E 正確。","peropt":{"A":"ADM用於燒傷逾20年，正確","B":"ADM提供implant額外覆蓋，正確","C":"ADM與較高seroma及感染相關，正確","D":"僅20%義乳重建使用ADM為不正確，權威答案◎","E":"ADM於污染腹壁大幅取代合成網片，正確"},"cite":"Neligan 5e Vol.1 Biomaterials/ADM；Vol.5 Breast reconstruction；Grabb & Smith 9e","conflict":"⚠ 同題歷屆重出：acellular dermal matrix(ADM)何者為誤。關鍵偽敘述皆『僅20%乳房植入式重建曾用ADM額外覆蓋』；純選項重排，多年版本(9180,109-115)答D、111/114年(9219)答E。"},{"id":"9183","sub":"B4","src":"NG","years":[109],"stem":"A profound understanding of the mechanisms by which bone grafts and bone substitutes facilitate bone healing is mandatory to allow the reconstructive surgeon to make the correct choices when attempting reconstruction. Which of the following is incorrect ? (複選)","opts":{"A":"Autologous bone grafting is considered the gold standard as it allows osteoconductive, osteoinductive, and osteogenic mechanisms to augment bone healing","B":"Osteoinduction represents the ingrowth of MSCs, capillaries, and perivascular tissues from the recipient site into the transplanted graft","C":"The perfusion pattern of any given bone determines the technique of flap harvest. The dual blood supply of membranous bones is contrasted by the predominantly periosteal blood supply of long bone","D":"Traditionally, corticocancellous bone grafts had been used for bone defects that are 5 cm or less in length. For defects greater than 5–6 cm in length, graft resorption typically prevents complete healing","E":"The scaphoid is the most commonly fractured carpal bone, accounting for 50–80% of all carpal fractures. However, approximately 50% of all scaphoid fractures progress to nonunion"},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"🎯 骨移植/骨替代物之骨癒合機轉（複選，選『不正確』）\n- **A 正確**：自體骨為 gold standard，兼具 **osteoconductive、osteoinductive、osteogenic** 三機轉。\n- **B 不正確◎**：所述「宿主 MSC、微血管、血管周組織長入移植骨」為 **osteoconduction（爬行替代 creeping substitution）之定義**；osteo**induction** 應為誘導宿主間質細胞分化為成骨細胞（BMP 媒介）。定義張冠李戴。\n- **C 不正確◎**：血流型態反了。**膜狀骨（membranous）以骨膜供應為主、長骨以髓內/內骨膜（endosteal, nutrient artery）供應為主**（原句把長骨說成 periosteal 為主）。\n- **D 正確**：corticocancellous 傳統用於 ≤5 cm 缺損；>5–6 cm 因移植骨吸收難完全癒合（須用血管化骨瓣）。\n- **E 不正確◎**：舟狀骨確為最常見腕骨骨折（占 50–80%），但**約僅 5–15% 進展為 nonunion**，非 50%。（此為誘答陷阱）\n- 故不正確者為 BCE。","peropt":{"A":"自體骨gold standard含三機轉，正確(非不正確)","B":"所述其實為osteoconduction定義，誤植osteoinduction，不正確◎","C":"膜狀骨與長骨血流型態反置，不正確◎","D":"≤5cm用corticocancellous、>5-6cm吸收難癒，正確(非不正確)","E":"舟狀骨nonunion約5-15%非50%，不正確◎"},"cite":"Neligan 5e Vol.1 Bone graft & substitutes / Vol.6 Hand scaphoid；Grabb & Smith 9e","conflict":""},{"id":"9184","sub":"B8","src":"NG","years":[110,113],"stem":"下列何者幹細胞(Stem Cells) 屬於胚胎幹細胞，可分化所有細胞譜系(Cell lineage)？","opts":{"A":"Pluripotent stem cells","B":"Multipotent stem cells","C":"Unipotent stem cells","D":"Adipose-derived stromal cells","E":"Mesenchymal stem cells"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 幹細胞分化潛能與胚胎幹細胞\n- **Totipotent**：受精卵/桑葚胚早期，可分化為所有胚胎+胚外組織（含胎盤）。\n- **Pluripotent（多能）**：**胚胎幹細胞（ESC）**與 iPSC 屬之，可分化為**三胚層所有細胞譜系（all lineages）**但不含胚外組織 → 本題所指「胚胎幹細胞、可分化所有 cell lineage」對應 **A Pluripotent**◎。\n- **Multipotent**：如 MSC、造血幹細胞，僅限特定譜系。\n- **Unipotent**：僅單一細胞型。\n- ADSC、MSC 屬成體 multipotent 幹細胞，非胚胎幹細胞。","peropt":{"A":"pluripotent對應胚胎幹細胞、可分化所有譜系，正確◎","B":"multipotent僅限特定譜系，錯","C":"unipotent僅單一細胞型，錯","D":"ADSC為成體multipotent，錯","E":"MSC為成體multipotent，錯"},"cite":"Neligan 5e Vol.1 Stem cells & regenerative medicine 章；Grabb & Smith 9e","conflict":""},{"id":"9185","sub":"B7","src":"NG","years":[110],"stem":"下列何者有關止痛藥物的使用劑量有誤？","opts":{"A":"Morphine 的劑量為每公斤0.1 mg。","B":"每2至4個小時可以給予Morphine的劑量為2~4 mg。","C":"Demerol 的劑量為每公斤1.0 mg。","D":"Fentanyl 的劑量為每公斤0.001 mg。","E":"每5至15分鐘可以給予Fentanyl的劑量為20~40 µg。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 常用止痛藥劑量（選『有誤』）\n- **A 正確**：Morphine 約 **0.1 mg/kg**。\n- **B 正確**：Morphine 每 2–4 小時可給 **2–4 mg**（滴定式）。\n- **C 正確**：Meperidine（Demerol）約 **1.0 mg/kg**。\n- **D 正確**：Fentanyl 約 **0.001 mg/kg（＝1 µg/kg）**。\n- **E 有誤◎**：Fentanyl 每 5–15 分鐘之追加劑量標為 **20–40 µg** 過高（一般約 0.5–1 µg/kg、單次追加約 25 µg 級），為錯誤敘述。","peropt":{"A":"Morphine 0.1 mg/kg，正確","B":"Morphine q2-4h 2-4 mg，正確","C":"Demerol 1.0 mg/kg，正確","D":"Fentanyl 0.001 mg/kg(=1µg/kg)，正確","E":"Fentanyl q5-15min 20-40µg劑量有誤，權威答案◎"},"cite":"Grabb & Smith 9e Anesthesia/Analgesia；Neligan 5e Pain management","conflict":""},{"id":"9186","sub":"B8","src":"NG","years":[110],"stem":"下列何者differentiation potential與Adipose-derived stromal cells(ACS)無關？","opts":{"A":"osteogenic","B":"myogenic","C":"adipogenic","D":"hair follicle","E":"chrondogenic"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 脂肪來源基質細胞（ASC / ADSC）之分化潛能\n- ASC 為成體 **multipotent 間質幹細胞**，可分化：**adipogenic（脂肪）、osteogenic（骨）、chondrogenic（軟骨）、myogenic（肌肉）**，亦報告 neurogenic、endothelial 等。\n- **毛囊（hair follicle）分化**非 ASC 之典型/公認分化譜系 → **D 為無關（答案）**◎。","peropt":{"A":"osteogenic為ASC分化潛能，相關","B":"myogenic為ASC分化潛能，相關","C":"adipogenic為ASC分化潛能，相關","D":"hair follicle非ASC典型分化譜系，無關，權威答案◎","E":"chondrogenic為ASC分化潛能，相關"},"cite":"Neligan 5e Vol.1 Stem cells / Fat grafting biology；Grabb & Smith 9e","conflict":""},{"id":"9187","sub":"B7","src":"NG","years":[110,113],"stem":"下列何者有關Lidocaine的敘述有誤？","opts":{"A":"在肝臟代謝。","B":"Lidocaine是Tumescent analgesia常用的局部麻藥物，其安全劑量為35-55 mg/kg。","C":"和epinephrine 合併使用時，其最高劑量(dose limitation)為8.0 mg/kg。","D":"耳鳴、頭暈、顫抖是Lidocaine中毒的臨床症狀。","E":"嚴重的Lidocaine中毒會抑制呼吸。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 Lidocaine 藥理（選『有誤』）\n- **A 正確**：主要於**肝臟代謝**（amide 型局麻藥）。\n- **B 正確**：Tumescent 麻醉安全劑量約 **35–55 mg/kg**（高倍稀釋+腎上腺素+吸脂移除，故可達高劑量）。\n- **C 有誤◎**：Lidocaine **併用 epinephrine 之最高劑量為 7 mg/kg**（單用約 4.5 mg/kg），非 8.0 mg/kg。\n- **D 正確**：耳鳴（tinnitus）、頭暈、口周麻、顫抖為早期局麻藥全身毒性（LAST）症狀。\n- **E 正確**：嚴重中毒可抑制呼吸、心血管崩潰、痙攣。","peropt":{"A":"肝臟代謝，正確","B":"tumescent安全劑量35-55 mg/kg，正確","C":"併epinephrine上限應為7 mg/kg非8.0，有誤，權威答案◎","D":"耳鳴/頭暈/顫抖為毒性症狀，正確","E":"嚴重中毒抑制呼吸，正確"},"cite":"Neligan 5e Vol.2 Liposuction/Tumescent；Grabb & Smith 9e Local anesthetics","conflict":""},{"id":"9188","sub":"B8","src":"NG","years":[110],"stem":"下列有關Bone marrow mesenchymal stem cells(BMMSCs)敘述何者為非？","opts":{"A":"BMMSCs是multipotent adult stem cells。","B":"可調控T細胞功能。","C":"具有免疫調控(immunomodulation)的功能。","D":"具有組織修復(tissue repair)的功能。","E":"增加pro-inflammatory cytokines的表現。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 骨髓間質幹細胞（BMMSCs）\n- **A 正確**：BMMSC 為 **multipotent adult stem cells**。\n- **B、C 正確**：具**免疫調控（immunomodulation）**，可調控 T 細胞功能（抑制 T 細胞增生、誘導 Treg）。\n- **D 正確**：具組織修復（tissue repair）與旁分泌（paracrine）修復作用。\n- **E 為非（答案）◎**：BMMSC **降低（減少）促發炎細胞激素（pro-inflammatory cytokines）** 表現、增加抗發炎因子（如 IL-10、TGF-β、PGE2），非「增加」。","peropt":{"A":"BMMSC為multipotent adult stem cell，正確","B":"可調控T細胞功能，正確","C":"具免疫調控功能，正確","D":"具組織修復功能，正確","E":"應為降低促發炎細胞激素，非增加，權威答案◎"},"cite":"Neligan 5e Vol.1 Stem cells & regenerative medicine；Grabb & Smith 9e","conflict":""},{"id":"9189","sub":"B7","src":"NG","years":[110],"stem":"下列有關ketamine的敘述，何者為是?","opts":{"A":"在腎臟代謝。","B":"半衰期為120分鐘。","C":"下調proinflmmatory pathway。","D":"心跳加速。","E":"呼吸加速。"},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"🎯 Ketamine 藥理（複選，選『為是』）\n- **A 錯**：主要於**肝臟**經 CYP 代謝（去甲基化為 norketamine），非腎臟。\n- **B 錯**：消除半衰期約 **2–3 小時（≈150 min）**，非 120 min。\n- **C 正確◎**：具抗發炎作用，**下調 proinflammatory pathway**（抑制 NF-κB、降低 TNF-α/IL-6）。\n- **D 正確◎**：交感興奮/兒茶酚胺釋放 → **心跳加速、血壓上升**。\n- **E 錯**：ketamine 相對維持呼吸驅動與氣道張力，但非「呼吸加速」為其特徵。\n- 故選 CD。","peropt":{"A":"主要肝臟代謝非腎臟，錯","B":"半衰期約2-3小時非120分鐘，錯","C":"下調proinflammatory pathway，正確◎","D":"交感興奮致心跳加速，正確◎","E":"非以呼吸加速為特徵，錯"},"cite":"Grabb & Smith 9e Anesthesia；Neligan 5e Pain/Anesthesia","conflict":""},{"id":"9190","sub":"B8","src":"NG","years":[110],"stem":"下列何者不能刺激幹細胞分化？","opts":{"A":"脂質體(Liposome)","B":"質體（Plasmid）","C":"小分子(Small molecules)","D":"病毒(Viruses)","E":"細菌(Bacteria)"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 刺激幹細胞分化之工具（選『不能』）\n- **可刺激/遞送分化訊號者**：\n  - **Liposome（脂質體）A**：非病毒載體，遞送基因/藥物。\n  - **Plasmid（質體）B**：轉染表現分化因子。\n  - **Small molecules（小分子）C**：如生長因子模擬物、化學誘導劑。\n  - **Viruses（病毒）D**：病毒載體高效轉染誘導分化。\n- **E Bacteria（細菌）**：非誘導幹細胞分化之標準工具 → **不能（答案）**◎。","peropt":{"A":"脂質體為非病毒載體可遞送分化訊號，能","B":"質體轉染可誘導分化，能","C":"小分子可誘導分化，能","D":"病毒載體可高效誘導分化，能","E":"細菌非誘導幹細胞分化工具，不能，權威答案◎"},"cite":"Neligan 5e Vol.1 Gene therapy / Stem cell & regenerative medicine；Grabb & Smith 9e","conflict":""},{"id":"9191","sub":"B10","src":"NG","years":[110],"stem":"下列敘述何者為是？(複選)","opts":{"A":"研究設計(Study designs)可分為實驗研究(experimental study)和觀察研究(observational study)兩大類。","B":"實驗研究是測試一個變因的介入(intervention)對結果(outcome)影響的假設。","C":"案例系列的研究(Case series study)是屬於實驗研究的一種類型。","D":"觀察研究描述疾病的自然病史、發生率或研究影響結果的危險因子。","E":"隨機對照臨床試驗(Randomized controlled clinical trials)屬於觀察研究的一種類型。"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯 研究設計分類（EBM，複選，選『為是』）\n- **A 正確**：研究設計分為**實驗研究（experimental）**與**觀察研究（observational）**兩大類。\n- **B 正確**：實驗研究測試「介入（intervention）對結果（outcome）」之假設（研究者主動分派介入）。\n- **C 錯**：**Case series 屬觀察性（descriptive）研究**，非實驗研究。\n- **D 正確**：觀察研究描述疾病自然史、發生率、或探討危險因子。\n- **E 錯**：**RCT 屬實驗研究**（研究者隨機分派介入），非觀察研究。\n- 故選 ABD。","peropt":{"A":"分實驗與觀察兩大類，正確◎","B":"實驗研究測試介入對結果，正確◎","C":"案例系列屬觀察非實驗，錯","D":"觀察研究描述自然史/發生率/危險因子，正確◎","E":"RCT屬實驗非觀察，錯"},"cite":"Neligan 5e Vol.1 Evidence-based medicine 章；Grabb & Smith 9e EBM/Research design","conflict":""},{"id":"9192","sub":"B11","src":"NG","years":[110,113],"stem":"下列何者敘述世代研究(Cohort studies)為非？(複選)","opts":{"A":"Cohort是指一群在特定時期內有共同特徵或經歷的人。","B":"為評估兩個以上有不同疾病風險人群的研究。","C":"為評估一個有共同疾病風險人群的研究。","D":"非屬於一種觀察性研究。","E":"可以是前瞻性或回溯性研究。"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯 世代研究（Cohort study，複選，選『為非』）\n- **A 正確**：Cohort 指一群在特定時期具共同特徵/經歷之人。\n- **B 為非◎**：Cohort 是依**暴露（exposure）**分組追蹤後續疾病發生，比較的是暴露 vs 非暴露；敘述為「不同疾病風險人群」定義失準。\n- **C 正確**：可評估具共同暴露/風險族群之後續結果。\n- **D 為非◎**：Cohort **屬觀察性研究（observational）**，敘述「非屬觀察性」錯誤。\n- **E 正確**：可為前瞻性（prospective）或回溯性（retrospective）世代研究。\n- 故『為非』者為 BD。","peropt":{"A":"cohort為特定時期共同特徵之群體，正確(非為非)","B":"cohort依暴露分組非以不同疾病風險界定，為非◎","C":"評估共同風險族群結果，正確(非為非)","D":"cohort屬觀察性研究，敘述非觀察性為非◎","E":"可前瞻或回溯，正確(非為非)"},"cite":"Neligan 5e Vol.1 Evidence-based medicine；Grabb & Smith 9e EBM","conflict":""},{"id":"9193","sub":"B7","src":"NG","years":[110,112,113],"stem":"下列有關tumescent analgesia 的敘述，何者為非？(複選)","opts":{"A":"Lidocaine 是tumescent fluid 最常使用的局部麻藥。","B":"Tumescent fluid 以1000ml的0.9% 或 0.45% saline 為主成份。","C":"Lidocaine合併epinephrine 使用時，極限劑量為7mg/kg。","D":"Lidocaine的一般使用劑量為35-55 mg/kg。","E":"Lidocaine血中濃度在tumescent fluid注射後3小時達最高峰。"},"ans":"BE","multi":true,"etype":"ai","expl":"","key":"🎯 腫脹麻醉（Tumescent analgesia，複選，選『為非』）\n- **A 正確**：Lidocaine 為 tumescent fluid 最常用局麻藥。\n- **B 為非◎**：Klein 配方以 **1000 mL 之 0.9% normal saline（或乳酸林格）為載液主成份**，加 lidocaine、epinephrine、bicarbonate；『0.45% saline』非標準主成份，敘述有誤。\n- **C 正確**：Lidocaine 併 epinephrine 極限劑量 **7 mg/kg**。\n- **D 正確**：Tumescent 一般使用劑量 **35–55 mg/kg**。\n- **E 為非◎**：Tumescent 注射後 lidocaine 血中濃度**約 12–14 小時才達最高峰**（吸收延遲），非 3 小時。\n- 故『為非』者為 BE。","peropt":{"A":"lidocaine為最常用局麻藥，正確(非為非)","B":"載液主成份非0.45% saline，敘述有誤，為非◎","C":"併epinephrine極限7 mg/kg，正確(非為非)","D":"一般劑量35-55 mg/kg，正確(非為非)","E":"血中濃度約12-14小時達峰非3小時，為非◎"},"cite":"Neligan 5e Vol.2 Liposuction / Klein tumescent technique；Grabb & Smith 9e","conflict":"⚠ 同題歷屆重出(跨中英雙語)：tumescent analgesia何者為錯(複選)。選項逐一對應，關鍵錯誤皆B(tumescent配置敘述)與E(血中lidocaine峰值『3小時』為誤，實為10-14小時)；110/113年(9193,中)與112年(9239,英)答案皆BE。"},{"id":"9194","sub":"B7","src":"NG","years":[110],"stem":"The expected rate of surgical site infection can be roughly estimated using the wound classification as defined by the Centers for Disease Control. Which description is wrong?","opts":{"A":"Class I/Clean – An uninfected operative wound in which no inflammation is encountered and the respiratory, alimentary, genital, or uninfected urinary tract is not entered.","B":"Class II/Clean-contaminated – An operative wound in which the respiratory, alimentary, genital, or urinary tracts are entered under controlled conditions and without unusual contamination.","C":"The operations involving the biliary tract, appendix, vagina, and oropharynx are included in Class II.","D":"Open, fresh, accidental wounds are included in Class III.","E":"Class III/Contaminated – Expected infection rate: 7–13%"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 手術部位感染之傷口分類（CDC wound class，選『錯誤』）\n- **A 正確**：Class I / Clean — 未感染、無發炎，未進入呼吸/消化/生殖/未感染泌尿道。\n- **B 正確**：Class II / Clean-contaminated — 在控制下進入呼吸/消化/生殖/泌尿道且無異常污染。\n- **C 正確**：涉及膽道、闌尾、陰道、口咽之手術歸 Class II。\n- **D 正確**：開放、新鮮、意外傷口歸 Class III（Contaminated）。\n- **E 錯誤◎**：Class III / Contaminated 之預期感染率應約 **15–20%（>13%）**；『7–13%』實為 clean-contaminated 級距，敘述錯誤。","peropt":{"A":"Class I clean定義正確","B":"Class II clean-contaminated定義正確","C":"膽道/闌尾/陰道/口咽歸Class II，正確","D":"開放新鮮意外傷口歸Class III，正確","E":"Class III感染率非7-13%(應更高)，錯誤，權威答案◎"},"cite":"Grabb & Smith 9e Surgical infection / CDC wound classification；Neligan 5e Vol.1","conflict":""},{"id":"9195","sub":"B4","src":"NG","years":[110],"stem":"關於Bone graft敍述以下何者正確？","opts":{"A":"Cancellous bone grafts serve as an osteoconductive substrate to support creeping substitution","B":"Typical cancellous graft sites include fibula, rib, and iliac crest.","C":"Cancellous grafts provide immediate structural support and are able to bridge defects up to 12 cm","D":"Cortical bone has higher osteogenic potential","E":"Typical sources of cortical bone grafts are iliac crest, cranial diploe, upper tibial epiphysis, and distal radius"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 骨移植：cancellous vs cortical（選『正確』）\n- **A 正確◎**：**Cancellous 骨**作為 **osteoconductive substrate**，支持爬行替代（creeping substitution），並含最多存活骨母/成骨細胞，**osteogenic 潛能最高**。\n- **B 錯**：Fibula、rib 為**皮質骨（cortical）**來源；cancellous 典型來源為 iliac crest、脛骨近端、大轉子等。\n- **C 錯**：Cancellous **無立即結構性支撐**、不能橋接大缺損；提供結構支撐者為 cortical。\n- **D 錯**：**Cancellous 骨 osteogenic 潛能較高**（非 cortical）。\n- **E 錯**：iliac crest、cranial diploe、脛骨近端骨骺、遠端橈骨屬**cancellous** 來源，非 cortical。","peropt":{"A":"cancellous為osteoconductive支持creeping substitution，正確◎","B":"fibula/rib為cortical來源，錯","C":"cancellous無立即結構支撐、不能橋接12cm，錯","D":"cancellous osteogenic潛能較高非cortical，錯","E":"所列為cancellous來源非cortical，錯"},"cite":"Neligan 5e Vol.1 Bone graft；Grabb & Smith 9e Bone healing & grafts","conflict":""},{"id":"9196","sub":"B6","src":"NG","years":[110],"stem":"Which description about nerve injury and repair is wrong?","opts":{"A":"Sharp penetrating injuries with an acute nerve deficit should be explored early (within 72 hours).","B":"Crush and traction injuries should be treated conservatively with serial examination and electrodiagnostic studies at regular intervals based on expected recovery.","C":"The branch from the obturator to the gracilis and the distal anterior interosseous nerve are the two motor grafts that cause the least morbidity.","D":"If axons of the grafted nerve can't reach target muscle within 12 months, supercharge end-to-side technique should be performed to facilitate early motor axons reaching the target endplates","E":"Functional recovery is directly proportional to the time of denervation and inversely proportional to the number of motor axons reaching the target endplate."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 神經損傷與修復（選『錯誤』）\n- **A 正確**：銳器穿刺併急性神經缺損應**早期（72 小時內）探查**修補。\n- **B 正確**：壓砸/牽拉傷先保守觀察，依預期恢復時程做連續理學檢查與電生理（EDX）追蹤。\n- **C 正確**：閉孔神經至股薄肌之分支與遠端骨間前神經（AIN）為**供區morbidity最小之運動神經移植來源**。\n- **D 正確**：若移植神經之軸突無法於 12 個月內到達目標肌肉，可行 **supercharge end-to-side（SETS）**加速運動軸突抵達運動終板。\n- **E 錯誤◎**：功能恢復應與**去神經時間成反比**、與**抵達運動終板之軸突數成正比**；原句『與去神經時間成正比』因果顛倒。","peropt":{"A":"銳器急性缺損72小時內探查，正確","B":"壓砸/牽拉保守追蹤含電生理，正確","C":"閉孔-股薄肌支與遠端AIN供區morbidity最小，正確","D":"12個月內未達可用supercharge end-to-side，正確","E":"應與去神經時間成反比、與軸突數成正比，敘述顛倒，錯誤◎"},"cite":"Neligan 5e Vol.6 Peripheral nerve injury & repair；Grabb & Smith 9e Nerve","conflict":""},{"id":"9197","sub":"B4","src":"NG","years":[110],"stem":"下列有關fat grafting，何者為誤?","opts":{"A":"Adipose tissue is primarily comprised of large lipid-laden adipocytes, which are surrounded by various stromal vascular cells. Stromal vascular cells include fibroblasts, immune cells, pericytes, and endothelial cells.","B":"White fat involved in cushioning of vital structures and organs, maintenance of metabolic homeostasis, immune regulation, reproduction, and angiogenesis. Brown fat is responsible for storage of energy-rich triglycerides.","C":"Tumor necrosis factor–alpha (TNF-α), interleukin-8 (IL-8), interleukin-6 (IL-6) and type 1 plasminogen activator inhibitor (PAI-1) are all increased in obesity.","D":"Freshly isolated stromal vascular fraction obtained directly from harvested adipose tissue has diverse patterns of cell surface markers as identified by flow cytometry. The first subpopulation is CD31+/CD34− and is classified as \"mature endothelial\" as it expresses the endothelial marker of CD31 but lacks the progenitor marker CD34.","E":"Adipose-derived stem cells do not express major histocompatibility complex (MHC)-II and inhibit proliferation of activated peripheral blood mononuclear cells"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 脂肪移植生物學與 SVF（選『為誤』）\n- **A 正確**：脂肪組織含充脂之脂肪細胞，周圍為 stromal vascular cells（含纖維母細胞、免疫細胞、周細胞 pericyte、內皮細胞）。\n- **B 為誤◎**：白色/棕色脂肪功能敘述**顛倒**。**白色脂肪（white fat）**主司**能量儲存（triglyceride）**、緩衝、代謝恆定、免疫調節等；**棕色脂肪（brown fat）**富含粒線體、司**產熱（thermogenesis）**。原句把儲能歸給棕色脂肪。\n- **C 正確**：肥胖時 TNF-α、IL-8、IL-6、PAI-1 皆上升。\n- **D 正確**：新鮮 SVF 之 CD31+/CD34− 亞群為『mature endothelial』（表現 CD31、缺前驅標記 CD34）。\n- **E 正確**：ADSC 不表現 MHC-II，且抑制活化 PBMC 增生（免疫特權/調節）。","peropt":{"A":"脂肪組織與SVC組成敘述正確","B":"白色/棕色脂肪功能顛倒(白=儲能、棕=產熱)，為誤，權威答案◎","C":"肥胖時TNF-α/IL-8/IL-6/PAI-1上升，正確","D":"CD31+/CD34−為mature endothelial，正確","E":"ADSC不表現MHC-II並抑制PBMC增生，正確"},"cite":"Neligan 5e Vol.1 Fat grafting biology / Adipose stem cells；Grabb & Smith 9e","conflict":""},{"id":"9198","sub":"B3","src":"NG","years":[110],"stem":"關於Angiosome concept, 何者錯誤?","opts":{"A":"Because most muscles span two or more angiosomes and are supplied from each territory, one is able to capture the skin island from one angiosome by muscle supplied in the adjacent territory.","B":"Each angiosome defines the safe anatomic boundary of tissue in each layer that can be transferred separately or combined on the underlying source vessels as a composite flap.","C":"Because the junctional zone between adjacent angiosomes usually occurs within muscles of the deep tissue, rather than between them, these muscles provide an important anastomotic detour if the main source artery or vein is obstructed.","D":"The arterial connection between adjacent cutaneous perforators may be through reduced caliber choke anastomotic vessels or through vessels which are not reduced in caliber (true anastomoses).","E":"True anastomoses occur variably throughout the body, most commonly along cutaneous nerves or in areas where the skin is immobile."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 血管體概念（Angiosome concept，選『錯誤』）\n- **A 正確**：多數肌肉橫跨兩個以上 angiosome 且各自受供，故可藉相鄰territory之肌肉血供帶起另一 angiosome 之皮島。\n- **B 正確**：每個 angiosome 界定各層可安全轉移之解剖邊界，可單獨或組合成複合瓣。\n- **C 正確**：相鄰 angiosome 之交界（junctional zone）多位於深部肌肉『之內』而非之間，故肌肉提供重要吻合繞道（若主源動/靜脈阻塞）。\n- **D 正確**：相鄰皮穿支間之動脈連結可經口徑縮小之**choke anastomotic vessels**或未縮小之**true anastomoses**。\n- **E 錯誤◎**：**True anastomoses** 最常見於沿**皮神經走行**及**皮膚可動（mobile）**之處；原句作『skin is immobile（不可動）』有誤（皮膚固定處以 choke vessels 為主）。","peropt":{"A":"肌肉跨多angiosome可帶起鄰territory皮島，正確","B":"angiosome界定各層安全轉移邊界，正確","C":"junctional zone多在肌肉內、提供吻合繞道，正確","D":"連結經choke或true anastomoses，正確","E":"true anastomoses見於皮膚可動處非immobile，錯誤，權威答案◎"},"cite":"Neligan 5e Vol.1 Ch.23 Vascular territories (angiosome, Taylor)；Grabb & Smith 9e Flap physiology","conflict":""},{"id":"9199","sub":"B3","src":"NG","years":[110],"stem":"Which description about the flap is wrong?","opts":{"A":"Elevation and immobilization of upper and lower extremities are generally recommended for 10 days followed by nonweight bearing for up to 6 weeks.","B":"The chimeric flap from the subscapular arterial system can include latissimus dorsi muscle, serratus anterior muscle and scapular flap.","C":"In extremity reconstruction, the use of a plaster splint to immobilize the joint proximal and distal to the flap inset site is recommended.","D":"The mechanisms of venous flap survival are A-V shunting and capillary bypass.","E":"The mechanisms of delay flap survival are reverse flow and increasing flow through pre-existing vessels."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 皮瓣照護與存活機轉（選『錯誤』)\n- **A 正確**：四肢皮瓣術後一般抬高並固定約 **10 天**，其後不負重（non-weight bearing）達 6 週。\n- **B 正確**：源自 subscapular arterial system 之 **chimeric flap** 可含闊背肌、前鋸肌與肩胛皮瓣。\n- **C 正確**：肢體重建以石膏夾板固定 inset 部位之近端與遠端關節。\n- **D 正確**：**Venous flap** 存活機轉為 **A-V shunting 與 capillary bypass**。\n- **E 錯誤◎**：**Delay phenomenon（延遲皮瓣）** 之機轉為**開放既存 choke vessels、增加經既存血管之血流**與交感神經去神經/血管重塑；『reverse flow（逆流）』非 delay 機轉（逆流屬 venous/reverse-flow flap 概念），敘述張冠李戴。","peropt":{"A":"四肢皮瓣固定約10天後不負重6週，正確","B":"subscapular系統chimeric含LD/前鋸/肩胛，正確","C":"石膏夾板固定近遠端關節，正確","D":"venous flap靠A-V shunting與capillary bypass，正確","E":"delay機轉為開放choke增既存血管血流非reverse flow，錯誤，權威答案◎"},"cite":"Neligan 5e Vol.1 Flap physiology / delay phenomenon；Grabb & Smith 9e Flaps","conflict":""},{"id":"9200","sub":"B2","src":"NG","years":[104,110],"stem":"Which are variables of \"The Vancouver Scar Scale\"? (複選)","opts":{"A":"Width","B":"Height","C":"Pliability","D":"Vascularity","E":"Pigmentation"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯【Vancouver Scar Scale (VSS)】疤痕成熟度之經典半客觀量表\n- VSS 為 1990 年 Sullivan 等人提出，用於評估燒燙傷/術後疤痕成熟度，共 4 個參數：\n  1. **Vascularity (血管分佈)**：0 正常膚色→ 3 紫色 (purple)\n  2. **Pigmentation (色素沉著)**：hypo-/normo-/hyper-pigmentation\n  3. **Pliability (柔軟度/柔韌性)**：normal→supple→yielding→firm→banding→contracture\n  4. **Height (高度)**：flat→ >5 mm\n- 總分 0（正常）至 13。\n- **Width (寬度) 並非 VSS 參數**（此為干擾選項）；寬度屬於 POSAS 或其他量表可能納入的面向，但非 VSS。\n- 現代趨勢：VSS 缺乏病人自評面向，故 **POSAS (Patient and Observer Scar Assessment Scale)** 已逐漸取代，納入癢、痛等病人主觀項目。","peropt":{"A":"Width｜✗ 寬度非 VSS 四參數，為典型誘答項。","B":"Height｜◎ VSS 參數之一（疤痕高度）。","C":"Pliability｜◎ VSS 參數之一（柔韌度）。","D":"Vascularity｜◎ VSS 參數之一（血管分佈）。","E":"Pigmentation｜◎ VSS 參數之一（色素沉著）。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Scar/wound assessment; Sullivan T. J Burn Care Rehabil 1990.","conflict":"⚠ 同題歷屆重出：Vancouver Scar Scale四項組成(pigmentation/vascularity/pliability/height)。兩題皆複選『哪些為量表變項』，僅干擾項不同(104年含duration、110年含width)且選項重排；104年(9064)答ABCD、110年(9200)答BCDE，指向同四項。"},{"id":"9201","sub":"B1","src":"NG","years":[110],"stem":"關於Bone healing敍述以下何者正確？ (複選)","opts":{"A":"Primary bone repair: nondisplaced bone fragments heal without cartilaginous intermediate","B":"Primary bone repair involves the direct deposition of woven bone by osteoblasts to re-establish mechanical continuity between fracture fragments. The interfragmentary strain should also be at a minimum.","C":"The callus is the key factor of primary bone healing.","D":"The fracture callus undergoes both intramembranous and endochondral ossification.","E":"Most fracture repair is by primary bone healing."},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯【Bone healing：Primary vs Secondary】骨折癒合生理\n- **Primary (direct) bone healing 一級/直接癒合**：\n  1. 條件：**解剖復位 (anatomic reduction)、堅強固定 (rigid fixation, 如 compression plate)、interfragmentary strain 極小 (<2%)、無明顯骨折間隙**。\n  2. 機轉：**無軟骨中間期 (no cartilaginous intermediate)、無 callus**；由 osteoblast 直接沉積 woven bone → 經 cutting cone/Haversian remodeling 重建連續性。\n  3. 屬臨床少見情形（需堅強內固定）。\n- **Secondary (indirect) bone healing 二級/間接癒合**：\n  1. 有微動、相對穩定 → 形成 **callus (骨痂)**。\n  2. Callus 同時經 **intramembranous ossification (骨膜下)** 與 **endochondral ossification (骨折間隙軟骨→骨)**。\n  3. **絕大多數骨折以此方式癒合** → 故 E 錯；callus 是 secondary 而非 primary 的關鍵 → 故 C 錯。","peropt":{"A":"Nondisplaced fragments heal without cartilaginous intermediate｜◎ 描述 primary bone repair 特徵，正確。","B":"Direct deposition of woven bone by osteoblasts, interfragmentary strain minimum｜◎ primary repair 機轉與生物力學條件正確。","C":"Callus is key factor of primary bone healing｜✗ Callus 為 secondary healing 標誌，primary healing 無 callus。","D":"Callus undergoes both intramembranous and endochondral ossification｜◎ 正確，callus 同時二種骨化。","E":"Most fracture repair is by primary bone healing｜✗ 絕大多數骨折為 secondary (indirect) healing。"},"cite":"Grabb & Smith 9e, Bone healing physiology; Neligan Plastic Surgery 5e, Vol.1 Wound healing.","conflict":""},{"id":"9202","sub":"B5","src":"NG","years":[110],"stem":"關於microscopic flap outcome敍述以下何者正確？ (複選)","opts":{"A":"With maturation of microsurgical technique, success rates of free tissue transfers now range from 96% to 100%.","B":"Failures can be attributed to poor planning, poor choice of flap or vessels, poor timing, or poor technique.","C":"Vasospasm occurs in 5–10% of microsurgical procedures, it may be seen intraoperatively and up to 72 hours postoperatively.","D":"Many free-flap complications relate to pedicle thrombosis (4–80% within the first 48 hours) caused by changes in the intraluminal blood flow, endothelial damage, and the state of coagulability.","E":"Low-dose aspirin (75 mg/day) has been shown to inhibit thromboxane selectively at the site of the anastomosis while preserving prostacyclin production of the endothelium"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【Free flap outcome / microsurgical complications】顯微皮瓣成效與併發症\n- **成功率**：技術成熟後 free tissue transfer 成功率達 **96–100%** (A 正確)。\n- **失敗原因**：規劃不良、皮瓣/血管選擇不當、時機/技術不佳 (B 正確)。\n- **Vasospasm (血管痙攣)**：發生率約 5–10%，術中至術後 72 小時皆可能出現 (C 正確)。\n- **Pedicle thrombosis (血管蒂栓塞)**：多發生於前 48 小時，與 **intraluminal flow 改變、endothelial damage、hypercoagulable state (Virchow triad)** 相關 (D 正確)。\n- **Low-dose aspirin (75 mg/day)**：**選擇性抑制 platelet thromboxane A2**，同時保留內皮 prostacyclin (PGI2)，具抗栓抗血小板效益 (E 正確)。\n- 本題五選項皆為教科書標準敘述 → **ABCDE 全對**。","peropt":{"A":"Success rate 96–100%｜◎ 正確。","B":"Failures from poor planning/choice/timing/technique｜◎ 正確。","C":"Vasospasm 5–10%, up to 72h postop｜◎ 正確。","D":"Pedicle thrombosis 4–80% within 48h, Virchow triad｜◎ 正確。","E":"Low-dose aspirin selectively inhibits thromboxane, preserves prostacyclin｜◎ 正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Flap physiology & monitoring; Grabb & Smith 9e Microsurgery.","conflict":""},{"id":"9205","sub":"B4","src":"NG","years":[110,112,114],"stem":"For skeletal reconstruction, a non-vascularized bone graft can only be used for defect less than 5 cm. For a greater bone defect, Masquelet described a two-staged approach. First stage: radical debridement, cement spacer, soft tissue reconstruction. The spacer induced membrane which has rich vascular network, ensuring the survival of bone graft implanted in the second stage. What is the optimal interval between first and second stage?","opts":{"A":"Within 2 weeks","B":"6-8 weeks","C":"3 months","D":"Half year","E":"As late as possible"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【Masquelet technique (induced membrane technique) 誘導膜技術】\n- 適用於節段性骨缺損 (segmental/intercalary bone defect)，非血管化骨移植上限約 5–6 cm，超過者採兩階段法。\n- **第一階段**：徹底清創 (radical debridement)、置入 **PMMA cement spacer (骨水泥間隔物)**、軟組織重建覆蓋。\n- Spacer 誘導形成富血管、含生長因子 (VEGF, BMP-2, TGF-β) 之 **induced membrane (誘導膜)**。\n- **第二階段時機**：最佳間隔為 **6–8 週 (約 4–8 週)**，此時誘導膜之血管化與生物活性成熟；移除 spacer，於膜腔內植入自體 cancellous bone graft。\n- 正解 **B (6–8 weeks)**。過早膜未成熟、過晚膜纖維化血管性下降。","peropt":{"A":"Within 2 weeks｜✗ 過早，誘導膜尚未成熟。","B":"6–8 weeks｜◎ 最佳間隔，誘導膜血管化/生物活性成熟。","C":"3 months｜✗ 偏晚，膜纖維化風險增。","D":"Half year｜✗ 過晚。","E":"As late as possible｜✗ 錯誤觀念。"},"cite":"Neligan Plastic Surgery 5e, Vol.4 Lower extremity/skeletal reconstruction; Masquelet AC 2000.","conflict":""},{"id":"9206","sub":"B11","src":"NG","years":[111,112,114],"stem":"Who performed the first successful kidney transplant from one twin to another at the Peter Bent Brigham Hospital in Boston in 1954?","opts":{"A":"Archibald Mclndoe","B":"Joseph Murray","C":"Jacques Reverdin","D":"Paul Tessier","E":"Harold Gillies"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【整外/移植醫學史】首例成功腎臟移植\n- **Joseph Murray** 於 **1954 年**在波士頓 **Peter Bent Brigham Hospital** 完成人類首例成功腎臟移植——**同卵雙胞胎 (identical twins)** 間之移植（避開排斥），奠定移植免疫學基礎。\n- Murray 於 **1990 年獲諾貝爾生理醫學獎**，並為整形外科出身。\n- 正解 **B**。\n- 其他人物：Reverdin（表皮移植先驅）、Tessier（顱顏外科之父）、Gillies（現代整形外科之父）、McIndoe（燒燙傷/二戰重建）。","peropt":{"A":"Archibald McIndoe｜✗ 二戰燒燙傷重建先驅 (Guinea Pig Club)。","B":"Joseph Murray｜◎ 1954 首例成功腎移植，1990 諾貝爾獎。","C":"Jacques Reverdin｜✗ 首例人類表皮移植 (pinch graft)。","D":"Paul Tessier｜✗ 顱顏外科之父。","E":"Harold Gillies｜✗ 現代整形外科之父。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 History of plastic surgery.","conflict":""},{"id":"9207","sub":"B11","src":"NG","years":[111,112,114],"stem":"Who performed the first successful epidermic graft on a human?","opts":{"A":"Archibald Mclndoe","B":"Joseph Murray","C":"Jacques Reverdin","D":"Paul Tessier","E":"Harold Gillies"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【整外史】首例成功人類表皮移植\n- **Jacques-Louis Reverdin (1869)** 完成首例成功之人類 **epidermic graft (pinch graft/Reverdin graft)**，開啟皮膚移植時代。\n- 正解 **C**。\n- 記憶對照：Ollier–Thiersch (split-thickness graft)、Wolfe–Krause (full-thickness graft)、Reverdin (pinch/epidermic graft)。","peropt":{"A":"Archibald McIndoe｜✗ 燒燙傷重建。","B":"Joseph Murray｜✗ 腎移植。","C":"Jacques Reverdin｜◎ 1869 首例人類表皮移植。","D":"Paul Tessier｜✗ 顱顏外科。","E":"Harold Gillies｜✗ 現代整形外科之父。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 History; Skin graft history.","conflict":""},{"id":"9208","sub":"B11","src":"NG","years":[111,112,114],"stem":"下列有關整形外科手術拍照的 key principles 何者正確? (複選)","opts":{"A":"只要解析度一樣，相機不同沒關係","B":"快門跟光圈必須保持一樣","C":"閃光燈設備跟燈光要相同","D":"藉著zoom in/ zoom out來對焦","E":"不要改變白平衡，並且保持與藍色背景光源同步"},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"🎯【整形外科臨床攝影 key principles 標準化原則】\n- 目的：術前/術後可比性，須嚴格**標準化 (standardization)**。\n- 核心原則：\n  1. **相同設備**：相機、鏡頭、閃光燈/照明須固定一致（僅解析度相同並不足夠，故 A 錯）。\n  2. **固定曝光參數**：**shutter speed 與 aperture (光圈) 保持一致** (B 正確)。\n  3. **相同閃光燈與照明條件** (C 正確)。\n  4. **對焦應移動相機/病人距離，不可用 zoom in/out 對焦**（zoom 改變視角/透視變形，故 D 錯）。\n  5. **固定白平衡 (white balance)**，並與背景光源同步（藍色標準背景）(E 正確)。\n- 正解 **BCE**。","peropt":{"A":"只要解析度一樣，相機不同沒關係｜✗ 相機/鏡頭須一致，色彩幾何有別。","B":"快門跟光圈必須保持一樣｜◎ 曝光參數固定確保可比性。","C":"閃光燈設備跟燈光要相同｜◎ 照明一致。","D":"藉 zoom in/out 對焦｜✗ 應以距離對焦，zoom 造成透視變形。","E":"不改變白平衡並與藍色背景光源同步｜◎ 正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Photography in plastic surgery.","conflict":""},{"id":"9209","sub":"B11","src":"NG","years":[111],"stem":"關於全臉(full face)之照相紀錄，以下何者是standard views (複選)","opts":{"A":"Posterior-Anterior view","B":"Right Oblique view","C":"Right lateral view","D":"Left Oblique view","E":"Left lateral view"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯【全臉標準攝影角度 standard facial views】\n- 完整臉部攝影標準視角包含：**Frontal (正面)、Right/Left lateral (左右側面 90°)、Right/Left oblique (左右斜面 45°)**，必要時加 basal/submental (仰視) 與 cephalic (俯視)。\n- 本題正解 **BCDE**：右斜、右側、左斜、左側。\n- 選項 A「Posterior-Anterior view (PA view)」為**放射線學用語且方向定義錯誤**，臨床正面像應稱 frontal/anteroposterior，故不列入本題標準答案。","peropt":{"A":"Posterior-Anterior view｜✗ 命名/方向錯誤，非正確標準視角描述。","B":"Right Oblique view｜◎ 標準右斜面視角。","C":"Right lateral view｜◎ 標準右側面視角。","D":"Left Oblique view｜◎ 標準左斜面視角。","E":"Left lateral view｜◎ 標準左側面視角。"},"cite":"Neligan Plastic Surgery 5e, Vol.1/Vol.2 Facial photography standard views.","conflict":""},{"id":"9210","sub":"B11","src":"NG","years":[111,112,113,114],"stem":"下列拍攝臉部相片的基本原則，何者錯誤？","opts":{"A":"拍攝五種角度的相片","B":"頭部上方留下約 10%相片高度的背景","C":"相片下緣約在下巴的位置","D":"除非另有考量，臉部肌肉應呈放鬆狀態","E":"在oblique view鼻尖的位置應稍微超過或恰好位於顴骨隆凸(malar eminence)外緣"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【臉部攝影基本原則—找出錯誤】\n- 標準：\n  1. **五種角度 (frontal, 2×lateral, 2×oblique)** (A 正確)。\n  2. 頭頂上方保留約 **10% 相片高度之背景空間** (B 正確)。\n  3. 相片**下緣應在下巴以下 (含胸骨上凹/頸部)**，非恰在下巴位置 → **C 錯誤（本題答案）**；下緣切在下巴會裁掉頸頦線與下頜輪廓評估。\n  4. 除非特殊需求，**臉部肌肉放鬆 (repose)** (D 正確)。\n  5. Oblique view：**鼻尖 (nasal tip) 位置應恰好或略超過對側顴突 (malar eminence) 外緣** (E 正確)，作為 45° 標準對位依據。\n- 正解（錯誤敘述）為 **C**。","peropt":{"A":"拍攝五種角度｜✓ 正確原則。","B":"頭部上方留約 10% 背景｜✓ 正確。","C":"相片下緣約在下巴的位置｜✗（本題答案）下緣應在下巴以下含頸部，切在下巴會裁掉下頜線。","D":"臉部肌肉放鬆｜✓ 正確。","E":"Oblique view 鼻尖略超過或恰在 malar eminence 外緣｜✓ 正確對位標準。"},"cite":"Neligan Plastic Surgery 5e, Vol.2 Facial aesthetic photography principles.","conflict":""},{"id":"9211","sub":"B7","src":"NG","years":[111,112,114],"stem":"關於ketamine，以下何者正確(複選)","opts":{"A":"Ketamine works as a competitive N-methyl-D-aspartate (NMDA) receptor antagonist","B":"Ketamine has a half-life of 180 minutes.","C":"Ketamine is metabolized in the liver.","D":"The use of ketamine has also been associated with a significant reduction of opioid-related side effects including postoperative nausea and vomiting (PONV).","E":"Dose-dependent neuropsychiatric effects, including dysphoria, hallucinations, vivid, unpleasant dreams, and catatonia or psychoses are potential side effects of ketamine"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯【Ketamine 藥理—多重正確敘述】\n- **機轉**：Ketamine 為 **非競爭性 (NON-competitive) NMDA receptor antagonist**；A 敘述為「competitive」→ **錯誤**，故不選 A。\n- **半衰期**：約 **180 分鐘 (2–3 小時)** (B 正確)。\n- **代謝**：主要於 **肝臟 (CYP450)** 經 N-demethylation 生成 norketamine (C 正確)。\n- **臨床效益**：具鎮痛、opioid-sparing 效果，可降低 opioid 相關副作用含 **PONV (術後噁心嘔吐)** (D 正確)。\n- **副作用**：劑量相關之神經精神效應——dysphoria、hallucination、vivid unpleasant dreams、catatonia/psychosis（emergence reaction）(E 正確)。\n- 正解 **BCDE**。","peropt":{"A":"Competitive NMDA receptor antagonist｜✗ Ketamine 為『非競爭性』NMDA 拮抗劑，敘述錯誤。","B":"Half-life 180 minutes｜◎ 約 2–3 小時，正確。","C":"Metabolized in the liver｜◎ 肝臟 CYP450 代謝。","D":"Reduces opioid-related side effects incl. PONV｜◎ opioid-sparing，正確。","E":"Dose-dependent neuropsychiatric effects｜◎ emergence reaction，正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Anesthesia; ketamine pharmacology.","conflict":""},{"id":"9212","sub":"B7","src":"NG","years":[111,112,114],"stem":"關於Tumescent analgesia (TA) in plastic surgery，下列何者錯誤？","opts":{"A":"TA was popularized in the 1990s by Klein for use during liposuction","B":"The reported dose limitation for lidocaine with epinephrine is 7 mg/kg; however, doses of 35 mg/kg are frequently used during liposuction","C":"Peak lidocaine blood levels occur 6-8 hours following infiltration.","D":"In highly vascularized areas, such as above the clavicle, plasma lidocaine levels peak at approximately 6 hours after injection","E":"The maximal hemostatic effects of epinephrine occur 25 minutes after administration rather than the commonly held belief that this occurs at 7–10 minutes"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Tumescent analgesia (TA)—找出錯誤】\n- **A**：1990 年代由 **Klein** 推廣用於抽脂 (liposuction) → 正確。\n- **B**：Lidocaine+epinephrine 一般上限 7 mg/kg，但腫脹麻醉下常用高達 **35 mg/kg** (大稀釋、緩慢吸收) → 正確。\n- **C**：**血中 lidocaine 濃度高峰出現於注射後約 12–14 小時**（腫脹液吸收極慢）；本題敘述「6–8 小時」→ **錯誤（本題答案）**。\n- **D**：高血管區 (如鎖骨上) 吸收較快，血漿 lidocaine 峰值約在 6 小時 → 正確。\n- **E**：epinephrine 最大止血效果約在注射後 **25 分鐘**（非常誤認的 7–10 分鐘）→ 正確。\n- 正解（錯誤）為 **C**。","peropt":{"A":"Popularized 1990s by Klein for liposuction｜✓ 正確。","B":"7 mg/kg limit but 35 mg/kg used in liposuction｜✓ 正確。","C":"Peak lidocaine at 6–8 hours｜✗（本題答案）峰值約 12–14 小時。","D":"Highly vascular areas peak ~6 hours｜✓ 正確。","E":"Max hemostatic epinephrine at 25 minutes｜✓ 正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Local anesthetics/Tumescent; Klein JA 1990s.","conflict":""},{"id":"9213","sub":"B8","src":"NG","years":[111,112],"stem":"關於stem cell，下列何者錯誤？","opts":{"A":"Self-renewal","B":"Clonality","C":"Differentiation potential","D":"Stem cells come from embryonic but not postnatal sources.","E":"Adult, or tissue-specific, stem cells are undifferentiated cells that are found in almost all tissues and organs after embryonic development"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Stem cell 幹細胞定義—找出錯誤】\n- 幹細胞三大定義特性：\n  1. **Self-renewal (自我更新)** (A 正確)。\n  2. **Clonality (單一細胞可株落形成)** (B 正確)。\n  3. **Differentiation potential (分化潛能)** (C 正確)。\n- **來源**：不僅胚胎，**成體/組織特異性幹細胞 (adult/tissue-specific stem cells)** 於胚胎發育後幾乎存在於所有組織與器官 (E 正確)。\n- **D 敘述「幹細胞僅來自胚胎而非出生後來源」→ 錯誤（本題答案）**，忽略了成體幹細胞、iPSC 等。\n- 正解（錯誤）為 **D**。","peropt":{"A":"Self-renewal｜✓ 幹細胞特性。","B":"Clonality｜✓ 幹細胞特性。","C":"Differentiation potential｜✓ 幹細胞特性。","D":"Come from embryonic but not postnatal sources｜✗（本題答案）成體幹細胞廣泛存在。","E":"Adult stem cells found in almost all tissues after development｜✓ 正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Stem cells & regenerative medicine.","conflict":""},{"id":"9214","sub":"B11","src":"NG","years":[109,111],"stem":"Which statements about simulation in plastic surgery is/are correct?","opts":{"A":"Simulation provides a safe and consistent way for plastic surgeons to improve and verify technical skills, cognitive knowledge, and teamwork.","B":"Surgical simulators included animal models, cadavers, and computer.","C":"The earliest record of surgical simulators was the models for forehead-flap nasal reconstructions","D":"Using virtual reality and simulation, residents and attending surgeons can practice skills and procedures without risk to the patient.","E":"All of above are correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【Simulation in plastic surgery 模擬訓練】\n- 全部敘述皆正確 → 正解 **E (All of above)**。\n- **A**：模擬提供安全、一致的方式提升並驗證技術、認知知識與團隊合作。\n- **B**：外科模擬器包含 **animal models、cadavers、computer/VR**。\n- **C**：最早的外科模擬紀錄為 **forehead-flap 鼻重建之模型 (印度古法/Sushruta 傳統)**。\n- **D**：透過 VR 與模擬，住院醫師與主治可在**不危及病人**下練習技能與流程。\n- 現代精神：simulation-based training 符合病人安全 (patient safety) 與能力導向醫學教育 (CBME)。","peropt":{"A":"Safe/consistent way to improve & verify skills｜◎（全對）正確。","B":"Simulators include animal, cadaver, computer｜◎ 正確。","C":"Earliest record: forehead-flap nasal reconstruction models｜◎ 正確。","D":"VR/simulation practice without patient risk｜◎ 正確。","E":"All of above are correct｜◎（本題答案）全部正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Simulation/technology in plastic surgery.","conflict":"⚠ 同題歷屆重出：simulation in plastic surgery何者正確＝以上皆是(最早模擬為forehead-flap鼻重建模型/含動物/大體/電腦/VR無風險練習)。純選項重排，109年(9182)與111年(9214)答案皆E。"},{"id":"9215","sub":"B9","src":"NG","years":[109,111,114],"stem":"What is the correct statement about delayed toxicity of radiation treatment?","opts":{"A":"Lhermitte's syndrome is one kind of delayed acute toxicity of radiation treatment.","B":"The effect of delayed acute toxicity is irreversible.","C":"Radiation pneumonitis is not one of delayed acute toxicity of radiation treatment.","D":"Delayed toxicity of radiation treatment is not correspond to the dose and size of the volume irradiated.","E":"It occurs during 6 days to 6 weeks since the treatment started."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【放射線治療 delayed toxicity 延遲毒性】\n- 放射毒性分期：**acute (急性, 治療中至數週)、early-delayed/subacute (延遲急性, 數週至數月, 多可逆)、late (晚期, 數月至數年, 多不可逆)*
