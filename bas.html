n 5e, Oncology basics; Gompertzian growth kinetics","conflict":""},{"id":"9281","sub":"B1","src":"NG","years":[115],"stem":"關於慢性傷口（如糖尿病足潰瘍）的病生理機制，下列哪一描述最為正確？","opts":{"A":"慢性傷口主要由外部污染物導致，清創後通常迅速癒合","B":"慢性傷口的特徵是傷口長期停留在發炎期，伴隨基質金屬蛋白酶 (MMPs) 過度表達、生長因子失衡及生物膜 (biofilm) 形成，阻礙正常癒合進程","C":"慢性傷口主要由過度的增生期反應造成","D":"慢性傷口的主要病因是血小板功能不足導致止血失敗","E":"慢性傷口的治療主要依靠大劑量全身性抗生素的長期應用"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 慢性傷口（糖尿病足潰瘍）病生理：停滯於發炎期\n- 慢性傷口 (chronic wound) 核心特徵：無法依序通過 hemostasis→inflammation→proliferation→remodeling，長期『卡』在 inflammatory phase。\n- 分子機制：\n  1. MMPs (matrix metalloproteinases) 過度表達 → 過度降解 ECM 與生長因子。\n  2. Growth factors（PDGF、TGF-β、VEGF、EGF）失衡與其受體反應下降。\n  3. Biofilm（生物膜）形成 → 細菌被多醣基質包覆、抗生素與免疫難以清除。\n  4. Senescent cells、缺氧、反覆缺血再灌流、糖化終產物 (AGEs)。\n- 治療原則：TIME/清創、控制感染與生物膜、血流重建、減壓 (offloading)、血糖控制、進階敷料，而非單靠大劑量全身抗生素。","peropt":{"A":"錯誤。慢性傷口非單純外部污染所致，清創後也未必迅速癒合。","B":"◎ 正解。停留發炎期＋MMPs 過度表達＋生長因子失衡＋biofilm 形成，為核心機制。","C":"錯誤。病理是停滯於發炎期，非過度增生期反應。","D":"錯誤。主因非血小板功能不足或止血失敗。","E":"錯誤。治療核心非長期大劑量全身抗生素。"},"cite":"Neligan 5e Vol.1 Wound healing; chronic/diabetic wound pathophysiology","conflict":""},{"id":"9282","sub":"B11","src":"NG","years":[115],"stem":"關於整形外科的歷史發展，下列哪些陳述正確？(複選)","opts":{"A":"「plastic」一詞源自希臘文「πλαστικóς」，意指「可塑造的」","B":"埃德溫·史密斯紙草文書 (Edwin Smith papyrus) 是已知最古老的醫學文本之一","C":"Gaspare Tagliacozzi (1545–1597) 被認為是整形外科的奠基人之一","D":"皮瓣手術是整形外科的原創技術，歷史上從未在其他外科領域出現","E":"第一次世界大戰推動了重建外科技術的合法化與重大進步"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 整形外科歷史發展（複選）\n- 『plastic』源自希臘文 πλαστικός，意為『可塑造的 (to mold/to shape)』——A 正確。\n- Edwin Smith papyrus（約西元前 1600 年）為現存最古老外科／醫學文本之一，記載傷口與外傷處置——B 正確。\n- Gaspare Tagliacozzi (1545–1597)：文藝復興時期以上臂皮瓣行鼻重建 (Italian method)，被譽為現代整形外科奠基人之一——C 正確。\n- 皮瓣手術並非整外獨創且『從未見於其他外科』——D 錯誤（觀念過度絕對）。\n- 第一次世界大戰大量顏面與肢體創傷，推動 Gillies 等人重建外科的技術進步與專科合法化——E 正確。","peropt":{"A":"◎ plastic 源自希臘文 πλαστικός，意為可塑造的，正確。","B":"◎ Edwin Smith papyrus 為最古老醫學文本之一，正確。","C":"◎ Tagliacozzi 為整形外科奠基人之一（鼻重建），正確。","D":"錯誤（未選）。皮瓣並非整外獨創且從未見於他科，敘述過度絕對。","E":"◎ 一次世界大戰推動重建外科的合法化與重大進步，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, History of plastic surgery","conflict":""},{"id":"9283","sub":"B10","src":"NG","years":[115],"stem":"關於整形外科患者的心理問題，下列哪些陳述正確？(複選)","opts":{"A":"整形外科醫師的技術能力是影響患者心理滿意度的唯一因素","B":"超過三分之二的年輕人對自身外貌有某種程度的不滿意","C":"BDD 患者在整形外科門診中的比例顯著高於一般人群","D":"心理創傷（如燒傷、癌症切除）患者的心理需求不同於美容手術患者","E":"社群媒體使用與外貌不滿意感的增加有顯著相關"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 整外患者心理問題與 BDD（複選）\n- 心理滿意度為多因素，技術能力並非『唯一』決定因素（A 過度絕對，錯誤）。\n- 流行病學：超過 2/3 年輕人對自身外貌有某程度不滿意——B 正確，與 body image 議題相關。\n- BDD (Body Dysmorphic Disorder)：一般人口約 1–2%，但美容整外門診比例顯著較高（約 7–15%），且術後多不滿意——C 正確；BDD 常為手術相對禁忌。\n- 重建（燒傷、癌症切除）病人的心理需求（創傷、功能、身分認同）與純美容病人不同——D 正確。\n- Social media 使用與 body dissatisfaction 增加顯著相關——E 正確。","peropt":{"A":"錯誤（未選）。技術能力並非影響心理滿意度的『唯一』因素。","B":"◎ 超過三分之二年輕人對外貌有某程度不滿，正確。","C":"◎ BDD 在整外門診比例顯著高於一般人群，正確。","D":"◎ 心理創傷病人（燒傷、癌症）心理需求不同於美容病人，正確。","E":"◎ 社群媒體使用與外貌不滿意顯著相關，正確。"},"cite":"Neligan 5e Psychological aspects; BDD in aesthetic surgery","conflict":""},{"id":"9284","sub":"B11","src":"NG","years":[115],"stem":"整形外科醫療攝影的標準規範中，下列哪些是重要考量事項？(複選)","opts":{"A":"標準化的拍攝角度與視角 (standardized views)","B":"一致的背景、光源與攝影距離","C":"符合隱私法規（如 HIPAA）的知情同意程序","D":"照片的價值隨時間增加，應長期妥善保存","E":"三維 (3D) 攝影技術可改善溝通、合作及患者滿意度"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 整外醫療攝影標準規範（複選，全選）\n- Standardized views：一致的拍攝角度與視角（如正面、側面、斜位、Frankfort horizontal plane 對齊）——A 正確。\n- 一致的 background、lighting、camera distance / focal length，確保前後可比較——B 正確。\n- 隱私與知情同意：符合 HIPAA（及台灣個資法）之 informed consent 與去識別化——C 正確。\n- 照片為長期臨床、教學、法律紀錄，價值隨時間累積，須妥善保存——D 正確。\n- 3D photography（如 Vectra）改善醫病溝通、術前規劃、團隊合作與病人滿意度——E 正確。\n- 五者皆為重要考量，故全選。","peropt":{"A":"◎ 標準化拍攝角度與視角，正確。","B":"◎ 一致背景、光源與攝影距離，正確。","C":"◎ 符合隱私法規（HIPAA）的知情同意，正確。","D":"◎ 照片價值隨時間增加應長期保存，正確。","E":"◎ 3D 攝影改善溝通、合作與病人滿意度，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, Medical photography standards","conflict":""},{"id":"9285","sub":"B7","src":"NG","years":[115],"stem":"關於整形外科的患者安全措施，下列哪些已被證實能有效降低手術相關不良事件的發生率？(複選)","opts":{"A":"手術安全核對表 (surgical safety checklist) 的使用","B":"術前抗生素預防性給藥的標準化","C":"深部靜脈血栓 (DVT) 預防措施的常規應用","D":"手術時長超過8小時時強制休息以避免疲勞","E":"術前患者評估及風險分層"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 整外病人安全措施（複選）——實證支持者\n- Surgical safety checklist（WHO checklist）：實證降低併發症與死亡率——A 正確。\n- 術前 prophylactic antibiotics 標準化給藥（切皮前 60 分鐘內、正確劑量）降低 SSI——B 正確。\n- DVT / VTE 預防（Caprini 風險分層＋機械/藥物預防）降低血栓事件——C 正確。\n- 術前病人評估與 risk stratification 降低不良事件——E 正確。\n- 『手術超過 8 小時強制休息』——D 錯誤：並無此標準化實證措施；長時間手術風險管理另有策略，非硬性 8 小時強制休息。","peropt":{"A":"◎ 手術安全核對表 (WHO checklist) 實證有效降低不良事件，正確。","B":"◎ 術前預防性抗生素標準化降低 SSI，正確。","C":"◎ DVT/VTE 預防措施常規應用有效，正確。","D":"錯誤（未選）。『手術超過 8 小時強制休息』並非被證實的標準安全措施。","E":"◎ 術前評估與風險分層有效降低不良事件，正確。"},"cite":"WHO Surgical Safety Checklist; Neligan 5e Patient safety","conflict":""},{"id":"9286","sub":"B7","src":"NG","years":[115],"stem":"在整形外科麻醉管理中，下列哪些藥物或方法屬於多模式止痛的常見組成成分？(複選)","opts":{"A":"單純使用嗎啡 (morphine) 靜脈注射作為唯一止痛藥","B":"乙醯胺酚 (acetaminophen/paracetamol)","C":"加巴噴汀類藥物 (gabapentinoids)，如 pregabalin 或 gabapentin","D":"局部麻醉藥區域阻斷術 (regional nerve blocks)","E":"非類固醇抗發炎藥 (NSAIDs)，如 ketorolac 或 celecoxib"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 多模式止痛 (Multimodal Analgesia) 之常見組成（複選）\n- 核心理念：以多種作用機轉藥物／技術組合，減少 opioid 用量與副作用（opioid-sparing），符合 ERAS。\n- 常見組成：\n  1. Acetaminophen / paracetamol——B 正確。\n  2. Gabapentinoids（pregabalin、gabapentin）——C 正確，抑制神經病理性與術後疼痛。\n  3. Regional nerve blocks / 局部麻醉區域阻斷（如 TAP block、PECS block）——D 正確。\n  4. NSAIDs（ketorolac、celecoxib）——E 正確。\n- A 錯誤：『單用嗎啡靜脈注射』為 opioid monotherapy，正是多模式止痛欲避免的做法。","peropt":{"A":"錯誤（未選）。單純嗎啡靜脈注射為單一 opioid 療法，與多模式止痛精神相反。","B":"◎ Acetaminophen/paracetamol 為多模式止痛常見成分，正確。","C":"◎ Gabapentinoids（pregabalin/gabapentin），正確。","D":"◎ 局部麻醉區域阻斷（regional nerve blocks），正確。","E":"◎ NSAIDs（ketorolac/celecoxib），正確。"},"cite":"Neligan 5e / ERAS protocols; Multimodal analgesia in plastic surgery","conflict":""},{"id":"9287","sub":"B4","src":"NG","years":[115],"stem":"關於 skin graft recipient bed，下列哪一種情況最不適合直接進行傳統皮膚移植？","opts":{"A":"健康肉芽組織（healthy granulation tissue）","B":"血供良好的肌肉表面","C":"保留 paratenon 的肌腱表面","D":"完整筋膜（fascia）表面","E":"裸露且無 periosteum 的 cortical bone"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 皮膚移植受床 (Recipient Bed)：最不適合直接移植者\n- 傳統 skin graft 存活賴 recipient bed 的血管供應（imbibition→inosculation→revascularization），故受床須有足夠 vascularity。\n- 適合直接移植：健康 granulation tissue、有血供的肌肉、保留 paratenon 的肌腱、有完整 fascia/血供組織。\n- 『無血管』表面不適合直接植皮，經典四大禁忌：\n  1. 裸露且無 periosteum 的 cortical bone（皮質骨）。\n  2. 無 paratenon 的裸露肌腱。\n  3. 無 perineurium 的裸露神經。\n  4. 無軟骨膜的裸露軟骨、放射照射後組織。\n- 故『裸露且無 periosteum 的 cortical bone』最不適合，需皮瓣覆蓋或先促肉芽。","peropt":{"A":"適合。健康肉芽組織血供佳，可直接植皮。","B":"適合。血供良好的肌肉表面為理想受床。","C":"適合。保留 paratenon 的肌腱表面可支持植皮存活。","D":"適合。完整（有血供）筋膜表面可植皮。","E":"◎ 正解。裸露且無 periosteum 的 cortical bone 無血供，最不適合直接植皮。"},"cite":"Grabb & Smith 9e Skin grafts; recipient bed requirements","conflict":""},{"id":"9288","sub":"B4","src":"NG","years":[115],"stem":"關於 split-thickness skin graft（STSG）與 full-thickness skin graft（FTSG）的比較，下列何者正確？","opts":{"A":"STSG 的 primary contraction 通常比 FTSG 明顯","B":"FTSG 通常具有較少 secondary contraction 與較佳質地，但需要較佳 recipient bed vascularity","C":"STSG donor site 通常必須 primary closure","D":"FTSG 較適合用於大面積且可 mesh expansion 的燒傷傷口","E":"在血液供應較差的傷口，FTSG 通常比 STSG 更容易 take"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 STSG vs FTSG 比較\n- Primary contraction（移植當下彈性回縮，因 dermis 內 elastin）：dermis 越厚回縮越明顯，故 FTSG > STSG（A 錯，因其稱 STSG 較明顯）。\n- Secondary contraction（癒合期 myofibroblast 收縮）：dermis 越厚抑制越強，故 FTSG < STSG（FTSG secondary contraction 較少）——B 正確。\n- FTSG 含完整真皮，質地、色澤、耐用度較佳，功能與外觀要求高處適用，但代謝需求高，需『較佳 recipient bed vascularity』才易 take——B 正確。\n- STSG donor site 靠 epidermal appendages 上皮化，通常不需 primary closure（C 錯）。\n- 大面積可 mesh 者用 STSG（D 錯，FTSG 不 mesh）。\n- 血供差傷口 STSG 較 FTSG 易 take（E 錯）。","peropt":{"A":"錯誤。Primary contraction FTSG 較 STSG 明顯（dermis 越厚回縮越多），非 STSG 較明顯。","B":"◎ 正解。FTSG 較少 secondary contraction、質地較佳，但需較佳受床血供。","C":"錯誤。STSG donor site 靠上皮化癒合，通常不需 primary closure。","D":"錯誤。大面積可 mesh 者用 STSG，非 FTSG。","E":"錯誤。血供差的傷口 STSG 比 FTSG 更易 take。"},"cite":"Grabb & Smith 9e Skin grafts; STSG vs FTSG contraction","conflict":""},{"id":"9289","sub":"B4","src":"NG","years":[115],"stem":"關於 cartilage 及 cartilage graft，下列何者最正確？","opts":{"A":"成熟軟骨主要依賴血管直接灌流取得營養","B":"所有 cartilage graft 均需帶有皮膚島才能存活","C":"軟骨是軟骨細胞(chondrocytes)加上extracellular matrices (ECM) of type III collagen fibers, proteoglycans, and elastic fibers 所組成","D":"軟骨本身相對無血管，營養主要仰賴擴散作用","E":"hyaline cartilage 不含 collagen matrix"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 軟骨 (Cartilage) 與軟骨移植的營養機制\n- 成熟軟骨為 avascular（無血管）、無淋巴、無神經；chondrocytes 位於 lacunae，營養主要靠 diffusion（擴散）通過 ECM——D 正確。\n- ECM 組成：hyaline cartilage 主要為 type II collagen（非 type III）、proteoglycans（aggrecan）、水分；elastic cartilage 另含 elastic fibers。\n- 因無血管、代謝率低、免疫原性低，cartilage graft 存活佳、吸收少，常用於鼻、耳重建。\n- 破除迷思：軟骨非靠血管直接灌流（A 錯）；不一定需皮膚島（B 錯）；C 敘述將主要膠原寫成 type III 有誤（透明軟骨為 type II）；hyaline cartilage 確含 collagen matrix（E 錯）。","peropt":{"A":"錯誤。成熟軟骨無血管，非依賴血管直接灌流。","B":"錯誤。並非所有 cartilage graft 都需皮膚島才能存活。","C":"錯誤。透明軟骨主要為 type II collagen，非 type III collagen fibers。","D":"◎ 正解。軟骨相對無血管，營養主要仰賴擴散作用。","E":"錯誤。Hyaline cartilage 含 collagen matrix（type II）。"},"cite":"Grabb & Smith 9e Cartilage grafts; cartilage biology","conflict":""},{"id":"9290","sub":"B6","src":"NG","years":[112,115],"stem":"Sunderland classification 中，若神經僅為 conduction block，axon 與 connective tissue framework 仍完整，最符合下列何者？","opts":{"A":"First-degree injury（neurapraxia）","B":"Second-degree injury","C":"Third-degree injury","D":"Fourth-degree injury","E":"Fifth-degree injury"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 Sunderland 神經損傷分類——First-degree (Neurapraxia)\n- Seddon 與 Sunderland 對應：\n  • Sunderland 1 = Seddon neurapraxia：僅 conduction block，axon 與所有結締組織（endo/peri/epineurium）完整，多為局部脫髓鞘，預後佳、可完全恢復，無 Wallerian degeneration。\n  • Sunderland 2 = axonotmesis：axon 斷裂但 endoneurium 完整，發生 Wallerian degeneration，可沿原管道再生。\n  • Sunderland 3：endoneurium 破壞、perineurium 完整（恢復不完全）。\n  • Sunderland 4：僅 epineurium 完整（neuroma-in-continuity，多需手術）。\n  • Sunderland 5 = neurotmesis：神經完全斷裂，需手術修復。\n- 題幹『僅 conduction block、axon 與結締組織完整』＝ First-degree / neurapraxia。","peropt":{"A":"◎ 正解。First-degree（neurapraxia）：僅傳導阻滯，軸突與結締組織架構完整。","B":"錯誤。Second-degree（axonotmesis）軸突已斷裂並發生 Wallerian degeneration。","C":"錯誤。Third-degree 有 endoneurium 破壞。","D":"錯誤。Fourth-degree 僅 epineurium 完整。","E":"錯誤。Fifth-degree（neurotmesis）為神經完全斷裂。"},"cite":"Neligan 5e Vol.6 Peripheral nerve; Sunderland classification","conflict":"⚠ 同題歷屆重出：Sunderland分級中conduction block(axon與結締組織完整)＝first-degree(neurapraxia)、可自行恢復。112年(9230)以『Degree I』選項答C、115年(9290)以『First-degree(neurapraxia)』選項答A，同考點不同措辭重排。"},{"id":"9291","sub":"B6","src":"NG","years":[115],"stem":"周邊神經完全斷裂後，若經適當 mobilization 仍無法達成 tension-free end-to-end repair，較適當的處置為何？","opts":{"A":"強行直接縫合以縮短再生距離","B":"只縫合 epineurium，不處理張力問題","C":"使用 interposition nerve graft 進行橋接","D":"單純結紮兩端避免 neuroma","E":"延後數年後再評估重建"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 神經缺損無法無張力縫合：Interposition Nerve Graft\n- 神經修復首要原則：tension-free coaptation。張力會缺血、纖維化、影響軸突再生，惡化預後。\n- 若經 mobilization、關節姿勢調整後仍無法無張力端對端縫合，代表有 gap，應以橋接方式重建：\n  • Interposition nerve graft（如 sural nerve autograft）為經典選擇。\n  • 其他現代選項：nerve conduit（短缺損）、processed nerve allograft、nerve transfer 等。\n- 錯誤選項：強行縫合（張力過大失敗）、忽略張力、單純結紮（形成 neuroma、無功能）、延後數年（錯過再生黃金期）。","peropt":{"A":"錯誤。強行直接縫合造成張力過大，纖維化與缺血，預後差。","B":"錯誤。只縫 epineurium 不解決張力，仍會失敗。","C":"◎ 正解。使用 interposition nerve graft（如 sural nerve）無張力橋接缺損。","D":"錯誤。單純結紮兩端無法恢復功能，且形成 neuroma。","E":"錯誤。延後數年將錯過神經再生與運動終板存活的時間窗。"},"cite":"Neligan 5e Vol.6 Nerve repair and grafting; tension-free principle","conflict":""},{"id":"9292","sub":"B5","src":"NG","years":[115],"stem":"關於 microsurgery 中 vasospasm 的處理，下列何者較正確？","opts":{"A":"持續粗暴牽拉血管可解除 vasospasm","B":"低溫沖洗比溫熱沖洗更能促進血流","C":"可採取溫熱沖洗、減少刺激及局部血管擴張劑等方式處理","D":"一旦 vasospasm 發生，代表吻合必定失敗","E":"應常規以血管夾長時間夾住吻合口近端來解除痙攣"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 顯微手術中血管痙攣 (Vasospasm) 的處理\n- Vasospasm 常見誘因：機械刺激、乾燥、低溫、疼痛、交感興奮、局部藥物。\n- 正確處置（多管齊下）：\n  1. Warm irrigation（溫熱沖洗，非低溫）促進血管擴張。\n  2. 減少對血管的機械刺激與牽拉、保持濕潤與適當灌流壓。\n  3. 局部 vasodilators：lidocaine、papaverine、verapamil、nitroglycerin 等。\n  4. 維持病人體溫、容積與止痛（減少交感興奮）。\n- 破除迷思：粗暴牽拉、低溫沖洗會惡化痙攣；vasospasm 未必等於吻合失敗；不應長時間血管夾夾住吻合口。","peropt":{"A":"錯誤。粗暴牽拉血管會加重 vasospasm 與內膜損傷。","B":"錯誤。低溫沖洗會惡化痙攣；應用溫熱沖洗。","C":"◎ 正解。溫熱沖洗、減少刺激、局部血管擴張劑等多管齊下處理。","D":"錯誤。Vasospasm 發生不代表吻合必定失敗，多可處置緩解。","E":"錯誤。不應以血管夾長時間夾住吻合口，會加重缺血與內膜傷害。"},"cite":"Neligan 5e Vol.1 Microsurgery; management of vasospasm","conflict":""},{"id":"9293","sub":"B8","src":"NG","years":[115],"stem":"關於 acellular dermal matrix（ADM）在重建手術中的應用，下列何者正確？","opts":{"A":"ADM 不會發生感染或 seroma","B":"ADM 可作為 biologic scaffold，並常用於 implant-based breast reconstruction 的額外覆蓋或支撐","C":"ADM 只能用於乾淨手術，不能用於任何污染傷口","D":"ADM 會完全阻止宿主細胞與血管長入","E":"ADM 已完全取代所有自體組織重建"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 去細胞真皮基質 (Acellular Dermal Matrix, ADM)\n- ADM 為去除細胞成分保留 ECM（collagen、elastin）之 biologic scaffold，來源可為 human（AlloDerm）、porcine、bovine。\n- 機轉：提供支架讓宿主 cell repopulation、angiogenesis、collagen 整合（并非阻止細胞血管長入，D 錯）。\n- 主要應用：implant-based breast reconstruction（下極覆蓋、支撐 inferolateral pole、控制 implant position）、腹壁疝氣重建、頭頸重建等——B 正確。\n- 併發症：仍可能 seroma、感染、red breast syndrome、外露（A 錯，並非不會感染/積液）。\n- 污染傷口：部分 biologic mesh 可用於 contaminated/CDC class II–III（C 過度絕對，錯）；ADM 為輔助，未取代自體重建（E 錯）。","peropt":{"A":"錯誤。ADM 仍可能發生 seroma 與感染。","B":"◎ 正解。ADM 為 biologic scaffold，常用於植入物乳房重建的覆蓋與支撐。","C":"錯誤。ADM 並非只能用於乾淨手術，部分生物性材料可用於污染傷口。","D":"錯誤。ADM 允許宿主細胞與血管長入（revascularization），非完全阻止。","E":"錯誤。ADM 未取代所有自體組織重建，為輔助角色。"},"cite":"Neligan 5e Vol.5 Breast reconstruction; ADM in implant-based reconstruction","conflict":""},{"id":"9294","sub":"B4","src":"NG","years":[115],"stem":"關於 split-thickness skin graft（STSG），下列哪些敘述正確？(複選)","opts":{"A":"donor site 主要藉由殘存 epidermal appendages 重新上皮化","B":"較薄的 STSG 通常較容易 take，且 donor site 癒合較快","C":"較厚的 STSG 通常 secondary contraction 較少","D":"meshing 可增加覆蓋面積，並有助於血液或滲液引流","E":"STSG donor site 一律需 primary closure"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 分層皮膚移植 (STSG)（複選）\n- STSG 含 epidermis 加部分 dermis；donor site 保留 dermal 內 epidermal appendages（毛囊、皮脂腺、汗腺），由其上皮化 (re-epithelialization) 癒合——A 正確。\n- 較薄 STSG：代謝需求低、易 take，donor site 因保留較多 appendages，癒合較快——B 正確。\n- 較厚 STSG：含較多 dermis → secondary contraction 較少、質地較佳（但 take 較難、donor site 癒合較慢）——C 正確。\n- Meshing：擴大覆蓋面積、允許血液/滲液引流、貼合不規則傷面——D 正確。\n- E 錯：STSG donor site 一般靠上皮化自癒，並非『一律需 primary closure』。","peropt":{"A":"◎ Donor site 藉殘存 epidermal appendages 重新上皮化，正確。","B":"◎ 較薄 STSG 較易 take 且 donor site 癒合較快，正確。","C":"◎ 較厚 STSG secondary contraction 較少，正確。","D":"◎ Meshing 增加覆蓋面積並利於引流，正確。","E":"錯誤（未選）。STSG donor site 靠上皮化癒合，並非一律需 primary closure。"},"cite":"Grabb & Smith 9e Skin grafts; STSG properties","conflict":""},{"id":"9295","sub":"B4","src":"NG","years":[115],"stem":"關於 full-thickness skin graft（FTSG）與 composite graft，下列哪些敘述正確？(複選)","opts":{"A":"FTSG 包含完整 dermis，常用於功能及外觀要求較高區域","B":"FTSG donor site 通常選擇可 primary closure 的部位","C":"相較於 STSG，FTSG 通常 secondary contraction 較少","D":"若 graft 包含皮膚與軟骨等多種組織，可歸類為 composite graft","E":"FTSG 可存活於無 periosteum 的裸露 cortical bone 上"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 全層皮膚移植 (FTSG) 與複合移植 (Composite Graft)（複選）\n- FTSG 含 epidermis 加完整 dermis，色澤、質地、耐用性佳、secondary contraction 少，用於臉部、手掌等功能外觀要求高處——A、C 正確。\n- Donor site 因取全層，多選可 primary closure 的部位（如 postauricular、supraclavicular、上眼瞼、腹股溝）——B 正確。\n- Composite graft：含兩種以上組織（如皮膚＋軟骨、皮膚＋脂肪），用於鼻翼等，靠周邊 imbibition，體積受限——D 正確。\n- E 錯：FTSG 代謝需求高，無法存活於無 periosteum 的裸露皮質骨（無血供受床）。","peropt":{"A":"◎ FTSG 含完整真皮，用於功能與外觀要求高的區域，正確。","B":"◎ FTSG donor site 選可 primary closure 部位，正確。","C":"◎ FTSG 相較 STSG secondary contraction 較少，正確。","D":"◎ 含皮膚與軟骨等多組織者為 composite graft，正確。","E":"錯誤（未選）。FTSG 無法存活於無 periosteum 的裸露皮質骨。"},"cite":"Grabb & Smith 9e Skin & composite grafts","conflict":""},{"id":"9296","sub":"B5","src":"NG","years":[115],"stem":"關於 microvascular anastomosis 的基本原則，下列哪些敘述正確？(複選)","opts":{"A":"吻合前應適度清除會進入管腔或影響縫合的 adventitia","B":"應避免吻合口張力、扭轉與內膜損傷","C":"血管口徑不合時，可視情況採 beveling、fish-mouth 或其他技巧調整","D":"動脈或靜脈吻合方式可依血流方向、recipient vessel 條件及重建需求選擇 end-to-end 或 end-to-side","E":"吻合前保留管腔內血塊可降低術後 thrombosis"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 顯微血管吻合 (Microvascular Anastomosis) 基本原則（複選）\n- 吻合前清除會進入管腔或干擾縫合的 adventitia（外膜），避免帶入管腔造成血栓——A 正確。\n- 避免 anastomotic tension、twisting/kinking、內膜 (intima) 損傷，三者皆為血栓與失敗主因——B 正確。\n- 口徑不合 (size mismatch) 可用 beveling、fish-mouth（斜切/魚口）、dilatation、end-to-side、sleeve 等技巧調整——C 正確。\n- 依血流方向、recipient vessel 條件與重建需求選 end-to-end 或 end-to-side——D 正確。\n- E 錯：吻合前應以肝素鹽水沖洗清除管腔血塊；保留血塊會促進 thrombosis，非降低。","peropt":{"A":"◎ 吻合前清除會進入管腔或影響縫合的 adventitia，正確。","B":"◎ 避免吻合口張力、扭轉與內膜損傷，正確。","C":"◎ 口徑不合可用 beveling、fish-mouth 等技巧調整，正確。","D":"◎ 依血流與受床條件選 end-to-end 或 end-to-side，正確。","E":"錯誤（未選）。保留管腔內血塊會增加 thrombosis，應沖洗清除。"},"cite":"Neligan 5e Vol.1 Microsurgery; principles of microvascular anastomosis","conflict":""},{"id":"9297","sub":"B4","src":"NG","years":[115],"stem":"Successful advanced skeletal reconstruction relies on a profound understanding of the biology of bone healing and the anatomic characteristics of donor sites. Regarding the mechanisms and clinical properties of non-vascularized bone grafts, vascularized bone flaps, and other specialized techniques (such as the Masquelet technique), which of the following statements are correct? (複選)","opts":{"A":"Autologous non-vascularized cortical bone grafts heal primarily through a process known as \"creeping substitution,\" an osteoconductive process involving the gradual resorption of necrotic bone with subsequent deposition of new bone.","B":"The Masquelet technique is a two-stage reconstruction approach. The first stage involves the insertion of a cement spacer. In the second stage, this membrane cavity is packed with autologous cancellous bone.","C":"To preserve the potential for longitudinal growth after pediatric bone tumor resection, a vascularized epiphyseal transfer from the proximal fibula can be used. The blood supply to this proximal epiphysis is predominantly provided by branches of the peroneal artery.","D":"The medial femoral condyle (MFC) flap is based on the descending genicular artery and provides a thick periosteum with significant osteogenic properties.","E":"According to the FDA, a fracture that has not healed for more than three months, and does not show any signs of healing for one consecutive month, is defined as a \"non-union\" and mandates reconstruction with a vascularized bone flap."},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯 骨癒合生物學、血管化骨瓣與 Masquelet 技術（複選）\n- A 正確：非血管化 cortical bone graft 主要靠『creeping substitution（爬行替代）』癒合——為 osteoconductive 過程，破骨細胞逐步吸收壞死骨、成骨細胞沉積新骨；cortical graft 早期以吸收為主、力學暫時變弱。\n- B 正確：Masquelet（induced membrane）為兩階段——第一階段清創後置入 cement (PMMA) spacer 誘導形成生物膜（富含 VEGF、BMP-2、成長因子）；第二階段取出 spacer，保留誘導膜腔，填入自體 cancellous bone。\n- D 正確：Medial femoral condyle (MFC) flap 以 descending genicular artery 為蒂，提供富含成骨性的厚 periosteum（corticoperiosteal flap），用於難癒合／小骨缺損。\n- C 錯誤：近端腓骨 (proximal fibula) vascularized epiphyseal transfer 的骨骺血供主要來自 anterior tibial artery（經 anterior tibial recurrent / 環繞分支），非 peroneal artery。\n- E 錯誤：FDA non-union 定義為骨折至少 9 個月未癒合且連續 3 個月無癒合跡象（非『3 個月＋連續 1 個月』），且未『強制』一律以血管化骨瓣重建（依缺損大小與條件選擇）。","peropt":{"A":"◎ 非血管化皮質骨移植靠 creeping substitution（osteoconductive）癒合，正確。","B":"◎ Masquelet 兩階段：先置 cement spacer，第二階段於誘導膜腔填入自體 cancellous bone，正確。","C":"錯誤（未選）。近端腓骨骨骺血供主要來自 anterior tibial artery，非 peroneal artery。","D":"◎ MFC flap 以 descending genicular artery 為蒂，提供富成骨性的厚 periosteum，正確。","E":"錯誤（未選）。FDA non-union 為 ≥9 個月未癒合且連續 3 個月無癒合跡象，且非強制以血管化骨瓣重建。"},"cite":"Neligan 5e Vol.1 Bone healing / Vol.4 vascularized bone flaps; Masquelet technique; MFC flap","conflict":""}];
const LS='bas_all_v3', LSv2='bas_all_v2', LSv1='bas_all_v1';
const SUBS={"B1":"傷口癒合生理（癒合期別/膠原/生長因子/myofibroblast/contraction/慢性傷口分類/傷口環境/NPWT）","B2":"疤痕與蟹足腫（hypertrophic scar vs keloid/Vancouver scar scale/疤痕治療與預防/contracture vs contraction）","B3":"皮瓣學原理（Mathes-Nahai肌肉血供分類/perforator/angiosome/delay phenomenon/random vs axial/Z-plasty/組織擴張）","B4":"移植物基礎（skin graft/bone/cartilage/fat graft/composite graft/graft take與存活生理）","B5":"顯微手術與抗凝（microvascular anastomosis/patency/thrombosis/free flap monitoring/anticoagulant/DVT-VTE）","B6":"周邊神經基礎（Sunderland/Seddon分級/Wallerian變性/神經再生/neuroma/nerve graft/conduit）","B7":"局部麻醉與手術安全（local anesthetic/lidocaine毒性/tumescent/opioid/sedation/抽脂安全/病人安全）","B8":"生物材料·組織工程·再生醫學·基因治療（biomaterial/silicone/ADM/suture/scaffold/stem cell/ASC/tissue engineering/gene delivery）","B9":"腫瘤學·放射線·移植免疫基礎（tumor biology/lymph node/癌症治療/radiation toxicity/transplant immunology/VCA/rejection）","B10":"倫理·病人安全·心理·溝通（醫學/廣告倫理·informed consent·病人安全·BDD·difficult patient·術後溝通·心理評估）","B11":"實證·統計·研究方法·科技·經營（EBM·statistics·PICOS/study design·臨床攝影photography·robotics·telemedicine·simulation·FDA·商業經營·醫學史）"};
const SUBORDER=Object.keys(SUBS);
const DIDX={};DATA.forEach((q,i)=>DIDX[q.id]=i+1);
const DAY=864e5;
// ===== FSRS-6 排程 =====
const FW=[0.212,1.2931,2.3065,8.2956,6.4133,0.8334,3.0194,0.001,1.8722,0.1666,0.796,1.4835,0.0614,0.2629,1.6483,0.6014,1.8729,0.5425,0.0912,0.0658,0.1542];
const REQ_R=0.90;                 // 目標記憶留存率
const DECAY=-FW[20], FACTOR=Math.pow(0.9,1/DECAY)-1;
const MASTERED_S=21;              // 穩定度≥21天視為「已掌握」
const clampD=d=>Math.min(10,Math.max(1,d));
const clampS=s=>Math.min(36500,Math.max(0.01,s));
const initS=G=>clampS(FW[G-1]);
const initD=G=>clampD(FW[4]-Math.exp(FW[5]*(G-1))+1);
function nextD(D,G){let d=D-FW[6]*(G-3)*(10-D)/9;const d0e=FW[4]-Math.exp(FW[5]*3)+1;return clampD(FW[7]*d0e+(1-FW[7])*d);}
const retr=(t,S)=>Math.pow(1+FACTOR*t/S,DECAY);
const interval=S=>Math.max(1,Math.round((S/FACTOR)*(Math.pow(REQ_R,1/DECAY)-1)));
function sRecall(D,S,R,G){const hard=G===2?FW[15]:1,easy=G===4?FW[16]:1;return clampS(S*(Math.exp(FW[8])*(11-D)*Math.pow(S,-FW[9])*(Math.exp(FW[10]*(1-R))-1)*hard*easy+1));}
function sForget(D,S,R){return clampS(FW[11]*Math.pow(D,-FW[12])*(Math.pow(S+1,FW[13])-1)*Math.exp(FW[14]*(1-R)));}
function sShort(S,G){return clampS(S*Math.exp(FW[17]*(G-3+FW[18]))*Math.pow(S,-FW[19]));}
// 依「作答對錯＋信心度」推導 FSRS 評級：錯=Again(1)；對+沒把握=Hard(2)；對+普通=Good(3)；對+有把握=Easy(4)
function gradeOf(ok,conf){return !ok?1:(conf==='l'?2:(conf==='h'?4:3));}
function fsrsReview(p,G,now){
  if(!p||p.S===undefined){const S=initS(G),D=initD(G);return {D,S,reps:1,lapses:G===1?1:0,last:now,due:now+interval(S)*DAY};}
  const t=Math.max(0,(now-(p.last||now))/DAY),R=retr(t,p.S);
  const D=nextD(p.D,G);let S;
  if(G===1)S=sForget(p.D,p.S,R);
  else if(t<1)S=sShort(p.S,G);
  else S=sRecall(p.D,p.S,R,G);
  return {D,S,reps:(p.reps||0)+1,lapses:(p.lapses||0)+(G===1?1:0),last:now,due:now+interval(S)*DAY};
}
// 舊 schema {n,s,m,f,w,due} → v3
function migrateEntry(op){
  const SRlegacy=[1,3,7,16,30];
  const seedS=op.w?1:SRlegacy[Math.min(op.s||0,4)];
  return {D:5,S:seedS,reps:op.n||1,lapses:op.w?1:0,last:Date.now(),due:op.due||Date.now()+seedS*DAY,
    f:(op.f!==undefined?op.f:null),n:op.n||1,postC:0,postN:0,conf:null,w:!!op.w};
}
function normalizeP(P){for(const id in P){const e=P[id];if(e&&e.S===undefined&&(e.s!==undefined||e.n!==undefined))P[id]=migrateEntry(e);}return P;}

let S={P:{},star:{},note:{},last:null,shuffle:true};

function load(){

  // 自 v2(固定間隔模型)遷移 → FSRS，保留 star/note
  try{if(!Object.keys(S.P).length){const r2=localStorage.getItem(LSv2);if(r2){const o=JSON.parse(r2);const op=o.P||{};for(const id in op)S.P[id]=migrateEntry(op[id]);S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}}catch(e){}
  // 自 v1(status模型)遷移
  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}

const postAcc=()=>{let c=0,n=0;for(const k in S.P){c+=S.P[k].postC||0;n+=S.P[k].postN||0;}return n?Math.round(c/n*100):null;};

const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!mastered(S.P[id]));
const dueIds=()=>{const n=Date.now();return Object.keys(S.P).filter(id=>S.P[id].due&&S.P[id].due<=n);};

function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}
const TYPES=['盲區','死穴','新錯','易忘'];

function wrongTypeCounts(){const c={盲區:0,死穴:0,新錯:0,易忘:0};wrongActiveIds().forEach(id=>{const t=wrongType(S.P[id]);if(t)c[t]++;});return c;}

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(mastered(p))m++;if(p.w&&!mastered(p))w++;}}
  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='wrongtype'){const w=new Set(wrongActiveIds().filter(id=>wrongType(S.P[id])===curType));pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,wrongtype:'錯題 '+curType,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();hideConfidence();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
