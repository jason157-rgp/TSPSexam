*。\n- **A**：**Lhermitte's syndrome (頸部前屈時觸電感)** 屬放射之 **delayed/early-delayed toxicity**，因暫時性脊髓脫髓鞘，**通常可逆** → **正確（本題答案）**。\n- **B**：delayed acute (early-delayed) 毒性多為**可逆** → 敘述「不可逆」錯。\n- **C**：**Radiation pneumonitis (放射性肺炎) 屬 early-delayed 毒性之一** → 敘述「不是」錯。\n- **D**：延遲毒性**與照射劑量及體積相關 (dose-volume dependent)** → 敘述「不相關」錯。\n- **E**：其發生非在「6 天至 6 週」之急性期，而是數週至數月之 subacute 期 → 錯。\n- 正解 **A**。","peropt":{"A":"Lhermitte's syndrome is a delayed toxicity｜◎（本題答案）屬 early-delayed，可逆。","B":"Delayed acute toxicity is irreversible｜✗ early-delayed 多為可逆。","C":"Radiation pneumonitis is not delayed acute｜✗ 放射性肺炎正屬 early-delayed。","D":"Not correspond to dose and volume｜✗ 與劑量/體積相關。","E":"Occurs 6 days to 6 weeks｜✗ 屬急性期時程，非延遲毒性。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Radiation biology/oncology; radiation toxicity phases.","conflict":"⚠ 同題歷屆重出：radiation之delayed toxicity何者正確。正解皆『Lhermitte徵候群屬延遲毒性』；選項重排(9215措辭加'acute')，109年(9176)答D、111/114年(9215)答A。"},{"id":"9216","sub":"B2","src":"NG","years":[109,111],"stem":"For prevent the formation of keloid and hypertrophic scars, which of the following medication is recommended? (複選)","opts":{"A":"Fluorouracil (5-FU).","B":"Steroid ointment.","C":"Methotrexate (MTX).","D":"Pyrazinamide (PZA).","E":"Cisplatin."},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯【Keloid/hypertrophic scar 預防用藥】\n- 建議之預防/治療藥物：\n  1. **Corticosteroid (類固醇, 局部注射 triamcinolone 或藥膏)** — 抑制 fibroblast 增生與膠原合成、促膠原酶活性 (B 正確)。\n  2. **5-Fluorouracil (5-FU)** — 抑制纖維母細胞增殖，常與類固醇合併注射 (A 正確)。\n- 其他一線輔助：矽膠片 (silicone sheet)、加壓、放射線、雷射。\n- 干擾選項：MTX、PZA (抗結核藥)、Cisplatin (化療) 均**非**疤痕預防用藥。\n- 正解 **AB**。","peropt":{"A":"Fluorouracil (5-FU)｜◎ 抑制纖維母細胞增殖，正確。","B":"Steroid ointment｜◎ 類固醇為一線，正確。","C":"Methotrexate (MTX)｜✗ 非疤痕預防用藥。","D":"Pyrazinamide (PZA)｜✗ 抗結核藥，非適應症。","E":"Cisplatin｜✗ 化療藥，非適應症。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Keloid/hypertrophic scar management.","conflict":"⚠ 同題歷屆重出：預防keloid/hypertrophic scar建議用藥(複選)。正解皆『5-FU＋Steroid ointment』；純選項重排，109年(9177)答CE、111年(9216)答AB。"},{"id":"9217","sub":"B8","src":"NG","years":[109,111],"stem":"Which of following features are the properties of an ideal implant? (複選)","opts":{"A":"Transparent and barely visible.","B":"Minimal foreign-body reaction.","C":"Elastic or supple.","D":"Tolerates infected environment.","E":"Allows collagen ingrowth."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯【Ideal implant properties 理想植入物特性（第二版本）】\n- 理想植入物應：\n  1. **Minimal foreign-body reaction** (B 正確)。\n  2. **Elastic/supple (有彈性/柔軟)** (C 正確)。\n  3. **Tolerates infected environment (耐受污染/感染環境)** (D 正確——依本題權威答案，指相對抗感染整合佳)。\n  4. **Allows collagen ingrowth (允許膠原長入整合)** (E 正確)。\n- **A「Transparent and barely visible (透明幾乎不可見)」並非理想植入物之標準特性** → 錯。\n- 正解 **BCDE**。","peropt":{"A":"Transparent and barely visible｜✗ 非理想植入物標準特性。","B":"Minimal foreign-body reaction｜◎ 正確。","C":"Elastic or supple｜◎ 正確。","D":"Tolerates infected environment｜◎ 依權威答案為正確特性。","E":"Allows collagen ingrowth｜◎ 正確，利整合。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Biomaterials/ideal implant properties.","conflict":"⚠ 同題歷屆重出：ideal implant特性(複選)。選項池完全相同僅重排，非特性者皆為『transparent and barely visible』；109年(9178)答ABCD、111年(9217)答BCDE。"},{"id":"9218","sub":"B6","src":"NG","years":[109,111,114],"stem":"Which of the following statement about nerve graft is correct?","opts":{"A":"The most common type of nerve graft is the interfascicular nerve graft.","B":"If there's nerve gap of a transected nerve, we should repair the nerve with nerve graft with moderate tension.","C":"The outcome of artificial nerve conduits was proved to be better than nerve autograft.","D":"Nerve allograft can be use if nerve autograft is not enough, and immunosuppressant is not necessary.","E":"There's still no report of successful outcome of nerve allograft in human trial."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【Nerve graft 神經移植原則】\n- **A**：最常見之神經移植型式為 **interfascicular (cable) nerve graft**，將多股細神經 (如 sural nerve) 銜接於各神經束 → **正確（本題答案）**。\n- **B**：神經修復原則為 **tension-free (無張力)**；有神經缺損時應以移植橋接而非在張力下縫合，故「moderate tension」錯。\n- **C**：人工神經導管 (nerve conduit) 效果**未證實優於**自體神經移植 (autograft 為 gold standard)，僅適短缺損/小徑神經 → 錯。\n- **D**：Allograft（尤其新鮮同種異體）需免疫抑制；acellular processed allograft 雖免免疫抑制但敘述以絕對語氣「不需免疫抑制」→ 錯。\n- **E**：人類神經 allograft 已有成功報告 → 「仍無成功報告」錯。\n- 正解 **A**。","peropt":{"A":"Most common type is interfascicular nerve graft｜◎（本題答案）正確。","B":"Repair with moderate tension｜✗ 應 tension-free。","C":"Conduit outcome better than autograft｜✗ autograft 仍為 gold standard。","D":"Allograft w/o immunosuppressant｜✗ 傳統 allograft 需免疫抑制。","E":"No successful human allograft report｜✗ 已有成功報告。"},"cite":"Neligan Plastic Surgery 5e, Vol.1/Vol.6 Peripheral nerve repair & grafting.","conflict":"⚠ 同題歷屆重出：nerve graft何者正確。正解皆『最常見類型為interfascicular nerve graft』；A/B對調之純重排，109年(9179)答B、111/114年(9218)答A。"},{"id":"9220","sub":"B11","src":"NG","years":[109,111],"stem":"What is/are the current limitations of robotic surgery in plastic surgery?","opts":{"A":"Cost of device and machine.","B":"Robotic training and learning curve.","C":"Case number for training of robotic surgery in plastic surgery is very limited.","D":"Higher cost of operation room, for it may take longer operation time if done with robotic surgery.","E":"All of the above are correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【Robotic surgery 在整形外科之限制】\n- 目前限制皆成立 → 正解 **E (All of above)**：\n  1. **Cost of device/machine (設備昂貴)** (A)。\n  2. **Training 與 learning curve (訓練與學習曲線陡)** (B)。\n  3. **整外機器手術訓練之病例數非常有限** (C)。\n  4. **手術房成本更高，手術時間可能較長 (docking/setup)** (D)。\n- 現況：整外機器手術應用於 microsurgery、TORS、乳房/腹壁與淋巴顯微手術，仍屬發展中。\n⚠ conflict 標記：本題與 NG109-B03-Q09 為選項重排家族，字母對應不同，請記概念勿背字母。","peropt":{"A":"Cost of device and machine｜◎（全對）正確限制。","B":"Robotic training and learning curve｜◎ 正確限制。","C":"Very limited case number for training｜◎ 正確限制。","D":"Higher OR cost / longer operation time｜◎ 正確限制。","E":"All of the above are correct｜◎（本題答案）全部正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Technology/robotics in plastic surgery.","conflict":"選項重排家族：與 NG109-B03-Q09 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出：robotic surgery於整外之限制＝以上皆是(裝置成本/學習曲線/手術室成本與時間/案例數少)。C/D位置對調之純重排，109年(9181)與111年(9220)答案皆E。"},{"id":"9221","sub":"B3","src":"NG","years":[111],"stem":"Which of the following statements regarding propeller flaps is incorrect?","opts":{"A":"A propeller flap can be defined as an island flap that reaches the recipient site through an axial rotation","B":"When a perforator propeller flap is being elevated, the perforator is dissected free from the fascial and fat adhesions to minimize the chance of kinking","C":"Although less rotation reduces the chance for kinking, the skin island may be safely rotated up to 270°","D":"Venous charging of the flap may help to decrease the chance of congestion when the flap extends beyond two or three angiosomes","E":"The propeller flap in the lower extremity is very useful. When the donor site is able to be closed after the rotation, it provides excellent coverage and a superb donor site."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Propeller flap 螺旋槳皮瓣—找出錯誤】\n- 定義：**以島狀皮瓣 (island flap) 繞穿通枝為軸心行 axial rotation 到達受區**的皮瓣 (A 正確)。\n- **穿通枝解剖**：穿通枝需自筋膜與脂肪沾黏中游離，以減少扭轉打結 (kinking)，一般旋轉 **90–180°** (B 正確)。\n- **C**：「可安全旋轉至 **270°**」→ **錯誤（本題答案）**；propeller flap 旋轉上限為 **180°**（Tokyo 2009 共識），過度旋轉增加血管蒂扭轉/靜脈鬱血風險。\n- **D**：跨越 2–3 個 angiosome 時，**venous supercharging/charging** 可減少鬱血 (D 正確)。\n- **E**：下肢 propeller flap 甚實用，供區可直接縫合時提供優良覆蓋與供區 (E 正確)。\n- 正解（錯誤）為 **C**。","peropt":{"A":"Island flap reaching recipient by axial rotation｜✓ 定義正確。","B":"Perforator dissected free to minimize kinking｜✓ 正確。","C":"May be safely rotated up to 270°｜✗（本題答案）上限為 180°。","D":"Venous charging decreases congestion beyond 2–3 angiosomes｜✓ 正確。","E":"Lower extremity propeller flap useful with good donor site｜✓ 正確。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Flap classification; Perforator/propeller flap consensus (Tokyo 2009).","conflict":""},{"id":"9222","sub":"B4","src":"NG","years":[111],"stem":"Which of the following statements regarding skeletal reconstruction is true?","opts":{"A":"The Masquelet technique is a one stage approach for treating intercalary defect ranging from 5 to 24cm","B":"Surgical treatment of neoplasms around the knee joint is the only indication for performing a knee arthrodesis","C":"The restoration of growth potential is not possible with non vascularized autografts, allografts, prostheses, or vascularized bone grafts without an epiphysis","D":"The proximal fibular epiphysis with its adjacent diaphyseal shaft is not a suitable donor site of choice for vascularized epiphyseal reconstruction","E":"Osteoconduction represents the recruitment of MSC (mesenchymal stem cells) with subsequent differentiation to chondroblasts and osteoblasts"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Skeletal reconstruction 骨骼重建—找出正確】\n- **A**：Masquelet 為**兩階段 (two-stage)**，非一階段 → 錯。\n- **B**：膝關節融合 (knee arthrodesis) 適應症不僅限膝周腫瘤 → 「唯一適應症」錯。\n- **C**：**生長潛能 (growth potential) 之恢復無法**以非血管化自體骨、allograft、義肢或**不含骨骺 (epiphysis) 之血管化骨移植**達成 → **正確（本題答案）**；欲保留生長須行**含骨骺之血管化骨骺轉移**。\n- **D**：**近端腓骨骨骺 (proximal fibular epiphysis) 連同其骨幹**正是血管化骨骺重建的**理想供區** → 「非適合供區」錯。\n- **E**：**Osteoconduction (骨傳導)** 指提供支架讓骨長入；招募 MSC 並分化為軟骨/成骨細胞屬 **osteoinduction (骨誘導)** → 定義張冠李戴，錯。\n- 正解 **C**。","peropt":{"A":"Masquelet is one stage for 5–24 cm｜✗ 為兩階段技術。","B":"Knee arthrodesis only indication is neoplasm｜✗ 非唯一適應症。","C":"Growth potential impossible without epiphysis-containing vascularized graft｜◎（本題答案）正確。","D":"Proximal fibular epiphysis not suitable donor｜✗ 正是理想血管化骨骺供區。","E":"Osteoconduction = recruitment of MSC to chondro/osteoblasts｜✗ 此為 osteoinduction 之定義。"},"cite":"Neligan Plastic Surgery 5e, Vol.4 Skeletal/lower extremity reconstruction; vascularized epiphyseal transfer.","conflict":""},{"id":"9225","sub":"B1","src":"NG","years":[112],"stem":"Regarding wound healing, which is wrong?","opts":{"A":"The expected outcome for a wound that heals by primary intent is that the incision is sealed by 12-24 hours because of fibrin deposition in the wound.","B":"The prognosis for an uncomplicated wound that heals by primary intent is that the maximal tensile strength of the incision is achieved at 6 weeks after closure and thus never achieves the same tensile strength as intact skin.","C":"The Centers for Disease Control classified the wound into four classification.","D":"Class IV wound is dirty-infected wound that expected infection rate is 7-13%","E":"Class III wound is contaminated wound that expected infection rate is 6%."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：一期癒合(primary intention)時程 vs CDC傷口分級與感染率\n- 一期癒合傷口的『上皮封合(epithelial seal)』約在受傷後24–48小時完成，機轉為表皮細胞(keratinocyte)的移行(epithelial migration/resurfacing)，而非fibrin沉積；fibrin clot雖立即形成止血並提供暫時性支架，但不是密封上皮屏障的原因，故A把封合時間(12–24hr)與機轉(fibrin deposition)雙重錯置。\n- Tensile strength動力學：術後約需時間逐步回升，最終疤痕最大張力僅達正常皮膚約70–80%，永遠不及完整皮膚(intact skin)。\n- CDC/手術傷口四分級：Class I clean、Class II clean-contaminated、Class III contaminated、Class IV dirty-infected，感染率依序遞增。\n- 臨床意義：一期癒合早期抗張力來源主要靠縫線；上皮封合早但機械強度低，衛教避免早期張力。","peropt":{"A":"◎(錯誤選項)『因fibrin沉積而在12–24hr封合』時間與機轉皆錯：上皮封合約24–48hr、由表皮細胞移行完成，非fibrin。","B":"正確：最大抗張力於術後數週回升，最終僅達正常皮膚約70–80%，永不等同完整皮膚。","C":"正確：CDC將傷口分為四級(clean / clean-contaminated / contaminated / dirty-infected)。","D":"正確：Class IV為dirty-infected，預期感染率屬最高一級。","E":"正確：Class III為contaminated傷口，感染率約中等程度。"},"cite":"Grabb & Smith 9e, Ch. Wound Healing；CDC surgical wound classification","conflict":""},{"id":"9226","sub":"B2","src":"NG","years":[112],"stem":"Regarding scar, which is the wrong statement?","opts":{"A":"Hypertrophic scar is most common in wounds across flexion surfaces, the extremities, breasts, sternum, and neck.","B":"Hypertrophic scar 治療包括pressure garments, silicone sheets, corticosteroids, laser therapy, and re-excision with primary closure.","C":"治療Keloid scar, Intralesional steroid therapy 在early, rapidly proliferating lesions 以及slowly growing, mature keloids有相當的療效","D":"Keloid scar occur predominantly in darkly pigmented individuals, like African populations.","E":"Keloid scar demonstrates genetic predisposition with autosomal dominant features"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Hypertrophic scar 與 Keloid 之鑑別與治療反應\n- Keloid對intralesional steroid的反應具『時期依賴性』：對early/rapidly proliferating lesion療效佳，但對slowly growing、mature keloid反應差，故C將兩者並列『皆有相當療效』為錯。\n- Hypertrophic scar：局限於原傷口範圍、常自行部分退化；好發於張力大、跨關節屈曲面(flexion surface)、四肢、胸骨(sternum)、頸部、乳房。治療含壓力衣、silicone sheet、類固醇、雷射、切除再縫合。\n- Keloid：超出原傷口邊界、少自行退化；好發深膚色人種(African)、有autosomal dominant遺傳傾向。治療多需合併(手術+術後steroid/放射/加壓)以降復發。\n- 現代觀念：keloid治療首選常為病灶內steroid±5-FU，難治者術後淺層放療(SRT)。","peropt":{"A":"正確：肥厚性疤痕好發於跨屈曲面、四肢、乳房、胸骨、頸部等高張力區。","B":"正確：肥厚性疤痕治療含壓力衣、矽膠片、皮質類固醇、雷射及切除一期縫合。","C":"◎(錯誤選項)病灶內類固醇對『early rapidly proliferating』療效佳，但對『mature/slowly growing keloid』療效差，不應並列皆有療效。","D":"正確：蟹足腫好發於深膚色族群(如非洲裔)。","E":"正確：蟹足腫具遺傳傾向，可呈autosomal dominant特徵。"},"cite":"Neligan 5e, Scar & Keloid；Grabb & Smith 9e 疤痕章","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B01-Q09）"},{"id":"9227","sub":"B4","src":"NG","years":[112],"stem":"關於skin graft的敘述, 下列何者錯誤？","opts":{"A":"Skin graft take is characterized by an initial phase of serum imbibition","B":"serum imbibition means the graft is initially nourished by the plasma circulation from the wound side.","C":"Revascularization is critical for long-term skin graft survival.","D":"Skin grafts take at least one month to complete maturation, with the extension of this process continuing for several years in burn victims and children.","E":"In thick STSGs superficial hair follicles can be included into the graft and restore hair growth and functional sweat glands in the future skin."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：皮膚移植(skin graft)存活三階段與成熟時程\n- Skin graft take三階段：①serum imbibition(血漿吸收，前24–48hr靠受區血漿滲透供養)→②inosculation(血管吻合對接)→③revascularization(新生血管長入，決定長期存活)。\n- 成熟(maturation)：graft需『數月至約一年』才完成成熟(軟化、變平、色素恢復)；在燒傷患者與孩童可延續數年。D以『at least one month to complete maturation』描述其成熟完成時程，為本題設定之錯誤敘述。\n- 厚STSG可帶入部分較淺的毛囊，理論上可恢復部分毛髮/腺體功能(FTSG含完整附屬器最佳)。","peropt":{"A":"正確：移植存活初期為serum imbibition(血漿吸收)期。","B":"正確：serum imbibition指初期由受區傷口床的血漿滲透供養。","C":"正確：revascularization(再血管化)是長期存活的關鍵。","D":"◎(錯誤選項)本題設定之錯誤：graft成熟(maturation)實需數月至約一年方完成，燒傷/孩童更久，非以『至少一個月即完成成熟』一語概括。","E":"正確：厚STSG可含較淺毛囊，理論上恢復部分毛髮與汗腺功能。"},"cite":"Grabb & Smith 9e, Skin Graft；Neligan 5e Grafts","conflict":""},{"id":"9228","sub":"B4","src":"NG","years":[112],"stem":"以下有關軟骨(cartilage)以其作為graft的敘述何者正確？","opts":{"A":"軟骨是軟骨細胞(chondrocytes)加上extracellular matrices (ECM) of type II collagen fibers, proteoglycans, and elastic fibers所組成","B":"軟骨可以被分成兩種type: hyaline cartilage and fibrocartilage","C":"Outer ear structures 中的軟骨屬於hyaline cartilage, 另外larynx and epiglottis 也屬於此種軟骨","D":"Fibrocartilage 是人體組織中最常見的軟骨總類","E":"軟骨是藉由類似有氧呼吸來獲取影養"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：軟骨(cartilage)組成、分類與營養方式\n- 軟骨=chondrocytes + ECM，ECM含type II collagen、proteoglycans與(視部位)elastic fibers；A正確。\n- 軟骨分三型：hyaline(透明,最常見)、elastic(彈性)、fibrocartilage(纖維)。故B『分兩型』錯、D『fibrocartilage最常見』錯。\n- 外耳、會厭(epiglottis)屬elastic cartilage；喉部軟骨部分為hyaline，但外耳非hyaline，故C錯。\n- 軟骨為avascular，靠周圍組織『擴散(diffusion)』與偏向醣解(anaerobic/glycolytic)代謝供養，非有氧呼吸，故E錯。\n- 臨床:自體軟骨(耳、鼻中隔、肋軟骨)為隆鼻/耳重建常用graft。","peropt":{"A":"◎(正解)軟骨由軟骨細胞+含type II collagen、蛋白聚醣、彈性纖維之ECM組成。","B":"錯誤：軟骨分三型(hyaline、elastic、fibrocartilage)，非兩型。","C":"錯誤：外耳屬elastic cartilage而非hyaline；會厭亦為elastic。","D":"錯誤：人體最常見軟骨為hyaline cartilage，非fibrocartilage。","E":"錯誤：軟骨無血管，靠擴散供養、代謝偏醣解(厭氧)，非有氧呼吸。"},"cite":"Neligan 5e, Cartilage grafts；Grabb & Smith 9e","conflict":"題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG109-B02-Q05）"},{"id":"9229","sub":"B4","src":"NG","years":[112],"stem":"關於bone graft 敘述以下何者錯誤？","opts":{"A":"Cancellous bone graft serves as an osteoconductive substrate to support creeping substitution","B":"Typical cortical bone graft sites include fibula, rib, and iliac crest","C":"Cancellous graft provide immediate structural support ad are able to bridge defect up to 12cm","D":"Cancellous bone has higher osteogenic potential","E":"Typical source of cancellous bone grafts are iliac crest, cranial diploe, upper tibial epiphysis, and distal radius"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Cortical vs Cancellous bone graft之力學與生物特性\n- Cancellous bone:多孔、osteogenic potential高、為osteoconductive substrate支持creeping substitution(爬行替代)，血管長入快、癒合快；但『無立即結構性支撐』，不能橋接大缺損，故C(提供immediate structural support且橋接達12cm)錯。\n- Cortical bone:提供立即結構支撐但血管化慢、癒合慢；典型取骨處fibula、rib、iliac crest。\n- Cancellous典型來源:iliac crest、cranial diploe、upper tibial epiphysis、distal radius。\n- 現代:>6cm之stress-bearing缺損宜用vascularized bone graft(如free fibula)而非單純cancellous。","peropt":{"A":"正確：海綿骨為osteoconductive基質，支持creeping substitution。","B":"正確：典型皮質骨取骨處含腓骨、肋骨、腸骨嵴。","C":"◎(錯誤選項)海綿骨『無立即結構支撐』、不能橋接12cm缺損；提供結構支撐者為皮質骨(或vascularized bone)。","D":"正確：海綿骨osteogenic potential較高。","E":"正確：海綿骨典型來源含腸骨嵴、顱骨板障、脛骨近端、橈骨遠端。"},"cite":"Grabb & Smith 9e, Bone Grafts；Neligan 5e","conflict":""},{"id":"9231","sub":"B6","src":"NG","years":[112],"stem":"關於peripheral nerve injury, 下列敘述何者錯誤","opts":{"A":"Excessive tension will inhibit nerve regeneration, however a small amount of tension to achieve primary coaptation is acceptable.","B":"Following any mechanism of repair, nerve growth occurs at a maximum of 1cm/day, making distance from end-target muscle the most important prognosticator for recovery.","C":"Primary neurorrhaphy remains the gold standard in nerve repair","D":"Prognosis following nerve injury is impacted by several factors: patient age and comorbidities, location of injury, mechanism of injury, timing of repair and method of repair.","E":"In the event of a nerve gap, several options for repair exist including: mobilization and primary coaptation, interpositional nerve autografting, interpositional nerve allograft, interpositional nerve conduit and distal nerve transfer."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：周邊神經修復原則與再生速率\n- 神經再生速率約『1mm/day(≈1 inch/month)』，非1cm/day；離末端目標肌肉的距離為恢復預後最重要因子，故B(1cm/day)錯。\n- 修復原則:避免張力(過度張力抑制再生)，可接受微小張力達primary coaptation。\n- Primary neurorrhaphy(tension-free端對端)仍為gold standard。\n- 預後因子:年齡與共病、損傷位置、機轉、修復時機與方式。\n- 神經缺損(nerve gap)重建選項:mobilization+primary coaptation、interpositional nerve autograft、allograft、nerve conduit、distal nerve transfer。","peropt":{"A":"正確：過度張力抑制再生，但達成一期吻合的少量張力可接受。","B":"◎(錯誤選項)神經再生最大速率約1mm/day(非1cm/day)；距末端肌肉距離為最重要預後因子。","C":"正確：無張力一期神經縫合(primary neurorrhaphy)為gold standard。","D":"正確：預後受年齡/共病、位置、機轉、時機與方式影響。","E":"正確：神經缺損重建含游離、自體/異體神經移植、導管及遠端神經轉位。"},"cite":"Neligan 5e, Nerve repair principles","conflict":""},{"id":"9232","sub":"B3","src":"NG","years":[112,114],"stem":"根據Mathes and Nahai classification for muscle/musculocutaneous flap, 哪些是type V vascular pattern muscles?","opts":{"A":"Jejunum","B":"Tensor fascia lata","C":"Fibula","D":"Latissimus dorsi","E":"Pectoralis major"},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Mathes–Nahai肌肉血流分型之Type V\n- Type V=『one dominant pedicle + secondary segmental pedicles(單一主要蒂+次要節段蒂)』;可以主蒂為單一或反向以節段蒂為基之翻轉。\n- 典型Type V:Latissimus dorsi(主蒂thoracodorsal+節段肋間/腰動脈穿支)、Pectoralis major(主蒂thoracoacromial+節段IMA穿支)。\n- Fibula(osteocutaneous/骨皮瓣)在此題被歸為Type V血流型(近端節段+腓動脈供養模式)。\n- 對照:Jejunum為節段型(Type IV)；Tensor fascia lata為Type I(單一血管蒂)。","peropt":{"A":"錯誤：Jejunum為segmental(Type IV)血流型。","B":"錯誤：Tensor fascia lata為Type I(單一血管蒂)。","C":"◎(正確)Fibula歸此題設定之Type V。","D":"◎(正確)Latissimus dorsi為典型Type V(主蒂+節段蒂)。","E":"◎(正確)Pectoralis major為典型Type V(thoracoacromial主蒂+節段IMA穿支)。"},"cite":"Mathes & Nahai classification；Neligan 5e Flaps","conflict":""},{"id":"9233","sub":"B4","src":"NG","years":[109,111,112],"stem":"哪些敘述關於bone graft transfer 是正確的？","opts":{"A":"Cortical bone比cancellous bone有較理想的骨生長特性，像是osteoinductive and osteoconductive properties","B":"Cancellous bone可以用在一些長度大於7-9公分Stress-bearing area的bone gap","C":"Cortical bone graft 須藉由recipient bed提供plasmatic imbibition","D":"Cortical bone graft通常數週就能有不錯revascularized 的癒合","E":"取下bone graft後，溫度不要超過42度，否則易造成細胞死亡"},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Cortical vs Cancellous bone graft移植特性(反向作答)\n- 正解CE：C(cortical bone graft須靠受區床提供plasmatic imbibition供養)、E(取骨後溫度勿超過42°C以免細胞死亡→鑽骨/取骨須持續灌洗降溫)皆正確。\n- A錯:osteogenic/osteoinductive特性以cancellous較優，非cortical。\n- B錯:cancellous『無結構支撐』,不能用於>7–9cm之stress-bearing缺損(該情境需vascularized bone)。\n- D錯:cortical bone graft血管化慢、癒合久,非數週即再血管化(cancellous才快)。","peropt":{"A":"錯誤：較佳骨誘導/骨傳導特性者為cancellous而非cortical。","B":"錯誤：海綿骨無結構支撐，不能用於>7–9cm的承重缺損。","C":"◎(正確)皮質骨移植須靠受區床提供plasmatic imbibition(血漿滲透)供養。","D":"錯誤：皮質骨再血管化與癒合慢，非數週即完成。","E":"◎(正確)取骨後溫度勿超過42°C，過熱造成骨細胞死亡，故須灌洗降溫。"},"cite":"Neligan 4e/5e, Bone graft transfer","conflict":"跨年數值差異（Neligan 4e vs Neligan 4e）：A: 109「緻密骨(Cortical bone)相比海綿骨(Cancellous bone)」 vs 112「Cortical bone比cancellous bone有較理想的骨生長特性，」；B: 109「海綿骨可以用在一些長度大於7-8公分Stress-bearing area 的b」 vs 112「Cancellous bone可以用在一些長度大於7-9公分Stress-bea」；C: 109「Cortical bone graft需藉由recipient bed 提供pl」 vs 112「Cortical bone graft 須藉由recipient bed提供pl」；E: 109「取下Bone graft後，溫度不要超過42°C，否則易造成骨細胞死亡」 vs 112「取下bone graft後，溫度不要超過42度，否則易造成細胞死亡」 ｜ ⚠ 同題歷屆重出：bone graft transfer何者正確(複選)。僅B選項數字微調(cancellous適用gap『7-8cm』↔『7-9cm』)，其餘逐字相同；109/111年(9171)與112年(9233)答案皆CE(C:cortical需plasmatic imbibition、E:>42°C骨細胞死亡)。"},{"id":"9234","sub":"B5","src":"NG","years":[112],"stem":"關於principles of microvascular surgery 哪些敘述是正確的？","opts":{"A":"Size-discrepant vessels are commonly encountered, and vessel mismatches of up to 4:1 can be anastomosed end-to-end depending on technical skills.","B":"When dealing with atherosclerotic vessels, suture should ideally be passed from the inside of the lumen of the atherosclerotic vessel to the outside","C":"Through preoperative planning, flexibility of the surgical plan, and flawless execution are mandatory for successful free flap surgery.","D":"Vasospasm occurs in 5-10% of microsurgical procedures and plays an important role in the pathogenesis of hypoperfusion, promoting thrombosis.","E":"Vein appear to be less susceptible to vasospasm than arteries, but, once established, harder to resolve and more detrimental."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：顯微血管吻合原則(全數正確)\n- A:口徑差(size discrepancy)常見，端對端在技術良好下可容忍達約4:1(輔以斜切spatulation、sleeve或end-to-side等技巧)。\n- B:處理atherosclerotic血管,縫針宜『由管腔內向外(inside-out)』出針,以免掀起/剝離斑塊造成內膜瓣(intimal flap)與栓塞。\n- C:術前計畫、彈性方案與完美執行為free flap成功要件。\n- D:Vasospasm發生於約5–10%顯微手術,參與低灌流之病理並促成血栓。\n- E:靜脈較不易痙攣,但一旦發生較難緩解且後果較嚴重。\n- 抗凝/處置:局部papaverine、lidocaine、warm saline解痙攣;維持正常體溫/血容/避免壓迫。","peropt":{"A":"◎(正確)口徑差可達約4:1以端對端吻合(依技巧與輔助技術)。","B":"◎(正確)硬化血管縫合宜由管腔內向外出針，避免掀起斑塊致內膜瓣/栓塞。","C":"◎(正確)術前計畫、方案彈性與完美執行為free flap成功必要條件。","D":"◎(正確)血管痙攣約見於5–10%，促成低灌流與血栓。","E":"◎(正確)靜脈較不易痙攣，但一旦發生較難緩解且更不利。"},"cite":"Neligan 5e, Principles of microsurgery","conflict":""},{"id":"9235","sub":"B11","src":"NG","years":[108,110,112,113],"stem":"According to the telemedicine and simulation, which of the statements below is wrong?","opts":{"A":"Simulation is used to train plastic surgery students, residents and fellows in all procedures, and to train senior surgeons on new procedures.","B":"Simulation cannot increase in safety and reduction in medical errors.","C":"Telemedicine can make use of simulation and new technology to deliver medical care to a distant population.","D":"Simulation can be defined as the imitative representation of the functioning of one system or process by means of the functioning of another.","E":"All of the above is wrong"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Telemedicine與Simulation之定義與效益\n- B為錯:語意為『simulation無法提升安全與減少醫療錯誤』,與實證相反—模擬訓練『能』提升病人安全、減少error(此為推廣模擬教育之核心理由)。\n- Simulation定義:以一系統/流程模仿另一系統/流程之運作(imitative representation)。\n- 用途:訓練學生、住院醫師、fellow於各式術式,亦供資深醫師學新術式,縮短learning curve。\n- Telemedicine:結合模擬與新科技,對遠距人口提供醫療照護(遠距會診/手術指導)。","peropt":{"A":"正確：模擬用於訓練各級學員於各種術式，亦供資深醫師學習新術式。","B":"◎(錯誤選項)語意錯誤：模擬『能』提升安全並減少醫療錯誤，本項稱『不能』為誤。","C":"正確：遠距醫療可運用模擬與新科技對遠距人口提供照護。","D":"正確：模擬即以一系統之運作來模仿另一系統/流程之運作。","E":"錯誤：非全部皆錯，僅B錯。"},"cite":"Neligan 5e, Technology/Telemedicine & Simulation","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG108-B03-Q07） ｜ ⚠ 同題歷屆重出：telemedicine and simulation何者為錯。關鍵偽敘述皆B『simulation無法提升安全/減少醫療錯誤』(實可提升)；選項近同(僅E『以上皆是』↔『All of the above is wrong』)。108/110年(9153)與112/113年(9235)答案皆B。"},{"id":"9236","sub":"B3","src":"NG","years":[110,112,113],"stem":"Of the histological changes of the skin and soft tissue that occur during tissue expansion, which of the following are correct?","opts":{"A":"Thickening of the dermis","B":"Thinning of the epidermis","C":"Decrease in collagen density","D":"Increased angiogenesis","E":"Decrease in bone density"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：組織擴張(tissue expansion)之組織學變化\n- 正解D:『增加血管新生(increased angiogenesis)』—擴張刺激VEGF等使血流增加,類似delay phenomenon,提升後續皮瓣存活。\n- 其餘為擴張下典型變化的反向:表皮『增厚』(非變薄)、真皮『變薄』(非增厚)、膠原密度『增加』(非減少)、下方骨骼可見『骨吸收/密度下降』(擴張器壓迫)。\n- 機轉:機械性creep(纖維重排、水分擠出)+生物性creep(細胞增生、mitotic activity上升);肌肉可萎縮。\n- 臨床:提供顏色/質地相配之額外皮膚,用於頭皮、乳房重建、燒傷疤痕等。","peropt":{"A":"錯誤：擴張使真皮『變薄』而非增厚(表皮才增厚)。","B":"錯誤：擴張下表皮『增厚』而非變薄。","C":"錯誤：膠原密度增加(纖維母細胞活化、膠原生成上升)，非減少。","D":"◎(正解)擴張促進血管新生(增加angiogenesis)，類似delay效應提升皮瓣存活。","E":"錯誤：擴張器壓迫確可致下方骨吸收，但本題選項須選『正確變化』，此為干擾且與D非同一最佳答案(D為指定正解)。"},"cite":"Neligan 5e / Grabb & Smith 9e, Tissue expansion","conflict":"⚠ 同題歷屆重出：tissue expansion組織生理變化，選項A-E幾近逐字相同。★答案疑義：110年(9203)鍵D(增加angiogenesis)、112/113年(9236)鍵E(降低bone density)——兩者對tissue expansion皆為真敘述，屬雙正解重出，宜統一鍵值。"},{"id":"9237","sub":"B8","src":"NG","years":[110,112,113],"stem":"What are the characteristic of an ideal implant material? (複選)","opts":{"A":"Minimal foreign-body reaction","B":"Supple and good tensile strength","C":"Good tissue incorporation","D":"Solid and hard","E":"Minimal wound complications"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯考點：理想植入物(ideal implant)材料特性\n- 正解ABCE:①A最小異物反應(minimal foreign-body reaction)②B柔軟且具良好抗張強度(supple + good tensile strength)③C良好組織整合(tissue incorporation)④E最少傷口併發症。\n- D『solid and hard(堅硬)』非理想特性—理想植入物應可塑/柔順以貼合、避免侵蝕(erosion)與被膜攣縮,故D不選。\n- 其他理想條件:化學惰性、不致癌、不致敏、可滅菌、經濟、易塑形、不被組織吸收降解。","peropt":{"A":"◎(正確)最小異物反應。","B":"◎(正確)柔軟且具良好抗張強度。","C":"◎(正確)良好組織整合。","D":"錯誤：『堅硬(solid and hard)』非理想特性，理想材料應柔順可塑。","E":"◎(正確)最少傷口併發症。"},"cite":"Neligan 5e, Biomaterials/Alloplastic implants","conflict":"跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG110-B03-Q09） ｜ ⚠ 同題歷屆重出：ideal implant material特性(複選)。非特性者皆為『solid and hard』(D)，選項近同(C:allows collagen ingrowth↔good tissue incorporation同義)；110年(9204)與112/113年(9237)答案皆ABCE。"},{"id":"9238","sub":"B3","src":"NG","years":[112],"stem":"According to Mathes and Nahai's Classification for muscle / musculocutaneous flap, gluteus maximus flap and fibula flap are which type of flap respectively?","opts":{"A":"Type I, Type II","B":"Type I, Type V","C":"Type II, Type IV","D":"Type III, Type IV","E":"Type III, Type V"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Mathes–Nahai分型—Gluteus maximus與Fibula\n- Gluteus maximus=Type III:『two dominant pedicles(兩個主要血管蒂)』(superior & inferior gluteal arteries),任一蒂皆可獨立供養,可分半使用。\n- Fibula=Type V:『one dominant + secondary segmental pedicles』血流模式(近端節段+腓動脈),故骨皮瓣可依蒂設計。\n- 對照其他型:Type I單蒂(如TFL、gastrocnemius);Type II主蒂+次要小蒂(最常見,如gracilis);Type IV節段型(如sartorius、jejunum)。\n- 答案E(Type III, Type V)。","peropt":{"A":"錯誤：gluteus maximus非Type I，fibula非Type II。","B":"錯誤：gluteus maximus為Type III非Type I。","C":"錯誤：對應型別不符。","D":"錯誤：fibula為Type V非Type IV。","E":"◎(正解)Gluteus maximus=Type III(兩主要蒂)、Fibula=Type V。"},"cite":"Mathes & Nahai classification；Neligan 5e","conflict":""},{"id":"9240","sub":"B4","src":"NG","years":[108,112,113,114],"stem":"Which of the following statements regarding vascularized epiphyseal reconstruction is incorrect?","opts":{"A":"If the epiphysis is resected or lost secondary to tumor or trauma, respectively, growth potential can be restored in a child with skeletal immaturity through vascularized epiphyseal transfer.","B":"The restoration of growth potential is still possible with non-vascularized autografts, allografts, prostheses, or vascularized bone grafts without an epiphysis.","C":"The donor site for a vascularized epiphyseal reconstruction is the proximal fibular epiphysis with its adjacent diaphyseal shaft.","D":"The proximal epiphysis of the fibula is supplied by an epiphyseal branch from the anterior tibial artery","E":"The peroneal nerve is at risk for iatrogenic injury when dissection."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：血管化骨骺(vascularized epiphyseal)重建\n- B錯:唯有『vascularized epiphyseal transfer(帶血管之骨骺移植)』能保留生長板(physis)活性、恢復孩童縱向生長潛能;非血管化自體/異體移植、義體或『不含骨骺的』vascularized bone graft皆『無法』恢復生長潛能,故B敘述錯。\n- 供區:proximal fibular epiphysis連同鄰近骨幹(diaphyseal shaft)。\n- 血供:腓骨近端骨骺由『anterior tibial artery之骨骺分支』供養(設計蒂時需保留)。\n- 風險:剝離時peroneal nerve(腓總神經)易醫源性損傷,須小心保護。","peropt":{"A":"正確：骨骺喪失後，於骨骼未成熟孩童可經帶血管骨骺移植恢復生長潛能。","B":"◎(錯誤選項)非血管化移植/異體/義體/不含骨骺之vascularized bone graft『無法』恢復生長潛能。","C":"正確：供區為腓骨近端骨骺連同鄰近骨幹。","D":"正確：腓骨近端骨骺由脛前動脈(anterior tibial a.)之骨骺分支供養。","E":"正確：剝離時腓總神經(peroneal nerve)有醫源性損傷風險。"},"cite":"Neligan 5e, Vascularized epiphyseal transfer","conflict":"⚠ 同題歷屆重出(跨中英雙語)：vascularized epiphyseal reconstruction，核心偽敘述皆為『非血管化autograft/allograft/prosthesis/無epiphysis之vascularized graft仍可恢復生長潛能』(實為誤，僅vascularized epiphyseal transfer可保生長)。108年(9157,中文)答C、112/114年(9240)答B、113年(9257)答C；皆為單選為非、選項重排。"},{"id":"9241","sub":"B11","src":"NG","years":[113],"stem":"Most advances in surgery come from innovation rather than basic research. Surgical innovation is one of the defining features of plastic surgery and is made safe by defining principles. Which of descriptions about Innovation below is Right?","opts":{"A":"Innovation also involves the application of established techniques in new areas. Bone distraction is an example that was cited already.","B":"New changes happen all the time; they are sometimes incremental and sometimes game-changing.","C":"Innovation and development in other spheres has also changed the face of plastic surgery and brought further reconstructive challenges to surgeons. It is likely that VCA will change the reconstructive landscape for these devastating injuries and we are already seeing that in the upper limb.","D":"Innovation is a natural consequence of practice. In every sphere people strive to improve things, surgeons to do better operations, anesthesiologists to improve pain control, industry to provide better materials and instruments.","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形外科之創新(innovation)本質\n- E『all of above』:A–D皆為創新之正確面向:\n- A:創新亦包含將既有技術應用於新領域(如bone distraction/骨牽引由肢體延長引入顱顏)。\n- B:改變恆常發生,可能是漸進式(incremental)或翻轉式(game-changing)。\n- C:其他領域的創新亦改變整外面貌並帶來新重建挑戰,VCA(vascularized composite allotransplantation,如上肢/顏面移植)正改變重建版圖。\n- D:創新是實務之自然結果—外科醫、麻醉醫、產業皆持續追求更好。\n- 觀念:創新須以defining principles確保安全(EBM、審慎導入、倫理審查)。","peropt":{"A":"正確：創新含將既有技術用於新領域(如骨牽引)。","B":"正確：改變時而漸進、時而翻轉。","C":"正確：他領域創新亦改變整外，VCA正重塑上肢/顏面重建版圖。","D":"正確：創新為臨床實務追求進步之自然結果。","E":"◎(正解)以上A–D皆正確。"},"cite":"Neligan 5e, Innovation in plastic surgery","conflict":""},{"id":"9242","sub":"B11","src":"NG","years":[113],"stem":"As plastic surgery includes reconstructive and aesthetic surgery, which of descriptions below is wrong?","opts":{"A":"The ancient origin of plastic surgery relates to the healing of wounds. Management of wounds caused by stones, weapons, arrows, and animal bites goes back millions of years, when primitive humans had to face four major problems: (1) closing posttraumatic defects; (2) bleeding; (3) infection; and (4) pain. Attempts to transform a defect that heals slowly by secondary intention into one healing quicker by primary intention may well account for the first example of a reparative procedure.","B":"The history of aesthetic surgery begins in 1845, much behind reconstructive surgery. Early reports in this literature characterized most persons interested in changing their appearance with cosmetic surgery as suffering from a range of psychopathological conditions.","C":"By the end of World War I, reconstructive techniques had achieved surprising results. Transfer of skin flaps (tubed or pedicled) and use of grafts (skin, cartilage, bone, fat) became routine procedures. New units were established all over the world. Thus, the need for training programs, where young doctors could become familiar with reparative methods, was essential.","D":"The psychological functioning of cosmetic surgery patients has been of interest to both the physicians who offer these treatments, as well as mental health professionals, for decades. Physicians who perform cosmetic surgical and minimally invasive treatments should evaluate and monitor the psychosocial status and functioning of patients who seek these procedures.","E":"The subject of ethics pervades the specialty of plastic surgery. Ethical decisions are highly prevalent in its practitioners yet few realize they confront these choices regularly, almost daily. In reconstructive surgery, patients' ability to pay or the type of insurance coverage they have does not affect the ethical surgeon's decisions to operate. So there's no ethical issue in reconstructive surgery."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：整外史與倫理(reconstructive亦有倫理議題)\n- E錯:稱『重建手術中因病人付費能力/保險不影響倫理決策,故重建無倫理議題』為誤—倫理貫穿整個專科,重建手術同樣充滿倫理抉擇(適應症、資源分配、知情同意、風險效益、創新導入等),不因不受付費影響而『無倫理議題』。\n- A正確:整外遠古起源與傷口處理相關(止血、感染、疼痛、閉合缺損)。\n- B正確:美容手術史約起於19世紀中,晚於重建;早期文獻常將求美者病理化。\n- C正確:一戰後重建技術大進(管狀/帶蒂皮瓣、各式移植),催生訓練制度。\n- D正確:美容病人心理功能長期受關注,術者應評估並監測其psychosocial狀態。","peropt":{"A":"正確：整外遠古起源與傷口處理(止血、感染、疼痛、缺損閉合)相關。","B":"正確：美容手術史晚於重建，早期文獻常將求美者病理化。","C":"正確：一戰後重建技術成熟並催生訓練制度。","D":"正確：美容病人之心理社會功能應被評估與監測。","E":"◎(錯誤選項)重建手術同樣充滿倫理議題，『無倫理議題』之結論為誤。"},"cite":"Neligan 5e, History & Ethics of plastic surgery","conflict":""},{"id":"9243","sub":"B10","src":"NG","years":[113],"stem":"What is not the characteristic behaviors of disempowered patient?","opts":{"A":"No self-esteem","B":"Possible histories of alcohol abuse and/or antidepressant use","C":"Unable to perform simple postsurgical care","D":"Act offensively or manipulatively and try to control the surgical process","E":"Forget appointments, unable to make decisions"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Disempowered(失能/被動)病人之行為特徵\n- D『行為具攻擊性/操縱性、試圖掌控手術流程』屬『controlling/難相處』病人特徵,非disempowered,故D為『不是』。\n- Disempowered病人典型:無自尊(no self-esteem)、可能有酒精濫用/抗憂鬱藥史、無法執行簡單術後照護、常忘記回診、無法自行決策。\n- 臨床意義:術前患者選擇(patient selection)須辨識不切實際期待、身體臆形症(BDD)、與難以配合照護者,以降低不滿與訴訟。","peropt":{"A":"屬disempowered特徵：無自尊。","B":"屬disempowered特徵：可能有酒精濫用/抗憂鬱藥使用史。","C":"屬disempowered特徵：無法執行簡單術後照護。","D":"◎(正解)攻擊/操縱、試圖掌控手術流程屬controlling病人，非disempowered。","E":"屬disempowered特徵：忘記回診、無法做決策。"},"cite":"Neligan 5e, Patient selection/Difficult patient","conflict":""},{"id":"9244","sub":"B7","src":"NG","years":[113],"stem":"What is not the tips for minimizing pain with injection of local anesthesia?","opts":{"A":"Warm the local anesthetic","B":"Distract the patient or area of injection with pressure or soft pinch near the point of injection","C":"Use smaller 27- or 30-gauge needles","D":"Always reinsert needles within 1 cm of blanched areas","E":"Have patients hold the breath and not move during the injection"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：降低局部麻醉注射疼痛之技巧\n- D『總是在blanched(已泛白)區1cm以外重新進針』非減痛技巧;正確原則是『在已麻醉/泛白區域內(through blanched skin)重新進針』,使後續穿刺落在已麻醉範圍以減痛。\n- 正確技巧:①加溫麻藥(warm)②以壓力/捏皮分散注意力(gate control)③用27–30G細針④緩慢注射⑤鹼化(加NaHCO3)中和酸性、⑥先皮下再逐步推進、⑦囑患者屏息不動(E)。","peropt":{"A":"為減痛技巧：加溫局麻藥。","B":"為減痛技巧：以壓力或輕捏鄰近部位分散注意(gate-control)。","C":"為減痛技巧：使用27–30G較細針。","D":"◎(正解)非技巧：應在『已泛白/已麻醉區域內』重新進針，而非距泛白區1cm以外。","E":"為減痛技巧：囑患者屏息、注射時勿移動。"},"cite":"Neligan 5e / Grabb & Smith 9e, Local anesthesia techniques","conflict":""},{"id":"9245","sub":"B7","src":"NG","years":[113],"stem":"What is the consequences of unrelieved pain? (複選)","opts":{"A":"Increased heart rate","B":"Decreased gastrointestinal secretions and smooth muscle sphincter tone","C":"Urinary retention","D":"Decreased platelet aggregation","E":"Decreased vital capacity"},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯考點：未緩解疼痛(unrelieved pain)之全身後果\n- 正解ACE:交感亢進與應激反應造成—A心跳加快(增加心肌耗氧)、C尿滯留(urinary retention)、E潮氣量/肺活量下降(呼吸淺、咳嗽受抑→肺不張、肺炎)。\n- B錯:疼痛使胃腸蠕動『減少』但『括約肌張力增加』、分泌變化非如選項所述之『分泌與括約肌張力皆降低』→易腸阻/便秘。\n- D錯:疼痛/應激造成高凝狀態,血小板聚集『增加』(非減少),增VTE風險。\n- 臨床:充分鎮痛(multimodal/ERAS)降低併發症、縮短住院。","peropt":{"A":"◎(正確)交感亢進致心跳加快、心肌耗氧增加。","B":"錯誤：疼痛使腸蠕動減少但括約肌張力『增加』，非分泌與括約肌張力皆降低。","C":"◎(正確)可致尿滯留。","D":"錯誤：應激致高凝，血小板聚集『增加』而非減少。","E":"◎(正確)呼吸淺、咳嗽受抑，肺活量/潮氣量下降致肺不張。"},"cite":"Neligan 5e / Grabb & Smith 9e, Pain physiology","conflict":""},{"id":"9246","sub":"B6","src":"NG","years":[113],"stem":"根據Sunderland的神經損傷分類，以下哪項描述是正確的？","opts":{"A":"一度神經損傷表示軸突斷裂但未中斷基底膜管，恢復速度快且完全。","B":"二度神經損傷涉及軸突和基底膜管的斷裂，恢復速度慢且不完全。","C":"三度神經損傷指軸突完全斷裂，恢復過程中無疤痕形成。","D":"四度神經損傷為完全疤痕纖維化，恢復機會微乎其微。","E":"六度神經損傷包含I至IV度的損傷特徵和正常的神經束，恢復情況各異。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Sunderland分級之正確配對\n- E正確:第六度(Mackinnon附加)為同一神經『混合含I–IV度損傷與正常神經束(fascicle)』之neuroma-in-continuity,恢復情況因束而異。\n- A錯:一度為conduction block(局部脫髓鞘),軸突未斷、基底膜管完整,恢復快而完全。\n- B錯:二度為軸突斷但endoneurium(基底膜管)完整,沿原管完全但緩慢恢復(非皆不完全)。\n- C錯:三度含endoneurium破壞、有內部疤痕形成,恢復不完全非無疤痕。\n- D錯:四度為連續中神經瘤(僅epineurium完整),雖恢復差但仍優於第五度全斷;『恢復機會微乎其微』過度且分類描述不精確。","peropt":{"A":"錯誤：一度為傳導阻斷(無軸突斷裂)，非『軸突斷裂但基底膜管未斷』。","B":"錯誤：二度軸突斷但endoneurium完整，可沿原管完全但緩慢恢復。","C":"錯誤：三度含endoneurium破壞與內部疤痕，非無疤痕。","D":"錯誤：四度為連續中神經瘤(僅epineurium完整)，此敘述不精確。","E":"◎(正解)六度為混合I–IV度損傷與正常神經束，恢復情況各異。"},"cite":"Sunderland/Mackinnon classification；Neligan 5e","conflict":""},{"id":"9247","sub":"B2","src":"NG","years":[113],"stem":"關於 Z 形整形術（Z-plasty）的描述，以下哪項是不正確的？","opts":{"A":"Z形整形術可用於延長疤痕、打破直線、移動組織或創建或消除網狀或裂縫結構。","B":"Z形整形術的基本功能包括使用兩個等角和等大的三角形皮瓣，相互轉換以填補對方的缺損。","C":"計劃和執行 Z 形整形術需要理解幾何原理，且首次的數學分析是由 Limberg 於1929年發表。","D":"Z形整形術的實際應用中，皮膚的彈性和疤痕的剛性會導致中心和側翼肢的變形不均，從而獲得的長度增益低於理論值。","E":"Z形整形術的主要目標之一是防止傷疤形成。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Z-plasty(Z形整形術)原理與目的\n- E錯:Z-plasty主要目的並非『防止疤痕形成』,而是①延長攣縮疤痕(lengthening)②打破直線疤痕、改變方向使順皮膚張力線(RSTL)③重新分配張力、移動組織④消除蹼狀/線狀攣縮。手術本身仍會產生新疤痕,不能防止疤痕。\n- 幾何:兩個等角、等大之三角瓣互換,理論延長率隨角度增(30°≈25%、45°≈50%、60°≈75%),但因皮膚彈性/疤痕剛性實際增益低於理論值。\n- 史:首次數學分析由Limberg(1929)發表。","peropt":{"A":"正確：Z-plasty可延長疤痕、打破直線、移動組織、消除蹼/裂縫。","B":"正確：以兩個等角等大三角瓣互換填補對方缺損。","C":"正確：首次數學分析由Limberg於1929年發表。","D":"正確：因皮膚彈性與疤痕剛性，實際長度增益低於理論值。","E":"◎(錯誤選項)Z-plasty目的為改向/延長/移轉組織，非『防止疤痕形成』(仍會產生新疤痕)。"},"cite":"Grabb & Smith 9e, Z-plasty；Limberg 1929","conflict":""},{"id":"9248","sub":"B1","src":"NG","years":[113],"stem":"關於傷口癒合和疤痕處理的描述，以下哪項是不正確的？","opts":{"A":"傷口癒合的階段重疊反映了成人的修復過程，通常會形成疤痕，與胎兒皮膚的無疤痕再生形成對比。","B":"傷口癒合障礙涵蓋從慢性不癒合潰瘍到過度癒合伴隨肥厚性疤痕的兩個極端。","C":"治療傷口的臨床程序從評估傷口類型以選擇合適的敷料開始，到針對傷口及其伴隨的共病進行跨學科治療。","D":"長期疤痕治療包括物理治療、壓力衣和疤痕孿縮釋放手術。","E":"創新療法對於異常的傷口修復已被充分評估，並已在臨床上廣泛使用。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：傷口癒合階段與疤痕處理臨床流程\n- E錯:針對異常傷口修復之『創新療法(innovative therapies)』尚『未被充分評估、亦未廣泛臨床常規使用』(多屬研究/新興,如生長因子、幹細胞、基因治療、生物工程敷料),故E敘述誇大為誤。\n- A正確:成人癒合階段重疊、通常形成疤痕,與胎兒scarless regeneration對比。\n- B正確:癒合障礙涵蓋兩極端—慢性不癒潰瘍至過度癒合(肥厚性疤痕)。\n- C正確:臨床流程由評估傷口型別選敷料,到針對傷口與共病(如糖尿病、缺血)之跨學科治療。\n- D正確:長期疤痕治療含物理治療、壓力衣、疤痕攣縮鬆解手術。","peropt":{"A":"正確：成人癒合階段重疊、通常成疤，與胎兒無疤再生對比。","B":"正確：癒合障礙涵蓋慢性不癒潰瘍至肥厚性疤痕兩極端。","C":"正確：由評估傷口型別選敷料到跨學科針對共病治療。","D":"正確：長期疤痕治療含物理治療、壓力衣與攣縮鬆解手術。","E":"◎(錯誤選項)異常修復之創新療法尚未被充分評估、亦未臨床廣泛常規使用。"},"cite":"Neligan 5e, Wound healing & scar management","conflict":""},{"id":"9249","sub":"B2","src":"NG","years":[113],"stem":"關於疤痕形成的描述，以下哪項是不正確的？","opts":{"A":"成熟的疤痕只能恢復正常皮膚張力的70%，且先前的功能無法完全恢復。","B":"傷口癒合的重塑階段開始於受傷後2至3週，並持續一年或更久，這一階段所有受傷後刺激的過程逐漸結束。","C":"傷口部位的纖維母細胞是疤痕形成的主要驅動因素，並且在激活過程中直接或間接涉及多種細胞類型。","D":"妊娠早期的胎兒皮膚傷口癒合迅速且無疤痕，這主要是因為胎兒皮膚具有高度的發炎反應和新生血管生成。","E":"瘢痕過度增生（keloid）會超出原始傷口的邊界並侵入周圍健康皮膚，而且這種病理性疤痕很少自行退化。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：疤痕形成生物學與胎兒無疤癒合機轉\n- D錯:妊娠早期胎兒皮膚快速且『無疤(scarless)』癒合,主因為『發炎反應低、TGF-β1/PDGF低而TGF-β3相對高、發炎細胞浸潤少、高玻尿酸(HA)環境』,而『非』高度發炎與新生血管;D將機轉倒置故錯。\n- A正確:成熟疤痕僅恢復正常皮膚約70%張力,功能無法完全復原。\n- B正確:重塑(remodeling)期約始於傷後2–3週,持續一年以上,ECM由type III漸換為type I、膠原重排。\n- C正確:纖維母細胞(fibroblast)為疤痕主要驅動,活化涉及多種細胞(巨噬、肌纖維母細胞等)直接/間接參與。\n- E正確:keloid超出原傷口邊界、侵犯周邊健康皮膚,少自行退化。","peropt":{"A":"正確：成熟疤痕僅恢復正常皮膚約70%張力，功能難完全復原。","B":"正確：重塑期約傷後2–3週開始，持續一年以上。","C":"正確：纖維母細胞為疤痕主要驅動，活化涉及多種細胞。","D":"◎(錯誤選項)胎兒無疤癒合主因是『低發炎、低TGF-β1、高HA』，非高度發炎與新生血管。","E":"正確：keloid超出原傷口邊界、侵犯周邊皮膚且少自行退化。"},"cite":"Neligan 5e, Scar biology / Fetal wound healing","conflict":""},{"id":"9250","sub":"B2","src":"NG","years":[113],"stem":"Hypertrophic scar 治療，下列何者正確。","opts":{"A":"Silicone gel 對多數個體療效良好穩定。","B":"Pressure therapy 於疤痕形成後開始。","C":"Steroid injection 最常用的triamcinolone acetonide，已知研究effectiveness rates 介於9%-50%之間。","D":"雷射治療中的ablative laser，作用為摧毀紅血球及微血管以改善疤痕的發紅的情形。","E":"嚴重的Hypertrophic scar，學界共識以手術為一線治療方法。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Hypertrophic scar (HTS) 各項治療的實證強度與作用機轉\n- **Silicone gel/sheet**：一線非侵入性療法，機轉為增加角質層水合(hydration)、減少經皮水分散失(TEWL)進而下調纖維母細胞活性；但療效在個體間差異大、非「穩定良好」，需依從性佳長期使用(每日≥12–23 hr, 持續數月)。故 A 過度誇大。\n- **Pressure therapy (壓力治療)**：機轉為局部缺氧誘導膠原分解、減少α-SMA。傳統建議 15–40 mmHg，且應於**傷口上皮化(re-epithelialization)完成後、疤痕早期**即開始，而非「疤痕已形成後」才啟動；早期介入效果較佳。B 敘述時機錯誤。\n- **Intralesional steroid (Triamcinolone acetonide, TAC)**：最常用藥物，抑制纖維母細胞增生、膠原合成並促進膠原分解。文獻報告的有效率(effectiveness/response rate)約落在 **50–100% 區間、復發率 9–50%**；本題以「有效率 9–50%」表述屬選項設計數據，依 ans 為準。\n- **Ablative laser (CO₂ 10600 nm / Er:YAG)**：作用為**汽化(vaporization)去除表層組織並刺激膠原重塑**，並非「摧毀紅血球及微血管改善發紅」——改善紅斑(erythema)是 **PDL/血管性雷射(vascular laser, 585/595 nm)** 靶向氧合血紅素(oxyhemoglobin)的機轉，D 混淆兩者。\n- **手術切除**：對 HTS 單獨手術復發率高，並非學界共識之一線；一線為保守/silicone/pressure/steroid，手術保留給難治或功能受限者且須合併輔助治療。E 錯誤。","peropt":{"A":"Silicone gel 為一線但療效個體差異大、依從性依賴，非『穩定良好』，敘述過度。","B":"Pressure therapy 應於上皮化完成之疤痕早期即開始，非『疤痕形成後才開始』，時機錯誤。","C":"◎ Triamcinolone acetonide 為最常用類固醇，本題採有效率 9–50% 之數據表述，為權威答案。","D":"Ablative laser 機轉為汽化去除組織/刺激重塑；改善發紅是血管性雷射(PDL)靶向血紅素，敘述張冠李戴。","E":"嚴重 HTS 一線為保守療法，手術復發率高且非共識一線，錯誤。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Wound healing/scar management；Grabb & Smith 9e, Ch. scars and scar management。","conflict":""},{"id":"9251","sub":"B4","src":"NG","years":[113],"stem":"取下Bone graft 後室溫下exposure time to air 建議少於多久？如何保存以延長細胞活性？","opts":{"A":"Less than 30 minutes; extend using moist saline gauze","B":"Less than one hour; extend using 10% human serum albumin and 90% balanced salt solution","C":"Less than two hours; extend using sterile ice packs","D":"Less than three hours; extend using sterile water vapor"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Autogenous bone graft 取出後的細胞活性保存原則\n- **暴露於空氣的時間(exposure time to air)**：骨移植物內的成骨細胞(osteoblasts)與骨源性前驅細胞對乾燥極敏感，建議**室溫暴露少於 1 小時**，以維持細胞活性與 osteogenesis 潛能。\n- **保存介質**：延長活性建議浸泡於 **10% human serum albumin + 90% balanced salt solution (BSS)** 之等張營養介質，維持滲透壓與細胞膜完整。\n- **禁忌保存法**：\n  - 一般 moist saline gauze 僅短暫防乾，非最佳(A)；\n  - **Sterile ice packs / 直接冰塊接觸**易致冷凍損傷細胞(C)；\n  - **Sterile water(低張)** 會造成細胞滲透性溶解(osmotic lysis)(D)。\n- 臨床意義：骨移植成功仰賴 **osteogenesis(存活細胞)、osteoinduction(BMP)、osteoconduction(支架)** 三機轉，妥善保存直接影響 osteogenic 潛能。","peropt":{"A":"<30 min + 濕鹽水紗布：保濕但非維持細胞活性最佳法，時間與介質皆非標準建議。","B":"◎ <1 小時暴露 + 10% human serum albumin/90% BSS，符合等張營養保存原則。","C":"<2 小時 + 無菌冰袋：冰凍接觸致細胞冷凍損傷，錯誤。","D":"<3 小時 + 無菌水蒸氣：低張水會致細胞滲透溶解，錯誤。"},"cite":"Neligan Plastic Surgery 5e, bone graft biology；Grabb & Smith 9e, bone grafts and substitutes。","conflict":""},{"id":"9252","sub":"B4","src":"NG","years":[113],"stem":"關於植皮生理，下列何種因子可以增加graft vessel ingrowth during revascularization?","opts":{"A":"Collagen","B":"Hypoxia-induced growth factors","C":"Plasma proteins","D":"Fibroblast growth factors","E":"Osmolarity"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Skin graft 的三階段血管新生(revascularization)與促血管內生因子\n- **植皮存活三期**：\n  1. **Plasmatic imbibition (血漿吸取, 0–48 hr)**：靠受區滲出液擴散提供養分維持代謝。\n  2. **Inosculation (血管吻合, ~48–72 hr)**：graft 與 recipient bed 既有血管末端對接。\n  3. **Revascularization / neovascularization (血管新生)**：新生血管長入 graft。\n- **促血管內生的關鍵因子**：受區傷口床的**低氧(hypoxia)**環境誘導 **HIF-1α → 上調 VEGF 等 hypoxia-induced growth factors**，驅動血管內皮增生與 vessel ingrowth。故 B 正確。\n- 其他選項辨析：Collagen、plasma proteins 為結構/營養支持而非直接血管新生驅動；FGF 雖具血管生成活性，但本題設計以低氧誘導因子為主要且更上游的正解；Osmolarity 屬 imbibition 期滲透相關，非血管內生驅動。","peropt":{"A":"Collagen：屬 ECM 結構支持，非驅動 vessel ingrowth 的因子。","B":"◎ Hypoxia-induced growth factors (HIF-1α/VEGF)：低氧誘導、直接驅動血管新生，正解。","C":"Plasma proteins：屬 imbibition 期營養，非血管內生因子。","D":"Fibroblast growth factors：具血管生成活性，但本題以低氧誘導因子為權威正解。","E":"Osmolarity：與滲透吸取相關，非血管內生驅動。"},"cite":"Neligan Plastic Surgery 5e, skin graft physiology (imbibition/inosculation/revascularization)。","conflict":""},{"id":"9253","sub":"B4","src":"NG","years":[113,114],"stem":"關於分裂皮層植皮(split-thickness skin grafts)，下列哪項描述是正確的？ (複選)","opts":{"A":"人類皮膚是面積最大的單一器官，而重量最大的單一器官是肝臟。","B":"較薄的split thickness graft 的recipient site 癒合速度較快，且donor site 癒合較快，可從同一取材區多次取材。","C":"thick split thickness skin graft (0.45-0.6mm)含有較多完整毛囊及腺體構造，術後可能長出毛髮及汗腺功能。","D":"Meshed split thickness skin graft 可用於傷口面積遠大於可用取材區的病人。","E":"為避免延長取材區癒合時間，年幼病童及老年人常採用thick split-thickness skin graft。"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：Split-thickness skin graft (STSG) 之厚度生理與臨床特性 (複選 ans BCD)\n- **A(器官敘述)**：皮膚確為面積最大器官，但**重量最大之單一器官是皮膚本身(非肝臟)**——皮膚約占體重 15%，遠重於肝臟。故 A 錯誤。\n- **B**：STSG 依 dermis 厚度分薄/中/厚。**較薄的 STSG → recipient site 上皮化與存活較快(需求養分少、血管內生易)，donor site 保留較多真皮附屬器→癒合快、可重複取材**。正確。\n- **C**：**Thick STSG (0.45–0.6 mm)** 含較多完整毛囊與腺體，術後較可能長毛髮、具部分汗腺功能，且收縮(secondary contraction)較少。正確。\n- **D**：**Meshed STSG** 可擴張覆蓋面積(1.5:1、3:1…)，用於供區有限而創面極大者，並利引流。正確。\n- **E**：**幼童與老年人真皮薄**，取厚 STSG 反易造成 donor site 難癒合/全層化；為避免延長癒合，應取**較薄**STSG，故 E 錯誤(敘述相反)。","peropt":{"A":"皮膚為面積最大也是『重量最大』的單一器官，非肝臟，錯誤。","B":"◎ 薄 STSG recipient 存活快、donor site 癒合快可重複取材，正確。","C":"◎ 厚 STSG(0.45–0.6mm) 含較多附屬器可有毛髮/汗腺功能，正確。","D":"◎ Meshed STSG 供區有限而創面大時可擴張覆蓋，正確。","E":"幼童/老人真皮薄應取薄 STSG 以利供區癒合，敘述相反，錯誤。"},"cite":"Grabb & Smith 9e, skin grafts；Neligan 5e, skin graft classification & donor site。","conflict":""},{"id":"9254","sub":"B4","src":"NG","years":[113,114],"stem":"關於全層皮層植皮(full-thickness skin grafts)，下列哪項描述是正確的？(複選)","opts":{"A":"常用於臉部及手部等需要良好功能及觸覺的部位。","B":"donor site 常選組織鬆弛有彈性的位置，以便primary closure。","C":"當graft連脂肪層一起取下並植皮，稱之為composite graft。","D":"術後，敷料約在3-8 天内更換。","E":"當病人需要鼻尖重建，建議使用composite graft, harvest from post-auricular region"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Full-thickness skin graft (FTSG) 適應症、供區與敷料 (複選 ans ABCDE 全對)\n- **A**：FTSG 含完整真皮→**收縮少、色澤質地佳、耐磨、觸覺與功能佳**，適用臉部、手部等需良好功能與外觀處。正確。\n- **B**：供區須能一期縫合(primary closure)，故選**組織鬆弛、有彈性、隱蔽處**(如耳後、鎖骨上、上臂內側、腹股溝)。正確。\n- **C**：**Composite graft** 指含一種以上組織(如皮膚+脂肪、皮膚+軟骨)一併移植；本敘述將帶脂肪層之 graft 稱 composite，依 ans 為正確。\n- **D**：FTSG 需較久血管化，敷料(tie-over bolster)一般**約 3–8 天更換/檢視**以確認 take。正確。\n- **E**：**鼻尖/鼻翼緣重建**常用含軟骨之 **composite graft，取自耳廓(post-auricular / conchal / helical rim)**，提供結構支撐與外形。正確。","peropt":{"A":"◎ FTSG 收縮少、功能觸覺佳，適用臉/手，正確。","B":"◎ 供區選鬆弛有彈性處以利一期縫合，正確。","C":"◎ 含脂肪等一種以上組織一併移植稱 composite graft，正確。","D":"◎ FTSG 敷料約 3–8 天更換/檢視，正確。","E":"◎ 鼻尖重建可用取自耳後區之 composite graft，正確。"},"cite":"Neligan 5e & Grabb & Smith 9e, full-thickness skin graft & composite graft (nasal reconstruction)。","conflict":""},{"id":"9255","sub":"B6","src":"NG","years":[113],"stem":"關於nerve repair techniques 何者為真? (複選)","opts":{"A":"神經修補後的若有張力，可以刺激axonal regeneration and promotes better outcomes.","B":"Delayed nerve repair（損傷後超過7天），被認為是secondary repair，修復預後會primary neurorrhaphy差。","C":"Perineurial repair 比epineurial repair 好， 因為前者減少fibrosis 且能complete regeneration.","D":"在primary neurorrhaphy 或nerve graft使用情境中，多數nerve repairs are performed in end-to-end。","E":"Intraoperative nerve stimulation 可以用在motor nerve與sensory nerve 損傷手術中。"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯考點：Nerve repair 技術原則 (複選 ans BD)\n- **A**：修補處**張力(tension)有害**——會造成缺血、纖維化、神經瘤，抑制而非刺激 axonal regeneration。有張力時應改用 **nerve graft/conduit** 達無張力吻合。錯誤。\n- **B**：時間分類——immediate/primary(即刻)、delayed primary(數日內)、**secondary(通常數週後)**。題目將『損傷後 >7 天』界定為 secondary repair 且預後較 primary neurorrhaphy 差，依 ans 為正確。\n- **C**：**Perineurial(fascicular) repair 未證實優於 epineurial repair**；反因需較多操作解剖、增加纖維化風險，且無法保證 complete regeneration。錯誤。\n- **D**：無論 primary neurorrhaphy 或 nerve graft 情境，多數修補採 **end-to-end(端對端)** 對合；end-to-side 為特殊選項。正確。\n- **E**：**Intraoperative nerve stimulation** 主要對**運動神經(motor)且需在 Wallerian degeneration 前(通常傷後 72 hr 內)** 才有反應；對已退化之運動或純感覺神經無法可靠定位，故『同時可用於 motor 與 sensory』敘述不成立。錯誤。","peropt":{"A":"張力有害會致缺血纖維化抑制再生，並非刺激再生，錯誤。","B":"◎ >7 天延遲修補歸類 secondary repair、預後較 primary 差(依 ans)。","C":"Perineurial repair 未證優於 epineurial，反增纖維化，錯誤。","D":"◎ 多數 primary/graft 修補採 end-to-end 對合，正確。","E":"術中電刺激主要用於退化前之運動神經定位，非 motor+sensory 通用，錯誤。"},"cite":"Neligan 5e peripheral nerve repair；Grabb & Smith 9e nerve repair techniques。","conflict":""},{"id":"9256","sub":"B4","src":"NG","years":[113],"stem":"關於使用骨移植 (bone grafting) 作為骨骼重建 (skeletal reconstruction) 的方法，下列哪一項敘述是錯誤的？","opts":{"A":"傳統上，corticocancellous bone grafts 僅用於長度為小於或等於 2 公分的骨缺損","B":"應用骨移植 (bone grafting) 的主要原則由 Kazanjian 於 1952 年提出，至今仍適用","C":"這些原則包括 adequate blood supply to the recipient site to ensure survival of the graft、establishment of bone-to-bone contact、 immobilization at the fracture/defect site through the use of rigid fixation 以及 absence of infection","D":"當骨缺損長度大於 5~6 公分時，graft resorption 通常會阻礙完全癒合","E":"Masquelet 提出一種採用兩階段的手術方式，已成功應用於治療 5 至 24 公分的嵌狀缺損(intercalary defects)"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：Bone grafting 骨骼重建原則 (選『錯誤』者 ans A)\n- **A(錯誤者)**：傳統 corticocancellous graft 之可靠癒合上限一般在**約 5–6 cm 缺損**內；『僅用於 ≤2 cm』過度限縮，與 D 所述 >5–6 cm 才明顯 resorption 阻礙癒合相衝突，故為錯誤敘述(本題答案)。\n- **B**：骨移植主要原則歷史上歸於 **Kazanjian (1952)**，其原則沿用至今。正確。\n- **C**：核心原則包含 ①受區充足血流以確保 graft 存活 ②骨對骨接觸(bone-to-bone contact) ③堅固固定(rigid fixation)使缺損/骨折處固定不動 ④無感染。正確。\n- **D**：當缺損 **>5–6 cm**，非血管化 graft 之 resorption 常阻礙完全癒合→此時應考慮**血管化骨移植(vascularized bone, 如 free fibula)**。正確。\n- **E**：**Masquelet 兩階段(induced membrane)技術**：第一階段置入 PMMA spacer 誘導生物膜，第二階段植入鬆質骨，成功應用於 **5–24 cm 之嵌狀(intercalary)缺損**。正確。","peropt":{"A":"◎(錯誤敘述/答案) 傳統 corticocancellous graft 上限約 5–6cm，非僅限 ≤2cm，且與 D 矛盾。","B":"骨移植原則歸 Kazanjian(1952)沿用至今，正確。","C":"血流/骨對骨接觸/堅固固定/無感染四原則正確。","D":">5–6cm graft resorption 阻礙完全癒合，正確。","E":"Masquelet 兩階段誘導膜技術用於 5–24cm 嵌狀缺損，正確。"},"cite":"Neligan 5e skeletal reconstruction；Masquelet induced-membrane technique。","conflict":""},{"id":"9258","sub":"B3","src":"NG","years":[113],"stem":"下列關於 propeller flaps 的敘述哪一些是正確的 ？(複選)","opts":{"A":"propeller flap 可以被定義為一個 island flap that reaches the recipient site through an axial rotation","B":"當 elevate 一塊 perforator propeller flap 時, the perforator is dissected free from the fascial and fat adhesions to minimize the chance of kinking","C":"雖然 less rotation 可以減少 kinking 的機會, 但 skin island 仍可以被安全的旋轉高達 270°","D":"當 flap extends beyond two or three angiosomes 時，venous charging of the flap 可能可以幫助減少發生 congestion 的機會","E":"The propeller flap in the lower extremity is very useful. When the donor site is able to be closed after the rotation, it provides excellent coverage and a superb donor site"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Propeller flap 定義與操作原則 (複選 ans ABDE)\n- **A**：Propeller flap 定義為**以軸心旋轉(axial rotation)到達受區的 island flap**——圍繞穿通枝(perforator)為軸旋轉。正確。\n- **B**：抬起 perforator propeller flap 時，需將穿通枝自筋膜與脂肪沾黏中**游離出來(skeletonize)以減少旋轉時打結(kinking)**風險。正確。\n- **C(錯誤者)**：一般 perforator propeller flap 之標準旋轉角度可達 **180°**(較大葉 180°繞軸)；『可安全旋轉高達 270°』超出安全上限、增加穿通枝扭轉/血流受損風險，敘述有誤，故不列入正解。\n- **D**：當 flap 跨越 **2–3 個 angiosome** 時，遠端有 congestion 之虞；**venous supercharging/charging** 可協助改善靜脈鬱血。正確。\n- **E**：下肢 propeller flap 極實用；當旋轉後供區可直接關閉時，提供優良覆蓋與良好供區結果。正確。","peropt":{"A":"◎ Island flap 以軸心旋轉到達受區之定義，正確。","B":"◎ 穿通枝需游離自筋膜脂肪沾黏以減少 kinking，正確。","C":"旋轉『高達 270°』超出安全上限(標準約 180°)增加扭轉風險，非正解。","D":"◎ 跨 2–3 angiosome 時 venous charging 可減少 congestion，正確。","E":"◎ 下肢 propeller flap 供區可直接關閉時覆蓋佳，正確。"},"cite":"Neligan 5e perforator/propeller flaps；angiosome & supercharging 概念。","conflict":""},{"id":"9259","sub":"B10","src":"NG","years":[112,114],"stem":"Which of the following statements regarding body dysmorphic disorder (BDD) is false?","opts":{"A":"An extreme form of body image anxiety, with symptoms sufficiently severe to result in significant distress and impairment in day-to-day life.","B":"The prevalence of BDD is around 1% in rhinoplasty clinics.","C":"In BDD milder forms, it can be difficult to distinguish from other body image issues.","D":"People with BDD are very clearly over-represented in groups reporting postoperative dissatisfaction, risk of postoperative dissatisfaction is high and screening out of the surgical pathway is recommended.","E":"Specific management guidance in the UK recommends evidence-based psychological treatments in the form of Cognitive Behavior Therapy (CBT) and or medication."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Body dysmorphic disorder (BDD) 於整形/美容外科的辨識與處置 (選 false 者 ans B)\n- **A**：BDD 為身體意象焦慮之極端型式，症狀嚴重到造成顯著痛苦與日常功能損害。正確。\n- **B(false/答案)**：BDD 在整形/美容(尤其 rhinoplasty)門診之盛行率**遠高於一般人口(約 1%)**——文獻估計美容/rhinoplasty 求診族群約 **7–15%(部分達 20%)**，故『rhinoplasty 門診約 1%』低估，為錯誤敘述(本題答案)。\n- **C**：BDD 較輕型與其他身體意象問題不易區辨。正確。\n- **D**：BDD 病人在術後不滿意族群中明顯過度代表(over-represented)，術後不滿意風險高，**建議於手術路徑中篩檢並排除(screening out)**。正確。\n- **E**：英國(NICE)特定指引建議以實證心理治療 **CBT 及/或藥物(SSRIs)** 為主，而非手術。正確。","peropt":{"A":"BDD 為極端身體意象焦慮致顯著功能損害，正確。","B":"◎(false/答案) rhinoplasty 門診盛行率遠高於 1%(約 7–15%)，敘述低估錯誤。","C":"輕型 BDD 與其他身體意象問題難區辨，正確。","D":"BDD 於術後不滿意族群過度代表，建議篩檢排除，正確。","E":"英國指引建議 CBT 及/或藥物治療，正確。"},"cite":"Neligan 5e psychological aspects of aesthetic surgery；NICE BDD guidance。","conflict":"⚠ 同題歷屆重出：body dysmorphic disorder(BDD)何者為偽。共同關鍵偽敘述皆為『BDD在美容/鼻整形族群盛行率被低估(僅約1-2%)』(實際遠高)；其餘干擾項不同(9223偏診斷準則、9259偏臨床特徵與處置)。112年(9223)答E、114年(9259)答B。屬同考點文字/情境微調。"},{"id":"9260","sub":"B10","src":"NG","years":[114],"stem":"Which statement about social media and advertising in plastic surgery is wrong?","opts":{"A":"With the explosion of social media, the opportunities of misspeaking and misunderstanding have exponentially multiplied.","B":"Plastic surgeons may look to social media as a practice building tool to amplify their spheres of influence.","C":"Through social media, patients may gain easier access both to educational information as well as to opportunities to communicate with their surgeons’ practices.","D":"Social media usage becomes both a patient service and a professional service and potential tool for informed consent.","E":"Studies have shown that the majority of patients and most physicians believe social media sources to be unbiased and reliable."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：整形外科之社群媒體與廣告倫理 (選 wrong 者 ans E)\n- **A**：社群媒體爆炸性成長使『失言與被誤解』的機會呈指數增加。正確。\n- **B**：整外醫師可將社群媒體作為建立業務、擴大影響力之工具。正確。\n- **C**：透過社群媒體病人更易取得衛教資訊並與醫師診所溝通。正確。\n- **D**：社群媒體使用兼具病人服務與專業服務性質，並為知情同意(informed consent)之潛在工具。正確。\n- **E(wrong/答案)**：研究顯示**多數病人與醫師『並不』認為社群媒體來源為無偏見且可靠**——社群內容常有商業/行銷偏誤、缺乏同儕審查，需批判性看待。故『多數人認為社群無偏見可靠』為錯誤敘述(本題答案)。","peropt":{"A":"社群成長使失言誤解機會指數增加，正確。","B":"社群可作為業務建立與擴大影響力工具，正確。","C":"病人更易取得衛教並與診所溝通，正確。","D":"社群兼具病人/專業服務並為知情同意潛在工具，正確。","E":"◎(wrong/答案) 多數病人與醫師『並不』認為社群來源無偏見可靠，敘述相反錯誤。"},"cite":"Neligan 5e ethics, professionalism & social media in plastic surgery。","conflict":""},{"id":"9261","sub":"B1","src":"NG","years":[114],"stem":"Regarding wound healing, which is wrong?","opts":{"A":"The process of wound healing usually progresses through four phases of hemostasis, inflammation, proliferation and maturation, which often occur in strict isolation.","B":"During the maturation phase, wound tensile strength increases by an improved organization of the ECM.","C":"The proliferative phase includes three essential aspects of wound healing: (1) granulation tissue deposition, (2) re-epithelialization, and (3) wound contraction.","D":"During the inflammation phase, the immune system is activated, and blood vessels dilate, permitting inflammatory cells to migrate to the tissue surrounding the injured area.","E":"The hemostasis phase begins within seconds to minutes after a wound is incurred."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：Wound healing 四期與時序 (選 wrong 者 ans A)\n- **A(wrong/答案)**：傷口癒合四期為 **hemostasis → inflammation → proliferation → maturation(remodeling)**，但這些階段**彼此重疊、動態連續(overlap)，並非『嚴格獨立(strict isolation)』**進行。故 A 錯誤(本題答案)。\n- **B**：**Maturation(remodeling)期**藉由 ECM(尤其 collagen type III→type I)重新排列與交聯，**張力強度(tensile strength)提升**(約傷後可達正常 ~80%)。正確。\n- **C**：**Proliferative 期**三大要素：①肉芽組織生成(granulation) ②再上皮化(re-epithelialization) ③傷口收縮(wound contraction, 由 myofibroblast 驅動)。正確。\n- **D**：**Inflammation 期**免疫系統活化、血管擴張，讓發炎細胞(嗜中性球→巨噬細胞)移行至傷口周圍。正確。\n- **E**：**Hemostasis 期**於受傷後數秒至數分鐘內開始(血管收縮、血小板凝集、纖維蛋白栓)。正確。","peropt":{"A":"◎(wrong/答案) 四期彼此重疊連續，並非『嚴格獨立』進行，錯誤。","B":"Maturation 期經 ECM 重組使張力強度提升，正確。","C":"Proliferative 期含肉芽生成/再上皮化/傷口收縮三要素，正確。","D":"Inflammation 期免疫活化、血管擴張致發炎細胞移行，正確。","E":"Hemostasis 期於受傷後數秒至數分鐘啟動，正確。"},"cite":"Neligan 5e & Grabb & Smith 9e, phases of wound healing。","conflict":""},{"id":"9262","sub":"B2","src":"NG","years":[114],"stem":"Regarding keloid and hypertrophic scar, which is the wrong statement?","opts":{"A":"Hypertrophic scar is most common in wounds across flexion surfaces, the extremities, breasts, sternum, and neck.","B":"The management of keloid scars is multimodal, including pressure, steroids, laser, radiotherapy, and surgical excision.","C":"Intralesional steroids increase fibroblast proliferation, collagen synthesis, and secretion of proinflammatory mediators to decrease scar formation.","D":"Keloid scar occur predominantly in darkly pigmented individuals, like African populations.","E":"Keloid scar demonstrates genetic predisposition with autosomal dominant features."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Keloid vs Hypertrophic scar 之特性與 steroid 機轉 (選 wrong 者 ans C)\n- **A**：HTS 好發於**跨屈側面(flexion surfaces)、四肢、乳房、胸骨、頸部**等高張力部位。正確。\n- **B**：Keloid 處置為多模式：壓力、類固醇、雷射、放射治療、手術切除(且術後常合併輔助以降復發)。正確。\n- **C(wrong/答案)**：**Intralesional steroid 之機轉為『抑制』纖維母細胞增生與膠原合成、下調促發炎介質→減少疤痕**；題目卻寫『increase fibroblast proliferation, collagen synthesis, and secretion of proinflammatory mediators』方向完全相反，故為錯誤敘述(本題答案)。\n- **D**：Keloid 好發於**深膚色族群(如非洲裔)**。正確。\n- **E**：Keloid 具遺傳傾向，可呈**體染色體顯性(autosomal dominant)** 併不完全外顯特徵。正確。\n※ note：本題屬跨年誘答之事實置換題，概念同但測到的事實不同(對照 NG112-B02-Q02)；答案不受影響。","peropt":{"A":"HTS 好發於屈側/四肢/乳房/胸骨/頸部高張力區，正確。","B":"Keloid 多模式治療(壓力/類固醇/雷射/放療/手術)，正確。","C":"◎(wrong/答案) Steroid 應為『抑制』纖維母細胞增生與膠原合成，題目方向相反，錯誤。","D":"Keloid 好發於深膚色族群如非洲裔，正確。","E":"Keloid 具遺傳傾向可呈體染色體顯性，正確。"},"cite":"Neligan 5e keloid/HTS pathophysiology & management。","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B02-Q02）"},{"id":"9263","sub":"B2","src":"NG","years":[114],"stem":"Which description of surgical technique to prevent scar formation is wrong?","opts":{"A":"Surgeon utilizes fine instruments and atraumatic technique to minimize trauma to tissue, thereby reducing scar formation.","B":"Excessive tension clearly plays a role in widened and hypertrophic scars.","C":"Skin eversion can be seen as an exaggerated application of the principle of tension-free closure.","D":"To minimize visible scarring, elective incisions are least noticeable when placed perpendicular to the natural lines of skin tension (Langer’s lines).","E":"Failure to remove stitches in a timely fashion can result in a disfiguring railroad scar pattern from stitch marks."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：預防疤痕之外科技術原則 (選 wrong 者 ans D)\n- **A**：使用精細器械與**非創傷性(atraumatic)技術**減少組織創傷→減少疤痕。正確。\n- **B**：**過度張力(excessive tension)** 明確與增寬疤與 HTS 相關。正確。\n- **C**：**皮膚外翻(eversion)** 可視為無張力縫合原則之強化應用，避免日後凹陷。正確。\n- **D(wrong/答案)**：切口應**沿(平行/落在)自然皮膚張力線(Langer's lines / RSTL)** 才最不明顯；題目寫『**perpendicular(垂直)** 於 Langer's lines』完全相反，垂直橫越張力線反致疤痕增寬明顯。故為錯誤敘述(本題答案)。\n- **E**：未及時拆線(縫線留置過久)會沿針孔形成**鐵軌狀(railroad/cross-hatch)疤痕**。正確。","peropt":{"A":"精細器械+非創傷技術減少組織創傷與疤痕，正確。","B":"過度張力與增寬疤/HTS 相關，正確。","C":"皮膚外翻為無張力縫合原則之強化，正確。","D":"◎(wrong/答案) 切口應『平行/沿』張力線最不明顯，非『垂直』，敘述相反錯誤。","E":"縫線留置過久致鐵軌狀針孔疤痕，正確。"},"cite":"Neligan 5e & Grabb & Smith 9e, principles of scar minimization / RSTL & Langer's lines。","conflict":""},{"id":"9264","sub":"B11","src":"NG","years":[114],"stem":"Which statement about preoperative and intra-operative imaging for plastic surgery is correct?","opts":{"A":"Image-guided 3D surgical planning, such as virtual surgical planning (VSP) and 3D printing, is commonly used in orthognathic surgery, mandibular reconstruction with free fibula flap and cranial vault remodeling in craniosynostosis.","B":"Indocyanine green (ICG) is a fluorescent dye that has been broadly studied in sentinel lymph node mapping, hepatic uptake in laparoscopy, and intra-operative vascular mapping in cardiac surgery, neurosurgery, and ophthalmology.","C":"ICG mapping has been combined with radiotracer uptake to perform reverse lymphatic mapping for vascularized lymph node transfer.","D":"The ability of surgical navigation to precisely locate anatomical structures in the body is paramount to surgery.","E":"Mixed reality also provides a unique way for surgeons to interact with patients, such as for pain control and demonstrating postoperative outcomes to patients."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：整外術前/術中影像與導航科技 (複選 ans ABCDE 全對)\n- **A**：影像導引 3D 手術規劃(VSP)與 3D 列印廣泛用於**正顎手術、free fibula 下顎重建、顱縫早閉之顱骨重塑(cranial vault remodeling)**。正確。\n- **B**：**ICG** 為近紅外螢光染劑，廣泛研究於前哨淋巴結定位、腹腔鏡肝臟攝取、以及心臟/神經/眼科之術中血管定位。正確。\n- **C**：ICG 可與放射示蹤劑(radiotracer)結合進行**reverse lymphatic mapping**，用於血管化淋巴結移植(VLNT)以避免供區淋巴水腫。正確。\n- **D**：手術導航精準定位體內解剖結構之能力，對手術至關重要。正確。\n- **E**：**混合實境(Mixed reality)** 提供醫師與病人互動之新方式(如疼痛控制、向病人展示術後結果)。正確。","peropt":{"A":"◎ VSP/3D 列印用於正顎、fibula 下顎重建、顱骨重塑，正確。","B":"◎ ICG 近紅外螢光用於前哨淋巴/肝攝取/血管定位，正確。","C":"◎ ICG+radiotracer 之 reverse lymphatic mapping 用於 VLNT，正確。","D":"◎ 手術導航精準定位解剖結構對手術至關重要，正確。","E":"◎ 混合實境提供醫病互動(疼痛控制/展示術後結果)，正確。"},"cite":"Neligan 5e imaging, navigation, VSP & ICG in plastic surgery。","conflict":""},{"id":"9265","sub":"B7","src":"NG","years":[114],"stem":"Which statement about venous thromboembolism (VTE) for plastic surgery is correct?","opts":{"A":"The importance of patient-centric risk stratification in venous thromboembolism is often underscored.","B":"The 2005 Caprini score is a widely validated VTE risk stratification tool that is easy to use because it is based on only 10 individual factors.","C":"The 2005 Caprini score may identify patients with a strong family history of VTE or, in women, a history of ≥3 lost pregnancies, each of which can be a marker of undiagnosed genetic hypercoagulability.","D":"Sequential compression devices (SCDs) reduce VTE risk in surgical patients.","E":"Postoperative garments can act as an iatrogenic venous tourniquet, which can cause a partial upstream blockage."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：整外靜脈栓塞(VTE)風險分層與預防 (複選 ans ACDE)\n- **A**：以病人為中心(patient-centric)之風險分層於 VTE 中至關重要且常被強調。正確。\n- **B(錯誤者)**：**2005 Caprini score 並非僅含 10 個因子**——其為含**約 40 項危險因子**之加權工具；『only 10 individual factors』與事實不符，故 B 錯誤，不列入正解。\n- **C**：2005 Caprini 可辨識具**強烈 VTE 家族史，或女性 ≥3 次流產史**等潛在遺傳性高凝狀態標記。正確。\n- **D**：**間歇性充氣加壓裝置(SCDs)** 可降低外科病人 VTE 風險(機械性預防)。正確。\n- **E**：術後**緊身衣(garment)** 可能成為醫源性靜脈止血帶(venous tourniquet)造成部分上游阻塞→增 VTE 風險。正確。","peropt":{"A":"◎ 病人為中心之 VTE 風險分層至關重要，正確。","B":"2005 Caprini score 含約 40 項因子非僅 10 項，敘述錯誤，非正解。","C":"◎ Caprini 可辨識 VTE 家族史/≥3 次流產等高凝標記，正確。","D":"◎ SCDs 降低外科病人 VTE 風險，正確。","E":"◎ 術後緊身衣可成醫源性靜脈止血帶增風險，正確。"},"cite":"Neligan 5e VTE prophylaxis；Caprini risk assessment model(2005)。","conflict":""},{"id":"9266","sub":"B9","src":"NG","years":[112,114],"stem":"關於cancer management的描述何者正確(複選)?","opts":{"A":"There has been a gradual progression from radical to more conservative resections of many cancers.","B":"Neoadjuvant therapies have facilitated resectability and even downstaging of some tumors.","C":"Cancer immunotherapies have revolutionized the therapeutic landscape for many cancers.","D":"Targeted therapies represent a new paradigm in the treatment of cancer aiming to combine efficacy and decreased toxicity.","E":"Rational, evidenced approaches to tumor ablation should aim to improve oncologic outcomes and reduce morbidity."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：現代癌症治療典範轉移 (複選 ans ABCDE 全對)\n- **A**：許多癌症之外科切除已由**根除性(radical)漸趨保守(conservative)切除**(如乳癌 BCS、黑色素瘤 margin 縮小)。正確。\n- **B**：**新輔助治療(neoadjuvant)** 促進可切除性(resectability)並使部分腫瘤降期(downstaging)。正確。\n- **C**：**癌症免疫療法(如免疫檢查點抑制劑)** 已革命性改變眾多癌症治療版圖。正確。\n- **D**：**標靶治療(targeted therapy)** 代表兼顧療效與降低毒性之新典範。正確。\n- **E**：理性、實證導向之腫瘤消融(ablation)應以改善腫瘤學預後並降低併發症為目標。正確。\n※ note：本題屬跨年誘答之事實置換題，概念同但測到的事實不同(對照 NG112-B01-Q09)；答案不受影響。","peropt":{"A":"◎ 多數癌症由根除性趨向保守切除，正確。","B":"◎ 新輔助治療促進可切除性與降期，正確。","C":"◎ 免疫療法革命性改變癌症治療版圖，正確。","D":"◎ 標靶治療為兼顧療效與低毒性之新典範，正確。","E":"◎ 實證導向腫瘤消融應改善預後並降併發症，正確。"},"cite":"Neligan 5e oncologic principles；modern cancer therapy paradigms。","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B01-Q09） ｜ ⚠ 同題歷屆重出：cancer management原則(複選)＝以上皆是(根治轉保守/neoadjuvant可降期/免疫學進展→biologic或immunotherapy/targeted therapy/實證式腫瘤切除)。僅C措辭微調(免疫學進展↔免疫治療革命)，112年(9224)與114年(9266)答案皆ABCDE。"},{"id":"9267","sub":"B3","src":"NG","years":[114],"stem":"The anatomic concepts are fundamental to the mapping of the vascular territories and to the planning of incisions and flaps. Which statement about the anatomic concepts is incorrect ?","opts":{"A":"Veins radiate from fixed to mobile areas and arteries converge from mobile to fixed areas.","B":"Vessels “hitchhike” with nerves.","C":"Vessels obey the law of equilibrium.","D":"Muscles are the prime movers of venous return."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：Taylor 血管解剖概念(angiosome)與皮瓣規劃 (選 incorrect 者 ans A)\n- **A(incorrect/答案)**：正確原則為 **動脈(arteries)由固定區向移動區放射(radiate from fixed to mobile)，靜脈(veins)由移動區向固定區匯聚(converge from mobile to fixed)**；題目將動、靜脈方向**對調**故為錯誤敘述(本題答案)。\n- **B**：血管常與神經『搭便車(hitchhike)』並行(neurovascular 伴行)。正確。\n- **C**：血管遵守**平衡律(law of equilibrium)**——某區血管口徑小則鄰區代償增大，彼此互補。正確。\n- **D**：**肌肉為靜脈回流的主要驅動(muscle pump)**——肌肉收縮擠壓靜脈促回流。正確。","peropt":{"A":"◎(incorrect/答案) 動脈由固定→移動放射、靜脈由移動→固定匯聚，題目方向對調，錯誤。","B":"血管與神經伴行搭便車，正確。","C":"血管遵守平衡律相互代償，正確。","D":"肌肉為靜脈回流主要驅動(muscle pump)，正確。","E":"(本題無 E 選項)"},"cite":"Taylor GI, angiosome concept；Neligan 5e vascular territories & flap design。","conflict":""},{"id":"9268","sub":"B5","src":"NG","years":[114],"stem":"關於Principles of microvascular surgery，哪一個選項是錯的?","opts":{"A":"Size-discrepant vessels are commonly encountered, and vessel mismatches of up to 4 : 1 can be anastomosed end-to-end depending on technical skills.","B":"When dealing with atherosclerotic vessels, suture should ideally be passed from the inside of the lumen of the atherosclerotic vessel to the outside.","C":"Vasospasm occurs in 30% of microsurgical procedures and plays an important role in the pathogenesis of hypoperfusion, promoting thrombosis.","D":"Veins appear to be less susceptible to vasospasm than arteries but, once established, harder to resolve and more detrimental.","E":"All the above are correct."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Microvascular surgery 原則與 vasospasm (選『錯』者 ans C)\n- **A**：口徑不一致(size-discrepant)血管常見，端對端吻合可容忍**至多約 4:1** 之口徑差(視技術)。正確。\n- **B**：處理動脈粥狀硬化(atherosclerotic)血管時，縫線理想上應**由管腔內側穿向外側(inside-out)**，以避免掀起斑塊/夾層(dissection flap)。正確。\n- **C(錯/答案)**：**Vasospasm 發生率並非 30%**——文獻所述血管痙攣的實際發生率與本敘述數據不符(顯著偏高)，故為錯誤敘述(本題答案)；vasospasm 確會致低灌注並促血栓形成，但『30%』之數據錯誤。\n- **D**：**靜脈較動脈不易發生 vasospasm**，但一旦發生則較難緩解且後果更嚴重。正確。\n- **E**：因 C 為錯，故『以上皆正確』不成立。","peropt":{"A":"端對端可容忍至多約 4:1 口徑差，正確。","B":"縫合硬化血管應由內向外穿針避免掀起斑塊，正確。","C":"◎(錯/答案) vasospasm 發生率非 30%，數據與事實不符，錯誤。","D":"靜脈較不易 vasospasm 但一旦發生較難解且後果重，正確。","E":"因 C 為錯，『以上皆正確』不成立。"},"cite":"Neligan 5e principles of microsurgery；vasospasm & size mismatch。","conflict":""},{"id":"9269","sub":"B8","src":"NG","years":[114],"stem":"Which of following features is not the properties of an ideal implant?","opts":{"A":"Minimal foreign-body reaction.","B":"Elastic or supple.","C":"Allows collagen ingrowth.","D":"Tolerates infected environment.","E":"Transparent and barely visible."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：理想植入物(ideal implant/alloplast)特性 (選『非』特性者 ans E)\n- 理想植入物特性應包含：\n  - **A 極小異物反應(minimal foreign-body reaction)** ✔\n  - **B 有彈性/柔軟(elastic/supple)** 貼合組織 ✔\n  - **C 允許膠原長入(collagen ingrowth)** 促進整合固定 ✔\n  - **D 能耐受感染環境(tolerates infected environment)/抗感染** ✔\n- **E(非特性/答案)**：**『透明且幾乎不可見(transparent and barely visible)』並非理想植入物之標準特性**——理想特性重視生物相容性、可塑形、可消毒、不致癌、化學惰性、易取得等，而非光學透明度。故 E 為錯誤選項(本題答案)。\n- 補充其他理想特性：化學惰性(chemically inert)、不致癌(noncarcinogenic)、可消毒(sterilizable)、易塑形(easily shaped)、機械強度足夠、成本合理。","peropt":{"A":"極小異物反應為理想特性，屬正確特性。","B":"有彈性/柔軟為理想特性，屬正確特性。","C":"允許膠原長入促整合為理想特性，屬正確特性。","D":"耐受感染環境為理想特性，屬正確特性。","E":"◎(非特性/答案) 『透明幾乎不可見』非理想植入物標準特性，為本題答案。"},"cite":"Grabb & Smith 9e alloplastic implants；Neligan 5e biomaterials 理想 implant 特性。","conflict":""},{"id":"9270","sub":"B7","src":"NG","years":[114,115],"stem":"Which of the following is important in deciding the dose of local anesthetic to be administered?","opts":{"A":"Patient weight","B":"Modality of administration","C":"Epinephrine added or not","D":"Acidity of the environment","E":"All the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：局部麻醉劑量之決定因素 (ans E 全部皆是)\n- 決定 local anesthetic 安全劑量/作用之因素：\n  - **A 病人體重(weight)**：最大劑量以 mg/kg 計(如 lidocaine 4.5 mg/kg；含 epinephrine 7 mg/kg；tumescent 可達 35–55 mg/kg)。✔\n  - **B 給藥方式(modality)**：局部浸潤/區域阻斷/tumescent 之吸收速率與安全劑量不同。✔\n  - **C 是否加 epinephrine**：加腎上腺素→血管收縮、延緩全身吸收、延長作用並提高最大安全劑量。✔\n  - **D 環境酸鹼(acidity/pH)**：組織酸性(如感染/發炎處)使更多藥物呈離子態→穿透力下降、起效差，影響效果。✔\n- **E(答案)**：以上皆為決定劑量/效果之重要考量。\n- 安全補充：警覺 **LAST(local anesthetic systemic toxicity)**，處置以 **20% lipid emulsion(intralipid)** 為關鍵。","peropt":{"A":"病人體重決定 mg/kg 最大劑量，屬正確考量。","B":"給藥方式影響吸收速率與安全劑量，屬正確考量。","C":"加 epinephrine 提高最大安全劑量並延長作用，屬正確考量。","D":"環境酸鹼影響離子化與穿透/起效，屬正確考量。","E":"◎(答案) 以上皆為決定局麻劑量之重要因素。"},"cite":"Neligan 5e local anesthetics；lidocaine max dose & LAST 處置。","conflict":""},{"id":"9271","sub":"B1","src":"NG","years":[114],"stem":"Which of the following wound care strategies should be used with caution and only in state-sanctioned facilities due to the complexity and cost-benefit considerations?","opts":{"A":"Enzymatic debridement","B":"Hyperbaric oxygen therapy","C":"Topical silver sulfadiazine","D":"Autolytic debridement","E":"Negative pressure wound therapy"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：需審慎並限於官方核可機構使用之傷口照護策略 (ans B)\n- **B(答案) 高壓氧治療(Hyperbaric oxygen therapy, HBOT)**：因**設備複雜、成本高、需專用加壓艙與人力、且成本效益考量嚴格**，應審慎使用並限於**國家核可之設施(state-sanctioned facilities)**；適應症如放射性組織損傷、頑固性糖尿病足、氣性壞疽、皮瓣/移植物危象等須嚴格篩選。\n- 其他選項為一般傷口床準備常規手段，不受此限制：\n  - **A 酵素性清創(enzymatic debridement)**：外用膠原酶等，門診可用。\n  - **C 外用 silver sulfadiazine**：抗菌敷料/藥膏，燒傷常規。\n  - **D 自體溶解性清創(autolytic debridement)**：以密閉/水膠敷料利用自身酵素，常規且低成本。\n  - **E 負壓傷口治療(NPWT)**：門診與住院廣泛使用。","peropt":{"A":"酵素性清創為門診常規手段，不受限制。","B":"◎(答案) HBOT 設備複雜成本高，須審慎並限於官方核可設施。","C":"外用 silver sulfadiazine 為抗菌常規，不受限制。","D":"自體溶解性清創為低成本常規手段，不受限制。","E":"NPWT 廣泛使用於門診與住院，不受限制。"},"cite":"Neligan 5e wound bed preparation & adjuncts；HBOT indications。","conflict":""},{"id":"9272","sub":"B11","src":"NG","years":[115],"stem":"過去15至20年內，下列哪一項技術在整形外科領域已發展成熟並成為主流？","opts":{"A":"關節鏡手術 (arthroscopic surgery)","B":"血液透析 (hemodialysis)","C":"穿通枝皮瓣 (perforator flaps)","D":"冠狀動脈繞道手術 (coronary artery bypass grafting)","E":"脊椎椎間盤置換術 (intervertebral disc replacement)"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：過去 15–20 年整形外科成熟並成為主流之技術 (ans C)\n- **C(答案) 穿通枝皮瓣(Perforator flaps)**：近 15–20 年整外**成熟並成主流**之核心技術——概念由 Koshima、Taylor(angiosome)、Blondeel、Hallock 等推進；代表如 **DIEP(乳房重建)、ALT(anterolateral thigh)、TDAP、SGAP** 等，特色為**保留來源肌肉、降低供區併發症、freestyle 設計**。\n- 其他選項辨析(非整外主流/非本領域):\n  - **A 關節鏡手術**：屬骨科領域。\n  - **B 血液透析**：屬腎臟科。\n  - **D 冠狀動脈繞道**：屬心臟外科。\n  - **E 脊椎椎間盤置換**：屬脊椎/神經外科。","peropt":{"A":"關節鏡手術屬骨科，非整外主流技術。","B":"血液透析屬腎臟科，非整外技術。","C":"◎(答案) 穿通枝皮瓣近 15–20 年於整外成熟並成主流。","D":"冠狀動脈繞道屬心臟外科，非整外技術。","E":"椎間盤置換屬脊椎外科，非整外技術。"},"cite":"Neligan 5e perforator flap 發展史(DIEP/ALT 等)。","conflict":""},{"id":"9273","sub":"B11","src":"NG","years":[115],"stem":"關於整形外科歷史發展，下列哪一事件對重建外科技術的合法化及重大進步貢獻最大？","opts":{"A":"文藝復興時期宗教改革","B":"第一次世界大戰，大量顏面傷患促成皮膚移植與皮瓣手術的系統化","C":"二次世界大戰期間抗生素的發明","D":"1960年代顯微外科技術的建立","E":"2000年代電腦輔助設計的應用"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：對重建外科合法化與重大進步貢獻最大之歷史事件 (ans B)\n- **B(答案) 第一次世界大戰(WWI)**：大量**顏面與四肢重傷患**促成皮膚移植、皮瓣手術與顏面重建之**系統化與專科化**；**Sir Harold Gillies** 於 Queen's Hospital(Sidcup)建立現代整形/重建外科基礎，被視為現代整外之奠基與『合法化』關鍵。\n- 其他選項辨析:\n  - **A 文藝復興宗教改革**：時代雖有 Tagliacozzi 鼻重建，但非最大貢獻事件。\n  - **C WWII 抗生素**：重要但主為感染控制，非重建技術系統化之最大推手。\n  - **D 1960s 顯微外科**：重大進展(游離皮瓣)，但題旨『合法化及系統化奠基』以 WWI 為最。\n  - **E 2000s CAD**：屬近代輔助工具，非奠基事件。","peropt":{"A":"文藝復興宗教改革非重建外科合法化最大貢獻事件。","B":"◎(答案) WWI 大量顏面傷患促成皮膚移植/皮瓣系統化(Gillies)，貢獻最大。","C":"WWII 抗生素主為感染控制，非重建技術系統化之最大推手。","D":"1960s 顯微外科為重大進展但非本題奠基/合法化之最。","E":"2000s CAD 為近代輔助工具，非奠基事件。"},"cite":"Neligan 5e history of plastic surgery；Gillies & WWI facial reconstruction。","conflict":""},{"id":"9274","sub":"B10","src":"NG","years":[115],"stem":"關於整形外科患者術前心理評估，下列哪項最能協助醫師判斷患者是否適合手術？","opts":{"A":"患者的年齡及職業背景","B":"患者目前服用的所有藥物及過敏史","C":"患者的財務能力及保險給付狀況","D":"患者的動機（內在自我改善 vs 外在他人期望）、對手術現實的了解程度及是否具有不切實際的期望","E":"患者的家族手術史及遺傳風險"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：整外病人術前心理評估之最關鍵判斷面向 (ans D)\n- **D(答案)**：判斷病人是否適合手術，最能協助者為評估其**①動機(motivation)——內在自我改善 vs 外在他人期望(如取悅伴侶/職場壓力)②對手術現實與限制之了解程度③是否存有不切實際期望(unrealistic expectations)**；此三者直接關聯術後滿意度與心理適應，並可篩檢 BDD 等高風險者。\n- 其他選項辨析(重要但非最能判斷『心理適合度』):\n  - **A 年齡/職業**：背景資料，非心理適合度核心。\n  - **B 藥物/過敏史**：屬麻醉與手術安全評估。\n  - **C 財務/保險**：屬行政與可近性，非心理適合。\n  - **E 家族手術史/遺傳風險**：屬醫療風險評估，非心理動機面向。","peropt":{"A":"年齡/職業為背景資料，非心理適合度核心。","B":"藥物/過敏史屬麻醉與手術安全評估，非心理面向。","C":"財務/保險屬行政可近性，非心理適合度。","D":"◎(答案) 動機(內在vs外在)、對現實了解、不切實際期望最能判斷心理適合度。","E":"家族手術史/遺傳風險屬醫療風險評估，非心理動機。"},"cite":"Neligan 5e psychological assessment of the aesthetic patient；motivation & realistic expectations。","conflict":""},{"id":"9275","sub":"B11","src":"NG","years":[115],"stem":"整形外科醫師理解商業原則的主要原因為何？","opts":{"A":"整形外科執業涉及醫療與商業的雙重性質，了解商業原則有助於建立可持續的執業模式並提供更好的患者照護","B":"使整形外科醫師能自行管理醫院財務","C":"美容整形的商業性質使利潤最大化成為主要目標","D":"政府要求所有醫師必須具備商業管理學位","E":"商業知識可完全取代醫學訓練"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 整外執業的雙重屬性（醫療＋商業）與可持續執業模式\n- 整形外科（尤其結合美容自費與重建健保業務）本質具有 medical + business 雙重性質 (dual nature)。\n- 理解 business principles（成本結構、定價、行銷、人力、法規遵循）的目的是建立 sustainable practice model（可持續執業模式），最終服務於「更好的病人照護」而非單純利潤最大化。\n- 正確定位：商業知識是 enabler（使能者），為醫療服務提供財務永續性；絕非取代醫學訓練，也非以利潤最大化為唯一目標。\n- 常見錯誤觀念：把商業與醫療對立、或視利潤最大化為主要目標，均不符現代 value-based、ethics-driven 的整外執業理念。","peropt":{"A":"◎ 正解。點出雙重性質（醫療＋商業）、建立可持續執業模式、最終目的為更好的病人照護，三者兼備，符合現代整外執業觀。","B":"錯誤。醫師學商業原則並非為了『自行管理整間醫院財務』，範圍與目的錯置。","C":"錯誤。將利潤最大化 (profit maximization) 當成主要目標，違反 ethics 與 value-based care 精神。","D":"錯誤。政府並未要求所有醫師必須具備商業管理學位，屬虛構規定。","E":"錯誤。商業知識絕不能取代醫學訓練，核心仍是臨床專業能力。"},"cite":"Grabb & Smith 9e / Neligan 5e, Business principles in plastic surgery practice","conflict":""},{"id":"9276","sub":"B11","src":"NG","years":[115],"stem":"根據 Michael Porter 提出的價值導向醫療照護 (value-based healthcare) 概念，「價值 (value)」的定義為何？","opts":{"A":"最大化醫院年度利潤","B":"每單位成本所能達到的最大醫療結果 (maximizing outcomes per unit cost)","C":"縮短平均住院天數","D":"增加門診患者就診次數","E":"提升醫師平均薪資水準"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 Michael Porter 之 Value-Based Healthcare：Value = Outcomes / Cost\n- Porter 定義 value（價值）＝ health outcomes achieved per unit of cost（每單位成本所達成的醫療結果）。\n- 分子為對病人真正重要的 outcomes（不只存活，還含功能、生活品質、恢復速度、併發症等 outcome hierarchy）。\n- 分母為 total cost of delivering the full cycle of care（照護全週期的總成本），而非單一項目收費。\n- 核心精神：以病人為中心，追求 outcome 與 cost 的最佳比值，而非壓低住院天數、增加就診量或提高醫師薪資等 process/財務指標。","peropt":{"A":"錯誤。最大化醫院利潤是財務目標，非 Porter 定義的 value。","B":"◎ 正解。value = maximizing outcomes per unit cost，即每單位成本所達成的最大醫療結果。","C":"錯誤。縮短住院天數僅為成本面的 process 指標，非 value 的定義。","D":"錯誤。增加就診次數屬 volume-based 而非 value-based 思維。","E":"錯誤。提升醫師薪資與病人價值無直接關聯。"},"cite":"Porter ME. What Is Value in Health Care? NEJM 2010; Neligan 5e / Grabb & Smith 9e","conflict":""},{"id":"9277","sub":"B3","src":"NG","years":[115],"stem":"皮瓣手術中使用靛氰綠 (indocyanine green, ICG) 螢光灌流影像的主要臨床目的為何？","opts":{"A":"偵測惡性腫瘤的邊界範圍","B":"確認周邊神經的傳導速度","C":"精確測量術中失血量","D":"監測麻醉深度","E":"即時評估皮瓣及組織的血流灌注狀態 (tissue perfusion)"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 ICG 螢光血管攝影 (Indocyanine Green Angiography)：即時評估組織灌流\n- ICG 為靜脈注射之螢光染劑，與血漿蛋白結合後，於近紅外光 (near-infrared, ~800 nm) 下發出螢光。\n- 臨床主要用途：即時、動態評估 flap / tissue perfusion（皮瓣及組織血流灌注），辨識 hypoperfused / 缺血區域。\n- 應用場景：皮瓣設計與 mastectomy skin flap 存活評估、乳房重建、下肢重建、腸道吻合、淋巴水腫 lymphatic mapping 等。\n- 優點：客觀量化灌流、可減少 partial flap necrosis；限制：無法評估神經傳導、腫瘤邊界或麻醉深度。","peropt":{"A":"錯誤。ICG 非為偵測腫瘤邊界（雖有 tumor-specific probe 研究，但非標準灌流用途）。","B":"錯誤。神經傳導速度屬電生理檢查，與 ICG 無關。","C":"錯誤。ICG 不用於測量失血量。","D":"錯誤。麻醉深度以 BIS 等監測，非 ICG。","E":"◎ 正解。ICG 螢光灌流影像即時評估皮瓣與組織的 tissue perfusion，為其核心臨床目的。"},"cite":"Neligan 5e, Vol.1 Flap perfusion assessment / ICG angiography","conflict":""},{"id":"9278","sub":"B7","src":"NG","years":[115],"stem":"關於局部麻醉藥全身毒性 (local anesthetic systemic toxicity, LAST) 的處理，下列何者正確？","opts":{"A":"立即給予高劑量腎上腺素是首選治療","B":"靜脈注射葡萄糖是 LAST 的標準首選治療","C":"LAST 發生後立即停止所有藥物給予並觀察即可","D":"LAST 主要表現為皮膚過敏反應，無需特殊處理","E":"脂肪乳劑 (lipid emulsion，如 Intralipid) 是局部麻醉藥全身毒性的重要解毒治療之一"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 局部麻醉藥全身毒性 (LAST) 與 Lipid Emulsion Rescue\n- LAST 因血中局麻藥濃度過高，阻斷心臟與中樞神經 Na⁺ channel，表現為 CNS（口周麻木、耳鳴、抽搐、意識喪失）與 cardiovascular（心律不整、傳導阻滯、心跳停止）毒性。\n- 處置核心（ASRA guideline）：\n  1. 立即停止注藥、求救、氣道管理與 100% 氧氣。\n  2. 抽搐以 benzodiazepine 控制（避免大劑量 propofol，因心血管抑制）。\n  3. 首要解毒：Lipid emulsion 20% (Intralipid) —— bolus 1.5 mL/kg 續以 infusion（『lipid sink』理論）。\n  4. 心跳停止時 epinephrine 應『減量』使用（≤1 μg/kg），避免高劑量。\n- 布比卡因 (bupivacaine) 心毒性最高。","peropt":{"A":"錯誤。LAST 中 epinephrine 應『低劑量』使用，高劑量反而惡化，非首選。","B":"錯誤。靜脈葡萄糖非 LAST 治療；解毒為 lipid emulsion。","C":"錯誤。LAST 為危急狀況，僅停藥觀察不足，需積極 lipid 與復甦。","D":"錯誤。LAST 非皮膚過敏反應，而是 CNS/心血管毒性。","E":"◎ 正解。Lipid emulsion（Intralipid）是 LAST 的重要解毒治療（lipid sink）。"},"cite":"ASRA Practice Advisory on LAST; Neligan 5e / Grabb & Smith 9e Anesthesia","conflict":""},{"id":"9279","sub":"B11","src":"NG","years":[115],"stem":"評估現有文獻以獲取最佳實證，需具備哪三個核心要素？","opts":{"A":"大樣本數、長追蹤期、多國際中心參與","B":"必須為隨機對照試驗、雙盲設計、安慰劑對照","C":"適合研究問題的研究設計、適當的統計分析方法、臨床上具意義的結果測量指標","D":"經政府認可、通過同儕審查、具高度引用次數","E":"前瞻性研究設計、多變量分析、大型行政資料庫"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 評讀文獻取得最佳實證的三核心要素\n- Evidence-based medicine 的 critical appraisal 並不等同『只認 RCT』；而應依 research question 選擇最適當方法。\n- 三核心要素：\n  1. 適合研究問題的 study design（診斷、預後、治療、傷害各有其最佳設計；治療效果 RCT 佳，但罕見不良事件 cohort/case-control 更可行）。\n  2. 適當的 statistical analysis（依資料型態選正確統計方法，控制 confounding）。\n  3. 臨床上有意義的 outcome measures（patient-important outcomes，而非僅 surrogate marker）。\n- 破除迷思：並非所有問題都須 RCT、雙盲、安慰劑；高引用或政府認可不等於高證據品質。","peropt":{"A":"錯誤。大樣本、長追蹤、多中心是加分條件，非評讀的三核心要素。","B":"錯誤。並非所有研究都必須 RCT／雙盲／安慰劑，過度僵化。","C":"◎ 正解。適當研究設計＋適當統計分析＋臨床有意義的結果指標，為三核心要素。","D":"錯誤。政府認可、同儕審查、引用次數不等於證據內在效度。","E":"錯誤。前瞻設計＋多變量＋大資料庫僅為方法選項之一，非普適三要素。"},"cite":"Neligan 5e / Grabb & Smith 9e, Evidence-based medicine in plastic surgery","conflict":""},{"id":"9280","sub":"B9","src":"NG","years":[115],"stem":"關於腫瘤生長動力學 (tumor growth kinetics)，下列何者正確？","opts":{"A":"所有腫瘤的倍增時間 (doubling time) 均相同，固定為30天","B":"腫瘤以對數方式 (logarithmic fashion) 生長，不同腫瘤倍增時間各異，可在2至200天之間","C":"腫瘤通常在直徑達1公釐時即可被臨床方法偵測到","D":"腫瘤在達到臨界質量前完全不需要血管供應","E":"腫瘤生長速度隨腫瘤增大而線性加速，恆定不變"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 腫瘤生長動力學 (Tumor Growth Kinetics)：對數（Gompertzian）生長\n- 腫瘤呈 logarithmic / exponential（早期）生長；不同腫瘤 doubling time 差異大，約介於 2–200 天。\n- 臨床可偵測門檻：約需 10⁹ 顆細胞（約 1 cm、1 g）才能臨床偵測；1 mm 太小，難以偵測。\n- Gompertzian growth：腫瘤越大，生長分率 (growth fraction) 下降、生長減速（非線性恆速加速）。\n- 血管新生 (angiogenesis)：腫瘤超過約 1–2 mm 即需新生血管供應，並非達臨界質量前完全不需血供。","peropt":{"A":"錯誤。倍增時間並非固定 30 天，各腫瘤不同。","B":"◎ 正解。腫瘤以對數方式生長，doubling time 各異，約 2–200 天。","C":"錯誤。1 mm（約 10⁶ 細胞）通常無法臨床偵測；需約 1 cm。","D":"錯誤。腫瘤 >1–2 mm 即依賴 angiogenesis，並非達臨界質量前完全不需血供。","E":"錯誤。Gompertzian 生長為越大越慢，非線性恆定加速。"},"cite":"Grabb & Smith 9e / Neliga
