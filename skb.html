<style>

.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}

.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}

.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}

.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}

.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}

.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}

.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}

.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}

.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id":"8001","sub":"S3","src":"GS","years":[110],"stem":"由於臉部的血液循環極佳，臉部燒燙傷的病人就算開始時呈現full-thickness injury，也會先採取nonoperative management；在初始的傷口照護後，通常會於多久時間後進行重新評估並將nonhealing area做清創跟植皮?","opts":{"A":"24小時","B":"48小時","C":"3 天","D":"7 天","E":"10~14 天"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：顏面 full-thickness burn 的非手術處置(nonoperative management)與重新評估時機。核心觀念：臉部血液循環豐富、上皮附屬構造(adnexa)密集且再生力強，初期即使呈 full-thickness 樣貌，仍常先給予保守換藥、觀察自癒潛能。② 現代準則：於傷後約 10–14 天重新評估，對確定無法癒合(nonhealing)的區域才進行 debridement 及植皮，以最大化保留臉部原生皮膚、避免過早切除。③ 此原則同樣適用眼周、口周等美觀與功能敏感區。","peropt":{"A":"錯，24 小時過早，此時燒傷深度與癒合潛能尚未明朗。","B":"錯，48 小時仍在急性期，無法判定 nonhealing area。","C":"錯，3 天太早，臉部自癒觀察窗尚未結束。","D":"錯，7 天雖接近但仍未達標準重新評估時點。","E":"◎ 正解。傷後 10–14 天重新評估，對無法自癒區域再行清創植皮，符合現代顏面燒傷保守處置原則。"},"cite":"Grabb & Smith 9e, Facial Burns / Burn Reconstruction","conflict":""},{"id":"8003","sub":"S6","src":"GS","years":[110,113],"stem":"以下哪個先天畸形定義為出生就有，且是高流速型(Fast-flow)?","opts":{"A":"AVM","B":"Venous malformation","C":"Epidermal cyst","D":"Infantile hemangioma","E":"Dermoid cyst"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：ISSVA 血管異常分類 — 出生即存在且屬 fast-flow 者。核心觀念：① Vascular malformations 為出生即有的結構異常，依血流分 slow-flow (capillary, venous, lymphatic) 與 fast-flow (arteriovenous malformation, AVM)。② AVM 具 arteriovenous shunting，是唯一同時符合『先天存在』+『高流速』者，臨床可觸得 thrill、聽得 bruit。③ Venous malformation 為 slow-flow；infantile hemangioma 是腫瘤且出生時多不存在（出生後數週才出現並增生）；epidermal cyst、dermoid cyst 非血管病灶。","peropt":{"A":"◎ 正解。AVM 為出生即存在的 fast-flow 血管畸形，具動靜脈分流。","B":"錯，Venous malformation 為 slow-flow 血管畸形。","C":"錯，Epidermal cyst 為表皮囊腫，非血管病灶。","D":"錯，Infantile hemangioma 屬血管腫瘤，出生時通常尚未出現，非典型『先天』畸形。","E":"錯，Dermoid cyst 為皮樣囊腫，非血管病灶。"},"cite":"Neligan 5e, Vascular Anomalies; ISSVA classification","conflict":""},{"id":"8004","sub":"S7","src":"GS","years":[110],"stem":"Sebaceous nevi皮脂腺母斑 (Nevus sebaceous of Jadassohn)的敘述，以下敘述何者正確? (複選)","opts":{"A":"長在頭皮上時會無毛髮","B":"在青春期會有脫屑與出油症狀","C":"成人後約有10~15%機率轉變成基底細胞癌","D":"轉成鱗狀細胞癌的案例不是沒有，但極為罕見","E":"Margin對病理科來說不容易判斷，因為正常皮膚也擁有皮脂腺"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Nevus sebaceous of Jadassohn 的臨床病理特徵（複選，全對）。核心：① 好發頭皮，因缺乏正常毛囊呈現 alopecic（無毛）黃橙色斑塊。② 青春期受荷爾蒙刺激，皮脂腺與表皮增生，出現疣狀變厚、脫屑與出油。③ 成人期可衍生續發腫瘤，經典教學為約 10–15% 轉為 basal cell carcinoma（現代研究實際 BCC 比例較低，且多為良性 trichoblastoma，但本題採經典數據）。④ 轉為 SCC 有病例報告但極罕見。⑤ 因正常皮膚本就含皮脂腺，病理 margin 判讀不易。","peropt":{"A":"◎ 正確。長在頭皮時因缺乏正常毛囊而呈無毛(alopecic)斑塊。","B":"◎ 正確。青春期荷爾蒙驅動皮脂腺/表皮增生，出現脫屑與出油、疣狀化。","C":"◎ 正確（依經典教學）。成人約 10–15% 可續發 BCC（現代觀點比例較低、多為良性 trichoblastoma）。","D":"◎ 正確。轉為 SCC 有案例但極為罕見。","E":"◎ 正確。正常皮膚亦具皮脂腺，故 margin 對病理判讀不易。"},"cite":"Neligan 5e / Grabb & Smith 9e, Nevus Sebaceous","conflict":""},{"id":"8005","sub":"S3","src":"GS","years":[110,114],"stem":"下列有關化膿性汗腺炎(hidradenitis suppurativa)的成因，以下敘述何者正確?","opts":{"A":"它是皮膚eccrine glands功能異常引發cyst及abscess的formation","B":"它是皮膚apocrine glands功能異常引發細菌反覆感染及abscess的formatio","C":"它是follicular bulb異常的neutrophilic infiltration造成sinus tract的形成及hair follicle的破壞","D":"它是follicular infundibulum異常的lymphocytic infiltration造成hair follicle的破壞","E":"以上皆是"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：化膿性汗腺炎(Hidradenitis Suppurativa, HS)的現代發病機轉。核心觀念更新：HS 已由『大汗腺(apocrine gland)原發疾病』修正為『毛囊閉塞性疾病(follicular occlusion disease)』。① 原發病灶在 follicular infundibulum：角化異常導致毛囊漏斗部閉塞、擴張破裂，引發免疫發炎並破壞毛囊。② 大汗腺受累屬續發性(secondary)，非病因。③ 常合併 acne conglobata、pilonidal sinus、dissecting cellulitis（follicular occlusion tetrad）。","peropt":{"A":"錯，HS 非 eccrine gland 原發功能異常。","B":"錯，apocrine gland 受累為續發現象，非原發病因（此為過時觀念）。","C":"錯，原發病灶在 follicular infundibulum 而非 follicular bulb。","D":"◎ 正解。HS 為 follicular infundibulum 異常、毛囊閉塞與發炎浸潤破壞毛囊的毛囊閉塞性疾病。","E":"錯，前述並非皆是，唯 D 符合現代機轉。"},"cite":"Neligan 5e, Hidradenitis Suppurativa（follicular occlusion 理論）","conflict":""},{"id":"8006","sub":"S3","src":"GS","years":[111],"stem":"Which of the following statements regarding facial burn is correct?","opts":{"A":"The thin skin of the face commonly results in deeper burn injuries","B":"Full-thickness facial burns should be grafted with full-thickness skin","C":"Treatment of full-thickness facial burns with grafting should be delayed until all healing and contraction have completed","D":"Initial treatment of face burns should not include resecting normal adjacent skin","E":"None of the above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：顏面燒傷處置的正確敘述。核心原則：① 臉部應盡量保留原生皮膚，初期不切除鄰近正常皮膚(preserve normal adjacent skin)。② 臉部血循佳、adnexa 豐富，並非因『皮薄』就必然更深。③ full-thickness 顏面燒傷植皮以厚 split-thickness sheet graft、依 aesthetic subunit 進行，並非用 full-thickness graft，也不應等到所有癒合與攣縮完成才植皮。","peropt":{"A":"錯，臉部血循佳、附屬構造多，並非因皮薄而普遍更深。","B":"錯，full-thickness 顏面燒傷多以厚 STSG(sheet) 依美觀單位植皮，非 FTSG。","C":"錯，不應延遲至全部癒合與攣縮完成才植皮，會加重畸形。","D":"◎ 正解。顏面燒傷初期處置不應切除鄰近正常皮膚，須盡量保留。","E":"錯，D 為正確敘述，故非 None of the above。"},"cite":"Grabb & Smith 9e, Facial Burn Management","conflict":""},{"id":"8007","sub":"S7","src":"GS","years":[111,112,114],"stem":"Which of the following lesions are benign without malignant potential? (複選)","opts":{"A":"Sebaceous nevus","B":"Pilomatrixoma","C":"Spitz nevus","D":"Nevus of Ota","E":"Nevus of Ito"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：良性且無惡性潛能之病灶（複選）。核心：關鍵在辨別哪些病灶『帶有惡性潛能』而排除之。① Sebaceous nevus 具惡性潛能（可續發 BCC），故排除。② Pilomatrixoma（毛母質瘤）為良性，pilomatrix carcinoma 極罕見。③ Spitz nevus 為良性痣（雖 atypical Spitz 需審慎，但經典歸類良性）。④ Nevus of Ota、⑤ Nevus of Ito 為真皮黑色素細胞增生的良性色素病灶。","peropt":{"A":"錯，Sebaceous nevus 具惡性潛能（可續發 BCC），不屬本題答案。","B":"◎ 正確。Pilomatrixoma 為良性毛母質瘤，惡性化極罕見。","C":"◎ 正確。Spitz nevus 經典歸類為良性痣。","D":"◎ 正確。Nevus of Ota 為良性真皮黑色素細胞病灶。","E":"◎ 正確。Nevus of Ito 為良性真皮黑色素細胞病灶。"},"cite":"Neligan 5e / Grabb & Smith 9e, Benign Skin Lesions","conflict":""},{"id":"8008","sub":"S7","src":"GS","years":[112,113,114],"stem":"Which statement is wrong about the benign skin lesions?","opts":{"A":"Contact dermatitis is a common condition that is caused by a delayed hypersensitivity reaction (type IV)","B":"Seborrheic Dermatitis may present in infancy cradle cap where it tends to have a more limited course","C":"Psoriasis is a common inflammatory disease affecting the skin that causes characteristic silver scaly, erythematous plaques that are often well demarcated","D":"Rosacea has variable presentation from facial flushing and telangiectasias to papules and pustules","E":"Acne is usually caused by a trigger, such as food, insect bites, or drugs"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：良性皮膚病灶敘述中『錯誤』者。核心：① Acne 的致病機轉是毛囊角化過度、皮脂分泌增加、Cutibacterium (Propionibacterium) acnes 增殖與荷爾蒙影響，而非由食物、蟲咬或藥物『觸發』——故 E 錯誤。② 其餘皆正確：接觸性皮膚炎為 type IV delayed hypersensitivity；脂漏性皮膚炎嬰兒期可呈 cradle cap 且病程較侷限；乾癬為銀白色鱗屑、界線分明的紅斑塊；酒糟(rosacea)表現多樣。","peropt":{"A":"正確，Contact dermatitis 為 type IV 遲發型過敏反應。","B":"正確，Seborrheic dermatitis 嬰兒期可呈 cradle cap，病程較侷限。","C":"正確，Psoriasis 為界線分明、銀白鱗屑的紅斑塊。","D":"正確，Rosacea 表現從潮紅、微血管擴張到丘疹膿疱多樣。","E":"◎ 正解（此為錯誤敘述）。Acne 源於毛囊角化、皮脂與 C. acnes 及荷爾蒙，非由食物/蟲咬/藥物觸發。"},"cite":"Neligan 5e / Grabb & Smith 9e, Common Benign Skin Conditions","conflict":""},{"id":"8009","sub":"S1","src":"GS","years":[112,113,114],"stem":"Which statement is correct about burn injury?","opts":{"A":"Maximal fluid shifts occur around 12 hours after burn.","B":"Burn depth is based on two extrinsic factors: intensity of heat and duration of contact.","C":"Burns greater than 20% of total body surface area (TBSA) cause a system-wide inflammatory response and lead to a systemic inflammatory response syndrome, sometimes called burn shock.","D":"Burn shock results from loss of intravascular volume, cardiac dysfunction, and vascular changes.","E":"All the statement above is correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：燒傷病理生理學的整合敘述（全對）。核心：① 最大體液移位(maximal fluid shift)發生於傷後約數小時至 12 小時之內。② 燒傷深度取決於兩項外在因素：熱源強度(intensity)與接觸時間(duration)。③ >20% TBSA 燒傷會引發全身性發炎反應(SIRS)，即所謂 burn shock。④ Burn shock 成因涵蓋血管內容積喪失、心肌功能不良(cardiac dysfunction)與血管通透性/張力變化。以上皆為標準教科書敘述。","peropt":{"A":"正確，最大體液移位約在傷後 12 小時內達高峰。","B":"正確，燒傷深度取決於熱強度與接觸時間兩外在因素。","C":"正確，>20% TBSA 引發 SIRS(burn shock)。","D":"正確，Burn shock 源於血管內容積喪失、心肌功能不良與血管變化。","E":"◎ 正解。A–D 皆正確，故選 All correct。"},"cite":"Grabb & Smith 9e, Burn Pathophysiology / Burn Shock","conflict":""},{"id":"8010","sub":"S3","src":"GS","years":[112,113,114],"stem":"The following statements about surgical interventions for burn scars and contractures of periorbital area are true except?","opts":{"A":"For upper eyelid reconstruction, scar release should ensure not to violate the orbicularis oculi.","B":"Concurrent temporary tarsorrhaphy sutures with STSG for eyelid reconstruction may lead to recontracture.","C":"Five-flap jumping man flap rearrangement can improve medial canthal webbing.","D":"Immediate intervention should be instated to avoid damage to the globe if ectropion of the upper or lower lid is noted.","E":"Burns of the periorbita that are not thought to heal within the first 10 to 14 days should receive early debridement and grafting."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：眼周(periorbital)燒傷疤痕與攣縮手術原則中『錯誤』者(true except)。核心：① 上眼瞼重建鬆解疤痕時，須避免傷及 orbicularis oculi 以保留閉眼功能。② 施行 STSG 眼瞼重建時，同時做暫時性 tarsorrhaphy 是『預防』再攣縮、維持移植片張力的做法——故『會導致再攣縮』的敘述為錯誤，即本題答案。③ Five-flap (jumping man / double opposing Z) 可改善內眥蹼(medial canthal webbing)。④ 若見上下瞼外翻(ectropion) 危及眼球，須立即介入。⑤ 眼周燒傷若預期 10–14 天內無法癒合，應早期清創植皮。","peropt":{"A":"正確，上瞼鬆解疤痕時應避免破壞 orbicularis oculi。","B":"◎ 正解（此為錯誤敘述/except）。STSG 併暫時性 tarsorrhaphy 是預防再攣縮的手段，非導致再攣縮。","C":"正確，Five-flap jumping man 可改善內眥蹼。","D":"正確，上/下瞼外翻危及眼球時須立即介入。","E":"正確，眼周燒傷預期 10–14 天內無法癒合者應早期清創植皮。"},"cite":"Grabb & Smith 9e, Periorbital Burn Reconstruction","conflict":""},{"id":"8012","sub":"S7","src":"GS","years":[113],"stem":"Which of the following lesions have malignant potential?","opts":{"A":"Sebaceous nevus","B":"Pilomatrixoma","C":"Spitz nevus","D":"Nevus of Ota","E":"Nevus of Ito"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：具惡性潛能之病灶。核心：本題與 8007 互為對照。① Sebaceous nevus (Jadassohn) 具惡性潛能，可續發 basal cell carcinoma（經典數據約 10–15%，現代較低），故為正解。② Pilomatrixoma、Spitz nevus、Nevus of Ota、Nevus of Ito 均為良性色素/附屬器病灶。","peropt":{"A":"◎ 正解。Sebaceous nevus 具惡性潛能，可續發 BCC。","B":"錯，Pilomatrixoma 為良性毛母質瘤。","C":"錯，Spitz nevus 經典歸類為良性痣。","D":"錯，Nevus of Ota 為良性真皮黑色素細胞病灶。","E":"錯，Nevus of Ito 為良性真皮黑色素細胞病灶。"},"cite":"Neligan 5e / Grabb & Smith 9e, Nevus Sebaceous 惡性轉化","conflict":""},{"id":"8013","sub":"S6","src":"GS","years":[114],"stem":"Which of the following syndromes is characterized by hemihypertrophy of a limb in the presence of lymphaticovenous malformations?","opts":{"A":"Klippel-Trenaunay syndrome","B":"Sturge-Weber syndrome","C":"Osler-Weber-Rendu disease","D":"Parkes Weber syndrome","E":"Riley-Smith syndrome"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：肢體半側肥大(hemihypertrophy)合併淋巴靜脈畸形之症候群。核心鑑別：① Klippel-Trenaunay syndrome (KTS) = 微血管-淋巴-靜脈畸形(capillary-lymphatic-venous malformation, slow-flow) + 患肢過度生長/半側肥大，經典三聯徵含 port-wine stain、靜脈曲張、肢體肥大。② 對照 Parkes Weber syndrome：亦有肢體肥大，但合併 AVM/AV fistula 為 fast-flow，是關鍵區別。③ Sturge-Weber(顏面 CM+軟腦膜血管瘤)、Osler-Weber-Rendu(HHT 遺傳性出血性微血管擴張) 不符。","peropt":{"A":"◎ 正解。KTS 為 slow-flow 淋巴靜脈(±微血管)畸形合併患肢半側肥大。","B":"錯，Sturge-Weber 為顏面微血管畸形合併軟腦膜血管異常，非肢體肥大。","C":"錯，Osler-Weber-Rendu(HHT) 為遺傳性微血管擴張，非肢體肥大症候群。","D":"錯，Parkes Weber 雖有肢體肥大但合併 fast-flow AVM，屬鑑別診斷而非本題答案。","E":"錯，Riley-Smith 為巨頭合併血管瘤等，不符本描述。"},"cite":"Neligan 5e, Vascular Malformations (Klippel-Trenaunay)","conflict":""},{"id":"8014","sub":"S6","src":"GS","years":[114],"stem":"Which of the following lasers is commonly used to reduce the red discoloration associated with superficial capillary malformations?","opts":{"A":"Pulsed dye laser","B":"Yag laser","C":"Erbium laser","D":"Alexandrite laser","E":"None of the above"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：淺層微血管畸形(superficial capillary malformation / port-wine stain)紅色消退的雷射選擇。核心機轉：CM 的發色團為真皮淺層擴張微血管中的 oxyhemoglobin，pulsed dye laser (585/595 nm) 藉 selective photothermolysis 精準凝固微血管、淡化紅色，為第一線治療。","peropt":{"A":"◎ 正解。Pulsed dye laser 靶向 hemoglobin，是淺層微血管畸形紅斑的第一線雷射。","B":"錯，YAG(1064 nm)穿透較深、非淺層 CM 首選。","C":"錯，Erbium 為 ablative resurfacing，非血管靶向。","D":"錯，Alexandrite 主要用於除毛/色素，非微血管紅斑。","E":"錯，A 已為正確答案。"},"cite":"Neligan 5e, Capillary Malformation / PDL 治療","conflict":""},{"id":"8015","sub":"S6","src":"GS","years":[112,114],"stem":"A 10-year-old girl presents to you with Kasabach-Merritt syndrome. Which of the following consultants should also be involved prior to surgical intervention?","opts":{"A":"Neurologist","B":"Hematologist","C":"Infectious disease specialist","D":"No consultants needed"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Kasabach-Merritt phenomenon 手術前必要會診（與 8011 同題核心）。核心：KMP 因 KHE/tufted angioma 捕捉血小板，造成嚴重 thrombocytopenia 與消耗性凝血病變，術前須會診血液科(hematologist) 矯正凝血、降低出血風險。","peropt":{"A":"錯，KMP 屬血液學問題，非神經科。","B":"◎ 正解。術前須會診血液科處理血小板減少與凝血病變。","C":"錯，感染科非主要會診對象。","D":"錯，KMP 有致命凝血風險，不可無會診。"},"cite":"Neligan 5e, Kasabach-Merritt Phenomenon","conflict":"跨年選項數不同，視為不同題（對照 GS112-B05-Q05） ｜ ⚠ 同題歷屆重出：Kasabach-Merritt syndrome手術前應一併會診之科別。112年(8011)與114年(8015)皆答B，完全同題（血液科/凝血病變KMP評估）。"},{"id":"8016","sub":"S3","src":"GS","years":[115],"stem":"Which of the following statements regarding facial burn is wrong? (複選)","opts":{"A":"The thin skin of the face commonly results in deeper burn injuries","B":"Full-thickness facial burns should be grafted with full-thickness skin","C":"Treatment of full-thickness facial burns with grafting should be delayed until all healing and contraction have completed","D":"Initial treatment of face burns should not include resecting normal adjacent skin","E":"Indeterminate facial burns should be excised and grafted within the first few days after injury."},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯考點：顏面燒傷『錯誤』敘述（複選）。核心：以正確原則反推——顏面應保留原生皮膚、以厚 STSG sheet 依美觀單位重建、且 indeterminate 者先觀察 10–14 天再決定。① A 錯：臉部血循佳、附屬構造多，非因皮薄而必然更深。② B 錯：full-thickness 顏面燒傷用厚 STSG 而非 FTSG。③ C 錯：不應延遲至全部癒合攣縮完成才植皮。④ E 錯：indeterminate 顏面燒傷不宜在傷後數日內即切除植皮，應先給予非手術觀察 10–14 天。⑤ D 為『正確』敘述（初期不切除鄰近正常皮膚），故不選。","peropt":{"A":"◎ 正解（錯誤敘述）。臉部血循佳，非因皮薄而普遍更深。","B":"◎ 正解（錯誤敘述）。full-thickness 顏面燒傷用厚 STSG，非 FTSG。","C":"◎ 正解（錯誤敘述）。不應延遲至全部癒合與攣縮完成才植皮。","D":"錯（此為正確敘述，故不選）。顏面燒傷初期本就不應切除鄰近正常皮膚。","E":"◎ 正解（錯誤敘述）。Indeterminate 顏面燒傷應先觀察 10–14 天，不宜傷後數日內即切除植皮。"},"cite":"Grabb & Smith 9e, Facial Burn Management","conflict":""},{"id":"8017","sub":"S4","src":"GS","years":[110,115],"stem":"下列哪個病人最適合做sentinel lymph node biopsy (SLNB)?","opts":{"A":"50歲男性，有一個4公分直徑大小的BCC合併lymphovascular invasion","B":"80歲女性在左足跟有1公分直徑大小的melanoma, thickness 1.0mm而且在左側鼠蹊部摸到一個 2公分的 lymph node","C":"4歲男童在臉上有一塊 10公分直徑大小的congenital melanocytic nevus","D":"67歲男性在右食指有0.5公分直徑大小的melanoma，厚度1.5mm","E":"42歲女性，在背部有一塊 0.8公分直徑大小的 melanoma，厚度 0.6mm 且無潰瘍"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Melanoma SLNB 最佳適應病人（含更多干擾選項）。核心原則同 8000：SLNB 用於 Breslow >0.8 mm、臨床淋巴結陰性之 melanoma。① D：食指 1.5 mm (T2)、node-negative，最符合適應症。② E：背部 0.6 mm、無潰瘍 (T1a, <0.8 mm)，轉移風險極低，一般不做 SLNB。③ B：已有可觸腫大淋巴結，應直接廓清。④ A BCC 不做 SLNB；C 良性 CMN 不做。","peropt":{"A":"錯，BCC 極少淋巴轉移，非 SLNB 適應症。","B":"錯，已可觸得 2 cm 腫大淋巴結(clinically node-positive)，應行淋巴結廓清而非 SLNB。","C":"錯，congenital melanocytic nevus 為良性，無 nodal staging 需求。","D":"◎ 正解。1.5 mm (T2)、臨床淋巴結陰性，最符合 SLNB 標準適應症。","E":"錯，0.6 mm 無潰瘍 (T1a, <0.8 mm)，轉移風險極低，一般不建議 SLNB。"},"cite":"Grabb & Smith 9e, Melanoma; AJCC 8th / NCCN SLNB 適應症","conflict":"跨年選項數不同，視為不同題（對照 GS110-B04-Q01） ｜ ⚠ 同題歷屆重出：「下列哪個病人最適合做SLNB」。110年(8000)與115年(8017)皆答D，完全同題（依Breslow厚度/潰瘍判定SLNB適應症）。"},{"id":"8018","sub":"S1","src":"GS","years":[115],"stem":"A 47-year-old, 50-kg otherwise healthy woman presents to the trauma bay with 55% total body surface area burns to the chest, back, and extremities. She has an additional 10% TBSA of first-degree burns. Pulses are intact and extremities are warm. The burns are pink and blanching, but bullae are present in most areas. The patient was given 2L of Lactated Ringer's (LR) in the field over the last 2 hours since sustaining the burn. What is the recommended initial rate of resuscitation for this patient?","opts":{"A":"300 mL/h","B":"343.75 mL/h","C":"472 mL/h","D":"583.3 mL/h","E":"687.5 mL/h"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：燒傷輸液復甦速率計算（Parkland formula 併已輸液調整）。核心：本題採 Parkland 4 mL/kg/%TBSA。①TBSA 只計 partial+full thickness(=55%)，first-degree(10%) 不計。②總量 = 4 × 50 kg × 55 = 11,000 mL/24h；前 8 小時給一半 = 5,500 mL。③病人受傷已 2 小時、院前已給 2,000 mL LR，故前 8 小時剩餘 5,500 − 2,000 = 3,500 mL，須在剩餘 6 小時內給完。④速率 = 3,500 ÷ 6 ≈ 583.3 mL/h。（註：若忽略已輸液與時間，5,500÷8=687.5 為干擾選項 E；2 mL 版本 343.75 為選項 B。）","peropt":{"A":"錯，300 mL/h 不符任何合理計算。","B":"錯，343.75 mL/h 為 2 mL/kg/%TBSA 版本且未扣除已輸液，非本題採用。","C":"錯，472 mL/h 非正確計算結果。","D":"◎ 正解。Parkland 前 8h 需 5,500 mL，扣除已給 2,000 mL 後於剩餘 6h 給 3,500 mL ≈ 583.3 mL/h。","E":"錯，687.5 mL/h(=5,500÷8) 未扣除已輸液與已過時間，為常見陷阱。"},"cite":"Grabb & Smith 9e, Burn Resuscitation (Parkland formula)","conflict":""},{"id":"8019","sub":"S3","src":"GS","years":[110,115],"stem":"下列何種雷射最適合用來治療erythematous but not hypertrophic burn scar?","opts":{"A":"Pulse dye laser","B":"Alexandrite laser","C":"CO2 laser","D":"erbium:YAG laser","E":"Nd:YAG laser"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：紅色但未肥厚(erythematous, non-hypertrophic)燒傷疤痕的雷射選擇（與 8002 同核心）。核心：紅斑之發色團為 hemoglobin，pulsed dye laser (585/595 nm) 藉 selective photothermolysis 靶向血管、消退紅斑，為首選。消融型(CO2、Er:YAG)與 Nd:YAG、Alexandrite 皆非單純紅斑之最適選擇。","peropt":{"A":"◎ 正解。Pulsed dye laser 靶向 hemoglobin，最適紅色未肥厚疤痕。","B":"錯，Alexandrite 主要用於除毛/色素。","C":"錯，CO2 為 ablative 雷射，處理肥厚/質地。","D":"錯，Er:YAG 為 ablative resurfacing，非血管靶向。","E":"錯，Nd:YAG(1064 nm) 穿透深，非淺層紅斑首選。"},"cite":"Grabb & Smith 9e, Laser Treatment of Burn Scars","conflict":"跨年選項數不同，視為不同題（對照 GS110-B04-Q03） ｜ ⚠ 同題歷屆重出：「何種雷射最適合治療erythematous but not hypertrophic burn scar」。110年(8002)與115年(8019)皆答A，完全同題（PDL / pulsed-dye laser）。"},{"id":"8020","sub":"S4","src":"GS","years":[115],"stem":"Which of the following is not a clinical diagnostic feature of dysplastic nevi?","opts":{"A":"Diameter > 5 mm","B":"Ill-defined borders","C":"Dark pigmentation","D":"Irregular margins","E":"Ulceration"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Dysplastic (atypical) nevus 的臨床診斷特徵中『不屬於』者。核心特徵：① 直徑常 >5 mm；② 邊界模糊不清(ill-defined borders)；③ 邊緣不規則(irregular margins)；④ 色澤『多變/斑駁(variegated)』而非單一深色。故『dark pigmentation(均一深色)』並非其診斷特徵——正解 C（dysplastic nevus 強調 variegated color 而非均勻深色）。⚠答案疑義：ulceration(E) 屬 melanoma 之警訊、亦非 dysplastic nevus 特徵，嚴格而言 C、E 皆可視為『非特徵』，本題屬設計上有雙解爭議；惟依權威答案以 C 為準。","peropt":{"A":"正確特徵，dysplastic nevus 常直徑 >5 mm。","B":"正確特徵，邊界模糊不清(ill-defined borders)。","C":"◎ 正解（非特徵）。dysplastic nevus 強調 variegated/多變色澤而非均一 dark pigmentation。","D":"正確特徵，邊緣不規則(irregular margins)。","E":"Ulceration 為 melanoma 警訊，嚴格說亦非 dysplastic nevus 特徵（與 C 形成雙解爭議，但權威答案取 C）。"},"cite":"Neligan 5e / Grabb & Smith 9e, Dysplastic (Atypical) Nevus","conflict":""},{"id":"8021","sub":"S6","src":"GS","years":[115],"stem":"A 6-week-old girl presents with a rapidly enlarging red lesion of her cheek that was first noted at 2 weeks of age. Which of the following is the most likely diagnosis?","opts":{"A":"Infantile hemangioma","B":"Kaposiform hemangioendothelioma","C":"Venous malformation","D":"Arteriovenous malformation"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：嬰兒血管病灶之鑑別——出生後數週出現、快速增大的紅色病灶。核心：① Infantile hemangioma (IH) 典型於出生後 1–4 週出現，接著進入 proliferative phase 快速增生（6 週齡、2 週前才被注意到、迅速變大之紅色頰部病灶最符合）。② IH 免疫組化 GLUT-1 陽性。③ KHE 較罕見、多出生即較大並可合併 KMP；venous malformation 出生即存在、緩慢生長；AVM 為 fast-flow，非此典型表現。","peropt":{"A":"◎ 正解。Infantile hemangioma 出生後數週出現並快速增生，符合此病史。","B":"錯，Kaposiform hemangioendothelioma 較罕見、常出生即存在並可合併 Kasabach-Merritt。","C":"錯，Venous malformation 出生即存在、緩慢生長，非快速增大之紅色病灶。","D":"錯，AVM 為 fast-flow 畸形，非此典型嬰兒快速增大紅斑表現。"},"cite":"Neligan 5e, Infantile Hemangioma (proliferative phase, GLUT-1+)","conflict":""},{"id":"8025","sub":"S3","src":"NG","years":[104],"stem":"The keratinocyte apoptosis in TEN appears to be activated by which procedure?","opts":{"A":"receptor Fas (CD95)","B":"CD4+ T lymphocytes","C":"Lymphocyte","D":"erythropoietin","E":"monocyte"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【TEN 角質細胞凋亡機轉】正解 A：Fas (CD95)。經典機轉：活化的 cytotoxic CD8+ T cells／NK 表現 Fas ligand (FasL/CD95L)，與 keratinocyte 表面 Fas (CD95) 結合，啟動 caspase 級聯導致大面積 apoptosis→表皮全層剝離。現代重點：granulysin 被視為造成角質細胞死亡最主要之可溶性介質，另有 perforin/granzyme、可溶性 FasL、TNF-α 參與。","peropt":{"A":"◎ Fas (CD95)—FasL 結合啟動角質細胞凋亡，為經典機轉。","B":"CD4+ T cells 非主要凋亡執行者（細胞毒性以 CD8+ 為主）——錯。","C":"『Lymphocyte』過於籠統，非啟動凋亡之受體機轉——錯。","D":"Erythropoietin 與 TEN 凋亡無關——錯。","E":"Monocyte 非啟動角質細胞凋亡之路徑——錯。"},"cite":"Neligan PS 5e；TEN/SJS pathophysiology（Fas-FasL、granulysin）","conflict":""},{"id":"8026","sub":"S1","src":"NG","years":[104],"stem":"In the burn care nutrition and management, which of the following is wrong?","opts":{"A":"Strict glucose control of 150–200 mg/dL can decreased infectious complications and mortality rates.","B":"Hepatic proteins (albumin, transferrin, prealbumin) have a role acute phase reactants, and are profoundly affected by fluid status and by metabolic stress","C":"In clinical studies, oxandrolone 10 mg orally twice daily improved wound healing, restored lean body mass, and accelerated body weight gain in severe thermal injury.","D":"glutamine and arginine have been demonstrated to improve outcomes such as length of stay, infection rate, mortality in critically ill patients including burn patients.","E":"β-blockers after severe burns decrease heart rate, resulting in reduced cardiac index and decreased supraphysiologic thermogenesis."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【燒傷營養與代謝管理（選錯誤）】正解 A。血糖控制：hyperglycemia 惡化感染與死亡，應積極控制（一般目標 <150 mg/dL，多採 ~110–150 區間），故『150–200 mg/dL 為 strict control 且能降低感染與死亡』為錯——該範圍偏高、非嚴格控制。其餘正確：肝臟蛋白（albumin/transferrin/prealbumin）為 negative acute phase reactants，受體液與代謝壓力影響；oxandrolone 10 mg BID 促傷口癒合、恢復 lean body mass；glutamine/arginine 可改善危重與燒傷病人預後；β-blocker（propranolol）降心率、減少心臟作功與 supraphysiologic thermogenesis（hypermetabolism）。","peropt":{"A":"◎ 150–200 mg/dL 屬偏高、非 strict，且未證能降感染死亡——錯誤敘述，選之。","B":"肝蛋白為 acute phase reactants、受體液與代謝壓力影響——正確。","C":"Oxandrolone 10 mg BID 改善癒合與 lean body mass——正確。","D":"Glutamine/arginine 改善住院天數、感染、死亡——正確。","E":"β-blocker 降心率、減 supraphysiologic thermogenesis——正確。"},"cite":"Neligan PS 5e Burns（Herndon 代謝/營養）；oxandrolone、propranolol EBM","conflict":""},{"id":"8027","sub":"S1","src":"NG","years":[104],"stem":"關於burn shock以下敘述何者錯誤?","opts":{"A":"burn shock通常發生在cutaneous thermal injury greater than one-third of the TBSA","B":"unresuscitated burn shock correlates with increased hematocrit values in burned patients.","C":"burn shock discontinues as a significant pathophysiologic state after hypovolemia is corrected.","D":"burn shock is a complex process of circulatory and microcirculatory dysfunction","E":"massive fluid shifts can occur even though total body water remained unchanged."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Burn shock 病生理（選錯誤）】正解 C。Burn shock 並非單純 hypovolemia——即使血容量補足，因持續之 inflammatory mediator 釋放與 microcirculatory／細胞膜功能障礙，休克狀態仍會延續一段時間，故『矯正 hypovolemia 後 burn shock 即停止』為錯。其餘正確：常見於 >1/3 TBSA 皮膚熱傷；未復甦時因 hemoconcentration 使 hematocrit 上升；為循環與微循環複雜功能障礙；因體液大量再分佈（intravascular→interstitial）即使 total body water 不變仍可有巨量 fluid shift。","peropt":{"A":"Burn shock 多見於 >1/3 TBSA 熱傷——正確。","B":"未復甦之 burn shock 伴 hematocrit 上升（血液濃縮）——正確。","C":"◎ 矯正 hypovolemia 後 burn shock 仍持續（含發炎/細胞成分），敘述稱『停止』——錯誤，選之。","D":"為循環與微循環之複雜功能障礙——正確。","E":"體液再分佈可致巨量 fluid shift 而 total body water 不變——正確。"},"cite":"Neligan PS 5e Burns；burn shock pathophysiology","conflict":""},{"id":"8029","sub":"S3","src":"NG","years":[104],"stem":"Which drugs are most commonly implicated in SJS and TEN ? (複選)","opts":{"A":"sulfonamides (co-trimoxazole)","B":"anticonvulsants (phenobarbital, phenytoin, carbamazepine)","C":"antibiotics (aminopenicillins, quinolones, cephalosporins),","D":"nonsteroidal anti-inflammatory drugs, and allopurinol","E":"acetaminophen and acetylsalicylic acid"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【SJS/TEN 最常見致病藥物（複選：全選 ABCDE）】高危族群記憶：『SATAN』概念——Sulfonamides、Anticonvulsants、Allopurinol、NSAIDs（oxicam 類）、Antibiotics。全部選項皆為文獻列出之常見致病藥物。潛伏期多為用藥後 1–3 週。allopurinol 於亞洲族群與 HLA-B*58:01 相關；carbamazepine 與 HLA-B*15:02（台灣/漢人）強相關為考試重點。","peropt":{"A":"◎ Sulfonamides（co-trimoxazole）為最典型致病藥。","B":"◎ 抗癲癇藥（phenobarbital/phenytoin/carbamazepine）常見。","C":"◎ 抗生素（aminopenicillins、quinolones、cephalosporins）常見。","D":"◎ NSAIDs 與 allopurinol 常見。","E":"◎ Acetaminophen 與 aspirin 亦被列為相關藥物。"},"cite":"Neligan PS 5e；SJS/TEN culprit drugs；HLA-B*15:02（carbamazepine）","conflict":""},{"id":"8030","sub":"S3","src":"NG","years":[104],"stem":"In facial burn management, which statement in the following is right? (複選)","opts":{"A":"All facial burns should have an ophthalmological exam on admission","B":"Various ointments, corneal shields, or protective contact lenses help shield the cornea from further injury.","C":"Tarsorrhaphy does not prevent wound contraction","D":"In the very young patient population, eyelid closure for as little as 3 days places an infant at a high risk for blindness in the affected eye.","E":"Prolonged occlusion of the eye due to scar contracture leads to decreased retinal stimulation and subsequently poor neuronal development of the corresponding optic cortex."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【顏面燒傷之眼部處理（複選：選正確，全對 ABCDE）】原則：所有顏面燒傷入院即行眼科檢查（含 fluorescein 評估角膜）；以軟膏、corneal shield 或保護性隱形眼鏡護角膜。Tarsorrhaphy 可護眼球但『不能』防止傷口攣縮（scar contraction）。幼兒特別脆弱——眼瞼閉合僅 3 天即可能因 deprivation 致弱視/失明；長時間閉塞→retinal stimulation 減少→對應 optic cortex 神經發育不良（deprivation amblyopia）。","peropt":{"A":"◎ 所有顏面燒傷入院即眼科檢查——正確。","B":"◎ 軟膏/corneal shield/隱形眼鏡護角膜——正確。","C":"◎ Tarsorrhaphy 不能防止傷口攣縮——正確。","D":"◎ 幼兒眼瞼閉合僅 3 天即高失明風險——正確。","E":"◎ 長期閉塞致視網膜刺激減少、視皮質發育不良——正確。"},"cite":"Neligan PS 5e Facial burns / periorbital burn management","conflict":""},{"id":"8031","sub":"S2","src":"NG","years":[104],"stem":"The radiographic studies play a role in the cold injury. Which of the statement in the following is correct? (複選)","opts":{"A":"99mTc bone scans can be used to evaluate perfusion of bone and soft tissue and predict the final extent of tissue damage from frostbite.","B":"99mTc bone scan images are acquired over three phases: the blood flow phase, the blood pool phase, and the delayed bone phase","C":"The areas of nonuptake in the delayed bone phase will usually require amputation","D":"Magnetic resonance imaging and angiography may be superior to 99mTc bone scans in the evaluation of frostbite due to the ability to visualize occluded vessels","E":"The diagnostic accuracy of bone scans performed at 48 h post-injury is only 84%, but can be improved when bone scans are delayed until 7–10 days post-injury"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯【Frostbite 影像評估（複選：選正確，全對 ABCDE）】99mTc bone scan 用於評估骨與軟組織灌流、預測最終組織壞死範圍；三時相：blood flow phase、blood pool phase、delayed bone phase。Delayed phase 之 nonuptake 區多預示需截肢。MRI/MRA 因能直接顯示阻塞血管，於評估上可優於 bone scan。診斷準確度：48 小時 ~84%，延至傷後 7–10 天可提升。臨床上早期影像有助界定截肢範圍並支持 tPA 溶栓決策。","peropt":{"A":"◎ 99mTc bone scan 評估骨/軟組織灌流、預測壞死範圍——正確。","B":"◎ 三時相：blood flow、blood pool、delayed bone——正確。","C":"◎ Delayed phase nonuptake 區多需截肢——正確。","D":"◎ MRI/MRA 可顯示阻塞血管、可優於 bone scan——正確。","E":"◎ 48h 準確度 84%、延至 7–10 天可提升——正確。"},"cite":"Neligan PS 5e Cold injury/frostbite；99mTc triple-phase bone scan","conflict":""},{"id":"8032","sub":"S6","src":"NG","years":[104,105],"stem":"下列有關 vascular anomalies, 何者敘述為錯誤: (複選)","opts":{"A":"Vascular tumors are endothelial neoplasms characterized by increased endothelial turnover.","B":"Vascular malformations are the result of abnormal development of vascular elements during embryogenesis.","C":"Pyogenic granuloma is one of the vascular tumors and rarely spontaneously heals.","D":"In proliferative phase(infancy), circular IH lesions located in visible areas, particularly the face, are best treated by sclerotherapy.","E":"The goal of AVMs treatment is to cure the malformation by resection and the re-expansion rate is low."},"ans":"DE","multi":true,"etype":"ai","expl":"","key":"🎯【Vascular anomalies（複選：選錯誤）】錯誤者＝D、E（與 8024 同組觀念）。• D：增生期臉部 IH 首選 oral propranolol，非 sclerotherapy。• E：AVM 切除後 re-expansion／復發率其實『高』，非低。正確者：vascular tumors 為內皮增生腫瘤；malformations 為胚胎期發育異常；pyogenic granuloma 屬 vascular tumor 且少自癒。","peropt":{"A":"Vascular tumors 為內皮腫瘤、turnover 增加——正確（非選）。","B":"Malformations 源於胚胎期發育異常——正確（非選）。","C":"Pyogenic granuloma 屬 vascular tumor、少自癒——正確（非選）。","D":"◎ 增生期臉部 IH 首選 propranolol 非 sclerotherapy——錯誤，選之。","E":"◎ AVM 復發/re-expansion rate 應為高——錯誤，選之。"},"cite":"Neligan PS 5e Vascular anomalies（ISSVA）","conflict":"⚠ 同題歷屆重出（中英雙語同考點）：「vascular anomalies 敘述何者錯誤(複選)」。英文104年(8024)答CE、中文105年(8032)答DE；同考點跨語言，選項不同致答案互異。"},{"id":"8033","sub":"S5","src":"NG","years":[104,105],"stem":"有關malignant mesenchymal-origin tumors, 何者是錯誤的:","opts":{"A":"Over 90% of DFSP(dermatofibrosarcoma protuberans) tumors have the chromosomal translocation t(17;22) that fuses the collagen gene COL1A1 with the platelet-derived growth factor gene.","B":"DFSP tumors metastasize rarely, but distant metastasis to the lung can result from local recurrence.","C":"Kaposi's sarcoma is caused by the Kaposi's sarcoma-associated herpesvirus (KSHV), also known as human herpesvirus 8.","D":"There are three types of (MFH): (1) storiform-pleomorphic type; (2) myxoid type; and (3) giant cell type","E":"Chemotherapy or traditional radiotherapy is not very effective for most chondrosarcomas, although proton beam radiation therapy is showing promise with regard to local tumor control"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【惡性間葉來源腫瘤（選錯誤）】正解 D。經典教學 MFH（Malignant fibrous histiocytoma）分為『五型』：storiform-pleomorphic、myxoid（myxofibrosarcoma）、giant cell、inflammatory、angiomatoid；D 稱僅三型故錯。現代觀念：MFH 已被 WHO 重新歸類為 undifferentiated pleomorphic sarcoma。正確者：DFSP >90% 帶 t(17;22) COL1A1–PDGFB 融合、極少轉移但局部復發可致肺轉移；Kaposi sarcoma 由 KSHV/HHV-8 引起；chondrosarcoma 對化放療多不敏感，proton beam 對局部控制具前景。","peropt":{"A":"DFSP >90% 帶 t(17;22) COL1A1–PDGFB 融合——正確。","B":"DFSP 少轉移，局部復發可致肺轉移——正確。","C":"Kaposi sarcoma 由 KSHV/HHV-8 引起——正確。","D":"◎ MFH 經典為五型（非三型），現歸 undifferentiated pleomorphic sarcoma——錯誤，選之。","E":"Chondrosarcoma 對化放療多不敏感、proton beam 具前景——正確。"},"cite":"Neligan PS 5e Malignant soft-tissue tumors；WHO soft tissue（MFH→UPS）","conflict":"跨年數值差異（Neligan 3e vs Neligan 3e）：D: 104「Malignant fibrous histiocytoma (MFH) us 」 vs 105「There are three types of (MFH): (1) stor」 ｜ ⚠ 同題歷屆重出（中英雙語同考點）：「malignant mesenchymal-origin tumors 何者錯誤/wrong description」。英文104年(8022)與中文105年(8033)皆答D，同題跨語言重出。"},{"id":"8035","sub":"S7","src":"NG","years":[105],"stem":"Jadassohn first described the disease in 1895. It is a well-circumscribed yellow or orange lesion that occurs mainly on the face and scalp of infants. Clinically, the lesion presents as a solitary hairless patch noted at birth. Histologically, it is a hamartomatous lesion consisting of predominantly secretory glands, abortive hair follicles, and ectopic apocrine glands.. Malignant transformation occurs in 10–15% of lesions in some series. The name of the disorder is called:","opts":{"A":"Xeroderma pigmentosa","B":"Dysplastic nevus syndrome","C":"Nevoid basal cell carcinoma syndrome (NBCCS)","D":"nevus sebaceum","E":"Aplasia cutis congenita"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Nevus sebaceus (of Jadassohn)】正解 D。Jadassohn 1895 首述；出生即有之孤立、無毛、黃橙色斑塊，好發頭皮與顏面。組織學為 hamartoma，含增多之皮脂腺、發育不全毛囊與異位 apocrine 腺。青春期因荷爾蒙而增厚呈疣狀。惡性轉化：舊文獻報 10–15%，現代觀念認為真正 BCC 風險遠低（約 <1%），較常見者為良性 trichoblastoma、syringocystadenoma papilliferum。","peropt":{"A":"Xeroderma pigmentosum 為 DNA 修復缺陷、光敏、多發皮癌——不符。","B":"Dysplastic nevus syndrome 為多發非典型痣——不符。","C":"NBCCS（Gorlin syndrome）為多發性 BCC 症候群——不符。","D":"◎ Nevus sebaceum（of Jadassohn）——符合全部描述，正解。","E":"Aplasia cutis congenita 為先天皮膚缺損——不符。"},"cite":"Neligan PS 5e Benign/pediatric skin lesions；nevus sebaceus","conflict":""},{"id":"8036","sub":"S7","src":"NG","years":[105],"stem":"Which one of the following statement concerning of the Congenital melanocytic nevi is incorrect?","opts":{"A":"one of the risk factors for eventual development of cutaneous and extracutaneous melanoma, with larger nevi having greater risk","B":"The treatment of large and giant nevi is controversial.","C":"The lifetime risk of malignant melanoma for small and medium congenital pigmented nevi is reported to be 0–4.9%","D":"Serial excision can be applied to small or medium nevi, depending on the location of the nevus and the laxity of the local skin","E":"The most common location of giant nevi was found to be over the scalp."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【先天黑色素細胞痣 CMN（選錯誤）】正解 E。Giant CMN 最常見部位為『軀幹』（尤後軀幹，bathing-trunk 分佈），非頭皮，故 E 錯。其餘正確：CMN 為皮膚及皮膚外 melanoma 之危險因子，痣越大風險越高；large/giant 之治療具爭議；小/中型痣終生 melanoma 風險約 0–4.9%；小/中型可視位置與皮膚鬆弛度採 serial excision。大型/giant CMN 另需注意 neurocutaneous melanosis 風險。","peropt":{"A":"CMN 為皮膚/皮膚外 melanoma 危險因子、越大風險越高——正確。","B":"large/giant 之治療具爭議——正確。","C":"小/中型終生 melanoma 風險 0–4.9%——正確。","D":"小/中型可依位置與皮膚鬆弛採 serial excision——正確。","E":"◎ Giant nevi 最常見於軀幹而非頭皮——錯誤，選之。"},"cite":"Neligan PS 5e Congenital melanocytic nevi；neurocutaneous melanosis","conflict":""},{"id":"8037","sub":"S5","src":"NG","years":[105],"stem":"The following description which one is correct about the pediatric Rhabdomycosarcoma? (複選)","opts":{"A":"Rhabdomyosarcoma is the most common of the pediatric soft-tissue sarcomas.","B":"It is the most common solid, extracranial, pediatric tumor (before Wilms tumor and neuroblastoma)","C":"This is a malignant tumor of mesenchymal origin.","D":"Three histological types include embryonal, alveolar, and pleomorphic rhabdomyosarcoma.","E":"Metastases occur through blood or lymphatic channels to lymph nodes, lungs, bones, or brain."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯【小兒 Rhabdomyosarcoma（複選：選正確 ACDE）】RMS 為小兒最常見之軟組織肉瘤、屬 mesenchymal 來源之惡性腫瘤。組織型：embryonal（最常見、預後較好，好發頭頸/泌尿生殖）、alveolar（預後差、PAX–FOXO1 融合）、pleomorphic（罕、多見成人）。轉移經血行或淋巴至淋巴結、肺、骨、腦。B 為錯：最常見之小兒 extracranial 實質固態腫瘤為 neuroblastoma（其次 Wilms），RMS 僅為最常見之軟組織肉瘤，故 B 不選。","peropt":{"A":"◎ RMS 為小兒最常見軟組織肉瘤——正確。","B":"小兒最常見 extracranial 固態腫瘤為 neuroblastoma（非 RMS）——錯誤，不選。","C":"◎ 為 mesenchymal 來源之惡性腫瘤——正確。","D":"◎ 三型：embryonal、alveolar、pleomorphic——正確。","E":"◎ 經血行/淋巴轉移至淋巴結、肺、骨、腦——正確。"},"cite":"Neligan PS 5e Pediatric soft-tissue sarcoma；rhabdomyosarcoma","conflict":""},{"id":"8038","sub":"S1","src":"NG","years":[105],"stem":"小兒燒傷入院(pediatric burn admission)的最常見之原因為何？","opts":{"A":"Flame burn","B":"Scald burn","C":"Tar burn","D":"Chemical burn","E":"Electrical burn"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【小兒燒傷入院最常見原因】正解 B：Scald burn（熱液燙傷）。幼兒（尤 <5 歲學步兒）以熱水/熱飲潑濺、浸泡最常見；flame burn 隨年齡增長（較大兒童/青少年）比例上升。臨床意涵：scald 多為淺至中度真皮傷，且需高度警覺非意外傷害（child abuse，如對稱性 stocking/glove 分佈、明確界線之浸泡傷）。","peropt":{"A":"Flame burn 於較大兒童/青少年比例上升，非幼兒最常見——非。","B":"◎ Scald（熱液）為小兒燒傷入院最常見原因，正解。","C":"Tar burn 屬職業/特殊機轉，罕見於幼兒——非。","D":"Chemical burn 相對少見——非。","E":"Electrical burn 相對少見——非。"},"cite":"Neligan PS 5e Pediatric burns / epidemiology","conflict":""},{"id":"8039","sub":"S1","src":"NG","years":[105],"stem":"下列哪種物質可以最有效(時間最快)地移除tar from tar burn?","opts":{"A":"Butter","B":"Alcohol","C":"Acetone","D":"Gasoline","E":"Ether"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【Tar burn 除瀝青最快且安全之物質】正解 A：Butter（奶油）。原則：先大量冷水冷卻使瀝青凝固降溫、勿強行剝除（會撕脫表皮），再以親脂性 emulsifying agent 乳化溶解。奶油等含脂質乳化劑（另如 mineral oil、抗生素油膏 polymyxin/bacitracin、柑橘–石油溶劑 De-Solv-it）可有效且安全去除。有機溶劑（alcohol、acetone、gasoline、ether）具細胞毒性、易燃、且會加重組織傷害，屬禁忌。","peropt":{"A":"◎ Butter 為親脂性乳化劑，可快速且安全乳化去除瀝青，正解。","B":"Alcohol 為溶劑、乾燥且具毒性/易燃——不宜。","C":"Acetone 具細胞毒性、刺激——不宜。","D":"Gasoline 有毒且高度易燃——不宜。","E":"Ether 有毒且易燃——不宜。"},"cite":"Neligan PS 5e Burns（tar burn management）","conflict":""},{"id":"8040","sub":"S1","src":"NG","years":[105,109,111,112,113],"stem":"關於燒燙傷病患的輸液治療，以下哪項為是？","opts":{"A":"Inhalation injury不會增加水分流失","B":"靜脈輸液的效果優於自口補充液體","C":"血壓是輸液的最佳治療依據","D":"重大燒燙傷會引發全身性的發炎反應，造成微血管滲漏（capillary leak），血管內水分流至組織間隙","E":"Colloid fluid一般在燒燙傷後馬上給予"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【燒傷輸液治療（選正確）】正解 D：重大燒傷引發全身性發炎反應（SIRS），介質使 capillary leak，血管內液滲入 interstitium，為 burn edema 與 shock 之核心機轉。其餘為錯：A：inhalation injury 會『增加』體液需求；B：主要以 IV crystalloid（LR）復甦，但『IV 一律優於口服』並非本題正確原則（小面積可口服）；C：輸液最佳指標為 urine output（成人 0.5、兒童 1 mL/kg/h），非血壓；E：colloid 一般延後給予（多於傷後 8–24 h、微血管滲漏改善後），非立即給予。","peropt":{"A":"Inhalation injury 會增加水分流失/輸液需求——錯。","B":"並非『IV 一律優於口服』，小面積可口服補液——非本題正解。","C":"輸液最佳指標為 urine output 而非血壓——錯。","D":"◎ 重大燒傷之 SIRS 致 capillary leak、液體外滲至間隙——正確，選之。","E":"Colloid 多延後（8–24 h 後）給予，非立即——錯。"},"cite":"Neligan PS 5e Burn resuscitation（capillary leak、urine output 指標）","conflict":"⚠ 同題歷屆重出（中英雙語同考點）：燒傷病人輸液復甦「何者為是/which is TRUE」。中文版105/109/111年(8040)答D、英文版112/113年(8101)答C；同一考點跨語言重出，選項次序不同致答案字母互異。（token相似度抓不到，需語意判斷）"},{"id":"8041","sub":"S1","src":"NG","years":[105],"stem":"下列哪一溶液(solution) 與正常人的體液(normal body fluids)最相似?","opts":{"A":"Lactated Ringer's solution","B":"0.9% Sodium Chloride (Normal Saline)","C":"Dextrose 5% (D5W)","D":"Dextrose 5% + 0.9% Sodium Chloride (D5S)","E":"0.45% Sodium Chloride (1/2 Normal Saline)"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【最接近正常體液之溶液】正解 A：Lactated Ringer's solution。LR 為等張、電解質組成最接近血漿（Na⁺ 130、K⁺ 4、Ca²⁺ 3、Cl⁻ 109 mEq/L、lactate 28 為 buffer），故為燒傷復甦首選晶體液。NS 之 Cl⁻ 過高（154）易致 hyperchloremic metabolic acidosis；D5W 相當於自由水（分佈後低張）；D5S 與 0.45% NS 組成與體液差異大。","peropt":{"A":"◎ Lactated Ringer's 等張、電解質最接近血漿，正解。","B":"NS 之 Cl⁻ 過高、缺其他電解質，易致高氯酸中毒——不符。","C":"D5W 代謝後近自由水、低張——不符。","D":"D5S（D5+NS）滲透壓/成分偏離體液——不符。","E":"0.45% NS 為低張、非最接近——不符。"},"cite":"Neligan PS 5e Burns fluid；crystalloid composition","conflict":""},{"id":"8042","sub":"S1","src":"NG","years":[105],"stem":"小明是20歲70公斤男性，是八仙塵暴受害者，緊急送至急診室，醫師評估燒傷面積占總體表面積(TBSA) 40%，請問依據Parkland's Formula，在24小時內，前8小時及後16小時需各給予多少輸液(Lactated Ringer's solution)？","opts":{"A":"6000ml, 8000ml","B":"4000ml, 6000ml","C":"5200ml, 5200ml","D":"5600ml, 5600ml","E":"6200ml, 6200ml"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Parkland formula 計算】正解 D：5600 ml / 5600 ml。公式：4 mL × body weight (kg) × %TBSA。代入：4 × 70 × 40 = 11,200 mL / 24 h。前 8 小時給一半＝5,600 mL；後 16 小時給另一半＝5,600 mL。重點：起算時間為『受傷當下』而非到院時；並以 urine output 滴定調整（非僵化套公式）。","peropt":{"A":"6000/8000 ml——計算錯誤。","B":"4000/6000 ml——計算錯誤。","C":"5200/5200 ml——計算錯誤。","D":"◎ 4×70×40＝11,200 mL；前8h與後16h各 5,600 mL——正解。","E":"6200/6200 ml——計算錯誤。"},"cite":"Neligan PS 5e；Parkland (Baxter) formula","conflict":""},{"id":"8043","sub":"S5","src":"NG","years":[105],"stem":"Marjolin's ulcer最必要的治療方法為？","opts":{"A":"Surgical wide excision","B":"Chemotherapy","C":"Target therapy","D":"Chinese herb therapy","E":"Hormone therapy"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【Marjolin's ulcer 之必要治療】正解 A：Surgical wide excision（廣泛切除）。定義：慢性傷口/瘢痕（尤陳舊燒傷疤、慢性潰瘍、竇道）長期發炎後惡性轉化之腫瘤，最常為 well-differentiated SCC（但侵襲性強、易淋巴轉移、預後較一般 SCC 差）。治療核心為足夠 margin 之 wide excision，視情況合併區域淋巴結評估/處理；化療、標靶、荷爾蒙非首要必要治療。","peropt":{"A":"◎ Wide excision 為 Marjolin's ulcer 之必要治療，正解。","B":"Chemotherapy 為輔助、非必要首要——非。","C":"Target therapy 非首要必要治療——非。","D":"中草藥治療無實證——非。","E":"Hormone therapy 無相關角色——非。"},"cite":"Neligan PS 5e；Marjolin's ulcer（chronic wound SCC）","conflict":""},{"id":"8044","sub":"S6","src":"NG","years":[106],"stem":"There are two major categories of vascular anomalies, tumor and ,malformations. Which one is not fast-flow malformations?","opts":{"A":"Aneurysm","B":"Hereditary hemorrhagic telangiectasia (HHT)","C":"Cutis marmorata telangiectatica congenita (CMTC)","D":"PTEN-associated vascular anomaly","E":"Capillary-lymphatic arteriovenous malformation (CLAVM)"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【血管畸形血流分類——何者非 fast-flow】正解 C：CMTC。Fast-flow malformation 含動脈成分（AVM/AVF）：aneurysm（動脈）、HHT（多發 AVM）、PTEN-associated vascular anomaly（含 AVM）、CLAVM（capillary-lymphatic-arteriovenous，具 AV 成分）。CMTC（cutis marmorata telangiectatica congenita）屬 capillary malformation，為『slow-flow（低流量）』，故非 fast-flow。","peropt":{"A":"Aneurysm 為動脈性、fast-flow——非答案。","B":"HHT 為多發 AVM、fast-flow——非答案。","C":"◎ CMTC 為 capillary（slow-flow）malformation，非 fast-flow，正解。","D":"PTEN-associated 含 AVM、fast-flow——非答案。","E":"CLAVM 具 AV 成分、fast-flow——非答案。"},"cite":"Neligan PS 5e Vascular malformations（ISSVA slow- vs fast-flow）","conflict":""},{"id":"8045","sub":"S5","src":"NG","years":[106],"stem":"在Malignant cutaneous and soft-tissue tumors中,何者是屬於mesenchymal-origin的tumor?","opts":{"A":"Basal cell carcinoma","B":"Trichilemmal carcinoma","C":"Actinic keratosis","D":"Dermatofibrosarcoma protuberans","E":"Merkel cell carcinoma"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【惡性皮膚/軟組織腫瘤——何者屬 mesenchymal-origin】正解 D：Dermatofibrosarcoma protuberans (DFSP)。DFSP 為纖維組織細胞（fibrohistiocytic）之間葉來源低度惡性肉瘤，帶 t(17;22) COL1A1–PDGFB 融合，局部侵襲性強（指狀延伸）、需 wide excision 或 Mohs。其餘皆非間葉來源：BCC、trichilemmal carcinoma、actinic keratosis 為上皮/角質細胞來源；Merkel cell carcinoma 為神經內分泌來源。","peropt":{"A":"Basal cell carcinoma 為上皮（basal keratinocyte）來源——非。","B":"Trichilemmal carcinoma 為毛囊上皮附屬器來源——非。","C":"Actinic keratosis 為表皮角質細胞來源之癌前病變——非。","D":"◎ DFSP 為間葉（fibrohistiocytic）來源肉瘤，正解。","E":"Merkel cell carcinoma 為神經內分泌來源——非。"},"cite":"Neligan PS 5e Malignant cutaneous/soft-tissue tumors；DFSP（COL1A1-PDGFB）","conflict":""},{"id":"8046","sub":"S4","src":"NG","years":[106],"stem":"SLNB has largely become the standard of care in the initial evaluation of cutaneous melanoma. The likelihood of detecting metastatic deposits in an SLNB increases with the thickness of the primary lesion. For lesions 2.01–4.0 mm , the risk of positive sentinel lymph node is?","opts":{"A":"4–7%","B":"12-20%","C":"20-28%","D":"28–33%","E":"40–44%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Melanoma SLNB陽性率與Breslow厚度的正相關（thickness-dependent nodal risk）\n- **核心概念**：SLNB陽性機率隨原發腫瘤Breslow厚度增加而上升，是分期與預後最重要的指標之一。\n- **各厚度層級SLN陽性率（經典數字）**：\n  - **< 0.8 mm（薄病灶）**：約 <5%，一般不常規建議SLNB（除非有ulceration或高mitotic rate）。\n  - **1.01–2.0 mm**：約 12–20%。\n  - **2.01–4.0 mm**：約 **28–33%**（本題正解D）。\n  - **> 4.0 mm（厚病灶）**：約 **40%以上**。\n- **臨床意涵**：厚度2–4mm屬中厚melanoma，SLNB為standard of care；陽性node predicts微轉移並指引後續completion lymph node dissection或adjuvant therapy（如immunotherapy）。\n- **現代觀念**：MSLT-II後，SLN陽性者不再一律做completion dissection，改以nodal ultrasound surveillance替代。","peropt":{"A":"4–7%對應薄病灶（約1mm），非2–4mm，錯。","B":"12–20%對應1–2mm厚度區間，錯。","C":"20–28%略低於此厚度層級的實際陽性率，錯。","D":"◎ 2.01–4.0mm厚melanoma SLN陽性率約28–33%，正解。","E":"40–44%對應>4mm厚病灶，錯。"},"cite":"Grabb & Smith 9e / Neligan 5e, Melanoma & cutaneous malignancy; MSLT-I/II","conflict":""},{"id":"8047","sub":"S5","src":"NG","years":[106],"stem":"Lymph node dissection should always be performed in the following sarcomatous tumor, except?","opts":{"A":"Rhabdomyosarcoma","B":"Dermatofibrosarcoma","C":"Angiosarcoma","D":"Epithelioid-like sarcoma subtypes","E":"Non of above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：會發生淋巴結轉移、需考慮淋巴廓清的軟組織肉瘤（口訣 RACE/CARE）\n- **多數sarcoma以血行轉移（hematogenous, 以肺為主）為主，淋巴結轉移罕見**，故一般不需常規lymph node dissection。\n- **少數具淋巴親和性、node metastasis顯著↑的肉瘤（記憶口訣 CARE / RACE）**：\n  - **R**habdomyosarcoma（橫紋肌肉瘤）\n  - **A**ngiosarcoma（血管肉瘤）\n  - **C**lear cell sarcoma\n  - **E**pithelioid sarcoma（上皮樣肉瘤）\n  - （另加 Synovial sarcoma）\n- **Dermatofibrosarcoma protuberans (DFSP)**：局部侵襲性高、易局部復發，但**極少淋巴或遠端轉移**，治療核心為wide/Mohs excision確保margin，**不需lymph node dissection**（本題except，正解B）。","peropt":{"A":"Rhabdomyosarcoma屬淋巴轉移高風險肉瘤，需評估廓清，非例外。","B":"◎ DFSP幾乎不淋巴轉移，不需常規淋巴廓清，為例外（正解）。","C":"Angiosarcoma具淋巴轉移傾向，需評估廓清，非例外。","D":"Epithelioid sarcoma是少數會淋巴轉移的亞型，需評估廓清，非例外。","E":"既然B為例外，「以上皆非」不成立，錯。"},"cite":"Neligan 5e, Soft tissue sarcoma; Grabb & Smith 9e","conflict":""},{"id":"8048","sub":"S1","src":"NG","years":[106],"stem":"有關燒傷後的人體代謝反應與營養需求(metabolism & nutrition)，下列敘述何者正確？","opts":{"A":"傷口面積> 20% TBSA，會明顯提高代謝率(hypermetabolism )","B":"40%TBSA燒傷面積 ，metabolic rate 增加 50%","C":"hypermetabolic phase在燒傷24小時後出現，可持續數周","D":"針對高代謝率，治療目標在避免淨體重(Lean body mass)下降超過10%","E":"燒傷面積>20% TBSA，就很難靠口進食來達到營養需求，要考慮tube feeding"},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"🎯考點：燒傷後hypermetabolic response與營養支持（現代重症燒傷代謝觀念）\n- **Hypermetabolism閾值**：**> 20% TBSA**即誘發顯著全身高代謝反應（A對）。\n- **代謝率增幅**：大面積燒傷（>40% TBSA）代謝率可增加**近一倍（~100%）**甚至更高，非僅50%（故B低估，錯）。\n- **時序（現代觀念）**：傷後前24–48h為**ebb phase（低代謝、低灌流）**，之後才進入**flow phase高代謝期**，約傷後第5天達高峰、可持續數月至一年以上（故「24小時後出現」時序描述不精確，C錯）。\n- **營養目標**：積極營養支持以**避免Lean body mass流失>10%**（LBM下降過多→免疫低下、傷口癒合差、死亡率↑）（D對）。\n- **餵食途徑**：>20% TBSA者熱量需求極高、常伴腸胃道功能受抑，難以純口進食達標，應**及早enteral tube feeding**（E對）。","peropt":{"A":"◎ >20% TBSA即顯著提高代謝率，正確。","B":"40% TBSA代謝率增幅遠不止50%（接近翻倍），低估，錯（非正解）。","C":"高代謝期非傷後24h立即出現（前24–48h為ebb低代謝期），時序不當，錯（非正解）。","D":"◎ 治療目標為避免LBM下降>10%，正確。","E":"◎ >20% TBSA難靠口進食達標，應考慮tube feeding，正確。"},"cite":"Herndon Total Burn Care; Neligan 5e Burn","conflict":""},{"id":"8049","sub":"S1","src":"NG","years":[106],"stem":"在大面積燒燙傷治療，及早充分的復甦(fluid resuscitation)是避免休克最重要的治療方式。現有一３０歲男性剛剛遭熱水燙傷送醫, 二度及三度傷口共40％TBSA, 體重為7０公斤,以下處置何者錯誤?","opts":{"A":"建立IV line、開始fluid resuscitation，插尿管監測尿量","B":"IV給 Lactated Ringer's solution，從 700cc/hr 開始給","C":"尿量須維持在35 cc/hr 以上","D":"給Lactated Ringer's solution 2小時後尿突然變少，可再給予albumin 0.5ml/Kg/%TBSA burn","E":"如果心跳超過120下/每分鐘，可能是resuscitation 不夠"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：大面積燒傷輸液復甦（Parkland公式）與復甦充分性判讀\n- **個案**：70kg、40% TBSA二三度燒傷。\n- **Parkland公式**：4 mL × kg × %TBSA = 4×70×40 = **11,200 mL/24h**，前8h給一半（5,600 mL）→ 起始速率約 **700 mL/hr**（B正確）。\n- **監測目標**：置入尿管，成人尿量維持 **0.5 mL/kg/hr（約30–50 mL/hr）**（C合理）；心跳>120/min常提示復甦不足（E合理）。\n- **錯誤處置（本題正解D）**：復甦初期（前24h）尿量減少時，正確做法是**依尿量反應「上調晶體液速率（titrate crystalloid）」**，而非貿然給albumin。膠體（albumin）一般延至**傷後8–24h capillary leak改善後**才考慮（rescue/colloid rescue），2小時就給albumin時機錯誤、觀念過時。","peropt":{"A":"建立IV、開始輸液、插尿管監測尿量，為標準初步處置，正確。","B":"Parkland計算起始約700 mL/hr，正確。","C":"成人尿量維持≥30–35 mL/hr為復甦目標，正確。","D":"◎ 2小時尿少應先上調晶體液，而非早期給albumin，處置錯誤（正解）。","E":"心跳>120/min提示復甦不足，正確。"},"cite":"Parkland formula; Neligan 5e / Grabb & Smith 9e Burn resuscitation","conflict":""},{"id":"8050","sub":"S1","src":"NG","years":[106],"stem":"燒燙傷傷口可覆蓋Temporary skin substitutes ，如cadaver skin , Amnion, porcine skin , Biobrane, Duoderm，Tegaderm ……等等，其中cadaver skin 與其餘biological dressing 相比，最大的差異在於?","opts":{"A":"decrease wound pain","B":"re-vascularize and dermis incorporates into the wound","C":"well adherence to wound","D":"decrease fluid loss","E":"difficult to remove from wound"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：暫時性皮膚替代物中cadaver skin（allograft）的獨特生物特性\n- **Allograft（cadaver skin, 同種異體皮）為biological dressing的「gold standard」**，與其他暫時性敷料最大差異在於：\n  - **會被受區血管化（re-vascularize）、真皮成分整合進傷口床（dermis incorporates into wound）**（本題正解B），提供真正的暫時性「take」。\n  - 之後因免疫排斥（約2–3週）而脫落，作為autograft前的傷口床準備。\n- **其他暫時性替代物**（porcine xenograft、Biobrane、amnion、Duoderm、Tegaderm）主要為**表面貼附、減少疼痛與水分流失**，但**不會真正血管化整合**。\n- **臨床用途**：大面積燒傷donor site不足時，allograft覆蓋以維持傷口床、減少感染與蛋白/水分流失。","peropt":{"A":"減少傷口疼痛是多數生物敷料共通效果，非cadaver skin獨有差異，錯。","B":"◎ Allograft會血管化並使真皮整合進傷口床，為其獨特特性（正解）。","C":"良好貼附非allograft獨有，多種敷料皆具，錯。","D":"減少體液流失為共通功能，非最大差異，錯。","E":"難以移除並非allograft的鑑別特徵，錯。"},"cite":"Neligan 5e / Grabb & Smith 9e, Skin substitutes in burn","conflict":""},{"id":"8051","sub":"S3","src":"NG","years":[106],"stem":"有關 藥物外滲(Extravasation injury) , osmotically active agent, vasoconstrictive agent,cytotoxic agent這三類藥物可能造成組織壞死，其中cytotoxic 藥物中，哪一種藥物最常發生，且組織壞死區域會隨時間而擴大?","opts":{"A":"Doxorubicin","B":"Vincristine","C":"Dexrazoxane","D":"Cisplatin","E":"Vancomycin"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：藥物外滲（extravasation）中cytotoxic藥物之組織壞死\n- **三類外滲致組織傷害藥物**：osmotically active（如高張液、鈣、bicarbonate）、vasoconstrictive（如vasopressors）、cytotoxic（化療藥）。\n- **DNA-binding vesicants（如anthracyclines）**外滲最具破壞性：**Doxorubicin（Adriamycin）**與DNA結合後，藥物在組織內持續釋放、再被鄰近細胞攝取，形成惡性循環，導致**壞死區域隨時間逐漸擴大、久不癒合的潰瘍**（本題正解A）。\n- **解毒/處置**：Doxorubicin外滲可用 **Dexrazoxane（靜脈給予，非局部致壞死藥）** 作為解毒劑，加冷敷；vinca alkaloids則相反用溫敷+hyaluronidase。\n- **Non–DNA-binding（如vinca alkaloids）**壞死較局限、隨時間自行改善。","peropt":{"A":"◎ Doxorubicin為DNA-binding vesicant，外滲壞死最常見且隨時間擴大（正解）。","B":"Vincristine為non-DNA-binding，壞死較局限且不持續擴大，錯。","C":"Dexrazoxane是Doxorubicin外滲的解毒劑，非致壞死藥，錯。","D":"Cisplatin外滲致壞死風險相對較低，非最典型持續擴大者，錯。","E":"Vancomycin非cytotoxic類化療藥，錯。"},"cite":"Neligan 5e, Extravasation injury; Grabb & Smith 9e","conflict":""},{"id":"8052","sub":"S3","src":"NG","years":[106],"stem":"頸部嚴重疤痕攣縮(broad neck contracture) 的治療原則，以下何者為非?","opts":{"A":"因為會造成麻醉插管困難，所以要優先於身體其他部位疤痕攣縮的重建","B":"為避免造成新的疤痕攣縮，scar release 以橫向切口較佳","C":"scar release 時，如遇到頸闊肌platysma 應盡量保留以免影響功能","D":"術後恢復期最好平躺時能保持頸部hyperextension","E":"同時合併下唇疤痕攣縮時 ，頸部疤痕要先手術。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：頸部廣泛燒傷疤痕攣縮（broad neck contracture）重建原則\n- **優先順序**：頸部攣縮可造成**麻醉插管困難、下唇外翻、頦頸角消失**，功能影響大，常需**優先於其他部位**處理（A對；合併下唇攣縮時亦先做頸部，E對）。\n- **切口設計**：release採**橫向（transverse）切口**沿張力線鬆解，較不易再形成新攣縮（B對）。\n- **關鍵錯誤（本題正解C）**：疤痕攣縮release時遇到**platysma（頸闊肌）不應保留**——攣縮常涉及platysma及深層筋膜，必須一併鬆解/切開才能徹底release，勉強保留反而導致鬆解不完全、復發。\n- **術後擺位**：恢復期平躺時維持頸部**hyperextension（過度伸展）**、佩戴neck splint/collar，防止再攣縮（D對）。","peropt":{"A":"頸部攣縮影響插管與功能，應優先重建，原則正確（非答案）。","B":"橫向切口鬆解較不易再攣縮，原則正確（非答案）。","C":"◎ 攣縮時platysma應一併鬆解而非保留，敘述錯誤（正解）。","D":"術後維持頸部hyperextension防再攣縮，原則正確（非答案）。","E":"合併下唇攣縮時頸部先手術，原則正確（非答案）。"},"cite":"Neligan 5e / Grabb & Smith 9e, Burn reconstruction of neck","conflict":""},{"id":"8053","sub":"S1","src":"NG","years":[107],"stem":"下列有關於燒燙傷病人何者正確？","opts":{"A":"燒燙傷病人常常會有情緒低落，無助，挫折，絕望等心理問題","B":"病人的心理問題常常會讓病人逃離原本的治療跟醫療團隊","C":"跨團隊合作的醫療對燙傷病人最有幫助","D":"即使是病人家屬也可以從支持性治療得到好處","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：燒傷病人的心理社會照護與跨團隊模式\n- **心理衝擊**：燒傷病人（尤其外觀毀損、長期治療者）常見**情緒低落、無助、挫折、絕望**，甚至PTSD、憂鬱、焦慮（A對）。\n- **對治療的影響**：心理問題可能導致病人**逃避治療、與醫療團隊疏離、不遵醫囑（non-adherence）**，影響復健成效（B對）。\n- **多專科團隊（multidisciplinary team）**：整外、燒傷科、復健、職能/物理治療、心理師、社工、營養師整合照護，對燒傷病人成效最佳（C對）。\n- **家屬支持**：**家屬**同樣承受壓力，納入supportive care/心理衛教亦有助益（D對）。\n- 綜合以上，**E（以上皆是）為正解**。","peropt":{"A":"燒傷病人常見情緒低落無助等心理問題，正確。","B":"心理問題可致病人逃避治療與團隊，正確。","C":"跨團隊整合照護對燒傷病人最有幫助，正確。","D":"家屬亦能自支持性治療獲益，正確。","E":"◎ 以上皆是，為正解。"},"cite":"Neligan 5e, Psychosocial aspects of burn care","conflict":""},{"id":"8054","sub":"S7","src":"NG","years":[107],"stem":"下列良性腫瘤，何者為先天性 (congenital)?","opts":{"A":"Dermoid cyst","B":"Nevus of Ota","C":"Milia","D":"Lentigo simplex","E":"Xanthoma"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：先天性（congenital）良性皮膚腫瘤鑑別\n- **Dermoid cyst（皮樣囊腫）**：屬**congenital**，源於胚胎期外胚層沿**融合線（fusion lines）**受困，好發於眉尾（lateral brow）、鼻背中線、頭皮，出生即存在或幼年顯現（本題正解A）。\n- **其他選項多為後天性（acquired）**：\n  - Nevus of Ota：真皮黑色素細胞增生，好發三叉神經V1/V2分布，多在出生時或青春期出現，屬melanocytosis，一般歸類後天/圍生期，非典型congenital良性瘤答案。\n  - Milia：後天角質囊腫。\n  - Lentigo simplex：後天色素斑。\n  - Xanthoma：與脂質代謝相關的後天病灶。","peropt":{"A":"◎ Dermoid cyst為沿胚胎融合線的先天性囊腫，正解。","B":"Nevus of Ota多屬後天/圍生期出現的真皮黑色素增生，非最佳先天答案，錯。","C":"Milia為後天角質微囊腫，錯。","D":"Lentigo simplex為後天色素性斑點，錯。","E":"Xanthoma為後天脂質沉積病灶，錯。"},"cite":"Grabb & Smith 9e, Benign skin lesions","conflict":""},{"id":"8055","sub":"S4","src":"NG","years":[107],"stem":"When evaluation of malignant melanoma, which one is WRONG?","opts":{"A":"The factors incorporated into the T category of the 2010 TNM staging system are the Breslow depth, the presence or absence of ulceration, and the mitotic rate.","B":"The substaging according to mitotic rates applies only to T1 lesions.","C":"Microscopic satellitosis is always seen and does not affect the staging.","D":"The likelihood of detecting metastatic deposits in an SLNB increases with the thickness of the primary lesion.","E":"The patients with in-transit metastases should be evaluated with chest and abdominal CT."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Malignant melanoma評估與2010 AJCC TNM分期要點（找錯誤）\n- **T category三要素（2010版）**：**Breslow厚度、有無ulceration、mitotic rate**（A對）。\n- **Mitotic rate分層**：僅適用於**T1病灶**次分期（T1a/T1b）（B對）。\n- **SLNB陽性率隨厚度上升**（D對）。\n- **In-transit metastases**屬N分期（stage III），應以**胸腹CT等影像**評估遠端轉移（E對）。\n- **關鍵錯誤（本題正解C）**：**Microscopic satellitosis並非「always seen」，且會影響分期**——微衛星病灶被歸入**N category（regional/nodal disease, stage III）**，是重要不良預後因子，故「不影響分期」的敘述錯誤。","peropt":{"A":"2010 T分期納入Breslow、ulceration、mitotic rate，正確。","B":"mitotic rate僅用於T1次分期，正確。","C":"◎ Microscopic satellitosis非必見且屬N分期影響分期，敘述錯誤（正解）。","D":"SLN陽性率隨厚度增加，正確。","E":"in-transit轉移應以胸腹CT評估遠端病灶，正確。"},"cite":"AJCC Melanoma staging (2010); Neligan 5e","conflict":""},{"id":"8056","sub":"S6","src":"NG","years":[107],"stem":"複選2. Which are CORRECT about infantile hemangioma (IH)? (複選)","opts":{"A":"There are 3 stages in its life cycle: the proliferating phase (0-2 years of age), the involuting phase (2-6 years of age), and the remodeling phase (after 6 years of age)","B":"In the last phase, the majority of the IH is replaced with adipocytes and connective tissue.","C":"The IH is typically multifocal and less frequent in premature children","D":"10% of proliferating IH cause significant deformity or complications.","E":"Problematic IH in children less than 12 months of age should be managed by oral prednisolone, propranolol, or interferon."},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯考點：Infantile hemangioma (IH) 自然史與治療（複選，選正確）\n- **生命週期（現代分期，數字有出入）**：proliferating（快速增生，主要在第1年）、involuting（1–5/7歲逐漸消退）、involuted/remodeling（消退後）。本題A所列時間段與標準不符（增生主要在第1年而非0–2年整段快速），視為描述不精確。\n- **消退後組織（B正確）**：末期IH多被**脂肪（adipocytes）與纖維結締組織**取代，可留鬆弛皮膚或纖維脂肪殘餘。\n- **流行病學（C錯誤）**：IH多為**單發（focal/solitary）**，且在**早產/低出生體重兒更常見（不是less frequent）**。\n- **併發症（D正確）**：約**10%**增生期IH造成顯著變形或併發症（潰瘍、視力遮蔽、氣道阻塞等），需積極治療。\n- **治療（E）**：現代**propranolol為第一線**；prednisolone次之；interferon因神經毒性（如spastic diplegia）已少用，故E的並列表述被判為不完全正確。\n- 正解 **BD**。","peropt":{"A":"生命週期時間段描述與標準（增生主要第1年）不符，判為不精確，非正解。","B":"◎ 末期IH多被脂肪與結締組織取代，正確。","C":"IH多為單發且在早產兒更常見，敘述相反，錯。","D":"◎ 約10%增生期IH造成顯著變形或併發症，正確。","E":"現代以propranolol為主、interferon已淘汰，並列表述判為不完全正確，非正解。"},"cite":"Neligan 5e, Vascular anomalies (ISSVA); Grabb & Smith 9e","conflict":""},{"id":"8057","sub":"S7","src":"NG","years":[107],"stem":"Which description about congenital melanocytic nevi is correct?","opts":{"A":"Large congenital melanocytic nevi are present in 1 in 100 births, and the giant lesions are less common.","B":"Giant congenital melanocytic nevi defines as nevi with diameter more then 20 cm","C":"The best surgical treatment of facial nevi that cross multiple aesthetic units as well as involving the priorbital area is wide excision and primary closure","D":"Congenital melanocytic nevi are composed of clusters of nevomelanocytes that are generally present at birth but occasionally arise as late as several years.","E":"Congenital melanocytic nevi are benign lesions, which has no malignant degeneration. The parent, primary care physician, and surgeon should not be anxious about that."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：先天性黑色素細胞痣（CMN）觀念（找正確）\n- **正解D**：CMN由**nevomelanocytes群集**構成，**多在出生時即存在，偶爾可於出生後數年才顯現（tardive/delayed CMN）**，此描述正確。\n- **其他選項錯誤**：\n  - A：Large CMN並非1/100出生率，giant CMN更是罕見（約1/20,000–500,000），比例錯誤。\n  - B：Giant CMN定義依投影成人大小，常以**≥40 cm（或軀幹≥20cm依標準不一）**界定，單純「>20cm」表述不完整，本題判錯。\n  - C：跨多個美學單位且侵及眼周的顏面痣，**不宜「wide excision + primary closure」**（張力大、變形），應採分期切除/組織擴張/植皮/皮瓣。\n  - E：CMN**有惡性轉化風險（melanoma）**，尤其giant CMN，需追蹤，非可安心不理。","peropt":{"A":"large CMN與giant CMN發生率遠低於1/100，比例錯誤，錯。","B":"giant CMN多以≥40cm（成人投影）界定，僅稱>20cm不完整，錯。","C":"跨多美學單位且侵眼周之痣不宜wide excision+primary closure，錯。","D":"◎ CMN由nevomelanocytes群集構成，多出生即有偶延遲數年，正確（正解）。","E":"CMN具惡性轉化風險需追蹤，非無風險，錯。"},"cite":"Neligan 5e / Grabb & Smith 9e, Congenital nevi","conflict":""},{"id":"8058","sub":"S5","src":"NG","years":[107],"stem":"Which is the most common pediatric soft tissue sarcoma?","opts":{"A":"Rhabdomycosarcoma","B":"Synovial soft-tissue sarcoma","C":"Pilomatrixoma","D":"Alveolar soft-part sarcoma","E":"Juvenile aggressive fibromatosis"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：小兒最常見的軟組織肉瘤\n- **Rhabdomyosarcoma（橫紋肌肉瘤）為兒童最常見的軟組織肉瘤**（本題正解A），好發頭頸部、泌尿生殖道、四肢；病理亞型有embryonal（最常見、預後較佳）與alveolar（預後較差、常見四肢）。\n- **治療**：多模式治療（手術+化療±放療），屬淋巴轉移風險較高之肉瘤，需評估區域淋巴結。\n- 其他選項：Synovial sarcoma、Alveolar soft-part sarcoma較少見；Pilomatrixoma為良性附屬器腫瘤；Juvenile aggressive fibromatosis為局部侵襲性纖維瘤病（非典型肉瘤且非最常見）。","peropt":{"A":"◎ Rhabdomyosarcoma為兒童最常見軟組織肉瘤，正解。","B":"Synovial sarcoma較少見，非最常見，錯。","C":"Pilomatrixoma為良性毛母質瘤，非肉瘤，錯。","D":"Alveolar soft-part sarcoma罕見，錯。","E":"Juvenile aggressive fibromatosis為侵襲性纖維瘤病，非最常見小兒肉瘤，錯。"},"cite":"Neligan 5e, Pediatric soft tissue sarcoma","conflict":""},{"id":"8059","sub":"S5","src":"NG","years":[107],"stem":"Extremities soft tissue sarcoma prognostic factor, 下列何者為非?","opts":{"A":"Age >50 years","B":"Size > 5cm","C":"Recurrent sarcoma","D":"lymph node involvement","E":"Histopathologic subtypes"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：四肢軟組織肉瘤（extremity STS）預後因子（找非）\n- **公認不良預後因子**：\n  - **年齡 > 50歲**（A為預後因子）。\n  - **腫瘤大小 > 5 cm**（B為預後因子）。\n  - **復發性肉瘤（recurrent）**（C為預後因子）。\n  - **高惡性度/組織學亞型（high grade / histopathologic subtype）**（E為預後因子，grade為最重要之一）。\n- **關鍵（本題正解D）**：**Lymph node involvement在四肢STS極為罕見**（多為血行轉移至肺），並非傳統列入的核心預後分層因子；一旦有淋巴轉移雖屬晚期，但因少見，不在標準「常規預後因子」清單中，故為「非」。","peropt":{"A":"年齡>50歲為STS不良預後因子，非答案。","B":"腫瘤>5cm為預後因子，非答案。","C":"復發性肉瘤為預後因子，非答案。","D":"◎ 淋巴結轉移在四肢STS罕見，非傳統核心預後因子，為「非」（正解）。","E":"組織學亞型/惡性度為重要預後因子，非答案。"},"cite":"Neligan 5e / AJCC STS staging","conflict":""},{"id":"8060","sub":"S3","src":"NG","years":[107],"stem":"Heterotopic ossification(HO) is a pathologic condition that adversely affects a subpopulation of burn patients. Which of the following statement is wrong?","opts":{"A":"The incidence of HO in general burn population is reported to be 15%-30%","B":"HO usually occurs in patients with large (>20% TBSA) or full-thickness burns.","C":"Elbow, shoulder, and hip are the most commonly affected joints.","D":"HO seems to be related to the extended time to wound closure and genetic predisposition.","E":"The treatment of HO is largely conservative"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：燒傷後異位性骨化（Heterotopic ossification, HO）（找錯誤）\n- **關鍵錯誤（本題正解A）**：一般燒傷族群HO發生率**約0.1–3%（低）**，並非「15–30%」——A明顯高估。\n- **好發族群（B對）**：多見於**大面積（>20% TBSA）或全層燒傷**病人。\n- **好發關節（C對）**：**肘（elbow，最常見）、肩、髖**。\n- **危險因子（D對）**：**傷口延遲關閉、長期臥床/固定、genetic predisposition、反覆手術與微創傷**。\n- **治療（E對）**：以**保守治療為主**（物理治療、關節活動、NSAIDs/放療預防）；成熟且影響功能的HO才考慮手術切除。","peropt":{"A":"◎ 一般燒傷HO發生率約0.1–3%，15–30%為高估，敘述錯誤（正解）。","B":"HO好發於>20% TBSA或全層燒傷，正確。","C":"肘、肩、髖為最常受累關節（肘最常見），正確。","D":"HO與傷口延遲關閉及遺傳體質相關，正確。","E":"HO治療多以保守為主，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, Burn complications (HO)","conflict":""},{"id":"8062","sub":"S3","src":"NG","years":[107],"stem":"Which of the following statement about facial burn reconstruction is wrong?","opts":{"A":"Reconstructive surgery should be initiated as soon as possible.","B":"All skin grafts contract in some degree, so overcorrection is a general rule of skin grafting in facial burn.","C":"Ideally, full-thickness skin grafts are performed in aesthetic units.","D":"Nonoperative facial reconstructive adjunct techniques, including laser therapy, steroid injections, corrective cosmetics, hair and fat transplantation, and facial prosthesis, can be very helpful to achieve better outcomes.","E":"The lower lip and chin is considered as a single aesthetic unit."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：顏面燒傷重建原則（找錯誤）\n- **關鍵錯誤（本題正解A）**：顏面燒傷重建**不應「盡早（as soon as possible）」進行**——除**功能急症（如ectropion眼瞼外翻致角膜暴露、microstomia、嚴重攣縮）**需早期介入外，**多數美觀性重建應待疤痕成熟（約6–12個月以上）**再手術，過早介入疤痕仍活躍、成效差且易復發。\n- **其他正確原則**：\n  - B：植皮皆會收縮，顏面植皮採**過度矯正（overcorrection）**為通則。\n  - C：理想上**依aesthetic unit做full-thickness skin graft**以求色澤質地一致。\n  - D：非手術輔助（laser、類固醇注射、遮瑕化妝、毛髮/脂肪移植、facial prosthesis）能提升成效。\n  - E：**下唇與頦部（lower lip and chin）視為單一美學單位**。","peropt":{"A":"◎ 顏面美觀重建應待疤痕成熟，非一律盡早進行（功能急症除外），敘述錯誤（正解）。","B":"植皮會收縮故顏面採過度矯正，正確。","C":"依美學單位施行全層植皮，正確。","D":"雷射、類固醇、化妝、毛髮脂肪移植等輔助有助成效，正確。","E":"下唇與頦部為單一美學單位，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, Facial burn reconstruction","conflict":""},{"id":"8063","sub":"S1","src":"NG","years":[107],"stem":"〔複選〕\n複選1. Extensive burn elicits a pronounced body's response to injury. Which of the following statements are correct? (複選)","opts":{"A":"Catabolic hormones, such as cortisol and catechols, increase in response to burn stress.","B":"Anabolic hormones, such as human growth hormone and testosterone, decrease in response to burn stress.","C":"Rapid skeletal muscle break down with amino acid use as an energy source.","D":"Capillary permeability is increased, leading to loss of intravascular proteins and fluids into the interstitial compartment.","E":"Loss of lean body mass can complicate impaired immunity, increased infection, and poor wound healing."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：大面積燒傷的全身反應（stress response）（複選，全對）\n- **內分泌反應**：**分解性荷爾蒙（cortisol、catecholamines）上升**（A對）；**合成性荷爾蒙（growth hormone、testosterone）下降**（B對），造成淨分解代謝狀態。\n- **代謝**：**骨骼肌快速分解，以胺基酸作為能量來源（proteolysis）**，導致LBM流失（C對）。\n- **微血管**：**capillary permeability增加**，血管內蛋白與液體滲漏至間質（interstitial），造成水腫與低血容（D對）。\n- **後果**：**LBM流失**併發免疫低下、感染↑、傷口癒合不良（E對）。\n- 綜合為 **ABCDE全對**。","peropt":{"A":"◎ cortisol、catecholamines等分解性荷爾蒙上升，正確。","B":"◎ growth hormone、testosterone等合成性荷爾蒙下降，正確。","C":"◎ 骨骼肌快速分解以胺基酸供能，正確。","D":"◎ 微血管通透性增加致蛋白與液體外滲，正確。","E":"◎ LBM流失致免疫低下、感染增加、癒合不良，正確。"},"cite":"Neligan 5e / Herndon, Burn metabolic response","conflict":""},{"id":"8064","sub":"S2","src":"NG","years":[107],"stem":"複選2. Which of the following statements about chemical burns are correct? (複選)","opts":{"A":"The severity of a chemical burn is often over-estimated on first examination.","B":"Phenol is bound to serum albumin after ingestion or absorption, which can lead to systemic effects, including CNS depression, peripheral demyelination and renal failure.","C":"The initial goal of chemical burn management is to minimize the duration of contact.","D":"Chemical burn with hydrofluoric acid can lead to hypercalcemia and hypermagnesemia and potential fatal arrhythmias.","E":"Mustard gas is highly lipid soluble and can be readily absorbed through the skin."},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"🎯考點：化學燒傷（chemical burns）特性（複選，選正確）\n- **嚴重度判讀（A錯誤）**：化學燒傷初診常被**「低估（under-estimated）」**，因組織損傷持續進展，非over-estimated。\n- **Phenol（B正確）**：吸收後**與血清albumin結合**，可致**CNS抑制、周邊去髓鞘、腎衰竭**等全身毒性。\n- **處置目標（C正確）**：初始核心為**盡量縮短接觸時間**（大量清水沖洗、移除污染衣物）。\n- **Hydrofluoric acid（D錯誤）**：造成**低血鈣（hypocalcemia）與低血鎂（hypomagnesemia）**（氟離子螯合鈣鎂），可致致命心律不整——非hyper。\n- **Mustard gas（E正確）**：高度脂溶性，可經皮膚快速吸收，造成水疱與全身毒性。\n- 正解 **BCE**。","peropt":{"A":"化學燒傷初診常被低估而非高估，敘述相反，錯。","B":"◎ Phenol與albumin結合可致CNS抑制、去髓鞘、腎衰竭，正確。","C":"◎ 初始處置目標為縮短接觸時間（大量沖洗），正確。","D":"HF造成低血鈣與低血鎂而非hyper，敘述相反，錯。","E":"◎ Mustard gas高度脂溶性可經皮吸收，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, Chemical burns","conflict":""},{"id":"8065","sub":"S3","src":"NG","years":[107],"stem":"複選3. Which of the following statements about toxic epidermal necrolysis(TEN) and related exfoliative disease of the skin are correct? (複選)","opts":{"A":"These exfoliative skin disorders are usually drug-related.","B":"Sulfonamides, anticonvulsants, some antibiotics as well as acetaminophen are the well-documented drugs associated with Steven-Johnson syndrome(SJS) and toxic epidermal necrolysis (TEN).","C":"Average mortality rate of SJS is higher than TEN.","D":"Typical prodrome of upper respiratory tract infection or influenza-like symptom appears 2-3 days prior to cutaneous manifestations in SJS/TEN patients.","E":"Ocular complications are very common and early involvement of ophthalmology is crucial."},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：TEN / SJS 等脫屑性皮膚病（複選，選正確）\n- **病因（A正確）**：SJS/TEN多為**藥物相關（drug-related）**。\n- **常見致病藥（B正確）**：**sulfonamides、anticonvulsants、部分抗生素、acetaminophen（allopurinol、NSAIDs等）**。\n- **死亡率（C錯誤）**：以體表脫落面積分：SJS(<10%)、SJS-TEN overlap(10–30%)、**TEN(>30%)**；**TEN死亡率明顯高於SJS**（TEN約30%以上），故「SJS死亡率高於TEN」錯誤。\n- **前驅症狀（D正確）**：皮膚表現前**2–3天有上呼吸道感染或類流感前驅症狀**。\n- **眼部併發症（E正確）**：**眼部受累常見**（symblepharon、失明風險），需**早期眼科介入**。\n- 正解 **ABDE**。","peropt":{"A":"◎ SJS/TEN多為藥物相關，正確。","B":"◎ sulfonamides、抗癲癇藥、部分抗生素及acetaminophen為常見致病藥，正確。","C":"TEN死亡率高於SJS，敘述相反，錯。","D":"◎ 皮膚表現前2–3天有類流感/上呼吸道前驅症狀，正確。","E":"◎ 眼部併發症常見，需早期眼科介入，正確。"},"cite":"Neligan 5e / Grabb & Smith 9e, SJS/TEN (SCORTEN)","conflict":""},{"id":"8066","sub":"S4","src":"NG","years":[108],"stem":"For about the histological evaluation of melanoma, which description is wrong?","opts":{"A":"In Clark classification, level I: In situ melanoma; limited to the dermis–epidermis junction","B":"In 2017 TNM staging system, T1: ≤1.0 mm","C":"In Clark classification, level III: Invading and expanding into the papillary dermis but not into the reticular dermis","D":"In 2017 TNM staging system, T4: >5.0 mm","E":"In Clark classification, level V: Invading the subcutaneous fat or the associated subreticular tissues"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Melanoma組織學——Clark level與TNM T分期厚度（找錯誤）\n- **Clark分級（解剖層次）**：\n  - Level I：in situ，限於表皮真皮交界（A正確）。\n  - Level III：侵入並充滿papillary dermis，未達reticular dermis（C正確）。\n  - Level V：侵入皮下脂肪（E正確）。\n- **2017 TNM T分期（Breslow厚度）**：\n  - **T1 ≤ 1.0 mm**（B正確）。\n  - T2 >1.0–2.0 mm；T3 >2.0–4.0 mm。\n  - **T4 > 4.0 mm**。\n- **關鍵錯誤（本題正解D）**：**T4定義為「> 4.0 mm」，而非「> 5.0 mm」**，D厚度界值錯誤。","peropt":{"A":"Clark level I為in situ限於表皮真皮交界，正確。","B":"2017 T1定義≤1.0mm，正確。","C":"Clark level III侵入papillary dermis未達reticular，正確。","D":"◎ T4應為>4.0mm而非>5.0mm，界值錯誤（正解）。","E":"Clark level V侵入皮下脂肪，正確。"},"cite":"AJCC 8th (2017) Melanoma T category; Clark levels","conflict":""},{"id":"8067","sub":"S7","src":"NG","years":[108],"stem":"For about tumors of the skin and soft tissue, which description is correct? (複選)","opts":{"A":"Pigment cell nevus is also known as pigmented nevus and nevus cell nevus.","B":"Nevus of Ito is also known as nevus fuscoceruleus ophthalmomaxillaris and oculodermal melanocytosis.","C":"Nevus spilus is also known as café-au-lait spot.","D":"Mongolian spot is also known as congenital dermal melanocytosis.","E":"Dysplastic nevus is also known as Clark's nevus and atypical mole."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：皮膚與軟組織腫瘤（痣）之同義名詞辨識（複選，選正確）\n- **正確配對**：\n  - A：Pigment cell nevus = pigmented nevus = nevus cell nevus（正確）。\n  - D：Mongolian spot = **congenital dermal melanocytosis**（正確）。\n  - E：Dysplastic nevus = **Clark's nevus = atypical mole**（正確）。\n- **B錯誤**：**Nevus of Ito**位於**肩/鎖骨上/上臂（acromioclavicular region）**，別名為nevus fuscoceruleus **acromiodeltoideus**；題目所述「ophthalmomaxillaris/oculodermal melanocytosis」實為**Nevus of Ota**的別名，故B張冠李戴。\n- **C（本題判為正確，納入答案）**：Nevus spilus與café-au-lait關聯——nevus spilus（speckled lentiginous nevus）常以café-au-lait樣斑為底再散布深色斑點，故被歸為正確。\n- 正解 **ACDE**。\n- ⚠答案疑義：嚴格而言 nevus spilus（speckled lentiginous nevus）與單純café-au-lait spot並非完全同義，C的等同關係有爭議；惟以權威答案ACDE為準。","peropt":{"A":"◎ Pigment cell nevus = pigmented nevus = nevus cell nevus，正確。","B":"所述別名實為Nevus of Ota；Nevus of Ito位於肩部（acromiodeltoideus），張冠李戴，錯。","C":"◎ Nevus spilus以café-au-lait樣底斑呈現，依權威答案判為正確（惟等同關係有爭議）。","D":"◎ Mongolian spot = congenital dermal melanocytosis，正確。","E":"◎ Dysplastic nevus = Clark's nevus = atypical mole，正確。"},"cite":"Grabb & Smith 9e / Neligan 5e, Nevi nomenclature","conflict":""},{"id":"8068","sub":"S7","src":"NG","years":[108],"stem":"Which statements are right about congenital melanocytic nevi? (複選題)","opts":{"A":"Small nevi are up to 1.5 cm","B":"Medium nevi are around 1.5 to 20 cm","C":"Large nevi are >20 cm to 40 cm","D":"Giant nevi are > 40 cm","E":"The satellite nevi of CMN has high malignancy potential"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：先天性黑色素細胞痣（CMN）大小分類（複選，選正確）\n- **依成人投影最大徑分類**：\n  - **Small：≤ 1.5 cm**（A正確）。\n  - **Medium：約 1.5–20 cm**（B正確）。\n  - **Large：> 20–40 cm**（C正確）。\n  - **Giant：> 40 cm**（D正確）。\n- **E錯誤**：**satellite nevi（衛星痣）本身惡性潛能低**，主要作為giant CMN的相關表徵；真正惡性風險升高者為**giant CMN本體（尤其軀幹中軸、伴多發衛星痣者神經皮膚黑色素沉著症風險↑）**，但「satellite nevi本身high malignancy potential」表述不當。\n- 正解 **ABCD**。","peropt":{"A":"◎ Small CMN ≤1.5 cm，正確。","B":"◎ Medium CMN約1.5–20 cm，正確。","C":"◎ Large CMN >20–40 cm，正確。","D":"◎ Giant CMN >40 cm，正確。","E":"satellite nevi本身惡性潛能低，表述不當，錯。"},"cite":"Neligan 5e / Grabb & Smith 9e, CMN classification","conflict":""},{"id":"8069","sub":"S6","src":"NG","years":[108],"stem":"A 6-year-old boy has a left-sided capillary malformation of the face and upper eyelid and glaucoma in the left eye. Which of the following is the most likely diagnosis?","opts":{"A":"CLOVES syndrome","B":"Klippel-Trénaunay syndrome","C":"Parkes Weber syndrome","D":"Sturge-Weber syndrome","E":"PTEN hamartoma-tumor syndrome"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Sturge-Weber syndrome（腦顏面血管瘤病）】\n- **三聯徵**：①顏面port-wine stain（capillary malformation，沿三叉神經V1±V2分布）②leptomeningeal capillary-venous malformation（軟腦膜血管畸形→癲癇、發育遲緩）③**同側青光眼（glaucoma）**。\n- **基因**：體細胞 **GNAQ** (p.R183Q) 鑲嵌突變。\n- **青光眼機轉**：eyelid/上臉受侵時風險最高，因episcleral血管畸形使房水外流受阻→眼壓升高，需終生眼壓監測。\n- **關鍵鑑別**：只要「顏面CM＋青光眼」即高度指向本症，屬**低流量血管畸形（slow-flow）**，非腫瘤、非overgrowth syndrome。","peropt":{"A":"CLOVES syndrome為PIK3CA相關過度生長（脂肪瘤性、血管畸形、脊柱側彎），無青光眼特徵，非本題。","B":"Klippel-Trénaunay為capillary-lymphatic-venous malformation＋肢體過度生長，非顏面＋青光眼。","C":"Parkes Weber為capillary malformation＋高流量動靜脈廔管＋肢體肥大，非本症。","D":"◎ 顏面V1微血管畸形＋眼瞼侵犯＋同側青光眼＝Sturge-Weber，GNAQ突變，正解。","E":"PTEN hamartoma-tumor syndrome（Cowden/BRRS）表現巨頭、多發性錯構瘤，非port-wine stain＋青光眼。"},"cite":"Neligan Plastic Surgery 5e, Vol.3 Vascular Anomalies；Mulliken分類（vascular tumor vs malformation）","conflict":""},{"id":"8070","sub":"S5","src":"NG","years":[108],"stem":"關於lower extremity sarcoma 何者為非？","opts":{"A":"Soft tissue sarcoma are a rare disease entity with an incidence of 1:100 000 in adults","B":"In adults, lesions that have not disappeared after 6 months should generally be biopsied as they are highly suspicious for malignancy","C":"To date, no other modality provides better cure for sarcoma than adequate surgery","D":"Fine needle biopsies do not have a place in sarcoma diagnosis in the lower extremity","E":"Radiotherapy is the primary adjunctive treatment method in sarcoma management today"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【下肢軟組織肉瘤 soft tissue sarcoma 通則—找『為非』】\n- **
