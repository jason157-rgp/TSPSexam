流行病學**：成人罕見，發生率約 **1:100,000**（A對）。\n- **切片時機（B錯）**：現代教條為任何**深部（subfascial）、＞5 cm、持續生長或疼痛**之腫塊即應切片；『等待6個月未消退才切片』屬**過時且危險**觀念，會延誤診斷→B為非。\n- **手術地位**：至今無任何modality比**適當手術（wide excision，R0）**更能治癒（C對）。\n- **細針抽吸FNA**：因無法保留組織結構、難分型與分級，**不適用**於原發肉瘤診斷，需core needle/incisional biopsy（D對）。\n- **放療**：為**主要輔助（adjuvant）**治療，改善局部控制、利於保肢（E對）。","peropt":{"A":"軟組織肉瘤成人發生率約1:100,000，屬罕見疾病，敘述正確。","B":"◎ 『6個月未消退才切片』為錯誤—深部/＞5cm/持續生長即應盡早切片，勿延誤，為非。","C":"適當手術切除仍是治癒肉瘤最佳方式，無其他modality更佳，敘述正確。","D":"細針抽吸無法分型分級，不適用於下肢肉瘤診斷，敘述正確。","E":"放射線治療是現今肉瘤最主要的輔助治療方式，敘述正確。"},"cite":"Neligan 5e, Vol.4 Lower Extremity/Trunk Sarcoma；NCCN Soft Tissue Sarcoma Guideline","conflict":""},{"id":"8071","sub":"S4","src":"NG","years":[109,111,112],"stem":"How many patients with melanoma tend to have family history (B-K mole syndrome)?","opts":{"A":"1~1.5%.","B":"3~4.5%.","C":"10~11%.","D":"18~20%","E":"31~33%"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【Melanoma家族史 / B-K mole syndrome（＝familial atypical multiple mole melanoma, FAMMM / dysplastic nevus syndrome）】\n- 約 **10~11%** 之melanoma病人具家族史，屬本題數值。\n- **遺傳基礎**：**CDKN2A (p16INK4a)** 生殖系突變為FAMMM主要致病基因，亦與胰臟癌相關。\n- **臨床**：多發性非典型痣（atypical/dysplastic nevi）＋家族黑色素瘤史，終生melanoma風險極高，需定期全身皮膚監測。","peropt":{"A":"1~1.5%過低，非家族史盛行率。","B":"3~4.5%過低，非本題數值。","C":"◎ 約10~11% melanoma病人有家族史（B-K mole/FAMMM），正解。","D":"18~20%過高。","E":"31~33%明顯過高。"},"cite":"Neligan 5e, Vol.1 Melanoma；⚠跨版數值差異：Neligan 4e頁109『3~4.5%』vs頁111『3~5%』，本題採ans=C","conflict":"跨年數值差異（Neligan 4e vs Neligan 4e）：A: 109「1~1.5%.」 vs 111「1~2%.」；B: 109「3~4.5%.」 vs 111「3~5%.」 ｜ ⚠ 同題歷屆重出：「How many melanoma patients have family history (B-K mole syndrome)」。109/112年(8071)與111年(8092)皆答C，同題（B-K mole/dysplastic nevus syndrome家族史盛行率）。"},{"id":"8073","sub":"S6","src":"NG","years":[109],"stem":"何者為large or problematic macrocystic/combined LMs的第一線治療方式？","opts":{"A":"硬化劑治療sclerotherapy","B":"放射線治療radiotherapy","C":"手術切除resection","D":"冷凍治療cryotherapy","E":"壓力衣compression garments"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【巨大/棘手 macrocystic 或 combined 淋巴管畸形 LM 之第一線治療】\n- **首選：硬化劑治療 sclerotherapy**（如OK-432 picibanil、doxycycline、bleomycin、乙醇/十四烷硫酸鈉）。\n- **原理**：macrocystic（大囊型）囊腔大、易抽吸並注入硬化劑，**療效佳且復發率低**，故為第一線。\n- **手術地位**：保留給硬化治療無效、局限性、或影響功能（呼吸道、視力）之病灶；microcystic型硬化效果較差。\n- LM屬**低流量（slow-flow）血管畸形**，非腫瘤。","peropt":{"A":"◎ 硬化劑治療為大型macrocystic/combined LM第一線，療效佳復發低，正解。","B":"放射治療非LM標準治療，有致癌風險。","C":"手術切除保留給硬化無效或局限病灶，非macrocystic首選。","D":"冷凍治療非LM治療方式。","E":"壓力衣僅為輔助/淋巴水腫處置，非病灶第一線治療。"},"cite":"Neligan 5e, Vol.3 Vascular Anomalies（Lymphatic Malformation）","conflict":""},{"id":"8074","sub":"S7","src":"NG","years":[109,111,112,113,114],"stem":"何處是毛髮基質瘤pilomatrixomas最好發的地方？","opts":{"A":"腳底","B":"臀部","C":"手掌","D":"臉頰及眼眶周圍","E":"以上皆非"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【毛髮基質瘤 pilomatrixoma（calcifying epithelioma of Malherbe）好發部位】\n- **最好發：頭頸部，尤其臉頰及眼眶周圍（head & neck）**，其次上肢。\n- **臨床**：兒童及年輕成人常見，質硬、可鈣化之皮下結節，『tent sign』（撐起皮膚呈多角面）。\n- **病理**：源自毛囊matrix細胞，**basaloid cells＋shadow/ghost cells**，常見鈣化及骨化，**CTNNB1 (β-catenin)** 突變相關。\n- 屬良性，治療為完整切除。","peropt":{"A":"腳底非pilomatrixoma好發部位。","B":"臀部非好發部位。","C":"手掌非好發部位（掌蹠無毛囊）。","D":"◎ 臉頰及眼眶周圍等頭頸部為pilomatrixoma最好發處，正解。","E":"既有明確好發部位（頭頸部），非『以上皆非』。"},"cite":"Neligan 5e, Vol.3 Benign Skin Adnexal Tumors；Grabb & Smith 9e Skin Lesions","conflict":"選項重排家族：與 NG113-B09-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG111-B09-Q07） ｜ ⚠ 同題歷屆重出：「毛髮基質瘤(pilomatrixoma)最好發部位」。109/112/114年(8074)、111年(8093)、113年(8106)皆答D（頭頸部），完全同題連年重出。"},{"id":"8075","sub":"S5","src":"NG","years":[109],"stem":"Like any oncologic discipline, sarcoma treatment is a typical field of modern interdisciplinary and multimodal therapy, which of the following is correct? (複選)","opts":{"A":"According to established surgical rules, any lesion in the lower extremity with a clinical history of pain, continuous growth, size over 2 cm, or deep subfascial localization is suspicious of a sarcomatous malignancy and should be surgically biopsied","B":"Primary bone sarcomas are even less frequent than soft tissue sarcomas, and most malignant osseous lesions are metastatic, especially in young age","C":"Human herpes virus-8(HHV-8) , Arsenic radiation, hemochromatosis can be predisposing factors for soft tissue sarcoma","D":"The most common histopathologic subtype distribution in extremities in the largest series in the literature is fibrosarcoma","E":"According to the American Joint Committee on Cancer (AJCC) system designed for extremity sarcomas, dermatofibrosarcoma protuberans (DFSP) and angiosarcoma are exempt from staging with the AJCC"},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"🎯【肉瘤多科整合治療—複選找『正確』】\n- **A錯**：可疑肉瘤之外科教條為**深部、＞5 cm、持續生長、疼痛**即應切片；此處寫『size over 2 cm』，門檻應為**5 cm**→A錯（誘答事實置換）。\n- **B錯**：原發骨肉瘤較軟組織肉瘤更罕見；但『年輕族群多為轉移性骨病灶』錯—**年輕人骨惡性病灶多為原發**（如osteosarcoma、Ewing），老年才以轉移為主→B錯。\n- **C對**：HHV-8（→Kaposi/angiosarcoma）、arsenic、放射線、hemochromatosis均為軟組織肉瘤誘發因子。\n- **D錯**：四肢最常見組織型並非fibrosarcoma，而是**undifferentiated pleomorphic sarcoma (UPS/MFH)、liposarcoma**等。\n- **E對**：**DFSP與angiosarcoma被AJCC四肢肉瘤分期系統排除**（不納入staging）。","peropt":{"A":"切片門檻應為＞5cm（非2cm），數值錯誤。","B":"年輕族群骨惡性病灶多為原發（非轉移），敘述錯誤。","C":"◎ HHV-8、砷、放射線、血色素沉積症皆為軟組織肉瘤誘發因子，正確。","D":"四肢最常見組織型為UPS/liposarcoma，非fibrosarcoma，錯誤。","E":"◎ DFSP與angiosarcoma被排除於AJCC四肢肉瘤分期之外，正確。"},"cite":"Neligan 5e, Vol.4 Sarcoma；AJCC Cancer Staging Manual（Soft Tissue Sarcoma）","conflict":""},{"id":"8076","sub":"S3","src":"NG","years":[109,111],"stem":"下列有關肢體燒燙傷的描述，以下何者正確? (複選)","opts":{"A":"一開始的處置最為重要，一旦Scar contracture發生，一定會影響手部的功能","B":"除了固定姿勢,須等傷口完全好才可以開始復健","C":"手指( 特別是pulp)，web space建議使用FTSG, dorsal hand，若保有epitendon 可以使用STSG","D":"針對Deep burns，可以使用 dermal institute，優點為thicker and potentially more pliable cover","E":"手術後2-3週開始復健,還是必須持續使用splinting，特別是晚上或是沒有活動時"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯【肢體燒燙傷處置—複選找『正確』】\n- **A對**：初期處置最重要；一旦scar contracture形成必影響手功能，故強調早期擺位與副木。\n- **B錯**：**不需等傷口完全癒合才復健**—早期（除固定姿勢外）即應開始range of motion，延遲復健導致僵硬攣縮→B為錯（不入答案）。\n- **C對**：手指（尤pulp）、web space植皮宜用**全層皮FTSG**（較耐磨、較少攣縮）；手背若保有paratenon/epitendon可用**中厚皮STSG**。\n- **D對**：深度燒傷可用**真皮替代物（dermal substitute, 如Integra）**，提供較厚、較柔軟且延展性佳之覆蓋。\n- **E對**：術後2–3週開始復健，仍須持續**splinting**，尤其夜間及靜止時以對抗攣縮。","peropt":{"A":"◎ 初期處置最重要，攣縮一旦形成即影響手功能，正確。","B":"須待傷口完全癒合才復健為錯—應早期復健，故不選。","C":"◎ 手指pulp/web space用FTSG、手背保有epitendon用STSG，正確。","D":"◎ 深度燒傷用真皮替代物提供較厚且柔軟延展之覆蓋，正確。","E":"◎ 術後2–3週復健仍須持續副木固定（尤夜間/靜止時），正確。"},"cite":"Neligan 5e, Vol.4 Burn Reconstruction；Grabb & Smith 9e Hand Burns","conflict":""},{"id":"8077","sub":"S3","src":"NG","years":[109,111],"stem":"顏面燒燙傷的特有標誌（facial burn stigmata）包含哪些？(複選)","opts":{"A":"上眼窩凹陷（sunken upper eyelid）","B":"下眼瞼外翻 (lower eyelid ectropion)","C":"鼻子變長、鼻翼外張（Long nose with ala flaring）","D":"上唇及人中部分短而內縮（short retruded upper lip）","E":"下唇內翻（lower lip inversion）"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯【顏面燒燙傷特有標誌 facial burn stigmata—複選】\n- 疤痕攣縮牽引造成之典型變形：\n  - **B對 下眼瞼外翻（ectropion）**：垂直方向攣縮牽引下瞼向下→暴露、乾眼。\n  - **D對 上唇短而內縮（short retruded upper lip）**：口周攣縮使上唇縮短、牙齒外露。\n- **非標誌**：\n  - A『上眼窩凹陷』非典型；典型為眼瞼外翻。\n  - C應為**鼻子變短（short nose）**而非變長。\n  - E下唇典型為**外翻（eversion）**而非內翻。","peropt":{"A":"上眼窩凹陷非顏面燒傷典型標誌（典型為眼瞼外翻）。","B":"◎ 下眼瞼外翻（ectropion）為典型facial burn stigmata，正確。","C":"應為鼻短（short nose）非變長，敘述錯誤。","D":"◎ 上唇短而內縮（short retruded upper lip）為典型標誌，正確。","E":"下唇典型為外翻（eversion）非內翻，敘述錯誤。"},"cite":"Neligan 5e, Vol.3 Facial Burn Reconstruction；Grabb & Smith 9e","conflict":""},{"id":"8078","sub":"S3","src":"NG","years":[109,111],"stem":"燒燙傷後產生彌漫性腋下疤痕攣縮，其重建的最佳選擇為？","opts":{"A":"皮瓣重建","B":"Z-plasties","C":"Skin grafts外加副木固定","D":"Integra或Alloderm外加補皮","E":"類固醇治療"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【腋下彌漫性（diffuse）燒傷疤痕攣縮重建首選】\n- **彌漫性、面積廣之攣縮 → 皮膚移植（skin graft）＋副木固定** 為最佳。\n  - 大範圍缺乏正常鄰近皮膚，Z-plasty/局部皮瓣組織量不足。\n  - 術後**splinting維持外展位**是防止再攣縮之關鍵。\n- **對照觀念**：\n  - **線性帶狀（linear band）攣縮 → Z-plasty/local flap** 延長最佳。\n  - 廣泛缺損才考慮皮瓣（游離/區域）。\n- 本題強調『彌漫（diffuse）』故選skin graft＋splint。","peropt":{"A":"皮瓣保留給廣泛全層缺損或需帶血運組織處，非彌漫疤痕首選。","B":"Z-plasty適用線性帶狀攣縮，非彌漫性大面積攣縮。","C":"◎ 彌漫性腋下攣縮以皮膚移植＋副木固定為最佳選擇，正解。","D":"Integra/Alloderm＋植皮為深度缺損選項，非彌漫攣縮首選。","E":"類固醇用於增生性疤痕/蟹足腫，無法解除既成攣縮。"},"cite":"Neligan 5e, Vol.4 Burn Reconstruction（Axillary Contracture）","conflict":""},{"id":"8079","sub":"S2","src":"NG","years":[109,111],"stem":"氫氟酸灼傷會致命的原因？","opts":{"A":"低血鉀症","B":"低血鈣症","C":"高血鉀症","D":"高血鈣症","E":"代謝性酸血症"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【氫氟酸 hydrofluoric acid (HF) 灼傷致命機轉】\n- **致命主因：低血鈣症（hypocalcemia）**。\n- **機轉**：氟離子（F⁻）穿透組織與**Ca²⁺、Mg²⁺結合成不溶性氟化物**，造成嚴重低血鈣（及低血鎂）→致命性心律不整（QT延長、VF）。\n- **常伴高血鉀**：細胞內鉀外流亦可加重心律不整。\n- **治療**：局部/皮下/動脈內**calcium gluconate**中和，嚴重者靜脈補鈣、心電監測。即使體表面積小仍可致命。","peropt":{"A":"低血鉀非HF主要致命機轉（常反為高血鉀）。","B":"◎ 氟離子螯合鈣造成低血鈣症，導致致命心律不整，正解。","C":"高血鉀可加重但主軸為低血鈣，非本題最佳答案。","D":"高血鈣與HF灼傷病理相反，錯誤。","E":"代謝性酸中毒非HF特異致命機轉。"},"cite":"Grabb & Smith 9e Chemical Burns；Neligan 5e Vol.4","conflict":""},{"id":"8080","sub":"S7","src":"NG","years":[110,112,113],"stem":"What is the most common type of skin cancer ?","opts":{"A":"Bowen's disease","B":"Squamous cell carcinoma","C":"Melanoma","D":"Actinic keratosis","E":"Basal cell carcinoma"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯【最常見皮膚癌】\n- **基底細胞癌 basal cell carcinoma (BCC)** 為最常見皮膚癌（約占非黑色素瘤皮膚癌大宗）。\n- **特徵**：紫外線（UVB）誘發，好發頭頸曝曬區；**局部侵犯、極少轉移**；病理常見palisading、retraction artifact。\n- **順位**：BCC ＞ SCC ＞＞ melanoma。\n- 鑑別：Actinic keratosis與Bowen's disease為癌前/原位病變，非最常見『皮膚癌』本身。","peropt":{"A":"Bowen's disease為原位鱗癌（SCC in situ），非最常見皮膚癌。","B":"鱗狀細胞癌為第二常見，非最常見。","C":"黑色素瘤發生率遠低於BCC。","D":"Actinic keratosis為癌前病變，非皮膚癌本身。","E":"◎ 基底細胞癌BCC為最常見皮膚癌，正解。"},"cite":"Neligan 5e, Vol.1 Nonmelanoma Skin Cancer；Grabb & Smith 9e","conflict":""},{"id":"8081","sub":"S4","src":"NG","years":[110,112,113],"stem":"關於 melanoma 的敘述，下列何者為非？(複選)","opts":{"A":"We should avoid incision biopsy of suspected lesion for fear that tumor cells might be disseminated through the blood stream.","B":"For patients with Stage IA melanoma (≤1.0 mm in thickness), wide excision with a 2.0-cm margin is recommended","C":"Melanomas of the nail bed that are thin can be removed with the underlying periosteum if the tumor has not penetrated through the periosteum, then the distal phalanx can be saved and covered with a full-thickness skin graft.","D":"Serum LDH (lactate dehydrogenase) is used in the AJCC staging system as it portends a worse prognosis in patients with metastatic disease.","E":"Sentinel lymph node biopsy is indicated for patients with clinically negative nodes and primary lesions with aggressive features, generally, thickness greater than 1 mm"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯【Melanoma—複選找『為非』】\n- **A錯**：可疑病灶**可行切開/穿刺切片（incisional/punch biopsy）**，不會因血流播散腫瘤而惡化預後；『因怕擴散而避免切片』為錯誤觀念。\n- **B錯**：Stage IA（≤1.0 mm）建議**1.0 cm切緣**，非2.0 cm；2 cm用於1–2 mm以上→B錯（切緣：in situ 0.5–1cm、≤1mm 1cm、1–2mm 1–2cm、＞2mm 2cm）。\n- **C對**：甲床薄型melanoma未穿透骨膜者可連同骨膜切除、**保留遠端指骨**並以FTSG覆蓋。\n- **D對**：血清**LDH**納入AJCC分期（M1），升高預示轉移性病人預後較差。\n- **E對**：臨床淋巴結陰性且原發厚度**＞1 mm**（或具高風險特徵）者，適應**前哨淋巴結切片（SLNB）**。","peropt":{"A":"◎ 切開/穿刺切片不會造成血流播散惡化預後，『避免切片』觀念錯誤，為非。","B":"◎ Stage IA(≤1.0mm)應為1cm切緣非2cm，敘述錯誤，為非。","C":"薄型甲床melanoma未穿透骨膜可保留遠端指骨並FTSG覆蓋，正確。","D":"血清LDH納入AJCC分期，升高預後較差，正確。","E":"臨床淋巴結陰性且厚度＞1mm適應前哨淋巴結切片，正確。"},"cite":"Neligan 5e, Vol.1 Melanoma；AJCC 8th Melanoma Staging；NCCN Melanoma","conflict":""},{"id":"8082","sub":"S6","src":"NG","years":[110,112,114],"stem":"關於Vascular tumor and vascular anomalies何者正確?","opts":{"A":"Infantile hemangioma is the most common vascular malformation of infancy","B":"Infantile hemangiomas are present at birth, although not always obvious; they may slowly enlarge during childhood and adolescence","C":"Infantile hemangioma grows rapidly, slowly regresses, and never recurs","D":"Glucose transporter 2 (GLUT-2) is the marker for infantile hemangioma","E":"The standard treatment for Infantile hemangioma is laser treatment"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【血管腫瘤 vs 血管畸形—找『正確』】\n- **C對**：Infantile hemangioma (IH) 典型病程為**快速增生（proliferation）→緩慢自然消退（involution）→不復發**，屬經典描述。\n- **各錯項辨正**：\n  - **A錯**：IH是嬰兒期最常見之**血管腫瘤（tumor）**，非『malformation』（分類用詞錯誤）。\n  - **B錯**：IH**出生時多不明顯，通常出生後數週才出現**並快速增生；先天存在且不增生者為congenital hemangioma（RICH/NICH）。\n  - **D錯**：IH標記為**GLUT-1**（陽性），非GLUT-2。\n  - **E錯**：IH標準治療為**口服propranolol（β-blocker）**，非雷射為主。","peropt":{"A":"IH為嬰兒期最常見『血管腫瘤』非malformation，用詞錯誤。","B":"IH出生時多不明顯、生後數週才出現並快速增生，非緩慢終生增大，錯誤。","C":"◎ IH快速增生、緩慢消退、不復發，為經典病程描述，正確。","D":"IH標記為GLUT-1非GLUT-2，錯誤。","E":"IH標準治療為口服propranolol，非雷射，錯誤。"},"cite":"Neligan 5e, Vol.3 Vascular Anomalies（ISSVA分類）；Grabb & Smith 9e","conflict":""},{"id":"8083","sub":"S7","src":"NG","years":[110],"stem":"Which one of the following statements concerning the congenital melanocytic nevi is incorrect? (複選)","opts":{"A":"The most common location of giant nevi was found to be over the scalp","B":"Giant nevi are > 40 cm","C":"Early excision is the golden standard for patients with small and medium-sized congenital melanocytic nevi because of the very high risk of melanoma","D":"Multiple satellite nevi are the risk factor for neurocutaneous melanosis","E":"Congenital melanocytic nevi (CMN) are composed of clusters of nevomelanocytes that are generally present at birth"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"🎯【CMN—複選找『incorrect』】\n- **A錯**：巨型痣最常見部位為**背側軀幹（posterior trunk）**，非scalp→incorrect。\n- **C錯**：小型及中型CMN黑色素瘤風險**低**，早期切除並非因『極高風險』的黃金準則；此陳述誇大風險→incorrect。\n- **正確項辨正**：\n  - **B對**：Giant nevi定義**＞40 cm**（成人投射直徑）。\n  - **D對**：多發**衛星痣（satellite nevi）**為neurocutaneous melanosis之風險因子。\n  - **E對**：CMN由nevomelanocytes群集組成，**出生時即存在**。","peropt":{"A":"◎ 巨型痣最常見於背側軀幹非頭皮，敘述錯誤(incorrect)。","B":"Giant nevi定義為＞40cm，敘述正確。","C":"◎ 小/中型CMN黑色素瘤風險低，『極高風險』為誇大，敘述錯誤(incorrect)。","D":"多發衛星痣為neurocutaneous melanosis風險因子，敘述正確。","E":"CMN由痣黑色素細胞群集組成、出生時即存在，敘述正確。"},"cite":"Neligan 5e, Vol.3 Congenital Melanocytic Nevi；Grabb & Smith 9e","conflict":""},{"id":"8084","sub":"S5","src":"NG","years":[110],"stem":"Regarding to the surgical treatments for sarcomas in the lower extremity, which one is not true?","opts":{"A":"Limb-sparing surgery is oncologically not inferior to amputation","B":"Amputation usually represents only an important last line therapeutic modality today","C":"Amputations have a better outcome both in tumor safety and quality of life.","D":"The reconstructive goal should aim for a functional lower extremity capable of full weight-bearing.","E":"Not being able to preserve the main nerves and thereby sensitivity is not an indication for amputation by itself."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【下肢肉瘤手術—找『not true』】\n- **C錯**：現代證據顯示**保肢手術（limb-sparing）在腫瘤安全性（oncologic outcome）上不亞於截肢，且生活品質更佳**；故『截肢在腫瘤安全與生活品質皆較佳』為錯誤。\n- **正確項**：\n  - **A對**：保肢在腫瘤學上不劣於截肢。\n  - **B對**：截肢僅為現今重要之**最後一線**療法。\n  - **D對**：重建目標為可完全負重之功能性下肢。\n  - **E對**：無法保留主要神經/感覺**本身並非截肢適應症**。","peropt":{"A":"保肢手術腫瘤學上不劣於截肢，敘述正確。","B":"截肢現今僅為重要之最後一線治療，敘述正確。","C":"◎ 截肢在腫瘤安全與生活品質皆較佳為錯誤—保肢與截肢腫瘤學相當而QOL更佳，not true。","D":"重建目標為可完全負重之功能性下肢，敘述正確。","E":"無法保留主神經/感覺本身非截肢適應症，敘述正確。"},"cite":"Neligan 5e, Vol.4 Lower Extremity Sarcoma Reconstruction；NCI limb-sparing RCT","conflict":""},{"id":"8086","sub":"S3","src":"NG","years":[110],"stem":"顏面燒燙傷的病人會有疤痕攣縮而呈現出顏面燒燙傷特有標誌(facial burn stigmata), 下列相關表徵何者為顏面燒燙傷特有標誌(facial burn stigmata)?\n\n下唇內翻(lower lip inversion)\n\n下眼瞼外翻(lower eyelid ectropion)\n\n鼻子變長鼻翼外張(long nose with ala flaring)\n\n上唇縮短及內縮(short retruded upper lip)","opts":{"A":"1+2","B":"1+2+3","C":"1+3","D":"2+4","E":"2+3+4"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【顏面燒傷特有標誌—組合單選】\n- 正確組合為 **2＋4：下眼瞼外翻（lower eyelid ectropion）＋上唇短而內縮（short retruded upper lip）**。\n- **辨正**：①下唇典型為**外翻（eversion）**非內翻；③鼻子典型為**變短（short nose）**非變長。\n- 故僅②④屬facial burn stigmata → 選D。","peropt":{"A":"1+2含『下唇內翻』(應為外翻)，錯誤。","B":"1+2+3含下唇內翻與鼻變長之錯誤描述。","C":"1+3兩者(下唇內翻、鼻變長)皆非典型標誌。","D":"◎ 2+4＝下眼瞼外翻＋上唇短內縮，為正確facial burn stigmata組合，正解。","E":"2+3+4含『鼻變長』之錯誤描述。"},"cite":"Neligan 5e, Vol.3 Facial Burn Reconstruction","conflict":""},{"id":"8088","sub":"S2","src":"NG","years":[110],"stem":"有關一氧化碳中毒的臨床診斷與治療之描述,以下敘述何者為非？","opts":{"A":"一氧化碳與去氧血紅素的親和力是氧氣的40倍","B":"一氧化碳血紅素濃度>25%,或有心肌缺血、心律不整、或中樞神經學症狀,建議給予高壓氧治療","C":"孕婦或小孩一氧化痰中毒,若一氧化碳血紅素濃度>15%,即建議給予高壓氧治療","D":"一氧化碳中毒時,宜使用血氧機(pulse oximeter)來快速判斷病人血氧飽和狀況","E":"藉由高壓氧的治療,可以將血液中一氧化碳的半衰期縮短至23分鐘"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【一氧化碳中毒—找『為非』】\n- **D錯（答案）**：**pulse oximeter無法區分COHb與氧合血紅素**，會給出假性正常SpO₂，故不宜用血氧機判斷；需以**co-oximetry**測COHb→D為非。\n- **其他項**：\n  - B對：COHb＞25%或有心肌缺血/心律不整/中樞神經症狀→高壓氧HBOT。\n  - C對：孕婦或孩童COHb＞15%即建議HBOT。\n  - E對：HBOT可將CO半衰期縮短至約20–23分鐘（室內空氣約4–6小時、100%氧約60–90分）。\n- ⚠答案疑義：選項A『CO與去氧血紅素親和力為氧氣40倍』，主流文獻多引用**200–250倍**，40倍偏低，惟本題設定A為真、D為唯一『為非』；作答仍以ans=D為準。","peropt":{"A":"CO對血紅素親和力主流值約200–250倍(此處40倍偏低)，惟本題設定為真。","B":"COHb＞25%或有心肌缺血/心律不整/CNS症狀建議HBOT，正確。","C":"孕婦/孩童COHb＞15%即建議HBOT，正確。","D":"◎ pulse oximeter無法辨COHb會假性正常，不宜用於判斷血氧，為非。","E":"HBOT可將CO半衰期縮短至約20–23分鐘，正確。"},"cite":"Grabb & Smith 9e Inhalation Injury/CO Poisoning；Neligan 5e Vol.4 ⚠選項A親和力數值與主流200–250倍有落差","conflict":""},{"id":"8089","sub":"S5","src":"NG","years":[110],"stem":"廣泛燒燙傷傷口在癒和過程易產生不穩定的疤痕,在經過數年間反覆的潰瘍後可能會癌化,而產生Marjolin's ulcer,以下對於此疾病,下列描述何者正確？","opts":{"A":"是一種侵犯性的腺癌(infiltrating adenocarcinoma)","B":"淋巴轉移非常罕見","C":"五年存活率> 50%","D":"治療需合併廣泛切除及前哨淋巴結切片","E":"較常出現在肢體的燒燙傷疤痕上,特別是上肢"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【Marjolin's ulcer（慢性燒傷疤痕癌化）—找『正確』】\n- **D對**：屬侵襲性病灶，治療需**廣泛切除（wide excision）並評估/切除區域淋巴結（含sentinel node biopsy）**。\n- **各錯項辨正**：\n  - A錯：Marjolin ulcer最常為**侵襲性鱗狀細胞癌（SCC）**，非腺癌。\n  - B錯：與一般日曬型SCC相比**淋巴/遠端轉移率較高**，非罕見。\n  - C錯：一旦轉移**預後差**，整體/轉移後5年存活率常＜50%。\n  - E錯：最常出現於**下肢（慢性潰瘍/燒傷疤）**，非上肢。","peropt":{"A":"Marjolin ulcer多為侵襲性鱗癌(SCC)非腺癌，錯誤。","B":"其淋巴轉移率較一般SCC高，非罕見，錯誤。","C":"轉移後預後差、5年存活常＜50%，錯誤。","D":"◎ 治療需廣泛切除並評估區域淋巴結(含前哨切片)，正確。","E":"最常見於下肢慢性潰瘍/燒傷疤，非上肢，錯誤。"},"cite":"Grabb & Smith 9e Burn Reconstruction（Marjolin ulcer）；Neligan 5e Vol.1 SCC","conflict":""},{"id":"8090","sub":"S1","src":"NG","years":[110],"stem":"燒燙傷病人的急性時期治療原則需包含呼吸道的維持,與適當的體液及營養的補充,下列敘述何者正確?(複選)","opts":{"A":"吸入性損傷(inhalation injury)合併上呼吸道阻塞症狀需即早插管治療","B":"膠體溶液(colloid fluid)需在受傷24小時內開始補充","C":"根據Curreri Formula, 年齡介於16-59歲的病人,其每日所需熱量(kcal)為: (25x body weight in Kg) + (40 x % of Total body surface area of burn)","D":"蛋白質攝取量需增加至 1.5-3 g of protein / kg / day","E":"血壓是輸液治療是否足夠最重要的指標"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯【燒傷急性期輸液與營養—複選找『正確』】\n- **A對**：吸入性損傷合併上呼吸道阻塞徵象→**盡早插管**（水腫進展快，延遲插管風險高）。\n- **C對**：Curreri formula（16–59歲）每日熱量＝**(25×kg)＋(40×%TBSA)**。\n- **D對**：蛋白質需增至**1.5–3 g/kg/day**（高代謝、負氮平衡）。\n- **錯誤項**：\n  - **B錯**：膠體通常於**傷後24小時後**才給予（前24h以晶體液Parkland為主，早期毛細血管滲漏使colloid外漏無益）。\n  - **E錯**：輸液是否足夠**最重要指標為尿量（urine output, 0.5–1 mL/kg/hr）**，非血壓。","peropt":{"A":"◎ 吸入性損傷合併上呼吸道阻塞須盡早插管，正確。","B":"膠體通常24小時後才補充(前24h以晶體為主)，敘述錯誤，不選。","C":"◎ Curreri公式16–59歲熱量＝(25×kg)+(40×%TBSA)，正確。","D":"◎ 蛋白質需增至1.5–3 g/kg/day，正確。","E":"輸液足夠最重要指標為尿量非血壓，敘述錯誤，不選。"},"cite":"Grabb & Smith 9e Burn Resuscitation & Nutrition；Neligan 5e Vol.4（Curreri/Parkland）","conflict":""},{"id":"8091","sub":"S2","src":"NG","years":[110],"stem":"凍傷(Frostbite)後的肢體保留及後續的重建取決於是否有適當的急性處置,下列對於急性時期處理原則的描述,何者正確？(複選)","opts":{"A":"凍傷肢體回溫前,需先將中心體溫(core temperature)回復至35℃以上","B":"凍傷肢體回溫時,需置入38℃的無菌溫水浴中","C":"會伴隨明顯的全身發炎反應,需使用NSAID(non-steroidal anti-inflammatory drugs)","D":"Tissue plasminogen activator(rTPA)在24小時內給予可以增加肢體保留的機率","E":"建議即早將凍傷肢體截肢"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯【凍傷 Frostbite 急性處置—複選找『正確』】\n- **A對**：回溫前須先將**中心體溫回復至35℃以上**（避免核心後降core afterdrop與心律不整）。\n- **B對**：患肢以**37–39℃（約38℃）無菌溫水浴快速回溫**（rapid rewarming），避免乾熱與摩擦。\n- **C對**：伴顯著發炎反應，使用**NSAID（如ibuprofen）**抑制thromboxane/prostaglandin以減少組織壞死。\n- **D對**：**rt-PA於24小時內給予**（合併/不合併heparin）可溶解微血栓、提高肢體保留率。\n- **錯誤項**：\n  - **E錯**：**避免早期截肢**—組織界線需時間demarcation（『Frozen in January, amputate in July』），故延遲截肢。","peropt":{"A":"◎ 回溫前先使中心體溫回復＞35℃以避免core afterdrop，正確。","B":"◎ 以約38℃(37–39℃)無菌溫水浴快速回溫，正確。","C":"◎ 凍傷伴發炎反應，使用NSAID減少組織壞死，正確。","D":"◎ rt-PA於24小時內給予可提高肢體保留率，正確。","E":"應延遲截肢待組織界線清楚，非早期截肢，敘述錯誤，不選。"},"cite":"Grabb & Smith 9e Frostbite/Cold Injury；Neligan 5e Vol.4","conflict":""},{"id":"8094","sub":"S5","src":"NG","years":[111],"stem":"Which of the following statements regarding soft-tissue sarcoma reconstructions are correct? (複選)","opts":{"A":"Soft-tissue sarcomas are a rare disease entity with an incidence of 1:100 000 in adults and 10–15% in children.","B":"Any lesion in the lower extremity with a clinical history of pain, continuous growth, size over 5 cm, or deep subfascial localization is suspicious of a sarcomatous malignancy and should be surgically biopsied according to established surgical rules.","C":"To date, no other modality provides better cure for sarcoma than adequate surgery.","D":"Radiotherapy is the primary adjunctive treatment method in sarcoma management today.","E":"Parasitic (filariasis) lymphedema, is not considered a predisposing factor for soft-tissue sarcomas."},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：軟組織肉瘤（soft-tissue sarcoma）重建之正確敘述（複選，正解ABCD）\n- **發生率罕見**：成人約**1:100,000**，但在兒童惡性腫瘤中占**10~15%**（A正確）。\n- **臨床警訊需切片**：下肢病灶若有**疼痛、持續生長、>5 cm、深層subfascial定位**，應高度懷疑並依sarcoma原則做切片（縱向切口、可連同切片路徑一併切除）（B正確）。\n- **手術為根治核心**：迄今**無任何治療能比adequate surgery（wide excision, R0）提供更好的治癒**（C正確）。\n- **放療為現今主要輔助治療**：術前/術後radiotherapy可改善局部控制（D正確）。\n- **E為錯誤（故不選）**：**寄生蟲性（filariasis）淋巴水腫確實是誘發因子**——慢性淋巴水腫可導致**lymphangiosarcoma（Stewart-Treves概念的延伸）**，故E的「不是誘發因子」敘述錯誤。","peropt":{"A":"◎ 成人發生率約1:100,000、兒童占惡性腫瘤10~15%，正確。","B":"◎ 下肢病灶疼痛/持續生長/>5cm/深層定位須依sarcoma原則切片，正確。","C":"◎ 迄今無治療優於適當手術之治癒效果，正確。","D":"◎ 放療為現今主要的輔助治療方式，正確。","E":"寄生蟲（filariasis）性淋巴水腫其實是sarcoma誘發因子，故此敘述錯誤，不選。"},"cite":"Neligan Plastic Surgery, Soft-Tissue Sarcoma: Reconstruction & Predisposing Factors","conflict":""},{"id":"8095","sub":"S6","src":"NG","years":[111],"stem":"下列何者infantile hemangioma (IF) 的描述有誤？(複選)","opts":{"A":"IF在出生後9個月內快速成長，1歲時開始萎縮至5歲。","B":"IF好發在頭頸部。","C":"很少是多發性","D":"30%因發生潰瘍而需植皮治療","E":"在大的IF，每天給予口服prednisolone 5mg/kg治療小的IF"},"ans":"DE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Infantile hemangioma（IH，嬰兒血管瘤）之錯誤敘述（複選，正解DE）\n- **自然病程**：出生後**proliferative phase（快速增生，約前6~9個月最快）→ involuting phase（1歲後開始退化）→ involuted phase（約5~7歲大致消退）**（A大致符合）。\n- **好發頭頸部**（約60%位於頭頸部）（B正確）。\n- **多為單發（solitary）**；多發性（>5顆）需警覺**hepatic hemangioma**（C正確）。\n- **D錯誤**：潰瘍（ulceration）為最常見併發症（約占10%左右，非30%），且**首選治療並非植皮**，而是傷口照護、局部/口服治療；植皮非常規。\n- **E錯誤**：現代第一線治療為**propranolol（2~3 mg/kg/day）**；類固醇劑量亦非「口服prednisolone 5 mg/kg每日」的常規寫法，且敘述邏輯（用大IH的方式治小IH）混亂，屬過時且錯誤。\n- **現代觀念**：GLUT-1陽性為IH組織學標記，區別於congenital hemangioma（GLUT-1陰性）。","peropt":{"A":"IH前期快速增生、1歲後退化至數歲，大致正確故非錯誤選項。","B":"IH好發於頭頸部，正確故非錯誤選項。","C":"IH多為單發、很少多發，正確故非錯誤選項。","D":"◎ 錯誤：潰瘍發生率約10%而非30%，且需植皮並非常規處置。","E":"◎ 錯誤：第一線為propranolol；prednisolone 5mg/kg/day之敘述及邏輯不當、屬過時觀念。"},"cite":"Neligan Plastic Surgery, Vascular Anomalies: Infantile Hemangioma (ISSVA classification, GLUT-1, propranolol first-line)","conflict":""},{"id":"8096","sub":"S2","src":"NG","years":[110,112],"stem":"Following description about electrical burn, which is incorrect?","opts":{"A":"Electrical shock injuries are categorized as low or high voltage depending on the voltage is below or above 1000 volts","B":"Shock times are typically shorter in low-voltage shock injuries, with less risk of cardiopulmonary arrest","C":"Disruption of skeletal muscle membranes leads to release of myoglobin and hemoglobin that enter the circulation and muscle edema, which may lead to secondary compartment syndrome","D":"Renal failure can result from intrarenal aggregation of myoglobin","E":"Direct electrical shocks to the head may cause increased intracranial pressure"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Electrical burn（電灼傷）錯誤敘述（正解B）\n- **分類**：以**1000 volts**為界分為low-voltage與high-voltage（A正確）。\n- **B錯誤**：低壓電（尤其**AC交流電**）會誘發**tetanic muscle contraction**使受害者「握住」電源無法放手，**接觸時間反而延長**，且低壓AC可致**ventricular fibrillation / 心肺停止**，風險並非「較短、較低」。\n- **橫紋肌溶解**：肌肉膜破壞釋出**myoglobin/hemoglobin**進入循環，並造成肌肉水腫，可致**secondary compartment syndrome**（C正確）。\n- **急性腎衰竭**：**myoglobin於腎小管聚集**造成pigment nephropathy（D正確）。\n- **頭部直接電擊**可致**顱內壓上升**（E正確）。","peropt":{"A":"以1000V區分高低壓電傷，正確。","B":"◎ 錯誤：低壓AC因tetany致握持、接觸時間延長且有心律不整/心跳停止風險，並非時間短、風險低。","C":"肌膜破壞釋出myoglobin/hemoglobin並致肌肉水腫、次發性腔室症候群，正確。","D":"myoglobin於腎內聚集可致腎衰竭，正確。","E":"頭部直接電擊可致顱內壓上升，正確。"},"cite":"Grabb & Smith / Neligan, Burn: Electrical Injury","conflict":"⚠ 同題歷屆重出（中英雙語同考點）：電灼傷(electrical burn)「敘述何者為非/incorrect」單選。中文110年(8087)答B、英文112年(8096)答B，考點一致（電傷病生理與併發症）。注意另有複選版8105「which are FALSE」屬單複選型態不同，不併入。"},{"id":"8097","sub":"S7","src":"NG","years":[112,113],"stem":"Which of the following is true about Congenital hairy nevi?","opts":{"A":"Congenital hairy nevi are present at birth and are composed of nevomelanocytes, derived from melanoblasts.","B":"They are classified into two groups according to size.","C":"Benign with no potential for malignant degeneration.","D":"The onset of malignancy should be suspected with focal growth, pain, bleeding, ulceration, and significant pigmentary changes.","E":"The mainstay of treatment is prophylactic excision, which is usually staged with serial excisions if small, or excision and skin grafting."},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Congenital hairy nevi（先天性有毛痣）正確敘述（複選，正解ADE）\n- **A正確**：出生即存在，由**nevomelanocytes**組成，源自**melanoblasts（神經嵴來源）**。\n- **B錯誤**：一般依大小分為**三類（small <1.5 cm；medium 1.5~19.9 cm；large/giant ≥20 cm成人投影徑）**，非兩類。\n- **C錯誤**：**具惡性變（melanoma）潛能**，尤其giant CMN終生風險增加（並與neurocutaneous melanosis相關），並非完全良性。\n- **D正確**：惡性變徵兆包括**局部快速增生、疼痛、出血、潰瘍、明顯色素改變**。\n- **E正確**：治療主軸為**預防性切除**，小病灶可serial excision分期，大者可excision + skin graft。","peropt":{"A":"◎ 出生即有、由源自melanoblast的nevomelanocytes組成，正確。","B":"依大小分三類而非兩類，故此敘述錯誤，不選。","C":"先天有毛痣具惡性變潛能，並非完全良性，故錯誤，不選。","D":"◎ 局部生長、疼痛、出血、潰瘍、色素改變為惡變警訊，正確。","E":"◎ 治療主軸為預防性切除，可分期serial excision或切除加植皮，正確。"},"cite":"Neligan Plastic Surgery, Congenital Melanocytic / Hairy Nevi & Malignant Potential","conflict":""},{"id":"8098","sub":"S7","src":"NG","years":[109,111,112,113,114],"stem":"關於先天性黑色素痣(congenital melanocytic nevi)的描述何者錯誤？(複選)","opts":{"A":"先天性黑色素痣大約在胚胎24週以後才開始形成","B":"先天性黑色素痣和後天性黑色素痣(acquired nevi)在組織學上並沒有差異","C":"眼睛周圍的先天痣切除時有時候可以保留部分的病灶作為aesthetic landmark，例如眉毛","D":"先天性巨大黑色素痣最常見的部位在背後(posterior trunk)","E":"先天性巨大(large or giant)黑色素痣建議在6個月大的時候就可以開始治療"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯考點：Congenital melanocytic nevi（CMN，先天性黑色素痣）錯誤敘述（複選，正解AB）\n- **A錯誤**：CMN於**胚胎早期（黑色素母細胞遷移期，約妊娠6~24週間）**形成，敘述「24週以後才開始形成」不正確。\n- **B錯誤**：CMN與acquired nevi在**組織學上有差異**——CMN的痣細胞**分佈更深（真皮深層、皮下）、圍繞附屬器（毛囊、汗腺、皮脂腺、血管神經）並穿插於膠原束之間**，非「無差異」。\n- **C正確**：眼周先天痣切除時可保留部分病灶作**美學地標（如眉毛）**。\n- **D正確**：先天性巨大黑色素痣**最好發於posterior trunk（後背）**，常呈bathing trunk分佈。\n- **E正確**：大型/巨大CMN可考慮**約6個月大開始治療**（麻醉風險與惡性風險權衡）。","peropt":{"A":"◎ 錯誤：CMN形成於胚胎早期黑色素母細胞遷移階段，非24週後才開始。","B":"◎ 錯誤：CMN與後天痣組織學有別（分佈更深、繞附屬器、穿插膠原）。","C":"眼周先天痣可保留部分作美學地標（如眉毛），正確故非錯誤選項。","D":"巨大CMN最好發於後背（posterior trunk），正確故非錯誤選項。","E":"大型/巨大CMN約6個月大可開始治療，正確故非錯誤選項。"},"cite":"Neligan Plastic Surgery, Congenital Melanocytic Nevi（此為選項重排家族題，記概念勿背字母）","conflict":"選項重排家族：與 NG113-B09-Q09 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出：「先天性黑色素痣(CMN)描述何者錯誤(複選)」中文複選。109/111年(8072)答BC、112/114年(8098)答AB、113年(8107)答AB；同一複選題連年重出，選項排列不同致答案略異。注意英文版(8083)與「何者正確」版另計不併。（★8072之BC與8098/8107之AB差異較大，建議人工再核對選項）"},{"id":"8099","sub":"S5","src":"NG","years":[112,114],"stem":"Which of the following statements regarding soft-tissue sarcoma reconstructions is incorrect?","opts":{"A":"Sarcomas in the lower extremity are more common than in the upper limb.","B":"Radiation is considered a predisposing factor for soft-tissue sarcomas. Over 80% of radiation-associated sarcomas are low-grade types.","C":"Any lesion in the lower extremity with a clinical history of pain, continuous growth, size over 5 cm, or deep subfascial localization is suspicious of a sarcomatous malignancy and should be surgically biopsied according to established surgical rules","D":"To date, no other treatment modality provides better cure for sarcomas than adequate surgery.","E":"Radiotherapy is the primary adjunctive treatment method in sarcoma management today."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Soft-tissue sarcoma重建錯誤敘述（正解B）\n- **A正確**：下肢sarcoma較上肢常見。\n- **B錯誤**：放射線確為誘發因子，但**radiation-associated sarcoma絕大多數為high-grade（高惡性度）**，而非「超過80%為low-grade」。此為關鍵陷阱。\n- **C正確**：下肢病灶有疼痛/持續生長/>5 cm/深層subfascial定位須依sarcoma原則切片。\n- **D正確**：迄今無治療優於adequate surgery之治癒效果。\n- **E正確**：radiotherapy為現今主要輔助治療方式。","peropt":{"A":"下肢sarcoma較上肢常見，正確。","B":"◎ 錯誤：radiation-associated sarcoma多為high-grade，非80%以上為low-grade。","C":"下肢可疑病灶依sarcoma原則切片，正確。","D":"無治療優於適當手術之治癒效果，正確。","E":"放療為現今主要輔助治療，正確。"},"cite":"Neligan Plastic Surgery, Soft-Tissue Sarcoma: Radiation-Associated Sarcoma (high-grade)","conflict":""},{"id":"8100","sub":"S1","src":"NG","years":[112,113],"stem":"Which one of the following burn patients does NOT require referral to a burn unit?","opts":{"A":"65 year-old woman with no chronic medical issues with circumferential flame burn injury to the left forearm","B":"35 year-old man with no chronic medical issues with electrical burn to right hand when fixing a powerline.","C":"70 year-old man with well-controlled COPD and CAD with 8% TBSA partial thickness scald burn to both thighs","D":"3 year-old otherwise healthy girl with 5% partial thickness scald burn to buttocks and perineum","E":"32 year-old female with SLE currently on steroids with active vasculitic ulcers presents with 10% partial thickness burn to abdomen."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：ABA燒傷中心轉診指標——何者不需轉診（正解C）\n- **ABA transfer criteria**：>10% TBSA部分厚度燒傷、任何全層燒傷、**face/hands/feet/genitalia/perineum/major joints**燒傷、**electrical（含雷擊）、chemical、inhalation injury**、有**共病或需特殊社會/復健介入**者、兒童醫院能力不足時等。\n- **A需轉診**：**環狀（circumferential）**前臂燒傷有腔室症候群/escharotomy風險。\n- **B需轉診**：**電灼傷**為明確轉診指標。\n- **C不需轉診（權威答案）**：8% TBSA、**partial thickness**、位於大腿（非特殊部位），雖有COPD/CAD但控制良好且<10%，相對而言為五者中最不符強制轉診者。\n- **D需轉診**：燒及**buttocks/perineum**（會陰）為轉診指標，且為幼童。\n- **E需轉診**：**SLE使用類固醇、活動性血管炎潰瘍**屬顯著共病，須轉診。\n- ⚠答案疑義：70歲、合併COPD＋CAD本身即屬「pre-existing medical condition可能使處置複雜化」，嚴格依ABA亦可主張需轉診；惟本題以「相對最不需要」邏輯選C，故以ans C為準。","peropt":{"A":"前臂環狀燒傷有腔室症候群風險，需轉診。","B":"電灼傷為明確轉診指標，需轉診。","C":"◎ 8% partial thickness、位於大腿非特殊部位，為相對最不需轉診者（權威答案）。","D":"會陰/臀部燒傷且為幼童，需轉診。","E":"SLE用類固醇合併活動性血管炎潰瘍，屬顯著共病需轉診。"},"cite":"American Burn Association (ABA) Burn Center Referral Criteria","conflict":""},{"id":"8102","sub":"S1","src":"NG","years":[112,113],"stem":"Regarding nutritional and pain management in patients with major burn, which of the following is FALES?","opts":{"A":"Patients with 20% TBSA burns will be unable to meet their nutritional needs with oral intake alone, and usually need supplementary enteral nutrition.","B":"Patients with 50% TBSA burn can have 100% increase in basal metabolic rate and thus need increased calories and up to 3g of protein/kg/day to restore the deficit.","C":"Glycaemic control should be maintained at 80-110mg/dL, using intensive insulin therapy if required to decrease infection and mortality rates.","D":"Poor pain control is a source of major physiologic stress. Patient-controlled analgesia (PCA) is a good option that offers good pain control and the additional benefit of giving patients a sense of control.","E":"Due to prolonged use of high dose opiates, many patients struggle with not only physical dependence but also opiate addiction."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：大面積燒傷之營養與止痛——何者為錯（正解E）\n- **A正確**：≥20% TBSA者口服難以滿足需求，多需**腸道營養（enteral nutrition）**補充，早期腸道餵食可維持腸屏障、降低bacterial translocation。\n- **B正確**：50% TBSA者basal metabolic rate可增加約**100%（hypermetabolic response）**，需增加熱量並補充蛋白至約**3 g/kg/day**。\n- **C正確**：血糖控制目標約**80~110 mg/dL**（現代亦有主張避免過度嚴格以防低血糖），intensive insulin可降感染與死亡率。\n- **D正確**：疼痛控制不良為重大生理壓力源，**PCA**提供良好止痛並給予病人掌控感。\n- **E錯誤（權威答案）**：燒傷病人雖常有**physical dependence（生理依賴）與耐受性**，但發展為真正**opiate addiction（成癮）者其實少見**，故「many patients … opiate addiction」的敘述不正確。","peropt":{"A":"≥20% TBSA者需腸道營養補充，正確故非錯誤選項。","B":"50% TBSA可使BMR增約100%、需高蛋白約3g/kg/day，正確故非錯誤選項。","C":"血糖控制80~110mg/dL、必要時強化胰島素，正確故非錯誤選項。","D":"PCA提供良好止痛與掌控感，正確故非錯誤選項。","E":"◎ 錯誤：生理依賴常見，但發展為真正opiate addiction其實少見。"},"cite":"Neligan Plastic Surgery, Burn: Metabolic/Nutritional Support & Pain Management","conflict":""},{"id":"8103","sub":"S3","src":"NG","years":[107,110,112,113],"stem":"In preventing major joint contracture, which of the following is NOT an ideal resting joint position for patients with major burns?","opts":{"A":"Shoulder: aBduction ~70o with slight flexion 25o","B":"Elbow: 45o flexion","C":"Wrist: Slight extension 30o","D":"Hip: Extension with physiologic aBduction 15o","E":"Ankle maintain 90o"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：預防燒傷後主要關節攣縮之理想休息擺位——何者非理想（正解B）\n- **抗攣縮擺位原則**：對抗攣縮易發生的方向（多為屈曲/內收），以伸展、外展位固定。\n- **Shoulder**：外展約**70~90°併輕度屈曲**（A屬理想範圍）。\n- **Elbow（B非理想／權威答案）**：肘部應維持**接近full extension（伸直）**以對抗易生的屈曲攣縮；寫「45° flexion」為**非理想**擺位。\n- **Wrist**：輕度**背伸約30°**（C理想）。\n- **Hip**：**伸展併生理性外展約15°**（D理想）。\n- **Ankle**：維持**90°（neutral/中立位）**以防馬蹄足（equinus）（E理想）。","peropt":{"A":"肩外展約70°併輕屈曲，屬理想抗攣縮擺位。","B":"◎ 非理想：肘應維持接近伸直位以防屈曲攣縮，45°屈曲不佳。","C":"腕輕度背伸約30°，屬理想擺位。","D":"髖伸展併生理性外展約15°，屬理想擺位。","E":"踝維持90°中立位防馬蹄足，屬理想擺位。"},"cite":"Burn Rehabilitation: Anti-deformity Positioning / Splinting","conflict":"⚠ 同題歷屆重出（中英雙語同考點）：燒傷病人預防關節攣縮之理想擺位「何者錯誤/NOT ideal resting position」。英文107年(8061)答A、中文110年(8085)答C、英文112/113年(8103)答B；三年同一考點，選項排列不同致答案字母互異。"},{"id":"8104","sub":"S2","src":"NG","years":[112,113],"stem":"Which of the following chemical burns is CORRECTLY paired with it's treatment antidote?","opts":{"A":"Sulfuric acid （硫酸）- Calcium gluconate","B":"Sodium hypochlorite （漂白劑）- N-acetyl-cystine （NAC）","C":"Calcium hydroxide （水泥）- Vaseline （凡士林）","D":"Hydrofluric acid （氫氟酸）- Sodium bicarbonate","E":"Phenol （酚）- water irrigation and Polyethylene glycol (PEG) sponge"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：化學燒傷與解毒劑正確配對（正解E）\n- **E正確（權威答案）**：**Phenol（酚）** 以**大量清水沖洗＋polyethylene glycol (PEG)海綿**擦拭去除（酚為脂溶性，PEG可有效清除）。\n- **A誤**：**Sulfuric acid（硫酸）** 處置為**大量清水沖洗**，calcium gluconate並非其解毒劑。\n- **B誤**：**Sodium hypochlorite（漂白劑）** 以清水沖洗為主，NAC非其解毒劑。\n- **C誤**：**Calcium hydroxide（水泥/生石灰）** 應先**刷除乾粉再大量沖水**，凡士林非正解。\n- **D誤**：**Hydrofluoric acid（氫氟酸）** 的專一解毒劑為**calcium gluconate（局部/皮下/動脈內）**，而非sodium bicarbonate；此為經典陷阱（HF與Ca配對）。","peropt":{"A":"硫酸應大量清水沖洗，calcium gluconate非其解毒劑，配對錯誤。","B":"漂白劑以清水沖洗為主，NAC非解毒劑，配對錯誤。","C":"水泥/生石灰應先刷除乾粉再沖水，凡士林非正解，配對錯誤。","D":"氫氟酸的解毒劑是calcium gluconate而非sodium bicarbonate，配對錯誤。","E":"◎ 酚以清水沖洗加PEG海綿去除，配對正確。"},"cite":"Grabb & Smith / Neligan, Chemical Burns & Specific Antidotes (HF→calcium gluconate; phenol→PEG)","conflict":""},{"id":"8105","sub":"S2","src":"NG","years":[112,113],"stem":"Regarding electrical burn, which one of the following is/are FALSE? (複選)","opts":{"A":"When skin burn is limited to hands or feet, the underlying damage is usually not extensive.","B":"Nerves and vessels are poor conductors of electricity.","C":"High voltage burns rarely cause joint destruction.","D":"Myoglobinuria should be treated with acidic osmotic diuresis.","E":"With adequate management, amputation can often be avoided."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Electrical burn錯誤敘述（複選，正解ABCDE——五者皆錯）\n- **A錯**：即使皮膚燒傷僅局限於手/足，**深部組織（肌肉、血管、神經）損傷常相當廣泛**（冰山現象），不可低估。\n- **B錯**：**神經與血管其實是良好導體（低電阻）**，電流易沿其行進造成深部損傷，並非「poor conductors」。\n- **C錯**：**高壓電傷可造成關節破壞**（深部熱效應與肌肉壞死），並非rarely。\n- **D錯**：Myoglobinuria應以**鹼化尿液（alkaline diuresis，碳酸氫鈉）＋積極輸液利尿**處理，而非「acidic osmotic diuresis」。\n- **E錯**：高壓電傷**截肢率高**，即使適當處置仍常無法避免截肢，故「often avoided」不正確。","peropt":{"A":"◎ 錯誤：手足皮膚小傷口下常有廣泛深部損傷。","B":"◎ 錯誤：神經血管為良好導體（低電阻），非不良導體。","C":"◎ 錯誤：高壓電傷可造成關節破壞，非罕見。","D":"◎ 錯誤：myoglobinuria應鹼化尿液利尿，非酸化滲透性利尿。","E":"◎ 錯誤：高壓電傷截肢率高，常無法避免截肢。"},"cite":"Grabb & Smith / Neligan, Burn: Electrical Injury (深部損傷、alkaline diuresis、amputation)","conflict":""},{"id":"8108","sub":"S5","src":"NG","years":[113],"stem":"下列哪些關於 soft-tissue sarcoma 重建的敘述是正確的 ? (複選)","opts":{"A":"相較於上肢，Sarcomas 更常發生於下肢","B":"Radiation 被認為是 soft-tissue sarcomas 的誘發因子。超過 80%的 radiation-associated sarcomas 是 low-grade types","C":"Any lesion in the lower extremity with a clinical history of pain, continuous growth, size over 5 cm, or deep subfascial localization is suspicious of a sarcomatous malignancy and should be surgically biopsied according to established surgical rules","D":"迄今為止，沒有其他治療方式比適當的手術更能治癒 sarcoma","E":"Radiotherapy 是現今治療 sarcoma 的主要 adjunctive treatment method"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Soft-tissue sarcoma重建正確敘述（複選，正解ACDE）\n- **A正確**：相較上肢，sarcoma更常發生於**下肢**。\n- **B錯誤（故不選）**：放射線為誘發因子，但**radiation-associated sarcoma多為high-grade**，非「超過80%為low-grade」。\n- **C正確**：下肢病灶有疼痛/持續生長/>5 cm/深層subfascial定位須依sarcoma原則切片。\n- **D正確**：迄今無治療優於adequate surgery之治癒效果。\n- **E正確**：radiotherapy為現今主要輔助治療方式。","peropt":{"A":"◎ sarcoma較常發生於下肢，正確。","B":"radiation-associated sarcoma多為high-grade而非80%以上low-grade，敘述錯誤，不選。","C":"◎ 下肢可疑病灶依sarcoma原則切片，正確。","D":"◎ 無治療優於適當手術之治癒效果，正確。","E":"◎ 放療為現今主要輔助治療方式，正確。"},"cite":"Neligan Plastic Surgery, Soft-Tissue Sarcoma: Reconstruction","conflict":""},{"id":"8109","sub":"S4","src":"NG","years":[114],"stem":"有高度危險性淋巴腺轉移的Melanoma病人，底下何種步驟已成為Standard of Care？","opts":{"A":"Elective lymph node dissection","B":"Sentinel Node Biopsy","C":"Therapeutic lymphadenectomy","D":"Chemotherapy"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：高危險淋巴結轉移melanoma之standard of care（正解B）\n- **Sentinel Lymph Node Biopsy (SLNB)** 已取代elective lymph node dissection，成為**中厚度melanoma淋巴結分期的standard of care**（提供精準分期與預後資訊，降低不必要之全淋巴廓清併發症）。\n- **技術**：術前lymphoscintigraphy（Tc-99m）＋術中isosulfan/methylene blue藍染定位。\n- **意義**：SLN陽性者可進一步評估（現代趨勢：多以nodal ultrasound surveillance取代immediate completion lymphadenectomy，並考慮adjuvant systemic therapy）。\n- A（ELND）已被淘汰；C（therapeutic lymphadenectomy）用於臨床已明顯轉移者；D（chemotherapy）非melanoma分期之standard步驟。","peropt":{"A":"Elective lymph node dissection已被SLNB取代，非現行standard of care。","B":"◎ Sentinel Node Biopsy為高危險淋巴結轉移melanoma之標準分期步驟。","C":"Therapeutic lymphadenectomy用於臨床已明顯淋巴轉移者，非此情境之標準分期步驟。","D":"Chemotherapy對melanoma療效有限，非分期standard步驟。"},"cite":"Neligan Plastic Surgery, Melanoma: Sentinel Lymph Node Biopsy","conflict":""},{"id":"8110","sub":"S4","src":"NG","years":[104,105,114],"stem":"關於 melanoma 的敘述，下列何者為非？","opts":{"A":"Sentinel lymph node biopsy is offered to patients with melanomas >1 mm in thickness, and patients with thin melanomas (≤ 1 mm thick) that demonstrate high-risk features.","B":"Initial workup of the pigmented lesion should include excisional biopsy with a 1–2-mm margin of normal-appearing skin. If functional or cosmetic concerns prohibit removal of the entire lesion, incisional or punch biopsy may be performed.","C":"Recommended excision margins are determined by Breslow depth. In situ melanoma requires a 2-cm margin of normal-appearing skin.","D":"Subungual melanoma of the hand should be resected at the distal interphalangeal joint to preserve function.","E":"Serum lactate dehydrogenase is used in the American Joint Committee on Cancer staging system as it portends a worse prognosis in patients with metastatic disease."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：Melanoma錯誤敘述（正解C）\n- **A正確**：SLNB適用於**>1 mm厚度**之melanoma，以及**薄型（≤1 mm）但具高危特徵**（ulceration、high mitotic rate等）者。\n- **B正確**：色素病灶初步處置為**excisional biopsy帶1~2 mm正常皮膚邊緣**；若功能/美觀考量無法全切，可incisional或punch biopsy。\n- **C錯誤（權威答案）**：切除邊緣依**Breslow depth**決定，但**melanoma in situ僅需約0.5~1 cm邊緣**，並非「2 cm」。此為關鍵陷阱。\n- **D正確**：手部subungual melanoma常於**DIP joint**截除以保功能。\n- **E正確**：**LDH**納入AJCC分期（M category），轉移性疾病中預示較差預後。","peropt":{"A":">1mm或薄型具高危特徵者行SLNB，正確。","B":"色素病灶以1~2mm邊緣切除性切片，必要時incisional/punch，正確。","C":"◎ 錯誤：melanoma in situ僅需約0.5~1cm邊緣，非2cm。","D":"手部甲下melanoma於DIP關節截除保功能，正確。","E":"LDH納入AJCC分期、預示轉移性疾病較差預後，正確。"},"cite":"Neligan Plastic Surgery, Melanoma: Excision Margins (in situ 0.5–1 cm) / AJCC staging","conflict":"跨年數值差異（Neligan 3e vs Neligan 5e）：C: 104「Recommended excision margins are determi」 vs 114「Recommended excision margins are determi」 ｜ ⚠ 同題歷屆重出：「關於melanoma的敘述，何者為非」單選。104年(8023)答C、105年(8034)答E、114年(8110)答C；同考點連年重出，選項重排致答案互異。注意複選版8081「何者為非(複選)」屬單複選型態不同，另計不併。"},{"id":"8111","sub":"S4","src":"NG","years":[114],"stem":"底下何者為針對Melanoma之Sentinel Node Biopsy之適應症？(複選)","opts":{"A":"Melanoma ＞ 1 mm","B":"Clark level Ⅳ/Ⅴ","C":"Melanoma ＞ 0.75 mm伴隨Ulceration","D":"Melanoma ＜ 0.75 mm併Hyperpigmetation"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"🎯考點：Melanoma之SLN biopsy適應症（複選，正解ABC）\n- **A正確**：**Melanoma厚度>1 mm**為典型SLNB適應症。\n- **B正確**：**Clark level IV/V**（深層侵犯）屬高危特徵，為SLNB適應症之一（尤其薄型melanoma的加權指標）。\n- **C正確**：**Melanoma>0.75 mm伴ulceration**——薄型但具ulceration等高危特徵者建議SLNB。\n- **D錯誤（故不選）**：**Melanoma<0.75 mm併hyperpigmentation**——單純hyperpigmentation非公認高危特徵，且極薄型melanoma一般不建議SLNB。","peropt":{"A":"◎ Melanoma>1mm為SLNB適應症，正確。","B":"◎ Clark level IV/V為高危深度指標，屬SLNB適應症。","C":"◎ >0.75mm伴ulceration之高危薄型melanoma建議SLNB，正確。","D":"<0.75mm併hyperpigmentation非公認高危特徵，不屬SLNB適應症，不選。"},"cite":"Neligan Plastic Surgery, Melanoma: Indications for Sentinel Lymph Node Biopsy","conflict":""},{"id":"8112","sub":"S5","src":"NG","years":[114],"stem":"Which of the following statements regarding tumor resection margins and management is most accurate?","opts":{"A":"An R0 resection indicates the presence of microscopically residual tumor at the specimen margins.","B":"An R1 resection requires revisional surgery to achieve macroscopic tumor removal only, without concern for microscopic status.","C":"An R2 resection indicates macroscopic tumor remains after surgery, and revisional surgery aims to reduce it to at least an R1 situation.","D":"In secondary revisional surgery, the prior tumor bed should be widely opened and inspected.","E":"After achieving an R0 resection, adjuvant radiotherapy is always mandatory."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：腫瘤切除邊緣分級R0/R1/R2與處置（正解C）\n- **R分類定義**：**R0＝無殘存腫瘤（切緣鏡下亦陰性）**；**R1＝鏡下微觀殘存（microscopic residual）**；**R2＝肉眼可見巨觀殘存（macroscopic residual）**。\n- **C正確（權威答案）**：**R2表示術後仍有肉眼可見腫瘤殘存，再次手術目標為至少降至R1（進一步爭取R0）**。\n- **A誤**：R0應為**無**微觀殘存，非「有」。\n- **B誤**：R1為**微觀**殘存；其再手術目的並非「只求巨觀清除、不管微觀」，恰須追求鏡下陰性（R0）。\n- **D誤**：二次修整手術原則上應**連同原tumor bed整塊（en bloc）切除**，避免將舊腫瘤床「廣泛切開檢視」而造成腫瘤細胞播散/seeding。\n- **E誤**：達R0後**輔助放療並非一律強制**，須依腫瘤型別、grade、部位、邊緣等個別決定。","peropt":{"A":"R0應為無鏡下殘存腫瘤，敘述「有微觀殘存」錯誤。","B":"R1為鏡下微觀殘存，且再手術須追求鏡下陰性而非僅巨觀清除，錯誤。","C":"◎ R2為肉眼殘存，再手術目標為至少降至R1並爭取R0，正確。","D":"舊tumor bed應整塊切除避免播散，不宜廣泛切開檢視，錯誤。","E":"達R0後輔助放療非一律強制，須個別化，錯誤。"},"cite":"Surgical Oncology Principles: R0/R1/R2 Resection Classification","conflict":""},{"id":"8113","sub":"S5","src":"NG","years":[114],"stem":"Which of the following are recognized predisposing factors for soft-tissue sarcomas? （複選）","opts":{"A":"Neurofibromatosis type 1 (NF-1)","B":"Chronic lymphedema","C":"Polyvinyl chloride (PVC) exposure","D":"Epstein–Barr virus (EBV) infection","E":"Prior radiation therapy"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯考點：Soft-tissue sarcoma之公認誘發因子（複選，正解ABCE）\n- **A正確**：**Neurofibromatosis type 1 (NF-1)**——可惡性變為**MPNST（malignant peripheral nerve sheath tumor）**。\n- **B正確**：**慢性淋巴水腫（chronic lymphedema）**——可致**lymphangiosarcoma（Stewart-Treves syndrome）**。\n- **C正確**：**Polyvinyl chloride / vinyl chloride暴露**——與**hepatic angiosarcoma**相關。\n- **E正確**：**先前放射治療（prior radiation）**——radiation-associated sarcoma（多為high-grade）。\n- **D錯誤（故不選）**：**EBV**主要與免疫抑制病人之smooth muscle tumor有關聯，但**非一般公認的soft-tissue sarcoma誘發因子**（誘答項）。","peropt":{"A":"◎ NF-1可惡性變為MPNST，屬公認誘發因子。","B":"◎ 慢性淋巴水腫可致lymphangiosarcoma（Stewart-Treves），屬誘發因子。","C":"◎ PVC/vinyl chloride暴露與肝血管肉瘤相關，屬誘發因子。","D":"EBV非一般公認之soft-tissue sarcoma誘發因子，不選。","E":"◎ 先前放射治療為公認誘發因子。"},"cite":"Neligan Plastic Surgery, Soft-Tissue Sarcoma: Predisposing/Risk Factors","conflict":""},{"id":"8114","sub":"S1","src":"NG","years":[104,114],"stem":"關於 Inhalation injury之敘述，何者錯誤？","opts":{"A":"口咽部有紅腫或碳粒沉著為插管指標之一。","B":"診斷 gold standard 為flexible bronchoscopy","C":"與相同TBSA 燒傷但無吸入性損傷的病人相比，有吸入性損傷的燒傷病人死亡率較高","D":"若尿量維持所需輸液遠高於 Parkland formula，可能是 pulmonary edema 的徵兆。","E":"應避免早期插管以觀察病程發展"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：Inhalation injury（吸入性傷害）錯誤敘述（正解E）\n- **A正確**：口咽部**紅腫、碳粒沉著（carbonaceous sputum/soot）**、聲音沙啞、面部燒傷、鼻毛燒焦等為**插管警訊**之一。\n- **B正確**：診斷**gold standard為flexible bronchoscopy（可直接評估氣道黏膜損傷）**。\n- **C正確**：相同TBSA下，**合併吸入性損傷者死亡率顯著較高**（inhalation injury為獨立死亡預測因子）。\n- **D正確**：若**維持尿量所需輸液遠超Parkland公式預估（fluid creep/over-resuscitation）**，須警覺肺水腫等併發症。\n- **E錯誤（權威答案）**：氣道水腫常**進行性惡化**，一旦有上呼吸道阻塞徵象應**及早（early）預防性插管保護氣道**，不可為「觀察病程」而延遲插管。","peropt":{"A":"口咽紅腫、碳粒沉著為插管指標之一，正確故非錯誤選項。","B":"診斷gold standard為flexible bronchoscopy，正確故非錯誤選項。","C":"相同TBSA下合併吸入性損傷死亡率較高，正確故非錯誤選項。","D":"所需輸液遠超Parkland公式可能提示肺水腫，正確故非錯誤選項。","E":"◎ 錯誤：氣道水腫進行性惡化，應及早預防性插管而非延遲觀察。"},"cite":"Grabb & Smith / Neligan, Burn: Inhalation Injury (bronchoscopy, early airway protection)","conflict":"⚠ 同題歷屆重出：Inhalation injury「敘述何者錯誤」單選題。104年(8028)答E、114/115年(8114)答E，考點一致（吸入性傷害之診斷指標與處置迷思），僅選項文字/排列微調，答案字母相同。"},{"id":"8115","sub":"S2","src":"NG","years":[114],"stem":"關於燒傷病患發生一氧化碳（CO）中毒的相關敘述，下列哪些是正確的？(複選)","opts":{"A":"CO與血紅素的結合力約為O2的40倍","B":"給予FiO2 100% 的carboxyhemoglobin半衰期約1 hour","C":"高壓氧治療可將carboxyhemoglobin半衰期降至23 minute","D":"carboxyhemoglobin level > 25% 或有中樞神經症狀，可考慮進行高壓氧治療","E":"孕婦或兒童病患carboxyhemoglobin level > 15% 建議接受高壓氧治療，避免delayed neurological sequelae"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：一氧化碳（CO）中毒的病理生理與高壓氧（HBO）適應症\n- 【機轉】CO與hemoglobin結合形成carboxyhemoglobin（COHb），使氧解離曲線左移、組織缺氧；並抑制cytochrome oxidase造成細胞窒息。\n- 【親和力】傳統教科書多引用CO對Hb親和力約為O2的200–250倍（此為主流數據），少數簡化教材以較低倍數表述。\n- 【COHb半衰期】室內空氣約4–5 hr；FiO2 100%（non-rebreather/insufflation）縮短至約1 hr；HBO（2.5–3 ATA）進一步降至約20–30 min（約23 min）。\n- 【HBO適應症】COHb>25%、任何CNS症狀（意識喪失、抽搐、局部神經學缺損）、心肌缺血、代謝性酸中毒；孕婦因胎兒Hb對CO親和力更高，門檻降至COHb>15–20%，兒童亦採較低門檻，目的在預防delayed neurological sequelae。","peropt":{"A":"◎CO與血紅素結合力遠高於O2（主流數據約200–250倍）；本題以40倍表述，依權威答案仍計為正確。","B":"◎FiO2 100%可將COHb半衰期由室內空氣的4–5小時縮短至約1小時。","C":"◎高壓氧（約2.5–3 ATA）可將COHb半衰期進一步降至約20–30分鐘（23分鐘）。","D":"◎COHb>25%或出現中樞神經症狀為公認高壓氧治療適應症。","E":"◎孕婦（胎兒Hb親和力更高）與兒童採較低門檻（>15%）以預防delayed neurological sequelae。"},"cite":"Grabb & Smith 9e Burns / CO poisoning; Neligan 5e Vol.4 Burn。⚠答案疑義：A選項稱結合力「約40倍」與主流文獻200–250倍不符，惟依權威答案ABDCE全對，A維持◎。","conflict":""},{"id":"8116","sub":"S3","src":"NG","years":[114],"stem":"關於燒傷後異位骨化（Heterotopic Ossification, HO）的敘述，下列哪些為正確？(複選)","opts":{"A":"異位骨化最常見於膝關節，並常導致股神經受壓。","B":"延遲植皮與長時間傷口癒合延遲是 HO 的危險因子。","C":"手術應等待 HO 成熟後進行，其判斷標準包括影像上骨塊不再增大與疼痛減輕。","D":"手術時應早期辨認並保護 ulnar nerve，必要時進行前方轉位（anterior transposition）。","E":"HO 的術後應延遲關節活動，至少 2 週內避免任何主動或被動運動以促進癒合。"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：燒傷後異位骨化（Heterotopic Ossification, HO）的好發部位、危險因子與手術時機\n- 【好發部位】燒傷HO最常見於肘關節（elbow），尤其後內側，最易壓迫ulnar nerve（非膝關節、非股神經）。\n- 【危險因子】TBSA大、機械通氣時間長、癒合延遲、延遲植皮、長期臥床與被動運動不足、重複創傷。\n- 【手術時機】以往主張待HO成熟（骨代謝穩定）再手術；現代觀念傾向在關節功能受限即可介入，但仍以影像上骨塊停止增大、疼痛減輕、局部發炎消退為佐證。\n- 【術中要點】早期辨識並保護ulnar nerve，必要時行anterior transposition。\n- 【術後復健】應早期開始主動/被動關節活動以維持活動度，而非固定不動。","peropt":{"A":"HO最常見於肘關節並壓迫ulnar nerve，而非膝關節壓迫股神經，敘述錯誤。","B":"◎延遲植皮與長時間傷口癒合延遲確為HO的重要危險因子。","C":"◎手術傳統上待HO成熟，判斷含影像骨塊不再增大與疼痛減輕。","D":"◎肘部HO手術須早期辨識並保護ulnar nerve，必要時行前方轉位。","E":"術後應早期進行關節活動維持活動度，長期固定反而加重僵硬，敘述錯誤。"},"cite":"Grabb & Smith 9e Burn reconstruction; Neligan 5e Vol.4 Burn HO。","conflict":""},{"id":"8117","sub":"S3","src":"NG","years":[114,115],"stem":"關於臉部深度燒傷的處理，下列何者正確？","opts":{"A":"避免早期切除以保留殘餘皮膚","B":"僅於感染發生時進行切除","C":"確定為全層燒傷後，應於一週內切除與重建","D":"僅限於美容目的考慮重建","E":"應以真皮替代物優先處理"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：臉部深度（全層）燒傷的早期切除與重建原則\n- 【核心原則】確認為全層（full-thickness）燒傷後，應早期（約傷後一週內）進行切除並重建，避免長期焦痂造成感染、發炎延長與更嚴重疤痕攣縮。\n- 【重建首選】臉部以full-thickness skin graft（FTSG）為佳，色澤、質地與輪廓匹配較好；依aesthetic unit原則進行。\n- 【非全層時】淺二度、混合深度可先保守觀察待自行上皮化。\n- 【真皮替代物】非臉部深度燒傷的優先選項，應以自體移植與皮瓣為主。","peropt":{"A":"全層臉部燒傷延遲切除會延長發炎、加重疤痕，應早期切除，錯誤。","B":"不應僅在感染時才切除，確診全層即應及早處理，錯誤。","C":"◎確定為全層燒傷後應於一週內切除與重建，為正確處置。","D":"臉部重建兼顧功能與外觀，非僅美容目的，錯誤。","E":"真皮替代物非臉部深度燒傷之優先選項，錯誤。"},"cite":"Neligan 5e Vol.4 Facial burn; Grabb & Smith 9e Burns。","conflict":""},{"id":"8118","sub":"S1","src":"NG","years":[114,115],"stem":"哪一個年齡區間的兒童最容易因探索行為而發生燙傷？","opts":{"A":"<6 個月","B":"6–12 個月","C":"12–15 個月","D":"15–24 個月","E":">5 歲"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：兒童燙傷（scald）的年齡分布與機轉\n- 【好發年齡】15–24個月（toddler）因開始站立、行走與探索，會拉扯桌布、抓取熱飲熱鍋，最易發生潑濺／傾倒型燙傷。\n- 【機轉】此年齡活動力增加但危險意識不足，熱液燙傷為此族群最常見機轉。\n- 【鑑別】不符合發展年齡或呈手套襪套狀、對稱浸泡型分布者，需警覺非意外傷害（NAT/child abuse）。","peropt":{"A":"<6個月尚無探索移動能力，非好發族群，錯誤。","B":"6–12個月活動探索仍受限，非最高風險，錯誤。","C":"12–15個月風險上升但非最高峰，錯誤。","D":"◎15–24個月幼童行走探索、拉扯熱液，最易因探索行為燙傷。","E":">5歲已具危險意識，燙傷機率下降，錯誤。"},"cite":"Neligan 5e Vol.4 Pediatric burn epidemiology。","conflict":""},{"id":"8119","sub":"S1","src":"NG","years":[114,115],"stem":"一名3歲男童因熱水燙傷就醫，受傷面積估計為15% TBSA，主要分佈於前胸、腹部與右大腿前側，為中深度至全層燒傷。經初步處置後，準備進行液體復甦。關於兒童燒傷病患的液體復甦處置，下列敘述何者正確？","opts":{"A":"Parkland公式可直接套用成人公式，每公斤體重給予4 mL × TBSA的乳酸林格液，首8小時給予一半，後8小時給予另一半","B":"維持尿量為每小時1 mL/kg為復甦的主要目標","C":"對3歲以下兒童，液體復甦中不需要額外的葡萄糖補充","D":"評估灌流狀況以血壓為最敏感指標","E":"液體復甦首選輸注液為生理食鹽水"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：兒童燒傷液體復甦的特殊考量\n- 【尿量目標】兒童復甦以尿量約1 mL/kg/hr為主要終點（成人約0.5 mL/kg/hr）。\n- 【首選輸液】乳酸林格液（Lactated Ringer's），非生理食鹽水（避免高氯性酸中毒）。\n- 【葡萄糖】≤30 kg嬰幼兒肝醣儲備少，須以維持量額外補充含葡萄糖液體，防止低血糖。\n- 【公式調整】Parkland 4 mL×kg×%TBSA不可直接照搬成人，兒童須加上維持輸液（含糖）並依尿量、灌流頻繁調整。\n- 【灌流評估】兒童血壓可代償維持至晚期，血壓非敏感指標；應以尿量、心跳、末梢灌流、意識綜合判斷。","peropt":{"A":"兒童不可直接套用成人Parkland，需額外加維持輸液（含糖），敘述錯誤。","B":"◎兒童復甦主要目標為尿量約1 mL/kg/hr，正確。","C":"≤3歲嬰幼兒肝醣儲備少，須額外補充葡萄糖，敘述錯誤。","D":"兒童血壓代償力強、非敏感灌流指標，錯誤。","E":"兒童燒傷首選輸液為乳酸林格液而非生理食鹽水，錯誤。"},"cite":"Neligan 5e Vol.4 Pediatric burn resuscitation; Grabb & Smith 9e Burns。","conflict":""},{"id":"8120","sub":"S3","src":"NG","years":[114,115],"stem":"一名28歲女性因屋內火災導致臉部與頸部燒傷，臨床評估為深二度與三度混合型燒傷，伴有呼吸道燒傷的疑慮。處置後進入恢復期，準備進行重建與疤痕控制治療。關於頭頸部燒傷處理，下列何者正確？","opts":{"A":"Early facial burn excision is contraindicated due to high vascularity and risk of bleeding.","B":"Skin grafts on the neck should follow straight lateral line to match the natural skin tension lines.","C":"Full-thickness grafts are preferred for facial burns due to better color and contour match.","D":"Airway management in suspected inhalation injury should be delayed until definitive signs of obstruction are present.","E":"Split-thickness skin grafts are contraindicated in head and neck burns due to high risk of contracture."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：頭頸部燒傷的急性處置與植皮選擇\n- 【氣道優先】疑似吸入性傷害（顏面燒傷、鼻毛焦黑、聲音沙啞、carbonaceous sputum）應早期插管，因水腫進展快，不可等到明顯阻塞才處置。\n- 【早期切除】臉部早期切除並非禁忌，可減少焦痂相關併發症。\n- 【臉部植皮】以FTSG為佳，色澤與輪廓匹配優，依美學單位施行。\n- 【頸部植皮】接縫應避免直線橫越（尤其側頸直線），以減少攣縮；STSG可用於頸部，非禁忌。","peropt":{"A":"臉部早期切除並非禁忌，反而有助減少焦痂併發症，錯誤。","B":"頸部植皮應避免沿直線側緣，直線易致攣縮，錯誤。","C":"◎臉部燒傷以全層皮膚移植為佳，色澤與輪廓匹配較優，正確。","D":"疑似吸入性傷害應早期插管，不可延遲至明顯阻塞，錯誤。","E":"STSG於頭頸燒傷非禁忌，仍常使用，錯誤。"},"cite":"Neligan 5e Vol.4 Head & neck burn; Grabb & Smith 9e Burns。","conflict":""},{"id":"8121","sub":"S3","src":"NG","years":[114,115],"stem":"一名42歲男性因工業火災造成臉部與頸部全層燒傷，急性期接受清創與植皮。六個月後患者出現明顯頸部攣縮，限制頸部伸展與下顎活動，且外觀畸形嚴重影響社交功能。計畫進行重建手術。下列關於頭頸部燒傷後重建的敘述，何者正確？","opts":{"A":"Skin grafts alone are generally sufficient for severe neck contractures.","B":"Supraclavicular artery flap is a reliable option for anterior neck reconstruction due to its thin and pliable nature.","C":"Free flaps are contraindicated in post-burn neck reconstruction due to lack of suitable recipient vessels.","D":"Contracture release should be delayed until at least two years post-injury to ensure scar maturation.","E":"Z-plasty is the first-line technique for reconstruction of extensive cervical contractures."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：頭頸部燒傷後頸部攣縮的重建策略\n- 【嚴重攣縮】單純植皮易再攣縮，嚴重全層頸部攣縮需薄且柔軟之皮瓣覆蓋。\n- 【Supraclavicular artery flap】以supraclavicular artery（源自transverse cervical artery）為蒂，薄、柔軟、色澤匹配佳，為前頸重建可靠選擇。\n- 【游離皮瓣】頸部有充足受區血管（如facial、superior thyroid、transverse cervical），游離皮瓣（如ALT）並非禁忌。\n- 【手術時機】功能性攣縮（限制伸展、影響進食/呼吸）應儘早鬆解，不必硬性等待2年疤痕成熟。\n- 【Z-plasty】適用於線狀（band-like）攣縮，不適合大面積廣泛頸部攣縮。","peropt":{"A":"嚴重頸部攣縮單純植皮不足、易再攣縮，錯誤。","B":"◎鎖骨上動脈皮瓣薄且柔軟，為前頸重建可靠選項，正確。","C":"頸部有充足受區血管，游離皮瓣並非禁忌，錯誤。","D":"功能受限之攣縮應儘早鬆解，不必硬性延至兩年，錯誤。","E":"Z-plasty適用線狀攣縮，非廣泛頸部攣縮之首選，錯誤。"},"cite":"Neligan 5e Vol.4 Burn neck reconstruction; Grabb & Smith 9e Head & neck reconstruction。","conflict":""},{"id":"8122","sub":"S3","src":"NG","years":[114,115],"stem":"以下哪些因素與燒傷後疤痕惡化有關？(複選)","opts":{"A":"癒合時間超過 21 天","B":"男性患者","C":"白人種族","D":"僅接受保守治療的全層燒傷","E":"早期使用輔助性疤痕管理方法（如壓力治療、矽膠片）"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯考點：燒傷後病理性疤痕（hypertrophic scar）惡化的危險因子\n- 【癒合時間】癒合時間>21天為公認最強的肥厚性疤痕危險因子（延長發炎期）。\n- 【傷口深度／處置】全層燒傷若僅保守治療、延遲癒合，疤痕惡化風險升高。\n- 【膚色】深色皮膚（darker skin）為公認高風險，白種／淺膚色風險較低。\n- 【部位】頸部、上肢等張力／活動大部位風險高。\n- 【保護因子】早期壓力治療、矽膠片為疤痕預防，屬保護而非惡化因子。","peropt":{"A":"◎癒合時間超過21天為最重要的肥厚性疤痕危險因子，正確。","B":"◎依權威答案將男性計為危險因子（性別關聯文獻分歧），標為正確。","C":"白人／淺膚色屬較低風險，深色皮膚才是危險因子，錯誤。","D":"◎全層燒傷僅保守治療致延遲癒合，疤痕惡化風險升高，正確。","E":"早期壓力治療、矽膠片為疤痕保護／預防措施，非惡化因子，錯誤。"},"cite":"Neligan 5e Vol.1 Wound healing / scar; Grabb & Smith 9e Burns。⚠答案疑義：多數文獻列深色皮膚、女性、年輕為肥厚性疤痕危險因子，本題以「男性(B)」為正解、且未選深膚色(C)，與主流略有出入，惟依權威答案ABD維持。","conflict":""},{"id":"8123","sub":"S1","src":"NG","years":[114,115],"stem":"關於兒童燒傷之輸液給予，下列何者正確? (複選)","opts":{"A":"As concern about under-resuscitation mounted, there was a shift toward formulae with higher starting volumes.","B":"The most recognized endpoint and mainstay of resuscitation is hourly urine output, specifically 1 mL/kg in children and 0.5 mL/kg in adults.","C":"For infants and young children ≤30 kg, additional glucose in resuscitation fluid is provided at a maintenance rate to account for reduced glycogen storage.","D":"The goal of fluid resuscitation is to maintain circulating volume and end-organ perfusion.","E":"This initial fluid rate is a starting point for the resuscitation, and frequent adjustments are usually not expected and necessary."},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：兒童燒傷復甦公式演進與復甦終點（英文題幹）\n- 【趨勢】現代因fluid creep（過度復甦）之顧慮，趨勢是降低起始輸液量並嚴密調整，而非提高起始量。\n- 【復甦終點】以每小時尿量為主要指標：兒童約1 mL/kg、成人約0.5 mL/kg。\n- 【葡萄糖】≤30 kg嬰幼兒肝醣儲備有限，需以維持速率額外補充葡萄糖防低血糖。\n- 【目標】維持循環容積與末梢器官灌流。\n- 【動態調整】起始速率僅為起點，需頻繁依尿量、灌流調整（故稱「不需頻繁調整」為錯）。","peropt":{"A":"現代因過度復甦顧慮，趨勢是降低而非提高起始輸液量，錯誤。","B":"◎尿量為主要復甦終點：兒童1 mL/kg、成人0.5 mL/kg，正確。","C":"◎≤30 kg嬰幼兒需以維持速率額外補充葡萄糖，正確。","D":"◎復甦目標為維持循環容積與末梢器官灌流，正確。","E":"起始速率僅為起點，須頻繁調整，「不需調整」敘述錯誤。"},"cite":"Neligan 5e Vol.4 Burn resuscitation; ABA guidelines。","conflict":""},{"id":"8124","sub":"S3","src":"NG","years":[114,115],"stem":"關於頭頸部燒傷，何者正確? (複選)","opts":{"A":"In periocular burn injury, spared crow’s feet area can predict an uninjured cornea to a high degree of accuracy.","B":"In mixed-depth facial burns, excision should be performed to a uniform depth to prevent complications such as inclusion cysts, pits, and folliculitis caused by retained skin appendages","C":"Ear burns can be managed by allowing an eschar to form and separate naturally, as excision is often not suitable for this architecturally complex structure.","D":"When performing a skin graft for a neck burn, care must be taken to avoid a straight line on the lateral aspect to prevent future scar contracture.","E":"The scalp has a rich supply of blood vessels and hair follicles facilitating healing and re-epithelialization, making therapy essentially conservative."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：頭頸部各解剖區燒傷的處置細節（英文題幹）\n- 【眼周】保留的魚尾紋區（crow's feet）代表閉眼瞬間受保護，可高度預測角膜未受傷。\n- 【混合深度臉部】應切除至一致深度，避免殘留皮膚附屬器造成inclusion cyst、pit、毛囊炎。\n- 【耳部】結構複雜、軟骨易外露，常任焦痂自然形成分離，切除多不適合。\n- 【頸部植皮】須避免側緣直線，以防日後疤痕攣縮。\n- 【頭皮】血流與毛囊豐富，利於癒合與再上皮化，多採保守治療。","peropt":{"A":"◎保留的魚尾紋區可高度預測角膜未受傷，正確。","B":"◎混合深度臉部應切除至一致深度以防殘留附屬器致囊腫、毛囊炎，正確。","C":"◎耳部結構複雜，常任焦痂自然分離，切除多不適合，正確。","D":"◎頸部植皮須避免側緣直線以防攣縮，正確。","E":"◎頭皮血管與毛囊豐富利於癒合，多採保守治療，正確。"},"cite":"Neligan 5e Vol.4 Head & neck burn management。","conflict":""},{"id":"8125","sub":"S4","src":"NG","years":[115],"stem":"對於疑似 melanoma 的色素性病灶，若解剖位置允許，初始診斷性切片較建議採用下列何者？","opts":{"A":"shave biopsy 並盡量避免取到真皮層","B":"冷凍治療後觀察","C":"excisional biopsy，包含約 1-2 mm 正常外觀皮膚邊界","D":"直接 wide excision 5 cm margin","E":"僅抽血測 LDH 作為診斷依據"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：疑似黑色素瘤（melanoma）色素病灶的診斷性切片\n- 【首選】解剖位置允許時，採excisional biopsy並含約1–2 mm正常外觀邊界，全層達皮下脂肪，以取得完整Breslow depth（腫瘤厚度）供分期。\n- 【避免shave】淺層削切片可能低估厚度、影響分期與後續margin決策。\n- 【避免破壞】不可先做冷凍或只驗LDH替代組織診斷。\n- 【特殊部位】臉部、肢端、甲下等無法完整切除時，可行全層incisional/punch biopsy取最厚處。","peropt":{"A":"削片易低估Breslow厚度、影響分期，非疑似黑色素瘤首選，錯誤。","B":"冷凍治療會破壞病灶無法組織診斷，錯誤。","C":"◎切除性切片含1–2 mm正常邊界、達全層，可完整評估厚度，為首選，正確。","D":"初始診斷不應直接做5 cm廣泛切除，過度且未確診，錯誤。","E":"LDH無法作為組織診斷依據，錯誤。"},"cite":"Neligan 5e Vol.1 Melanoma; NCCN Melanoma guidelines。","conflict":""},{"id":"8126","sub":"S4","src":"NG","years":[115],"stem":"關於 melanoma 的 wide local excision margin，下列何者最符合一般原則？","opts":{"A":"melanoma in situ 通常約 0.5-1 cm margin","B":"Breslow depth 0.8 mm 一律需 3 cm margin","C":"所有 invasive melanoma 均需 amputation","D":"excision margin 與 Breslow depth 無關","E":"melanoma in situ 標準 margin 為 2 cm"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：黑色素瘤廣泛局部切除（WLE）之安全邊界原則\n- 【依Breslow depth決定margin】\n  - Melanoma in situ：約0.5–1 cm。\n  - ≤1.0 mm：1 cm。\n  - 1.01–2 mm：1–2 cm。\n  - >2 mm：2 cm。\n- 【重點】margin隨腫瘤厚度增加而擴大，並非固定或與厚度無關。\n- 【現代觀念】薄病灶不再使用過寬邊界；不因黑色素瘤即行截肢。","peropt":{"A":"◎黑色素瘤原位癌約0.5–1 cm邊界，符合原則，正確。","B":"Breslow 0.8 mm屬薄病灶約1 cm即可，非一律3 cm，錯誤。","C":"並非所有侵襲性黑色素瘤都需截肢，錯誤。","D":"切除邊界正是依Breslow厚度決定，非無關，錯誤。","E":"原位癌標準邊界約0.5–1 cm，非2 cm，錯誤。"},"cite":"NCCN Melanoma; Neligan 5e Vol.1 Melanoma margins。","conflict":""},{"id":"8127","sub":"S4","src":"NG","years":[115],"stem":"關於 melanoma 的處置與預後因子，下列哪些敘述正確？(複選)","opts":{"A":"wide excision margin 主要依 Breslow depth 決定","B":"sentinel lymph node biopsy 可考慮用於厚度 >1 mm 或薄但具高風險特徵的 melanoma","C":"serum LDH 在 metastatic melanoma 病人並不具有預後意義","D":"elective lymph node dissection 已是所有 clinically node-negative melanoma 的標準治療","E":"melanoma in situ 一律需要 2 cm margin"},"ans":"AB","multi":true,"etype":"ai","expl":"","key":"🎯考點：黑色素瘤的處置與預後因子\n- 【WLE margin】主要依Breslow depth（腫瘤厚度）決定。\n- 【SLNB】適用厚度>1 mm，或薄病灶（0.8–1 mm）合併高風險特徵（潰瘍、高mitotic rate）者。\n- 【LDH】血清LDH在metastatic（M1）黑色素瘤具預後意義，為AJCC M分期依據，故「不具預後意義」為錯。\n- 【ELND】選擇性淋巴結廓清已被SLNB取代，非所有臨床淋巴結陰性者之標準。\n- 【MIS margin】原位癌約0.5–1 cm，非一律2 cm。","peropt":{"A":"◎廣泛切除邊界主要依Breslow厚度決定，正確。","B":"◎前哨淋巴結切片可用於>1 mm或薄但具高風險特徵者，正確。","C":"血清LDH於轉移性黑色素瘤具預後意義（M分期），敘述錯誤。","D":"選擇性淋巴結廓清已被SLNB取代，非標準治療，錯誤。","E":"原位癌邊界約0.5–1 cm，非一律2 cm，錯誤。"},"cite":"NCCN Melanoma; AJCC 8th; Neligan 5e Vol.1 Melanoma。","conflict":""},{"id":"8128","sub":"S7","src":"NG","years":[115],"stem":"一名 6 歲男童因**巨大先天性色素痣（giant congenital melanocytic nevus）**覆蓋右側臉部及頸部，跨越多個 aesthetic units，並延伸至下眼瞼周圍。家屬希望在兼顧美觀與功能的前提下，盡可能降低殘留病灶與後續惡性變化追蹤困難的問題。根據本文內容，下列哪些治療策略是合理的？（複選）","opts":{"A":"以雷射治療為主，可完全清除深部 nevus cells，且不影響後續惡性變化監測","B":"Serial excision 適合部分中小型病灶，但靠近下眼瞼時需注意長期組織短缺與變形","C":"若無法直接切除縫合，tissue expansion 是中大型 congenital nevus 的主要重建方式","D":"臉部跨越多個 aesthetic units 且涉及眼周時，可考慮 tissue expansion 合併 full-thickness skin graft","E":"軀幹部位採 split-thickness skin graft 通常可獲得最佳長期外觀與功能結果"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：巨大先天性色素痣（giant CMN）的重建策略與惡性追蹤\n- 【惡性風險】giant CMN終生黑色素瘤風險升高，須兼顧完整切除與後續監測，殘留深部nevus cells不利追蹤。\n- 【雷射】僅淡化表淺色素，無法清除深層nevus cells，且色素改變干擾後續惡性變化監測，非理想。\n- 【Serial excision】適合中小型病灶；靠近下眼瞼須注意長期組織短缺與眼瞼外翻／變形。\n- 【Tissue expansion】中大型病灶主要重建方式，提供色澤質地匹配之鄰近組織。\n- 【臉部跨美學單位＋眼周】可組織擴張合併全層皮膚移植（FTSG）。\n- 【軀幹STSG】長期外觀與功能不佳（攣縮、色差），非最佳選擇。","peropt":{"A":"雷射無法清除深部痣細胞且干擾惡性監測，錯誤。","B":"◎序列切除適合中小型病灶，近下眼瞼須注意組織短缺與變形，正確。","C":"◎組織擴張為中大型先天痣的主要重建方式，正確。","D":"◎臉部跨美學單位涉眼周，可組織擴張合併全層植皮，正確。","E":"軀幹分層皮膚移植長期外觀功能欠佳，非最佳選擇，錯誤。"},"cite":"Neligan 5e Vol.3 Congenital melanocytic nevus; Grabb & Smith 9e Pediatric plastic surgery。","conflict":""},{"id":"8129","sub":"S6","src":"NG","years":[115],"stem":"一名 2 個月大女嬰，左上眼瞼有一個快速增大的鮮紅色腫塊，直徑約 2.5 cm，已部分遮蔽視軸。病灶出生時僅為淡紅色斑點，近 1 個月迅速增大。醫師診斷為 infantile hemangioma (IH)。根據本文內容，下列哪些敘述正確？（複選）","opts":{"A":"此病灶正處於 proliferative phase，通常生長最快發生於出生後前幾個月","B":"首選治療可考慮 intralesional triamcinolone 注射","C":"Pulsed-dye laser 是治療增生期 IH 的標準第一線治療","D":"若病灶超過 3–4 cm 或需大量類固醇注射，應考慮口服 propranolol","E":"若病灶造成視軸阻擋，應持續觀察至 4 歲再決定是否治療"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯考點：嬰兒血管瘤（Infantile Hemangioma, IH）的分期與治療\n- 【自然史】proliferative phase生長最快發生於出生後前幾個月（尤其前3–5個月）；隨後進入plateau與involution期。\n- 【問題型IH／首選】需治療者（阻擋視軸、氣道、潰瘍、快速增大）現代第一線為口服propranolol；病灶>3–4 cm或需大量類固醇時尤應選propranolol。\n- 【局部類固醇】intralesional triamcinolone可用於局限性小病灶（包含眼周），為傳統選項之一。\n- 【PDL】pulsed-dye laser主要用於潰瘍性IH及消退期殘留微血管擴張／紅斑，非增生期bulky病灶的第一線。\n- 【眼周急迫性】阻擋視軸有弱視（amblyopia）風險，須及早治療，不可觀察至4歲。","peropt":{"A":"◎病灶處於增生期，生長最快發生於出生後前幾個月，正確。","B":"◎局限性小病灶可考慮病灶內triamcinolone注射，依權威答案為正確。","C":"PDL用於潰瘍性或消退期殘餘紅斑，非增生期bulky IH第一線，錯誤。","D":"◎病灶>3–4 cm或需大量類固醇時應改口服propranolol，正確。","E":"阻擋視軸有弱視風險須及早治療，不可觀察至4歲，錯誤。"},"cite":"Neligan 5e Vol.1 Vascular anomalies / Infantile hemangioma。⚠答案疑義：現代問題型IH（尤阻擋視軸）第一線多為口服propranolol，B之intralesional triamcinolone屬傳統／局限病灶選項，依權威答案ABD維持B為◎。","conflict":""},{"id":"8130","sub":"S5","src":"NG","years":[115],"stem":"A 45-year-old male presents with a painless, deep subfascial mass measuring approximately 7 cm in his right thigh, which has been continuously growing. Imaging evaluation is highly suspicious for a soft-tissue sarcoma. As the reconstructive and oncologic surgeon planning the biopsy to obtain a definitive histopathologic diagnosis, which of the following surgical approaches aligns best with current established guidelines?","opts":{"A":"Fine-needle aspiration (FNA) should be the first-line standard diagnostic tool.","B":"Since the tumor is larger than 5 cm, an excisional biopsy should be performed directly by shelling out the tumor along with its pseudocapsule.","C":"An incisional biopsy should be performed with a longitudinal incision parallel to the axis of the extremity, and it is strongly recommended to use a pressurized tourniquet (without exsanguination) to ensure a bloodless field and minimize tumor cell contamination.","D":"To prevent postoperative hematoma, the incisional biopsy must routinely include a closed suction drain, with the exit site placed as far away from the primary incision as possible via a separate puncture to avoid interfering with primary wound healing."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：軟組織肉瘤（soft-tissue sarcoma）的切片原則（英文題幹）\n- 【切片方式】首選core needle biopsy或incisional biopsy；肢體切口須沿長軸縱行（longitudinal），使日後廣泛切除可完整切除切片路徑。\n- 【止血帶】可用加壓止血帶但不做驅血（without exsanguination），以獲無血視野並降低腫瘤細胞擴散。\n- 【FNA】細胞學無法可靠判定組織型與分級，非第一線標準。\n- 【禁excisional shelling】沿假包膜剝除會殘留微觀腫瘤（R1），為禁忌。\n- 【引流】若放引流，出口須與切口同軸且緊鄰，以便日後一併切除，非置於遠處。","peropt":{"A":"FNA無法可靠判定組織型與分級，非第一線標準工具，錯誤。","B":"沿假包膜剝除會殘留微觀腫瘤(R1)，切片不可用切除剝離，錯誤。","C":"◎沿肢體長軸縱行切開之incisional biopsy並用不驅血之加壓止血帶，符合指引，正確。","D":"引流若使用出口須與切口同軸緊鄰以便一併切除，非置於遠處，且非常規必須，錯誤。"},"cite":"Neligan 5e Vol.1 Soft-tissue sarcoma; NCCN Soft Tissue Sarcoma。","conflict":""},{"id":"8131","sub":"S5","src":"NG","years":[115],"stem":"A 52-year-old patient was urgently referred to your multidisciplinary sarcoma center after undergoing an excision of a suspected \"benign lipoma\" in the right lower leg at another facility three weeks ago. The previous operative report describes an \"easy shelling-out from a capsule\" through a horizontal incision. However, the final histopathologic report unexpectedly revealed a high-grade pleomorphic sarcoma. Regarding the subsequent management of this \"unplanned excision,\" which of the following clinical decisions is the most appropriate?","opts":{"A":"Since the tumor was macroscopically \"shelled-out completely\" with its capsule, it can be clinically considered an R0 resection. The patient only requires close radiographic follow-up and adjuvant radiotherapy.","B":"Shelling out a sarcoma from its pseudocapsule leaves microscopic residual tumor (R1 situation) with local recurrence rates up to 90%. A secondary wide excision must be performed, and the resection must include all previous horizontal skin incisions, stitch marks, and drain sites with an adequate margin of healthy tissue.","C":"Because the previous surgery utilized a non-oncologic \"horizontal incision\" that inevitably contaminated multiple muscle compartments, the only remaining curative and salvage option for this patient is an immediate above-knee amputation.","D":"To preserve remaining soft tissue and vessels for subsequent reconstruction, the previous surgical scar should be preserved. The tumor bed should simply be treated with minimally invasive electrocautery ablation followed by immediate free flap coverage."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：非計畫性肉瘤切除（unplanned excision / whoops procedure）的後續處置（英文題幹）\n- 【R1本質】沿假包膜「剝除」肉瘤必留微觀殘留（R1），局部復發率可高達約90%。\n- 【再廣泛切除】須行二次wide re-excision，切除範圍須包含先前的皮膚切口、縫線孔、引流出口並帶足夠健康組織邊界。\n- 【非R0】肉眼完整剝除不等於R0，不可僅追蹤加放療。\n- 【非必然截肢】適當再切除多可保肢，非只剩截肢一途。\n- 【禁電燒消融】腫瘤床電燒消融加皮瓣覆蓋非腫瘤學治療，錯誤。","peropt":{"A":"肉眼剝除不等於R0，殘留微觀腫瘤，不可僅追蹤加放療，錯誤。","B":"◎剝除留R1、復發率可達90%，須二次廣泛切除並含原切口、縫線孔、引流口，正確。","C":"適當再切除多可保肢，非只剩截肢，錯誤。","D":"電燒消融加皮瓣覆蓋非腫瘤學根治處置，錯誤。"},"cite":"Neligan 5e Vol.1 Sarcoma / unplanned excision; NCCN STS。","conflict":""},{"id":"8132","sub":"S2","src":"NG","years":[115],"stem":"Which of the following statements regarding different mechanisms of burn injury are correct? (複選)","opts":{"A":"Flash burns usually result from brief exposure to a thermal energy pulse and commonly involve exposed skin rather than areas covered by clothing.","B":"Scald burns are always easy to judge clinically at initial presentation because they immediately show clear structural skin changes","C":"Strong alkali burns tend to penetrate more deeply than acid burns because they cause lipid saponification and liquefactive tissue injury.","D":"In electrical injury, the visible skin wound reliably reflects the full extent of underlying tissue damage","E":"Cement burns are caused in part by calcium oxide reacting with water to form calcium hydroxide, producing an alkali injury."},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯考點：不同燒傷機轉的臨床特徵（英文題幹）\n- 【Flash burn】短暫熱能脈衝暴露，多傷及裸露皮膚，衣物遮蓋處相對受保護。\n- 【Scald】深度會隨時間演變，初期不易準確判定，非「立即呈現明確結構變化」。\n- 【鹼性 vs 酸性】強鹼造成脂質皂化與液化性壞死（liquefactive necrosis），穿透較酸（凝固性壞死）更深。\n- 【電傷】體表可見傷口常低估 function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);

  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}

      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
