adio-ulnar deviations in the hand and lateromedial deviations in the foot"},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"正確為BCE:Wassel用於radial(拇指)polydactyly非ulnar;Triphalangeal thumb多為AD、常雙側/有家族史。","peropt":{"A":"✗Wassel用於radial polydactyly(非ulnar)。","B":"Greig syndrome+combined polydactyly、hypertelorism/macrocephaly，正確。","C":"Camptodactyly=PIPJ屈曲攣縮，正確。","D":"✗Triphalangeal thumb常AD、常雙側、多有家族史。","E":"Clinodactyly=手部radio-ulnar偏斜，正確。"},"cite":"Neligan Volume 6, chap 28, p638,645,650,651","conflict":""},{"id":"1253","sub":"D","src":"NG","years":[109,111,112,114],"stem":"下列各種臂神經叢regional block的方式，何種相對適用於有pulmonary disease或是coagulopathy的病人？","opts":{"A":"Interscalene block.","B":"Axillary block.","C":"Infraclavicular block.","D":"Supraclavicular block.","E":"All of above."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Axillary block遠離胸膜(氣胸風險最低)、位置表淺易壓迫止血→肺病/凝血病較安全。","peropt":{"A":"Interscalene→易膈神經麻痺(phrenic)、近胸膜，肺病不宜。","B":"✔Axillary:氣胸風險最低、可壓迫止血。","C":"Infraclavicular→仍有氣胸風險。","D":"Supraclavicular→氣胸風險最高(近胸膜)。","E":"非全部。"},"cite":"Neligan, 5th Edition, vol.6, Ch4 p102","conflict":"⚠ 同題歷屆重出：臂神經叢regional block對pulmonary disease/coagulopathy相對適用者，正確答案恆為Axillary block。109年(1204)答D、111/112/114年(1253)答B(僅選項順序不同)；記概念不記字母。"},{"id":"1254","sub":"Q","src":"NG","years":[109,111,112,114,115],"stem":"關於Nail and fingertip reconstruction，下列何者為錯？","opts":{"A":"甲床縫合時應避免過大的張力。","B":"受傷後的nail deformity，建議要等至少8-12個月後再行評估重建。","C":"Atasoy flap，Kutler flap 與 visor flap都是常用於fingertip重建。","D":"使用defatted composite graft覆蓋傷口，小於十歲的兒童成功率會比成人高。","E":"即使手指傷口只有一公分，使用皮瓣重建傷口會比secondary intention獲得更多好處，如形狀與感覺的恢復。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"~1cm指尖小傷口secondary intention常癒合良好，皮瓣非必然更有利。","peropt":{"A":"甲床縫合避免過大張力，正確。","B":"nail deformity等8-12個月再評估重建，正確。","C":"Atasoy/Kutler/visor flap常用於指尖，正確。","D":"defatted composite graft在<10歲兒童成功率較高，正確。","E":"✔答案(錯)：~1cm小傷口secondary intention常癒合佳、外形感覺好，皮瓣非必然更有利。"},"cite":"Neligan, 5th Edition, vol.6, Ch6 p127, 136-139","conflict":"⚠ 同題歷屆重出：Nail/fingertip reconstruction『何者為錯』題，錯誤選項恆為「即使1公分傷口用皮瓣重建也優於secondary intention」。109年(1205)答C、111/112/114/115年(1254)答E(僅選項順序不同)；記概念不記字母。"},{"id":"1255","sub":"G","src":"NG","years":[111,112,114,115],"stem":"下列關於手部骨折的敘述，何者為錯？","opts":{"A":"掌骨骨折手術適應症包含：rotational deformity、shortening of 2–3 mm、articular step-off greater than 1 mm、greater than 25% articular involvement、and multiple fractures。","B":"PIP joint fracture, 若middle phalangeal base於關節面受損比例小於百分之三十，可以不用手術治療。","C":"生長板骨折（Growth plate fracture）在Salter–Harris classification 中，type II是最常見的。","D":"對於生長板還沒關閉的小兒骨折，K-wire穿過生長板是絕對禁止，因為可能會造成生長板提早關閉。","E":"關於Bennett fracture，Bennett fragment由於anterior oblique ligament會留在原處，而剩餘的metacarpal由於APL及adductor pollicis muscles的作用下，會造成橈側背側近側脫位（radial, dorsal, proximal subluxation）。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"小兒骨折必要時可用光滑K-wire穿越生長板(對生長干擾小)，非絕對禁止。","peropt":{"A":"掌骨骨折手術適應症(旋轉、短縮2-3mm、step-off>1mm、關節面>25%、多發)，正確。","B":"PIP骨折middle phalanx base關節面<30%可保守，正確。","C":"Salter-Harris type II最常見，正確。","D":"✔答案(錯)：必要時可用光滑K-wire穿越生長板，非絕對禁止。","E":"Bennett機制(anterior oblique ligament固定Bennett骨塊、其餘掌骨受APL+adductor pollicis牽拉→橈背近端脫位)，正確。"},"cite":"Neligan, 5th Edition, vol.6, Ch7 p149, 152, 153, 159, 169","conflict":""},{"id":"1256","sub":"L","src":"NG","years":[111,113,114,115],"stem":"以下哪種狀況是Replantation手術的\"absolute\" contraindication？","opts":{"A":"Mentally unstable patients.","B":"Multiple segmental injury in the amputated part.","C":"A patient with life-threatening injuries or multiple medical problems.","D":"Prolonged warm ischemia time.","E":"Extreme contamination."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 再植手術的『絕對』禁忌症為病人合併危及生命的傷害或多重內科問題（全身狀況不穩，救命優先於救肢）。核心鑑別：精神不穩、斷肢多段損傷、長時間溫缺血、極度污染皆為『相對』禁忌，須個別衡量而非絕對排除。","peropt":{"A":"✗ 精神狀態不穩為相對禁忌。","B":"✗ 斷肢多段損傷為相對禁忌。","C":"✓（正解）合併危及生命傷害或多重內科問題為絕對禁忌（救命優先）。","D":"✗ 長時間溫缺血為相對禁忌。","E":"✗ 極度污染為相對禁忌。"},"cite":"待複查（NG 手外科 再植禁忌症 記憶佐證）","conflict":""},{"id":"1257","sub":"F","src":"NG","years":[108,111,112,113,114,115],"stem":"下列關於手部 extensor 的敘述何者正確？ (複選)","opts":{"A":"第二跟第三個compartment 間可摸到一個突起，稱為 Lister's tubercle。","B":"De Quervain's disease 發生在手腕 extensor retinaculum 的第二個 compartment。","C":"EIP tendon 位於食指 EDC 的 radial site，而 EDM tendon 則位於小指的 ulnar site。","D":"第四個 compartment 包含五條手指的伸肌腱 (four extensor digitorum communis EDC tendons和extensor indicis propius EIP tendon)。","E":"第三個 compartment 的 extensor pollicis longus tendon 會在 extensor carpi radialis longus and brevis 上方橫越過第二個 compartment。"},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"正確為ADE。De Quervain在第1 compartment；EIP位於食指EDC的尺側/深側(非橈側)。","peropt":{"A":"Lister's tubercle在第2/3 compartment間，正確。","B":"✗De Quervain在『第1』compartment，非第2。","C":"✗EIP位於食指EDC的尺側/深側(非radial)。","D":"第4 compartment含4條EDC+EIP，正確。","E":"第3 compartment的EPL繞Lister's tubercle跨越第2 compartment上方，正確。"},"cite":"Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 10. P228.","conflict":"⚠ 同題歷屆重出：手部extensor『何者正確(複選)』題，正確選項恆為Lister's tubercle、第四compartment(4條EDC+EIP)、EPL橫越第二compartment；錯誤為de Quervain位於第二compartment、EIP位於EDC橈側。108年(1181)答BCD、111/112/113/114/115年(1257)答ADE(僅選項順序不同)；記概念不記字母。"},{"id":"1258","sub":"N","src":"NG","years":[109,111,112,113],"stem":"關於Thumb reconstruction，以下哪些敘述是正確的？ (複選)","opts":{"A":"Mobility, stability, sensibility, length, appearance 都是重建必要的考量。","B":"Moberg flap 常用於重建 dorsal middle third(1/3) defect。","C":"Distal third (1/3) loss 的主要目標在soft tissue restoration。","D":"Middle third (1/3) loss 的主要目標在restoration of length。","E":"Proximal third (1/3) 重建主要以microsurgery為主。"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"Moberg flap用於拇指『掌側(volar)』缺損,非dorsal。","peropt":{"A":"考量mobility/stability/sensibility/length/appearance，正確。","B":"✗Moberg flap用於掌側(volar)缺損(非dorsal)。","C":"distal 1/3→soft tissue restoration，正確。","D":"middle 1/3→restoration of length，正確。","E":"proximal 1/3→microsurgery，正確。"},"cite":"Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 13. P303-305.","conflict":"⚠ 同題歷屆重出：Thumb reconstruction『複選正確』題，錯誤選項恆為「Moberg flap用於重建dorsal middle 1/3 defect」(Moberg為掌側)。109年(1209)答ABCD、111/112/113年(1258)答ACDE(僅選項順序不同)；記概念不記字母。"},{"id":"1259","sub":"K","src":"NG","years":[111,112,113],"stem":"下列何者不是Glomus tumors症狀的classic triad:","opts":{"A":"對冷敏感Cold hypersensitivity","B":"間歇性、嚴重的疼痛(intermittent, severe pain)","C":"持續性、嚴重的疼痛(continuous, severe pain)","D":"特定點的疼痛(point tenderness)"},"ans":"C","multi":false,"etype":"ai","expl":"Glomus tumors frequently present subungually (Fig. 15.28). The classic triad of symptoms is cold hypersensitivity, intermittent severe pain, and point tenderness.","key":"🎯 Glomus tumor之classic triad為cold hypersensitivity（對冷敏感）、intermittent（間歇性）severe pain、point tenderness；常位於甲下。核心：疼痛為『間歇性』而非『持續性』，故『持續性嚴重疼痛』非三聯之一。⚠ 與NG113-B15-Q03為選項重排家族，記概念勿背字母。","peropt":{"A":"✗ 對冷敏感為三聯之一，非答案。","B":"✗ 間歇性、嚴重疼痛為三聯之一，非答案。","C":"✓（正解）持續性嚴重疼痛非三聯（應為intermittent），故為題目所問。","D":"✗ 特定點壓痛為三聯之一，非答案。"},"cite":"原檔詳解（Glomus triad: cold hypersensitivity, intermittent severe pain, point tenderness）","conflict":"選項重排家族：與 NG113-B15-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 跨年選項數不同，視為不同題（對照 NG110-B15-Q01） ⚠ 同題歷屆重出：Glomus tumor classic triad『何者不是』題，正確答案恆為「continuous(持續性) severe pain」(triad為intermittent/paroxysmal pain)。111年(1259)答C、112年(1279)答A、113年(1292)答C(僅選項順序不同)；記概念不記字母。"},{"id":"1260","sub":"I","src":"NG","years":[111],"stem":"Which of the following statement about Dupuytren's disease is correct?","opts":{"A":"Dupuytren's disease only affects the palmar fascial structures and does not affect the digital fascial structures.","B":"Women are more likely to develop Dupuytren's disease than are men.","C":"Population studies support that Dupuytren's disease is an autosomal-recessive disorder.","D":"Dupuytren's disease not only involves the palmar aponeurosis but also increases vascularity within the palm.","E":"The spiral cord displaces the digital nerve and artery medially, superficially, and proximally, placing them at risk for injury during skin incision and dissection."},"ans":"E","multi":false,"etype":"ai","expl":"Dupuytren's disease is a progressive disease of the palmar and digital fascial structures characterized by nodular thick-ening and subsequent contracture. en are six times more likely to develop Dupuytren's disease than are women and typically exhibit an onset in the fifth decade of life, in comparison to onset within the sixth decade for women.7 Population studies support an autosomal-dominant inheritance pattern with variable penetrance.\n\nHistopathologic studies have provided the foundation of scientists' nascent understanding of Dupuytren's disease. Initial studies have demonstrated not only involvement of the palmar aponeurosis but also absence of adipose tissue, a paucity of sweat glands, and increased vascularity within the affected palm. p.374\n\nThe spiral cord wraps around the neuro-vascular bundle, displacing the digital nerve and artery medially, superficially, and proximally, placing them at risk for injury during skin incision and dissection (Fig. 17.5). P.375","key":"🎯 Dupuytren's disease:同時侵犯掌側與手指筋膜結構的進行性攣縮;男性約為女性6倍、發病年齡較女性早;為 autosomal-dominant(變異外顯率)。手術關鍵解剖:spiral cord 纏繞神經血管束，使 digital nerve/artery 向內側、淺層、近端移位，切開/剝離時易受傷。⚠ 選項 D 提及『palm 內血管增生』雖見於組織病理描述，但本題指定單一最佳答案為 E(spiral cord 與 NV bundle 關係)。","peropt":{"A":"✗ 同時侵犯掌側『與手指』筋膜，非僅掌側。","B":"✗ 男性罹病率約為女性6倍，非女性較高。","C":"✗ 為 autosomal-dominant(變異外顯率)，非隱性。","D":"✗(非指定答案) 組織病理雖描述血管增生，但此選項非本題單一最佳答案。","E":"✓(正解) Spiral cord 使 digital nerve/artery 向內側、淺層、近端移位，術中易受傷。"},"cite":"原檔詳解","conflict":""},{"id":"1261","sub":"F","src":"NG","years":[111,112,113],"stem":"下列有關tendinopathy ，何者錯誤?","opts":{"A":"De Quervain's tenosynovitis主要發生在radial side of wrist，診斷最主要由病史和理學檢查決定。","B":"De Quervain's tenosynovitis手術須將第一個dorsal compartment的兩條肌腱都找出並放鬆。","C":"Trigger digit是最常見的手部疾病，治療包括rest, splinting, steroid injection, open or percutaneous surgery","D":"Trigger digit的診斷主要由影像檢查決定","E":"Lateral epicondylitis又叫做tennis elbow，疼痛在腕部extension時會加劇。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『錯誤』。Tendinopathy 重點：De Quervain 好發腕橈側，診斷主要靠病史與理學檢查(Finkelstein)，手術須放鬆第一 dorsal compartment 兩條肌腱(APL、EPB) 並注意 EPB 副鞘；trigger digit 為最常見手部疾病，治療含休息/副木/類固醇注射/手術；lateral epicondylitis(tennis elbow) 於腕伸時疼痛加劇。核心錯誤：Trigger digit 為『臨床診斷』，非主要靠影像，故 D 錯誤。","peropt":{"A":"✗（正確敘述）De Quervain 好發腕橈側，診斷主要靠病史與理學檢查。","B":"✗（正確敘述）De Quervain 手術須放鬆第一 dorsal compartment 兩條肌腱（APL、EPB）。","C":"✗（正確敘述）Trigger digit 為最常見手部疾病，治療含休息/副木/類固醇注射/手術。","D":"✓（正解＝錯誤敘述）Trigger digit 為臨床診斷，非主要由影像檢查決定。","E":"✗（正確敘述）Lateral epicondylitis（tennis elbow）於腕伸時疼痛加劇。"},"cite":"待複查（NG 手外科 Tendinopathy 記憶佐證）","conflict":"⚠ 同題歷屆重出：tendinopathy『何者錯誤』題，錯誤選項恆為「Trigger digit診斷主要由影像檢查決定」(應以臨床診斷)。111年(1261)答D、112年(1280)答E、113年(1291)答D(僅選項順序不同)；記概念不記字母。"},{"id":"1262","sub":"J","src":"NG","years":[111],"stem":"下列關於rheumatoid arthritis (RA)之敘述，何者錯誤？","opts":{"A":"常見症狀為morning stiffness，敏感度最高的症狀為對稱性關節炎及手部關節炎。","B":"Rheumatoid factor (RF)及anti-citrullinated protein antibodies (ACPAs)是RA marker，且和疾病嚴重度有關。","C":"關節症狀常從MCP joint、PIPjoint及手腕這些synovium to joint surface area ratio較低的關節開始。","D":"Swan-neck deformity可發生在DIP joint、PIP joint、MCP joint，boutonniere deformity總是發生在PIP joint。","E":"Rheumatoid thumb deformity可分為五型，第一型即為swan-neck deformity，第三型即為boutonniere deformity。"},"ans":"C","multi":false,"etype":"ai","expl":"Like RF, ACPA seropositivity also correlates with disease severity. (p.400)\n\nHowever, joint involvement tends to follow a predictable pattern. Symptoms often begin in the MCP, PIP and wrist joints first, in part due to their high synovium to joint surface area ratio. (p.401)\n\nSwan-neck deformity can originate from pathology at the MCP joint, the PIP joint, or the DIP joint (Fig. 19.20). Unlike swan-neck deformities, boutonniere deformities always begin with pathology at the PIP joint (Fig. 19.21).\n\nThe rheumatoid thumb deformity:\n\nType I: the most common, boutonniere deformity with MCP flexion, IP hyperextension, radial abduction of the metacarpal.\n\nType III: the second common, swan-neck deformity with MCP hyperextension, IP flexion, and metacarpal adduction contracture.","key":"🎯 RA（本題問『錯誤』，答案C）：核心錯誤在關節受累機轉——MCP/PIP/wrist先受累是因synovium-to-joint-surface ratio『高』（選項稱低，錯誤）。RF與ACPA皆與疾病嚴重度相關；swan-neck可源自DIP/PIP/MCP，boutonniere總始於PIP。⚠ 注意：本題選項E將rheumatoid thumb Type I述為swan-neck、Type III為boutonniere，與原文（Type I=boutonniere最常見、Type III=swan-neck）相反，E實亦為錯誤敘述。","peropt":{"A":"✗（敘述正確）morning stiffness；最敏感為對稱性及手部關節炎。","B":"✗（敘述正確）RF與ACPA皆為RA marker且與嚴重度相關。","C":"✓（正解，為錯誤敘述）MCP/PIP/wrist先受累係因ratio『高』而非低。","D":"✗（敘述正確）swan-neck可源自DIP/PIP/MCP，boutonniere總源自PIP。","E":"△ 依原文Type I應為boutonniere、Type III為swan-neck，故本選項亦為錯誤敘述——存在兩個錯誤選項，須留意答案疑義（本題以C為官方答案）。"},"cite":"原檔詳解（p.400–401；註：選項E與原文相反亦屬錯誤，答案疑義，建議人工複查）","conflict":""},{"id":"1265","sub":"N","src":"NG","years":[109,110,111,114],"stem":"下列關於hypoplastic thumb的敘述，何者正確？(複選)","opts":{"A":"Type I如要手術一般只需要使用local flap，進行first webspace widening即可","B":"Type II的thenar musculature發育不佳且合併adduction 及metacarpal–phalangeal (MP) joint laxity。","C":"Type III依據carpometacarpal joint是否穩定分為IIIA和IIIB。","D":"Type IV及type V的手術方式首選為index finger pollicization。","E":"Type V稱為pouce flottant。"},"ans":"ABCD","multi":true,"etype":"ai","expl":"A. Type I hypoplastic thumbs very rarely need any surgical treatment. Of all the methods available, the four-flap Z-plasty provides the best contour and appearance (Fig. 27.15). Dorsal transposition flaps from the index finger and rotation flaps are effective but require skin grafting on the visible dorsal surface of the hand. (p.605)\n\nB. The first webspace is short with the thumb adducted, the ulnar collateral ligament at the MP joint lax, and median innervated thenar muscles underdeveloped or occasionally absent (p.597)\n\nC. Manske and colleagues to subdivide this group into type IIIA with a full-length metacarpal and an intact CMC joint and type IIIB with a tapered first metacarpal and no CMC joint. (p.598)\n\nD. Type IV: floating thumb Index finger pollicization is the treatment of choice (see Fig. 27.7) unless there are too many cultural or parental concerns, in which case alternatives noted above can be used. Type V: aplasia Index finger pollicization is the treatment of choice (see Fig. 27.8). (p.607)\n\nE. Type IV稱為pouce flottant、floating thumb、pendeldaumen。(p.598)","key":"正確ABCD。pouce flottant(floating thumb)為Type IV，非Type V(V=aplasia)。","peropt":{"A":"Type I手術僅需local flap做first web widening(多數免手術)，正確。","B":"Type II:thenar發育不良+adduction+MCP joint laxity，正確。","C":"Type III依CMC穩定度分IIIA/IIIB，正確。","D":"Type IV/V首選index finger pollicization，正確。","E":"✗pouce flottant為Type IV，非Type V(V=aplasia)。"},"cite":"Neligan 5th, Vol 6, Ch 34, p 801-803,806","conflict":"⚠ 同題歷屆重出：hypoplastic thumb『複選正確』題，選項A由『Type I一般只需用local flap行first webspace widening』(109/110年,1221,為非→答BCD)改為『Type I如要手術一般只需用local flap...』(111/114年,1265,加上『如要手術』後為真→答ABCD)；E『Type V稱pouce flottant』兩版皆為錯誤選項；記概念不記字母、錨定該年A選項真偽。"},{"id":"1267","sub":"O","src":"NG","years":[111],"stem":"下列何者有關Syndactyly為非？ (複選)","opts":{"A":"在胚胎時期，於第41~43天可見肢芽(limb bud)，第53天手指完全分離。","B":"手指分離是bone morphogenic protein 4誘發 。","C":"臨床上，可分為incomplete、complete和complicated。","D":"併指遠端指骨融合(distal bone fusion) 稱為complete syndactyly。","E":"一般於1至2歲接受分離手術。"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯 Syndactyly:胚胎肢芽(limb bud)約於第26-28天出現，手指分離約於第53天完成(由 interdigital apoptosis、BMP4 誘導);臨床依組織分 simple/complex、依範圍分 incomplete/complete，另有 complicated;complete 指皮膚併連到指尖，遠端『骨性』融合為 complex(非 complete);手術多於1-2歲。本題找『錯誤』者為 A、C、D。","peropt":{"A":"✓(屬答案，敘述錯誤) 肢芽約第26-28天出現，非41-43天;手指分離約第53天完成。","B":"✗(敘述正確，不選) 指間分離由 BMP4 誘導的細胞凋亡完成。","C":"✓(屬答案，敘述錯誤) 正確分類軸為 simple/complex(組織)與 incomplete/complete(範圍)+complicated;所列組合不精確。","D":"✓(屬答案，敘述錯誤) 遠端骨性融合為 complex syndactyly;complete 指皮膚併連到指尖。","E":"✗(敘述正確，不選) 分離手術一般於1-2歲進行。"},"cite":"待複查（NG syndactyly 記憶佐證）","conflict":""},{"id":"1268","sub":"O","src":"NG","years":[111],"stem":"下列與Radial polydactyly 有關，何者為是？(複選)","opts":{"A":"Wassel classification為常用的分類方法","B":"Wassel type IV 最常見","C":"與遺傳基因有關","D":"Wassel type II 的thenar muscle發育不全hypoplastic","E":"Wassel type I常伴隨腕掌關節CMCJ僵硬"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"🎯 Radial polydactyly（thumb duplication）：Wassel classification 為常用分類；Wassel type IV（MCP 平面分叉）最常見；有遺傳/基因相關性（可為 sporadic 亦可合併症候群）。核心鑑別：thenar 發育不全與『拇指發育不全(hypoplasia)』相關而非 Wassel type II 特徵；Wassel type I 為遠節重複，不涉 CMCJ 僵硬。","peropt":{"A":"✓ Wassel classification 為常用分類方法。","B":"✓ Wassel type IV 最常見。","C":"✓ 與遺傳/基因有相關性。","D":"✗ Thenar 肌肉發育不全與拇指 hypoplasia 相關，非 Wassel type II 特徵，敘述錯誤。","E":"✗ Wassel type I 為遠節重複，不伴 CMCJ 僵硬，敘述錯誤。"},"cite":"待複查（NG 手外科 Radial polydactyly / Wassel 記憶佐證）","conflict":""},{"id":"1269","sub":"K","src":"NG","years":[111,114],"stem":"下列何者pyogenic granuloma 的描述有誤？","opts":{"A":"有莖的單獨紅色腫塊","B":"男性較多","C":"生成緩慢且逐漸變大","D":"好發在上肢","E":"常發生潰瘍且持續性的流血"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"pyogenic granuloma生長『快速』(數週迅速變大)。","peropt":{"A":"有莖單一紅色腫塊，正確。","B":"男性較多，正確。","C":"✔答案(錯)：生長快速，非緩慢。","D":"好發上肢/手，正確。","E":"常潰瘍且反覆流血，正確。"},"cite":"Neligan 5th, Vol 6, Ch 37, p 875","conflict":""},{"id":"1270","sub":"K","src":"NG","years":[111],"stem":"下列何者Klippel-Trenaunay syndrome (KTS) 的描述有誤？","opts":{"A":"在出生後3個月症狀才明顯","B":"下肢的發生率比上肢高","C":"涉及微血管、淋巴管與靜脈血管的畸形","D":"不影響心臟血管循環系統的穩定性","E":"常見長短腳"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 Klippel-Trénaunay syndrome（KTS）為slow-flow capillary-lymphatico-venous malformation合併肢體過度生長；下肢多於上肢、常見長短腳；屬slow-flow故一般不影響心血管循環穩定（有別於high-flow之Parkes-Weber）。核心錯誤（本題問『有誤』）：KTS之port-wine stain與肢體異常多於『出生時』即可見，非出生後3個月才明顯。","peropt":{"A":"✓（正解，為錯誤敘述）KTS多於出生時即有表現，非3個月後才明顯。","B":"✗（正確）下肢發生率高於上肢。","C":"✗（正確）涉及微血管、淋巴管與靜脈之畸形。","D":"✗（正確）屬slow-flow，一般不影響心血管循環穩定性。","E":"✗（正確）常見肢體長短不一（長短腳）。"},"cite":"待複查（NG KTS 記憶佐證）","conflict":""},{"id":"1271","sub":"E","src":"NG","years":[111],"stem":"有關神經傷害分類，何者的描述為非？","opts":{"A":"Sunderlandz將傷害的嚴重程度分成五種","B":"Seddon，將傷害的嚴重程度分成三種","C":"在Sunderlandz第三程度的傷害，神經可每天長1.5mm","D":"Axonotmesis的傷害，神經可每天長0.5mm","E":"Sunderlandz第四程度的傷害，神經幹是完整"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 神經傷害分類:Seddon 分3類(neurapraxia/axonotmesis/neurotmesis);Sunderland 分5度。軸突再生速率約 1mm/day(≈1 inch/month)。Sunderland 4度為 neuroma-in-continuity，神經幹仍維持連續。本題找『錯誤』者為 D(0.5mm/day 有誤)。","peropt":{"A":"✗ Sunderland 分5度，正確。","B":"✗ Seddon 分3類，正確。","C":"✗ 軸突再生約 1-1.5mm/day，此敘述可接受。","D":"✓(正解，敘述錯誤) Axonotmesis 再生約 1mm/day(≈1 inch/month)，非 0.5mm/day。","E":"✗ Sunderland 4度為 neuroma-in-continuity，神經幹維持連續(正確)。"},"cite":"待複查（NG nerve injury classification 記憶佐證）","conflict":""},{"id":"1272","sub":"E","src":"NG","years":[111],"stem":"下列有關神經修復(nerve repair)的描述，何者為是？","opts":{"A":"一般延遲神經修復是指在受傷後超過3個月進行","B":"Nerve graft 的長度比影響存活率","C":"較粗的nerve graft 容易造成中心壞死(central necrosis)","D":"Sural nerve是常用的nerve graft，長度約 20公分","E":"當神經間隙(nerve gap)≦0.6cm， 膠原神經導管(collagen nerve conduit)的術後效果比傳統的顯微手術縫合的比較好"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『為是（正確）』。神經移植核心：較『粗』的 nerve graft 因中心血管化不足易造成 central necrosis，故臨床偏好較細的 cable graft。核心鑑別：影響存活的是 graft『粗細（直徑）』而非長度比；delayed repair 的時間定義非固定 3 個月；sural nerve 可取得約 30–40cm（非 20cm）；極小 gap(≦0.6cm) 直接顯微縫合較佳，導管未必優於縫合。","peropt":{"A":"✗ 延遲神經修復的時間定義非固定『超過 3 個月』，此敘述不正確。","B":"✗ 影響存活的是 graft 粗細（血管化），非長度比，敘述錯誤。","C":"✓（正解）較粗的 nerve graft 中心血管化不足，易造成 central necrosis。","D":"✗ Sural nerve 可取得約 30–40cm，『約 20cm』低估，敘述不正確。","E":"✗ Gap≦0.6cm 直接顯微縫合較佳，collagen conduit 未必優於傳統縫合，敘述錯誤。"},"cite":"待複查（NG 手外科 神經修復/移植 記憶佐證）","conflict":""},{"id":"1273","sub":"D","src":"NG","years":[111],"stem":"下列有關臂叢神經損傷(Brachial plexus injuries BPI)，何者為非？","opts":{"A":"Level I: 椎骨內","B":"Level II: 斜角肌(scalene muscle)內","C":"Level III: nerve trunks和divisions injury","D":"Level IV: infraclavicular injury","E":"50% BPI發生在Level I"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 Brachial plexus injury分級（Chuang）：Level I椎骨內（preganglionic）、Level II斜角肌內、Level III trunks/divisions、Level IV infraclavicular。核心錯誤（本題問『非』）：並非50%發生於Level I；此比例敘述有誤。","peropt":{"A":"✗（正確）Level I為椎骨內。","B":"✗（正確）Level II位於斜角肌內。","C":"✗（正確）Level III為nerve trunks與divisions損傷。","D":"✗（正確）Level IV為infraclavicular損傷。","E":"✓（正解，為錯誤敘述）『50% BPI發生在Level I』之比例敘述不正確。"},"cite":"待複查（NG 臂叢損傷分級 記憶佐證）","conflict":""},{"id":"1274","sub":"P","src":"NG","years":[111,112,113],"stem":"下列何者與Maffucci syndrome無關？","opts":{"A":"多發性軟骨瘤 (enchondroma)","B":"多發性纖維瘤 (fibroma)","C":"內臟血管瘤","D":"軟組織血管瘤","E":"惡性轉變 (malignant transformation) 的風險高"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Maffucci=多發enchondroma+軟組織/內臟『血管瘤』，與『纖維瘤』無關。","peropt":{"A":"多發enchondroma→Maffucci核心，相關。","B":"✔答案：多發性纖維瘤(fibroma)與Maffucci無關。","C":"內臟血管瘤，相關。","D":"軟組織血管瘤→Maffucci核心，相關。","E":"惡性轉變風險高(chondrosarcoma 17-50%)，相關。"},"cite":"Neligan vol 6，Ch 29. page 668- 669","conflict":""},{"id":"1275","sub":"K","src":"NG","years":[111],"stem":"依Schobinger 的arteriovenous malformation 臨床分期 ，下列何者為非","opts":{"A":"Stage 0: 臨床表現如capillary malformation","B":"Stage I: 臨床表現如 involuting hemangioma","C":"Stage II: 變大發熱且有bruits","D":"Stage III: 變大發熱潰瘍","E":"Stage IV: 心臟衰竭"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 AVM 之 Schobinger 臨床分期共四期(I-IV)，並無『stage 0』:I(quiescence 靜止)似 capillary malformation/involuting hemangioma;II(expansion)腫大、發熱、bruit/thrill;III(destruction)潰瘍、出血、疼痛、組織破壞;IV(decompensation)高輸出心衰竭。本題找『非』者為 A。","peropt":{"A":"✓(正解，敘述錯誤) Schobinger 無 stage 0;靜止期(I)本身即似 capillary malformation。","B":"✗ Stage I(靜止)似 involuting hemangioma，正確。","C":"✗ Stage II 腫大、發熱、有 bruit，正確。","D":"✗ Stage III 潰瘍、出血、疼痛，正確。","E":"✗ Stage IV 高輸出心衰竭，正確。"},"cite":"待複查（NG Schobinger AVM staging 記憶佐證）","conflict":""},{"id":"1276","sub":"A","src":"NG","years":[111,112,113,114],"stem":"關於手部構造的敘述，下列何者為錯？","opts":{"A":"Kaplan's cardinal line與從中指尺側向內側延伸的縱向線的交點為正中神經運動支(motor branch of the median nerve)。","B":"拇指及其掌骨在腕掌骨關節(carpometacarpal joint)具有廣泛的活動範圍。五個內在肌肉(intrinsic muscles)和四個外在肌肉(extrinsic muscles)對於拇指的定位(positioning)和活動具有特殊影響力。","C":"Grayson's ligaments位於神經血管束(neurovascular bundle)的背側，Cleland's ligaments位於神經血管束的掌側，兩者為手指筋膜的組成成分，有助於固定軸向平面的皮膚(anchor the axial plane skin)。","D":"腕舟骨的近端血液供應較差，於近端(proximal pole)骨折後易發生不癒合(nonunion)。","E":"Checkrein ligament是一種不正常的結構，僅在纖維化後的近端指關節間(proximal interphalangeal joint)出現。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Grayson's ligament在NV bundle『掌側』、Cleland's在『背側』(Grayson=Ground地/掌，Cleland=Ceiling天/背)。","peropt":{"A":"Kaplan cardinal line交點定位正中神經recurrent motor branch，正確。","B":"拇指CMC活動範圍大、5內在+4外在肌，正確。","C":"✔答案(錯)：Grayson's在掌側、Cleland's在背側，本選項對調。","D":"舟狀骨近端血供差(retrograde)、易nonunion，正確。","E":"Checkrein ligament與PIP屈曲攣縮相關，本題視為正確。"},"cite":"Neligan, 4th Edition, vol.6, Chapter1 page 2, 5, 7, 10, 13","conflict":"⚠ 同題歷屆重出：手部構造『何者為錯』題，111年(1251)英文版、112/113/114年(1276)中文版為同題，答案均為C(Grayson's ligaments與Cleland's ligaments位置敘述顛倒)。"},{"id":"1277","sub":"C","src":"NG","years":[111,112,113,114,115],"stem":"下列各項手部檢查，何者為錯？","opts":{"A":"Eichoff test：要求患者的檢測手的四隻手指彎曲抓住檢測手拇指。患者的檢測手手腕向尺側偏移。這是為了檢測de Quervain's tenosynovitis.。","B":"Phalen's test：將患者的手腕最大程度地向掌側彎曲(maximum palmar flexion)，保持2分鐘。這個測試被用作對carpal tunnel syndrome的一種刺激性測試。","C":"Froment's test：要求患者在拇指的尺側指尖(ulnar tip of the thumb)和食指的橈側指尖(radial tip of the index finger)之間夾著一張紙。檢查者慢慢拉開紙，同時鼓勵患者繼續夾住紙。這是為了評估尺神經的運動功能。","D":"Jeanne's test：患者將手放在桌子上，拇指朝上。檢查者向下按壓拇指近端指骨(proximal phalanx of the thumb)。這是為了de Quervain's tendinitis。","E":"Wartenberg's sign：要求患者保持手指內收(fingers adducted)，並使MCP、PIP和DIP關節完全伸展(fully extended)。這是為了評估尺神經的運動功能。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Jeanne's sign是『尺神經』測試(key pinch時拇指MCP過度伸展代償)，非de Quervain。","peropt":{"A":"Eichoff/Finkelstein→de Quervain，正確。","B":"Phalen's→CTS誘發測試，正確。","C":"Froment's→尺神經運動(adductor pollicis無力、FPL代償)，正確。","D":"✔答案(錯)：Jeanne's sign測尺神經，不是de Quervain tendinitis。","E":"Wartenberg's sign→尺神經(小指無法內收)，正確。"},"cite":"Neligan, 4th Edition, vol.6, Ch2 p53, 60, 61","conflict":"跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG115-B15-Q02） ⚠ 同題歷屆重出：手部檢查『何者為錯』題，錯誤選項恆為Jeanne's test敘述，答案均為D。111年(1252)為英文版、112/113/114年(1277)與115年(1319)為中文版；115年D選項改寫為『拿鑰匙捏紙、評估橈神經功能』(仍為錯誤敘述)，其餘Eichoff/Phalen/Froment/Wartenberg選項相同。"},{"id":"1284","sub":"P","src":"NG","years":[111,112,113],"stem":"下列有關手部常見腫瘤敘述，何者正確？(複選)","opts":{"A":"Glomus tumors通常位於subungual area，典型的症狀是碰到冷會劇烈疼痛。。","B":"Verruca vulgaris通常一至二年內會spontaneous resolution，但也有malignant transformation的病例。","C":"Cutaneous horns一般建議先incisional biopsy。","D":"Keratoacanthoma和squamous cell carcinoma很像，但是前者的生長速度較快且central necrosis更明顯。","E":"Ganglion cysts常見於背側(dorsal region)；Giant cell tumors常見於掌側(volar aspect)。"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"正確ABDE;Cutaneous horns建議excisional biopsy(非incisional)。","peropt":{"A":"Glomus subungual、冷痛，正確。","B":"verruca 1-2年自限，正確。","C":"✗cutaneous horns建議excisional biopsy(非incisional)。","D":"keratoacanthoma生長快/central necrosis，正確。","E":"ganglion背側;GCT掌側，正確。"},"cite":"Neligan, 4th Edition, vol.6, Ch15 p337, 338, 339, 342, 343, 347, 352","conflict":"⚠ 同題歷屆重出：手部常見腫瘤『何者正確(複選)』單一事實拆解版，錯誤選項恆為「cutaneous horns一般建議先incisional biopsy」。111年(1266)答BCDE、112/113年(1284)答ABDE(僅選項順序不同)；記概念不記字母。"},{"id":"1286","sub":"O","src":"NG","years":[112,113,114,115],"stem":"關於timing of hand formation下列何者為是? (複選)","opts":{"A":"Development of arm bud is 27 days after fertilization","B":"Elongation of arm bud is 38-40 days after fertilization","C":"Formation of hand paddle is 34-38 days after fertilization","D":"Early separation of digits is 34-36 days after fertilization","E":"Formation of fingernails begins is week 12-13 after fertilization"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"上肢發育時序:arm bud出現~26-27天、hand paddle/plate~34-38天、手指分化(apoptosis)~47-53天。","peropt":{"A":"✔arm bud約受精後27天出現，正確。","B":"✗elongation時序有誤(此段約在32天前後，非38-40天)。","C":"✔hand paddle(手板)約34-38天形成，正確。","D":"✗手指早期分離約在47-53天(apoptosis)，非34-36天。","E":"✗指甲形成時序有誤(約第10週前後開始)，非12-13週。"},"cite":"Neligan, 4th Edition, vol.6, Ch25 p550","conflict":""},{"id":"1287","sub":"O","src":"NG","years":[112,113],"stem":"Radial longitudinal deficiency (RLD) is the most common upper limb longitudinal deficiency，基於modified classification of radial longitudinal deficiency，termed a \" miniature radius\" with proximal and distal physes present but hypoplasia was noted over proximal and distal radius，此描述為何種type?","opts":{"A":"Type 0","B":"Type 1","C":"Type 2","D":"Type 3","E":"Type 4"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Type 2=miniature radius(近遠端physes皆在但hypoplastic)。","peropt":{"A":"Type 0=僅carpal缺損、橈骨長度正常。","B":"Type 1=distal physis差、橈骨略短。","C":"✔Type 2=miniature radius(兩physes在但發育不良)。","D":"Type 3=部分橈骨缺如(近或遠physis缺)。","E":"Type 4=橈骨完全缺如(最常見型)。"},"cite":"Neligan, 4th Edition, vol.6, Ch26 p574-576","conflict":""},{"id":"1288","sub":"O","src":"NG","years":[112,113,114,115],"stem":"Hypoplastic thumb represents a wide spectrum of functional and aesthetic differences，根據分類 ，描述為the pouce flottant or floating thumb 為何種type ?","opts":{"A":"Type I","B":"Type II","C":"Type III","D":"Type IV","E":"Type V"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Hypoplastic thumb（Blauth 分類）：Type IV＝pouce flottant（floating thumb，浮動拇指，僅以皮蒂相連、無骨性連結）。核心鑑別：Type IIIB（CMC 不穩）為『重建 vs pollicization』的分界——IIIB、IV、V 通常行 pollicization；Type V＝完全 aplasia。","peropt":{"A":"✗ Type I 為輕度發育不全。","B":"✗ Type II 為 thenar 發育不全、第一指蹼狹窄、UCL 鬆弛。","C":"✗ Type III 為明顯發育不全（IIIA CMC 穩定、IIIB 不穩），非 floating thumb。","D":"✓（正解）Type IV＝pouce flottant / floating thumb。","E":"✗ Type V 為完全 aplasia（拇指缺如）。"},"cite":"待複查（NG 手外科 Hypoplastic thumb / Blauth 記憶佐證）","conflict":""},{"id":"1289","sub":"K","src":"NG","years":[108,109,110,112,114,115],"stem":"關於vascular malformation的描述, 下列何者正確?（複選）","opts":{"A":"Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍","B":"Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation","C":"Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination","D":"Sclerotherapy可以用來治療venous malformation和lymphatic malformation","E":"Parkes Weber 為一slow flow的 vascular malformation"},"ans":"ABCD","multi":true,"etype":"ai","expl":"Volume 6, Chapter 31\n\nCM consists of dilated capillaries in the superficial dermis. CM is most often solitary, but has a wide range in size and may occur in any region of the extremity (Figs. 31.5A,B & 31.5C–F ). With time and aging, these pink lesions will often darken and develop some fibrovascular overgrowth. They can be associated with deeper vascular lesions, both slow-flow (Klippel– Trénaunay, CLOVES) and fast-flow (Parkes Weber, CM–AVM, PTEN) (see Tables 31.2 & 31.8 ) and with skeletal and soft tissue hypertrophy. A CM on the face in one or more of the trigeminal nerve distributions is indicative of Sturge–Weber syndrome.50 These patients are at risk for seizures, retinal detachment, glaucoma, and stroke. Fig. 31.5C–F appears online only.\n\nThe puzzling question with fast-flow lesions is their unpredictable natural history and rate of progression. Simple observation is the initial treatment in all but the most symptomatic AVMs. Compression garments may be of some help (see Fig. 31.18C ). The goal of treatment is to control the progression of the malformation and to alleviate symptoms: pain, ulceration, bleeding, distal discoloration, or functional problems. Management options include embolization, surgical resection or a combination (Fig. 31.19).\n\nSclerotherapy is most effective for small and large VM in the axilla, arm, elbow, and proximal forearm where muscle may be directly involved.\n\nSclerotherapy is the first-line management for large, problematic macrocysticLMs.","key":"Parkes Weber為fast-flow(有AV分流)，非slow-flow。","peropt":{"A":"Sturge-Weber=CM在CN V分布，正確。","B":"KTS=slow-flow capillary-lymphatico-venous，正確。","C":"AVM治療embolization/resection/combo，正確。","D":"sclerotherapy可治VM與LM，正確。","E":"✗Parkes Weber為fast-flow(含AV shunt)，此敘述誤。"},"cite":"Neligan 5th, Vol 6, Ch 37, p875-885","conflict":"⚠ 同題歷屆重出：vascular malformation核心事實題(Sturge-Weber=CN V區capillary malformation、KTS為slow-flow、AVM治療embolization/resection、sclerotherapy治VM/LM、Parkes Weber為high-flow)。108年(1200)複選答ABCDE(含Parkes Weber high-flow為真)、109年(1225)與110年(1247)改為單選『以上皆是』答E(110年D特指macrocystic lymphatic malformation)、112/114/115年(1289)複選答ABCD(E『Parkes Weber為slow flow』為錯)；題幹事實一致，作答錨定該年題型。"},{"id":"1290","sub":"D","src":"NG","years":[112,113],"stem":"使用free-functioning muscle transfer來進行上肢重建, 以下敘述何者敘述有誤？","opts":{"A":"手術前關節要能夠full passive movement","B":"Cutaneous sensibility要在tendon/muscle transfer之前就能夠恢復完成","C":"Gracilis muscle是最常被使用的一塊肌肉皮瓣","D":"Gracilis muscle flap harvest是要在leg in full abduction中，在上面每5cm標記肌肉張力長度","E":"在donor nerve的選擇上, 若要重建finger extension function, 會接到anterior interosseous nerve"},"ans":"E","multi":false,"etype":"ai","expl":"An elective tendon/muscle transfer should never be performed in the presence of unhealed wounds\n\nFull passive joint motion must be restored before tendon/ muscle transfer\n\nThe transfer should not pass through areas of scar tissue or under skin grafts. Furthermore, surgical incisions should not be placed directly over the transfer\n\nWhenever possible, cutaneous sensibility should be restored before tendon/muscle transfer Multiple muscles have been used for free transfer in the upper limb. The gracilis muscle (see Fig. 35.6) has been the most widely used as it fulfills many of the criteria for the \"ideal\" muscle transfer.17,18 Other transfers have included latissimus dorsi,19,20 rectus femoris,21,22 serratus anterior,23–34 gastrocnemius,26 hemisoleus,27 flexor hallucis longus,28 flexor carpi ulnaris,29 pectoralis major,30,31 pectoralis minor,24 and tensor fasciae latae.25 It is necessary to mark the length of the muscle with the leg in full abduction prior to release of either the origin or insertion. 5-0 silk sutures placed at 5-cm intervals will ensure that a correct muscle length–tension relationship is re-established Muscle transfer for finger extension follows the same basic pattern as for finger flexion, although a marginally lesser degree of excursion is required. The gracilis muscle has also been used most widely for this application. The choice of motor nerve for reinnervation is crucial. The posterior interos- seous nerve has been used most commonly.","key":"重建手指『伸直』用PIN;AIN用於屈指。","peropt":{"A":"術前關節須full passive ROM，正確。","B":"移植前先恢復皮膚感覺，正確。","C":"Gracilis最常用，正確。","D":"取gracilis時leg full abduction、每5cm標記張力長度，正確。","E":"✔答案(錯)：重建手指伸直用posterior interosseous nerve(PIN)，非AIN。"},"cite":"Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, Chapter 35, page 803, 804, 806, 810","conflict":""},{"id":"1294","sub":"G","src":"NG","years":[113,114],"stem":"關於小兒骨頭生長板傷害(physeal injuries)，下列敘述何者正確? (複選)","opts":{"A":"創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染、腫瘤及輻射暴露等也會影響骨頭生長","B":"Salter-Harris classification是最為廣泛使用的分類法","C":"Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign","D":"Salter-Harris type III&IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮","E":"Peterson type VI是開放性傷害伴隨有生長板的損失(loss of physis)，相當於Salter-Harris type V"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"正確ABCD。Peterson type VI是開放傷+physis損失，Salter-Harris無type VI，不等同SH type V。","peropt":{"A":"創傷是生長板傷害最常見原因(感染/腫瘤/輻射亦影響)，正確。","B":"Salter-Harris分類最廣泛使用，正確。","C":"SH type II最常見、有Thurston-Holland fragment，正確。","D":"SH type III&IV牽涉germinal layer與關節面、影響生長，正確。","E":"✗Peterson type VI=開放傷伴physis損失;SH分類無type VI，兩者不等同。"},"cite":"Neligan, Peter C. Volume 6, chap 30, p 673","conflict":""},{"id":"1296","sub":"K","src":"NG","years":[113],"stem":"關於vascular malformation的描述, 下列何者錯誤?","opts":{"A":"Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍","B":"Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation","C":"Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination","D":"Sclerotherapy可以用來治療venous malformation和lymphatic malformation","E":"Parkes Weber 為一slow flow的 vascular malformation"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Parkes Weber為fast-flow(有AV分流)，非slow-flow。","peropt":{"A":"Sturge-Weber=CM出現在三叉神經(CN V)分布，正確。","B":"Klippel-Trenaunay=slow-flow capillary-lymphatico-venous malformation，正確。","C":"AVM治療embolization/resection/combination，正確。","D":"Sclerotherapy可治VM與LM，正確。","E":"✔答案(錯)：Parkes Weber為fast-flow(含AV shunt)，非slow-flow。"},"cite":"Plastic Surgery, 4th edition, Neligan, Peter C. VolumeVI, Chapter 31, page 689, 696, 699, 708, 711","conflict":"題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG110-B16-Q03） ‖ 題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG109-B16-Q04）"},{"id":"1299","sub":"L","src":"NG","years":[108,114,115],"stem":"下列何者是contraindication to replantation? (複選)","opts":{"A":"53歲男性高處跌落，右手近端食指創傷性截指，合併顱內出血、意識不清。","B":"45歲女性使用絞肉機，右手食指、中指創傷性多段截指（segmental amputation）， 血管呈現ribbon’s sign.","C":"2歲男童玩電扇，右手食指中段創傷性截指。","D":"30歲女性車禍，左手腕近端創傷性截肢，查無其他損傷，意識正常。","E":"24歲女性，刀傷，右手食指指尖（finger tip）創傷性截指，合併思覺失調症急性發作。"},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"再植禁忌為ABE(危及生命、多段+ribbon sign血管avulsion、精神不穩無法配合);兒童單指、腕近端大肢體為適應症。","peropt":{"A":"✔顱內出血、意識不清(危及生命)→禁忌。","B":"✔多段截指+ribbon sign(血管嚴重avulsion、品質差)→禁忌。","C":"2歲兒童單指中段截指→應積極再植(兒童為適應症)，非禁忌。","D":"手腕近端截肢、無其他傷、意識清→大肢體再植適應症，非禁忌。","E":"✔思覺失調急性發作(無法配合術後)+僅指尖截指→禁忌。"},"cite":"Neligan, 5th Edition, vol.6, Ch11, p253","conflict":"⚠ 同題歷屆重出：replantation禁忌症中文情境『複選』，禁忌情境恆為(1)顱內出血意識不清(2)ribbon's sign節段截肢(3)指尖截肢合併急性精神病發作。108年(1180)答ADE、114/115年(1299)答ABE(僅情境選項順序不同)；記概念不記字母。"},{"id":"1300","sub":"C","src":"NG","years":[107,114,115],"stem":"關於peripheral nerve，下列何者為非? (複選)","opts":{"A":"Median nerve穿過carpal tunnel","B":"無名指與小指的flexor digitorum profundus由median nerve的分支anterior interosseous nerve支配","C":"Ulnar nerve傷害會造成flexor digitorum superificialis功能缺損","D":"Radial nerve的分支deep posterior interosseous nerve為純運動神經，管控所有的extensor compartments","E":"Radial nerve的superficial branch為純感覺神經，負責五根手指背側的感覺，但不包含末端指節"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"錯誤為BCDE。無名/小指FDP由ulnar nerve支配;FDS由median支配;PIN不管控所有伸肌;radial superficial branch不含指尖末節背側。","peropt":{"A":"Median nerve穿過carpal tunnel，正確(非答案)。","B":"✗無名指與小指FDP由ulnar nerve支配(非AIN;AIN管食中指FDP+FPL+PQ)。","C":"✗FDS由median nerve支配;尺神經傷不造成FDS缺損。","D":"✗PIN(deep radial)純運動但不管控『所有』伸肌(近端部分另有支配)。","E":"✗radial superficial branch感覺為橈側三指半背側，且不含指尖末節背側(該處由正中神經背支)。"},"cite":"Neligan, 5th Edition, vol.6, Ch1, p39-48","conflict":"⚠ 同題歷屆重出：peripheral nerve『何者為非(複選)』題，B/C/D/E四選項相同；選項A由『median與ulnar皆穿過carpal tunnel』(107年,1151,為非→答ABCDE)改為『median nerve穿過carpal tunnel』(114/115年,1300,為真→答BCDE)；作答錨定該年A選項真偽。"},{"id":"1302","sub":"L","src":"NG","years":[114],"stem":"關於mutilated hand的initial assessment，下列何者為非？","opts":{"A":"應優先處理其他可能危及生命的相關損傷，再處理肢體損傷.","B":"若有活動性出血，應直接以止血鉗深入創口內夾住出血血管止血","C":"上肢損傷的唯一危及生命的緊急情況是主要血管的部分受傷.","D":"initial assessment時，應給予靜脈注射抗生素.","E":"手術止血帶可用於輔助initial assessment."},"ans":"B","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 12, p.273.","key":"🎯 Mutilated hand之initial assessment（本題問『非』，答案B）：核心——活動性出血應以『直接加壓/止血帶』控制，不可盲目以止血鉗深入傷口夾血管（易傷及神經與血管）。其餘正確：先處理危及生命之損傷、上肢唯一致命急症為主要血管『部分』撕裂、初評時給IV抗生素、可用手術止血帶輔助評估。","peropt":{"A":"✗（正確）先處理危及生命之相關損傷，再處理肢體。","B":"✓（正解，為錯誤敘述）活動性出血不可盲目以止血鉗深入夾血管，應直接加壓/止血帶。","C":"✗（正確）上肢唯一致命急症為主要血管之部分受傷（部分裂傷持續出血）。","D":"✗（正確）初評時應給予靜脈抗生素。","E":"✗（正確）手術止血帶可輔助initial assessment。"},"cite":"原檔詳解（NG 5e Vol.6 Ch12, p.273）","conflict":""},{"id":"1303","sub":"L","src":"NG","years":[114],"stem":"關於mutilated hand的清創，下列敘述何者為是？(複選)","opts":{"A":"清創的目標是將受損的傷口變成乾淨的surgical wound，以利後續的傷口覆蓋和重建.","B":"清創的原則是只移除所有壞死組織.","C":"清創應在止血帶下進行.","D":"血管和神經結構周圍的areolar tissue若受到汙染，必須小心地用鋒利剪刀切除，以防止感染沿著該平面擴散.","E":"清創後，應鬆開止血帶，觀察出血情況。"},"ans":"ACDE","multi":true,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 12, p.276~277.","key":"🎯 Mutilated hand 清創原則:目標是把污染傷口轉為乾淨的 surgical wound;清創須移除壞死『與污染/無活性』組織及異物(不只壞死組織);在止血帶下進行(無血視野);神經血管周圍受污染 areolar tissue 須以銳器小心切除以防感染沿平面擴散;清創後鬆開止血帶觀察出血/活性。本題找正確者為 A、C、D、E。","peropt":{"A":"✓ 目標:把受損傷口轉為乾淨 surgical wound。","B":"✗ 清創應移除壞死『與污染/無活性』組織及異物，非『只移除壞死組織』。","C":"✓ 在止血帶下進行(無血視野)。","D":"✓ 受污染 areolar tissue 以銳器小心切除，防感染沿平面擴散。","E":"✓ 清創後鬆開止血帶，觀察出血/組織活性。"},"cite":"原檔詳解","conflict":""},{"id":"1304","sub":"P","src":"NG","years":[114],"stem":"關於手部黑色素瘤，下列敘述何者錯誤？","opts":{"A":"可能發生於指甲下方 (Subungual)","B":"ABCDE原則可用於評估病灶","C":"侵犯深度是重要的預後因子","D":"肢端黑色素瘤(Acral lentiginous melanoma)預後較其他亞型差","E":"治療以廣泛性切除為主，安全範圍為0.5公分"},"ans":"E","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 16, p.366.","key":"🎯 本題選『錯誤』。手部黑色素瘤：可發生於指甲下(subungual)；可用 ABCDE 原則評估；侵犯深度(Breslow thickness)為重要預後因子；acral lentiginous melanoma 預後較其他亞型差。核心錯誤：切除安全範圍應依 Breslow 厚度決定（in situ 0.5cm、侵襲性 1–2cm），一律『0.5cm』並不正確，故 E 錯誤。","peropt":{"A":"✗（正確敘述）可發生於指甲下（subungual）。","B":"✗（正確敘述）ABCDE 原則可用於評估病灶。","C":"✗（正確敘述）侵犯深度（Breslow）為重要預後因子。","D":"✗（正確敘述）Acral lentiginous melanoma 預後較其他亞型差。","E":"✓（正解＝錯誤敘述）安全範圍應依 Breslow 厚度決定（in situ 0.5cm、侵襲性 1–2cm），非一律 0.5cm。"},"cite":"原檔詳解","conflict":""},{"id":"1305","sub":"B","src":"NG","years":[114,115],"stem":"手指屈肌腱鞘炎（Pyogenic flexor tenosynovitis）的Kanavel徵象包括哪些？ （複選）","opts":{"A":"手指沿肌腱鞘腫脹","B":"手指屈曲姿勢","C":"觸診肌腱鞘有壓痛","D":"被動伸展手指時疼痛劇烈","E":"手指發紅"},"ans":"ABCD","multi":true,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 15, p343.","key":"🎯 Pyogenic flexor tenosynovitis之Kanavel四大徵象：①手指沿肌腱鞘之fusiform腫脹、②手指半屈曲姿勢、③沿肌腱鞘壓痛、④被動伸展手指時劇痛。核心：紅斑（erythema）為一般感染表現，非Kanavel四徵之一。本題複選Kanavel徵象者。","peropt":{"A":"✓ 沿肌腱鞘之腫脹，為Kanavel徵象。","B":"✓ 手指半屈曲姿勢，為Kanavel徵象。","C":"✓ 沿肌腱鞘壓痛，為Kanavel徵象。","D":"✓ 被動伸展手指劇痛，為Kanavel徵象（最敏感）。","E":"✗ 手指發紅（erythema）非Kanavel四大徵象之一。"},"cite":"原檔詳解（NG 5e Vol.6 Ch15, p.343 Kanavel signs）","conflict":""},{"id":"1306","sub":"B","src":"NG","years":[114],"stem":"下列何者為Felon（指頭膿瘍）的敘述？（複選）","opts":{"A":"為指尖皮下掌側的感染","B":"金黃色葡萄球菌是最常見的病原體","C":"感染侷限於指尖指腹內的纖維間隔空間。","D":"魚口狀切口可有效減壓，應優先考慮","E":"病人會有指尖腫脹疼痛，對指尖的觸痛明顯"},"ans":"ABCE","multi":true,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 15, p341, p342.","key":"🎯 Felon(指腹膿瘍):指尖掌側指腹皮下腔感染，膿液受纖維間隔(septa)侷限於密閉小室;最常見病原為 S. aureus;臨床為指尖腫脹、搏動痛、明顯壓痛。切開引流『避免』fish-mouth 切口(易致指尖不穩/壞死、疼痛疤痕)，宜採 high lateral 或縱向掌側切口。本題找正確者為 A、B、C、E。","peropt":{"A":"✓ 指尖掌側指腹皮下感染。","B":"✓ S. aureus 為最常見病原。","C":"✓ 感染受纖維間隔侷限於指腹小室。","D":"✗ Fish-mouth 切口應避免(指尖不穩/壞死、痛性疤痕)，非優先;宜 high lateral/縱向切口。","E":"✓ 指尖腫脹疼痛、明顯壓痛。"},"cite":"原檔詳解","conflict":""},{"id":"1307","sub":"N","src":"NG","years":[114,115],"stem":"有關toe-to-hand移植長期結果，下列敘述何者為非？","opts":{"A":"拇指重建後，grip strength平均可恢復至對側拇指的75-80%","B":"Trimmed great-toe移植重建拇指，會減少約18度之interphalangeal joint活動度","C":"第二腳趾移植重建手指，近端及遠端指間關節平均可達50-60度活動度","D":"Great toe移植會增加第一蹠骨頭(first metatarsal head)及腳跟之負重，長期而言常造成病人步態不適","E":"Toe-to-hand移植成功率約96-98%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『為非』。Toe-to-hand 長期結果：拇指重建後 grip strength 約達對側 75–80%；trimmed great toe 減少約 18° IP 活動度；第二腳趾重建手指 PIP/DIP 約 50–60°；成功率約 96–98%。核心錯誤：great toe 移植的『供區(足部)長期步態』morbidity 極小、多能良好耐受，並非常造成步態不適，故 D 為錯誤敘述。","peropt":{"A":"✗（正確敘述）拇指重建 grip strength 約達對側 75–80%。","B":"✗（正確敘述）Trimmed great-toe 減少約 18° IP 活動度。","C":"✗（正確敘述）第二腳趾重建手指 PIP/DIP 約 50–60°。","D":"✓（正解＝錯誤敘述）Great toe 供區長期步態 morbidity 極小、多能良好耐受，非常造成步態不適的敘述有誤。","E":"✗（正確敘述）Toe-to-hand 成功率約 96–98%。"},"cite":"待複查（NG 手外科 toe-to-hand 長期結果 記憶佐證）","conflict":""},{"id":"1308","sub":"J","src":"NG","years":[114,115],"stem":"一位68歲女性，主訴雙手手指逐漸出現疼痛變形，尤以遠端指節最為明顯，且手指末端出現數個硬且粗大的結節。請問這些結節（Heberden's nodes）最可能影響的是下列哪個關節？","opts":{"A":"拇指基部的第一腕掌關節（first carpometacarpal joint）","B":"手指中節的近端指間關節（proximal interphalangeal joint, PIP joint）","C":"手指末端的遠端指間關節（distal interphalangeal joint, DIP joint）","D":"手指掌指交接處的掌指關節（metacarpophalangeal joint, MCP joint）","E":"手腕處的橈腕關節（radiocarpal joint）"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 Heberden's nodes為DIP joint骨關節炎所形成之硬結節（骨贅）；Bouchard's nodes則位於PIP joint。核心鑑別：DIP=Heberden、PIP=Bouchard；拇指基部第一CMC關節OA另有其表現（如shoulder sign），非Heberden's node。","peropt":{"A":"✗ 第一CMC關節OA非Heberden's node之部位。","B":"✗ PIP之結節為Bouchard's nodes，非Heberden's。","C":"✓（正解）Heberden's nodes位於DIP joint。","D":"✗ MCP非Heberden's node好發處。","E":"✗ 橈腕關節非Heberden's node部位。"},"cite":"待複查（NG 手部骨關節炎／Heberden's node 記憶佐證）","conflict":""},{"id":"1309","sub":"J","src":"NG","years":[114],"stem":"55歲女性，有類風濕性關節炎病史約10年，平時規則藥物控制。近半年來右手腕疼痛加劇，特別是旋轉手腕時。理學檢查發現右手腕腫脹，尺骨頭突出 (prominent ulnar head)，且有明顯壓痛。X光片顯示遠端尺骨關節 (Distal Radioulnar Joint) 侵蝕 (erosion) 及尺骨頭背側脫位 (dorsal dislocation)。以下何種治療方式適合該位病患?","opts":{"A":"僅給予消炎止痛藥物，持續追蹤","B":"安排腕關節鏡清創手術 (Wrist arthroscopy synovectomy)","C":"進行遠端尺骨切除術 (Distal ulna resection, Darrach procedure)，並將Pronator quadratus 縫到尺骨殘端的背側","D":"進行腕關節融合術 (Wrist arthrodesis)","E":"進行腕關節置換術 (Total wrist arthroplasty)"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 RA 之 caput ulnae syndrome:DRUJ 滑膜炎致 distal ulna 背側脫位、尺骨頭突出、旋轉痛，並可造成 ECU volar subluxation 及伸肌腱磨損(Vaughan-Jackson)。X 光顯示 DRUJ 侵蝕+尺骨頭背側脫位者，標準處置為 Darrach procedure(distal ulna resection)並將 pronator quadratus 縫至尺骨殘端背側以穩定。","peropt":{"A":"✗ 單純消炎追蹤，對已侵蝕+脫位的 DRUJ 不足。","B":"✗ 單純關節鏡滑膜清創無法處理已破壞/脫位之 DRUJ。","C":"✓(正解) Darrach(distal ulna resection)+PQ 縫至尺骨殘端背側穩定，為 RA caput ulnae 標準術式。","D":"✗ Wrist arthrodesis 處理 radiocarpal 破壞，非單純 DRUJ 病灶。","E":"✗ Total wrist arthroplasty 用於 radiocarpal 破壞，對單純 DRUJ 為過度治療。"},"cite":"待複查（NG rheumatoid DRUJ / Darrach 記憶佐證）","conflict":""},{"id":"1310","sub":"C","src":"NG","years":[114],"stem":"下列哪一項敘述不是腕隧道症候群 (Carpal Tunnel Syndrome, CTS) 的危險因子？","opts":{"A":"重複性的手部動作","B":"暴露於手持振動工具","C":"在肉品加工廠工作","D":"使用電腦鍵盤","E":"懷孕"},"ans":"D","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 20, p496.","key":"🎯 本題選『非危險因子』。CTS 已知危險因子包含：重複性手部動作、暴露於手持振動工具、肉品/家禽加工廠工作、懷孕(體液滯留)。核心觀念：一般『電腦鍵盤使用』與 CTS 之關聯證據薄弱，非確立的危險因子，故 D 為答案。","peropt":{"A":"✗（為危險因子）重複性手部動作。","B":"✗（為危險因子）暴露於手持振動工具。","C":"✗（為危險因子）肉品加工廠工作。","D":"✓（正解＝非危險因子）電腦鍵盤使用與 CTS 關聯證據薄弱，非確立危險因子。","E":"✗（為危險因子）懷孕（體液滯留）。"},"cite":"原檔詳解","conflict":""},{"id":"1311","sub":"Q","src":"NG","years":[114],"stem":"根據Millender的職業性慢性肌肉骨骼損傷分類，下列何者屬於「病因清楚，但治療並非總能成功使病人返回原本工作」的分類？","opts":{"A":"第1類 (Category 1)","B":"第2類 (Category 2)","C":"第3類 (Category 3)","D":"第4類 (Category 4)","E":"以上皆非"},"ans":"B","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 20, p493.","key":"🎯 Millender職業性慢性肌肉骨骼損傷分類：Category 1病因明確且治療多能成功返回原工作；Category 2病因清楚但治療『並非總能成功』使病人回原工作；Category 3病因不明/具爭議。核心答案為Category 2。","peropt":{"A":"✗ Category 1病因明確且治療多能成功返回原工作。","B":"✓（正解）Category 2病因清楚，但治療並非總能成功使病人返回原工作。","C":"✗ Category 3病因不明確或具爭議。","D":"✗ Category 4非本題所指之描述。","E":"✗ 既有Category 2符合，'以上皆非'不成立。"},"cite":"原檔詳解（NG 5e Vol.6 Ch20, p.493 Millender分類）","conflict":""},{"id":"1312","sub":"C","src":"NG","years":[114],"stem":"關於「雙重壓迫症候群」（Double Crush Syndrome, DCS）的定義，下列何者敘述最正確？","opts":{"A":"同一條神經在兩個不同部位同時受到獨立的壓迫，導致症狀加劇。","B":"一條神經先在遠端受到壓迫，導致近端更易受到損傷。","C":"一條神經先在近端受到壓迫，增加其遠端對壓迫的敏感性。","D":"雙重壓迫症候群多數僅發生於正中神經。","E":"雙重壓迫症候群的診斷必須搭配電生理檢查才能確立。"},"ans":"C","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 21, p493.","key":"🎯 Double Crush Syndrome(DCS):同一條神經近端受壓後，因軸漿流(axoplasmic flow)受損，使『遠端』節段對第二處壓迫的敏感性上升(近端→遠端的預先致敏)。反向(遠端先致敏近端)稱 reverse double crush。診斷以臨床為主，EDX 為輔非必需;亦不限於正中神經。","peropt":{"A":"✗ 僅描述兩處同時獨立壓迫，未涵蓋 DCS 核心的『預先致敏』因果概念。","B":"✗ 此為 reverse double crush(遠端先致敏近端)，非典型 DCS 定義。","C":"✓(正解) 近端壓迫損及軸漿流，使遠端節段對第二處壓迫更敏感。","D":"✗ DCS 不限於正中神經。","E":"✗ DCS 為臨床診斷，EDX 為輔佐非必要。"},"cite":"原檔詳解","conflict":""},{"id":"1313","sub":"E","src":"NG","years":[114,115],"stem":"關於週邊神經缺損重建時，採用神經移植（Nerve graft）的臨床原則與考量，下列敘述何者錯誤？","opts":{"A":"自體神經移植（Autograft）目前仍被視為神經缺損重建的黃金標準。","B":"移植神經的長度應略長於神經缺損處的距離，以避免張力。通常建議長度約為缺損距離的 115%。","C":"腓腸神經（Sural nerve）是常用的供體神經之一，因其長度足夠且取得相對方便，但會造成小腿外側感覺麻木。","D":"對於較大的神經主幹缺損，常使用多條較細的供體神經束（Cable graft）來橋接，以利於神經血管化。","E":"神經移植後，術後應完全避免關節活動並嚴格固定至少六週，以防止移植神經因關節活動而產生移位或張力問題。"},"ans":"E","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 22, p539, p547.","key":"🎯 本題選『錯誤』。神經移植原則：autograft 仍為黃金標準；移植長度應略長於缺損(約 115%)以避免張力；sural nerve 常用、會致小腿外側/足外側麻木；大神經主幹缺損以多條細 cable graft 橋接利於血管化。核心錯誤：現代主張『早期保護性活動』，並非術後完全禁止關節活動並嚴格固定≥6 週；因移植為無張力設計，過度固定並不必要，故 E 錯誤。","peropt":{"A":"✗（正確敘述）Autograft 仍為神經缺損重建黃金標準。","B":"✗（正確敘述）移植長度略長於缺損（約 115%）以避免張力。","C":"✗（正確敘述）Sural nerve 常用，會致小腿/足外側感覺麻木。","D":"✗（正確敘述）大神經主幹缺損以多條細 cable graft 橋接利於血管化。","E":"✓（正解＝錯誤敘述）現代主張早期保護性活動，非完全禁止關節活動並嚴格固定≥6 週。"},"cite":"原檔詳解","conflict":""},{"id":"1314","sub":"F","src":"NG","years":[114,115],"stem":"肌腱轉移術（Tendon transfer）必須先確認欲轉移肌腱作用的相關關節符合何種條件？","opts":{"A":"具備部分主動活動範圍即可","B":"具備完整的被動活動範圍","C":"術後立即進行積極的主動復健","D":"必須已接受關節融合術（Arthrodesis）","E":"關節穩定度與肌腱轉移術後結果無關"},"ans":"B","multi":false,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 25, p539, p547.","key":"🎯 Tendon transfer先決條件：欲轉移肌腱作用的相關關節必須具備『完整的被動活動範圍（full passive ROM）』——僵硬/攣縮關節須先鬆解。核心：轉移的肌力無法帶動一個passively僵硬的關節；關節穩定度亦影響結果。","peropt":{"A":"✗ 僅具部分主動ROM不足，須full passive ROM。","B":"✓（正解）關節須具備完整被動活動範圍才可行tendon transfer。","C":"✗ 術後多先固定保護，非立即積極主動復健。","D":"✗ 不必然需先行關節融合。","E":"✗ 關節穩定度與結果相關，非無關。"},"cite":"原檔詳解（NG 5e Vol.6 Ch25, p.539, p.547）","conflict":""},{"id":"1315","sub":"E","src":"NG","years":[114],"stem":"根據Seddon或Sunderland周邊神經損傷分類及相關手術處理時機，下列敘述何者正確？（複選）","opts":{"A":"Neurapraxia (第一度損傷) 通常需要手術減壓以促進恢復。","B":"Axonotmesis (第二度損傷) 的預期恢復速率約為每月 1 英寸 (2.5 cm)。","C":"Neuroma-in-continuity (第四度損傷) 通常預期會有良好的自發性恢復。","D":"Neurotmesis (第五度損傷) 需要及時手術介入，因為自發性恢復的可能性不高。","E":"對於閉合性神經損傷，若三個月後仍無臨床或電生理恢復跡象，建議考慮手術治療。"},"ans":"BDE","multi":true,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 26, p639.","key":"🎯 神經傷害分級與手術時機:Neurapraxia(1度)僅去髓鞘、可自行完全恢復，不需手術;Axonotmesis(2度)保留 basal lamina，恢復速率約每月1吋(2.5cm);4度為 neuroma-in-continuity，自發恢復差、需手術;Neurotmesis(5度)為橫斷、須及時手術;閉合性神經傷若3個月無臨床/EDX 恢復即考慮手術探查。本題正確者為 B、D、E。","peropt":{"A":"✗ Neurapraxia 自行恢復，不需手術減壓。","B":"✓ Axonotmesis 再生約每月1吋(2.5cm)。","C":"✗ 4度 neuroma-in-continuity 自發恢復差，需手術，非『良好自發恢復』。","D":"✓ Neurotmesis(5度/橫斷)須及時手術，自發恢復不佳。","E":"✓ 閉合傷3個月無恢復跡象即考慮手術。"},"cite":"原檔詳解","conflict":""},{"id":"1316","sub":"C","src":"NG","years":[114,115],"stem":"與肌腱轉移 (tendon transfers) 相比，神經轉移 (nerve transfers) 在周邊神經損傷重建的特點或優勢，下列敘述何者正確？","opts":{"A":"恢復較自然的肌肉功能與動作，因直接恢復了原有的神經支配。","B":"保留了原有的肌肉-肌腱生物力學結構。","C":"手術可以在原始損傷區域之外進行，手術技術相對簡單且安全。","D":"術後通常不需要固定，或固定時間較短，有利於早期活動。","E":"對於遠端單一功能的周邊神經損傷，傳統上仍以直接神經修補或神經移植為首選。。"},"ans":"BCD","multi":true,"etype":"ai","expl":"Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 26, p639.","key":"🎯 神經轉移(nerve transfer) 相較肌腱轉移(tendon transfer) 之優勢：保留原有肌肉-肌腱生物力學結構；手術可在原始損傷區域外進行、相對簡單安全；術後固定時間短、利於早期活動。⚠ 跨年事實置換：A 的『直接恢復原有神經支配』說法有誤——nerve transfer 用『供體神經』再支配目標肌，需皮質再學習，非恢復『原有』支配；E 對於遠端單一功能損傷，現代常以近端 nerve transfer 為佳，其『傳統以直接修補/移植為首選』的敘述屬置換誘答，故均不選。","peropt":{"A":"✗ 敘述有誤——nerve transfer 以『供體神經』再支配目標肌、需皮質再學習，並非『直接恢復原有神經支配』。","B":"✓ 保留原有肌肉-肌腱生物力學結構，為 nerve transfer 相對 tendon transfer 之優勢。","C":"✓ 手術可在原始損傷區外進行，技術相對簡單且安全。","D":"✓ 術後通常不需固定或固定時間較短，利於早期活動。","E":"✗ 事實置換誘答——遠端單一功能損傷現代常以近端 nerve transfer 為佳，此『傳統以直接修補/移植為首選』敘述於本題不列為正確。"},"cite":"原檔詳解","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG115-B16-Q14） ⚠ 同題歷屆重出：nerve transfer相較tendon transfer之特點『複選正確』題，A-D選項與答案BCD相同；選項E文字不同(114年,1316為『遠端單一功能損傷傳統以神經修補/移植為首選』；115年,1331為『Neurapraxia傳統以神經移植為首選』)，兩者皆為錯誤選項未入選。"},{"id":"1317","sub":"Q","src":"NG","years":[115],"stem":"A 34-year-old man sustains deep dermal burns over the dorsum of the right hand and fingers. On admission, the hand is markedly edematous, but Doppler signals over the palmar arch and digital pulse oximetry remain detectable. Several months later, despite wound healing, he develops dorsal hand contracture with MCP joint hyperextension, PIP joint flexion, and an associated first web contracture. Which of the following statements is most appropriate?","opts":{"A":"Because the hand is markedly edematous, early escharotomy should be performed regardless of Doppler or pulse oximetry findings; digital escharotomies should be made along the mid-axial line of each digit to prevent later clawing.","B":"Initial splinting should place the wrist in slight flexion, MCP joints in extension, and IP joints in flexion, because this position decreases dorsal skin tension and protects the extensor mechanism during the acute inflammatory phase.","C":"If PIP flexion contractures are fixed, they should be corrected before MCP extension contracture release; otherwise, flexing the MCP joints after dorsal release may drive the fingertips into the palm and worsen functional grasp.","D":"During first web contracture release, the thumb should be stabilized mainly in extension after longitudinal web release, because this minimizes the required flap size while still restoring adequate pulp-to-pulp pinch.","E":"In post-burn dorsal hand contracture, scar excision and flap resurfacing alone are usually sufficient; capsular adhesions, long extensor adaptive shortening, and MCP articular congruity rarely determine the final functional result."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 燒傷後手背攣縮（MCP過伸、PIP屈曲、first web攣縮）處理重點：若PIP屈曲攣縮為固定型，應『先矯正PIP』再行MCP伸直攣縮鬆解——否則背側鬆解後屈曲MCP會把指尖推入掌心、惡化握持。核心易錯：急性期須採safe/antideformity position（腕伸、MCP屈70–90°、IP伸），非腕屈/MCP伸/IP屈；灌流可測時不需盲目escharotomy；深部因素（關節囊沾黏、伸肌腱適應性縮短、MCP關節吻合度）確會決定最終功能。","peropt":{"A":"✗ 已可測得Doppler/pulse ox表示灌流尚可，不應『不論結果』即early escharotomy，敘述不當。","B":"✗ 錯誤：正確安全姿勢為腕伸、MCP屈曲(70–90°)、IP伸直（intrinsic-plus），非腕屈/MCP伸/IP屈。","C":"✓（正解）固定型PIP屈曲攣縮應先矯正，再鬆解MCP伸直攣縮，否則會把指尖推入掌心、惡化握持。","D":"✗ First web鬆解後拇指應維持在『外展』位以保持web深度，非以extension為主，敘述不當。","E":"✗ 錯誤：關節囊沾黏、伸肌腱縮短、MCP吻合度常決定最終功能，非rarely determine。"},"cite":"待複查（NG 燒傷手部攣縮重建 記憶佐證）","conflict":""},{"id":"1318","sub":"A","src":"NG","years":[115],"stem":"關於手部構造的敘述，下列何者為錯?","opts":{"A":"Kaplan’s cardinal line與從中指尺側向近端延伸的縱向線交點為尺神經運動支(motor branch of the ulnar nerve)。","B":"舟狀骨結節（scaphoid tubercle）是一個重要的骨性解剖標誌，正常情況下，當每一根手指單獨屈曲時，其指尖的延長線都應指向舟狀骨結節。","C":"腕舟骨的近端血液供應較差，於近端(proximal pole)骨折後易發生不癒合(nonunion)。","D":"Gilula’s lines showing the greater arc and lesser arc of the carpal bones，可用來評估腕骨是否脫位、半脫位或骨折脫位。","E":"Checkrein ligament是一種不正常的結構，僅在纖維化後的近端指間關節(proximal interphalangeal joint)出現。"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 手部表面解剖:所有手指單獨屈曲時指尖延長線皆指向 scaphoid tubercle(評估旋轉);scaphoid 近端血供差(逆行)，proximal pole 骨折易 nonunion;Gilula's arcs(greater/lesser arc)評估腕骨排列/脫位。關鍵陷阱:與 Kaplan's cardinal line 交點相關的 thenar 運動支為『正中神經』recurrent motor branch;將其誤植為尺神經運動支者即為錯誤。","peropt":{"A":"✓(正解，敘述錯誤) 該處對應的 thenar 運動支為正中神經 recurrent motor branch，非尺神經運動支。","B":"✗(敘述正確) 各指單獨屈曲時指尖延長線皆指向 scaphoid tubercle。","C":"✗(敘述正確) Scaphoid 近端逆行血供差，proximal pole 骨折易 nonunion。","D":"✗(敘述正確) Gilula's lines(greater/lesser arc)評估腕骨脫位/半脫位/骨折脫位。","E":"✗(敘述正確，依本題) Checkrein(病理性)束與 PIP 屈曲攣縮相關。"},"cite":"待複查（NG hand surface anatomy / Kaplan line 記憶佐證）","conflict":""},{"id":"1320","sub":"F","src":"NG","years":[115],"stem":"請問下列何者是Wide-Awake Local Anesthesia No Tourniquet (WALANT)的優點？","opts":{"A":"不用 tourniquet避免止血帶疼痛","B":"不用sedation 避免麻醉風險","C":"病人可於術中配合動作，有助於屈肌腱重建時調整最佳張力。","D":"Diluted epinephrine用在手指頭是安全的","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"以上皆是(WALANT優點:免止血帶/免sedation/術中主動配合調張力/手指用稀釋epinephrine安全)。","peropt":{"A":"免tourniquet、避免止血帶疼痛，正確。","B":"免sedation、降低麻醉風險，正確。","C":"病人術中可主動活動、利屈肌腱重建調張力，正確。","D":"稀釋epinephrine用於手指是安全的(推翻舊禁忌)，正確。","E":"✔以上皆是。"},"cite":"Neligan, 5th Edition, vol.6, Ch4 p103","conflict":""},{"id":"1321","sub":"F","src":"NG","years":[115],"stem":"關於Hunter Two-Stage Tendon Reconstruction，何者錯誤？","opts":{"A":"Stage I 包含Scar excision, pulley reconstruction, silicone Hunter rod insertion，目的在於建立Pseudosheath","B":"Stage II包含移除Hunter rod並植入tendon graft","C":"Stage之間等待期為1個月","D":"Scarred tendon bed, Pulley destruction, Joint stiffness為two stage tendon reconstruction的適應症","E":"常使用的tendon graft為Palmaris longus及Plantaris"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Hunter兩階段間隔約『3個月』讓pseudosheath成熟，非1個月。","peropt":{"A":"Stage I:scar excision、pulley reconstruction、置silicone rod→形成pseudosheath，正確。","B":"Stage II:移除rod、植tendon graft，正確。","C":"✔答案(錯)：兩階段間隔約3個月(非1個月)。","D":"適應症:scarred bed、pulley destruction、joint stiffness，正確。","E":"常用graft:palmaris longus、plantaris，正確。"},"cite":"Neligan, 5th Edition, vol.6, Ch9 p222","conflict":""},{"id":"1322","sub":"F","src":"NG","years":[115],"stem":"下列關於Ｍallet finger之敘述何者為是?","opts":{"A":"成因爲terminal extensor tendon rupture or terminal tendon bony avulsion","B":"絕大多數保守治療即可，全天配戴Splint時間需持續 6–8 週，再調整成夜間配戴2–6 週。","C":"手術適應症為： Fragment >1/3 articular surface、volar subluxation、open Mallet injury、displacement > 3 mm","D":"最常見的手術方式為open reduction and internal fixation (ORIF)","E":"Mallet injury之手術併發症可高達53%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"⚠答案標D但臨床有爭議:mallet以保守為主,手術術式多為extension-block pinning/CRIF而非普遍ORIF。建議記『保守為主、術式多元』。","peropt":{"A":"成因=terminal extensor tendon斷裂或bony avulsion，正確。","B":"多數保守，全天splint 6-8週再夜間2-6週，大致正確。","C":"手術適應症:fragment>1/3關節面、volar subluxation、open、位移>3mm，大致正確。","D":"⚠題庫標為正解:『最常見手術為ORIF』；惟臨床bony mallet常用extension-block K-wire/CRIF，ORIF為首選有爭議，宜以概念記憶。","E":"Mallet手術併發症可達53%，有文獻支持。"},"cite":"Neligan, 5th Edition, vol.6, Ch10, 235-236","conflict":""},{"id":"1323","sub":"L","src":"NG","years":[115],"stem":"關於mutilating hand之評估與重建，以下何者為非？","opts":{"A":"重建的目標主要為達到穩定的手腕、至少兩隻以上可對掌運動且有感覺的手指、寬的第一指蹼","B":"若有活動性出血，應直接以止血鉗深入創口內夾住出血血管止血","C":"清創移除壞死組織時，應在止血帶使用下執行","D":"應儘早完成軟組織重建，最好在五天內進行","E":"次級的骨骼或神經移植應在六個月內執行，一旦組織情況達到穩定即可酌情進行改善外觀及功能性的手術"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『為非』。Mutilating hand 評估重建：目標為穩定手腕、至少兩隻以上可對掌且有感覺的手指、寬第一指蹼；清創須在止血帶下進行；軟組織重建宜早（最好 5 天內）；次級骨/神經移植於 6 個月內、組織穩定即可酌情進行。核心錯誤：活動性出血時『不應』盲目將止血鉗深入創口夾閉血管（易傷及神經血管），應以止血帶＋加壓、辨識結構後處理，故 B 錯誤。","peropt":{"A":"✗（正確敘述）目標為穩定手腕、至少兩隻以上可對掌且有感覺的手指、寬第一指蹼。","B":"✓（正解＝錯誤敘述）活動性出血不應盲目深入創口夾閉血管，易傷及神經血管；應以止血帶加壓後辨識處理。","C":"✗（正確敘述）清創須在止血帶使用下進行。","D":"✗（正確敘述）軟組織重建宜早，最好 5 天內。","E":"✗（正確敘述）次級骨/神經移植於 6 個月內、組織穩定即可酌情進行。"},"cite":"待複查（NG 手外科 mutilating hand 記憶佐證）","conflict":""},{"id":"1324","sub":"N","src":"NG","years":[115],"stem":"關於非顯微手術的拇指缺損重建，以下何者錯誤？","opts":{"A":"Distal 1/3拇指對功能性的損失較小，應優先考慮軟組織覆蓋即可","B":"Middle 1/3拇指缺損可以skin graft或Z-plasty延長first web space，達到relative的拇指延長","C":"Middle 1/3拇指缺損可以bone graft加上groin flap包埋，達到absolute的拇指延長","D":"Middle 1/3拇指缺損可使用metacarpal lengthening，優點為僅需單一次手術且是個無痛的療程，即便老年族群也不需要bone graft","E":"Proximal 1/3拇指缺損如果無法接受顯微手術，仍可考慮將食指進行拇指化移至thumb ray（on-top plasty）"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 非顯微拇指重建（本題問『錯誤』，答案D）：核心——metacarpal（distraction）lengthening為漸進式、需數週、可能疼痛，且較大缺損/老年常仍需bone graft，非『單次、無痛、免植骨』。其餘正確：distal 1/3以軟組織覆蓋、middle 1/3可用Z-plasty/skin graft做相對延長或bone graft+groin flap做絕對延長、proximal 1/3可用食指on-top plasty（pollicization）。","peropt":{"A":"✗（正確）Distal 1/3功能損失小，優先軟組織覆蓋。","B":"✗（正確）Middle 1/3以skin graft/Z-plasty加深first web達相對延長。","C":"✗（正確）Middle 1/3以bone graft+groin flap包埋達絕對延長。","D":"✓（正解，為錯誤敘述）Metacarpal lengthening為漸進多週、可能疼痛，且常需bone graft，非單次無痛免植骨。","E":"✗（正確）Proximal 1/3可行食指on-top plasty（pollicization）至thumb ray。"},"cite":"待複查（NG 拇指非顯微重建 記憶佐證）","conflict":""},{"id":"1325","sub":"P","src":"NG","years":[115],"stem":"關於手部常見良性腫瘤的敘述，以下何者錯誤？","opts":{"A":"Ganglion Cyst最常好發於dorsal carpal位置，且多源自scapholunate interosseous ligament","B":"Giant Cell Tumor因其復發率極低，切除時通常會因考慮外觀及功能性而不做complete resection","C":"Schwannoma切除需由 “shell it out” 的方式在顯微鏡下將其與周邊nerve fascicles剝離","D":"Neurofibroma切除可能會造成segmental神經損傷，通常需要事先準備做nerve graft的可能","E":"Lipoma的切除適應症為體積增加造成神經的壓迫"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 手部良性腫瘤處置:Ganglion 好發 dorsal carpal、源自 SL 韌帶;GCT of tendon sheath『復發率高』，須完整/仔細切除(非因復發率低而故意不完整切除);Schwannoma 可『shell out』enucleation 保留 fascicles;Neurofibroma 與 fascicle 交織，切除可能造成節段性神經缺損、須備 nerve graft;Lipoma 於壓迫神經時切除。本題找『錯誤』者為 B。","peropt":{"A":"✗(敘述正確) Ganglion 好發 dorsal carpal，源自 SL 韌帶。","B":"✓(正解，敘述錯誤) GCT of tendon sheath 復發率『高』，須完整仔細切除，非故意不完整切除。","C":"✗(敘述正確) Schwannoma 顯微下 enucleation(shell out)保留 fascicles。","D":"✗(敘述正確) Neurofibroma 切除可能致節段性神經損傷，須備 nerve graft。","E":"✗(敘述正確) Lipoma 於造成神經壓迫時切除。"},"cite":"待複查（NG hand benign tumors 記憶佐證）","conflict":""},{"id":"1326","sub":"I","src":"NG","years":[115],"stem":"關於Dupuytren’s disease的描述以下何者錯誤？","opts":{"A":"Dupuytren’s disease是手部palmar和digital fasciae的纖維化增生疾病，類似病症也可能影響足部(Ledderhose disease)或陰莖(Peyronie’s disease)","B":"60歲以上才發病的男性，通常疾病的病程較爲良性","C":"20–30° of metacarpophalangeal joint攣縮為手術適應症之一","D":"proximal interphalangeal joint攣縮非手術適應症之一","E":"糖尿病控制不佳為手術的contraindication之一"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『錯誤』。Dupuytren：屬掌部與指部筋膜纖維增生，可累及足(Ledderhose)或陰莖(Peyronie)；60 歲以上才發病之男性病程通常較良性（早發、diathesis 者較兇猛）；MCP 20–30° 攣縮為手術指徵之一；控制不佳的糖尿病為相對禁忌。核心錯誤：『任何程度』的 PIP joint 攣縮『即為』手術指徵（PIP 較難矯正、須早介入），故『PIP 攣縮非手術指徵』的 D 錯誤。","peropt":{"A":"✗（正確敘述）為掌/指筋膜纖維增生，可累及足（Ledderhose）與陰莖（Peyronie）。","B":"✗（正確敘述）60 歲以上才發病之男性病程通常較良性。","C":"✗（正確敘述）MCP 20–30° 攣縮為手術指徵之一。","D":"✓（正解＝錯誤敘述）任何程度 PIP 攣縮即為手術指徵，非『非手術指徵』。","E":"✗（正確敘述）控制不佳的糖尿病為手術相對禁忌之一。"},"cite":"待複查（NG 手外科 Dupuytren 手術指徵 記憶佐證）","conflict":""},{"id":"1327","sub":"F","src":"NG","years":[115],"stem":"以下關於常見的職業性手部疾病的敘述，哪些正確？(複選)","opts":{"A":"Lateral epicondylitis成因為flexor muscles機械性過度使用及重複性收縮，導致的微小撕裂或肌腱退化","B":"Trigger finger的初步治療選項中，局部注射類固醇於A1 pulley處是為重要的治療方式之一","C":"De Quervain’s tenosynovitis常見影響first dorsal compartment的肌腱abductor pollicis longus及extensor pollicis brevis","D":"Extensor carpi ulnar tendinitis的手術治療為在extensor retinaculum做radial incision為肌腱減壓","E":"Flexor carpi ulnaris tenosynovitis為scaphotrapeziotrapezoid joint關節炎，而flexor carpi radialis tenosynovitis則為pisotriquetral joint壓迫或鈣化"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯 職業性手部疾病（本題複選『正確』，答案BCD）：trigger finger可於A1 pulley局部類固醇注射；De Quervain影響first dorsal compartment之APL與EPB；ECU tendinitis手術於extensor retinaculum做『橈側』切開減壓（保留尺側subsheath避免半脫位）。核心易錯：lateral epicondylitis為『伸肌（ECRB）』過度使用（非flexor）；FCR相關STT joint、FCU相關pisotriquetral（選項E將兩者對調）。","peropt":{"A":"✗ Lateral epicondylitis為伸肌（ECRB）起點之過度使用/退化，非flexor，故不正確。","B":"✓ Trigger finger於A1 pulley局部注射類固醇為重要初步治療，正確。","C":"✓ De Quervain影響first dorsal compartment之APL與EPB，正確。","D":"✓ ECU tendinitis於extensor retinaculum做橈側切開減壓，正確。","E":"✗ 反了：FCR tenosynovitis與STT joint相關、FCU與pisotriquetral相關，選項將兩者對調，不正確。"},"cite":"待複查（NG 職業性手部肌腱病變 記憶佐證）","conflict":""},{"id":"1328","sub":"C","src":"NG","years":[115],"stem":"以下對應的肌肉weakness / 所involve的神經 / 壓迫的level之配對，哪些正確？(複選)","opts":{"A":"Triceps + flexor carpi radialis / Cervical root C5 / C5 radiculopathy","B":"extensor carpi radialis brevis + extensor indicis proprius + ex ite":"待複查（NG 手外科 成人 vs 產傷臂叢 記憶佐證）","conflict":""},{"id":"1330","sub":"Q","src":"NG","years":[115],"stem":"以下關於改善tetraplegia患者上肢功能的手術術式及描述，何者錯誤？","opts":{"A":"Arthrodesis可穩定那些缺乏肌肉穩定功能的關節","B":"Tenodesis可穩定關節在近端動作時，使tenodesis收緊而帶動遠端關節的動作","C":"Tendon transfer移植一組可良好自主意念控制的肌肉－肌腱，可彌補其他區域的功能缺陷","D":"Nerve transfer將active muscle延伸出來的功能性nerve branch移植至癱瘓的肌肉能提供肌肉功能","E":"藉由縮短肌腱或全面性阻斷神經，可降低spasticity的產生"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 Tetraplegia上肢功能重建（本題問『錯誤』，答案E）：arthrodesis穩定缺乏肌肉穩定之關節；tenodesis利用近端動作收緊肌腱帶動遠端；tendon transfer以可自主控制之肌肉補功能缺陷；nerve transfer將功能性神經分支接至癱瘓肌肉恢復功能。核心錯誤：以『縮短肌腱或全面性阻斷神經來降低spasticity』之敘述不當——痙攣處理另有方式，全面神經阻斷非合理策略。","peropt":{"A":"✗（正確）Arthrodesis可穩定缺乏肌肉穩定之關節。","B":"✗（正確）Tenodesis藉近端動作收緊肌腱帶動遠端關節。","C":"✗（正確）Tendon transfer以可自主控制之肌肉補功能缺陷。","D":"✗（正確）Nerve transfer將功能性神經分支接至癱瘓肌肉以恢復功能。","E":"✓（正解，為錯誤敘述）以縮短肌腱或『全面性阻斷神經』降低spasticity之敘述不正確。"},"cite":"待複查（NG 四肢癱瘓上肢重建 記憶佐證）","conflict":""},{"id":"1332","sub":"Q","src":"NG","years":[115],"stem":"Free-functioning muscle transfer之敘述，以下何者錯誤？","opts":{"A":"為確保移植的axon source為健康且size足夠的神經，初步探查或神經biopsy為可能需要的手段","B":"在harvest皮瓣時保留一小塊skin paddle有助於提升皮瓣監測及成功搶救皮瓣的成功率","C":"為確保muscle移植後能具有足夠的收縮強度，其選定的長度應在最強收縮狀態下決定","D":"Gracilis是最常用來重建上肢功能的free-functioning muscle transfer，因爲其donor site morbidity小且周圍其他肌肉能代償其功能","E":"Late complication常見功能性不足的原因，可能來自肌肉強度不夠或者沾黏導致肌腱gliding或肌肉excursion受阻"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『錯誤』。Free-functioning muscle transfer (FFMT)：可能需初步探查或神經 biopsy 確保健康且口徑足夠之 axon source；保留 skin paddle 有助皮瓣監測與搶救；gracilis 最常用（供區 morbidity 小、鄰肌可代償）；late complication 常因肌力不足或沾黏阻礙 gliding/excursion。核心錯誤：移植肌肉的長度/張力應設定在『靜止（resting）張力／自然靜息長度』（sarcomere 最佳長度），而非『最強收縮狀態』，故 C 錯誤。","peropt":{"A":"✗（正確敘述）可能需初步探查或神經 biopsy 以確保健康、口徑足夠之 axon source。","B":"✗（正確敘述）保留 skin paddle 有助皮瓣監測與搶救。","C":"✓（正解＝錯誤敘述）肌肉長度/張力應設定於靜息(resting)張力/自然靜息長度，非『最強收縮狀態』。","D":"✗（正確敘述）Gracilis 最常用，供區 morbidity 小、鄰肌可代償。","E":"✗（正確敘述）Late complication 常因肌力不足或沾黏阻礙 gliding/excursion。"},"cite":"待複查（NG 手外科 FFMT   return {D:5,S:seedS,reps:op.n||1,lapses:op.w?1:0,last:Date.now(),due:op.due||Date.now()+seedS*DAY,
    f:(op.f!==undefined?op.f:null),n:op.n||1,postC:0,postN:0,conf:null,w:!!op.w};
}
function normalizeP(P){for(const id in P){const e=P[id];if(e&&e.S===undefined&&(e.s!==undefined||e.n!==undefined))P[id]=migrateEntry(e);}return P;}

let S={P:{},star:{},note:{},last:null,shuffle:true};

  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}

function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}

function catStats(code){

  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(){

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,wrongtype:'錯題 '+curType,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();hideConfidence();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
