<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;

--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;

.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id":"1000","sub":"F","src":"GS","years":[110,111,112,113,114],"stem":"以下解剖敘述，何者為正確?","opts":{"A":"The distal palmar crease is at the proximal end of the A1 pulley","B":"Lister's tubercle is just proximal to the lunotriquetral joint.","C":"The palmaris longus is radial to the median nerve.","D":"The web space is at the proximal portion of the proximal phalanx","E":"The distal wrist crease is at the level of DRUJ."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Distal palmar crease位於A1 pulley近端。","peropt":{"A":"✔答案:distal palmar crease在A1 pulley近端。","B":"✗Lister's tubercle在distal radius背側(非lunotriquetral近端)。","C":"✗median nerve在PL深面略偏橈側→PL相對在其尺側(敘述radial有誤)。","D":"✗web space約在proximal phalanx近1/3(此定位不精確)。","E":"✗distal wrist crease約在radiocarpal(非DRUJ)。"},"cite":"Grabb and Smith's, 8th, Ch 67, p671","conflict":""},{"id":"1001","sub":"B","src":"GS","years":[110,111,112,113,114],"stem":"以下對於屈肌腱鞘感染產生的Kanaval signs，何者為非?","opts":{"A":"Fusiform swelling, or a sausage digit.","B":"Digit resting in flexed position","C":"Crepitus sound.","D":"Pain with passive motion.","E":"Tenderness to palpation along the flexor tendon sheath into the palm."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Kanavel四徵:梭狀腫脹、屈曲姿勢、passive extension疼痛、腱鞘壓痛;crepitus非Kanavel徵。","peropt":{"A":"fusiform swelling(sausage digit)=Kanavel。","B":"屈曲姿勢=Kanavel。","C":"✔答案(非):crepitus非Kanavel徵。","D":"passive motion疼痛=Kanavel。","E":"腱鞘壓痛延伸至掌=Kanavel。"},"cite":"Grabb and Smith's, 8th, Ch 68, p673","conflict":""},{"id":"1002","sub":"C","src":"GS","years":[110,111,112,113,114],"stem":"50歲長期抽菸男性工人，近年來左手尺側麻痛，且伴隨背側及掌側感覺異常，經由身體檢查評估發現claw hand、小魚際肌萎縮及Froment sign異常，病人最有可能為以下何種疾病?","opts":{"A":"Carpal tunnel syndrome.","B":"Proximal median nerve entrapment.","C":"Cubital tunnel syndrome.","D":"Ulnar tunnel syndrome.","E":"以上皆非"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"尺神經肘部壓迫(cubital tunnel):claw hand+小魚際萎縮+Froment;有『背側』感覺異常代表病灶在肘(dorsal ulnar cutaneous branch於腕近端分出)。","peropt":{"A":"✗CTS為正中神經。","B":"✗proximal median entrapment非。","C":"✔答案:cubital tunnel syndrome。","D":"✗Guyon管(腕)壓迫通常不影響背側感覺;本例有背側感覺異常→病灶在肘。","E":"✗。"},"cite":"Grabb and Smith's, 8th, Ch 70, p693","conflict":""},{"id":"1003","sub":"C","src":"GS","years":[110,111,112,113,114,115],"stem":"一位42歲進康男性，因為半年前外傷，導致肘隧道症候群伴隨claw hand、小魚際肌且掌骨間肌萎縮，以下何種神經重建手術方式最適用?","opts":{"A":"Donor nerve: ECRL branch radial nerve ; Recipient nerve: Ulnar motor branch","B":"Donor nerve: ECRB branch radial nerve ; Recipient nerve: Ulnar motor branch","C":"Donor nerve: Terminal branch of AIN ; Recipient nerve: Ulnar motor branch","D":"Donor nerve: FCU branch ulnar nerve; Recipient nerve: Ulnar motor branch.","E":"Jones tendon transfer"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 此為高位ulnar nerve病變（cubital tunnel syndrome）伴內在肌萎縮的神經重建首選：以AIN終末支（支配pronator quadratus）作為donor，端對端或端對側（SETS supercharge）轉移至ulnar nerve的deep motor branch。核心機轉是高位病變再生距離過長、內在肌恐先纖維化，故以靠近目標的運動神經『就近補充』軸突，加速intrinsic重新支配。易混淆點：Jones transfer屬肌腱轉移用於radial nerve palsy，非神經重建。","peropt":{"A":"✗ ECRL branch（radial nerve）並非重建ulnar運動功能的標準donor，且方向與目標不符。","B":"✗ ECRB branch（radial nerve）同樣非ulnar motor重建之donor，radial系統無法就近提供內在肌軸突。","C":"✓（正解）Terminal branch of AIN（至PQ）→ ulnar motor branch，屬distal nerve transfer/supercharge，就近提供軸突、縮短再生距離，最適合高位ulnar病變之內在肌重建。","D":"✗ FCU branch本身即ulnar nerve分支，於高位病變中同屬失神經，無法作為健康donor。","E":"✗ Jones tendon transfer為radial nerve palsy之肌腱轉移方案，與ulnar內在肌神經重建無關。"},"cite":"待複查（GS 周邊神經轉移／distal nerve transfer 記憶佐證）","conflict":""},{"id":"1004","sub":"N","src":"GS","years":[110,111,112,113,114],"stem":"關於thumb fingertip重建，以下何者手術方式較適合? (複選)","opts":{"A":"Moberg flap","B":"Toe pulp transfer","C":"First dorsal metacarpal artery (DMCA) flap","D":"Thenar flap","E":"V-Y flap"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"拇指指尖重建:Moberg、toe pulp、FDMA(kite)、V-Y皆宜;thenar flap不適用於拇指本身(用於食/中指)。","peropt":{"A":"Moberg flap(拇指掌側前推)，宜。","B":"toe pulp transfer，宜。","C":"first DMCA(kite)flap，宜。","D":"✗thenar flap不適用於拇指(用於食/中指)。","E":"V-Y flap，宜。"},"cite":"Grabb and Smith's, 8th, Ch 69, p681-683","conflict":""},{"id":"1006","sub":"F","src":"GS","years":[110,111,112,113,114,115],"stem":"What kind of complication will be happened if repaired or reconstructed flexor digitorum profundus is too short?","opts":{"A":"Mallet finger","B":"Boutoniere deformity","C":"Lumbrical Plus finger","D":"Quadriga effect","E":"All of the above are correct"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 修復或重建後的 flexor digitorum profundus (FDP) 若過短（over-advanced），會產生 Quadriga effect（四頭馬車效應）。因為中、環、小指的 FDP 共用一個 common muscle belly，當其中一條被縮短、固定，肌腹被『拴住』而無法完整下滑，導致其餘手指無法完全屈曲、握力下降。核心鑑別：FDP『過短』→ Quadriga；FDP『過長／過鬆』(如遠端截肢後 graft 過長)→ Lumbrical plus finger（試圖屈曲時 IP 反常伸直）。兩者常一起考、方向相反，務必分清。","peropt":{"A":"✗ Mallet finger 是 DIP 處 terminal extensor tendon 斷裂／撕脫，屬伸肌側損傷，與 FDP 過短無關。","B":"✗ Boutonnière deformity 源於 central slip（中央束）斷裂造成 PIP 屈曲、DIP 過伸，屬伸肌機制問題，非 FDP 長度問題。","C":"✗ Lumbrical plus finger 是 FDP『過長／過鬆』（如截肢殘端縫太鬆或 graft 過長），屈指時張力經 lumbrical 傳導反使 IP 反常伸直，與本題『過短』方向相反。","D":"✓（正解）FDP 過短造成 Quadriga effect：共用肌腹被縮短端拴住，鄰指無法完整屈曲，握力下降。","E":"✗ 並非全部皆對，僅 D 正確。"},"cite":"待複查（GS 手外科 Flexor tendon / Quadriga 記憶佐證）","conflict":"⚠ 同題歷屆重出：FDP修補過短之併發症題，正確答案恆為Quadriga effect。110/111/113/114/115年(1006)答D、112年(1028)答A(僅選項順序不同)；記概念不記字母。"},{"id":"1007","sub":"F","src":"GS","years":[110,111,112,113],"stem":"The pathomechanics of Boutonniere deformity is the following except:","opts":{"A":"Rupture of the central tendon over the PIP joint.","B":"Prolapse of the lateral band volar to the PIP joint axis","C":"Hyperextension of DIP joint and flexion deformity of the PIP joint","D":"Rupture of lateral band","E":"None of the above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Boutonniere deformity核心機轉為PIP背側central slip斷裂，導致lateral bands向掌側（volar to PIP axis）滑脫prolapse，形成PIP屈曲、DIP過度伸直。關鍵易混淆：lateral band是『滑脫』而非『斷裂』；與swan-neck（PIP過伸、DIP屈曲）方向相反。題目問『非』病理機轉者。","peropt":{"A":"✗ Central tendon（slip）於PIP上方斷裂為起始病灶，屬正確機轉，非答案。","B":"✗ Lateral band掌側滑脫至PIP軸之volar側，為正確機轉，非答案。","C":"✗ DIP過伸合併PIP屈曲即典型畸形表現，屬正確，非答案。","D":"✓（正解）Lateral band為『滑脫』而非『rupture』；斷裂lateral band並非Boutonniere之機轉，故為題目所問的例外。","E":"✗ 既已有D為例外，'None of the above'不成立。"},"cite":"待複查（GS 伸肌腱機制／Boutonniere 記憶佐證）","conflict":""},{"id":"1008","sub":"F","src":"GS","years":[110,111,112,113,114,115],"stem":"De Quervain's tenosynovitis 為?","opts":{"A":"First dorsal compartment tenosynovitis","B":"Second dorsal compartment tenosynovitis","C":"third dorsal compartment tenosynovitis","D":"forth dorsal compartment tenosynovitis","E":"fifth dorsal compartment tenosynovitis"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"De Quervain=first dorsal compartment(APL+EPB)腱鞘炎。","peropt":{"A":"✔答案:first dorsal compartment。","B":"second非。","C":"third非。","D":"fourth非。","E":"fifth非。"},"cite":"Grabb and Smith's, 9th, Ch.91","conflict":""},{"id":"1010","sub":"F","src":"GS","years":[110],"stem":"Regarding extensor tendon injuries which of the following is true?","opts":{"A":"Rupture of central slip injury can cause swan neck deformity characterized by DIPJ flexion and PIPJ hyperextension","B":"Untreated mallet injury cause boutonnière deformity characterized by hyperextension of the DIPJ and PIPJ flexion","C":"Closed injuries of the extensor tendon at the level of DIPJ and PIPJ are usually treated surgically","D":"Ruptured sagittal bands causes subluxations of the extensor tendon at MP joint","E":"There are 5 zones of extensor tendon injuries"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"sagittal band斷裂→MP關節伸肌腱subluxation(D正確)。伸肌腱分8區(非5);central slip斷裂→boutonniere;mallet未治→swan neck;DIP/PIP閉鎖性伸肌傷多保守。","peropt":{"A":"✗central slip斷裂→boutonniere(非swan neck),且swan neck為PIP過伸/DIP屈曲。","B":"✗mallet未治→swan neck(非boutonniere)。","C":"✗DIP/PIP閉鎖性伸肌傷多保守(非手術)。","D":"✔答案:sagittal band斷裂→MP伸肌腱subluxation。","E":"✗伸肌腱分8區(非5)。"},"cite":"Grabb and Smith 8th, Ch 76 / Neligan Vol 6 p227","conflict":""},{"id":"1011","sub":"L","src":"GS","years":[110,113,114],"stem":"Relative contraindication to Replantation Include: (複選)","opts":{"A":"Life-threatening-associated injuries","B":"Psychologically unstable patients","C":"Severe crushing or avulsion","D":"Multiple segmental injuries of the amputated part","E":"Extreme contamination"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"以上皆是:危及生命傷、精神不穩、嚴重壓碎/撕脫、多節段損傷、極度污染皆為replantation(相對)禁忌。","peropt":{"A":"危及生命傷=禁忌。","B":"精神不穩=禁忌。","C":"嚴重壓碎/撕脫=禁忌。","D":"多節段損傷=禁忌。","E":"極度污染=禁忌。"},"cite":"Grabb and Smith 8th, Chap 83, p829","conflict":""},{"id":"1012","sub":"N","src":"GS","years":[110,111,113,114],"stem":"Regarding the thumb which is false?","opts":{"A":"The thumb is responsible for 40% of the overall hand function; therefore a priority in complex hand injuries.","B":"The minimum length for acceptable thumb function is at the interphalangeal joint. An amputation at this level decreases the function of the thumb by 50%","C":"Complex injuries at or distal to the IP joint must have extensive reconstruction.","D":"A toe-transfer procedure provide superior outcomes in thumbs with inadequate length (proximal to the IP joint)","E":"Isolated soft tissue defects of the thumb can be reconstructed with either local/regional or microsurgical flaps though selection of sensate flaps is essential"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"拇指IP以遠(或該處)截肢不一定需大範圍重建;C為錯誤敘述。","peropt":{"A":"拇指佔手功能約40%,正確。","B":"最短功能長度在IP,該處截肢降約50%功能,正確。","C":"✔答案(錯):IP以遠不一定需extensive reconstruction。","D":"長度不足(IP近端)以toe-transfer較佳,正確。","E":"拇指軟組織缺損可local/microsurgical flap且宜sensate,正確。"},"cite":"Grabb and Smith's, 8th, Chap 84, p847","conflict":""},{"id":"1013","sub":"I","src":"GS","years":[110,111,113,114],"stem":"Which one of the following signs suggest more severe Dupuytrens disease?","opts":{"A":"Bilateral palmar disease","B":"No family history of Dupuytrens","C":"Ulnar side involvement","D":"Female gender","E":"Late onset (>70 years)"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Dupuytren diathesis(嚴重指標):雙側掌部病變、家族史、早發、Garrod knuckle pads、Ledderhose/Peyronie。","peropt":{"A":"✔答案:bilateral palmar disease提示嚴重。","B":"✗有家族史(非無)才嚴重。","C":"✗尺側受累常見,非嚴重專屬指標。","D":"✗男性(非女性)較嚴重。","E":"✗早發(非高齡)較嚴重。"},"cite":"Grabb and Smith's, 8th, Ch 85, p860","conflict":""},{"id":"1014","sub":"K","src":"GS","years":[110,111],"stem":"Regarding Burger's Disease, which is false","opts":{"A":"Also called \"Thrombophlebitis Obliterans\"","B":"An inflammatory disease of small and medium size arteries","C":"Cigarette smoking is a major risk factor","D":"Patients are mainly young men","E":"Bypass and revascularization procedures are typically successful"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Buerger disease(thromboangiitis obliterans)以戒菸為本;bypass/revascularization多不成功(遠端小血管廣泛侵犯、缺distal target)。E為錯誤。","peropt":{"A":"歷史別名(嚴格應為thromboANGIITIS obliterans;此版視為真)。","B":"小/中動脈發炎性疾病,正確。","C":"抽菸為主要risk factor,正確。","D":"多為年輕男性,正確。","E":"✔答案(錯):bypass/revascularization多不成功。"},"cite":"Grabb and Smith's, 8th, Chap 87, p880","conflict":""},{"id":"1015","sub":"K","src":"GS","years":[110,111],"stem":"Regarding hand vascular diseases, which is true","opts":{"A":"Both Allen testing and pencil Doppler can localize obstructive arterial lesions, angiography is not necessary","B":"Hand ischemia in the setting of chronic thrombosis is responsive to medical management and does not usually requires surgical treatment.","C":"Arterial reconstruction requires careful preoperative planning with appropriate vascular imaging to identify suitable distal targets.","D":"Periarterial sympathectomy is an effective first line treatment for Raynaud phenomenon due to scleroderma.","E":"Following resection or ligation of diseased arterial segments, these defects does not need reconstruction"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"動脈重建需術前影像評估找合適distal target(C正確)。","peropt":{"A":"✗Allen/Doppler不能完全取代angiography。","B":"✗慢性血栓缺血常需手術(非只藥物)。","C":"✔答案:動脈重建需影像找distal target。","D":"✗periarterial sympathectomy非scleroderma Raynaud一線。","E":"✗切除/結紮病變段常需重建。"},"cite":"Grabb and Smith's, 8th, Chap 87, p875","conflict":""},{"id":"1016","sub":"H","src":"GS","years":[110],"stem":"Which of the following is the most common cause of a forearm compartment syndrome in children?","opts":{"A":"Vascular injury","B":"Crush injury","C":"Burn","D":"Fracture","E":"Snake bite"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"小兒前臂compartment syndrome最常見原因亦為fracture(尤其supracondylar/前臂骨折)。","peropt":{"A":"vascular injury非最常。","B":"crush非最常。","C":"burn非最常。","D":"✔答案:fracture最常見。","E":"snake bite非最常。"},"cite":"Grabb and Smith 8th, Ch 89, p899","conflict":"題幹適用範圍不同（兒童 vs 一般），答案雖同但條件不同（對照 GS111-B15-Q01）"},{"id":"1017","sub":"O","src":"GS","years":[110,111],"stem":"Thumb duplication is classified using the Flatt classification system, which is the most common type of duplication?","opts":{"A":"Type I","B":"Type II","C":"Type III","D":"Type IV","E":"Type V"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Flatt(Wassel)最常見type IV(~43%,duplicated proximal phalanx)。","peropt":{"A":"type I非。","B":"type II非。","C":"type III非。","D":"✔答案:type IV最常見。","E":"type V非。"},"cite":"Grabb and Smith 8th, Ch 90, p909-910","conflict":""},{"id":"1018","sub":"J","src":"GS","years":[110],"stem":"Biological DMARDs, such as etanercept (Enbrel), infliximab (Remicade), or adalimumab (Humira), used in treatment of rheumatoid arthritis work by what mechanism of action?","opts":{"A":"Binding of cell messenger protein IL-1","B":"Antagonism of DNA modification","C":"B-cell depletion","D":"Blockade of T-cell activation","E":"Tumor necrosis factor binding"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"etanercept/infliximab/adalimumab為TNF抑制劑,機轉=結合tumor necrosis factor。","peropt":{"A":"✗IL-1結合為anakinra。","B":"✗非DNA modification。","C":"✗B-cell depletion為rituximab。","D":"✗T-cell activation阻斷為abatacept。","E":"✔答案:TNF binding。"},"cite":"Grabb and Smith 8th, Ch 92, p928","conflict":""},{"id":"1019","sub":"J","src":"GS","years":[110,111,113],"stem":"A 70-year-old woman comes into the office complaining of 6 weeks of pain at the base of the thumb of the dominant right hand. It interferes with her leisure activities of knitting and cooking. On examination, she has a positive grind test and weak grip strength. There is mild MCP hyperextension of 15 degrees. Her X-rays demonstrate decreased trapeziometacarpal joint space and a 1 mm osteophyte. No cystic changes are noted. What is the next step in management?","opts":{"A":"CMC arthrodesis","B":"Trapezium excision and ligament reconstruction/tendon interposition","C":"Spica cast immobilization for 2 months","D":"Pinning of the MCP in neutral for 6 weeks","E":"Splinting, NSAIDs, and steroid injection"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"基底關節炎(Eaton早期)首選保守:splint/NSAID/類固醇注射;此版conservative為選項E。","peropt":{"A":"CMC arthrodesis非首選。","B":"trapezium excision/LRTI保留給保守失敗。","C":"spica cast 2月過度。","D":"MCP pinning非。","E":"✔答案:splint/NSAID/類固醇注射(保守優先)。"},"cite":"Grabb and Smith 8th, Ch 93, p941","conflict":"⚠ 同題歷屆重出：70歲女性拇指基部疼痛(CMC OA)臨床案例題，正確答案恆為保守治療splinting/NSAIDs/steroid injection。110/111年(1019)答E、113年(1042)答B(僅選項順序不同)；記概念不記字母。"},{"id":"1020","sub":"E","src":"GS","years":[110],"stem":"A 28-year-old man presents with a symptomatic neuroma over his transradial amputation residual limb 1 year following his amputation. How would you manage this patient? (複選)","opts":{"A":"Perform a physical examination and a diagnostic local anesthetic block to confirm the site of the neuroma.","B":"Refer the patient to a therapist to learn about scar desensitization and other nonoperative modalities to manage the neuroma pain.","C":"Consider consultation with a multidisciplinary pain management team.","D":"Discuss operative management of the neuroma with the patient, including traction neurectomy, burying the nerve, creation of a regenerative peripheral nerve interface, or targeted muscle reinnervation.","E":"Asymptomatic neuroma should treated surgically."},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"症狀性神經瘤多模式處理:理學+局麻阻斷定位、去敏感、多科疼痛團隊、手術(traction neurectomy/burying/RPNI/TMR);E錯。","peropt":{"A":"理學+診斷性局麻阻斷定位,對。","B":"去敏感等非手術治療,對。","C":"多科疼痛團隊,對。","D":"手術選項(RPNI/TMR等),對。","E":"✗phantom pain不一定伴神經瘤。"},"cite":"Grabb and Smith 8th, Ch 91, p922","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：E: 110「Asymptomatic neuroma should treated surg」 vs 111「When a patient has phantom pains, there 」"},{"id":"1021","sub":"Q","src":"GS","years":[111],"stem":"What flap is ideal to improve a webspace contracture between the ring and middle fingers?","opts":{"A":"Z-plasty","B":"Five-flap jumping man flap","C":"Kite flap","D":"Littler flap","E":"None of the above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 指蹼攣縮（webspace contracture）的理想放鬆設計為 five-flap jumping man flap（又稱 double opposing Z-plasty 合併中央 V-Y），能同時加深指蹼、重建交會處輪廓並延長攣縮帶。核心鑑別：單一 Z-plasty 適合線狀疤痕延長但重建指蹼交會輪廓較差；Kite flap（FDMA）與 Littler flap 分別是拇指背側及感覺重建用途，並非指蹼放鬆設計。","peropt":{"A":"✗ 單純 Z-plasty 可延長線狀攣縮，但對指蹼『交會處』的加深與輪廓重建效果不如 five-flap。","B":"✓（正解）Five-flap jumping man flap 專為指蹼攣縮設計，兼具加深指蹼與延長攣縮帶。","C":"✗ Kite flap 即 first dorsal metacarpal artery (FDMA) flap，用於拇指背側／指腹軟組織覆蓋，非指蹼放鬆。","D":"✗ Littler flap 為神經血管島狀皮瓣，用於拇指感覺重建，非指蹼攣縮。","E":"✗ B 為正解，故非『以上皆非』。"},"cite":"待複查（GS 手外科 局部皮瓣／指蹼攣縮 記憶佐證）","conflict":""},{"id":"1023","sub":"L","src":"GS","years":[111],"stem":"Relative contraindication of replantation include: (複選)","opts":{"A":"Life-threatening-associated injuries","B":"Psychologically unstable patients","C":"Thumb amputation","D":"Multiple segmental injuries of the amputated part","E":"Severe crushing or avulsion"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"相對禁忌ABDE;thumb amputation(選項C)為replantation『強適應症』,非禁忌。","peropt":{"A":"危及生命傷=禁忌。","B":"精神不穩=禁忌。","C":"✗thumb amputation為強適應症(非禁忌)。","D":"多節段損傷=禁忌。","E":"嚴重壓碎/撕脫=禁忌。"},"cite":"Grabb and Smith's, 8th, Chap 83, p829","conflict":""},{"id":"1024","sub":"I","src":"GS","years":[111,113,114],"stem":"Which of the following is the most common cause of forearm compartment syndrome?","opts":{"A":"Vascular injury","B":"Crush injury","C":"Burns","D":"Fracture","E":"Snake bite"},"ans":"D","multi":false,"etype":"ai","expl":"Fractures are the most common cause for compartment syndrome in the extremities.","key":"Fracture為前臂compartment syndrome最常見原因。","peropt":{"A":"vascular injury非最常。","B":"crush非最常。","C":"burns非最常。","D":"✔答案:fracture最常見。","E":"snake bite非最常。"},"cite":"Grabb and Smith's, 8th, Ch 89, p899","conflict":"題幹適用範圍不同（兒童 vs 一般），答案雖同但條件不同（對照 GS110-B15-Q01） ⚠ 同題歷屆重出：前臂compartment syndrome最常見成因題，正確答案恆為fracture(骨折)。111/114年(1024)答D、113年(1043)答B(僅選項順序不同)；記概念不記字母。"},{"id":"1025","sub":"C","src":"GS","years":[111],"stem":"Regarding tendon transfers for tendon rupture, which of the following is NOT first line option?","opts":{"A":"Rupture of EDM/EDC to small finger: End-to-side EDM and SF EDC to EDC of ring finger","B":"Rupture of EDM and EDC to small, ring, and middle fingers: FDS ring to EDM, EDC of ring and small; End-toside of EDC to middle to EDC index","C":"EPL rupture: EIP to EPL","D":"FPL rupture: BR to FPL","E":"FDS rupture: no transfer"},"ans":"B","multi":false,"etype":"ai","expl":"Rupture of EDM and EDC to small, ring, and middle fingers: EIP to EDM, EDC of ring and small; End-to-side of EDC to middle to EDC index","key":"EDM+EDC(小/環/中指)斷裂first line為『EIP→EDM,EDC of ring&small;中指EDC end-to-side至index EDC』;選項B改用FDS ring為donor,非first line。","peropt":{"A":"小指EDM/EDC斷裂→end-to-side至環指EDC,first line。","B":"✔答案(非first line):應以EIP轉位(非FDS ring)。","C":"EPL斷裂→EIP to EPL,first line。","D":"FPL斷裂→BR to FPL,first line。","E":"FDS斷裂多不需transfer,正確。"},"cite":"Grabb and Smith 8th, Ch 92, p932","conflict":""},{"id":"1026","sub":"E","src":"GS","years":[111],"stem":"A 28-year-old man presents with a symptomatic neuroma over his transradial amputation residual limb one year following his amputation. Which of the following managments and statements are correct? (複選)","opts":{"A":"Perform a physical examination and a diagnostic local anesthetic block to confirm the site of the neuroma.","B":"Refer the patient to a therapist to learn about scar desensitization and other nonoperative modalities to manage the neuroma pain.","C":"Consider consultation with a multidisciplinary pain management team.","D":"Discuss operative management of the neuroma with the patient, including traction neurectomy, burying the nerve, creation of a regenerative peripheral nerve interface, or targeted muscle reinnervation.","E":"When a patient has phantom pains, there must be neuromas over the amputated limb"},"ans":"ABCD","multi":true,"etype":"ai","expl":"Symptomatic neuromas are common following amputations. A multimodal treatment approach is best. Nonoperative management is typically recommended first, including desensitization therapy, neuropathic pain medications, prosthetic socket modifications, and occasionally psychiatric evaluation. If the neuroma is well localized and does not respond to nonoperative measures, surgery can be pursued.\n\nPhantom pains are ongoing painful sensations felt coming from the amputated limb and may occur with or without neuromas.","key":"🎯 截肢後 symptomatic neuroma 處理採 multimodal、先非手術後手術原則：先理學檢查+診斷性局部麻醉阻斷定位，接著減敏治療、神經病理性疼痛藥物、義肢 socket 調整、必要時多科疼痛團隊/精神評估；無效且定位明確再手術(traction neurectomy、burying nerve、RPNI、TMR)。⚠ 關鍵陷阱：phantom pain 可有或沒有 neuroma，兩者非必然共存(對照跨年版本 E 之事實置換)。","peropt":{"A":"✓ 理學檢查+診斷性局麻阻斷確認 neuroma 位置，正確第一步。","B":"✓ 轉介治療師行疤痕減敏及其他非手術療法。","C":"✓ 多科疼痛團隊會診屬合理 multimodal 處置。","D":"✓ 與病人討論手術選項(traction neurectomy/burying/RPNI/TMR)正確。","E":"✗ Phantom pain 可在有或無 neuroma 下發生，並非『一定有 neuroma』。"},"cite":"原檔詳解","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：E: 110「Asymptomatic neuroma should treated surg」 vs 111「When a patient has phantom pains, there 」"},{"id":"1027","sub":"N","src":"GS","years":[112,114],"stem":"Regarding the thumb, which of the following description is incorrect?","opts":{"A":"The thumb is responsible for 40% of the overall hand function","B":"Thumb amputation at interphalangeal joint level decreases the function of the thumb by 50%","C":"Thumb amputations at or distal to the IP joint still require additional lengthening bony reconstruction to achieve normal hand function","D":"Replantation of a native thumb will nearly always achieve better outcomes when compared to secondary reconstruction techniques","E":"Secondary reconstruction can be accomplished by conventional techniques of distraction lengthening or pollicization of an injured finger or a normal finger and probably now better by microsurgical toe-to-thumb transfer"},"ans":"C","multi":false,"etype":"ai","expl":"A. The thumb is responsible for 40% of the overall hand function; therefore, reconstruction of this digit is essential to restore adequate length as well as sensate and durable soft tissue.\n\nB. The minimum required length for a functional thumb is at the level of the IP joint. An amputation at this level decreases the function of the thumb by 50%\n\nC. Thumb amputations at or distal to the IP joint do not necessarily require additional length or bony reconstruction. Amputations proximal to the IP joint of the thumb will require a surgical approach that restores a functional length similar to that of a normal thumb or a minimum at the level of the IP joint.","key":"🎯 本題問『何者敘述錯誤』。拇指負責約 40% 手部功能；截肢在 IP joint 平面會喪失約 50% 拇指功能，此為最短仍具功能的長度。關鍵觀念：截肢平面在 IP joint 或更遠端者，長度大致足夠、通常『不需』額外骨性延長重建即可維持功能，故 C 為錯誤敘述。原生拇指再植的結果幾乎總優於次級重建。","peropt":{"A":"✗（此為正確敘述）拇指約占整體手功能 40%，重建須恢復長度、感覺與耐用軟組織。","B":"✗（此為正確敘述）IP joint 平面截肢使拇指功能下降約 50%，為維持功能的最短長度。","C":"✓（正解＝錯誤敘述）截肢在 IP joint 或其遠端者，殘存長度已足，通常『不』需額外骨性延長重建即可保有近正常功能。","D":"✗（此為正確敘述）原生拇指再植結果幾乎總優於次級重建技術。","E":"✗（此為正確敘述）次級重建可用 distraction lengthening、pollicization，或現今更佳的 microsurgical toe-to-thumb transfer。"},"cite":"原檔詳解","conflict":""},{"id":"1029","sub":"G","src":"GS","years":[110,111,112,113],"stem":"Which of the following statements is not the main cause of shifting 1st metacarpal shaft in Bennett's fracture?","opts":{"A":"Abductor pollicis longus","B":"Adductor pollicis","C":"Flexor pollicis longus","D":"Extensor pollicis brevis","E":"All of the above are correct"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 Bennett's fracture 的移位力為 APL、adductor pollicis、EPB；FPL 不參與掌骨幹移位。本版選項乾淨(D 為 EPB，屬真正移位力)，故唯一的『非移位力』即 FPL(C)。掌骨幹向近端/橈側/背側 subluxate，喙狀骨片被 beak ligament 固定。","peropt":{"A":"✗ APL 為主要移位力。","B":"✗ Adductor pollicis 為移位力之一。","C":"✓(正解) FPL 不參與 Bennett 移位，為『非主要移位力』的答案。","D":"✗ EPB 參與移位。","E":"✗ 並非全部皆為移位力(FPL 除外)。"},"cite":"待複查（GS Bennett fracture 記憶佐證）","conflict":"⚠ 同題歷屆重出：Bennett's fracture第一掌骨移位『非』主要變形力題，正確答案恆為Flexor pollicis longus(FPL)。110年(1005)答D、111年(1022)答D、112/113年(1029)答C；另選項C在110年為Extensor pollicis longus、111/112/113年改為Extensor pollicis brevis(皆為變形力distractor)；作答錨定FPL。"},{"id":"1030","sub":"N","src":"GS","years":[110,111,112,113,114,115],"stem":"Which of the following tendons could be the donor tendon for opponensplasty? (複選)","opts":{"A":"Extensor indicis proprius (EIP)","B":"flexor digitorum superficialis (FDS)","C":"Abductor digiti minimi (ADM)","D":"Palmaris longus (PL)","E":"Flexor digitorum profoundus (FDP) to ring finger"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"Opponensplasty donor:EIP、FDS、ADM(Huber)、PL(Camitz)皆可;FDP to ring非標準。","peropt":{"A":"EIP opponensplasty(Burkhalter)，可。","B":"FDS(Bunnell/Royle-Thompson)，可。","C":"ADM(Huber transfer)，可。","D":"PL(Camitz)，可。","E":"✗FDP to ring finger非標準donor。"},"cite":"Grabb and Smith's, 9th, Ch.92, Table.92.5","conflict":"⚠ 同題歷屆重出：opponensplasty可用donor tendon『複選』，四個正確donor(EIP、ADM、FDS、PL)恆相同；錯誤distractor由FPL(110/111年,1009,答ACDE)改為FDP to ring finger(112/113/114/115年,1030,答ABCD)；作答錨定該年選項。"},{"id":"1031","sub":"I","src":"GS","years":[112],"stem":"下面那一項構成Spiral cord的結構，若病變會造成Dupuytren contracture: (複選)","opts":{"A":"Pretendinous band","B":"Lateral digital sheet","C":"Grayson ligament","D":"Cleland ligament","E":"A1 pulley"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"Spiral cord由pretendinous band、spiral band、lateral digital sheet、Grayson's ligament構成→使NV bundle往內側/淺層移位。Cleland's ligament(在NV束背側)與A1 pulley非其組成。","peropt":{"A":"pretendinous band=構成。","B":"lateral digital sheet=構成。","C":"Grayson ligament=構成。","D":"✗Cleland ligament非(在NV束背側,不參與)。","E":"✗A1 pulley非。"},"cite":"Grabb and Smith's, 8th, Chap 85, p865","conflict":""},{"id":"1032","sub":"N","src":"GS","years":[112,113,114],"stem":"一位32歲女性3個月前左手拇指遠端因外傷且在急診接受composite graft治療。在門診時，左手拇指distal phalanx缺少1公分且近端表面由2公分皮膚graft附著在骨頭上。表面有4mm的指甲完整且指甲有hook nail deformity. 她希望拇指可以重建並回復外觀跟功能。以下何者是最好的重建選擇已達成目標?","opts":{"A":"Moberg advancement flap","B":"Germinal matrix ablation and first dorsal metacarpal artery flap","C":"Onychoosteocutaneous trimmed toe flap","D":"Second toe pulp flap","E":"Wrap-around toe-transfer"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 個案為拇指遠節缺損（distal phalanx 缺 1cm）合併 hook nail deformity，且病人要求同時恢復外觀與功能。Hook nail 的成因是遠節『骨性支撐不足』使甲床向掌側捲曲，故重建必須同時補回『指甲＋骨骼＋皮膚』三要素 → onycho-osteo-cutaneous (trimmed) toe flap 最理想。核心鑑別：Wrap-around 提供指甲與皮膚但『不含骨骼』，無法矯正因骨缺損導致的 hook nail；Moberg／pulp flap 只補軟組織。","peropt":{"A":"✗ Moberg volar advancement flap 僅推進掌側軟組織（約 1cm），不含指甲與骨骼重建，無法矯正 hook nail。","B":"✗ Germinal matrix ablation 會『去除指甲』，與病人希望恢復指甲外觀相違；FDMA flap 亦不提供骨骼。","C":"✓（正解）Onycho-osteo-cutaneous trimmed toe flap 一次提供指甲、骨骼與皮膚，同時矯正骨缺損與 hook nail 並恢復外觀功能。","D":"✗ Second toe pulp flap 僅提供指腹軟組織，無指甲與骨骼，無法解決 hook nail。","E":"✗ Wrap-around toe transfer 提供指甲與皮膚但缺乏骨骼支撐，無法重建 1cm 骨缺損所致的 hook nail。"},"cite":"待複查（GS 手外科 指端重建／toe transfer 記憶佐證）","conflict":""},{"id":"1033","sub":"L","src":"GS","years":[112,113,114],"stem":"一位70歲右手慣用手男性在使用桌鋸時意外造成midforearm level處左手上肢截肢。壓脈止血帶在現場馬上被使用，且斷肢被放入冰袋保存，且他被快速送往鄰近醫院。鄰近醫院因為沒有整形外科醫師，所以他被轉送至trauma center。他到達急診時，距離事發已經過6小時，經過一系列檢查後他馬上被送至開刀房。下列哪種技術可以防止持續性的systemic injury?","opts":{"A":"Skeletal fixation","B":"Microvascular anastomosis with vein grafts","C":"Microsurgical flap reconstruction","D":"Aggressive debridement","E":"Vascularized shunt"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 上肢大截肢且缺血時間長（6小時），重點在盡速恢復灌流以中斷持續性systemic injury（ischemia-reperfusion、myoglobinemia、hyperkalemia）。核心答案為Vascularized shunt（暫時性動脈分流），能於骨骼固定與正式血管重建前迅速再灌流，縮短缺血時間。易混淆：正式vein graft吻合耗時，骨骼固定/清創/皮瓣皆非『防止持續系統性傷害』之關鍵首步。","peropt":{"A":"✗ Skeletal fixation穩定骨骼但不恢復灌流，無法阻斷缺血造成的系統性傷害。","B":"✗ 靜脈移植顯微吻合為正式重建，耗時較長，非最快中斷缺血之手段。","C":"✗ Microsurgical flap屬後期軟組織重建，與即時系統性傷害無關。","D":"✗ 積極清創降低感染/壞死負荷，但非防止再灌流系統性傷害之技術。","E":"✓（正解）Temporary vascularized shunt迅速再灌流，縮短缺血時間、減少ischemia-reperfusion與代謝性系統傷害。"},"cite":"待複查（GS 大截肢／temporary shunt 記憶佐證）","conflict":""},{"id":"1034","sub":"P","src":"GS","years":[112],"stem":"一位30歲男性在受到輕傷後，右手食指有疼痛變形的症狀，X-ray 顯示近端指骨(proximal phalanx)有溶骨性病變(lytic lesion)，和病理性骨折(pathological fracture) 及 內生軟骨瘤(enchondroma)一致， 請問下一步處理為何?","opts":{"A":"安排全身骨骼掃描(Bone scan)來評估是否有多發性內生軟骨瘤(multiple enchondromatosis)","B":"立刻幫手指做內固定(internal fixation)來增加穩定度(stability)","C":"先做副木，之後再階段性的作切片(biopsy)、刮除(curettage), 及骨移植(bone graft)","D":"對手指做部分截肢(ray amputation)","E":"再行觀察"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"指骨enchondroma合併病理性骨折→先副木使骨折癒合,再分階段biopsy/curettage/bone graft。","peropt":{"A":"✗bone scan評估multiple enchondromatosis非首要下一步。","B":"✗急性期立即內固定非首選(病灶未處理)。","C":"✔答案:先副木癒合,再分階段刮除+植骨。","D":"✗ray amputation對良性病灶過度。","E":"✗已病理性骨折,單純觀察不足。"},"cite":"Grabb and Smith's, 8th, Chap 86","conflict":""},{"id":"1035","sub":"K","src":"GS","years":[112],"stem":"一位30歲女性因右手食指的遠端指骨劇烈疼痛數個月就診，她有注意到當手浸泡於冷水中疼痛會加劇，理學檢查顯示指甲下有深藍色病灶(dark-blue subungual lesion)合併有劇烈的局部疼痛，請問下列哪個診斷最有可能?","opts":{"A":"Melanoma","B":"Subungual hematoma","C":"Glomuvenous malformation","D":"Splinter hemorrhage","E":"RP"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 指甲下(subungual)深藍色病灶+遇冷加劇的劇烈局部疼痛+特定點壓痛，為 glomus 病變的典型三聯徵(classic triad：cold hypersensitivity、paroxysmal severe pain、point tenderness)。Glomus 源自調節體溫的 glomus body(neuromyoarterial)。與惡性黑色素瘤、血腫、線狀出血、雷諾現象的鑑別關鍵在於『定點劇痛+遇冷惡化+藍色 subungual 結節』。","peropt":{"A":"✗ Melanoma 為色素性、邊緣不規則病灶，非遇冷誘發之定點劇痛。","B":"✗ Subungual hematoma 多有外傷史，會隨指甲生長外移消退，非慢性遇冷劇痛。","C":"✓(正解) Glomuvenous malformation/glomus 病變：subungual 藍色病灶、cold hypersensitivity、劇烈定點痛，完全吻合。","D":"✗ Splinter hemorrhage 為線狀出血(外傷/心內膜炎相關)，通常無痛。","E":"✗ Raynaud phenomenon 為手指陣發性三相變色，非局部單一 subungual 結節。"},"cite":"待複查（GS glomus tumor 記憶佐證）","conflict":""},{"id":"1036","sub":"H","src":"GS","years":[112,113,114],"stem":"處理compartment syndrome需要完整了解 components and contents of each compartment，下列哪些muscles 位於forearm dorsal compartment ? (複選)","opts":{"A":"Extensor digitorum communis","B":"Brachioradialis","C":"Extensor carpi radialis longus","D":"Pronator teres","E":"Supinator"},"ans":"AE","multi":true,"etype":"ai","expl":"(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 89. P 895-896.)","key":"🎯 前臂 dorsal (extensor) compartment 的肌肉包含淺層伸肌群與深層伸肌群；Supinator 屬深層 dorsal compartment。核心鑑別：Brachioradialis 與 ECRL/ECRB 屬 mobile wad（獨立分隔）；Pronator teres 屬 volar (flexor-pronator) compartment。處理 compartment syndrome 時須分清各腔室內容以完整減壓。","peropt":{"A":"✓ Extensor digitorum communis 屬前臂 dorsal（伸肌）compartment。","B":"✗ Brachioradialis 屬 mobile wad，非 dorsal compartment。","C":"✗ Extensor carpi radialis longus 屬 mobile wad，非 dorsal compartment 本體。","D":"✗ Pronator teres 屬 volar（屈肌-旋前肌）compartment。","E":"✓ Supinator 位於深層 dorsal compartment。"},"cite":"原檔詳解","conflict":"⚠ 同題歷屆重出：前臂dorsal compartment肌肉『複選』題，正確為Extensor digitorum communis與Supinator。112/114年(1036)答AE、113年(1044)答AD(僅選項順序不同)；記概念不記字母。"},{"id":"1037","sub":"H","src":"GS","years":[112,113,114],"stem":"關於compartment syndrome之compartment pressure 的測量，數值高於多少為urgent fasciotomy的indication ? (單選)","opts":{"A":"10 mm Hg","B":"15 mm Hg","C":"30 mm Hg","D":"40 mm Hg","E":"50 mm Hg"},"ans":"C","multi":false,"etype":"ai","expl":"(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 89. P 900.)","key":"🎯 Compartment syndrome雖以臨床（6P、被動牽張劇痛）為主要診斷，但當意識不清無法評估時測compartment pressure。核心閾值：絕對壓力>30 mmHg即為urgent fasciotomy指標（本年GS 8e版）。⚠ 跨年注意：GS 113年版本以30為答案但選項字母不同，數值一致概念一致。","peropt":{"A":"✗ 10 mmHg屬正常範圍，非fasciotomy指標。","B":"✗ 15 mmHg仍偏低，未達手術閾值。","C":"✓（正解）>30 mmHg為urgent fasciotomy之絕對壓力指標（GS 8e）。","D":"✗ 40 mmHg過高，若等到此值恐延誤治療。","E":"✗ 50 mmHg更晚，非正確閾值。"},"cite":"原檔詳解（GS 8e Ch89, p.900）","conflict":"⚠ 同題歷屆重出：compartment syndrome urgent fasciotomy壓力閾值題，正確數值恆為30 mmHg。112/114年(1037)選項為10/15/30/40/50答C，113年(1041)選項改為10/15/25/30/50答D；作答錨定數值30 mmHg。"},{"id":"1038","sub":"L","src":"GS","years":[112,113,114,115],"stem":"根據Flatt classification system of thumb duplication，下列何種type最常見 ?","opts":{"A":"Type I Bifid distal phalanx","B":"Type II Duplicated distal phalanx","C":"Type III Bifid proximal phalanx","D":"Type IV Duplicated proximal phalanx","E":"Type V Bifid metacarpal"},"ans":"D","multi":false,"etype":"ai","expl":"(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 90. P 909-910.)","key":"Flatt(Wassel)拇指多指最常見為type IV(duplicated proximal phalanx)。","peropt":{"A":"type I非最常。","B":"type II非最常。","C":"type III非最常。","D":"✔答案:type IV最常見。","E":"type V非最常。"},"cite":"Grabb and Smith's, 8th, Ch 90, p909-910","conflict":""},{"id":"1039","sub":"J","src":"GS","years":[112],"stem":"Eaton proposed a radiographic classification of basal joint arthritis in 1973 that is still used today， 根據此classification，下列描述為非?","opts":{"A":"Type I : Joint space slightly widened without osteophytes, scapho-trapezial-trapezoid joint preserved.","B":"Type II : Joint space slightly widened with less than 2 mm osteophytes, scapho-trapezial-trapezoid joint preserved.","C":"Type III : Joint space significantly narrowed with more than 2 mm osteophytes, scapho-trapezial-trapezoid joint preserved.","D":"Type IV : Joint space significantly narrowed with more than 2 mm osteophytes, scapho-trapezial-trapezoid joint involved."},"ans":"B","multi":false,"etype":"ai","expl":"(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 93. P 940-941.)","key":"Eaton stage II為關節間隙『變窄』+<2mm骨刺;選項B誤寫為widened(stage I才是間隙略寬、無骨刺)。","peropt":{"A":"stage I:間隙略寬、無骨刺、STT preserved,正確。","B":"✔答案(為非):stage II應為間隙『變窄』(非widened)。","C":"stage III:間隙明顯窄+>2mm骨刺、STT preserved,正確。","D":"stage IV:STT joint involved,正確。"},"cite":"Grabb and Smith's, 8th, Chap 93, p940-941","conflict":""},{"id":"1040","sub":"J","src":"GS","years":[112],"stem":"下列何者為medical treatment of inflammatory arthropathies?","opts":{"A":"Corticosteroids","B":"Methotrexate","C":"Etanercept","D":"Adalimumab","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 92. P 929.)","key":"以上皆是:corticosteroids、methotrexate(DMARD)、etanercept/adalimumab(TNF抑制劑)皆為發炎性關節病藥物治療。","peropt":{"A":"corticosteroids=是。","B":"methotrexate=是。","C":"etanercept=是。","D":"adalimumab=是。","E":"✔以上皆是。"},"cite":"Grabb and Smith's, 8th, Chap 92, p929","conflict":""},{"id":"1045","sub":"F","src":"GS","years":[114,115],"stem":"Which of the following is not involved in the pathomechanics of a Boutonniere deformity?","opts":{"A":"Rupture of the central tendon over the PIP joint.","B":"Prolapse of the lateral band volar to the PIP joint axis","C":"Rupture of lateral band","D":"Hyperextension of DIP joint and flexion deformity of the PIP joint","E":"None of the above"},"ans":"C","multi":false,"etype":"ai","expl":"Development of boutonnière deformity.\nA. The central slip is disrupted from the base of the middle phalanx leading to all extensor forces being concentrated into the lateral bands.\nB. The lateral bands slip volarly and become flexors of the PIP joint and hyperextensors of the DIP joint.","key":"Boutonniere機制:PIP central slip斷裂→lateral bands往掌側(volar to PIP軸)滑移→PIP屈曲、DIP過伸。lateral band為『移位』非斷裂。","peropt":{"A":"central tendon(slip)在PIP斷裂=機制之一。","B":"lateral band往PIP軸掌側prolapse=機制之一。","C":"✔答案(不涉及)：lateral band『斷裂』非boutonniere機制(是移位非斷裂)。","D":"DIP過伸+PIP屈曲=典型表現。","E":"none of the above不選。"},"cite":"Grabb and Smith's, 9th, Ch.90 Fig. 90.5","conflict":""},{"id":"1046","sub":"G","src":"GS","years":[114],"stem":"All of the following contribute to the displacement of the 1st metacarpal shaft in Bennett's fracture except?","opts":{"A":"Flexor pollicis longus","B":"Abductor pollicis longus","C":"Adductor pollicis","D":"Extensor pollicis brevis","E":"All of the above are correct"},"ans":"A","multi":false,"etype":"ai","expl":"The metacarpal subluxates proximally, radially, and dorsally secondary to the pull of the abductor pollicis longus, extensor pollicis brevis, and adductor pollicis.","key":"🎯 Bennett fracture 為拇指第一掌骨基部之關節內骨折脫位；掌骨幹被 abductor pollicis longus (APL) 往近端、橈側、背側牽引，並受 adductor pollicis 與 EPB 影響而位移；掌尺側小骨塊由 anterior oblique（beak）ligament 固定。Flexor pollicis longus (FPL) 並非造成掌骨幹位移的變形力，故為『除外』選項。","peropt":{"A":"✓（正解＝不參與位移者）Flexor pollicis longus 非 Bennett 骨折掌骨幹位移的變形力。","B":"✗ Abductor pollicis longus 將掌骨幹往近端、橈側、背側牽引，是主要變形力。","C":"✗ Adductor pollicis 參與掌骨位移的變形力。","D":"✗ Extensor pollicis brevis 參與位移的變形力。","E":"✗ 並非全部皆為變形力（FPL 除外）。"},"cite":"原檔詳解","conflict":""},{"id":"1047","sub":"F","src":"GS","years":[114,115],"stem":"關於digital flexor sheath的敘述何者為正確? (複選)","opts":{"A":"可分為synovial sheath和condensed fibrous bands，前者為一種paratenon，可提供肌腱養分並形成一個平順的滑動介面","B":"每根手指(finger)有五個annular pulley和三個cruciate pulleys","C":"拇指(thumb)有三個pulley，分別為A1, oblique, and A2，並不像手指有cruciate pulley","D":"手指的A2和A4 pulley靠近指關節(PIPJ和DIPJ)，是annular pulley中較大且重要的部分，手術時盡量不要傷害","E":"FDS tendon的分岔位置約位於A2 pulley的中段"},"ans":"ABCE","multi":true,"etype":"ai","expl":"A2與A4 pulley各在近端與中段指節上，非在關節上","key":"🎯 Digital flexor sheath由synovial sheath（paratenon，供養並提供滑動介面）與condensed fibrous bands（pulleys）構成。手指有5個annular（A1–A5）+3個cruciate（C1–C3）pulley；拇指僅A1、oblique、A2（無cruciate）。核心易混淆：A2位於proximal phalanx、A4位於middle phalanx（皆在骨幹上而非關節上），為維持機械效益最重要、術中須保留者。FDS於A2中段分叉（Camper chiasm）。本題為複選『正確』者。","peropt":{"A":"✓ Synovial sheath屬paratenon，供養肌腱並形成平順滑動介面，敘述正確。","B":"✓ 每指5 annular＋3 cruciate pulley，正確。","C":"✓ 拇指僅A1、oblique、A2，無cruciate，正確。","D":"✗ A2、A4分別在proximal與middle phalanx『骨幹』上，非在PIPJ/DIPJ關節上；此為敘述錯誤，故不列入答案。","E":"✓ FDS於A2 pulley中段分叉（Camper chiasm），正確。"},"cite":"原檔詳解（A2/A4位於近端與中段指骨上，非在關節上）","conflict":""},{"id":"1048","sub":"F","src":"GS","years":[114],"stem":"關於上肢截肢後的復健與功能重建，下列敘述何者錯誤？","opts":{"A":"多專科團隊的合作是優化患者功能和減少疼痛的關鍵。","B":"患者的功能重建目標應優先考量美觀與社交適應，重返工作與休閒活動可作為次要目標。","C":"大多數上肢截肢患者最終會放棄使用義肢，原因常與舒適度及功能性不足有關。","D":"與下肢義肢不同，上肢義肢的主要功能是負責精細動作控制，而非強調承重能力，因此通常不具備承重設計。","E":"早期且適當的義肢適配有助於提高義肢的使用率。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"上肢功能重建應以重返工作/休閒等功能為首要;B將美觀社交列為優先、功能次要,次序顛倒。","peropt":{"A":"多專科合作為關鍵,正確。","B":"✔答案(錯):功能應優先,美觀社交非優先(次序顛倒)。","C":"多數上肢截肢者最終棄用義肢(舒適/功能不足),正確。","D":"上肢義肢重精細動作非承重,正確。","E":"早期適配提高使用率,正確。"},"cite":"Grabb and Smith's, 8th, Chapter 91, p916-921","conflict":""},{"id":"1049","sub":"Q","src":"GS","years":[114],"stem":"腕關節離斷術（wrist disarticulation）相較於經橈骨截肢（transradial amputation），下列敘述何者正確？","opts":{"A":"腕關節離斷術後更容易獲得較佳的義肢外觀。","B":"腕關節離斷術後有更多空間容納義肢組件。","C":"經橈骨截肢後由於保留了遠端橈尺關節，能維持前臂旋前旋後功能。","D":"對於打算穿戴義肢的單側截肢患者，腕關節離斷術後殘肢較短，導致功能性較差。","E":"經橈骨截肢是上肢最常見的截肢層級，且myodesis相較myoplasty能提 供更穩定的肌肉固定以利義肢控制。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Transradial為上肢最常見截肢層級,myodesis較myoplasty提供更穩定肌肉固定以利義肢控制。","peropt":{"A":"✗wrist disarticulation義肢外觀較差。","B":"✗容納義肢components空間較少(非較多)。","C":"✗wrist disarticulation保留較多旋前旋後(transradial較少)。","D":"✗wrist disarticulation殘肢較長(非較短)。","E":"✔答案:transradial最常見;myodesis較myoplasty穩定。"},"cite":"Grabb and Smith's, 8th, Chapter 91, p918-920","conflict":""},{"id":"1050","sub":"G","src":"GS","years":[115],"stem":"Which are the contribute to the displacement of the 1st metacarpal shaft in Bennett's fracture except?","opts":{"A":"Flexor pollicis longus and abductor pollicis longus","B":"Abductor pollicis longus and adductor pollicis","C":"Adductor pollicis and flexor pollicis longus","D":"Extensor pollicis brevis and flexor pollicis longus","E":"All of the above are incorrect"},"ans":"B","multi":false,"etype":"ai","expl":"Thumb metacarpal base fractures tend to be relatively unstable because of the strong attachments of the ulnar fragments to the index metacarpal by the volar beak ligament, the pull of the abductor pollicis longus on the base of radial fragment, and the adductor pollicis on the metacarpophalangeal joint","key":"🎯 Bennett's fracture 真正的移位力為 abductor pollicis longus(牽拉橈側骨片基部)與 adductor pollicis(作用於 MCP)，EPB 亦參與；FPL 不參與。本題以『成對』出題，唯一兩者皆為真正移位力的組合即 APL + adductor pollicis；其餘組合皆含 FPL(非移位力)。","peropt":{"A":"✗ 含 FPL(非移位力)，組合不成立。","B":"✓(正解) APL 與 adductor pollicis 皆為真正移位力。","C":"✗ 含 FPL(非移位力)。","D":"✗ 含 FPL；雖 EPB 為移位力，但 FPL 非，故組合不成立。","E":"✗ 不適用。"},"cite":"原檔詳解","conflict":""},{"id":"1051","sub":"E","src":"GS","years":[115],"stem":"Which is true about 4th degree of injury Sunderland?","opts":{"A":"Axonal rupture without interruption of the basal lamina tubes","B":"Rupture of both axons and basal lamina tubes, some scar","C":"Neuroma-in-continuity with complete scar block","D":"Complete transection","E":"Focal demyelination/conduction block"},"ans":"C","multi":false,"etype":"ai","expl":"Seddon (1943) and Sunderland's (1951) classifications of nerve injury remain the standard (Table 84.1).1 A Sunderland first-degree (Seddon neurapraxia) injury has demyelination without axonal injury and should recover completely. A second-degree (axonotmesis) injury has axonal loss with preservation of the basal laminar tubes, and thus, complete recovery is anticipated. A third-degree (axonotmesis) injury results in axonal loss with disruption of the basal laminar tubes and will have incomplete recovery. Fourth- and fifth-degree (neurotmesis) injuries represent neuroma-in-continuity and transection injuries, respectively","key":"🎯 Sunderland 分級：一度＝脫髓鞘/傳導阻斷（neurapraxia）可完全恢復；二度＝軸突斷裂但 basal lamina（endoneurium）完整（axonotmesis）；三度＝軸突＋endoneurium 斷裂、perineurium 完整，部分疤痕；四度＝軸突＋endoneurium＋perineurium 皆斷、僅 epineurium 完整→ neuroma-in-continuity 伴完全疤痕阻斷，需手術；五度＝完全橫斷（neurotmesis）。故四度＝C。","peropt":{"A":"✗ 軸突斷裂但 basal lamina 未中斷＝二度（axonotmesis）。","B":"✗ 軸突與 basal lamina 皆斷、部分疤痕＝三度。","C":"✓（正解）四度＝neuroma-in-continuity 伴完全疤痕阻斷（僅 epineurium 完整）。","D":"✗ 完全橫斷＝五度（neurotmesis）。","E":"✗ 局部脫髓鞘／傳導阻斷＝一度（neurapraxia）。"},"cite":"原檔詳解","conflict":""},{"id":"1052","sub":"G","src":"GS","years":[115],"stem":"Which of the following descriptions about \"Stener lesion\" is wrong ?","opts":{"A":"It occurs when the torn ulnar collateral ligament (UCL) becomes trapped superficial to the adductor pollicis aponeurosis.","B":"It is typically associated with a high-grade or complete rupture of the UCL at its distal insertion on the proximal phalanx.","C":"Conservative management with a thumb spica cast is the gold standard of treatment for a confirmed Stener lesion.","D":"The lesion acts as a mechanical barrier that prevents the ends of the torn ligament from reuniting, leading to chronic instability.","E":"On an ultrasound or MRI, the displaced ligament often resembles a \"yo-yo on a string\" appearance."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Stener lesion需『手術』;thumb spica cast非gold standard(斷端被aponeurosis阻隔無法癒合)。","peropt":{"A":"UCL斷端卡在adductor aponeurosis淺層，正確。","B":"高度/完全UCL斷裂於proximal phalanx遠端止點，正確。","C":"✔答案(錯)：Stener lesion須手術,cast非gold standard。","D":"為機械屏障阻止斷端癒合，正確。","E":"影像呈'yo-yo on a string'，正確。"},"cite":"Grabb and Smith's, 9th, Ch.93, Table.93","conflict":""},{"id":"1053","sub":"L","src":"GS","years":[115],"stem":"Regarding the surgical management and reconstructive principles for mutilated upper extremity injuries, which of the following statements is TRUE according to the clinical guidelines and author preferences provided in the text?","opts":{"A":"The Mangled Extremity Severity Score (MESS) serves as the primary gold standard for determining the necessity of upper limb amputation, with a score greater than 7 indicating a high likelihood of secondary amputation.","B":"In skeletal fixation of mutilated limbs, K-wire fixation is preferred over screw and plate constructs because it provides superior rigid stability for earlier mobilization despite causing more extensive soft-tissue stripping.","C":"For motor nerve reconstruction of gaps between 5 mm and 50 mm, processed nerve allografts have been shown to provide functional outcomes equivalent to autografts, whereas conduits are generally restricted to non-critical sensory gaps under 3 cm.","D":"The universally preferred timing for definitive soft-tissue coverage with a free flap is the \"Primary\" window (within 12 to 24 hours of injury) to ensure immediate protection of vital structures before tissue demarcation occurs.","E":"In a stable patient with suspected vascular injury, angiography is the preferred initial step and should take precedence over surgical exploration to accurately determine the nature and extent of the vessel damage."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"以上皆非為正確者:MESS非唯一標準、K-wire非提供最佳剛性、free flap最佳時機非12-24h、穩定病人不以angiography優先於探查;正確者為C(processed nerve allograft 5-50mm≈autograft、conduit限<3cm感覺)。","peropt":{"A":"✗MESS非唯一gold standard,>7 cutoff有爭議。","B":"✗K-wire非提供superior rigid stability(plate較穩)且剝離較少。","C":"✔答案:processed nerve allograft 5-50mm≈autograft;conduit限<3cm感覺缺損。","D":"✗free flap最佳時機非12-24h(Godina早期覆蓋~72h-7天)。","E":"✗穩定病人疑血管傷,探查優先於angiography。"},"cite":"Grabb and Smith's, 9th, Ch.95","conflict":""},{"id":"1054","sub":"H","src":"GS","years":[115],"stem":"關於Compartment syndrome，下列敘述何者錯誤？","opts":{"A":"臨床診斷6P為Pain with passive stretch, Paresthesia, Paralysis, Pulselessness, Pallor, Poikilothermia","B":"組織缺氧時，細胞離子幫浦失調會造成細胞質 (cytosolic)中鉀離子增加進而造成組織壞死。","C":"傷口暫時無法關起來時可以先使用負壓傷口治療 (NPWT)。","D":"於適當時間內接受Fasciotomy可以減少組織缺氧造成的傷害","E":"延遲治療可能會造成intrinsic tightness 或 thumb adduction contracture"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"缺氧離子幫浦失調造成細胞內『鈉/鈣』增加(非鉀),B敘述有誤。","peropt":{"A":"6P診斷,正確。","B":"✔答案(錯)：缺氧致細胞內鈉/鈣增加(非鉀)。","C":"NPWT暫時覆蓋,正確。","D":"適時fasciotomy減害,正確。","E":"延遲致intrinsic tightness/thumb adduction contracture,正確。"},"cite":"Grabb and Smith's, 9th, Ch 102, p.3454","conflict":""},{"id":"1055","sub":"Q","src":"GS","years":[115],"stem":"關於手部燙傷後使用pressure garment，下列敘述何者錯誤？","opts":{"A":"Garment 壓力建議落在24-28mmHg","B":"Garment須至少穿戴6個月","C":"每2-3個月需重新調整Garment鬆緊度","D":"Garment 的使用主要是作用於Wound healing stage 的Proliferation stage","E":"疤痕按摩及保濕有助於疤痕照護"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"壓力衣主要作用於remodeling/maturation期(非proliferation),D有誤。","peropt":{"A":"壓力24-28mmHg,正確。","B":"至少穿6個月,正確。","C":"每2-3月調整鬆緊,正確。","D":"✔答案(錯)：主要作用於remodeling/maturation期(非proliferation)。","E":"疤痕按摩+保濕,正確。"},"cite":"Grabb and Smith's, 9th, Ch 101, p3414","conflict":""},{"id":"1056","sub":"P","src":"GS","years":[115],"stem":"下列何者為最常見之手部原發性骨腫瘤 (Primary bone tumor)?","opts":{"A":"Enchondromas","B":"Osteosarcoma","C":"Osteoma","D":"Bone cyst","E":"Ewing Sarcoma"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Enchondroma為最常見手部原發性骨腫瘤。","peropt":{"A":"✔答案:enchondroma最常見。","B":"osteosarcoma非。","C":"osteoma非。","D":"bone cyst非。","E":"Ewing sarcoma非。"},"cite":"Grabb and Smith's, 9th, Ch 99, p3360","conflict":""},{"id":"1057","sub":"I","src":"GS","years":[115],"stem":"關於Dupuytren disease (DD)，下列敘述何者正確？(複選)","opts":{"A":"大部分的DD患者皆有嚴重的Finger flexion contracture問題。","B":"為一個遺傳性慢性纖維化導致Finger contracture的疾病","C":"若以Collagenase治療， MP joints 對治療的效果優於PIP joint.","D":"DD好發於食指及中指","E":"好發於有家族史的高齡女性"},"ans":"BC","multi":true,"etype":"ai","expl":"","key":"正確BC;好發環指/小指(非食指中指)、好發家族史高齡男性(非女性)、多數非嚴重contracture。","peropt":{"A":"✗非大部分皆嚴重contracture(多輕/漸進)。","B":"遺傳性慢性纖維化致finger contracture,正確。","C":"collagenase:MP joint療效優於PIP,正確。","D":"✗好發環指及小指(非食指中指)。","E":"✗好發有家族史高齡『男性』(非女性)。"},"cite":"Grabb and Smith's, 9th, Ch98","conflict":""},{"id":"1058","sub":"O","src":"GS","years":[115],"stem":"Flatt classification 對於thumb duplication分類：\n\nI. Bifid distal phalanx / II. Duplicated distal phalanx / III. Bifid proximal phalanx / IV. Duplicated proximal phalanx / V. Bifid metacarpal / VI. Duplicated metacarpal / VII. Triphalangism\n\n其盛行率由高至低排列何者正確？","opts":{"A":"I > VI > III > V > II","B":"IV > VII > II > V > I","C":"IV > I > VII > II > V","D":"IV > I > II > III > VI","E":"I > II > V > III > IV"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Flatt盛行率:IV > VII > II > V > I。","peropt":{"A":"順序有誤。","B":"✔答案:IV>VII>II>V>I。","C":"順序有誤。","D":"順序有誤。","E":"順序有誤。"},"cite":"Grabb and Smith's, 9th, Chapter 103, p. 1070-1071","conflict":""},{"id":"1059","sub":"J","src":"GS","years":[115],"stem":"關於Swan neck deformity以及Boutonnière deformity的成因及評估，下列敘述哪些正確？(複選)","opts":{"A":"Swan neck deformity只因PIP關節錯位而起，但Boutonnière deformity通常是因DIP,PIP,MCP關節處的肌腱不平衡而引起","B":"Swan neck deformity通常無法做出composite fist而需要治療，Boutonnière deformity則通常flexion正常但治療困難且難以預測療效","C":"Finochietto-Bunnell test是評估PIP motion with MCP in flexion and extension來測試是否有intrinsic tightness","D":"Swan neck deformity之Nalebuff分類Type II為DIP joint flexibility with intrinsic tightness","E":"Boutonnière deformity之分類Stage II為moderate PIP flexion deformity with lag greater than 40°"},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"正確BCE;A(swan neck成因過度簡化)、D(Nalebuff type II標示有誤)為錯。","peropt":{"A":"✗swan neck非只因PIP錯位(多因素:mallet/intrinsic tightness/FDS等)。","B":"swan neck常無法composite fist需治療;boutonniere治療難預測,正確。","C":"Finochietto-Bunnell test評估intrinsic tightness,正確。","D":"✗Nalebuff swan neck type II標示有誤(為PIP隨MCP位置變化,非DIP)。","E":"boutonniere stage II=moderate PIP flexion deformity(lag>40°),正確。"},"cite":"Grabb and Smith's, 9th, Chapter 105, p.940","conflict":""},{"id":"1060","sub":"P","src":"GS","years":[115],"stem":"45歲病人患有forearm ulnar shaft sarcoma，接受過術前電療後，預期手術切除10 cm長的ulnar bone。若病人希望能完成手術後準時於兩個月後舉行婚禮，則在此時效性下最佳的重建方式為：","opts":{"A":"無需重建骨缺損，forearm穩定度有radius即可","B":"放置抗生素骨水泥spacer做暫時性固定(provisional fixation)","C":"使用non-vascularized corticocancellous graft加上內固定","D":"使用無焊接且size配對的ulnar shaft異體骨移植(allograft)","E":"使用free vascularized bone transfer加上內固定"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"放療後、10cm ulna缺損、時效佳→free vascularized bone transfer+內固定為最佳。","peropt":{"A":"✗ulna缺損需重建(穩定/前臂旋轉),radius alone不足。","B":"✗cement spacer僅暫時。","C":"✗non-vascularized graft於10cm+放療床癒合差。","D":"✗allograft於放療床不癒合率高。","E":"✔答案:free vascularized bone transfer+內固定。"},"cite":"Grabb and Smith's, 9th, Chapter 107, p.1123","conflict":""},{"id":"1061","sub":"C","src":"NG","years":[104,107],"stem":"Compression neuropathy may induce varying degree of sensory-motor dysfunctions, which of the following is aligned in the correct order of severity (from mild to serious):","opts":{"A":"intermittent paresthesia persistent paresthesiaincreased sensory threshold anesthesia muscle wasting","B":"intermittent paresthesiaincreased sensory threshold persistent paresthesiaanesthesia  muscle wasting","C":"increased sensory threshold intermittent paresthesiapersistent paresthesiaanesthesia muscle wasting","D":"intermittent paresthesia persistent paresthesia increased sensory thresholdanesthesia  muscle wasting","E":"increased sensory thresholdintermittent paresthesia  persistent paresthesia muscle wasting anesthesia"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 Compression neuropathy由輕到重的順序：intermittent paresthesia → increased sensory threshold（單絲/2PD閾值上升）→ persistent paresthesia → anesthesia → muscle wasting（運動萎縮最晚）。核心概念：感覺閾值改變早於持續性麻木，運動功能喪失（肌肉萎縮）為最末期表現。","peropt":{"A":"✗ 將persistent paresthesia排在increased sensory threshold之前，順序錯誤。","B":"✓（正解）intermittent→increased threshold→persistent→anesthesia→muscle wasting，符合由輕至重。","C":"✗ 以increased sensory threshold為最輕起點錯誤，intermittent paresthesia才最早。","D":"✗ persistent paresthesia早於increased threshold，順序錯誤。","E":"✗ 將muscle wasting排在anesthesia之前，運動萎縮應為最末，錯誤。"},"cite":"待複查（NG 壓迫性神經病變分級 記憶佐證）","conflict":""},{"id":"1062","sub":"A","src":"NG","years":[104],"stem":"下列關於Kaplan's cardinal line，何者為非？","opts":{"A":"Emanuel Kaplan described specific surface lines in locating key structures in the palm of the hand.","B":"Kaplan's cardinal line is drawn from the apex of the first web space to the distal edge of the pisiform bone.","C":"The intersection with longitudinal line from the u ,建議查證)。","E":"BPI+Volkmann's→functioning free muscle transplant，正確。"},"cite":"Neligan Volume 6, p798-802","conflict":""},{"id":"1086","sub":"M","src":"NG","years":[104,107,115],"stem":"下列關於上肢移植(upper limb allotransplantation)術後排斥現象(rejection)的敘述何者錯誤？","opts":{"A":"肌肉是排斥反應最主要的目標，因此觀察移植肢體的運動功能是最重要的臨床監測項目","B":"術後一年內若移植肢體皮膚出現疑似排斥反應，則應進行皮膚切片檢查","C":"Banff classification是評估急性排斥反應(acute rejection)的分類法，最嚴重為grade IV","D":"臨床急性排斥的表現包括皮膚水腫(edema). 紅斑(erythema)及掌面脫屑(palmar scaling)等","E":"慢性排斥反應的組織學檢查可見到血管內膜增生(intima hyperplasia). 肌肉或組織纖維化(fibrosis)等"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"皮膚(非肌肉)是排斥主要標的;以觀察皮膚(非運動功能)監測最重要。","peropt":{"A":"✔答案(錯)：皮膚(非肌肉)是排斥主要標的;監測皮膚(非運動功能)最重要。","B":"一年內皮膚疑似排斥→皮膚切片，正確。","C":"Banff分類評估急性排斥、最重grade IV，正確。","D":"急性排斥:edema、erythema、掌面脫屑，正確。","E":"慢性排斥:intimal hyperplasia、fibrosis，正確。"},"cite":"Neligan 5th ed., Vol. 6, Ch 41（Upper extremity composite","conflict":""},{"id":"1087","sub":"G","src":"NG","years":[104,110,112,114,115],"stem":"關於小兒骨頭生長板傷害(physeal injuries)的敘述何者錯誤？","opts":{"A":"創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染. 腫瘤及輻射線暴露等也會影響骨頭生長","B":"Salter-Harris classification是最為廣泛使用的分類法","C":"Peterson type VI是開放性傷害伴隨有生長板的損失(loss of the physis)，相當於Salter-Harris type V","D":"Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign","E":"Salter-Harris type III & IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Peterson type VI(生長板部分損失)『非』等同Salter-Harris V(SH V為crush injury);C敘述有誤。","peropt":{"A":"創傷最常見+感染/腫瘤/輻射，正確。","B":"Salter-Harris最廣泛使用，正確。","C":"✔答案(錯)：Peterson VI非等同SH V。","D":"SH II最常見+Thurston-Holland sign，正確。","E":"SH III/IV牽涉germinal layer+關節面，正確。"},"cite":"Neligan Volume 6, p654-655","conflict":""},{"id":"1088","sub":"K","src":"NG","years":[104,114],"stem":"下列關於上肢infantile hemangioma(IH)的敘述何者正確？","opts":{"A":"IH約在兩週大時開始出現，前九個月內為proliferating phase生長迅速","B":"90%的病患靠病史詢問及理學檢查就能確診","C":"切片檢查對於診斷通常不太需要，其中對於GLUT1(a glucose transporter)的免疫染色可提供鑑別診斷","D":"治療以觀察為主，但若出現嚴重傷口問題或病灶過大引起功能障礙則考慮手術治療","E":"以上皆正確"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"以上皆正確(IH~2週出現、90%臨床診斷、GLUT1染色鑑別、以觀察為主嚴重才手術)。","peropt":{"A":"IH~2週出現,前9月proliferating，正確。","B":"90%靠病史+理學診斷，正確。","C":"切片少需要,GLUT1染色鑑別，正確。","D":"以觀察為主,嚴重才手術，正確。","E":"✔以上皆正確。"},"cite":"Neligan Volume 6, p672-673","conflict":""},{"id":"1089","sub":"O","src":"NG","years":[104],"stem":"下列關於多指(polydactyly)的敘述何者正確？","opts":{"A":"尺側多指(ulnar polydactyly)多單獨發生，而橈側多指(radial polydactyly)與症候群的關連性較高","B":"Wassel classification是常用的橈側多指分類法，其中最常見的是type IV，約佔50%","C":"中央性多指(central polydactyly)中，發生率由高到低依序為無名指. 中指. 食指","D":"橈側多指的重建原則為利用兩指重建出一個拇指，而非單純切除其中一指","E":"典型的鏡像手(mirror hand)是患者前臂由兩根橈骨構成並缺少尺骨，通常有7-8根手指，手部的橈側和尺側外觀互為鏡像"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"正確BCD;E(mirror hand)應為『兩根尺骨、缺橈骨』(ulnar dimelia),此敘述說反。A之radial/ulnar polydactyly與syndrome關連此版判有誤。","peropt":{"A":"✗此版判有誤(radial/ulnar polydactyly與syndrome關連敘述)。","B":"Wassel type IV最常見(~50%)，正確。","C":"central polydactyly發生率無名>中>食，正確。","D":"radial polydactyly以兩指重建一拇指，正確。","E":"✗mirror hand為兩根尺骨、缺橈骨(此敘述說反)。"},"cite":"Neligan Volume 6, p616-619","conflict":""},{"id":"1090","sub":"E","src":"NG","years":[104],"stem":"下列關於神經損傷修復的敘述何者正確？","opts":{"A":"神經斷端受損壞死的組織盡量不要切除，以免無法直接縫合","B":"神經縫合時縫越多針越好，以免神經纖維露出形成神經瘤","C":"epineural repair是常用且有效的縫合法，但必須注意神經束是否正確吻合(fascicular match)","D":"纖維蛋白膠(fibrin glue)對於神經縫合完全沒有幫助","E":"fascicular repair適合用在感覺和運動神經束有明顯區隔的情形下，例如在手腕處的尺神經"},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"正確CE;斷端壞死組織應切除、縫合非越多針越好、fibrin glue有輔助。","peropt":{"A":"✗神經斷端壞死組織應切除。","B":"✗縫合非越多針越好(過多增加損傷)。","C":"epineural repair常用有效,須注意fascicular match，正確。","D":"✗fibrin glue對神經縫合有輔助(非完全沒幫助)。","E":"fascicular repair適合感覺/運動束分明處(如手腕尺神經)，正確。"},"cite":"Neligan Volume 6, p704-707","conflict":""},{"id":"1091","sub":"C","src":"NG","years":[104],"stem":"下列關於利用肌腱轉移(tendon transfer)治療radial nerve palsy的敘述何者正確？","opts":{"A":"手指無法伸展(extension)和拇指無法伸展及外展(abduction)為radial nerve palsy的表現","B":"Pronator teres(PT)通常轉移到extensor pollicis longus(EPL)以提供拇指伸展","C":"Rad
