n's nodes為臨床表現，非手術適應症。", "C": "PIP OA arthrodesis/arthroplasty，正確。", "D": "✔答案(錯)：Eaton為影像分期;Burton/Eaton敘述顛倒。", "E": "CMC手術early/late目標，正確。"}, "src": "NG", "sub": "J"}, {"id": "NG110-19", "stem": "下列關於hypoplastic thumb的敘述，何者正確？(複選)", "opts": {"A": "Type I一般只需要使用local flap，進行first webspace widening即可。", "B": "Type II的thenar musculature發育不佳且合併adduction contracture及metacarpal–phalangeal (MP) joint laxity。", "C": "Type III依據carpometacarpal joint是否穩定分為IIIA和IIIB。", "D": "Type IV及type V的手術方式首選為index finger pollicization。", "E": "Type V稱為pouce flottant。"}, "ans": "BCD", "multi": true, "years": ["109", "110"], "cite": "Neligan chapter 27, page 576,593,598,607", "conflict": "選項改寫/重排家族(跨年)：本列=BCD；另有 ABCD(114)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "⚠此題答案與NG114版分歧:本版=BCD、NG114版=ABCD。差在A『Type I只需local flap做webspace widening』——Type I多半不需治療/webspace widening較屬Type II，本版判A誤。另E『Type V=pouce flottant』有誤(floating thumb為Type IV)。建議查證。", "peropt": {"A": "⚠Type I多半不需治療;webspace widening較屬Type II(NG114版判此為真，本版判誤)。", "B": "Type II thenar發育不良+adduction contracture+MP laxity，正確。", "C": "Type III依CMC穩定分IIIA/IIIB，正確。", "D": "Type IV/V首選pollicization，正確。", "E": "✗pouce flottant(floating thumb)為Type IV(非V)，此敘述誤。"}, "src": "NG", "sub": "N"}, {"id": "NG110-20", "stem": "下列有關手部常見腫瘤敘述，何者正確？(複選)", "opts": {"A": "皮膚良性腫瘤包含cutaneous horns及verruca vulgaris。前者一般建議先incisional biopsy；後者通常一至二年內會spontaneous resolution，但也有malignant transformation的病例。", "B": "Glomus tumors通常位於subungual。症狀的classic triad為cold hypersensitivity、persistent severe pain、point tenderness。MRI檢查會看見high-signal-intensity lesion。", "C": "Keratoacanthoma和squamous cell carcinoma很像，但是前者的生長速度較快且central necrosis更明顯。", "D": "Ganglion cysts為上肢最常見的軟組織腫瘤，60-70%位於dorsal carpal region，源自scapholunate interosseous ligament。Giant cell tumors則是第二常見的軟組織腫瘤，常見於掌側(volar aspect)。", "E": "Chondrosarcoma則是手部最常見的primary malignant tumor，常見於小於30歲的年輕人。"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan Vol 6, Chapter 22", "conflict": "選項改寫/重排家族(跨年)：本列=E；另有 ABDE(113), CD(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "⚠正解E:Chondrosarcoma為手部最常見原發惡性『骨』腫瘤。惟選項E附註『<30歲』有爭議(chondrosarcoma多見於40-70歲);建議對照原文。", "peropt": {"A": "✗cutaneous horns建議excisional(非incisional)。", "B": "✗Glomus triad為intermittent severe pain(非persistent)。", "C": "✗此版判非正解(keratoacanthoma敘述雖大致正確,但單選E)。", "D": "✗此版判非正解。", "E": "✔答案:Chondrosarcoma為手部最常見原發惡性骨腫瘤(⚠附註年齡<30歲有爭議)。"}, "src": "NG", "sub": "P"}, {"id": "NG110-21", "stem": "關於free functioning muscle transfer在上肢的重建，下列敘述何者錯誤?", "opts": {"A": "手術前關節要能夠full passive movement", "B": "Gracilis muscle是最常被使用的一塊肌肉皮瓣", "C": "在預計轉的部位上，必須有足夠的soft tissue coverage，否則連同soft tissue reconstruction要一起進行", "D": "在donor nerve的選擇上，若要重建long finger flexor function，會接到posterior interosseous nerve", "E": "Inadequate power and adhesion屬於late complication of free functioning muscle transfer"}, "ans": "D", "multi": false, "years": ["110"], "cite": "Neligan Volume 6, chap 35, p803,805,806,810", "conflict": "", "etype": "ai", "expl": "", "key": "重建finger flexion的motor nerve並非PIN;PIN用於finger『extension』。", "peropt": {"A": "術前需full passive movement，正確。", "B": "gracilis最常用，正確。", "C": "需足夠soft tissue coverage，正確。", "D": "✔答案(錯)：PIN用於finger extension;重建flexion應接他神經。", "E": "inadequate power/adhesion為late complication，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG110-23", "stem": "關於vascular malformation的敘述，下列何者正確?", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Arteriovenous malformation的治療方式包括embolization, surgical resection or combination", "D": "Sclerotherapy可以用來治療macrocystic lymphatic malformation", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan Volume 6, chap 31, p696,697,699,708,711", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(Sturge-Weber/KTS/AVM治療/macrocystic LM sclerotherapy)。", "peropt": {"A": "Sturge-Weber CM in CN V，正確。", "B": "KTS slow-flow CLVM，正確。", "C": "AVM embolization/resection/combo，正確。", "D": "sclerotherapy治macrocystic LM，正確。", "E": "✔以上皆是。"}, "src": "NG", "sub": "K"}, {"id": "NG110-25", "stem": "當radial nerve palsy時，通常使用哪一條tendon transfer到ECRB來使wrist extension?", "opts": {"A": "Flexor carpi radialis", "B": "Flexor carpi ulnaris", "C": "Flexor digitorum superficialis of ring finger", "D": "Flexor digitorum superficialis of middle finger", "E": "Pronator teres"}, "ans": "E", "multi": false, "years": ["108", "109", "110"], "cite": "Neligan Volume 6, chap 34, p770", "conflict": "", "etype": "ai", "expl": "", "key": "Radial nerve palsy標準轉位:Pronator teres→ECRB(恢復wrist extension)。", "peropt": {"A": "FCR非此用途。", "B": "FCU非此用途。", "C": "FDS(ring)用於其他轉位。", "D": "FDS(middle)非此用途。", "E": "✔答案:PT→ECRB(標準組:PT→ECRB、FCR/FCU→EDC、PL→EPL)。"}, "src": "NG", "sub": "C"}, {"id": "NG110-26", "stem": "關於upper limb allotransplantation術後排斥現象的敘述何者錯誤 ?", "opts": {"A": "急性排斥是接受者的T-cell或antibody所引發的免疫反應", "B": "皮膚是排斥反應最主要的目標，因此觀察皮膚的變化是最重要的臨床監測項目", "C": "移植術後一年內應該常規或是有臨床表現時接受切片檢查", "D": "急性排斥的嚴重程度是依照Banff classification做分類", "E": "急性排斥在顯微鏡下的表現包括intimal hyperplasia and sub-intimal foamy histiocytes in the vessels of the skin, or muscle and tissue fibrosis"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan Volume 6, chap 38, p873", "conflict": "", "etype": "ai", "expl": "", "key": "選項E描述的是『慢性』排斥(intimal hyperplasia/foamy histiocytes/fibrosis)，非急性。", "peropt": {"A": "acute rejection=T-cell/antibody，正確。", "B": "皮膚為主要標的、監測皮膚最重要，正確。", "C": "一年內常規/有表現時切片，正確。", "D": "Banff分類，正確。", "E": "✔答案(錯)：此為慢性排斥表現(非急性)。"}, "src": "NG", "sub": "M"}, {"id": "NG110-28", "stem": "關於brachial plexus injuries，下列敘述何者正確? (複選)", "opts": {"A": "Chuang's classification將其分成四個level: Level I: preganglionic root；Level II: postganglionic spinal nerve；Level III: pre- and retro-clavicular, Level IV: infraclavicular，其中最常見的是Level I", "B": "Hoffman-Tinel's sign是評估受傷神經再生位置的一個重要clinical sign", "C": "針對adult closed BPI，多數建議要early exploration", "D": "MRI為主要評估BPI的影像工具", "E": "Level IV injury有很高的機率合併有血管受傷"}, "ans": "ABDE", "multi": true, "years": ["110"], "cite": "Neligan Volume 6, chap 36, p815,818,820,821,832", "conflict": "", "etype": "ai", "expl": "", "key": "正確為ABDE:adult closed BPI多數『不』建議早期探查(觀察等待較佳)。", "peropt": {"A": "Chuang四級、最常Level I(70%)，正確。", "B": "Hoffman-Tinel's sign，正確。", "C": "✗多數不建議adult closed BPI早期探查。", "D": "MRI為主要影像，正確。", "E": "Level IV高機率合併血管傷(~30%)，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG110-29", "stem": "關於congenital hand anomalies，下列敘述何者正確? (複選)", "opts": {"A": "在Ulnar polydactyly中，最常見的分類方式是Wassel classification", "B": "Greig syndrome跟combined polydactyly有一定程度相關，且容易併發ocular hypertelorism及macrocephaly", "C": "Camptodactyly is a contracture of the PIPJ in the anteroposterior direction", "D": "Triphalangeal thumb發生率約1/25000，好發單側且多數沒有family history", "E": "Clinodactyly is reserved for radio-ulnar deviations in the hand and lateromedial deviations in the foot"}, "ans": "BCE", "multi": true, "years": ["110"], "cite": "Neligan Volume 6, chap 28, p638,645,650,651", "conflict": "", "etype": "ai", "expl": "", "key": "正確為BCE:Wassel用於radial(拇指)polydactyly非ulnar;Triphalangeal thumb多為AD、常雙側/有家族史。", "peropt": {"A": "✗Wassel用於radial polydactyly(非ulnar)。", "B": "Greig syndrome+combined polydactyly、hypertelorism/macrocephaly，正確。", "C": "Camptodactyly=PIPJ屈曲攣縮，正確。", "D": "✗Triphalangeal thumb常AD、常雙側、多有家族史。", "E": "Clinodactyly=手部radio-ulnar偏斜，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG110-30", "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "又稱為acrocephalosyndactyly syndrome", "B": "在craniofacial方面, 可能會有premature closure of coronal and lamboid sutures of skull, and midface hypoplasia", "C": "小孩子通常會有impaired language development and motor skills", "D": "可能造成obstructive sleep apnea", "E": "在下肢方面, 雙腳會有simple and complete syndactyly"}, "ans": "ABCDE", "multi": true, "years": ["108", "110"], "cite": "Neligan Volume 6, chap 28", "conflict": "選項改寫/重排家族(跨年)：本列=ABCDE；另有 BCDE(113), ACDE(109/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "以上皆正確(acrocephalosyndactyly、coronal synostosis+midface hypoplasia、發展遲緩、OSA、下肢併指)。", "peropt": {"A": "acrocephalosyndactyly，正確。", "B": "coronal suture premature closure+midface hypoplasia，正確。", "C": "impaired language/motor，正確。", "D": "OSA，正確。", "E": "下肢雙腳simple and complete syndactyly，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG109-1", "stem": "關於手部檢查，下列何者為錯", "opts": {"A": "Eichoff test: The patient is asked to hold the thumb with the four flexed fingers of the affected hand. The hand is deviated ulnarly by the examiner. This is to detect de Quervain's tendinitis.", "B": "Phalen's test: The patient's wrist is held in maximum palmar flexion for up to 2 minutes. This test is used as a provocative test specific to carpal tunnel syndrome.", "C": "Froment's test: The patient is asked to hold a piece of paper between the ulnar tip of the thumb and the radial tip of the index fingers. This is to assess the motor function of the ulnar nerve.", "D": "Wartenberg's sign: The patient is asked to keep the fingers adducted with the MP, PIP and DIP joints fully extended. This is to assess the motor function of the ulnar nerve.", "E": "Jeanne's test: The patient places the hand on a table with the thumb up. The examiner pushes down on the proximal phalanx of the thumb. This is to detect de Quervain's tendinitis."}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap2. P58.", "conflict": "", "etype": "ai", "expl": "", "key": "Jeanne's test/sign評估『拇指內收無力』(尺神經)，非de Quervain。", "peropt": {"A": "Eichoff test檢測de Quervain，正確。", "B": "Phalen's test檢測CTS，正確。", "C": "Froment's test評估尺神經運動，正確。", "D": "Wartenberg's sign評估尺神經，正確。", "E": "✔答案(錯)：Jeanne's評估拇指內收無力(尺神經)，非de Quervain。"}, "src": "NG", "sub": "C"}, {"id": "NG109-2", "stem": "關於手部構造，下列何者為錯", "opts": {"A": "The intersection of the Kaplan's cardinal line and the longitudinal line from the ulnar side of the middle finger corresponds to the motor branch of the median nerve.", "B": "The thumb and its metacarpal with a wide range of motion at the carpometacarpal joint. Five intrinsic muscles and four extrinsic muscles are specifically influential on thumb positioning and activity.", "C": "The proximal scaphoid is poorly vascularized and is susceptible to nonunion after proximal pole fracture.", "D": "The components of the digital fascia that help to anchor the axial plane skin are Grayson's ligaments dorsal to the neurovascular bundles and Cleland's ligaments palmar to the bundles.", "E": "Check rein ligaments are abnormal structures that are found only after fibrosis of the proximal interphalangeal joint occurs."}, "ans": "D", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap1. P5.", "conflict": "", "etype": "ai", "expl": "", "key": "Grayson's ligaments在NV bundle『掌側』、Cleland's在『背側』;此敘述顛倒。", "peropt": {"A": "Kaplan line交點=median motor branch，正確。", "B": "拇指5內在肌/4外在肌，正確。", "C": "proximal scaphoid血供差→nonunion，正確。", "D": "✔答案(錯)：Grayson's在掌側、Cleland's在背側(此敘述顛倒)。", "E": "checkrein ligament纖維化後PIP出現，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG109-3", "stem": "關於臂神經叢regional block，下列何種方式相對適用於有pulmonary disease或是coagulopathy的病人", "opts": {"A": "Interscalene block", "B": "Supraclavicular block", "C": "Infraclavicular block", "D": "Axillary block", "E": "All of above"}, "ans": "D", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap4. P100.", "conflict": "", "etype": "ai", "expl": "", "key": "Axillary block最適合pulmonary disease/coagulopathy(避免氣胸與膈神經麻痹)。", "peropt": {"A": "interscalene有膈神經麻痹風險。", "B": "supraclavicular有氣胸風險。", "C": "infraclavicular亦有風險。", "D": "✔答案:axillary block最適合。", "E": "非全部。"}, "src": "NG", "sub": "D"}, {"id": "NG109-4", "stem": "關於Nail and fingertip reconstruction，下列何者為錯", "opts": {"A": "甲床縫合時應避免過大的張力。", "B": "受傷後的nail deformity，建議要等至少8-12個月後再行評估重建。", "C": "即使手指傷口只有一公分，使用皮瓣重建傷口會比secondary intention獲得更多好處，如形狀與感覺的恢復。", "D": "使用defatted composite graft覆蓋傷口，小於十歲的兒童成功率會比成人高。", "E": "Atasoy flap，Kutler flap 與 visor flap都是常用於fingertip重建。"}, "ans": "C", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap6. P128.", "conflict": "選項改寫/重排家族(跨年)：本列=C；另有 E(112/114/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "小傷口(~1cm)以secondary intention癒合即可，未必需皮瓣。", "peropt": {"A": "甲床縫合避免張力，正確。", "B": "nail deformity等8-12月再評估，正確。", "C": "✔答案(錯)：小傷口secondary intention即可，皮瓣非必然更佳。", "D": "<10歲composite graft成功率較高，正確。", "E": "Atasoy/Kutler/visor flap，正確。"}, "src": "NG", "sub": "Q"}, {"id": "NG109-5", "stem": "關於手部骨折，下列何者為錯？", "opts": {"A": "指骨與掌骨是上肢骨折中比例最高的，指骨與掌骨骨折占全身所有骨折百分之十。", "B": "對於生長板還沒關閉的小兒骨折，K-wire穿過生長板是絕對禁止，因為可能會造成生長板提早關閉。", "C": "生長板骨折在Salter–Harris classification 中，type II是最常見的。", "D": "PIP joint fracture, 若middle phalangeal base於關節面受損比例小於百分之三十，可以不用手術治療。", "E": "關於Bennett fracture，Bennett fragment由於anterior oblique ligament會留在原處，而剩餘的metacarpal由於APL及adductor pollicis muscles的作用下，會造成橈側背側近側脫位。"}, "ans": "B", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap7. P139.", "conflict": "", "etype": "ai", "expl": "", "key": "光滑K-wire穿越生長板可接受(生長干擾極小)，非絕對禁忌。", "peropt": {"A": "指掌骨骨折佔全身~10%，正確。", "B": "✔答案(錯)：smooth K-wire可穿越生長板，非絕對禁忌。", "C": "SH type II最常見，正確。", "D": "PIP<30%關節面可保守，正確。", "E": "Bennett fracture機制，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG109-7", "stem": "關於Replantation手術，以下哪種狀況是\"absolute\" contraindication?", "opts": {"A": "Poor anesthesia risk", "B": "Multiple segmental injury in the amputated part", "C": "Intolerant sick patient", "D": "Prolonged warm ischemia time", "E": "Extreme contamination"}, "ans": "C", "multi": false, "years": ["109"], "cite": "Neligan Vol 6. Chap11. P249", "conflict": "", "etype": "ai", "expl": "", "key": "無法耐受手術的全身重病患(危及生命)=絕對禁忌;其餘多為相對禁忌。", "peropt": {"A": "poor anesthesia risk=相對。", "B": "multiple segmental injury=相對。", "C": "✔答案:intolerant重病患=絕對禁忌。", "D": "prolonged warm ischemia=相對。", "E": "extreme contamination=相對。"}, "src": "NG", "sub": "L"}, {"id": "NG109-8", "stem": "關於Thumb reconstruction，以下哪些敘述是正確的 ? (複選)", "opts": {"A": "Middle third (1/3) loss 的主要目標在restoration of length", "B": "Distal third (1/3) loss 的主要目標在soft tissue restoration", "C": "Proximal third (1/3) 重建主要以microsurgery為主", "D": "Mobility, stability, sensibility, length, appearance 都是重建必要的考量", "E": "Moberg flap 常用於重建 dorsal middle third(1/3) defect"}, "ans": "ABCD", "multi": true, "years": ["109"], "cite": "Neligan Vol 6. Chap13. P303-305.", "conflict": "選項改寫/重排家族(跨年)：本列=ABCD；另有 ACDE(112/113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Moberg flap用於拇指『掌側(volar)』缺損，非dorsal。", "peropt": {"A": "middle 1/3 loss→restore length，正確。", "B": "distal 1/3→soft tissue，正確。", "C": "proximal 1/3→microsurgery，正確。", "D": "重建考量mobility/stability/sensibility/length/appearance，正確。", "E": "✗Moberg flap用於掌側缺損(非dorsal)。"}, "src": "NG", "sub": "N"}, {"id": "NG109-10", "stem": "以下哪些方法適用於Thumb reconstruction? (複選)", "opts": {"A": "Great toe transfer", "B": "Second toe transfer", "C": "Trimmed great toe", "D": "Wrap-around flaps", "E": "Partial great toe"}, "ans": "ABCDE", "multi": true, "years": ["109"], "cite": "Neligan Vol 6. Chap14. P318.", "conflict": "", "etype": "ai", "expl": "", "key": "拇指重建的toe-based選項:great toe/second toe/trimmed great toe/wrap-around/partial great toe皆可。", "peropt": {"A": "great toe transfer，正確。", "B": "second toe transfer，正確。", "C": "trimmed great toe，正確。", "D": "wrap-around flap，正確。", "E": "partial great toe，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG109-11", "stem": "下列有關手部常見腫瘤敘述，何者正確？(複選)", "opts": {"A": "皮膚良性腫瘤包含cutaneous horns及verruca vulgaris。前者一般建議先incisional biopsy；後者通常一至二年內會spontaneous resolution，但也有malignant transformation的病例。", "B": "Glomus tumors通常位於subungual。症狀的classic triad為cold hypersensitivity、persistent severe pain、point tenderness。MRI檢查會看見high-signal-intensity lesion。", "C": "Keratoacanthoma和squamous cell carcinoma很像，但是前者的生長速度較快且central necrosis更明顯。", "D": "Ganglion cysts為上肢最常見的軟組織腫瘤，60-70%位於dorsal carpal region，源自scapholunate interosseous ligament。Giant cell tumors則是第二常見的軟組織腫瘤，常見於掌側(volar aspect)。", "E": "Chondrosarcoma則是手部最常見的primary malignant tumor，常見於小於30歲的年輕人。"}, "ans": "CD", "multi": true, "years": ["109"], "cite": "Neligan chapter 15, page 337-352", "conflict": "選項改寫/重排家族(跨年)：本列=CD；另有 ABDE(113), E(110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確為CD:Keratoacanthoma生長快/central necrosis;Ganglion最常見軟組織腫瘤、GCT第二。", "peropt": {"A": "✗cutaneous horns建議excisional biopsy(非incisional)。", "B": "✗Glomus triad為『間歇』嚴重疼痛(非persistent)。", "C": "Keratoacanthoma生長快、central necrosis明顯，正確。", "D": "Ganglion最常見(dorsal carpal、源自SL ligament);GCT第二常見(掌側)，正確。", "E": "✗Chondrosarcoma好發於年長者(非<30歲)。"}, "src": "NG", "sub": "P"}, {"id": "NG109-12", "stem": "下列關於手部感染之敘述，何者正確？", "opts": {"A": "Eponychial marsupialization為acute paronychia的手術治療方式。", "B": "Herpetic whitlow常由HSV-1或HSV-2引起，症狀為疼痛或tingling sensation、紅腫，7-10天後會出現grouped vesicles。通常三週內會自行緩解。", "C": "Felon為subcutaneous pulp space的感染，通常初期症狀侷限於distal interphalangeal flexion crease遠端，大部份不需手術治療。", "D": "Pyogenic flexor tenosynovitis主要症狀包含tendon sheath course疼痛、手指維持flexed posture、手指passive extension時劇烈疼痛、手指呈fusiform swelling。", "E": "手部有多個potential deep spaces，其中第一至二個interdigital web spaces的感染稱為collar button abscess。"}, "ans": "B", "multi": false, "years": ["109"], "cite": "Neligan chapter 16, page 359-362", "conflict": "", "etype": "ai", "expl": "", "key": "⚠Herpetic whitlow(B)為明確正解(HSV、grouped vesicles、~3週自限)。惟D(Kanavel徵)與E(collar button abscess=web space感染)敘述本身多屬正確，此題keyed單選B，建議對照原文確認。", "peropt": {"A": "✗eponychial marsupialization為chronic(非acute)paronychia手術。", "B": "✔答案(對)：Herpetic whitlow由HSV引起、grouped vesicles、約3週自限。", "C": "✗Felon多需切開引流(非不需手術)。", "D": "⚠Kanavel四徵敘述大致正確;但此題keyed單選B。", "E": "⚠collar button abscess=web space感染，概念正確;此題keyed單選B。"}, "src": "NG", "sub": "B"}, {"id": "NG109-13", "stem": "下列關於Dupuytren's disease之敘述，何者錯誤？", "opts": {"A": "Spiral cord會造成neurovascular bundle往內往淺移動，central cord則會造成DIP joint flexion contracture。", "B": "最早出現的症狀為手掌dimpling以及distal palmar crease distortion (Hugh Johnson sign)。最常發生於無名指，第二為小指。", "C": "位於PIP joint背側的knuckle pads稱為Garrod's nodules。", "D": "手術適應症為MCP joint contracture 30°及任何程度的PIP joint contracture。相較於後者，前者較不緊急。", "E": "Percutaneous fasciotomy適合用於isolated palmar cords with MCP joint moderate flexion。"}, "ans": "A", "multi": false, "years": ["109"], "cite": "Neligan chapter 17, page 375-382", "conflict": "選項改寫/重排家族(跨年)：本列=A；另有 B(113), D(112)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Central cord造成MCP(非DIP)攣縮;spiral cord位移NV bundle往內往淺為真。", "peropt": {"A": "✔答案(錯)：central cord造成MCP攣縮(非DIP)。", "B": "早期dimpling/Hugh Johnson，正確。", "C": "Garrod's nodules，正確。", "D": "手術適應症MCP30°/任何PIP，正確。", "E": "percutaneous fasciotomy用於isolated palmar cord+MCP，正確。"}, "src": "NG", "sub": "I"}, {"id": "NG109-14", "stem": "下列關於rheumatoid arthritis (RA)之敘述，何者正確？", "opts": {"A": "常見症狀為morning stiffness，敏感度最高的症狀為對稱性關節炎及手部關節炎。Rheumatoid factor是RA marker，但和anti-citrullinated protein antibodies (ACPAs)都與疾病嚴重度無關。", "B": "關節症狀常從MCP、PIP及手腕開始，因為這些關節的synovium to joint surface area ratio較低。", "C": "Caput ulnae意指dorsal dislocation of the ulnar head、carpal pronation、volar subluxation of the ECU；Vaughan-Jackson syndrome意指radial to ulnar progression of extensor tendon ruptures；Mannerfelt lesion意指flexor pollicis longus tendon因scaphoid sharp erosion而斷裂。", "D": "Finger deformity分為swan-neck deformity和boutonniere deformity，前者可能源自DIP、PIP、MCP joint，後者則一定源自PIP joint。", "E": "Rheumatoid thumb deformity可分為五型，第一型即為swan-neck deformity，第三型即為boutonniere deformity。"}, "ans": "D", "multi": false, "years": ["109"], "cite": "Neligan chapter 19, page 400-406", "conflict": "選項改寫/重排家族(跨年)：本列=D；另有 C(110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確為D:swan-neck可源自DIP/PIP/MCP、boutonnière必源自PIP。", "peropt": {"A": "✗RF與ACPAs皆與嚴重度相關。", "B": "✗症狀從synovium:joint surface ratio『較高』關節開始。", "C": "✗Caput ulnae為carpal supination(非pronation)。", "D": "✔答案(對)：swan-neck源自DIP/PIP/MCP，boutonnière必源自PIP。", "E": "✗thumb第一型boutonnière、第三型swan-neck(此選項顛倒)。"}, "src": "NG", "sub": "J"}, {"id": "NG109-19", "stem": "下列關於先天性上肢疾病之敘述，何者錯誤？", "opts": {"A": "Radial deficiency分為type 0-4，type II radius稱為\"miniature radius\"，type III radius只有remnant of radius且缺少distal physis。", "B": "治療radial deficiency的常用手術為distraction + centralization。", "C": "Ulnar longitudinal deficiency的發生機率較radial deficiency低，且多為sporadic，很少有其他相關疾病。", "D": "Cleft hand屬於central deficiency，推測為apical ectodermal ridge (AER) defect導致。", "E": "Transverse deficiencies推測為zone of polarizing activity (ZPA)異常而導致。"}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan chapter 26, page 575,580,586,587", "conflict": "", "etype": "ai", "expl": "", "key": "Transverse deficiency非ZPA異常所致;ZPA調控radioulnar(preaxial-postaxial) patterning。", "peropt": {"A": "Radial deficiency type II=miniature radius、type III缺distal physis，正確。", "B": "distraction+centralization，正確。", "C": "ulnar deficiency較少、多sporadic，正確。", "D": "cleft hand=central deficiency(AER defect)，正確。", "E": "✔答案(錯)：transverse deficiency非ZPA所致。"}, "src": "NG", "sub": "G"}, {"id": "NG109-22", "stem": "關於polydactyly的敘述何者錯誤？", "opts": {"A": "radial polydactyly在亞洲人較常見", "B": "使用 Wassel classification 來作 radial polydactyly 的分類, 最常見是Type VI，第二常見的是Type VII", "C": "syndromic association在ulnar polydactyly較常見", "D": "ulnar polydactyly可分為三類：type I includes nubbins or floating little fingers, type II includes duplications at the MCPJ, 和 type III includes duplications", "E": "治療radial polydactyly的準則為：\"Make one thumb from two, do not simply excise one.\""}, "ans": "B", "multi": false, "years": ["109"], "cite": "Neligan Volume VI, Chapter 28, P.637-639", "conflict": "", "etype": "ai", "expl": "", "key": "Wassel classification最常見為『type IV』(非VI);type VII次之。", "peropt": {"A": "radial polydactyly亞洲較常見，正確。", "B": "✔答案(錯)：Wassel最常見為type IV(非VI)。", "C": "ulnar polydactyly較常合併syndrome，正確。", "D": "ulnar polydactyly三類，正確。", "E": "'make one thumb from two'，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG109-23", "stem": "關於vascular tumors的描述, 下列何者錯誤?", "opts": {"A": "90% 的 infantile hemangioma 是靠病史和理學檢查來診斷", "B": "GLUT1的免疫染色可以用來做infantile hemangioma 的鑑別診斷", "C": "若診斷為Infantile hemangioma 應立即手術", "D": "Rapid involuting congenital hemangioma 通常不需要手術, 除非病灶很大", "E": "Pyogenic granuloma的主要治療方式是手術切除"}, "ans": "C", "multi": false, "years": ["109"], "cite": "Neligan Volume VI, Chapter 31, page 693, 696", "conflict": "", "etype": "ai", "expl": "", "key": "Infantile hemangioma多數自行消退，不應立即手術(先觀察/propranolol)。", "peropt": {"A": "90% IH靠病史/理學診斷，正確。", "B": "GLUT1免疫染色鑑別，正確。", "C": "✔答案(錯)：IH不應立即手術(多自行消退)。", "D": "RICH通常不需手術，正確。", "E": "pyogenic granuloma手術切除，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG109-24", "stem": "關於vascular malformation的描述, 下列何者正確?", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination", "D": "Sclerotherapy可以用來治療venous malformation和lymphatic malformation", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan VolumeVI, Chapter 31", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(Sturge-Weber/KTS/AVM治療/VM+LM sclerotherapy)。", "peropt": {"A": "Sturge-Weber CM in CN V，正確。", "B": "KTS slow-flow CLVM，正確。", "C": "AVM embolization/resection/combo，正確。", "D": "sclerotherapy治VM與LM，正確。", "E": "✔以上皆是。"}, "src": "NG", "sub": "K"}, {"id": "NG109-25", "stem": "關於nerve injury及治療的描述, 以下何者錯誤?", "opts": {"A": "Sunderland和Mackinnon 將神經受傷分成六個degree", "B": "Third degree的神經受傷不能保證神經能完全恢復", "C": "electrophysiological study需在受傷後2-3週內做", "D": "如果確定有nerve injury, 進行nerve repair 的最佳時間在受傷後的48小時內", "E": "超過三週的delayed nerve repair 通常就需要nerve graft"}, "ans": "C", "multi": false, "years": ["109"], "cite": "Neligan Volume VI, Chapter 32, page 719, 722, 723, 728", "conflict": "選項改寫/重排家族(跨年)：本列=C；另有 A(108/113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "電生理檢查宜在受傷『3-4週後』做(過早無denervation表現);'2-3週內'有誤。", "peropt": {"A": "Sunderland/Mackinnon六度，正確。", "B": "third degree不保證完全恢復，正確。", "C": "✔答案(錯)：電生理檢查宜3-4週後做(非2-3週內)。", "D": "sharp injury最佳48小時內修復，正確。", "E": ">3週delayed repair常需nerve graft，正確。"}, "src": "NG", "sub": "E"}, {"id": "NG109-27", "stem": "使用free-functioning muscle transfer來進行上肢重建, 以下敘述何者正確? （複選）", "opts": {"A": "手術前關節要能夠full passive movement", "B": "Cutaneous sensibility要在tendon/muscle transfer之前就能夠恢復完成", "C": "Gracilis muscle是最常被使用的一塊肌肉皮瓣", "D": "Gracilis muscle flap取下後要在上面每5cm標記肌肉張力長度", "E": "在donor nerve的選擇上, 若要重建finger extension function, 會接到anterior interosseous nerve"}, "ans": "ABC", "multi": true, "years": ["109"], "cite": "Neligan Volume VI, Chapter 35, page 803, 804, 806, 810", "conflict": "", "etype": "ai", "expl": "", "key": "正確為ABC:標記肌張長度在『release前』;finger extension用posterior(非anterior)interosseous nerve。", "peropt": {"A": "術前full passive movement，正確。", "B": "sensibility要在transfer前恢復，正確。", "C": "gracilis最常用，正確。", "D": "✗標記每5cm肌張長度應在release『前』(非取下後)。", "E": "✗finger extension用posterior interosseous nerve(非anterior)。"}, "src": "NG", "sub": "D"}, {"id": "NG109-28", "stem": "關於brachial plexus injuries, 以下敘述何者正確？", "opts": {"A": "Chuang's classification將其分成四個level：Level I: preganglionic root ; Level II: postganglionic spinal nerve; Level III: pre- and retro-clavicular, Level IV: infraclavicular，其中最常見的是level IV", "B": "Hoffman–Tinel's sign 是評估受傷神經再生位置的一個重要clinical sign", "C": "多數建議要Early exploration，包含可以早期診斷以及避免scarring而difficult dissection", "D": "MRI為主要評估BPI的影像工具", "E": "Level IV injury有很高的機率合併有血管受傷"}, "ans": "BDE", "multi": true, "years": ["109"], "cite": "Neligan Volume VI, chapter 36, page 815-832", "conflict": "", "etype": "ai", "expl": "", "key": "正確為BDE:最常見為Level I(非IV);adult closed BPI多數『不』建議早期探查。", "peropt": {"A": "✗Chuang分級最常見為Level I(非IV)。", "B": "Hoffman-Tinel's sign，正確。", "C": "✗多數不建議adult closed BPI早期探查。", "D": "MRI為主要影像，正確。", "E": "Level IV高機率合併血管傷，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG108-1", "stem": "下列有關 肌腱縫合（tendon repair） 描述，何者為非?", "opts": {"A": "end-to-end 肌腱縫合須用multistrand core suture的方式，多以4-strand或6-strand repair為主", "B": "肌腱再斷裂，肌腱沾黏，關節僵硬為手術後常見的併發症", "C": "受損的Tendon sheath 須做完整的修補，如未完全修補會造成手指功能受損", "D": "手指的full extension and flexion 須在縫合後做立即的測試，所以手術最好是以 wide-awake 的麻醉方式進行", "E": "無傷口的屈肌肌腱斷裂（closed rupture）通常需要手術治療"}, "ans": "C", "multi": false, "years": ["108"], "cite": "Neligan Vol. 6, Ch 9, p 188-189", "conflict": "", "etype": "ai", "expl": "", "key": "Tendon sheath不需『完整』修補(完整修補反而可能妨礙滑動)。", "peropt": {"A": "multistrand core suture、4/6-strand，正確。", "B": "再斷裂/沾黏/僵硬為常見併發症，正確。", "C": "✔答案(非)：tendon sheath不需完整修補。", "D": "wide-awake下即時測試滑動，正確。", "E": "closed flexor rupture通常需手術，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG108-2", "stem": "下列何者不屬於 ulnar nerve palsy的臨床症狀？", "opts": {"A": "Durkan's sign", "B": "Duchenne's sign", "C": "Wartenberg's sign", "D": "Froment's sign", "E": "Jeanne's sign"}, "ans": "A", "multi": false, "years": ["108"], "cite": "Neligan Vol. 6, Ch 02, p 61", "conflict": "", "etype": "ai", "expl": "", "key": "Durkan's sign(carpal compression test)為正中神經/CTS，非ulnar palsy。", "peropt": {"A": "✔答案(不屬於)：Durkan's sign為median/CTS。", "B": "Duchenne's sign(ulnar claw)=尺神經。", "C": "Wartenberg's sign=尺神經。", "D": "Froment's sign=尺神經。", "E": "Jeanne's sign=尺神經。"}, "src": "NG", "sub": "C"}, {"id": "NG108-3", "stem": "下列關於 collateral ligament injuries around MCP joint of thumb 之敘述，何者為非?", "opts": {"A": "Stener lesion 是指 complete ulnar collateral ligament tear retracted proximally and the adductor aponeurosis was interposed between the ligament and the site of avulsion along the base of the proximal phalanx", "B": "Stener lesion: 由於斷裂的 ulnar collateral ligament 沒有與骨頭接觸，因此不會癒合。", "C": "Stener lesion 可先以 immobilization 來治療，兩個月未癒合則考慮手術治療。", "D": "Radial collateral ligament injuries are much less common than their ulnar counterparts", "E": "Radial collateral ligament tear不會造成Stener lesion。"}, "ans": "C", "multi": false, "years": ["105", "108"], "cite": "Neligan Volume 6, Chapter 7, p.162-163", "conflict": "", "etype": "ai", "expl": "", "key": "Stener lesion需手術(adductor aponeurosis卡在中間,韌帶無法自癒;immobilization無效)。", "peropt": {"A": "Stener lesion定義正確。", "B": "斷裂UCL未接觸骨頭不會癒合，正確。", "C": "✔答案(非)：Stener lesion需手術,非先immobilization。", "D": "RCL傷較UCL少見，正確。", "E": "RCL tear不造成Stener lesion，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG108-4", "stem": "下列關於 Ectopic transplantation 的敘述，何者為非?", "opts": {"A": "Godina et al. performed the first ectopic replantation in 1983 when they transferred an amputated hand to the axilla after a contaminated multilevel farm injury.", "B": "理想的recipient site 包括the thoracodorsal, the deep inferior epigastric, the superficial inferior epigastric, the radial and the dorsalis pedal vessels.", "C": "recipient vessel 的選擇主要取決於pedicle預期長度以及donor site morbidity.", "D": "關於第二階段transplantation時recipient site的準備，皮膚移植做為首選。", "E": "在digit replantation之前，adequate debridement是必要的。"}, "ans": "D", "multi": false, "years": ["105", "108"], "cite": "Neligan Volume 6, Chapter 11, p263-264", "conflict": "", "etype": "ai", "expl": "", "key": "第二階段recipient準備非以皮膚移植為首選(需well-vascularized coverage)。", "peropt": {"A": "Godina 1983首例ectopic replantation，正確。", "B": "ideal recipient sites，正確。", "C": "recipient vessel取決於pedicle長度/donor morbidity，正確。", "D": "✔答案(非)：非以skin graft為首選。", "E": "replantation前需adequate debridement，正確。"}, "src": "NG", "sub": "L"}, {"id": "NG108-5", "stem": "下列關於 metacarpal hand 的敘述何者為錯?", "opts": {"A": "The term \"metacarpal hand\" refers to a hand injury with multiple finger amputations at the level of the metacarpophalangeal joint, or immediately proximal or distal to it.", "B": "In the amputation level is proximal to the metacarpophalangeal joint, the focus is on the selection of two separate toes or combined second and third, or third and fourth toe transplantations depending on the presence of webspace.", "C": "In the finger amputation level through the metacarpophalangeal joints with intact articular surfaces, combined second and third toes are harvested as composite joint transfers.", "D": "In metacarpal hand with various levels of thumb involvement, reconstruction of the thumb is determined by the presence or absence of a functional thenar musculature.", "E": "If the thenar muscle is intact or possesses adequate function, an one-stage procedure to reconstruct the thumb and two adjacent fingers is recommended."}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan Vol. 6, Ch 14, p 321", "conflict": "選項改寫/重排家族(跨年)：本列=B；另有 E(105)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Metacarpal hand重建:此選項(截肢平面/toe選擇準則)敘述有誤(依原文)。", "peropt": {"A": "metacarpal hand定義，正確。", "B": "✔答案(錯)：toe選擇/截肢平面敘述有誤。", "C": "MCPJ intact articular→composite joint transfer，正確。", "D": "thumb重建取決於thenar功能，正確。", "E": "thenar完整→one-stage重建，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG108-6", "stem": "關於手部骨折，下列敘述何者錯誤？", "opts": {"A": "Bennett and Rolando fracture 是第一掌骨近端關節面骨折，前者只有一個關節面碎骨，而後者則有至少兩個關節面碎骨。", "B": "Jahss maneuver是用於掌骨頸骨折之徒手復位的方法", "C": "Salter–Harris fractures的分類中以Type 2(骨折從physis延伸到shaft)為最常見", "D": "在手指的Ｘ光lateral view看到\"V\"sign代表遠端指骨dorsal subluxation", "E": "Stener lesion是指拇指掌指關節的ulnar collateral ligament完全斷裂，須以手術治療。"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan Volume 6, Chapter 07, p.148, 151, 160, 162, 166", "conflict": "", "etype": "ai", "expl": "", "key": "手指lateral view 'V sign'代表PIP joint dorsal subluxation/關節不對合;此選項解讀有誤。", "peropt": {"A": "Bennett(單碎骨)/Rolando(≥2碎骨)，正確。", "B": "Jahss maneuver用於掌骨頸骨折復位，正確。", "C": "SH type II最常見，正確。", "D": "✔答案(錯)：'V sign'解讀有誤(代表PIP dorsal subluxation)。", "E": "Stener lesion需手術，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG108-7", "stem": "關於nail下列敘述何者正確？", "opts": {"A": "捲甲（pincer nail）好發於中年至老年女性，成因仍不明，目前一般認為用真皮移植或人工真皮填塞在患部的甲床與趾（指）骨之間，可有效治療矯正。", "B": "甲床黑色素瘤（Subungual melanoma）如為melanoma in situ，則必須以部分的手指或腳趾截肢手術治療，以降低復發及轉移的機率。", "C": "手指甲床缺損合併指骨露出大於1.5公分時，仍可使用腳趾的split- or full-thickness germinal matrix graft來重建，通常可完全癒合。", "D": "修補破損的甲床時，縫合即便有張力，也不易造成疤痕的產生。", "E": "指甲的存在與否，與指腹的感覺無關，two-point discrimination皆相同。"}, "ans": "A", "multi": false, "years": ["108"], "cite": "Neligan Vol. 6, Ch.06, p.124-126 133 134", "conflict": "", "etype": "ai", "expl": "", "key": "Pincer nail好發中老年女性,以真皮/人工真皮填塞於甲床與指骨間矯正。", "peropt": {"A": "✔答案(對)：pincer nail好發中老年女性、真皮填塞治療。", "B": "✗subungual melanoma in situ可digit-sparing(不一定截肢)。", "C": "✗甲床缺損+指骨露出>1.5cm重建不一定完全癒合。", "D": "✗甲床縫合有張力易生疤痕。", "E": "✗指甲影響指腹感覺/two-point discrimination。"}, "src": "NG", "sub": "P"}, {"id": "NG108-8", "stem": "下列關於 Kaplan's cardinal line，下列何者正確? (複選)", "opts": {"A": "Emanuel Kaplan described specific surface lines in locating key structures in the palm of the hand.", "B": "Kaplan's cardinal line is drawn from the apex of the first web space to the distal edge of the pisiform bone.", "C": "The intersection with longitudinal line from the ulnar side of the middle finger corresponds to the motor branch of the median nerve.", "D": "The intersection with longitudinal line from the ulnar side of the ring finger corresponds to the motor branch of the ulnar nerve.", "E": "The motor branch of the ulnar nerve is found on the cardinal line, equidistant between the hamate and pisiform."}, "ans": "ABCE", "multi": true, "years": ["108"], "cite": "Neligan Vol. 6, Ch 01, p.2", "conflict": "", "etype": "ai", "expl": "", "key": "正確為ABCE。D(ring finger尺側→ulnar motor)敘述有誤。", "peropt": {"A": "Kaplan描述掌面surface lines，正確。", "B": "由first web apex畫至distal pisiform，正確。", "C": "與中指尺側縱線交點=median motor branch，正確。", "D": "✗此敘述(ring finger→ulnar motor)有誤。", "E": "ulnar motor branch位cardinal line、hamate與pisiform等距，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG108-9", "stem": "下列何者是 contraindication to replantation? (複選)", "opts": {"A": "53歲男性高處跌落，右手近端食指創傷性截指，合併顱內出血、意識不清。", "B": "30歲女性車禍，左手腕近端創傷性截肢，查無其他損傷，意識正常。", "C": "2歲男童玩電扇，右手食指中段創傷性截指。", "D": "45歲女性使用絞肉機，右手食指、中指創傷性多段截指（segmental amputation），血管呈現ribbon's sign.", "E": "24歲女性，刀傷，右手食指指尖（finger tip）創傷性截指，合併思覺失調症急性發作。"}, "ans": "ADE", "multi": true, "years": ["108"], "cite": "Neligan Volume 6, Ch11, p.249", "conflict": "選項改寫/重排家族(跨年)：本列=ADE；另有 ABE(114/115), AD(106)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正解ADE:危及生命(顱內出血)、多段截肢+ribbon sign(血管差)、精神急性不穩=禁忌。", "peropt": {"A": "✔顱內出血/意識不清=危及生命,禁忌。", "B": "✗乾淨腕部截肢、穩定=良好適應症。", "C": "✗兒童手指=強適應症。", "D": "✔多段截肢+ribbon sign=血管差,禁忌。", "E": "✔思覺失調急性發作=禁忌。"}, "src": "NG", "sub": "L"}, {"id": "NG108-10", "stem": "下列關於手部 extensor 的敘述何者正確? (複選)", "opts": {"A": "De Quervain's disease 發生在手腕 extensor retinaculum 的第二個 compartment", "B": "第二跟第三個compartment 間可摸到一個突起，稱為 Lister's tubercle", "C": "第三個 compartment 的 extensor pollicis longus tendon 會在 extensor carpi radialis longus and brevis 上方橫越過第二個 compartment", "D": "第四個 compartment 包含五條手指的伸肌腱 (four extensor digitorum communis EDC tendons和extensor indicis propius EIP tendon)", "E": "EIP tendon 位於食指 EDC 的 radial site，而 EDM tendon 則位於小指的 ulnar site"}, "ans": "BCD", "multi": true, "years": ["108"], "cite": "Neligan Vol. 6, Ch 10, p 228", "conflict": "選項改寫/重排家族(跨年)：本列=BCD；另有 ADE(112/113/114/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確為BCD(extensor compartment解剖)。", "peropt": {"A": "✗de Quervain為第『一』背側間室(非二)。", "B": "Lister's tubercle在第2-3間室間，正確。", "C": "EPL(第三間室)跨越ECRL/ECRB上方，正確。", "D": "第四間室含4條EDC+EIP，正確。", "E": "✗EIP在食指EDC『尺側』、EDM在小指尺側(此選項有誤)。"}, "src": "NG", "sub": "F"}, {"id": "NG108-11", "stem": "下列有關手部常見腫瘤敘述, 何者錯誤? (複選)", "opts": {"A": "Cutaneous horns are located on sun-exposed areas of the body such as the dorsum of the hands and forearms", "B": "Epidermal inclusion cysts are the most common hand tumors", "C": "The typical course of verruca vulgaris is self-limited, with spontaneous resolution in 1–2 years", "D": "Nevi are classified by size as small (<1.5 cm), medium (1.5 cm to <10 cm), and large or giant (>10 cm)", "E": "Keratoacanthoma is thought to be derived from the epithelium of hair follicles"}, "ans": "BD", "multi": true, "years": ["108"], "cite": "Neligan chapter 15, Page 337-338", "conflict": "", "etype": "ai", "expl": "", "key": "錯誤為BD:最常見手部腫瘤為ganglion(非epidermal inclusion cyst);nevi large/giant為>20cm(非>10cm)。", "peropt": {"A": "cutaneous horns於sun-exposed區，正確。", "B": "✔答案(錯)：最常見手部腫瘤為ganglion cyst。", "C": "verruca vulgaris 1-2年自限，正確。", "D": "✔答案(錯)：large/giant nevi為>20cm。", "E": "keratoacanthoma源自hair follicle epithelium，正確。"}, "src": "NG", "sub": "P"}, {"id": "NG108-12", "stem": "下列有關ganglion cyst的敘述, 何者錯誤?", "opts": {"A": "Ganglion cysts are the most common soft-tissue tumors of the hand and upper extremity", "B": "Ganglion cysts typically occur in the dorsal carpal region and originate from the scapholunate interosseous ligament", "C": "A key point in the treatment of ganglion cysts is to clarify their benign nature for the patient", "D": "The definitive management of ganglion cysts is surgical excision with a cuff of retinaculum", "E": "After excision, the capsule must be repaired to enhance to wrist stability"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan chapter 15, Page 342", "conflict": "", "etype": "ai", "expl": "", "key": "Ganglion切除後不需修補capsule(修補反增復發)。", "peropt": {"A": "ganglion最常見軟組織腫瘤，正確。", "B": "dorsal carpal、源自SL ligament，正確。", "C": "向病人說明良性，正確。", "D": "切除含retinaculum cuff，正確。", "E": "✔答案(錯)：切除後不需修補capsule。"}, "src": "NG", "sub": "P"}, {"id": "NG108-13", "stem": "下列有關Pyogenic flexor tenosynovitis的敘述, 何者錯誤?", "opts": {"A": "Pyogenic flexor tenosynovitis warrants urgent surgical intervention.", "B": "Open the tendon sheath proximally over A1 pulley and expose sheath distally either through midaxial or volar zigzag incision.", "C": "Use 5 French pediatric feeding tube to irrigate tendon sheath copiously from proximal to distal.", "D": "Plan for multiple washouts (every 24–48 hours) until infection is controlled", "E": "The Kanavel's signs include fusiform digit, flexed resting posture of digit, tenderness over the flexor tendon sheath, and pain with passive flexion of the digit"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan chapter 16, Page 359-360", "conflict": "", "etype": "ai", "expl": "", "key": "Kanavel徵為passive『extension』時疼痛(非flexion)。", "peropt": {"A": "需緊急手術，正確。", "B": "A1 pulley近端開+遠端midaxial/volar zigzag，正確。", "C": "5F feeding tube沖洗，正確。", "D": "每24-48h washout，正確。", "E": "✔答案(錯)：Kanavel徵為passive extension疼痛(非flexion)。"}, "src": "NG", "sub": "B"}, {"id": "NG108-14", "stem": "下列有關Necrotizing fasciitis的敘述, 何者正確? (複選)", "opts": {"A": "Group B β-hemolytic streptococcus is the most common organism.", "B": "The characteristic findings include pathologic \"dishwater\" fluid or pus along the fascial planes.", "C": "All necrotic tissue and fibrinous material should be radically debrided.", "D": "Plan for multiple washouts and debridements (every 24–48 hours) until infection is controlled", "E": "Most common risk factors include: history of drug abuse, immunosuppression, and diabetes"}, "ans": "BCDE", "multi": true, "years": ["108"], "cite": "Neligan chapter 16, Page 364", "conflict": "", "etype": "ai", "expl": "", "key": "正確為BCDE。最常見致病菌為Group『A』(非B)β-hemolytic strep。", "peropt": {"A": "✗最常見為Group A β-hemolytic strep(非B)。", "B": "dishwater fluid沿fascial plane，正確。", "C": "radical debridement，正確。", "D": "每24-48h washout/debridement，正確。", "E": "危險因子drug abuse/immunosuppression/DM，正確。"}, "src": "NG", "sub": "B"}, {"id": "NG108-15", "stem": "下列何者不是Dupuytren's disease的手術選擇?", "opts": {"A": "Percutaneous fasciotomy (needle aponeurotomy)", "B": "Local fasciectomy", "C": "Radical fasciectomy", "D": "Dermatofasciectomy", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan chapter 17, Page 381", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆是(percutaneous fasciotomy/local/radical fasciectomy/dermatofasciectomy皆為選擇)。", "peropt": {"A": "percutaneous fasciotomy，是。", "B": "local fasciectomy，是。", "C": "radical fasciectomy，是。", "D": "dermatofasciectomy，是。", "E": "✔以上皆是。"}, "src": "NG", "sub": "I"}, {"id": "NG108-16", "stem": "下列有關rheumatologic conditions of the hand的特徵, 何者錯誤?", "opts": {"A": "There's some positive finding of serology about psoriatic arthritis", "B": "There's secondary OA change in SLE patients", "C": "Patients with gouty arthritis showed red, hot, and swollen joint", "D": "There's secondary OA change in patients with scleroderma", "E": "Pseudogout(CPPD) would have chronic inflammatory arthritis"}, "ans": "A", "multi": false, "years": ["108"], "cite": "Neligan chapter 19, Page 436", "conflict": "", "etype": "ai", "expl": "", "key": "Psoriatic arthritis為血清陰性(seronegative)，無陽性血清學。", "peropt": {"A": "✔答案(錯)：psoriatic arthritis為seronegative(無陽性血清學)。", "B": "SLE可有secondary OA，正確。", "C": "gout紅腫熱，正確。", "D": "scleroderma secondary OA，正確。", "E": "pseudogout(CPPD)慢性發炎性關節炎，正確。"}, "src": "NG", "sub": "J"}, {"id": "NG108-17", "stem": "When doing fusion procedure for patients with osteoarthritis, which angles is not acceptable?", "opts": {"A": "PIPJ of small finger: 55 degree", "B": "PIPJ of index finger: 40 degree", "C": "MCPJ of ring finger: 35 degree", "D": "MCPJ of long finger: 30 degree", "E": "DIPJ of small finger: 20 degree"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan chapter 20, Page 447", "conflict": "", "etype": "ai", "expl": "", "key": "⚠融合角度標準:MCP約20-30°、PIP 40°(食指)漸增至55°(小指)、DIP 0-15°為主。此題keyed E(DIP 20°)為不可接受,惟部分文獻DIP 0-20°亦可,建議對照原文。", "peropt": {"A": "PIP小指55°(漸增,可接受)。", "B": "PIP食指40°(可接受)。", "C": "MCP無名指35°(略高於典型25-30°)。", "D": "MCP中指30°(可接受)。", "E": "⚠DIP小指20°,此題keyed為不可接受(DIP宜0-15°);惟部分文獻0-20°亦可。"}, "src": "NG", "sub": "J"}, {"id": "NG108-18", "stem": "下列有關Cubital tunnel syndrome的敘述, 何者正確? (複選)", "opts": {"A": "The most common site of entrapment for the cubital tunnel syndrome is at the ligament of Osborne", "B": "Intermittent symptoms elicited by elbow flexion are likely due to transient ischemia of the nerve and will respond well to treatment", "C": "Non-surgical treatments include local steroid injections, activity modification, splinting, and physiotherapy", "D": "We can use the wide-awake approach for in situ decompression", "E": "The goal of submuscular–subcutaneous transposition is to move the nerve anterior to the axis of elbow flexion"}, "ans": "ABCDE", "multi": true, "years": ["108"], "cite": "Neligan chapter 24, Page 539", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(Cubital tunnel syndrome)。", "peropt": {"A": "最常見壓迫點ligament of Osborne，正確。", "B": "間歇症狀由暫時缺血、治療反應好，正確。", "C": "非手術治療(steroid/splint/PT)，正確。", "D": "wide-awake in situ decompression，正確。", "E": "submuscular-subcutaneous transposition移至屈曲軸前方，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG108-20", "stem": "下列有關Raynaud's disease的診斷標準, 何者錯誤?", "opts": {"A": "Characteristic triphasic digital color changes", "B": "Bilateral hand movement", "C": "Absence of occlusive disease", "D": "Male predominance", "E": "Symptoms at least 2 year's duration"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan chapter 22, Page 504", "conflict": "", "etype": "ai", "expl": "", "key": "Raynaud's disease(原發)好發女性(非male predominance)。", "peropt": {"A": "triphasic color change，正確。", "B": "雙側，正確。", "C": "無occlusive disease，正確。", "D": "✔答案(錯)：原發Raynaud好發女性(非男性)。", "E": "症狀≥2年，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG108-21", "stem": "關於併指(syndactyly), 下列敘述何者錯誤?", "opts": {"A": "Familial syndactyly 所佔的比例是 15~40%", "B": "最常發生的是digit 2-3 的併指", "C": "Syndactyly 可以分為 incomplete, complete, complex, or complicated", "D": "Complicated syndactyly 指的是有 abnormal bone structure inside to syndactyly with fusions, rudimentary bones, missing bones, abnormal joints, and sometimes cross bones", "E": "Syndactyly 可以單獨出現, 或者合併其他syndrome 出現, 如Poland syndrome 或 Apert syndrome"}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan Volume 6, page 625", "conflict": "", "etype": "ai", "expl": "", "key": "最常見併指為digit 3-4(long-ring)，非2-3。", "peropt": {"A": "familial 15-40%，正確。", "B": "✔答案(錯)：最常見為digit 3-4(long-ring)併指。", "C": "incomplete/complete/complex/complicated，正確。", "D": "complicated定義，正確。", "E": "可單獨或合併syndrome，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG108-22", "stem": "使用 Wassel classification 來作 radial polydactyly 的分類, 最常見的是哪一種type?", "opts": {"A": "Type II", "B": "Type III", "C": "Type IV", "D": "Type V", "E": "Type VI"}, "ans": "C", "multi": false, "years": ["108"], "cite": "Neligan Volume 6, page 638", "conflict": "", "etype": "ai", "expl": "", "key": "Wassel classification最常見為Type IV。", "peropt": {"A": "Type II非最常見。", "B": "Type III非最常見。", "C": "✔答案:Type IV最常見。", "D": "Type V非最常見。", "E": "Type VI非最常見。"}, "src": "NG", "sub": "O"}, {"id": "NG108-26", "stem": "使用free-functioning muscle transfer來進行上肢重建, 以下敘述何者錯誤?", "opts": {"A": "手術前關節要能夠full passive movement", "B": "Gracilis muscle是最常被使用的一塊肌肉皮瓣", "C": "在預計轉移的部位上, 必須有足夠的soft tissue coverage, 否則連同soft tissue reconstruction要一起進行", "D": "在donor nerve的選擇上, 若要重建long finger flexor function, 會接到posterior interosseous nerve", "E": "Inadequate power and adhesion屬於late complication of free-functioning muscle transfer"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan Volume 6, page 803, 804, 806, 810", "conflict": "", "etype": "ai", "expl": "", "key": "重建finger flexion的motor nerve並非PIN;PIN用於finger extension。", "peropt": {"A": "術前full passive movement，正確。", "B": "gracilis最常用，正確。", "C": "需足夠soft tissue coverage，正確。", "D": "✔答案(錯)：PIN用於finger extension;重建flexion應接他神經。", "E": "inadequate power/adhesion為late complication，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG108-28", "stem": "關於vascular tumors的描述, 下列何者正確? (複選)", "opts": {"A": "90% 的 infantile hemangioma 是靠病史和理學檢查來診斷", "B": "GLUT1的免疫染色可以用來做infantile hemangioma 的鑑別診斷", "C": "若診斷為Infantile hemangioma 應立即手術", "D": "Rapid involuting congenital hemangioma 通常不需要手術, 除非病灶很大", "E": "Pyogenic hemangioma的主要治療方式是手術切除"}, "ans": "ABE", "multi": true, "years": ["108"], "cite": "Neligan Volume 6, page 693, 696", "conflict": "", "etype": "ai", "expl": "", "key": "正解ABE。C(IH立即手術)為錯;D(RICH)於本題未列入正解,與他版略有出入,建議查證。", "peropt": {"A": "90% IH靠病史/理學診斷，正確。", "B": "GLUT1免疫染色鑑別，正確。", "C": "✗IH不應立即手術(多自行消退)。", "D": "⚠RICH敘述本題未列入正解(與他版判定略有出入),建議查證。", "E": "pyogenic granuloma手術切除，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG108-29", "stem": "關於vascular malformation的描述, 下列何者正確? (複選)", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Parkes Weber syndrome屬於high-flow vascular malformation", "D": "Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination", "E": "Sclerotherapy可以用來治療venous malformation和lymphatic malformation"}, "ans": "ABCDE", "multi": true, "years": ["108"], "cite": "Neligan Volume 6, page 689, 696, 699, 708, 711", "conflict": "選項改寫/重排家族(跨年)：本列=ABCDE；另有 ABCD(114/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "以上皆正確(含Parkes Weber為high-flow)。", "peropt": {"A": "Sturge-Weber CM in CN V，正確。", "B": "KTS slow-flow CLVM，正確。", "C": "Parkes Weber為high-flow，正確。", "D": "AVM治療embolization/resection/combo，正確。", "E": "sclerotherapy治VM與LM，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG107-2", "stem": "關於甲床的描述，下列何者錯誤?", "opts": {"A": "Zook et al.發現甲床的血液循環由兩套微動脈供應，一套位於nail fold，另一套位於lunula", "B": "甲床的感覺支配來自dorsal digital nerves的終端支", "C": "指甲板不全然由germinal matrix長出，sterile matrix也可以生成指甲板", "D": "手指指甲板的生長速度約為0.1mm/day，腳趾指甲板的生長速度僅手指的1/4", "E": "當subungual hematoma大於甲床面積的50%或合併有末梢指節骨折，常需移除指甲板檢視並修補甲床"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 6, p 118-119", "conflict": "", "etype": "ai", "expl": "", "key": "甲床感覺來自掌側指神經(proper palmar digital nerve)之背側終末支,非dorsal digital nerves。", "peropt": {"A": "Zook:甲床血循兩套(nail fold+lunula)，正確。", "B": "✔答案(錯)：甲床感覺來自掌側指神經背側終末支(非dorsal digital nerves)。", "C": "sterile matrix亦可生成甲板，正確。", "D": "手指0.1mm/day、腳趾約1/4，正確。", "E": "subungual hematoma>50%或合併骨折需移除甲板修補，正確。"}, "src": "NG", "sub": "Q"}, {"id": "NG107-3", "stem": "關於digital flexor sheath何者為非?", "opts": {"A": "可分為synovial sheath和condensed fibrous bands，前者為一種paratenon，可提供肌腱養分並形成一個平順的滑動介面", "B": "每根手指(finger)有五個annular pulley和三個cruciate pulleys", "C": "拇指(thumb)有三個pulley，分別為A1, oblique, and A2，並不像手指有cruciate pulley", "D": "手指的A2和A4 pulley靠近指關節(PIPJ和DIPJ)，是annular pulley中較大且重要的部分，手術時盡量不要傷害", "E": "FDS tendon的分岔位置約位於A2 pulley的中段"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 9, p 179-180", "conflict": "", "etype": "ai", "expl": "", "key": "A2位於近節指骨、A4位於中節指骨(非'靠近PIPJ/DIPJ關節');A2/A4最重要不可傷此點正確,但位置敘述有誤。", "peropt": {"A": "synovial sheath+fibrous bands，正確。", "B": "每指5 annular+3 cruciate pulley，正確。", "C": "thumb 3 pulley(A1/oblique/A2)無cruciate，正確。", "D": "✔答案(非)：A2在近節指骨、A4在中節指骨(位置敘述有誤)。", "E": "FDS分岔約A2 pulley中段，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG107-4", "stem": "Digital replantation通常耗時較長，斷指是否重接取決於多樣因子，而下列敘述何者為是? (有完整殘肢的狀況下)", "opts": {"A": "成人位於flexor zone I的單一手指截斷通常可不做再接手術，因為有許多局部皮瓣可以保留手指的長度及功能", "B": "孩童位於flexor zone II的單一手指截斷通常不做再接手術，因為術後有極大機率會產生肌腱沾黏，最終影響其他健康指的活動", "C": "大拇指截斷需依照截斷位置決定是否再接", "D": "因近代義肢功能齊全，全手截斷再接的功能常不如義肢，為relative contraindication", "E": "大部分的食指截斷不建議再接，因為可能干擾其他手指的對掌功能"}, "ans": "E", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 11, p 230-231", "conflict": "", "etype": "ai", "expl": "", "key": "食指截斷常不建議再接(患者傾向以中指取代僵硬食指)。", "peropt": {"A": "✗成人zone I單指多仍可再接。", "B": "✗孩童再接應積極。", "C": "✗拇指截斷應盡量再接(非僅depends)。", "D": "✗全手截斷應積極再接(義肢功能不如)。", "E": "✔答案(是)：食指截斷常不建議再接。"}, "src": "NG", "sub": "L"}, {"id": "NG107-5", "stem": "關於外傷性拇指截斷，下列選項何者錯誤?", "opts": {"A": "無論任何位置的截斷，若有殘肢，則盡量進行斷指再接手術", "B": "指間關節遠端的截斷，若無殘肢，可簡單進行軟組織的覆蓋，例如使用Moberg flap或是cross-finger flap", "C": "在近端指節的截斷，只要掌指關節完整，單純用軟組織覆蓋，仍能保留拇指大部分的功能，例如FDMA flap就是一個好的選項，可避免過久的關節固定", "D": "當截斷處位於拇指掌骨，若不進行長度的重建則會嚴重影響日常手部功能，無論是未受傷的食指還是部份受傷的食指皆可用來移植", "E": "術後拇指除了運動功能的復健外，感覺復健也是不可或缺的一環"}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 13, p 282", "conflict": "", "etype": "ai", "expl": "", "key": "近端指節拇指截斷:單純軟組織覆蓋不足以保留功能,需長度重建。", "peropt": {"A": "有殘肢盡量再接，正確。", "B": "IP遠端無殘肢用Moberg/cross-finger，正確。", "C": "✔答案(錯)：近端截斷單純覆蓋不足,需長度重建。", "D": "拇指掌骨截斷需長度重建，正確。", "E": "感覺復健重要，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG107-6", "stem": "拇指位於近端指節的截斷重建手術，下列敘述何者為非?", "opts": {"A": "此位置的拇指截斷，常嚴重影響日後手部功能，除軟組織的覆蓋外，須設法做功能恢復手術", "B": "在外傷當下，可保守的截短指骨，以達成軟組織的原位縫合，待傷口穩定後在行功能恢復手術", "C": "Phalangization是讓拇指絕對長度延長的手術方式，經由此法，拇指對指功能可以明顯提升", "D": "Metacarpal lengthening可延長拇指絕對長度，除了殘餘掌骨小於三公分者外，皆可考慮使用", "E": "Osteoplastic reconstruction主要使用bone graft去增加拇指的絕對長度，後在以皮瓣包覆滋養bone graft，日後亦可以neurovascular island flap置換於pulp處，增加觸覺回饋"}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 13, p 287-290", "conflict": "", "etype": "ai", "expl": "", "key": "Phalangization是加深虎口以增加『相對』長度,不增加拇指絕對長度。", "peropt": {"A": "需功能恢復手術，正確。", "B": "可截短指骨原位縫合再二期，正確。", "C": "✔答案(非)：phalangization增加相對長度(非絕對長度)。", "D": "metacarpal lengthening(殘骨>3cm可用)，正確。", "E": "osteoplastic reconstruction+neurovascular island flap，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG107-7", "stem": "關於toe-to-hand，下列陳述何者為非?", "opts": {"A": "Toe-to-thumb可以同時重建拇指的長度、感覺跟運動功能", "B": "如果選用大腳趾為材料，建議保留1cm以上的腳趾近端指節以維持足部功能", "C": "若拇指截斷處較靠近CMCJ，帶蹠骨的第二跟腳趾為較好的重建材料選擇", "D": "四根手指均截斷者，需依病患職業來決定重建方針，例如做粗重搬運工作者，建議優先重建其橈側兩指以增強握力", "E": "在type II metacarpal hand中，若thenar muscle的功能有缺陷，則需先重建手指、後再重建拇指"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Vol. 6, Ch 14, p 297-298", "conflict": "", "etype": "ai", "expl": "", "key": "粗重工作(power grip)應優先重建『尺側』兩指(ring/little);橈側為精細動作。", "peropt": {"A": "toe-to-thumb重建長度/感覺/運動，正確。", "B": "保留>1cm近節趾骨維持足部功能，正確。", "C": "CMCJ附近截斷用帶蹠骨第二趾，正確。", "D": "✔答案(非)：power grip應優先重建尺側兩指(非橈側)。", "E": "type II metacarpal hand thenar缺陷先重建手指，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG107-8", "stem": "關於peripheral nerve，下列何者為非? (複選)", "opts": {"A": "Medial nerve和ulnar nerve一起穿過carpal tunnel", "B": "無名指與小指的flexor digitorum profundus由medial nerve的分支anterior interosseous nerve支配", "C": "Ulnar nerve傷害會造成flexor digitorum superificialis功能缺損", "D": "Radial nerve的分支deep posterior interosseous nerve為純運動神經，管控所有的extensor compartments", "E": "Radial nerve的superficial branch為純感覺神經，負責五根手指背側的感覺，但不包含末端指節"}, "ans": "ABCDE", "multi": true, "years": ["107"], "cite": "Neligan Vol. 6, Ch 1, p 40-45", "conflict": "選項改寫/重排家族(跨年)：本列=ABCDE；另有 BCDE(114/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "全部有誤(選項含median誤植medial及多處事實錯誤)。", "peropt": {"A": "✗僅median穿carpal tunnel;ulnar走Guyon's canal。", "B": "✗無名/小指FDP由ulnar nerve支配(非median/AIN)。", "C": "✗FDS由median支配,ulnar傷不影響FDS。", "D": "✗deep PIN不管控『所有』extensor(ECRL由radial主幹)。", "E": "✗radial superficial branch不含末節背側感覺。"}, "src": "NG", "sub": "C"}, {"id": "NG107-10", "stem": "下列關於手部extensor的敘述何者錯誤? (複選)", "opts": {"A": "Quervain's disease發生在手腕extensor retinaculum的第一個 compartment", "B": "在第三跟第四個compartment間可摸到一個突起，稱為Lister's tubercle", "C": "第三個compartment的extensor pollicis longus tendon會在extensor carpi radialis longus and brevis下方橫越過第二個compartment", "D": "第四個compartment包含六條手指的伸肌腱 (four extensor digitorum communis EDC tendons, extensor indicis propius EIP tendon和extensor digiti minimi EDM tendon)", "E": "EIP tendon位於食指EDC的radial site，而EDM tendon則位於小指的ulnar site"}, "ans": "BCDE", "multi": true, "years": ["107"], "cite": "Neligan Vol. 6, Ch 10, p 211", "conflict": "", "etype": "ai", "expl": "", "key": "錯誤為BCDE。A(de Quervain第一間室)正確故非答案。", "peropt": {"A": "de Quervain第一間室,正確(非答案)。", "B": "✗Lister's tubercle在第2-3間室間(非3-4)。", "C": "✗EPL在ECRL/ECRB上方(over)橫越(非下方)。", "D": "✗第四間室含4 EDC+EIP(EDM在第五間室);'六條含EDM'有誤。", "E": "✗EIP在食指EDC尺側(非radial site)。"}, "src": "NG", "sub": "F"}, {"id": "NG107-11", "stem": "Which one of the following is wrong about osteoarthritis in the hand and wrist?", "opts": {"A": "It most commonly affects DIP joints of the fingers and CMC joint of the thumb", "B": "It is more common in men than in women", "C": "There is no cure and no effective method of altering the progression of the disease process", "D": "It is characterized by a loss of articular cartilage", "E": "It is the most common rheumatologic disorder in the world"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.411", "conflict": "", "etype": "ai", "expl": "", "key": "Hand OA女性多於男性。", "peropt": {"A": "最常DIP+拇指CMC，正確。", "B": "✔答案(錯)：OA女性多於男性。", "C": "無根治法，正確。", "D": "軟骨流失，正確。", "E": "最常見風濕疾病，正確。"}, "src": "NG", "sub": "J"}, {"id": "NG107-12", "stem": "With ulnar nerve palsy, which one of following demonstrates claw hand deformity?", "opts": {"A": "Masse's sign", "B": "Wartenberg's sign", "C": "Froment's sign", "D": "Duchenne's sign", "E": "Jeanne's sign"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.514", "conflict": "", "etype": "ai", "expl": "", "key": "Duchenne's sign=claw hand deformity(尺神經麻痺)。", "peropt": {"A": "Masse's sign非claw hand。", "B": "Wartenberg's sign=小指外展。", "C": "Froment's sign=拇內收無力。", "D": "✔答案:Duchenne's sign=claw hand。", "E": "Jeanne's sign=拇MCP過伸。"}, "src": "NG", "sub": "C"}, {"id": "NG107-13", "stem": "Quadrilateral space syndrome is associated with axillary nerve compression. Which one of the following is not the boundaries of this space?", "opts": {"A": "Humerus", "B": "Teres major", "C": "Teres minor", "D": "Infraspinatus", "E": "Triceps brachii long head"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.523", "conflict": "", "etype": "ai", "expl": "", "key": "Quadrilateral space邊界:humerus、teres major、teres minor、triceps long head;infraspinatus不是。", "peropt": {"A": "humerus=邊界。", "B": "teres major=邊界。", "C": "teres minor=邊界。", "D": "✔答案:infraspinatus非邊界。", "E": "triceps long head=邊界。"}, "src": "NG", "sub": "D"}, {"id": "NG107-15", "stem": "Which one of the following is not risk factor for community-associated methicillin-resistant Staphylococcus aureus (MRSA) skin and soft tissue infections.", "opts": {"A": "Soldiers", "B": "Incarcerated persons", "C": "Children", "D": "Intravenous drug users", "E": "None of above"}, "ans": "E", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.334", "conflict": "", "etype": "ai", "expl": "", "key": "None of above:soldiers/incarcerated/children/IVDU皆為CA-MRSA風險族群。", "peropt": {"A": "soldiers=風險。", "B": "incarcerated=風險。", "C": "children=風險。", "D": "IVDU=風險。", "E": "✔答案:none of above(皆為風險)。"}, "src": "NG", "sub": "B"}, {"id": "NG107-16", "stem": "Which one of the following statements about Dupuytren's disease is incorrect.", "opts": {"A": "Repetitive trauma, alcohol abuse, smoking, and chronic obstructive pulmonary disease are risk factors.", "B": "Men are six times more than women and typically exhibit an onset in the fifth decade of life.", "C": "Molecular analysis reveals a preponderance of type III collagen.", "D": "Disease progression is characterized by the development of longitudinal cords, most commonly in the ulnar aspect of the palm and extending distally into the fingers.", "E": "The development of nodules is typically the first sign of the disease, preceding the distortion of the skin creases."}, "ans": "E", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.346-351", "conflict": "", "etype": "ai", "expl": "", "key": "⚠此版keyed E(nodule為首發徵象)為『不正確』;惟多數教科書認為nodule常為最早表現。3rd/4th版可能不同,建議對照原文。", "peropt": {"A": "risk factors(外傷/酒/菸/COPD)，正確。", "B": "男性6倍、第五十年發病，正確。", "C": "type III collagen為主，正確。", "D": "longitudinal cords於掌尺側往遠端，正確。", "E": "⚠keyed為不正確:此版判'nodule為首發'錯;惟多數文獻認nodule常最早,建議查證。"}, "src": "NG", "sub": "I"}, {"id": "NG107-17", "stem": "In treating rheumatoid arthritis with painful DRUJ instability, which tendon could be used to help stabilize the ulnar stump after the distal ulna resection.", "opts": {"A": "FCU", "B": "ECU", "C": "EIP", "D": "EDM", "E": "ECRL"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, p.382-384", "conflict": "", "etype": "ai", "expl": "", "key": "ECU用於穩定distal ulna resection(Darrach)後的ulnar stump。", "peropt": {"A": "FCU非此用途。", "B": "✔答案:ECU穩定ulnar stump。", "C": "EIP非此用途。", "D": "EDM非此用途。", "E": "ECRL非此用途。"}, "src": "NG", "sub": "J"}, {"id": "NG107-18", "stem": "Comparing Raynaud's disease and Raynaud syndrome, which of the followings are correct? (複選)", "opts": {"A": "Raynaud syndrome has more rapid progression", "B": "Raynaud's disease has a more severe prognosis", "C": "Abnormal Allen test is more common in Raynaud syndrome", "D": "Asymmetric findings are more common in Raynaud syndrome", "E": "Laboratory testing is frequently normal in Raynaud syndrome"}, "ans": "ACD", "multi": true, "years": ["107"], "cite": "Neligan Volume 6, p.474,475", "conflict": "", "etype": "ai", "expl": "", "key": "正確ACD:syndrome進展較快、Allen較常異常、較常不對稱;disease預後較良、實驗室常正常。", "peropt": {"A": "syndrome進展較快，正確。", "B": "✗Raynaud's disease預後較良(非較嚴重)。", "C": "syndrome較常異常Allen test，正確。", "D": "syndrome較常不對稱，正確。", "E": "✗syndrome實驗室常異常(disease才常正常)。"}, "src": "NG", "sub": "K"}, {"id": "NG107-19", "stem": "Pollex abductus usually occurs in which types of thumb hypoplasia? (複選)", "opts": {"A": "I", "B": "II", "C": "III", "D": "IV", "E": "V"}, "ans": "BC", "multi": true, "years": ["107"], "cite": "Neligan Volume 6, p.578", "conflict": "", "etype": "ai", "expl": "", "key": "Pollex abductus常見於thumb hypoplasia type II與III。", "peropt": {"A": "type I非。", "B": "✔type II。", "C": "✔type III。", "D": "type IV非。", "E": "type V非。"}, "src": "NG", "sub": "O"}, {"id": "NG107-20", "stem": "About giant cell tumors of the hand, choose the right statements. (複選)", "opts": {"A": "They are the second most common soft tissue masses in the hand.", "B": "They are also called pigmented villonodular synovitis", "C": "They are firm, nodular, and nontender.", "D": "They occur more commonly over the dorsal aspect of the hand.", "E": "They are slow-growing and can have a mass effect on adjacent structures."}, "ans": "ABCE", "multi": true, "years": ["107"], "cite": "Neligan Volume 6, p.319", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABCE;giant cell tumor好發於『掌側(volar)』非背側。", "peropt": {"A": "第二常見軟組織腫塊，正確。", "B": "=pigmented villonodular synovitis，正確。", "C": "firm/nodular/nontender，正確。", "D": "✗好發於掌側(volar)非背側。", "E": "slow-growing+mass effect，正確。"}, "src": "NG", "sub": "P"}, {"id": "NG107-21", "stem": "Apert syndrome has been classified into three types. Choose the right statement?", "opts": {"A": "Syndactyly in type I Apert hand is a simple type of syndactyly between all five digits", "B": "In type II Apert hand, the syndactyly presents in a complex type between all five digits", "C": "In type III Apert hand, the syndactyly presents in a simple type between all five digits", "D": "In type III Apert hand, the thumb usually shows paronychial infections and skin maceration", "E": "The incidence is lowest in Asians and the highest in Hispanics"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch28 p610 611", "conflict": "", "etype": "ai", "expl": "", "key": "Type III Apert hand拇指常有paronychial infection及skin maceration(源於嚴重併指)。", "peropt": {"A": "✗type I syndactyly敘述有誤。", "B": "✗type II敘述有誤。", "C": "✗type III敘述有誤。", "D": "✔答案:type III拇指常有paronychial infection/skin maceration。", "E": "✗發生率敘述有誤(Apert於亞洲人較高)。"}, "src": "NG", "sub": "O"}, {"id": "NG107-22", "stem": "Syndactyly is one of the most common congenital differences in the upper extremity, which description is correct?", "opts": {"A": "Complex syndactyly means more than only distal bone fusion", "B": "Complicated syndactyly means with distal bone union", "C": "Early indication for surgery are syndactylies between fingers of unequal length", "D": "With regard to skin grafts, STSGs have a better skin quality than FTSGs", "E": "About 50% of patients have bilateral involvement"}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch28 p604 p608", "conflict": "", "etype": "ai", "expl": "", "key": "不等長手指間的併指(border digits)為早期手術適應症。", "peropt": {"A": "✗complex/complicated定義對調。", "B": "✗定義對調。", "C": "✔答案:不等長手指間併指為早期手術適應症。", "D": "✗FTSG品質優於STSG。", "E": "✗此版判非正解(雙側比例敘述有爭議)。"}, "src": "NG", "sub": "O"}, {"id": "NG107-23", "stem": "Which degrees of peripheral nerve injury by Sunderland's classifications are damaged with complete internal structural disorganization?", "opts": {"A": "First-degree injury", "B": "Second-degree injury", "C": "Third-degree injury", "D": "Fourth-degree injury", "E": "Fifth-degree injury"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch32 p699", "conflict": "選項改寫/重排家族(跨年)：本列=D；另有 AB(106)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Sunderland fourth-degree=complete internal structural disorganization(neuroma-in-continuity)。", "peropt": {"A": "first非。", "B": "second非。", "C": "third非。", "D": "✔答案:fourth-degree。", "E": "fifth為complete transection。"}, "src": "NG", "sub": "E"}, {"id": "NG107-24", "stem": "Which is not the principle of tendon transfers?", "opts": {"A": "Soft tissue equilibrium", "B": "Adequate strength of donor muscle", "C": "Synergy of transfer", "D": "Multiple function for each transferred tendon", "E": "Direct line of pull"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch34 p746", "conflict": "", "etype": "ai", "expl": "", "key": "每條轉位肌腱應執行單一功能(one tendon-one function);'multiple function'非原則。", "peropt": {"A": "soft tissue equilibrium=原則。", "B": "donor muscle足夠力量=原則。", "C": "synergy=原則。", "D": "✔答案:每條肌腱多重功能『非』原則。", "E": "direct line of pull=原則。"}, "src": "NG", "sub": "C"}, {"id": "NG107-25", "stem": "About muscle transfers for elbow flexion, which is wrong?", "opts": {"A": "Musculocutaneous nerve is used for neural coaptation", "B": "Donor nerve can be intercostal nerve", "C": "Donor nerve can be radial nerve", "D": "Donor nerve can be spinal accessory nerve", "E": "Donor nerve can be thoracodorsal nerve"}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch35 p787", "conflict": "", "etype": "ai", "expl": "", "key": "Radial nerve非elbow flexion重建的donor nerve(radial支配伸肌)。", "peropt": {"A": "musculocutaneous為神經接合對象，正確。", "B": "intercostal nerve可為donor，正確。", "C": "✔答案(錯)：radial nerve非donor。", "D": "spinal accessory可為donor，正確。", "E": "thoracodorsal可為donor，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG107-26", "stem": "Differences between adult and pediatric brachial plexus injury, which is wrong?", "opts": {"A": "Etiology in adult is trauma, and closed injury in pediatric group", "B": "More spontaneous recovery happened in adult group", "C": "Nerve transfer is used in adult and nerve graft was used in pediatric BPI", "D": "Rehabilitation result is good in adult, poor in pediatric BPI", "E": "Intrinsic recovery following repair was never happened in adult"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan Volume 6, Ch36 p790", "conflict": "", "etype": "ai", "expl": "", "key": "自發性恢復在『小兒(產傷)』group較多,非成人。", "peropt": {"A": "成人trauma、小兒closed injury，正確。", "B": "✔答案(錯)：小兒group自發恢復較多(非成人)。", "C": "nerve transfer成人/nerve graft小兒，正確。", "D": "復健成人好、小兒差，正確。", "E": "成人intrinsic恢復罕見，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG107-28", "stem": "Which descriptions about congenital hand are correct? (複選)", "opts": {"A": "Polydactyly is mostly isolated, whereas syndromic association is more common in radial polydactyly", "B": "Mostly common used classification of radial polydactyly is Wassel classification", "C": "Clinodactyly is reserved for radio-ulnar deviation in the hand", "D": "Notta's node is a palpable proximal to the a1 pulley in children with a locked extension deformity", "E": "Camptodactyly is a contracture of the PIPJ in the antero-posterior direction"}, "ans": "BCE", "multi": true, "years": ["107"], "cite": "Neligan Volu ansfer to PION"}, "ans": "BCD", "multi": true, "years": ["107"], "cite": "Neligan Volume 6, Ch33 p727", "conflict": "", "etype": "ai", "expl": "", "key": "正確BCD:spinal accessory→suprascapular(ER)、medial triceps→axillary(abduction)、double fascicular transfer(elbow flexion)。", "peropt": {"A": "✗AIN→ulnar deep motor為手內在肌重建(非upper plexus肩肘)。", "B": "spinal accessory→suprascapular(肩外旋)，正確。", "C": "medial triceps→axillary(外展)，正確。", "D": "double fascicular transfer(屈肘)，正確。", "E": "✗非此類標準重建。"}, "src": "NG", "sub": "D"}, {"id": "NG106-1", "stem": "在復位Bennett fracture位移的掌骨時，需克服哪些造成掌骨位移肌肉或是韌帶的施力？", "opts": {"A": "Anterior oblique ligament", "B": "Adductor pollicis and Abductor pollicis longus (APL)", "C": "APL and Abductor pollicis brevis", "D": "Adductor pollicis and Flexor pollicis longus", "E": "Anterior oblique ligament and adductor pollicis"}, "ans": "B", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, p157", "conflict": "", "etype": "ai", "expl": "", "key": "Bennett骨折變形力:APL(近端/背/橈側牽引)+adductor pollicis。", "peropt": {"A": "anterior oblique ligament使Bennett fragment留原位(非位移力)。", "B": "✔答案:APL+adductor pollicis為變形力。", "C": "APB非主要。", "D": "FPL非主要。", "E": "anterior oblique ligament非位移力。"}, "src": "NG", "sub": "G"}, {"id": "NG106-2", "stem": "當wrist嚴重受傷而呈現perilunate dislocation，lunate經由哪個位置進入carpal tunnel而造成median nerve compression，因此需要將lunate緊急復位？", "opts": {"A": "Space of Parona", "B": "Ligament of Struthers", "C": "Arcade of Frohse", "D": "Space of Poirier", "E": "Osborne's ligament"}, "ans": "D", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, p174-175", "conflict": "", "etype": "ai", "expl": "", "key": "Perilunate dislocation時lunate經Space of Poirier(掌側關節囊薄弱處)脫入carpal tunnel。", "peropt": {"A": "Space of Parona在前臂遠端。", "B": "ligament of Struthers在肘。", "C": "Arcade of Frohse=PIN壓迫處。", "D": "✔答案:Space of Poirier。", "E": "Osborne's ligament=cubital tunnel。"}, "src": "NG", "sub": "G"}, {"id": "NG106-3", "stem": "下列有關Carpal tunnel 的敘述何者錯誤？", "opts": {"
