<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手外科·上肢 綜合題庫</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}
</style></head><body>
<div class="wrap">
<header>
 <div class="htop">
  <div><div class="htitle">手外科·上肢 綜合題庫</div>
   <div class="hsub" id="hsub">GS＋NG · 依子類複習</div></div>
  <div class="stat"><b id="sc">0</b>/<span id="tot">0</span> 掌握<br><span id="acc">正確率 —</span><br><span class="saved" id="save">自動存檔</span></div>
 </div>
 <div class="bar2"><span class="seen" id="pseen"></span><span class="mast" id="pmast"></span></div>
 <div class="blabel"><span id="lseen">已作答 0</span><span id="lmast">已掌握 0</span></div>
 <div class="tabs">
  <div class="tab on" id="tabHome">首頁</div>
  <div class="tab" id="tabAll">全部</div>
  <div class="tab" id="tabWrong">錯題<span id="wc"> (0)</span></div>
  <div class="tab" id="tabStar">收藏<span id="stc"> (0)</span></div>
  <div class="tab" id="tabData">存檔</div>
 </div>
</header>
<div id="app"></div></div>
<div class="foot"><div class="in">
 <button class="btn" id="act">送出答案</button>
 <button class="icon" id="pick">題號</button>
</div></div>
<div class="ovl" id="ovl"><div class="sheet">
 <div class="h3"><span id="pickTitle">選擇題號</span><button class="close" id="closePick">關閉</button></div>
 <div class="grid" id="grid"></div>
 <div class="legend">
  <i><span class="dot" style="background:#fff"></span>未做</i>
  <i><span class="dot" style="background:var(--rightbg);border-color:#BFE0C8"></span>答對</i>
  <i><span class="dot" style="background:var(--green);border-color:var(--green)"></span>已掌握</i>
  <i><span class="dot" style="background:var(--wrongbg);border-color:#E7C3BC"></span>答錯</i>
  <i><span style="color:var(--star)">★</span> 收藏</i>
 </div>
</div></div>
<script>
const DATA=[{"id": "NG113-1", "stem": "關於手部骨折，以下哪一個是錯誤的?", "opts": {"A": "Metacarpal fractures usually have apex volar angulation", "B": "Proximal phalanx fractures usually have apex volar angulation due to pull of the interosseous muscles", "C": "Fractures proximal to FDS insertion have dorsal angulation to flexion of distal portion", "D": "Fracture distal to FDS insertion have volar angulation due to flexion of the proximal fragment", "E": "Dislocation means stabilizing structures (collateral ligaments, volar plate, dorsal capsule) are disrupted."}, "ans": "A", "multi": false, "years": ["113"], "cite": "Neligan vol 6. Chapter 7 Page 147", "conflict": "", "etype": "orig", "expl": "Metacarpal fractures most commonly have an apex dorsal angulation while fractures of the proximal phalanx tend to have apex volar angulation secondary to the pull of the interosseous muscles", "key": "", "peropt": {}, "src": "NG", "sub": "G"}, {"id": "NG113-2", "stem": "以下哪一項不是Scaphoid復位內固定（ORIF）的適應症？", "opts": {"A": "Displaced fracture", "B": "Proximal pole fractures regardless of displacement", "C": "Associated perilunate injuries", "D": "Closed fractures", "E": "Fractures not healing after trial immobilization 3-4 months"}, "ans": "D", "multi": false, "years": ["113"], "cite": "Neligan vol 6. Chapter 8 Page 177", "conflict": "", "etype": "ai", "expl": "", "key": "單純『閉鎖性骨折』不是ORIF適應症；無位移穩定骨折可石膏。ORIF適應症=位移、近端極、合併perilunate、保守失敗。", "peropt": {"A": "位移性骨折→需復位固定，是適應症。", "B": "近端極骨折不論位移都建議固定(血供差、易nonunion)，是適應症。", "C": "合併perilunate損傷需手術，是適應症。", "D": "✔答案：單純閉鎖性骨折本身非適應症；無位移穩定者可石膏保守。", "E": "石膏3-4個月未癒合(nonunion)→手術，是適應症。"}, "src": "NG", "sub": "G"}, {"id": "NG113-3", "stem": "關於手部構造的敘述，下列何者為錯？", "opts": {"A": "Kaplan's cardinal line與從中指尺側向內側延伸的縱向線的交點為正中神經運動支(motor branch of the median nerve)。", "B": "拇指及其掌骨在腕掌骨關節(carpometacarpal joint)具有廣泛的活動範圍。五個內在肌肉(intrinsic muscles)和四個外在肌肉(extrinsic muscles)對於拇指的定位(positioning)和活動具有特殊影響力。", "C": "Grayson's ligaments位於神經血管束(neurovascular bundle)的背側，Cleland's ligaments位於神經血管束的掌側，兩者為手指筋膜的組成成分，有助於固定軸向平面的皮膚(anchor the axial plane skin)。", "D": "腕舟骨的近端血液供應較差，於近端(proximal pole)骨折後易發生不癒合(nonunion)。", "E": "Checkrein ligament是一種不正常的結構，僅在纖維化後的近端指關節間(proximal interphalangeal joint)出現。"}, "ans": "C", "multi": false, "years": ["112", "113", "114"], "cite": "Neligan, 4th Edition, vol.6, Chapter1 page 2, 5, 7, 10, 13", "conflict": "選項改寫/重排家族(跨年)：本列=C；另有 A(115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Grayson's ligament在NV bundle『掌側』、Cleland's在『背側』(Grayson=Ground地/掌，Cleland=Ceiling天/背)。", "peropt": {"A": "Kaplan cardinal line交點定位正中神經recurrent motor branch，正確。", "B": "拇指CMC活動範圍大、5內在+4外在肌，正確。", "C": "✔答案(錯)：Grayson's在掌側、Cleland's在背側，本選項對調。", "D": "舟狀骨近端血供差(retrograde)、易nonunion，正確。", "E": "Checkrein ligament與PIP屈曲攣縮相關，本題視為正確。"}, "src": "NG", "sub": "A"}, {"id": "NG113-4", "stem": "下列各項手部檢查，何者為錯？", "opts": {"A": "Eichoff test：要求患者的檢測手的四隻手指彎曲抓住檢測手拇指。患者的檢測手手腕向尺側偏移。這是為了檢測de Quervain's tenosynovitis.", "B": "Phalen's test：將患者的手腕最大程度地向掌側彎曲(maximum palmar flexion)，保持2分鐘。這個測試被用作對carpal tunnel syndrome的一種刺激性測試。", "C": "Froment's test：要求患者在拇指的尺側指尖(ulnar tip of the thumb)和食指的橈側指尖(radial tip of the index finger)之間夾著一張紙。檢查者慢慢拉開紙，同時鼓勵患者繼續夾住紙。這是為了評估尺神經的運動功能", "D": "Jeanne's test：患者將手放在桌子上，拇指朝上。檢查者向下按壓拇指近端指骨(proximal phalanx of the thumb)。這是為了de Quervain's tendinitis。", "E": "Wartenberg's sign：要求患者保持手指內收(fingers adducted)，並使MCP、PIP和DIP關節完全伸展(fully extended)。這是為了評估尺神經的運動功能。"}, "ans": "D", "multi": false, "years": ["112", "113", "114", "115"], "cite": "Neligan, 4th Edition, vol.6, Ch2 p53, 60, 61", "conflict": "", "etype": "ai", "expl": "", "key": "Jeanne's sign是『尺神經』測試(key pinch時拇指MCP過度伸展代償)，非de Quervain。", "peropt": {"A": "Eichoff/Finkelstein→de Quervain，正確。", "B": "Phalen's→CTS誘發測試，正確。", "C": "Froment's→尺神經運動(adductor pollicis無力、FPL代償)，正確。", "D": "✔答案(錯)：Jeanne's sign測尺神經，不是de Quervain tendinitis。", "E": "Wartenberg's sign→尺神經(小指無法內收)，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG113-5", "stem": "關於Tendon repair，以下哪種縫合法是two strands？", "opts": {"A": "Modified Savage method", "B": "Modified Kessler method", "C": "Winters-Gelberman method", "D": "Strickland method", "E": "All of above"}, "ans": "B", "multi": false, "years": ["109", "112", "113"], "cite": "Neligan, 4th Edition, vol.6, Ch9 p200-201", "conflict": "", "etype": "ai", "expl": "", "key": "Modified Kessler=2-strand core suture。Savage=6、Strickland=4股。", "peropt": {"A": "Modified Savage=6股。", "B": "✔Modified Kessler=2股core suture。", "C": "Winters-Gelberman=多股(非2)。", "D": "Strickland=4股。", "E": "非全部。"}, "src": "NG", "sub": "F"}, {"id": "NG113-6", "stem": "Flexor tendon 的手術修復不應有以下何者", "opts": {"A": "4-6 core suture strands", "B": "Core suture purchase of 7-10mm", "C": "At least 2mm diameter locking tendon-suture junction", "D": "Core suture calibers 3.0 or 4.0", "E": "Maximize extensive exposure of sutures over the tendon surface"}, "ans": "E", "multi": false, "years": ["113"], "cite": "Neligan vol 6 chapter 9 Page 204", "conflict": "", "etype": "ai", "expl": "", "key": "強力flexor repair原則:core股數多、purchase 7-10mm、locking≥2mm、caliber 3-0/4-0；縫線『不應』大面積外露(增加摩擦阻力)。", "peropt": {"A": "4-6 core strands→建議(股數多較強)，應有。", "B": "purchase 7-10mm→建議。", "C": "≥2mm locking junction→建議。", "D": "caliber 3-0/4-0→建議。", "E": "✔答案：縫線大面積外露於腱表面會增加gliding阻力，應埋入而非外露。"}, "src": "NG", "sub": "F"}, {"id": "NG113-7", "stem": "以下哪種狀況是Replantation手術的\"absolute\" contraindication？", "opts": {"A": "Mentally unstable patients", "B": "Multiple segmental injury in the amputated part", "C": "A patient with life-threatening injuries or multiple medical problems.", "D": "Prolonged warm ischemia time.", "E": "Extreme contamination."}, "ans": "C", "multi": false, "years": ["113"], "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 11. P249", "conflict": "", "etype": "orig", "expl": "The only absolute contraindication to replantation is preserving life over limb. A patient with life-threatening injuries or multiple medical problems who cannot withstand prolonged surgery should not undergo replantation.", "key": "", "peropt": {}, "src": "NG", "sub": "L"}, {"id": "NG113-8", "stem": "關於手的生物力學以下何者正確? (複選)", "opts": {"A": "All the fingers converge in a cone over the anatomical center of the hand - the long finger MCPJ", "B": "In the correct alignment, all fingers point to the tubercle of the scaphoid bone when flexed individually", "C": "The collateral ligaments of the MCPJ are loose in extension and tight in flexion", "D": "FDP to 3rd, 4th and 5th digits work from a common muscle belly and is less independent, but each FDS has individual muscle bellies and can act independently", "E": "Intrinsic muscles of the hand flex the MCPJ but extend the IPJ"}, "ans": "ABCDE", "multi": true, "years": ["113"], "cite": "Neligan Vol 6. Chap 1 page 8, Fig 1.8, page 11 Fig 1.13, page.13 Fig. 1.15, page 23, box 1.5, page 33 box 1.6, page 36 Fig 1.42", "conflict": "", "etype": "ai", "expl": "", "key": "全部正確(手部生物力學基本原則)。", "peropt": {"A": "屈曲時各指會聚向中指MCPJ(手的解剖中心)，正確。", "B": "各指單獨屈曲指向舟狀骨結節(判斷旋轉對位)，正確。", "C": "MCPJ側韌帶伸直鬆、屈曲緊(cam effect；故固定於屈曲位防攣縮)，正確。", "D": "FDP第3/4/5指共肌腹、獨立性差；FDS各有肌腹可獨立，正確。", "E": "內在肌屈MCPJ、伸IPJ，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG113-9", "stem": "下列關於手部 extensor 的敘述何者正確？ (複選)", "opts": {"A": "第二跟第三個compartment 間可摸到一個突起，稱為 Lister's tubercle。", "B": "De Quervain's disease 發生在手腕 extensor retinaculum 的第二個 compartment。", "C": "EIP tendon 位於食指 EDC 的 radial site，而 EDM tendon 則位於小指的 ulnar site。", "D": "第四個 compartment 包含五條手指的伸肌腱 (four extensor digitorum communis EDC tendons和extensor indicis propius EIP tendon)。", "E": "第三個 compartment 的 extensor pollicis longus tendon 會在 extensor carpi radialis longus and brevis 上方橫越過第二個 compartment。"}, "ans": "ADE", "multi": true, "years": ["112", "113", "114", "115"], "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 10. P228.", "conflict": "選項改寫/重排家族(跨年)：本列=ADE；另有 BCD(108)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確為ADE。De Quervain在第1 compartment；EIP位於食指EDC的尺側/深側(非橈側)。", "peropt": {"A": "Lister's tubercle在第2/3 compartment間，正確。", "B": "✗De Quervain在『第1』compartment，非第2。", "C": "✗EIP位於食指EDC的尺側/深側(非radial)。", "D": "第4 compartment含4條EDC+EIP，正確。", "E": "第3 compartment的EPL繞Lister's tubercle跨越第2 compartment上方，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG113-10", "stem": "關於Thumb reconstruction，以下哪些敘述是正確的？ (複選)", "opts": {"A": "Mobility, stability, sensibility, length, appearance 都是重建必要的考量。", "B": "Moberg flap 常用於重建 dorsal middle third(1/3) defect。", "C": "Distal third (1/3) loss 的主要目標在soft tissue restoration。", "D": "Middle third (1/3) loss 的主要目標在restoration of length。", "E": "Proximal third (1/3) 重建主要以microsurgery為主。"}, "ans": "ACDE", "multi": true, "years": ["112", "113"], "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 13. P303-305.", "conflict": "選項改寫/重排家族(跨年)：本列=ACDE；另有 ABCD(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Moberg flap用於拇指『掌側(volar)』缺損,非dorsal。", "peropt": {"A": "考量mobility/stability/sensibility/length/appearance，正確。", "B": "✗Moberg flap用於掌側(volar)缺損(非dorsal)。", "C": "distal 1/3→soft tissue restoration，正確。", "D": "middle 1/3→restoration of length，正確。", "E": "proximal 1/3→microsurgery，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG113-11", "stem": "下列有關tendinopathy，何者錯誤?", "opts": {"A": "De Quervain's tenosynovitis主要發生在radial side of wrist，診斷最主要由病史和理學檢查決定。", "B": "De Quervain's tenosynovitis手術須將第一個dorsal compartment的兩條肌腱都找出並放鬆。", "C": "Lateral epicondylitis又叫做tennis elbow，疼痛在腕部extension時會加劇", "D": "Trigger digit的診斷主要由影像檢查決定", "E": "Trigger digit是最常見的手部疾病，治療包括rest, splinting, steroid injection, open or percutaneous surgery"}, "ans": "D", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, vol.6, Ch18 p392-393", "conflict": "選項改寫/重排家族(跨年)：本列=D；另有 E(112)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "orig", "expl": "D: The diagnosis of trigger digit is relatively straightforward and relies on history and physical examination.", "key": "", "peropt": {}, "src": "NG", "sub": "F"}, {"id": "NG113-12", "stem": "下列關於nerve entrapment syndrome之敘述，何者正確？", "opts": {"A": "Lacertus syndrome：motor symptoms比sensory symptoms早出現。", "B": "Carpal tunnel syndrome：約45%懷孕女性第三孕期時會出現，一旦發生就不會改善", "C": "Anterior interosseous syndrome：pure motor weakness，Tinel's test可能呈現陽性。", "D": "Ulnar nerve compression in Guyon's canal：依據壓迫位置分為三區，zone I只會有motor symptoms。", "E": "Cubital tunnel syndrome：可能壓迫位置包含arcade of Struthers及ligament of Osborne，前者為最常見的位置。"}, "ans": "A", "multi": false, "years": ["112", "113"], "cite": "Neligan, 4th Edition, vol.6, Ch24 p529, 534, 537, 538", "conflict": "選項改寫/重排家族(跨年)：本列=A；另有 B(109/110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Lacertus(近端正中神經)運動先於感覺。AIN純運動Tinel陰性;Guyon zone I混合;cubital最常見在Osborne's ligament。", "peropt": {"A": "✔Lacertus syndrome運動症狀早於感覺，正確。", "B": "✗CTS孕婦第三孕期可達45%，但產後多改善。", "C": "✗AIN純運動、無感覺、Tinel陰性。", "D": "✗Guyon zone I為混合運動+感覺(zone II純運動、III純感覺)。", "E": "✗cubital tunnel最常見卡壓點是Osborne's ligament(非arcade of Struthers)。"}, "src": "NG", "sub": "C"}, {"id": "NG113-13", "stem": "下列何者不是Glomus tumors症狀的classic triad?", "opts": {"A": "特定點的疼痛(point tenderness)", "B": "間歇性、嚴重的疼痛(intermittent, severe pain)", "C": "持續性、嚴重的疼痛(continuous, severe pain)", "D": "對冷敏感Cold hypersensitivity"}, "ans": "C", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, vol.6, Ch15 p348", "conflict": "選項改寫/重排家族(跨年)：本列=C；另有 A(112)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "orig", "expl": "Glomus tumors frequently present subungually. The classic triad of symptoms is cold hypersensitivity, intermittent severe pain, and point tenderness.", "key": "", "peropt": {}, "src": "NG", "sub": "K"}, {"id": "NG113-14", "stem": "下列關於Raynaud's disease與Raynaud syndrome的比較，何者錯誤？", "opts": {"A": "兩者都有triphasic color change。", "B": "Raynaud syndrome的症狀較常有對稱表現", "C": "Raynaud syndrome較常呈現異常Allen test", "D": "Raynaud syndrome常有trophic findings。", "E": "Raynaud's disease好發於女性。"}, "ans": "B", "multi": false, "years": ["112", "113"], "cite": "Neligan, 4th Edition, vol.6, Ch22 p505", "conflict": "選項改寫/重排家族(跨年)：本列=B；另有 E(109/110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "原發Raynaud's disease對稱;續發Raynaud syndrome常不對稱。本選項對調。", "peropt": {"A": "兩者皆triphasic color change，正確。", "B": "✔答案(錯)：對稱的是原發disease；續發syndrome常不對稱。", "C": "續發syndrome常Allen test異常(有structural阻塞)，正確。", "D": "續發syndrome常有trophic changes(潰瘍/壞死)，正確。", "E": "原發disease好發年輕女性，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG113-15", "stem": "下列關於Dupuytren's disease之敘述，何者錯誤？", "opts": {"A": "Percutaneous fasciotomy適合用於isolated palmar cords with MCP joint moderate flexion，不適用於diffuse infiltrating cords、postsurgical recurrence、長期PIP flexion contracture以及deep lateral cords。", "B": "Spiral cord會造成neurovascular bundle往內往淺移動，central cord則會造成DIP joint flexion contracture", "C": "位於PIP joint背側的knuckle pads稱為Garrod's nodules，若病人有此症狀，則有Peyronie's disease和Ledderhose's disease的機會較高，但疾病嚴重度或功能影響程度未必較嚴重", "D": "手術適應症為MCP joint contracture 30°及任何程度的PIP joint contracture。相較於後者，前者較不緊急", "E": "最早出現的症狀為手掌dimpling以及distal palmar crease distortion (Hugh Johnson sign)。最常發生於無名指，第二為小指。"}, "ans": "B", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, vol.6, Ch27 p375, 377, 378, 379, 381, 382", "conflict": "選項改寫/重排家族(跨年)：本列=B；另有 D(112), A(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "orig", "expl": "B: The central cord acts in concert with the spiral cord, contributing to PIP joint contracture.", "key": "", "peropt": {}, "src": "NG", "sub": "I"}, {"id": "NG113-16", "stem": "Hypoplastic thumb represents a wide spectrum of functional and aesthetic differences，根據分類，描述為the pouce flottant or floating thumb 為何種type ?", "opts": {"A": "Type I", "B": "Type II", "C": "Type III", "D": "Type IV", "E": "Type V"}, "ans": "D", "multi": false, "years": ["113", "114", "115"], "cite": "Neligan, 4th Edition, vol.6, Ch27 p595-600", "conflict": "", "etype": "orig", "expl": "Type I: mild hypoplasia / Type II: moderate hypoplasia / Type III: severe hypoplasia / Type IV: floating thumb / Type V: aplasia", "key": "", "peropt": {}, "src": "NG", "sub": "O"}, {"id": "NG113-17", "stem": "Radial longitudinal deficiency (RLD) is the most common upper limb longitudinal deficiency，基於modified classification of radial longitudinal deficiency，termed a \"miniature radius\" with proximal and distal physes present but hypoplasia was noted over proximal and distal radius，此描述為何種type?", "opts": {"A": "Type 0", "B": "Type 1", "C": "Type 2", "D": "Type 3", "E": "Type 4"}, "ans": "C", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, vol.6, Ch26 p574-576", "conflict": "", "etype": "ai", "expl": "", "key": "Type 2=miniature radius(近遠端physes皆在但hypoplastic)。", "peropt": {"A": "Type 0=僅carpal缺損、橈骨長度正常。", "B": "Type 1=distal physis差、橈骨略短。", "C": "✔Type 2=miniature radius(兩physes在但發育不良)。", "D": "Type 3=部分橈骨缺如(近或遠physis缺)。", "E": "Type 4=橈骨完全缺如(最常見型)。"}, "src": "NG", "sub": "O"}, {"id": "NG113-18", "stem": "關於timing of hand formation下列何者為是? (複選)", "opts": {"A": "Development of arm bud is 27 days after fertilization", "B": "Elongation of arm bud is 38-40 days after fertilization", "C": "Formation of hand paddle is 34-38 days after fertilization", "D": "Early separation of digits is 34-36 days after fertilization", "E": "Formation of fingernails begins is week 12-13 after fertilization"}, "ans": "AC", "multi": true, "years": ["113", "114", "115"], "cite": "Neligan, 4th Edition, vol.6, Ch25 p550", "conflict": "", "etype": "ai", "expl": "", "key": "上肢發育時序:arm bud出現~26-27天、hand paddle/plate~34-38天、手指分化(apoptosis)~47-53天。", "peropt": {"A": "✔arm bud約受精後27天出現，正確。", "B": "✗elongation時序有誤(此段約在32天前後，非38-40天)。", "C": "✔hand paddle(手板)約34-38天形成，正確。", "D": "✗手指早期分離約在47-53天(apoptosis)，非34-36天。", "E": "✗指甲形成時序有誤(約第10週前後開始)，非12-13週。"}, "src": "NG", "sub": "O"}, {"id": "NG113-19", "stem": "下列關於手部osteoarthritis (OA)之敘述，何者錯誤？(複選)", "opts": {"A": "CMC arthritis的手術依據軟骨是否受影響而決定，early stage手術目標為維持關節穩定、預防進一步subluxation、palmar cartilage offload，late stage手術目標則為減少拇指動作時疼痛。", "B": "DIP joint OA的常見表現包含DIP關節變大並出現knobby protuberances，稱為Heberden's nodes。Radiographic appearance與疾病嚴重程度相關，且Heberden's nodes為手術適應症之一。", "C": "PIP joint OA的手術方式包含arthrodesis和implant arthroplasty，vascularized joint transfer雖然可行但outcome不佳。", "D": "最常發生於distal interphalangeal joints of the fingers和carpometacarpal joint of the thumb", "E": "Carpometacarpal (CMC) arthritis有兩種分類系統，其中Burton classification合併影像學及臨床症狀評估，是最常用的分類系統。"}, "ans": "BE", "multi": true, "years": ["112", "113"], "cite": "Neligan, 4th Edition, vol.6, Ch20 p440, 443, 446, 447, 462, 464", "conflict": "選項改寫/重排家族(跨年)：本列=BE；另有 BD(109/110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "錯誤為BE。Heberden's nodes影像與症狀不一定相關、非手術適應症;CMC最常用Eaton(非Burton)分類。", "peropt": {"A": "CMC arthritis手術依cartilage分期(early穩定/晚期減痛)，正確。", "B": "✔錯：Heberden's nodes影像與症狀不一定相關，且非手術適應症。", "C": "PIP OA可arthrodesis/implant；vascularized joint transfer可行但outcome差，正確。", "D": "手部OA最常見DIP及拇指CMC，正確。", "E": "✔錯：CMC最常用Eaton classification，非Burton。"}, "src": "NG", "sub": "J"}, {"id": "NG113-20", "stem": "下列有關手部常見腫瘤敘述，何者正確？(複選)", "opts": {"A": "Glomus tumors通常位於subungual area，典型的症狀是碰到冷會劇烈疼痛。", "B": "Verruca vulgaris通常一至二年內會spontaneous resolution，但也有malignant transformation的病例。", "C": "Cutaneous horns一般建議先incisional biopsy。", "D": "Keratoacanthoma和squamous cell carcinoma很像，但是前者的生長速度較快且central necrosis更明顯。", "E": "Ganglion cysts常見於背側(dorsal region)；Giant cell tumors常見於掌側(volar aspect)"}, "ans": "ABDE", "multi": true, "years": ["113"], "cite": "Neligan, 4th Edition, vol.6, Ch15 p337, 338, 339, 342, 343, 347, 352", "conflict": "選項改寫/重排家族(跨年)：本列=ABDE；另有 E(110), CD(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確ABDE;Cutaneous horns建議excisional biopsy(非incisional)。", "peropt": {"A": "Glomus subungual、冷痛，正確。", "B": "verruca 1-2年自限，正確。", "C": "✗cutaneous horns建議excisional biopsy(非incisional)。", "D": "keratoacanthoma生長快/central necrosis，正確。", "E": "ganglion背側;GCT掌側，正確。"}, "src": "NG", "sub": "P"}, {"id": "NG113-21", "stem": "關於小兒骨頭生長板傷害(physeal injuries)，下列敘述何者正確? (複選)", "opts": {"A": "創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染、腫瘤及輻射暴露等也會影響骨頭生長", "B": "Salter-Harris classification是最為廣泛使用的分類法", "C": "Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign", "D": "Salter-Harris type III&IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮", "E": "Peterson type VI是開放性傷害伴隨有生長板的損失(loss of physis)，相當於Salter-Harris type V"}, "ans": "ABCD", "multi": true, "years": ["113", "114"], "cite": "Neligan, Peter C. Volume 6, chap 30, p 673", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABCD。Peterson type VI是開放傷+physis損失，Salter-Harris無type VI，不等同SH type V。", "peropt": {"A": "創傷是生長板傷害最常見原因(感染/腫瘤/輻射亦影響)，正確。", "B": "Salter-Harris分類最廣泛使用，正確。", "C": "SH type II最常見、有Thurston-Holland fragment，正確。", "D": "SH type III&IV牽涉germinal layer與關節面、影響生長，正確。", "E": "✗Peterson type VI=開放傷伴physis損失;SH分類無type VI，兩者不等同。"}, "src": "NG", "sub": "G"}, {"id": "NG113-22", "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "上肢方面會出現brachyclinodactyly of the thumb, complex syndactyly of index/long/ring finger, symbrachyphalangism 和 simple syndactyly of the first web", "B": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變(sporadic)", "C": "手的變形可區分為三型：the flat, \"spade\" hand (type I), the constricted cupped, \"mitten\" hand (type II), 和the coalesced \"rosebud\" hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5, followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有impaired language development and motor skill"}, "ans": "BCDE", "multi": true, "years": ["113"], "cite": "Plastic Surgery, 4rd Edition, Neligan, Peter. Volume VI. Chapter 28. P.624, P.631", "conflict": "選項改寫/重排家族(跨年)：本列=BCDE；另有 ACDE(109/115), ABCDE(108/110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確BCDE。Apert上肢first web為complex/complicated syndactyly，非simple。", "peropt": {"A": "✗first web為complex/complicated syndactyly(非simple)，敘述有誤。", "B": "FGFR2突變、多數sporadic，正確。", "C": "手三型spade(I)/mitten(II)/rosebud(III)，正確。", "D": "併指矯正順序，正確。", "E": "常合併語言/動作發展遲緩，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG113-23", "stem": "關於brachial plexus injuries, 以下敘述何者正確？(複選)", "opts": {"A": "Chuang's classification將其分成四個level：Level I: preganglionic root ; Level II: postganglionic spinal nerve; Level III: pre- and retro-clavicular, Level IV: infraclavicular，其中最常見的是level IV", "B": "Hoffman-Tinel's sign 是評估受傷神經再生位置的一個重要clinical sign", "C": "多數建議要Early exploration，包含可以早期診斷以及避免scarring而difficult dissection", "D": "MRI為主要評估BPI的影像工具", "E": "Level IV injury有很高的機率合併有血管受傷"}, "ans": "BDE", "multi": true, "years": ["113"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, chapter 36, page 815, 816, 818, 820, 821, 832", "conflict": "", "etype": "ai", "expl": "", "key": "正確為BDE。最常見是Level I(~70%);多數不建議閉鎖傷早期探查。", "peropt": {"A": "✗最常見為Level I(preganglionic root,~70%)，非Level IV。", "B": "Hoffman-Tinel's sign評估神經再生位置，正確。", "C": "✗多數臂神經叢外科不建議閉鎖傷早期探查(觀察利大於弊)。", "D": "MRI為主要影像工具，正確。", "E": "Level IV(cords)常合併血管損傷(~30%)，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG113-24", "stem": "關於vascular malformation的描述, 下列何者錯誤?", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel-Trenaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination", "D": "Sclerotherapy可以用來治療venous malformation和lymphatic malformation", "E": "Parkes Weber 為一slow flow的 vascular malformation"}, "ans": "E", "multi": false, "years": ["113"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. VolumeVI, Chapter 31, page 689, 696, 699, 708, 711", "conflict": "", "etype": "ai", "expl": "", "key": "Parkes Weber為fast-flow(有AV分流)，非slow-flow。", "peropt": {"A": "Sturge-Weber=CM出現在三叉神經(CN V)分布，正確。", "B": "Klippel-Trenaunay=slow-flow capillary-lymphatico-venous malformation，正確。", "C": "AVM治療embolization/resection/combination，正確。", "D": "Sclerotherapy可治VM與LM，正確。", "E": "✔答案(錯)：Parkes Weber為fast-flow(含AV shunt)，非slow-flow。"}, "src": "NG", "sub": "K"}, {"id": "NG113-25", "stem": "下列何者與Maffucci syndrome無關？", "opts": {"A": "多發性軟骨瘤 (enchondroma)", "B": "多發性纖維瘤 (fibroma)", "C": "內臟血管瘤", "D": "軟組織血管瘤", "E": "惡性轉變 (malignant transformation) 的風險高"}, "ans": "B", "multi": false, "years": ["113"], "cite": "Neligan vol 6，Ch 29. page 668- 669", "conflict": "", "etype": "ai", "expl": "", "key": "Maffucci=多發enchondroma+軟組織/內臟『血管瘤』，與『纖維瘤』無關。", "peropt": {"A": "多發enchondroma→Maffucci核心，相關。", "B": "✔答案：多發性纖維瘤(fibroma)與Maffucci無關。", "C": "內臟血管瘤，相關。", "D": "軟組織血管瘤→Maffucci核心，相關。", "E": "惡性轉變風險高(chondrosarcoma 17-50%)，相關。"}, "src": "NG", "sub": "P"}, {"id": "NG113-26", "stem": "關於nerve injury及治療的描述, 以下何者錯誤?", "opts": {"A": "electrophysiological study需在受傷後2-3週內做or combination", "B": "Sunderland和Mackinnon 將神經受傷分成六個degree", "C": "Third degree的神經受傷不能保證神經能完全恢復", "D": "如果確定有nerve injury, 進行nerve repair 的最佳時間在受傷後的48小時內", "E": "超過三週的delayed nerve repair 通常就需要nerve graft"}, "ans": "A", "multi": false, "years": ["108", "113"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, Chapter 32, page 719, 722, 723, 728", "conflict": "選項改寫/重排家族(跨年)：本列=A；另有 C(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "神經去神經化的電生理變化要傷後3-4(至6)週才出現，2-3週內做/判讀太早。", "peropt": {"A": "✔答案(錯)：denervation電生理變化3-4(至6)週才出現，2-3週內不可靠。", "B": "Sunderland/Mackinnon分6度，正確。", "C": "3rd degree不保證完全恢復，正確。", "D": "銳器clean-cut最佳修復在48hr內，正確。", "E": ">3週delayed repair常需nerve graft，正確。"}, "src": "NG", "sub": "E"}, {"id": "NG113-27", "stem": "使用free-functioning muscle transfer來進行上肢重建, 以下敘述何者敘述有誤？", "opts": {"A": "手術前關節要能夠full passive movement", "B": "Cutaneous sensibility要在tendon/muscle transfer之前就能夠恢復完成", "C": "Gracilis muscle是最常被使用的一塊肌肉皮瓣", "D": "Gracilis muscle flap harvest是要在leg in full abduction中，在上面每5cm標記肌肉張力長度", "E": "在donor nerve的選擇上, 若要重建finger extension function, 會接到anterior interosseous nerve"}, "ans": "E", "multi": false, "years": ["113"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, Chapter 35, page 803, 804, 806, 810", "conflict": "", "etype": "ai", "expl": "", "key": "重建手指『伸直』用PIN;AIN用於屈指。", "peropt": {"A": "術前關節須full passive ROM，正確。", "B": "移植前先恢復皮膚感覺，正確。", "C": "Gracilis最常用，正確。", "D": "取gracilis時leg full abduction、每5cm標記張力長度，正確。", "E": "✔答案(錯)：重建手指伸直用posterior interosseous nerve(PIN)，非AIN。"}, "src": "NG", "sub": "D"}, {"id": "NG113-28", "stem": "下列何者並非tendon transfer的重建原則?", "opts": {"A": "soft tissue equilibrium", "B": "adequate strength of donor muscle", "C": "synergy of transfer", "D": "multiple function for each transferred tendon", "E": "direct line of pull"}, "ans": "D", "multi": false, "years": ["110", "113"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume 6, chap 34, p767", "conflict": "", "etype": "ai", "expl": "", "key": "肌腱轉位原則:one tendon one function(非多重功能)。", "peropt": {"A": "soft tissue equilibrium，是原則。", "B": "adequate donor strength，是原則。", "C": "synergy，是原則。", "D": "✔答案：原則是one tendon one function，非每條轉位肌腱多重功能。", "E": "direct line of pull，是原則。"}, "src": "NG", "sub": "C"}, {"id": "NG113-29", "stem": "關於upper limb allotransplantation術後排斥現象(rejection)的敘述何者錯誤?", "opts": {"A": "急性排斥是接受者的T-cell或antibody所以引發的免疫反應", "B": "皮膚是排斥反應最主要的目標，因此觀察皮膚的變化是最重要的臨床監測項目", "C": "移植術後一年內如果皮膚出現排斥的表現, 或者滿一年就應安排皮膚切片檢查", "D": "急性排斥的嚴重程度是依照Banff classification做分類", "E": "急性排斥在顯微鏡下的表現包括intimal hyperplasia and sub-intimal foamy histiocytes in the vessels of the skin, or muscle and tissue fibrosis"}, "ans": "E", "multi": false, "years": ["108", "109", "113", "114"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, Chapter 38, page 872, 873", "conflict": "", "etype": "ai", "expl": "", "key": "intimal hyperplasia、foamy histiocytes、纖維化是『慢性』排斥特徵，非急性。", "peropt": {"A": "急性排斥為T-cell/antibody媒介，正確。", "B": "皮膚是主要標的、以觀察皮膚監測，正確。", "C": "一年內出現排斥或滿一年應安排皮膚切片，正確。", "D": "依Banff classification分級，正確。", "E": "✔答案(錯)：intimal hyperplasia、sub-intimal foamy histiocytes、纖維化屬『慢性』排斥;急性=血管周淋巴球浸潤、水腫、紅斑。"}, "src": "NG", "sub": "M"}, {"id": "NG113-30", "stem": "關於target muscle reinnervation for shoulder disarticulation, 以下敘述何者正確?", "opts": {"A": "Musculocutaneous Nerve -> Clavicle head of Pectoralis Major", "B": "Median Nerve -> The largest motor nerve innervating sternal head of pectoralis major", "C": "Radial nerve -> thoracodorsal or long thoracic nerve", "D": "Ulnar Nerve -> Lateral motor nerve innervating sternal head of pectoralis major or minor", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["108", "109", "113", "114"], "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, chapter 40, page 901", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆是(標準shoulder disarticulation TMR神經配置)。", "peropt": {"A": "Musculocutaneous→pec major鎖骨頭，正確。", "B": "Median→pec major胸骨頭最大運動神經，正確。", "C": "Radial→thoracodorsal或long thoracic，正確。", "D": "Ulnar→pec major/minor胸骨頭外側運動神經，正確。", "E": "✔以上皆是。"}, "src": "NG", "sub": "E"}, {"id": "NG114-3", "stem": "下列各種臂神經叢regional block的方式，何種相對適用於有pulmonary disease或是coagulopathy的病人?", "opts": {"A": "Interscalene block.", "B": "Axillary block.", "C": "Infraclavicular block.", "D": "Supraclavicular block.", "E": "All of above."}, "ans": "B", "multi": false, "years": ["112", "114"], "cite": "Neligan, 5th Edition, vol.6, Ch4 p102", "conflict": "", "etype": "ai", "expl": "", "key": "Axillary block遠離胸膜(氣胸風險最低)、位置表淺易壓迫止血→肺病/凝血病較安全。", "peropt": {"A": "Interscalene→易膈神經麻痺(phrenic)、近胸膜，肺病不宜。", "B": "✔Axillary:氣胸風險最低、可壓迫止血。", "C": "Infraclavicular→仍有氣胸風險。", "D": "Supraclavicular→氣胸風險最高(近胸膜)。", "E": "非全部。"}, "src": "NG", "sub": "D"}, {"id": "NG114-4", "stem": "關於Nail and fingertip reconstruction，下列何者為錯?", "opts": {"A": "甲床縫合時應避免過大的張力。", "B": "受傷後的nail deformity，建議要等至少8-12個月後再行評估重建。", "C": "Atasoy flap，Kutler flap 與visor flap都是常用於fingertip重建。", "D": "使用defatted composite graft覆蓋傷口，小於十歲的兒童成功率會比成人高。", "E": "即使手指傷口只有一公分，使用皮瓣重建傷口會比secondary intention獲得更多好處，如形狀與感覺的恢復。"}, "ans": "E", "multi": false, "years": ["112", "114", "115"], "cite": "Neligan, 5th Edition, vol.6, Ch6 p127, 136-139", "conflict": "選項改寫/重排家族(跨年)：本列=E；另有 C(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "~1cm指尖小傷口secondary intention常癒合良好，皮瓣非必然更有利。", "peropt": {"A": "甲床縫合避免過大張力，正確。", "B": "nail deformity等8-12個月再評估重建，正確。", "C": "Atasoy/Kutler/visor flap常用於指尖，正確。", "D": "defatted composite graft在<10歲兒童成功率較高，正確。", "E": "✔答案(錯)：~1cm小傷口secondary intention常癒合佳、外形感覺好，皮瓣非必然更有利。"}, "src": "NG", "sub": "Q"}, {"id": "NG114-5", "stem": "下列關於手部骨折的敘述，何者為錯?", "opts": {"A": "掌骨骨折手術適應症包含：rotational deformity、shortening of 2–3 mm、articular step-off greater than 1 mm、greater than 25% articular involvement、and multiple fractures。", "B": "PIP joint fracture, 若middle phalangeal base於關節面受損比例小於百分之三十，可以不用手術治療。", "C": "生長板骨折（Growth plate fracture）在Salter–Harris classification 中，type II是最常見的。", "D": "對於生長板還沒關閉的小兒骨折，K-wire穿過生長板是絕對禁止，因為可能會造成生長板提早關閉。", "E": "關於Bennett fracture，Bennett fragment由於anterior oblique ligament會留在原處，而剩餘的metacarpal由於APL及adductor pollicis muscles的作用下，會造成橈側背側近側脫位（radial, dorsal, proximal subluxation）。"}, "ans": "D", "multi": false, "years": ["112", "114", "115"], "cite": "Neligan, 5th Edition, vol.6, Ch7 p149, 152, 153, 159, 169", "conflict": "", "etype": "ai", "expl": "", "key": "小兒骨折必要時可用光滑K-wire穿越生長板(對生長干擾小)，非絕對禁止。", "peropt": {"A": "掌骨骨折手術適應症(旋轉、短縮2-3mm、step-off>1mm、關節面>25%、多發)，正確。", "B": "PIP骨折middle phalanx base關節面<30%可保守，正確。", "C": "Salter-Harris type II最常見，正確。", "D": "✔答案(錯)：必要時可用光滑K-wire穿越生長板，非絕對禁止。", "E": "Bennett機制(anterior oblique ligament固定Bennett骨塊、其餘掌骨受APL+adductor pollicis牽拉→橈背近端脫位)，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG114-6", "stem": "Tendon repair，以下哪種縫合法是two strands?", "opts": {"A": "Modified Savage method", "B": "Modified Kessler method", "C": "Winters-Gelberman method", "D": "Strickland method", "E": "All of above"}, "ans": "B", "multi": false, "years": ["114"], "cite": "Neligan, 5th Edition, vol.6, Ch9 p197, 198", "conflict": "", "etype": "ai", "expl": "", "key": "Modified Kessler=2股。", "peropt": {"A": "Savage=6股。", "B": "✔Modified Kessler=2股。", "C": "Winters-Gelberman=多股。", "D": "Strickland=4股。", "E": "非全部。"}, "src": "NG", "sub": "F"}, {"id": "NG114-7", "stem": "下列關於手部intrinsic muscles 的敘述何者為是?", "opts": {"A": "Thenar muscles 包含三塊肌肉: the abductor pollicis brevis, the adductor pollicis muscle and the opponens pollicis", "B": "Lumbrical muscles 伸直MP joints 併彎曲PIP and DIP joints", "C": "Dorsal interosseous muscles 外展拇指及橈側三指，palmar interosseous muscles 則是內收手指", "D": "Pitres–Testut sign 是median nerve 受傷的徵象，病人無法靈活的左右搖擺中指", "E": "病人若無法做出“crossing fingers”，要懷疑有median nerve 受傷的可能"}, "ans": "C", "multi": false, "years": ["107", "112", "114"], "cite": "Neligan, 5th Edition, vol.6, Ch1 p31-37, Ch2 p61", "conflict": "", "etype": "ai", "expl": "", "key": "Dorsal interossei外展(DAB)、palmar interossei內收(PAD)。Lumbricals屈MCP伸IP;Pitres-Testut/crossing fingers為尺神經。", "peropt": {"A": "✗Thenar三肌=APB、FPB、opponens pollicis(adductor pollicis非thenar三肌)。", "B": "✗Lumbricals屈MCP、伸PIP/DIP(本選項寫反)。", "C": "✔Dorsal interossei外展(DAB)、palmar interossei內收(PAD)，正確。", "D": "✗Pitres-Testut sign為尺神經徵象。", "E": "✗無法crossing fingers應懷疑尺神經(靠骨間肌)。"}, "src": "NG", "sub": "A"}, {"id": "NG114-8", "stem": "以下哪種狀況是Replantation手術的“absolute” contraindication?", "opts": {"A": "Mentally unstable patients.", "B": "Multiple segmental injury in the amputated part.", "C": "A patient with life-threatening injuries or multiple medical problems.", "D": "Prolonged warm ischemia time.", "E": "Extreme contamination."}, "ans": "C", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.6 Ch11 p253", "conflict": "", "etype": "ai", "expl": "", "key": "唯一『絕對』禁忌=危及生命/多重內科問題無法承受麻醉(life over limb);其餘為相對禁忌。", "peropt": {"A": "精神不穩→相對禁忌。", "B": "多段截指→相對禁忌。", "C": "✔危及生命/多重內科問題→唯一絕對禁忌。", "D": "長warm ischemia→相對禁忌。", "E": "極度污染→相對禁忌。"}, "src": "NG", "sub": "L"}, {"id": "NG114-10", "stem": "Regarding hand biomechanics: (複選)", "opts": {"A": "All the fingers converge in a cone over the anatomical center of the hand - the long finger MCPJ", "B": "In the correct alignment, all fingers point to the tubercle of the hamate bone when flexed individually", "C": "The collateral ligaments of the MCPJ are loose in extension and tight in flexion", "D": "FDP to 3rd, 4th and 5th digits work from a common muscle belly and is less independent, but each FDS has individual muscle bellies and can act independently", "E": "Intrinsic muscles of the hand flex the MCPJ but extend the IPJ"}, "ans": "ACDE", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.6, Ch1 p7, 10, 13, 30, 33, 36", "conflict": "選項改寫/重排家族(跨年)：本列=ACDE；另有 ABCDE(110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確ACDE。各指屈曲應指向『舟狀骨』結節，非hamate(鉤骨)。", "peropt": {"A": "屈曲會聚中指MCPJ，正確。", "B": "✗各指屈曲指向舟狀骨(scaphoid)結節，非hamate鉤骨。", "C": "MCPJ側韌帶伸鬆屈緊，正確。", "D": "FDP 3/4/5共肌腹、FDS獨立，正確。", "E": "內在肌屈MCP伸IP，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG114-11", "stem": "下列何者是contraindication to replantation? (複選)", "opts": {"A": "53歲男性高處跌落，右手近端食指創傷性截指，合併顱內出血、意識不清。", "B": "45歲女性使用絞肉機，右手食指、中指創傷性多段截指（segmental amputation）， 血管呈現ribbon’s sign.", "C": "2歲男童玩電扇，右手食指中段創傷性截指。", "D": "30歲女性車禍，左手腕近端創傷性截肢，查無其他損傷，意識正常。", "E": "24歲女性，刀傷，右手食指指尖（finger tip）創傷性截指，合併思覺失調症急性發作。"}, "ans": "ABE", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.6, Ch11, p253", "conflict": "選項改寫/重排家族(跨年)：本列=ABE；另有 ADE(108), AD(106)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "再植禁忌為ABE(危及生命、多段+ribbon sign血管avulsion、精神不穩無法配合);兒童單指、腕近端大肢體為適應症。", "peropt": {"A": "✔顱內出血、意識不清(危及生命)→禁忌。", "B": "✔多段截指+ribbon sign(血管嚴重avulsion、品質差)→禁忌。", "C": "2歲兒童單指中段截指→應積極再植(兒童為適應症)，非禁忌。", "D": "手腕近端截肢、無其他傷、意識清→大肢體再植適應症，非禁忌。", "E": "✔思覺失調急性發作(無法配合術後)+僅指尖截指→禁忌。"}, "src": "NG", "sub": "L"}, {"id": "NG114-12", "stem": "關於peripheral nerve，下列何者為非? (複選)", "opts": {"A": "Median nerve穿過carpal tunnel", "B": "無名指與小指的flexor digitorum profundus由median nerve的分支anterior interosseous nerve支配", "C": "Ulnar nerve傷害會造成flexor digitorum superificialis功能缺損", "D": "Radial nerve的分支deep posterior interosseous nerve為純運動神經，管控所有的extensor compartments", "E": "Radial nerve的superficial branch為純感覺神經，負責五根手指背側的感覺，但不包含末端指節"}, "ans": "BCDE", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.6, Ch1, p39-48", "conflict": "選項改寫/重排家族(跨年)：本列=BCDE；另有 ABCDE(107)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "錯誤為BCDE。無名/小指FDP由ulnar nerve支配;FDS由median支配;PIN不管控所有伸肌;radial superficial branch不含指尖末節背側。", "peropt": {"A": "Median nerve穿過carpal tunnel，正確(非答案)。", "B": "✗無名指與小指FDP由ulnar nerve支配(非AIN;AIN管食中指FDP+FPL+PQ)。", "C": "✗FDS由median nerve支配;尺神經傷不造成FDS缺損。", "D": "✗PIN(deep radial)純運動但不管控『所有』伸肌(近端部分另有支配)。", "E": "✗radial superficial branch感覺為橈側三指半背側，且不含指尖末節背側(該處由正中神經背支)。"}, "src": "NG", "sub": "C"}, {"id": "NG114-13", "stem": "請選出Classification of Salter–Harris fractures的正確分類 (複選)", "opts": {"A": "Type 1 is through the physis", "B": "Type 2 extends from the physis toward the shaft", "C": "Type 3 extends from the physis toward the joint", "D": "Type 4 starts in the shaft and extends through the physis and into the joint", "E": "Type 5 is a crush injury of the physis"}, "ans": "ABCDE", "multi": true, "years": ["107", "114"], "cite": "Neligan, 5th Edition, vol.6, Ch7, p149", "conflict": "", "etype": "ai", "expl": "", "key": "Salter-Harris分類I-V全部敘述正確(I過physis、II向shaft、III向joint、IV跨骨骺與關節、V為physis擠壓傷)。", "peropt": {"A": "Type 1過physis，正確。", "B": "Type 2向shaft延伸(Thurston-Holland)，正確。", "C": "Type 3向joint延伸，正確。", "D": "Type 4跨physis與關節，正確。", "E": "Type 5為physis crush injury，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG114-14", "stem": "下列關於上肢infantile hemangioma(IH)的敘述何者正確？ A.IH約在兩週大時開始出現，前九個月內為proliferating phase生長迅速", "opts": {"A": "IH約在兩週大時開始出現，前九個月內為proliferating phase生長迅速", "B": "90%的病患靠病史詢問及理學檢查就能確診", "C": "切片檢查對於診斷通常不太需要，其中對於GLUT1(a glucose transporter)的免疫染色可提供鑑別診斷", "D": "治療以觀察為主，但若出現嚴重傷口問題或病灶過大引起功能障礙則考慮手術治療", "E": "以上皆正確"}, "ans": "E", "multi": false, "years": ["114"], "cite": "Neligan 5th, Vol 6, Ch 37, p 872-873", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(IH自然史、診斷、GLUT1、治療)。", "peropt": {"A": "IH約2週大出現、前~9個月proliferating phase快速生長，正確。", "B": "~90%靠病史+理學檢查確診，正確。", "C": "切片通常不需要;GLUT1免疫染色陽性可鑑別，正確。", "D": "以觀察為主，嚴重併發症/功能障礙才手術，正確。", "E": "✔以上皆正確。"}, "src": "NG", "sub": "K"}, {"id": "NG114-15", "stem": "Which is the most common type of growth plate fracture by Salter-Harris classification?", "opts": {"A": "Type I", "B": "Type II", "C": "Type III", "D": "Type IV", "E": "Type V"}, "ans": "B", "multi": false, "years": ["106", "114"], "cite": "Neligan 5th, Vol 6, Ch 39, p 912", "conflict": "", "etype": "ai", "expl": "", "key": "Salter-Harris最常見=Type II(~75%，Thurston-Holland fragment)。", "peropt": {"A": "Type I=僅通過physis。", "B": "✔Type II最常見(通過metaphysis)。", "C": "Type III=通過epiphysis至關節面。", "D": "Type IV=跨metaphysis-physis-epiphysis。", "E": "Type V=擠壓傷(crush)。"}, "src": "NG", "sub": "G"}, {"id": "NG114-17", "stem": "According to Bayne classification of ulnar longitudinal deficiency, total ulnar aplasia is classified to type?", "opts": {"A": "I", "B": "II", "C": "III", "D": "IV", "E": "V"}, "ans": "C", "multi": false, "years": ["107", "114"], "cite": "Neligan 5th, Vol 6, Ch 34, p.813", "conflict": "", "etype": "ai", "expl": "", "key": "Bayne ulnar deficiency:total ulnar aplasia=Type III。", "peropt": {"A": "Type I=ulnar hypoplasia(兩physes在)。", "B": "Type II=部分ulnar aplasia(最常見，有ulnar anlage)。", "C": "✔Type III=total ulnar aplasia(完全缺如)。", "D": "Type IV=radiohumeral synostosis。", "E": "(無E/或不適用)。"}, "src": "NG", "sub": "O"}, {"id": "NG114-18", "stem": "關於小兒骨頭生長板傷害 (physeal injuries)，下列敘述何者錯誤？", "opts": {"A": "創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染、腫瘤及輻射暴露等也會影響骨頭生長", "B": "Salter-Harris classification是最為廣泛使用的分類法", "C": "Peterson type VI是開放性傷害伴隨有生長板的損失 (loss of physis)，相當於Salter-Harris type V", "D": "Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland’s sign", "E": "Salter-Harris type III & IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮"}, "ans": "C", "multi": false, "years": ["110", "114", "115"], "cite": "Neligan 5th, Vol 6, Ch 39, p 912-913", "conflict": "", "etype": "ai", "expl": "", "key": "Peterson type VI=開放傷伴physis損失;Salter-Harris無type VI，不等同SH type V。", "peropt": {"A": "創傷最常見(感染/腫瘤/輻射亦影響)，正確。", "B": "Salter-Harris最廣泛使用，正確。", "C": "✔答案(錯)：Peterson VI≠SH type V(SH無VI型)。", "D": "SH type II最常見+Thurston-Holland sign，正確。", "E": "SH III&IV牽涉germinal layer與關節面，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG114-21", "stem": "關於併指(syndactyly), 下列敘述何指錯誤?", "opts": {"A": "Familial syndactyly 所佔的比例是 15\\~40%", "B": "最常發生的是digit 2-3 的併指", "C": "Syndactyly 可以分為 incomplete, complete, complex, or complicated", "D": "Complicated syndatyly 指的是有 abnormal bone structure inside to syndactyly with fusions, rudimentary bones, missing bones, abnormal joints, and sometimes cross bones", "E": "Syndactyly 可以單獨出現, 或者合併其他syndrome 出現, 如Poland syndrome 或 Apert syndrome"}, "ans": "B", "multi": false, "years": ["114"], "cite": "Neligan 5th, Vol 6, Ch 35, p 824-826", "conflict": "", "etype": "ai", "expl": "", "key": "最常見併指為第3-4指(long-ring)。", "peropt": {"A": "Familial syndactyly佔15-40%，正確。", "B": "✔答案(錯)：最常見為第3-4指(long-ring)併指，非2-3指。", "C": "分incomplete/complete/complex/complicated，正確。", "D": "complicated含異常骨結構(fusion、rudimentary/missing bones、異常關節、cross bones)，正確。", "E": "可單獨或合併syndrome(Poland、Apert)，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG114-22", "stem": "下列何者pyogenic granuloma 的描述有誤？", "opts": {"A": "有莖的單獨紅色腫塊.", "B": "男性較多", "C": "生成緩慢且逐漸變大", "D": "好發在上肢", "E": "常發生潰瘍且持續性的流血"}, "ans": "C", "multi": false, "years": ["114"], "cite": "Neligan 5th, Vol 6, Ch 37, p 875", "conflict": "", "etype": "ai", "expl": "", "key": "pyogenic granuloma生長『快速』(數週迅速變大)。", "peropt": {"A": "有莖單一紅色腫塊，正確。", "B": "男性較多，正確。", "C": "✔答案(錯)：生長快速，非緩慢。", "D": "好發上肢/手，正確。", "E": "常潰瘍且反覆流血，正確。"}, "src": "NG", "sub": "K"}, {"id": "NG114-23", "stem": "下列有關先天性手指畸形的手術時機, 何者錯誤?", "opts": {"A": "Simple syndactyly: 12 months", "B": "Constriction ring syndrome(digit at risk): immediate", "C": "Thumb hypoplasia: 3 months", "D": "Trigger thumb: After 12 months", "E": "Absent or inadequate thumb: 12–18 months"}, "ans": "C", "multi": false, "years": ["108", "114", "115"], "cite": "Neligan 5th, Vol 6, Ch 32,768", "conflict": "", "etype": "ai", "expl": "", "key": "拇指發育不良(thumb hypoplasia)重建時機非3個月，多在~1歲以後。", "peropt": {"A": "Simple syndactyly約12個月，正確。", "B": "Constriction ring(危及手指)須即刻處理，正確。", "C": "✔答案(錯)：thumb hypoplasia重建時機非3個月(pollicization/重建多在~1歲後)。", "D": "Trigger thumb 12個月後，正確。", "E": "缺/不足拇指12-18個月，正確。"}, "src": "NG", "sub": "N"}, {"id": "NG114-25", "stem": "關於Apert syndrome,下列敘述何者正確?", "opts": {"A": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變 (sporadic)", "B": "上肢方面會出現brachyclinodactyly of the thumb, complex syndactyly of index/long/ring finger, symbrachyphalangism和simple syndactyly of the first web", "C": "手的變形可區分為三型：the flat, “spade” hand (type I), the constricted cupped, “mitten” hand (type II), 和the coalesced “rosebud” hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5, followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有impaired language development and motor skill"}, "ans": "ACDE", "multi": true, "years": ["114"], "cite": "Neligan 5th, Vol 6, Ch 35, p 836-840", "conflict": "", "etype": "ai", "expl": "", "key": "正確ACDE。Apert上肢為first web complex/complicated syndactyly，非simple。", "peropt": {"A": "FGFR2突變、多數sporadic，正確。", "B": "✗上肢first web為complex/complicated syndactyly(非simple)，敘述有誤。", "C": "手三型spade(I)/mitten(II)/rosebud(III)，正確。", "D": "併指矯正順序，正確。", "E": "常合併語言/動作發展遲緩，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG114-26", "stem": "關於vascular malformation的描述，下列何者正確？(複選)", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination", "D": "Sclerotherapy可以用來治療venous malformation和lymphatic malformation", "E": "Parkes Weber為一slow flow的vascular malformation"}, "ans": "ABCD", "multi": true, "years": ["114", "115"], "cite": "Neligan 5th, Vol 6, Ch 37, p875-885", "conflict": "選項改寫/重排家族(跨年)：本列=ABCD；另有 ABCDE(108)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Parkes Weber為fast-flow(有AV分流)，非slow-flow。", "peropt": {"A": "Sturge-Weber=CM在CN V分布，正確。", "B": "KTS=slow-flow capillary-lymphatico-venous，正確。", "C": "AVM治療embolization/resection/combo，正確。", "D": "sclerotherapy可治VM與LM，正確。", "E": "✗Parkes Weber為fast-flow(含AV shunt)，此敘述誤。"}, "src": "NG", "sub": "K"}, {"id": "NG114-28", "stem": "下列關於hypoplastic thumb的敘述，何者正確？(複選)", "opts": {"A": "Type I如要手術一般只需要使用local flap，進行first webspace widening即可", "B": "Type II的thenar musculature發育不佳且合併adduction 及metacarpal–phalangeal (MP) joint laxity。", "C": "Type III依據carpometacarpal joint是否穩定分為IIIA和IIIB。", "D": "Type IV及type V的手術方式首選為index finger pollicization。", "E": "Type V稱為pouce flottant。"}, "ans": "ABCD", "multi": true, "years": ["114"], "cite": "Neligan 5th, Vol 6, Ch 34, p 801-803,806", "conflict": "選項改寫/重排家族(跨年)：本列=ABCD；另有 BCD(109/110)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "正確ABCD。pouce flottant(floating thumb)為Type IV，非Type V(V=aplasia)。", "peropt": {"A": "Type I手術僅需local flap做first web widening(多數免手術)，正確。", "B": "Type II:thenar發育不良+adduction+MCP joint laxity，正確。", "C": "Type III依CMC穩定度分IIIA/IIIB，正確。", "D": "Type IV/V首選index finger pollicization，正確。", "E": "✗pouce flottant為Type IV，非Type V(V=aplasia)。"}, "src": "NG", "sub": "N"}, {"id": "NG115- estriction，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG115-25", "stem": "關於myoelectric prosthesis的特性，下列哪些敘述正確？", "opts": {"A": "Myoelectric prosthesis比body-powered prosthesis需要更少的harnessing", "B": "移除皮下脂肪可降低肌肉與皮膚間的阻抗，進而提升EMG訊號振幅", "C": "Myoelectric prosthesis完全防水，可長時間浸水使用", "D": "過度流汗會降低電極與皮膚的接觸可靠性，影響訊號偵測", "E": "Skin graft作為殘肢覆蓋時，因缺乏皮下脂肪而有利於EMG訊號偵測"}, "ans": "ABDE", "multi": true, "years": ["115"], "cite": "Neligan 5th ed., Vol. 6, Ch 40（Treatment of the upper extremity amputee", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABDE。Myoelectric prosthesis並非完全防水/可長時間浸水。", "peropt": {"A": "比body-powered需更少harnessing，正確。", "B": "移除皮下脂肪降低阻抗、提升EMG振幅，正確。", "C": "✗非完全防水、不可長時間浸水。", "D": "過度流汗降低電極接觸可靠性，正確。", "E": "skin graft覆蓋(缺皮下脂肪)有利EMG偵測，正確。"}, "src": "NG", "sub": "Q"}, {"id": "NG115-26", "stem": "關於 spinal nerve root avulsion（deafferentation）的臨床特徵與診斷，下列哪些敘述正確？（複選）", "opts": {"A": "感覺神經細胞體（cell bodies of sensory fibers）位於 dorsal root ganglia，在 avulsion 損傷後仍保持完整但與脊髓背角失去連結", "B": "CT myelography 對區分 pre-ganglionic 與 post-ganglionic 病變的準確率（約 85%）高於 MRI（約 52%）", "C": "Avulsion 疼痛的典型描述為灼熱感或熱感，患者常形容手部「著火」或「被熱水澆淋」", "D": "根據 Parry 的研究，損傷位於 dorsal root ganglion 遠端（distal to dorsal root ganglion）的患者，疼痛同樣是常見且顯著的表現", "E": "術後應強調積極且持續的乳房按摩，為常規乳房擴張術後照護的重要環節"}, "ans": "ACE", "multi": true, "years": ["115"], "cite": "Neligan 5th ed., Vol. 6, Ch 31（The painful hand", "conflict": "", "etype": "ai", "expl": "", "key": "⚠此題答案鍵ACE中，E『乳房按摩』與脊神經根撕脫無關，疑為原檔選項毀損/答案鍵誤植。A、C正確;D(Parry:distal-to-DRG疼痛較不顯著)為錯;B數據待查。建議對照原文複查。", "peropt": {"A": "感覺神經cell body位於DRG，avulsion後仍完整但與脊髓背角失聯(deafferentation)，正確。", "B": "✗/待查：CT myelography對pre/post-ganglionic鑑別的準確率數據(85% vs MRI 52%)在本題被判非正解，建議對照原文。", "C": "avulsion疼痛典型為灼熱/『著火』感，正確。", "D": "✗Parry:疼痛主要見於preganglionic(撕脫);distal-to-DRG(postganglionic)疼痛較不常見/顯著，本敘述有誤。", "E": "⚠此選項為『乳房按摩』，與脊神經根撕脫無關，疑為原檔毀損/答案鍵誤植;請對照原文，勿死背。"}, "src": "NG", "sub": "D"}, {"id": "NG111-1", "stem": "關於Metacarpal hand，以下哪些敘述為真？ (複選)", "opts": {"A": "Metacarpal hand refers to multiple ": "Level IV: infraclavicular injury", "E": "50% BPI發生在Level I"}, "ans": "E", "multi": false, "years": ["111"], "cite": "Neligan vol 6, p.815-816", "conflict": "", "etype": "orig", "expl": "約70%(非50%)BPI發生在Level I(preganglionic root)。", "key": "", "peropt": {}, "src": "NG", "sub": "D"}, {"id": "NG111-11", "stem": "依Schobinger的arteriovenous malformation臨床分期，下列何者為非", "opts": {"A": "Stage 0: 臨床表現如capillary malformation", "B": "Stage I: 臨床表現如involuting hemangioma", "C": "Stage II: 變大發熱且有bruits", "D": "Stage III: 變大發熱潰瘍", "E": "Stage IV: 心臟衰竭"}, "ans": "A", "multi": false, "years": ["111"], "cite": "Neligan vol 6, p.706", "conflict": "", "etype": "orig", "expl": "Schobinger分期無Stage 0;Stage I=quiescence(warm pink-blue stain);此選項描述有誤。", "key": "", "peropt": {}, "src": "NG", "sub": "K"}, {"id": "NG112-11", "stem": "下列何者不是Glomus tumors症狀的classic triad?", "opts": {"A": "持續性、嚴重的疼痛(continuous, severe pain)", "B": "間歇性、嚴重的疼痛(intermittent, severe pain)", "C": "特定點的疼痛(point tenderness)", "D": "對冷敏感Cold hypersensitivity"}, "ans": "A", "multi": false, "years": ["112"], "cite": "Neligan Vol 6. Ch 15 p.348", "conflict": "選項改寫/重排家族(跨年)：本列=A；另有 C(113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Glomus classic triad=間歇/陣發嚴重疼痛、point tenderness、cold hypersensitivity;『持續性』嚴重疼痛不屬triad。", "peropt": {"A": "✔答案(不是)：持續性嚴重疼痛非triad(應為間歇/陣發性)。", "B": "間歇嚴重疼痛=triad。", "C": "point tenderness=triad。", "D": "cold hypersensitivity=triad。"}, "src": "NG", "sub": "K"}, {"id": "NG112-12", "stem": "下列有關tendinopathy ，何者錯誤?", "opts": {"A": "De Quervain's tenosynovitis主要發生在radial side of wrist，診斷最主要由病史和理學檢查決定。", "B": "De Quervain's tenosynovitis手術須將第一個dorsal compartment的兩條肌腱都找出並放鬆。", "C": "Lateral epicondylitis又叫做tennis elbow，疼痛在腕部extension時會加劇", "D": "Trigger digit是最常見的手部疾病，治療包括rest, splinting, steroid injection, open or percutaneous surgery", "E": "Trigger digit的診斷主要由影像檢查決定"}, "ans": "E", "multi": false, "years": ["112"], "cite": "Neligan Vol 6, ch 18, p 392,393", "conflict": "選項改寫/重排家族(跨年)：本列=E；另有 D(113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Trigger digit診斷主要靠臨床(病史/理學)，非影像。", "peropt": {"A": "de Quervain radial wrist、臨床診斷，正確。", "B": "手術放鬆第一背側間室(APL/EPB)，正確。", "C": "lateral epicondylitis=tennis elbow，正確。", "D": "trigger digit最常見、rest/splint/steroid/surgery，正確。", "E": "✔答案(錯)：trigger digit靠臨床診斷，非影像。"}, "src": "NG", "sub": "F"}, {"id": "NG112-15", "stem": "下列關於Dupuytren's disease之敘述，何者錯誤？", "opts": {"A": "最早出現的症狀為手掌dimpling以及distal palmar crease distortion (Hugh Johnson sign)。最常發生於無名指，第二為小指。", "B": "手術適應症為MCP joint contracture 30°及任何程度的PIP joint contracture。相較於後者，前者較不緊急", "C": "位於PIP joint背側的knuckle pads稱為Garrod's nodules。", "D": "Spiral cord會造成neurovascular bundle往內往淺移動，central cord則會造成DIP joint flexion contracture", "E": "Percutaneous fasciotomy適合用於isolated palmar cords with MCP joint moderate flexion。"}, "ans": "D", "multi": false, "years": ["112"], "cite": "Neligan Vol 6, ch 17, p 375,377,378,379,381,382", "conflict": "選項改寫/重排家族(跨年)：本列=D；另有 B(113), A(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Central cord造成MCP(非DIP)攣縮;spiral cord使NV bundle往內、往淺、往近移位。", "peropt": {"A": "早期dimpling/Hugh Johnson sign、無名指最常，正確。", "B": "手術適應症MCP 30°/任何PIP，正確。", "C": "Garrod's nodules，正確。", "D": "✔答案(錯)：central cord造成MCP攣縮(非DIP)。", "E": "percutaneous fasciotomy用於isolated palmar cord+MCP，正確。"}, "src": "NG", "sub": "I"}, {"id": "NG110-1", "stem": "Regarding hand biomechanics: （複選）", "opts": {"A": "All the fingers converge in a cone over the anatomical center of the hand - the long finger MCPJ", "B": "In the correct alignment, all fingers point to the tubercle of the scaphoid bone when flexed individually", "C": "The collateral ligaments of the MCPJ are loose in extension and tight in flexion", "D": "FDP to 3rd, 4th and 5th digits work from a common muscle belly and is less independent, but each FDS has individual muscle bellies and can act independently", "E": "Intrinsic muscles of the hand flex the MCPJ but extend the IPJ"}, "ans": "ABCDE", "multi": true, "years": ["110"], "cite": "Neligan Vol 6. Chap 1 pg 8, 11, 13, 23, 33, 36", "conflict": "選項改寫/重排家族(跨年)：本列=ABCDE；另有 ACDE(114/115)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "⚠此題答案與NG114版分歧:本版=ABCDE(全對)、NG114版=ACDE。差在B『手指屈曲指向scaphoid tubercle』——解剖上為真，故ABCDE較合理;建議查證。", "peropt": {"A": "手指屈曲收斂至long finger MCPJ，正確。", "B": "✔手指單獨屈曲指向scaphoid tubercle(⚠NG114版判此為誤，本版判真;解剖上為真)。", "C": "MCPJ collateral ligament伸直鬆、屈曲緊，正確。", "D": "FDP 3-5共用muscle belly、FDS各自獨立，正確。", "E": "intrinsics屈MCPJ、伸IPJ，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG110-2", "stem": "Regarding special tests for hand function: (複選）", "opts": {"A": "Tinel's sign = tingling that radiates proximally when the examiner taps on a peripheral nerve distal to site of injury", "B": "Phalen's test = with elbow in neutral position, the wrist is held in maximal palmar flexion for 2min and patient experiences numbness in the area innervated by the median nerve.", "C": "Froment's Test = Patient pinches a piece of paper with ulnar tip of thumb and radial tip of index finger. In ulnar palsy, when the paper is pulled away, weak adduction causes compensatory flexion of thumb IPJ by FPL.", "D": "Jeanne's Sign = hyperextension of thumb IPJ in key pinch to compensate for weak thumb adduction.", "E": "Wartenberg's sign = when asked to keep fingers adducted with all joint extended, the little finger will deviate away from ring finger because the 3rd palmar interosseous muscle is weak in ulnar nerve palsy."}, "ans": "BCDE", "multi": true, "years": ["110"], "cite": "Neligan Vol 6. Ch 2 Pg 60-61", "conflict": "", "etype": "ai", "expl": "", "key": "Tinel's sign=輕敲神經時感覺放射至『遠端』;敘述稱放射至近端，有誤。", "peropt": {"A": "✗Tinel's放射至遠端(distal)，此敘述誤。", "B": "Phalen's test，正確。", "C": "Froment's test(尺神經)，正確。", "D": "Jeanne's sign，正確。", "E": "Wartenberg's sign，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG110-3", "stem": "Regarding MRI imaging of the hand, intensity of various tissues on T1 and T2 in images: (複選）", "opts": {"A": "Fat - T1 high, T2 high", "B": "Cortical bone - T1 low, T2 low", "C": "Muscle - T1 intermediate, T2 intermediate", "D": "Bone marrow (yellow) - T1 high, T2 low", "E": "Fluid - T1 high, T2 low"}, "ans": "ABCD", "multi": true, "years": ["110"], "cite": "Neligan Vol 6. Chap 3 Pg 87 Table 3.5", "conflict": "", "etype": "ai", "expl": "", "key": "Fluid為T1低、T2高(非T1高T2低)。", "peropt": {"A": "Fat T1高、T2高，正確。", "B": "cortical bone T1低T2低，正確。", "C": "muscle中間強度，正確。", "D": "yellow marrow T1高，正確。", "E": "✗Fluid為T1低、T2高，此敘述誤。"}, "src": "NG", "sub": "A"}, {"id": "NG110-4", "stem": "In bone healing which one is incorrect", "opts": {"A": "Anatomical reduction, interfragmentary compression and rigid fixation can achieve absolute stability.", "B": "Absolute stability allows primary bone healing without callous formation", "C": "Absolute stability is more suited to comminuted fractures where anatomical reduction is not possible", "D": "In relative stability, micromotion at fracture occurs, and heals by secondary bone healing with callous formation", "E": "Methods of relative stability include external fixation, bridge plating and intramedullary fixation"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan Vol 6 pg 113", "conflict": "", "etype": "ai", "expl": "", "key": "Absolute stability適用可解剖復位的『simple』骨折,非comminuted。", "peropt": {"A": "解剖復位+壓迫+剛性固定=absolute stability，正確。", "B": "absolute stability→primary healing無callus，正確。", "C": "✔答案(錯)：absolute stability適用simple骨折(非comminuted)。", "D": "relative stability→micromotion→secondary healing+callus，正確。", "E": "relative方法:external fix/bridge plate/IM nail，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG110-5", "stem": "Which one of the following is true of Subungual melanoma?", "opts": {"A": "It represents 10-20% of all cutaneous melanoma", "B": "It is uncommon in big toe and thumb", "C": "The Hutchinson's sign is brown or black pigment extends from the nailbed, matrix and nail plate to the adjacent cuticle and proximal or lateral nail folds", "D": "There is no need to consider subungual hematoma, exogenous pigmentation, melanonychia.", "E": "Treatment is typically amputation at the MC joint level, however in situ cases, digit sparing procedures with close follow-up may be appropriate."}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan Vol 6. Pg 132-133", "conflict": "", "etype": "ai", "expl": "", "key": "Hutchinson's sign=色素由甲床/甲基質/甲板延伸至甲皺褶/角質層。", "peropt": {"A": "✗subungual melanoma約佔皮膚黑色素瘤1-3%(非10-20%)。", "B": "✗好發於拇指與大腳趾(非uncommon)。", "C": "✔答案(對)：Hutchinson's sign定義正確。", "D": "✗須鑑別subungual hematoma/外源色素/melanonychia。", "E": "✗治療多在DIP/IP關節截肢;in situ可digit-sparing，非MC joint level。"}, "src": "NG", "sub": "P"}, {"id": "NG110-6", "stem": "Which one is false regarding Finger fractures", "opts": {"A": "Metacarpal fractures usually have apex volar angulation", "B": "Proximal phalanx fractures usually have apex volar angulation due to pull of the interosseous muscles", "C": "Fractures proximal to FDS insertion have dorsal angulation to flexion of distal portion", "D": "Fracture distal to FDS insertion have volar angulation due to flexion of the proximal fragment", "E": "Dislocation means stabilizing structures (collateral ligaments, volar plate, dorsal capsule) are disrupted."}, "ans": "A", "multi": false, "years": ["110"], "cite": "Neligan vol 6. Pg 147", "conflict": "", "etype": "ai", "expl": "", "key": "Metacarpal骨折為apex『dorsal』angulation(非volar)。", "peropt": {"A": "✔答案(錯)：metacarpal骨折為apex dorsal(非volar)。", "B": "proximal phalanx apex volar(interossei拉扯)，正確。", "C": "proximal to FDS→dorsal angulation，正確。", "D": "distal to FDS→volar angulation，正確。", "E": "dislocation=穩定結構破壞，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG110-7", "stem": "Which one of the following is not an indication for Metacarpal ORIF:", "opts": {"A": "Rotational deformity", "B": "Shortening of 2-3 mm", "C": "Articular step-off \\u003e1mm", "D": "\\u003e5% articular involvement", "E": "Multiple fractures"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan vol 6 Pg 159", "conflict": "", "etype": "ai", "expl": "", "key": "⚠標準metacarpal ORIF適應症含step-off>1mm與>25%關節面;選項D『>5%』與課本>25%不符。keyed答案為C，但依概念D較像非適應症，建議對照原文。", "peropt": {"A": "rotational deformity=適應症。", "B": "shortening 2-3mm=適應症。", "C": "keyed為此(非適應症)——但step-off>1mm一般『是』適應症，存疑。", "D": "⚠>5%關節面與課本>25%門檻不符，概念上較像非適應症。", "E": "multiple fractures=適應症。"}, "src": "NG", "sub": "G"}, {"id": "NG110-8", "stem": "Which one of the following is not a scaphoid ORIF indication:", "opts": {"A": "Displaced fracture", "B": "Proximal pole fractures regardless of displacement", "C": "Associated perilunate injuries", "D": "Closed fractures", "E": "Fractures not healing after trial immobilization 3-4 months"}, "ans": "D", "multi": false, "years": ["110"], "cite": "Neligan vol 6. Pg 177", "conflict": "", "etype": "ai", "expl": "", "key": "單純closed(未移位、穩定)骨折可保守治療，非scaphoid ORIF適應症。", "peropt": {"A": "displaced fracture=適應症。", "B": "proximal pole不論位移=適應症。", "C": "associated perilunate injury=適應症。", "D": "✔答案(非適應症)：單純closed穩定骨折可保守。", "E": "保守固定3-4月不癒合=適應症。"}, "src": "NG", "sub": "G"}, {"id": "NG110-9", "stem": "Flexor tendon repair should NOT have", "opts": {"A": "4-6 core suture strands", "B": "Core suture purchase of 7-10mm", "C": "At least 2mm diameter locking tendon-suture junction", "D": "Core suture calibers 3.0 or 4.0", "E": "Maximize extensive exposure of sutures over the tendon surface"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan vol 6 Pg 204", "conflict": "", "etype": "ai", "expl": "", "key": "Flexor tendon修復不應讓縫線大範圍暴露於肌腱表面(增加摩擦/滑動阻力)。", "peropt": {"A": "4-6 core strands=應該。", "B": "purchase 7-10mm=應該。", "C": "locking junction≥2mm=應該。", "D": "caliber 3-0/4-0=應該。", "E": "✔答案(不應)：不應讓縫線大面積暴露在肌腱表面。"}, "src": "NG", "sub": "F"}, {"id": "NG110-10", "stem": "Early active motion after flexor tendon repair involves:", "opts": {"A": "Usually with Volar splint protection", "B": "Must be initiated on Day 1.", "C": "Can be one session per week", "D": "Always begin with active exercises first then passive exercise", "E": "Start with partial range active flexion first 3 weeks, then full range active flexion 3-4 weeks after surgery"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan vol 6 Pg 214", "conflict": "", "etype": "ai", "expl": "", "key": "Early active motion:前3週partial range active flexion、術後3-4週full range;採背側blocking splint。", "peropt": {"A": "✗採dorsal blocking splint(非volar)。", "B": "✗不必然Day 1開始。", "C": "✗非每週一次。", "D": "✗通常passive先於active。", "E": "✔答案:前3週partial range、之後full range active flexion。"}, "src": "NG", "sub": "F"}, {"id": "NG110-11", "stem": "下列何者不是關於Glomus tumors的描述:", "opts": {"A": "對冷敏感Cold hypersensitivity", "B": "間歇性、嚴重的疼痛(intermittent, severe pain)", "C": "持續性、嚴重的疼痛(continuous, severe pain)", "D": "特定點的疼痛(point tenderness)", "E": "通常在甲床下(subungually)"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan Vol 6. Chapter 15 p.348", "conflict": "", "etype": "ai", "expl": "", "key": "Glomus:『持續性』嚴重疼痛不符(應為間歇/陣發性)。", "peropt": {"A": "cold hypersensitivity=描述。", "B": "間歇嚴重疼痛=描述。", "C": "✔答案(不是)：持續性嚴重疼痛不符。", "D": "point tenderness=描述。", "E": "通常在甲床下=描述。"}, "src": "NG", "sub": "K"}, {"id": "NG110-12", "stem": "下列何者關於Paronychia的敘述，何者錯誤？", "opts": {"A": "Paronychia大約佔手部感染的30%。", "B": "最常見的感染源有Staphylococcus aureus, streptococcus, pseudomonas。", "C": "Early paronychia是沒有症狀的。", "D": "Eponychial marsupialization為chronic paronychia的手術治療方式。", "E": "Candida albicans 是chronic paronychia最常見的pathogen。"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan Vol 6. Chapter 16 p.359", "conflict": "", "etype": "ai", "expl": "", "key": "Early paronychia『有』症狀(紅腫痛)，非無症狀。", "peropt": {"A": "約佔手部感染30%，正確。", "B": "常見菌S.aureus/strep/pseudomonas，正確。", "C": "✔答案(錯)：early paronychia有症狀，非無症狀。", "D": "eponychial marsupialization=chronic手術，正確。", "E": "Candida albicans=chronic最常見病原，正確。"}, "src": "NG", "sub": "B"}, {"id": "NG110-13", "stem": "列關於Dupuytren's disease之敘述，何者錯誤？", "opts": {"A": "最早出現的症狀為手掌dimpling以及distal palmar crease distortion (Hugh Johnson sign)。最常發生於無名指，第二為小指。", "B": "Spiral cord會造成neurovascular bundle往內往淺移動，central cord則會造成DIP joint flexion contracture", "C": "位於PIP joint背側的knuckle pads稱為Garrod's nodules。", "D": "手術適應症為MCP joint contracture 30°及任何程度的PIP joint contracture。相較於後者，前者較不緊急", "E": "Percutaneous fasciotomy適合用於isolated palmar cords with MCP joint moderate flexion。"}, "ans": "B", "multi": false, "years": ["110"], "cite": "Neligan chapter 17, page 375,377,378,379,381,382", "conflict": "", "etype": "ai", "expl": "", "key": "Central cord造成MCP(非DIP)攣縮;spiral cord位移NV bundle往內往淺為真。", "peropt": {"A": "早期dimpling/Hugh Johnson、無名指最常，正確。", "B": "✔答案(錯)：central cord造成MCP攣縮(非DIP)。", "C": "Garrod's nodules，正確。", "D": "手術適應症MCP30°/任何PIP，正確。", "E": "percutaneous fasciotomy用於isolated palmar cord+MCP，正確。"}, "src": "NG", "sub": "I"}, {"id": "NG110-14", "stem": "下列關於工作相關的手部疾病，何者錯誤?", "opts": {"A": "De Quervain's tenosynovitis主要發生在radial side of wrist. 診斷最主要由病史和理學檢查決定", "B": "De Quervain's tenosynovitis手術主要局部麻醉，用一個zigzag incision做在第一個dorsal compartment", "C": "Trigger digit是最常見的手部疾病，治療包括rest, splinting, steroid injection, open or percutaneous surgery", "D": "Trigger digit的診斷主要由影像檢查決定", "E": "Trigger finger最主要的治療是rest, splinting, steroid injection或open or percutaneous surgery"}, "ans": "D", "multi": false, "years": ["110"], "cite": "Neligan chapter 18, page 392,393", "conflict": "", "etype": "ai", "expl": "", "key": "Trigger digit診斷主要靠臨床，非影像。", "peropt": {"A": "de Quervain radial wrist、臨床診斷，正確。", "B": "zigzag incision於第一背側間室，正確。", "C": "trigger digit最常見、多元治療，正確。", "D": "✔答案(錯)：trigger digit靠臨床診斷，非影像。", "E": "trigger finger治療rest/splint/steroid/surgery，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG110-15", "stem": "下列關於rheumatoid arthritis (RA)之敘述，何者正確", "opts": {"A": "常見症狀為morning stiffness，敏感度最高的症狀為對稱性關節炎及手部關節炎。Rheumatoid factor是RA marker，但和anti-citrullinated protein antibodies (ACPAs)都與疾病嚴重度無關。", "B": "關節症狀常從MCP、PIP及手腕開始，因為這些關節的synovium to joint surface area ratio較低", "C": "Finger deformity分為swan-neck deformity和boutonniere deformity，前者可能源自DIP、PIP、MCP joint，後者則一定源自PIP joint", "D": "Caput ulnae意指dorsal dislocation of the ulnar head、carpal pronation、volar subluxation of the ECU；Vaughan-Jackson syndrome意指radial to ulnar progression of extensor tendon ruptures；Mannerfelt lesion意指flexor pollicis longus tendon因scaphoid sharp erosion而斷裂", "E": "Rheumatoid thumb deformity可分為五型，第一型即為swan-neck deformity，第三型即為boutonniere deformity"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan chapter 19, page 400,401,403,406", "conflict": "選項改寫/重排家族(跨年)：本列=C；另有 D(109)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Swan-neck可源自DIP/PIP/MCP;boutonnière一定源自PIP。", "peropt": {"A": "✗RF與ACPAs皆與疾病嚴重度相關(非無關)。", "B": "✗症狀從synovium:joint surface ratio『較高』關節開始(非較低)。", "C": "✔答案(對)：swan-neck可源自DIP/PIP/MCP，boutonnière必源自PIP。", "D": "✗Caput ulnae為carpal supination(非pronation);此選項含誤。", "E": "✗第一型為boutonnière、第三型為swan-neck(此選項顛倒)。"}, "src": "NG", "sub": "J"}, {"id": "NG110-16", "stem": "下列關於Raynaud's disease與Raynaud syndrome的比較，何者錯誤？", "opts": {"A": "兩者都有triphasic color change。", "B": "Raynaud's disease較好發於女性。", "C": "Raynaud syndrome常有trophic findings。", "D": "Raynaud syndrome較常呈現異常Allen test。", "E": "Raynaud syndrome的症狀較對稱。"}, "ans": "E", "multi": false, "years": ["109", "110"], "cite": "Neligan chapter 22, page 505", "conflict": "選項改寫/重排家族(跨年)：本列=E；另有 B(112/113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Raynaud syndrome(次發)症狀較『不對稱』;primary disease才較對稱。", "peropt": {"A": "兩者皆有triphasic color change，正確。", "B": "Raynaud's disease好發女性，正確。", "C": "syndrome常有trophic findings，正確。", "D": "syndrome較常異常Allen test，正確。", "E": "✔答案(錯)：syndrome症狀較不對稱(非對稱)。"}, "src": "NG", "sub": "K"}, {"id": "NG110-17", "stem": "下列關於nerve entrapment syndrome之敘述，何者正確？", "opts": {"A": "Carpal tunnel syndrome：約45%懷孕女性第三孕期時會出現，通常產後需手術治療。", "B": "Lacertus syndrome：motor symptoms比sensory symptoms早出現。", "C": "Anterior interosseous syndrome：pure motor weakness，Tinel's test可能呈現陽性。", "D": "Ulnar nerve compression in Guyon's canal：依據壓迫位置分為三區，zone I只會有motor symptoms。", "E": "Cubital tunnel syndrome：可能壓迫位置包含arcade of Struthers及ligament of Osborne，前者為最常見的位置。"}, "ans": "B", "multi": false, "years": ["109", "110"], "cite": "Neligan chapter 24, page 529,534,537,538", "conflict": "選項改寫/重排家族(跨年)：本列=B；另有 A(112/113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Lacertus syndrome:運動症狀早於感覺症狀。", "peropt": {"A": "✗CTS約45%孕婦第三孕期、多數產後緩解(非需手術)。", "B": "✔答案(對)：Lacertus syndrome運動早於感覺。", "C": "✗AIN為pure motor、無感覺;Tinel通常陰性。", "D": "✗Guyon zone I為混合(motor+sensory)。", "E": "✗cubital tunnel最常見壓迫為ligament of Osborne/retrocondylar groove(非arcade of Struthers)。"}, "src": "NG", "sub": "C"}, {"id": "NG110-18", "stem": "下列關於手部osteoarthritis (OA)之敘述，何者錯誤？(複選)", "opts": {"A": "最常發生於distal interphalangeal (DIP) joints of the fingers和carpometacarpal (CMC) joint of the thumb。", "B": "DIP joint OA的常見表現包含DIP關節變大並出現knobby protuberances，稱為Heberden's nodes。Radiographic appearance與疾病嚴重程度相關，且Heberden's nodes為手術適應症之一。", "C": "Proximal interphalangeal joint OA的手術方式包含arthrodesis和implant arthroplasty，vascularized joint transfer雖然可行但outcome不佳。", "D": "Carpometacarpal (CMC) arthritis有兩種classification systems，其中Burton classification只用影像學評估，而Eaton classification則合併影像學及臨床症狀評估。", "E": "CMC arthritis的手術依據軟骨是否受影響而決定，early stage手術目標為維持關節穩定、預防持續退化、palmar cartilage offload，late stage手術目標則為減少疼痛及維持拇指力量與活動。"}, "ans": "BD", "multi": true, "years": ["109", "110"], "cite": "Neligan chapter 20, page 440,443,446,447,462,464", "conflict": "選項改寫/重排家族(跨年)：本列=BD；另有 BE(112/113)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "錯誤為BD:Heberden's nodes是臨床表現非手術適應症;CMC分類(Eaton為影像分期)敘述顛倒。", "peropt": {"A": "最常DIP+拇指CMC，正確。", "B": "✔答案(錯)：Heberde
