, P.610", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABCD;拇指為radial clinodactyly(非ulnar)。", "peropt": {"A": "acrocephalosyndactyly，正確。", "B": "coronal±lambdoid synostosis，正確。", "C": "impaired language/motor，正確。", "D": "acrosyndactyly+symphalangism both hands，正確。", "E": "✗拇指為radial clinodactyly(非ulnar)。"}, "src": "NG", "sub": "O"}, {"id": "NG106-22", "stem": "Which of the following statement is incorrect about congenital trigger thumb?", "opts": {"A": "Controversy continues as to whether this is a true congenital condition or whether it is an acquired condition.", "B": "Notta's node is usually palpable distal to the A1 pulley in children with a locked extension deformity", "C": "Some children may have spontaneous resolution", "D": "Caution should be taken not to injury the neurovascular bundles during surgical release", "E": "Rare persistent deformity after surgical release"}, "ans": "B", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 29, P.648-9", "conflict": "", "etype": "ai", "expl": "", "key": "Notta's node在A1 pulley近端、locked『flexion』deformity;此選項(distal+extension)有誤。", "peropt": {"A": "congenital vs acquired有爭議，正確。", "B": "✔答案(錯)：Notta's node在A1近端、locked flexion(非distal/extension)。", "C": "部分可自行緩解，正確。", "D": "小心NV bundle，正確。", "E": "術後少殘留變形，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG106-24", "stem": "Which of following statement about hemangioma is correct?", "opts": {"A": "Infantile hemangioma (IH) has three phase (proliferative phase, involuting phase, involution phase)", "B": "Most IH are managed by observation", "C": "Rapid involuting congenital hemangioma (RICH) involutes rapidly after birth and completely involuted by 14 months of age", "D": "Noninvoluting congenital hemangioma (NICH) does not regress and persists as raised, plaque-like lesions", "E": "All statements are correct"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 31, P.674", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(IH三期、多觀察、RICH~14月消退、NICH不退)。", "peropt": {"A": "IH三期，正確。", "B": "多觀察，正確。", "C": "RICH~14月完全消退，正確。", "D": "NICH不消退為plaque，正確。", "E": "✔以上皆是。"}, "src": "NG", "sub": "K"}, {"id": "NG106-25", "stem": "Which degrees of peripheral nerve injury by Sunderland's classifications are expected to have full recovery ? (複選)", "opts": {"A": "First-degree injury", "B": "Second-degree injury", "C": "Third-degree injury", "D": "Fourth-degree injury", "E": "Fifth-degree injury"}, "ans": "AB", "multi": true, "years": ["106"], "cite": "Neligan Volume 6, Chapter 32, P.699", "conflict": "選項改寫/重排家族(跨年)：本列=AB；另有 D(107)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "Sunderland first(neurapraxia)與second-degree(axonotmesis,endoneurium完整)可完全恢復。", "peropt": {"A": "first-degree完全恢復。", "B": "second-degree可完全恢復。", "C": "✗third不保證完全恢復。", "D": "✗fourth需手術。", "E": "✗fifth為完全斷裂。"}, "src": "NG", "sub": "E"}, {"id": "NG106-26", "stem": "Which are the indications for nerve transfer? (複選)", "opts": {"A": "Proximal brachial plexus injuries where grafting is not possible", "B": "Segmental nerve loss", "C": "Proximal peripheral nerve injuries requiring long distance for reinnervation of distal targets", "D": "Partial nerve injuries with functional loss", "E": "Sensory nerve deficits in noncritical regions"}, "ans": "ABCD", "multi": true, "years": ["106"], "cite": "Neligan Volume 6, Chapter 33, P.726", "conflict": "", "etype": "ai", "expl": "", "key": "Nerve transfer適應症ABCD;noncritical區感覺缺損(E)非適應症。", "peropt": {"A": "proximal BPI無法grafting，是。", "B": "segmental nerve loss，是。", "C": "proximal injury需長距離reinnervation，是。", "D": "partial injury with functional loss，是。", "E": "✗noncritical區感覺缺損非適應症。"}, "src": "NG", "sub": "C"}, {"id": "NG106-27", "stem": "Which is the strongest tendon transfer in opponensplasty?", "opts": {"A": "Burkhalter extensor indicis proprius transfer", "B": "Bunnell ring finger flexor digitorum superficialis transfer", "C": "Camitz palmaris longus transfer", "D": "Huber adductor digiti minimi transfer", "E": "Taylor extensor digit minimi transfer"}, "ans": "B", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 34, P.756", "conflict": "", "etype": "ai", "expl": "", "key": "Opponensplasty最強者為Bunnell ring finger FDS transfer。", "peropt": {"A": "Burkhalter EIP非最強。", "B": "✔答案:Bunnell ring FDS最強。", "C": "Camitz PL較弱。", "D": "Huber ADM。", "E": "Taylor EDM。"}, "src": "NG", "sub": "N"}, {"id": "NG106-28", "stem": "Which of the following statement about reconstructive priority in brachial plexus injury is correct?", "opts": {"A": "Nerve reconstruction first is a strategy of distal-to-proximal reconstruction", "B": "Free functional muscle transfer (FFMT) first is a strategy of proximal-to-distal reconstruction", "C": "Nerve reconstruction first by multiple nerve transfers aims to achieve a one-stage full reconstruction for shoulder, elbow and hand function", "D": "FFMT first also aims to achieve a one-stage full reconstruction for shoulder, elbow and hand function", "E": "Distal-to-proximal reconstruction may take a longer rehabilitation period"}, "ans": "C", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 36, P.803", "conflict": "", "etype": "ai", "expl": "", "key": "Nerve reconstruction first(multiple nerve transfers)目標one-stage完整重建(shoulder/elbow/hand)。", "peropt": {"A": "✗nerve first為proximal-to-distal(非distal-to-proximal)。", "B": "✗FFMT first為distal-to-proximal。", "C": "✔答案:nerve reconstruction first、one-stage完整重建。", "D": "✗FFMT first非one-stage完整。", "E": "✗文字重複錯誤。"}, "src": "NG", "sub": "D"}, {"id": "NG106-29", "stem": "Which of the following statement about targeted muscle reinnervation for shoulder disarticulation is correct?", "opts": {"A": "Ulnar nerve to clavicular head of pectoralis major", "B": "Musculocutaneous nerve to the largest motor nerve innervating sternal head of pectoralis major", "C": "Radial nerve to thoracodorsal or long thoracic nerve", "D": "Median nerve to lateral motor nerve innervating sternal head of pectoralis major or minor", "E": "All above are correct"}, "ans": "C", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 40, P.879", "conflict": "", "etype": "ai", "expl": "", "key": "TMR shoulder disarticulation正確配對:radial nerve→thoracodorsal或long thoracic。", "peropt": {"A": "✗ulnar→clavicular head錯。", "B": "✗musculocutaneous敘述錯。", "C": "✔答案:radial nerve→thoracodorsal/long thoracic。", "D": "✗median敘述錯。", "E": "非all correct。"}, "src": "NG", "sub": "E"}, {"id": "NG106-30", "stem": "Which has been demonstrated to be the prime target of acute rejection in upper extremity allotransplantation?", "opts": {"A": "Nerve", "B": "Vessel", "C": "Skin", "D": "Bone", "E": "Musculotendinous group"}, "ans": "C", "multi": false, "years": ["106"], "cite": "Neligan Volume 6, Chapter 38, P.853", "conflict": "", "etype": "ai", "expl": "", "key": "皮膚(skin)是上肢allotransplant急性排斥的主要標的。", "peropt": {"A": "nerve非主要標的。", "B": "vessel非。", "C": "✔答案:skin為主要標的。", "D": "bone非。", "E": "musculotendinous非。"}, "src": "NG", "sub": "M"}, {"id": "NG105-2", "stem": "下列何種狀況可施行Primary tendon repairs？", "opts": {"A": "Severe wound contamination", "B": "Bony injuries involving joint components or extensive soft-tissue loss", "C": "Destruction of a series of annular pulleys and lengthy tendon defects", "D": "Within several days or at most 3 or 4 weeks after tendon laceration", "E": "Experienced surgeons are not available"}, "ans": "D", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, chapter 9, p.186", "conflict": "", "etype": "ai", "expl": "", "key": "Primary(或delayed primary)tendon repair可於傷後數日至3-4週內施行;嚴重污染/骨或軟組織缺損/pulley破壞為禁忌。", "peropt": {"A": "severe contamination=禁忌。", "B": "骨/軟組織大量缺損=禁忌。", "C": "pulley破壞+肌腱缺損=禁忌。", "D": "✔答案:傷後數日至3-4週內可行primary repair。", "E": "無經驗術者=不宜。"}, "src": "NG", "sub": "F"}, {"id": "NG105-4", "stem": "下列關於手部supporting architecture 敘述何者為錯？", "opts": {"A": "Five intrinsic muscles and four extrinsic muscles are specifically influential on thumb positioning and activity.", "B": "The fixed unit of the hand, consisting of the third and fourth metacarpals and the distal carpal row.", "C": "The thumb and its metacarpal with a wide range of motion at the carpometacarpal joint.", "D": "The index digit with independence of action within the range of motion allowed by its joints and ligaments.", "E": "The third, fourth, and fifth digits with the fourth and fifth metacarpals."}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chapter 1, p.5", "conflict": "", "etype": "ai", "expl": "", "key": "Fixed unit為第二、三掌骨+distal carpal row(非3rd/4th)。", "peropt": {"A": "5內在肌+4外在肌影響拇指，正確。", "B": "✔答案(錯)：fixed unit為第二、三掌骨(非3rd/4th)。", "C": "thumb CMC活動度大，正確。", "D": "index獨立活動，正確。", "E": "3/4/5指與4/5掌骨，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG105-5", "stem": "有關手部closed rupture of the flexor tendons and pulleys之敘述，何者正確？", "opts": {"A": "Traumatic FDS tendon avulsion from the tendon–bone junction accounts for a major portion of closed rupture cases.", "B": "Leddy and Packer 將 close tendon ruptures分成四種，最常見的型態是\"The FDP tendon retracts to the level of the PIP joint.\"", "C": "\"Jersey finger\" is seen most commonly in the ring finger.", "D": "Flexor pulleys are prone to sprains and ruptures during climbing.", "E": "The A2 pulley of the index finger is the most often injured."}, "ans": "BCD", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chapter 9, p.197", "conflict": "", "etype": "ai", "expl": "", "key": "正確BCD;jersey finger為FDP(非FDS)avulsion,最常見無名指。", "peropt": {"A": "✗為FDP(非FDS)avulsion(jersey finger)。", "B": "Leddy-Packer分型,最常見FDP retract至PIP，正確。", "C": "jersey finger最常見於無名指，正確。", "D": "攀岩易致pulley sprain/rupture，正確。", "E": "✗攀岩最常傷A2/A4;'index A2最常'有誤。"}, "src": "NG", "sub": "F"}, {"id": "NG105-6", "stem": "對於mutilated hand 的診斷與治療，下列敘述何者為錯？", "opts": {"A": "Definitive reconstruction of the mangled extremity may be undertaken either early or late.", "B": "Early soft-tissue coverage improves the vascularity to the traumatized area, limits exposure to hospital pathogens, and reduces the risk of infection.", "C": "Early reconstruction implies repair or reconstruction of all injured structures during the initial phase of treatment, up to 10 days from the initial injury.", "D": "Multiple examinations of the extremity by multiple physicians are suggested.", "E": "In the delayed staged reconstruction, vascularity is established, and the soft-tissue injuries are treated with serial debridements performed at 24–72-hour intervals."}, "ans": "D", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chapter 12, p.257-258", "conflict": "", "etype": "ai", "expl": "", "key": "不建議多位醫師重複多次檢查傷肢(增加污染/傷害)。", "peropt": {"A": "重建可early或late，正確。", "B": "early coverage改善血供/降感染，正確。", "C": "early reconstruction可至傷後10天內，正確。", "D": "✔答案(錯)：不建議多位醫師重複多次檢查。", "E": "delayed staged每24-72h serial debridement，正確。"}, "src": "NG", "sub": "L"}, {"id": "NG105-7", "stem": "下列關於metacarpal hand的敘述何者為錯？", "opts": {"A": "The term \"metacarpal hand\" refers to a hand injury with multiple finger amputations at the level of the metacarpophalangeal joint, or immediately proximal or distal to it.", "B": "In the finger amputation level of proximal to the metacarpophalangeal joints, it requires the harvest of combined second and third toes as transmetatarsal transfers.", "C": "In the finger amputation level through the metacarpophalangeal joints with intact articular surfaces, combined second and third toes are harvested as composite joint transfers.", "D": "In metacarpal hand with various levels of thumb involvement, reconstruction of the thumb is determined by the presence or absence of a functional thenar musculature.", "E": "If the thenar muscle is intact or possesses adequate function, a staged procedure to reconstruct the thumb and two adjacent fingers is recommended."}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chapter 14, p.298", "conflict": "選項改寫/重排家族(跨年)：本列=E；另有 B(108)。選項內文不同故答案字母不同,各年多半各自正確;以本題選項與🎯核心為準,記概念勿背字母。", "etype": "ai", "expl": "", "key": "thenar完整/功能足夠→one-stage重建(非staged)。", "peropt": {"A": "metacarpal hand定義，正確。", "B": "proximal to MCPJ→transmetatarsal transfer，正確。", "C": "through MCPJ intact articular→composite joint transfer，正確。", "D": "thumb重建取決thenar功能，正確。", "E": "✔答案(錯)：thenar完整→one-stage(非staged)。"}, "src": "NG", "sub": "N"}, {"id": "NG105-8", "stem": "下列Multiple digit replantations 的原則，哪些正確？（複選）", "opts": {"A": "The finger with the best chance of function is repaired first. Even if the index finger is stiff, it still needs repair.", "B": "Replantation of the distal amputation of the ring and little finger is strongly recommended because of their need for full length in order to get optimal hand closure and good grip function.", "C": "A functional hand can be achieved with an opposable thumb, a satisfactory first webspace, a stable wrist, and at least two fingers.", "D": "The value of the ulnar digits to hand function, especially power grip, is underappreciated. Priority should be given to restoration of the ulnar digits after salvage of the thumb.", "E": "If the thumb and index finger are amputated and the distal thumb is not replantable, replantation of the index finger to the thumb position, a microvascular pollicization should be performed."}, "ans": "BCDE", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chapter 11, p237-238", "conflict": "", "etype": "ai", "expl": "", "key": "正確BCDE;index若僵硬常可略過(非一定repair)。", "peropt": {"A": "✗index若僵硬常可略過(非一定要repair)。", "B": "ring/little distal截斷建議再接(full length for grip)，正確。", "C": "功能手=opposable thumb+first web+stable wrist+≥2指，正確。", "D": "ulnar digits對power grip重要,thumb後優先，正確。", "E": "thumb+index截斷、thumb不可再接→index移至thumb(pollicization)，正確。"}, "src": "NG", "sub": "L"}, {"id": "NG105-9", "stem": "Thumb loss可分為三個level: distal, middle and proximal third. 關於nonmicrosurgical reconstruction的敘述，何者為是：（複選）", "opts": {"A": "When thumb loss occurs due to trauma, replantation is the best method of reconstruction for many patients.", "B": "Loss of the distal third of the thumb is minimal in terms of functional loss. The chief priority is soft-tissue coverage.", "C": "For thumb losses in the middle third, length restoration becomes a primary goal. This is done by extending either the absolute length or the relative length of the thumb", "D": "Proximal third thumb losses are best treated with first webspace deepening.", "E": "Dorsal hand flap can provide a substantial amount of coverage for proximal third thumb loss."}, "ans": "ABC", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chapter 13, p.282, 289", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABC;proximal third非以first webspace deepening為佳(需length重建)。", "peropt": {"A": "trauma性thumb loss replantation為佳，正確。", "B": "distal third功能損失小,首重soft tissue coverage，正確。", "C": "middle third首要目標為length restoration，正確。", "D": "✗proximal third非以first webspace deepening為佳。", "E": "✗dorsal hand flap非proximal third主要覆蓋。"}, "src": "NG", "sub": "L"}, {"id": "NG105-10", "stem": "下列關於指甲及甲床之敘述，何者錯誤？（複選）", "opts": {"A": "The nail is produced by cells from two areas of the perionychium including the sterile matrix and the dorsal roof of the nail fold.", "B": "Loss of the sterile matrix causes a dull-appearing nail.", "C": "Counter pressure between the nail and the volar skin and pulp aids in delicate and precise touch.", "D": "The nail contributes to two-point discrimination and tactile sensation.", "E": "The goal to repair the nail bed is simple – re-approximation. Whether tension on the suture line or not will not affect the outcome."}, "ans": "ABE", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chapter 6, p.119", "conflict": "", "etype": "ai", "expl": "", "key": "錯誤ABE;A(sterile matrix敘述有誤,應含germinal matrix)、E(甲床修補需無張力,張力會影響outcome)。", "peropt": {"A": "✗甲由germinal matrix+dorsal roof產生(sterile matrix敘述有誤)。", "B": "✗此敘述描述有誤。", "C": "counter pressure助精細觸覺,正確(非答案)。", "D": "nail助two-point discrimination,正確(非答案)。", "E": "✗甲床修補需無張力;有張力會影響outcome。"}, "src": "NG", "sub": "Q"}, {"id": "NG105-11", "stem": "Which skin and soft tissue malignancy is the most common malignant tumor in the hand?", "opts": {"A": "Basal cell carcinoma", "B": "Squamous cell carcinoma", "C": "Melanoma", "D": "Bowen's disease", "E": "Rhabdomyosarcoma"}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan chap15, P317", "conflict": "", "etype": "ai", "expl": "", "key": "Squamous cell carcinoma為手部最常見惡性腫瘤。", "peropt": {"A": "BCC非最常。", "B": "✔答案:SCC最常見手部惡性腫瘤。", "C": "melanoma非最常。", "D": "Bowen's非。", "E": "rhabdomyosarcoma非。"}, "src": "NG", "sub": "P"}, {"id": "NG105-12", "stem": "Which is the second most common benign hand tumor?", "opts": {"A": "Epidermal inclusion cyst", "B": "cutaneous horn", "C": "Ganglion cyst", "D": "Giant cell tumor", "E": "Lipoma"}, "ans": "D", "multi": false, "years": ["105"], "cite": "Neligan chap15, P319", "conflict": "", "etype": "ai", "expl": "", "key": "Giant cell tumor為第二常見良性手部腫瘤(ganglion第一)。", "peropt": {"A": "epidermal inclusion cyst非第二。", "B": "cutaneous horn非。", "C": "ganglion為第一常見。", "D": "✔答案:GCT第二常見。", "E": "lipoma非。"}, "src": "NG", "sub": "P"}, {"id": "NG105-13", "stem": "Which of the following is not the surgical options for Dupuytren's disease?", "opts": {"A": "Fasiotomy", "B": "Regional fasiectomy", "C": "Dermatofasciectomy", "D": "Local fasciectomy", "E": "Non of above"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan chap17, P355", "conflict": "", "etype": "ai", "expl": "", "key": "None of above:fasciotomy/regional/local fasciectomy/dermatofasciectomy皆為Dupuytren手術選擇。", "peropt": {"A": "fasciotomy=選擇。", "B": "regional fasciectomy=選擇。", "C": "dermatofasciectomy=選擇。", "D": "local fasciectomy=選擇。", "E": "✔答案:none of above(皆為選擇)。"}, "src": "NG", "sub": "I"}, {"id": "NG105-14", "stem": "Which of the following description was not one of cardinal signs of flexor tenosynovitis?", "opts": {"A": "Fusiform swelling of the finger", "B": "Partially flexed posture of the digit", "C": "Tenderness over the entire flexor tendon sheath", "D": "Disproportionate pain on passive extension", "E": "Disproportionate pain on passive flexion"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan chap16, P339", "conflict": "", "etype": "ai", "expl": "", "key": "Kanavel徵為passive『extension』疼痛;passive flexion疼痛非cardinal sign。", "peropt": {"A": "fusiform swelling=cardinal sign。", "B": "flexed posture=cardinal sign。", "C": "sheath全程壓痛=cardinal sign。", "D": "passive extension疼痛=cardinal sign。", "E": "✔答案(非)：passive flexion疼痛非cardinal sign。"}, "src": "NG", "sub": "B"}, {"id": "NG105-15", "stem": "How many structures within the carpal tunnel?", "opts": {"A": "Ten tendons and one nerve.", "B": "Nine tendons and one nerve.", "C": "Eight tendons and two nerves.", "D": "Nine tendons and three nerves.", "E": "Nine tendons and two nerve."}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chap 24, p 505", "conflict": "", "etype": "ai", "expl": "", "key": "Carpal tunnel內9條肌腱(4 FDS+4 FDP+1 FPL)+1神經(median)。", "peropt": {"A": "✗非10條。", "B": "✔答案:9條肌腱+1神經。", "C": "✗非8條/2神經。", "D": "✗非3神經。", "E": "✗非2神經。"}, "src": "NG", "sub": "C"}, {"id": "NG105-16", "stem": "關於Posterior interosseous nerve compression的描述何者錯誤？", "opts": {"A": "The PIN is a motor-only nerve that innervates the extensor muscles and abductor pollicis longus distal to the elbow.", "B": "The PIN does not innervate the ECRL, brachioradialis, or anconeus muscles.", "C": "Most often due to compression of the PIN at the fibrous arch of FDS muscle.", "D": "Extensor tendon rupture or subluxation may mimic PIN syndrome, but can be readily ruled out by evaluating for an intact passive tenodesis effect.", "E": "Surgery is recommended for PIN syndrome if there is no appreciable improvement in motor function by approximately 3 months."}, "ans": "C", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chap 24, p 505", "conflict": "", "etype": "ai", "expl": "", "key": "PIN最常壓迫於arcade of Frohse(supinator近端緣),非FDS fibrous arch(後者為AIN/median)。", "peropt": {"A": "PIN為純運動、支配伸肌+APL，正確。", "B": "PIN不支配ECRL/brachioradialis/anconeus，正確。", "C": "✔答案(錯)：PIN最常壓於arcade of Frohse(非FDS fibrous arch)。", "D": "extensor rupture可mimic,tenodesis鑑別，正確。", "E": "3個月無改善建議手術，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG105-17", "stem": "下列關於ischemic hand 的surgical intervention，何者不能減少sympathetic tone？", "opts": {"A": "Proximal cervicothoracic sympathectomy", "B": "Leriche sympathectomy (resection and ligation of a thrombosed or occluded arterial segment)", "C": "Peripheral periarterial sympathectomy", "D": "Balloon angioplasty with periarterial sympathectomy", "E": "Percutaneous angioplasty with stent"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan Volume 6, Chap 22, p 476-477", "conflict": "", "etype": "ai", "expl": "", "key": "Percutaneous angioplasty+stent恢復血流但『不』減少sympathetic tone。", "peropt": {"A": "proximal cervicothoracic sympathectomy減sympathetic tone。", "B": "Leriche sympathectomy減sympathetic tone。", "C": "peripheral periarterial sympathectomy減sympathetic tone。", "D": "balloon angioplasty+periarterial sympathectomy減sympathetic tone。", "E": "✔答案:angioplasty+stent不減sympathetic tone。"}, "src": "NG", "sub": "K"}, {"id": "NG105-18", "stem": "下列何者屬於Clinical signs of ulnar nerve palsy？（複選）", "opts": {"A": "Durkan's sign", "B": "Duchenne's sign", "C": "Wartenberg's sign", "D": "Froment's sign", "E": "Jeanne's sign"}, "ans": "BCDE", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chap 24, P513", "conflict": "", "etype": "ai", "expl": "", "key": "尺神經麻痺臨床徵BCDE;Durkan's sign為median/CTS。", "peropt": {"A": "✗Durkan's sign為median/CTS(非ulnar)。", "B": "Duchenne's(claw)=ulnar。", "C": "Wartenberg's=ulnar。", "D": "Froment's=ulnar。", "E": "Jeanne's=ulnar。"}, "src": "NG", "sub": "C"}, {"id": "NG105-19", "stem": "依照American Academy of Orthopaedic Surgeons clinical practice guidelines for the treatment of carpal tunnel syndrome (CTS)，下列何者錯誤？（複選）", "opts": {"A": "Nonsurgical treatment is an option for early CTS. Surgery is an option when there is evidence of median nerve denervation.", "B": "Local steroid injection or splinting is recommended after surgical treatment failure.", "C": "Surgical treatment with complete division of the flexor retinaculum is recommended, regardless of the technique used.", "D": "Wrist immobilization is recommended postoperatively after routine carpal tunnel release.", "E": "It is suggested that physicians use one or more patient response tools to assess results after carpal tunnel treatment in performing research"}, "ans": "BD", "multi": true, "years": ["105"], "cite": "Neligan Volume 6, Chap 24, p 507", "conflict": "", "etype": "ai", "expl": "", "key": "錯誤BD:術後失敗不建議steroid/splint;routine CTR術後不建議wrist immobilization。", "peropt": {"A": "early CTS非手術、denervation則手術，正確。", "B": "✔答案(錯)：術後失敗不建議steroid/splint。", "C": "完全切開flexor retinaculum，正確。", "D": "✔答案(錯)：routine CTR術後不建議wrist immobilization。", "E": "使用patient response tools於研究，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG105-20", "stem": "Which of the following descriptions were correct about De Quervain's tenosynovitis? （複選）", "opts": {"A": "Tenosynovitis of the first dorsal compartment", "B": "The Finkelstein's test is a sensitive test for this problem", "C": "Nonsurgical treatment, including oral non-steroidal anti-inflammatory medication, steroid injections and splinting", "D": "Surgery must avoid injury to small branches of the radial nerve and the lateral antebrachial cutaneous nerve of the forearm", "E": "After operation, a short thumb spica splint is worn until suture removal about 10–14 days later"}, "ans": "ABCDE", "multi": true, "years": ["105"], "cite": "Neligan chap18, P366", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(de Quervain:第一背側間室、Finkelstein、非手術治療、手術避傷radial/LABC分支、術後thumb spica)。", "peropt": {"A": "第一背側間室，正確。", "B": "Finkelstein test敏感，正確。", "C": "NSAID/steroid/splint非手術治療，正確。", "D": "手術避免傷radial nerve/LABC分支，正確。", "E": "術後thumb spica splint至拆線10-14天，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG104-1", "stem": "下列關於Kaplan's cardinal line，何者為非？", "opts": {"A": "Emanuel Kaplan described specific surface lines in locating key structures in the palm of the hand.", "B": "Kaplan's cardinal line is drawn from the apex of the first web space to the distal edge of the pisiform bone.", "C": "The intersection with longitudinal line from the ulnar side of the middle finger corresponds to the motor branch of the median nerve.", "D": "The intersection with longitudinal line from the ulnar side of the middle finger corresponds to the pisiform bone.", "E": "The motor branch of the ulnar nerve is found on the cardinal line between the hamate and pisiform."}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 2", "conflict": "", "etype": "ai", "expl": "", "key": "該交點(尺側中指縱線)對應deep motor branch/hook of hamate區,非pisiform;D敘述有誤。", "peropt": {"A": "Kaplan描述掌面surface lines，正確。", "B": "cardinal line由first web apex至pisiform遠端緣，正確。", "C": "與中指尺側縱線交點≈median motor branch區，正確。", "D": "✔答案(非)：此交點非對應pisiform。", "E": "ulnar motor branch在hamate與pisiform間，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG104-2", "stem": "下列有關retinacular system of hand，何者為非？", "opts": {"A": "The transverse carpal ligament confines 9 flexor tendons and median nerve within the carpal tunnel.", "B": "Four pulleys housing the flexor pollicis longus within the thumb are regular present.", "C": "Four or five discrete annular pulleys and three cruciate bands are present in the fingers.", "D": "The second annular band(A2) is the largest pulley of fingers.", "E": "The A2 and A4 pulleys are crucial to prevent bowstringing."}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 30-31", "conflict": "", "etype": "ai", "expl": "", "key": "拇指有『三』個pulley(A1、oblique、A2),非四個。", "peropt": {"A": "carpal tunnel含9 flexor腱+median，正確。", "B": "✔答案(非)：拇指為三個pulley(非四)。", "C": "手指4-5 annular+3 cruciate，正確。", "D": "A2為最大pulley，正確。", "E": "A2/A4防bowstringing，正確。"}, "src": "NG", "sub": "A"}, {"id": "NG104-3", "stem": "下列有關Nerve assessment of hands，何者為非？", "opts": {"A": "When tapping on a peripheral nerve distal to a nerve injury, the tingling that radiates distally along the course of the nerve is called Tinel's sign.", "B": "Phalen's test is used as a provocative test specific to carpal tunnel syndrome.", "C": "Froment's test is used to assess the motor function of the ulnar nerve.", "D": "In motor dysfunction of the ulnar nerve, the patient attempts to hold the paper by flexing the thumb IP joint is called Jeanne's sign.", "E": "In motor dysfunction of the ulnar nerve, the small finger deviates away from the ring finger is called Wartenberg's sign"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 57-58", "conflict": "", "etype": "ai", "expl": "", "key": "以拇指IP屈曲夾紙為Froment's sign;Jeanne's為拇指MCP過伸,D標示錯誤。", "peropt": {"A": "Tinel's sign，正確。", "B": "Phalen's為CTS試驗，正確。", "C": "Froment's評估ulnar運動，正確。", "D": "✔答案(非)：拇指IP屈曲夾紙為Froment's(非Jeanne's)。", "E": "Wartenberg's(小指外展)，正確。"}, "src": "NG", "sub": "C"}, {"id": "NG104-4", "stem": "下列有關nail and finger tip描述，何者為非？", "opts": {"A": "The nail bed consists of the germinal and sterile matrices.", "B": "The nail unit is supplied by branches of the common volar digital arteries.", "C": "According to Flint, the digital arteries form three arterial anastomoses over the dorsal surface of the distal phalangx.", "D": "Injury to the fingertip and nail bed is the most common injury of the hand.", "E": "The index finger is the most commonly injured in the injury of the fingertip."}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 117-119", "conflict": "", "etype": "ai", "expl": "", "key": "中指(long finger)為最常受傷指尖,非index。", "peropt": {"A": "germinal+sterile matrix，正確。", "B": "common volar digital arteries，正確。", "C": "Flint三個arterial anastomoses，正確。", "D": "指尖/甲床為手部最常見傷，正確。", "E": "✔答案(非)：中指最常受傷(非index)。"}, "src": "NG", "sub": "Q"}, {"id": "NG104-5", "stem": "下列有關tendon repair描述，何者為非？", "opts": {"A": "A locking tendon-suture junction is better than a grasping junction in terms of holding power.", "B": "A core suture purchase of at least 0.7-1.0 cm is necessary to generate maximal holding power.", "C": "Deep-bite peripheral sutures doesn't increase repair strength.", "D": "Increasing suture caliber will improve repair strength.", "E": "Among locking junctions, cross-locks provide identical strength to circular-locks."}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 183", "conflict": "", "etype": "ai", "expl": "", "key": "Deep-bite peripheral suture『會』增加修補強度(此敘述說不會,有誤)。", "peropt": {"A": "locking優於grasping，正確。", "B": "core purchase 0.7-1.0cm，正確。", "C": "✔答案(非)：deep-bite peripheral suture會增加強度。", "D": "增加suture caliber提升強度，正確。", "E": "cross-locks≈circular-locks，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG104-6", "stem": "下列有關extensor tendon描述，何者為非？", "opts": {"A": "The EIP and EDM are located on the radial side of the corresponding communis tendons.", "B": "In 34% of patients, the first compartment is further divided by an additional septum.", "C": "The second compartment is bordered by Lister's tubercle on the ulnar side.", "D": "The 3rd compartment crosses the wrist in a diagonal fashion above the 2nd compartment.", "E": "The 4th compartment contains the extensor digitorum communis and extensor indicis propius tendons."}, "ans": "A", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 211", "conflict": "", "etype": "ai", "expl": "", "key": "EIP與EDM位於相對應communis腱的『尺側』(非radial)。", "peropt": {"A": "✔答案(非)：EIP/EDM在尺側(非radial)。", "B": "34%第一間室有額外septum，正確。", "C": "Lister's tubercle在第二間室尺側緣，正確。", "D": "第三間室斜行越過第二，正確。", "E": "第四間室含EDC+EIP，正確。"}, "src": "NG", "sub": "F"}, {"id": "NG104-7", "stem": "下列有關ring avulsion injuries 的敘述，何者為非？", "opts": {"A": "Class II is circulation inadequate without skeletal injury.", "B": "Class III is circulation inadequate with skeletal injury.", "C": "Injuries of class II and above require microvascular repair.", "D": "Class II ring avulsions are the most challenging .", "E": "The most common complications are flexion contracture, cold intolerance and malunion."}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, Page 242", "conflict": "", "etype": "ai", "expl": "", "key": "Class III(或完全型)最具挑戰,非class II。", "peropt": {"A": "class II=循環不足無骨傷，正確。", "B": "class III=循環不足+骨傷，正確。", "C": "class II以上需microvascular repair，正確。", "D": "✔答案(非)：class III最具挑戰(非II)。", "E": "常見併發症:flexion contracture/cold intolerance/malunion，正確。"}, "src": "NG", "sub": "L"}, {"id": "NG104-8", "stem": "下列哪些不是Secondary tendon repair by one-stage free tendon grafting的indication？（複選）", "opts": {"A": "lacerated tendons are not treated during primary or delayed primary stage.", "B": "the primary repairs have ruptured and cannot be re-repaired directly.", "C": "tendon injuries are not indicative of primary repairs , such as severe contamination.", "D": "Lock of passive range of joint motion.", "E": "Presence of soft tissue wounds or defect and fractures not well healed."}, "ans": "DE", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, Page 202", "conflict": "", "etype": "ai", "expl": "", "key": "非indication者為DE:缺乏被動關節活動度、軟組織/骨折未癒皆為禁忌(而非適應症)。", "peropt": {"A": "✗為indication:一期未處理的lacerated tendon。", "B": "✗為indication:一期修補破裂無法直接再修補。", "C": "✗為indication:不適一期修補(如嚴重污染)。", "D": "✔非indication:缺乏被動ROM(為禁忌)。", "E": "✔非indication:軟組織傷口/骨折未癒(為禁忌)。"}, "src": "NG", "sub": "F"}, {"id": "NG104-9", "stem": "下列哪些為replantation的strong indication？（複選）", "opts": {"A": "Multiple digital amputations", "B": "Thumb amputations", "C": "Any amputated part in a child", "D": "Single finger proximal to flexor digitorium superficialis insertion in adult", "E": "Transmetacarpal and partial hand amputations."}, "ans": "ABCE", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, Page 230", "conflict": "", "etype": "ai", "expl": "", "key": "Strong indication為ABCE;成人單指近端於FDS insertion『非』強適應症。", "peropt": {"A": "multiple digital amputations，是。", "B": "thumb amputations，是。", "C": "any part in a child，是。", "D": "✗成人單指近端於FDS insertion非強適應症。", "E": "transmetacarpal/partial hand，是。"}, "src": "NG", "sub": "L"}, {"id": "NG104-10", "stem": "有關thumb and finger microsurgical reconstruction，下列哪些為非？（複選）", "opts": {"A": "Advanced age is a contraindication.", "B": "Toe-to-hand transplantations remain the only useful option for the metacarpal hand to restore useful function.", "C": "Ideal patients are well motivated and clear about their needs and goals with good overall health.", "D": "Preferential reconstruction of the radial two fingers for manual workers who require a strong grip.", "E": "There was no significant difference in terms of vascular re-exploration rates, recipient site complication between primary or secondary reconstruction."}, "ans": "AD", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, Page 297", "conflict": "", "etype": "ai", "expl": "", "key": "為非者AD:advanced age非絕對禁忌;power grip應優先重建『尺側』兩指(非radial)。", "peropt": {"A": "✔(錯)：advanced age非絕對禁忌。", "B": "toe-to-hand為metacarpal hand唯一有用選擇,正確(非答案)。", "C": "ideal patient敘述正確(非答案)。", "D": "✔(錯)：power grip應優先重建尺側兩指(非radial)。", "E": "primary vs secondary無顯著差異,正確(非答案)。"}, "src": "NG", "sub": "N"}, {"id": "NG104-11", "stem": "Which one of the fascial anatomy of Dupuytren's disease displaced the neurovascular bundle medially and superficially?", "opts": {"A": "Natatory cord", "B": "Spiral cord", "C": "Pretendinous cord", "D": "Retrovascular cord", "E": "Central cord"}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 17 P. 349", "conflict": "", "etype": "ai", "expl": "", "key": "Spiral cord使neurovascular bundle往內側(medial)及淺層(superficial)移位。", "peropt": {"A": "natatory cord非此。", "B": "✔答案:spiral cord使NV bundle往內側/淺層移位。", "C": "pretendinous cord非此。", "D": "retrovascular cord非此。", "E": "central cord非此。"}, "src": "NG", "sub": "I"}, {"id": "NG104-12", "stem": "According to the Bayne and Klug classification of radial longitudinal deficiency, complete radial aplasia in the radiological appearance belongs to the type ?", "opts": {"A": "I", "B": "II", "C": "III", "D": "IV", "E": "V"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 26 P. 558", "conflict": "", "etype": "ai", "expl": "", "key": "Complete radial aplasia為Bayne-Klug type IV。", "peropt": {"A": "type I非。", "B": "type II非。", "C": "type III非。", "D": "✔答案:complete radial aplasia=type IV。", "E": "type V非(此分類主要I-IV)。"}, "src": "NG", "sub": "O"}, {"id": "NG104-13", "stem": "According to the Paley and Herzenberg classification and treatment algorithm, which one of the treatment is right?", "opts": {"A": "type I: without radial head dislocation: Bone transport of ulna distally to support carpus", "B": "type II: Creation of one bone forearm", "C": "type III: Bone transport of ulna distally to support carpus", "D": "type IV: Corrective radial osteotomy"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 26 P. 569", "conflict": "", "etype": "ai", "expl": "", "key": "Paley-Herzenberg:type IV—corrective radial osteotomy(此版key)。", "peropt": {"A": "✗type I治療配對有誤。", "B": "✗type II配對有誤。", "C": "✗type III配對有誤。", "D": "✔答案:type IV—corrective radial osteotomy。"}, "src": "NG", "sub": "O"}, {"id": "NG104-14", "stem": "Which variation in median nerve anatomy in the carpal tunnel is the most common pattern ?", "opts": {"A": "Subligamentous branching pattern", "B": "Transligamentous pattern", "C": "Superficial to the transverse carpal ligament", "D": "arise from the ulnar border of the median nerve", "E": "extraligamentous"}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 24 P. 506", "conflict": "", "etype": "ai", "expl": "", "key": "Median nerve在carpal tunnel最常見型為extraligamentous(recurrent branch於TCL遠端分出)。", "peropt": {"A": "subligamentous非最常。", "B": "transligamentous非最常。", "C": "superficial to TCL非最常。", "D": "由尺側緣分出非最常。", "E": "✔答案:extraligamentous最常見。"}, "src": "NG", "sub": "C"}, {"id": "NG104-15", "stem": "Which one is not the clinical sign of ulnar nerve palsy?", "opts": {"A": "Durkan's sign", "B": "Duchenne's sign", "C": "Masse's sign", "D": "Froment's sign", "E": "Jeanne's sign"}, "ans": "A", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 24 P. 514", "conflict": "", "etype": "ai", "expl": "", "key": "Durkan's sign為median/CTS,非ulnar palsy徵。", "peropt": {"A": "✔答案:Durkan's為median/CTS(非ulnar)。", "B": "Duchenne's=ulnar。", "C": "Masse's=ulnar。", "D": "Froment's=ulnar。", "E": "Jeanne's=ulnar。"}, "src": "NG", "sub": "C"}, {"id": "NG104-16", "stem": "Which muscle is not innervated by anterior interosseous nerve?", "opts": {"A": "FPL", "B": "FDP to the index and middle fingers", "C": "1st lumbricalis muscle", "D": "pronator quadratus"}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 24 P. 511", "conflict": "", "etype": "ai", "expl": "", "key": "1st lumbrical非AIN支配(由median proper);AIN支配FPL/FDP(index,middle)/pronator quadratus。", "peropt": {"A": "FPL由AIN支配。", "B": "FDP(index/middle)由AIN。", "C": "✔答案:1st lumbrical非AIN(由median proper)。", "D": "pronator quadratus由AIN。"}, "src": "NG", "sub": "C"}, {"id": "NG104-17", "stem": "Which following statement about the infections of hand is wrong ?", "opts": {"A": "The natural course of the herpetic whitlow infection is usually self-limited.", "B": "Clenched-fist injuries occurs most commonly over the fifth metacarpophalangeal joints of the dominant hand", "C": "Thorough exploration is required for \"collar-button\" abscess", "D": "The most common organisms of flexor tenosynovitis identified are S. aureus and Streptococcus species.", "E": "The microbiology of necrotizing fasciitis has typically been infection with group A streptococcus."}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan Vol.6 chp. 16 P. 343", "conflict": "", "etype": "ai", "expl": "", "key": "Clenched-fist(fight bite)最常在第三(或第四)MCP,非第五。", "peropt": {"A": "herpetic whitlow多self-limited，正確。", "B": "✔答案(錯)：fight bite最常第三/四MCP(非第五)。", "C": "collar-button abscess需徹底探查，正確。", "D": "flexor tenosynovitis最常S. aureus/Streptococcus，正確。", "E": "necrotizing fasciitis多group A strep，正確。"}, "src": "NG", "sub": "B"}, {"id": "NG104-18", "stem": "Which of the following statements about the timing of hand formation are wrong ?（複選）", "opts": {"A": "Development of arm bud: 14 days", "B": "Further development of arm bud: 28-30 days", "C": "Elongation of arm bud: 34-36 days", "D": "Digits separated: 44–46 days", "E": "Formation of fingernails begins: Week 11-12"}, "ans": "AE", "multi": true, "years": ["104"], "cite": "Neligan Vol.6 chp. 25 P. 527", "conflict": "", "etype": "ai", "expl": "", "key": "錯誤為AE:arm bud出現約day 26(非14);指甲形成約week 14(非11-12)。", "peropt": {"A": "✔(錯)：arm bud約day 26(非14 days)。", "B": "further development 28-30天,正確。", "C": "elongation 34-36天,正確。", "D": "digits separated 44-46天,正確。", "E": "✔(錯)：指甲形成約week 14(非11-12)。"}, "src": "NG", "sub": "O"}, {"id": "NG104-19", "stem": "Which following syndromes are associated with central longitudinal deficiency? （複選）", "opts": {"A": "Oculodigital complex", "B": "Orodigital complex", "C": "Silver–Russell syndrome", "D": "Apert syndrome", "E": "EEC syndrome"}, "ans": "ABCE", "multi": true, "years": ["104"], "cite": "Neligan Vol.6 chp. 26 P. 565", "conflict": "", "etype": "ai", "expl": "", "key": "Central longitudinal deficiency相關為ABCE;Apert syndrome非(屬acrosyndactyly)。", "peropt": {"A": "oculodigital complex，是。", "B": "orodigital complex，是。", "C": "Silver-Russell syndrome，是。", "D": "✗Apert syndrome非central longitudinal deficiency。", "E": "EEC syndrome，是。"}, "src": "NG", "sub": "O"}, {"id": "NG104-20", "stem": "According to the Blauth classification of hypoplastic thumb, which of the classification are right ?（複選）", "opts": {"A": "type I: mild hypoplasia", "B": "type II: moderate hypoplasia", "C": "type III: severe hypoplasia", "D": "type IV: aplasia", "E": "type V: floating thumb"}, "ans": "ABC", "multi": true, "years": ["104"], "cite": "Neligan Vol.6 chp. 27 P. 574-577", "conflict": "", "etype": "ai", "expl": "", "key": "正確ABC;此版D(type IV=aplasia)、E(type V=floating thumb)配對相反——type IV為floating thumb、type V為aplasia。", "peropt": {"A": "type I=mild hypoplasia，正確。", "B": "type II=moderate，正確。", "C": "type III=severe，正確。", "D": "✗type IV為floating thumb(非aplasia)。", "E": "✗type V為aplasia(非floating thumb)。"}, "src": "NG", "sub": "O"}, {"id": "NG104-21", "stem": "下列關於併指(syndactyly)的敘述何者錯誤？", "opts": {"A": "約有50%的病患是雙手同時發生畸形", "B": "可單獨發生也有可能合併於症候群如Poland syndrome中表現", "C": "最常受影響的手指是拇指食指併指", "D": "手指的成形在胚胎發育過程中牽涉細胞凋亡(apoptosis)和BMP-4 (bone morphogenic protein)", "E": "對於完全型併指(complete syndactyly)指蹼(webspace)的重建，背側苜蓿葉型皮瓣(dorsal clover leaf flap)是實用的一種選擇"}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p604-608", "conflict": "", "etype": "ai", "expl": "", "key": "最常見為中指-無名指(long-ring)併指,非拇指-食指。", "peropt": {"A": "約50%雙側，正確。", "B": "可單獨或syndrome(Poland)，正確。", "C": "✔答案(錯)：最常見為中指-無名指併指(非拇指-食指)。", "D": "apoptosis+BMP-4，正確。", "E": "complete syndactyly用dorsal flap重建webspace，正確。"}, "src": "NG", "sub": "O"}, {"id": "NG104-22", "stem": "對於神經損傷，Seddon分類法中的neurotmesis，相當於Sunderland分類法中的那幾級？", "opts": {"A": "1 & 2", "B": "2 & 3", "C": "3 & 4", "D": "4 & 5", "E": "5 & 6"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p699", "conflict": "", "etype": "ai", "expl": "", "key": "Seddon neurotmesis≈Sunderland第4度與第5度。", "peropt": {"A": "1&2非。", "B": "2&3非。", "C": "3&4非。", "D": "✔答案:4&5(neurotmesis)。", "E": "5&6非(Sunderland傳統5級)。"}, "src": "NG", "sub": "E"}, {"id": "NG104-23", "stem": "下列哪些神經常被運用於神經移植(nerve graft)？(1)sural nerve (2)superficial sensory branch of the radial nerve (3)medial antebrachial cutaneous nerve (4)lateral antebrachial cutaneous nerve", "opts": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p708", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆是:sural、radial superficial sensory、MABC、LABC皆常用作nerve graft。", "peropt": {"A": "僅sural不完整。", "B": "僅radial不完整。", "C": "僅MABC不完整。", "D": "僅LABC不完整。", "E": "✔答案:以上皆是。"}, "src": "NG", "sub": "E"}, {"id": "NG104-24", "stem": "下列關於Level I (preganglionic root)臂神經叢損傷(brachial plexus injury)手術治療的敘述何者有誤？", "opts": {"A": "是無法直接修復治療的(irreparable)", "B": "神經轉移(nerve transfer)有黃金時間，最好在傷後5個月內進行", "C": "對於肩膀功能的重建，外展(abduction)功能優先於內收(adduction)，常被利用於神經轉移的包括膈神經(phrenic nerve)及副神經(accessary nerve)", "D": "遠端神經轉移(distal nerve transfer)比起近端轉移(proximal nerve transfer)提供更快速的肌肉功能恢復，目前已成為重建的主流", "E": "臂神經叢損傷合併有前臂Volkmann's contracture時，是functioning free muscle transplantation的適應症"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p798-802", "conflict": "", "etype": "ai", "expl": "", "key": "⚠此版keyed D為『有誤』。惟distal nerve transfer較快恢復、已成主流之敘述,現多認為正確;3rd版判有誤,建議對照原文。", "peropt": {"A": "preganglionic無法直接修復，正確。", "B": "nerve transfer黃金期(約傷後數月內)，正確。", "C": "肩:外展優先,常用phrenic/accessory nerve，正確。", "D": "⚠keyed有誤:distal nerve transfer較快/成主流(此敘述現多認正確,建議查證)。", "E": "BPI+Volkmann's→functioning free muscle transplant，正確。"}, "src": "NG", "sub": "D"}, {"id": "NG104-26", "stem": "關於小兒骨頭生長板傷害(physeal injuries)的敘述何者錯誤？", "opts": {"A": "創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染、腫瘤及輻射線暴露等也會影響骨頭生長", "B": "Salter-Harris classification是最為廣泛使用的分類法", "C": "Peterson type VI是開放性傷害伴隨有生長板的損失(loss of the physis)，相當於Salter-Harris type V", "D": "Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign", "E": "Salter-Harris type III & IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮"}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p654-655", "conflict": "", "etype": "ai", "expl": "", "key": "Peterson type VI(生長板部分損失)『非』等同Salter-Harris V(SH V為crush injury);C敘述有誤。", "peropt": {"A": "創傷最常見+感染/腫瘤/輻射，正確。", "B": "Salter-Harris最廣泛使用，正確。", "C": "✔答案(錯)：Peterson VI非等同SH V。", "D": "SH II最常見+Thurston-Holland sign，正確。", "E": "SH III/IV牽涉germinal layer+關節面，正確。"}, "src": "NG", "sub": "G"}, {"id": "NG104-27", "stem": "下列關於上肢infantile hemangioma(IH)的敘述何者正確？", "opts": {"A": "IH約在兩週大時開始出現，前九個月內為proliferating phase生長迅速", "B": "90%的病患靠病史詢問及理學檢查就能確診", "C": "切片檢查對於診斷通常不太需要，其中對於GLUT1(a glucose transporter)的免疫染色可提供鑑別診斷", "D": "治療以觀察為主，但若出現嚴重傷口問題或病灶過大引起功能障礙則考慮手術治療", "E": "以上皆正確"}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan Volume 6, p672-673", "conflict": "", "etype": "ai", "expl": "", "key": "以上皆正確(IH~2週出現、90%臨床診斷、GLUT1染色鑑別、以觀察為主嚴重才手術)。", "peropt": {"A": "IH~2週出現,前9月proliferating，正確。", "B": "90%靠病史+理學診斷，正確。", "C": "切片少需要,GLUT1染色鑑別，正確。", "D": "以觀察為主,嚴重才手術，正確。", "E": "✔以上皆正確。"}, "src": "NG", "sub": "K"}, {"id": "NG104-28", "stem": "下列關於多指(polydactyly)的敘述何者正確？", "opts": {"A": "尺側多指(ulnar polydactyly)多單獨發生，而橈側多指(radial polydactyly)與症候群的關連性較高", "B": "Wassel classification是常用的橈側多指分類法，其中最常見的是type IV，約佔50%", "C": "中央性多指(central polydactyly)中，發生率由高到低依序為無名指、中指、食指", "D": "橈側多指的重建原則為利用兩指重建出一個拇指，而非單純切除其中一指", "E": "典型的鏡像手(mirror hand)是患者前臂由兩根橈骨構成並缺少尺骨，通常有7-8根手指，手部的橈側和尺側外觀互為鏡像"}, "ans": "BCD", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, p616-619", "conflict": "", "etype": "ai", "expl": "", "key": "正確BCD;E(mirror hand)應為『兩根尺骨、缺橈骨』(ulnar dimelia),此敘述說反。A之radial/ulnar polydactyly與syndrome關連此版判有誤。", "peropt": {"A": "✗此版判有誤(radial/ulnar polydactyly與syndrome關連敘述)。", "B": "Wassel type IV最常見(~50%)，正確。", "C": "central polydactyly發生率無名>中>食，正確。", "D": "radial polydactyly以兩指重建一拇指，正確。", "E": "✗mirror hand為兩根尺骨、缺橈骨(此敘述說反)。"}, "src": "NG", "sub": "O"}, {"id": "NG104-29", "stem": "下列關於神經損傷修復的敘述何者正確？", "opts": {"A": "神經斷端受損壞死的組織盡量不要切除，以免無法直接縫合", "B": "神經縫合時縫越多針越好，以免神經纖維露出形成神經瘤", "C": "epineural repair是常用且有效的縫合法，但必須注意神經束是否正確吻合(fascicular match)", "D": "纖維蛋白膠(fibrin glue)對於神經縫合完全沒有幫助", "E": "fascicular repair適合用在感覺和運動神經束有明顯區隔的情形下，例如在手腕處的尺神經"}, "ans": "CE", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, p704-707", "conflict": "", "etype": "ai", "expl": "", "key": "正確CE;斷端壞死組織應切除、縫合非越多針越好、fibrin glue有輔助。", "peropt": {"A": "✗神經斷端壞死組織應切除。", "B": "✗縫合非越多針越好(過多增加損傷)。", "C": "epineural repair常用有效,須注意fascicular match，正確。", "D": "✗fibrin glue對神經縫合有輔助(非完全沒幫助)。", "E": "fascicular repair適合感覺/運動束分明處(如手腕尺神經)，正確。"}, "src": "NG", "sub": "E"}, {"id": "NG104-30", "stem": "下列關於利用肌腱轉移(tendon transfer)治療radial nerve palsy的敘述何者正確？", "opts": {"A": "手指無法伸展(extension)和拇指無法伸展及外展(abduction)為radial nerve palsy的表現", "B": "Pronator teres(PT)通常轉移到extensor pollicis longus(EPL)以提供拇指伸展", "C": "Radial nerve palsy的患者最顯著的功能障礙在於因腕關節不穩定，導致手指彎曲力量無法有效傳達而降低握力", "D": "手腕處的tenodesis effect可增進肌腱轉移的活動幅度達25 mm", "E": "通常利用Flexor carpi radialis(FCR)或flexor carpi ulnaris(FCU)轉移至extensor digitorum communis(EDC)以提供手指的伸展"}, "ans": "ACDE", "multi": true, "years": ["104"], "cite": "Neligan Volume 6, p", "conflict": "", "etype": "ai", "expl": "", "key": "正確ACDE;PT通常轉移至ECRB(腕伸展),非EPL。", "peropt": {"A": "手指+拇指伸展/外展障礙為radial palsy表現，正確。", "B": "✗PT通常轉移至ECRB(腕伸展),非EPL。", "C": "最顯著障礙為腕不穩致握力下降，正確。", "D": "腕tenodesis effect增進活動達25mm，正確。", "E": "FCR或FCU→EDC提供手指伸展，正確。"}, "src": "NG", "sub": "C"}, {"id": "GS115-1", "stem": "一位42歲健康男性，因為半年前外傷，導致肘隧道症候群伴隨claw hand、小魚際肌且掌骨間肌萎縮，以下何種神經重建手術方式最適用?", "opts": {"A": "Donor nerve: ECRL branch radial nerve ; Recipient nerve: Ulnar motor branch", "B": "Donor nerve: ECRB branch radial nerve ; Recipient nerve: Ulnar motor branch", "C": "Donor nerve: Terminal branch of AIN ; Recipient nerve: Ulnar motor branch", "D": "Donor nerve: FCU branch ulnar nerve; Recipient nerve: Ulnar motor branch.", "E": "Jones tendon transfer"}, "ans": "C", "multi": false, "years": ["110", "111", "112", "113", "114", "115"], "cite": "Grabb and Smith's, 9th, Ch 83, p712", "conflict": "", "etype": "orig", "key": "", "peropt": {}, "expl": "High ulnar nerve injuries result in loss of FCU wrist flexion (compensated by FCR innervated by median nerve), ring and small finger flexion, and hand intrinsics, causing clawing with weak grip and pinch. Hand intrinsic weakness can be improved with terminal AIN of median nerve SETS to the deep motor branch of ulnar nerve transfer at the forearm.", "src": "GS", "sub": "C"}, {"id": "GS115-2", "stem": "What kind of complication will be happened if repaired or reconstructed flexor digitorum profundus is too short in zone I repair?", "opts": {"A": "Mallet finger", "B": "Boutoniere deformity", "C": "Lumbrical Plus finger", "D": "Quadriga effect", "E": "All of the above are correct."}, "ans": "D", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 89, p911", "conflict": "", "etype": "orig", "key": "", "peropt": {}, "expl": "In zone I repair, FDP should not be shortened by more than 1 cm because of the \"quadriga effect,\" leading to flexion lag of the uninjured digits and decreased grip strength.", "src": "GS", "sub": "F"}, {"id": "GS115-3", "stem": "Which are the contribute to the displacement of the 1st metacarpal shaft in Bennett's fracture except?", "opts": {"A": "Flexor pollicis longus and abductor pollicis longus", "B": "Abductor pollicis longus and adductor pollicis", "C": "Adductor pollicis and flexor pollicis longus", "D": "Extensor pollicis brevis and flexor pollicis longus", "E": "All of the above are incorrect"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 86, p881", "conflict": "", "etype": "orig", "key": "", "peropt": {}, "expl": "Thumb metacarpal base fractures are unstable because of strong attachment of the ulnar fragment to the index metacarpal by the volar beak ligament, the pull of abductor pollicis longus on the base of the radial fragment, and adductor pollicis on the MCP joint.", "src": "GS", "sub": "G"}, {"id": "GS115-4", "stem": "Which is true about 4th degree of injury Sunderland?", "opts": {"A": "Axonal rupture without interruption of the basal lamina tubes", "B": "Rupture of both axons and basal lamina tubes, some scar", "C": "Neuroma-in-continuity with complete scar block", "D": "Complete transection", "E": "Focal demyelination/conduction block"}, "ans": "C", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 84, fig84.1", "conflict": "", "etype": "orig", "key": "", "peropt": {}, "expl": "Sunderland 1st (neurapraxia)=demyelination, full recovery. 2nd (axonotmesis)=axonal loss, basal laminar tubes preserved, complete recovery. 3rd=axonal loss with disruption of basal laminar tubes, incomplete recovery. 4th and 5th (neurotmesis)=neuroma-in-continuity and transection respectively.", "src": "GS", "sub": "E"}, {"id": "GS115-5", "stem": "關於digital flexor sheath的敘述何者為正確?（複選）", "opts": {"A": "可分為synovial sheath和condensed fibrous bands，前者為一種paratenon，可提供肌腱養分並形成一個平順的滑動介面", "B": "每根手指(finger)有五個annular pulley和三個cruciate pulleys", "C": "拇指(thumb)有三個pulley，分別為A1, oblique, and A2，並不像手指有cruciate pulley", "D": "手指的A2和A4 pulley靠近指關節(PIPJ和DIPJ)，是annular pulley中較大且重要的部分，手術時盡量不要傷害", "E": "FDS tendon的分岔位置約位於A2 pulley的中段"}, "ans": "ABCE", "multi": true, "years": ["114", "115"], "cite": "Grabb and Smith's, 9th, Ch 89, Fig 89.2", "conflict": "", "etype": "orig", "key": "", "peropt": {}, "expl": "A2與A4 pulley各在近端與中段指節上，非在關節上。", "src": "GS", "sub": "F"}, {"id": "GS115-6", "stem": "Which of the following is not involved in the patho-mechanics of a Boutonniere deformity?", "opts": {"A": "Rupture of the central tendon over the PIP joint.", "B": "Prolapse of the lateral band volar to the PIP joint axis", "C": "Rupture of lateral band", "D": "Hyperextension of DIP joint and flexion deformity of the PIP joint", "E": "None of the above"}, "ans": "C", "multi": false, "years": ["114", "115"], "cite": "Grabb and Smith's, 9th, Ch.90 Fig. 90.5", "conflict": "〔選項重排家族·Boutonniere：他年『lateral band斷裂』為選項D→ans D。記概念:lateral band是移位非斷裂〕", "etype": "ai", "key": "Boutonniere機制:PIP central slip斷裂→lateral bands往掌側(volar to PIP軸)滑移→PIP屈曲、DIP過伸。lateral band為『移位』非斷裂。", "peropt": {"A": "central tendon(slip)在PIP斷裂=機制之一。", "B": "lateral band往PIP軸掌側prolapse=機制之一。", "C": "✔答案(不涉及)：lateral band『斷裂』非boutonniere機制(是移位非斷裂)。", "D": "DIP過伸+PIP屈曲=典型表現。", "E": "none of the above不選。"}, "expl": "", "src": "GS", "sub": "F"}, {"id": "GS115-7", "stem": "De Quervain's tenosynovitis 為?", "opts": {"A": "First dorsal compartment tenosynovitis", "B": "Second dorsal compartment tenosynovitis", "C": "Third dorsal compartment tenosynovitis", "D": "Forth dorsal compartment tenosynovitis", "E": "Fifth dorsal compartment tenosynovitis"}, "ans": "A", "multi": false, "years": ["110", "111", "112", "113", "114", "115"], "cite": "Grabb and Smith's, 9th, Ch.91", "conflict": "", "etype": "ai", "key": "De Quervain=first dorsal compartment(APL+EPB)腱鞘炎。", "peropt": {"A": "✔答案:first dorsal compartment。", "B": "second非。", "C": "third非。", "D": "fourth非。", "E": "fifth非。"}, "expl": "", "src": "GS", "sub": "F"}, {"id": "GS115-8", "stem": "Which of the following tendons could be the donor tendon for opponensplasty?（複選）", "opts": {"A": "Extensor indicis proprius (EIP)", "B": "Flexor digitorum superficialis (FDS)", "C": "Abductor digiti minimi (ADM)", "D": "Palmaris longus (PL)", "E": "Flexor digitorum profoundus (FDP) to ring finger"}, "ans": "ABCD", "multi": true, "years": ["112", "114", "115"], "cite": "Grabb and Smith's, 9th, Ch.92, Table.92.5", "conflict": "選項改寫/重排家族：他年選項內文不同（GS111-2·ans=ACDE(110/111)），各自在其選項下正確——記概念勿背字母。", "etype": "ai", "key": "Opponensplasty donor:EIP、FDS、ADM(Huber)、PL(Camitz)皆可;FDP to ring非標準。", "peropt": {"A": "EIP opponensplasty(Burkhalter)，可。", "B": "FDS(Bunnell/Royle-Thompson)，可。", "C": "ADM(Huber transfer)，可。", "D": "PL(Camitz)，可。", "E": "✗FDP to ring finger非標準donor。"}, "expl": "", "src": "GS", "sub": "N"}, {"id": "GS115-9", "stem": "Which of the following descriptions about \"Stener lesion\" is wrong ?", "opts": {"A": "It occurs when the torn ulnar collateral ligament (UCL) becomes trapped superficial to the adductor pollicis aponeurosis.", "B": "It is typically associated with a high-grade or complete rupture of the UCL at its distal insertion on the proximal phalanx.", "C": "Conservative management with a thumb spica cast is the gold standard of treatment for a confirmed Stener lesion.", "D": "The lesion acts as a mechanical barrier that prevents the ends of the torn ligament from reuniting, leading to chronic instability.", "E": "On an ultrasound or MRI, the displaced ligament often resembles a \"yo-yo on a string\" appearance."}, "ans": "C", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch.93, Table.93", "conflict": "", "etype": "ai", "key": "Stener lesion需『手術』;thumb spica cast非gold standard(斷端被aponeurosis阻隔無法癒合)。", "peropt": {"A": "UCL斷端卡在adductor aponeurosis淺層，正確。", "B": "高度/完全UCL斷裂於proximal phalanx遠端止點，正確。", "C": "✔答案(錯)：Stener lesion須手術,cast非gold standard。", "D": "為機械屏障阻止斷端癒合，正確。", "E": "影像呈'yo-yo on a string'，正確。"}, "expl": "", "src": "GS", "sub": "G"}, {"id": "GS115-10", "stem": "Regarding the surgical management and reconstructive principles for mutilated upper extremity injuries, which of the following statements is TRUE according to the clinical guidelines and author preferences provided in the text?", "opts": {"A": "The Mangled Extremity Severity Score (MESS) serves as the primary gold standard for determining the necessity of upper limb amputation, with a score greater than 7 indicating a high likelihood of secondary amputation.", "B": "In skeletal fixation of mutilated limbs, K-wire fixation is preferred over screw and plate constructs because it provides superior rigid stability for earlier mobilization despite causing more extensive soft-tissue stripping.", "C": "For motor nerve reconstruction of gaps between 5 mm and 50 mm, processed nerve allografts have been shown to provide functional outcomes equivalent to autografts, whereas conduits are generally restricted to non-critical sensory gaps under 3 cm.", "D": "The universally preferred timing for definitive soft-tissue coverage with a free flap is the \"Primary\" window (within 12 to 24 hours of injury) to ensure immediate protection of vital structures before tissue demarcation occurs.", "E": "In a stable patient with suspected vascular injury, angiography is the preferred initial step and should take precedence over surgical exploration to accurately determine the nature and extent of the vessel damage."}, "ans": "C", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch.95", "conflict": "", "etype": "ai", "key": "以上皆非為正確者:MESS非唯一標準、K-wire非提供最佳剛性、free flap最佳時機非12-24h、穩定病人不以angiography優先於探查;正確者為C(processed nerve allograft 5-50mm≈autograft、conduit限<3cm感覺)。", "peropt": {"A": "✗MESS非唯一gold standard,>7 cutoff有爭議。", "B": "✗K-wire非提供superior rigid stability(plate較穩)且剝離較少。", "C": "✔答案:processed nerve allograft 5-50mm≈autograft;conduit限<3cm感覺缺損。", "D": "✗free flap最佳時機非12-24h(Godina早期覆蓋~72h-7天)。", "E": "✗穩定病人疑血管傷,探查優先於angiography。"}, "expl": "", "src": "GS", "sub": "L"}, {"id": "GS115-11", "stem": "關於Thumb duplication (拇指多指症)，根據Flatt classification system，下列何種type最常見?", "opts": {"A": "Type I Bifid distal phalanx", "B": "Type II Duplicated distal phalanx", "C": "Type III Bifid proximal phalanx", "D": "Type IV Duplicated proximal phalanx", "E": "Type V Bifid metacarpal"}, "ans": "D", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch103, p.3473", "conflict": "", "etype": "ai", "key": "Flatt(Wassel)拇指多指最常見為type IV(duplicated proximal phalanx)。", "peropt": {"A": "type I非最常。", "B": "type II非最常。", "C": "type III非最常。", "D": "✔答案:type IV最常見。", "E": "type V非最常。"}, "expl": "", "src": "GS", "sub": "O"}, {"id": "GS115-12", "stem": "關於Compartment syndrome，下列敘述何者錯誤？", "opts": {"A": "臨床診斷6P為Pain with passive stretch, Paresthesia, Paralysis, Pulselessness, Pallor, Poikilothermia", "B": "組織缺氧時，細胞離子幫浦失調會造成細胞質 (cytosolic)中鉀離子增加進而造成組織壞死。", "C": "傷口暫時無法關起來時可以先使用負壓傷口治療 (NPWT)。", "D": "於適當時間內接受Fasciotomy可以減少組織缺氧造成的傷害", "E": "延遲治療可能會造成intrinsic tightness 或 thumb adduction contracture"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 102, p.3454", "conflict": "", "etype": "ai", "key": "缺氧離子幫浦失調造成細胞內『鈉/鈣』增加(非鉀),B敘述有誤。", "peropt": {"A": "6P診斷,正確。", "B": "✔答案(錯)：缺氧致細胞內鈉/鈣增加(非鉀)。", "C": "NPWT暫時覆蓋,正確。", "D": "適時fasciotomy減害,正確。", "E": "延遲致intrinsic tightness/thumb adduction contracture,正確。"}, "expl": "", "src": "GS", "sub": "H"}, {"id": "GS115-13", "stem": "關於手部燙傷後使用pressure garment，下列敘述何者錯誤？", "opts": {"A": "Garment 壓力建議落在24-28mmHg", "B": "Garment須至少穿戴6個月", "C": "每2-3個月需重新調整Garment鬆緊度", "D": "Garment 的使用主要是作用於Wound healing stage 的Proliferation stage", "E": "疤痕按摩及保濕有助於疤痕照護"}, "ans": "D", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 101, p3414", "conflict": "", "etype": "ai", "key": "壓力衣主要作用於remodeling/maturation期(非proliferation),D有誤。", "peropt": {"A": "壓力24-28mmHg,正確。", "B": "至少穿6個月,正確。", "C": "每2-3月調整鬆緊,正確。", "D": "✔答案(錯)：主要作用於remodeling/maturation期(非proliferation)。", "E": "疤痕按摩+保濕,正確。"}, "expl": "", "src": "GS", "sub": "Q"}, {"id": "GS115-14", "stem": "下列何者為最常見之手部原發性骨腫瘤 (Primary bone tumor)?", "opts": {"A": "Enchondromas", "B": "Osteosarcoma", "C": "Osteoma", "D": "Bone cyst", "E": "Ewing Sarcoma"}, "ans": "A", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch 99, p3360", "conflict": "", "etype": "ai", "key": "Enchondroma為最常見手部原發性骨腫瘤。", "peropt": {"A": "✔答案:enchondroma最常見。", "B": "osteosarcoma非。", "C": "osteoma非。", "D": "bone cyst非。", "E": "Ewing sarcoma非。"}, "expl": "", "src": "GS", "sub": "P"}, {"id": "GS115-15", "stem": "關於Dupuytren disease (DD)，下列敘述何者正確？（複選）", "opts": {"A": "大部分的DD患者皆有嚴重的Finger flexion contracture問題。", "B": "為一個遺傳性慢性纖維化導致Finger contracture的疾病", "C": "若以Collagenase治療， MP joints 對治療的效果優於PIP joint.", "D": "DD好發於食指及中指", "E": "好發於有家族史的高齡女性"}, "ans": "BC", "multi": true, "years": ["115"], "cite": "Grabb and Smith's, 9th, Ch98", "conflict": "", "etype": "ai", "key": "正確BC;好發環指/小指(非食指中指)、好發家族史高齡男性(非女性)、多數非嚴重contracture。", "peropt": {"A": "✗非大部分皆嚴重contracture(多輕/漸進)。", "B": "遺傳性慢性纖維化致finger contracture,正確。", "C": "collagenase:MP joint療效優於PIP,正確。", "D": "✗好發環指及小指(非食指中指)。", "E": "✗好發有家族史高齡『男性』(非女性)。"}, "expl": "", "src": "GS", "sub": "I"}, {"id": "GS115-16", "stem": "Flatt classification 對於thumb duplication分類：I. Bifid distal phalanx / II. Duplicated distal phalanx / III. Bifid proximal phalanx / IV. Duplicated proximal phalanx / V. Bifid metacarpal / VI. Duplicated metacarpal / VII. Triphalangism。其盛行率由高至低排列何者正確？", "opts": {"A": "I > VI > III > V > II", "B": "IV > VII > II > V > I", "C": "IV > I > VII > II > V", "D": "IV > I > II > III > VI", "E": "I > II > V > III > IV"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Chapter 103, p. 1070-1071", "conflict": "", "etype": "ai", "key": "Flatt盛行率:IV > VII > II > V > I。", "peropt": {"A": "順序有誤。", "B": "✔答案:IV>VII>II>V>I。", "C": "順序有誤。", "D": "順序有誤。", "E": "順序有誤。"}, "expl": "", "src": "GS", "sub": "O"}, {"id": "GS115-17", "stem": "關於Swan neck deformity以及Boutonnière deformity的成因及評估，下列敘述哪些正確？（複選）", "opts": {"A": "Swan neck deformity只因PIP關節錯位而起，但Boutonnière deformity通常是因DIP,PIP,MCP關節處的肌腱不平衡而引起", "B": "Swan neck deformity通常無法做出composite fist而需要治療，Boutonnière deformity則通常flexion正常但治療困難且難以預測療效", "C": "Finochietto-Bunnell test是評估PIP motion with MCP in flexion and extension來測試是否有intrinsic tightness", "D": "Swan neck deformity之Nalebuff分類Type II為DIP joint flexibility with intrinsic tightness", "E": "Boutonnière deformity之分類Stage II為moderate PIP flexion deformity with lag greater than 40°"}, "ans": "BCE", "multi": true, "years": ["115"], "cite": "Grabb and Smith's, 9th, Chapter 105, p.940", "conflict": "", "etype": "ai", "key": "正確BCE;A(swan neck成因過度簡化)、D(Nalebuff type II標示有誤)為錯。", "peropt": {"A": "✗swan neck非只因PIP錯位(多因素:mallet/intrinsic tightness/FDS等)。", "B": "swan neck常無法composite fist需治療;boutonniere治療難預測,正確。", "C": "Finochietto-Bunnell test評估intrinsic tightness,正確。", "D": "✗Nalebuff swan neck type II標示有誤(為PIP隨MCP位置變化,非DIP)。", "E": "boutonniere stage II=moderate PIP flexion deformity(lag>40°),正確。"}, "expl": "", "src": "GS", "sub": "J"}, {"id": "GS115-18", "stem": "45歲病人患有forearm ulnar shaft sarcoma，接受過術前電療後，預期手術切除10 cm長的ulnar bone。若病人希望能完成手術後準時於兩個月後舉行婚禮，則在此時效性下最佳的重建方式為：", "opts": {"A": "無需重建骨缺損，forearm穩定度有radius即可", "B": "放置抗生素骨水泥spacer做暫時性固定(provisional fixation)", "C": "使用non-vascularized corticocancellous graft加上內固定", "D": "使用無焊接且size配對的ulnar shaft異體骨移植(allograft)", "E": "使用free vascularized bone transfer加上內固定"}, "ans": "E", "multi": false, "years": ["115"], "cite": "Grabb and Smith's, 9th, Chapter 107, p.1123", "conflict": "", "etype": "ai", "key": "放療後、10cm ulna缺損、時效佳→free vascularized bone transfer+內固定為最佳。", "peropt": {"A": "✗ulna缺損需重建(穩定/前臂旋轉),radius alone不足。", "B": "✗cement spacer僅暫時。", "C": "✗non-vascularized graft於10cm+放療床癒合差。", "D": "✗allograft於放療床不癒合率高。", "E": "✔答案:free vascularized bone transfer+內固定。"}, "expl": "", "src": "GS", "sub": "P"}, {"id": "GS114-1", "stem": "以下解剖敘述，何者為正確？", "opts": {"A": "The distal palmar crease is at the proximal end of the A1 pulley", "B": "Lister's tubercle is just proximal to the lunotriquetral joint.", "C": "The palmaris longus is radial to the median nerve.", "D": "The web space is at the proximal portion of the proximal phalanx", "E": "The distal wrist crease is at the level of DRUJ."}, "ans": "A", "multi": false, "years": ["110", "111", "112", "113", "114"], "cite": "Grabb and Smith's, 8th, Ch 67, p671", "conflict": "", "etype": "ai", "key": "Distal palmar crease位於A1 pulley近端。", "peropt": {"A": "✔答案:distal palmar crease在A1 pulley近端。", "B": "✗Lister's tubercle在distal radius背側(非lunotriquetral近端)。", "C": "✗median nerve在PL深面略偏橈側→PL相對在其尺側(敘述radial有誤)。", "D": "✗web space約在proximal phalanx近1/3(此定位不精確)。", "E": "✗distal wrist crease約在radiocarpal(非DRUJ)。"}, "expl": "", "src": "GS", "sub": "F"}, {"id": "GS114-2", "stem": "以下對於屈肌腱鞘感染產生的Kanaval signs，何者為非？", "opts": {"A": "Fusiform swelling, or a sausage digit.", "B": "Digit resting i function peck(o){if(locked)return;const L=o.dataset.l,q=pool[idx];
  if(q.multi){sel.has(L)?(sel.delete(L),o.classList.remove('sel')):(sel.add(L),o.classList.add('sel'));}

function grade(){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  let p=S.P[q.id]||{n:0,s:0,m:false,f:null,w:false,due:0};
  if(p.n===0)p.f=ok?1:0;
  p.n++;
  if(ok){p.s++;p.m=p.s>=MASTERY;p.due=Date.now()+SR[Math.min(p.s,SR.length-1)]*DAY;}
  else{p.s=0;p.m=false;p.w=true;p.due=Date.now()+1*DAY;}
  S.P[q.id]=p;save();
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'　正解：'+q.ans.split('').join('、')+(ok&&p.m?'　★已掌握':ok?('　連對 '+p.s+'/'+MASTERY):'');card.appendChild(v);
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':'<span class="srctag orig">原檔詳解</span>')+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  // 📝 我的筆記（答題後出現，自動存，隨進度匯出）
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  // #10 稍後再問我
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';
}

function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
