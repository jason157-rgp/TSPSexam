組織缺損/pulley破壞為禁忌。","peropt":{"A":"severe contamination=禁忌。","B":"骨/軟組織大量缺損=禁忌。","C":"pulley破壞+肌腱缺損=禁忌。","D":"✔答案:傷後數日至3-4週內可行primary repair。","E":"無經驗術者=不宜。"},"cite":"Neligan Volume 6, chapter 9, p.186","conflict":""},{"id":"1094","sub":"L","src":"NG","years":[105,108],"stem":"下列關於Ectopic transplantation的敘述，何者為非？","opts":{"A":"Godina et al. performed the first ectopic replantation in 1983 when they transferred an amputated hand to the axilla after a contaminated multilevel farm injury.","B":"The recipient sites best used are the thoracodorsal, the deep inferior epigastric, the superficial inferior epigastric, the radial and the dorsalis pedal vessels.","C":"The choice of recipient vessel for ectopic replant depends on the length of the expected pedicle as well as donor site morbidity.","D":"Often a skin graft is preferential for recipient site preparation prior to second-stage transplantation.","E":"Adequate surgical debridement is essential prior to replantation of the digit."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"第二階段recipient準備非以皮膚移植為首選(需well-vascularized coverage)。","peropt":{"A":"Godina 1983首例ectopic replantation，正確。","B":"ideal recipient sites，正確。","C":"recipient vessel取決於pedicle長度/donor morbidity，正確。","D":"✔答案(非)：非以skin graft為首選。","E":"replantation前需adequate debridement，正確。"},"cite":"Neligan Volume 6, Chapter 11, p263-264","conflict":"⚠ 同題歷屆重出：Ectopic transplantation『何者為非』題，105年(1094)英文版與108年(1175)中英混合版為同題，答案均為D(第二階段transplantation時『皮膚移植為首選』之敘述錯誤)。"},{"id":"1095","sub":"A","src":"NG","years":[105],"stem":"下列關於手部supporting architecture 敘述何者為錯？","opts":{"A":"Five intrinsic muscles and four extrinsic muscles are specifically influential on thumb positioning and activity.","B":"The fixed unit of the hand, consisting of the third and fourth metacarpals and the distal carpal row.","C":"The thumb and its metacarpal with a wide range of motion at the carpometacarpal joint.","D":"The index digit with independence of action within the range of motion allowed by its joints and ligaments.","E":"The third, fourth, and fifth digits with the fourth and fifth metacarpals."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Fixed unit為第二、三掌骨+distal carpal row(非3rd/4th)。","peropt":{"A":"5內在肌+4外在肌影響拇指，正確。","B":"✔答案(錯)：fixed unit為第二、三掌骨(非3rd/4th)。","C":"thumb CMC活動度大，正確。","D":"index獨立活動，正確。","E":"3/4/5指與4/5掌骨，正確。"},"cite":"Neligan Volume 6, Chapter 1, p.5","conflict":""},{"id":"1096","sub":"F","src":"NG","years":[105],"stem":"有關手部closed rupture of the flexor tendons and pulleys之敘述，何者正確？","opts":{"A":"Traumatic FDS tendon avulsion from the tendon–bone junction accounts for a major portion of closed rupture cases.","B":"Leddy and Packer 將 close tendon ruptures分成四種，最常見的型態是\"The FDP tendon retracts to the level of the PIP joint. \"","C":"\"Jersey finger\" is seen most commonly in the ring finger.","D":"Flexor pulleys are prone to sprains and ruptures during climbing.","E":"The A2 pulley of the index finger is the most often injured."},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"正確BCD;jersey finger為FDP(非FDS)avulsion,最常見無名指。","peropt":{"A":"✗為FDP(非FDS)avulsion(jersey finger)。","B":"Leddy-Packer分型,最常見FDP retract至PIP，正確。","C":"jersey finger最常見於無名指，正確。","D":"攀岩易致pulley sprain/rupture，正確。","E":"✗攀岩最常傷A2/A4;'index A2最常'有誤。"},"cite":"Neligan Volume 6, Chapter 9, p.197","conflict":""},{"id":"1097","sub":"L","src":"NG","years":[105],"stem":"對於multilated hand 的診斷與治療，下列敘述何者為錯？","opts":{"A":"Definitive reconstruction of the mangled extremity may be undertaken either early or late.","B":"Early soft-tissue coverage improves the vascularity to the traumatized area, limits exposure to hospital pathogens, and reduces the risk of infection.","C":"Early reconstruction implies repair or reconstruction of all injured structures during the initial phase of treatment, up to 10 days from the initial injury.","D":"Multiple examinations of the extremity by multiple physicians are suggested.","E":"In the delayed staged reconstruction, vascularity is established, and the soft-tissue injuries are treated with serial debridements performed at 24–72-hour intervals."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Mangled/mutilated hand處理原則：definitive重建可早可晚；early soft-tissue coverage可改善血流、減少院內病原暴露與感染；early reconstruction指傷後約10天內修復所有結構；delayed staged則先建立血流、以24–72小時間隔serial debridement。核心錯誤選項：不建議由『多位醫師反覆多次檢查』傷肢（增加污染與病人不適）。本題問『錯』者。","peropt":{"A":"✗（敘述正確）Definitive重建可早期或晚期進行。","B":"✗（敘述正確）Early coverage改善血流、限制病原暴露、降低感染。","C":"✗（敘述正確）Early reconstruction為傷後約10天內修復所有受損結構。","D":"✓（正解，為錯誤敘述）不建議多位醫師反覆多次檢查傷肢，會增加污染與傷害風險。","E":"✗（敘述正確）Delayed staged先重建血流、以24–72小時間隔serial debridement。"},"cite":"待複查（NG mangled extremity 記憶佐證）","conflict":""},{"id":"1098","sub":"N","src":"NG","years":[105],"stem":"下列關於metacarpal hand的敘述何者為錯？","opts":{"A":"The term \"metacarpal hand\" refers to a hand injury with multiple finger amputations at the level of the metacarpophalangeal joint, or immediately proximal or distal to it.","B":"In the finger amputation level of proximal to the metacarpophalangeal joints, it requires the harvest of combined second and third toes as transmetatarsal transfers.","C":"In the finger amputation level through the metacarpophalangeal joints with intact articular surfaces, combined second and third toes are harvested as composite joint transfers.","D":"In metacarpal hand with various levels of thumb involvement, reconstruction of the thumb is determined by the presence or absence of a functional thenar musculature.","E":"If the thenar muscle is intact or possesses adequate function, a staged procedure to reconstruct the thumb and two adjacent fingers is recommended."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 Metacarpal hand(Wei 分類)指多指在 MCP 關節或其近/遠端截斷。重建依截斷平面決定 toe transfer 型式，並依 thenar 功能決定拇指是否需重建。關鍵陷阱：若 thenar 功能完好、拇指仍具功能，則只需重建手指，不需重建拇指；因此『thenar 完好卻分階段重建拇指+兩指』的敘述為錯。","peropt":{"A":"✓ Metacarpal hand 定義正確(MCP 平面或其近/遠端多指截斷)。","B":"✓ 截斷位於 MCP 近端 → 需 combined 2nd+3rd toe 之 transmetatarsal transfer(取較多骨長)。","C":"✓ 截斷經 MCP 且關節面完整 → combined 2nd+3rd toe 之 composite(vascularized) joint transfer。","D":"✓ 拇指重建與否取決於 thenar 肌功能。","E":"✗(正解，敘述錯誤) 若 thenar 完好、拇指具功能，應只重建手指，不需重建拇指；此敘述有誤。"},"cite":"待複查（NG metacarpal hand / toe transfer 記憶佐證）","conflict":""},{"id":"1099","sub":"L","src":"NG","years":[105],"stem":"下列Multiple digit replantations 的原則，哪些正確？（複選題）","opts":{"A":"The finger with the best chance of function is repaired first. Even if the index finger is stiff, it still needs repair.","B":"Replantation of the distal amputation of the ring and little finger is strongly recommended because of their need for full length in order to get optimal hand closure and good grip function.","C":"A functional hand can be achieved with an opposable thumb, a satisfactory first webspace, a stable wrist, and at least two fingers.","D":"The value of the ulnar digits to hand function, especially power grip, is underappreciated. Priority should be given to restoration of the ulnar digits after salvage of the thumb.","E":"If the thumb and index finger are amputated and the distal thumb is not replantable, replantation of the index finger to the thumb position, a microvascular pollicization should be performed."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 多指再植（multiple digit replantation）優先順序原則：先重建功能潛力最佳的手指；功能性手需要『可對掌拇指＋良好第一指蹼＋穩定手腕＋至少兩指』；尺側手指（環、小指）對抓握力價值常被低估，救回拇指後應優先重建尺側指；環、小指遠端截肢建議積極再植以維持完整長度利於握合。若拇指＋食指截肢且拇指無法再植，可將食指移到拇指位置（microvascular pollicization）。核心鑑別：僵硬的食指常被『繞過(bypass)』而不強求重建，故『即使食指僵硬仍需重建』的敘述錯誤。","peropt":{"A":"✗ 前半（先重建功能最佳指）正確，但『即使食指僵硬仍需重建』有誤——僵硬食指常被繞過而不強求再植，故整句不成立。","B":"✓ 環、小指遠端截肢建議積極再植以保留完整長度，利於握合與握力。","C":"✓ 功能性手＝可對掌拇指＋滿意第一指蹼＋穩定手腕＋至少兩指。","D":"✓ 尺側手指對握力價值常被低估，救回拇指後應優先重建尺側指。","E":"✓ 拇指＋食指截肢且拇指無法再植時，可將食指再植至拇指位置（microvascular pollicization）。"},"cite":"待複查（NG 手外科 多指再植原則 記憶佐證）","conflict":""},{"id":"1100","sub":"N","src":"NG","years":[105],"stem":"Thumb loss可分為三個level: distal, middle and proximal third. 關於nonmicrosurgical reconstruction的敘述，何者為是：(複選題)","opts":{"A":"When thumb loss occurs due to trauma, replantation is the best method of reconstruction for many patients.","B":"Loss of the distal third of the thumb is minimal in terms of functional loss. The chief priority is soft-tissue coverage.","C":"For thumb losses in the middle third, length restoration becomes a primary goal. This is done by extending either the absolute length or the relative length of the thumb","D":"Proximal third thumb losses are best treated with first webspace deepening.","E":"Dorsal hand flap can provide a substantial amount of coverage for proximal third thumb loss."},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"🎯 拇指缺損分distal/middle/proximal三段，非顯微重建原則：外傷所致者replantation常為最佳；distal 1/3功能損失小、以軟組織覆蓋為主；middle 1/3以length restoration（絕對或相對延長）為主要目標。核心易錯：proximal 1/3缺損無法僅以first webspace deepening或dorsal hand flap解決（需pollicization、metacarpal lengthening或toe transfer）。本題複選『正確』者。","peropt":{"A":"✓ 外傷性拇指缺損，replantation對多數病人為最佳重建方式。","B":"✓ Distal 1/3功能損失小，首要為soft-tissue coverage。","C":"✓ Middle 1/3以恢復長度（絕對或相對）為主要目標。","D":"✗ Proximal 1/3並非以first webspace deepening為最佳治療，僅加深webspace不足以恢復長度，故非正解。","E":"✗ Dorsal hand flap無法為proximal 1/3提供足夠的長度重建覆蓋，敘述不正確。"},"cite":"待複查（NG 拇指非顯微重建 記憶佐證）","conflict":""},{"id":"1101","sub":"Q","src":"NG","years":[105],"stem":"下列關於指甲及甲床之敘述，何者錯誤？(複選題)","opts":{"A":"The nail is produced by cells from two areas of the perionychium including the sterile matrix and the dorsal roof of the nail fold.","B":"Loss of the sterile matrix causes a dull-appearing nail.","C":"Counter pressure between the nail and the volar skin and pulp aids in delicate and precise touch.","D":"The nail contributes to two-point discrimination and tactile sensation.","E":"The goal to repair the nail bed is simple – re-approximation. Whether tension on the suture line or not will not affect the outcome."},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯 甲床解剖:指甲主要由 germinal matrix(約九成生長)產生，dorsal roof(近端甲摺腹側)賦予光澤(shine)，sterile matrix 增加厚度與貼附。臨床:germinal matrix 缺損→無指甲;sterile matrix 缺損→指甲不貼附;dorsal roof/ventral floor 缺損→光澤消失(dull)。修補甲床須 tension-free。本題為『找錯誤』，錯誤者為 A、B、E。","peropt":{"A":"✓(屬答案，敘述錯誤) 指甲主要由 germinal matrix(非 sterile matrix)+dorsal roof 產生；此敘述誤植為 sterile matrix。","B":"✓(屬答案，敘述錯誤) Dull(失去光澤)源自 dorsal roof/ventral floor 缺損;sterile matrix 缺損造成的是指甲『不貼附』。","C":"✗(敘述正確，不選) 指甲與掌側指腹間的 counter-pressure 有助精細觸覺。","D":"✗(敘述正確，不選) 指甲確實增進兩點辨識與觸覺。","E":"✓(屬答案，敘述錯誤) 甲床修補須 tension-free;縫合張力會影響結果，敘述有誤。"},"cite":"待複查（NG perionychium / nail bed 記憶佐證）","conflict":""},{"id":"1102","sub":"P","src":"NG","years":[105],"stem":"Which skin and soft tissue malignancy is the most common malignant tumor in the hand?","opts":{"A":"Basal cell carcinoma","B":"Squamous cell carcinoma","C":"Melanoma","D":"Bowen's disease","E":"Rhabdomyosarcoma"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Squamous cell carcinoma為手部最常見惡性腫瘤。","peropt":{"A":"BCC非最常。","B":"✔答案:SCC最常見手部惡性腫瘤。","C":"melanoma非最常。","D":"Bowen's非。","E":"rhabdomyosarcoma非。"},"cite":"Neligan chap15, P317","conflict":""},{"id":"1103","sub":"P","src":"NG","years":[105],"stem":"Which is the second most common benign hand tumor?","opts":{"A":"Epidermal inclusion cyst","B":"cutaneous horn","C":"Ganglion cyst","D":"Giant cell tumor","E":"Lipoma"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Giant cell tumor為第二常見良性手部腫瘤(ganglion第一)。","peropt":{"A":"epidermal inclusion cyst非第二。","B":"cutaneous horn非。","C":"ganglion為第一常見。","D":"✔答案:GCT第二常見。","E":"lipoma非。"},"cite":"Neligan chap15, P319","conflict":""},{"id":"1104","sub":"I","src":"NG","years":[105],"stem":"Which of the following is not the surgical options for Dupuytren's disease?","opts":{"A":"Fasiotomy","B":"Regional fasiectomy","C":"Dermatofasciectomy","D":"Local fasciectomy","E":"Non of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"None of above:fasciotomy/regional/local fasciectomy/dermatofasciectomy皆為Dupuytren手術選擇。","peropt":{"A":"fasciotomy=選擇。","B":"regional fasciectomy=選擇。","C":"dermatofasciectomy=選擇。","D":"local fasciectomy=選擇。","E":"✔答案:none of above(皆為選擇)。"},"cite":"Neligan chap17, P355","conflict":""},{"id":"1105","sub":"B","src":"NG","years":[105],"stem":"Which of the following description was not one of cardinal signs of flexor tenosynovitis?","opts":{"A":"Fusiform swelling of the finger","B":"Partially flexed posture of the digit","C":"Tenderness over the entire flexor tendon sheath","D":"Disproportionate pain on passive extension","E":"Disproportionate pain on passive flexion"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Kanavel徵為passive『extension』疼痛;passive flexion疼痛非cardinal sign。","peropt":{"A":"fusiform swelling=cardinal sign。","B":"flexed posture=cardinal sign。","C":"sheath全程壓痛=cardinal sign。","D":"passive extension疼痛=cardinal sign。","E":"✔答案(非)：passive flexion疼痛非cardinal sign。"},"cite":"Neligan chap16, P339","conflict":""},{"id":"1106","sub":"C","src":"NG","years":[105],"stem":"How many structures within the carpal tunnel?","opts":{"A":"Ten tendons and one nerve.","B":"Nine tendons and one nerve.","C":"Eight tendons and two nerves.","D":"Nine tendons and three nerves.","E":"Nine tendons and two nerve."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Carpal tunnel內9條肌腱(4 FDS+4 FDP+1 FPL)+1神經(median)。","peropt":{"A":"✗非10條。","B":"✔答案:9條肌腱+1神經。","C":"✗非8條/2神經。","D":"✗非3神經。","E":"✗非2神經。"},"cite":"Neligan Volume 6, Chap 24, p 505","conflict":""},{"id":"1107","sub":"C","src":"NG","years":[105],"stem":"關於Posterior interosseous nerve compression的描述何者錯誤？","opts":{"A":"The PIN is a motor-only nerve that innervates the extensor muscles and abductor pollicis longus distal to the elbow.","B":"The PIN does not innervate the ECRL, brachioradiais, or anconeus muscles.","C":"Most often due to compression of the PIN at the fibrous arch of FDS muscle.","D":"Extensor tendon rupture or subluxation may mimic PIN syndrome, but can be readily ruled out by evaluating for an intact passive tenodesis effect.","E":"Surgery is recommended for PIN syndrome if there is no appreciable improvement in motor function by approximately 3 months."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"PIN最常壓迫於arcade of Frohse(supinator近端緣),非FDS fibrous arch(後者為AIN/median)。","peropt":{"A":"PIN為純運動、支配伸肌+APL，正確。","B":"PIN不支配ECRL/brachioradialis/anconeus，正確。","C":"✔答案(錯)：PIN最常壓於arcade of Frohse(非FDS fibrous arch)。","D":"extensor rupture可mimic,tenodesis鑑別，正確。","E":"3個月無改善建議手術，正確。"},"cite":"Neligan Volume 6, Chap 24, p 505","conflict":""},{"id":"1108","sub":"K","src":"NG","years":[105],"stem":"下列關於ischemic hand 的surgical intervention，何者不能減少sympathetic tone？","opts":{"A":"Proximal cervicothoracic sympathectomy","B":"Leriche sympathectomy (resection and ligation of a thrombosed or occluded arterial segment)","C":"Peripheral periarterial sympathectomy","D":"Balloon angioplasty with periarterial sympathectomy","E":"Percutaneous angioplasty with stent"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Percutaneous angioplasty+stent恢復血流但『不』減少sympathetic tone。","peropt":{"A":"proximal cervicothoracic sympathectomy減sympathetic tone。","B":"Leriche sympathectomy減sympathetic tone。","C":"peripheral periarterial sympathectomy減sympathetic tone。","D":"balloon angioplasty+periarterial sympathectomy減sympathetic tone。","E":"✔答案:angioplasty+stent不減sympathetic tone。"},"cite":"Neligan Volume 6, Chap 22, p 476-477","conflict":""},{"id":"1109","sub":"C","src":"NG","years":[105],"stem":"下列何者屬於Clinical signs of ulnar nerve palsy？(複選題)","opts":{"A":"Durkan's sign","B":"Duchenne's sign","C":"Wartenberg's sign","D":"Froment's sign","E":"Jeanne's sign"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 尺神經麻痺（ulnar nerve palsy）的臨床徵象：Duchenne's sign（爪形手 clawing）、Wartenberg's sign（小指持續外展，第三 palmar interosseous 無力）、Froment's sign（捏物時 adductor pollicis 無力，改用 FPL 使拇指 IP 屈曲）、Jeanne's sign（捏物時拇指 MCP 過伸）。核心鑑別：Durkan's sign（腕部加壓試驗）屬正中神經腕隧道症候群，非尺神經。","peropt":{"A":"✗ Durkan's sign（carpal compression test）為正中神經腕隧道症候群徵象，非尺神經。","B":"✓ Duchenne's sign＝爪形手  lateral antebrachial cutaneous nerve of the forearm","E":"After operation, a short thumb spica splint is worn until suture removal about 10–14 days later"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 De Quervain's tenosynovitis:第一背側腔室(APL+EPB)的腱鞘炎。診斷用 Finkelstein/Eichhoff test(敏感)。非手術先行(NSAID、類固醇注射、拇指人字副木);手術須保護 superficial radial nerve 分支及 lateral antebrachial cutaneous nerve，術後 short thumb spica 至拆線約 10-14 天。本題全部正確。","peropt":{"A":"✓ 第一背側腔室腱鞘炎。","B":"✓ Finkelstein test 為敏感檢查。","C":"✓ 非手術含口服 NSAID、類固醇注射、副木。","D":"✓ 手術須避傷 radial nerve 淺支及 LABC nerve。","E":"✓ 術後 short thumb spica 至拆線約 10-14 天。"},"cite":"待複查（NG De Quervain 記憶佐證）","conflict":""},{"id":"1112","sub":"C","src":"NG","years":[106],"stem":"When selecting the patient for surgical decompression of a peripheral nerve, which condition is required?","opts":{"A":"The patient's symptoms fit with both the motor and sensory distribution of the given peripheral nerve","B":"The impairment is documented by appropriate measurement of the motor and sensory function of that nerve","C":"There is a positive Tinel sign at the known site of anatomic narrowing of that nerve","D":"All possible nonoperative measures have been employed for 3 months without success in relieving the symptoms.","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 週邊神經減壓手術的病人選擇需『同時』滿足多項條件：症狀符合該神經運動與感覺分佈、以客觀量測記錄運動感覺功能受損、在解剖狹窄處有陽性 Tinel sign、且已試過所有非手術療法約 3 個月仍無效。四項皆須具備，故答案為『以上皆是』。⚠ 本題屬跨年誘答，選項具體事實（如療程月數/量測方式）可能被置換，作答時對照條件邏輯而非死背數字。","peropt":{"A":"✗ 為必要條件之一，但單獨不足以構成完整選擇準則。","B":"✗ 為必要條件之一，但單獨不足。","C":"✗ 為必要條件之一，但單獨不足。","D":"✗ 為必要條件之一，但單獨不足。","E":"✓（正解）上述條件須同時具備，故『以上皆是』。"},"cite":"待複查（NG 手外科 神經減壓病人選擇 記憶佐證）","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B10-Q05） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG113-B10-Q03）"},{"id":"1113","sub":"G","src":"NG","years":[106],"stem":"在復位Bennett fracture位移的掌骨時，需克服哪些造成掌骨位移肌肉或是韌帶的施力？","opts":{"A":"Anterior oblique ligament","B":"Adductor pollicis and Abductor pollicis longus (APL)","C":"APL and A 再接的功能常不如義肢，為relative contraindication","E":"大部分的食指截斷不建議再接，因為可能干擾其他手指的對掌功能"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 斷指再接的適應症權衡:拇指、多指、經掌骨/手掌/兒童幾乎皆再接;成人單一食指(尤其近端)常不建議再接，因僵硬、感覺不佳的食指會被中指 bypass，反干擾其他手指之對掌/捏取。全手截肢再接功能仍優於現行義肢，屬強適應。","peropt":{"A":"✗ Zone I(FDS 止點遠端)的遠端再接其實預後良好、值得再接，此否定敘述有誤。","B":"✗ 兒童幾乎任何部位(含 zone II)皆嘗試再接，不因沾黏而放棄。","C":"✗ 拇指應盡量再接(強適應)，不以截斷位置決定是否放棄。","D":"✗ 全手/大肢體再接為強適應，功能優於現行義肢。","E":"✓(正解) 單一食指(尤其近端)再接常不建議，僵硬食指會被中指 bypass，干擾對掌與捏取。"},"cite":"待複查（NG replantation indications 記憶佐證）","conflict":""},{"id":"1148","sub":"N","src":"NG","years":[107],"stem":"關於外傷性拇指截斷，下列選項何者錯誤?","opts":{"A":"無論任何位置的截斷，若有殘肢，則盡量進行斷指再接手術","B":"指間關節遠端的截斷，若無殘肢，可簡單進行軟組織的覆蓋，例如使用Moberg flap或是cross-finger flap","C":"在進端指節的截斷，只要掌指關節完整，單純用軟組織覆蓋，仍能保留拇指大部分的功能，例如FDMA flap就是一個好的選項，可避免過久的關節固定","D":"當截斷處位於姆指掌骨，若不進行長度的重建則會嚴重影響日常手部功能，無論是未受傷的食指還是部份受傷的食指皆可用來移植","E":"術後拇指除了運動功能的復健外，感覺復健也是不可或缺的一環"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"近端指節拇指截斷:單純軟組織覆蓋不足以保留功能,需長度重建。","peropt":{"A":"有殘肢盡量再接，正確。","B":"IP遠端無殘肢用Moberg/cross-finger，正確。","C":"✔答案(錯)：近端截斷單純覆蓋不足,需長度重建。","D":"拇指掌骨截斷需長度重建，正確。","E":"感覺復健重要，正確。"},"cite":"Neligan Vol. 6, Ch 13, p 282","conflict":""},{"id":"1149","sub":"N","src":"NG","years":[107],"stem":"拇指位於近端指節的截斷重建手術，下列敘述何者為非?","opts":{"A":"此位置的拇指截斷，常嚴重影響日後手部功能，除軟組織的覆蓋外，須設法做功能恢復手術","B":"在外傷當下，可保守的截短指骨，以達成軟組織的原位縫合，待傷口穩定後在行功能恢復手術","C":"Phalangization是讓拇指絕對長度延長的手術方式，經由此法，拇指對指功能可以明顯提升","D":"Metacarpal lengthening可延長拇指絕對長度，除了殘餘掌骨小於三公分者外，皆可考慮使用","E":"Osteoplastic reconstruction主要使用bone graft去增加拇指的絕對長度，後在以皮瓣包覆滋養bone graft，日後亦可以neurovascular island flap置換於pulp處，增加觸覺回饋"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Phalangization是加深虎口以增加『相對』長度,不增加拇指絕對長度。","peropt":{"A":"需功能恢復手術，正確。","B":"可截短指骨原位縫合再二期，正確。","C":"✔答案(非)：phalangization增加相對長度(非絕對長度)。","D":"metacarpal lengthening(殘骨>3cm可用)，正確。","E":"osteoplastic reconstruction+neurovascular island flap，正確。"},"cite":"Neligan Vol. 6, Ch 13, p 287-290","conflict":""},{"id":"1150","sub":"N","src":"NG","years":[107],"stem":"關於toe-to-hand，下列陳述何者為非?","opts":{"A":"Toe-to-thumb可以同時重建拇指的長度、感覺跟運動功能","B":"如果選用大腳趾為材料，建議保留1cm以上的腳趾近端指節以維持足部功能","C":"若拇指截斷處較靠近CMCJ，帶蹠骨的第二跟腳趾為較好的重建材料選擇","D":"四根手指均截斷者，需依病患職業來決定重建方針，例如做粗重搬運工作者，建議優先重建其橈側兩指以增強握力","E":"在type II metacarpal hand中，若thenar muscle的功能有缺陷，則需先重建手指、後再重建拇指"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"粗重工作(power grip)應優先重建『尺側』兩指(ring/little);橈側為精細動作。","peropt":{"A":"toe-to-thumb重建長度/感覺/運動，正確。","B":"保留>1cm近節趾骨維持足部功能，正確。","C":"CMCJ附近截斷用帶蹠骨第二趾，正確。","D":"✔答案(非)：power grip應優先重建尺側兩指(非橈側)。","E":"type II metacarpal hand thenar缺陷先重建手指，正確。"},"cite":"Neligan Vol. 6, Ch 14, p 297-298","conflict":""},{"id":"1152","sub":"G","src":"NG","years":[107,114],"stem":"複選2. 請選出Classification of Salter–Harris fractures的正確分類 (複選)","opts":{"A":"Type 1 is through the physis","B":"Type 2 extends from the physis toward the shaft","C":"Type 3 extends from the physis toward the joint","D":"Type 4 starts in the shaft and extends through the physis and into the joint","E":"Type 5 is a crush injury of the physis"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 Salter–Harris分類（SALTR助記）：Type I經physis；Type II由physis延向metaphysis/shaft（Thurston-Holland fragment）；Type III由physis延向關節（epiphysis）；Type IV跨metaphysis-physis-epiphysis進入關節；Type V為physis之crush injury（預後最差）。本題複選『正確』分類，全部正確。⚠ 跨版（Neligan 3e vs 5e）題幹數值略異，分類定義一致。","peropt":{"A":"✓ Type 1穿過physis，正確。","B":"✓ Type 2由physis延向shaft（metaphysis），正確。","C":"✓ Type 3由physis延向關節（epiphysis），正確。","D":"✓ Type 4起於shaft跨physis進入關節，正確。","E":"✓ Type 5為physis之crush injury，正確。"},"cite":"待複查（NG／Salter–Harris 分類 記憶佐證）","conflict":"跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同 ⚠ 同題歷屆重出：Salter–Harris fracture分類『複選』，Type1-5定義選項與答案完全相同(ABCDE)。107年(1152)與114年(1301)僅stem前綴略異。"},{"id":"1153","sub":"A","src":"NG","years":[107],"stem":"複選3. 下列關於手部extensor的敘述何者錯誤? (複選)","opts":{"A":"Quervain's disease發生在手腕extensor retinaculum的第一個 compartment","B":"在第三跟第四個compartment間可摸到一個突起，稱為Lister's tubercle","C":"第三個compartment的extensor pollicis longus tendon會在extensor carpi radialis longus and brevis下方橫越過第二個compartment","D":"第四個compartment包含六條手指的伸肌腱 (four extensor digitorum communis EDC tendons, extensor indicis propius EIP tendon和extensor digiti minimi EDM tendon)","E":"EIP tendon位於食指EDC的radial site，而EDM tendon則位於小指的ulnar site"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯 手腕伸肌六腔室:①APL+EPB(De Quervain 好發) ②ECRL+ECRB ③EPL(繞 Lister's tubercle 後由 ECRL/ECRB 之上淺層斜跨) ④4 條 EDC+EIP(共5條) ⑤EDM ⑥ECU。Lister's tubercle 位於第②③腔室之間。EIP 位於食指 EDC 的尺側(且較深)，EDM 位於小指 EDC 尺側。本題找『錯誤』，錯誤為 B、C、D、E。","peropt":{"A":"✗(敘述正確，不選) De Quervain 發生於第一背側腔室。","B":"✓(屬答案，敘述錯誤) Lister's tubercle 位於第②③腔室之間，非③④。","C":"✓(屬答案，敘述錯誤) EPL 繞 Lister's tubercle 後由 ECRL/ECRB 之『上方(淺層)』斜跨，非下方。","D":"✓(屬答案，敘述錯誤) 第④腔室含 4 EDC+EIP 共 5 條;EDM 在第⑤腔室，非同在第④。","E":"✓(屬答案，敘述錯誤) EIP 位於食指 EDC 的『尺側』(且較深)，非橈側。"},"cite":"待複查（NG extensor compartments 記憶佐證）","conflict":""},{"id":"1154","sub":"J","src":"NG","years":[107],"stem":"Which one of the following is wrong about osteoarthritis in the hand and wrist?","opts":{"A":"It most commonly affects DIP joints of the fingers and CMC joint of the thumb","B":"It is more common in men than in women","C":"There is no cure and no effective method of altering the progression of the disease process","D":"It is characterized by a loss of articular cartilage","E":"It is the most common rheumatologic disorder in the world"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Hand OA女性多於男性。","peropt":{"A":"最常DIP+拇指CMC，正確。","B":"✔答案(錯)：OA女性多於男性。","C":"無根治法，正確。","D":"軟骨流失，正確。","E":"最常見風濕疾病，正確。"},"cite":"Neligan Volume 6, p.411","conflict":""},{"id":"1155","sub":"C","src":"NG","years":[107],"stem":"With ulnar nerve palsy, which one of following demonstrates claw hand deformity?","opts":{"A":"Masse's sign","B":"Wartenberg's sign","C":"Froment's sign","D":"Duchenne's sign","E":"Jeanne's sign"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Duchenne's sign=claw hand deformity(尺神經麻痺)。","peropt":{"A":"Masse's sign非claw hand。","B":"Wartenberg's sign=小指外展。","C":"Froment's sign=拇內收無力。","D":"✔答案:Duchenne's sign=claw hand。","E":"Jeanne's sign=拇MCP過伸。"},"cite":"Neligan Volume 6, p.514","conflict":""},{"id":"1156","sub":"D","src":"NG","years":[107],"stem":"Quadrilateral space syndrome is associated with axillary nerve compression. Which one of the following is not the boundaries of this space?","opts":{"A":"Humerus","B":"Teres major","C":"Teres minor","D":"Infraspinatus","E":"Triceps brachii long head"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Quadrilateral space邊界:humerus、teres major、teres minor、triceps long head;infraspinatus不是。","peropt":{"A":"humerus=邊界。","B":"teres major=邊界。","C":"teres minor=邊界。","D":"✔答案:infraspinatus非邊界。","E":"triceps long head=邊界。"},"cite":"Neligan Volume 6, p.523","conflict":""},{"id":"1157","sub":"O","src":"NG","years":[107,114],"stem":"According to Bayne classification of ulnar longitudinal deficiency, total ulnar aplasia is classified to type?","opts":{"A":"I","B":"II","C":"III","D":"IV","E":"V"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Bayne ulnar deficiency:total ulnar aplasia=Type III。","peropt":{"A":"Type I=ulnar hypoplasia(兩physes在)。","B":"Type II=部分ulnar aplasia(最常見，有ulnar anlage)。","C":"✔Type III=total ulnar aplasia(完全缺如)。","D":"Type IV=radiohumeral synostosis。","E":"(無E/或不適用)。"},"cite":"Neligan 5th, Vol 6, Ch 34, p.813","conflict":""},{"id":"1158","sub":"B","src":"NG","years":[107],"stem":"Which one of the following is not risk factor for community-associated methicillin-resistant Staphylococcus aureus (MRSA) skin and soft tissue infections.","opts":{"A":"Soldiers","B":"Incarcerated persons","C":"Children","D":"Intravenous drug users","E":"None of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"None of above:soldiers/incarcerated/children/IVDU皆為CA-MRSA風險族群。","peropt":{"A":"soldiers=風險。","B":"incarcerated=風險。","C":"children=風險。","D":"IVDU=風險。","E":"✔答案:none of above(皆為風險)。"},"cite":"Neligan Volume 6, p.334","conflict":""},{"id":"1159","sub":"I","src":"NG","years":[107],"stem":"Which one of the following statements about Dupuytren's disease is incorrect.","opts":{"A":"Repetitive trauma, alcohol abuse, smoking, and chronic obstructive pulmonary disease are risk factors.","B":"Men are six times more than women and typically exhibit an onset in the fifth decade of life.","C":"Molecular analysis reveals a preponderance of type III collagen.","D":"Disease progression is characterized by the development of longitudinal cords, most commonly in the ulnar aspect of the palm and extending distally into the fingers.","E":"The development of nodules is typically the first sign of the disease, preceding the distortion of the skin creases."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"⚠此版keyed E(nodule為首發徵象)為『不正確』;惟多數教科書認為nodule常為最早表現。3rd/4th版可能不同,建議對照原文。","peropt":{"A":"risk factors(外傷/酒/菸/COPD)，正確。","B":"男性6倍、第五十年發病，正確。","C":"type III collagen為主，正確。","D":"longitudinal cords於掌尺側往遠端，正確。","E":"⚠keyed為不正確:此版判'nodule為首發'錯;惟多數文獻認nodule常最早,建議查證。"},"cite":"Neligan Volume 6, p.346-351","conflict":""},{"id":"1160","sub":"J","src":"NG","years":[107],"stem":"In treating rheumatoid arthritis with painful DRUJ instability, which tendon could be used to help stabilize the ulnar stump after the distal ulna resection.","opts":{"A":"FCU","B":"ECU","C":"EIP","D":"EDM","E":"ECRL"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"ECU用於穩定distal ulna resection(Darrach)後的ulnar stump。","peropt":{"A":"FCU非此用途。","B":"✔答案:ECU穩定ulnar stump。","C":"EIP非此用途。","D":"EDM非此用途。","E":"ECRL非此用途。"},"cite":"Neligan Volume 6, p.382-384","conflict":""},{"id":"1161","sub":"K","src":"NG","years":[107],"stem":"〔複選〕\n複選1. Comparing Raynaud's disease and Raynaud syndrome, which of the followings are correct? (複選)","opts":{"A":"Raynaud syndrome has more rapid progression","B":"Raynaud's disease has a more severe prognosis","C":"Abnormal Allen test is more common in Raynaud syndrome","D":"Asymmetric findings are more common in Raynaud syndrome","E":"Laboratory testing is frequently normal in Raynaud syndrome"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯 Raynaud's disease（原發）vs Raynaud syndrome（次發，多合併結締組織病）：syndrome 進展較快、預後較差、常呈『不對稱』表現、常有 trophic changes、Allen test 常異常、實驗室檢查常『異常』；disease 則較良性、對稱、labs 正常。核心鑑別：預後較差者為 syndrome（非 disease）；labs 正常者為 disease（非 syndrome）。","peropt":{"A":"✓ Raynaud syndrome 進展較快，正確。","B":"✗ 預後較差者為 Raynaud syndrome，非 Raynaud's disease，敘述錯誤。","C":"✓ Raynaud syndrome 較常呈現異常 Allen test，正確。","D":"✓ Raynaud syndrome 較常見不對稱表現，正確。","E":"✗ 實驗室檢查常正常者為 Raynaud's disease；syndrome 常異常，故此敘述錯誤。"},"cite":"待複查（NG 手外科 Raynaud 比較 記憶佐證）","conflict":""},{"id":"1162","sub":"O","src":"NG","years":[107],"stem":"複選2. Pollex abductus usually occurs in which types of thumb hypoplasia? (複選)","opts":{"A":"I","B":"II","C":"III","D":"IV","E":"V"},"ans":"BC","multi":true,"etype":"ai","expl":"","key":"🎯 Pollex abductus（FPL與EPL間異常連結，導致拇指外展/屈曲異常）好發於thumb hypoplasia的Type II與Type III（Blauth分類）。核心：Type I過輕、Type IV（pouce flottant漂浮拇）與Type V（缺如）不具此結構故不出現。","peropt":{"A":"✗ Type I僅輕度發育不良，不典型出現pollex abductus。","B":"✓ Type II可見pollex abductus（thenar發育不良、內收攣縮、MP不穩）。","C":"✓ Type III亦常見pollex abductus。","D":"✗ Type IV為漂浮拇，缺乏功能性FPL/EPL結構，不呈現。","E":"✗ Type V拇指缺如，無此異常連結。"},"cite":"待複查（NG 拇指發育不良／Blauth 分類 記憶佐證）","conflict":""},{"id":"1163","sub":"P","src":"NG","years":[107],"stem":"複選3. About giant cell tumors of the hand, choose the right statements. (複選)","opts":{"A":"They are the second most common soft tissue masses in the hand.","B":"They are also called pigmented villonodular synovitis","C":"They are firm, nodular, and nontender.","D":"They occur more commonly over the dorsal aspect of the hand.","E":"They are slow-growing and can have a mass effect on adjacent structures."},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 手部 giant cell tumor of tendon sheath(=localized/nodular PVNS):為手部第二常見軟組織腫塊(僅次於 ganglion);質地硬、結節狀、不痛;好發於手指『掌側(volar)』;生長緩慢，可對鄰近骨/結構產生 mass effect(壓迫性骨侵蝕)。本題找正確者。","peropt":{"A":"✓ 手部第二常見軟組織腫塊(次於 ganglion)。","B":"✓ 又稱 localized pigmented villonodular synovitis(PVNS)。","C":"✓ 質硬、結節狀、不痛。","D":"✗ 好發於『掌側(volar)』而非背側，故此敘述錯誤，不選。","E":"✓ 生長緩慢，可壓迫鄰近結構(mass effect)。"},"cite":"待複查（NG giant cell tumor of tendon sheath 記憶佐證）","conflict":""},{"id":"1164","sub":"O","src":"NG","years":[107],"stem":"Apert syndrome has been classified into three types. Choose the right statement?","opts":{"A":"Syndactyly in type I Apert hand is a simple type of syndactyly between all five digits","B":"In type II Apert hand, the syndactyly presents in a complex type between all five digits","C":"In type III Apert hand, the syndactyly presents in a simple type between all five digits","D":"In type Ⅲ Apert hand, the thumb usually shows paronychial infections and skin maceration","E":"The incidence is lowest in Asians and the highest in Hispanics"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Type III Apert hand拇指常有paronychial infection及skin maceration(源於嚴重併指)。","peropt":{"A":"✗type I syndactyly敘述有誤。","B":"✗type II敘述有誤。","C":"✗type III敘述有誤。","D":"✔答案:type III拇指常有paronychial infection/skin maceration。","E":"✗發生率敘述有誤(Apert於亞洲人較高)。"},"cite":"Neligan Volume 6, Ch28 p610 611","conflict":""},{"id":"1165","sub":"O","src":"NG","years":[107],"stem":"Syndactyly is one of the most common congential differences in the upper extremity, which description is correct?","opts":{"A":"Complex syndactyly means more than only distal bone fusion","B":"Complicated syndactyly means with distal bone union","C":"Early indication for surgery are syndactylies between fingers of unequal length","D":"With regard to skin grafts, STSGs have a better skin quality than FTSGs","E":"About 50% of patients have bilateral involvement"},"ans":"C","multi":false,"etype":"ai","expl":"[考生建議：A/B定義對調;D:FTSG較好;E亦正確(兩答案,建議不要出)或E改10%]","key":"🎯 Syndactyly 分類與治療重點：early surgery 指徵之一為『不等長手指間』的併指（如拇-食、環-小指），因不等長易牽拉造成偏斜畸形，須早放鬆。核心鑑別：Complex＝有骨性融合；Complicated＝合併異常骨/肌腱/多餘結構；FTSG 品質優於 STSG（收縮少）。⚠ 原檔標註 A/B 定義對調、D 應為 FTSG 較佳、E（雙側比例）數字有爭議恐成雙答案，作答以 C 為最穩正解。","peropt":{"A":"✗ 定義對調——『有骨性融合』者為 complex；此敘述與 B 互換後才正確。","B":"✗ 定義對調——『遠端骨融合』實為 complex 而非 complicated；complicated 指合併異常骨/肌腱/贅生結構。","C":"✓（正解）不等長手指間之併指為早期手術指徵，以防牽拉造成偏斜畸形。","D":"✗ FTSG 皮膚品質優於 STSG（收縮少、品質佳），敘述相反。","E":"✗（依本題答案）此數字敘述被列為不正確；⚠ 雙側比例數字文獻有爭議，原檔標註恐成雙答案。"},"cite":"原檔詳解","conflict":""},{"id":"1166","sub":"E","src":"NG","years":[107],"stem":"Which degrees of peripheral nerve injury by Sunderland's classifications are damaged with complete internal structural disorganization?","opts":{"A":"First-degree injury","B":"Second-degree injury","C":"Third-degree injury","D":"Fourth-degree injury","E":"Fifth-degree injury"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Sunderland fourth-degree=complete internal structural disorganization(neuroma-in-continuity)。","peropt":{"A":"first非。","B":"second非。","C":"third非。","D":"✔答案:fourth-degree。","E":"fifth為complete transection。"},"cite":"Neligan Volume 6, Ch32 p699","conflict":""},{"id":"1167","sub":"C","src":"NG","years":[107,110,112,113],"stem":"Which is not the principle of tendon transfers?","opts":{"A":"Soft tissue equilibrium","B":"Adequate strength of donor muscle","C":"Synergy of transfer","D":"Multiple function for each transferred tendon","E":"Direct line of pull"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"每條轉位肌腱應執行單一功能(one tendon-one function);'multiple function'非原則。","peropt":{"A":"soft tissue equilibrium=原則。","B":"donor muscle足夠力量=原則。","C":"synergy=原則。","D":"✔答案:每條肌腱多重功能『非』原則。","E":"direct line of pull=原則。"},"cite":"Neligan Volume 6, Ch34 p746","conflict":""},{"id":"1168","sub":"D","src":"NG","years":[107],"stem":"About muscle transfers for elbow flexion, which is wrong?","opts":{"A":"Musculocutaneous nerve is used for neural coaptation","B":"Donor nerve can be intercostal nerve","C":"Donor nerve can be radial nerve","D":"Donor nerve can be spinal accessory nerve","E":"Donor nerve can be thoracodorsal nerve"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Radial nerve非elbow flexion重建的donor nerve(radial支配伸肌)。","peropt":{"A":"musculocutaneous為神經接合對象，正確。","B":"intercostal nerve可為donor，正確。","C":"✔答案(錯)：radial nerve非donor。","D":"spinal accessory可為donor，正確。","E":"thoracodorsal可為donor，正確。"},"cite":"Neligan Volume 6, Ch35 p787","conflict":""},{"id":"1169","sub":"D","src":"NG","years":[107],"stem":"Differences between adult and pediatric brachial plexus injury, which is wrong?","opts":{"A":"Etiology in adult is trauma, and closed injury in pediatric group","B":"More spontaneous recovery happened in adult group","C":"Nerve transfer is used in adult and nerve graft was used in pediatric BPI","D":"Rehabilitation result is good in adult, poor in pediatric BPI","E":"Intrinsic recovery following repair was never happened in adult"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"自發性恢復在『小兒(產傷)』group較多,非成人。","peropt":{"A":"成人trauma、小兒closed injury，正確。","B":"✔答案(錯)：小兒group自發恢復較多(非成人)。","C":"nerve transfer成人/nerve graft小兒，正確。","D":"復健成人好、小兒差，正確。","E":"成人intrinsic恢復罕見，正確。"},"cite":"Neligan Volume 6, Ch36 p790","conflict":""},{"id":"1170","sub":"O","src":"NG","years":[107],"stem":"〔複選〕\n複選1. Which descriptions about congenital hand are correct? (複選)","opts":{"A":"Polydactyly is mostly isolated, whereas syndromic association is more common in radial polydactyly","B":"Mostly common used classification of radial polydactyly is Wassel classification","C":"Clinodactyly is reserved for radio-ulnar deviation in the hand","D":"Notta's node is a palpable proximal to the a1 pulley in children with a locked extension deformity","E":"Camptodactyly is a contracture of the PIPJ in the antero-posterior direction"},"ans":"BCE","multi":true,"etype":"ai","expl":"","key":"🎯 先天手部：radial polydactyly分類最常用Wassel classification；clinodactyly指冠狀面（radio-ulnar）偏斜；camptodactyly為PIPJ於antero-posterior（屈曲）方向之攣縮。核心易錯：radial（thumb）polydactyly多為isolated/sporadic，反而中央/尺側多指較常合併症候群；trigger thumb之Notta's node位於A1 pulley處且為『locked flexion』（非extension）。本題複選『正確』者。","peropt":{"A":"✗ 反了：radial polydactyly多為isolated；中央/尺側多指較常合併症候群，故不正確。","B":"✓ Radial polydactyly最常用Wassel classification，正確。","C":"✓ Clinodactyly為手指radio-ulnar偏斜，正確。","D":"✗ Notta's node相關的是trigger thumb之『locked flexion』而非extension，敘述有誤。","E":"✓ Camptodactyly為PIPJ屈曲方向之攣縮，正確。"},"cite":"待複查（NG 先天手部差異 記憶佐證）","conflict":""},{"id":"1171","sub":"K","src":"NG","years":[107],"stem":"複選2. About vascular anomalies treatments, which are wrong? (複選)","opts":{"A":"Infantile hemangiomas are usually treated by surgery","B":"Dissection no more than half of a digit or a limb at a time","C":"Aggressive management for lymphatic malformations is reserved for symptomatic lesions that cause pain, cellulitis, and compression neuropathy","D":"Pyogenic granuloma in the hand and upper limb, complete excision with skin graft was avoid","E":"NICH (noninvoluting congential hemangioma) may require intralesional corticosteroid injection in problematic regions"},"ans":"AD","multi":true,"etype":"ai","expl":"","key":"🎯 血管異常治療原則:Infantile hemangioma 多會自行 involute，第一線為觀察或 propranolol，非手術;大範圍病灶手術一次剝離不超過半指/半肢以保灌流;lymphatic malformation 積極處置僅限有症狀(疼痛、蜂窩組織炎、壓迫神經);pyogenic granuloma 以切除(刮除/切除±植皮)處理。本題找『錯誤』，錯誤為 A、D。","peropt":{"A":"✓(屬答案，敘述錯誤) Infantile hemangioma 多自行退化，首選觀察或 propranolol，非手術。","B":"✗(敘述正確，不選) 分次剝離每次不超過半指/半肢，保護灌流。","C":"✗(敘述正確，不選) LM 積極治療保留給有症狀者(疼痛/蜂窩炎/壓迫神經)。","D":"✓(屬答案，敘述錯誤) Pyogenic granuloma 應完整切除(必要時植皮);『避免完整切除』的敘述有誤。","E":"✗(敘述正確，不選) NICH 不退化，problematic 部位可能需病灶內處置/切除。"},"cite":"待複查（NG vascular anomalies 記憶佐證）","conflict":""},{"id":"1172","sub":"D","src":"NG","years":[107],"stem":"複選3. What are the standard procedure of reconstruction techniques for upper plexus injuries include restoration of shoulder external rotation and abduction as well as elbow flexion? (複選)","opts":{"A":"Anterior interosseous nerve to deep motor branch of ulnar nerve","B":"Spinal accessory to suprascapular nerve","C":"Medial triceps to axillary nerve","D":"Double fascicular nerve transfer","E":"Median nerve fascicules to FDS transfer to PION"},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯 上臂神經叢（upper plexus, C5–C6）重建以恢復『肩外旋/外展＋肘屈曲』為目標的標準 nerve transfer 組合：Spinal accessory → suprascapular nerve（肩外旋外展）、medial triceps branch → axillary nerve（三角肌/肩外展）、double fascicular (Oberlin double) transfer（尺神經束→biceps、正中神經束→brachialis，肘屈曲）。核心鑑別：AIN→ulnar deep motor branch 是重建尺側內在肌（下臂叢），非上臂叢目標。","peropt":{"A":"✗ Anterior interosseous nerve → deep motor branch of ulnar 用於重建尺側內在肌（下臂叢），非上臂叢肩肘功能。","B":"✓ Spinal accessory → suprascapular nerve，恢復肩外旋/外展。","C":"✓ Medial triceps branch → axillary nerve，恢復三角肌/肩外展。","D":"✓ Double fascicular（Oberlin double）transfer，恢復肘屈曲。","E":"✗ Median nerve fascicles → FDS 轉移到 PION 非上臂叢肩肘重建標準術式。"},"cite":"待複查（NG 手外科 臂叢 nerve transfer 記憶佐證）","conflict":""},{"id":"1173","sub":"F","src":"NG","years":[108],"stem":"下列有關 肌腱縫合（tendon repair） 描述，何者為非?","opts":{"A":"end-to-end 肌腱縫合須用multistrand core suture的方式，多以4-straind或6-straind repair為主","B":"肌腱再斷裂，肌腱沾黏，關節僵硬為手術後常見的併發症","C":"受損的Tendon sheath 須做完整的修補，如未完全修補會造成手指功能受損","D":"手指的full extension and flexion 須在縫合後做立即的測試，以確保縫合處沒有間隙且滑動順暢，所以手術最好是以 wide-awake 的麻醉方式進行","E":"無傷口的屈肌肌腱斷裂（closed rupture）通常需要手術治療"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Tendon sheath不需『完整』修補(完整修補反而可能妨礙滑動)。","peropt":{"A":"multistrand core suture、4/6-strand，正確。","B":"再斷裂/沾黏/僵硬為常見併發症，正確。","C":"✔答案(非)：tendon sheath不需完整修補。","D":"wide-awake下即時測試滑動，正確。","E":"closed flexor rupture通常需手術，正確。"},"cite":"Neligan Vol. 6, Ch 9, p 188-189","conflict":""},{"id":"1174","sub":"C","src":"NG","years":[108],"stem":"下列何者不屬於 ulnar nerve palsy的臨床症狀？","opts":{"A":"Durkan's sign","B":"Duchenne's sign","C":"Wartenberg's sign","D":"Froment's sign","E":"Jeanne's sign"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Durkan's sign(carpal compression test)為正中神經/CTS，非ulnar palsy。","peropt":{"A":"✔答案(不屬於)：Durkan's sign為median/CTS。","B":"Duchenne's sign(ulnar claw)=尺神經。","C":"Wartenberg's sign=尺神經。","D":"Froment's sign=尺神經。","E":"Jeanne's sign=尺神經。"},"cite":"Neligan yly"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 Apert syndrome(=acrocephalosyndactyly，FGFR2 突變):顱顏有 coronal(及 lambdoid)縫過早閉合、midface hypoplasia，可致 OSA;常見發展/語言與動作遲緩;上肢典型對稱性 symphalangism(index/long/ring)與拇指 radial clinodactyly、複雜性併指;雙足亦 simple complete syndactyly。本題全部正確。⚠ 對照 NG110-B16-Q10 為同概念不同選項事實置換，記概念勿背字母。","peropt":{"A":"✓ 又稱 acrocephalosyndactyly syndrome。","B":"✓ Coronal(及 lambdoid)縫早閉+midface hypoplasia。","C":"✓ 常見語言/動作發展受損。","D":"✓ 對稱性 symphalangism(食/中/環指)+拇指 radial clinodactyly。","E":"✓ 雙足 simple and complete syndactyly。"},"cite":"待複查（NG Apert syndrome 記憶佐證）","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B16-Q10） ⚠ 同題歷屆重出：108年(1201)與110年(1250)皆為「Apert syndrome何者正確(複選)」且全選ABCDE；A/B/C/E四選項相同(acrocephalosyndactyly、顱顏premature suture閉合+midface hypoplasia、語言與動作發展遲緩、下肢simple complete syndactyly)，僅選項D不同：108年D為上肢symphalangism of index/long/ring + radial clinodactyly of thumb，110年D改為可能造成obstructive sleep apnea(兩者皆為真)；記概念不記字母。"},{"id":"1202","sub":"C","src":"NG","years":[109],"stem":"關於手部檢查，下列何者為錯","opts":{"A":"Eichoff test: The patient is asked to hold the thumb with the four flexed fingers of the affected hand. The hand is deviated ulnarly by the examiner. This is to detect de Quervain's tendinitis.","B":"Phalen's test: The patient's wrist is held in maximum palmar flexion for up to 2 minutes. This test is used as a provocative test specific to carpal tunnel syndrome.","C":"Froment's test: The patient is asked to hold a piece of paper between the ulnar tip of the thumb and the radial tip of the index fingers. The examiner slowly pulls the paper away from the patient while encouraging the patient to hold on it. This is to assess the motor function of the ulnar nerve.","D":"Wartenberg's sign: The patient is asked to keep the fingers adducted with the MP, PIP and DIP joints fully extended. This is to assess the motor function of the ulnar nerve.","E":"Jeanne's test: The patient places the hand on a table with the thumb up. The examiner pushes down on the proximal phalanx of the thumb. This is to detect de Quervain's tendinitis."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Jeanne's test/sign評估『拇指內收無力』(尺神經)，非de Quervain。","peropt":{"A":"Eichoff test檢測de Quervain，正確。","B":"Phalen's test檢測CTS，正確。","C":"Froment's test評估尺神經運動，正確。","D":"Wartenberg's sign評估尺神經，正確。","E":"✔答案(錯)：Jeanne's評估拇指內收無力(尺神經)，非de Quervain。"},"cite":"Neligan Vol 6. Chap2. P58.","conflict":""},{"id":"1203","sub":"A","src":"NG","years":[109],"stem":"關於手部構造，下列何者為錯","opts":{"A":"The intersection of the Kaplan's cardinal line and the longitudinal line from the ulnar side of the middle finger corresponds to the motor branch of the median nerve.","B":"The thumb and its metacarpal with a wide range of motion at the carpometacarpal joint. Five intrinsic muscles and four extrinsic muscles are specifically influential on thumb positioning and activity.","C":"The proximal scaphoid is poorly vascularized and is susceptible to nonunion after proximal pole fracture.","D":"The components of the digital fascia that help to anchor the axial plane skin are Grayson's ligaments dorsal to the neurovascular bundles and Cleland's ligaments palmar to the bundles.","E":"Check rein ligaments are abnormal structures that are found only after fibrosis of the proximal interphalangeal joint occurs."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Grayson's ligaments在NV bundle『掌側』、Cleland's在『背側』;此敘述顛倒。","peropt":{"A":"Kaplan line交點=median motor branch，正確。","B":"拇指5內在肌/4外在肌，正確。","C":"proximal scaphoid血供差→nonunion，正確。","D":"✔答案(錯)：Grayson's在掌側、Cleland's在背側(此敘述顛倒)。","E":"checkrein ligament纖維化後PIP出現，正確。"},"cite":"Neligan Vol 6. Chap1. P5.","conflict":""},{"id":"1206","sub":"G","src":"NG","years":[109],"stem":"關於手部骨折，下列何者為錯？","opts":{"A":"指骨與掌骨是上肢骨折中比例最高的，指骨與掌骨骨折占全身所有骨折百分之十。","B":"對於生長板還沒關閉的小兒骨折，K-wire穿過生長板是絕對禁止，因為可能會造成生長板提早關閉。","C":"生長板骨折（Growth plate fracture）在Salter–Harris classification 中，type II是最常見的。","D":"PIP joint fracture, 若middle phalangeal base於關節面受損比例小於百分之 以及distal palmar crease distortion (Hugh Johnson sign)。最常發生於無名指，第二為小指。","C":"位於PIP joint背側的knuckle pads稱為Garrod's nodules，若病人有此症狀，則有Peyronie's disease和Ledderhose's disease的機會較高，但疾病嚴重度或功能影響程度未必較嚴重。","D":"手術適應症為MCP joint contracture 30°及任何程度的PIP joint contracture。相較於後者，前者較不緊急。","E":"Percutaneous fasciotomy適合用於isolated palmar cords with MCP joint moderate flexion，不適用於diffuse infiltrating cords、postsurgical recurrence、長期PIP flexion contracture以及deep lateral cords。在percutaneous fasciotomy出現前regional fasciectomy為治療主流。"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『錯誤』。Dupuytren 常考觀念：Spiral cord 使 NV bundle 往內往淺移位『正確』，但 central cord 造成的是『PIP joint』屈曲攣縮而非 DIP，故 A 為錯誤敘述。其餘：最早症狀為掌部 dimpling 與 distal palmar crease 變形(Hugh Johnson sign)、好發環指>小指；Garrod's nodules 於 PIP 背側；手術指徵 MCP 30° 及任何程度 PIP 攣縮；percutaneous fasciotomy 適用單純 palmar cord。","peropt":{"A":"✓（正解＝錯誤敘述）Spiral cord 移位 NV bundle 部分正確，但 central cord 造成的是 PIP（非 DIP）屈曲攣縮。","B":"✗（正確敘述）最早症狀為掌部 dimpling、distal palmar crease 變形（Hugh Johnson sign），好發環指、次為小指。","C":"✗（正確敘述）Garrod's nodules 於 PIP 背側，合併 Peyronie/Ledderhose 機率較高，但嚴重度未必較重。","D":"✗（正確敘述）手術指徵為 MCP 攣縮 30° 及任何程度 PIP 攣縮；MCP 較不緊急。","E":"✗（正確敘述）Percutaneous fasciotomy 適用單純 palmar cord 合併 MCP 中度屈曲，不適用瀰漫性/復發/長期 PIP 攣縮/深層 lateral cord。"},"cite":"待複查（NG 手外科 Dupuytren 記憶佐證）","conflict":"⚠ 同題歷屆重出：Dupuytren's disease『何者錯誤』題，錯誤選項恆為「central cord造成DIP joint flexion contracture」(應為MCP/PIP)。109年(1214)答A、110年(1243)答B、112年(1283)答D、113年(1293)答B(僅選項順序不同)；記概念不記字母。"},{"id":"1215","sub":"J","src":"NG","years":[109,110],"stem":"下列關於rheumatoid arthritis (RA)之敘述，何者正確？","opts":{"A":"常見症狀為morning stiffness，敏感度最高的症狀為對稱性關節炎及手部關節炎。Rheumatoid factor是RA marker，但和anti-citrullinated protein antibodies (ACPAs)都與疾病嚴重度無關。","B":"關節症狀常從MCP、PIP及手腕開始，因為這些關節的synovium to joint surface area ratio較低。","C":"Caput ulnae意指dorsal dislocation of the ulnar head、carpal pronation、volar subluxation of the ECU；Vaughan-Jackson syndrome意指radial to ulnar progression of extensor tendon ruptures；Mannerfelt lesion意指flexor pollicis longus tendon因scaphoid sharp erosion而斷裂。","D":"Finger deformity分為swan-neck deformity和boutonniere deformity，前者可能源自DIP、PIP、MCP joint，後者則一定源自PIP joint。","E":"Rheumatoid thumb deformity可分為五型，第一型即為swan-neck deformity，第三型即為boutonniere deformity。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 RA重點：swan-neck畸形可源自DIP/PIP/MCP，boutonniere一定始於PIP。核心易錯（本題問『正確』）：RF/ACPA皆與疾病嚴重度『相關』；早期受累關節（MCP/PIP/wrist）因synovium-to-joint-surface ratio『高』；rheumatoid thumb Type I為boutonniere（最常見）、Type III為swan-neck。","peropt":{"A":"✗ 錯誤：ACPA（及RF）與疾病嚴重度『相關』，非無關。","B":"✗ 錯誤：MCP/PIP/wrist因synovium-to-joint-surface ratio『高』而先受累，非低。","C":"✗ 錯誤：Vaughan-Jackson為伸肌腱斷裂由『尺側向橈側』進展（非radial to ulnar），故敘述有誤。","D":"✓（正解）Swan-neck可源自DIP/PIP/MCP，boutonniere一定源自PIP，正確。","E":"✗ 錯誤：拇指Type I為boutonniere、Type III為swan-neck，選項將兩者對調。"},"cite":"待複查（NG 類風濕性關節炎 記憶佐證）","conflict":"⚠ 同題歷屆重出：rheumatoid arthritis『何者正確』題，正確選項恆為「finger deformity分swan-neck與boutonniere，前者可源自DIP/PIP/MCP，後者必源自PIP」。109年(1215)答D、110年(1245)答C(僅選項順序不同)；記概念不記字母。"},{"id":"1216","sub":"J","src":"NG","years":[109,110,111,112,113],"stem":"下列關於手部osteoarthritis (OA)之敘述，何者錯誤？(複選)","opts":{"A":"最常發生於distal interphalangeal (DIP) joints of the fingers和carpometacarpal (CMC) joint of the thumb。","B":"DIP joint OA的常見表現包含DIP關節變大並出現knobby protuberances，稱為Heberden's nodes。Radiographic appearance與疾病嚴重程度相關，且Heberden's nodes為手術適應症之一。","C":"Proximal interphalangeal joint OA的手術方式包含arthrodesis和implant arthroplasty，vascularized joint transfer雖然可行但outcome不佳。","D":"Carpometacarpal (CMC) arthritis有兩種classification systems，其中Burton classification只用影像學評估，而Eaton classification則合併影像學及臨床症狀評估。","E":"CMC arthritis的手術依據軟骨是否受影響而決定，early stage手術目標為維持關節穩定、預防持續退化、palmar cartilage offload，late stage手術目標則為減少疼痛及維持拇指力量與活動。"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯 手部 OA:好發 DIP 與拇指 CMC。DIP OA 出現 Heberden's nodes;但影像嚴重度與症狀『不』相關，且 Heberden's nodes 本身非手術適應症。CMC arthritis 的 Eaton 分期為影像分期;敘述將分類系統屬性弄反者即為錯誤。本題找『錯誤』者為 B、D。","peropt":{"A":"✗(敘述正確，不選) 最常發生於 DIP 與拇指 CMC 關節。","B":"✓(屬答案，敘述錯誤) 影像表現與症狀嚴重度『不相關』，且 Heberden's nodes 本身非手術適應症。","C":"✗(敘述正確，不選) PIP OA 可行 arthrodesis 或 implant arthroplasty;vascularized joint transfer 可行但結果較差。","D":"✓(屬答案，敘述錯誤) 分類系統屬性弄反:Eaton 為影像分期系統，本敘述之歸屬有誤。","E":"✗(敘述正確，不選) CMC 手術依軟骨受累與否分早/晚期目標。"},"cite":"待複查（NG hand OA 記憶佐證）","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG111-B15-Q08） ⚠ 同題歷屆重出：手部osteoarthritis『何者錯誤(複選)』題，兩個錯誤選項恆為「Heberden's nodes為手術適應症之一」與「Burton classification之敘述」(Burton文字各年略有改寫，但恆為誤述)。109/110年(1216)答BD、111年(1264)答BD、112/113年(1285)答BE(選項順序不同)；記概念不記字母。"},{"id":"1217","sub":"K","src":"NG","years":[109,110,111,112,113,115],"stem":"下列關於Raynaud's disease與Raynaud syndrome的比較，何者錯誤？","opts":{"A":"兩者都有triphasic color change。","B":"Raynaud's disease較好發於女性。","C":"Raynaud syndrome常有trophic findings。","D":"Raynaud syndrome較常呈現異常Allen test。","E":"Raynaud syndrome的症狀較對稱。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題選『錯誤』。Raynaud's disease（原發）vs syndrome（次發）：兩者皆有 triphasic color change（白-藍-紅）；disease 好發女性；syndrome 常有 trophic findings、Allen test 常異常、且呈『不對稱』。核心錯誤：Raynaud syndrome 症狀為『不對稱』（disease 才對稱），故 E 錯誤。","peropt":{"A":"✗（正確敘述）兩者皆有 triphasic color change。","B":"✗（正確敘述）Raynaud's disease 較好發於女性。","C":"✗（正確敘述）Raynaud syndrome 常有 trophic findings。","D":"✗（正確敘述）Raynaud syndrome 較常呈現異常 Allen test。","E":"✓（正解＝錯誤敘述）Raynaud syndrome 症狀為『不對稱』，disease 才較對稱。"},"cite":"待複查（NG 手外科 Raynaud 比較 記憶佐證）","conflict":"⚠ 同題歷屆重出：Raynaud's disease vs syndrome比較『何者錯誤』題，錯誤選項恆為「Raynaud syndrome症狀較對稱」(syndrome多不對稱)。109/110/111/115年(1217)答E、112/113年(1281)答B(僅選項順序不同)；記概念不記字母。"},{"id":"1218","sub":"C","src":"NG","years":[109,110,111,112,113],"stem":"下列關於nerve entrapment syndrome之敘述，何者正確？","opts":{"A":"Carpal tunnel syndrome：約45%懷孕女性第三孕期時會出現，通常產後需手術治療。","B":"Lacertus syndrome：motor symptoms比sensory symptoms早出現。","C":"Anterior interosseous syndrome：pure motor weakness，Tinel's test可能呈現陽性。","D":"Ulnar nerve compression in Guyon's canal：依據壓迫位置分為三區，zone I只會有motor symptoms。","E":"Cubital tunnel syndrome：可能壓迫位置包含arcade of Struth
