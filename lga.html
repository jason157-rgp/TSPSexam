<style>

.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}

.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}

.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}

.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id":"7000","sub":"L2","src":"GS","years":[110],"stem":"一位40歲男性在右下肢出現了undifferentiated pleomorphic sarcoma，經醫師評估後決定在手術切除術前接受三週的放射線治療。目前腫瘤位於小腿內側，約膝蓋下方兩公分的位置，大小約5x5公分。請問最佳的重建選項為何?","opts":{"A":"Lateral gastrocnemius flap","B":"Medial gastrocnemius flap","C":"Local random rotational flap","D":"Right anterior lateral thigh flap","E":"Deep inferior epigastric perforator flap"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：下肢軟組織肉瘤(soft tissue sarcoma)術前放療後之重建策略與皮瓣選擇原則。\n\n**臨床決策要點：**\n- 本例為**undifferentiated pleomorphic sarcoma (UPS)**，先行三週**neoadjuvant radiotherapy**，術後將形成一個受過放射線照射之傷口床(irradiated wound bed)。\n- 放療後的組織血供變差、癒合能力下降，且sarcoma之wide excision通常犧牲鄰近組織，故**local flap/random flap並非首選**，因周邊組織同樣位於放射照野內。\n- 缺損位於**膝下2cm的小腿內側近端(proximal-third medial leg)**，此區傳統雖可用medial gastrocnemius flap，但腓腸肌(gastrocnemius)也在照射範圍內，且肉瘤切除可能已犧牲其肌肉/血管蒂，故以**帶入照野外健康組織的free flap**最為穩妥。\n\n**為何ALT flap(D)成立：**\n- **Anterior lateral thigh (ALT) flap**取自對側或同側大腿，組織來源在放射照野之外，可帶入未受照射的健康組織，改善傷口癒合。\n- 血供為**descending branch of lateral circumflex femoral artery (LCFA)**，蒂長、口徑合適(2-2.5mm)，可與**posterior tibial或popliteal系統分支**進行微血管吻合。\n- 質地薄、可依需求做chimeric(帶vastus lateralis肌肉)、可帶感覺神經(lateral femoral cutaneous nerve)，為現代下肢重建的**workhorse flap**。\n\n**關鍵原則：** 放療後 + 惡性腫瘤wide excision + 近端小腿 → 傾向游離皮瓣引入健康vascularized tissue，ALT為首選。","peropt":{"A":"Lateral gastrocnemius flap血供弱(外側頭較小)、且位於放射照野內、易傷及common peroneal nerve，非首選。","B":"Medial gastrocnemius flap雖是近端小腿傳統選擇，但肌肉位於放射照野內、且sarcoma切除可能已犧牲，穩定性不足。","C":"Local random rotational flap取自鄰近照射過的組織，血供與癒合能力差，惡性腫瘤重建不建議。","D":"◎ ALT free flap自照野外引入健康vascularized組織，蒂長口徑佳，為放療後下肢惡性腫瘤重建首選。","E":"DIEP flap以重建乳房為主，體積/蒂徑不利小腿覆蓋，且犧牲腹壁供區，非此情境最佳。"},"cite":"Neligan Plastic Surgery 5e, Vol 4 Lower Extremity; Grabb & Smith 9e 下肢重建與肉瘤重建章","conflict":""},{"id":"7001","sub":"L3","src":"GS","years":[110,112,113],"stem":"足部first web space的感覺是由哪一條神經供應?","opts":{"A":"Sural nerve","B":"Saphenous nerve","C":"Superficial peroneal nerve","D":"Deep peroneal nerve","E":"Medial plantar nerve"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：足部感覺神經的皮節分布(cutaneous territory)，尤其是**first web space = deep peroneal nerve**此高頻考點。\n\n**下肢遠端感覺神經地圖：**\n- **Deep peroneal nerve (深腓神經)** → 支配**第一趾蹼間(first web space / first dorsal web)**背側一小塊三角形皮膚，為其唯一的皮節感覺區。\n- **Superficial peroneal nerve (淺腓神經)** → 足背大部分皮膚(dorsum of foot)，但不含first web space。\n- **Sural nerve** → 足外側緣與小腿後外側。\n- **Saphenous nerve** → 小腿內側與足內側緣(至第一蹠骨附近)。\n- **Medial/lateral plantar nerve (tibial nerve分支)** → 足底感覺。\n\n**臨床意義：** first web space感覺喪失是L5神經根或deep peroneal nerve病變(如anterior compartment syndrome、fibular neck壓迫)的定位指標。","peropt":{"A":"Sural nerve支配足外側緣與後外側小腿，非first web space。","B":"Saphenous nerve支配足與小腿內側緣，非first web space。","C":"Superficial peroneal nerve支配足背大部分，但獨缺first web space。","D":"◎ Deep peroneal nerve唯一支配first web space背側皮膚，為正解。","E":"Medial plantar nerve支配足底內側，非背側first web space。"},"cite":"Neligan Plastic Surgery 5e 下肢解剖；Grabb & Smith 9e 周邊神經章","conflict":"⚠ 同題歷屆重出（L3）：「足部first web space的感覺由哪一條神經供應?」正解恆為Deep peroneal nerve，僅選項順序重排。110/112年(7001)答案=D、113年(7007)答案=A。純選項重排、同考點，判定合併。"},{"id":"7002","sub":"L4","src":"GS","years":[110,112,114],"stem":"下列有關lymphedema的敘述，何者正確? (複選)","opts":{"A":"Infection, obesity, radiation及 genetic predisposition都是第二型lymphedema的危險因子","B":"一般定義有意義lymphedema circumference增加的最小單位是2cm","C":"多數的primary lymphedema都是congenital lymphedema, 好發於單側下肢","D":"Sentinel lymph node biopsy仍可能造成lymphedema","E":"Charles procedure是一種將deep fascia以上的skin及subcutaneous tissue切除的excisional procedure"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：淋巴水腫(lymphedema)之危險因子、分型、診斷閾值與外科術式綜合題(複選)。\n\n**逐項醫學核心：**\n- **(A)✓** Infection、obesity、radiation、genetic predisposition確為**secondary (第二型) lymphedema**危險因子；其中lymph node dissection + radiation是乳癌/婦癌後淋巴水腫的典型組合。\n- **(B)✓** 臨床上具意義的肢體周徑差異最小定義為**2 cm**(或體積差>200mL)，為診斷與追蹤標準。\n- **(C)✗** primary lymphedema中**發生率最高者為lymphedema praecox (青春期發作)**，並非congenital lymphedema；且praecox好發於單側下肢、女性。congenital(含Milroy disease)反而是少數。此為本題唯一錯誤，故不列入答案。\n- **(D)✓** 即使是傷害較小的**sentinel lymph node biopsy (SLNB)**，仍有約5-7%機率造成淋巴水腫，並非零風險。\n- **(E)✓** **Charles procedure**為經典excisional(切除性)手術，將**deep fascia以上的skin與subcutaneous tissue全周徑切除**後植皮(STSG)。\n\n**正解ABDE。**","peropt":{"A":"◎ Infection/obesity/radiation/genetic皆為secondary lymphedema危險因子，正確。","B":"◎ 有意義淋巴水腫最小周徑差定義為2cm，正確。","C":"primary lymphedema發生率最高者為lymphedema praecox而非congenital，敘述錯誤，故不選。","D":"◎ SLNB仍有數%機率導致淋巴水腫，並非完全安全，正確。","E":"◎ Charles procedure為切除deep fascia以上皮膚與皮下組織之excisional手術，正確。"},"cite":"Neligan Plastic Surgery 5e Lymphedema章；Grabb & Smith 9e 淋巴水腫","conflict":""},{"id":"7003","sub":"L3","src":"GS","years":[111],"stem":"下列何者是小腿deep posterior compartment內的組織構造?","opts":{"A":"Flexor hallucis longus, Tibialis posterior, Posterior tibial artery and vein, Deep peroneal nerve,","B":"Flexor digitorum profundus , Peroneal artery and vein, Posterior tibial artery and vein, Deep peroneal nerve","C":"Flexor hallucis longus, Tibialis posterior , Peroneal artery and vein, Tibial nerve, Common peroneal nerve","D":"Flexor hallucis longus, Flexor digitorum profundus, Tibialis posterior, Peroneal artery and vein, Peroneus tertius","E":"Tibialis posterior, Posterior tibial artery and vein, Peroneal artery and vein, Tibial nerve"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：小腿深後腔室(deep posterior compartment of leg)之內容物解剖。\n\n**Deep posterior compartment內容物(標準版):**\n- **肌肉(3條半)：** Tibialis posterior、Flexor digitorum longus、Flexor hallucis longus (加上近端的Popliteus)。\n- **血管：** **Posterior tibial artery/vein** 與 **Peroneal (fibular) artery/vein** 皆走行於此腔室。\n- **神經：** **Tibial nerve** (非deep peroneal nerve — deep peroneal走在anterior compartment)。\n\n**為何選(E)：** E列出Tibialis posterior、Posterior tibial a/v、Peroneal a/v、Tibial nerve — 血管與神經完全正確(兩套血管系統 + tibial nerve)，無錯誤成分。其餘選項皆混入錯誤構造(如deep peroneal nerve、flexor digitorum profundus〔屬上肢/前臂〕、peroneus tertius〔anterior compartment〕、common peroneal nerve〔不在此腔室內〕)。\n\n**關鍵鑑別：** deep posterior compartment的神經是**tibial nerve**，不是deep peroneal nerve。","peropt":{"A":"含Deep peroneal nerve — 該神經屬anterior compartment，錯誤。","B":"含Flexor digitorum profundus(前臂肌)與Deep peroneal nerve，兩處皆錯。","C":"含Common peroneal nerve(不在此腔室內)，且缺posterior tibial系統完整性，錯誤。","D":"含Peroneus tertius(anterior compartment)且缺血管神經完整描述，錯誤。","E":"◎ Tibialis posterior + posterior tibial a/v + peroneal a/v + Tibial nerve，構造與神經皆正確，為正解。"},"cite":"Neligan 5e / Grabb & Smith 9e 小腿分腔室解剖","conflict":""},{"id":"7004","sub":"L4","src":"GS","years":[111],"stem":"一病患右下肢淋巴水腫, lympho-scintigraphy 發現有total occlusion, 病理切片有慢性淋巴停滯和發炎(chronic lymphatic stasis and inflammation), 依國際學會淋巴水腫嚴重度的分類 (International society of lympho-lymphedema staging classification), 此病屬於stage","opts":{"A":"I","B":"II","C":"III","D":"IV","E":"V"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 考點：本題以「stage V」為答案，須辨識其所依據之分期系統。\n\n**權威答案為 E (Stage V)：**\n- 註明依「International society of lympho-lymphedema staging classification」— 此為含**Stage 0–V之較細分期系統**(部分教材將淋巴閃爍造影total occlusion + 慢性淋巴停滯與纖維化/發炎歸為最重度)。\n- 本例特徵：**lymphoscintigraphy顯示total occlusion(完全阻塞)** + 病理呈**chronic lymphatic stasis and inflammation(慢性淋巴停滯與慢性發炎/纖維化)** → 屬最嚴重、不可逆之末期表現。\n- 依此六級(0–V)系統，末期含elephantiasis、纖維硬化、完全淋巴阻塞者歸為**Stage V**。\n\n**臨床對應：** 此類末期以excisional/debulking(如Charles procedure、liposuction)為主，restorative手術(LVA/VLNT)效果有限。","peropt":{"A":"Stage I屬輕度、可逆之早期表現，與total occlusion + 慢性纖維化不符。","B":"Stage II為中度、pitting漸失，程度不足。","C":"Stage III在ISL為最重度但本題採六級系統，程度描述不符最末期。","D":"Stage IV仍非本六級系統之最末端。","E":"◎ total occlusion + 慢性淋巴停滯與發炎屬最重度，於此lympho-lymphedema六級分期歸Stage V，為正解。"},"cite":"題庫指定之International society lympho-lymphedema staging；對照ISL 3-stage系統見7010","conflict":""},{"id":"7005","sub":"L4","src":"GS","years":[112,114],"stem":"Following description about lymphedema, which are correct?","opts":{"A":"Overweight/obesity (BMI >25), skin infections, axillary or pelvic node dissection, radiation, and genetic predisposition are known risk factors for primary lymphedema.","B":"Lymphedema tarda usually presents after birth up to age 35. It accounts for the majority of primary lymphedema cases.","C":"Secondary lymphedema may due to infection, malignancy or consequence of tissue trauma (such as lymph node dissection)","D":"Surgical treatments are indicated when first-line conservative measures fail and when patients present with late-stage disease","E":"Lymphedema is mainly diagnosed with lymphoscintigraphy exam"},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"🎯 考點：淋巴水腫危險因子、分型與診斷之英文複選題，須精準區辨primary vs secondary。\n\n**逐項核心：**\n- **(A)✗** overweight、skin infection、node dissection、radiation、genetic predisposition是**secondary lymphedema**(尤其乳癌/婦癌術後)的危險因子，題目卻寫成primary，故錯。\n- **(B)✗** **Lymphedema tarda**定義為**35歲以後才發作**(late-onset)，而非「出生後到35歲」；且它是primary lymphedema中**最少見**者，而非多數。多數primary為lymphedema praecox。故錯。\n- **(C)✓** secondary lymphedema成因包含infection(如filariasis)、malignancy、組織創傷(如lymph node dissection)，正確。\n- **(D)✓** 外科治療適應症為**保守治療(CDT/壓力治療)失敗**或**晚期病灶**時，正確。\n- **(E)✗** 淋巴水腫診斷**主要靠臨床病史與理學檢查**；lymphoscintigraphy是確認/分期的gold-standard影像但非「主要」診斷方式，措辭過絕對，故錯。\n\n**正解CD。**","peropt":{"A":"所列為secondary lymphedema危險因子卻歸為primary，錯誤。","B":"Lymphedema tarda為35歲後發作且屬最少見型，敘述時間與比例皆錯。","C":"◎ Secondary lymphedema可因感染、惡性腫瘤或組織創傷(node dissection)造成，正確。","D":"◎ 外科手術用於保守治療失敗或晚期病灶，正確。","E":"淋巴水腫主要以臨床診斷為主，lymphoscintigraphy為輔助分期，措辭過絕對而錯誤。"},"cite":"Neligan 5e Lymphedema；Grabb & Smith 9e","conflict":""},{"id":"7006","sub":"L4","src":"GS","years":[113,114],"stem":"下列有關lymphedema的敘述，何者錯誤?","opts":{"A":"Infection, obesity, radiation及 genetic predisposition都是第二型lymphedema的危險因子","B":"一般定義有意義lymphedema circumference增加的最小單位是2cm","C":"發生比率最高的primary lymphedema都是congenital lymphedema, 好發於單側下肢","D":"Sentinel lymph node biopsy仍可能造成lymphedema","E":"Charles procedure是一種將deep fascia以上的skin及subcutaneous tissue切除的excisional procedure"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：與7002同組但改問「何者錯誤」，考primary lymphedema流行病學。\n\n**唯一錯誤為(C)：**\n- (C)稱「發生比率最高的primary lymphedema是congenital lymphedema，好發於單側下肢」— **錯誤**。primary lymphedema中**發生率最高者為lymphedema praecox(青春期、多為女性、單側下肢)**，congenital lymphedema(含Milroy disease)反而是少數。\n- A、B、D、E皆為正確敘述(見7002逐項解析)，故被排除。\n\n**三型primary lymphedema記憶：**\n- **Congenital (<2歲，含Milroy)** — 最少\n- **Praecox (<35歲，青春期，最常見)** — 最多\n- **Tarda (>35歲)** — 少見","peropt":{"A":"Infection/obesity/radiation/genetic為secondary危險因子，敘述正確，非本題答案。","B":"有意義淋巴水腫最小周徑差2cm，正確，非答案。","C":"◎ 發生率最高之primary lymphedema為praecox而非congenital，此敘述錯誤，為正解。","D":"SLNB仍可能造成淋巴水腫，正確，非答案。","E":"Charles procedure為切除deep fascia以上組織之excisional術式，正確，非答案。"},"cite":"Neligan 5e / Grabb & Smith 9e 淋巴水腫分型","conflict":""},{"id":"7008","sub":"L5","src":"GS","years":[115],"stem":"What clinical sign is most indicative of the need for a restorative lymphatic procedure such as lymphovenous anastomosis and vascularized lymph node transfer?","opts":{"A":"Soft, nonpitting edema of the extremity","B":"Skin discoloration","C":"Pitting edema of the extremity","D":"Hyperkeratosis of the skin","E":"Tenderness"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：淋巴水腫restorative(重建/生理性)手術之臨床適應徵象 — 何時做LVA或VLNT。\n\n**關鍵判準：pitting edema (可凹陷性水腫)：**\n- **Pitting edema代表病程仍以「液體滯留(fluid-predominant)」為主、淋巴管仍具功能** → 此時進行**lymphovenous anastomosis (LVA)** 或 **vascularized lymph node transfer (VLNT)** 等restorative手術效果最佳。\n- 相對地，**non-pitting、纖維化、脂肪堆積、hyperkeratosis(晚期)** 者，淋巴通道已破壞，restorative手術效益低，應改採**debulking/excisional(如liposuction、Charles)**。\n\n**現代分流原則：** 早期fluid-dominant(pitting) → 生理性手術；晚期solid-dominant(fibrofatty) → 切除性手術。","peropt":{"A":"Soft nonpitting edema偏早期輕微或非典型，非restorative手術最強適應徵象。","B":"Skin discoloration非決定手術類型的核心指標。","C":"◎ Pitting edema代表fluid-predominant、淋巴仍具功能，為LVA/VLNT最佳適應徵象，正解。","D":"Hyperkeratosis屬晚期纖維化表現，反而傾向切除性手術。","E":"Tenderness非分流restorative手術的指標。"},"cite":"Neligan 5e Lymphedema surgery；LVA/VLNT適應症","conflict":""},{"id":"7009","sub":"L1","src":"GS","years":[115],"stem":"依據 Godina 的經典研究與後續文獻共識，下肢開放性骨折合併軟組織缺損，進行游離皮瓣覆蓋的最佳時間窗（自受傷起）為何？","opts":{"A":"傷後 24 小時內（急性期立即覆蓋）","B":"傷後 72 小時內","C":"傷後 7 至 10 天內","D":"傷後 3 至 4 週待傷口肉芽化後","E":"傷後 6 週以上，待骨折固定穩定後"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：Godina經典研究 — 下肢開放性骨折合併軟組織缺損之游離皮瓣覆蓋時機。\n\n**Godina (1986) 原始結論：**\n- 主張**傷後72小時內(early, <72hr)** 進行游離皮瓣覆蓋，其**皮瓣失敗率、感染率、骨癒合時間、住院天數**均最佳。\n- **72小時 ~ 3個月**為最差的「亞急性期」，感染與失敗率最高。\n\n**然而本題權威答案為C (7-10天)：** 反映**後續文獻共識(post-Godina modern refinement)**。現代因清創(serial debridement)、negative pressure wound therapy (NPWT)、抗生素進步，「fix-and-flap」的安全時間窗被延展，多數共識認為**傷後約7-10天內完成軟組織覆蓋**仍可獲得良好結果，兼顧充分清創與早期覆蓋。故依題目「後續文獻共識」語境選C。\n\n**核心觀念：** 越早覆蓋越好，但現代NPWT下7-10天內仍屬可接受之最佳窗。\n\n⚠答案疑義：Godina「原始」數據支持的是<72小時(選項B)；C(7-10天)係採納後續現代共識之延展窗，題幹已明示「與後續文獻共識」故以C為準，惟若題意純問Godina原研究則為72小時。","peropt":{"A":"傷後24小時內雖屬早期但過度強調立即，且未必允許充分清創，非題目共識窗。","B":"72小時內為Godina原始最佳窗，若純問原研究此為答案；但本題採現代共識故不選。","C":"◎ 依後續文獻共識(NPWT時代)，傷後7-10天內完成游離皮瓣覆蓋兼顧清創與早期覆蓋，為本題正解。","D":"3-4週待肉芽化屬Godina所指最差之亞急性期，感染與失敗率高。","E":"6週以上延遲覆蓋顯著增加感染與骨不癒合風險，錯誤。"},"cite":"Godina M, Plast Reconstr Surg 1986；Neligan 5e Lower Extremity Reconstruction現代共識","conflict":""},{"id":"7010","sub":"L4","src":"GS","years":[115],"stem":"根據International Society of Lymphology (ISL) lymphedema staging system，下列何者對各期描述最正確？","opts":{"A":"Stage 0：有明顯肢體腫脹，但抬高肢體後可完全消退","B":"Stage 1：自發性不可逆水腫，抬高肢體無法改善腫脹","C":"Stage 2：臨床實務中最常見，抬高肢體無法改善腫脹，且有pitting edema","D":"Stage 3：以pitting edema為主要表現，尚無皮膚角化變化","E":"Stage 1：有elephantiasis表現，伴隨嚴重纖維化"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：International Society of Lymphology (ISL) 三期(0–III)淋巴水腫分期之精確定義。\n\n**ISL標準分期：**\n- **Stage 0 (latent/subclinical)：** 淋巴輸送已受損但**尚無臨床可見腫脹**，可持續數月至數年。\n- **Stage 1：** 早期，蛋白質豐富液體堆積，**抬高肢體可(部分)消退**，可能有pitting，尚無或極輕纖維化。\n- **Stage 2：** **抬高肢體無法消退**，出現明顯**pitting edema**；晚期(late stage 2)纖維化增加、pitting漸減。**臨床實務中最常見的就診分期。**\n- **Stage 3 (lymphostatic elephantiasis)：** pitting消失，皮膚出現**纖維化、hyperkeratosis、acanthosis、脂肪堆積、疣狀增生**，即elephantiasis。\n\n**為何選(C)：** Stage 2 = 抬高無法改善 + pitting edema + 臨床最常見，敘述完全正確。","peropt":{"A":"Stage 0為subclinical、無明顯腫脹，選項稱有明顯腫脹且抬高全消，錯誤。","B":"Stage 1抬高肢體可(部分)改善，選項稱不可逆且抬高無法改善，錯誤(混淆為stage 2)。","C":"◎ Stage 2：抬高無法改善、有pitting edema、臨床最常見，敘述正確，為正解。","D":"Stage 3已有皮膚角化與纖維化(elephantiasis)且pitting消失，選項稱無角化變化，錯誤。","E":"Elephantiasis與嚴重纖維化屬Stage 3，非Stage 1，錯誤。"},"cite":"ISL Consensus Document 2020；Neligan 5e Lymphedema staging","conflict":""},{"id":"7011","sub":"L5","src":"NG","years":[104],"stem":"Which of the following association among lymphedema surgical procedure and the initial advocator is incorrect?","opts":{"A":"Lymphovenous microanastomosis—O'Brian","B":"Lymphatic tissue graft transfer--Baumeister and Siuda","C":"Resection of subcutaneous fat and wound closure as skin flap --Thompson","D":"Omental flap transfer--Goldsmith","E":"Circumferential resection and STSG--Charles"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：淋巴水腫各術式與其原始倡議者(initial advocator)之配對，問「錯誤」者。\n\n**正確配對(記憶表)：**\n- **Lymphovenous microanastomosis — O'Brien** ✓ (LVA顯微淋巴靜脈吻合)\n- **Lymphatic tissue/vessel graft transfer — Baumeister (& Siuda)** ✓ (自體淋巴管移植)\n- **Omental flap transfer — Goldsmith** ✓ (大網膜瓣)\n- **Circumferential resection + STSG — Charles** ✓ (Charles procedure)\n- **Resection of subcutaneous fat with buried dermal flap — Thompson** ← Thompson procedure真正內涵是將**去表皮之皮瓣(dermal flap)埋入深部肌肉間**以引流(buried dermal flap)，**並非「以skin flap關閉」**。\n\n**為何(C)錯誤：** 選項C將Thompson procedure描述為「resection of subcutaneous fat and wound closure as skin flap」— 此描述不精確/錯誤，Thompson的精髓在**buried dermal flap(埋入真皮瓣)**而非單純以皮瓣關閉傷口。故C為錯誤配對/敘述，即正解。","peropt":{"A":"Lymphovenous microanastomosis由O'Brien倡議，配對正確，非答案。","B":"Lymphatic tissue graft transfer由Baumeister與Siuda倡議，正確，非答案。","C":"◎ Thompson procedure核心為buried dermal flap而非以skin flap關閉，此敘述錯誤，為正解。","D":"Omental flap transfer由Goldsmith倡議，正確，非答案。","E":"Circumferential resection + STSG即Charles procedure，配對正確，非答案。"},"cite":"Neligan 5e Lymphedema歷史術式；Grabb & Smith 9e","conflict":""},{"id":"7012","sub":"L6","src":"NG","years":[104],"stem":"As regards chronic ischemic leg disorder, which of the following statement is incorrect?","opts":{"A":"Upon arterial Doppler signal examination, the appearance of triphasic waveform warrants surgical revascularization","B":"ABI index <0.7 indicated questionable limb circulation","C":"Absolute arterial pressure below 30 mmHg will be considered candidate for revascularization","D":"Normal ABI usually measured around 1 or above","E":"The ABI value may be overestimated in calcified vessel condition"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 考點：慢性下肢缺血(chronic ischemic leg)之非侵入性血流評估 — Doppler波形與ABI判讀，問「錯誤」者。\n\n**逐項核心：**\n- **(A)✗(即正解)** **Triphasic waveform(三相波)是正常、健康動脈**的表現(收縮期前向、舒張早期反向、舒張晚期前向)，**代表血流良好，不需血管重建**。缺血時波形會退化為biphasic→monophasic。故稱triphasic「warrants revascularization」完全錯誤。\n- **(B)✓** ABI < 0.7提示肢體血流可疑不足(0.5-0.8常有跛行；<0.5為重度缺血)。\n- **(C)✓** 絕對動脈壓(absolute arterial pressure) < 30 mmHg屬嚴重缺血/critical limb ischemia，為血管重建候選。\n- **(D)✓** 正常ABI約為1.0或略高。\n- **(E)✓** 血管**鈣化(如糖尿病、洗腎)** 使血管無法壓迫，ABI會被**高估(falsely elevated)**。\n\n**正解A。**","peropt":{"A":"◎ Triphasic波形是正常動脈表現，代表血流良好而非需重建，敘述錯誤，為正解。","B":"ABI<0.7提示肢體血流可疑不足，正確。","C":"絕對動脈壓<30mmHg為重度缺血、屬重建候選，正確。","D":"正常ABI約1.0或以上，正確。","E":"鈣化血管無法壓迫使ABI被高估，正確。"},"cite":"Neligan 5e Lower Extremity；血管外科ABI/Doppler判讀原則","conflict":""},{"id":"7013","sub":"L6","src":"NG","years":[104],"stem":"As regards the pathophysiologic change of peripheral vasculature in diabetic foot, which statement is incorrect?","opts":{"A":"The papaverine vasodilatation test result is normal in diabetic foot","B":"The O2 gradient is larger in between diabetic patient than normal individual","C":"The medium vessel is often afflicted rather than the terminal small arterioles","D":"Viscosity increases","E":"Stiffness of the RBC is heightened"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 考點：糖尿病足(diabetic foot)周邊血管病理生理變化，問「錯誤」者。\n\n**現代觀念(破除迷思)：**\n- **(A)✓** Papaverine血管擴張試驗在糖尿病足**結果正常** — 反映糖尿病的問題主要在功能性內皮/微循環與血液流變，而非血管平滑肌對papaverine無反應；此點常用以說明並非單純「小血管閉塞」。\n- **(B)✗(即正解)** 糖尿病病人因**微血管basement membrane增厚、血氧擴散障礙、RBC硬度增加**，組織端氧氣交換受損，但敘述「O2 gradient在糖尿病人之間較大(larger)」的表述錯誤 — 糖尿病足的問題是**組織層級的氧氣輸送/擴散受損**，並非單純氧氣梯度變大；此選項為錯誤敘述。\n- **(C)✓** 現代觀念破除「small vessel disease迷思」— 糖尿病主要侵犯的是**中等血管(medium vessel，如tibial arteries)** 的動脈硬化，**terminal arterioles相對倖免**(Goldenberg迷思已被推翻)，故仍可行遠端bypass。\n- **(D)✓** 血液**黏稠度(viscosity)上升**。\n- **(E)✓** **紅血球硬度(RBC stiffness)增加**，變形能力下降，影響微循環。\n\n**正解B。**","peropt":{"A":"Papaverine血管擴張試驗在糖尿病足結果正常，正確，非答案。","B":"◎ 稱O2 gradient在糖尿病人之間較大之敘述錯誤，糖尿病足為組織氧輸送/擴散受損，為正解。","C":"糖尿病主要侵犯中等血管而非終末小動脈(推翻small vessel迷思)，正確，非答案。","D":"糖尿病使血液黏稠度增加，正確，非答案。","E":"紅血球硬度增加、變形能力下降，正確，非答案。"},"cite":"Neligan 5e Diabetic Foot；破除small-vessel disease迷思之現代文獻","conflict":""},{"id":"7014","sub":"L1","src":"NG","years":[104],"stem":"The following are features of fat embolism syndrome, which description is incorrect?","opts":{"A":"Mainstay manifestation include respiratory insufficiency, changed mental status, petechial rash","B":"Early immobilization and stabilization of fracture site is helpful to reduce the risk","C":"Typically symptoms occurred at 24-72 hours post injury","D":"The most commonly involved age group is children","E":"There is no level I study evidence to support the use of steroid"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：脂肪栓塞症候群(fat embolism syndrome, FES)之臨床特徵與流行病學，問「錯誤」者。\n\n**逐項核心：**\n- **(A)✓** FES三大主徵(classic triad)：**呼吸功能不全(respiratory insufficiency/hypoxemia)、意識/精神狀態改變(neurologic)、瘀點狀皮疹(petechial rash)**。\n- **(B)✓** **早期骨折固定(early fixation & immobilization)** 可降低FES風險，為預防要點。\n- **(C)✓** 症狀典型出現於**傷後24–72小時**(有潛伏期)。\n- **(D)✗(即正解)** FES最常見於**長骨(long bone)/骨盆骨折的年輕成人(young adults, 約20–30歲)**，因其骨髓脂肪含量高、常見高能量創傷；**並非兒童**。兒童骨髓造血活躍、黃骨髓少，FES反而罕見。\n- **(E)✓** 目前**無Level I證據**支持類固醇(steroid)常規用於FES治療/預防。\n\n**正解D。**","peropt":{"A":"FES主徵含呼吸不全、意識改變、petechial rash，正確，非答案。","B":"早期骨折固定可降低FES風險，正確，非答案。","C":"症狀典型於傷後24-72小時出現，正確，非答案。","D":"◎ FES最常見於長骨骨折之年輕成人而非兒童，敘述錯誤，為正解。","E":"無Level I證據支持類固醇用於FES，正確，非答案。"},"cite":"Neligan 5e / 創傷學 fat embolism syndrome","conflict":""},{"id":"7015","sub":"L1","src":"NG","years":[104],"stem":"According to Gustillo system for lower extremity injury classification, a comminuted unstable fracture plus extensive soft tissue loss with periosteal stripping and exposed bone, is categorized as:","opts":{"A":"Grade II","B":"Grade IIIA","C":"Grade IIIB","D":"Grade IIIC","E":"Grade IV"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 考點：Gustilo-Anderson開放性骨折分類 — 依軟組織缺損、骨膜剝離、血管狀態分級。\n\n**Gustilo分類重點：**\n- **Type I：** 傷口 < 1cm，乾淨，低能量。\n- **Type II：** 傷口 > 1cm，中度軟組織損傷，無廣泛剝離。\n- **Type III：** 高能量、廣泛軟組織損傷，再細分：\n  - **IIIA：** 軟組織仍足以覆蓋骨折，儘管有撕裂。\n  - **IIIB：** **廣泛軟組織缺損 + 骨膜剝離(periosteal stripping) + 骨外露(exposed bone)**，通常需皮瓣覆蓋。\n  - **IIIC：** 合併**需修補的動脈損傷(arterial injury requiring repair)**。\n\n**為何選C(IIIB)：** 題幹「comminuted unstable fracture + extensive soft tissue loss + periosteal stripping + exposed bone」= **典型IIIB定義**，無提及動脈損傷故非IIIC。整外最常介入者即IIIB(需游離/局部皮瓣)。","peropt":{"A":"Grade II為傷口>1cm中度損傷、無廣泛剝離，程度不足。","B":"IIIA軟組織仍足以覆蓋骨折，本題有骨外露與骨膜剝離不符。","C":"◎ 廣泛軟組織缺損+骨膜剝離+骨外露即IIIB，為正解。","D":"IIIC需合併動脈損傷修補，題幹未提及，不符。","E":"Gustilo系統無Grade IV(標準僅I-III含A/B/C)，錯誤。"},"cite":"Gustilo & Anderson分類；Neligan 5e Lower Extremity Trauma","conflict":""},{"id":"7016","sub":"L3","src":"NG","years":[104,107],"stem":"Upon cross section in the middle calf level, the peroneal artery stays in between which two muscles?","opts":{"A":"posterior tibialis and flexor digitorum longus","B":"flexor halluces longus and flexor digitorum longus","C":"soleus and halluces longus","D":"posterior tibialis and flexor halluces longus","E":"soleus and flexor digitorum longus"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 考點：小腿中段橫切面上腓動脈(peroneal artery)之肌肉毗鄰關係。\n\n**Peroneal artery走行：**\n- 腓動脈於小腿**深後腔室(deep posterior compartment)** 內下行，緊貼**腓骨(fibula)內側**。\n- 在小腿中段橫切面，腓動脈位於**Tibialis posterior(前內側)** 與 **Flexor hallucis longus(後外側，緊貼腓骨)** 之間。\n- FHL起於腓骨後面，覆蓋並保護腓動脈；tibialis posterior則位於更深/內側。\n\n**為何選D：** posterior tibialis + flexor hallucis longus 正是夾住peroneal artery的兩條肌肉，臨床上fibula flap(腓骨皮瓣)取血管蒂時即需分離此二肌間隙。","peropt":{"A":"posterior tibialis與flexor digitorum longus之間走行的是posterior tibial artery而非peroneal，錯誤。","B":"FHL與FDL之間並非peroneal artery典型位置，錯誤。","C":"soleus屬淺後腔室，非夾持peroneal artery之深部肌肉，錯誤。","D":"◎ Peroneal artery走行於posterior tibialis與flexor hallucis longus之間，為正解。","E":"soleus與FDL之間非peroneal artery位置，錯誤。"},"cite":"Neligan 5e 小腿橫切面解剖；fibula flap血管蒂解剖","conflict":""},{"id":"7017","sub":"L3","src":"NG","years":[104],"stem":"Which of the following statements are true for compression neuropathy in the lower limb?(複選)","opts":{"A":"tibial nerve compression at soleal sling often manifests as flexor hallux longus weakness","B":"The most common nerve entrapment in the leg is common peroneal nerve compression at fibular neck","C":"The pressure within tarsal tunnel will be elevated with plantar extension and supination","D":"The pathognomonic feature of chronic nerve compression is the presence of a positive Hoffman–Tinel sign.","E":"an electrodiagnostic test is not an essential tool for confirmation."},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"🎯 考點：下肢壓迫性神經病變(compression neuropathy)之解剖位置、臨床表現與診斷(複選)。\n\n**逐項核心：**\n- **(A)✓** **Tibial nerve在soleal sling(比目魚肌腱弓)** 受壓，可影響其分支支配的**flexor hallucis longus**等而出現無力/proximal tibial nerve症狀，正確。\n- **(B)✗** 下肢**最常見的神經壓迫是common peroneal nerve在fibular neck(腓骨頸)** 受壓 — 此敘述其實是正確的臨床事實(common peroneal at fibular neck確為下肢最常見entrapment)。**然依本題權威答案未納入B**，判定命題者將此選項視為非最佳/有爭議而排除。\n- **(C)✗** tarsal tunnel內壓力上升與**足部eversion + dorsiflexion(外翻+背屈)** 有關，而非選項所述plantar extension + supination，故錯。\n- **(D)✓** 慢性神經壓迫的特徵性徵象之一為**Tinel/Hoffmann-Tinel sign陽性(叩擊誘發放射感)**，正確。\n- **(E)✓** 電生理檢查(EMG/NCV)雖有幫助但**並非確診的必要(essential)工具** — 臨床診斷仍以病史與理學檢查為主，正確。\n\n**正解ADE。**\n\n⚠答案疑義：選項B「common peroneal nerve at fibular neck為下肢最常見神經壓迫」在多數教科書其實為正確敘述；本題權威答案未選B，屬命題取捨(可能認為題幹要求之敘述有措辭問題)，仍以ans=ADE為準。","peropt":{"A":"◎ Tibial nerve於soleal sling受壓可致FHL無力等症狀，正確。","B":"common peroneal at fibular neck為最常見entrapment之敘述於教科書多屬正確，但依權威答案未納入本題。","C":"Tarsal tunnel壓力上升與外翻+背屈相關，選項稱plantar extension+supination故錯。","D":"◎ 陽性Tinel/Hoffmann-Tinel sign為慢性神經壓迫特徵徵象，正確。","E":"◎ 電生理檢查非確診必要工具，臨床診斷為主，正確。"},"cite":"Neligan 5e 下肢壓迫性神經病變；tarsal tunnel/peroneal entrapment","conflict":""},{"id":"7018","sub":"L6","src":"NG","years":[105],"stem":"Most (80–90%) of leg wound result from which following etipathology?","opts":{"A":"arterial insufficiency","B":"lymphatic insufficiency","C":"venous insufficiency","D":"arteriovenous malformations","E":"neuropathic diseases"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：下肢慢性傷口/潰瘍的病因學分布（venous 為最大宗）\n- 下肢潰瘍（leg ulcer）約 70–90% 源自 **venous insufficiency（靜脈功能不全）**，機轉為 venous hypertension → venous stasis → 皮膚脂肪硬化症（lipodermatosclerosis）→ **venous stasis ulcer**，好發於 gaiter area（內踝上方）。\n- **Arterial（動脈性）** 潰瘍約占 5–10%，位於肢端/受壓點、punched-out、painful、ABI 下降。\n- **Neuropathic（神經病變性，如 diabetic foot）** 為第三大宗，好發於受壓 plantar 面。\n- 臨床鑑別診斷須先評估 arterial supply（ABI）再處理 venous 問題，避免對缺血肢加壓。","peropt":{"A":"Arterial insufficiency 僅占約 5–10%，非最大宗，錯。","B":"Lymphatic insufficiency 主要造成 lymphedema 而非潰瘍，占比極低，錯。","C":"◎ Venous insufficiency 造成 venous stasis ulcer，約占下肢潰瘍 70–90%，為最大宗，正解。","D":"Arteriovenous malformations 為罕見血管異常，非常見潰瘍成因，錯。","E":"Neuropathic diseases（如糖尿病）為第三大宗，仍不及 venous，錯。"},"cite":"Neligan Plastic Surgery 5th ed, Vol 4, Lower Extremity; Grabb & Smith 9th ed, Ch. Lower Extremity Reconstruction","conflict":""},{"id":"7019","sub":"L3","src":"NG","years":[105],"stem":"How many compartments are there in thigh, leg and foot in low extremity?","opts":{"A":"1 and 2 and 3","B":"2 and 2 and 4","C":"3 and 4 and 5","D":"5 and 5 and 5","E":"6 and 4 and 6"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：下肢 compartment（筋膜腔室）解剖數目\n- **Thigh（大腿）= 3 個腔室**：anterior、medial（adductor）、posterior。\n- **Leg（小腿）= 4 個腔室**：anterior、lateral、superficial posterior、deep posterior。\n- **Foot（足部）= 傳統教科書列為 5 個**（medial、lateral、central、interosseous、calcaneal）；須注意 Manoli 現代解剖描述可細分為 9–10 個腔室，考試以傳統 3/4/5 為錨定。\n- 臨床意義：compartment syndrome 好發於 leg 的 anterior 與 deep posterior compartment，須及時 fasciotomy。","peropt":{"A":"1、2、3 與各腔室實際數目不符，錯。","B":"2、2、4 低估 thigh 與 leg 腔室數，錯。","C":"◎ Thigh 3、Leg 4、Foot 5，符合傳統解剖分類，正解。","D":"5、5、5 三者一致並不正確，錯。","E":"6、4、6 誇大 thigh 與 foot 數目，錯。"},"cite":"Grabb & Smith 9th ed, Lower Extremity anatomy; Neligan 5th ed Vol 4","conflict":""},{"id":"7020","sub":"L1","src":"NG","years":[105],"stem":"How many classifications of Gustilo and Byrd in lower extremity injury?","opts":{"A":"3 and 3","B":"4 and 3","C":"4 and 4","D":"6 and 4","E":"7 and 5"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Gustilo 與 Byrd 下肢損傷分類之型別數目\n- **Gustilo-Anderson（開放性骨折）**：主型為 I、II、III，其中 Type III 再細分 **IIIA、IIIB、IIIC**；官方錨定以逐一計數亞型之算法得「6」。\n- **Byrd（下肢脛骨骨折軟組織損傷分類）**：**Type I–IV，共 4 型**（依能量與軟組織/骨損傷程度）。\n- 故權威答案為「6 and 4」（Gustilo 6、Byrd 4）。\n- 臨床意義：分類用於決定清創範圍、覆蓋時機與皮瓣需求；IIIC 合併需修補之動脈損傷、預後最差。\n⚠答案疑義：Gustilo 主流描述為 3 大型，計亞型後多列為 5 類（I、II、IIIA、IIIB、IIIC），「6」非通用共識；Byrd = 4 明確。惟依權威答案錨定 D。","peropt":{"A":"3 and 3：Gustilo 與 Byrd 型數皆不符官方錨定，錯。","B":"4 and 3：Gustilo/Byrd 數目皆不符，錯。","C":"4 and 4：Gustilo 側不符官方錨定 6，錯。","D":"◎ 6 and 4：Gustilo 計亞型為 6、Byrd 為 4，符合權威答案，正解。","E":"7 and 5：兩者數目皆過大，錯。"},"cite":"Gustilo-Anderson & Byrd classifications; Grabb & Smith 9th ed; Neligan 5th ed Vol 4","conflict":""},{"id":"7021","sub":"L1","src":"NG","years":[105],"stem":"Which of the following is the recommended time of soft tissue coverage for acute open fractures of lower extremities?","opts":{"A":"Within 1 week","B":"At 1-6 weeks","C":"Between 4-6 weeks","D":"After 6 weeks","E":"None of the above"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：急性開放性骨折軟組織覆蓋（soft tissue coverage）時機\n- **理想時機為 1 週內**，越早越佳；Godina 經典原則主張 **72 小時內（early flap coverage）** 可顯著降低感染率、皮瓣失敗率與骨不癒合。\n- 早期覆蓋（early coverage）可減少 wound colonization、細菌生物膜形成與 fibrosis。\n- 現代 fix-and-flap（orthoplastic）觀念：debridement + 骨穩定 + 軟組織覆蓋整合於 72 小時–1 週內完成。\n- 延遲至 6 週後覆蓋 → 感染、osteomyelitis、皮瓣併發症顯著上升。","peropt":{"A":"◎ Within 1 week，符合早期覆蓋原則（Godina 72 小時最佳），正解。","B":"1–6 週已偏晚，感染風險上升，非建議時機，錯。","C":"4–6 週屬亞急性、感染風險高，錯。","D":"6 週後為延遲覆蓋，預後最差，錯。","E":"已有明確建議（1 週內），非 none of the above，錯。"},"cite":"Godina principle; Neligan 5th ed Vol 4 Lower Extremity; Grabb & Smith 9th ed","conflict":""},{"id":"7022","sub":"L2","src":"NG","years":[105],"stem":"Which pedicled regional flap is suitable for reconstruction of thigh defects?","opts":{"A":"deep inferior epigastric perforator flap","B":"vertical rectus abdominus myocutaneous flap","C":"superior gluteal artery perforator flap","D":"inferior gluteal artery perforator flap","E":"all of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：大腿（thigh）缺損可用之 pedicled regional flap\n- **DIEP flap**：以 deep inferior epigastric perforator 為蒂，可 pedicled 轉位覆蓋近端大腿/腹股溝。\n- **VRAM（vertical rectus abdominis myocutaneous）flap**：以 inferior epigastric 為蒂，可覆蓋腹股溝與近端大腿，血流可靠、體積大。\n- **SGAP / IGAP（superior/inferior gluteal artery perforator）flap**：可覆蓋近端後側大腿/坐骨/大轉子區。\n- 上述皆為 pedicled 局部/區域皮瓣選項，故 all of above。","peropt":{"A":"DIEP flap 可 pedicled 覆蓋近端大腿，屬正確選項之一，單獨非最佳答案。","B":"VRAM flap 為可靠的大體積 pedicled 選項，屬正確之一，單獨非最佳答案。","C":"SGAP flap 可覆蓋近端後側大腿，屬正確之一，單獨非最佳答案。","D":"IGAP flap 可覆蓋坐骨/近端大腿，屬正確之一，單獨非最佳答案。","E":"◎ 上述皆為適用於大腿缺損之 pedicled regional flap，正解。"},"cite":"Neligan 5th ed Vol 4 Lower Extremity Reconstruction; Grabb & Smith 9th ed","conflict":""},{"id":"7023","sub":"L5","src":"NG","years":[105],"stem":"What below is not a goal of treatment for lymphedema of extremities?","opts":{"A":"Excisional debulking procedure","B":"Amputation","C":"Liposuction","D":"Lymphaticovenular bypass","E":"Lymph node transfer"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：肢體淋巴水腫（lymphedema）治療目標與術式（非治療目標者）\n- 治療目標為 **減積、改善淋巴引流、預防蜂窩性組織炎與纖維化**，非截肢。\n- **Ablative / excisional（減積）**：debulking（Charles procedure）、liposuction（抽脂減積）。\n- **Physiological（生理性重建，現今主流）**：lymphaticovenular anastomosis/bypass（LVA）、vascularized lymph node transfer（VLNT）。\n- **Amputation（截肢）** 非淋巴水腫的治療目標，僅極端不可挽救合併症時的最後手段。","peropt":{"A":"Excisional debulking 為減積術式，屬治療手段，非答案。","B":"◎ Amputation 並非淋巴水腫的治療目標，正解（為非）。","C":"Liposuction（抽脂）為公認減積治療，非答案。","D":"Lymphaticovenular bypass（LVA）為生理性重建主流術式，非答案。","E":"Lymph node transfer（VLNT）為生理性重建術式，非答案。"},"cite":"Neligan 5th ed Vol 4 Lymphedema; Grabb & Smith 9th ed Lymphedema","conflict":""},{"id":"7024","sub":"L3","src":"NG","years":[105],"stem":"Which muscles are innervated by tibial nerve in lower extremities? (複選)","opts":{"A":"Tibialis anterior muscle","B":"Gastrocnemius muscle","C":"Popliteus muscle","D":"Flexor hallucis longus","E":"Tibialis posterior muscle"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點：脛神經（tibial nerve）在下肢支配之肌肉（複選）\n- Tibial nerve 支配小腿 **後側腔室（posterior compartment）** 淺層與深層肌群：\n  - 淺層：**Gastrocnemius、Soleus、Plantaris**\n  - 深層：**Popliteus、Flexor hallucis longus、Flexor digitorum longus、Tibialis posterior**\n- **Tibialis anterior** 屬前側腔室，由 **deep peroneal nerve** 支配，非 tibial nerve。\n- 記憶：tibial nerve = 蹠屈與趾屈肌群（plantarflexors/toe flexors）。","peropt":{"A":"Tibialis anterior 由 deep peroneal nerve 支配，非 tibial nerve，錯（唯一非答案）。","B":"◎ Gastrocnemius 屬後側淺層，由 tibial nerve 支配，正解之一。","C":"◎ Popliteus 由 tibial nerve 支配，正解之一。","D":"◎ Flexor hallucis longus 屬後側深層，由 tibial nerve 支配，正解之一。","E":"◎ Tibialis posterior 屬後側深層，由 tibial nerve 支配，正解之一。"},"cite":"Grabb & Smith 9th ed Lower Extremity anatomy; Neligan 5th ed Vol 4","conflict":""},{"id":"7025","sub":"L2","src":"NG","years":[105],"stem":"Which reconstruction choices are acceptable in plantar hindfoot reconstruction? (複選)","opts":{"A":"Medial plantar artery flap","B":"Neurovascular island flaps","C":"Heel pad flaps","D":"Sural artery flap","E":"V-Y plantar flap"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯考點：足跟後段（plantar hindfoot / heel）重建之可接受選項（複選）\n- Hindfoot（承重 heel pad）重建重視 **耐磨、承重、感覺**，可接受：\n  - **Medial plantar artery（instep）flap**：帶感覺、glabrous 皮膚，為 heel 重建首選局部皮瓣。\n  - **Heel pad flap**：局部推進/旋轉保留原生 heel pad 結構。\n  - **Sural artery flap（reverse sural）**：可覆蓋 heel/踝後，帶蒂筋膜皮瓣。\n- **Neurovascular island flap** 主要用於 forefoot/足趾承重點感覺重建，非 hindfoot 標準選項。\n- **V-Y plantar flap** 主要用於 forefoot 缺損，非 hindfoot。","peropt":{"A":"◎ Medial plantar artery flap 為 heel/hindfoot 重建首選局部皮瓣，正解之一。","B":"Neurovascular island flap 主用於 forefoot 感覺重建，非 hindfoot 標準選項，錯。","C":"◎ Heel pad flap 保留原生承重結構，適用 hindfoot，正解之一。","D":"◎ Sural artery flap 可覆蓋 heel/後踝，正解之一。","E":"V-Y plantar flap 主用於 forefoot 缺損，非 hindfoot，錯。"},"cite":"Neligan 5th ed Vol 4 Foot & Ankle Reconstruction; Grabb & Smith 9th ed","conflict":""},{"id":"7026","sub":"L3","src":"NG","years":[106],"stem":"Which muscle is innervated by deep peroneal nerve in the lower extremities?","opts":{"A":"Tibialis anterior","B":"Extensor hallucis longus","C":"Extensor digitorum longus","D":"Peroneus tertius","E":"All of above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：深腓神經（deep peroneal nerve）支配之肌肉\n- Deep peroneal nerve 支配小腿 **前側腔室（anterior compartment）** 全部肌肉：\n  - **Tibialis anterior**\n  - **Extensor hallucis longus（EHL）**\n  - **Extensor digitorum longus（EDL）**\n  - **Peroneus tertius**\n  - 足背另支配 extensor digitorum brevis。\n- 功能：足背屈（dorsiflexion）與趾伸展；損傷 → foot drop、first web space 感覺喪失。\n- 對照：superficial peroneal nerve 支配 lateral compartment（peroneus longus/brevis）。","peropt":{"A":"Tibialis anterior 由 deep peroneal nerve 支配，屬正確之一，單獨非最佳。","B":"Extensor hallucis longus 由 deep peroneal nerve 支配，屬正確之一，單獨非最佳。","C":"Extensor digitorum longus 由 deep peroneal nerve 支配，屬正確之一，單獨非最佳。","D":"Peroneus tertius 屬前側腔室，由 deep peroneal nerve 支配，屬正確之一，單獨非最佳。","E":"◎ 上述前側腔室肌群皆由 deep peroneal nerve 支配，正解。"},"cite":"Grabb & Smith 9th ed Lower Extremity anatomy; Neligan 5th ed Vol 4","conflict":""},{"id":"7027","sub":"L4","src":"NG","years":[106],"stem":"Which is the most common cause of lymphedema globally?","opts":{"A":"Infection","B":"Trauma","C":"Filariasis","D":"Surgical intervention combine with irradiation","E":"Malignancies influencing lymphatic flow"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：全球最常見淋巴水腫成因\n- **全球（worldwide）最常見為 filariasis（絲蟲感染，Wuchereria bancrofti）**，好發於熱帶/亞熱帶開發中國家，為全球致殘性淋巴水腫（elephantiasis）首因。\n- **已開發國家（如台灣、歐美）最常見為 secondary lymphedema**：乳癌等惡性腫瘤 **手術 + 放射治療（surgery + irradiation）** 後淋巴系統受損。\n- 考試須區分「全球 vs 已開發國家」兩種問法。","peropt":{"A":"Infection 為概括說法，須指明 filariasis 才精確，非最佳答案，錯。","B":"Trauma 非全球最常見成因，錯。","C":"◎ Filariasis（絲蟲感染）為全球最常見淋巴水腫成因，正解。","D":"Surgery + irradiation 為已開發國家最常見，非全球，錯。","E":"Malignancies 影響淋巴流為次要成因，非全球首位，錯。"},"cite":"Neligan 5th ed Vol 4 Lymphedema; Grabb & Smith 9th ed","conflict":""},{"id":"7028","sub":"L1","src":"NG","years":[106,107],"stem":"According to the Gustilo system for lower extremity injury classification, a comminuted unstable fracture with extensive soft tissue damage and arterial injury requiring repair, is categorized as:","opts":{"A":"Grade II","B":"Grade IIIA","C":"Grade IIIB","D":"Grade IIIC","E":"Grade IV"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：Gustilo-Anderson 開放性骨折分級（IIIC 定義）\n- **Grade I**：傷口 <1 cm、乾淨、低能量。\n- **Grade II**：傷口 1–10 cm、中度軟組織損傷、無廣泛脫套。\n- **Grade IIIA**：高能量、廣泛軟組織損傷但仍有 **足夠軟組織覆蓋**。\n- **Grade IIIB**：廣泛軟組織缺損合併 **骨膜剝離、骨外露**，需皮瓣覆蓋。\n- **Grade IIIC**：合併 **需修補之動脈損傷（arterial injury requiring repair）**，無論軟組織狀態。\n- 題幹「粉碎不穩定骨折 + 廣泛軟組織損傷 + 動脈損傷需修補」→ **IIIC**。","peropt":{"A":"Grade II 為中度軟組織損傷、無動脈損傷，不符，錯。","B":"Grade IIIA 有足夠軟組織覆蓋、無動脈損傷，不符，錯。","C":"Grade IIIB 為骨外露需皮瓣但無動脈損傷，不符，錯。","D":"◎ Grade IIIC 定義含需修補之動脈損傷，正解。","E":"Grade IV 非 Gustilo 標準分級（Gustilo 止於 IIIC），錯。"},"cite":"Gustilo-Anderson classification; Grabb & Smith 9th ed; Neligan 5th ed Vol 4","conflict":""},{"id":"7029","sub":"L2","src":"NG","years":[106],"stem":"Which reconstruction choices are acceptable in plantar forefoot reconstruction? (複選)","opts":{"A":"Toe fillet flap","B":"Neurovascular island flap","C":"V-Y flap","D":"Forefoot amputation","E":"Intrinsic muscle flap"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯考點：前足底（plantar forefoot）重建可接受之選項（複選）\n- Forefoot（足趾/蹠骨頭承重區）重建可用：\n  - **Toe fillet flap**：以截除之趾為皮瓣覆蓋鄰近缺損（spare-parts）。\n  - **Neurovascular island flap**：提供承重點感覺重建，適用 forefoot。\n  - **V-Y advancement flap**：局部推進覆蓋小型 forefoot 缺損。\n  - **Forefoot amputation**：無法重建時的功能性選項。\n- **Intrinsic muscle flap** 體積小、arc 有限，主要用於 mid/hindfoot 小缺損填補，非 forefoot 標準選項。","peropt":{"A":"◎ Toe fillet flap 為 forefoot 重建 spare-parts 選項，正解之一。","B":"◎ Neurovascular island flap 提供承重感覺重建，適用 forefoot，正解之一。","C":"◎ V-Y flap 可局部推進覆蓋 forefoot 小缺損，正解之一。","D":"◎ Forefoot amputation 為不可重建時的功能性選項，正解之一。","E":"Intrinsic muscle flap 主用於 mid/hindfoot 小缺損，非 forefoot 標準選項，錯。"},"cite":"Neligan 5th ed Vol 4 Foot & Ankle Reconstruction; Grabb & Smith 9th ed","conflict":""},{"id":"7030","sub":"L5","src":"NG","years":[107],"stem":"以下關於淋巴水腫的敘述何者為非?","opts":{"A":"primary lymphedema 又分成type I 和 type II, 其中 type I 即是 Milroy disease","B":"全球最常見的淋巴水腫 是由於filariasis感染","C":"lymphedema手術方式分為ablative operation及 physiological operation, 現今手術以physiological operation為主流","D":"Physiological operation 又有 lymph node transfer, lymphovenous bypass lymphovenous shunt, lymphaticolymphactic bypass等方式","E":"淋巴水腫的非手術治療, 利尿劑是首選的藥物"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：淋巴水腫綜合觀念（找出錯誤敘述）\n- **Primary lymphedema** 依發病年齡分：congenital（type I，含 **Milroy disease**）、praecox、tarda；A 正確。\n- 全球最常見為 **filariasis 感染**；B 正確。\n- 手術分 ablative 與 physiological，**現今以 physiological（生理性）為主流**；C 正確。\n- Physiological operation 含 VLNT、lymphovenous bypass/shunt、lymphaticolymphatic bypass；D 正確。\n- **非手術治療首選為 CDT（complete decongestive therapy，含 MLD 徒手淋巴引流 + 加壓）；利尿劑（diuretics）非首選、長期使用甚至有害**；E 錯誤 → 為答案。","peropt":{"A":"Primary lymphedema 分 type I/II、type I 即 Milroy disease，敘述正確，非答案。","B":"全球最常見為 filariasis 感染，正確，非答案。","C":"手術分 ablative/physiological 且現今以 physiological 為主流，正確，非答案。","D":"Physiological operation 含 VLNT、LVB、lymphaticolymphatic bypass，正確，非答案。","E":"◎ 非手術治療首選為 CDT 而非利尿劑，此敘述錯誤，正解（為非）。"},"cite":"Neligan 5th ed Vol 4 Lymphedema; Grabb & Smith 9th ed","conflict":""},{"id":"7031","sub":"L2","src":"NG","years":[107],"stem":"下列何者為重建plantar hindfoot的選擇?:","opts":{"A":"intrinsic muscle flap","B":"Medial plantar artery flap","C":"Heel pad flap","D":"Sural artery flap","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：足跟後段（plantar hindfoot）重建選項（皆可）\n- Hindfoot / heel 承重區重建可接受：\n  - **Intrinsic muscle flap**（如 abductor hallucis/digiti minimi）：填補小型 heel 缺損。\n  - **Medial plantar artery（instep）flap**：帶感覺 glabrous 皮膚，heel 重建首選。\n  - **Heel pad flap**：保留原生承重結構。\n  - **Sural artery flap（reverse sural）**：覆蓋 heel/後踝。\n- 上述皆為 hindfoot 可用選項 → 以上皆是。","peropt":{"A":"Intrinsic muscle flap 可填補小型 heel 缺損，屬正確之一，單獨非最佳。","B":"Medial plantar artery flap 為 heel 重建首選局部皮瓣，屬正確之一，單獨非最佳。","C":"Heel pad flap 保留承重結構，屬正確之一，單獨非最佳。","D":"Sural artery flap 可覆蓋 heel/後踝，屬正確之一，單獨非最佳。","E":"◎ 上述皆為 plantar hindfoot 可接受重建選項，正解。"},"cite":"Neligan 5th ed Vol 4 Foot & Ankle Reconstruction; Grabb & Smith 9th ed","conflict":""},{"id":"7032","sub":"L4","src":"NG","years":[108],"stem":"For about International Society of Lymphology staging system, which is wong?","opts":{"A":"Stage 0: Latent lymphedema","B":"Stage II: Spontaneously irreversible lymphedema","C":"Stage III: Lymphostatic elephantiasis","D":"In stage I, swelling can be contained with the use of compression garments.","E":"In stage II, the tissue is heavily fibrosed and unresponsive to treatment. Skin has become significantly thickened."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：國際淋巴學會（ISL）淋巴水腫分期（找錯誤）\n- **Stage 0（latent/subclinical）**：淋巴輸送已受損但無明顯腫脹；A 正確。\n- **Stage I**：早期，抬高可消腫，可 pitting，加壓衣可控制；D 正確。\n- **Stage II**：抬高無法完全消退（spontaneously irreversible）、pitting 逐漸消失、纖維化出現；B 正確。\n- **Stage III**：lymphostatic elephantiasis，皮膚顯著增厚、疣狀變化、重度纖維化、對治療反應差；C 正確。\n- E 將「重度纖維化、皮膚顯著增厚、對治療無反應」錯置於 **Stage II**（實為 **Stage III** 描述），故 E 錯誤 → 為答案。","peropt":{"A":"Stage 0 為 latent lymphedema，敘述正確，非答案。","B":"Stage II 為 spontaneously irreversible lymphedema，敘述正確，非答案。","C":"Stage III 為 lymphostatic elephantiasis，敘述正確，非答案。","D":"Stage I 可用加壓衣控制腫脹，敘述正確，非答案。","E":"◎ 重度纖維化、皮膚顯著增厚且治療無反應為 Stage III 而非 Stage II，敘述錯誤，正解（為非）。"},"cite":"International Society of Lymphology (ISL) staging; Neligan 5th ed Vol 4 Lymphedema","conflict":""},{"id":"7033","sub":"L1","src":"NG","years":[108],"stem":"Lower extremity trauma根據Lower Extremity Assessment Project (LEAP)的結論，risk factors to predict amputation何者為非？","opts":{"A":"Sciatic or tibial nerve injury","B":"Gustilo grade IIIC","C":"Prolonged ischemia (> 4-6 h)","D":"Segmental bone loss","E":"以上皆是"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：LEAP（Lower Extremity Assessment Project）對截肢預測因子之結論\n- LEAP 為大型前瞻性研究，結論顛覆傳統：**現有下肢損傷嚴重度評分（如 MESS）與單一臨床因子皆無法可靠預測是否需截肢**，故不建議僅憑評分決定截肢/保肢。\n- 傳統被列為 risk factor 者（sciatic/tibial nerve injury、Gustilo IIIC、prolonged ischemia >4–6h、segmental bone loss）在 LEAP 中 **預測力皆不佳**。\n- 題幹問「何者為非（非可靠預測因子）」→ **以上皆是（E）**，即 A–D 皆非 LEAP 驗證之可靠預測因子。\n- 現代觀念：保肢決策應個別化、多因子與病人整體狀況考量，而非機械化評分。","peropt":{"A":"Sciatic/tibial nerve injury 在 LEAP 中非可靠截肢預測因子，屬「為非」範疇之一。","B":"Gustilo grade IIIC 在 LEAP 中未被證實為可靠預測因子，屬「為非」之一。","C":"Prolonged ischemia（>4–6h）在 LEAP 中預測力不佳，屬「為非」之一。","D":"Segmental bone loss 在 LEAP 中非可靠預測因子，屬「為非」之一。","E":"◎ 上述皆非 LEAP 驗證之可靠截肢預測因子，正解（以上皆是為非）。"},"cite":"Lower Extremity Assessment Project (LEAP), Bosse et al.; Neligan 5th ed Vol 4; Grabb & Smith 9th ed","conflict":""},{"id":"7034","sub":"L2","src":"NG","years":[108],"stem":"關於lower extremity reconstruction 何者為非？","opts":{"A":"The primary goal of surgical reconstruction of the lower extremity wound is to restore or maintain function.","B":"According to the algorithm of soft-tissue reconstruction of the lower extremity, wound debridement and establishment of bone stability should be performed before soft tissue reconstruction in adequate vascular supply","C":"Acute soft tissue coverage by day 5-7 is generally accepted as having a good prognosis in term of decreased risk of infection","D":"Although less rotation reduces the chance for kinking, the skin island of propeller flap may be safely rotated up to 180 degree.","E":"The pedicle of gracilis muscle is approximately 5 cm below the pubic symphysis"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：下肢重建原則綜合（找錯誤敘述）\n- A：下肢重建首要目標為 **恢復或維持功能（function）**；正確。\n- B：依 reconstruction algorithm，血流充足下應先 **清創 + 骨穩定**，再行軟組織重建；正確。\n- C：急性軟組織覆蓋於 **day 5–7 內** 一般被接受為降低感染風險、預後良好；正確（Godina 72h 最佳，5–7 天仍可接受）。\n- D：propeller flap 旋轉越少越不易 kinking，但皮島可安全旋轉達 **180 度**；正確。\n- E：**Gracilis 主要血管蒂（medial circumflex femoral 分支）進入肌肉處約在恥骨聯合下 8–10 cm（非 5 cm）**；故 E 錯誤 → 為答案。","peropt":{"A":"下肢重建首要目標為恢復/維持功能，敘述正確，非答案。","B":"血流充足下應先清創與骨穩定再軟組織重建，符合 algorithm，正確，非答案。","C":"急性軟組織覆蓋於 day 5–7 內預後良好、感染風險降低，正確，非答案。","D":"propeller flap 皮島可安全旋轉達 180 度，正確，非答案。","E":"◎ gracilis 血管蒂約在恥骨聯合下 8–10 cm 而非 5 cm，敘述錯誤，正解（為非）。"},"cite":"Neligan 5th ed Vol 4 Lower Extremity Reconstruction; Grabb & Smith 9th ed","conflict":""},{"id":"7035","sub":"L3","src":"NG","years":[108],"stem":"有關foot的Angiosomes 下列何者是錯的？","opts":{"A":"由anterior tibial artery, posterior tibial artery和peroneal artery支配。","B":"peroneal artery在ankle的位置分成anterior perforating branch和posterior perforating branch。","C":"posterior tibial artery則分成3個branches分別為calcaneal, medial plantar和lateral plantar branch。","D":"通常heel發生gangrene代表peroneal和posterior tibial artery皆有受傷。","E":"anterior tibial artery則分成dorsalis pedis和lateral malleolar artery。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：足部血管體（angiosome）概念（Attinger/Taylor，找錯誤）\n- 足踝由 **三條源動脈（source arteries）** 供應：anterior tibial artery、posterior tibial artery、peroneal artery；A 正確。\n- **Peroneal artery** 在踝部分為 **anterior perforating branch 與 calcaneal（lateral calcaneal）branch**，供應外踝與後跟外側；B 敘述為「anterior perforating + posterior perforating branch」**錯誤** → 為答案。\n- **Posterior tibial artery** 分為 3 支：calcaneal、medial plantar、lateral plantar branch；C 正確。\n- **Heel** 由 peroneal 與 posterior tibial 共同供應，故 heel gangrene 常代表兩者皆受損；D 正確。\n- **Anterior tibial artery** 延續為 dorsalis pedis，並分出 lateral malleolar artery；E 正確。","peropt":{"A":"足部由 anterior tibial、posterior tibial、peroneal artery 三源動脈供應，正確，非答案。","B":"◎ Peroneal artery 在踝部分為 anterior perforating branch 與 calcaneal branch，而非「posterior perforating branch」，敘述錯誤，正解（為非）。","C":"Posterior tibial artery 分為 calcaneal、medial plantar、lateral plantar 三支，正確，非答案。","D":"Heel gangrene 常代表 peroneal 與 posterior tibial artery 皆受損，正確，非答案。","E":"Anterior tibial artery 分為 dorsalis pedis 與 lateral malleolar artery，正確，非答案。"},"cite":"Attinger/Taylor angiosome concept of foot & ankle; Neligan 5th ed Vol 4; Grabb & Smith 9th ed","conflict":""},{"id":"7036","sub":"L3","src":"NG","years":[108],"stem":"關於 painful neuroma in the lower extremity何者正確？ (複選)","opts":{"A":"Selection of the patient for surgical treatment of the painful neuroma should begin in the first 3 month of pain","B":"For chronic nerve compression, a positive Tinel's sign is one of criteria for surgical decompression","C":"The most common nerve entrapment is the tibial nerve and its branches at the tarsal tunnel region","D":"Calcaneal nerve entrapment may be common but often goes misdiagnosed as plantar fasciitis.","E":"Neurolysis of the deep peroneal nerve requires opening the anterior tarsal tunnel."},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"🎯下肢痛性神經瘤(painful neuroma)與慢性神經壓迫(chronic nerve compression)的手術時機與部位\n- **手術病患篩選時機**：painful neuroma應在完整保守治療(desensitization、藥物、局部注射)失敗後才考慮手術，通常需觀察數月至半年以上，並非在疼痛出現的前3個月即啟動手術評估。\n- **Tinel's sign的角色**：慢性神經壓迫的診斷仰賴陽性Tinel's sign（沿神經走向由遠端往近端叩擊誘發放射性感覺異常），為決定減壓(decompression)手術的重要判準之一。\n- **下肢最常見卡壓部位**：tibial nerve及其分支(medial/lateral plantar nerve、calcaneal branch)於tarsal tunnel(踝管)區，是下肢最常見的神經卡壓。\n- **Calcaneal nerve卡壓**：常被誤診為plantar fasciitis(足底筋膜炎)，是頑固性足跟痛的重要鑑別診斷。\n- **Deep peroneal nerve減壓解剖**：其主要壓迫點在extensor hallucis brevis (EHB)肌腱下方（背側），減壓針對此處，並非等同於「打開anterior tarsal tunnel」。","peropt":{"A":"錯—痛性神經瘤手術須在保守治療失敗後才篩選病患，非疼痛前3個月即開始手術評估。","B":"◎對—慢性神經壓迫以陽性Tinel's sign作為減壓手術判準之一。","C":"◎對—下肢最常見卡壓為tibial nerve及分支於tarsal tunnel區。","D":"◎對—calcaneal nerve卡壓常被誤診為plantar fasciitis。","E":"錯—deep peroneal nerve壓迫點在EHB肌腱下方，減壓不等於須打開anterior tarsal tunnel。"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e — Lower extremity: chronic nerve compression & painful neuroma (Dellon)","conflict":""},{"id":"7037","sub":"L6","src":"NG","years":[109,111],"stem":"關於Venous leg ulcer (VLU) 的描述，下列何者不正確 ?","opts":{"A":"VLU在所有民眾約佔1%盛行率。","B":"潰瘍是原於incompetence of the venous valves，造成下肢血液stasis易有deposition of blood and fibrinogen/fibrin，影響氧氣的運輸。","C":"治療原則須保持Compression，甚至終身使用。","D":"決定針對valvular incompeten手術治療，常可以在DVT或血管阻塞病人身上看到療效。","E":"約50% 病人在10年內可能潰瘍復發。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯靜脈性下肢潰瘍(Venous leg ulcer, VLU)的病生理與治療原則\n- **盛行率**：VLU於一般民眾約佔1%盛行率，為下肢慢性潰瘍最常見成因。\n- **病生理**：源於venous valve incompetence(靜脈瓣膜閉鎖不全)→靜脈高壓與血液stasis→fibrinogen/fibrin與血球滲出沉積(fibrin cuff theory)，妨礙氧氣與養分擴散，導致組織缺氧與潰瘍。\n- **治療核心**：Compression therapy(壓迫治療)為基石，常需長期甚至終身使用以防復發。\n- **瓣膜手術的限制**：針對valvular incompetence的手術對『原發性』瓣膜逆流療效佳；但在DVT後(post-thrombotic)或深部靜脈阻塞的病人，因阻塞性(obstructive)病因與瓣膜破壞，手術療效不佳→此為本題錯誤敘述。\n- **復發率**：約50%病人在10年內可能潰瘍復發，凸顯長期壓迫維持治療的必要。","peropt":{"A":"對—VLU於一般民眾約1%盛行率。","B":"對—瓣膜閉鎖不全致stasis與fibrin/fibrinogen沉積影響氧氣運輸。","C":"對—壓迫治療為原則且常需終身使用。","D":"◎（本題答案，敘述不正確）—瓣膜手術對DVT/阻塞性病人療效差，非常見到療效。","E":"對—約50%病人10年內可能復發。"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e — Venous leg ulcer","conflict":""},{"id":"7039","sub":"L5","src":"NG","years":[109],"stem":"Which of the following description about lymphedema is correct?","opts":{"A":"Currently, the most definitive tool for evaluation of lymphedema is lymphoscintigraphy, in which a radioactive dye is injected into the affected limb to visualize the lymphatics and quantify the lymphatic flow by calculating a lymphatic transport index. The index ranges from 0 (optimal flow) to 35(no flow)","B":"Options for surgical treatment of lymphedema can be divided into three categories: preventive, excisional and physiologic treatment","C":"Liposuction, in which a fenestrated metallic cannula connected to vacuum suction is used to aspirate subcutaneous fat, was originally developed for body contouring but since then has not been used for the treatment of lymphedema","D":"In general, treatment of lymphedema with circumferential liposuction is considered safe with quick recovery within 72 hours","E":"Lymphovenous bypass(LVB) alone may be more effective in addressing the upper extremity versus lower extremity lymphedema"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯淋巴水腫的評估工具與外科治療分類\n- **Lymphoscintigraphy(淋巴閃爍造影)**：為評估淋巴水腫的重要工具，注入放射性示蹤劑觀察淋巴流並計算transport index；惟其分級數值與方向須精確（題敘之0(optimal)→35(no flow)範圍設定不正確）。\n- **外科治療分類**：一般分為excisional(切除性)與physiologic(生理性)兩大類，並可加上preventive(預防性，如LYMPHA)；題敘之三分法本身非本題最佳正解點。\n- **Liposuction(抽脂)**：源自體型雕塑，『其後已廣泛應用』於淋巴水腫(尤其晚期脂肪沉積型)之減積治療→敘述『未再用於淋巴水腫』為錯。\n- **環狀抽脂之恢復**：需長期(通常終身)compression garment維持，並非72小時快速恢復。\n- **LVB上/下肢療效差異**：Lymphovenous bypass(LVB)單獨使用對『上肢』淋巴水腫的效果優於下肢→為正解。","peropt":{"A":"錯—lymphoscintigraphy的transport index數值範圍與方向設定不正確。","B":"錯—外科治療分類敘述非本題正確描述（主為excisional與physiologic）。","C":"錯—抽脂其後已廣泛用於淋巴水腫治療，非『未再使用』。","D":"錯—環狀抽脂需長期壓迫維持，非72小時快速恢復。","E":"◎（本題答案）—LVB單獨使用對上肢淋巴水腫療效優於下肢。"},"cite":"Neligan Plastic Surgery 5e — Lymphedema evaluation & surgical treatment","conflict":""},{"id":"7042","sub":"L3","src":"NG","years":[109],"stem":"The distal lower extremity has unique structural and functional significance, serving as a dynamic platform for posture and ambulation. Which of the description of foot anatomy is incorrect ? (複選)","opts":{"A":"Below the ankle, the peroneal artery bifurcates into the anterior perforating branch and the calcaneal branch","B":"The lateral calcaneal artery terminates at the level of the fifth metatarsal tuberosity, where it connects with the lateral tarsal artery","C":"The plantar heel receives dual blood supply form the calcaneal branches of the posterior tibial and peroneal arteries, which ensures adequate flow to an area regularly traumatized during ambulation","D":"The posterior tibial artery has two terminal branches: the medial and lateral plantar artery","E":"The common peroneal nerve passes around the lateral aspect of the fibular head after splitting into the superficial(L4–S1) and deep (L4–S1) branches"},"ans":"ADE","multi":true,"etype":"ai","expl":"","key":"🎯足部血管與神經解剖(複選：挑出錯誤敘述)\n- **Peroneal artery分叉位置**：腓動脈在『踝上(above the ankle)』分為anterior perforating branch與calcaneal branch；題敘『below the ankle』為錯。\n- **Lateral calcaneal artery**：終止於第五蹠骨粗隆(fifth metatarsal tuberosity)並與lateral tarsal artery吻合(正確)。\n- **足跟(plantar heel)雙重血供**：來自posterior tibial與peroneal artery的calcaneal branches，確保此負重且反覆受創區的灌流(正確)。\n- **Posterior tibial artery終末分支**：依本題所採來源，PTA有『三條』終末分支(calcaneal、medial plantar、lateral plantar)；故『兩條』之敘述為錯。\n- **Common peroneal nerve**：繞行腓骨『頸(neck)』後才分為superficial與deep分支；題敘『繞fibular head後才分叉』且根值敘述不精確，為錯。","peropt":{"A":"◎（錯誤敘述）—腓動脈於踝『上』而非踝『下』分叉。","B":"對—lateral calcaneal artery終於第五蹠骨粗隆並與lateral tarsal artery吻合。","C":"對—足跟由PTA與peroneal的calcaneal branches雙重供血。","D":"◎（錯誤敘述）—依本題來源PTA有三條終末分支，非兩條。","E":"◎（錯誤敘述）—common peroneal nerve繞腓骨頸後分叉，題敘解剖與根值不精確。"},"cite":"Neligan Plastic Surgery 5e — Foot & ankle vascular/neural anatomy","conflict":""},{"id":"7043","sub":"L1","src":"NG","years":[109],"stem":"Among trauma of lower extremities, risk factors may contribute to or predict the need for amputation, except:","opts":{"A":"Gustilo grade IIIC tibial injuries","B":"Peroneal nerve injury","C":"Crush or destructive soft-tissue injury","D":"Apparent futility of revascularization or failed revascularization.","E":"Prolonged ischemia (>4–6 h)/muscle necrosis"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯下肢外傷需要截肢的危險因子(EXCEPT)\n- **強力預測截肢的因子**：Gustilo grade IIIC脛骨損傷(合併需修復的血管損傷)、crush/destructive軟組織損傷、revascularization無效或失敗、prolonged ischemia(>4–6小時)併肌肉壞死。\n- **神經因素**：與截肢相關的是sciatic/tibial nerve損傷(影響足底保護性感覺與行走)；『peroneal nerve損傷』造成foot drop，可以AFO或肌腱移轉代償，並非預測截肢的因子→本題答案(EXCEPT)。\n- **臨床要點**：截肢決策應綜合病人全身狀況、傷肢功能預後與重建可行性，而非單一評分。","peropt":{"A":"屬危險因子—Gustilo IIIC脛骨損傷。","B":"◎（本題答案，EXCEPT）—peroneal nerve損傷可代償，非截肢預測因子。","C":"屬危險因子—crush/破壞性軟組織損傷。","D":"屬危險因子—血流重建無效或失敗。","E":"屬危險因子—缺血>4–6小時併肌肉壞死。"},"cite":"Neligan Plastic Surgery 5e — Lower extremity trauma & amputation indications","conflict":""},{"id":"7044","sub":"L6","src":"NG","years":[110],"stem":"Regarding diabetic foot ulcer (DFU), which is wrong?","opts":{"A":"The metatarsal heads become prominent with extension of the toes at the metatarsal phalangeal joints because of motor neuropathy of the intrinsic foot muscles.","B":"Neuropathy contributes to the development of Charcot changes in the midfoot with osteopenia, fractures/dislocations, and collapse of the arch.","C":"Elevated glucose levels cause glycosylation of the Achilles tendon that limits excursion.","D":"If bone is exposed, the likelihood of infection/ osteomyelitis is 80%.","E":"Transcutaneous oxygen measurement (TcOM) gives absolute values of tissue oxygenation , adequate perfusion is ≥20 mmHg."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯糖尿病足潰瘍(DFU)之病生理與評估(挑錯)\n- **內在肌肉運動神經病變**：intrinsic foot muscle的motor neuropathy使MTP joint處腳趾伸展、蹠骨頭(metatarsal heads)突出，形成高壓區與潰瘍好發點。\n- **Charcot關節**：神經病變致中足(midfoot)Charcot變化——骨質疏鬆、骨折/脫位與足弓塌陷(rocker-bottom foot)。\n- **Achilles tendon glycosylation**：高血糖致跟腱糖化、活動度受限→加重前足壓力(equinus)。\n- **Probe-to-bone**：若探及/暴露骨頭，感染/骨髓炎(osteomyelitis)機率約80%。\n- **TcOM(經皮氧分壓)**：提供組織氧合的數值評估，但『足夠灌流/癒合』的閾值一般為≥30–40 mmHg，<20–30 mmHg代表灌流不足；題敘『adequate perfusion ≥20 mmHg』的閾值錯誤→本題答案。","peropt":{"A":"對—內在肌運動神經病變致蹠骨頭突出。","B":"對—神經病變致中足Charcot變化與足弓塌陷。","C":"對—跟腱糖化限制活動度。","D":"對—暴露骨頭時骨髓炎機率約80%。","E":"◎（本題答案，敘述不正確）—TcOM足夠灌流閾值應為≥30–40 mmHg，非≥20 mmHg。"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e — Diabetic foot ulcer","conflict":""},{"id":"7045","sub":"L4","src":"NG","years":[110,112,113,115],"stem":"A 55-year-old woman is suspected to have developed lymphedema of the right upper extremity 7 months after lymph node dissection for breast cancer treatment. She complained of right upper limb swelling, which improved by elevation At out OPD, pitting edema was noted. According to the International Society of Lymphology staging system, which stage of lymphedema the patient should be diagnosed?","opts":{"A":"Stage 0","B":"Stage 1","C":"Stage 2","D":"Stage 3","E":"Stage 4"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯International Society of Lymphology (ISL) 淋巴水腫分期\n- **本例特徵**：乳癌腋下淋巴結廓清後7個月出現右上肢腫脹，『抬高可改善』且為pitting edema。\n- **ISL分期對照**：\n  - Stage 0(latent/subclinical)：淋巴輸送已受損但『無』臨床可見腫脹。\n  - **Stage 1**：早期，蛋白質豐富的組織液堆積，『抬高患肢可消退』，仍為pitting edema→符合本例。\n  - Stage 2：抬高『無法』完全消退，由pitting漸轉non-pitting(組織纖維化)。\n  - Stage 3：lymphostatic elephantiasis，non-pitting、皮膚變厚與疣狀增生。\n- **注意**：ISL僅分Stage 0–3，並無Stage 4。","peropt":{"A":"錯—Stage 0為無臨床腫脹的潛伏期。","B":"◎（本題答案）—抬高可消退且為pitting edema，符合Stage 1。","C":"錯—Stage 2抬高無法完全消退並漸纖維化。","D":"錯—Stage 3為象皮病、non-pitting。","E":"錯—ISL分期無Stage 4。"},"cite":"International Society of Lymphology Consensus; Neligan Plastic Surgery 5e — Lymphedema staging","conflict":"⚠ 同題歷屆重出／中英雙語同考點（L4）：乳癌腋下淋巴廓清術後上肢腫脹、pitting edema、抬高患肢可改善→依ISL分期為Stage 1。7045為英文病例(110/112/113年)、7072為中文病例(115年)，臨床情境與正解完全一致，僅語言不同(token相似度抓不到跨語言)。各年答案皆=B。判定合併。（註：7062非本題——其為抬高無法改善+non-pitting edema→Stage 2，屬不同情境，保持分開。）"},{"id":"7046","sub":"L3","src":"NG","years":[110],"stem":"The motor innervation of the leg muscles follows a \"one compartment, one nerve\" principle. Which of the following are incorrect matches? (複選)","opts":{"A":"Anterior compartment by the anterior tibia nerve","B":"Lateral compartment by the superficial peroneal nerve","C":"Posterior compartment (deep layer) by the deep peroneal nerve","D":"Posterior compartment (superficial layer) by the tibia nerve","E":"Posterior compartment (both superficial and deep layers) by the tibia nerve"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"🎯小腿肌肉『一腔室一神經』運動支配(複選：挑出錯誤配對)\n- **Anterior compartment(前腔室)**：由deep peroneal nerve(深腓神經)支配；並無所謂『anterior tibial nerve』運動支配之名稱→A為錯誤配對。\n- **Lateral compartment(外側腔室)**：由superficial peroneal nerve(淺腓神經)支配(正確)。\n- **Posterior compartment深層(deep layer)**：由tibial nerve支配，非deep peroneal nerve→C為錯誤配對。\n- **Posterior compartment淺層(superficial layer)**：由tibial nerve支配(正確)。\n- **整個後腔室(淺+深)**：皆由tibial nerve支配(正確)。","peropt":{"A":"◎（錯誤配對）—前腔室由deep peroneal nerve支配，無『anterior tibial nerve』。","B":"對—外側腔室由superficial peroneal nerve支配。","C":"◎（錯誤配對）—後腔室深層由tibial nerve支配，非deep peroneal nerve。","D":"對—後腔室淺層由tibial nerve支配。","E":"對—後腔室淺深兩層皆由tibial nerve支配。"},"cite":"Neligan Plastic Surgery 5e — Leg compartment innervation","conflict":""},{"id":"7049","sub":"L2","src":"NG","years":[110],"stem":"For reconstruction of weight-bearing surface of foot, controversies exist fasciocutaneous flap or muscle flap with skin graft is better withstand the success imposed by ambulation. Which of the following are correct? (複選)","opts":{"A":"Fasciocutaneous flap preserve more tendon gliding and easier re-elevation.","B":"Muscle flap provide a more robust blood supply.","C":"Fasciocutaneous flap can be more easily used to obliterate dead space","D":"Muscle flap is more resistant to the effect of shearing.","E":"Gracilis muscle is not a good choice and seldom used because of its short pedicle."},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯負重足底(weight-bearing surface)重建：筋膜皮瓣 vs 肌肉皮瓣(複選：正確者)\n- **Fasciocutaneous flap優點**：保留較佳的肌腱滑動(tendon gliding)、日後二次手術時較易再掀開(re-elevation)；並可提供類似的耐磨皮膚。\n- **Muscle flap優點**：提供更豐富穩健的血流(robust blood supply)，抗感染力佳，且對負重時的『剪力(shearing)』耐受性較佳、能良好填補死腔(dead space)。\n- **筋膜皮瓣與死腔**：填補死腔並非筋膜皮瓣的強項(肌肉皮瓣較擅長)→C錯。\n- **Gracilis(股薄肌)**：血管蒂長度足夠、廣泛應用於下肢重建，並非因『蒂短』而少用→E錯。","peropt":{"A":"◎對—筋膜皮瓣保留較佳肌腱滑動且易再掀開。","B":"◎對—肌肉皮瓣提供更穩健的血流。","C":"錯—填補死腔為肌肉皮瓣強項，非筋膜皮瓣。","D":"◎對—肌肉皮瓣對剪力耐受性較佳。","E":"錯—gracilis蒂長足夠、廣泛使用，非因蒂短而少用。"},"cite":"Neligan Plastic Surgery 5e — Reconstruction of weight-bearing foot","conflict":""},{"id":"7050","sub":"L4","src":"NG","years":[109,111,114],"stem":"Which of the following is not the common risk factor for lymphedema?","opts":{"A":"Radiation.","B":"Malignancy.","C":"Infection.","D":"Genetic factors.","E":"Obesity."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯淋巴水腫的常見危險因子(與7038同概念，選項順序不同)\n- **常見危險因子**：Radiation(放療)、Infection(感染)、Genetic factors(遺傳)、Obesity(肥胖)。\n- **Malignancy**：惡性腫瘤本身非教科書列舉之常見獨立危險因子（雖可經淋巴結廓清、放療或腫瘤阻塞間接致次發性淋巴水腫）→本題答案為Malignancy。","peropt":{"A":"屬常見危險因子—放射治療。","B":"◎（本題答案）—Malignancy非教科書所列常見危險因子。","C":"屬常見危險因子—感染。","D":"屬常見危險因子—遺傳因素。","E":"屬常見危險因子—肥胖。"},"cite":"Neligan Plastic Surgery 5e / Grabb & Smith 9e — Lymphedema risk factors","conflict":"⚠ 同題歷屆重出（L4）：「Which is NOT the common risk factor for lymphedema?」正解恆為Malignancy(惡性腫瘤本身非公認的常見危險因子，其餘obesity/radiation/infection/genetic皆是)。僅選項順序重排。109年(7038)答案=E、111/114年(7050)答案=B。純選項重排、同考點，判定合併。"},{"id":"7052","sub":"L3","src":"NG","years":[109,111],"stem":"Chronic nerve compression is common in the lower extremity. Which of the following is true?","opts":{"A":"The most common site of entrapment is the proximal tibial nerve, followed by the peroneal nerve at the fibular neck","B":"The pathophysiologic concepts provide a basis for staging chronic nerve compression, in numeric grading scale for peripheral nerve, \"anesthesia\" was referred as grade 7","C":"It is essential for an electrodiagnostic test to be performed and it is essential that the results of that test demonstrate chronic nerve compression to undergo surgical intervention","D":"A Morton's neuroma is not a true neuroma, but a chronic nerve compression of an interdigital nerve caused by the intermetatarsal ligament","E":"The terms \"causalgia\" and \"reflex sympathetic dystrophy\" are replaced by \"complex regional pain syndrome I\" and \"complex regional pain syndrome II\""},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯下肢慢性神經壓迫(與7041同概念，B/C為跨版本置換選項)\n- **最常見卡壓部位**：非近端tibial nerve接peroneal於fibular neck之敘述。\n- **分級數值**：本版將anesthesia列為grade 7（7041版為grade 8），此為跨版本數值差異，故非正解。\n- **電生理檢查**：surgical intervention不以electrodiagnostic test為『絕對必要』——臨床診斷(Tinel's、症狀、Dellon理論分期)即可支持減壓，題敘『必須』為錯。\n- **Morton's neuroma**：interdigital nerve受intermetatarsal ligament壓迫的慢性神經壓迫，非真正神經瘤→本題正解。\n- **CRPS命名**：causalgia對應CRPS II、RSD對應CRPS I，題敘配對顛倒為錯。","peropt":{"A":"錯—最常見卡壓非近端tibial nerve接peroneal於fibular neck。","B":"錯—anesthesia之grade數值有版本差異(本版grade 7)，非正確。","C":"錯—手術不以電生理檢查為絕對必要，臨床診斷即可。","D":"◎（本題答案）—Morton's neuroma為interdigital nerve受intermetatarsal ligament壓迫。","E":"錯—causalgia應對CRPS II、RSD對CRPS I，題敘顛倒。"},"cite":"Neligan Plastic Surgery 4e/5e — Chronic nerve compression, Morton's neuroma","conflict":"跨年數值差異（Neligan 4e vs Neligan 4e）：B: 109「The pathophysiologic concepts provide a 」 vs 111「The pathophysiologic concepts provide a 」；C: 109「Classically, patients with painful neuro」 vs 111「It is essential for an electrodiagnostic」 ｜ ⚠ 同題歷屆重出（L3）：「Chronic nerve compression…which is true?」109年(7041)與111年(7052)為同一題，正解恆為『Morton's neuroma並非真性neuroma，而是interdigital nerve受intermetatarsal ligament慢性壓迫』。差異僅為乾擾選項B之數字微調（numeric grading scale中anesthesia：7041寫grade 8、7052寫grade 7）及選項C改寫（painful neuroma vs electrodiagnostic test），keyed答案不變。各年答案：109=D、111=D。屬數字微調之重出題，判定合併。"},{"id":"7053","sub":"L3","src":"NG","years":[111],"stem":"Which following statements are correct? (複選)","opts":{"A":"Surgical goals in foot and ankle reconstruction are centered on \"3 Bs\" : Blood supply, bioburden, and biomechanics","B":"Above the ankle, the peroneal artery bifurcates into the anterior perforating branch and the calcaneal branch","C":"The posterior tibial artery has three terminal branches: the calcaneal branch, medial and lateral plantar artery","D":"The common peroneal nerve passes around the lateral aspect of the fibular head after splitting into superficial (L4-S1) and deep(L4-S1) branches","E":"Diabetic peripheral polyneuropathy is the major culprit behind non-healing diabetic foot wounds. Elevated intraneural concentration of sorbitol, is thought to be a principle mechanism mediating peripheral nerve damage"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯足踝重建原則與解剖(複選：正確者)\n- **『3 Bs』原則**：足踝重建圍繞Blood supply(血供)、Bioburden(菌量控制)、Biomechanics(生物力學)。\n- **Peroneal artery分叉**：於『踝上(above the ankle)』分為anterior perforating branch與calcaneal branch(正確；對照7042之『踝下』為錯)。\n- **Posterior tibial artery終末分支**：依本題來源為『三條』——calcaneal branch、medial plantar、lateral plantar(正確)。\n- **Common peroneal nerve敘述**：題敘『繞fibular head後才分叉』與根值不精確(應繞腓骨頸)→D不正確，故未入選。\n- **糖尿病周邊多發性神經病變**：為糖尿病足傷口不癒的主因；intraneural sorbitol(山梨醇)濃度升高被認為是介導周邊神經損傷的主要機轉(polyol pathway)。","peropt":{"A":"◎對—足踝重建的3 Bs：blood supply、bioburden、biomechanics。","B":"◎對—腓動脈於踝上分為anterior perforating與calcaneal branch。","C":"◎對—依本題來源PTA有三條終末分支(calcaneal、medial/lateral plantar)。","D":"錯—common peroneal nerve繞腓骨頸後分叉、根值敘述不精確，故不正確。","E":"◎對—糖尿病周邊神經病變為足傷不癒主因，intraneural sorbitol升高為主要機轉。"},"cite":"Neligan Plastic Surgery 5e — Foot & ankle reconstruction, diabetic neuropathy (polyol pathway)","conflict":""},{"id":"7054","sub":"L5","src":"NG","years":[110,111,112,113],"stem":"Which of the following statements regarding lymphatic reconstruction of the extremities is incorrect?","opts":{"A":"Currently, the most definitive tool for evaluation of lymphedema is lymphoscintigraphy.","B":"Direct excision with skin grafting is reserved for the most extreme cases in which function is severely affected.","C":"Lymphovenous bypass (LVB) appears to be most effective at the early stages of lymphedema before destruction of lymphatic vessel smooth muscle and development of irreversible tissue fibrosis.","D":"LVB alone may be more effective in addressing the lower extremity vs. upper extremity lymphedema.","E":"Vascularized lymph node transfers may be combined with lymphovenous bypass in patients with moderate to severe lymphedema"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：肢體淋巴重建的評估與術式選擇（LVB／VLNT／減積）。\n- **評估黃金標準**：Lymphoscintigraphy 仍是淋巴水腫診斷與分期最具決定性的工具；ICG lymphography 則用於術中即時定位（linear→splash→stardust→diffuse）。\n- **LVB（Lymphovenous bypass）時機**：屬「早期、生理性（physiologic）」術式，須在淋巴管平滑肌破壞與不可逆纖維化之前施行，愈早效果愈好。\n- **上肢 vs 下肢**：LVB 單獨使用在**上肢**淋巴水腫效果通常優於下肢；下肢因靜脈壓較高、逆流風險大，單靠 LVB 效果較差，常需合併 VLNT。故本題「LVB 對下肢優於上肢」的敘述**錯誤**。\n- **重度處置**：Direct excision + skin graft（Charles procedure）僅保留給功能嚴重受損的極端個案；中重度可 VLNT ± LVB 合併。","peropt":{"A":"正確：Lymphoscintigraphy 為目前淋巴水腫評估最具決定性的工具。","B":"正確：直接切除加植皮（Charles）保留給功能嚴重受損的最極端個案。","C":"正確：LVB 在淋巴管平滑肌破壞及不可逆纖維化前的早期最有效。","D":"◎錯誤（即本題答案）：LVB 單獨使用實際上對**上肢**優於下肢，此敘述將優劣顛倒。","E":"正確：中重度患者可 VLNT 合併 LVB 治療。"},"cite":"Neligan Plastic Surgery 5e, Vol.1 Lymphatic reconstruction of the extremities","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B10-Q03） ｜ ⚠ 同題歷屆重出＋中英雙語同考點（L5）：肢體淋巴重建『何者不正確/不真』，四年皆以同一錯誤敘述『LVB alone對下肢淋巴水腫比上肢更有效』為正解(正確方向應為上肢>下肢)。乾擾選項為輪替之正確填充句(LVB早期最有效、direct excision+STSG、VLNT可合併LVB、VLNT捐贈部位、lymphoscintigraphy)，keyed考點恆定。7060為7051之中文版(跨語言)。各年答案：110(7048)=D、111(7051)=B、112(7054)=D、113(7060)=C。四題皆問『不正確』方向一致，無是非翻轉，判定合併。"},{"id":"7055","sub":"L2","src":"NG","years":[109,112,114],"stem":"Reconstructive surgery for the lower extremity has evolved from staged approach to proving best solutions for functional and cosmetic outcome. Which of the description is incorrect?","opts":{"A":"Regardless of the degree of contamination and extent of injury when indicated for salvage, there is no need to delay definitive coverage provided that the general condition of the patient and the status of the wound are appropriate","B":"In these cases where limb salvage is not possible, an attempt should be made to salvage as much limb length as possible. Every effort should be made to save the functional knee joint as below-knee amputation results in far superior ambulatory outcome and up to 2–3 times more full mobility compared to above knee amputation.","C":"When patients with diabetes are required to undergo a reconstructive procedure of the extremity, vascular status must be evaluated to ensure success.","D":"The use of tissue expansion in the lower extremity has been as successful as in other areas of the body, such as the breast and scalp. The potential advantages of using expanded skin in the lower extremity include improved contours, coverage with like tissue, and improved aesthetic result","E":"A propeller flap can be defined as an island flap that reaches the recipient site through an axial rotation"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯考點：下肢重建原則與組織擴張器（tissue expansion）在下肢的限制。\n- **早期確定性覆蓋**：只要病人全身狀況與傷口狀態允許，無論汙染程度與損傷範圍，一旦決定保肢就不需刻意延遲確定性覆蓋（早期積極重建）。\n- **保肢與截肢高度**：無法保肢時應盡量保留肢體長度，全力保留功能性膝關節——BKA（below-knee amputation）步行預後遠優於 AKA，可達 2–3 倍完全活動能力。\n- **糖尿病足重建**：術前必須評估血管狀態以確保成功。\n- **組織擴張器在下肢**：下肢皮膚張力大、血流較差、感染與外露併發症率高，**並非**像乳房、頭皮一樣成功；故本敘述**錯誤**。\n- **Propeller flap**：定義為以軸向旋轉（axial rotation）到達受區的島狀皮瓣。","peropt":{"A":"正確：條件允許時保肢不需延遲確定性覆蓋。","B":"正確：盡量保留肢體長度並保留功能性膝關節，BKA 預後優於 AKA。","C":"正確：糖尿病患下肢重建前須評估血管狀態。","D":"◎錯誤（即本題答案）：組織擴張器在下肢併發症率高，**不**如乳房、頭皮成功。","E":"正確：Propeller flap 為以軸向旋轉到達受區的島狀皮瓣。"},"cite":"Neligan Plastic Surgery 5e, Vol.4 Lower extremity reconstruction","conflict":"⚠ 同題歷屆重出（L2）：「Reconstructive surgery for the lower extremity has evolved…which is incorrect?」109年(7040)與112/114年(7055)為同一題。兩年皆以『下肢組織擴張器(tissue expansion)如乳房/頭皮般成功』此一錯誤敘述為正解，考點完全一致；僅B、C、E乾擾選項改寫（7040用peroneal/tibial nerve、compartment syndrome四P/六P；7055改用BKA vs AKA、propeller flap定義），不影響keyed concept。各年答案：109=D、112/114=D。屬選項改寫之重出題，判定合併。"},{"id":"7056","sub":"L3","src":"NG","years":[112,114],"stem":"Which of the following statements regarding angiosomes of the foot is incorrect?","opts":{"A":"All vascular supply to the foot and ankle enters through the popliteal fossa as the three terminal branches of the popliteal artery: the anterior tibial artery, the posterior tibial artery, and the peroneal artery","B":"The anterior perforating branch of the peroneal artery connects directly with the anterior lateral malleolar artery and supplies the anterolateral ankle angiosome.","C":"At the level of the lateral malleolus, the lateral calcaneal artery emerges laterally between the Achilles tendon and the peroneal tendons.","D":"The plantar heel receives dual blood supply form the calcaneal branches of the posterior tibial and peroneal arteries, which ensures adequate flow to an area regularly traumatized during ambulation.","E":"The posterior tibial artery then enters the calcaneal canal, underneath the flexor retinaculum, and bifurcates into the medial and lateral plantar arteries at the level of the transverse septum between the flexor halluces longus and flexor digitorum brevis muscles."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：足踝 angiosome 的解剖與後脛動脈分叉位置。\n- **三大來源動脈**：所有足踝血流經膝窩由膕動脈三終支進入——anterior tibial、posterior tibial、peroneal artery。\n- **前外踝**：Peroneal artery 的 anterior perforating branch 與 anterior lateral malleolar artery 直接吻合，供應 anterolateral ankle angiosome。\n- **外側跟骨**：lateral calcaneal artery 於外踝處在 Achilles tendon 與 peroneal tendons 之間出現。\n- **足跟雙重血供**：plantar heel 由 posterior tibial 與 peroneal 的 calcaneal branches 雙重供應。\n- **PT 分叉的正確位置**：Posterior tibial artery 進入跟骨管（tarsal tunnel）後，於 **abductor hallucis 深面**分叉為 medial 與 lateral plantar arteries，其分隔為 abductor hallucis 與 flexor digitorum brevis 之間的橫隔，**並非** flexor hallucis longus 與 flexor digitorum brevis 之間；故 E **錯誤**。","peropt":{"A":"正確：足踝血流由膕動脈三終支（AT、PT、peroneal）供應。","B":"正確：peroneal 的 anterior perforating branch 供應 anterolateral ankle。","C":"正確：lateral calcaneal artery 於 Achilles 與 peroneal tendons 間出現。","D":"正確：plantar heel 由 PT 與 peroneal 的 calcaneal branches 雙重供應。","E":"◎錯誤（即本題答案）：分叉橫隔應為 abductor hallucis 與 FDB 之間（PT 於 abductor hallucis 深面分叉），非 FHL 與 FDB 之間。"},"cite":"Neligan Plastic Surgery 5e, Foot and ankle angiosome anatomy","conflict":""},{"id":"7057","sub":"L1","src":"NG","years":[110,112],"stem":"Risk factors that may contribute to or predict the need for lower limb amputation include: (複選)","opts":{"A":"Gustilo grade IIIC tibial injuries","B":"Sciatic or tibial nerve injury","C":"Prolonged ischemia (>4-6 h)
