 with muscle necrosis","D":"Multiple/severely comminuted fractures; segmental bone loss","E":"Mangled extremity severity score < 7"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：預測／導致下肢截肢的危險因子。\n- **絕對性血管損傷**：Gustilo IIIC（合併需修復的動脈損傷）截肢率最高。\n- **神經損傷**：坐骨神經或脛神經損傷造成足底失去保護性感覺，是重要預測因子（惟現代神經重建進步，非絕對禁忌）。\n- **缺血時間**：溫缺血 >4–6 小時合併肌肉壞死，再灌流症候群與感染風險高。\n- **骨骼破壞**：多發性／嚴重粉碎性骨折、節段性骨缺損。\n- **MESS 方向**：MESS **≥7** 才提示需截肢；**MESS < 7** 傾向可保肢，**不是**截肢危險因子，故 E 不選。","peropt":{"A":"◎正確：Gustilo IIIC 為截肢高危險因子。","B":"◎正確：坐骨或脛神經損傷為預測截肢的因子之一。","C":"◎正確：缺血 >4–6 小時合併肌肉壞死增加截肢風險。","D":"◎正確：多發／嚴重粉碎骨折與節段性骨缺損增加截肢風險。","E":"錯誤：MESS **<7** 傾向保肢，非危險因子（應為 ≥7 才預測截肢）。"},"cite":"Neligan Plastic Surgery 5e, Management of lower extremity trauma; MESS (Johansen)","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B10-Q02） ｜ ⚠ 同題歷屆重出（L1，複選）：「Risk factors that may predict need for lower limb amputation include (複選)」110年(7047)與112年(7057)答案皆=ABCD，共同乾擾為E『MESS < 7』(MESS≧7才預測截肢，故<7非危險因子)。差異僅選項D微調(7047寫old age/severe comorbidity、7057寫multiple/segmental bone loss，兩者皆為真危險因子且皆納入答案)，考點不變。各年答案皆=ABCD。判定合併。（註：單選版7059『何者不是』→E，屬單複選翻轉之陷阱，保持分開。）"},{"id":"7058","sub":"L6","src":"NG","years":[112,113],"stem":"Which of the following flaps for perineal reconstruction is/are INcorrectly paired with their blood supply? (複選)","opts":{"A":"Rectus based flaps - superior epigastric artery","B":"Gracilis flaps - superficial circumflex femoral artery","C":"ALT flap - branching from superficial femoral artery","D":"Singapore flap - obturator artery","E":"Posterior thigh flap - medial circumflex femoral artery"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：會陰重建常用皮瓣的血供配對，本題全部配錯（ans=ABCDE）。\n- **A**：Rectus 為主的皮瓣（VRAM）供血為 **deep inferior epigastric artery**，非 superior epigastric artery。\n- **B**：Gracilis 供血為 **medial circumflex femoral artery**（profunda 分支），非 superficial circumflex femoral artery。\n- **C**：ALT 供血為 **descending branch of lateral circumflex femoral artery**（源自 profunda femoris），非 superficial femoral artery 分支。\n- **D**：Singapore（pudendal thigh）flap 供血為 **internal pudendal artery 的 posterior labial／perineal branches**，非 obturator artery。\n- **E**：Posterior thigh flap 供血為 **descending branch of inferior gluteal artery**，非 medial circumflex femoral artery。","peropt":{"A":"◎錯誤配對：Rectus/VRAM 應為 deep inferior epigastric artery。","B":"◎錯誤配對：Gracilis 應為 medial circumflex femoral artery。","C":"◎錯誤配對：ALT 應為 descending branch of lateral circumflex femoral artery。","D":"◎錯誤配對：Singapore flap 應為 internal pudendal artery（posterior labial/perineal branches）。","E":"◎錯誤配對：Posterior thigh flap 應為 descending branch of inferior gluteal artery。"},"cite":"Neligan Plastic Surgery 5e, Perineal reconstruction; flap vascular anatomy","conflict":""},{"id":"7059","sub":"L1","src":"NG","years":[113],"stem":"面對下肢創傷的處理時(management of lower extremity trauma)，下列哪一選項\"不是\"可能導致或預測需要截肢(lower limb amputation)的危險因子?","opts":{"A":"Gustilo grade IIIC tibial injuries","B":"Sciatic or tibial nerve injury","C":"Prolonged ischemia (>4-6 h) with muscle necrosis","D":"Multiple/severely comminuted fractures; segmental bone loss","E":"Mangled extremity severity score (MESS) < 7"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：下肢外傷處理中「不是」截肢危險因子者（單選，7057 之中文單選版）。\n- **截肢危險因子**：Gustilo IIIC、坐骨／脛神經損傷、缺血 >4–6h 合併肌肉壞死、多發性／嚴重粉碎骨折與節段性骨缺損。\n- **MESS 判讀**：MESS 為評估保肢可行性的評分；**≥7 提示需截肢**、**<7 傾向可保肢**。\n- 因此 **MESS < 7**（E）**不是**截肢危險因子，反而是保肢傾向指標。","peropt":{"A":"是危險因子：Gustilo IIIC 截肢率最高。","B":"是危險因子：坐骨或脛神經損傷。","C":"是危險因子：缺血 >4–6h 合併肌肉壞死。","D":"是危險因子：多發／嚴重粉碎骨折、節段性骨缺損。","E":"◎正確答案（非危險因子）：MESS <7 傾向保肢，須 ≥7 才預測截肢。"},"cite":"Neligan Plastic Surgery 5e, Lower extremity trauma; MESS","conflict":""},{"id":"7061","sub":"L3","src":"NG","years":[113],"stem":"下列關於 angiosomes of the foot 的敘述哪一些是正確的 ? (複選)","opts":{"A":"All vascular supply to the foot and ankle enters through the popliteal fossa as the three terminal branches of the popliteal artery: the anterior tibial artery, the posterior tibial artery, and the peroneal artery","B":"The anterior perforating branch of the peroneal artery connects directly with the anterior lateral malleolar artery and supplies the anterolateral ankle angiosome","C":"At the level of the lateral malleolus, the lateral calcaneal artery emerges laterally between the Achilles tendon and the peroneal tendons","D":"The plantar heel receives dual blood supply form the calcaneal branches of the posterior tibial and peroneal arteries, which ensures adequate flow to an area regularly traumatized during ambulation","E":"The posterior tibial artery then enters the calcaneal canal, underneath the flexor retinaculum, and bifurcates into the medial and lateral plantar arteries at the level of the transverse septum between the flexor halluces longus and flexor digitorum brevis muscles"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：足部 angiosome「正確」敘述（ans=ABCD；E 錯）。\n- **A**：足踝血流由膕動脈三終支（AT、PT、peroneal）供應——正確。\n- **B**：peroneal 之 anterior perforating branch 供應 anterolateral ankle angiosome——正確。\n- **C**：lateral calcaneal artery 於外踝處在 Achilles 與 peroneal tendons 間出現——正確。\n- **D**：plantar heel 由 PT 與 peroneal 之 calcaneal branches 雙重供應——正確。\n- **E**：PT 分叉的橫隔應在 **abductor hallucis 與 FDB** 之間（PT 於 abductor hallucis 深面分叉），非 FHL 與 FDB 之間——**錯誤**，不選。","peropt":{"A":"◎正確：足踝血流由膕動脈三終支供應。","B":"◎正確：peroneal anterior perforating branch 供應 anterolateral ankle。","C":"◎正確：lateral calcaneal artery 於 Achilles 與 peroneal tendons 間出現。","D":"◎正確：plantar heel 由 PT 與 peroneal calcaneal branches 雙重供應。","E":"錯誤：分叉橫隔應為 abductor hallucis 與 FDB 之間，非 FHL 與 FDB。"},"cite":"Neligan Plastic Surgery 5e, Foot and ankle angiosome anatomy","conflict":""},{"id":"7062","sub":"L4","src":"NG","years":[114],"stem":"A 65-year-old woman is suspected to have developed lymphedema of the right upper extremity 7 months after lymph node dissection for breast cancer treatment. She complained of right upper limb swelling, and cant not improved by elevation. At OPD, non-pitting edema was noted. According to the International Society of Lymphology staging system, which stage of lymphedema best fits the patient’s diagnosis?","opts":{"A":"Stage 0","B":"Stage 1","C":"Stage 2","D":"Stage 3","E":"Stage 4"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：ISL（International Society of Lymphology）淋巴水腫分期臨床判讀。\n- **關鍵線索**：乳癌淋巴結廓清後、抬高**無法**改善的腫脹、**non-pitting edema**。\n- **ISL 分期（僅 0–3 期）**：\n  - Stage 0（潛伏／subclinical）：無明顯腫脹但淋巴運輸受損。\n  - Stage 1：早期，抬高**可**部分消退，多為 pitting。\n  - **Stage 2：抬高很少能改善腫脹；晚期 Stage 2 因脂肪／纖維化沉積轉為 non-pitting** → 符合本例。\n  - Stage 3：lymphostatic elephantiasis，皮膚增厚、疣狀變化、反覆感染。\n- 本例抬高無效 + non-pitting，最符合 **Stage 2**。\n- 註：ISL **無 Stage 4**（E 為誘答干擾項）。","peropt":{"A":"錯誤：Stage 0 為無明顯腫脹的潛伏期。","B":"錯誤：Stage 1 抬高可部分消退且多為 pitting，與本例不符。","C":"◎正確答案：Stage 2 抬高難改善、晚期轉 non-pitting，最符合本例。","D":"錯誤：Stage 3 應有皮膚象皮病變化，本例尚未達此程度。","E":"錯誤：ISL 分期無 Stage 4，屬誘答項。"},"cite":"ISL 2020 Consensus; Neligan Plastic Surgery 5e, Lymphedema staging","conflict":""},{"id":"7063","sub":"L5","src":"NG","years":[114],"stem":"Which of the following is NOT a correct indication for liposuction in lymphedema treatment?","opts":{"A":"Acute pitting lymphedema with ≥ 5% excess limb volume","B":"Minimal pitting (4–5 mm in arms, 5–6 mm in legs)","C":"No active cancer","D":"Failure of conservative treatment","E":"No age limit"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯考點：淋巴水腫抽脂（liposuction／SAPL）的適應症。\n- **抽脂原理**：僅移除因慢性淋巴水腫沉積的**脂肪**，適用於已無明顯液體、**non-pitting（chronic）**的階段。\n- **正確適應症**：慢性非凹陷性水腫、僅微量 pitting（手臂 4–5 mm、腿 5–6 mm）、無活動性癌症、保守治療（CDT）失敗、無年齡上限。\n- **A 為不正確**：**急性凹陷性（acute pitting）**水腫代表以**液體**為主，應先行 CDT／保守治療與加壓，而非抽脂；抽脂對液體成分無效且時機錯誤，故 A**不是**正確適應症。","peropt":{"A":"◎不正確（即本題答案）：急性 pitting（液體為主）應先保守治療，非抽脂適應症。","B":"正確適應症：僅微量 pitting（手臂 4–5 mm、腿 5–6 mm）。","C":"正確適應症：無活動性癌症。","D":"正確適應症：保守治療（CDT）失敗。","E":"正確適應症：無年齡上限。"},"cite":"Brorson liposuction protocol; Neligan Plastic Surgery 5e, Lymphedema surgical treatment","conflict":""},{"id":"7064","sub":"L1","src":"NG","years":[114],"stem":"Which of the following statements regarding the Gustilo–Anderson classification of open fractures is most accurate?","opts":{"A":"A type I fracture involves a wound greater than 1 cm with significant soft-tissue damage and contamination.","B":"A type IIIA fracture has extensive soft-tissue damage but maintains sufficient coverage of the bone without the need for a flap.","C":"A type IIIB fracture is characterized by a clean wound with minimal periosteal stripping and no need for soft-tissue reconstruction.","D":"A type II fracture is associated with a significantly higher infection rate than a type IIIC fracture.","E":"A type IIIC fracture does not require vascular repair and has the lowest risk of amputation among type III injuries."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：Gustilo–Anderson 開放性骨折分類。\n- **Type I**：傷口 **<1 cm**、乾淨、汙染少、軟組織損傷輕微。\n- **Type II**：傷口 1–10 cm、中度軟組織損傷、無廣泛損毀。\n- **Type IIIA**：廣泛軟組織損傷但**骨骼覆蓋充分、不需皮瓣**——本題最正確（B）。\n- **Type IIIB**：廣泛軟組織缺損、骨膜剝離、骨外露，**需皮瓣重建**。\n- **Type IIIC**：合併需修復的**動脈損傷**，感染與截肢率最高。\n- 感染率隨等級遞增（IIIC > II）。","peropt":{"A":"錯誤：Type I 為 <1 cm 乾淨傷口，非 >1 cm 合併顯著損傷。","B":"◎正確答案：Type IIIA 軟組織損傷廣泛但覆蓋充分、不需皮瓣。","C":"錯誤：Type IIIB 為廣泛軟組織缺損、骨膜剝離、需皮瓣，非乾淨微小傷口。","D":"錯誤：IIIC 感染率遠高於 Type II。","E":"錯誤：IIIC 定義即含需修復的動脈損傷，截肢風險最高。"},"cite":"Gustilo & Anderson classification; Neligan Plastic Surgery 5e, Open fracture management","conflict":""},{"id":"7065","sub":"L4","src":"NG","years":[114],"stem":"Which of the following best describes the ADB Stage III (Arm dermal backflow lymphographic staging system for lymphedema Stage III) in the progression of lymphedema based on lymphographic patterns?","opts":{"A":"Linear drainage pattern without dermal backflow, indicating normal lymphatic function.","B":"Splash dermal backflow pattern observed mainly in the proximal part of the limb.","C":"Stardust dermal backflow pattern involving the proximal and distal limb, excluding the hand.","D":"Diffuse dermal backflow pattern involving the proximal part of the limb only.","E":"No pathological pattern present; normal drainage visualized throughout the limb."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯考點：ADB（Arm Dermal Backflow）淋巴造影分期 Stage III。\n- **ADB 分期（依 ICG/淋巴造影 dermal backflow 型態進展）**：\n  - Linear（無 backflow）：正常淋巴功能。\n  - **Splash**：局限於肢體近端的潑濺型。\n  - **Stardust（星塵型）**：\n    - 較早：僅近端。\n    - **Stage III：stardust 同時侵犯近端與遠端，但**不含手部**** → 本題答案 C。\n    - 更晚：stardust 含手部。\n  - Diffuse：瀰漫型（末期）。\n- 故 Stage III = 近端＋遠端 stardust、excluding hand（C）。","peropt":{"A":"錯誤：linear 無 dermal backflow 代表正常，非 Stage III。","B":"錯誤：僅近端 splash 屬較早期，非 Stage III。","C":"◎正確答案：Stardust 侵犯近端與遠端但不含手部，符合 Stage III。","D":"錯誤：僅近端 diffuse 之描述與 Stage III 星塵型分佈不符。","E":"錯誤：正常無病理型態，非 Stage III。"},"cite":"Mihara/Yamamoto arm dermal backflow (ADB) staging; ICG lymphography","conflict":""},{"id":"7066","sub":"L1","src":"NG","years":[114],"stem":"Which of the following statements regarding the principles of functional limb salvage is NOT correct?","opts":{"A":"Multidisciplinary collaboration is essential because vascular repair, infection control, soft-tissue reconstruction, and biomechanical rehabilitation must all be coordinated.","B":"Functional success is judged primarily by limb survival, even if the salvaged limb is nonfunctional or painful.","C":"Accurate diagnosis of wound etiology, ensuring angiosome-based revascularization, and achieving a clean wound base are critical steps in wound healing.","D":"Postoperative biomechanical offloading and wound care are essential to minimize the risk of wound dehiscence and delayed healing.","E":"Modern major amputations can sometimes yield better functional and quality-of-life outcomes compared to limb salvage in severely injured limbs."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯考點：功能性保肢（functional limb salvage）原則。\n- **多專科協作**：血管修復、感染控制、軟組織重建、生物力學復健須整合。\n- **判斷成功的標準**：現代觀念以**功能與生活品質**為成功依據，而非僅肢體存活；一個疼痛、無功能的「保住的肢體」屬**失敗**，故 B**不正確**。\n- **傷口癒合關鍵**：正確診斷病因、angiosome 導向再灌流、乾淨傷口基底。\n- **術後照護**：生物力學減壓（offloading）與傷口照護以降低裂開與延遲癒合。\n- **現代截肢觀**：嚴重損傷肢體，主要截肢有時反而帶來更佳功能與生活品質。","peropt":{"A":"正確：需多專科整合血管、感染、軟組織與復健。","B":"◎不正確（即本題答案）：成功應以功能／生活品質判斷，非僅肢體存活；無功能或疼痛肢體屬失敗。","C":"正確：正確診斷、angiosome 導向再灌流、乾淨傷口基底為癒合關鍵。","D":"正確：術後生物力學減壓與傷口照護不可或缺。","E":"正確：嚴重個案主要截肢有時功能與生活品質更佳。"},"cite":"Neligan Plastic Surgery 5e, Functional limb salvage principles","conflict":""},{"id":"7067","sub":"L1","src":"NG","years":[114],"stem":"關於 Mangled Extremity Severity Score (MESS) 評分標準，下列哪些敘述是正確的？（複選）","opts":{"A":"評估要素包括骨折類型、軟組織損傷、神經血管損傷和休克情況。","B":"年齡越大，MESS分數會相對降低。","C":"四肢缺血時間超過6小時會增加額外加分。","D":"MESS主要用來協助判斷是否應該進行截肢。","E":"MESS分數只適用於上肢外傷，不適用於下肢。"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：MESS（Mangled Extremity Severity Score）評分（ans=ACD）。\n- **四大評估要素**：骨骼／軟組織損傷（skeletal/soft-tissue injury）、肢體缺血（limb ischemia）、休克（shock/hypotension）、**年齡（age）**。\n- **年齡計分方向**：**年齡越大分數越高**（<30、30–50、>50 分數遞增），故 B「年齡越大分數降低」**錯誤**。\n- **缺血加分**：缺血時間越長分數越高，**>6 小時**時缺血分數加倍（額外加分），C 正確。\n- **臨床用途**：協助判斷是否截肢（傳統 MESS ≥7 提示截肢），D 正確。\n- **適用範圍**：主要用於**下肢**（亦可用於四肢），非僅限上肢，故 E 錯誤。","peropt":{"A":"◎正確：評估含骨骼/軟組織損傷、缺血、休克與年齡。","B":"錯誤：年齡越大 MESS 分數越高，非降低。","C":"◎正確：缺血 >6 小時缺血分數加倍（額外加分）。","D":"◎正確：MESS 用以協助判斷是否截肢。","E":"錯誤：MESS 主要用於下肢外傷，非僅限上肢。"},"cite":"Johansen MESS; Neligan Plastic Surgery 5e, Lower extremity trauma","conflict":""},{"id":"7068","sub":"L4","src":"NG","years":[114],"stem":"Which of the following symptoms can occur throughout all stages of lymphedema? （複選）","opts":{"A":"Heaviness","B":"Skin ulceration","C":"Nerve compression symptoms","D":"Pain","E":"Tissue thickening"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：可出現於淋巴水腫「所有分期」的症狀（ans=ACD）。\n- **貫穿各期的症狀**：Heaviness（沉重感）、Pain（疼痛/不適）、Nerve compression symptoms（如腕隧道樣壓迫症狀）——早期即可出現並持續。\n- **屬晚期／進展期的表現**：\n  - Skin ulceration（皮膚潰瘍）：象皮病／末期皮膚破損才出現。\n  - Tissue thickening（組織增厚／纖維化）：慢性纖維脂肪沉積後才明顯。\n- 故僅 **A、C、D** 為各期皆可出現。","peropt":{"A":"◎正確：沉重感各期皆可出現。","B":"錯誤：皮膚潰瘍屬晚期（象皮病）表現。","C":"◎正確：神經壓迫症狀各期皆可出現。","D":"◎正確：疼痛/不適各期皆可出現。","E":"錯誤：組織增厚（纖維化）屬慢性進展期表現。"},"cite":"Neligan Plastic Surgery 5e, Lymphedema clinical presentation","conflict":""},{"id":"7069","sub":"L5","src":"NG","years":[114],"stem":"Which of the following statements regarding donor sites for vascularized lymph node transplant are correct? (複選)","opts":{"A":"The supraclavicular donor site has a risk of chyle leak.","B":"The submental donor site carries a risk of marginal mandibular nerve injury.","C":"The groin donor site has no risk of donor site lymphedema.","D":"The omental donor site requires intra-abdominal surgery.","E":"The lateral thoracic donor site provides a large skin paddle and has a known anatomy."},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：VLNT（vascularized lymph node transfer）供區特性（ans=ABDE）。\n- **A supraclavicular**：有 **chyle leak（胸管乳糜漏）** 風險——正確。\n- **B submental**：位近下頜緣，有 **marginal mandibular nerve** 損傷風險——正確。\n- **C groin（腹股溝）**：**確實有**供區下肢淋巴水腫（iatrogenic donor-site lymphedema）風險，可用 reverse lymphatic mapping 降低風險；故「無風險」**錯誤**，不選。\n- **D omental（大網膜）**：需**腹腔內手術**（腹腔鏡/開腹）取瓣，帶有腹腔併發症風險——正確。\n- **E lateral thoracic（外側胸壁）**：可提供**大皮島**且**解剖明確**——正確。","peropt":{"A":"◎正確：supraclavicular 供區有 chyle leak 風險。","B":"◎正確：submental 供區有 marginal mandibular nerve 損傷風險。","C":"錯誤：groin 供區**仍有**供區下肢淋巴水腫風險，非無風險。","D":"◎正確：omental 供區需腹腔內手術取瓣。","E":"◎正確：lateral thoracic 供區可提供大皮島且解剖明確。"},"cite":"Neligan Plastic Surgery 5e, Vascularized lymph node transfer donor sites","conflict":""},{"id":"7070","sub":"L3","src":"NG","years":[114],"stem":"Which of the following muscle or neurovascular structures are correctly paired with their respective leg compartments? (複選)","opts":{"A":"Tibialis anterior — Anterior compartment","B":"Superficial fibular (peroneal) nerve — Lateral compartment","C":"Flexor hallucis longus — Superficial posterior compartment","D":"Tibial nerve — Deep posterior compartment","E":"Anterior tibial artery — Lateral compartment"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯考點（複選）：小腿四個 compartment 的肌肉與神經血管配對（ans=ABD）。\n- **Anterior compartment**：Tibialis anterior、EHL、EDL、fibularis tertius；**deep fibular nerve**；**anterior tibial artery**。\n- **Lateral compartment**：fibularis longus/brevis；**superficial fibular (peroneal) nerve**（無主要動脈，由 peroneal 穿枝供應）。\n- **Superficial posterior**：gastrocnemius、soleus、plantaris。\n- **Deep posterior**：tibialis posterior、FDL、**FHL**；**tibial nerve**；posterior tibial 與 peroneal arteries。\n- 判讀：A（TA-anterior）✓、B（superficial fibular n.-lateral）✓、D（tibial n.-deep posterior）✓；**C 錯**（FHL 屬 deep posterior，非 superficial posterior）；**E 錯**（anterior tibial artery 屬 anterior，非 lateral）。","peropt":{"A":"◎正確：Tibialis anterior 屬 anterior compartment。","B":"◎正確：Superficial fibular (peroneal) nerve 屬 lateral compartment。","C":"錯誤：FHL 屬 **deep posterior** compartment，非 superficial posterior。","D":"◎正確：Tibial nerve 走行於 deep posterior compartment。","E":"錯誤：Anterior tibial artery 屬 **anterior** compartment，非 lateral。"},"cite":"Leg compartment anatomy; Neligan Plastic Surgery 5e, Lower extremity anatomy","conflict":""},{"id":"7071","sub":"L6","src":"NG","years":[114],"stem":"Which of the following statements regarding the pathophysiology and management of diabetic foot ulcers (DFUs) is incorrect?","opts":{"A":"Sensory neuropathy in diabetes typically follows a “glove and stocking” distribution, initially affecting the distal toes and fingers.","B":"Autonomic neuropathy may lead to plantar fat pad atrophy and decreased sweat production.","C":"Identification of equinus deformity includes assessment of passive ankle dorsiflexion with the subtalar joint locked.","D":"Diabetic patients with peripheral arterial disease (PAD) have increased risk of major lower extremity amputation.","E":"Revascularization via angioplasty or bypass is unnecessary in most cases of chronic limb-threatening ischemia."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯考點：糖尿病足潰瘍（DFU）病理生理與處置。\n- **感覺神經病變**：呈「glove and stocking」分佈，先侵犯遠端趾／指端。\n- **自律神經病變**：可致足底脂肪墊萎縮、汗腺分泌減少（皮膚乾裂）。\n- **Equinus deformity 評估**：subtalar joint 鎖定下測被動踝背屈（Silfverskiöld test 概念）。\n- **PAD 與截肢**：糖尿病合併周邊動脈疾病者，重大下肢截肢風險增加。\n- **E 不正確**：對於**慢性肢體威脅性缺血（CLTI）**，血流重建（angioplasty 或 bypass）是**必要且關鍵**的，並非「多數情況不需要」；缺血未矯正傷口難癒合、截肢率高，故 E 錯。","peropt":{"A":"正確：感覺神經病變呈 glove-and-stocking、先犯遠端趾指。","B":"正確：自律神經病變致足底脂肪墊萎縮與汗液減少。","C":"正確：equinus 評估於 subtalar joint 鎖定下測被動踝背屈。","D":"正確：糖尿病合併 PAD 者重大截肢風險增加。","E":"◎不正確（即本題答案）：CLTI 多數情況血流重建為必要，非不需要。"},"cite":"Neligan Plastic Surgery 5e, Diabetic foot ulcer; Global Vascular Guidelines (CLTI)","conflict":""},{"id":"7073","sub":"L4","src":"NG","years":[115],"stem":"關於 lymphedema 的診斷與治療，下列哪些敘述正確？(複選)","opts":{"A":"complete decongestive therapy 通常包含皮膚照護、manual lymphatic drainage、compression 與運動","B":"lymphoscintigraphy 或 indocyanine green lymphography 可協助評估淋巴功能與治療規劃","C":"感染、放射線治療與肥胖均可能使 lymphedema 風險增加或惡化","D":"晚期 lymphedema 可因纖維化及脂肪沉積而呈 non-pitting edema","E":"Stage 0 表示淋巴運輸完全正常，且未來不會發生水腫"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯【考點：淋巴水腫診斷與治療原則】\n■ Complete Decongestive Therapy (CDT) 為第一線保守治療，含四要素：skin care、manual lymphatic drainage (MLD)、multilayer compression bandage/garment、decongestive exercise。分為 intensive (reduction) 與 maintenance 兩階段。\n■ 影像評估：\n• Lymphoscintigraphy 為傳統標準檢查，評估淋巴輸送速率與 dermal backflow。\n• ICG lymphography 可即時分級 (Linear→Splash→Stardust→Diffuse)，指引 LVA 定位與治療規劃。\n■ 危險因子：axillary dissection、放射線治療、感染 (cellulitis)、肥胖 (BMI)、外傷均會誘發或惡化。\n■ 病理演變：早期高蛋白組織液堆積 (pitting)；晚期因慢性發炎→纖維化與脂肪沉積→呈 non-pitting edema，此時單靠內科治療效果有限。\n■ Stage 0 為「潛伏期」：淋巴功能已異常但尚無臨床水腫，未來仍有發病風險，故 E 敘述錯誤。","peropt":{"A":"◎ CDT 確實包含 skin care、MLD、compression 與 exercise 四大要素。","B":"◎ Lymphoscintigraphy 與 ICG lymphography 為評估淋巴功能與手術規劃的核心工具。","C":"◎ 感染、放療、肥胖皆為公認會增加或惡化淋巴水腫的危險因子。","D":"◎ 晚期因纖維化與脂肪沉積而由 pitting 轉為 non-pitting，正確。","E":"Stage 0 是淋巴輸送已受損的潛伏期，未來仍可能發生水腫，敘述錯誤。"},"cite":"ISL Consensus; Neligan 5e Lymphedema; Grabb & Smith 9e","conflict":""},{"id":"7074","sub":"L3","src":"NG","years":[115],"stem":"Which of the following statements regarding lower extremity anatomy is INCORRECT?","opts":{"A":"The pes anserinus consists of the tendons of three muscles: the sartorius, the gracilis, and the semimembranosus.","B":"The medial (adductor) compartment of the thigh is not a true anatomical compartment because it lacks distinct intermuscular septa.","C":"The rectus femoris muscle has a Type II vascular supply.","D":"Regarding thigh muscle innervation, the general rule is \"one compartment, one nerve\": the anterior compartment is innervated by the femoral nerve, the medial by the obturator nerve, and the posterior by the sciatic nerve."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【考點：下肢與大腿解剖 — pes anserinus 與肌肉血供分型】\n■ Pes anserinus（鵝足）由三條肌腱組成，記憶法「Say Grace before Tea」：\n• S — Sartorius（縫匠肌，股神經）\n• G — Gracilis（股薄肌，閉孔神經）\n• T — semiTendinosus（半腱肌，坐骨神經 tibial 分支）\n→ 三者由不同神經支配卻共同止於脛骨近端內側。題幹寫成 semimembranosus（半膜肌）為錯誤，故 A 是「不正確」的敘述（即答案）。\n■ 大腿三腔室與 Mathes-Nahai 血供：\n• Medial (adductor) compartment 缺乏明確肌間隔，非真正的封閉筋膜腔室 (B 正確)。\n• Rectus femoris 為 Type II 血供（主 pedicle：descending branch of LFCA ＋ minor pedicles），B 正確。\n• 「一腔室一神經」原則：前腔室—femoral n.、內側腔室—obturator n.、後腔室—sciatic n.（D 正確）。","peropt":{"A":"◎ 錯誤敘述（即答案）：pes anserinus 應為 sartorius、gracilis、semiTENDINOSUS，而非 semimembranosus。","B":"正確：內收肌群腔室缺乏明確肌間隔，非真正解剖腔室。","C":"正確：rectus femoris 為 Mathes-Nahai Type II 血供。","D":"正確：大腿肌肉遵循「一腔室一神經」— 前 femoral、內 obturator、後 sciatic。"},"cite":"Grabb & Smith 9e Lower Extremity Anatomy; Mathes-Nahai classification","conflict":""},{"id":"7075","sub":"L1","src":"NG","years":[115],"stem":"Which of the following statements regarding lower extremity trauma is INCORRECT?","opts":{"A":"Multidetector computed tomography angiography (MDCTA) is the gold standard for the initial imaging assessment of lower extremity vascular injuries.","B":"Surgical approaches for fasciotomy in the management of lower extremity compartment syndrome include both two-incision and single-incision techniques.","C":"When performing a fasciotomy for compartment syndrome, the two-incision technique provides superior decompression and is associated with significantly fewer complications compared to the single-incision approach.","D":"The absolute indication for fasciotomy in compartment syndrome is a compartment pressure >30 mmHg or <30 mmHg below the diastolic pressure"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【考點：下肢外傷 — 血管影像與 fasciotomy 技術】\n■ MDCTA 為下肢血管損傷「初步影像評估」的黃金標準：快速、非侵入性、可取代大部分傳統血管攝影 (A 正確)。\n■ 腔室症候群 fasciotomy：\n• 小腿四腔室：single-incision（外側單切口）與 two-incision（內外側雙切口）皆為合法術式 (B 正確)。\n• 兩者在減壓完整度與併發症上「並無顯著差異」；single-incision 需較深經驗但可減壓四腔室 → C 宣稱 two-incision「顯著較少併發症」為過度且不實，故 C 為錯誤敘述（即答案）。\n■ Fasciotomy 絕對適應症：compartment pressure > 30 mmHg，或 delta pressure（舒張壓 − 腔室壓）< 30 mmHg（D 正確，臨床上以 delta P 更具參考價值）。","peropt":{"A":"正確：MDCTA 為下肢血管損傷初步影像評估的黃金標準。","B":"正確：小腿 fasciotomy 確有 two-incision 與 single-incision 兩種術式。","C":"◎ 錯誤敘述（即答案）：two-incision 並未證實在減壓或併發症上顯著優於 single-incision。","D":"正確：壓力 >30 mmHg 或 delta pressure <30 mmHg 為 fasciotomy 適應症。"},"cite":"Grabb & Smith 9e Lower Extremity Trauma; compartment syndrome guidelines","conflict":""},{"id":"7076","sub":"L1","src":"NG","years":[115],"stem":"Which of the following statements regarding lower extremity trauma is INCORRECT?","opts":{"A":"MESS score predicts the need for amputation after lower extremity trauma based on the extent of skeletal and soft tissue injury, limb ischemia, shock, and age","B":"Lower Extremity Assessment Project (LEAP) study conclude that there is no valid clinical scoring system that predicte amputation with accuracy","C":"Loss of plantar sensation is an absolute indication for amputation","D":"immediate reconstruction after lower limb trauma is the timing of choice if the general condition of the patient permits"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【考點：下肢外傷評分 MESS／LEAP 與截肢適應症】\n■ MESS (Mangled Extremity Severity Score)：以 skeletal/soft-tissue injury、limb ischemia、shock、age 四項計分，≥7 傳統上預測需截肢 (A 正確)。\n■ LEAP (Lower Extremity Assessment Project) 為劃時代前瞻研究，結論：\n• 現有各種下肢評分系統（MESS、PSI、LSI、NISSSA 等）「均無法可靠地準確預測截肢」(B 正確)。\n• 「足底感覺喪失 (loss of plantar sensation)」曾被視為肢體不可挽救、絕對截肢的指標，但 LEAP 證實：初診足底無感覺者於 2 年後有相當比例「恢復感覺」，故足底感覺喪失「不再是」絕對截肢適應症 → C 為錯誤敘述（即答案）。\n■ 現代重建時機：若病人整體狀況允許，early/immediate（Godina 主張 72 小時內）重建為首選，可降低感染、皮瓣失敗與骨髓炎率 (D 正確)。","peropt":{"A":"正確：MESS 依骨/軟組織損傷、缺血、休克、年齡預測截肢需求。","B":"正確：LEAP 結論為無任何評分系統能準確預測截肢。","C":"◎ 錯誤敘述（即答案）：LEAP 證實足底感覺喪失並非絕對截肢適應症，術後感覺可恢復。","D":"正確：病人狀況允許時，早期/立即重建為首選時機（Godina 原則）。"},"cite":"LEAP Study (Bosse et al., NEJM 2002); Grabb & Smith 9e; Godina 1986","conflict":""},{"id":"7077","sub":"L5","src":"NG","years":[115],"stem":"A 55-year-old female presents with secondary right upper extremity lymphedema for 4 years following an axillary lymph node dissection and radiation therapy for breast cancer. Physical examination reveals a hard, non-pitting edema (solid-predominance) with intact skin. Preoperative imaging and evaluation demonstrate the following: ICG lymphography shows a diffuse stardust dermal backflow pattern; MRI reveals that the excess limb volume is almost entirely dominated by fat hypertrophy and fibrosis. Based on the current treatment algorithm for lymphedema, what is the most appropriate primary surgical intervention?","opts":{"A":"Immediate supermicrosurgical lymphaticovenular bypass (LVB) to restore lymphatic drainage.","B":"Debulking liposuction, as it is \"the only method to completely reduce a non-pitting chronic lymphedema where the excess volume is dominated by adipose tissue.\"","C":"Vascularized lymph node transplant (VLNT), because the transplanted nodes will \"deliver growth factors such as VEGF-C to the recipient site.\"","D":"The Chen-modified Charles procedure, which involves \"circumferential excision of the fibrosclerotic lymphedematous tissue down to the deep fascia."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：慢性脂肪型淋巴水腫的手術演算法 — 抽脂 (debulking liposuction)】\n■ 病人特徵解讀：4 年慢性續發性淋巴水腫、hard non-pitting (solid-predominance)、ICG 呈 diffuse stardust（晚期 dermal backflow）、MRI 顯示過剩體積「幾乎全由脂肪肥厚與纖維化構成」→ 屬 fat-dominant, non-fluid 晚期淋巴水腫。\n■ 治療演算法邏輯：\n• 液體為主 (fluid-predominant, pitting)、ICG 早期 linear/splash → 生理性手術：LVA/LVB 或 VLNT。\n• 脂肪為主 (solid/fat-predominant, non-pitting) → 生理性手術無法移除已沉積脂肪；需 debulking liposuction（Brorson 技術）為唯一能完全減除脂肪過剩體積的方法，術後須終生穿戴壓力衣。\n■ 故本題最適當的「主要」手術為 B（debulking liposuction）。\n■ C 引言雖屬實（VLNT 分泌 VEGF-C 促淋巴新生）但不適用於脂肪為主之晚期；D Charles procedure 為破壞性、併發症高，僅保留給極末期象皮病。","peropt":{"A":"LVB 為生理性手術，適用液體為主早期水腫，無法移除已沉積的脂肪組織。","B":"◎ 脂肪為主的慢性 non-pitting 淋巴水腫，debulking liposuction 為唯一能完全減除過剩脂肪體積的方法。","C":"VLNT 引言（分泌 VEGF-C）本身正確，但屬生理性手術，對脂肪主導之晚期無效。","D":"Chen-modified Charles procedure 為破壞性末期手術，併發症高，非此脂肪型病人的首選主要術式。"},"cite":"Brorson liposuction protocol; Neligan 5e Surgical treatment of lymphedema; Cheng's lymphedema algorithm","conflict":""},{"id":"7078","sub":"L2","src":"NG","years":[115],"stem":"A 40-year-old male sustains a high-energy crush injury with an open fracture in the middle-to-lower third of his lower leg following a severe motorcycle accident. After completing external skeletal fixation and multiple extensive debridements, you are preparing to perform a free flap reconstruction. Considering the \"zone of injury\" created by the high-energy trauma, which of the following clinical decisions regarding recipient vessel selection and microvascular anastomosis technique best aligns with current evidence-based guidelines?","opts":{"A":"Angiography is the gold standard for evaluating the extent of microvascular injury; therefore, routine preoperative angiography should be performed for such severe trauma to determine the anastomosis site.","B":"According to Godina's principles, an \"end-to-end anastomosis\" is strongly recommended in lower extremity free flap reconstruction to avoid flow disturbances caused by vessel mismatch.","C":"Intraoperative clinical evaluation of the recipient vessel's wall pliability and the quality of pulsatile flow from the transected end is more important than the physical distance from the wound edge.","D":"If anatomical constraints necessitate an end-to-end arterial anastomosis, skin flaps should be preferred over muscle flaps because skin flaps have lower vascular resistance, allowing them to effectively absorb the high arterial flow of the lower extremity."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【考點：高能量下肢外傷 free flap — zone of injury 與受區血管選擇】\n■ Zone of injury 概念：高能量創傷會造成損傷區血管內膜傷害、痙攣傾向與周邊組織纖維化，吻合應選在「損傷區之外」健康血管。\n■ 現代實證重點：\n• 決定吻合位置的關鍵不是「與傷口的固定距離」，而是「術中直接評估血管品質」— 管壁柔軟度 (pliability)、切端搏動性噴血 (pulsatile spurting flow) 與內膜完整度 → C 正確。\n• 血管攝影並非評估微血管損傷的黃金標準，也不需常規術前施行；MDCTA 用於評估主幹血管而非 microvascular；A 錯誤。\n• Godina 原則強調早期重建與吻合於損傷區外，並未「強烈建議」一律 end-to-end；於單一主幹或血流不足時 end-to-side 可保留遠端灌流，B 過度絕對而錯誤。\n• 「皮瓣 vs 肌肉瓣吸收高血流」之血流阻力論述缺乏實證，D 為杜撰。","peropt":{"A":"血管攝影非微血管損傷的黃金標準，也不需常規術前施行，敘述錯誤。","B":"Godina 未強制一律 end-to-end；於主幹單一時 end-to-side 可保遠端灌流，過度絕對。","C":"◎ 術中評估血管管壁柔軟度與搏動性噴血品質，比距傷口的固定距離更重要。","D":"「皮瓣阻力較低可吸收高動脈血流」為缺乏實證的錯誤推論。"},"cite":"Godina M. 1986; Grabb & Smith 9e Lower Extremity Reconstruction","conflict":""},{"id":"7079","sub":"L3","src":"NG","years":[115],"stem":"A 55-year-old male requires an above-knee amputation following severe trauma. You plan to prophylactically perform a Regenerative Peripheral Nerve Interface (RPNI) on the sciatic nerve to prevent the formation of a symptomatic neuroma. Regarding the RPNI surgical design for such a large-caliber nerve and its underlying physiological considerations, which of the following clinical decisions is the most appropriate?","opts":{"A":"To ensure all regenerating axons are captured, a single, very thick and bulky free muscle graft (greater than 1.5 cm thick) should be harvested to completely wrap the entire main trunk of the sciatic nerve stump.","B":"Interfascicular dissection must first be performed to separate the sciatic nerve into 3 to 4 fascicular groups, and a separate RPNI should be created for each fascicular group using free skeletal muscle grafts no more than 0.5 cm thick.","C":"To minimize operative time and donor site morbidity, a single standard-sized free muscle graft (0.5 cm thick) should be wrapped directly around the unseparated main trunk of the sciatic nerve, as the signal amplification effect of the muscle cells is sufficient to absorb all regenerating axons.","D":"The sciatic nerve is a mixed nerve, and the RPNI mechanism is only effective for pure sensory nerves; therefore, RPNI should be abandoned for the sciatic nerve in favor of traditional traction neurectomy."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：大口徑坐骨神經的 RPNI 設計】\n■ Regenerative Peripheral Nerve Interface (RPNI)：以「去神經化的自由骨骼肌移植片」包覆神經斷端，再生軸突長入肌肉並形成新的神經肌肉接合，防止神經瘤並可作為肌電訊號界面。\n■ 大口徑混合神經（如 sciatic）設計原則：\n• 必須先行 interfascicular dissection，將坐骨神經分成 3–4 個 fascicular groups，「每一束」各做一個獨立 RPNI。\n• 每片 free skeletal muscle graft 厚度 ≤ 0.5 cm，過厚會導致移植片「中央缺血壞死」(游離肌片靠周邊血漿浸潤與再血管化存活)。\n→ 故 B 正確。\n■ A、C 用單一整條主幹包覆（且 A 用 >1.5 cm 過厚 bulky graft）會造成中央壞死、無法有效捕捉所有軸突。D 誤稱 RPNI 僅對純感覺神經有效（實際對混合神經同樣有效），錯誤。","peropt":{"A":"單片 >1.5 cm 過厚肌片包覆整條主幹會中央缺血壞死，設計錯誤。","B":"◎ 先 interfascicular dissection 分成 3–4 束，每束各做一個 ≤0.5 cm 厚 free muscle graft 的 RPNI，最適當。","C":"單片標準肌片直接包整條未分離主幹，無法捕捉大口徑神經全部軸突，敘述錯誤。","D":"RPNI 對混合神經（含坐骨神經）同樣有效，不應改採 traction neurectomy。"},"cite":"Kubiak/Kung/Cederna RPNI protocols; Grabb & Smith 9e Neuroma management","conflict":""},{"id":"7080","sub":"L2","src":"NG","years":[115],"stem":"A 10-year-old boy underwent a wide tumor resection for Ewing sarcoma of the left femur, resulting in a 15-cm intercalary diaphyseal defect. Assuming amputation is not considered and maximal preservation of knee joint function is desired, which of the following surgical reconstructive strategies for this massive, weight-bearing bone defect best aligns with literature recommendations to provide both \"immediate mechanical stability\" and \"long-term biologic healing and prevention of stress fractures\"?","opts":{"A":"Reconstruction with a massive frozen allograft alone, as its excellent osteogenic capacity allows for rapid fusion with the host bone and adaptation to high weight-bearing stress.","B":"A double-barrel vascularized fibular flap, creating a double-strut graft to double the diameter, which is the sole gold standard because it can easily span a 15-cm defect.","C":"Direct bridging with a single vascularized fibular flap, as it undergoes rapid hypertrophy to match the femoral diameter, preventing stress fractures without the need for prolonged postoperative protection.","D":"The Capanna technique (massive allograft combined with a vascularized free fibula bone graft), utilizing the allograft for initial mechanical support while the internal fibular flap provides long-term biologic viability, remodeling capacity, and durable bony union."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【考點：大段承重骨缺損重建 — Capanna technique】\n■ 情境：10 歲 Ewing sarcoma，股骨 15 cm intercalary diaphyseal 缺損，需同時提供「立即機械穩定」與「長期生物性癒合、抗壓力性骨折」。\n■ Capanna technique（allograft ＋ vascularized free fibula「內插」複合重建）：\n• 大段 allograft 提供即時機械支撐與匹配股骨的直徑/皮質厚度；\n• 內置 vascularized fibula 提供活體血運，促進骨癒合、remodeling、抗疲勞骨折，並在 allograft 吸收/骨折時提供生物性補救 → 兩者互補，為大段承重缺損的理想選擇 (D 正確)。\n■ 各項駁斥：\n• A allograft 為「無活性」結構性移植，無 osteogenic 能力，易 nonunion/骨折/感染。\n• B double-barrel fibula 增加直徑但非「唯一黃金標準」，且承重骨仍需長期保護。\n• C 單條 vascularized fibula 雖會 hypertrophy，但初期強度不足，承重前仍需長時間保護，宣稱「無需保護」錯誤。","peropt":{"A":"Massive allograft 為無活性結構性移植，缺乏 osteogenic 能力，易 nonunion 與骨折。","B":"Double-barrel fibula 可增直徑但非唯一黃金標準，承重股骨仍需長期保護。","C":"單條 vascularized fibula 初期強度不足，承重前仍需長期保護，敘述錯誤。","D":"◎ Capanna technique（allograft ＋ 內插 vascularized fibula）兼具即時機械穩定與長期生物癒合，最符合文獻建議。"},"cite":"Capanna R. et al.; Grabb & Smith 9e Vascularized bone reconstruction","conflict":""},{"id":"7081","sub":"L2","src":"NG","years":[115],"stem":"50-year-old diabetic patient with a history of severe Charcot midfoot collapse recently developed a 4x4 cm deep ulcer on the plantar heel due to repetitive friction, complicated by partial calcaneal exposure and chronic osteomyelitis. Following debridement and antibiotic therapy, the wound base is now clean and ready for coverage. After evaluating the patient's foot anatomy, angiosomes, and biomechanics, which of the following clinical decisions regarding flap reconstruction is the most appropriate?","opts":{"A":"Although the medial plantar artery flap provides excellent glabrous, weight-bearing tissue, its use in this patient is relatively contraindicated because the Charcot midfoot collapse has caused the instep to become a primary weight-bearing surface.","B":"The abductor digiti minimi (ADM) muscle flap has a robust blood supply primarily derived from the \"medial plantar artery\" and is the gold standard for covering medial and plantar heel defects.","C":"While the reverse sural artery flap can be used for heel reconstruction, its blood supply originates from perforators of the \"anterior tibial artery\", and intraoperative arterial spasm is common, whereas the risk of venous congestion is extremely low.","D":"The extensor digitorum brevis (EDB) muscle flap has a large arc of rotation, easily allowing a 180-degree transposition to completely cover plantar heel defects, and its donor site can be closed primarily without affecting shoe wear."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Charcot 足併慢性骨髓炎的足跟皮瓣選擇 — angiosome 與生物力學】\n■ 情境重點：糖尿病 ＋ 嚴重 Charcot midfoot collapse，足跟蹠面 4×4 cm 深潰瘍併跟骨外露與慢性骨髓炎。Charcot 中足塌陷使「instep（足弓內側）變成主要承重面」。\n■ Medial plantar artery (instep) flap 提供理想的 glabrous、耐磨承重組織，是足跟蹠面重建的優良選擇；但在此病人因 Charcot 塌陷已使 instep 成為主承重面，取此供區將犧牲一個新的承重面 → 為「相對禁忌」，故 A 正確。\n■ 其餘錯誤：\n• B：ADM 肌瓣血供來自 lateral plantar artery（非 medial），且僅適合小的內/外側跟部缺損，非黃金標準。\n• C：reverse sural flap 血供來自 peroneal artery 的 septocutaneous perforators（非 anterior tibial），且靜脈鬱血 (venous congestion) 風險相當高。\n• D：EDB 肌瓣體積小、弧度有限，無法有效覆蓋蹠側足跟。","peropt":{"A":"◎ Medial plantar flap 雖為理想承重組織，但 Charcot 塌陷已使 instep 成主承重面，取此供區為相對禁忌。","B":"ADM 肌瓣血供主要來自 lateral plantar artery（非 medial），且非足跟覆蓋的黃金標準。","C":"Reverse sural flap 血供源自 peroneal artery perforators（非 anterior tibial），且靜脈鬱血風險並不低。","D":"EDB 肌瓣體積小、弧度有限，無法完整覆蓋蹠側足跟缺損。"},"cite":"Attinger angiosome concept; Grabb & Smith 9e Foot & ankle reconstruction","conflict":""},{"id":"7082","sub":"L5","src":"NG","years":[115],"stem":"When planning a Vascularized Lymph Node Transplant (VLNT) for a patient with extremity lymphedema, selecting the appropriate donor site and preventing iatrogenic secondary lymphedema are critical. Based on the surgical anatomy and current consensus, which of the following statements quoting the literature regarding VLNT donor sites are correct? (複選)","opts":{"A":"Supraclavicular flap: \"Given the presence of the thoracic duct on the left, the right neck donor site is preferred.\"","B":"Groin flap: To maximize the lymphatic tissue transplanted, the surgeon should intentionally harvest the nodes that \"lie medial to the superficial inferior epigastric vessels, in a deeper plane, and inferior to the inguinal ligament.\"","C":"Submental flap: This donor site requires careful dissection because \"there is some risk of injury to the facial nerve (marginal mandibular branch) and submandibular gland.\"","D":"Lateral thoracic flap: \"This flap has been most strongly associated with iatrogenic lymphedema, and therefore, reverse mapping [using technetium-99-labeled albumin or ICG] is advocated.\"","E":"Intra-abdominal donor sites (Omental flap): This flap provides an \"abundance of lymphatic and soft tissue, pliability, long vascular pedicle, and no risk of iatrogenic lymphedema.\""},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：VLNT 供區選擇與醫源性續發淋巴水腫預防】\n■ VLNT 供區與各自風險：\n• Supraclavicular flap：因胸管 (thoracic duct) 位於左側頸部，取「右頸」較安全，可降低乳糜漏／醫源性上肢水腫 (A 正確)。\n• Groin (inguinal) flap：為避免破壞下肢引流淋巴結，應取「淺層、位於 SIE 血管外側、腹股溝韌帶上方」的表淺鼠蹊淋巴結；B 敘述取「內側、深層、韌帶下方」正是下肢引流結，會誘發下肢水腫，故 B 錯誤。\n• Submental flap：需小心 facial nerve marginal mandibular branch 及頜下腺損傷 (C 正確)。\n• Lateral thoracic flap：最易造成醫源性上肢淋巴水腫，故強烈建議 reverse mapping（Tc-99m／ICG）(D 正確)。\n• Omental / intra-abdominal flap：淋巴與軟組織豐富、蒂長、柔軟，且「無醫源性肢體淋巴水腫風險」(E 正確)。\n■ 故正確為 ACDE。","peropt":{"A":"◎ 胸管位於左側，故 supraclavicular 供區偏好取右頸以降低乳糜漏風險。","B":"錯誤：應取淺層、SIE 血管外側、腹股溝韌帶上方的表淺結；取內側深層韌帶下方會誘發下肢水腫。","C":"◎ Submental flap 需注意 facial nerve marginal mandibular branch 與頜下腺損傷。","D":"◎ Lateral thoracic flap 最易導致醫源性上肢淋巴水腫，故倡議 reverse mapping。","E":"◎ Omental flap 淋巴軟組織豐富、蒂長、柔軟，且無醫源性肢體淋巴水腫風險。"},"cite":"Neligan 5e VLNT donor sites; reverse lymphatic mapping (Dayan/Cheng)","conflict":""},{"id":"7083","sub":"L2","src":"NG","years":[115],"stem":"In the management of complex lower extremity wounds complicated by chronic osteomyelitis, thorough debridement and providing well-vascularized tissue coverage are the keys to success. Regarding the surgical treatment principles for osteomyelitis and the anatomical characteristics and applications of common lower extremity muscle/skin flaps, which of the following statements are correct? (複選)","opts":{"A":"The standard treatment principles for chronic osteomyelitis include complete resection of involved bone, obliteration of dead space, flap coverage with vascularized tissue, and a brief course of antibiotic treatment.","B":"To achieve the best long-term remission rate for osteomyelitis, it is \"absolutely necessary\" to use muscle flaps for coverage, as literature proves fasciocutaneous flaps cannot effectively control the infection.","C":"The gastrocnemius muscle has a type I circulation pattern and provides reliable coverage to the knee regions and the upper third of the tibia.","D":"The soleus muscle has a type I circulation pattern; therefore, it has a large arc of rotation and is particularly suitable for covering extensive defects in the proximal (upper third) lower extremity.","E":"A propeller flap is defined as an \"island flap that reaches the recipient site through an axial rotation\". The skin island may be safely rotated up to 180 degrees."},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：慢性骨髓炎治療原則與下肢肌/皮瓣特性】\n■ 慢性骨髓炎標準治療四原則：徹底切除受累死骨、消除死腔 (dead space obliteration)、以「有血運組織」覆蓋、加上適當抗生素療程 (A 正確；現代趨勢在徹底清創＋血運皮瓣下抗生素療程可較短)。\n■ 「肌瓣 vs 筋膜皮瓣」：文獻並未證明筋膜皮瓣無法控制感染；良好清創與血運覆蓋才是關鍵，故 B「絕對必須用肌瓣」為錯誤絕對化敘述。\n■ 下肢肌肉血供 (Mathes-Nahai)：\n• Gastrocnemius：Type I（單一 sural artery），覆蓋膝周與脛骨「上 1/3」(C 正確)。\n• Soleus：Type II 血供（非 Type I），為脛骨「中 1/3」的主力肌瓣，弧度有限、不適合近端大缺損；D 稱其 Type I 且適合近端大缺損，錯誤。\n■ Propeller flap：定義為透過「軸向旋轉 (axial rotation)」到達受區的島狀皮瓣，可安全旋轉達 180 度 (E 正確)。\n■ 故正確為 ACE。","peropt":{"A":"◎ 慢性骨髓炎治療含徹底切除死骨、消除死腔、血運組織覆蓋與抗生素療程。","B":"錯誤：文獻未證明筋膜皮瓣無法控制感染，「絕對必須用肌瓣」過度絕對。","C":"◎ Gastrocnemius 為 Type I 血供，可靠覆蓋膝周與脛骨上 1/3。","D":"錯誤：Soleus 為 Type II（非 Type I），適合脛骨中 1/3 而非近端大缺損。","E":"◎ Propeller flap 為經軸向旋轉到達受區的島狀皮瓣，可安全旋轉達 180 度。"},"cite":"Cierny-Mader osteomyelitis; Mathes-Nahai classification; Grabb & Smith 9e","conflict":""},{"id":"7084","sub":"L3","src":"NG","years":[115],"stem":"A 45-year-old patient with a previous left below-knee amputation (BKA) is referred to your clinic for severe residual limb pain (RLP) and phantom limb pain (PLP) corresponding to a specific dermatome. You are evaluating whether the patient is a suitable candidate for Targeted Muscle Reinnervation (TMR). Regarding the diagnostic logic for lower extremity neuromas, comorbidity management, and TMR surgical principles, which of the following statements are correct? (複選)","opts":{"A":"Utilizing an ultrasound-guided local peripheral nerve block in the clinic that results in a greater than 50% reduction in pain is an important clinical criterion for establishing the diagnosis of a \"symptomatic neuroma\" and screening appropriate candidates for surgery.","B":"To maximally preserve the muscle function and soft-tissue coverage of the residual limb, TMR surgery should mandate an \"end-to-side anastomosis,\" coapting the stump of the affected sensory nerve to the sidewall of an undivided motor nerve.","C":"When selecting a donor motor target in a BKA, smaller, deeper muscles that contribute less to soft-tissue padding should be preferentially selected over muscles critical for optimal peritibial padding.","D":"If the patient's clinical presentation meets the Budapest Criteria for Complex Regional Pain Syndrome (CRPS), the centralization of their pain serves as an \"absolute contraindication\" for TMR surgery.","E":"To prevent \"axonal escape,\" the entire coaptation can be anchored to the muscle at the target neuromuscular junction, or augmented by wrapping a free muscle graft around the coaptation to provide a combined TMR and RPNI effect."},"ans":"ACE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：BKA 後神經瘤診斷邏輯與 TMR 原則】\n■ 診斷「症狀性神經瘤」：超音波導引局部周邊神經阻斷後疼痛「> 50% 緩解」，是確立診斷與篩選手術候選者的重要臨床標準 (A 正確)。\n■ TMR 手術原則：\n• TMR 為將「切斷之感覺/混合神經斷端」與「一條已切斷之運動神經 (denervated motor nerve) 的斷端」行 end-to-END coaptation，使再生軸突有新肌肉標的；B 稱「end-to-side、接於未切斷運動神經側壁」為錯誤描述。\n• 供區運動標的選擇：優先選「較小、較深、對軟組織襯墊貢獻少」的肌肉之運動支，以保留 peritibial padding 與殘肢功能 (C 正確)。\n• CRPS（符合 Budapest criteria）並非 TMR 的「絕對禁忌」；TMR/周邊神經手術對部分 CRPS 疼痛仍可能有幫助，D 錯誤。\n• 防止「axonal escape」：可將 coaptation 錨定於標的肌肉的神經肌肉接合處，或以 free muscle graft 包覆 coaptation 形成 TMR＋RPNI 合併效果 (E 正確)。\n■ 故正確為 ACE。","peropt":{"A":"◎ 神經阻斷後疼痛 >50% 緩解為診斷症狀性神經瘤與篩選手術候選者的重要標準。","B":"錯誤：TMR 為 end-to-end coapt 至已切斷之運動神經斷端，而非接於未切斷運動神經側壁。","C":"◎ 應優先選較小、較深、對軟組織襯墊貢獻少的肌肉運動支，以保留 peritibial padding。","D":"錯誤：CRPS 並非 TMR 的絕對禁忌，部分病人仍可獲益。","E":"◎ 可將 coaptation 錨定於神經肌肉接合處，或以 free muscle graft 包覆形成 TMR＋RPNI 以防 axonal escape。"},"cite":"Dumanian/Souza TMR; Budapest CRPS criteria; Grabb & Smith 9e","conflict":""},{"id":"7085","sub":"L1","src":"NG","years":[115],"stem":"When foot infection or ischemia is too severe for limb salvage, a high-quality \"functional below-knee amputation (BKA)\" can significantly improve the patient's postoperative ambulation and survival rates. Regarding BKA surgical decision-making, flap design, and nerve/bone management techniques, which of the following statements are correct? (複選)","opts":{"A":"The use of a \"posterior myocutaneous flap (PMF)\" is strongly recommended for stump closure, as it provides durable soft-tissue coverage.","B":"During the management of the nerve stumps, performing Targeted Muscle Reinnervation (TMR) on the saphenous, superficial peroneal, and posterior tibial nerves significantly reduces postoperative residual limb pain and phantom limb pain.","C":"To enhance the stability of end-bearing and the transfer of rotational torque to the prosthesis, an Ertl modification can be performed, which utilizes a \"vascularized tibial bone graft\" to transversely bridge the gap between the tibia and fibula.","D":"For patients with severe acute infections or gas gangrene, to shorten the hospital stay and minimize the number of surgeries, a \"one-stage\" definitive BKA with immediate primary closure is the preferred choice.","E":"When performing the bony resections for a BKA, the fibula should be cut approximately 1.5 to 2 cm shorter than the tibia, and its distal end should be beveled from lateral to medial to avoid creating a bony prominence."},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"🎯【考點：功能性 BKA 手術決策、皮瓣設計與神經/骨處理】\n■ 皮瓣設計：強烈建議採「posterior myocutaneous flap (PMF, Burgess 長後皮瓣)」，以腓腸肌後側肌皮瓣提供耐用、血運佳的殘端軟組織覆蓋 (A 正確)。\n■ 神經處理：對 saphenous、superficial peroneal、posterior tibial（及 sural、deep peroneal）神經行 TMR，可顯著降低術後殘肢痛 (RLP) 與幻肢痛 (PLP) (B 正確)。\n■ 骨處理：\n• Ertl modification（osteomyoplasty）以「骨膜/骨橋」在脛腓骨遠端間建立 tibiofibular synostosis（骨橋），增加末端承重穩定與旋轉扭力傳遞；C 稱「vascularized tibial bone graft 橫向橋接」描述不精確（Ertl 用骨膜成骨的骨橋，非取一段活體脛骨移植），故 C 錯誤。\n• 標準骨切：fibula 應比 tibia 短約 1.5–2 cm，脛骨前緣需做斜切 (anterior bevel)，腓骨遠端亦削斜以避免骨突 (E 敘述之腓骨處理正確)。\n■ 感染/氣性壞疽：應行「分階段」清創與開放處理，不可一階段一期縫合，D 錯誤。\n■ 故正確為 ABE。","peropt":{"A":"◎ 建議採 posterior myocutaneous flap（長後皮瓣）提供耐用血運佳的殘端覆蓋。","B":"◎ 對 saphenous、superficial peroneal、posterior tibial 等神經行 TMR 可顯著減少 RLP 與 PLP。","C":"錯誤：Ertl 為以骨膜/骨橋建立脛腓 synostosis，非「取一段 vascularized tibial bone graft 橫向橋接」的描述。","D":"錯誤：嚴重感染/氣性壞疽應分階段清創與開放處理，不可一階段一期縫合。","E":"◎ 腓骨較脛骨短 1.5–2 cm，其遠端由外向內削斜以避免骨突，處理正確。"},"cite":"Burgess long posterior flap; Ertl osteomyoplasty; Grabb & Smith 9e Amputation","conflict":""},{"id":"7086","sub":"L6","src":"NG","years":[115],"stem":"What is the typical distribution pattern of sensory neuropathy in patients with diabetic foot?","opts":{"A":"Dermatomal distribution","B":"Glove and stocking distribution","C":"Proximal to distal distribution","D":"Random asymmetric distribution","E":"Single nerve root distribution"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯【考點：糖尿病足周邊感覺神經病變分布型態】\n■ Diabetic peripheral neuropathy 為長度依賴型 (length-dependent) 對稱性多發神經病變 (distal symmetric polyneuropathy)：\n• 最長的神經纖維最早受累，故由「肢體最遠端」對稱地向近端進展。\n• 典型呈「手套-襪套 (glove and stocking) 分布」— 先足趾/足部，較晚才影響手部。\n■ 病理：高血糖致 polyol pathway、AGEs、microvascular（vasa nervorum）缺血→軸突退化。\n■ 臨床意義：保護性感覺喪失 (loss of protective sensation, LOPS) 是足潰瘍與 Charcot 的重要危險因子，需以 10-g Semmes-Weinstein monofilament 篩檢。\n■ 故答案為 B（glove and stocking distribution）；dermatomal、單一神經根或隨機不對稱型皆非典型糖尿病神經病變。","peropt":{"A":"Dermatomal 分布屬神經根病變，非糖尿病對稱性多發神經病變的表現。","B":"◎ 糖尿病足感覺神經病變呈長度依賴的手套-襪套 (glove and stocking) 對稱分布。","C":"「近端到遠端」方向相反；糖尿病神經病變是由遠端向近端進展。","D":"隨機不對稱型多見於血管炎/多發性單神經炎，非典型糖尿病多發神經病變。","E":"單一神經根分布屬 radiculopathy，非糖尿病對稱性多發神經病變。"},"cite":"IWGDF; Grabb & Smith 9e Diabetic foot; distal symmetric polyneuropathy","conflict":""},{"id":"7087","sub":"L6","src":"NG","years":[115],"stem":"Total contact casting (TCC) is the gold standard for off-loading. What is a major clinical limitation of this device?","opts":{"A":"It increases peak plantar pressure.","B":"It allows excessive ankle joint mobility.","C":"It accommodates severe daily leg swelling.","D":"It impairs daily visual inspection of the wound.","E":"It is easily removed by non-compliant patients."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯【考點：Total Contact Cast (TCC) 減壓的臨床限制】\n■ TCC 為神經病變性糖尿病足潰瘍 off-loading 的黃金標準：\n• 以全接觸石膏將壓力重新分布至整個足與小腿，顯著「降低」前足/中足潰瘍的 peak plantar pressure，並強制病人遵從（不可自行移除）。\n■ 主要臨床限制：\n• 石膏封閉包覆使「無法每日直接檢視傷口 (impairs daily visual inspection)」，可能延誤發現感染惡化或新壓瘡；此為最主要限制 (D 正確)。\n• 其他缺點：需技術純熟者施作、包覆下若滲液/腫脹變化可能造成新的摩擦傷、行走平衡與睡眠不便。\n■ 駁斥其他：A 錯（TCC 是降低而非增加峰值壓力）；B 錯（其固定腳踝、限制活動）；C 錯（不佳，若嚴重每日腫脹反而是使用禁忌/需重打）；E 錯（TCC 為 non-removable，正因病人無法自行移除才確保遵從）。","peropt":{"A":"錯誤：TCC 是降低而非增加 peak plantar pressure。","B":"錯誤：TCC 固定並限制踝關節活動，而非允許過度活動。","C":"錯誤：嚴重每日腿部腫脹反而是 TCC 的使用限制/禁忌，需重新打石膏。","D":"◎ TCC 封閉包覆使無法每日直接檢視傷口，為其主要臨床限制。","E":"錯誤：TCC 為不可移除裝置，病人無法自行移除正是其確保遵從的優點。"},"cite":"IWGDF offloading guidelines; Grabb & Smith 9e Diabetic foot","conflict":""},{"id":"7088","sub":"L6","src":"NG","years":[115],"stem":"Following this specific level of partial foot amputation, the residual foot is at a high risk for developing a predictable biomechanical deformity due to the loss of both the long digital extensor tendons and the insertion of the peroneus brevis tendon. If prophylactic soft-tissue balancing is not performed, which of the following deformities is most commonly anticipated?","opts":{"A":"Rigid calcaneovalgus deformity","B":"Flexible pes planus (flatfoot)","C":"Equinovarus deformity","D":"Forefoot supinatus","E":"Isolated dorsal contracture"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【考點：部分足截肢後可預期的生物力學畸形 — Chopart／Lisfranc level】\n■ 題幹關鍵：喪失「long digital extensor tendons」與「peroneus brevis 止點」→ 指向 Chopart (midtarsal) 或 tarsometatarsal 高位部分足截肢。\n■ 肌力失衡機轉：\n• 失去 extensor digitorum longus／tibialis anterior 的背屈力 → 後方 gastrocsoleus (Achilles) 相對無拮抗 → equinus（馬蹄，蹠屈）。\n• 失去 peroneus brevis 的外翻力 → tibialis posterior 相對無拮抗 → varus（內翻）。\n→ 合併為「equinovarus deformity」，殘足呈蹠屈內翻，導致外側殘端過度承重與潰瘍 (C 正確)。\n■ 預防：需行預防性軟組織平衡 — 阿基里斯腱延長 (TAL/gastrocnemius recession) 及肌腱轉位（如 tibialis anterior 轉位）以對抗畸形。\n■ 駁斥：A calcaneovalgus、B pes planus、D forefoot supinatus、E 單純背側攣縮 均非此肌力失衡的典型結果。","peropt":{"A":"Rigid calcaneovalgus 與此肌力失衡方向相反，非預期畸形。","B":"Flexible pes planus 非高位部分足截肢後的典型肌力失衡結果。","C":"◎ 失去背屈與外翻力，後方跟腱與 tibialis posterior 無拮抗，形成 equinovarus deformity。","D":"Forefoot supinatus 為前足代償變化，非此截肢後的主要可預期畸形。","E":"單純背側攣縮不符；主要問題為 equinus（蹠屈）合併 varus。"},"cite":"Grabb & Smith 9e Partial foot amputation; Chopart biomechanics","conflict":""},{"id":"7089","sub":"L6","src":"NG","years":[115],"stem":"According to the 2019 International Working Group on the Diabetic Foot (IWGDF) practical guidelines, offloading interventions are vital to promote the healing of diabetic foot ulcers. What is the first-choice offloading treatment for neuropathic forefoot or midfoot ulcers?","opts":{"A":"Removable ankle-high offloading devices.","B":"Custom-molded therapeutic footwear with felted foam.","C":"Non-removable knee-high offloading devices.","D":"Removable knee-high offloading devices.","E":"Surgical offloading interventions involving metatarsal head resection."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯【考點：2019 IWGDF 減壓指引 — 神經病變性前/中足潰瘍首選】\n■ 2019 IWGDF (International Working Group on the Diabetic Foot) 減壓 (offloading) 建議層級：\n• 第一線（首選）：「non-removable knee-high offloading device」— 即 Total Contact Cast (TCC) 或改為不可移除的 knee-high walker。因不可移除，確保病人遵從性，減壓效果與癒合率最佳。\n• 第二線：若有禁忌（如感染、缺血、無法接受）→ 改用 removable knee-high device。\n• 第三線：removable ankle-high device。\n• 治療性鞋具、felted foam、手術減壓（如蹠骨頭切除）為輔助或難治/復發個案的選項。\n■ 故神經病變性前足/中足潰瘍的首選為 C（non-removable knee-high offloading device）。\n■ 駁斥：A、D 為次選（可移除或 ankle-high）；B 為輔助；E 為手術性減壓，非第一線非手術首選。","peropt":{"A":"Removable ankle-high device 為第三線，非首選。","B":"Custom footwear ＋ felted foam 為輔助手段，非第一線減壓首選。","C":"◎ 2019 IWGDF 首選為 non-removable knee-high offloading device（TCC 或不可移除步行靴）。","D":"Removable knee-high device 為第二線（首選有禁忌時才用）。","E":"蹠骨頭切除為手術性減壓，屬難治/復發個案選項，非第一線非手術首選。"},"cite":"IWGDF 2019 Guidelines on offloading; Bus et al.","conflict":""}];
const LS='lga_all_v3', LSv2='lga_all_v2', LSv1='lga_all_v1';
const SUBS={"L1":"下肢外傷：分級·評分·截肢決策（Gustilo/LEAP/MESS/salvage vs amputation/時機）","L2":"下肢軟組織重建與皮瓣（按zone皮瓣選擇：gastrocnemius/soleus/reverse sural/free flap/thigh）","L3":"下肢解剖·周邊神經·功能重建（cross-section解剖/peroneal/nerve compression/painful neuroma）","L4":"淋巴水腫：病生理·診斷·分期·影像","L5":"淋巴外科治療（LVA/VLNT/liposuction/debulking/生理性手術）","L6":"糖尿病足·慢性傷口·會陰重建"};
const SUBORDER=Object.keys(SUBS);
const DIDX={};DATA.forEach((q,i)=>DIDX[q.id]=i+1);
const DAY=864e5;
// ===== FSRS-6 排程 =====
const FW=[0.212,1.2931,2.3065,8.2956,6.4133,0.8334,3.0194,0.001,1.8722,0.1666,0.796,1.4835,0.0614,0.2629,1.6483,0.6014,1.8729,0.5425,0.0912,0.0658,0.1542];
const REQ_R=0.90;                 // 目標記憶留存率
const DECAY=-FW[20], FACTOR=Math.pow(0.9,1/DECAY)-1;
const MASTERED_S=21;              // 穩定度≥21天視為「已掌握」
const clampD=d=>Math.min(10,Math.max(1,d));
const clampS=s=>Math.min(36500,Math.max(0.01,s));
const initS=G=>clampS(FW[G-1]);
const initD=G=>clampD(FW[4]-Math.exp(FW[5]*(G-1))+1);
function nextD(D,G){let d=D-FW[6]*(G-3)*(10-D)/9;const d0e=FW[4]-Math.exp(FW[5]*3)+1;return clampD(FW[7]*d0e+(1-FW[7])*d);}
const retr=(t,S)=>Math.pow(1+FACTOR*t/S,DECAY);
const interval=S=>Math.max(1,Math.round((S/FACTOR)*(Math.pow(REQ_R,1/DECAY)-1)));
function sRecall(D,S,R,G){const hard=G===2?FW[15]:1,easy=G===4?FW[16]:1;return clampS(S*(Math.exp(FW[8])*(11-D)*Math.pow(S,-FW[9])*(Math.exp(FW[10]*(1-R))-1)*hard*easy+1));}
function sForget(D,S,R){return clampS(FW[11]*Math.pow(D,-FW[12])*(Math.pow(S+1,FW[13])-1)*Math.exp(FW[14]*(1-R)));}
function sShort(S,G){return clampS(S*Math.exp(FW[17]*(G-3+FW[18]))*Math.pow(S,-FW[19]));}
// 依「作答對錯＋信心度」推導 FSRS 評級：錯=Again(1)；對+沒把握=Hard(2)；對+普通=Good(3)；對+有把握=Easy(4)
function gradeOf(ok,conf){return !ok?1:(conf==='l'?2:(conf==='h'?4:3));}
function fsrsReview(p,G,now){
  if(!p||p.S===undefined){const S=initS(G),D=initD(G);return {D,S,reps:1,lapses:G===1?1:0,last:now,due:now+interval(S)*DAY};}
  const t=Math.max(0,(now-(p.last||now))/DAY),R=retr(t,p.S);
  const D=nextD(p.D,G);let S;
  if(G===1)S=sForget(p.D,p.S,R);
  else if(t<1)S=sShort(p.S,G);
  else S=sRecall(p.D,p.S,R,G);
  return {D,S,reps:(p.reps||0)+1,lapses:(p.lapses||0)+(G===1?1:0),last:now,due:now+interval(S)*DAY};
}
// 舊 schema {n,s,m,f,w,due} → v3
function migrateEntry(op){
  const SRlegacy=[1,3,7,16,30];
  const seedS=op.w?1:SRlegacy[Math.min(op.s||0,4)];
  return {D:5,S:seedS,reps:op.n||1,lapses:op.w?1:0,last:Date.now(),due:op.due||Date.now()+seedS*DAY,
    f:(op.f!==undefined?op.f:null),n:op.n||1,postC:0,postN:0,conf:null,w:!!op.w};
}
function normalizeP(P){for(const id in P){const e=P[id];if(e&&e.S===undefined&&(e.s!==undefined||e.n!==undefined))P[id]=migrateEntry(e);}return P;}

let S={P:{},star:{},note:{},last:null,shuffle:true};
let pool=[], idx=0, sel=new Set(), locked=false, mode='home', curCat=null, curType=null;
let orderMap={}, addedRetry=new Set();

function load(){
  try{const r=localStorage.getItem(LS);if(r){const o=JSON.parse(r);S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}catch(e){}
  // 自 v2(固定間隔模型)遷移 → FSRS，保留 star/note
  try{if(!Object.keys(S.P).length){const r2=localStorage.getItem(LSv2);if(r2){const o=JSON.parse(r2);const op=o.P||{};for(const id in op)S.P[id]=migrateEntry(op[id]);S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}}catch(e){}
  // 自 v1(status模型)遷移
  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}
}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));flash();}catch(e){const s=document.getElementById('save');if(s)s.textContent='(存檔受限,請匯出)';}}
function flash(){const s=document.getElementById('save');if(!s)return;s.textContent='✓ 已存檔';setTimeout(()=>s.textContent='自動存檔',900);}
const rec=id=>S.P[id];
const mastered=p=>!!p&&p.S>=MASTERED_S&&!p.w;
const seenN=()=>Object.keys(S.P).length;
const masteredN=()=>{let n=0;for(const k in S.P)if(mastered(S.P[k]))n++;return n;};
const firstAcc=()=>{const v=Object.values(S.P).filter(p=>p.f!==null&&p.f!==undefined);if(!v.length)return null;let f=0;v.forEach(p=>{if(p.f)f++;});return Math.round(f/v.length*100);};
const postAcc=()=>{let c=0,n=0;for(const k in S.P){c+=S.P[k].postC||0;n+=S.P[k].postN||0;}return n?Math.round(c/n*100):null;};
const starIds=()=>Object.keys(S.star).filter(id=>S.star[id]);
const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!mastered(S.P[id]));
const dueIds=()=>{const n=Date.now();return Object.keys(S.P).filter(id=>S.P[id].due&&S.P[id].due<=n);};
const hfList=()=>DATA.filter(isHF);
const conflictList=()=>DATA.filter(q=>q.conflict);
// 錯題四型：盲區(有把握卻錯)>死穴(屢錯≥3)>新錯(近3天)>易忘(其餘/低穩定)
function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}
const TYPES=['盲區','死穴','新錯','易忘'];
const TYPEDESC={'盲區':'有把握卻答錯（最該優先）','死穴':'反覆遺忘（≥3次）','新錯':'近三天內答錯','易忘':'記憶穩定度偏低'};
function wrongTypeCounts(){const c={盲區:0,死穴:0,新錯:0,易忘:0};wrongActiveIds().forEach(id=>{const t=wrongType(S.P[id]);if(t)c[t]++;});return c;}

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(mastered(p))m++;if(p.w&&!mastered(p))w++;}}
  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function optOrder(q){const base=Object.keys(q.opts).sort();if(!S.shuffle)return base;if(!orderMap[q.id])orderMap[q.id]=shuffle(base.slice());return orderMap[q.id];}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='wrongtype'){const w=new Set(wrongActiveIds().filter(id=>wrongType(S.P[id])===curType));pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}
  else if(mode==='cat'){pool=DATA.filter(q=>q.sub===curCat);}
  else if(mode==='hf'){pool=hfList();}
  else if(mode==='conflict'){pool=conflictList();}
  else if(mode==='due'){const d=dueIds();const set=new Map(d.map(id=>[id,S.P[id].due]));pool=DATA.filter(q=>set.has(q.id));pool.sort((x,y)=>set.get(x.id)-set.get(y.id));}
  else pool=DATA.slice();
  if(idx>=pool.length)idx=0;if(idx<0)idx=0;
}
function hdr(){
  const seen=seenN(),mast=masteredN(),T=DATA.length;
  tot.textContent=T;sc.textContent=mast;
  const fa=firstAcc();acc.textContent=fa==null?'正確率 —':('首答正確率 '+fa+'%');
  document.getElementById('pseen').style.width=(seen/T*100)+'%';
  document.getElementById('pmast').style.width=(mast/T*100)+'%';
  document.getElementById('lseen').textContent='已作答 '+seen;
  document.getElementById('lmast').textContent='已掌握 '+mast;
  wc.textContent=' ('+wrongActiveIds().length+')';stc.textContent=' ('+starIds().length+')';
  const hs=document.getElementById('hsub');
  if(mode==='cat'&&curCat)hs.textContent='子類 '+curCat+' · '+SUBS[curCat];
  else if(mode==='wrongcat')hs.textContent='錯題 · '+curCat+' '+SUBS[curCat];
  else if(mode==='wrongtype')hs.textContent='錯題 · '+curType;
  else if(mode==='all')hs.textContent='全部 '+DATA.length+' 題';
  else if(mode==='due')hs.textContent='今日複習佇列';

  else if(mode==='conflict')hs.textContent='爭議／分歧題';
  else hs.textContent='下肢·淋巴水腫·糖尿病足 81 題';
  const tabm=(mode==='wrong'||mode==='wrongcat'||mode==='wrongtype'||mode==='wronghome')?'wrong':(['home','all','star','data'].includes(mode)?mode:'');
  for(const[id,m]of[['tabHome','home'],['tabAll','all'],['tabWrong','wrong'],['tabStar','star'],['tabData','data']])

function ensureSkip(){let sk=document.getElementById('skip');if(!sk){const fin=document.querySelector('.foot .in');const pk=document.getElementById('pick');sk=document.createElement('button');sk.id='skip';sk.className='icon';sk.textContent='跳過 ⏭';sk.title='不評分，直接下一題';sk.onclick=()=>{if(!locked)next();};fin.insertBefore(sk,pk);}return sk;}
function peck(o){if(locked)return;const L=o.dataset.l,q=pool[idx];
  if(q.multi){sel.has(L)?(sel.delete(L),o.classList.remove('sel')):(sel.add(L),o.classList.add('sel'));}
  else{sel.clear();document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));sel.add(L);o.classList.add('sel');}}

function hideConfidence(){const bar=document.getElementById('confbar');if(bar){bar.style.display='none';bar.innerHTML='';}

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,wrongtype:'錯題 '+curType,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();hideConfidence();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
