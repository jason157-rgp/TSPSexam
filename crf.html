t": "", "key": "**Crouzon 是顱縫早閉症候群，不以唇顎裂為表現**。其餘四者皆與裂顎高度相關：Van der Woude（IRF6，下唇窩）、DiGeorge（22q11.2，常黏膜下裂顎）、PRS（約半數裂顎）、外胚層發育不良。", "peropt": {"A": "◎ 正解：Crouzon 少有唇顎裂。", "B": "✗ VWS 是最常見的症候群性唇顎裂。", "C": "✗ DiGeorge 常合併黏膜下裂顎與顎咽功能不全。", "D": "✗ PRS 約 50% 合併裂顎。", "E": "✗ 外胚層發育不良常合併裂。"}}, {"id": "3078", "sub": "B", "src": "NG", "years": [105], "stem": "Which of the followings about palatoplasty is correct?", "opts": {"A": "The normal palate serves several important functions, all related to functional separation of the oropharynx from the nasopharynx.", "B": "The driving force for palatoplasty is the development of normal speech.", "C": "Surgical technique and timing of palate repair are two crucial aspects important in optimal speech outcome.", "D": "Victor Veau noted that children who undergone repair between 2 and 4 years of age were much more likely to have normal speech than thos with repair before 12 months.", "E": "Most would agree that the best speech results are correlated with closure of the palate near the time of the infant's beginning language acquisition, which for the normal-developing child is before 12 months."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B08-Q03", "conflict": "", "key": "⚠ **此題原檔答案可疑，標為待複查。** 選項 D（Veau 觀察 2–4 歲修補者語言優於 12 個月前）與選項 E（12 個月前修補語言最佳）**互相矛盾**，兩者不可能同時成立。原檔答案為 D。\n**現代共識與 E 一致**：顎裂修補應在語言習得開始前（約 9–12 個月）完成。作答錨定該年答案，概念請記 E 的方向。", "peropt": {"A": "敘述『all related to』過度絕對（正常顎亦與耳咽管功能有關）。", "B": "顎裂修補的驅動力確為正常語言發展。", "C": "術式與時機同為語言結果的關鍵。", "D": "◎ 原檔答案（歷史陳述，Veau 早期觀察）。", "E": "⚠ 與現代共識相符：語言習得前（<12 個月）修補結果最佳。"}}, {"id": "3079", "sub": "B", "src": "NG", "years": [105], "stem": "Which of the followings about the principle and surgical concepts of unilateral cheiloplasty is incorrect?", "opts": {"A": "No dissection over the maxilla", "B": "Rotation of the cupid's bow without back-cut", "C": "Reconstruction of deficient vermilion beneath cleft-side cupid's bow", "D": "Postoperative splinting of the nostril with a silicon conformer to limit the effects of wound contracture", "E": "Definition of alar groove is rarely considered."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B08-Q06", "conflict": "", "key": "單側唇裂修補的核心原則裡，**alar groove 的重建是必須考慮的**（決定鼻翼外形）。其餘四項（不剝離上頜、無 back-cut 旋轉、重建裂側唇紅、術後鼻模支撐）皆為 Mulliken 式修補的標準原則。", "peropt": {"A": "✓ 不在上頜骨面剝離。", "B": "✓ Cupid's bow 旋轉不做 back-cut。", "C": "✓ 重建裂側 Cupid's bow 下方缺損的唇紅。", "D": "✓ 術後以矽膠鼻模支撐，對抗傷口攣縮。", "E": "◎ 正解（不正確）：alar groove 的定義與重建不可忽略。"}}, {"id": "3080", "sub": "B", "src": "NG", "years": [105], "stem": "Which of the followings is the most important examination to evaluate postoperative velopharyngeal function after cleft palate surgery?", "opts": {"A": "Pressure flow measurements", "B": "Nasopharyngeal endoscopy", "C": "Cinefluoroscopy", "D": "Perceptual speech evaluation", "E": "All of above are important"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B08-Q07", "conflict": "", "key": "顎裂術後顎咽功能評估的**第一步且最重要者是 perceptual speech evaluation（聽知覺語言評估）**。所有儀器檢查（鼻咽鏡、影像、壓力流量）都是在語言評估發現異常後，用來定位縫隙形態與擬定術式的工具。", "peropt": {"A": "壓力流量測量為輔助定量。", "B": "鼻咽鏡用於看縫隙形態、決定術式。", "C": "Cinefluoroscopy 為影像輔助。", "D": "◎ 正解：聽知覺語言評估是起點與核心。", "E": "雖皆有用，但題問『最重要』。"}}, {"id": "3081", "sub": "B", "src": "NG", "years": [106], "stem": "有關cleft lip/palate的overall treatment plan,下列何者不正確?", "opts": {"A": "nasoalveolar molding通常在出生後1~6 週做", "B": "在超過3個月大的小孩做術前的nasoalveolar molding,還是有不錯的效果", "C": "lip surgery通常在小孩3~4個月大做", "D": "palate surgery通常在小孩9個月~1歲時做", "E": "alveolar bone grafting常須等到7~9歲大"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B06-Q06", "conflict": "", "key": "唇顎裂治療時程表（背熟）：**NAM 出生後 1–6 週**（利用母體雌激素使軟骨可塑，過了此窗口效果大減）→ **唇修補 3–4 個月** → **顎修補 9–12 個月** → **齒槽骨移植 7–9 歲**（尖牙萌發前，牙根形成 1/2–2/3 時）。", "peropt": {"A": "✓ NAM 於出生後 1–6 週。", "B": "◎ 正解（不正確）：超過 3 個月大，軟骨可塑性已降低，NAM 效果顯著變差。", "C": "✓ 唇修補 3–4 個月。", "D": "✓ 顎修補 9 個月至 1 歲。", "E": "✓ 齒槽骨移植 7–9 歲。"}}, {"id": "3082", "sub": "B", "src": "NG", "years": [106], "stem": "有關alveolar clefts的敘述，下列何者有誤?", "opts": {"A": "Treatment protocols have varied in timing, technique, and selection of graft material.", "B": "Grafting at the time of primary dentition is practiced by relatively few centers.", "C": "The iliac crest cancellous bone graft is considered the gold standard for the donor sources.", "D": "The gold standard is secondary bone grafting with autogenous cancellous graft at the time of mixed dentition.", "E": "The central incisor tooth is often missing."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B06-Q08", "conflict": "", "key": "齒槽裂最常缺失的是**側門齒（lateral incisor）**，不是中門齒。黃金標準：**混合齒列期**（尖牙萌發前）以**髂骨鬆質骨**行次級骨移植。", "peropt": {"A": "✓ 各中心在時機、術式、材料上仍有差異。", "B": "✓ 乳牙期植骨僅少數中心採行。", "C": "✓ 髂骨鬆質骨為捐贈部位的黃金標準。", "D": "✓ 混合齒列期次級自體鬆質骨移植為黃金標準。", "E": "◎ 正解（有誤）：常缺失的是**側**門齒，非中門齒。"}}, {"id": "3083", "sub": "B", "src": "NG", "years": [106], "stem": "關於surgical treatment of velopharyngeal dysfunction, 最不建議的procedure是:", "opts": {"A": "Posterior pharyngeal wall augmentation", "B": "Sphincter pharyngoplasty", "C": "Posterior pharyngeal flap", "D": "Furlow double-opposing Z-palatoplasty", "E": "Orticochea pharyngoplasty"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B06-Q09", "conflict": "", "key": "VPD 手術中，**posterior pharyngeal wall augmentation（後咽壁填充）最不建議**——填充材料易位移、吸收，長期效果不可預測。其餘四者皆為主流術式。", "peropt": {"A": "◎ 正解：後咽壁填充效果不持久，最不建議。", "B": "✓ 括約肌咽成形術。", "C": "✓ 後咽壁瓣。", "D": "✓ Furlow 雙反向 Z 成形。", "E": "✓ Orticochea 咽成形術。"}}, {"id": "3084", "sub": "B", "src": "NG", "years": [107], "stem": "Which is the goal of treatment of the alveolar cleft?", "opts": {"A": "Stable bone continuity of maxillary arch", "B": "Separation of oral and nasal cavities", "C": "Appropriate maxillary arch form and transverse width", "D": "Stable environment for eruption of cleft-side canine", "E": "All of them"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B08-Q06", "conflict": "", "key": "齒槽裂治療的四大目標**同時成立**：上頜弓骨性連續、口鼻腔分隔、恢復弓形與橫向寬度、為裂側**尖牙**萌發提供穩定骨床。", "peropt": {"A": "◎ 上頜弓骨性連續。", "B": "◎ 口鼻腔分隔（關閉瘻管）。", "C": "◎ 恢復弓形與橫向寬度。", "D": "◎ 裂側尖牙萌發的穩定環境。", "E": "◎ 正解：以上皆是。"}}, {"id": "3085", "sub": "B", "src": "NG", "years": [108, 112], "stem": "若父母兩人皆無唇顎裂，但第一個孩子有唇裂及顎裂，則下一個孩子有唇顎裂的機會多高？", "opts": {"A": "與父母有無唇顎裂較有關，與孩子有無唇顎裂無影響。", "B": "4%", "C": "8%", "D": "17%", "E": "25%"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q07", "conflict": "", "key": "唇顎裂再發風險三個數字，務必分清**誰患病**：\n父母皆正常＋1 名患兒 → **4%**\n父母皆正常＋2 名患兒 → **9%**（見 CN3068）\n**一位父母患病**＋1 名患兒 → **17%**（見 CN3090）", "peropt": {"A": "✗ 兩者皆有影響，此為誘答。", "B": "◎ 正解：4%。", "C": "✗ 8% 非標準值。", "D": "✗ 17% 為『父母之一患病＋一名患兒』。", "E": "✗ 25% 為體染色體隱性遺傳的比例，非此處。"}}, {"id": "3086", "sub": "B", "src": "NG", "years": [108, 112], "stem": "Posterior pharyngeal flap 為correction of velopharyngeal dysfunction最古老的手術方之一，其常見的complications包括?（複選）", "opts": {"A": "Bleeding", "B": "Dehiscence", "C": "Nasal airway obstruction", "D": "Obstructive sleep apnea", "E": "Hoarseness"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q08", "conflict": "", "key": "Posterior pharyngeal flap 的併發症全部與**出血、裂開、鼻氣道阻塞**相關，其中 **OSA 是最須警覺者**。**聲音沙啞（hoarseness）不是**——它與喉部無關。此題與 CN3096 為同題正反問法。", "peropt": {"A": "◎ 出血。", "B": "◎ 瓣裂開。", "C": "◎ 鼻氣道阻塞。", "D": "◎ 阻塞型睡眠呼吸中止。", "E": "✗ 聲音沙啞非本術式併發症。"}}, {"id": "3087", "sub": "B", "src": "NG", "years": [109], "stem": "下列關於雙側唇裂(bilateral cleft lip)的重建原則，何者不正確？", "opts": {"A": "Maintain nasolabial symmetry. Even the slightest differences between the two sides of the lip and nose will become more obvious with growth.", "B": "Secure muscular continuity. Construction of a complete oral ring permits normal labial function, eliminates lateral bulges, and minimizes philtral distortion and interalar widening", "C": "Design the philtral flap of proper size and shape. The philtrum rapidly elongates and widens, particularly at the columellar–labial junction.", "D": "Construct the median tubercle using central vermilion–mucosal elements.", "E": "Position the slumped/splayed lower lateral cartilages and sculpt excess soft tissue in nasal tip and columella."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q04", "conflict": "", "key": "雙側唇裂的中央唇珠（median tubercle）必須用**兩側唇的外側組織（lateral labial elements）**建構——因為 **prolabium 沒有 white roll、也沒有正常唇紅**。用中央唇紅黏膜去做，日後必然萎縮變薄。", "peropt": {"A": "✓ 維持鼻唇對稱，微小差異會隨生長放大。", "B": "✓ 建立完整口輪匝肌環。", "C": "✓ 人中瓣尺寸須預留生長（人中會迅速變長變寬）。", "D": "◎ 正解（不正確）：應取**外側**唇組織建構中央唇珠。", "E": "✓ 復位塌陷外展的下外側鼻軟骨。"}}, {"id": "3088", "sub": "B", "src": "NG", "years": [109, 111, 114], "stem": "下列關於cleft palate的敘述,下列何者不正確? (複選)", "opts": {"A": "Normal speech is the primary goal of cleft palate repair; minimizing effects of maxillary growth is also important but ultimately secondary.", "B": "Cleft palate repair after 1 year of age results in better speech outcomes than earlier repairs.", "C": "Eustachian tube function is abnormal in cleft patients due to abnormal position of levator veli palatini muscle.", "D": "The levator palatini and other pharyngeal muscles are derived from the third branchial arch and are innervated primarily by cranial nerve V (trigeminal).", "E": "Pierre Robin described the triad of micrognathia, glossoptosis, and respiratory distress."}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q05", "conflict": "", "key": "兩個破綻：①顎裂修補**越晚語言越差**（應在 12 個月前）；②**levator veli palatini 來自第四鰓弓、由迷走神經（咽叢）支配**——只有 **tensor veli palatini** 例外，來自第一鰓弓、由三叉神經 V3 支配。這組「一個例外」是最愛考的細節。", "peropt": {"A": "✓ 正常語言為首要目標，上頜生長影響次之。", "B": "◎ 不正確：1 歲後修補語言結果較差。", "C": "✓ 提顎帆肌位置異常 → 耳咽管功能不良 → 中耳炎。", "D": "◎ 不正確：應為第四鰓弓、迷走神經；三叉神經只管 tensor veli palatini。", "E": "✓ Robin 三徵：小頜、舌根後移、呼吸窘迫。"}}, {"id": "3089", "sub": "B", "src": "NG", "years": [109, 111, 114], "stem": "下列關於Velopharyngeal dysfunction(VPD) 的敘述，何者正確？ (複選)", "opts": {"A": "Velopharyngeal dysfunction (VPD) may lead to hypernasality, nasal air emission, and compensatory articulation errors.", "B": "Cinefluoroscopy must be completed as part of a standard preoperative evaluation to allow for direct visualization of the velopharyngeal mechanism during speech and surgical planning.", "C": "Velopharyngeal insufficiency is the first major diagnostic category of VPD.", "D": "The most common congenital structural defects associated with VPD are cleft palate and submucosal cleft palate.", "E": "Common complications after Furlow Z-palatoplasty include bleeding, oronasal fistula, and hoarseness."}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q06", "conflict": "", "key": "VPD 的診斷三分類：**insufficiency（結構不足）、incompetence（神經肌肉）、mislearning（學習性）**。最常見的先天結構缺陷是裂顎與黏膜下裂顎。Cinefluoroscopy **並非必做**；Furlow 術後也**不會**造成聲音沙啞。", "peropt": {"A": "◎ 高鼻音、鼻漏氣、代償性構音錯誤。", "B": "✗ Cinefluoroscopy 非標準必要檢查。", "C": "◎ Insufficiency 為第一大診斷類別（結構性）。", "D": "◎ 裂顎與黏膜下裂顎為最常見先天結構缺陷。", "E": "✗ 聲音沙啞非 Furlow 併發症（見 CN3086）。"}}, {"id": "3090", "sub": "B", "src": "NG", "years": [110], "stem": "若父母其中一人有唇裂及顎裂，第一個孩子也有唇裂及顎裂，則下一個孩子有唇顎裂的機會多高？", "opts": {"A": "與父母有無唇顎裂較有關，與孩子有無唇顎裂無影響。", "B": "4%", "C": "8%", "D": "17%", "E": "25%"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q03", "conflict": "", "key": "與 CN3085 成對記憶：**一位父母患病 ＋ 一名患兒 → 17%**。風險隨「受影響的一級親屬數目」上升，與是父母或手足無關——這是多因子遺傳的特徵。", "peropt": {"A": "✗ 兩者皆有影響。", "B": "✗ 4% 為父母皆正常＋一名患兒。", "C": "✗ 8% 非標準值。", "D": "◎ 正解：17%。", "E": "✗ 25% 為孟德爾隱性遺傳比例。"}}, {"id": "3091", "sub": "B", "src": "NG", "years": [110], "stem": "下列何種velopharyngeal dysfuction的病童最適合接受Furlow double opposing Z palatoplasty? (複選)", "opts": {"A": "Unrepaired submucosal cleft palate", "B": "Patients who have undergone cleft palate repair without levator muscle reconstruction, muscles were found to be horizontally oriented", "C": "Patients who have undergone cleft palate repair without levator muscle reconstruction, muscles were found to be sagittally oriented", "D": "The velopharngeal gap size were found to be less than 0.5cm", "E": "The velopharngeal gap size exceeds 1cm"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q08", "conflict": "", "key": "Furlow 的原理是把**縱向（sagittal）錯位的提顎帆肌重新導向橫向**，同時延長軟顎。因此適應症是：**肌肉呈矢狀走向、顎咽縫隙小（<0.5 cm）、未修補的黏膜下裂顎**。肌肉已呈橫向（正常）或縫隙 >1 cm 者，Furlow 無效。", "peropt": {"A": "◎ 未修補的黏膜下裂顎。", "B": "✗ 肌肉已呈橫向＝方向正常，Furlow 無從矯正。", "C": "◎ 肌肉呈矢狀走向 → 正是 Furlow 的適應症。", "D": "◎ 顎咽縫隙 <0.5 cm。", "E": "✗ 縫隙 >1 cm 應改用 flap 或 sphincter。"}}, {"id": "3092", "sub": "B", "src": "NG", "years": [110], "stem": "下列何者為Calnan's classic triad describing submucous cleft palate? (複選)", "opts": {"A": "Velopharyngeal insufficiency", "B": "Zona pellucida", "C": "Lateral clear zone", "D": "Bifid uvula", "E": "Palpable notch at posterior hard palate"}, "ans": "BDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q10", "conflict": "", "key": "**Calnan 三徵（黏膜下裂顎）：zona pellucida（軟顎中央半透明帶）、bifid uvula（分叉懸壅垂）、硬顎後緣可觸及的凹痕（notch）**。VPI 是**後果**不是三徵之一——這是本題的陷阱。", "peropt": {"A": "✗ VPI 是黏膜下裂顎可能導致的結果，非三徵成分。", "B": "◎ Zona pellucida。", "C": "✗ 『Lateral clear zone』為杜撰誘答。", "D": "◎ Bifid uvula。", "E": "◎ 硬顎後緣凹痕。"}}, {"id": "3093", "sub": "B", "src": "NG", "years": [111, 114], "stem": "下列關於雙側唇裂(bilateral cleft lip)的重建原則，何者不正確？", "opts": {"A": "Maintain nasolabial symmetry.", "B": "Secure muscular continuity.", "C": "Design the philtral flap of proper size and shape.", "D": "Construct the median tubercle using central vermilion–mucosal elements.", "E": "Position the slumped/splayed lower lateral cartilages and sculpt excess soft tissue in nasal tip and columella."}, "ans": "D", "multi": false, "etype": "ai", "expl": "D : Construct median tubercle from lateral labial elements", "cite": "NG111 · NG111-B08-Q04", "conflict": "", "key": "與 CN3087 同題（精簡版），原檔詳解一句話點破：**中央唇珠取自外側唇組織（lateral labial elements）**。跨 NG111／114 兩年，答案穩定為 D。", "peropt": {"A": "✓ 維持鼻唇對稱。", "B": "✓ 確保肌肉連續。", "C": "✓ 人中瓣尺寸形狀得當。", "D": "◎ 正解（不正確）：應取外側唇組織，非中央唇紅黏膜。", "E": "✓ 復位下外側鼻軟骨、修整鼻尖與鼻柱多餘軟組織。"}}, {"id": "3094", "sub": "B", "src": "NG", "years": [113], "stem": "Which of the following statements about cleft palate are correct? (複選)", "opts": {"A": "The maxillary lateral incisor on the cleft side is absent in 80–90% of cleft patients.", "B": "Pierre Robin described the triad of micrognathia, glossoptosis, and cleft palate.", "C": "Velocardiofacial syndrome, associated with 22q deletions, features a \"bird-like\" facial appearance.", "D": "Best speech results are achieved when the palate is closed before 12 months of age.", "E": "Defects involving both the hard and soft palate are classified in Group II of Veau's classification."}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q04", "conflict": "", "key": "四個正確敘述串起裂顎全景：裂側**側門齒**缺失達 80–90%；VCFS（22q）鳥樣面容；**12 個月前修補語言最佳**；Veau **Group II ＝ 硬顎＋軟顎**（即完整次級顎）。唯一錯誤是 Robin 三徵——**呼吸窘迫**才是第三項，不是裂顎。\n📌 注意：本題 D 明確支持『<12 個月修補語言最佳』，可用以對照 CN3078 原檔答案之疑義。", "peropt": {"A": "◎ 裂側側門齒缺失 80–90%。", "B": "✗ Robin 三徵為小頜、舌根後移、**呼吸窘迫**。", "C": "◎ VCFS（22q11.2）鳥樣面容。", "D": "◎ 12 個月前修補語言結果最佳。", "E": "◎ Veau Group II：侵犯硬顎與軟顎。"}}, {"id": "3095", "sub": "B", "src": "NG", "years": [113], "stem": "Which of the following statements about embryology and epidemiology of cleft lip is incorrect?", "opts": {"A": "The foundational structure of the face is formed between the 4th and 10th weeks post-conception.", "B": "Families with a history of \"cleft lip with or without palate\" or \"cleft palate only\" have a higher likelihood of having another child with the condition compared to the general population.", "C": "The inheritance of cleft lip with or without cleft palate, as well as isolated cleft palate, follows Mendelian genetic principles.", "D": "The frontonasal prominence contributes to the formation of the forehead, the midline of the nose, the central upper lip (philtrum), and the primary palate.", "E": "The medial nasal processes on both sides develop into the central portion of the nose, the central upper lip, the anterior maxilla, and the primary palate."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q10", "conflict": "", "key": "唇顎裂的遺傳是**多因子（multifactorial）**，不遵循孟德爾定律——這是本題唯一破綻。胚胎學要點：**額鼻突 → 前額、鼻中線、人中、原發顎**；**兩側內側鼻突 → 鼻中央、上唇中央、前上頜、原發顎**。", "peropt": {"A": "✓ 顏面基礎結構於受孕後第 4–10 週形成。", "B": "✓ 家族史增加再發風險。", "C": "◎ 正解（不正確）：為多因子遺傳，非孟德爾式。", "D": "✓ 額鼻突的衍生物。", "E": "✓ 內側鼻突的衍生物。"}}, {"id": "3096", "sub": "B", "src": "NG", "years": [114], "stem": "Posterior pharyngeal flap 為correction of velopharyngeal dysfunction最古老的手術方之一，其常見的complications不包括?", "opts": {"A": "Bleeding", "B": "Dehiscence", "C": "Nasal airway obstruction", "D": "Obstructive sleep apnea", "E": "Hoarseness"}, "ans": "E", "multi": false, "etype": "ai", "expl": "Complications of pharyngeal flap surgery include bleeding, dehiscence, and nasal airway obstruction, including obstructive sleep apnea.", "cite": "NG114 · NG114-B08-Q05", "conflict": "", "key": "與 CN3086 為同一題的**反向問法**（『不包括』）。併發症：出血、裂開、鼻氣道阻塞、OSA。**hoarseness 不是**。同一組事實、兩種問法、答案字母完全不同——正是不能背字母的理由。", "peropt": {"A": "✓ 出血（屬併發症）。", "B": "✓ 裂開。", "C": "✓ 鼻氣道阻塞。", "D": "✓ OSA。", "E": "◎ 正解（不包括）：聲音沙啞。"}}, {"id": "3097", "sub": "B", "src": "NG", "years": [114], "stem": "關於單側唇裂的重建，下列何者正確描述其手術原則與變形特徵？", "opts": {"A": "唇裂側的鼻翼基部通常外移，導致鼻翼塌陷", "B": "切割設計大多依照醫師即時判斷與經驗，較少依照標記點操作", "C": "皮膚切口應盡量避開自然解剖接縫線以減少疤痕明顯度", "D": "單側唇裂變形中，非唇裂側的鼻翼基部與鼻柱會偏離中線", "E": "唇裂修補的黏膜、紅唇與白唇（cutaneuous roll）應視為同一解剖單位進行修補"}, "ans": "D", "multi": false, "etype": "ai", "expl": "雖然單側唇裂看起來像是唇裂側的鼻翼基部向外移位，導致鼻變形，但 Mulliken 指出這是視覺錯覺。實際上，非唇裂側的鼻翼基部與鼻柱才是偏離中線，而唇裂側的鼻翼基部僅是後退（retruded），在內外向位置上大致正常。這些解剖偏移與前鼻棘（anterior nasal spine）偏離中線的程度有關，符合 Latham 的胚胎學研究。\n\n(A)錯誤。唇裂側鼻翼不是外移，而是後退，真正偏離的是非唇裂側。\n\n(B)錯誤。文章強調這種手術採用「anatomic subunit approximation」方法，是一種測量為主、依標記點進行的計畫性手術。\n\n(C)錯誤。相反，切口應順著解剖單位的自然接縫設計，這樣疤痕會更不明顯。\n\n(E)錯誤。黏膜、紅唇（vermillion）、白唇（cutaneous roll）應被視為獨立的修補單位，不可視為一體。", "cite": "NG114 · NG114-B08-Q07", "conflict": "", "key": "Mulliken 的視覺錯覺：單側唇裂看起來像**裂側**鼻翼基部外移，實際上**偏離中線的是非裂側的鼻翼基部與鼻柱**；裂側鼻翼基部只是**後退（retruded）**，內外向位置大致正常。此點與前鼻棘偏移程度相關。", "peropt": {"A": "✗ 這正是 Mulliken 所指的錯覺。", "B": "✗ 現代唇裂修補高度依賴解剖標記點。", "C": "✗ 切口應**順著**自然解剖接縫線（如人中脊、鼻翼溝）。", "D": "◎ 正解：非裂側鼻翼基部與鼻柱偏離中線。", "E": "✗ 黏膜、唇紅、白唇為**不同**解剖單位，須分別對位。"}}, {"id": "3098", "sub": "B", "src": "NG", "years": [114], "stem": "關於單側唇裂合併鼻整形手術後的併發症分類，下列何者為正確的描述？", "opts": {"A": "急性併發症多發生於術後數週至數月之間，例如瘢痕增生與針眼肉芽腫", "B": "鼻塞導致的呼吸道阻塞屬於晚期併發症", "C": "鼻托(nasal stent)使用的相關併發症包括感染與壓力性壞死，通常屬於早期併發症", "D": "中臉發育不全多於手術初期即出現，與疤痕無關", "E": "唇裂術後的Cupid’s bow（人中弓）不平衡僅為短期現象，不需手術處理"}, "ans": "C", "multi": false, "etype": "ai", "expl": "唇裂與鼻整形手術後的併發症依發生時間分為：\n\n急性併發症（Acute）：發生於手術後幾天內，可能延長住院時間，如呼吸道阻塞、血腫、麻醉問題與傷口裂開。\n\n早期併發症（Early）：發生於數週至數月內，包括傷口裂開、感染、針眼肉芽腫、瘢痕增生等。鼻托（nasal stent）相關併發症如感染、壓力性壞死、鼻孔底潰爛、軟組織缺損，也屬於此類。\n\n晚期併發症（Late）：出現在數月甚至數年後，多與瘢痕與成長失衡有關，如紅唇不對稱、鼻孔狹窄、人中弓不平衡、中臉發育不良等，常需再次手術矯正，尤其在青春期後可能需要中臉前移術與二次鼻整形。\n\n(A)錯誤。瘢痕增生與針眼肉芽腫屬於早期併發症，不是急性。(B)錯誤。呼吸道阻塞是急性併發症，不是晚期。\n\n(D)錯誤。中臉發育不全屬於晚期併發症，與成長與瘢痕影響有關，並非初期出現。(E)錯誤。人中弓不平衡是常見的晚期變形，常需手術修正。", "cite": "NG114 · NG114-B08-Q08", "conflict": "", "key": "唇裂鼻整形併發症的**時間軸**：\n**急性（術後數日）**＝呼吸道阻塞、血腫、麻醉問題、傷口裂開\n**早期（數週至數月）**＝感染、針眼肉芽腫、瘢痕增生、**鼻托相關的壓力性壞死**\n**晚期**＝中臉發育不全、Cupid's bow 不對稱（皆與疤痕攣縮及生長有關，需二次手術）", "peropt": {"A": "✗ 瘢痕增生與針眼肉芽腫屬**早期**，非急性。", "B": "✗ 呼吸道阻塞屬**急性**。", "C": "◎ 正解：鼻托的感染與壓力性壞死屬早期併發症。", "D": "✗ 中臉發育不全屬晚期，且與疤痕相關。", "E": "✗ Cupid's bow 不對稱常需手術矯正，非短期現象。"}}, {"id": "3099", "sub": "B", "src": "NG", "years": [114], "stem": "關於單側唇裂與鼻整形的初次修復手術，下列何者敘述正確？", "opts": {"A": "初次唇裂手術應避免矯正鼻翼與鼻孔緣位置，以避免過度修正", "B": "Mohler-Cutting 技術僅適用於嚴重寬裂的病患", "C": "NAM（Nasoalveolar molding）為術後修復使用的矯形方法", "D": "初次鼻整形可採取輕微過度矯正，以提高對稱性維持效果", "E": "初次手術中應避免修補鼻底，以避免干擾日後骨移植手術"}, "ans": "D", "multi": false, "etype": "ai", "expl": "初次唇裂與鼻整形的目標是達到唇部與鼻部的長期對稱性，同時將疤痕隱藏於自然解剖單位的邊界處。由於這是整個唇裂治療計畫的第一步，修復品質會影響後續的功能與外觀發展。手術上，初次鼻整形（primary nasal repair）被認為是安全的，並建議對鼻翼基部與鼻孔緣進行「輕度過度矯正」，以減少術後生長與張力導致的回縮。鼻底（nasal floor）應在初次手術中修補，有助於日後齒槽骨移植（alveolar bone graft）的準備。NAM（Nasoalveolar molding鼻齒槽成形術）是術前使用的嬰兒矯形技術，有助於改善鼻與齒槽形態，使後續手術更有效率。Mohler-Cutting 修復法是一種尊重唇部解剖單位的技術，能將疤痕隱藏在自然結構邊界，適用於所有單側唇裂患者，不論裂隙寬度或是否接受過 NAM 矯形。\n\n(A)錯誤。初次鼻整形可輕度過度矯正鼻翼與鼻孔緣，非避免修正。\n\n(B)錯誤。Mohler-Cutting 技術適用於所有單側唇裂患者，不限裂隙寬度。\n\n(C)錯誤。NAM 是術前使用的矯形方法，不是術後。\n\n(D)正確。初次鼻整形可輕微過度矯正鼻翼與鼻孔緣以達較長期的對稱性。\n\n(E)錯誤。應修補鼻底，有助於後續齒槽骨移植。", "cite": "NG114 · NG114-B08-Q09", "conflict": "", "key": "初次唇裂鼻整形的三條原則：**可以且應該同時矯正鼻部**；鼻翼基部與鼻孔緣採**輕度過度矯正**（對抗術後生長與張力造成的回縮）；**鼻底應一併修補**。NAM 是**術前**矯形，不是術後。", "peropt": {"A": "✗ 初次手術即應矯正鼻翼與鼻孔緣，primary rhinoplasty 已證實安全。", "B": "✗ Mohler-Cutting 適用範圍廣，非僅限寬裂。", "C": "✗ NAM 為**術前**（presurgical）矯形。", "D": "◎ 正解：輕度過度矯正以維持長期對稱。", "E": "✗ 鼻底應修補，不會妨礙日後植骨。"}}, {"id": "3100", "sub": "B", "src": "NG", "years": [114], "stem": "下列關於單側唇裂及鼻部畸形之敘述，哪些是正確的?(複選)", "opts": {"A": "唇裂側的紅唇（vermilion）在中線處逐漸變寬。", "B": "完好的那一側，口輪匝肌纖維可能異位附著於前鼻棘、前鼻中隔及內側鼻腳基部。", "C": "唇裂會導致鼻中隔及鼻柱向患側偏移。", "D": "唇裂側的口輪匝肌會異常附著於梨狀孔的骨膜。", "E": "諾德霍夫點（Noordhoff’s point）位於唇裂內側，是紅唇高度最大的地方。"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "(A)錯誤。 「On the medial side, the lip is short, the philtral ridge is flattened, and the vermilion progressively narrows with the cleft margin.」說明唇裂內側的紅唇是隨著靠近裂縫邊緣而逐漸變窄\n\n(B)正確。 「Orbicularis oris muscle fibers are misdirected into the anterior nasal spine, anterior nasal septum, and medial crus footplates on the non-cleft side...」。\n\n(C)錯誤。「Its unopposed pull rotates the greater alveolar segment anteriorly and deviates the nasal septum and columella to the non-cleft side.」說明鼻中隔及鼻柱是向非唇裂側偏移。\n\n(D) 正確。「On the cleft side or lateral lip element, the orbicularis oris inserts abnormally into the periosteum of the piriform aperture.」。\n\n(E)錯誤。「Noordhoff’s point is found along the lateral lip where the vermillion height is greatest...」說明諾德霍夫點位於唇裂的外側。", "cite": "NG114 · NG114-B08-Q12", "conflict": "", "key": "單側唇裂的肌肉異常止點是核心考點：**裂側**口輪匝肌止於**梨狀孔骨膜**；**非裂側（完好側）**止於**前鼻棘、鼻中隔前緣、內側腳基部**。鼻中隔與鼻柱偏向**非裂側**（不是患側）。", "peropt": {"A": "✗ 內側唇紅是越靠近裂緣越**變窄**，非變寬。", "B": "◎ 完好側肌纖維異位附著於前鼻棘、鼻中隔前、內側腳基部。", "C": "✗ 鼻中隔與鼻柱偏向**非裂側**。", "D": "◎ 裂側肌肉異常附著於梨狀孔骨膜。", "E": "✗ Noordhoff's point 位於**外側**唇瓣上唇紅最厚處，非內側。"}}, {"id": "3101", "sub": "B", "src": "NG", "years": [114], "stem": "Which of the following are established operative principles for synchronous nasolabial repair in bilateral cleft lip? (複選)", "opts": {"A": "Primarily focus on creating prominent philtral columns and dimple.", "B": "Ensure maintenance of postoperative symmetry.", "C": "Secure primary muscular continuity.", "D": "Position/secure lower lateral cartilages and sculpt nasal tip and columella.", "E": "Design appropriate philtral size and shape."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "(A) 錯誤。 塑造明顯的人中柱和人中窩並非主要的手術原則。\n\n(B) 正確。維持對稱性是雙側唇裂同步鼻唇修復手術的重要原則之一。\n\n(C)正確。 確保主要肌肉結構的連續性是手術的原則之一。\n\n(D)正確。 需要定位/固定下外側軟骨並雕塑鼻尖和鼻小柱。\n\n(E)正確。 設計適當的人中大小和形狀是手術的原則之一。", "cite": "NG114 · NG114-B08-Q13", "conflict": "", "key": "雙側唇裂同步鼻唇修補的四原則：**對稱、肌肉連續、人中瓣尺寸形狀得當、復位下外側軟骨並雕塑鼻尖鼻柱**。刻意去做出明顯的人中柱與人中窩**不是**原則——那是隨生長自然形成的。", "peropt": {"A": "✗ 塑造明顯人中柱與人中窩並非主要原則。", "B": "◎ 維持術後對稱。", "C": "◎ 確保一期肌肉連續性。", "D": "◎ 定位固定下外側軟骨、雕塑鼻尖與鼻柱。", "E": "◎ 設計適當的人中瓣大小與形狀。"}}, {"id": "3102", "sub": "B", "src": "NG", "years": [115], "stem": "Regarding the goals of lip reconstruction and anatomic considerations, which of the following statements are TRUE? (複選)", "opts": {"A": "The contour and color of the white roll surrounding the vermilion are created by the pars peripheralis fibers of the risorius muscle.", "B": "The lower lip contains three symmetric tubercles and is primarily defined by the presence of the philtrum and Cupid's bow.", "C": "The primary objective of lip reconstruction is the restoration of a functional oral sphincter with adequate oral aperture to enable proper feeding and speech.", "D": "The vermilion is a well-vascularized structure that lacks minor salivary glands and represents the transition from external keratinized to internal non-keratinized squamous epithelium.", "E": "Motor innervation to the orbicularis oris and surrounding muscles of facial expression is controlled by the buccal and marginal mandibular branches of the facial nerve."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q03", "conflict": "", "key": "唇部解剖三個易錯點：**white roll 由口輪匝肌的 pars marginalis 纖維形成**（非 risorius）；**人中與 Cupid's bow 屬上唇**；唇部運動神經來自顏面神經的 **buccal 與 marginal mandibular** 分支。重建首要目標是**功能性口輪匝肌環**與足夠的口裂大小。", "peropt": {"A": "✗ 應為口輪匝肌 pars marginalis，非 risorius。", "B": "✗ 人中與 Cupid's bow 是**上**唇特徵。", "C": "◎ 首要目標：功能性口括約肌與足夠口裂。", "D": "◎ 唇紅血供豐富、無小唾液腺，為角化與非角化鱗狀上皮的過渡帶。", "E": "◎ 運動神經來自 buccal 與 marginal mandibular 分支。"}}, {"id": "3103", "sub": "B", "src": "NG", "years": [115], "stem": "Which of the following statements regarding lower lip reconstruction is TRUE?", "opts": {"A": "Abbe flaps transferred from the upper lip to the lower lip are routinely performed for large lower lip defects because the upper lip is an optimal donor site.", "B": "Due to the lack of a third subunit, the lower lip can easily tolerate primary closure for defects involving up to one-half (50%) of its total width.", "C": "If a lower lip excision or defect abuts the mental crease, a W-plasty may be performed at the inferior base to allow for improved contour and better camouflage of the scar.", "D": "The Bernard-Burow cheiloplasty utilizes vertically based advancement flaps and requires the complete division of all surrounding muscle to close central lower lip defects."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q05", "conflict": "", "key": "下唇重建：缺損 **<30%** 可直接縫合（不是 50%）；缺損抵達 **mental crease** 時，於下方基部加做 **W-plasty** 改善輪廓、隱藏疤痕。Bernard-Burow 用**水平**推進瓣且**保留肌肉**。Abbe 通常自下唇取瓣修上唇（反向非常規）。", "peropt": {"A": "✗ Abbe 常規方向是下唇 → 上唇。", "B": "✗ 下唇直接縫合上限約 30%，非 50%。", "C": "◎ 正解：緊鄰頦唇溝時以 W-plasty 修飾。", "D": "✗ Bernard-Burow 為水平推進，不需完全切斷周圍肌肉。"}}, {"id": "3104", "sub": "B", "src": "NG", "years": [115], "stem": "Regarding the various modalities of Pre-surgical Infant Orthopedics (PSIO) used in the treatment of unilateral cleft lip, which of the following statements are correct? (複選)", "opts": {"A": "The Latham device is classified as a passive form of PSIO that utilizes a patient-specific acrylic intraoral denture and nasal conforming stents.", "B": "Lip taping is a passive method that applies a constant controlled restraining force to the alveolar segments, which can reduce the alveolar gap by 53%.", "C": "Lip adhesion is a partial surgical repair performed at 1 to 2 months of age that effectively converts a complete cleft lip into an incomplete cleft lip.", "D": "Nasoalveolar molding (NAM) is an active PSIO modality that improves nasal base asymmetry, though overly aggressive application can overstretch the ala and produce a \"mega-nostril.\"", "E": "A primary advantage of the Latham device is its shorter duration of treatment (4-6 weeks) relative to other modalities like lip taping and NAM (3-6 months)."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q06", "conflict": "", "key": "PSIO 分**被動 vs 主動**：\n**被動**＝lip taping（可縮小齒槽裂隙 53%）\n**主動**＝**Latham（釘固螺旋驅動，療程僅 4–6 週）**、**NAM（壓克力咬合板＋鼻撐，療程 3–6 月）**\nLip adhesion 是 1–2 個月大的**部分手術**，把完全唇裂轉成不完全唇裂。\nNAM 過度施力會把鼻翼撐過頭 → **mega-nostril**。", "peropt": {"A": "✗ Latham 是**主動**式；壓克力咬合板＋鼻撐的描述其實是 NAM。", "B": "◎ Lip taping 為被動、持續控制力，可縮小裂隙 53%。", "C": "◎ Lip adhesion：1–2 個月大，完全裂 → 不完全裂。", "D": "◎ NAM 為主動式，過度施力致 mega-nostril。", "E": "◎ Latham 療程 4–6 週，短於 lip taping／NAM 的 3–6 個月。"}}, {"id": "3105", "sub": "B", "src": "NG", "years": [115], "stem": "Regarding the clinical characteristics of bilateral cleft lip, which of the following statements is TRUE?", "opts": {"A": "Bilateral asymmetric cleft lip is the most common anatomic form, accounting for 75% of all bilateral cleft lip cases.", "B": "Infants presenting with bilateral cleft lip and palate are more likely to be syndromic, with common disorders including van der Woude, CHARGE, and ectodermal dysplasias.", "C": "A megaform cleft lip is anatomically defined as extending 5 cm above the normal Cupid's bow peak.", "D": "At birth, 80% of neonates with a cleft lip and/or palate have associated anomalies such as cardiac or neurological defects."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q07", "conflict": "", "key": "雙側唇顎裂**症候群性（syndromic）比例明顯較高**，常見 van der Woude、CHARGE、外胚層發育不良。這是雙側裂與單側裂最重要的臨床差異——看到雙側，先想症候群與遺傳諮詢。", "peropt": {"A": "✗ 最常見為雙側**對稱**完全裂，且無 75% 之說。", "B": "◎ 正解：雙側唇顎裂較可能為症候群性。", "C": "✗ 5 cm 為荒謬數值（輕型唇裂以 mm 計）。", "D": "✗ 合併異常遠低於 80%。"}}, {"id": "3106", "sub": "B", "src": "NG", "years": [115], "stem": "According to the Veau classification system, which of the following accurately defines a Veau II cleft?", "opts": {"A": "A complete cleft of the secondary palate involving the soft and hard palate extending to the incisive foramen.", "B": "A cleft that involves the soft palate only.", "C": "A unilateral complete cleft of the primary and secondary palate, where the vomer is attached to the maxilla on the non-cleft side.", "D": "A complete bilateral cleft of the primary and secondary palate."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q08", "conflict": "", "key": "**Veau 分類**（背熟四級）：\n**I** ＝僅軟顎\n**II** ＝次級顎完全裂（軟顎＋硬顎，前達切齒孔）\n**III** ＝單側完全裂（原發＋次級顎），犁骨附著於非裂側上頜\n**IV** ＝雙側完全裂（原發＋次級顎）\n分界線永遠是**切齒孔**（原發顎／次級顎的分水嶺）。", "peropt": {"A": "◎ 正解：Veau II＝次級顎完全裂至切齒孔。", "B": "✗ 僅軟顎＝Veau I。", "C": "✗ 單側完全裂＝Veau III。", "D": "✗ 雙側完全裂＝Veau IV。"}}, {"id": "3107", "sub": "B", "src": "NG", "years": [115], "stem": "According to the overall treatment plan for a Veau III cleft utilizing the Anatomic Cleft Restoration Philosophy (ACRP), how and when is the alveolar defect primarily managed?", "opts": {"A": "It is surgically closed during the partial cleft lip and nose repair at 3-4 months of age to utilize tissue expansion.", "B": "It is closed simultaneously with the palatoplasty at 12-14 months of age to complete the primary reconstruction.", "C": "It is intentionally left open during primary surgeries and is addressed via alveolar bone grafting during the time of mixed dentition (6-12 years of age).", "D": "It is structurally fused and closed during the routine orthodontics phase at 9-10 years of age."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q09", "conflict": "", "key": "ACRP 對 Veau III 的齒槽缺損策略：**一期手術刻意保留不關**，留待**混合齒列期（6–12 歲）以齒槽骨移植處理**。過早關閉齒槽會限制上頜生長。此與 CN3081／CN3082 的時程完全一致。", "peropt": {"A": "✗ 3–4 個月的部分唇鼻修補不處理齒槽。", "B": "✗ 不與顎裂修補同時關閉。", "C": "◎ 正解：一期留開，混合齒列期植骨。", "D": "✗ 齒槽不會在矯正牙科階段自行融合。"}}, {"id": "3108", "sub": "B", "src": "NG", "years": [115], "stem": "Which of the following conditions are considered appropriate indications for utilizing the buccal fat pad (BFP) flap for reconstruction? (複選)", "opts": {"A": "Closure of an oronasal fistula", "B": "Repair of a cleft palate defect during primary palatoplasty", "C": "Bolstering palate closure to prevent fistula formation", "D": "Reconstruction of a large full-thickness skin defect on the cheek", "E": "Providing structural support for dental implant placement in the mandible"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q11", "conflict": "", "key": "**Buccal fat pad（頰脂墊）瓣**的適應症全在**口內**：關閉口鼻瘻管、一期顎裂修補、加強顎部縫合以預防瘻管。它**體積有限、無皮膚**，不能修補頰部全層皮膚缺損，也不作為下顎植牙的結構支撐。", "peropt": {"A": "◎ 關閉口鼻瘻管。", "B": "◎ 一期顎裂修補時使用。", "C": "◎ 加強顎部縫合、預防瘻管。", "D": "✗ 無法修補大面積全層皮膚缺損。", "E": "✗ 不提供植牙的結構支撐。"}}, {"id": "3109", "sub": "B", "src": "NG", "years": [115], "stem": "Regarding the management, classification, and surgical options for oronasal fistulas (ONF), which of the following statements are true? (複選)", "opts": {"A": "The Pittsburgh Fistula Classification System categorizes fistulas based on anatomical location, with seven distinct subtypes.", "B": "Tension at the site of repair, resulting from either cleft width or deficiency of local tissues, is considered by most to be the main factor contributing to fistula formation.", "C": "For larger fistulas (>3 mm), local turnover flaps alone are typically insufficient, and radical remobilization of palatal flaps or additional tissue transfer is often required for a robust two-layer repair.", "D": "The buccal fat pad (BFP) flap is generally considered more suitable for posterior or middle-third palatal fistulas and is less ideal for anterior fistulas due to its limited length and potential for compromised vascularity.", "E": "The facial artery musculomucosal (FAMM) flap is a random-pattern flap that is best utilized for small fistulas (<2 mm) because it is too short to be harvested for larger or recurrent defects."}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q12", "conflict": "", "key": "口鼻瘻管（ONF）四要點：**Pittsburgh 分類共 7 型**（依解剖位置）；**張力是最主要成因**（裂隙寬度或局部組織不足）；**>3 mm** 的瘻管需徹底重新游離顎瓣或額外組織轉移做雙層修補；**BFP 適合中後段顎部**，前段因長度與血供受限而不理想。\n**FAMM 瓣是 axial（顏面動脈）血流型**，可用於較大或復發性缺損——選項 E 說它是 random pattern 且只能修 <2 mm，兩處皆錯。", "peropt": {"A": "◎ Pittsburgh 分類 7 型。", "B": "◎ 張力為主因。", "C": "◎ >3 mm 需雙層修補與組織轉移。", "D": "◎ BFP 適中後段，前段不理想。", "E": "✗ FAMM 為 axial pattern，適用較大／復發性缺損。"}}, {"id": "3110", "sub": "B", "src": "NG", "years": [115], "stem": "According to the provided text, which of the following is considered by most to be the main etiologic factor contributing to the formation of an oronasal fistula (ONF)?", "opts": {"A": "Colonization by Staphylococcus aureus and Streptococcus pyogenes at the surgical site.", "B": "Tension at the site of repair resulting from either cleft width or deficiency of local tissues.", "C": "A failure to administer a routine postoperative course of systemic prophylactic antibiotics.", "D": "External predictors such as the presence of Treacher Collins syndrome or the surgeon's level of experience."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q13", "conflict": "", "key": "與 CN3109 選項 B 同一考點，單獨成題：**口鼻瘻管的主要成因是修補處的張力**（源自裂隙寬度或局部組織不足），不是細菌定殖、不是抗生素、也不是術者經驗。", "peropt": {"A": "✗ 細菌定殖非主因。", "B": "◎ 正解：修補處張力。", "C": "✗ 預防性抗生素非決定因素。", "D": "✗ 外在預測因子（症候群、術者經驗）皆非主因。"}}, {"id": "3111", "sub": "B", "src": "NG", "years": [115], "stem": "Which of the following statements regarding the management and surgical treatment of velopharyngeal dysfunction (VPD) is correct?", "opts": {"A": "Velopharyngeal mislearning is caused by structural abnormalities and must be treated with surgical intervention.", "B": "The posterior pharyngeal flap is optimally suited for patients who present with poor lateral pharyngeal wall motion.", "C": "The Furlow double-opposing Z-palatoplasty is highly successful in achieving velopharyngeal competence even when the gap size exceeds 10 mm.", "D": "In a sphincter pharyngoplasty, the flap inset should be positioned high on the posterior pharyngeal wall at the site of attempted velopharyngeal closure."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q14", "conflict": "", "key": "VPD 術式與**咽側壁動作**的配對（本域最高頻決策）：\n**側壁動作差 → sphincter pharyngoplasty**（瓣須置於後咽壁**高處**、即嘗試閉合的水平）\n**側壁動作好、矢狀縫隙 → posterior pharyngeal flap**\n**縫隙小、肌肉矢狀走向 → Furlow**（>10 mm 無效）\n**Mislearning 屬學習性，靠語言治療，不開刀。**", "peropt": {"A": "✗ Mislearning 非結構性，不需手術。", "B": "✗ 側壁動作差者不宜 pharyngeal flap（需側壁代償）。", "C": "✗ 縫隙 >10 mm 時 Furlow 成功率低。", "D": "◎ 正解：sphincter 的瓣應置於後咽壁高處。"}}, {"id": "3112", "sub": "B", "src": "NG", "years": [115], "stem": "Regarding the timing of cleft nasal surgery, when is an \"intermediate rhinoplasty\" usually performed?", "opts": {"A": "At the time of the initial cleft lip repair.", "B": "Before school, typically between 4 and 6 years old.", "C": "Prior to the eruption of the canine teeth, between 9 and 11 years old.", "D": "After facial growth has completed, around 14 to 18 years old."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q15", "conflict": "", "key": "唇裂鼻整形的三個時機：**primary**（初次唇修補時）→ **intermediate（入學前，4–6 歲）**→ **definitive（生長結束後，14–18 歲）**。9–11 歲那個時間點是**齒槽骨移植**（尖牙萌發前），別跟鼻整形混淆。", "peropt": {"A": "✗ 此為 primary rhinoplasty。", "B": "◎ 正解：入學前 4–6 歲。", "C": "✗ 9–11 歲、尖牙萌發前 → 齒槽骨移植。", "D": "✗ 14–18 歲 → definitive rhinoplasty。"}}, {"id": "3113", "sub": "C", "src": "GS", "years": [110], "stem": "以下哪種craniosynostosis是已經可以用基因檢測來偵測突變的?", "opts": {"A": "Sagittal", "B": "Metopic", "C": "Coronal", "D": "Lambdoid"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B05-Q03", "conflict": "跨年選項數不同，視為不同題（對照 GS113-B05-Q04）", "key": "**Coronal（冠狀縫）早閉最常有可檢測的基因突變**——它與 FGFR1/2/3、TWIST1 等症候群性顱縫早閉高度相關。矢狀縫、額縫、人字縫早閉多為單發性、非症候群性。看到單側／雙側冠狀縫早閉，就該送基因檢測。", "peropt": {"A": "Sagittal：最常見，但多為單發性。", "B": "Metopic：三角頭，多單發。", "C": "◎ 正解：Coronal，與 FGFR／TWIST1 突變相關。", "D": "Lambdoid：最罕見，須與姿勢性斜頭鑑別。"}}, {"id": "3114", "sub": "C", "src": "GS", "years": [111, 112], "stem": "What is the wrong between positional plagiocephaly and lambdoid craniosynostosis?", "opts": {"A": "Ipsilateral frontal bossing was noted in positional plagiocephaly, whereas contralateral frontal bossing was noted in lambdoid craniosynostosis。", "B": "The onset of symptoms of the positional plagiocephaly is after birth, whereas symptoms present at birth in lambdoid craniosynostosis。", "C": "When viewed from above, ipsilateral ear is displaced posteriorly in positional plagiocephaly, whereas ipsilateral ear is displaced anteriorly in lambdoid craniosynostosis 。", "D": "The head shape is parallelogram in positional plagiocephaly, whereas it is trapezoid in lambdoid craniosynostosis。", "E": "Ipsilateral occipitomastoid bulge happened only in lambdoid craniosynostosis。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B05-Q04", "conflict": "", "key": "**姿勢性斜頭 vs 人字縫早閉**（必考鑑別）：\n姿勢性＝**平行四邊形**、同側耳**前**移、同側額部隆起、出生後才出現\n人字縫早閉＝**梯形**、同側耳**後下**移、**對側**額部隆起、出生即有、同側**枕乳突隆起**\n選項 C 把耳朵移位方向完全寫反。", "peropt": {"A": "✓ 同側 vs 對側額部隆起。", "B": "✓ 出生後 vs 出生即有。", "C": "◎ 正解（錯誤）：姿勢性是同側耳**前**移；人字縫早閉是同側耳**後**移。", "D": "✓ 平行四邊形 vs 梯形。", "E": "✓ 枕乳突隆起僅見於人字縫早閉。"}}, {"id": "3115", "sub": "C", "src": "GS", "years": [111, 112], "stem": "A 11-month-old baby presents to your office with symptoms including craniosynostosis, complete syndactylies of the hands and feet, and midface hypoplasia. Genetic testing is most likely to reveal a mutation in", "opts": {"A": "TWIST", "B": "Chromodomain-helicase-DNA-binding protein 7", "C": "Treacle ribosome biogenesis factor 1", "D": "Collagen type II alpha 1 chain", "E": "FGFR"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B05-Q05", "conflict": "", "key": "顱縫早閉＋**手足完全併指**＋中臉發育不全 → **Apert syndrome → FGFR2 突變**。基因對號入座：TWIST1→Saethre-Chotzen；CHD7→CHARGE；TCOF1→Treacher Collins；COL2A1→Stickler。", "peropt": {"A": "TWIST → Saethre-Chotzen。", "B": "CHD7 → CHARGE。", "C": "TCOF1（Treacle）→ Treacher Collins。", "D": "COL2A1 → Stickler。", "E": "◎ 正解：FGFR（Apert 為 FGFR2）。"}}, {"id": "3116", "sub": "C", "src": "GS", "years": [111, 112, 114, 115], "stem": "A one-year-old presents with brachycephaly, bilateral superior orbital rim retrusion with an interorbital distance of 28 mm, and a wide nasal root. Mutation in which of the following genes is associated with these findings:", "opts": {"A": "FGFR2", "B": "EFNB1", "C": "IRF6", "D": "TWIST", "E": "TCOF1"}, "ans": "B", "multi": false, "etype": "ai", "expl": "The patient described has bicoronal craniosynostosis and hypertelorism and nasal anomalies. These findings are typical of patients with craniofrontonasal dysplasia, an X- linked disorder associated with mutations in the EFNB1 gene.", "cite": "GS111 · GS111-B06-Q02", "conflict": "", "key": "雙側冠狀縫早閉（短頭）＋**眼距過寬**＋鼻根寬 → **craniofrontonasal dysplasia → EFNB1**。\n這是與 Apert（FGFR2）最關鍵的鑑別：**Apert 不以眼距過寬為主徵**。\n⚠ 與 CN3118 為選項重排家族：同一題幹、答案從 B 變 D。", "peropt": {"A": "FGFR2 → Apert／Crouzon／Pfeiffer。", "B": "◎ 正解：EFNB1 → craniofrontonasal dysplasia。", "C": "IRF6 → Van der Woude。", "D": "TWIST1 → Saethre-Chotzen。", "E": "TCOF1 → Treacher Collins。"}}, {"id": "3117", "sub": "C", "src": "GS", "years": [113], "stem": "以下哪種craniosynostosis是已經可以用基因檢測for mutation detection?", "opts": {"A": "Sagittal", "B": "Metopic", "C": "Coronal", "D": "Lambdoid", "E": "Bilambdoid"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B05-Q04", "conflict": "跨年選項數不同，視為不同題（對照 GS110-B05-Q03）", "key": "與 CN3113 同題（GS110／GS113 兩年）。**冠狀縫早閉**是最值得送基因檢測者，因其與 FGFR1/2/3、TWIST1 高度相關。", "peropt": {"A": "Sagittal：最常見但多為單發性。", "B": "Metopic：三角頭。", "C": "◎ 正解：Coronal。", "D": "Lambdoid：最罕見。", "E": "Bilambdoid：罕見組合。"}}, {"id": "3118", "sub": "C", "src": "GS", "years": [113], "stem": "A one-year-old presents with brachycephaly, bilateral superior orbital rim retrusion with an interorbital distance of 28 mm, and a wide nasal root. Mutation in which of the following genes is associated with these findings:", "opts": {"A": "TWIST", "B": "FGFR2", "C": "TCOF1", "D": "EFNB1", "E": "IRF6"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B06-Q01", "conflict": "", "key": "與 CN3116 同題、**選項字母重排**（B→D）。概念恆定：短頭＋眼距過寬＋寬鼻根＝craniofrontonasal dysplasia＝**EFNB1**。若你背的是「選 B」，這一年就答錯了。", "peropt": {"A": "TWIST1 → Saethre-Chotzen。", "B": "FGFR2 → Apert 等。", "C": "TCOF1 → Treacher Collins。", "D": "◎ 正解：EFNB1。", "E": "IRF6 → Van der Woude。"}}, {"id": "3119", "sub": "C", "src": "GS", "years": [115], "stem": "Which of the following cranial sutures closes normally in infancy?", "opts": {"A": "Sagittal", "B": "Lambdoid", "C": "Metopic", "D": "Coronal", "E": "Squamosal"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B04-Q05", "conflict": "", "key": "**額縫（metopic suture）是唯一在嬰兒期正常閉合的顱縫**（約 3–9 個月，最晚 2 歲前）。其餘顱縫要到成年才閉合。因此『額縫閉合』本身不等於病態——但**過早**閉合會造成三角頭。", "peropt": {"A": "矢狀縫成年才閉合。", "B": "人字縫成年才閉合。", "C": "◎ 正解：額縫，嬰兒期正常閉合。", "D": "冠狀縫成年才閉合。", "E": "鱗狀縫成年才閉合。"}}, {"id": "3120", "sub": "C", "src": "GS", "years": [115], "stem": "A 45-year-old patient underwent unilateral decompressive craniectomy by neurosurgery for intracerebral hemorrhage after a fall. The patient's bone graft is stored in the hospital tissue bank for possible use for cranioplasty reconstruction.The patient presents to the plastic surgery clinic 8 months later to discuss cranioplasty planning. The scalp has healed well with no evidence of wound dehiscence or infection.Which strategy for reconstruction is associated with the lowest likelihood of infection?", "opts": {"A": "Single-stage reconstruction with the patient's stored bone graft because of the autologous nature of the implant material, lack of immunogenicity, and sterile storage in the tissue bank", "B": "Two-staged approach with placement of a tissue expander(s) adjacent to the defect in the first stage,followed by tissue expander removal and new alloplastic implant placement 2 months later", "C": "Single-stage reconstruction with titanium mesh implant and a tension-free scalp closure", "D": "Single-stage use of a solid alloplastic implant, utilizing generous galeal scoring on the elevated scalp flap side to ensure achievement of a tension-free closure"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B06-Q02", "conflict": "", "key": "顱骨成形術的感染率排序：**自體冷凍骨瓣感染／吸收率最高**（缺乏血流、儲存過程污染風險）。**鈦網（titanium mesh）＋無張力頭皮縫合感染率最低**。組織擴張器會增加額外的感染機會。", "peropt": {"A": "✗ 儲存的自體骨瓣感染與再吸收率高，並非最安全。", "B": "✗ 兩階段加擴張器，額外增加感染風險。", "C": "◎ 正解：鈦網＋無張力縫合。", "D": "✗ 實心人工植入物體積大、死腔多，感染率高於鈦網。"}}, {"id": "3122", "sub": "C", "src": "NG", "years": [105], "stem": "Which of the following statement concerning nonsyndromic craniosynostosis syndrome is correct？", "opts": {"A": "Gender predilection demonstrates female preference for sagittal synostosis.", "B": "The type of synostosis is denoted based on the suture fused, with lambdoid being the most common and sagittal the least.", "C": "Ephrin-A4 (EFNA4) is, as yet, the only identified gene proposed to play a role in nonsyndromic craniosynostosis.", "D": "The optimal timing of treatment is during infancy, before 6 months.", "E": "Older paternal age may contribute more to sagittal than coronal synostosis."}, "ans": "C", "multi": false, "etype": "ai", "expl": "考生建議：選項C EFNA新版已沒提到，只說其他的FGFR3 等", "cite": "NG105 · NG105-B09-Q03", "conflict": "", "key": "非症候群性顱縫早閉的四個常見反轉：**矢狀縫最常見（男性 3:1），人字縫最罕見**；手術最佳時機約 **9–12 個月**（非 6 個月前）；**高齡父親與冠狀縫（FGFR）關係較大**，非矢狀縫。\n⚠ 考生建議：EFNA4 在新版 Neligan 已不再提及，改述 FGFR3 等。本年答案仍為 C。", "peropt": {"A": "✗ 矢狀縫早閉以**男性**為主（約 3:1）。", "B": "✗ 反了：矢狀縫最常見、人字縫最少見。", "C": "◎ 本年答案（EFNA4）；新版已淡化此說法。", "D": "✗ 最佳時機約 9–12 個月。", "E": "✗ 高齡父親與**冠狀縫**關聯較大。"}}, {"id": "3123", "sub": "C", "src": "NG", "years": [105], "stem": "Which one of the following craniosynostoses is not the FGFR-related syndromic craniosynostoses?", "opts": {"A": "Apert syndrome", "B": "Crouzon syndrome", "C": "Pfeiffer syndrome", "D": "Muenke syndrome", "E": "Boston-type craniosynostosis"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B09-Q06", "conflict": "", "key": "FGFR 相關的症候群性顱縫早閉：**Apert、Crouzon、Pfeiffer、Muenke（FGFR3）、Jackson-Weiss**。\n**Boston-type ＝ MSX2**，是唯一的非 FGFR 者。另記 Saethre-Chotzen ＝ TWIST1。", "peropt": {"A": "FGFR2。", "B": "FGFR2。", "C": "FGFR1／FGFR2。", "D": "FGFR3。", "E": "◎ 正解：Boston-type ＝ MSX2，非 FGFR。"}}, {"id": "3124", "sub": "C", "src": "NG", "years": [106], "stem": "Which of the following statements are correct about Apert syndrome? (複選)", "opts": {"A": "Also called acrocephalosyndactyly syndrome", "B": "Premature closure of the coronal and often lamboid sutures of the skull", "C": "Children often display impared language development and motor skills", "D": "Acrosyndactyly and symphalangism affect both hands", "E": "A ulnar clinodactyly of the thumb"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B13-Q01", "conflict": "", "key": "Apert 上肢的關鍵字是 **radial clinodactyly of the thumb**（拇指**橈側**偏斜）。題目寫 ulnar 即錯。\nApert 手部三型：**type I ＝ flat 'spade' hand**（拇指游離、簡單併指）；**type II ＝ constricted cupped 'mitten' hand**；**type III ＝ coalesced 'rosebud' hand**（拇指也併入團塊，故常有甲溝炎與皮膚浸潤）。", "peropt": {"A": "◎ 又名 acrocephalosyndactyly。", "B": "◎ 冠狀縫（常合併人字縫）早閉。", "C": "◎ 語言發展與運動技能受損。", "D": "◎ 雙手 acrosyndactyly 與 symphalangism。", "E": "✗ 應為**橈側**（radial）clinodactyly，非尺側。"}}, {"id": "3126", "sub": "C", "src": "NG", "years": [107], "stem": "Apert syndrome has been classified into three types. Choose the right statement?", "opts": {"A": "Syndactyly in type I Apert hand is a simple type of syndactyly between all five digits", "B": "In type II Apert hand, the syndactyly presents in a complex type between all five digits", "C": "In type III Apert hand, the syndactyly presents in a simple type between all five digits", "D": "In type Ⅲ Apert hand, the thumb usually shows paronychial infections and skin maceration", "E": "The incidence is lowest in Asians and the highest in Hispanics"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B16-Q01", "conflict": "", "key": "Apert 手部三型：**type I ＝ flat 'spade' hand**（拇指游離、簡單併指）；**type II ＝ constricted cupped 'mitten' hand**；**type III ＝ coalesced 'rosebud' hand**（拇指也併入團塊，故常有甲溝炎與皮膚浸潤）。\nType III 因拇指被併入團塊，甲溝反覆感染、皮膚浸潤最嚴重。發生率**亞洲人最高、西班牙裔最低**（選項 E 寫反）。", "peropt": {"A": "✗ Type I 拇指相對游離，非五指全部簡單併指。", "B": "✗ Type II 非五指全部複雜併指。", "C": "✗ Type III 為 complex（癒合團塊），非 simple。", "D": "◎ 正解：Type III 拇指常見甲溝炎與皮膚浸潤。", "E": "✗ 反了：亞洲人發生率最高。"}}, {"id": "3127", "sub": "C", "src": "NG", "years": [108, 111, 112], "stem": "有關craniosynsyosis何者正確?", "opts": {"A": "Nonsyndromic caniosynstosis is the pathological fusion of one or more cranial vault sutures which is often associated with genetic predisposition.", "B": "Syndromic craniosyntosis is defined by having non-coexisting anomalies aside from fused cranial sutures.", "C": "The treatment of craniosyntosis requireds a multidisciplinary team approach.", "D": "The optimal timing for vault remodeling procedures such as frontal orbital advancement and posterior vault remodeling, most surgeon agree to above age of 1-year-old.", "E": "The surgical treatment has low mortality. Usually there is no need for blood transfusion."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B09-Q02", "conflict": "", "key": "顱縫早閉四個常見錯誤：非症候群性**多為偶發、非遺傳傾向**；症候群性的定義是**合併其他異常**（非『非共存』）；顱穹重塑最佳時機在 **9–12 個月**；手術**出血量大、常需輸血**。唯一正確：需**多科團隊**。", "peropt": {"A": "✗ 非症候群性多為偶發，非常與遺傳傾向相關。", "B": "✗ 症候群性＝**有**共存異常。", "C": "◎ 正解：需多科團隊。", "D": "✗ 多數術者認為 1 歲以前（約 9–12 個月）為佳。", "E": "✗ 顱穹手術失血量大，常需輸血。"}}, {"id": "3129", "sub": "C", "src": "NG", "years": [108], "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "又稱為acrocephalosyndactyly syndrome", "B": "在craniofacial方面, 可能會有premature closure of coronal and lamboid sutures of skull, and midface hypoplasia", "C": "小孩子通常會有impaired language development and motor skills", "D": "在上肢方面會出現symphalangism of the index, long, and ring fingers of both hands and a radial clinodactyly of the thumb in a symmetrical way", "E": "在下肢方面, 雙腳會有simple and complete syndactyly"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B15-Q10", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B16-Q10）", "key": "本題五項全對，正是 Apert 的完整面貌。注意 D 寫的是 **radial clinodactyly**（正確），與 CN3124 的 ulnar（錯誤）僅一字之差——**同一份題庫兩年互為正反**。", "peropt": {"A": "◎ acrocephalosyndactyly。", "B": "◎ 冠狀＋人字縫早閉、中臉發育不全。", "C": "◎ 語言與運動發展受損。", "D": "◎ 食指／中指／無名指 symphalangism ＋ 拇指**橈側**偏斜，對稱分布。", "E": "◎ 雙足 simple and complete syndactyly。"}}, {"id": "3130", "sub": "C", "src": "NG", "years": [109, 111, 114], "stem": "下列關於Crouzon's syndrome的描述，何者錯誤？", "opts": {"A": "This syndrome involves only the face and cranium and is not associated with other anomalies elsewhere on the limbs or trunk.", "B": "The fundamental dysmorphology is an underdeveloped midface presenting with exorbitism secondary to insufficient depth of the orbits, hypoplasia of the malar bones, and a class I malocclusion.", "C": "Hypertelorism may be present but is usually mild.", "D": "The nose is short.", "E": "Brachycephaly is usually present; however, scaphocephaly, plagiocephaly, or even a cloverleaf skull may be present."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q09", "conflict": "", "key": "**Crouzon ＝ class III malocclusion**（中臉發育不全 → 下顎相對前突）。題目寫 class I 即錯。\n其餘特徵：只侵犯顏面與顱骨（四肢軀幹正常）、眼球突出源自眶深不足、眼距過寬通常**輕微**、鼻短、多為短頭但可見各種頭形甚至三葉草頭。", "peropt": {"A": "✓ 僅侵犯顏面與顱骨（此為 Crouzon 與 Apert 的分界）。", "B": "◎ 正解（錯誤）：應為 class **III** malocclusion。", "C": "✓ 眼距過寬通常輕微。", "D": "✓ 鼻短。", "E": "✓ 多為短頭，亦可見舟狀頭、斜頭、三葉草頭。"}}, {"id": "3131", "sub": "C", "src": "NG", "years": [109], "stem": "關於Syndromic craniosynostosis的描述何者錯誤？", "opts": {"A": "大部分syndromic craniosynostosis的嬰兒出生會有bilateral coronal craniosynostosis，可能再合併其他sutural synostosis", "B": "Apert, Crouzon, and Pfeiffer syndromes 和FGFR mutation有關", "C": "Pfeiffer syndromes type III的特徵為cloverleaf (or Kleeblattschädel) skull deformity", "D": "第一次接觸到syndromic craniosynostosis的嬰兒，最重要是需先評估呼吸道或是進食方面的問題", "E": "在骨頭成熟的患者，Le Fort III osteotomy可以考慮合併Le Fort I osteotomy進行"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q02", "conflict": "", "key": "**Pfeiffer type II ＝ cloverleaf skull（Kleeblattschädel）**，預後最差。Type III 無三葉草頭，但顱底短、眼球突出嚴重。題目把 II 與 III 對調。\n另記：初診 syndromic craniosynostosis 嬰兒，**先評估呼吸道與進食**。", "peropt": {"A": "✓ 多為雙側冠狀縫早閉，可合併其他顱縫。", "B": "✓ Apert／Crouzon／Pfeiffer 皆與 FGFR 相關。", "C": "◎ 正解（錯誤）：三葉草頭為 Pfeiffer **type II**。", "D": "✓ 呼吸道與進食優先。", "E": "✓ 骨骼成熟者可 Le Fort III 併 Le Fort I。"}}, {"id": "3132", "sub": "C", "src": "NG", "years": [109, 112], "stem": "下列nonsyndromic craniosynostosis的描述何者正確？(複選)", "opts": {"A": "有可能在出生時就可以診斷", "B": "Trigonocephaly 三角頭形是因為sagittal synostosis", "C": "敏感性sensitive和特異性specific最高的診斷工具是理學檢查", "D": "Deformational plagiocephaly是lambdoid synostosis一定需要手術矯正", "E": "眼底鏡檢查(fundoscopic exam)對診斷IICP(increased intracranial pressure)是有幫助的"}, "ans": "AE", "multi": true, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q08", "conflict": "", "key": "四個破綻：**三角頭來自額縫（metopic）早閉**，非矢狀縫；診斷敏感度與特異度最高的是 **CT（含 3D 重建）**，不是理學檢查；**deformational plagiocephaly 不是人字縫早閉**，以擺位／頭盔治療即可，不需手術。\n正確者：出生時即可能診斷；眼底鏡見視乳突水腫有助判斷顱內壓升高。", "peropt": {"A": "◎ 出生時即可能診斷。", "B": "✗ 三角頭 ＝ **額縫**早閉。", "C": "✗ CT 才是敏感度／特異度最高者。", "D": "✗ 姿勢性斜頭非人字縫早閉，多不需手術。", "E": "◎ 眼底鏡（視乳突水腫）有助診斷顱內壓升高。"}}, {"id": "3133", "sub": "C", "src": "NG", "years": [109, 112, 114], "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變(sporadic)", "B": "上肢方面會出現brachyclinodactyly of the thumb, complex syndactyly of index/long/ring finger, symbrachyphalangism 和 simple syndactyly of the first web", "C": "手的變形可區分為三型：the flat, \"spade\" hand (type I), the constricted cupped, \"mitten\" hand (type II), 和the coalesced \"rosebud\" hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5, followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有impaired language development and motor skills"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B16-Q01", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG115-B17-Q11）", "key": "Apert＝**FGFR2**，多為**偶發突變**（與高齡父親相關）。\nApert 手部三型：**type I ＝ flat 'spade' hand**（拇指游離、簡單併指）；**type II ＝ constricted cupped 'mitten' hand**；**type III ＝ coalesced 'rosebud' hand**（拇指也併入團塊，故常有甲溝炎與皮膚浸潤）。\n手術順序：先鬆解拇指與食指（加深第一指蹼）並分開第 4、5 指，再處理其餘指蹼與拇指偏斜。\n選項 B 的錯誤在 **brachyclinodactyly（尺側短偏）＋ simple syndactyly of first web**——Apert 的拇指是 **radial** clinodactyly。", "peropt": {"A": "◎ FGFR2，多為偶發突變。", "B": "✗ 應為拇指**橈側**偏斜；第一指蹼多為 complex／未分離。", "C": "◎ 手部三型：spade／mitten／rosebud。", "D": "◎ 手術順序如上。", "E": "◎ 語言與運動發展受損。"}}, {"id": "3134", "sub": "C", "src": "NG", "years": [110], "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "又稱為acrocephalosyndactyly syndrome", "B": "在craniofacial方面, 可能會有premature closure of coronal and lamboid sutures of skull, and midface hypoplasia", "C": "小孩子通常會有impaired language development and motor skillsn", "D": "可能造成obstructive sleep apnea", "E": "在下肢方面, 雙腳會有simple and complete syndactyly"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B16-Q10", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG108-B15-Q10）", "key": "本題五項全對。**OSA 是 Apert／Crouzon 中臉發育不全的必然後果**，也是新生兒期最需警覺的問題。這一族 Apert 題（CN3124/3129/3133/3134/3136）跨六個年度，選項互相調換，唯一穩定的是**概念**。", "peropt": {"A": "◎ acrocephalosyndactyly。", "B": "◎ 冠狀＋人字縫早閉、中臉發育不全。", "C": "◎ 語言與運動發展受損。", "D": "◎ 中臉發育不全 → 阻塞型睡眠呼吸中止。", "E": "◎ 雙足 simple and complete syndactyly。"}}, {"id": "3135", "sub": "C", "src": "NG", "years": [113], "stem": "Which part of the maxillofacial skeleton reaches close to adult size first during osteogenesis?", "opts": {"A": "Maxilla", "B": "Mandible", "C": "Cranial vault", "D": "Zygoma", "E": "Nasal bone"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q05", "conflict": "", "key": "顱顏骨骼的成熟順序：**顱穹（cranial vault）最早接近成人大小**（隨腦部生長，2 歲達 75%、5 歲近 90%）；上下頜與鼻骨最晚（青春期後才完成）。這正是**顱穹手術可在嬰兒期做、正顎手術必須等生長結束**的解剖學理由。", "peropt": {"A": "上頜隨齒列與氣道發育，較晚。", "B": "下頜最晚成熟（青春期後）。", "C": "◎ 正解：顱穹最早。", "D": "顴骨隨中臉發育。", "E": "鼻骨最晚定型，故 definitive rhinoplasty 需等 14–18 歲。"}}, {"id": "3136", "sub": "C", "src": "NG", "years": [113], "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "上肢方面會出現brachyclinodactyly of the thumb, complex syndactyly of index/long/ring finger, symbrachyphalangism 和 simple syndactyly of the first web", "B": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變(sporadic)", "C": "手的變形可區分為三型：the flat, \"spade\" hand (type I), the constricted cupped, \"mitten\" hand (type II), 和the coalesced \"rosebud\" hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5, followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有impaired language development and motor skill"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B16-Q02", "conflict": "", "key": "與 CN3133 同一組選項、**字母重排**（答案 ACDE → BCDE）。唯一錯誤的敘述恆為那句 **brachyclinodactyly ＋ simple syndactyly of the first web**。\nApert 手部三型：**type I ＝ flat 'spade' hand**（拇指游離、簡單併指）；**type II ＝ constricted cupped 'mitten' hand**；**type III ＝ coalesced 'rosebud' hand**（拇指也併入團塊，故常有甲溝炎與皮膚浸潤）。", "peropt": {"A": "✗ 應為拇指**橈側**偏斜（radial clinodactyly）。", "B": "◎ FGFR2，多為偶發突變。", "C": "◎ 手部三型。", "D": "◎ 併指鬆解的手術順序。", "E": "◎ 語言與運動發展受損。"}}, {"id": "3138", "sub": "C", "src": "NG", "years": [115], "stem": "下列有關 sagittal craniosynostosis（SC）臨床表現，何者最可能出現？", "opts": {"A": "Brachycephaly", "B": "Trigonocephaly", "C": "Scaphocephaly", "D": "Cloverleaf skull", "E": "Midface hypoplasia"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A. Brachycephaly：常見於 bilateral coronal synostosis。\n\nB. Trigonocephaly：常見於 metopic synostosis。\n\nD. Cloverleaf skull：多縫合早閉造成。\n\nE. Midface hypoplasia：較常見於 syndromic craniosynostosis（如 Apert、Crouzon syndrome）。", "cite": "NG115 · NG115-B09-Q04", "conflict": "", "key": "顱縫與頭形一一對應（背死）：\n**矢狀縫 → scaphocephaly（舟狀頭）**\n額縫 → trigonocephaly（三角頭）\n雙側冠狀縫 → brachycephaly（短頭）\n多縫早閉 → cloverleaf skull", "peropt": {"A": "雙側冠狀縫早閉。", "B": "額縫早閉。", "C": "◎ 正解：矢狀縫早閉 → 舟狀頭。", "D": "多縫早閉。", "E": "中臉發育不全屬症候群性顱縫早閉的特徵。"}}, {"id": "3139", "sub": "C", "src": "NG", "years": [115], "stem": "一名 8 個月大嬰兒接受 open cranial vault remodeling (CVR) 治療 nonsyndromic sagittal craniosynostosis。關於圍手術期血液管理與輸血策略，下列何者最正確？", "opts": {"A": "術中低血壓麻醉（hypotensive anesthesia）已被證實可顯著減少輸血需求，因此應作為標準麻醉方式。", "B": "術前使用 recombinant erythropoietin（EPO）已被證實完全消除術中輸血需求，因此為所有病人常規建議。", "C": "Tranexamic acid 的使用與術後癲癇及血栓栓塞事件顯著增加有關，因此兒童 CVR 應避免使用。", "D": "Whole blood transfusion 相較於 component therapy，可同時提供紅血球、凝血因子與血小板，並減少血液捐贈者暴露次數。", "E": "術後輸血決策主要依據引流量，血紅素濃度與血流動力學狀態通常不列入考量。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "A 錯誤，Fearon 等人研究顯示，低血壓麻醉與正常血壓麻醉之間輸血需求無顯著差異。\n\nB 錯誤，EPO 可增加術前 Hb 並減少輸血需求，但無法完全避免輸血，且並非所有中心常規使用。\n\nC 錯誤，Pediatric Craniofacial Collaborative Group 研究顯示 antifibrinolytics具有良好安全性，未增加癲癇或血栓栓塞事件。\n\nE 錯誤，術後輸血指徵包括：Hb < 7.5 g/dL、血流動力學不穩定、持續出血（例如 drain output 增加）", "cite": "NG115 · NG115-B09-Q05", "conflict": "", "key": "小兒顱穹重塑的圍術期輸血四要點：**低血壓麻醉無顯著減少輸血**（Fearon）；**EPO 可減少但無法消除**輸血；**Tranexamic acid 安全有效**，不增加癲癇或血栓；**全血輸注**可同時提供紅血球、凝血因子與血小板，並減少捐血者暴露次數。術後決策須綜合 Hb 與血流動力學，非只看引流量。", "peropt": {"A": "✗ 低血壓麻醉與正常血壓麻醉的輸血需求無顯著差異。", "B": "✗ EPO 無法完全消除輸血需求。", "C": "✗ TXA 未顯著增加癲癇或血栓事件。", "D": "◎ 正解：全血輸注的優勢。", "E": "✗ 須併同 Hb 與血流動力學判斷。"}}, {"id": "3140", "sub": "C", "src": "NG", "years": [115], "stem": "關於 syndromic craniosynostosis 於出生後前 2 年內 cephalocranial disproportion 的處理原則，下列何者最正確？", "opts": {"A": "Cranial vault expansion 一旦成功降低顱內壓，通常可永久解決 intracranial hypertension，不需再次介入。", "B": "Utria 等人認為 cranial vault remodeling 應盡可能於出生後 3 個月內完成，以降低再手術率。", "C": "嚴重 syndromic craniosynostosis 患者若出生時即有 cephalocranial disproportion，可能需於出生後數天至數週內開始分期治療。", "D": "第二年出現再度失衡時，首選治療為 frontofacial procedure，因其復發率最低。", "E": "「Surfing the bone pressure wave」意指延後所有手術至 2 歲後一次完成重建。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A 錯誤，syndromic craniosynostosis 的 intracranial hypertension 復發率高。早期治療通常只是暫時恢復 cephalocranial balance。\n\nB 錯誤，Utria 等人認為最佳時機約為 6–9 個月。過早手術（earlier operations）有約 5 倍 major reoperation risk。\n\nD 錯誤，第二年即使再度失衡， 此時較適合 posterior vault expansion with distraction osteogenesis。\n\nE 錯誤，「Surfing the bone pressure wave」強調的是：早期偵測 cephalocranial disproportion、分期介入、反覆恢復 brain–calvarium balance並非延後所有治療。", "cite": "NG115 · NG115-B09-Q06", "conflict": "", "key": "症候群性顱縫早閉的顱內高壓**復發率高**，早期手術只是暫時恢復平衡——這就是「**surfing the bone pressure wave**」的意思：**分期、順著顱內壓的波峰逐次介入**，而非拖到 2 歲一次做完。Utria 認為最佳時機約 **6–9 個月**。", "peropt": {"A": "✗ 顱內高壓復發率高，常需再次介入。", "B": "✗ Utria 主張約 6–9 個月，過早手術再手術率反升。", "C": "◎ 正解：出生即有嚴重失衡者，可能需於數天至數週內開始分期治療。", "D": "✗ 第二年再失衡時，frontofacial procedure 並非首選（復發率不低）。", "E": "✗ 「Surfing the bone pressure wave」指分期順勢介入，非延後一次做完。"}}, {"id": "3141", "sub": "C", "src": "NG", "years": [115], "stem": "關於Apert syndrome，下列敘述何者正確？（複選）", "opts": {"A": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變（sporadic）", "B": "上肢方面會出現brachyclinodactyly of the thumb、complex syndactyly of index/long/ring finger、symbrachyphalangism和simple syndactyly of the first web", "C": "手的變形可區分為三型：the flat \"spade\" hand (type I)、the constricted cupped \"mitten\" hand (type II)，和the coalesced \"rosebud\" hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5，followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有shoulder motion restriction"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B17-Q11", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B17-Q12） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B16-Q01） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG109-B16-Q01）", "key": "與 CN3133／CN3136 同一組選項，但**選項 E 被換掉**：從「語言發展遲緩」改成「**肩關節活動受限**」。\n這是 Gate 1 判定「不可合併」的實例——若把兩年併成一題，就會丟失其中一個事實。\n答案 ACDE 中的 E 在此指 shoulder motion restriction（Apert 確有肩關節活動受限）。", "peropt": {"A": "◎ FGFR2，多為偶發突變。", "B": "✗ 應為拇指**橈側**偏斜（radial clinodactyly）。", "C": "◎ 手部三型：spade／mitten／rosebud。", "D": "◎ 併指鬆解手術順序。", "E": "◎ Apert 亦可見肩關節活動受限。"}}, {"id": "3142", "sub": "D", "src": "GS", "years": [110, 114], "stem": "外傷性眶上裂症候群(superior orbital fissure syndrome)之症狀不包含下列何者？", "opts": {"A": "眼外直肌 (Lateral rectus) 麻痹", "B": "視力喪失 loss of vision", "C": "瞳孔放大 Pupillary dilatation", "D": "上眼瞼下垂 (Upper eyelid ptosis)", "E": "額頭麻痺 loss of frontal sensation"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B06-Q04", "conflict": "", "key": "**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n⚠ 與 CN3145 為**極性翻轉家族**：一年問『不包含』（答 B），一年問『包含』（答 ACDE）。同一組事實，兩個答案。", "peropt": {"A": "✓ 外直肌麻痺（CN VI）。", "B": "◎ 正解（不包含）：視力喪失屬 orbital apex syndrome。", "C": "✓ 瞳孔放大（CN III 副交感）。", "D": "✓ 上眼瞼下垂（CN III）。", "E": "✓ 額部感覺喪失（V1）。"}}, {"id": "3143", "sub": "D", "src": "GS", "years": [111], "stem": "Which fracture is most likely to require operative intervention?", "opts": {"A": "Anterior table frontal sinus fracture with obstruction of the nasofrontal duct.", "B": "Orbital roof fracture extending into the lateral wall.", "C": "Orbital floor fracture 1cm in diameter in a patient without diplopia.", "D": "Concomitant LeFort I and ipsilateral ZMC fracture with normal occlusion.", "E": "Nasal bone fracture without displacement."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B07-Q01", "conflict": "", "key": "顏面骨折需手術的關鍵不是骨折本身，而是**功能性後果**。**額竇前壁骨折合併鼻額管阻塞** → 必然導致黏液囊腫／膿腫，務必處理。反之：無複視的小眶底骨折、無移位鼻骨骨折、咬合正常的 Le Fort I＋ZMC，皆可觀察。", "peropt": {"A": "◎ 正解：鼻額管阻塞 → 引流受阻 → 須手術。", "B": "✗ 眶頂骨折延伸至外側壁，若無功能障礙可觀察。", "C": "✗ 1 cm 眶底骨折且無複視 → 觀察。", "D": "✗ 咬合正常 → 非手術絕對適應症。", "E": "✗ 無移位鼻骨骨折 → 觀察。"}}, {"id": "3144", "sub": "D", "src": "GS", "years": [115], "stem": "A 42-year-old presents with a saddle nose deformity. She has a remote history of nasal trauma occurring more than 1 year ago, for which she did not seek any medical attention. Which of the following did she most likely have?", "opts": {"A": "Nasal bone and septal fracture", "B": "Nasal bone fracture", "C": "Septal hematoma", "D": "Septal fracture"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B06-Q01", "conflict": "", "key": "**鞍鼻的元凶是未處理的鼻中隔血腫**：血腫剝離軟骨膜 → 軟骨失去血供 → 缺血性壞死 → 鼻背塌陷。單純鼻骨或鼻中隔骨折不會如此。這是「鼻外傷必須翻開看鼻中隔」的理由。", "peropt": {"A": "✗ 骨折本身不致軟骨壞死。", "B": "✗ 同上。", "C": "◎ 正解：鼻中隔血腫 → 軟骨壞死 → 鞍鼻。", "D": "✗ 單純鼻中隔骨折不致塌陷。"}}, {"id": "3145", "sub": "D", "src": "GS", "years": [115], "stem": "外傷性眶上裂症候群 (superior orbital fissure syndrome) 之症狀包含下列何者？ (複選)", "opts": {"A": "眼外直肌 (Lateral rectus) ⿇痹", "B": "視⼒喪失 loss of vision", "C": "瞳孔放⼤ Pupillary dilatation", "D": "上眼瞼下垂 (Upper eyelid ptosis)", "E": "額頭⿇痺 loss of frontal sensation"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B06-Q05", "conflict": "", "key": "**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n⚠ 與 CN3142 為**極性翻轉家族**（問『包含』，答 ACDE）。**背『答案 B』的人在這一年全錯**；記住『視力喪失＝orbital apex』才不會被翻轉打倒。", "peropt": {"A": "◎ 外直肌麻痺（CN VI）。", "B": "✗ 視力喪失屬 orbital apex syndrome。", "C": "◎ 瞳孔放大。", "D": "◎ 上眼瞼下垂。", "E": "◎ 額部感覺喪失（V1）。"}}, {"id": "3146", "sub": "F", "src": "NG", "years": [105], "stem": "Which of the following statements is the most appropriate?", "opts": {"A": "Angle's classification about the relationship between maxillary and mandibular dentition and occlusion was based on first molar teeth", "B": "The current maxillary osteotomy primarily involves the LeFort I procedure.", "C": "Neurosensory loss is the most common complication following orthognathic surgery.", "D": "Avascular necrosis of the condyle is a known potential complication in orthognathic surgery.", "E": "All of above are right"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B05-Q05", "conflict": "", "key": "四項全對：**Angle 分類以第一大臼齒為基準**；現行上頜截骨主要為 **Le Fort I**；**神經感覺喪失是正顎手術最常見併發症**（下齒槽神經）；**髁突缺血性壞死**確為已知的潛在併發症。", "peropt": {"A": "◎ Angle 分類以第一大臼齒關係定義。", "B": "◎ Le Fort I 為現行上頜截骨主流。", "C": "◎ 神經感覺喪失最常見。", "D": "◎ 髁突缺血性壞死為已知併發症。", "E": "◎ 正解：以上皆是。"}}, {"id": "3147", "sub": "D", "src": "NG", "years": [105], "stem": "As regards the facial bone fracture fixture device, which of the following statements is/are true? (複選)", "opts": {"A": "wire fixation is less stable than miniplate", "B": "miniplate has the strength about 2/3 of intact zygoma bone", "C": "resorbable plate has the strength about 1/10 of intact zygoma bone", "D": "bending is the cause of the failure of the resorbable system", "E": "plate and screw breakage is the cause of the failure in the titanium system."}, "ans": "AC", "multi": true, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B07-Q08", "conflict": "", "key": "固定強度階梯：**wire < resorbable < miniplate**。可吸收板強度約為完整顴骨的 **1/10**。\n（AI 補寫：B／D／E 的確切數值與失效機轉，原檔未附詳解，建議複查原文。）", "peropt": {"A": "◎ 鋼絲固定的穩定度低於迷你鈦板。", "B": "✗ 依原檔答案，迷你鈦板強度並非『完整顴骨的 2/3』。", "C": "◎ 可吸收板強度約完整顴骨的 1/10。", "D": "✗ 依原檔答案，此非可吸收系統的主要失效機轉。", "E": "✗ 依原檔答案，此非鈦系統的主要失效機轉。"}}, {"id": "3148", "sub": "D", "src": "NG", "years": [105], "stem": "Regarding the pediatric facial fractures, choose the wrong description:", "opts": {"A": "Facial fractures are relatively common in children, due to intrinsic anatomical factors such as larger fat pads, decreased pneumatization of sinuses, increased skeletal flexibility secondary to more malleable bone stock, and compliant sutures.", "B": "Future growth and development must be accounted for when addressing these injuries.", "C": "Mandible fractures are often cited as the most common pediatric facial fracture, accounting for 20–50% of all pediatric facial fractures.", "D": "Cranial-to-facial ratio decreases with maturity from 8 : 1 at birth to 2 : 1 in adulthood.", "E": "Indications for operative management of cranial base and skull fractures include significant displacement, cerebrospinal fluid (CSF) leak persisting despite conservative measures, intracranial hematoma, deformed facial contour, frontal-lobe contusion with mass effect, and growing skull fracture."}, "ans": "A", "multi": false, "etype": "ai", "expl": "考生建議：改版後寫orbital fracture才最常發生", "cite": "NG105 · NG105-B09-Q04", "conflict": "", "key": "小兒顏面骨折**相對罕見**（不是常見）——因為脂肪墊厚、鼻竇氣化不足、骨質柔韌、骨縫順應性高，這些都是**保護因子**。命題者把保護因子留著，卻把結論寫成『相對常見』。\n⚠ 考生建議：改版後**眶骨骨折**才是最常見的小兒顏面骨折（見 CN3155）。", "peropt": {"A": "◎ 正解（錯誤）：應為相對**罕見**。", "B": "✓ 必須把未來生長發育納入考量。", "C": "✓ 舊版謂下頜骨折佔 20–50%（新版改稱眶骨最常見）。", "D": "✓ 顱／顏比自出生 8:1 降至成人 2:1。", "E": "✓ 顱底與顱骨骨折的手術適應症。"}}, {"id": "3149", "sub": "D", "src": "NG", "years": [106], "stem": "Which of the following statements about facial bone fracture is incorrect?", "opts": {"A": "Blow-out fractures of the orbit with actual muscle incarceration is a surgical emergency and requires immediate release of the muscle.", "B": "Failure to reposition the medial canthal bone fragment in nasoethmoidal orbital fractures may result in telecanthus.", "C": "Visual acuity change or blindness can occur in 'superior orbital fissure syndrome'", "D": "Severe displacement of zygomatic arch fracture usually does not result in restricted mandibular motion,", "E": "Mandibular fractures that are directed downward and forward are classified as 'horizontally favorable'."}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B05-Q03", "conflict": "", "key": "兩個破綻：①**SOFS 不會失明**（失明＝orbital apex syndrome，見 CN3142）；②**嚴重移位的顴弓骨折會撞擊喙突，限制下頜運動**——這正是顴弓骨折需復位的功能性理由。", "peropt": {"A": "✓ 眶底骨折併肌肉嵌頓（white-eyed blowout）是外科急症。", "B": "✓ 內眥骨片未復位 → telecanthus。", "C": "◎ 錯誤：視力改變／失明屬 orbital apex syndrome。", "D": "◎ 錯誤：嚴重移位顴弓骨折**會**限制下頜運動。", "E": "✓ 骨折線向下前走行 → horizontally favorable。"}}, {"id": "3150", "sub": "D", "src": "NG", "years": [107], "stem": "Superior orbital fissure syndrome和哪一條神經較無關係?", "opts": {"A": "CN II", "B": "CN III", "C": "CN IV", "D": "CN V", "E": "CN VI"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B07-Q02", "conflict": "", "key": "**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n本題直接問『與哪條神經最無關』——答案就是 **CN II**。", "peropt": {"A": "◎ 正解：視神經走 optic canal，不經眶上裂。", "B": "CN III 通過。", "C": "CN IV 通過。", "D": "CN V1（眼支）通過。", "E": "CN VI 通過。"}}, {"id": "3151", "sub": "D", "src": "NG", "years": [109], "stem": "關於nasoethmoidal orbital fracture, 何者為是", "opts": {"A": "According to a pattern established by Markowitz and Manson, nasoethmoidal fractures are classified into 4 types.", "B": "Type I is an incomplete fracture, mostly bilateral", "C": "Type III is comminuted fracture with the fractures remaining outside the area of the canthal ligament insertion", "D": "Type IV have avulsion of the canthal ligment", "E": "One of the surgical approach can go local upper nasal incision"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B07-Q02", "conflict": "", "key": "**Markowitz–Manson NOE 分類共三型**（不是四型），依**內眥韌帶與中央骨片的關係**：\n**I** ＝中央骨片單一、韌帶附著完整\n**II** ＝粉碎，但骨折線在韌帶附著區**之外**\n**III** ＝粉碎且延伸至附著處，**韌帶撕脫**\n本題 A–D 全錯，正解落在手術徑路：可經**鼻背局部切口**。", "peropt": {"A": "✗ 為三型，非四型。", "B": "✗ Type I 為單一中央骨片（非『不完全、多為雙側』）。", "C": "✗ 骨折線在韌帶附著區外者為 **Type II**。", "D": "✗ 韌帶撕脫為 **Type III**。", "E": "◎ 正解：可採鼻背上方局部切口為手術徑路之一。"}}, {"id": "3152", "sub": "D", "src": "NG", "years": [109], "stem": "有關maxillary buttresses，下列何者為非？", "opts": {"A": "Central：septo─vomerine─ethmoidal─frontal", "B": "Posterior：maxillo─pterygoid", "C": "Lateral：maxillo─malar─frontal", "D": "Medial / paracentral：maxillo─naso─frontal", "E": "Anterior：maxillo─mandible"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B07-Q08", "conflict": "", "key": "上頜支柱（buttress）四組，全部**向上連到顱底**，沒有任何一組連到下頜：\n**Central**：septo–vomerine–ethmoidal–frontal\n**Medial/paracentral**：maxillo–naso–frontal\n**Lateral**：maxillo–malar–frontal\n**Posterior**：maxillo–pterygoid", "peropt": {"A": "✓ Central。", "B": "✓ Posterior。", "C": "✓ Lateral。", "D": "✓ Medial／paracentral。", "E": "◎ 正解（為非）：不存在 maxillo–mandible 支柱。"}}, {"id": "3153", "sub": "D", "src": "NG", "years": [109, 111, 114], "stem": "Which is not the key concepts of facial fracture in the pediatric population?", "opts": {"A": "Surgeon should recognize the potential for growing skull fractures.", "B": "Surgical intervention for orbital fractures should be determined upon clinical rather than radiologic findings.", "C": "All types of malocclusion in pediatric mandibular fractures should undergone surgical intervention.", "D": "The neonatal skull is profoundly different from its adult counterpart and therefore responds to traumatic forces with unique injury patterns.", "E": "When indicated, employing less invasive approaches to operative management should be practiced."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q08", "conflict": "", "key": "小兒顏面骨折的原則是**保守、依臨床而非影像、保留生長潛能**。**並非所有咬合不正都需手術**——兒童下頜有強大的重塑能力，多數可靠彈性牽引與觀察處理。", "peropt": {"A": "✓ 須警覺 growing skull fracture。", "B": "✓ 眶骨骨折依臨床表現（非影像）決定手術。", "C": "◎ 正解（非原則）：兒童咬合不正不必然手術。", "D": "✓ 新生兒顱骨與成人截然不同，損傷型態獨特。", "E": "✓ 有適應症時應採侵入性較低的術式。"}}, {"id": "3154", "sub": "D", "src": "NG", "years": [110], "stem": "下列何者並非frontal bone and sinus fracture產生的complication？", "opts": {"A": "CSF fluid rhinorrhea", "B": "Pneumocephalus and orbital emphysema", "C": "Absence of orbital roof and pulsating exophthalmos", "D": "Diplopia", "E": "Carotid–cavernous sinus fistula"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B07-Q06", "conflict": "", "key": "額骨與額竇骨折的併發症皆源自**顱腔／眶頂／海綿竇**：腦脊髓液鼻漏、氣顱與眶氣腫、眶頂缺損致**搏動性眼球突出**、頸動脈–海綿竇廔管。\n**複視屬眶底／眶壁骨折**（眼外肌嵌頓）的表現，不是額竇骨折。", "peropt": {"A": "✓ CSF 鼻漏。", "B": "✓ 氣顱與眶氣腫。", "C": "✓ 眶頂缺損 → 搏動性眼球突出。", "D": "◎ 正解（非併發症）：複視屬眶底／眶壁骨折。", "E": "✓ 頸動脈–海綿竇廔管。"}}, {"id": "3155", "sub": "D", "src": "NG", "years": [110, 112, 114], "stem": "最常見的幼童顏面骨骨折為下列何者?", "opts": {"A": "Frontal", "B": "Orbital", "C": "Zygoma", "D": "Maxilla", "E": "Mandible"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q06", "conflict": "", "key": "⚠ **跨版本事實變更**：舊版謂**下頜骨**為最常見小兒顏面骨折（CN3148 選項 C，20–50%）；**新版（NG110/112/114）改為眶骨（orbital）最常見**。\n作答錨定該年答案；概念上記住『**新版＝眶骨**』。", "peropt": {"A": "額骨較少見。", "B": "◎ 正解（新版）：眶骨最常見。", "C": "顴骨次之。", "D": "上頜骨少見。", "E": "下頜骨為舊版說法（見 CN3148）。"}}, {"id": "3156", "sub": "D", "src": "NG", "years": [111], "stem": "關於Naso-orbitoethmoid(NOE) complex fracture ，下列何者為是?", "opts": {"A": "Markowitz and Manson established a classification type I-IV only according to the CT scan.", "B": "Type II are comminuted nasoethmoidal fractures but involved the area of the canthal ligament insertion.", "C": "Type I displaced only inferiorly at the infraorbital rim and piriform margin.", "D": "Type IV to accomplish the bone reduction, the canthus should not be detached.", "E": "Nasal and forehead lacerations are common and can be extended."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG111 · NG111-B07-Q02", "conflict": "", "key": "**Markowitz–Manson NOE 分類共三型**（依內眥韌帶與中央骨片關係）：I＝單一大骨片、韌帶完整；II＝粉碎但骨折在附著區外；III＝粉碎延伸至附著處、韌帶撕脫。\nType I 只在眶下緣與梨狀孔緣**向下移位**，中央骨片完整。", "peropt": {"A": "✗ 為三型（非四型），且非僅依 CT。", "B": "✗ Type II 的骨折在韌帶附著區**之外**（此處寫『involved』即錯）。", "C": "◎ 正解：Type I 僅於眶下緣與梨狀孔緣向下移位。", "D": "✗ Type IV 不存在；Type III 復位時韌帶**需**分離再固定。", "E": "✗ 敘述本身合理但非本題最佳解。"}}, {"id": "3157", "sub": "D", "src": "NG", "years": [112, 113], "stem": "Which of the following is not an indication for surgical treatment of orbital fractures?", "opts": {"A": "Double vision caused by incarceration of muscle or the fine ligament system.", "B": "Radiographic evidence of extensive fracture, such that enophthalmos would occur.", "C": "Visual acuity deficit, increasing and not responsive to medical dose steroids, implying that optic canal decompression may be indicated.", "D": "Enophthalmos or exophthalmos (significant globe positional change) produced by an orbital volume change.", "E": "Presence of significant edema, retinal detachment, or other significant globe injuries, such as hyphema."}, "ans": "E", "multi": false, "etype": "ai", "expl": "In the presence of significant edema, retrobulbar hemorrhage, optic nerve injury, retinal detachment, or other significant globe injuries, such as hyphema, it is advisable to wait a number of days until stability of ocular condition is confirmed.", "cite": "NG112 · NG112-B07-Q02", "conflict": "", "key": "眶骨折的手術適應症全是**功能性**：肌肉嵌頓致複視、影像顯示大範圍骨折將致眼球內陷、視力惡化需視神經減壓、眼球位置改變。\n**大量水腫、視網膜剝離、前房出血等『眼球本身損傷』反而是相對禁忌**——此時應先處理眼球，延後眶壁手術。", "peropt": {"A": "✓ 肌肉／韌帶嵌頓致複視。", "B": "✓ 影像示大範圍骨折 → 預期眼球內陷。", "C": "✓ 視力惡化、對類固醇無反應 → 視神經減壓。", "D": "✓ 眶容積改變致眼球內陷／突出。", "E": "◎ 正解（非適應症）：合併嚴重眼球損傷時應延後眶手術。"}}, {"id": "3158", "sub": "D", "src": "NG", "years": [112, 113, 114], "stem": "Which of the following is not true regarding late complications of zygomatic fractures?", "opts": {"A": "Late complications of zygomatic fractures include nonunion, malunion, double vision, hypesthesia, and chronic maxillary sinusitis.", "B": "Generally, ectropion and scleral show may be problematic and frequently requires surgical correction.", "C": "Usually, more than 5 mm of inferior globe dystopia is required to produce diplopia.", "D": "Infection is not common, and usually responds to antibiotics and sinus or lacrimal drainage.", "E": "Impacted fractures of the zygomatic arch which abut the coronoid process may result in ankylosis."}, "ans": "B", "multi": false, "etype": "ai", "expl": "Late complications: Generally, ectropion and scleral show are mild and resolve spontaneously.", "cite": "NG112 · NG112-B07-Q03", "conflict": "", "key": "顴骨骨折晚期併發症：**ectropion 與 scleral show 通常輕微、多自行緩解**，不常需手術——命題者把它寫成『常需手術矯正』當破綻。\n另記：下方眼球移位需 >5 mm 才致複視；顴弓撞喙突可致關節僵直。", "peropt": {"A": "✓ 併發症包括不癒合、癒合不良、複視、感覺遲鈍、慢性上頜竇炎。", "B": "◎ 正解（錯誤）：ectropion 與 scleral show 多輕微、可自行緩解。", "C": "✓ 下方眼球移位須 >5 mm 才產生複視。", "D": "✓ 感染不常見，抗生素與引流多可處理。", "E": "✓ 顴弓嵌入撞喙突 → 關節僵直。"}}, {"id": "3159", "sub": "D", "src": "NG", "years": [113], "stem": "Which of the following statements about pediatric orbital floor trapdoor fractures are correct? (複選)", "opts": {"A": "Trapdoor fractures are more common in children due to greater bony elasticity.", "B": "Children tend to have fractures without enophthalmos or vertical orbital dystopia (VOD).", "C": "Trapdoor fractures are termed \"white-eyed blowout fractures\" because there is no subconjunctival ecchymosis.", "D": "Patients will have only mild restriction of gaze due to entrapped tissue in the fracture line.", "E": "The fracture line may be so small that there is no CT evidence of a fracture."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q06", "conflict": "", "key": "小兒眶底 **trapdoor（白眼）骨折**四大特徵：骨彈性大易呈活門式、常**無**眼球內陷或垂直錯位、無結膜下瘀血（故稱『white-eyed』）、CT 可能看不到骨折線。\n**但『只有輕度凝視受限』是錯的**——嵌頓可致嚴重的眼心反射（心搖過緩、噁心），是小兒外科急症，須及早手術。", "peropt": {"A": "◎ 骨彈性大 → 活門式骨折。", "B": "◎ 常無眼球內陷或垂直錯位。", "C": "◎ 無結膜下瘀血 → white-eyed blowout。", "D": "✗ 非輕度：嵌頓致嚴重限制與眼心反射，屬急症。", "E": "◎ 骨折線極小，CT 可能無證據。"}}, {"id": "3160", "sub": "D", "src": "NG", "years": [113], "stem": "Which of the following statements about LeFort I osteotomy is incorrect?", "opts": {"A": "An osteotomy from the piriform aperture extends laterally until the cut descends just posterior to the last maxillary molar and drops through the maxillary tuberosity. The cut should be made at least 5 mm above the tooth apices.", "B": "In cases of inferior or anterior positioning, gaps between the segments greater than 3 mm should be grafted.", "C": "The descending palatine arteries should be preserved and not be clipped or injured to avoid compromising the blood supply to the maxilla.", "D": "If the alar base is wide, an alar cinch suture can be performed to normalize the width.", "E": "A V–Y closure at the central incisor can help alleviate shortening of the lip."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q09", "conflict": "", "key": "Le Fort I 截骨的安全要點全對，唯一破綻在**下行顎動脈（descending palatine artery）**：教科書其實允許在必要時結紮它——上頜的血供主要靠軟組織蒂（頰黏膜、顎黏膜），單側甚至雙側結紮下行顎動脈通常仍安全。選項 C 把『可結紮』說成『絕不可傷及』，過度絕對。", "peropt": {"A": "✓ 截骨線距牙根尖至少 5 mm。", "B": "✓ 節段間隙 >3 mm 應植骨。", "C": "◎ 正解（錯誤）：下行顎動脈在必要時可結紮，非絕不可傷。", "D": "✓ 鼻翼過寬可做 alar cinch 縫合。", "E": "✓ 中門齒處 V–Y 縫合可緩解上唇縮短。"}}, {"id": "3163", "sub": "D", "src": "NG", "years": [115], "stem": "Which of the following is not true regarding late complications of zygomatic fractures?", "opts": {"A": "Late complications of zygomatic fractures include nonunion, malunion, double vision, hypesthesia, and chronic maxillary sinusitis.", "B": "G
