,"conflict":""},{"id":"3081","sub":"B","src":"NG","years":[106],"stem":"關於surgical treatment of velopharyngeal dysfunction, 最不建議的procedure是:","opts":{"A":"Posterior pharyngeal wall augmentation","B":"Sphincter pharyngoplasty","C":"Posterior pharyngeal flap","D":"Furlow double-opposing Z-palatoplasty","E":"Orticochea pharyngoplasty"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"VPD 手術中，**posterior pharyngeal wall augmentation（後咽壁填充）最不建議**——填充材料易位移、吸收，長期效果不可預測。其餘四者皆為主流術式。","peropt":{"A":"◎ 正解：後咽壁填充效果不持久，最不建議。","B":"✓ 括約肌咽成形術。","C":"✓ 後咽壁瓣。","D":"✓ Furlow 雙反向 Z 成形。","E":"✓ Orticochea 咽成形術。"},"cite":"NG106 · NG106-B06-Q09","conflict":""},{"id":"3082","sub":"F","src":"NG","years":[106,112],"stem":"在Craniofacial orthognathic surgery, 做完Le Fort I osteotomy, 將maxilla bone downfracture(Le Fort downfracture)後，maxillary segment主要的blood supply perfusion來自哪一條vessel?","opts":{"A":"Maxillary artery","B":"Nasopalatine artery","C":"Descending palatine artery","D":"Greater palatine artery","E":"Lesser palatine artery"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題（NG106/112）答 E（lesser palatine artery）。","peropt":{"A":"✗ Maxillary artery 為主幹，down-fracture 時其分支多已離斷。","B":"✗ Nasopalatine 供應前顎黏膜，非主要灌流源。","C":"✗ Descending palatine 常於 down-fracture 時被犧牲。","D":"✗ Greater palatine 為 descending palatine 延續。","E":"◎ 本年答案：lesser palatine（軟顎側枝）維持灌流。"},"cite":"NG106 · NG106-B06-Q10","conflict":""},{"id":"3083","sub":"E","src":"NG","years":[107],"stem":"Which is NOT the definitive indication for osseointegrated ear reconstruction?","opts":{"A":"Radiotherapy","B":"Potential craniofacial anomaly","C":"failed autogenous reconstruction.","D":"Patient preference","E":"Microtia"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"**骨整合植體耳重建的適應症＝『不適合或已失敗於自體重建』者**：放療後、顱顏異常組織不足、自體重建失敗、病人偏好。**Microtia 本身不是適應症**——單純小耳症的首選仍是自體肋軟骨重建。","peropt":{"A":"✓ 放療。","B":"✓ 潛在顱顏異常（組織條件差）。","C":"✓ 自體重建失敗。","D":"✓ 病人偏好。","E":"◎ 正解（非適應症）：單純小耳症應優先自體重建。"},"cite":"NG107 · NG107-B03-Q06","conflict":""},{"id":"3084","sub":"F","src":"NG","years":[107],"stem":"What is the most proper amount of maxillary incisor show when lip reposes?","opts":{"A":"0mm","B":"2mm","C":"4mm","D":"6mm","E":"8mm"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"上唇靜止時，上頜門齒外露的理想量約 **2–3 mm**（女性略多、男性略少，隨年齡遞減）。這是正顎與美容評估中臉高度的重要基準。\n⚠ 考生建議 C（4 mm）亦可，建議答案改 BC。本年答案 B。","peropt":{"A":"✗ 0 mm 過少（老化外觀）。","B":"◎ 本年答案：2 mm。","C":"⚠ 4 mm 亦在可接受範圍（考生建議納入）。","D":"✗ 6 mm 過多（露牙齦）。","E":"✗ 8 mm 明顯過多。"},"cite":"NG107 · NG107-B05-Q01","conflict":""},{"id":"3085","sub":"F","src":"NG","years":[107],"stem":"Which of the following is the most often injured nerve when doing bilateral sagittal split osteotomy (BSSO)?","opts":{"A":"inferior orbital nerve","B":"inferior alveolar nerve","C":"buccal nerve","D":"auriculotemporal nerve","E":"lingual nerve"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"**BSSO 最常傷及 inferior alveolar nerve（下齒槽神經，V3 分支）**——它走行於下頜骨內的 mandibular canal，矢狀劈開時最易受牽拉或斷裂，術後下唇與頦部麻木是最常見併發症。lingual nerve 次之。","peropt":{"A":"✗ 眶下神經屬上頜區。","B":"◎ 正解：下齒槽神經。","C":"✗ 頰神經受影響較少。","D":"✗ 耳顳神經不在術野。","E":"✗ 舌神經次之，非最常見。"},"cite":"NG107 · NG107-B05-Q02","conflict":""},{"id":"3086","sub":"F","src":"NG","years":[107],"stem":"Which kind of maxillary osteotomy is most often performed today in orthognathic surgery?","opts":{"A":"LeFort I","B":"LeFort II","C":"LeFort III"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"現行上頜截骨以 **Le Fort I 最常施行**——它在梨狀孔至翼上頜接合的低位截骨，可三維移動整個牙槽—顎複合體，適用大多數上頜性咬合不正。Le Fort II／III 保留給中臉或全顱顏畸形。","peropt":{"A":"◎ 正解：Le Fort I。","B":"Le Fort II 用於鼻上頜複合體。","C":"Le Fort III 用於全中臉（如 Crouzon）。"},"cite":"NG107 · NG107-B05-Q03","conflict":""},{"id":"3087","sub":"E","src":"NG","years":[107],"stem":"What is the main structural abnormality regarding the Stahl's ear?","opts":{"A":"excessive conchal height","B":"incomplete formation of antihelical fold","C":"increased conchoscaphal angle","D":"an abnormal crus extending superolaterally, traversing the scapha","E":"none of above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Stahl's ear（Stahl耳，又稱Vulcan/Spock ear）之核心結構異常為：在對耳輪（antihelix）出現一異常的「第三腳（third crus）」，向後上外側（superolaterally）延伸並橫越舟狀窩（scapha），使耳輪上緣呈尖角外觀。⚠ 易混淆：對耳輪褶皺形成不全（incomplete antihelical fold）與耳甲過高是隱耳/杯狀耳/招風耳（prominent ear）之特徵，非Stahl耳的定義性異常。","peropt":{"A":"✗ 耳甲過高為prominent/cup ear特徵，非Stahl耳定義。","B":"✗ 對耳輪褶皺形成不全為招風耳特徵。","C":"✗ conchoscaphal角增大屬招風耳之描述。","D":"✓(正解) 異常第三腳向後上外側延伸橫越舟狀窩，為Stahl耳定義性異常。","E":"✗ 有明確答案D，故非「以上皆非」。"},"cite":"待複查（NG Stahl耳畸形 記憶佐證）","conflict":""},{"id":"3088","sub":"E","src":"NG","years":[107],"stem":"對於大部分的Otoplasty procedures，小孩年齡至少要幾歲以上才適合?","opts":{"A":"3個月","B":"1歲","C":"4歲","D":"6歲","E":"10歲"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題正面問『至少幾歲』，答案 **4 歲**（NG107 版本）。與 GS 系列的『≥3 歲』略有出入，錨定該年。","peropt":{"A":"3 個月＝ear molding 時機，非手術。","B":"1 歲過早。","C":"◎ 正解（NG107）：4 歲。","D":"6 歲為全耳重建時機。","E":"10 歲為 Nagata 框架時機。"},"cite":"NG107 · NG107-B06-Q01","conflict":""},{"id":"3089","sub":"E","src":"NG","years":[107],"stem":"下列有關ear trauma何者錯誤？","opts":{"A":"最常見的併發症是hematoma","B":"Untreated auricular hematoma可能造成cauliflower ear","C":"Ear cartilage 若有laceration 一定要使用可吸收線縫合","D":"若傷到外耳道，可能導致stenosis","E":"可暫時將裸露的cartilage埋在耳後的皮瓣內來避免壞死"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考耳外傷（ear trauma）處置（選錯）。核心：最常見併發症為 hematoma（軟骨膜下血腫），若未處理引流會機化鈣化形成 cauliflower ear（花椰菜耳）；外耳道受傷可致 stenosis（狹窄）；裸露軟骨可暫時埋入耳後皮瓣內以避免壞死。⚠ 選項 C『耳軟骨若有 laceration 一定要用可吸收線縫合』的『一定要』為錯——耳軟骨裂傷多依附皮膚對位即可，常不需直接縫合軟骨；即便縫合亦非絕對且非必用可吸收線，此絕對化敘述即為錯誤選項。","peropt":{"A":"✗ 敘述正確。耳外傷最常見併發症為 hematoma（軟骨膜下血腫）。","B":"✗ 敘述正確。未處理的 auricular hematoma 會機化鈣化形成 cauliflower ear。","C":"✓（正解）錯誤敘述。耳軟骨裂傷多藉皮膚對位處理即可，『一定要用可吸收線縫合』的絕對化說法錯誤。","D":"✗ 敘述正確。傷及外耳道可能導致 stenosis（狹窄）。","E":"✗ 敘述正確。可將裸露軟骨暫埋於耳後皮瓣內以避免壞死，屬合理暫時處置。"},"cite":"待複查（NG 耳外傷處置 記憶佐證）","conflict":""},{"id":"3090","sub":"D","src":"NG","years":[107],"stem":"Superior orbital fissure syndrome和哪一條神經較無關係?","opts":{"A":"CN II","B":"CN III","C":"CN IV","D":"CN V","E":"CN VI"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n本題直接問『與哪條神經最無關』——答案就是 **CN II**。","peropt":{"A":"◎ 正解：視神經走 optic canal，不經眶上裂。","B":"CN III 通過。","C":"CN IV 通過。","D":"CN V1（眼支）通過。","E":"CN VI 通過。"},"cite":"NG107 · NG107-B07-Q02","conflict":""},{"id":"3091","sub":"B","src":"NG","years":[107],"stem":"下列有關lip reconstruction 何者錯誤?","opts":{"A":"上唇缺損寬度小於25%可以direct repair","B":"下唇缺損寬度小於30%可以direct repair","C":"中度缺損情況下，選擇free flap 比local flap為佳，因其自由度較大，功能較佳","D":"重建時需考量上下唇之關係","E":"使用Three-layered closure來保留功能"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 唇重建之重建階梯（reconstructive ladder）依缺損比例：上唇缺損<25%、下唇缺損<30%可直接縫合（direct repair）；中度缺損（約1/3–2/3）以局部/鄰位唇瓣（如Abbe、Estlander、Karapandzic）為佳；僅在全/近全唇缺損才用游離皮瓣。本題選「錯誤」。⚠ 易混淆：C稱中度缺損選游離瓣優於局部瓣為錯——局部唇瓣能提供同色、含口輪匝肌與感覺之組織，中度缺損功能與美觀均優於游離瓣。","peropt":{"A":"✗（正確敘述，非答案）上唇缺損<25%可直接修補。","B":"✗（正確敘述，非答案）下唇缺損<30%可直接修補。","C":"✓(正解，屬錯誤敘述) 中度缺損應以局部唇瓣為優，稱游離瓣較佳為錯。","D":"✗（正確敘述，非答案）重建須考量上下唇比例關係。","E":"✗（正確敘述，非答案）以三層縫合（黏膜、肌肉、皮膚）保留功能，正確。"},"cite":"待複查（NG 唇重建原則 記憶佐證）","conflict":""},{"id":"3092","sub":"A","src":"NG","years":[107],"stem":"以下有關Fibrous dysplasia 的描述何者錯誤?","opts":{"A":"Fibrous dysplasia是正常骨頭被fibro-osseous tissue取代造成的","B":"與McCune–Albright syndrome有關的病人以女性為主.","C":"多處骨頭比單一骨頭侵犯較多","D":"電腦斷層檢查是很好的檢查工具","E":"手術切除必須考量到功能及外觀的影響"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Fibrous dysplasia 第三度出現同一破綻：多骨型並不比單骨型常見。三年三考，務必記死。","peropt":{"A":"✓ 正常骨被纖維骨性組織取代。","B":"✓ McCune–Albright 以女性為主。","C":"◎ 正解（錯誤）：單骨型才是多數。","D":"✓ CT 為良好評估工具（毛玻璃樣變化）。","E":"✓ 手術須權衡功能與外觀。"},"cite":"NG107 · NG107-B07-Q07","conflict":""},{"id":"3093","sub":"A","src":"NG","years":[107,112,114],"stem":"胚胎時期，1st pharyngeal arch 發育成以下構造，何者除外？","opts":{"A":"mandible and maxilla","B":"Muscles of mastication","C":"Trigeminal nerve","D":"Maxillary artery","E":"Muscles of facial expression"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"第一鰓弓：上下頜、咀嚼肌、三叉神經（V）、maxillary artery。**表情肌屬第二鰓弓（顏面神經 VII）**。神經配對是最快的辨識法：咀嚼＝V，表情＝VII。","peropt":{"A":"✓ 上下頜由上頜突、下頜突形成。","B":"✓ 咀嚼肌。","C":"✓ 三叉神經。","D":"✓ Maxillary artery（注意不是 mandibular artery）。","E":"◎ 正解（除外）：表情肌來自第二鰓弓，由顏面神經支配。"},"cite":"NG107 · NG107-B08-Q01","conflict":""},{"id":"3094","sub":"F","src":"NG","years":[107],"stem":"在正顎手術進行LeFort I osteotomy and downfracture 之後，maxilla 的blood supply 是由何血管供應？","opts":{"A":"Descending palatine artery","B":"Lesser palatine artery","C":"Nasopalatine artery","D":"Maxillary artery","E":"Greater palatine artery"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題（NG107）答 B（lesser palatine artery），與 CN3197 一致。同一考點在 NG106/107/112 三年反覆出現。","peropt":{"A":"✗ Descending palatine 多被犧牲。","B":"◎ 本年答案：lesser palatine。","C":"✗ Nasopalatine 非主要灌流。","D":"✗ Maxillary artery 主幹分支已斷。","E":"✗ Greater palatine 為 descending 延續。"},"cite":"NG107 · NG107-B08-Q02","conflict":""},{"id":"3095","sub":"A","src":"NG","years":[107],"stem":"Which of the followings is incorrect?","opts":{"A":"Pierre Robin described the triad of macrognathia, glossoptosis, and respiratory distress.","B":"In Pierre Robin syndrome patient, closure of the palate narrows the effective area for respiration and can lead to respiratory distress.","C":"Submucous cleft palate occurs when the palate has mucosal continuity but the underlying levator palatini muscle is longitudinally oriented.","D":"Corrective surgical technique for submucous cleft palate is focused on anatomic correction of the velar muscle diastasis.","E":"The Furlow double opposing Z-plasty is an ideal procedure for submucosal cleft palate patients."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Pierre Robin 三徵是 **micrognathia**（小頜）、glossoptosis、呼吸窘迫。題目寫 macrognathia（大頜）——一個字母之差，方向完全相反。","peropt":{"A":"◎ 正解（不正確）：應為 micrognathia，非 macrognathia。","B":"✓ 關閉顎裂會縮小有效呼吸面積，可能加重呼吸窘迫。","C":"✓ 黏膜下裂顎：黏膜連續，但 levator veli palatini 呈縱向走行（異常止於硬顎後緣）。","D":"✓ 手術核心是矯正軟顎肌肉的分離（velar muscle diastasis）。","E":"✓ Furlow 雙反向 Z 成形術可重建肌肉吊帶，適合黏膜下裂顎。"},"cite":"NG107 · NG107-B08-Q05","conflict":""},{"id":"3096","sub":"B","src":"NG","years":[107],"stem":"Which is the goal of treatment of the alveolar cleft?","opts":{"A":"Stable bone continuity of maxillary arch","B":"Separation of oral and nasal cavities","C":"Appropriate maxillary arch form and transverse width","D":"Stable environment for eruption of cleft-side canine","E":"All of them"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"齒槽裂治療的四大目標**同時成立**：上頜弓骨性連續、口鼻腔分隔、恢復弓形與橫向寬度、為裂側**尖牙**萌發提供穩定骨床。","peropt":{"A":"◎ 上頜弓骨性連續。","B":"◎ 口鼻腔分隔（關閉瘻管）。","C":"◎ 恢復弓形與橫向寬度。","D":"◎ 裂側尖牙萌發的穩定環境。","E":"◎ 正解：以上皆是。"},"cite":"NG107 · NG107-B08-Q06","conflict":""},{"id":"3097","sub":"A","src":"NG","years":[107],"stem":"The most lateral craniofacial cleft in Tessier classification?","opts":{"A":"Number 1","B":"Number 14","C":"Number 5","D":"Number 6","E":"Number 7"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Tessier 顏面裂編號 0–14，**No.7 為最外側**（lateral facial cleft，自口角向耳屏延伸，即 macrostomia）。","peropt":{"A":"No.1 靠近中線。","B":"No.14 為顱裂端的中線裂（與 No.0 對應）。","C":"No.5 位置中間。","D":"No.6 為 Treacher Collins 組合之一。","E":"◎ 正解：No.7 最外側。"},"cite":"NG107 · NG107-B09-Q01","conflict":""},{"id":"3098","sub":"A","src":"NG","years":[107],"stem":"Which is not a characteristic cininical features of Treacher-Collins syndrome?","opts":{"A":"Antimongoloid obliquity of palpebral fissures","B":"Superior migration of superolateral portion of frontal bone","C":"Narrow and underprojected maxilla","D":"Hypoplastic mandible","E":"Flattened frontonasal angle"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Treacher Collins 的骨性特徵是**額骨顴突後縮／下移**、顴骨與下頜發育不全。B 說「superolateral 額骨向上移位」方向相反。","peropt":{"A":"✓ 眼裂外下斜（antimongoloid slant）——與 Down's 的外上斜相反。","B":"◎ 正解（非特徵）：額骨外上部並非向上移位。","C":"✓ 上頜狹窄、前突不足。","D":"✓ 下頜發育不全。","E":"✓ 額鼻角變平。"},"cite":"NG107 · NG107-B09-Q02","conflict":""},{"id":"3099","sub":"A","src":"NG","years":[107],"stem":"Providing sufficient soft tissue coverage is one of the most important challenges to plastic surgeons in separation of conjoined twins. Which description is correct?","opts":{"A":"Skin grafting is the most useful primary method of coverage in these patients","B":"The first report of the successful use of tieeue expansion for the separation of conjoined twins was in 1986 for the successful separation of an ischiopagus conjoined twins pair","C":"When using tissue expander in conjointed twins, care most be paid that plastic surgeons should as few number of tissue expander as possible","D":"Skin graft, skin substitute products, local skin flaps, and tissue expansion are mothods for providing soft tissue coverage, but pneumoperitoneum had been proved unsuccessful","E":"Conjoined twin separation is dissimilar to separation of simple syndactyly, which usually does not of problems on resurfacing"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考連體嬰（conjoined twins）分離手術中軟組織覆蓋策略（選對）。核心觀念：組織擴張術（tissue expansion）為術前取得足量皮膚覆蓋的主力方法，優於單純植皮；分離後大面積、覆蓋於脊椎/內臟上的創面單靠植皮並不理想。⚠ 正確者為 B——首次成功應用組織擴張進行連體嬰分離的報告為 1986 年之 ischiopagus（坐骨聯胎）案例。其餘敘述皆有誤：植皮並非首選主力（A 錯）、應依需求使用足夠數量擴張器而非刻意最少（C 錯）、pneumoperitoneum（人工氣腹）並非被證實無效（D 錯）、且連體嬰覆蓋與單純併指分離差異甚大（E 語意混亂且錯誤）。","peropt":{"A":"✗ 錯誤。植皮並非最有用的首選覆蓋方法，組織擴張術才是主力；覆蓋於內臟/脊椎上的植皮不理想。","B":"✓（正解）正確。首次成功以 tissue expansion 進行連體嬰分離的報告為 1986 年之 ischiopagus 聯胎。","C":"✗ 錯誤。應依覆蓋需求使用足夠數量的擴張器，而非刻意使用最少數量。","D":"✗ 錯誤。Pneumoperitoneum（人工氣腹）作為增加腹壁組織的方法並非被證實無效，敘述有誤。","E":"✗ 錯誤。連體嬰分離之覆蓋難度與單純併指分離差異極大，語意亦混亂，屬錯誤敘述。"},"cite":"待複查（NG 連體嬰分離/軟組織覆蓋 記憶佐證）","conflict":""},{"id":"3100","sub":"A","src":"NG","years":[107],"stem":"〔複選〕\n複選1. Which syndomes are always combined with hypertelorism and syndactylies? (複選)","opts":{"A":"Crouzon's syndrome","B":"Craniofrontaonasal dysplasia","C":"Pfeiffer's syndrome","D":"Down's syndrome","E":"Apert's syndrome"},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"「顱縫早閉＋併指」＝ **Apert 與 Pfeiffer**。Crouzon 有顱縫早閉但**無併指**，這是最經典的鑑別點。\n⚠ 本題有考生建議：Craniofrontonasal dysplasia（B）亦具眼距過寬與併指，主張答案應為 BCE。以原年度官方答案 CE 為準。","peropt":{"A":"✗ Crouzon：顱縫早閉、眼球突出，但手足正常。","B":"⚠ Craniofrontonasal dysplasia 有眼距過寬與併指——考生主張應納入。","C":"◎ Pfeiffer：寬拇指／拇趾、部分併指。","D":"✗ Down's 無此組合。","E":"◎ Apert：對稱性複雜併指（mitten hand）。"},"cite":"NG107 · NG107-B09-Q08","conflict":""},{"id":"3101","sub":"A","src":"NG","years":[107],"stem":"[考生建議：B應該也對 建議答案改BCE]\n\n複選2. The most useful flaps for restoring facial volume in reconstruction of hemifaical atrophy are? (複選)","opts":{"A":"Parascapular flap","B":"Deep inferior epigastric perforator flap","C":"Anterolateral thigh flap","D":"Scapular flap","E":"Omentum flaps"},"ans":"AD","multi":true,"etype":"ai","expl":"","key":"🎯 半側顏面萎縮（Parry-Romberg / hemifacial atrophy）重建以「回復顏面軟組織體積」為目標，最常用且經典之游離皮瓣為肩胛/肩胛旁皮瓣（scapular / parascapular flap），因其可提供大量無累贅之脂肪筋膜組織、蒂長且供區隱蔽，塑形佳。⚠ 易混淆：本題考生曾建議改為BCE（DIEP、ALT、omentum亦可提供體積），但依權威解答為AD；omentum、ALT、DIEP臨床亦有應用，記憶時以Neligan列舉之scapular/parascapular為首選答案（答案疑義，臨床仍多元）。","peropt":{"A":"✓(正解) 肩胛旁皮瓣提供大量脂肪筋膜，為回復顏面體積之經典選擇。","B":"✗ DIEP臨床可用，但非本題權威列舉之首選（考生曾建議納入）。","C":"✗ ALT臨床可用於顏面體積回復，但非本題列舉之標準答案。","D":"✓(正解) 肩胛皮瓣為回復顏面體積之經典選擇。","E":"✗ 網膜瓣可用於顏面填補，但非本題權威列舉之首選。"},"cite":"待複查（NG 半側顏面萎縮重建 記憶佐證）","conflict":""},{"id":"3102","sub":"A","src":"NG","years":[107],"stem":"複選3. Which descriptions about Pierre Robin sequence (PRS) are wrong? (複選)","opts":{"A":"PRS describes a syndrome combined with glossoptosis, retrognathia, airway compromise, and possibly clefting of the secondary palate.","B":"The spectrum of symptoms is vast and and G113-B03-Q01） ｜ ⚠ 同題歷屆重出（Craniofacial osseointegrated implant成功標準—何者錯誤）：錯誤選項恆為A(「乳突與眶區在非放射過骨、5年僅50%成功率即為最低成功標準」—門檻遠高於50%)；108/110/112年(3103)與113年(3167)答案皆A，差異僅在113年移除了E「以上皆是」選項。"},{"id":"3105","sub":"B","src":"NG","years":[108],"stem":"關於唇重建，以下何者錯誤？","opts":{"A":"上唇缺損25% 可primary closure","B":"下唇缺損35% 可 primary closure","C":"Bilateral Gillies fan flaps 或 Karapandzic flap 可用來關閉高達80% 的唇缺損","D":"最常見用來重建上下唇的顯微游離皮瓣為Radial forearm free flap","E":"以上皆正確"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考唇重建原則（選錯）。務必牢記 primary closure 的閾值：上唇缺損 ≤25%、下唇缺損 ≤30% 可直接縫合。⚠ 選項 B『下唇缺損 35% 可 primary closure』超過 30% 上限，為錯誤選項。其餘正確：雙側 Gillies fan flaps 或 Karapandzic flap 可關閉達 80% 唇缺損；重建全/近全唇最常用的顯微游離皮瓣為 radial forearm free flap。","peropt":{"A":"✗ 敘述正確。上唇缺損 ≤25% 可 primary closure。","B":"✓（正解）錯誤敘述。下唇 primary closure 上限約 30%，『35%』已超過閾值。","C":"✗ 敘述正確。雙側 Gillies fan flaps 或 Karapandzic flap 可關閉高達 80% 的唇缺損。","D":"✗ 敘述正確。重建上下唇最常用的游離皮瓣為 radial forearm free flap。","E":"✗ 因 B 為錯誤敘述，故『以上皆正確』不成立。"},"cite":"待複查（NG 唇重建 primary closure 閾值 記憶佐證）","conflict":""},{"id":"3106","sub":"B","src":"NG","years":[108,111,113,114,115],"stem":"下列何者不是lip reconstruction 的目標?","opts":{"A":"Preservation of function.","B":"Reconstitution of orbicularis oris.","C":"Two-layered closure.","D":"Accurate alignment of vermilion.","E":"Maintenance of relationship between upper and lower lips."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 唇重建（lip reconstruction）之目標包括：保留功能（口輪匝肌之口腔括約功能）、重建口輪匝肌連續性（reconstitution of orbicularis oris）、精準對位唇紅緣（accurate vermilion alignment）、維持上下唇之相互關係。全層唇缺損應以「三層縫合（three-layered：黏膜、肌肉、皮膚）」修復，而非兩層。本題選「非目標」者。⚠ 易混淆：C「兩層縫合」為錯，正確為三層，以確保肌肉連續與功能。","peropt":{"A":"✗（屬正確目標）保留功能為重建目標。","B":"✗（屬正確目標）重建口輪匝肌連續性為目標。","C":"✓(正解，非重建目標) 應為三層縫合，「兩層縫合」不是目標。","D":"✗（屬正確目標）精準對位唇紅緣為目標。","E":"✗（屬正確目標）維持上下唇關係為目標。"},"cite":"待複查（NG 唇重建目標 記憶佐證）","conflict":""},{"id":"3107","sub":"D","src":"NG","years":[108],"stem":"外傷性眶上裂症候群之症狀不包含下列何者？(複選)","opts":{"A":"眼外直肌 (Lateral rectus) 麻痹","B":"視力喪失","C":"臉頰麻痺","D":"上眼瞼下垂 (Upper eyelid ptosis)","E":"額頭麻痺"},"ans":"BC","multi":true,"etype":"ai","expl":"","key":"🎯 本題考外傷性上眶裂症候群（Superior orbital fissure syndrome, SOFS）之症狀（複選『不包含』者）。SOF 通過的結構為 CN III、IV、VI 與三叉神經第一分支 V1（ophthalmic），故典型症狀為：眼外肌全麻痺（含 lateral rectus 由 CN VI）、上眼瞼下垂（ptosis，CN III）、瞳孔散大固定、以及前額（forehead, V1 分布區）麻木。⚠ 關鍵鑑別：①『視力喪失』屬 CN II 受累，是 Orbital apex syndrome（眶尖症候群）而非單純 SOFS；②『臉頰麻木』屬 V2（maxillary），經 foramen rotundum 而非上眶裂，故不在 SOF 範圍。因此 B、C 為『不包含』的正確答案。","peropt":{"A":"✗ 不選。眼外直肌（lateral rectus）麻痹由 CN VI 支配、CN VI 通過 SOF，屬 SOFS 症狀，非『不包含』者。","B":"✓（正解）為『不包含』者。視力喪失涉及 CN II（視神經），屬 orbital apex syndrome，而非單純 SOFS。","C":"✓（正解）為『不包含』者。臉頰麻痺屬 V2（maxillary），經 foramen rotundum 而非上眶裂，故不在 SOFS 範圍。","D":"✗ 不選。上眼瞼下垂（ptosis）由 CN III 受累造成，CN III 通過 SOF，屬 SOFS 症狀。","E":"✗ 不選。額頭麻痺屬 V1（ophthalmic）分布，V1 通過 SOF，屬 SOFS 症狀。"},"cite":"待複查（NG 顱顏外傷/上眶裂症候群 記憶佐證）","conflict":""},{"id":"3108","sub":"B","src":"NG","years":[104,108],"stem":"關於唇部缺損的重建，下列哪些敘述正確？(複選)","opts":{"A":"當下唇缺陷小於 40%，通常可以直接縫合","B":"設計 Abbe flap 來重建上唇的 defect 時，皮瓣的寬度約等於 defect 寬度的一半，vertical height 則與 defect 的 vertical height 相等","C":"Stair-step flap, Fujimori flap, 和 Bernard-Burrow cheek advancement flap 是帶入非嘴唇組織的皮瓣來重建較大的缺損","D":"Gillies flap 為 full-thickness flap，優點是可以保留嘴唇肌肉的神經支配","E":"Estlander flap, Gillies flap, 和 Karapandzic flap 是使用嘴唇組織來修補缺損，缺點是會造成 blunting commissure"},"ans":"BE","multi":true,"etype":"ai","expl":"","key":"🎯 唇缺損重建原則（複選選「正確」）：下唇直接縫合上限約30%（非40%）；Abbe瓣設計寬度約為缺損寬度之一半、垂直高度與缺損相等；使用唇組織之Estlander/Gillies/Karapandzic瓣共同缺點是造成口角鈍化（blunting of commissure）。⚠ 易混淆：Stair-step（Johanson階梯）屬「利用鄰近唇組織」之推進技術，與Fujimori（gate flap）、Bernard-Burrow頰推進（引入非唇組織）不同類，故將三者並列為「非唇組織」屬歸類錯誤；Gillies瓣不保留神經支配（保留者為Karapandzic）。","peropt":{"A":"✗ 下唇直接縫合上限約30%，稱<40%為錯。","B":"✓(正解) Abbe瓣寬度約缺損之半、垂直高度相等，正確。","C":"✗ Stair-step屬利用鄰近唇組織之推進，與Fujimori/Bernard-Burrow並列為「非唇組織」屬歸類錯誤。","D":"✗ Gillies瓣不保留肌肉神經支配（保留者為Karapandzic），敘述錯誤。","E":"✓(正解) Estlander/Gillies/Karapandzic用唇組織，缺點為口角鈍化，正確。"},"cite":"待複查（NG 唇瓣分類 記憶佐證）","conflict":"⚠ 同題歷屆重出（唇部缺損重建—複選）：104年(3044)將下唇直接縫合門檻寫「<30%」並列為正確，答ABC；108年(3108)把該數字改為「<40%」使A變成錯誤，且選項重排(3044之C=3108之E：Estlander/Gillies/Karapandzic致blunting commissure；3044之E=3108之C：Stair-step/Fujimori/Bernard-Burrow為引入非唇組織)，答BE。⚠數字微調(30%→40%)直接改變答案；核心考點(下唇約1/3內可直接縫合、各皮瓣特性:Abbe寬約缺損1/2、Gillies非full-thickness)不變。"},{"id":"3109","sub":"B","src":"NG","years":[108],"stem":"關於下唇重建，使用Karapandzic與Gilles兩種方式的比較，何者為非？","opts":{"A":"使用Karapandzic較可保留commisure，且其寬度較讓人滿意。","B":"使用Karapandzic可保留下唇功能及感覺。","C":"使用Gilles嘴唇寬度減少，且須另外使用口內黏膜來補充唇部的mucosal cover。","D":"使用Gilles無法保留神經，故無法保留下唇功能及感覺。","E":"以上皆正確。"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題比較下唇重建的 Karapandzic 與 Gillies fan flap（問『何者為非』，答案為 E）。核心對照：Karapandzic flap 保留神經血管（neurotized），能維持下唇的『運動與感覺功能』並較能保留 commissure（嘴角）；Gillies fan flap 會使唇寬度減少、需以口內黏膜補充唇緣的 mucosal cover，且神經被離斷、無法保留功能與感覺。⚠ 本題選項 A–D 皆為正確敘述，故正解為 E『以上皆正確』；此為『全部皆對』型選項，作答時 A–D 各自內容均需確認無誤方能選 E。","peropt":{"A":"✗ 該敘述本身正確（Karapandzic 較能保留 commissure、寬度令人滿意），但因並非『為非』者，故非最終選項。","B":"✗ 該敘述本身正確（Karapandzic 為 neurotized，保留下唇功能與感覺），非最終選項。","C":"✗ 該敘述本身正確（Gillies 使唇寬減少，需另用口內黏膜補充 mucosal cover），非最終選項。","D":"✗ 該敘述本身正確（Gillies 無法保留神經，故無法保留功能與感覺），非最終選項。","E":"✓（正解）因 A–D 敘述皆正確，故『以上皆正確』為應選答案。"},"cite":"待複查（NG 下唇重建 Karapandzic vs Gillies 記憶佐證）","conflict":""},{"id":"3110","sub":"A","src":"NG","years":[108],"stem":"Auditory tube and middle ear, and part of the tympanicmembrane起源自？","opts":{"A":"Pharyngeal cleft 1","B":"Pharyngeal arch 1","C":"Pharyngeal cleft 3","D":"Pharyngeal arch 2","E":"Pharyngeal cleft 2"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"耳咽管、中耳腔、部分鼓膜 ← **第一咽囊（pharyngeal pouch 1）**的 tubotympanic recess。外耳道則來自第一咽溝（cleft/groove）。\n⚠ 原檔以「cleft 1」表述，嚴格解剖學應為 pouch 1；作答依原檔答案 A。","peropt":{"A":"◎ 原檔正解（第一咽囊／溝，內胚層來源）。","B":"✗ 第一鰓弓 → 上下頜、咀嚼肌、V。","C":"✗ 第三咽囊 → 下副甲狀腺、胸腺。","D":"✗ 第二鰓弓 → 鐙骨、表情肌、VII。","E":"✗ 第二咽溝正常會被閉鎖（殘留即鰓裂囊腫）。"},"cite":"NG108 · NG108-B08-Q05","conflict":""},{"id":"3111","sub":"A","src":"NG","years":[108],"stem":"有關DiGeorge syndrome，何者為非？","opts":{"A":"和Treacher-Collin syndrome一樣同為mandibulofacial dysostosis的一種。","B":"就是22q11.2 deletion syndrome。","C":"是4th及5th pharyngeal clefts的agenesis or hypogenesis","D":"受影響的基因為TBX1 gene。","E":"以上皆非。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"DiGeorge＝22q11.2 缺失、TBX1、**第三與第四咽囊（pouch）發育不全** → 胸腺與副甲狀腺缺損。題目寫「4th 及 5th pharyngeal clefts」，弓／囊／溝與編號雙錯。","peropt":{"A":"⚠ 嚴格說 DiGeorge 並非 mandibulofacial dysostosis（TCS 才是），此項亦有疑義，但非本年答案。","B":"✓ 即 22q11.2 缺失症候群。","C":"◎ 正解（為非）：應為第三、四**咽囊**發育不全，非第四、五咽溝。","D":"✓ TBX1。","E":"✗ 因 C 為非，故此項不成立。"},"cite":"NG108 · NG108-B08-Q06","conflict":""},{"id":"3112","sub":"B","src":"NG","years":[108,112],"stem":"若父母兩人皆無唇顎裂，但第一個孩子有唇裂及顎裂，則下一個孩子有唇顎裂的機會多高？","opts":{"A":"與父母有無唇顎裂較有關，與孩子有無唇顎裂無影響。","B":"4%","C":"8%","D":"17%","E":"25%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"唇顎裂再發風險三個數字，務必分清**誰患病**：\n父母皆正常＋1 名患兒 → **4%**\n父母皆正常＋2 名患兒 → **9%**（見 CN3068）\n**一位父母患病**＋1 名患兒 → **17%**（見 CN3090）","peropt":{"A":"✗ 兩者皆有影響，此為誘答。","B":"◎ 正解：4%。","C":"✗ 8% 非標準值。","D":"✗ 17% 為『父母之一患病＋一名患兒』。","E":"✗ 25% 為體染色體隱性遺傳的比例，非此處。"},"cite":"NG108 · NG108-B08-Q07","conflict":""},{"id":"3113","sub":"B","src":"NG","years":[108,112],"stem":"Posterior pharyngeal flap 為correction of velopharyngeal dysfunction最古老的手術方之一，其常見的complications包括?（複選）","opts":{"A":"Bleeding","B":"Dehiscence","C":"Nasal airway obstruction","D":"Obstructive sleep apnea","E":"Hoarseness"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"Posterior pharyngeal flap 的併發症全部與**出血、裂開、鼻氣道阻塞**相關，其中 **OSA 是最須警覺者**。**聲音沙啞（hoarseness）不是**——它與喉部無關。此題與 CN3096 為同題正反問法。","peropt":{"A":"◎ 出血。","B":"◎ 瓣裂開。","C":"◎ 鼻氣道阻塞。","D":"◎ 阻塞型睡眠呼吸中止。","E":"✗ 聲音沙啞非本術式併發症。"},"cite":"NG108 · NG108-B08-Q08","conflict":""},{"id":"3114","sub":"F","src":"NG","years":[108],"stem":"有關cleft and craniofacial orthognathic surgery的敘述，下列何者為是? (複選)","opts":{"A":"Maxillary retrusion resulting in class III malocclusion is typical of the cleft lip/palate population.","B":"25-30% of dentofacial deformities have midface retrusion severe enough to require orthognathic surgery.","C":"Orthognathic surgery should ideally be performed as soon as possible even facial growth is incomplete","D":"Treatment should favor expansive movements (anterior and inferior repositioning) to achieve class I occlusion.","E":"Treatment should favor expansive movements (superior and posterior repositioning) to achieve class I occlusion."},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"唇顎裂正顎的核心事實：裂顎族群典型為**上頜後縮 → class III 咬合**；約 **25–30%** 齒顏面畸形嚴重到需正顎；治療偏好**擴張性移動（前移、下移）**達 class I。\n兩個破綻：C『生長未完成即盡早手術』錯（須等生長結束）；E 把移動方向寫成『上移、後移』（收縮性）錯。","peropt":{"A":"◎ 上頜後縮致 class III，為裂顎族群典型。","B":"◎ 25–30% 需正顎。","C":"✗ 應等生長結束再手術。","D":"◎ 偏好擴張性移動（前移、下移）。","E":"✗ 方向寫反（應為前下，非上後）。"},"cite":"NG108 · NG108-B08-Q09","conflict":""},{"id":"3115","sub":"A","src":"NG","years":[108],"stem":"在orbital hypertelorism 矯正手術中，下列哪些情況bipartition會優於orbital shift ? (複選)","opts":{"A":"The maxillary arch is narrow and inverted.","B":"The axis of orbits is normal","C":"The nasal fossae are narrow.","D":"Extent of hypertelorism is severe.","E":"Some midline clefts are associated with an encephalocele of the ethmoidosphenoidal area."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"Bipartition 優於 box-shift 的情境，共同點是**上頜／鼻腔在橫向上過窄或中線結構異常**——bipartition 能同時擴張上頜弓並旋轉兩側半臉。眶軸正常時，單純 box-shift 即可。","peropt":{"A":"◎ 上頜弓狹窄且內傾 → bipartition 可同時擴弓。","B":"✗ 眶軸正常 → box-shift 已足夠。","C":"◎ 鼻腔狹窄。","D":"◎ 眼距過寬程度嚴重。","E":"◎ 合併篩蝶區腦膨出的中線裂。"},"cite":"NG108 · NG108-B08-Q10","conflict":""},{"id":"3116","sub":"A","src":"NG","years":[108],"stem":"有關Cranial facial clefts之分類 (The Tessier classification), 何者錯誤?","opts":{"A":"There are 14 types of numbered cranial facial cleft based on the Tessier classification.","B":"The eyelids and orbits define the horizontal axis dividing the face into upper and lower hemispheres.","C":"The facial clefts are numbered 0 through 7.","D":"The cranial clefts are numbere 8 through 14","E":"Tessier cleft number 7 is the most lateral cranial facial cleft"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Tessier 分類編號 **0 到 14，共 15 型**（顏面裂 0–7、顱裂 8–14），且顱裂與顏面裂以眼瞼／眼眶為水平軸互相對應（0＋14、1＋13…）。A 說「14 型」漏算 No.0。","peropt":{"A":"◎ 正解（錯誤）：應為 15 型（0–14），非 14 型。","B":"✓ 眼瞼與眼眶構成上下半球的水平軸。","C":"✓ 顏面裂 0–7。","D":"✓ 顱裂 8–14。","E":"✓ No.7 為最外側（見 CN3023）。"},"cite":"NG108 · NG108-B09-Q01","conflict":""},{"id":"3117","sub":"C","src":"NG","years":[108,111,112],"stem":"有關craniosynsyosis何者正確?","opts":{"A":"Nonsyndromic caniosynstosis is the pathological fusion of one or more cranial vault sutures which is often associated with genetic predisposition.","B":"Syndromic craniosyntosis is defined by having non-coexisting anomalies aside from fused cranial sutures.","C":"The treatment of craniosyntosis requireds a multidisciplinary team approach.","D":"The optimal timing for vault remodeling procedures such as frontal orbital advancement and posterior vault remodeling, most surgeon agree to above age of 1-year-old.","E":"The surgical treatment has low mortality. Usually there is no need for blood transfusion."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"顱縫早閉四個常見錯誤：非症候群性**多為偶發、非遺傳傾向**；症候群性的定義是**合併其他異常**（非『非共存』）；顱穹重塑最佳時機在 **9–12 個月**；手術**出血量大、常需輸血**。唯一正確：需**多科團隊**。","peropt":{"A":"✗ 非症候群性多為偶發，非常與遺傳傾向相關。","B":"✗ 症候群性＝**有**共存異常。","C":"◎ 正解：需多科團隊。","D":"✗ 多數術者認為 1 歲以前（約 9–12 個月）為佳。","E":"✗ 顱穹手術失血量大，常需輸血。"},"cite":"NG108 · NG108-B09-Q02","conflict":""},{"id":"3118","sub":"A","src":"NG","years":[108,111,112,114],"stem":"有關Craniofacial microsomia(CFM)先天性的頭頸部疾病,下列選項何者錯誤?","opts":{"A":"此疾病與胚胎期第一第二腮弓發育不全有關","B":"常影響的區域包含耳朵,下頷骨及額骨.","C":"Goldenhar syndrome現在被廣泛認為是CFM症候群的一部分","D":"下頷骨發育不全(mandibular hypoplasia)是診斷此疾病的重點.","E":"大部分sporadic, 少數autosomal dominant"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"CFM 侵犯的是第一、二鰓弓衍生構造：**耳、下頜、上頜／顴骨**。額骨屬額鼻突，不在鰓弓範圍。","peropt":{"A":"✓ 第一、二鰓弓發育不全。","B":"◎ 正解（錯誤）：應為耳、下頜、上頜／顴骨，額骨非典型受累區。","C":"✓ Goldenhar（眼—耳—脊椎譜系）視為 CFM 的一部分。","D":"✓ 下頜發育不全是診斷核心。","E":"✓ 多為偶發，少數體染色體顯性。"},"cite":"NG108 · NG108-B09-Q03","conflict":""},{"id":"3119","sub":"A","src":"NG","years":[108],"stem":"有關Idiopathic progressive hemifacial atrophy 何者不正確?","opts":{"A":"Idiopathic progressive hemifacial atrophy (PHA) 也可稱做 Parry-Romberg syndrome.","B":"首先描述hemifacial atrophy的醫師是Dr. Caleb Hiller Parry","C":"PHA主要造成的病因不明,但被認為與自體免疫疾病及神經疾病相關","D":"此疾病好發族群為男性學齡前幼兒","E":"此疾病與 \"en coup de sabre\" (ECDS)常被視作是同一類疾病."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Parry–Romberg（PHA）好發於**女性**，多在**兒童晚期至青少年期**發病。D 的「男性學齡前」性別與年齡雙錯。","peropt":{"A":"✓ PHA＝Parry–Romberg。","B":"✓ 最早由 Caleb Hillier Parry 描述。","C":"✓ 病因不明，與自體免疫、神經（三叉神經）機轉相關。","D":"◎ 正解（不正確）：好發女性，兒童晚期／青少年發病。","E":"✓ 與 en coup de sabre（額部線狀硬皮病）常視為同一疾病譜。"},"cite":"NG108 · NG108-B09-Q04","conflict":""},{"id":"3120","sub":"A","src":"NG","years":[108],"stem":"Which is wrong about Pierre Robin Sequence (PRS) ?","opts":{"A":"The earliest account of a description of PRS is by Dr. Pierre Robin.","B":"PRS is a clinical triad consisting of glossoptosis, retrognathia and airway compromise.","C":"Approximately 50% of PRS presents with cleft palate.","D":"The term glossoptosis refers to a posteriorly displaced tongue that obstruct the airway.","E":"Patient may suffer from respiratory distress and malnutrition."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"PRS 的最早描述**不是** Pierre Robin。他在 1923 年推廣此概念，但更早已有文獻記載。命題者用「the earliest account」設陷。","peropt":{"A":"◎ 正解（錯誤）：最早描述並非 Robin 本人。","B":"✓ 三徵：glossoptosis、retrognathia、呼吸道受損。","C":"✓ 約半數合併裂顎。","D":"✓ glossoptosis＝舌根後移阻塞呼吸道。","E":"✓ 可致呼吸窘迫與營養不良。"},"cite":"NG108 · NG108-B09-Q05","conflict":""},{"id":"3121","sub":"A","src":"NG","years":[108],"stem":"Treacher Collins syndrome is a congenital craniofacial malformation, which involves the bones and soft tissues of the middle and lower facial thirds. Which of the statements are correct? (複選題)","opts":{"A":"It presents as an unilateral craniofacial malformation","B":"It is autosomal dominant disorder in 1 per 50 000 live births, 60% of cases arise as sporadic mutation.","C":"Coloboma of the lower eyelids, inferior obliquity of the palpebral fissures, lateral canthal dystopia, and notching of the upper eyebrows and eyelids are characteristic.","D":"The abnormal development of the first and second branchial arches results in bilateral Tessier clefts 6,7 and 8.","E":"Usually has mental retardation."},"ans":"BCD","multi":true,"etype":"ai","expl":"","key":"Treacher Collins 是**雙側對稱**、智力**正常**的第一二鰓弓疾病，對應雙側 Tessier 6、7、8 裂。A 與 E 各踩一個陷阱。","peropt":{"A":"✗ 為雙側，非單側。","B":"◎ 體染色體顯性，1/50,000；60% 偶發突變。","C":"◎ 下眼瞼缺損（coloboma）、眼裂外下斜、外眥異位、眉／瞼切跡。","D":"◎ 第一、二鰓弓異常 → 雙側 Tessier 6、7、8 裂。","E":"✗ 智力通常正常。"},"cite":"NG108 · NG108-B09-Q07","conflict":""},{"id":"3122","sub":"A","src":"NG","years":[109,110,111,112,113,114],"stem":"What is/are the indications for osseointegrated nasal prosthesis reconstruction? (複選)","opts":{"A":"Failed autogenous reconstruction.","B":"Scarring at autogenous donor sites.","C":"Reconstruction following autogenous reconstruction because of tumor recurrence.","D":"Medical contraindication to multistaged autogenous reconstruction.","E":"Patient preference."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 骨整合鼻義齒（osseointegrated nasal prosthesis）重建之適應症包含：自體重建失敗、供區明顯疤痕不利再取材、腫瘤復發後之重建、無法承受多階段自體重建之醫療禁忌、以及病人偏好（patient preference）。本複選題答案為全選ABCDE。⚠ 易混淆：同一觀念在單選題（如NG104-B02-Q05 / NG105-B03-Q09）中，「preferred appearance / patient preference」反被列為「非適應症」之錯誤選項——此為跨年度選項重排造成之矛盾，作答時以各題給定之答案與選項組合為準，勿死背字母（答案疑義家族，建議理解概念）。","peropt":{"A":"✓(正解) 自體重建失敗為適應症。","B":"✓(正解) 供區明顯疤痕不利再取材為適應症。","C":"✓(正解) 腫瘤復發後之重建為適應症。","D":"✓(正解) 無法承受多階段自體重建之醫療禁忌為適應症。","E":"✓(正解) 病人偏好於本複選題亦列為適應症。"},"cite":"待複查（NG 骨整合鼻義齒適應症 記憶佐證）","conflict":"選項重排家族：與 NG111-B03-Q07 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出（Osseointegrated nasal prosthesis適應症）：五個選項(失敗之自體重建、供區疤痕、腫瘤復發後重建、無法多階段自體重建之醫療禁忌、病人偏好)皆為適應症。109/110/112/113年(3122)與111年(3158)為複選，答案皆ABCDE(僅字母重排)；114年(3181)改為單選、E選項換成「All the above are correct」，答E。考點一致：上述五者全屬適應症。"},{"id":"3123","sub":"D","src":"NG","years":[109],"stem":"關於nasoethmoidal orbital fracture, 何者為是","opts":{"A":"According to a pattern established by Markowitz and Manson, nasoethmoidal fractures are classified into 4 types.","B":"Type I is an incomplete fracture, mostly bilateral","C":"Type III is comminuted fracture with the fractures remaining outside the area of the canthal ligament insertion","D":"Type IV have avulsion of the canthal ligment","E":"One of the surgical approach can go local upper nasal incision"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"**Markowitz–Manson NOE 分類共三型**（不是四型），依**內眥韌帶與中央骨片的關係**：\n**I** ＝中央骨片單一、韌帶附著完整\n**II** ＝粉碎，但骨折線在韌帶附著區**之外**\n**III** ＝粉碎且延伸至附著處，**韌帶撕脫**\n本題 A–D 全錯，正解落在手術徑路：可經**鼻背局部切口**。","peropt":{"A":"✗ 為三型，非四型。","B":"✗ Type I 為單一中央骨片（非『不完全、多為雙側』）。","C":"✗ 骨折線在韌帶附著區外者為 **Type II**。","D":"✗ 韌帶撕脫為 **Type III**。","E":"◎ 正解：可採鼻背上方局部切口為手術徑路之一。"},"cite":"NG109 · NG109-B07-Q02","conflict":""},{"id":"3124","sub":"E","src":"NG","years":[109],"stem":"關於timing of surgery for microtia，下列何者為是？","opts":{"A":"From a physical consideration, it would be ideal to begin construction before the child enters school","B":"Brent begins ear construction at age 6","C":"Nagata begins auricular construction at age 7","D":"Nagata requires 6-8 rib cartilage for 3D framework"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"小耳症重建時機（兩大家對照，背熟）：\n**Brent 從 6 歲開始**（正常耳已達成人垂直高度的 6–7 mm 內、軟骨量足）\n**Nagata 從 10 歲開始**（需 6–9 條肋軟骨做 3D 框架，故須更大孩子）\n本題 A（學齡前）、C（Nagata 7 歲）、D（Nagata 6–8 肋）皆錯，正解 B。","peropt":{"A":"✗ 生理上宜達足量軟骨（Brent 6 歲、Nagata 10 歲），非一味趕在入學前。","B":"◎ 正解：Brent 從 6 歲開始。","C":"✗ Nagata 從 10 歲開始，非 7 歲。","D":"✗ Nagata 需 6–9 條肋軟骨，非 6–8。"},"cite":"NG109 · NG109-B07-Q05","conflict":""},{"id":"3125","sub":"A","src":"NG","years":[109],"stem":"有關telecanthus，下列敘述何者錯誤？","opts":{"A":"造成medial displacement of the medial orbital wall。","B":"會形成nasal foreshortening。","C":"常見於nasal-orbital-ethmoid fracture。","D":"與medial canthal tendon detach有關。","E":"手術方式包括transnasal medial canthopexy。"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Telecanthus 的機轉是內眥韌帶自淚後嵴**向外側**移位（NOE 骨折時內側眶壁外移、鼻眶篩複合體被壓扁）。A 說「medial displacement」方向相反。","peropt":{"A":"◎ 正解（錯誤）：內側眶壁與內眥是向**外側**移位。","B":"✓ 常伴鼻背塌陷、鼻長度縮短。","C":"✓ 典型見於 NOE 骨折。","D":"✓ 與內眥韌帶撕脫有關。","E":"✓ 經鼻內眥固定術（transnasal medial canthopexy）為標準術式。"},"cite":"NG109 · NG109-B07-Q07","conflict":""},{"id":"3126","sub":"D","src":"NG","years":[109],"stem":"有關maxillary buttresses，下列何者為非？","opts":{"A":"Central：septo─vomerine─ethmoidal─frontal","B":"Posterior：maxillo─pterygoid","C":"Lateral：maxillo─malar─frontal","D":"Medial / paracentral：maxillo─naso─frontal","E":"Anterior：maxillo─mandible"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"上頜支柱（buttress）四組，全部**向上連到顱底**，沒有任何一組連到下頜：\n**Central**：septo–vomerine–ethmoidal–frontal\n**Medial/paracentral**：maxillo–naso–frontal\n**Lateral**：maxillo–malar–frontal\n**Posterior**：maxillo–pterygoid","peropt":{"A":"✓ Central。","B":"✓ Posterior。","C":"✓ Lateral。","D":"✓ Medial／paracentral。","E":"◎ 正解（為非）：不存在 maxillo–mandible 支柱。"},"cite":"NG109 · NG109-B07-Q08","conflict":""},{"id":"3127","sub":"A","src":"NG","years":[109,111,114],"stem":"When is the basic morphology of the human face established？","opts":{"A":"Between the 1st and 4th gestational week","B":"Between the 4th and 10th gestational week","C":"Between the 10th and 14th gestational week","D":"Between the 14th and 20th gestational week","E":"Between the 20th and 24th gestational week"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考顏面胚胎發育時序。人臉的基本形態（basic morphology）建立於妊娠第 4 至 10 週（gestational week 4–10），此期間 frontonasal、maxillary、mandibular 等 facial prominences 融合形成臉部主要構造；唇顎裂等顏面裂即源於此關鍵窗口內融合失敗。⚠ 記憶要點：第 4 週前為原始神經嵴/鰓弓形成階段、第 10 週後主要為生長細化，故『4–10 週』為顏面形態確立期。","peropt":{"A":"✗ 第 1–4 週為胚胎早期（神經嵴遷移、鰓弓開始形成），顏面基本形態尚未確立。","B":"✓（正解）第 4–10 妊娠週為人臉基本形態確立期，facial prominences 於此期融合。","C":"✗ 第 10–14 週已進入顏面生長細化階段，非基本形態確立期。","D":"✗ 第 14–20 週為後續生長階段。","E":"✗ 第 20–24 週更晚，與顏面基本形態建立無關。"},"cite":"待複查（NG 顏面胚胎發育時序 記憶佐證）","conflict":""},{"id":"3129","sub":"B","src":"NG","years":[109,111,114],"stem":"下列關於cleft palate的敘述,下列何者不正確? (複選)","opts":{"A":"Normal speech is the primary goal of cleft palate repair; minimizing effects of maxillary growth is also important but ultimately secondary.","B":"Cleft palate repair after 1 year of age results in better speech outcomes than earlier repairs.","C":"Eustachian tube function is abnormal in cleft patients due to abnormal position of levator veli palatini muscle.","D":"The levator palatini and other pharyngeal muscles are derived from the third branchial arch and are innervated primarily by cranial nerve V (trigeminal).","E":"Pierre Robin described the triad of micrognathia, glossoptosis, and respiratory distress."},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"兩個破綻：①顎裂修補**越晚語言越差**（應在 12 個月前）；②**levator veli palatini 來自第四鰓弓、由迷走神經（咽叢）支配**——只有 **tensor veli palatini** 例外，來自第一鰓弓、由三叉神經 V3 支配。這組「一個例外」是最愛考的細節。","peropt":{"A":"✓ 正常語言為首要目標，上頜生長影響次之。","B":"◎ 不正確：1 歲後修補語言結果較差。","C":"✓ 提顎帆肌位置異常 → 耳咽管功能不良 → 中耳炎。","D":"◎ 不正確：應為第四鰓弓、迷走神經；三叉神經只管 tensor veli palatini。","E":"✓ Robin 三徵：小頜、舌根後移、呼吸窘迫。"},"cite":"NG109 · NG109-B08-Q05","conflict":""},{"id":"3130","sub":"B","src":"NG","years":[109,111,114],"stem":"下列關於Velopharyngeal dysfunction(VPD) 的敘述，何者正確？ (複選)","opts":{"A":"Velopharyngeal dysfunction (VPD) may lead to hypernasality, nasal air emission, and compensatory articulation errors.","B":"Cinefluoroscopy must be completed as part of a standard preoperative evaluation to allow for direct visualization of the velopharyngeal mechanism during speech and surgical planning.","C":"Velopharyngeal insufficiency is the first major diagnostic category of VPD.","D":"The most common congenital structural defects associated with VPD are cleft palate and submucosal cleft palate.","E":"Common complications after Furlow Z-palatoplasty include bleeding, oronasal fistula, and hoarseness."},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"VPD 的診斷三分類：**insufficiency（結構不足）、incompetence（神經肌肉）、mislearning（學習性）**。最常見的先天結構缺陷是裂顎與黏膜下裂顎。Cinefluoroscopy **並非必做**；Furlow 術後也**不會**造成聲音沙啞。","peropt":{"A":"◎ 高鼻音、鼻漏氣、代償性構音錯誤。","B":"✗ Cinefluoroscopy 非標準必要檢查。","C":"◎ Insufficiency 為第一大診斷類別（結構性）。","D":"◎ 裂顎與黏膜下裂顎為最常見先天結構缺陷。","E":"✗ 聲音沙啞非 Furlow 併發症（見 CN3086）。"},"cite":"NG109 · NG109-B08-Q06","conflict":""},{"id":"3131","sub":"F","src":"NG","years":[109,111],"stem":"In dentofacial deformities of orthognathic patients, which characters and surgical approach is incorrect when we encounter the patients with vertical maxillary excess?","opts":{"A":"Typically associated with lip incompetence, mentalis strain, and an excessive degree of gingival show (long-face syndrome)","B":"The treatment approach is to impact the maxilla to achieve the proper incisor show with lips in repose.","C":"The mandible rotates counterclockwise(with respect to a rightward-facing patient) to maintain occlusion.","D":"A genioplasty may be required to re-established proper chin position.","E":"There will be no need to consider for skeletal contraction related soft tissue effects."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"與 CN3193 同一主題（vertical maxillary excess）的**反向問法**（問『incorrect』）。長臉症候群 → 上頜 impaction、下頜逆時針旋轉、必要時頦成形。\n破綻在 E：**骨骼收縮後必須考量軟組織效應**（皮膚、唇、頦肌會隨骨骼位移而改變），不可忽略。","peropt":{"A":"✓ 長臉症候群特徵。","B":"✓ 上頜 impaction 達適當門齒外露。","C":"✓ 下頜逆時針旋轉維持咬合。","D":"✓ 可能需頦成形。","E":"◎ 正解（錯誤）：必須考量骨骼收縮的軟組織效應。"},"cite":"NG109 · NG109-B08-Q07","conflict":""},{"id":"3132","sub":"D","src":"NG","years":[109,111,114],"stem":"Which is not the key concepts of facial fracture in the pediatric population?","opts":{"A":"Surgeon should recognize the potential for growing skull fractures.","B":"Surgical intervention for orbital fractures should be determined upon clinical rather than radiologic findings.","C":"All types of malocclusion in pediatric mandibular fractures should undergone surgical intervention.","D":"The neonatal skull is profoundly different from its adult counterpart and therefore responds to traumatic forces with unique injury patterns.","E":"When indicated, employing less invasive approaches to operative management should be practiced."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"小兒顏面骨折的原則是**保守、依臨床而非影像、保留生長潛能**。**並非所有咬合不正都需手術**——兒童下頜有強大的重塑能力，多數可靠彈性牽引與觀察處理。","peropt":{"A":"✓ 須警覺 growing skull fracture。","B":"✓ 眶骨骨折依臨床表現（非影像）決定手術。","C":"◎ 正解（非原則）：兒童咬合不正不必然手術。","D":"✓ 新生兒顱骨與成人截然不同，損傷型態獨特。","E":"✓ 有適應症時應採侵入性較低的術式。"},"cite":"NG109 · NG109-B08-Q08","conflict":""},{"id":"3133","sub":"C","src":"NG","years":[109,111,114],"stem":"下列關於Crouzon's syndrome的描述，何者錯誤？","opts":{"A":"This syndrome involves only the face and cranium and is not associated with other anomalies elsewhere on the limbs or trunk.","B":"The fundamental dysmorphology is an underdeveloped midface presenting with exorbitism secondary to insufficient depth of the orbits, hypoplasia of the malar bones, and a class I malocclusion.","C":"Hypertelorism may be present but is usually mild.","D":"The nose is short.","E":"Brachycephaly is usually present; however, scaphocephaly, plagiocephaly, or even a cloverleaf skull may be present."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"**Crouzon ＝ class III malocclusion**（中臉發育不全 → 下顎相對前突）。題目寫 class I 即錯。\n其餘特徵：只侵犯顏面與顱骨（四肢軀幹正常）、眼球突出源自眶深不足、眼距過寬通常**輕微**、鼻短、多為短頭但可見各種頭形甚至三葉草頭。","peropt":{"A":"✓ 僅侵犯顏面與顱骨（此為 Crouzon 與 Apert 的分界）。","B":"◎ 正解（錯誤）：應為 class **III** malocclusion。","C":"✓ 眼距過寬通常輕微。","D":"✓ 鼻短。","E":"✓ 多為短頭，亦可見舟狀頭、斜頭、三葉草頭。"},"cite":"NG109 · NG109-B08-Q09","conflict":""},{"id":"3134","sub":"A","src":"NG","years":[109,111],"stem":"Which of the following statement is incorrect about the the common possible complication after a cranioplasty or after a bipartition for hypertelorism correction?","opts":{"A":"Cerebrospinal fluid leakage through the nose is not uncommon and may require lumbar drainage if persistent after 3 days of lumbar punctures.","B":"Ophthalmological complications such as keratitis or chemosis are best prevented by the initial tarsorrhaphy.","C":"In the long term the most important complication is an insufficient correction. This is most likely to occur not by relapse, but by soft-tissue relaxation, especially at the medial canthi.","D":"Temporal hollowing is common sequelae, especially if the hypertelorism correction is the second major procedure after a cranioplasty or after a bipartition.","E":"Excessive bleeding is a risk mainly related to a coagulopathy induced by important preoperative transfusion."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"此題原檔無詳解。可靠的概念是：**長期最重要的併發症是矯正不足，且主因是軟組織鬆弛（尤其內眥）而非骨性復發**。D 把 temporal hollowing 的成因歸給「第二次手術」，為原檔認定之錯誤敘述。\n（AI 補寫，待複查）","peropt":{"A":"✓ 經鼻腦脊髓液漏並不罕見，持續 3 天以上可能需腰椎引流。","B":"✓ 初期瞼緣縫合可預防角膜炎與結膜水腫。","C":"✓ 長期最重要併發症為矯正不足，源自軟組織鬆弛而非復發。","D":"◎ 原檔正解（錯誤）。","E":"✓ 大量輸血引發凝血病變是出血風險主因。"},"cite":"NG109 · NG109-B08-Q10","conflict":""},{"id":"3135","sub":"C","src":"NG","years":[109],"stem":"關於Syndromic craniosynostosis的描述何者錯誤？","opts":{"A":"大部分syndromic craniosynostosis的嬰兒出生會有bilateral coronal craniosynostosis，可能再合併其他sutural synostosis","B":"Apert, Crouzon, and Pfeiffer syndromes 和FGFR mutation有關","C":"Pfeiffer syndromes type III的特徵為cloverleaf (or Kleeblattschädel) skull deformity","D":"第一次接觸到syndromic craniosynostosis的嬰兒，最重要是需先評估呼吸道或是進食方面的問題","E":"在骨頭成熟的患者，Le Fort III osteotomy可以考慮合併Le Fort I osteotomy進行"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**Pfeiffer type II ＝ cloverleaf skull（Kleeblattschädel）**，預後最差。Type III 無三葉草頭，但顱底短、眼球突出嚴重。題目把 II 與 III 對調。\n另記：初診 syndromic craniosynostosis 嬰兒，**先評估呼吸道與進食**。","peropt":{"A":"✓ 多為雙側冠狀縫早閉，可合併其他顱縫。","B":"✓ Apert／Crouzon／Pfeiffer 皆與 FGFR 相關。","C":"◎ 正解（錯誤）：三葉草頭為 Pfeiffer **type II**。","D":"✓ 呼吸道與進食優先。","E":"✓ 骨骼成熟者可 Le Fort III 併 Le Fort I。"},"cite":"NG109 · NG109-B09-Q02","conflict":""},{"id":"3136","sub":"A","src":"NG","years":[109,112,113,114],"stem":"下列何種syndrome是用來描述Idiopathic progressive hemifacial atrophy (PHA)？","opts":{"A":"Apert syndrome","B":"Down's syndrome","C":"Compartment syndrome","D":"Klippel-Trenaunay syndrome","E":"Parry–Romberg syndrome"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"與 CN3003 同題（GS 與 NG 各出一次，共跨五個年度）。PHA＝Parry–Romberg。此題答案穩定，屬送分題。","peropt":{"A":"Apert＝顱縫早閉＋併指。","B":"Down's＝21 三體。","C":"Compartment syndrome 為純誘答。","D":"Klippel–Trenaunay＝血管畸形＋肢體肥大。","E":"◎ 正解。"},"cite":"NG109 · NG109-B09-Q04","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG113-B09-Q01） ｜ ⚠ 同題歷屆重出（Idiopathic progressive hemifacial atrophy PHA對應之syndrome）：正解恆為Parry–Romberg syndrome；109/112/114年(3136)與113年(3177)答案皆E。干擾選項略有替換(Compartment syndrome ↔ Van der Woude syndrome等)，但正解位置與內容一致。"},{"id":"3137","sub":"A","src":"NG","years":[109,111,113,114],"stem":"以下何者是craniofacial cleft的環境影響因素？(複選)","opts":{"A":"輻射暴露","B":"感染","C":"藥物","D":"化學物質暴露","E":"妊娠時代謝相關的異常"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"顱顏裂的環境致病因子涵蓋**輻射、感染、藥物、化學物質、母體代謝異常**五大類——凡列出這五者，答案通常是全選。四年考四次。","peropt":{"A":"◎ 輻射暴露。","B":"◎ 感染（如 TORCH）。","C":"◎ 藥物（如抗癲癇藥、類固醇、retinoid）。","D":"◎ 化學物質暴露。","E":"◎ 妊娠期代謝異常（如糖尿病、葉酸缺乏）。"},"cite":"NG109 · NG109-B09-Q05","conflict":""},{"id":"3138","sub":"A","src":"NG","years":[109,111,113,114],"stem":"下列congenital malformations of the head and neck何者發生率(incidence)最高？","opts":{"A":"Craniofacial microsomia","B":"Cleft lip and palate","C":"Hemifacial atrophy","D":"Craniofacial cleft","E":"Treacher Collins syndrome"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"頭頸部先天畸形發生率排序：**唇顎裂遠居第一**（約 1/700 活產），其餘皆數量級較低（CFM 約 1/5,600、TCS 約 1/50,000）。","peropt":{"A":"CFM 約 1/5,600，第二常見。","B":"◎ 正解：唇顎裂約 1/700。","C":"Hemifacial atrophy 罕見。","D":"Craniofacial cleft 罕見（約 1/100,000）。","E":"Treacher Collins 約 1/50,000。"},"cite":"NG109 · NG109-B09-Q07","conflict":"⚠ 同題歷屆重出（頭頸部先天畸形congenital malformations何者發生率最高）：正解恆為Cleft lip and palate；109/111/114年(3138)與113年(3178)答案皆B，僅干擾選項順序不同。"},{"id":"3139","sub":"C","src":"NG","years":[109,112],"stem":"下列nonsyndromic craniosynostosis的描述何者正確？(複選)","opts":{"A":"有可能在出生時就可以診斷","B":"Trigonocephaly 三角頭形是因為sagittal synostosis","C":"敏感性sensitive和特異性specific最高的診斷工具是理學檢查","D":"Deformational plagiocephaly是lambdoid synostosis一定需要手術矯正","E":"眼底鏡檢查(fundoscopic exam)對診斷IICP(increased intracranial pressure)是有幫助的"},"ans":"AE","multi":true,"etype":"ai","expl":"","key":"四個破綻：**三角頭來自額縫（metopic）早閉**，非矢狀縫；診斷敏感度與特異度最高的是 **CT（含 3D 重建）**，不是理學檢查；**deformational plagiocephaly 不是人字縫早閉**，以擺位／頭盔治療即可，不需手術。\n正確者：出生時即可能診斷；眼底鏡見視乳突水腫有助判斷顱內壓升高。","peropt":{"A":"◎ 出生時即可能診斷。","B":"✗ 三角頭 ＝ **額縫**早閉。","C":"✗ CT 才是敏感度／特異度最高者。","D":"✗ 姿勢性斜頭非人字縫早閉，多不需手術。","E":"◎ 眼底鏡（視乳突水腫）有助診斷顱內壓升高。"},"cite":"NG109 · NG109-B09-Q08","conflict":""},{"id":"3140","sub":"A","src":"NG","years":[109,111,112,113,114],"stem":"關於Treacher Collins syndrome的描述何者錯誤？","opts":{"A":"新生兒需注意呼吸道的問題","B":"顴骨區域的重建可以選擇頭骨graft、dermis-fat graft、alloplastic material","C":"Colobomas常發生在下眼瞼造成全層的缺損","D":"重建microtia的時機為4歲以前","E":"為autosomal dominant disorder，60%是偶發性突變(sporadic mutations)"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Treacher Collins 的手術時序：**軟組織（coloboma、macrostomia）先於骨性重建；小耳重建約 9–10 歲**（待肋軟骨足量、耳廓近成人大小）。「4 歲以前」明顯過早。\n⚠ 本題與 CN3058 為選項重排家族：同樣五個選項、字母對應不同。記概念，別背 D。","peropt":{"A":"✓ 新生兒首要處理呼吸道。","B":"✓ 顴骨重建可用顱骨移植、真皮脂肪移植或人工植入物。","C":"✓ 下眼瞼全層 coloboma 為特徵。","D":"◎ 正解（錯誤）：小耳重建約 9–10 歲，非 4 歲前。","E":"✓ 體染色體顯性，60% 偶發突變。"},"cite":"NG109 · NG109-B09-Q10","conflict":"選項重排家族：與 NG113-B09-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出（Treacher Collins syndrome敘述何者錯誤，中文）：錯誤敘述恆為D「重建microtia的時機為4歲以前」(正解：自體肋軟骨耳廓重建約6–10歲、待肋軟骨量與胸廓發育足夠)；109/111/112/114年(3140)與113年(3179)答案皆D，僅選項重排(其餘呼吸道、顴骨重建材料、下眼瞼coloboma、AD/60%sporadic皆為正確敘述)。"},{"id":"3141","sub":"E","src":"NG","years":[110],"stem":"Which of the following statements about ear reconstruction is wrong ?","opts":{"A":"Class I of Tanzer classification is microtia","B":"Brent begins ear construction at age six, when the normal ear has grown to within 6–7 mm of its full vertical height, and the amount of cartilage is enough.","C":"Typically, microtia patients have a hearing threshold of 40–60 dB on the affected side.","D":"80 to 90% of microtia is unilateral, and 10–20% is bilateral.","E":"Nagata-type 3D framework needs larger amount of 6–9 rib cartilage. Therefore, this reconstruction begins at the age of 10."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"與 CN3178／CN3182 交叉：**Tanzer Class I ＝ anotia，不是 microtia**——這是本題破綻。其餘皆正確：Brent 6 歲、患側 40–60 dB、80–90% 單側、Nagata 需 6–9 肋且 10 歲起。","peropt":{"A":"◎ 正解（錯誤）：Tanzer Class I ＝ anotia，非 microtia。","B":"✓ Brent 6 歲。","C":"✓ 患側 40–60 dB。","D":"✓ 80–90% 單側、10–20% 雙側。","E":"✓ Nagata 需 6–9 肋、10 歲起。"},"cite":"NG110 · NG110-B07-Q03","conflict":""},{"id":"3142","sub":"D","src":"NG","years":[110],"stem":"下列何者並非frontal bone and sinus fracture產生的complication？","opts":{"A":"CSF fluid rhinorrhea","B":"Pneumocephalus and orbital emphysema","C":"Absence of orbital roof and pulsating exophthalmos","D":"Diplopia","E":"Carotid–cavernous sinus fistula"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"額骨與額竇骨折的併發症皆源自**顱腔／眶頂／海綿竇**：腦脊髓液鼻漏、氣顱與眶氣腫、眶頂缺損致**搏動性眼球突出**、頸動脈–海綿竇廔管。\n**複視屬眶底／眶壁骨折**（眼外肌嵌頓）的表現，不是額竇骨折。","peropt":{"A":"✓ CSF 鼻漏。","B":"✓ 氣顱與眶氣腫。","C":"✓ 眶頂缺損 → 搏動性眼球突出。","D":"◎ 正解（非併發症）：複視屬眶底／眶壁骨折。","E":"✓ 頸動脈–海綿竇廔管。"},"cite":"NG110 · NG110-B07-Q06","conflict":""},{"id":"3143","sub":"B","src":"NG","years":[110,111,114],"stem":"有關於嘴唇的重建，下列那些敘述是正確的？","opts":{"A":"上唇缺損35% 可以direct repair.","B":"The most important goal of lip reconstruction is appearance.","C":"Bilateral Gillies fan flaps 以及 Karapandzic flap 可用來重建嘴唇缺損比例達80%的defect","D":"重建total或near-total lip defect會需要用到free tissue transfer technique,而最常使用的free flap為Radial forearm free flap","E":"使用Abbe flap來重建嘴唇時,可以於術後14-21天安排flap division procedure"},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"🎯 唇重建重點（複選選「正確」）：雙側Gillies扇形瓣與Karapandzic瓣可重建達80%之唇缺損；全/近全唇缺損需游離組織移植，最常用者為橈側前臂游離皮瓣（radial forearm free flap）；Abbe瓣可於術後約14–21天行斷蒂（flap division）。⚠ 易混淆：A「上唇缺損35%可直接修補」為錯（上唇上限約25%）；B「重建最重要目標是外觀」為錯——最重要目標是「功能」（口腔閉合能力），外觀次之。","peropt":{"A":"✗ 上唇直接修補上限約25%，稱35%為錯。","B":"✗ 唇重建最重要目標為功能而非外觀，敘述錯誤。","C":"✓(正解) 雙側Gillies扇形瓣與Karapandzic瓣可重建達80%缺損。","D":"✓(正解) 全/近全唇缺損需游離皮瓣，最常用為橈側前臂游離皮瓣。","E":"✓(正解) Abbe瓣可於術後14–21天斷蒂。"},"cite":"待複查（NG 唇重建 記憶佐證）","conflict":""},{"id":"3144","sub":"A","src":"NG","years":[110],"stem":"造成Craniofacial microsomia之假說其一為對pharyngeal arch的缺血性傷害(ischemia hypothesis)，此假說中所受到傷害之血管為下列何者?","opts":{"A":"Maxillary artery","B":"Stapedial artery","C":"Facial artery","D":"Internal carotid artery","E":"External carotid artery"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"CFM 的缺血假說：**stapedial artery**（鐙骨動脈，胚胎期供應第一、二鰓弓的過渡血管）受損出血 → 鰓弓衍生構造發育不全。這條血管正常會退化，由頸外動脈系統接手。","peropt":{"A":"Maxillary artery 為第一弓的成熟動脈，非假說標的。","B":"◎ 正解：stapedial artery。","C":"Facial artery 屬頸外動脈分支。","D":"Internal carotid 為第三弓衍生。","E":"External carotid 供應範圍廣，非此假說指涉。"},"cite":"NG110 · NG110-B08-Q01","conflict":""},{"id":"3145","sub":"B","src":"NG","years":[110],"stem":"若父母其中一人有唇裂及顎裂，第一個孩子也有唇裂及顎裂，則下一個孩子有唇顎裂的機會多高？","opts":{"A":"與父母有無唇顎裂較有關，與孩子有無唇顎裂無影響。","B":"4%","C":"8%","D":"17%","E":"25%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"與 CN3085 成對記憶：**一位父母患病 ＋ 一名患兒 → 17%**。風險隨「受影響的一級親屬數目」上升，與是父母或手足無關——這是多因子遺傳的特徵。","peropt":{"A":"✗ 兩者皆有影響。","B":"✗ 4% 為父母皆正常＋一名患兒。","C":"✗ 8% 非標準值。","D":"◎ 正解：17%。","E":"✗ 25% 為孟德爾隱性遺傳比例。"},"cite":"NG110 · NG110-B08-Q03","conflict":""},{"id":"3146","sub":"A","src":"NG","years":[110],"stem":"在orbital hypertelorism 矯正手術中，下列何種情況bipartition會優於orbital shift ?","opts":{"A":"The maxillary arch is narrow and inverted.","B":"The orbits are laterally and downwardly oblique","C":"The nasal fossae are wide","D":"Extent of hypertelorism showed limited displacement","E":"There are no lesions such as an encephalocele found at the cranial base"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"與 CN3030 同一考點的單選版。Bipartition 的適應症共同軸線是**上頜弓／鼻腔橫向狹窄、眼距嚴重過寬、合併中線顱底病灶**——因為 bipartition 能同時擴弓並旋轉兩半臉。","peropt":{"A":"◎ 正解：上頜弓狹窄且內傾。","B":"✗ 眶軸外下傾斜 → 仍可用 box-shift 調整。","C":"✗ 鼻腔『寬』不需 bipartition（狹窄才需要）。","D":"✗ 位移有限 → box-shift 足夠。","E":"✗ 無腦膨出 → 不必 bipartition。"},"cite":"NG110 · NG110-B08-Q04","conflict":""},{"id":"3147","sub":"D","src":"NG","years":[110,112,114],"stem":"最常見的幼童顏面骨骨折為下列何者?","opts":{"A":"Frontal","B":"Orbital","C":"Zygoma","D":"Maxilla","E":"Mandible"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"⚠ **跨版本事實變更**：舊版謂**下頜骨**為最常見小兒顏面骨折（CN3148 選項 C，20–50%）；**新版（NG110/112/114）改為眶骨（orbital）最常見**。\n作答錨定該年答案；概念上記住『**新版＝眶骨**』。","peropt":{"A":"額骨較少見。","B":"◎ 正解（新版）：眶骨最常見。","C":"顴骨次之。","D":"上頜骨少見。","E":"下頜骨為舊版說法（見 CN3148）。"},"cite":"NG110 · NG110-B08-Q06","conflict":""},{"id":"3148","sub":"B","src":"NG","years":[110],"stem":"下列何者不是使用Nasoalveolar molding (NAM)常見的併發症?","opts":{"A":"Inflammation of oral and nasal mucosa","B":"Blister at cheek","C":"Trouble feeding","D":"Dislodge molding plate causing obstruction","E":"Pneumonia"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考鼻齒槽塑形（Nasoalveolar molding, NAM）的常見併發症（選『非』）。NAM 常見併發症包括：口腔與鼻黏膜發炎/潰瘍（因塑形板/膠帶壓迫）、臉頰貼膠處水泡（blister，膠帶皮膚刺激）、餵食困難（trouble feeding）、以及塑形板鬆脫移位造成呼吸道阻塞（dislodge causing obstruction，為需警覺的急症）。⚠ 選項 E『Pneumonia（肺炎）』並非 NAM 的常見/直接併發症，故為應選出的『非』者。","peropt":{"A":"✗ 為常見併發症。塑形板壓迫可致口腔與鼻黏膜發炎/潰瘍。","B":"✗ 為常見併發症。固定膠帶處臉頰易生水泡（blister）。","C":"✗ 為常見併發症。配戴塑形板可致餵食困難。","D":"✗ 為常見併發症。塑形板鬆脫移位可造成呼吸道阻塞，須密切監測。","E":"✓（正解）非常見併發症。Pneumonia（肺炎）並非 NAM 的直接常見併發症。"},"cite":"待複查（NG 唇顎裂/NAM 併發症 記憶佐證）","conflict":""},{"id":"3149","sub":"B","src":"NG","years":[110],"stem":"下列何種velopharyngeal dysfuction的病童最適合接受Furlow double opposing Z palatoplasty? (複選)","opts":{"A":"Unrepaired submucosal cleft palate","B":"Patients who have undergone cleft palate repair without levator muscle reconstruction, muscles were found to be horizontally oriented","C":"Patients who have undergone cleft palate repair without levator muscle reconstruction, muscles were found to be sagittally oriented","D":"The velopharngeal gap size were found to be less than 0.5cm","E":"The velopharngeal gap size exceeds 1cm"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"Furlow 的原理是把**縱向（sagittal）錯位的提顎帆肌重新導向橫向**，同時延長軟顎。因此適應症是：**肌肉呈矢狀走向、顎咽縫隙小（<0.5 cm）、未修補的黏膜下裂顎**。肌肉已呈橫向（正常）或縫隙 >1 cm 者，Furlow 無效。","peropt":{"A":"◎ 未修補的黏膜下裂顎。","B":"✗ 肌肉已呈橫向＝方向正常，Furlow 無從矯正。","C":"◎ 肌肉呈矢狀走向 → 正是 Furlow 的適應症。","D":"◎ 顎咽縫隙 <0.5 cm。","E":"✗ 縫隙 >1 cm 應改用 flap 或 sphincter。"},"cite":"NG110 · NG110-B08-Q08","conflict":""},{"id":"3150","sub":"F","src":"NG","years":[110],"stem":"在正顎手術中進行LeFort I osteotomy and down fracture 需要打斷下列哪幾條血管? (複選)","opts":{"A":"Ascending palatine artery","B":"Descending palatine artery","C":"Ascending pharyngeal artery","D":"Nasopalatine artery","E":"Lesser palatine artery"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題換個問法：down-fracture 時**需打斷**哪些血管 → **descending palatine（B）與 nasopalatine（D）**。\n注意這與 CN3197/3201『灌流來源＝lesser palatine』並不矛盾：**打斷的是主幹分支，保留灌流的是軟組織側枝**。兩題合看才完整。","peropt":{"A":"✗ Ascending palatine 為灌流側枝，非打斷對象。","B":"◎ Descending palatine：down-fracture 時離斷。","C":"✗ Ascending pharyngeal 為側枝。","D":"◎ Nasopalatine：離斷鼻中隔黏膜時切斷。","E":"✗ Lesser palatine 為保留的灌流來源。"},"cite":"NG110 · NG110-B08-Q09","conflict":""},{"id":"3151","sub":"B","src":"NG","years":[110],"stem":"下列何者為Calnan's classic triad describing submucous cleft palate? (複選)","opts":{"A":"Velopharyngeal insufficiency","B":"Zona pellucida","C":"Lateral clear zone","D":"Bifid uvula","E":"Palpable notch at posterior hard palate"},"ans":"BDE","multi":true,"etype":"ai","expl":"","key":"**Calnan 三徵（黏膜下裂顎）：zona pellucida（軟顎中央半透明帶）、bifid uvula（分叉懸壅垂）、硬顎後緣可觸及的凹痕（notch）**。VPI 是**後果**不是三徵之一——這是本題的陷阱。","peropt":{"A":"✗ VPI 是黏膜下裂顎可能導致的結果，非三徵成分。","B":"◎ Zona pellucida。","C":"✗ 『Lateral clear zone』為杜撰誘答。","D":"◎ Bifid uvula。","E":"◎ 硬顎後緣凹痕。"},"cite":"NG110 · NG110-B08-Q10","conflict":""},{"id":"3152","sub":"A","src":"NG","years":[110],"stem":"What is the most common type of the Tessier craniofacial clefts?","opts":{"A":"Number 3","B":"Number 14","C":"Number 5","D":"Number 6","E":"Number 7"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"⚠ **跨教科書衝突題**。Neligan 4e 認為 **No.3** 最常見；Neligan 3e 與 Grabb & Smith 認為 **No.7**。本題（NG110，4e）官方答案 A（No.3）；GS 版本（CN3002）答案為 E（No.7）。\n作答鐵律：**錨定該年度／該教科書的答案**。概念上記「No.3 與 No.7 皆為常見顱顏裂」即可。","peropt":{"A":"◎ 本年（Neligan 4e）答案：No.3（oro-naso-ocular cleft）。","B":"No.14 為中線顱裂。","C":"No.5 少見。","D":"No.6 為 TCS 組合之一。","E":"⚠ Grabb & Smith 與 Neligan 3e 之答案（No.7，lateral facial cleft）。"},"cite":"NG110 · NG110-B09-Q01","conflict":""},{"id":"3153","sub":"A","src":"NG","years":[105,110],"stem":"Which of the following statement concerning Treacher Collins syndrome is NOT correct？","opts":{"A":"Airway management is the primary concern when treating infants born with Treacher Collins syndrome","B":"Inferior obliquity of the palpebral fissures and mandibulofacial dysostosis are characteristic","C":"It results from the abnormal development of the third and fourth branchial arches","D":"It is an autosomal dominant disorder","E":"Colobomas usually occur in the lower eyelid and are full-thickness defects."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Treacher Collins ＝ **第一、二鰓弓**異常。凡見「third and fourth branchial arches」即錯。此為 TCS 最高頻的破綻（見 CN3012、CN3035）。","peropt":{"A":"✓ 呼吸道優先。","B":"✓ 眼裂外下斜＋下頜顏面骨發育不全（mandibulofacial dysostosis）。","C":"◎ 正解（不正確）：應為第一、二鰓弓。","D":"✓ 體染色體顯性。","E":"✓ 下眼瞼全層 coloboma。"},"cite":"NG110 · NG110-B09-Q05","conflict":"⚠ 同題歷屆重出（Treacher Collins syndrome—何者不正確）：關鍵錯誤敘述恆為「源自第三、四鰓弓(3rd/4th branchial arch)發育異常」(正解應為第一、二鰓弓)；105年(3064)為D、110年(3153)為C。其餘正確干擾選項有替換(1/50000發生率、60%偶發突變 ↔ 眼裂下斜/mandibulofacial dysostosis、AD遺傳、下眼瞼full-thickness coloboma)，但測驗重點(鰓弓來源)完全一致。"},{"id":"3154","sub":"A","src":"NG","years":[110],"stem":"What is the most common type of conjoined twins?","opts":{"A":"thoracopagus","B":"Omphalopagus","C":"Craniopagus","D":"Ischiopagus tripus","E":"Ischiopagus tetrapus"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"連體嬰最常見型別為 **thoracopagus（胸部相連）**，其次 omphalopagus。分型以相連部位命名（-pagus＝『固定於』）。","peropt":{"A":"◎ 正解：thoracopagus，最常見，常共用心臟，分離手術難度最高。","B":"Omphalopagus 次之（臍／上腹相連）。","C":"Craniopagus 罕見（顱頂相連）。","D":"Ischiopagus tripus：骨盆相連、三下肢。","E":"Ischiopagus tetrapus：骨盆相連、四下肢。"},"cite":"NG110 · NG110-B09-Q06","conflict":""},{"id":"3155","sub":"A","src":"NG","years":[110,112,114],"stem":"Which of the following statement concerning Pierre Robin Sequence (PRS) is NOT correct？","opts":{"A":"PRS is a clinical triad consisting of glossoptosis, retrognathia, airway compromise","B":"Cleft palate is present in approximately 50% of cases","C":"The work-up of PRS patients should begin with craniofacial deformities.","D":"Infants with PRS may present with feeding difficulties and failure to thrive.","E":"Respiratory distress can be managed with prone positioning"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"PRS 的處置順序永遠是 **呼吸道 → 餵食 → 顱顏**。此題與 CN3053 是「正解選項改寫家族」：兩年答案都是 C，但 C 的文字一年寫『從顱顏畸形開始』、另一年寫『從餵食困難開始』——**兩者都錯，因為都不是呼吸道**。這正是背字母會失效的鐵證。","peropt":{"A":"✓ 三徵：glossoptosis、retrognathia、呼吸道受損。","B":"✓ 約半數合併裂顎。","C":"◎ 正解（不正確）：workup 應從呼吸道開始，而非顱顏畸形。","D":"✓ 可有餵食困難與生長遲滯。","E":"✓ 俯臥擺位可改善呼吸窘迫。"},"cite":"NG110 · NG110-B09-Q07","conflict":"跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG113-B09-Q07） ‖ 跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG111-B09-Q05）"},{"id":"3156","sub":"A","src":"NG","years":[110,114],"stem":"Phenotypic features of craniofacial microsomia are highly variable. Which of the following are the three most commonly affected structures? (複選)","opts":{"A":"auricle","B":"mandible","C":"maxilla","D":"frontal bone","E":"occipital bone"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"CFM 最常受累的三構造：**耳廓（auricle）、下頜（mandible）、上頜（maxilla）**——全為第一、二鰓弓衍生物。額骨與枕骨不屬鰓弓來源。","peropt":{"A":"◎ 耳廓。","B":"◎ 下頜。","C":"◎ 上頜。","D":"✗ 額骨來自額鼻突。","E":"✗ 枕骨屬體節來源。"},"cite":"NG110 · NG110-B09-Q08","conflict":""},{"id":"3157","sub":"A","src":"NG","years":[110,114],"stem":"關於hemifacial atrophy的敘述哪一項是錯誤的? (複選)","opts":{"A":"是一種lymphocytic neurovasculitis","B":"Immunosuppressive therapy適合使用在有皮膚病灶的病人，seizure的病人避免適用。","C":"常見的皮膚病灶包含 hyperpigmentation, hypopigmentation與alopecia.","D":"病理學的表現類似localized scleroderma","E":"大部分的病人都先以神經學症狀表現，接著出現皮膚病灶。"},"ans":"BE","multi":true,"etype":"ai","expl":"","key":"Parry–Romberg 是 **lymphocytic neurovasculitis**，病理近似局部硬皮病。臨床順序是**皮膚病灶在先、神經症狀在後**；免疫抑制治療正是用在有神經侵犯（癲癇）者。B 與 E 各把方向寫反。","peropt":{"A":"✓ 淋巴球性神經血管炎。","B":"◎ 錯誤：免疫抑制治療適用於神經侵犯（含癲癇）者，並非避用。","C":"✓ 色素增減與禿髮。","D":"✓ 病理似局部硬皮病。","E":"◎ 錯誤：多數先出現皮膚病灶，神經症狀隨後。"},"cite":"NG110 · NG110-B09-Q09","conflict":""},{"id":"3159","sub":"E","src":"NG","years":[108,111,112,114,115],"stem":"關於耳整形(Otoplasty)何者錯誤?","opts":{"A":"根據Tanzer的分類，Constricted ear可分為三型: Type I(involve only the helix) ,Type II (involve helix and scapha), Type III( extreme cupping of the ear)","B":"所謂Cryptotia是指耳朵的上半部包埋在顳部頭皮下。","C":"耳整形建議於幼兒1歲時施行。","D":"所謂Stahl's ear是指向外上側(superolaterally)的異常構造的耳部crus。","E":"穿耳洞相關的併發症最好發的位置在耳垂、但是較嚴重的併發症發生在軟骨穿刺處。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 本題考 Otoplasty 與先天耳畸形（選錯）。核心正確觀念：Tanzer 將 constricted ear 分三型——Type I（僅 helix 受累）、Type II（helix+scapha）、Type III（極度杯狀 extreme cupping）；Cryptotia（隱耳）為上半耳埋入顳部頭皮下；Stahl's ear 為向上外（superolaterally）延伸的異常耳 crus。⚠ 選項 C『耳整形建議於幼兒 1 歲時施行』為錯——正確時機約 ≥3 歲（多在學齡前、5–6 歲耳廓生長約達 85–90% 後），1 歲過早，故為應選出的錯誤選項。另穿耳洞併發症最好發於耳垂、但較嚴重併發症（如軟骨炎/軟骨壞死）發生在軟骨穿刺處，屬正確。","peropt":{"A":"✗ 敘述正確。Tanzer 分類：Constricted ear 分 Type I（僅 helix）、II（helix+scapha）、III（極度杯狀）。","B":"✗ 敘述正確。Cryptotia 為耳朵上半部埋入顳部頭皮下。","C":"✓（正解）錯誤敘述。耳整形建議時機約 ≥3 歲（多在學齡前），『1 歲時施行』過早。","D":"✗ 敘述正確。Stahl's ear 為向上外延伸的異常耳 crus。","E":"✗ 敘述正確。穿耳洞併發症最好發於耳垂，但較嚴重者發生在軟骨穿刺處。"},"cite":"待複查（NG 耳整形/先天耳畸形分類 記憶佐證）","conflict":"⚠ 同題歷屆重出（Otoplasty—何者錯誤，中文）：關鍵錯誤敘述恆為「耳整形建議於幼兒1歲時施行」(正解約5–6歲、學齡前、耳廓發育近完成後)；108年(3104)為A、111/112/114/115年(3159)為C。干擾選項有替換(great auricular nerve保留、constricted ear必要時切軟骨 ↔ Tanzer三型分類、穿耳洞併發症)，但考點一致。"},{"id":"3160","sub":"D","src":"NG","years":[111],"stem":"關於Naso-orbitoethmoid(NOE) complex fracture ，下列何者為是?","opts":{"A":"Markowitz and Manson established a classification type I-IV only according to the CT scan.","B":"Type II are comminuted nasoethmoidal fractures but involved the area of the canthal ligament insertion.","C":"Type I displaced only inferiorly at the infraorbital rim and piriform margin.","D":"Type IV to accomplish the bone reduction, the canthus should not be detached.","E":"Nasal and forehead lacerations are common and can be extended."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**Markowitz–Manson NOE 分類共三型**（依內眥韌帶與中央骨片關係）：I＝單一大骨片、韌帶完整；II＝粉碎但骨折在附著區外；III＝粉碎延伸至附著處、韌帶撕脫。\nType I 只在眶下緣與梨狀孔緣**向下移位**，中央骨片完整。","peropt":{"A":"✗ 為三型（非四型），且非僅依 CT。","B":"✗ Type II 的骨折在韌帶附著區**之外**（此處寫『involved』即錯）。","C":"◎ 正解：Type I 僅於眶下緣與梨狀孔緣向下移位。","D":"✗ Type IV 不存在；Type III 復位時韌帶**需**分離再固定。","E":"✗ 敘述本身合理但非本題最佳解。"},"cite":"NG111 · NG111-B07-Q02","conflict":""},{"id":"3161","sub":"E","src":"NG","years":[111],"stem":"關於 Surgery for microtia，下列何者為非？","opts":{"A":"From a psychological and physical consideration, it would be ideal to begin construction before the child enters school","B":"Tanzer is considered to be the father of modern auricular construction, following by Brent and Nagata. To date, autogenous cartilage remain the most reliable material in ear reconstruction.","C":"Temporoparietal flap is a workhorse and important salvage tool.","D":"Identify the \"auricular triangle\" for the location of new auricle, but it's more challenging for microtia in hemifacial microsomia patients."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"小耳症重建的臨床要點全對，唯一破綻在 D：**『auricular triangle』並非標準定位法**——新耳位置的定位靠的是對側耳鏡像、外眥至枕部連線等標記，且在 hemifacial microsomia 因骨架不對稱更難。命題者杜撰一個『auricular triangle』術語。","peropt":{"A":"✓ 宜在入學前重建（心理＋生理）。","B":"✓ Tanzer 為現代耳重建之父，Brent、Nagata 承之；自體軟骨仍最可靠。","C":"✓ 顳頂筋膜瓣為重要救援工具。","D":"◎ 正解（為非）：無標準『auricular triangle』定位法。"},"cite":"NG111 · NG111-B07-Q05","conflict":""},{"id":"3162","sub":"B","src":"NG","years":[109,111,114],"stem":"下列關於雙側唇裂(bilateral cleft lip)的重建原則，何者不正確？","opts":{"A":"Maintain nasolabial symmetry.","B":"Secure muscular continuity.","C":"Design the philtral flap of proper size and shape.","D":"Construct the median tubercle using central vermilion–mucosal elements.","E":"Position the slumped/splayed lower lateral cartilages and sculpt excess soft tissue in nasal tip and columella."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"雙側唇裂的中央唇珠（median tubercle）必須用**兩側唇的外側組織（lateral labial elements）**建構——因為 **prolabium 沒有 white roll、也沒有正常唇紅**。用中央唇紅黏膜去做，日後必然萎縮變薄。","peropt":{"A":"✓ 維持鼻唇對稱，微小差異會隨生長放大。","B":"✓ 建立完整口輪匝肌環。","C":"✓ 人中瓣尺寸須預留生長（人中會迅速變長變寬）。","D":"◎ 正解（不正確）：應取**外側**唇組織建構中央唇珠。","E":"✓ 復位塌陷外展的下外側鼻軟骨。"},"cite":"NG109 · NG109-B08-Q04","conflict":"⚠ 同題歷屆重出（雙側唇裂bilateral cleft lip重建原則—何者不正確）：錯誤敘述恆為D「以central vermilion–mucosal elements重建median tubercle」(正解：prolabium/中央無白線與紅唇，median tubercle須以兩側lateral vermilion組織重建)；109年(3128)選項文字較完整、111/114年(3162)為精簡版，答案皆D。"},{"id":"3163","sub":"A","src":"NG","years":[111,113],"stem":"下列關於Pierre Robin Sequence (PRS)之敘述，何者為非? (單選)","opts":{"A":"PRS is a clinical triad consisting of glossoptosis, retrognathia, airway compromise","B":"Cleft palate is present in approximately 50% of cases","C":"The workup of PRS patients should begin with feeding difficulties","D":"Infants with PRS may present with feeding difficulties and failure to thrive.","E":"Respiratory distress can be managed with prone positioning."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"與 CN3047 同一題的另一版本：C 改寫為『workup 應從餵食困難開始』。**答案仍是 C，因為正確順序是呼吸道優先**。兩年並列閱讀，就能看穿命題者只是換了誘答的外衣。","peropt":{"A":"✓ 三徵。","B":"✓ 約半數合併裂顎。","C":"◎ 正解（為非）：應從呼吸道開始，不是餵食困難。","D":"✓ 餵食困難與生長遲滯。","E":"✓ 俯臥擺位。"},"cite":"NG111 · NG111-B09-Q05","conflict":"跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG110-B09-Q07） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B09-Q06）"},{"id":"3164","sub":"E","src":"NG","years":[112,113,114],"stem":"Which of the following statement regarding innervation of the ear is incorrect?","opts":{"A":"The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.","B":"The posterior half of the ear is innervated by the great auricular and greater occipital nerves.","C":"The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.","D":"The auditory branch of the vagus nerve is referred to as Arnold's nerve.","E":"All the above is correct"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n本題破綻在 B：後半應為 great auricular ＋ **lesser** occipital，題目寫 **greater** occipital。\n⚠ 與 CN3188 為**極性翻轉家族**：一題問『incorrect』（答 B），一題問『correct』（答 E＝以上皆是，但那一年 B 已被改回 lesser）。","peropt":{"A":"✓ 前半 ＝ auriculotemporal（V3）。","B":"◎ 正解（錯誤）：後半為 great auricular ＋ **lesser** occipital，非 greater occipital。","C":"✓ 迷走耳支供應耳甲與外耳道一部分。","D":"✓ 迷走耳支＝Arnold's nerve。","E":"✗ 因 B 錯，故非全對。"},"cite":"NG112 · NG112-B07-Q01","conflict":""},{"id":"3165","sub":"D","src":"NG","years":[112,113],"stem":"Which of the following is not an indication for surgical treatment of orbital fractures?","opts":{"A":"Double vision caused by incarceration of muscle or the fine ligament system.","B":"Radiographic evidence of extensive fracture, such that enophthalmos would occur.","C":"Visual acuity deficit, increasing and not responsive to medical dose steroids, implying that optic canal decompression may be indicated.","D":"Enophthalmos or exophthalmos (significant globe positional change) produced by an orbital volume change.","E":"Presence of significant edema, retinal detachment, or other significant globe injuries, such as hyphema."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"眶骨折的手術適應症全是**功能性**：肌肉嵌頓致複視、影像顯示大範圍骨折將致眼球內陷、視力惡化需視神經減壓、眼球位置改變。\n**大量水腫、視網膜剝離、前房出血等『眼球本身損傷』反而是相對禁忌**——此時應先處理眼球，延後眶壁手術。","peropt":{"A":"✓ 肌肉／韌帶嵌頓致複視。","B":"✓ 影像示大範圍骨折 → 預期眼球內陷。","C":"✓ 視力惡化、對類固醇無反應 → 視神經減壓。","D":"✓ 眶容積改變致眼球內陷／突出。","E":"◎ 正解（非適應症）：合併嚴重眼球損傷時應延後眶手術。"},"cite":"NG112 · NG112-B07-Q02","conflict":""},{"id":"3166","sub":"D","src":"NG","years":[112,113,114,115],"stem":"Which of the following is not true regarding late complications of zygomatic fractures?","opts":{"A":"Late complications of zygomatic fractures include nonunion, malunion, double vision, hypesthesia, and chronic maxillary sinusitis.","B":"Generally, ectropion and scleral show may be problematic and frequently requires surgical correction.","C":"Usually, more than 5 mm of inferior globe dystopia is required to produce diplopia.","D":"Infection is not common, and usually responds to antibiotics and sinus or lacrimal drainage.","E":"Impacted fractures of the zygomatic arch which abut the coronoid process may result in ankylosis."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"顴骨骨折晚期併發症：**ectropion 與 scleral show 通常輕微、多自行緩解**，不常需手術——命題者把它寫成『常需手術矯正』當破綻。\n另記：下方眼球移位需 >5 mm 才致複視；顴弓撞喙突可致關節僵直。","peropt":{"A":"✓ 併發症包括不癒合、癒合不良、複視、感覺遲鈍、慢性上頜竇炎。","B":"◎ 正解（錯誤）：ectropion 與 scleral show 多輕微、可自行緩解。","C":"✓ 下方眼球移位須 >5 mm 才產生複視。","D":"✓ 感染不常見，抗生素與引流多可處理。","E":"✓ 顴弓嵌入撞喙突 → 關節僵直。"},"cite":"NG112 · NG112-B07-Q03","conflict":"⚠ 同題歷屆重出（顴骨骨折zygomatic fracture晚期併發症—何者不正確）：112/113/114年(3166)答B(誤述ectropion/scleral show「常需手術矯正」)，該版本C「需>5mm下位globe dystopia才產生複視」列為正確；115年(3190)把B改寫成正確敘述(二次矯正一般不超過3mm)，並將C的閾值由「5mm」改為「2mm」使C變成錯誤，故答C。⚠數字微調(5mm→2mm)使答案由B移至C；核心記憶：一般需>5mm垂直向inferior globe dystopia方會產生diplopia。"},{"id":"3168","sub":"E","src":"NG","years":[113],"stem":"有關otoplasty何者錯誤?","opts":{"A":"Tanzer 將constricted ear deformities 分成三類: type I-involving only the helix; type II-involving the helix and scapha; and type III- extreme cupping of the ear.","B":"\"Cryptotia\" is used to describe the rare condition where the upper portion of the ear is buried beneath the temporal scalp.","C":"The Stahl's ear deformity 定義為an abnormal crus extending superolaterally.","D":"耳洞相關併發症最常見於lobule but the more serious complications occur where the cartilage of the ear has been pierced.","E":"Otoplasty可以施行於一歲幼兒."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題（NG113）破綻在 E（一歲施行）。**Stahl's ear ＝ 向上外側（superolateral）延伸的異常第三 crus**，此定義正確。\n注意 B 說 cryptotia 是『rare condition』——cryptotia 在亞洲人其實不罕見，但本題以 E 為答案。","peropt":{"A":"✓ Tanzer 三型。","B":"✓ Cryptotia＝上耳埋於顳部頭皮下。","C":"✓ Stahl＝向上外側異常 crus。","D":"✓ 穿耳洞併發症好發耳垂，嚴重者在軟骨處。","E":"◎ 正解（錯誤）：otoplasty 非一歲施行。"},"cite":"NG113 · NG113-B05-Q02","conflict":""},{"id":"3169","sub":"A","src":"NG","years":[113],"stem":"Which of the following pairs of pharyngeal cleft and its associated structure development is correct ? (複選)","opts":{"A":"Pharyngeal cleft 1 – Auditory tube and middle ear, and part of the tympanic membrane.","B":"Pharyngeal cleft 2 – Part of the middle ear and the palatine tonsil.","C":"Pharyngeal cleft 3 – Musculature and cartilage of the larynx.","D":"Pharyngeal cleft 4 – Superior parathyroid glands and the thymus.","E":"Pharyngeal cleft 5 –. Inferior parathyroid glands and cells in the thymus"},"ans":"ABD","multi":true,"etype":"ai","expl":"","key":"🎯 咽弓/咽囊（pharyngeal pouch）衍生構造需精準對應（本題以「pharyngeal cleft」泛稱但描述囊之衍生物）：第1囊→耳咽管、中耳腔與部分鼓膜；第2囊→部分中耳與腭扁桃體（palatine tonsil）；第3囊→下副甲狀腺與胸腺；第4囊→上副甲狀腺（與後鰓體/ultimobranchial body）。⚠ 易混淆：喉部肌肉與軟骨源自第4、6咽弓（arch）而非囊；C將喉軟骨歸於第3囊、E設「第5咽囊」對應下副甲狀腺與胸腺，均為錯誤。答案取權威之ABD。","peropt":{"A":"✓(正解) 第1囊衍生耳咽管、中耳與部分鼓膜，正確。","B":"✓(正解) 第2囊衍生部分中耳與腭扁桃體，正確。","C":"✗ 喉之肌肉與軟骨源自第4/6咽弓，非第3囊，敘述錯誤。","D":"✓(正解) 第4囊衍生上副甲狀腺（本題並列胸腺），依權威列為正確。","E":"✗ 第5咽囊/後鰓體衍生C細胞，非下副甲狀腺與胸腺，敘述錯誤。"},"cite":"待複查（NG 咽弓/咽囊胚胎學 記憶佐證）","conflict":""},{"id":"3170","sub":"B","src":"NG","years":[113],"stem":"Which of the following statements about cleft palate are correct? (複選)","opts":{"A":"The maxillary lateral incisor on the cleft side is absent in 80–90% of cleft patients.","B":"Pierre Robin described the triad of micrognathia, glossoptosis, and cleft palate.","C":"Velocardiofacial syndrome, associated with 22q deletions, features a \"bird-like\" facial appearance.","D":"Best speech results are achieved when the palate is closed before 12 months of age.","E":"Defects involving both the hard and soft palate are classified in Group II of Veau's classification."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"四個正確敘述串起裂顎全景：裂側**側門齒**缺失達 80–90%；VCFS（22q）鳥樣面容；**12 個月前修補語言最佳**；Veau **Group II ＝ 硬顎＋軟顎**（即完整次級顎）。唯一錯誤是 Robin 三徵——**呼吸窘迫**才是第三項，不是裂顎。\n📌 注意：本題 D 明確支持『<12 個月修補語言最佳』，可用以對照 CN3078 原檔答案之疑義。","peropt":{"A":"◎ 裂側側門齒缺失 80–90%。","B":"✗ Robin 三徵為小頜、舌根後移、**呼吸窘迫**。","C":"◎ VCFS（22q11.2）鳥樣面容。","D":"◎ 12 個月前修補語言結果最佳。","E":"◎ Veau Group II：侵犯硬顎與軟顎。"},"cite":"NG113 · NG113-B08-Q04","conflict":""},{"id":"3171","sub":"C","src":"NG","years":[113],"stem":"Which part of the maxillofacial skeleton reaches close to adult size first during osteogenesis?","opts":{"A":"Maxilla","B":"Mandible","C":"Cranial vault","D":"Zygoma","E":"Nasal bone"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"顱顏骨骼的成熟順序：**顱穹（cranial vault）最早接近成人大小**（隨腦部生長，2 歲達 75%、5 歲近 90%）；上下頜與鼻骨最晚（青春期後才完成）。這正是**顱穹手術可在嬰兒期做、正顎手術必須等生長結束**的解剖學理由。","peropt":{"A":"上頜隨齒列與氣道發育，較晚。","B":"下頜最晚成熟（青春期後）。","C":"◎ 正解：顱穹最早。","D":"顴骨隨中臉發育。","E":"鼻骨最晚定型，故 definitive rhinoplasty 需等 14–18 歲。"},"cite":"NG113 · NG113-B08-Q05","conflict":""},{"id":"3172","sub":"D","src":"NG","years":[113],"stem":"Which of the following statements about pediatric orbital floor trapdoor fractures are correct? (複選)","opts":{"A":"Trapdoor fractures are more common in children due to greater bony elasticity.","B":"Children tend to have fractures without enophthalmos or vertical orbital dystopia (VOD).","C":"Trapdoor fractures are termed \"white-eyed blowout fractures\" because there is no subconjunctival ecchymosis.","D":"Patients will have only mild restriction of gaze due to entrapped tissue in the fracture line.","E":"The fracture line may be so small that there is no CT evidence of a fracture."},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"小兒眶底 **trapdoor（白眼）骨折**四大特徵：骨彈性大易呈活門式、常**無**眼球內陷或垂直錯位、無結膜下瘀血（故稱『white-eyed』）、CT 可能看不到骨折線。\n**但『只有輕度凝視受限』是錯的**——嵌頓可致嚴重的眼心反射（心搖過緩、噁心），是小兒外科急症，須及早手術。","peropt":{"A":"◎ 骨彈性大 → 活門式骨折。","B":"◎ 常無眼球內陷或垂直錯位。","C":"◎ 無結膜下瘀血 → white-eyed blowout。","D":"✗ 非輕度：嵌頓致嚴重限制與眼心反射，屬急症。","E":"◎ 骨折線極小，CT 可能無證據。"},"cite":"NG113 · NG113-B08-Q06","conflict":""},{"id":"3173","sub":"A","src":"NG","years":[113],"stem":"Which of the following statements about the diagnosis of hypertelorism and the Tessier classification of facial clefts is correct?","opts":{"A":"The classification takes into account all asymmetrical and paramedian anomalies.","B":"Tessier classification provides clear definitions and treatment implications, based on cadaveric studies from the 1990s.","C":"The tip of the nasal bone is the reference landmark in Tessier classification.","D":"In special situations, the concept of additive facial and cranial clefts may sum to 13 or 15.","E":"Crouzon's syndrome involves only the face and cranium and is not associated with anomalies in the limbs or trunk."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Tessier 分類的關鍵數學：**顏面裂編號 ＋ 對應顱裂編號 ＝ 14**（0+14、1+13、2+12、3+11、4+10、5+9、6+8）。參考軸是眼眶，不是鼻骨。另一關鍵鑑別：**Crouzon 只侵犯顏面與顱骨，四肢軀幹正常**（有別於 Apert／Pfeiffer 的併指與寬拇指）。","peropt":{"A":"✗ 分類無法涵蓋所有不對稱與旁中線異常。","B":"✗ 基於 1970 年代的屍體研究，非 1990 年代。","C":"✗ 參考標記為眼眶，非鼻骨尖。","D":"✗ 顏面裂＋顱裂之和恆為 **14**，非 13 或 15。","E":"◎ 正解：Crouzon 不合併四肢或軀幹異常。"},"cite":"NG113 · NG113-B08-Q07","conflict":""},{"id":"3174","sub":"A","src":"NG","years":[113],"stem":"Which of the following statements is incorrect regarding surgical considerations and techniques in facial clefts?","opts":{"A":"Bringing the orbits closer together and creating a nose of normal appearance are the two main aims of surgery.","B":"The age at operation is important. If there is a cranial cleft, it is better to schedule the surgery as soon as the diagnosis is confirmed to lower the risk of intracranial infection.","C":"In hypertelorism with an interorbital distance less than 35mm, a single medial wall mobilization can be performed through a limited subciliary incision.","D":"In hypertelorism with an interorbital distance of 35 to 40mm, large frontal sinuses, and a high pituitary sella, the supraorbital rim and roof of the orbits can be left in place with mobilization of the other three walls.","E":"In symmetrical orbital hypertelorism with an interorbital distance greater than 40mm, Box-shift osteotomies could be considered."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"顱裂（尤其合併腦膨出）**不是一診斷就立刻開刀**；手術時機需權衡顱骨發育、腦部狀況與麻醉風險。手術兩大目標：把眼眶拉近、重建外觀正常的鼻子。眶間距是術式選擇的量尺（<35mm 單純內側壁移動；35–40mm 保留眶頂三壁動員；>40mm box-shift）。","peropt":{"A":"✓ 兩大目標：眼眶靠攏＋鼻部外形。","B":"◎ 正解（不正確）：確診後立即手術以降低顱內感染，並非通則。","C":"✓ 眶間距 <35mm 可經下瞼緣小切口單做內側壁動員。","D":"✓ 35–40mm、額竇大、蝶鞍高 → 保留眶上緣與眶頂，動員其餘三壁。","E":"✓ 對稱性眼距過寬且 >40mm → 考慮 box-shift 截骨。"},"cite":"NG113 · NG113-B08-Q08","conflict":""},{"id":"3175","sub":"D","src":"NG","years":[113],"stem":"Which of the following statements about LeFort I osteotomy is incorrect?","opts":{"A":"An osteotomy from the piriform aperture extends laterally until the cut descends just posterior to the last maxillary molar and drops through the maxillary tuberosity. The cut should be made at least 5 mm above the tooth apices.","B":"In cases of inferior or anterior positioning, gaps between the segments greater than 3 mm should be grafted.","C":"The descending palatine arteries should be preserved and not be clipped or injured to avoid compromising the blood supply to the maxilla.","D":"If the alar base is wide, an alar cinch suture can be performed to normalize the width.","E":"A V–Y closure at the central incisor can help alleviate shortening of the lip."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Le Fort I 截骨的安全要點全對，唯一破綻在**下行顎動脈（descending palatine artery）**：教科書其實允許在必要時結紮它——上頜的血供主要靠軟組織蒂（頰黏膜、顎黏膜），單側甚至雙側結紮下行顎動脈通常仍安全。選項 C 把『可結紮』說成『絕不可傷及』，過度絕對。","peropt":{"A":"✓ 截骨線距牙根尖至少 5 mm。","B":"✓ 節段間隙 >3 mm 應植骨。","C":"◎ 正解（錯誤）：下行顎動脈在必要時可結紮，非絕不可傷。","D":"✓ 鼻翼過寬可做 alar cinch 縫合。","E":"✓ 中門齒處 V–Y 縫合可緩解上唇縮短。"},"cite":"NG113 · NG113-B08-Q09","conflict":""},{"id":"3176","sub":"B","src":"NG","years":[113],"stem":"Which of the following statements about embryology and epidemiology of cleft lip is incorrect?","opts":{"A":"The foundational structure of the face is formed between the 4th and 10th weeks post-conception.","B":"Families with a history of \"cleft lip with or without palate\" or \"cleft palate only\" have a higher likelihood of having another child with the condition compared to the general population.","C":"The inheritance of cleft lip with or without cleft palate, as well as isolated cleft palate, follows Mendelian genetic principles.","D":"The frontonasal prominence contributes to the formation of the forehead, the midline of the nose, the central upper lip (philtrum), and the primary palate.","E":"The medial nasal processes on both sides develop into the central portion of the nose, the central upper lip, the anterior maxilla, and the primary palate."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"唇顎裂的遺傳是**多因子（multifactorial）**，不遵循孟德爾定律——這是本題唯一破綻。胚胎學要點：**額鼻突 → 前額、鼻中線、人中、原發顎**；**兩側內側鼻突 → 鼻中央、上唇中央、前上頜、原發顎**。","peropt":{"A":"✓ 顏面基礎結構於受孕後第 4–10 週形成。","B":"✓ 家族史增加再發風險。","C":"◎ 正解（不正確）：為多因子遺傳，非孟德爾式。","D":"✓ 額鼻突的衍生物。","E":"✓ 內側鼻突的衍生物。"},"cite":"NG113 · NG113-B08-Q10","conflict":""},{"id":"3180","sub":"A","src":"NG","years":[113],"stem":"下列有關Craniofacial microsomia(CFM)之敘述，何者錯誤?","opts":{"A":"大部分sporadic, 少數autosomal dominant","B":"常影響的區域包含耳朵、額骨及下頷骨","C":"疾病與胚胎期第一第二腮弓發育不全有關","D":"Goldenhar syndrome現在被廣泛認為是CFM症候群的一部分","E":"下頷骨發育不全 (mandibular hypoplasia) 是診斷此疾病的重點"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 CN3032 同一考點：CFM 最常受累為**耳、下頜、上頜**。此題把「上頜」換成「額骨」作為破綻（原檔詳解明載三構造為 auricle、mandible、maxilla）。","peropt":{"A":"✓ 多為偶發，少數體染色體顯性。","B":"◎ 正解（錯誤）：應為耳、下頜、**上頜**，非額骨。","C":"✓ 第一、二鰓弓發育不全。","D":"✓ Goldenhar 屬 CFM 譜系。","E":"✓ 下頜發育不全為診斷核心。"},"cite":"NG113 · NG113-B09-Q04","conflict":""},{"id":"3182",
