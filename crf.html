enerally, ectropion and scleral show may be problematic, and secondary procedures to correct them generally do not afford correction beyond 3 mm.", "C": "Usually, more than 2 mm of inferior globe dystopia is required to produce diplopia.", "D": "Infection is not common, and usually responds to antibiotics and sinus or lacrimal drainage.", "E": "Impacted fractures of the zygomatic arch which abut the coronoid process may result in ankylosis."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B07-Q04", "conflict": "", "key": "與 CN3158 同題（NG115）。此版把破綻換到選項 **C**：『下方眼球移位 >**2** mm 即致複視』——正確門檻是 **>5 mm**。\n注意 B 也被改寫（二次矯正無法超過 3 mm），但仍屬合理敘述。同一題三年三版，破綻在不同選項間遊走。", "peropt": {"A": "✓ 晚期併發症清單。", "B": "✓ 二次矯正 ectropion／scleral show 效果有限（<3 mm）。", "C": "◎ 正解（錯誤）：須 >**5** mm 眼球下移才致複視，非 2 mm。", "D": "✓ 感染不常見。", "E": "✓ 顴弓撞喙突 → 關節僵直。"}}, {"id": "3165", "sub": "D", "src": "NG", "years": [115], "stem": "關於兒童顏面骨折（pediatric facial fractures）之流行病學與骨折型態，下列何者最正確？", "opts": {"A": "Le Fort fracture 在 5 歲以下兒童最常見，主要因 frontal sinus 尚未發育完成", "B": "兒童 mandibular fracture 最常見部位為 mandibular angle，且其發生率隨年齡下降", "C": "Orbital fracture 是整體兒童顏面骨折中最常見的骨折型態，而 condylar/subcondylar fracture 為最常見 mandibular fracture", "D": "Midface fracture 在兒童十分常見，主因為 midface 缺乏 forehead 與 mandible 保護", "E": "兒童 facial fracture 合併 intracranial injury 的機率低，因此 routine neurologic evaluation 並不重要"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A 錯：Le Fort fractures 通常見於 >10 歲兒童，幼兒因 frontal sinus 未氣化完整，多為 oblique craniofacial fracture。\n\nB 錯：兒童較常見 condylar fracture；隨年齡增加，body 與 angle fracture 才增加。\n\nD 錯：兒童 midface fracture 相對少見，因 forehead 與 mandible 提供保護。\n\nE 錯：facial fracture 為高能量傷害，常合併 brain injury、cervical spine injury，需高度警覺 neurologic evaluation。", "cite": "NG115 · NG115-B09-Q01", "conflict": "", "key": "小兒顏面骨折流行病學（新版定論）：**眶骨為整體最常見的顏面骨折**；**髁突／髁突下為最常見的下頜骨折**（隨年齡增加才轉向 body／angle）。Le Fort 型見於 >10 歲；幼兒中臉受額與下頜保護、少見中臉骨折；顏面骨折常合併顱內損傷，神經學評估重要。", "peropt": {"A": "✗ Le Fort 多見於 >10 歲；幼兒多為斜向顱顏骨折。", "B": "✗ 最常見下頜骨折為**髁突**，且發生率非隨年齡下降。", "C": "◎ 正解：眶骨最常見；髁突／髁突下為最常見下頜骨折。", "D": "✗ 幼兒中臉骨折少見（受額與下頜保護）。", "E": "✗ 常合併顱內損傷，神經學評估重要。"}}, {"id": "3166", "sub": "E", "src": "GS", "years": [110], "stem": "關於Otoplasty，下述哪項是錯誤的?", "opts": {"A": "Most otoplasty procedures are best performed ≥7 years old when most ear growth is completed", "B": "Otoplasty should aim to achieve symmetry on frontal view.", "C": "Ideally, molding of the ear is started between 1 and 3 weeks old when maternal estrogens in the child facilitate cartilage manipulation.", "D": "Stahl deformity describes the presence of a third crus of the antihelix that can cause the helix to have a pointed appearance.", "E": "Patients with cryptotia have a superior helix that is attached to the postauricular skin without a sulcus."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B09-Q04", "conflict": "", "key": "**Stahl deformity ＝ 第三個 antihelix crus**，使耳輪呈尖角（『Spock ear』）。凡把 Stahl 寫成『antihelical fold 缺失／減弱、concha 過度發育』者即錯——那是 **prominent ear（招風耳）** 的描述。\n⚠ **跨年數值變更**：otoplasty 最佳年齡，GS110 寫 **≥7 歲**，GS111 起改為 **≥3 歲**。作答錨定該年；概念記『耳部生長約學齡前完成，故 3–5 歲後可做』。\n本題（GS110）D 為正確的 Stahl 定義，破綻在 **A：≥7 歲**。", "peropt": {"A": "◎ 正解（本年錯誤選項）：GS110 認定 otoplasty 最佳年齡非 7 歲（後續年份改為 ≥3 歲）。", "B": "✓ 正面觀對稱為目標。", "C": "✓ 出生後 1–3 週開始塑形（母體雌激素）。", "D": "✓ Stahl＝第三 antihelix crus，耳輪呈尖角。", "E": "✓ Cryptotia 定義正確。"}}, {"id": "3167", "sub": "E", "src": "GS", "years": [111, 112], "stem": "A 5-year-old boy is brought to your office by his parents regarding their concern for the appearance of his right ear. He is an otherwise healthy boy. On examination, the superior helix of the right ear is abnormally adherent to the temporal skin. Gentle retraction on the helix allows it to be pulled out to a normal position. What is the most likely diagnosis?", "opts": {"A": "Stahl ear", "B": "Cup ear", "C": "Lop ear", "D": "Cryptotia", "E": "Helix-antihelix cartilage adhesion"}, "ans": "D", "multi": false, "etype": "ai", "expl": "Cryptotia is characterized by an abnormal adherence of the superior helix to the temporal skin, with varying degree of severity.", "cite": "GS111 · GS111-B06-Q03", "conflict": "", "key": "**Cryptotia（隱耳）＝上耳輪黏著於顳部皮膚、無耳後溝**，輕拉可回正常位置。\n輕拉可回正位是與其他狹縮耳畸形的鑑別點。\n⚠ 與 CN3171 為**選項重排家族**：同一臨床情境，答案從 D 變 E。", "peropt": {"A": "Stahl ear＝第三 crus。", "B": "Cup ear＝上極塌陷罩下。", "C": "Lop ear＝上耳輪前折下垂。", "D": "◎ 正解：Cryptotia。", "E": "Helix-antihelix cartilage adhesion＝杜撰誘答。"}}, {"id": "3168", "sub": "E", "src": "GS", "years": [111], "stem": "An eleven-year-old girl presents in the clinic with right ear deformity shown in the figure. Which type of microtia does it fall into based on Nagata's classification?", "opts": {"A": "Anotia", "B": "Lobule type", "C": "Concha type", "D": "Small concha type", "E": "Atypical microtia"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Lobule type refers to vestige ear with lobule, without concha, acoustic meatus, and tragus.", "cite": "GS111 · GS111-B06-Q06", "conflict": "", "key": "**Nagata 小耳症分類**：**lobule type**（有耳垂，無耳甲、外耳道、耳屏）、concha type（有耳甲與外耳道）、small concha type、anotia、atypical。本題殘存耳＋耳垂但無耳甲 → **lobule type**。", "peropt": {"A": "Anotia＝完全無耳。", "B": "◎ 正解：Lobule type。", "C": "Concha type 有耳甲。", "D": "Small concha type。", "E": "Atypical 非典型。"}}, {"id": "3169", "sub": "E", "src": "GS", "years": [111, 114], "stem": "關於Otoplasty，下述哪項是錯誤的? (單選)", "opts": {"A": "Most otoplasty procedures are best performed ≥3 years old when most ear growth is completed.", "B": "Otoplasty should aim to achieve symmetry on frontal view", "C": "Ideally, molding of the ear is started between 1 and 3 weeks old when maternal estrogens in the child facilitate cartilage manipulation", "D": "Stahl deformity describes the absence or weakness of antihelical fold with/without overgrown concha", "E": "Patients with cryptotia have a superior helix that is attached to the postauricular skin without a sulcus"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B09-Q04", "conflict": "選項重排家族：與 GS113-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母", "key": "**Stahl deformity ＝ 第三個 antihelix crus**，使耳輪呈尖角（『Spock ear』）。凡把 Stahl 寫成『antihelical fold 缺失／減弱、concha 過度發育』者即錯——那是 **prominent ear（招風耳）** 的描述。\n本題（GS111/114）把破綻搬到 **D**：Stahl 被錯寫成『antihelical fold 缺失／concha 過度發育』（那是招風耳）。同時 A 已改為 ≥3 歲（正確）。與 CN3166 對照，可見『正確 Stahl 定義』與『錯誤 Stahl 定義』兩版在不同年度互換。", "peropt": {"A": "✓ ≥3 歲（本版已修正）。", "B": "✓ 正面觀對稱。", "C": "✓ 出生後 1–3 週塑形。", "D": "◎ 正解（錯誤）：此為 prominent ear 描述，非 Stahl。", "E": "✓ Cryptotia 定義正確。"}}, {"id": "3170", "sub": "E", "src": "GS", "years": [112], "stem": "關於Otoplasty，下述哪項是錯誤的?", "opts": {"A": "大多數的otoplasty procedure最好是在≥3歲後做，因為most ear growth is completed", "B": "Otoplasty的目標是在frontal view上看起來對稱", "C": "理想情況下Ear molding要在出生後一到三周內開始，因為這段時間maternal estrogen仍存在孩子的體內，可以促進cartilage manipulation", "D": "Stahl deformity 是指 absence or weakness of antihelical fold with/without overgrown concha", "E": "Cryptotia的患者的superior helix會attached to the postauricular skin without a sulcus"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "GS112 · GS112-B09-Q04", "conflict": "", "key": "與 CN3169 同題中文版（GS112），破綻同在 **D**（Stahl 被寫成招風耳描述）。此組 otoplasty 題（CN3166/3169/3170/3172）跨四年，**Stahl 的定義正誤在 A 與 D 之間輪流當陷阱**——背字母必死。", "peropt": {"A": "✓ ≥3 歲。", "B": "✓ 正面對稱。", "C": "✓ 1–3 週塑形。", "D": "◎ 正解（錯誤）：Stahl＝第三 crus，非 antihelical fold 缺失。", "E": "✓ Cryptotia 定義正確。"}}, {"id": "3171", "sub": "E", "src": "GS", "years": [113], "stem": "A 5-year-old boy is brought to your office by his parents regarding their concern for the appearance of his right ear. He is an otherwise healthy boy. On examination, the superior helix of the right ear is abnormally adherent to the temporal skin. Gentle retraction on the helix allows it to be pulled out to a normal position. What is the most likely diagnosis?", "opts": {"A": "Helix-antihelix cartilage adhesion", "B": "Stahl ear", "C": "Cup ear", "D": "Lop ear", "E": "Cryptotia"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B06-Q03", "conflict": "", "key": "**Cryptotia（隱耳）＝上耳輪黏著於顳部皮膚、無耳後溝**，輕拉可回正常位置。\n與 CN3167 同題、**選項重排**（答案 D→E）。若你記的是『選 D』，這一年 Cryptotia 被移到 E，你就錯了。認**臨床特徵**（上耳輪黏顳皮、可拉回）而非位置。", "peropt": {"A": "Helix-antihelix cartilage adhesion＝誘答。", "B": "Stahl ear。", "C": "Cup ear。", "D": "Lop ear。", "E": "◎ 正解：Cryptotia。"}}, {"id": "3172", "sub": "E", "src": "GS", "years": [113], "stem": "關於Otoplasty，下述哪項是錯誤的?", "opts": {"A": "Otoplasty should aim to achieve symmetry on frontal view", "B": "Most otoplasty procedures are best performed ≥3 years old when most ear growth is completed.", "C": "Ideally, molding of the ear is started between 1 and 3 weeks old when maternal estrogens in the child facilitate cartilage manipulation", "D": "Stahl deformity describes the absence or weakness of antihelical fold with/without overgrown concha", "E": "Patients with cryptotia have a superior helix that is attached to the postauricular skin without a sulcus"}, "ans": "D", "multi": false, "etype": "ai", "expl": "(D) 此為Prominent ear之描述。Stahl deformity: presence of a third crus of the antihelix that can cause the helix to have a pointed appearance.", "cite": "GS113 · GS113-B09-Q04", "conflict": "選項重排家族：與 GS114-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 GS111-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母", "key": "**Stahl deformity ＝ 第三個 antihelix crus**，使耳輪呈尖角（『Spock ear』）。凡把 Stahl 寫成『antihelical fold 缺失／減弱、concha 過度發育』者即錯——那是 **prominent ear（招風耳）** 的描述。\n原檔詳解直接點破：D 是 prominent ear 描述。此為 otoplasty 四連題中破綻定於 D 的一版（GS113）。", "peropt": {"A": "✓ 正面對稱。", "B": "✓ ≥3 歲。", "C": "✓ 1–3 週塑形。", "D": "◎ 正解（錯誤）：Stahl＝第三 crus，非招風耳描述。", "E": "✓ Cryptotia 定義正確。"}}, {"id": "3173", "sub": "E", "src": "GS", "years": [115], "stem": "下列關於 prominent ear（招風耳）矯正術之敘述，何者正確？", "opts": {"A": "Mustarde technique 主要是以 concha-mastoid sutures 將 conchal bowl 固定至 mastoid fascia。", "B": "Furnas sutures 的主要目的為重建 antihelical fold。", "C": "Stenstrom technique 藉由 anterior cartilage scoring 增加耳軟骨 pliability，常作為 Mustarde sutures 的輔助技術。", "D": "過度矯正 middle third of the ear 會造成 cauliflower ear deformity。", "E": "Incisionless otoplasty 的原理主要為切除部分 conchal cartilage 後，再以 buried sutures 固定耳廓位置。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A 錯誤：Mustarde technique 是利用 posterior mattress sutures 重建 antihelical fold。\n\nB 錯誤：Furnas sutures 為 concha-mastoid sutures，用於 setback prominent concha。\n\nC 正確：Stenstrom technique 以 anterior cartilage scoring 弱化 cartilage，增加 pliability，常與 Mustarde sutures 合併使用。\n\nD 錯誤：middle third 過度矯正典型造成 telephone ear deformity。\n\nE 錯誤：Incisionless otoplasty 是以 needle scoring 弱化 anterior cartilage，並以 buried permanent sutures 建立 antihelical fold，並不涉及正式 cartilage excision。", "cite": "GS115 · GS115-B09-Q02", "conflict": "", "key": "招風耳三大術式對號入座：\n**Mustardé ＝ 後方褥式縫合，重建 antihelical fold**\n**Furnas ＝ concha-mastoid 縫合，把外突耳甲後推**\n**Stenström ＝ 前方軟骨劃痕（anterior scoring），增加軟骨可塑性，常作 Mustardé 的輔助**", "peropt": {"A": "✗ concha-mastoid 縫合是 **Furnas**，非 Mustardé。", "B": "✗ Furnas 的目的是後推耳甲，非重建 antihelical fold。", "C": "◎ 正解：Stenström 前方軟骨劃痕，輔助 Mustardé。", "D": "✗ 過度矯正中三分之一致『telephone ear』，非 cauliflower ear。", "E": "✗ Incisionless otoplasty 僅以埋藏縫線塑形，不切除軟骨。"}}, {"id": "3174", "sub": "E", "src": "NG", "years": [104], "stem": "下列關於耳朵整形術(otoplasy)的敘述何者錯誤?", "opts": {"A": "耳朵整形術指的是利用手術介入改變耳朵其外觀與位置。", "B": "在評估耳朵外觀的時候，一般常先評估其整體大小與形狀，然後分成上、中、下三個部份分別評估，最後並評估其兩耳對稱性。", "C": "Tanzer學者將狹縮耳(constricted ear)分成三種型態；type I – 只有牽涉helix; type II – 包含helix and scapha; type III – 嚴重的杯狀耳(extreme cupping of the ear)。", "D": "臉部拉皮手術因為不會牽扯到耳朵的部分，所以不會造成耳朵外觀的影響。", "E": "耳朵整形術的再次手術(secondary procedure)並非不常見，其中矯正不足(under-correction)最常發生在上三分之一耳(upper pole of the ear)。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B05-Q01", "conflict": "", "key": "**臉部拉皮確實會影響耳朵外觀**（耳垂變形、pixie ear、耳屏移位皆為 facelift 已知併發症），故選項 D『不會造成耳朵影響』為錯。\n另記 Tanzer 狹縮耳三型：I＝僅 helix；II＝helix＋scapha；III＝嚴重杯狀耳。", "peropt": {"A": "✓ 改變耳朵外觀與位置。", "B": "✓ 先評估大小形狀，再分上中下三部，最後看對稱。", "C": "✓ Tanzer 狹縮耳三型。", "D": "◎ 正解（錯誤）：拉皮會影響耳朵（pixie ear、耳垂變形）。", "E": "✓ 二次手術不罕見，矯正不足最常見於上極。"}}, {"id": "3175", "sub": "E", "src": "NG", "years": [104], "stem": "下列有關小耳症手術的敘述何者為非?", "opts": {"A": "在第一階段軟骨framework植入時，為了避免軟骨暴露，宜將軟骨至於SMAS之下。", "B": "Brent重建手術分為四個階段。", "C": "對於雙側小耳症的患者，一般建議先進行auricular reconstruction，再做middle ear surgery。", "D": "Nagata小耳症耳朵重建手術的第二階段為將耳朵翻起並於auriculocephalic sulcus中墊入軟骨，Brent則是在第三階段進行類似手術。", "E": "Nagata使用temporoparietal fascia覆蓋framework的後緣，Brent則是使用turnover \"book flap\" of occipitalis fascia。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B06-Q07", "conflict": "", "key": "小耳症重建的關鍵細節：**第一階段軟骨框架應置於皮下（乳突區皮膚囊袋），非 SMAS 之下**——SMAS 下太深會影響框架輪廓的顯現。Brent 四階段、Nagata 二階段，兩者的翻耳與筋膜覆蓋策略不同。", "peropt": {"A": "◎ 正解（為非）：框架應置於皮下囊袋，非 SMAS 之下。", "B": "✓ Brent 分四階段。", "C": "✓ 雙側小耳症宜先做耳廓重建，再中耳手術。", "D": "✓ Nagata 第二階段翻耳墊軟骨；Brent 於第三階段。", "E": "✓ Nagata 用顳頂筋膜覆蓋框架後緣；Brent 用枕肌筋膜翻轉瓣。"}}, {"id": "3176", "sub": "E", "src": "NG", "years": [105], "stem": "下列關於耳朵整形術(otoplasy)的敘述何者錯誤?", "opts": {"A": "耳朵整形術指的是利用手術介入改變耳朵其外觀與位置。", "B": "在評估耳朵外觀的時候，一般常先評估其整體大小與形狀，然後分成上、中、下三個部份分別評估，最後並評估其兩耳對稱性。", "C": "評估耳朵上三分之一的部分是否顯著，要看antihelix或superior crus of the triangular fossa是否完整發育，以及helical rim是否形狀明確。", "D": "當整個耳朵需要重建，例如小耳症，建議等到孩童四歲的時候進行而為最佳時機。", "E": "Tanzer學者將狹縮耳(constricted ear)分成三種型態；type I – 只有牽涉helix; typeII – 包含helix and scapha; type III – 嚴重的杯狀耳(extreme cupping of the ear)。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B06-Q01", "conflict": "", "key": "全耳重建（如小耳症）建議等到約 **6 歲**（肋軟骨量足、對側耳近成人大小、心理發育），非 4 歲。此與『招風耳矯正 3–5 歲』不同——**重建需更大的軟骨量，故更晚**。\nTanzer 狹縮耳三型同 CN3174。", "peropt": {"A": "✓ 定義正確。", "B": "✓ 評估流程正確。", "C": "✓ 上三分之一評估要點。", "D": "◎ 正解（錯誤）：全耳重建宜約 6 歲，非 4 歲。", "E": "✓ Tanzer 三型。"}}, {"id": "3177", "sub": "E", "src": "NG", "years": [105], "stem": "As concerning the epidemiologic features of microtia, which of the following is not correct?", "opts": {"A": "prevalence is around 1/900~1/6000 in newborns", "B": "10% of the victim suffered from some form of inner ear anomly", "C": "Due to conduction deficit, the hearing threshold measures about 40-60 dB", "D": "Up to 5% patients suffer from total deafness", "E": "If two siblings had microtia, the risk of affecting future offspring will be 15%"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B07-Q03", "conflict": "", "key": "小耳症流行病學：發生率約 1/900–1/6000；約 **10% 合併內耳異常**；患側傳導性聽損約 40–60 dB；**完全失聰極罕見**（絕非高達 5%）——因為小耳症影響的是外耳／中耳傳導，內耳耳蝸功能多半保留。兩手足皆患病時，後代風險約 15%。", "peropt": {"A": "✓ 發生率 1/900–1/6000。", "B": "✓ 約 10% 合併內耳異常。", "C": "✓ 傳導性聽損 40–60 dB。", "D": "◎ 正解（錯誤）：完全失聰極罕見，非高達 5%。", "E": "✓ 兩手足患病 → 後代風險約 15%。"}}, {"id": "3178", "sub": "E", "src": "NG", "years": [106], "stem": "Which of the following statements about auricular defects and ear reconstruction are correct?", "opts": {"A": "The etiology of microtia may be associated with hereditary factors and in utero tissue ischemia.", "B": "The timing of reconstruction should take into consideration the psychological and physical factors of the child.", "C": "Class I of the Tanzer classification correlates to 'Anotia'.", "D": "Otohematoma, or 'cauliflower ear' can be treated conservatively, even in severe cases.", "E": "Partially avulsed auricular tissue with a narrow pedicle nearly always necrotizes."}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B05-Q08", "conflict": "", "key": "Tanzer 分類 **Class I ＝ anotia（完全無耳）**——注意這與 Nagata 分類不同（Nagata 的 lobule/concha type 是另一套）。此外：小耳症與遺傳＋子宮內組織缺血相關；重建時機需考量心理與生理；cauliflower ear 須及早引流固定（非保守觀察）；窄蒂部分撕脫的耳組織血供其實常可存活。", "peropt": {"A": "◎ 遺傳因素＋子宮內組織缺血。", "B": "◎ 重建時機考量心理與生理。", "C": "◎ Tanzer Class I ＝ anotia。", "D": "✗ 嚴重 cauliflower ear 須引流固定，非保守。", "E": "✗ 窄蒂部分撕脫組織常可存活，非幾乎必壞死。"}}, {"id": "3179", "sub": "E", "src": "NG", "years": [107], "stem": "Which is NOT the definitive indication for osseointegrated ear reconstruction?", "opts": {"A": "Radiotherapy", "B": "Potential craniofacial anomaly", "C": "failed autogenous reconstruction.", "D": "Patient preference", "E": "Microtia"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B03-Q06", "conflict": "", "key": "**骨整合植體耳重建的適應症＝『不適合或已失敗於自體重建』者**：放療後、顱顏異常組織不足、自體重建失敗、病人偏好。**Microtia 本身不是適應症**——單純小耳症的首選仍是自體肋軟骨重建。", "peropt": {"A": "✓ 放療。", "B": "✓ 潛在顱顏異常（組織條件差）。", "C": "✓ 自體重建失敗。", "D": "✓ 病人偏好。", "E": "◎ 正解（非適應症）：單純小耳症應優先自體重建。"}}, {"id": "3180", "sub": "E", "src": "NG", "years": [107], "stem": "對於大部分的Otoplasty procedures，小孩年齡至少要幾歲以上才適合?", "opts": {"A": "3個月", "B": "1歲", "C": "4歲", "D": "6歲", "E": "10歲"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B06-Q01", "conflict": "", "key": "⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題正面問『至少幾歲』，答案 **4 歲**（NG107 版本）。與 GS 系列的『≥3 歲』略有出入，錨定該年。", "peropt": {"A": "3 個月＝ear molding 時機，非手術。", "B": "1 歲過早。", "C": "◎ 正解（NG107）：4 歲。", "D": "6 歲為全耳重建時機。", "E": "10 歲為 Nagata 框架時機。"}}, {"id": "3181", "sub": "E", "src": "NG", "years": [108], "stem": "關於耳整形(Otoplasty)何者錯誤", "opts": {"A": "耳整形建議於幼兒1歲時施行", "B": "Great auricular nerve應儘量予以保留", "C": "所謂cryptotia是指耳朵的上半部包埋在顳部頭皮下", "D": "所謂stahl's ear是指異常構造的耳部crus", "E": "嚴重的Constricted ear必要時需切除部分軟骨"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B05-Q05", "conflict": "", "key": "⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題破綻在 A（建議 1 歲施行）。其餘皆正確：保留耳大神經、cryptotia 定義、Stahl＝異常 crus、嚴重狹縮耳需切除部分軟骨。", "peropt": {"A": "◎ 正解（錯誤）：otoplasty 非建議 1 歲施行。", "B": "✓ 保留 great auricular nerve。", "C": "✓ Cryptotia＝上耳埋於顳部頭皮下。", "D": "✓ Stahl＝異常耳部 crus。", "E": "✓ 嚴重狹縮耳必要時切除部分軟骨。"}}, {"id": "3182", "sub": "E", "src": "NG", "years": [109], "stem": "關於timing of surgery for microtia，下列何者為是？", "opts": {"A": "From a physical consideration, it would be ideal to begin construction before the child enters school", "B": "Brent begins ear construction at age 6", "C": "Nagata begins auricular construction at age 7", "D": "Nagata requires 6-8 rib cartilage for 3D framework"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B07-Q05", "conflict": "", "key": "小耳症重建時機（兩大家對照，背熟）：\n**Brent 從 6 歲開始**（正常耳已達成人垂直高度的 6–7 mm 內、軟骨量足）\n**Nagata 從 10 歲開始**（需 6–9 條肋軟骨做 3D 框架，故須更大孩子）\n本題 A（學齡前）、C（Nagata 7 歲）、D（Nagata 6–8 肋）皆錯，正解 B。", "peropt": {"A": "✗ 生理上宜達足量軟骨（Brent 6 歲、Nagata 10 歲），非一味趕在入學前。", "B": "◎ 正解：Brent 從 6 歲開始。", "C": "✗ Nagata 從 10 歲開始，非 7 歲。", "D": "✗ Nagata 需 6–9 條肋軟骨，非 6–8。"}}, {"id": "3183", "sub": "E", "src": "NG", "years": [110], "stem": "Which of the following statements about ear reconstruction is wrong ?", "opts": {"A": "Class I of Tanzer classification is microtia", "B": "Brent begins ear construction at age six, when the normal ear has grown to within 6–7 mm of its full vertical height, and the amount of cartilage is enough.", "C": "Typically, microtia patients have a hearing threshold of 40–60 dB on the affected side.", "D": "80 to 90% of microtia is unilateral, and 10–20% is bilateral.", "E": "Nagata-type 3D framework needs larger amount of 6–9 rib cartilage. Therefore, this reconstruction begins at the age of 10."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B07-Q03", "conflict": "", "key": "與 CN3178／CN3182 交叉：**Tanzer Class I ＝ anotia，不是 microtia**——這是本題破綻。其餘皆正確：Brent 6 歲、患側 40–60 dB、80–90% 單側、Nagata 需 6–9 肋且 10 歲起。", "peropt": {"A": "◎ 正解（錯誤）：Tanzer Class I ＝ anotia，非 microtia。", "B": "✓ Brent 6 歲。", "C": "✓ 患側 40–60 dB。", "D": "✓ 80–90% 單側、10–20% 雙側。", "E": "✓ Nagata 需 6–9 肋、10 歲起。"}}, {"id": "3184", "sub": "E", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於耳整形(Otoplasty)何者錯誤?", "opts": {"A": "根據Tanzer的分類，Constricted ear可分為三型: Type I(involve only the helix) ,Type II (involve helix and scapha), Type III( extreme cupping of the ear)", "B": "所謂Cryptotia是指耳朵的上半部包埋在顳部頭皮下。", "C": "耳整形建議於幼兒1歲時施行。", "D": "所謂Stahl's ear是指向外上側(superolaterally)的異常構造的耳部crus。", "E": "穿耳洞相關的併發症最好發的位置在耳垂、但是較嚴重的併發症發生在軟骨穿刺處。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG111 · NG111-B05-Q09", "conflict": "", "key": "⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題跨四年（NG111/112/114/115），破綻恆為 **C：建議 1 歲施行**。**Stahl's ear ＝ 向上外側（superolateral）延伸的異常第三 crus**，此定義正確。", "peropt": {"A": "✓ Tanzer 狹縮耳三型。", "B": "✓ Cryptotia 定義。", "C": "◎ 正解（錯誤）：otoplasty 非 1 歲施行。", "D": "✓ Stahl＝向上外側的異常 crus。", "E": "✓ 穿耳洞併發症好發耳垂，嚴重者在軟骨穿刺處。"}}, {"id": "3185", "sub": "E", "src": "NG", "years": [111], "stem": "關於 Surgery for microtia，下列何者為非？", "opts": {"A": "From a psychological and physical consideration, it would be ideal to begin construction before the child enters school", "B": "Tanzer is considered to be the father of modern auricular construction, following by Brent and Nagata. To date, autogenous cartilage remain the most reliable material in ear reconstruction.", "C": "Temporoparietal flap is a workhorse and important salvage tool.", "D": "Identify the \"auricular triangle\" for the location of new auricle, but it's more challenging for microtia in hemifacial microsomia patients."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG111 · NG111-B07-Q05", "conflict": "", "key": "小耳症重建的臨床要點全對，唯一破綻在 D：**『auricular triangle』並非標準定位法**——新耳位置的定位靠的是對側耳鏡像、外眥至枕部連線等標記，且在 hemifacial microsomia 因骨架不對稱更難。命題者杜撰一個『auricular triangle』術語。", "peropt": {"A": "✓ 宜在入學前重建（心理＋生理）。", "B": "✓ Tanzer 為現代耳重建之父，Brent、Nagata 承之；自體軟骨仍最可靠。", "C": "✓ 顳頂筋膜瓣為重要救援工具。", "D": "◎ 正解（為非）：無標準『auricular triangle』定位法。"}}, {"id": "3186", "sub": "E", "src": "NG", "years": [112, 113, 114], "stem": "Which of the following statement regarding innervation of the ear is incorrect?", "opts": {"A": "The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.", "B": "The posterior half of the ear is innervated by the great auricular and greater occipital nerves.", "C": "The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.", "D": "The auditory branch of the vagus nerve is referred to as Arnold's nerve.", "E": "All the above is correct"}, "ans": "B", "multi": false, "etype": "ai", "expl": "The posterior half of the ear is innervated by the great auricular and lesser occipital nerve.", "cite": "NG112 · NG112-B07-Q01", "conflict": "", "key": "耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n本題破綻在 B：後半應為 great auricular ＋ **lesser** occipital，題目寫 **greater** occipital。\n⚠ 與 CN3188 為**極性翻轉家族**：一題問『incorrect』（答 B），一題問『correct』（答 E＝以上皆是，但那一年 B 已被改回 lesser）。", "peropt": {"A": "✓ 前半 ＝ auriculotemporal（V3）。", "B": "◎ 正解（錯誤）：後半為 great auricular ＋ **lesser** occipital，非 greater occipital。", "C": "✓ 迷走耳支供應耳甲與外耳道一部分。", "D": "✓ 迷走耳支＝Arnold's nerve。", "E": "✗ 因 B 錯，故非全對。"}}, {"id": "3187", "sub": "E", "src": "NG", "years": [113], "stem": "有關otoplasty何者錯誤?", "opts": {"A": "Tanzer 將constricted ear deformities 分成三類: type I-involving only the helix; type II-involving the helix and scapha; and type III- extreme cupping of the ear.", "B": "\"Cryptotia\" is used to describe the rare condition where the upper portion of the ear is buried beneath the temporal scalp.", "C": "The Stahl's ear deformity 定義為an abnormal crus extending superolaterally.", "D": "耳洞相關併發症最常見於lobule but the more serious complications occur where the cartilage of the ear has been pierced.", "E": "Otoplasty可以施行於一歲幼兒."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B05-Q02", "conflict": "", "key": "⚠ **耳整形（otoplasty）建議年齡並非 1 歲**——約 3–5 歲（招風耳矯正）。凡把 otoplasty 時機寫成『1 歲』者即錯。這句在 CN3181/3184/3187 三年三考。\n本題（NG113）破綻在 E（一歲施行）。**Stahl's ear ＝ 向上外側（superolateral）延伸的異常第三 crus**，此定義正確。\n注意 B 說 cryptotia 是『rare condition』——cryptotia 在亞洲人其實不罕見，但本題以 E 為答案。", "peropt": {"A": "✓ Tanzer 三型。", "B": "✓ Cryptotia＝上耳埋於顳部頭皮下。", "C": "✓ Stahl＝向上外側異常 crus。", "D": "✓ 穿耳洞併發症好發耳垂，嚴重者在軟骨處。", "E": "◎ 正解（錯誤）：otoplasty 非一歲施行。"}}, {"id": "3188", "sub": "E", "src": "NG", "years": [115], "stem": "Which of the following statements regarding innervation of the ear is correct?", "opts": {"A": "The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.", "B": "The posterior half of the ear is innervated by the great auricular and lesser occipital nerves.", "C": "The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.", "D": "The auditory branch of the vagus nerve is referred to as Arnold's nerve.", "E": "All the above is correct."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B07-Q05", "conflict": "", "key": "耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n⚠ 與 CN3186 為**極性翻轉家族**（問『correct』，答 E）。本版 B 已寫回 **lesser** occipital（正確），故四項全對 → E。\n**同一組事實、正反兩問、B 選項一字之差（greater↔lesser）決定成敗**——記神經名稱，別記答案字母。", "peropt": {"A": "◎ 前半＝auriculotemporal（V3）。", "B": "◎ 後半＝great auricular＋lesser occipital（本版正確）。", "C": "◎ 迷走耳支供應耳甲與外耳道。", "D": "◎ Arnold's nerve。", "E": "◎ 正解：以上皆是。"}}, {"id": "3189", "sub": "F", "src": "GS", "years": [110, 115], "stem": "在施行Orthognathic Surgery時，何處的血管最容易損傷造成bleeding?", "opts": {"A": "Maxilla", "B": "Mandible", "C": "Infraorbital", "D": "Temporal", "E": "Zygoma"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B06-Q01", "conflict": "", "key": "正顎手術出血風險最高處＝**上頜（maxilla）**。Le Fort I 下折（down-fracture）時，翼上頜接合區的 **descending palatine artery 與 pterygoid venous plexus、maxillary artery** 皆在附近，是大出血的主要來源。下頜 BSSO 的出血風險相對低。", "peropt": {"A": "◎ 正解：上頜（Le Fort I down-fracture 區）。", "B": "✗ 下頜 BSSO 出血風險較低。", "C": "✗ 眶下為感覺神經，非主要出血源。", "D": "✗ 顳部非正顎術野。", "E": "✗ 顴骨非主要出血源。"}}, {"id": "3190", "sub": "F", "src": "GS", "years": [111, 112], "stem": "A 22-year-old woman comes to your office with concerns about her lower-third facial appearance, specifically her weak chin. She has no concerns about her midfacial appearance. She has had previous orthodontia and is in class I malocclusion. Her overall facial height is proportional in all views, but on profile, her chin appears weak in an anterior-posterior direction. Cephalometric analysis demonstrates that her SNA angle is 82° (normal 78–82) and her SNB angle is 80° (normal 78–80). What is the most appropriate surgical management?", "opts": {"A": "Bilateral sagittal split and advancement", "B": "Two-jaw surgery with maxillary and mandibular advancement", "C": "Vertical lengthening genioplasty and bone grafting", "D": "Horizontal sliding genioplasty and advancement", "E": "Le Fort I setback"}, "ans": "D", "multi": false, "etype": "ai", "expl": "The patient described has microgenia, but normal facial height and would benefit from augmenting her chin by advancing it horizontally. This patient has normal SNA and SNB angles on cephalometric analysis and is in class I malocclusion; she also has no concerns about her midfacial appearance. These factors all argue against two-jaw surgery with advancements; additionally, this would not change her relative microgenia. Vertical lengthening genioplasty and bone grafting is not indicated because her overall facial height is proportionate (vertical thirds are similar). Le Fort I setback and bilateral sagittal split with advancement would both create malocclusion and neither would address the patient's weak chin.", "cite": "GS111 · GS111-B06-Q01", "conflict": "", "key": "此病人：class I 咬合、臉高比例正常、SNB 正常（下頜位置正常）、僅頦部前後向後縮 → **單純 microgenia**。\n正解＝**水平滑動頦成形術（horizontal sliding genioplasty）前移**。不必動下頜骨（SNB 正常）、不必雙顎手術、也不是垂直延長（臉高正常）。\n⚠ 與 CN3191 為**選項重排家族**：完全相同的病例，正解術式從 D（GS111/112）移到 C（GS113）。", "peropt": {"A": "✗ BSSO 用於下頜骨本身需前移者（此病人 SNB 正常）。", "B": "✗ 雙顎手術過度。", "C": "✗ 垂直延長用於臉高不足（此病人臉高正常）。", "D": "◎ 正解：水平滑動頦成形前移。", "E": "✗ Le Fort I setback 用於上頜前突（此病人 SNA 正常）。"}}, {"id": "3191", "sub": "F", "src": "GS", "years": [113], "stem": "A 22-year-old woman comes to your office with concerns about her lower-third facial appearance, specifically her weak chin. She has no concerns about her midfacial appearance. She has had previous orthodontia and is in class I malocclusion. Her overall facial height is proportional in all views, but on profile, her chin appears weak in an anterior-posterior direction. Cephalometric analysis demonstrates that her SNA angle is 82° (normal 78–82) and her SNB angle is 80° (normal 78–80). What is the most appropriate surgical management?", "opts": {"A": "Bilateral sagittal split and advancement", "B": "Two-jaw surgery with maxillary and mandibular advancement", "C": "Horizontal sliding genioplasty and advancement", "D": "Vertical lengthening genioplasty and bone grafting", "E": "Le Fort I setback"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B06-Q04", "conflict": "", "key": "此病人：class I 咬合、臉高比例正常、SNB 正常（下頜位置正常）、僅頦部前後向後縮 → **單純 microgenia**。\n正解＝**水平滑動頦成形術（horizontal sliding genioplasty）前移**。不必動下頜骨（SNB 正常）、不必雙顎手術、也不是垂直延長（臉高正常）。\n與 CN3190 同一病例、**選項字母重排**（D→C）。臨床決策不變：**單純 microgenia → 水平滑動頦成形前移**。若你背『選 D』，這一年答案在 C。", "peropt": {"A": "✗ BSSO（SNB 正常，不需）。", "B": "✗ 雙顎手術過度。", "C": "◎ 正解：水平滑動頦成形前移。", "D": "✗ 垂直延長（臉高正常，不需）。", "E": "✗ Le Fort I setback（SNA 正常，不需）。"}}, {"id": "3192", "sub": "F", "src": "GS", "years": [114], "stem": "Which of these answers correctly associates a category of mandible hypoplasia seen in the setting of a patient with CFM, with the correct treatment strategy?", "opts": {"A": "Type III, treat at 2 years of age with a costochondral graft to definitively reconstruct the TMJ", "B": "Type I, treat at 5 to 7 years of age with unilateral sagittal split osteotomy to improve facial symmetry and contour", "C": "Type IIb, treat at 5 to 7 years of age with distraction osteogenesis to create a pseudo-TMJ", "D": "Type III, treat at 2 to 3 years of age with a costochondral graft to reconstruct TMJ and free soft tissue transfer to improve facial contour"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS114 · GS114-B05-Q04", "conflict": "", "key": "CFM 下頜發育不全的 **Pruzansky–Kaban 分型與治療**配對：\n**Type I／IIa**：下頜與 TMJ 大致存在 → 觀察或正顎\n**Type IIb**：髁突／關節窩位置異常但存在 → **牽引成骨造 pseudo-TMJ**\n**Type III**：髁突與關節窩缺如 → **肋軟骨移植重建 TMJ**（約 6 歲以後，非 2 歲）\n本題正解 C（IIb ＋ 5–7 歲 distraction）。", "peropt": {"A": "✗ Type III 不宜 2 歲即肋軟骨移植（過早）。", "B": "✗ Type I 通常不需 5–7 歲即單側 BSSO。", "C": "◎ 正解：Type IIb，5–7 歲以牽引成骨造 pseudo-TMJ。", "D": "✗ Type III 肋軟骨重建時機非 2–3 歲。"}}, {"id": "3193", "sub": "F", "src": "NG", "years": [104], "stem": "In dentofacial deformities of orthognathic patients, which characters and surgical approach are correct when we encounter the patients with vertical maxillary excess? (複選)", "opts": {"A": "typically associated with lip incompetence, mentalis strain, and an excessive degree of gingival show (long-face syndrome)", "B": "The treatment approach is to impact the maxilla", "C": "The mandible rotates counterclockwise to maintain occlusion", "D": "The mandible rotates clockwise to maintain occlusion", "E": "A genioplasty may be required to re-established proper chin position"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B07-Q09", "conflict": "", "key": "**垂直上頜過長（vertical maxillary excess, long-face syndrome）**：唇閉合不全、頦肌緊張、露牙齦過多。治療＝**上頜上推（impaction）**，下頜隨之**逆時針（counterclockwise）旋轉**維持咬合；必要時併頦成形。選項 D（順時針）方向錯。", "peropt": {"A": "◎ 長臉症候群特徵。", "B": "◎ 治療為上頜 impaction。", "C": "◎ 下頜逆時針旋轉維持咬合。", "D": "✗ 非順時針旋轉。", "E": "◎ 可能需頦成形重建頦部位置。"}}, {"id": "3194", "sub": "F", "src": "NG", "years": [105, 107], "stem": "Distraction osteogenesis requires successful augmentation of bone formation, which of the following factor has negative impact?", "opts": {"A": "device stability", "B": "a sufficient consolidation period.", "C": "a latency period", "D": "a gradual distraction (activation) period", "E": "complete osteotomy with periostium dissection"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B02-Q05", "conflict": "", "key": "牽引成骨的原則：需要**器械穩定、潛伏期（latency）、漸進牽引、足夠鞏固期（consolidation）**。**完整截骨並剝離骨膜反而有害**——骨膜是新骨形成的關鍵血供與成骨細胞來源，過度剝離會削弱骨再生。故 E 為負面因子。", "peropt": {"A": "✓ 器械穩定有利成骨。", "B": "✓ 足夠鞏固期。", "C": "✓ 潛伏期。", "D": "✓ 漸進牽引期。", "E": "◎ 正解（負面）：完整截骨＋骨膜剝離會破壞血供與成骨。"}}, {"id": "3196", "sub": "F", "src": "NG", "years": [106], "stem": "Which statement about TMJ dysfunction is incorrect?", "opts": {"A": "The geniohyoid, digastric, and the masseter are muscles that depress and retract the mandible. The temporalis and pterygoid elevate and protrude the mandible.", "B": "The etiology of myofascial pain and dysfunction (MPD) can be due to overclosure, occlusal prematurity, bruxism, and anxiety.", "C": "Osteoarthritis is the most common disease affecting the TMJ.", "D": "The treatment goals in rheumatoid arthritis of the TMJ are pain relief, reduction of inflammation, maintenance of function, and prevention of deformity.", "E": "The typical triad of TMJ dysfunction are preauricular pain, clicking noise from the TMJ, and poor mandibular movement."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B05-Q07", "conflict": "", "key": "下頜運動肌群配對（本題破綻）：**降下頜（開口）＝ geniohyoid、digastric、lateral pterygoid**；**升下頜（閉口）＝ masseter、temporalis、medial pterygoid**。選項 A 把 masseter 歸為『降下頜』、把 pterygoid 一概歸為『升＋前突』——masseter 是**升**下頜肌，寫反了。\n其餘正確：TMJ 最常見疾病是骨關節炎；功能障礙三徵＝耳前痛、彈響、下頜運動受限。", "peropt": {"A": "◎ 正解（錯誤）：masseter 是升下頜肌（閉口），非降下頜。", "B": "✓ MPD 病因：過度閉合、咬合早接觸、磨牙、焦慮。", "C": "✓ 骨關節炎為 TMJ 最常見疾病。", "D": "✓ 類風濕性 TMJ 治療目標：止痛、抗炎、維持功能、防變形。", "E": "✓ 三徵：耳前痛、彈響、下頜運動不良。"}}, {"id": "3197", "sub": "F", "src": "NG", "years": [106, 112], "stem": "在Craniofacial orthognathic surgery, 做完Le Fort I osteotomy, 將maxilla bone downfracture(Le Fort downfracture)後，maxillary segment主要的blood supply perfusion來自哪一條vessel?", "opts": {"A": "Maxillary artery", "B": "Nasopalatine artery", "C": "Descending palatine artery", "D": "Greater palatine artery", "E": "Lesser palatine artery"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B06-Q10", "conflict": "Le Fort I down-fracture 血供考點分歧：CN3197/3201 問「灌流來源」答 lesser palatine；CN3206 問「需打斷血管」答 descending palatine+nasopalatine。兩者不矛盾（打斷主幹、保留側枝），合看才完整。", "key": "⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題（NG106/112）答 E（lesser palatine artery）。", "peropt": {"A": "✗ Maxillary artery 為主幹，down-fracture 時其分支多已離斷。", "B": "✗ Nasopalatine 供應前顎黏膜，非主要灌流源。", "C": "✗ Descending palatine 常於 down-fracture 時被犧牲。", "D": "✗ Greater palatine 為 descending palatine 延續。", "E": "◎ 本年答案：lesser palatine（軟顎側枝）維持灌流。"}}, {"id": "3198", "sub": "F", "src": "NG", "years": [107], "stem": "What is the most proper amount of maxillary incisor show when lip reposes?", "opts": {"A": "0mm", "B": "2mm", "C": "4mm", "D": "6mm", "E": "8mm"}, "ans": "B", "multi": false, "etype": "ai", "expl": "[考生建議：C也對 建議答案改為BC]", "cite": "NG107 · NG107-B05-Q01", "conflict": "", "key": "上唇靜止時，上頜門齒外露的理想量約 **2–3 mm**（女性略多、男性略少，隨年齡遞減）。這是正顎與美容評估中臉高度的重要基準。\n⚠ 考生建議 C（4 mm）亦可，建議答案改 BC。本年答案 B。", "peropt": {"A": "✗ 0 mm 過少（老化外觀）。", "B": "◎ 本年答案：2 mm。", "C": "⚠ 4 mm 亦在可接受範圍（考生建議納入）。", "D": "✗ 6 mm 過多（露牙齦）。", "E": "✗ 8 mm 明顯過多。"}}, {"id": "3199", "sub": "F", "src": "NG", "years": [107], "stem": "Which of the following is the most often injured nerve when doing bilateral sagittal split osteotomy (BSSO)?", "opts": {"A": "inferior orbital nerve", "B": "inferior alveolar nerve", "C": "buccal nerve", "D": "auriculotemporal nerve", "E": "lingual nerve"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B05-Q02", "conflict": "", "key": "**BSSO 最常傷及 inferior alveolar nerve（下齒槽神經，V3 分支）**——它走行於下頜骨內的 mandibular canal，矢狀劈開時最易受牽拉或斷裂，術後下唇與頦部麻木是最常見併發症。lingual nerve 次之。", "peropt": {"A": "✗ 眶下神經屬上頜區。", "B": "◎ 正解：下齒槽神經。", "C": "✗ 頰神經受影響較少。", "D": "✗ 耳顳神經不在術野。", "E": "✗ 舌神經次之，非最常見。"}}, {"id": "3200", "sub": "F", "src": "NG", "years": [107], "stem": "Which kind of maxillary osteotomy is most often performed today in orthognathic surgery?", "opts": {"A": "LeFort I", "B": "LeFort II", "C": "LeFort III"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B05-Q03", "conflict": "", "key": "現行上頜截骨以 **Le Fort I 最常施行**——它在梨狀孔至翼上頜接合的低位截骨，可三維移動整個牙槽—顎複合體，適用大多數上頜性咬合不正。Le Fort II／III 保留給中臉或全顱顏畸形。", "peropt": {"A": "◎ 正解：Le Fort I。", "B": "Le Fort II 用於鼻上頜複合體。", "C": "Le Fort III 用於全中臉（如 Crouzon）。"}}, {"id": "3201", "sub": "F", "src": "NG", "years": [107], "stem": "在正顎手術進行LeFort I osteotomy and downfracture 之後，maxilla 的blood supply 是由何血管供應？", "opts": {"A": "Descending palatine artery", "B": "Lesser palatine artery", "C": "Nasopalatine artery", "D": "Maxillary artery", "E": "Greater palatine artery"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B08-Q02", "conflict": "Le Fort I down-fracture 血供考點分歧：CN3197/3201 問「灌流來源」答 lesser palatine；CN3206 問「需打斷血管」答 descending palatine+nasopalatine。兩者不矛盾（打斷主幹、保留側枝），合看才完整。", "key": "⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題（NG107）答 B（lesser palatine artery），與 CN3197 一致。同一考點在 NG106/107/112 三年反覆出現。", "peropt": {"A": "✗ Descending palatine 多被犧牲。", "B": "◎ 本年答案：lesser palatine。", "C": "✗ Nasopalatine 非主要灌流。", "D": "✗ Maxillary artery 主幹分支已斷。", "E": "✗ Greater palatine 為 descending 延續。"}}, {"id": "3202", "sub": "F", "src": "NG", "years": [108], "stem": "有關cleft and craniofacial orthognathic surgery的敘述，下列何者為是? (複選)", "opts": {"A": "Maxillary retrusion resulting in class III malocclusion is typical of the cleft lip/palate population.", "B": "25-30% of dentofacial deformities have midface retrusion severe enough to require orthognathic surgery.", "C": "Orthognathic surgery should ideally be performed as soon as possible even facial growth is incomplete", "D": "Treatment should favor expansive movements (anterior and inferior repositioning) to achieve class I occlusion.", "E": "Treatment should favor expansive movements (superior and posterior repositioning) to achieve class I occlusion."}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q09", "conflict": "", "key": "唇顎裂正顎的核心事實：裂顎族群典型為**上頜後縮 → class III 咬合**；約 **25–30%** 齒顏面畸形嚴重到需正顎；治療偏好**擴張性移動（前移、下移）**達 class I。\n兩個破綻：C『生長未完成即盡早手術』錯（須等生長結束）；E 把移動方向寫成『上移、後移』（收縮性）錯。", "peropt": {"A": "◎ 上頜後縮致 class III，為裂顎族群典型。", "B": "◎ 25–30% 需正顎。", "C": "✗ 應等生長結束再手術。", "D": "◎ 偏好擴張性移動（前移、下移）。", "E": "✗ 方向寫反（應為前下，非上後）。"}}, {"id": "3204", "sub": "F", "src": "NG", "years": [109, 111], "stem": "In dentofacial deformities of orthognathic patients, which characters and surgical approach is incorrect when we encounter the patients with vertical maxillary excess?", "opts": {"A": "Typically associated with lip incompetence, mentalis strain, and an excessive degree of gingival show (long-face syndrome)", "B": "The treatment approach is to impact the maxilla to achieve the proper incisor show with lips in repose.", "C": "The mandible rotates counterclockwise(with respect to a rightward-facing patient) to maintain occlusion.", "D": "A genioplasty may be required to re-established proper chin position.", "E": "There will be no need to consider for skeletal contraction related soft tissue effects."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q07", "conflict": "", "key": "與 CN3193 同一主題（vertical maxillary excess）的**反向問法**（問『incorrect』）。長臉症候群 → 上頜 impaction、下頜逆時針旋轉、必要時頦成形。\n破綻在 E：**骨骼收縮後必須考量軟組織效應**（皮膚、唇、頦肌會隨骨骼位移而改變），不可忽略。", "peropt": {"A": "✓ 長臉症候群特徵。", "B": "✓ 上頜 impaction 達適當門齒外露。", "C": "✓ 下頜逆時針旋轉維持咬合。", "D": "✓ 可能需頦成形。", "E": "◎ 正解（錯誤）：必須考量骨骼收縮的軟組織效應。"}}, {"id": "3206", "sub": "F", "src": "NG", "years": [110], "stem": "在正顎手術中進行LeFort I osteotomy and down fracture 需要打斷下列哪幾條血管? (複選)", "opts": {"A": "Ascending palatine artery", "B": "Descending palatine artery", "C": "Ascending pharyngeal artery", "D": "Nasopalatine artery", "E": "Lesser palatine artery"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q09", "conflict": "Le Fort I down-fracture 血供考點分歧：CN3197/3201 問「灌流來源」答 lesser palatine；CN3206 問「需打斷血管」答 descending palatine+nasopalatine。兩者不矛盾（打斷主幹、保留側枝），合看才完整。", "key": "⚠ **Le Fort I down-fracture 後上頜血供＝考點分歧區**。教科書強調：切斷 descending palatine artery 後，上頜節段主要靠**軟組織蒂（頰／顎黏膜、翼肌叢周邊的 ascending palatine 與 ascending pharyngeal 側枝）**灌流；原檔答案指向 **lesser palatine / 軟顎側枝**。作答錨定該年答案，概念記『血供來自軟組織蒂，非骨內主幹』。\n本題換個問法：down-fracture 時**需打斷**哪些血管 → **descending palatine（B）與 nasopalatine（D）**。\n注意這與 CN3197/3201『灌流來源＝lesser palatine』並不矛盾：**打斷的是主幹分支，保留灌流的是軟組織側枝**。兩題合看才完整。", "peropt": {"A": "✗ Ascending palatine 為灌流側枝，非打斷對象。", "B": "◎ Descending palatine：down-fracture 時離斷。", "C": "✗ Ascending pharyngeal 為側枝。", "D": "◎ Nasopalatine：離斷鼻中隔黏膜時切斷。", "E": "✗ Lesser palatine 為保留的灌流來源。"}}, {"id": "3208", "sub": "F", "src": "NG", "years": [114], "stem": "關於正顎手術（Orthognathic surgery）之敘述，下列何者正確？", "opts": {"A": "正顎手術僅適用於患有先天性顱顏異常的病患", "B": "使用電腦輔助手術模擬（CASS）可協助提高手術準確性並簡化術前牙模製作", "C": "正顎手術主要使用 Le Fort II、BSSO 與下頷骨切除術進行骨骼重建", "D": "對於中度上頜骨後縮的病人，僅靠牙齒矯正即可達成理想咬合與臉型", "E": "正顎手術的目標為牙齒排列整齊，而非顏面外觀改善"}, "ans": "B", "multi": false, "etype": "ai", "expl": "正顎手術是透過外科方式移動上顎、下顎與下巴，以改善咬合並恢復顏面骨骼的對稱與美觀。其適應症包括但不限於唇顎裂術後的中面發育不全、顱縫早閉症（craniosynostosis）、以及無先天異常的骨骼性咬合不正、顏面比例異常與阻塞型睡眠呼吸中止症（OSA）等。\n\nB. 電腦輔助手術模擬（CASS） 是現代正顎手術中極為重要的進展，能協助術前規劃、牙模製作與術中導引，提高準確性並降低對於傳統牙科技術的依賴。\n\n常用的手術方式包括：Le Fort I 截骨術（用於上顎）、雙側下顎矢狀劈開術（BSSO）、以及 骨性下巴成形術（osseous genioplasty），可進行幾乎所有方向的骨骼移動。\n\n有些患者因為牙齒代償（dental compensation）造成外觀惡化，因此矯正治療無法取代正顎手術。\n\n研究指出，唇顎裂患者中有顯著比例需要正顎手術，例如：雙側唇顎裂 38.1%、單側唇顎裂 30.2%。\n\n(A)錯誤。正顎手術大多數應用於非先天異常的患者。\n\n(B)正確。CASS 可提升手術準確度並降低對傳統牙科技術的依賴。\n\n(C)錯誤。常用為 Le Fort I，而非 Le Fort II，且不包括下頷骨「切除術」。\n\n(D)錯誤。中度至重度的上頜後縮需手術改善，單純牙齒矯正效果有限。\n\n(E)錯誤。正顎手術目標同時為理想咬合與顏面外觀（功能與美學）", "cite": "NG114 · NG114-B08-Q10", "conflict": "", "key": "正顎手術現代觀念（NG114）：**CASS（電腦輔助手術模擬）可提升準確度、簡化術前牙模製作**，為正解。\n其餘皆錯：正顎不限於先天顱顏異常（骨性咬合不正、OSA 皆可）；主流術式是 Le Fort **I**＋BSSO（非 Le Fort II＋下頜切除）；中度上頜後縮單靠牙齒矯正不足；目標含咬合**與**顏面外觀。", "peropt": {"A": "✗ 不限先天顱顏異常。", "B": "◎ 正解：CASS 提升準確度、簡化牙模。", "C": "✗ 主流為 Le Fort I＋BSSO。", "D": "✗ 中度上頜後縮須手術，非單靠矯正。", "E": "✗ 目標含咬合與外觀。"}}];
const LS='crf_all_v2', LS1='crf_all_v1';
const SUBS={"A": "顱顏症候群/畸形", "B": "唇顎裂/唇部重建", "C": "顱縫早閉/顱骨", "D": "顏面骨折", "E": "耳", "F": "正顎/咬合"};
const SUBORDER=Object.keys(SUBS);
const MASTERY=2;                 // 連續答對次數 → 已掌握
const SR=[1,3,7,16,30];          // 答對後到期間隔(天), 依連續答對數
const DAY=864e5;
let S={P:{},star:{},last:null,shuffle:true};
let pool=[], idx=0, sel=new Set(), locked=false, mode='home', curCat=null;
let orderMap={}, addedRetry=new Set();

function load(){
  try{const r=localStorage.getItem(LS);if(r){const o=JSON.parse(r);S.P=o.P||{};S.star=o.star||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}catch(e){}
  // 自 v1(status模型)遷移
  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LS1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]={n:1,s:ok?1:0,m:false,f:ok?1:0,w:!ok,due:Date.now()+(ok?SR[0]:1)*DAY};}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}
}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));flash();}catch(e){const s=document.getElementById('save');if(s)s.textContent='(存檔受限,請匯出)';}}
function flash(){const s=document.getElementById('save');if(!s)return;s.textContent='✓ 已存檔';setTimeout(()=>s.textContent='自動存檔',900);}
const rec=id=>S.P[id];
const seenN=()=>Object.keys(S.P).length;
const masteredN=()=>{let n=0;for(const k in S.P)if(S.P[k].m)n++;return n;};
const firstAcc=()=>{const v=Object.values(S.P);if(!v.length)return null;let f=0;v.forEach(p=>{if(p.f)f++;});return Math.round(f/v.length*100);};
const starIds=()=>Object.keys(S.star).filter(id=>S.star[id]);
const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!S.P[id].m);
const dueIds=()=>{const n=Date.now();return Object.keys(S.P).filter(id=>S.P[id].due&&S.P[id].due<=n);};
const hfList=()=>DATA.filter(isHF);
const conflictList=()=>DATA.filter(q=>q.conflict);

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(p.m)m++;if(p.w&&!p.m)w++;}}
  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function optOrder(q){const base=Object.keys(q.opts).sort();if(!S.shuffle)return base;if(!orderMap[q.id])orderMap[q.id]=shuffle(base.slice());return orderMap[q.id];}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}
  else if(mode==='cat'){pool=DATA.filter(q=>q.sub===curCat);}
  else if(mode==='hf'){pool=hfList();}
  else if(mode==='conflict'){pool=conflictList();}
  else if(mode==='due'){const d=dueIds();const set=new Map(d.map(id=>[id,S.P[id].due]));pool=DATA.filter(q=>set.has(q.id));pool.sort((x,y)=>set.get(x.id)-set.get(y.id));}
  else pool=DATA.slice();
  if(idx>=pool.length)idx=0;if(idx<0)idx=0;
}
function hdr(){
  const seen=seenN(),mast=masteredN(),T=DATA.length;
  tot.textContent=T;sc.textContent=mast;
  const fa=firstAcc();acc.textContent=fa==null?'正確率 —':('首答正確率 '+fa+'%');
  document.getElementById('pseen').style.width=(seen/T*100)+'%';
  document.getElementById('pmast').style.width=(mast/T*100)+'%';
  document.getElementById('lseen').textContent='已作答 '+seen;
  document.getElementById('lmast').textContent='已掌握 '+mast;
  wc.textContent=' ('+wrongActiveIds().length+')';stc.textContent=' ('+starIds().length+')';
  const hs=document.getElementById('hsub');
  if(mode==='cat'&&curCat)hs.textContent='子類 '+curCat+' · '+SUBS[curCat];
  else if(mode==='wrongcat')hs.textContent='錯題 · '+curCat+' '+SUBS[curCat];
  else if(mode==='all')hs.textContent='全部 '+DATA.length+' 題';
  else if(mode==='due')hs.textContent='今日複習佇列';
  else if(mode==='hf')hs.textContent='高頻必刷';
  else if(mode==='conflict')hs.textContent='爭議／分歧題';
  else hs.textContent='192 題 · GS+NG 全年度 · 全題詳解 · Gate1/2/3/4 已驗';
  const tabm=(mode==='wrong'||mode==='wrongcat'||mode==='wronghome')?'wrong':(['home','all','star','data'].includes(mode)?mode:'');
  for(const[id,m]of[['tabHome','home'],['tabAll','all'],['tabWrong','wrong'],['tabStar','star'],['tabData','data']])
    document.getElementById(id).classList.toggle('on',tabm===m);
}
function entry(emoji,title,note,cls,fn){const e=document.createElement('div');e.className='entry'+(cls?' '+cls:'');e.innerHTML='<div class="em">'+emoji+'</div><div><div class="et">'+title+'</div><div class="en">'+note+'</div></div>';e.onclick=fn;return e;}
function renderHome(){
  const app=document.getElementById('app');
  const seen=seenN(),mast=masteredN(),T=DATA.length,fa=firstAcc();
  const due=dueIds().length,hf=hfList().length,cf=conflictList().length,wr=wrongActiveIds().length,st=starIds().length;
  let h='<div class="hmhero"><div class="t">📚 依子類複習 · 共 '+T+' 題</div>'
   +'<div class="d">已作答 <b>'+seen+'</b>／'+T+'　已掌握 <b>'+mast+'</b>　'+(fa==null?'':'首答正確率 '+fa+'%')+'</div>'
   +'<div class="hb"><span class="s" style="width:'+(seen/T*100)+'%"></span><span class="m" style="width:'+(mast/T*100)+'%"></span></div>'
   +'<div class="lb"><i><span class="k" style="background:var(--pale)"></span>已作答</i><i><span class="k" style="background:var(--green)"></span>已掌握(連對'+MASTERY+'次)</i></div></div>';
  app.innerHTML=h;
  const wrapE=document.createElement('div');wrapE.className='entries';
  wrapE.appendChild(entry('▶','全部依序練習',T+' 題','pri wide',()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});}));
  wrapE.appendChild(entry('⏰','今日複習',due?due+' 題到期':'暫無到期','',()=>{if(!due){toast('目前沒有到期複習題。答錯的題隔天、答對的題依 1/3/7/16/30 天回來。');return;}mode='due';idx=0;render();scrollTo({top:0});}));
  wrapE.appendChild(entry('⭐','高頻必刷',hf+' 題（考≥3年）','',()=>{mode='hf';idx=0;render();scrollTo({top:0});}));
  wrapE.appendChild(entry('⚠','爭議／分歧',cf+' 題','',()=>{mode='conflict';idx=0;render();scrollTo({top:0});}));
  wrapE.appendChild(entry('✗','錯題本',wr+' 題待攻克','',()=>{mode='wronghome';render();scrollTo({top:0});}));
  app.appendChild(wrapE);
  const t2=document.createElement('div');t2.className='secttl';t2.textContent='依子類（'+SUBORDER.length+'）';app.appendChild(t2);
  const g=document.createElement('div');g.className='catgrid';
  for(const c of SUBORDER){const s=catStats(c);if(s.t===0)continue;
    const card=document.createElement('div');card.className='catcard';card.dataset.cat=c;
    card.innerHTML='<div class="cn"><span class="cc">'+c+'</span>'+SUBS[c]+'</div>'
      +(s.hf?'<span class="hfp">⭐'+s.hf+'</span>':'')
      +'<div class="cbar"><span class="s" style="width:'+(s.a/s.t*100)+'%"></span><span class="m" style="width:'+(s.m/s.t*100)+'%"></span></div>'
      +'<div class="cm">作答 <b>'+s.a+'/'+s.t+'</b> · 掌握 <b>'+s.m+'</b>'+(s.w?' · <span class="we">錯 '+s.w+'</span>':'')+'</div>';
    card.onclick=()=>{mode='cat';curCat=c;idx=0;render();scrollTo({top:0});};
    g.appendChild(card);}
  app.appendChild(g);
}
function renderWrongHome(){
  const app=document.getElementById('app');
  const wr=wrongActiveIds().length;
  let h=crumbHTML()+'<div class="hmhero"><div class="t">✗ 錯題本 · '+wr+' 題待攻克</div><div class="d">答對後晉級追蹤，連對 '+MASTERY+' 次即移出錯題本。點子類進入該領域錯題。</div></div>';
  app.innerHTML=h;bindCrumb();
  const wrapE=document.createElement('div');wrapE.className='entries';
  wrapE.appendChild(entry('▶','全部錯題依序',wr+' 題','pri wide',()=>{if(!wr){toast('目前沒有錯題。');return;}mode='wrong';idx=0;render();scrollTo({top:0});}));
  app.appendChild(wrapE);
  const t2=document.createElement('div');t2.className='secttl';t2.textContent='錯題 · 依子類';app.appendChild(t2);
  const g=document.createElement('div');g.className='catgrid';let any=false;
  for(const c of SUBORDER){const s=catStats(c);if(s.w===0)continue;any=true;
    const card=document.createElement('div');card.className='catcard';
    card.innerHTML='<div class="cn"><span class="cc">'+c+'</span>'+SUBS[c]+'</div>'
      +'<div class="cbar"><span class="s" style="width:100%;background:var(--wrongbg)"></span><span class="m" style="width:0"></span></div>'
      +'<div class="cm"><span class="we">錯 '+s.w+' 題</span> · 共 '+s.t+'</div>';
    card.onclick=()=>{mode='wrongcat';curCat=c;idx=0;render();scrollTo({top:0});};
    g.appendChild(card);}
  if(!any){g.innerHTML='<div class="dim" style="grid-column:1/3">🎉 目前沒有錯題。</div>';}
  app.appendChild(g);
}
function crumbHTML(){
  const map={cat:curCat?(curCat+' · '+SUBS[curCat]):'',wrongcat:'錯題 · '+(curCat?SUBS[curCat]:''),wrong:'錯題本',wronghome:'錯題本',star:'收藏題',due:'今日複習',hf:'高頻必刷',conflict:'爭議／分歧題'};
  if(mode==='home'||mode==='all'||mode==='data')return '';
  const back=(mode==='wrongcat')?'錯題本':'首頁';
  return '<div class="crumb"><button class="bk" id="bkHome">← '+back+'</button><span class="cur">'+(map[mode]||'')+'</span></div>';
}
function bindCrumb(){const b=document.getElementById('bkHome');if(b)b.onclick=()=>{if(mode==='wrongcat'){mode='wronghome';}else{mode='home';}render();scrollTo({top:0});};}
function render(){
  buildPool();hdr();
  const app=document.getElementById('app'),foot=document.querySelector('.foot');
  if(mode==='home'){renderHome();foot.style.display='none';return;}
  if(mode==='wronghome'){renderWrongHome();foot.style.display='none';return;}
  if(mode==='data'){renderData();foot.style.display='none';return;}
  foot.style.display='block';
  if(['wrong','wrongcat','star','due','hf','conflict','cat'].includes(mode)&&pool.length===0){
    const empt={wrong:'🎉 錯題本清空',wrongcat:'🎉 此子類無錯題',star:'尚無收藏',due:'✅ 今日複習完成',hf:'—',conflict:'—',cat:'此子類尚無題目'};
    app.innerHTML=crumbHTML()+'<div class="card done"><h2>'+(empt[mode]||'完成')+'</h2></div>';
    document.getElementById('act').style.display='none';bindCrumb();return;}
  document.getElementById('act').style.display='block';
  const q=pool[idx],isM=q.multi,p=rec(q.id);
  if(mode==='all'||mode==='cat'){S.last=q.id;try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}}
  const on=S.star[q.id]?'on':'';
  let h=crumbHTML()+'<div class="card"><div class="meta">'
   +'<span class="pill id">'+q.id+'</span>'
   +'<span class="pill src'+q.src+'">'+q.src+'</span>'
   +'<span class="pill sub">'+q.sub+' '+SUBS[q.sub]+'</span>'
   +'<span class="pill yr">歷屆 '+q.years.join('/')+'</span>'
   +'<span class="pill '+(isM?'multi':'single')+'">'+(isM?'複選':'單選')+'</span>'
   +(isHF(q)?'<span class="pill hf">高頻 '+q.years.length+'年</span>':'')
   +(p&&p.m?'<span class="pill mast">✓已掌握</span>':(p&&p.w?'<span class="pill flag">錯題</span>':''))
   +(q.conflict?'<span class="pill flag">⚠答案/版本分歧</span>':'')
   +'<button class="starbtn '+on+'" id="star" title="收藏">'+(on?'★':'☆')+'</button>'
   +'</div><div class="stem">'+esc(q.stem)+'</div>';
  for(const L of optOrder(q))
    h+='<div class="opt" data-l="'+L+'"><div class="lt">'+L+'</div><div class="tx">'+esc(q.opts[L])+'</div></div>';
  h+='<div class="mini" style="text-align:left;margin-top:4px">第 '+(idx+1)+' / '+pool.length+' 題（本清單）'+(S.shuffle?' · 選項已洗牌':'')+'</div></div>';
  app.innerHTML=h;bindCrumb();
  app.querySelectorAll('.opt').forEach(o=>o.onclick=()=>peck(o));
  document.getElementById('star').onclick=()=>{S.star[q.id]=!S.star[q.id];if(!S.star[q.id])delete S.star[q.id];save();render();};
  const act=document.getElementById('act');
  act.textContent=isM?'送出答案（可複選）':'送出答案';act.disabled=false;act.className='btn';
  locked=false;sel.clear();
}
function peck(o){if(locked)return;const L=o.dataset.l,q=pool[idx];
  if(q.multi){sel.has(L)?(sel.delete(L),o.classList.remove('sel')):(sel.add(L),o.classList.add('sel'));}
  else{sel.clear();document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));sel.add(L);o.classList.add('sel');}}
function grade(){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  let p=S.P[q.id]||{n:0,s:0,m:false,f:null,w:false,due:0};
  if(p.n===0)p.f=ok?1:0;
  p.n++;
  if(ok){p.s++;p.m=p.s>=MASTERY;p.due=Date.now()+SR[Math.min(p.s,SR.length-1)]*DAY;}
  else{p.s=0;p.m=false;p.w=true;p.due=Date.now()+1*DAY;}
  S.P[q.id]=p;save();
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'　正解：'+q.ans.split('').join('、')+(ok&&p.m?'　★已掌握':ok?('　連對 '+p.s+'/'+MASTERY):'');card.appendChild(v);
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  // #10 稍後再問我
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項顯示順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">熟練度門檻</div><div class="dim">連續答對 '+MASTERY+' 次即「已掌握」，移出錯題本／複習佇列</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ '+id+'</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>作答/熟練度＋收藏＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=o.P||{};S.star=o.star||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、熟練度與收藏。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LS1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(p.m?'mast':(p.w?'wrong':(p.s>0?'ok':''))):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():grade();};
document.getElementById('pick').onclick=openPick;
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
