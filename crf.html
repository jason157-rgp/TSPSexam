"sub":"B","src":"NG","years":[114],"stem":"Posterior pharyngeal flap 為correction of velopharyngeal dysfunction最古老的手術方之一，其常見的complications不包括?","opts":{"A":"Bleeding","B":"Dehiscence","C":"Nasal airway obstruction","D":"Obstructive sleep apnea","E":"Hoarseness"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"與 CN3086 為同一題的**反向問法**（『不包括』）。併發症：出血、裂開、鼻氣道阻塞、OSA。**hoarseness 不是**。同一組事實、兩種問法、答案字母完全不同——正是不能背字母的理由。","peropt":{"A":"✓ 出血（屬併發症）。","B":"✓ 裂開。","C":"✓ 鼻氣道阻塞。","D":"✓ OSA。","E":"◎ 正解（不包括）：聲音沙啞。"},"cite":"NG114 · NG114-B08-Q05","conflict":""},{"id":"3183","sub":"B","src":"NG","years":[114],"stem":"To prevent scar formation and muscle relapse caused by the \"dead space\" following intravelar veloplasty (IVVP), which of the following tissue types is commonly used in recent years to fill this space?","opts":{"A":"Free skin graft","B":"Buccal mucosal flap","C":"Adenoid transposition","D":"Vascularized buccal fat pad","E":"Tongue flap transfer"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 顎帆內成形術（intravelar veloplasty, IVVP）後，硬顎後緣易形成「死腔（dead space）」，纖維化與疤痕收縮會使顎帆提肌（levator veli palatini, LVP）再度移位（muscle relapse）而影響長期語音。近年Buchman等提倡以帶血管之頰脂墊瓣（vascularized buccal fat pad）填補此死腔，減少纖維化拉扯、維持LVP位置與軟顎閉合功能。⚠ 易混淆：游離皮膚移植、腺樣體轉位、舌瓣皆非此死腔之首選填補材料。","peropt":{"A":"✗ 游離皮膚移植無血供且不適合填補該死腔。","B":"✗ 頰黏膜瓣非近年填補IVVP死腔之標準做法。","C":"✗ 腺樣體轉位用途不同，非填補死腔。","D":"✓(正解) 帶血管頰脂墊瓣填補死腔，減少纖維化與LVP再移位。","E":"✗ 舌瓣移轉非填補IVVP死腔之常用選擇。"},"cite":"原檔詳解","conflict":""},{"id":"3184","sub":"B","src":"NG","years":[114],"stem":"關於單側唇裂的重建，下列何者正確描述其手術原則與變形特徵？","opts":{"A":"唇裂側的鼻翼基部通常外移，導致鼻翼塌陷","B":"切割設計大多依照醫師即時判斷與經驗，較少依照標記點操作","C":"皮膚切口應盡量避開自然解剖接縫線以減少疤痕明顯度","D":"單側唇裂變形中，非唇裂側的鼻翼基部與鼻柱會偏離中線","E":"唇裂修補的黏膜、紅唇與白唇（cutaneuous roll）應視為同一解剖單位進行修補"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Mulliken 的視覺錯覺：單側唇裂看起來像**裂側**鼻翼基部外移，實際上**偏離中線的是非裂側的鼻翼基部與鼻柱**；裂側鼻翼基部只是**後退（retruded）**，內外向位置大致正常。此點與前鼻棘偏移程度相關。","peropt":{"A":"✗ 這正是 Mulliken 所指的錯覺。","B":"✗ 現代唇裂修補高度依賴解剖標記點。","C":"✗ 切口應**順著**自然解剖接縫線（如人中脊、鼻翼溝）。","D":"◎ 正解：非裂側鼻翼基部與鼻柱偏離中線。","E":"✗ 黏膜、唇紅、白唇為**不同**解剖單位，須分別對位。"},"cite":"NG114 · NG114-B08-Q07","conflict":""},{"id":"3185","sub":"B","src":"NG","years":[114],"stem":"關於單側唇裂合併鼻整形手術後的併發症分類，下列何者為正確的描述？","opts":{"A":"急性併發症多發生於術後數週至數月之間，例如瘢痕增生與針眼肉芽腫","B":"鼻塞導致的呼吸道阻塞屬於晚期併發症","C":"鼻托(nasal stent)使用的相關併發症包括感染與壓力性壞死，通常屬於早期併發症","D":"中臉發育不全多於手術初期即出現，與疤痕無關","E":"唇裂術後的Cupid’s bow（人中弓）不平衡僅為短期現象，不需手術處理"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"唇裂鼻整形併發症的**時間軸**：\n**急性（術後數日）**＝呼吸道阻塞、血腫、麻醉問題、傷口裂開\n**早期（數週至數月）**＝感染、針眼肉芽腫、瘢痕增生、**鼻托相關的壓力性壞死**\n**晚期**＝中臉發育不全、Cupid's bow 不對稱（皆與疤痕攣縮及生長有關，需二次手術）","peropt":{"A":"✗ 瘢痕增生與針眼肉芽腫屬**早期**，非急性。","B":"✗ 呼吸道阻塞屬**急性**。","C":"◎ 正解：鼻托的感染與壓力性壞死屬早期併發症。","D":"✗ 中臉發育不全屬晚期，且與疤痕相關。","E":"✗ Cupid's bow 不對稱常需手術矯正，非短期現象。"},"cite":"NG114 · NG114-B08-Q08","conflict":""},{"id":"3186","sub":"B","src":"NG","years":[114],"stem":"關於單側唇裂與鼻整形的初次修復手術，下列何者敘述正確？","opts":{"A":"初次唇裂手術應避免矯正鼻翼與鼻孔緣位置，以避免過度修正","B":"Mohler-Cutting 技術僅適用於嚴重寬裂的病患","C":"NAM（Nasoalveolar molding）為術後修復使用的矯形方法","D":"初次鼻整形可採取輕微過度矯正，以提高對稱性維持效果","E":"初次手術中應避免修補鼻底，以避免干擾日後骨移植手術"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"初次唇裂鼻整形的三條原則：**可以且應該同時矯正鼻部**；鼻翼基部與鼻孔緣採**輕度過度矯正**（對抗術後生長與張力造成的回縮）；**鼻底應一併修補**。NAM 是**術前**矯形，不是術後。","peropt":{"A":"✗ 初次手術即應矯正鼻翼與鼻孔緣，primary rhinoplasty 已證實安全。","B":"✗ Mohler-Cutting 適用範圍廣，非僅限寬裂。","C":"✗ NAM 為**術前**（presurgical）矯形。","D":"◎ 正解：輕度過度矯正以維持長期對稱。","E":"✗ 鼻底應修補，不會妨礙日後植骨。"},"cite":"NG114 · NG114-B08-Q09","conflict":""},{"id":"3187","sub":"F","src":"NG","years":[114],"stem":"關於正顎手術（Orthognathic surgery）之敘述，下列何者正確？","opts":{"A":"正顎手術僅適用於患有先天性顱顏異常的病患","B":"使用電腦輔助手術模擬（CASS）可協助提高手術準確性並簡化術前牙模製作","C":"正顎手術主要使用 Le Fort II、BSSO 與下頷骨切除術進行骨骼重建","D":"對於中度上頜骨後縮的病人，僅靠牙齒矯正即可達成理想咬合與臉型","E":"正顎手術的目標為牙齒排列整齊，而非顏面外觀改善"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"正顎手術現代觀念（NG114）：**CASS（電腦輔助手術模擬）可提升準確度、簡化術前牙模製作**，為正解。\n其餘皆錯：正顎不限於先天顱顏異常（骨性咬合不正、OSA 皆可）；主流術式是 Le Fort **I**＋BSSO（非 Le Fort II＋下頜切除）；中度上頜後縮單靠牙齒矯正不足；目標含咬合**與**顏面外觀。","peropt":{"A":"✗ 不限先天顱顏異常。","B":"◎ 正解：CASS 提升準確度、簡化牙模。","C":"✗ 主流為 Le Fort I＋BSSO。","D":"✗ 中度上頜後縮須手術，非單靠矯正。","E":"✗ 目標含咬合與外觀。"},"cite":"NG114 · NG114-B08-Q10","conflict":""},{"id":"3188","sub":"B","src":"NG","years":[114],"stem":"下列關於單側唇裂及鼻部畸形之敘述，哪些是正確的?(複選)","opts":{"A":"唇裂側的紅唇（vermilion）在中線處逐漸變寬。","B":"完好的那一側，口輪匝肌纖維可能異位附著於前鼻棘、前鼻中隔及內側鼻腳基部。","C":"唇裂會導致鼻中隔及鼻柱向患側偏移。","D":"唇裂側的口輪匝肌會異常附著於梨狀孔的骨膜。","E":"諾德霍夫點（Noordhoff’s point）位於唇裂內側，是紅唇高度最大的地方。"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"單側唇裂的肌肉異常止點是核心考點：**裂側**口輪匝肌止於**梨狀孔骨膜**；**非裂側（完好側）**止於**前鼻棘、鼻中隔前緣、內側腳基部**。鼻中隔與鼻柱偏向**非裂側**（不是患側）。","peropt":{"A":"✗ 內側唇紅是越靠近裂緣越**變窄**，非變寬。","B":"◎ 完好側肌纖維異位附著於前鼻棘、鼻中隔前、內側腳基部。","C":"✗ 鼻中隔與鼻柱偏向**非裂側**。","D":"◎ 裂側肌肉異常附著於梨狀孔骨膜。","E":"✗ Noordhoff's point 位於**外側**唇瓣上唇紅最厚處，非內側。"},"cite":"NG114 · NG114-B08-Q12","conflict":""},{"id":"3189","sub":"B","src":"NG","years":[114],"stem":"Which of the following are established operative principles for synchronous nasolabial repair in bilateral cleft lip? (複選)","opts":{"A":"Primarily focus on creating prominent philtral columns and dimple.","B":"Ensure maintenance of postoperative symmetry.","C":"Secure primary muscular continuity.","D":"Position/secure lower lateral cartilages and sculpt nasal tip and columella.","E":"Design appropriate philtral size and shape."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"雙側唇裂同步鼻唇修補的四原則：**對稱、肌肉連續、人中瓣尺寸形狀得當、復位下外側軟骨並雕塑鼻尖鼻柱**。刻意去做出明顯的人中柱與人中窩**不是**原則——那是隨生長自然形成的。","peropt":{"A":"✗ 塑造明顯人中柱與人中窩並非主要原則。","B":"◎ 維持術後對稱。","C":"◎ 確保一期肌肉連續性。","D":"◎ 定位固定下外側軟骨、雕塑鼻尖與鼻柱。","E":"◎ 設計適當的人中瓣大小與形狀。"},"cite":"NG114 · NG114-B08-Q13","conflict":""},{"id":"3191","sub":"E","src":"NG","years":[115],"stem":"Which of the following statements regarding innervation of the ear is correct?","opts":{"A":"The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.","B":"The posterior half of the ear is innervated by the great auricular and lesser occipital nerves.","C":"The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.","D":"The auditory branch of the vagus nerve is referred to as Arnold's nerve.","E":"All the above is correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n⚠ 與 CN3186 為**極性翻轉家族**（問『correct』，答 E）。本版 B 已寫回 **lesser** occipital（正確），故四項全對 → E。\n**同一組事實、正反兩問、B 選項一字之差（greater↔lesser）決定成敗**——記神經名稱，別記答案字母。","peropt":{"A":"◎ 前半＝auriculotemporal（V3）。","B":"◎ 後半＝great auricular＋lesser occipital（本版正確）。","C":"◎ 迷走耳支供應耳甲與外耳道。","D":"◎ Arnold's nerve。","E":"◎ 正解：以上皆是。"},"cite":"NG115 · NG115-B07-Q05","conflict":""},{"id":"3192","sub":"A","src":"NG","years":[115],"stem":"A disruption in the generation, migration, or differentiation of neural crest cells underlies the classification of malformations known as neurocristopathies. Which of the following syndromes or diseases are recognized as neurocristopathies? (複選)","opts":{"A":"Holoprosencephaly","B":"Treacher Collins syndrome","C":"Cleidocranial dysplasia","D":"Saethre-Chotzen syndrome","E":"22q11.2 deletion syndrome"},"ans":"BE","multi":true,"etype":"ai","expl":"","key":"Neurocristopathy＝神經嵴細胞的生成／遷移／分化障礙。**TCS（TCOF1，神經嵴細胞增生不足）與 22q11.2 缺失（TBX1，影響心臟神經嵴）**屬之。Holoprosencephaly 是前腦分裂缺陷（SHH）、cleidocranial dysplasia 是成骨細胞缺陷（RUNX2），皆非神經嵴病。","peropt":{"A":"✗ 前腦分裂異常（SHH 路徑）。","B":"◎ TCOF1 → 神經嵴細胞不足。","C":"✗ RUNX2 → 成骨細胞分化缺陷。","D":"✗ TWIST1 → 顱縫早閉症候群。","E":"◎ TBX1 → 心臟神經嵴遷移異常。"},"cite":"NG115 · NG115-B08-Q01","conflict":""},{"id":"3193","sub":"A","src":"NG","years":[115],"stem":"Which of the following statements regarding the development and derivatives of the pharyngeal arches is true?","opts":{"A":"The face is predominantly derived from the first pharyngeal arch.","B":"The third pharyngeal arch serves as a bracing element to support the developing upper and lower jaws.","C":"The first pharyngeal arch initially appears on day 24 of embryonic development.","D":"The fourth and sixth pharyngeal arches together give rise to the root of the tongue and the epiglottis."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"第一鰓弓是**顏面的主體來源**。三個常見破綻：第一弓約在第 **22** 天出現（非 24）；支撐上下頜的是第一弓本身（非第三弓）；舌根與會厭來自第三、四弓，而第四、六弓形成**喉部軟骨**。","peropt":{"A":"◎ 正解：顏面主要來自第一鰓弓。","B":"✗ 支撐上下頜者為第一弓。","C":"✗ 第一弓約於胚胎第 22 天出現。","D":"✗ 舌根與會厭來自第三、四弓；第四、六弓 → 喉軟骨。"},"cite":"NG115 · NG115-B08-Q02","conflict":""},{"id":"3194","sub":"B","src":"NG","years":[115],"stem":"Regarding the goals of lip reconstruction and anatomic considerations, which of the following statements are TRUE? (複選)","opts":{"A":"The contour and color of the white roll surrounding the vermilion are created by the pars peripheralis fibers of the risorius muscle.","B":"The lower lip contains three symmetric tubercles and is primarily defined by the presence of the philtrum and Cupid's bow.","C":"The primary objective of lip reconstruction is the restoration of a functional oral sphincter with adequate oral aperture to enable proper feeding and speech.","D":"The vermilion is a well-vascularized structure that lacks minor salivary glands and represents the transition from external keratinized to internal non-keratinized squamous epithelium.","E":"Motor innervation to the orbicularis oris and surrounding muscles of facial expression is controlled by the buccal and marginal mandibular branches of the facial nerve."},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"唇部解剖三個易錯點：**white roll 由口輪匝肌的 pars marginalis 纖維形成**（非 risorius）；**人中與 Cupid's bow 屬上唇**；唇部運動神經來自顏面神經的 **buccal 與 marginal mandibular** 分支。重建首要目標是**功能性口輪匝肌環**與足夠的口裂大小。","peropt":{"A":"✗ 應為口輪匝肌 pars marginalis，非 risorius。","B":"✗ 人中與 Cupid's bow 是**上**唇特徵。","C":"◎ 首要目標：功能性口括約肌與足夠口裂。","D":"◎ 唇紅血供豐富、無小唾液腺，為角化與非角化鱗狀上皮的過渡帶。","E":"◎ 運動神經來自 buccal 與 marginal mandibular 分支。"},"cite":"NG115 · NG115-B08-Q03","conflict":""},{"id":"3195","sub":"B","src":"NG","years":[115],"stem":"Which of the following statements regarding upper lip reconstruction is TRUE?","opts":{"A":"Defects involving up to 50% of the upper lip can typically be closed primarily without causing distortion to critical structures such as Cupid's bow.","B":"When performing a primary repair of the upper lip, a horizontal repair is preferred to minimize distortion of natural landmarks and maintain the normal beard hairline in males.","C":"Composite grafts from the ear concha may be useful for reconstructing isolated defects of the philtrum to restore its slightly indented appearance without distorting the philtral columns.","D":"The full-thickness Abbe flap used for upper lip reconstruction should be designed to be the exact same width as the defect to ensure a tension-free closure."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 上唇重建（upper lip reconstruction）：來自耳甲（ear concha）之複合移植（composite graft）可用於重建人中（philtrum）之孤立缺損，回復其略凹陷外觀而不扭曲人中脊（philtral columns），為本題正確敘述。⚠ 易混淆：上唇因有人中、邱比特弓（Cupid's bow）等美學標誌，可直接縫合之比例較下唇小（約僅25%，非50%）；上唇初級修補宜採「垂直（vertical）」縫合以順應美學單位、維持鬍鬚線，而非水平；Abbe瓣寬度應約為缺損之一半，而非與缺損等寬。","peropt":{"A":"✗ 上唇可直接縫合之比例遠小於50%（約25%），且易扭曲邱比特弓，錯誤。","B":"✗ 上唇初級修補宜採垂直而非水平縫合，錯誤。","C":"✓(正解) 耳甲複合移植可重建人中孤立缺損、回復凹陷外觀而不扭曲人中脊。","D":"✗ Abbe瓣寬度應約為缺損之一半，非與缺損等寬，錯誤。"},"cite":"待複查（NG 上唇重建 記憶佐證）","conflict":""},{"id":"3196","sub":"B","src":"NG","years":[115],"stem":"Which of the following statements regarding lower lip reconstruction is TRUE?","opts":{"A":"Abbe flaps transferred from the upper lip to the lower lip are routinely performed for large lower lip defects because the upper lip is an optimal donor site.","B":"Due to the lack of a third subunit, the lower lip can easily tolerate primary closure for defects involving up to one-half (50%) of its total width.","C":"If a lower lip excision or defect abuts the mental crease, a W-plasty may be performed at the inferior base to allow for improved contour and better camouflage of the scar.","D":"The Bernard-Burow cheiloplasty utilizes vertically based advancement flaps and requires the complete division of all surrounding muscle to close central lower lip defects."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"下唇重建：缺損 **<30%** 可直接縫合（不是 50%）；缺損抵達 **mental crease** 時，於下方基部加做 **W-plasty** 改善輪廓、隱藏疤痕。Bernard-Burow 用**水平**推進瓣且**保留肌肉**。Abbe 通常自下唇取瓣修上唇（反向非常規）。","peropt":{"A":"✗ Abbe 常規方向是下唇 → 上唇。","B":"✗ 下唇直接縫合上限約 30%，非 50%。","C":"◎ 正解：緊鄰頦唇溝時以 W-plasty 修飾。","D":"✗ Bernard-Burow 為水平推進，不需完全切斷周圍肌肉。"},"cite":"NG115 · NG115-B08-Q05","conflict":""},{"id":"3197","sub":"B","src":"NG","years":[115],"stem":"Regarding the various modalities of Pre-surgical Infant Orthopedics (PSIO) used in the treatment of unilateral cleft lip, which of the following statements are correct? (複選)","opts":{"A":"The Latham device is classified as a passive form of PSIO that utilizes a patient-specific acrylic intraoral denture and nasal conforming stents.","B":"Lip taping is a passive method that applies a constant controlled restraining force to the alveolar segments, which can reduce the alveolar gap by 53%.","C":"Lip adhesion is a partial surgical repair performed at 1 to 2 months of age that effectively converts a complete cleft lip into an incomplete cleft lip.","D":"Nasoalveolar molding (NAM) is an active PSIO modality that improves nasal base asymmetry, though overly aggressive application can overstretch the ala and produce a \"mega-nostril.\"","E":"A primary advantage of the Latham device is its shorter duration of treatment (4-6 weeks) relative to other modalities like lip taping and NAM (3-6 months)."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"PSIO 分**被動 vs 主動**：\n**被動**＝lip taping（可縮小齒槽裂隙 53%）\n**主動**＝**Latham（釘固螺旋驅動，療程僅 4–6 週）**、**NAM（壓克力咬合板＋鼻撐，療程 3–6 月）**\nLip adhesion 是 1–2 個月大的**部分手術**，把完全唇裂轉成不完全唇裂。\nNAM 過度施力會把鼻翼撐過頭 → **mega-nostril**。","peropt":{"A":"✗ Latham 是**主動**式；壓克力咬合板＋鼻撐的描述其實是 NAM。","B":"◎ Lip taping 為被動、持續控制力，可縮小裂隙 53%。","C":"◎ Lip adhesion：1–2 個月大，完全裂 → 不完全裂。","D":"◎ NAM 為主動式，過度施力致 mega-nostril。","E":"◎ Latham 療程 4–6 週，短於 lip taping／NAM 的 3–6 個月。"},"cite":"NG115 · NG115-B08-Q06","conflict":""},{"id":"3198","sub":"B","src":"NG","years":[115],"stem":"Regarding the clinical characteristics of bilateral cleft lip, which of the following statements is TRUE?","opts":{"A":"Bilateral asymmetric cleft lip is the most common anatomic form, accounting for 75% of all bilateral cleft lip cases.","B":"Infants presenting with bilateral cleft lip and palate are more likely to be syndromic, with common disorders including van der Woude, CHARGE, and ectodermal dysplasias.","C":"A megaform cleft lip is anatomically defined as extending 5 cm above the normal Cupid's bow peak.","D":"At birth, 80% of neonates with a cleft lip and/or palate have associated anomalies such as cardiac or neurological defects."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"雙側唇顎裂**症候群性（syndromic）比例明顯較高**，常見 van der Woude、CHARGE、外胚層發育不良。這是雙側裂與單側裂最重要的臨床差異——看到雙側，先想症候群與遺傳諮詢。","peropt":{"A":"✗ 最常見為雙側**對稱**完全裂，且無 75% 之說。","B":"◎ 正解：雙側唇顎裂較可能為症候群性。","C":"✗ 5 cm 為荒謬數值（輕型唇裂以 mm 計）。","D":"✗ 合併異常遠低於 80%。"},"cite":"NG115 · NG115-B08-Q07","conflict":""},{"id":"3199","sub":"B","src":"NG","years":[115],"stem":"According to the Veau classification system, which of the following accurately defines a Veau II cleft?","opts":{"A":"A complete cleft of the secondary palate involving the soft and hard palate extending to the incisive foramen.","B":"A cleft that involves the soft palate only.","C":"A unilateral complete cleft of the primary and secondary palate, where the vomer is attached to the maxilla on the non-cleft side.","D":"A complete bilateral cleft of the primary and secondary palate."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"**Veau 分類**（背熟四級）：\n**I** ＝僅軟顎\n**II** ＝次級顎完全裂（軟顎＋硬顎，前達切齒孔）\n**III** ＝單側完全裂（原發＋次級顎），犁骨附著於非裂側上頜\n**IV** ＝雙側完全裂（原發＋次級顎）\n分界線永遠是**切齒孔**（原發顎／次級顎的分水嶺）。","peropt":{"A":"◎ 正解：Veau II＝次級顎完全裂至切齒孔。","B":"✗ 僅軟顎＝Veau I。","C":"✗ 單側完全裂＝Veau III。","D":"✗ 雙側完全裂＝Veau IV。"},"cite":"NG115 · NG115-B08-Q08","conflict":""},{"id":"3200","sub":"B","src":"NG","years":[115],"stem":"According to the overall treatment plan for a Veau III cleft utilizing the Anatomic Cleft Restoration Philosophy (ACRP), how and when is the alveolar defect primarily managed?","opts":{"A":"It is surgically closed during the partial cleft lip and nose repair at 3-4 months of age to utilize tissue expansion.","B":"It is closed simultaneously with the palatoplasty at 12-14 months of age to complete the primary reconstruction.","C":"It is intentionally left open during primary surgeries and is addressed via alveolar bone grafting during the time of mixed dentition (6-12 years of age).","D":"It is structurally fused and closed during the routine orthodontics phase at 9-10 years of age."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"ACRP 對 Veau III 的齒槽缺損策略：**一期手術刻意保留不關**，留待**混合齒列期（6–12 歲）以齒槽骨移植處理**。過早關閉齒槽會限制上頜生長。此與 CN3081／CN3082 的時程完全一致。","peropt":{"A":"✗ 3–4 個月的部分唇鼻修補不處理齒槽。","B":"✗ 不與顎裂修補同時關閉。","C":"◎ 正解：一期留開，混合齒列期植骨。","D":"✗ 齒槽不會在矯正牙科階段自行融合。"},"cite":"NG115 · NG115-B08-Q09","conflict":""},{"id":"3201","sub":"B","src":"NG","years":[115],"stem":"Which of the following statements regarding the anatomy and characteristics of the buccal fat pad is true?","opts":{"A":"The temporal extension is the largest lobule of the buccal fat pad, occupying 30%-40% of its total weight.","B":"The volume of the buccal fat pad significantly decreases as a person ages throughout their life.","C":"The mean volume of the buccal fat pad in females is approximately 10.2 mL, which is larger than that in males.","D":"The buccal extension is separated from the central body of the buccal fat pad by the parotid duct."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題考頰脂墊（buccal fat pad, BFP）解剖與特性（選對）。核心正確者為 D：頰延伸（buccal extension）與中央本體（central body）之間以腮腺導管（parotid/Stensen's duct）分隔。⚠ 其餘皆錯：BFP 最大葉為 buccal extension（本體/頰延伸）而非 temporal extension；BFP 體積相對穩定、對體重與年齡變化具抗性，並非隨年齡『顯著』持續減少；且平均體積男性略大於或近似女性，並無『女性約 10.2 mL 且大於男性』之說。記住 BFP 由中央本體加四個延伸（buccal、pterygoid、pterygopalatine、temporal），臨床上是頰部與顎部（如 IVVP 死腔填補）重建的重要帶蒂脂肪來源。","peropt":{"A":"✗ 錯誤。BFP 最大葉為 buccal extension/本體，而非 temporal extension；比例敘述亦不符。","B":"✗ 錯誤。BFP 體積相對穩定、對年齡與體重變化具抗性，並非隨一生顯著持續減少。","C":"✗ 錯誤。並無『女性平均約 10.2 mL 且大於男性』之數據，男性一般略大或近似。","D":"✓（正解）正確。Buccal extension 與中央本體之間由 parotid（Stensen's）duct 分隔。"},"cite":"待複查（NG 頰脂墊解剖 記憶佐證）","conflict":""},{"id":"3202","sub":"B","src":"NG","years":[115],"stem":"Which of the following conditions are considered appropriate indications for utilizing the buccal fat pad (BFP) flap for reconstruction? (複選)","opts":{"A":"Closure of an oronasal fistula","B":"Repair of a cleft palate defect during primary palatoplasty","C":"Bolstering palate closure to prevent fistula formation","D":"Reconstruction of a large full-thickness skin defect on the cheek","E":"Providing structural support for dental implant placement in the mandible"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"**Buccal fat pad（頰脂墊）瓣**的適應症全在**口內**：關閉口鼻瘻管、一期顎裂修補、加強顎部縫合以預防瘻管。它**體積有限、無皮膚**，不能修補頰部全層皮膚缺損，也不作為下顎植牙的結構支撐。","peropt":{"A":"◎ 關閉口鼻瘻管。","B":"◎ 一期顎裂修補時使用。","C":"◎ 加強顎部縫合、預防瘻管。","D":"✗ 無法修補大面積全層皮膚缺損。","E":"✗ 不提供植牙的結構支撐。"},"cite":"NG115 · NG115-B08-Q11","conflict":""},{"id":"3203","sub":"B","src":"NG","years":[115],"stem":"Regarding the management, classification, and surgical options for oronasal fistulas (ONF), which of the following statements are true? (複選)","opts":{"A":"The Pittsburgh Fistula Classification System categorizes fistulas based on anatomical location, with seven distinct subtypes.","B":"Tension at the site of repair, resulting from either cleft width or deficiency of local tissues, is considered by most to be the main factor contributing to fistula formation.","C":"For larger fistulas (>3 mm), local turnover flaps alone are typically insufficient, and radical remobilization of palatal flaps or additional tissue transfer is often required for a robust two-layer repair.","D":"The buccal fat pad (BFP) flap is generally considered more suitable for posterior or middle-third palatal fistulas and is less ideal for anterior fistulas due to its limited length and potential for compromised vascularity.","E":"The facial artery musculomucosal (FAMM) flap is a random-pattern flap that is best utilized for small fistulas (<2 mm) because it is too short to be harvested for larger or recurrent defects."},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"口鼻瘻管（ONF）四要點：**Pittsburgh 分類共 7 型**（依解剖位置）；**張力是最主要成因**（裂隙寬度或局部組織不足）；**>3 mm** 的瘻管需徹底重新游離顎瓣或額外組織轉移做雙層修補；**BFP 適合中後段顎部**，前段因長度與血供受限而不理想。\n**FAMM 瓣是 axial（顏面動脈）血流型**，可用於較大或復發性缺損——選項 E 說它是 random pattern 且只能修 <2 mm，兩處皆錯。","peropt":{"A":"◎ Pittsburgh 分類 7 型。","B":"◎ 張力為主因。","C":"◎ >3 mm 需雙層修補與組織轉移。","D":"◎ BFP 適中後段，前段不理想。","E":"✗ FAMM 為 axial pattern，適用較大／復發性缺損。"},"cite":"NG115 · NG115-B08-Q12","conflict":""},{"id":"3204","sub":"B","src":"NG","years":[115],"stem":"According to the provided text, which of the following is considered by most to be the main etiologic factor contributing to the formation of an oronasal fistula (ONF)?","opts":{"A":"Colonization by Staphylococcus aureus and Streptococcus pyogenes at the surgical site.","B":"Tension at the site of repair resulting from either cleft width or deficiency of local tissues.","C":"A failure to administer a routine postoperative course of systemic prophylactic antibiotics.","D":"External predictors such as the presence of Treacher Collins syndrome or the surgeon's level of experience."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 CN3109 選項 B 同一考點，單獨成題：**口鼻瘻管的主要成因是修補處的張力**（源自裂隙寬度或局部組織不足），不是細菌定殖、不是抗生素、也不是術者經驗。","peropt":{"A":"✗ 細菌定殖非主因。","B":"◎ 正解：修補處張力。","C":"✗ 預防性抗生素非決定因素。","D":"✗ 外在預測因子（症候群、術者經驗）皆非主因。"},"cite":"NG115 · NG115-B08-Q13","conflict":""},{"id":"3205","sub":"B","src":"NG","years":[115],"stem":"Which of the following statements regarding the management and surgical treatment of velopharyngeal dysfunction (VPD) is correct?","opts":{"A":"Velopharyngeal mislearning is caused by structural abnormalities and must be treated with surgical intervention.","B":"The posterior pharyngeal flap is optimally suited for patients who present with poor lateral pharyngeal wall motion.","C":"The Furlow double-opposing Z-palatoplasty is highly successful in achieving velopharyngeal competence even when the gap size exceeds 10 mm.","D":"In a sphincter pharyngoplasty, the flap inset should be positioned high on the posterior pharyngeal wall at the site of attempted velopharyngeal closure."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"VPD 術式與**咽側壁動作**的配對（本域最高頻決策）：\n**側壁動作差 → sphincter pharyngoplasty**（瓣須置於後咽壁**高處**、即嘗試閉合的水平）\n**側壁動作好、矢狀縫隙 → posterior pharyngeal flap**\n**縫隙小、肌肉矢狀走向 → Furlow**（>10 mm 無效）\n**Mislearning 屬學習性，靠語言治療，不開刀。**","peropt":{"A":"✗ Mislearning 非結構性，不需手術。","B":"✗ 側壁動作差者不宜 pharyngeal flap（需側壁代償）。","C":"✗ 縫隙 >10 mm 時 Furlow 成功率低。","D":"◎ 正解：sphincter 的瓣應置於後咽壁高處。"},"cite":"NG115 · NG115-B08-Q14","conflict":""},{"id":"3206","sub":"B","src":"NG","years":[115],"stem":"Regarding the timing of cleft nasal surgery, when is an \"intermediate rhinoplasty\" usually performed?","opts":{"A":"At the time of the initial cleft lip repair.","B":"Before school, typically between 4 and 6 years old.","C":"Prior to the eruption of the canine teeth, between 9 and 11 years old.","D":"After facial growth has completed, around 14 to 18 years old."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"唇裂鼻整形的三個時機：**primary**（初次唇修補時）→ **intermediate（入學前，4–6 歲）**→ **definitive（生長結束後，14–18 歲）**。9–11 歲那個時間點是**齒槽骨移植**（尖牙萌發前），別跟鼻整形混淆。","peropt":{"A":"✗ 此為 primary rhinoplasty。","B":"◎ 正解：入學前 4–6 歲。","C":"✗ 9–11 歲、尖牙萌發前 → 齒槽骨移植。","D":"✗ 14–18 歲 → definitive rhinoplasty。"},"cite":"NG115 · NG115-B08-Q15","conflict":""},{"id":"3207","sub":"D","src":"NG","years":[115],"stem":"關於兒童顏面骨折（pediatric facial fractures）之流行病學與骨折型態，下列何者最正確？","opts":{"A":"Le Fort fracture 在 5 歲以下兒童最常見，主要因 frontal sinus 尚未發育完成","B":"兒童 mandibular fracture 最常見部位為 mandibular angle，且其發生率隨年齡下降","C":"Orbital fracture 是整體兒童顏面骨折中最常見的骨折型態，而 condylar/subcondylar fracture 為最常見 mandibular fracture","D":"Midface fracture 在兒童十分常見，主因為 midface 缺乏 forehead 與 mandible 保護","E":"兒童 facial fracture 合併 intracranial injury 的機率低，因此 routine neurologic evaluation 並不重要"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"小兒顏面骨折流行病學（新版定論）：**眶骨為整體最常見的顏面骨折**；**髁突／髁突下為最常見的下頜骨折**（隨年齡增加才轉向 body／angle）。Le Fort 型見於 >10 歲；幼兒中臉受額與下頜保護、少見中臉骨折；顏面骨折常合併顱內損傷，神經學評估重要。","peropt":{"A":"✗ Le Fort 多見於 >10 歲；幼兒多為斜向顱顏骨折。","B":"✗ 最常見下頜骨折為**髁突**，且發生率非隨年齡下降。","C":"◎ 正解：眶骨最常見；髁突／髁突下為最常見下頜骨折。","D":"✗ 幼兒中臉骨折少見（受額與下頜保護）。","E":"✗ 常合併顱內損傷，神經學評估重要。"},"cite":"NG115 · NG115-B09-Q01","conflict":""},{"id":"3208","sub":"A","src":"NG","years":[115],"stem":"下列有關 orbital hypertelorism 矯正手術中 orbital shift 與 facial bipartition 的敘述，何者最正確？","opts":{"A":"若病人有正常的 maxillary arch 與 occlusion，通常仍優先選擇 bipartition，以增加上顎寬度。","B":"Bipartition 的 osteotomy 會經過 zygomatic arch、pterygomaxillary junction 與 palate，可同時改善 maxillary arch 與 nasal airway。","C":"Bipartition 適用於 orbit axis 正常、但僅有輕度 hypertelorism 的患者。","D":"Orbital shift 手術必須經過 pterygomaxillary disjunction，否則無法有效內移 orbit。","E":"Tessier 最初提出的 orbital shift technique 中，osteotomy 線位於 infraorbital rim 之上。"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Bipartition 的截骨線經過 **zygomatic arch → pterygomaxillary junction → palate**，因此能同時擴張上頜弓與鼻氣道。反過來說：**咬合與上頜弓正常時，就該避開 pterygomaxillary disjunction，改選 orbital shift**。","peropt":{"A":"✗ 上頜弓與咬合正常時應優先 orbital shift，避免不必要的 pterygomaxillary disjunction。","B":"◎ 正解：截骨路徑涵蓋顴弓、翼上頜接合與顎部。","C":"✗ 眶軸正常＋輕度眼距過寬 → orbital shift 即可。","D":"✗ Orbital shift 不需 pterygomaxillary disjunction，這正是它與 bipartition 的分界。","E":"✗ Tessier 原始 orbital shift 的截骨線位於眶下緣**之下**。"},"cite":"NG115 · NG115-B09-Q02","conflict":""},{"id":"3209","sub":"A","src":"NG","years":[115],"stem":"下列有關 Tessier craniofacial clefts 的敘述，何者錯誤？","opts":{"A":"Tessier number 7 cleft 為最外側的 craniofacial cleft，常與 hemifacial microsomia 有關。","B":"Tessier number ":{"A":"✗ 低血壓麻醉與正常血壓麻醉的輸血需求無顯著差異。","B":"✗ EPO 無法完全消除輸血需求。","C":"✗ TXA 未顯著增加癲癇或血栓事件。","D":"◎ 正解：全血輸注的優勢。","E":"✗ 須併同 Hb 與血流動力學判斷。"},"cite":"NG115 · NG115-B09-Q05","conflict":""},{"id":"3212","sub":"C","src":"NG","years":[115],"stem":"關於 syndromic craniosynostosis 於出生後前 2 年內 cephalocranial disproportion 的處理原則，下列何者最正確？","opts":{"A":"Cranial vault expansion 一旦成功降低顱內壓，通常可永久解決 intracranial hypertension，不需再次介入。","B":"Utria 等人認為 cranial vault remodeling 應盡可能於出生後 3 個月內完成，以降低再手術率。","C":"嚴重 syndromic craniosynostosis 患者若出生時即有 cephalocranial disproportion，可能需於出生後數天至數週內開始分期治療。","D":"第二年出現再度失衡時，首選治療為 frontofacial procedure，因其復發率最低。","E":"「Surfing the bone pressure wave」意指延後所有手術至 2 歲後一次完成重建。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"症候群性顱縫早閉的顱內高壓**復發率高**，早期手術只是暫時恢復平衡——這就是「**surfing the bone pressure wave**」的意思：**分期、順著顱內壓的波峰逐次介入**，而非拖到 2 歲一次做完。Utria 認為最佳時機約 **6–9 個月**。","peropt":{"A":"✗ 顱內高壓復發率高，常需再次介入。","B":"✗ Utria 主張約 6–9 個月，過早手術再手術率反升。","C":"◎ 正解：出生即有嚴重失衡者，可能需於數天至數週內開始分期治療。","D":"✗ 第二年再失衡時，frontofacial procedure 並非首選（復發率不低）。","E":"✗ 「Surfing the bone pressure wave」指分期順勢介入，非延後一次做完。"},"cite":"NG115 · NG115-B09-Q06","conflict":""},{"id":"3213","sub":"A","src":"NG","years":[115],"stem":"關於 craniofacial microsomia（CFM）病人下顎重建（mandibular reconstruction）之治療選擇，下列何者最正確？","opts":{"A":"Pruzansky type I mandibular deformity 因顳顎關節功能不佳，通常需於幼兒期進行 costochondral rib graft 重建。","B":"Pruzansky type IIA mandibular deformity 因 glenoid fossa 缺失，必須接受 TMJ 重建。","C":"Pruzansky type IIB mandibular deformity 的治療仍具爭議，可採 distraction osteogenesis、costochondral rib graft 或兩者合併。","D":"Pruzansky type III mandibular deformity 可單純以 orthodontic treatment 達到功能性重建。","E":"所有 Pruzansky type I–III mandibular deformities 均以 orthognathic surgery 為首選治療。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 顱顏短小症（craniofacial microsomia, CFM）之下顎重建依Pruzansky-Kaban分型決定：Type I（下顎小但TMJ結構功能正常）以矯正/骨骼成熟後正顎為主；Type IIA（髁突、升支、關節窩皆存但形態異常）主要需下顎延長而非TMJ重建；Type IIB（升支與髁突移位、關節窩缺如）治療仍具爭議，可採牽引成骨（MDO）、肋軟骨移植（costochondral rib   try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}
}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));flash();}catch(e){const s=document.getElementById('save');if(s)s.textContent='(存檔受限,請匯出)';}}
function flash(){const s=document.getElementById('save');if(!s)return;s.textContent='✓ 已存檔';setTimeout(()=>s.textContent='自動存檔',900);}
const rec=id=>S.P[id];
const mastered=p=>!!p&&p.S>=MASTERED_S&&!p.w;
const seenN=()=>Object.keys(S.P).length;
const masteredN=()=>{let n=0;for(const k in S.P)if(mastered(S.P[k]))n++;return n;};
const firstAcc=()=>{const v=Object.values(S.P).filter(p=>p.f!==null&&p.f!==undefined);if(!v.length)return null;let f=0;v.forEach(p=>{if(p.f)f++;});return Math.round(f/v.length*100);};
const postAcc=()=>{let c=0,n=0;for(const k in S.P){c+=S.P[k].postC||0;n+=S.P[k].postN||0;}return n?Math.round(c/n*100):null;};
const starIds=()=>Object.keys(S.star).filter(id=>S.star[id]);
const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!mastered(S.P[id]));
const dueIds=()=>{const n=Date.now();return Object.keys(S.P).filter(id=>S.P[id].due&&S.P[id].due<=n);};
const hfList=()=>DATA.filter(isHF);
const conflictList=()=>DATA.filter(q=>q.conflict);
// 錯題四型：盲區(有把握卻錯)>死穴(屢錯≥3)>新錯(近3天)>易忘(其餘/低穩定)
function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}
const TYPES=['盲區','死穴','新錯','易忘'];
const TYPEDESC={'盲區':'有把握卻答錯（最該優先）','死穴':'反覆遺忘（≥3次）','新錯':'近三天內答錯','易忘':'記憶穩定度偏低'};
function wrongTypeCounts(){const c={盲區:0,死穴:0,新錯:0,易忘:0};wrongActiveIds().forEach(id=>{const t=wrongType(S.P[id]);if(t)c[t]++;});return c;}

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(mastered(p))m++;if(p.w&&!mastered(p))w++;}}
  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function optOrder(q){const base=Object.keys(q.opts).sort();if(!S.shuffle)return base;if(!orderMap[q.id])orderMap[q.id]=shuffle(base.slice());return orderMap[q.id];}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='wrongtype'){const w=new Set(wrongActiveIds().filter(id=>wrongType(S.P[id])===curType));pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}
  else if(mode==='cat'){pool=DATA.filter(q=>q.sub===curCat);}
  else if(mode==='hf'){pool=hfList();}
  else if(mode==='conflict'){pool=conflictList();}
  else if(mode==='due'){const d=dueIds();const set=new Map(d.map(id=>[id,S.P[id].due]));pool=DATA.filter(q=>set.has(q.id));pool.sort((x,y)=>set.get(x.id)-set.get(y.id));}
  else pool=DATA.slice();
  if(idx>=pool.length)idx=0;if(idx<0)idx=0;
}

function ensureSkip(){let sk=document.getElementById('skip');if(!sk){const fin=document.querySelector('.foot .in');const pk=document.getElementById('pick');sk=document.createElement('button');sk.id='skip';sk.className='icon';sk.textContent='跳過 ⏭';sk.title='不評分，直接下一題';sk.onclick=()=>{if(!locked)next();};fin.insertBefore(sk,pk);}return sk;}
function peck(o){if(locked)return;const L=o.dataset.l,q=pool[idx];

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,wrongtype:'錯題 '+curType,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();hideConfidence();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
