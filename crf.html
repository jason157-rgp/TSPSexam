<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRF 顱顏 · 整外考題庫</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}
</style></head><body>
<div class="wrap">
<header>
 <div class="htop">

 </div>

 <div class="legend">

  <i><span style="color:var(--star)">★</span> 收藏</i>
 </div>
</div></div>
<script>
const DATA=[{"id": "3001", "sub": "A", "src": "GS", "years": [110], "stem": "初診斷一個craniofacial microsomia的新病人，建議使用下面那些工具?", "opts": {"A": "Echocardiogram", "B": "Renal ultrasound", "C": "Cervical spin X-rays", "D": "A+B+C", "E": "Skeletal survey"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B05-Q04", "conflict": "", "key": "CFM 初診斷的三項系統性篩檢：心臟超音波、腎臟超音波、頸椎 X 光。因為 CFM 是第一、二鰓弓發育障礙，常合併心臟、腎臟、脊椎異常。", "peropt": {"A": "✓ 心臟異常常見（VSD、法洛四重症），須 echo。", "B": "✓ 腎臟發育異常常見，須腎超音波。", "C": "✓ 頸椎異常（融合、不穩定）會影響插管與麻醉安全。", "D": "◎ 正解：A+B+C 三者皆為初診建議。", "E": "✗ Skeletal survey 非例行項目，僅在懷疑其他骨骼症候群時安排。"}}, {"id": "3002", "sub": "A", "src": "GS", "years": [110], "stem": "Tessier Classification是針對Craniofacial clefts的分類，以下何種最常見?", "opts": {"A": "No. 2", "B": "No. 4", "C": "No. 8", "D": "No. 16", "E": "No. 7"}, "ans": "E", "multi": false, "etype": "ai", "expl": "考生建議：此問題兩本課本內容認定有異, NELIGAN第四版寫3 第3版寫7, G&B寫7", "cite": "GS110 · GS110-B06-Q02", "conflict": "", "key": "⚠ 教科書分歧題：Grabb & Smith 寫 No.7 最常見；Neligan 4e 寫 No.3。本年官方答案為 E（No.7）。作答錨定該年答案，概念上記住「No.7 與 No.3 兩者皆為常見顱顏裂」。", "peropt": {"A": "No.2 少見。", "B": "No.4 為 oro-ocular cleft，非最常見。", "C": "No.8 常見於 Treacher Collins 的側裂組合，非單獨最常見。", "D": "No.16 不存在於常用敘述（Tessier 0–14 加顱側對應）。", "E": "◎ 本年答案：No.7（lateral facial cleft，經口角向耳屏延伸）。"}}, {"id": "3003", "sub": "A", "src": "GS", "years": [110, 114, 115], "stem": "下列何種syndrome是用來描述半邊臉發育不全Idiopathic progressive hemifacial atrophy (PHA)？", "opts": {"A": "Apert syndrome", "B": "Down's syndrome", "C": "Compartment syndrome", "D": "Klippel-Trenaunay syndrome", "E": "Parry–Romberg syndrome"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B06-Q03", "conflict": "", "key": "Idiopathic progressive hemifacial atrophy（PHA）＝ Parry–Romberg syndrome：單側顏面軟組織與骨骼進行性萎縮，青春期後多自行停滯（burn out）。", "peropt": {"A": "Apert＝顱縫早閉＋對稱性併指。", "B": "Down's＝21 三體。", "C": "Compartment syndrome＝腔室症候群，與顏面無關（此為純誘答）。", "D": "Klippel–Trenaunay＝微血管／靜脈／淋巴畸形＋肢體肥大。", "E": "◎ 正解：Parry–Romberg。"}}, {"id": "3004", "sub": "A", "src": "GS", "years": [111], "stem": "Which of the following statement about dermoid is not true?", "opts": {"A": "Dermoid cysts can occur anywhere along sites of embryologic fusion, but in head", "B": "Intracranial extension does not occur with lateral brow dermoid cysts.", "C": "Intracranial extension can occur with midline nasal dermoid cysts.", "D": ". Dermoid cysts can contain hair in addition to dermis, epidermis, and sebaceous glands.", "E": "Dermoid cysts in the periorbital region may be adherent to the periosteum and cause bony indentations."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B05-Q02", "conflict": "", "key": "Dermoid cyst 沿胚胎融合線發生。關鍵鑑別：中線鼻部 dermoid 有顱內延伸風險 → 術前必須影像；外側眉部 dermoid 風險低，但『不會發生』是過度絕對的說法。", "peropt": {"A": "✓ 沿胚胎融合線任何處皆可發生，頭頸部最常見於眉外側。", "B": "◎ 正解（不正確）：外側眉部 dermoid 顱內延伸雖罕見，但並非絕不發生。絕對化敘述即為破綻。", "C": "✓ 中線鼻部 dermoid 可經 foramen cecum 延伸入顱。", "D": "✓ 內含毛髮、真皮、表皮與皮脂腺。", "E": "✓ 眶周 dermoid 可黏連骨膜並造成骨性凹痕。"}}, {"id": "3005", "sub": "A", "src": "GS", "years": [111, 112, 113], "stem": "Which of the following about the treatment of Parry-Romberg syndrome are not true? (複選)", "opts": {"A": "The fat grafting for the Romberg patients is not advised because the take in the diseased Romberg region is less than the take in normal regions for cosmetic procedures.", "B": "The classic coup de sabre sign means there is deeper, bony involvement and osseous correction will also be needed.", "C": "Because Romberg disease burns out in puberty, observation is recommended, as most cases improve over time without treatment.", "D": "For adults with severe soft tissue deficiencies, the parascapular free flap is recommended over the anterolateral thigh free flap because of the better adipose-fascial fill and sculpting.", "E": "Dermal fat grafts have fallen out of favor because of the high infection rate"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "Current treatment options to fill deficient tissues include fat or dermal grafts, dermal fillers (hyaluronic acid or calcium hydroxyapatite), bone and/or cartilage grafts, and/or free tissue transplantation. For skeletally mature patients with severe deformity, dermal fat grafts or adipofascial free flaps (such as a parascapular or inframammary extended circumflex scapular [IMECS] flaps) are accepted alternatives.", "cite": "GS111 · GS111-B06-Q05", "conflict": "", "key": "Parry–Romberg 治療的唯一正確敘述是 D。此題四個錯誤選項各自埋一個陷阱：否定脂肪移植、誤解 coup de sabre、主張純觀察、誤稱 dermal fat graft 已淘汰。", "peropt": {"A": "✗ 脂肪移植仍是主力；病灶區 take 較差不構成禁忌。", "B": "✗ coup de sabre 是額部線狀硬皮病的皮膚溝痕，並不等同深層骨侵犯的證據。", "C": "✗ 疾病雖在青春期後停滯，但已喪失的組織不會自行回復，仍需重建。", "D": "◎ 正解：成人嚴重軟組織缺損時，parascapular free flap 的脂肪筋膜填充與雕塑性優於 ALT。", "E": "✗ Dermal fat graft 仍在使用，並非因高感染率而淘汰。"}}, {"id": "3006", "sub": "A", "src": "GS", "years": [111], "stem": "Which type of Tessier craniofacial cleft is shown in the figure?", "opts": {"A": "No. 1 cleft", "B": "No. 3 cleft", "C": "No. 5 cleft", "D": "No. 7 cleft", "E": "No. 9 cleft"}, "ans": "B", "multi": false, "etype": "ai", "expl": "The no. 3 cleft is a common Tessier cleft and is often referred to as a Tessier oro-naso-ocular cleft", "cite": "GS111 · GS111-B06-Q07", "conflict": "", "key": "Tessier No.3＝oro-naso-ocular cleft，行經唇、鼻翼基部、內眥／淚器，是最具代表性的斜裂。", "peropt": {"A": "No.1 經鼻穹窿旁。", "B": "◎ 正解：No.3，口—鼻—眼裂。", "C": "No.5 少見，經上唇外側至下眼瞼中段。", "D": "No.7 為橫向口角裂（lateral facial cleft）。", "E": "No.9 為眶上外側裂。"}}, {"id": "3007", "sub": "A", "src": "GS", "years": [113], "stem": "有關dermoid 何者正確? (複選)", "opts": {"A": "Intracranial extension will never occur with lateral brow dermoid cysts.", "B": "Dermoid cysts can occur anywhere along sites of embryologic fusion.", "C": "Intracranial extension can occur with midline nasal dermoid cysts.", "D": "Dermoid cysts can contain hair in addition to dermis, epidermis, and sebaceous glands.", "E": "Dermoid cysts in the periorbital region may be adherent to the periosteum and cause bony indentations."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B05-Q05", "conflict": "", "key": "與 CN3004 為同一概念的正向版本。記住：中線鼻部 dermoid 可入顱；外側眉部『罕見但非不可能』。凡出現 never／always 的絕對敘述，先懷疑。", "peropt": {"A": "✗ 『never』過度絕對，故為錯誤敘述。", "B": "◎ 沿胚胎融合線任何處。", "C": "◎ 中線鼻部可顱內延伸。", "D": "◎ 可含毛髮。", "E": "◎ 可黏連骨膜致骨性凹痕。"}}, {"id": "3008", "sub": "A", "src": "GS", "years": [115], "stem": "A first-year plastic surgery resident is reviewing craniofacial development with her mentor. She is asked about derivatives of the first pharyngeal arch. Which of the following structures is derived from the first pharyngeal arch? (複選)", "opts": {"A": "Maxillary process", "B": "Mandibular process", "C": "Meckel's cartilage", "D": "Reichert's cartilage"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B04-Q02", "conflict": "", "key": "第一鰓弓衍生物：上頜突、下頜突、Meckel's cartilage（→ 錘骨、砧骨）、咀嚼肌、三叉神經。Reichert's cartilage 屬第二鰓弓（→ 鐙骨、莖突、舌骨小角）。", "peropt": {"A": "◎ 上頜突。", "B": "◎ 下頜突。", "C": "◎ Meckel's cartilage。", "D": "✗ Reichert's cartilage 為第二鰓弓。"}}, {"id": "3009", "sub": "A", "src": "NG", "years": [104], "stem": "What kinds of characters can be noted in Velocardiofacial syndrome? (複選)", "opts": {"A": "11q chromosomal deletion", "B": "bird-like facial appearance", "C": "soft palate dysfunction", "D": "developmental delay", "E": "various cardiac conditions"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B07-Q08", "conflict": "", "key": "Velocardiofacial（Shprintzen）syndrome＝22q11.2 缺失，非 11q。三大核心：顎咽功能不全、心臟畸形、特殊面容（鳥面、鼻樑寬高）。", "peropt": {"A": "✗ 應為 22q11.2 缺失，不是 11q。", "B": "◎ 鳥樣面容（長臉、鼻根寬、下頜後縮）。", "C": "◎ 軟顎功能異常／顎咽閉鎖不全，常有黏膜下裂顎。", "D": "◎ 發展遲緩、學習障礙。", "E": "◎ 圓錐動脈幹型心臟缺損。"}}, {"id": "3010", "sub": "A", "src": "NG", "years": [105], "stem": "Which of the following statements concerning fibrous dysplasia is/are correct? (複選)", "opts": {"A": "Polyostotic fibrous dysplasia is much more common than monostotic one", "B": "skull involvement occurs in 27% of polyostotic patients", "C": "In the craniofacial region, fibrous dysplasia most frequently involves the maxilla", "D": "In the mandible, the condylar area is the most frequently affected.", "E": "Multiple brownish skin pigmentations and precocious sexual development, hyperthyroidism, or hyperparathyroidism, indicate McCune–Albright syndrome."}, "ans": "CE", "multi": true, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B07-Q09", "conflict": "", "key": "Fibrous dysplasia：單骨型遠多於多骨型。顱顏區以上頜骨最常受累；下頜骨以體部／角部為主而非髁突。McCune–Albright＝多骨型＋咖啡牛奶斑＋內分泌病變。", "peropt": {"A": "✗ 反了，monostotic 遠比 polyostotic 常見。", "B": "✗ 多骨型的顱骨侵犯比例遠高於 27%（約半數）。", "C": "◎ 顱顏區以 maxilla 最常受累。", "D": "✗ 下頜以 body/angle 為主，髁突區少見。", "E": "◎ 色素斑＋性早熟／甲狀腺或副甲狀腺功能亢進 → McCune–Albright。"}}, {"id": "3011", "sub": "A", "src": "NG", "years": [105], "stem": "About the derivatives of the pharyngeal arches, which of the followings is correct?", "opts": {"A": "1st arch: incus, malleus, mastication muscles, trigeminal nerve, mandibular artery", "B": "2nd arch: stapes, greater horn of hyoid bone, facial expression muscles, facial nerve, stapedial artery", "C": "3rd arch: lesser horn of hyoid bone, muscles of the stylopharyngeus, glossopharyngeal nerve, common and internal carotid artery", "D": "4th and 6th arches: cartilage of the larynx, muscles of pharynx constriction, phonation, palatoglossus, and upper esophagus, vagus nerve, arch of aorta", "E": "All the above are incorrect"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B08-Q05", "conflict": "", "key": "鰓弓四件套（軟骨／肌肉／神經／動脈）務必成組記。破綻常藏在『動脈』與『舌骨大小角』。", "peropt": {"A": "✗ 第一弓動脈為 maxillary artery，非 mandibular artery。", "B": "✗ 第二弓貢獻舌骨『小角』（lesser horn），非大角。", "C": "✗ 第三弓貢獻舌骨『大角』（greater horn），此處寫反。", "D": "◎ 正解：第四、六弓 → 喉軟骨、咽縮肌／發聲肌、迷走神經、主動脈弓。", "E": "✗ D 正確，故此項不成立。"}}, {"id": "3012", "sub": "A", "src": "NG", "years": [105], "stem": "Which of the following statement concerning Treacher Colins syndrome is NOT correct？", "opts": {"A": "Airway management is the primary concern when treating infants born with Treacher–Collins syndrome", "B": "An autosomal-dominant disorder in 1 per 50 000 live births", "C": "60% of cases arise as sporadic mutations", "D": "The abnormal development of the third and fourth branchial arches", "E": "The syndrome is most successfully treated in staged procedures addressing bone and soft tissues"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B09-Q01", "conflict": "", "key": "Treacher Collins＝第一、二鰓弓發育障礙（TCOF1，體染色體顯性）。凡看到『third and fourth branchial arches』即為錯誤敘述。新生兒首要處理是呼吸道。", "peropt": {"A": "✓ 呼吸道為首要考量。", "B": "✓ 體染色體顯性，約 1/50,000 活產。", "C": "✓ 約 60% 為偶發突變。", "D": "◎ 正解（不正確）：應為第一、二鰓弓，非第三、四。", "E": "✓ 分期處理骨與軟組織。"}}, {"id": "3013", "sub": "A", "src": "NG", "years": [105], "stem": "Sher et al described four types of airway obstruction of Pierre Robin sequence. Which of the following statement is NOT correct？", "opts": {"A": "Type 1 is described as \"true glossoptosis,\" and consists of a tongue that contacts the posterior pharynx at a level below the soft palate.", "B": "Type 2 consists of a tongue that is displaced posteriorly as in type 1 but at the level of or above the soft palate, such that the palate becomes sandwiched between the tongue and posterior pharyngeal wall in the upper oropharynx.", "C": "Type 3 consists of an obstruction caused by a medial collapse of the lateral pharyngeal walls.", "D": "Type 4 consists of the pharynx collapsing or constricting as a sphincter.", "E": "All of the above statements are correct."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B09-Q02", "conflict": "", "key": "Sher 將 Pierre Robin 的呼吸道阻塞分四型。第 1 型才是『true glossoptosis』；第 3、4 型為咽側壁塌陷與括約肌式收縮，此時單做舌／下頜前移無效。", "peropt": {"A": "✓ Type 1：舌根後移，於軟顎『下方』接觸咽後壁。", "B": "✓ Type 2：接觸點在軟顎高度或以上，軟顎被夾在舌與咽後壁之間。", "C": "✓ Type 3：咽側壁向內塌陷。", "D": "✓ Type 4：咽部呈括約肌式環形收縮。", "E": "◎ 正解：以上皆正確。"}}, {"id": "3014", "sub": "A", "src": "NG", "years": [105], "stem": "The following description which one is incorrect about the orbital hypertelorism?", "opts": {"A": "Hypertelorism is not a disease in itself; it is just a symptom which may belong to various conditions.", "B": "Surgical treatment of hypertelorism can be undertaken before age 4.", "C": "The technique of correction depends upon the degree of interorbital distance and on the occlusion.", "D": "If the occlusion is normal, the osteotomy is a box-shift type; if the occlusion is angulated, a facial bipartition osteotomy and medialization of the two hemifaces are performed.", "E": "Rhinoplasty is best performed at the end of growth."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B09-Q05", "conflict": "", "key": "Hypertelorism 是『症狀』不是疾病。手術時機一般待 5–7 歲以後（顱骨與齒列發育、眶容積穩定），4 歲前手術過早。術式選擇取決於眶間距與『咬合』。", "peropt": {"A": "✓ 只是徵象，可見於多種顱顏疾病。", "B": "◎ 正解（不正確）：不建議 4 歲前手術。", "C": "✓ 取決於眶間距與咬合狀況。", "D": "✓ 咬合正常 → box-shift；咬合傾斜 → facial bipartition 併兩側半臉內移。", "E": "✓ 鼻整形留待生長結束後。"}}, {"id": "3015", "sub": "A", "src": "NG", "years": [105], "stem": "Craniofacial microsomia associated extracranial malformations, including (複選)?", "opts": {"A": "Cardiac anomalies", "B": "Vertebral/rib defects", "C": "Cervical spine anomalies", "D": "Scoliosis", "E": "Genitourinary defects"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B09-Q10", "conflict": "", "key": "CFM 的顱外異常是全身性的：心臟、脊椎肋骨、頸椎、脊柱側彎、泌尿生殖。這正是 CN3001 要求 echo／腎超音波／頸椎 X 光的理由。", "peropt": {"A": "◎ 心臟異常。", "B": "◎ 脊椎／肋骨缺損。", "C": "◎ 頸椎異常。", "D": "◎ 脊柱側彎。", "E": "◎ 泌尿生殖道缺損。"}}, {"id": "3017", "sub": "A", "src": "NG", "years": [106], "stem": "Which of the following statements about fibrous dysplasia is incorrect?", "opts": {"A": "The lesions usually present at around 10 years of age and then progress throughout adolescence.", "B": "There is no gender predilection, except in McCune-Albright syndrome which is more commonly found in females.", "C": "Polyostotic fibrous dysplasia is much more common than its monostotic counterpart.", "D": "The most frequently involved sites are the ribs, long bones, pelvis, jaws, and skull.", "E": "Radiation therapy is not recommended in the disease"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B05-Q05", "conflict": "", "key": "與 CN3010、CN3020 同一考點反覆出現：**單骨型遠多於多骨型**。這是 fibrous dysplasia 最愛考的一句。", "peropt": {"A": "✓ 約 10 歲前後出現，青春期進展。", "B": "✓ 無性別偏好；McCune–Albright 以女性為主。", "C": "◎ 正解（不正確）：monostotic 遠比 polyostotic 常見。", "D": "✓ 好發肋骨、長骨、骨盆、顎骨、顱骨。", "E": "✗ 不建議放射治療（有惡性轉化風險），此敘述正確故非答案。"}}, {"id": "3018", "sub": "A", "src": "NG", "years": [106], "stem": "有關molecular causes of facial clefting, 現在的研究發現與inadequate growth of the facial prominences有密切關係的是:", "opts": {"A": "TGF-β2", "B": "TGF-β3", "C": "Wnt signaling", "D": "FOXE 1 (Forkhead box protein E1)", "E": "IRF gene (interferon regulatory factor)"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG106 · NG106-B06-Q05", "conflict": "", "key": "顏面裂的分子機轉：Wnt signaling 與 facial prominences 生長不足關係最密切。TGF-β3 主管顎突融合（palatal shelf fusion），是另一條常考路徑，勿混。", "peropt": {"A": "TGF-β2 非主要。", "B": "TGF-β3 → 顎突『融合』失敗，非生長不足。", "C": "◎ 正解：Wnt signaling → 顏面突生長不足。", "D": "FOXE1 與裂顎關聯但非生長機轉。", "E": "IRF6 → Van der Woude syndrome。"}}, {"id": "3020", "sub": "A", "src": "NG", "years": [107], "stem": "以下有關Fibrous dysplasia 的描述何者錯誤?", "opts": {"A": "Fibrous dysplasia是正常骨頭被fibro-osseous tissue取代造成的", "B": "與McCune–Albright syndrome有關的病人以女性為主.", "C": "多處骨頭比單一骨頭侵犯較多", "D": "電腦斷層檢查是很好的檢查工具", "E": "手術切除必須考量到功能及外觀的影響"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B07-Q07", "conflict": "", "key": "Fibrous dysplasia 第三度出現同一破綻：多骨型並不比單骨型常見。三年三考，務必記死。", "peropt": {"A": "✓ 正常骨被纖維骨性組織取代。", "B": "✓ McCune–Albright 以女性為主。", "C": "◎ 正解（錯誤）：單骨型才是多數。", "D": "✓ CT 為良好評估工具（毛玻璃樣變化）。", "E": "✓ 手術須權衡功能與外觀。"}}, {"id": "3021", "sub": "A", "src": "NG", "years": [107, 112, 114], "stem": "胚胎時期，1st pharyngeal arch 發育成以下構造，何者除外？", "opts": {"A": "mandible and maxilla", "B": "Muscles of mastication", "C": "Trigeminal nerve", "D": "Maxillary artery", "E": "Muscles of facial expression"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B08-Q01", "conflict": "", "key": "第一鰓弓：上下頜、咀嚼肌、三叉神經（V）、maxillary artery。**表情肌屬第二鰓弓（顏面神經 VII）**。神經配對是最快的辨識法：咀嚼＝V，表情＝VII。", "peropt": {"A": "✓ 上下頜由上頜突、下頜突形成。", "B": "✓ 咀嚼肌。", "C": "✓ 三叉神經。", "D": "✓ Maxillary artery（注意不是 mandibular artery）。", "E": "◎ 正解（除外）：表情肌來自第二鰓弓，由顏面神經支配。"}}, {"id": "3022", "sub": "A", "src": "NG", "years": [107], "stem": "Which of the followings is incorrect?", "opts": {"A": "Pierre Robin described the triad of macrognathia, glossoptosis, and respiratory distress.", "B": "In Pierre Robin syndrome patient, closure of the palate narrows the effective area for respiration and can lead to respiratory distress.", "C": "Submucous cleft palate occurs when the palate has mucosal continuity but the underlying levator palatini muscle is longitudinally oriented.", "D": "Corrective surgical technique for submucous cleft palate is focused on anatomic correction of the velar muscle diastasis.", "E": "The Furlow double opposing Z-plasty is an ideal procedure for submucosal cleft palate patients."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B08-Q05", "conflict": "", "key": "Pierre Robin 三徵是 **micrognathia**（小頜）、glossoptosis、呼吸窘迫。題目寫 macrognathia（大頜）——一個字母之差，方向完全相反。", "peropt": {"A": "◎ 正解（不正確）：應為 micrognathia，非 macrognathia。", "B": "✓ 關閉顎裂會縮小有效呼吸面積，可能加重呼吸窘迫。", "C": "✓ 黏膜下裂顎：黏膜連續，但 levator veli palatini 呈縱向走行（異常止於硬顎後緣）。", "D": "✓ 手術核心是矯正軟顎肌肉的分離（velar muscle diastasis）。", "E": "✓ Furlow 雙反向 Z 成形術可重建肌肉吊帶，適合黏膜下裂顎。"}}, {"id": "3023", "sub": "A", "src": "NG", "years": [107], "stem": "The most lateral craniofacial cleft in Tessier classification?", "opts": {"A": "Number 1", "B": "Number 14", "C": "Number 5", "D": "Number 6", "E": "Number 7"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B09-Q01", "conflict": "", "key": "Tessier 顏面裂編號 0–14，**No.7 為最外側**（lateral facial cleft，自口角向耳屏延伸，即 macrostomia）。", "peropt": {"A": "No.1 靠近中線。", "B": "No.14 為顱裂端的中線裂（與 No.0 對應）。", "C": "No.5 位置中間。", "D": "No.6 為 Treacher Collins 組合之一。", "E": "◎ 正解：No.7 最外側。"}}, {"id": "3024", "sub": "A", "src": "NG", "years": [107], "stem": "Which is not a characteristic cininical features of Treacher-Collins syndrome?", "opts": {"A": "Antimongoloid obliquity of palpebral fissures", "B": "Superior migration of superolateral portion of frontal bone", "C": "Narrow and underprojected maxilla", "D": "Hypoplastic mandible", "E": "Flattened frontonasal angle"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B09-Q02", "conflict": "", "key": "Treacher Collins 的骨性特徵是**額骨顴突後縮／下移**、顴骨與下頜發育不全。B 說「superolateral 額骨向上移位」方向相反。", "peropt": {"A": "✓ 眼裂外下斜（antimongoloid slant）——與 Down's 的外上斜相反。", "B": "◎ 正解（非特徵）：額骨外上部並非向上移位。", "C": "✓ 上頜狹窄、前突不足。", "D": "✓ 下頜發育不全。", "E": "✓ 額鼻角變平。"}}, {"id": "3025", "sub": "A", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. Which syndomes are always combined with hypertelorism and syndactylies? (複選)", "opts": {"A": "Crouzon's syndrome", "B": "Craniofrontaonasal dysplasia", "C": "Pfeiffer's syndrome", "D": "Down's syndrome", "E": "Apert's syndrome"}, "ans": "CE", "multi": true, "etype": "ai", "expl": "[考生建議：B應該也對 建議答案改BCE]", "cite": "NG107 · NG107-B09-Q08", "conflict": "", "key": "「顱縫早閉＋併指」＝ **Apert 與 Pfeiffer**。Crouzon 有顱縫早閉但**無併指**，這是最經典的鑑別點。\n⚠ 本題有考生建議：Craniofrontonasal dysplasia（B）亦具眼距過寬與併指，主張答案應為 BCE。以原年度官方答案 CE 為準。", "peropt": {"A": "✗ Crouzon：顱縫早閉、眼球突出，但手足正常。", "B": "⚠ Craniofrontonasal dysplasia 有眼距過寬與併指——考生主張應納入。", "C": "◎ Pfeiffer：寬拇指／拇趾、部分併指。", "D": "✗ Down's 無此組合。", "E": "◎ Apert：對稱性複雜併指（mitten hand）。"}}, {"id": "3026", "sub": "A", "src": "NG", "years": [107], "stem": "複選3. Which descriptions about Pierre Robin sequence (PRS) are wrong? (複選)", "opts": {"A": "PRS describes a syndrome combined with glossoptosis, retrognathia, airway compromise, and possibly clefting of the secondary palate.", "B": "The spectrum of symptoms is vast and and efficient multidisciplinary workup is necessary.", "C": "Nutritional support is paramount if this patient population is to thrive. Depending on the patient, and feeding tubes may be utilized.", "D": "This cranialfacial patient must be followed chronically by only craniofacial specialties.", "E": "The workup of PRS patients should begin with craniofacial deformities."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "cite": "NG107 · NG107-B09-Q10", "conflict": "", "key": "PRS 是 **sequence 不是 syndrome**（一個初始缺陷引發連鎖後果）。處置順序永遠是**呼吸道 → 餵食 → 顱顏**，且必須多科團隊而非單一科追蹤。", "peropt": {"A": "◎ 錯誤：PRS 為 sequence，非 syndrome。", "B": "✓ 表現光譜廣，需高效率多科評估。", "C": "✓ 營養支持至關重要，必要時用餵食管。", "D": "◎ 錯誤：不能只由顱顏科追蹤，須多科（耳鼻喉、小兒、遺傳、營養）。", "E": "◎ 錯誤：workup 應從呼吸道與餵食問題開始，而非顱顏畸形。"}}, {"id": "3027", "sub": "A", "src": "NG", "years": [108, 110, 112], "stem": "According to the criteria for success of a craniofacial osseointegrated implant, which of the statements below is wrong?", "opts": {"A": "A success rate of 50% in the mastoid process and 50% in the orbital region in nonirradiated bone tissue at the end of a 5-year observation period should be a minimum criterion for success.", "B": "The unattached implant should be immobile when tested clinically.", "C": "Soft-tissue reactions around skin-penetrating abutments should be type 0 (reaction-free) or type 1 (slight redness) on the Holgers scale, not demanding treatment in more than 95% of observations.", "D": "Individual implant performance should be characterized by the absence of persistent and/or irreversible signs and symptoms such as pain, infection, neuropathy, and paresthesia.", "E": "以上皆是"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B03-Q05", "conflict": "跨年選項數不同，視為不同題（對照 NG113-B03-Q01）", "key": "顱顏骨整合植體的成功標準：非照射骨在 5 年觀察期，**mastoid 應遠高於 50%**（一般引用 ≥95%），orbital 區較低但仍高於 50%。A 的「50%／50%」明顯過低。\n（AI 補寫，數字建議複查原文）", "peropt": {"A": "◎ 正解（錯誤）：50%／50% 的最低標準過低。", "B": "✓ 未接假體的植體臨床測試應無動搖。", "C": "✓ 皮膚穿出處軟組織反應應為 Holgers 0–1 級，且 >95% 觀察無需治療。", "D": "✓ 不應有持續／不可逆的疼痛、感染、神經病變、感覺異常。", "E": "✗ B/C/D 皆正確，故非答案。"}}, {"id": "3028", "sub": "A", "src": "NG", "years": [108], "stem": "Auditory tube and middle ear, and part of the tympanicmembrane起源自？", "opts": {"A": "Pharyngeal cleft 1", "B": "Pharyngeal arch 1", "C": "Pharyngeal cleft 3", "D": "Pharyngeal arch 2", "E": "Pharyngeal cleft 2"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q05", "conflict": "", "key": "耳咽管、中耳腔、部分鼓膜 ← **第一咽囊（pharyngeal pouch 1）**的 tubotympanic recess。外耳道則來自第一咽溝（cleft/groove）。\n⚠ 原檔以「cleft 1」表述，嚴格解剖學應為 pouch 1；作答依原檔答案 A。", "peropt": {"A": "◎ 原檔正解（第一咽囊／溝，內胚層來源）。", "B": "✗ 第一鰓弓 → 上下頜、咀嚼肌、V。", "C": "✗ 第三咽囊 → 下副甲狀腺、胸腺。", "D": "✗ 第二鰓弓 → 鐙骨、表情肌、VII。", "E": "✗ 第二咽溝正常會被閉鎖（殘留即鰓裂囊腫）。"}}, {"id": "3029", "sub": "A", "src": "NG", "years": [108], "stem": "有關DiGeorge syndrome，何者為非？", "opts": {"A": "和Treacher-Collin syndrome一樣同為mandibulofacial dysostosis的一種。", "B": "就是22q11.2 deletion syndrome。", "C": "是4th及5th pharyngeal clefts的agenesis or hypogenesis", "D": "受影響的基因為TBX1 gene。", "E": "以上皆非。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q06", "conflict": "", "key": "DiGeorge＝22q11.2 缺失、TBX1、**第三與第四咽囊（pouch）發育不全** → 胸腺與副甲狀腺缺損。題目寫「4th 及 5th pharyngeal clefts」，弓／囊／溝與編號雙錯。", "peropt": {"A": "⚠ 嚴格說 DiGeorge 並非 mandibulofacial dysostosis（TCS 才是），此項亦有疑義，但非本年答案。", "B": "✓ 即 22q11.2 缺失症候群。", "C": "◎ 正解（為非）：應為第三、四**咽囊**發育不全，非第四、五咽溝。", "D": "✓ TBX1。", "E": "✗ 因 C 為非，故此項不成立。"}}, {"id": "3030", "sub": "A", "src": "NG", "years": [108], "stem": "在orbital hypertelorism 矯正手術中，下列哪些情況bipartition會優於orbital shift ? (複選)", "opts": {"A": "The maxillary arch is narrow and inverted.", "B": "The axis of orbits is normal", "C": "The nasal fossae are narrow.", "D": "Extent of hypertelorism is severe.", "E": "Some midline clefts are associated with an encephalocele of the ethmoidosphenoidal area."}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B08-Q10", "conflict": "", "key": "Bipartition 優於 box-shift 的情境，共同點是**上頜／鼻腔在橫向上過窄或中線結構異常**——bipartition 能同時擴張上頜弓並旋轉兩側半臉。眶軸正常時，單純 box-shift 即可。", "peropt": {"A": "◎ 上頜弓狹窄且內傾 → bipartition 可同時擴弓。", "B": "✗ 眶軸正常 → box-shift 已足夠。", "C": "◎ 鼻腔狹窄。", "D": "◎ 眼距過寬程度嚴重。", "E": "◎ 合併篩蝶區腦膨出的中線裂。"}}, {"id": "3031", "sub": "A", "src": "NG", "years": [108], "stem": "有關Cranial facial clefts之分類 (The Tessier classification), 何者錯誤?", "opts": {"A": "There are 14 types of numbered cranial facial cleft based on the Tessier classification.", "B": "The eyelids and orbits define the horizontal axis dividing the face into upper and lower hemispheres.", "C": "The facial clefts are numbered 0 through 7.", "D": "The cranial clefts are numbere 8 through 14", "E": "Tessier cleft number 7 is the most lateral cranial facial cleft"}, "ans": "A", "multi": false, "etype": "ai", "expl": "考生建議：此問題兩本課本內容認定有異, NELIGAN第四版寫3 第3版寫7, G&B寫7", "cite": "NG108 · NG108-B09-Q01", "conflict": "", "key": "Tessier 分類編號 **0 到 14，共 15 型**（顏面裂 0–7、顱裂 8–14），且顱裂與顏面裂以眼瞼／眼眶為水平軸互相對應（0＋14、1＋13…）。A 說「14 型」漏算 No.0。", "peropt": {"A": "◎ 正解（錯誤）：應為 15 型（0–14），非 14 型。", "B": "✓ 眼瞼與眼眶構成上下半球的水平軸。", "C": "✓ 顏面裂 0–7。", "D": "✓ 顱裂 8–14。", "E": "✓ No.7 為最外側（見 CN3023）。"}}, {"id": "3032", "sub": "A", "src": "NG", "years": [108, 111, 112, 114], "stem": "有關Craniofacial microsomia(CFM)先天性的頭頸部疾病,下列選項何者錯誤?", "opts": {"A": "此疾病與胚胎期第一第二腮弓發育不全有關", "B": "常影響的區域包含耳朵,下頷骨及額骨.", "C": "Goldenhar syndrome現在被廣泛認為是CFM症候群的一部分", "D": "下頷骨發育不全(mandibular hypoplasia)是診斷此疾病的重點.", "E": "大部分sporadic, 少數autosomal dominant"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B09-Q03", "conflict": "", "key": "CFM 侵犯的是第一、二鰓弓衍生構造：**耳、下頜、上頜／顴骨**。額骨屬額鼻突，不在鰓弓範圍。", "peropt": {"A": "✓ 第一、二鰓弓發育不全。", "B": "◎ 正解（錯誤）：應為耳、下頜、上頜／顴骨，額骨非典型受累區。", "C": "✓ Goldenhar（眼—耳—脊椎譜系）視為 CFM 的一部分。", "D": "✓ 下頜發育不全是診斷核心。", "E": "✓ 多為偶發，少數體染色體顯性。"}}, {"id": "3033", "sub": "A", "src": "NG", "years": [108], "stem": "有關Idiopathic progressive hemifacial atrophy 何者不正確?", "opts": {"A": "Idiopathic progressive hemifacial atrophy (PHA) 也可稱做 Parry-Romberg syndrome.", "B": "首先描述hemifacial atrophy的醫師是Dr. Caleb Hiller Parry", "C": "PHA主要造成的病因不明,但被認為與自體免疫疾病及神經疾病相關", "D": "此疾病好發族群為男性學齡前幼兒", "E": "此疾病與 \"en coup de sabre\" (ECDS)常被視作是同一類疾病."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B09-Q04", "conflict": "", "key": "Parry–Romberg（PHA）好發於**女性**，多在**兒童晚期至青少年期**發病。D 的「男性學齡前」性別與年齡雙錯。", "peropt": {"A": "✓ PHA＝Parry–Romberg。", "B": "✓ 最早由 Caleb Hillier Parry 描述。", "C": "✓ 病因不明，與自體免疫、神經（三叉神經）機轉相關。", "D": "◎ 正解（不正確）：好發女性，兒童晚期／青少年發病。", "E": "✓ 與 en coup de sabre（額部線狀硬皮病）常視為同一疾病譜。"}}, {"id": "3034", "sub": "A", "src": "NG", "years": [108], "stem": "Which is wrong about Pierre Robin Sequence (PRS) ?", "opts": {"A": "The earliest account of a description of PRS is by Dr. Pierre Robin.", "B": "PRS is a clinical triad consisting of glossoptosis, retrognathia and airway compromise.", "C": "Approximately 50% of PRS presents with cleft palate.", "D": "The term glossoptosis refers to a posteriorly displaced tongue that obstruct the airway.", "E": "Patient may suffer from respiratory distress and malnutrition."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B09-Q05", "conflict": "", "key": "PRS 的最早描述**不是** Pierre Robin。他在 1923 年推廣此概念，但更早已有文獻記載。命題者用「the earliest account」設陷。", "peropt": {"A": "◎ 正解（錯誤）：最早描述並非 Robin 本人。", "B": "✓ 三徵：glossoptosis、retrognathia、呼吸道受損。", "C": "✓ 約半數合併裂顎。", "D": "✓ glossoptosis＝舌根後移阻塞呼吸道。", "E": "✓ 可致呼吸窘迫與營養不良。"}}, {"id": "3035", "sub": "A", "src": "NG", "years": [108], "stem": "Treacher Collins syndrome is a congenital craniofacial malformation, which involves the bones and soft tissues of the middle and lower facial thirds. Which of the statements are correct? (複選題)", "opts": {"A": "It presents as an unilateral craniofacial malformation", "B": "It is autosomal dominant disorder in 1 per 50 000 live births, 60% of cases arise as sporadic mutation.", "C": "Coloboma of the lower eyelids, inferior obliquity of the palpebral fissures, lateral canthal dystopia, and notching of the upper eyebrows and eyelids are characteristic.", "D": "The abnormal development of the first and second branchial arches results in bilateral Tessier clefts 6,7 and 8.", "E": "Usually has mental retardation."}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "cite": "NG108 · NG108-B09-Q07", "conflict": "", "key": "Treacher Collins 是**雙側對稱**、智力**正常**的第一二鰓弓疾病，對應雙側 Tessier 6、7、8 裂。A 與 E 各踩一個陷阱。", "peropt": {"A": "✗ 為雙側，非單側。", "B": "◎ 體染色體顯性，1/50,000；60% 偶發突變。", "C": "◎ 下眼瞼缺損（coloboma）、眼裂外下斜、外眥異位、眉／瞼切跡。", "D": "◎ 第一、二鰓弓異常 → 雙側 Tessier 6、7、8 裂。", "E": "✗ 智力通常正常。"}}, {"id": "3036", "sub": "A", "src": "NG", "years": [109], "stem": "有關telecanthus，下列敘述何者錯誤？", "opts": {"A": "造成medial displacement of the medial orbital wall。", "B": "會形成nasal foreshortening。", "C": "常見於nasal-orbital-ethmoid fracture。", "D": "與medial canthal tendon detach有關。", "E": "手術方式包括transnasal medial canthopexy。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B07-Q07", "conflict": "", "key": "Telecanthus 的機轉是內眥韌帶自淚後嵴**向外側**移位（NOE 骨折時內側眶壁外移、鼻眶篩複合體被壓扁）。A 說「medial displacement」方向相反。", "peropt": {"A": "◎ 正解（錯誤）：內側眶壁與內眥是向**外側**移位。", "B": "✓ 常伴鼻背塌陷、鼻長度縮短。", "C": "✓ 典型見於 NOE 骨折。", "D": "✓ 與內眥韌帶撕脫有關。", "E": "✓ 經鼻內眥固定術（transnasal medial canthopexy）為標準術式。"}}, {"id": "3037", "sub": "A", "src": "NG", "years": [109, 111], "stem": "Which of the following statement is incorrect about the the common possible complication after a cranioplasty or after a bipartition for hypertelorism correction?", "opts": {"A": "Cerebrospinal fluid leakage through the nose is not uncommon and may require lumbar drainage if persistent after 3 days of lumbar punctures.", "B": "Ophthalmological complications such as keratitis or chemosis are best prevented by the initial tarsorrhaphy.", "C": "In the long term the most important complication is an insufficient correction. This is most likely to occur not by relapse, but by soft-tissue relaxation, especially at the medial canthi.", "D": "Temporal hollowing is common sequelae, especially if the hypertelorism correction is the second major procedure after a cranioplasty or after a bipartition.", "E": "Excessive bleeding is a risk mainly related to a coagulopathy induced by important preoperative transfusion."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B08-Q10", "conflict": "", "key": "此題原檔無詳解。可靠的概念是：**長期最重要的併發症是矯正不足，且主因是軟組織鬆弛（尤其內眥）而非骨性復發**。D 把 temporal hollowing 的成因歸給「第二次手術」，為原檔認定之錯誤敘述。\n（AI 補寫，待複查）", "peropt": {"A": "✓ 經鼻腦脊髓液漏並不罕見，持續 3 天以上可能需腰椎引流。", "B": "✓ 初期瞼緣縫合可預防角膜炎與結膜水腫。", "C": "✓ 長期最重要併發症為矯正不足，源自軟組織鬆弛而非復發。", "D": "◎ 原檔正解（錯誤）。", "E": "✓ 大量輸血引發凝血病變是出血風險主因。"}}, {"id": "3038", "sub": "A", "src": "NG", "years": [109, 112, 114], "stem": "下列何種syndrome是用來描述Idiopathic progressive hemifacial atrophy (PHA)？", "opts": {"A": "Apert syndrome", "B": "Down's syndrome", "C": "Compartment syndrome", "D": "Klippel-Trenaunay syndrome", "E": "Parry–Romberg syndrome"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q04", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG113-B09-Q01）", "key": "與 CN3003 同題（GS 與 NG 各出一次，共跨五個年度）。PHA＝Parry–Romberg。此題答案穩定，屬送分題。", "peropt": {"A": "Apert＝顱縫早閉＋併指。", "B": "Down's＝21 三體。", "C": "Compartment syndrome 為純誘答。", "D": "Klippel–Trenaunay＝血管畸形＋肢體肥大。", "E": "◎ 正解。"}}, {"id": "3039", "sub": "A", "src": "NG", "years": [109, 111, 113, 114], "stem": "以下何者是craniofacial cleft的環境影響因素？(複選)", "opts": {"A": "輻射暴露", "B": "感染", "C": "藥物", "D": "化學物質暴露", "E": "妊娠時代謝相關的異常"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q05", "conflict": "", "key": "顱顏裂的環境致病因子涵蓋**輻射、感染、藥物、化學物質、母體代謝異常**五大類——凡列出這五者，答案通常是全選。四年考四次。", "peropt": {"A": "◎ 輻射暴露。", "B": "◎ 感染（如 TORCH）。", "C": "◎ 藥物（如抗癲癇藥、類固醇、retinoid）。", "D": "◎ 化學物質暴露。", "E": "◎ 妊娠期代謝異常（如糖尿病、葉酸缺乏）。"}}, {"id": "3040", "sub": "A", "src": "NG", "years": [109, 111, 114], "stem": "下列congenital malformations of the head and neck何者發生率(incidence)最高？", "opts": {"A": "Craniofacial microsomia", "B": "Cleft lip and palate", "C": "Hemifacial atrophy", "D": "Craniofacial cleft", "E": "Treacher Collins syndrome"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q07", "conflict": "", "key": "頭頸部先天畸形發生率排序：**唇顎裂遠居第一**（約 1/700 活產），其餘皆數量級較低（CFM 約 1/5,600、TCS 約 1/50,000）。", "peropt": {"A": "CFM 約 1/5,600，第二常見。", "B": "◎ 正解：唇顎裂約 1/700。", "C": "Hemifacial atrophy 罕見。", "D": "Craniofacial cleft 罕見（約 1/100,000）。", "E": "Treacher Collins 約 1/50,000。"}}, {"id": "3041", "sub": "A", "src": "NG", "years": [109, 111, 112, 114], "stem": "關於Treacher Collins syndrome的描述何者錯誤？", "opts": {"A": "新生兒需注意呼吸道的問題", "B": "顴骨區域的重建可以選擇頭骨graft、dermis-fat graft、alloplastic material", "C": "Colobomas常發生在下眼瞼造成全層的缺損", "D": "重建microtia的時機為4歲以前", "E": "為autosomal dominant disorder，60%是偶發性突變(sporadic mutations)"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG109 · NG109-B09-Q10", "conflict": "選項重排家族：與 NG113-B09-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母", "key": "Treacher Collins 的手術時序：**軟組織（coloboma、macrostomia）先於骨性重建；小耳重建約 9–10 歲**（待肋軟骨足量、耳廓近成人大小）。「4 歲以前」明顯過早。\n⚠ 本題與 CN3058 為選項重排家族：同樣五個選項、字母對應不同。記概念，別背 D。", "peropt": {"A": "✓ 新生兒首要處理呼吸道。", "B": "✓ 顴骨重建可用顱骨移植、真皮脂肪移植或人工植入物。", "C": "✓ 下眼瞼全層 coloboma 為特徵。", "D": "◎ 正解（錯誤）：小耳重建約 9–10 歲，非 4 歲前。", "E": "✓ 體染色體顯性，60% 偶發突變。"}}, {"id": "3042", "sub": "A", "src": "NG", "years": [110], "stem": "造成Craniofacial microsomia之假說其一為對pharyngeal arch的缺血性傷害(ischemia hypothesis)，此假說中所受到傷害之血管為下列何者?", "opts": {"A": "Maxillary artery", "B": "Stapedial artery", "C": "Facial artery", "D": "Internal carotid artery", "E": "External carotid artery"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q01", "conflict": "", "key": "CFM 的缺血假說：**stapedial artery**（鐙骨動脈，胚胎期供應第一、二鰓弓的過渡血管）受損出血 → 鰓弓衍生構造發育不全。這條血管正常會退化，由頸外動脈系統接手。", "peropt": {"A": "Maxillary artery 為第一弓的成熟動脈，非假說標的。", "B": "◎ 正解：stapedial artery。", "C": "Facial artery 屬頸外動脈分支。", "D": "Internal carotid 為第三弓衍生。", "E": "External carotid 供應範圍廣，非此假說指涉。"}}, {"id": "3043", "sub": "A", "src": "NG", "years": [110], "stem": "在orbital hypertelorism 矯正手術中，下列何種情況bipartition會優於orbital shift ?", "opts": {"A": "The maxillary arch is narrow and inverted.", "B": "The orbits are laterally and downwardly oblique", "C": "The nasal fossae are wide", "D": "Extent of hypertelorism showed limited displacement", "E": "There are no lesions such as an encephalocele found at the cranial base"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B08-Q04", "conflict": "", "key": "與 CN3030 同一考點的單選版。Bipartition 的適應症共同軸線是**上頜弓／鼻腔橫向狹窄、眼距嚴重過寬、合併中線顱底病灶**——因為 bipartition 能同時擴弓並旋轉兩半臉。", "peropt": {"A": "◎ 正解：上頜弓狹窄且內傾。", "B": "✗ 眶軸外下傾斜 → 仍可用 box-shift 調整。", "C": "✗ 鼻腔『寬』不需 bipartition（狹窄才需要）。", "D": "✗ 位移有限 → box-shift 足夠。", "E": "✗ 無腦膨出 → 不必 bipartition。"}}, {"id": "3044", "sub": "A", "src": "NG", "years": [110], "stem": "What is the most common type of the Tessier craniofacial clefts?", "opts": {"A": "Number 3", "B": "Number 14", "C": "Number 5", "D": "Number 6", "E": "Number 7"}, "ans": "A", "multi": false, "etype": "ai", "expl": "考生建議：此問題兩本課本內容認定有異, NELIGAN第四版寫3 第3版寫7, G&B寫7", "cite": "NG110 · NG110-B09-Q01", "conflict": "", "key": "⚠ **跨教科書衝突題**。Neligan 4e 認為 **No.3** 最常見；Neligan 3e 與 Grabb & Smith 認為 **No.7**。本題（NG110，4e）官方答案 A（No.3）；GS 版本（CN3002）答案為 E（No.7）。\n作答鐵律：**錨定該年度／該教科書的答案**。概念上記「No.3 與 No.7 皆為常見顱顏裂」即可。", "peropt": {"A": "◎ 本年（Neligan 4e）答案：No.3（oro-naso-ocular cleft）。", "B": "No.14 為中線顱裂。", "C": "No.5 少見。", "D": "No.6 為 TCS 組合之一。", "E": "⚠ Grabb & Smith 與 Neligan 3e 之答案（No.7，lateral facial cleft）。"}}, {"id": "3045", "sub": "A", "src": "NG", "years": [110], "stem": "Which of the following statement concerning Treacher Collins syndrome is NOT correct？", "opts": {"A": "Airway management is the primary concern when treating infants born with Treacher Collins syndrome", "B": "Inferior obliquity of the palpebral fissures and mandibulofacial dysostosis are characteristic", "C": "It results from the abnormal development of the third and fourth branchial arches", "D": "It is an autosomal dominant disorder", "E": "Colobomas usually occur in the lower eyelid and are full-thickness defects."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B09-Q05", "conflict": "", "key": "Treacher Collins ＝ **第一、二鰓弓**異常。凡見「third and fourth branchial arches」即錯。此為 TCS 最高頻的破綻（見 CN3012、CN3035）。", "peropt": {"A": "✓ 呼吸道優先。", "B": "✓ 眼裂外下斜＋下頜顏面骨發育不全（mandibulofacial dysostosis）。", "C": "◎ 正解（不正確）：應為第一、二鰓弓。", "D": "✓ 體染色體顯性。", "E": "✓ 下眼瞼全層 coloboma。"}}, {"id": "3046", "sub": "A", "src": "NG", "years": [110], "stem": "What is the most common type of conjoined twins?", "opts": {"A": "thoracopagus", "B": "Omphalopagus", "C": "Craniopagus", "D": "Ischiopagus tripus", "E": "Ischiopagus tetrapus"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B09-Q06", "conflict": "", "key": "連體嬰最常見型別為 **thoracopagus（胸部相連）**，其次 omphalopagus。分型以相連部位命名（-pagus＝『固定於』）。", "peropt": {"A": "◎ 正解：thoracopagus，最常見，常共用心臟，分離手術難度最高。", "B": "Omphalopagus 次之（臍／上腹相連）。", "C": "Craniopagus 罕見（顱頂相連）。", "D": "Ischiopagus tripus：骨盆相連、三下肢。", "E": "Ischiopagus tetrapus：骨盆相連、四下肢。"}}, {"id": "3047", "sub": "A", "src": "NG", "years": [110, 112, 114], "stem": "Which of the following statement concerning Pierre Robin Sequence (PRS) is NOT correct？", "opts": {"A": "PRS is a clinical triad consisting of glossoptosis, retrognathia, airway compromise", "B": "Cleft palate is present in approximately 50% of cases", "C": "The work-up of PRS patients should begin with craniofacial deformities.", "D": "Infants with PRS may present with feeding difficulties and failure to thrive.", "E": "Respiratory distress can be managed with prone positioning"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B09-Q07", "conflict": "跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG113-B09-Q07） ‖ 跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG111-B09-Q05）", "key": "PRS 的處置順序永遠是 **呼吸道 → 餵食 → 顱顏**。此題與 CN3053 是「正解選項改寫家族」：兩年答案都是 C，但 C 的文字一年寫『從顱顏畸形開始』、另一年寫『從餵食困難開始』——**兩者都錯，因為都不是呼吸道**。這正是背字母會失效的鐵證。", "peropt": {"A": "✓ 三徵：glossoptosis、retrognathia、呼吸道受損。", "B": "✓ 約半數合併裂顎。", "C": "◎ 正解（不正確）：workup 應從呼吸道開始，而非顱顏畸形。", "D": "✓ 可有餵食困難與生長遲滯。", "E": "✓ 俯臥擺位可改善呼吸窘迫。"}}, {"id": "3048", "sub": "A", "src": "NG", "years": [110, 114], "stem": "Phenotypic features of craniofacial microsomia are highly variable. Which of the following are the three most commonly affected structures? (複選)", "opts": {"A": "auricle", "B": "mandible", "C": "maxilla", "D": "frontal bone", "E": "occipital bone"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B09-Q08", "conflict": "", "key": "CFM 最常受累的三構造：**耳廓（auricle）、下頜（mandible）、上頜（maxilla）**——全為第一、二鰓弓衍生物。額骨與枕骨不屬鰓弓來源。", "peropt": {"A": "◎ 耳廓。", "B": "◎ 下頜。", "C": "◎ 上頜。", "D": "✗ 額骨來自額鼻突。", "E": "✗ 枕骨屬體節來源。"}}, {"id": "3049", "sub": "A", "src": "NG", "years": [110, 114], "stem": "關於hemifacial atrophy的敘述哪一項是錯誤的? (複選)", "opts": {"A": "是一種lymphocytic neurovasculitis", "B": "Immunosuppressive therapy適合使用在有皮膚病灶的病人，seizure的病人避免適用。", "C": "常見的皮膚病灶包含 hyperpigmentation, hypopigmentation與alopecia.", "D": "病理學的表現類似localized scleroderma", "E": "大部分的病人都先以神經學症狀表現，接著出現皮膚病灶。"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "cite": "NG110 · NG110-B09-Q09", "conflict": "", "key": "Parry–Romberg 是 **lymphocytic neurovasculitis**，病理近似局部硬皮病。臨床順序是**皮膚病灶在先、神經症狀在後**；免疫抑制治療正是用在有神經侵犯（癲癇）者。B 與 E 各把方向寫反。", "peropt": {"A": "✓ 淋巴球性神經血管炎。", "B": "◎ 錯誤：免疫抑制治療適用於神經侵犯（含癲癇）者，並非避用。", "C": "✓ 色素增減與禿髮。", "D": "✓ 病理似局部硬皮病。", "E": "◎ 錯誤：多數先出現皮膚病灶，神經症狀隨後。"}}, {"id": "3053", "sub": "A", "src": "NG", "years": [111, 113], "stem": "下列關於Pierre Robin Sequence (PRS)之敘述，何者為非? (單選)", "opts": {"A": "PRS is a clinical triad consisting of glossoptosis, retrognathia, airway compromise", "B": "Cleft palate is present in approximately 50% of cases", "C": "The workup of PRS patients should begin with feeding difficulties", "D": "Infants with PRS may present with feeding difficulties and failure to thrive.", "E": "Respiratory distress can be managed with prone positioning."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "NG111 · NG111-B09-Q05", "conflict": "跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG110-B09-Q07） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B09-Q06）", "key": "與 CN3047 同一題的另一版本：C 改寫為『workup 應從餵食困難開始』。**答案仍是 C，因為正確順序是呼吸道優先**。兩年並列閱讀，就能看穿命題者只是換了誘答的外衣。", "peropt": {"A": "✓ 三徵。", "B": "✓ 約半數合併裂顎。", "C": "◎ 正解（為非）：應從呼吸道開始，不是餵食困難。", "D": "✓ 餵食困難與生長遲滯。", "E": "✓ 俯臥擺位。"}}, {"id": "3054", "sub": "A", "src": "NG", "years": [113], "stem": "Which of the following statements about the diagnosis of hypertelorism and the Tessier classification of facial clefts is correct?", "opts": {"A": "The classification takes into account all asymmetrical and paramedian anomalies.", "B": "Tessier classification provides clear definitions and treatment implications, based on cadaveric studies from the 1990s.", "C": "The tip of the nasal bone is the reference landmark in Tessier classification.", "D": "In special situations, the concept of additive facial and cranial clefts may sum to 13 or 15.", "E": "Crouzon's syndrome involves only the face and cranium and is not associated with anomalies in the limbs or trunk."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q07", "conflict": "", "key": "Tessier 分類的關鍵數學：**顏面裂編號 ＋ 對應顱裂編號 ＝ 14**（0+14、1+13、2+12、3+11、4+10、5+9、6+8）。參考軸是眼眶，不是鼻骨。另一關鍵鑑別：**Crouzon 只侵犯顏面與顱骨，四肢軀幹正常**（有別於 Apert／Pfeiffer 的併指與寬拇指）。", "peropt": {"A": "✗ 分類無法涵蓋所有不對稱與旁中線異常。", "B": "✗ 基於 1970 年代的屍體研究，非 1990 年代。", "C": "✗ 參考標記為眼眶，非鼻骨尖。", "D": "✗ 顏面裂＋顱裂之和恆為 **14**，非 13 或 15。", "E": "◎ 正解：Crouzon 不合併四肢或軀幹異常。"}}, {"id": "3055", "sub": "A", "src": "NG", "years": [113], "stem": "Which of the following statements is incorrect regarding surgical considerations and techniques in facial clefts?", "opts": {"A": "Bringing the orbits closer together and creating a nose of normal appearance are the two main aims of surgery.", "B": "The age at operation is important. If there is a cranial cleft, it is better to schedule the surgery as soon as the diagnosis is confirmed to lower the risk of intracranial infection.", "C": "In hypertelorism with an interorbital distance less than 35mm, a single medial wall mobilization can be performed through a limited subciliary incision.", "D": "In hypertelorism with an interorbital distance of 35 to 40mm, large frontal sinuses, and a high pituitary sella, the supraorbital rim and roof of the orbits can be left in place with mobilization of the other three walls.", "E": "In symmetrical orbital hypertelorism with an interorbital distance greater than 40mm, Box-shift osteotomies could be considered."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B08-Q08", "conflict": "", "key": "顱裂（尤其合併腦膨出）**不是一診斷就立刻開刀**；手術時機需權衡顱骨發育、腦部狀況與麻醉風險。手術兩大目標：把眼眶拉近、重建外觀正常的鼻子。眶間距是術式選擇的量尺（<35mm 單純內側壁移動；35–40mm 保留眶頂三壁動員；>40mm box-shift）。", "peropt": {"A": "✓ 兩大目標：眼眶靠攏＋鼻部外形。", "B": "◎ 正解（不正確）：確診後立即手術以降低顱內感染，並非通則。", "C": "✓ 眶間距 <35mm 可經下瞼緣小切口單做內側壁動員。", "D": "✓ 35–40mm、額竇大、蝶鞍高 → 保留眶上緣與眶頂，動員其餘三壁。", "E": "✓ 對稱性眼距過寬且 >40mm → 考慮 box-shift 截骨。"}}, {"id": "3056", "sub": "A", "src": "NG", "years": [113], "stem": "下列何種syndrome是用來描述Idiopathic progressive hemifacial atrophy(PHA)？", "opts": {"A": "Apert syndrome", "B": "Klippel-Trenaunay syndrome.", "C": "Van der Woude syndrome", "D": "Down's syndrome", "E": "Parry–Romberg syndrome"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG113 · NG113-B09-Q01", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG109-B09-Q04）", "key": "與 CN3003、CN3038 同一考點，第三度出現（跨 GS/NG 共六個年度）。PHA＝Parry–Romberg。此題僅把誘答換成 Van der Woude（唇窩＋唇顎裂，IRF6）。", "peropt": {"A": "Apert＝顱縫早閉＋併指。", "B": "Klippel–Trenaunay＝血管畸形＋肢體肥大。", "C": "Van der Woude＝下唇窩＋唇顎裂（IRF6）。", "D": "Down's＝21 三體。", "E": "◎ 正解。"}}, {"id": "3057", "sub": "A", "src": "NG", "years": [113], "stem": "下列 Congenital malformations of the head and neck 何者發生率(incidence)最高？", "opts": {"A": "Hemifacial atrophy", "B": "Cleft lip and palate", "C": "Treacher Collins syndrome", "D": "Craniofacial microsomia", "E": "Craniofacial cleft"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Incidence of\n\n(A) Hemifacial atrophy: 5 per 1 000 000 people\n\n(B) Reported rates for CL/P are highest among Native Americans, 3.6/1000 newborns; followed by Japanese, 2.1/1000 newborns; Chinese, 1.7/1000 newborns; and Caucasians, 1.0/1000 newborns. Rates remain the lowest among African Americans, 0.3/1000 newborns (G&S 8th CH25 電子檔p.835)\n\n(C) Treacher Collins syndrome: 1 per 50 000 live births\n\n(D) Craniofacial microsomia: 1: 642 to 1 : 26 000, Craniofacial microsomia represents one of the most common congenital malformations of the head and neck, second only to cleft lip and palate\n\n(E) Craniofacial clefts: 1.4–4.9 per 100 000 live births", "cite": "NG113 · NG113-B09-Q02", "conflict": "", "key": "與 CN3040 同一考點。唇顎裂發生率遠高於其他頭頸先天畸形：約 **1–3.6/1000 活產**（美洲原住民最高、白人約 1/1000、非裔最低）；hemifacial atrophy 僅約 **5/1,000,000**。", "peropt": {"A": "Hemifacial atrophy 約 5/百萬。", "B": "◎ 正解：唇顎裂，數量級最高。", "C": "TCS 約 1/50,000。", "D": "CFM 約 1/5,600。", "E": "Craniofacial cleft 極罕見。"}}, {"id": "3058", "sub": "A", "src": "NG", "years": [113], "stem": "關於 Treacher Collins syndrome 的描述何者錯誤？", "opts": {"A": "Colobomas常發生在下眼瞼造成全層的缺損", "B": "新生兒需注意呼吸道的問題", "C": "顴骨區域的重建可以選擇頭骨 graft、dermis-fat graft、alloplastic material", "D": "重建 microtia 的時機為 4 歲以前", "E": "為 autosomal dominant disorder，60%是偶發性突變(sporadic mutations)"}, "ans": "D", "multi": false, "etype": "ai", "expl": "(D) Colobomas and macrostomia are repaired prior to bony reconstruction. Microtia is usually corrected at approximately 9–10 years of age", "cite": "NG113 · NG113-B09-Q03", "conflict": "選項重排家族：與 NG109-B09-Q10 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 NG112-B09-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 NG111-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母", "key": "與 CN3041 同題、**選項字母重排**（原檔詳解直接寫明：coloboma 與 macrostomia 先修補，microtia 約 9–10 歲矯正）。此處答案仍是 D，但兩題的 A、C 位置已互換——若你背的是「答案 D」而非「4 歲前太早」，遇到重排就會失手。", "peropt": {"A": "✓ 下眼瞼全層 coloboma。", "B": "✓ 新生兒呼吸道優先。", "C": "✓ 顴骨重建材料選擇。", "D": "◎ 正解（錯誤）：小耳重建約 9–10 歲。", "E": "✓ 體染色體顯性、60% 偶發。"}}, {"id": "3059", "sub": "A", "src": "NG", "years": [113], "stem": "下列有關Craniofacial microsomia(CFM)之敘述，何者錯誤?", "opts": {"A": "大部分sporadic, 少數autosomal dominant", "B": "常影響的區域包含耳朵、額骨及下頷骨", "C": "疾病與胚胎期第一第二腮弓發育不全有關", "D": "Goldenhar syndrome現在被廣泛認為是CFM症候群的一部分", "E": "下頷骨發育不全 (mandibular hypoplasia) 是診斷此疾病的重點"}, "ans": "B", "multi": false, "etype": "ai", "expl": "(B) Phenotypic features of CFM are highly variable. While the three structures most commonly affected include the auricle, mandible, and maxilla, abnormal development can occur in any of the derivatives of the first or second branchial arches.", "cite": "NG113 · NG113-B09-Q04", "conflict": "", "key": "與 CN3032 同一考點：CFM 最常受累為**耳、下頜、上頜**。此題把「上頜」換成「額骨」作為破綻（原檔詳解明載三構造為 auricle、mandible、maxilla）。", "peropt": {"A": "✓ 多為偶發，少數體染色體顯性。", "B": "◎ 正解（錯誤）：應為耳、下頜、**上頜**，非額骨。", "C": "✓ 第一、二鰓弓發育不全。", "D": "✓ Goldenhar 屬 CFM 譜系。", "E": "✓ 下頜發育不全為診斷核心。"}}, {"id": "3060", "sub": "A", "src": "NG", "years": [115], "stem": "A disruption in the generation, migration, or differentiation of neural crest cells underlies the classification of malformations known as neurocristopathies. Which of the following syndromes or diseases are recognized as neurocristopathies? (複選)", "opts": {"A": "Holoprosencephaly", "B": "Treacher Collins syndrome", "C": "Cleidocranial dysplasia", "D": "Saethre-Chotzen syndrome", "E": "22q11.2 deletion syndrome"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q01", "conflict": "", "key": "Neurocristopathy＝神經嵴細胞的生成／遷移／分化障礙。**TCS（TCOF1，神經嵴細胞增生不足）與 22q11.2 缺失（TBX1，影響心臟神經嵴）**屬之。Holoprosencephaly 是前腦分裂缺陷（SHH）、cleidocranial dysplasia 是成骨細胞缺陷（RUNX2），皆非神經嵴病。", "peropt": {"A": "✗ 前腦分裂異常（SHH 路徑）。", "B": "◎ TCOF1 → 神經嵴細胞不足。", "C": "✗ RUNX2 → 成骨細胞分化缺陷。", "D": "✗ TWIST1 → 顱縫早閉症候群。", "E": "◎ TBX1 → 心臟神經嵴遷移異常。"}}, {"id": "3061", "sub": "A", "src": "NG", "years": [115], "stem": "Which of the following statements regarding the development and derivatives of the pharyngeal arches is true?", "opts": {"A": "The face is predominantly derived from the first pharyngeal arch.", "B": "The third pharyngeal arch serves as a bracing element to support the developing upper and lower jaws.", "C": "The first pharyngeal arch initially appears on day 24 of embryonic development.", "D": "The fourth and sixth pharyngeal arches together give rise to the root of the tongue and the epiglottis."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG115 · NG115-B08-Q02", "conflict": "", "key": "第一鰓弓是**顏面的主體來源**。三個常見破綻：第一弓約在第 **22** 天出現（非 24）；支撐上下頜的是第一弓本身（非第三弓）；舌根與會厭來自第三、四弓，而第四、六弓形成**喉部軟骨**。", "peropt": {"A": "◎ 正解：顏面主要來自第一鰓弓。", "B": "✗ 支撐上下頜者為第一弓。", "C": "✗ 第一弓約於胚胎第 22 天出現。", "D": "✗ 舌根與會厭來自第三、四弓；第四、六弓 → 喉軟骨。"}}, {"id": "3062", "sub": "A", "src": "NG", "years": [115], "stem": "下列有關 orbital hypertelorism 矯正手術中 orbital shift 與 facial bipartition 的敘述，何者最正確？", "opts": {"A": "若病人有正常的 maxillary arch 與 occlusion，通常仍優先選擇 bipartition，以增加上顎寬度。", "B": "Bipartition 的 osteotomy 會經過 zygomatic arch、pterygomaxillary junction 與 palate，可同時改善 maxillary arch 與 nasal airway。", "C": "Bipartition 適用於 orbit axis 正常、但僅有輕度 hypertelorism 的患者。", "D": "Orbital shift 手術必須經過 pterygomaxillary disjunction，否則無法有效內移 orbit。", "E": "Tessier 最初提出的 orbital shift technique 中，osteotomy 線位於 infraorbital rim 之上。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "A 錯誤：若 maxillary arch 與 occlusion 正常，通常避免 pterygomaxillary disjunction，因此較傾向 orbital shift。\n\nB 正確：facial bipartition 的 osteotomy 包含 zygomatic arch、pterygomaxillary junction 與 palate，可改善 hypertelorism、擴大 maxillary arch 與 nasal fossae。\n\nC 錯誤：orbit 若有 lateral/downward obliquity，才較需要 bipartition 改變 orbital axis。\n\nD 錯誤：orbital shift 不一定需要 pterygomaxillary disjunction。\n\nE 錯誤：Tessier classic orbital shift 的 lower horizontal cuts 位於 infraorbital rim 下方。", "cite": "NG115 · NG115-B09-Q02", "conflict": "", "key": "Bipartition 的截骨線經過 **zygomatic arch → pterygomaxillary junction → palate**，因此能同時擴張上頜弓與鼻氣道。反過來說：**咬合與上頜弓正常時，就該避開 pterygomaxillary disjunction，改選 orbital shift**。", "peropt": {"A": "✗ 上頜弓與咬合正常時應優先 orbital shift，避免不必要的 pterygomaxillary disjunction。", "B": "◎ 正解：截骨路徑涵蓋顴弓、翼上頜接合與顎部。", "C": "✗ 眶軸正常＋輕度眼距過寬 → orbital shift 即可。", "D": "✗ Orbital shift 不需 pterygomaxillary disjunction，這正是它與 bipartition 的分界。", "E": "✗ Tessier 原始 orbital shift 的截骨線位於眶下緣**之下**。"}}, {"id": "3063", "sub": "A", "src": "NG", "years": [115], "stem": "下列有關 Tessier craniofacial clefts 的敘述，何者錯誤？", "opts": {"A": "Tessier number 7 cleft 為最外側的 craniofacial cleft，常與 hemifacial microsomia 有關。", "B": "Tessier number 3 cleft 常伴隨 nasolacrimal system disruption，且可能造成 oral、nasal 與 orbital cavity 相通。", "C": "Tessier number 4 cleft 的 bony cleft 位於 infraorbital foramen 外側。", "D": "Tessier number 6 cleft 可視為 Treacher Collins syndrome 的不完全型態之一。", "E": "Tessier number 14 cleft 可與 frontonasal encephalocele 及 severe hypertelorism 有關。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A 正確：number 7 cleft 為最 lateral 的 craniofacial cleft，與 craniofacial microsomia／hemifacial microsomia 關聯密切。\n\nB 正確：number 3 cleft（oro-naso-ocular cleft）常侵犯 lacrimal system，且可造成 oral、nasal、orbital cavity 彼此交通。\n\nC 錯誤：number 4 cleft 位於 infraorbital foramen 內側；number 5 cleft 才位於 infraorbital foramen 外側。\n\nD 正確：number 6 cleft 為 zygomaticomaxillary cleft，可視為 Treacher Collins syndrome 的不完全型。\n\nE 正確：number 14 cleft 可伴隨 frontonasal/frontoethmoidal encephalocele 與 severe hypertelorism。", "cite": "NG115 · NG115-B09-Q03", "conflict": "", "key": "Tessier No.4 的骨性裂位於 infraorbital foramen **內側**（medial），這是 No.4 與 No.5 的關鍵分界（No.5 才在外側）。其餘四個選項都是正確敘述，可一併記成 Tessier 速查表。", "peropt": {"A": "✓ No.7 最外側，與 hemifacial microsomia 密切相關。", "B": "✓ No.3 侵犯淚器，可使口、鼻、眶三腔相通。", "C": "◎ 正解（錯誤）：No.4 的骨性裂在 infraorbital foramen **內側**。", "D": "✓ No.6 可視為 TCS 的不完全型。", "E": "✓ No.14 與額鼻腦膨出、嚴重眼距過寬相關。"}}, {"id": "3064", "sub": "A", "src": "NG", "years": [115], "stem": "關於 Parry–Romberg syndrome (PHA) 的神經學特徵與影像學表現，下列何者正確？", "opts": {"A": "顏面萎縮常跨越中線，呈雙側對稱分布。", "B": "PHA 最常起始於三叉神經 V3 分布區。", "C": "約 30–40% 病人可出現中樞神經系統影像異常，但有症狀者少於 20%。", "D": "腦部 MRI 最常見表現為雙側基底核鈣化。", "E": "腦脊髓液檢查通常正常，不支持發炎機轉。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A. 錯誤，PHA 約 95% 為單側病變，很少跨越中線。\n\nB. 錯誤，初始侵犯最常見為 V2（45%），其次 V1（35%），V3（20%）。\n\nC. 正確，約 30–40% 病人有 CNS 影像異常，但臨床神經症狀不到 20%。\n\nD. 錯誤，最常見 MRI 異常為 ipsilateral white matter T2 hyperintense lesions。\n\nE. 錯誤，CSF 可見 oligoclonal bands 與 IgG 升高，支持發炎性病理機轉。", "cite": "NG115 · NG115-B09-Q08", "conflict": "", "key": "Parry–Romberg 的四個數字：**95% 單側**（不跨中線）；起始最常見 **V2（45%）> V1（35%）> V3（20%）**；CNS 影像異常 **30–40%**，但有症狀者 **<20%**；MRI 最常見為**同側白質 T2 高訊號**（非雙側基底核鈣化）。", "peropt": {"A": "✗ 約 95% 單側，極少跨中線。", "B": "✗ 最常起始於 V2，非 V3。", "C": "◎ 正解：影像異常 30–40%，有症狀者 <20%。", "D": "✗ 最常見為同側白質 T2 高訊號。", "E": "✗ 腦脊髓液可有發炎變化，支持發炎機轉。"}}, {"id": "3065", "sub": "A", "src": "NG", "years": [115], "stem": "關於 Robin sequence（RS）患者的 Mandibular Distraction Osteogenesis（MDO），下列何者錯誤？", "opts": {"A": "MDO 藉由下顎延長使舌根前移，增加咽腔容積", "B": "新生兒進行 MDO 時，distraction rate 通常較大兒童快", "C": "Internal distractor 的優點之一是較少發生 pin-site infection", "D": "External distractor 不需二次手術移除裝置", "E": "MDO 已被證實可促進下顎超正常（catch-up）生長至正常大小"}, "ans": "E", "multi": false, "etype": "ai", "expl": "A. 對，下顎向前延長後，舌骨肌群與 genioglossus 被帶動前移，解除 tongue-base obstruction。\n\nB. 對，嬰兒骨再生能力強，通常採 1.5–2 mm/day，以避免 premature consolidation。\n\nC. 對，Internal device 埋於皮下，感染率通常低於 external distractor。\n\nD. 對，External distractor 完成 consolidation 後可直接拆除，不一定需要再次全身麻醉手術。\n\nE. 錯，現有大型研究顯示 RS 下顎會生長，但沒有證據支持「超正常 catch-up growth」。", "cite": "NG115 · NG115-B09-Q09", "conflict": "", "key": "MDO 可解除舌根阻塞，但**不會讓下顎追趕生長到正常大小**。這是最常見的誤解：延長的是「當下的長度」，不是「未來的生長潛能」。", "peropt": {"A": "✓ 下顎前移帶動 genioglossus 與舌骨肌群，擴大咽腔。", "B": "✓ 新生兒骨再生快，速率約 1.5–2 mm/day，以免過早骨化。", "C": "✓ 內置式裝置埋於皮下，pin-site 感染率低。", "D": "✓ 外置式可直接拆除，不需二次手術。", "E": "◎ 正解（錯誤）：MDO 無法促成下顎 catch-up 生長至正常大小。"}}, {"id": "3066", "sub": "A", "src": "NG", "years": [115], "stem": "一名 8 歲男童，診斷為 Treacher Collins syndrome（TCS），幼年時曾接受腭裂修補手術。近年家長發現其睡覺時有明顯打鼾、呼吸暫停及白天注意力不集中情形。門診評估懷疑 obstructive sleep apnea（OSA）。下列何者是最適當的下一步處置？", "opts": {"A": "使用 OSA 問卷評估即可，不需進一步檢查", "B": "因 TCS 主要問題是下顎後縮，直接安排 mandibular distraction osteogenesis（MDO）", "C": "安排 overnight polysomnography（PSG）評估睡眠呼吸障礙程度", "D": "先安排 palate revision，改善上呼吸道空間", "E": "若有 OSA，一定是單純 tongue-base obstruction 所造成"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A 錯，常用問卷在 TCS 病人預測能力不佳，無法取代睡眠檢查。\n\nB 錯，TCS 常為 multilevel airway obstruction，不能僅因下顎後縮就直接安排 MDO。\n\nC 對，PSG 是診斷與評估 TCS 患者 OSA 的標準工具。\n\nD 錯，腭裂修補甚至可能使呼吸問題惡化，不是治療 OSA 的方法。\n\nE 錯，TCS 阻塞位置可能包括鼻中隔、choana、舌根、咽部甚至氣管，不是只有舌根。", "cite": "NG115 · NG115-B09-Q10", "conflict": "", "key": "TCS 的呼吸道阻塞是**多層次（multilevel）**的。因此：問卷不能取代檢查；不能因下顎後縮就直接 MDO。**PSG 是診斷與分級的標準工具**。另注意：顎裂修補反而可能惡化呼吸道。", "peropt": {"A": "✗ 問卷在 TCS 預測力不佳。", "B": "✗ 未確認阻塞層次前不應逕行 MDO。", "C": "◎ 正解：安排整夜多項睡眠檢查（PSG）。", "D": "✗ 顎裂修補可能使呼吸道更窄。", "E": "✗ TCS 常為多層次阻塞，非單純舌根。"}}, {"id": "3067", "sub": "A", "src": "NG", "years": [115], "stem": "一名 4歲男童 因鼻背正中線腫塊就診。家長表示出生後即發現，近年逐漸變大，偶爾有局部紅腫感染。理學檢查發現一個堅實、囊性腫塊位於鼻背正中線。醫師懷疑為 nasal dermoid cyst。下列哪些敘述正確？（複選）", "opts": {"A": "Dermoid cyst 是胚胎期組織融合時外胚層細胞殘留所形成的先天性病變", "B": "所有鼻部正中線 dermoid cyst 均應接受 CT 檢查評估顱內延伸", "C": "Periorbital dermoid cyst 最常見於 frontozygomatic suture 附近，顱內延伸極為罕見", "D": "Nasal dermoid 若有 intracranial extension，需同時採取顱內及顱外途徑完整切除", "E": "即使部分囊壁殘留，復發風險仍極低，因此不需追求完整切除"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "A. 正確，Dermoid cyst 為胚胎發育過程中 neuroectoderm 與 somatic ectoderm sequestration 所形成。\n\nB. 正確，所有位於正中線(midline)的 dermoid cyst 應接受 CT，以排除顱內連通及鑑別 encephalocele、glioma。\n\nC. 正確，Periorbital dermoid 最典型位置是 superolateral orbital rim/frontozygomatic suture，且顱內延伸非常少見。\n\nD. 正確，若存在 intracranial extension，需採用 combined intracranial and extracranial approach 才能完整切除。\n\nE. 錯誤，任何殘留的 dermoid 成分都可能導致 recurrence，因此必須完整切除。", "cite": "NG115 · NG115-B09-Q14", "conflict": "", "key": "鼻部**正中線** dermoid 一律要影像（CT／MRI）排除顱內延伸，並鑑別 encephalocele 與 glioma。眶周（frontozygomatic suture）dermoid 顱內延伸極罕見。囊壁殘留＝復發，必須完整切除。", "peropt": {"A": "◎ 胚胎融合時外胚層／神經外胚層殘留。", "B": "◎ 所有正中線鼻部 dermoid 均須 CT 評估顱內延伸。", "C": "◎ 眶周 dermoid 好發 frontozygomatic suture，顱內延伸極罕見。", "D": "◎ 有顱內延伸者須顱內外聯合徑路完整切除。", "E": "✗ 囊壁殘留必然復發，須追求完整切除。"}}, {"id": "3068", "sub": "B", "src": "GS", "years": [110], "stem": "一對年輕父母帶著他們的兩個月大的第二胎來門診求診。他們的第一胎與第二胎都有cleft palate. 這對父母想知道他們第三胎也有cleft palate機率是多少?", "opts": {"A": "3.14%", "B": "7.8%", "C": "9%", "D": "69%", "E": "87%"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "cite": "GS110 · GS110-B05-Q01", "conflict": "", "key": "唇顎裂再發風險的階梯：父母正常＋**1 名**患兒 → 約 **4%**；＋**2 名**患兒 → 約 **9%**；一位父母患病＋1 名患兒 → 約 17%。此題兩胎皆患病 → 9%。", "peropt": {"A": "3.14% 為圓周率誘答。", "B": "7.8% 近似值誘答。", "C": "◎ 正解：約 9%。", "D": "69% 過高。", "E": "87% 過高。"}}, {"id": "3069", "sub": "B", "src": "GS", "years": [111, 112], "stem": "下列哪兩個構造融合失敗(Failure of fusion)會造成cleft lip?", "opts": {"A": "Frontonasal prominence and lateral nasal prominence", "B": "Lateral nasal prominence and frontonasal prominence", "C": "Medial nasal prominence and lateral nasal prominence", "D": "Maxillary prominence and mandibular prominence", "E": "Medial nasal prominence and maxillary prominence"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "GS111 · GS111-B05-Q01", "conflict": "", "key": "**唇裂＝medial nasal prominence 與 maxillary prominence 融合失敗**（第 4–7 週）。顎裂則是兩側 palatal shelf 融合失敗（第 8–12 週）。\n⚠ 與 CN3071 為選項重排家族：同樣五個選項，答案從 E 變 D。", "peropt": {"A": "✗ 額鼻突與外側鼻突之間形成鼻淚溝，非唇裂。", "B": "✗ 同 A，只是順序顛倒（純誘答）。", "C": "✗ 內側鼻突與外側鼻突融合失敗與唇裂無關。", "D": "✗ 上頜突與下頜突融合失敗 → macrostomia（Tessier 7）。", "E": "◎ 正解：內側鼻突＋上頜突。"}}, {"id": "3070", "sub": "B", "src": "GS", "years": [111, 112, 114, 115], "stem": "A six-year-old boy is brought to the cleft clinic for a follow-up visit. The patient had intravelar veloplasty at 10 months of age. On perceptual speech evaluation, he was noted to have hypernasality and nasal emission. On physical examination, no fistula was noted. Nasal endoscopy showed a large coronal gap with poor lateral wall motion. Which of the following is the most appropriate management?", "opts": {"A": "Continued speech therapy", "B": "Furlow palatoplasty", "C": "Sphincter pharyngoplasty", "D": "Posterior pharyngeal flap", "E": "Palatal lift prosthesis"}, "ans": "C", "multi": false, "etype": "ai", "expl": "The patient described has VPI because of inadequate closure of the velopharyngeal port. The first step in the evaluation of VPD is perceptual speech assessment, which is usually performed around 3 or 4 years of age. A large posterior gap with coronal, circular, or bowtie closure pattern and poor lateral wall motion should be treated with a sphincter pharyngoplasty. Continued speech therapy will not correct hypernasality associated with a large coronal defect. Furlow palatoplasty is not the best technique for patients in whom the levator muscles are not sagittally oriented, as transposition would disrupt anatomically normal previously reconstructed levator sling. Posterior pharyngeal flap is best suited for sagittal or circular closure patterns. Palatal prosthesis is indicated in cases of failed speech therapy, when surgery is contraindicated.", "cite": "GS111 · GS111-B06-Q04", "conflict": "", "key": "VPI 的術式選擇看**鼻咽鏡的縫隙形態**：**coronal gap ＋ 側壁動作差 → sphincter pharyngoplasty**（借側壁組織補側壁）；sagittal gap ＋ 側壁動作good → posterior pharyngeal flap；小的中央縫隙且軟顎短 → Furlow。無瘻管故不需再修補顎裂。\n⚠ 與 CN3072 為選項重排家族：答案從 C 變 A，但正確術式始終是 sphincter pharyngoplasty。", "peropt": {"A": "✗ 已有結構性 VPI，單靠語言治療無效。", "B": "✗ Furlow 適用於軟顎短、縫隙小者。", "C": "◎ 正解：sphincter pharyngoplasty。", "D": "✗ Posterior pharyngeal flap 適用側壁動作良好的 sagittal gap。", "E": "✗ 顎抬高假體屬非手術替代，非最適處置。"}}, {"id": "3071", "sub": "B", "src": "GS", "years": [113], "stem": "下列哪兩個構造融合失敗(Failure of fusion)會造成cleft lip?", "opts": {"A": "Frontonasal prominence and lateral nasal prominence", "B": "Lateral nasal prominence and frontonasal prominence", "C": "Medial nasal prominence and lateral nasal prominence", "D": "Medial nasal prominence and maxillary prominence", "E": "Maxillary prominence and mandibular prominence"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B05-Q01", "conflict": "", "key": "與 CN3069 同題，**選項字母重排**（答案 E→D）。正確概念恆為：**medial nasal prominence ＋ maxillary prominence**。這一題組是「背字母必死」的最佳教材。", "peropt": {"A": "✗ 額鼻突＋外側鼻突。", "B": "✗ 重複誘答。", "C": "✗ 內側＋外側鼻突。", "D": "◎ 正解：內側鼻突＋上頜突。", "E": "✗ 上頜突＋下頜突 → macrostomia。"}}, {"id": "3072", "sub": "B", "src": "GS", "years": [113], "stem": "A six-year-old boy is brought to the cleft clinic for a follow-up visit. The patient had intravelar veloplasty at 10 months of age. On perceptual speech evaluation, he was noted to have hypernasality and nasal emission. On physical examination, no fistula was noted. Nasal endoscopy showed a large coronal gap with poor lateral wall motion. Which of the following is the most appropriate management?", "opts": {"A": "Sphincter pharyngoplasty", "B": "Palatal lift prosthesis", "C": "Continued speech therapy", "D": "Furlow palatoplasty", "E": "Posterior pharyngeal flap"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "GS113 · GS113-B06-Q02", "conflict": "", "key": "與 CN3070 同題，**選項字母重排**（答案 C→A）。臨床決策不變：**coronal gap ＋ 側壁動作不良 → sphincter pharyngoplasty**。", "peropt": {"A": "◎ 正解：sphincter pharyngoplasty。", "B": "✗ 顎抬高假體為非手術替代。", "C": "✗ 語言治療無法矯正結構性 VPI。", "D": "✗ Furlow 適用軟顎短、小縫隙。", "E": "✗ Posterior pharyngeal flap 需側壁動作良好。"}}, {"id": "3073", "sub": "B", "src": "GS", "years": [115], "stem": "Options for presurgical infant orthopedics include all of the following except:", "opts": {"A": "NAM", "B": "Mandibular distraction", "C": "Latham appliance", "D": "Lip taping"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "cite": "GS115 · GS115-B04-Q01", "conflict": "", "key": "術前嬰兒矯正（presurgical infant orthopedics）＝**NAM、Latham appliance、lip taping**，全部作用於**上頜與唇鼻**。Mandibular distraction 是治療下顎後縮／呼吸道阻塞的手術，不屬此類。", "peropt": {"A": "✓ NAM（鼻齒槽塑形）。", "B": "◎ 正解（除外）：下顎延長術非術前矯正。", "C": "✓ Latham 裝置。", "D": "✓ 貼唇膠帶。"}}, {"id": "3074", "sub": "B", "src": "NG", "years": [104], "stem": "Which is incorrect of the two-stage nasolabial adhesion cheiloplasty?", "opts": {"A": "Decreased tension across the maxilla", "B": "Frequently stated to be narrowing of the cleft", "C": "easier correction of nasal deformity and development of more muscle or elongation of a short lip before definitive cheiloplasty", "D": "Dissection and mobilization of the tissues in two-stage procedure are easier than in a one-stage procedure", "E": "Tension could possibly be decreased in a two-stage procedure"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B07-Q02", "conflict": "", "key": "兩階段 nasolabial adhesion 的代價就是**第一次手術留下的疤痕使第二階段的剝離更困難**。命題者把這個代價寫成優點。", "peropt": {"A": "✓ 降低上頜張力。", "B": "✓ 常被說能縮窄裂隙。", "C": "✓ 利於後續鼻部矯正、肌肉發育與短唇延長。", "D": "◎ 正解（錯誤）：兩階段因疤痕，剝離反而更困難。", "E": "✓ 張力可望降低。"}}, {"id": "3075", "sub": "B", "src": "NG", "years": [104, 107], "stem": "We use nasoalveolar molding (NAM) for reduction of cleft lip preoperatively. Which is not the complication of NAM?", "opts": {"A": "inflammation of the oral and nasal mucosa", "B": "blistering of the cheeks", "C": "trouble in feeding the infant", "D": "difficulty in centralizing a badly torqued premaxilla", "E": "pneumonia"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B07-Q03", "conflict": "", "key": "NAM 的併發症都是**局部**的：口鼻黏膜發炎、頰部起水泡、餵食困難、嚴重扭轉的前頜難以歸位。**肺炎不是 NAM 的併發症**。", "peropt": {"A": "✓ 口鼻黏膜發炎。", "B": "✓ 頰部起水泡（膠帶所致）。", "C": "✓ 餵食困難。", "D": "✓ 嚴重扭轉的前頜難以置中。", "E": "◎ 正解（非併發症）：肺炎。"}}, {"id": "3076", "sub": "B", "src": "NG", "years": [104], "stem": "Yuzuriha and Muliken classified and defined the lesser-forms of cleft lips as microform, minor-form, and mini-micro form. Which statements are correct? (複選)", "opts": {"A": "Microform cleft lip extends 3–5 mm above the normal Cupid's bow peak, i.e., 50% or less of the normal cutaneous labial height", "B": "Minor-form cleft is characterized by a notched vermilion-cutaneous junction in which the Cupid's bow peak is elevated less than 3 mm above normal.", "C": "Mini-microform cleft lip is distinguished by a disruption of the white roll (vermilion-cutaneous junction) without elevation of the Cupid's bow peak.", "D": "Features of minor-form such as deficient vermilion on medial side of the cleft and cutaneous groove and muscular depression are much obvious than those of microform.", "E": "This detailed subcategorization of the contralateral side in an asymmetrical bilateral cleft lip is important because the extent of vermilion-cutaneous disjunction determines the operative strategy."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "cite": "NG104 · NG104-B07-Q10", "conflict": "", "key": "Yuzuriha & Mulliken 的輕型唇裂三級，以 **Cupid's bow peak 抬高幅度**與 **white roll 是否中斷**界定：\n**microform**＝抬高 **3–5 mm**（≤ 正常皮膚唇高的 50%）；**minor-form**＝抬高 **<3 mm**；**mini-microform**＝white roll 中斷但 peak **未**抬高。\n本題選項 A 與 B 的定義被**對調**。", "peropt": {"A": "✗ 此為 minor-form／microform 定義互換：3–5 mm 應對應 microform 的『抬高』量，但敘述所指層級錯置。", "B": "✗ 同上，<3 mm 的描述被錯掛。", "C": "◎ mini-microform：white roll 中斷、peak 未抬高。", "D": "◎ minor-form 的唇紅缺損、皮膚溝與肌肉凹陷較 microform 明顯。", "E": "◎ 不對稱雙側唇裂的對側分級，決定手術策略。"}}, {"id": "3077", "sub": "B", "src": "NG", "years": [105], "stem": "下列哪個疾病少有唇裂或顎裂的表現？", "opts": {"A": "Crouzon syndrome", "B": "Van der Woude syndrome (VWS)", "C": "DiGeorge syndrome (CATCH 22)", "D": "Pierre Robin sequence (PRS)", "E": "Ectodermal dysplasia"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "cite": "NG105 · NG105-B01-Q06", "conflic
