<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CRF 顱顏 · 整外專科考古題</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px calc(112px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}
</style></head><body>
<div class="wrap">
<header>
 <div class="htop">
  <div><div class="htitle">CRF 顱顏 · 整外專科考古題</div>
   <div class="hsub" id="hsub">顱顏/顱面 200 題 · 已去重補完</div></div>
  <div class="stat"><b id="sc">0</b>/<span id="tot">0</span> 掌握<br><span id="acc">正確率 —</span><br><span class="saved" id="save">自動存檔</span></div>
 </div>
 <div class="bar2"><span class="seen" id="pseen"></span><span class="mast" id="pmast"></span></div>
 <div class="blabel"><span id="lseen">已作答 0</span><span id="lmast">已掌握 0</span></div>
 <div class="tabs">
  <div class="tab on" id="tabHome">首頁</div>

 </div>
</header>
<div id="app"></div></div>
<div class="foot"><div class="in">
 <button class="btn" id="act">送出答案</button>
 <button class="icon" id="pick">題號</button>
</div></div>
<div class="ovl" id="ovl"><div class="sheet">
 <div class="h3"><span id="pickTitle">選擇題號</span><button class="close" id="closePick">關閉</button></div>
 <div style="display:flex;gap:6px;align-items:center;margin:2px 0 10px;font-size:13px">
  <span style="color:var(--forest);font-weight:700">跳到本領域第</span>
  <input id="jumpN" type="number" min="1" inputmode="numeric" placeholder="題號" style="width:78px;padding:6px 8px;border:1px solid #CBD8CE;border-radius:8px;font-size:14px">
  <span style="color:var(--forest);font-weight:700">題</span>
  <button class="btn" id="jumpGo" style="padding:6px 14px;font-size:13px">前往</button>
 </div>
 <div class="grid" id="grid"></div>
 <div class="legend">
  <i><span class="dot" style="background:#fff"></span>未做</i>
  <i><span class="dot" style="background:var(--rightbg);border-color:#BFE0C8"></span>答對</i>
  <i><span class="dot" style="background:var(--green);border-color:var(--green)"></span>已掌握</i>
  <i><span class="dot" style="background:var(--wrongbg);border-color:#E7C3BC"></span>答錯</i>
  <i><span style="color:var(--star)">★</span> 收藏</i>
 </div>
</div></div>
<script>
const DATA=[{"id":"3000","sub":"B","src":"GS","years":[110],"stem":"一對年輕父母帶著他們的兩個月大的第二胎來門診求診。他們的第一胎與第二胎都有cleft palate. 這對父母想知道他們第三胎也有cleft palate機率是多少?","opts":{"A":"3.14%","B":"7.8%","C":"9%","D":"69%","E":"87%"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"唇顎裂再發風險的階梯：父母正常＋**1 名**患兒 → 約 **4%**；＋**2 名**患兒 → 約 **9%**；一位父母患病＋1 名患兒 → 約 17%。此題兩胎皆患病 → 9%。","peropt":{"A":"3.14% 為圓周率誘答。","B":"7.8% 近似值誘答。","C":"◎ 正解：約 9%。","D":"69% 過高。","E":"87% 過高。"},"cite":"GS110 · GS110-B05-Q01","conflict":""},{"id":"3001","sub":"C","src":"GS","years":[110],"stem":"以下哪種craniosynostosis是已經可以用基因檢測來偵測突變的?","opts":{"A":"Sagittal","B":"Metopic","C":"Coronal","D":"Lambdoid"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**Coronal（冠狀縫）早閉最常有可檢測的基因突變**——它與 FGFR1/2/3、TWIST1 等症候群性顱縫早閉高度相關。矢狀縫、額縫、人字縫早閉多為單發性、非症候群性。看到單側／雙側冠狀縫早閉，就該送基因檢測。","peropt":{"A":"Sagittal：最常見，但多為單發性。","B":"Metopic：三角頭，多單發。","C":"◎ 正解：Coronal，與 FGFR／TWIST1 突變相關。","D":"Lambdoid：最罕見，須與姿勢性斜頭鑑別。"},"cite":"GS110 · GS110-B05-Q03","conflict":"跨年選項數不同，視為不同題（對照 GS113-B05-Q04）"},{"id":"3002","sub":"A","src":"GS","years":[110],"stem":"初診斷一個craniofacial microsomia的新病人，建議使用下面那些工具?","opts":{"A":"Echocardiogram","B":"Renal ultrasound","C":"Cervical spin X-rays","D":"A+B+C","E":"Skeletal survey"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"CFM 初診斷的三項系統性篩檢：心臟超音波、腎臟超音波、頸椎 X 光。因為 CFM 是第一、二鰓弓發育障礙，常合併心臟、腎臟、脊椎異常。","peropt":{"A":"✓ 心臟異常常見（VSD、法洛四重症），須 echo。","B":"✓ 腎臟發育異常常見，須腎超音波。","C":"✓ 頸椎異常（融合、不穩定）會影響插管與麻醉安全。","D":"◎ 正解：A+B+C 三者皆為初診建議。","E":"✗ Skeletal survey 非例行項目，僅在懷疑其他骨骼症候群時安排。"},"cite":"GS110 · GS110-B05-Q04","conflict":""},{"id":"3003","sub":"F","src":"GS","years":[110,115],"stem":"在施行Orthognathic Surgery時，何處的血管最容易損傷造成bleeding?","opts":{"A":"Maxilla","B":"Mandible","C":"Infraorbital","D":"Temporal","E":"Zygoma"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"正顎手術出血風險最高處＝**上頜（maxilla）**。Le Fort I 下折（down-fracture）時，翼上頜接合區的 **descending palatine artery 與 pterygoid venous plexus、maxillary artery** 皆在附近，是大出血的主要來源。下頜 BSSO 的出血風險相對低。","peropt":{"A":"◎ 正解：上頜（Le Fort I down-fracture 區）。","B":"✗ 下頜 BSSO 出血風險較低。","C":"✗ 眶下為感覺神經，非主要出血源。","D":"✗ 顳部非正顎術野。","E":"✗ 顴骨非主要出血源。"},"cite":"GS110 · GS110-B06-Q01","conflict":""},{"id":"3004","sub":"A","src":"GS","years":[110],"stem":"Tessier Classification是針對Craniofacial clefts的分類，以下何種最常見?","opts":{"A":"No. 2","B":"No. 4","C":"No. 8","D":"No. 16","E":"No. 7"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"⚠ 教科書分歧題：Grabb & Smith 寫 No.7 最常見；Neligan 4e 寫 No.3。本年官方答案為 E（No.7）。作答錨定該年答案，概念上記住「No.7 與 No.3 兩者皆為常見顱顏裂」。","peropt":{"A":"No.2 少見。","B":"No.4 為 oro-ocular cleft，非最常見。","C":"No.8 常見於 Treacher Collins 的側裂組合，非單獨最常見。","D":"No.16 不存在於常用敘述（Tessier 0–14 加顱側對應）。","E":"◎ 本年答案：No.7（lateral facial cleft，經口角向耳屏延伸）。"},"cite":"GS110 · GS110-B06-Q02","conflict":""},{"id":"3005","sub":"A","src":"GS","years":[110,114,115],"stem":"下列何種syndrome是用來描述半邊臉發育不全Idiopathic progressive hemifacial atrophy (PHA)？","opts":{"A":"Apert syndrome","B":"Down's syndrome","C":"Compartment syndrome","D":"Klippel-Trenaunay syndrome","E":"Parry–Romberg syndrome"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Idiopathic progressive hemifacial atrophy（PHA）＝ Parry–Romberg syndrome：單側顏面軟組織與骨骼進行性萎縮，青春期後多自行停滯（burn out）。","peropt":{"A":"Apert＝顱縫早閉＋對稱性併指。","B":"Down's＝21 三體。","C":"Compartment syndrome＝腔室症候群，與顏面無關（此為純誘答）。","D":"Klippel–Trenaunay＝微血管／靜脈／淋巴畸形＋肢體肥大。","E":"◎ 正解：Parry–Romberg。"},"cite":"GS110 · GS110-B06-Q03","conflict":""},{"id":"3006","sub":"D","src":"GS","years":[110,114],"stem":"外傷性眶上裂症候群(superior orbital fissure syndrome)之症狀不包含下列何者？","opts":{"A":"眼外直肌 (Lateral rectus) 麻痹","B":"視力喪失 loss of vision","C":"瞳孔放大 Pupillary dilatation","D":"上眼瞼下垂 (Upper eyelid ptosis)","E":"額頭麻痺 loss of frontal sensation"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n⚠ 與 CN3145 為**極性翻轉家族**：一年問『不包含』（答 B），一年問『包含』（答 ACDE）。同一組事實，兩個答案。","peropt":{"A":"✓ 外直肌麻痺（CN VI）。","B":"◎ 正解（不包含）：視力喪失屬 orbital apex syndrome。","C":"✓ 瞳孔放大（CN III 副交感）。","D":"✓ 上眼瞼下垂（CN III）。","E":"✓ 額部感覺喪失（V1）。"},"cite":"GS110 · GS110-B06-Q04","conflict":""},{"id":"3007","sub":"E","src":"GS","years":[110,114,115],"stem":"以下哪四項為耳朵重建的原則? (複選)","opts":{"A":"合適的位置proper ear location","B":"充足血流供應的皮膚去包覆 well-vascularized thin skin envelope","C":"良好的3D 骨架 anatomical 3D framework","D":"漂亮的耳朵弧線 beautiful curves.","E":"大小越小越好 as little as possible"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"🎯 全耳重建（total ear reconstruction）的核心原則在於：把一個具細緻立體結構的軟骨支架（anatomical 3D framework）放在正確的解剖位置（proper location），再以血流充足、夠薄的皮膚封套（well-vascularized thin skin envelope）緊密包覆，才能顯現helix、antihelix、scapha等凹凸細節。重建目標是「足夠且對稱」的結構，而非越小越好；追求漂亮弧線（beautiful curves）是美學延伸，屬合理原則。⚠ 易混淆：皮膚封套要「薄」是為了透出支架細節，但血供必須充足，兩者不矛盾。","peropt":{"A":"✓(正解) 正確定位（與對側對稱、位置、傾角、大小相稱）是重建首要條件。","B":"✓(正解) 需以血流良好且薄的皮膚封套包覆，才能顯露支架的3D細節並避免壞死。","C":"✓(正解) 精細的三維軟骨支架是重建成敗的核心。","D":"✓(正解) 呈現自然耳廓弧線屬美學目標，為合理原則。","E":"✗ 錯誤，重建目標為結構「足夠且與對側相稱」，而非越小越好，故非重建原則。"},"cite":"待複查（GS 耳重建原則 記憶佐證）","conflict":""},{"id":"3009","sub":"B","src":"GS","years":[111,112,113],"stem":"下列哪兩個構造融合失敗(Failure of fusion)會造成cleft lip?","opts":{"A":"Frontonasal prominence and lateral nasal prominence","B":"Lateral nasal prominence and frontonasal prominence","C":"Medial nasal prominence and lateral nasal prominence","D":"Maxillary prominence and mandibular prominence","E":"Medial nasal prominence and maxillary prominence"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"**唇裂＝medial nasal prominence 與 maxillary prominence 融合失敗**（第 4–7 週）。顎裂則是兩側 palatal shelf 融合失敗（第 8–12 週）。\n⚠ 與 CN3071 為選項重排家族：同樣五個選項，答案從 E 變 D。","peropt":{"A":"✗ 額鼻突與外側鼻突之間形成鼻淚溝，非唇裂。","B":"✗ 同 A，只是順序顛倒（純誘答）。","C":"✗ 內側鼻突與外側鼻突融合失敗與唇裂無關。","D":"✗ 上頜突與下頜突融合失敗 → macrostomia（Tessier 7）。","E":"◎ 正解：內側鼻突＋上頜突。"},"cite":"GS111 · GS111-B05-Q01","conflict":"⚠ 同題歷屆重出（cleft lip之融合失敗構造）：正解內容恆為Medial nasal prominence + Maxillary prominence融合失敗；111/112年(3009)為E、113年(3023)因選項重排改為D。"},{"id":"3010","sub":"A","src":"GS","years":[111],"stem":"Which of the following statement about dermoid is not true?","opts":{"A":"Dermoid cysts can occur anywhere along sites of embryologic fusion, but in head","B":"Intracranial extension does not occur with lateral brow dermoid cysts.","C":"Intracranial extension can occur with midline nasal dermoid cysts.","D":". Dermoid cysts can contain hair in addition to dermis, epidermis, and sebaceous glands.","E":"Dermoid cysts in the periorbital region may be adherent to the periosteum and cause bony indentations."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Dermoid cyst 沿胚胎融合線發生。關鍵鑑別：中線鼻部 dermoid 有顱內延伸風險 → 術前必須影像；外側眉部 dermoid 風險低，但『不會發生』是過度絕對的說法。","peropt":{"A":"✓ 沿胚胎融合線任何處皆可發生，頭頸部最常見於眉外側。","B":"◎ 正解（不正確）：外側眉部 dermoid 顱內延伸雖罕見，但並非絕不發生。絕對化敘述即為破綻。","C":"✓ 中線鼻部 dermoid 可經 foramen cecum 延伸入顱。","D":"✓ 內含毛髮、真皮、表皮與皮脂腺。","E":"✓ 眶周 dermoid 可黏連骨膜並造成骨性凹痕。"},"cite":"GS111 · GS111-B05-Q02","conflict":""},{"id":"3011","sub":"C","src":"GS","years":[111,112],"stem":"What is the wrong between positional plagiocephaly and lambdoid craniosynostosis?","opts":{"A":"Ipsilateral frontal bossing was noted in positional plagiocephaly, whereas contralateral frontal bossing was noted in lambdoid craniosynostosis。","B":"The onset of symptoms of the positional plagiocephaly is after birth, whereas symptoms present at birth in lambdoid craniosynostosis。","C":"When viewed from above, ipsilateral ear is displaced posteriorly in positional plagiocephaly, whereas ipsilateral ear is displaced anteriorly in lambdoid craniosynostosis 。","D":"The head shape is parallelogram in positional plagiocephaly, whereas it is trapezoid in lambdoid craniosynostosis。","E":"Ipsilateral occipitomastoid bulge happened only in lambdoid craniosynostosis。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**姿勢性斜頭 vs 人字縫早閉**（必考鑑別）：\n姿勢性＝**平行四邊形**、同側耳**前**移、同側額部隆起、出生後才出現\n人字縫早閉＝**梯形**、同側耳**後下**移、**對側**額部隆起、出生即有、同側**枕乳突隆起**\n選項 C 把耳朵移位方向完全寫反。","peropt":{"A":"✓ 同側 vs 對側額部隆起。","B":"✓ 出生後 vs 出生即有。","C":"◎ 正解（錯誤）：姿勢性是同側耳**前**移；人字縫早閉是同側耳**後**移。","D":"✓ 平行四邊形 vs 梯形。","E":"✓ 枕乳突隆起僅見於人字縫早閉。"},"cite":"GS111 · GS111-B05-Q04","conflict":""},{"id":"3012","sub":"C","src":"GS","years":[111,112],"stem":"A 11-month-old baby presents to your office with symptoms including craniosynostosis, complete syndactylies of the hands and feet, and midface hypoplasia. Genetic testing is most likely to reveal a mutation in","opts":{"A":"TWIST","B":"Chromodomain-helicase-DNA-binding protein 7","C":"Treacle ribosome biogenesis factor 1","D":"Collagen type II alpha 1 chain","E":"FGFR"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"顱縫早閉＋**手足完全併指**＋中臉發育不全 → **Apert syndrome → FGFR2 突變**。基因對號入座：TWIST1→Saethre-Chotzen；CHD7→CHARGE；TCOF1→Treacher Collins；COL2A1→Stickler。","peropt":{"A":"TWIST → Saethre-Chotzen。","B":"CHD7 → CHARGE。","C":"TCOF1（Treacle）→ Treacher Collins。","D":"COL2A1 → Stickler。","E":"◎ 正解：FGFR（Apert 為 FGFR2）。"},"cite":"GS111 · GS111-B05-Q05","conflict":""},{"id":"3013","sub":"F","src":"GS","years":[111,112,113],"stem":"A 22-year-old woman comes to your office with concerns about her lower-third facial appearance, specifically her weak chin. She has no concerns about her midfacial appearance. She has had previous orthodontia and is in class I malocclusion. Her overall facial height is proportional in all views, but on profile, her chin appears weak in an anterior-posterior direction. Cephalometric analysis demonstrates that her SNA angle is 82° (normal 78–82) and her SNB angle is 80° (normal 78–80). What is the most appropriate surgical management?","opts":{"A":"Bilateral sagittal split and advancement","B":"Two-jaw surgery with maxillary and mandibular advancement","C":"Vertical lengthening genioplasty and bone grafting","D":"Horizontal sliding genioplasty and advancement","E":"Le Fort I setback"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"此病人：class I 咬合、臉高比例正常、SNB 正常（下頜位置正常）、僅頦部前後向後縮 → **單純 microgenia**。\n正解＝**水平滑動頦成形術（horizontal sliding genioplasty）前移**。不必動下頜骨（SNB 正常）、不必雙顎手術、也不是垂直延長（臉高正常）。\n⚠ 與 CN3191 為**選項重排家族**：完全相同的病例，正解術式從 D（GS111/112）移到 C（GS113）。","peropt":{"A":"✗ BSSO 用於下頜骨本身需前移者（此病人 SNB 正常）。","B":"✗ 雙顎手術過度。","C":"✗ 垂直延長用於臉高不足（此病人臉高正常）。","D":"◎ 正解：水平滑動頦成形前移。","E":"✗ Le Fort I setback 用於上頜前突（此病人 SNA 正常）。"},"cite":"GS111 · GS111-B06-Q01","conflict":"⚠ 同題歷屆重出（22歲女性weak chin、Class I咬合、facial height正常、SNA/SNB皆在正常範圍）：正解恆為Horizontal sliding genioplasty and advancement；111/112年(3013)為D、113年(3029)因選項重排改為C。"},{"id":"3014","sub":"C","src":"GS","years":[111,112,113,114,115],"stem":"A one-year-old presents with brachycephaly, bilateral superior orbital rim retrusion with an interorbital distance of 28 mm, and a wide nasal root. Mutation in which of the following genes is associated with these findings:","opts":{"A":"FGFR2","B":"EFNB1","C":"IRF6","D":"TWIST","E":"TCOF1"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"雙側冠狀縫早閉（短頭）＋**眼距過寬**＋鼻根寬 → **craniofrontonasal dysplasia → EFNB1**。\n這是與 Apert（FGFR2）最關鍵的鑑別：**Apert 不以眼距過寬為主徵**。\n⚠ 與 CN3118 為選項重排家族：同一題幹、答案從 B 變 D。","peropt":{"A":"FGFR2 → Apert／Crouzon／Pfeiffer。","B":"◎ 正解：EFNB1 → craniofrontonasal dysplasia。","C":"IRF6 → Van der Woude。","D":"TWIST1 → Saethre-Chotzen。","E":"TCOF1 → Treacher Collins。"},"cite":"GS111 · GS111-B06-Q02","conflict":"⚠ 同題歷屆重出（brachycephaly+雙側眶上緣後縮+hypertelorism 28mm+寬鼻根→craniofrontonasal dysplasia之基因）：正解基因恆為EFNB1；111/112/114/115年(3014)為B、113年(3026)因選項重排改為D。"},{"id":"3015","sub":"E","src":"GS","years":[111,112,113],"stem":"A 5-year-old boy is brought to your office by his parents regarding their concern for the appearance of his right ear. He is an otherwise healthy boy. On examination, the superior helix of the right ear is abnormally adherent to the temporal skin. Gentle retraction on the helix allows it to be pulled out to a normal position. What is the most likely diagnosis?","opts":{"A":"Stahl ear","B":"Cup ear","C":"Lop ear","D":"Cryptotia","E":"Helix-antihelix cartilage adhesion"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"**Cryptotia（隱耳）＝上耳輪黏著於顳部皮膚、無耳後溝**，輕拉可回正常位置。\n輕拉可回正位是與其他狹縮耳畸形的鑑別點。\n⚠ 與 CN3171 為**選項重排家族**：同一臨床情境，答案從 D 變 E。","peropt":{"A":"Stahl ear＝第三 crus。","B":"Cup ear＝上極塌陷罩下。","C":"Lop ear＝上耳輪前折下垂。","D":"◎ 正解：Cryptotia。","E":"Helix-antihelix cartilage adhesion＝杜撰誘答。"},"cite":"GS111 · GS111-B06-Q03","conflict":"⚠ 同題歷屆重出（superior helix黏於顳部皮膚、輕拉可復位至正常位置→診斷）：正解恆為Cryptotia；111/112年(3015)為D、113年(3028)因選項重排改為E。"},{"id":"3016","sub":"B","src":"GS","years":[111,112,113,114,115],"stem":"A six-year-old boy is brought to the cleft clinic for a follow-up visit. The patient had intravelar veloplasty at 10 months of age. On perceptual speech evaluation, he was noted to have hypernasality and nasal emission. On physical examination, no fistula was noted. Nasal endoscopy showed a large coronal gap with poor lateral wall motion. Which of the following is the most appropriate management?","opts":{"A":"Continued speech therapy","B":"Furlow palatoplasty","C":"Sphincter pharyngoplasty","D":"Posterior pharyngeal flap","E":"Palatal lift prosthesis"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"VPI 的術式選擇看**鼻咽鏡的縫隙形態**：**coronal gap ＋ 側壁動作差 → sphincter pharyngoplasty**（借側壁組織補側壁）；sagittal gap ＋ 側壁動作good → posterior pharyngeal flap；小的中央縫隙且軟顎短 → Furlow。無瘻管故不需再修補顎裂。\n⚠ 與 CN3072 為選項重排家族：答案從 C 變 A，但正確術式始終是 sphincter pharyngoplasty。","peropt":{"A":"✗ 已有結構性 VPI，單靠語言治療無效。","B":"✗ Furlow 適用於軟顎短、縫隙小者。","C":"◎ 正解：sphincter pharyngoplasty。","D":"✗ Posterior pharyngeal flap 適用側壁動作良好的 sagittal gap。","E":"✗ 顎抬高假體屬非手術替代，非最適處置。"},"cite":"GS111 · GS111-B06-Q04","conflict":"⚠ 同題歷屆重出（intravelar veloplasty後VPI、無fistula、內視鏡見large coronal gap且lateral wall motion差→處置）：正解恆為Sphincter pharyngoplasty(針對lateral wall動作不良者)；111/112/114/115年(3016)為C、113年(3027)因選項重排改為A。"},{"id":"3017","sub":"A","src":"GS","years":[111,112,113],"stem":"Which of the following about the treatment of Parry-Romberg syndrome are not true? (複選)","opts":{"A":"The fat grafting for the Romberg patients is not advised because the take in the diseased Romberg region is less than the take in normal regions for cosmetic procedures.","B":"The classic coup de sabre sign means there is deeper, bony involvement and osseous correction will also be needed.","C":"Because Romberg disease burns out in puberty, observation is recommended, as most cases improve over time without treatment.","D":"For adults with severe soft tissue deficiencies, the parascapular free flap is recommended over the anterolateral thigh free flap because of the better adipose-fascial fill and sculpting.","E":"Dermal fat grafts have fallen out of favor because of the high infection rate"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"Parry–Romberg 治療的唯一正確敘述是 D。此題四個錯誤選項各自埋一個陷阱：否定脂肪移植、誤解 coup de sabre、主張純觀察、誤稱 dermal fat graft 已淘汰。","peropt":{"A":"✗ 脂肪移植仍是主力；病灶區 take 較差不構成禁忌。","B":"✗ coup de sabre 是額部線狀硬皮病的皮膚溝痕，並不等同深層骨侵犯的證據。","C":"✗ 疾病雖在青春期後停滯，但已喪失的組織不會自行回復，仍需重建。","D":"◎ 正解：成人嚴重軟組織缺損時，parascapular free flap 的脂肪筋膜填充與雕塑性優於 ALT。","E":"✗ Dermal fat graft 仍在使用，並非因高感染率而淘汰。"},"cite":"GS111 · GS111-B06-Q05","conflict":""},{"id":"3018","sub":"E","src":"GS","years":[111],"stem":"An eleven-year-old girl presents in the clinic with right ear deformity shown in the figure. Which type of microtia does it fall into based on Nagata's classification?","opts":{"A":"Anotia","B":"Lobule type","C":"Concha type","D":"Small concha type","E":"Atypical microtia"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"**Nagata 小耳症分類**：**lobule type**（有耳垂，無耳甲、外耳道、耳屏）、concha type（有耳甲與外耳道）、small concha type、anotia、atypical。本題殘存耳＋耳垂但無耳甲 → **lobule type**。","peropt":{"A":"Anotia＝完全無耳。","B":"◎ 正解：Lobule type。","C":"Concha type 有耳甲。","D":"Small concha type。","E":"Atypical 非典型。"},"cite":"GS111 · GS111-B06-Q06","conflict":""},{"id":"3019","sub":"A","src":"GS","years":[111],"stem":"Which type of Tessier craniofacial cleft is shown in the figure?","opts":{"A":"No. 1 cleft","B":"No. 3 cleft","C":"No. 5 cleft","D":"No. 7 cleft","E":"No. 9 cleft"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Tessier No.3＝oro-naso-ocular cleft，行經唇、鼻翼基部、內眥／淚器，是最具代表性的斜裂。","peropt":{"A":"No.1 經鼻穹窿旁。","B":"◎ 正解：No.3，口—鼻—眼裂。","C":"No.5 少見，經上唇外側至下眼瞼中段。","D":"No.7 為橫向口角裂（lateral facial cleft）。","E":"No.9 為眶上外側裂。"},"cite":"GS111 · GS111-B06-Q07","conflict":""},{"id":"3020","sub":"D","src":"GS","years":[111],"stem":"Which fracture is most likely to require operative intervention?","opts":{"A":"Anterior table frontal sinus fracture with obstruction of the nasofrontal duct.","B":"Orbital roof fracture extending into the lateral wall.","C":"Orbital floor fracture 1cm in diameter in a patient without diplopia.","D":"Concomitant LeFort I and ipsilateral ZMC fracture with normal occlusion.","E":"Nasal bone fracture without displacement."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"顏面骨折需手術的關鍵不是骨折本身，而是**功能性後果**。**額竇前壁骨折合併鼻額管阻塞** → 必然導致黏液囊腫／膿腫，務必處理。反之：無複視的小眶底骨折、無移位鼻骨骨折、咬合正常的 Le Fort I＋ZMC，皆可觀察。","peropt":{"A":"◎ 正解：鼻額管阻塞 → 引流受阻 → 須手術。","B":"✗ 眶頂骨折延伸至外側壁，若無功能障礙可觀察。","C":"✗ 1 cm 眶底骨折且無複視 → 觀察。","D":"✗ 咬合正常 → 非手術絕對適應症。","E":"✗ 無移位鼻骨骨折 → 觀察。"},"cite":"GS111 · GS111-B07-Q01","conflict":""},{"id":"3021","sub":"E","src":"GS","years":[111,114],"stem":"關於Otoplasty，下述哪項是錯誤的? (單選)","opts":{"A":"Most otoplasty procedures are best performed ≥3 years old when most ear growth is completed.","B":"Otoplasty should aim to achieve symmetry on frontal view","C":"Ideally, molding of the ear is started between 1 and 3 weeks old when maternal estrogens in the child facilitate cartilage manipulation","D":"Stahl deformity describes the absence or weakness of antihelical fold with/without overgrown concha","E":"Patients with cryptotia have a superior helix that is attached to the postauricular skin without a sulcus"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"**Stahl deformity ＝ 第三個 antihelix crus**，使耳輪呈尖角（『Spock ear』）。凡把 Stahl 寫成『antihelical fold 缺失／減弱、concha 過度發育』者即錯——那是 **prominent ear（招風耳）** 的描述。\n本題（GS111/114）把破綻搬到 **D**：Stahl 被錯寫成『antihelical fold 缺失／concha 過度發育』（那是招風耳）。同時 A 已改為 ≥3 歲（正確）。與 CN3166 對照，可見『正確 Stahl 定義』與『錯誤 Stahl 定義』兩版在不同年度互換。","peropt":{"A":"✓ ≥3 歲（本版已修正）。","B":"✓ 正面觀對稱。","C":"✓ 出生後 1–3 週塑形。","D":"◎ 正解（錯誤）：此為 prominent ear 描述，非 Stahl。","E":"✓ Cryptotia 定義正確。"},"cite":"GS111 · GS111-B09-Q04","conflict":"選項重排家族：與 GS113-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"},{"id":"3024","sub":"C","src":"GS","years":[113],"stem":"以下哪種craniosynostosis是已經可以用基因檢測for mutation detection?","opts":{"A":"Sagittal","B":"Metopic","C":"Coronal","D":"Lambdoid","E":"Bilambdoid"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"與 CN3113 同題（GS110／GS113 兩年）。**冠狀縫早閉**是最值得送基因檢測者，因其與 FGFR1/2/3、TWIST1 高度相關。","peropt":{"A":"Sagittal：最常見但多為單發性。","B":"Metopic：三角頭。","C":"◎ 正解：Coronal。","D":"Lambdoid：最罕見。","E":"Bilambdoid：罕見組合。"},"cite":"GS113 · GS113-B05-Q04","conflict":"跨年選項數不同，視為不同題（對照 GS110-B05-Q03）"},{"id":"3025","sub":"A","src":"GS","years":[113],"stem":"有關dermoid 何者正確? (複選)","opts":{"A":"Intracranial extension will never occur with lateral brow dermoid cysts.","B":"Dermoid cysts can occur anywhere along sites of embryologic fusion.","C":"Intracranial extension can occur with midline nasal dermoid cysts.","D":"Dermoid cysts can contain hair in addition to dermis, epidermis, and sebaceous glands.","E":"Dermoid cysts in the periorbital region may be adherent to the periosteum and cause bony indentations."},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"與 CN3004 為同一概念的正向版本。記住：中線鼻部 dermoid 可入顱；外側眉部『罕見但非不可能』。凡出現 never／always 的絕對敘述，先懷疑。","peropt":{"A":"✗ 『never』過度絕對，故為錯誤敘述。","B":"◎ 沿胚胎融合線任何處。","C":"◎ 中線鼻部可顱內延伸。","D":"◎ 可含毛髮。","E":"◎ 可黏連骨膜致骨性凹痕。"},"cite":"GS113 · GS113-B05-Q05","conflict":""},{"id":"3030","sub":"E","src":"GS","years":[110,112,113],"stem":"關於Otoplasty，下述哪項是錯誤的?","opts":{"A":"Otoplasty should aim to achieve symmetry on frontal view","B":"Most otoplasty procedures are best performed ≥3 years old when most ear growth is completed.","C":"Ideally, molding of the ear is started between 1 and 3 weeks old when maternal estrogens in the child facilitate cartilage manipulation","D":"Stahl deformity describes the absence or weakness of antihelical fold with/without overgrown concha","E":"Patients with cryptotia have a superior helix that is attached to the postauricular skin without a sulcus"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 與同型題目相同，考 Otoplasty 與先天耳畸形定義；唯一錯誤敘述為選項 D。Stahl deformity（Stahl 耳）的本質是 antihelix 多出一條異常第三腳（third crus）向上外橫越 scapha，使 helix 呈尖角外觀；D 所述「antihelical fold 缺失/減弱±conchal overgrowth」實為 Prominent ear（招風耳）的定義。⚠ 本題屬「選項重排家族」：與 GS114/GS111-B09-Q04 選項集合相同但字母對應不同，務必記『概念』而非背『字母位置』，否則跨年度換位即會答錯。","peropt":{"A":"✗ 敘述正確。Otoplasty 目標之一為 frontal view 上達成兩耳對稱。","B":"✗ 敘述正確。多數 otoplasty 於 ≥3 歲後施行，因耳廓生長大致完成。","C":"✗ 敘述正確。Ear molding 理想於產後 1–3 週開始，母體 estrogen 殘存使軟骨易塑形。","D":"✓（正解）錯誤敘述。所述為 Prominent ear（招風耳）定義；Stahl deformity 應為 antihelix 異常第三腳橫越 scapha、使 helix 呈尖角。","E":"✗ 敘述正確。Cryptotia 之 superior helix 黏附於 postauricular skin 且無 sulcus。"},"cite":"原檔詳解","conflict":"選項重排家族：與 GS114-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 GS111-B09-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出（Otoplasty何者錯誤）：110年(3008)答A—誤述手術年齡「≥7歲」(正解應≥3歲、耳廓發育近完成)，該題Stahl描述(third crus)為正確；112年(3022)、113年(3030)把年齡改回≥3歲(該選項變正確)，改以Stahl deformity定義為陷阱—誤述為「absence/weakness of antihelical fold ± overgrown concha」(此為prominent ear/招風耳的描述，Stahl's ear實為出現異常third crus)，故答D。記概念不記字母：①otoplasty約3歲後施行②ear molding出生後1–3週內開始③Stahl=third crus、cryptotia=上緣黏於顳部無sulcus。"},{"id":"3031","sub":"F","src":"GS","years":[114],"stem":"Which of these answers correctly associates a category of mandible hypoplasia seen in the setting of a patient with CFM, with the correct treatment strategy?","opts":{"A":"Type III, treat at 2 years of age with a costochondral graft to definitively reconstruct the TMJ","B":"Type I, treat at 5 to 7 years of age with unilateral sagittal split osteotomy to improve facial symmetry and contour","C":"Type IIb, treat at 5 to 7 years of age with distraction osteogenesis to create a pseudo-TMJ","D":"Type III, treat at 2 to 3 years of age with a costochondral graft to reconstruct TMJ and free soft tissue transfer to improve facial contour"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"CFM 下頜發育不全的 **Pruzansky–Kaban 分型與治療**配對：\n**Type I／IIa**：下頜與 TMJ 大致存在 → 觀察或正顎\n**Type IIb**：髁突／關節窩位置異常但存在 → **牽引成骨造 pseudo-TMJ**\n**Type III**：髁突與關節窩缺如 → **肋軟骨移植重建 TMJ**（約 6 歲以後，非 2 歲）\n本題正解 C（IIb ＋ 5–7 歲 distraction）。","peropt":{"A":"✗ Type III 不宜 2 歲即肋軟骨移植（過早）。","B":"✗ Type I 通常不需 5–7 歲即單側 BSSO。","C":"◎ 正解：Type IIb，5–7 歲以牽引成骨造 pseudo-TMJ。","D":"✗ Type III 肋軟骨重建時機非 2–3 歲。"},"cite":"GS114 · GS114-B05-Q04","conflict":""},{"id":"3032","sub":"B","src":"GS","years":[115],"stem":"Options for presurgical infant orthopedics include all of the following except:","opts":{"A":"NAM","B":"Mandibular distraction","C":"Latham appliance","D":"Lip taping"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"術前嬰兒矯正（presurgical infant orthopedics）＝**NAM、Latham appliance、lip taping**，全部作用於**上頜與唇鼻**。Mandibular distraction 是治療下顎後縮／呼吸道阻塞的手術，不屬此類。","peropt":{"A":"✓ NAM（鼻齒槽塑形）。","B":"◎ 正解（除外）：下顎延長術非術前矯正。","C":"✓ Latham 裝置。","D":"✓ 貼唇膠帶。"},"cite":"GS115 · GS115-B04-Q01","conflict":""},{"id":"3033","sub":"A","src":"GS","years":[115],"stem":"A first-year plastic surgery resident is reviewing craniofacial development with her mentor. She is asked about derivatives of the first pharyngeal arch. Which of the following structures is derived from the first pharyngeal arch? (複選)","opts":{"A":"Maxillary process","B":"Mandibular process","C":"Meckel's cartilage","D":"Reichert's cartilage"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"第一鰓弓衍生物：上頜突、下頜突、Meckel's cartilage（→ 錘骨、砧骨）、咀嚼肌、三叉神經。Reichert's cartilage 屬第二鰓弓（→ 鐙骨、莖突、舌骨小角）。","peropt":{"A":"◎ 上頜突。","B":"◎ 下頜突。","C":"◎ Meckel's cartilage。","D":"✗ Reichert's cartilage 為第二鰓弓。"},"cite":"GS115 · GS115-B04-Q02","conflict":""},{"id":"3034","sub":"C","src":"GS","years":[115],"stem":"Which of the following cranial sutures closes normally in infancy?","opts":{"A":"Sagittal","B":"Lambdoid","C":"Metopic","D":"Coronal","E":"Squamosal"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**額縫（metopic suture）是唯一在嬰兒期正常閉合的顱縫**（約 3–9 個月，最晚 2 歲前）。其餘顱縫要到成年才閉合。因此『額縫閉合』本身不等於病態——但**過早**閉合會造成三角頭。","peropt":{"A":"矢狀縫成年才閉合。","B":"人字縫成年才閉合。","C":"◎ 正解：額縫，嬰兒期正常閉合。","D":"冠狀縫成年才閉合。","E":"鱗狀縫成年才閉合。"},"cite":"GS115 · GS115-B04-Q05","conflict":""},{"id":"3035","sub":"D","src":"GS","years":[115],"stem":"A 42-year-old presents with a saddle nose deformity. She has a remote history of nasal trauma occurring more than 1 year ago, for which she did not seek any medical attention. Which of the following did she most likely have?","opts":{"A":"Nasal bone and septal fracture","B":"Nasal bone fracture","C":"Septal hematoma","D":"Septal fracture"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**鞍鼻的元凶是未處理的鼻中隔血腫**：血腫剝離軟骨膜 → 軟骨失去血供 → 缺血性壞死 → 鼻背塌陷。單純鼻骨或鼻中隔骨折不會如此。這是「鼻外傷必須翻開看鼻中隔」的理由。","peropt":{"A":"✗ 骨折本身不致軟骨壞死。","B":"✗ 同上。","C":"◎ 正解：鼻中隔血腫 → 軟骨壞死 → 鞍鼻。","D":"✗ 單純鼻中隔骨折不致塌陷。"},"cite":"GS115 · GS115-B06-Q01","conflict":""},{"id":"3036","sub":"C","src":"GS","years":[115],"stem":"A 45-year-old patient underwent unilateral decompressive craniectomy by neurosurgery for intracerebral hemorrhage after a fall. The patient's bone graft is stored in the hospital tissue bank for possible use for cranioplasty reconstruction.The patient presents to the plastic surgery clinic 8 months later to discuss cranioplasty planning. The scalp has healed well with no evidence of wound dehiscence or infection.Which strategy for reconstruction is associated with the lowest likelihood of infection?","opts":{"A":"Single-stage reconstruction with the patient's stored bone graft because of the autologous nature of the implant material, lack of immunogenicity, and sterile storage in the tissue bank","B":"Two-staged approach with placement of a tissue expander(s) adjacent to the defect in the first stage,followed by tissue expander removal and new alloplastic implant placement 2 months later","C":"Single-stage reconstruction with titanium mesh implant and a tension-free scalp closure","D":"Single-stage use of a solid alloplastic implant, utilizing generous galeal scoring on the elevated scalp flap side to ensure achievement of a tension-free closure"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"顱骨成形術的感染率排序：**自體冷凍骨瓣感染／吸收率最高**（缺乏血流、儲存過程污染風險）。**鈦網（titanium mesh）＋無張力頭皮縫合感染率最低**。組織擴張器會增加額外的感染機會。","peropt":{"A":"✗ 儲存的自體骨瓣感染與再吸收率高，並非最安全。","B":"✗ 兩階段加擴張器，額外增加感染風險。","C":"◎ 正解：鈦網＋無張力縫合。","D":"✗ 實心人工植入物體積大、死腔多，感染率高於鈦網。"},"cite":"GS115 · GS115-B06-Q02","conflict":""},{"id":"3037","sub":"B","src":"GS","years":[115],"stem":"A 53-year-old man with previous squamous cell carcinoma of the lower lip treated with wedge resection and radiation now presents with recurrence of a 3-cm ulcerated lesion involving 75% of the lower lip. After resection, which of the following reconstructive options would be most appropriate?","opts":{"A":"Karapandzic flap","B":"Abbe and Estlander flaps","C":"Radial forearm flap with palmaris longus tendon","D":"Gilles flap","E":"Facial artery myomucosal flap"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 下唇缺損達75%（>2/3）且曾接受放射治療（radiation）與楔形切除，鄰近唇/頰組織已因放療纖維化，局部唇瓣（Karapandzic、Abbe/Estlander、Gillies）之組織量與血供均受限。此時最適當者為橈側前臂游離皮瓣併掌長肌腱（radial forearm free flap with palmaris longus tendon），以肌腱作懸吊帶維持口輪匝肌張力、避免下唇下垂/流涎（ectropion/drooling）。⚠ 易混淆：放療病史是排除局部大範圍旋轉瓣的關鍵；FAMM瓣血供也可能受放療影響。","peropt":{"A":"✗ Karapandzic瓣用於局部組織，放療後組織量不足且血供受限，且75%缺損過大。","B":"✗ Abbe/Estlander取自對側唇，放療與大缺損下組織不敷使用。","C":"✓(正解) 大缺損＋放療後，橈側前臂游離瓣併掌長肌腱作懸吊帶最適當。","D":"✗ Gillies扇形瓣為局部瓣，放療後不適合且缺損過大。","E":"✗ FAMM瓣組織量有限且血供可能受放療影響，無法重建75%全層缺損。"},"cite":"待複查（GS 唇重建/游離皮瓣 記憶佐證）","conflict":""},{"id":"3038","sub":"D","src":"GS","years":[115],"stem":"外傷性眶上裂症候群 (superior orbital fissure syndrome) 之症狀包含下列何者？ (複選)","opts":{"A":"眼外直肌 (Lateral rectus) ⿇痹","B":"視⼒喪失 loss of vision","C":"瞳孔放⼤ Pupillary dilatation","D":"上眼瞼下垂 (Upper eyelid ptosis)","E":"額頭⿇痺 loss of frontal sensation"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n⚠ 與 CN3142 為**極性翻轉家族**（問『包含』，答 ACDE）。**背『答案 B』的人在這一年全錯**；記住『視力喪失＝orbital apex』才不會被翻轉打倒。","peropt":{"A":"◎ 外直肌麻痺（CN VI）。","B":"✗ 視力喪失屬 orbital apex syndrome。","C":"◎ 瞳孔放大。","D":"◎ 上眼瞼下垂。","E":"◎ 額部感覺喪失（V1）。"},"cite":"GS115 · GS115-B06-Q05","conflict":""},{"id":"3039","sub":"E","src":"GS","years":[115],"stem":"下列關於 prominent ear（招風耳）矯正術之敘述，何者正確？","opts":{"A":"Mustarde technique 主要是以 concha-mastoid sutures 將 conchal bowl 固定至 mastoid fascia。","B":"Furnas sutures 的主要目的為重建 antihelical fold。","C":"Stenstrom technique 藉由 anterior cartilage scoring 增加耳軟骨 pliability，常作為 Mustarde sutures 的輔助技術。","D":"過度矯正 middle third of the ear 會造成 cauliflower ear deformity。","E":"Incisionless otoplasty 的原理主要為切除部分 conchal cartilage 後，再以 buried sutures 固定耳廓位置。"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"招風耳三大術式對號入座：\n**Mustardé ＝ 後方褥式縫合，重建 antihelical fold**\n**Furnas ＝ concha-mastoid 縫合，把外突耳甲後推**\n**Stenström ＝ 前方軟骨劃痕（anterior scoring），增加軟骨可塑性，常作 Mustardé 的輔助**","peropt":{"A":"✗ concha-mastoid 縫合是 **Furnas**，非 Mustardé。","B":"✗ Furnas 的目的是後推耳甲，非重建 antihelical fold。","C":"◎ 正解：Stenström 前方軟骨劃痕，輔助 Mustardé。","D":"✗ 過度矯正中三分之一致『telephone ear』，非 cauliflower ear。","E":"✗ Incisionless otoplasty 僅以埋藏縫線塑形，不切除軟骨。"},"cite":"GS115 · GS115-B09-Q02","conflict":""},{"id":"3041","sub":"E","src":"NG","years":[104],"stem":"下列關於耳朵整形術(otoplasy)的敘述何者錯誤?","opts":{"A":"耳朵整形術指的是利用手術介入改變耳朵其外觀與位置。","B":"在評估耳朵外觀的時候，一般常先評估其整體大小與形狀，然後分成上、中、下三個部份分別評估，最後並評估其兩耳對稱性。","C":"Tanzer學者將狹縮耳(constricted ear)分成三種型態；type I – 只有牽涉helix; type II – 包含helix and scapha; type III – 嚴重的杯狀耳(extreme cupping of the ear)。","D":"臉部拉皮手術因為不會牽扯到耳朵的部分，所以不會造成耳朵外觀的影響。","E":"耳朵整形術的再次手術(secondary procedure)並非不常見，其中矯正不足(under-correction)最常發生在上三分之一耳(upper pole of the ear)。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"**臉部拉皮確實會影響耳朵外觀**（耳垂變形、pixie ear、耳屏移位皆為 facelift 已知併發症），故選項 D『不會造成耳朵影響』為錯。\n另記 Tanzer 狹縮耳三型：I＝僅 helix；II＝helix＋scapha；III＝嚴重杯狀耳。","peropt":{"A":"✓ 改變耳朵外觀與位置。","B":"✓ 先評估大小形狀，再分上中下三部，最後看對稱。","C":"✓ Tanzer 狹縮耳三型。","D":"◎ 正解（錯誤）：拉皮會影響耳朵（pixie ear、耳垂變形）。","E":"✓ 二次手術不罕見，矯正不足最常見於上極。"},"cite":"NG104 · NG104-B05-Q01","conflict":""},{"id":"3042","sub":"F","src":"NG","years":[104],"stem":"大於多少百分比的風濕性關節炎患者，其TMJ功能也受到影響？","opts":{"A":"30%","B":"40%","C":"50%","D":"60%","E":"70%"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"🎯 類風濕性關節炎（rheumatoid arthritis, RA）為全身性侵犯滑膜關節的自體免疫疾病，顳顎關節（TMJ）亦為滑膜關節，約有超過50%的RA患者其TMJ功能受影響，可表現關節疼痛、開口受限、下顎後縮甚至前開咬（anterior open bite）。⚠ 易混淆：RA侵犯TMJ常為雙側、對稱；長期可致髁突吸收（condylar resorption）造成進行性咬合改變。","peropt":{"A":"✗ 30%低於文獻所述比例。","B":"✗ 40%仍偏低。","C":"✓(正解) 超過50%的RA患者TMJ功能受影響。","D":"✗ 60%高於一般所述門檻。","E":"✗ 70%過高。"},"cite":"待複查（NG TMJ/RA 記憶佐證）","conflict":""},{"id":"3043","sub":"E","src":"NG","years":[104],"stem":"下列有關小耳症手術的敘述何者為非?","opts":{"A":"在第一階段軟骨framework植入時，為了避免軟骨暴露，宜將軟骨至於SMAS之下。","B":"Brent重建手術分為四個階段。","C":"對於雙側小耳症的患者，一般建議先進行auricular reconstruction，再做middle ear surgery。","D":"Nagata小耳症耳朵重建手術的第二階段為將耳朵翻起並於auriculocephalic sulcus中墊入軟骨，Brent則是在第三階段進行類似手術。","E":"Nagata使用temporoparietal fascia覆蓋framework的後緣，Brent則是使用turnover \"book flap\" of occipitalis fascia。"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"小耳症重建的關鍵細節：**第一階段軟骨框架應置於皮下（乳突區皮膚囊袋），非 SMAS 之下**——SMAS 下太深會影響框架輪廓的顯現。Brent 四階段、Nagata 二階段，兩者的翻耳與筋膜覆蓋策略不同。","peropt":{"A":"◎ 正解（為非）：框架應置於皮下囊袋，非 SMAS 之下。","B":"✓ Brent 分四階段。","C":"✓ 雙側小耳症宜先做耳廓重建，再中耳手術。","D":"✓ Nagata 第二階段翻耳墊軟骨；Brent 於第三階段。","E":"✓ Nagata 用顳頂筋膜覆蓋框架後緣；Brent 用枕肌筋膜翻轉瓣。"},"cite":"NG104 · NG104-B06-Q07","conflict":""},{"id":"3045","sub":"B","src":"NG","years":[104],"stem":"Which is incorrect of the two-stage nasolabial adhesion cheiloplasty?","opts":{"A":"Decreased tension across the maxilla","B":"Frequently stated to be narrowing of the cleft","C":"easier correction of nasal deformity and development of more muscle or elongation of a short lip before definitive cheiloplasty","D":"Dissection and mobilization of the tissues in two-stage procedure are easier than in a one-stage procedure","E":"Tension could possibly be decreased in a two-stage procedure"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"兩階段 nasolabial adhesion 的代價就是**第一次手術留下的疤痕使第二階段的剝離更困難**。命題者把這個代價寫成優點。","peropt":{"A":"✓ 降低上頜張力。","B":"✓ 常被說能縮窄裂隙。","C":"✓ 利於後續鼻部矯正、肌肉發育與短唇延長。","D":"◎ 正解（錯誤）：兩階段因疤痕，剝離反而更困難。","E":"✓ 張力可望降低。"},"cite":"NG104 · NG104-B07-Q02","conflict":""},{"id":"3046","sub":"B","src":"NG","years":[104,107],"stem":"We use nasoalveolar molding (NAM) for reduction of cleft lip preoperatively. Which is not the complication of NAM?","opts":{"A":"inflammation of the oral and nasal mucosa","B":"blistering of the cheeks","C":"trouble in feeding the infant","D":"difficulty in centralizing a badly torqued premaxilla","E":"pneumonia"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"NAM 的併發症都是**局部**的：口鼻黏膜發炎、頰部起水泡、餵食困難、嚴重扭轉的前頜難以歸位。**肺炎不是 NAM 的併發症**。","peropt":{"A":"✓ 口鼻黏膜發炎。","B":"✓ 頰部起水泡（膠帶所致）。","C":"✓ 餵食困難。","D":"✓ 嚴重扭轉的前頜難以置中。","E":"◎ 正解（非併發症）：肺炎。"},"cite":"NG104 · NG104-B07-Q03","conflict":""},{"id":"3047","sub":"B","src":"NG","years":[104],"stem":"About vermilion, which one is incorrect? (複選)","opts":{"A":"Its appearance is much better matched with the use of nonkeratinized mucosa than the use of keratinized skin.","B":"FAMM (facial artery musculomucosal) flap, based superiorly for the upper lip and inferiorly for the lower lip, can give a good match for this specialized tissue.","C":"In the early days of vermilion reconstruction, jejunal and gastric mucosa were attempted. However, no hypersecretory or acidic contents ulcerogenic problems can be noted.","D":"The use of lingual mucosa or tattooing of keratinized skin can also be acceptable.","E":"It is a specialized type of tissue but is easy to reproduce."},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"🎯 唇紅（vermilion）為高度特化之過渡黏膜組織，重建甚困難、不易複製；以「非角化黏膜（nonkeratinized mucosa）」重建外觀最相配，FAMM瓣（上唇上蒂、下唇下蒂）是良好選擇，舌黏膜或角化皮膚刺青亦屬可接受替代。本題選「錯誤」敘述。⚠ 易混淆：早期曾嘗試空腸/胃黏膜重建唇紅，但其高分泌與酸性內容物確會造成潰瘍（ulcerogenic）問題，故C「無此問題」為錯；E謂「容易複製」亦與其高度特化、難重建之特性相反。","peropt":{"A":"✗（正確敘述，非答案）以非角化黏膜比角化皮膚更能匹配唇紅外觀，正確。","B":"✗（正確敘述，非答案）FAMM瓣上唇上蒂、下唇下蒂可提供良好匹配，正確。","C":"✓(正解，屬錯誤敘述) 空腸/胃黏膜有高分泌與酸性致潰瘍問題，稱「無問題」為錯。","D":"✗（正確敘述，非答案）舌黏膜或角化皮膚刺青為可接受替代，正確。","E":"✓(正解，屬錯誤敘述) 唇紅高度特化且「不易」複製，稱「容易複製」為錯。"},"cite":"待複查（NG 唇紅重建 記憶佐證）","conflict":""},{"id":"3048","sub":"A","src":"NG","years":[104],"stem":"What kinds of characters can be noted in Velocardiofacial syndrome? (複選)","opts":{"A":"11q chromosomal deletion","B":"bird-like facial appearance","C":"soft palate dysfunction","D":"developmental delay","E":"various cardiac conditions"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"Velocardiofacial（Shprintzen）syndrome＝22q11.2 缺失，非 11q。三大核心：顎咽功能不全、心臟畸形、特殊面容（鳥面、鼻樑寬高）。","peropt":{"A":"✗ 應為 22q11.2 缺失，不是 11q。","B":"◎ 鳥樣面容（長臉、鼻根寬、下頜後縮）。","C":"◎ 軟顎功能異常／顎咽閉鎖不全，常有黏膜下裂顎。","D":"◎ 發展遲緩、學習障礙。","E":"◎ 圓錐動脈幹型心臟缺損。"},"cite":"NG104 · NG104-B07-Q08","conflict":""},{"id":"3049","sub":"F","src":"NG","years":[104],"stem":"In dentofacial deformities of orthognathic patients, which characters and surgical approach are correct when we encounter the patients with vertical maxillary excess? (複選)","opts":{"A":"typically associated with lip incompetence, mentalis strain, and an excessive degree of gingival show (long-face syndrome)","B":"The treatment approach is to impact the maxilla","C":"The mandible rotates counterclockwise to maintain occlusion","D":"The mandible rotates clockwise to maintain occlusion","E":"A genioplasty may be required to re-established proper chin position"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"**垂直上頜過長（vertical maxillary excess, long-face syndrome）**：唇閉合不全、頦肌緊張、露牙齦過多。治療＝**上頜上推（impaction）**，下頜隨之**逆時針（counterclockwise）旋轉**維持咬合；必要時併頦成形。選項 D（順時針）方向錯。","peropt":{"A":"◎ 長臉症候群特徵。","B":"◎ 治療為上頜 impaction。","C":"◎ 下頜逆時針旋轉維持咬合。","D":"✗ 非順時針旋轉。","E":"◎ 可能需頦成形重建頦部位置。"},"cite":"NG104 · NG104-B07-Q09","conflict":""},{"id":"3050","sub":"B","src":"NG","years":[104],"stem":"Yuzuriha and Muliken classified and defined the lesser-forms of cleft lips as microform, minor-form, and mini-micro form. Which statements are correct? (複選)","opts":{"A":"Microform cleft lip extends 3–5 mm above the normal Cupid's bow peak, i.e., 50% or less of the normal cutaneous labial height","B":"Minor-form cleft is characterized by a notched vermilion-cutaneous junction in which the Cupid's bow peak is elevated less than 3 mm above normal.","C":"Mini-microform cleft lip is distinguished by a disruption of the white roll (vermilion-cutaneous junction) without elevation of the Cupid's bow peak.","D":"Features of minor-form such as deficient vermilion on medial side of the cleft and cutaneous groove and muscular depression are much obvious than those of microform.","E":"This detailed subcategorization of the contralateral side in an asymmetrical bilateral cleft lip is important because the extent of vermilion-cutaneous disjunction determines the operative strategy."},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"Yuzuriha & Mulliken 的輕型唇裂三級，以 **Cupid's bow peak 抬高幅度**與 **white roll 是否中斷**界定：\n**microform**＝抬高 **3–5 mm**（≤ 正常皮膚唇高的 50%）；**minor-form**＝抬高 **<3 mm**；**mini-microform**＝white roll 中斷但 peak **未**抬高。\n本題選項 A 與 B 的定義被**對調**。","peropt":{"A":"✗ 此為 minor-form／microform 定義互換：3–5 mm 應對應 microform 的『抬高』量，但敘述所指層級錯置。","B":"✗ 同上，<3 mm 的描述被錯掛。","C":"◎ mini-microform：white roll 中斷、peak 未抬高。","D":"◎ minor-form 的唇紅缺損、皮膚溝與肌肉凹陷較 microform 明顯。","E":"◎ 不對稱雙側唇裂的對側分級，決定手術策略。"},"cite":"NG104 · NG104-B07-Q10","conflict":""},{"id":"3051","sub":"B","src":"NG","years":[105],"stem":"下列哪個疾病少有唇裂或顎裂的表現？","opts":{"A":"Crouzon syndrome","B":"Van der Woude syndrome (VWS)","C":"DiGeorge syndrome (CATCH 22)","D":"Pierre Robin sequence (PRS)","E":"Ectodermal dysplasia"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"**Crouzon 是顱縫早閉症候群，不以唇顎裂為表現**。其餘四者皆與裂顎高度相關：Van der Woude（IRF6，下唇窩）、DiGeorge（22q11.2，常黏膜下裂顎）、PRS（約半數裂顎）、外胚層發育不良。","peropt":{"A":"◎ 正解：Crouzon 少有唇顎裂。","B":"✗ VWS 是最常見的症候群性唇顎裂。","C":"✗ DiGeorge 常合併黏膜下裂顎與顎咽功能不全。","D":"✗ PRS 約 50% 合併裂顎。","E":"✗ 外胚層發育不良常合併裂。"},"cite":"NG105 · NG105-B01-Q06","conflict":""},{"id":"3052","sub":"F","src":"NG","years":[105,107],"stem":"Distraction osteogenesis requires successful augmentation of bone formation, which of the following factor has negative impact?","opts":{"A":"device stability","B":"a sufficient consolidation period.","C":"a latency period","D":"a gradual distraction (activation) period","E":"complete osteotomy with periostium dissection"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"牽引成骨的原則：需要**器械穩定、潛伏期（latency）、漸進牽引、足夠鞏固期（consolidation）**。**完整截骨並剝離骨膜反而有害**——骨膜是新骨形成的關鍵血供與成骨細胞來源，過度剝離會削弱骨再生。故 E 為負面因子。","peropt":{"A":"✓ 器械穩定有利成骨。","B":"✓ 足夠鞏固期。","C":"✓ 潛伏期。","D":"✓ 漸進牽引期。","E":"◎ 正解（負面）：完整截骨＋骨膜剝離會破壞血供與成骨。"},"cite":"NG105 · NG105-B02-Q05","conflict":""},{"id":"3053","sub":"A","src":"NG","years":[104,105],"stem":"Regarding indications for osseointegrated nasal reconstruction，choose wrong answer:","opts":{"A":"preferred Appearance","B":"significant scarring in potential autogenous donor sites.","C":"reconstruction following autogenous reconstruction because of tumor recurrence.","D":"medical contraindication to multistaged autogenous reconstruction","E":"failed autogenous reconstruction."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 與 3040 同型，考骨整合義鼻重建的適應症（反向選錯）。四大公認適應症為：自體重建失敗、供區嚴重疤痕、腫瘤復發後再重建（利於監測）、有醫療禁忌無法承受多階段自體手術。⚠ 本題選項字母重排，錯誤選項移至 A『preferred Appearance』——單以外觀偏好為由非正式適應症。務必記『概念』而非背字母。⚠ 跨題衝突：3122/3158/3181 將『Patient preference』列為有效適應症，與本題『preferred Appearance』為非適應症用語不同，須依各題選項與答案分別判斷。","peropt":{"A":"✓（正解）錯誤選項。單純『preferred Appearance（外觀偏好）』非教科書列出的正式適應症。","B":"✗ 為正確適應症。潛在自體供區嚴重疤痕。","C":"✗ 為正確適應症。腫瘤復發後再重建，義鼻利於監測。","D":"✗ 為正確適應症。有醫療禁忌無法承受多階段自體重建。","E":"✗ 為正確適應症。自體重建失敗（failed autogenous reconstruction）。"},"cite":"待複查（NG 鼻部重建/骨整合義鼻適應症 記憶佐證）","conflict":"⚠ 同題歷屆重出（Osseointegrated nasal reconstruction適應症—選錯誤者）：錯誤選項恆為「preferred Appearance／病人偏好外觀」(非教科書列舉之適應症)；104年(3040)為E、105年(3053)因選項重排改為A。"},{"id":"3054","sub":"F","src":"NG","years":[105],"stem":"Which of the following statements is the most appropriate?","opts":{"A":"Angle's classification about the relationship between maxillary and mandibular dentition and occlusion was based on first molar teeth","B":"The current maxillary osteotomy primarily involves the LeFort I procedure.","C":"Neurosensory loss is the most common complication following orthognathic surgery.","D":"Avascular necrosis of the condyle is a known potential complication in orthognathic surgery.","E":"All of above are right"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"四項全對：**Angle 分類以第一大臼齒為基準**；現行上頜截骨主要為 **Le Fort I**；**神經感覺喪失是正顎手術最常見併發症**（下齒槽神經）；**髁突缺血性壞死**確為已知的潛在併發症。","peropt":{"A":"◎ Angle 分類以第一大臼齒關係定義。","B":"◎ Le Fort I 為現行上頜截骨主流。","C":"◎ 神經感覺喪失最常見。","D":"◎ 髁突缺血性壞死為已知併發症。","E":"◎ 正解：以上皆是。"},"cite":"NG105 · NG105-B05-Q05","conflict":""},{"id":"3055","sub":"E","src":"NG","years":[105],"stem":"下列關於耳朵整形術(otoplasy)的敘述何者錯誤?","opts":{"A":"耳朵整形術指的是利用手術介入改變耳朵其外觀與位置。","B":"在評估耳朵外觀的時候，一般常先評估其整體大小與形狀，然後分成上、中、下三個部份分別評估，最後並評估其兩耳對稱性。","C":"評估耳朵上三分之一的部分是否顯著，要看antihelix或superior crus of the triangular fossa是否完整發育，以及helical rim是否形狀明確。","D":"當整個耳朵需要重建，例如小耳症，建議等到孩童四歲的時候進行而為最佳時機。","E":"Tanzer學者將狹縮耳(constricted ear)分成三種型態；type I – 只有牽涉helix; typeII – 包含helix and scapha; type III – 嚴重的杯狀耳(extreme cupping of the ear)。"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"**臉部拉皮確實會影響耳朵外觀**（耳垂變形、pixie ear、耳屏移位皆為 facelift 已知併發症），故選項 D『不會造成耳朵影響』為錯。\n另記 Tanzer 狹縮耳三型：I＝僅 helix；II＝helix＋scapha；III＝嚴重杯狀耳。","peropt":{"A":"✓ 改變耳朵外觀與位置。","B":"✓ 先評估大小形狀，再分上中下三部，最後看對稱。","C":"✓ Tanzer 狹縮耳三型。","D":"◎ 正解（錯誤）：拉皮會影響耳朵（pixie ear、耳垂變形）。","E":"✓ 二次手術不罕見，矯正不足最常見於上極。"},"cite":"NG104 · NG104-B05-Q01","conflict":""},{"id":"3056","sub":"E","src":"NG","years":[105],"stem":"As concerning the epidemiologic features of microtia, which of the following is not correct?","opts":{"A":"prevalence is around 1/900~1/6000 in newborns","B":"10% of the victim suffered from some form of inner ear anomly","C":"Due to conduction deficit, the hearing threshold measures about 40-60 dB","D":"Up to 5% patients suffer from total deafness","E":"If two siblings had microtia, the risk of affecting future offspring will be 15%"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"小耳症流行病學：發生率約 1/900–1/6000；約 **10% 合併內耳異常**；患側傳導性聽損約 40–60 dB；**完全失聰極罕見**（絕非高達 5%）——因為小耳症影響的是外耳／中耳傳導，內耳耳蝸功能多半保留。兩手足皆患病時，後代風險約 15%。","peropt":{"A":"✓ 發生率 1/900–1/6000。","B":"✓ 約 10% 合併內耳異常。","C":"✓ 傳導性聽損 40–60 dB。","D":"◎ 正解（錯誤）：完全失聰極罕見，非高達 5%。","E":"✓ 兩手足患病 → 後代風險約 15%。"},"cite":"NG105 · NG105-B07-Q03","conflict":""},{"id":"3057","sub":"E","src":"NG","years":[105],"stem":"The sensory function of external acoustic meatus nearby the concha area is innervated by:","opts":{"A":"Vagus nerve (Arnold's nerve) nerve","B":"Lesser occipital nerve","C":"Greater auricular neve","D":"Auriculotemporal nerve","E":"External acoustic nerve"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 外耳的感覺神經分工需精準記憶：耳甲（concha）與外耳道（external acoustic meatus）鄰近區域由迷走神經耳支（Arnold's nerve，即vagus之auricular branch）支配，此即刺激外耳道可誘發咳嗽反射（Arnold reflex）之解剖基礎。⚠ 易混淆：耳廓後下方由greater auricular nerve（C2-3）支配、耳廓前上與外耳道前壁由auriculotemporal nerve（V3）支配、lesser occipital nerve供應耳後上方頭皮。","peropt":{"A":"✓(正解) 耳甲/外耳道鄰近區由迷走神經耳支（Arnold's nerve）支配。","B":"✗ Lesser occipital nerve供應耳後上方頭皮，非此區。","C":"✗ Greater auricular nerve供應耳廓下部與後方，非外耳道concha區。","D":"✗ Auriculotemporal nerve供應耳廓前上與tragus/外耳道前壁，非concha主要來源。","E":"✗ 「External acoustic nerve」非標準命名，為誘答。"},"cite":"待複查（NG 外耳神經解剖 記憶佐證）","conflict":""},{"id":"3058","sub":"D","src":"NG","years":[105],"stem":"As regards the facial bone fracture fixture device, which of the following statements is/are true? (複選)","opts":{"A":"wire fixation is less stable than miniplate","B":"miniplate has the strength about 2/3 of intact zygoma bone","C":"resorbable plate has the strength about 1/10 of intact zygoma bone","D":"bending is the cause of the failure of the resorbable system","E":"plate and screw breakage is the cause of the failure in the titanium system."},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"固定強度階梯：**wire < resorbable < miniplate**。可吸收板強度約為完整顴骨的 **1/10**。\n（AI 補寫：B／D／E 的確切數值與失效機轉，原檔未附詳解，建議複查原文。）","peropt":{"A":"◎ 鋼絲固定的穩定度低於迷你鈦板。","B":"✗ 依原檔答案，迷你鈦板強度並非『完整顴骨的 2/3』。","C":"◎ 可吸收板強度約完整顴骨的 1/10。","D":"✗ 依原檔答案，此非可吸收系統的主要失效機轉。","E":"✗ 依原檔答案，此非鈦系統的主要失效機轉。"},"cite":"NG105 · NG105-B07-Q08","conflict":""},{"id":"3059","sub":"A","src":"NG","years":[105],"stem":"Which of the following statements concerning fibrous dysplasia is/are correct? (複選)","opts":{"A":"Polyostotic fibrous dysplasia is much more common than monostotic one","B":"skull involvement occurs in 27% of polyostotic patients","C":"In the craniofacial region, fibrous dysplasia most frequently involves the maxilla","D":"In the mandible, the condylar area is the most frequently affected.","E":"Multiple brownish skin pigmentations and precocious sexual development, hyperthyroidism, or hyperparathyroidism, indicate McCune–Albright syndrome."},"ans":"CE","multi":true,"etype":"ai","expl":"","key":"Fibrous dysplasia：單骨型遠多於多骨型。顱顏區以上頜骨最常受累；下頜骨以體部／角部為主而非髁突。McCune–Albright＝多骨型＋咖啡牛奶斑＋內分泌病變。","peropt":{"A":"✗ 反了，monostotic 遠比 polyostotic 常見。","B":"✗ 多骨型的顱骨侵犯比例遠高於 27%（約半數）。","C":"◎ 顱顏區以 maxilla 最常受累。","D":"✗ 下頜以 body/angle 為主，髁突區少見。","E":"◎ 色素斑＋性早熟／甲狀腺或副甲狀腺功能亢進 → McCune–Albright。"},"cite":"NG105 · NG105-B07-Q09","conflict":""},{"id":"3060","sub":"B","src":"NG","years":[105],"stem":"Which of the followings about palatoplasty is correct?","opts":{"A":"The normal palate serves several important functions, all related to functional separation of the oropharynx from the nasopharynx.","B":"The driving force for palatoplasty is the development of normal speech.","C":"Surgical technique and timing of palate repair are two crucial aspects important in optimal speech outcome.","D":"Victor Veau noted that children who undergone repair between 2 and 4 years of age were much more likely to have normal speech than thos with repair before 12 months.","E":"Most would agree that the best speech results are correlated with closure of the palate near the time of the infant's beginning language acquisition, which for the normal-developing child is before 12 months."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"⚠ **此題原檔答案可疑，標為待複查。** 選項 D（Veau 觀察 2–4 歲修補者語言優於 12 個月前）與選項 E（12 個月前修補語言最佳）**互相矛盾**，兩者不可能同時成立。原檔答案為 D。\n**現代共識與 E 一致**：顎裂修補應在語言習得開始前（約 9–12 個月）完成。作答錨定該年答案，概念請記 E 的方向。","peropt":{"A":"敘述『all related to』過度絕對（正常顎亦與耳咽管功能有關）。","B":"顎裂修補的驅動力確為正常語言發展。","C":"術式與時機同為語言結果的關鍵。","D":"◎ 原檔答案（歷史陳述，Veau 早期觀察）。","E":"⚠ 與現代共識相符：語言習得前（<12 個月）修補結果最佳。"},"cite":"NG105 · NG105-B08-Q03","conflict":""},{"id":"3061","sub":"A","src":"NG","years":[105],"stem":"About the derivatives of the pharyngeal arches, which of the followings is correct?","opts":{"A":"1st arch: incus, malleus, mastication muscles, trigeminal nerve, mandibular artery","B":"2nd arch: stapes, greater horn of hyoid bone, facial expression muscles, facial nerve, stapedial artery","C":"3rd arch: lesser horn of hyoid bone, muscles of the stylopharyngeus, glossopharyngeal nerve, common and internal carotid artery","D":"4th and 6th arches: cartilage of the larynx, muscles of pharynx constriction, phonation, palatoglossus, and upper esophagus, vagus nerve, arch of aorta","E":"All the above are incorrect"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"鰓弓四件套（軟骨／肌肉／神經／動脈）務必成組記。破綻常藏在『動脈』與『舌骨大小角』。","peropt":{"A":"✗ 第一弓動脈為 maxillary artery，非 mandibular artery。","B":"✗ 第二弓貢獻舌骨『小角』（lesser horn），非大角。","C":"✗ 第三弓貢獻舌骨『大角』（greater horn），此處寫反。","D":"◎ 正解：第四、六弓 → 喉軟骨、咽縮肌／發聲肌、迷走神經、主動脈弓。","E":"✗ D 正確，故此項不成立。"},"cite":"NG105 · NG105-B08-Q05","conflict":""},{"id":"3062","sub":"B","src":"NG","years":[105],"stem":"Which of the followings about the principle and surgical concepts of unilateral cheiloplasty is incorrect?","opts":{"A":"No dissection over the maxilla","B":"Rotation of the cupid's bow without back-cut","C":"Reconstruction of deficient vermilion beneath cleft-side cupid's bow","D":"Postoperative splinting of the nostril with a silicon conformer to limit the effects of wound contracture","E":"Definition of alar groove is rarely considered."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"單側唇裂修補的核心原則裡，**alar groove 的重建是必須考慮的**（決定鼻翼外形）。其餘四項（不剝離上頜、無 back-cut 旋轉、重建裂側唇紅、術後鼻模支撐）皆為 Mulliken 式修補的標準原則。","peropt":{"A":"✓ 不在上頜骨面剝離。","B":"✓ Cupid's bow 旋轉不做 back-cut。","C":"✓ 重建裂側 Cupid's bow 下方缺損的唇紅。","D":"✓ 術後以矽膠鼻模支撐，對抗傷口攣縮。","E":"◎ 正解（不正確）：alar groove 的定義與重建不可忽略。"},"cite":"NG105 · NG105-B08-Q06","conflict":""},{"id":"3063","sub":"B","src":"NG","years":[105],"stem":"Which of the followings is the most important examination to evaluate postoperative velopharyngeal function after cleft palate surgery?","opts":{"A":"Pressure flow measurements","B":"Nasopharyngeal endoscopy","C":"Cinefluoroscopy","D":"Perceptual speech evaluation","E":"All of above are important"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"顎裂術後顎咽功能評估的**第一步且最重要者是 perceptual speech evaluation（聽知覺語言評估）**。所有儀器檢查（鼻咽鏡、影像、壓力流量）都是在語言評估發現異常後，用來定位縫隙形態與擬定術式的工具。","peropt":{"A":"壓力流量測量為輔助定量。","B":"鼻咽鏡用於看縫隙形態、決定術式。","C":"Cinefluoroscopy 為影像輔助。","D":"◎ 正解：聽知覺語言評估是起點與核心。","E":"雖皆有用，但題問『最重要』。"},"cite":"NG105 · NG105-B08-Q07","conflict":""},{"id":"3065","sub":"A","src":"NG","years":[105],"stem":"Sher et al described four types of airway obstruction of Pierre Robin sequence. Which of the following statement is NOT correct？","opts":{"A":"Type 1 is described as \"true glossoptosis,\" and consists of a tongue that contacts the posterior pharynx at a level below the soft palate.","B":"Type 2 consists of a tongue that is displaced posteriorly as in type 1 but at the level of or above the soft palate, such that the palate becomes sandwiched between the tongue and posterior pharyngeal wall in the upper oropharynx.","C":"Type 3 consists of an obstruction caused by a medial collapse of the lateral pharyngeal walls.","D":"Type 4 consists of the pharynx collapsing or constricting as a sphincter.","E":"All of the above statements are correct."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Sher 將 Pierre Robin 的呼吸道阻塞分四型。第 1 型才是『true glossoptosis』；第 3、4 型為咽側壁塌陷與括約肌式收縮，此時單做舌／下頜前移無效。","peropt":{"A":"✓ Type 1：舌根後移，於軟顎『下方』接觸咽後壁。","B":"✓ Type 2：接觸點在軟顎高度或以上，軟顎被夾在舌與咽後壁之間。","C":"✓ Type 3：咽側壁向內塌陷。","D":"✓ Type 4：咽部呈括約肌式環形收縮。","E":"◎ 正解：以上皆正確。"},"cite":"NG105 · NG105-B09-Q02","conflict":""},{"id":"3066","sub":"C","src":"NG","years":[105],"stem":"Which of the following statement concerning nonsyndromic craniosynostosis syndrome is correct？","opts":{"A":"Gender predilection demonstrates female preference for sagittal synostosis.","B":"The type of synostosis is denoted based on the suture fused, with lambdoid being the most common and sagittal the least.","C":"Ephrin-A4 (EFNA4) is, as yet, the only identified gene proposed to play a role in nonsyndromic craniosynostosis.","D":"The optimal timing of treatment is during infancy, before 6 months.","E":"Older paternal age may contribute more to sagittal than coronal synostosis."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"非症候群性顱縫早閉的四個常見反轉：**矢狀縫最常見（男性 3:1），人字縫最罕見**；手術最佳時機約 **9–12 個月**（非 6 個月前）；**高齡父親與冠狀縫（FGFR）關係較大**，非矢狀縫。\n⚠ 考生建議：EFNA4 在新版 Neligan 已不再提及，改述 FGFR3 等。本年答案仍為 C。","peropt":{"A":"✗ 矢狀縫早閉以**男性**為主（約 3:1）。","B":"✗ 反了：矢狀縫最常見、人字縫最少見。","C":"◎ 本年答案（EFNA4）；新版已淡化此說法。","D":"✗ 最佳時機約 9–12 個月。","E":"✗ 高齡父親與**冠狀縫**關聯較大。"},"cite":"NG105 · NG105-B09-Q03","conflict":""},{"id":"3067","sub":"D","src":"NG","years":[105],"stem":"Regarding the pediatric facial fractures, choose the wrong description:","opts":{"A":"Facial fractures are relatively common in children, due to intrinsic anatomical factors such as larger fat pads, decreased pneumatization of sinuses, increased skeletal flexibility secondary to more malleable bone stock, and compliant sutures.","B":"Future growth and development must be accounted for when addressing these injuries.","C":"Mandible fractures are often cited as the most common pediatric facial fracture, accounting for 20–50% of all pediatric facial fractures.","D":"Cranial-to-facial ratio decreases with maturity from 8 : 1 at birth to 2 : 1 in adulthood.","E":"Indications for operative management of cranial base and skull fractures include significant displacement, cerebrospinal fluid (CSF) leak persisting despite conservative measures, intracranial hematoma, deformed facial contour, frontal-lobe contusion with mass effect, and growing skull fracture."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"小兒顏面骨折**相對罕見**（不是常見）——因為脂肪墊厚、鼻竇氣化不足、骨質柔韌、骨縫順應性高，這些都是**保護因子**。命題者把保護因子留著，卻把結論寫成『相對常見』。\n⚠ 考生建議：改版後**眶骨骨折**才是最常見的小兒顏面骨折（見 CN3155）。","peropt":{"A":"◎ 正解（錯誤）：應為相對**罕見**。","B":"✓ 必須把未來生長發育納入考量。","C":"✓ 舊版謂下頜骨折佔 20–50%（新版改稱眶骨最常見）。","D":"✓ 顱／顏比自出生 8:1 降至成人 2:1。","E":"✓ 顱底與顱骨骨折的手術適應症。"},"cite":"NG105 · NG105-B09-Q04","conflict":""},{"id":"3068","sub":"A","src":"NG","years":[105],"stem":"The following description which one is incorrect about the orbital hypertelorism?","opts":{"A":"Hypertelorism is not a disease in itself; it is just a symptom which may belong to various conditions.","B":"Surgical treatment of hypertelorism can be undertaken before age 4.","C":"The technique of correction depends upon the degree of interorbital distance and on the occlusion.","D":"If the occlusion is normal, the osteotomy is a box-shift type; if the occlusion is angulated, a facial bipartition osteotomy and medialization of the two hemifaces are performed.","E":"Rhinoplasty is best performed at the end of growth."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Hypertelorism 是『症狀』不是疾病。手術時機一般待 5–7 歲以後（顱骨與齒列發育、眶容積穩定），4 歲前手術過早。術式選擇取決於眶間距與『咬合』。","peropt":{"A":"✓ 只是徵象，可見於多種顱顏疾病。","B":"◎ 正解（不正確）：不建議 4 歲前手術。","C":"✓ 取決於眶間距與咬合狀況。","D":"✓ 咬合正常 → box-shift；咬合傾斜 → facial bipartition 併兩側半臉內移。","E":"✓ 鼻整形留待生長結束後。"},"cite":"NG105 · NG105-B09-Q05","conflict":""},{"id":"3069","sub":"C","src":"NG","years":[105],"stem":"Which one of the following craniosynostoses is not the FGFR-related syndromic craniosynostoses?","opts":{"A":"Apert syndrome","B":"Crouzon syndrome","C":"Pfeiffer syndrome","D":"Muenke syndrome","E":"Boston-type craniosynostosis"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"FGFR 相關的症候群性顱縫早閉：**Apert、Crouzon、Pfeiffer、Muenke（FGFR3）、Jackson-Weiss**。\n**Boston-type ＝ MSX2**，是唯一的非 FGFR 者。另記 Saethre-Chotzen ＝ TWIST1。","peropt":{"A":"FGFR2。","B":"FGFR2。","C":"FGFR1／FGFR2。","D":"FGFR3。","E":"◎ 正解：Boston-type ＝ MSX2，非 FGFR。"},"cite":"NG105 · NG105-B09-Q06","conflict":""},{"id":"3070","sub":"A","src":"NG","years":[105],"stem":"Craniofacial microsomia associated extracranial malformations, including (複選)?","opts":{"A":"Cardiac anomalies","B":"Vertebral/rib defects","C":"Cervical spine anomalies","D":"Scoliosis","E":"Genitourinary defects"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"CFM 的顱外異常是全身性的：心臟、脊椎肋骨、頸椎、脊柱側彎、泌尿生殖。這正是 CN3001 要求 echo／腎超音波／頸椎 X 光的理由。","peropt":{"A":"◎ 心臟異常。","B":"◎ 脊椎／肋骨缺損。","C":"◎ 頸椎異常。","D":"◎ 脊柱側彎。","E":"◎ 泌尿生殖道缺損。"},"cite":"NG105 · NG105-B09-Q10","conflict":""},{"id":"3071","sub":"D","src":"NG","years":[106],"stem":"Which of the following statements about facial bone fracture is incorrect?","opts":{"A":"Blow-out fractures of the orbit with actual muscle incarceration is a surgical emergency and requires immediate release of the muscle.","B":"Failure to reposition the medial canthal bone fragment in nasoethmoidal orbital fractures may result in telecanthus.","C":"Visual acuity change or blindness can occur in 'superior orbital fissure syndrome'","D":"Severe displacement of zygomatic arch fracture usually does not result in restricted mandibular motion,","E":"Mandibular fractures that are directed downward and forward are classified as 'horizontally favorable'."},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"兩個破綻：①**SOFS 不會失明**（失明＝orbital apex syndrome，見 CN3142）；②**嚴重移位的顴弓骨折會撞擊喙突，限制下頜運動**——這正是顴弓骨折需復位的功能性理由。","peropt":{"A":"✓ 眶底骨折併肌肉嵌頓（white-eyed blowout）是外科急症。","B":"✓ 內眥骨片未復位 → telecanthus。","C":"◎ 錯誤：視力改變／失明屬 orbital apex syndrome。","D":"◎ 錯誤：嚴重移位顴弓骨折**會**限制下頜運動。","E":"✓ 骨折線向下前走行 → horizontally favorable。"},"cite":"NG106 · NG106-B05-Q03","conflict":""},{"id":"3072","sub":"A","src":"NG","years":[106],"stem":"Which of the following statements about fibrous dysplasia is incorrect?","opts":{"A":"The lesions usually present at around 10 years of age and then progress throughout adolescence.","B":"There is no gender predilection, except in McCune-Albright syndrome which is more commonly found in females.","C":"Polyostotic fibrous dysplasia is much more common than its monostotic counterpart.","D":"The most frequently involved sites are the ribs, long bones, pelvis, jaws, and skull.","E":"Radiation therapy is not recommended in the disease"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"與 CN3010、CN3020 同一考點反覆出現：**單骨型遠多於多骨型**。這是 fibrous dysplasia 最愛考的一句。","peropt":{"A":"✓ 約 10 歲前後出現，青春期進展。","B":"✓ 無性別偏好；McCune–Albright 以女性為主。","C":"◎ 正解（不正確）：monostotic 遠比 polyostotic 常見。","D":"✓ 好發肋骨、長骨、骨盆、顎骨、顱骨。","E":"✗ 不建議放射治療（有惡性轉化風險），此敘述正確故非答案。"},"cite":"NG106 · NG106-B05-Q05","conflict":""},{"id":"3073","sub":"F","src":"NG","years":[106],"stem":"Which statement about TMJ dysfunction is incorrect?","opts":{"A":"The geniohyoid, digastric, and the masseter are muscles that depress and retract the mandible. The temporalis and pterygoid elevate and protrude the mandible.","B":"The etiology of myofascial pain and dysfunction (MPD) can be due to overclosure, occlusal prematurity, bruxism, and anxiety.","C":"Osteoarthritis is the most common disease affecting the TMJ.","D":"The treatment goals in rheumatoid arthritis of the TMJ are pain relief, reduction of inflammation, maintenance of function, and prevention of deformity.","E":"The typical triad of TMJ dysfunction are preauricular pain, clicking noise from the TMJ, and poor mandibular movement."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"下頜運動肌群配對（本題破綻）：**降下頜（開口）＝ geniohyoid、digastric、lateral pterygoid**；**升下頜（閉口）＝ masseter、temporalis、medial pterygoid**。選項 A 把 masseter 歸為『降下頜』、把 pterygoid 一概歸為『升＋前突』——masseter 是**升**下頜肌，寫反了。\n其餘正確：TMJ 最常見疾病是骨關節炎；功能障礙三徵＝耳前痛、彈響、下頜運動受限。","peropt":{"A":"◎ 正解（錯誤）：masseter 是升下頜肌（閉口），非降下頜。","B":"✓ MPD 病因：過度閉合、咬合早接觸、磨牙、焦慮。","C":"✓ 骨關節炎為 TMJ 最常見疾病。","D":"✓ 類風濕性 TMJ 治療目標：止痛、抗炎、維持功能、防變形。","E":"✓ 三徵：耳前痛、彈響、下頜運動不良。"},"cite":"NG106 · NG106-B05-Q07","conflict":""},{"id":"3074","sub":"E","src":"NG","years":[106],"stem":"Which of the following statements about auricular defects and ear reconstruction are correct?","opts":{"A":"The etiology of microtia may be associated with hereditary factors and in utero tissue ischemia.","B":"The timing of reconstruction should take into consideration the psychological and physical factors of the child.","C":"Class I of the Tanzer classification correlates to 'Anotia'.","D":"Otohematoma, or 'cauliflower ear' can be treated conservatively, even in severe cases.","E":"Partially avulsed auricular tissue with a narrow pedicle nearly always necrotizes."},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"Tanzer 分類 **Class I ＝ anotia（完全無耳）**——注意這與 Nagata 分類不同（Nagata 的 lobule/concha type 是另一套）。此外：小耳症與遺傳＋子宮內組織缺血相關；重建時機需考量心理與生理；cauliflower ear 須及早引流固定（非保守觀察）；窄蒂部分撕脫的耳組織血供其實常可存活。","peropt":{"A":"◎ 遺傳因素＋子宮內組織缺血。","B":"◎ 重建時機考量心理與生理。","C":"◎ Tanzer Class I ＝ anotia。","D":"✗ 嚴重 cauliflower ear 須引流固定，非保守。","E":"✗ 窄蒂部分撕脫組織常可存活，非幾乎必壞死。"},"cite":"NG106 · NG106-B05-Q08","conflict":""},{"id":"3075","sub":"B","src":"NG","years":[106],"stem":"Which of the following statements regarding reconstruction of the lip are correct?","opts":{"A":"Defects of the lower lip of less than 30% can be closed directly","B":"The orbicularis muscle motion is unaffected in cross-lip flaps","C":"Bilateral Gilles fan flaps can be used to reconstruct defects up to 80% the total lip length","D":"When reconstructing a total lower lip defect with the radial forearm free flap, the palmaris longus tendon can be harvested to avoid ectropion of the lip.","E":"To avoid complications, a full layer defect of the lip should be closed in a two-layer fashion, the inner mucosal layer and the outer skin layer."},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯 本題考唇重建原則（複選正確者）。要點：①下唇缺損 <30% 可直接縫合；②雙側 Gillies fan flaps 可重建達全唇長 80% 的缺損；③以 radial forearm free flap 重建全下唇時，可同時取 palmaris longus tendon 作靜態懸吊，避免下唇下垂/外翻（口角失能、流涎）。⚠ 兩個錯誤：B『cross-lip flaps 不影響 orbicularis oris 運動』為錯——交叉唇瓣會離斷/去神經化肌肉，運動確實受影響；E『全層缺損採兩層縫合（黏膜+皮膚）』為錯——唇為三層結構，正確應行三層縫合（黏膜、肌肉 orbicularis、皮膚），才能重建括約肌功能。","peropt":{"A":"✓ 正確。下唇缺損 <30% 可直接縫合。","B":"✗ 錯誤。Cross-lip（如 Abbe）flap 會離斷並去神經化 orbicularis oris，肌肉運動會受影響，並非不受影響。","C":"✓ 正確。雙側 Gillies fan flaps 可重建達全唇長約 80% 的缺損。","D":"✓ 正確。以 radial forearm free flap 重建全下唇時，取 palmaris longus tendon 作懸吊可避免下唇外翻/下垂。","E":"✗ 錯誤。唇全層缺損應採『三層』縫合（黏膜、肌肉、皮膚）以重建括約肌功能，非兩層。"},"cite":"待複查（NG 唇重建原則 記憶佐證）","conflict":""},{"id":"3076","sub":"B","src":"NG","years":[106],"stem":"在lower lip reconstruction, 比較Karapandzic and Gillies fan flap techniques,何者正確? (複選)","opts":{"A":"In the Karapandzic technique, the flaps are neurotized and results in good lower lip function and sensation.","B":"In the Karapandzic technique, the commissures can not be maintained.","C":"In the Gillies fan flap reconstruction, there is no mucosal cover of the flap at the lip margin.","D":"In the Gillies fan flap techniques, mucosal cover is supplied by advancing intraoral mucosa.","E":"In the Gillies fan flap techniques, the nerves are not kept intact, thus lip function and sensation are compromised."},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"🎯 比較下唇重建之Karapandzic與Gillies扇形瓣（Gillies fan flap）：Karapandzic為神經肌肉保留之旋轉推進瓣，可維持口角連續性、保留唇的動作與感覺，但常致小口症（microstomia）；Gillies扇形瓣則不保留神經，故功能與感覺受損，且瓣在唇緣「無黏膜覆蓋」，須以口內黏膜推進來提供唇緣的mucosal cover。本題選「正確」敘述。⚠ 易混淆：B謂Karapandzic「無法維持口角」為錯——Karapandzic正可維持commissure。","peropt":{"A":"✓(正解) Karapandzic為神經化瓣，保留下唇功能與感覺，正確。","B":"✗ 錯誤敘述（非答案）Karapandzic可維持口角，稱「無法維持」為錯。","C":"✓(正解) Gillies扇形瓣在唇緣無黏膜覆蓋，正確。","D":"✓(正解) Gillies需以口內黏膜推進提供唇緣黏膜覆蓋，正確。","E":"✓(正解) Gillies不保留神經，功能與感覺受損，正確。"},"cite":"待複查（NG Karapandzic/Gillies瓣 記憶佐證）","conflict":""},{"id":"3077","sub":"A","src":"NG","years":[106],"stem":"有關molecular causes of facial clefting, 現在的研究發現與inadequate growth of the facial prominences有密切關係的是:","opts":{"A":"TGF-β2","B":"TGF-β3","C":"Wnt signaling","D":"FOXE 1 (Forkhead box protein E1)","E":"IRF gene (interferon regulatory factor)"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"顏面裂的分子機轉：Wnt signaling 與 facial prominences 生長不足關係最密切。TGF-β3 主管顎突融合（palatal shelf fusion），是另一條常考路徑，勿混。","peropt":{"A":"TGF-β2 非主要。","B":"TGF-β3 → 顎突『融合』失敗，非生長不足。","C":"◎ 正解：Wnt signaling → 顏面突生長不足。","D":"FOXE1 與裂顎關聯但非生長機轉。","E":"IRF6 → Van der Woude syndrome。"},"cite":"NG106 · NG106-B06-Q05","conflict":""},{"id":"3078","sub":"B","src":"NG","years":[106],"stem":"有關cleft lip/palate的overall treatment plan,下列何者不正確?","opts":{"A":"nasoalveolar molding通常在出生後1~6 週做","B":"在超過3個月大的小孩做術前的nasoalveolar molding,還是有不錯的效果","C":"lip surgery通常在小孩3~4個月大做","D":"palate surgery通常在小孩9個月~1歲時做","E":"alveolar bone grafting常須等到7~9歲大"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"唇顎裂治療時程表（背熟）：**NAM 出生後 1–6 週**（利用母體雌激素使軟骨可塑，過了此窗口效果大減）→ **唇修補 3–4 個月** → **顎修補 9–12 個月** → **齒槽骨移植 7–9 歲**（尖牙萌發前，牙根形成 1/2–2/3 時）。","peropt":{"A":"✓ NAM 於出生後 1–6 週。","B":"◎ 正解（不正確）：超過 3 個月大，軟骨可塑性已降低，NAM 效果顯著變差。","C":"✓ 唇修補 3–4 個月。","D":"✓ 顎修補 9 個月至 1 歲。","E":"✓ 齒槽骨移植 7–9 歲。"},"cite":"NG106 · NG106-B06-Q06","conflict":""},{"id":"3079","sub":"B","src":"NG","years":[106],"stem":"有關cleft palate的敘述,下列何者不正確?","opts":{"A":"The levator veli palatini muscle is longitudinally orientated in the cleft palate patient.","B":"Eustachian tube function is abnormal in cleft patients due to abnormal position of levator veli palatini muscle.","C":"Realignment of the levator veli palatini muscle to a transverse and posterior position in the soft palate is the key to a successful functional result.","D":"The important greater palatine neurovascular bundle emerges through the greater palatine foramen.","E":"Furlow's technique for palatoplasty is the concept of double opposing Z-plasty."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考裂顎（cleft palate）解剖與手術核心（選錯）。裂顎患者 levator veli palatini（LVP，顎帆提肌）走向異常呈縱向（longitudinal/sagittal），異常附著於硬顎後緣，正常應橫向懸吊形成 levator sling；成功手術的關鍵即在 intravelar veloplasty 將 LVP 重新對位至橫向且偏後的位置。⚠ 選項 B 為錯誤：裂顎患者中耳/Eustachian tube 功能異常主要與 tensor veli palatini（TVP，顎帆張肌）功能失常有關，而非 levator veli palatini；B 將病因歸於 LVP 位置異常即為錯誤歸因，故為應選出者。另 greater palatine neurovascular bundle 經 greater palatine foramen 穿出、Furlow 技術為 double opposing Z-plasty，皆為正確。","peropt":{"A":"✗ 敘述正確。裂顎患者 LVP 走向異常呈縱向（附著於硬顎後緣），非本題錯誤選項。","B":"✓（正解）錯誤敘述。裂顎的 Eustachian tube 功能異常主要歸因於 tensor veli palatini（TVP）功能失常，而非 levator veli palatini 位置異常，屬錯誤歸因。","C":"✗ 敘述正確。將 LVP 重新對位至橫向且偏後的位置是功能性成功的關鍵。","D":"✗ 敘述正確。Greater palatine neurovascular bundle 經 greater palatine foramen 穿出。","E":"✗ 敘述正確。Furlow palatoplasty 概念即為 double opposing Z-plasty。"},"cite":"原檔詳解","conflict":""},{"id":"3080","sub":"B","src":"NG","years":[106],"stem":"有關alveolar clefts的敘述，下列何者有誤?","opts":{"A":"Treatment protocols have varied in timing, technique, and selection of graft material.","B":"Grafting at the time of primary dentition is practiced by relatively few centers.","C":"The iliac crest cancellous bone graft is considered the gold standard for the donor sources.","D":"The gold standard is secondary bone grafting with autogenous cancellous graft at the time of mixed dentition.","E":"The central incisor tooth is often missing."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"齒槽裂最常缺失的是**側門齒（lateral incisor）**，不是中門齒。黃金標準：**混合齒列期**（尖牙萌發前）以**髂骨鬆質骨**行次級骨移植。","peropt":{"A":"✓ 各中心在時機、術式、材料上仍有差異。","B":"✓ 乳牙期植骨僅少數中心採行。","C":"✓ 髂骨鬆質骨為捐贈部位的黃金標準。","D":"✓ 混合齒列期次級自體鬆質骨移植為黃金標準。","E":"◎ 正解（有誤）：常缺失的是**側**門齒，非中門齒。"},"cite":"NG106 · NG106-B06-Q08"
