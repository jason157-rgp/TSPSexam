IEA 候選。"}, "cite": "待複查（NG free TRAM vs DIEP 記憶佐證）", "conflict": "⚠ 同題歷屆重出：free TRAM vs DIEP比較（複選）。2132（108年）答BDE、2175（110、115年）答BD——A–D選項相同，差異僅E選項：2132之E（free TRAM在肥胖病人更可預期，正確故入選）改為2175之E（severe abdominal fat適合SIEA，錯誤故不選）。核心考點（>800cc與無>1.5mm穿通枝時選free TRAM）不變，記概念不記字母。"}, {"id": "2176", "sub": "BRE", "src": "NG", "years": [111, 112, 113, 114], "stem": "Poland syndrome 會有何者臨床表徵？ (複選)", "opts": {"A": "單側缺乏胸大肌胸骨頭 (unilateral absence of the sternal head of the pectoralis major muscle)", "B": "乳房發育不良 (breast hypoplasia or aplasia)", "C": "肋骨發育不良且變形 (absence or deformed ribs)", "D": "無腋毛 (axillary alopecia)", "E": "同側上肢短且併指 (ipsilateral upper extremity shortening and brachysyndactyly)"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題考 Poland syndrome 之臨床表徵（複選），答案為全部皆是。五大典型：單側缺乏胸大肌「胸骨頭（sternal head）」、乳房發育不良/缺失（hypoplasia/aplasia）、肋骨缺失或變形、腋毛缺失（axillary alopecia）、同側上肢短小併指（brachysyndactyly）。⚠ 關鍵記憶：缺的是胸大肌「胸骨頭」而非「鎖骨頭（clavicular head）」；此題五選項皆為正確表徵，與問「非表徵」（答案為誤植 clavicular head 者）為極性相反的姊妹題，切勿混記。", "peropt": {"A": "◎ 單側缺乏胸大肌胸骨頭（sternal head）為 Poland 核心特徵。", "B": "◎ 乳房發育不良/缺失（hypoplasia/aplasia）為典型表現。", "C": "◎ 肋骨缺失或變形常見。", "D": "◎ 腋毛缺失（axillary alopecia）為特徵之一。", "E": "◎ 同側上肢短小併指（brachysyndactyly）為典型。"}, "cite": "待複查（NG Poland syndrome 記憶佐證）", "conflict": "⚠ 同題歷屆重出：Poland syndrome臨床表徵（複選），2176（111、112、114年）與2186（113年）皆答ABCDE；僅選項順序不同。記概念不記字母。"}, {"id": "2178", "sub": "BRE", "src": "NG", "years": [110, 111, 112, 113, 114, 115], "stem": "What is the specific indication in autologous fat grafting in breast reconstruction?", "opts": {"A": "Sharp implant border", "B": "Radiation deformity in flap reconstruction", "C": "Implant rippling", "D": "Depression from fat necrosis", "E": "All of above."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考自體脂肪移植於乳房重建的特定適應症，答案為以上皆是。四大用途：遮蓋 sharp implant border、改善放療畸形、改善 implant rippling、修飾 fat necrosis 凹陷。⚠ 選項重排家族：與另一姊妹題選項集合相同、僅字母排列不同，兩題答案皆為「以上皆是」；務必記概念、勿背字母位置。", "peropt": {"A": "✓ 遮蓋植入物銳利邊緣（sharp implant border）。", "B": "✓ 改善皮瓣重建後之放療畸形（radiation deformity）。", "C": "✓ 改善植入物波紋（implant rippling）。", "D": "✓ 修飾 fat necrosis 造成的凹陷。", "E": "◎ 以上皆為自體脂肪移植於乳房重建之特定適應症。"}, "cite": "待複查（NG autologous fat grafting 記憶佐證）", "conflict": "選項重排家族：與 NG110-B13-Q06 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ⚠ 同題歷屆重出：autologous fat grafting之specific indication，2173（110、111年）與2178（112–115年）皆答E（以上皆是）；僅選項順序不同（sharp implant border、rippling、fat necrosis depression、radiation deformity互換位置）。記概念不記字母。"}, {"id": "2179", "sub": "BRE", "src": "NG", "years": [110, 112, 113, 114], "stem": "Which of the following statements about free TRAM flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is a Mathes and Nahai type III muscle", "B": "An abdominal bulge is most often due to attenuation of the anterior rectus sheath", "C": "Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein", "D": "Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap", "E": "None of above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題為反向作答（挑『錯誤』者）。Rectus abdominis屬Mathes-Nahai Type III肌（雙主要蒂：superior/deep inferior epigastric）；腹部膨出（bulge）多因anterior rectus sheath鬆弛/減弱所致；free TRAM受區血管含internal mammary與thoracodorsal系統。⚠ 關鍵錯誤在D：肌肉節省分類中，保留『整條』rectus肌者為MS-3（即DIEP），而非MS-0（MS-0代表不保留肌肉、取全寬），故D敘述錯誤。（跨年4e/5e僅措辭不同，概念一致。）", "peropt": {"A": "✗ 敘述正確（非答案）——rectus abdominis 為 Mathes-Nahai Type III 肌（雙主蒂：superior/deep inferior epigastric）。", "B": "✗ 敘述正確——腹部膨出（bulge）多因 anterior rectus sheath 鬆弛/減弱所致。", "C": "✗ 敘述正確——受區血管含 internal mammary 與 thoracodorsal 系統。", "D": "◎ 答案＝錯誤敘述）保留『整條』rectus 肌應分類為 MS-3（即 DIEP），非 MS-0（MS-0 代表不保留肌肉、取全寬）。", "E": "✗ 『None of above』不成立，因 D 為錯誤敘述。"}, "cite": "待複查（NG free TRAM / muscle-sparing 分類 記憶佐證；⚠4e vs 5e 措辭差異）", "conflict": "跨年數值差異（Neligan 4e vs Neligan 5e）：A: 112「The rectus abdominis muscle is a Mathes 」 vs 115「The rectus abdominis muscle is categoriz」；B: 112「An abdominal bulge is most often due to 」 vs 115「Postoperative abdominal bulging is most 」；C: 112「Recipient vessels for the free TRAM flap」 vs 115「Standard recipient vessels for a free TR」；D: 112「Preservation of the entire rectus abdomi」 vs 115「A flap that results in the preservation 」；E: 112「None of above」 vs 115「None of the above」 ⚠ 同題歷屆重出：free TRAM何者錯誤。2179（112–114年）答D（MS-0=DIEP保留全肌之敘述為錯）；2171（110年）選項相同僅順序不同，但官方答案標為A（type III）——屬答案key歧異/選項移位。記概念不記字母。"}, {"id": "2182", "sub": "BRE", "src": "NG", "years": [108, 111, 112, 113, 114, 115], "stem": "Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?", "opts": {"A": "1-2 months", "B": "3-5 months", "C": "6-9 months", "D": "More than one year", "E": "More than 2 years."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "**需輔助放療者，游離皮瓣重建應於放療結束後 6–9 個月施行**——太早（<6 個月）組織仍在急性放射性發炎期，太晚則纖維化已定型。此題橫跨 108、111、112、113、114、115 六個年份，是本領域出現頻率最高的單一數字，務必零失誤。", "peropt": {"A": "✗ 太早——正確時機為放療後 6–9 個月（非 1–2 個月）；此期仍處放射性急性發炎期，併發症率高。", "B": "✗ 太早——正確為 6–9 個月（非 3–5 個月），組織尚未自放射炎恢復。", "C": "◎ ——放療結束後 6–9 個月為游離組織轉移之最佳時機。", "D": "✗ 過晚——正確為 6–9 個月（非超過一年）；超過一年纖維化已定型、剝離困難、對稱難達。", "E": "✗ 過晚——正確為 6–9 個月（非超過兩年），無此建議。"}, "cite": "Neligan, Volume 5 Chapter 25 Page 487", "conflict": "跨年數值差異（Neligan 4e vs Neligan 5e）：C: 112「6-9 months」 vs 115「6-12 months」 ‖ 跨年數值差異（Neligan 4e vs Neligan 4e）：A: 108「1-3 months」 vs 112「1-2 months」；B: 108「4-5 months」 vs 112「3-5 months」；E: 108「以上皆非」 vs 112「More than 2 years.」 ‖ 跨年數值差異（Neligan 4e vs Neligan 4e）：A: 111「1-3 months」 vs 112「1-2 months」；B: 111「4-5 months」 vs 112「3-5 months」；E: 111「None of above」 vs 112「More than 2 years.」 ⚠ 同題歷屆重出：放療後free tissue transfer時機。2131（108、111年）答C（6–9月，選項A/B為1–3、4–5月）；2182（112–114年）答C（6–9月）；2228（115年）答C，但正解選項C由「6–9 months」改為「6–12 months」。核心考點相同，記概念不記字母。"}, {"id": "2183", "sub": "BRE", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)", "opts": {"A": "The dissection of a DIEAP flap has a steep learning curve", "B": "The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap", "C": "The deep inferior epigastric artery arises from the common iliac artery", "D": "Abdominal scarring is probably the most important risk factor for raising a DIEAP flap", "E": "Smoking is considered a relative contraindication to raising a DIEAP flap"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題考 DIEAP flap 正確敘述（複選）。核心：剝離學習曲線陡（steep learning curve）；SIEV（superficial inferior epigastric vein）為引流皮島最大的靜脈（故靜脈鬱血時常作為 supercharging 來源）；腹部疤痕（abdominal scarring）是取瓣最重要危險因子；抽菸為相對禁忌。⚠ 解剖陷阱：DIEA 起自 external iliac artery，而非 common iliac artery，故 C 錯。", "peropt": {"A": "◎ DIEAP flap 剝離學習曲線陡峭（steep learning curve）。", "B": "◎ SIEV（superficial inferior epigastric vein）為引流皮島最大的靜脈（靜脈鬱血時常作 supercharging 來源）。", "C": "✗ DIEA 起自 external iliac artery，非 common iliac artery。", "D": "◎ 腹部疤痕（abdominal scarring）為取瓣最重要之危險因子。", "E": "◎ 抽菸為取瓣之相對禁忌。"}, "cite": "待複查（NG DIEAP flap 記憶佐證）", "conflict": ""}, {"id": "2184", "sub": "BRE", "src": "NG", "years": [112, 113, 115], "stem": "Which pedicled perforator flaps are suitable for reconstruction of medial quadrant defect after partial mastectomy? (複選)", "opts": {"A": "Latissimus dorsi (LD) flap", "B": "Anterior intercostal artery perforator (AICAP) flap", "C": "Thoracodorsal artery perforator (TDAP) flap", "D": "Superior epigastric artery perforator (SEAP) flap", "E": "Serratus anterior artery perforator (SAAP) flap"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 部分乳房切除（partial mastectomy）後之內側象限（medial quadrant）缺損，須選擇蒂部位於內側/上方、能到達內側的perforator flap。AICAP（anterior intercostal artery perforator）源自內乳系統的前肋間穿支，可覆蓋內下象限；SEAP（superior epigastric artery perforator）源自上腹壁動脈，蒂位內下亦可到達內側。⚠ 相對地LD、TDAP、SAAP皆為外側/後方來源，適合外側象限，無法可靠達內側，故排除。", "peropt": {"A": "✗ LD flap 源於後外側，適合外側缺損；內側象限需內/上方蒂之穿支瓣。", "B": "◎ AICAP（前肋間穿支，源自內乳系統）可覆蓋內下象限缺損。", "C": "✗ TDAP 為外側（thoracodorsal）來源，適合外側象限，不宜內側。", "D": "◎ SEAP（上腹壁動脈穿支）蒂位內下，可到達內側象限。", "E": "✗ SAAP（serratus anterior 穿支）為外側來源，非內側象限適用。"}, "cite": "待複查（NG oncoplastic 部分乳房重建 perforator flap 記憶佐證）", "conflict": ""}, {"id": "2185", "sub": "BRE", "src": "NG", "years": [109, 111, 112, 113, 114, 115], "stem": "下列關於Latissimus dorsi flap 的敘述何者為是？", "opts": {"A": "屬於Mathes and Nahai Type V muscle flap", "B": "The latissimus originate from upper thoracic spine", "C": "Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication", "D": "Donor site seroma is most common complication", "E": "The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題問 Latissimus dorsi flap「何者為是」（複選）。正確：屬 Mathes-Nahai Type V；曾行 posterolateral thoracotomy 使 LD 已被切斷者為禁忌；供區 seroma 為最常見併發症。⚠ 兩大陷阱：(1) LD 起自「下段」胸椎（T7–T12）、腰椎、薦椎與髂嵴，非「upper thoracic spine」，故 B 錯；(2) 主要血供為 thoracodorsal artery（次要 segmental posterior intercostal/lumbar），並非「dorsal scapular artery」，故 E 錯。", "peropt": {"A": "◎ LD 屬 Mathes-Nahai Type V 肌瓣。", "B": "✗ LD 起自下段胸椎（T7–T12 棘突）/腰椎/薦椎/髂嵴，非 upper thoracic spine。", "C": "◎ 曾行 posterolateral thoracotomy 切斷 LD 者為禁忌。", "D": "◎ 供區 seroma 為最常見併發症。", "E": "✗ 主要血供為 thoracodorsal artery（次要為 segmental posterior intercostal/lumbar），非 dorsal scapular artery。"}, "cite": "待複查（NG Latissimus dorsi flap 記憶佐證）", "conflict": "⚠ 同題歷屆重出：2151（109、111年）問「何者為非」答B（血供誤植為dorsal scapular artery）；2185（112–115年）改為複選「何者為是」答ACD，選項A/C/D文字相同，另將「none of above」改為「起源於upper thoracic spine」之distractor。核心考點同為LD flap屬Mathes-Nahai Type V、血供為thoracodorsal artery（非dorsal scapular）、曾行thoracotomy為禁忌、donor seroma最常見；記概念不記字母。"}, {"id": "2187", "sub": "BRE", "src": "NG", "years": [114], "stem": "In the context of posterior trunk wound reconstruction, which of the following statements about the omental flap is TRUE?", "opts": {"A": "Its vascular pedicle is too short for use in reaching the lumbar region.", "B": "It is contraindicated in spinal instrumentation due to risk of infection.", "C": "It is best suited for patients with prior intra-abdominal malignancy due to immunologic benefit.", "D": "It can be transposed through the retroperitoneum and delivered to the posterior trunk via the 12th rib approach.", "E": "Its harvest typically requires sharp dissection of all peritoneal attachments and ligation of the middle colic vessels."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "大網膜皮瓣用於**後軀幹（背部）重建**時，可經**腹膜後（retroperitoneum）轉位，並由第 12 肋入路送達後軀幹**。其血管蒂（胃網膜動脈）長度足以到達腰部；它反而是脊椎內固定感染時的救援選項（富含淋巴組織與抗感染能力）。", "peropt": {"A": "✗ 錯——以胃網膜血管（gastroepiploic）為蒂，蒂長充足，可到達腰部。", "B": "✗ 錯——大網膜富含淋巴組織與免疫細胞，為脊椎內固定感染時之救援選項，非禁忌。", "C": "✗ 錯——既往腹腔內惡性腫瘤反為相對禁忌（沾黏、腫瘤播散疑慮），無『免疫學好處』。", "D": "◎ ——可經腹膜後（retroperitoneum）轉位，由第 12 肋入路送達後軀幹。", "E": "✗ 錯——取瓣時保留一側胃網膜血管作為蒂，非結紮中結腸血管（middle colic 為結腸血供）。"}, "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 5. Chap 12. P 378.", "conflict": ""}, {"id": "2188", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "在乳房縮小手術中，最常見且關鍵的乳頭乳暈複合體（NAC）血供來源為哪一條動脈？", "opts": {"A": "外側胸動脈（Lateral thoracic artery）", "B": "內乳動脈（Internal mammary artery）", "C": "胸肩峰動脈（Thoracoacromial artery）", "D": "第四肋間動脈穿支（4th intercostal perforator）", "E": "胸背動脈（Thoracodorsal artery）"}, "ans": "B", "multi": false, "etype": "ai", "expl": "(請註明資料書名及頁次) Neligan, Chapter 5, p69", "key": "🎯 本題考乳房縮小手術中乳頭乳暈複合體（NAC）最關鍵且最常見的血供來源，答案為內乳動脈（internal mammary/internal thoracic artery）。其穿支（尤其第 2 肋間）供應乳房內上部與 NAC，故 superomedial pedicle 廣受採用。⚠ 易混淆：外側胸動脈（lateral thoracic）與第 4 肋間外側穿支雖有貢獻（第 4 肋間外側支尤與 NAC「感覺」相關），但血供主軸為 internal mammary。切勿把「感覺神經來源」與「主要血供」混為一談。", "peropt": {"A": "✗ 外側胸動脈（lateral thoracic）為外側輔助血供，非最主要 NAC 來源。", "B": "◎ 內乳動脈（internal mammary，含其穿支，尤第 2 肋間）為 NAC 最主要且最常見血供，故 superomedial pedicle 常用。", "C": "✗ 胸肩峰動脈主供胸大肌，非 NAC 主源。", "D": "✗ 第 4 肋間外側穿支主與 NAC『感覺』相關，非主要血供。", "E": "✗ 胸背動脈供 latissimus dorsi，非 NAC 主源。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2189", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "一位接受矽膠植入物乳房重建的女性，MRI 顯示植入物內部出現多條低訊號曲線於高訊號的矽膠中(Linguine sign)。下列哪一個診斷最符合此影像特徵？", "opts": {"A": "莢膜攣縮（Capsular contracture）", "B": "植入物破裂（Implant rupture）", "C": "自體脂肪壞死（Fat necrosis）", "D": "乳癌局部復發（Local recurrence）", "E": "囊袋內積液（Periprosthetic fluid）"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Linguine sign（麵條徵）為矽膠植入物『囊內破裂（intracapsular rupture）』於MRI的特徵性表現：塌陷的植入物外殼漂浮於外滲矽膠中，形成高訊號矽膠背景中的多條低訊號曲線。故此影像最符合植入物破裂之診斷。⚠ 易混：capsular contracture以臨床硬度/變形為主、periprosthetic fluid為囊袋周圍積液（另有snowstorm/stepladder等徵象），皆非linguine sign所指。", "peropt": {"A": "✗ 莢膜攣縮以臨床硬度/變形為主，MRI 無 linguine sign。", "B": "◎ Linguine sign（麵條徵）為矽膠植入物囊內破裂（intracapsular rupture）之 MRI 特徵——塌陷外殼漂浮於外滲矽膠中。", "C": "✗ 脂肪壞死非此影像特徵（多見油囊/鈣化）。", "D": "✗ 乳癌局部復發非 linguine sign 表現。", "E": "✗ 囊袋內積液為植入物周圍液體（另有 subcapsular line 等），非塌陷外殼所致之麵條徵。"}, "cite": "待複查（NG 矽膠植入物破裂 linguine sign 記憶佐證）", "conflict": ""}, {"id": "2190", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "一位病人植入義乳已五年，近期出現單側乳房腫脹，超音波顯示囊袋周圍積液 >50mL。依據 BIA-ALCL 診斷流程，下一步最合適的處置為何？", "opts": {"A": "立即進行乳房植入物與莢膜移除手術", "B": "行細針抽吸術（FNA）並進行細胞學檢查與免疫染色", "C": "先給予抗生素並觀察", "D": "核磁共振檢查以確認莢膜厚度", "E": "更換植入物並追蹤復原狀況"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考植入物旁晚發積液（late periprosthetic seroma）的標準診斷流程。植入 >1 年出現單側腫脹、超音波示積液 >50 mL，下一步應行超音波導引細針抽吸（FNA），送 cytology 並做免疫染色（CD30）與 flow cytometry 排除 BIA-ALCL。⚠ 陷阱：切勿未確診即直接手術切除或更換植入物，也勿僅給抗生素觀察而延誤診斷；MRI 對莢膜厚度非此流程首選。", "peropt": {"A": "✗ 未確診前不宜立即行植入物與莢膜移除手術。", "B": "◎ 超音波導引 FNA 抽液送 cytology＋免疫染色（CD30）＋flow cytometry，為晚發積液 >50mL 之標準下一步。", "C": "✗ 僅抗生素觀察會延誤 BIA-ALCL 診斷。", "D": "✗ MRI 評估莢膜厚度非此積液診斷流程首選。", "E": "✗ 未診斷即更換植入物並不恰當。"}, "cite": "待複查（NG BIA-ALCL workup 記憶佐證）", "conflict": ""}, {"id": "2191", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "一位接受乳房植入手術的病患表示乳房變硬，外觀變形且出現疼痛，檢查時可見植入物輪廓並可觸摸。依據 Baker 分級，此屬於哪一級莢膜攣縮？", "opts": {"A": "Baker Grade I", "B": "Baker Grade II", "C": "Baker Grade III", "D": "Baker Grade IV", "E": "Baker Grade V"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Baker分級用於評估莢膜攣縮：Grade I 乳房柔軟、外觀正常；Grade II 稍硬但外觀正常；Grade III 較硬、變形且可見植入物輪廓；Grade IV 硬、變形、可觸摸植入物『且伴疼痛』。本題描述『變硬、外觀變形、可見輪廓且伴疼痛』符合Grade IV。⚠ 疼痛（painful）為區分III與IV的關鍵；Baker分級標準為I–IV，並無Grade V。", "peropt": {"A": "✗ Grade I 為柔軟、外觀正常——本題有變形＋疼痛，應為 Grade IV。", "B": "✗ Grade II 稍硬但外觀正常——本題變形＋疼痛，應為 Grade IV。", "C": "✗ Grade III 較硬、變形/可見輪廓但『無疼痛』——本題有疼痛，故應為 Grade IV。", "D": "◎ Grade IV：硬、變形、可觸摸植入物並伴疼痛（painful），符合描述。", "E": "✗ Baker 分級僅 I–IV，無 Grade V，屬干擾選項。"}, "cite": "待複查（NG Baker classification 莢膜攣縮 記憶佐證）", "conflict": ""}, {"id": "2192", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "下列哪一位患者最適合接受 augmentation mastopexy？", "opts": {"A": "42歲女性，拒絕乳房上有任何明顯疤痕", "B": "36歲女性，有全乳放射線治療病史，並有慢性皮膚纖維化", "C": "29歲女性，因哺乳後乳腺組織萎縮並有輕度下垂，想改善上胸飽滿度", "D": "35歲女性，仍在每日使用電子煙並拒絕戒菸", "E": "40歲女性，單純訴求乳頭下移但不希望增加體積"}, "ans": "C", "multi": false, "etype": "ai", "expl": "(請註明資料書名及頁次) Neligan, Chapter 5, p. 71, Box 5.1", "key": "🎯 本題考 augmentation mastopexy（隆乳併乳房固定）之理想適應對象。最適合者為需同時「增加上極飽滿度」＋「矯正輕度下垂」且無禁忌之病人：29 歲、哺乳後腺體萎縮、輕度下垂、想改善上胸飽滿。⚠ 排除要點：拒絕任何可見疤痕者不適合（術式必留疤）；全乳放療＋慢性皮膚纖維化為傷口/血運高風險；持續吸菸/電子煙且拒戒者為相對禁忌；僅要求乳頭移位矯正而不加體積者應行單純 mastopexy 而非 augmentation mastopexy。", "peropt": {"A": "✗ 拒絕乳房任何明顯疤痕者不適合——mastopexy 必留疤。", "B": "✗ 全乳放療＋慢性皮膚纖維化，傷口癒合與血運風險高，屬禁忌。", "C": "◎ 哺乳後腺體萎縮、輕度下垂、想改善上極飽滿，為理想適應對象。", "D": "✗ 每日使用電子煙且拒絕戒菸，為相對禁忌（傷口/NAC 缺血風險）。", "E": "✗ 僅要求乳頭位置矯正、不加體積者，應行單純 mastopexy，非 augmentation mastopexy。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2193", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "關於乳房植入物摘除手術中囊袋處理（capsule management）的各項術式，下列敘述何者正確？(複選)", "opts": {"A": "Capsulotomy 可應用於BIA-ALCL（Breast implant-associated anaplastic large cell lymphoma）或囊袋內含矽膠(silicone embedded in the capsule)的情況", "B": "Partial capsulectomy 是目前臨床上最常見的莢膜攣縮處理方式之一", "C": "Total capsulectomy 為所有患者的首選術式，併發症發生率最低", "D": "En bloc capsulectomy 適用於診斷明確的 BIA-ALCL患者", "E": "Neosubpectoral pocket 建立適用於所有囊袋感染或破裂病患"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 植入物摘除時之囊袋處理術式各有適應症。Partial capsulectomy為臨床上處理莢膜攣縮最常見術式之一；En bloc capsulectomy（整塊完整切除）適用於『診斷明確』的BIA-ALCL以確保腫瘤學邊界。⚠ 陷阱：Capsulotomy（切開）不足以處理BIA-ALCL（需切除）；Total capsulectomy並非所有病人首選、也非併發症最低；Neosubpectoral pocket並非所有感染/破裂病患皆適用，故A、C、E錯誤。", "peropt": {"A": "✗ 錯誤——BIA-ALCL 或矽膠殘留於囊袋者需 capsulectomy/en bloc 切除，capsulotomy（切開）不足。", "B": "◎ 正確——partial capsulectomy 為臨床最常見的莢膜攣縮處理方式之一。", "C": "✗ 錯誤——total capsulectomy 並非所有病人首選，且併發症未必最低。", "D": "◎ 正確——en bloc capsulectomy 適用於診斷明確的 BIA-ALCL（確保腫瘤學邊界）。", "E": "✗ 錯誤——neosubpectoral pocket 並非所有囊袋感染/破裂病患皆適用。"}, "cite": "待複查（NG capsule management / BIA-ALCL 手術 記憶佐證）", "conflict": ""}, {"id": "2194", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "下列哪些策略與降低乳房植入物手術後莢膜攣縮（capsular contracture）發生率有關？(複選)", "opts": {"A": "無接觸植入技術（No-touch technique）", "B": "使用抗生素沖洗手術腔隙（Pocket irrigation with antibiotics）", "C": "使用乳暈下切口（Periareolar incision）", "D": "將植入物放置於胸大肌下層（Submuscular implant pocket）", "E": "使用插入導套（Insertion sleeve）"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題考降低莢膜攣縮（capsular contracture）發生率的策略（複選）。實證有效者：無接觸植入技術（no-touch）、抗生素沖洗囊袋（pocket irrigation）、胸大肌下（submuscular）放置、使用插入導套（insertion sleeve），皆藉「降低細菌污染/biofilm」降低攣縮。⚠ 陷阱：periareolar 切口因穿越乳腺導管、細菌負荷較高，反而與較高攣縮/感染風險相關，並非降低攣縮之策略，故 C 不選；一般偏好 IMF 切口。", "peropt": {"A": "◎ No-touch technique 減少植入物污染，降低攣縮。", "B": "◎ 抗生素沖洗囊袋（pocket irrigation）降低細菌/biofilm 負荷。", "C": "✗ Periareolar 切口穿越乳腺導管、細菌負荷高，反與較高攣縮/感染相關（宜選 IMF 切口）。", "D": "◎ 胸大肌下（submuscular）放置與較低攣縮率相關。", "E": "◎ 使用插入導套（insertion sleeve）減少植入物與皮膚接觸污染。"}, "cite": "待複查（NG capsular contracture prevention 記憶佐證）", "conflict": ""}, {"id": "2195", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "What is the proper time for delayed TRAM flap reconstruction after patient completion of radiation therapy?", "opts": {"A": "1-2 months", "B": "3-5 months", "C": "6-9 months", "D": "More than one year", "E": "More than 2 years."}, "ans": "C", "multi": false, "etype": "ai", "expl": "Radiation is unpredictable and is recommended to be performed prior to the final TRAM flap reconstruction as it has been shown to be detrimental to not only the aesthetic outcome and shape of the flap but also cause contracture and pigmentation changes if performed after the flap reconstruction. Therefore, the authors approach is to perform flap reconstruction 6–9 months after the completion of radiation therapy with preoperative evaluation and assessment performed in clinic around 6 months after completion of radiation.\n\n4.以下哪個屬於男性女乳症(gynecomastia)的治療？\n\nA. Pull-through technique\n\nB. Open excision via an inferior periareolar approach\n\nC. Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern\n\nD. Suction-assisted lipectomy\n\nE. 以上皆是", "key": "🎯 放射治療對皮瓣外觀、形狀有害，且延遲重建常導致攣縮與色素改變，故建議放療應在最終TRAM重建『前』完成。作者建議於放療完成後6–9個月施行皮瓣重建（約放療後6個月門診評估），讓組織自急性放射炎恢復。故正確時機為6–9個月。", "peropt": {"A": "✗ 過早——正確為放療後 6–9 個月（非 1–2 個月），仍處急性放射反應期。", "B": "✗ 偏早——正確為 6–9 個月（非 3–5 個月），組織尚未恢復。", "C": "◎ 放療完成後 6–9 個月為延遲 TRAM 重建之適當時機。", "D": "✗ 過久——正確為 6–9 個月（非超過一年），過久會不必要延誤重建。", "E": "✗ 過度延遲——正確為 6–9 個月（非超過兩年），無此建議。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2196", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "關於乳房切除術後重建的incision selection以下何者錯誤？", "opts": {"A": "側側切口（Lateral）可保留最多乳頭血流，最安全", "B": "經乳暈旁(periareolar incision)隆乳有較低的感染率及莢膜攣縮率", "C": "垂直切口（Vertical）可最佳化乳頭位置並使乳頭更加集中和上提", "D": "乳下外側切口（Inferolateral IMF）外觀美觀；有經驗後併發症少", "E": "以上皆是"}, "ans": "B", "multi": false, "etype": "ai", "expl": "6.Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?\n\nA. Amphetamines, Heroin, marijuana\n\nB. Digoxin, ACE inhibitors, spironolactone\n\nC. Benzodiazepines, risperidone, haloperidol\n\nD. Anabolic steroids, Estrogen, Food contaminants\n\nE. Cephalosporins, Penicillins, Carbapenems", "key": "**Periareolar 切口的感染率與莢膜攣縮率較高，不是較低**（穿越含菌的乳管系統）。其餘關於乳房切除後重建切口的敘述（側方切口保留最多乳頭血流、垂直切口最佳化乳頭位置、乳下外側切口美觀且熟練後併發症少）皆正確。", "peropt": {"A": "✗ 敘述正確（非答案）——側方（lateral）切口保留最多乳頭血流，對 NAC 最安全。", "B": "◎ 答案＝錯述）乳暈旁（periareolar）切口的感染率與莢膜攣縮率『較高』（穿越含菌乳管），非較低。", "C": "✗ 敘述正確——垂直切口可最佳化乳頭位置，使乳頭更集中並上提。", "D": "✗ 敘述正確——乳下外側（inferolateral IMF）切口外觀美觀，術者熟練後併發症少。", "E": "✗ B 為錯述，不選以上皆是。"}, "cite": "Neligan, 5th Edition, vol.5, Ch21 p269", "conflict": ""}, {"id": "2198", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned. Which level is the most appropriate to performed?", "opts": {"A": "Rib1-2", "B": "Rib3-4", "C": "Rib5-6", "D": "Rib7-8", "E": "Rib9-10"}, "ans": "B", "multi": false, "etype": "ai", "expl": "The mean distances of the artery from the costochondral junction is approximately 1 cm, 2 cm and 3 cm at the costal levels 2, 3 and 4, respectively. The internal mammary venous anatomy demonstrates variation, with veins typically being larger on the right side (up to 3 mm) than the left (<2 mm). The level of bifurcation of the veins also differs, bifurcating most frequently in the third intercostal space on the left, compared to the fourth intercostal space on the right. For these reasons, dissection of the vessels is commonly performed at the level of the left third or fourth rib, and the fourth rib on the right side.", "key": "🎯 本題考游離 DIEP 皮瓣以 IMA/IMV 為受區血管時的暴露肋骨高度，答案為第 3–4 肋（Rib 3-4）。原因：IMV 口徑左側常 <2 mm、右側可達 3 mm；靜脈分叉在左側最常見於第 3 肋間、右側第 4 肋間，故臨床常在左側第 3/4 肋、右側第 4 肋暴露血管以取得足夠口徑。⚠ 過高（1-2 肋）血管深且口徑不利，過低（5 肋以下）動脈變細。", "peropt": {"A": "✗ 第 1–2 肋過高——正解為第 3–4 肋；此處血管深、口徑不利暴露。", "B": "◎ 第 3–4 肋為 IMA/IMV 暴露最合適高度（口徑與靜脈分叉最利：左側常於第 3 肋間、右側第 4 肋間）。", "C": "✗ 第 5–6 肋處動脈已較細——正解為第 3–4 肋，非首選。", "D": "✗ 第 7–8 肋過低——正解為第 3–4 肋。", "E": "✗ 第 9–10 肋遠離適當受區範圍——正解為第 3–4 肋。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2199", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Which of the following statements about Nipple–Areola Complex (NAC) repositioning is incorrect?", "opts": {"A": "Previous radiation therapy and vertical mastectomy incisions are independently predictive of NAC mal- position.", "B": "Moderate malposition between 2 and 3 cm", "C": "True type of NAC malposition is a real malposition of the nipple on the breast and chest wall.", "D": "False type of NAC malposition related to incorrect pocket dissection and wrong implant placement.", "E": "Free nipple-grafting has a high risk of depigmentation and loss of NAC projection, which may jeopardize patient satisfaction"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Mild: malposition less than 1 cm.\n\nModerate: malposition between 1 and 2 cm.\n\nSevere: malposition greater than 2 cm.", "key": "🎯 本題為反向作答（挑『錯誤』者）。NAC malposition分級：mild <1cm、moderate 1–2cm、severe >2cm。既往放療與vertical mastectomy切口為NAC移位的獨立預測因子；『真性（true）』移位為乳頭在乳房/胸壁上真正錯位，『假性（false）』移位則因囊袋剝離不當/植入物位置錯誤所致；free nipple graft有高度去色素與投影喪失風險。⚠ 錯誤在B：中度應為1–2cm，而非2–3cm。", "peropt": {"A": "✗ 敘述正確（非答案）——既往放療與 vertical mastectomy 切口為 NAC 移位的獨立預測因子。", "B": "◎ 答案＝錯誤敘述）中度移位應為 1–2cm，而非 2–3cm；分級：mild <1cm、moderate 1–2cm、severe >2cm。", "C": "✗ 敘述正確——true type 為乳頭於乳房/胸壁的真正錯位。", "D": "✗ 敘述正確——false type 與囊袋剝離不當/植入物位置錯誤有關。", "E": "✗ 敘述正確——free nipple graft 有高度去色素與投影喪失風險。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2200", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Which is not comorbidities that increase risk of complications in breast reconstruction ?", "opts": {"A": "Diabetes", "B": "Smoking", "C": "Alcohol", "D": "Obesity", "E": "Coronary Artery Disease"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "增加乳房重建併發症風險的共病：**糖尿病、抽菸、肥胖、冠狀動脈疾病**（灌流與癒合相關）。**酒精**在本題答案鍵中不列為增加風險的共病——雖然 ERAS 建議術前戒酒，但它不屬傳統列舉的共病危險因子。", "peropt": {"A": "✗ 為危險共病——糖尿病造成微血管病變與感染率上升。", "B": "✗ 為危險共病——抽菸是最強的可改變危險因子。", "C": "◎ ＝非共病危險因子）酒精於本題不列為增加重建併發症之共病；惟 ERAS 仍建議術前戒酒。", "D": "✗ 為危險共病——肥胖增加感染、傷口裂開與皮瓣壞死。", "E": "✗ 為危險共病——冠狀動脈疾病增加麻醉與長時間手術之風險。"}, "cite": "Neligan, 5th Edition, vol.5, Ch17 p230", "conflict": ""}, {"id": "2201", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Breast reconstruction with abdominal tissues remains the gold standard when autologous options are desired, which of the following statements is incorrect?", "opts": {"A": "The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the commonly used autologous methods of breast reconstruction todays", "B": "Superficial Inferior Epigastric Artery flap preserve entire rectus muscle and anterior rectus sheath", "C": "The rectus abdominis is a type III muscle according to the Mathes and Nahai classification.", "D": "Venous congestion is the primary factor associated with DIEP flap failure", "E": "The sensory reinnervation recipient nerve is the anterior cutaneous branch of the 2nd intercostal nerve"}, "ans": "E", "multi": false, "etype": "ai", "expl": "The recipient nerve is dissected with the recipient internal mammary artery and vein and is the anterior cutaneous branch of the 3rd intercostal nerve typically identified at the inferior sternochondral junction.", "key": "🎯 本題問腹部組織乳房重建之「何者錯誤」。正確敘述：pedicled TRAM 由 Hartrampf 於 1980 年代提出、迄今常用；SIEA flap 完整保留腹直肌與前鞘；rectus abdominis 屬 Mathes-Nahai Type III；venous congestion 為 DIEP 皮瓣失敗主因。⚠ 錯誤在 E：感覺重建之受區神經為第 3 肋間神經之 anterior cutaneous branch（於 inferior sternochondral junction 附近辨識），並非第 2 肋間，故 E＝答案。", "peropt": {"A": "✗ 敘述正確（非答案）——pedicled TRAM 由 Hartrampf 於 1980s 提出並沿用至今。", "B": "✗ 敘述正確——SIEA flap 完整保留整條腹直肌與前鞘。", "C": "✗ 敘述正確——rectus abdominis 屬 Mathes-Nahai Type III。", "D": "✗ 敘述正確——venous congestion 為 DIEP 皮瓣失敗主因。", "E": "◎ ＝錯誤敘述）受區感覺神經為第 3 肋間神經（3rd intercostal）之 anterior cutaneous branch（於 inferior sternochondral junction 附近辨識），非第 2 肋間。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2202", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Direct-to-implant breast reconstruction中 胸大肌下（Subpectoral）相較胸大肌上（Prepectoral）的優點為何者? (複選)", "opts": {"A": "Better uplift of breast", "B": "Less pain in first postoperative week", "C": "Better upper pole coverage, smoother contour", "D": "Less or no animation", "E": "All of above"}, "ans": "AC", "multi": true, "etype": "ai", "expl": "", "key": "Direct-to-implant 的平面選擇：**Subpectoral（胸大肌下）的優點是提托效果較好、上極覆蓋較佳、輪廓較平順**；代價是術後第一週疼痛較多、且有 animation deformity。**Less pain 與 less animation 都是 Prepectoral 的優點**，不是 subpectoral 的。", "peropt": {"A": "◎ subpectoral 優點——胸大肌提供上方支撐，提托效果較好。", "B": "✗ 錯——胸大肌被剝離撐開，術後第一週疼痛『較多』；疼痛少是 prepectoral 的優點。", "C": "◎ subpectoral 優點——肌肉覆蓋上極，輪廓較平順、義乳邊緣不明顯。", "D": "✗ 錯——animation deformity 正是 subpectoral 缺點；無/少 animation 為 prepectoral 優點。", "E": "✗ 並非全部皆是，不選。"}, "cite": "Neligan, 5th Edition, vol.5, Ch21 p271", "conflict": ""}, {"id": "2203", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "關於Contralateral prophylactic mastectomy (CPM)的敘述何者正確? (複選)", "opts": {"A": "CPM rates are highest among Caucasians, patients with higher socioeconomic status", "B": "Older patient age is considered one of the strongest factors associated with increasing CPM rates", "C": "MRI and genetic test increase CPM amount", "D": "largely physician-driven with evidence-based recommendation", "E": "avoidance of future screening and decreasing related patient anxiety"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "B: Younger patient age is considered one of the strongest factors associated with increasing CPM rates.  \nD: The decision to undergo CPM at the time of unilateral mastec- tomy is complex, but is largely patient-driven.  \nWith regards to oncologic benefit of CPM, to our knowl- edge, there are no prospective studies that demonstrate an advantage.\n\n13.Implant-based reconstruction (IBR) 比起 autologous based reconstruction(ABR)，有何益處? (複選)\n\nA. 恢復速度可能較快（Potential quicker recovery）\n\nB. 學習曲線較簡單（Easier learning curve）\n\nC. 外觀自然（Natural appearance）\n\nD. 減少住院費用（Shorter hospitalization）\n\nE. 恢復速度可能較快（Potential quicker recovery）", "key": "🎯 對側預防性乳房切除（CPM）的流行病學：CPM率在白人、社經地位較高者最高；MRI與基因檢測會增加CPM量；病人常藉此避免未來篩檢並降低焦慮。⚠ 兩大陷阱：（1）『年輕』而非年長病人才是CPM上升的最強相關因子；（2）CPM決策主要為『病人主導（patient-driven）』而非醫師主導/實證建議（目前無前瞻研究證實其腫瘤學益處）。故B、D錯誤，答案為ACE。", "peropt": {"A": "◎ 正確——CPM 率在白人、社經地位較高者最高。", "B": "✗ 錯誤——『年輕』而非年長病人才是 CPM 上升的最強相關因子。", "C": "◎ 正確——MRI 與基因檢測會增加 CPM 量。", "D": "✗ 錯誤——CPM 決策主要為病人主導（patient-driven），而非醫師主導/實證建議（目前無前瞻研究證實其腫瘤學益處）。", "E": "◎ 正確——避免未來篩檢並降低相關病人焦慮為常見動機。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2204", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Implant-based reconstruction (IBR) 比起 autologous based reconstruction(ABR)，有何益處? (複選)", "opts": {"A": "恢復速度可能較快（Potential quicker recovery）", "B": "學習曲線較簡單（Easier learning curve）", "C": "外觀自然（Natural appearance）", "D": "減少住院費用（Shorter hospitalization）", "E": "恢復速度可能較快（Potential quicker recovery）"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "14.Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)\n\nA. The dissection of a DIEAP flap has a steep learning curve\n\nB. The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap\n\nC. The deep inferior epigastric artery arises from the common iliac artery\n\nD. Abdominal scarring is probably the most important risk factor for raising a DIEAP flap\n\nE. Smoking is considered a relative contraindication to raising a DIEAP flap", "key": "🎯 本題比較 implant-based reconstruction（IBR）相較 autologous-based reconstruction（ABR）的益處（複選）。IBR 優勢：恢復可能較快（potential quicker recovery）、學習曲線較簡單、住院時間較短、避免供區併發症。⚠ 陷阱：外觀「自然（natural appearance）」與觸感較佳實為「自體重建（ABR）」的優勢，非 IBR，故 C 不選。另注意本題選項 A 與 E 文字重複（皆為 potential quicker recovery），兩者皆計入正確。", "peropt": {"A": "◎ IBR 恢復速度可能較快（potential quicker recovery）。", "B": "◎ 學習曲線較簡單（easier learning curve）。", "C": "✗ 外觀自然（natural appearance）/觸感較佳實為自體重建（ABR）之優勢，非 IBR。", "D": "◎ 住院時間較短（shorter hospitalization）、費用較低。", "E": "◎ 恢復速度可能較快（與 A 為重複選項，同屬正確）。"}, "cite": "待複查（NG IBR vs ABR 記憶佐證）", "conflict": ""}, {"id": "2205", "sub": "BRE", "src": "NG", "years": [114], "stem": "Which of the following statements is not the indications for SIEA flap for breast reconstruction?", "opts": {"A": "The patient can safely tolerate 5–12 h of general anesthesia and does not have a known hypercoagulable state", "B": "History of previous abdominoplasty or panniculectomy", "C": "SIEA >1.5mm in external diameter", "D": "SIEA flap perfused well after temporarily occluded DIEP perforators", "E": "None of above"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "SIEA 三項核心選用條件為耐受長時麻醉（5–12 小時）／無高凝狀態、SIEA 外徑 >1.5 mm、夾閉 DIEP 穿通枝後仍灌流良好。既往腹整形／脂膜切除（abdominoplasty/panniculectomy）已離斷 SIEA，是禁忌，故為『非適應症』的答案。", "peropt": {"A": "✗ 為適應條件——可安全耐受 5–12 小時麻醉、無已知高凝狀態。", "B": "◎ ＝非適應症）既往 abdominoplasty 或 panniculectomy 已離斷 SIEA，屬禁忌。", "C": "✗ 為適應條件——SIEA 外徑須 >1.5 mm。", "D": "✗ 為適應條件——暫時阻斷深層 DIEP 穿通枝後皮瓣仍灌流良好。", "E": "✗ 存在非適應症選項（B），不選 None。"}, "cite": "Neligan, 5th Edition, vol.5, Ch32, p415-416", "conflict": ""}, {"id": "2206", "sub": "BRE", "src": "NG", "years": [114], "stem": "下列何者為 Alternative flaps for breast reconstruction ?", "opts": {"A": "Transverse upper gracilis free flap (TUG)", "B": "Superior gluteal artery free flap (SGAP)", "C": "Inferior gluteal artery free flap (IGAP)", "D": "Lumbar artery perforator flap (LAP)", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "腹部組織不可用時的替代游離皮瓣「以上皆是」：TUG、SGAP、IGAP、LAP。核心記憶：**大腿（TUG／PAP）、臀部（SGAP／IGAP）、腰部（LAP）** 三大區域。", "peropt": {"A": "✓ TUG，橫向股薄肌上部皮瓣（transverse upper gracilis）。", "B": "✓ SGAP，上臀動脈穿通枝皮瓣。", "C": "✓ IGAP，下臀動脈穿通枝皮瓣。", "D": "✓ LAP，腰動脈穿通枝皮瓣。", "E": "◎ ——以上皆是（大腿 TUG/PAP、臀部 SGAP/IGAP、腰部 LAP 三大區域）。"}, "cite": "Neligan, 5th Edition, vol.5, Ch33, p420-421", "conflict": ""}, {"id": "2208", "sub": "BRE", "src": "NG", "years": [114], "stem": "Which is false about the lumbar artery perforator (LAP) flap?", "opts": {"A": "Lumbar arteries are somatic segmental branches of the abdominal aorta and correspond to the posterior intercostal arteries of the thoracic aorta", "B": "Only the upper two (L1 and L2) are of interest to the reconstructive surgeon", "C": "The blood vessels pass behind the psoas major muscle, run past the transverse process of the vertebrae and cross the quadratus lumborum", "D": "The pedicle pierces the thoracolumbar fascia or is sometimes encased by it then enters the subcutaneous fat of the “love handles” and branches out from medial to lateral to perfuse the skin surface overlying the iliac crest", "E": "The skin island is innervated by the superior cluneal nerves, that also emerge from beneath the thoracolumbar fascia"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "腰動脈為腹主動脈的體節分支，**L1–L4 皆具重建價值**（臨床以較低位 L3/L4 穿通枝為主），並非「只有上兩條 L1、L2 有意義」。其餘關於行經路徑（psoas major 後方、越過橫突與 quadratus lumborum）、穿出 thoracolumbar fascia 進入 love handles 脂肪、以及 superior cluneal nerves 支配皮島的敘述皆正確。", "peropt": {"A": "✗ 敘述正確（非答案）——腰動脈為腹主動脈的體節分支，相當於胸主動脈的後肋間動脈。", "B": "◎ ＝錯述）並非只有 L1、L2 有臨床價值——L1–L4 皆具重建價值，L3、L4 的穿通枝實為 LAP 常用來源。", "C": "✗ 敘述正確——血管行經 psoas major 後方，越過椎體橫突，橫跨 quadratus lumborum。", "D": "✗ 敘述正確——蒂穿出（或被包覆於）thoracolumbar fascia 後進入 love handles 皮下脂肪，由內向外分支灌流髂脊上方皮膚。", "E": "✗ 敘述正確——皮島由 superior cluneal nerves 支配，該神經同樣自 thoracolumbar fascia 下方穿出。"}, "cite": "Neligan, 5th Edition, vol.5, Ch37, p461", "conflict": ""}, {"id": "2209", "sub": "BRE", "src": "NG", "years": [114], "stem": "Which is true about hybrid breast reconstruction?", "opts": {"A": "It combining autologous tissue and implants for breast reconstruction", "B": "The plane of implant placement in hybrid breast reconstruction has transitioned from the submuscular to the pre-pectoral plane", "C": "Options include immediate or delayed implant placement", "D": "Microsurgical hybrid breast reconstruction with abdominal flaps is associated with excellent clinical outcomes, with the generous soft tissue provided by the abdominal flap allowing for stable soft tissue coverage of the implant.", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "Hybrid 乳房重建四項敘述全對：結合自體組織與義乳；義乳平面已由 submuscular 轉向 **pre-pectoral**；義乳可即時或延遲置入；以腹部皮瓣行顯微 hybrid 重建臨床結果優異，皮瓣提供的豐厚軟組織可穩定覆蓋義乳。", "peropt": {"A": "✓ Hybrid ＝ 自體組織＋義乳的組合重建。", "B": "✓ 義乳平面已從 submuscular 轉向 pre-pectoral。", "C": "✓ 義乳可選擇即時或延遲（分期）置入。", "D": "✓ 腹部皮瓣的顯微 hybrid 重建結果優異，豐厚軟組織穩定覆蓋義乳。", "E": "◎ ——以上皆是。"}, "cite": "Neligan, 5th Edition, vol.5, Ch38, p470, 474", "conflict": ""}, {"id": "2210", "sub": "BRE", "src": "NG", "years": [114], "stem": "Which is true about stacked and conjoined flap for breast reconstruction?", "opts": {"A": "When available tissue from a single donor area is inadequate, stacked or conjoined multi-pedicle flaps from a single or multiple donor area(s) can provide a fully autologous-only breast reconstruction.", "B": "In unilateral cases, the most common option is the stacked or conjoined bipedicled deep inferior epigastric perforator (DIEP) flap supplied by two anatomically distinct vascular pedicles", "C": "In bilateral breast reconstructions, a combination of flaps such as DIEP flap, PAP flap, TUG flap, LAP flap, and IGAP/SGAP flap can be used in the form of a four-flap reconstruction to provide a volume appropriate breast reconstruction", "D": "Radiation deficits that create an imbalance of chest wall soft tissue and skin availability benefit from a multi-flap breast reconstruction which affords an opportunity to improve radiation-related changes", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "本題各選項皆正確：C 寫「雙側重建以 **four-flap** 方式組合」是正確的，故答案為 All of the above。請把數字釘死：**單側＝雙蒂 stacked DIEP；雙側＝四皮瓣**。", "peropt": {"A": "✓ 單一供區不足時，多蒂 stacked／conjoined 皮瓣可達成完全自體重建。", "B": "✓ 單側最常見為兩條獨立血管蒂供養的雙蒂 stacked DIEP。", "C": "✓ 雙側重建可組合 DIEP／PAP／TUG／LAP／IGAP/SGAP，以 four-flap 形式提供足夠體積。", "D": "✓ 多皮瓣重建可改善放療造成的胸壁軟組織與皮膚不足。", "E": "◎ ——以上皆是（單側＝雙蒂 stacked DIEP；雙側＝四皮瓣）。"}, "cite": "Neligan, 5th Edition, vol.5, Ch40, p481", "conflict": "⚠陷阱對照｜NG114 問『正確』全對，答 E；NG115 問『錯誤』且 C 被改成『two-flap』(原 four-flap)，答 C。看到雙側四瓣重建敘述先確認該版寫 two 還是 four。"}, {"id": "2211", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Which is true about enhanced recovery after surgery (ERAS) in breast surgery?", "opts": {"A": "ERAS protocols within plastic surgery have demonstrated significant improvements in postoperative recovery, patient opioid usage, patient LOS, and PONV", "B": "The most important aspects of any ERAS protocol can be broken down into preoperative, perioperative, intra-operative, and postoperative interventions.", "C": "The preoperative phase should focus on educating the patient on the surgical experience and optimizing them for surgery through proper nutrition, smoking and/or alcohol cessation, reasonable pain expectations, and preoperative exercise", "D": "Perioperative interventions include multimodal analgesia given on a scheduled basis.", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "ERAS 在乳房手術的四項敘述全對：整外領域的 ERAS 已顯示術後恢復顯著改善；可分為術前、圍手術期、術中、術後四階段；**術前重點是衛教、營養優化、戒菸戒酒、合理的疼痛期待與術前運動**；圍手術期採**按時給予的多模式鎮痛**（減少鴉片類用量）。", "peropt": {"A": "✓ 整形外科的 ERAS 方案已證實顯著改善術後恢復、鴉片用量、LOS 與 PONV。", "B": "✓ ERAS 可分為術前、圍手術期、術中、術後四類介入。", "C": "✓ 術前階段聚焦衛教、營養優化、戒菸戒酒、合理疼痛期待與術前運動。", "D": "✓ 圍手術期以按時（scheduled）給予的多模式鎮痛為核心。", "E": "◎ ——以上皆是。"}, "cite": "Neligan, 5th Edition, vol.5, Ch42,p513-514", "conflict": ""}, {"id": "2213", "sub": "BRE", "src": "NG", "years": [114], "stem": "Which of the following statements are the indications for a unipedicled free TRAM flap?(複選)", "opts": {"A": "Flap weight is expected to be twice the mastectomy weight", "B": "Flap weight is not expected to be twice the mastectomy weight", "C": "Patient having a midline vertical scar", "D": "ICG angiography showed a sufficient perfusion area after temporarily clamping of the contralateral key perforator", "E": "All of above"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "單蒂（unipedicled）free TRAM 的適應是「單側穿通枝灌流足以支撐所需皮瓣體積」。術中 ICG 血管攝影在暫時夾閉對側關鍵穿通枝後仍顯示灌流區域充足（D），即可安全採單蒂。⚠ A 選項在不同版本敘述方向相反（部分版本把「皮瓣重量預期為乳房切除重量兩倍」列為需雙蒂的情況），本年答案鍵將 A 列為適應症，作答以答案鍵為準。", "peropt": {"A": "◎ 本年答案鍵列為適應症。原則抓「單側穿通枝灌流是否足以支撐所需皮瓣體積」，版本間數字敘述有出入勿死背。", "B": "✗ 依本年答案鍵不列為適應症（與 A 互為反述）。", "C": "✗ 腹部正中垂直疤痕（midline vertical scar）會阻斷跨中線灌流，使皮瓣僅能取同側 hemi-flap，屬限制條件而非單蒂適應症。", "D": "◎ 適應症。ICG 於暫時夾閉對側關鍵穿通枝後仍顯示灌流面積足夠，直接證明單蒂可行。", "E": "✗ 並非所有選項皆為適應症（C 為限制條件），故不選 All of above。"}, "cite": "Neligan, 5th Edition, vol.5, Ch31, p.410", "conflict": ""}, {"id": "2215", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "Which statements about the thoracodorsal artery perforator (TDAP) flap are true?(複選)", "opts": {"A": "The TDAP flap is one of the main surgical options in immediate or delayed partial breast reconstruction when a volume replacement technique is required", "B": "In the event that the volume obtained from the TDAP flap is insufficient, additional fat grafting may be performed to increase volume using the TDAP flap as an autologous scaffold.", "C": "The TDAP flap offers an alternative for patients in whom abdominal flaps are high-risk or unavailable", "D": "The TDAP flap could be a primary option in patients with small to medium breast size.", "E": "The benefits include avoidance of microsurgery, reduced operative time, reliability of the procedure, low morbidity of the donor area, and efficacy of the technique."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "TDAP 皮瓣在**部分乳房重建（volume replacement）**的五項優點全對：可用於即時或延遲重建、體積不足時可以 TDAP 當自體支架再加脂肪移植、是腹部皮瓣高風險或不可用時的替代方案、對中小型乳房可作首選、且**免顯微手術、手術時間短、可靠、供區傷害低**。", "peropt": {"A": "◎ 需要 volume replacement 技術時，即時或延遲部分乳房重建的主要選項之一。", "B": "◎ 體積不足時，可作為血管化自體支架再加 fat grafting 增量。", "C": "◎ 腹部皮瓣高風險或不可用（既往手術、瘦削、需保留腹部）時之替代方案。", "D": "◎ 中小型乳房之部分缺損可作首選。", "E": "◎ 優點：免顯微吻合、手術時間短、術式可靠、供區傷害低、療效佳。"}, "cite": "Neligan, 5th Edition, vol.5, Ch46", "conflict": ""}, {"id": "2216", "sub": "BRE", "src": "NG", "years": [114, 115], "stem": "What is the stage of non-pitting edema in the setting of fibrotic subcutaneous tissue and overlying skin by International Society of Lymphology(ISL) staging system?", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 ISL 淋巴水腫分期。**官方答案 D（Stage III，依原卷計分）**：非凹陷性水腫＋皮下組織與表層皮膚纖維化＝象皮病範疇。⚠ 跨年爭議：NG115 同題曾判 Stage II（晚期 II 也不再凹陷），界線在「有無象皮病外觀（皮膚增厚、疣狀增生）」；本卷/NG114 官方為 III。", "peropt": {"A": "✗ Stage 0（latent/subclinical）：淋巴運輸已受損但尚無臨床可見水腫。", "B": "✗ Stage I：早期，抬高患肢可消退之 pitting edema。", "C": "✗ Stage II：晚期 Stage II 已轉為 non-pitting（組織纖維化開始）、抬高不再消退；惟本題已有皮下＋表皮纖維化之象皮病外觀故歸 III（NG115 曾判 II，本卷官方為 III）。", "D": "◎ 官方答案 Stage III：non-pitting edema＋皮下與表層皮膚纖維化＝lymphostatic elephantiasis。", "E": "✗ ISL 分期僅 0、I、II、III，並無 Stage IV。"}, "cite": "Neligan, 5th Edition, vol.5, Ch47 p557", "conflict": "ISL 分期跨年衝突：NG114 原答 D(III)、NG115 答 C(II)。依新版（115）為準，更正為 C（2026-07-10 Jason 裁定）。 ⚠ 同題歷屆重出：ISL lymphedema分期，2216（114年）與2229（115年）題目與選項相同，皆答C（Stage II）；僅標點空白差異。 ｜ 2026-07-16 Jason 裁定：依原卷計分改回官方答 D（曾更正為 C）。"}, {"id": "2217", "sub": "BRE", "src": "NG", "years": [115], "stem": "一名 15歲男生 因雙側乳房隆起就診，已持續 18個月。過去無特殊病史，BMI正常，未服用任何藥物。理學檢查顯示乳房主要為纖維腺體組織，乳頭位置正常，無明顯皮膚鬆弛。無溢乳（galactorrhea）、視野缺損或睪丸異常。根據本文內容，下列何者正確？（複選）", "opts": {"A": "持續超過1年的 gynecomastia，因纖維化與玻璃樣變增加，較可能需要手術治療", "B": "此病人應立即接受內分泌檢查，因所有青春期男性女乳症皆需排除內分泌疾病", "C": "若乳房主要為腺體組織且無皮膚鬆弛，liposuction alone 可作為治療選項", "D": "直接切除腺體時需避免乳頭下方過度切除，以免產生 saucer deformity", "E": "青少年患者即使只有輕度 persistent gynecomastia，也可能出現顯著 psychosocial distress"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "A. 正確，持續超過 1年 的 gynecomastia 較容易出現 fibrosis 與 hyalinization，因此手術需求增加。\n\nB. 錯誤，只有出現 galactorrhea、視野異常、睪丸異常或 Klinefelter 特徵 時才需進一步內分泌評估。\n\nC. 正確，Simon grade 1、2a 或 Rohrich Ia、IIa（無皮膚鬆弛、乳頭位置佳）可考慮 liposuction alone。\n\nD. 正確，乳頭下方過度切除會造成典型的 saucer deformity（凹陷乳頭畸形）。\n\nE. 正確，pediatric gynecomastia 與 顯著心理社會困擾 有關，可能影響青少年社交與認知發展。", "key": "🎯 本題為 15 歲持續性青春期男性女乳症之臨床決策（複選）。核心：持續 >1 年者因 fibrosis 與 hyalinization 增加，較可能需手術；腺體為主且無皮膚鬆弛者（Simon 1、2a／Rohrich Ia、IIa）可考慮 liposuction alone；直接腺體切除需避免乳頭下方過度切除以免 saucer deformity；即使輕度持續性 gynecomastia 亦可能造成顯著心理社會困擾。⚠ 陷阱：並非「所有」青春期男性女乳症皆需立即內分泌檢查，僅在 galactorrhea、視野缺損、睪丸異常或 Klinefelter 特徵等紅旗徵象時才進一步評估，故 B 錯。", "peropt": {"A": "◎ 持續 >1 年因 fibrosis／hyalinization 增加，較可能需手術。", "B": "✗ 並非「所有」青春期男性女乳症皆需立即內分泌檢查；僅在 galactorrhea、視野缺損、睪丸異常或 Klinefelter 特徵等 red flags 時才進一步評估。", "C": "◎ 腺體為主且無皮膚鬆弛（Simon 1／2a、Rohrich Ia／IIa）可考慮單純 liposuction。", "D": "◎ 乳頭下方過度切除→saucer deformity，須保留乳頭下少量腺體。", "E": "◎ 即使輕度持續性亦可能造成顯著 psychosocial distress。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2218", "sub": "BRE", "src": "NG", "years": [115], "stem": "Which of the following statements about the free Transverse Rectus Abdominis Myocutaneous (TRAM) flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is categorized as a Mathes and Nahai Type III muscle.", "B": "Postoperative abdominal bulging is most frequently caused by the thinning or attenuation of the anterior rectus sheath.", "C": "Standard recipient vessels for a free TRAM flap include the internal mammary vessels and the thoracodorsal vessels.", "D": "A flap that results in the preservation of the entire rectus abdominis muscle is classified as an MS-2 flap.", "E": "None of the above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "同一 MS 分級家族的 5e 版本：這次錯述改成「完整保留腹直肌＝MS-2」。正確應為 MS-3（＝DIEP）。MS-2 是保留內、外兩側肌條，只取中段肌肉。", "peropt": {"A": "正確敘述（非選）。rectus abdominis 為 Mathes-Nahai Type III（雙優勢蒂：上 superior epigastric、下 DIEA）。", "B": "正確敘述（非選）。腹壁膨出最常見於 anterior rectus sheath 變薄鬆弛。", "C": "正確敘述（非選）。標準受區血管為 internal mammary 與 thoracodorsal vessels。", "D": "◎ ／錯述）。完整保留整條腹直肌是 MS-3（＝DIEP）；MS-2 指保留內、外兩側肌條、僅取中段肌肉（MS-0 全肌、MS-1 保留外側條）。", "E": "✗ 存在明確錯述（D），故不選 None of above。"}, "cite": "Neligan, 5th Edition, vol.5, Ch31, p397", "conflict": "跨年數值差異（Neligan 4e vs Neligan 5e）：A: 112「The rectus abdominis muscle is a Mathes 」 vs 115「The rectus abdominis muscle is categoriz」；B: 112「An abdominal bulge is most often due to 」 vs 115「Postoperative abdominal bulging is most 」；C: 112「Recipient vessels for the free TRAM flap」 vs 115「Standard recipient vessels for a free TR」；D: 112「Preservation of the entire rectus abdomi」 vs 115「A flap that results in the preservation 」；E: 112「None of above」 vs 115「None of the above」"}, {"id": "2219", "sub": "BRE", "src": "NG", "years": [115], "stem": "When abdominal tissue is unavailable, alternative free flaps are utilized for autologous breast reconstruction. Which of the following statements regarding these alternative flaps is/are TRUE? (複選)", "opts": {"A": "The Transverse Upper Gracilis (TUG) flap is limited by a relatively short vascular pedicle (typically 6–7 cm) and can cause donor-site morbidity such as transient or permanent injury to the obturator nerve's posterior division.", "B": "The Superior Gluteal Artery Perforator (SGAP) flap offers a longer vascular pedicle than the Inferior Gluteal Artery Perforator (IGAP) flap but frequently results in a contour deformity that mimics Sciatic nerve compression syndrome.", "C": "The Lumbar Artery Perforator (LAP) flap provides a robust volume of dense fat suitable for large breast reconstruction, but its harvest is technically challenging due to the short pedicle length and the intramuscular course through the erector spinae muscle.", "D": "When harvesting an IGAP flap, the surgeon must carefully identify and preserve the posterior femoral cutaneous nerve (PFCN) to prevent painful neuroma formation or posterior thigh paresthesia.", "E": "Compared to the gluteal flaps, the TUG flap yields a tissue texture that is softer and more compliant, closely mimicking natural breast parenchyma, but is constrained by a more limited total volume capacity."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "腹部組織不可用時的替代皮瓣比較：TUG 蒂短（約 5.5–7 cm）、體積有限、質地柔軟；供區風險是 **閉孔神經前支**（支配 gracilis）與淋巴水腫。SGAP 蒂**短於** IGAP。LAP 脂肪量大但蒂短、需穿過 erector spinae，技術困難。IGAP 需辨識並保留 posterior femoral cutaneous nerve。", "peropt": {"A": "✗ TUG 蒂長約 5.5–7 cm（此點正確），但 gracilis 由閉孔神經「前支（anterior division）」支配，選項寫 posterior division 為誤。", "B": "✗ SGAP 的蒂「比 IGAP 短」（SGAP 約 5–8 cm、IGAP 較長可達 7–10 cm）；且坐骨神經壓迫相關輪廓問題屬 IGAP、非 SGAP。", "C": "◎ LAP 提供大量緻密脂肪、適合較大乳房，但蒂短（約 3–4 cm、常需 vein graft）且需穿行 erector spinae，技術困難。", "D": "◎ 取 IGAP 須辨識並保留 posterior femoral cutaneous nerve，否則造成神經瘤疼痛或大腿後側感覺異常。", "E": "◎ TUG 質地較臀部皮瓣柔軟、順應性佳、近似乳腺實質，但總體積受限。"}, "cite": "Neligan, 5th Edition, vol.5, Ch33,p420-423", "conflict": ""}, {"id": "2220", "sub": "BRE", "src": "NG", "years": [115], "stem": "Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "The profunda femoris artery arises from the common femoral artery and travels directly into the medial compartment of the thigh to give off its perforators.", "B": "The surgical dissection of the PAP flap is straightforward because the primary perforators consistently run an intramuscular course through the adductor longus muscle.", "C": "The resulting donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.", "D": "Common postoperative complications associated with this flap include fat necrosis at the recipient site, as well as donor-site seroma, hematoma, and wound infection.", "E": "None of the above"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "PAP 皮瓣的兩個必考陷阱：① 穿通枝主要走行於 **gracilis 與 adductor magnus 之間的中隔皮膚（septocutaneous）路徑**，或穿行 adductor magnus，**不是 adductor longus**；② 剝離並不「straightforward」。此外 profunda femoris artery 由 common femoral artery 分出後進入大腿**後側**間隔，非內側間隔。", "peropt": {"A": "敘述用字寬鬆（非本題正解）。嚴格言 profunda femoris（deep femoral a.）由 common femoral a. 分出後供應大腿「後側」間隔；作答以更明確錯誤之 B 為準。", "B": "◎ ／錯述）。PAP 穿通枝並非「一致地」肌內穿過 adductor longus；實際多走 gracilis 與 adductor magnus 之間 septocutaneous 路徑或穿 adductor magnus，且剝離技術要求高、非 straightforward。", "C": "正確敘述（非選）。供區疤痕可藏於大腿內上方與 infragluteal crease，美觀度佳。", "D": "正確敘述（非選）。常見併發症：受區 fat necrosis、供區 seroma、hematoma、wound infection。", "E": "✗ B 為明確錯述，故不選 None of above。"}, "cite": "Neligan, 5th Edition, vol.5, Ch36,p451-452", "conflict": ""}, {"id": "2221", "sub": "BRE", "src": "NG", "years": [115], "stem": "Hybrid breast reconstruction combines autologous tissue transfer with alloplastic implants to optimize aesthetic outcomes. Regarding the surgical principles, planes, and clinical considerations of hybrid breast reconstruction, which of the following statements are TRUE? (複選)", "opts": {"A": "Hybrid breast reconstruction allows patients with a low Body Mass Index (BMI) to achieve adequate breast volume by utilizing a smaller, muscle-sparing autologous flap (e.g., MS-TRAM or DIEP) to provide stable vascularized soft tissue coverage over the implant.", "B": "The plane of implant placement in hybrid reconstruction has increasingly shifted from subpectoral to pre-pectoral, which preserves the pectoralis major muscle, reduces postoperative animation deformity, and decreases long-term capsular contracture.", "C": "In microvascular hybrid reconstruction using abdominal flaps, placing the implant in a delayed staged setting (secondary revision) is strictly contraindicated due to the risk of damaging the deep inferior epigastric pedicle during secondary pocket dissection.", "D": "When performing an immediate hybrid reconstruction with a DIEP flap and a pre-pectoral implant, the autologous tissue serves as a biological matrix that eliminates the clinical need for acellular dermal matrix (ADM) to support the implant.", "E": "The combination of autologous fat grafting (lipofilling) and implants is also considered a forms of hybrid breast reconstruction, typically used to correct contour deformities, upper pole rippling, or step-off deformities post-implant placement"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "Hybrid 重建（自體皮瓣＋義乳）正確者為 ABE：低 BMI 病人可用較小的保肌皮瓣覆蓋義乳；義乳平面已由 subpectoral 轉向 **pre-pectoral**（保留胸大肌、減少 animation、降低長期莢膜攣縮）；**脂肪移植＋義乳也算 hybrid 的一種**。C（延遲分期置入義乳「絕對禁忌」）與 D（自體組織可完全免除 ADM）皆為過度絕對的錯述。", "peropt": {"A": "◎ 低 BMI 病人以較小之 MS-TRAM／DIEP 提供血管化軟組織覆蓋義乳、補足體積。", "B": "◎ 義乳平面由 subpectoral 轉向 pre-pectoral，保留胸大肌、減少 animation deformity、降低長期 capsular contracture。", "C": "✗ 延遲分期置入義乳（二次修整）為常規可行做法，並非「絕對禁忌」；謹慎剝離即可保護 DIEA 血管蒂。", "D": "✗ 自體組織雖提供覆蓋，pre-pectoral 義乳之下極支撐與定位仍常需 ADM，不能說完全免除 ADM 之臨床需求。", "E": "◎ 脂肪移植合併義乳亦屬 hybrid 重建，用於矯正輪廓缺損、上極 rippling 與 step-off。"}, "cite": "Neligan, 5th Edition, vol.5, Ch38, p470-474", "conflict": ""}, {"id": "2222", "sub": "BRE", "src": "NG", "years": [115], "stem": "Which of the following statements is NOT an indication or selection criterion for a Superficial Inferior Epigastric Artery (SIEA) flap in breast reconstruction?", "opts": {"A": "The patient can safely tolerate 5–12 hours of general anesthesia and has no known history of an unmanaged hypercoagulable state.", "B": "The patient has a surgical history of a previous full abdominoplasty or a comprehensive panniculectomy.", "C": "Intraoperative exploration confirms that the external diameter of the SIEA trunk is greater than 1.5 mm.", "D": "The lower abdominal skin paddle remains well-perfused after temporarily occluding the deep inferior epigastric perforators.", "E": "None of the above."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "SIEA 皮瓣選用條件：SIEA 外徑 >1.5 mm、暫時夾閉 DIEP 穿通枝後皮島仍灌流良好、病人可耐受長時間麻醉且無未控制的高凝狀態。既往 abdominoplasty 或 panniculectomy 已離斷 SIEA/SIEV，是禁忌而非適應症。", "peropt": {"A": "是選用條件（非選）。SIEA 手術耗時，病人需能耐受 5–12 小時全麻且無未控制之 hypercoagulable state（蒂細易栓塞）。", "B": "◎ ／非適應症）。先前 full abdominoplasty 或 panniculectomy 已離斷 SIEA／SIEV，無法取瓣，屬禁忌。", "C": "是選用條件（非選）。術中確認 SIEA 主幹外徑 >1.5 mm 才有足夠灌流。", "D": "是選用條件（非選）。暫時阻斷 DIEP 穿通枝後皮島仍灌流良好，證明 SIEA 可單獨供養。", "E": "✗ B 明確為非適應症，故不選 None。"}, "cite": "Neligan, 5th Edition, vol.5, Ch32, p415-416", "conflict": ""}, {"id": "2223", "sub": "BRE", "src": "NG", "years": [115], "stem": "Regarding the use of gluteal free flaps for autologous breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "Gluteal tissue may be harvested based on either the superior gluteal artery perforator (SGAP) system or the inferior gluteal artery perforator (IGAP) system.", "B": "The main disadvantage of the IGAP flap is that its microvascular dissection must be performed adjacent to the sciatic nerve.", "C": "The primary recipient vessel choice for SGAP breast reconstruction is the internal mammary artery and vein.", "D": "The thoracodorsal vessels serve as acceptable alternative recipient vessels if the primary chest wall recipient site is unavailable.", "E": "The superior gluteal vessels exit the pelvis and enter the gluteal region through the lesser sciatic foramen."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "臀部游離皮瓣：superior gluteal 血管經 **greater sciatic foramen（大坐骨孔）於梨狀肌上方**離開骨盆；lesser sciatic foramen 走的是 pudendal 血管與 obturator internus 肌腱，與 SGAP 無關。IGAP 的最大缺點是剝離貼近坐骨神經；SGAP 首選受區為內乳血管，胸背血管為備案。", "peropt": {"A": "正確敘述（非選）。臀部組織可依 SGAP 或 IGAP 系統取瓣。", "B": "正確敘述（非選）。IGAP 主要缺點即顯微剝離緊鄰 sciatic nerve。", "C": "正確敘述（非選）。SGAP 首選受區為 internal mammary a./v.（蒂短，需居中受區）。", "D": "正確敘述（非選）。胸壁首選受區不可用時，thoracodorsal vessels 為可接受替代。", "E": "◎ ／錯述）。superior gluteal vessels 經「greater sciatic foramen」於梨狀肌上緣穿出，非 lesser sciatic foramen（後者走 pudendal vessels 與 obturator internus 肌腱）。"}, "cite": "Neligan, 5th Edition, vol.5, Ch46", "conflict": ""}, {"id": "2224", "sub": "BRE", "src": "NG", "years": [115], "stem": "Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "The primary perforators of the PAP flap typically emerge via a septo-cutaneous course located between the gracilis and adductor magnus muscles.", "B": "The PAP flap provides an anatomically reliable and long vascular pedicle (averaging 9–13 cm), which is significantly longer than that of a Transverse Upper Gracilis (TUG) flap.", "C": "The donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.", "D": "Unlike the DIEP flap, the PAP flap has a severely limited vascular pedicle length of approximately 4 to 5 cm, frequently requiring a vein graft for breast reconstruction.", "E": "Common postoperative complications include fat necrosis at the recipient site, as well as delayed wound healing or seroma formation at the thigh donor site."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題為反向作答（挑『錯誤』者）。PAP flap之主要穿支多於gracilis與adductor magnus間以septocutaneous走行；蒂『長』（約9–13cm），明顯長於TUG；供區疤痕可藏於大腿上方/臀下皺褶；併發症含受區fat necrosis、供區延遲癒合與seroma。⚠ 關鍵錯誤在D：宣稱PAP蒂『嚴重受限約4–5cm且常需血管移植』與其長蒂事實矛盾，故D為錯誤敘述（此點正與DIEP/其他版本形成對照）。", "peropt": {"A": "正確敘述（非選）。主要穿支於 gracilis 與 adductor magnus 間以 septocutaneous 走行。", "B": "正確敘述（非選）。PAP 蒂長約 9–13 cm，明顯長於 TUG（約 5.5–7 cm）。", "C": "正確敘述（非選）。供區疤痕可藏於大腿上方／infragluteal crease。", "D": "◎ ／錯述）。PAP 為長蒂（9–13 cm），選項稱「蒂僅 4–5 cm 且常需 vein graft」與事實矛盾，故為錯述。", "E": "正確敘述（非選）。併發症含受區 fat necrosis、供區延遲癒合與 seroma。"}, "cite": "待複查（NG PAP flap 蒂長度/併發症 記憶佐證）", "conflict": ""}, {"id": "2225", "sub": "BRE", "src": "NG", "years": [115], "stem": "Which of the following complication is the least likely to be a concern when planning an autologous breast reconstruction using a Profunda Artery Perforator (PAP) flap?", "opts": {"A": "Fat necrosis", "B": "Donor site seroma", "C": "Donor site hematoma", "D": "Donor site infection", "E": "Lower extremity lymphedema"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題問規劃 PAP（profunda artery perforator）皮瓣自體乳房重建時「最不需擔心」的併發症，答案為下肢淋巴水腫（lower extremity lymphedema）。PAP 取自大腿後內側，供區併發症以 fat necrosis（受區）、供區 seroma、hematoma、感染、傷口延遲癒合為主。⚠ 關鍵：PAP 剝離不顯著破壞下肢主要淋巴引流，故下肢淋巴水腫最不常見；此與腹股溝/腋下淋巴結廓清後的淋巴水腫風險不同，切勿混淆。", "peropt": {"A": "✗ Fat necrosis 為 PAP 常見受區併發症之一，須擔心。", "B": "✗ 供區 seroma 為常見併發症。", "C": "✗ 供區 hematoma 為可能併發症。", "D": "✗ 供區 wound infection 為可能併發症。", "E": "◎ 下肢淋巴水腫最不需擔心；PAP 取自大腿後內側、不顯著破壞下肢主要淋巴引流（有別於腹股溝／腋下淋巴結廓清）。"}, "cite": "待複查（NG PAP flap complications 記憶佐證）", "conflict": ""}, {"id": "2226", "sub": "BRE", "src": "NG", "years": [115], "stem": "Regarding the Lumbar Artery Perforator (LAP) flap, which statement is FALSE?", "opts": {"A": "The flap tissue is harvested from the lower back or flank region.", "B": "Surgeons only use the upper L1 and L2 arteries, while L3 and L4 are never used.", "C": "The blood vessels pass through the deep muscles of the lower back.", "D": "A common donor-site complication is fluid collection (seroma) in the back."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Lumbar artery perforator（LAP）皮瓣：腰動脈是腹主動脈的體節分支（相當於胸主動脈的 posterior intercostal arteries），**L1–L4 均可使用**，實務上以第 3、4 腰動脈穿通枝最常用。題目說「只用 L1、L2，L3/L4 從不使用」為錯述。本題僅 A–D 四個選項。", "peropt": {"A": "正確敘述（非選）。LAP 取自下背／腰側（love handles）軟組織。", "B": "◎ ／錯述）。L1–L4 腰動脈穿通枝皆可能使用，臨床反而以較低位之 L3、L4 最常用，並非「只用 L1、L2」。", "C": "正確敘述（非選）。腰動脈穿通枝行經下背深層肌群（quadratus lumborum、erector spinae），此為 LAP 蒂短（約 3–4 cm）、剝離困難之因。", "D": "正確敘述（非選）。供區 seroma 為最常見併發症。"}, "cite": "Neligan, 5th Edition, vol.5, Ch37, p461", "conflict": ""}, {"id": "2227", "sub": "BRE", "src": "NG", "years": [115], "stem": "Which is INCORRECT about stacked and conjoined flap for breast reconstruction?", "opts": {"A": "When available tissue from a single donor area is inadequate, stacked or conjoined multi-pedicle flaps from a single or multiple donor area(s) can provide a fully autologous-only breast reconstruction.", "B": "In unilateral cases, the most common option is the stacked or conjoined bi-pedicled deep inferior epigastric perforator (DIEP) flap supplied by two anatomically distinct vascular pedicles.", "C": "In bilateral breast reconstructions, a combination of flaps such as DIEP flap, PAP flap, TUG flap, LAP flap, and IGAP/SGAP flap can be used in the form of a two-flap reconstruction to provide a volume appropriate breast reconstruction.", "D": "Radiation deficits that create an imbalance of chest wall soft tissue and skin availability benefit from a multi-flap breast reconstruction which affords an opportunity to improve radiation-related changes.", "E": "All of above are correct"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Stacked／conjoined 皮瓣的關鍵數字：**雙側重建時是「四皮瓣（four-flap）」重建**（每側各兩個皮瓣），不是 two-flap。單側最常見的是雙蒂 stacked DIEP。故 C 為錯述。與 NG-081 為正反題（NG-081 的 C 寫 four-flap 故全對）。", "peropt": {"A": "正確敘述（非選）。單一供區組織不足時，可用單／多供區之多蒂 stacked／conjoined 皮瓣達成完全自體重建。", "B": "正確敘述（非選）。單側最常見為由兩條解剖上獨立血管蒂供養之雙蒂 stacked／conjoined DIEP。", "C": "◎ ／錯述）。雙側重建時是「four-flap」（每側兩瓣）組合 DIEP／PAP／TUG／LAP／IGAP/SGAP，而非 two-flap。", "D": "正確敘述（非選）。放療致胸壁軟組織／皮膚不足時，多皮瓣重建可同時改善放射相關變化。", "E": "✗ C 為錯述，故不選 All of above。"}, "cite": "Neligan, 5th Edition, vol.5, Ch40, p481", "conflict": "⚠陷阱對照｜NG114 問『正確』全對，答 E；NG115 問『錯誤』且 C 被改成『two-flap』(原 four-flap)，答 C。看到雙側四瓣重建敘述先確認該版寫 two 還是 four。"}, {"id": "2230", "sub": "BRE", "src": "NG", "years": [115], "stem": "關於Nipple-Areola-Complex (NAC) reconstruction 重建，下列敘述何者正確？ (複選)", "opts": {"A": "Areola正常直徑約為4cm，Nipple正常直徑約為1.3cm。", "B": "Upper Pole : Lower Pole Ratio約為55% : 45% 。", "C": "NAC 大約位於Mid-humerus level，相當於手臂自然下垂時上臂中段高度。", "D": "常見的Local flap為C-V flap 、Skate flap 、Star flap", "E": "乳暈重建最常見的方法為Intradermal tattoo"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "NAC 重建四項正確：乳暈直徑約 **4 cm**、乳頭直徑約 **1.3 cm**；NAC 約位於 **mid-humerus level**（手臂自然下垂時上臂中段高度）；常用局部皮瓣為 **C-V flap、Skate flap、Star flap**；乳暈重建最常用 **intradermal tattoo**。錯的是 B——上極:下極應為 **45%:55%**（與批 6 的隆乳題同一數字）。", "peropt": {"A": "◎ Areola 直徑約 4 cm、Nipple 直徑約 1.3 cm。", "B": "✗ Upper:Lower Pole 比例應為 45%:55%（下極較飽滿），非 55%:45%。", "C": "◎ NAC 約位於 mid-humerus level（手臂自然下垂時上臂中段高度）。", "D": "◎ 常見局部皮瓣：C-V flap、Skate flap、Star flap。", "E": "◎ 乳暈重建最常用 intradermal tattoo（真皮內刺青）。"}, "cite": "Neligan, 5th Edition, vol.5, Ch51, p604-605", "conflict": ""}, {"id": "4019", "sub": "HNK", "src": "GS", "years": [115], "stem": "A 45-year-old woman undergoes resection of a large left acoustic neuroma. The facial nerve is sacrificed at the level of the internal auditory canal during tumor extirpation. She presents to your clinic 3 weeks postoperatively with complete flaccid left facial paralysis. Proximal and distal facial nerve stumps are identified on review of the operative report. The nerve gap is estimated at 4 cm. Which of the following is the most appropriate initial reconstructive strategy?", "opts": {"A": "Tension-free direct nerve coaptation with 8-0 nylon suture", "B": "Cross-facial nerve graft (CFNG) alone using sural nerve, with the expectation of complete reinnervation within 6 months", "C": "Masseteric nerve transfer to distal facial nerve stump combined with cross-facial nerve graft (babysitter procedure)", "D": "Immediate free functional gracilis muscle transfer innervated by the masseteric nerve", "E": "Observation for 12 months to allow spontaneous recovery prior to any surgical intervention"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 acoustic neuroma 術中犧牲 FN、3 週後完全弛緩性麻痺、近遠端斷端皆可辨識、gap 4cm→肌肉尚未失神經萎縮(仍在時窗)。最佳初始策略＝babysitter procedure：masseteric nerve transfer 至遠端 FN 斷端『快速』提供神經支配防肌肉萎縮，合併 cross-facial nerve graft 待對側軸突長入以達自發情緒微笑。答 C。⚠易混：4cm gap 無法無張力直接縫合(A 錯)；CFNG 單獨 6 月內完全再支配不切實際、且延遲期間肌肉萎縮(B 錯)；肌肉尚可救援不需立即游離肌肉(D 過度)；觀察 12 月會錯過肌肉存活時窗(E 錯，此為醫源性離斷非 Bell)。", "peropt": {"A": "✗ 4 cm gap 無法無張力直接吻合（tension-free coaptation 上限約 <1 cm），需 nerve graft 橋接。", "B": "✗ CFNG 單獨無法於 6 個月內完全再支配（軸突再生約 1 mm/日，跨臉須 6–12 月才長至對側），且等待期患側肌肉去神經萎縮。", "C": "◎ Babysitter procedure：masseteric→遠端 FN 斷端「快速」供養防肌萎縮＋CFNG 待對側軸突長入達自發情緒微笑，為最佳初始策略。", "D": "✗ 患側原生肌肉於去神經 3 週仍在存活時窗（<12–18 月）可救援，立即游離 gracilis 為過度處置。", "E": "✗ 醫源性完全離斷不會自發恢復；觀察 12 月將錯失肌肉存活時窗（去神經 >18–24 月肌肉不可逆萎縮）。"}, "cite": "待複查（babysitter procedure，記憶佐證）", "conflict": ""}, {"id": "4020", "sub": "HNK", "src": "GS", "years": [115], "stem": "A 58-year-old man undergoes right hemimandibulectomy including the condyle for a T4 squamous cell carcinoma of the right retromolar trigone. The defect extends to the right body and involves a posterior intraoral soft tissue defect in the retromolar region requiring mobile soft tissue coverage. CT angiography confirms three-vessel runoff bilaterally with no peronea magna variant. Virtual surgical planning is used to guide reconstruction. To ensure vascularization of all bone segments including the ramus, and to provide a mobile skin paddle for the intraoral defect, which of the following fibula flap configurations is most appropriate?", "opts": {"A": "Right (ipsilateral) fibula, orthotopic orientation — pedicle posteriorly, septum inferiorly", "B": "Right (ipsilateral) fibula, heterotopic orientation — pedicle anteriorly, septum superiorly", "C": "Left (contralateral) fibula, orthotopic orientation — pedicle anteriorly, septum inferiorly", "D": "Left (contralateral) fibula, heterotopic orientation — pedicle posteriorly, septum superiorly", "E": "Deep circumflex iliac artery (DCIA) flap from right side — pedicle anteriorly with internal oblique for intraoral lining"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Fibula 皮瓣重建下頷需兼顧『各骨段(含 ramus)血供＋可動 skin paddle 朝向口內缺損』。腓骨血供為 peroneal vessels 沿骨後內側骨膜、septum(隔膜)攜帶 skin paddle。右側 hemimandibulectomy＋口內後方軟組織缺損，選同側右腓骨、heterotopic(異位)擺位使 pedicle 朝前、septum 朝上→讓 skin paddle 轉入口內、pedicle 前伸接頸部受區血管並確保近端 ramus 段亦有血供。答 B。此為 VSP＋皮瓣定向的空間推理題，關鍵是 septum/skin paddle 需朝缺損側(口內=上內)。", "peropt": {"A": "✗ 正位（pedicle 後、septum 下）使 skin paddle 朝下外，無法覆蓋口內（上內側）缺損。", "B": "◎ 同側右腓骨、heterotopic（pedicle 前、septum 上）使 skin paddle 轉入口內並確保各骨段含 ramus 血供。", "C": "✗ 對側腓骨正位幾何方向不利，skin paddle 無法朝口內。", "D": "✗ 對側 heterotopic 之方向組合不符缺損幾何。", "E": "✗ DCIA 皮瓣 skin paddle 笨重、可動性差，不適合需可動口內襯裡之情境。"}, "cite": "待複查（fibula 定向 VSP 幾何，記憶佐證）", "conflict": ""}, {"id": "4021", "sub": "HNK", "src": "GS", "years": [115], "stem": "A 35-year-old woman presents with a 10-year history of chronic migraine headaches that begin at the temple, predominantly on one side, and are worse in the morning. She reports a history of teeth grinding at night and frequent jaw pain, for which she was previously diagnosed with temporomandibular joint disorder. Diagnostic nerve block of the involved nerve provides temporary relief. Which of the following structures is most likely responsible for nerve compression at this trigger point?", "opts": {"A": "Corrugator supercilii muscle compressing the supraorbital nerve", "B": "Semispinalis capitis muscle compressing the greater occipital nerve", "C": "Temporalis muscle, deep temporal fascia, or vessels compressing the zygomaticotemporal branch of the trigeminal nerve", "D": "Septal contact point irritating the nasal mucosal sensory branches of the maxillary nerve", "E": "Trapezius fascia compressing the lesser occipital nerve"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛 trigger site 定位：起於顳部、單側、晨起加重、合併磨牙(bruxism)/顳顎關節痛、診斷性神經阻斷可暫時緩解→Site II(顳側)＝zygomaticotemporal branch of trigeminal nerve 受 temporalis 肌/深顳筋膜/血管壓迫。答 C。Guyuron trigger site 對照：Site I 額(corrugator 壓 supraorbital/supratrochlear)、Site II 顳(ZT branch)、Site III 鼻(septal contact/turbinate)、Site IV 枕(greater occipital n. 受 semispinalis capitis 壓)、Site V/VI 次要。磨牙→顳肌活躍→壓迫 ZT branch 為此題線索。", "peropt": {"A": "✗ Corrugator supercilii 壓 supraorbital／supratrochlear＝額部 Site I（frontal），非顳部表現。", "B": "✗ Semispinalis capitis 壓 greater occipital nerve＝枕部 Site IV（occipital）。", "C": "◎ Temporalis／深顳筋膜／血管壓迫 zygomaticotemporal branch of V＝顳部 Site II，符合 bruxism、晨起、單側顳痛。", "D": "✗ 鼻中隔接觸點（septal contact／turbinate）刺激＝鼻部 Site III（intranasal/rhinogenic）。", "E": "✗ Trapezius fascia 壓 lesser occipital nerve 屬枕／頸部，非顳部 Site II。"}, "cite": "待複查（Guyuron 偏頭痛 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4060", "sub": "HNK", "src": "NG", "years": [108, 112, 114, 115], "stem": "關於頭頸鱗狀上皮癌(SCC)及人類乳突病毒(HPV)，下列何者為非？", "opts": {"A": "HPV為一種RNA病毒，有超過120種分型(subtypes) 。", "B": "HPV分型16可見於超過90%由HPV引發的頭頸部SCC。", "C": "與HPV相關的頭頸癌在男女性皆可見，預估至2020年，HPV引發的頭頸癌盛行率將超過同與HPV相關的子宮頸癌。", "D": "其產物E6及E7 protein，會與p53及retinoblastoma (Rb) gene 交互作用。", "E": "E6之致癌機轉為促進p53(腫瘤抑制蛋白)之降解。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 HPV 為『DNA 病毒』非 RNA 病毒——A 錯為答。機制：HPV 為雙股 DNA 病毒，>120 型；型 16 佔 HPV 相關頭頸 SCC >90%；E6 促 p53 降解、E7 抑制 Rb→細胞週期失控致癌。預估 HPV 頭頸癌盛行率將超越子宮頸癌。", "peropt": {"A": "◎ 選此為答／錯述）：HPV 為雙股「DNA」病毒，非 RNA 病毒；分型 >120 種。", "B": "正確敘述（非選）：型 16 佔 HPV 相關頭頸 SCC >90%。", "C": "正確敘述（非選）：HPV 頭頸癌盛行率預估超越子宮頸癌。", "D": "正確敘述（非選）：E6／E7 分別與 p53／Rb 交互作用。", "E": "正確敘述（非選）：E6 促 p53 降解（E7 抑制 Rb）。"}, "cite": "Grabb&Smith HPV 分子機制（DNA 病毒、E6/E7）", "conflict": ""}, {"id": "4066", "sub": "HNK", "src": "NG", "years": [109, 111, 114, 115], "stem": "有關下頷骨mandibular reconstruction，下列何者有誤？", "opts": {"A": "最常使用free fibula flap。", "B": "Osteoradionecrosis屬於chronic complication。", "C": "OPAC(osteomyocutaneous peroneal artery combined) flap比起OSC(osteoseptocutaneous) flap較能預防osteoradionecrosis發生。", "D": "當發生osteoradionecrosis，最好的方法是wide excision。", "E": "Hyperbaric oxygen therapy(HBO)對osteoradionecrosis絕對有效。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下頷骨重建，問『有誤』，答 E。E 錯：高壓氧(HBO)對 ORN 『非絕對有效』，證據有限、非萬靈，嚴重者仍需清創＋游離骨瓣。正確：A 最常用 free fibula flap；B ORN 屬慢性併發症；C OPAC flap(帶較多肌肉血供)較 OSC 更能預防 ORN；D 確立之 ORN 最佳處置為 wide excision＋血管化重建。", "peropt": {"A": "正確敘述（非選）：下頷重建最常用 free fibula flap。", "B": "正確敘述（非選）：ORN 屬 chronic complication。", "C": "正確敘述（非選）：OPAC（帶較多肌肉血供）較 OSC 更能預防 ORN。", "D": "正確敘述（非選）：確立之 ORN 最佳處置為 wide excision＋血管化骨瓣重建。", "E": "◎ 選此為答／錯述）：HBO 對 ORN「非絕對有效」，證據有限、屬輔助角色。"}, "cite": "待複查（ORN 處置、HBO 爭議，記憶佐證）", "conflict": ""}, {"id": "4079", "sub": "HNK", "src": "NG", "years": [111, 113, 114], "stem": "關於 aesthetic nasal reconstruction，下列何者為非？(複選)", "opts": {"A": "\"small defect\" is less than 3cm", "B": "If the defect greater than 50% of nasal tip, discard adjacent normal tissue within the subunit and resurface the entire subunit.", "C": "The nasal unit consists of the tip, dorsum, and paired alae, sidewalls, and soft triangle subunits.", "D": "Bilobed flap is based laterally and the second lobe lies within the more mobile skin of upper nose.", "E": "Nasolabial flap is used to nasal alae and side wall defect up to 4cm in width."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻美學重建(NG111版)，問『為非』，答 ACE。A 錯：small defect 定義敘述不完整/被判錯(本題官方判 A 為非)。C 錯：鼻亞單位遺漏 columella(此版列 tip/dorsum/paired alae/sidewalls/soft triangle 未含 columella)故錯。E 錯：nasolabial flap 用於鼻翼/側壁缺損但寬度上限敘述被判過大(4cm 過大)。正確(非為非者)：B >50% 鼻尖缺損應切除亞單位內鄰近正常組織重建整單位、D bilobed flap 基於側方、第二瓣位於較可動之上鼻皮膚。⚠與 CN4089(NG115)同族但問法相反(為非 vs 為是)。", "peropt": {"A": "◎ 為非）small defect 一般定義較小（約 <1.5 cm、殘留皮膚足以局部瓣分擔）；選項「<3 cm」之敘述本題判為不當。", "B": "屬正確（非「為非」）：>50% 鼻尖缺損應切除亞單位內鄰近正常組織、重鋪整個 subunit（subunit principle）。", "C": "◎ 為非）鼻 subunit 應含 tip、dorsum、paired sidewalls、alae、soft triangles「及 columella」；選項遺漏 columella 故錯。", "D": "屬正確（非「為非」）：bilobed flap 基於側方，第二瓣位於較可動之上鼻皮膚。", "E": "◎ 為非）nasolabial flap 用於鼻翼／側壁，缺損寬度上限約 ≤2 cm；選項「up to 4 cm」過大故錯。"}, "cite": "待複查（鼻亞單位含 columella、nasolabial flap 寬度）", "conflict": "⚠陷阱對照｜同一組選項，NG114 挑『錯的』=ACE，NG115 挑『對的』=BD。先確認該版問『為是』或『為非』。 ｜ 與 CN4089(NG115)同族，問法相反(為非 vs 為是)，選項相同須錨定該年問法。"}, {"id": "4081", "sub": "HNK", "src": "NG", "years": [111, 113, 114, 115], "stem": "下列何者非適當的 muscle options for microneurovascular transplantation in facial paralysis?", "opts": {"A": "Gracilis", "B": "Latissimus dorsi", "C": "Serratus anterior", "D": "Abductor hallucis", "E": "Extensor carpi radialis longus"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面 reanimation 游離肌肉選項(NG111版)，問『非適當』，答 E(Extensor carpi radialis longus)。與 CN4068 同組(該題答 ABCD 為適當)。gracilis/latissimus/serratus anterior/abductor hallucis 皆適當；伸腕肌非顏面 reanimation 標準選項。", "peropt": {"A": "Gracilis 為最常用之顏面 reanimation 游離肌肉（適當，非選）。", "B": "Latissimus dorsi 為適當選項（非選）。", "C": "Serratus anterior 為適當選項（非選）。", "D": "Abductor hallucis 為適當選項（非選）。", "E": "◎ Extensor carpi radialis longus 非顏面 reanimation 標準游離肌肉選項，為正解。"}, "cite": "待複查（顏面游離功能肌選項，記憶佐證）", "conflict": ""}, {"id": "4082", "sub": "HNK", "src": "NG", "years": [112, 113, 114], "stem": "Which of the following is true regarding tissue expansion for reconstruction of the scalp and forehead?", "opts": {"A": "Serial expansion occurs to expand normal tissue which can subsequently be used to reconstruct adjacent scarred areas.", "B": "This technique can be considered acutely for open wounds.", "C": "It typically takes 2–3 months to expand the tissue sufficiently to perform the reconstruction.", "D": "The best results are obtained with simple advancement flaps after tissue expansion.", "E": "Complications are rare, which include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars."}, "ans": "AC", "multi": true, "etype": "ai", "expl": "This technique cannot be used acutely, when there are any open wounds or any evidence of infection.\n\nThe best results are obtained with transposition or rotation flaps, rather than simple advancement flaps.\n\nComplication rates as high as 48% have been described. Common complications include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars.", "key": "🎯 頭皮/前額組織擴張，答 AC(為真)。A 連續擴張(serial expansion)擴張正常組織以重建相鄰疤痕區；C 通常需 2-3 個月充分擴張。錯誤：B 不可用於急性開放傷口或感染(禁忌)；D 最佳結果為『transposition/rotation 瓣』非單純 advancement 瓣；E 併發症率高(可達 48%，非罕見)含血腫/植入物外露/感染/皮瓣壞死/禿髮/疤痕變寬。原詳解已明確佐證。", "peropt": {"A": "◎ 連續擴張（serial expansion）擴張正常組織以重建相鄰疤痕區。", "B": "✗ 不可急性用於開放傷口／感染區（為相對禁忌）。", "C": "◎ 通常需 2–3 個月充分擴張後方能重建。", "D": "✗ 最佳結果為 transposition／rotation 瓣，非單純 advancement flap。", "E": "✗ 併發症率不低（頭皮擴張可達約 48%），含 hematoma、implant exposure、infection、flap necrosis、alopecia、widened scars，並非罕見。"}, "cite": "原詳解：不可急性用；最佳為 transposition/rotation；併發症達 48%", "conflict": "⚠陷阱對照｜選項一字未改，只有題幹 true↔incorrect 翻面。NG114 選正確=AC；NG115 選錯誤=BDE。作答前先圈出題幹問『正確』還是『錯誤』。"}, {"id": "4085", "sub": "HNK", "src": "NG", "years": [114], "stem": "有關 facial paralysis 下列何者錯誤?", "opts": {"A": "可分成 primary 或 secondary", "B": "若 facial paralysis < 12 個月之內，則認為 facial muscle 尚可以 re-innervation", "C": "若 facial paralysis 超過 10 個月，則認為 muscle 出現 irreversibly atrophy", "D": "處置的方法包含 static procedure 如 sling 的方法，或 dynamic procedure 如functional muscle transfer", "E": "造成原因諸多，有些則不明"}, "ans": "C", "multi": false, "etype": "ai", "expl": "If a healthy proximal facial nerve segment is not available for reconstruction, or the time that has elapsed since the facial nerve trauma may not allow the regenerating facial nerve fibers to reach the neuromuscular junctions within 12 to 24 months after denervation (regeneration rate of 1–2mm per day), alternative strategies for muscle reanimation may be more reliable and provide better functional outcomes.", "key": "🎯 ⚠facial paralysis 時窗題(NG114版，Neligan 5e)，問『錯誤』，官方答 C。此版 C 說『超過 10 個月不可逆萎縮』被判為錯——原詳解闡明：去神經後神經纖維須在 12-24 個月內到達神經肌肉接合處(再生速率 1-2mm/日)，故『10 個月即不可逆』過早、被判錯。B 說 <12 月尚可 re-innervation。⚠此為與 CN4067/CN4080 之家族核心：同一題幹跨年把數字在 10 vs 12 個月間變動，作答務必錨定該年官方答案。", "peropt": {"A": "正確敘述（非選）：可分 primary／secondary。", "B": "正確敘述（非選）：<12 個月尚可 re-innervation。", "C": "◎ ／錯述）：神經再生需約 12–24 個月才到達 NMJ（速率 1–2 mm/日）；稱「超過 10 個月即不可逆萎縮」過早，本卷判錯（時窗一般以 18–24 個月為界）。", "D": "正確敘述（非選）：處置含 static（sling）與 dynamic（functional muscle transfer）。", "E": "正確敘述（非選）：成因諸多、部分不明。"}, "cite": "原詳解：去神經後再生須 12-24 月達 NMJ（1-2mm/日）", "conflict": "⚠家族衝突核心【facial paralysis 萎縮時窗】NG114『10 月』vs NG109/NG111『12 月』(Neligan 5e vs 4e)；跨年數值差異視為不同題，錨定各年官方答案。"}, {"id": "4086", "sub": "HNK", "src": "NG", "years": [114], "stem": "根據Cordeiro P.G 等人，將maxilla 視為一個六面體而做maxillary and midfacial defect 的分類，下列那些不對? (複選)", "opts": {"A": "Type I 是指一側或兩側的 maxillary wall 缺損，但不包括 palate。", "B": "Type II 是指包括 maxillary arch, palate, anterior and lateral walls 包括部份 orbital floor。", "C": "Type IIIA 是指 subtotal maxillary defect 再加上全部的 orbital floor，但不 包括眼窩內容物。", "D": "Type IIIB 是指 total maxillary defect 加上 orbital exenteration。", "E": "Type IV 是指 orbitomaxillary defects 包括眼窩內容物及所有 maxillary walls"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "(B) 不包括 orbital floor (C) Total maxillary defect (E) 保留 palatal wall", "key": "🎯 Cordeiro 上頷/中臉缺損分類(六面體)，問『不對』，答 BCE。原詳解校正：(B)Type II 『不含 orbital floor』(僅上頷弓/顎/前外側壁)——選項含 orbital floor 故錯；(C)Type IIIA 應為 subtotal maxillectomy 含部分/全 orbital floor 但保留眼球，選項敘述『total』錯置(原詳解註 Total maxillary defect 有誤)；(E)Type IV 為 orbitomaxillary defect『保留 palatal wall』——選項說含所有 maxillary walls 故錯。正確：A Type I=一/兩側 maxillary wall 缺損不含顎；D Type IIIB=total maxillectomy＋orbital exenteration。⚠與 CN4090(NG115)同題但問法相反。", "peropt": {"A": "屬正確（非「不對」）：Type I＝一／兩側 maxillary wall 缺損、不含 palate。", "B": "◎ 不對）：Type II＝maxillary arch、palate、anterior/lateral walls 之 subtotal 缺損但「不含 orbital floor」；選項誤含 orbital floor。", "C": "◎ 不對）：Type IIIA 應為「subtotal」maxillectomy＋全 orbital floor 但保留眼球；選項誤植 total。", "D": "屬正確（非「不對」）：Type IIIB＝total maxillectomy＋orbital exenteration。", "E": "◎ 不對）：Type IV＝orbitomaxillary defect 但「保留 palatal wall」；選項誤稱含所有 maxillary walls。"}, "cite": "原詳解：(B)不含 orbital floor (C)Total 誤 (E)保留 palatal wall", "conflict": "與 CN4090(NG115)同題、問法相反(不對 vs 正確)；選項近同須錨定該年問法。"}, {"id": "4087", "sub": "HNK", "src": "NG", "years": [115], "stem": "一位 52 歲女性，於左側 parotid malignancy 切除術後 18 個月求診，術中 facial nerve 於近端被犧牲且患側無可用之 proximal stump，對側 facial nerve 功能完整。EMG 顯示患側顏面肌肉有 fibrillation potentials，但無自主性 motor unit。病人積極且身體狀況良好，主要目標為恢復自發性、帶情緒的微笑 (spontaneous emotional smile)。下列何種重建策略最為適當？", "opts": {"A": "單階段 masseteric nerve 驅動之 free gracilis transfer，因其可穩定提供最大的 commissure excursion 及最佳之自發性微笑。", "B": "同側 facial nerve 以 sural cable graft 直接修補至遠端分支。", "C": "兩階段手術，先行 cross-face nerve graft，再行 free gracilis transfer，但須接受其 commissure excursion 可能仍低於健側。", "D": "Lengthening temporalis myoplasty，因為在 18 個月時患側原生肌肉已不具活性，dynamic reinnervation 已不可行。", "E": "單獨施行 hypoglossal-to-facial nerve transfer，因其可同時提供良好的 resting tone 與自發性情緒微笑。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 綜合臨床決策：術後 18 個月、近端無 stump、對側 FN 完整、患側 EMG 有 fibrillation 但無自主 motor unit(＝肌肉已去神經、瀕臨/已失活)、目標為自發情緒微笑。最適＝『兩階段 cross-face nerve graft→free gracilis transfer』(答 C)，因唯 CFNG 可達自發情緒微笑，惟須接受 excursion 可能低於健側。⚠關鍵陷阱：患側原生肌肉已去神經 18 月不可救，故不能只做 nerve transfer 期待原肌復活；須引入『游離肌肉』提供新的可收縮單位＋CFNG 提供情緒來源。A(masseter 驅動)excursion 大但『非自發情緒』微笑；D 誤稱 dynamic 已不可行(游離肌肉仍可)；E hypoglossal 無法產生情緒微笑。", "peropt": {"A": "✗ Masseteric 驅動 excursion 大但需咬合誘發，屬「非自發」微笑，不符 spontaneous emotional smile 之主要目標。", "B": "✗ 近端無可用 stump，且患側原生肌肉已去神經 18 個月（EMG 有 fibrillation、無 motor unit）不可救，直接 cable graft 修補無效。", "C": "◎ 兩階段 CFNG→free gracilis 為唯一可達 spontaneous emotional smile 之策略，須接受 commissure excursion 或略低於健側。", "D": "✗ 錯述：18 個月原生肌雖失活，但「游離肌肉移植」使 dynamic reanimation 仍可行，非只能 LTM。", "E": "✗ Hypoglossal-facial transfer 提供 resting tone 但無法產生自發情緒微笑。"}, "cite": "待複查（去神經肌肉不可救＋CFNG+gracilis 兩階段，記憶佐證）", "conflict": ""}, {"id": "4088", "sub": "HNK", "src": "NG", "years": [115], "stem": "Which of the following is incorrect regarding tissue expansion for reconstruction of the scalp and forehead? (複選)", "opts": {"A": "Serial expansion occurs to expand normal tissue which can subsequently be used to reconstruct adjacent scarred areas.", "B": "This technique can be considered acutely for open wounds.", "C": "It typically takes 2–3 months to expand the tissue sufficiently to perform the reconstruction.", "D": "The best results are obtained with simple advancement flaps after tissue expansion.", "E": "Complications are rare, which include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars."}, "ans": "BDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮/前額組織擴張，問『不正確』，答 BDE。與 CN4082 同題但問法相反(此問錯誤者)。B 錯(不可急性用於開放傷口)、D 錯(最佳為 transposition/rotation 非 advancement)、E 錯(併發症率高達 48% 非罕見)。正確：A 連續擴張正常組織重建相鄰疤痕；C 通常需 2-3 個月。", "peropt": {"A": "屬正確（非「不正確」）：連續擴張正常組織重建相鄰疤痕區。", "B": "◎ 不正確）：不可急性用於開放傷口／感染。", "C": "屬正確（非「不正確」）：通常需 2–3 個月充分擴張。", "D": "◎ 不正確）：最佳結果為 transposition／rotation 瓣，非單純 advancement。", "E": "◎ 不正確）：併發症率可達約 48%，非罕見。"}, "cite": "原詳解族：不可急性用；最佳 transposition/rotation；併發症 48%", "conflict": "⚠陷阱對照｜選項一字未改，只有題幹 true↔incorrect 翻面。NG114 選正確=AC；NG115 選錯誤=BDE。作答前先圈出題幹問『正確』還是『錯誤』。 ｜ 與 CN4082(NG112)同題、問法相反(為真 vs 不正確)；錨定該年問法。"}, {"id": "4089", "sub": "HNK", "src": "NG", "years": [115], "stem": "關於 aesthetic nasal reconstruction，下列何者為是？(複選)", "opts": {"A": "A \"small defect\" is less than 3 cm in diameter. There is enough residual skin for local flap to \"share\" over the entire nasal surface without excessive closure tension and landmark distortion.", "B": "If the defect greater than 50% of nasal tip, discard adjacent normal tissue within the subunit and resurface the entire subunit.", "C": "The nasal unit consists of the tip, dorsum, and paired alae, sidewalls, and soft triangle subunits.", "D": "Bilobed flap is based laterally and the second lobe lies within the more mobile skin of upper nose.", "E": "Nasolabial flap is used to nasal alae and side wall defect up to 4 cm in width."}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻美學重建(NG115版)，問『為是』，答 BD。B 正確：>50% 鼻尖缺損應切除亞單位內鄰近正常組織、重鋪整個亞單位(subunit principle)；D 正確：bilobed flap 基於側方、第二瓣位於較可動之上鼻皮膚。錯誤(非為是)：A small defect 定義敘述被判不當、C 鼻亞單位遺漏 columella、E nasolabial flap 寬度上限 4cm 過大。⚠與 CN4079(NG111)同族、問法相反(為是 vs 為非)，同組選項注意錨定該年問法。", "peropt": {"A": "✗（非「為是」）：small defect 一般定義較小（約 <1.5 cm）；選項「<3 cm」之定義本題判為不當。", "B": "◎ >50% 鼻尖缺損切除亞單位內正常組織、重鋪整個 subunit。", "C": "✗（非「為是」）：鼻 subunit 尚應含 columella；選項遺漏 columella，敘述不全。", "D": "◎ Bilobed flap 基於側方，第二瓣位於較可動之上鼻皮膚。", "E": "✗（非「為是」）：nasolabial flap 缺損寬度上限約 ≤2 cm；選項「up to 4 cm」過大。"}, "cite": "待複查（subunit principle、bilobed flap；與 CN4079 同族）", "conflict": "⚠陷阱對照｜同一組選項，NG114 挑『錯的』=ACE，NG115 挑『對的』=BD。先確認該版問『為是』或『為非』。 ｜ 與 CN4079(NG111)同族、問法相反(為是 vs 為非)；選項相同須錨定該年問法。"}, {"id": "4090", "sub": "HNK", "src": "NG", "years": [115], "stem": "根據 Cordeiro P.G. 等人，將 maxilla 視為一個六面體而做 maxillary and midfacial defect 的分類，下列哪些正確？(複選)", "opts": {"A": "Type I 是指一側或兩側的 maxillary wall 缺損，但不包括 palate。", "B": "Type II 是指包括 maxillary arch, palate, anterior and lateral walls，包括部份 orbital floor。", "C": "Type IIIA 是指 subtotal maxillary defect 再加上全部的 orbital floor，但不包括眼窩內容物。", "D": "Type IIIB 是指 total maxillary defect 加上 orbital exenteration。", "E": "Type IV 是指 orbitomaxillary defects，包括眼窩內容物及所有 maxillary walls。"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Cordeiro 上頷/中臉分類(NG115版)，問『正確』，答 AD。
