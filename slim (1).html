 "1313", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "關於週邊神經缺損重建時，採用神經移植（Nerve graft）的臨床原則與考量，下列敘述何者錯誤？", "opts": {"A": "自體神經移植（Autograft）目前仍被視為神經缺損重建的黃金標準。", "B": "移植神經的長度應略長於神經缺損處的距離，以避免張力。通常建議長度約為缺損距離的 115%。", "C": "腓腸神經（Sural nerve）是常用的供體神經之一，因其長度足夠且取得相對方便，但會造成小腿外側感覺麻木。", "D": "對於較大的神經主幹缺損，常使用多條較細的供體神經束（Cable graft）來橋接，以利於神經血管化。", "E": "神經移植後，術後應完全避免關節活動並嚴格固定至少六週，以防止移植神經因關節活動而產生移位或張力問題。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 22, p539, p547.", "key": "🎯 本題選『錯誤』。神經移植原則：autograft 仍為黃金標準；移植長度應略長於缺損(約 115%)以避免張力；sural nerve 常用、會致小腿外側/足外側麻木；大神經主幹缺損以多條細 cable graft 橋接利於血管化。核心錯誤：現代主張『早期保護性活動』，並非術後完全禁止關節活動並嚴格固定≥6 週；因移植為無張力設計，過度固定並不必要，故 E 錯誤。", "peropt": {"A": "✗（正確敘述）Autograft 仍為神經缺損重建黃金標準。", "B": "✗（正確敘述）移植長度略長於缺損（約 115%）以避免張力。", "C": "✗（正確敘述）Sural nerve 常用，會致小腿/足外側感覺麻木。", "D": "✗（正確敘述）大神經主幹缺損以多條細 cable graft 橋接利於血管化。", "E": "◎ ＝錯誤敘述）神經移植為無張力(tension-free)設計，現代主張早期保護性活動；一般僅需固定約 2–3 週即開始保護性關節活動，非「完全禁止關節活動並嚴格固定≥6 週」。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1314", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "肌腱轉移術（Tendon transfer）必須先確認欲轉移肌腱作用的相關關節符合何種條件？", "opts": {"A": "具備部分主動活動範圍即可", "B": "具備完整的被動活動範圍", "C": "術後立即進行積極的主動復健", "D": "必須已接受關節融合術（Arthrodesis）", "E": "關節穩定度與肌腱轉移術後結果無關"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 25, p539, p547.", "key": "🎯 Tendon transfer先決條件：欲轉移肌腱作用的相關關節必須具備『完整的被動活動範圍（full passive ROM）』——僵硬/攣縮關節須先鬆解。核心：轉移的肌力無法帶動一個passively僵硬的關節；關節穩定度亦影響結果。", "peropt": {"A": "✗ 僅具部分主動ROM不足，須full passive ROM。", "B": "◎ 關節須具備完整被動活動範圍才可行tendon transfer。", "C": "✗ 術後多先固定保護，非立即積極主動復健。", "D": "✗ 不必然需先行關節融合。", "E": "✗ 關節穩定度與結果相關，非無關。"}, "cite": "原檔詳解（NG 5e Vol.6 Ch25, p.539, p.547）", "conflict": ""}, {"id": "1315", "sub": "HND", "src": "NG", "years": [114], "stem": "根據Seddon或Sunderland周邊神經損傷分類及相關手術處理時機，下列敘述何者正確？（複選）", "opts": {"A": "Neurapraxia (第一度損傷) 通常需要手術減壓以促進恢復。", "B": "Axonotmesis (第二度損傷) 的預期恢復速率約為每月 1 英寸 (2.5 cm)。", "C": "Neuroma-in-continuity (第四度損傷) 通常預期會有良好的自發性恢復。", "D": "Neurotmesis (第五度損傷) 需要及時手術介入，因為自發性恢復的可能性不高。", "E": "對於閉合性神經損傷，若三個月後仍無臨床或電生理恢復跡象，建議考慮手術治療。"}, "ans": "BDE", "multi": true, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 26, p639.", "key": "🎯 神經傷害分級與手術時機:Neurapraxia(1度)僅去髓鞘、可自行完全恢復，不需手術;Axonotmesis(2度)保留 basal lamina，恢復速率約每月1吋(2.5cm);4度為 neuroma-in-continuity，自發恢復差、需手術;Neurotmesis(5度)為橫斷、須及時手術;閉合性神經傷若3個月無臨床/EDX 恢復即考慮手術探查。本題正確者為 B、D、E。", "peropt": {"A": "✗ Neurapraxia 自行恢復，不需手術減壓。", "B": "◎ Axonotmesis 再生約每月1吋(2.5cm)。", "C": "✗ 4度 neuroma-in-continuity 自發恢復差，需手術，非『良好自發恢復』。", "D": "◎ Neurotmesis(5度/橫斷)須及時手術，自發恢復不佳。", "E": "◎ 閉合性神經傷若 3 個月仍無臨床或 EDX 恢復跡象即考慮手術探查(對照 axonotmesis 約每月 2.5 cm 之預期再生時序)。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1316", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "與肌腱轉移 (tendon transfers) 相比，神經轉移 (nerve transfers) 在周邊神經損傷重建的特點或優勢，下列敘述何者正確？", "opts": {"A": "恢復較自然的肌肉功能與動作，因直接恢復了原有的神經支配。", "B": "保留了原有的肌肉-肌腱生物力學結構。", "C": "手術可以在原始損傷區域之外進行，手術技術相對簡單且安全。", "D": "術後通常不需要固定，或固定時間較短，有利於早期活動。", "E": "對於遠端單一功能的周邊神經損傷，傳統上仍以直接神經修補或神經移植為首選。。"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 26, p639.", "key": "🎯 神經轉移(nerve transfer) 相較肌腱轉移(tendon transfer) 之優勢：保留原有肌肉-肌腱生物力學結構；手術可在原始損傷區域外進行、相對簡單安全；術後固定時間短、利於早期活動。⚠ 跨年事實置換：A 的『直接恢復原有神經支配』說法有誤——nerve transfer 用『供體神經』再支配目標肌，需皮質再學習，非恢復『原有』支配；E 對於遠端單一功能損傷，現代常以近端 nerve transfer 為佳，其『傳統以直接修補/移植為首選』的敘述屬置換誘答，故均不選。", "peropt": {"A": "✗ 敘述有誤——nerve transfer 以『供體神經』再支配目標肌、需皮質再學習，並非『直接恢復原有神經支配』。", "B": "◎ 保留原有肌肉-肌腱生物力學結構，為 nerve transfer 相對 tendon transfer 之優勢。", "C": "◎ 手術可在原始損傷區外進行，技術相對簡單且安全。", "D": "◎ 術後通常不需固定或固定時間較短，利於早期活動。", "E": "✗ 事實置換誘答——遠端單一功能損傷現代常以近端 nerve transfer 為佳，此『傳統以直接修補/移植為首選』敘述於本題不列為正確。"}, "cite": "原檔詳解", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG115-B16-Q14） ⚠ 同題歷屆重出：nerve transfer相較tendon transfer之特點『複選正確』題，A-D選項與答案BCD相同；選項E文字不同(114年,1316為『遠端單一功能損傷傳統以神經修補/移植為首選』；115年,1331為『Neurapraxia傳統以神經移植為首選』)，兩者皆為錯誤選項未入選。"}, {"id": "1317", "sub": "HND", "src": "NG", "years": [115], "stem": "A 34-year-old man sustains deep dermal burns over the dorsum of the right hand and fingers. On admission, the hand is markedly edematous, but Doppler signals over the palmar arch and digital pulse oximetry remain detectable. Several months later, despite wound healing, he develops dorsal hand contracture with MCP joint hyperextension, PIP joint flexion, and an associated first web contracture. Which of the following statements is most appropriate?", "opts": {"A": "Because the hand is markedly edematous, early escharotomy should be performed regardless of Doppler or pulse oximetry findings; digital escharotomies should be made along the mid-axial line of each digit to prevent later clawing.", "B": "Initial splinting should place the wrist in slight flexion, MCP joints in extension, and IP joints in flexion, because this position decreases dorsal skin tension and protects the extensor mechanism during the acute inflammatory phase.", "C": "If PIP flexion contractures are fixed, they should be corrected before MCP extension contracture release; otherwise, flexing the MCP joints after dorsal release may drive the fingertips into the palm and worsen functional grasp.", "D": "During first web contracture release, the thumb should be stabilized mainly in extension after longitudinal web release, because this minimizes the required flap size while still restoring adequate pulp-to-pulp pinch.", "E": "In post-burn dorsal hand contracture, scar excision and flap resurfacing alone are usually sufficient; capsular adhesions, long extensor adaptive shortening, and MCP articular congruity rarely determine the final functional result."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 燒傷後手背攣縮（MCP過伸、PIP屈曲、first web攣縮）處理重點：若PIP屈曲攣縮為固定型，應『先矯正PIP』再行MCP伸直攣縮鬆解——否則背側鬆解後屈曲MCP會把指尖推入掌心、惡化握持。核心易錯：急性期須採safe/antideformity position（腕伸、MCP屈70–90°、IP伸），非腕屈/MCP伸/IP屈；灌流可測時不需盲目escharotomy；深部因素（關節囊沾黏、伸肌腱適應性縮短、MCP關節吻合度）確會決定最終功能。", "peropt": {"A": "✗ 掌弓 Doppler 與指端 pulse ox 可測 → 灌流尚可，不應「不論結果」即 early escharotomy；且指部 escharotomy 應偏「非慣用/尺側 mid-axial」以保留橈側感覺(拇指與小指則相反)，敘述不當。", "B": "✗ 錯誤：正確安全姿勢為腕伸、MCP屈曲(70–90°)、IP伸直（intrinsic-plus），非腕屈/MCP伸/IP屈。", "C": "◎ 固定型PIP屈曲攣縮應先矯正，再鬆解MCP伸直攣縮，否則會把指尖推入掌心、惡化握持。", "D": "✗ First web鬆解後拇指應維持在『外展』位以保持web深度，非以extension為主，敘述不當。", "E": "✗ 錯誤：關節囊沾黏、伸肌腱縮短、MCP吻合度常決定最終功能，非rarely determine。"}, "cite": "待複查（NG 燒傷手部攣縮重建 記憶佐證）", "conflict": ""}, {"id": "1318", "sub": "HND", "src": "NG", "years": [115], "stem": "關於手部構造的敘述，下列何者為錯?", "opts": {"A": "Kaplan’s cardinal line與從中指尺側向近端延伸的縱向線交點為尺神經運動支(motor branch of the ulnar nerve)。", "B": "舟狀骨結節（scaphoid tubercle）是一個重要的骨性解剖標誌，正常情況下，當每一根手指單獨屈曲時，其指尖的延長線都應指向舟狀骨結節。", "C": "腕舟骨的近端血液供應較差，於近端(proximal pole)骨折後易發生不癒合(nonunion)。", "D": "Gilula’s lines showing the greater arc and lesser arc of the carpal bones，可用來評估腕骨是否脫位、半脫位或骨折脫位。", "E": "Checkrein ligament是一種不正常的結構，僅在纖維化後的近端指間關節(proximal interphalangeal joint)出現。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 手部表面解剖:所有手指單獨屈曲時指尖延長線皆指向 scaphoid tubercle(評估旋轉);scaphoid 近端血供差(逆行)，proximal pole 骨折易 nonunion;Gilula's arcs(greater/lesser arc)評估腕骨排列/脫位。關鍵陷阱:與 Kaplan's cardinal line 交點相關的 thenar 運動支為『正中神經』recurrent motor branch;將其誤植為尺神經運動支者即為錯誤。", "peropt": {"A": "◎ ，敘述錯誤) 該處對應的 thenar 運動支為正中神經 recurrent motor branch，非尺神經運動支。", "B": "✗(敘述正確) 各指單獨屈曲時指尖延長線皆指向 scaphoid tubercle。", "C": "✗(敘述正確) Scaphoid 近端逆行血供差，proximal pole 骨折易 nonunion。", "D": "✗(敘述正確) Gilula's lines(greater/lesser arc)評估腕骨脫位/半脫位/骨折脫位。", "E": "✗(敘述正確，依本題) Checkrein(病理性)束與 PIP 屈曲攣縮相關。"}, "cite": "待複查（NG hand surface anatomy / Kaplan line 記憶佐證）", "conflict": "⚠陷阱對照｜NG114 陷阱在 C(Grayson/Cleland 背腹顛倒)，答 C；NG115 該選項已不存在，陷阱改到 A——『Kaplan line 交點是尺神經(ulnar)運動支』為錯(應為正中神經 median)，答 A。先鎖定該版是否出現 Kaplan line＋ulnar 敘述。"}, {"id": "1320", "sub": "HND", "src": "NG", "years": [115], "stem": "請問下列何者是Wide-Awake Local Anesthesia No Tourniquet (WALANT)的優點？", "opts": {"A": "不用 tourniquet避免止血帶疼痛", "B": "不用sedation 避免麻醉風險", "C": "病人可於術中配合動作，有助於屈肌腱重建時調整最佳張力。", "D": "Diluted epinephrine用在手指頭是安全的", "E": "All of above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "以上皆是(WALANT優點:免止血帶/免sedation/術中主動配合調張力/手指用稀釋epinephrine安全)。", "peropt": {"A": "免tourniquet、避免止血帶疼痛，正確。", "B": "免sedation、降低麻醉風險，正確。", "C": "病人術中可主動活動、利屈肌腱重建調張力，正確。", "D": "稀釋epinephrine用於手指是安全的(推翻舊禁忌)，正確。", "E": "◎ 以上皆是。"}, "cite": "Neligan, 5th Edition, vol.6, Ch4 p103", "conflict": ""}, {"id": "1321", "sub": "HND", "src": "NG", "years": [115], "stem": "關於Hunter Two-Stage Tendon Reconstruction，何者錯誤？", "opts": {"A": "Stage I 包含Scar excision, pulley reconstruction, silicone Hunter rod insertion，目的在於建立Pseudosheath", "B": "Stage II包含移除Hunter rod並植入tendon graft", "C": "Stage之間等待期為1個月", "D": "Scarred tendon bed, Pulley destruction, Joint stiffness為two stage tendon reconstruction的適應症", "E": "常使用的tendon graft為Palmaris longus及Plantaris"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Hunter兩階段間隔約『3個月』讓pseudosheath成熟，非1個月。", "peropt": {"A": "Stage I:scar excision、pulley reconstruction、置silicone rod→形成pseudosheath，正確。", "B": "Stage II:移除rod、植tendon graft，正確。", "C": "◎ 答案(錯)：兩階段間隔約3個月(非1個月)。", "D": "適應症:scarred bed、pulley destruction、joint stiffness，正確。", "E": "常用graft:palmaris longus、plantaris，正確。"}, "cite": "Neligan, 5th Edition, vol.6, Ch9 p222", "conflict": ""}, {"id": "1322", "sub": "HND", "src": "NG", "years": [115], "stem": "下列關於Ｍallet finger之敘述何者為是?", "opts": {"A": "成因爲terminal extensor tendon rupture or terminal tendon bony avulsion", "B": "絕大多數保守治療即可，全天配戴Splint時間需持續 6–8 週，再調整成夜間配戴2–6 週。", "C": "手術適應症為： Fragment >1/3 articular surface、volar subluxation、open Mallet injury、displacement > 3 mm", "D": "最常見的手術方式為open reduction and internal fixation (ORIF)", "E": "Mallet injury之手術併發症可高達53%"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "⚠答案標D但臨床有爭議:mallet以保守為主,手術術式多為extension-block pinning/CRIF而非普遍ORIF。建議記『保守為主、術式多元』。", "peropt": {"A": "成因=terminal extensor tendon斷裂或bony avulsion，正確。", "B": "多數保守，全天splint 6-8週再夜間2-6週，大致正確。", "C": "手術適應症:fragment>1/3關節面、volar subluxation、open、位移>3mm，大致正確。", "D": "◎ ⚠題庫標為正解:『最常見手術為ORIF』；惟臨床bony mallet常用extension-block K-wire/CRIF，ORIF為首選有爭議，宜以概念記憶。", "E": "✗（此敘述正確、非本題爭議點）文獻報告 mallet finger 手術併發症可高達約 53%，故手術指徵須嚴格。"}, "cite": "Neligan, 5th Edition, vol.6, Ch10, 235-236", "conflict": ""}, {"id": "1323", "sub": "HND", "src": "NG", "years": [115], "stem": "關於mutilating hand之評估與重建，以下何者為非？", "opts": {"A": "重建的目標主要為達到穩定的手腕、至少兩隻以上可對掌運動且有感覺的手指、寬的第一指蹼", "B": "若有活動性出血，應直接以止血鉗深入創口內夾住出血血管止血", "C": "清創移除壞死組織時，應在止血帶使用下執行", "D": "應儘早完成軟組織重建，最好在五天內進行", "E": "次級的骨骼或神經移植應在六個月內執行，一旦組織情況達到穩定即可酌情進行改善外觀及功能性的手術"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題選『為非』。Mutilating hand 評估重建：目標為穩定手腕、至少兩隻以上可對掌且有感覺的手指、寬第一指蹼；清創須在止血帶下進行；軟組織重建宜早（最好 5 天內）；次級骨/神經移植於 6 個月內、組織穩定即可酌情進行。核心錯誤：活動性出血時『不應』盲目將止血鉗深入創口夾閉血管（易傷及神經血管），應以止血帶＋加壓、辨識結構後處理，故 B 錯誤。", "peropt": {"A": "✗（正確敘述）目標為穩定手腕、至少兩隻以上可對掌且有感覺的手指、寬第一指蹼。", "B": "◎ ＝錯誤敘述）活動性出血不應盲目深入創口夾閉血管，易傷及神經血管；應以止血帶加壓後辨識處理。", "C": "✗（正確敘述）清創須在止血帶使用下進行。", "D": "✗（正確敘述）軟組織重建宜早，最好 5 天內。", "E": "✗（正確敘述）次級骨/神經移植於 6 個月內、組織穩定即可酌情進行。"}, "cite": "待複查（NG 手外科 mutilating hand 記憶佐證）", "conflict": ""}, {"id": "1324", "sub": "HND", "src": "NG", "years": [115], "stem": "關於非顯微手術的拇指缺損重建，以下何者錯誤？", "opts": {"A": "Distal 1/3拇指對功能性的損失較小，應優先考慮軟組織覆蓋即可", "B": "Middle 1/3拇指缺損可以skin graft或Z-plasty延長first web space，達到relative的拇指延長", "C": "Middle 1/3拇指缺損可以bone graft加上groin flap包埋，達到absolute的拇指延長", "D": "Middle 1/3拇指缺損可使用metacarpal lengthening，優點為僅需單一次手術且是個無痛的療程，即便老年族群也不需要bone graft", "E": "Proximal 1/3拇指缺損如果無法接受顯微手術，仍可考慮將食指進行拇指化移至thumb ray（on-top plasty）"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 非顯微拇指重建（本題問『錯誤』，答案D）：核心——metacarpal（distraction）lengthening為漸進式、需數週、可能疼痛，且較大缺損/老年常仍需bone graft，非『單次、無痛、免植骨』。其餘正確：distal 1/3以軟組織覆蓋、middle 1/3可用Z-plasty/skin graft做相對延長或bone graft+groin flap做絕對延長、proximal 1/3可用食指on-top plasty（pollicization）。", "peropt": {"A": "✗（正確）Distal 1/3功能損失小，優先軟組織覆蓋。", "B": "✗（正確）Middle 1/3以skin graft/Z-plasty加深first web達相對延長。", "C": "✗（正確）Middle 1/3以bone graft+groin flap包埋達絕對延長。", "D": "◎ ，為錯誤敘述）Metacarpal lengthening為漸進多週、可能疼痛，且常需bone graft，非單次無痛免植骨。", "E": "✗（正確）Proximal 1/3可行食指on-top plasty（pollicization）至thumb ray。"}, "cite": "待複查（NG 拇指非顯微重建 記憶佐證）", "conflict": ""}, {"id": "1325", "sub": "HND", "src": "NG", "years": [115], "stem": "關於手部常見良性腫瘤的敘述，以下何者錯誤？", "opts": {"A": "Ganglion Cyst最常好發於dorsal carpal位置，且多源自scapholunate interosseous ligament", "B": "Giant Cell Tumor因其復發率極低，切除時通常會因考慮外觀及功能性而不做complete resection", "C": "Schwannoma切除需由 “shell it out” 的方式在顯微鏡下將其與周邊nerve fascicles剝離", "D": "Neurofibroma切除可能會造成segmental神經損傷，通常需要事先準備做nerve graft的可能", "E": "Lipoma的切除適應症為體積增加造成神經的壓迫"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 手部良性腫瘤處置:Ganglion 好發 dorsal carpal、源自 SL 韌帶;GCT of tendon sheath『復發率高』，須完整/仔細切除(非因復發率低而故意不完整切除);Schwannoma 可『shell out』enucleation 保留 fascicles;Neurofibroma 與 fascicle 交織，切除可能造成節段性神經缺損、須備 nerve graft;Lipoma 於壓迫神經時切除。本題找『錯誤』者為 B。", "peropt": {"A": "✗(敘述正確) Ganglion 好發 dorsal carpal，源自 SL 韌帶。", "B": "◎ ，敘述錯誤) GCT of tendon sheath 復發率『高』，須完整仔細切除，非故意不完整切除。", "C": "✗(敘述正確) Schwannoma 顯微下 enucleation(shell out)保留 fascicles。", "D": "✗(敘述正確) Neurofibroma 切除可能致節段性神經損傷，須備 nerve graft。", "E": "✗(敘述正確) Lipoma 於造成神經壓迫時切除。"}, "cite": "待複查（NG hand benign tumors 記憶佐證）", "conflict": ""}, {"id": "1326", "sub": "HND", "src": "NG", "years": [115], "stem": "關於Dupuytren’s disease的描述以下何者錯誤？", "opts": {"A": "Dupuytren’s disease是手部palmar和digital fasciae的纖維化增生疾病，類似病症也可能影響足部(Ledderhose disease)或陰莖(Peyronie’s disease)", "B": "60歲以上才發病的男性，通常疾病的病程較爲良性", "C": "20–30° of metacarpophalangeal joint攣縮為手術適應症之一", "D": "proximal interphalangeal joint攣縮非手術適應症之一", "E": "糖尿病控制不佳為手術的contraindication之一"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題選『錯誤』。Dupuytren：屬掌部與指部筋膜纖維增生，可累及足(Ledderhose)或陰莖(Peyronie)；60 歲以上才發病之男性病程通常較良性（早發、diathesis 者較兇猛）；MCP 20–30° 攣縮為手術指徵之一；控制不佳的糖尿病為相對禁忌。核心錯誤：『任何程度』的 PIP joint 攣縮『即為』手術指徵（PIP 較難矯正、須早介入），故『PIP 攣縮非手術指徵』的 D 錯誤。", "peropt": {"A": "✗（正確敘述）為掌/指筋膜纖維增生，可累及足（Ledderhose）與陰莖（Peyronie）。", "B": "✗（正確敘述）60 歲以上才發病之男性病程通常較良性。", "C": "✗（正確敘述）MCP 20–30° 攣縮即為手術指徵之一（MCP 攣縮矯正預後較佳）。", "D": "◎ ＝錯誤敘述）「任何程度」PIP 攣縮即為手術指徵（PIP 攣縮矯正困難、須早介入），而非 MCP 需達 20–30° 的門檻；故「PIP 攣縮非手術指徵」錯誤。", "E": "✗（正確敘述）控制不佳的糖尿病為手術相對禁忌之一。"}, "cite": "待複查（NG 手外科 Dupuytren 手術指徵 記憶佐證）", "conflict": ""}, {"id": "1327", "sub": "HND", "src": "NG", "years": [115], "stem": "以下關於常見的職業性手部疾病的敘述，哪些正確？(複選)", "opts": {"A": "Lateral epicondylitis成因為flexor muscles機械性過度使用及重複性收縮，導致的微小撕裂或肌腱退化", "B": "Trigger finger的初步治療選項中，局部注射類固醇於A1 pulley處是為重要的治療方式之一", "C": "De Quervain’s tenosynovitis常見影響first dorsal compartment的肌腱abductor pollicis longus及extensor pollicis brevis", "D": "Extensor carpi ulnar tendinitis的手術治療為在extensor retinaculum做radial incision為肌腱減壓", "E": "Flexor carpi ulnaris tenosynovitis為scaphotrapeziotrapezoid joint關節炎，而flexor carpi radialis tenosynovitis則為pisotriquetral joint壓迫或鈣化"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 職業性手部疾病（本題複選『正確』，答案BCD）：trigger finger可於A1 pulley局部類固醇注射；De Quervain影響first dorsal compartment之APL與EPB；ECU tendinitis手術於extensor retinaculum做『橈側』切開減壓（保留尺側subsheath避免半脫位）。核心易錯：lateral epicondylitis為『伸肌（ECRB）』過度使用（非flexor）；FCR相關STT joint、FCU相關pisotriquetral（選項E將兩者對調）。", "peropt": {"A": "✗ Lateral epicondylitis為伸肌（ECRB）起點之過度使用/退化，非flexor，故不正確。", "B": "◎ Trigger finger於A1 pulley局部注射類固醇為重要初步治療，正確。", "C": "◎ De Quervain影響first dorsal compartment之APL與EPB，正確。", "D": "◎ ECU tendinitis於extensor retinaculum做橈側切開減壓，正確。", "E": "✗ 反了：FCR tenosynovitis與STT joint相關、FCU與pisotriquetral相關，選項將兩者對調，不正確。"}, "cite": "待複查（NG 職業性手部肌腱病變 記憶佐證）", "conflict": ""}, {"id": "1328", "sub": "HND", "src": "NG", "years": [115], "stem": "以下對應的肌肉weakness / 所involve的神經 / 壓迫的level之配對，哪些正確？(複選)", "opts": {"A": "Triceps + flexor carpi radialis / Cervical root C5 / C5 radiculopathy", "B": "extensor carpi radialis brevis + extensor indicis proprius + extensor pollicis longus / Radial nerve / Lateral intermuscular septum", "C": "extensor carpi ulnaris / Ulnar nerve / Cubital tunnel", "D": "flexor pollicis longus + flexor digitorum profundus of index / Median nerve / Anterior interosseous syndrome", "E": "abductor digiti minimi / Ulnar nerve / Guyon’s canal zone 3"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 壓迫神經病變的定位配對:radial(PIN)支配 ECRB/EIP/EPL/ECU 等，可於 lateral intermuscular septum(高位橈神經)受壓;AIN(median)支配 FPL+FDP(食/中)+PQ → anterior interosseous syndrome;C5 主要為 deltoid/biceps(triceps 為 C7);Guyon zone III 為純感覺(不含 ADM 運動)。本題正確配對為 B、D。", "peropt": {"A": "✗ Triceps(C7)與 FCR 非 C5;C5 主要 deltoid/biceps，配對錯誤。", "B": "◎ ECRB/EIP/EPL 為 radial(PIN)肌;radial nerve 可於 lateral intermuscular septum 受壓。", "C": "✗ ECU 為 radial(PIN)支配，非尺神經，配對錯誤。", "D": "◎ FPL+FDP(食指)由 AIN(median)支配 → anterior interosseous syndrome。", "E": "✗ ADM 為運動(尺神經深支/zone II);Guyon zone III 為純感覺，配對錯誤。"}, "cite": "待複查（NG compression neuropathy localization 記憶佐證）", "conflict": ""}, {"id": "1329", "sub": "HND", "src": "NG", "years": [115], "stem": "以下關於adult及pediatric obstetric 的brachial plexus palsy比較，哪些正確？(複選)", "opts": {"A": "Adult較常見reliable且persistent的Horner’s syndrome", "B": "Pediatric較多root injury (level 1) 的pattern", "C": "Adult的rupture injury其nerve gap一定大於5cm", "D": "Pediatric的神經重建nerve grafts比nerve transfers來的多", "E": "Adult的intercostal nerve transfer通常會有比較好的result"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 成人 vs 小兒(產傷)臂叢麻痺比較：成人較常見可靠且持續的 Horner's syndrome（提示 preganglionic 撕脫）；成人 rupture 常伴大 nerve gap（常>5cm）需 graft；小兒因常見 rupture 具近端斷端可用，nerve grafts 多於 nerve transfers。核心鑑別：小兒產傷以 rupture/postganglionic 為主而非 root avulsion 較多，故 B 錯；intercostal nerve transfer 在『小兒』結果較佳（非成人），故 E 錯。", "peropt": {"A": "◎ 成人較常見可靠且持續的 Horner's syndrome（提示 preganglionic 撕脫）。", "B": "✗ 小兒產傷以 rupture/postganglionic 為主，root avulsion（level 1）並非較多，敘述錯誤。", "C": "◎ 成人 rupture 常伴大 nerve gap（常>5cm），需神經移植。", "D": "◎ 小兒因常見近端斷端可用，nerve grafts 多於 nerve transfers。", "E": "✗ Intercostal nerve transfer 在小兒結果較佳，非成人，敘述錯誤。"}, "cite": "待複查（NG 手外科 成人 vs 產傷臂叢 記憶佐證）", "conflict": ""}, {"id": "1330", "sub": "HND", "src": "NG", "years": [115], "stem": "以下關於改善tetraplegia患者上肢功能的手術術式及描述，何者錯誤？", "opts": {"A": "Arthrodesis可穩定那些缺乏肌肉穩定功能的關節", "B": "Tenodesis可穩定關節在近端動作時，使tenodesis收緊而帶動遠端關節的動作", "C": "Tendon transfer移植一組可良好自主意念控制的肌肉－肌腱，可彌補其他區域的功能缺陷", "D": "Nerve transfer將active muscle延伸出來的功能性nerve branch移植至癱瘓的肌肉能提供肌肉功能", "E": "藉由縮短肌腱或全面性阻斷神經，可降低spasticity的產生"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Tetraplegia上肢功能重建（本題問『錯誤』，答案E）：arthrodesis穩定缺乏肌肉穩定之關節；tenodesis利用近端動作收緊肌腱帶動遠端；tendon transfer以可自主控制之肌肉補功能缺陷；nerve transfer將功能性神經分支接至癱瘓肌肉恢復功能。核心錯誤：以『縮短肌腱或全面性阻斷神經來降低spasticity』之敘述不當——痙攣處理另有方式，全面神經阻斷非合理策略。", "peropt": {"A": "✗（正確）Arthrodesis可穩定缺乏肌肉穩定之關節。", "B": "✗（正確）Tenodesis藉近端動作收緊肌腱帶動遠端關節。", "C": "✗（正確）Tendon transfer以可自主控制之肌肉補功能缺陷。", "D": "✗（正確）Nerve transfer將功能性神經分支接至癱瘓肌肉以恢復功能。", "E": "◎ ，為錯誤敘述）以縮短肌腱或『全面性阻斷神經』降低spasticity之敘述不正確。"}, "cite": "待複查（NG 四肢癱瘓上肢重建 記憶佐證）", "conflict": ""}, {"id": "1332", "sub": "HND", "src": "NG", "years": [115], "stem": "Free-functioning muscle transfer之敘述，以下何者錯誤？", "opts": {"A": "為確保移植的axon source為健康且size足夠的神經，初步探查或神經biopsy為可能需要的手段", "B": "在harvest皮瓣時保留一小塊skin paddle有助於提升皮瓣監測及成功搶救皮瓣的成功率", "C": "為確保muscle移植後能具有足夠的收縮強度，其選定的長度應在最強收縮狀態下決定", "D": "Gracilis是最常用來重建上肢功能的free-functioning muscle transfer，因爲其donor site morbidity小且周圍其他肌肉能代償其功能", "E": "Late complication常見功能性不足的原因，可能來自肌肉強度不夠或者沾黏導致肌腱gliding或肌肉excursion受阻"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題選『錯誤』。Free-functioning muscle transfer (FFMT)：可能需初步探查或神經 biopsy 確保健康且口徑足夠之 axon source；保留 skin paddle 有助皮瓣監測與搶救；gracilis 最常用（供區 morbidity 小、鄰肌可代償）；late complication 常因肌力不足或沾黏阻礙 gliding/excursion。核心錯誤：移植肌肉的長度/張力應設定在『靜止（resting）張力／自然靜息長度』（sarcomere 最佳長度），而非『最強收縮狀態』，故 C 錯誤。", "peropt": {"A": "✗（正確敘述）可能需初步探查或神經 biopsy 以確保健康、口徑足夠之 axon source。", "B": "✗（正確敘述）保留 skin paddle 有助皮瓣監測與搶救。", "C": "◎ ＝錯誤敘述）FFMT 肌肉張力應設定於「靜息(resting)張力／自然靜息長度」(對應 sarcomere 最佳重疊長度 ~2.0–2.2 µm)以獲最大主動張力，而非「最強收縮狀態」下決定長度。", "D": "✗（正確敘述）Gracilis 最常用，供區 morbidity 小、鄰肌可代償。", "E": "✗（正確敘述）Late complication 常因肌力不足或沾黏阻礙 gliding/excursion。"}, "cite": "待複查（NG 手外科 FFMT 記憶佐證）", "conflict": ""}, {"id": "1333", "sub": "HND", "src": "NG", "years": [115], "stem": "關於 neurostenalgia 的描述，下列何者正確？", "opts": {"A": "神經在瘢痕組織中受到包覆，但因神經連續性中斷，故不會出現 allodynia", "B": "其 cardinal sign 為 allodynia，且 allodynia 的存在代表神經仍保有連續性", "C": "瘢痕組織的牽拉效應對神經造成傷害，主要機制為直接切斷軸突（axonal transection）", "D": "Neurostenalgia 所造成的疼痛純粹為 nociceptive pain，不屬於 neuropathic pain", "E": "Neurostenalgia 不會造成運動或感覺功能障礙，僅有疼痛表現"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Neurostenalgia:神經在瘢痕中受壓/牽拉但『連續性保留』;cardinal sign=allodynia，其存在代表神經連續。", "peropt": {"A": "✗神經連續性保留，會有allodynia。", "B": "◎ cardinal sign為allodynia，且其存在代表神經仍連續，正確。", "C": "✗機轉為瘢痕壓迫/牽拉，非軸突切斷(axonal transection)。", "D": "✗屬neuropathic pain，非純nociceptive。", "E": "✗可伴運動/感覺障礙，非僅疼痛。"}, "cite": "Neligan 5th ed., Vol. 6, Ch 31（The painful hand", "conflict": ""}, {"id": "1334", "sub": "HND", "src": "NG", "years": [115], "stem": "關於手部僵硬（hand stiffness）的病理機轉，下列何者正確？手部受傷後水腫積聚，若未適當處理，關節會傾向採取何種「負向/受傷手部姿勢」（negative/injured hand position）？", "opts": {"A": "腕關節伸直、拇指外展、MCP關節屈曲、PIP關節伸直", "B": "腕關節屈曲、拇指內收、MCP關節伸直、PIP關節屈曲", "C": "腕關節屈曲、拇指外展、MCP關節屈曲、PIP關節伸直", "D": "腕關節伸直、拇指內收、MCP關節屈曲、PIP關節屈曲", "E": "腕關節屈曲、拇指內收、MCP關節屈曲、PIP關節伸直"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "受傷手部『負向姿勢』:腕屈曲、拇指內收、MCP伸直、PIP屈曲(與safe/intrinsic-plus位相反)。", "peropt": {"A": "✗此接近safe position非injured position。", "B": "◎ 腕屈曲、拇指內收、MCP伸直、PIP屈曲=受傷/攣縮姿勢，正確。", "C": "✗組合不符。", "D": "✗組合不符。", "E": "✗組合不符(拇指內收但MCP屈曲/PIP伸直矛盾)。"}, "cite": "Neligan 5th ed., Vol. 6, Ch 30（The stiff hand", "conflict": ""}, {"id": "1336", "sub": "HND", "src": "NG", "years": [115], "stem": "關於myoelectric prosthesis的特性，下列哪些敘述正確？", "opts": {"A": "Myoelectric prosthesis比body-powered prosthesis需要更少的harnessing", "B": "移除皮下脂肪可降低肌肉與皮膚間的阻抗，進而提升EMG訊號振幅", "C": "Myoelectric prosthesis完全防水，可長時間浸水使用", "D": "過度流汗會降低電極與皮膚的接觸可靠性，影響訊號偵測", "E": "Skin graft作為殘肢覆蓋時，因缺乏皮下脂肪而有利於EMG訊號偵測"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "正確ABDE。Myoelectric prosthesis並非完全防水/可長時間浸水。", "peropt": {"A": "◎ 比body-powered需更少harnessing，正確。", "B": "◎ 移除皮下脂肪降低阻抗、提升EMG振幅，正確。", "C": "✗非完全防水、不可長時間浸水。", "D": "◎ 過度流汗降低電極接觸可靠性，正確。", "E": "◎ skin graft覆蓋(缺皮下脂肪)有利EMG偵測，正確。"}, "cite": "Neligan 5th ed., Vol. 6, Ch 40（Treatment of the upper extremity amputee", "conflict": ""}, {"id": "1337", "sub": "HND", "src": "NG", "years": [115], "stem": "關於 spinal nerve root avulsion（deafferentation）的臨床特徵與診斷，下列哪些敘述正確？（複選）", "opts": {"A": "感覺神經細胞體（cell bodies of sensory fibers）位於 dorsal root ganglia，在 avulsion 損傷後仍保持完整但與脊髓背角失去連結", "B": "CT myelography 對區分 pre-ganglionic 與 post-ganglionic 病變的準確率（約 85%）高於 MRI（約 52%）", "C": "Avulsion 疼痛的典型描述為灼熱感或熱感，患者常形容手部「著火」或「被熱水澆淋」", "D": "根據 Parry 的研究，損傷位於 dorsal root ganglion 遠端（distal to dorsal root ganglion）的患者，疼痛同樣是常見且顯著的表現", "E": "術後應強調積極且持續的乳房按摩，為常規乳房擴張術後照護的重要環節"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "⚠此題答案鍵ACE中，E『乳房按摩』與脊神經根撕脫無關，疑為原檔選項毀損/答案鍵誤植。A、C正確;D(Parry:distal-to-DRG疼痛較不顯著)為錯;B數據待查。建議對照原文複查。", "peropt": {"A": "◎ 感覺神經cell body位於DRG，avulsion後仍完整但與脊髓背角失聯(deafferentation)，正確。", "B": "✗（本題非正解，數據待查）CT myelography 對 pre-/post-ganglionic 鑑別準確率(約 85%)一般被認為高於或等同 MRI(約 52%)；此數據於本題答案鍵中未列為正解，建議對照原文複查。", "C": "◎ avulsion疼痛典型為灼熱/『著火』感，正確。", "D": "✗Parry:疼痛主要見於preganglionic(撕脫);distal-to-DRG(postganglionic)疼痛較不常見/顯著，本敘述有誤。", "E": "◎ ⚠（答案疑義，不改 ans）此選項內容為「乳房按摩／乳房擴張術後照護」，與 spinal nerve root avulsion 完全無關，疑原檔選項毀損或答案鍵誤植；請對照原文，勿死背。"}, "cite": "Neligan 5th ed., Vol. 6, Ch 31（The painful hand", "conflict": ""}, {"id": "5012", "sub": "AES", "src": "GS", "years": [112, 113, 114, 115], "stem": "Which of the following describes evaluation of the Müller muscle function?", "opts": {"A": "Distance of upper lid margin to corneal light reflex midpoint.", "B": "Distance of upper eyelid margin resting below superior limbus.", "C": "Maximal excursion measurement of the lid margin from extreme upgaze to extreme downgaze.", "D": "Instilling 2.5% phenylephrine eye drop and evaluating changes to marginal reflex distance.", "E": "None of the above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "Evaluation of the sympathetically innervated Müller muscle function can be performed by instilling 2.5% phenylephrine eye drops and evaluating changes to marginal reflex distance after 10 minutes.", "key": "🎯 Müller muscle 為交感神經支配的平滑肌，其功能評估以 2.5% phenylephrine 眼藥水滴入後 10 分鐘再測 marginal reflex distance（MRD）變化來判定，若 MRD 上升代表 Müller 有反應、適合行 Müller muscle-conjunctival resection（MMCR）。易混點：MRD1 是測上瞼緣到角膜反光點距離（評估 ptosis 程度），levator function 是測極上／極下凝視間瞼緣移動幅度——兩者皆非 Müller 專屬評估。", "peropt": {"A": "✗ 上瞼緣至角膜反光中點距離為 MRD1(正常約 4–5 mm)，用於量化 ptosis 嚴重度，非評估 Müller 功能。", "B": "✗ 上瞼緣位於 superior limbus 下方之距離屬瞼位描述，非 Müller 功能測試。", "C": "✗ 極上凝視至極下凝視之瞼緣最大移動量為 levator function(正常約 12–15 mm)，非 Müller 功能。", "D": "◎ 滴 2.5% phenylephrine 後評估 MRD 變化，即為交感支配之 Müller 肌功能測試。", "E": "✗ D 為正確答案，故非「以上皆非」。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5029", "sub": "AES", "src": "GS", "years": [115], "stem": "A transgender woman (assigned male at birth) presents for facial feminization surgery consultation. On physical examination, which of the following best describes the typical brow position that distinguishes a feminine face from a masculine face?", "opts": {"A": "Eyebrows positioned at the level of the superior orbital rim", "B": "Eyebrows positioned below the superior orbital rim", "C": "Eyebrows positioned above the superior orbital rim", "D": "Eyebrows positioned at the level of the mid-orbit", "E": "Eyebrow position does not differ between masculine and feminine faces"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化手術（FFS）眉位判讀：女性眉毛位於 superior orbital rim『之上』且較弧形高拱，男性眉則位於 rim 之上緣或略下方、較平直。額骨重塑（frontal bossing/brow bossing reduction）合併 browlift 可將眉抬到女性化位置。故最能區分女性臉的是眉位於眶上緣之上。", "peropt": {"A": "✗ 眉位於眶上緣同高偏向中性/男性，非女性特徵最佳描述。", "B": "✗ 眉位於眶上緣『之下』屬男性化特徵。", "C": "◎ 女性眉位於 superior orbital rim 之上且高拱，為區分女性臉的典型特徵。", "D": "✗ 眉位於眶中段過低，不符女性眉位。", "E": "✗ 男女眉位確有差異，此敘述錯誤。"}, "cite": "待複查（Grabb & Smith 顏面女性化手術 記憶佐證）", "conflict": ""}, {"id": "5030", "sub": "AES", "src": "GS", "years": [115], "stem": "一位 48 歲女性，Fitzpatrick skin type III，希望接受全臉換膚改善光老化及細紋。問診過程中，下列哪些情況屬於進行皮膚換膚手術前必須考慮或處理的重要事項？", "opts": {"A": "詢問是否近期使用過 isotretinoin（Accutane），若有使用，需停藥至少1 年後才可進行換膚手術。", "B": "術前需給予口服抗病毒藥物（valacyclovir）預防 herpes simplex 病毒活化，應於術前 2 天開始使用。", "C": "因患者為 Fitzpatrick type III，屬於較深膚色，建議首選全臉 phenol-croton oil deep peel 以達到最佳效果。", "D": "換膚前至少 4–6 週開始使用 topical tretinoin（vitamin A derivative）進行皮膚預處理（preconditioning），以確保均勻滲透深度並加速術後癒合。", "E": "術前常規給予預防性抗真菌及抗生素口服藥物，以降低感染風險。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題測「換膚術前不當／錯誤的處置」：對 Fitzpatrick III（偏深膚色）者「首選全臉 phenol-croton oil deep peel」並不恰當——深層 phenol peel 於較深膚色易致 hyper-/hypopigmentation 與 demarcation line，反屬相對禁忌，故此敘述為錯誤選項。正確且必要之術前準備包含：tretinoin preconditioning、抗病毒預防（HSV 病史者）、審視 isotretinoin 使用史等。", "peropt": {"A": "✗ 詢問 isotretinoin 使用史屬必要；惟「停藥 1 年」為過時說法(現行建議多為停藥約 6 個月，部分文獻更短)，非本題所選之錯誤。", "B": "✗ 有 HSV 病史者術前給 valacyclovir 預防再活化屬合理標準，故非本題選項。", "C": "◎ Fitzpatrick III 首選全臉深層 phenol-croton oil peel 並不恰當（色素併發症風險高），此敘述有誤故選。", "D": "✗ 換膚前 4–6 週開始 topical tretinoin preconditioning 為正確且重要之準備。", "E": "✗ 常規預防性抗真菌並非標準（抗病毒/抗生素依情況），惟非本題最典型的錯誤選項。"}, "cite": "待複查（G&S 換膚術前準備 記憶佐證）", "conflict": ""}, {"id": "5031", "sub": "AES", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the pharmacology, preparation, and contraindications of botulinum toxin are correct? (複選", "opts": {"A": "Botulinum toxin prevents muscle contraction by causing selective proteolysis of the synaptic protein SNAP-25", "B": "IncobotulinumtoxinA differs from some other proprietary preparations because it is developed without complexing proteins.", "C": "Botulinum toxin is classified as a category A drug, making it completely safe for pregnant and breastfeeding women.", "D": "The clinical effects of botulinum toxin are typically observed immediately, within 1 to 2 hours after injection.", "E": "The use of botulinum toxin is contraindicated in patients with preexisting neuromuscular diseases such as myasthenia gravis."}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素藥理(複選選正確)：機轉為選擇性水解突觸蛋白SNAP-25以阻斷acetylcholine釋放;IncobotulinumtoxinA(Xeomin)特點為不含complexing proteins(裸露neurotoxin)。禁忌包括既有神經肌肉疾病(myasthenia gravis、Lambert-Eaton)。易錯點：BoNT為妊娠category C(非A)，孕哺並不安全;藥效非即時，注射後約24-72小時起效、1-2週達高峰。", "peropt": {"A": "◎ 機轉正確：選擇性水解SNAP-25阻斷神經肌肉接合處acetylcholine釋放。", "B": "◎ 正確：IncobotulinumtoxinA(Xeomin)不含complexing/附屬蛋白。", "C": "✗(非正解) 錯誤：BoNT為category C，孕婦哺乳並非完全安全。", "D": "✗(非正解) 錯誤：藥效非即時，多在24-72小時起效、約2週達高峰。", "E": "◎ 正確：既有神經肌肉疾病(如myasthenia gravis)為使用禁忌。"}, "cite": "待複查（Grabb & Smith 肉毒桿菌素藥理 記憶佐證）", "conflict": ""}, {"id": "5032", "sub": "AES", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the anatomy and neurovasculature of the forehead and brow region is correct?", "opts": {"A": "The supratrochlear nerve emerges from the supratrochlear notch on average 3.5 cm lateral to the midline.", "B": "The deep division of the supraorbital nerve runs laterally between the periosteum and galea to the midforehead.", "C": "The sentinel vein is reliably located perforating the temporoparietal fascia 5 cm lateral and inferior to the lateral canthus.", "D": "The facial nerve emerges from the skull base at the foramen ovale before dividing within the parenchyma of the parotid gland."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 前額神經血管解剖（選正確者）：supraorbital nerve的deep division（深支）自supraorbital foramen發出後，向外側走行於骨膜（periosteum）與帽狀腱膜（galea）之間，朝向中前額，是內視鏡提眉須保護的關鍵。故B正確。易錯數據：supratrochlear nerve約在中線外側1.7 cm（非3.5 cm），supraorbital約2.7 cm；sentinel vein位於顳區近額顴縫/外側眶緣而非外眥外下5 cm；facial nerve自stylomastoid foramen（非foramen ovale）出顱後於腮腺實質內分支。", "peropt": {"A": "✗ supratrochlear nerve 約於中線外側 1.7 cm 出眶(supraorbital 約 2.7 cm)，非 3.5 cm。", "B": "◎ supraorbital nerve深支走於periosteum與galea之間向外側至中前額，敘述正確。", "C": "✗ sentinel vein並非位於lateral canthus外下5 cm穿temporoparietal fascia，位置數據錯誤。", "D": "✗ facial nerve自stylomastoid foramen（非foramen ovale）出顱，再於腮腺內分支。"}, "cite": "待複查（Grabb & Smith Forehead 神經血管解剖 記憶佐證）", "conflict": ""}, {"id": "5033", "sub": "AES", "src": "GS", "years": [115], "stem": "A patient presents with pain, decreased extraocular movements, proptosis, and rapidly progressing vision changes several hours after lower blepharoplasty. Examination reveals increased intraocular pressure. What is the most appropriate immediate surgical management for this vision-threatening emergency?", "opts": {"A": "Immediate surgical decompression of the orbit, typically through a lateral canthotomy and cantholysis.", "B": "Conjunctivotomy to assist with fluid egress from beneath the conjunctiva.", "C": "Surgical evacuation of the postseptal space to treat suspected postseptal cellulitis.", "D": "Revision surgery with release of scar tissue and skin grafting of the eyelid."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Retrobulbar/orbital hemorrhage是lower blepharoplasty最可怕的視力威脅急症：疼痛、眼球運動受限、突眼(proptosis)、視力急速惡化、眼內壓上升即orbital compartment syndrome。處置為爭分奪秒的緊急減壓——lateral canthotomy與cantholysis（切開外眥韌帶下支），以立即降低眶內壓、恢復視神經及視網膜灌流。延誤>90分鐘可致不可逆失明。", "peropt": {"A": "◎ 立即行 lateral canthotomy 與 inferior cantholysis 減壓眶室，為恢復灌流、挽救視力之第一線急救；黃金時間約 <90–120 分鐘，延誤>90 分鐘可致不可逆失明。", "B": "✗ Conjunctivotomy無法有效解除後眶室高壓。", "C": "✗ 此為postseptal cellulitis處置，與急性出血性壓迫機轉不符。", "D": "✗ 疤痕鬆解與植皮處理的是外翻/攣縮，非急性視力威脅出血。"}, "cite": "待複查（Grabb & Smith 眼瞼成形併發症 記憶佐證）", "conflict": ""}, {"id": "5034", "sub": "AES", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the anatomy and potential complications of a facelift procedure is correct?", "opts": {"A": "The incidence of skin necrosis following a facelift is reported to be 5 times higher in smokers than in nonsmokers.", "B": "The primary blood supply to the central face comes from the superficial temporal artery", "C": "During dissection, the marginal mandibular and cervical branches of the facial nerve are most at risk of injury in the region of the upper masseteric retaining ligaments.", "D": "An unrecognized hematoma beneath the skin flaps will lead to fibrosis and contour deformity, and must be removed as soon as it is identified."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 解剖與併發症（選『正確』者）：未被察覺的皮瓣下血腫會導致纖維化與輪廓變形，一旦發現須立即清除（D 正確）。易混淆數字/解剖：吸菸者皮膚壞死風險約為非吸菸者的 10 倍以上（非 5 倍）；中臉主要血供來自 facial artery（非 superficial temporal artery）；marginal mandibular/cervical 分支最危險處在下方而非上 masseteric ligament 區。", "peropt": {"A": "✗ 吸菸者臉部拉皮後皮膚壞死風險約為非吸菸者的 12 倍(非 5 倍)。", "B": "✗ 中臉(central face)主要血供來自 facial artery(顏面動脈)，非 superficial temporal artery。", "C": "✗ marginal mandibular 與 cervical 分支最易受傷處在「下方(下頜緣/platysma 下)」區，非 upper masseteric retaining ligament 區。", "D": "◎ 未察覺之血腫致纖維化與輪廓變形，須立即清除。"}, "cite": "待複查（Grabb & Smith 拉皮併發症 記憶佐證）", "conflict": ""}, {"id": "5035", "sub": "AES", "src": "GS", "years": [115], "stem": "下列關於鼻尖（nasal tip）結構與鼻整形術（rhinoplasty）之敘述，何者錯誤？", "opts": {"A": "根據 Anderson 的 tripod concept，兩側 lateral crura 與 medial crura 共同決定鼻尖 rotation 與 projection。", "B": "Lateral crural steal 可同時增加 tip rotation，並維持或增加 tip projection。", "C": "傳統 columellar strut 已被證實足以可靠控制長期 tip rotation 與 projection，因此仍為目前 primary rhinoplasty 最主要支撐方式。", "D": "Septal extension graft（SEG）可藉由延長 caudal septum 來控制 tip rotation 與 projection。", "E": "過度 aggressive cephalic trim 可能導致鼻翼支撐不足與功能性問題，因此現代觀念強調 preservation of lateral crus。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻尖支撐現代觀念：傳統 columellar strut『無法』可靠控制長期 tip rotation/projection；現代 primary rhinoplasty 更依賴 septal extension graft(SEG)固定於 caudal septum。C 誇大 strut 長期支撐力為錯誤敘述。Anderson tripod concept、lateral crural steal(增加旋轉並維持/增加投影)、保留 lateral crus(殘留寬度建議≥6mm)、避免過度 cephalic trim 皆為正確現代概念。", "peropt": {"A": "✗ Tripod concept 中兩側 lateral crura 與 medial crura 共三腳共同決定 tip rotation/projection，正確。", "B": "✗ Lateral crural steal 藉將 lateral crus 轉為 medial crus 可同時增加 rotation 並維持/增加 projection，正確。", "C": "◎ ，即錯誤敘述) Columellar strut 對長期 rotation/projection 控制並不可靠，非現代最主要支撐；現代 primary rhinoplasty 以 septal extension graft(SEG)固定於 caudal septum 為可靠支撐。", "D": "✗ SEG 藉延長 caudal septum 控制 tip rotation/projection，正確。", "E": "✗ 過度 cephalic trim 使 lateral crus 殘留寬度不足(現代主張保留至少約 6mm)造成鼻翼支撐不足與功能問題，故強調 preservation of lateral crus，正確。"}, "cite": "待複查（Grabb & Smith / 現代鼻整形 tip support 記憶佐證）", "conflict": ""}, {"id": "5036", "sub": "AES", "src": "GS", "years": [115], "stem": "A 32-year-old woman undergoes chin augmentation with a silicone implant via an intraoral approach. The operation is uneventful. However, at 2-week follow-up, she presents with lower lip ptosis, increased labiomental sulcus depth, and inferior displacement of the chin soft-tissue pad. She reports difficulty maintaining lower lip tone at rest, especially when smiling. On examination, lower facial sensation is intact. Which of the following is the most likely cause of her postoperative deformity?", "opts": {"A": "Injury to the inferior alveolar nerve at the mandibular foramen", "B": "Injury to the mental nerve at the mental foramen", "C": "Failure to adequately re-approximate the mentalis muscle during closure", "D": "Hyperactivity of the depressor anguli oris muscle due to surgical irritation", "E": "Soft tissue ischemia due to excessive subperiosteal dissection"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頦部矽膠植入經口內(intraoral)路徑最典型軟組織併發症＝mentalis 肌未妥善對合復位，導致 lip incompetence、chin pad 下垂(witch's chin)與 labiomental sulcus 加深。鑑別關鍵：下臉感覺完整(sensation intact)可排除 mental nerve/inferior alveolar nerve 損傷；本併發症為肌肉未縫合，非神經或缺血。", "peropt": {"A": "✗ Inferior alveolar nerve 於 mandibular foramen 損傷致下唇/牙齒『麻木』，本例 sensation intact 不符。", "B": "✗ Mental nerve 損傷致頦部/下唇『麻木』；本例感覺完整，可排除。", "C": "◎ 關閉時 mentalis 肌未充分重新對合(re-approximation)，導致 lip incompetence、下唇下垂、labiomental sulcus 加深與 chin pad 下移(witch's chin)，符合本例。", "D": "✗ Depressor anguli oris 過度活動主要使『口角』向下，非本例下唇張力喪失合併 chin pad 下垂之型態。", "E": "✗ 過度骨膜下剝離之軟組織缺血會致壞死或植入物外露，而非本例之慢性肌肉功能性變形。"}, "cite": "待複查（G&S 頦部植入 mentalis 記憶佐證）", "conflict": ""}, {"id": "5037", "sub": "AES", "src": "GS", "years": [115], "stem": "A plastic surgeon is performing a trim (edge excision) labiaplasty. During preoperative marking, the surgeon identifies the clitoral frenulum as a key landmark for determining the level of maximum resection. The planned incision is extended posteriorly along the labium minora. Which of the following statements best reflects an important technical principle described for this procedure?", "opts": {"A": "The incision should begin anteriorly at the clitoral hood and converge medially to maximize tissue preservation", "B": "The left and right posterior incisions should be placed less than 5 mm apart to ensure symmetric scar contraction", "C": "The marking begins just caudad to the frenulum's junction with the labia minora and extends in a gentle arc posteriorly", "D": "The labia minora should be placed under tension during excision to ensure complete removal of redundant tissue", "E": "An over-and-over running suture is preferred to minimize operative time and reduce bleeding"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A: Incorrect direction and does not reflect described marking technique.\n\nB: Posterior incisions should be separated (≈ ≥1 cm), not closely approximated.\n\nD: Excess tension risks over-resection and amputation-like deformity.\n\nE: Over-and-over running sutures are discouraged due to risk of scalloped edges from swelling between loops.", "key": "🎯 Trim(edge excision)式 labiaplasty 標記原則：以 clitoral frenulum 為最大切除高度地標，標記自 frenulum 與 labia minora 交會處『稍下方(caudad)』開始，向後以柔和弧線延伸。易錯：左右後方切口應相隔約≥1cm(非<5mm)以免狹窄；切除避免過度張力(防 over-resection/amputation 畸形)；避免 over-and-over 連續縫合(腫脹致 scalloping)。", "peropt": {"A": "✗ 標記方向錯誤：非由 clitoral hood 前方向內聚合，此非文獻所述 trim 標記法。", "B": "✗ 應為左右後方切口相隔約≥1cm(≥10mm)，非<5mm；過近(<5mm)易致癒合狹窄與收縮變形。", "C": "◎ 標記自 frenulum 與 labia minora 交會處『稍下方(caudad)』開始，向後以柔和弧線延伸。", "D": "✗ 切除時不宜過度張力；張力下切除易 over-resection 造成 amputation 樣畸形。", "E": "✗ Over-and-over 連續縫合因組織腫脹易造成 scalloped 鋸齒緣，應避免。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5038", "sub": "AES", "src": "GS", "years": [115], "stem": "一名 32 歲女性接受高解析體雕合併臀部自體脂肪移植（HD gluteal fat grafting）。術中術者計畫在腰臀進行抽脂（liposuction），並於臀部進行分層脂肪注射以增加 C point 與中外側臀部投影。為降低併發症並優化美學結果，需同時考慮臀部分區與危險解剖。下列敘述何者正確？（複選）", "opts": {"A": "green zone 可較積極抽脂，主要目的為強化腰臀曲線", "B": "red zone 可進行與 green zone 同等程度的抽脂，以確保一致輪廓", "C": "central buttock 與 midlateral buttock 為主要脂肪增補區域", "D": "danger triangle 位於 posterior superior iliac spine、greater trochanter 與 ischial tuberosity 之間", "E": "脂肪注射進入 gluteus maximus muscle plane 是安全且建議的層次"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "A 正確，green zone（腰背與上臀）為 high-definition liposuction 區域，用於雕塑 waist-to-hip transition。\n\nB 錯誤，red zone 是 transition zone（過渡區），需保守抽脂以避免邊界凹凸不平。\n\nC 正確，central & midlateral buttock 是主要 augmentation 區域，用於建立 projection 與 S-curve。\n\nD 正確，danger triangle 由posterior superior iliac spine、greater trochanter、ischial tuberosity所構成，是 gluteal fat grafting 最重要的安全邊界。\n\nE 錯誤，intramuscular injection 不建議且高風險，與 fat embolism、sciatic nerve injury 等相關。", "key": "🎯 高解析臀部脂肪移植安全要點(複選正解 ACD)：green zone(腰背/上臀)可積極抽脂雕塑 waist-to-hip;central 與 midlateral buttock 為主要脂肪增補區建立 projection 與 S-curve;danger triangle 由 PSIS、greater trochanter、ischial tuberosity 構成。禁忌：red zone 須保守抽脂;脂肪絕不可注入 gluteus maximus 肌肉層(致命 fat embolism)，僅注皮下層。", "peropt": {"A": "◎ 複選正解) green zone(腰背/上臀)為高解析積極抽脂區，用於強化 waist-to-hip 曲線。", "B": "✗ red zone 為過渡區須『保守』抽脂，不可與 green zone 同等積極，否則邊界凹凸不平。", "C": "◎ 複選正解) central 與 midlateral buttock 為主要脂肪增補區，建立 projection 與 S-curve。", "D": "◎ 複選正解) danger triangle 由 PSIS、greater trochanter、ischial tuberosity 三點構成，為避免脂肪栓塞之安全邊界。", "E": "✗ 脂肪絕不可注入 gluteus maximus 肌肉層(intramuscular)，與致命 fat embolism、坐骨神經傷害高度相關；應僅注於皮下(subcutaneous)層。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5039", "sub": "AES", "src": "GS", "years": [115], "stem": "A 30-year-old healthy, active woman presents to your plastic surgery clinic to discuss body contouring for stubborn fat deposits. On examination, she has a moderate amount of localized adiposity in her central abdomen and bilateral flanks. Crucially, her skin tone is noted to be excellent with no laxity, and her BMI is 26. You estimate the total volume of fat removal to be approximately 400 mL. To maximize safety and minimize blood loss, which of the following wetting techniques is most appropriate for this specific patient?", "opts": {"A": "Dry technique, because the expected aspirate is only 400 mL and avoiding any fluids will prevent epinephrine-induced tachycardia", "B": "Wet technique, because infiltrating exactly 200 mL per area is the historic gold standard for small volume liposuction.", "C": "Superwet technique, involving a 1:1 ratio of infiltrate volume to the expected lipoaspirate volume, which optimizes hemostasis without fluid overload risk.", "D": "Tumescent technique, infiltrating fluids until extreme skin turgor is achieved, requiring approximately 3 L of fluid to maximize local anesthesia.", "E": "Ultrasound-assisted liposuction without wetting solution, because the thermal energy liquefies fat and provides sufficient coagulation, making epinephrine-containing infiltration unnecessary in small-volume cases."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂 wetting technique 選擇：此為健康、皮膚彈性佳、預估抽出約400mL 之小量抽脂。Superwet(灌注:抽出≈1:1，失血約1%)在止血與避免 fluid overload 間最平衡，為現代主流。對照：dry 失血 20–45%已淘汰;wet 失血約4–30%;tumescent 灌注量2–3倍(可達3L)多用於局麻大量或清醒抽脂。", "peropt": {"A": "✗ Dry technique 失血量高達抽出量之 20–45%已被淘汰；且『避免任何輸液可防 epinephrine 心搏過速』論述錯誤(epinephrine 來自腫脹液)。", "B": "✗ 固定灌注 200mL/區非 small volume 的 gold standard；wet technique 失血約 4–30% 仍偏高。", "C": "◎ Superwet 以灌注量:抽出量≈1:1，兼顧 hemostasis(失血約 1%)又避免 fluid overload，最適此健康小量(400mL)個案。", "D": "✗ Tumescent 灌注量約為抽出量之 2–3 倍(可達 3L)，多用於清醒/局麻大量抽脂，此健康小量個案不需灌注至極度 turgor。", "E": "✗ UAL 仍需含 epinephrine 之腫脹液止血，宣稱可省略 wetting solution 錯誤。"}, "cite": "待複查（Grabb & Smith 抽脂wetting technique 記憶佐證）", "conflict": ""}, {"id": "5040", "sub": "AES", "src": "GS", "years": [115], "stem": "A 43-year-old woman lost 150 lb through diet and exercise. She had excess skin in her upper arms and underwent a brachioplasty procedure. The patient has persistent numbness in the volar ulnar surface of the forearm. Which nerve was most likely injured during the procedure:", "opts": {"A": "Intercostobrachial", "B": "Lateral antebrachial cutaneous", "C": "MABC", "D": "Medial brachial cutaneous", "E": "none of the above"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty 神經損傷：術後前臂『掌側尺側(volar ulnar)』麻木，責任神經為 MABC(medial antebrachial cutaneous nerve)，為 brachioplasty 最常受傷感覺神經。鑑別：intercostobrachial 管腋窩/上臂內側;lateral antebrachial cutaneous 管前臂橈側;medial brachial cutaneous 管上臂內側(非前臂)。", "peropt": {"A": "✗ Intercostobrachial nerve 支配腋窩與上臂『內側』，非前臂。", "B": "✗ Lateral antebrachial cutaneous nerve 支配前臂『橈側(掌側橈側)』，非尺側。", "C": "◎ MABC(medial antebrachial cutaneous nerve)支配前臂『掌側尺側』，為 brachioplasty 最常受傷之感覺神經。", "D": "✗ Medial brachial cutaneous nerve 支配『上臂』內側，非前臂。", "E": "✗ 已有明確責任神經(MABC)，故非以上皆非。"}, "cite": "待複查（Grabb & Smith brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5041", "sub": "AES", "src": "GS", "years": [115], "stem": "Thighplasty should be avoided in patients with predisposing risk factors, these risk factors include:", "opts": {"A": "History of deep vein thrombosis", "B": "Varicosities", "C": "Enlarged lower extremities, including the feet and toes", "D": "A+B", "E": "A+B+C"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Thighplasty 之禁忌/危險因子：DVT 病史與靜脈曲張(varicosities)因下肢靜脈回流受損、術後 DVT 與傷口癒合風險高，應避免或審慎；正解 A+B。下肢(含足趾)腫大雖提示 lymphedema 需留意，非本題核心 predisposing 組合，故不納入 C。", "peropt": {"A": "✓ (正解組成) DVT 病史者下肢靜脈回流受損，術後 DVT 復發風險高，為 thighplasty 危險因子。", "B": "✓ (正解組成) Varicosities(靜脈曲張)反映靜脈功能不良，為危險因子。", "C": "✗ 下肢含足趾腫大提示既存 lymphedema，臨床須留意，但非本題所列核心 predisposing 危險因子組合。", "D": "◎ A+B(DVT 病史+靜脈曲張)為本題正確組合。", "E": "✗ A+B+C 多納入 C，超出本題所列危險因子範疇。"}, "cite": "待複查（Grabb & Smith 大腿整形/thighplasty 記憶佐證）", "conflict": ""}, {"id": "5042", "sub": "AES", "src": "GS", "years": [115], "stem": "Complications of thighplasty include which of the followings?", "opts": {"A": "Wound dehiscence", "B": "Seroma formation", "C": "Lymphedema", "D": "Recurrence of skin laxity", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Thighplasty 併發症廣泛須全背：傷口裂開(切口張力大、鄰近會陰污染)、seroma、下肢淋巴水腫(傷及內側淋巴管)、皮膚鬆弛復發(尤僅內側縫合未固定於 Colles' fascia 時)。正解為以上皆是。", "peropt": {"A": "✓ 傷口裂開(wound dehiscence)常見，因切口張力大且鄰近會陰易污染。", "B": "✓ Seroma 常見，尤其伴隨抽脂或廣泛剝離時。", "C": "✓ 淋巴水腫(lymphedema)因傷及大腿內側淋巴管而發生。", "D": "✓ 皮膚鬆弛復發常見，尤其未固定於 Colles' fascia 者。", "E": "◎ A–D 皆為 thighplasty 併發症，故選以上皆是。"}, "cite": "待複查（G&S/Neligan thighplasty 併發症 記憶佐證）", "conflict": ""}, {"id": "5043", "sub": "AES", "src": "GS", "years": [115], "stem": "A 30-year-old woman who has lost 110 lb after gastric bypass presents for evaluation. She is interested in addressing the excess skin of her upper arms, as this causes her significant distress and difficulty with clothing fit. When counseling the patient about the risks of surgery, which of the following is most likely to lead to dissatisfaction with results and reoperation?", "opts": {"A": "Wound dehiscence", "B": "Hypertrophic scar", "C": "Seroma", "D": "Numbness", "E": "Contour irregularities"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty 最令病人不滿並致再手術之併發症為『不良疤痕(尤其 hypertrophic/widened scar)』——手臂內側切口長、張力大、外露，疤痕顯眼且難處理，為滿意度與 reoperation 主要驅動。seroma、numbness(MABC)、傷口裂開雖常見但多可保守處理。", "peropt": {"A": "✗ 傷口裂開多可換藥/延遲癒合處理，非導致不滿與再手術之主因。", "B": "◎ 肥厚/增寬性疤痕(hypertrophic/widened scar)最外露且難處理，為 brachioplasty 不滿與 reoperation 首要原因。", "C": "✗ Seroma 常見但可抽吸/引流處理，非主要不滿因子。", "D": "✗ Numbness(常為 MABC 損傷)多隨時間改善，非再手術主因。", "E": "✗ 輪廓不規則相對少見，非導致再手術之最主要因素。"}, "cite": "待複查（Grabb & Smith 手臂整形併發症 記憶佐證）", "conflict": ""}, {"id": "5044", "sub": "AES", "src": "GS", "years": [115], "stem": "施行 lower body lift，評估腹部情況時包含哪項?(複選)", "opts": {"A": "Excessive skin", "B": "Subcutaneous versus intraabdominal fat distribution", "C": "Pelvic muscle stability", "D": "Hernia", "E": "Existing scars"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Lower body lift 術前『腹部』評估項目(複選正解 ABDE)：多餘皮膚、皮下 vs 腹內脂肪分布、疝氣(MWL 常見 ventral/umbilical hernia)、既有疤痕(影響血流與切口設計)。不屬腹部評估者為 pelvic muscle stability，故 C 不選。", "peropt": {"A": "◎ 複選正解) 多餘皮膚(excessive skin)為腹部評估核心。", "B": "◎ 複選正解) 需評估皮下 vs 腹內脂肪分布，影響效果與安全。", "C": "✗ Pelvic muscle stability(骨盆肌肉穩定度)非 lower body lift『腹部』評估項目。", "D": "◎ 複選正解) 疝氣(hernia)需評估，MWL 族群 ventral/umbilical hernia 常見。", "E": "◎ 複選正解) 既有疤痕影響血供與切口規劃，需評估。"}, "cite": "待複查（Grabb & Smith Lower body lift 記憶佐證）", "conflict": ""}, {"id": "5049", "sub": "AES", "src": "NG", "years": [104, 106, 107, 110, 114, 115], "stem": "關於face lift之temporal incision的敘述,若預期術後lateral orbital rim跟temporal hairline的距離超過幾公分,則需考慮切口放在hairline上?", "opts": {"A": "1公分", "B": "2公分", "C": "3公分", "D": "4公分", "E": "5公分"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮顳部切口設計：若預估術後 lateral orbital rim 到 temporal hairline 距離>約5cm，向上牽引會過度上移顳部髮際線，此時應把切口設在髮際線內(intrahairline)而非 pretrichial，以避免髮際線後退變形。閾值＝5cm。", "peropt": {"A": "✗ 1cm 過低，遠未達切換閾值(閾值為預估>5cm)，不至造成明顯髮際線移位。", "B": "✗ 2cm 仍在可接受範圍，未達閾值(>5cm)。", "C": "✗ 3cm 未達需改切口位置之關鍵距離(閾值>5cm)。", "D": "✗ 4cm 接近但仍未達教科書所述閾值(>5cm)。", "E": "◎ 預估 lateral orbital rim 至 temporal hairline 距離>5cm 時，應將切口置於髮際線內(within hairline)，以避免顳部髮際過度上移。"}, "cite": "待複查（Neligan 拉皮顳部切口 記憶佐證）", "conflict": ""}, {"id": "5084", "sub": "AES", "src": "NG", "years": [105, 107, 110, 114, 115], "stem": "何者是face lift最常見的術後併發症？", "opts": {"A": "Alopecia", "B": "Infection", "C": "Hypertrophic scars", "D": "Hematoma", "E": "Skin loss"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 最常見術後併發症為血腫(hematoma，約1–3%)，好發術後早期，與高血壓、男性相關，須及早引流以免壓迫致皮瓣壞死。易混：切口旁 alopecia(張力)、感染(約0.3%)、肥厚性疤痕、皮膚壞死皆屬併發症但發生率均低於血腫。", "peropt": {"A": "✗ Alopecia(切口旁禿頭)由縫合張力引起，發生率低。", "B": "✗ 感染少見，發生率約 0.3%。", "C": "✗ 肥厚性疤痕非最常見併發症。", "D": "◎ Hematoma 為 facelift 最常見併發症(發生率約 1–3%，男性/高血壓者更高)，須及早引流以免壓迫致皮瓣壞死。", "E": "✗ 皮膚壞死好發吸菸者與張力區，發生率仍低於血腫。"}, "cite": "待複查（Neligan facelift 併發症 記憶佐證）", "conflict": ""}, {"id": "5096", "sub": "AES", "src": "NG", "years": [105, 114, 115], "stem": "以下有關Brachioplasty的術後complications ，何者正確? (複選)", "opts": {"A": "血清血腫 (seroma)", "B": "皮膚壞死 (skin necrosis)", "C": "傷口癒合不良 (skin dehiscence)", "D": "傷口感染 (wound infection)", "E": "臂神經叢受損 (brachial plexus injury)"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty 常見併發症以傷口相關為主：seroma、皮膚壞死、傷口裂開(skin dehiscence)、傷口感染(ABCD 皆是)。關鍵鑑別：神經風險為 MABC 損傷致前臂內側感覺異常，非 brachial plexus 損傷，故 E 錯不選。", "peropt": {"A": "◎ 複選正解) Seroma 為 brachioplasty 常見併發症。", "B": "◎ 複選正解) 皮膚壞死可發生，尤其張力大或吸菸者。", "C": "◎ 複選正解) 傷口裂開常見(切口長、活動關節張力)。", "D": "◎ 複選正解) 傷口感染為常見併發症。", "E": "✗ 本手術神經風險為 MABC(medial antebrachial cutaneous nerve)損傷造成前臂內側感覺異常，而非 brachial plexus(臂神經叢)損傷，故不選。"}, "cite": "待複查（Neligan brachioplasty 併發症 記憶佐證）", "conflict": ""}, {"id": "5120", "sub": "AES", "src": "NG", "years": [107, 110, 115], "stem": "關於眼眶外側的顏面神經-顳分支(temporal branch)的 landmarks，下列何者錯誤？", "opts": {"A": "The posterior third of the palpable zygomatic arch", "B": "1.5cm lateral to the tail of the eyebrow", "C": "Parallel and adjacent to the inferior temporal septum", "D": "Immediately superior to the Sentinel vein(medial zygomaticotemporal vein)", "E": "以上皆是"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經顳分支(temporal branch)於眶外側定位：可觸顴弓之『中三分之一(middle third)』而非後三分之一——此為本題錯誤選項。其餘正確標記：眉尾外側1.5cm、沿 inferior temporal septum 平行、位於 sentinel vein 正上方。剝離時緊貼 deep temporal fascia 深面可保護此支。", "peropt": {"A": "◎ ,即錯誤標記) 應為可觸顴弓之『中三分之一(middle third)』，題目寫 posterior third 有誤，故選。", "B": "✗ 眉尾(tail of eyebrow)外側 1.5cm 為正確標記。", "C": "✗ 平行且鄰近 inferior temporal septum 走行，正確。", "D": "✗ 位於 sentinel vein(medial zygomaticotemporal vein)正上方，正確。", "E": "✗ 因 A 為錯誤，故非以上皆是。"}, "cite": "待複查（Neligan 顳分支解剖 記憶佐證）", "conflict": ""}, {"id": "5164", "sub": "AES", "src": "NG", "years": [108, 114, 115], "stem": "下列有關ideal female buttock何者錯誤", "opts": {"A": "full buttocks and narrow waist", "B": "a waist-to-hip ratio of 0.85", "C": "a smooth inward sweep of the lumbosacral area and waist", "D": "minimal infragluteal crease", "E": "no ptosis"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 理想女性臀部(選錯誤)：B 錯——理想 WHR 約 0.7(非 0.85)，0.7 最能傳達年輕、生育力與美感。正確者：飽滿臀部搭配纖細腰身、腰薦區平滑內收曲線、infragluteal crease 最小化、無下垂。", "peropt": {"A": "✗ 敘述正確：飽滿臀部+纖細腰身為理想特徵。", "B": "◎ ,即錯誤敘述) 理想腰臀比(WHR)應約為 0.7，非 0.85；0.7 最能傳達年輕、生育力與吸引力。", "C": "✗ 敘述正確：腰薦區平滑內收曲線為理想特徵。", "D": "✗ 敘述正確：臀下皺褶(infragluteal crease)應最小化。", "E": "✗ 敘述正確：理想臀部應無下垂(no ptosis)。"}, "cite": "待複查（Neligan Ideal buttock 記憶佐證）", "conflict": ""}, {"id": "5165", "sub": "AES", "src": "NG", "years": [108, 110, 114], "stem": "Overweight的定義", "opts": {"A": "BMI (kg/m2) <18.5", "B": "BMI (kg/m2) 18.5–24.9", "C": "BMI (kg/m2) 25.0–29.9", "D": "BMI (kg/m2) 30.0–34.9", "E": "BMI (kg/m2) 40.0–49.9"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 WHO BMI 分級須熟記：<18.5 過輕;18.5–24.9 正常;25.0–29.9 Overweight(過重);30.0–34.9 class I;35–39.9 class II;≥40 class III。Overweight 定義為 BMI 25.0–29.9，答案 C。", "peropt": {"A": "✗ BMI<18.5 為 underweight(過輕)。", "B": "✗ 18.5–24.9 為 normal(正常)。", "C": "◎ 25.0–29.9 為 overweight(過重)。", "D": "✗ 30.0–34.9 為 obesity class I。", "E": "✗ 40.0–49.9 為 obesity class III(≥40，重度)。"}, "cite": "待複查（WHO BMI分級 記憶佐證）", "conflict": ""}, {"id": "5171", "sub": "AES", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於雷射治療的敘述，下列何者正確? (複選)", "opts": {"A": "Fitzpatrick skin type I and II，膚色越淺的人種，接受雷射治療後更容易產生非預期性的hyper-pigmentation。", "B": "飛梭(fractional)雷射相較於傳統磨皮(ablative)雷射，對於表層皮膚的傷害較低，恢復期也較短。", "C": "臉部出現感染或是開放性傷口，依然可以接受雷射治療。", "D": "深層的真皮層色素病變如Nevi of Ota, 最適合用脈衝染料雷射(pulse dye laser)進行治療。", "E": "波長755nm的亞歷山大雷射(Alexandrite laser),可用於去除刺青, 去除毛髮等治療。"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 雷射治療觀念(複選正解 BE)：fractional 雷射對表層傷害較低、恢復期較短;755nm Alexandrite 可除刺青與除毛。A 錯：膚色越『深』(III–VI)越易 hyperpigmentation。C 錯：感染/開放傷口為雷射禁忌。D 錯：Nevus of Ota 最適 Q-switched Nd:YAG(1064nm)，非 PDL(PDL 用於血管病變)。", "peropt": {"A": "✗ 相反：膚色越『深』者(Fitzpatrick III–VI)雷射後越易 hyperpigmentation，非淺膚色(I–II)。", "B": "◎ 複選正解) 飛梭(fractional)雷射僅造成微柱狀傷害、周圍組織完整，對表層傷害較低、恢復期較短。", "C": "✗ 臉部感染或開放性傷口為雷射『禁忌』，不可施打。", "D": "✗ 深層真皮色素病變如 Nevus of Ota 最適用 Q-switched Nd:YAG(1064nm)，而非 pulsed dye laser(PDL 主要用於血管性病變)。", "E": "◎ 複選正解) 755nm Alexandrite laser 可用於除刺青與除毛。"}, "cite": "待複查（Neligan 雷射治療 記憶佐證）", "conflict": ""}, {"id": "5173", "sub": "AES", "src": "NG", "years": [109, 111, 114, 115], "stem": "下列哪些臉部肌肉，其顏面神經支配路徑是由肌肉的表淺層進入？(複選)", "opts": {"A": "Mentalis.", "B": "Masseter.", "C": "Levator labi superioris.", "D": "Levator anguli oris.", "E": "Buccinator."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部表情肌多由『深面』受顏面神經支配;由『淺面』進入者僅三塊深層肌：mentalis、levator anguli oris、buccinator(正解 ADE)。masseter 屬咀嚼肌(三叉神經);levator labii superioris 為淺層肌由深面受支配。⚠此題為選項重排家族，記概念勿背字母。", "peropt": {"A": "◎ 複選正解) Mentalis 為深層肌，由『淺面』受顏面神經支配。", "B": "✗ Masseter 為咀嚼肌，受三叉神經(V3)支配，非顏面神經，不屬此類。", "C": "✗ Levator labii superioris 為淺層表情肌，由『深面』受支配。", "D": "◎ 複選正解) Levator anguli oris 為深層肌，由『淺面』受支配。", "E": "◎ 複選正解) Buccinator 為深層肌，由『淺面』受支配。"}, "cite": "待複查（Neligan 臉部肌肉神經支配層次 記憶佐證）", "conflict": "選項重排家族：與 NG108-B04-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5175", "sub": "AES", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於各種臉部拉皮(facelift)手術方式敘述，下列何者正確？(複選)", "opts": {"A": "Platysma-SMAS plication (PSP)，位於中臉的key suture,可以產生malar auto-augmentation的作用。", "B": "Extended Minimal access cranial suspension (MACS) 較傳統MACS多了malar fat pad的拉提", "C": "Extended SMAS technique, SMAS和skin分開剝離形成dual plane,可以根據需求往不同方向進行拉提", "D": "High SMAS technique, SMAS flap的上緣不可高於zygomatic arch,以免傷害顏面神經", "E": "Subperiosteal facelift,過程中可能傷害infra-orbital nerve及zygomatic branches of the facial nerve."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 各式拉皮術式(複選正解 ABCE)：PSP 為中臉 key suture 可 malar auto-augmentation;Extended MACS 較傳統多 malar fat pad 拉提;Extended SMAS 採 dual plane 可多向量拉提;Subperiosteal 可能傷 infraorbital nerve 與 zygomatic branch。易錯 D：High SMAS 之 SMAS flap 上緣本就設於 zygomatic arch 之『上』，故該限制敘述錯誤。", "peropt": {"A": "◎ 複選正解) PSP 為中臉 key suture，可產生 malar auto-augmentation 作用。", "B": "◎ 複選正解) Extended MACS 較傳統 MACS 多了 malar fat pad 的拉提。", "C": "◎ 複選正解) Extended SMAS 採 dual plane(SMAS 與皮膚分離剝離)，可依需求多方向拉提。", "D": "✗(非答案，錯誤敘述) High SMAS 之 SMAS flap 上緣本可設於 zygomatic arch『之上』(此即 high 之意)，故『不可高於 zygomatic arch』的敘述有誤。", "E": "◎ 複選正解) Subperiosteal facelift 可能傷及 infraorbital nerve 與顏面神經 zygomatic branch。"}, "cite": "待複查（Neligan 拉皮術式 記憶佐證）", "conflict": ""}, {"id": "5178", "sub": "AES", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於Blepharoplasty的敘述，以下何者為非？", "opts": {"A": "最常見的complication為chemosis", "B": "Retrobulbar hemorrhage為嚴重的complication，常以sudden onset severe orbital pain表現", "C": "手術後出現diplopia,可能是血腫或組織水腫造成, 治療上以觀察保守治療為主", "D": "手術後出現asymmetry, ptosis, lagophthalmos, 宜於4週內再進行手術修正,以避免惡化", "E": "手術前已有乾眼症，手術後常會加劇症狀"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Blepharoplasty(選『為非』)：術後 asymmetry/ptosis/lagophthalmos 不宜『4 週內』即再手術;應先觀察約 3–6 個月待水腫/發炎消退，多可改善，過早修正易惡化，故 D 錯。易混：最常見併發症為 chemosis;retrobulbar hemorrhage 以突發劇烈眼窩痛表現為急症。", "peropt": {"A": "✗(正確) 最常見併發症為 chemosis(結膜水腫)。", "B": "✗(正確) Retrobulbar hemorrhage 以突發劇烈眼窩痛表現，為需急救之嚴重併發症。", "C": "✗(正確) 術後複視多為血腫/水腫所致，以保守觀察為主。", "D": "◎ ,錯誤敘述) asymmetry/ptosis/lagophthalmos 不宜『4 週內』急做修正;應先觀察約 3–6 個月待水腫/發炎消退，多可自行改善，過早於發炎組織上修正易惡化。", "E": "✗(正確) 術前已有乾眼症者術後常加劇症狀。"}, "cite": "待複查（Neligan 眼瞼併發症 記憶佐證）", "conflict": ""}, {"id": "5184", "sub": "AES", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "關於密閉式鼻整形術的術後可能的問題何者為非?", "opts": {"A": "中穹頂(middle vault roof)和鼻翼軟骨(alar cartilage)的的切除常造成醫源性氣道阻塞", "B": "偶發的醫源性鼻中膈穿孔經常沒有明顯症狀", "C": "過度切除鼻甲可能造成持續性的鼻炎", "D": "為避免發生鼻中膈崩塌，在取鼻中膈軟骨時至少留下5mm邊緣做支撐", "E": "鼻整形術後紅鼻通常於術後第一年可自行消退"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 密閉式鼻整形術後問題(選『為非』)：取鼻中膈軟骨須保留至少『1cm(≥10mm)』的 L-strut 背側與尾側支撐;5mm 不足，故 D 錯。易混：middle vault/alar cartilage 過度切除→氣道阻塞;過度切除鼻甲→持續性鼻炎/空鼻症;術後紅鼻多於第一年自行消退。", "peropt": {"A": "✗(正確) 中穹頂(middle vault)/鼻翼軟骨過度切除致醫源性氣道阻塞。", "B": "✗(正確) 偶發之醫源性鼻中膈穿孔常無明顯症狀。", "C": "✗(正確) 過度切除鼻甲致持續性鼻炎/空鼻症。", "D": "◎ ,錯誤敘述) 取鼻中膈軟骨時應保留 L-strut『至少 1cm(≥10mm)』背側與尾側支撐;『5mm』不足以防中膈崩塌，故錯。", "E": "✗(正確) 鼻整形術後紅鼻通常於術後第一年自行消退。"}, "cite": "待複查（Neligan 鼻整形併發症 記憶佐證）", "conflict": ""}, {"id": "5189", "sub": "AES", "src": "NG", "years": [109, 111, 113, 114, 115], "stem": "對抽脂病人的術前檢查中, 必須記載什麼內容?", "opts": {"A": "Evaluation of areas of lipodystrophy and contour deformities", "B": "Dimpling and cellulite", "C": "Myofascial support", "D": "Zones of adherence", "E": "All of the above are correct"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂術前評估須完整涵蓋：lipodystrophy 區域與輪廓變形、dimpling & cellulite、myofascial support、zones of adherence(沾黏區抽吸易致輪廓不平)。四者皆須記載，答案 E。臨床意義：術前標記 zones of adherence 可避免術後 contour irregularity。", "peropt": {"A": "✗ 為必記項目之一(lipodystrophy 區域與輪廓變形)。", "B": "✗ 為必記項目之一(dimpling 與 cellulite)。", "C": "✗ 為必記項目之一(myofascial support)。", "D": "✗ 為必記項目之一(zones of adherence，沾黏區抽吸易致凹陷)。", "E": "◎ 以上四者皆須術前記載，故選以上皆是。"}, "cite": "待複查（Neligan 抽脂術前評估 記憶佐證）", "conflict": ""}, {"id": "5190", "sub": "AES", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "對於大量減重(massive weight loss)病人，那些因子會影響其外觀呈現? (複選)", "opts": {"A": "Body Mass Index (BMI) level", "B": "Fat deposition pattern", "C": "Carnivorism", "D": "Quality of the skin/fat envelope", "E": "Psychologic status"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大量減重(MWL)影響外觀因子(複選正解 ABD)：BMI 水準、脂肪堆積型態、皮膚/脂肪包膜品質。Carnivorism(肉食)非影響因子(C 錯);本題視 psychologic status 非『外觀呈現』直接因子(E 未列)。", "peropt": {"A": "◎ 複選正解) BMI 水準影響大量減重後之外觀呈現。", "B": "◎ 複選正解) 脂肪堆積型態(fat deposition pattern)影響外觀。", "C": "✗ Carnivorism(肉食習慣)非影響外觀因子，屬干擾選項。", "D": "◎ 複選正解) 皮膚/脂肪包膜品質(quality of skin-fat envelope)影響外觀。", "E": "✗ 本題視 psychologic status 為手術規劃考量而非『外觀呈現』之直接因子，故不選。"}, "cite": "待複查（Neligan MWL 記憶佐證）", "conflict": ""}, {"id": "5191", "sub": "AES", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "Body Mass Index (BMI) 超過____，在美容以及雕塑大量減重(massive weight loss)後病人的手術，會有更高的手術相關併發症風險", "opts": {"A": "18.5", "B": "22", "C": "24", "D": "27", "E": "30"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 大量減重(MWL)後美容/體雕手術，BMI>『30』者手術相關併發症(傷口裂開、癒合不良、感染、VTE)風險顯著升高;術前宜先減重至 BMI<30 並穩定體重、優化營養與共病。門檻＝30。", "peropt": {"A": "✗ 18.5 為 underweight 分界，非併發症升高門檻。", "B": "✗ 22 屬正常範圍。", "C": "✗ 24 屬正常上緣。", "D": "✗ 27 屬 overweight 但非本題門檻(門檻為 30)。", "E": "◎ BMI>30(obesity)時手術相關併發症(傷口裂開、癒合不良、感染、VTE)風險顯著升高。"}, "cite": "待複查（Neligan 體雕/MWL BMI 門檻 記憶佐證）", "conflict": ""}, {"id": "5192", "sub": "AES", "src": "NG", "years": [109, 111, 112, 113, 114, 115], "stem": "隆臀之目的為達到更年輕的外觀和輪廓，以及創造一個理想的\"腰臀比例(waist-to-hip ratio)\"為_____", "opts": {"A": "0.5", "B": "0.6", "C": "0.7", "D": "0.8", "E": "0.9"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 隆臀美學目標之一為理想腰臀比(WHR)＝0.7——被視為年輕、女性化且具吸引力之曲線指標;透過腰腹抽脂縮腰＋臀部脂肪增量逼近 0.7。選 C。", "peropt": {"A": "✗ 0.5 過低，非美學目標值。", "B": "✗ 0.6 非公認理想值。", "C": "◎ 理想腰臀比(WHR)＝0.7，象徵年輕、女性化且具吸引力。", "D": "✗ 0.8 偏高，非目標值。", "E": "✗ 0.9 接近男性化體型，非目標。"}, "cite": "待複查（Neligan 隆臀 WHR 記憶佐證）", "conflict": ""}, {"id": "5196", "sub": "AES", "src": "NG", "years": [109, 110, 111, 112, 114, 115], "stem": "以下何者不是Zones of adherence ?", "opts": {"A": "Lateral gluteal depression", "B": "Gluteal crease", "C": "Upper medial thigh", "D": "Distal posterior thigh", "E": "Inferolateral iliotibial tract"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Zones of adherence(選『非』)：黏著區包含 lateral gluteal depression、gluteal crease、distal posterior thigh、inferolateral iliotibial tract、mid-medial thigh 等;本題『Upper medial thigh』非黏著區(應為 mid-medial thigh)，故 C 為答案。臨床：黏著區皮下與深筋膜緊連，抽脂須謹慎避免輪廓不整。", "peropt": {"A": "✗ Lateral gluteal depression 為 zone of adherence。", "B": "✗ Gluteal crease 為 zone of adherence。", "C": "◎ Upper medial thigh 非黏著區;黏著區為『mid-medial thigh(中內側大腿)』。", "D": "✗ Distal posterior thigh 為 zone of adherence。", "E": "✗ Inferolateral iliotibial tract 為 zone of adherence。"}, "cite": "待複查（Neligan 抽脂黏著區 記憶佐證）", "conflict": ""}, {"id": "5204", "sub": "AES", "src": "NG", "years": [110, 114, 115], "stem": "手術改善頸部輪廓時，下列何者不不正確?", "opts": {"A": "從懸韌帶retaining ligaments和間隔septae鬆解皮膚。", "B": "調整改造頷下腺submandibular gland。", "C": "必須加強皮膚的張力以維持效果。", "D": "適當地從淺層皮下subcutaneous和深層頸廓肌下subplatysmal移除脂肪。", "E": "調整改造頸廓肌platysma及二腹肌digastric muscles。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頸部輪廓手術(找『不正確』)：正解 C——現代頸部年輕化依賴深層結構處理(鬆解 retaining ligaments/septae、調整 submandibular gland、platysma 與 digastric、分層去脂)，而非『加強皮膚張力』;靠皮膚張力反致早期復發與疤痕不良，故 C 錯誤。", "peropt": {"A": "✗(正確) 自懸韌帶(retaining ligaments)與間隔(septae)鬆解皮膚為正確步驟。", "B": "✗(正確) 調整 submandibular gland 可改善頸部輪廓。", "C": "◎ ,不正確) 頸部年輕化不應靠『加強皮膚張力』維持;應處理深層結構，靠皮膚張力反致早期復發與疤痕不良，故選。", "D": "✗(正確) 分層(皮下 subcutaneous 與 subplatysmal)去脂為正確處置。", "E": "✗(正確) 調整 platysma 與 digastric muscles 為正確步驟。"}, "cite": "待複查（Neligan 頸部輪廓年輕化 記憶佐證）", "conflict": ""}, {"id": "5212", "sub": "AES", "src": "NG", "years": [110, 114, 115], "stem": "關於brachioplasty，以下何者為最常見的術後併發症?", "opts": {"A": "Skin dehiscence", "B": "Skin necrosis", "C": "Bleeding", "D": "Deep vein thrombosis", "E": "Infection"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 上臂拉皮(brachioplasty)最常見術後併發症為傷口相關問題——傷口裂開(skin dehiscence)與肥厚性疤痕，因切口張力大、位於活動關節附近。skin necrosis、bleeding、DVT、infection 較少見。正解 A。", "peropt": {"A": "◎ 傷口裂開(skin dehiscence)為 brachioplasty 最常見併發症(合併肥厚性疤痕)，因切口張力大且近活動關節。", "B": "✗ Skin necrosis 較不常見。", "C": "✗ Bleeding 非最常見併發症。", "D": "✗ DVT 於上臂手術罕見。", "E": "✗ Infection 發生率低於傷口裂開。"}, "cite": "待複查（Neligan Brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5213", "sub": "AES", "src": "NG", "years": [110, 112, 114, 115], "stem": "在liposuction使用tumescent technique 預估失血量佔抽出總體積的比例是多少?", "opts": {"A": "1%", "B": "10%", "C": "20%", "D": "30%", "E": "40%"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Tumescent technique 因含 epinephrine 腫脹液使失血量僅約佔抽出總體積『1%』，是其安全核心(對照 dry technique 20–45%)。⚠跨年數值誘答置換：110年誘答用 20/30/40%，113年改用 15/20/25%，正解機轉一致皆為約 1%;務必以『1%』為準勿被改動誘答數字誤導。", "peropt": {"A": "◎ Tumescent 因含 epinephrine 腫脹液使失血量僅約佔抽出總體積 1%。", "B": "✗ 10%過高，非 tumescent(此接近 wet technique 範圍)。", "C": "✗ 20%接近 dry technique 之下緣，非 tumescent。", "D": "✗ 30%過高，屬 dry technique 範圍。", "E": "✗ 40%為 dry technique 極端值(20–45%)，非 tumescent。"}, "cite": "待複查（Neligan 抽脂失血量 記憶佐證）", "conflict": "跨年數值差異（Neligan 4e vs Neligan 4e）：C: 110「20%」 vs 113「15%」；D: 110「30%」 vs 113「20%」；E: 110「40%」 vs 113「25%」"}, {"id": "5214", "sub": "AES", "src": "NG", "years": [110, 112, 114, 115], "stem": "下列何者是腹部整形術(abdominoplasty)最常發生的併發症?", "opts": {"A": "Pulmonary embolism", "B": "DVT", "C": "Wound infection", "D": "Hematoma", "E": "Seroma"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Abdominoplasty 最常見併發症為 seroma(血清腫)，因大範圍 undermining 產生死腔與淋巴切斷。預防靠保留 Scarpa's fascia、progressive tension sutures、引流與壓力衣。易混：PE/DVT 最嚴重但非最常見;血腫、傷口感染發生率低於 seroma。", "peropt": {"A": "✗ 肺栓塞(PE)最嚴重但非最常見。", "B": "✗ DVT 非最常見併發症。", "C": "✗ 傷口感染發生率低於 seroma。", "D": "✗ 血腫非最常見。", "E": "◎ Seroma(血清腫)為 abdominoplasty 最常見併發症，因大範圍 undermining 產生死腔與淋巴切斷。"}, "cite": "待複查（Neligan 腹部整形併發症 記憶佐證）", "conflict": ""}, {"id": "5215", "sub": "AES", "src": "NG", "years": [110, 112, 114, 115], "stem": "在執行抽脂手術時，下列何者不是常用的formula?", "opts": {"A": "Klein's formula", "B": "Hunstad's formula", "C": "Fodor's formula", "D": "UT Southwestern formula", "E": "Parkland Formula"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂常用之 wetting/浸潤公式包括 Klein's formula（tumescent 之父）、Hunstad's formula、Fodor's formula、UT Southwestern formula。Parkland formula 為『燒傷』體液復甦公式（4 mL×%TBSA×kg），與抽脂無關，故為『非』抽脂公式。", "peropt": {"A": "✗ Klein's formula 為抽脂常用之 tumescent 浸潤公式（Klein 為 tumescent 之父）；其浸潤液 lidocaine 安全劑量可達 35–55 mg/kg、epinephrine 常用 1:1,000,000。", "B": "✗ Hunstad's formula 為抽脂公式。", "C": "✗ Fodor's formula 為抽脂公式。", "D": "✗ UT Southwestern formula 為抽脂公式。", "E": "◎ Parkland formula 為『燒傷』體液復甦公式（4 mL × %TBSA × kg，前 8 小時給一半），非抽脂公式。"}, "cite": "待複查（Neligan 抽脂浸潤公式 記憶佐證）", "conflict": ""}, {"id": "5216", "sub": "AES", "src": "NG", "years": [110, 114, 115], "stem": "下列關於男女生Fat deposition pattern敘述，何者錯誤?", "opts": {"A": "女性的脂肪大部分儲存在腹膜外", "B": "男性大部分呈現中廣型肥胖", "C": "女性身材傾向呈梨子形", "D": "男性身材傾向呈蘋果型", "E": "男性的脂肪會累積在腹部、臀部、及大腿"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 男女脂肪分布型態（本題找錯誤）：正解 E——「累積於腹部、臀部及大腿」屬「女性（gynoid/梨形）」分布；男性為 android（蘋果型，脂肪集中於腹部/內臟）。故 E 將女性型態誤植於男性。正確者：女性多皮下/腹膜外儲存、梨形；男性中央型（蘋果型）、內臟脂肪為主。 量化：腰臀比(WHR) android(蘋果型)高、男性≥0.9；gynoid(梨形)低、女性≤0.85。", "peropt": {"A": "✗ 女性脂肪多儲於皮下/腹膜外，正確。", "B": "✗ 男性多為中央（中廣）型肥胖，正確。", "C": "✗ 女性傾向梨形（gynoid），正確。", "D": "✗ 男性傾向蘋果型（android），正確。", "E": "◎ ,錯誤敘述) 腹/臀/大腿堆積屬女性 gynoid(梨形)型態；男性為 android(蘋果型)，脂肪集中腹部/內臟(WHR≥0.9)，題目歸於男性有誤，故選。"}, "cite": "待複查（Neligan 脂肪分布型態 記憶佐證）", "conflict": ""}, {"id": "5217", "sub": "AES", "src": "NG", "years": [110, 114, 115], "stem": "抽脂和身體雕塑有非常多種方式，有什麼其他Energy-based devices可以用在body contouring? (複選)", "opts": {"A": "Radiofrequency", "B": "Laser-assisted liposuction", "C": "Ultrasound-assisted liposuction", "D": "Cryolipolysis", "E": "High-intensity focused ultrasound"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Body contouring可用的energy-based devices(複選)皆成立：radiofrequency、laser-assisted liposuction(LAL)、ultrasound-assisted liposuction(UAL)、cryolipolysis、high-intensity focused ultrasound(HIFU)。⚠選項重排家族(與NG108-B06-Q09選項集合相同、字母不同)，記概念勿背字母。", "peropt": {"A": "◎ Radiofrequency為可用之能量式體雕裝置。", "B": "◎ Laser-assisted liposuction(LAL)為能量輔助抽脂。", "C": "◎ Ultrasound-assisted liposuction(UAL)為能量輔助抽脂。", "D": "◎ Cryolipolysis(冷凍溶脂)為非侵入能量式體雕。", "E": "◎ High-intensity focused ultrasound(HIFU)為能量式體雕裝置。"}, "cite": "待複查（Neligan energy-based body contouring 記憶佐證）", "conflict": "選項重排家族：與 NG108-B06-Q09 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5222", "sub": "AES", "src": "NG", "years": [111, 114, 115], "stem": "關於臉部老化的敘述,下列何者正確？", "opts": {"A": "Platysma完全沒有下顎骨(mandible)的附著點, 因此受老化的影響有限。", "B": "老化的過程包含皮膚,皮下組織,肌肉及骨骼的萎縮,但眼眶骨(orbital rim)不受影響。", "C": "Tear trough, zygomatic and mandibular ligament等osteo-cutaneous ligament,在老化的過程會逐漸鬆弛。", "D": "眉毛在老化的過程,因為frontalis muscle的收縮作用,外側眉毛的高度會逐漸上升。", "E": "上顎骨(maxilla)因老化而內縮，會使淚溝(tear trough)及法令紋(nasolabial fold)更不明顯。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部老化（本題找正確）：正解 C——tear trough、zygomatic、mandibular 等 osteocutaneous ligaments 於老化過程逐漸鬆弛，造成溝紋加深與軟組織下垂。錯誤者：platysma 有下頜附著且受老化影響（A 錯）；orbital rim/眶孔會隨老化擴大（B 錯）；老化時外側眉「下降」而非上升（D 錯）；上顎骨後縮會使 tear trough 與 nasolabial fold「更明顯」（E 錯）。", "peropt": {"A": "✗ Platysma 有下頜附著且受老化影響，敘述錯誤故不選。", "B": "✗ 眶緣/眶孔會隨老化擴大，「不受影響」錯誤故不選。", "C": "◎ Tear trough、zygomatic、mandibular 等骨皮韌帶(osteocutaneous ligament)於老化逐漸鬆弛，致溝紋加深、軟組織下垂，正確。", "D": "✗ 老化時外側眉毛下降（非上升），錯誤故不選。", "E": "✗ 上顎後縮使 tear trough/法令紋更明顯（非更不明顯），錯誤故不選。"}, "cite": "待複查（Neligan 臉部老化 記憶佐證）", "conflict": ""}, {"id": "5223", "sub": "AES", "src": "NG", "years": [111, 114, 115], "stem": "臉部拉皮(facelift)手術後,下列何者為傷口旁禿頭(alopecia)最常見的原因？", "opts": {"A": "血腫", "B": "感染", "C": "抽菸", "D": "顏面神經損傷", "E": "傷口過度的張力"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮術後傷口旁禿頭(alopecia)最常見原因為『傷口過度張力(excessive wound tension)』——張力壓迫毛囊血供致缺血性毛囊壞死。易混淆點：血腫、感染、抽菸、神經損傷雖各有影響，但切口旁禿頭的最主要機轉是張力性毛囊損傷。", "peropt": {"A": "✗ 血腫可致皮瓣問題，但非切口旁禿頭最常見原因。", "B": "✗ 感染可能損及毛囊，但非最主要原因。", "C": "✗ 抽菸影響血供，屬風險因子但非直接最常見原因。", "D": "✗ 顏面神經損傷造成運動障礙，與局部禿頭無直接關係。", "E": "◎ 傷口過度張力(excessive wound tension)壓迫毛囊血供致缺血性毛囊壞死，是切口旁禿頭最常見原因。"}, "cite": "待複查（Neligan 拉皮併發症 記憶佐證）", "conflict": ""}, {"id": "5224", "sub": "AES", "src": "NG", "years": [111, 114, 115], "stem": "下列何者不是亞洲人常見的眼瞼特色？", "opts": {"A": "High crease, deep-set upper eyelid", "B": "Puffy crease-less upper eyelid", "C": "Epicanthal fold", "D": "Upward lateral canthal tilting", "E": "Wide intercanthal distance"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人眼瞼特色（選『非』典型者）：A『高皺褶、深陷型上眼瞼（high crease, deep-set）』是高加索人特徵，非亞洲人常見。亞洲人常見：puffy crease-less上眼瞼（皺褶淺或無、脂肪厚）、epicanthal fold（內眥贅皮）、upward lateral canthal tilt（外眥上斜）、wide intercanthal distance（內眥間距寬）。", "peropt": {"A": "◎ ，即非亞洲特徵) 高皺褶、深陷上眼瞼(high crease, deep-set)為高加索人特徵；亞洲人上瞼皮下脂肪厚、眶隔位置低，皺褶淺或無。", "B": "✗ Puffy crease-less上眼瞼為亞洲人常見特徵。", "C": "✗ Epicanthal fold為亞洲人常見特徵。", "D": "✗ Upward lateral canthal tilt為亞洲人常見特徵。", "E": "✗ Wide intercanthal distance為亞洲人常見特徵。"}, "cite": "待複查（Neligan 亞洲人眼瞼 記憶佐證）", "conflict": ""}, {"id": "5225", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於fat grafting下列何者正確?(複選)", "opts": {"A": "理想的離心力約為3000 g。", "B": "離心後用於移植的脂肪位於離心管最下層。", "C": "脂肪移植可改善皮膚皺紋並填補缺損。", "D": "為避免血管內注射宜使用blunt canula注射。", "E": "血腫是脂肪移植最常見的併發症。"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Fat grafting正確觀念（複選正確為CD）：脂肪移植可改善皺紋並填補缺損（C對）；為避免血管內注射應使用blunt cannula（D對）。A錯：理想離心力約1200–1286g（≈3000rpm）而非3000g。B錯：離心後可用脂肪位於『中層』，最下層為血水/組織液、最上層為油脂。E錯：脂肪移植最常見併發症為脂肪壞死/油囊，而非血腫。⚠ 跨年誘答事實置換（對照NG108-B05-Q08）：概念相同但測到的具體事實（離心值、分層、併發症）被替換，須逐項辨真偽。", "peropt": {"A": "✗ 理想離心力約 1200–1286 g(≈3000 rpm×3 min，Coleman 法)，非 3000 g(3000 g 遠超此值會破壞脂肪細胞)。", "B": "✗ 離心後可用脂肪位於離心管『中層』；最下層為血水/組織液、最上層為破裂油脂與麻藥，非最下層。", "C": "◎ 脂肪移植可改善皺紋並填補缺損。", "D": "◎ 用blunt cannula注射以避免血管內注射。", "E": "✗ 最常見併發症為脂肪壞死/油囊，非血腫。"}, "cite": "待複查（Neligan 脂肪移植 記憶佐證）", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG108-B05-Q08）"}, {"id": "5226", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於脂肪移植下列何者錯誤?", "opts": {"A": "移植大顆粒的脂肪(large globule of fat) 易造成central necrosis，進而導致脂肪吸收、volume減少或者cyst 的形成。", "B": "若想改善皮膚質地(skin quality)、減少皺紋(decreasing wrinkles)、或者撫平疤痕(reducing scar)最好是將fat graft 植入在骨膜上方(just above periosteum) 。", "C": "將fat植入較淺層處，易導致表面不規則(irregularity) 。", "D": "Molding可能導致fat移位或壞死(necrosis) 。", "E": "對於皮膚鬆弛的高齡病患，單純fat grafting 的效果有限，可先考慮facelift之後再依需求補充fat volume。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 脂肪移植（選『錯誤』者）：欲改善皮膚質地/減少皺紋/撫平疤痕，應將脂肪（nanofat/SVF）植入『較淺層（真皮/皮下淺層）』，而非骨膜上方深層；深層植入（just above periosteum）用於結構性 volume，故 B 錯。易混淆：大顆粒脂肪→central necrosis→吸收/囊腫；過淺植入→表面不規則。", "peropt": {"A": "✗（正確）大顆粒脂肪易 central necrosis 致吸收/囊腫。", "B": "◎ ，錯誤敘述）改善膚質/皺紋/疤痕應把脂肪(nanofat/SVF)植於『淺層(真皮/皮下淺層)』；just above periosteum 之深層植入用於結構性 volume，方向錯誤故選。", "C": "✗（正確）過淺植入致表面不規則。", "D": "✗（正確）molding 可致脂肪移位或壞死。", "E": "✗（正確）高齡鬆弛者宜先 facelift 再補脂肪。"}, "cite": "待複查（Neligan 脂肪移植 記憶佐證）", "conflict": ""}, {"id": "5228", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻部的解剖構造下列何者正確? (複選)", "opts": {"A": "Facial artery會分出superior labial artery，往上分出philtral artery；再向上行走後形成columella artery。", "B": "Infraorbital nerve提供鼻翼基底(alar base),上唇(upper lip),和鼻外側壁(lateral nasal wall)的感覺支配。", "C": "Keystone area為nasal bone和upper lateral cartilage重疊處，約4-5mm，正常情況下為鼻背最寬的地方。", "D": "Upper lateral cartilage lies superifical to both the nasal bone and lower lateral cartilage。", "E": "在前鼻中膈血管密集的區域叫做Kiesselbach's area。"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖（本題找正確，複選）：facial artery→superior labial→往上分 philtral、再形成 columella artery（A 對）；infraorbital nerve 支配鼻翼基底、上唇、鼻外側壁感覺（B 對）；keystone area 為鼻骨與 ULC 重疊約 4–5 mm、通常為鼻背最寬處（C 對）；前鼻中膈血管密集區為 Kiesselbach's/Little's area（E 對）。錯誤者 D——ULC 位於鼻骨「深面（deep）」且與 LLC 於 scroll 區重疊，非「superficial to both」（D 錯）。", "peropt": {"A": "◎ Facial→superior labial→philtral→columella artery 之走向，正確。", "B": "◎ Infraorbital nerve 支配鼻翼基底/上唇/鼻外側壁感覺，正確。", "C": "◎ Keystone area 為鼻骨-ULC 重疊 4–5mm、鼻背最寬處，正確。", "D": "✗ Upper lateral cartilage(ULC)位於鼻骨『深面(deep)』，尾端與 lower lateral cartilage 於 scroll region 重疊；『superficial to both』方向錯誤故不選。", "E": "◎ 前鼻中膈血管密集區為 Kiesselbach's area，正確。"}, "cite": "待複查（Neligan 鼻部解剖 記憶佐證）", "conflict": ""}, {"id": "5229", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻部相關測量指標下列何者錯誤?", "opts": {"A": "Nasolabial angle 是鼻孔前後的連線(line between anterior and posterior ends of the nostril)與臉部垂直平面(vertical facial plane)所構成，女性通常為95-100∘，男性為90-95∘", "B": "Columellar-lobular angle 為columellar和lobular交角，在女性理想角度為30-45∘", "C": "鼻尖突度(Tip projection)的定義為alar base 到nasal tip的距離，由上唇最高點作一垂直線，若若鼻尖>60%在此線之前，可視為overprojection", "D": "評估鼻尖突度(Tip projection)另一方法為評估鼻部和面部的比例，若tip projection(alar base to nasal tip)與鼻子長度(radix to tip-defining points)的比率小於0.67，可視inadequate tip projection", "E": "Nasofrontal angle的位置比正常的位置更靠後或靠下(more posterior and inferior)，鼻子會看起來較長，但鼻尖突度會降低"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部測量指標(選錯誤)。正解E為誤述：Nasofrontal angle位置若更後/更下(radix較深較低)，鼻子會顯得『較短』且相對鼻尖突度『增加』，故『看起來較長、突度降低』的敘述方向相反。正確敘述：nasolabial angle女95-100/男90-95;columellar-lobular angle女理想30-45;tip projection定義與>60%過突;比率<0.67為突度不足。 補充：nasofrontal angle 正常約 115–130°。", "peropt": {"A": "✗ 正確：nasolabial angle女性約95-100度、男性約90-95度。", "B": "✗ 正確：columellar-lobular angle女性理想約30-45度。", "C": "✗ 正確：tip projection(alar base至tip)，>60%在上唇垂直線之前為overprojection。", "D": "✗ 正確：tip projection與鼻長比率<0.67視為突度不足。", "E": "◎ 錯誤：Nasofrontal angle 位置更後/更下(radix 較深較低)時鼻子反顯『較短』且相對鼻尖突度『增加』，與敘述(較長、突度降低)方向相反。正常 nasofrontal angle 約 115–130°。"}, "cite": "待複查（Neligan 鼻部測量 記憶佐證）", "conflict": ""}, {"id": "5230", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於開放式鼻整形(open rhinoplasty)下列何者錯誤?", "opts": {"A": "開放式鼻整形術鼻部水腫的時間較長。", "B": "在執行dorsal hump reduction時，移除過多的upper lateral cartilage 可能導致 inverted -V deformity", "C": "鼻中膈重建(septal reconstruction)和下鼻甲整形(inferior turbinoplasty)或黏膜下切除(submucosal resection)不能和開放式鼻整形同期實施。", "D": "鼻尖縫合技術(Nasal tip suturing)可以在不傷到骨骼軟骨框架破壞鼻部支撐的狀況下改善鼻尖的外觀。", "E": "在鼻中膈彎曲面(internal deviation)的另一側通常會有下鼻甲肥大(inferior turbinate hypertrophy)的情形。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形（選錯誤者）：C錯誤——鼻中膈重建、inferior turbinoplasty或submucosal resection『可以』與開放式鼻整形同期實施。正確者：A開放式術後鼻部水腫時間較長；B去除過多ULC可致inverted-V deformity；D nasal tip suturing可在不破壞骨軟骨支撐下改善鼻尖；E中膈內偏側之對側常見代償性inferior turbinate hypertrophy。", "peropt": {"A": "✗ 敘述正確：開放式鼻整形術後鼻部水腫時間較長。", "B": "✗ 敘述正確：dorsal hump reduction移除過多ULC可致inverted-V deformity。", "C": "◎ ，即錯誤敘述) 鼻中膈重建、inferior turbinoplasty 或黏膜下切除(submucosal resection)『可』與開放式鼻整形同期進行，敘述之『不能』有誤。", "D": "✗ 敘述正確：nasal tip suturing可在不破壞支撐下改善鼻尖。", "E": "✗ 敘述正確：中膈內偏對側常見代償性下鼻甲肥大。"}, "cite": "待複查（Neligan Open rhinoplasty 記憶佐證）", "conflict": ""}, {"id": "5231", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻偏移(nose deviation)和呼吸道障礙(airway issue),下列何者正確?(複選)", "opts": {"A": "三對鼻子外在肌(extrinsic group of perinasal musculature) 中，leviator labii superioirs alaeque nasi為最重要的dilator。", "B": "當懷疑鼻閥功能不全時，可以做Cottle test，當將臉頰向外牽拉時，呼吸狀態有改善，則視為positive。", "C": "Internal nasal valve 是鼻腔呼吸道裡最窄的部分，由nasal septum和upper lateral cartilage 形成的夾角正常約為10-15∘。", "D": "External nasal valve 事由lower lateral cartilage 的內側腳(medial crus)、soft tissue alae、membranous septum和 sill of nostril 組成。", "E": "Septal deviation 中最常見的為C-shaped anteriorposterior deviation。"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻偏移與呼吸道（複選正確為ABC）：levator labii superioris alaeque nasi為最重要的外鼻dilator（A對）；Cottle test牽拉臉頰後呼吸改善為positive（B對）；internal nasal valve為最窄處，由septum與upper lateral cartilage構成、正常約10–15°（C對）。D未納入——external nasal valve的組成敘述與本題標準有出入故列為非；E錯——最常見的septal deviation型態並非C-shaped anteroposterior deviation。", "peropt": {"A": "◎ levator labii superioris alaeque nasi為最重要外鼻擴張肌。", "B": "◎ Cottle test牽拉臉頰呼吸改善為positive。", "C": "◎ internal nasal valve最窄，septum–ULC夾角約10–15°。", "D": "✗ 依本題標準，此external nasal valve組成敘述被列為非。", "E": "✗ 最常見之 septal deviation 型態並非 C-shaped anteroposterior deviation(依本題標準)；臨床上前段軟骨性偏移與棘突/嵴(spur)常見，故列為非。"}, "cite": "待複查（Neligan 鼻閥與偏移 記憶佐證）（答案疑義，建議人工複查）", "conflict": ""}, {"id": "5232", "sub": "AES", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於禿頭與植髮何者錯誤?", "opts": {"A": "毛髮被移植後通常會立刻進入anagen active growth phase，並持續3-4個月。", "B": "在男女最常見的掉髮同樣是雄性禿(androgenic alopecia)。", "C": "在替年輕病患植髮時通常建議先在額頭區和上區frontal and superior regions做植髮，等到hair pattern成熟後再考慮進行枕部(occipital area)植髮。", "D": "通常穩定的Norwood II型或III型禿髮患者能有良好的植髮結果，因為不需擔心後續的脫髮問題。", "E": "在健康沒有瘢痕的個體植髮可以達到90~95%的成功率。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 禿頭與植髮（選『錯誤』者）：移植毛髮後通常先進入『telogen（休止期，即 shock loss 落髮）』，約 3–4 個月後才進入 anagen 生長；並非移植後立即進入 anagen，故 A 錯。易混淆：男女最常見皆為 androgenic alopecia；健康無疤個體植髮成功率約 90–95%。", "peropt": {"A": "◎ ，錯誤敘述）移植後毛囊先進入 telogen(休止期，即 shock loss 落髮)，約 3–4 個月後才進入 anagen 生長期(正常 anagen 可持續約 2–6 年)，非移植後『立刻』進入 anagen。", "B": "✗（正確）男女最常見皆為雄性禿。", "C": "✗（正確）年輕病患先植前額/上區，待髮型成熟再考慮。", "D": "✗（正確）穩定 Norwood II/III 型植髮結果佳。", "E": "✗（正確）健康無疤個體成功率約 90–95%。"}, "cite": "待複查（Neligan 植髮 記憶佐證）", "conflict": ""}, {"id": "5238", "sub": "AES", "src": "NG", "years": [112, 113, 114], "stem": "The following statements about Asian rhinoplasty are true except?", "opts": {"A": "Division between the upper and lower lateral cartilages allows separation of projection and rotation of the lower unit in rhinoplasty.", "B": "One potential side effect of increasing nasal projection is caudal rotation of the tip.", "C": "The tripod theory was first suggested by Anderson in 1969 and is based on the three legs of the paired lateral crus on pyriform apertures and conjoined medial crus on columella base.", "D": "The \"quadripod\" concept of the nasal tip, with the anterior caudal septum as the fourth leg.", "E": "The dorsal portion of alar cartilages is sutured to the septum to provide stability to nasal tip projection."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人鼻整形（選『true except』即錯誤者）：增加 nasal projection 的潛在副作用是鼻尖『cephalic（向上）rotation』，而非 caudal（向下）rotation；依 tripod theory 拉長內側腳同時增加 projection 與上旋，故 B 錯。易混淆：tripod theory（Anderson 1969）；quadripod concept 以 caudal septum 為第四腳。", "peropt": {"A": "✗（正確）分離上下外側軟骨可分別控制下段的 projection 與 rotation。", "B": "◎ ，錯誤敘述）增加 nasal projection 傾向使鼻尖『cephalic(向上)rotation』；依 tripod theory 拉長 conjoined medial crus 同時增加 projection 與上旋，非 caudal(向下)rotation。", "C": "✗（正確）tripod theory 由 Anderson（1969）提出。", "D": "✗（正確）quadripod concept 以 caudal septum 為第四腳。", "E": "✗（正確）鼻翼軟骨背側縫至中膈以穩定鼻尖 projection。"}, "cite": "待複查（Neligan 亞洲人鼻整形 記憶佐證）", "conflict": ""}, {"id": "5239", "sub": "AES", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which statement is correct about secondary blepharoplasty? (複選)", "opts": {"A": "Lower lid eversion is divided into four subtypes: lid margin eversion (LME) with scleral show; LME with scleral show and horizontal lid laxity; LME with lash rotation; and ectropion.", "B": "Involutional ectropion is caused by horizontal lid laxity of the eyelid supportive structures and usually begins with scleral show.", "C": "Cicatricial ectropion is caused by a deficiency of the skin or skin and muscle of the lid.", "D": "Subperiosteal midface suspension techniques may be required to elevate the malar fat pad to a position that will assist in supporting the lower eyelids.", "E": "Canthal and eyelid laxity, edema, hematoma, excessive resection of skin and fat, or impaired orbicularis oculi muscle function may also contribute to malposition after blepharoplasty."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 二次眼瞼整形（secondary blepharoplasty）之下瞼位置異常概念（本題全對）：A 下瞼外翻分四亞型；B involutional ectropion 因水平鬆弛、常先出現 scleral show；C cicatricial ectropion 為皮膚（±肌肉）不足；D 需 subperiosteal midface suspension 抬升 malar fat pad 以支撐下瞼；E 眥/瞼鬆弛、水腫、血腫、皮膚脂肪過度切除、眼輪匝肌功能受損皆可致 malposition。五者皆正確。", "peropt": {"A": "◎ 下瞼外翻分四亞型，正確。", "B": "◎ Involutional ectropion 因水平鬆弛、常先 scleral show，正確。", "C": "◎ Cicatricial ectropion 因皮膚/肌肉不足，正確。", "D": "◎ Subperiosteal midface suspension 抬升 malar fat pad 支撐下瞼，正確。", "E": "◎ 多重因素（鬆弛/水腫/血腫/過度切除/眼輪匝肌功能）致 malposition，正確。"}, "cite": "待複查（Neligan 二次眼瞼整形 記憶佐證）", "conflict": ""}, {"id": "5240", "sub": "AES", "src": "NG", "years": [112, 113, 114, 115], "stem": "The etiology of aging changes in the periorbital area?
