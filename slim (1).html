A 正確：Type I=一/兩側 maxillary wall 缺損不含 palate；D 正確：Type IIIB=total maxillectomy＋orbital exenteration。錯誤(非正確)：B Type II 不含 orbital floor(選項誤含)、C Type IIIA 應 subtotal 保眼球(選項誤植 total)、E Type IV 保留 palatal wall(選項誤稱含所有 maxillary walls)。⚠與 CN4086(NG114)同題、問法相反(正確 vs 不對)——AD 正確⇔BCE 不對，互為鏡像，作答務必看清該年問『正確』或『不對』。", "peropt": {"A": "◎ Type I＝一／兩側 maxillary wall 缺損、不含 palate。", "B": "✗（非正確）：Type II「不含 orbital floor」，選項誤含。", "C": "✗（非正確）：Type IIIA 應為 subtotal maxillectomy＋orbital floor 但保眼球，選項誤植 total。", "D": "◎ Type IIIB＝total maxillectomy＋orbital exenteration。", "E": "✗（非正確）：Type IV「保留 palatal wall」，選項誤稱含所有 maxillary walls。"}, "cite": "原詳解族(對照 CN4086)：Cordeiro 分類 Type I-IV", "conflict": "與 CN4086(NG114)同題、問法相反(正確 vs 不對)；AD 正確⇔BCE 不對，須錨定該年問法。"}, {"id": "7008", "sub": "LGA", "src": "GS", "years": [115], "stem": "What clinical sign is most indicative of the need for a restorative lymphatic procedure such as lymphovenous anastomosis and vascularized lymph node transfer?", "opts": {"A": "Soft, nonpitting edema of the extremity", "B": "Skin discoloration", "C": "Pitting edema of the extremity", "D": "Hyperkeratosis of the skin", "E": "Tenderness"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：淋巴水腫restorative(重建/生理性)手術之臨床適應徵象 — 何時做LVA或VLNT。\n\n**關鍵判準：pitting edema (可凹陷性水腫)：**\n- **Pitting edema代表病程仍以「液體滯留(fluid-predominant)」為主、淋巴管仍具功能** → 此時進行**lymphovenous anastomosis (LVA)** 或 **vascularized lymph node transfer (VLNT)** 等restorative手術效果最佳。\n- 相對地，**non-pitting、纖維化、脂肪堆積、hyperkeratosis(晚期)** 者，淋巴通道已破壞，restorative手術效益低，應改採**debulking/excisional(如liposuction、Charles)**。\n\n**現代分流原則：** 早期fluid-dominant(pitting) → 生理性手術；晚期solid-dominant(fibrofatty) → 切除性手術。", "peropt": {"A": "✗ Soft nonpitting edema 偏早期輕微或已纖維化，非 restorative 手術最強適應徵象。", "B": "✗ Skin discoloration 非決定手術類型之核心指標。", "C": "◎ Pitting edema 代表 fluid-predominant、淋巴管仍具功能，為 LVA／VLNT 之最佳適應徵象。", "D": "✗ Hyperkeratosis 屬晚期 solid／fibrofatty 表現，反傾向 debulking／excisional（liposuction、Charles）。", "E": "✗ Tenderness 非分流 restorative 手術之指標。"}, "cite": "Neligan 5e Lymphedema surgery；LVA/VLNT適應症", "conflict": ""}, {"id": "7009", "sub": "LGA", "src": "GS", "years": [115], "stem": "依據 Godina 的經典研究與後續文獻共識，下肢開放性骨折合併軟組織缺損，進行游離皮瓣覆蓋的最佳時間窗（自受傷起）為何？", "opts": {"A": "傷後 24 小時內（急性期立即覆蓋）", "B": "傷後 72 小時內", "C": "傷後 7 至 10 天內", "D": "傷後 3 至 4 週待傷口肉芽化後", "E": "傷後 6 週以上，待骨折固定穩定後"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：Godina經典研究 — 下肢開放性骨折合併軟組織缺損之游離皮瓣覆蓋時機。\n\n**Godina (1986) 原始結論：**\n- 主張**傷後72小時內(early, <72hr)** 進行游離皮瓣覆蓋，其**皮瓣失敗率、感染率、骨癒合時間、住院天數**均最佳。\n- **72小時 ~ 3個月**為最差的「亞急性期」，感染與失敗率最高。\n\n**然而本題權威答案為C (7-10天)：** 反映**後續文獻共識(post-Godina modern refinement)**。現代因清創(serial debridement)、negative pressure wound therapy (NPWT)、抗生素進步，「fix-and-flap」的安全時間窗被延展，多數共識認為**傷後約7-10天內完成軟組織覆蓋**仍可獲得良好結果，兼顧充分清創與早期覆蓋。故依題目「後續文獻共識」語境選C。\n\n**核心觀念：** 越早覆蓋越好，但現代NPWT下7-10天內仍屬可接受之最佳窗。\n\n⚠答案疑義：Godina「原始」數據支持的是<72小時(選項B)；C(7-10天)係採納後續現代共識之延展窗，題幹已明示「與後續文獻共識」故以C為準，惟若題意純問Godina原研究則為72小時。", "peropt": {"A": "✗ 傷後24小時內雖屬早期，但過度強調立即而未必允許充分清創(serial debridement)；本題共識最佳窗應為傷後7-10天內(非24小時)。", "B": "72小時內為Godina原始最佳窗，若純問原研究此為答案；但本題採現代共識故不選。", "C": "◎ 後續文獻共識(NPWT時代)，傷後7-10天內完成游離皮瓣覆蓋兼顧清創與早期覆蓋，為本題正解。", "D": "✗ 3-4週待肉芽化屬Godina所指最差之亞急性期(約72hr~3個月)，感染與皮瓣失敗率最高；正確窗應為傷後7-10天內(非3-4週)。", "E": "✗ 6週以上延遲覆蓋顯著增加感染與骨不癒合(nonunion)率；正確窗為傷後7-10天內(非≥6週)。"}, "cite": "Godina M, Plast Reconstr Surg 1986；Neligan 5e Lower Extremity Reconstruction現代共識", "conflict": ""}, {"id": "7010", "sub": "LGA", "src": "GS", "years": [115], "stem": "根據International Society of Lymphology (ISL) lymphedema staging system，下列何者對各期描述最正確？", "opts": {"A": "Stage 0：有明顯肢體腫脹，但抬高肢體後可完全消退", "B": "Stage 1：自發性不可逆水腫，抬高肢體無法改善腫脹", "C": "Stage 2：臨床實務中最常見，抬高肢體無法改善腫脹，且有pitting edema", "D": "Stage 3：以pitting edema為主要表現，尚無皮膚角化變化", "E": "Stage 1：有elephantiasis表現，伴隨嚴重纖維化"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：International Society of Lymphology (ISL) 三期(0–III)淋巴水腫分期之精確定義。\n\n**ISL標準分期：**\n- **Stage 0 (latent/subclinical)：** 淋巴輸送已受損但**尚無臨床可見腫脹**，可持續數月至數年。\n- **Stage 1：** 早期，蛋白質豐富液體堆積，**抬高肢體可(部分)消退**，可能有pitting，尚無或極輕纖維化。\n- **Stage 2：** **抬高肢體無法消退**，出現明顯**pitting edema**；晚期(late stage 2)纖維化增加、pitting漸減。**臨床實務中最常見的就診分期。**\n- **Stage 3 (lymphostatic elephantiasis)：** pitting消失，皮膚出現**纖維化、hyperkeratosis、acanthosis、脂肪堆積、疣狀增生**，即elephantiasis。\n\n**為何選(C)：** Stage 2 = 抬高無法改善 + pitting edema + 臨床最常見，敘述完全正確。", "peropt": {"A": "Stage 0為subclinical、無明顯腫脹，選項稱有明顯腫脹且抬高全消，錯誤。", "B": "Stage 1抬高肢體可(部分)改善，選項稱不可逆且抬高無法改善，錯誤(混淆為stage 2)。", "C": "◎ Stage 2：抬高無法改善、有pitting edema、臨床最常見，敘述正確，為正解。", "D": "Stage 3已有皮膚角化與纖維化(elephantiasis)且pitting消失，選項稱無角化變化，錯誤。", "E": "Elephantiasis與嚴重纖維化屬Stage 3，非Stage 1，錯誤。"}, "cite": "ISL Consensus Document 2020；Neligan 5e Lymphedema staging", "conflict": ""}, {"id": "7045", "sub": "LGA", "src": "NG", "years": [110, 112, 113, 115], "stem": "A 55-year-old woman is suspected to have developed lymphedema of the right upper extremity 7 months after lymph node dissection for breast cancer treatment. She complained of right upper limb swelling, which improved by elevation At out OPD, pitting edema was noted. According to the International Society of Lymphology staging system, which stage of lymphedema the patient should be diagnosed?", "opts": {"A": "Stage 0", "B": "Stage 1", "C": "Stage 2", "D": "Stage 3", "E": "Stage 4"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯International Society of Lymphology (ISL) 淋巴水腫分期\n- **本例特徵**：乳癌腋下淋巴結廓清後7個月出現右上肢腫脹，『抬高可改善』且為pitting edema。\n- **ISL分期對照**：\n  - Stage 0(latent/subclinical)：淋巴輸送已受損但『無』臨床可見腫脹。\n  - **Stage 1**：早期，蛋白質豐富的組織液堆積，『抬高患肢可消退』，仍為pitting edema→符合本例。\n  - Stage 2：抬高『無法』完全消退，由pitting漸轉non-pitting(組織纖維化)。\n  - Stage 3：lymphostatic elephantiasis，non-pitting、皮膚變厚與疣狀增生。\n- **注意**：ISL僅分Stage 0–3，並無Stage 4。", "peropt": {"A": "錯—Stage 0為無臨床腫脹的潛伏期。", "B": "◎ 本題答案）—抬高可消退且為pitting edema，符合Stage 1。", "C": "錯—Stage 2抬高無法完全消退並漸纖維化。", "D": "錯—Stage 3為象皮病、non-pitting。", "E": "錯—ISL分期無Stage 4。"}, "cite": "International Society of Lymphology Consensus; Neligan Plastic Surgery 5e — Lymphedema staging", "conflict": "⚠ 同題歷屆重出／中英雙語同考點（L4）：乳癌腋下淋巴廓清術後上肢腫脹、pitting edema、抬高患肢可改善→依ISL分期為Stage 1。7045為英文病例(110/112/113年)、7072為中文病例(115年)，臨床情境與正解完全一致，僅語言不同(token相似度抓不到跨語言)。各年答案皆=B。判定合併。（註：7062非本題——其為抬高無法改善+non-pitting edema→Stage 2，屬不同情境，保持分開。）"}, {"id": "7050", "sub": "LGA", "src": "NG", "years": [109, 111, 114], "stem": "Which of the following is not the common risk factor for lymphedema?", "opts": {"A": "Radiation.", "B": "Malignancy.", "C": "Infection.", "D": "Genetic factors.", "E": "Obesity."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯淋巴水腫的常見危險因子(與7038同概念，選項順序不同)\n- **常見危險因子**：Radiation(放療)、Infection(感染)、Genetic factors(遺傳)、Obesity(肥胖)。\n- **Malignancy**：惡性腫瘤本身非教科書列舉之常見獨立危險因子（雖可經淋巴結廓清、放療或腫瘤阻塞間接致次發性淋巴水腫）→本題答案為Malignancy。", "peropt": {"A": "屬常見危險因子—放射治療。", "B": "◎ 本題答案）—Malignancy非教科書所列常見危險因子。", "C": "屬常見危險因子—感染。", "D": "屬常見危險因子—遺傳因素。", "E": "屬常見危險因子—肥胖。"}, "cite": "Neligan Plastic Surgery 5e / Grabb & Smith 9e — Lymphedema risk factors", "conflict": "⚠ 同題歷屆重出（L4）：「Which is NOT the common risk factor for lymphedema?」正解恆為Malignancy(惡性腫瘤本身非公認的常見危險因子，其餘obesity/radiation/infection/genetic皆是)。僅選項順序重排。109年(7038)答案=E、111/114年(7050)答案=B。純選項重排、同考點，判定合併。"}, {"id": "7055", "sub": "LGA", "src": "NG", "years": [109, 112, 114], "stem": "Reconstructive surgery for the lower extremity has evolved from staged approach to proving best solutions for functional and cosmetic outcome. Which of the description is incorrect?", "opts": {"A": "Regardless of the degree of contamination and extent of injury when indicated for salvage, there is no need to delay definitive coverage provided that the general condition of the patient and the status of the wound are appropriate", "B": "In these cases where limb salvage is not possible, an attempt should be made to salvage as much limb length as possible. Every effort should be made to save the functional knee joint as below-knee amputation results in far superior ambulatory outcome and up to 2–3 times more full mobility compared to above knee amputation.", "C": "When patients with diabetes are required to undergo a reconstructive procedure of the extremity, vascular status must be evaluated to ensure success.", "D": "The use of tissue expansion in the lower extremity has been as successful as in other areas of the body, such as the breast and scalp. The potential advantages of using expanded skin in the lower extremity include improved contours, coverage with like tissue, and improved aesthetic result", "E": "A propeller flap can be defined as an island flap that reaches the recipient site through an axial rotation"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：下肢重建原則與組織擴張器（tissue expansion）在下肢的限制。\n- **早期確定性覆蓋**：只要病人全身狀況與傷口狀態允許，無論汙染程度與損傷範圍，一旦決定保肢就不需刻意延遲確定性覆蓋（早期積極重建）。\n- **保肢與截肢高度**：無法保肢時應盡量保留肢體長度，全力保留功能性膝關節——BKA（below-knee amputation）步行預後遠優於 AKA，可達 2–3 倍完全活動能力。\n- **糖尿病足重建**：術前必須評估血管狀態以確保成功。\n- **組織擴張器在下肢**：下肢皮膚張力大、血流較差、感染與外露併發症率高，**並非**像乳房、頭皮一樣成功；故本敘述**錯誤**。\n- **Propeller flap**：定義為以軸向旋轉（axial rotation）到達受區的島狀皮瓣。", "peropt": {"A": "正確：條件允許時保肢不需延遲確定性覆蓋。", "B": "正確：盡量保留肢體長度並保留功能性膝關節，BKA 預後優於 AKA。", "C": "正確：糖尿病患下肢重建前須評估血管狀態。", "D": "◎ 錯誤（即本題答案）：組織擴張器在下肢併發症率高，**不**如乳房、頭皮成功。", "E": "正確：Propeller flap 為以軸向旋轉到達受區的島狀皮瓣。"}, "cite": "Neligan Plastic Surgery 5e, Vol.4 Lower extremity reconstruction", "conflict": "⚠ 同題歷屆重出（L2）：「Reconstructive surgery for the lower extremity has evolved…which is incorrect?」109年(7040)與112/114年(7055)為同一題。兩年皆以『下肢組織擴張器(tissue expansion)如乳房/頭皮般成功』此一錯誤敘述為正解，考點完全一致；僅B、C、E乾擾選項改寫（7040用peroneal/tibial nerve、compartment syndrome四P/六P；7055改用BKA vs AKA、propeller flap定義），不影響keyed concept。各年答案：109=D、112/114=D。屬選項改寫之重出題，判定合併。"}, {"id": "7056", "sub": "LGA", "src": "NG", "years": [112, 114], "stem": "Which of the following statements regarding angiosomes of the foot is incorrect?", "opts": {"A": "All vascular supply to the foot and ankle enters through the popliteal fossa as the three terminal branches of the popliteal artery: the anterior tibial artery, the posterior tibial artery, and the peroneal artery", "B": "The anterior perforating branch of the peroneal artery connects directly with the anterior lateral malleolar artery and supplies the anterolateral ankle angiosome.", "C": "At the level of the lateral malleolus, the lateral calcaneal artery emerges laterally between the Achilles tendon and the peroneal tendons.", "D": "The plantar heel receives dual blood supply form the calcaneal branches of the posterior tibial and peroneal arteries, which ensures adequate flow to an area regularly traumatized during ambulation.", "E": "The posterior tibial artery then enters the calcaneal canal, underneath the flexor retinaculum, and bifurcates into the medial and lateral plantar arteries at the level of the transverse septum between the flexor halluces longus and flexor digitorum brevis muscles."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：足踝 angiosome 的解剖與後脛動脈分叉位置。\n- **三大來源動脈**：所有足踝血流經膝窩由膕動脈三終支進入——anterior tibial、posterior tibial、peroneal artery。\n- **前外踝**：Peroneal artery 的 anterior perforating branch 與 anterior lateral malleolar artery 直接吻合，供應 anterolateral ankle angiosome。\n- **外側跟骨**：lateral calcaneal artery 於外踝處在 Achilles tendon 與 peroneal tendons 之間出現。\n- **足跟雙重血供**：plantar heel 由 posterior tibial 與 peroneal 的 calcaneal branches 雙重供應。\n- **PT 分叉的正確位置**：Posterior tibial artery 進入跟骨管（tarsal tunnel）後，於 **abductor hallucis 深面**分叉為 medial 與 lateral plantar arteries，其分隔為 abductor hallucis 與 flexor digitorum brevis 之間的橫隔，**並非** flexor hallucis longus 與 flexor digitorum brevis 之間；故 E **錯誤**。", "peropt": {"A": "正確：足踝血流由膕動脈三終支（AT、PT、peroneal）供應。", "B": "正確：peroneal 的 anterior perforating branch 供應 anterolateral ankle。", "C": "正確：lateral calcaneal artery 於 Achilles 與 peroneal tendons 間出現。", "D": "正確：plantar heel 由 PT 與 peroneal 的 calcaneal branches 雙重供應。", "E": "◎ 錯誤（即本題答案）：分叉橫隔應為 abductor hallucis 與 FDB 之間（PT 於 abductor hallucis 深面分叉），非 FHL 與 FDB 之間。"}, "cite": "Neligan Plastic Surgery 5e, Foot and ankle angiosome anatomy", "conflict": ""}, {"id": "7062", "sub": "LGA", "src": "NG", "years": [114], "stem": "A 65-year-old woman is suspected to have developed lymphedema of the right upper extremity 7 months after lymph node dissection for breast cancer treatment. She complained of right upper limb swelling, and cant not improved by elevation. At OPD, non-pitting edema was noted. According to the International Society of Lymphology staging system, which stage of lymphedema best fits the patient’s diagnosis?", "opts": {"A": "Stage 0", "B": "Stage 1", "C": "Stage 2", "D": "Stage 3", "E": "Stage 4"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：ISL（International Society of Lymphology）淋巴水腫分期臨床判讀。\n- **關鍵線索**：乳癌淋巴結廓清後、抬高**無法**改善的腫脹、**non-pitting edema**。\n- **ISL 分期（僅 0–3 期）**：\n  - Stage 0（潛伏／subclinical）：無明顯腫脹但淋巴運輸受損。\n  - Stage 1：早期，抬高**可**部分消退，多為 pitting。\n  - **Stage 2：抬高很少能改善腫脹；晚期 Stage 2 因脂肪／纖維化沉積轉為 non-pitting** → 符合本例。\n  - Stage 3：lymphostatic elephantiasis，皮膚增厚、疣狀變化、反覆感染。\n- 本例抬高無效 + non-pitting，最符合 **Stage 2**。\n- 註：ISL **無 Stage 4**（E 為誘答干擾項）。", "peropt": {"A": "錯誤：Stage 0 為無明顯腫脹的潛伏期。", "B": "錯誤：Stage 1 抬高可部分消退且多為 pitting，與本例不符。", "C": "◎ 正確答案：Stage 2 抬高難改善、晚期轉 non-pitting，最符合本例。", "D": "錯誤：Stage 3 應有皮膚象皮病變化，本例尚未達此程度。", "E": "錯誤：ISL 分期無 Stage 4，屬誘答項。"}, "cite": "ISL 2020 Consensus; Neligan Plastic Surgery 5e, Lymphedema staging", "conflict": ""}, {"id": "7063", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following is NOT a correct indication for liposuction in lymphedema treatment?", "opts": {"A": "Acute pitting lymphedema with ≥ 5% excess limb volume", "B": "Minimal pitting (4–5 mm in arms, 5–6 mm in legs)", "C": "No active cancer", "D": "Failure of conservative treatment", "E": "No age limit"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：淋巴水腫抽脂（liposuction／SAPL）的適應症。\n- **抽脂原理**：僅移除因慢性淋巴水腫沉積的**脂肪**，適用於已無明顯液體、**non-pitting（chronic）**的階段。\n- **正確適應症**：慢性非凹陷性水腫、僅微量 pitting（手臂 4–5 mm、腿 5–6 mm）、無活動性癌症、保守治療（CDT）失敗、無年齡上限。\n- **A 為不正確**：**急性凹陷性（acute pitting）**水腫代表以**液體**為主，應先行 CDT／保守治療與加壓，而非抽脂；抽脂對液體成分無效且時機錯誤，故 A**不是**正確適應症。", "peropt": {"A": "◎ 不正確（即本題答案）：急性凹陷性(acute pitting)水腫代表以液體為主，應先行CDT保守治療與加壓，非抽脂適應症；抽脂適應症為慢性non-pitting/僅微量pitting(手臂4-5mm、腿5-6mm)之脂肪為主水腫。", "B": "正確適應症：僅微量 pitting（手臂 4–5 mm、腿 5–6 mm）。", "C": "正確適應症：無活動性癌症。", "D": "正確適應症：保守治療（CDT）失敗。", "E": "正確適應症：無年齡上限。"}, "cite": "Brorson liposuction protocol; Neligan Plastic Surgery 5e, Lymphedema surgical treatment", "conflict": ""}, {"id": "7064", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following statements regarding the Gustilo–Anderson classification of open fractures is most accurate?", "opts": {"A": "A type I fracture involves a wound greater than 1 cm with significant soft-tissue damage and contamination.", "B": "A type IIIA fracture has extensive soft-tissue damage but maintains sufficient coverage of the bone without the need for a flap.", "C": "A type IIIB fracture is characterized by a clean wound with minimal periosteal stripping and no need for soft-tissue reconstruction.", "D": "A type II fracture is associated with a significantly higher infection rate than a type IIIC fracture.", "E": "A type IIIC fracture does not require vascular repair and has the lowest risk of amputation among type III injuries."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Gustilo–Anderson 開放性骨折分類。\n- **Type I**：傷口 **<1 cm**、乾淨、汙染少、軟組織損傷輕微。\n- **Type II**：傷口 1–10 cm、中度軟組織損傷、無廣泛損毀。\n- **Type IIIA**：廣泛軟組織損傷但**骨骼覆蓋充分、不需皮瓣**——本題最正確（B）。\n- **Type IIIB**：廣泛軟組織缺損、骨膜剝離、骨外露，**需皮瓣重建**。\n- **Type IIIC**：合併需修復的**動脈損傷**，感染與截肢率最高。\n- 感染率隨等級遞增（IIIC > II）。", "peropt": {"A": "錯誤：Type I 為 <1 cm 乾淨傷口，非 >1 cm 合併顯著損傷。", "B": "◎ 正確答案：Type IIIA 軟組織損傷廣泛但覆蓋充分、不需皮瓣。", "C": "錯誤：Type IIIB 為廣泛軟組織缺損、骨膜剝離、需皮瓣，非乾淨微小傷口。", "D": "錯誤：IIIC 感染率遠高於 Type II。", "E": "錯誤：IIIC 定義即含需修復的動脈損傷，截肢風險最高。"}, "cite": "Gustilo & Anderson classification; Neligan Plastic Surgery 5e, Open fracture management", "conflict": ""}, {"id": "7065", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following best describes the ADB Stage III (Arm dermal backflow lymphographic staging system for lymphedema Stage III) in the progression of lymphedema based on lymphographic patterns?", "opts": {"A": "Linear drainage pattern without dermal backflow, indicating normal lymphatic function.", "B": "Splash dermal backflow pattern observed mainly in the proximal part of the limb.", "C": "Stardust dermal backflow pattern involving the proximal and distal limb, excluding the hand.", "D": "Diffuse dermal backflow pattern involving the proximal part of the limb only.", "E": "No pathological pattern present; normal drainage visualized throughout the limb."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：ADB（Arm Dermal Backflow）淋巴造影分期 Stage III。\n- **ADB 分期（依 ICG/淋巴造影 dermal backflow 型態進展）**：\n  - Linear（無 backflow）：正常淋巴功能。\n  - **Splash**：局限於肢體近端的潑濺型。\n  - **Stardust（星塵型）**：\n    - 較早：僅近端。\n    - **Stage III：stardust 同時侵犯近端與遠端，但**不含手部**** → 本題答案 C。\n    - 更晚：stardust 含手部。\n  - Diffuse：瀰漫型（末期）。\n- 故 Stage III = 近端＋遠端 stardust、excluding hand（C）。", "peropt": {"A": "錯誤：linear 無 dermal backflow 代表正常，非 Stage III。", "B": "錯誤：僅近端 splash 屬較早期，非 Stage III。", "C": "◎ 正確答案：Stardust 侵犯近端與遠端但不含手部，符合 Stage III。", "D": "錯誤：僅近端 diffuse 之描述與 Stage III 星塵型分佈不符。", "E": "錯誤：正常無病理型態，非 Stage III。"}, "cite": "Mihara/Yamamoto arm dermal backflow (ADB) staging; ICG lymphography", "conflict": ""}, {"id": "7066", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following statements regarding the principles of functional limb salvage is NOT correct?", "opts": {"A": "Multidisciplinary collaboration is essential because vascular repair, infection control, soft-tissue reconstruction, and biomechanical rehabilitation must all be coordinated.", "B": "Functional success is judged primarily by limb survival, even if the salvaged limb is nonfunctional or painful.", "C": "Accurate diagnosis of wound etiology, ensuring angiosome-based revascularization, and achieving a clean wound base are critical steps in wound healing.", "D": "Postoperative biomechanical offloading and wound care are essential to minimize the risk of wound dehiscence and delayed healing.", "E": "Modern major amputations can sometimes yield better functional and quality-of-life outcomes compared to limb salvage in severely injured limbs."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：功能性保肢（functional limb salvage）原則。\n- **多專科協作**：血管修復、感染控制、軟組織重建、生物力學復健須整合。\n- **判斷成功的標準**：現代觀念以**功能與生活品質**為成功依據，而非僅肢體存活；一個疼痛、無功能的「保住的肢體」屬**失敗**，故 B**不正確**。\n- **傷口癒合關鍵**：正確診斷病因、angiosome 導向再灌流、乾淨傷口基底。\n- **術後照護**：生物力學減壓（offloading）與傷口照護以降低裂開與延遲癒合。\n- **現代截肢觀**：嚴重損傷肢體，主要截肢有時反而帶來更佳功能與生活品質。", "peropt": {"A": "正確：需多專科整合血管、感染、軟組織與復健。", "B": "◎ 不正確（即本題答案）：成功應以功能／生活品質判斷，非僅肢體存活；無功能或疼痛肢體屬失敗。", "C": "正確：正確診斷、angiosome 導向再灌流、乾淨傷口基底為癒合關鍵。", "D": "正確：術後生物力學減壓與傷口照護不可或缺。", "E": "正確：嚴重個案主要截肢有時功能與生活品質更佳。"}, "cite": "Neligan Plastic Surgery 5e, Functional limb salvage principles", "conflict": ""}, {"id": "7067", "sub": "LGA", "src": "NG", "years": [114], "stem": "關於 Mangled Extremity Severity Score (MESS) 評分標準，下列哪些敘述是正確的？（複選）", "opts": {"A": "評估要素包括骨折類型、軟組織損傷、神經血管損傷和休克情況。", "B": "年齡越大，MESS分數會相對降低。", "C": "四肢缺血時間超過6小時會增加額外加分。", "D": "MESS主要用來協助判斷是否應該進行截肢。", "E": "MESS分數只適用於上肢外傷，不適用於下肢。"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點（複選）：MESS（Mangled Extremity Severity Score）評分（ans=ACD）。\n- **四大評估要素**：骨骼／軟組織損傷（skeletal/soft-tissue injury）、肢體缺血（limb ischemia）、休克（shock/hypotension）、**年齡（age）**。\n- **年齡計分方向**：**年齡越大分數越高**（<30、30–50、>50 分數遞增），故 B「年齡越大分數降低」**錯誤**。\n- **缺血加分**：缺血時間越長分數越高，**>6 小時**時缺血分數加倍（額外加分），C 正確。\n- **臨床用途**：協助判斷是否截肢（傳統 MESS ≥7 提示截肢），D 正確。\n- **適用範圍**：主要用於**下肢**（亦可用於四肢），非僅限上肢，故 E 錯誤。", "peropt": {"A": "◎ 正確：評估含骨骼/軟組織損傷、缺血、休克與年齡。", "B": "錯誤：年齡越大 MESS 分數越高，非降低。", "C": "◎ 正確：缺血 >6 小時缺血分數加倍（額外加分）。", "D": "◎ 正確：MESS 用以協助判斷是否截肢。", "E": "錯誤：MESS 主要用於下肢外傷，非僅限上肢。"}, "cite": "Johansen MESS; Neligan Plastic Surgery 5e, Lower extremity trauma", "conflict": ""}, {"id": "7068", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following symptoms can occur throughout all stages of lymphedema? （複選）", "opts": {"A": "Heaviness", "B": "Skin ulceration", "C": "Nerve compression symptoms", "D": "Pain", "E": "Tissue thickening"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點（複選）：可出現於淋巴水腫「所有分期」的症狀（ans=ACD）。\n- **貫穿各期的症狀**：Heaviness（沉重感）、Pain（疼痛/不適）、Nerve compression symptoms（如腕隧道樣壓迫症狀）——早期即可出現並持續。\n- **屬晚期／進展期的表現**：\n  - Skin ulceration（皮膚潰瘍）：象皮病／末期皮膚破損才出現。\n  - Tissue thickening（組織增厚／纖維化）：慢性纖維脂肪沉積後才明顯。\n- 故僅 **A、C、D** 為各期皆可出現。", "peropt": {"A": "◎ 正確：沉重感各期皆可出現。", "B": "錯誤：皮膚潰瘍屬晚期（象皮病）表現。", "C": "◎ 正確：神經壓迫症狀各期皆可出現。", "D": "◎ 正確：疼痛/不適各期皆可出現。", "E": "錯誤：組織增厚（纖維化）屬慢性進展期表現。"}, "cite": "Neligan Plastic Surgery 5e, Lymphedema clinical presentation", "conflict": ""}, {"id": "7069", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following statements regarding donor sites for vascularized lymph node transplant are correct? (複選)", "opts": {"A": "The supraclavicular donor site has a risk of chyle leak.", "B": "The submental donor site carries a risk of marginal mandibular nerve injury.", "C": "The groin donor site has no risk of donor site lymphedema.", "D": "The omental donor site requires intra-abdominal surgery.", "E": "The lateral thoracic donor site provides a large skin paddle and has a known anatomy."}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點（複選）：VLNT（vascularized lymph node transfer）供區特性（ans=ABDE）。\n- **A supraclavicular**：有 **chyle leak（胸管乳糜漏）** 風險——正確。\n- **B submental**：位近下頜緣，有 **marginal mandibular nerve** 損傷風險——正確。\n- **C groin（腹股溝）**：**確實有**供區下肢淋巴水腫（iatrogenic donor-site lymphedema）風險，可用 reverse lymphatic mapping 降低風險；故「無風險」**錯誤**，不選。\n- **D omental（大網膜）**：需**腹腔內手術**（腹腔鏡/開腹）取瓣，帶有腹腔併發症風險——正確。\n- **E lateral thoracic（外側胸壁）**：可提供**大皮島**且**解剖明確**——正確。", "peropt": {"A": "◎ 正確：supraclavicular 供區有 chyle leak 風險。", "B": "◎ 正確：submental 供區有 marginal mandibular nerve 損傷風險。", "C": "錯誤：groin 供區**仍有**供區下肢淋巴水腫風險，非無風險。", "D": "◎ 正確：omental 供區需腹腔內手術取瓣。", "E": "◎ 正確：lateral thoracic 供區可提供大皮島且解剖明確。"}, "cite": "Neligan Plastic Surgery 5e, Vascularized lymph node transfer donor sites", "conflict": ""}, {"id": "7070", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following muscle or neurovascular structures are correctly paired with their respective leg compartments? (複選)", "opts": {"A": "Tibialis anterior — Anterior compartment", "B": "Superficial fibular (peroneal) nerve — Lateral compartment", "C": "Flexor hallucis longus — Superficial posterior compartment", "D": "Tibial nerve — Deep posterior compartment", "E": "Anterior tibial artery — Lateral compartment"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點（複選）：小腿四個 compartment 的肌肉與神經血管配對（ans=ABD）。\n- **Anterior compartment**：Tibialis anterior、EHL、EDL、fibularis tertius；**deep fibular nerve**；**anterior tibial artery**。\n- **Lateral compartment**：fibularis longus/brevis；**superficial fibular (peroneal) nerve**（無主要動脈，由 peroneal 穿枝供應）。\n- **Superficial posterior**：gastrocnemius、soleus、plantaris。\n- **Deep posterior**：tibialis posterior、FDL、**FHL**；**tibial nerve**；posterior tibial 與 peroneal arteries。\n- 判讀：A（TA-anterior）✓、B（superficial fibular n.-lateral）✓、D（tibial n.-deep posterior）✓；**C 錯**（FHL 屬 deep posterior，非 superficial posterior）；**E 錯**（anterior tibial artery 屬 anterior，非 lateral）。", "peropt": {"A": "◎ 正確：Tibialis anterior 屬 anterior compartment。", "B": "◎ 正確：Superficial fibular (peroneal) nerve 屬 lateral compartment。", "C": "錯誤：FHL 屬 **deep posterior** compartment，非 superficial posterior。", "D": "◎ 正確：Tibial nerve 走行於 deep posterior compartment。", "E": "錯誤：Anterior tibial artery 屬 **anterior** compartment，非 lateral。"}, "cite": "Leg compartment anatomy; Neligan Plastic Surgery 5e, Lower extremity anatomy", "conflict": ""}, {"id": "7071", "sub": "LGA", "src": "NG", "years": [114], "stem": "Which of the following statements regarding the pathophysiology and management of diabetic foot ulcers (DFUs) is incorrect?", "opts": {"A": "Sensory neuropathy in diabetes typically follows a “glove and stocking” distribution, initially affecting the distal toes and fingers.", "B": "Autonomic neuropathy may lead to plantar fat pad atrophy and decreased sweat production.", "C": "Identification of equinus deformity includes assessment of passive ankle dorsiflexion with the subtalar joint locked.", "D": "Diabetic patients with peripheral arterial disease (PAD) have increased risk of major lower extremity amputation.", "E": "Revascularization via angioplasty or bypass is unnecessary in most cases of chronic limb-threatening ischemia."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：糖尿病足潰瘍（DFU）病理生理與處置。\n- **感覺神經病變**：呈「glove and stocking」分佈，先侵犯遠端趾／指端。\n- **自律神經病變**：可致足底脂肪墊萎縮、汗腺分泌減少（皮膚乾裂）。\n- **Equinus deformity 評估**：subtalar joint 鎖定下測被動踝背屈（Silfverskiöld test 概念）。\n- **PAD 與截肢**：糖尿病合併周邊動脈疾病者，重大下肢截肢風險增加。\n- **E 不正確**：對於**慢性肢體威脅性缺血（CLTI）**，血流重建（angioplasty 或 bypass）是**必要且關鍵**的，並非「多數情況不需要」；缺血未矯正傷口難癒合、截肢率高，故 E 錯。", "peropt": {"A": "正確：感覺神經病變呈 glove-and-stocking、先犯遠端趾指。", "B": "正確：自律神經病變致足底脂肪墊萎縮與汗液減少。", "C": "正確：equinus 評估於 subtalar joint 鎖定下測被動踝背屈。", "D": "正確：糖尿病合併 PAD 者重大截肢風險增加。", "E": "◎ 不正確（即本題答案）：CLTI 多數情況血流重建為必要，非不需要。"}, "cite": "Neligan Plastic Surgery 5e, Diabetic foot ulcer; Global Vascular Guidelines (CLTI)", "conflict": ""}, {"id": "7073", "sub": "LGA", "src": "NG", "years": [115], "stem": "關於 lymphedema 的診斷與治療，下列哪些敘述正確？(複選)", "opts": {"A": "complete decongestive therapy 通常包含皮膚照護、manual lymphatic drainage、compression 與運動", "B": "lymphoscintigraphy 或 indocyanine green lymphography 可協助評估淋巴功能與治療規劃", "C": "感染、放射線治療與肥胖均可能使 lymphedema 風險增加或惡化", "D": "晚期 lymphedema 可因纖維化及脂肪沉積而呈 non-pitting edema", "E": "Stage 0 表示淋巴運輸完全正常，且未來不會發生水腫"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯【考點：淋巴水腫診斷與治療原則】\n■ Complete Decongestive Therapy (CDT) 為第一線保守治療，含四要素：skin care、manual lymphatic drainage (MLD)、multilayer compression bandage/garment、decongestive exercise。分為 intensive (reduction) 與 maintenance 兩階段。\n■ 影像評估：\n• Lymphoscintigraphy 為傳統標準檢查，評估淋巴輸送速率與 dermal backflow。\n• ICG lymphography 可即時分級 (Linear→Splash→Stardust→Diffuse)，指引 LVA 定位與治療規劃。\n■ 危險因子：axillary dissection、放射線治療、感染 (cellulitis)、肥胖 (BMI)、外傷均會誘發或惡化。\n■ 病理演變：早期高蛋白組織液堆積 (pitting)；晚期因慢性發炎→纖維化與脂肪沉積→呈 non-pitting edema，此時單靠內科治療效果有限。\n■ Stage 0 為「潛伏期」：淋巴功能已異常但尚無臨床水腫，未來仍有發病風險，故 E 敘述錯誤。", "peropt": {"A": "◎ CDT 確實包含 skin care、MLD、compression 與 exercise 四大要素。", "B": "◎ Lymphoscintigraphy 與 ICG lymphography 為評估淋巴功能與手術規劃的核心工具。", "C": "◎ 感染、放療、肥胖皆為公認會增加或惡化淋巴水腫的危險因子。", "D": "◎ 晚期因纖維化與脂肪沉積而由 pitting 轉為 non-pitting，正確。", "E": "Stage 0 是淋巴輸送已受損的潛伏期，未來仍可能發生水腫，敘述錯誤。"}, "cite": "ISL Consensus; Neligan 5e Lymphedema; Grabb & Smith 9e", "conflict": ""}, {"id": "7074", "sub": "LGA", "src": "NG", "years": [115], "stem": "Which of the following statements regarding lower extremity anatomy is INCORRECT?", "opts": {"A": "The pes anserinus consists of the tendons of three muscles: the sartorius, the gracilis, and the semimembranosus.", "B": "The medial (adductor) compartment of the thigh is not a true anatomical compartment because it lacks distinct intermuscular septa.", "C": "The rectus femoris muscle has a Type II vascular supply.", "D": "Regarding thigh muscle innervation, the general rule is \"one compartment, one nerve\": the anterior compartment is innervated by the femoral nerve, the medial by the obturator nerve, and the posterior by the sciatic nerve."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：下肢與大腿解剖 — pes anserinus 與肌肉血供分型】\n■ Pes anserinus（鵝足）由三條肌腱組成，記憶法「Say Grace before Tea」：\n• S — Sartorius（縫匠肌，股神經）\n• G — Gracilis（股薄肌，閉孔神經）\n• T — semiTendinosus（半腱肌，坐骨神經 tibial 分支）\n→ 三者由不同神經支配卻共同止於脛骨近端內側。題幹寫成 semimembranosus（半膜肌）為錯誤，故 A 是「不正確」的敘述（即答案）。\n■ 大腿三腔室與 Mathes-Nahai 血供：\n• Medial (adductor) compartment 缺乏明確肌間隔，非真正的封閉筋膜腔室 (B 正確)。\n• Rectus femoris 為 Type II 血供（主 pedicle：descending branch of LFCA ＋ minor pedicles），B 正確。\n• 「一腔室一神經」原則：前腔室—femoral n.、內側腔室—obturator n.、後腔室—sciatic n.（D 正確）。", "peropt": {"A": "◎ 錯誤敘述（即答案）：pes anserinus 應為 sartorius、gracilis、semiTENDINOSUS，而非 semimembranosus。", "B": "正確：內收肌群腔室缺乏明確肌間隔，非真正解剖腔室。", "C": "正確：rectus femoris 為 Mathes-Nahai Type II 血供。", "D": "正確：大腿肌肉遵循「一腔室一神經」— 前 femoral、內 obturator、後 sciatic。"}, "cite": "Grabb & Smith 9e Lower Extremity Anatomy; Mathes-Nahai classification", "conflict": ""}, {"id": "7075", "sub": "LGA", "src": "NG", "years": [115], "stem": "Which of the following statements regarding lower extremity trauma is INCORRECT?", "opts": {"A": "Multidetector computed tomography angiography (MDCTA) is the gold standard for the initial imaging assessment of lower extremity vascular injuries.", "B": "Surgical approaches for fasciotomy in the management of lower extremity compartment syndrome include both two-incision and single-incision techniques.", "C": "When performing a fasciotomy for compartment syndrome, the two-incision technique provides superior decompression and is associated with significantly fewer complications compared to the single-incision approach.", "D": "The absolute indication for fasciotomy in compartment syndrome is a compartment pressure >30 mmHg or <30 mmHg below the diastolic pressure"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：下肢外傷 — 血管影像與 fasciotomy 技術】\n■ MDCTA 為下肢血管損傷「初步影像評估」的黃金標準：快速、非侵入性、可取代大部分傳統血管攝影 (A 正確)。\n■ 腔室症候群 fasciotomy：\n• 小腿四腔室：single-incision（外側單切口）與 two-incision（內外側雙切口）皆為合法術式 (B 正確)。\n• 兩者在減壓完整度與併發症上「並無顯著差異」；single-incision 需較深經驗但可減壓四腔室 → C 宣稱 two-incision「顯著較少併發症」為過度且不實，故 C 為錯誤敘述（即答案）。\n■ Fasciotomy 絕對適應症：compartment pressure > 30 mmHg，或 delta pressure（舒張壓 − 腔室壓）< 30 mmHg（D 正確，臨床上以 delta P 更具參考價值）。", "peropt": {"A": "正確：MDCTA 為下肢血管損傷初步影像評估的黃金標準。", "B": "正確：小腿 fasciotomy 確有 two-incision 與 single-incision 兩種術式。", "C": "◎ 錯誤敘述（即答案）：two-incision 並未證實在減壓或併發症上顯著優於 single-incision。", "D": "正確：壓力 >30 mmHg 或 delta pressure <30 mmHg 為 fasciotomy 適應症。"}, "cite": "Grabb & Smith 9e Lower Extremity Trauma; compartment syndrome guidelines", "conflict": ""}, {"id": "7076", "sub": "LGA", "src": "NG", "years": [115], "stem": "Which of the following statements regarding lower extremity trauma is INCORRECT?", "opts": {"A": "MESS score predicts the need for amputation after lower extremity trauma based on the extent of skeletal and soft tissue injury, limb ischemia, shock, and age", "B": "Lower Extremity Assessment Project (LEAP) study conclude that there is no valid clinical scoring system that predicte amputation with accuracy", "C": "Loss of plantar sensation is an absolute indication for amputation", "D": "immediate reconstruction after lower limb trauma is the timing of choice if the general condition of the patient permits"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：下肢外傷評分 MESS／LEAP 與截肢適應症】\n■ MESS (Mangled Extremity Severity Score)：以 skeletal/soft-tissue injury、limb ischemia、shock、age 四項計分，≥7 傳統上預測需截肢 (A 正確)。\n■ LEAP (Lower Extremity Assessment Project) 為劃時代前瞻研究，結論：\n• 現有各種下肢評分系統（MESS、PSI、LSI、NISSSA 等）「均無法可靠地準確預測截肢」(B 正確)。\n• 「足底感覺喪失 (loss of plantar sensation)」曾被視為肢體不可挽救、絕對截肢的指標，但 LEAP 證實：初診足底無感覺者於 2 年後有相當比例「恢復感覺」，故足底感覺喪失「不再是」絕對截肢適應症 → C 為錯誤敘述（即答案）。\n■ 現代重建時機：若病人整體狀況允許，early/immediate（Godina 主張 72 小時內）重建為首選，可降低感染、皮瓣失敗與骨髓炎率 (D 正確)。", "peropt": {"A": "正確：MESS 依骨/軟組織損傷、缺血、休克、年齡預測截肢需求。", "B": "正確：LEAP 結論為無任何評分系統能準確預測截肢。", "C": "◎ 錯誤敘述（即答案）：LEAP 證實足底感覺喪失並非絕對截肢適應症，術後感覺可恢復。", "D": "正確：病人狀況允許時，早期/立即重建為首選時機（Godina 原則）。"}, "cite": "LEAP Study (Bosse et al., NEJM 2002); Grabb & Smith 9e; Godina 1986", "conflict": ""}, {"id": "7077", "sub": "LGA", "src": "NG", "years": [115], "stem": "A 55-year-old female presents with secondary right upper extremity lymphedema for 4 years following an axillary lymph node dissection and radiation therapy for breast cancer. Physical examination reveals a hard, non-pitting edema (solid-predominance) with intact skin. Preoperative imaging and evaluation demonstrate the following: ICG lymphography shows a diffuse stardust dermal backflow pattern; MRI reveals that the excess limb volume is almost entirely dominated by fat hypertrophy and fibrosis. Based on the current treatment algorithm for lymphedema, what is the most appropriate primary surgical intervention?", "opts": {"A": "Immediate supermicrosurgical lymphaticovenular bypass (LVB) to restore lymphatic drainage.", "B": "Debulking liposuction, as it is \"the only method to completely reduce a non-pitting chronic lymphedema where the excess volume is dominated by adipose tissue.\"", "C": "Vascularized lymph node transplant (VLNT), because the transplanted nodes will \"deliver growth factors such as VEGF-C to the recipient site.\"", "D": "The Chen-modified Charles procedure, which involves \"circumferential excision of the fibrosclerotic lymphedematous tissue down to the deep fascia."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：慢性脂肪型淋巴水腫的手術演算法 — 抽脂 (debulking liposuction)】\n■ 病人特徵解讀：4 年慢性續發性淋巴水腫、hard non-pitting (solid-predominance)、ICG 呈 diffuse stardust（晚期 dermal backflow）、MRI 顯示過剩體積「幾乎全由脂肪肥厚與纖維化構成」→ 屬 fat-dominant, non-fluid 晚期淋巴水腫。\n■ 治療演算法邏輯：\n• 液體為主 (fluid-predominant, pitting)、ICG 早期 linear/splash → 生理性手術：LVA/LVB 或 VLNT。\n• 脂肪為主 (solid/fat-predominant, non-pitting) → 生理性手術無法移除已沉積脂肪；需 debulking liposuction（Brorson 技術）為唯一能完全減除脂肪過剩體積的方法，術後須終生穿戴壓力衣。\n■ 故本題最適當的「主要」手術為 B（debulking liposuction）。\n■ C 引言雖屬實（VLNT 分泌 VEGF-C 促淋巴新生）但不適用於脂肪為主之晚期；D Charles procedure 為破壞性、併發症高，僅保留給極末期象皮病。", "peropt": {"A": "LVB 為生理性手術，適用液體為主早期水腫，無法移除已沉積的脂肪組織。", "B": "◎ 脂肪為主的慢性 non-pitting 淋巴水腫，debulking liposuction 為唯一能完全減除過剩脂肪體積的方法。", "C": "VLNT 引言（分泌 VEGF-C）本身正確，但屬生理性手術，對脂肪主導之晚期無效。", "D": "Chen-modified Charles procedure 為破壞性末期手術，併發症高，非此脂肪型病人的首選主要術式。"}, "cite": "Brorson liposuction protocol; Neligan 5e Surgical treatment of lymphedema; Cheng's lymphedema algorithm", "conflict": ""}, {"id": "7078", "sub": "LGA", "src": "NG", "years": [115], "stem": "A 40-year-old male sustains a high-energy crush injury with an open fracture in the middle-to-lower third of his lower leg following a severe motorcycle accident. After completing external skeletal fixation and multiple extensive debridements, you are preparing to perform a free flap reconstruction. Considering the \"zone of injury\" created by the high-energy trauma, which of the following clinical decisions regarding recipient vessel selection and microvascular anastomosis technique best aligns with current evidence-based guidelines?", "opts": {"A": "Angiography is the gold standard for evaluating the extent of microvascular injury; therefore, routine preoperative angiography should be performed for such severe trauma to determine the anastomosis site.", "B": "According to Godina's principles, an \"end-to-end anastomosis\" is strongly recommended in lower extremity free flap reconstruction to avoid flow disturbances caused by vessel mismatch.", "C": "Intraoperative clinical evaluation of the recipient vessel's wall pliability and the quality of pulsatile flow from the transected end is more important than the physical distance from the wound edge.", "D": "If anatomical constraints necessitate an end-to-end arterial anastomosis, skin flaps should be preferred over muscle flaps because skin flaps have lower vascular resistance, allowing them to effectively absorb the high arterial flow of the lower extremity."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：高能量下肢外傷 free flap — zone of injury 與受區血管選擇】\n■ Zone of injury 概念：高能量創傷會造成損傷區血管內膜傷害、痙攣傾向與周邊組織纖維化，吻合應選在「損傷區之外」健康血管。\n■ 現代實證重點：\n• 決定吻合位置的關鍵不是「與傷口的固定距離」，而是「術中直接評估血管品質」— 管壁柔軟度 (pliability)、切端搏動性噴血 (pulsatile spurting flow) 與內膜完整度 → C 正確。\n• 血管攝影並非評估微血管損傷的黃金標準，也不需常規術前施行；MDCTA 用於評估主幹血管而非 microvascular；A 錯誤。\n• Godina 原則強調早期重建與吻合於損傷區外，並未「強烈建議」一律 end-to-end；於單一主幹或血流不足時 end-to-side 可保留遠端灌流，B 過度絕對而錯誤。\n• 「皮瓣 vs 肌肉瓣吸收高血流」之血流阻力論述缺乏實證，D 為杜撰。", "peropt": {"A": "血管攝影非微血管損傷的黃金標準，也不需常規術前施行，敘述錯誤。", "B": "Godina 未強制一律 end-to-end；於主幹單一時 end-to-side 可保遠端灌流，過度絕對。", "C": "◎ 術中評估血管管壁柔軟度與搏動性噴血品質，比距傷口的固定距離更重要。", "D": "「皮瓣阻力較低可吸收高動脈血流」為缺乏實證的錯誤推論。"}, "cite": "Godina M. 1986; Grabb & Smith 9e Lower Extremity Reconstruction", "conflict": ""}, {"id": "7079", "sub": "LGA", "src": "NG", "years": [115], "stem": "A 55-year-old male requires an above-knee amputation following severe trauma. You plan to prophylactically perform a Regenerative Peripheral Nerve Interface (RPNI) on the sciatic nerve to prevent the formation of a symptomatic neuroma. Regarding the RPNI surgical design for such a large-caliber nerve and its underlying physiological considerations, which of the following clinical decisions is the most appropriate?", "opts": {"A": "To ensure all regenerating axons are captured, a single, very thick and bulky free muscle graft (greater than 1.5 cm thick) should be harvested to completely wrap the entire main trunk of the sciatic nerve stump.", "B": "Interfascicular dissection must first be performed to separate the sciatic nerve into 3 to 4 fascicular groups, and a separate RPNI should be created for each fascicular group using free skeletal muscle grafts no more than 0.5 cm thick.", "C": "To minimize operative time and donor site morbidity, a single standard-sized free muscle graft (0.5 cm thick) should be wrapped directly around the unseparated main trunk of the sciatic nerve, as the signal amplification effect of the muscle cells is sufficient to absorb all regenerating axons.", "D": "The sciatic nerve is a mixed nerve, and the RPNI mechanism is only effective for pure sensory nerves; therefore, RPNI should be abandoned for the sciatic nerve in favor of traditional traction neurectomy."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：大口徑坐骨神經的 RPNI 設計】\n■ Regenerative Peripheral Nerve Interface (RPNI)：以「去神經化的自由骨骼肌移植片」包覆神經斷端，再生軸突長入肌肉並形成新的神經肌肉接合，防止神經瘤並可作為肌電訊號界面。\n■ 大口徑混合神經（如 sciatic）設計原則：\n• 必須先行 interfascicular dissection，將坐骨神經分成 3–4 個 fascicular groups，「每一束」各做一個獨立 RPNI。\n• 每片 free skeletal muscle graft 厚度 ≤ 0.5 cm，過厚會導致移植片「中央缺血壞死」(游離肌片靠周邊血漿浸潤與再血管化存活)。\n→ 故 B 正確。\n■ A、C 用單一整條主幹包覆（且 A 用 >1.5 cm 過厚 bulky graft）會造成中央壞死、無法有效捕捉所有軸突。D 誤稱 RPNI 僅對純感覺神經有效（實際對混合神經同樣有效），錯誤。", "peropt": {"A": "✗ 單片肌片包覆整條主幹且厚度>1.5cm會造成游離肌片中央缺血壞死；正確應先interfascicular dissection分成3-4束(fascicular groups)、每束各做一個厚度≤0.5cm之RPNI(應≤0.5cm且分束，非>1.5cm整條包覆)。", "B": "◎ 先 interfascicular dissection 分成 3–4 束，每束各做一個 ≤0.5 cm 厚 free muscle graft 的 RPNI，最適當。", "C": "✗ 以單片0.5cm肌片直接包整條「未分離」主幹，無法捕捉大口徑坐骨神經全部軸突；正確須先分成3-4個fascicular groups各別製作RPNI(需分束，非整條包覆)。", "D": "RPNI 對混合神經（含坐骨神經）同樣有效，不應改採 traction neurectomy。"}, "cite": "Kubiak/Kung/Cederna RPNI protocols; Grabb & Smith 9e Neuroma management", "conflict": ""}, {"id": "7080", "sub": "LGA", "src": "NG", "years": [115], "stem": "A 10-year-old boy underwent a wide tumor resection for Ewing sarcoma of the left femur, resulting in a 15-cm intercalary diaphyseal defect. Assuming amputation is not considered and maximal preservation of knee joint function is desired, which of the following surgical reconstructive strategies for this massive, weight-bearing bone defect best aligns with literature recommendations to provide both \"immediate mechanical stability\" and \"long-term biologic healing and prevention of stress fractures\"?", "opts": {"A": "Reconstruction with a massive frozen allograft alone, as its excellent osteogenic capacity allows for rapid fusion with the host bone and adaptation to high weight-bearing stress.", "B": "A double-barrel vascularized fibular flap, creating a double-strut graft to double the diameter, which is the sole gold standard because it can easily span a 15-cm defect.", "C": "Direct bridging with a single vascularized fibular flap, as it undergoes rapid hypertrophy to match the femoral diameter, preventing stress fractures without the need for prolonged postoperative protection.", "D": "The Capanna technique (massive allograft combined with a vascularized free fibula bone graft), utilizing the allograft for initial mechanical support while the internal fibular flap provides long-term biologic viability, remodeling capacity, and durable bony union."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：大段承重骨缺損重建 — Capanna technique】\n■ 情境：10 歲 Ewing sarcoma，股骨 15 cm intercalary diaphyseal 缺損，需同時提供「立即機械穩定」與「長期生物性癒合、抗壓力性骨折」。\n■ Capanna technique（allograft ＋ vascularized free fibula「內插」複合重建）：\n• 大段 allograft 提供即時機械支撐與匹配股骨的直徑/皮質厚度；\n• 內置 vascularized fibula 提供活體血運，促進骨癒合、remodeling、抗疲勞骨折，並在 allograft 吸收/骨折時提供生物性補救 → 兩者互補，為大段承重缺損的理想選擇 (D 正確)。\n■ 各項駁斥：\n• A allograft 為「無活性」結構性移植，無 osteogenic 能力，易 nonunion/骨折/感染。\n• B double-barrel fibula 增加直徑但非「唯一黃金標準」，且承重骨仍需長期保護。\n• C 單條 vascularized fibula 雖會 hypertrophy，但初期強度不足，承重前仍需長時間保護，宣稱「無需保護」錯誤。", "peropt": {"A": "Massive allograft 為無活性結構性移植，缺乏 osteogenic 能力，易 nonunion 與骨折。", "B": "Double-barrel fibula 可增直徑但非唯一黃金標準，承重股骨仍需長期保護。", "C": "單條 vascularized fibula 初期強度不足，承重前仍需長期保護，敘述錯誤。", "D": "◎ Capanna technique（allograft ＋ 內插 vascularized fibula）兼具即時機械穩定與長期生物癒合，最符合文獻建議。"}, "cite": "Capanna R. et al.; Grabb & Smith 9e Vascularized bone reconstruction", "conflict": ""}, {"id": "7081", "sub": "LGA", "src": "NG", "years": [115], "stem": "50-year-old diabetic patient with a history of severe Charcot midfoot collapse recently developed a 4x4 cm deep ulcer on the plantar heel due to repetitive friction, complicated by partial calcaneal exposure and chronic osteomyelitis. Following debridement and antibiotic therapy, the wound base is now clean and ready for coverage. After evaluating the patient's foot anatomy, angiosomes, and biomechanics, which of the following clinical decisions regarding flap reconstruction is the most appropriate?", "opts": {"A": "Although the medial plantar artery flap provides excellent glabrous, weight-bearing tissue, its use in this patient is relatively contraindicated because the Charcot midfoot collapse has caused the instep to become a primary weight-bearing surface.", "B": "The abductor digiti minimi (ADM) muscle flap has a robust blood supply primarily derived from the \"medial plantar artery\" and is the gold standard for covering medial and plantar heel defects.", "C": "While the reverse sural artery flap can be used for heel reconstruction, its blood supply originates from perforators of the \"anterior tibial artery\", and intraoperative arterial spasm is common, whereas the risk of venous congestion is extremely low.", "D": "The extensor digitorum brevis (EDB) muscle flap has a large arc of rotation, easily allowing a 180-degree transposition to completely cover plantar heel defects, and its donor site can be closed primarily without affecting shoe wear."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：Charcot 足併慢性骨髓炎的足跟皮瓣選擇 — angiosome 與生物力學】\n■ 情境重點：糖尿病 ＋ 嚴重 Charcot midfoot collapse，足跟蹠面 4×4 cm 深潰瘍併跟骨外露與慢性骨髓炎。Charcot 中足塌陷使「instep（足弓內側）變成主要承重面」。\n■ Medial plantar artery (instep) flap 提供理想的 glabrous、耐磨承重組織，是足跟蹠面重建的優良選擇；但在此病人因 Charcot 塌陷已使 instep 成為主承重面，取此供區將犧牲一個新的承重面 → 為「相對禁忌」，故 A 正確。\n■ 其餘錯誤：\n• B：ADM 肌瓣血供來自 lateral plantar artery（非 medial），且僅適合小的內/外側跟部缺損，非黃金標準。\n• C：reverse sural flap 血供來自 peroneal artery 的 septocutaneous perforators（非 anterior tibial），且靜脈鬱血 (venous congestion) 風險相當高。\n• D：EDB 肌瓣體積小、弧度有限，無法有效覆蓋蹠側足跟。", "peropt": {"A": "◎ Medial plantar flap 雖為理想承重組織，但 Charcot 塌陷已使 instep 成主承重面，取此供區為相對禁忌。", "B": "ADM 肌瓣血供主要來自 lateral plantar artery（非 medial），且非足跟覆蓋的黃金標準。", "C": "Reverse sural flap 血供源自 peroneal artery perforators（非 anterior tibial），且靜脈鬱血風險並不低。", "D": "EDB 肌瓣體積小、弧度有限，無法完整覆蓋蹠側足跟缺損。"}, "cite": "Attinger angiosome concept; Grabb & Smith 9e Foot & ankle reconstruction", "conflict": ""}, {"id": "7082", "sub": "LGA", "src": "NG", "years": [115], "stem": "When planning a Vascularized Lymph Node Transplant (VLNT) for a patient with extremity lymphedema, selecting the appropriate donor site and preventing iatrogenic secondary lymphedema are critical. Based on the surgical anatomy and current consensus, which of the following statements quoting the literature regarding VLNT donor sites are correct? (複選)", "opts": {"A": "Supraclavicular flap: \"Given the presence of the thoracic duct on the left, the right neck donor site is preferred.\"", "B": "Groin flap: To maximize the lymphatic tissue transplanted, the surgeon should intentionally harvest the nodes that \"lie medial to the superficial inferior epigastric vessels, in a deeper plane, and inferior to the inguinal ligament.\"", "C": "Submental flap: This donor site requires careful dissection because \"there is some risk of injury to the facial nerve (marginal mandibular branch) and submandibular gland.\"", "D": "Lateral thoracic flap: \"This flap has been most strongly associated with iatrogenic lymphedema, and therefore, reverse mapping [using technetium-99-labeled albumin or ICG] is advocated.\"", "E": "Intra-abdominal donor sites (Omental flap): This flap provides an \"abundance of lymphatic and soft tissue, pliability, long vascular pedicle, and no risk of iatrogenic lymphedema.\""}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【考點：VLNT 供區選擇與醫源性續發淋巴水腫預防】\n■ VLNT 供區與各自風險：\n• Supraclavicular flap：因胸管 (thoracic duct) 位於左側頸部，取「右頸」較安全，可降低乳糜漏／醫源性上肢水腫 (A 正確)。\n• Groin (inguinal) flap：為避免破壞下肢引流淋巴結，應取「淺層、位於 SIE 血管外側、腹股溝韌帶上方」的表淺鼠蹊淋巴結；B 敘述取「內側、深層、韌帶下方」正是下肢引流結，會誘發下肢水腫，故 B 錯誤。\n• Submental flap：需小心 facial nerve marginal mandibular branch 及頜下腺損傷 (C 正確)。\n• Lateral thoracic flap：最易造成醫源性上肢淋巴水腫，故強烈建議 reverse mapping（Tc-99m／ICG）(D 正確)。\n• Omental / intra-abdominal flap：淋巴與軟組織豐富、蒂長、柔軟，且「無醫源性肢體淋巴水腫風險」(E 正確)。\n■ 故正確為 ACDE。", "peropt": {"A": "◎ 胸管位於左側，故 supraclavicular 供區偏好取右頸以降低乳糜漏風險。", "B": "錯誤：應取淺層、SIE 血管外側、腹股溝韌帶上方的表淺結；取內側深層韌帶下方會誘發下肢水腫。", "C": "◎ Submental flap 需注意 facial nerve marginal mandibular branch 與頜下腺損傷。", "D": "◎ Lateral thoracic flap 最易導致醫源性上肢淋巴水腫，故倡議 reverse mapping。", "E": "◎ Omental flap 淋巴軟組織豐富、蒂長、柔軟，且無醫源性肢體淋巴水腫風險。"}, "cite": "Neligan 5e VLNT donor sites; reverse lymphatic mapping (Dayan/Cheng)", "conflict": ""}, {"id": "7083", "sub": "LGA", "src": "NG", "years": [115], "stem": "In the management of complex lower extremity wounds complicated by chronic osteomyelitis, thorough debridement and providing well-vascularized tissue coverage are the keys to success. Regarding the surgical treatment principles for osteomyelitis and the anatomical characteristics and applications of common lower extremity muscle/skin flaps, which of the following statements are correct? (複選)", "opts": {"A": "The standard treatment principles for chronic osteomyelitis include complete resection of involved bone, obliteration of dead space, flap coverage with vascularized tissue, and a brief course of antibiotic treatment.", "B": "To achieve the best long-term remission rate for osteomyelitis, it is \"absolutely necessary\" to use muscle flaps for coverage, as literature proves fasciocutaneous flaps cannot effectively control the infection.", "C": "The gastrocnemius muscle has a type I circulation pattern and provides reliable coverage to the knee regions and the upper third of the tibia.", "D": "The soleus muscle has a type I circulation pattern; therefore, it has a large arc of rotation and is particularly suitable for covering extensive defects in the proximal (upper third) lower extremity.", "E": "A propeller flap is defined as an \"island flap that reaches the recipient site through an axial rotation\". The skin island may be safely rotated up to 180 degrees."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【考點：慢性骨髓炎治療原則與下肢肌/皮瓣特性】\n■ 慢性骨髓炎標準治療四原則：徹底切除受累死骨、消除死腔 (dead space obliteration)、以「有血運組織」覆蓋、加上適當抗生素療程 (A 正確；現代趨勢在徹底清創＋血運皮瓣下抗生素療程可較短)。\n■ 「肌瓣 vs 筋膜皮瓣」：文獻並未證明筋膜皮瓣無法控制感染；良好清創與血運覆蓋才是關鍵，故 B「絕對必須用肌瓣」為錯誤絕對化敘述。\n■ 下肢肌肉血供 (Mathes-Nahai)：\n• Gastrocnemius：Type I（單一 sural artery），覆蓋膝周與脛骨「上 1/3」(C 正確)。\n• Soleus：Type II 血供（非 Type I），為脛骨「中 1/3」的主力肌瓣，弧度有限、不適合近端大缺損；D 稱其 Type I 且適合近端大缺損，錯誤。\n■ Propeller flap：定義為透過「軸向旋轉 (axial rotation)」到達受區的島狀皮瓣，可安全旋轉達 180 度 (E 正確)。\n■ 故正確為 ACE。", "peropt": {"A": "◎ 慢性骨髓炎治療含徹底切除死骨、消除死腔、血運組織覆蓋與抗生素療程。", "B": "錯誤：文獻未證明筋膜皮瓣無法控制感染，「絕對必須用肌瓣」過度絕對。", "C": "◎ Gastrocnemius 為 Type I 血供，可靠覆蓋膝周與脛骨上 1/3。", "D": "錯誤：Soleus 為 Type II（非 Type I），適合脛骨中 1/3 而非近端大缺損。", "E": "◎ Propeller flap 為經軸向旋轉到達受區的島狀皮瓣，可安全旋轉達 180 度。"}, "cite": "Cierny-Mader osteomyelitis; Mathes-Nahai classification; Grabb & Smith 9e", "conflict": ""}, {"id": "7084", "sub": "LGA", "src": "NG", "years": [115], "stem": "A 45-year-old patient with a previous left below-knee amputation (BKA) is referred to your clinic for severe residual limb pain (RLP) and phantom limb pain (PLP) corresponding to a specific dermatome. You are evaluating whether the patient is a suitable candidate for Targeted Muscle Reinnervation (TMR). Regarding the diagnostic logic for lower extremity neuromas, comorbidity management, and TMR surgical principles, which of the following statements are correct? (複選)", "opts": {"A": "Utilizing an ultrasound-guided local peripheral nerve block in the clinic that results in a greater than 50% reduction in pain is an important clinical criterion for establishing the diagnosis of a \"symptomatic neuroma\" and screening appropriate candidates for surgery.", "B": "To maximally preserve the muscle function and soft-tissue coverage of the residual limb, TMR surgery should mandate an \"end-to-side anastomosis,\" coapting the stump of the affected sensory nerve to the sidewall of an undivided motor nerve.", "C": "When selecting a donor motor target in a BKA, smaller, deeper muscles that contribute less to soft-tissue padding should be preferentially selected over muscles critical for optimal peritibial padding.", "D": "If the patient's clinical presentation meets the Budapest Criteria for Complex Regional Pain Syndrome (CRPS), the centralization of their pain serves as an \"absolute contraindication\" for TMR surgery.", "E": "To prevent \"axonal escape,\" the entire coaptation can be anchored to the muscle at the target neuromuscular junction, or augmented by wrapping a free muscle graft around the coaptation to provide a combined TMR and RPNI effect."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【考點：BKA 後神經瘤診斷邏輯與 TMR 原則】\n■ 診斷「症狀性神經瘤」：超音波導引局部周邊神經阻斷後疼痛「> 50% 緩解」，是確立診斷與篩選手術候選者的重要臨床標準 (A 正確)。\n■ TMR 手術原則：\n• TMR 為將「切斷之感覺/混合神經斷端」與「一條已切斷之運動神經 (denervated motor nerve) 的斷端」行 end-to-END coaptation，使再生軸突有新肌肉標的；B 稱「end-to-side、接於未切斷運動神經側壁」為錯誤描述。\n• 供區運動標的選擇：優先選「較小、較深、對軟組織襯墊貢獻少」的肌肉之運動支，以保留 peritibial padding 與殘肢功能 (C 正確)。\n• CRPS（符合 Budapest criteria）並非 TMR 的「絕對禁忌」；TMR/周邊神經手術對部分 CRPS 疼痛仍可能有幫助，D 錯誤。\n• 防止「axonal escape」：可將 coaptation 錨定於標的肌肉的神經肌肉接合處，或以 free muscle graft 包覆 coaptation 形成 TMR＋RPNI 合併效果 (E 正確)。\n■ 故正確為 ACE。", "peropt": {"A": "◎ 神經阻斷後疼痛 >50% 緩解為診斷症狀性神經瘤與篩選手術候選者的重要標準。", "B": "錯誤：TMR 為 end-to-end coapt 至已切斷之運動神經斷端，而非接於未切斷運動神經側壁。", "C": "◎ 應優先選較小、較深、對軟組織襯墊貢獻少的肌肉運動支，以保留 peritibial padding。", "D": "錯誤：CRPS 並非 TMR 的絕對禁忌，部分病人仍可獲益。", "E": "◎ 可將 coaptation 錨定於神經肌肉接合處，或以 free muscle graft 包覆形成 TMR＋RPNI 以防 axonal escape。"}, "cite": "Dumanian/Souza TMR; Budapest CRPS criteria; Grabb & Smith 9e", "conflict": ""}, {"id": "7085", "sub": "LGA", "src": "NG", "years": [115], "stem": "When foot infection or ischemia is too severe for limb salvage, a high-quality \"functional below-knee amputation (BKA)\" can significantly improve the patient's postoperative ambulation and survival rates. Regarding BKA surgical decision-making, flap design, and nerve/bone management techniques, which of the following statements are correct? (複選)", "opts": {"A": "The use of a \"posterior myocutaneous flap (PMF)\" is strongly recommended for stump closure, as it provides durable soft-tissue coverage.", "B": "During the management of the nerve stumps, performing Targeted Muscle Reinnervation (TMR) on the saphenous, superficial peroneal, and posterior tibial nerves significantly reduces postoperative residual limb pain and phantom limb pain.", "C": "To enhance the stability of end-bearing and the transfer of rotational torque to the prosthesis, an Ertl modification can be performed, which utilizes a \"vascularized tibial bone graft\" to transversely bridge the gap between the tibia and fibula.", "D": "For patients with severe acute infections or gas gangrene, to shorten the hospital stay and minimize the number of surgeries, a \"one-stage\" definitive BKA with immediate primary closure is the preferred choice.", "E": "When performing the bony resections for a BKA, the fibula should be cut approximately 1.5 to 2 cm shorter than the tibia, and its distal end should be beveled from lateral to medial to avoid creating a bony prominence."}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【考點：功能性 BKA 手術決策、皮瓣設計與神經/骨處理】\n■ 皮瓣設計：強烈建議採「posterior myocutaneous flap (PMF, Burgess 長後皮瓣)」，以腓腸肌後側肌皮瓣提供耐用、血運佳的殘端軟組織覆蓋 (A 正確)。\n■ 神經處理：對 saphenous、superficial peroneal、posterior tibial（及 sural、deep peroneal）神經行 TMR，可顯著降低術後殘肢痛 (RLP) 與幻肢痛 (PLP) (B 正確)。\n■ 骨處理：\n• Ertl modification（osteomyoplasty）以「骨膜/骨橋」在脛腓骨遠端間建立 tibiofibular synostosis（骨橋），增加末端承重穩定與旋轉扭力傳遞；C 稱「vascularized tibial bone graft 橫向橋接」描述不精確（Ertl 用骨膜成骨的骨橋，非取一段活體脛骨移植），故 C 錯誤。\n• 標準骨切：fibula 應比 tibia 短約 1.5–2 cm，脛骨前緣需做斜切 (anterior bevel)，腓骨遠端亦削斜以避免骨突 (E 敘述之腓骨處理正確)。\n■ 感染/氣性壞疽：應行「分階段」清創與開放處理，不可一階段一期縫合，D 錯誤。\n■ 故正確為 ABE。", "peropt": {"A": "◎ 建議採 posterior myocutaneous flap（長後皮瓣）提供耐用血運佳的殘端覆蓋。", "B": "◎ 對 saphenous、superficial peroneal、posterior tibial 等神經行 TMR 可顯著減少 RLP 與 PLP。", "C": "錯誤：Ertl 為以骨膜/骨橋建立脛腓 synostosis，非「取一段 vascularized tibial bone graft 橫向橋接」的描述。", "D": "錯誤：嚴重感染/氣性壞疽應分階段清創與開放處理，不可一階段一期縫合。", "E": "◎ 腓骨較脛骨短 1.5–2 cm，其遠端由外向內削斜以避免骨突，處理正確。"}, "cite": "Burgess long posterior flap; Ertl osteomyoplasty; Grabb & Smith 9e Amputation", "conflict": ""}, {"id": "7086", "sub": "LGA", "src": "NG", "years": [115], "stem": "What is the typical distribution pattern of sensory neuropathy in patients with diabetic foot?", "opts": {"A": "Dermatomal distribution", "B": "Glove and stocking distribution", "C": "Proximal to distal distribution", "D": "Random asymmetric distribution", "E": "Single nerve root distribution"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：糖尿病足周邊感覺神經病變分布型態】\n■ Diabetic peripheral neuropathy 為長度依賴型 (length-dependent) 對稱性多發神經病變 (distal symmetric polyneuropathy)：\n• 最長的神經纖維最早受累，故由「肢體最遠端」對稱地向近端進展。\n• 典型呈「手套-襪套 (glove and stocking) 分布」— 先足趾/足部，較晚才影響手部。\n■ 病理：高血糖致 polyol pathway、AGEs、microvascular（vasa nervorum）缺血→軸突退化。\n■ 臨床意義：保護性感覺喪失 (loss of protective sensation, LOPS) 是足潰瘍與 Charcot 的重要危險因子，需以 10-g Semmes-Weinstein monofilament 篩檢。\n■ 故答案為 B（glove and stocking distribution）；dermatomal、單一神經根或隨機不對稱型皆非典型糖尿病神經病變。", "peropt": {"A": "Dermatomal 分布屬神經根病變，非糖尿病對稱性多發神經病變的表現。", "B": "◎ 糖尿病足感覺神經病變呈長度依賴的手套-襪套 (glove and stocking) 對稱分布。", "C": "「近端到遠端」方向相反；糖尿病神經病變是由遠端向近端進展。", "D": "隨機不對稱型多見於血管炎/多發性單神經炎，非典型糖尿病多發神經病變。", "E": "單一神經根分布屬 radiculopathy，非糖尿病對稱性多發神經病變。"}, "cite": "IWGDF; Grabb & Smith 9e Diabetic foot; distal symmetric polyneuropathy", "conflict": ""}, {"id": "7087", "sub": "LGA", "src": "NG", "years": [115], "stem": "Total contact casting (TCC) is the gold standard for off-loading. What is a major clinical limitation of this device?", "opts": {"A": "It increases peak plantar pressure.", "B": "It allows excessive ankle joint mobility.", "C": "It accommodates severe daily leg swelling.", "D": "It impairs daily visual inspection of the wound.", "E": "It is easily removed by non-compliant patients."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：Total Contact Cast (TCC) 減壓的臨床限制】\n■ TCC 為神經病變性糖尿病足潰瘍 off-loading 的黃金標準：\n• 以全接觸石膏將壓力重新分布至整個足與小腿，顯著「降低」前足/中足潰瘍的 peak plantar pressure，並強制病人遵從（不可自行移除）。\n■ 主要臨床限制：\n• 石膏封閉包覆使「無法每日直接檢視傷口 (impairs daily visual inspection)」，可能延誤發現感染惡化或新壓瘡；此為最主要限制 (D 正確)。\n• 其他缺點：需技術純熟者施作、包覆下若滲液/腫脹變化可能造成新的摩擦傷、行走平衡與睡眠不便。\n■ 駁斥其他：A 錯（TCC 是降低而非增加峰值壓力）；B 錯（其固定腳踝、限制活動）；C 錯（不佳，若嚴重每日腫脹反而是使用禁忌/需重打）；E 錯（TCC 為 non-removable，正因病人無法自行移除才確保遵從）。", "peropt": {"A": "✗ TCC 是降低而非增加 peak plantar pressure。", "B": "✗ TCC 固定並限制踝關節活動，而非允許過度活動。", "C": "✗ 嚴重每日腿部腫脹反而是 TCC 的使用限制/禁忌，需重新打石膏。", "D": "◎ TCC 封閉包覆使無法每日直接檢視傷口，為其主要臨床限制。", "E": "✗ TCC 為不可移除裝置，病人無法自行移除正是其確保遵從的優點。"}, "cite": "IWGDF offloading guidelines; Grabb & Smith 9e Diabetic foot", "conflict": ""}, {"id": "7088", "sub": "LGA", "src": "NG", "years": [115], "stem": "Following this specific level of partial foot amputation, the residual foot is at a high risk for developing a predictable biomechanical deformity due to the loss of both the long digital extensor tendons and the insertion of the peroneus brevis tendon. If prophylactic soft-tissue balancing is not performed, which of the following deformities is most commonly anticipated?", "opts": {"A": "Rigid calcaneovalgus deformity", "B": "Flexible pes planus (flatfoot)", "C": "Equinovarus deformity", "D": "Forefoot supinatus", "E": "Isolated dorsal contracture"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：部分足截肢後可預期的生物力學畸形 — Chopart／Lisfranc level】\n■ 題幹關鍵：喪失「long digital extensor tendons」與「peroneus brevis 止點」→ 指向 Chopart (midtarsal) 或 tarsometatarsal 高位部分足截肢。\n■ 肌力失衡機轉：\n• 失去 extensor digitorum longus／tibialis anterior 的背屈力 → 後方 gastrocsoleus (Achilles) 相對無拮抗 → equinus（馬蹄，蹠屈）。\n• 失去 peroneus brevis 的外翻力 → tibialis posterior 相對無拮抗 → varus（內翻）。\n→ 合併為「equinovarus deformity」，殘足呈蹠屈內翻，導致外側殘端過度承重與潰瘍 (C 正確)。\n■ 預防：需行預防性軟組織平衡 — 阿基里斯腱延長 (TAL/gastrocnemius recession) 及肌腱轉位（如 tibialis anterior 轉位）以對抗畸形。\n■ 駁斥：A calcaneovalgus、B pes planus、D forefoot supinatus、E 單純背側攣縮 均非此肌力失衡的典型結果。", "peropt": {"A": "✗ Rigid calcaneovalgus 與此肌力失衡方向相反，非預期畸形。", "B": "✗ Flexible pes planus 非高位部分足截肢後的典型肌力失衡結果。", "C": "◎ 失去背屈與外翻力，後方跟腱與 tibialis posterior 無拮抗，形成 equinovarus deformity。", "D": "✗ Forefoot supinatus 為前足代償變化，非此截肢後的主要可預期畸形。", "E": "✗ 單純背側攣縮不符；主要問題為 equinus（蹠屈）合併 varus。"}, "cite": "Grabb & Smith 9e Partial foot amputation; Chopart biomechanics", "conflict": ""}, {"id": "7089", "sub": "LGA", "src": "NG", "years": [115], "stem": "According to the 2019 International Working Group on the Diabetic Foot (IWGDF) practical guidelines, offloading interventions are vital to promote the healing of diabetic foot ulcers. What is the first-choice offloading treatment for neuropathic forefoot or midfoot ulcers?", "opts": {"A": "Removable ankle-high offloading devices.", "B": "Custom-molded therapeutic footwear with felted foam.", "C": "Non-removable knee-high offloading devices.", "D": "Removable knee-high offloading devices.", "E": "Surgical offloading interventions involving metatarsal head resection."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【考點：2019 IWGDF 減壓指引 — 神經病變性前/中足潰瘍首選】\n■ 2019 IWGDF (International Working Group on the Diabetic Foot) 減壓 (offloading) 建議層級：\n• 第一線（首選）：「non-removable knee-high offloading device」— 即 Total Contact Cast (TCC) 或改為不可移除的 knee-high walker。因不可移除，確保病人遵從性，減壓效果與癒合率最佳。\n• 第二線：若有禁忌（如感染、缺血、無法接受）→ 改用 removable knee-high device。\n• 第三線：removable ankle-high device。\n• 治療性鞋具、felted foam、手術減壓（如蹠骨頭切除）為輔助或難治/復發個案的選項。\n■ 故神經病變性前足/中足潰瘍的首選為 C（non-removable knee-high offloading device）。\n■ 駁斥：A、D 為次選（可移除或 ankle-high）；B 為輔助；E 為手術性減壓，非第一線非手術首選。", "peropt": {"A": "✗ Removable ankle-high device 為第三線，非首選。", "B": "✗ Custom footwear ＋ felted foam 為輔助手段，非第一線減壓首選。", "C": "◎ 2019 IWGDF 首選為 non-removable knee-high offloading device（TCC 或不可移除步行靴）。", "D": "✗ Removable knee-high device 為第二線（首選有禁忌時才用）。", "E": "✗ 蹠骨頭切除為手術性減壓，屬難治/復發個案選項，非第一線非手術首選。"}, "cite": "IWGDF 2019 Guidelines on offloading; Bus et al.", "conflict": ""}, {"id": "8016", "sub": "SKB", "src": "GS", "years": [115], "stem": "Which of the following statements regarding facial burn is wrong? (複選)", "opts": {"A": "The thin skin of the face commonly results in deeper burn injuries", "B": "Full-thickness facial burns should be grafted with full-thickness skin", "C": "Treatment of full-thickness facial burns with grafting should be delayed until all healing and contraction have completed", "D": "Initial treatment of face burns should not include resecting normal adjacent skin", "E": "Indeterminate facial burns should be excised and grafted within the first few days after injury."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：顏面燒傷『錯誤』敘述（複選）。核心：以正確原則反推——顏面應保留原生皮膚、以厚 STSG sheet 依美觀單位重建、且 indeterminate 者先觀察 10–14 天再決定。① A 錯：臉部血循佳、附屬構造多，非因皮薄而必然更深。② B 錯：full-thickness 顏面燒傷用厚 STSG 而非 FTSG。③ C 錯：不應延遲至全部癒合攣縮完成才植皮。④ E 錯：indeterminate 顏面燒傷不宜在傷後數日內即切除植皮，應先給予非手術觀察 10–14 天。⑤ D 為『正確』敘述（初期不切除鄰近正常皮膚），故不選。", "peropt": {"A": "◎ （錯誤敘述）。臉部血循佳，非因皮薄而普遍更深。", "B": "◎ （錯誤敘述）。full-thickness 顏面燒傷用厚 STSG，非 FTSG。", "C": "◎ （錯誤敘述）。不應延遲至全部癒合與攣縮完成才植皮。", "D": "✗ 錯（此為正確敘述，故不選）。顏面燒傷初期本就不應切除鄰近正常皮膚。", "E": "◎ （錯誤敘述）。Indeterminate 顏面燒傷應先觀察 10–14 天，不宜傷後數日內即切除植皮。"}, "cite": "Grabb & Smith 9e, Facial Burn Management", "conflict": ""}, {"id": "8017", "sub": "SKB", "src": "GS", "years": [110, 115], "stem": "下列哪個病人最適合做sentinel lymph node biopsy (SLNB)?", "opts": {"A": "50歲男性，有一個4公分直徑大小的BCC合併lymphovascular invasion", "B": "80歲女性在左足跟有1公分直徑大小的melanoma, thickness 1.0mm而且在左側鼠蹊部摸到一個 2公分的 lymph node", "C": "4歲男童在臉上有一塊 10公分直徑大小的congenital melanocytic nevus", "D": "67歲男性在右食指有0.5公分直徑大小的melanoma，厚度1.5mm", "E": "42歲女性，在背部有一塊 0.8公分直徑大小的 melanoma，厚度 0.6mm 且無潰瘍"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Melanoma SLNB 最佳適應病人（含更多干擾選項）。核心原則同 8000：SLNB 用於 Breslow >0.8 mm、臨床淋巴結陰性之 melanoma。① D：食指 1.5 mm (T2)、node-negative，最符合適應症。② E：背部 0.6 mm、無潰瘍 (T1a, <0.8 mm)，轉移風險極低，一般不做 SLNB。③ B：已有可觸腫大淋巴結，應直接廓清。④ A BCC 不做 SLNB；C 良性 CMN 不做。", "peropt": {"A": "✗ BCC 極少淋巴轉移，非 SLNB 適應症。", "B": "✗ 已可觸得 2 cm 腫大淋巴結(clinically node-positive)，應行淋巴結廓清而非 SLNB。", "C": "✗ congenital melanocytic nevus 為良性，無 nodal staging 需求。", "D": "◎ 。1.5 mm (T2)、臨床淋巴結陰性，最符合 SLNB 標準適應症。", "E": "✗ 0.6 mm 無潰瘍 (T1a, <0.8 mm)，轉移風險極低，一般不建議 SLNB。"}, "cite": "Grabb & Smith 9e, Melanoma; AJCC 8th / NCCN SLNB 適應症", "conflict": "跨年選項數不同，視為不同題（對照 GS110-B04-Q01） ｜ ⚠ 同題歷屆重出：「下列哪個病人最適合做SLNB」。110年(8000)與115年(8017)皆答D，完全同題（依Breslow厚度/潰瘍判定SLNB適應症）。"}, {"id": "8018", "sub": "SKB", "src": "GS", "years": [115], "stem": "A 47-year-old, 50-kg otherwise healthy woman presents to the trauma bay with 55% total body surface area burns to the chest, back, and extremities. She has an additional 10% TBSA of first-degree burns. Pulses are intact and extremities are warm. The burns are pink and blanching, but bullae are present in most areas. The patient was given 2L of Lactated Ringer's (LR) in the field over the last 2 hours since sustaining the burn. What is the recommended initial rate of resuscitation for this patient?", "opts": {"A": "300 mL/h", "B": "343.75 mL/h", "C": "472 mL/h", "D": "583.3 mL/h", "E": "687.5 mL/h"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：燒傷輸液復甦速率計算（Parkland formula 併已輸液調整）。核心：本題採 Parkland 4 mL/kg/%TBSA。①TBSA 只計 partial+full thickness(=55%)，first-degree(10%) 不計。②總量 = 4 × 50 kg × 55 = 11,000 mL/24h；前 8 小時給一半 = 5,500 mL。③病人受傷已 2 小時、院前已給 2,000 mL LR，故前 8 小時剩餘 5,500 − 2,000 = 3,500 mL，須在剩餘 6 小時內給完。④速率 = 3,500 ÷ 6 ≈ 583.3 mL/h。（註：若忽略已輸液與時間，5,500÷8=687.5 為干擾選項 E；2 mL 版本 343.75 為選項 B。）", "peropt": {"A": "✗ 300 mL/h 過低，不符任何版本計算；本題正確速率應為 583.3 mL/h。", "B": "✗ 343.75 mL/h 為 2 mL/kg/%TBSA 版本且未扣除已輸液，非本題採用。", "C": "✗ 472 mL/h 非正確結果；扣除院前已給 2,000 mL 後於剩餘 6h 給 3,500 mL，正確為 583.3 mL/h。", "D": "◎ 。Parkland 前 8h 需 5,500 mL，扣除已給 2,000 mL 後於剩餘 6h 給 3,500 mL ≈ 583.3 mL/h。", "E": "✗ 687.5 mL/h(=5,500÷8) 未扣除已輸液與已過時間，為常見陷阱。"}, "cite": "Grabb & Smith 9e, Burn Resuscitation (Parkland formula)", "conflict": ""}, {"id": "8019", "sub": "SKB", "src": "GS", "years": [110, 115], "stem": "下列何種雷射最適合用來治療erythematous but not hypertrophic burn scar?", "opts": {"A": "Pulse dye laser", "B": "Alexandrite laser", "C": "CO2 laser", "D": "erbium:YAG laser", "E": "Nd:YAG laser"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：紅色但未肥厚(erythematous, non-hypertrophic)燒傷疤痕的雷射選擇（與 8002 同核心）。核心：紅斑之發色團為 hemoglobin，pulsed dye laser (585/595 nm) 藉 selective photothermolysis 靶向血管、消退紅斑，為首選。消融型(CO2、Er:YAG)與 Nd:YAG、Alexandrite 皆非單純紅斑之最適選擇。", "peropt": {"A": "◎ 。Pulsed dye laser 靶向 hemoglobin，最適紅色未肥厚疤痕。", "B": "✗ Alexandrite laser 波長 755 nm，主要用於除毛/色素性病灶，非紅斑(hemoglobin)血管靶向。", "C": "✗ CO2 laser 波長 10,600 nm，為 ablative 雷射用於肥厚性疤痕/質地重塑，非單純紅斑。", "D": "✗ Er:YAG laser 波長 2,940 nm，為 ablative resurfacing，非血管/hemoglobin 靶向；紅斑首選仍為 PDL(585/595 nm)。", "E": "✗ Nd:YAG 波長 1,064 nm 穿透深、常用於深層血管/除毛，非淺層紅斑首選（首選為 PDL 585/595 nm）。"}, "cite": "Grabb & Smith 9e, Laser Treatment of Burn Scars", "conflict": "跨年選項數不同，視為不同題（對照 GS110-B04-Q03） ｜ ⚠ 同題歷屆重出：「何種雷射最適合治療erythematous but not hypertrophic burn scar」。110年(8002)與115年(8019)皆答A，完全同題（PDL / pulsed-dye laser）。"}, {"id": "8020", "sub": "SKB", "src": "GS", "years": [115], "stem": "Which of the following is not a clinical diagnostic feature of dysplastic nevi?", "opts": {"A": "Diameter > 5 mm", "B": "Ill-defined borders", "C": "Dark pigmentation", "D": "Irregular margins", "E": "Ulceration"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Dysplastic (atypical) nevus 的臨床診斷特徵中『不屬於』者。核心特徵：① 直徑常 >5 mm；② 邊界模糊不清(ill-defined borders)；③ 邊緣不規則(irregular margins)；④ 色澤『多變/斑駁(variegated)』而非單一深色。故『dark pigmentation(均一深色)』並非其診斷特徵——正解 C（dysplastic nevus 強調 variegated color 而非均勻深色）。⚠答案疑義：ulceration(E) 屬 melanoma 之警訊、亦非 dysplastic nevus 特徵，嚴格而言 C、E 皆可視為『非特徵』，本題屬設計上有雙解爭議；惟依權威答案以 C 為準。", "peropt": {"A": "✗ 正確特徵，dysplastic nevus 常直徑 >5 mm。", "B": "✗ 正確特徵，邊界模糊不清(ill-defined borders)。", "C": "◎ （非特徵）。dysplastic nevus 強調 variegated/多變色澤而非均一 dark pigmentation。", "D": "✗ 正確特徵，邊緣不規則(irregular margins)。", "E": "✗ Ulceration 為 melanoma 警訊，嚴格說亦非 dysplastic nevus 特徵（與 C 形成雙解爭議，但權威答案取 C）。"}, "cite": "Neligan 5e / Grabb & Smith 9e, Dysplastic (Atypical) Nevus", "conflict": ""}, {"id": "8021", "sub": "SKB", "src": "GS", "years": [115], "stem": "A 6-week-old girl presents with a rapidly enlarging red lesion of her cheek that was first noted at 2 weeks of age. Which of the following is the most likely diagnosis?", "opts": {"A": "Infantile hemangioma", "B": "Kaposiform hemangioendothelioma", "C": "Venous malformation", "D": "Arteriovenous malformation"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：嬰兒血管病灶之鑑別——出生後數週出現、快速增大的紅色病灶。核心：① Infantile hemangioma (IH) 典型於出生後 1–4 週出現，接著進入 proliferative phase 快速增生（6 週齡、2 週前才被注意到、迅速變大之紅色頰部病灶最符合）。② IH 免疫組化 GLUT-1 陽性。③ KHE 較罕見、多出生即較大並可合併 KMP；venous malformation 出生即存在、緩慢生長；AVM 為 fast-flow，非此典型表現。", "peropt": {"A": "◎ 。Infantile hemangioma 出生後數週出現並快速增生，符合此病史。", "B": "✗ Kaposiform hemangioendothelioma 較罕見、常出生即存在並可合併 Kasabach-Merritt。", "C": "✗ Venous malformation 出生即存在、緩慢生長，非快速增大之紅色病灶。", "D": "✗ AVM 為 fast-flow 畸形，非此典型嬰兒快速增大紅斑表現。"}, "cite": "Neligan 5e, Infantile Hemangioma (proliferative phase, GLUT-1+)", "conflict": ""}, {"id": "8074", "sub": "SKB", "src": "NG", "years": [109, 111, 112, 113, 114], "stem": "何處是毛髮基質瘤pilomatrixomas最好發的地方？", "opts": {"A": "腳底", "B": "臀部", "C": "手掌", "D": "臉頰及眼眶周圍", "E": "以上皆非"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯【毛髮基質瘤 pilomatrixoma（calcifying epithelioma of Malherbe）好發部位】\n- **最好發：頭頸部，尤其臉頰及眼眶周圍（head & neck）**，其次上肢。\n- **臨床**：兒童及年輕成人常見，質硬、可鈣化之皮下結節，『tent sign』（撐起皮膚呈多角面）。\n- **病理**：源自毛囊matrix細胞，**basaloid cells＋shadow/ghost cells**，常見鈣化及骨化，**CTNNB1 (β-catenin)** 突變相關。\n- 屬良性，治療為完整切除。", "peropt": {"A": "✗ 腳底非pilomatrixoma好發部位。", "B": "✗ 臀部非好發部位。", "C": "✗ 手掌非好發部位（掌蹠無毛囊）。", "D": "◎ 臉頰及眼眶周圍等頭頸部為pilomatrixoma最好發處，正解。", "E": "✗ 既有明確好發部位（頭頸部），非『以上皆非』。"}, "cite": "Neligan 5e, Vol.3 Benign Skin Adnexal Tumors；Grabb & Smith 9e Skin Lesions", "conflict": "選項重排家族：與 NG113-B09-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG111-B09-Q07） ｜ ⚠ 同題歷屆重出：「毛髮基質瘤(pilomatrixoma)最好發部位」。109/112/114年(8074)、111年(8093)、113年(8106)皆答D（頭頸部），完全同題連年重出。"}, {"id": "8082", "sub": "SKB", "src": "NG", "years": [110, 112, 114], "stem": "關於Vascular tumor and vascular anomalies何者正確?", "opts": {"A": "Infantile hemangioma is the most common vascular malformation of infancy", "B": "Infantile hemangiomas are present at birth, although not always obvious; they may slowly enlarge during childhood and adolescence", "C": "Infantile hemangioma grows rapidly, slowly regresses, and never recurs", "D": "Glucose transporter 2 (GLUT-2) is the marker for infantile hemangioma", "E": "The standard treatment for Infantile hemangioma is laser treatment"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【血管腫瘤 vs 血管畸形—找『正確』】\n- **C對**：Infantile hemangioma (IH) 典型病程為**快速增生（proliferation）→緩慢自然消退（involution）→不復發**，屬經典描述。\n- **各錯項辨正**：\n  - **A錯**：IH是嬰兒期最常見之**血管腫瘤（tumor）**，非『malformation』（分類用詞錯誤）。\n  - **B錯**：IH**出生時多不明顯，通常出生後數週才出現**並快速增生；先天存在且不增生者為congenital hemangioma（RICH/NICH）。\n  - **D錯**：IH標記為**GLUT-1**（陽性），非GLUT-2。\n  - **E錯**：IH標準治療為**口服propranolol（β-blocker）**，非雷射為主。", "peropt": {"A": "✗ IH為嬰兒期最常見『血管腫瘤』非malformation，用詞錯誤。", "B": "✗ IH出生時多不明顯、生後數週才出現並快速增生，非緩慢終生增大，錯誤。", "C": "◎ IH快速增生、緩慢消退、不復發，為經典病程描述，正確。", "D": "✗ IH標記為GLUT-1非GLUT-2，錯誤。", "E": "✗ IH標準治療為口服propranolol，非雷射，錯誤。"}, "cite": "Neligan 5e, Vol.3 Vascular Anomalies（ISSVA分類）；Grabb & Smith 9e", "conflict": ""}, {"id": "8098", "sub": "SKB", "src": "NG", "years": [109, 111, 112, 113, 114], "stem": "關於先天性黑色素痣(congenital melanocytic nevi)的描述何者錯誤？(複選)", "opts": {"A": "先天性黑色素痣大約在胚胎24週以後才開始形成", "B": "先天性黑色素痣和後天性黑色素痣(acquired nevi)在組織學上並沒有差異", "C": "眼睛周圍的先天痣切除時有時候可以保留部分的病灶作為aesthetic landmark，例如眉毛", "D": "先天性巨大黑色素痣最常見的部位在背後(posterior trunk)", "E": "先天性巨大(large or giant)黑色素痣建議在6個月大的時候就可以開始治療"}, "ans": "AB", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：Congenital melanocytic nevi（CMN，先天性黑色素痣）錯誤敘述（複選，正解AB）\n- **A錯誤**：CMN於**胚胎早期（黑色素母細胞遷移期，約妊娠6~24週間）**形成，敘述「24週以後才開始形成」不正確。\n- **B錯誤**：CMN與acquired nevi在**組織學上有差異**——CMN的痣細胞**分佈更深（真皮深層、皮下）、圍繞附屬器（毛囊、汗腺、皮脂腺、血管神經）並穿插於膠原束之間**，非「無差異」。\n- **C正確**：眼周先天痣切除時可保留部分病灶作**美學地標（如眉毛）**。\n- **D正確**：先天性巨大黑色素痣**最好發於posterior trunk（後背）**，常呈bathing trunk分佈。\n- **E正確**：大型/巨大CMN可考慮**約6個月大開始治療**（麻醉風險與惡性風險權衡）。", "peropt": {"A": "◎ 錯誤：CMN形成於胚胎早期黑色素母細胞遷移階段，非24週後才開始。", "B": "◎ 錯誤：CMN與後天痣組織學有別（分佈更深、繞附屬器、穿插膠原）。", "C": "✗ 眼周先天痣可保留部分作美學地標（如眉毛），正確故非錯誤選項。", "D": "✗ 巨大CMN最好發於後背（posterior trunk），正確故非錯誤選項。", "E": "✗ 大型/巨大CMN約6個月大可開始治療，正確故非錯誤選項。"}, "cite": "Neligan Plastic Surgery, Congenital Melanocytic Nevi（此為選項重排家族題，記概念勿背字母）", "conflict": "選項重排家族：與 NG113-B09-Q09 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出：「先天性黑色素痣(CMN)描述何者錯誤(複選)」中文複選。109/111年(8072)答BC、112/114年(8098)答AB、113年(8107)答AB；同一複選題連年重出，選項排列不同致答案略異。注意英文版(8083)與「何者正確」版另計不併。（★8072之BC與8098/8107之AB差異較大，建議人工再核對選項）"}, {"id": "8099", "sub": "SKB", "src": "NG", "years": [112, 114], "stem": "Which of the following statements regarding soft-tissue sarcoma reconstructions is incorrect?", "opts": {"A": "Sarcomas in the lower extremity are more common than in the upper limb.", "B": "Radiation is considered a predisposing factor for soft-tissue sarcomas. Over 80% of radiation-associated sarcomas are low-grade types.", "C": "Any lesion in the lower extremity with a clinical history of pain, continuous growth, size over 5 cm, or deep subfascial localization is suspicious of a sarcomatous malignancy and should be surgically biopsied according to established surgical rules", "D": "To date, no other treatment modality provides better cure for sarcomas than adequate surgery.", "E": "Radiotherapy is the primary adjunctive treatment method in sarcoma management today."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Soft-tissue sarcoma重建錯誤敘述（正解B）\n- **A正確**：下肢sarcoma較上肢常見。\n- **B錯誤**：放射線確為誘發因子，但**radiation-associated sarcoma絕大多數為high-grade（高惡性度）**，而非「超過80%為low-grade」。此為關鍵陷阱。\n- **C正確**：下肢病灶有疼痛/持續生長/>5 cm/深層subfascial定位須依sarcoma原則切片。\n- **D正確**：迄今無治療優於adequate surgery之治癒效果。\n- **E正確**：radiotherapy為現今主要輔助治療方式。", "peropt": {"A": "✗ 下肢sarcoma較上肢常見，正確。", "B": "◎ 錯誤：radiation-associated sarcoma多為high-grade，非80%以上為low-grade。", "C": "✗ 下肢可疑病灶依sarcoma原則切片，正確。", "D": "✗ 無治療優於適當手術之治癒效果，正確。", "E": "✗ 放療為現今主要輔助治療，正確。"}, "cite": "Neligan Plastic Surgery, Soft-Tissue Sarcoma: Radiation-Associated Sarcoma (high-grade)", "conflict": ""}, {"id": "8109", "sub": "SKB", "src": "NG", "years": [114], "stem": "有高度危險性淋巴腺轉移的Melanoma病人，底下何種步驟已成為Standard of Care？", "opts": {"A": "Elective lymph node dissection", "B": "Sentinel Node Biopsy", "C": "Therapeutic lymphadenectomy", "D": "Chemotherapy"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：高危險淋巴結轉移melanoma之standard of care（正解B）\n- **Sentinel Lymph Node Biopsy (SLNB)** 已取代elective lymph node dissection，成為**中厚度melanoma淋巴結分期的standard of care**（提供精準分期與預後資訊，降低不必要之全淋巴廓清併發症）。\n- **技術**：術前lymphoscintigraphy（Tc-99m）＋術中isosulfan/methylene blue藍染定位。\n- **意義**：SLN陽性者可進一步評估（現代趨勢：多以nodal ultrasound surveillance取代immediate completion lymphadenectomy，並考慮adjuvant systemic therapy）。\n- A（ELND）已被淘汰；C（therapeutic lymphadenectomy）用於臨床已明顯轉移者；D（chemotherapy）非melanoma分期之standard步驟。", "peropt": {"A": "✗ Elective lymph node dissection已被SLNB取代，非現行standard of care。", "B": "◎ Sentinel Node Biopsy為高危險淋巴結轉移melanoma之標準分期步驟。", "C": "✗ Therapeutic lymphadenectomy用於臨床已明顯淋巴轉移者，非此情境之標準分期步驟。", "D": "✗ Chemotherapy對melanoma療效有限，非分期standard步驟。"}, "cite": "Neligan Plastic Surgery, Melanoma: Sentinel Lymph Node Biopsy", "conflict": ""}, {"id": "8110", "sub": "SKB", "src": "NG", "years": [104, 105, 114], "stem": "關於 melanoma 的敘述，下列何者為非？", "opts": {"A": "Sentinel lymph node biopsy is offered to patients with melanomas >1 mm in thickness, and patients with thin melanomas (≤ 1 mm thick) that demonstrate high-risk features.", "B": "Initial workup of the pigmented lesion should include excisional biopsy with a 1–2-mm margin of normal-appearing skin. If functional or cosmetic concerns prohibit removal of the entire lesion, incisional or punch biopsy may be performed.", "C": "Recommended excision margins are determined by Breslow depth. In situ melanoma requires a 2-cm margin of normal-appearing skin.", "D": "Subungual melanoma of the hand should be resected at the distal interphalangeal joint to preserve function.", "E": "Serum lactate dehydrogenase is used in the American Joint Committee on Cancer staging system as it portends a worse prognosis in patients with metastatic disease."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Melanoma錯誤敘述（正解C）\n- **A正確**：SLNB適用於**>1 mm厚度**之melanoma，以及**薄型（≤1 mm）但具高危特徵**（ulceration、high mitotic rate等）者。\n- **B正確**：色素病灶初步處置為**excisional biopsy帶1~2 mm正常皮膚邊緣**；若功能/美觀考量無法全切，可incisional或punch biopsy。\n- **C錯誤（權威答案）**：切除邊緣依**Breslow depth**決定，但**melanoma in situ僅需約0.5~1 cm邊緣**，並非「2 cm」。此為關鍵陷阱。\n- **D正確**：手部subungual melanoma常於**DIP joint**截除以保功能。\n- **E正確**：**LDH**納入AJCC分期（M category），轉移性疾病中預示較差預後。", "peropt": {"A": "✗ >1mm或薄型具高危特徵者行SLNB，正確。", "B": "✗ 色素病灶以1~2mm邊緣切除性切片，必要時incisional/punch，正確。", "C": "◎ 錯誤：melanoma in situ僅需約0.5~1cm邊緣，非2cm。", "D": "✗ 手部甲下melanoma於DIP關節截除保功能，正確。", "E": "✗ LDH納入AJCC分期、預示轉移性疾病較差預後，正確。"}, "cite": "Neligan Plastic Surgery, Melanoma: Excision Margins (in situ 0.5–1 cm) / AJCC staging", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：C: 104「Recommended excision margins are determi」 vs 114「Recommended excision margins are determi」 ｜ ⚠ 同題歷屆重出：「關於melanoma的敘述，何者為非」單選。104年(8023)答C、105年(8034)答E、114年(8110)答C；同考點連年重出，選項重排致答案互異。注意複選版8081「何者為非(複選)」屬單複選型態不同，另計不併。"}, {"id": "8111", "sub": "SKB", "src": "NG", "years": [114], "stem": "底下何者為針對Melanoma之Sentinel Node Biopsy之適應症？(複選)", "opts": {"A": "Melanoma ＞ 1 mm", "B": "Clark level Ⅳ/Ⅴ", "C": "Melanoma ＞ 0.75 mm伴隨Ulceration", "D": "Melanoma ＜ 0.75 mm併Hyperpigmetation"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：Melanoma之SLN biopsy適應症（複選，正解ABC）\n- **A正確**：**Melanoma厚度>1 mm**為典型SLNB適應症。\n- **B正確**：**Clark level IV/V**（深層侵犯）屬高危特徵，為SLNB適應症之一（尤其薄型melanoma的加權指標）。\n- **C正確**：**Melanoma>0.75 mm伴ulceration**——薄型但具ulceration等高危特徵者建議SLNB。\n- **D錯誤（故不選）**：**Melanoma<0.75 mm併hyperpigmentation**——單純hyperpigmentation非公認高危特徵，且極薄型melanoma一般不建議SLNB。", "peropt": {"A": "◎ Melanoma>1mm為SLNB適應症，正確。", "B": "◎ Clark level IV/V為高危深度指標，屬SLNB適應症。", "C": "◎ >0.75mm伴ulceration之高危薄型melanoma建議SLNB，正確。", "D": "✗ <0.75mm併hyperpigmentation非公認高危特徵，不屬SLNB適應症，不選。"}, "cite": "Neligan Plastic Surgery, Melanoma: Indications for Sentinel Lymph Node Biopsy", "conflict": ""}, {"id": "8112", "sub": "SKB", "src": "NG", "years": [114], "stem": "Which of the following statements regarding tumor resection margins and management is most accurate?", "opts": {"A": "An R0 resection indicates the presence of microscopically residual tumor at the specimen margins.", "B": "An R1 resection requires revisional surgery to achieve macroscopic tumor removal only, without concern for microscopic status.", "C": "An R2 resection indicates macroscopic tumor remains after surgery, and revisional surgery aims to reduce it to at least an R1 situation.", "D": "In secondary revisional surgery, the prior tumor bed should be widely opened and inspected.", "E": "After achieving an R0 resection, adjuvant radiotherapy is always mandatory."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：腫瘤切除邊緣分級R0/R1/R2與處置（正解C）\n- **R分類定義**：**R0＝無殘存腫瘤（切緣鏡下亦陰性）**；**R1＝鏡下微觀殘存（microscopic residual）**；**R2＝肉眼可見巨觀殘存（macroscopic residual）**。\n- **C正確（權威答案）**：**R2表示術後仍有肉眼可見腫瘤殘存，再次手術目標為至少降至R1（進一步爭取R0）**。\n- **A誤**：R0應為**無**微觀殘存，非「有」。\n- **B誤**：R1為**微觀**殘存；其再手術目的並非「只求巨觀清除、不管微觀」，恰須追求鏡下陰性（R0）。\n- **D誤**：二次修整手術原則上應**連同原tumor bed整塊（en bloc）切除**，避免將舊腫瘤床「廣泛切開檢視」而造成腫瘤細胞播散/seeding。\n- **E誤**：達R0後**輔助放療並非一律強制**，須依腫瘤型別、grade、部位、邊緣等個別決定。", "peropt": {"A": "✗ R0應為無鏡下殘存腫瘤，敘述「有微觀殘存」錯誤。", "B": "✗ R1為鏡下微觀殘存，且再手術須追求鏡下陰性而非僅巨觀清除，錯誤。", "C": "◎ R2為肉眼殘存，再手術目標為至少降至R1並爭取R0，正確。", "D": "✗ 舊tumor bed應整塊切除避免播散，不宜廣泛切開檢視，錯誤。", "E": "✗ 達R0後輔助放療非一律強制，須個別化，錯誤。"}, "cite": "Surgical Oncology Principles: R0/R1/R2 Resection Classification", "conflict": ""}, {"id": "8113", "sub": "SKB", "src": "NG", "years": [114], "stem": "Which of the following are recognized predisposing factors for soft-tissue sarcomas? （複選）", "opts": {"A": "Neurofibromatosis type 1 (NF-1)", "B": "Chronic lymphedema", "C": "Polyvinyl chloride (PVC) exposure", "D": "Epstein–Barr virus (EBV) infection", "E": "Prior radiation therapy"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：Soft-tissue sarcoma之公認誘發因子（複選，正解ABCE）\n- **A正確**：**Neurofibromatosis type 1 (NF-1)**——可惡性變為**MPNST（malignant peripheral nerve sheath tumor）**。\n- **B正確**：**慢性淋巴水腫（chronic lymphedema）**——可致**lymphangiosarcoma（Stewart-Treves syndrome）**。\n- **C正確**：**Polyvinyl chloride / vinyl chloride暴露**——與**hepatic angiosarcoma**相關。\n- **E正確**：**先前放射治療（prior radiation）**——radiation-associated sarcoma（多為high-grade）。\n- **D錯誤（故不選）**：**EBV**主要與免疫抑制病人之smooth muscle tumor有關聯，但**非一般公認的soft-tissue sarcoma誘發因子**（誘答項）。", "peropt": {"A": "◎ NF-1可惡性變為MPNST，屬公認誘發因子。", "B": "◎ 慢性淋巴水腫可致lymphangiosarcoma（Stewart-Treves），屬誘發因子。", "C": "◎ PVC/vinyl chloride暴露與肝血管肉瘤相關，屬誘發因子。", "D": "✗ EBV非一般公認之soft-tissue sarcoma誘發因子，不選。", "E": "◎ 先前放射治療為公認誘發因子。"}, "cite": "Neligan Plastic Surgery, Soft-Tissue Sarcoma: Predisposing/Risk Factors", "conflict": ""}, {"id": "8114", "sub": "SKB", "src": "NG", "years": [104, 114], "stem": "關於 Inhalation injury之敘述，何者錯誤？", "opts": {"A": "口咽部有紅腫或碳粒沉著為插管指標之一。", "B": "診斷 gold standard 為flexible bronchoscopy", "C": "與相同TBSA 燒傷但無吸入性損傷的病人相比，有吸入性損傷的燒傷病人死亡率較高", "D": "若尿量維持所需輸液遠高於 Parkland formula，可能是 pulmonary edema 的徵兆。", "E": "應避免早期插管以觀察病程發展"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Inhalation injury（吸入性傷害）錯誤敘述（正解E）\n- **A正確**：口咽部**紅腫、碳粒沉著（carbonaceous sputum/soot）**、聲音沙啞、面部燒傷、鼻毛燒焦等為**插管警訊**之一。\n- **B正確**：診斷**gold standard為flexible bronchoscopy（可直接評估氣道黏膜損傷）**。\n- **C正確**：相同TBSA下，**合併吸入性損傷者死亡率顯著較高**（inhalation injury為獨立死亡預測因子）。\n- **D正確**：若**維持尿量所需輸液遠超Parkland公式預估（fluid creep/over-resuscitation）**，須警覺肺水腫等併發症。\n- **E錯誤（權威答案）**：氣道水腫常**進行性惡化**，一旦有上呼吸道阻塞徵象應**及早（early）預防性插管保護氣道**，不可為「觀察病程」而延遲插管。", "peropt": {"A": "✗ 口咽紅腫、碳粒沉著為插管指標之一，正確故非錯誤選項。", "B": "✗ 診斷gold standard為flexible bronchoscopy，正確故非錯誤選項。", "C": "✗ 相同TBSA下合併吸入性損傷死亡率較高，正確故非錯誤選項。", "D": "✗ 所需輸液遠超Parkland公式可能提示肺水腫，正確故非錯誤選項。", "E": "◎ 錯誤：氣道水腫進行性惡化，應及早預防性插管而非延遲觀察。"}, "cite": "Grabb & Smith / Neli
