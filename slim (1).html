(複選)", "opts": {"A": "Excessive skin", "B": "Sun damage", "C": "Fat herniation", "D": "Relaxation of the tarsal margin", "E": "Hollowing of the nasojugal groove"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 眼周老化之成因為多因子（本題全對，選 ABCDE）：多餘皮膚（skin excess）、日曬損傷（solar/sun damage 致彈性纖維變性）、眶脂疝出（fat herniation）、瞼板緣鬆弛（tarsal margin/canthal laxity）、以及 nasojugal groove（tear trough）凹陷。五者共同構成眼周老化外觀，故全選。", "peropt": {"A": "◎ 多餘皮膚為眼周老化成因。", "B": "◎ 日曬損傷致皮膚彈性變性，為成因。", "C": "◎ 眶脂疝出（眼袋）為成因。", "D": "◎ 瞼緣/canthal 鬆弛為成因。", "E": "◎ Nasojugal groove（tear trough）凹陷為成因。"}, "cite": "待複查（Neligan 眼周老化成因 記憶佐證）", "conflict": ""}, {"id": "5241", "sub": "AES", "src": "NG", "years": [112, 113, 114, 115], "stem": "Key surgical steps of endoscopic brow lifting, which is wrong?", "opts": {"A": "Blunt supraperiostal dissection over deep temporal fascia and frontal bone down to the supraorbital rim", "B": "Meticulous division and spreading of the supraorbital rim periosteum under endoscopic visualization", "C": "Corrugator muscle resection under endoscopic visualization", "D": "Fixation in the temporal and paramedian wounds.", "E": "Sentinel vein identifies a standard landmark for the frontal branch of the facial nerve"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 內視鏡提眉關鍵步驟(選錯誤)。正解A為誤述：於frontal bone的剝離應為『subperiosteal(骨膜下)』而非supraperiosteal;顳側則沿deep temporal fascia上方剝離。正確步驟：內視鏡下分離眶上緣骨膜、切除corrugator、於顳側與paramedian固定、以sentinel vein作為frontal branch的標準地標。", "peropt": {"A": "◎ ，錯誤敘述) 於 frontal bone 之剝離應為『subperiosteal(骨膜下)』而非 supraperiosteal；顳側則沿 deep temporal fascia 淺面剝離，敘述有誤故選。", "B": "✗ 正確：內視鏡下細緻分離眶上緣骨膜。", "C": "✗ 正確：內視鏡下切除corrugator muscle。", "D": "✗ 正確：於顳側與paramedian傷口固定。", "E": "✗ 正確：sentinel vein為facial nerve frontal branch的標準定位地標。"}, "cite": "待複查（Neligan 內視鏡提眉 記憶佐證）", "conflict": ""}, {"id": "5244", "sub": "AES", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which structure is belonging the Musculo-aponeurotic layer (layer 3)? (複選)", "opts": {"A": "Galea", "B": "Temporoparietal (superficial temporal) fascia", "C": "Orbicularis fascia", "D": "SMAS", "E": "Platysma"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面第三層（musculo-aponeurotic layer，複選）：layer 3 為連續的肌肉腱膜層，涵蓋 galea、temporoparietal（superficial temporal）fascia、orbicularis fascia、SMAS、platysma，故 ABCDE 皆屬之。臨床意義：此層即 SMAS 的顱面連續體，是拉皮操作與神經深淺定位的關鍵層次。", "peropt": {"A": "◎ galea 為 layer 3（頭皮段）。", "B": "◎ temporoparietal（superficial temporal）fascia 為 layer 3（顳區段）。", "C": "◎ orbicularis fascia 屬 layer 3。", "D": "◎ SMAS 為 layer 3 核心。", "E": "◎ platysma 為 layer 3（頸段延續）。"}, "cite": "待複查（Neligan SMAS 層次 記憶佐證）", "conflict": ""}, {"id": "5245", "sub": "AES", "src": "NG", "years": [112, 114, 115], "stem": "Which statement is wrong about the complication of facelift? (複選)", "opts": {"A": "Simultaneous open neck surgery, patients taking platelet inhibitor such as aspirin and antiinflammatories, hypertension have positive association with complications.", "B": "The great auricular nerve is the major sensory nerve at greatest risk for damage during facelift surgery.", "C": "The most commonly injured branches are buccal branches, and long-term sequelae are common due to lack of collateral support.", "D": "Hematoma, unsatisfactory scars, alopecia, skin loss and infection are all complications after facelift.", "E": "Damaged temporal branches will lead to numbness of the lateral portion of the external ear as well as skin anterior and posterior to the ear."}, "ans": "CE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Facelift 併發症（本題選『錯誤』者，正解 CE）：C 錯——最常受傷的運動支雖是 buccal branch，但因交通支豐富『長期後遺症少見』，非『缺乏側支、後遺症常見』；E 錯——temporal branch 為『運動支』（支配額肌），其損傷造成抬眉無力而非耳周麻木；耳周麻木屬 great auricular nerve（感覺）損傷。A（危險因子）、B（great auricular 最易受傷感覺神經）、D（併發症列舉）皆為正確敘述。", "peropt": {"A": "✗（正確敘述）同時頸部手術、服用抗血小板藥、高血壓與併發症正相關。", "B": "✗（正確敘述）Great auricular nerve 為最易受傷的主要感覺神經。", "C": "◎ ，錯誤敘述）最常受傷之運動支雖為 buccal branch，但因交通支(collateral)豐富，長期後遺症『少見』，非『缺乏側支、後遺症常見』。", "D": "✗（正確敘述）血腫、疤痕、禿髮、皮膚壞死、感染皆為 facelift 併發症。", "E": "◎ ，錯誤敘述）Temporal(frontal)branch 為『運動支』(支配 frontalis)，損傷致抬眉/皺眉無力；耳周及耳前後皮膚麻木屬 great auricular nerve(感覺支)損傷。"}, "cite": "待複查（Neligan facelift 併發症/神經 記憶佐證）", "conflict": ""}, {"id": "5246", "sub": "AES", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which statement is wrong about the great auricular nerve?", "opts": {"A": "Crosses the midportion of the sternocleidomastoid muscle.", "B": "McKinney's point, which is 6.5 cm inferior to the tragus.", "C": "It usually travels about 1 cm posterior to the external jugular vein.", "D": "Anterior to McKinney's point, the nerve is covered by the superficial cervical fascia and the platysma (SMAS)", "E": "The most common point of injury is at the posterior border of the sternocleidomastoid muscle."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Great auricular nerve（GAN）解剖（本題找錯誤）：正解 B——McKinney's point 位於「外耳道（external auditory canal）下方約 6.5 cm」處為 GAN 最表淺易傷點；題目寫「6.5 cm inferior to the tragus」之參考點/描述有誤。正確者：GAN 越過胸鎖乳突肌中段、走於 external jugular vein 後約 1 cm、於 McKinney's point 前方被 superficial cervical fascia 與 platysma(SMAS) 覆蓋、最常受傷處在 SCM 後緣。", "peropt": {"A": "✗ GAN 越過胸鎖乳突肌中段，正確。", "B": "◎ ,錯誤敘述) McKinney's point 位於『外耳道(external auditory canal)下方約 6.5 cm』為 GAN 最表淺易傷處；題目寫『6.5 cm inferior to the tragus』參考點錯誤，故選。", "C": "✗ GAN 走於 external jugular vein 後約 1 cm，正確。", "D": "✗ McKinney's point 前方 GAN 被 superficial cervical fascia 與 platysma 覆蓋，正確。", "E": "✗ 最常受傷處於 SCM 後緣，正確。"}, "cite": "待複查（Neligan great auricular nerve 記憶佐證）", "conflict": ""}, {"id": "5259", "sub": "AES", "src": "NG", "years": [113, 114], "stem": "對於大量減重(massive weight loss, MWL)後病人的 abdominal contouring，下列何者錯誤?", "opts": {"A": "若病人有giant pannus(panniculus morbidus)，可以使用特殊的儀器來幫助切除", "B": "腹部和肚臍疝氣在MWL病人中很常見", "C": "Abdominoplasty 這個詞最初是用在移除腹部皮膚跟脂肪的美容手術，伴隨腹壁肌肉的緊實以及肚臍的重新定位", "D": "Trunk skin and fat 的縱切 (fleur-de-lis abdominoplasty) 可以被用來讓腹部做橫向的放鬆", "E": "在 genital area or mons 可能需要 thinning and resuspension"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 MWL後腹部contouring(選錯誤)。正解D為誤述：Fleur-de-lis abdominoplasty是以『縱切』達成腹部橫向『緊實』，而非橫向放鬆(relaxation);用詞方向錯誤(與5193同概念不同字母)。正確敘述：giant pannus可用特殊器械;腹壁/臍疝氣常見;abdominoplasty原始定義;生殖區/mons需thinning與resuspension。", "peropt": {"A": "✗ 正確：giant pannus(panniculus morbidus)可用特殊器械輔助切除。", "B": "✗ 正確：腹壁與臍疝氣在MWL病人常見。", "C": "✗ 正確：abdominoplasty原指去皮脂加肌肉緊實與臍重定位。", "D": "◎ 錯誤：Fleur-de-lis abdominoplasty 以『縱切(vertical excision)』達成腹部『橫向緊實』，非橫向放鬆(relaxation)，用詞方向錯誤。", "E": "✗ 正確：genital area或mons可能需thinning與resuspension。"}, "cite": "待複查（Neligan MWL腹整形 記憶佐證）", "conflict": "⚠陷阱對照｜NG114 看 D『fleur-de-lis 縱切→橫向放鬆』是錯，答 D；NG115 D 已改成『橫向緊實』變對，陷阱移到 C『abdominoplasty 主要為重建性手術』，答 C。務必逐字讀該版 C、D。"}, {"id": "5260", "sub": "AES", "src": "NG", "years": [113, 114], "stem": "列關於陰莖解剖構造及陰莖增大術( Penile lengthening)何者錯誤?", "opts": {"A": "陰莖遠端的皮膚沒有毛髮。", "B": "Suprapubic lipectomy 是手術的選擇之一。", "C": "可以使用 VY advancement flap 手術。", "D": "陰莖的皮膚下有脂肪層。", "E": "可以分離 suspensory ligament of the penis。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 陰莖解剖與增長術（選錯誤者）：D錯誤——陰莖皮膚下為dartos（平滑肌）筋膜層，『沒有皮下脂肪層』，這也是陰莖皮膚可自由滑動的原因。正確者：A陰莖遠端皮膚無毛；B suprapubic lipectomy為術式選擇之一（改善埋藏陰莖外觀）；C可用VY advancement flap；E可切斷suspensory ligament of the penis以增加外露長度。", "peropt": {"A": "✗ 敘述正確：陰莖遠端皮膚無毛髮。", "B": "✗ 敘述正確：suprapubic lipectomy為手術選擇之一。", "C": "✗ 敘述正確：可使用VY advancement flap。", "D": "◎ ，即錯誤敘述) 陰莖皮膚下為 dartos(平滑肌)筋膜層，『無皮下脂肪層』，故陰莖皮膚可自由滑動；敘述有脂肪層錯誤。", "E": "✗ 敘述正確：可分離suspensory ligament以增加外露長度。"}, "cite": "待複查（Neligan 陰莖增大術 記憶佐證）", "conflict": "⚠陷阱對照｜NG114 答 D（皮下『有』脂肪層是錯）；NG115 D 改成『沒有脂肪層』變對，陷阱移到 E——『不需牽引裝置即可延長』才是錯。認清該版 D 寫『有』還是『沒有』。"}, {"id": "5262", "sub": "AES", "src": "NG", "years": [113, 114], "stem": "關於thigh lift, 那些描述正確? (複選)", "opts": {"A": "外側 thigh-lift 可以影響大腿外側, 但只有些微拉緊大腿內側組織", "B": "腳的淋巴主要集中在外側", "C": "在vertical thigh-lift procedure中，遠端的切除程度，可以根據膝蓋多餘的皮膚來決定，但不能由病人的意願以及疤痕的長度來決定切除多少", "D": "若在 thigh-lift 過程中不小心傷到淋巴，也許會造成下肢淋巴水腫", "E": "在病人只有些微deflated thighs而要求thigh-lift時，更進一步的減重也許是需要的"}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Thigh lift（複選，選『正確』者）：ADE 正確——外側 thigh-lift 主要影響外側、僅些微拉緊內側；術中傷及淋巴可致下肢淋巴水腫；僅些微 deflated thighs 者可能需先進一步減重。錯誤點：腳的淋巴『主要集中在內側』（沿大隱靜脈），非外側（B 錯）；vertical thigh-lift 遠端切除程度『可』依病人意願與疤痕長度共同決定，C 之『不能』為誤。", "peropt": {"A": "◎ 外側 thigh-lift 主影響外側，僅些微拉緊內側。", "B": "✗ 下肢淋巴主要集中於『內側』(沿 great saphenous vein 大隱靜脈)，非外側；此為 thigh-lift 保留淋巴之解剖依據。", "C": "✗ 遠端切除程度亦可考量病人意願與疤痕長度，非『不能』。", "D": "◎ 傷及淋巴可致下肢淋巴水腫。", "E": "◎ 些微 deflated thighs 者可能需先進一步減重。"}, "cite": "待複查（Neligan thigh lift 記憶佐證）", "conflict": ""}, {"id": "5265", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "The Fitzpatrick skin type classification is based on which of the following?", "opts": {"A": "Sebum production levels", "B": "Degree of skin wrinkling", "C": "Erythema and tanning response after sun exposure", "D": "Number of melanocytes in the skin", "E": "Thickness of dermis"}, "ans": "C", "multi": false, "etype": "ai", "expl": "4.Which of the following moisturizing ingredients is most effective in reducing transepidermal water loss (TEWL)?\n\nA. Glycerin\n\nB. Petrolatum\n\nC. Silicone\n\nD. Lactic acid\n\nE. Urea", "key": "🎯 Fitzpatrick skin type分型的分類依據是『日曬後的紅斑(erythema/burning)與曬黑(tanning)反應』，即個人對UV的臨床反應(易曬傷/易曬黑程度)，而非黑色素細胞數量或膚色本身。臨床意義：type愈高愈易曬黑、愈不易灼傷，雷射/換膚時PIH風險愈高。 Fitzpatrick 分 I–VI 共 6 型：I 型永遠灼傷、不曬黑；VI 型從不灼傷、深色。", "peropt": {"A": "✗ 皮脂分泌量與Fitzpatrick分型無關。", "B": "✗ 皮膚皺紋程度非分型依據(屬光老化評估)。", "C": "◎ 依日曬後之紅斑(erythema/易灼傷)與曬黑(tanning)反應分型(I–VI 共 6 型)，非依黑色素細胞數量或膚色。", "D": "✗ 黑色素細胞數量各人相近，分型看的是反應非細胞數。", "E": "✗ 真皮厚度與Fitzpatrick分型無關。"}, "cite": "待複查（Neligan Fitzpatrick分型 記憶佐證；註：原檔詳解疑為TEWL另題誤植，未採用）", "conflict": ""}, {"id": "5266", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following moisturizing ingredients is most effective in reducing transepidermal water loss (TEWL)?", "opts": {"A": "Glycerin", "B": "Petrolatum", "C": "Silicone", "D": "Lactic acid", "E": "Urea"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 保濕成分減少經皮水分散失（TEWL）之效力：Petrolatum（凡士林）為『封閉性（occlusive）』成分，可減少約99% TEWL，是最有效者。Glycerin、lactic acid、urea屬humectant（保濕吸水劑，本身不阻水分蒸發）；silicone雖亦具封閉性但效果不及petrolatum。故正解B。", "peropt": {"A": "✗ Glycerin為humectant，非最有效降低TEWL者。", "B": "◎ Petrolatum(凡士林)為封閉性(occlusive)最強者，可減少約 99% TEWL；一般 occlusive(如 lanolin/mineral oil)約 20–30%，故 petrolatum 最有效。", "C": "✗ Silicone(如 dimethicone)雖具封閉性，降 TEWL 效果不及 petrolatum(petrolatum≈99%)。", "D": "✗ Lactic acid為humectant（兼角質溶解），非封閉劑。", "E": "✗ Urea為humectant，非最有效降低TEWL者。"}, "cite": "待複查（Neligan Moisturizer/TEWL 記憶佐證）", "conflict": ""}, {"id": "5267", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Regarding synthetic detergents (syndets) and traditional soaps, which of the following statements are true? (複選)", "opts": {"A": "Syndets have a pH closer to the natural skin pH.", "B": "Soaps are more likely to cause skin barrier damage.", "C": "Syndets cause more dryness than soaps.", "D": "Soaps are made from the reaction of fats and alkali.", "E": "It is possible to combine both soap and syndet cleansers into a formulation, providing better cleansing with less lipid disruption."}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 合成清潔劑(syndets)與傳統皂(soaps)（複選正確ABDE）：syndets pH接近皮膚自然pH(~5.5)（A對）；傳統皂(鹼性)較易破壞皮膚屏障（B對）；soaps由脂肪與鹼皂化反應製成(saponification)（D對）；可將soap與syndet結合成combo配方，達較佳清潔又減少脂質破壞（E對）。C錯——是『soaps』造成較多乾燥，syndets較溫和、乾燥較少。", "peropt": {"A": "◎ Syndets pH接近皮膚自然pH。", "B": "◎ 傳統皂較易破壞皮膚屏障。", "C": "✗ 是soaps造成較多乾燥，非syndets。", "D": "◎ Soaps由脂肪與鹼皂化反應製成。", "E": "◎ 可結合soap與syndet成combo配方兼顧清潔與減少脂質破壞。"}, "cite": "待複查（Neligan 皮膚清潔劑 記憶佐證）", "conflict": ""}, {"id": "5268", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following statements about the infraorbital nerve block are correct? (複選)", "opts": {"A": "It anesthetizes the medial cheek and portions of the nasal sidewall.", "B": "It can be used for cosmetic procedures like upper lip fillers.", "C": "It blocks the sensation of the entire lower lip.", "D": "The infraorbital foramen is found 5–8 mm below the orbital rim.", "E": "The block affects the superior alveolar nerve in all patients."}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Infraorbital nerve block（複選，選『正確』者）：ABD 正確——麻醉內側頰部與部分鼻側壁；可用於上唇填充等美容處置；infraorbital foramen 位於眶下緣下方約 5–8mm。錯誤點：infraorbital 管『上唇』非整個下唇（C 錯）；『in all patients 皆影響 superior alveolar nerve』過於絕對（E 錯）。", "peropt": {"A": "◎ 麻醉內側頰部與部分鼻側壁。", "B": "◎ 可用於上唇填充等美容處置。", "C": "✗ 支配上唇而非整個下唇。", "D": "◎ infraorbital foramen 位於眶下緣下方約 5–8mm(沿瞳孔中線)，為 infraorbital nerve block 定位處。", "E": "✗ 『在所有病人皆影響 superior alveolar nerve』過於絕對，不成立。"}, "cite": "待複查（Neligan 局部神經阻斷 記憶佐證）", "conflict": ""}, {"id": "5269", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following nerves are involved in the region around the zygoma and lateral orbit? (複選)", "opts": {"A": "Supraorbital nerve", "B": "Infraorbital nerve", "C": "Dorsal nasal nerve", "D": "Zygomaticotemporal nerve", "E": "Zygomaticofacial nerve"}, "ans": "DE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顴骨與外側眶周之感覺神經為三叉神經 V2 之 zygomatic nerve 分支：zygomaticotemporal nerve 與 zygomaticofacial nerve（正解 DE）。supraorbital、dorsal nasal 屬 V1；infraorbital 供應中臉/下瞼/上唇之中央區，皆非顴骨/外側眶周之主要神經。", "peropt": {"A": "✗ Supraorbital nerve 屬 V1，供應前額，非顴骨區。", "B": "✗ Infraorbital nerve 供應中臉/上唇中央區，非顴骨/外側眶周。", "C": "✗ Dorsal nasal nerve 屬 V1，供應鼻背。", "D": "◎ Zygomaticotemporal nerve 位於顴骨/外側眶周。", "E": "◎ Zygomaticofacial nerve 位於顴骨/外側眶周。"}, "cite": "待複查（Neligan 顏面感覺神經分布 記憶佐證）", "conflict": ""}, {"id": "5270", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following is considered an intrinsic factor contributing to facial aging?", "opts": {"A": "Smoking", "B": "Solar damage", "C": "Skeletal atrophy", "D": "Gravity", "E": "Weight fluctuation"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部老化之「內在（intrinsic）」因素＝與生俱來、時間依賴之生物老化，如骨骼萎縮（skeletal atrophy，眶孔擴大、上顎後縮）、荷爾蒙與基因所致之組織退化。外在（extrinsic）因素則為吸菸、日曬、地心引力、體重波動等環境/行為性因子。故選 C。", "peropt": {"A": "✗ 吸菸為外在（extrinsic）因素。", "B": "✗ 日曬損傷為外在因素（photoaging）。", "C": "◎ 骨骼萎縮(skeletal atrophy，如眶孔擴大、上顎/下顎後縮)屬與時間相關之內在(intrinsic)老化；吸菸/日曬/地心引力/體重波動皆為外在(extrinsic)因素。", "D": "✗ 地心引力為外在因素。", "E": "✗ 體重波動為外在因素。"}, "cite": "待複查（Neligan 臉部老化內在/外在因素 記憶佐證）", "conflict": ""}, {"id": "5271", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following characteristics are considered ideal for a soft-tissue filler? (複選)", "opts": {"A": "Permanent and non-reversible", "B": "Easy to use", "C": "Minimal downtime", "D": "Highly visible under the skin", "E": "Biocompatible"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 理想軟組織填充劑特性(複選)：易於使用(easy to use)、恢復期短(minimal downtime)、生物相容(biocompatible)。易錯點：理想填充劑應可逆/可代謝(如HA可用hyaluronidase溶解)，永久不可逆並非理想特性;且應在皮下『不可見』(自然)，highly visible反屬缺點。", "peropt": {"A": "✗(非答案) 永久且不可逆並非理想特性;理想填充劑宜可逆/可代謝。", "B": "◎ 易於使用為理想特性。", "C": "◎ 恢復期短(minimal downtime)為理想特性。", "D": "✗(非答案) 皮下高度可見屬缺點，理想填充應自然不可見。", "E": "◎ 生物相容(biocompatible)為理想特性。"}, "cite": "待複查（Neligan 理想填充劑特性 記憶佐證）", "conflict": ""}, {"id": "5272", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Regarding hyaluronic acid (HA) fillers, which statements are correct? (複選)", "opts": {"A": "HA naturally lasts many years without modification.", "B": "HA fillers are most suitable only for very deep folds and cannot be used superficially.", "C": "HA fillers are highly hydrophilic and bind large amounts of water.", "D": "Cross-linking of HA increases its stability and longevity.", "E": "HA fillers can have different rheologic properties depending on cross-linking."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 玻尿酸（HA）填充劑（選正確，複選）：C正確——HA高度親水，可結合大量水分產生容積；D正確——cross-linking（交聯）增加穩定性與持久度；E正確——不同交聯程度賦予不同流變特性（rheology，如G′彈性模數），決定適用深淺層。錯誤者：A未修飾之天然HA半衰期僅數天、不會維持多年；B HA可用於淺層（低G′產品）亦可用於深層，非只限深層。", "peropt": {"A": "✗ 未交聯天然HA半衰期僅數天（非數年），不會維持多年。", "B": "✗ HA可依流變特性（G′高者用深層、低者用淺層）用於淺層或深層，非只限很深皺褶。", "C": "◎ HA高度親水、可結合大量水分產生容積。", "D": "◎ 交聯（cross-linking）增加HA穩定性與持久度。", "E": "◎ 不同交聯程度給予不同流變特性（G′彈性模數）。"}, "cite": "待複查（Neligan HA filler 記憶佐證）", "conflict": ""}, {"id": "5273", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "According to World Professional Association for Transgender Health (WPATH) Standards of Care (SOC), Version 8 (SOC8), guidelines, which is not the criteria for facial surgery?", "opts": {"A": "Gender incongruence marked and sustained", "B": "Demonstrates capacity to consent for the specific gender affirming surgical intervention", "C": "Mental health and physical conditions that could negatively impact the outcome of gender-affirming surgical intervention have been assessed as well controlled", "D": "Other causes for gender incongruence identified and excluded", "E": "At least 2 letters from mental health providers trained in transgender health"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 WPATH SOC8對gender-affirming手術（含臉部手術）的準則：gender incongruence持續且明顯、具知情同意能力、共病之身心狀況已良好控制、已排除其他造成gender incongruence之原因。SOC8已『放寬』心理健康推薦信要求（不再硬性要求2封）——選項E『至少2封mental health provider推薦信』並非SOC8之臉部手術準則，故為答案。", "peropt": {"A": "✗ 為準則。gender incongruence持續且明顯。", "B": "✗ 為準則。具對該手術之知情同意能力。", "C": "✗ 為準則。共病身心狀況已良好控制。", "D": "✗ 為準則。已排除其他造成gender incongruence之原因。", "E": "◎ ，為非準則) SOC8已放寬心理健康推薦信要求，不再硬性要求『至少2封』；臉部手術準則不含此項。"}, "cite": "待複查（WPATH SOC8 記憶佐證）", "conflict": ""}, {"id": "5274", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following is common hormone therapy for gender affirmation surgery?", "opts": {"A": "Estrogen", "B": "Progesterone", "C": "Anti-androgen", "D": "Testosterone", "E": "All the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 性別確認手術之常見荷爾蒙治療：包含 Estrogen、Progesterone、Anti-androgen（男跨女 MtF），以及 Testosterone（女跨男 FtM），故『以上皆是（E）』。臨床重點：MtF 用雌激素＋抗雄性素；FtM 用睪固酮。", "peropt": {"A": "✗ estrogen 為 MtF（男跨女）用藥，非唯一答案。", "B": "✗ progesterone 為 MtF 輔助用藥，非唯一。", "C": "✗ anti-androgen（抗雄性素）為 MtF 用藥，非唯一。", "D": "✗ testosterone 為 FtM（女跨男）用藥，非唯一。", "E": "◎ 以上荷爾蒙皆為性別確認常見用藥（MtF：雌激素＋抗雄性素；FtM：睪固酮）。"}, "cite": "待複查（Neligan 性別確認手術 記憶佐證）", "conflict": ""}, {"id": "5275", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which of the following is not procedure for facial feminization surgery?", "opts": {"A": "Malar reduction", "B": "Hairline advancement", "C": "Frontal sinus setback", "D": "Browlift", "E": "Jawline contouring"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化手術（FFS）標準術式：hairline advancement、frontal sinus setback（額竇/眉弓後推）、browlift、jawline contouring（下頷輪廓縮小）等。女性 malar 較豐滿，FFS 多為顴骨『augmentation』而非 reduction；故『Malar reduction』並非 FFS 之標準女性化術式，為本題答案。", "peropt": {"A": "◎ Malar reduction 非 FFS 術式；女性 malar 較豐滿，女性化多為顴骨 augmentation 而非 reduction。", "B": "✗ Hairline advancement（髮線前移）為 FFS 術式。", "C": "✗ Frontal sinus setback（額竇/眉弓後推）為 FFS 額部女性化術式。", "D": "✗ Browlift（提眉）為 FFS 術式。", "E": "✗ Jawline contouring（下頷輪廓縮小）為 FFS 術式。"}, "cite": "待複查（Neligan 顏面女性化手術 記憶佐證）", "conflict": ""}, {"id": "5276", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which statement is wrong about the noninvasive technologies for aesthetic improvement?", "opts": {"A": "Cryolipolysis acts by cooling the skin and subcutaneous tissue below physiologic, but above freezing, temperatures, adipocytes undergo apoptosis.", "B": "Radiofrequency energy devices cause contraction, remodeling, and potential improvement in tightness and tone of the skin by the heating of the deep dermis and the collagen-based fibrous septae in the subcutaneous layer.", "C": "Ultrasound devices generate heat and cause coagulative necrosis of adipocytes and collagen, which have the effects of adipose reduction, dermal tightness, and muscular hypertrophy.", "D": "High-intensity focused electromagnetic technology (HIFEM) has the effects of increasing the muscle thickness and narrowing the rectus diastasis.", "E": "Low-level laser therapy creates microscopic pores in the adipose cells and allows lipids to leak."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 非侵入性美容科技（本題找錯誤）：正解 C——超音波（如 focused ultrasound）藉熱能造成脂肪細胞與膠原之凝固壞死，效果為脂肪減量與真皮緊實，但「不會造成肌肉肥大」；肌肉肥大是 HIFEM（如 D 選項）之效果，故 C 誤植 muscular hypertrophy。正確者：冷凍溶脂（cryolipolysis）令脂肪細胞凋亡；RF 加熱深真皮與纖維隔膜緊實；HIFEM 增肌並縮小腹直肌分離；低能量雷射於脂肪細胞形成微孔使脂質外漏。", "peropt": {"A": "✗（正確敘述）Cryolipolysis 於高於冰點但低於生理溫度冷卻（約 -5～+5°C）致脂肪細胞凋亡。", "B": "✗（正確敘述）RF 加熱深真皮與纖維隔膜達組織緊實。", "C": "◎ ,錯誤敘述) 超音波造成脂肪/膠原凝固壞死與緊實，但『不會造成肌肉肥大』；肌肉肥大為 HIFEM 之效果，此處誤植 muscular hypertrophy。", "D": "✗（正確敘述）HIFEM 增加肌肉厚度並縮小腹直肌分離。", "E": "✗（正確敘述）低能量雷射於脂肪細胞形成微孔使脂質外漏。"}, "cite": "待複查（Neligan 非侵入性體雕科技 記憶佐證）", "conflict": ""}, {"id": "5277", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Which statement is wrong about the Botulinum toxin injection?", "opts": {"A": "The dose of BoNT-A used should be based on the depth of the rhytid.", "B": "The lower frontalis muscle has the greatest effect on brow elevation.", "C": "As a general rule, injecting depressors more strongly than elevators will tend to give a more gentle lift to the area involved.", "D": "Hyperactivity of the mentalis muscle can lead to a peau d’orange appearance of the chin", "E": "All of the above are wrong."}, "ans": "A", "multi": false, "etype": "ai", "expl": "[NOTE: ⚠**原檔答案字母缺漏**（「答 案：」後直接接出處，無 A-E）。逐字保留，不擅自填補。\n 旁證：本題自身詳解逐項說明 A 錯（劑量依 muscle mass/thickness，非 rhytid 深度）、C 與 D 皆為課本原文正確敘述；\n 且 NG113 Vol II chap1-11 第7題為同一題（選項 D 略有改寫），官方答案為 **A**。\n → **2026-07-10 Jason 人工裁定：採用 A。** 建檔時 ans=A、flag=`答案缺漏-人工補正`、\n conflict 註「原檔答案字母缺漏；依自身詳解及 NG113 同題官方答案 A 補正（Jason 裁定）」。可進練習 App。]\n\nA. 課本提到包含frontalis, masseter等都是以muscle mass, muscle thickness 決定劑量，而非rhytid的深度(P75,80)\n\nB. 額肌 (frontalis) 是唯一的提眉肌(it is the only brow elevator) (P.73)\n\nC. 舉例：注射眉間的降眉肌 (glabellar complex depressors) 可以因為額肌（提眉肌）的作用未受抑制而導致外側眉毛提升(P.76)\n\nD. Loss of mandibular bone and subcutaneous fat, along with hyperactivity of the mentalis muscle, can lead to peau d’orange appearance of the chin (p.81)", "key": "🎯 肉毒桿菌素注射(選錯誤)。正解A為誤述：BoNT-A劑量應依『肌肉質量/厚度(muscle mass/thickness)』決定，而非依皺紋(rhytid)深度。⚠原檔答案字母缺漏，經Jason 2026-07-10依自身詳解及NG113同題官方答案裁定為A。正確敘述：frontalis是唯一提眉肌;強打降眉肌可藉未受抑制之提眉肌產生溫和lift;mentalis過動致下巴peau d'orange外觀。", "peropt": {"A": "◎ 錯誤敘述：BoNT-A劑量應依『肌肉質量/厚度(muscle mass/thickness)』決定，非依 rhytid（皺紋）深度。", "B": "✗（正確敘述）frontalis（額肌）是唯一的提眉肌，對提眉影響最大。", "C": "✗（正確敘述）相對強打降肌(depressors)勝於提肌(elevators)，可產生較溫和的 lift。", "D": "✗（正確敘述）mentalis 過動可致下巴呈 peau d'orange（橘皮）外觀。", "E": "✗ 非正解：僅 A 為錯誤敘述，並非全部皆錯。"}, "cite": "原檔詳解", "conflict": "原檔答案字母缺漏；依自身詳解及 NG113 同題官方答案 A 補正（Jason 2026-07-10 裁定） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B04-Q07）"}, {"id": "5278", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "根據臉部結構分層，下列解剖構造之深度何者異於其他選項？", "opts": {"A": "Premaxillary space", "B": "Lower premasseter space", "C": "Buccal space", "D": "Upper temporal space", "E": "Prezygomatic space"}, "ans": "C", "multi": false, "etype": "ai", "expl": "ABDE均在facial layer 第五層(Deep fascia)之上，惟buccal space 在deep fascia之下。", "key": "🎯 臉部結構分層（選深度異於其他者）：A premaxillary space、B lower premasseter space、D upper temporal space、E prezygomatic space皆位於第五層深筋膜（deep fascia）『之上』的滑動間隙；唯獨C buccal space位於deep fascia『之下』，深度與其他選項不同，故為答案。此類軟組織間隙（soft tissue spaces）概念是現代拉皮避開神經、安全剝離的基礎。", "peropt": {"A": "✗ Premaxillary space位於deep fascia（第五層深筋膜）之『上』，與多數選項同層。", "B": "✗ Lower premasseter space位於deep fascia之『上』。", "C": "◎ Buccal space位於deep fascia之『下』，深度異於其他選項。", "D": "✗ Upper temporal space位於deep fascia之『上』。", "E": "✗ Prezygomatic space位於deep fascia之『上』。"}, "cite": "原檔詳解", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q02）"}, {"id": "5279", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "下列哪一個Plane在進行face lift時最容易產生lift-lag phenomenon?", "opts": {"A": "Superficial subcutaneous", "B": "Sub-SMAS", "C": "Subperiosteal", "D": "Deep subcutaneous", "E": "All of the above are wrong."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Lift-lag phenomenon指拉皮後因深層固定與軟組織黏彈性，效果『延遲』顯現。以『Subperiosteal』平面剝離（骨膜下）最深、組織重新黏附與消腫最慢，故最易產生lift-lag，答案C。⚠ 此題與NG108-B04-Q06因選項數不同視為不同題，作答勿混用兩年選項。", "peropt": {"A": "✗ Superficial subcutaneous平面最淺，重新黏附快，較無明顯lift-lag。", "B": "✗ Sub-SMAS平面較subperiosteal淺，lift-lag較不顯著。", "C": "◎ Subperiosteal（骨膜下）平面最深，組織重新黏附/消腫最慢，最易產生lift-lag。", "D": "✗ Deep subcutaneous仍屬較淺平面，lift-lag不明顯。", "E": "✗ 已有明確答案(C)，非全部皆錯。"}, "cite": "待複查（Neligan facelift平面 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q06）"}, {"id": "5280", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "關於facelift，Platysma-SMAS plication(PSP) 和 Minimal access cranial suspension(MACS) 之比較，下列何者錯誤？", "opts": {"A": "PSP之incision為vertical temporal，而MACS 為inverted L", "B": "PSP有neck dissection，而MACS無", "C": "PSP為SMAS-SMAS fixation，而MACS為SMAS-deep temporal fascia", "D": "PSP之vector為vertical，而MACS為cephaloposterior", "E": "PSP 可以達到malar augmentation 的效果，MACS則無"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift：PSP（Platysma-SMAS plication）vs MACS（Minimal Access Cranial Suspension，選『錯誤』者）：向量比較有誤——MACS 以荷包縫線提供『垂直（vertical/cephalad）』向量，PSP 則偏後上斜向；D 稱『PSP vertical、MACS cephaloposterior』為對調，故錯。⚠此題與 NG108-B04-Q07 因『選項數不同』被視為不同題，勿混用記憶。", "peropt": {"A": "✗（依題視為正確）PSP 切口 vertical temporal，MACS 為 inverted L。", "B": "✗（正確）PSP 有 neck dissection，MACS 無。", "C": "✗（正確）PSP 為 SMAS-SMAS fixation，MACS 為 SMAS-deep temporal fascia。", "D": "◎ ，錯誤敘述）向量對調：MACS 才是 vertical（cephalad，荷包縫線垂直提拉），PSP 偏後上斜向；非題述之配對。", "E": "✗（依題視為正確）PSP 可達 malar augmentation，MACS 則否。"}, "cite": "待複查（Neligan 拉皮術式比較 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q07）"}, {"id": "5281", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "Huger 描述 abdominal wall 的 zone of blood supply，下列敘述何者正確? (複選)", "opts": {"A": "Zone I is the midabdomen, fed anteriorly by the vertically orientated deep epigastric arcade.", "B": "Zone II is the lateral abdomen/flanks, fed by six lateral intercostal and four lumbar arteries.", "C": "Zone III is the lower abdomen, fed by the superficial epigastric, superficial external pudendal, and superficial circumflex iliac system.", "D": "In standard abdominoplasty procedures, the cutaneous blood supply of zone III is often disrupted.", "E": "It is crucial to evaluate any preoperative existing scar."}, "ans": "AE", "multi": true, "etype": "ai", "expl": "B. Zone III is the lateral abdomen/flanks, fed by six lateral intercostal and four lumbar arteries.\n\nC. Zone II is the lower abdomen, fed by the superficial epigastric, superficial external pudendal, and superficial circumflex iliac system.\n\nD. In standard abdominoplasty procedures, the cutaneous blood supply of zone I and a main part of zone II is often disrupted. (主要 blood supply 來自留下的 zone III)", "key": "🎯 Huger 腹壁血供分區（正解 AE）：Zone I=中腹，由縱向 deep（superior+inferior）epigastric arcade 供應；Zone II=下腹恥骨上，由 superficial epigastric、superficial external pudendal、superficial circumflex iliac 供應；Zone III=外側腹/腰側，由 intercostal/subcostal/lumbar 供應。B、C 將 Zone II/III 內容互換故錯；D 錯——標準 abdominoplasty 中斷的是 Zone I 及大部分 Zone II，皮瓣主要仰賴保留的 Zone III 血供。E 評估術前既有疤痕正確。⚠此題有跨年（3e vs 5e）數值差異。", "peropt": {"A": "◎ Zone I 為中腹，由縱向 deep（superior+inferior）epigastric arcade 供應，正確。", "B": "✗ 由 intercostal/lumbar 供應者為 Zone III（外側腹/腰側，六條 lateral intercostal＋四條 lumbar）而非 Zone II，敘述互換錯誤。", "C": "✗ 由 superficial epigastric/external pudendal/circumflex iliac 供應者為 Zone II（下腹恥骨上）而非 Zone III，敘述互換錯誤。", "D": "✗ 標準 abdominoplasty 中斷的是 Zone I 與大部分 Zone II（穿支），非 Zone III；皮瓣靠保留的 Zone III（外側）血供存活。", "E": "◎ 評估術前既有疤痕至關重要（可能中斷特定血供分區），正確。"}, "cite": "原檔詳解", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5282", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "有關抽脂手術的wetting solution,下列何者為正確? (複選)", "opts": {"A": "做 wetting solution 抽脂，好處包括 hydrodissection, improved hemostasis, and potentially perioperative analgesia 等", "B": "常用的 wetting solution 成份為 lactated Ringer’s solution, normal saline, marcaine, lidocaine and epinephrine", "C": "「即使」在「大容量抽脂」的病患，都要小心 xylocaine 不可超過 7mg/kg", "D": "有肝功能異常的患者, 不會增加 lidocaine 中毒的機會", "E": "有研究指出，epinephrine 使用於局部麻醉時，每個手術的「劑量上限為 15mg」 ; 然而還是要注意，epinephrine 即使在低濃度的情況下，都可能對心血管系統的造成重大影響"}, "ans": "AE", "multi": true, "etype": "ai", "expl": "A: In an effort to reduce blood loss, the practice of infiltrating wetting solutions (saline or lactated Ringer’s (LR) mixture with dilute amounts of epinephrine and lidocaine) was developed. Wetting solutions prior to liposuction provide numerous benefits including hydrodissection, improved hemostasis, and potentially perioperative analgesia.\n\nB (錯誤): Many authors have popularized different variations of these solutions, but most formulations include some variant of near physiologic intravenous fluid (normal saline (NS) or LR), epinephrine, local anesthetic, and more recently, potentially tranexamic acid. Marcaine should be avoided because of its potential cardiac effects and duration of action.\n\nC (錯誤): The traditional recommended maximum dose of lidocaine with epinephrine is 7mg/kg; however, in the liposuction setting, numerous studies have documented the safety of lidocaine in concentrations >35 mg/kg and as high as 55 mg/kg in large-volume cases.\n\nD (錯誤): (Lidocaine 主要藉由肝臟代謝，與 cytochrome P450 相關) First and foremost, the lidocaine absorption rate is extremely variable and dependent on multiple factors including the activity of the cytochrome P450 system, drug interactions, fluids, and concentrations of the drug administered. Medications that tend to increase lidocaine levels include oral contraceptives, beta blockers, and tricyclic antidepressants.\n\nE: Epinephrine toxicity can result in tachycardia, hypertension, and arrhythmias. Many investigators have studied the doses of epinephrine in wetting solutions. The limit of total epinephrine per surgical procedure has been reported to be 15mg. Regardless, it is known that epinephrine, even in small concentrations, may still have a profound effect on the cardiovascular system.", "key": "🎯 抽脂 wetting solution（本題找正確，複選）：正解 AE——A：wetting solution 提供 hydrodissection、improved hemostasis 與周術期止痛等好處；E：epinephrine 每次手術總量上限約 15 mg，且即使低濃度仍可能顯著影響心血管。⚠ 跨年（Neligan 3e vs 5e）題幹數值/敘述有差異。錯誤者：成分應避免 marcaine（心臟毒性長效）（B 錯）；大量抽脂 lidocaine 可遠超 7 mg/kg（達 35–55）（C 錯）；lidocaine 經肝 CYP450 代謝，肝功能異常「會」增中毒（D 錯）。", "peropt": {"A": "◎ Wetting solution 提供 hydrodissection、改善止血與周術期止痛，正確。", "B": "✗ 成分應避免 marcaine（bupivacaine，長效且心臟毒性高），敘述含 marcaine 有誤，不選。", "C": "✗ 大量抽脂時 lidocaine 安全上限可遠超 7 mg/kg（tumescent 技術達 35–55 mg/kg），敘述『不可超過 7mg/kg』有誤，不選。", "D": "✗ Lidocaine 經肝 CYP450 代謝，肝功能異常『會』增加中毒風險，敘述『不會』有誤，不選。", "E": "◎ Epinephrine 每次手術總量上限約 15 mg，且低濃度仍可能顯著影響心血管，正確。"}, "cite": "原檔詳解", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：A: 105「做wetting solution抽脂，宜在打入solution後7至30分鐘內」 vs 114「做 wetting solution 抽脂，好處包括 hydrodissecti」；E: 105「有研究指出，epinephrine 使用於局部麻醉時，每個手術的劑量為 15mg」 vs 114「有研究指出，epinephrine 使用於局部麻醉時，每個手術的「劑量上限為 1」"}, {"id": "5283", "sub": "AES", "src": "NG", "years": [114, 115], "stem": "在施行臀部及大腿部的 liposuction 時，下列哪些 “zones of adherence” 必須避免? (複選)", "opts": {"A": "Lateral gluteal depression", "B": "Gluteal crease", "C": "Mid medial thigh", "D": "Upper lateral thigh", "E": "Inferolateral iliotibial tract"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臀部及大腿抽脂應避免的zones of adherence(複選)：lateral gluteal depression、gluteal crease、mid medial thigh、inferolateral(distal) iliotibial tract。此區皮下與深筋膜緊密黏著，抽脂易致contour irregularity。⚠跨年題幹數值/選項有差異;易錯點D『upper lateral thigh』並非adherence zone(正確者為distal/inferolateral IT tract)。", "peropt": {"A": "◎ Lateral gluteal depression 為應避免的 zone of adherence。", "B": "◎ Gluteal crease 為 zone of adherence，須避免積極抽脂。", "C": "◎ Mid medial thigh 為 zone of adherence。", "D": "✗(非答案) Upper lateral thigh 並非 zone of adherence；正確之黏著區為 distal/inferolateral iliotibial tract。", "E": "◎ Inferolateral（distal）iliotibial tract 為 zone of adherence。"}, "cite": "待複查（Neligan gluteal/thigh zones of adherence 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5284", "sub": "AES", "src": "NG", "years": [114], "stem": "Which of the following statements is incorrect regarding anatomical and surgical aspects of facial feminization?", "opts": {"A": "The nasolabial angle is generally more acute in females compared to males, with a narrower alar base and increased tip projection.", "B": "The zygomatic bones in the female face are broader with delicate malar eminences, often resulting in a heart-shaped contour.", "C": "A reduction in bigonial width and mandibular angle can be achieved via intraoral access using burr contouring or osteotomies.", "D": "In males, the hairline is typically M-shaped and sits approximately 7–8 cm above the eyebrow midpoint.", "E": "During tracheal shave procedures, endoscopic vocal cord visualization with needle localization can help avoid vocal cord injury."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化（facial feminization，選錯誤者）：A錯誤——女性的nasolabial angle較男性『更鈍（obtuse，約95–105°）』而非更銳，且女性鼻多為窄alar base、鼻尖上翹（增加tip rotation/projection）。正確者：B女性顴骨較寬柔、malar精緻呈心形輪廓；C經口內入路以磨骨/截骨縮小bigonial width與下頜角；D男性髮線多呈M形、約在眉中點上方7–8 cm；E tracheal shave時內視鏡看聲帶並以針定位可避免聲帶損傷。", "peropt": {"A": "◎ ，即錯誤敘述) 女性 nasolabial angle 較男性『更鈍（obtuse，約95–105°）』而非更銳（男性約90–95°）。", "B": "✗（正確敘述）女性顴骨較寬柔、malar 精緻、呈心形輪廓。", "C": "✗（正確敘述）可經口內入路磨骨/截骨縮小下頜角與 bigonial width。", "D": "✗（正確敘述）男性髮線多呈 M 形、約在眉中點上方 7–8 cm。", "E": "✗（正確敘述）tracheal shave 時內視鏡看聲帶並以針定位可避免聲帶損傷。"}, "cite": "待複查（Neligan Facial feminization 記憶佐證）", "conflict": ""}, {"id": "5285", "sub": "AES", "src": "NG", "years": [115], "stem": "對於大量減重(massive weight loss, MWL)後病人的 abdominal contouring，下列何者錯誤?", "opts": {"A": "若病人有giant pannus(panniculus morbidus)，可以使用特殊的儀器來幫助切除", "B": "腹部和肚臍疝氣在MWL病人中很常見", "C": "Abdominoplasty 主要是一種重建性手術，用來移除腹部皮膚跟脂肪，不伴隨腹壁肌肉 的緊實以及肚臍的重新定位", "D": "Trunk skin and fat 的縱切 (fleur-de-lis abdominoplasty) 可以被用來讓腹部做橫向的緊實", "E": "在genital area or mons可能需要thinning and resuspension"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 大量減重(MWL)後腹部塑形：giant pannus(panniculus morbidus)可用特殊器械協助切除(A對)；腹部與臍疝在MWL常見(B對)；fleur-de-lis（縱切）abdominoplasty用於橫向緊實(D對)；mons/生殖區可能需thinning與resuspension(E對)。選項C錯——abdominoplasty不僅移除皮膚脂肪，通常『包含腹直肌折疊(rectus plication)與肚臍重新定位(umbilical transposition)』，故敘述『不伴隨肌肉緊實與臍重新定位』為錯誤。", "peropt": {"A": "✗（正確敘述）giant pannus（panniculus morbidus）可用特殊器械協助切除。", "B": "✗（正確敘述）MWL 病人腹部與臍疝常見。", "C": "◎ ，為錯誤敘述) Abdominoplasty 通常『包含』腹直肌折疊（rectus plication）與肚臍重新定位（umbilical transposition），非僅移除皮膚脂肪、不伴肌肉緊實與臍重定位。", "D": "✗（正確敘述）fleur-de-lis 縱切可做橫向緊實。", "E": "✗（正確敘述）mons/生殖區可能需 thinning 與 resuspension。"}, "cite": "待複查（Neligan MWL腹部塑形 記憶佐證）", "conflict": "⚠陷阱對照｜NG114 看 D『fleur-de-lis 縱切→橫向放鬆』是錯，答 D；NG115 D 已改成『橫向緊實』變對，陷阱移到 C『abdominoplasty 主要為重建性手術』，答 C。務必逐字讀該版 C、D。"}, {"id": "5286", "sub": "AES", "src": "NG", "years": [115], "stem": "Class I Obesity的定義", "opts": {"A": "BMI (kg/m2) <18.5", "B": "BMI (kg/m2) 18.5–24.9", "C": "BMI (kg/m2) 25.0–29.9", "D": "BMI (kg/m2) 30.0–34.9", "E": "BMI (kg/m2) 40.0–49.9"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肥胖 BMI 分級（WHO）：Class I obesity 定義為 BMI 30.0–34.9（D）。完整分級：<18.5 過輕、18.5–24.9 正常、25.0–29.9 過重、30.0–34.9 Class I、35.0–39.9 Class II、≥40 Class III（morbid/severe）。易混淆：勿把 Class I 誤為 25–29.9（過重）或 ≥40（Class III）。", "peropt": {"A": "✗ BMI <18.5 為過輕（underweight）。", "B": "✗ BMI 18.5–24.9 為正常（normal）。", "C": "✗ BMI 25.0–29.9 為過重（overweight），非 Class I。", "D": "◎ BMI 30.0–34.9 為 Class I obesity。", "E": "✗ BMI 40.0–49.9 屬 Class III（morbid/severe obesity，≥40）；Class II 為 35.0–39.9。"}, "cite": "待複查（Neligan/WHO 肥胖分級 記憶佐證）", "conflict": ""}, {"id": "5287", "sub": "AES", "src": "NG", "years": [115], "stem": "下列關於陰莖解剖構造及陰莖增大術 (Penile lengthening) 何者錯誤？", "opts": {"A": "陰莖遠端的皮膚沒有毛髮", "B": "Suprapubic lipectomy 是手術的選擇之一", "C": "可以使用 VY advancement flap 手術", "D": "陰莖的皮膚下沒有脂肪層", "E": "分離 suspensory ligament of the penis 後，不須使用 penile stretching devices，即可有 效延長陰莖"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 陰莖延長術（penile lengthening）概念：陰莖遠端皮膚無毛髮、皮下無脂肪層；suprapubic lipectomy 與 VY advancement flap 為可選術式。切斷 suspensory ligament of the penis 後『仍須』配合術後 penile stretching/traction devices 維持並最大化延長效果、避免再度沾黏回縮；E 說不須使用即可有效延長，為錯誤敘述。", "peropt": {"A": "✗（正確敘述）陰莖遠端皮膚無毛髮。", "B": "✗（正確敘述）Suprapubic lipectomy 為手術選擇之一。", "C": "✗（正確敘述）可使用 VY advancement flap。", "D": "✗（正確敘述）陰莖皮下無脂肪層。", "E": "◎ ，即錯誤敘述）切斷 suspensory ligament of the penis 後『仍須』配合術後 penile stretching/traction devices 維持並最大化延長，避免沾黏回縮；非不須即可有效延長。"}, "cite": "待複查（Neligan 私密處/陰莖延長術 記憶佐證）", "conflict": "⚠陷阱對照｜NG114 答 D（皮下『有』脂肪層是錯）；NG115 D 改成『沒有脂肪層』變對，陷阱移到 E——『不需牽引裝置即可延長』才是錯。認清該版 D 寫『有』還是『沒有』。"}, {"id": "5288", "sub": "AES", "src": "NG", "years": [115], "stem": "關於 thigh lift，下列描述何者為非？(複選)", "opts": {"A": "外側 thigh-lift 可以影響大腿外側，但只有些微拉緊大腿內側組織", "B": "腳的淋巴主要集中在外側", "C": "在 vertical thigh-lift procedure 中，遠端的切除程度，可以根據膝蓋多餘的皮膚來決定，但不能由病人的意願以及疤痕的長度來決定切除多少", "D": "若在 thigh-lift 過程中不小心傷到淋巴，也許會造成下肢淋巴水腫", "E": "在病人只有些微 deflated thighs 而要求 thigh-lift 時，更進一步的減重也許是需要的"}, "ans": "BC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大腿拉皮（thigh lift，本題找非/錯誤，複選）：正解 BC——B：腳/下肢淋巴主要集中於「內側（medial，沿大隱靜脈）」而非外側，故「集中外側」錯誤；C：vertical thigh-lift 遠端切除範圍「可」依病人意願與可接受之疤痕長度共同決定，敘述「不能由病人意願及疤痕長度決定」有誤。正確者：外側 thigh-lift 主要影響外側、僅些微拉緊內側（A）；傷及淋巴可致下肢淋巴水腫（D）；僅些微 deflated thighs 者可能需進一步減重（E）。", "peropt": {"A": "✗ 外側 thigh-lift 主要影響外側、僅些微拉緊內側，正確敘述，不選。", "B": "◎ ,錯誤敘述) 下肢/腳之淋巴主要集中於『內側（medial，沿大隱靜脈 great saphenous）』而非外側，故『集中外側』有誤。", "C": "◎ ,錯誤敘述) vertical thigh-lift 遠端切除量『可』依病人意願與可接受之疤痕長度共同決定，題述『不能由病人意願及疤痕長度決定』有誤。", "D": "✗ 傷及淋巴可致下肢淋巴水腫，正確敘述，不選。", "E": "✗ 僅些微 deflated thighs 者可能需進一步減重，正確敘述，不選。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "9043", "sub": "BAS", "src": "GS", "years": [115], "stem": "正常傷口癒合過程中，傷口的生物力學強度 (biomechanical strength) 在受傷後3週及6週時，分別約達原始強度的多少？", "opts": {"A": "3週約5%；6週約30-40%", "B": "3週約20%；6週約70-80%", "C": "3週約40%；6週約90%", "D": "3週約50%；6週約100%", "E": "3週約10%；6週約50%"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【傷口生物力學強度時序 Tensile Strength Timeline】\n• 傷口 tensile strength 隨膠原沉積與重塑逐漸恢復：\n  - **1 週**：約 3–5%（極弱，仍靠縫線）。\n  - **3 週**：約 **20%**（膠原重塑中期）。\n  - **6 週**：約 **70–80%**（重塑成熟）。\n  - **最終 (數月~1年)**：達原始強度 **~80%**（永遠無法回到 100%）。\n• 對應正解 **B（3週~20%；6週~70–80%）**。\n• 機轉：早期 type III collagen → 逐漸由 **type I collagen** 取代，並經 cross-linking 與 MMP 重塑，強度上升但上限約 80%。", "peropt": {"A": "✗ 應為3週約20%、6週約70–80%；本項3週5%（約為1週之值）、6週30–40%均偏低。", "B": "◎ 。3週約20%、6週約70–80%，符合膠原重塑（type III→type I）時序。", "C": "✗ 3週40%偏高、6週90%過高；正確為3週約20%、6週約70–80%（最終上限約80%）。", "D": "✗ 6週非100%（傷口最終強度僅約80%，永不回100%）；3週亦非50%而約20%。", "E": "✗ 3週約20%（非10%）、6週約70–80%（非50%）。"}, "cite": "Neligan PS 5e Vol.1, Wound healing — tensile strength recovery; Grabb & Smith 9e, Ch.1.", "conflict": ""}, {"id": "9044", "sub": "BAS", "src": "GS", "years": [115], "stem": "矽膠凝膠 (silicone gel) 改善術後疤痕的主要作用機制為何？", "opts": {"A": "透過封閉疤痕部位及角質層保濕 (hydration of the stratum corneum)，降低膠原蛋白生成並調節癒合相關生長因子", "B": "直接殺滅傷口中的細菌以減少感染所致的過度疤痕形成", "C": "提供持續的機械性牽引力以拉伸並軟化疤痕組織", "D": "直接刺激黑色素細胞增生以均勻化色素沉著", "E": "透過局部加熱促進疤痕組織溶解再吸收"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【矽膠凝膠 Silicone Gel 改善疤痕機轉】\n• **主要機轉：封閉 (occlusion) + 角質層保濕 (hydration of stratum corneum)** → 降低經表皮水分散失 (TEWL)，抑制角質細胞訊號、下調纖維母細胞活性與膠原過度生成，並調節 TGF-β 等生長因子 → 減少肥厚性疤痕/蟹足腫。\n• 次要：降低微血管活性、減少 mast cell 介導的膠原沉積；並非靠加壓、加熱或殺菌。\n• **第一線非侵入性疤痕預防**（silicone sheet / gel）；使用需持續數月。\n• 對應正解 **A**。", "peropt": {"A": "◎ 。封閉疤痕（occlusion）與角質層保濕（hydration of stratum corneum）→ 降低 TEWL、下調膠原生成並調節 TGF-β 等生長因子。", "B": "✗ 機轉非殺菌；矽膠不靠殺滅細菌改善疤痕。", "C": "✗ 機轉非機械性牽引軟化（此為 pressure/tension therapy 概念，非矽膠）。", "D": "✗ 機轉非刺激黑色素細胞增生均勻色素。", "E": "✗ 機轉非局部加熱溶解再吸收疤痕。"}, "cite": "Neligan PS 5e Vol.1, Scar management — silicone gel/sheeting mechanism; international scar management guideline.", "conflict": ""}, {"id": "9045", "sub": "BAS", "src": "GS", "years": [115], "stem": "靜脈吻合器 (venous coupler) 被認為是顯微外科技術的重大進展，關於其臨床特性，下列何者正確？", "opts": {"A": "靜脈吻合器僅適用於管徑大於5mm的粗大靜脈", "B": "使用靜脈吻合器後無需進行術後血流監測", "C": "使用靜脈吻合器後，術後血栓發生率顯著高於手工縫合", "D": "靜脈吻合器同樣廣泛適用於動脈端對端吻合，效果優於靜脈吻合", "E": "靜脈吻合器可改善手術效率、縮短吻合時間，且通暢率 (patency rate) 至少與手工縫合相當"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯【靜脈吻合器 Venous Coupler 臨床特性】\n• **E（正解）**：coupler（如 Synovis GEM microvascular anastomotic coupler）能**縮短吻合時間、提升效率**，其**通暢率 (patency) 至少與手工縫合相當甚至更佳**（外翻對合、內膜貼合佳、減少異物於管腔內）。\n• A 錯：coupler 適用於**廣泛管徑**（常見 1.5–4mm），非僅 >5mm。\n• B 錯：使用 coupler 後**仍須術後皮瓣/血流監測**。\n• C 錯：coupler 血栓率**不高於**手工縫合（通暢率相當或更好）。\n• D 錯：coupler **主要用於靜脈**；動脈壁厚、彈性強、壓力高，coupler 於動脈端使用受限，並非『動脈效果優於靜脈』。\n• 靜脈壁薄易塌陷 → coupler 對靜脈吻合尤具優勢。", "peropt": {"A": "✗ Coupler 適用於廣泛管徑（約 1.5–4 mm），非僅限 >5 mm 粗大靜脈。", "B": "✗ 使用 coupler 後仍需常規術後血流/皮瓣監測，非可省略。", "C": "✗ Coupler 術後血栓率不高於手工縫合，通暢率相當或更佳。", "D": "✗ Coupler 主要用於靜脈；動脈壁厚、彈性強、高壓，coupler 使用受限，非『動脈優於靜脈』。", "E": "◎ 。Coupler 提升效率、縮短吻合時間，通暢率(patency)至少與手工縫合相當甚至更佳。"}, "cite": "Neligan PS 5e Vol.1, Microsurgical anastomotic coupler; Grabb & Smith 9e, Microsurgery.", "conflict": ""}, {"id": "9046", "sub": "BAS", "src": "GS", "years": [115], "stem": "皮膚移植物 (skin graft) 在植入後存活的傳統三個依序發生的階段，正確的時序排列為何？", "opts": {"A": "炎症期 (inflammation) → 增生期 (proliferation) → 成熟期 (remodeling)", "B": "血漿浸潤 (imbibition) → 血管接通 (inosculation) → 再血管化 (revascularization)", "C": "止血 (hemostasis) → 炎症 (inflammation) → 增生 (proliferation)", "D": "貼附 (adhesion) → 角化 (keratinization) → 收縮 (contraction)", "E": "擴散 (diffusion) → 吻合 (anastomosis) → 融合 (fusion)"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【皮膚移植物 Skin Graft 存活三階段】\n• 傳統依序三階段：\n  1. **Plasmatic imbibition（血漿浸潤，0–48h）**：graft 靠受區滲出的血漿營養被動擴散存活、吸水水腫。\n  2. **Inosculation（血管接通，~48–72h）**：graft 與受區既有血管**斷端對接吻合**。\n  3. **Revascularization / Capillary ingrowth（再血管化，~4–7天）**：新生血管長入、建立循環。\n• 對應正解 **B**。\n• 臨床意涵：早期 (前 48h) graft 最脆弱，**剪力 (shear)、血腫 (hematoma)、感染** 為存活失敗主因 → 需固定 (tie-over/bolster) 與制動。\n• 其他選項為傷口癒合期/其他流程之混淆。", "peropt": {"A": "✗ 此為一般傷口癒合分期（發炎→增生→成熟），非 skin graft 存活三階段。", "B": "◎ 。Imbibition（血漿浸潤，0–48h）→ Inosculation（血管接通，~48–72h）→ Revascularization（再血管化，~4–7天）。", "C": "✗ 止血→發炎→增生為傷口癒合序列，非 graft take 三階段。", "D": "✗ 貼附→角化→收縮非公認 graft 存活三階段用語。", "E": "✗ 擴散→吻合→融合為混淆詞，非標準 graft 三階段術語。"}, "cite": "Neligan PS 5e Vol.1, Skin grafts — imbibition/inosculation/revascularization; Grabb & Smith 9e, Grafts.", "conflict": ""}, {"id": "9047", "sub": "BAS", "src": "GS", "years": [115], "stem": "關於延遲現象 (delay phenomenon / vascular delay) 在皮瓣重建中的原理與應用，下列哪些陳述正確？", "opts": {"A": "延遲現象又稱缺血預適應 (ischemic preconditioning)，透過次致命性缺血改善皮瓣血供", "B": "其機制包含「choke 血管 (choke vessels)」的開放、皮瓣內血管縱向擴張及新生血管形成 (angiogenesis)", "C": "臨床上第二次皮瓣移轉手術通常在第一次手術後約2週執行，以達最大血流增強效果", "D": "對具有吸菸史、糖尿病、肥胖或放射線治療史等微循環受損的患者特別有臨床價值", "E": "延遲現象僅能透過手術方式達成，不存在任何藥物性或非手術性的延遲方法"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯【延遲現象 Delay Phenomenon（複選，選正確）】\n• A 正確：延遲現象本質類似**缺血預適應 (ischemic preconditioning)**，藉次致命性缺血提升皮瓣對後續缺血的耐受、改善血供與存活。\n• B 正確：機轉含 **choke vessels 開放/擴張**、皮瓣內血管**縱向重定向擴張 (reorganization)** 與 **angiogenesis 新生血管**，交感神經去神經化使血管擴張。\n• C 正確：臨床上二期皮瓣移轉多於首次手術後**約 2 週**執行以達最大血流增益。\n• D 正確：對**吸菸、糖尿病、肥胖、放射線治療**等微循環受損高危病人特別有價值。\n• **E（錯誤）**：延遲**不僅限手術**；亦有**藥物性/化學性 delay**（如血管活性藥物、局部藥劑）等非手術方法，故 E 錯，非答案。", "peropt": {"A": "◎ 正確。延遲現象即缺血預適應（ischemic preconditioning），藉次致命性缺血改善皮瓣血供與耐受。", "B": "◎ 正確。機轉含 choke vessels 開放/擴張、皮瓣內血管縱向重定向擴張與 angiogenesis 新生血管。", "C": "◎ 正確。二期皮瓣移轉通常於首次手術後約 2 週執行以達最大血流增益。", "D": "◎ 正確。對吸菸、糖尿病、肥胖、放療等微循環受損病人特別有臨床價值。", "E": "✗ 錯誤。延遲不僅限手術；亦存在藥物性/化學性（如血管活性藥物、局部藥劑）非手術性延遲方法，故非正確陳述、非答案。"}, "cite": "Neligan PS 5e Vol.1, Flap physiology — delay phenomenon & choke vessels; Taylor angiosome concept.", "conflict": ""}, {"id": "9048", "sub": "BAS", "src": "GS", "years": [115], "stem": "進行 gracilis muscle flap 作為 facial reanimation 時，其主要運動神經來源為下列何者？", "opts": {"A": "Femoral nerve", "B": "Obturator nerve", "C": "Sciatic nerve", "D": "Superior gluteal nerve", "E": "Common peroneal nerve"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【Gracilis 皮瓣運動神經 = Obturator nerve】\n• **Gracilis muscle 運動神經**：**Obturator nerve（閉孔神經）之前支 (anterior branch)**；此神經於血管蒂 (medial circumflex femoral vessels) 近端進入肌肉。\n• 於 **facial reanimation（微笑重建）**：以 gracilis 為 free functional muscle transfer，將其 obturator nerve 分支吻合至**對側顏面神經 (cross-face nerve graft)** 或 **同側咬肌神經 (masseteric nerve, CN V₃分支)** 以驅動微笑。\n• 感覺/其他：gracilis 血供屬 **Mathes-Nahai type II**（主蒂 medial circumflex femoral）。\n• 其他選項神經皆不支配 gracilis：Femoral（股四頭肌/縫匠肌）、Sciatic（後大腿/小腿）、Superior gluteal（臀中/小肌、TFL）、Common peroneal（小腿前外/腓側）。", "peropt": {"A": "✗ Femoral nerve 支配股四頭肌、縫匠肌、恥骨肌，非 gracilis。", "B": "◎ 。Gracilis 運動神經為 Obturator nerve（閉孔神經前支 anterior branch）。", "C": "✗ Sciatic nerve 支配後大腿與小腿肌群，非 gracilis。", "D": "✗ Superior gluteal nerve 支配臀中/小肌與 TFL，非 gracilis。", "E": "✗ Common peroneal nerve 支配小腿前/外側肌群，非 gracilis。"}, "cite": "Neligan PS 5e Vol.2, Free gracilis for facial reanimation (obturator nerve); Grabb & Smith 9e, Flap anatomy.", "conflict": ""}, {"id": "9049", "sub": "BAS", "src": "GS", "years": [115], "stem": "關於 tissue expansion 後皮膚與軟組織的組織學變化，下列何者較正確？", "opts": {"A": "epidermis會變厚，而 dermis 會變薄", "B": "dermis 會變厚，但 epidermis 會萎縮", "C": "血管密度會下降", "D": "expanded skin 不會增加表面積，只是暫時被拉長", "E": "肌肉粒線體大小與數目一定減少"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【組織擴張後之組織學變化（選較正確）】\n• **A（正解）**：擴張後**表皮 (epidermis) 增厚**（棘層/角質層增生、細胞分裂↑），而**真皮 (dermis) 變薄**（膠原重排、部分萎縮）。\n• 其他變化：血管密度**增加**（VEGF 介導 angiogenesis）、皮瓣真實表面積**增加**（非僅暫時拉長 = 有 biologic creep 生物性蠕變 + mechanical creep）、肌肉粒線體大小數目**增加**。\n• B 錯：真皮變薄非變厚、表皮增厚非萎縮。\n• C 錯：血管密度**上升**非下降。\n• D 錯：擴張皮膚**真實增加表面積**（生物性生長），非僅暫時拉長。\n• E 錯：肌肉粒線體大小數目**增加**非減少。", "peropt": {"A": "◎ 。組織擴張後表皮（epidermis）增厚、真皮（dermis）變薄。", "B": "✗ 應為真皮變薄、表皮增厚，與此選項相反。", "C": "✗ 擴張後血管密度『上升』（VEGF/angiogenesis），非下降。", "D": "✗ 擴張皮膚『真實增加表面積』（biologic creep 生物性蠕變＋mechanical creep），非僅暫時拉長。", "E": "✗ 肌肉粒線體大小與數目『增加』，非減少。"}, "cite": "Neligan PS 5e Vol.1, Tissue expansion histology (biologic vs mechanical creep).", "conflict": ""}, {"id": "9050", "sub": "BAS", "src": "GS", "years": [115], "stem": "對於乾淨、銳利切割造成且兩端可無張力對合的急性周邊神經斷裂，下列何者通常較適當？", "opts": {"A": "永久觀察，不需追蹤功能恢復", "B": "早期 primary nerve repair", "C": "立即截肢以避免 neuroma", "D": "只做傷口縫合，神經斷端不需處理", "E": "常規以放射治療促進神經再生"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：急性周邊神經斷裂之修復時機與方式（Primary vs Secondary nerve repair）\n• 【最佳適應症】乾淨、銳利（clean, sharp）切割傷且兩斷端可無張力（tension-free）對合 → 首選 early primary (epineurial) repair，一般於受傷後數天內（<72小時至1週）進行，此時斷端可清楚辨識、無明顯纖維化，結果最佳。\n• 【生理基礎】神經修復成功仰賴軸突（axon）沿 endoneurial tube 以約 1 mm/day 速度再生（Wallerian degeneration 後由遠端 Schwann cell 形成 Büngner bands 導引）；無張力對合可避免缺血與纖維化，提高再神經化。\n• 【張力處理】若有間隙（gap）致無法無張力對合 → 應以 nerve graft（如 sural nerve）或 conduit/nerve transfer 橋接，切勿勉強拉攏縫合造成張力性缺血。\n• 【延遲修復適應症】污染傷口、crush/avulsion（傷害區範圍不明）→ 可先清創、標記斷端，待傷害範圍界定（demarcation）後行 secondary repair。\n• 現代觀念：即刻截肢、放射治療促進神經再生皆無實證且錯誤。", "peropt": {"A": "✗ 可修復之銳利斷裂不應消極觀察，會形成 neuroma 與功能喪失。", "B": "◎ 。銳利、無張力可對合之急性斷裂 → 早期一期神經修復（<72h至1週），結果最佳。", "C": "✗ 截肢為極端且無指徵之處置；neuroma 可以修復或 TMR/RPNI 預防。", "D": "✗ 僅縫皮而不處理神經斷端將導致 painful neuroma 及功能缺損。", "E": "✗ 放射治療對神經再生無促進作用，反而有害。"}, "cite": "Neligan Plastic Surgery 5e, Vol.6 Peripheral nerve repair; Grabb & Smith 9e 周邊神經章", "conflict": ""}, {"id": "9051", "sub": "BAS", "src": "GS", "years": [115], "stem": "關於 painful terminal neuroma 的形成與處置原則，下列何者最正確？", "opts": {"A": "neuroma 只會發生在神經中段，不會發生在斷端", "B": "neuroma 形成代表再神經化一定成功", "C": "單純將神經斷端剪短即可保證不再疼痛", "D": "提供再生軸突適當的生理目標，例如 targeted muscle reinnervation 或 regenerative peripheral nerve interface，可作為預防或治療策略之一", "E": "所有細小感覺神經切斷後皆不可能造成疼痛"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Painful terminal neuroma 之形成機轉與現代處置（TMR / RPNI）\n• 【形成機轉】神經被切斷後，近端再生軸突（regenerating axons）失去遠端 target，於斷端與 Schwann cells、纖維母細胞纏結形成 disorganized neuroma；機械或化學刺激下產生異位放電 → 神經瘤性疼痛（neuroma pain）。可發生於任何被切斷之神經斷端，包含細小感覺神經。\n• 【核心觀念】給予再生軸突「適當的生理目標」以防止雜亂纏結是預防／治療關鍵：\n  - TMR（Targeted Muscle Reinnervation）：將神經接到新去神經化之運動神經分支/肌肉，提供軸突再生標的。\n  - RPNI（Regenerative Peripheral Nerve Interface）：將神經斷端包埋入游離肌肉小片（free muscle graft）提供標的，可同時作為義肢訊號界面。\n• 【傳統方法】單純剪短（traction neurectomy）、埋入肌肉/骨、酒精注射等效果不穩定，無法保證止痛。\n• neuroma 形成不代表功能性再神經化成功。", "peropt": {"A": "✗ 斷端（terminal/end neuroma）為最常見型，並非只發生於中段（in-continuity）。", "B": "✗ neuroma 是雜亂再生，並不代表功能性再神經化成功。", "C": "✗ 單純剪短（traction neurectomy）無法保證不再疼痛，常復發。", "D": "◎ 。提供軸突生理標的（TMR、RPNI）為現代預防／治療 painful neuroma 之策略。", "E": "✗ 細小感覺神經切斷後亦可能形成痛性神經瘤。"}, "cite": "Neligan 5e Peripheral nerve / neuroma management; TMR (Dumanian), RPNI (Cederna) 相關文獻", "conflict": ""}, {"id": "9052", "sub": "BAS", "src": "GS", "years": [115], "stem": "關於 tissue engineering 的基本概念與 scaffold materials，下列何者正確？(複選)", "opts": {"A": "Tissue-engineered solutions typically combine biomaterial scaffolds, cell sources, and biologic cues to guide tissue development.", "B": "Tissue-engineered solutions are essentially inert prosthetic implants and do not aim for biologic integration with host tissue.", "C": "Polycaprolactone (PCL), polylactic acid (PLA), polyglycolic acid (PGA), and PLGA are examples of biodegradable synthetic polymers used in tissue engineering.", "D": "Collagen, elastin, hyaluronic acid, fibrin, alginate, and silk are examples of biologically derived scaffold materials.", "E": "The mechanical properties of a scaffold have minimal influence on embedded or host cells and do not affect stem cell differentiation."}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：組織工程（Tissue Engineering）三大要素與 scaffold materials（複選）\n• 【三大支柱 Triad】(1) Scaffold（支架/生物材料）、(2) Cells（細胞來源，如幹細胞）、(3) Signals/biologic cues（生長因子等生物訊號）— 目標為引導組織發育並與宿主生物性整合（biologic integration），而非惰性義肢。\n• 【合成可降解聚合物 synthetic biodegradable polymers】PCL（polycaprolactone）、PLA（polylactic acid）、PGA（polyglycolic acid）、PLGA — 可調控降解速率與機械強度。\n• 【天然/生物來源 scaffold】collagen、elastin、hyaluronic acid、fibrin、alginate、silk — 生物相容、含細胞辨識訊號。\n• 【機械性質關鍵】支架之硬度/彈性（stiffness/matrix elasticity）會經 mechanotransduction 顯著影響幹細胞分化命運（如 Engler 研究：基質硬度導向 neurogenic/myogenic/osteogenic 分化）→ 故 E 敘述『機械性質影響極小』為錯。", "peropt": {"A": "◎ 正確。組織工程結合 scaffold＋cells＋biologic cues 三大要素引導組織發育。", "B": "✗ 組織工程追求與宿主之生物整合與再生，非惰性義肢（inert prosthesis）。", "C": "◎ 正確。PCL/PLA/PGA/PLGA 為可降解合成聚合物。", "D": "◎ 正確。collagen/elastin/HA/fibrin/alginate/silk 為生物來源支架材料。", "E": "✗ 支架機械性質（stiffness/彈性）經 mechanotransduction 明顯影響細胞行為與幹細胞分化（如基質硬度導向 neuro/myo/osteogenic 分化），非影響極小。"}, "cite": "Neligan 5e Vol.1 Tissue engineering / biomaterials; Grabb & Smith 9e 再生醫學章", "conflict": ""}, {"id": "9053", "sub": "BAS", "src": "GS", "years": [115], "stem": "A researcher is interested in investigating quality of free flap reconstruction. When discussing available datasets, their mentor asks what the focus on the project will be. The Donabedian framework proposes three domains of quality:", "opts": {"A": "Patient, Surgeon, Hospital", "B": "Structure, Process, Outcome", "C": "Diagnosis, Treatment, Morbidity", "D": "Intervention, Comparison, Outcome", "E": "Population, Intervention, Outcomes"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Donabedian 醫療品質三構面（Quality of care framework）\n• Avedis Donabedian 提出評估醫療品質三大 domain：\n  - Structure（結構）：資源、設施、人力、設備、組織架構（如醫院是否具顯微重建能力）。\n  - Process（過程）：實際提供的照護行為與流程（如手術執行、術後照護是否遵循指引）。\n  - Outcome（結果）：對病患健康狀態之影響（如皮瓣存活率、併發症、生活品質）。\n• 【應用】研究游離皮瓣重建品質時，須先界定聚焦於結構、過程或結果何者。\n• 【易混淆】PICO（Population, Intervention, Comparison, Outcome）為實證醫學問題架構，非品質三構面。", "peropt": {"A": "✗ Patient/Surgeon/Hospital 非 Donabedian 三構面。", "B": "◎ 。Structure（結構）、Process（過程）、Outcome（結果）為 Donabedian 品質三構面。", "C": "✗ Diagnosis/Treatment/Morbidity 非此架構。", "D": "✗ 屬 PICO 之部分元素（Intervention/Comparison/Outcome），非品質三構面。", "E": "✗ Population/Intervention/Outcomes 為 PICO（實證問題架構），非品質三構面。"}, "cite": "Neligan 5e Evidence-based medicine / quality; Donabedian 1966", "conflict": ""}, {"id": "9054", "sub": "BAS", "src": "GS", "years": [115], "stem": "According to the theory of spherical graft replacement originally described by Eto et al., what is the characteristic cellular fate within the middle \"regenerating zone\" of a transplanted fat particle during the initial 3-month post-grafting period?", "opts": {"A": "Both adipocytes and adipose-derived stem cells (ASCs) survive because they are in direct contact with the surrounding recipient tissue.", "B": "Both adipocytes and ASCs die without regeneration due to their location being farthest from the recipient tissue, which causes relative ischemia.", "C": "Grafted adipocytes die while ASCs survive, become activated, and differentiate into mature adipocytes to replace the dead cells.", "D": "Grafted adipocytes survive and proliferate, while ASCs undergo immediate necrosis and form oil cysts or fibrosis regardless of the recipient site conditions."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：脂肪移植 Eto 球型置換理論（Spherical graft replacement theory）之三區帶\n• Eto 等人以移植脂肪顆粒之球型模型描述三個同心區帶：\n  - 【Surviving zone（外層）】距受區組織最近（<~300 µm），adipocytes 與 ASCs 皆存活。\n  - 【Regenerating zone（中層）】相對缺血：成熟脂肪細胞（adipocytes）死亡，但較耐缺氧之 adipose-derived stem cells（ASCs）存活、被活化，於前3個月分化為新的成熟脂肪細胞取代死亡細胞 → 本題答案 C。\n  - 【Necrotizing zone（核心）】距受區最遠，adipocytes 與 ASCs 皆死亡 → 形成 oil cyst、纖維化、鈣化。\n• 【臨床意義】說明脂肪移植早期體積維持與 ASC 之再生角色，強調受區血流與顆粒大小對 graft take 之影響（小顆粒、良好血床有利存活）。", "peropt": {"A": "✗ 此描述 surviving zone（外層，<~300 µm，adipocytes 與 ASCs 皆存活），非中層 regenerating zone。", "B": "✗ 此描述 necrotizing zone（核心，距受區最遠，adipocytes 與 ASCs 皆死亡），非中層。", "C": "◎ 。中層 regenerating zone：adipocytes 死亡、ASCs 存活活化並於前3個月分化為新成熟脂肪細胞取代死亡細胞。", "D": "✗ ASCs 較耐缺血並非立即壞死；且非成熟脂肪細胞存活增生，此描述與理論相反。"}, "cite": "Eto et al., Plast Reconstr Surg 2012（spherical graft replacement）; Neligan 5e Fat grafting", "conflict": ""}, {"id": "9077", "sub": "BAS", "src": "NG", "years": [105, 111, 112, 114], "stem": "下列何者於1597年發表著作詳細說明及圖示運用手臂皮瓣進行鼻部重建的器械、適應症、步驟、包紮及結果等細節，因而被認為是整形外科學的先驅？", "opts": {"A": "Leonardo Fioravanti", "B": "Gaspare Tagliacozzi", "C": "Joseph Constantine Carpue", "D": "Harold Gillies", "E": "Carl Ferdinand von Gräfe"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：整形外科醫學史——Gaspare Tagliacozzi。\n- 1597年出版《De Curtorum Chirurgia per Insitionem》，詳述以上臂(brachial/arm flap，即Italian method)行鼻部重建之器械、適應症、步驟、包紮與結果，被譽為整形外科學先驅、『重建外科之父』。\n- 此為分段延遲上臂皮瓣(delayed pedicled arm flap)之經典，與印度式前額皮瓣(Indian forehead flap)並列鼻再造兩大古典法。\n【他人對照】\n- Carpue(1816)於英國復興印度式前額皮瓣。\n- von Gräfe(1818)著《Rhinoplastik》。\n- Gillies、McIndoe為一戰/二戰現代整形外科奠基者。", "peropt": {"A": "✗ Leonardo Fioravanti——16世紀外科醫師，非1597鼻再造著作之作者。", "B": "◎ Gaspare Tagliacozzi——1597年著《De Curtorum Chirurgia》圖示上臂皮瓣（Italian method）鼻再造，整外先驅，正解。", "C": "✗ Joseph Constantine Carpue——1816年於英國復興印度式前額皮瓣，時代不符。", "D": "✗ Harold Gillies——一次大戰現代整外之父（20世紀），時代不符。", "E": "✗ Carl Ferdinand von Gräfe——1818年著《Rhinoplastik》，時代不符。"}, "cite": "Neligan Plastic Surgery 5e – History of plastic surgery；Grabb & Smith 9e Ch.1 History。", "conflict": ""}, {"id": "9152", "sub": "BAS", "src": "NG", "years": [108, 110, 112, 113, 114, 115], "stem": "According to the Robotics in plastic surgery, which of the statements below is correct?", "opts": {"A": "Robotic technology is the next step in the evolution of minimally invasive techniques", "B": "With improved visualization, elimination of physiologic tremor, motion scaling, and decreased fatigue, the surgical robot has emerged as a potentially useful tool in microvascular, microlymphatic and microneural surgery.", "C": "The advantages of robotics over endoscopy are three-dimensional vision, high definition, magnification, and superior ergonomics", "D": "With complete tremor elimination and up to 5 : 1 motion scaling, the surgical robot is capable of superhuman levels of precision.", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯【整形外科機器人手術Robotics】問『何者正確』，正解E(以上皆是)。\n• (A)：機器人技術是微創(minimally invasive)技術演進的下一步。\n• (B)：改善視野、消除生理性震顫(physiologic tremor)、motion scaling、降低疲勞，使手術機器人成為microvascular、microlymphatic、microneural surgery潛在有用工具。\n• (C)：相較內視鏡，機器人優勢為3D視覺、高解析、放大及更佳ergonomics。\n• (D)：完全消除震顫加上最高5:1 motion scaling，可達『超越人手』的精準度。\n→四者皆為正確敘述，故選E。", "peropt": {"A": "正確——機器人為微創技術下一步演進", "B": "正確——消除震顫/motion scaling/減疲勞，利於顯微血管·淋巴·神經手術", "C": "正確——相較內視鏡具3D、高解析、放大、ergonomics優勢", "D": "正確——完全消除震顫加最高5:1 motion scaling達超人精準", "E": "◎ 以上皆是——四項敘述均正確"}, "cite": "Neligan Plastic Surgery 5e, Robotics in plastic surgery；Grabb & Smith 9e 科技章節", "conflict": ""}, {"id": "9169", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "下列有關Skin graft take的敘述何者有誤 ?", "opts": {"A": "一般描述skin graft take的三個階段為 serum imbibition, revascularization, maturation", "B": "所謂的Serum imbibition指的是Graft從wound bed透過plasma以擴散作用進行氧氣和營養物質的提供", "C": "Revascularization的過程從graft後約24-48小時開始, wound bed和wound margin都逐漸有顯著的血管新生", "D": "Graft maturation會持續到一年左右，且感覺神經難以恢復到正常", "E": "比較厚的STSG，能與FTSG一樣帶有hair follicles, sweat glands, and dermal nerves等"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【植皮存活Skin graft take】問『何者有誤』，正解C。\n• (C錯誤)：Revascularization(inosculation/neovascularization)並非約24–48小時即開始並在wound bed與margin都顯著新生；一般認為血管再生於植皮後『約48–72小時(第2–3天)』才開始建立血流，且是由wound bed為主逐步進行，敘述之時間/範圍不正確。\n• (A正確)：Skin graft take三階段為serum imbibition→revascularization(inosculation)→maturation(organization/remodeling)。\n• (B正確)：Serum imbibition指graft最初1–2天靠wound bed滲出之plasma以擴散提供氧氣與養分並維持濕潤。\n• (D正確)：Graft maturation持續約一年，感覺神經再生難以恢復至完全正常。\n• (E正確)：較厚之STSG較接近FTSG，可帶有較多毛囊、汗腺、真皮神經等附屬結構(且原發性收縮較多、次發性收縮較少)。", "peropt": {"A": "✓ 正確——take三階段：serum imbibition→revascularization(inosculation)→maturation", "B": "✓ 正確——serum imbibition指最初1–2天經wound bed滲出plasma以擴散供氧供養", "C": "◎ 有誤(本題答案)——revascularization應約於植皮後第2–3天(48–72h)才開始建立血流，非24–48h；且主要由wound bed供應，時程/範圍敘述不正確", "D": "✓ 正確——maturation持續約1年，感覺神經難恢復至完全正常", "E": "✓ 正確——較厚STSG較近FTSG，帶較多毛囊/汗腺/真皮神經(原發性收縮多、次發性收縮少)"}, "cite": "Neligan Plastic Surgery 5e / Grabb & Smith 9e, Skin graft physiology—take phases", "conflict": ""}, {"id": "9170", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "以下有關軟骨(Cartilage)及其做為graft的敘述何者有誤?", "opts": {"A": "軟骨是軟骨細胞(chondrocytes)加上extracellular matrices (ECM) of type III collagen fibers, proteoglycans, and elastic fibers 所組成", "B": "軟骨可以被分成三種type: hyaline cartilage, fibrocartilage and elastic cartilage", "C": "Outer ear structure中的軟骨屬於elastic cartilage，另外larynx and epiglottis也屬於此種軟骨", "D": "Hyaline cartilage是人體組織中最常見的軟骨種類", "E": "軟骨是藉由類似無氧呼吸，透過組織間液的擴散作用獲取營養"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【軟骨Cartilage及軟骨移植】問『何者有誤』，正解A。\n• (A錯誤)：軟骨由chondrocytes加上ECM組成，但其主要膠原為『type II collagen』，並非type III collagen。此為關鍵錯誤(type III為網狀纖維，見於早期傷口/血管等)。\n• (B正確)：軟骨分三型：hyaline、fibrocartilage、elastic cartilage。\n• (C正確)：外耳(auricle)軟骨屬elastic cartilage；epiglottis亦為elastic cartilage(惟larynx多數軟骨為hyaline，此為次要爭點，但主錯項在A)。\n• (D正確)：Hyaline cartilage為人體最常見之軟骨(關節面、鼻中隔、肋軟骨、氣管等)。\n• (E正確)：軟骨無血管，藉類似無氧代謝並經組織間液擴散獲取養分(故癒合/整合慢、感染風險相對低)。", "peropt": {"A": "◎ 有誤(本題答案)——軟骨ECM之主要膠原為type II collagen，非type III(type III為網狀纖維見於早期傷口/血管)", "B": "✓ 正確——軟骨分hyaline、fibrocartilage、elastic三型", "C": "✓ 正確——外耳(auricle)與epiglottis屬elastic cartilage(註：larynx多數軟骨實為hyaline，屬次要爭點)", "D": "✓ 正確——hyaline為人體最常見軟骨(關節面、鼻中隔、肋軟骨、氣管)", "E": "✓ 正確——軟骨無血管，經組織間液擴散、類似無氧代謝取養"}, "cite": "Neligan Plastic Surgery 5e, Cartilage graft；(對照NG112-B02-Q04題幹極性誘答，勿混記)", "conflict": "題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG112-B02-Q04）"}, {"id": "9172", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "於 Sunderland's classification中，哪一種 degree of injury屬於neuroma-in-continuity，endoneurium以及perineurium有complete scar block ?", "opts": {"A": "Degree II", "B": "Degree III", "C": "Degree IV", "D": "Degree V", "E": "Degree VI"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【周邊神經損傷Sunderland分類】問『屬neuroma-in-continuity且endoneurium與perineurium皆complete scar block』者，正解C(Degree IV)。\n• Sunderland六度分類：\n  - Degree I(=Seddon neurapraxia)：僅傳導阻斷，構造完整，完全恢復。\n  - Degree II(=axonotmesis)：axon斷、endoneurium完整，可完全恢復。\n  - Degree III：axon+endoneurium斷、perineurium完整→部分恢復、可能neuroma-in-continuity。\n  - Degree IV：axon+endoneurium+perineurium皆受損，僅epineurium維持連續性，形成『neuroma-in-continuity』且有complete scar block，需手術切除+神經移植。\n  - Degree V(=neurotmesis)：整條神經完全斷裂。\n  - Degree VI(Mackinnon補充)：混合型損傷。\n→符合題意者為Degree IV。", "peropt": {"A": "錯誤——Degree II為axonotmesis、endoneurium完整可恢復", "B": "錯誤——Degree III perineurium完整、部分恢復", "C": "◎ 正確——Degree IV僅epineurium連續，形成neuroma-in-continuity且endo/perineurium完全scar block", "D": "錯誤——Degree V為完全斷裂(neurotmesis)", "E": "錯誤——Degree VI(Mackinnon)為混合型損傷"}, "cite": "Neligan Plastic Surgery 5e / Grabb & Smith 9e, Peripheral nerve injury—Sunderland classification", "conflict": ""}, {"id": "9173", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "The anatomic concepts are fundamental to the mapping of the vascular territories and to the planning of incisions and flaps. Which statement about the anatomic concepts are correct ? (複選)", "opts": {"A": "Veins radiate from fixed to mobile areas and arteries converge from mobile to fixed areas.", "B": "Vessels \"hitchhike\" with nerves.", "C": "Vessels obey the law of equilibrium.", "D": "Vessels have a relatively constant both destination and origin.", "E": "Muscles are the prime movers of venous return."}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【血管territory解剖概念(Taylor angiosome)】複選『何者正確』，正解BCE。\n• (B正確)：血管『搭便車(hitchhike)』伴隨神經走行(neurovascular相伴)。\n• (C正確)：血管遵循『平衡法則(law of equilibrium)』——相鄰血管領域間口徑互補，某血管小則鄰接血管代償變大。\n• (E正確)：肌肉為靜脈回流之『主要驅動者(prime movers of venous return)』(muscle pump)。\n• (A錯誤)：方向敘述反向——正確為『動脈由固定區radiate向移動區、靜脈由移動區converge回固定區』，題目所述相反。\n• (D錯誤)：血管有相對『固定的destination(去處)，但origin(起源)可變異』；並非destination與origin皆固定。", "peropt": {"A": "錯誤——方向反了：動脈由固定→移動放射，靜脈由移動→固定匯聚", "B": "◎ 正確——血管hitchhike伴隨神經走行", "C": "◎ 正確——血管遵循law of equilibrium(相鄰領域口徑互補代償)", "D": "錯誤——血管destination相對固定但origin可變異，非兩者皆固定", "E": "◎ 正確——肌肉為靜脈回流之prime mover(muscle pump)"}, "cite": "Neligan Plastic Surgery 5e, Vascular anatomy of skin—Taylor angiosome concepts", "conflict": ""}, {"id": "9174", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "根據Mathes and Nahai Classification for muscle/musculocutaneous flap, Jejunum flap 和 Fibula flap 分別是哪種type的flap?", "opts": {"A": "Type I, Type II", "B": "Type I, Type V", "C": "Type II, Type IV", "D": "Type III, Type IV", "E": "Type III, Type V"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【Mathes-Nahai肌肉/肌皮瓣血流分類】問Jejunum flap與Fibula flap之type，正解B(Type I, Type V)。\n• Mathes-Nahai依血管蒂型態分Type I–V：\n  - Type I：單一血管蒂(one vascular pedicle)\n  - Type II：主蒂+次要蒂(dominant + minor pedicles)——最常見\n  - Type III：兩個dominant pedicles\n  - Type IV：多個節段性蒂(segmental pedicles)\n  - Type V：一個dominant pedicle + 次要之segmental(節段)蒂\n• Jejunum flap：由單一mesenteric/jejunal branch供應→Type I。\n• Fibula flap：由peroneal vessels之dominant pedicle加上多個segmental穿枝→Type V(此為經典歸類，使其可作osteocutaneous並可分段osteotomy)。\n→故答案為Type I(jejunum)、Type V(fibula)。", "peropt": {"A": "✗ Type I, Type II——Jejunum為Type I(單一mesenteric蒂)正確，但Fibula應為Type V(dominant peroneal蒂+節段穿支)，非Type II", "B": "◎ 正確——Jejunum=Type I(單一血管蒂)，Fibula=Type V(one dominant + segmental pedicles)", "C": "✗ Type II, Type IV——Jejunum應為Type I(非Type II)，Fibula應為Type V(非Type IV)", "D": "✗ Type III, Type IV——Jejunum應為Type I(非Type III)，Fibula應為Type V(非Type IV)", "E": "✗ Type III, Type V——Fibula之Type V正確，但Jejunum應為Type I(非Type III)"}, "cite": "Grabb & Smith 9e / Neligan 5e, Mathes-Nahai muscle/flap vascular classification", "conflict": ""}, {"id": "9180", "sub": "BAS", "src": "NG", "years": [109, 110, 111, 112, 113, 114, 115], "stem": "Which statements about acellular dermal matrix (ADM) is incorrect?", "opts": {"A": "ADM has been used in burn wound management for over 20 years.", "B": "ADM is also used to provide additional coverage of implant-based reconstructions.", "C": "In breast reconstruction surgery with implant, ADM is associated with high rates of postoperative seromas and infection.", "D": "Only 20% of breast implant-based reconstructions have used ADM for additional coverage.", "E": "ADM is also largely replacing the use of synthetic meshes in contaminated abdominal wall defects."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 去細胞真皮基質（Acellular Dermal Matrix, ADM）\n- **燒傷應用**：ADM 用於燒傷創面處理已逾 20 年 → A 正確。\n- **義乳重建覆蓋**：ADM 提供 implant 下極額外覆蓋、形成 inferolateral sling → B 正確。\n- **併發症**：以 ADM 之 implant-based 重建與較高**血清腫（seroma）與感染**率相關 → C 正確。\n- **使用比例**：義乳重建使用 ADM 覆蓋之比例遠高於 20%（近年多數案例採用）→ **D 為不正確敘述（答案）**◎。\n- **腹壁重建**：污染腹壁缺損中 ADM 大幅取代合成網片（synthetic mesh）→ E 正確。", "peropt": {"A": "✓ 正確——ADM用於燒傷創面處理已逾20年", "B": "✓ 正確——ADM於implant-based重建提供下極額外覆蓋(inferolateral sling)", "C": "✓ 正確——ADM之implant重建與較高seroma及感染率相關", "D": "◎ 有誤(本題答案)——並非僅20%；近年義乳重建使用ADM覆蓋之比例遠高於20%(多數implant-based案例採用，>50%)", "E": "✓ 正確——污染腹壁缺損中ADM大幅取代synthetic mesh"}, "cite": "Neligan 5e Vol.1 Biomaterials/ADM；Vol.5 Breast reconstruction；Grabb & Smith 9e", "conflict": "⚠ 同題歷屆重出：acellular dermal matrix(ADM)何者為誤。關鍵偽敘述皆『僅20%乳房植入式重建曾用ADM額外覆蓋』；純選項重排，多年版本(9180,109-115)答D、111/114年(9219)答E。"}, {"id": "9205", "sub": "BAS", "src": "NG", "years": [110, 112, 114], "stem": "For skeletal reconstruction, a non-vascularized bone graft can only be used for defect less than 5 cm. For a greater bone defect, Masquelet described a two-staged approach. First stage: radical debridement, cement spacer, soft tissue reconstruction. The spacer induced membrane which has rich vascular network, ensuring the survival of bone graft implanted in the second stage. What is the optimal interval between first and second stage?", "opts": {"A": "Within 2 weeks", "B": "6-8 weeks", "C": "3 months", "D": "Half year", "E": "As late as possible"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【Masquelet technique (induced membrane technique) 誘導膜技術】\n- 適用於節段性骨缺損 (segmental/intercalary bone defect)，非血管化骨移植上限約 5–6 cm，超過者採兩階段法。\n- **第一階段**：徹底清創 (radical debridement)、置入 **PMMA cement spacer (骨水泥間隔物)**、軟組織重建覆蓋。\n- Spacer 誘導形成富血管、含生長因子 (VEGF, BMP-2, TGF-β) 之 **induced membrane (誘導膜)**。\n- **第二階段時機**：最佳間隔為 **6–8 週 (約 4–8 週)**，此時誘導膜之血管化與生物活性成熟；移除 spacer，於膜腔內植入自體 cancellous bone graft。\n- 正解 **B (6–8 weeks)**。過早膜未成熟、過晚膜纖維化血管性下降。", "peropt": {"A": "Within 2 weeks｜✗ 過早，誘導膜尚未成熟。", "B": "◎ 6–8 weeks｜◎ 最佳間隔，誘導膜血管化/生物活性成熟。", "C": "3 months｜✗ 偏晚，膜纖維化風險增。", "D": "Half year｜✗ 過晚。", "E": "As late as possible｜✗ 錯誤觀念。"}, "cite": "Neligan Plastic Surgery 5e, Vol.4 Lower extremity/skeletal reconstruction; Masquelet AC 2000.", "conflict": ""}, {"id": "9206", "sub": "BAS", "src": "NG", "years": [111, 112, 114], "stem": "Who performed the first successful kidney transplant from one twin to another at the Peter Bent Brigham Hospital in Boston in 1954?", "opts": {"A": "Archibald Mclndoe", "B": "Joseph Murray", "C": "Jacques Reverdin", "D": "Paul Tessier", "E": "Harold Gillies"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯【整外/移植醫學史】首例成功腎臟移植\n- **Joseph Murray** 於 **1954 年**在波士頓 **Peter Bent Brigham Hospital** 完成人類首例成功腎臟移植——**同卵雙胞胎 (identical twins)** 間之移植（避開排斥），奠定移植免疫學基礎。\n- Murray 於 **1990 年獲諾貝爾生理醫學獎**，並為整形外科出身。\n- 正解 **B**。\n- 其他人物：Reverdin（表皮移植先驅）、Tessier（顱顏外科之父）、Gillies（現代整形外科之父）、McIndoe（燒燙傷/二戰重建）。", "peropt": {"A": "Archibald McIndoe｜✗ 二戰燒燙傷重建先驅 (Guinea Pig Club)。", "B": "◎ Joseph Murray｜◎ 1954 首例成功腎移植，1990 諾貝爾獎。", "C": "Jacques Reverdin｜✗ 首例人類表皮移植 (pinch graft)。", "D": "Paul Tessier｜✗ 顱顏外科之父。", "E": "Harold Gillies｜✗ 現代整形外科之父。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 History of plastic surgery.", "conflict": ""}, {"id": "9207", "sub": "BAS", "src": "NG", "years": [111, 112, 114], "stem": "Who performed the first successful epidermic graft on a human?", "opts": {"A": "Archibald Mclndoe", "B": "Joseph Murray", "C": "Jacques Reverdin", "D": "Paul Tessier", "E": "Harold Gillies"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【整外史】首例成功人類表皮移植\n- **Jacques-Louis Reverdin (1869)** 完成首例成功之人類 **epidermic graft (pinch graft/Reverdin graft)**，開啟皮膚移植時代。\n- 正解 **C**。\n- 記憶對照：Ollier–Thiersch (split-thickness graft)、Wolfe–Krause (full-thickness graft)、Reverdin (pinch/epidermic graft)。", "peropt": {"A": "Archibald McIndoe｜✗ 燒燙傷重建。", "B": "Joseph Murray｜✗ 腎移植。", "C": "◎ Jacques Reverdin｜◎ 1869 首例人類表皮移植。", "D": "Paul Tessier｜✗ 顱顏外科。", "E": "Harold Gillies｜✗ 現代整形外科之父。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 History; Skin graft history.", "conflict": ""}, {"id": "9208", "sub": "BAS", "src": "NG", "years": [111, 112, 114], "stem": "下列有關整形外科手術拍照的 key principles 何者正確? (複選)", "opts": {"A": "只要解析度一樣，相機不同沒關係", "B": "快門跟光圈必須保持一樣", "C": "閃光燈設備跟燈光要相同", "D": "藉著zoom in/ zoom out來對焦", "E": "不要改變白平衡，並且保持與藍色背景光源同步"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【整形外科臨床攝影 key principles 標準化原則】\n- 目的：術前/術後可比性，須嚴格**標準化 (standardization)**。\n- 核心原則：\n  1. **相同設備**：相機、鏡頭、閃光燈/照明須固定一致（僅解析度相同並不足夠，故 A 錯）。\n  2. **固定曝光參數**：**shutter speed 與 aperture (光圈) 保持一致** (B 正確)。\n  3. **相同閃光燈與照明條件** (C 正確)。\n  4. **對焦應移動相機/病人距離，不可用 zoom in/out 對焦**（zoom 改變視角/透視變形，故 D 錯）。\n  5. **固定白平衡 (white balance)**，並與背景光源同步（藍色標準背景）(E 正確)。\n- 正解 **BCE**。", "peropt": {"A": "只要解析度一樣，相機不同沒關係｜✗ 相機/鏡頭須一致，色彩幾何有別。", "B": "◎ 快門跟光圈必須保持一樣｜◎ 曝光參數固定確保可比性。", "C": "◎ 閃光燈設備跟燈光要相同｜◎ 照明一致。", "D": "藉 zoom in/out 對焦｜✗ 應以距離對焦，zoom 造成透視變形。", "E": "◎ 不改變白平衡並與藍色背景光源同步｜◎ 正確。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 Photography in plastic surgery.", "conflict": ""}, {"id": "9210", "sub": "BAS", "src": "NG", "years": [111, 112, 113, 114], "stem": "下列拍攝臉部相片的基本原則，何者錯誤？", "opts": {"A": "拍攝五種角度的相片", "B": "頭部上方留下約 10%相片高度的背景", "C": "相片下緣約在下巴的位置", "D": "除非另有考量，臉部肌肉應呈放鬆狀態", "E": "在oblique view鼻尖的位置應稍微超過或恰好位於顴骨隆凸(malar eminence)外緣"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【臉部攝影基本原則—找出錯誤】\n- 標準：\n  1. **五種角度 (frontal, 2×lateral, 2×oblique)** (A 正確)。\n  2. 頭頂上方保留約 **10% 相片高度之背景空間** (B 正確)。\n  3. 相片**下緣應在下巴以下 (含胸骨上凹/頸部)**，非恰在下巴位置 → **C 錯誤（本題答案）**；下緣切在下巴會裁掉頸頦線與下頜輪廓評估。\n  4. 除非特殊需求，**臉部肌肉放鬆 (repose)** (D 正確)。\n  5. Oblique view：**鼻尖 (nasal tip) 位置應恰好或略超過對側顴突 (malar eminence) 外緣** (E 正確)，作為 45° 標準對位依據。\n- 正解（錯誤敘述）為 **C**。", "peropt": {"A": "拍攝五種角度｜✓ 正確原則。", "B": "頭部上方留約 10% 背景｜✓ 正確。", "C": "◎ 相片下緣約在下巴的位置｜✗（本題答案）下緣應在下巴以下含頸部，切在下巴會裁掉下頜線。", "D": "臉部肌肉放鬆｜✓ 正確。", "E": "Oblique view 鼻尖略超過或恰在 malar eminence 外緣｜✓ 正確對位標準。"}, "cite": "Neligan Plastic Surgery 5e, Vol.2 Facial aesthetic photography principles.", "conflict": ""}, {"id": "9211", "sub": "BAS", "src": "NG", "years": [111, 112, 114], "stem": "關於ketamine，以下何者正確(複選)", "opts": {"A": "Ketamine works as a competitive N-methyl-D-aspartate (NMDA) receptor antagonist", "B": "Ketamine has a half-life of 180 minutes.", "C": "Ketamine is metabolized in the liver.", "D": "The use of ketamine has also been associated with a significant reduction of opioid-related side effects including postoperative nausea and vomiting (PONV).", "E": "Dose-dependent neuropsychiatric effects, including dysphoria, hallucinations, vivid, unpleasant dreams, and catatonia or psychoses are potential side effects of ketamine"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯【Ketamine 藥理—多重正確敘述】\n- **機轉**：Ketamine 為 **非競爭性 (NON-competitive) NMDA receptor antagonist**；A 敘述為「competitive」→ **錯誤**，故不選 A。\n- **半衰期**：約 **180 分鐘 (2–3 小時)** (B 正確)。\n- **代謝**：主要於 **肝臟 (CYP450)** 經 N-demethylation 生成 norketamine (C 正確)。\n- **臨床效益**：具鎮痛、opioid-sparing 效果，可降低 opioid 相關副作用含 **PONV (術後噁心嘔吐)** (D 正確)。\n- **副作用**：劑量相關之神經精神效應——dysphoria、hallucination、vivid unpleasant dreams、catatonia/psychosis（emergence reaction）(E 正確)。\n- 正解 **BCDE**。", "peropt": {"A": "Competitive NMDA receptor antagonist｜✗ Ketamine 為『非競爭性』NMDA 拮抗劑，敘述錯誤。", "B": "◎ Half-life 180 minutes｜◎ 約 2–3 小時，正確。", "C": "◎ Metabolized in the liver｜◎ 肝臟 CYP450 代謝。", "D": "◎ Reduces opioid-related side effects incl. PONV｜◎ opioid-sparing，正確。", "E": "◎ Dose-dependent neuropsychiatric effects｜◎ emergence reaction，正確。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 Anesthesia; ketamine pharmacology.", "conflict": ""}, {"id": "9212", "sub": "BAS", "src": "NG", "years": [111, 112, 114], "stem": "關於Tumescent analgesia (TA) in plastic surgery，下列何者錯誤？", "opts": {"A": "TA was popularized in the 1990s by Klein for use during liposuction", "B": "The reported dose limitation for lidocaine with epinephrine is 7 mg/kg; however, doses of 35 mg/kg are frequently used during liposuction", "C": "Peak lidocaine blood levels occur 6-8 hours following infiltration.", "D": "In highly vascularized areas, such as above the clavicle, plasma lidocaine levels peak at approximately 6 hours after injection", "E": "The maximal hemostatic effects of epinephrine occur 25 minutes after administration rather than the commonly held belief that this occurs at 7–10 minutes"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯【Tumescent analgesia (TA)—找出錯誤】\n- **A**：1990 年代由 **Klein** 推廣用於抽脂 (liposuction) → 正確。\n- **B**：Lidocaine+epinephrine 一般上限 7 mg/kg，但腫脹麻醉下常用高達 **35 mg/kg** (大稀釋、緩慢吸收) → 正確。\n- **C**：**血中 lidocaine 濃度高峰出現於注射後約 12–14 小時**（腫脹液吸收極慢）；本題敘述「6–8 小時」→ **錯誤（本題答案）**。\n- **D**：高血管區 (如鎖骨上) 吸收較快，血漿 lidocaine 峰值約在 6 小時 → 正確。\n- **E**：epinephrine 最大止血效果約在注射後 **25 分鐘**（非常誤認的 7–10 分鐘）→ 正確。\n- 正解（錯誤）為 **C**。", "peropt": {"A": "Popularized 1990s by Klein for liposuction｜✓ 正確。", "B": "7 mg/kg limit but 35 mg/kg used in liposuction｜✓ 正確。", "C": "◎ Peak lidocaine at 6–8 hours｜✗（本題答案）峰值約 12–14 小時。", "D": "Highly vascular areas peak ~6 hours｜✓ 正確。", "E": "Max hemostatic epinephrine at 25 minutes｜✓ 正確。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 Local anesthetics/Tumescent; Klein JA 1990s.", "conflict": ""}, {"id": "9215", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "What is the correct statement about delayed toxicity of radiation treatment?", "opts": {"A": "Lhermitte's syndrome is one kind of delayed acute toxicity of radiation treatment.", "B": "The effect of delayed acute toxicity is irreversible.", "C": "Radiation pneumonitis is not one of delayed acute toxicity of radiation treatment.", "D": "Delayed toxicity of radiation treatment is not correspond to the dose and size of the volume irradiated.", "E": "It occurs during 6 days to 6 weeks since the treatment started."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【放射線治療 delayed toxicity 延遲毒性】\n- 放射毒性分期：**acute (急性, 治療中至數週)、early-delayed/subacute (延遲急性, 數週至數月, 多可逆)、late (晚期, 數月至數年, 多不可逆)**。\n- **A**：**Lhermitte's syndrome (頸部前屈時觸電感)** 屬放射之 **delayed/early-delayed toxicity**，因暫時性脊髓脫髓鞘，**通常可逆** → **正確（本題答案）**。\n- **B**：delayed acute (early-delayed) 毒性多為**可逆** → 敘述「不可逆」錯。\n- **C**：**Radiation pneumonitis (放射性肺炎) 屬 early-delayed 毒性之一** → 敘述「不是」錯。\n- **D**：延遲毒性**與照射劑量及體積相關 (dose-volume dependent)** → 敘述「不相關」錯。\n- **E**：其發生非在「6 天至 6 週」之急性期，而是數週至數月之 subacute 期 → 錯。\n- 正解 **A**。", "peropt": {"A": "◎ Lhermitte's syndrome is a delayed toxicity｜◎（本題答案）屬 early-delayed，可逆。", "B": "Delayed acute toxicity is irreversible｜✗ early-delayed 多為可逆。", "C": "Radiation pneumonitis is not delayed acute｜✗ 放射性肺炎正屬 early-delayed。", "D": "Not correspond to dose and volume｜✗ 與劑量/體積相關。", "E": "Occurs 6 days to 6 weeks｜✗ 屬急性期時程，非延遲毒性。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1 Radiation biology/oncology; radiation toxicity phases.", "conflict": "⚠ 同題歷屆重出：radiation之delayed toxicity何者正確。正解皆『Lhermitte徵候群屬延遲毒性』；選項重排(9215措辭加'acute')，109年(9176)答D、111/114年(9215)答A。"}, {"id": "9218", "sub": "BAS", "src": "NG", "years": [109, 111, 114], "stem": "Which of the following statement about nerve graft is correct?", "opts": {"A": "The most common type of nerve graft is the interfascicular nerve graft.", "B": "If there's nerve gap of a transected nerve, we should repair the nerve with nerve graft with moderate tension.", "C": "The outcome of artificial nerve conduits was proved to be better than nerve autograft.", "D": "Nerve allograft can be use if nerve autograft is not enough, and immunosuppressant is not necessary.", "E": "There's still no report of successful outcome of nerve allograft in human trial."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯【Nerve graft 神經移植原則】\n- **A**：最常見之神經移植型式為 **interfascicular (cable) nerve graft**，將多股細神經 (如 sural nerve) 銜接於各神經束 → **正確（本題答案）**。\n- **B**：神經修復原則為 **tension-free (無張力)**；有神經缺損時應以移植橋接而非在張力下縫合，故「moderate tension」錯。\n- **C**：人工神經導管 (nerve conduit) 效果**未證實優於**自體神經移植 (autograft 為 gold standard)，僅適短缺損/小徑神經 → 錯。\n- **D**：Allograft（尤其新鮮同種異體）需免疫抑制；acellular processed allograft 雖免免疫抑制但敘述以絕對語氣「不需免疫抑制」→ 錯。\n- **E**：人類神經 allograft 已有成功報告 → 「仍無成功報告」錯。\n- 正解 **A**。", "peropt": {"A": "◎ Most common type is interfascicular nerve graft｜◎（本題答案）正確。", "B": "Repair with moderate tension｜✗ 應 tension-free。", "C": "Conduit outcome better than autograft｜✗ autograft 仍為 gold standard。", "D": "Allograft w/o immunosuppressant｜✗ 傳統 allograft 需免疫抑制。", "E": "No successful human allograft report｜✗ 已有成功報告。"}, "cite": "Neligan Plastic Surgery 5e, Vol.1/Vol.6 Peripheral nerve repair & grafting.", "conflict": "⚠ 同題歷屆重出：nerve graft何者正確。正解皆『最常見類型為interfascicular nerve graft』；A/B對調之純重排，109年(9179)答B、111/114年(9218)答A。"}, {"id": "9232", "sub": "BAS", "src": "NG", "years": [112, 114], "stem": "根據Mathes and Nahai classification for muscle/musculocutaneous flap, 哪些是type V vascular pattern muscles?", "opts": {"A": "Jejunum", "B": "Tensor fascia lata", "C": "Fibula", "D": "Latissimus dorsi", "E": "Pectoralis major"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：Mathes–Nahai肌肉血流分型之Type V\n- Type V=『one dominant pedicle + secondary segmental pedicles(單一主要蒂+次要節段蒂)』;可以主蒂為單一或反向以節段蒂為基之翻轉。\n- 典型Type V:Latissimus dorsi(主蒂thoracodorsal+節段肋間/腰動脈穿支)、Pectoralis major(主蒂thoracoacromial+節段IMA穿支)。\n- Fibula(osteocutaneous/骨皮瓣)在此題被歸為Type V血流型(近端節段+腓動脈供養模式)。\n- 對照:Jejunum為節段型(Type IV)；Tensor fascia lata為Type I(單一血管蒂)。", "peropt": {"A": "錯誤：Jejunum為segmental(Type IV)血流型。", "B": "錯誤：Tensor fascia lata為Type I(單一血管蒂)。", "C": "◎ 正確)Fibula歸此題設定之Type V。", "D": "◎ 正確)Latissimus dorsi為典型Type V(主蒂+節段蒂)。", "E": "◎ 正確)Pectoralis major為典型Type V(thoracoacromial主蒂+節段IMA穿支)。"}, "cite": "Mathes & Nahai classification；Neligan 5e Flaps", "conflict": ""}, {"id": "9240", "sub": "BAS", "src": "NG", "years": [108, 112, 113, 114], "stem": "Which of the following statements regarding vascularized epiphyseal reconstruction is incorrect?", "opts": {"A": "If the epiphysis is resected or lost secondary to tumor or trauma, respectively, growth potential can be restored in a child with skeletal immaturity through vascularized epiphyseal transfer.", "B": "The restoration of growth potential is still possible with non-vascularized autografts, allografts, prostheses, or vascularized bone grafts without an epiphysis.", "C": "The donor site for a vascularized epiphyseal reconstruction is the proximal fibular epiphysis with its adjacent diaphyseal shaft.", "D": "The proximal epiphysis of the fibula is supplied by an epiphyseal branch from the anterior tibial artery", "E": "The peroneal nerve is at risk for iatrogenic injury when dissection."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：血管化骨骺(vascularized epiphyseal)重建\n- B錯:唯有『vascularized epiphyseal transfer(帶血管之骨骺移植)』能保留生長板(physis)活性、恢復孩童縱向生長潛能;非血管化自體/異體移植、義體或『不含骨骺的』vascularized bone graft皆『無法』恢復生長潛能,故B敘述錯。\n- 供區:proximal fibular epiphysis連同鄰近骨幹(diaphyseal shaft)。\n- 血供:腓骨近端骨骺由『anterior tibial artery之骨骺分支』供養(設計蒂時需保留)。\n- 風險:剝離時peroneal nerve(腓總神經)易醫源性損傷,須小心保護。", "peropt": {"A": "正確：骨骺喪失後，於骨骼未成熟孩童可經帶血管骨骺移植恢復生長潛能。", "B": "◎ 錯誤選項)非血管化移植/異體/義體/不含骨骺之vascularized bone graft『無法』恢復生長潛能。", "C": "正確：供區為腓骨近端骨骺連同鄰近骨幹。", "D": "正確：腓骨近端骨骺由脛前動脈(anterior tibial a.)之骨骺分支供養。", "E": "正確：剝離時腓總神經(peroneal nerve)有醫源性損傷風險。"}, "cite": "Neligan 5e, Vascularized epiphyseal transfer", "conflict": "⚠ 同題歷屆重出(跨中英雙語)：vascularized epiphyseal reconstruction，核心偽敘述皆為『非血管化autograft/allograft/prosthesis/無epiphysis之vascularized graft仍可恢復生長潛能』(實為誤，僅vascularized epiphyseal transfer可保生長)。108年(9157,中文)答C、112/114年(9240)答B、113年(9257)答C；皆為單選為非、選項重排。"}, {"id": "9253", "sub": "BAS", "src": "NG", "years": [113, 114], "stem": "關於分裂皮層植皮(split-thickness skin grafts)，下列哪項描述是正確的？ (複選)", "opts": {"A": "人類皮膚是面積最大的單一器官，而重量最大的單一器官是肝臟。", "B": "較薄的split thickness graft 的recipient site 癒合速度較快，且donor site 癒合較快，可從同一取材區多次取材。", "C": "thick split thickness skin graft (0.45-0.6mm)含有較多完整毛囊及腺體構造，術後可能長出毛髮及汗腺功能。", "D": "Meshed split thickness skin graft 可用於傷口面積遠大於可用取材區的病人。", "E": "為避免延長取材區癒合時間，年幼病童及老年人常採用thick split-thickness skin graft。"}, "ans": "BCD", "multi": true, "etype": "ai",
