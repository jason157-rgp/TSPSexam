"expl": "", "key": "🎯考點：Split-thickness skin graft (STSG) 之厚度生理與臨床特性 (複選 ans BCD)\n- **A(器官敘述)**：皮膚確為面積最大器官，但**重量最大之單一器官是皮膚本身(非肝臟)**——皮膚約占體重 15%，遠重於肝臟。故 A 錯誤。\n- **B**：STSG 依 dermis 厚度分薄/中/厚。**較薄的 STSG → recipient site 上皮化與存活較快(需求養分少、血管內生易)，donor site 保留較多真皮附屬器→癒合快、可重複取材**。正確。\n- **C**：**Thick STSG (0.45–0.6 mm)** 含較多完整毛囊與腺體，術後較可能長毛髮、具部分汗腺功能，且收縮(secondary contraction)較少。正確。\n- **D**：**Meshed STSG** 可擴張覆蓋面積(1.5:1、3:1…)，用於供區有限而創面極大者，並利引流。正確。\n- **E**：**幼童與老年人真皮薄**，取厚 STSG 反易造成 donor site 難癒合/全層化；為避免延長癒合，應取**較薄**STSG，故 E 錯誤(敘述相反)。", "peropt": {"A": "皮膚為面積最大也是『重量最大』的單一器官，非肝臟，錯誤。", "B": "◎ 薄 STSG recipient 存活快、donor site 癒合快可重複取材，正確。", "C": "◎ 厚 STSG(0.45–0.6mm) 含較多附屬器可有毛髮/汗腺功能，正確。", "D": "◎ Meshed STSG 供區有限而創面大時可擴張覆蓋，正確。", "E": "幼童/老人真皮薄應取薄 STSG 以利供區癒合，敘述相反，錯誤。"}, "cite": "Grabb & Smith 9e, skin grafts；Neligan 5e, skin graft classification & donor site。", "conflict": ""}, {"id": "9254", "sub": "BAS", "src": "NG", "years": [113, 114], "stem": "關於全層皮層植皮(full-thickness skin grafts)，下列哪項描述是正確的？(複選)", "opts": {"A": "常用於臉部及手部等需要良好功能及觸覺的部位。", "B": "donor site 常選組織鬆弛有彈性的位置，以便primary closure。", "C": "當graft連脂肪層一起取下並植皮，稱之為composite graft。", "D": "術後，敷料約在3-8 天内更換。", "E": "當病人需要鼻尖重建，建議使用composite graft, harvest from post-auricular region"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：Full-thickness skin graft (FTSG) 適應症、供區與敷料 (複選 ans ABCDE 全對)\n- **A**：FTSG 含完整真皮→**收縮少、色澤質地佳、耐磨、觸覺與功能佳**，適用臉部、手部等需良好功能與外觀處。正確。\n- **B**：供區須能一期縫合(primary closure)，故選**組織鬆弛、有彈性、隱蔽處**(如耳後、鎖骨上、上臂內側、腹股溝)。正確。\n- **C**：**Composite graft** 指含一種以上組織(如皮膚+脂肪、皮膚+軟骨)一併移植；本敘述將帶脂肪層之 graft 稱 composite，依 ans 為正確。\n- **D**：FTSG 需較久血管化，敷料(tie-over bolster)一般**約 3–8 天更換/檢視**以確認 take。正確。\n- **E**：**鼻尖/鼻翼緣重建**常用含軟骨之 **composite graft，取自耳廓(post-auricular / conchal / helical rim)**，提供結構支撐與外形。正確。", "peropt": {"A": "◎ FTSG 收縮少、功能觸覺佳，適用臉/手，正確。", "B": "◎ 供區選鬆弛有彈性處以利一期縫合，正確。", "C": "◎ 含脂肪等一種以上組織一併移植稱 composite graft，正確。", "D": "◎ FTSG 敷料約 3–8 天更換/檢視，正確。", "E": "◎ 鼻尖重建可用取自耳後區之 composite graft，正確。"}, "cite": "Neligan 5e & Grabb & Smith 9e, full-thickness skin graft & composite graft (nasal reconstruction)。", "conflict": ""}, {"id": "9259", "sub": "BAS", "src": "NG", "years": [112, 114], "stem": "Which of the following statements regarding body dysmorphic disorder (BDD) is false?", "opts": {"A": "An extreme form of body image anxiety, with symptoms sufficiently severe to result in significant distress and impairment in day-to-day life.", "B": "The prevalence of BDD is around 1% in rhinoplasty clinics.", "C": "In BDD milder forms, it can be difficult to distinguish from other body image issues.", "D": "People with BDD are very clearly over-represented in groups reporting postoperative dissatisfaction, risk of postoperative dissatisfaction is high and screening out of the surgical pathway is recommended.", "E": "Specific management guidance in the UK recommends evidence-based psychological treatments in the form of Cognitive Behavior Therapy (CBT) and or medication."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Body dysmorphic disorder (BDD) 於整形/美容外科的辨識與處置 (選 false 者 ans B)\n- **A**：BDD 為身體意象焦慮之極端型式，症狀嚴重到造成顯著痛苦與日常功能損害。正確。\n- **B(false/答案)**：BDD 在整形/美容(尤其 rhinoplasty)門診之盛行率**遠高於一般人口(約 1%)**——文獻估計美容/rhinoplasty 求診族群約 **7–15%(部分達 20%)**，故『rhinoplasty 門診約 1%』低估，為錯誤敘述(本題答案)。\n- **C**：BDD 較輕型與其他身體意象問題不易區辨。正確。\n- **D**：BDD 病人在術後不滿意族群中明顯過度代表(over-represented)，術後不滿意風險高，**建議於手術路徑中篩檢並排除(screening out)**。正確。\n- **E**：英國(NICE)特定指引建議以實證心理治療 **CBT 及/或藥物(SSRIs)** 為主，而非手術。正確。", "peropt": {"A": "BDD 為極端身體意象焦慮致顯著功能損害，正確。", "B": "◎ false/答案) rhinoplasty 門診盛行率遠高於 1%(約 7–15%)，敘述低估錯誤。", "C": "輕型 BDD 與其他身體意象問題難區辨，正確。", "D": "BDD 於術後不滿意族群過度代表，建議篩檢排除，正確。", "E": "英國指引建議 CBT 及/或藥物治療，正確。"}, "cite": "Neligan 5e psychological aspects of aesthetic surgery；NICE BDD guidance。", "conflict": "⚠ 同題歷屆重出：body dysmorphic disorder(BDD)何者為偽。共同關鍵偽敘述皆為『BDD在美容/鼻整形族群盛行率被低估(僅約1-2%)』(實際遠高)；其餘干擾項不同(9223偏診斷準則、9259偏臨床特徵與處置)。112年(9223)答E、114年(9259)答B。屬同考點文字/情境微調。"}, {"id": "9260", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which statement about social media and advertising in plastic surgery is wrong?", "opts": {"A": "With the explosion of social media, the opportunities of misspeaking and misunderstanding have exponentially multiplied.", "B": "Plastic surgeons may look to social media as a practice building tool to amplify their spheres of influence.", "C": "Through social media, patients may gain easier access both to educational information as well as to opportunities to communicate with their surgeons’ practices.", "D": "Social media usage becomes both a patient service and a professional service and potential tool for informed consent.", "E": "Studies have shown that the majority of patients and most physicians believe social media sources to be unbiased and reliable."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：整形外科之社群媒體與廣告倫理 (選 wrong 者 ans E)\n- **A**：社群媒體爆炸性成長使『失言與被誤解』的機會呈指數增加。正確。\n- **B**：整外醫師可將社群媒體作為建立業務、擴大影響力之工具。正確。\n- **C**：透過社群媒體病人更易取得衛教資訊並與醫師診所溝通。正確。\n- **D**：社群媒體使用兼具病人服務與專業服務性質，並為知情同意(informed consent)之潛在工具。正確。\n- **E(wrong/答案)**：研究顯示**多數病人與醫師『並不』認為社群媒體來源為無偏見且可靠**——社群內容常有商業/行銷偏誤、缺乏同儕審查，需批判性看待。故『多數人認為社群無偏見可靠』為錯誤敘述(本題答案)。", "peropt": {"A": "社群成長使失言誤解機會指數增加，正確。", "B": "社群可作為業務建立與擴大影響力工具，正確。", "C": "病人更易取得衛教並與診所溝通，正確。", "D": "社群兼具病人/專業服務並為知情同意潛在工具，正確。", "E": "◎ wrong/答案) 多數病人與醫師『並不』認為社群來源無偏見可靠，敘述相反錯誤。"}, "cite": "Neligan 5e ethics, professionalism & social media in plastic surgery。", "conflict": ""}, {"id": "9261", "sub": "BAS", "src": "NG", "years": [114], "stem": "Regarding wound healing, which is wrong?", "opts": {"A": "The process of wound healing usually progresses through four phases of hemostasis, inflammation, proliferation and maturation, which often occur in strict isolation.", "B": "During the maturation phase, wound tensile strength increases by an improved organization of the ECM.", "C": "The proliferative phase includes three essential aspects of wound healing: (1) granulation tissue deposition, (2) re-epithelialization, and (3) wound contraction.", "D": "During the inflammation phase, the immune system is activated, and blood vessels dilate, permitting inflammatory cells to migrate to the tissue surrounding the injured area.", "E": "The hemostasis phase begins within seconds to minutes after a wound is incurred."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Wound healing 四期與時序 (選 wrong 者 ans A)\n- **A(wrong/答案)**：傷口癒合四期為 **hemostasis → inflammation → proliferation → maturation(remodeling)**，但這些階段**彼此重疊、動態連續(overlap)，並非『嚴格獨立(strict isolation)』**進行。故 A 錯誤(本題答案)。\n- **B**：**Maturation(remodeling)期**藉由 ECM(尤其 collagen type III→type I)重新排列與交聯，**張力強度(tensile strength)提升**(約傷後可達正常 ~80%)。正確。\n- **C**：**Proliferative 期**三大要素：①肉芽組織生成(granulation) ②再上皮化(re-epithelialization) ③傷口收縮(wound contraction, 由 myofibroblast 驅動)。正確。\n- **D**：**Inflammation 期**免疫系統活化、血管擴張，讓發炎細胞(嗜中性球→巨噬細胞)移行至傷口周圍。正確。\n- **E**：**Hemostasis 期**於受傷後數秒至數分鐘內開始(血管收縮、血小板凝集、纖維蛋白栓)。正確。", "peropt": {"A": "◎ wrong/答案) 四期彼此重疊連續，並非『嚴格獨立』進行，錯誤。", "B": "Maturation 期經 ECM 重組使張力強度提升，正確。", "C": "Proliferative 期含肉芽生成/再上皮化/傷口收縮三要素，正確。", "D": "Inflammation 期免疫活化、血管擴張致發炎細胞移行，正確。", "E": "Hemostasis 期於受傷後數秒至數分鐘啟動，正確。"}, "cite": "Neligan 5e & Grabb & Smith 9e, phases of wound healing。", "conflict": ""}, {"id": "9262", "sub": "BAS", "src": "NG", "years": [114], "stem": "Regarding keloid and hypertrophic scar, which is the wrong statement?", "opts": {"A": "Hypertrophic scar is most common in wounds across flexion surfaces, the extremities, breasts, sternum, and neck.", "B": "The management of keloid scars is multimodal, including pressure, steroids, laser, radiotherapy, and surgical excision.", "C": "Intralesional steroids increase fibroblast proliferation, collagen synthesis, and secretion of proinflammatory mediators to decrease scar formation.", "D": "Keloid scar occur predominantly in darkly pigmented individuals, like African populations.", "E": "Keloid scar demonstrates genetic predisposition with autosomal dominant features."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Keloid vs Hypertrophic scar 之特性與 steroid 機轉 (選 wrong 者 ans C)\n- **A**：HTS 好發於**跨屈側面(flexion surfaces)、四肢、乳房、胸骨、頸部**等高張力部位。正確。\n- **B**：Keloid 處置為多模式：壓力、類固醇、雷射、放射治療、手術切除(且術後常合併輔助以降復發)。正確。\n- **C(wrong/答案)**：**Intralesional steroid 之機轉為『抑制』纖維母細胞增生與膠原合成、下調促發炎介質→減少疤痕**；題目卻寫『increase fibroblast proliferation, collagen synthesis, and secretion of proinflammatory mediators』方向完全相反，故為錯誤敘述(本題答案)。\n- **D**：Keloid 好發於**深膚色族群(如非洲裔)**。正確。\n- **E**：Keloid 具遺傳傾向，可呈**體染色體顯性(autosomal dominant)** 併不完全外顯特徵。正確。\n※ note：本題屬跨年誘答之事實置換題，概念同但測到的事實不同(對照 NG112-B02-Q02)；答案不受影響。", "peropt": {"A": "HTS 好發於屈側/四肢/乳房/胸骨/頸部高張力區，正確。", "B": "Keloid 多模式治療(壓力/類固醇/雷射/放療/手術)，正確。", "C": "◎ wrong/答案) Steroid 應為『抑制』纖維母細胞增生與膠原合成，題目方向相反，錯誤。", "D": "Keloid 好發於深膚色族群如非洲裔，正確。", "E": "Keloid 具遺傳傾向可呈體染色體顯性，正確。"}, "cite": "Neligan 5e keloid/HTS pathophysiology & management。", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B02-Q02）"}, {"id": "9263", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which description of surgical technique to prevent scar formation is wrong?", "opts": {"A": "Surgeon utilizes fine instruments and atraumatic technique to minimize trauma to tissue, thereby reducing scar formation.", "B": "Excessive tension clearly plays a role in widened and hypertrophic scars.", "C": "Skin eversion can be seen as an exaggerated application of the principle of tension-free closure.", "D": "To minimize visible scarring, elective incisions are least noticeable when placed perpendicular to the natural lines of skin tension (Langer’s lines).", "E": "Failure to remove stitches in a timely fashion can result in a disfiguring railroad scar pattern from stitch marks."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：預防疤痕之外科技術原則 (選 wrong 者 ans D)\n- **A**：使用精細器械與**非創傷性(atraumatic)技術**減少組織創傷→減少疤痕。正確。\n- **B**：**過度張力(excessive tension)** 明確與增寬疤與 HTS 相關。正確。\n- **C**：**皮膚外翻(eversion)** 可視為無張力縫合原則之強化應用，避免日後凹陷。正確。\n- **D(wrong/答案)**：切口應**沿(平行/落在)自然皮膚張力線(Langer's lines / RSTL)** 才最不明顯；題目寫『**perpendicular(垂直)** 於 Langer's lines』完全相反，垂直橫越張力線反致疤痕增寬明顯。故為錯誤敘述(本題答案)。\n- **E**：未及時拆線(縫線留置過久)會沿針孔形成**鐵軌狀(railroad/cross-hatch)疤痕**。正確。", "peropt": {"A": "精細器械+非創傷技術減少組織創傷與疤痕，正確。", "B": "過度張力與增寬疤/HTS 相關，正確。", "C": "皮膚外翻為無張力縫合原則之強化，正確。", "D": "◎ wrong/答案) 切口應『平行/沿』張力線最不明顯，非『垂直』，敘述相反錯誤。", "E": "縫線留置過久致鐵軌狀針孔疤痕，正確。"}, "cite": "Neligan 5e & Grabb & Smith 9e, principles of scar minimization / RSTL & Langer's lines。", "conflict": ""}, {"id": "9264", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which statement about preoperative and intra-operative imaging for plastic surgery is correct?", "opts": {"A": "Image-guided 3D surgical planning, such as virtual surgical planning (VSP) and 3D printing, is commonly used in orthognathic surgery, mandibular reconstruction with free fibula flap and cranial vault remodeling in craniosynostosis.", "B": "Indocyanine green (ICG) is a fluorescent dye that has been broadly studied in sentinel lymph node mapping, hepatic uptake in laparoscopy, and intra-operative vascular mapping in cardiac surgery, neurosurgery, and ophthalmology.", "C": "ICG mapping has been combined with radiotracer uptake to perform reverse lymphatic mapping for vascularized lymph node transfer.", "D": "The ability of surgical navigation to precisely locate anatomical structures in the body is paramount to surgery.", "E": "Mixed reality also provides a unique way for surgeons to interact with patients, such as for pain control and demonstrating postoperative outcomes to patients."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：整外術前/術中影像與導航科技 (複選 ans ABCDE 全對)\n- **A**：影像導引 3D 手術規劃(VSP)與 3D 列印廣泛用於**正顎手術、free fibula 下顎重建、顱縫早閉之顱骨重塑(cranial vault remodeling)**。正確。\n- **B**：**ICG** 為近紅外螢光染劑，廣泛研究於前哨淋巴結定位、腹腔鏡肝臟攝取、以及心臟/神經/眼科之術中血管定位。正確。\n- **C**：ICG 可與放射示蹤劑(radiotracer)結合進行**reverse lymphatic mapping**，用於血管化淋巴結移植(VLNT)以避免供區淋巴水腫。正確。\n- **D**：手術導航精準定位體內解剖結構之能力，對手術至關重要。正確。\n- **E**：**混合實境(Mixed reality)** 提供醫師與病人互動之新方式(如疼痛控制、向病人展示術後結果)。正確。", "peropt": {"A": "◎ VSP/3D 列印用於正顎、fibula 下顎重建、顱骨重塑，正確。", "B": "◎ ICG 近紅外螢光用於前哨淋巴/肝攝取/血管定位，正確。", "C": "◎ ICG+radiotracer 之 reverse lymphatic mapping 用於 VLNT，正確。", "D": "◎ 手術導航精準定位解剖結構對手術至關重要，正確。", "E": "◎ 混合實境提供醫病互動(疼痛控制/展示術後結果)，正確。"}, "cite": "Neligan 5e imaging, navigation, VSP & ICG in plastic surgery。", "conflict": ""}, {"id": "9265", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which statement about venous thromboembolism (VTE) for plastic surgery is correct?", "opts": {"A": "The importance of patient-centric risk stratification in venous thromboembolism is often underscored.", "B": "The 2005 Caprini score is a widely validated VTE risk stratification tool that is easy to use because it is based on only 10 individual factors.", "C": "The 2005 Caprini score may identify patients with a strong family history of VTE or, in women, a history of ≥3 lost pregnancies, each of which can be a marker of undiagnosed genetic hypercoagulability.", "D": "Sequential compression devices (SCDs) reduce VTE risk in surgical patients.", "E": "Postoperative garments can act as an iatrogenic venous tourniquet, which can cause a partial upstream blockage."}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：整外靜脈栓塞(VTE)風險分層與預防 (複選 ans ACDE)\n- **A**：以病人為中心(patient-centric)之風險分層於 VTE 中至關重要且常被強調。正確。\n- **B(錯誤者)**：**2005 Caprini score 並非僅含 10 個因子**——其為含**約 40 項危險因子**之加權工具；『only 10 individual factors』與事實不符，故 B 錯誤，不列入正解。\n- **C**：2005 Caprini 可辨識具**強烈 VTE 家族史，或女性 ≥3 次流產史**等潛在遺傳性高凝狀態標記。正確。\n- **D**：**間歇性充氣加壓裝置(SCDs)** 可降低外科病人 VTE 風險(機械性預防)。正確。\n- **E**：術後**緊身衣(garment)** 可能成為醫源性靜脈止血帶(venous tourniquet)造成部分上游阻塞→增 VTE 風險。正確。", "peropt": {"A": "◎ 病人為中心之 VTE 風險分層至關重要，正確。", "B": "2005 Caprini score 含約 40 項因子非僅 10 項，敘述錯誤，非正解。", "C": "◎ Caprini 可辨識 VTE 家族史/≥3 次流產等高凝標記，正確。", "D": "◎ SCDs 降低外科病人 VTE 風險，正確。", "E": "◎ 術後緊身衣可成醫源性靜脈止血帶增風險，正確。"}, "cite": "Neligan 5e VTE prophylaxis；Caprini risk assessment model(2005)。", "conflict": ""}, {"id": "9266", "sub": "BAS", "src": "NG", "years": [112, 114], "stem": "關於cancer management的描述何者正確(複選)?", "opts": {"A": "There has been a gradual progression from radical to more conservative resections of many cancers.", "B": "Neoadjuvant therapies have facilitated resectability and even downstaging of some tumors.", "C": "Cancer immunotherapies have revolutionized the therapeutic landscape for many cancers.", "D": "Targeted therapies represent a new paradigm in the treatment of cancer aiming to combine efficacy and decreased toxicity.", "E": "Rational, evidenced approaches to tumor ablation should aim to improve oncologic outcomes and reduce morbidity."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：現代癌症治療典範轉移 (複選 ans ABCDE 全對)\n- **A**：許多癌症之外科切除已由**根除性(radical)漸趨保守(conservative)切除**(如乳癌 BCS、黑色素瘤 margin 縮小)。正確。\n- **B**：**新輔助治療(neoadjuvant)** 促進可切除性(resectability)並使部分腫瘤降期(downstaging)。正確。\n- **C**：**癌症免疫療法(如免疫檢查點抑制劑)** 已革命性改變眾多癌症治療版圖。正確。\n- **D**：**標靶治療(targeted therapy)** 代表兼顧療效與降低毒性之新典範。正確。\n- **E**：理性、實證導向之腫瘤消融(ablation)應以改善腫瘤學預後並降低併發症為目標。正確。\n※ note：本題屬跨年誘答之事實置換題，概念同但測到的事實不同(對照 NG112-B01-Q09)；答案不受影響。", "peropt": {"A": "◎ 多數癌症由根除性趨向保守切除，正確。", "B": "◎ 新輔助治療促進可切除性與降期，正確。", "C": "◎ 免疫療法革命性改變癌症治療版圖，正確。", "D": "◎ 標靶治療為兼顧療效與低毒性之新典範，正確。", "E": "◎ 實證導向腫瘤消融應改善預後並降併發症，正確。"}, "cite": "Neligan 5e oncologic principles；modern cancer therapy paradigms。", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B01-Q09） ｜ ⚠ 同題歷屆重出：cancer management原則(複選)＝以上皆是(根治轉保守/neoadjuvant可降期/免疫學進展→biologic或immunotherapy/targeted therapy/實證式腫瘤切除)。僅C措辭微調(免疫學進展↔免疫治療革命)，112年(9224)與114年(9266)答案皆ABCDE。"}, {"id": "9267", "sub": "BAS", "src": "NG", "years": [114], "stem": "The anatomic concepts are fundamental to the mapping of the vascular territories and to the planning of incisions and flaps. Which statement about the anatomic concepts is incorrect ?", "opts": {"A": "Veins radiate from fixed to mobile areas and arteries converge from mobile to fixed areas.", "B": "Vessels “hitchhike” with nerves.", "C": "Vessels obey the law of equilibrium.", "D": "Muscles are the prime movers of venous return."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Taylor 血管解剖概念(angiosome)與皮瓣規劃 (選 incorrect 者 ans A)\n- **A(incorrect/答案)**：正確原則為 **動脈(arteries)由固定區向移動區放射(radiate from fixed to mobile)，靜脈(veins)由移動區向固定區匯聚(converge from mobile to fixed)**；題目將動、靜脈方向**對調**故為錯誤敘述(本題答案)。\n- **B**：血管常與神經『搭便車(hitchhike)』並行(neurovascular 伴行)。正確。\n- **C**：血管遵守**平衡律(law of equilibrium)**——某區血管口徑小則鄰區代償增大，彼此互補。正確。\n- **D**：**肌肉為靜脈回流的主要驅動(muscle pump)**——肌肉收縮擠壓靜脈促回流。正確。", "peropt": {"A": "◎ incorrect(本題答案)——正確為動脈由固定區→移動區radiate、靜脈由移動區→固定區converge；題目方向對調", "B": "✓ 正確——血管與神經伴行『搭便車(hitchhike)』", "C": "✓ 正確——血管遵守law of equilibrium，相鄰領域口徑互補代償", "D": "✓ 正確——肌肉為靜脈回流主要驅動(muscle pump)"}, "cite": "Taylor GI, angiosome concept；Neligan 5e vascular territories & flap design。", "conflict": ""}, {"id": "9268", "sub": "BAS", "src": "NG", "years": [114], "stem": "關於Principles of microvascular surgery，哪一個選項是錯的?", "opts": {"A": "Size-discrepant vessels are commonly encountered, and vessel mismatches of up to 4 : 1 can be anastomosed end-to-end depending on technical skills.", "B": "When dealing with atherosclerotic vessels, suture should ideally be passed from the inside of the lumen of the atherosclerotic vessel to the outside.", "C": "Vasospasm occurs in 30% of microsurgical procedures and plays an important role in the pathogenesis of hypoperfusion, promoting thrombosis.", "D": "Veins appear to be less susceptible to vasospasm than arteries but, once established, harder to resolve and more detrimental.", "E": "All the above are correct."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：Microvascular surgery 原則與 vasospasm (選『錯』者 ans C)\n- **A**：口徑不一致(size-discrepant)血管常見，端對端吻合可容忍**至多約 4:1** 之口徑差(視技術)。正確。\n- **B**：處理動脈粥狀硬化(atherosclerotic)血管時，縫線理想上應**由管腔內側穿向外側(inside-out)**，以避免掀起斑塊/夾層(dissection flap)。正確。\n- **C(錯/答案)**：**Vasospasm 發生率並非 30%**——文獻所述血管痙攣的實際發生率與本敘述數據不符(顯著偏高)，故為錯誤敘述(本題答案)；vasospasm 確會致低灌注並促血栓形成，但『30%』之數據錯誤。\n- **D**：**靜脈較動脈不易發生 vasospasm**，但一旦發生則較難緩解且後果更嚴重。正確。\n- **E**：因 C 為錯，故『以上皆正確』不成立。", "peropt": {"A": "✓ 正確——size-discrepant血管端對端吻合可容忍至多約4:1口徑差(視技術)", "B": "✓ 正確——縫合硬化血管應由管腔內側穿向外側(inside-out)以免掀起斑塊/dissection flap", "C": "◎ 錯誤(本題答案)——vasospasm發生率非題述之數據；vasospasm雖確會致低灌注並促血栓，但所引比例與教科書不符", "D": "✓ 正確——靜脈較動脈不易vasospasm，但一旦發生較難緩解且後果更嚴重", "E": "✗ 因C錯誤，『以上皆正確』不成立"}, "cite": "Neligan 5e principles of microsurgery；vasospasm & size mismatch。", "conflict": ""}, {"id": "9269", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which of following features is not the properties of an ideal implant?", "opts": {"A": "Minimal foreign-body reaction.", "B": "Elastic or supple.", "C": "Allows collagen ingrowth.", "D": "Tolerates infected environment.", "E": "Transparent and barely visible."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：理想植入物(ideal implant/alloplast)特性 (選『非』特性者 ans E)\n- 理想植入物特性應包含：\n  - **A 極小異物反應(minimal foreign-body reaction)** ✔\n  - **B 有彈性/柔軟(elastic/supple)** 貼合組織 ✔\n  - **C 允許膠原長入(collagen ingrowth)** 促進整合固定 ✔\n  - **D 能耐受感染環境(tolerates infected environment)/抗感染** ✔\n- **E(非特性/答案)**：**『透明且幾乎不可見(transparent and barely visible)』並非理想植入物之標準特性**——理想特性重視生物相容性、可塑形、可消毒、不致癌、化學惰性、易取得等，而非光學透明度。故 E 為錯誤選項(本題答案)。\n- 補充其他理想特性：化學惰性(chemically inert)、不致癌(noncarcinogenic)、可消毒(sterilizable)、易塑形(easily shaped)、機械強度足夠、成本合理。", "peropt": {"A": "極小異物反應為理想特性，屬正確特性。", "B": "有彈性/柔軟為理想特性，屬正確特性。", "C": "允許膠原長入促整合為理想特性，屬正確特性。", "D": "耐受感染環境為理想特性，屬正確特性。", "E": "◎ 非特性/答案) 『透明幾乎不可見』非理想植入物標準特性，為本題答案。"}, "cite": "Grabb & Smith 9e alloplastic implants；Neligan 5e biomaterials 理想 implant 特性。", "conflict": ""}, {"id": "9270", "sub": "BAS", "src": "NG", "years": [114, 115], "stem": "Which of the following is important in deciding the dose of local anesthetic to be administered?", "opts": {"A": "Patient weight", "B": "Modality of administration", "C": "Epinephrine added or not", "D": "Acidity of the environment", "E": "All the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：局部麻醉劑量之決定因素 (ans E 全部皆是)\n- 決定 local anesthetic 安全劑量/作用之因素：\n  - **A 病人體重(weight)**：最大劑量以 mg/kg 計(如 lidocaine 4.5 mg/kg；含 epinephrine 7 mg/kg；tumescent 可達 35–55 mg/kg)。✔\n  - **B 給藥方式(modality)**：局部浸潤/區域阻斷/tumescent 之吸收速率與安全劑量不同。✔\n  - **C 是否加 epinephrine**：加腎上腺素→血管收縮、延緩全身吸收、延長作用並提高最大安全劑量。✔\n  - **D 環境酸鹼(acidity/pH)**：組織酸性(如感染/發炎處)使更多藥物呈離子態→穿透力下降、起效差，影響效果。✔\n- **E(答案)**：以上皆為決定劑量/效果之重要考量。\n- 安全補充：警覺 **LAST(local anesthetic systemic toxicity)**，處置以 **20% lipid emulsion(intralipid)** 為關鍵。\n📊補充最大安全劑量(mg/kg)：\n- **Lidocaine**：不加 epi 4.5 mg/kg(max 300 mg)；加 epi 7 mg/kg(max 500 mg)\n- **Bupivacaine**：2–2.5 mg/kg(加 epi 約 3 mg/kg)\n- **Tumescent lidocaine**：可達 35–55 mg/kg(高度稀釋＋epi)\n- 加 epinephrine(1:100,000–1:200,000)可提高上限並延長作用、減少全身吸收。", "peropt": {"A": "病人體重決定 mg/kg 最大劑量，屬正確考量。", "B": "給藥方式影響吸收速率與安全劑量，屬正確考量。", "C": "加 epinephrine 提高最大安全劑量並延長作用，屬正確考量。", "D": "環境酸鹼影響離子化與穿透/起效，屬正確考量。", "E": "◎ 答案) 以上皆為決定局麻劑量之重要因素。"}, "cite": "Neligan 5e local anesthetics；lidocaine max dose & LAST 處置。", "conflict": ""}, {"id": "9271", "sub": "BAS", "src": "NG", "years": [114], "stem": "Which of the following wound care strategies should be used with caution and only in state-sanctioned facilities due to the complexity and cost-benefit considerations?", "opts": {"A": "Enzymatic debridement", "B": "Hyperbaric oxygen therapy", "C": "Topical silver sulfadiazine", "D": "Autolytic debridement", "E": "Negative pressure wound therapy"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：需審慎並限於官方核可機構使用之傷口照護策略 (ans B)\n- **B(答案) 高壓氧治療(Hyperbaric oxygen therapy, HBOT)**：因**設備複雜、成本高、需專用加壓艙與人力、且成本效益考量嚴格**，應審慎使用並限於**國家核可之設施(state-sanctioned facilities)**；適應症如放射性組織損傷、頑固性糖尿病足、氣性壞疽、皮瓣/移植物危象等須嚴格篩選。\n- 其他選項為一般傷口床準備常規手段，不受此限制：\n  - **A 酵素性清創(enzymatic debridement)**：外用膠原酶等，門診可用。\n  - **C 外用 silver sulfadiazine**：抗菌敷料/藥膏，燒傷常規。\n  - **D 自體溶解性清創(autolytic debridement)**：以密閉/水膠敷料利用自身酵素，常規且低成本。\n  - **E 負壓傷口治療(NPWT)**：門診與住院廣泛使用。", "peropt": {"A": "酵素性清創為門診常規手段，不受限制。", "B": "◎ 答案) HBOT 設備複雜成本高，須審慎並限於官方核可設施。", "C": "外用 silver sulfadiazine 為抗菌常規，不受限制。", "D": "自體溶解性清創為低成本常規手段，不受限制。", "E": "NPWT 廣泛使用於門診與住院，不受限制。"}, "cite": "Neligan 5e wound bed preparation & adjuncts；HBOT indications。", "conflict": ""}, {"id": "9272", "sub": "BAS", "src": "NG", "years": [115], "stem": "過去15至20年內，下列哪一項技術在整形外科領域已發展成熟並成為主流？", "opts": {"A": "關節鏡手術 (arthroscopic surgery)", "B": "血液透析 (hemodialysis)", "C": "穿通枝皮瓣 (perforator flaps)", "D": "冠狀動脈繞道手術 (coronary artery bypass grafting)", "E": "脊椎椎間盤置換術 (intervertebral disc replacement)"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：過去 15–20 年整形外科成熟並成為主流之技術 (ans C)\n- **C(答案) 穿通枝皮瓣(Perforator flaps)**：近 15–20 年整外**成熟並成主流**之核心技術——概念由 Koshima、Taylor(angiosome)、Blondeel、Hallock 等推進；代表如 **DIEP(乳房重建)、ALT(anterolateral thigh)、TDAP、SGAP** 等，特色為**保留來源肌肉、降低供區併發症、freestyle 設計**。\n- 其他選項辨析(非整外主流/非本領域):\n  - **A 關節鏡手術**：屬骨科領域。\n  - **B 血液透析**：屬腎臟科。\n  - **D 冠狀動脈繞道**：屬心臟外科。\n  - **E 脊椎椎間盤置換**：屬脊椎/神經外科。", "peropt": {"A": "關節鏡手術屬骨科，非整外主流技術。", "B": "血液透析屬腎臟科，非整外技術。", "C": "◎ 答案) 穿通枝皮瓣近 15–20 年於整外成熟並成主流。", "D": "冠狀動脈繞道屬心臟外科，非整外技術。", "E": "椎間盤置換屬脊椎外科，非整外技術。"}, "cite": "Neligan 5e perforator flap 發展史(DIEP/ALT 等)。", "conflict": ""}, {"id": "9273", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於整形外科歷史發展，下列哪一事件對重建外科技術的合法化及重大進步貢獻最大？", "opts": {"A": "文藝復興時期宗教改革", "B": "第一次世界大戰，大量顏面傷患促成皮膚移植與皮瓣手術的系統化", "C": "二次世界大戰期間抗生素的發明", "D": "1960年代顯微外科技術的建立", "E": "2000年代電腦輔助設計的應用"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：對重建外科合法化與重大進步貢獻最大之歷史事件 (ans B)\n- **B(答案) 第一次世界大戰(WWI)**：大量**顏面與四肢重傷患**促成皮膚移植、皮瓣手術與顏面重建之**系統化與專科化**；**Sir Harold Gillies** 於 Queen's Hospital(Sidcup)建立現代整形/重建外科基礎，被視為現代整外之奠基與『合法化』關鍵。\n- 其他選項辨析:\n  - **A 文藝復興宗教改革**：時代雖有 Tagliacozzi 鼻重建，但非最大貢獻事件。\n  - **C WWII 抗生素**：重要但主為感染控制，非重建技術系統化之最大推手。\n  - **D 1960s 顯微外科**：重大進展(游離皮瓣)，但題旨『合法化及系統化奠基』以 WWI 為最。\n  - **E 2000s CAD**：屬近代輔助工具，非奠基事件。", "peropt": {"A": "文藝復興宗教改革非重建外科合法化最大貢獻事件。", "B": "◎ 答案) WWI 大量顏面傷患促成皮膚移植/皮瓣系統化(Gillies)，貢獻最大。", "C": "WWII 抗生素主為感染控制，非重建技術系統化之最大推手。", "D": "1960s 顯微外科為重大進展但非本題奠基/合法化之最。", "E": "2000s CAD 為近代輔助工具，非奠基事件。"}, "cite": "Neligan 5e history of plastic surgery；Gillies & WWI facial reconstruction。", "conflict": ""}, {"id": "9274", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於整形外科患者術前心理評估，下列哪項最能協助醫師判斷患者是否適合手術？", "opts": {"A": "患者的年齡及職業背景", "B": "患者目前服用的所有藥物及過敏史", "C": "患者的財務能力及保險給付狀況", "D": "患者的動機（內在自我改善 vs 外在他人期望）、對手術現實的了解程度及是否具有不切實際的期望", "E": "患者的家族手術史及遺傳風險"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：整外病人術前心理評估之最關鍵判斷面向 (ans D)\n- **D(答案)**：判斷病人是否適合手術，最能協助者為評估其**①動機(motivation)——內在自我改善 vs 外在他人期望(如取悅伴侶/職場壓力)②對手術現實與限制之了解程度③是否存有不切實際期望(unrealistic expectations)**；此三者直接關聯術後滿意度與心理適應，並可篩檢 BDD 等高風險者。\n- 其他選項辨析(重要但非最能判斷『心理適合度』):\n  - **A 年齡/職業**：背景資料，非心理適合度核心。\n  - **B 藥物/過敏史**：屬麻醉與手術安全評估。\n  - **C 財務/保險**：屬行政與可近性，非心理適合。\n  - **E 家族手術史/遺傳風險**：屬醫療風險評估，非心理動機面向。", "peropt": {"A": "年齡/職業為背景資料，非心理適合度核心。", "B": "藥物/過敏史屬麻醉與手術安全評估，非心理面向。", "C": "財務/保險屬行政可近性，非心理適合度。", "D": "◎ 答案) 動機(內在vs外在)、對現實了解、不切實際期望最能判斷心理適合度。", "E": "家族手術史/遺傳風險屬醫療風險評估，非心理動機。"}, "cite": "Neligan 5e psychological assessment of the aesthetic patient；motivation & realistic expectations。", "conflict": ""}, {"id": "9275", "sub": "BAS", "src": "NG", "years": [115], "stem": "整形外科醫師理解商業原則的主要原因為何？", "opts": {"A": "整形外科執業涉及醫療與商業的雙重性質，了解商業原則有助於建立可持續的執業模式並提供更好的患者照護", "B": "使整形外科醫師能自行管理醫院財務", "C": "美容整形的商業性質使利潤最大化成為主要目標", "D": "政府要求所有醫師必須具備商業管理學位", "E": "商業知識可完全取代醫學訓練"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 整外執業的雙重屬性（醫療＋商業）與可持續執業模式\n- 整形外科（尤其結合美容自費與重建健保業務）本質具有 medical + business 雙重性質 (dual nature)。\n- 理解 business principles（成本結構、定價、行銷、人力、法規遵循）的目的是建立 sustainable practice model（可持續執業模式），最終服務於「更好的病人照護」而非單純利潤最大化。\n- 正確定位：商業知識是 enabler（使能者），為醫療服務提供財務永續性；絕非取代醫學訓練，也非以利潤最大化為唯一目標。\n- 常見錯誤觀念：把商業與醫療對立、或視利潤最大化為主要目標，均不符現代 value-based、ethics-driven 的整外執業理念。", "peropt": {"A": "◎ 。點出雙重性質（醫療＋商業）、建立可持續執業模式、最終目的為更好的病人照護，三者兼備，符合現代整外執業觀。", "B": "錯誤。醫師學商業原則並非為了『自行管理整間醫院財務』，範圍與目的錯置。", "C": "錯誤。將利潤最大化 (profit maximization) 當成主要目標，違反 ethics 與 value-based care 精神。", "D": "錯誤。政府並未要求所有醫師必須具備商業管理學位，屬虛構規定。", "E": "錯誤。商業知識絕不能取代醫學訓練，核心仍是臨床專業能力。"}, "cite": "Grabb & Smith 9e / Neligan 5e, Business principles in plastic surgery practice", "conflict": ""}, {"id": "9276", "sub": "BAS", "src": "NG", "years": [115], "stem": "根據 Michael Porter 提出的價值導向醫療照護 (value-based healthcare) 概念，「價值 (value)」的定義為何？", "opts": {"A": "最大化醫院年度利潤", "B": "每單位成本所能達到的最大醫療結果 (maximizing outcomes per unit cost)", "C": "縮短平均住院天數", "D": "增加門診患者就診次數", "E": "提升醫師平均薪資水準"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Michael Porter 之 Value-Based Healthcare：Value = Outcomes / Cost\n- Porter 定義 value（價值）＝ health outcomes achieved per unit of cost（每單位成本所達成的醫療結果）。\n- 分子為對病人真正重要的 outcomes（不只存活，還含功能、生活品質、恢復速度、併發症等 outcome hierarchy）。\n- 分母為 total cost of delivering the full cycle of care（照護全週期的總成本），而非單一項目收費。\n- 核心精神：以病人為中心，追求 outcome 與 cost 的最佳比值，而非壓低住院天數、增加就診量或提高醫師薪資等 process/財務指標。", "peropt": {"A": "錯誤。最大化醫院利潤是財務目標，非 Porter 定義的 value。", "B": "◎ 。value = maximizing outcomes per unit cost，即每單位成本所達成的最大醫療結果。", "C": "錯誤。縮短住院天數僅為成本面的 process 指標，非 value 的定義。", "D": "錯誤。增加就診次數屬 volume-based 而非 value-based 思維。", "E": "錯誤。提升醫師薪資與病人價值無直接關聯。"}, "cite": "Porter ME. What Is Value in Health Care? NEJM 2010; Neligan 5e / Grabb & Smith 9e", "conflict": ""}, {"id": "9277", "sub": "BAS", "src": "NG", "years": [115], "stem": "皮瓣手術中使用靛氰綠 (indocyanine green, ICG) 螢光灌流影像的主要臨床目的為何？", "opts": {"A": "偵測惡性腫瘤的邊界範圍", "B": "確認周邊神經的傳導速度", "C": "精確測量術中失血量", "D": "監測麻醉深度", "E": "即時評估皮瓣及組織的血流灌注狀態 (tissue perfusion)"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 ICG 螢光血管攝影 (Indocyanine Green Angiography)：即時評估組織灌流\n- ICG 為靜脈注射之螢光染劑，與血漿蛋白結合後，於近紅外光 (near-infrared, ~800 nm) 下發出螢光。\n- 臨床主要用途：即時、動態評估 flap / tissue perfusion（皮瓣及組織血流灌注），辨識 hypoperfused / 缺血區域。\n- 應用場景：皮瓣設計與 mastectomy skin flap 存活評估、乳房重建、下肢重建、腸道吻合、淋巴水腫 lymphatic mapping 等。\n- 優點：客觀量化灌流、可減少 partial flap necrosis；限制：無法評估神經傳導、腫瘤邊界或麻醉深度。", "peropt": {"A": "錯誤。ICG 非為偵測腫瘤邊界（雖有 tumor-specific probe 研究，但非標準灌流用途）。", "B": "錯誤。神經傳導速度屬電生理檢查，與 ICG 無關。", "C": "錯誤。ICG 不用於測量失血量。", "D": "錯誤。麻醉深度以 BIS 等監測，非 ICG。", "E": "◎ 。ICG 螢光灌流影像即時評估皮瓣與組織的 tissue perfusion，為其核心臨床目的。"}, "cite": "Neligan 5e, Vol.1 Flap perfusion assessment / ICG angiography", "conflict": ""}, {"id": "9278", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於局部麻醉藥全身毒性 (local anesthetic systemic toxicity, LAST) 的處理，下列何者正確？", "opts": {"A": "立即給予高劑量腎上腺素是首選治療", "B": "靜脈注射葡萄糖是 LAST 的標準首選治療", "C": "LAST 發生後立即停止所有藥物給予並觀察即可", "D": "LAST 主要表現為皮膚過敏反應，無需特殊處理", "E": "脂肪乳劑 (lipid emulsion，如 Intralipid) 是局部麻醉藥全身毒性的重要解毒治療之一"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 局部麻醉藥全身毒性 (LAST) 與 Lipid Emulsion Rescue\n- LAST 因血中局麻藥濃度過高，阻斷心臟與中樞神經 Na⁺ channel，表現為 CNS（口周麻木、耳鳴、抽搐、意識喪失）與 cardiovascular（心律不整、傳導阻滯、心跳停止）毒性。\n- 處置核心（ASRA guideline）：\n  1. 立即停止注藥、求救、氣道管理與 100% 氧氣。\n  2. 抽搐以 benzodiazepine 控制（避免大劑量 propofol，因心血管抑制）。\n  3. 首要解毒：Lipid emulsion 20% (Intralipid) —— bolus 1.5 mL/kg 續以 infusion（『lipid sink』理論）。\n  4. 心跳停止時 epinephrine 應『減量』使用（≤1 μg/kg），避免高劑量。\n- 布比卡因 (bupivacaine) 心毒性最高。\n💉Lipid emulsion(20%)給法：**1.5 mL/kg bolus** 於 1 分鐘內推注，接續 **0.25 mL/kg/min** 持續輸注；若持續不穩可重複 bolus 並加倍輸注速率，上限約 12 mL/kg。同時避免 vasopressin、CCB、β-blocker、與 local anesthetic。", "peropt": {"A": "✗ LAST 中 epinephrine 須『減量』——建議 boluses ≤1 mcg/kg，避免高劑量(>1 mcg/kg)及 vasopressin；高劑量反惡化復甦，並非首選。", "B": "✗ 靜脈葡萄糖非 LAST 治療；核心解毒為 20% lipid emulsion（lipid sink），非 glucose。", "C": "✗ LAST 為危急狀況，僅停藥觀察不足；須立即停藥＋氣道/循環復甦＋lipid emulsion。", "D": "✗ LAST 非皮膚過敏反應，而是 CNS(抽搐、意識改變)與心血管(心律不整、心跳停止)毒性。", "E": "◎ 。Lipid emulsion（Intralipid）是 LAST 的重要解毒治療（lipid sink）。"}, "cite": "ASRA Practice Advisory on LAST; Neligan 5e / Grabb & Smith 9e Anesthesia", "conflict": ""}, {"id": "9279", "sub": "BAS", "src": "NG", "years": [115], "stem": "評估現有文獻以獲取最佳實證，需具備哪三個核心要素？", "opts": {"A": "大樣本數、長追蹤期、多國際中心參與", "B": "必須為隨機對照試驗、雙盲設計、安慰劑對照", "C": "適合研究問題的研究設計、適當的統計分析方法、臨床上具意義的結果測量指標", "D": "經政府認可、通過同儕審查、具高度引用次數", "E": "前瞻性研究設計、多變量分析、大型行政資料庫"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 評讀文獻取得最佳實證的三核心要素\n- Evidence-based medicine 的 critical appraisal 並不等同『只認 RCT』；而應依 research question 選擇最適當方法。\n- 三核心要素：\n  1. 適合研究問題的 study design（診斷、預後、治療、傷害各有其最佳設計；治療效果 RCT 佳，但罕見不良事件 cohort/case-control 更可行）。\n  2. 適當的 statistical analysis（依資料型態選正確統計方法，控制 confounding）。\n  3. 臨床上有意義的 outcome measures（patient-important outcomes，而非僅 surrogate marker）。\n- 破除迷思：並非所有問題都須 RCT、雙盲、安慰劑；高引用或政府認可不等於高證據品質。", "peropt": {"A": "錯誤。大樣本、長追蹤、多中心是加分條件，非評讀的三核心要素。", "B": "錯誤。並非所有研究都必須 RCT／雙盲／安慰劑，過度僵化。", "C": "◎ 。適當研究設計＋適當統計分析＋臨床有意義的結果指標，為三核心要素。", "D": "錯誤。政府認可、同儕審查、引用次數不等於證據內在效度。", "E": "錯誤。前瞻設計＋多變量＋大資料庫僅為方法選項之一，非普適三要素。"}, "cite": "Neligan 5e / Grabb & Smith 9e, Evidence-based medicine in plastic surgery", "conflict": ""}, {"id": "9280", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於腫瘤生長動力學 (tumor growth kinetics)，下列何者正確？", "opts": {"A": "所有腫瘤的倍增時間 (doubling time) 均相同，固定為30天", "B": "腫瘤以對數方式 (logarithmic fashion) 生長，不同腫瘤倍增時間各異，可在2至200天之間", "C": "腫瘤通常在直徑達1公釐時即可被臨床方法偵測到", "D": "腫瘤在達到臨界質量前完全不需要血管供應", "E": "腫瘤生長速度隨腫瘤增大而線性加速，恆定不變"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 腫瘤生長動力學 (Tumor Growth Kinetics)：對數（Gompertzian）生長\n- 腫瘤呈 logarithmic / exponential（早期）生長；不同腫瘤 doubling time 差異大，約介於 2–200 天。\n- 臨床可偵測門檻：約需 10⁹ 顆細胞（約 1 cm、1 g）才能臨床偵測；1 mm 太小，難以偵測。\n- Gompertzian growth：腫瘤越大，生長分率 (growth fraction) 下降、生長減速（非線性恆速加速）。\n- 血管新生 (angiogenesis)：腫瘤超過約 1–2 mm 即需新生血管供應，並非達臨界質量前完全不需血供。", "peropt": {"A": "✗ 倍增時間(doubling time)並非固定 30 天；不同腫瘤各異，約 2–200 天。", "B": "◎ 。腫瘤以對數方式生長，doubling time 各異，約 2–200 天。", "C": "✗ 1 mm(約 10⁶ 細胞)通常無法臨床偵測；臨床可偵測約需 **1 cm(約 10⁹ 細胞)**。", "D": "✗ 腫瘤 >1–2 mm 即需 angiogenesis 供血；並非達臨界質量前完全不需血供。", "E": "✗ 為 Gompertzian 生長(越大越慢)，非線性恆定加速。"}, "cite": "Grabb & Smith 9e / Neligan 5e, Oncology basics; Gompertzian growth kinetics", "conflict": ""}, {"id": "9281", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於慢性傷口（如糖尿病足潰瘍）的病生理機制，下列哪一描述最為正確？", "opts": {"A": "慢性傷口主要由外部污染物導致，清創後通常迅速癒合", "B": "慢性傷口的特徵是傷口長期停留在發炎期，伴隨基質金屬蛋白酶 (MMPs) 過度表達、生長因子失衡及生物膜 (biofilm) 形成，阻礙正常癒合進程", "C": "慢性傷口主要由過度的增生期反應造成", "D": "慢性傷口的主要病因是血小板功能不足導致止血失敗", "E": "慢性傷口的治療主要依靠大劑量全身性抗生素的長期應用"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 慢性傷口（糖尿病足潰瘍）病生理：停滯於發炎期\n- 慢性傷口 (chronic wound) 核心特徵：無法依序通過 hemostasis→inflammation→proliferation→remodeling，長期『卡』在 inflammatory phase。\n- 分子機制：\n  1. MMPs (matrix metalloproteinases) 過度表達 → 過度降解 ECM 與生長因子。\n  2. Growth factors（PDGF、TGF-β、VEGF、EGF）失衡與其受體反應下降。\n  3. Biofilm（生物膜）形成 → 細菌被多醣基質包覆、抗生素與免疫難以清除。\n  4. Senescent cells、缺氧、反覆缺血再灌流、糖化終產物 (AGEs)。\n- 治療原則：TIME/清創、控制感染與生物膜、血流重建、減壓 (offloading)、血糖控制、進階敷料，而非單靠大劑量全身抗生素。", "peropt": {"A": "錯誤。慢性傷口非單純外部污染所致，清創後也未必迅速癒合。", "B": "◎ 。停留發炎期＋MMPs 過度表達＋生長因子失衡＋biofilm 形成，為核心機制。", "C": "錯誤。病理是停滯於發炎期，非過度增生期反應。", "D": "錯誤。主因非血小板功能不足或止血失敗。", "E": "錯誤。治療核心非長期大劑量全身抗生素。"}, "cite": "Neligan 5e Vol.1 Wound healing; chronic/diabetic wound pathophysiology", "conflict": ""}, {"id": "9282", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於整形外科的歷史發展，下列哪些陳述正確？(複選)", "opts": {"A": "「plastic」一詞源自希臘文「πλαστικóς」，意指「可塑造的」", "B": "埃德溫·史密斯紙草文書 (Edwin Smith papyrus) 是已知最古老的醫學文本之一", "C": "Gaspare Tagliacozzi (1545–1597) 被認為是整形外科的奠基人之一", "D": "皮瓣手術是整形外科的原創技術，歷史上從未在其他外科領域出現", "E": "第一次世界大戰推動了重建外科技術的合法化與重大進步"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 整形外科歷史發展（複選）\n- 『plastic』源自希臘文 πλαστικός，意為『可塑造的 (to mold/to shape)』——A 正確。\n- Edwin Smith papyrus（約西元前 1600 年）為現存最古老外科／醫學文本之一，記載傷口與外傷處置——B 正確。\n- Gaspare Tagliacozzi (1545–1597)：文藝復興時期以上臂皮瓣行鼻重建 (Italian method)，被譽為現代整形外科奠基人之一——C 正確。\n- 皮瓣手術並非整外獨創且『從未見於其他外科』——D 錯誤（觀念過度絕對）。\n- 第一次世界大戰大量顏面與肢體創傷，推動 Gillies 等人重建外科的技術進步與專科合法化——E 正確。", "peropt": {"A": "◎ plastic 源自希臘文 πλαστικός，意為可塑造的，正確。", "B": "◎ Edwin Smith papyrus 為最古老醫學文本之一，正確。", "C": "◎ Tagliacozzi 為整形外科奠基人之一（鼻重建），正確。", "D": "錯誤（未選）。皮瓣並非整外獨創且從未見於他科，敘述過度絕對。", "E": "◎ 一次世界大戰推動重建外科的合法化與重大進步，正確。"}, "cite": "Neligan 5e / Grabb & Smith 9e, History of plastic surgery", "conflict": ""}, {"id": "9283", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於整形外科患者的心理問題，下列哪些陳述正確？(複選)", "opts": {"A": "整形外科醫師的技術能力是影響患者心理滿意度的唯一因素", "B": "超過三分之二的年輕人對自身外貌有某種程度的不滿意", "C": "BDD 患者在整形外科門診中的比例顯著高於一般人群", "D": "心理創傷（如燒傷、癌症切除）患者的心理需求不同於美容手術患者", "E": "社群媒體使用與外貌不滿意感的增加有顯著相關"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 整外患者心理問題與 BDD（複選）\n- 心理滿意度為多因素，技術能力並非『唯一』決定因素（A 過度絕對，錯誤）。\n- 流行病學：超過 2/3 年輕人對自身外貌有某程度不滿意——B 正確，與 body image 議題相關。\n- BDD (Body Dysmorphic Disorder)：一般人口約 1–2%，但美容整外門診比例顯著較高（約 7–15%），且術後多不滿意——C 正確；BDD 常為手術相對禁忌。\n- 重建（燒傷、癌症切除）病人的心理需求（創傷、功能、身分認同）與純美容病人不同——D 正確。\n- Social media 使用與 body dissatisfaction 增加顯著相關——E 正確。", "peropt": {"A": "錯誤（未選）。技術能力並非影響心理滿意度的『唯一』因素。", "B": "◎ 超過三分之二年輕人對外貌有某程度不滿，正確。", "C": "◎ BDD 在整外門診比例顯著高於一般人群，正確。", "D": "◎ 心理創傷病人（燒傷、癌症）心理需求不同於美容病人，正確。", "E": "◎ 社群媒體使用與外貌不滿意顯著相關，正確。"}, "cite": "Neligan 5e Psychological aspects; BDD in aesthetic surgery", "conflict": ""}, {"id": "9284", "sub": "BAS", "src": "NG", "years": [115], "stem": "整形外科醫療攝影的標準規範中，下列哪些是重要考量事項？(複選)", "opts": {"A": "標準化的拍攝角度與視角 (standardized views)", "B": "一致的背景、光源與攝影距離", "C": "符合隱私法規（如 HIPAA）的知情同意程序", "D": "照片的價值隨時間增加，應長期妥善保存", "E": "三維 (3D) 攝影技術可改善溝通、合作及患者滿意度"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 整外醫療攝影標準規範（複選，全選）\n- Standardized views：一致的拍攝角度與視角（如正面、側面、斜位、Frankfort horizontal plane 對齊）——A 正確。\n- 一致的 background、lighting、camera distance / focal length，確保前後可比較——B 正確。\n- 隱私與知情同意：符合 HIPAA（及台灣個資法）之 informed consent 與去識別化——C 正確。\n- 照片為長期臨床、教學、法律紀錄，價值隨時間累積，須妥善保存——D 正確。\n- 3D photography（如 Vectra）改善醫病溝通、術前規劃、團隊合作與病人滿意度——E 正確。\n- 五者皆為重要考量，故全選。", "peropt": {"A": "◎ 標準化拍攝角度與視角，正確。", "B": "◎ 一致背景、光源與攝影距離，正確。", "C": "◎ 符合隱私法規（HIPAA）的知情同意，正確。", "D": "◎ 照片價值隨時間增加應長期保存，正確。", "E": "◎ 3D 攝影改善溝通、合作與病人滿意度，正確。"}, "cite": "Neligan 5e / Grabb & Smith 9e, Medical photography standards", "conflict": ""}, {"id": "9285", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於整形外科的患者安全措施，下列哪些已被證實能有效降低手術相關不良事件的發生率？(複選)", "opts": {"A": "手術安全核對表 (surgical safety checklist) 的使用", "B": "術前抗生素預防性給藥的標準化", "C": "深部靜脈血栓 (DVT) 預防措施的常規應用", "D": "手術時長超過8小時時強制休息以避免疲勞", "E": "術前患者評估及風險分層"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 整外病人安全措施（複選）——實證支持者\n- Surgical safety checklist（WHO checklist）：實證降低併發症與死亡率——A 正確。\n- 術前 prophylactic antibiotics 標準化給藥（切皮前 60 分鐘內、正確劑量）降低 SSI——B 正確。\n- DVT / VTE 預防（Caprini 風險分層＋機械/藥物預防）降低血栓事件——C 正確。\n- 術前病人評估與 risk stratification 降低不良事件——E 正確。\n- 『手術超過 8 小時強制休息』——D 錯誤：並無此標準化實證措施；長時間手術風險管理另有策略，非硬性 8 小時強制休息。", "peropt": {"A": "◎ 手術安全核對表 (WHO checklist) 實證有效降低不良事件，正確。", "B": "◎ 術前預防性抗生素標準化降低 SSI，正確。", "C": "◎ DVT/VTE 預防措施常規應用有效，正確。", "D": "錯誤（未選）。『手術超過 8 小時強制休息』並非被證實的標準安全措施。", "E": "◎ 術前評估與風險分層有效降低不良事件，正確。"}, "cite": "WHO Surgical Safety Checklist; Neligan 5e Patient safety", "conflict": ""}, {"id": "9286", "sub": "BAS", "src": "NG", "years": [115], "stem": "在整形外科麻醉管理中，下列哪些藥物或方法屬於多模式止痛的常見組成成分？(複選)", "opts": {"A": "單純使用嗎啡 (morphine) 靜脈注射作為唯一止痛藥", "B": "乙醯胺酚 (acetaminophen/paracetamol)", "C": "加巴噴汀類藥物 (gabapentinoids)，如 pregabalin 或 gabapentin", "D": "局部麻醉藥區域阻斷術 (regional nerve blocks)", "E": "非類固醇抗發炎藥 (NSAIDs)，如 ketorolac 或 celecoxib"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 多模式止痛 (Multimodal Analgesia) 之常見組成（複選）\n- 核心理念：以多種作用機轉藥物／技術組合，減少 opioid 用量與副作用（opioid-sparing），符合 ERAS。\n- 常見組成：\n  1. Acetaminophen / paracetamol——B 正確。\n  2. Gabapentinoids（pregabalin、gabapentin）——C 正確，抑制神經病理性與術後疼痛。\n  3. Regional nerve blocks / 局部麻醉區域阻斷（如 TAP block、PECS block）——D 正確。\n  4. NSAIDs（ketorolac、celecoxib）——E 正確。\n- A 錯誤：『單用嗎啡靜脈注射』為 opioid monotherapy，正是多模式止痛欲避免的做法。", "peropt": {"A": "錯誤（未選）。單純嗎啡靜脈注射為單一 opioid 療法，與多模式止痛精神相反。", "B": "◎ Acetaminophen/paracetamol 為多模式止痛常見成分，正確。", "C": "◎ Gabapentinoids（pregabalin/gabapentin），正確。", "D": "◎ 局部麻醉區域阻斷（regional nerve blocks），正確。", "E": "◎ NSAIDs（ketorolac/celecoxib），正確。"}, "cite": "Neligan 5e / ERAS protocols; Multimodal analgesia in plastic surgery", "conflict": ""}, {"id": "9287", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 skin graft recipient bed，下列哪一種情況最不適合直接進行傳統皮膚移植？", "opts": {"A": "健康肉芽組織（healthy granulation tissue）", "B": "血供良好的肌肉表面", "C": "保留 paratenon 的肌腱表面", "D": "完整筋膜（fascia）表面", "E": "裸露且無 periosteum 的 cortical bone"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 皮膚移植受床 (Recipient Bed)：最不適合直接移植者\n- 傳統 skin graft 存活賴 recipient bed 的血管供應（imbibition→inosculation→revascularization），故受床須有足夠 vascularity。\n- 適合直接移植：健康 granulation tissue、有血供的肌肉、保留 paratenon 的肌腱、有完整 fascia/血供組織。\n- 『無血管』表面不適合直接植皮，經典四大禁忌：\n  1. 裸露且無 periosteum 的 cortical bone（皮質骨）。\n  2. 無 paratenon 的裸露肌腱。\n  3. 無 perineurium 的裸露神經。\n  4. 無軟骨膜的裸露軟骨、放射照射後組織。\n- 故『裸露且無 periosteum 的 cortical bone』最不適合，需皮瓣覆蓋或先促肉芽。", "peropt": {"A": "適合。健康肉芽組織血供佳，可直接植皮。", "B": "適合。血供良好的肌肉表面為理想受床。", "C": "適合。保留 paratenon 的肌腱表面可支持植皮存活。", "D": "適合。完整（有血供）筋膜表面可植皮。", "E": "◎ 。裸露且無 periosteum 的 cortical bone 無血供，最不適合直接植皮。"}, "cite": "Grabb & Smith 9e Skin grafts; recipient bed requirements", "conflict": ""}, {"id": "9288", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 split-thickness skin graft（STSG）與 full-thickness skin graft（FTSG）的比較，下列何者正確？", "opts": {"A": "STSG 的 primary contraction 通常比 FTSG 明顯", "B": "FTSG 通常具有較少 secondary contraction 與較佳質地，但需要較佳 recipient bed vascularity", "C": "STSG donor site 通常必須 primary closure", "D": "FTSG 較適合用於大面積且可 mesh expansion 的燒傷傷口", "E": "在血液供應較差的傷口，FTSG 通常比 STSG 更容易 take"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 STSG vs FTSG 比較\n- Primary contraction（移植當下彈性回縮，因 dermis 內 elastin）：dermis 越厚回縮越明顯，故 FTSG > STSG（A 錯，因其稱 STSG 較明顯）。\n- Secondary contraction（癒合期 myofibroblast 收縮）：dermis 越厚抑制越強，故 FTSG < STSG（FTSG secondary contraction 較少）——B 正確。\n- FTSG 含完整真皮，質地、色澤、耐用度較佳，功能與外觀要求高處適用，但代謝需求高，需『較佳 recipient bed vascularity』才易 take——B 正確。\n- STSG donor site 靠 epidermal appendages 上皮化，通常不需 primary closure（C 錯）。\n- 大面積可 mesh 者用 STSG（D 錯，FTSG 不 mesh）。\n- 血供差傷口 STSG 較 FTSG 易 take（E 錯）。", "peropt": {"A": "錯誤。Primary contraction FTSG 較 STSG 明顯（dermis 越厚回縮越多），非 STSG 較明顯。", "B": "◎ 。FTSG 較少 secondary contraction、質地較佳，但需較佳受床血供。", "C": "錯誤。STSG donor site 靠上皮化癒合，通常不需 primary closure。", "D": "錯誤。大面積可 mesh 者用 STSG，非 FTSG。", "E": "錯誤。血供差的傷口 STSG 比 FTSG 更易 take。"}, "cite": "Grabb & Smith 9e Skin grafts; STSG vs FTSG contraction", "conflict": ""}, {"id": "9289", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 cartilage 及 cartilage graft，下列何者最正確？", "opts": {"A": "成熟軟骨主要依賴血管直接灌流取得營養", "B": "所有 cartilage graft 均需帶有皮膚島才能存活", "C": "軟骨是軟骨細胞(chondrocytes)加上extracellular matrices (ECM) of type III collagen fibers, proteoglycans, and elastic fibers 所組成", "D": "軟骨本身相對無血管，營養主要仰賴擴散作用", "E": "hyaline cartilage 不含 collagen matrix"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 軟骨 (Cartilage) 與軟骨移植的營養機制\n- 成熟軟骨為 avascular（無血管）、無淋巴、無神經；chondrocytes 位於 lacunae，營養主要靠 diffusion（擴散）通過 ECM——D 正確。\n- ECM 組成：hyaline cartilage 主要為 type II collagen（非 type III）、proteoglycans（aggrecan）、水分；elastic cartilage 另含 elastic fibers。\n- 因無血管、代謝率低、免疫原性低，cartilage graft 存活佳、吸收少，常用於鼻、耳重建。\n- 破除迷思：軟骨非靠血管直接灌流（A 錯）；不一定需皮膚島（B 錯）；C 敘述將主要膠原寫成 type III 有誤（透明軟骨為 type II）；hyaline cartilage 確含 collagen matrix（E 錯）。", "peropt": {"A": "錯誤。成熟軟骨無血管，非依賴血管直接灌流。", "B": "錯誤。並非所有 cartilage graft 都需皮膚島才能存活。", "C": "錯誤。透明軟骨主要為 type II collagen，非 type III collagen fibers。", "D": "◎ 。軟骨相對無血管，營養主要仰賴擴散作用。", "E": "錯誤。Hyaline cartilage 含 collagen matrix（type II）。"}, "cite": "Grabb & Smith 9e Cartilage grafts; cartilage biology", "conflict": ""}, {"id": "9290", "sub": "BAS", "src": "NG", "years": [112, 115], "stem": "Sunderland classification 中，若神經僅為 conduction block，axon 與 connective tissue framework 仍完整，最符合下列何者？", "opts": {"A": "First-degree injury（neurapraxia）", "B": "Second-degree injury", "C": "Third-degree injury", "D": "Fourth-degree injury", "E": "Fifth-degree injury"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Sunderland 神經損傷分類——First-degree (Neurapraxia)\n- Seddon 與 Sunderland 對應：\n  • Sunderland 1 = Seddon neurapraxia：僅 conduction block，axon 與所有結締組織（endo/peri/epineurium）完整，多為局部脫髓鞘，預後佳、可完全恢復，無 Wallerian degeneration。\n  • Sunderland 2 = axonotmesis：axon 斷裂但 endoneurium 完整，發生 Wallerian degeneration，可沿原管道再生。\n  • Sunderland 3：endoneurium 破壞、perineurium 完整（恢復不完全）。\n  • Sunderland 4：僅 epineurium 完整（neuroma-in-continuity，多需手術）。\n  • Sunderland 5 = neurotmesis：神經完全斷裂，需手術修復。\n- 題幹『僅 conduction block、axon 與結締組織完整』＝ First-degree / neurapraxia。\n🧬Sunderland 對照：1°=neurapraxia(僅傳導阻滯)、2°=軸突斷裂 endoneurium 完整、3°=endoneurium 破壞、4°=僅 epineurium 完整、5°=完全斷裂；(MacKinnon 補 6°=mixed pattern)。1–2° 多可自行恢復，4–5° 須手術。", "peropt": {"A": "◎ 。First-degree（neurapraxia）：僅傳導阻滯，軸突與結締組織架構完整。", "B": "✗ Second-degree(axonotmesis)：**軸突已斷裂**並發生 Wallerian degeneration，但 endoneurium 仍完整(可自行再生，預後佳)。", "C": "✗ Third-degree：**endoneurium 破壞**，perineurium 與 epineurium 完整(再生較差、恢復不完全)。", "D": "✗ Fourth-degree：**perineurium 亦斷裂、僅 epineurium 完整**(neuroma-in-continuity，需手術)。", "E": "✗ Fifth-degree(neurotmesis)：神經**完全斷裂**(所有結構中斷)，必須手術修復。"}, "cite": "Neligan 5e Vol.6 Peripheral nerve; Sunderland classification", "conflict": "⚠ 同題歷屆重出：Sunderland分級中conduction block(axon與結締組織完整)＝first-degree(neurapraxia)、可自行恢復。112年(9230)以『Degree I』選項答C、115年(9290)以『First-degree(neurapraxia)』選項答A，同考點不同措辭重排。"}, {"id": "9291", "sub": "BAS", "src": "NG", "years": [115], "stem": "周邊神經完全斷裂後，若經適當 mobilization 仍無法達成 tension-free end-to-end repair，較適當的處置為何？", "opts": {"A": "強行直接縫合以縮短再生距離", "B": "只縫合 epineurium，不處理張力問題", "C": "使用 interposition nerve graft 進行橋接", "D": "單純結紮兩端避免 neuroma", "E": "延後數年後再評估重建"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 神經缺損無法無張力縫合：Interposition Nerve Graft\n- 神經修復首要原則：tension-free coaptation。張力會缺血、纖維化、影響軸突再生，惡化預後。\n- 若經 mobilization、關節姿勢調整後仍無法無張力端對端縫合，代表有 gap，應以橋接方式重建：\n  • Interposition nerve graft（如 sural nerve autograft）為經典選擇。\n  • 其他現代選項：nerve conduit（短缺損）、processed nerve allograft、nerve transfer 等。\n- 錯誤選項：強行縫合（張力過大失敗）、忽略張力、單純結紮（形成 neuroma、無功能）、延後數年（錯過再生黃金期）。\n⏱時機重點：軸突再生速率約 1 mm/day；運動再支配時間窗約 12–18 個月，故無法無張力直接縫合時應及早以 interposition nerve graft(如 sural nerve)橋接。", "peropt": {"A": "✗ 強行直接縫合造成張力過大→纖維化、缺血、gap 拉裂，預後差(張力是修復失敗主因)。", "B": "錯誤。只縫 epineurium 不解決張力，仍會失敗。", "C": "◎ 。使用 interposition nerve graft（如 sural nerve）無張力橋接缺損。", "D": "錯誤。單純結紮兩端無法恢復功能，且形成 neuroma。", "E": "✗ 延遲數年將錯過時間窗——軸突再生約 **1 mm/day**，運動終板(motor endplate)去神經後約 **12–18 個月**即退化不可逆，過久重建功能無法恢復。"}, "cite": "Neligan 5e Vol.6 Nerve repair and grafting; tension-free principle", "conflict": ""}, {"id": "9292", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 microsurgery 中 vasospasm 的處理，下列何者較正確？", "opts": {"A": "持續粗暴牽拉血管可解除 vasospasm", "B": "低溫沖洗比溫熱沖洗更能促進血流", "C": "可採取溫熱沖洗、減少刺激及局部血管擴張劑等方式處理", "D": "一旦 vasospasm 發生，代表吻合必定失敗", "E": "應常規以血管夾長時間夾住吻合口近端來解除痙攣"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顯微手術中血管痙攣 (Vasospasm) 的處理\n- Vasospasm 常見誘因：機械刺激、乾燥、低溫、疼痛、交感興奮、局部藥物。\n- 正確處置（多管齊下）：\n  1. Warm irrigation（溫熱沖洗，非低溫）促進血管擴張。\n  2. 減少對血管的機械刺激與牽拉、保持濕潤與適當灌流壓。\n  3. 局部 vasodilators：lidocaine、papaverine、verapamil、nitroglycerin 等。\n  4. 維持病人體溫、容積與止痛（減少交感興奮）。\n- 破除迷思：粗暴牽拉、低溫沖洗會惡化痙攣；vasospasm 未必等於吻合失敗；不應長時間血管夾夾住吻合口。", "peropt": {"A": "錯誤。粗暴牽拉血管會加重 vasospasm 與內膜損傷。", "B": "錯誤。低溫沖洗會惡化痙攣；應用溫熱沖洗。", "C": "◎ 。溫熱沖洗、減少刺激、局部血管擴張劑等多管齊下處理。", "D": "錯誤。Vasospasm 發生不代表吻合必定失敗，多可處置緩解。", "E": "錯誤。不應以血管夾長時間夾住吻合口，會加重缺血與內膜傷害。"}, "cite": "Neligan 5e Vol.1 Microsurgery; management of vasospasm", "conflict": ""}, {"id": "9293", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 acellular dermal matrix（ADM）在重建手術中的應用，下列何者正確？", "opts": {"A": "ADM 不會發生感染或 seroma", "B": "ADM 可作為 biologic scaffold，並常用於 implant-based breast reconstruction 的額外覆蓋或支撐", "C": "ADM 只能用於乾淨手術，不能用於任何污染傷口", "D": "ADM 會完全阻止宿主細胞與血管長入", "E": "ADM 已完全取代所有自體組織重建"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 去細胞真皮基質 (Acellular Dermal Matrix, ADM)\n- ADM 為去除細胞成分保留 ECM（collagen、elastin）之 biologic scaffold，來源可為 human（AlloDerm）、porcine、bovine。\n- 機轉：提供支架讓宿主 cell repopulation、angiogenesis、collagen 整合（并非阻止細胞血管長入，D 錯）。\n- 主要應用：implant-based breast reconstruction（下極覆蓋、支撐 inferolateral pole、控制 implant position）、腹壁疝氣重建、頭頸重建等——B 正確。\n- 併發症：仍可能 seroma、感染、red breast syndrome、外露（A 錯，並非不會感染/積液）。\n- 污染傷口：部分 biologic mesh 可用於 contaminated/CDC class II–III（C 過度絕對，錯）；ADM 為輔助，未取代自體重建（E 錯）。", "peropt": {"A": "錯誤。ADM 仍可能發生 seroma 與感染。", "B": "◎ 。ADM 為 biologic scaffold，常用於植入物乳房重建的覆蓋與支撐。", "C": "錯誤。ADM 並非只能用於乾淨手術，部分生物性材料可用於污染傷口。", "D": "錯誤。ADM 允許宿主細胞與血管長入（revascularization），非完全阻止。", "E": "錯誤。ADM 未取代所有自體組織重建，為輔助角色。"}, "cite": "Neligan 5e Vol.5 Breast reconstruction; ADM in implant-based reconstruction", "conflict": ""}, {"id": "9294", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 split-thickness skin graft（STSG），下列哪些敘述正確？(複選)", "opts": {"A": "donor site 主要藉由殘存 epidermal appendages 重新上皮化", "B": "較薄的 STSG 通常較容易 take，且 donor site 癒合較快", "C": "較厚的 STSG 通常 secondary contraction 較少", "D": "meshing 可增加覆蓋面積，並有助於血液或滲液引流", "E": "STSG donor site 一律需 primary closure"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 分層皮膚移植 (STSG)（複選）\n- STSG 含 epidermis 加部分 dermis；donor site 保留 dermal 內 epidermal appendages（毛囊、皮脂腺、汗腺），由其上皮化 (re-epithelialization) 癒合——A 正確。\n- 較薄 STSG：代謝需求低、易 take，donor site 因保留較多 appendages，癒合較快——B 正確。\n- 較厚 STSG：含較多 dermis → secondary contraction 較少、質地較佳（但 take 較難、donor site 癒合較慢）——C 正確。\n- Meshing：擴大覆蓋面積、允許血液/滲液引流、貼合不規則傷面——D 正確。\n- E 錯：STSG donor site 一般靠上皮化自癒，並非『一律需 primary closure』。", "peropt": {"A": "◎ Donor site 藉殘存 epidermal appendages 重新上皮化，正確。", "B": "◎ 較薄 STSG 較易 take 且 donor site 癒合較快，正確。", "C": "◎ 較厚 STSG secondary contraction 較少，正確。", "D": "◎ Meshing 增加覆蓋面積並利於引流，正確。", "E": "錯誤（未選）。STSG donor site 靠上皮化癒合，並非一律需 primary closure。"}, "cite": "Grabb & Smith 9e Skin grafts; STSG properties", "conflict": ""}, {"id": "9295", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 full-thickness skin graft（FTSG）與 composite graft，下列哪些敘述正確？(複選)", "opts": {"A": "FTSG 包含完整 dermis，常用於功能及外觀要求較高區域", "B": "FTSG donor site 通常選擇可 primary closure 的部位", "C": "相較於 STSG，FTSG 通常 secondary contraction 較少", "D": "若 graft 包含皮膚與軟骨等多種組織，可歸類為 composite graft", "E": "FTSG 可存活於無 periosteum 的裸露 cortical bone 上"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 全層皮膚移植 (FTSG) 與複合移植 (Composite Graft)（複選）\n- FTSG 含 epidermis 加完整 dermis，色澤、質地、耐用性佳、secondary contraction 少，用於臉部、手掌等功能外觀要求高處——A、C 正確。\n- Donor site 因取全層，多選可 primary closure 的部位（如 postauricular、supraclavicular、上眼瞼、腹股溝）——B 正確。\n- Composite graft：含兩種以上組織（如皮膚＋軟骨、皮膚＋脂肪），用於鼻翼等，靠周邊 imbibition，體積受限——D 正確。\n- E 錯：FTSG 代謝需求高，無法存活於無 periosteum 的裸露皮質骨（無血供受床）。", "peropt": {"A": "◎ FTSG 含完整真皮，用於功能與外觀要求高的區域，正確。", "B": "◎ FTSG donor site 選可 primary closure 部位，正確。", "C": "◎ FTSG 相較 STSG secondary contraction 較少，正確。", "D": "◎ 含皮膚與軟骨等多組織者為 composite graft，正確。", "E": "錯誤（未選）。FTSG 無法存活於無 periosteum 的裸露皮質骨。"}, "cite": "Grabb & Smith 9e Skin & composite grafts", "conflict": ""}, {"id": "9296", "sub": "BAS", "src": "NG", "years": [115], "stem": "關於 microvascular anastomosis 的基本原則，下列哪些敘述正確？(複選)", "opts": {"A": "吻合前應適度清除會進入管腔或影響縫合的 adventitia", "B": "應避免吻合口張力、扭轉與內膜損傷", "C": "血管口徑不合時，可視情況採 beveling、fish-mouth 或其他技巧調整", "D": "動脈或靜脈吻合方式可依血流方向、recipient vessel 條件及重建需求選擇 end-to-end 或 end-to-side", "E": "吻合前保留管腔內血塊可降低術後 thrombosis"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顯微血管吻合 (Microvascular Anastomosis) 基本原則（複選）\n- 吻合前清除會進入管腔或干擾縫合的 adventitia（外膜），避免帶入管腔造成血栓——A 正確。\n- 避免 anastomotic tension、twisting/kinking、內膜 (intima) 損傷，三者皆為血栓與失敗主因——B 正確。\n- 口徑不合 (size mismatch) 可用 beveling、fish-mouth（斜切/魚口）、dilatation、end-to-side、sleeve 等技巧調整——C 正確。\n- 依血流方向、recipient vessel 條件與重建需求選 end-to-end 或 end-to-side——D 正確。\n- E 錯：吻合前應以肝素鹽水沖洗清除管腔血塊；保留血塊會促進 thrombosis，非降低。", "peropt": {"A": "◎ 吻合前清除會進入管腔或影響縫合的 adventitia，正確。", "B": "◎ 避免吻合口張力、扭轉與內膜損傷，正確。", "C": "◎ 口徑不合可用 beveling、fish-mouth 等技巧調整，正確。", "D": "◎ 血流與受床條件選 end-to-end 或 end-to-side，正確。", "E": "錯誤（未選）。保留管腔內血塊會增加 thrombosis，應沖洗清除。"}, "cite": "Neligan 5e Vol.1 Microsurgery; principles of microvascular anastomosis", "conflict": ""}, {"id": "9297", "sub": "BAS", "src": "NG", "years": [115], "stem": "Successful advanced skeletal reconstruction relies on a profound understanding of the biology of bone healing and the anatomic characteristics of donor sites. Regarding the mechanisms and clinical properties of non-vascularized bone grafts, vascularized bone flaps, and other specialized techniques (such as the Masquelet technique), which of the following statements are correct? (複選)", "opts": {"A": "Autologous non-vascularized cortical bone grafts heal primarily through a process known as \"creeping substitution,\" an osteoconductive process involving the gradual resorption of necrotic bone with subsequent deposition of new bone.", "B": "The Masquelet technique is a two-stage reconstruction approach. The first stage involves the insertion of a cement spacer. In the second stage, this membrane cavity is packed with autologous cancellous bone.", "C": "To preserve the potential for longitudinal growth after pediatric bone tumor resection, a vascularized epiphyseal transfer from the proximal fibula can be used. The blood supply to this proximal epiphysis is predominantly provided by branches of the peroneal artery.", "D": "The medial femoral condyle (MFC) flap is based on the descending genicular artery and provides a thick periosteum with significant osteogenic properties.", "E": "According to the FDA, a fracture that has not healed for more than three months, and does not show any signs of healing for one consecutive month, is defined as a \"non-union\" and mandates reconstruction with a vascularized bone flap."}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 骨癒合生物學、血管化骨瓣與 Masquelet 技術（複選）\n- A 正確：非血管化 cortical bone graft 主要靠『creeping substitution（爬行替代）』癒合——為 osteoconductive 過程，破骨細胞逐步吸收壞死骨、成骨細胞沉積新骨；cortical graft 早期以吸收為主、力學暫時變弱。\n- B 正確：Masquelet（induced membrane）為兩階段——第一階段清創後置入 cement (PMMA) spacer 誘導形成生物膜（富含 VEGF、BMP-2、成長因子）；第二階段取出 spacer，保留誘導膜腔，填入自體 cancellous bone。\n- D 正確：Medial femoral condyle (MFC) flap 以 descending genicular artery 為蒂，提供富含成骨性的厚 periosteum（corticoperiosteal flap），用於難癒合／小骨缺損。\n- C 錯誤：近端腓骨 (proximal fibula) vascularized epiphyseal transfer 的骨骺血供主要來自 anterior tibial artery（經 anterior tibial recurrent / 環繞分支），非 peroneal artery。\n- E 錯誤：FDA non-union 定義為骨折至少 9 個月未癒合且連續 3 個月無癒合跡象（非『3 個月＋連續 1 個月』），且未『強制』一律以血管化骨瓣重建（依缺損大小與條件選擇）。", "peropt": {"A": "◎ 非血管化皮質骨移植靠 creeping substitution（osteoconductive）癒合，正確。", "B": "◎ Masquelet 兩階段：先置 cement spacer，第二階段於誘導膜腔填入自體 cancellous bone，正確。", "C": "錯誤（未選）。近端腓骨骨骺血供主要來自 anterior tibial artery，非 peroneal artery。", "D": "◎ MFC flap 以 descending genicular artery 為蒂，提供富成骨性的厚 periosteum，正確。", "E": "錯誤（未選）。FDA non-union 為 ≥9 個月未癒合且連續 3 個月無癒合跡象，且非強制以血管化骨瓣重建。"}, "cite": "Neligan 5e Vol.1 Bone healing / Vol.4 vascularized bone flaps; Masquelet technique; MFC flap", "conflict": ""}, {"id": "3003", "sub": "CRF", "src": "GS", "years": [110, 115], "stem": "在施行Orthognathic Surgery時，何處的血管最容易損傷造成bleeding?", "opts": {"A": "Maxilla", "B": "Mandible", "C": "Infraorbital", "D": "Temporal", "E": "Zygoma"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "正顎手術出血風險最高處＝**上頜（maxilla）**。Le Fort I 下折（down-fracture）時，翼上頜接合區的 **descending palatine artery 與 pterygoid venous plexus、maxillary artery** 皆在附近，是大出血的主要來源。下頜 BSSO 的出血風險相對低。", "peropt": {"A": "◎ ：上頜（Le Fort I down-fracture 區）。", "B": "✗ 下頜 BSSO 出血風險較低。", "C": "✗ 眶下為感覺神經，非主要出血源。", "D": "✗ 顳部非正顎術野。", "E": "✗ 顴骨非主要出血源。"}, "cite": "GS110 · GS110-B06-Q01", "conflict": ""}, {"id": "3005", "sub": "CRF", "src": "GS", "years": [110, 114, 115], "stem": "下列何種syndrome是用來描述半邊臉發育不全Idiopathic progressive hemifacial atrophy (PHA)？", "opts": {"A": "Apert syndrome", "B": "Down's syndrome", "C": "Compartment syndrome", "D": "Klippel-Trenaunay syndrome", "E": "Parry–Romberg syndrome"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "Idiopathic progressive hemifacial atrophy（PHA）＝ Parry–Romberg syndrome：單側顏面軟組織與骨骼進行性萎縮，青春期後多自行停滯（burn out）。", "peropt": {"A": "Apert＝顱縫早閉＋對稱性併指。", "B": "Down's＝21 三體。", "C": "Compartment syndrome＝腔室症候群，與顏面無關（此為純誘答）。", "D": "Klippel–Trenaunay＝微血管／靜脈／淋巴畸形＋肢體肥大。", "E": "◎ ：Parry–Romberg。"}, "cite": "GS110 · GS110-B06-Q03", "conflict": ""}, {"id": "3007", "sub": "CRF", "src": "GS", "years": [110, 114, 115], "stem": "以下哪四項為耳朵重建的原則? (複選)", "opts": {"A": "合適的位置proper ear location", "B": "充足血流供應的皮膚去包覆 well-vascularized thin skin envelope", "C": "良好的3D 骨架 anatomical 3D framework", "D": "漂亮的耳朵弧線 beautiful curves.", "E": "大小越小越好 as little as possible"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 全耳重建（total ear reconstruction）的核心原則在於：把一個具細緻立體結構的軟骨支架（anatomical 3D framework）放在正確的解剖位置（proper location），再以血流充足、夠薄的皮膚封套（well-vascularized thin skin envelope）緊密包覆，才能顯現helix、antihelix、scapha等凹凸細節。重建目標是「足夠且對稱」的結構，而非越小越好；追求漂亮弧線（beautiful curves）是美學延伸，屬合理原則。⚠ 易混淆：皮膚封套要「薄」是為了透出支架細節，但血供必須充足，兩者不矛盾。", "peropt": {"A": "◎ 正確定位（與對側對稱、位置、傾角、大小相稱）是重建首要條件。", "B": "◎ 需以血流良好且薄的皮膚封套包覆，才能顯露支架的3D細節並避免壞死。", "C": "◎ 精細的三維軟骨支架是重建成敗的核心。", "D": "◎ 呈現自然耳廓弧線屬美學目標，為合理原則。", "E": "✗ 錯誤，重建目標為結構「足夠且與對側相稱」，而非越小越好，故非重建原則。"}, "cite": "待複查（GS 耳重建原則 記憶佐證）", "conflict": ""}, {"id": "3014", "sub": "CRF", "src": "GS", "years": [111, 112, 113, 114, 115], "stem": "A one-year-old presents with brachycephaly, bilateral superior orbital rim retrusion with an interorbital distance of 28 mm, and a wide nasal root. Mutation in which of the following genes is associated with these findings:", "opts": {"A": "FGFR2", "B": "EFNB1", "C": "IRF6", "D": "TWIST", "E": "TCOF1"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "雙側冠狀縫早閉（短頭brachycephaly）＋**眼距過寬(hypertelorism)**＋鼻根寬 → **craniofrontonasal dysplasia → EFNB1**。題幹 interorbital distance 28mm：1 歲嬰兒正常 IOD 約 16–18mm、成人約 25mm，28mm 已屬眼距過寬。這是與 Apert（FGFR2）最關鍵的鑑別：**Apert 不以眼距過寬為主徵**。\n⚠ 與 CN3118 為選項重排家族：同一題幹、答案從 B 變 D。", "peropt": {"A": "FGFR2 → Apert／Crouzon／Pfeiffer。", "B": "◎ ：EFNB1 → craniofrontonasal dysplasia（短頭＋眼距過寬(IOD 28mm，正常嬰兒約16–18mm)＋鼻根寬）。", "C": "IRF6 → Van der Woude。", "D": "TWIST1 → Saethre-Chotzen。", "E": "TCOF1 → Treacher Collins。"}, "cite": "GS111 · GS111-B06-Q02", "conflict": "⚠ 同題歷屆重出（brachycephaly+雙側眶上緣後縮+hypertelorism 28mm+寬鼻根→craniofrontonasal dysplasia之基因）：正解基因恆為EFNB1；111/112/114/115年(3014)為B、113年(3026)因選項重排改為D。"}, {"id": "3016", "sub": "CRF", "src": "GS", "years": [111, 112, 113, 114, 115], "stem": "A six-year-old boy is brought to the cleft clinic for a follow-up visit. The patient had intravelar veloplasty at 10 months of age. On perceptual speech evaluation, he was noted to have hypernasality and nasal emission. On physical examination, no fistula was noted. Nasal endoscopy showed a large coronal gap with poor lateral wall motion. Which of the following is the most appropriate management?", "opts": {"A": "Continued speech therapy", "B": "Furlow palatoplasty", "C": "Sphincter pharyngoplasty", "D": "Posterior pharyngeal flap", "E": "Palatal lift prosthesis"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "VPI 的術式選擇看**鼻咽鏡的縫隙形態**：**coronal gap ＋ 側壁動作差 → sphincter pharyngoplasty**（借側壁組織補側壁）；sagittal gap ＋ 側壁動作good → posterior pharyngeal flap；小的中央縫隙且軟顎短 → Furlow。無瘻管故不需再修補顎裂。\n⚠ 與 CN3072 為選項重排家族：答案從 C 變 A，但正確術式始終是 sphincter pharyngoplasty。", "peropt": {"A": "✗ 已有結構性 VPI，單靠語言治療無效。", "B": "✗ Furlow 適用於軟顎短、縫隙小者。", "C": "◎ ：sphincter pharyngoplasty。", "D": "✗ Posterior pharyngeal flap 適用側壁動作良好的 sagittal gap。", "E": "✗ 顎抬高假體屬非手術替代，非最適處置。"}, "cite": "GS111 · GS111-B06-Q04", "conflict": "⚠ 同題歷屆重出（intravelar veloplasty後VPI、無fistula、內視鏡見large coronal gap且lateral wall motion差→處置）：正解恆為Sphincter pharyngoplasty(針對lateral wall動作不良者)；111/112/114/115年(3016)為C、113年(3027)因選項重排改為A。"}, {"id": "3032", "sub": "CRF", "src": "GS", "years": [115], "stem": "Options for presurgical infant orthopedics include all of the following except:", "opts": {"A": "NAM", "B": "Mandibular distraction", "C": "Latham appliance", "D": "Lip taping"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "術前嬰兒矯正（presurgical infant orthopedics）＝**NAM、Latham appliance、lip taping**，全部作用於**上頜與唇鼻**。Mandibular distraction 是治療下顎後縮／呼吸道阻塞的手術，不屬此類。", "peropt": {"A": "✓ NAM（鼻齒槽塑形）。", "B": "◎ （除外）：下顎延長術非術前矯正。", "C": "✓ Latham 裝置。", "D": "✓ 貼唇膠帶。"}, "cite": "GS115 · GS115-B04-Q01", "conflict": ""}, {"id": "3033", "sub": "CRF", "src": "GS", "years": [115], "stem": "A first-year plastic surgery resident is reviewing craniofacial development with her mentor. She is asked about derivatives of the first pharyngeal arch. Which of the following structures is derived from the first pharyngeal arch? (複選)", "opts": {"A": "Maxillary process", "B": "Mandibular process", "C": "Meckel's cartilage", "D": "Reichert's cartilage"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "第一鰓弓衍生物：上頜突、下頜突、Meckel's cartilage（→ 錘骨、砧骨）、咀嚼肌、三叉神經。Reichert's cartilage 屬第二鰓弓（→ 鐙骨、莖突、舌骨小角）。", "peropt": {"A": "◎ 上頜突。", "B": "◎ 下頜突。", "C": "◎ Meckel's cartilage。", "D": "✗ Reichert's cartilage 為第二鰓弓。"}, "cite": "GS115 · GS115-B04-Q02", "conflict": ""}, {"id": "3034", "sub": "CRF", "src": "GS", "years": [115], "stem": "Which of the following cranial sutures closes normally in infancy?", "opts": {"A": "Sagittal", "B": "Lambdoid", "C": "Metopic", "D": "Coronal", "E": "Squamosal"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "**額縫（metopic suture）是唯一在嬰兒期正常閉合的顱縫**（約 3–9 個月，最晚 2 歲前）。其餘顱縫要到成年（約第 3–4 個十年）才閉合：矢狀縫約 22 歲、冠狀縫約 24 歲、人字縫約 26 歲、鱗狀縫更晚。因此『額縫閉合』本身不等於病態——但**過早**閉合會造成三角頭(trigonocephaly)。", "peropt": {"A": "✗ 矢狀縫(sagittal)約 22 歲成年才閉合，非嬰兒期。", "B": "✗ 人字縫(lambdoid)約 26 歲成年才閉合，非嬰兒期。", "C": "◎ ：額縫(metopic)，嬰兒期 3–9 個月正常閉合。", "D": "✗ 冠狀縫(coronal)約 24 歲成年才閉合，非嬰兒期。", "E": "✗ 鱗狀縫(squamosal)成年才閉合（第4個十年），非嬰兒期。"}, "cite": "GS115 · GS115-B04-Q05", "conflict": ""}, {"id": "3035", "sub": "CRF", "src": "GS", "years": [115], "stem": "A 42-year-old presents with a saddle nose deformity. She has a remote history of nasal trauma occurring more than 1 year ago, for which she did not seek any medical attention. Which of the following did she most likely have?", "opts": {"A": "Nasal bone and septal fracture", "B": "Nasal bone fracture", "C": "Septal hematoma", "D": "Septal fracture"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "**鞍鼻的元凶是未處理的鼻中隔血腫**：血腫剝離軟骨膜 → 軟骨失去血供 → 缺血性壞死 → 鼻背塌陷。單純鼻骨或鼻中隔骨折不會如此。這是「鼻外傷必須翻開看鼻中隔」的理由。", "peropt": {"A": "✗ 骨折本身不致軟骨壞死。", "B": "✗ 同上。", "C": "◎ ：鼻中隔血腫 → 軟骨壞死 → 鞍鼻。", "D": "✗ 單純鼻中隔骨折不致塌陷。"}, "cite": "GS115 · GS115-B06-Q01", "conflict": ""}, {"id": "3036", "sub": "CRF", "src": "GS", "years": [115], "stem": "A 45-year-old patient underwent unilateral decompressive craniectomy by neurosurgery for intracerebral hemorrhage after a fall. The patient's bone graft is stored in the hospital tissue bank for possible use for cranioplasty reconstruction.The patient presents to the plastic surgery clinic 8 months later to discuss cranioplasty planning. The scalp has healed well with no evidence of wound dehiscence or infection.Which strategy for reconstruction is associated with the lowest likelihood of infection?", "opts": {"A": "Single-stage reconstruction with the patient's stored bone graft because of the autologous nature of the implant material, lack of immunogenicity, and sterile storage in the tissue bank", "B": "Two-staged approach with placement of a tissue expander(s) adjacent to the defect in the first stage,followed by tissue expander removal and new alloplastic implant placement 2 months later", "C": "Single-stage reconstruction with titanium mesh implant and a tension-free scalp closure", "D": "Single-stage use of a solid alloplastic implant, utilizing generous galeal scoring on the elevated scalp flap side to ensure achievement of a tension-free closure"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "顱骨成形術的感染率排序：**自體冷凍骨瓣感染／吸收率最高**（缺乏血流、儲存過程污染風險）。**鈦網（titanium mesh）＋無張力頭皮縫合感染率最低**。組織擴張器會增加額外的感染機會。", "peropt": {"A": "✗ 儲存的自體骨瓣感染與再吸收率高，並非最安全。", "B": "✗ 兩階段加擴張器，額外增加感染風險。", "C": "◎ ：鈦網＋無張力縫合。", "D": "✗ 實心人工植入物體積大、死腔多，感染率高於鈦網。"}, "cite": "GS115 · GS115-B06-Q02", "conflict": ""}, {"id": "3037", "sub": "CRF", "src": "GS", "years": [115], "stem": "A 53-year-old man with previous squamous cell carcinoma of the lower lip treated with wedge resection and radiation now presents with recurrence of a 3-cm ulcerated lesion involving 75% of the lower lip. After resection, which of the following reconstructive options would be most appropriate?", "opts": {"A": "Karapandzic flap", "B": "Abbe and Estlander flaps", "C": "Radial forearm flap with palmaris longus tendon", "D": "Gilles flap", "E": "Facial artery myomucosal flap"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下唇缺損達 75%（>2/3）且曾接受放射治療(radiation)與楔形切除，鄰近唇/頰組織已因放療纖維化，局部唇瓣（Karapandzic、Abbe/Estlander、Gillies）之組織量與血供均受限。修補門檻：**<1/3(約<33%) 可直接楔形縫合；1/3–2/3(約33–66%) 用局部/交叉唇瓣；>2/3(本題75%) 須游離皮瓣**。最適當者為橈側前臂游離皮瓣併掌長肌腱(radial forearm free flap with palmaris longus tendon)，以肌腱作懸吊帶維持口輪匝肌張力、避免下唇下垂/流涎(drooling)。⚠ 放療病史是排除大範圍局部旋轉瓣的關鍵。", "peropt": {"A": "✗ Karapandzic 瓣適用 ≤2/3(約≤66%) 之下唇缺損；本題 75%(>2/3) 過大，且放療後組織量與血供受限。", "B": "✗ Abbe(重建唇中段約1/3–1/2)/Estlander(重建嘴角)交叉唇瓣取自對側唇，放療＋75% 大缺損下組織不敷使用。", "C": "◎ 缺損 >2/3(75%)＋放療後，橈側前臂游離瓣併掌長肌腱作懸吊帶最適當。", "D": "✗ Gillies 扇形瓣為局部瓣(適用約 1/2–2/3)，放療後不適合且 75% 缺損過大。", "E": "✗ FAMM 瓣組織量有限且血供可能受放療影響，無法重建 75% 全層缺損。"}, "cite": "待複查（GS 唇重建/游離皮瓣 記憶佐證）", "conflict": ""}, {"id": "3038", "sub": "CRF", "src": "GS", "years": [115], "stem": "外傷性眶上裂症候群 (superior orbital fissure syndrome) 之症狀包含下列何者？ (複選)", "opts": {"A": "眼外直肌 (Lateral rectus) ⿇痹", "B": "視⼒喪失 loss of vision", "C": "瞳孔放⼤ Pupillary dilatation", "D": "上眼瞼下垂 (Upper eyelid ptosis)", "E": "額頭⿇痺 loss of frontal sensation"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "**眶上裂症候群（SOFS）＝ CN III、IV、V1、VI 受損**：眼外肌全癱（含外直肌）、瞳孔放大固定、上眼瞼下垂、額部感覺喪失。\n**視力不受影響**——視神經（CN II）走 optic canal，不經眶上裂。**一旦合併失明，即為 orbital apex syndrome**。\n⚠ 與 CN3142 為**極性翻轉家族**（問『包含』，答 ACDE）。**背『答案 B』的人在這一年全錯**；記住『視力喪失＝orbital apex』才不會被翻轉打倒。", "peropt": {"A": "◎ 外直肌麻痺（CN VI）。", "B": "✗ 視力喪失屬 orbital apex syndrome。", "C": "◎ 瞳孔放大。", "D": "◎ 上眼瞼下垂。", "E": "◎ 額部感覺喪失（V1）。"}, "cite": "GS115 · GS115-B06-Q05", "conflict": ""}, {"id": "3039", "sub": "CRF", "src": "GS", "years": [115], "stem": "下列關於 prominent ear（招風耳）矯正術之敘述，何者正確？", "opts": {"A": "Mustarde technique 主要是以 concha-mastoid sutures 將 conchal bowl 固定至 mastoid fascia。", "B": "Furnas sutures 的主要目的為重建 antihelical fold。", "C": "Stenstrom technique 藉由 anterior cartilage scoring 增加耳軟骨 pliability，常作為 Mustarde sutures 的輔助技術。", "D": "過度矯正 middle third of the ear 會造成 cauliflower ear deformity。", "E": "Incisionless otoplasty 的原理主要為切除部分 conchal cartilage 後，再以 buried sutures 固定耳廓位置。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "招風耳三大術式對號入座：\n**Mustardé ＝ 後方褥式縫合，重建 antihelical fold**\n**Furnas ＝ concha-mastoid 縫合，把外突耳甲後推**\n**Stenström ＝ 前方軟骨劃痕（anterior scoring），增加軟骨可塑性，常作 Mustardé 的輔助**", "peropt": {"A": "✗ concha-mastoid 縫合是 **Furnas**，非 Mustardé。", "B": "✗ Furnas 的目的是後推耳甲，非重建 antihelical fold。", "C": "◎ ：Stenström 前方軟骨劃痕，輔助 Mustardé。", "D": "✗ 過度矯正中三分之一致『telephone ear』，非 cauliflower ear。", "E": "✗ Incisionless otoplasty 僅以埋藏縫線塑形，不切除軟骨。"}, "cite": "GS115 · GS115-B09-Q02", "conflict": ""}, {"id": "3093", "sub": "CRF", "src": "NG", "years": [107, 112, 114], "stem": "胚胎時期，1st pharyngeal arch 發育成以下構造，何者除外？", "opts": {"A": "mandible and maxilla", "B": "Muscles of mastication", "C": "Trigeminal nerve", "D": "Maxillary artery", "E": "Muscles of facial expression"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "第一鰓弓：上下頜、咀嚼肌、三叉神經（V）、maxillary artery。**表情肌屬第二鰓弓（顏面神經 VII）**。神經配對是最快的辨識法：咀嚼＝V，表情＝VII。", "peropt": {"A": "✓ 上下頜由上頜突、下頜突形成。", "B": "✓ 咀嚼肌。", "C": "✓ 三叉神經。", "D": "✓ Maxillary artery（注意不是 mandibular artery）。", "E": "◎ （除外）：表情肌來自第二鰓弓，由顏面神經支配。"}, "cite": "NG107 · NG107-B08-Q01", "conflict": ""}, {"id": "3106", "sub": "CRF", "src": "NG", "years": [108, 111, 113, 114, 115], "stem": "下列何者不是lip reconstruction 的目標?", "opts": {"A": "Preservation of function.", "B": "Reconstitution of orbicularis oris.", "C": "Two-layered closure.", "D": "Accurate alignment of vermilion.", "E": "Maintenance of relationship between upper and lower lips."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 唇重建（lip reconstruction）之目標包括：保留功能（口輪匝肌之口腔括約功能）、重建口輪匝肌連續性（reconstitution of orbicularis oris）、精準對位唇紅緣（accurate vermilion alignment）、維持上下唇之相互關係。全層唇缺損應以「三層縫合（three-layered：黏膜、肌肉、皮膚）」修復，而非兩層。本題選「非目標」者。⚠ 易混淆：C「兩層縫合」為錯，正確為三層，以確保肌肉連續與功能。", "peropt": {"A": "✗（屬正確目標）保留功能為重建目標。", "B": "✗（屬正確目標）重建口輪匝肌連續性為目標。", "C": "◎ ，非重建目標) 全層唇缺損應為**三層縫合(黏膜mucosa／肌肉orbicularis oris／皮膚skin)**，「兩層縫合」不是目標。", "D": "✗（屬正確目標）精準對位唇紅緣為目標。", "E": "✗（屬正確目標）維持上下唇關係為目標。"}, "cite": "待複查（NG 唇重建目標 記憶佐證）", "conflict": ""}, {"id": "3118", "sub": "CRF", "src": "NG", "years": [108, 111, 112, 114], "stem": "有關Craniofacial microsomia(CFM)先天性的頭頸部疾病,下列選項何者錯誤?", "opts": {"A": "此疾病與胚胎期第一第二腮弓發育不全有關", "B": "常影響的區域包含耳朵,下頷骨及額骨.", "C": "Goldenhar syndrome現在被廣泛認為是CFM症候群的一部分", "D": "下頷骨發育不全(mandibular hypoplasia)是診斷此疾病的重點.", "E": "大部分sporadic, 少數autosomal dominant"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "CFM 侵犯的是第一、二鰓弓衍生構造：**耳、下頜、上頜／顴骨**。額骨屬額鼻突，不在鰓弓範圍。", "peropt": {"A": "✓ 第一、二鰓弓發育不全。", "B": "◎ （錯誤）：應為耳、下頜、上頜／顴骨，額骨非典型受累區。", "C": "✓ Goldenhar（眼—耳—脊椎譜系）視為 CFM 的一部分。", "D": "✓ 下頜發育不全是診斷核心。", "E": "✓ 多為偶發，少數體染色體顯性。"}, "cite": "NG108 · NG108-B09-Q03", "conflict": ""}, {"id": "3122", "sub": "CRF", "src": "NG", "years": [109, 110, 111, 112, 113, 114], "stem": "What is/are the indications for osseointegrated nasal prosthesis reconstruction? (複選)", "opts": {"A": "Failed autogenous reconstruction.", "B": "Scarring at autogenous donor sites.", "C": "Reconstruction following autogenous reconstruction because of tumor recurrence.", "D": "Medical contraindication to multistaged autogenous reconstruction.", "E": "Patient preference."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 骨整合鼻義齒（osseointegrated nasal prosthesis）重建之適應症包含：自體重建失敗、供區明顯疤痕不利再取材、腫瘤復發後之重建、無法承受多階段自體重建之醫療禁忌、以及病人偏好（patient preference）。本複選題答案為全選ABCDE。⚠ 易混淆：同一觀念在單選題（如NG104-B02-Q05 / NG105-B03-Q09）中，「preferred appearance / patient preference」反被列為「非適應症」之錯誤選項——此為跨年度選項重排造成之矛盾，作答時以各題給定之答案與選項組合為準，勿死背字母（答案疑義家族，建議理解概念）。", "peropt": {"A": "◎ 自體重建失敗為適應症。", "B": "◎ 供區明顯疤痕不利再取材為適應症。", "C": "◎ 腫瘤復發後之重建為適應症。", "D": "◎ 無法承受多階段自體重建之醫療禁忌為適應症。", "E": "◎ 病人偏好於本複選題亦列為適應症。"}, "cite": "待複查（NG 骨整合鼻義齒適應症 記憶佐證）", "conflict": "選項重排家族：與 NG111-B03-Q07 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出（Osseointegrated nasal prosthesis適應症）：五個選項(失敗之自體重建、供區疤痕、腫瘤復發後重建、無法多階段自體重建之醫療禁忌、病人偏好)皆為適應症。109/110/112/113年(3122)與111年(3158)為複選，答案皆ABCDE(僅字母重排)；114年(3181)改為單選、E選項換成「All the above are correct」，答E。考點一致：上述五者全屬適應症。"}, {"id": "3127", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "When is the basic morphology of the human face established？", "opts": {"A": "Between the 1st and 4th gestational week", "B": "Between the 4th and 10th gestational week", "C": "Between the 10th and 14th gestational week", "D": "Between the 14th and 20th gestational week", "E": "Between the 20th and 24th gestational week"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考顏面胚胎發育時序。人臉的基本形態（basic morphology）建立於妊娠第 4 至 10 週（gestational week 4–10），此期間 frontonasal、maxillary、mandibular 等 facial prominences 融合形成臉部主要構造；唇顎裂等顏面裂即源於此關鍵窗口內融合失敗。⚠ 記憶要點：第 4 週前為原始神經嵴/鰓弓形成階段、第 10 週後主要為生長細化，故『4–10 週』為顏面形態確立期。", "peropt": {"A": "✗ 第 1–4 週為胚胎早期（神經嵴遷移、鰓弓開始形成），顏面基本形態尚未確立。", "B": "◎ 第 4–10 妊娠週為人臉基本形態確立期，facial prominences 於此期融合。", "C": "✗ 第 10–14 週已進入顏面生長細化階段，非基本形態確立期。", "D": "✗ 第 14–20 週為後續生長階段。", "E": "✗ 第 20–24 週更晚，與顏面基本形態建立無關。"}, "cite": "待複查（NG 顏面胚胎發育時序 記憶佐證）", "conflict": ""}, {"id": "3129", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "下列關於cleft palate的敘述,下列何者不正確? (複選)", "opts": {"A": "Normal speech is the primary goal of cleft palate repair; minimizing effects of maxillary growth is also important but ultimately secondary.", "B": "Cleft palate repair after 1 year of age results in better speech outcomes than earlier repairs.", "C": "Eustachian tube function is abnormal in cleft patients due to abnormal position of levator veli palatini muscle.", "D": "The levator palatini and other pharyngeal muscles are derived from the third branchial arch and are innervated primarily by cranial nerve V (trigeminal).", "E": "Pierre Robin described the triad of micrognathia, glossoptosis, and respiratory distress."}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "兩個破綻：①顎裂修補**越晚語言越差**（應在 12 個月前）；②**levator veli palatini 來自第四鰓弓、由迷走神經（咽叢）支配**——只有 **tensor veli palatini** 例外，來自第一鰓弓、由三叉神經 V3 支配。這組「一個例外」是最愛考的細節。", "peropt": {"A": "✓ 正常語言為首要目標，上頜生長影響次之。", "B": "◎ 不正確：顎裂修補**越晚語言越差**，應在 12 個月(1 歲)前完成；1 歲後修補語言結果較差。", "C": "✓ 提顎帆肌位置異常 → 耳咽管功能不良 → 中耳炎。", "D": "◎ 不正確：應為第四鰓弓、迷走神經；三叉神經只管 tensor veli palatini。", "E": "✓ Robin 三徵：小頜、舌根後移、呼吸窘迫。"}, "cite": "NG109 · NG109-B08-Q05", "conflict": ""}, {"id": "3130", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "下列關於Velopharyngeal dysfunction(VPD) 的敘述，何者正確？ (複選)", "opts": {"A": "Velopharyngeal dysfunction (VPD) may lead to hypernasality, nasal air emission, and compensatory articulation errors.", "B": "Cinefluoroscopy must be completed as part of a standard preoperative evaluation to allow for direct visualization of the velopharyngeal mechanism during speech and surgical planning.", "C": "Velopharyngeal insufficiency is the first major diagnostic category of VPD.", "D": "The most common congenital structural defects associated with VPD are cleft palate and submucosal cleft palate.", "E": "Common complications after Furlow Z-palatoplasty include bleeding, oronasal fistula, and hoarseness."}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "VPD 的診斷三分類：**insufficiency（結構不足）、incompetence（神經肌肉）、mislearning（學習性）**。最常見的先天結構缺陷是裂顎與黏膜下裂顎。Cinefluoroscopy **並非必做**；Furlow 術後也**不會**造成聲音沙啞。", "peropt": {"A": "◎ 高鼻音、鼻漏氣、代償性構音錯誤。", "B": "✗ Cinefluoroscopy 非標準必要檢查。", "C": "◎ Insufficiency 為第一大診斷類別（結構性）。", "D": "◎ 裂顎與黏膜下裂顎為最常見先天結構缺陷。", "E": "✗ 聲音沙啞非 Furlow 併發症（見 CN3086）。"}, "cite": "NG109 · NG109-B08-Q06", "conflict": ""}, {"id": "3132", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "Which is not the key concepts of facial fracture in the pediatric population?", "opts": {"A": "Surgeon should recognize the potential for growing skull fractures.", "B": "Surgical intervention for orbital fractures should be determined upon clinical rather than radiologic findings.", "C": "All types of malocclusion in pediatric mandibular fractures should undergone surgical intervention.", "D": "The neonatal skull is profoundly different from its adult counterpart and therefore responds to traumatic forces with unique injury patterns.", "E": "When indicated, employing less invasive approaches to operative management should be practiced."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "小兒顏面骨折的原則是**保守、依臨床而非影像、保留生長潛能**。**並非所有咬合不正都需手術**——兒童下頜有強大的重塑能力，多數可靠彈性牽引與觀察處理。", "peropt": {"A": "✓ 須警覺 growing skull fracture。", "B": "✓ 眶骨骨折依臨床表現（非影像）決定手術。", "C": "◎ （非原則）：兒童咬合不正不必然手術。", "D": "✓ 新生兒顱骨與成人截然不同，損傷型態獨特。", "E": "✓ 有適應症時應採侵入性較低的術式。"}, "cite": "NG109 · NG109-B08-Q08", "conflict": ""}, {"id": "3133", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "下列關於Crouzon's syndrome的描述，何者錯誤？", "opts": {"A": "This syndrome involves only the face and cranium and is not associated with other anomalies elsewhere on the limbs or trunk.", "B": "The fundamental dysmorphology is an underdeveloped midface presenting with exorbitism secondary to insufficient depth of the orbits, hypoplasia of the malar bones, and a class I malocclusion.", "C": "Hypertelorism may be present but is usually mild.", "D": "The nose is short.", "E": "Brachycephaly is usually present; however, scaphocephaly, plagiocephaly, or even a cloverleaf skull may be present."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "**Crouzon ＝ class III malocclusion**（中臉發育不全 → 下顎相對前突）。題目寫 class I 即錯。\n其餘特徵：只侵犯顏面與顱骨（四肢軀幹正常）、眼球突出源自眶深不足、眼距過寬通常**輕微**、鼻短、多為短頭但可見各種頭形甚至三葉草頭。", "peropt": {"A": "✓ 僅侵犯顏面與顱骨（此為 Crouzon 與 Apert 的分界）。", "B": "◎ （錯誤）：應為 class **III** malocclusion。", "C": "✓ 眼距過寬通常輕微。", "D": "✓ 鼻短。", "E": "✓ 多為短頭，亦可見舟狀頭、斜頭、三葉草頭。"}, "cite": "NG109 · NG109-B08-Q09", "conflict": ""}, {"id": "3136", "sub": "CRF", "src": "NG", "years": [109, 112, 113, 114], "stem": "下列何種syndrome是用來描述Idiopathic progressive hemifacial atrophy (PHA)？", "opts": {"A": "Apert syndrome", "B": "Down's syndrome", "C": "Compartment syndrome", "D": "Klippel-Trenaunay syndrome", "E": "Parry–Romberg syndrome"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "與 CN3003 同題（GS 與 NG 各出一次，共跨五個年度）。PHA＝Parry–Romberg。此題答案穩定，屬送分題。", "peropt": {"A": "Apert＝顱縫早閉＋併指。", "B": "Down's＝21 三體。", "C": "Compartment syndrome 為純誘答。", "D": "Klippel–Trenaunay＝血管畸形＋肢體肥大。", "E": "◎ 。"}, "cite": "NG109 · NG109-B09-Q04", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG113-B09-Q01） ｜ ⚠ 同題歷屆重出（Idiopathic progressive hemifacial atrophy PHA對應之syndrome）：正解恆為Parry–Romberg syndrome；109/112/114年(3136)與113年(3177)答案皆E。干擾選項略有替換(Compartment syndrome ↔ Van der Woude syndrome等)，但正解位置與內容一致。"}, {"id": "3137", "sub": "CRF", "src": "NG", "years": [109, 111, 113, 114], "stem": "以下何者是craniofacial cleft的環境影響因素？(複選)", "opts": {"A": "輻射暴露", "B": "感染", "C": "藥物", "D": "化學物質暴露", "E": "妊娠時代謝相關的異常"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "顱顏裂的環境致病因子涵蓋**輻射、感染、藥物、化學物質、母體代謝異常**五大類——凡列出這五者，答案通常是全選。四年考四次。", "peropt": {"A": "◎ 輻射暴露。", "B": "◎ 感染（如 TORCH）。", "C": "◎ 藥物（如抗癲癇藥、類固醇、retinoid）。", "D": "◎ 化學物質暴露。", "E": "◎ 妊娠期代謝異常（如糖尿病、葉酸缺乏）。"}, "cite": "NG109 · NG109-B09-Q05", "conflict": ""}, {"id": "3138", "sub": "CRF", "src": "NG", "years": [109, 111, 113, 114], "stem": "下列congenital malformations of the head and neck何者發生率(incidence)最高？", "opts": {"A": "Craniofacial microsomia", "B": "Cleft lip and palate", "C": "Hemifacial atrophy", "D": "Craniofacial cleft", "E": "Treacher Collins syndrome"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "頭頸部先天畸形發生率排序：**唇顎裂遠居第一**（約 1/700 活產），其餘皆數量級較低（CFM 約 1/5,600、TCS 約 1/50,000）。", "peropt": {"A": "CFM 約 1/5,600，第二常見。", "B": "◎ ：唇顎裂約 1/700。", "C": "Hemifacial atrophy 罕見。", "D": "Craniofacial cleft 罕見（約 1/100,000）。", "E": "Treacher Collins 約 1/50,000。"}, "cite": "NG109 · NG109-B09-Q07", "conflict": "⚠ 同題歷屆重出（頭頸部先天畸形congenital malformations何者發生率最高）：正解恆為Cleft lip and palate；109/111/114年(3138)與113年(3178)答案皆B，僅干擾選項順序不同。"}, {"id": "3140", "sub": "CRF", "src": "NG", "years": [109, 111, 112, 113, 114], "stem": "關於Treacher Collins syndrome的描述何者錯誤？", "opts": {"A": "新生兒需注意呼吸道的問題", "B": "顴骨區域的重建可以選擇頭骨graft、dermis-fat graft、alloplastic material", "C": "Colobomas常發生在下眼瞼造成全層的缺損", "D": "重建microtia的時機為4歲以前", "E": "為autosomal dominant disorder，60%是偶發性突變(sporadic mutations)"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "Treacher Collins 的手術時序：**軟組織（coloboma、macrostomia）先於骨性重建；小耳重建約 9–10 歲**（待肋軟骨足量、耳廓近成人大小）。「4 歲以前」明顯過早。\n⚠ 本題與 CN3058 為選項重排家族：同樣五個選項、字母對應不同。記概念，別背 D。", "peropt": {"A": "✓ 新生兒首要處理呼吸道。", "B": "✓ 顴骨重建可用顱骨移植、真皮脂肪移植或人工植入物。", "C": "✓ 下眼瞼全層 coloboma 為特徵。", "D": "◎ （錯誤）：microtia(小耳)重建時機約 9–10 歲（待肋軟骨量足、耳廓近成人大小約 85% 者），非 4 歲以前。", "E": "✓ 體染色體顯性，60% 偶發突變。"}, "cite": "NG109 · NG109-B09-Q10", "conflict": "選項重排家族：與 NG113-B09-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ｜ ⚠ 同題歷屆重出（Treacher Collins syndrome敘述何者錯誤，中文）：錯誤敘述恆為D「重建microtia的時機為4歲以前」(正解：自體肋軟骨耳廓重建約6–10歲、待肋軟骨量與胸廓發育足夠)；109/111/112/114年(3140)與113年(3179)答案皆D，僅選項重排(其餘呼吸道、顴骨重建材料、下眼瞼coloboma、AD/60%sporadic皆為正確敘述)。"}, {"id": "3143", "sub": "CRF", "src": "NG", "years": [110, 111, 114], "stem": "有關於嘴唇的重建，下列那些敘述是正確的？", "opts": {"A": "上唇缺損35% 可以direct repair.", "B": "The most important goal of lip reconstruction is appearance.", "C": "Bilateral Gillies fan flaps 以及 Karapandzic flap 可用來重建嘴唇缺損比例達80%的defect", "D": "重建total或near-total lip defect會需要用到free tissue transfer technique,而最常使用的free flap為Radial forearm free flap", "E": "使用Abbe flap來重建嘴唇時,可以於術後14-21天安排flap division procedure"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 唇重建重點（複選選「正確」）：雙側Gillies扇形瓣與Karapandzic瓣可重建達80%之唇缺損；全/近全唇缺損需游離組織移植，最常用者為橈側前臂游離皮瓣（radial forearm free flap）；Abbe瓣可於術後約14–21天行斷蒂（flap division）。⚠ 易混淆：A「上唇缺損35%可直接修補」為錯（上唇上限約25%）；B「重建最重要目標是外觀」為錯——最重要目標是「功能」（口腔閉合能力），外觀次之。", "peropt": {"A": "✗ 上唇直接(楔形)修補上限約 25%(1/4)；下唇約可到 33%(1/3)。稱 35% 可直接修補為錯（超過上唇 25% 上限）。", "B": "✗ 唇重建最重要目標為功能而非外觀，敘述錯誤。", "C": "◎ 雙側Gillies扇形瓣與Karapandzic瓣可重建達80%缺損。", "D": "◎ 全/近全唇缺損需游離皮瓣，最常用為橈側前臂游離皮瓣。", "E": "◎ Abbe瓣可於術後14–21天斷蒂。"}, "cite": "待複查（NG 唇重建 記憶佐證）", "conflict": ""}, {"id": "3147", "sub": "CRF", "src": "NG", "years": [110, 112, 114], "stem": "最常見的幼童顏面骨骨折為下列何者?", "opts": {"A": "Frontal", "B": "Orbital", "C": "Zygoma", "D": "Maxilla", "E": "Mandible"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "⚠ **跨版本事實變更**：舊版謂**下頜骨**為最常見小兒顏面骨折（CN3148 選項 C，20–50%）；**新版（NG110/112/114）改為眶骨（orbital）最常見**。\n作答錨定該年答案；概念上記住『**新版＝眶骨**』。", "peropt": {"A": "✗ 額骨(frontal)骨折在幼童較少見。", "B": "◎ （新版）：眶骨最常見。", "C": "✗ 顴骨(zygoma)次於眶骨、非最常見。", "D": "✗ 上頜骨(maxilla)在幼童少見。", "E": "✗ 下頜骨(mandible)為舊版說法(約 20–50%，見 CN3148)；新版統計已改為眶骨最常見。"}, "cite": "NG110 · NG110-B08-Q06", "conflict": ""}, {"id": "3155", "sub": "CRF", "src": "NG", "years": [110, 112, 114], "stem": "Which of the following statement concerning Pierre Robin Sequence (PRS) is NOT correct？", "opts": {"A": "PRS is a clinical triad consisting of glossoptosis, retrognathia, airway compromise", "B": "Cleft palate is present in approximately 50% of cases", "C": "The work-up of PRS patients should begin with craniofacial deformities.", "D": "Infants with PRS may present with feeding difficulties and failure to thrive.", "E": "Respiratory distress can be managed with prone positioning"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "PRS 的處置順序永遠是 **呼吸道 → 餵食 → 顱顏**。此題與 CN3053 是「正解選項改寫家族」：兩年答案都是 C，但 C 的文字一年寫『從顱顏畸形開始』、另一年寫『從餵食困難開始』——**兩者都錯，因為都不是呼吸道**。這正是背字母會失效的鐵證。", "peropt": {"A": "✓ 三徵：glossoptosis、retrognathia、呼吸道受損。", "B":
