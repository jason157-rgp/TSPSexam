gan, Burn: Inhalation Injury (bronchoscopy, early airway protection)", "conflict": "⚠ 同題歷屆重出：Inhalation injury「敘述何者錯誤」單選題。104年(8028)答E、114/115年(8114)答E，考點一致（吸入性傷害之診斷指標與處置迷思），僅選項文字/排列微調，答案字母相同。"}, {"id": "8115", "sub": "SKB", "src": "NG", "years": [114], "stem": "關於燒傷病患發生一氧化碳（CO）中毒的相關敘述，下列哪些是正確的？(複選)", "opts": {"A": "CO與血紅素的結合力約為O2的40倍", "B": "給予FiO2 100% 的carboxyhemoglobin半衰期約1 hour", "C": "高壓氧治療可將carboxyhemoglobin半衰期降至23 minute", "D": "carboxyhemoglobin level > 25% 或有中樞神經症狀，可考慮進行高壓氧治療", "E": "孕婦或兒童病患carboxyhemoglobin level > 15% 建議接受高壓氧治療，避免delayed neurological sequelae"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：一氧化碳（CO）中毒的病理生理與高壓氧（HBO）適應症\n- 【機轉】CO與hemoglobin結合形成carboxyhemoglobin（COHb），使氧解離曲線左移、組織缺氧；並抑制cytochrome oxidase造成細胞窒息。\n- 【親和力】傳統教科書多引用CO對Hb親和力約為O2的200–250倍（此為主流數據），少數簡化教材以較低倍數表述。\n- 【COHb半衰期】室內空氣約4–5 hr；FiO2 100%（non-rebreather/insufflation）縮短至約1 hr；HBO（2.5–3 ATA）進一步降至約20–30 min（約23 min）。\n- 【HBO適應症】COHb>25%、任何CNS症狀（意識喪失、抽搐、局部神經學缺損）、心肌缺血、代謝性酸中毒；孕婦因胎兒Hb對CO親和力更高，門檻降至COHb>15–20%，兒童亦採較低門檻，目的在預防delayed neurological sequelae。", "peropt": {"A": "◎ CO與血紅素結合力遠高於O2（主流數據約200–250倍）；本題以40倍表述，依權威答案仍計為正確。", "B": "◎ FiO2 100%可將COHb半衰期由室內空氣的4–5小時縮短至約1小時。", "C": "◎ 高壓氧（約2.5–3 ATA）可將COHb半衰期進一步降至約20–30分鐘（23分鐘）。", "D": "◎ COHb>25%或出現中樞神經症狀為公認高壓氧治療適應症。", "E": "◎ 孕婦（胎兒Hb親和力更高）與兒童採較低門檻（>15%）以預防delayed neurological sequelae。"}, "cite": "Grabb & Smith 9e Burns / CO poisoning; Neligan 5e Vol.4 Burn。⚠答案疑義：A選項稱結合力「約40倍」與主流文獻200–250倍不符，惟依權威答案ABDCE全對，A維持◎。", "conflict": ""}, {"id": "8116", "sub": "SKB", "src": "NG", "years": [114], "stem": "關於燒傷後異位骨化（Heterotopic Ossification, HO）的敘述，下列哪些為正確？(複選)", "opts": {"A": "異位骨化最常見於膝關節，並常導致股神經受壓。", "B": "延遲植皮與長時間傷口癒合延遲是 HO 的危險因子。", "C": "手術應等待 HO 成熟後進行，其判斷標準包括影像上骨塊不再增大與疼痛減輕。", "D": "手術時應早期辨認並保護 ulnar nerve，必要時進行前方轉位（anterior transposition）。", "E": "HO 的術後應延遲關節活動，至少 2 週內避免任何主動或被動運動以促進癒合。"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：燒傷後異位骨化（Heterotopic Ossification, HO）的好發部位、危險因子與手術時機\n- 【好發部位】燒傷HO最常見於肘關節（elbow），尤其後內側，最易壓迫ulnar nerve（非膝關節、非股神經）。\n- 【危險因子】TBSA大、機械通氣時間長、癒合延遲、延遲植皮、長期臥床與被動運動不足、重複創傷。\n- 【手術時機】以往主張待HO成熟（骨代謝穩定）再手術；現代觀念傾向在關節功能受限即可介入，但仍以影像上骨塊停止增大、疼痛減輕、局部發炎消退為佐證。\n- 【術中要點】早期辨識並保護ulnar nerve，必要時行anterior transposition。\n- 【術後復健】應早期開始主動/被動關節活動以維持活動度，而非固定不動。", "peropt": {"A": "✗ HO最常見於肘關節並壓迫ulnar nerve，而非膝關節壓迫股神經，敘述錯誤。", "B": "◎ 延遲植皮與長時間傷口癒合延遲確為HO的重要危險因子。", "C": "◎ 手術傳統上待HO成熟，判斷含影像骨塊不再增大與疼痛減輕。", "D": "◎ 肘部HO手術須早期辨識並保護ulnar nerve，必要時行前方轉位。", "E": "✗ 術後應早期進行關節活動維持活動度，長期固定反而加重僵硬，敘述錯誤。"}, "cite": "Grabb & Smith 9e Burn reconstruction; Neligan 5e Vol.4 Burn HO。", "conflict": ""}, {"id": "8117", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "關於臉部深度燒傷的處理，下列何者正確？", "opts": {"A": "避免早期切除以保留殘餘皮膚", "B": "僅於感染發生時進行切除", "C": "確定為全層燒傷後，應於一週內切除與重建", "D": "僅限於美容目的考慮重建", "E": "應以真皮替代物優先處理"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：臉部深度（全層）燒傷的早期切除與重建原則\n- 【核心原則】確認為全層（full-thickness）燒傷後，應早期（約傷後一週內）進行切除並重建，避免長期焦痂造成感染、發炎延長與更嚴重疤痕攣縮。\n- 【重建首選】臉部以full-thickness skin graft（FTSG）為佳，色澤、質地與輪廓匹配較好；依aesthetic unit原則進行。\n- 【非全層時】淺二度、混合深度可先保守觀察待自行上皮化。\n- 【真皮替代物】非臉部深度燒傷的優先選項，應以自體移植與皮瓣為主。", "peropt": {"A": "✗ 全層臉部燒傷延遲切除會延長發炎、加重疤痕，應早期切除，錯誤。", "B": "✗ 不應僅在感染時才切除，確診全層即應及早處理，錯誤。", "C": "◎ 確定為全層燒傷後應於一週內切除與重建，為正確處置。", "D": "✗ 臉部重建兼顧功能與外觀，非僅美容目的，錯誤。", "E": "✗ 真皮替代物非臉部深度燒傷之優先選項，錯誤。"}, "cite": "Neligan 5e Vol.4 Facial burn; Grabb & Smith 9e Burns。", "conflict": ""}, {"id": "8118", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "哪一個年齡區間的兒童最容易因探索行為而發生燙傷？", "opts": {"A": "<6 個月", "B": "6–12 個月", "C": "12–15 個月", "D": "15–24 個月", "E": ">5 歲"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：兒童燙傷（scald）的年齡分布與機轉\n- 【好發年齡】15–24個月（toddler）因開始站立、行走與探索，會拉扯桌布、抓取熱飲熱鍋，最易發生潑濺／傾倒型燙傷。\n- 【機轉】此年齡活動力增加但危險意識不足，熱液燙傷為此族群最常見機轉。\n- 【鑑別】不符合發展年齡或呈手套襪套狀、對稱浸泡型分布者，需警覺非意外傷害（NAT/child abuse）。", "peropt": {"A": "✗ <6個月尚無探索移動能力，非好發族群，錯誤。", "B": "✗ 6–12個月活動探索仍受限，非最高風險，錯誤。", "C": "✗ 12–15個月風險上升但非最高峰，錯誤。", "D": "◎ 15–24個月幼童行走探索、拉扯熱液，最易因探索行為燙傷。", "E": "✗ >5歲已具危險意識，燙傷機率下降，錯誤。"}, "cite": "Neligan 5e Vol.4 Pediatric burn epidemiology。", "conflict": ""}, {"id": "8119", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "一名3歲男童因熱水燙傷就醫，受傷面積估計為15% TBSA，主要分佈於前胸、腹部與右大腿前側，為中深度至全層燒傷。經初步處置後，準備進行液體復甦。關於兒童燒傷病患的液體復甦處置，下列敘述何者正確？", "opts": {"A": "Parkland公式可直接套用成人公式，每公斤體重給予4 mL × TBSA的乳酸林格液，首8小時給予一半，後8小時給予另一半", "B": "維持尿量為每小時1 mL/kg為復甦的主要目標", "C": "對3歲以下兒童，液體復甦中不需要額外的葡萄糖補充", "D": "評估灌流狀況以血壓為最敏感指標", "E": "液體復甦首選輸注液為生理食鹽水"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：兒童燒傷液體復甦的特殊考量\n- 【尿量目標】兒童復甦以尿量約1 mL/kg/hr為主要終點（成人約0.5 mL/kg/hr）。\n- 【首選輸液】乳酸林格液（Lactated Ringer's），非生理食鹽水（避免高氯性酸中毒）。\n- 【葡萄糖】≤30 kg嬰幼兒肝醣儲備少，須以維持量額外補充含葡萄糖液體，防止低血糖。\n- 【公式調整】Parkland 4 mL×kg×%TBSA不可直接照搬成人，兒童須加上維持輸液（含糖）並依尿量、灌流頻繁調整。\n- 【灌流評估】兒童血壓可代償維持至晚期，血壓非敏感指標；應以尿量、心跳、末梢灌流、意識綜合判斷。", "peropt": {"A": "✗ 兒童不可直接套用成人Parkland，需額外加維持輸液（含糖），敘述錯誤。", "B": "◎ 兒童復甦主要目標為尿量約1 mL/kg/hr，正確。", "C": "✗ ≤3歲嬰幼兒肝醣儲備少，須額外補充葡萄糖，敘述錯誤。", "D": "✗ 兒童血壓代償力強、非敏感灌流指標，錯誤。", "E": "✗ 兒童燒傷首選輸液為乳酸林格液而非生理食鹽水，錯誤。"}, "cite": "Neligan 5e Vol.4 Pediatric burn resuscitation; Grabb & Smith 9e Burns。", "conflict": ""}, {"id": "8120", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "一名28歲女性因屋內火災導致臉部與頸部燒傷，臨床評估為深二度與三度混合型燒傷，伴有呼吸道燒傷的疑慮。處置後進入恢復期，準備進行重建與疤痕控制治療。關於頭頸部燒傷處理，下列何者正確？", "opts": {"A": "Early facial burn excision is contraindicated due to high vascularity and risk of bleeding.", "B": "Skin grafts on the neck should follow straight lateral line to match the natural skin tension lines.", "C": "Full-thickness grafts are preferred for facial burns due to better color and contour match.", "D": "Airway management in suspected inhalation injury should be delayed until definitive signs of obstruction are present.", "E": "Split-thickness skin grafts are contraindicated in head and neck burns due to high risk of contracture."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：頭頸部燒傷的急性處置與植皮選擇\n- 【氣道優先】疑似吸入性傷害（顏面燒傷、鼻毛焦黑、聲音沙啞、carbonaceous sputum）應早期插管，因水腫進展快，不可等到明顯阻塞才處置。\n- 【早期切除】臉部早期切除並非禁忌，可減少焦痂相關併發症。\n- 【臉部植皮】以FTSG為佳，色澤與輪廓匹配優，依美學單位施行。\n- 【頸部植皮】接縫應避免直線橫越（尤其側頸直線），以減少攣縮；STSG可用於頸部，非禁忌。", "peropt": {"A": "✗ 臉部早期切除並非禁忌，反而有助減少焦痂併發症，錯誤。", "B": "✗ 頸部植皮應避免沿直線側緣，直線易致攣縮，錯誤。", "C": "◎ 臉部燒傷以全層皮膚移植為佳，色澤與輪廓匹配較優，正確。", "D": "✗ 疑似吸入性傷害應早期插管，不可延遲至明顯阻塞，錯誤。", "E": "✗ STSG於頭頸燒傷非禁忌，仍常使用，錯誤。"}, "cite": "Neligan 5e Vol.4 Head & neck burn; Grabb & Smith 9e Burns。", "conflict": ""}, {"id": "8121", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "一名42歲男性因工業火災造成臉部與頸部全層燒傷，急性期接受清創與植皮。六個月後患者出現明顯頸部攣縮，限制頸部伸展與下顎活動，且外觀畸形嚴重影響社交功能。計畫進行重建手術。下列關於頭頸部燒傷後重建的敘述，何者正確？", "opts": {"A": "Skin grafts alone are generally sufficient for severe neck contractures.", "B": "Supraclavicular artery flap is a reliable option for anterior neck reconstruction due to its thin and pliable nature.", "C": "Free flaps are contraindicated in post-burn neck reconstruction due to lack of suitable recipient vessels.", "D": "Contracture release should be delayed until at least two years post-injury to ensure scar maturation.", "E": "Z-plasty is the first-line technique for reconstruction of extensive cervical contractures."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：頭頸部燒傷後頸部攣縮的重建策略\n- 【嚴重攣縮】單純植皮易再攣縮，嚴重全層頸部攣縮需薄且柔軟之皮瓣覆蓋。\n- 【Supraclavicular artery flap】以supraclavicular artery（源自transverse cervical artery）為蒂，薄、柔軟、色澤匹配佳，為前頸重建可靠選擇。\n- 【游離皮瓣】頸部有充足受區血管（如facial、superior thyroid、transverse cervical），游離皮瓣（如ALT）並非禁忌。\n- 【手術時機】功能性攣縮（限制伸展、影響進食/呼吸）應儘早鬆解，不必硬性等待2年疤痕成熟。\n- 【Z-plasty】適用於線狀（band-like）攣縮，不適合大面積廣泛頸部攣縮。", "peropt": {"A": "✗ 嚴重頸部攣縮單純植皮不足、易再攣縮，錯誤。", "B": "◎ 鎖骨上動脈皮瓣薄且柔軟，為前頸重建可靠選項，正確。", "C": "✗ 頸部有充足受區血管，游離皮瓣並非禁忌，錯誤。", "D": "✗ 功能受限之攣縮應儘早鬆解，不必硬性延至兩年，錯誤。", "E": "✗ Z-plasty適用線狀攣縮，非廣泛頸部攣縮之首選，錯誤。"}, "cite": "Neligan 5e Vol.4 Burn neck reconstruction; Grabb & Smith 9e Head & neck reconstruction。", "conflict": ""}, {"id": "8122", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "以下哪些因素與燒傷後疤痕惡化有關？(複選)", "opts": {"A": "癒合時間超過 21 天", "B": "男性患者", "C": "白人種族", "D": "僅接受保守治療的全層燒傷", "E": "早期使用輔助性疤痕管理方法（如壓力治療、矽膠片）"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：燒傷後病理性疤痕（hypertrophic scar）惡化的危險因子\n- 【癒合時間】癒合時間>21天為公認最強的肥厚性疤痕危險因子（延長發炎期）。\n- 【傷口深度／處置】全層燒傷若僅保守治療、延遲癒合，疤痕惡化風險升高。\n- 【膚色】深色皮膚（darker skin）為公認高風險，白種／淺膚色風險較低。\n- 【部位】頸部、上肢等張力／活動大部位風險高。\n- 【保護因子】早期壓力治療、矽膠片為疤痕預防，屬保護而非惡化因子。", "peropt": {"A": "◎ 癒合時間超過21天為最重要的肥厚性疤痕危險因子，正確。", "B": "◎ 權威答案將男性計為危險因子（性別關聯文獻分歧），標為正確。", "C": "✗ 白人／淺膚色屬較低風險，深色皮膚才是危險因子，錯誤。", "D": "◎ 全層燒傷僅保守治療致延遲癒合，疤痕惡化風險升高，正確。", "E": "✗ 早期壓力治療、矽膠片為疤痕保護／預防措施，非惡化因子，錯誤。"}, "cite": "Neligan 5e Vol.1 Wound healing / scar; Grabb & Smith 9e Burns。⚠答案疑義：多數文獻列深色皮膚、女性、年輕為肥厚性疤痕危險因子，本題以「男性(B)」為正解、且未選深膚色(C)，與主流略有出入，惟依權威答案ABD維持。", "conflict": ""}, {"id": "8123", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "關於兒童燒傷之輸液給予，下列何者正確? (複選)", "opts": {"A": "As concern about under-resuscitation mounted, there was a shift toward formulae with higher starting volumes.", "B": "The most recognized endpoint and mainstay of resuscitation is hourly urine output, specifically 1 mL/kg in children and 0.5 mL/kg in adults.", "C": "For infants and young children ≤30 kg, additional glucose in resuscitation fluid is provided at a maintenance rate to account for reduced glycogen storage.", "D": "The goal of fluid resuscitation is to maintain circulating volume and end-organ perfusion.", "E": "This initial fluid rate is a starting point for the resuscitation, and frequent adjustments are usually not expected and necessary."}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：兒童燒傷復甦公式演進與復甦終點（英文題幹）\n- 【趨勢】現代因fluid creep（過度復甦）之顧慮，趨勢是降低起始輸液量並嚴密調整，而非提高起始量。\n- 【復甦終點】以每小時尿量為主要指標：兒童約1 mL/kg、成人約0.5 mL/kg。\n- 【葡萄糖】≤30 kg嬰幼兒肝醣儲備有限，需以維持速率額外補充葡萄糖防低血糖。\n- 【目標】維持循環容積與末梢器官灌流。\n- 【動態調整】起始速率僅為起點，需頻繁依尿量、灌流調整（故稱「不需頻繁調整」為錯）。", "peropt": {"A": "✗ 現代因過度復甦顧慮，趨勢是降低而非提高起始輸液量，錯誤。", "B": "◎ 尿量為主要復甦終點：兒童1 mL/kg、成人0.5 mL/kg，正確。", "C": "◎ ≤30 kg嬰幼兒需以維持速率額外補充葡萄糖，正確。", "D": "◎ 復甦目標為維持循環容積與末梢器官灌流，正確。", "E": "✗ 起始速率僅為起點，須頻繁調整，「不需調整」敘述錯誤。"}, "cite": "Neligan 5e Vol.4 Burn resuscitation; ABA guidelines。", "conflict": ""}, {"id": "8124", "sub": "SKB", "src": "NG", "years": [114, 115], "stem": "關於頭頸部燒傷，何者正確? (複選)", "opts": {"A": "In periocular burn injury, spared crow’s feet area can predict an uninjured cornea to a high degree of accuracy.", "B": "In mixed-depth facial burns, excision should be performed to a uniform depth to prevent complications such as inclusion cysts, pits, and folliculitis caused by retained skin appendages", "C": "Ear burns can be managed by allowing an eschar to form and separate naturally, as excision is often not suitable for this architecturally complex structure.", "D": "When performing a skin graft for a neck burn, care must be taken to avoid a straight line on the lateral aspect to prevent future scar contracture.", "E": "The scalp has a rich supply of blood vessels and hair follicles facilitating healing and re-epithelialization, making therapy essentially conservative."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：頭頸部各解剖區燒傷的處置細節（英文題幹）\n- 【眼周】保留的魚尾紋區（crow's feet）代表閉眼瞬間受保護，可高度預測角膜未受傷。\n- 【混合深度臉部】應切除至一致深度，避免殘留皮膚附屬器造成inclusion cyst、pit、毛囊炎。\n- 【耳部】結構複雜、軟骨易外露，常任焦痂自然形成分離，切除多不適合。\n- 【頸部植皮】須避免側緣直線，以防日後疤痕攣縮。\n- 【頭皮】血流與毛囊豐富，利於癒合與再上皮化，多採保守治療。", "peropt": {"A": "◎ 保留的魚尾紋區可高度預測角膜未受傷，正確。", "B": "◎ 混合深度臉部應切除至一致深度以防殘留附屬器致囊腫、毛囊炎，正確。", "C": "◎ 耳部結構複雜，常任焦痂自然分離，切除多不適合，正確。", "D": "◎ 頸部植皮須避免側緣直線以防攣縮，正確。", "E": "◎ 頭皮血管與毛囊豐富利於癒合，多採保守治療，正確。"}, "cite": "Neligan 5e Vol.4 Head & neck burn management。", "conflict": ""}, {"id": "8125", "sub": "SKB", "src": "NG", "years": [115], "stem": "對於疑似 melanoma 的色素性病灶，若解剖位置允許，初始診斷性切片較建議採用下列何者？", "opts": {"A": "shave biopsy 並盡量避免取到真皮層", "B": "冷凍治療後觀察", "C": "excisional biopsy，包含約 1-2 mm 正常外觀皮膚邊界", "D": "直接 wide excision 5 cm margin", "E": "僅抽血測 LDH 作為診斷依據"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：疑似黑色素瘤（melanoma）色素病灶的診斷性切片\n- 【首選】解剖位置允許時，採excisional biopsy並含約1–2 mm正常外觀邊界，全層達皮下脂肪，以取得完整Breslow depth（腫瘤厚度）供分期。\n- 【避免shave】淺層削切片可能低估厚度、影響分期與後續margin決策。\n- 【避免破壞】不可先做冷凍或只驗LDH替代組織診斷。\n- 【特殊部位】臉部、肢端、甲下等無法完整切除時，可行全層incisional/punch biopsy取最厚處。", "peropt": {"A": "✗ 削片易低估Breslow厚度、影響分期，非疑似黑色素瘤首選，錯誤。", "B": "✗ 冷凍治療會破壞病灶無法組織診斷，錯誤。", "C": "◎ 切除性切片含1–2 mm正常邊界、達全層，可完整評估厚度，為首選，正確。", "D": "✗ 初始診斷不應直接做5 cm廣泛切除，過度且未確診，錯誤。", "E": "✗ LDH無法作為組織診斷依據，錯誤。"}, "cite": "Neligan 5e Vol.1 Melanoma; NCCN Melanoma guidelines。", "conflict": ""}, {"id": "8126", "sub": "SKB", "src": "NG", "years": [115], "stem": "關於 melanoma 的 wide local excision margin，下列何者最符合一般原則？", "opts": {"A": "melanoma in situ 通常約 0.5-1 cm margin", "B": "Breslow depth 0.8 mm 一律需 3 cm margin", "C": "所有 invasive melanoma 均需 amputation", "D": "excision margin 與 Breslow depth 無關", "E": "melanoma in situ 標準 margin 為 2 cm"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：黑色素瘤廣泛局部切除（WLE）之安全邊界原則\n- 【依Breslow depth決定margin】\n  - Melanoma in situ：約0.5–1 cm。\n  - ≤1.0 mm：1 cm。\n  - 1.01–2 mm：1–2 cm。\n  - >2 mm：2 cm。\n- 【重點】margin隨腫瘤厚度增加而擴大，並非固定或與厚度無關。\n- 【現代觀念】薄病灶不再使用過寬邊界；不因黑色素瘤即行截肢。", "peropt": {"A": "◎ 黑色素瘤原位癌(melanoma in situ)約0.5–1 cm邊界，符合原則，正確。", "B": "✗ Breslow 0.8 mm屬薄病灶(≤1.0 mm)應為1 cm margin(非3 cm)；3 cm邊界並非任何厚度之標準值，錯誤。", "C": "✗ 侵襲性黑色素瘤以wide local excision為主，並非所有均需截肢(amputation)，錯誤。", "D": "✗ 切除邊界正是依Breslow厚度分級決定(MIS 0.5–1 cm；≤1 mm→1 cm；1.01–2 mm→1–2 cm；>2 mm→2 cm)，非與厚度無關，錯誤。", "E": "✗ 原位癌標準邊界應為0.5–1 cm(非2 cm)，錯誤。"}, "cite": "NCCN Melanoma; Neligan 5e Vol.1 Melanoma margins。", "conflict": ""}, {"id": "8127", "sub": "SKB", "src": "NG", "years": [115], "stem": "關於 melanoma 的處置與預後因子，下列哪些敘述正確？(複選)", "opts": {"A": "wide excision margin 主要依 Breslow depth 決定", "B": "sentinel lymph node biopsy 可考慮用於厚度 >1 mm 或薄但具高風險特徵的 melanoma", "C": "serum LDH 在 metastatic melanoma 病人並不具有預後意義", "D": "elective lymph node dissection 已是所有 clinically node-negative melanoma 的標準治療", "E": "melanoma in situ 一律需要 2 cm margin"}, "ans": "AB", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：黑色素瘤的處置與預後因子\n- 【WLE margin】主要依Breslow depth（腫瘤厚度）決定。\n- 【SLNB】適用厚度>1 mm，或薄病灶（0.8–1 mm）合併高風險特徵（潰瘍、高mitotic rate）者。\n- 【LDH】血清LDH在metastatic（M1）黑色素瘤具預後意義，為AJCC M分期依據，故「不具預後意義」為錯。\n- 【ELND】選擇性淋巴結廓清已被SLNB取代，非所有臨床淋巴結陰性者之標準。\n- 【MIS margin】原位癌約0.5–1 cm，非一律2 cm。", "peropt": {"A": "◎ 廣泛切除邊界(WLE margin)主要依Breslow厚度決定，正確。", "B": "◎ 前哨淋巴結切片(SLNB)可用於厚度>1 mm，或薄病灶(0.8–1 mm)合併高風險特徵(ulceration、高mitotic rate)者，正確。", "C": "✗ 血清LDH於轉移性(M1)黑色素瘤具預後意義，為AJCC M分期依據(M1c/M1d升高)，故『不具預後意義』敘述錯誤。", "D": "✗ 選擇性淋巴結廓清(ELND)已被SLNB取代，非所有臨床淋巴結陰性者之標準治療，錯誤。", "E": "✗ 原位癌邊界應為0.5–1 cm(非一律2 cm)，錯誤。"}, "cite": "NCCN Melanoma; AJCC 8th; Neligan 5e Vol.1 Melanoma。", "conflict": ""}, {"id": "8128", "sub": "SKB", "src": "NG", "years": [115], "stem": "一名 6 歲男童因**巨大先天性色素痣（giant congenital melanocytic nevus）**覆蓋右側臉部及頸部，跨越多個 aesthetic units，並延伸至下眼瞼周圍。家屬希望在兼顧美觀與功能的前提下，盡可能降低殘留病灶與後續惡性變化追蹤困難的問題。根據本文內容，下列哪些治療策略是合理的？（複選）", "opts": {"A": "以雷射治療為主，可完全清除深部 nevus cells，且不影響後續惡性變化監測", "B": "Serial excision 適合部分中小型病灶，但靠近下眼瞼時需注意長期組織短缺與變形", "C": "若無法直接切除縫合，tissue expansion 是中大型 congenital nevus 的主要重建方式", "D": "臉部跨越多個 aesthetic units 且涉及眼周時，可考慮 tissue expansion 合併 full-thickness skin graft", "E": "軀幹部位採 split-thickness skin graft 通常可獲得最佳長期外觀與功能結果"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：巨大先天性色素痣（giant CMN）的重建策略與惡性追蹤\n- 【惡性風險】giant CMN終生黑色素瘤風險升高，須兼顧完整切除與後續監測，殘留深部nevus cells不利追蹤。\n- 【雷射】僅淡化表淺色素，無法清除深層nevus cells，且色素改變干擾後續惡性變化監測，非理想。\n- 【Serial excision】適合中小型病灶；靠近下眼瞼須注意長期組織短缺與眼瞼外翻／變形。\n- 【Tissue expansion】中大型病灶主要重建方式，提供色澤質地匹配之鄰近組織。\n- 【臉部跨美學單位＋眼周】可組織擴張合併全層皮膚移植（FTSG）。\n- 【軀幹STSG】長期外觀與功能不佳（攣縮、色差），非最佳選擇。", "peropt": {"A": "✗ 雷射僅淡化表淺色素，無法清除深層nevus cells，且色素改變會干擾後續惡性變化(黑色素瘤)監測，非理想，錯誤。", "B": "◎ 序列切除(serial excision)適合中小型病灶；近下眼瞼須注意長期組織短缺與眼瞼外翻／變形(ectropion)，正確。", "C": "◎ 組織擴張(tissue expansion)為中大型先天痣的主要重建方式，提供色澤質地相配之鄰近組織，正確。", "D": "◎ 臉部跨多個美學單位且涉眼周，可組織擴張合併全層皮膚移植(FTSG)，正確。", "E": "✗ 軀幹分層皮膚移植(STSG)長期外觀與功能不佳(攣縮、色差)，非最佳選擇；宜考慮擴張或全層植皮，錯誤。"}, "cite": "Neligan 5e Vol.3 Congenital melanocytic nevus; Grabb & Smith 9e Pediatric plastic surgery。", "conflict": ""}, {"id": "8129", "sub": "SKB", "src": "NG", "years": [115], "stem": "一名 2 個月大女嬰，左上眼瞼有一個快速增大的鮮紅色腫塊，直徑約 2.5 cm，已部分遮蔽視軸。病灶出生時僅為淡紅色斑點，近 1 個月迅速增大。醫師診斷為 infantile hemangioma (IH)。根據本文內容，下列哪些敘述正確？（複選）", "opts": {"A": "此病灶正處於 proliferative phase，通常生長最快發生於出生後前幾個月", "B": "首選治療可考慮 intralesional triamcinolone 注射", "C": "Pulsed-dye laser 是治療增生期 IH 的標準第一線治療", "D": "若病灶超過 3–4 cm 或需大量類固醇注射，應考慮口服 propranolol", "E": "若病灶造成視軸阻擋，應持續觀察至 4 歲再決定是否治療"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：嬰兒血管瘤（Infantile Hemangioma, IH）的分期與治療\n- 【自然史】proliferative phase生長最快發生於出生後前幾個月（尤其前3–5個月）；隨後進入plateau與involution期。\n- 【問題型IH／首選】需治療者（阻擋視軸、氣道、潰瘍、快速增大）現代第一線為口服propranolol；病灶>3–4 cm或需大量類固醇時尤應選propranolol。\n- 【局部類固醇】intralesional triamcinolone可用於局限性小病灶（包含眼周），為傳統選項之一。\n- 【PDL】pulsed-dye laser主要用於潰瘍性IH及消退期殘留微血管擴張／紅斑，非增生期bulky病灶的第一線。\n- 【眼周急迫性】阻擋視軸有弱視（amblyopia）風險，須及早治療，不可觀察至4歲。", "peropt": {"A": "◎ 病灶處於增生期(proliferative phase)，生長最快發生於出生後前幾個月(尤其前3–5個月)，正確。", "B": "◎ 局限性小病灶可考慮病灶內triamcinolone注射，依權威答案為正確。", "C": "✗ Pulsed-dye laser主要用於潰瘍性IH及消退期(involution)殘留微血管擴張／紅斑，非增生期bulky病灶之第一線(現代第一線為口服propranolol)，錯誤。", "D": "◎ 病灶>3–4 cm或需大量類固醇注射時應改口服propranolol，正確。", "E": "✗ 阻擋視軸者有弱視(amblyopia)風險，須及早治療，不可觀察至4歲(應把握視覺發育關鍵期，通常嬰兒早期即介入)，錯誤。"}, "cite": "Neligan 5e Vol.1 Vascular anomalies / Infantile hemangioma。⚠答案疑義：現代問題型IH（尤阻擋視軸）第一線多為口服propranolol，B之intralesional triamcinolone屬傳統／局限病灶選項，依權威答案ABD維持B為◎。", "conflict": ""}, {"id": "8130", "sub": "SKB", "src": "NG", "years": [115], "stem": "A 45-year-old male presents with a painless, deep subfascial mass measuring approximately 7 cm in his right thigh, which has been continuously growing. Imaging evaluation is highly suspicious for a soft-tissue sarcoma. As the reconstructive and oncologic surgeon planning the biopsy to obtain a definitive histopathologic diagnosis, which of the following surgical approaches aligns best with current established guidelines?", "opts": {"A": "Fine-needle aspiration (FNA) should be the first-line standard diagnostic tool.", "B": "Since the tumor is larger than 5 cm, an excisional biopsy should be performed directly by shelling out the tumor along with its pseudocapsule.", "C": "An incisional biopsy should be performed with a longitudinal incision parallel to the axis of the extremity, and it is strongly recommended to use a pressurized tourniquet (without exsanguination) to ensure a bloodless field and minimize tumor cell contamination.", "D": "To prevent postoperative hematoma, the incisional biopsy must routinely include a closed suction drain, with the exit site placed as far away from the primary incision as possible via a separate puncture to avoid interfering with primary wound healing."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：軟組織肉瘤（soft-tissue sarcoma）的切片原則（英文題幹）\n- 【切片方式】首選core needle biopsy或incisional biopsy；肢體切口須沿長軸縱行（longitudinal），使日後廣泛切除可完整切除切片路徑。\n- 【止血帶】可用加壓止血帶但不做驅血（without exsanguination），以獲無血視野並降低腫瘤細胞擴散。\n- 【FNA】細胞學無法可靠判定組織型與分級，非第一線標準。\n- 【禁excisional shelling】沿假包膜剝除會殘留微觀腫瘤（R1），為禁忌。\n- 【引流】若放引流，出口須與切口同軸且緊鄰，以便日後一併切除，非置於遠處。", "peropt": {"A": "✗ FNA(細胞學)無法可靠判定組織型(histologic subtype)與分級(grade)，非第一線標準；首選core needle biopsy或incisional biopsy，錯誤。", "B": "✗ 即使腫瘤>5 cm亦不可沿假包膜(pseudocapsule)剝除切除，會殘留微觀腫瘤(R1)；切片不應以excisional shelling進行，錯誤。", "C": "◎ 沿肢體長軸縱行(longitudinal)切開之incisional biopsy並用不驅血(without exsanguination)之加壓止血帶以獲無血視野並降低腫瘤細胞污染，符合指引，正確。", "D": "✗ 引流並非常規必須；若使用，出口須與切口同軸緊鄰(以便日後廣泛切除一併切除切片路徑)，非置於遠處另戳孔，錯誤。"}, "cite": "Neligan 5e Vol.1 Soft-tissue sarcoma; NCCN Soft Tissue Sarcoma。", "conflict": ""}, {"id": "8131", "sub": "SKB", "src": "NG", "years": [115], "stem": "A 52-year-old patient was urgently referred to your multidisciplinary sarcoma center after undergoing an excision of a suspected \"benign lipoma\" in the right lower leg at another facility three weeks ago. The previous operative report describes an \"easy shelling-out from a capsule\" through a horizontal incision. However, the final histopathologic report unexpectedly revealed a high-grade pleomorphic sarcoma. Regarding the subsequent management of this \"unplanned excision,\" which of the following clinical decisions is the most appropriate?", "opts": {"A": "Since the tumor was macroscopically \"shelled-out completely\" with its capsule, it can be clinically considered an R0 resection. The patient only requires close radiographic follow-up and adjuvant radiotherapy.", "B": "Shelling out a sarcoma from its pseudocapsule leaves microscopic residual tumor (R1 situation) with local recurrence rates up to 90%. A secondary wide excision must be performed, and the resection must include all previous horizontal skin incisions, stitch marks, and drain sites with an adequate margin of healthy tissue.", "C": "Because the previous surgery utilized a non-oncologic \"horizontal incision\" that inevitably contaminated multiple muscle compartments, the only remaining curative and salvage option for this patient is an immediate above-knee amputation.", "D": "To preserve remaining soft tissue and vessels for subsequent reconstruction, the previous surgical scar should be preserved. The tumor bed should simply be treated with minimally invasive electrocautery ablation followed by immediate free flap coverage."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯考點：非計畫性肉瘤切除（unplanned excision / whoops procedure）的後續處置（英文題幹）\n- 【R1本質】沿假包膜「剝除」肉瘤必留微觀殘留（R1），局部復發率可高達約90%。\n- 【再廣泛切除】須行二次wide re-excision，切除範圍須包含先前的皮膚切口、縫線孔、引流出口並帶足夠健康組織邊界。\n- 【非R0】肉眼完整剝除不等於R0，不可僅追蹤加放療。\n- 【非必然截肢】適當再切除多可保肢，非只剩截肢一途。\n- 【禁電燒消融】腫瘤床電燒消融加皮瓣覆蓋非腫瘤學治療，錯誤。", "peropt": {"A": "✗ 肉眼完整剝除(shelled-out)不等於R0；沿假包膜剝除實為R1，殘留微觀腫瘤，不可僅追蹤加放療，錯誤。", "B": "◎ 沿假包膜剝除留R1，局部復發率可達約90%，須二次wide re-excision並含先前橫向皮膚切口、縫線孔(stitch marks)、引流出口並帶足夠健康組織邊界，正確。", "C": "✗ 適當之二次廣泛切除(±放療)多可保肢，非只剩即刻above-knee amputation一途，錯誤。", "D": "✗ 腫瘤床電燒消融(electrocautery ablation)加皮瓣覆蓋非腫瘤學根治處置，無法達陰性邊界，錯誤。"}, "cite": "Neligan 5e Vol.1 Sarcoma / unplanned excision; NCCN STS。", "conflict": ""}, {"id": "8132", "sub": "SKB", "src": "NG", "years": [115], "stem": "Which of the following statements regarding different mechanisms of burn injury are correct? (複選)", "opts": {"A": "Flash burns usually result from brief exposure to a thermal energy pulse and commonly involve exposed skin rather than areas covered by clothing.", "B": "Scald burns are always easy to judge clinically at initial presentation because they immediately show clear structural skin changes", "C": "Strong alkali burns tend to penetrate more deeply than acid burns because they cause lipid saponification and liquefactive tissue injury.", "D": "In electrical injury, the visible skin wound reliably reflects the full extent of underlying tissue damage", "E": "Cement burns are caused in part by calcium oxide reacting with water to form calcium hydroxide, producing an alkali injury."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯考點：不同燒傷機轉的臨床特徵（英文題幹）\n- 【Flash burn】短暫熱能脈衝暴露，多傷及裸露皮膚，衣物遮蓋處相對受保護。\n- 【Scald】深度會隨時間演變，初期不易準確判定，非「立即呈現明確結構變化」。\n- 【鹼性 vs 酸性】強鹼造成脂質皂化與液化性壞死（liquefactive necrosis），穿透較酸（凝固性壞死）更深。\n- 【電傷】體表可見傷口常低估深層組織（肌肉、神經、血管）破壞，不可靠反映全貌。\n- 【水泥燒傷】氧化鈣（CaO）遇水生成氫氧化鈣（Ca(OH)2），屬鹼性傷害。", "peropt": {"A": "◎ 閃燃燒傷(flash burn)為短暫熱能脈衝暴露，多傷及裸露皮膚，衣物遮蓋處相對受保護，正確。", "B": "✗ 燙傷(scald)深度會隨時間演變(可進行性加深)，初期不易準確判定，非『立即呈現明確結構變化』，錯誤。", "C": "◎ 強鹼造成脂質皂化(saponification)與液化性壞死(liquefactive necrosis)，穿透較酸(凝固性壞死coagulative necrosis)更深，正確。", "D": "✗ 電傷(electrical injury)體表可見傷口常低估深層組織(肌肉、神經、血管)破壞，不可靠反映全貌，錯誤。", "E": "◎ 水泥燒傷因氧化鈣(CaO)遇水生成氫氧化鈣(Ca(OH)2)，屬鹼性(alkali)傷害，正確。"}, "cite": "Neligan 5e Vol.4 Burn mechanisms; Grabb & Smith 9e Chemical/electrical burns。", "conflict": ""}, {"id": "6004", "sub": "TRK", "src": "GS", "years": [111, 112, 113, 114, 115], "stem": "長期坐輪椅會導致下列部位的褥瘡，何者除外？", "opts": {"A": "肩胛骨(scapula)", "B": "坐骨(ischium)", "C": "後膝(posterior knee)", "D": "腳底(sole)", "E": "足跟(heel)"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考點：長期輪椅使用者之壓瘡好發部位（受壓點解剖）。\n\n1. 坐姿受力點：ischial tuberosity（坐骨，最典型）、scapula（靠背受壓）、posterior knee/popliteal（座墊前緣壓迫）、sole（腳底置於腳踏板受壓）。\n2. **Heel（足跟）** 為「仰臥」臥床病人之典型壓瘡點，並非坐輪椅的主要受力區，故為除外項。\n3. 對照：臥床好發 sacrum/heel/occiput；坐姿好發 ischium。", "peropt": {"A": "✗ Scapula(肩胛骨)為坐姿靠背受壓點，會發生壓瘡，非除外項。", "B": "✗ Ischium(坐骨結節)為坐姿最典型壓瘡好發點，非除外項。", "C": "✗ Posterior knee(膕窩)受座墊前緣壓迫可能受損，非除外項。", "D": "✗ Sole(腳底)置於腳踏板長期受壓可發生壓瘡，非除外項。", "E": "◎ Heel(足跟)為『仰臥臥床』病人之典型壓瘡點(與sacrum、occiput同屬臥位受壓區)，非輪椅坐姿受力區，故為除外項，正確。"}, "cite": "Grabb & Smith 9e, Pressure sores", "conflict": "⚠ 同題歷屆重出：長期坐輪椅褥瘡「何者除外」，兩題正解均為足跟(heel)。差異僅選項順序調換——6004(111/112/114/115)將heel置於E、故答案E；6007(113)將heel置於A、故答案A。核心考點完全相同，屬純選項重排(規則A)。合併後記憶點：坐輪椅壓瘡好發於肩胛/坐骨/後膝/腳底，heel為除外。"}, {"id": "6011", "sub": "TRK", "src": "GS", "years": [115], "stem": "常用來重建chest wall defect之locoregional flap及其所對應的供應血流來源，以下何者錯誤？", "opts": {"A": "Latissimus dorsi / Thoracodorsal vessels", "B": "Rectus abdominis / Superior and deep inferior epigastric vessels", "C": "Omentum / Left and right gastric vessels", "D": "External oblique / Perforators of lumber vessels", "E": "Serratus anterior / Lateral thoracic vessels"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考點：胸壁重建常用 locoregional flap 與其主要供應血管的正確配對。\n\n1. Latissimus dorsi → thoracodorsal vessels（正確）。\n2. Rectus abdominis → superior epigastric（帶蒂）及 deep inferior epigastric vessels（正確）。\n3. **Omentum → 由 right and left gastroepiploic vessels 供應（源自 gastroduodenal 與 splenic）**，而非「gastric vessels」，故 C 敘述錯誤。\n4. External oblique → 下位肋間及 lumbar perforators（正確）。\n5. Serratus anterior → lateral thoracic（及 thoracodorsal 分支）vessels（正確）。", "peropt": {"A": "✗（本題選錯者）Latissimus dorsi / thoracodorsal vessels，配對正確，故非答案。", "B": "✗（本題選錯者）Rectus abdominis / superior 與 deep inferior epigastric vessels，配對正確，故非答案。", "C": "◎ Omentum 應由 right/left gastroepiploic vessels(源自gastroduodenal與splenic a.)供應，非『gastric vessels』，故此配對錯誤，為答案。", "D": "✗（本題選錯者）External oblique / lumbar（及下位肋間）perforators，配對正確，故非答案。", "E": "✗（本題選錯者）Serratus anterior / lateral thoracic（及thoracodorsal分支）vessels，配對正確，故非答案。"}, "cite": "Grabb & Smith 9e, Chest wall flaps & vascular supply", "conflict": ""}, {"id": "6012", "sub": "TRK", "src": "GS", "years": [115], "stem": "以下何種縫合技巧有最高的腹部疝氣復發率？", "opts": {"A": "以雙側anterior components separation直接關閉fascia，並使用onlay porcine dermal mesh", "B": "使用retrorectus sutureless, self-adhering synthetic mesh，並直接關閉anterior及posterior rectus sheaths", "C": "使用onlay microporous midweight polypropylene mesh，並以fibrin glue固定", "D": "使用barrier-coated porcine dermal mesh為intraperitoneal underlay且各方向重疊4cm，並直接關閉fascia", "E": "使用cross-linked porcine dermal mesh用以bridge橫跨fascial edges的gap，並使用#0-PDS加固mesh至fascia上"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考點：腹壁疝氣修補中「橋接（bridging）vs 加強（reinforcement）」與 mesh 使用方式對復發率的影響。\n\n1. 核心原則：mesh 應作為「reinforcement（於已對合筋膜之上/下加強）」，而非「bridging（跨越無法對合的筋膜缺口）」。**Bridging repair 復發率最高**。\n2. 選項 E 使用 cross-linked porcine dermal mesh「bridge 橫跨 fascial edges 的 gap」——即典型橋接式修補，加上生物網膜於張力橋接下易鬆弛/膨出，復發率最高。\n3. 對照：A（components separation 達成筋膜對合 + onlay）、B（retrorectus/Rives-Stoppa，復發率最低族群之一）、C（onlay reinforcement）、D（IPOM underlay 重疊 4 cm 且筋膜對合）皆為「加強」而非橋接，復發率較低。", "peropt": {"A": "✗ 雙側components separation直接對合筋膜＋onlay mesh屬reinforcement加強式，復發率低，非本題答案。", "B": "✗ Retrorectus(Rives-Stoppa)並對合前後鞘，為復發率最低之術式之一，非本題答案。", "C": "✗ Onlay polypropylene加強且筋膜可對合，屬reinforcement，復發率相對低，非本題答案。", "D": "✗ Barrier-coated underlay(IPOM)重疊4 cm且對合筋膜，屬加強式，復發率低，非本題答案。", "E": "◎ Cross-linked porcine dermal mesh橋接跨越fascial gap(bridging)：無法對合筋膜、生物網膜在橋接張力下易鬆弛膨出，復發率最高，為答案。"}, "cite": "Neligan 5e, Abdominal wall reconstruction (bridging vs reinforcement)", "conflict": ""}, {"id": "6013", "sub": "TRK", "src": "GS", "years": [115], "stem": "一位52歲女性接受局部晚期直腸癌手術，行abdominoperineal resection (APR)合併後陰道壁切除，術前已接受neoadjuvant chemoradiation。依Cordeiro分類，此陰道缺損屬Type IB。下列何種重建方式最為適合？", "opts": {"A": "Pudendal thigh flap（Singapore flap）", "B": "Gluteal V-Y advancement flap", "C": "Vertical rectus abdominis myocutaneous (VRAM) flap", "D": "Superficial circumflex iliac artery perforator (SCIP) flap", "E": "Internal pudendal artery perforator flap"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考點：APR 合併後陰道壁切除、放療後之陰道缺損重建；Cordeiro 分類 Type IB 的皮瓣選擇。\n\n1. Cordeiro 陰道缺損分類：Type I = 部分缺損（partial）；其中 **IA = 前壁/側壁**，**IB = 後壁或環周下段**。Type II = 環周缺損（circumferential）。\n2. 後壁缺損（IB）伴放療後盆底、且有 APR 造成之會陰死腔，需**帶血供且能填補盆腔死腔的皮瓣 → VRAM (vertical rectus abdominis myocutaneous flap)** 最適合，可同時重建後陰道壁與填塞骨盆死腔。\n3. VRAM 以 deep inferior epigastric vessels 為蒂，經腹拉入會陰，為 APR 後盆底/陰道重建的主力皮瓣。", "peropt": {"A": "✗ Pudendal thigh(Singapore) flap較適合Type IA前/側壁淺層缺損；放療後會陰皮膚品質差且無法填塞盆腔死腔，非IB首選，錯誤。", "B": "✗ Gluteal V-Y advancement主要處理會陰皮膚缺損，非後陰道壁重建與盆腔死腔填塞，錯誤。", "C": "◎ VRAM flap(以deep inferior epigastric vessels為蒂)帶血供、可重建後陰道壁並填塞APR盆腔死腔，為Type IB最適選擇，正確。", "D": "✗ SCIP flap為薄型游離穿通枝皮瓣，體積不足以填塞盆腔死腔，錯誤。", "E": "✗ Internal pudendal artery perforator flap用於較局限之會陰／陰道缺損，放療後可靠度與體積不如VRAM，錯誤。"}, "cite": "Neligan 5e, Reconstruction of acquired vaginal defects (Cordeiro classification)", "conflict": ""}, {"id": "6049", "sub": "TRK", "src": "NG", "years": [109, 111, 114], "stem": "在變性手術中，Metaidoioplasty是什麼意思？", "opts": {"A": "男變女中的clitoris重建手術", "B": "男變女中的urethra的lengthening手術", "C": "女變男中用其他組織如radial forearm flap的phalloplasty手術", "D": "女變男中用clitoris及urethra lengthening的phalloplasty手術", "E": "女變男中用局部組織如pudendal thigh ;lap 的phalloplasty手術"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：變性（gender-affirming）手術術語——Metaidoioplasty 定義。\n\n- **Metaidoioplasty** 為 **female-to-male (FtM)** 陰莖成形術式之一。\n- 原理：長期雄性素（testosterone）治療使 **clitoris 肥大**，術中將肥大之 clitoris 釋放（分離 suspensory ligament、切開 chordee）作為 neophallus，並合併 **urethral lengthening（尿道延長）** 使能站立排尿。\n- 相對於 radial forearm flap 或 ALT 之 phalloplasty，metaidoioplasty 不需大範圍皮瓣、保留感覺與勃起能力，但 neophallus 較小、通常無法插入性交。\n- 故符合「女變男中用 clitoris 及 urethral lengthening 的 phalloplasty」，答案 D。", "peropt": {"A": "✗ 男變女之clitoroplasty與metaidoioplasty無關(方向與術式皆不同)，錯誤。", "B": "✗ 男變女之尿道延長非本術語所指，錯誤。", "C": "✗ 以radial forearm flap之phalloplasty屬另一種大範圍皮瓣陰莖成形術，非metaidoioplasty，錯誤。", "D": "◎ FtM(女變男)以雄性素刺激肥大之clitoris釋放加尿道延長(urethral lengthening)構成neophallus，即metaidoioplasty，正確。", "E": "✗ pudendal thigh flap之局部皮瓣phalloplasty非metaidoioplasty之定義，錯誤。"}, "cite": "Neligan 5e, Gender-affirming surgery / metoidioplasty", "conflict": "⚠ 同題歷屆重出：Metoidioplasty定義（女變男，利用賀爾蒙肥大之clitoris＋urethral lengthening行phalloplasty）。中英雙語版本：6049(109/111,中文,答案D)、6073(114,英文,答案D)。兩題選項語意逐一對應，僅語言翻譯(規則A)。答案一致無疑義。"}, {"id": "6066", "sub": "TRK", "src": "NG", "years": [114], "stem": "關於 Vaginal defects的敘述，下列何者錯誤？", "opts": {"A": "Type I 為 partial defect, Type II 為 circumferential defect", "B": "常見Type IA defect為colorectal carcinoma 術後", "C": "Type IB defect可使用pedicled rectus myocutaneous flap 重建", "D": "相較gracilis flap, type IIA defect 使用pedicled rectus myocutaneous flap較不會受到vulvar and pelvic floor musculature 阻礙", "E": "Type IIB defect 重建需注意 introitus (陰道口) distortion 和 dead space obliteration"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：陰道缺損 Cordeiro 分類（Type I = partial；Type II = circumferential，各再分 A=anterior/lateral wall 或上段、B=posterior wall 或全段）及其對應病因與術式。要找『錯誤』。\n- **選項B之錯誤**：常見與 colorectal（直腸）carcinoma 切除相關者為『後壁』缺損，即 **Type IB**（或 posterior wall 型），而非 Type IA。Type IA（anterior/lateral wall）多與泌尿婦科腫瘤切除相關。故 B 之病因配錯型別。\n- **正確配對**：\n  - Type IB（posterior wall）→ pedicled rectus myocutaneous flap（帶 bulk 填直腸切除死腔）。\n  - Type IIA（circumferential 上段）→ pedicled rectus 優於 gracilis，因 rectus 由『上方』引入，不受 vulvar/pelvic floor 肌肉阻擋。\n  - Type IIB → 注意 introitus 變形與死腔填補。", "peropt": {"A": "✗（正確敘述，非答案）Type I為partial、Type II為circumferential，分類正確。", "B": "◎ 錯誤即答案）colorectal(直腸)carcinoma術後常見者為『後壁』缺損＝Type IB，非Type IA(IA為anterior/lateral wall，多與泌尿婦科腫瘤相關)，故病因配錯型別。", "C": "✗（正確敘述，非答案）Type IB後壁缺損以pedicled rectus myocutaneous flap重建，正確。", "D": "✗（正確敘述，非答案）Type IIA用rectus由『上方』引入，較gracilis不受外陰及骨盆底肌阻擋，正確。", "E": "✗（正確敘述，非答案）Type IIB重建需注意陰道口(introitus)變形與死腔填補，正確。"}, "cite": "Neligan PS 5e, Vol.4 Vaginal reconstruction (Cordeiro classification); Grabb & Smith 9e, Vaginal reconstruction", "conflict": ""}, {"id": "6067", "sub": "TRK", "src": "NG", "years": [110, 114], "stem": "關於surgical treatment of pressure ulcer敘述，下列何者為非?", "opts": {"A": "Bursa preservation", "B": "radical ostectomy", "C": "filling of dead space and resurfacing with soft-tissue flaps", "D": "design of flaps to be larger than necessary", "E": "placement of the suture line away from the area of pressure"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：壓瘡（pressure ulcer）外科治療的基本原則。要找『非』屬於治療原則者。\n- **選項A之錯誤**：手術須『徹底切除 bursa（bursectomy）』而非『保留（preservation）』。慢性壓瘡底部的 pseudobursa 為纖維化、缺血、易感染的無效組織，必須連同疤痕一併 radical excision。\n- **標準壓瘡手術六原則**：①徹底清創與切除 bursa／疤痕；②radical ostectomy 去除感染／突出骨質至健康出血骨面；③填補死腔並以血管化軟組織皮瓣覆蓋（filling dead space & soft-tissue flap resurfacing）；④皮瓣設計『大於必要（larger than necessary）』以利未來再次旋轉／保留備案；⑤縫線置於『遠離受壓區』；⑥必要時保留可再利用之皮瓣範圍。", "peropt": {"A": "◎ 錯誤即答案）壓瘡手術須徹底切除pseudobursa(bursectomy)，非『保留(preservation)』；慢性壓瘡底部pseudobursa為纖維化、缺血、易感染之無效組織，必須連同疤痕radical excision。", "B": "✗（正確原則，非答案）Radical ostectomy去除感染／突出骨質至健康出血骨面，屬標準原則。", "C": "✗（正確原則，非答案）填補死腔並以血管化軟組織皮瓣覆蓋，屬標準原則。", "D": "✗（正確原則，非答案）皮瓣設計『大於必要(larger than necessary)』以保留未來再旋轉／重建選項，屬標準原則。", "E": "✗（正確原則，非答案）縫線置於『遠離受壓區』以降低復發，屬標準原則。"}, "cite": "Neligan PS 5e, Vol.4 Pressure sores; Grabb & Smith 9e, Pressure sores / surgical principles", "conflict": "⚠ 同題歷屆重出：壓瘡手術治療原則「何者為非」，錯誤敘述均為『保留滑囊(bursa preservation)』——滑囊應徹底切除。6057(110,中文,答案B)、6067(114,英文,答案A)。其餘正確原則（切除潰瘍及疤痕、填補骨露/死腔、採用較大局部皮瓣、縫線遠離受壓處）內容雷同，屬中英版本＋文字微調(規則A/B)。"}, {"id": "6068", "sub": "TRK", "src": "NG", "years": [114], "stem": "關於pressure sore敘述，下列何者為非?(複選)", "opts": {"A": "Shear is the force resisting relative motion between the patient’s skin and other surfaces", "B": "Both excess moisture and excessively dry skin are risk factors for pressure ulceration", "C": "Bardon scale incorporates six subscales which assess sensory perception, skin moisture, activity, mobility, friction and shear, and nutrition", "D": "Stage IV pressure ulcer describes full-thickness tissue loss with exposed bone, tendon, or muscle.", "E": "Diagnosis of osteomyelitis must be established after surgical reconstruction of pressure sore"}, "ans": "AE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 考點：壓瘡的病生理（friction vs. shear）、風險因子、分期與骨髓炎診斷時機。複選，要找『錯誤』的兩項＝AE。\n- **A 之錯誤**：抵抗皮膚與表面『相對運動』的力是 **friction（摩擦力）**；**shear（剪力）** 指的是平行於皮膚、造成深層組織與皮膚間錯位變形（血管扭折缺血）的力。A 把 shear 定義成 friction，錯誤。\n- **E 之錯誤**：**osteomyelitis 的診斷必須在重建手術『之前（preoperatively）』確立**（藉 MRI／骨切片），以決定 ostectomy 範圍與是否需先控制感染；『重建後才診斷』時序顛倒，錯誤。\n- 正確者：B 潮濕與過乾皆為風險；C Braden scale 六項次量表（sensory perception, moisture, activity, mobility, friction & shear, nutrition）；D Stage IV 為全層缺損伴骨、肌腱或肌肉外露。", "peropt": {"A": "◎ 錯誤即答案）抵抗皮膚與表面『相對運動』的力是friction(摩擦力)；shear(剪力)指平行皮膚、造成深層組織與皮膚間錯位變形(血管扭折缺血)之力，此處張冠李戴。", "B": "✗（正確敘述，非答案）過濕(macerated)與過乾皮膚皆為壓瘡風險因子，正確。", "C": "✗（正確敘述，非答案）Braden scale含六項次量表(sensory perception, moisture, activity, mobility, friction & shear, nutrition)，正確(原題拼寫Bardon應為Braden)。", "D": "✗（正確敘述，非答案）Stage IV為全層組織缺損伴骨、肌腱或肌肉外露，正確。", "E": "◎ 錯誤即答案）骨髓炎(osteomyelitis)診斷應於重建手術『前(preoperatively)』確立(藉MRI／骨切片)以決定ostectomy範圍，非重建『後』，時序顛倒。"}, "cite": "Neligan PS 5e, Vol.4 Pressure sores (Braden scale, staging); Grabb & Smith 9e, Pressure sores", "conflict": ""}, {"id": "6069", "sub": "TRK", "src": "NG", "years": [114], "stem": "關於 Singapore flap for perineal reconstruction敘述，下列何者錯誤?", "opts": {"A": "A fasciocutaneous flap harvested from the groin.", "B": "Based on the posterior labial arteries, which originate from internal pudendal arteries.", "C": "The harvest includes deep fascia and adductor epimysium to maintain dermal blood supply.", "D": "Woods’ modification divides the skin at the base of the flap to improve rotation.", "E": "In some populations, the flap may transpose hair-bearing skin."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：Singapore flap（pudendal thigh / Wee-Joseph flap）的解剖與改良。要找『錯誤』。\n- **選項D之錯誤**：**Woods' modification** 的重點是將皮瓣『島狀化（islanding）』並保留基部連續性以確保血流；並非『在皮瓣基部切斷皮膚（divides the skin at the base）』。若在基部切斷皮膚反而會傷及血供、不利轉位。故 D 敘述錯誤。\n- **正確解剖**：\n  - Fasciocutaneous flap，取自 groin/內側大腿的 pudendal thigh 區。\n  - 血供 = **posterior labial arteries**（源自 internal pudendal a.）。\n  - 取瓣含 deep fascia 與 adductor epimysium 以維持真皮血供。\n  - 於某些族群可能轉入帶毛皮膚（hair-bearing skin），為其缺點。", "peropt": {"A": "✗（正確敘述，非答案）取自groin／內側大腿之fasciocutaneous flap，正確。", "B": "✗（正確敘述，非答案）基於posterior labial arteries(源自internal pudendal a.)，正確。", "C": "✗（正確敘述，非答案）取瓣含deep fascia與adductor epimysium以維持真皮血供，正確。", "D": "◎ 錯誤即答案）Woods' modification之重點為將皮瓣『島狀化(islanding)』並保留基部連續性以確保血流，非『於皮瓣基部切斷皮膚』；若基部切斷皮膚反而傷及血供、不利轉位。", "E": "✗（正確敘述，非答案）某些族群可能轉入帶毛(hair-bearing)皮膚，為其缺點，正確。"}, "cite": "Neligan PS 5e, Vol.4 Perineal/Vaginal reconstruction (Singapore/pudendal thigh flap); Grabb & Smith 9e, Perineal reconstruction", "conflict": ""}, {"id": "6070", "sub": "TRK", "src": "NG", "years": [114], "stem": "Which of the following statements are incorrect regarding trunk surface anatomy and reconstructive muscle flaps? (Select all that apply) (複選)", "opts": {"A": "The superficial inferior epigastric artery provides the main perforators for the DIEP flap.", "B": "The trapezius muscle is classified as a type II flap with its dominant pedicle arising from the transverse cervical artery.", "C": "The semilunar line marks the lateral border of the rectus abdominis muscle and the transition to the oblique muscle complex.", "D": "The posterior rectus sheath extends inferiorly beyond the arcuate line and inserts into the pubic symphysis.", "E": "The pectoralis major muscle receives dominant blood supply from the thoracodorsal artery and is classified as a type V flap."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 考點：軀幹表面解剖與 Mathes-Nahai 肌皮瓣分類。複選找『錯誤』＝ADE。\n- **A 之錯誤**：DIEP flap 的主要穿通枝來自 **deep inferior epigastric artery（DIEA）**，而非 superficial inferior epigastric a.（SIEA）；SIEA 是另一種獨立皮瓣（SIEA flap）的來源。\n- **D 之錯誤**：**posterior rectus sheath 在 arcuate line（弧狀線）以下即缺如**，不會延伸至 pubic symphysis；弧狀線以下僅剩 transversalis fascia。\n- **E 之錯誤**：Pectoralis major 的 dominant pedicle 是 **thoracoacromial a. 的 pectoral branch**（非 thoracodorsal a.，後者供應 lat dorsi）；其 Mathes-Nahai 分類確為 type V（一主蒂＋internal mammary 之 segmental 次要蒂）——故『type V』部分正確但『thoracodorsal』錯誤，整句仍屬不正確。\n- 正確者：B trapezius 為 type II，dominant = transverse cervical a.；C semilunar line（linea semilunaris）為腹直肌外側緣。", "peropt": {"A": "◎ 錯誤即答案）DIEP flap主要穿通枝來自deep inferior epigastric artery(DIEA)，非superficial inferior epigastric a.(SIEA為獨立SIEA flap之來源)。", "B": "✗（正確敘述，非答案）Trapezius為Mathes-Nahai type II，dominant pedicle為transverse cervical a.，正確。", "C": "✗（正確敘述，非答案）Semilunar line(linea semilunaris)為腹直肌外側緣、與斜肌複合體交界，正確。", "D": "◎ 錯誤即答案）posterior rectus sheath於arcuate line(弧狀線)『以下即缺如』，不延伸至pubic symphysis；弧狀線下僅剩transversalis fascia。", "E": "◎ 錯誤即答案）Pectoralis major之dominant pedicle為thoracoacromial a.之pectoral branch(非thoracodorsal a.，後者供應lat dorsi)；分類雖確為type V但血供敘述錯誤，整句不正確。"}, "cite": "Neligan PS 5e, Vol.1 Flap classification / Vol.4 Trunk anatomy; Grabb & Smith 9e, Flaps (Mathes-Nahai classification)", "conflict": ""}, {"id": "6071", "sub": "TRK", "src": "NG", "years": [114], "stem": "Which of the following statements regarding reconstruction of the chest is correct? (複選)", "opts": {"A": "The omentum has only one dominant pedicle, the right gastroepiploic artery, but its pedicle length can be extended by dividing the arcades.", "B": "When rectus abdominus is taken with overlying fascia, there is a risk for resultant hernia, and at times, mesh reinforcement of the abdominal wall is necessary.", "C": "The best use of the serratus anterior is to fill intrathoracic defects.", "D": "Latissimus dorsi is often recruited for chest wall reconstruction, especially when significant bulk and mobility are required. It can also be turned over and based upon the lumbar perforators. In this fashion, it can reach across the midline and back.", "E": "Pectoralis major can be used as an advancement flap or as a turnover flap to cover nearly any sternal defect."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 考點：胸壁重建各皮瓣之正確敘述。複選找『正確』＝BCDE。\n- **A 之錯誤**：Omentum 有『兩條』dominant pedicle——**right 及 left gastroepiploic arteries**，並非只有右側；蒂長可藉 divide arcades 延長。故 A 稱『only one dominant pedicle』錯誤，不選。\n- **正確者**：\n  - B：rectus 帶筋膜取下有疝氣風險，需 mesh 補強。\n  - C：serratus anterior 最佳用途為填補 intrathoracic 缺損。\n  - D：lat dorsi 提供 bulk／mobility，可基於 lumbar perforators turnover 過中線。\n  - E：pectoralis major 可作 advancement 或 turnover flap，幾乎覆蓋任何胸骨缺損。", "peropt": {"A": "✗ Omentum有『兩條』dominant pedicle——right及left gastroepiploic arteries，非只有右側；蒂長可藉divide arcades延長，故『only one dominant pedicle』錯誤，不選。", "B": "◎ Rectus帶筋膜取下有疝氣(hernia)風險，需mesh補強，正確。", "C": "◎ Serratus anterior最佳用於填補intrathoracic(胸腔內)缺損，正確。", "D": "◎ Latissimus dorsi提供bulk／mobility，可基於lumbar perforators turnover過中線至背部，正確。", "E": "◎ Pectoralis major可作advancement或turnover flap覆蓋幾乎任何胸骨(sternal)缺損，正確。"}, "cite": "Neligan PS 5e, Vol.4 Chest wall reconstruction; Grabb & Smith 9e, Chest wall reconstruction", "conflict": ""}, {"id": "6072", "sub": "TRK", "src": "NG", "years": [114], "stem": "According to the text, which of the following mesh placement options is associated with rapid fibrovascular incorporation and avoids the need for a barrier coating?", "opts": {"A": "Intraperitoneal onlay mesh (IPOM) using bilaminar coated mesh", "B": "Microporous expanded polytetrafluoroethylene (e-PTFE) placed intraperitoneally", "C": "Onlay placement of coated mesh beneath subcutaneous tissue", "D": "Bridging repair using fascia lata autograft", "E": "Retrorectus placement of standard uncoated polypropylene mesh"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：腹壁 mesh 材質與放置層次對『纖維血管長入（fibrovascular incorporation）』與『是否需 barrier coating』的影響。\n- **選項E正確**：**Retrorectus（sublay/extraperitoneal）放置標準未塗層 polypropylene mesh**——因位於腹膜外、與腹腔臟器隔絕，故『不需 barrier/anti-adhesion coating』，且大孔徑 polypropylene 促進『快速纖維血管長入』與良好整合。\n- **其餘為何不對**：\n  - A：IPOM 置於腹膜內，必須用 bilaminar coated（防沾黏面）mesh。\n  - B：微孔 e-PTFE 置於腹膜內雖防沾黏，但『纖維血管長入差、整合不良』。\n  - C：Onlay coated mesh 無需腹膜內防沾黏，但敘述強調 coating，與『避免 barrier coating』不符。\n  - D：Fascia lata autograft bridging 為自體移植 bridging，非本題所述 mesh incorporation 概念。", "peropt": {"A": "✗ IPOM置於腹膜內須用bilaminar coated mesh(需防沾黏面)，與『避免barrier coating』相反，錯誤。", "B": "✗ 腹膜內微孔e-PTFE雖防沾黏，但纖維血管長入差、整合不良，錯誤。", "C": "✗ Onlay使用coated mesh，與『避免barrier coating』不符，錯誤。", "D": "✗ Fascia lata autograft bridging屬自體移植橋接，非本題所述『快速纖維血管長入之未塗層mesh』概念，錯誤。", "E": "◎ Retrorectus(sublay)放置標準未塗層polypropylene mesh：位腹膜外故不需防沾黏塗層，且大孔徑promotes快速纖維血管長入(fibrovascular incorporation)，正確。"}, "cite": "Neligan PS 5e, Vol.4 Abdominal wall reconstruction (mesh types/placement); Grabb & Smith 9e, Abdominal wall reconstruction", "conflict": ""}, {"id": "6074", "sub": "TRK", "src": "NG", "years": [115], "stem": "T Which of the following correctly pairs the regional flap used for vaginal reconstruction with its primary vascular pedicle and sensory innervation?", "opts": {"A": "Gracilis flap : Medial femoral circumflex artery ; Obturator nerve", "B": "Singapore flap : Anterior labial arteries ; Obturator nerve", "C": "Jejunum flap : Inferior mesenteric artery ; Pudendal nerve", "D": "VRAM flap : Superficial inferior epigastric artery ; Femoral nerve", "E": "Sigmoid colon flap : Superior mesenteric artery ; Obturator nerve"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：陰道重建常用皮瓣之『血管蒂＋感覺神經』配對。此題各選項多有解剖錯誤，須擇最接近權威答案者。\n- **權威答案為B（Singapore flap）**：Singapore（pudendal thigh）flap 之感覺可透過陰部區域神經維持。\n- **其餘明確錯誤**：\n  - A：Gracilis 蒂為 medial circumflex femoral a.、obturator n.——但 obturator 為『運動』神經，非題目要求之『sensory innervation』，故不符。\n  - C：Jejunum 應為 **superior mesenteric a.**（非 inferior）。\n  - D：VRAM 應為 **deep inferior epigastric a.**（非 superficial），神經非 femoral。\n  - E：Sigmoid colon 應為 **inferior mesenteric a.**（非 superior）。\n⚠答案疑義：嚴格解剖上 Singapore flap 血供為 **posterior labial arteries**（非 anterior labial）、感覺來自 pudendal n. 之 posterior labial branches（非 obturator n.），故B兩處配對亦有瑕疵；但相對其他選項血管系統性錯誤，本題仍以 ans=B 為準。", "peropt": {"A": "✗ Gracilis：medial circumflex femoral a.＋obturator n.解剖上正確，但obturator為『運動』神經非題目要求之sensory innervation，不符，錯誤。", "B": "◎ Singapore flap為權威答案；惟嚴格解剖上正確血供應為posterior labial a.、感覺為pudendal(posterior labial)n.，非anterior labial／obturator。", "C": "✗ Jejunum flap血供應為superior mesenteric a.(非inferior mesenteric)，錯誤。", "D": "✗ VRAM flap血供應為deep inferior epigastric a.(非superficial inferior epigastric)；神經配對亦錯，錯誤。", "E": "✗ Sigmoid colon flap血供應為inferior mesenteric a.(非superior mesenteric)，錯誤。"}, "cite": "Neligan PS 5e, Vol.4 Vaginal reconstruction (flap pedicles/innervation); Grabb & Smith 9e, Vaginal & perineal reconstruction", "conflict": ""}, {"id": "6075", "sub": "TRK", "src": "NG", "years": [115], "stem": "When planning a soft-tissue reconstruction for a sternal defect, the pectoralis major muscle is frequently utilized due to its robust and versatile vascular anatomy. Which of the following describes the dominant vascular pedicle of the pectoralis major muscle flap?", "opts": {"A": "Thoracodorsal arter", "B": "Deep inferior epigastric artery", "C": "Lateral thoracic artery", "D": "Pectoral branch of the thoracoacromial artery", "E": "Superior epigastric artery"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：胸骨缺損重建首選之 pectoralis major flap 的 dominant vascular pedicle。\n- **選項D正確**：Pectoralis major 的 dominant pedicle 為 **thoracoacromial a. 的 pectoral branch**（伴 lateral thoracic a. 為次要，及來自 internal mammary 的 segmental perforators）；Mathes-Nahai type V flap。以 thoracoacromial 為蒂可作旋轉皮瓣覆蓋胸骨；若 internal mammary 已被取用（如 CABG），則可反轉以 IMA perforators 為基。\n- **鑑別**：thoracodorsal→lat dorsi；deep inferior epigastric→rectus/DIEP；lateral thoracic→pec major 次要蒂；superior epigastric→pedicled TRAM/rectus 上蒂。", "peropt": {"A": "✗ Thoracodorsal artery供應latissimus dorsi，非pec major之dominant pedicle，錯誤。", "B": "✗ Deep inferior epigastric artery供應rectus abdominis／DIEP，非pec major，錯誤。", "C": "✗ Lateral thoracic artery僅為pec major之次要(minor)蒂，非dominant，錯誤。", "D": "◎ Pectoral branch of thoracoacromial artery為pectoralis major之dominant pedicle(Mathes-Nahai type V)，正確。", "E": "✗ Superior epigastric artery供應腹直肌上蒂(pedicled TRAM)，非pec major，錯誤。"}, "cite": "Neligan PS 5e, Vol.4 Chest wall reconstruction (pectoralis major flap); Grabb & Smith 9e, Chest wall reconstruction", "conflict": ""}, {"id": "6076", "sub": "TRK", "src": "NG", "years": [115], "stem": "A multidisciplinary oncology team consults you regarding reconstructive options for several patients with acquired vaginal defects following tumor ablations. Based on the established reconstructive algorithm, anatomical considerations, and complication profiles, which of the following statements is MOST ACCURATE?", "opts": {"A": "Type IA defects (partial defects of the anterior or lateral wall) frequently require significant soft-tissue bulk to fill the pelvic dead space; therefore, the pedicled vertical rectus abdominis myocutaneous (VRAM) flap is the ideal reconstructive choice.", "B": "When utilizing bilateral gracilis flaps for a Type IIB circumferential defect, the primary blood supply is based on the medial femoral circumflex artery, and pressure sensation of the neovagina can be maintained through perineal branches of the posterior cutaneous nerve of the thigh.", "C": "In patients undergoing abdominoperineal resection (APR) for advanced rectal cancers, immediate reconstruction with a VRAM flap has a significantly higher incidence of major perineal wound dehiscence compared to primary closure alone, despite its utility in obliterating dead space.", "D": "For an obese patient requiring reconstruction of a Type IIB (total circumferential) defect, thin bilateral Singapore (pudendal thigh) flaps may be a preferred alternative, because obesity is a significant risk factor for poor wound healing after rectus flap reconstruction.", "E": "If a patient with a Type IIA defect is not a candidate for a rectus flap, a jejunum flap pedicled on a branch of the inferior mesenteric artery or a sigmoid colon flap pedicled on the superior mesenteric artery can be used, with the distinct advantage of avoiding excessive vaginal secretions."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 考點：後天陰道缺損重建演算法之綜合臨床判斷，找『最正確』。\n- **選項D正確**：肥胖（obesity）是 rectus flap 重建後傷口癒合不良的重要風險因子；對『肥胖』患者行 Type IIB（全環狀）重建時，**薄的 bilateral Singapore（pudendal thigh）flaps** 可為較佳替代（避開厚重且併發症高的腹部供區）。\n- **其餘為何錯**：\n  - A：Type IA（前/側壁 partial）不需大量 bulk，首選薄的 Singapore flap，而非強調 bulk 的 VRAM。\n  - B：bilateral gracilis 雖 based on MCFA，但感覺／敘述混雜，非最正確。\n  - C：APR 後即刻 VRAM 重建相較 primary closure 其實『降低』會陰傷口併發症，非『顯著增加 dehiscence』。\n  - E：血管配錯（jejunum 應 SMA、sigmoid 應 IMA）；且 jejunum 分泌物『過多』為缺點而非優點。", "peropt": {"A": "✗ Type IA(前/側壁partial)缺損不需大量bulk，首選薄的Singapore flap，而非強調bulk之VRAM，錯誤。", "B": "✗ bilateral gracilis雖based on medial circumflex femoral a.，但感覺／情境敘述混雜，非最正確，錯誤。", "C": "✗ APR後即刻VRAM重建相較primary closure其實『降低』會陰傷口併發症(dehiscence)，非顯著增加，錯誤。", "D": "◎ 肥胖(obesity)為rectus flap重建後傷口癒合不良之重要風險因子，故肥胖患者Type IIB重建改以薄的bilateral Singapore(pudendal thigh) flaps為較佳替代，最正確。", "E": "✗ 血管配錯——jejunum應為superior mesenteric a.、sigmoid應為inferior mesenteric a.；且jejunum分泌物『過多』為缺點非優點，錯誤。"}, "cite": "Neligan PS 5e, Vol.4 Vaginal reconstruction algorithm; Grabb & Smith 9e, Perineal/Vaginal reconstruction", "conflict": ""}, {"id": "6077", "sub": "TRK", "src": "NG", "years": [115], "stem": "The development of an incisional hernia is closely related to the failure of biologic healing and high tension at the suture/tissue interface (STI) leading to suture pull-through. According to the text, which of the following are recognized clinical risk factors for incisional hernia formation? (Select all that apply)", "opts": {"A": "Wound contamination", "B": "Elevated Body Mass Index (BMI)", "C": "Surgical site infection (SSI)", "D": "Preoperative chemotherapy", "E": "Decreasing age (Youth)"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 考點：切口疝氣（incisional hernia）之臨床風險因子。複選＝ABCD。核心機轉：生物性癒合失敗＋縫線-組織界面（STI）高張力→縫線切割拉出（suture pull-through）。\n- **正確風險因子**：\n  - A 傷口污染（wound contamination）\n  - B 高 BMI（腹內壓↑、癒合差）\n  - C 手術部位感染（SSI）\n  - D 術前化療（preoperative chemotherapy，影響癒合）\n- **E 之錯誤**：風險因子應為『**increasing age（高齡）**』（膠原品質下降、癒合力減弱），而非『年輕（decreasing age/youth）』，故 E 不選。", "peropt": {"A": "◎ 傷口污染(wound contamination)為切口疝氣風險因子，正確。", "B": "◎ 高BMI(腹內壓增加、癒合不良)為風險因子，正確。", "C": "◎ 手術部位感染(SSI)為風險因子，正確。", "D": "◎ 術前化療(preoperative chemotherapy)影響組織癒合，為風險因子，正確。", "E": "✗ 應為『高齡(increasing age)』才是風險因子(膠原品質下降、癒合力減弱)；『年輕／decreasing age』非風險因子，故不選。"}, "cite": "Neligan PS 5e, Vol.4 Abdominal wall / incisional hernia risk factors; Grabb & Smith 9e, Abdominal wall reconstruction", "conflict": ""}, {"id": "6078", "sub": "TRK", "src": "NG", "years": [115], "stem": "Which of the following are considered core principles for optimizing soft-tissue reconstruction in the posterior trunk? (Select all that apply)", "opts": {"A": "Debridement of all devitalized tissues", "B": "Closure under high tension to eliminate dead space", "C": "Recruitment of well-vascularized tissue outside the zone of injury", "D": "Obliteration of all empty space", "E": "Routine use of free tissue transfer as the first-line option"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 考點：後軀幹（posterior trunk）軟組織重建之核心原則。複選＝ACD。\n- **正確原則**：\n  - A 徹底清創所有失活組織（debridement of all devitalized tissues）。\n  - C 由『損傷區以外（outside the zone of injury）』引入良好血管化組織。\n  - D 完全填補死腔（obliteration of all empty/dead space）。\n- **錯誤者**：\n  - B『高張力關閉以消除死腔』錯誤——應為『**無張力（tension-free）**』關閉；高張力導致裂開／缺血。\n  - E『常規以游離皮瓣為第一線』錯誤——後軀幹首選『**局部／鄰近肌肉皮瓣（local muscle flaps）**』（如 paraspinous、trapezius、lat dorsi），游離皮瓣僅為備案。", "peropt": {"A": "◎ 徹底清創所有失活組織(debridement of all devitalized tissues)，正確核心原則。", "B": "✗ 應為『無張力(tension-free)』關閉；高張力關閉會導致裂開／缺血，故不選。", "C": "◎ 由『損傷區以外(outside the zone of injury)』引入良好血管化組織，正確。", "D": "◎ 完全填補死腔(obliteration of all dead space)，正確。", "E": "✗ 後軀幹首選『局部／鄰近肌肉皮瓣(local muscle flaps， function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}

  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const fl=flagIds();h+='<div class="card"><div class="h3">⚑ 爭議／待查（'+fl.length+'）</div>';if(!fl.length)h+='<div class="dim">尚無標記。作答時點右上角 ⚐ 標記有爭議或想再查的題。</div>';else{h+='<div class="wlist">';fl.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s" style="color:#D9534F">⚑ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋待查＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.flag=o.flag||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},flag:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',flag:'待查',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabFlag').onclick=()=>{mode='flag';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();

// ==== cover populate ====
(function(){try{
 var TOTAL=DATA.length,R=51,C=2*Math.PI*R,now=Date.now();
 var e=new Date(new Date().getFullYear(),7,15);if(Date.now()>e.getTime())e=new Date(new Date().getFullYear()+1,7,15);
 var d=document.getElementById('cvDays');if(d)d.textContent=Math.ceil((e.getTime()-now)/864e5);
 var mst=0,ans=0,due=0;var P=(S&&S.P)||{};
 for(var id in P){ans++;var p=P[id];if(p&&p.S>=21&&!p.w)mst++;if(p&&p.due&&p.due<=now)due++;}
 var pct=TOTAL?Math.round(mst/TOTAL*100):0;
 document.getElementById('cvPct').textContent=pct+'%';
 document.getElementById('cvMst').textContent=mst+' / '+TOTAL;
 document.getElementById('cvAns').textContent=ans+' / '+TOTAL;
 document.getElementById('cvDue').textContent=due+' 題';
 document.getElementById('cvArc').setAttribute('stroke-dashoffset',C*(1-pct/100));
}catch(x){}
 var b=document.getElementById('cvStart');if(b)b.onclick=function(){var c=document.getElementById('cover');if(c)c.classList.add('hide');};
})();

</script></body></html>
