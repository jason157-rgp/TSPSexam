<!DOCTYPE html>
<html lang="zh-Hant"><head>

<title>整外精簡衝刺版 · 最新三卷</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px calc(112px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}.flagbtn{background:none;border:none;font-size:20px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px;margin-left:4px}.flagbtn.on{color:#D9534F}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

/* ==== cover launch screen ==== */
#cover{position:fixed;inset:0;z-index:200;background:var(--forest);display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
#cover.hide{display:none}
#cover .cv{position:relative;width:100%;max-width:430px;border-radius:30px;overflow:hidden;
 background:radial-gradient(130% 100% at 50% 0%,#3E6B4E 0%,#2C4A38 48%,#1E3527 100%);
 box-shadow:0 24px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);padding:34px 28px 28px;color:#fff}
#cover .wm{position:absolute;inset:0;opacity:.055;pointer-events:none}
#cover .wm svg{position:absolute;width:100%;height:100%}
#cover .kick{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;position:relative;z-index:2}
#cover .ktag{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--pale);font-weight:700}
#cover .ksrc{font-size:10.5px;color:rgba(255,255,255,.5);letter-spacing:.5px}
#cover h2{font-size:27px;line-height:1.2;font-weight:850;letter-spacing:1px;position:relative;z-index:2;margin:0;color:#fff}

#cover .cd{margin-top:24px;position:relative;z-index:2;background:rgba(224,169,59,.12);border:1px solid rgba(224,169,59,.3);border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:16px}
#cover .cd .ic{font-size:26px}
#cover .cd .big{display:flex;align-items:baseline;gap:6px}
#cover .cd .num{font-size:52px;font-weight:850;line-height:.9;color:var(--star);letter-spacing:-1px}
#cover .cd .u{font-size:16px;font-weight:700;color:#F6E4BC}
#cover .cd .lbl{margin-top:4px;font-size:12.5px;color:rgba(255,255,255,.7)}
#cover .pg{margin-top:16px;position:relative;z-index:2;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:20px;display:flex;align-items:center;gap:20px}
#cover .ring{position:relative;width:118px;height:118px;flex:none}
#cover .ring svg{transform:rotate(-90deg)}
#cover .ring .pc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#cover .ring .pc b{font-size:30px;font-weight:850;line-height:1;color:#fff}
#cover .ring .pc s{font-size:10.5px;color:rgba(255,255,255,.65);text-decoration:none;margin-top:2px;letter-spacing:1px}
#cover .pd{flex:1;display:flex;flex-direction:column;gap:11px}
#cover .pr{display:flex;align-items:center;justify-content:space-between;font-size:13px}
#cover .pr .k{color:rgba(255,255,255,.72);display:flex;align-items:center;gap:7px}
#cover .pr .k i{width:9px;height:9px;border-radius:3px;display:inline-block}
#cover .pr .v{font-weight:800;font-size:15px;color:#fff}
#cover .go{margin-top:22px;position:relative;z-index:2}
#cover .gobtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:17px;background:linear-gradient(180deg,#B7E4C6,#8FCBA0);color:#1E3527;border:none;border-radius:16px;font-size:16.5px;font-weight:850;letter-spacing:1px;cursor:pointer;box-shadow:0 8px 22px rgba(143,203,160,.3)}
#cover .cft{margin-top:15px;text-align:center;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;position:relative;z-index:2}
</style></head><body>

<script>
const DATA=[{"id": "1003", "sub": "HND", "src": "GS", "years": [110, 111, 112, 113, 114, 115], "stem": "一位42歲進康男性，因為半年前外傷，導致肘隧道症候群伴隨claw hand、小魚際肌且掌骨間肌萎縮，以下何種神經重建手術方式最適用?", "opts": {"A": "Donor nerve: ECRL branch radial nerve ; Recipient nerve: Ulnar motor branch", "B": "Donor nerve: ECRB branch radial nerve ; Recipient nerve: Ulnar motor branch", "C": "Donor nerve: Terminal branch of AIN ; Recipient nerve: Ulnar motor branch", "D": "Donor nerve: FCU branch ulnar nerve; Recipient nerve: Ulnar motor branch.", "E": "Jones tendon transfer"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 此為高位ulnar nerve病變（cubital tunnel syndrome）伴內在肌萎縮的神經重建首選：以AIN終末支（支配pronator quadratus）作為donor，端對端或端對側（SETS supercharge）轉移至ulnar nerve的deep motor branch。核心機轉是高位病變再生距離過長、內在肌恐先纖維化，故以靠近目標的運動神經『就近補充』軸突，加速intrinsic重新支配。易混淆點：Jones transfer屬肌腱轉移用於radial nerve palsy，非神經重建。", "peropt": {"A": "✗ ECRL branch（radial nerve）並非重建ulnar運動功能的標準donor，且方向與目標不符。", "B": "✗ ECRB branch（radial nerve）同樣非ulnar motor重建之donor，radial系統無法就近提供內在肌軸突。", "C": "◎ Terminal branch of AIN（至PQ）→ ulnar motor branch，屬distal nerve transfer/supercharge，就近提供軸突、縮短再生距離，最適合高位ulnar病變之內在肌重建。", "D": "✗ FCU branch本身即ulnar nerve分支，於高位病變中同屬失神經，無法作為健康donor。", "E": "✗ Jones tendon transfer為radial nerve palsy之肌腱轉移方案，與ulnar內在肌神經重建無關。"}, "cite": "待複查（GS 周邊神經轉移／distal nerve transfer 記憶佐證）", "conflict": ""}, {"id": "1006", "sub": "HND", "src": "GS", "years": [110, 111, 112, 113, 114, 115], "stem": "What kind of complication will be happened if repaired or reconstructed flexor digitorum profundus is too short?", "opts": {"A": "Mallet finger", "B": "Boutoniere deformity", "C": "Lumbrical Plus finger", "D": "Quadriga effect", "E": "All of the above are correct"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 修復或重建後的 flexor digitorum profundus (FDP) 若過短（over-advanced），會產生 Quadriga effect（四頭馬車效應）。因為中、環、小指的 FDP 共用一個 common muscle belly，當其中一條被縮短、固定，肌腹被『拴住』而無法完整下滑，導致其餘手指無法完全屈曲、握力下降。核心鑑別：FDP『過短』→ Quadriga；FDP『過長／過鬆』(如遠端截肢後 graft 過長)→ Lumbrical plus finger（試圖屈曲時 IP 反常伸直）。兩者常一起考、方向相反，務必分清。", "peropt": {"A": "✗ Mallet finger 是 DIP 處 terminal extensor tendon 斷裂／撕脫，屬伸肌側損傷，與 FDP 過短無關。", "B": "✗ Boutonnière deformity 源於 central slip（中央束）斷裂造成 PIP 屈曲、DIP 過伸，屬伸肌機制問題，非 FDP 長度問題。", "C": "✗ Lumbrical plus finger 是 FDP『過長／過鬆』（如截肢殘端縫太鬆或 graft 過長），屈指時張力經 lumbrical 傳導反使 IP 反常伸直，與本題『過短』方向相反。", "D": "◎ FDP 過短造成 Quadriga effect：共用肌腹被縮短端拴住，鄰指無法完整屈曲，握力下降。", "E": "✗ 並非全部皆對，僅 D 正確。"}, "cite": "待複查（GS 手外科 Flexor tendon / Quadriga 記憶佐證）", "conflict": "⚠ 同題歷屆重出：FDP修補過短之併發症題，正確答案恆為Quadriga effect。110/111/113/114/115年(1006)答D、112年(1028)答A(僅選項順序不同)；記概念不記字母。"}, {"id": "1008", "sub": "HND", "src": "GS", "years": [110, 111, 112, 113, 114, 115], "stem": "De Quervain's tenosynovitis 為?", "opts": {"A": "First dorsal compartment tenosynovitis", "B": "Second dorsal compartment tenosynovitis", "C": "third dorsal compartment tenosynovitis", "D": "forth dorsal compartment tenosynovitis", "E": "fifth dorsal compartment tenosynovitis"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 De Quervain's tenosynovitis＝第一背側腔室(1st dorsal compartment)腱鞘炎，內含APL＋EPB兩條肌腱。六個背側腔室內容：①APL+EPB ②ECRL+ECRB ③EPL ④EDC+EIP ⑤EDM(EDQ) ⑥ECU。", "peropt": {"A": "◎ De Quervain＝第一背側腔室(APL＋EPB)腱鞘炎。", "B": "✗ 第二背側腔室為ECRL＋ECRB，非De Quervain部位。", "C": "✗ 第三背側腔室為EPL(繞過Lister's tubercle)，非De Quervain部位。", "D": "✗ 第四背側腔室為EDC＋EIP，非De Quervain部位。", "E": "✗ 第五背側腔室為EDM/EDQ，非De Quervain部位。"}, "cite": "Grabb and Smith's, 9th, Ch.91", "conflict": ""}, {"id": "1030", "sub": "HND", "src": "GS", "years": [110, 111, 112, 113, 114, 115], "stem": "Which of the following tendons could be the donor tendon for opponensplasty? (複選)", "opts": {"A": "Extensor indicis proprius (EIP)", "B": "flexor digitorum superficialis (FDS)", "C": "Abductor digiti minimi (ADM)", "D": "Palmaris longus (PL)", "E": "Flexor digitorum profoundus (FDP) to ring finger"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "Opponensplasty donor:EIP、FDS、ADM(Huber)、PL(Camitz)皆可;FDP to ring非標準。", "peropt": {"A": "◎ EIP opponensplasty(Burkhalter)，可。", "B": "◎ FDS(Bunnell/Royle-Thompson)，可。", "C": "◎ ADM(Huber transfer)，可。", "D": "◎ PL(Camitz)，可。", "E": "✗FDP to ring finger非標準donor。"}, "cite": "Grabb and Smith's, 9th, Ch.92, Table.92.5", "conflict": "⚠ 同題歷屆重出：opponensplasty可用donor tendon『複選』，四個正確donor(EIP、ADM、FDS、PL)恆相同；錯誤distractor由FPL(110/111年,1009,答ACDE)改為FDP to ring finger(112/113/114/115年,1030,答ABCD)；作答錨定該年選項。"}, {"id": "1038", "sub": "HND", "src": "GS", "years": [112, 113, 114, 115], "stem": "根據Flatt classification system of thumb duplication，下列何種type最常見 ?", "opts": {"A": "Type I Bifid distal phalanx", "B": "Type II Duplicated distal phalanx", "C": "Type III Bifid proximal phalanx", "D": "Type IV Duplicated proximal phalanx", "E": "Type V Bifid metacarpal"}, "ans": "D", "multi": false, "etype": "ai", "expl": "(Grabb and Smith's Plastic Surgery, 8th Edition, Kevin C. Chung. Part VIII Chap 90. P 909-910.)", "key": "🎯 拇指多指(thumb duplication)Flatt/Wassel分類最常見為Type IV(duplicated proximal phalanx)，約佔40–47%；次常見為Type VII(triphalangeal thumb，~20%)。", "peropt": {"A": "✗ Type I(bifid distal phalanx)約僅~2–3%，非最常見。", "B": "✗ Type II(duplicated distal phalanx)約~15%，居第三，非最常見。", "C": "✗ Type III(bifid proximal phalanx)約~6%，非最常見。", "D": "◎ Type IV(duplicated proximal phalanx)最常見，約40–47%。", "E": "✗ Type V(bifid metacarpal)約~10%，非最常見。"}, "cite": "Grabb and Smith's, 8th, Ch 90, p909-910", "conflict": ""}, {"id": "1045", "sub": "HND", "src": "GS", "years": [114, 115], "stem": "Which of the following is not involved in the pathomechanics of a Boutonniere deformity?", "opts": {"A": "Rupture of the central tendon over the PIP joint.", "B": "Prolapse of the lateral band volar to the PIP joint axis", "C": "Rupture of lateral band", "D": "Hyperextension of DIP joint and flexion deformity of the PIP joint", "E": "None of the above"}, "ans": "C", "multi": false, "etype": "ai", "expl": "Development of boutonnière deformity.\nA. The central slip is disrupted from the base of the middle phalanx leading to all extensor forces being concentrated into the lateral bands.\nB. The lateral bands slip volarly and become flexors of the PIP joint and hyperextensors of the DIP joint.", "key": "Boutonniere機制:PIP central slip斷裂→lateral bands往掌側(volar to PIP軸)滑移→PIP屈曲、DIP過伸。lateral band為『移位』非斷裂。", "peropt": {"A": "central tendon(slip)在PIP斷裂=機制之一。", "B": "lateral band往PIP軸掌側prolapse=機制之一。", "C": "◎ 答案(不涉及)：lateral band『斷裂』非boutonniere機制(是移位非斷裂)。", "D": "DIP過伸+PIP屈曲=典型表現。", "E": "none of the above不選。"}, "cite": "Grabb and Smith's, 9th, Ch.90 Fig. 90.5", "conflict": ""}, {"id": "1047", "sub": "HND", "src": "GS", "years": [114, 115], "stem": "關於digital flexor sheath的敘述何者為正確? (複選)", "opts": {"A": "可分為synovial sheath和condensed fibrous bands，前者為一種paratenon，可提供肌腱養分並形成一個平順的滑動介面", "B": "每根手指(finger)有五個annular pulley和三個cruciate pulleys", "C": "拇指(thumb)有三個pulley，分別為A1, oblique, and A2，並不像手指有cruciate pulley", "D": "手指的A2和A4 pulley靠近指關節(PIPJ和DIPJ)，是annular pulley中較大且重要的部分，手術時盡量不要傷害", "E": "FDS tendon的分岔位置約位於A2 pulley的中段"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "A2與A4 pulley各在近端與中段指節上，非在關節上", "key": "🎯 Digital flexor sheath由synovial sheath（paratenon，供養並提供滑動介面）與condensed fibrous bands（pulleys）構成。手指有5個annular（A1–A5）+3個cruciate（C1–C3）pulley；拇指僅A1、oblique、A2（無cruciate）。核心易混淆：A2位於proximal phalanx、A4位於middle phalanx（皆在骨幹上而非關節上），為維持機械效益最重要、術中須保留者。FDS於A2中段分叉（Camper chiasm）。本題為複選『正確』者。", "peropt": {"A": "◎ Synovial sheath屬paratenon，供養肌腱並形成平順滑動介面，敘述正確。", "B": "◎ 每指5 annular＋3 cruciate pulley，正確。", "C": "◎ 拇指僅A1、oblique、A2，無cruciate，正確。", "D": "✗ A2、A4分別在proximal與middle phalanx『骨幹』上，非在PIPJ/DIPJ關節上；此為敘述錯誤，故不列入答案。", "E": "◎ FDS於A2 pulley中段分叉（Camper chiasm），正確。"}, "cite": "原檔詳解（A2/A4位於近端與中段指骨上，非在關節上）", "conflict": ""}, {"id": "1050", "sub": "HND", "src": "GS", "years": [115], "stem": "Which are the contribute to the displacement of the 1st metacarpal shaft in Bennett's fracture except?", "opts": {"A": "Flexor pollicis longus and abductor pollicis longus", "B": "Abductor pollicis longus and adductor pollicis", "C": "Adductor pollicis and flexor pollicis longus", "D": "Extensor pollicis brevis and flexor pollicis longus", "E": "All of the above are incorrect"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Thumb metacarpal base fractures tend to be relatively unstable because of the strong attachments of the ulnar fragments to the index metacarpal by the volar beak ligament, the pull of the abductor pollicis longus on the base of radial fragment, and the adductor pollicis on the metacarpophalangeal joint", "key": "🎯 Bennett's fracture 真正的移位力為 abductor pollicis longus(牽拉橈側骨片基部)與 adductor pollicis(作用於 MCP)，EPB 亦參與；FPL 不參與。本題以『成對』出題，唯一兩者皆為真正移位力的組合即 APL + adductor pollicis；其餘組合皆含 FPL(非移位力)。", "peropt": {"A": "✗ 含 FPL(非移位力)，組合不成立。", "B": "◎ APL 與 adductor pollicis 皆為真正移位力。", "C": "✗ 含 FPL(非移位力)。", "D": "✗ 含 FPL；雖 EPB 為移位力，但 FPL 非，故組合不成立。", "E": "✗ 不適用。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1051", "sub": "HND", "src": "GS", "years": [115], "stem": "Which is true about 4th degree of injury Sunderland?", "opts": {"A": "Axonal rupture without interruption of the basal lamina tubes", "B": "Rupture of both axons and basal lamina tubes, some scar", "C": "Neuroma-in-continuity with complete scar block", "D": "Complete transection", "E": "Focal demyelination/conduction block"}, "ans": "C", "multi": false, "etype": "ai", "expl": "Seddon (1943) and Sunderland's (1951) classifications of nerve injury remain the standard (Table 84.1).1 A Sunderland first-degree (Seddon neurapraxia) injury has demyelination without axonal injury and should recover completely. A second-degree (axonotmesis) injury has axonal loss with preservation of the basal laminar tubes, and thus, complete recovery is anticipated. A third-degree (axonotmesis) injury results in axonal loss with disruption of the basal laminar tubes and will have incomplete recovery. Fourth- and fifth-degree (neurotmesis) injuries represent neuroma-in-continuity and transection injuries, respectively", "key": "🎯 Sunderland 分級：一度＝脫髓鞘/傳導阻斷（neurapraxia）可完全恢復；二度＝軸突斷裂但 basal lamina（endoneurium）完整（axonotmesis）；三度＝軸突＋endoneurium 斷裂、perineurium 完整，部分疤痕；四度＝軸突＋endoneurium＋perineurium 皆斷、僅 epineurium 完整→ neuroma-in-continuity 伴完全疤痕阻斷，需手術；五度＝完全橫斷（neurotmesis）。故四度＝C。", "peropt": {"A": "✗ 軸突斷裂但 basal lamina 未中斷＝二度（axonotmesis）。", "B": "✗ 軸突與 basal lamina 皆斷、部分疤痕＝三度。", "C": "◎ 四度＝neuroma-in-continuity 伴完全疤痕阻斷（僅 epineurium 完整）。", "D": "✗ 完全橫斷＝五度（neurotmesis）。", "E": "✗ 局部脫髓鞘／傳導阻斷＝一度（neurapraxia）。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1052", "sub": "HND", "src": "GS", "years": [115], "stem": "Which of the following descriptions about \"Stener lesion\" is wrong ?", "opts": {"A": "It occurs when the torn ulnar collateral ligament (UCL) becomes trapped superficial to the adductor pollicis aponeurosis.", "B": "It is typically associated with a high-grade or complete rupture of the UCL at its distal insertion on the proximal phalanx.", "C": "Conservative management with a thumb spica cast is the gold standard of treatment for a confirmed Stener lesion.", "D": "The lesion acts as a mechanical barrier that prevents the ends of the torn ligament from reuniting, leading to chronic instability.", "E": "On an ultrasound or MRI, the displaced ligament often resembles a \"yo-yo on a string\" appearance."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Stener lesion需『手術』;thumb spica cast非gold standard(斷端被aponeurosis阻隔無法癒合)。", "peropt": {"A": "UCL斷端卡在adductor aponeurosis淺層，正確。", "B": "高度/完全UCL斷裂於proximal phalanx遠端止點，正確。", "C": "◎ 答案(錯)：Stener lesion須手術,cast非gold standard。", "D": "為機械屏障阻止斷端癒合，正確。", "E": "影像呈'yo-yo on a string'，正確。"}, "cite": "Grabb and Smith's, 9th, Ch.93, Table.93", "conflict": ""}, {"id": "1053", "sub": "HND", "src": "GS", "years": [115], "stem": "Regarding the surgical management and reconstructive principles for mutilated upper extremity injuries, which of the following statements is TRUE according to the clinical guidelines and author preferences provided in the text?", "opts": {"A": "The Mangled Extremity Severity Score (MESS) serves as the primary gold standard for determining the necessity of upper limb amputation, with a score greater than 7 indicating a high likelihood of secondary amputation.", "B": "In skeletal fixation of mutilated limbs, K-wire fixation is preferred over screw and plate constructs because it provides superior rigid stability for earlier mobilization despite causing more extensive soft-tissue stripping.", "C": "For motor nerve reconstruction of gaps between 5 mm and 50 mm, processed nerve allografts have been shown to provide functional outcomes equivalent to autografts, whereas conduits are generally restricted to non-critical sensory gaps under 3 cm.", "D": "The universally preferred timing for definitive soft-tissue coverage with a free flap is the \"Primary\" window (within 12 to 24 hours of injury) to ensure immediate protection of vital structures before tissue demarcation occurs.", "E": "In a stable patient with suspected vascular injury, angiography is the preferred initial step and should take precedence over surgical exploration to accurately determine the nature and extent of the vessel damage."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "以上皆非為正確者:MESS非唯一標準、K-wire非提供最佳剛性、free flap最佳時機非12-24h、穩定病人不以angiography優先於探查;正確者為C(processed nerve allograft 5-50mm≈autograft、conduit限<3cm感覺)。", "peropt": {"A": "✗MESS非唯一gold standard,>7 cutoff有爭議。", "B": "✗K-wire非提供superior rigid stability(plate較穩)且剝離較少。", "C": "◎ 答案:processed nerve allograft 5-50mm≈autograft;conduit限<3cm感覺缺損。", "D": "✗free flap最佳時機非12-24h(Godina早期覆蓋~72h-7天)。", "E": "✗穩定病人疑血管傷,探查優先於angiography。"}, "cite": "Grabb and Smith's, 9th, Ch.95", "conflict": ""}, {"id": "1054", "sub": "HND", "src": "GS", "years": [115], "stem": "關於Compartment syndrome，下列敘述何者錯誤？", "opts": {"A": "臨床診斷6P為Pain with passive stretch, Paresthesia, Paralysis, Pulselessness, Pallor, Poikilothermia", "B": "組織缺氧時，細胞離子幫浦失調會造成細胞質 (cytosolic)中鉀離子增加進而造成組織壞死。", "C": "傷口暫時無法關起來時可以先使用負壓傷口治療 (NPWT)。", "D": "於適當時間內接受Fasciotomy可以減少組織缺氧造成的傷害", "E": "延遲治療可能會造成intrinsic tightness 或 thumb adduction contracture"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "缺氧離子幫浦失調造成細胞內『鈉/鈣』增加(非鉀),B敘述有誤。", "peropt": {"A": "6P診斷,正確。", "B": "◎ 答案(錯)：缺氧致細胞內鈉/鈣增加(非鉀)。", "C": "NPWT暫時覆蓋,正確。", "D": "適時fasciotomy減害,正確。", "E": "延遲致intrinsic tightness/thumb adduction contracture,正確。"}, "cite": "Grabb and Smith's, 9th, Ch 102, p.3454", "conflict": ""}, {"id": "1055", "sub": "HND", "src": "GS", "years": [115], "stem": "關於手部燙傷後使用pressure garment，下列敘述何者錯誤？", "opts": {"A": "Garment 壓力建議落在24-28mmHg", "B": "Garment須至少穿戴6個月", "C": "每2-3個月需重新調整Garment鬆緊度", "D": "Garment 的使用主要是作用於Wound healing stage 的Proliferation stage", "E": "疤痕按摩及保濕有助於疤痕照護"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "壓力衣主要作用於remodeling/maturation期(非proliferation),D有誤。", "peropt": {"A": "壓力24-28mmHg,正確。", "B": "至少穿6個月,正確。", "C": "每2-3月調整鬆緊,正確。", "D": "◎ 答案(錯)：主要作用於remodeling/maturation期(非proliferation)。", "E": "疤痕按摩+保濕,正確。"}, "cite": "Grabb and Smith's, 9th, Ch 101, p3414", "conflict": ""}, {"id": "1056", "sub": "HND", "src": "GS", "years": [115], "stem": "下列何者為最常見之手部原發性骨腫瘤 (Primary bone tumor)?", "opts": {"A": "Enchondromas", "B": "Osteosarcoma", "C": "Osteoma", "D": "Bone cyst", "E": "Ewing Sarcoma"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Enchondroma為最常見之手部原發性骨腫瘤，約佔手部原發性骨腫瘤的~90%；好發近節指骨，可致病理性骨折。", "peropt": {"A": "◎ Enchondroma為手部最常見原發性骨腫瘤(~90%)。", "B": "✗ Osteosarcoma於手部極罕見，非最常見；手部原發惡性骨腫瘤本身罕見。", "C": "✗ Osteoma非手部最常見原發性骨腫瘤(enchondroma才是)。", "D": "✗ 單純性骨囊腫(bone cyst)非手部最常見原發性骨腫瘤。", "E": "✗ Ewing sarcoma罕見於手部，非最常見。"}, "cite": "Grabb and Smith's, 9th, Ch 99, p3360", "conflict": ""}, {"id": "1057", "sub": "HND", "src": "GS", "years": [115], "stem": "關於Dupuytren disease (DD)，下列敘述何者正確？(複選)", "opts": {"A": "大部分的DD患者皆有嚴重的Finger flexion contracture問題。", "B": "為一個遺傳性慢性纖維化導致Finger contracture的疾病", "C": "若以Collagenase治療， MP joints 對治療的效果優於PIP joint.", "D": "DD好發於食指及中指", "E": "好發於有家族史的高齡女性"}, "ans": "BC", "multi": true, "etype": "ai", "expl": "", "key": "正確BC;好發環指/小指(非食指中指)、好發家族史高齡男性(非女性)、多數非嚴重contracture。", "peropt": {"A": "✗非大部分皆嚴重contracture(多輕/漸進)。", "B": "◎ 遺傳性慢性纖維化致finger contracture,正確。", "C": "◎ collagenase:MP joint療效優於PIP,正確。", "D": "✗好發環指及小指(非食指中指)。", "E": "✗好發有家族史高齡『男性』(非女性)。"}, "cite": "Grabb and Smith's, 9th, Ch98", "conflict": ""}, {"id": "1058", "sub": "HND", "src": "GS", "years": [115], "stem": "Flatt classification 對於thumb duplication分類：\n\nI. Bifid distal phalanx / II. Duplicated distal phalanx / III. Bifid proximal phalanx / IV. Duplicated proximal phalanx / V. Bifid metacarpal / VI. Duplicated metacarpal / VII. Triphalangism\n\n其盛行率由高至低排列何者正確？", "opts": {"A": "I > VI > III > V > II", "B": "IV > VII > II > V > I", "C": "IV > I > VII > II > V", "D": "IV > I > II > III > VI", "E": "I > II > V > III > IV"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Flatt/Wassel拇指多指盛行率順序：IV > VII > II > V > I(Type IV最常見~47%、Type VII三指節拇指次之~20%)。", "peropt": {"A": "✗ 順序有誤；正確盛行率為 IV > VII > II > V > I。", "B": "◎ IV > VII > II > V > I。", "C": "✗ 順序有誤；正確為 IV > VII > II > V > I。", "D": "✗ 順序有誤；正確為 IV > VII > II > V > I。", "E": "✗ 順序有誤；正確為 IV > VII > II > V > I。"}, "cite": "Grabb and Smith's, 9th, Chapter 103, p. 1070-1071", "conflict": ""}, {"id": "1059", "sub": "HND", "src": "GS", "years": [115], "stem": "關於Swan neck deformity以及Boutonnière deformity的成因及評估，下列敘述哪些正確？(複選)", "opts": {"A": "Swan neck deformity只因PIP關節錯位而起，但Boutonnière deformity通常是因DIP,PIP,MCP關節處的肌腱不平衡而引起", "B": "Swan neck deformity通常無法做出composite fist而需要治療，Boutonnière deformity則通常flexion正常但治療困難且難以預測療效", "C": "Finochietto-Bunnell test是評估PIP motion with MCP in flexion and extension來測試是否有intrinsic tightness", "D": "Swan neck deformity之Nalebuff分類Type II為DIP joint flexibility with intrinsic tightness", "E": "Boutonnière deformity之分類Stage II為moderate PIP flexion deformity with lag greater than 40°"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "正確BCE;A(swan neck成因過度簡化)、D(Nalebuff type II標示有誤)為錯。", "peropt": {"A": "✗swan neck非只因PIP錯位(多因素:mallet/intrinsic tightness/FDS等)。", "B": "◎ swan neck常無法composite fist需治療;boutonniere治療難預測,正確。", "C": "◎ Finochietto-Bunnell test評估intrinsic tightness,正確。", "D": "✗Nalebuff swan neck type II標示有誤(為PIP隨MCP位置變化,非DIP)。", "E": "◎ boutonniere stage II=moderate PIP flexion deformity(lag>40°),正確。"}, "cite": "Grabb and Smith's, 9th, Chapter 105, p.940", "conflict": ""}, {"id": "1060", "sub": "HND", "src": "GS", "years": [115], "stem": "45歲病人患有forearm ulnar shaft sarcoma，接受過術前電療後，預期手術切除10 cm長的ulnar bone。若病人希望能完成手術後準時於兩個月後舉行婚禮，則在此時效性下最佳的重建方式為：", "opts": {"A": "無需重建骨缺損，forearm穩定度有radius即可", "B": "放置抗生素骨水泥spacer做暫時性固定(provisional fixation)", "C": "使用non-vascularized corticocancellous graft加上內固定", "D": "使用無焊接且size配對的ulnar shaft異體骨移植(allograft)", "E": "使用free vascularized bone transfer加上內固定"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "放療後、10cm ulna缺損、時效佳→free vascularized bone transfer+內固定為最佳。", "peropt": {"A": "✗ulna缺損需重建(穩定/前臂旋轉),radius alone不足。", "B": "✗cement spacer僅暫時。", "C": "✗non-vascularized graft於10cm+放療床癒合差。", "D": "✗allograft於放療床不癒合率高。", "E": "◎ 答案:free vascularized bone transfer+內固定。"}, "cite": "Grabb and Smith's, 9th, Chapter 107, p.1123", "conflict": ""}, {"id": "1086", "sub": "HND", "src": "NG", "years": [104, 107, 115], "stem": "下列關於上肢移植(upper limb allotransplantation)術後排斥現象(rejection)的敘述何者錯誤？", "opts": {"A": "肌肉是排斥反應最主要的目標，因此觀察移植肢體的運動功能是最重要的臨床監測項目", "B": "術後一年內若移植肢體皮膚出現疑似排斥反應，則應進行皮膚切片檢查", "C": "Banff classification是評估急性排斥反應(acute rejection)的分類法，最嚴重為grade IV", "D": "臨床急性排斥的表現包括皮膚水腫(edema). 紅斑(erythema)及掌面脫屑(palmar scaling)等", "E": "慢性排斥反應的組織學檢查可見到血管內膜增生(intima hyperplasia). 肌肉或組織纖維化(fibrosis)等"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "皮膚(非肌肉)是排斥主要標的;以觀察皮膚(非運動功能)監測最重要。", "peropt": {"A": "◎ 答案(錯)：皮膚(非肌肉)是排斥主要標的;監測皮膚(非運動功能)最重要。", "B": "一年內皮膚疑似排斥→皮膚切片，正確。", "C": "Banff分類評估急性排斥、最重grade IV，正確。", "D": "急性排斥:edema、erythema、掌面脫屑，正確。", "E": "慢性排斥:intimal hyperplasia、fibrosis，正確。"}, "cite": "Neligan 5th ed., Vol. 6, Ch 41（Upper extremity composite", "conflict": ""}, {"id": "1087", "sub": "HND", "src": "NG", "years": [104, 110, 112, 114, 115], "stem": "關於小兒骨頭生長板傷害(physeal injuries)的敘述何者錯誤？", "opts": {"A": "創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染. 腫瘤及輻射線暴露等也會影響骨頭生長", "B": "Salter-Harris classification是最為廣泛使用的分類法", "C": "Peterson type VI是開放性傷害伴隨有生長板的損失(loss of the physis)，相當於Salter-Harris type V", "D": "Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign", "E": "Salter-Harris type III & IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Peterson type VI(生長板部分損失)『非』等同Salter-Harris V(SH V為crush injury);C敘述有誤。", "peropt": {"A": "創傷最常見+感染/腫瘤/輻射，正確。", "B": "Salter-Harris最廣泛使用，正確。", "C": "◎ 答案(錯)：Peterson VI非等同SH V。", "D": "SH II最常見+Thurston-Holland sign，正確。", "E": "SH III/IV牽涉germinal layer+關節面，正確。"}, "cite": "Neligan Volume 6, p654-655", "conflict": ""}, {"id": "1088", "sub": "HND", "src": "NG", "years": [104, 114], "stem": "下列關於上肢infantile hemangioma(IH)的敘述何者正確？", "opts": {"A": "IH約在兩週大時開始出現，前九個月內為proliferating phase生長迅速", "B": "90%的病患靠病史詢問及理學檢查就能確診", "C": "切片檢查對於診斷通常不太需要，其中對於GLUT1(a glucose transporter)的免疫染色可提供鑑別診斷", "D": "治療以觀察為主，但若出現嚴重傷口問題或病灶過大引起功能障礙則考慮手術治療", "E": "以上皆正確"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "以上皆正確(IH~2週出現、90%臨床診斷、GLUT1染色鑑別、以觀察為主嚴重才手術)。", "peropt": {"A": "IH~2週出現,前9月proliferating，正確。", "B": "90%靠病史+理學診斷，正確。", "C": "切片少需要,GLUT1染色鑑別，正確。", "D": "以觀察為主,嚴重才手術，正確。", "E": "◎ 以上皆正確。"}, "cite": "Neligan Volume 6, p672-673", "conflict": ""}, {"id": "1134", "sub": "HND", "src": "NG", "years": [106, 115], "stem": "Which of the following statement is incorrect about congenital trigger thumb?", "opts": {"A": "Controversy continues as to whether this is a true congenital condition or whether it is an acquired condition.", "B": "Notta's node is usually palpable distal to the A1 pulley in children with a locked extension deformity", "C": "Some children may have spontaneous resolution", "D": "Caution should be taken not to injury the neurovascular bundles during surgical release", "E": "Rare persistent deformity after surgical release"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Notta's node在A1 pulley近端、locked『flexion』deformity;此選項(distal+extension)有誤。", "peropt": {"A": "congenital vs acquired有爭議，正確。", "B": "◎ 答案(錯)：Notta's node在A1近端、locked flexion(非distal/extension)。", "C": "部分可自行緩解，正確。", "D": "小心NV bundle，正確。", "E": "術後少殘留變形，正確。"}, "cite": "Neligan Volume 6, Chapter 29, P.648-9", "conflict": ""}, {"id": "1135", "sub": "HND", "src": "NG", "years": [106, 114], "stem": "Which is the most common type of growth plate fracture by Salter-Harris classification?", "opts": {"A": "Type I", "B": "Type II", "C": "Type III", "D": "Type IV", "E": "Type V"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Salter-Harris最常見=Type II(~75%，Thurston-Holland fragment)。", "peropt": {"A": "Type I=僅通過physis。", "B": "◎ Type II最常見(通過metaphysis)。", "C": "Type III=通過epiphysis至關節面。", "D": "Type IV=跨metaphysis-physis-epiphysis。", "E": "Type V=擠壓傷(crush)。"}, "cite": "Neligan 5th, Vol 6, Ch 39, p 912", "conflict": ""}, {"id": "1136", "sub": "HND", "src": "NG", "years": [106, 115], "stem": "Which of following statement about hemangioma is correct?", "opts": {"A": "Infantile hemangioma (IH) has three phase (proliferative phase, involuting phase, involution phase)", "B": "Most IH are managed by observation", "C": "Rapid involuting congenital hemangioma (RICH) involutes rapidly after birth and completely involuted by 14 months of age", "D": "Noninvoluting congenital hemangioma (NICH) does not regress and persists as raised, plaque-like lesions", "E": "All statements are correct"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "以上皆正確(IH三期、多觀察、RICH~14月消退、NICH不退)。", "peropt": {"A": "IH三期，正確。", "B": "多觀察，正確。", "C": "RICH~14月完全消退，正確。", "D": "NICH不消退為plaque，正確。", "E": "◎ 以上皆是。"}, "cite": "Neligan Volume 6, Chapter 31, P.674", "conflict": ""}, {"id": "1144", "sub": "HND", "src": "NG", "years": [107, 112, 114], "stem": "下列關於手部intrinsic muscles的敘述何者為是?", "opts": {"A": "Thenar muscles包含三塊肌肉: the abductor pollicis brevis, the adductor pollicis muscle and the opponens pollicis", "B": "Lumbrical muscles伸直MP joints併彎曲PIP and DIP joints", "C": "Dorsal interosseous muscles外展拇指及橈側三指，palmar interosseous muscles則是內收手指", "D": "Pitres–Testut sign是medial nerve受傷的徵象，病人無法靈活的左右搖擺中指", "E": "病人若無法做出\"crossing fingers\"，要懷疑有medial nerve受傷的可能"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Dorsal interossei外展(DAB)、palmar interossei內收(PAD)。Lumbricals屈MCP伸IP;Pitres-Testut/crossing fingers為尺神經。", "peropt": {"A": "✗Thenar三肌=APB、FPB、opponens pollicis(adductor pollicis非thenar三肌)。", "B": "✗Lumbricals屈MCP、伸PIP/DIP(本選項寫反)。", "C": "◎ Dorsal interossei外展(DAB)、palmar interossei內收(PAD)，正確。", "D": "✗Pitres-Testut sign為尺神經徵象。", "E": "✗無法crossing fingers應懷疑尺神經(靠骨間肌)。"}, "cite": "Neligan, 5th Edition, vol.6, Ch1 p31-37, Ch2 p61", "conflict": ""}, {"id": "1152", "sub": "HND", "src": "NG", "years": [107, 114], "stem": "複選2. 請選出Classification of Salter–Harris fractures的正確分類 (複選)", "opts": {"A": "Type 1 is through the physis", "B": "Type 2 extends from the physis toward the shaft", "C": "Type 3 extends from the physis toward the joint", "D": "Type 4 starts in the shaft and extends through the physis and into the joint", "E": "Type 5 is a crush injury of the physis"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Salter–Harris分類（SALTR助記）：Type I經physis；Type II由physis延向metaphysis/shaft（Thurston-Holland fragment）；Type III由physis延向關節（epiphysis）；Type IV跨metaphysis-physis-epiphysis進入關節；Type V為physis之crush injury（預後最差）。本題複選『正確』分類，全部正確。⚠ 跨版（Neligan 3e vs 5e）題幹數值略異，分類定義一致。", "peropt": {"A": "◎ Type 1穿過physis，正確。", "B": "◎ Type 2由physis延向shaft（metaphysis），正確。", "C": "◎ Type 3由physis延向關節（epiphysis），正確。", "D": "◎ Type 4起於shaft跨physis進入關節，正確。", "E": "◎ Type 5為physis之crush injury，正確。"}, "cite": "待複查（NG／Salter–Harris 分類 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同 ⚠ 同題歷屆重出：Salter–Harris fracture分類『複選』，Type1-5定義選項與答案完全相同(ABCDE)。107年(1152)與114年(1301)僅stem前綴略異。"}, {"id": "1157", "sub": "HND", "src": "NG", "years": [107, 114], "stem": "According to Bayne classification of ulnar longitudinal deficiency, total ulnar aplasia is classified to type?", "opts": {"A": "I", "B": "II", "C": "III", "D": "IV", "E": "V"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Bayne尺骨縱向缺損(ulnar longitudinal deficiency)分類(原分類僅Type I–IV)：Type I＝ulnar hypoplasia(兩端physis存在)；Type II＝部分ulnar aplasia(最常見，有遠端ulnar anlage)；Type III＝total ulnar aplasia(完全缺如)；Type IV＝radiohumeral synostosis。故total ulnar aplasia＝Type III。", "peropt": {"A": "✗ Type I＝ulnar hypoplasia(兩端physis在)，非total aplasia。", "B": "✗ Type II＝部分ulnar aplasia(最常見，有ulnar anlage)，非total aplasia。", "C": "◎ Type III＝total ulnar aplasia(尺骨完全缺如)。", "D": "✗ Type IV＝radiohumeral synostosis，非total aplasia。", "E": "✗ Bayne原始分類僅Type I–IV，並無Type V；total ulnar aplasia應歸Type III。"}, "cite": "Neligan 5th, Vol 6, Ch 34, p.813", "conflict": ""}, {"id": "1190", "sub": "HND", "src": "NG", "years": [108, 114, 115], "stem": "下列有關先天性手指畸形的手術時機, 何者錯誤?", "opts": {"A": "Simple syndactyly: 12 months", "B": "Constriction ring syndrome(digit at risk): immediate", "C": "Thumb hypoplasia: 3 months", "D": "Trigger thumb: After 12 months", "E": "Absent or inadequate thumb: 12–18 months"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "拇指發育不良(thumb hypoplasia)重建時機非3個月，多在~1歲以後。", "peropt": {"A": "Simple syndactyly約12個月，正確。", "B": "Constriction ring(危及手指)須即刻處理，正確。", "C": "◎ 答案(錯)：thumb hypoplasia重建時機非3個月(pollicization/重建多在~1歲後)。", "D": "Trigger thumb 12個月後，正確。", "E": "缺/不足拇指12-18個月，正確。"}, "cite": "Neligan 5th, Vol 6, Ch 32,768", "conflict": ""}, {"id": "1192", "sub": "HND", "src": "NG", "years": [108, 114], "stem": "關於併指(syndactyly), 下列敘述何指錯誤?", "opts": {"A": "Familial syndactyly 所佔的比例是 15~40%", "B": "最常發生的是digit 2-3 的併指", "C": "Syndactyly 可以分為 incomplete, complete, complex, or complicated", "D": "Complicated syndatyly 指的是有 abnormal bone structure inside to syndactyly with fusions, rudimentary bones, missing bones, abnormal joints, and sometimes cross bones", "E": "Syndactyly 可以單獨出現, 或者合併其他syndrome 出現, 如Poland syndrome 或 Apert syndrome"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "最常見併指為第3-4指(long-ring)。", "peropt": {"A": "Familial syndactyly佔15-40%，正確。", "B": "◎ 答案(錯)：最常見為第3-4指(long-ring)併指，非2-3指。", "C": "分incomplete/complete/complex/complicated，正確。", "D": "complicated含異常骨結構(fusion、rudimentary/missing bones、異常關節、cross bones)，正確。", "E": "可單獨或合併syndrome(Poland、Apert)，正確。"}, "cite": "Neligan 5th, Vol 6, Ch 35, p 824-826", "conflict": ""}, {"id": "1196", "sub": "HND", "src": "NG", "years": [108, 109, 110, 112, 113, 114, 115], "stem": "關於target muscle reinnervation for shoulder disarticulation, 以下敘述何者正確?", "opts": {"A": "Musculocutaneous Nerve → Clavicle head of Pectoralis Major", "B": "Median Nerve → The largest motor nerve innervating sternal head of pectoralis major", "C": "Radial nerve → thoracodorsal or long thoracic nerve", "D": "Ulnar Nerve → Lateral motor nerve innervating sternal head of pectoralis major or minor", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "以上皆是(標準shoulder disarticulation TMR神經配置)。", "peropt": {"A": "Musculocutaneous→pec major鎖骨頭，正確。", "B": "Median→pec major胸骨頭最大運動神經，正確。", "C": "Radial→thoracodorsal或long thoracic，正確。", "D": "Ulnar→pec major/minor胸骨頭外側運動神經，正確。", "E": "◎ 以上皆是。"}, "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, chapter 40, page 901", "conflict": ""}, {"id": "1207", "sub": "HND", "src": "NG", "years": [109, 111, 112, 113, 114], "stem": "關於Tendon repair，以下哪種縫合法是two strands?", "opts": {"A": "Modified Savage", "B": "Modified Kessler", "C": "Winters-Gelberman mothod", "D": "Strickland", "E": "All of above"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Modified Kessler=2-strand core suture。Savage=6股、Strickland=4股、Winters-Gelberman=多股，皆非2股。", "peropt": {"A": "✗ Modified Savage=6股(6-strand)，非2股。", "B": "◎ Modified Kessler=2股 core suture(2-strand)。", "C": "✗ Winters-Gelberman 為多股修補(non-2-strand)，非2股。", "D": "✗ Strickland=4股(4-strand)，非2股。", "E": "✗ 僅 Kessler 為2股，非全部。"}, "cite": "Neligan, 4th Edition, vol.6, Ch9 p200-201", "conflict": ""}, {"id": "1217", "sub": "HND", "src": "NG", "years": [109, 110, 111, 112, 113, 115], "stem": "下列關於Raynaud's disease與Raynaud syndrome的比較，何者錯誤？", "opts": {"A": "兩者都有triphasic color change。", "B": "Raynaud's disease較好發於女性。", "C": "Raynaud syndrome常有trophic findings。", "D": "Raynaud syndrome較常呈現異常Allen test。", "E": "Raynaud syndrome的症狀較對稱。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題選『錯誤』。Raynaud's disease（原發）vs syndrome（次發）：兩者皆有 triphasic color change；disease 好發女性；syndrome 常有 trophic findings、Allen test 常異常、且呈『不對稱』。核心錯誤：Raynaud syndrome 症狀為『不對稱』（disease 才對稱），故 E 錯誤。", "peropt": {"A": "✗（正確敘述）兩者皆有 triphasic color change（白-藍-紅）。", "B": "✗（正確敘述）Raynaud's disease（primary）較好發於女性。", "C": "✗（正確敘述）Raynaud syndrome（secondary）常有 trophic findings。", "D": "✗（正確敘述）Raynaud syndrome 較常呈現異常 Allen test。", "E": "◎ ＝錯誤敘述）Raynaud syndrome 症狀為『不對稱(asymmetric)』，disease 才較對稱。"}, "cite": "待複查（NG 手外科 Raynaud 比較 記憶佐證）", "conflict": "⚠ 同題歷屆重出：Raynaud's disease vs syndrome比較『何者錯誤』題，錯誤選項恆為「Raynaud syndrome症狀較對稱」(syndrome多不對稱)。109/110/111/115年(1217)答E、112/113年(1281)答B(僅選項順序不同)；記概念不記字母。"}, {"id": "1222", "sub": "HND", "src": "NG", "years": [109, 112, 113, 114, 115], "stem": "關於Apert syndrome,下列敘述何者正確? (複選)", "opts": {"A": "是因為fibroblast growth factor receptor 2 (FGFR2) 基因突變造成，大多數患者屬於自發性突變(sporadic)", "B": "上肢方面會出現brachyclinodactyly of the thumb, complex syndactyly of index/long/ring finger, symbrachyphalangism 和 simple syndactyly of the first web", "C": "手的變形可區分為三型：the flat, \"spade\" hand (type I), the constricted cupped, \"mitten\" hand (type II), 和the coalesced \"rosebud\" hand (type III)", "D": "針對併指矯正手術的進行：release of thumb and index or deepening of the first web and separation of digit 4 and 5, followed by separation of the other digits and correction of clinodactyly of the thumb", "E": "小孩子通常會有impaired language development and motor skills"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Apert syndrome：FGFR2 突變、多為 sporadic；手部畸形分三型（type I flat/spade、type II cupped/mitten、type III rosebud）；併指矯正先放鬆拇-食（加深第一指蹼）與分開 4-5 指，再分其餘指並矯正拇指 clinodactyly；孩童常有語言與動作發展遲緩。⚠ B 為事實置換誘答：Apert 為 symphalangism（非 symbrachyphalangism），故 B 不正確。", "peropt": {"A": "◎ FGFR2 突變，大多為 sporadic。", "B": "✗ 事實置換誘答——Apert 為 symphalangism（非 symbrachyphalangism），且併指/第一指蹼描述有誤，故不正確。", "C": "◎ 手部畸形分三型（type I flat/spade、type II cupped/mitten、type III rosebud）。", "D": "◎ 併指矯正順序：先放鬆拇-食/加深第一指蹼並分 4-5 指，再分其餘指並矯正拇指 clinodactyly。", "E": "◎ 孩童常有語言與動作發展遲緩。"}, "cite": "待複查（NG 手外科 Apert syndrome 記憶佐證）", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG115-B17-Q11） ⚠ 同題歷屆重出：Apert syndrome之FGFR2遺傳、手部三型分類(spade/mitten/rosebud)、併指矯正手術順序題；錯誤選項恆為「brachyclinodactyly of thumb + complex syndactyly...」敘述。109/112/114年(1222)答ACDE、113年(1295)答BCDE、115年(1335)答ACDE(僅選項順序不同)；另115年第E選項由『impaired language development』改為『shoulder motion restriction』，故該年錨定E；記概念不記字母。"}, {"id": "1229", "sub": "HND", "src": "NG", "years": [108, 109, 110, 112, 113, 114], "stem": "關於upper limb allotransplantation術後排斥現象(rejection)的敘述何者錯誤?", "opts": {"A": "急性排斥是接受者的T-cell或antibody所以引發的免疫反應", "B": "皮膚是排斥反應最主要的目標，因此觀察皮膚的變化是最重要的臨床監測項目", "C": "移植術後一年內如果皮膚出現排斥的表現, 或者滿一年就應安排皮膚切片檢查", "D": "急性排斥的嚴重程度是依照Banff classification做分類", "E": "急性排斥在顯微鏡下的表現包括intimal hyperplasia and sub-intimal foamy histiocytes in the vessels of the skin, or muscle and tissue fibrosis"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "intimal hyperplasia、foamy histiocytes、纖維化為『慢性』排斥特徵，非急性。急性排斥=perivascular lymphocytic infiltrate、水腫、紅斑。", "peropt": {"A": "✗（正確敘述）急性排斥為 T-cell/antibody 媒介。", "B": "✗（正確敘述）皮膚是主要標的，以觀察皮膚為最重要監測。", "C": "✗（正確敘述）一年內出現排斥或滿一年應安排皮膚切片。", "D": "✗（正確敘述）依 Banff classification 分級。", "E": "◎ ＝錯誤敘述）intimal hyperplasia、sub-intimal foamy histiocytes、纖維化屬『慢性(chronic)』排斥；急性=血管周淋巴球浸潤、水腫、紅斑。"}, "cite": "Plastic Surgery, 4th edition, Neligan, Peter C. Volume VI, Chapter 38, page 872, 873", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG108-B15-Q07） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG110-B16-Q06） ⚠ 同題歷屆重出：upper limb allotransplantation排斥『何者錯誤』題，錯誤選項恆為E(顯微鏡下intimal hyperplasia+sub-intimal foamy histiocytes為慢性排斥表現，非急性)，答案均為E。108/110年(1198)與109/112/113/114年(1229)為同題；選項C(切片時機)文字略經修訂，其餘相同。"}, {"id": "1231", "sub": "HND", "src": "NG", "years": [110, 113, 114, 115], "stem": "Regarding hand biomechanics: （複選）", "opts": {"A": "All the fingers converge in a cone over the anatomical center of the hand - the long finger MCPJ", "B": "In the correct alignment, all fingers point to the tubercle of the scaphoid bone when flexed individually", "C": "The collateral ligaments of the MCPJ are loose in extension and tight in flexion", "D": "FDP to 3rd, 4th and 5th digits work from a common muscle belly and is less independent, but each FDS has individual muscle bellies and can act independently", "E": "Intrinsic muscles of the hand flex the MCPJ but extend the IPJ"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 手部生物力學（全部正確）：屈曲匯聚成錐狀指向中指 MCPJ，單獨屈曲指向 scaphoid tubercle；MCPJ collateral ligaments 伸直鬆、屈曲緊（cam effect，故固定於 intrinsic-plus 位）；中/環/小指 FDP 共用肌腹，各 FDS 獨立；intrinsic 屈 MCPJ 伸 IPJ。", "peropt": {"A": "◎ 手指屈曲匯聚成錐狀指向手部解剖中心（中指 MCPJ）。", "B": "◎ 正確對線時各指單獨屈曲皆指向 scaphoid tubercle。", "C": "◎ MCPJ collateral ligaments 伸直時鬆、屈曲時緊（cam effect）。", "D": "◎ 中/環/小指 FDP 共用肌腹較不獨立；各 FDS 有獨立肌腹可獨立作動。", "E": "◎ 手內在肌屈 MCPJ 並伸 IPJ（intrinsic-plus 位）。"}, "cite": "待複查（NG 手外科 手部生物力學 記憶佐證）", "conflict": "⚠ 同題歷屆重出：hand biomechanics『複選』題，選項B由『fingers point to scaphoid bone tubercle when flexed』(110/113年,1231,為真→答ABCDE)改為『point to hamate bone tubercle』(114/115年,1298,為誤→答ACDE)；作答錨定正確為scaphoid tubercle。"}, {"id": "1253", "sub": "HND", "src": "NG", "years": [109, 111, 112, 114], "stem": "下列各種臂神經叢regional block的方式，何種相對適用於有pulmonary disease或是coagulopathy的病人？", "opts": {"A": "Interscalene block.", "B": "Axillary block.", "C": "Infraclavicular block.", "D": "Supraclavicular block.", "E": "All of above."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Axillary block 遠離胸膜(氣胸風險最低)、表淺可壓迫止血→肺病/凝血病最安全。Interscalene 近100% phrenic 麻痺；Supraclavicular 氣胸風險最高。", "peropt": {"A": "✗ Interscalene→幾乎100% phrenic nerve 麻痺、近胸膜，肺病不宜。", "B": "◎ Axillary block：遠離胸膜、氣胸風險最低，位置表淺可壓迫止血→肺病/凝血病最安全。", "C": "✗ Infraclavicular→仍有氣胸風險、位置較深不易壓迫止血。", "D": "✗ Supraclavicular→最近胸膜，氣胸風險最高。", "E": "✗ 僅 Axillary 適合，非全部。"}, "cite": "Neligan, 5th Edition, vol.6, Ch4 p102", "conflict": "⚠ 同題歷屆重出：臂神經叢regional block對pulmonary disease/coagulopathy相對適用者，正確答案恆為Axillary block。109年(1204)答D、111/112/114年(1253)答B(僅選項順序不同)；記概念不記字母。"}, {"id": "1254", "sub": "HND", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "關於Nail and fingertip reconstruction，下列何者為錯？", "opts": {"A": "甲床縫合時應避免過大的張力。", "B": "受傷後的nail deformity，建議要等至少8-12個月後再行評估重建。", "C": "Atasoy flap，Kutler flap 與 visor flap都是常用於fingertip重建。", "D": "使用defatted composite graft覆蓋傷口，小於十歲的兒童成功率會比成人高。", "E": "即使手指傷口只有一公分，使用皮瓣重建傷口會比secondary intention獲得更多好處，如形狀與感覺的恢復。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "~1cm 指尖小傷口 secondary intention 常癒合良好，皮瓣非必然更有利。distractor 數值(8-12 月重建評估、<10 歲 composite graft 成功率高)皆為正確敘述。", "peropt": {"A": "✗（正確敘述）甲床縫合應避免過大張力。", "B": "✗（正確敘述）nail deformity 建議等 8-12 個月後再評估重建。", "C": "✗（正確敘述）Atasoy/Kutler/visor flap 常用於指尖重建。", "D": "✗（正確敘述）defatted composite graft 在 <10 歲兒童成功率較成人高。", "E": "◎ ＝錯誤敘述）~1cm 指尖小傷口 secondary intention 常癒合良好、外形感覺佳，皮瓣非必然更有利。"}, "cite": "Neligan, 5th Edition, vol.6, Ch6 p127, 136-139", "conflict": "⚠ 同題歷屆重出：Nail/fingertip reconstruction『何者為錯』題，錯誤選項恆為「即使1公分傷口用皮瓣重建也優於secondary intention」。109年(1205)答C、111/112/114/115年(1254)答E(僅選項順序不同)；記概念不記字母。"}, {"id": "1255", "sub": "HND", "src": "NG", "years": [111, 112, 114, 115], "stem": "下列關於手部骨折的敘述，何者為錯？", "opts": {"A": "掌骨骨折手術適應症包含：rotational deformity、shortening of 2–3 mm、articular step-off greater than 1 mm、greater than 25% articular involvement、and multiple fractures。", "B": "PIP joint fracture, 若middle phalangeal base於關節面受損比例小於百分之三十，可以不用手術治療。", "C": "生長板骨折（Growth plate fracture）在Salter–Harris classification 中，type II是最常見的。", "D": "對於生長板還沒關閉的小兒骨折，K-wire穿過生長板是絕對禁止，因為可能會造成生長板提早關閉。", "E": "關於Bennett fracture，Bennett fragment由於anterior oblique ligament會留在原處，而剩餘的metacarpal由於APL及adductor pollicis muscles的作用下，會造成橈側背側近側脫位（radial, dorsal, proximal subluxation）。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "小兒骨折必要時可用光滑 K-wire 穿越生長板，非絕對禁忌。distractor 數值(短縮 2-3mm、step-off >1mm、>25%、PIP <30%)皆為正確手術/保守門檻。", "peropt": {"A": "✗（正確敘述）掌骨骨折手術適應症：旋轉畸形、短縮 2-3mm、關節面 step-off >1mm、關節面受累 >25%、多發骨折。", "B": "✗（正確敘述）PIP 骨折 middle phalanx base 關節面受損 <30% 可保守。", "C": "✗（正確敘述）Salter-Harris type II 最常見。", "D": "◎ ＝錯誤敘述）必要時可用『光滑(smooth)』K-wire 穿越生長板(對生長干擾小)，非絕對禁忌。", "E": "✗（正確敘述）Bennett 機制：anterior oblique ligament 固定 Bennett 骨塊，其餘掌骨受 APL+adductor pollicis 牽拉→橈側背側近側脫位。"}, "cite": "Neligan, 5th Edition, vol.6, Ch7 p149, 152, 153, 159, 169", "conflict": ""}, {"id": "1256", "sub": "HND", "src": "NG", "years": [111, 113, 114, 115], "stem": "以下哪種狀況是Replantation手術的\"absolute\" contraindication？", "opts": {"A": "Mentally unstable patients.", "B": "Multiple segmental injury in the amputated part.", "C": "A patient with life-threatening injuries or multiple medical problems.", "D": "Prolonged warm ischemia time.", "E": "Extreme contamination."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 再植『絕對』禁忌＝病人合併危及生命傷害或多重內科問題(全身不穩，救命優先)。精神不穩、多段損傷、長溫缺血、極度污染皆為『相對』禁忌。", "peropt": {"A": "✗ 精神狀態不穩為『相對』禁忌。", "B": "✗ 斷肢多段損傷為『相對』禁忌。", "C": "◎ 合併危及生命傷害或多重內科問題為『絕對』禁忌（救命優先於救肢）。", "D": "✗ 長時間溫缺血(prolonged warm ischemia)為『相對』禁忌。", "E": "✗ 極度污染為『相對』禁忌。"}, "cite": "待複查（NG 手外科 再植禁忌症 記憶佐證）", "conflict": ""}, {"id": "1257", "sub": "HND", "src": "NG", "years": [108, 111, 112, 113, 114, 115], "stem": "下列關於手部 extensor 的敘述何者正確？ (複選)", "opts": {"A": "第二跟第三個compartment 間可摸到一個突起，稱為 Lister's tubercle。", "B": "De Quervain's disease 發生在手腕 extensor retinaculum 的第二個 compartment。", "C": "EIP tendon 位於食指 EDC 的 radial site，而 EDM tendon 則位於小指的 ulnar site。", "D": "第四個 compartment 包含五條手指的伸肌腱 (four extensor digitorum communis EDC tendons和extensor indicis propius EIP tendon)。", "E": "第三個 compartment 的 extensor pollicis longus tendon 會在 extensor carpi radialis longus and brevis 上方橫越過第二個 compartment。"}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "正確為 ADE。De Quervain 在第1 compartment(APL+EPB)；EIP 位於食指 EDC 的尺側/深側(非橈側)。", "peropt": {"A": "◎ Lister's tubercle 在第2/3 compartment 間。", "B": "✗ De Quervain's disease 在『第1』compartment(APL+EPB)，非第2。", "C": "✗ EIP 位於食指 EDC 的『尺側/深側(ulnar/deep)』，非橈側；EDM 位於小指 EDC 尺側。", "D": "◎ 第4 compartment 含 4 條 EDC + EIP(共5條)。", "E": "◎ 第3 compartment 的 EPL 繞 Lister's tubercle 跨越第2 compartment(ECRL/ECRB)上方。"}, "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 6. Ch 10. P228.", "conflict": "⚠ 同題歷屆重出：手部extensor『何者正確(複選)』題，正確選項恆為Lister's tubercle、第四compartment(4條EDC+EIP)、EPL橫越第二compartment；錯誤為de Quervain位於第二compartment、EIP位於EDC橈側。108年(1181)答BCD、111/112/113/114/115年(1257)答ADE(僅選項順序不同)；記概念不記字母。"}, {"id": "1265", "sub": "HND", "src": "NG", "years": [109, 110, 111, 114], "stem": "下列關於hypoplastic thumb的敘述，何者正確？(複選)", "opts": {"A": "Type I如要手術一般只需要使用local flap，進行first webspace widening即可", "B": "Type II的thenar musculature發育不佳且合併adduction 及metacarpal–phalangeal (MP) joint laxity。", "C": "Type III依據carpometacarpal joint是否穩定分為IIIA和IIIB。", "D": "Type IV及type V的手術方式首選為index finger pollicization。", "E": "Type V稱為pouce flottant。"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "A. Type I hypoplastic thumbs very rarely need any surgical treatment. Of all the methods available, the four-flap Z-plasty provides the best contour and appearance (Fig. 27.15). Dorsal transposition flaps from the index finger and rotation flaps are effective but require skin grafting on the visible dorsal surface of the hand. (p.605)\n\nB. The first webspace is short with the thumb adducted, the ulnar collateral ligament at the MP joint lax, and median innervated thenar muscles underdeveloped or occasionally absent (p.597)\n\nC. Manske and colleagues to subdivide this group into type IIIA with a full-length metacarpal and an intact CMC joint and type IIIB with a tapered first metacarpal and no CMC joint. (p.598)\n\nD. Type IV: floating thumb Index finger pollicization is the treatment of choice (see Fig. 27.7) unless there are too many cultural or parental concerns, in which case alternatives noted above can be used. Type V: aplasia Index finger pollicization is the treatment of choice (see Fig. 27.8). (p.607)\n\nE. Type IV稱為pouce flottant、floating thumb、pendeldaumen。(p.598)", "key": "正確 ABCD。pouce flottant(floating thumb)為 Type IV，非 Type V(V=aplasia)。Blauth 分類。", "peropt": {"A": "◎ Type I 手術僅需 local flap 做 first web widening(多數免手術)。", "B": "◎ Type II：thenar 發育不良+adduction+MCP joint laxity。", "C": "◎ Type III 依 CMC 穩定度分 IIIA(穩定)/IIIB(不穩)。", "D": "◎ Type IV/V 首選 index finger pollicization。", "E": "✗ pouce flottant(floating thumb)為 Type IV，非 Type V(V=完全 aplasia)。"}, "cite": "Neligan 5th, Vol 6, Ch 34, p 801-803,806", "conflict": "⚠ 同題歷屆重出：hypoplastic thumb『複選正確』題，選項A由『Type I一般只需用local flap行first webspace widening』(109/110年,1221,為非→答BCD)改為『Type I如要手術一般只需用local flap...』(111/114年,1265,加上『如要手術』後為真→答ABCD)；E『Type V稱pouce flottant』兩版皆為錯誤選項；記概念不記字母、錨定該年A選項真偽。"}, {"id": "1269", "sub": "HND", "src": "NG", "years": [111, 114], "stem": "下列何者pyogenic granuloma 的描述有誤？", "opts": {"A": "有莖的單獨紅色腫塊", "B": "男性較多", "C": "生成緩慢且逐漸變大", "D": "好發在上肢", "E": "常發生潰瘍且持續性的流血"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "pyogenic granuloma 生長『快速』(數週迅速變大)，非緩慢。", "peropt": {"A": "✗（正確敘述）有莖(pedunculated)單一紅色腫塊。", "B": "✗（正確敘述）男性較多。", "C": "◎ ＝錯誤敘述）pyogenic granuloma 生長『快速』(數週內迅速變大)，非緩慢。", "D": "✗（正確敘述）好發上肢/手。", "E": "✗（正確敘述）常潰瘍且反覆流血。"}, "cite": "Neligan 5th, Vol 6, Ch 37, p 875", "conflict": ""}, {"id": "1276", "sub": "HND", "src": "NG", "years": [111, 112, 113, 114], "stem": "關於手部構造的敘述，下列何者為錯？", "opts": {"A": "Kaplan's cardinal line與從中指尺側向內側延伸的縱向線的交點為正中神經運動支(motor branch of the median nerve)。", "B": "拇指及其掌骨在腕掌骨關節(carpometacarpal joint)具有廣泛的活動範圍。五個內在肌肉(intrinsic muscles)和四個外在肌肉(extrinsic muscles)對於拇指的定位(positioning)和活動具有特殊影響力。", "C": "Grayson's ligaments位於神經血管束(neurovascular bundle)的背側，Cleland's ligaments位於神經血管束的掌側，兩者為手指筋膜的組成成分，有助於固定軸向平面的皮膚(anchor the axial plane skin)。", "D": "腕舟骨的近端血液供應較差，於近端(proximal pole)骨折後易發生不癒合(nonunion)。", "E": "Checkrein ligament是一種不正常的結構，僅在纖維化後的近端指關節間(proximal interphalangeal joint)出現。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Grayson's ligament 在 NV bundle『掌側』、Cleland's 在『背側』(Grayson=Ground掌，Cleland=Ceiling背)。本選項將兩者對調故錯。", "peropt": {"A": "✗（正確敘述）Kaplan cardinal line 交點定位正中神經 recurrent motor branch。", "B": "✗（正確敘述）拇指 CMC 活動範圍大，5 內在肌+4 外在肌。", "C": "◎ ＝錯誤敘述）本選項對調：Grayson's ligament 在 NV bundle『掌側(volar)』、Cleland's 在『背側(dorsal)』(記憶 Grayson=Ground地/掌，Cleland=Ceiling天/背)。", "D": "✗（正確敘述）舟狀骨近端血供差(retrograde)、易 nonunion。", "E": "✗（正確敘述）Checkrein ligament 與 PIP 屈曲攣縮相關。"}, "cite": "Neligan, 4th Edition, vol.6, Chapter1 page 2, 5, 7, 10, 13", "conflict": "⚠陷阱對照｜NG114 陷阱在 C(Grayson/Cleland 背腹顛倒)，答 C；NG115 該選項已不存在，陷阱改到 A——『Kaplan line 交點是尺神經(ulnar)運動支』為錯(應為正中神經 median)，答 A。先鎖定該版是否出現 Kaplan line＋ulnar 敘述。 ｜ ⚠ 同題歷屆重出：手部構造『何者為錯』題，111年(1251)英文版、112/113/114年(1276)中文版為同題，答案均為C(Grayson's ligaments與Cleland's ligaments位置敘述顛倒)。"}, {"id": "1277", "sub": "HND", "src": "NG", "years": [111, 112, 113, 114, 115], "stem": "下列各項手部檢查，何者為錯？", "opts": {"A": "Eichoff test：要求患者的檢測手的四隻手指彎曲抓住檢測手拇指。患者的檢測手手腕向尺側偏移。這是為了檢測de Quervain's tenosynovitis.。", "B": "Phalen's test：將患者的手腕最大程度地向掌側彎曲(maximum palmar flexion)，保持2分鐘。這個測試被用作對carpal tunnel syndrome的一種刺激性測試。", "C": "Froment's test：要求患者在拇指的尺側指尖(ulnar tip of the thumb)和食指的橈側指尖(radial tip of the index finger)之間夾著一張紙。檢查者慢慢拉開紙，同時鼓勵患者繼續夾住紙。這是為了評估尺神經的運動功能。", "D": "Jeanne's test：患者將手放在桌子上，拇指朝上。檢查者向下按壓拇指近端指骨(proximal phalanx of the thumb)。這是為了de Quervain's tendinitis。", "E": "Wartenberg's sign：要求患者保持手指內收(fingers adducted)，並使MCP、PIP和DIP關節完全伸展(fully extended)。這是為了評估尺神經的運動功能。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "Jeanne's sign 為『尺神經』測試(key pinch 時拇指 MCP 過度伸展代償)，非 de Quervain。Froment/Wartenberg 亦為尺神經測試。", "peropt": {"A": "✗（正確敘述）Eichoff/Finkelstein test→de Quervain's tenosynovitis。", "B": "✗（正確敘述）Phalen's test→CTS 誘發測試。", "C": "✗（正確敘述）Froment's test→尺神經運動(adductor pollicis 無力、FPL 代償屈拇)。", "D": "◎ ＝錯誤敘述）Jeanne's sign 測『尺神經』(key pinch 時拇指 MCP 過度伸展代償)，非 de Quervain tendinitis。", "E": "✗（正確敘述）Wartenberg's sign→尺神經(小指無法內收)。"}, "cite": "Neligan, 4th Edition, vol.6, Ch2 p53, 60, 61", "conflict": "跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG115-B15-Q02） ⚠ 同題歷屆重出：手部檢查『何者為錯』題，錯誤選項恆為Jeanne's test敘述，答案均為D。111年(1252)為英文版、112/113/114年(1277)與115年(1319)為中文版；115年D選項改寫為『拿鑰匙捏紙、評估橈神經功能』(仍為錯誤敘述)，其餘Eichoff/Phalen/Froment/Wartenberg選項相同。"}, {"id": "1286", "sub": "HND", "src": "NG", "years": [112, 113, 114, 115], "stem": "關於timing of hand formation下列何者為是? (複選)", "opts": {"A": "Development of arm bud is 27 days after fertilization", "B": "Elongation of arm bud is 38-40 days after fertilization", "C": "Formation of hand paddle is 34-38 days after fertilization", "D": "Early separation of digits is 34-36 days after fertilization", "E": "Formation of fingernails begins is week 12-13 after fertilization"}, "ans": "AC", "multi": true, "etype": "ai", "expl": "", "key": "上肢發育時序：arm bud ~26-27 天、hand paddle ~34-38 天、手指分化(apoptosis)~47-53 天、指甲 ~week 10。", "peropt": {"A": "◎ arm bud(上肢芽)約受精後 26-27 天出現。", "B": "✗ 手臂芽伸長(elongation)約在受精後 ~33 天前後，非 38-40 天。", "C": "◎ hand paddle/plate(手板)約 34-38 天形成。", "D": "✗ 手指早期分離(digital separation, apoptosis)約在 47-53 天，非 34-36 天。", "E": "✗ 指甲(fingernail)約第 10 週(week 10)開始形成，非 12-13 週。"}, "cite": "Neligan, 4th Edition, vol.6, Ch25 p550", "conflict": ""}, {"id": "1288", "sub": "HND", "src": "NG", "years": [112, 113, 114, 115], "stem": "Hypoplastic thumb represents a wide spectrum of functional and aesthetic differences，根據分類 ，描述為the pouce flottant or floating thumb 為何種type ?", "opts": {"A": "Type I", "B": "Type II", "C": "Type III", "D": "Type IV", "E": "Type V"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Blauth 分類：Type IV＝pouce flottant(floating thumb)。IIIB(CMC 不穩)為重建 vs pollicization 分界；IIIB/IV/V 通常行 pollicization；Type V＝完全 aplasia。", "peropt": {"A": "✗ Type I 為輕度發育不全。", "B": "✗ Type II 為 thenar 發育不全、第一指蹼狹窄、UCL/MCP 鬆弛。", "C": "✗ Type III 為明顯發育不全(IIIA CMC 穩定、IIIB 不穩)，非 floating thumb。", "D": "◎ Type IV＝pouce flottant / floating thumb(僅皮蒂相連、無骨性連結)。", "E": "✗ Type V 為完全 aplasia(拇指缺如)。"}, "cite": "待複查（NG 手外科 Hypoplastic thumb / Blauth 記憶佐證）", "conflict": ""}, {"id": "1289", "sub": "HND", "src": "NG", "years": [108, 109, 110, 112, 114, 115], "stem": "關於vascular malformation的描述, 下列何者正確?（複選）", "opts": {"A": "Sturge-Weber syndrome的表現是capillary malformation出現在CN V的分布範圍", "B": "Klippel–Trénaunay syndrome是一種slow-flow capillary-lymphatico-venous malformation", "C": "Arteriovenous malformation的治療方式包括embolization, surgical resection, or combination", "D": "Sclerotherapy可以用來治療venous malformation和lymphatic malformation", "E": "Parkes Weber 為一slow flow的 vascular malformation"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "Volume 6, Chapter 31\n\nCM consists of dilated capillaries in the superficial dermis. CM is most often solitary, but has a wide range in size and may occur in any region of the extremity (Figs. 31.5A,B & 31.5C–F ). With time and aging, these pink lesions will often darken and develop some fibrovascular overgrowth. They can be associated with deeper vascular lesions, both slow-flow (Klippel– Trénaunay, CLOVES) and fast-flow (Parkes Weber, CM–AVM, PTEN) (see Tables 31.2 & 31.8 ) and with skeletal and soft tissue hypertrophy. A CM on the face in one or more of the trigeminal nerve distributions is indicative of Sturge–Weber syndrome.50 These patients are at risk for seizures, retinal detachment, glaucoma, and stroke. Fig. 31.5C–F appears online only.\n\nThe puzzling question with fast-flow lesions is their unpredictable natural history and rate of progression. Simple observation is the initial treatment in all but the most symptomatic AVMs. Compression garments may be of some help (see Fig. 31.18C ). The goal of treatment is to control the progression of the malformation and to alleviate symptoms: pain, ulceration, bleeding, distal discoloration, or functional problems. Management options include embolization, surgical resection or a combination (Fig. 31.19).\n\nSclerotherapy is most effective for small and large VM in the axilla, arm, elbow, and proximal forearm where muscle may be directly involved.\n\nSclerotherapy is the first-line management for large, problematic macrocysticLMs.", "key": "Parkes Weber 為 fast-flow(有 AV 分流)，非 slow-flow(對比 KTS 為 slow-flow)。", "peropt": {"A": "◎ Sturge-Weber syndrome＝capillary malformation 在 CN V(三叉神經)分布。", "B": "◎ Klippel-Trénaunay syndrome＝slow-flow capillary-lymphatico-venous malformation。", "C": "◎ AVM 治療＝embolization / surgical resection / combination。", "D": "◎ Sclerotherapy 可治療 venous malformation 與 lymphatic malformation。", "E": "✗ Parkes Weber syndrome 為『fast-flow』(含 AV shunt/分流)，非 slow-flow。"}, "cite": "Neligan 5th, Vol 6, Ch 37, p875-885", "conflict": "⚠ 同題歷屆重出：vascular malformation核心事實題(Sturge-Weber=CN V區capillary malformation、KTS為slow-flow、AVM治療embolization/resection、sclerotherapy治VM/LM、Parkes Weber為high-flow)。108年(1200)複選答ABCDE(含Parkes Weber high-flow為真)、109年(1225)與110年(1247)改為單選『以上皆是』答E(110年D特指macrocystic lymphatic malformation)、112/114/115年(1289)複選答ABCD(E『Parkes Weber為slow flow』為錯)；題幹事實一致，作答錨定該年題型。"}, {"id": "1294", "sub": "HND", "src": "NG", "years": [113, 114], "stem": "關於小兒骨頭生長板傷害(physeal injuries)，下列敘述何者正確? (複選)", "opts": {"A": "創傷是最常見引起生長板傷害及生長遲滯的因素，其他如感染、腫瘤及輻射暴露等也會影響骨頭生長", "B": "Salter-Harris classification是最為廣泛使用的分類法", "C": "Salter-Harris type II是最常見的生長板傷害型態，會有Thurston Holland's sign", "D": "Salter-Harris type III&IV會牽涉germinal layer和關節面，而有影響骨頭生長的疑慮", "E": "Peterson type VI是開放性傷害伴隨有生長板的損失(loss of physis)，相當於Salter-Harris type V"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "正確 ABCD。Peterson type VI＝開放傷+physis 損失；SH 分類僅 I-V(無 VI)，兩者不等同。", "peropt": {"A": "◎ 創傷為生長板傷害最常見原因(感染/腫瘤/輻射亦影響)。", "B": "◎ Salter-Harris classification 最廣泛使用。", "C": "◎ SH type II 最常見，有 Thurston-Holland fragment/sign。", "D": "◎ SH type III&IV 牽涉 germinal layer 與關節面，影響生長。", "E": "✗ Peterson type VI＝開放傷伴 physis 損失；Salter-Harris 分類無 type VI，且不等同 SH type V(SH V=擠壓傷 crush)。"}, "cite": "Neligan, Peter C. Volume 6, chap 30, p 673", "conflict": ""}, {"id": "1299", "sub": "HND", "src": "NG", "years": [108, 114, 115], "stem": "下列何者是contraindication to replantation? (複選)", "opts": {"A": "53歲男性高處跌落，右手近端食指創傷性截指，合併顱內出血、意識不清。", "B": "45歲女性使用絞肉機，右手食指、中指創傷性多段截指（segmental amputation）， 血管呈現ribbon’s sign.", "C": "2歲男童玩電扇，右手食指中段創傷性截指。", "D": "30歲女性車禍，左手腕近端創傷性截肢，查無其他損傷，意識正常。", "E": "24歲女性，刀傷，右手食指指尖（finger tip）創傷性截指，合併思覺失調症急性發作。"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "再植禁忌為 ABE(危及生命、多段+ribbon sign avulsion、精神急性不穩無法配合)；兒童單指、腕近端大肢體為適應症。", "peropt": {"A": "◎ 顱內出血、意識不清(危及生命)→絕對禁忌。", "B": "◎ 多段截指+ribbon sign(血管嚴重 avulsion、品質差)→禁忌。", "C": "✗ 2 歲兒童單指中段截指→應積極再植(兒童為再植適應症)，非禁忌。", "D": "✗ 手腕近端截肢、無其他傷、意識清→大肢體(major limb)再植適應症，非禁忌。", "E": "◎ 思覺失調急性發作(無法配合術後)+僅指尖截指→禁忌。"}, "cite": "Neligan, 5th Edition, vol.6, Ch11, p253", "conflict": "⚠ 同題歷屆重出：replantation禁忌症中文情境『複選』，禁忌情境恆為(1)顱內出血意識不清(2)ribbon's sign節段截肢(3)指尖截肢合併急性精神病發作。108年(1180)答ADE、114/115年(1299)答ABE(僅情境選項順序不同)；記概念不記字母。"}, {"id": "1300", "sub": "HND", "src": "NG", "years": [107, 114, 115], "stem": "關於peripheral nerve，下列何者為非? (複選)", "opts": {"A": "Median nerve穿過carpal tunnel", "B": "無名指與小指的flexor digitorum profundus由median nerve的分支anterior interosseous nerve支配", "C": "Ulnar nerve傷害會造成flexor digitorum superificialis功能缺損", "D": "Radial nerve的分支deep posterior interosseous nerve為純運動神經，管控所有的extensor compartments", "E": "Radial nerve的superficial branch為純感覺神經，負責五根手指背側的感覺，但不包含末端指節"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "錯誤為 BCDE。無名/小指 FDP 由 ulnar(非 AIN)；FDS 由 median；PIN 不管控『所有』伸肌(ECRL 由 radial 主幹)；radial superficial branch 為橈側三指半背側且不含指尖末節。", "peropt": {"A": "✗（正確敘述，非答案）Median nerve 穿過 carpal tunnel。", "B": "◎ 錯誤敘述）無名/小指 FDP 由『ulnar nerve』支配，非 AIN；AIN 管食/中指 FDP+FPL+PQ。", "C": "◎ 錯誤敘述）FDS 由『median nerve』支配；尺神經傷不造成 FDS 缺損。", "D": "◎ 錯誤敘述）PIN(deep radial)為純運動，但不管控『所有』伸肌——ECRL 由 radial nerve 主幹、部分近端另有支配。", "E": "◎ 錯誤敘述）radial superficial branch 感覺為橈側『三指半』背側，且不含指尖末節背側(該處由 median nerve 背支)。"}, "cite": "Neligan, 5th Edition, vol.6, Ch1, p39-48", "conflict": "⚠ 同題歷屆重出：peripheral nerve『何者為非(複選)』題，B/C/D/E四選項相同；選項A由『median與ulnar皆穿過carpal tunnel』(107年,1151,為非→答ABCDE)改為『median nerve穿過carpal tunnel』(114/115年,1300,為真→答BCDE)；作答錨定該年A選項真偽。"}, {"id": "1302", "sub": "HND", "src": "NG", "years": [114], "stem": "關於mutilated hand的initial assessment，下列何者為非？", "opts": {"A": "應優先處理其他可能危及生命的相關損傷，再處理肢體損傷.", "B": "若有活動性出血，應直接以止血鉗深入創口內夾住出血血管止血", "C": "上肢損傷的唯一危及生命的緊急情況是主要血管的部分受傷.", "D": "initial assessment時，應給予靜脈注射抗生素.", "E": "手術止血帶可用於輔助initial assessment."}, "ans": "B", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 12, p.273.", "key": "🎯 本題問『非』。活動性出血應直接加壓/止血帶，不可盲目以止血鉗深入夾血管。其餘為正確處置。", "peropt": {"A": "✗（正確敘述）先處理危及生命之相關損傷，再處理肢體。", "B": "◎ ＝錯誤敘述）活動性出血應『直接加壓/止血帶』控制，不可盲目以止血鉗深入傷口夾血管(易傷神經血管)。", "C": "✗（正確敘述）上肢唯一致命急症為主要血管之『部分』撕裂(partial laceration 持續出血)。", "D": "✗（正確敘述）初評時應給予靜脈(IV)抗生素。", "E": "✗（正確敘述）手術止血帶可輔助 initial assessment。"}, "cite": "原檔詳解（NG 5e Vol.6 Ch12, p.273）", "conflict": ""}, {"id": "1303", "sub": "HND", "src": "NG", "years": [114], "stem": "關於mutilated hand的清創，下列敘述何者為是？(複選)", "opts": {"A": "清創的目標是將受損的傷口變成乾淨的surgical wound，以利後續的傷口覆蓋和重建.", "B": "清創的原則是只移除所有壞死組織.", "C": "清創應在止血帶下進行.", "D": "血管和神經結構周圍的areolar tissue若受到汙染，必須小心地用鋒利剪刀切除，以防止感染沿著該平面擴散.", "E": "清創後，應鬆開止血帶，觀察出血情況。"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 12, p.276~277.", "key": "🎯 Mutilated hand 清創：目標轉為乾淨 surgical wound；移除壞死『與污染/無活性』組織及異物(非僅壞死)；止血帶下無血視野；污染 areolar tissue 銳器切除；清創後鬆止血帶觀察活性。正確者 ACDE。", "peropt": {"A": "◎ 目標：把受損污染傷口轉為乾淨 surgical wound。", "B": "✗ 清創應移除壞死『與污染/無活性(devitalized/contaminated)』組織及異物，非『只移除壞死組織』。", "C": "◎ 在止血帶下進行(無血視野 bloodless field)。", "D": "◎ 受污染 areolar tissue 以銳器(sharp)小心切除，防感染沿平面擴散。", "E": "◎ 清創後鬆開止血帶，觀察出血/組織活性。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1304", "sub": "HND", "src": "NG", "years": [114], "stem": "關於手部黑色素瘤，下列敘述何者錯誤？", "opts": {"A": "可能發生於指甲下方 (Subungual)", "B": "ABCDE原則可用於評估病灶", "C": "侵犯深度是重要的預後因子", "D": "肢端黑色素瘤(Acral lentiginous melanoma)預後較其他亞型差", "E": "治療以廣泛性切除為主，安全範圍為0.5公分"}, "ans": "E", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 16, p.366.", "key": "🎯 本題選『錯誤』。切除安全範圍依 Breslow 厚度：in situ 0.5cm、≤1mm→1cm、1-2mm→1-2cm、>2mm→2cm，非一律 0.5cm(E 錯)。", "peropt": {"A": "✗（正確敘述）可發生於指甲下(subungual)。", "B": "✗（正確敘述）ABCDE 原則可用於評估病灶。", "C": "✗（正確敘述）侵犯深度(Breslow thickness)為重要預後因子。", "D": "✗（正確敘述）Acral lentiginous melanoma 預後較其他亞型差。", "E": "◎ ＝錯誤敘述）安全切除範圍應依 Breslow 厚度決定：in situ 0.5cm、≤1mm 取 1cm、1-2mm 取 1-2cm、>2mm 取 2cm，非一律 0.5cm。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1305", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "手指屈肌腱鞘炎（Pyogenic flexor tenosynovitis）的Kanavel徵象包括哪些？ （複選）", "opts": {"A": "手指沿肌腱鞘腫脹", "B": "手指屈曲姿勢", "C": "觸診肌腱鞘有壓痛", "D": "被動伸展手指時疼痛劇烈", "E": "手指發紅"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 15, p343.", "key": "🎯 Kanavel 四大徵象：①沿肌腱鞘 fusiform 腫脹 ②半屈曲姿勢 ③沿肌腱鞘壓痛 ④被動伸展劇痛。紅斑(erythema)非四徵之一。", "peropt": {"A": "◎ 沿肌腱鞘之 fusiform 腫脹，為 Kanavel 徵象。", "B": "◎ 手指半屈曲姿勢，為 Kanavel 徵象。", "C": "◎ 沿肌腱鞘壓痛，為 Kanavel 徵象。", "D": "◎ 被動伸展手指劇痛，為 Kanavel 徵象(最敏感/最早出現)。", "E": "✗ 手指發紅(erythema)為一般感染表現，非 Kanavel 四大徵象之一。"}, "cite": "原檔詳解（NG 5e Vol.6 Ch15, p.343 Kanavel signs）", "conflict": ""}, {"id": "1306", "sub": "HND", "src": "NG", "years": [114], "stem": "下列何者為Felon（指頭膿瘍）的敘述？（複選）", "opts": {"A": "為指尖皮下掌側的感染", "B": "金黃色葡萄球菌是最常見的病原體", "C": "感染侷限於指尖指腹內的纖維間隔空間。", "D": "魚口狀切口可有效減壓，應優先考慮", "E": "病人會有指尖腫脹疼痛，對指尖的觸痛明顯"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 15, p341, p342.", "key": "🎯 Felon：指腹皮下腔感染，膿受纖維間隔侷限；最常見 S. aureus。切開引流應避免 fish-mouth 切口，宜 high lateral/縱向掌側切口。正確者 ABCE。", "peropt": {"A": "◎ 指尖掌側指腹(pulp)皮下感染。", "B": "◎ S. aureus 為最常見病原。", "C": "◎ 感染受纖維間隔(septa)侷限於指腹小室。", "D": "✗ Fish-mouth(魚口狀)切口應『避免』(易致指尖不穩/壞死、痛性疤痕)，非優先；宜採 high lateral 或縱向掌側切口。", "E": "◎ 指尖腫脹搏動痛、明顯壓痛。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1307", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "有關toe-to-hand移植長期結果，下列敘述何者為非？", "opts": {"A": "拇指重建後，grip strength平均可恢復至對側拇指的75-80%", "B": "Trimmed great-toe移植重建拇指，會減少約18度之interphalangeal joint活動度", "C": "第二腳趾移植重建手指，近端及遠端指間關節平均可達50-60度活動度", "D": "Great toe移植會增加第一蹠骨頭(first metatarsal head)及腳跟之負重，長期而言常造成病人步態不適", "E": "Toe-to-hand移植成功率約96-98%"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題選『為非』。Great toe 供區長期步態 morbidity 極小、多能耐受，D 敘述有誤。其餘數值(75-80% grip、18° IP、50-60° PIP/DIP、96-98% 成功率)皆正確。", "peropt": {"A": "✗（正確敘述）拇指重建後 grip strength 約達對側 75-80%。", "B": "✗（正確敘述）Trimmed great-toe 減少約 18° IP 活動度。", "C": "✗（正確敘述）第二腳趾重建手指 PIP/DIP 約 50-60°。", "D": "◎ ＝錯誤敘述）Great toe 供區(足部)長期步態 morbidity 極小、多能良好耐受，並非常造成步態不適。", "E": "✗（正確敘述）Toe-to-hand 成功率約 96-98%。"}, "cite": "待複查（NG 手外科 toe-to-hand 長期結果 記憶佐證）", "conflict": ""}, {"id": "1308", "sub": "HND", "src": "NG", "years": [114, 115], "stem": "一位68歲女性，主訴雙手手指逐漸出現疼痛變形，尤以遠端指節最為明顯，且手指末端出現數個硬且粗大的結節。請問這些結節（Heberden's nodes）最可能影響的是下列哪個關節？", "opts": {"A": "拇指基部的第一腕掌關節（first carpometacarpal joint）", "B": "手指中節的近端指間關節（proximal interphalangeal joint, PIP joint）", "C": "手指末端的遠端指間關節（distal interphalangeal joint, DIP joint）", "D": "手指掌指交接處的掌指關節（metacarpophalangeal joint, MCP joint）", "E": "手腕處的橈腕關節（radiocarpal joint）"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Heberden's nodes＝DIP joint OA 骨贅結節；Bouchard's nodes＝PIP joint。記憶：DIP=Heberden、PIP=Bouchard。", "peropt": {"A": "✗ 第一 CMC 關節 OA 非 Heberden's node 部位(其表現為 shoulder sign)。", "B": "✗ PIP joint 之結節為 Bouchard's nodes，非 Heberden's。", "C": "◎ Heberden's nodes 位於 DIP joint(遠端指間關節)。", "D": "✗ MCP joint 非 Heberden's node 好發處。", "E": "✗ 橈腕關節(radiocarpal joint)非 Heberden's node 部位。"}, "cite": "待複查（NG 手部骨關節炎／Heberden's node 記憶佐證）", "conflict": ""}, {"id": "1309", "sub": "HND", "src": "NG", "years": [114], "stem": "55歲女性，有類風濕性關節炎病史約10年，平時規則藥物控制。近半年來右手腕疼痛加劇，特別是旋轉手腕時。理學檢查發現右手腕腫脹，尺骨頭突出 (prominent ulnar head)，且有明顯壓痛。X光片顯示遠端尺骨關節 (Distal Radioulnar Joint) 侵蝕 (erosion) 及尺骨頭背側脫位 (dorsal dislocation)。以下何種治療方式適合該位病患?", "opts": {"A": "僅給予消炎止痛藥物，持續追蹤", "B": "安排腕關節鏡清創手術 (Wrist arthroscopy synovectomy)", "C": "進行遠端尺骨切除術 (Distal ulna resection, Darrach procedure)，並將Pronator quadratus 縫到尺骨殘端的背側", "D": "進行腕關節融合術 (Wrist arthrodesis)", "E": "進行腕關節置換術 (Total wrist arthroplasty)"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 RA caput ulnae syndrome：DRUJ 滑膜炎致 distal ulna 背側脫位、旋轉痛，可致 Vaughan-Jackson(伸肌腱磨損)。DRUJ 侵蝕+背側脫位→Darrach(distal ulna resection)+PQ 縫尺骨殘端背側穩定。", "peropt": {"A": "✗ 單純消炎追蹤，對已侵蝕+背側脫位之 DRUJ 不足。", "B": "✗ 單純關節鏡滑膜清創無法處理已破壞/脫位之 DRUJ。", "C": "◎ Darrach procedure(distal ulna resection)+將 pronator quadratus 縫至尺骨殘端背側以穩定，為 RA caput ulnae syndrome 標準術式。", "D": "✗ Wrist arthrodesis 用於 radiocarpal 破壞，非單純 DRUJ 病灶。", "E": "✗ Total wrist arthroplasty 用於 radiocarpal 破壞，對單純 DRUJ 為過度治療。"}, "cite": "待複查（NG rheumatoid DRUJ / Darrach 記憶佐證）", "conflict": ""}, {"id": "1310", "sub": "HND", "src": "NG", "years": [114], "stem": "下列哪一項敘述不是腕隧道症候群 (Carpal Tunnel Syndrome, CTS) 的危險因子？", "opts": {"A": "重複性的手部動作", "B": "暴露於手持振動工具", "C": "在肉品加工廠工作", "D": "使用電腦鍵盤", "E": "懷孕"}, "ans": "D", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 20, p496.", "key": "🎯 本題選『非危險因子』。CTS 危險因子：重複性動作、振動工具、肉品加工、懷孕。電腦鍵盤使用關聯證據薄弱，故 D 為答案。", "peropt": {"A": "✗（為危險因子）重複性手部動作。", "B": "✗（為危險因子）暴露於手持振動工具(vibrating tools)。", "C": "✗（為危險因子）肉品/家禽加工廠工作。", "D": "◎ ＝非危險因子）電腦鍵盤使用與 CTS 關聯證據薄弱，非確立的危險因子。", "E": "✗（為危險因子）懷孕(體液滯留 fluid retention)。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "1311", "sub": "HND", "src": "NG", "years": [114], "stem": "根據Millender的職業性慢性肌肉骨骼損傷分類，下列何者屬於「病因清楚，但治療並非總能成功使病人返回原本工作」的分類？", "opts": {"A": "第1類 (Category 1)", "B": "第2類 (Category 2)", "C": "第3類 (Category 3)", "D": "第4類 (Category 4)", "E": "以上皆非"}, "ans": "B", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 20, p493.", "key": "🎯 Millender 職業性慢性肌肉骨骼損傷分類：Cat 1 病因明確且治療多成功；Cat 2 病因清楚但治療未必能返原工作(本題答案)；Cat 3 病因不明/具爭議。", "peropt": {"A": "✗ Category 1：病因明確且治療多能成功返回原工作。", "B": "◎ Category 2：病因清楚，但治療並非總能成功使病人返回原工作。", "C": "✗ Category 3：病因不明確或具爭議。", "D": "✗ Category 4 非本題所指之描述。", "E": "✗ 既有 Category 2 符合，『以上皆非』不成立。"}, "cite": "原檔詳解（NG 5e Vol.6 Ch20, p.493 Millender分類）", "conflict": ""}, {"id": "1312", "sub": "HND", "src": "NG", "years": [114], "stem": "關於「雙重壓迫症候群」（Double Crush Syndrome, DCS）的定義，下列何者敘述最正確？", "opts": {"A": "同一條神經在兩個不同部位同時受到獨立的壓迫，導致症狀加劇。", "B": "一條神經先在遠端受到壓迫，導致近端更易受到損傷。", "C": "一條神經先在近端受到壓迫，增加其遠端對壓迫的敏感性。", "D": "雙重壓迫症候群多數僅發生於正中神經。", "E": "雙重壓迫症候群的診斷必須搭配電生理檢查才能確立。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "Neligan Plastic Surgery (5th Edition), Volume 6, Chapter 21, p493.", "key": "🎯 Double Crush Syndrome(DCS):同一條神經近端受壓後，因軸漿流(axoplasmic flow)受損，使『遠端』節段對第二處壓迫的敏感性上升(近端→遠端的預先致敏)。反向(遠端先致敏近端)稱 reverse double crush。診斷以臨床為主，EDX 為輔非必需;亦不限於正中神經。", "peropt": {"A": "✗ 僅描述兩處同時獨立壓迫，未涵蓋 DCS 核心的『預先致敏』因果概念。", "B": "✗ 此為 reverse double crush(遠端先致敏近端)，非典型 DCS 定義。", "C": "◎ 近端壓迫損及軸漿流，使遠端節段對第二處壓迫更敏感。", "D": "✗ DCS 不限於正中神經。", "E": "✗ DCS 為臨床診斷，EDX 為輔佐非必要。"}, "cite": "原檔詳解", "conflict": ""}, {"id":
