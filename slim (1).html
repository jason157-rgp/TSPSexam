"✓ 約半數合併裂顎。", "C": "◎ （不正確）：workup 應從呼吸道開始，而非顱顏畸形。", "D": "✓ 可有餵食困難與生長遲滯。", "E": "✓ 俯臥擺位可改善呼吸窘迫。"}, "cite": "NG110 · NG110-B09-Q07", "conflict": "跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG113-B09-Q07） ‖ 跨年正解選項文字改變：答案字母相同但內容不同，須依各年原文作答（對照 NG111-B09-Q05）"}, {"id": "3156", "sub": "CRF", "src": "NG", "years": [110, 114], "stem": "Phenotypic features of craniofacial microsomia are highly variable. Which of the following are the three most commonly affected structures? (複選)", "opts": {"A": "auricle", "B": "mandible", "C": "maxilla", "D": "frontal bone", "E": "occipital bone"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "CFM 最常受累的三構造：**耳廓（auricle）、下頜（mandible）、上頜（maxilla）**——全為第一、二鰓弓衍生物。額骨與枕骨不屬鰓弓來源。", "peropt": {"A": "◎ 耳廓。", "B": "◎ 下頜。", "C": "◎ 上頜。", "D": "✗ 額骨來自額鼻突。", "E": "✗ 枕骨屬體節來源。"}, "cite": "NG110 · NG110-B09-Q08", "conflict": ""}, {"id": "3157", "sub": "CRF", "src": "NG", "years": [110, 114], "stem": "關於hemifacial atrophy的敘述哪一項是錯誤的? (複選)", "opts": {"A": "是一種lymphocytic neurovasculitis", "B": "Immunosuppressive therapy適合使用在有皮膚病灶的病人，seizure的病人避免適用。", "C": "常見的皮膚病灶包含 hyperpigmentation, hypopigmentation與alopecia.", "D": "病理學的表現類似localized scleroderma", "E": "大部分的病人都先以神經學症狀表現，接著出現皮膚病灶。"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "key": "Parry–Romberg 是 **lymphocytic neurovasculitis**，病理近似局部硬皮病。臨床順序是**皮膚病灶在先、神經症狀在後**；免疫抑制治療正是用在有神經侵犯（癲癇）者。B 與 E 各把方向寫反。", "peropt": {"A": "✓ 淋巴球性神經血管炎。", "B": "◎ 錯誤：免疫抑制治療適用於神經侵犯（含癲癇）者，並非避用。", "C": "✓ 色素增減與禿髮。", "D": "✓ 病理似局部硬皮病。", "E": "◎ 錯誤：多數先出現皮膚病灶，神經症狀隨後。"}, "cite": "NG110 · NG110-B09-Q09", "conflict": ""}, {"id": "3159", "sub": "CRF", "src": "NG", "years": [108, 111, 112, 114, 115], "stem": "關於耳整形(Otoplasty)何者錯誤?", "opts": {"A": "根據Tanzer的分類，Constricted ear可分為三型: Type I(involve only the helix) ,Type II (involve helix and scapha), Type III( extreme cupping of the ear)", "B": "所謂Cryptotia是指耳朵的上半部包埋在顳部頭皮下。", "C": "耳整形建議於幼兒1歲時施行。", "D": "所謂Stahl's ear是指向外上側(superolaterally)的異常構造的耳部crus。", "E": "穿耳洞相關的併發症最好發的位置在耳垂、但是較嚴重的併發症發生在軟骨穿刺處。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考 Otoplasty 與先天耳畸形（選錯）。核心正確觀念：Tanzer 將 constricted ear 分三型——Type I（僅 helix 受累）、Type II（helix+scapha）、Type III（極度杯狀 extreme cupping）；Cryptotia（隱耳）為上半耳埋入顳部頭皮下；Stahl's ear 為向上外（superolaterally）延伸的異常耳 crus。⚠ 選項 C『耳整形建議於幼兒 1 歲時施行』為錯——正確時機約 ≥3 歲（多在學齡前、5–6 歲耳廓生長約達 85–90% 後），1 歲過早，故為應選出的錯誤選項。另穿耳洞併發症最好發於耳垂、但較嚴重併發症（如軟骨炎/軟骨壞死）發生在軟骨穿刺處，屬正確。", "peropt": {"A": "✗ 敘述正確。Tanzer 分類 constricted ear 三型：Type I（僅 helix 受累）、Type II（helix＋scapha）、Type III（極度杯狀 extreme cupping）。", "B": "✗ 敘述正確。Cryptotia（隱耳）＝耳廓上半部埋入顳部頭皮下，耳輪上緣無法自頭皮掀起。", "C": "◎ （錯誤敘述）：耳整形時機應為 ≥3 歲（多在學齡前、5–6 歲，耳廓已生長至成人約 85–90%），『1 歲施行』過早，非 1 歲。", "D": "✗ 敘述正確。Stahl's ear＝出現向上外（superolaterally）延伸的異常第三腳（abnormal third crus），使耳輪外緣呈尖角（Spock ear）。", "E": "✗ 敘述正確。穿耳洞併發症最好發於耳垂，但較嚴重者（軟骨膜炎／軟骨壞死、耳廓變形）發生於軟骨穿刺處。"}, "cite": "待複查（NG 耳整形/先天耳畸形分類 記憶佐證）", "conflict": "⚠ 同題歷屆重出（Otoplasty—何者錯誤，中文）：關鍵錯誤敘述恆為「耳整形建議於幼兒1歲時施行」(正解約5–6歲、學齡前、耳廓發育近完成後)；108年(3104)為A、111/112/114/115年(3159)為C。干擾選項有替換(great auricular nerve保留、constricted ear必要時切軟骨 ↔ Tanzer三型分類、穿耳洞併發症)，但考點一致。"}, {"id": "3162", "sub": "CRF", "src": "NG", "years": [109, 111, 114], "stem": "下列關於雙側唇裂(bilateral cleft lip)的重建原則，何者不正確？", "opts": {"A": "Maintain nasolabial symmetry.", "B": "Secure muscular continuity.", "C": "Design the philtral flap of proper size and shape.", "D": "Construct the median tubercle using central vermilion–mucosal elements.", "E": "Position the slumped/splayed lower lateral cartilages and sculpt excess soft tissue in nasal tip and columella."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "雙側唇裂的中央唇珠（median tubercle）必須用**兩側唇的外側組織（lateral labial elements）**建構——因為 **prolabium 沒有 white roll、也沒有正常唇紅**。用中央唇紅黏膜去做，日後必然萎縮變薄。", "peropt": {"A": "✗ 敘述正確（重建原則）：維持鼻唇對稱（nasolabial symmetry），微小差異會隨生長放大。", "B": "✗ 敘述正確（重建原則）：建立完整且連續的口輪匝肌環（muscular continuity）。", "C": "✗ 敘述正確（重建原則）：人中瓣（philtral flap）尺寸與形狀須得當，並預留生長空間。", "D": "◎ （不正確）：中央唇珠（median tubercle）應取自**兩側外側唇組織（lateral labial/vermilion elements）**，而非中央唇紅黏膜——因 prolabium 無 white roll、無正常唇紅，用中央組織日後必萎縮變薄。", "E": "✗ 敘述正確（重建原則）：復位塌陷外展的下外側鼻軟骨（lower lateral cartilages）並雕塑鼻尖與鼻柱多餘軟組織。"}, "cite": "NG109 · NG109-B08-Q04", "conflict": "⚠ 同題歷屆重出（雙側唇裂bilateral cleft lip重建原則—何者不正確）：錯誤敘述恆為D「以central vermilion–mucosal elements重建median tubercle」(正解：prolabium/中央無白線與紅唇，median tubercle須以兩側lateral vermilion組織重建)；109年(3128)選項文字較完整、111/114年(3162)為精簡版，答案皆D。"}, {"id": "3164", "sub": "CRF", "src": "NG", "years": [112, 113, 114], "stem": "Which of the following statement regarding innervation of the ear is incorrect?", "opts": {"A": "The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.", "B": "The posterior half of the ear is innervated by the great auricular and greater occipital nerves.", "C": "The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.", "D": "The auditory branch of the vagus nerve is referred to as Arnold's nerve.", "E": "All the above is correct"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n本題破綻在 B：後半應為 great auricular ＋ **lesser** occipital，題目寫 **greater** occipital。\n⚠ 與 CN3188 為**極性翻轉家族**：一題問『incorrect』（答 B），一題問『correct』（答 E＝以上皆是，但那一年 B 已被改回 lesser）。", "peropt": {"A": "✗ 敘述正確。耳前半（anterior half）＝auriculotemporal nerve（三叉神經下頜支 V3）。", "B": "◎ （錯誤敘述）：耳後半（posterior half）應為 great auricular nerve ＋ **lesser** occipital nerve，非 greater occipital nerve（greater occipital 供應枕部頭皮，不到耳）。", "C": "✗ 敘述正確。迷走神經耳支（CN X）供應耳甲（concha）與外耳道一部分。", "D": "✗ 敘述正確。迷走神經耳支即 Arnold's nerve（刺激外耳道可誘發咳嗽反射）。", "E": "✗ 因 B 敘述有誤，故非『以上皆正確』。"}, "cite": "NG112 · NG112-B07-Q01", "conflict": "⚠陷阱對照｜NG114 問『錯誤』、B 寫 greater occipital 是錯，答 B；NG115 問『正確』、B 已修成 lesser occipital 全對，答 E。先看題幹問對或錯，再確認 B 是 greater 還是 lesser occipital。（B11Q11 非同題，勿混。）"}, {"id": "3166", "sub": "CRF", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which of the following is not true regarding late complications of zygomatic fractures?", "opts": {"A": "Late complications of zygomatic fractures include nonunion, malunion, double vision, hypesthesia, and chronic maxillary sinusitis.", "B": "Generally, ectropion and scleral show may be problematic and frequently requires surgical correction.", "C": "Usually, more than 5 mm of inferior globe dystopia is required to produce diplopia.", "D": "Infection is not common, and usually responds to antibiotics and sinus or lacrimal drainage.", "E": "Impacted fractures of the zygomatic arch which abut the coronoid process may result in ankylosis."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "顴骨骨折晚期併發症：**ectropion 與 scleral show 通常輕微、多自行緩解**，不常需手術——命題者把它寫成『常需手術矯正』當破綻。\n另記：下方眼球移位需 >5 mm 才致複視；顴弓撞喙突可致關節僵直。", "peropt": {"A": "✗ 敘述正確。顴骨骨折晚期併發症含 nonunion、malunion、複視、感覺遲鈍（hypesthesia）、慢性上頜竇炎。", "B": "◎ （不正確）：ectropion 與 scleral show 多屬輕微、常可自行緩解，並非『經常需手術矯正』。", "C": "✗ 敘述正確。下方眼球移位需 >5 mm 才易產生複視（此版數值正確）。", "D": "✗ 敘述正確。感染不常見，多可用抗生素及竇／淚道引流處理。", "E": "✗ 敘述正確。顴弓 impacted fracture 抵住喙突（coronoid process）可致關節僵直、開口受限。"}, "cite": "NG112 · NG112-B07-Q03", "conflict": "⚠陷阱對照｜關鍵在 C 的數字。NG114 C 寫『5 mm』為對、陷阱在 B，答 B；NG115 C 被改成『2 mm』變錯，答 C。看到 zygoma diplopia 門檻先確認該版是 5 還是 2 mm。 ｜ ⚠ 同題歷屆重出（顴骨骨折zygomatic fracture晚期併發症—何者不正確）：112/113/114年(3166)答B(誤述ectropion/scleral show「常需手術矯正」)，該版本C「需>5mm下位globe dystopia才產生複視」列為正確；115年(3190)把B改寫成正確敘述(二次矯正一般不超過3mm)，並將C的閾值由「5mm」改為「2mm」使C變成錯誤，故答C。⚠數字微調(5mm→2mm)使答案由B移至C；核心記憶：一般需>5mm垂直向inferior globe dystopia方會產生diplopia。"}, {"id": "3182", "sub": "CRF", "src": "NG", "years": [114], "stem": "Posterior pharyngeal flap 為correction of velopharyngeal dysfunction最古老的手術方之一，其常見的complications不包括?", "opts": {"A": "Bleeding", "B": "Dehiscence", "C": "Nasal airway obstruction", "D": "Obstructive sleep apnea", "E": "Hoarseness"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "與 CN3086 為同一題的**反向問法**（『不包括』）。併發症：出血、裂開、鼻氣道阻塞、OSA。**hoarseness 不是**。同一組事實、兩種問法、答案字母完全不同——正是不能背字母的理由。", "peropt": {"A": "✗ 屬併發症。出血（bleeding）為 posterior pharyngeal flap 常見併發症。", "B": "✗ 屬併發症。瓣裂開（dehiscence）。", "C": "✗ 屬併發症。鼻氣道阻塞（nasal airway obstruction）。", "D": "✗ 屬併發症。阻塞性睡眠呼吸中止（OSA）——本術式最受關注的長期併發症。", "E": "◎ （不包括）：聲音沙啞（hoarseness）非本術式併發症（其屬喉部／聲帶病變）。"}, "cite": "NG114 · NG114-B08-Q05", "conflict": ""}, {"id": "3183", "sub": "CRF", "src": "NG", "years": [114], "stem": "To prevent scar formation and muscle relapse caused by the \"dead space\" following intravelar veloplasty (IVVP), which of the following tissue types is commonly used in recent years to fill this space?", "opts": {"A": "Free skin graft", "B": "Buccal mucosal flap", "C": "Adenoid transposition", "D": "Vascularized buccal fat pad", "E": "Tongue flap transfer"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顎帆內成形術（intravelar veloplasty, IVVP）後，硬顎後緣易形成「死腔（dead space）」，纖維化與疤痕收縮會使顎帆提肌（levator veli palatini, LVP）再度移位（muscle relapse）而影響長期語音。近年Buchman等提倡以帶血管之頰脂墊瓣（vascularized buccal fat pad）填補此死腔，減少纖維化拉扯、維持LVP位置與軟顎閉合功能。⚠ 易混淆：游離皮膚移植、腺樣體轉位、舌瓣皆非此死腔之首選填補材料。", "peropt": {"A": "✗ 游離皮膚移植（free skin graft）無血供、不適合填補 IVVP 死腔。", "B": "✗ 頰黏膜瓣（buccal mucosal flap）非近年填補 IVVP 死腔之標準做法。", "C": "✗ 腺樣體轉位（adenoid transposition）用途為 VPI 輔助，非填補死腔。", "D": "◎ ：帶血管頰脂墊瓣（vascularized buccal fat pad）填補死腔，減少纖維化拉扯與 LVP 再移位。", "E": "✗ 舌瓣移轉（tongue flap）非填補 IVVP 死腔之常用選擇。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "3184", "sub": "CRF", "src": "NG", "years": [114], "stem": "關於單側唇裂的重建，下列何者正確描述其手術原則與變形特徵？", "opts": {"A": "唇裂側的鼻翼基部通常外移，導致鼻翼塌陷", "B": "切割設計大多依照醫師即時判斷與經驗，較少依照標記點操作", "C": "皮膚切口應盡量避開自然解剖接縫線以減少疤痕明顯度", "D": "單側唇裂變形中，非唇裂側的鼻翼基部與鼻柱會偏離中線", "E": "唇裂修補的黏膜、紅唇與白唇（cutaneuous roll）應視為同一解剖單位進行修補"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "Mulliken 的視覺錯覺：單側唇裂看起來像**裂側**鼻翼基部外移，實際上**偏離中線的是非裂側的鼻翼基部與鼻柱**；裂側鼻翼基部只是**後退（retruded）**，內外向位置大致正常。此點與前鼻棘偏移程度相關。", "peropt": {"A": "✗ 這正是 Mulliken 所指的錯覺。", "B": "✗ 現代唇裂修補高度依賴解剖標記點。", "C": "✗ 切口應**順著**自然解剖接縫線（如人中脊、鼻翼溝）。", "D": "◎ ：非裂側鼻翼基部與鼻柱偏離中線。", "E": "✗ 黏膜、唇紅、白唇為**不同**解剖單位，須分別對位。"}, "cite": "NG114 · NG114-B08-Q07", "conflict": ""}, {"id": "3185", "sub": "CRF", "src": "NG", "years": [114], "stem": "關於單側唇裂合併鼻整形手術後的併發症分類，下列何者為正確的描述？", "opts": {"A": "急性併發症多發生於術後數週至數月之間，例如瘢痕增生與針眼肉芽腫", "B": "鼻塞導致的呼吸道阻塞屬於晚期併發症", "C": "鼻托(nasal stent)使用的相關併發症包括感染與壓力性壞死，通常屬於早期併發症", "D": "中臉發育不全多於手術初期即出現，與疤痕無關", "E": "唇裂術後的Cupid’s bow（人中弓）不平衡僅為短期現象，不需手術處理"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "唇裂鼻整形併發症的**時間軸**：\n**急性（術後數日）**＝呼吸道阻塞、血腫、麻醉問題、傷口裂開\n**早期（數週至數月）**＝感染、針眼肉芽腫、瘢痕增生、**鼻托相關的壓力性壞死**\n**晚期**＝中臉發育不全、Cupid's bow 不對稱（皆與疤痕攣縮及生長有關，需二次手術）", "peropt": {"A": "✗ 瘢痕增生與針眼肉芽腫屬**早期**，非急性。", "B": "✗ 呼吸道阻塞屬**急性**。", "C": "◎ ：鼻托的感染與壓力性壞死屬早期併發症。", "D": "✗ 中臉發育不全屬晚期，且與疤痕相關。", "E": "✗ Cupid's bow 不對稱常需手術矯正，非短期現象。"}, "cite": "NG114 · NG114-B08-Q08", "conflict": ""}, {"id": "3186", "sub": "CRF", "src": "NG", "years": [114], "stem": "關於單側唇裂與鼻整形的初次修復手術，下列何者敘述正確？", "opts": {"A": "初次唇裂手術應避免矯正鼻翼與鼻孔緣位置，以避免過度修正", "B": "Mohler-Cutting 技術僅適用於嚴重寬裂的病患", "C": "NAM（Nasoalveolar molding）為術後修復使用的矯形方法", "D": "初次鼻整形可採取輕微過度矯正，以提高對稱性維持效果", "E": "初次手術中應避免修補鼻底，以避免干擾日後骨移植手術"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "初次唇裂鼻整形的三條原則：**可以且應該同時矯正鼻部**；鼻翼基部與鼻孔緣採**輕度過度矯正**（對抗術後生長與張力造成的回縮）；**鼻底應一併修補**。NAM 是**術前**矯形，不是術後。", "peropt": {"A": "✗ 初次手術即應矯正鼻翼與鼻孔緣，primary rhinoplasty 已證實安全。", "B": "✗ Mohler-Cutting 適用範圍廣，非僅限寬裂。", "C": "✗ NAM 為**術前**（presurgical）矯形。", "D": "◎ ：輕度過度矯正以維持長期對稱。", "E": "✗ 鼻底應修補，不會妨礙日後植骨。"}, "cite": "NG114 · NG114-B08-Q09", "conflict": ""}, {"id": "3187", "sub": "CRF", "src": "NG", "years": [114], "stem": "關於正顎手術（Orthognathic surgery）之敘述，下列何者正確？", "opts": {"A": "正顎手術僅適用於患有先天性顱顏異常的病患", "B": "使用電腦輔助手術模擬（CASS）可協助提高手術準確性並簡化術前牙模製作", "C": "正顎手術主要使用 Le Fort II、BSSO 與下頷骨切除術進行骨骼重建", "D": "對於中度上頜骨後縮的病人，僅靠牙齒矯正即可達成理想咬合與臉型", "E": "正顎手術的目標為牙齒排列整齊，而非顏面外觀改善"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "正顎手術現代觀念（NG114）：**CASS（電腦輔助手術模擬）可提升準確度、簡化術前牙模製作**，為正解。\n其餘皆錯：正顎不限於先天顱顏異常（骨性咬合不正、OSA 皆可）；主流術式是 Le Fort **I**＋BSSO（非 Le Fort II＋下頜切除）；中度上頜後縮單靠牙齒矯正不足；目標含咬合**與**顏面外觀。", "peropt": {"A": "✗ 不限先天顱顏異常。", "B": "◎ ：CASS 提升準確度、簡化牙模。", "C": "✗ 主流為 Le Fort I＋BSSO。", "D": "✗ 中度上頜後縮須手術，非單靠矯正。", "E": "✗ 目標含咬合與外觀。"}, "cite": "NG114 · NG114-B08-Q10", "conflict": ""}, {"id": "3188", "sub": "CRF", "src": "NG", "years": [114], "stem": "下列關於單側唇裂及鼻部畸形之敘述，哪些是正確的?(複選)", "opts": {"A": "唇裂側的紅唇（vermilion）在中線處逐漸變寬。", "B": "完好的那一側，口輪匝肌纖維可能異位附著於前鼻棘、前鼻中隔及內側鼻腳基部。", "C": "唇裂會導致鼻中隔及鼻柱向患側偏移。", "D": "唇裂側的口輪匝肌會異常附著於梨狀孔的骨膜。", "E": "諾德霍夫點（Noordhoff’s point）位於唇裂內側，是紅唇高度最大的地方。"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "單側唇裂的肌肉異常止點是核心考點：**裂側**口輪匝肌止於**梨狀孔骨膜**；**非裂側（完好側）**止於**前鼻棘、鼻中隔前緣、內側腳基部**。鼻中隔與鼻柱偏向**非裂側**（不是患側）。", "peropt": {"A": "✗ 內側唇紅是越靠近裂緣越**變窄**，非變寬。", "B": "◎ 完好側肌纖維異位附著於前鼻棘、鼻中隔前、內側腳基部。", "C": "✗ 鼻中隔與鼻柱偏向**非裂側**。", "D": "◎ 裂側肌肉異常附著於梨狀孔骨膜。", "E": "✗ Noordhoff's point 位於**外側**唇瓣上唇紅最厚處，非內側。"}, "cite": "NG114 · NG114-B08-Q12", "conflict": ""}, {"id": "3189", "sub": "CRF", "src": "NG", "years": [114], "stem": "Which of the following are established operative principles for synchronous nasolabial repair in bilateral cleft lip? (複選)", "opts": {"A": "Primarily focus on creating prominent philtral columns and dimple.", "B": "Ensure maintenance of postoperative symmetry.", "C": "Secure primary muscular continuity.", "D": "Position/secure lower lateral cartilages and sculpt nasal tip and columella.", "E": "Design appropriate philtral size and shape."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "雙側唇裂同步鼻唇修補的四原則：**對稱、肌肉連續、人中瓣尺寸形狀得當、復位下外側軟骨並雕塑鼻尖鼻柱**。刻意去做出明顯的人中柱與人中窩**不是**原則——那是隨生長自然形成的。", "peropt": {"A": "✗ 塑造明顯人中柱與人中窩並非主要原則。", "B": "◎ 維持術後對稱。", "C": "◎ 確保一期肌肉連續性。", "D": "◎ 定位固定下外側軟骨、雕塑鼻尖與鼻柱。", "E": "◎ 設計適當的人中瓣大小與形狀。"}, "cite": "NG114 · NG114-B08-Q13", "conflict": ""}, {"id": "3190", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following is not true regarding late complications of zygomatic fractures?", "opts": {"A": "Late complications of zygomatic fractures include nonunion, malunion, double vision, hypesthesia, and chronic maxillary sinusitis.", "B": "Generally, ectropion and scleral show may be problematic, and secondary procedures to correct them generally do not afford correction beyond 3 mm.", "C": "Usually, more than 2 mm of inferior globe dystopia is required to produce diplopia.", "D": "Infection is not common, and usually responds to antibiotics and sinus or lacrimal drainage.", "E": "Impacted fractures of the zygomatic arch which abut the coronoid process may result in ankylosis."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顴骨骨折晚期併發症（何者為非）。**答案 C（NG115）**：本版將 C 的下位 globe dystopia 產生複視門檻改為「>2 mm」——實際需 >5 mm 才易產生 diplopia，故 C 為錯述。⚠陷阱：NG114 同題此處寫「5 mm」為正確、陷阱在 B（ectropion 敘述），答 B。看到此題先確認該版寫 2 mm 還是 5 mm。", "peropt": {"A": "✗ 正確：顴骨骨折晚期併發症含 nonunion/malunion/複視/顏面不對稱等。", "B": "✗ 正確（NG115 版）：ectropion 與 scleral show 可能需二次矯正。", "C": "◎ 錯述：本版寫「>2 mm inferior globe dystopia 即產生複視」有誤，應為 >5 mm。", "D": "✗ 正確：感染不常見，多可用抗生素及竇/內固定處理反應。", "E": "✗ 正確：顴弓 impacted fracture 抵住 coronoid process 可致開口受限。"}, "cite": "NG115-B07-Q04", "conflict": "⚠陷阱對照｜關鍵在 C 的數字。NG114 C 寫『5 mm』為對、陷阱在 B，答 B；NG115 C 被改成『2 mm』變錯，答 C。看到 zygoma diplopia 門檻先確認該版是 5 還是 2 mm。"}, {"id": "3191", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding innervation of the ear is correct?", "opts": {"A": "The anterior half of the ear is supplied by the auriculotemporal nerve that branches from the mandibular division of the trigeminal nerve.", "B": "The posterior half of the ear is innervated by the great auricular and lesser occipital nerves.", "C": "The auditory branch of the vagus nerve (CN X) supplies a portion of the concha and external auditory canal.", "D": "The auditory branch of the vagus nerve is referred to as Arnold's nerve.", "E": "All the above is correct."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "耳的神經支配：**前半 ＝ auriculotemporal nerve（三叉神經下頜支 V3）**；**後半 ＝ great auricular ＋ lesser occipital nerve（不是 greater occipital）**；耳甲與外耳道一部分 ＝ **迷走神經耳支（Arnold's nerve, CN X）**。\n⚠ 與 CN3186 為**極性翻轉家族**（問『correct』，答 E）。本版 B 已寫回 **lesser** occipital（正確），故四項全對 → E。\n**同一組事實、正反兩問、B 選項一字之差（greater↔lesser）決定成敗**——記神經名稱，別記答案字母。", "peropt": {"A": "✓ 前半＝auriculotemporal（V3）。", "B": "✓ 後半＝great auricular＋lesser occipital（本版正確）。", "C": "✓ 迷走耳支供應耳甲與外耳道。", "D": "✓ Arnold's nerve。", "E": "◎ ：以上皆是。"}, "cite": "NG115 · NG115-B07-Q05", "conflict": "⚠陷阱對照｜NG114 問『錯誤』、B 寫 greater occipital 是錯，答 B；NG115 問『正確』、B 已修成 lesser occipital 全對，答 E。先看題幹問對或錯，再確認 B 是 greater 還是 lesser occipital。（B11Q11 非同題，勿混。）"}, {"id": "3192", "sub": "CRF", "src": "NG", "years": [115], "stem": "A disruption in the generation, migration, or differentiation of neural crest cells underlies the classification of malformations known as neurocristopathies. Which of the following syndromes or diseases are recognized as neurocristopathies? (複選)", "opts": {"A": "Holoprosencephaly", "B": "Treacher Collins syndrome", "C": "Cleidocranial dysplasia", "D": "Saethre-Chotzen syndrome", "E": "22q11.2 deletion syndrome"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "key": "Neurocristopathy＝神經嵴細胞的生成／遷移／分化障礙。**TCS（TCOF1，神經嵴細胞增生不足）與 22q11.2 缺失（TBX1，影響心臟神經嵴）**屬之。Holoprosencephaly 是前腦分裂缺陷（SHH）、cleidocranial dysplasia 是成骨細胞缺陷（RUNX2），皆非神經嵴病。", "peropt": {"A": "✗ 前腦分裂異常（SHH 路徑）。", "B": "◎ TCOF1 → 神經嵴細胞不足。", "C": "✗ RUNX2 → 成骨細胞分化缺陷。", "D": "✗ TWIST1 → 顱縫早閉症候群。", "E": "◎ TBX1 → 心臟神經嵴遷移異常。"}, "cite": "NG115 · NG115-B08-Q01", "conflict": ""}, {"id": "3193", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding the development and derivatives of the pharyngeal arches is true?", "opts": {"A": "The face is predominantly derived from the first pharyngeal arch.", "B": "The third pharyngeal arch serves as a bracing element to support the developing upper and lower jaws.", "C": "The first pharyngeal arch initially appears on day 24 of embryonic development.", "D": "The fourth and sixth pharyngeal arches together give rise to the root of the tongue and the epiglottis."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "第一鰓弓是**顏面的主體來源**。三個常見破綻：第一弓約在第 **22** 天出現（非 24）；支撐上下頜的是第一弓本身（非第三弓）；舌根與會厭來自第三、四弓，而第四、六弓形成**喉部軟骨**。", "peropt": {"A": "◎ ：顏面主要來自第一鰓弓。", "B": "✗ 支撐上下頜者為第一弓。", "C": "✗ 第一弓約於胚胎第 22 天出現。", "D": "✗ 舌根與會厭來自第三、四弓；第四、六弓 → 喉軟骨。"}, "cite": "NG115 · NG115-B08-Q02", "conflict": ""}, {"id": "3194", "sub": "CRF", "src": "NG", "years": [115], "stem": "Regarding the goals of lip reconstruction and anatomic considerations, which of the following statements are TRUE? (複選)", "opts": {"A": "The contour and color of the white roll surrounding the vermilion are created by the pars peripheralis fibers of the risorius muscle.", "B": "The lower lip contains three symmetric tubercles and is primarily defined by the presence of the philtrum and Cupid's bow.", "C": "The primary objective of lip reconstruction is the restoration of a functional oral sphincter with adequate oral aperture to enable proper feeding and speech.", "D": "The vermilion is a well-vascularized structure that lacks minor salivary glands and represents the transition from external keratinized to internal non-keratinized squamous epithelium.", "E": "Motor innervation to the orbicularis oris and surrounding muscles of facial expression is controlled by the buccal and marginal mandibular branches of the facial nerve."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "唇部解剖三個易錯點：**white roll 由口輪匝肌的 pars marginalis 纖維形成**（非 risorius）；**人中與 Cupid's bow 屬上唇**；唇部運動神經來自顏面神經的 **buccal 與 marginal mandibular** 分支。重建首要目標是**功能性口輪匝肌環**與足夠的口裂大小。", "peropt": {"A": "✗ 應為口輪匝肌 pars marginalis，非 risorius。", "B": "✗ 人中與 Cupid's bow 是**上**唇特徵。", "C": "◎ 首要目標：功能性口括約肌與足夠口裂。", "D": "◎ 唇紅血供豐富、無小唾液腺，為角化與非角化鱗狀上皮的過渡帶。", "E": "◎ 運動神經來自 buccal 與 marginal mandibular 分支。"}, "cite": "NG115 · NG115-B08-Q03", "conflict": ""}, {"id": "3195", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding upper lip reconstruction is TRUE?", "opts": {"A": "Defects involving up to 50% of the upper lip can typically be closed primarily without causing distortion to critical structures such as Cupid's bow.", "B": "When performing a primary repair of the upper lip, a horizontal repair is preferred to minimize distortion of natural landmarks and maintain the normal beard hairline in males.", "C": "Composite grafts from the ear concha may be useful for reconstructing isolated defects of the philtrum to restore its slightly indented appearance without distorting the philtral columns.", "D": "The full-thickness Abbe flap used for upper lip reconstruction should be designed to be the exact same width as the defect to ensure a tension-free closure."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 上唇重建（upper lip reconstruction）：來自耳甲（ear concha）之複合移植（composite graft）可用於重建人中（philtrum）之孤立缺損，回復其略凹陷外觀而不扭曲人中脊（philtral columns），為本題正確敘述。⚠ 易混淆：上唇因有人中、邱比特弓（Cupid's bow）等美學標誌，可直接縫合之比例較下唇小（約僅25%，非50%）；上唇初級修補宜採「垂直（vertical）」縫合以順應美學單位、維持鬍鬚線，而非水平；Abbe瓣寬度應約為缺損之一半，而非與缺損等寬。", "peropt": {"A": "✗ 上唇可直接縫合（primary closure）之比例約僅 25%（非 50%），超過即易扭曲 Cupid's bow 等美學標誌。", "B": "✗ 上唇初級修補宜採**垂直（vertical）**縫合以順應美學單位、維持男性鬍鬚線，而非水平。", "C": "◎ ：耳甲（ear concha）複合移植可重建人中（philtrum）孤立缺損，回復其略凹外觀而不扭曲人中脊。", "D": "✗ Abbe（full-thickness）瓣寬度應約為缺損之**一半**（因上下唇同時提供組織），非與缺損等寬。"}, "cite": "待複查（NG 上唇重建 記憶佐證）", "conflict": ""}, {"id": "3196", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding lower lip reconstruction is TRUE?", "opts": {"A": "Abbe flaps transferred from the upper lip to the lower lip are routinely performed for large lower lip defects because the upper lip is an optimal donor site.", "B": "Due to the lack of a third subunit, the lower lip can easily tolerate primary closure for defects involving up to one-half (50%) of its total width.", "C": "If a lower lip excision or defect abuts the mental crease, a W-plasty may be performed at the inferior base to allow for improved contour and better camouflage of the scar.", "D": "The Bernard-Burow cheiloplasty utilizes vertically based advancement flaps and requires the complete division of all surrounding muscle to close central lower lip defects."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "下唇重建：缺損 **<30%** 可直接縫合（不是 50%）；缺損抵達 **mental crease** 時，於下方基部加做 **W-plasty** 改善輪廓、隱藏疤痕。Bernard-Burow 用**水平**推進瓣且**保留肌肉**。Abbe 通常自下唇取瓣修上唇（反向非常規）。", "peropt": {"A": "✗ Abbe 常規方向是下唇 → 上唇。", "B": "✗ 下唇直接縫合上限約 30%，非 50%。", "C": "◎ ：緊鄰頦唇溝時以 W-plasty 修飾。", "D": "✗ Bernard-Burow 為水平推進，不需完全切斷周圍肌肉。"}, "cite": "NG115 · NG115-B08-Q05", "conflict": ""}, {"id": "3197", "sub": "CRF", "src": "NG", "years": [115], "stem": "Regarding the various modalities of Pre-surgical Infant Orthopedics (PSIO) used in the treatment of unilateral cleft lip, which of the following statements are correct? (複選)", "opts": {"A": "The Latham device is classified as a passive form of PSIO that utilizes a patient-specific acrylic intraoral denture and nasal conforming stents.", "B": "Lip taping is a passive method that applies a constant controlled restraining force to the alveolar segments, which can reduce the alveolar gap by 53%.", "C": "Lip adhesion is a partial surgical repair performed at 1 to 2 months of age that effectively converts a complete cleft lip into an incomplete cleft lip.", "D": "Nasoalveolar molding (NAM) is an active PSIO modality that improves nasal base asymmetry, though overly aggressive application can overstretch the ala and produce a \"mega-nostril.\"", "E": "A primary advantage of the Latham device is its shorter duration of treatment (4-6 weeks) relative to other modalities like lip taping and NAM (3-6 months)."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "PSIO 分**被動 vs 主動**：\n**被動**＝lip taping（可縮小齒槽裂隙 53%）\n**主動**＝**Latham（釘固螺旋驅動，療程僅 4–6 週）**、**NAM（壓克力咬合板＋鼻撐，療程 3–6 月）**\nLip adhesion 是 1–2 個月大的**部分手術**，把完全唇裂轉成不完全唇裂。\nNAM 過度施力會把鼻翼撐過頭 → **mega-nostril**。", "peropt": {"A": "✗ Latham 是**主動**式；壓克力咬合板＋鼻撐的描述其實是 NAM。", "B": "◎ Lip taping 為被動、持續控制力，可縮小裂隙 53%。", "C": "◎ Lip adhesion：1–2 個月大，完全裂 → 不完全裂。", "D": "◎ NAM 為主動式，過度施力致 mega-nostril。", "E": "◎ Latham 療程 4–6 週，短於 lip taping／NAM 的 3–6 個月。"}, "cite": "NG115 · NG115-B08-Q06", "conflict": ""}, {"id": "3198", "sub": "CRF", "src": "NG", "years": [115], "stem": "Regarding the clinical characteristics of bilateral cleft lip, which of the following statements is TRUE?", "opts": {"A": "Bilateral asymmetric cleft lip is the most common anatomic form, accounting for 75% of all bilateral cleft lip cases.", "B": "Infants presenting with bilateral cleft lip and palate are more likely to be syndromic, with common disorders including van der Woude, CHARGE, and ectodermal dysplasias.", "C": "A megaform cleft lip is anatomically defined as extending 5 cm above the normal Cupid's bow peak.", "D": "At birth, 80% of neonates with a cleft lip and/or palate have associated anomalies such as cardiac or neurological defects."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "雙側唇顎裂**症候群性（syndromic）比例明顯較高**，常見 van der Woude、CHARGE、外胚層發育不良。這是雙側裂與單側裂最重要的臨床差異——看到雙側，先想症候群與遺傳諮詢。", "peropt": {"A": "✗ 最常見為雙側**對稱**完全裂，且無 75% 之說。", "B": "◎ ：雙側唇顎裂較可能為症候群性。", "C": "✗ 5 cm 為荒謬數值（輕型唇裂以 mm 計）。", "D": "✗ 合併異常遠低於 80%。"}, "cite": "NG115 · NG115-B08-Q07", "conflict": ""}, {"id": "3199", "sub": "CRF", "src": "NG", "years": [115], "stem": "According to the Veau classification system, which of the following accurately defines a Veau II cleft?", "opts": {"A": "A complete cleft of the secondary palate involving the soft and hard palate extending to the incisive foramen.", "B": "A cleft that involves the soft palate only.", "C": "A unilateral complete cleft of the primary and secondary palate, where the vomer is attached to the maxilla on the non-cleft side.", "D": "A complete bilateral cleft of the primary and secondary palate."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "**Veau 分類**（背熟四級）：\n**I** ＝僅軟顎\n**II** ＝次級顎完全裂（軟顎＋硬顎，前達切齒孔）\n**III** ＝單側完全裂（原發＋次級顎），犁骨附著於非裂側上頜\n**IV** ＝雙側完全裂（原發＋次級顎）\n分界線永遠是**切齒孔**（原發顎／次級顎的分水嶺）。", "peropt": {"A": "◎ ：Veau II＝次級顎完全裂至切齒孔。", "B": "✗ 僅軟顎＝Veau I。", "C": "✗ 單側完全裂＝Veau III。", "D": "✗ 雙側完全裂＝Veau IV。"}, "cite": "NG115 · NG115-B08-Q08", "conflict": ""}, {"id": "3200", "sub": "CRF", "src": "NG", "years": [115], "stem": "According to the overall treatment plan for a Veau III cleft utilizing the Anatomic Cleft Restoration Philosophy (ACRP), how and when is the alveolar defect primarily managed?", "opts": {"A": "It is surgically closed during the partial cleft lip and nose repair at 3-4 months of age to utilize tissue expansion.", "B": "It is closed simultaneously with the palatoplasty at 12-14 months of age to complete the primary reconstruction.", "C": "It is intentionally left open during primary surgeries and is addressed via alveolar bone grafting during the time of mixed dentition (6-12 years of age).", "D": "It is structurally fused and closed during the routine orthodontics phase at 9-10 years of age."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "ACRP 對 Veau III 的齒槽缺損策略：**一期手術刻意保留不關**，留待**混合齒列期（6–12 歲）以齒槽骨移植處理**。過早關閉齒槽會限制上頜生長。此與 CN3081／CN3082 的時程完全一致。", "peropt": {"A": "✗ 3–4 個月的部分唇鼻修補不處理齒槽。", "B": "✗ 不與顎裂修補同時關閉。", "C": "◎ ：一期留開，混合齒列期植骨。", "D": "✗ 齒槽不會在矯正牙科階段自行融合。"}, "cite": "NG115 · NG115-B08-Q09", "conflict": ""}, {"id": "3201", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding the anatomy and characteristics of the buccal fat pad is true?", "opts": {"A": "The temporal extension is the largest lobule of the buccal fat pad, occupying 30%-40% of its total weight.", "B": "The volume of the buccal fat pad significantly decreases as a person ages throughout their life.", "C": "The mean volume of the buccal fat pad in females is approximately 10.2 mL, which is larger than that in males.", "D": "The buccal extension is separated from the central body of the buccal fat pad by the parotid duct."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題考頰脂墊（buccal fat pad, BFP）解剖與特性（選對）。核心正確者為 D：頰延伸（buccal extension）與中央本體（central body）之間以腮腺導管（parotid/Stensen's duct）分隔。⚠ 其餘皆錯：BFP 最大葉為 buccal extension（本體/頰延伸）而非 temporal extension；BFP 體積相對穩定、對體重與年齡變化具抗性，並非隨年齡『顯著』持續減少；且平均體積男性略大於或近似女性，並無『女性約 10.2 mL 且大於男性』之說。記住 BFP 由中央本體加四個延伸（buccal、pterygoid、pterygopalatine、temporal），臨床上是頰部與顎部（如 IVVP 死腔填補）重建的重要帶蒂脂肪來源。", "peropt": {"A": "✗ 錯誤。BFP 最大葉為 buccal extension／中央本體，而非 temporal extension；『佔 30–40% 重量』之敘述亦不符。", "B": "✗ 錯誤。BFP 體積相對穩定，對年齡與體重變化具抗性，並非隨一生『顯著』持續減少。", "C": "✗ 錯誤。並無『女性平均約 10.2 mL 且大於男性』之數據；男性 BFP 一般略大或與女性近似。", "D": "◎ ：Buccal extension 與中央本體（central body）之間由腮腺導管（parotid／Stensen's duct）分隔。"}, "cite": "待複查（NG 頰脂墊解剖 記憶佐證）", "conflict": ""}, {"id": "3202", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following conditions are considered appropriate indications for utilizing the buccal fat pad (BFP) flap for reconstruction? (複選)", "opts": {"A": "Closure of an oronasal fistula", "B": "Repair of a cleft palate defect during primary palatoplasty", "C": "Bolstering palate closure to prevent fistula formation", "D": "Reconstruction of a large full-thickness skin defect on the cheek", "E": "Providing structural support for dental implant placement in the mandible"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "**Buccal fat pad（頰脂墊）瓣**的適應症全在**口內**：關閉口鼻瘻管、一期顎裂修補、加強顎部縫合以預防瘻管。它**體積有限、無皮膚**，不能修補頰部全層皮膚缺損，也不作為下顎植牙的結構支撐。", "peropt": {"A": "◎ 關閉口鼻瘻管。", "B": "◎ 一期顎裂修補時使用。", "C": "◎ 加強顎部縫合、預防瘻管。", "D": "✗ 無法修補大面積全層皮膚缺損。", "E": "✗ 不提供植牙的結構支撐。"}, "cite": "NG115 · NG115-B08-Q11", "conflict": ""}, {"id": "3203", "sub": "CRF", "src": "NG", "years": [115], "stem": "Regarding the management, classification, and surgical options for oronasal fistulas (ONF), which of the following statements are true? (複選)", "opts": {"A": "The Pittsburgh Fistula Classification System categorizes fistulas based on anatomical location, with seven distinct subtypes.", "B": "Tension at the site of repair, resulting from either cleft width or deficiency of local tissues, is considered by most to be the main factor contributing to fistula formation.", "C": "For larger fistulas (>3 mm), local turnover flaps alone are typically insufficient, and radical remobilization of palatal flaps or additional tissue transfer is often required for a robust two-layer repair.", "D": "The buccal fat pad (BFP) flap is generally considered more suitable for posterior or middle-third palatal fistulas and is less ideal for anterior fistulas due to its limited length and potential for compromised vascularity.", "E": "The facial artery musculomucosal (FAMM) flap is a random-pattern flap that is best utilized for small fistulas (<2 mm) because it is too short to be harvested for larger or recurrent defects."}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "口鼻瘻管（ONF）四要點：**Pittsburgh 分類共 7 型**（依解剖位置）；**張力是最主要成因**（裂隙寬度或局部組織不足）；**>3 mm** 的瘻管需徹底重新游離顎瓣或額外組織轉移做雙層修補；**BFP 適合中後段顎部**，前段因長度與血供受限而不理想。\n**FAMM 瓣是 axial（顏面動脈）血流型**，可用於較大或復發性缺損——選項 E 說它是 random pattern 且只能修 <2 mm，兩處皆錯。", "peropt": {"A": "◎ Pittsburgh 分類 7 型。", "B": "◎ 張力為主因。", "C": "◎ >3 mm 需雙層修補與組織轉移。", "D": "◎ BFP 適中後段，前段不理想。", "E": "✗ FAMM 為 axial pattern，適用較大／復發性缺損。"}, "cite": "NG115 · NG115-B08-Q12", "conflict": ""}, {"id": "3204", "sub": "CRF", "src": "NG", "years": [115], "stem": "According to the provided text, which of the following is considered by most to be the main etiologic factor contributing to the formation of an oronasal fistula (ONF)?", "opts": {"A": "Colonization by Staphylococcus aureus and Streptococcus pyogenes at the surgical site.", "B": "Tension at the site of repair resulting from either cleft width or deficiency of local tissues.", "C": "A failure to administer a routine postoperative course of systemic prophylactic antibiotics.", "D": "External predictors such as the presence of Treacher Collins syndrome or the surgeon's level of experience."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "與 CN3109 選項 B 同一考點，單獨成題：**口鼻瘻管的主要成因是修補處的張力**（源自裂隙寬度或局部組織不足），不是細菌定殖、不是抗生素、也不是術者經驗。", "peropt": {"A": "✗ 細菌定殖非主因。", "B": "◎ ：修補處張力。", "C": "✗ 預防性抗生素非決定因素。", "D": "✗ 外在預測因子（症候群、術者經驗）皆非主因。"}, "cite": "NG115 · NG115-B08-Q13", "conflict": ""}, {"id": "3205", "sub": "CRF", "src": "NG", "years": [115], "stem": "Which of the following statements regarding the management and surgical treatment of velopharyngeal dysfunction (VPD) is correct?", "opts": {"A": "Velopharyngeal mislearning is caused by structural abnormalities and must be treated with surgical intervention.", "B": "The posterior pharyngeal flap is optimally suited for patients who present with poor lateral pharyngeal wall motion.", "C": "The Furlow double-opposing Z-palatoplasty is highly successful in achieving velopharyngeal competence even when the gap size exceeds 10 mm.", "D": "In a sphincter pharyngoplasty, the flap inset should be positioned high on the posterior pharyngeal wall at the site of attempted velopharyngeal closure."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "VPD 術式與**咽側壁動作**的配對（本域最高頻決策）：\n**側壁動作差 → sphincter pharyngoplasty**（瓣須置於後咽壁**高處**、即嘗試閉合的水平）\n**側壁動作好、矢狀縫隙 → posterior pharyngeal flap**\n**縫隙小、肌肉矢狀走向 → Furlow**（>10 mm 無效）\n**Mislearning 屬學習性，靠語言治療，不開刀。**", "peropt": {"A": "✗ Mislearning 非結構性，不需手術。", "B": "✗ 側壁動作差者不宜 pharyngeal flap（需側壁代償）。", "C": "✗ 縫隙 >10 mm 時 Furlow 成功率低。", "D": "◎ ：sphincter 的瓣應置於後咽壁高處。"}, "cite": "NG115 · NG115-B08-Q14", "conflict": ""}, {"id": "3206", "sub": "CRF", "src": "NG", "years": [115], "stem": "Regarding the timing of cleft nasal surgery, when is an \"intermediate rhinoplasty\" usually performed?", "opts": {"A": "At the time of the initial cleft lip repair.", "B": "Before school, typically between 4 and 6 years old.", "C": "Prior to the eruption of the canine teeth, between 9 and 11 years old.", "D": "After facial growth has completed, around 14 to 18 years old."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "唇裂鼻整形的三個時機：**primary**（初次唇修補時）→ **intermediate（入學前，4–6 歲）**→ **definitive（生長結束後，14–18 歲）**。9–11 歲那個時間點是**齒槽骨移植**（尖牙萌發前），別跟鼻整形混淆。", "peropt": {"A": "✗ 此為 primary rhinoplasty。", "B": "◎ ：入學前 4–6 歲。", "C": "✗ 9–11 歲、尖牙萌發前 → 齒槽骨移植。", "D": "✗ 14–18 歲 → definitive rhinoplasty。"}, "cite": "NG115 · NG115-B08-Q15", "conflict": ""}, {"id": "3207", "sub": "CRF", "src": "NG", "years": [115], "stem": "關於兒童顏面骨折（pediatric facial fractures）之流行病學與骨折型態，下列何者最正確？", "opts": {"A": "Le Fort fracture 在 5 歲以下兒童最常見，主要因 frontal sinus 尚未發育完成", "B": "兒童 mandibular fracture 最常見部位為 mandibular angle，且其發生率隨年齡下降", "C": "Orbital fracture 是整體兒童顏面骨折中最常見的骨折型態，而 condylar/subcondylar fracture 為最常見 mandibular fracture", "D": "Midface fracture 在兒童十分常見，主因為 midface 缺乏 forehead 與 mandible 保護", "E": "兒童 facial fracture 合併 intracranial injury 的機率低，因此 routine neurologic evaluation 並不重要"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "小兒顏面骨折流行病學（新版定論）：**眶骨為整體最常見的顏面骨折**；**髁突／髁突下為最常見的下頜骨折**（隨年齡增加才轉向 body／angle）。Le Fort 型見於 >10 歲；幼兒中臉受額與下頜保護、少見中臉骨折；顏面骨折常合併顱內損傷，神經學評估重要。", "peropt": {"A": "✗ Le Fort 多見於 >10 歲；幼兒多為斜向顱顏骨折。", "B": "✗ 最常見下頜骨折為**髁突**，且發生率非隨年齡下降。", "C": "◎ ：眶骨最常見；髁突／髁突下為最常見下頜骨折。", "D": "✗ 幼兒中臉骨折少見（受額與下頜保護）。", "E": "✗ 常合併顱內損傷，神經學評估重要。"}, "cite": "NG115 · NG115-B09-Q01", "conflict": ""}, {"id": "3208", "sub": "CRF", "src": "NG", "years": [115], "stem": "下列有關 orbital hypertelorism 矯正手術中 orbital shift 與 facial bipartition 的敘述，何者最正確？", "opts": {"A": "若病人有正常的 maxillary arch 與 occlusion，通常仍優先選擇 bipartition，以增加上顎寬度。", "B": "Bipartition 的 osteotomy 會經過 zygomatic arch、pterygomaxillary junction 與 palate，可同時改善 maxillary arch 與 nasal airway。", "C": "Bipartition 適用於 orbit axis 正常、但僅有輕度 hypertelorism 的患者。", "D": "Orbital shift 手術必須經過 pterygomaxillary disjunction，否則無法有效內移 orbit。", "E": "Tessier 最初提出的 orbital shift technique 中，osteotomy 線位於 infraorbital rim 之上。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "Bipartition 的截骨線經過 **zygomatic arch → pterygomaxillary junction → palate**，因此能同時擴張上頜弓與鼻氣道。反過來說：**咬合與上頜弓正常時，就該避開 pterygomaxillary disjunction，改選 orbital shift**（此為兩者關鍵分界，orbital shift 不經翼上頜離斷）。", "peropt": {"A": "✗ 上頜弓（maxillary arch）與咬合正常時應優先 orbital shift；bipartition 會不必要地經 pterygomaxillary disjunction 擴大上頜弓，反造成後牙開咬（posterior open bite）。", "B": "◎ ：bipartition 截骨路徑涵蓋 zygomatic arch → pterygomaxillary junction → palate，可同時擴張上頜弓與鼻氣道。", "C": "✗ 眶軸（orbital axis）正常＋僅輕度 hypertelorism → orbital shift（box osteotomy）即可，無須 bipartition。", "D": "✗ Orbital shift 不需 pterygomaxillary disjunction；需經此路徑者為 bipartition，這正是兩者分界。", "E": "✗ Tessier 原始 orbital shift 的截骨線位於 infraorbital rim 之下（below），非之上。"}, "cite": "NG115 · NG115-B09-Q02", "conflict": ""}, {"id": "3209", "sub": "CRF", "src": "NG", "years": [115], "stem": "下列有關 Tessier craniofacial clefts 的敘述，何者錯誤？", "opts": {"A": "Tessier number 7 cleft 為最外側的 craniofacial cleft，常與 hemifacial microsomia 有關。", "B": "Tessier number 3 cleft 常伴隨 nasolacrimal system disruption，且可能造成 oral、nasal 與 orbital cavity 相通。", "C": "Tessier number 4 cleft 的 bony cleft 位於 infraorbital foramen 外側。", "D": "Tessier number 6 cleft 可視為 Treacher Collins syndrome 的不完全型態之一。", "E": "Tessier number 14 cleft 可與 frontonasal encephalocele 及 severe hypertelorism 有關。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Tessier No.4 的骨性裂位於 infraorbital foramen **內側（medial）**，這是 No.4 與 No.5 的關鍵分界（No.5 才在**外側 lateral**）。其餘四個選項皆為正確敘述，可一併記成 Tessier 速查表（No.7 最外側、No.3 侵犯淚器三腔相通、No.6-7-8＝TCS、No.14 為 No.0 顱側延伸）。", "peropt": {"A": "✓ No.7（最外側 craniofacial cleft）與 hemifacial microsomia 密切相關。", "B": "✓ No.3（oro-naso-ocular cleft）侵犯 nasolacrimal system，可使 oral、nasal、orbital 三腔相通。", "C": "◎ （此為錯誤敘述）：No.4 的 bony cleft 位於 infraorbital foramen 內側（medial）；位於外側（lateral）者為 No.5。", "D": "✓ No.6 可視為 Treacher Collins syndrome 的不完全型（No.6-7-8 組合構成完整 TCS）。", "E": "✓ No.14（midline cleft，No.0 的顱側延伸）與 frontonasal encephalocele 及 severe hypertelorism 相關。"}, "cite": "NG115 · NG115-B09-Q03", "conflict": ""}, {"id": "3210", "sub": "CRF", "src": "NG", "years": [115], "stem": "下列有關 sagittal craniosynostosis（SC）臨床表現，何者最可能出現？", "opts": {"A": "Brachycephaly", "B": "Trigonocephaly", "C": "Scaphocephaly", "D": "Cloverleaf skull", "E": "Midface hypoplasia"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "顱縫與頭形一一對應（背死）：\n**矢狀縫 sagittal → scaphocephaly（舟狀頭）**\n額縫 metopic → trigonocephaly（三角頭）\n雙側冠狀縫 bicoronal → brachycephaly（短頭）\n多縫早閉 → cloverleaf skull（Kleeblattschädel）", "peropt": {"A": "✗ Brachycephaly（短頭）＝雙側冠狀縫（bilateral coronal suture）早閉，非 sagittal。", "B": "✗ Trigonocephaly（三角頭）＝額縫（metopic suture）早閉。", "C": "◎ ：矢狀縫（sagittal suture）早閉 → scaphocephaly（舟狀頭）。", "D": "✗ Cloverleaf skull（Kleeblattschädel）＝多縫（multiple suture）早閉。", "E": "✗ Midface hypoplasia 屬症候群性顱縫早閉（Crouzon、Apert）特徵，非單純 sagittal SC 表現。"}, "cite": "NG115 · NG115-B09-Q04", "conflict": ""}, {"id": "3211", "sub": "CRF", "src": "NG", "years": [115], "stem": "一名 8 個月大嬰兒接受 open cranial vault remodeling (CVR) 治療 nonsyndromic sagittal craniosynostosis。關於圍手術期血液管理與輸血策略，下列何者最正確？", "opts": {"A": "術中低血壓麻醉（hypotensive anesthesia）已被證實可顯著減少輸血需求，因此應作為標準麻醉方式。", "B": "術前使用 recombinant erythropoietin（EPO）已被證實完全消除術中輸血需求，因此為所有病人常規建議。", "C": "Tranexamic acid 的使用與術後癲癇及血栓栓塞事件顯著增加有關，因此兒童 CVR 應避免使用。", "D": "Whole blood transfusion 相較於 component therapy，可同時提供紅血球、凝血因子與血小板，並減少血液捐贈者暴露次數。", "E": "術後輸血決策主要依據引流量，血紅素濃度與血流動力學狀態通常不列入考量。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "小兒顱穹重塑（CVR）圍術期輸血四要點：**低血壓麻醉無顯著減少輸血**（Fearon）；**EPO 可減少但無法消除**輸血；**TXA 安全有效**，不增加癲癇或血栓；**全血輸注**可同時提供紅血球、凝血因子與血小板並減少捐血者暴露。術後決策須綜合 Hb 與血流動力學，非只看引流量。", "peropt": {"A": "✗ 低血壓麻醉（hypotensive anesthesia）與正常血壓麻醉相比，輸血需求無顯著差異（Fearon），不能列為標準麻醉方式。", "B": "✗ 術前 recombinant EPO 可**減少**但無法**完全消除**術中輸血需求，且非所有病人常規建議。", "C": "✗ Tranexamic acid（TXA）於兒童 CVR 安全有效，**未**顯著增加癲癇或血栓栓塞（thromboembolism）事件。", "D": "◎ ：whole blood transfusion 可同時提供紅血球、凝血因子與血小板，並減少捐血者暴露次數。", "E": "✗ 術後輸血決策須綜合血紅素（Hb）與血流動力學（hemodynamics），非僅依引流量。"}, "cite": "NG115 · NG115-B09-Q05", "conflict": ""}, {"id": "3212", "sub": "CRF", "src": "NG", "years": [115], "stem": "關於 syndromic craniosynostosis 於出生後前 2 年內 cephalocranial disproportion 的處理原則，下列何者最正確？", "opts": {"A": "Cranial vault expansion 一旦成功降低顱內壓，通常可永久解決 intracranial hypertension，不需再次介入。", "B": "Utria 等人認為 cranial vault remodeling 應盡可能於出生後 3 個月內完成，以降低再手術率。", "C": "嚴重 syndromic craniosynostosis 患者若出生時即有 cephalocranial disproportion，可能需於出生後數天至數週內開始分期治療。", "D": "第二年出現再度失衡時，首選治療為 frontofacial procedure，因其復發率最低。", "E": "「Surfing the bone pressure wave」意指延後所有手術至 2 歲後一次完成重建。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "症候群性顱縫早閉的顱內高壓**復發率高**，早期手術只是暫時恢復平衡——這就是「**surfing the bone pressure wave**」：**分期、順著顱內壓波峰逐次介入**，而非拖到 2 歲一次做完。Utria 認為最佳時機約 **6–9 個月**。", "peropt": {"A": "✗ 症候群性顱縫早閉的顱內高壓（intracranial hypertension）復發率高，單次擴張常需再次介入，非永久解決。", "B": "✗ Utria 主張最佳時機約 **6–9 個月**；過早（如 3 個月內）手術反使再手術率上升。", "C": "◎ ：出生即有嚴重 cephalocranial disproportion 者，可能需於出生後數天至數週內即開始分期治療。", "D": "✗ 第二年再度失衡時 frontofacial procedure 並非首選（復發率不低），仍以 vault expansion 為主。", "E": "✗ 「Surfing the bone pressure wave」意指順著顱內壓波峰**分期逐次介入**，非延後至 2 歲一次完成。"}, "cite": "NG115 · NG115-B09-Q06", "conflict": ""}, {"id": "3213", "sub": "CRF", "src": "NG", "years": [115], "stem": "關於 craniofacial microsomia（CFM）病人下顎重建（mandibular reconstruction）之治療選擇，下列何者最正確？", "opts": {"A": "Pruzansky type I mandibular deformity 因顳顎關節功能不佳，通常需於幼兒期進行 costochondral rib graft 重建。", "B": "Pruzansky type IIA mandibular deformity 因 glenoid fossa 缺失，必須接受 TMJ 重建。", "C": "Pruzansky type IIB mandibular deformity 的治療仍具爭議，可採 distraction osteogenesis、costochondral rib graft 或兩者合併。", "D": "Pruzansky type III mandibular deformity 可單純以 orthodontic treatment 達到功能性重建。", "E": "所有 Pruzansky type I–III mandibular deformities 均以 orthognathic surgery 為首選治療。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顱顏短小症（CFM）下顎重建依 Pruzansky-Kaban 分型：**Type I**（下顎小但 TMJ 正常）→ 矯正/骨骼成熟後正顎；**Type IIA**（髁突、升支、關節窩皆存但形態異常）→ 主要需下顎延長（MDO）而非 TMJ 重建；**Type IIB**（升支/髁突移位、glenoid fossa 缺如）→ 治療仍具爭議，MDO／肋軟骨移植／兩者併用；**Type III**（缺功能性升支-髁突單元）→ 至少需骨移植重建。⚠ 勿將 Type I 誤為需幼兒期肋軟骨重建；正顎非所有分型首選。", "peropt": {"A": "✗ Type I 的 TMJ（髁突/關節窩）結構與功能正常，以矯正或骨骼成熟後正顎為主，非幼兒期 costochondral rib graft 重建。", "B": "✗ Type IIA 之髁突、升支、glenoid fossa 均存在（僅形態異常），主要需下顎延長（MDO）而非 TMJ 重建。", "C": "◎ Type IIB（升支與髁突移位、glenoid fossa 缺如）治療仍具爭議，可採 MDO、costochondral rib graft 或兩者併用。", "D": "✗ Type III 缺乏功能性升支-髁突單元，至少需骨移植重建，單靠 orthodontic 無法達功能重建。", "E": "✗ 正顎手術（orthognathic surgery）僅為部分骨骼成熟病人之選項，非所有 Pruzansky-Kaban 分型之首選。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "3214", "sub": "CRF", "src": "NG", "years": [115], "stem": "關於 Parry–Romberg syndrome (PHA) 的神經學特徵與影像學表現，下列何者正確？", "opts": {"A": "顏面萎縮常跨越中線，呈雙側對稱分布。", "B": "PHA 最常起始於三叉神經 V3 分布區。", "C": "約 30–40% 病人可出現中樞神經系統影像異常，但有症狀者少於 20%。", "D": "腦部 MRI 最常見表現為雙側基底核鈣化。", "E": "腦脊髓液檢查通常正常，不支持發炎機轉。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "Parry–Romberg 四個數字：**95% 單側**（不跨中線）；起始最常 **V2（45%）> V1（35%）> V3（20%）**；CNS 影像異常 **30–40%**，但有症狀者 **<20%**；MRI 最常見為**同側白質 T2 高訊號**（非雙側基底核鈣化）。CSF 可有發炎變化，支持發炎/自體免疫機轉。", "peropt": {"A": "✗ 約 95% 為單側（unilateral），極少跨中線，非雙側對稱。", "B": "✗ 最常起始於 V2（約 45%）＞ V1（約 35%）＞ V3（約 20%）；非 V3。", "C": "◎ ：CNS 影像異常約 30–40%，但有神經症狀者 <20%。", "D": "✗ 腦部 MRI 最常見為同側白質（ipsilateral white matter）T2 高訊號，非雙側基底核鈣化。", "E": "✗ 腦脊髓液（CSF）可見發炎變化（淋巴球增多/寡株帶），支持發炎機轉。"}, "cite": "NG115 · NG115-B09-Q08", "conflict": ""}, {"id": "3215", "sub": "CRF", "src": "NG", "years": [115], "stem": "關於 Robin sequence（RS）患者的 Mandibular Distraction Osteogenesis（MDO），下列何者錯誤？", "opts": {"A": "MDO 藉由下顎延長使舌根前移，增加咽腔容積", "B": "新生兒進行 MDO 時，distraction rate 通常較大兒童快", "C": "Internal distractor 的優點之一是較少發生 pin-site infection", "D": "External distractor 不需二次手術移除裝置", "E": "MDO 已被證實可促進下顎超正常（catch-up）生長至正常大小"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "MDO 可解除舌根阻塞，但**不會讓下顎追趕（catch-up）生長到正常大小**——延長的是「當下的長度」，非「未來的生長潛能」。新生兒 distraction rate 約 1.5–2 mm/day（快於大兒童約 1 mm/day）以防過早骨化。", "peropt": {"A": "✓ 下顎前移帶動 genioglossus 與舌骨肌群前移，擴大咽腔（airway）容積。", "B": "✓ 新生兒骨再生快，distraction rate 約 1.5–2 mm/day（大兒童約 1 mm/day），以免過早骨化（premature consolidation）。", "C": "✓ Internal distractor 埋於皮下，pin-site infection 率低於 external distractor。", "D": "✓ External distractor 可直接拆除，不需二次手術移除裝置。", "E": "◎ （此為錯誤敘述）：MDO 延長當下的下顎長度，但**無法**促成下顎 catch-up 生長至正常大小。"}, "cite": "NG115 · NG115-B09-Q09", "conflict": ""}, {"id": "3216", "sub": "CRF", "src": "NG", "years": [115], "stem": "一名 8 歲男童，診斷為 Treacher Collins syndrome（TCS），幼年時曾接受腭裂修補手術。近年家長發現其睡覺時有明顯打鼾、呼吸暫停及白天注意力不集中情形。門診評估懷疑 obstructive sleep apnea（OSA）。下列何者是最適當的下一步處置？", "opts": {"A": "使用 OSA 問卷評估即可，不需進一步檢查", "B": "因 TCS 主要問題是下顎後縮，直接安排 mandibular distraction osteogenesis（MDO）", "C": "安排 overnight polysomnography（PSG）評估睡眠呼吸障礙程度", "D": "先安排 palate revision，改善上呼吸道空間", "E": "若有 OSA，一定是單純 tongue-base obstruction 所造成"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "TCS 的呼吸道阻塞是**多層次（multilevel）**的：問卷不能取代檢查；不能因下顎後縮就直接 MDO。**PSG 是診斷與分級的標準工具**。另注意顎裂修補反而可能惡化呼吸道。", "peropt": {"A": "✗ OSA 問卷在 TCS 預測力不佳，不能取代客觀檢查。", "B": "✗ 未以 PSG 確認阻塞層次（multilevel）前不應逕行 MDO。", "C": "◎ ：安排整夜多項睡眠檢查（overnight polysomnography, PSG）為診斷與嚴重度分級之標準工具。", "D": "✗ 顎裂修補（palate repair）反可能縮小上呼吸道、惡化 OSA。", "E": "✗ TCS 常為多層次（multilevel）阻塞，非單純 tongue-base obstruction。"}, "cite": "NG115 · NG115-B09-Q10", "conflict": ""}, {"id": "3217", "sub": "CRF", "src": "NG", "years": [115], "stem": "一名 4歲男童 因鼻背正中線腫塊就診。家長表示出生後即發現，近年逐漸變大，偶爾有局部紅腫感染。理學檢查發現一個堅實、囊性腫塊位於鼻背正中線。醫師懷疑為 nasal dermoid cyst。下列哪些敘述正確？（複選）", "opts": {"A": "Dermoid cyst 是胚胎期組織融合時外胚層細胞殘留所形成的先天性病變", "B": "所有鼻部正中線 dermoid cyst 均應接受 CT 檢查評估顱內延伸", "C": "Periorbital dermoid cyst 最常見於 frontozygomatic suture 附近，顱內延伸極為罕見", "D": "Nasal dermoid 若有 intracranial extension，需同時採取顱內及顱外途徑完整切除", "E": "即使部分囊壁殘留，復發風險仍極低，因此不需追求完整切除"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "鼻部**正中線** dermoid 一律要影像（CT／MRI）排除顱內延伸，並鑑別 encephalocele 與 glioma。眶周（frontozygomatic suture）dermoid 顱內延伸極罕見。**囊壁殘留＝復發**，必須完整切除。", "peropt": {"A": "◎ 胚胎融合時外胚層／神經外胚層（ectoderm/neuroectoderm）殘留所形成的先天性病變。", "B": "◎ 所有正中線（midline）鼻部 dermoid 均須 CT／MRI 評估顱內延伸，並鑑別 encephalocele 與 nasal glioma。", "C": "◎ 眶周 dermoid 好發於 frontozygomatic suture 附近，顱內延伸極罕見。", "D": "◎ 有顱內延伸者須顱內外聯合徑路（combined intracranial-extracranial）完整切除。", "E": "✗ 囊壁殘留必然復發，須追求完整切除（complete excision）；復發風險並非極低。"}, "cite": "NG115 · NG115-B09-Q14", "conflict": ""}, {"id": "3218", "sub": "CRF", "src": "NG", "years": [115], "stem": "一對連體嬰出生後入住 NICU，準備接受後續分離手術評估。下列哪些敘述正確？（複選）", "opts": {"A": "連體嬰通常建議於 36–38 週以剖腹產方式分娩", "B": "Echocardiography 僅適用於 thoracopagus twins，其他類型不需要常規檢查", "C": "CT 可評估腹腔及後腹腔器官的血管解剖構造", "D": "MRI 對評估 cardiac fusion 或 cortical fusion 特別有幫助", "E": "CT 與 MRI 常具有互補性，前者較擅長骨性結構，後者較擅長軟組織"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 連體嬰（conjoined twins）NICU 術前評估：通常約 **36–38 週剖腹產**；影像上 **CT 擅長骨性結構與腹腔/後腹腔器官及血管解剖**，**MRI 擅長軟組織**、特別助於 cardiac fusion（thoracopagus）與 cortical fusion（craniopagus），兩者互補。⚠ Echocardiography 為**所有**連體嬰之必要檢查（非僅 thoracopagus）。正解 ACDE。", "peropt": {"A": "◎ 連體嬰通常建議約 36–38 週以剖腹產（cesarean）方式分娩。", "B": "✗ Echocardiography 為**所有**連體嬰的必要檢查（先天性心臟病發生率顯著偏高），非僅限 thoracopagus。", "C": "◎ CT 可評估腹腔及後腹腔器官與其血管解剖（vascular anatomy）構造。", "D": "◎ MRI 對 cardiac fusion（thoracopagus）及 cortical/腦皮質 fusion（craniopagus）評估特別有幫助。", "E": "◎ CT 擅長骨性結構、MRI 擅長軟組織，兩者具互補性。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2002", "sub": "BRE", "src": "GS", "years": [110, 111, 112, 114, 115], "stem": "Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?", "opts": {"A": "Amphetamines, anabolic steroids, marijuana", "B": "Digoxin, ACE inhibitors, spironolactone", "C": "Benzodiazepines, risperidone, haloperidol", "D": "Testosterone, Estrogen, prednisone", "E": "Cephalosporins, metronidazole, isoniazid"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "與男性女乳症相關藥物四大類：**娛樂性／賀爾蒙**（amphetamines、anabolic steroids、marijuana、heroin）、**心血管**（digoxin、ACE inhibitors、spironolactone）、**精神科**（benzodiazepines、risperidone、haloperidol）、**內分泌**（testosterone、estrogen、prednisone）。**抗生素類（cephalosporins、metronidazole、isoniazid）不相關**，故為正解。", "peropt": {"A": "相關。安非他命（amphetamines）、合成類固醇（anabolic steroids）、大麻（marijuana）皆與男性女乳症相關。", "B": "相關。Digoxin、ACE inhibitors、spironolactone（抗雄性素作用）。", "C": "相關。Benzodiazepines、risperidone、haloperidol（經高泌乳素血症 hyperprolactinemia）。", "D": "相關。外源性 testosterone（周邊芳香化為 estrogen）、estrogen、prednisone。", "E": "◎ 正解（不相關）。Cephalosporins、metronidazole、isoniazid 屬抗生素／抗結核藥，非標準列表致女乳藥物。註：少數文獻曾有 isoniazid、metronidazole 個案報告，但標準組合不列入。"}, "cite": "Grabb and Smith's, 8th Chapter 57 p576", "conflict": "⚠ 同題歷屆重出：題幹完全相同（選出與gynecomastia無關的藥物組）。2002（110、112、114年）答E、2009（111年）答C——僅選項順序不同（抗生素組cephalosporins/metronidazole/isoniazid被移位）。2197（114、115年）答E，選項經改寫（distractor改為heroin、food contaminants等，正解組改為cephalosporins/penicillins/carbapenems），核心考點仍為「抗生素類與男性女乳症無關」。記概念不記字母。"}, {"id": "2024", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 35-year-old female presents with severe bilateral breast ptosis (Regnault Grade 3) following massive weight loss. Her body mass index (BMI) is 24. Physical examination reveals a narrow breast base width and an upper pole pinch thickness of only 1.5 cm. The patient strongly desires a one-stage augmentation mastopexy to achieve full, lifted breasts. To minimize the long-term risk of lower pole stretch deformity (bottoming out) and ensure the vascular safety of the nipple-areolar complex (NAC), which of the following surgical strategies is most supported by current literature?", "opts": {"A": "Inferior pedicle with a Wise-pattern skin excision, using a high-profile implant placed in the subglandular plane.", "B": "Superomedial pedicle with a Wise-pattern skin excision, using a moderate or lower-profile implant placed in the dual-plane.", "C": "Central mound pedicle with a periareolar skin excision, using an extra-high-profile implant placed in the total submuscular plane.", "D": "A one-stage procedure is absolutely contraindicated in patients with severe ptosis; a mastopexy must be performed first, followed by implant placement 6 months later."}, "ans": "B", "multi": false, "etype": "ai", "expl": "Explanation:\n\nThis question tests the critical evaluation of tissue biomechanics and vascularity in augmentation mastopexy.\n\nPedicle Selection: The inferior pedicle's blood supply is severed during implant pocket dissection, rendering the NAC blood supply random and highly prone to ischemia; thus, a superior or superomedial pedicle is strongly recommended.\n\nImplant Profile: High-profile implants exert excessive pressure on a lax skin envelope, significantly increasing the risk of lower pole stretch deformity (bottoming out) over time,. A lower or moderate profile implant (which is wider and taller) is preferred to fill the upper pole while minimizing inferior pressure.\n\nPocket Selection: An upper pole pinch thickness of less than 2 cm is an indication for submuscular or dual-plane placement to prevent implant visibility and rippling.\n\nWhile a staged approach is an option, a one-stage augmentation mastopexy is proven to be safe and effective when tissue-based planning principles are meticulously applied.\n\n(Source: Chapter 62 (Augmentation Mastopexy: Implant Selection & Mastopexy Techniques))", "key": "🎯 單期隆乳提乳（one-stage augmentation mastopexy）於組織條件不佳（MWL、窄乳底、上極 pinch 僅 1.5 cm）之安全策略：（1）血供——囊袋剝離會切斷 inferior pedicle，故選 superior/superomedial pedicle；（2）避免 bottoming out——改用 moderate/lower-profile 並置於 dual-plane（上極 pinch <2 cm 需肌肉下覆蓋防波紋）。⚠ 分期非絕對禁忌，tissue-based planning 下單期安全。", "peropt": {"A": "✗ Inferior pedicle 血供於囊袋（pocket）剝離時被切斷，NAC 血供變隨機；且 high-profile + subglandular 加重下極壓力與 bottoming out，風險最高。", "B": "◎ ：superomedial pedicle 保留 NAC 安全血供；moderate/lower-profile 置於 dual-plane（上極 pinch <2 cm 需肌肉覆蓋以防 rippling/可見），兼顧上極飽滿並降低 bottoming out。", "C": "✗ Extra-high-profile 對鬆弛皮膚壓力過大；periareolar 切口難矯正 Regnault Grade 3 嚴重下垂，選擇矛盾。", "D": "✗ 嚴重下垂並非單期手術『絕對』禁忌；遵循 tissue-based planning 時單期可安全執行。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2025", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 47-year-old female, who underwent bilateral breast augmentation with silicone implants 5 years ago, presents with rapid unilateral breast swelling and severe capsular contracture over the past month. Ultrasound imaging reveals a highly aggressive mass with extracapsular spread. Fluid aspiration and tissue biopsy demonstrate negative CD30 expression and the absence of T-cell monoclonality via flow cytometry. Which of the following statements is most accurate?", "opts": {"A": "This condition is directly caused by a subclinical bacterial biofilm infection and can be successfully eradicated with implant removal and prolonged antibiotic irrigation.", "B": "BIA-ALCL is highly indicated", "C": "BIA-SCC is highly indicated and this malignancy exhibits a highly aggressive phenotype; extracapsular spread is common at diagnosis, and short-term mortality rates are reported to be approximately 50%.", "D": "The pathogenesis of this tumor is universally linked to an active Epstein-Barr virus (EBV) infection."}, "ans": "C", "multi": false, "etype": "ai", "expl": "Explanation:\n\nThis question evaluates knowledge of breast implant-associated squamous cell carcinoma (BIA-SCC), a newly emerging entity distinct from BIA-ALCL.\n\nOption A. is incorrect: It is a true malignancy, not merely a biofilm-induced subclinical infection.\n\nOption B. is incorrect: BIA-ALCL will have positive CD30 expression and the presence of T-cell monoclonality via flow cytometry.\n\nOption C. is correct:\n\nOption D. is incorrect: Unlike BIA-ALCL, BIA-SCC has been reported in patients with a history of all types of implants, including smooth implants.\n\nSource: Chapter 65 (Emerging Breast Implant Associated Malignancies)", "key": "🎯 鑑別 BIA-SCC 與 BIA-ALCL：快速單側腫脹＋嚴重莢膜攣縮＋腫塊＋extracapsular spread，且 **CD30 陰性、無 T-cell monoclonality → 排除 ALCL，指向 BIA-SCC**。BIA-SCC 侵襲性強，確診時常已莢膜外擴散，短期死亡率約 50%。⚠ BIA-ALCL 為 CD30 陽性、T-cell 單株、多以晚發 seroma 表現、預後相對佳；BIA-SCC 見於各型植入物且與 EBV 無普遍關聯。", "peropt": {"A": "✗ 此為真性惡性腫瘤（BIA-SCC），非單純 biofilm 亞臨床感染，抗生素沖洗無法根治。", "B": "✗ BIA-ALCL 應為 CD30 **陽性**且有 T-cell monoclonality；本例兩者皆陰性，故排除。", "C": "◎ 符合 BIA-SCC：侵襲性表型、確診時常見莢膜外擴散（extracapsular spread），短期死亡率報告約 50%。", "D": "✗ BIA-SCC 並非普遍與 active EBV 感染連結（EBV 關聯者多屬其他淋巴瘤）。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2026", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 42-year-old female with a BRCA1 mutation is scheduled for bilateral prophylactic nipple-sparing mastectomies (NSM). She strongly desires autologous tissue reconstruction. However, she has a history of bariatric surgery for morbid obesity and, following weight stabilization, underwent a full abdominoplasty and a medial thigh lift. Furthermore, she explicitly states that she cannot accept any scars on her buttocks, adamantly refusing all gluteal flaps. Excluding the use of implants, which of the following microvascular free flap donor sites is the most feasible and reasonable choice given her anatomic constraints?", "opts": {"A": "Free deep inferior epigastric perforator (DIEP) flaps", "B": "Free profunda artery perforator (PAP) flaps or transverse upper gracilis (TUG) flaps", "C": "Free lumbar artery perforator (LAP) flaps", "D": "Pedicled latissimus dorsi flaps without concurrent fat grafting or implants"}, "ans": "C", "multi": false, "etype": "ai", "expl": "Explanation:\n\nA surgical history of an abdominoplasty or panniculectomy destroys the anatomic structure of the deep and superficial inferior epigastric perforators, representing an absolute contraindication for abdominal flaps such as DIEP or TRAM flaps; thus, A. is excluded.\n\nA history of a medial thigh lift typically excises or damages the subcutaneous tissue and perforators of the medial thigh, making PAP and TUG flaps unsafe to perform; thus, B. is excluded.\n\nThe patient refuses gluteal scars, ruling out SGAP and IGAP flaps.\n\nOption D., the pedicled latissimus dorsi flap, typically provides insufficient tissue volume for total breast reconstruction, particularly in massive weight loss patients whose back fat is often thin. Without concurrent implants or fat grafting, it is extremely difficult to achieve symmetric and full bilateral reconstructions.\n\nOption C. is correct. The lumbar artery perforator (LAP) flap utilizes tissue from the posterolateral flank/lumbar region. This area often retains residual pliable tissue with ample volume in massive weight loss patients and avoids the restrictions of the abdomen, medial thighs, and buttocks. Although it is technically demanding and may require vascular grafts due to a limited pedicle length, the LAP flap is a recommended salvage donor site in the literature when all primary donor sites are unavailable and the patient refuses specific surgical scars.", "key": "🎯 自體游離皮瓣供區排除邏輯：DIEP/TRAM 需完整下腹壁穿支——abdominoplasty 已破壞，屬絕對禁忌；PAP/TUG 需完整大腿內側穿支——medial thigh lift 已破壞；病人拒絕臀部疤痕故排除 SGAP/IGAP；pedicled LD 體積不足。⚠ 唯一合理選擇為 **LAP（lumbar artery perforator）**皮瓣，利用後腰/側腹組織；缺點蒂短、技術難、常需 vein graft，為文獻『救援供區』。", "peropt": {"A": "✗ Abdominoplasty 已破壞 deep/superficial inferior epigastric 穿支，DIEP 屬絕對禁忌。", "B": "✗ Medial thigh lift 已切除/破壞大腿內側穿支，PAP/TUG 供區不安全。", "C": "◎ LAP（lumbar artery perforator）皮瓣取後腰/側腹殘餘組織，避開腹部、大腿內側與臀部，為主要供區皆不可用時的合理救援選擇（惟蒂短、常需 vein graft）。", "D": "✗ Pedicled LD 於 MWL 病人背部脂肪薄、體積不足，無植入/脂肪移植難達雙側對稱飽滿。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2027", "sub": "BRE", "src": "GS", "years": [115], "stem": "During a left breast reconstruction using a free DIEP flap, you choose the antegrade left internal mammary artery (IMA) and vein (IMV) as the recipient vessels. Upon releasing the vascular clamps after completing the anastomoses, you observe excellent arterial pulsation. However, the dermal edges of the flap begin oozing dark purple blood, and the flap rapidly becomes swollen and cyanotic. You re-examine the venous anastomosis and confirm it is widely patent with no thrombus; however, you note the patient's left IMV has a caliber of only 1.5 mm following a history of radiation therapy. Which of the following is the most physiologically sound and effective maneuver to salvage this flap?", "opts": {"A": "Completely resect the venous anastomosis and replace the venous coupler with a hand-sewn technique to overcome the size discrepancy.", "B": "Diagnose this as severe arterial spasm and immediately revise the arterial anastomosis to the thoracodorsal artery to increase arterial inflow.", "C": "Perform venous supercharging by anastomosing the flap's superficial inferior epigastric vein (SIEV) to an alternative outflow tract, such as the retrograde IMV or thoracodorsal vein.", "D": "Administer systemic tissue plasminogen activator (tPA) and Heparin immediately to dissolve suspected microvascular thrombosis within the flap parenchyma."}, "ans": "C", "multi": false, "etype": "ai", "expl": "Explanation:\n\nC. is the most effective salvage technique: When the primary venous outflow is patent but insufficient to handle the volume, creating a second venous outflow tract (supercharging) using the SIEV is indicated.\n\nA. is incorrect: A hand-sewn anastomosis will not change the inherently restrictive 1.5 mm caliber of the recipient vein.\n\nB. is incorrect: Increasing arterial inflow into an already congested flap will exacerbate the swelling and ischemia.\n\nD. is incorrect: Without evidence of actual thrombosis, administering potent systemic thrombolytics will cause severe bleeding without addressing the mechanical caliber mismatch causing the congestion.\n\n(Source: Chapter 67 & 68 (Microvascular Complications / Venous Congestion))", "key": "🎯 游離皮瓣「動脈通暢但靜脈回流不足」之 venous congestion 處理：動脈搏動良好、皮瓣腫脹發紫、真皮邊緣滲暗紫血，靜脈吻合通暢無血栓，但受區 IMV 因放療僅 1.5 mm 過細 → 屬口徑不足回流不夠。正解為 **venous supercharging**：SIEV 額外吻合至第二回流路徑（retrograde IMV 或 thoracodorsal vein）。⚠ 重縫無法改變受區細口徑；提高動脈灌流加重鬱血；無血栓證據下全身溶栓致大出血。", "peropt": {"A": "✗ 改成手縫（hand-sewn）吻合仍無法改變受區 IMV 本身僅 1.5 mm 的限制性口徑。", "B": "✗ 此為 venous congestion 非 arterial spasm；增加動脈流入只會加重腫脹與缺血。", "C": "◎ 以 SIEV 額外吻合至第二回流路徑（retrograde IMV 或 thoracodorsal vein）行 venous supercharging，最符合生理機轉。", "D": "✗ 無血栓證據下給予全身性 tPA/Heparin，無助於口徑不匹配且易致嚴重出血。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2028", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 50-year-old female with a BMI of 36 kg/m2 is scheduled for a skin-sparing mastectomy and delayed deep inferior epigastric perforator (DIEP) flap reconstruction for right breast cancer. Her medical history includes: (1) Estrogen receptor-positive tumor currently treated with Tamoxifen; (2) A prior open cholecystectomy leaving a right subcostal scar; (3) Heterozygous Factor V Leiden mutation. As the primary reconstructive surgeon, which of the following statements regarding risk assessment and perioperative management are correct? (複選)", "opts": {"A": "Tamoxifen's active metabolites have a half-life of approximately 14 days and increase the risk of microvascular thrombosis; therefore, the medication should be withheld for at least 2 weeks before and 2 weeks after surgery.", "B": "The right subcostal scar may transect the superior epigastric vessels, making a pedicled TRAM flap highly prone to necrosis and relatively contraindicated, whereas a free DIEP flap remains a safer alternative.", "C": "Heterozygous Factor V Leiden mutation poses an extremely high risk for pedicle thrombosis and is an absolute contraindication for microvascular free flap reconstruction.", "D": "Literature indicates that severe obesity (BMI ≥ 35) significantly increases complication rates in abdominally based autologous reconstructions.", "E": "To mitigate the high risk of thrombosis associated with Factor V Leiden, thromboelastography (TEG) can be utilized to precisely guide perioperative anticoagulation therapy, improving flap survival."}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "Explanation:\n\nOption A. is correct: Tamoxifen promotes platelet aggregation and increases the risk of anastomotic thrombosis; it must be paused for 2 weeks perioperatively.\n\nOption B. is correct: A subcostal scar disrupts the superior epigastric artery, increasing pedicled TRAM flap necrosis risk by up to 8-fold, but does not preclude the use of the deep inferior epigastric system (DIEP flap).\n\nOption D. is correct: A BMI ≥ 35 is associated with significantly higher rates of both donor-site (hernia/bulge) and recipient-site (flap loss) complications.\n\nOption E. is correct, making Option C. incorrect: Factor V Leiden is a relative, not absolute, contraindication for microsurgery. Successful microvascular reconstructions have been reported by using TEG-guided anticoagulation protocols.\n\nSource: Chapter 67 (Preoperative Evaluation: Hormonal Treatment, Prior Scars, Obesity, Clotting History)", "key": "🎯 DIEP 術前風險四面向：**Tamoxifen** 促血小板聚集、代謝物半衰期約 14 天，圍術期停藥約 2 週；**右肋下切口**切斷 superior epigastric 系統，pedicled TRAM 壞死風險增約 8 倍，但不影響 deep inferior epigastric 故 DIEP 安全；**BMI ≥ 35** 顯著提高併發症。⚠ **Factor V Leiden 為相對非絕對禁忌**，可用 TEG 導引抗凝，故 C 錯。", "peropt": {"A": "◎ Tamoxifen 促血小板聚集，活性代謝物半衰期約 14 天，圍術期須停藥約 2 週以降低吻合血栓風險。", "B": "◎ 右肋下（subcostal）疤痕切斷 superior epigastric 系統，pedicled TRAM 壞死風險大增（約 8 倍）；DIEP 改用 deep inferior epigastric 系統仍為安全替代。", "C": "✗ Heterozygous Factor V Leiden 屬『相對』非『絕對』禁忌，抗凝管理下可成功完成顯微重建，敘述過度。", "D": "◎ BMI ≥ 35 顯著增加腹部自體重建的供區（疝氣/膨出）與受區（皮瓣喪失）併發症。", "E": "◎ Thromboelastography（TEG）可精準導引圍術期抗凝，改善 Factor V Leiden 病人皮瓣存活。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "2029", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 55-year-old woman is referred to your office for evaluation of breast reconstruction after a recent diagnosis of invasive ductal carcinoma of the right breast. She is a candidate for breast conservation and has planned to undergo a partial mastectomy followed by radiation therapy. Adjuvant chemotherapy will be determined by her final pathology but is also likely. She is interested in a breast reduction after she completes her cancer treatment. What is the best timeline for an oncoplastic breast reduction for optimal healing?", "opts": {"A": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 6 weeks after completion of treatment", "B": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 12 months after completion of treatment", "C": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 24 months after completion of treatment", "D": "Lumpectomy with unilateral oncoplastic reconstruction followed by adjuvant treatments (chemo or radiation), then elective reduction on the contralateral breast for symmetry 6 weeks after completion of treatment", "E": "Lumpectomy with oncoplastic reduction/reconstruction and reduction of contralateral breast for symmetry followed by adjuvant treatment (chemo or radiation) approximately 6 weeks post operation"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "Oncoplastic reduction 時序：**在腫瘤切除同一次手術完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療（化/放療）**。理由：放療後乳房血供與癒合能力永久受損，延後的選擇性縮乳傷口併發症更高；放療前尚未纖維化，塑形最安全、對稱最好。", "peropt": {"A": "✗ 放療完成後僅 6 週即做選擇性縮乳，組織仍處急性放射性發炎期，傷口併發症率高。", "B": "✗ 等 12 個月雖較安全，但已錯過最佳塑形時機，且放療後乳房已纖維化、對稱難達成。", "C": "✗ 等 24 個月同上顧慮，且病人須長期忍受不對稱。", "D": "✗ 對側對稱性縮乳若延到放療之後，會在已放療的患側與未放療健側間製造二次不對稱與癒合差異。", "E": "◎ 腫瘤切除同一次手術即完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療，癒合條件最佳。"}, "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 69. P 736-737.", "conflict": ""}, {"id": "2030", "sub": "BRE", "src": "GS", "years": [115], "stem": "A 42-year-old thin, athletic woman presents with bilateral postmastectomy contour deformity following implant-based breast reconstruction. She states that she has contour deformities both at rest and during activity. She is requesting revisional breast reconstruction. Which of the following is the best course of action for improvement of her concerns?", "opts": {"A": "Lipofilling of the breast as a secondary procedure", "B": "Secondary reconstruction removing the implant and using an abdominal-based DIEP flap", "C": "Secondary reconstruction downsizing her implant to a smaller implant, capsulotomy, and autologous fat grafting", "D": "Fat grafting followed by secondary pocket change and capsulectomy", "E": "Capsulectomy with implant removal"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "Implant-based 重建後、瘦削病人「靜止與活動時皆有」輪廓變形 → 活動時變形＝**animation deformity**，代表義乳位於 **subpectoral**。單靠脂肪或單靠換小義乳都無法解決動態問題，必須改變 pocket 平面。標準：先脂肪移植增厚覆蓋，再二期 **pocket change（subpectoral→prepectoral）＋capsulectomy**。", "peropt": {"A": "✗ 單做 lipofilling 只改善靜止輪廓，無法消除肌肉收縮的動態變形（animation deformity），未解決根本原因。", "B": "✗ 改用 DIEP 對『瘦削、athletic』病人不合適——腹部脂肪量不足，且屬過度治療（病人要求修整非全自體重建）。", "C": "✗ 縮小義乳＋capsulotomy＋脂肪移植仍留在原 subpectoral 平面，animation deformity 依舊存在。", "D": "◎ 先脂肪移植改善軟組織厚度與 rippling，再二期 pocket change（subpectoral→prepectoral）＋capsulectomy，同時處理靜止與動態變形。", "E": "✗ 單純取出義乳並 capsulectomy 等於放棄重建，不符病人 requesting revisional reconstruction 之目標。"}, "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 71. P 753-754.", "conflict": ""}, {"id": "2031", "sub": "BRE", "src": "GS", "years": [115], "stem": "What are complications of skin grafts in nipple and areolar reconstruction?(複選)", "opts": {"A": "Donor site dehiscence", "B": "Wound infection", "C": "Hypertrophic Scar", "D": "Failure of skin graft", "E": "Nipple projection loss"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "乳頭乳暈（NAC）重建使用植皮的併發症「全部都是」：供區裂開、傷口感染、肥厚性疤痕、植皮失敗，以及**乳頭突出度流失**（最常見也最難避免——所有重建乳頭都會隨時間回縮，設計時必須刻意過度矯正）。", "peropt": {"A": "◎ 是。供區傷口裂開（donor site dehiscence，尤其對側乳暈或大腿內側供區）。", "B": "◎ 是。傷口感染（wound infection）。", "C": "◎ 是。肥厚性疤痕（hypertrophic scar），供區與受區皆可能。", "D": "◎ 是。植皮失敗（血腫、剪力或感染所致）。", "E": "◎ 是。乳頭突出度流失（nipple projection loss），是 NAC 重建最常見的長期問題，故設計時須刻意過度矯正。"}, "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 72. P 770-771.", "conflict": ""}, {"id": "2032", "sub": "BRE", "src": "GS", "years": [115], "stem": "一位 28 歲 AMAB（assigned male at birth）跨性別女性，接受外源性雌激素治療 18 個月，乳房發育停留在 Tanner Stage 3，希望接受 gender-affirming breast augmentation（GABA）。外科醫師評估時，下列哪些處置或考量符合本章原文所述的正確臨床原則？（複選）", "opts": {"A": "AMAB 個體的 base width（BW）平均較大，而 nipple-to-IMF（N-IMF）距離較短，選擇植入物時需特別注意此比例失衡", "B": "為避免 animation deformity 及 medial breast separation，應優先考慮 subglandular 而非 submuscular 植入物放置", "C": "降低 inframammary fold（IMF）約植入物 BW 的一半，有助於使 NAC 居中並避免 NAC 向下移位", "D": "periareolar 切口為 GABA 的首選入路，因其可提供最佳的 IMF 重建效果", "E": "Internal pudendal artery perforator flap"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 AMAB 跨性別女性 GABA 解剖與術式：胸廓 BW 較大、N-IMF 較短，選 implant 須注意比例失衡；避免 animation deformity 與 medial separation，優先 subglandular；下移 IMF 約 BW 一半助 NAC 置中。⚠ periareolar 非首選（男性乳暈小、不利 IMF 重建，採 IMF 入路），故 D 錯。E 於本答案被列為正確，惟屬陰部穿支瓣範疇，作答錨定該年官方答案。", "peropt": {"A": "◎ AMAB 個體 base width（BW）平均較大、nipple-to-IMF（N-IMF）距離較短，選植入物須留意此比例失衡。", "B": "◎ 為避免 animation deformity 與 medial breast separation，優先考慮 subglandular 而非 submuscular 放置。", "C": "◎ 下移 IMF 約植入物 BW 一半，有助 NAC 置中、避免 NAC 相對下移。", "D": "✗ periareolar 並非 GABA 首選入路；AMAB 乳暈小、不利 IMF 重建，通常採 IMF 切口。", "E": "◎ 官方答案列為正確）Internal pudendal artery perforator flap——此項屬會陰/陰道成形範疇，於隆乳情境略突兀，作答以該年官方答案為準。"}, "cite": "待複查（GS gender-affirming breast augmentation 記憶佐證）", "conflict": ""}, {"id": "2055", "sub": "BRE", "src": "NG", "years": [105, 114, 115], "stem": "The primary sensory innervation of the nipple areolar complex is provided by which nerve?", "opts": {"A": "The cervical plexus", "B": "The anterior branches of the 3th intercostal nerve", "C": "The anterolateral branches of the 4th intercostal nerve", "D": "The anteromedial branches of the 4th intercostal nerve", "E": "The anterior branches of the 5th intercostal nerve"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "**NAC 的主要感覺神經＝第 4 肋間神經的前外側分支（anterolateral branch of T4）**。此為乳房手術最重要的單一神經事實：縮乳、隆乳、乳房固定術時外下象限剝離都可能傷及。此題於 105、114、115 年重複出現（見 NG-055）。", "peropt": {"A": "✗ 頸神經叢（cervical plexus，鎖骨上神經）支配乳房上部皮膚，非 NAC 主要感覺。", "B": "✗ 應為第 4 肋間神經前外側分支；第 3 肋間神經非 NAC 主要支配。", "C": "◎ 第 4 肋間神經前外側分支（anterolateral branch of T4）提供 NAC 主要感覺。", "D": "✗ 前內側（anteromedial）分支貢獻較小；主要來源為前外側分支（T4）。", "E": "✗ 應為第 4 肋間；第 5 肋間神經非 NAC 主要支配。"}, "cite": "Neligan 3rd, Volume 5, Chapter 1, p.5", "conflict": ""}, {"id": "2095", "sub": "BRE", "src": "NG", "years": [107, 114], "stem": "Which is correct about oncoplasty?", "opts": {"A": "It was introduced in 1993 by Audretsch.", "B": "Balancing the resection with breast landmarks and shape to preserve breast aesthetics are the fundamentals of oncoplastic surgery.", "C": "These technique draw from a number of priciples inherent to plastic surgery procedures on the breast such as breast reduction or mastopexy.", "D": "All of the above.", "E": "None of the above."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "Oncoplasty 三項基礎皆正確：**1993 年由 Audretsch 提出**；核心是「切除範圍與乳房地標／形狀取得平衡以保存美觀」；技術基礎來自既有整形外科乳房手術原則（breast reduction、mastopexy）。故答案為 All of the above。", "peropt": {"A": "正確。Audretsch 於 1993 年提出 oncoplastic surgery 概念。", "B": "正確。在腫瘤切除範圍與乳房地標、形狀之間取得平衡以保存美觀，是核心原則。", "C": "正確。技術源自縮乳成形術、乳房固定術（mastopexy）等既有整形外科術式原理。", "D": "◎ 正解。以上皆正確（All of the above）。", "E": "有正確選項，不選 None。"}, "cite": "Neligan 3rd, Volume 3, Chapter 10, page 277", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：A: 107「It was introduced in 1993 by Audretsch.」 vs 114「Oncoplastic surgery is defined as wide e」；C: 107「These technique draw from a number of pr」 vs 114「These technique draw from a number of pr」 ⚠ 同題歷屆重出：oncoplasty何者正確，2095（107年）與2212（114年）皆答D（all of the above）；僅A選項改寫（2095為「1993年由Audretsch提出」，2212為oncoplastic surgery之定義），B/C/D/E相同。記概念不記字母。"}, {"id": "2134", "sub": "BRE", "src": "NG", "years": [108, 114], "stem": "About alternative free flaps for breast reconstruction, which statement(s) is true? (複選)", "opts": {"A": "The superior gluteal artery and vein exits the pelvis through the greater sciatic foramen below the piriformis.", "B": "The gracilis muscle is a type III musculocutaneous flap", "C": "When harvesting profounda artery perforator (PAP) flap, retracting the gracilis muscle anteriorly to expose the adductor magnus fascia is necessary", "D": "The main disadvantage of the IGAP flap is dissection adjacent to the sciatic nerve, which can cause transient sciatica", "E": "None of above"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "四個替代皮瓣解剖陷阱：① superior gluteal 血管經 greater sciatic foramen 於 piriformis **上方**穿出（題目寫 below 為錯）；② gracilis 是 Mathes-Nahai **Type II**（單一優勢蒂＋次要蒂），非 Type III；③ 取 PAP 時需將 gracilis 往前牽開才能顯露 adductor magnus 筋膜；④ IGAP 剝離貼近坐骨神經，可致暫時性坐骨神經痛。", "peropt": {"A": "錯。superior gluteal artery/vein 經 greater sciatic foramen 於 piriformis **上緣（above）**離開骨盆；下方（below）走的是 inferior gluteal 血管。", "B": "錯。gracilis 為 Mathes-Nahai **Type II** 肌皮瓣（主蒂 medial circumflex femoral artery 分支＋遠端次要蒂），非 Type III。", "C": "◎ 對。取 PAP 皮瓣時將 gracilis 往前方牽開，方能顯露 adductor magnus 筋膜與穿通枝。", "D": "◎ 對。IGAP 剝離貼近坐骨神經（sciatic nerve），可致暫時性坐骨神經痛。", "E": "有正確選項，故不選 None。"}, "cite": "Neligan, Volume 5 Chapter 21, page 376, 378, 392, 412", "conflict": ""}, {"id": "2142", "sub": "BRE", "src": "NG", "years": [108, 109, 111, 112, 113, 114, 115], "stem": "以下哪個屬於男性女乳症(gynecomastia)的治療", "opts": {"A": "Pull-through technique", "B": "Open excision via an inferior periareolar approach", "C": "Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern", "D": "Suction-assisted lipectomy", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 男性女乳症（gynecomastia）治療光譜依 Simon/Rohrich 分級與腺體/脂肪比例選擇：脂肪為主 → SAL；腺體為主 → pull-through 或 inferior periareolar 開放切除；伴皮膚鬆弛 → LeJour vertical 皮膚縮減併組織切除。故本題（問「屬於」）答案為以上皆是。⚠ 極性陷阱：另有版本問「不屬於」，作答方向相反。", "peropt": {"A": "✓ Pull-through technique 為腺體切除微創術式。", "B": "✓ 經 inferior periareolar 開放切除為典型腺體切除入路。", "C": "✓ 伴皮膚鬆弛者以 LeJour vertical mammoplasty 皮膚縮減併組織切除。", "D": "✓ SAL（suction-assisted lipectomy，抽脂）適用脂肪為主的女乳。", "E": "◎ 以上皆為男性女乳症之治療選項。"}, "cite": "待複查（NG gynecomastia treatment 記憶佐證）", "conflict": "題幹極性相反（正確↔錯誤／屬於↔不屬於），概念同但作答方向相反，勿混記（對照 NG108-B11-Q07） ⚠ 同題歷屆重出：gynecomastia治療。2121（108年）問「哪個不屬於治療」答E（modified radical mastectomy）；2142（109、111–115年）反向問「哪個屬於治療」答E（以上皆是）。A–D選項相同（pull-through、periareolar open excision、LeJour skin reduction、SAL），僅題幹正反與E選項互換。記概念不記字母。"}, {"id": "2153", "sub": "BRE", "src": "NG", "years": [109, 111, 114], "stem": "關於profunda artery perforator flap(PAP flap), 以下何者錯誤:", "opts": {"A": "The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh", "B": "The dissection of the PAP flap is straightforward through the adductor longus muscle", "C": "The flap donor site well hidden within the upper thigh and buttock crease", "D": "Complications include fat necrosis, donor site seroma and infection", "E": "None of above"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "本題錯述在肌肉名稱：PAP 的穿通枝行經 **adductor magnus**（或 gracilis 與 adductor magnus 間的中隔），而非 **adductor longus**。與 NG-191 對照：同族題目一年考「蒂長」、一年考「肌肉名稱」，兩關鍵字都要記牢。", "peropt": {"A": "正確。profunda femoris artery 自 common femoral artery 分出，進入大腿後側間隔（posterior compartment）。", "B": "◎ 正解（錯述）。PAP 穿通枝行經 adductor magnus（或 gracilis 與 adductor magnus 間中隔），非 adductor longus；且剝離並不簡單。", "C": "正確。供區疤痕隱藏於大腿上方與臀下皺褶。", "D": "正確。併發症含脂肪壞死、供區血清腫（seroma）與感染。", "E": "存在錯述選項，不選 None of above。"}, "cite": "Neligan 4th Ed Vol.5 Ch.21.4 Page 410, 415", "conflict": "⚠ 同題歷屆重出：2153（109、111年）與2207（114年）選項完全相同（PAP flap何者錯誤），但官方答案不一致——2153答B（adductor longus dissection straightforward為錯），2207答E（none of above）。屬答案key歧異，記PAP flap概念不記字母。（同cluster之2181因選項改為adductor magnus並新增短pedicle 5cm考點，另計不併。）"}, {"id": "2154", "sub": "BRE", "src": "NG", "years": [109, 111, 114], "stem": "關於利用profunda artery perforator flap(PAP flap)需要考慮的complication包括以下何者(複選)", "opts": {"A": "Fat necrosis", "B": "Donor site seroma", "C": "Donor site hematoma", "D": "Donor site infection", "E": "Lower extremity lymphedema"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "PAP 皮瓣須考慮的併發症為 ABCD：受區脂肪壞死，供區血清腫、血腫、傷口感染（大腿內側活動剪力大，癒合延遲常見）。**下肢淋巴水腫並非 PAP 典型併發症**——那是 TUG 的風險（剝離接近大隱靜脈與腹股溝淋巴系統）。", "peropt": {"A": "◎ 是。受區脂肪壞死（fat necrosis）為常見併發症。", "B": "◎ 是。供區血清腫（seroma）常見，因大腿內側潛在腔隙大。", "C": "◎ 是。供區血腫（hematoma）。", "D": "◎ 是。供區傷口感染與癒合延遲（會陰鄰近、剪力大）。", "E": "否。下肢淋巴水腫（lower extremity lymphedema）是 TUG 取瓣（近腹股溝淋巴與大隱靜脈）的風險，非 PAP 典型併發症。"}, "cite": "Neligan 4th Ed Vol.5 Ch.21.4 Page 415", "conflict": ""}, {"id": "2155", "sub": "BRE", "src": "NG", "years": [109, 114], "stem": "關於使用gluteal free flap於乳房重建, 以下何者正確(複選)", "opts": {"A": "Gluteal tissue may be harvested based on the superior gluteal artery (SGAP) or the inferior gluteal artery (IGAP)", "B": "The main disadvantage of the IGAP flap is dissection adjacent to the sciatic nerve", "C": "The primary recipient vessel choice for SGAP reconstruction is the internal mammary artery and vein", "D": "Thoracodorsal vessels are alternative recipient vessels", "E": "The main perforators of the superior gluteal artery can be found by palpating the lesser sciatic foramen"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "臀部游離皮瓣四項正確事實（SGAP／IGAP 皆可取瓣、IGAP 缺點貼近坐骨神經、SGAP 首選受區為內乳血管、胸背血管為備案），錯在 E：superior gluteal artery 主要穿通枝定位需觸診 **greater sciatic foramen（大坐骨孔）**，非 lesser sciatic foramen。", "peropt": {"A": "◎ 對。臀部組織可依 SGAP 或 IGAP 系統取瓣。", "B": "◎ 對。IGAP 主要缺點為剝離緊鄰坐骨神經（sciatic nerve）。", "C": "◎ 對。SGAP 蒂短，首選受區為內乳動靜脈（internal mammary artery/vein）。", "D": "◎ 對。胸背血管（thoracodorsal vessels）為替代受區。", "E": "錯。superior gluteal artery 主要穿通枝體表定位需觸診 **greater sciatic foramen（大坐骨孔）**，非 lesser sciatic foramen（後者通過陰部血管神經與閉孔內肌腱）。"}, "cite": "Neligan 4th Ed Vol.5 Ch.21.2 Page 377, 379, Fig. 21.2.5", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B14-Q13） ⚠ 同題歷屆重出：gluteal free flap複選，2155（109年）與2214（114年）皆答ABCD，A–D選項相同；僅E選項distractor改寫（2155為「觸診lesser sciatic foramen找主要穿通枝」，2214為「superior gluteal vessels經lesser sciatic foramen出骨盆」，兩者皆為錯誤敘述故不選）。記概念不記字母。"}, {"id": "2168", "sub": "BRE", "src": "NG", "years": [110, 111, 112, 113, 114, 115], "stem": "What is the contraindication(s) in nipple-sparing mastectomy?", "opts": {"A": "Inflammatory breast cancer", "B": "Tumor location > 2cm from the nipple", "C": "Negative axillary nodes", "D": "HER2/neu negative", "E": "Tumor grade 1 to 2"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Nipple-sparing mastectomy（NSM）禁忌著重腫瘤學安全與乳頭受侵風險：**inflammatory breast cancer**（皮膚/淋巴管廣泛受侵）為禁忌。⚠ 相對地，腫瘤距乳頭 >2 cm、腋下淋巴結陰性、HER2 陰性、低惡性度（grade 1–2）皆屬有利/適合條件，非禁忌。", "peropt": {"A": "◎ Inflammatory breast cancer 因皮膚/淋巴管廣泛受侵，為 NSM 禁忌。", "B": "✗ 腫瘤距乳頭 >2 cm 為有利條件（降低 NAC 受侵風險），非禁忌。", "C": "✗ 腋下淋巴結陰性（negative axillary nodes）為有利條件，非禁忌。", "D": "✗ HER2/neu 陰性非禁忌。", "E": "✗ 低惡性度（grade 1–2）為有利條件，非禁忌。"}, "cite": "待複查（NG nipple-sparing mastectomy 禁忌 記憶佐證）", "conflict": ""}, {"id": "2175", "sub": "BRE", "src": "NG", "years": [108, 110, 115], "stem": "Comparing free TRAM flap with DIEP flap, which statement(s) is true? (複選)", "opts": {"A": "If breast volume requirement is above 800 c.c, DIEP flap is a better choice", "B": "If breast volume requirement is above 800 c.c, free TRAM flap is a better choice", "C": "If no perforator >1.5mm available, DIEP flap is a better choice", "D": "If no perforator >1.5mm available, free TRAM flap is a better choice", "E": "patient with severe abdominal fat is better candidate for SIEA reconstruction"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 free TRAM 與 DIEP 取捨關鍵在血供量與穿支條件：大體積（**>800 cc**）時保留部分肌肉的 free TRAM 血供較充足、較 DIEP 可靠；當**無 >1.5 mm perforator** 時強行 DIEP 風險高，改 free TRAM 較安全。⚠ SIEA 適用較小體積且血管條件佳者，非嚴重腹部肥厚的較佳選擇，故 E 錯。", "peropt": {"A": "✗ 錯誤——體積 >800 cc 時 free TRAM（保留部分肌肉、血供較足）為較佳選擇，非 DIEP。", "B": "◎ 正確——體積 >800 cc 時 free TRAM 血供較充足、較可靠。", "C": "✗ 錯誤——無 >1.5 mm 穿支時應改用 free TRAM，非 DIEP。", "D": "◎ 正確——無足夠管徑穿支（無 >1.5 mm perforator）時，free TRAM 較安全可靠。", "E": "✗ 錯誤——SIEA 血供有限、適用較小體積且血管條件良好者，嚴重腹部肥厚者並非較佳 S
