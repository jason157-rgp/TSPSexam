sitive。", "C": "Internal nasal valve 是鼻腔呼吸道裡最窄的部分，由nasal septum和upper lateral cartilage 形成的夾角正常約為10-15∘。", "D": "External nasal valve 事由lower lateral cartilage 的內側腳(medial crus)、soft tissue alae、membranous septum和 sill of nostril 組成。", "E": "Septal deviation 中最常見的為C-shaped anteriorposterior deviation。"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻偏移與呼吸道（複選正確為ABC）：levator labii superioris alaeque nasi為最重要的外鼻dilator（A對）；Cottle test牽拉臉頰後呼吸改善為positive（B對）；internal nasal valve為最窄處，由septum與upper lateral cartilage構成、正常約10–15°（C對）。D未納入——external nasal valve的組成敘述與本題標準有出入故列為非；E錯——最常見的septal deviation型態並非C-shaped anteroposterior deviation。", "peropt": {"A": "✓(正解) levator labii superioris alaeque nasi為最重要外鼻擴張肌。", "B": "✓(正解) Cottle test牽拉臉頰呼吸改善為positive。", "C": "✓(正解) internal nasal valve最窄，septum–ULC夾角約10–15°。", "D": "✗ 依本題標準，此external nasal valve組成敘述被列為非。", "E": "✗ 最常見septal deviation非C-shaped anteroposterior deviation。"}, "cite": "待複查（Neligan 鼻閥與偏移 記憶佐證）（答案疑義，建議人工複查）", "conflict": ""}, {"id": "5232", "sub": "AE5", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於禿頭與植髮何者錯誤?", "opts": {"A": "毛髮被移植後通常會立刻進入anagen active growth phase，並持續3-4個月。", "B": "在男女最常見的掉髮同樣是雄性禿(androgenic alopecia)。", "C": "在替年輕病患植髮時通常建議先在額頭區和上區frontal and superior regions做植髮，等到hair pattern成熟後再考慮進行枕部(occipital area)植髮。", "D": "通常穩定的Norwood II型或III型禿髮患者能有良好的植髮結果，因為不需擔心後續的脫髮問題。", "E": "在健康沒有瘢痕的個體植髮可以達到90~95%的成功率。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 禿頭與植髮（選『錯誤』者）：移植毛髮後通常先進入『telogen（休止期，即 shock loss 落髮）』，約 3–4 個月後才進入 anagen 生長；並非移植後立即進入 anagen，故 A 錯。易混淆：男女最常見皆為 androgenic alopecia；健康無疤個體植髮成功率約 90–95%。", "peropt": {"A": "✓（正解，錯誤敘述）移植後先進 telogen（shock loss），約 3–4 個月後才進 anagen。", "B": "✗（正確）男女最常見皆為雄性禿。", "C": "✗（正確）年輕病患先植前額/上區，待髮型成熟再考慮。", "D": "✗（正確）穩定 Norwood II/III 型植髮結果佳。", "E": "✗（正確）健康無疤個體成功率約 90–95%。"}, "cite": "待複查（Neligan 植髮 記憶佐證）", "conflict": ""}, {"id": "5233", "sub": "AE1", "src": "NG", "years": [111, 112], "stem": "有關於腹部整形術的術後併發症, 以下哪些正確? (複選)", "opts": {"A": "抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題。", "B": "BMI>25 跟脂肪移除超過1000g 的病人術後有比較高的機率發生肺栓塞。", "C": "術前接受過減肥手術 (Bariatric surgery) 比自然減重的病人更容易發生術後傷口併發症。", "D": "同一個時間進行多種不同的手術會增加術中跟術後併發症的風險。", "E": "應建議所有病人劃刀前給予預防性抗生素來降低術後傷口感染的機率。"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "詳解：\n\nA. Smokers have a significant increase in wound healing problems and infections (50% vs. 15% in non-smokers): evidence level (EV level) II.\n\nB. Obese patients with a BMI >30 and those who have significant soft-tissue resection of more than 1500 g have an increased risk of developing pulmonary embolus: EV level II.\n\nC. Wound healing complications are more common inpatients after bariatric surgery compared to natural weight loss before abdominoplasty: EV level II.\n\nD. Combination of different surgical procedures during one operation does not increase intraoperative complications or major postoperative complications: EV level IV\n\nE. A single dose antibiotic prophylaxis can be recommended to all patients undergoing abdominoplasty to reduce the incidence of wound infection: EV level II.", "key": "🎯 Abdominoplasty 併發症 EBM（正解 ACE，附原檔詳解）：A 抽菸者傷口/感染顯著增加（50% vs 15%，EV II）；C 減肥手術後傷口併發症較自然減重多；E 所有病人術前單劑預防性抗生素可降低傷口感染。B 應為 BMI>30 且切除>1500g（非 >25/>1000g）才增加 PE 風險；D 同時多術式並不增加主要併發症（EV IV）。⚠與 109 年版 A 用字差異（是否列出 50% vs 15% 具體數值），概念相同。", "peropt": {"A": "✓ 抽菸者傷口/感染明顯增加，正確。", "B": "✗ 應為 BMI>30 且切除>1500g 才增加 PE；題述數值錯誤。", "C": "✓ 減肥手術後傷口併發症較自然減重多，正確。", "D": "✗ 同時多術式不增加主要術中/術後併發症（EV IV）。", "E": "✓ 術前單劑預防性抗生素降低傷口感染，正確。"}, "cite": "原檔詳解", "conflict": "跨年數值差異（Neligan 4e vs Neligan 4e）：A: 109「抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題 (50% vs. 15% in」 vs 111「抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題。」"}, {"id": "5234", "sub": "AE11", "src": "NG", "years": [111, 112], "stem": "下列關於陰莖解剖構造及陰莖增大術( Penile lengthening)何者錯誤? (單選)", "opts": {"A": "陰莖遠端的皮膚沒有毛髮。", "B": "陰莖的皮膚下有脂肪層。", "C": "可以分離 suspensory ligament of the penis。", "D": "可以使用 VY advancement flap 手術。", "E": "Suprapubic lipectomy 是手術的選擇之一。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "詳解：\n\nA. The skin of the penis is thin, and hairless (more distal) and has loose connections with the deeper structures of the penis\n\nB. No adipose tissue is present under the skin.\n\nC. Penile lengthening is achieved by releasing the suspensory ligament of the penis and the postoperative use of penile weights or stretching devices (Fig. 30.1A).\n\nD. Many surgeons advance infrapubic skin onto the penis using a VY advancement flap (Fig. 30.1B,C).11,12 This VY flap theoretically increases penile length or gives the penis the appearance of increased flaccid length, which may occur if the patient has a shortage of penile skin.\n\nE. Suprapubic fat removal is contoured to match the abdominal side of the incision", "key": "🎯 陰莖解剖與增長術（本題找錯誤，單選）：正解 B——陰莖皮下「無脂肪層」（loose areolar tissue、無 adipose），題目稱「有脂肪層」有誤。正確者：遠端皮膚無毛、與深部結構鬆散連結（A）；可鬆解 suspensory ligament 增長（C）；可用恥骨下 VY advancement flap（D）；可合併 suprapubic lipectomy（E）。", "peropt": {"A": "✗ 陰莖遠端皮膚無毛，正確。", "B": "✓(正解,錯誤敘述) 陰莖皮下無脂肪層，題目稱有脂肪層有誤，故選。", "C": "✗ 可鬆解 suspensory ligament of penis 以增長，正確。", "D": "✗ 可用 VY advancement flap，正確。", "E": "✗ Suprapubic lipectomy 為手術選項之一，正確。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5235", "sub": "AE1", "src": "NG", "years": [111], "stem": "對於大量減重(massive weight loss, MWL)後的病人,手術常需要縱切皮膚及脂肪來達到腹部橫向緊實的效果,如附圖所示其術式名稱為何?", "opts": {"A": "Mini-abdominoplasty", "B": "High lateral tension abdominoplasty", "C": "Fleur-de-lis abdominoplasty", "D": "Standard abdominoplasty", "E": "Reverse abdominoplasty"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 MWL後以『縱向』切除皮膚脂肪來達成腹部橫向緊實的術式為Fleur-de-lis abdominoplasty(結合垂直+水平切除的T/倒T設計)，特別適合橫向皮膚鬆弛顯著的減重病人。易混淆點：mini/standard/high lateral tension abdominoplasty主要為橫向切除;reverse abdominoplasty切口在上腹/乳下。", "peropt": {"A": "✗ Mini-abdominoplasty為小範圍下腹橫切，非縱向切除。", "B": "✗ High lateral tension abdominoplasty仍以橫向切除為主。", "C": "✓(正解) Fleur-de-lis abdominoplasty以縱向加橫向切除達腹部橫向緊實。", "D": "✗ Standard abdominoplasty為橫向切除，非縱向。", "E": "✗ Reverse abdominoplasty切口位於上腹/乳下，術式不同。"}, "cite": "待複查（Neligan MWL腹整形術式 記憶佐證）", "conflict": ""}, {"id": "5236", "sub": "AE10", "src": "NG", "years": [111, 113], "stem": "Facial nerve 的描述下列何者有誤?", "opts": {"A": "The facial nerve trunk passes deep to the anterior belly of digastric muscle.", "B": "The course of frontal (temporal) branch is called Pitanguy's line", "C": "A number of communicating branches between buccal and zygomatic branch, which make the injury to these nerves unnoticeable.", "D": "The marginal mandibular usually located between the platysma and the deep cervical fascia, and superficial to the facial vessels.", "E": "The injury of cervical branch may cause weakness of the lower lip depressors, which is often confused with injury to the mandibular nerve"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經解剖（選錯誤者）：A錯誤——facial nerve trunk出stylomastoid foramen後走行於二腹肌『後腹（posterior belly）』深面，而非anterior belly。正確者：B frontal(temporal) branch走向即Pitanguy's line；C buccal與zygomatic branch間交通支多使其損傷不易察覺；D marginal mandibular走於platysma與deep cervical fascia之間、位於facial vessels淺面；E cervical branch損傷致下唇depressor無力，常與marginal mandibular損傷混淆。", "peropt": {"A": "✓(正解，即錯誤敘述) facial nerve trunk走於二腹肌『後腹』深面，非anterior belly。", "B": "✗ 敘述正確：frontal branch走向即Pitanguy's line。", "C": "✗ 敘述正確：buccal與zygomatic branch交通支多，損傷常不易察覺。", "D": "✗ 敘述正確：marginal mandibular位於platysma與deep cervical fascia間、facial vessels淺面。", "E": "✗ 敘述正確：cervical branch損傷致下唇depressor無力，易與mandibular分支混淆。"}, "cite": "待複查（Neligan Facial nerve 記憶佐證）", "conflict": ""}, {"id": "5237", "sub": "AE5", "src": "NG", "years": [112, 113], "stem": "The following statements about Baumann Skin Typing System (BSTS) are true except?", "opts": {"A": "Baumann Skin Type (BST) can fluctuate with the seasons, hormonal changes, lifestyle changes, pregnancy, medications, a move to a new geographic location, and other factors.", "B": "Oily (O) skin is characterized by an adequate or elevated sebum production.", "C": "Sensitive (S) skin can be subdivided into four types, each characterized by inflammation: acne (pimples), rosacea (redness), burning/stinging, and allergic.", "D": "Wrinkle-prone (W) skin types are at risk for skin aging because of age or lifestyle factors such as cigarette smoking, sun exposure, and tanning bed use.", "E": "Resistant (R) skin types are young and do not have a history of sun exposure, smoking, or other lifestyle factors that render them more susceptible to skin aging."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Baumann Skin Typing System (BSTS)以四軸分型：Oily/Dry、Sensitive/Resistant、Pigmented/Non-pigmented、Wrinkle-prone/Tight。除E外皆真：BST會隨季節/荷爾蒙/生活/懷孕/藥物/遷徙變動；Oily為皮脂充足或偏高；Sensitive再分acne/rosacea/stinging/allergic四型；Wrinkle-prone因年齡或抽菸日曬而老化風險高。E錯——『Resistant』軸指皮膚敏感度低（不易發炎），並非以『年輕且無日曬/抽菸史』來定義；此為將R軸與W/T老化軸混淆。", "peropt": {"A": "✗ 正確。BST會隨季節、荷爾蒙、生活型態等波動。", "B": "✗ 正確。Oily型皮脂分泌充足或偏高。", "C": "✗ 正確。Sensitive可再分acne、rosacea、stinging、allergic四型。", "D": "✗ 正確。Wrinkle-prone因年齡或抽菸日曬而老化風險高。", "E": "✓(正解，為except) Resistant指低敏感度（不易發炎），非以年輕/無日曬史定義，混淆了R軸與老化軸。"}, "cite": "待複查（Neligan Baumann皮膚分型 記憶佐證）", "conflict": ""}, {"id": "5238", "sub": "AE8", "src": "NG", "years": [112, 113, 114], "stem": "The following statements about Asian rhinoplasty are true except?", "opts": {"A": "Division between the upper and lower lateral cartilages allows separation of projection and rotation of the lower unit in rhinoplasty.", "B": "One potential side effect of increasing nasal projection is caudal rotation of the tip.", "C": "The tripod theory was first suggested by Anderson in 1969 and is based on the three legs of the paired lateral crus on pyriform apertures and conjoined medial crus on columella base.", "D": "The \"quadripod\" concept of the nasal tip, with the anterior caudal septum as the fourth leg.", "E": "The dorsal portion of alar cartilages is sutured to the septum to provide stability to nasal tip projection."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人鼻整形（選『true except』即錯誤者）：增加 nasal projection 的潛在副作用是鼻尖『cephalic（向上）rotation』，而非 caudal（向下）rotation；依 tripod theory 拉長內側腳同時增加 projection 與上旋，故 B 錯。易混淆：tripod theory（Anderson 1969）；quadripod concept 以 caudal septum 為第四腳。", "peropt": {"A": "✗（正確）分離上下外側軟骨可分別控制下段的 projection 與 rotation。", "B": "✓（正解，錯誤敘述）增加 projection 傾向使鼻尖 cephalic 上旋，非 caudal 下旋。", "C": "✗（正確）tripod theory 由 Anderson（1969）提出。", "D": "✗（正確）quadripod concept 以 caudal septum 為第四腳。", "E": "✗（正確）鼻翼軟骨背側縫至中膈以穩定鼻尖 projection。"}, "cite": "待複查（Neligan 亞洲人鼻整形 記憶佐證）", "conflict": ""}, {"id": "5239", "sub": "AE2", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which statement is correct about secondary blepharoplasty? (複選)", "opts": {"A": "Lower lid eversion is divided into four subtypes: lid margin eversion (LME) with scleral show; LME with scleral show and horizontal lid laxity; LME with lash rotation; and ectropion.", "B": "Involutional ectropion is caused by horizontal lid laxity of the eyelid supportive structures and usually begins with scleral show.", "C": "Cicatricial ectropion is caused by a deficiency of the skin or skin and muscle of the lid.", "D": "Subperiosteal midface suspension techniques may be required to elevate the malar fat pad to a position that will assist in supporting the lower eyelids.", "E": "Canthal and eyelid laxity, edema, hematoma, excessive resection of skin and fat, or impaired orbicularis oculi muscle function may also contribute to malposition after blepharoplasty."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 二次眼瞼整形（secondary blepharoplasty）之下瞼位置異常概念（本題全對）：A 下瞼外翻分四亞型；B involutional ectropion 因水平鬆弛、常先出現 scleral show；C cicatricial ectropion 為皮膚（±肌肉）不足；D 需 subperiosteal midface suspension 抬升 malar fat pad 以支撐下瞼；E 眥/瞼鬆弛、水腫、血腫、皮膚脂肪過度切除、眼輪匝肌功能受損皆可致 malposition。五者皆正確。", "peropt": {"A": "✓ 下瞼外翻分四亞型，正確。", "B": "✓ Involutional ectropion 因水平鬆弛、常先 scleral show，正確。", "C": "✓ Cicatricial ectropion 因皮膚/肌肉不足，正確。", "D": "✓ Subperiosteal midface suspension 抬升 malar fat pad 支撐下瞼，正確。", "E": "✓ 多重因素（鬆弛/水腫/血腫/過度切除/眼輪匝肌功能）致 malposition，正確。"}, "cite": "待複查（Neligan 二次眼瞼整形 記憶佐證）", "conflict": ""}, {"id": "5240", "sub": "AE2", "src": "NG", "years": [112, 113, 114, 115], "stem": "The etiology of aging changes in the periorbital area? (複選)", "opts": {"A": "Excessive skin", "B": "Sun damage", "C": "Fat herniation", "D": "Relaxation of the tarsal margin", "E": "Hollowing of the nasojugal groove"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 眼周老化之成因為多因子（本題全對，選 ABCDE）：多餘皮膚（skin excess）、日曬損傷（solar/sun damage 致彈性纖維變性）、眶脂疝出（fat herniation）、瞼板緣鬆弛（tarsal margin/canthal laxity）、以及 nasojugal groove（tear trough）凹陷。五者共同構成眼周老化外觀，故全選。", "peropt": {"A": "✓ 多餘皮膚為眼周老化成因。", "B": "✓ 日曬損傷致皮膚彈性變性，為成因。", "C": "✓ 眶脂疝出（眼袋）為成因。", "D": "✓ 瞼緣/canthal 鬆弛為成因。", "E": "✓ Nasojugal groove（tear trough）凹陷為成因。"}, "cite": "待複查（Neligan 眼周老化成因 記憶佐證）", "conflict": ""}, {"id": "5241", "sub": "AE6", "src": "NG", "years": [112, 113, 114, 115], "stem": "Key surgical steps of endoscopic brow lifting, which is wrong?", "opts": {"A": "Blunt supraperiostal dissection over deep temporal fascia and frontal bone down to the supraorbital rim", "B": "Meticulous division and spreading of the supraorbital rim periosteum under endoscopic visualization", "C": "Corrugator muscle resection under endoscopic visualization", "D": "Fixation in the temporal and paramedian wounds.", "E": "Sentinel vein identifies a standard landmark for the frontal branch of the facial nerve"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 內視鏡提眉關鍵步驟(選錯誤)。正解A為誤述：於frontal bone的剝離應為『subperiosteal(骨膜下)』而非supraperiosteal;顳側則沿deep temporal fascia上方剝離。正確步驟：內視鏡下分離眶上緣骨膜、切除corrugator、於顳側與paramedian固定、以sentinel vein作為frontal branch的標準地標。", "peropt": {"A": "✓(正解) 錯誤：frontal bone上應行subperiosteal剝離，敘述之supraperiosteal有誤。", "B": "✗ 正確：內視鏡下細緻分離眶上緣骨膜。", "C": "✗ 正確：內視鏡下切除corrugator muscle。", "D": "✗ 正確：於顳側與paramedian傷口固定。", "E": "✗ 正確：sentinel vein為facial nerve frontal branch的標準定位地標。"}, "cite": "待複查（Neligan 內視鏡提眉 記憶佐證）", "conflict": ""}, {"id": "5242", "sub": "AE9", "src": "NG", "years": [112, 113], "stem": "Autologous fillers include?", "opts": {"A": "Superficial musculoaponeurotic system (SMAS)", "B": "Fat grafts", "C": "Platelet-rich fibrin matrix (PRFM)", "D": "Platelet-rich plasma (PRP)", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 自體填充物（autologous fillers）範疇廣，包含：自體SMAS（自體筋膜移植）、脂肪移植（fat grafts）、富血小板纖維蛋白基質（PRFM）與富血小板血漿（PRP）。四者皆屬取自病人自身組織/血液之填充材料，故選E『以上皆是』。", "peropt": {"A": "✗ 單獨看SMAS屬自體填充物之一，但非唯一。", "B": "✗ 單獨看fat grafts屬自體填充物，但非唯一。", "C": "✗ 單獨看PRFM屬自體填充物，但非唯一。", "D": "✗ 單獨看PRP屬自體填充物，但非唯一。", "E": "✓(正解) SMAS、fat grafts、PRFM、PRP皆為自體填充物。"}, "cite": "待複查（Neligan Autologous filler 記憶佐證）", "conflict": ""}, {"id": "5243", "sub": "AE9", "src": "NG", "years": [112, 113], "stem": "Which statement is wrong about the Botulinum toxin injection?", "opts": {"A": "The dose of BoNT-A used should be based on the depth of the rhytid.", "B": "The lower frontalis muscle has the greatest effect on brow elevation.", "C": "As a general rule, injecting depressors more strongly than elevators will tend to give a more gentle lift to the area involved.", "D": "Over-injecting the mentalis can result in a \"witch's chin\" deformity and oral incompetence.", "E": "All of the above are wrong."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 BoNT注射原則：劑量應依『肌肉的體積/強度』決定，而非依皺紋深度(depth of rhytid)，故選項A為錯誤敘述。正確者：lower frontalis對抬眉影響最大(B)；施打depressors強於elevators可造成溫和上提(C)；過度施打mentalis可致witch's chin與口部閉合不全(D)。⚠ 跨年誘答事實置換（對照NG114/NG115-B04-Q01）：概念同為BoNT注射原則，但測到的具體事實選項被替換，須逐項辨識。", "peropt": {"A": "✓(正解，為錯誤敘述) 劑量應依肌肉體積/強度而非皺紋深度決定。", "B": "✗ 正確。lower frontalis對抬眉影響最大。", "C": "✗ 正確。施打depressors強於elevators可達溫和上提。", "D": "✗ 正確。過度施打mentalis致witch's chin與口閉合不全。", "E": "✗ 因僅A錯，『以上皆錯』不成立。"}, "cite": "待複查（Neligan BoNT注射原則 記憶佐證）", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B04-Q01） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG115-B04-Q01）"}, {"id": "5244", "sub": "AE4", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which structure is belonging the Musculo-aponeurotic layer (layer 3)? (複選)", "opts": {"A": "Galea", "B": "Temporoparietal (superficial temporal) fascia", "C": "Orbicularis fascia", "D": "SMAS", "E": "Platysma"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面第三層（musculo-aponeurotic layer，複選）：layer 3 為連續的肌肉腱膜層，涵蓋 galea、temporoparietal（superficial temporal）fascia、orbicularis fascia、SMAS、platysma，故 ABCDE 皆屬之。臨床意義：此層即 SMAS 的顱面連續體，是拉皮操作與神經深淺定位的關鍵層次。", "peropt": {"A": "✓ galea 為 layer 3（頭皮段）。", "B": "✓ temporoparietal（superficial temporal）fascia 為 layer 3（顳區段）。", "C": "✓ orbicularis fascia 屬 layer 3。", "D": "✓ SMAS 為 layer 3 核心。", "E": "✓ platysma 為 layer 3（頸段延續）。"}, "cite": "待複查（Neligan SMAS 層次 記憶佐證）", "conflict": ""}, {"id": "5245", "sub": "AE4", "src": "NG", "years": [112, 114, 115], "stem": "Which statement is wrong about the complication of facelift? (複選)", "opts": {"A": "Simultaneous open neck surgery, patients taking platelet inhibitor such as aspirin and antiinflammatories, hypertension have positive association with complications.", "B": "The great auricular nerve is the major sensory nerve at greatest risk for damage during facelift surgery.", "C": "The most commonly injured branches are buccal branches, and long-term sequelae are common due to lack of collateral support.", "D": "Hematoma, unsatisfactory scars, alopecia, skin loss and infection are all complications after facelift.", "E": "Damaged temporal branches will lead to numbness of the lateral portion of the external ear as well as skin anterior and posterior to the ear."}, "ans": "CE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Facelift 併發症（本題選『錯誤』者，正解 CE）：C 錯——最常受傷的運動支雖是 buccal branch，但因交通支豐富『長期後遺症少見』，非『缺乏側支、後遺症常見』；E 錯——temporal branch 為『運動支』（支配額肌），其損傷造成抬眉無力而非耳周麻木；耳周麻木屬 great auricular nerve（感覺）損傷。A（危險因子）、B（great auricular 最易受傷感覺神經）、D（併發症列舉）皆為正確敘述。", "peropt": {"A": "✗（正確敘述）同時頸部手術、服用抗血小板藥、高血壓與併發症正相關。", "B": "✗（正確敘述）Great auricular nerve 為最易受傷的主要感覺神經。", "C": "✓（正解，錯誤敘述）Buccal branch 交通支豐富、長期後遺症少見，非缺乏側支。", "D": "✗（正確敘述）血腫、疤痕、禿髮、皮膚壞死、感染皆為 facelift 併發症。", "E": "✓（正解，錯誤敘述）Temporal branch 為運動支，損傷致抬眉無力；耳周麻木屬 great auricular nerve。"}, "cite": "待複查（Neligan facelift 併發症/神經 記憶佐證）", "conflict": ""}, {"id": "5246", "sub": "AE6", "src": "NG", "years": [112, 113, 114, 115], "stem": "Which statement is wrong about the great auricular nerve?", "opts": {"A": "Crosses the midportion of the sternocleidomastoid muscle.", "B": "McKinney's point, which is 6.5 cm inferior to the tragus.", "C": "It usually travels about 1 cm posterior to the external jugular vein.", "D": "Anterior to McKinney's point, the nerve is covered by the superficial cervical fascia and the platysma (SMAS)", "E": "The most common point of injury is at the posterior border of the sternocleidomastoid muscle."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Great auricular nerve（GAN）解剖（本題找錯誤）：正解 B——McKinney's point 位於「外耳道（external auditory canal）下方約 6.5 cm」處為 GAN 最表淺易傷點；題目寫「6.5 cm inferior to the tragus」之參考點/描述有誤。正確者：GAN 越過胸鎖乳突肌中段、走於 external jugular vein 後約 1 cm、於 McKinney's point 前方被 superficial cervical fascia 與 platysma(SMAS) 覆蓋、最常受傷處在 SCM 後緣。", "peropt": {"A": "✗ GAN 越過胸鎖乳突肌中段，正確。", "B": "✓(正解,錯誤敘述) McKinney's point 為外耳道下約 6.5 cm，題目以 tragus 為參考點之描述有誤，故選。", "C": "✗ GAN 走於 external jugular vein 後約 1 cm，正確。", "D": "✗ McKinney's point 前方 GAN 被 superficial cervical fascia 與 platysma 覆蓋，正確。", "E": "✗ 最常受傷處於 SCM 後緣，正確。"}, "cite": "待複查（Neligan great auricular nerve 記憶佐證）", "conflict": ""}, {"id": "5247", "sub": "AE4", "src": "NG", "years": [113], "stem": "Which statement is wrong about the complication of facelift?", "opts": {"A": "Simultaneous open neck surgery, patients taking platelet inhibitor such as aspirin and antiinflammatories, hypertension have positive association with complications", "B": "The great auricular nerve is the major sensory nerve at greatest risk for damage during facelift surgery", "C": "The most commonly injured branches are buccal branches, although long-term sequelae are rare due to multiple interconnections between nerve branches.", "D": "Hematoma, unsatisfactory scars, alopecia, skin loss and infection are all complications after facelift", "E": "Damaged temporal branches will lead to numbness of the lateral portion of the external ear as well as skin anterior and posterior to the ear."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮併發症(選錯誤)。正解E為誤述：temporal branch屬『運動』神經(支配frontalis)，受損造成提眉無力/眉下垂，而非耳周麻木;耳前後與外耳側的『感覺』麻木應歸great auricular nerve(感覺神經)損傷。正確敘述：同步開放頸部手術、服用抗血小板藥、高血壓與併發症正相關;great auricular nerve為最易受損感覺神經;buccal branch最常受損但交通支多故後遺症少。", "peropt": {"A": "✗ 正確：同步open neck、服aspirin/抗發炎藥、高血壓與併發症正相關。", "B": "✗ 正確：great auricular nerve為拉皮中最易受損的主要感覺神經。", "C": "✗ 正確：buccal branch最常受損，但因交通支多長期後遺症少見。", "D": "✗ 正確：血腫、不良疤痕、禿頭、皮膚壞死、感染皆為拉皮併發症。", "E": "✓(正解) 錯誤：temporal branch為運動神經，受損致提眉無力而非耳周麻木;耳周感覺麻木屬great auricular nerve。"}, "cite": "待複查（Neligan 拉皮併發症 記憶佐證）", "conflict": ""}, {"id": "5248", "sub": "AE9", "src": "NG", "years": [113], "stem": "有關fat grafting何者正確? (複選)", "opts": {"A": "The optimal centrifugation is at 1300g.", "B": "Fat grafting can be used to replace tissue loss and rejuvenate the skin.", "C": "Blunt cannula is advised to avoid intravascular injection.", "D": "The fat layer will appear at the bottom layer.", "E": "Hematoma is the most common complication."}, "ans": "BC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 脂肪移植（選正確，複選）：B正確——脂肪移植可補充組織缺損並使皮膚年輕化（ADSC效應）；C正確——採用鈍針（blunt cannula）以避免血管內注射及栓塞。錯誤者：A離心最佳強度公認約1200–1286 g（Coleman 3000 rpm/Yoshimura），本題以1300 g為『非最佳』；D離心後脂肪層因密度低浮於『上層』（非底層，底層為血水/tumescent液）；E脂肪移植最常見併發症為脂肪壞死/油囊/吸收，非hematoma。⚠ 離心力數字1300 g與他題1286 g接近，屬跨題細微差異，記『約1200–1300 g、過高破壞脂肪細胞』之概念。", "peropt": {"A": "✗ 最佳離心強度公認約1200–1286 g；本題以1300 g非最佳值。", "B": "✓ 脂肪移植可補組織缺損並使皮膚年輕化。", "C": "✓ 採鈍針以避免血管內注射與栓塞。", "D": "✗ 離心後脂肪浮於『上層』，非底層。", "E": "✗ 最常見併發症為脂肪壞死/油囊，非hematoma。"}, "cite": "待複查（Neligan Fat grafting 記憶佐證）", "conflict": ""}, {"id": "5249", "sub": "AE6", "src": "NG", "years": [113], "stem": "有關neck rejuvenation何者不正確?", "opts": {"A": "從懸韌帶retaining ligaments和間隔septae鬆解皮膚。", "B": "調整改造頷下腺submandibular gland。", "C": "適當地從淺層皮下subcutaneous和深層頸廓肌下subplatysmal移除脂肪。", "D": "必須加強皮膚的張力以維持效果。", "E": "調整改造頸廓肌platysma及二腹肌digastric muscles。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 現代neck rejuvenation強調『深層結構』的處理而非皮膚張力：自retaining ligaments與septae鬆解皮膚、重塑submandibular gland、適當移除subcutaneous與subplatysmal脂肪、重塑platysma與digastric muscles。選項D錯——不應以『加強皮膚張力』維持效果，因倚賴皮膚張力會導致復發與疤痕不良；效果應靠深層platysma與支撐結構重塑維持。", "peropt": {"A": "✗ 正確。自retaining ligaments與septae鬆解皮膚。", "B": "✗ 正確。重塑submandibular gland。", "C": "✗ 正確。適當自淺層皮下與subplatysmal移除脂肪。", "D": "✓(正解，為不正確) 不應靠加強皮膚張力維持效果；應靠深層platysma/支撐結構，皮膚張力過大會復發。", "E": "✗ 正確。重塑platysma與digastric muscles。"}, "cite": "待複查（Neligan 頸部年輕化 記憶佐證）", "conflict": ""}, {"id": "5250", "sub": "AE7", "src": "NG", "years": [113], "stem": "關於nasal anatomy何者錯誤?", "opts": {"A": "鼻子的感覺神經是由infraorbital nerve 和 external nasal nerve支配。", "B": "在前鼻中膈血管密集的區域叫做Kiesselbach's area。", "C": "下側方軟骨lower lateral cartilages支撐外部鼻瓣 external nasal valve。", "D": "在開放式鼻整形時上唇動脈的鼻小柱分枝將被截斷。", "E": "中鼻甲 middle turbinate對鼻腔裡的呼吸道阻力airway resistance影響最大。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖（選『錯誤』者）：對鼻腔氣道阻力影響最大的是『下鼻甲（inferior turbinate）＋internal nasal valve』，非 middle turbinate，故 E 錯。易混淆：鼻感覺由 infraorbital nerve 與 external nasal nerve 支配；Kiesselbach's area（Little's area）為前中膈血管叢；lower lateral cartilages 支撐 external nasal valve；開放式鼻整形會截斷上唇動脈的鼻小柱分枝。", "peropt": {"A": "✗（正確）鼻感覺由 infraorbital 與 external nasal nerve 支配。", "B": "✗（正確）前中膈血管密集區為 Kiesselbach's area。", "C": "✗（正確）下側方軟骨支撐 external nasal valve。", "D": "✗（正確）開放式鼻整形截斷上唇動脈鼻小柱分枝。", "E": "✓（正解，錯誤敘述）氣道阻力最大者為下鼻甲＋internal valve，非 middle turbinate。"}, "cite": "待複查（Neligan 鼻解剖 記憶佐證）", "conflict": ""}, {"id": "5251", "sub": "AE5", "src": "NG", "years": [113], "stem": "關於Hair restoration何者正確? (複選)", "opts": {"A": "在男女最常見的掉髮同樣是雄性禿androgenic alopecia。", "B": "毛髮被移植後通常會先進入休止期resting or telogen phase。", "C": "在替年輕病患植髮時通常不建議先在額頭區和上區frontal and superior regions做植髮，直到髮型更加成熟後再作。", "D": "通常穩定的Norwood II型或III型禿髮患者能有良好的植髮結果。", "E": "在健康沒有瘢痕的個體植髮可以達到90~95%的成功率。"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 植髮（hair restoration）重點（正解 ABDE）：A 男女最常見掉髮皆為 androgenetic alopecia；B 移植毛先進入 telogen（脫落後再生）；D 穩定的 Norwood II/III 型為良好候選；E 健康無疤者成功率約 90–95%。C 為錯誤：年輕病患植髮應優先重建『frontal 髮際/前額區』以框住臉部並保守設計，並非避開額頭/上區，故不納入答案。⚠此題與 NG109-B05-Q10 為選項重排家族。", "peropt": {"A": "✓ 男女最常見掉髮皆為雄性禿（androgenetic alopecia），正確。", "B": "✓ 移植毛通常先進入 telogen（休止期），正確。", "C": "✗ 年輕病患應優先重建 frontal 髮際區並保守設計，非避開額頭/上區，敘述有誤。", "D": "✓ 穩定 Norwood II/III 型植髮效果佳，正確。", "E": "✓ 健康無疤者成功率約 90–95%，正確。"}, "cite": "待複查（Neligan 植髮 記憶佐證）", "conflict": "選項重排家族：與 NG109-B05-Q10 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5252", "sub": "AE7", "src": "NG", "years": [113], "stem": "關於nasal anatomy何者為非?", "opts": {"A": "鼻部的神經支配主要來自顏面神經", "B": "為了保留良好的血液循環，開放式鼻整形應沿著perichondrium之上做dissection", "C": "呼吸道的阻力主要來自於下鼻甲(inferior turbinate)", "D": "鼻骨和upper lateral cartilage重疊處稱為keystone area", "E": "upper lateral cartilage和lower lateral cartilage重疊處稱為scroll area"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖（本題找非/錯誤）：正解 A——鼻部「感覺」支配主要來自三叉神經（V1 眼支＋V2 上頜支），顏面神經僅司運動；稱感覺主要來自顏面神經有誤。正確者：開放式鼻整形沿 perichondrium 之上剝離以保血供；氣道阻力主要來自下鼻甲；鼻骨-ULC 重疊為 keystone area；ULC-LLC 重疊為 scroll area。", "peropt": {"A": "✓(正解,錯誤敘述) 鼻部感覺主要來自三叉神經（V1/V2），非顏面神經，故選。", "B": "✗ 開放式鼻整形沿 perichondrium 之上剝離以保血循，正確。", "C": "✗ 氣道阻力主要來自下鼻甲，正確。", "D": "✗ 鼻骨與 ULC 重疊處為 keystone area，正確。", "E": "✗ ULC 與 LLC 重疊處為 scroll area，正確。"}, "cite": "待複查（Neligan 鼻部解剖/神經 記憶佐證）", "conflict": ""}, {"id": "5253", "sub": "AE11", "src": "NG", "years": [113], "stem": "關於臉部的skeletal augmentation何者不正確？(複選)", "opts": {"A": "大部分是採用異體植入物(alloplastic implants)", "B": "異體植入物中最常使用的是silicone和polyethylene", "C": "植入物應放置在皮下subcutaneous plane", "D": "從口內放置下頷植入物，切口建議沿著sulcus", "E": "切口應設計在植入物附近，以方便植入物的置放"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部骨性augmentation(複選選『不正確』)。此為5157的反向題型，正解CDE為錯誤敘述：植入層次應subperiosteal(非subcutaneous);口內下頷切口宜保留黏膜cuff(非直接沿sulcus底);切口應遠離植入物(非設計在附近)。正確敘述(A、B)不選：多採alloplastic、最常用silicone與polyethylene。⚠務必辨明題幹問的是『不正確』者。", "peropt": {"A": "✗(非答案) 敘述正確：臉部骨augmentation多採alloplastic implants。", "B": "✗(非答案) 敘述正確：最常用材料為silicone與polyethylene。", "C": "✓(屬答案) 錯誤：植入物應置於subperiosteal，非subcutaneous plane。", "D": "✓(屬答案) 錯誤：口內下頷切口宜保留黏膜cuff，不建議直接沿sulcus底。", "E": "✓(屬答案) 錯誤：切口應遠離植入物(remote)，非設計在其附近。"}, "cite": "待複查（Neligan 顏面骨augmentation 記憶佐證）", "conflict": ""}, {"id": "5254", "sub": "AE4", "src": "NG", "years": [113], "stem": "關於facelift相關的神經何者錯誤?", "opts": {"A": "McKinney's point是great auricular nerve最表淺而容易受傷的位置", "B": "great auricular nerve為純感覺神經", "C": "顏面神經的zygomatic branch和cervical branch和其餘分支較無交通支相連，一旦受傷恢復情形較差", "D": "顏面神經受損位置若較末梢，通常可以保守治療觀察", "E": "於非患側使用botox可以改善顏面神經受損造成的顏面麻痺"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮相關神經（選錯誤者）：C錯誤——交通支少、受損後恢復差的是temporal與marginal mandibular branch；zygomatic與buccal branch間交通支『豐富』，受損多可代償恢復，故C『zygomatic與cervical交通支少』的敘述錯誤。正確者：A McKinney's point為great auricular nerve最表淺易傷處；B great auricular為純感覺神經；D末梢處facial nerve損傷多可保守觀察；E於非患側施打botox可改善顏面麻痺造成的不對稱。⚠ 本題與NG108-B05-Q01為選項重排家族，記概念勿背字母。", "peropt": {"A": "✗ 敘述正確：McKinney's point為great auricular nerve最表淺易傷位置。", "B": "✗ 敘述正確：great auricular nerve為純感覺神經。", "C": "✓(正解，即錯誤敘述) 交通支少、恢復差者為temporal與marginal mandibular；zygomatic與buccal交通支豐富。", "D": "✗ 敘述正確：末梢facial nerve損傷通常可保守觀察。", "E": "✗ 敘述正確：非患側施打botox可改善不對稱性麻痺。"}, "cite": "待複查（Neligan Facelift 神經 記憶佐證）", "conflict": "選項重排家族：與 NG108-B05-Q01 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5255", "sub": "AE8", "src": "NG", "years": [113], "stem": "使用自體軟骨做鼻整形何者錯誤?", "opts": {"A": "常用的軟骨包括鼻中膈，耳軟骨和肋軟骨", "B": "自體軟骨較不會有infection and extrusion的風險", "C": "耳軟骨質地較軟，不適合做rigid support", "D": "鼻中膈軟骨需保留至少0.5公分的L-strut", "E": "肋軟骨的缺點是容易扭曲變形(warping)"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 自體軟骨鼻整形：常用septal、auricular、costal軟骨（A對）；自體軟骨感染與extrusion風險較低（B對）；耳軟骨質軟、彎曲，不適合作rigid structural support（C對）；肋軟骨易warping（變形扭曲）為其缺點（E對）。選項D錯——切取鼻中膈軟骨時須保留至少『1.0–1.5cm的L-strut』以維持鼻背與鼻尖支撐，0.5cm不足，會致鞍鼻/塌陷。", "peropt": {"A": "✗ 正確。常用鼻中膈、耳、肋軟骨。", "B": "✗ 正確。自體軟骨感染與脫出風險較低。", "C": "✗ 正確。耳軟骨質軟不適合作rigid support。", "D": "✓(正解，為錯誤敘述) 應保留至少1.0–1.5cm的L-strut，非0.5cm，否則支撐不足。", "E": "✗ 正確。肋軟骨缺點為易warping變形。"}, "cite": "待複查（Neligan 自體軟骨鼻整形 記憶佐證）", "conflict": ""}, {"id": "5256", "sub": "AE7", "src": "NG", "years": [113], "stem": "關於鼻整型與呼吸道的關係何者錯誤?", "opts": {"A": "陽性的Cottle test表示nasal valve incompetence", "B": "internal nasal valve和下鼻甲提供了大部分呼吸道的阻力 .", "C": "正常internal nasal valve為10-15度", "D": "internal nasal valve為lower lateral cartilage和鼻中膈的交角", "E": "Spreader graft是治療incompetent nasal valve的重要方法"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻整形與氣道（選『錯誤』者）：Internal nasal valve 是『upper lateral cartilage 尾端』與鼻中膈的夾角（正常 10–15°），非 lower lateral cartilage 與中膈，故 D 錯。易混淆：陽性 Cottle test 表示 nasal valve incompetence；internal valve＋下鼻甲提供大部分氣道阻力；spreader graft 為治療 incompetent valve 之重要方法。", "peropt": {"A": "✗（正確）陽性 Cottle test 表示 nasal valve incompetence。", "B": "✗（正確）internal valve 與下鼻甲提供大部分氣道阻力。", "C": "✗（正確）正常 internal nasal valve 為 10–15°。", "D": "✓（正解，錯誤敘述）internal valve 為 upper lateral cartilage 與中膈夾角，非 lower lateral cartilage。", "E": "✗（正確）spreader graft 為治療 incompetent valve 重要方法。"}, "cite": "待複查（Neligan 鼻氣道 記憶佐證）", "conflict": ""}, {"id": "5257", "sub": "AE3", "src": "NG", "years": [113], "stem": "在liposuction使用tumescent technique 預估失血量佔抽出總體積的比例是多少?", "opts": {"A": "1%", "B": "10%", "C": "15%", "D": "20%", "E": "25%"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂失血量與 wetting technique：tumescent technique（大量含腎上腺素浸潤液）估計失血量僅約抽出總量的『1%』，為最低者；相較 wet technique 約 4–30%、dry technique 可達 20–45%。⚠此題有跨年（Neligan 4e 版本間）數值差異：110 年與 113 年之干擾選項數值不同（如 20/30/40% vs 15/20/25%），作答以 tumescent≈1% 概念為準。", "peropt": {"A": "✓（正解）Tumescent technique 失血量約佔抽出量 1%。", "B": "✗ 10% 偏高，非 tumescent。", "C": "✗ 15% 非 tumescent 之估計值。", "D": "✗ 20% 屬 wet/dry 較高範圍。", "E": "✗ 25% 非 tumescent 之值。"}, "cite": "待複查（Neligan 抽脂失血量/tumescent 記憶佐證）", "conflict": "跨年數值差異（Neligan 4e vs Neligan 4e）：C: 110「20%」 vs 113「15%」；D: 110「30%」 vs 113「20%」；E: 110「40%」 vs 113「25%」"}, {"id": "5258", "sub": "AE1", "src": "NG", "years": [113], "stem": "下列何者是腹部整形術(abdominoplasty)最常發生的併發症?", "opts": {"A": "Seroma", "B": "Hematoma", "C": "Pulmonary embolism", "D": "DVT", "E": "Wound infection"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 腹部整形（abdominoplasty）最常見併發症為「血清腫（seroma）」——因廣泛皮下剝離產生潛在死腔與淋巴滲液，故常規使用引流、加壓與 progressive tension suture 預防。⚠ 與 NG108-B06-Q03 為選項重排家族，記概念勿背字母。Hematoma、PE、DVT、感染皆屬併發症但發生率低於 seroma。", "peropt": {"A": "✓(正解) Seroma 為腹部整形最常見併發症。", "B": "✗ Hematoma 發生率低於 seroma。", "C": "✗ 肺栓塞為嚴重但少見之併發症。", "D": "✗ DVT 少見，非最常見。", "E": "✗ 傷口感染非最常見併發症。"}, "cite": "待複查（Neligan abdominoplasty 併發症 記憶佐證）", "conflict": "選項重排家族：與 NG108-B06-Q03 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5259", "sub": "AE1", "src": "NG", "years": [113, 114], "stem": "對於大量減重(massive weight loss, MWL)後病人的 abdominal contouring，下列何者錯誤?", "opts": {"A": "若病人有giant pannus(panniculus morbidus)，可以使用特殊的儀器來幫助切除", "B": "腹部和肚臍疝氣在MWL病人中很常見", "C": "Abdominoplasty 這個詞最初是用在移除腹部皮膚跟脂肪的美容手術，伴隨腹壁肌肉的緊實以及肚臍的重新定位", "D": "Trunk skin and fat 的縱切 (fleur-de-lis abdominoplasty) 可以被用來讓腹部做橫向的放鬆", "E": "在 genital area or mons 可能需要 thinning and resuspension"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 MWL後腹部contouring(選錯誤)。正解D為誤述：Fleur-de-lis abdominoplasty是以『縱切』達成腹部橫向『緊實』，而非橫向放鬆(relaxation);用詞方向錯誤(與5193同概念不同字母)。正確敘述：giant pannus可用特殊器械;腹壁/臍疝氣常見;abdominoplasty原始定義;生殖區/mons需thinning與resuspension。", "peropt": {"A": "✗ 正確：giant pannus(panniculus morbidus)可用特殊器械輔助切除。", "B": "✗ 正確：腹壁與臍疝氣在MWL病人常見。", "C": "✗ 正確：abdominoplasty原指去皮脂加肌肉緊實與臍重定位。", "D": "✓(正解) 錯誤：fleur-de-lis為縱切達腹部橫向『緊實』，非橫向放鬆。", "E": "✗ 正確：genital area或mons可能需thinning與resuspension。"}, "cite": "待複查（Neligan MWL腹整形 記憶佐證）", "conflict": ""}, {"id": "5260", "sub": "AE11", "src": "NG", "years": [113, 114], "stem": "列關於陰莖解剖構造及陰莖增大術( Penile lengthening)何者錯誤?", "opts": {"A": "陰莖遠端的皮膚沒有毛髮。", "B": "Suprapubic lipectomy 是手術的選擇之一。", "C": "可以使用 VY advancement flap 手術。", "D": "陰莖的皮膚下有脂肪層。", "E": "可以分離 suspensory ligament of the penis。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 陰莖解剖與增長術（選錯誤者）：D錯誤——陰莖皮膚下為dartos（平滑肌）筋膜層，『沒有皮下脂肪層』，這也是陰莖皮膚可自由滑動的原因。正確者：A陰莖遠端皮膚無毛；B suprapubic lipectomy為術式選擇之一（改善埋藏陰莖外觀）；C可用VY advancement flap；E可切斷suspensory ligament of the penis以增加外露長度。", "peropt": {"A": "✗ 敘述正確：陰莖遠端皮膚無毛髮。", "B": "✗ 敘述正確：suprapubic lipectomy為手術選擇之一。", "C": "✗ 敘述正確：可使用VY advancement flap。", "D": "✓(正解，即錯誤敘述) 陰莖皮下為dartos筋膜、無脂肪層。", "E": "✗ 敘述正確：可分離suspensory ligament以增加外露長度。"}, "cite": "待複查（Neligan 陰莖增大術 記憶佐證）", "conflict": ""}, {"id": "5261", "sub": "AE1", "src": "NG", "years": [113], "stem": "以下何者不是 Zones of adherence ?", "opts": {"A": "Gluteal crease", "B": "Inferolateral iliotibial tract", "C": "Lateral gluteal depression", "D": "Upper medial thigh", "E": "Distal posterior thigh"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Zones of adherence（沾黏區）為皮膚經纖維中膈緊附深層筋膜、抽脂時應避免積極抽吸以防輪廓凹陷之處，包含：gluteal crease、inferolateral iliotibial tract、lateral gluteal depression、distal posterior thigh、mid-medial thigh、gluteal crease等。『Upper medial thigh（上內側大腿）』並非典型zone of adherence，故為答案。", "peropt": {"A": "✗ Gluteal crease為zone of adherence。", "B": "✗ Inferolateral iliotibial tract為zone of adherence。", "C": "✗ Lateral gluteal depression為zone of adherence。", "D": "✓(正解) Upper medial thigh並非典型zone of adherence。", "E": "✗ Distal posterior thigh為zone of adherence。"}, "cite": "待複查（Neligan 沾黏區 記憶佐證）", "conflict": ""}, {"id": "5262", "sub": "AE1", "src": "NG", "years": [113, 114], "stem": "關於thigh lift, 那些描述正確? (複選)", "opts": {"A": "外側 thigh-lift 可以影響大腿外側, 但只有些微拉緊大腿內側組織", "B": "腳的淋巴主要集中在外側", "C": "在vertical thigh-lift procedure中，遠端的切除程度，可以根據膝蓋多餘的皮膚來決定，但不能由病人的意願以及疤痕的長度來決定切除多少", "D": "若在 thigh-lift 過程中不小心傷到淋巴，也許會造成下肢淋巴水腫", "E": "在病人只有些微deflated thighs而要求thigh-lift時，更進一步的減重也許是需要的"}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Thigh lift（複選，選『正確』者）：ADE 正確——外側 thigh-lift 主要影響外側、僅些微拉緊內側；術中傷及淋巴可致下肢淋巴水腫；僅些微 deflated thighs 者可能需先進一步減重。錯誤點：腳的淋巴『主要集中在內側』（沿大隱靜脈），非外側（B 錯）；vertical thigh-lift 遠端切除程度『可』依病人意願與疤痕長度共同決定，C 之『不能』為誤。", "peropt": {"A": "✓ 外側 thigh-lift 主影響外側，僅些微拉緊內側。", "B": "✗ 腳的淋巴主要集中在『內側』（沿大隱靜脈），非外側。", "C": "✗ 遠端切除程度亦可考量病人意願與疤痕長度，非『不能』。", "D": "✓ 傷及淋巴可致下肢淋巴水腫。", "E": "✓ 些微 deflated thighs 者可能需先進一步減重。"}, "cite": "待複查（Neligan thigh lift 記憶佐證）", "conflict": ""}, {"id": "5263", "sub": "AE1", "src": "NG", "years": [113], "stem": "有關於腹部整形術的術後併發症, 以下哪些正確? (複選)", "opts": {"A": "抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題。", "B": "應建議所有病人劃刀前給予預防性抗生素來降低術後傷口感染的機率。", "C": "術前接受過減肥手術 (Bariatric surgery) 比自然減重的病人更容易發生術後傷口併發症。", "D": "BMI>25 跟脂肪移除超過1000g 的病人術後有比較高的機率發生肺栓塞。", "E": "同一個時間進行多種不同的手術會增加術中跟術後併發症的風險。"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Abdominoplasty 併發症正確組合（本題正解 ABC）：A 抽菸者傷口/感染較高；B 建議所有病人術前單劑預防性抗生素；C 減肥手術後傷口併發症較自然減重多。D 應為 BMI>30 且切除>1500g（非 >25/>1000g）才增加 PE；E 同時多術式並不增加主要併發症，故 D、E 錯誤。", "peropt": {"A": "✓ 抽菸者傷口/感染較高，正確。", "B": "✓ 術前單劑預防性抗生素降低傷口感染，正確。", "C": "✓ 減肥手術後傷口併發症較自然減重多，正確。", "D": "✗ 應為 BMI>30 且切除>1500g 才增加 PE；題述 >25/>1000g 錯誤。", "E": "✗ 同時多術式不增加主要併發症。"}, "cite": "待複查（Neligan 腹部整形併發症 記憶佐證）", "conflict": ""}, {"id": "5264", "sub": "AE1", "src": "NG", "years": [113], "stem": "對於大量減重(massive weight loss)病人，那些因子會影響其外觀呈現? (複選)", "opts": {"A": "Carnivorism", "B": "Body Mass Index (BMI) level", "C": "Fat deposition pattern", "D": "Quality of the skin/fat envelope", "E": "Psychologic status"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大量減重（MWL）病人外觀呈現之影響因子（本題找正確，複選）：正解 BCD——BMI 水準、脂肪堆積型態（fat deposition pattern）、皮膚/脂肪包膜品質（skin-fat envelope quality）皆直接決定術後輪廓。無關者：飲食型態「肉食主義（carnivorism）」（A）與心理狀態（E，影響滿意度而非外觀本身）非外觀決定因子。", "peropt": {"A": "✗ Carnivorism（肉食）非影響外觀呈現之因子，不選。", "B": "✓ BMI 水準影響外觀呈現。", "C": "✓ 脂肪堆積型態影響外觀。", "D": "✓ 皮膚/脂肪包膜品質影響外觀。", "E": "✗ 心理狀態影響滿意度而非外觀本身，不選。"}, "cite": "待複查（Neligan MWL 病人評估 記憶佐證）", "conflict": ""}, {"id": "5265", "sub": "AE5", "src": "NG", "years": [114, 115], "stem": "The Fitzpatrick skin type classification is based on which of the following?", "opts": {"A": "Sebum production levels", "B": "Degree of skin wrinkling", "C": "Erythema and tanning response after sun exposure", "D": "Number of melanocytes in the skin", "E": "Thickness of dermis"}, "ans": "C", "multi": false, "etype": "ai", "expl": "4.Which of the following moisturizing ingredients is most effective in reducing transepidermal water loss (TEWL)?\n\nA. Glycerin\n\nB. Petrolatum\n\nC. Silicone\n\nD. Lactic acid\n\nE. Urea", "key": "🎯 Fitzpatrick skin type分型的分類依據是『日曬後的紅斑(erythema/burning)與曬黑(tanning)反應』，即個人對UV的臨床反應(易曬傷/易曬黑程度)，而非黑色素細胞數量或膚色本身。臨床意義：type愈高愈易曬黑、愈不易灼傷，雷射/換膚時PIH風險愈高。", "peropt": {"A": "✗ 皮脂分泌量與Fitzpatrick分型無關。", "B": "✗ 皮膚皺紋程度非分型依據(屬光老化評估)。", "C": "✓(正解) 依日曬後的紅斑(灼傷)與曬黑反應分型。", "D": "✗ 黑色素細胞數量各人相近，分型看的是反應非細胞數。", "E": "✗ 真皮厚度與Fitzpatrick分型無關。"}, "cite": "待複查（Neligan Fitzpatrick分型 記憶佐證；註：原檔詳解疑為TEWL另題誤植，未採用）", "conflict": ""}, {"id": "5266", "sub": "AE5", "src": "NG", "years": [114, 115], "stem": "Which of the following moisturizing ingredients is most effective in reducing transepidermal water loss (TEWL)?", "opts": {"A": "Glycerin", "B": "Petrolatum", "C": "Silicone", "D": "Lactic acid", "E": "Urea"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 保濕成分減少經皮水分散失（TEWL）之效力：Petrolatum（凡士林）為『封閉性（occlusive）』成分，可減少約99% TEWL，是最有效者。Glycerin、lactic acid、urea屬humectant（保濕吸水劑，本身不阻水分蒸發）；silicone雖亦具封閉性但效果不及petrolatum。故正解B。", "peropt": {"A": "✗ Glycerin為humectant，非最有效降低TEWL者。", "B": "✓(正解) Petrolatum封閉性最強，減少TEWL約99%。", "C": "✗ Silicone雖具封閉性但不及petrolatum。", "D": "✗ Lactic acid為humectant（兼角質溶解），非封閉劑。", "E": "✗ Urea為humectant，非最有效降低TEWL者。"}, "cite": "待複查（Neligan Moisturizer/TEWL 記憶佐證）", "conflict": ""}, {"id": "5267", "sub": "AE5", "src": "NG", "years": [114, 115], "stem": "Regarding synthetic detergents (syndets) and traditional soaps, which of the following statements are true? (複選)", "opts": {"A": "Syndets have a pH closer to the natural skin pH.", "B": "Soaps are more likely to cause skin barrier damage.", "C": "Syndets cause more dryness than soaps.", "D": "Soaps are made from the reaction of fats and alkali.", "E": "It is possible to combine both soap and syndet cleansers into a formulation, providing better cleansing with less lipid disruption."}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 合成清潔劑(syndets)與傳統皂(soaps)（複選正確ABDE）：syndets pH接近皮膚自然pH(~5.5)（A對）；傳統皂(鹼性)較易破壞皮膚屏障（B對）；soaps由脂肪與鹼皂化反應製成(saponification)（D對）；可將soap與syndet結合成combo配方，達較佳清潔又減少脂質破壞（E對）。C錯——是『soaps』造成較多乾燥，syndets較溫和、乾燥較少。", "peropt": {"A": "✓(正解) Syndets pH接近皮膚自然pH。", "B": "✓(正解) 傳統皂較易破壞皮膚屏障。", "C": "✗ 是soaps造成較多乾燥，非syndets。", "D": "✓(正解) Soaps由脂肪與鹼皂化反應製成。", "E": "✓(正解) 可結合soap與syndet成combo配方兼顧清潔與減少脂質破壞。"}, "cite": "待複查（Neligan 皮膚清潔劑 記憶佐證）", "conflict": ""}, {"id": "5268", "sub": "AE10", "src": "NG", "years": [114, 115], "stem": "Which of the following statements about the infraorbital nerve block are correct? (複選)", "opts": {"A": "It anesthetizes the medial cheek and portions of the nasal sidewall.", "B": "It can be used for cosmetic procedures like upper lip fillers.", "C": "It blocks the sensation of the entire lower lip.", "D": "The infraorbital foramen is found 5–8 mm below the orbital rim.", "E": "The block affects the superior alveolar nerve in all patients."}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Infraorbital nerve block（複選，選『正確』者）：ABD 正確——麻醉內側頰部與部分鼻側壁；可用於上唇填充等美容處置；infraorbital foramen 位於眶下緣下方約 5–8mm。錯誤點：infraorbital 管『上唇』非整個下唇（C 錯）；『in all patients 皆影響 superior alveolar nerve』過於絕對（E 錯）。", "peropt": {"A": "✓ 麻醉內側頰部與部分鼻側壁。", "B": "✓ 可用於上唇填充等美容處置。", "C": "✗ 支配上唇而非整個下唇。", "D": "✓ infraorbital foramen 位於眶緣下方約 5–8mm。", "E": "✗ 『在所有病人皆影響 superior alveolar nerve』過於絕對，不成立。"}, "cite": "待複查（Neligan 局部神經阻斷 記憶佐證）", "conflict": ""}, {"id": "5269", "sub": "AE10", "src": "NG", "years": [114, 115], "stem": "Which of the following nerves are involved in the region around the zygoma and lateral orbit? (複選)", "opts": {"A": "Supraorbital nerve", "B": "Infraorbital nerve", "C": "Dorsal nasal nerve", "D": "Zygomaticotemporal nerve", "E": "Zygomaticofacial nerve"}, "ans": "DE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顴骨與外側眶周之感覺神經為三叉神經 V2 之 zygomatic nerve 分支：zygomaticotemporal nerve 與 zygomaticofacial nerve（正解 DE）。supraorbital、dorsal nasal 屬 V1；infraorbital 供應中臉/下瞼/上唇之中央區，皆非顴骨/外側眶周之主要神經。", "peropt": {"A": "✗ Supraorbital nerve 屬 V1，供應前額，非顴骨區。", "B": "✗ Infraorbital nerve 供應中臉/上唇中央區，非顴骨/外側眶周。", "C": "✗ Dorsal nasal nerve 屬 V1，供應鼻背。", "D": "✓ Zygomaticotemporal nerve 位於顴骨/外側眶周。", "E": "✓ Zygomaticofacial nerve 位於顴骨/外側眶周。"}, "cite": "待複查（Neligan 顏面感覺神經分布 記憶佐證）", "conflict": ""}, {"id": "5270", "sub": "AE10", "src": "NG", "years": [114, 115], "stem": "Which of the following is considered an intrinsic factor contributing to facial aging?", "opts": {"A": "Smoking", "B": "Solar damage", "C": "Skeletal atrophy", "D": "Gravity", "E": "Weight fluctuation"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部老化之「內在（intrinsic）」因素＝與生俱來、時間依賴之生物老化，如骨骼萎縮（skeletal atrophy，眶孔擴大、上顎後縮）、荷爾蒙與基因所致之組織退化。外在（extrinsic）因素則為吸菸、日曬、地心引力、體重波動等環境/行為性因子。故選 C。", "peropt": {"A": "✗ 吸菸為外在（extrinsic）因素。", "B": "✗ 日曬損傷為外在因素（photoaging）。", "C": "✓(正解) 骨骼萎縮（skeletal atrophy）為內在（intrinsic）老化因素。", "D": "✗ 地心引力為外在因素。", "E": "✗ 體重波動為外在因素。"}, "cite": "待複查（Neligan 臉部老化內在/外在因素 記憶佐證）", "conflict": ""}, {"id": "5271", "sub": "AE9", "src": "NG", "years": [114, 115], "stem": "Which of the following characteristics are considered ideal for a soft-tissue filler? (複選)", "opts": {"A": "Permanent and non-reversible", "B": "Easy to use", "C": "Minimal downtime", "D": "Highly visible under the skin", "E": "Biocompatible"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 理想軟組織填充劑特性(複選)：易於使用(easy to use)、恢復期短(minimal downtime)、生物相容(biocompatible)。易錯點：理想填充劑應可逆/可代謝(如HA可用hyaluronidase溶解)，永久不可逆並非理想特性;且應在皮下『不可見』(自然)，highly visible反屬缺點。", "peropt": {"A": "✗(非答案) 永久且不可逆並非理想特性;理想填充劑宜可逆/可代謝。", "B": "✓ 易於使用為理想特性。", "C": "✓ 恢復期短(minimal downtime)為理想特性。", "D": "✗(非答案) 皮下高度可見屬缺點，理想填充應自然不可見。", "E": "✓ 生物相容(biocompatible)為理想特性。"}, "cite": "待複查（Neligan 理想填充劑特性 記憶佐證）", "conflict": ""}, {"id": "5272", "sub": "AE9", "src": "NG", "years": [114, 115], "stem": "Regarding hyaluronic acid (HA) fillers, which statements are correct? (複選)", "opts": {"A": "HA naturally lasts many years without modification.", "B": "HA fillers are most suitable only for very deep folds and cannot be used superficially.", "C": "HA fillers are highly hydrophilic and bind large amounts of water.", "D": "Cross-linking of HA increases its stability and longevity.", "E": "HA fillers can have different rheologic properties depending on cross-linking."}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 玻尿酸（HA）填充劑（選正確，複選）：C正確——HA高度親水，可結合大量水分產生容積；D正確——cross-linking（交聯）增加穩定性與持久度；E正確——不同交聯程度賦予不同流變特性（rheology，如G′彈性模數），決定適用深淺層。錯誤者：A未修飾之天然HA半衰期僅數天、不會維持多年；B HA可用於淺層（低G′產品）亦可用於深層，非只限深層。", "peropt": {"A": "✗ 未交聯天然HA半衰期僅數天，不會維持多年。", "B": "✗ HA可依產品流變特性用於淺層或深層，非只限很深皺褶。", "C": "✓ HA高度親水、可結合大量水分。", "D": "✓ 交聯增加HA穩定性與持久度。", "E": "✓ 不同交聯程度給予不同流變特性。"}, "cite": "待複查（Neligan HA filler 記憶佐證）", "conflict": ""}, {"id": "5273", "sub": "AE11", "src": "NG", "years": [114, 115], "stem": "According to World Professional Association for Transgender Health (WPATH) Standards of Care (SOC), Version 8 (SOC8), guidelines, which is not the criteria for facial surgery?", "opts": {"A": "Gender incongruence marked and sustained", "B": "Demonstrates capacity to consent for the specific gender affirming surgical intervention", "C": "Mental health and physical conditions that could negatively impact the outcome of gender-affirming surgical intervention have been assessed as well controlled", "D": "Other causes for gender incongruence identified and excluded", "E": "At least 2 letters from mental health providers trained in transgender health"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 WPATH SOC8對gender-affirming手術（含臉部手術）的準則：gender incongruence持續且明顯、具知情同意能力、共病之身心狀況已良好控制、已排除其他造成gender incongruence之原因。SOC8已『放寬』心理健康推薦信要求（不再硬性要求2封）——選項E『至少2封mental health provider推薦信』並非SOC8之臉部手術準則，故為答案。", "peropt": {"A": "✗ 為準則。gender incongruence持續且明顯。", "B": "✗ 為準則。具對該手術之知情同意能力。", "C": "✗ 為準則。共病身心狀況已良好控制。", "D": "✗ 為準則。已排除其他造成gender incongruence之原因。", "E": "✓(正解，為非準則) SOC8已放寬推薦信要求，非要求至少2封心理健康推薦信。"}, "cite": "待複查（WPATH SOC8 記憶佐證）", "conflict": ""}, {"id": "5274", "sub": "AE11", "src": "NG", "years": [114, 115], "stem": "Which of the following is common hormone therapy for gender affirmation surgery?", "opts": {"A": "Estrogen", "B": "Progesterone", "C": "Anti-androgen", "D": "Testosterone", "E": "All the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 性別確認手術之常見荷爾蒙治療：包含 Estrogen、Progesterone、Anti-androgen（男跨女 MtF），以及 Testosterone（女跨男 FtM），故『以上皆是（E）』。臨床重點：MtF 用雌激素＋抗雄性素；FtM 用睪固酮。", "peropt": {"A": "✗ estrogen 為 MtF 用藥，非唯一。", "B": "✗ progesterone 為輔助，非唯一。", "C": "✗ anti-androgen 為 MtF 用藥，非唯一。", "D": "✗ testosterone 為 FtM 用藥，非唯一。", "E": "✓（正解）以上荷爾蒙皆為性別確認常見用藥。"}, "cite": "待複查（Neligan 性別確認手術 記憶佐證）", "conflict": ""}, {"id": "5275", "sub": "AE11", "src": "NG", "years": [114, 115], "stem": "Which of the following is not procedure for facial feminization surgery?", "opts": {"A": "Malar reduction", "B": "Hairline advancement", "C": "Frontal sinus setback", "D": "Browlift", "E": "Jawline contouring"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化手術（FFS）標準術式：hairline advancement、frontal sinus setback（額竇/眉弓後推）、browlift、jawline contouring（下頷輪廓縮小）等。女性 malar 較豐滿，FFS 多為顴骨『augmentation』而非 reduction；故『Malar reduction』並非 FFS 之標準女性化術式，為本題答案。", "peropt": {"A": "✓（正解）Malar reduction 非 FFS 術式；女性化多為顴骨 augmentation。", "B": "✗ Hairline advancement 為 FFS 術式。", "C": "✗ Frontal sinus setback 為 FFS 額部女性化術式。", "D": "✗ Browlift 為 FFS 術式。", "E": "✗ Jawline contouring（下頷縮小）為 FFS 術式。"}, "cite": "待複查（Neligan 顏面女性化手術 記憶佐證）", "conflict": ""}, {"id": "5276", "sub": "AE5", "src": "NG", "years": [114, 115], "stem": "Which statement is wrong about the noninvasive technologies for aesthetic improvement?", "opts": {"A": "Cryolipolysis acts by cooling the skin and subcutaneous tissue below physiologic, but above freezing, temperatures, adipocytes undergo apoptosis.", "B": "Radiofrequency energy devices cause contraction, remodeling, and potential improvement in tightness and tone of the skin by the heating of the deep dermis and the collagen-based fibrous septae in the subcutaneous layer.", "C": "Ultrasound devices generate heat and cause coagulative necrosis of adipocytes and collagen, which have the effects of adipose reduction, dermal tightness, and muscular hypertrophy.", "D": "High-intensity focused electromagnetic technology (HIFEM) has the effects of increasing the muscle thickness and narrowing the rectus diastasis.", "E": "Low-level laser therapy creates microscopic pores in the adipose cells and allows lipids to leak."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 非侵入性美容科技（本題找錯誤）：正解 C——超音波（如 focused ultrasound）藉熱能造成脂肪細胞與膠原之凝固壞死，效果為脂肪減量與真皮緊實，但「不會造成肌肉肥大」；肌肉肥大是 HIFEM（如 D 選項）之效果，故 C 誤植 muscular hypertrophy。正確者：冷凍溶脂（cryolipolysis）令脂肪細胞凋亡；RF 加熱深真皮與纖維隔膜緊實；HIFEM 增肌並縮小腹直肌分離；低能量雷射於脂肪細胞形成微孔使脂質外漏。", "peropt": {"A": "✗ Cryolipolysis 於高於冰點但低於生理溫度冷卻致脂肪細胞凋亡，正確。", "B": "✗ RF 加熱深真皮與纖維隔膜達緊實，正確。", "C": "✓(正解,錯誤敘述) 超音波造成脂肪/膠原凝固壞死與緊實，但不致肌肉肥大，故選。", "D": "✗ HIFEM 增加肌肉厚度並縮小腹直肌分離，正確。", "E": "✗ 低能量雷射於脂肪細胞形成微孔使脂質外漏，正確。"}, "cite": "待複查（Neligan 非侵入性體雕科技 記憶佐證）", "conflict": ""}, {"id": "5277", "sub": "AE9", "src": "NG", "years": [114, 115], "stem": "Which statement is wrong about the Botulinum toxin injection?", "opts": {"A": "The dose of BoNT-A used should be based on the depth of the rhytid.", "B": "The lower frontalis muscle has the greatest effect on brow elevation.", "C": "As a general rule, injecting depressors more strongly than elevators will tend to give a more gentle lift to the area involved.", "D": "Hyperactivity of the mentalis muscle can lead to a peau d’orange appearance of the chin", "E": "All of the above are wrong."}, "ans": "A", "multi": false, "etype": "ai", "expl": "[NOTE: ⚠**原檔答案字母缺漏**（「答 案：」後直接接出處，無 A-E）。逐字保留，不擅自填補。\n 旁證：本題自身詳解逐項說明 A 錯（劑量依 muscle mass/thickness，非 rhytid 深度）、C 與 D 皆為課本原文正確敘述；\n 且 NG113 Vol II chap1-11 第7題為同一題（選項 D 略有改寫），官方答案為 **A**。\n → **2026-07-10 Jason 人工裁定：採用 A。** 建檔時 ans=A、flag=`答案缺漏-人工補正`、\n conflict 註「原檔答案字母缺漏；依自身詳解及 NG113 同題官方答案 A 補正（Jason 裁定）」。可進練習 App。]\n\nA. 課本提到包含frontalis, masseter等都是以muscle mass, muscle thickness 決定劑量，而非rhytid的深度(P75,80)\n\nB. 額肌 (frontalis) 是唯一的提眉肌(it is the only brow elevator) (P.73)\n\nC. 舉例：注射眉間的降眉肌 (glabellar complex depressors) 可以因為額肌（提眉肌）的作用未受抑制而導致外側眉毛提升(P.76)\n\nD. Loss of mandibular bone and subcutaneous fat, along with hyperactivity of the mentalis muscle, can lead to peau d’orange appearance of the chin (p.81)", "key": "🎯 肉毒桿菌素注射(選錯誤)。正解A為誤述：BoNT-A劑量應依『肌肉質量/厚度(muscle mass/thickness)』決定，而非依皺紋(rhytid)深度。⚠原檔答案字母缺漏，經Jason 2026-07-10依自身詳解及NG113同題官方答案裁定為A。正確敘述：frontalis是唯一提眉肌;強打降眉肌可藉未受抑制之提眉肌產生溫和lift;mentalis過動致下巴peau d'orange外觀。", "peropt": {"A": "✓(正解) 錯誤：BoNT-A劑量依肌肉質量/厚度決定，非依rhytid深度。", "B": "✗ 正確：frontalis(額肌)是唯一的提眉肌，對提眉影響最大。", "C": "✗ 正確：相對強打降肌(depressors)勝於提肌，可產生較溫和的lift。", "D": "✗ 正確：mentalis過動可致下巴呈peau d'orange(橘皮)外觀。", "E": "✗ 非正解：僅A為錯誤敘述，並非全部皆錯。"}, "cite": "原檔詳解", "conflict": "原檔答案字母缺漏；依自身詳解及 NG113 同題官方答案 A 補正（Jason 2026-07-10 裁定） ‖ 跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG112-B04-Q07）"}, {"id": "5278", "sub": "AE4", "src": "NG", "years": [114, 115], "stem": "根據臉部結構分層，下列解剖構造之深度何者異於其他選項？", "opts": {"A": "Premaxillary space", "B": "Lower premasseter space", "C": "Buccal space", "D": "Upper temporal space", "E": "Prezygomatic space"}, "ans": "C", "multi": false, "etype": "ai", "expl": "ABDE均在facial layer 第五層(Deep fascia)之上，惟buccal space 在deep fascia之下。", "key": "🎯 臉部結構分層（選深度異於其他者）：A premaxillary space、B lower premasseter space、D upper temporal space、E prezygomatic space皆位於第五層深筋膜（deep fascia）『之上』的滑動間隙；唯獨C buccal space位於deep fascia『之下』，深度與其他選項不同，故為答案。此類軟組織間隙（soft tissue spaces）概念是現代拉皮避開神經、安全剝離的基礎。", "peropt": {"A": "✗ Premaxillary space位於deep fascia之上，與多數選項同層。", "B": "✗ Lower premasseter space位於deep fascia之上。", "C": "✓(正解) Buccal space位於deep fascia之『下』，深度異於其他選項。", "D": "✗ Upper temporal space位於deep fascia之上。", "E": "✗ Prezygomatic space位於deep fascia之上。"}, "cite": "原檔詳解", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q02）"}, {"id": "5279", "sub": "AE4", "src": "NG", "years": [114, 115], "stem": "下列哪一個Plane在進行face lift時最容易產生lift-lag phenomenon?", "opts": {"A": "Superficial subcutaneous", "B": "Sub-SMAS", "C": "Subperiosteal", "D": "Deep subcutaneous", "E": "All of the above are wrong."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Lift-lag phenomenon指拉皮後因深層固定與軟組織黏彈性，效果『延遲』顯現。以『Subperiosteal』平面剝離（骨膜下）最深、組織重新黏附與消腫最慢，故最易產生lift-lag，答案C。⚠ 此題與NG108-B04-Q06因選項數不同視為不同題，作答勿混用兩年選項。", "peropt": {"A": "✗ Superficial subcutaneous平面淺，較無明顯lift-lag。", "B": "✗ Sub-SMAS平面較subperiosteal淺，lift-lag較不顯著。", "C": "✓(正解) Subperiosteal（骨膜下）平面最深，重新黏附/消腫最慢，最易lift-lag。", "D": "✗ Deep subcutaneous仍屬較淺平面。", "E": "✗ 已有明確答案(C)。"}, "cite": "待複查（Neligan facelift平面 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q06）"}, {"id": "5280", "sub": "AE4", "src": "NG", "years": [114, 115], "stem": "關於facelift，Platysma-SMAS plication(PSP) 和 Minimal access cranial suspension(MACS) 之比較，下列何者錯誤？", "opts": {"A": "PSP之incision為vertical temporal，而MACS 為inverted L", "B": "PSP有neck dissection，而MACS無", "C": "PSP為SMAS-SMAS fixation，而MACS為SMAS-deep temporal fascia", "D": "PSP之vector為vertical，而MACS為cephaloposterior", "E": "PSP 可以達到malar augmentation 的效果，MACS則無"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift：PSP（Platysma-SMAS plication）vs MACS（Minimal Access Cranial Suspension，選『錯誤』者）：向量比較有誤——MACS 以荷包縫線提供『垂直（vertical/cephalad）』向量，PSP 則偏後上斜向；D 稱『PSP vertical、MACS cephaloposterior』為對調，故錯。⚠此題與 NG108-B04-Q07 因『選項數不同』被視為不同題，勿混用記憶。", "peropt": {"A": "✗（依題視為正確）PSP 切口 vertical temporal，MACS 為 inverted L。", "B": "✗（正確）PSP 有 neck dissection，MACS 無。", "C": "✗（正確）PSP 為 SMAS-SMAS fixation，MACS 為 SMAS-deep temporal fascia。", "D": "✓（正解，錯誤敘述）向量對調：MACS 才是 vertical，PSP 偏後上；非題述之配對。", "E": "✗（依題視為正確）PSP 可達 malar augmentation，MACS 則否。"}, "cite": "待複查（Neligan 拉皮術式比較 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG108-B04-Q07）"}, {"id": "5281", "sub": "AE1", "src": "NG", "years": [114, 115], "stem": "Huger 描述 abdominal wall 的 zone of blood supply，下列敘述何者正確? (複選)", "opts": {"A": "Zone I is the midabdomen, fed anteriorly by the vertically orientated deep epigastric arcade.", "B": "Zone II is the lateral abdomen/flanks, fed by six lateral intercostal and four lumbar arteries.", "C": "Zone III is the lower abdomen, fed by the superficial epigastric, superficial external pudendal, and superficial circumflex iliac system.", "D": "In standard abdominoplasty procedures, the cutaneous blood supply of zone III is often disrupted.", "E": "It is crucial to evaluate any preoperative existing scar."}, "ans": "AE", "multi": true, "etype": "ai", "expl": "B. Zone III is the lateral abdomen/flanks, fed by six lateral intercostal and four lumbar arteries.\n\nC. Zone II is the lower abdomen, fed by the superficial epigastric, superficial external pudendal, and superficial circumflex iliac system.\n\nD. In standard abdominoplasty procedures, the cutaneous blood supply of zone I and a main part of zone II is often disrupted. (主要 blood supply 來自留下的 zone III)", "key": "🎯 Huger 腹壁血供分區（正解 AE）：Zone I=中腹，由縱向 deep（superior+inferior）epigastric arcade 供應；Zone II=下腹恥骨上，由 superficial epigastric、superficial external pudendal、superficial circumflex iliac 供應；Zone III=外側腹/腰側，由 intercostal/subcostal/lumbar 供應。B、C 將 Zone II/III 內容互換故錯；D 錯——標準 abdominoplasty 中斷的是 Zone I 及大部分 Zone II，皮瓣主要仰賴保留的 Zone III 血供。E 評估術前既有疤痕正確。⚠此題有跨年（3e vs 5e）數值差異。", "peropt": {"A": "✓ Zone I 為中腹，由縱向 deep epigastric arcade 供應，正確。", "B": "✗ 由 intercostal/lumbar 供應者為 Zone III（外側腹）而非 Zone II，敘述互換錯誤。", "C": "✗ 由 superficial epigastric 等供應者為 Zone II（下腹）而非 Zone III，敘述互換錯誤。", "D": "✗ 標準 abdominoplasty 中斷的是 Zone I 與大部分 Zone II，非 Zone III；皮瓣靠保留的 Zone III 存活。", "E": "✓ 評估術前既有疤痕至關重要，正確。"}, "cite": "原檔詳解", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5282", "sub": "AE3", "src": "NG", "years": [114, 115], "stem": "有關抽脂手術的wetting solution,下列何者為正確? (複選)", "opts": {"A": "做 wetting solution 抽脂，好處包括 hydrodissection, improved hemostasis, and potentially perioperative analgesia 等", "B": "常用的 wetting solution 成份為 lactated Ringer’s solution, normal saline, marcaine, lidocaine and epinephrine", "C": "「即使」在「大容量抽脂」的病患，都要小心 xylocaine 不可超過 7mg/kg", "D": "有肝功能異常的患者, 不會增加 lidocaine 中毒的機會", "E": "有研究指出，epinephrine 使用於局部麻醉時，每個手術的「劑量上限為 15mg」 ; 然而還是要注意，epinephrine 即使在低濃度的情況下，都可能對心血管系統的造成重大影響"}, "ans": "AE", "multi": true, "etype": "ai", "expl": "A: In an effort to reduce blood loss, the practice of infiltrating wetting solutions (saline or lactated Ringer’s (LR) mixture with dilute amounts of epinephrine and lidocaine) was developed. Wetting solutions prior to liposuction provide numerous benefits including hydrodissection, improved hemostasis, and potentially perioperative analgesia.\n\nB (錯誤): Many authors have popularized different variations of these solutions, but most formulations include some variant of near physiologic intravenous fluid (normal saline (NS) or LR), epinephrine, local anesthetic, and more recently, potentially tranexamic acid. Marcaine should be avoided because of its potential cardiac effects and duration of action.\n\nC (錯誤): The traditional recommended maximum dose of lidocaine with epinephrine is 7mg/kg; however, in the liposuction setting, numerous studies have documented the safety of lidocaine in concentrations >35 mg/kg and as high as 55 mg/kg in large-volume cases.\n\nD (錯誤): (Lidocaine 主要藉由肝臟代謝，與 cytochrome P450 相關) First and foremost, the lidocaine absorption rate is extremely variable and dependent on multiple factors including the activity of the cytochrome P450 system, drug interactions, fluids, and concentrations of the drug administered. Medications that tend to increase lidocaine levels include oral contraceptives, beta blockers, and tricyclic antidepressants.\n\nE: Epinephrine toxicity can result in tachycardia, hypertension, and arrhythmias. Many investigators have studied the doses of epinephrine in wetting solutions. The limit of total epinephrine per surgical procedure has been reported to be 15mg. Regardless, it is known that epinephrine, even in small concentrations, may still have a profound effect on the cardiovascular system.", "key": "🎯 抽脂 wetting solution（本題找正確，複選）：正解 AE——A：wetting solution 提供 hydrodissection、improved hemostasis 與周術期止痛等好處；E：epinephrine 每次手術總量上限約 15 mg，且即使低濃度仍可能顯著影響心血管。⚠ 跨年（Neligan 3e vs 5e）題幹數值/敘述有差異。錯誤者：成分應避免 marcaine（心臟毒性長效）（B 錯）；大量抽脂 lidocaine 可遠超 7 mg/kg（達 35–55）（C 錯）；lidocaine 經肝 CYP450 代謝，肝功能異常「會」增中毒（D 錯）。", "peropt": {"A": "✓ Wetting solution 提供 hydrodissection、改善止血與周術期止痛，正確。", "B": "✗ 成分應避免 marcaine（心臟毒性、作用時間長），敘述含 marcaine 有誤，不選。", "C": "✗ 大量抽脂時 lidocaine 可安全超過 7 mg/kg（達 35–55），敘述「不可超過 7」有誤，不選。", "D": "✗ Lidocaine 經肝 CYP450 代謝，肝功能異常會增加中毒，敘述「不會」有誤，不選。", "E": "✓ Epinephrine 每次手術上限約 15 mg，且低濃度仍可能顯著影響心血管，正確。"}, "cite": "原檔詳解", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：A: 105「做wetting solution抽脂，宜在打入solution後7至30分鐘內」 vs 114「做 wetting solution 抽脂，好處包括 hydrodissecti」；E: 105「有研究指出，epinephrine 使用於局部麻醉時，每個手術的劑量為 15mg」 vs 114「有研究指出，epinephrine 使用於局部麻醉時，每個手術的「劑量上限為 1」"}, {"id": "5283", "sub": "AE1", "src": "NG", "years": [114, 115], "stem": "在施行臀部及大腿部的 liposuction 時，下列哪些 “zones of adherence” 必須避免? (複選)", "opts": {"A": "Lateral gluteal depression", "B": "Gluteal crease", "C": "Mid medial thigh", "D": "Upper lateral thigh", "E": "Inferolateral iliotibial tract"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臀部及大腿抽脂應避免的zones of adherence(複選)：lateral gluteal depression、gluteal crease、mid medial thigh、inferolateral(distal) iliotibial tract。此區皮下與深筋膜緊密黏著，抽脂易致contour irregularity。⚠跨年題幹數值/選項有差異;易錯點D『upper lateral thigh』並非adherence zone(正確者為distal/inferolateral IT tract)。", "peropt": {"A": "✓ Lateral gluteal depression為應避免的zone of adherence。", "B": "✓ Gluteal crease為zone of adherence，須避免積極抽脂。", "C": "✓ Mid medial thigh為zone of adherence。", "D": "✗(非答案) Upper lateral thigh並非zone of adherence(正確者為distal iliotibial tract)。", "E": "✓ Inferolateral(distal) iliotibial tract為zone of adherence。"}, "cite": "待複查（Neligan gluteal/thigh zones of adherence 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5284", "sub": "AE11", "src": "NG", "years": [114], "stem": "Which of the following statements is incorrect regarding anatomical and surgical aspects of facial feminization?", "opts": {"A": "The nasolabial angle is generally more acute in females compared to males, with a narrower alar base and increased tip projection.", "B": "The zygomatic bones in the female face are broader with delicate malar eminences, often resulting in a heart-shaped contour.", "C": "A reduction in bigonial width and mandibular angle can be achieved via intraoral access using burr contouring or osteotomies.", "D": "In males, the hairline is typically M-shaped and sits approximately 7–8 cm above the eyebrow midpoint.", "E": "During tracheal shave procedures, endoscopic vocal cord visualization with needle localization can help avoid vocal cord injury."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化（facial feminization，選錯誤者）：A錯誤——女性的nasolabial angle較男性『更鈍（obtuse，約95–105°）』而非更銳，且女性鼻多為窄alar base、鼻尖上翹（增加tip rotation/projection）。正確者：B女性顴骨較寬柔、malar精緻呈心形輪廓；C經口內入路以磨骨/截骨縮小bigonial width與下頜角；D男性髮線多呈M形、約在眉中點上方7–8 cm；E tracheal shave時內視鏡看聲帶並以針定位可避免聲帶損傷。", "peropt": {"A": "✓(正解，即錯誤敘述) 女性nasolabial angle較男性更『鈍』（非更銳）。", "B": "✗ 敘述正確：女性顴骨較寬柔、malar精緻、呈心形輪廓。", "C": "✗ 敘述正確：可經口內入路磨骨/截骨縮小下頜角與bigonial width。", "D": "✗ 敘述正確：男性髮線多呈M形、約在眉中點上方7–8 cm。", "E": "✗ 敘述正確：tracheal shave時內視鏡看聲帶並針定位可避免聲帶損傷。"}, "cite": "待複查（Neligan Facial feminization 記憶佐證）", "conflict": ""}, {"id": "5285", "sub": "AE1", "src": "NG", "years": [115], "stem": "對於大量減重(massive weight loss, MWL)後病人的 abdominal contouring，下列何者錯誤?", "opts": {"A": "若病人有giant pannus(panniculus morbidus)，可以使用特殊的儀器來幫助切除", "B": "腹部和肚臍疝氣在MWL病人中很常見", "C": "Abdominoplasty 主要是一種重建性手術，用來移除腹部皮膚跟脂肪，不伴隨腹壁肌肉 的緊實以及肚臍的重新定位", "D": "Trunk skin and fat 的縱切 (fleur-de-lis abdominoplasty) 可以被用來讓腹部做橫向的緊實", "E": "在genital area or mons可能需要thinning and resuspension"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 大量減重(MWL)後腹部塑形：giant pannus(panniculus morbidus)可用特殊器械協助切除(A對)；腹部與臍疝在MWL常見(B對)；fleur-de-lis（縱切）abdominoplasty用於橫向緊實(D對)；mons/生殖區可能需thinning與resuspension(E對)。選項C錯——abdominoplasty不僅移除皮膚脂肪，通常『包含腹直肌折疊(rectus plication)與肚臍重新定位(umbilical transposition)』，故敘述『不伴隨肌肉緊實與臍重新定位』為錯誤。", "peropt": {"A": "✗ 正確。giant pannus可用特殊器械協助切除。", "B": "✗ 正確。MWL病人腹部與臍疝常見。", "C": "✓(正解，為錯誤敘述) Abdominoplasty通常包含腹直肌折疊與肚臍重新定位，非僅移除皮膚脂肪。", "D": "✗ 正確。fleur-de-lis縱切可做橫向緊實。", "E": "✗ 正確。mons/生殖區可能需thinning與resuspension。"}, "cite": "待複查（Neligan MWL腹部塑形 記憶佐證）", "conflict": ""}, {"id": "5286", "sub": "AE1", "src": "NG", "years": [115], "stem": "Class I Obesity的定義", "opts": {"A": "BMI (kg/m2) <18.5", "B": "BMI (kg/m2) 18.5–24.9", "C": "BMI (kg/m2) 25.0–29.9", "D": "BMI (kg/m2) 30.0–34.9", "E": "BMI (kg/m2) 40.0–49.9"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肥胖 BMI 分級（WHO）：Class I obesity 定義為 BMI 30.0–34.9（D）。完整分級：<18.5 過輕、18.5–24.9 正常、25.0–29.9 過重、30.0–34.9 Class I、35.0–39.9 Class II、≥40 Class III（morbid/severe）。易混淆：勿把 Class I 誤為 25–29.9（過重）或 ≥40（Class III）。", "peropt": {"A": "✗ <18.5 為過輕（underweight）。", "B": "✗ 18.5–24.9 為正常。", "C": "✗ 25.0–29.9 為過重（overweight）。", "D": "✓（正解）30.0–34.9 為 Class I obesity。", "E": "✗ 40.0–49.9 屬 Class III（morbid obesity）。"}, "cite": "待複查（Neligan/W const clampD=d=>Math.min(10,Math.max(1,d));
const clampS=s=>Math.min(36500,Math.max(0.01,s));

// 依「作答對錯＋信心度」推導 FSRS 評級：錯=Again(1)；對+沒把握=Hard(2)；對+普通=Good(3)；對+有把握=Easy(4)

function fsrsReview(p,G,now){

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}

  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
