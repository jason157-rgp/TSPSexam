plate of ethmoid bone", "B": "vomer", "C": "septal cartilage", "D": "crest of maxilla", "E": "perpendicular plate of ethmoid bone"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Nasal septum（鼻中膈）由骨性與軟骨結構組成（複選正確BCDE）：perpendicular plate of ethmoid（篩骨垂直板，後上）、vomer（犁骨，後下）、septal (quadrangular) cartilage（前方四方軟骨）、maxillary crest（上頜嵴，下方）。A錯：cribriform plate of ethmoid（篩板）是前顱底/鼻腔頂部結構，非鼻中膈組成。", "peropt": {"A": "✗ Cribriform plate（篩板）為鼻腔頂/前顱底，非鼻中膈組成。", "B": "✓(正解) Vomer為鼻中膈後下骨性部分。", "C": "✓(正解) Septal cartilage為鼻中膈前方軟骨。", "D": "✓(正解) Maxillary crest為鼻中膈下方骨性支撐。", "E": "✓(正解) Perpendicular plate of ethmoid為鼻中膈後上骨性部分。"}, "cite": "待複查（Neligan 鼻中膈解剖 記憶佐證）", "conflict": ""}, {"id": "5130", "sub": "AE1", "src": "NG", "years": [107], "stem": "Lipoabdominoplasty比 Traditional abdominoplasty 最明顯降低的complication是?", "opts": {"A": "Hematoma", "B": "Seroma", "C": "Epitheliolysis", "D": "Dehiscence", "E": "Thromoembolism"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Lipoabdominoplasty vs Traditional abdominoplasty：因保留 Scarpa's fascia 與穿通枝、減少 undermining 與死腔，最顯著降低的併發症為『seroma（血清腫）』。易混淆：血腫、表皮溶解、裂開、血栓栓塞雖亦可能，但非最明顯下降之項目。", "peropt": {"A": "✗ hematoma 非最顯著下降項。", "B": "✓（正解）保留 Scarpa's fascia/穿通枝顯著降低 seroma。", "C": "✗ epitheliolysis 非主要下降項。", "D": "✗ dehiscence 非最顯著下降項。", "E": "✗ 血栓栓塞非此技術最顯著改善項。"}, "cite": "待複查（Neligan 腹部整形 記憶佐證）", "conflict": ""}, {"id": "5131", "sub": "AE1", "src": "NG", "years": [107], "stem": "Major factors affecting the presentation of massive weight loss patient, except:", "opts": {"A": "Age", "B": "BMI level at presentation", "C": "Fat deposition pattern", "D": "The skin/fat envelope"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 影響大量減重（MWL）病人術前呈現的主要因素為：就診時的 BMI、脂肪堆積型態（fat deposition pattern）、以及皮膚/脂肪包膜（skin/fat envelope）的品質與鬆弛度。年齡（Age）非其列為之主要決定因素，為 except 的答案。", "peropt": {"A": "✓（正解，即 except）Age 非影響 MWL 呈現的主要因素。", "B": "✗ 就診時 BMI 為主要因素。", "C": "✗ 脂肪堆積型態為主要因素。", "D": "✗ 皮膚/脂肪包膜為主要因素。"}, "cite": "待複查（Neligan 大量減重病人評估 記憶佐證）", "conflict": ""}, {"id": "5132", "sub": "AE3", "src": "NG", "years": [107], "stem": "關於micro fat grafting for buttock augmentation，建議不要大於多少 c.c. per buttock?", "opts": {"A": "500 c.c.", "B": "1000 c.c.", "C": "1500 c.c.", "D": "2000 c.c.", "E": "2500 c.c."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 自體脂肪隆臀（gluteal fat grafting）之安全量：建議每側臀部注入「不超過約 1000 c.c.」，以降低脂肪栓塞（fat embolism）等致命併發症風險；並須採 subcutaneous 分層注射、避免進入 gluteus maximus 肌肉層與深部靜脈。故選 B（1000 c.c.）。", "peropt": {"A": "✗ 500 c.c. 過於保守，非建議之上限值。", "B": "✓(正解) 建議每側臀部脂肪移植量不大於約 1000 c.c.。", "C": "✗ 1500 c.c. 超過建議安全上限。", "D": "✗ 2000 c.c. 明顯過量，栓塞風險高。", "E": "✗ 2500 c.c. 遠超安全上限。"}, "cite": "待複查（Neligan 隆臀脂肪移植安全量 記憶佐證）", "conflict": ""}, {"id": "5133", "sub": "AE1", "src": "NG", "years": [107], "stem": "在施行liposuction assisted brachioplasty for upper limb contouring時，arm的\"zones of adherence\"在哪些部位?", "opts": {"A": "Lateral arm and elbow region", "B": "Medial arm and cubital region", "C": "Posterior arm", "D": "All of above", "E": "None of above"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 手臂zones of adherence(輔助抽脂brachioplasty時皮下與深筋膜緊密黏著、應避免積極抽脂處)位於lateral arm與elbow region。此區抽脂易致contour irregularity。易混淆點：medial arm/cubital、posterior arm非典型adherence zone。", "peropt": {"A": "✓(正解) 手臂zones of adherence位於lateral arm與elbow region。", "B": "✗ Medial arm/cubital非典型adherence zone。", "C": "✗ Posterior arm非典型adherence zone。", "D": "✗ 非所有部位皆為adherence zone。", "E": "✗ 確有adherence zone(lateral arm/elbow)，非None。"}, "cite": "待複查（Neligan 手臂zones of adherence 記憶佐證）", "conflict": ""}, {"id": "5134", "sub": "AE1", "src": "NG", "years": [107], "stem": "有關abdominal contouring in the massive weight loss patient，下列何者不正確?", "opts": {"A": "A panniculectomy is aiming to remove redundant skin and fat from the anterior abdominal area including tightening of the abdominal wall musculature.", "B": "Ventral and umbilical hernias are common in the massive weight loss population.", "C": "Fleur-de-lis abdominoplasty includes transverse and vertical resection of tissues.", "D": "All of above", "E": "None of above"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 大量減重（MWL）後腹部塑形（選不正確者）：A錯誤——panniculectomy（贅皮脂肪切除）僅移除下腹多餘皮膚與脂肪，『不包含』腹壁肌肉緊縮（rectus plication），肌肉緊縮屬abdominoplasty範疇。正確者：B MWL族群ventral/umbilical hernia常見；C Fleur-de-lis abdominoplasty含橫向與縱向切除。", "peropt": {"A": "✓(正解，即不正確敘述) panniculectomy不含腹壁肌肉緊縮，該步驟屬abdominoplasty。", "B": "✗ 敘述正確：MWL族群ventral與umbilical hernia常見。", "C": "✗ 敘述正確：Fleur-de-lis abdominoplasty含橫向與縱向組織切除。", "D": "✗ 因A不正確，故非『全部正確』。", "E": "✗ 因確有A為不正確敘述，故非『皆非』。"}, "cite": "待複查（Neligan MWL abdominal contouring 記憶佐證）", "conflict": ""}, {"id": "5135", "sub": "AE11", "src": "NG", "years": [107], "stem": "有關 penile enlargement in male genital aesthetic surgery, 下列何者不正確?", "opts": {"A": "Dartos fascia is continuous with the Scarpa's and Camper's fascias of the lower abdomen.", "B": "The Buck's fascia is highly vascular, it provides an excellent tissue bed for grafts.", "C": "Autologous fat injections into the dartos fascia are still used by some physicians to increase penile thickness.", "D": "Alloderm use for penile girth expansion is inserted in a plane above the Buck's fascia.", "E": "Branches of the superficial external pudendal vessels provide the blood supply to the dartos fascia and skin."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 男性生殖器美容手術之筋膜解剖：dartos fascia延續腹壁Scarpa's/Camper's筋膜（A對）；autologous fat可注入dartos增粗（C對）；AlloDerm置於Buck's fascia『之上（淺層）』的dartos層（D對）；血供來自superficial external pudendal vessels分支（E對）。選項B錯——Buck's fascia為陰莖深筋膜、相對『少血管(avascular)』，並非高度血管化、也非理想的植入物/graft組織床。", "peropt": {"A": "✗ 正確。dartos fascia與腹壁Scarpa's/Camper's筋膜相延續。", "B": "✓(正解，為錯誤敘述) Buck's fascia為相對少血管之深筋膜，非高度血管化、非理想graft床。", "C": "✗ 正確。自體脂肪可注入dartos增粗。", "D": "✗ 正確。AlloDerm置於Buck's fascia之上的平面。", "E": "✗ 正確。superficial external pudendal血管分支供應dartos與皮膚。"}, "cite": "待複查（Neligan 男性私密處手術 記憶佐證）", "conflict": ""}, {"id": "5136", "sub": "AE5", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. 有關cycle of hair growth，下列敘述何者正確? (複選)", "opts": {"A": "The anagen phase lasts 2~6 years.", "B": "Approximately 10% of hair on the scalp is in the anagen phase.", "C": "The catagen phase lasts 2~3 weeks.", "D": "The telogen phase lasts 3~6 months", "E": "Approximately 90% of hair on the scalp is in the telogen phase"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 毛髮生長週期（複選，選『正確』者）：ACD 正確——anagen 2–6 年、catagen 2–3 週、telogen 約 3（–6）個月。錯誤點：頭皮約『85–90%』毛髮處於 anagen（非 10%，B 錯）；約『10%』處於 telogen（非 90%，E 錯）。易混淆：B、E 之百分比被對調。", "peropt": {"A": "✓ anagen（生長期）2–6 年。", "B": "✗ 約 85–90% 處於 anagen，非 10%。", "C": "✓ catagen（退行期）2–3 週。", "D": "✓ telogen（休止期）約 3–6 個月。", "E": "✗ 僅約 10% 處於 telogen，非 90%。"}, "cite": "待複查（Neligan 毛髮生理 記憶佐證）", "conflict": ""}, {"id": "5137", "sub": "AE1", "src": "NG", "years": [107], "stem": "複選2. 在施行臀部及大腿部的liposuction時，下列哪些 \"zones of adherence\" 必須避免? (複選)", "opts": {"A": "Lateral gluteal depression", "B": "Gluteal crease", "C": "Mid medial thigh.", "D": "Upper lateral thigh", "E": "Inferolateral iliotibial tract"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臀部/大腿抽脂須避開之 zones of adherence：gluteal crease、lateral gluteal depression、mid medial thigh、distal（inferolateral）iliotibial tract、distal posterior thigh。本題正解 ABCE；『upper lateral thigh』並非黏著區，可安全抽脂。⚠此題有跨年（Neligan 3e vs 5e）數值/區域描述差異，作答時以概念為主。", "peropt": {"A": "✓ Lateral gluteal depression 為黏著區，須避開。", "B": "✓ Gluteal crease 為黏著區。", "C": "✓ Mid medial thigh 為黏著區。", "D": "✗ Upper lateral thigh 非黏著區，可安全抽脂。", "E": "✓ Inferolateral（distal）iliotibial tract 為黏著區。"}, "cite": "待複查（Neligan zones of adherence 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5138", "sub": "AE1", "src": "NG", "years": [107], "stem": "複選3. Huger描述abdominal wall的 zone of blood supply，下列敘述何者正確? (複選)", "opts": {"A": "Zone I is the midabdomen, fed anteriorly by the vertically orientated deep epigastric arcade.", "B": "Zone II is the lateral abdomen/flanks, fed by six lateral intercostal and four lumbar arteries.", "C": "Zone III is the lower abdomen, fed by the superficial epigastric, superficial external pudendal, and superficial circumflex iliac system.", "D": "In standard abdominoplasty procedures, the cutaneous blood supply of zone III is often disrupted.", "E": "It is crucial to evaluate any preoperative existing scar."}, "ans": "AE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Huger 腹壁血流三分區：Zone I＝中腹部，由垂直走向之深上/下腹壁動脈弓（deep epigastric arcade）供應（A 對）；Zone II＝下腹/恥骨上，由 superficial epigastric、superficial external pudendal、superficial circumflex iliac 供應；Zone III＝側腹/腰側，由肋間與腰動脈供應。⚠ 跨年（Neligan 3e vs 5e）分區數值/敘述略有出入，須以概念判讀。標準腹部整形切斷的是 Zone II（deep inferior epigastric perforators），故「Zone III 常被切斷」錯誤。", "peropt": {"A": "✓ Zone I 為中腹部、由垂直深腹壁動脈弓供應，正確。", "B": "✗ 由肋間＋腰動脈供應的側腹是 Zone III，非 Zone II，敘述錯誤故不選。", "C": "✗ 由 superficial epigastric/pudendal/circumflex iliac 供應的下腹是 Zone II，非 Zone III，錯誤故不選。", "D": "✗ 標準腹部整形切斷的是 Zone II（深下腹壁穿支）之皮膚血供，非 Zone III，錯誤故不選。", "E": "✓ 術前務必評估既有疤痕（可能已破壞血供分區），正確。"}, "cite": "待複查（Neligan 腹壁 Huger 血流分區 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：題幹數值不同"}, {"id": "5139", "sub": "AE10", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. 有關facial nerve 下列敘述何者錯誤? (複選)", "opts": {"A": "Marginal mandibular branch和其他facial nerve branches 有很多cross innervation 所以受傷後容易恢復", "B": "可以利用Pitanguy's line來輔助定位zygomatic branch的走向", "C": "Frontal (temporal) branch 的走向深度在above the zygomatic arch的位置上是比deep temporal fascia 淺", "D": "Buccal branch和 parotid duct在同個plane", "E": "facial nerve是純運動神經，支配顏面表情"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經敘述(複選選錯誤)。正解ABE為誤述：Marginal mandibular branch交通支『少』、受傷後恢復差(非多cross innervation易恢復);Pitanguy line定位的是frontal(temporal) branch而非zygomatic;facial nerve並非純運動——尚含味覺、副交感(淚腺/唾液)成分。正確敘述(C、D)不選：C frontal branch在zygomatic arch上方走行較deep temporal fascia淺;D buccal branch與parotid duct同平面。", "peropt": {"A": "✓(屬答案) 錯誤：marginal mandibular branch交通支少、受傷後恢復『不』佳。", "B": "✓(屬答案) 錯誤：Pitanguy line用於定位frontal(temporal) branch，非zygomatic branch。", "C": "✗(非答案) 正確：zygomatic arch上方frontal branch走行較deep temporal fascia淺(在TPF/SMAS內)。", "D": "✗(非答案) 正確：buccal branch與parotid duct走行於同一平面。", "E": "✓(屬答案) 錯誤：facial nerve並非純運動，尚含味覺與副交感(淚腺/唾液)纖維。"}, "cite": "待複查（Neligan 顏面神經解剖 記憶佐證）", "conflict": ""}, {"id": "5140", "sub": "AE9", "src": "NG", "years": [108], "stem": "關於肉毒桿菌素，下列何者錯誤？", "opts": {"A": "施打肉毒桿菌素，最重要的是注意其functional antomy.", "B": "施打肉毒桿菌素之劑量，應以皺紋深度作為主要評估依據，而不是以肌肉質量大小。", "C": "過度施打於Mentalis部位可能造成oral incompetence", "D": "將BoNT-A施打於glabellar rhytids及lateral canthal line以外的地方，是屬於off-label use"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素（選錯誤者）：B錯誤——施打劑量應依『肌肉質量/肌力』評估，而非皺紋深度為主要依據。正確者：A功能性解剖（functional anatomy）最重要；C mentalis過度施打可致oral incompetence（下唇閉合不全）；D施打於glabellar rhytids與lateral canthal line以外部位屬off-label use。", "peropt": {"A": "✗ 敘述正確：施打肉毒最重要的是掌握functional anatomy。", "B": "✓(正解，即錯誤敘述) 劑量應依肌肉質量/肌力評估，而非以皺紋深度為主。", "C": "✗ 敘述正確：mentalis過量可致oral incompetence。", "D": "✗ 敘述正確：glabella與lateral canthal line以外之施打屬off-label。"}, "cite": "待複查（Neligan Botulinum toxin 記憶佐證）", "conflict": ""}, {"id": "5141", "sub": "AE4", "src": "NG", "years": [108], "stem": "根據臉部結構分層，下列解剖構造之深度何者異於其他選項？", "opts": {"A": "Premaxillary space", "B": "Lower premasseter space", "C": "Buccal space", "D": "Upper temporal space"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部分層與『深層滑動空間(deep facial spaces)』概念：premaxillary space、premasseter spaces（含lower premasseter）、temporal spaces（含upper temporal space）皆屬SMAS/表情肌之『深面』的滑動間隙。唯Buccal space（頰間隙，內含buccal fat pad）位於更深、屬masticatory/deep midface層，深度異於其他選項，故答案C。⚠ 此題與NG114-B04-Q03因選項數不同視為不同題，作答時勿混用兩年選項。", "peropt": {"A": "✗ Premaxillary space屬深層滑動空間，與其他sub-SMAS空間同層。", "B": "✗ Lower premasseter space屬premasseter深層滑動空間。", "C": "✓(正解) Buccal space（含buccal fat pad）位於更深的咀嚼/深中臉層，深度異於其他。", "D": "✗ Upper temporal space屬顳部深層滑動空間。"}, "cite": "待複查（Neligan 臉部深層空間 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG114-B04-Q03）"}, {"id": "5142", "sub": "AE6", "src": "NG", "years": [108], "stem": "Mckinney's point為 X nerve之landmark，其位在 Y 之下 Z cm處.", "opts": {"A": "X: lesser occipital Y: ear lobe. Z:7.5", "B": "X: great auricular. Y: external auditory canal Z:6.5", "C": "X: lesser occipital Y: mastoid process Z:3", "D": "X: great auricular Y: ear lobe Z:7.5"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 McKinney's point：為 great auricular nerve 的體表定位標記，位於『external auditory canal 下方約 6.5cm』的胸鎖乳突肌腹上（B 正確）。臨床意義：facelift/頸部剝離於此區易傷 great auricular nerve（最常受傷之感覺神經）。易混淆：勿與 lesser occipital nerve 或 ear lobe 為基準之錯誤配對混淆。", "peropt": {"A": "✗ 神經與基準/距離配對錯誤（lesser occipital、ear lobe、7.5）。", "B": "✓（正解）great auricular nerve，位於 EAC 下方 6.5cm。", "C": "✗ 基準（mastoid）與距離（3cm）配對錯誤。", "D": "✗ 基準（ear lobe）與距離（7.5cm）配對錯誤。"}, "cite": "待複查（Neligan McKinney's point 記憶佐證）", "conflict": ""}, {"id": "5143", "sub": "AE10", "src": "NG", "years": [108], "stem": "下列哪些肌肉，其神經支配方式是由表層支配？(複選)", "opts": {"A": "mentalis", "B": "levator labi superioris", "C": "masseter", "D": "levator anguli oris", "E": "buccinator"}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部表情肌多由『深面』接受顏面神經支配；唯三塊位於較深層的肌肉——mentalis、levator anguli oris、buccinator——由『表淺層/淺面』接受神經支配。故正解 ADE。masseter 屬咀嚼肌（三叉神經支配，非顏面神經）；levator labii superioris 為淺層肌，由深面受支配。⚠此題與 NG109-B04-Q05 為選項重排家族，記概念勿背字母。", "peropt": {"A": "✓ Mentalis 由表淺面受支配。", "B": "✗ Levator labii superioris 為淺層肌、由深面受支配。", "C": "✗ Masseter 為咀嚼肌，受三叉神經支配，非此類。", "D": "✓ Levator anguli oris 由表淺面受支配。", "E": "✓ Buccinator 由表淺面受支配。"}, "cite": "待複查（Neligan 臉部肌肉神經支配層次 記憶佐證）", "conflict": "選項重排家族：與 NG109-B04-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5144", "sub": "AE6", "src": "NG", "years": [108], "stem": "下列關於plastysma之描述何者正確？(複選)", "opts": {"A": "Platysma 為pure subcutaneous muscle，沒有bony attachment", "B": "傷害到marginal mandibular branch會造成platysma無力，出現Pseudoparalysis of lower lip", "C": "Platysma auricular fascia 即為platysma auricular ligament/parotid cutaneous ligament，覆蓋在Parotid gland表面", "D": "Platysma和deep cervical fascia fusing在一起，為cervical retaning ligament", "E": "相較於傳統face lifting對plastysma產生的lateral vector，可另外透過submental incision 來產生medial vector，加強jawline的表現。"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Platysma 解剖與臉/頸年輕化（本題找正確，複選）：platysma auricular fascia＝platysma auricular ligament/parotid cutaneous ligament，覆於腮腺表面（C 對）；platysma 與 deep cervical fascia 融合形成 cervical retaining ligament（D 對）；相對傳統拉皮之外側向量，可經 submental 切口做 medial vector（corset platysmaplasty）強化 jawline（E 對）。錯誤者：platysma 有下頜骨附著、非「純皮下無骨附著」（A 錯）；下唇 pseudoparalysis 的解剖混淆與 cervical/marginal mandibular 支配歸屬（B 錯）。", "peropt": {"A": "✗ Platysma 部分纖維附著於下頜骨，非「純皮下、無任何骨附著」，敘述錯誤故不選。", "B": "✗ 下唇 pseudoparalysis 之敘述（歸因方式）有誤，故不選。", "C": "✓ Platysma auricular fascia 即 parotid cutaneous ligament，覆於腮腺表面，正確。", "D": "✓ Platysma 與 deep cervical fascia 融合為 cervical retaining ligament，正確。", "E": "✓ 經 submental 切口可產生 medial vector 強化下顎線，正確。"}, "cite": "待複查（Neligan platysma/頸部年輕化 記憶佐證）", "conflict": ""}, {"id": "5145", "sub": "AE4", "src": "NG", "years": [108], "stem": "下列哪一個Plane在進行face lift時最容易產生lift-lag phenomenon?", "opts": {"A": "Superficial subcutaneous", "B": "Sub-SMAS", "C": "Subperiosteal", "D": "Deep subcutaneous"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮平面中最易出現lift-lag phenomenon(提拉後因深層剝離致長時間水腫、恢復延遲)者為subperiosteal plane。骨膜下剝離範圍深廣、組織水腫消退慢，臨床上表現為術後長時間的『提拉落差』。⚠跨年選項數不同(對照NG114-B04-Q04)，視為不同題，勿混字母。", "peropt": {"A": "✗ Superficial subcutaneous淺層剝離，水腫恢復快，較不易lift-lag。", "B": "✗ Sub-SMAS平面恢復較subperiosteal快。", "C": "✓(正解) Subperiosteal平面剝離深廣、水腫消退慢，最易出現lift-lag phenomenon。", "D": "✗ Deep subcutaneous仍屬相對淺層，較不易lift-lag。"}, "cite": "待複查（Neligan 拉皮平面 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG114-B04-Q04）"}, {"id": "5146", "sub": "AE4", "src": "NG", "years": [108], "stem": "關於facelift，Platysma-SMAS plication(PSP) 和 Minimal access cranial suspension(MACS) 之比較，下列何者錯誤？", "opts": {"A": "PSP之incision為vertical temporal，而MACS 為inverted L", "B": "PSP有neck dissection，而MACS無", "C": "PSP為SMAS-SMAS fixation，而MACS為SMAS-deep temporal fascia", "D": "PSP之vector為vertical，而MACS為cephaloposterior"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮術式比較（PSP vs MACS，選錯誤者）：D錯誤——兩者的提拉向量被對調；MACS（minimal access cranial suspension）採用近『垂直/向頭側（cephalad）』的荷包縫合懸吊向量，PSP（platysma-SMAS plication）則偏向後上（posterosuperior），故D把向量描述反了。其餘A（切口型態）、B（PSP含頸部剝離）、C（固定方式）依本題為正確對照。⚠ 跨年此題選項數不同，須視為不同題（對照NG114-B04-Q08），記概念勿背字母。", "peropt": {"A": "✗ 依本題為正確對照（切口型態描述）。", "B": "✗ 依本題為正確對照（頸部剝離之有無）。", "C": "✗ 依本題為正確對照（SMAS固定方式）。", "D": "✓(正解，即錯誤敘述) 提拉向量對調——MACS偏垂直/向頭側，PSP偏後上，敘述反了。"}, "cite": "待複查（Neligan Facelift MACS/PSP 記憶佐證）", "conflict": "跨年選項數不同，視為不同題（對照 NG114-B04-Q08）"}, {"id": "5147", "sub": "AE4", "src": "NG", "years": [108], "stem": "針對各種facelift方式之描述，下列何者正確？(複選)", "opts": {"A": "在Platysma-SMAS plication (PSP)中，SMAS的key suture可以產生malar auto-augmentation的作用", "B": "extended Minimal access cranial suspension (MACS) 較傳統MACS多了platysma的vertical loop fixation.", "C": "extended SMAS dissection中，SMAS和skin flap可以有不同的fixation vector.", "D": "high SMAS technique中，主要使用zygomatic minor當作 depth marker以鬆解 investing fascia.", "E": "Subperiosteal midface lift時有可能傷及infra-orbital nerve及zygomatic branches of the facial nerve.."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 各式facelift重點（複選正確為ACE）：PSP的SMAS key suture可產生malar auto-augmentation（A對）；extended SMAS剝離中SMAS與skin flap可採不同fixation vector（C對）；subperiosteal midface lift可能傷及infraorbital nerve與zygomatic branches（E對）。B錯：extended MACS相較傳統MACS是多了『第三條malar loop』而非platysma的vertical loop。D錯：high SMAS technique以『zygomaticus major』作為depth marker以鬆解investing fascia，非zygomaticus minor。", "peropt": {"A": "✓(正解) PSP的SMAS key suture可達malar auto-augmentation。", "B": "✗ extended MACS多的是第三條malar purse-string loop，非platysma vertical loop。", "C": "✓(正解) extended SMAS中SMAS與skin flap可用不同fixation vector。", "D": "✗ high SMAS以zygomaticus major（非minor）作depth marker。", "E": "✓(正解) subperiosteal midface lift可能傷及infraorbital nerve與zygomatic branches。"}, "cite": "待複查（Neligan facelift技術 記憶佐證）", "conflict": ""}, {"id": "5148", "sub": "AE10", "src": "NG", "years": [108], "stem": "下列敘述何者錯誤?", "opts": {"A": "lateral orbicularis oculi 主要可以降低lateral brow", "B": "frontalis muscle 收縮時，下三分之一最為明顯", "C": "temporal branch of facial nerve跨過zygomatic arch的middle third", "D": "vertical frowning line是由procerus 收縮造成"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 表情肌與神經（選『錯誤』者）：垂直的眉間紋（vertical frowning/glabellar lines，即『11 字紋』）由 corrugator supercilii 收縮造成，非 procerus；procerus 造成鼻根『水平』橫紋，故 D 錯。易混淆：lateral orbicularis oculi 下拉外側眉；顳枝跨過顴弓中三分之一。", "peropt": {"A": "✗（正確）外側眼輪匝肌下拉外側眉。", "B": "✗（正確）frontalis 收縮以下三分之一最明顯。", "C": "✗（正確）顳枝跨過顴弓中三分之一。", "D": "✓（正解，錯誤敘述）垂直眉間紋由 corrugator 造成，procerus 造成水平鼻根紋。"}, "cite": "待複查（Neligan 表情肌解剖 記憶佐證）", "conflict": ""}, {"id": "5149", "sub": "AE2", "src": "NG", "years": [108], "stem": "有關surgical zones of the eyelids and periocular structure，下列何者錯誤？", "opts": {"A": "Zone II: upper eyelid", "B": "Zone III: medial canthal structure", "C": "Zone IV: lateral canthal structure", "D": "Zone V: Glabella"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 眼瞼/眼周手術分區：Zone I = upper eyelid、Zone II = lower eyelid、Zone III = medial canthal structure、Zone IV = lateral canthal structure、Zone V = glabella/brow 區。故『Zone II: upper eyelid』錯誤（上眼瞼為 Zone I）。", "peropt": {"A": "✓（正解，即錯誤敘述）Zone II 應為 lower eyelid；upper eyelid 為 Zone I。", "B": "✗ Zone III 為 medial canthal structure，正確。", "C": "✗ Zone IV 為 lateral canthal structure，正確。", "D": "✗ Zone V 為 glabella 區，正確。"}, "cite": "待複查（Neligan 眼瞼手術分區 記憶佐證）", "conflict": ""}, {"id": "5150", "sub": "AE4", "src": "NG", "years": [108], "stem": "關於facelift相關的神經何者錯誤?", "opts": {"A": "great auricular nerve為純感覺神經", "B": "McKinney's point是great auricular nerve最表淺而容易受傷的位置", "C": "顏面神經的zygomatic branch和cervical branch和其餘分支較無交通支相連，一旦受 [108, 110, 114], "stem": "Overweight的定義", "opts": {"A": "BMI (kg/m2) <18.5", "B": "BMI (kg/m2) 18.5–24.9", "C": "BMI (kg/m2) 25.0–29.9", "D": "BMI (kg/m2) 30.0–34.9", "E": "BMI (kg/m2) 40.0–49.9"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 WHO的BMI分級須熟記：<18.5過輕；18.5–24.9正常；25.0–29.9『Overweight（過重）』；30.0–34.9肥胖class I；35–39.9 class II；≥40 class III。故Overweight定義為BMI 25.0–29.9，答案C。", "peropt": {"A": "✗ <18.5為underweight（過輕）。", "B": "✗ 18.5–24.9為normal（正常）。", "C": "✓(正解) 25.0–29.9為overweight（過重）。", "D": "✗ 30.0–34.9為obesity class I。", "E": "✗ 40.0–49.9為obesity class III（重度）。"}, "cite": "待複查（WHO BMI分級 記憶佐證）", "conflict": ""}, {"id": "5166", "sub": "AE1", "src": "NG", "years": [108], "stem": "在執行brachioplasty.手術時，需避免傷到什麼神經?", "opts": {"A": "anterior brachial cutaneous nerve", "B": "medial brachial cutaneous nerves", "C": "posterior brachial cutaneous nerves", "D": "Medial antebrachial cutaneous", "E": "All of above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty 須避免傷及之神經：包含 anterior brachial cutaneous、medial brachial cutaneous、posterior brachial cutaneous、medial antebrachial cutaneous，故『以上皆是（E）』。臨床重點：其中 MABC（medial antebrachial cutaneous）最常受傷，致前臂內側/尺側麻木。", "peropt": {"A": "✗ 為須避免之一，非唯一答案。", "B": "✗ 為須避免之一，非唯一答案。", "C": "✗ 為須避免之一，非唯一答案。", "D": "✗ MABC 最常受傷，但非唯一。", "E": "✓（正解）上述神經皆須避免（其中 MABC 最常受傷）。"}, "cite": "待複查（Neligan brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5167", "sub": "AE3", "src": "NG", "years": [108], "stem": "除了傳統抽脂之外，還有什麼其他Energy-based devices可以用在body contouring? (複選)", "opts": {"A": "Laser-assisted liposuction", "B": "Ultrasound-assisted liposuction", "C": "Cryolipolysis", "D": "High-intensity focused ultrasound", "E": "Radiofrequency"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 除傳統抽脂外，body contouring 之 energy-based devices 包含：Laser-assisted liposuction (LAL)、Ultrasound-assisted liposuction (UAL)、Cryolipolysis（冷凍溶脂）、High-intensity focused ultrasound (HIFU)、Radiofrequency (RF)。五者皆屬之。⚠此題與 NG110-B06-Q08、NG115-B07-Q12 為選項重排家族。", "peropt": {"A": "✓ Laser-assisted liposuction 為 energy-based device。", "B": "✓ Ultrasound-assisted liposuction 為 energy-based device。", "C": "✓ Cryolipolysis（冷凍溶脂）為 energy-based device。", "D": "✓ HIFU 為 energy-based device。", "E": "✓ Radiofrequency 為 energy-based device。"}, "cite": "待複查（Neligan energy-based body contouring 記憶佐證）", "conflict": "選項重排家族：與 NG110-B06-Q08 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 NG115-B07-Q12 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5168", "sub": "AE11", "src": "NG", "years": [108, 109], "stem": "下列關於陰莖解剖構造及陰莖增大術(Penile lengthening)何者正確? (複選)", "opts": {"A": "陰莖的皮膚沒有毛髮", "B": "陰莖的皮膚下沒有脂肪", "C": "可以分離suspensory ligament of the penis", "D": "可以使用VY advancement flap手術", "E": "suprapubic lipectomy是手術的選擇之一"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 陰莖解剖與增長術（本題全對，選 ABCDE）：陰莖遠端皮膚無毛；皮下「無脂肪層」（loose areolar，dartos-like）；增長術可鬆解 suspensory ligament of penis 使懸吊點下移增顯露長度；可用恥骨下皮膚 VY advancement flap；並可合併 suprapubic lipectomy 去除恥骨上脂肪墊。五項皆正確。", "peropt": {"A": "✓ 陰莖（遠端）皮膚無毛髮，正確。", "B": "✓ 陰莖皮下無脂肪層，正確。", "C": "✓ 可鬆解 suspensory ligament 以增顯露長度，正確。", "D": "✓ 可用 VY advancement flap，正確。", "E": "✓ Suprapubic lipectomy 為手術選項之一，正確。"}, "cite": "待複查（Neligan 陰莖增長術 記憶佐證）", "conflict": ""}, {"id": "5169", "sub": "AE9", "src": "NG", "years": [109, 111], "stem": "關於皮下注射填充物(filler)的敘述，下列何者為非？", "opts": {"A": "常見的不良反應，包括皮膚腫塊、疼痛、血腫瘀青、注射部位不平整等。", "B": "玻尿酸具有強力的親水性，1公克的玻尿酸約可吸附6公升的水分。", "C": "玻尿酸仍有可能引起過敏，發生率約為0.03%。", "D": "產生皮膚腫塊時，治療方式包括局部按摩，類固醇注射或是局部切除。", "E": "玻尿酸注射於真皮層時若過於表淺，可能產生reddish discoloration (Tyndall effect)。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 皮下填充劑(選錯誤/非)。正解E為誤述：HA注射過淺產生的Tyndall effect為『bluish(藍色)』而非reddish(紅色)。正確敘述：常見腫塊/疼痛/瘀青/不平整;1g HA可吸附約6L水;HA過敏率約0.03%;腫塊處理含按摩、類固醇、局部切除。", "peropt": {"A": "✗ 正確：常見不良反應含腫塊、疼痛、瘀青、注射處不平整。", "B": "✗ 正確：HA強親水，1g約可吸附6L水。", "C": "✗ 正確：HA過敏發生率約0.03%。", "D": "✗ 正確：腫塊處理含局部按摩、類固醇注射、局部切除。", "E": "✓(正解) 錯誤：過淺注射的Tyndall effect為藍色(bluish)非紅色(reddish)。"}, "cite": "待複查（Neligan 填充劑 記憶佐證）", "conflict": ""}, {"id": "5170", "sub": "AE9", "src": "NG", "years": [109], "stem": "關於肉毒桿菌毒素(botulinum toxin)的敘述，下列何者正確？", "opts": {"A": "Clostridium difficile可製造多種肉毒桿菌毒素，其中已被作為醫療製劑的為toxin types A and B。", "B": "BoNT‐B 比起 BoNT‐A，能更快的產生效用，持續時間較短，注射處較不疼痛。", "C": "施打肉毒桿菌素之劑量，應以皺紋深度作為主要評估依據，而非肌肉質量大小。", "D": "針對Lambert–Eaton myasthenic syndrome及Myasthenia gravis病患，肉毒桿菌素之注射為禁忌症。", "E": "不同種類的肉毒桿菌毒素製劑，達到相同效果的劑量均相同。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素（選正確者）：D正確——Lambert–Eaton myasthenic syndrome與Myasthenia gravis等神經肌肉接合處疾病為肉毒注射禁忌症（會加重肌無力）。錯誤者：A應為Clostridium botulinum（非difficile）；B BoNT-B起效快、持續短，但注射『較痛』（酸性pH），非較不痛；C劑量依肌肉質量而非皺紋深度；E不同製劑之單位『不可等量互換』（如onabotulinumtoxinA與abobotulinumtoxinA換算不同）。", "peropt": {"A": "✗ 產毒菌為Clostridium botulinum，非C. difficile。", "B": "✗ BoNT-B注射較『痛』（酸性），非較不痛。", "C": "✗ 劑量依肌肉質量/肌力，非皺紋深度。", "D": "✓(正解) 對LEMS與myasthenia gravis病患，肉毒注射為禁忌。", "E": "✗ 不同肉毒製劑單位不可等量互換。"}, "cite": "待複查（Neligan Botulinum toxin 記憶佐證）", "conflict": ""}, {"id": "5171", "sub": "AE5", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於雷射治療的敘述，下列何者正確? (複選)", "opts": {"A": "Fitzpatrick skin type I and II，膚色越淺的人種，接受雷射治療後更容易產生非預期性的hyper-pigmentation。", "B": "飛梭(fractional)雷射相較於傳統磨皮(ablative)雷射，對於表層皮膚的傷害較低，恢復期也較短。", "C": "臉部出現感染或是開放性傷口，依然可以接受雷射治療。", "D": "深層的真皮層色素病變如Nevi of Ota, 最適合用脈衝染料雷射(pulse dye laser)進行治療。", "E": "波長755nm的亞歷山大雷射(Alexandrite laser),可用於去除刺青, 去除毛髮等治療。"}, "ans": "BE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 雷射治療觀念（複選正確為BE）：fractional（飛梭）雷射僅造成微柱狀傷害、周圍組織完整故對表層傷害較低、恢復期較短（B對）；755nm Alexandrite laser可用於除刺青與除毛（E對）。A錯：膚色越『深』（Fitzpatrick III–VI）者雷射後越易hyperpigmentation。C錯：臉部感染或開放性傷口為雷射『禁忌』。D錯：深層真皮色素病變如Nevus of Ota最適合Q-switched Nd:YAG(1064nm)，而非pulsed dye laser。", "peropt": {"A": "✗ 膚色越『深』者雷射後越易hyperpigmentation，非淺膚色。", "B": "✓(正解) 飛梭雷射對表層傷害較低、恢復期較短。", "C": "✗ 臉部感染/開放傷口為雷射禁忌，不可施打。", "D": "✗ Nevus of Ota應用Q-switched Nd:YAG(1064nm)，非pulsed dye laser。", "E": "✓(正解) 755nm Alexandrite可用於除刺青、除毛。"}, "cite": "待複查（Neligan 雷射治療 記憶佐證）", "conflict": ""}, {"id": "5172", "sub": "AE10", "src": "NG", "years": [109], "stem": "關於臉部老化的敘述,下列何者正確？", "opts": {"A": "Platysma完全沒有下顎骨(mandible)的附著點, 因此受老化的影響有限。", "B": "老化的過程包含皮膚,皮下組織,肌肉及骨骼的萎縮,但眼眶骨(orbital rim)不受影響。", "C": "眉毛在老化的過程,因為frontalis muscle的收縮作用,外側眉毛的高度會逐漸上升。", "D": "Tear trough, zygomatic and mandibular ligament等osteo-cutaneous ligament,在老化的過程會逐漸鬆弛。", "E": "上顎骨(maxilla)因老化而內縮，會使淚溝(tear trough)及法令紋(nasolabial fold)更不明顯。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部老化（選『正確』者）：Tear trough、zygomatic、mandibular 等 osteo-cutaneous ligaments 隨老化逐漸鬆弛，致組織下垂（D 正確）。錯誤點：platysma『有』下顎附著、受老化影響（A 錯）；眶緣（orbital rim）『會』隨老化擴大（B 錯）；外側眉隨老化『下降』非上升（C 錯）；上顎後縮使 tear trough/法令紋『更明顯』（E 錯）。", "peropt": {"A": "✗ platysma 有下顎附著，受老化影響。", "B": "✗ 眶緣會隨老化擴大/後退，非不受影響。", "C": "✗ 老化外側眉高度下降，非上升。", "D": "✓（正解）osteo-cutaneous ligaments 隨老化鬆弛致下垂。", "E": "✗ 上顎後縮使 tear trough/法令紋更明顯。"}, "cite": "待複查（Neligan 臉部老化 記憶佐證）", "conflict": ""}, {"id": "5173", "sub": "AE10", "src": "NG", "years": [109, 111, 114, 115], "stem": "下列哪些臉部肌肉，其顏面神經支配路徑是由肌肉的表淺層進入？(複選)", "opts": {"A": "Mentalis.", "B": "Masseter.", "C": "Levator labi superioris.", "D": "Levator anguli oris.", "E": "Buccinator."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部表情肌多由深面受顏面神經支配；由『淺面/表淺層』進入者僅三塊深層肌：mentalis、levator anguli oris、buccinator（正解 ADE）。masseter 屬咀嚼肌（三叉神經）；levator labii superioris 為淺層肌由深面受支配。⚠此題與 NG108-B04-Q04 為選項重排家族，字母對應不同，記概念勿背字母。", "peropt": {"A": "✓ Mentalis 由淺面受支配。", "B": "✗ Masseter 為咀嚼肌，三叉神經支配，非此類。", "C": "✗ Levator labii superioris 為淺層肌、由深面受支配。", "D": "✓ Levator anguli oris 由淺面受支配。", "E": "✓ Buccinator 由淺面受支配。"}, "cite": "待複查（Neligan 臉部肌肉神經支配層次 記憶佐證）", "conflict": "選項重排家族：與 NG108-B04-Q04 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5174", "sub": "AE4", "src": "NG", "years": [109], "stem": "臉部拉皮(facelift)手術後,下列何者為傷口旁禿頭(alopecia)最常見的原因？", "opts": {"A": "血腫", "B": "感染", "C": "抽菸", "D": "傷口過度的張力", "E": "顏面神經損傷"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮術後「切口旁禿頭（alopecia）」最常見原因為「傷口張力過大（excessive wound tension）」——毛囊在高張力下缺血受損；而非血腫或感染。設計時應以 SMAS 承擔張力、皮膚無張力關閉並保護毛囊方向以預防。", "peropt": {"A": "✗ 血腫可致皮瓣問題，但非切口旁禿頭最常見原因。", "B": "✗ 感染少見，非主因。", "C": "✗ 抽菸增加壞死風險，但禿頭主因仍為張力。", "D": "✓(正解) 傷口張力過大致毛囊缺血，為切口旁禿頭最常見原因。", "E": "✗ 顏面神經損傷與禿頭無關。"}, "cite": "待複查（Neligan facelift alopecia 記憶佐證）", "conflict": ""}, {"id": "5175", "sub": "AE4", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於各種臉部拉皮(facelift)手術方式敘述，下列何者正確？(複選)", "opts": {"A": "Platysma-SMAS plication (PSP)，位於中臉的key suture,可以產生malar auto-augmentation的作用。", "B": "Extended Minimal access cranial suspension (MACS) 較傳統MACS多了malar fat pad的拉提", "C": "Extended SMAS technique, SMAS和skin分開剝離形成dual plane,可以根據需求往不同方向進行拉提", "D": "High SMAS technique, SMAS flap的上緣不可高於zygomatic arch,以免傷害顏面神經", "E": "Subperiosteal facelift,過程中可能傷害infra-orbital nerve及zygomatic branches of the facial nerve."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 各式拉皮術式(複選選正確)。正解ABCE：PSP為中臉key suture可產生malar auto-augmentation;Extended MACS較傳統MACS多malar fat pad拉提;Extended SMAS採SMAS與skin分離的dual plane可多向量拉提;Subperiosteal facelift可能傷及infraorbital nerve與zygomatic branch。易錯點D：High SMAS technique的SMAS flap上緣本就可設於zygomatic arch之『上』(這正是high的意義)，故『不可高於zygomatic arch』的敘述錯誤。", "peropt": {"A": "✓ 正確：PSP為中臉key suture，可產生malar auto-augmentation。", "B": "✓ 正確：Extended MACS較傳統MACS多了malar fat pad的拉提。", "C": "✓ 正確：Extended SMAS採dual plane(SMAS與皮膚分離)，可多方向拉提。", "D": "✗(非答案) 錯誤：High SMAS的SMAS flap上緣本可高於zygomatic arch，該限制敘述有誤。", "E": "✓ 正確：Subperiosteal facelift可能傷及infraorbital nerve與facial nerve zygomatic branch。"}, "cite": "待複查（Neligan 拉皮術式 記憶佐證）", "conflict": ""}, {"id": "5176", "sub": "AE6", "src": "NG", "years": [109, 111], "stem": "關於前額拉皮(forehead lift)的敘述,下列何者正確？", "opts": {"A": "Supraorbital nerve通過supraorbital foramen後, superficial branch沿著temporal ridge內側走向頭頂,進而支配頭皮感覺。", "B": "Corrugator resection常傷害到的神經為Supratrochlear nerve。", "C": "沿著sub-periosteal plane做blind dissection 時,在orbital rim上方約 1cm 便須停止,以免傷到 supraorbital nerve。", "D": "Frontalis muscle收縮時,同時造成眉毛內外側向上揚起。", "E": "Proceus muscle收縮,會造成glabellar vertical frown line。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 前額拉皮（選正確者）：B正確——corrugator切除最常傷及supratrochlear nerve。錯誤者：A把supraorbital nerve深/淺支走向弄反（沿temporal ridge向頭頂走的是deep branch）；C『沿subperiosteal plane盲剝於眶緣上1 cm即停止』定位不當（骨膜下平面位於神經深面）；D frontalis收縮只上提『內側』眉、外側眉無frontalis覆蓋（由orbicularis下拉）；E procerus收縮造成鼻根『橫向』皺紋，垂直的glabellar frown line由corrugator造成。", "peropt": {"A": "✗ supraorbital nerve深/淺支走向敘述顛倒，沿temporal ridge向頭頂者為深支。", "B": "✓(正解) corrugator切除最常傷及supratrochlear nerve。", "C": "✗ subperiosteal盲剝『眶緣上1 cm即停』的定位不正確。", "D": "✗ frontalis只上提內側眉，外側眉無frontalis、由orbicularis下拉，非內外皆上揚。", "E": "✗ procerus造成鼻根橫向皺紋；垂直glabellar frown line由corrugator造成。"}, "cite": "待複查（Neligan Forehead lift 記憶佐證）", "conflict": ""}, {"id": "5177", "sub": "AE2", "src": "NG", "years": [109], "stem": "下列何者不是亞洲人常見的眼瞼特色？", "opts": {"A": "Epicanthal fold", "B": "Puffy crease-less upper eyelid", "C": "High crease, deep-set upper eyelid", "D": "Upward lateral canthal tilting", "E": "Wide intercanthal distance"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人眼瞼特色：epicanthal fold、puffy且無/低摺痕(crease-less)上眼瞼、upward lateral canthal tilting（外眥上斜）、wide intercanthal distance、眶隔脂肪較厚。選項C『High crease, deep-set upper eyelid（高摺痕、深邃眼窩）』為高加索人特徵，非亞洲人，故為答案。臨床應用：亞洲雙眼皮成形常需處理epicanthal fold與較厚脂肪。", "peropt": {"A": "✗ Epicanthal fold為亞洲人常見特色。", "B": "✗ Puffy、無摺痕上眼瞼為亞洲人常見。", "C": "✓(正解) 高摺痕、深邃眼窩為高加索人特徵，非亞洲人。", "D": "✗ Upward lateral canthal tilting為亞洲人常見。", "E": "✗ Wide intercanthal distance為亞洲人常見。"}, "cite": "待複查（Neligan 亞洲眼瞼 記憶佐證）", "conflict": ""}, {"id": "5178", "sub": "AE2", "src": "NG", "years": [109, 111, 114, 115], "stem": "關於Blepharoplasty的敘述，以下何者為非？", "opts": {"A": "最常見的complication為chemosis", "B": "Retrobulbar hemorrhage為嚴重的complication，常以sudden onset severe orbital pain表現", "C": "手術後出現diplopia,可能是血腫或組織水腫造成, 治療上以觀察保守治療為主", "D": "手術後出現asymmetry, ptosis, lagophthalmos, 宜於4週內再進行手術修正,以避免惡化", "E": "手術前已有乾眼症，手術後常會加劇症狀"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Blepharoplasty 併發症（選『為非』者）：術後 asymmetry/ptosis/lagophthalmos 不宜『4 週內即再手術』；應先觀察數月（約 3–6 個月）待水腫/發炎消退，多可改善，過早於發炎組織上修正易惡化，故 D 錯。易混淆：最常見併發症為 chemosis；retrobulbar hemorrhage 以突發劇烈眼窩痛表現，為急症。", "peropt": {"A": "✗（正確）最常見併發症為 chemosis。", "B": "✗（正確）retrobulbar hemorrhage 以突發劇痛表現。", "C": "✗（正確）術後複視多為血腫/水腫，保守觀察為主。", "D": "✓（正解，錯誤敘述）asymmetry/ptosis/lagophthalmos 應觀察數月再修正，非 4 週內急做。", "E": "✗（正確）術前乾眼術後常加劇。"}, "cite": "待複查（Neligan 眼瞼併發症 記憶佐證）", "conflict": ""}, {"id": "5179", "sub": "AE6", "src": "NG", "years": [109], "stem": "手術改善頸部輪廓時，下列何者不不正確?", "opts": {"A": "從懸韌帶retaining ligaments和間隔septae鬆解皮膚。", "B": "適當地從淺層皮下subcutaneous和深層頸廓肌下subplatysmal移除脂肪。", "C": "調整改造頸廓肌platysma及二腹肌digastric muscles。", "D": "調整改造頷下腺submandibular gland。", "E": "必須加強皮膚的張力以維持效果。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頸部年輕化的現代原則靠處理『深部結構』（platysma、digastric、submandibular gland、深/淺層脂肪）與鬆解 retaining ligaments/septae，而非靠『加強皮膚張力』。以皮膚張力維持效果會導致復發與疤痕不良，故 E 為不正確敘述。", "peropt": {"A": "✗ 自懸韌帶與間隔鬆解皮膚，正確。", "B": "✗ 適當移除淺層皮下與深層頸廓肌下脂肪，正確。", "C": "✗ 調整 platysma 與 digastric，正確。", "D": "✗ 處理 submandibular gland 改善輪廓，正確。", "E": "✓（正解，即不正確敘述）不應以加強皮膚張力維持效果；應處理深部結構。"}, "cite": "待複查（Neligan 頸部年輕化 記憶佐證）", "conflict": ""}, {"id": "5180", "sub": "AE9", "src": "NG", "years": [109], "stem": "下列關於應用脂肪移植改善輪廓何者正確?", "opts": {"A": "脂肪移植不宜用於接受過拉皮手術的臉部。", "B": "脂肪移植用於鬆垮冗贅的皮膚效果良好。", "C": "移植脂肪用於改善手背皺紋需要特別精準。", "D": "體重減輕不會影響移植脂肪的大小。", "E": "曾有報導脂肪移植可以改善經放射性療法的傷口。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 脂肪移植改善輪廓（本題找正確）：正解 E——已有報導脂肪移植（含 ADSC）可改善「放射線治療後」之慢性傷口與組織品質（fat grafting 之再生效應）。錯誤觀念：脂肪可用於拉皮後臉部（A 錯）；對鬆垮冗贅皮膚效果不佳、非增量適應症（B 錯）；體重變化「會」影響移植脂肪體積（D 錯）；C 之敘述非本題正確選項。", "peropt": {"A": "✗ 脂肪移植可用於曾拉皮之臉部，敘述「不宜」有誤，故不選。", "B": "✗ 脂肪移植改善的是容積缺損，對鬆垮冗贅皮膚效果不佳，敘述錯誤故不選。", "C": "✗ 此敘述非本題之正確選項。", "D": "✗ 體重減輕會使移植脂肪體積縮小，「不會影響」錯誤故不選。", "E": "✓(正解) 已有報導脂肪移植可改善放射治療後之傷口，正確。"}, "cite": "待複查（Neligan 脂肪移植臨床應用 記憶佐證）", "conflict": ""}, {"id": "5181", "sub": "AE11", "src": "NG", "years": [109], "stem": "關於顏面整形植入體何者錯誤?", "opts": {"A": "固體矽樹酯Solid silicone和多孔聚乙烯porous polyethylene是最常用於顏面骨augmentation的材料。", "B": "置入的切口與植入體的位置必須盡量靠近。", "C": "放置植入體時骨膜下subperiosteal plane平面是首選。", "D": "植入體和骨頭間若有間隙將造成非預期性的加大unanticipated increases in augmentation。", "E": "若咬合狀況能接受,植入體手術可以替代或附屬於臉部不對稱的正顎手術orthognathic surgery in disproportioned faces。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面整形植入體(選錯誤)。正解B為誤述：切口應盡量『遠離』植入物位置(remote incision)以降低污染、感染與外露風險，而非盡量靠近。正確敘述：solid silicone與porous polyethylene最常用;subperiosteal為首選平面;植入物與骨間空隙會造成非預期加大;咬合可接受時植入可替代/輔助正顎手術。", "peropt": {"A": "✗ 正確：solid silicone與porous polyethylene為最常用顏面骨augmentation材料。", "B": "✓(正解) 錯誤：切口應遠離植入物，而非盡量靠近。", "C": "✗ 正確：subperiosteal平面為植入首選。", "D": "✗ 正確：植入物與骨間空隙會造成非預期性加大。", "E": "✗ 正確：咬合可接受時，植入可替代或輔助正顎手術矯正不對稱。"}, "cite": "待複查（Neligan 顏面植入體 記憶佐證）", "conflict": ""}, {"id": "5182", "sub": "AE7", "src": "NG", "years": [109], "stem": "關於鼻部的解剖結構何者錯誤?", "opts": {"A": "中鼻甲 middle turbinate對鼻腔裡的呼吸道阻力airway resistance影響最大。", "B": "在前鼻中膈血管密集的區域叫做Kiesselbach's area。", "C": "下側方軟骨lower lateral cartilages支撐外部鼻瓣 external nasal valve。", "D": "鼻子的感覺神經是由infraorbital nerve 和 external nasal nerve支配。", "E": "在開放式鼻整形時上唇動脈的鼻小柱分枝將被截斷。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖（選錯誤者）：A錯誤——對鼻腔氣道阻力影響最大的是inferior turbinate（下鼻甲），非middle turbinate。正確者：B前中膈血管密集區為Kiesselbach's area（Little's area）；C lower lateral cartilage支撐external nasal valve；D鼻部感覺由infraorbital nerve與external nasal nerve支配；E開放式鼻整形會截斷superior labial artery的columellar分支。", "peropt": {"A": "✓(正解，即錯誤敘述) 影響氣道阻力最大者為inferior turbinate，非middle turbinate。", "B": "✗ 敘述正確：前中膈血管密集區為Kiesselbach's area。", "C": "✗ 敘述正確：LLC支撐external nasal valve。", "D": "✗ 敘述正確：鼻部感覺由infraorbital與external nasal nerve支配。", "E": "✗ 敘述正確：開放式鼻整形會截斷上唇動脈之鼻小柱分支。"}, "cite": "待複查（Neligan 鼻部解剖 記憶佐證）", "conflict": ""}, {"id": "5183", "sub": "AE8", "src": "NG", "years": [109], "stem": "關於開放式鼻整形(open rhinoplasty)下列何者錯誤?", "opts": {"A": "開放式鼻整形術鼻部水腫的時間較長。", "B": "鼻中膈重建和下鼻甲整形或黏膜下切除不能和開放式鼻整形同期實施。", "C": "自體組織Autologous grafts移植比同種異體homograft或異質移植物alloplastic更受歡迎,因為有較低的感染率和脫出率extrusion。", "D": "鼻尖縫合技術Nasal tip suturing可以在不傷到骨骼軟骨框架破壞鼻部支撐的狀況下改善鼻尖的外觀。", "E": "在鼻中膈彎曲面f internal deviation的另一側通常會有下鼻甲inferior turbinate肥大的情形。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形觀念：開放式因掀開鼻部軟組織，術後水腫時間較長（A對）；自體軟骨較同種/異質移植物有更低感染與extrusion率而較受歡迎（C對）；tip suturing可在不破壞骨軟骨框架下改善鼻尖（D對）；鼻中膈彎曲的凹側對側常見下鼻甲代償性肥大（E對）。B錯——鼻中膈重建、下鼻甲整形或黏膜下切除『可以』與開放式鼻整形同期實施。", "peropt": {"A": "✗ 正確。開放式術後鼻部水腫時間較長。", "B": "✓(正解，為錯誤敘述) 鼻中膈重建與下鼻甲手術可與開放式鼻整形同期進行。", "C": "✗ 正確。自體軟骨感染與脫出率較低而受歡迎。", "D": "✗ 正確。tip suturing可在不破壞支撐下改善鼻尖。", "E": "✗ 正確。鼻中膈彎曲對側常見下鼻甲代償性肥大。"}, "cite": "待複查（Neligan 開放式鼻整形 記憶佐證）", "conflict": ""}, {"id": "5184", "sub": "AE8", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "關於密閉式鼻整形術的術後可能的問題何者為非?", "opts": {"A": "中穹頂(middle vault roof)和鼻翼軟骨(alar cartilage)的的切除常造成醫源性氣道阻塞", "B": "偶發的醫源性鼻中膈穿孔經常沒有明顯症狀", "C": "過度切除鼻甲可能造成持續性的鼻炎", "D": "為避免發生鼻中膈崩塌，在取鼻中膈軟骨時至少留下5mm邊緣做支撐", "E": "鼻整形術後紅鼻通常於術後第一年可自行消退"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 密閉式鼻整形術後問題（選『為非』者）：為避免鼻中膈崩塌，取鼻中膈軟骨時須保留『至少 1cm（≥10mm）』的 L-strut 背側與尾側支撐；『5mm』不足，故 D 錯。易混淆：middle vault/alar cartilage 過度切除→醫源性氣道阻塞；過度切除鼻甲→持續性鼻炎/空鼻症；術後紅鼻多於第一年自行消退。", "peropt": {"A": "✗（正確）中穹頂/鼻翼軟骨過度切除致醫源性氣道阻塞。", "B": "✗（正確）偶發之醫源性中膈穿孔常無症狀。", "C": "✗（正確）過度切除鼻甲致持續性鼻炎。", "D": "✓（正解，錯誤敘述）L-strut 應保留至少 1cm（10mm），非 5mm。", "E": "✗（正確）術後紅鼻通常第一年自行消退。"}, "cite": "待複查（Neligan 鼻整形併發症 記憶佐證）", "conflict": ""}, {"id": "5185", "sub": "AE7", "src": "NG", "years": [109], "stem": "關於鼻偏移deviation與呼吸道下列何者錯誤?", "opts": {"A": "現在已經不偏好進行全鼻甲切除complete turbinectomy因為可能造成很多嚴重併發症。", "B": "內部鼻瓣internal nasal valve是鼻內空氣流動的重要調節器。", "C": "內部鼻瓣的正常功能取決於下側軟骨lower lateral cartilages的結構完整性，鼻週肌肉組織perinasal musculature和足夠的軟組織覆蓋soft tissue coverage。", "D": "下鼻甲前端肥大是鼻氣道阻塞的主要原因。", "E": "下三分之一鼻背處偏屈時可能需要鼻中膈旋轉縫合septal rotation suture。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Internal nasal valve（內鼻閥）由 upper lateral cartilage 之尾側緣、鼻中膈、下鼻甲頭端與鼻底構成，其正常功能依賴『upper lateral cartilage』結構完整（非 lower lateral cartilage；後者關乎 external valve）。C 誤植為 lower lateral cartilage，為錯誤敘述。其餘避免全鼻甲切除、內鼻閥為氣流重要調節器、下鼻甲前端肥大為阻塞主因、下 1/3 鼻背偏屈可用 septal rotation suture 皆正確。", "peropt": {"A": "✗ 現已不偏好 complete turbinectomy（併發症多），正確。", "B": "✗ Internal nasal valve 為鼻內氣流重要調節器，正確。", "C": "✓（正解，即錯誤敘述）內鼻閥功能依賴 upper lateral cartilage 完整，非 lower lateral cartilage。", "D": "✗ 下鼻甲前端肥大為鼻氣道阻塞主因，正確。", "E": "✗ 下 1/3 鼻背偏屈可用 septal rotation suture，正確。"}, "cite": "待複查（Neligan 鼻氣道/內鼻閥 記憶佐證）", "conflict": ""}, {"id": "5186", "sub": "AE8", "src": "NG", "years": [109, 110], "stem": "常見的二次鼻整形原因包含下列何者? (複選)", "opts": {"A": "寬大的球狀圓形鼻尖Broad, bulbous, round tip。", "B": "鼻中間三分一處的塌陷Collapsed middle third of nose。", "C": "呼吸道問題Airway problems。", "D": "側外鼻瓣的獨立塌陷Isolated collapse of the lateral external valve。", "E": "短鼻畸形Short nose。"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 二次鼻整形（revision rhinoplasty）常見成因涵蓋美觀與功能（本題全對，選 ABCDE）：寬大球狀鼻尖、中鼻拱塌陷（inverted-V/中三分之一塌陷）、呼吸道問題（valve dysfunction）、外側 external valve 孤立塌陷、以及短鼻畸形（short/contracted nose）。五者皆為典型二次手術理由。", "peropt": {"A": "✓ 寬大球狀鼻尖為常見二次手術原因。", "B": "✓ 中三分之一（midvault）塌陷常見。", "C": "✓ 呼吸道/瓣膜功能問題常見。", "D": "✓ 外側 external valve 孤立塌陷常見。", "E": "✓ 短鼻畸形（攣縮鼻）為困難二次手術之常見理由。"}, "cite": "待複查（Neligan revision rhinoplasty 記憶佐證）", "conflict": ""}, {"id": "5187", "sub": "AE4", "src": "NG", "years": [109, 110], "stem": "顏面拉皮後造成的耳畸形下列何者正確? (複選)", "opts": {"A": "顏面拉皮後的耳垂畸形通常來自於不適當的皮膚切除造成耳垂過多的向前向下牽扯。", "B": "耳屏畸形Tragal deformities可由前向的牽扯、切除部分耳屏軟骨tragal cartilage、或過多的皮膚在耳屏基部bottom of the tragus造成，前兩者通常沒辦法多做些甚麼。", "C": "只要皮膚關閉時沒有張力，不好看的疤痕通常可以藉由切除及附加的拉皮來改善。", "D": "耳後畸形Retroauricular deformities可以藉由鬆解耳朵release of the ear和全層皮膚植皮來改善。", "E": "在耳屏基部bottom of the tragus有過多的皮膚可以用手術糾正。"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 拉皮後耳畸形(複選選正確)皆成立：耳垂畸形常因皮膚切除不當致耳垂被前下牽扯(pixie ear);tragal deformity可因前向牽扯、切除tragal cartilage或tragus基部皮膚過多所致，前兩者常難再處理;無張力關閉下不良疤痕多可切除加拉皮改善;retroauricular deformity可藉release of the ear與全層植皮改善;tragus基部皮膚過多可手術矯正。", "peropt": {"A": "✓ 正確：耳垂畸形常源自皮膚切除不當致耳垂前下牽扯。", "B": "✓ 正確：tragal deformity可由前向牽扯、切除tragal cartilage或基部皮膚過多造成，前兩者常難補救。", "C": "✓ 正確：只要關閉無張力，不良疤痕多可切除並附加拉皮改善。", "D": "✓ 正確：retroauricular deformity可藉release of the ear與全層植皮改善。", "E": "✓ 正確：tragus基部皮膚過多可手術矯正。"}, "cite": "待複查（Neligan 拉皮耳畸形 記憶佐證）", "conflict": ""}, {"id": "5188", "sub": "AE5", "src": "NG", "years": [109], "stem": "關於禿頭與植髮何者正確?", "opts": {"A": "毛髮被移植後通常會先進入休止期resting or telogen phase。", "B": "在男女最常見的掉髮同樣是雄性禿androgenic alopecia。", "C": "在替年輕病患植髮時通常不建議先在額頭區和上區frontal and superior regions做植髮，直到髮型更加成熟後再作。", "D": "通常穩定的Norwood II型或III型禿髮患者能有良好的植髮結果。", "E": "在健康沒有瘢痕的個體植髮可以達到90~95%的成功率。"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 禿頭與植髮（選正確，複選）：A正確——移植後毛囊先進入休止期（telogen）再重新生長；B正確——男女最常見掉髮皆為雄性禿（androgenic alopecia）；D正確——穩定的Norwood II/III型是植髮良好適應症；E正確——健康無疤痕個體成功率可達90–95%。錯誤者C：年輕病患植髮的顧慮在於『避免把前額髮線設計太低』，其表述不當。⚠ 此題與NG113-B05-Q05為選項重排家族，記概念勿背字母。", "peropt": {"A": "✓ 移植毛髮先進入休止期（telogen）再生長。", "B": "✓ 男女最常見掉髮皆為androgenic alopecia。", "C": "✗ 年輕病患的重點在避免前額髮線設計過低，此敘述表述不當。", "D": "✓ 穩定Norwood II/III型為植髮良好適應症。", "E": "✓ 健康無疤痕個體植髮成功率約90–95%。"}, "cite": "待複查（Neligan 植髮 記憶佐證）", "conflict": "選項重排家族：與 NG113-B05-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5189", "sub": "AE3", "src": "NG", "years": [109, 111, 113, 114, 115], "stem": "對抽脂病人的術前檢查中, 必須記載什麼內容?", "opts": {"A": "Evaluation of areas of lipodystrophy and contour deformities", "B": "Dimpling and cellulite", "C": "Myofascial support", "D": "Zones of adherence", "E": "All of the above are correct"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂術前評估與記錄須完整涵蓋：lipodystrophy區域與輪廓變形、凹陷/橘皮(dimpling & cellulite)、肌筋膜支撐(myofascial support)、以及zones of adherence（沾黏區，抽吸此區易致輪廓不平/凹陷）。四者皆須記載，故答案E『以上皆是』。臨床意義：術前標記zones of adherence可避免術後contour irregularity。", "peropt": {"A": "✗ 為必記項目之一（lipodystrophy與輪廓變形）。", "B": "✗ 為必記項目之一（dimpling與cellulite）。", "C": "✗ 為必記項目之一（myofascial support）。", "D": "✗ 為必記項目之一（zones of adherence）。", "E": "✓(正解) 以上皆須術前記載。"}, "cite": "待複查（Neligan 抽脂術前評估 記憶佐證）", "conflict": ""}, {"id": "5190", "sub": "AE1", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "對於大量減重(massive weight loss)病人，那些因子會影響其外觀呈現? (複選)", "opts": {"A": "Body Mass Index (BMI) level", "B": "Fat deposition pattern", "C": "Carnivorism", "D": "Quality of the skin/fat envelope", "E": "Psychologic status"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大量減重（MWL）影響外觀之因子（複選，選『是』者）：ABD 正確——BMI 水準、脂肪堆積型態（fat deposition pattern）、皮膚/脂肪包膜的品質（quality of skin-fat envelope）。錯誤/干擾：Carnivorism（肉食）非影響因子（C 錯）；本題視 Psychologic status 非『外觀呈現』之因子（E 未列入）。", "peropt": {"A": "✓ BMI 水準影響外觀。", "B": "✓ 脂肪堆積型態影響外觀。", "C": "✗ Carnivorism（肉食）非影響因子，屬干擾選項。", "D": "✓ 皮膚/脂肪包膜品質影響外觀。", "E": "✗ 本題視心理狀態非『外觀呈現』之直接因子。"}, "cite": "待複查（Neligan MWL 記憶佐證）", "conflict": ""}, {"id": "5191", "sub": "AE1", "src": "NG", "years": [109, 111, 112, 114, 115], "stem": "Body Mass Index (BMI) 超過____，在美容以及雕塑大量減重(massive weight loss)後病人的手術，會有更高的手術相關併發症風險", "opts": {"A": "18.5", "B": "22", "C": "24", "D": "27", "E": "30"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 大量減重（MWL）後美容/體雕手術，BMI 超過『30』者手術相關併發症（傷口裂開、癒合不良、感染、VTE）風險顯著升高，術前宜先減重至 BMI<30 並穩定體重、優化營養與共病。", "peropt": {"A": "✗ 18.5 為體重過輕分界，非併發症升高門檻。", "B": "✗ 22 為正常範圍。", "C": "✗ 24 仍屬正常上緣。", "D": "✗ 27 屬過重但非題目答案門檻。", "E": "✓（正解）BMI>30 併發症風險顯著升高。"}, "cite": "待複查（Neligan 體雕/MWL BMI 門檻 記憶佐證）", "conflict": ""}, {"id": "5192", "sub": "AE3", "src": "NG", "years": [109, 111, 112, 113, 114, 115], "stem": "隆臀之目的為達到更年輕的外觀和輪廓，以及創造一個理想的\"腰臀比例(waist-to-hip ratio)\"為_____", "opts": {"A": "0.5", "B": "0.6", "C": "0.7", "D": "0.8", "E": "0.9"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 隆臀美學目標之一為理想「腰臀比（waist-to-hip ratio, WHR）＝0.7」——此比例被視為年輕、女性化且具吸引力之曲線指標；透過腰腹抽脂縮腰＋臀部脂肪增量以逼近 0.7。故選 C。", "peropt": {"A": "✗ 0.5 過低，非美學目標值。", "B": "✗ 0.6 非公認理想值。", "C": "✓(正解) 理想腰臀比為 0.7。", "D": "✗ 0.8 偏高，非目標值。", "E": "✗ 0.9 接近男性化體型，非目標。"}, "cite": "待複查（Neligan 隆臀 WHR 記憶佐證）", "conflict": ""}, {"id": "5193", "sub": "AE1", "src": "NG", "years": [109, 111], "stem": "對於大量減重(massive weight loss, MWL)後病人的abdominal contouring，下列何者錯誤?", "opts": {"A": "Abdominoplasty這個詞最初是用在移除腹部皮膚跟脂肪的美容手術，伴隨腹壁肌肉的緊實以及肚臍的重新定位", "B": "腹部和肚臍疝氣在MWL病人中很常見", "C": "Trunk skin and fat的縱切 (fleur-de-lis abdominoplasty) 可以被用來讓腹部做橫向的放鬆", "D": "在genital area or mons可能需要thinning and resuspension", "E": "若病人有giant pannus (panniculus morbidus)，可以使用特殊的儀器來幫助切除"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 MWL後腹部contouring(選錯誤)。正解C為誤述：Fleur-de-lis abdominoplasty是以『縱向』切除軀幹皮膚脂肪達成腹部『橫向緊實(tightening)』，而非『橫向放鬆(relaxation)』;方向與效果用詞錯誤。正確敘述：abdominoplasty原指去皮脂加肌肉緊實與臍重定位;MWL病人腹壁/臍疝氣常見;生殖區/mons常需thinning與resuspension;giant pannus可用特殊器械輔助切除。", "peropt": {"A": "✗ 正確：abdominoplasty原指去除腹部皮脂並緊實腹壁肌肉、重定位肚臍。", "B": "✗ 正確：腹壁與臍疝氣在MWL病人中常見。", "C": "✓(正解) 錯誤：fleur-de-lis為縱切以達腹部橫向『緊實』，非橫向放鬆。", "D": "✗ 正確：genital area或mons常需thinning與resuspension。", "E": "✗ 正確：giant pannus(panniculus morbidus)可用特殊器械輔助切除。"}, "cite": "待複查（Neligan MWL腹整形 記憶佐證）", "conflict": ""}, {"id": "5194", "sub": "AE1", "src": "NG", "years": [109, 111, 112], "stem": "關於thigh lift, 那些描述正確? (複選)", "opts": {"A": "外側thigh-lift可以影響大腿外側, 但只有些微拉緊大腿內側組織", "B": "在vertical thigh-lift procedure中，遠端的切除程度，可以根據膝蓋多餘的皮膚來決定，但不能由病人的意願以及疤痕的長度來決定切除多少", "C": "在病人只有些微deflated thighs而要求thigh-lift時，更進一步的減重也許是需要的", "D": "腳的淋巴主要集中在外側", "E": "若在thigh-lift過程中不小心傷到淋巴，也許會造成下肢淋巴水腫"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大腿拉皮（thigh lift，選正確，複選）：A正確——外側thigh-lift主要影響大腿外側、僅些微拉緊內側；C正確——僅輕度deflated thighs者可能需先進一步減重；E正確——術中傷及淋巴可致下肢淋巴水腫。錯誤者：B之絕對化表述（切除量不能由病人意願/疤痕長度決定）不正確；D『腳的淋巴主要在外側』錯誤——下肢淋巴主要集中在『內側』（沿great saphenous vein），故本題D錯。", "peropt": {"A": "✓ 外側thigh-lift主要影響外側、僅些微拉緊內側。", "B": "✗ 絕對化表述不正確；遠端切除量亦可參考病人意願與可接受疤痕長度。", "C": "✓ 僅輕度deflated thighs者可能需先進一步減重再手術。", "D": "✗ 下肢淋巴主要集中在『內側』（非外側），故此敘述錯誤。", "E": "✓ 術中傷及淋巴可致下肢淋巴水腫。"}, "cite": "待複查（Neligan Thigh lift 記憶佐證）", "conflict": ""}, {"id": "5195", "sub": "AE11", "src": "NG", "years": [109, 111], "stem": "關於labia minora reduction, 何者為誤?", "opts": {"A": "理想的女性生殖器外觀，是受到文化影響，或者單純跟女性個別的審美觀有關", "B": "Labia minora reduction 在6歲即可以執行", "C": "該手術的優點為手術時間短，而且創造light-colored labial edge", "D": "Techniques 有V-shaped 或者 Z-shaped wedge excisions", "E": "最常見的併發症為a slight separation of the labial edge closure 或者a small perforation"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Labia minora reduction（小陰唇縮小）觀念：理想外觀受文化與個人審美影響（A對）；優點含手術時間短、可造出light-colored labial edge（C對）；術式含V-shaped/central wedge或Z-shaped楔形切除（D對）；最常見併發症為labial edge縫合輕微裂開或小穿孔(dehiscence/perforation)（E對）。B錯——不應在6歲執行；需待青春期後生殖器發育成熟才施行。", "peropt": {"A": "✗ 正確。理想外觀受文化與個人審美影響。", "B": "✓(正解，為錯誤敘述) 不應於6歲施行，須待青春期後發育成熟。", "C": "✗ 正確。手術時間短且可造出淺色唇緣。", "D": "✗ 正確。術式含V型或Z型楔形切除。", "E": "✗ 正確。最常見併發症為縫合輕微裂開或小穿孔。"}, "cite": "待複查（Neligan 小陰唇縮小 記憶佐證）", "conflict": ""}, {"id": "5196", "sub": "AE1", "src": "NG", "years": [109, 110, 111, 112, 114, 115], "stem": "以下何者不是Zones of adherence ?", "opts": {"A": "Lateral gluteal depression", "B": "Gluteal crease", "C": "Upper medial thigh", "D": "Distal posterior thigh", "E": "Inferolateral iliotibial tract"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Zones of adherence（黏著區，選『非』者）：黏著區包含 lateral gluteal depression、gluteal crease、distal posterior thigh、inferolateral iliotibial tract、『mid-medial thigh（中內側大腿）』等；本題『Upper medial thigh（上內側大腿）』非黏著區，故 C 為答案。臨床意義：黏著區皮下組織與深筋膜緊密相連，抽脂時須謹慎避免輪廓不整。", "peropt": {"A": "✗ lateral gluteal depression 為黏著區。", "B": "✗ gluteal crease 為黏著區。", "C": "✓（正解）upper medial thigh 非黏著區（黏著區為 mid-medial thigh）。", "D": "✗ distal posterior thigh 為黏著區。", "E": "✗ inferolateral iliotibial tract 為黏著區。"}, "cite": "待複查（Neligan 抽脂黏著區 記憶佐證）", "conflict": ""}, {"id": "5197", "sub": "AE1", "src": "NG", "years": [109], "stem": "有關於腹部整形術的術後併發症, 以下哪些正確? (複選)", "opts": {"A": "抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題 (50% vs. 15% in non-smokers)。", "B": "BMI > 25 跟脂肪移除超過1000g 的病人術後有比較高的機率發生肺栓塞。", "C": "術前接受過減肥手術 (Bariatric surgery) 比自然減重的病人更容易發生術後傷口併發症。", "D": "同一個時間進行多種不同的手術會增加術中跟術後併發症的風險。", "E": "應建議所有病人劃刀前給予預防性抗生素來降低術後傷口感染的機率。"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Abdominoplasty 併發症之實證重點（正解 ACE）：A 抽菸者傷口/感染顯著增加（50% vs 15%，EV II）；C 減肥手術後病人比自然減重者傷口併發症更多；E 建議所有病人術前單劑預防性抗生素。B 應為 BMI>30 且切除>1500g 才增加 PE（非>25/>1000g），D 同時多術式並不增加主要併發症，故 B、D 錯誤。⚠此題與 111 年版 A 敘述用字有差（是否列出 50% vs 15% 數值），概念一致。", "peropt": {"A": "✓ 抽菸者感染/傷口癒合不佳明顯較高（50% vs 15%），正確。", "B": "✗ 應為 BMI>30 且切除>1500g 才增加 PE，題述 >25/>1000g 錯誤。", "C": "✓ 減肥手術後病人傷口併發症較自然減重者多，正確。", "D": "✗ 同時多術式並不增加主要術中/術後併發症。", "E": "✓ 建議所有病人術前單劑預防性抗生素，正確。"}, "cite": "待複查（Neligan 腹部整形併發症 EBM 記憶佐證）", "conflict": "跨年數值差異（Neligan 4e vs Neligan 4e）：A: 109「抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題 (50% vs. 15% in」 vs 111「抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題。」"}, {"id": "5198", "sub": "AE10", "src": "NG", "years": [109], "stem": "關於facial nerve 何者為非？ (複選)", "opts": {"A": "The nerve is found passing laterally deep to the upper border posterior end of digastric muscle", "B": "The Pitanguy's line means to indicate the course of frontal (temporal) branch", "C": "Despite a number of communicating branches between buccal and zygomatic branch, injury to a single branch of these nerves is usually noticeable", "D": "Marginal mandibular branch only consists of a single branch.", "E": "Location of facial nerve is 1 cm deep and inferior to the tragal point"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經解剖（本題找錯誤，複選）：正解 CD。C 錯——因 buccal 與 zygomatic 間交通支豐富，單一分支損傷「通常不明顯」，題目說「usually noticeable」有誤。D 錯——marginal mandibular branch 常為「多支」而非單一分支。正確者：走行於二腹肌後腹深面外側（A 對）、Pitanguy's line 標示 frontal/temporal 分支（B 對）、位於 tragal point 深 1 cm 且下方（E 對）。", "peropt": {"A": "✗ 神經走於二腹肌後腹深面外側，正確敘述，不選。", "B": "✗ Pitanguy's line 標示 frontal/temporal 分支走向，正確，不選。", "C": "✓(正解,錯誤敘述) 因交通支豐富，單支損傷常不明顯，題目稱 noticeable 有誤，故選。", "D": "✓(正解,錯誤敘述) Marginal mandibular 常為多支，非單一分支，故選。", "E": "✗ 顏面神經位於 tragal point 深 1 cm 且下方，正確，不選。"}, "cite": "待複查（Neligan 顏面神經解剖 記憶佐證）", "conflict": ""}, {"id": "5199", "sub": "AE9", "src": "NG", "years": [110], "stem": "下列何者不是施打肉毒桿菌素(botulinum toxin)造成的副作用?", "opts": {"A": "General muscle weakness 全身肌肉無力", "B": "Dysphagia 吞嚥困難", "C": "Breathing difficulties 呼吸困難", "D": "Insomnia 失眠", "E": "Diplopia 複視"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素副作用(選『非』)。正解D：失眠(insomnia)非BoNT典型副作用。BoNT副作用多源自毒素擴散所致的鄰近/遠端肌肉無力，含全身肌無力、吞嚥困難、呼吸困難、複視(眼外肌)等。", "peropt": {"A": "✗ 全身肌肉無力為毒素擴散可能副作用。", "B": "✗ 吞嚥困難為頸部注射擴散的已知副作用。", "C": "✗ 呼吸困難為嚴重擴散的危險副作用。", "D": "✓(正解) 失眠並非肉毒桿菌素的典型副作用。", "E": "✗ 複視為眼周擴散影響眼外肌所致副作用。"}, "cite": "待複查（Neligan 肉毒副作用 記憶佐證）", "conflict": ""}, {"id": "5200", "sub": "AE2", "src": "NG", "years": [110], "stem": "有關下眼皮手術的transconjunctival approach,下列何者敘述為非?", "opts": {"A": "Transconjunctival blepharoplasty is the preferred procedure for fat reduction in patients without excess skin and with good canthal position.", "B": "Transconjunctival approach比起transcutaneous approach有較低機率造成lower lid malposition", "C": "Transconjunctival approach的incision要位於inferior border of the tarsus以下至少4 mm", "D": "Transconjunctival approach還分成retroseptal approach以及preseptal(suborbicularis) approach", "E": "Transconjunctival approach的incision建議要縫合以避免trap bacteria and corneal irritation"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下眼皮transconjunctival approach（選錯誤者）：E錯誤——結膜切口通常『不需縫合』（可自行癒合），刻意縫合反而無必要；不縫合並不會因此trap bacteria。正確者：A適用於無多餘皮膚、canthal位置良好者之脂肪處理；B較transcutaneous較少造成lower lid malposition；C切口位於tarsus下緣下至少4 mm；D分retroseptal與preseptal(suborbicularis)兩式。", "peropt": {"A": "✗ 敘述正確：適用於無贅皮、canthal位置佳者之脂肪去除。", "B": "✗ 敘述正確：較transcutaneous較少造成lower lid malposition。", "C": "✗ 敘述正確：切口位於tarsus下緣下方至少4 mm。", "D": "✗ 敘述正確：分retroseptal與preseptal(suborbicularis)兩入路。", "E": "✓(正解，即錯誤敘述) 結膜切口通常不需縫合即可癒合，建議縫合的說法有誤。"}, "cite": "待複查（Neligan Transconjunctival blepharoplasty 記憶佐證）", "conflict": ""}, {"id": "5201", "sub": "AE10", "src": "NG", "years": [110], "stem": "下列facial muscles何者非superficial muscles?", "opts": {"A": "Orbicularis oculi", "B": "Levator anguli oris", "C": "Zygomatic major", "D": "Zygomatic minor", "E": "Risorius"}, "ans": "B", "multi": false, "etype": "ai", "expl": "考生建議：Neligan 和 GS內容有異", "key": "🎯 臉部表情肌分層：superficial layer含orbicularis oculi、zygomaticus major/minor、risorius等；『levator anguli oris（提口角肌）』屬deep layer（與buccinator、mentalis同為深層），故非superficial muscle，為答案。⚠ 考生提示Neligan與Grabb&Smith分層敘述略有出入，作答時以本題所依教科書之深/淺分層為準。", "peropt": {"A": "✗ Orbicularis oculi屬superficial layer。", "B": "✓(正解) Levator anguli oris屬deep layer，非superficial muscle。", "C": "✗ Zygomaticus major屬superficial layer。", "D": "✗ Zygomaticus minor屬superficial layer。", "E": "✗ Risorius屬superficial layer。"}, "cite": "原檔詳解（Neligan與GS分層有異）（答案疑義，建議人工複查）", "conflict": ""}, {"id": "5202", "sub": "AE9", "src": "NG", "years": [110], "stem": "關於皮下注射填充物(filler)所產生併發症之敘述,下列何者為是?(複選)", "opts": {"A": "常見之併發症為皮膚腫塊, 不規則隆起, 疼痛, 血腫瘀青等", "B": "玻尿酸(HA)發生過敏反應的發生率約0.03%", "C": "一次注射較多量的填充物,產生 sterile abscess 的機率較高", "D": "產生 nodule lesion 時,治療方式包括局部按摩,類固醇注射或是局部切除", "E": "玻尿酸注射在真皮層若是太表淺,可能產生 bluish discoloration (Tyndall effect)"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 皮下填充物併發症（複選，選『為是』者）：ABCDE 皆正確。⚠跨年數值差異：本題（110/Neligan 4e）HA 過敏率為『約 0.03%』，而 105/107（3e）版本為『約 1/3000』；兩者為不同版本表述，作答須對照該年題幹。其餘：量大注射易 sterile abscess；nodule 以按摩/類固醇/切除治療；太表淺致 Tyndall effect。", "peropt": {"A": "✓ 常見併發症含腫塊、不規則、疼痛、瘀青。", "B": "✓ 本版（110）HA 過敏率約 0.03%（⚠與 105 之 1/3000 為不同版本）。", "C": "✓ 單次大量注射 sterile abscess 機率較高。", "D": "✓ nodule 治療含按摩、類固醇注射、局部切除。", "E": "✓ 太表淺注射致 Tyndall effect（bluish discoloration）。"}, "cite": "待複查（Neligan 4e 填充物併發症 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 4e）：B: 105「玻尿酸(HA)發生過敏反應的發生率約1/3000」 vs 110「玻尿酸(HA)發生過敏反應的發生率約0.03%」 ‖ 跨年數值差異（Neligan 3e vs Neligan 4e）：B: 107「玻尿酸(HA)發生過敏反應的發生率約 1/3000」 vs 110「玻尿酸(HA)發生過敏反應的發生率約0.03%」"}, {"id": "5203", "sub": "AE10", "src": "NG", "years": [110], "stem": "關於 facial nerve 的敘述,下列何者為是?(複選)", "opts": {"A": "temporal branch 走向一般沿著 tragus 下 0.5 公分到眉毛側緣外 1.5 公分之連線", "B": "zygomatic and buccal branches 走出 parotid gland 後深度約在 parotid masseteric fascia 上", "C": "mandibular branches 穿出 parotid gland 後大約在 mandibular angle 的位置, 接著沿 mandible border 往前", "D": "cervical branches 支配 platysma", "E": "buccal branch 和 zygomatic branch 通常沒有彼此交通,因此一旦其中一個分支受傷,功能多半無法代償性的回復"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經分支（依 Neligan 5e Vol.2 Ch9.2 查證，本年正解 ABCD）：temporal 沿 Pitanguy line；zygomatic/buccal 走行相關筋膜層次；mandibular 出腺體於下頷角沿下緣前行；cervical 支配 platysma。⚠E 為假：buccal 與 zygomatic 間有交通支，單一分支受損多可代償恢復。本題與 NG105-B04-Q09 同題，NG105 之 ACD 已更正為 ABCD。", "peropt": {"A": "✓ Temporal branch 沿 Pitanguy line，正確。", "B": "✓ Zygomatic/buccal 分支之筋膜層次描述，依 5e 成立。", "C": "✓ Mandibular branch 於下頷角沿下緣前行，正確。", "D": "✓ Cervical branch 支配 platysma，正確。", "E": "✗ Buccal 與 zygomatic 有交通支、受損可代償恢復，此敘述錯誤，不納入答案。"}, "cite": "待複查（Neligan 5e Vol.2 Ch9.2 顏面神經 記憶佐證）", "conflict": "與 NG105-B04-Q09 同題；經 Neligan 5e Vol.2 Ch9.2 查證，本年答案 ABCD 正確，NG105 之 ACD 已更正。"}, {"id": "5204", "sub": "AE6", "src": "NG", "years": [110, 114, 115], "stem": "手術改善頸部輪廓時，下列何者不不正確?", "opts": {"A": "從懸韌帶retaining ligaments和間隔septae鬆解皮膚。", "B": "調整改造頷下腺submandibular gland。", "C": "必須加強皮膚的張力以維持效果。", "D": "適當地從淺層皮下subcutaneous和深層頸廓肌下subplatysmal移除脂肪。", "E": "調整改造頸廓肌platysma及二腹肌digastric muscles。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頸部輪廓手術（本題找「不正確」）：正解 C——現代頸部年輕化依賴「深層結構處理」（鬆解 retaining ligaments/septae、調整 submandibular gland、platysma 與 digastric、分層去脂），而非「加強皮膚張力」維持效果；靠皮膚張力反致早期復發與疤痕不良，故 C 錯誤。", "peropt": {"A": "✗ 自懸韌帶與間隔鬆解皮膚為正確步驟。", "B": "✗ 調整 submandibular gland 可改善頸部輪廓，正確。", "C": "✓(正解,不正確) 頸部年輕化不應靠加強皮膚張力維持，應處理深層結構，故選。", "D": "✗ 分層（皮下與 subplatysmal）去脂為正確處置。", "E": "✗ 調整 platysma 與 digastric 為正確步驟。"}, "cite": "待複查（Neligan 頸部輪廓年輕化 記憶佐證）", "conflict": ""}, {"id": "5205", "sub": "AE9", "src": "NG", "years": [110], "stem": "下列關於應用脂肪移植改善輪廓何者正確?", "opts": {"A": "脂肪移植不宜用於接受過拉皮手術的臉部。", "B": "曾有報導脂肪移植可以改善經放射性療法的傷口。", "C": "移植脂肪用於改善手背皺紋需要特別精準。", "D": "體重減輕不會影響移植脂肪的大小。", "E": "脂肪移植用於鬆垮冗贅的皮膚效果良好。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 脂肪移植改善輪廓(選正確)。正解B：脂肪移植(內含regenerative細胞)曾有報導可改善放射線治療後的傷口/組織。易錯點：脂肪移植可用於曾拉皮的臉;手背皺紋修飾對精準度要求不高(較forgiving);體重變化『會』影響移植脂肪體積;對鬆垮冗贅皮膚脂肪移植效果不佳(僅補容積不緊實)。", "peropt": {"A": "✗ 錯誤：脂肪移植可用於接受過拉皮的臉部。", "B": "✓(正解) 正確：曾有報導脂肪移植可改善放射治療後的傷口/組織。", "C": "✗ 錯誤：手背皺紋脂肪移植對精準度要求相對不高。", "D": "✗ 錯誤：體重減輕會影響移植脂肪的體積大小。", "E": "✗ 錯誤：脂肪移植對鬆垮冗贅皮膚效果不佳。"}, "cite": "待複查（Neligan 脂肪移植輪廓 記憶佐證）", "conflict": ""}, {"id": "5206", "sub": "AE11", "src": "NG", "years": [110], "stem": "關於顏面整形植入體何者錯誤?", "opts": {"A": "置入的切口與植入體的位置必須盡量靠近。", "B": "固體矽樹酯Solid silicone和多孔聚乙烯porous polyethylene是最常用於顏面骨augmentation的材料。", "C": "放置植入體時骨膜下subperiosteal plane平面是首選。", "D": "植入體和骨頭間若有間隙將造成非預期性的加大unanticipated increases in augmentation。", "E": "若咬合狀況能接受,植入體手術可以替代或附屬於臉部不對稱的正顎手術orthognathic surgery in disproportioned faces。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面植入體（選錯誤者）：A錯誤——為降低污染與外露風險，置入切口應盡量『遠離』植入體位置，而非盡量靠近。正確者：B solid silicone與porous polyethylene為最常用材料；C subperiosteal plane為首選平面；D植入體與骨間有間隙會造成非預期加大augmentation；E若咬合可接受，植入體可替代或輔助不對稱臉之正顎手術。", "peropt": {"A": "✓(正解，即錯誤敘述) 切口應盡量『遠離』植入體以降低污染/外露，而非盡量靠近。", "B": "✗ 敘述正確：solid silicone與porous polyethylene為最常用顏面augmentation材料。", "C": "✗ 敘述正確：subperiosteal plane為放置首選。", "D": "✗ 敘述正確：植入體與骨間隙會造成非預期性加大。", "E": "✗ 敘述正確：咬合可接受時植入體可替代/輔助正顎手術。"}, "cite": "待複查（Neligan 顏面植入體 記憶佐證）", "conflict": ""}, {"id": "5207", "sub": "AE7", "src": "NG", "years": [110], "stem": "關於鼻部的解剖結構何者錯誤?", "opts": {"A": "鼻子的感覺神經是由infraorbital nerve 和 external nasal nerve支配。", "B": "在前鼻中膈血管密集的區域叫做Kiesselbach's area。", "C": "下側方軟骨lower lateral cartilages支撐外部鼻瓣 external nasal valve。", "D": "中鼻甲 middle turbinate對鼻腔裡的呼吸道阻力airway resistance影響最大。", "E": "在開放式鼻整形時上唇動脈的鼻小柱分枝將被截斷。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖：感覺由infraorbital nerve與external nasal nerve（前篩神經分支）支配（A對）；前鼻中膈血管密集區為Kiesselbach's/Little's area（B對）；lower lateral cartilages支撐external nasal valve（C對）；開放式鼻整形會截斷上唇動脈的鼻小柱分枝(columellar branch)（E對）。D錯——對鼻腔氣道阻力影響最大的是『inferior turbinate（下鼻甲）』與internal nasal valve，而非middle turbinate。", "peropt": {"A": "✗ 正確。感覺由infraorbital與external nasal nerve支配。", "B": "✗ 正確。前鼻中膈血管密集區為Kiesselbach's area。", "C": "✗ 正確。下側方軟骨支撐external nasal valve。", "D": "✓(正解，為錯誤敘述) 對氣道阻力影響最大者為inferior turbinate（下鼻甲），非middle turbinate。", "E": "✗ 正確。開放式鼻整形會截斷上唇動脈之鼻小柱分枝。"}, "cite": "待複查（Neligan 鼻部解剖 記憶佐證）", "conflict": ""}, {"id": "5208", "sub": "AE8", "src": "NG", "years": [110], "stem": "關於開放式鼻整形(open rhinoplasty)下列何者錯誤?", "opts": {"A": "開放式鼻整形術鼻部水腫的時間較長。", "B": "自體組織Autologous grafts移植比同種異體homograft或異質移植物alloplastic更受歡迎,因為有較低的感染率和脫出率extrusion。", "C": "鼻中膈重建和下鼻甲整形或黏膜下切除不能和開放式鼻整形同期實施。", "D": "鼻尖縫合技術Nasal tip suturing可以在不傷到骨骼軟骨框架破壞鼻部支撐的狀況下改善鼻尖的外觀。", "E": "在鼻中膈彎曲面f internal deviation的另一側通常會有下鼻甲inferior turbinate肥大的情形。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形（選『錯誤』者）：鼻中膈重建與下鼻甲整形/黏膜下切除『可以』與開放式鼻整形同期進行，故 C 稱『不能同期』為錯。易混淆：開放式因掀開皮瓣，鼻部水腫時間較長；自體移植優於同種異體/異質（感染與外露率低）；中膈彎曲對側常見代償性下鼻甲肥大。", "peropt": {"A": "✗（正確）開放式鼻部水腫時間較長。", "B": "✗（正確）自體移植優於 homograft/alloplastic（低感染/外露）。", "C": "✓（正解，錯誤敘述）中膈重建與鼻甲手術可與開放式鼻整形同期。", "D": "✗（正確）鼻尖縫合可改善外觀而不破壞支撐。", "E": "✗（正確）中膈彎曲對側常代償性下鼻甲肥大。"}, "cite": "待複查（Neligan 開放式鼻整形 記憶佐證）", "conflict": ""}, {"id": "5209", "sub": "AE8", "src": "NG", "years": [110], "stem": "關於密閉式鼻整形術的術後可能的問題何者為非?", "opts": {"A": "中穹頂(middle vault roof)和鼻翼軟骨(alar cartilage)的的切除常造成醫源性氣道阻塞", "B": "偶發的醫源性鼻中膈穿孔經常沒有明顯症狀", "C": "過度切除鼻甲可能造成持續性的鼻炎", "D": "鼻整形術後紅鼻通常於術後第一年可自行消退", "E": "為避免發生鼻中膈崩塌，在取鼻中膈軟骨時至少留下5mm邊緣做支撐"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 取鼻中膈軟骨時須保留足夠的 L-strut 支撐（背側與尾側各『至少 10（~15）mm』），以避免鞍鼻（saddle nose）/鼻中膈崩塌。E 說只留 5 mm 邊緣不足以支撐，為錯誤（本題問何者為非）。其餘：中穹頂/鼻翼軟骨過度切除→醫源性氣道阻塞、偶發鼻中膈穿孔常無症狀、過度切除鼻甲致持續性鼻炎、術後紅鼻多於第一年消退，皆正確。", "peropt": {"A": "✗ 中穹頂/鼻翼軟骨過度切除常致醫源性氣道阻塞，正確。", "B": "✗ 偶發鼻中膈穿孔常無明顯症狀，正確。", "C": "✗ 過度切除鼻甲可致持續性鼻炎，正確。", "D": "✗ 術後紅鼻通常第一年內自行消退，正確。", "E": "✓（正解，即錯誤敘述）取軟骨應留至少 10（~15）mm 的 L-strut，5 mm 不足以防崩塌。"}, "cite": "待複查（Neligan 鼻整形 L-strut 記憶佐證）", "conflict": ""}, {"id": "5210", "sub": "AE7", "src": "NG", "years": [110], "stem": "關於鼻偏移deviation與呼吸道下列何者錯誤?", "opts": {"A": "現在已經不偏好進行全鼻甲切除complete turbinectomy因為可能造成很多嚴重併發症。", "B": "內部鼻瓣的正常功能取決於下側軟骨lower lateral cartilages的結構完整性，鼻週肌肉組織perinasal musculature和足夠的軟組織覆蓋soft tissue coverage。", "C": "內部鼻瓣internal nasal valve是鼻內空氣流動的重要調節器。", "D": "下鼻甲前端肥大是鼻氣道阻塞的主要原因。", "E": "下三分之一鼻背處偏屈時可能需要鼻中膈旋轉縫合septal rotation suture。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻偏移與呼吸道（本題找錯誤）：正解 B——internal nasal valve 正常功能取決於「upper lateral cartilage」之結構完整性（＋鼻週肌肉與軟組織覆蓋），題目寫 lower lateral cartilage 有誤。正確者：不再偏好全鼻甲切除（易致空鼻症）；internal valve 為鼻內氣流重要調節處；下鼻甲前端肥大為阻塞主因；下三分之一鼻背偏屈可用 septal rotation suture。", "peropt": {"A": "✗ 已不偏好 complete turbinectomy（併發症多），正確。", "B": "✓(正解,錯誤敘述) Internal valve 功能取決於 upper（非 lower）lateral cartilage，故選。", "C": "✗ Internal nasal valve 為鼻內氣流重要調節器，正確。", "D": "✗ 下鼻甲前端肥大為鼻道阻塞主因，正確。", "E": "✗ 下三分之一偏屈可能需 septal rotation suture，正確。"}, "cite": "待複查（Neligan 鼻瓣/呼吸道 記憶佐證）", "conflict": ""}, {"id": "5211", "sub": "AE5", "src": "NG", "years": [110], "stem": "關於禿頭與植髮何者正確? (複選)", "opts": {"A": "毛髮被移植後通常會先進入休止期resting or telogen phase。", "B": "在男女最常見的掉髮同樣是雄性禿androgenic alopecia。", "C": "在替年輕病患植髮時通常建議先在額頭區和上區frontal and superior regions做植髮。", "D": "通常穩定的Norwood II型或III型禿髮患者能有良好的植髮結果。", "E": "在健康沒有瘢痕的個體植髮可以達到90~95%的成功率。"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 禿頭與植髮(複選選正確)皆成立：移植毛髮通常先進入telogen(休止期)再重新生長;男女最常見掉髮皆為androgenic alopecia;年輕病患植髮宜先做frontal與superior區;穩定的Norwood II-III型有良好植髮結果;健康無瘢痕個體植髮成功率約90-95%。", "peropt": {"A": "✓ 正確：移植後毛髮通常先進入休止期(telogen)再重生。", "B": "✓ 正確：男女最常見掉髮皆為androgenic alopecia。", "C": "✓ 正確：年輕病患建議先在frontal與superior區植髮。", "D": "✓ 正確：穩定的Norwood II或III型可有良好植髮結果。", "E": "✓ 正確：健康無瘢痕個體植髮成功率約90-95%。"}, "cite": "待複查（Neligan 植髮 記憶佐證）", "conflict": ""}, {"id": "5212", "sub": "AE1", "src": "NG", "years": [110, 114, 115], "stem": "關於brachioplasty，以下何者為最常見的術後併發症?", "opts": {"A": "Skin dehiscence", "B": "Skin necrosis", "C": "Bleeding", "D": "Deep vein thrombosis", "E": "Infection"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 上臂拉皮（brachioplasty）最常見術後併發症為傷口相關問題——傷口裂開（skin dehiscence）與肥厚性疤痕，肇因於切口張力大、位於活動關節附近。相對地skin necrosis、bleeding、DVT、infection較少見。故正解A。", "peropt": {"A": "✓(正解) 傷口裂開（skin dehiscence）為brachioplasty最常見併發症。", "B": "✗ Skin necrosis較不常見。", "C": "✗ Bleeding非最常見併發症。", "D": "✗ DVT在上臂手術罕見。", "E": "✗ Infection發生率低於傷口裂開。"}, "cite": "待複查（Neligan Brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5213", "sub": "AE3", "src": "NG", "years": [110, 112, 114, 115], "stem": "在liposuction使用tumescent technique 預估失血量佔抽出總體積的比例是多少?", "opts": {"A": "1%", "B": "10%", "C": "20%", "D": "30%", "E": "40%"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Tumescent technique因含epinephrine腫脹液使失血量僅約佔抽出總體積『1%』，是其安全核心（對照dry technique 20–45%）。⚠ 跨年數值誘答置換（Neligan 4e，110年 vs 113年）：110年誘答用20/30/40%，113年改用15/20/25%，數字雖不同但正解機轉一致——皆為約1%。作答時務必以『1%』為準，勿被改動的誘答數字誤導。", "peropt": {"A": "✓(正解) Tumescent失血約佔抽出量1%。", "B": "✗ 10%過高。", "C": "✗ 20%接近dry technique，非tumescent。", "D": "✗ 30%過高。", "E": "✗ 40%為dry technique極端值，非tumescent。"}, "cite": "待複查（Neligan 抽脂失血量 記憶佐證）", "conflict": "跨年數值差異（Neligan 4e vs Neligan 4e）：C: 110「20%」 vs 113「15%」；D: 110「30%」 vs 113「20%」；E: 110「40%」 vs 113「25%」"}, {"id": "5214", "sub": "AE1", "src": "NG", "years": [110, 112, 114, 115], "stem": "下列何者是腹部整形術(abdominoplasty)最常發生的併發症?", "opts": {"A": "Pulmonary embolism", "B": "DVT", "C": "Wound infection", "D": "Hematoma", "E": "Seroma"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Abdominoplasty 最常見併發症：為『seroma（血清腫）』，因大範圍 undermining 產生死腔與淋巴切斷。臨床重點：預防靠保留 Scarpa's fascia、progressive tension sutures、引流與壓力衣。易混淆：肺栓塞/DVT 雖最嚴重但非最常見；血腫、傷口感染發生率低於 seroma。", "peropt": {"A": "✗ 肺栓塞最嚴重但非最常見。", "B": "✗ DVT 非最常見併發症。", "C": "✗ 傷口感染發生率低於 seroma。", "D": "✗ 血腫非最常見。", "E": "✓（正解）seroma 為腹部整形最常見併發症。"}, "cite": "待複查（Neligan 腹部整形併發症 記憶佐證）", "conflict": ""}, {"id": "5215", "sub": "AE3", "src": "NG", "years": [110, 112, 114, 115], "stem": "在執行抽脂手術時，下列何者不是常用的formula?", "opts": {"A": "Klein's formula", "B": "Hunstad's formula", "C": "Fodor's formula", "D": "UT Southwestern formula", "E": "Parkland Formula"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂常用之 wetting/浸潤公式包括 Klein's formula（tumescent 之父）、Hunstad's formula、Fodor's formula、UT Southwestern formula。Parkland formula 為『燒傷』體液復甦公式（4 mL×%TBSA×kg），與抽脂無關，故為『非』抽脂公式。", "peropt": {"A": "✗ Klein's formula 為抽脂常用公式。", "B": "✗ Hunstad's formula 為抽脂公式。", "C": "✗ Fodor's formula 為抽脂公式。", "D": "✗ UT Southwestern formula 為抽脂公式。", "E": "✓（正解）Parkland formula 為燒傷復甦公式，非抽脂公式。"}, "cite": "待複查（Neligan 抽脂浸潤公式 記憶佐證）", "conflict": ""}, {"id": "5216", "sub": "AE3", "src": "NG", "years": [110, 114, 115], "stem": "下列關於男女生Fat deposition pattern敘述，何者錯誤?", "opts": {"A": "女性的脂肪大部分儲存在腹膜外", "B": "男性大部分呈現中廣型肥胖", "C": "女性身材傾向呈梨子形", "D": "男性身材傾向呈蘋果型", "E": "男性的脂肪會累積在腹部、臀部、及大腿"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 男女脂肪分布型態（本題找錯誤）：正解 E——「累積於腹部、臀部及大腿」屬「女性（gynoid/梨形）」分布；男性為 android（蘋果型，脂肪集中於腹部/內臟）。故 E 將女性型態誤植於男性。正確者：女性多皮下/腹膜外儲存、梨形；男性中央型（蘋果型）、內臟脂肪為主。", "peropt": {"A": "✗ 女性脂肪多儲於皮下/腹膜外，正確。", "B": "✗ 男性多為中央（中廣）型肥胖，正確。", "C": "✗ 女性傾向梨形（gynoid），正確。", "D": "✗ 男性傾向蘋果型（android），正確。", "E": "✓(正解,錯誤敘述) 腹/臀/大腿堆積屬女性型態，題目歸於男性有誤，故選。"}, "cite": "待複查（Neligan 脂肪分布型態 記憶佐證）", "conflict": ""}, {"id": "5217", "sub": "AE3", "src": "NG", "years": [110, 114, 115], "stem": "抽脂和身體雕塑有非常多種方式，有什麼其他Energy-based devices可以用在body contouring? (複選)", "opts": {"A": "Radiofrequency", "B": "Laser-assisted liposuction", "C": "Ultrasound-assisted liposuction", "D": "Cryolipolysis", "E": "High-intensity focused ultrasound"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Body contouring可用的energy-based devices(複選)皆成立：radiofrequency、laser-assisted liposuction(LAL)、ultrasound-assisted liposuction(UAL)、cryolipolysis、high-intensity focused ultrasound(HIFU)。⚠選項重排家族(與NG108-B06-Q09選項集合相同、字母不同)，記概念勿背字母。", "peropt": {"A": "✓ Radiofrequency為可用之能量式體雕裝置。", "B": "✓ Laser-assisted liposuction(LAL)為能量輔助抽脂。", "C": "✓ Ultrasound-assisted liposuction(UAL)為能量輔助抽脂。", "D": "✓ Cryolipolysis(冷凍溶脂)為非侵入能量式體雕。", "E": "✓ High-intensity focused ultrasound(HIFU)為能量式體雕裝置。"}, "cite": "待複查（Neligan energy-based body contouring 記憶佐證）", "conflict": "選項重排家族：與 NG108-B06-Q09 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5218", "sub": "AE1", "src": "NG", "years": [110], "stem": "關於thigh lift, 那些描述正確? (複選)", "opts": {"A": "外側thigh-lift可以影響大腿外側, 但只有些微拉緊大腿內側組織", "B": "在vertical thigh-lift procedure中，遠端的切除程度，可以根據膝蓋多餘的皮膚來決定，但不能由病人的意願以及疤痕的長度來決定切除多少", "C": "在病人只有些微deflated thighs而要求thigh-lift時，更進一步的減重也許是需要的", "D": "腳的淋巴主要集中在內側", "E": "若在thigh-lift過程中不小心傷到淋巴，也許會造成下肢淋巴水腫"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 大腿拉皮（thigh lift，選正確，複選）：A、C、E正確（同前述概念）；D此題敘述為『腳的淋巴主要集中在內側』，正確（下肢淋巴沿great saphenous vein走內側），故本題D入選。錯誤者僅B——遠端切除量不應以『不能由病人意願/疤痕長度決定』之絕對化方式表述。⚠ 本題與5194為同主題但D選項描述相反（內側vs外側），須依各題內文判斷，勿死背字母。", "peropt": {"A": "✓ 外側thigh-lift主要影響外側、僅些微拉緊內側。", "B": "✗ 絕對化表述不正確；遠端切除量亦可參考病人意願與可接受疤痕長度。", "C": "✓ 僅輕度deflated thighs者可能需先進一步減重。", "D": "✓ 本題敘述為下肢淋巴主要集中『內側』，正確。", "E": "✓ 術中傷及淋巴可致下肢淋巴水腫。"}, "cite": "待複查（Neligan Thigh lift 記憶佐證）", "conflict": ""}, {"id": "5219", "sub": "AE1", "src": "NG", "years": [110], "stem": "有關於腹部整形術的術後併發症, 以下哪些正確? (複選)", "opts": {"A": "抽菸者術後明顯有比較高的感染跟傷口癒合不佳的問題", "B": "BMI > 30 跟脂肪移除超過 1500g 的病人術後有比較高的機率發生肺栓塞。", "C": "術前接受過減肥手術 (Bariatric surgery) 比自然減重的病人更容易發生術後傷口併發症。", "D": "同一個時間進行多種不同的手術會增加術中跟術後併發症的風險。", "E": "應建議所有病人劃刀前給予預防性抗生素來降低術後傷口感染的機率。"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 腹部整形術後併發症（複選正確為ABCE）：抽菸者感染與傷口癒合不良明顯較高（A對）；BMI>30與脂肪移除>1500g者PE風險較高（B對）；曾接受bariatric surgery者較自然減重者傷口併發症多（可能與營養不良有關）（C對）；建議所有病人劃刀前給prophylactic antibiotics降低感染（E對）。D未納入——依所依教科書，在慎選病人下同期進行多術式並未被明確證實顯著增加併發症風險，故此敘述被列為『非』。", "peropt": {"A": "✓(正解) 抽菸者術後感染與傷口癒合不良明顯較高。", "B": "✓(正解) BMI>30與移除>1500g者PE風險較高。", "C": "✓(正解) 曾行減重手術者較自然減重者傷口併發症多。", "D": "✗ 依本題標準，慎選病人下同期多術式未被證實顯著增加併發症風險，故不列入。", "E": "✓(正解) 建議所有病人劃刀前給預防性抗生素。"}, "cite": "待複查（Neligan 腹部整形併發症 記憶佐證）（答案疑義，建議人工複查）", "conflict": ""}, {"id": "5220", "sub": "AE10", "src": "NG", "years": [110], "stem": "關於顏面神經(facial nerve) 的描述,下列何者為非?", "opts": {"A": "Pitanguy's line describes the course of the largest branch of the temporal division of the facial nerve.", "B": "The marginal mandibular nerve can be located above or below the level of the mandible. It is usually located between the platysma and the deep cervical fascia and is always superficial to the facial vessels.", "C": "The facial nerve is at significant risk of injury in the area right above the zygomatic arch.", "D": "The cervical branch of the facial nerve primarily supplies the platysma. Once injured of this nerve may be noticed obviously. Besides, the symptoms may include weakness of the lower lip depressors, which is often confused with injury to the mandibular nerve", "E": "The upper branches to the midfacial muscle (zygomatic branches) pierce the deep fascia approximately 4 cm in front of the tragus in close proximity (around 1 cm inferior) to the zygomatic ligaments."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經（選『為非』者）：cervical branch 損傷主司 platysma，臨床上通常『不明顯/易被忽略』，其造成下唇 depressor 無力（platysma 假性麻痺）常與 marginal mandibular 損傷『混淆』；D 稱其『may be noticed obviously（會明顯被察覺）』為錯。易混淆：Pitanguy's line 描述顳枝最大分支；marginal mandibular 恆位於 facial vessels 淺面。", "peropt": {"A": "✗（正確）Pitanguy's line 描述顳分區最大分支走向。", "B": "✗（正確）marginal mandibular 位於 platysma 與 deep cervical fascia 間，恆在 facial vessels 淺面。", "C": "✗（正確）顴弓正上方為顏面神經高風險區。", "D": "✓（正解，錯誤敘述）cervical branch 損傷通常不明顯，且易與 mandibular 損傷混淆（非『明顯被察覺』）。", "E": "✗（正確）zygomatic 分支於距耳屏前約 4cm 穿出 deep fascia，近 zygomatic ligaments。"}, "cite": "待複查（Neligan 顏面神經 記憶佐證）", "conflict": ""}, {"id": "5221", "sub": "AE9", "src": "NG", "years": [111], "stem": "關於肉毒桿菌毒素(botulinum toxin)的敘述，下列何者正確？", "opts": {"A": "Clostridium difficile可製造多種肉毒桿菌毒素，其中已被作為醫療製劑的為toxin types A and B。", "B": "BoNT‐B 比起 BoNT‐A，能更快的產生效用，持續時間較短，注射處較不疼痛。", "C": "施打肉毒桿菌素之劑量，應以皺紋深度作為主要評估依據，而非肌肉質量大小。", "D": "不同種類的肉毒桿菌毒素製劑，達到相同效果的劑量均相同。", "E": "針對Lambert–Eaton myasthenic syndrome及Myasthenia gravis病患，肉毒桿菌素之注射為禁忌症。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌毒素正確概念：對 Lambert–Eaton myasthenic syndrome 與 myasthenia gravis（神經肌肉接合處疾病）注射屬『禁忌症』（E 正確）。A 錯（產毒者為 Clostridium botulinum 非 difficile）；B 錯（BoNT-B 注射較『痛』，因製劑呈酸性）；C 錯（劑量依肌肉質量/體積而非皺紋深度）；D 錯（不同製劑單位不可等量互換）。", "peropt": {"A": "✗ 產毒者為 Clostridium botulinum，非 difficile。", "B": "✗ BoNT-B 注射較『痛』（酸性），此敘述錯誤。", "C": "✗ 劑量依肌肉質量/體積而定，非皺紋深度。", "D": "✗ 不同肉毒製劑單位不可等量互換。", "E": "✓（正解）對 LEMS 與 MG 注射為禁忌症，正確。"}, "cite": "待複查（Neligan 肉毒桿菌毒素 記憶佐證）", "conflict": ""}, {"id": "5222", "sub": "AE10", "src": "NG", "years": [111, 114, 115], "stem": "關於臉部老化的敘述,下列何者正確？", "opts": {"A": "Platysma完全沒有下顎骨(mandible)的附著點, 因此受老化的影響有限。", "B": "老化的過程包含皮膚,皮下組織,肌肉及骨骼的萎縮,但眼眶骨(orbital rim)不受影響。", "C": "Tear trough, zygomatic and mandibular ligament等osteo-cutaneous ligament,在老化的過程會逐漸鬆弛。", "D": "眉毛在老化的過程,因為frontalis muscle的收縮作用,外側眉毛的高度會逐漸上升。", "E": "上顎骨(maxilla)因老化而內縮，會使淚溝(tear trough)及法令紋(nasolabial fold)更不明顯。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部老化（本題找正確）：正解 C——tear trough、zygomatic、mandibular 等 osteocutaneous ligaments 於老化過程逐漸鬆弛，造成溝紋加深與軟組織下垂。錯誤者：platysma 有下頜附著且受老化影響（A 錯）；orbital rim/眶孔會隨老化擴大（B 錯）；老化時外側眉「下降」而非上升（D 錯）；上顎骨後縮會使 tear trough 與 nasolabial fold「更明顯」（E 錯）。", "peropt": {"A": "✗ Platysma 有下頜附著且受老化影響，敘述錯誤故不選。", "B": "✗ 眶緣/眶孔會隨老化擴大，「不受影響」錯誤故不選。", "C": "✓(正解) Tear trough、zygomatic、mandibular 等骨皮韌帶於老化逐漸鬆弛，正確。", "D": "✗ 老化時外側眉毛下降（非上升），錯誤故不選。", "E": "✗ 上顎後縮使 tear trough/法令紋更明顯（非更不明顯），錯誤故不選。"}, "cite": "待複查（Neligan 臉部老化 記憶佐證）", "conflict": ""}, {"id": "5223", "sub": "AE4", "src": "NG", "years": [111, 114, 115], "stem": "臉部拉皮(facelift)手術後,下列何者為傷口旁禿頭(alopecia)最常見的原因？", "opts": {"A": "血腫", "B": "感染", "C": "抽菸", "D": "顏面神經損傷", "E": "傷口過度的張力"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮術後傷口旁禿頭(alopecia)最常見原因為『傷口過度張力(excessive wound tension)』——張力壓迫毛囊血供致缺血性毛囊壞死。易混淆點：血腫、感染、抽菸、神經損傷雖各有影響，但切口旁禿頭的最主要機轉是張力性毛囊損傷。", "peropt": {"A": "✗ 血腫可致皮瓣問題，但非切口旁禿頭最常見原因。", "B": "✗ 感染可能損及毛囊，但非最主要原因。", "C": "✗ 抽菸影響血供，屬風險因子但非直接最常見原因。", "D": "✗ 顏面神經損傷造成運動障礙，與局部禿頭無直接關係。", "E": "✓(正解) 傷口過度張力壓迫毛囊血供，是切口旁禿頭最常見原因。"}, "cite": "待複查（Neligan 拉皮併發症 記憶佐證）", "conflict": ""}, {"id": "5224", "sub": "AE2", "src": "NG", "years": [111, 114, 115], "stem": "下列何者不是亞洲人常見的眼瞼特色？", "opts": {"A": "High crease, deep-set upper eyelid", "B": "Puffy crease-less upper eyelid", "C": "Epicanthal fold", "D": "Upward lateral canthal tilting", "E": "Wide intercanthal distance"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人眼瞼特色（選『非』典型者）：A『高皺褶、深陷型上眼瞼（high crease, deep-set）』是高加索人特徵，非亞洲人常見。亞洲人常見：puffy crease-less上眼瞼（皺褶淺或無、脂肪厚）、epicanthal fold（內眥贅皮）、upward lateral canthal tilt（外眥上斜）、wide intercanthal distance（內眥間距寬）。", "peropt": {"A": "✓(正解，即非亞洲特徵) 高皺褶、深陷上眼瞼為高加索人特徵，非亞洲人常見。", "B": "✗ Puffy crease-less上眼瞼為亞洲人常見特徵。", "C": "✗ Epicanthal fold為亞洲人常見特徵。", "D": "✗ Upward lateral canthal tilt為亞洲人常見特徵。", "E": "✗ Wide intercanthal distance為亞洲人常見特徵。"}, "cite": "待複查（Neligan 亞洲人眼瞼 記憶佐證）", "conflict": ""}, {"id": "5225", "sub": "AE9", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於fat grafting下列何者正確?(複選)", "opts": {"A": "理想的離心力約為3000 g。", "B": "離心後用於移植的脂肪位於離心管最下層。", "C": "脂肪移植可改善皮膚皺紋並填補缺損。", "D": "為避免血管內注射宜使用blunt canula注射。", "E": "血腫是脂肪移植最常見的併發症。"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Fat grafting正確觀念（複選正確為CD）：脂肪移植可改善皺紋並填補缺損（C對）；為避免血管內注射應使用blunt cannula（D對）。A錯：理想離心力約1200–1286g（≈3000rpm）而非3000g。B錯：離心後可用脂肪位於『中層』，最下層為血水/組織液、最上層為油脂。E錯：脂肪移植最常見併發症為脂肪壞死/油囊，而非血腫。⚠ 跨年誘答事實置換（對照NG108-B05-Q08）：概念相同但測到的具體事實（離心值、分層、併發症）被替換，須逐項辨真偽。", "peropt": {"A": "✗ 理想離心約1200–1286g（≈3000rpm），非3000g。", "B": "✗ 離心後可用脂肪在『中層』，非最下層（下層為血水）。", "C": "✓(正解) 脂肪移植可改善皺紋並填補缺損。", "D": "✓(正解) 用blunt cannula注射以避免血管內注射。", "E": "✗ 最常見併發症為脂肪壞死/油囊，非血腫。"}, "cite": "待複查（Neligan 脂肪移植 記憶佐證）", "conflict": "跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG108-B05-Q08）"}, {"id": "5226", "sub": "AE9", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於脂肪移植下列何者錯誤?", "opts": {"A": "移植大顆粒的脂肪(large globule of fat) 易造成central necrosis，進而導致脂肪吸收、volume減少或者cyst 的形成。", "B": "若想改善皮膚質地(skin quality)、減少皺紋(decreasing wrinkles)、或者撫平疤痕(reducing scar)最好是將fat graft 植入在骨膜上方(just above periosteum) 。", "C": "將fat植入較淺層處，易導致表面不規則(irregularity) 。", "D": "Molding可能導致fat移位或壞死(necrosis) 。", "E": "對於皮膚鬆弛的高齡病患，單純fat grafting 的效果有限，可先考慮facelift之後再依需求補充fat volume。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 脂肪移植（選『錯誤』者）：欲改善皮膚質地/減少皺紋/撫平疤痕，應將脂肪（nanofat/SVF）植入『較淺層（真皮/皮下淺層）』，而非骨膜上方深層；深層植入（just above periosteum）用於結構性 volume，故 B 錯。易混淆：大顆粒脂肪→central necrosis→吸收/囊腫；過淺植入→表面不規則。", "peropt": {"A": "✗（正確）大顆粒脂肪易 central necrosis 致吸收/囊腫。", "B": "✓（正解，錯誤敘述）改善膚質/皺紋/疤痕應植於淺層，非骨膜上方深層。", "C": "✗（正確）過淺植入致表面不規則。", "D": "✗（正確）molding 可致脂肪移位或壞死。", "E": "✗（正確）高齡鬆弛者宜先 facelift 再補脂肪。"}, "cite": "待複查（Neligan 脂肪移植 記憶佐證）", "conflict": ""}, {"id": "5227", "sub": "AE11", "src": "NG", "years": [111, 112], "stem": "關於Facial skeletal augmentation何者錯誤?", "opts": {"A": "放置植入體時骨膜下(subperiosteal plane)是首選。", "B": "固體矽樹酯(Solid silicone)和多孔聚乙烯(porous polyethylene)是最常用於顏面骨augmentation的材料。", "C": "置入的切口與植入體的位置必須盡量靠近。", "D": "植入體和骨頭間若有間隙將造成非預期性的過多提升 (unanticipated increases in augmentation) 。", "E": "若咬合狀況尚可,對於臉部不對稱(disproportioned faces)的病人，植入體手術可以替代正顎手術(orthognathic surgery)或與正顎手術(orthognathic surgery)合併執行。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面骨骼植入原則：置入切口應『遠離』植入物位置（remote incision），以降低感染與外露風險；C 說切口須盡量靠近植入物，方向相反，為錯誤。骨膜下為首選平面、solid silicone 與 porous polyethylene 為最常用材料、植入物與骨間有間隙會造成非預期過度隆起、咬合尚可時植入可替代/併行正顎手術，皆正確。", "peropt": {"A": "✗ 骨膜下平面為首選，正確。", "B": "✗ Solid silicone 與 porous polyethylene 最常用，正確。", "C": "✓（正解，即錯誤敘述）切口應遠離植入物以降低感染/外露，非盡量靠近。", "D": "✗ 植入物與骨間間隙會造成非預期過度隆起，正確。", "E": "✗ 咬合尚可時植入可替代或併行正顎手術，正確。"}, "cite": "待複查（Neligan 顏面骨植入 記憶佐證）", "conflict": ""}, {"id": "5228", "sub": "AE7", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻部的解剖構造下列何者正確? (複選)", "opts": {"A": "Facial artery會分出superior labial artery，往上分出philtral artery；再向上行走後形成columella artery。", "B": "Infraorbital nerve提供鼻翼基底(alar base),上唇(upper lip),和鼻外側壁(lateral nasal wall)的感覺支配。", "C": "Keystone area為nasal bone和upper lateral cartilage重疊處，約4-5mm，正常情況下為鼻背最寬的地方。", "D": "Upper lateral cartilage lies superifical to both the nasal bone and lower lateral cartilage。", "E": "在前鼻中膈血管密集的區域叫做Kiesselbach's area。"}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖（本題找正確，複選）：facial artery→superior labial→往上分 philtral、再形成 columella artery（A 對）；infraorbital nerve 支配鼻翼基底、上唇、鼻外側壁感覺（B 對）；keystone area 為鼻骨與 ULC 重疊約 4–5 mm、通常為鼻背最寬處（C 對）；前鼻中膈血管密集區為 Kiesselbach's/Little's area（E 對）。錯誤者 D——ULC 位於鼻骨「深面（deep）」且與 LLC 於 scroll 區重疊，非「superficial to both」（D 錯）。", "peropt": {"A": "✓ Facial→superior labial→philtral→columella artery 之走向，正確。", "B": "✓ Infraorbital nerve 支配鼻翼基底/上唇/鼻外側壁感覺，正確。", "C": "✓ Keystone area 為鼻骨-ULC 重疊 4–5mm、鼻背最寬處，正確。", "D": "✗ ULC 位於鼻骨深面（非表淺），敘述錯誤故不選。", "E": "✓ 前鼻中膈血管密集區為 Kiesselbach's area，正確。"}, "cite": "待複查（Neligan 鼻部解剖 記憶佐證）", "conflict": ""}, {"id": "5229", "sub": "AE7", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻部相關測量指標下列何者錯誤?", "opts": {"A": "Nasolabial angle 是鼻孔前後的連線(line between anterior and posterior ends of the nostril)與臉部垂直平面(vertical facial plane)所構成，女性通常為95-100∘，男性為90-95∘", "B": "Columellar-lobular angle 為columellar和lobular交角，在女性理想角度為30-45∘", "C": "鼻尖突度(Tip projection)的定義為alar base 到nasal tip的距離，由上唇最高點作一垂直線，若若鼻尖>60%在此線之前，可視為overprojection", "D": "評估鼻尖突度(Tip projection)另一方法為評估鼻部和面部的比例，若tip projection(alar base to nasal tip)與鼻子長度(radix to tip-defining points)的比率小於0.67，可視inadequate tip projection", "E": "Nasofrontal angle的位置比正常的位置更靠後或靠下(more posterior and inferior)，鼻子會看起來較長，但鼻尖突度會降低"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部測量指標(選錯誤)。正解E為誤述：Nasofrontal angle位置若更後/更下(radix較深較低)，鼻子會顯得『較短』且相對鼻尖突度『增加』，故『看起來較長、突度降低』的敘述方向相反。正確敘述：nasolabial angle女95-100/男90-95;columellar-lobular angle女理想30-45;tip projection定義與>60%過突;比率<0.67為突度不足。", "peropt": {"A": "✗ 正確：nasolabial angle女性約95-100度、男性約90-95度。", "B": "✗ 正確：columellar-lobular angle女性理想約30-45度。", "C": "✗ 正確：tip projection(alar base至tip)，>60%在上唇垂直線之前為overprojection。", "D": "✗ 正確：tip projection與鼻長比率<0.67視為突度不足。", "E": "✓(正解) 錯誤：radix更後更下時鼻顯較短且相對突度增加，方向與敘述相反。"}, "cite": "待複查（Neligan 鼻部測量 記憶佐證）", "conflict": ""}, {"id": "5230", "sub": "AE8", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於開放式鼻整形(open rhinoplasty)下列何者錯誤?", "opts": {"A": "開放式鼻整形術鼻部水腫的時間較長。", "B": "在執行dorsal hump reduction時，移除過多的upper lateral cartilage 可能導致 inverted -V deformity", "C": "鼻中膈重建(septal reconstruction)和下鼻甲整形(inferior turbinoplasty)或黏膜下切除(submucosal resection)不能和開放式鼻整形同期實施。", "D": "鼻尖縫合技術(Nasal tip suturing)可以在不傷到骨骼軟骨框架破壞鼻部支撐的狀況下改善鼻尖的外觀。", "E": "在鼻中膈彎曲面(internal deviation)的另一側通常會有下鼻甲肥大(inferior turbinate hypertrophy)的情形。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形（選錯誤者）：C錯誤——鼻中膈重建、inferior turbinoplasty或submucosal resection『可以』與開放式鼻整形同期實施。正確者：A開放式術後鼻部水腫時間較長；B去除過多ULC可致inverted-V deformity；D nasal tip suturing可在不破壞骨軟骨支撐下改善鼻尖；E中膈內偏側之對側常見代償性inferior turbinate hypertrophy。", "peropt": {"A": "✗ 敘述正確：開放式鼻整形術後鼻部水腫時間較長。", "B": "✗ 敘述正確：dorsal hump reduction移除過多ULC可致inverted-V deformity。", "C": "✓(正解，即錯誤敘述) 鼻中膈重建與下鼻甲整形/黏膜下切除『可』與開放式鼻整形同期進行。", "D": "✗ 敘述正確：nasal tip suturing可在不破壞支撐下改善鼻尖。", "E": "✗ 敘述正確：中膈內偏對側常見代償性下鼻甲肥大。"}, "cite": "待複查（Neligan Open rhinoplasty 記憶佐證）", "conflict": ""}, {"id": "5231", "sub": "AE7", "src": "NG", "years": [111, 112, 114, 115], "stem": "關於鼻偏移(nose deviation)和呼吸道障礙(airway issue),下列何者正確?(複選)", "opts": {"A": "三對鼻子外在肌(extrinsic group of perinasal musculature) 中，leviator labii superioirs alaeque nasi為最重要的dilator。", "B": "當懷疑鼻閥功能不全時，可以做Cottle test，當將臉頰向外牽拉時，呼吸狀態有改善，則視為po
