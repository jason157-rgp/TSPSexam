ical branch 會使 platysma/depressor 功能受影響、下唇無法下拉，臨床上貌似 marginal mandibular branch 麻痺，但因 cervical branch 損傷通常可自行恢復，稱 pseudoparalysis of marginal mandibular nerve。關鍵鑑別：微笑時下唇不對稱、但 mentalis 感覺與 depressor 逐漸恢復。", "peropt": {"A": "✗ Temporal branch 損傷造成額肌無力（抬眉不能），非此表現。", "B": "✗ Zygomatic branch 影響眼輪匝肌，非下唇假性麻痺。", "C": "✗ Buccal branch 影響中臉表情肌，非此症。", "D": "✗ Marginal mandibular 損傷為『真性』麻痺，非 pseudo-paralysis。", "E": "✓（正解）Cervical branch 損傷造成 pseudo-paralysis（可恢復），為正解。"}, "cite": "待複查（Neligan 顏面神經/facelift 記憶佐證）", "conflict": ""}, {"id": "5054", "sub": "AE4", "src": "NG", "years": [104], "stem": "通常顏面的皮膚會與底下的骨骼隆起處以retaining ligament 來做固定, 以下何者屬於true osteocutaneous ligament? (複選)", "opts": {"A": "Zygomatic ligament", "B": "Mandibular ligament", "C": "Parotid cutaneous ligament", "D": "Masseteric cutaneous ligament", "E": "Orbitial ligament"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "考生建議：萬年問題masseteric有課本認為是true ligament 有些章節認為不是", "key": "🎯 顏面 retaining ligaments 分為「true osteocutaneous ligament（骨→皮直接固定）」與「false/fascial ligament（筋膜間隔凝聚）」。True osteocutaneous 者為 zygomatic ligament、mandibular ligament 與 orbital ligament；parotid cutaneous 屬筋膜型。⚠ Masseteric cutaneous ligament 為「萬年爭議點」：部分教科書歸為 true ligament、部分章節則否——考試以概念作答，遇爭議選項須留意題幹版本。", "peropt": {"A": "✓ Zygomatic ligament（McGregor's patch）為典型 true osteocutaneous ligament。", "B": "✓ Mandibular ligament 自下頜骨旁緣直接固定至皮膚，為 true osteocutaneous ligament。", "C": "✗ Parotid cutaneous ligament 起自腮腺筋膜而非骨，屬 false/fascial type。", "D": "✗ Masseteric cutaneous ligament 一般歸為 false（筋膜型），惟屬爭議；本題未選入。", "E": "✓ Orbital ligament 固定於眶外緣骨面，為 true osteocutaneous ligament。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5055", "sub": "AE2", "src": "NG", "years": [104], "stem": "A youthful earlobe should have which one of the following anatomical setting?", "opts": {"A": "Earlobe is indistinct from the cheek, and that its long axis lies approximately 20 degrees posterior to the long axis of the pinna", "B": "Earlobe is distinct from the cheek, and that its long axis lies approximately 20 degrees posterior to the long axis of the pinna", "C": "Earlobe is indistinct from the cheek, and that its long axis lies approximately 20 degrees anterior to the long axis of the pinna", "D": "Earlobe is distinct from the cheek, and that its long axis lies approximately 15 degrees posterior to the long axis of the pinna", "E": "Earlobe is distinct from the cheek, and that its long axis lies approximately 15 degrees anterior to the long axis of the pinna"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 年輕耳垂(youthful earlobe)美學：耳垂應與臉頰『分明(distinct/free)』而非融合(attached/indistinct)，且其長軸相對於pinna(耳廓)長軸約向後傾15度。老化/拉皮不當會使耳垂變得與臉頰融合並向前下牽扯(pixie ear)。易混淆點：角度是15度(非20度)且為posterior(非anterior)。", "peropt": {"A": "✗ 與臉頰不分明且20度為誤，年輕耳垂應分明且約15度。", "B": "✗ 分明正確但角度20度過大。", "C": "✗ 與臉頰不分明且方向(anterior)皆錯。", "D": "✓(正解) 耳垂與臉頰分明，長軸相對pinna長軸約向後15度。", "E": "✗ 分明正確但方向應為posterior而非anterior。"}, "cite": "待複查（Neligan 耳垂美學 記憶佐證）", "conflict": ""}, {"id": "5056", "sub": "AE6", "src": "NG", "years": [104], "stem": "There are different variations of platysmal anatomy in the submental region. Which one of the following is true?", "opts": {"A": "Type I: Interdigitation of the platysmal muscles 1-2cm posterior to the mandibular symphysis, occurs in 50% of cases", "B": "Type I: Interdigitation of the platysmal muscles 1-2cm posterior to the mandibular symphysis, occurs in 75% of cases", "C": "Type II: Interdigitation of the platysmal muscles from the mandibular symphysis to the thyroid cartilage, occurs in 10% of cases", "D": "Type II: Interdigitation of the platysmal muscles from the mandibular symphysis to the hyoid bone, occurs in 10% of cases", "E": "Type III: No interdigitation of the platysmal muscle, occurs in 15% of cases"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頦下platysma解剖變異（de Castro分型）：Type I為兩側platysma於下頜聯合後1–2 cm處交錯（interdigitation），最常見，約佔75%；Type II自mandibular symphysis延伸至thyroid cartilage交錯，約15%；Type III兩側完全不交錯（no decussation），約10%。手術意義：Type III無交錯者做midline platysmaplasty效果有限。故B（Type I 75%）正確。", "peropt": {"A": "✗ Type I比例應為75%，非50%。", "B": "✓(正解) Type I（下頜聯合後1–2 cm交錯）約佔75%，最常見。", "C": "✗ Type II為交錯延伸至thyroid cartilage，比例約15%（非10%）。", "D": "✗ Type II延伸範圍應至thyroid cartilage而非hyoid，且比例應為15%。", "E": "✗ Type III（無交錯）比例約10%，非15%。"}, "cite": "待複查（Neligan Platysma anatomy 記憶佐證）", "conflict": ""}, {"id": "5057", "sub": "AE10", "src": "NG", "years": [104], "stem": "Which one of the following statement on facial analysis is correct?", "opts": {"A": "The nasofrontal angle is formed between the inferior forehead and the nasal dorsum; this is between 115 and 125 degrees", "B": "The nasofrontal angle is formed between the mid forehead and the nasal dorsum; this is between 125 and 135 degrees", "C": "The nasofacial angle is formed between the facial plane and the nasal dorsum; this is between 35 and 40 degrees", "D": "The nasofacial angle is formed between the facial plane and the nasal dorsum; this is between 25 and 30 degrees", "E": "The nasolabial angle is formed between the columella and the lower lip; this is between 100 and 103 degrees in men"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部角度分析須記牢：nasofrontal angle（下額與鼻背間）約115–130°；nasofacial angle（facial plane與鼻背間）約30–40°；nasolabial angle（columella與『上唇』間）男90–95°、女95–105°。選項C的nasofacial angle 35–40°落在正常範圍且定義正確，為唯一正確敘述。", "peropt": {"A": "✗ Nasofrontal angle定義大致對，但由inferior forehead而非題述來源，數值115–125偏窄且與B衝突，非最佳。", "B": "✗ Nasofrontal angle約115–130°，125–135°偏高，且非由mid forehead定義。", "C": "✓(正解) Nasofacial angle由facial plane與鼻背構成，35–40°落於正常30–40°區間，定義與數值皆正確。", "D": "✗ Nasofacial angle 25–30°偏低，錯誤。", "E": "✗ Nasolabial angle由columella與『上唇』構成（非下唇），且數值定義錯誤。"}, "cite": "待複查（Neligan 臉部角度分析 記憶佐證）", "conflict": ""}, {"id": "5058", "sub": "AE7", "src": "NG", "years": [104], "stem": "Which one of the following statement on the classification of nasal deviation is true?", "opts": {"A": "Type Ia: Caudal septal deviation, with concave C-shaped deformity", "B": "Type Ic: Caudal septal deviation with septal tilt", "C": "Type IIa: C-shaped deformity convex deformity", "D": "Type IIb: S-shaped convex dorsal deformity", "E": "Type III: S-shaped dorsal deformity"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻歪斜分類（nasal deviation classification，選『正確』者）：Type III 對應『S-shaped dorsal deformity』（E 正確）。易混淆：Type I 為 caudal septal deviation（含直/傾斜型）、Type II 多為 C-shaped dorsal deformity，各型的凹凸與 C/S 形對應常被互換誤配，須逐一對照。⚠此類分類各版本命名細節略有差異，建議對照原書圖表。", "peropt": {"A": "✗ Type Ia 對應之描述與 concave C-shaped 配對不符。", "B": "✗ Type Ic 配對描述有誤。", "C": "✗ Type IIa 之凹凸/形狀配對不符。", "D": "✗ Type IIb 配對描述有誤。", "E": "✓（正解）Type III 對應 S-shaped dorsal deformity。"}, "cite": "待複查（Neligan 鼻歪斜分類 記憶佐證，答案疑義建議對照原書分類圖）", "conflict": ""}, {"id": "5059", "sub": "AE8", "src": "NG", "years": [104], "stem": "How can post-rhinoplasty red nose be treated if it does not resolve spontaneously?", "opts": {"A": "Antibiotics therapy", "B": "Steroid injections", "C": "Laser", "D": "Graft removal; may consider replacement later", "E": "Conservative management"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻整形術後紅鼻（post-rhinoplasty red nose / persistent erythema）多於術後第一年內自行消退；若『未』自行消退，首選以血管性雷射（如 pulsed dye laser）治療擴張的表淺血管。非以抗生素、類固醇注射或移除移植物處理。", "peropt": {"A": "✗ 抗生素非紅鼻的治療。", "B": "✗ 類固醇注射對持續性紅鼻無效。", "C": "✓（正解）持續性紅鼻以雷射（血管雷射）治療。", "D": "✗ 移除 graft 非紅鼻的處置。", "E": "✗ 保守觀察僅適用可自行消退者；題目指未自行消退。"}, "cite": "待複查（Neligan 鼻整形併發症 記憶佐證）", "conflict": ""}, {"id": "5060", "sub": "AE7", "src": "NG", "years": [104], "stem": "In physics, the volume of laminar flow rate can be calculated using Poiseuille's law:", "opts": {"A": "Flow = Constant(K) x dP x r4 /Length", "B": "Flow = K x dP x r2 /Length", "C": "Flow = K x dP x r2 x resistance/Length", "D": "Flow = K x dP x r4 x viscosity/Length", "E": "Flow = K x dP x r4 x 2/Length"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Poiseuille's law 描述層流（laminar flow）：Flow ∝ 半徑四次方（r⁴）與壓力差（ΔP），反比於長度（L）與黏滯度（η）。臨床意義：鼻氣道阻力對半徑極度敏感——半徑減半，流量降至 1/16，故些微 internal nasal valve 狹窄即造成顯著阻塞。正確式為 Flow = K·ΔP·r⁴/L。", "peropt": {"A": "✓(正解) Flow = K·ΔP·r⁴/L，正確反映 r⁴ 與 ΔP 正比、L 反比之關係。", "B": "✗ r² 錯誤，應為 r 的四次方。", "C": "✗ 阻力（resistance）不應出現於分子且應為反比關係，式子錯誤。", "D": "✗ 黏滯度應在分母（反比），此式置於分子錯誤。", "E": "✗ 多出常數 2 且無物理依據，錯誤。"}, "cite": "待複查（Neligan 鼻氣道生理 Poiseuille 記憶佐證）", "conflict": ""}, {"id": "5061", "sub": "AE8", "src": "NG", "years": [104], "stem": "Which one of the following procedure has the most complications in the treatment of turbinate disorders?", "opts": {"A": "Cryosurgery", "B": "Laser turbinate reduction", "C": "Partial turbinatectmy", "D": "Complete turbinectomy", "E": "Turbinate outfracture"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻甲(turbinate)手術中併發症最多者為『complete turbinectomy(全鼻甲切除)』，因過度切除破壞黏膜纖毛與加濕功能，易致empty nose syndrome、atrophic rhinitis、頑固結痂與出血。現代觀念強調保留黏膜的減量術式(outfracture、partial reduction、submucosal)以維持功能。", "peropt": {"A": "✗ Cryosurgery為保守減量，併發症低。", "B": "✗ Laser turbinate reduction損傷有限，併發症相對少。", "C": "✗ Partial turbinectomy保留較多功能性黏膜，併發症低於全切除。", "D": "✓(正解) Complete turbinectomy併發症最多(empty nose、atrophic rhinitis、結痂出血)。", "E": "✗ Outfracture為最保守術式，併發症最低。"}, "cite": "待複查（Neligan 鼻甲手術 記憶佐證）", "conflict": ""}, {"id": "5062", "sub": "AE6", "src": "NG", "years": [104], "stem": "How can prominent anterior bellies of the digastric muscle be treated surgically in neck lift? (複選)", "opts": {"A": "Muscle splitting myectomy", "B": "Marginal myectomy", "C": "Anterior transposition", "D": "Incremental tangential shave excision", "E": "Transverse myotomy"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頸部拉皮處理肥大之二腹肌前腹（anterior belly of digastric）：當深層頸部輪廓不佳、二腹肌前腹突出時，可行減積手術，包括分肌切除（muscle splitting/partial myectomy）與漸進式切線削除（incremental tangential shave excision）以降低肌肉體積。marginal myectomy、anterior transposition、transverse myotomy非標準減積術式。故正解AD。", "peropt": {"A": "✓ Muscle splitting myectomy為降低二腹肌前腹體積的術式。", "B": "✗ Marginal myectomy非處理突出二腹肌前腹的標準術式。", "C": "✗ Anterior transposition非此適應症的處理方式。", "D": "✓ Incremental tangential shave excision（漸進削除）可保守降低肌肉突出。", "E": "✗ Transverse myotomy非二腹肌前腹減積之標準術式。"}, "cite": "待複查（Neligan Neck lift digastric 記憶佐證）", "conflict": ""}, {"id": "5063", "sub": "AE11", "src": "NG", "years": [104], "stem": "In cases of facial implant-related infections, which of the followings are deemed appropriate? (複選)", "opts": {"A": "Aggressive debridement", "B": "Implant removal", "C": "Antibiotics therapy", "D": "Implant may be replaced in 3-6 months", "E": "Open drainage and wound care"}, "ans": "BC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面植入物感染的處置原則（複選）：一旦植入物確立感染，核心為『移除植入物(Implant removal)』加上『全身性抗生素(Antibiotics)』。感染的alloplastic implant周圍為avascular囊袋，單靠清創/引流無法根除，通常須取出，待感染完全控制後（一般數月）再考慮更換。故正解為B、C。", "peropt": {"A": "✗ 對感染的alloplastic植入物，aggressive debridement非主要處置，難以清除植入物-組織界面之生物膜。", "B": "✓(正解) 移除植入物為感染的關鍵處置。", "C": "✓(正解) 併用全身性抗生素治療。", "D": "✗ 雖臨床上取出後常於數月再置換，但本題標準答案未納入此選項。", "E": "✗ Open drainage與傷口照護非解決植入物感染的根本手段。"}, "cite": "待複查（Neligan 顏面植入物感染 記憶佐證）（答案疑義，建議人工複查）", "conflict": ""}, {"id": "5064", "sub": "AE7", "src": "NG", "years": [104], "stem": "The intrinsic muscles of the nose are important to maintain a patent nasal airway, these include: (複選)", "opts": {"A": "Nasalis", "B": "Procerus", "C": "Levator alae nasi", "D": "Depressor septi nasi", "E": "Levator labii alaeque"}, "ans": "AC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻部內在肌（intrinsic muscles，維持鼻氣道通暢，複選）：具鼻孔擴張/穩定外鼻瓣作用者為 nasalis（尤其 dilator naris/pars alaris）與 levator alae 群（AC）。易混淆：procerus（鼻眉肌）主降眉/水平紋、depressor septi nasi 為降肌、levator labii superioris alaeque nasi 屬提肌群，非維持氣道通暢之主要內在肌。", "peropt": {"A": "✓（正解）nasalis 之 dilator naris 擴張鼻孔、維持氣道。", "B": "✗ procerus 為降眉/表情肌，非維持氣道。", "C": "✓（正解）levator alae 群協助維持鼻翼/氣道。", "D": "✗ depressor septi nasi 為降鼻中膈肌。", "E": "✗ levator labii superioris alaeque nasi 為提上唇/鼻翼肌，非氣道內在肌。"}, "cite": "待複查（Neligan 鼻部肌肉解剖 記憶佐證）", "conflict": ""}, {"id": "5065", "sub": "AE5", "src": "NG", "years": [104, 105], "stem": "關於頭髮的描述何者為非?", "opts": {"A": "任何時期都有約90%的頭髮處於生長期(anagen)", "B": "生長期(anagen)一般可持續達二到五年", "C": "休止期(telogen)大約可持續達三到四個月", "D": "生長期(anagen)、退化期(catagen)和休止期(telogen)三者中退化期最短", "E": "通常植髮手術後約須一到兩個月才可見到頭髮明顯的增長"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 毛髮週期與植髮：任何時間約 90% 毛髮處於 anagen（生長期，2–5 年），telogen（休止期）約 3–4 個月，catagen（退化期）最短（約 1–2 週）。植髮後移植毛通常先進入 telogen 而『脫落』，約 3–4 個月後才見明顯新生，並非 1–2 個月，故 E 為錯誤敘述。", "peropt": {"A": "✗ 約 90% 毛髮處於 anagen，正確。", "B": "✗ Anagen 可持續 2–5 年，正確。", "C": "✗ Telogen 約 3–4 個月，正確。", "D": "✗ Catagen 最短，正確。", "E": "✓（正解，即錯誤敘述）植髮後約需 3–4 個月才見明顯增長，非 1–2 個月。"}, "cite": "待複查（Neligan 毛髮週期/植髮 記憶佐證）", "conflict": ""}, {"id": "5066", "sub": "AE3", "src": "NG", "years": [104], "stem": "有關使用 Lidocaine 在抽脂手術時,下列何者為誤?", "opts": {"A": "做wetting solution抽脂，宜在打入solution後7至30分鐘內開始抽脂", "B": "許多研究指出,lidocaine 的用量可因稀釋濃度並且與 epinephrine 共同使用而增加", "C": "傳統建議 lidocaine with epinephrine 的最大使用量為 7mg/kg，而Klein學者研究建議指出,如果使用0.05% lidocaine with epinephrine 1:1,000,000的話, lidocaine安全劑量可達35mg/kg，大量抽脂者，最高的甚至可達55mg/kg", "D": "有肝功能異常的患者,不會增加lidocaine中毒的機會", "E": "有腎功能異常的患者,則會增加lidocaine中毒的機會"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂 lidocaine 藥理核心：lidocaine 主要經「肝臟 CYP450」代謝——故肝功能異常「會」增加中毒風險；本題錯誤敘述為「肝功能異常不會增加中毒機會」。正確觀念：wetting solution 稀釋＋epinephrine 可安全提高用量（Klein tumescent 達 35，甚至大量抽脂 55 mg/kg）；打液後宜等 7–30 分鐘（epinephrine 血管收縮高峰）再抽；腎功能異常影響代謝物排除而增中毒風險。", "peropt": {"A": "✗ 打入 wetting solution 後宜等 7–30 分鐘再抽脂，屬正確敘述。", "B": "✗ 稀釋＋合併 epinephrine 可增加 lidocaine 安全用量，正確。", "C": "✗ 傳統上限 7 mg/kg，tumescent 可達 35、大量抽脂達 55 mg/kg，正確。", "D": "✓(正解,錯誤敘述) Lidocaine 經肝代謝，肝功能異常「會」增加中毒風險，故此敘述錯誤。", "E": "✗ 腎功能異常會影響代謝物排除而增加中毒風險，正確。"}, "cite": "待複查（Neligan 抽脂 lidocaine 藥理 記憶佐證）", "conflict": ""}, {"id": "5067", "sub": "AE1", "src": "NG", "years": [104, 105], "stem": "腹壁的血液供應在腹部整形術很重要，根據Huger學者的定義，Zone 2的血液供應主要來自下列系統，何者除外?", "opts": {"A": "The Superficial Epigastric System", "B": "The Superficial External Pudendal System", "C": "The Superficial Circumflex Iliac System", "D": "The Deep Circumflex Iliac System", "E": "All of Above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 依Huger腹壁血供分區：Zone I(中央)由deep(superior/inferior) epigastric arcade供應;Zone II(下腹恥骨上區)由淺層系統供應——superficial epigastric、superficial external pudendal、superficial circumflex iliac;Zone III(側腹)由intercostal/subcostal/lumbar供應。故Deep circumflex iliac system不屬Zone II的主要供應(為除外選項)。臨床意義：abdominoplasty掀起皮瓣會犧牲deep epigastric穿支，術後皮瓣主要靠Zone III側支存活。", "peropt": {"A": "✗ Superficial epigastric system屬Zone II主要供應，非除外。", "B": "✗ Superficial external pudendal system屬Zone II供應，非除外。", "C": "✗ Superficial circumflex iliac system屬Zone II供應，非除外。", "D": "✓(正解，除外) Deep circumflex iliac system非Zone II的主要供應來源，為題目所問的例外。", "E": "✗ 因D為例外，故非All of Above。"}, "cite": "待複查（Neligan/Huger zones 腹壁血供 記憶佐證）", "conflict": ""}, {"id": "5068", "sub": "AE1", "src": "NG", "years": [104], "stem": "以下關於Lipoabdominoplasty的敘述，何者錯誤?", "opts": {"A": "巴西學者Saldanha於2001年首先提出並推廣，結合了liposuction和abdominoplasty的兩者優點。", "B": "其基本概念是保留腹壁血流至皮下的穿通枝及使用表淺的抽脂術。", "C": "在抽脂的時候為了較佳的視野及腹壁的較大的的移動性，需把Scarpa's fascia層的脂肪抽掉。", "D": "在selective undermining的時候，其範圍限制在兩條腹直肌的內側緣之間，以保留最大的血管穿通枝", "E": "以上皆正確"}, "ans": "C", "multi": false, "etype": "ai", "expl": "(p562, The preservation of Scarpa's fascia is important for many reasons. There is less bleeding due to preservation of the inferior perforating vessels; there is homogeneous support for the upper flap, which becomes thinner on its descent; it provides shorter scars laterally because the preservation of Scarpa's fascia and the rectus muscle plication produce a centripetal retraction, reducing the final surgical scar in 30% of cases to shorter than the initial incision.)", "key": "🎯 Lipoabdominoplasty（Saldanha, 2001）核心是『保留Scarpa's fascia』：保留Scarpa's fascia及其下inferior perforating vessels可減少出血、對上皮瓣提供均勻支撐、並因向心性收縮而縮短側邊疤痕。因此C『抽脂時需把Scarpa's fascia層脂肪抽掉』與核心理念相反，為錯誤。其餘正確：Saldanha首倡結合lipo與abdominoplasty優點、保留穿通枝與淺層抽脂、selective undermining限於兩側腹直肌內側緣之間以保留最大血管穿通枝。", "peropt": {"A": "✗ 敘述正確：Saldanha於2001年首倡lipoabdominoplasty，結合兩者優點。", "B": "✗ 敘述正確：基本概念為保留腹壁至皮下之穿通枝並採淺層抽脂。", "C": "✓(正解，即錯誤敘述) 應『保留』Scarpa's fascia及其下穿通枝以減少出血、支撐皮瓣，而非把該層脂肪抽掉。", "D": "✗ 敘述正確：selective undermining限於兩側腹直肌內側緣間以保留最大血管穿通枝。", "E": "✗ 因C錯誤，故非『以上皆正確』。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5069", "sub": "AE1", "src": "NG", "years": [104, 105], "stem": "下腹部整形術(lower bodylifts)最常見的併發症，為：", "opts": {"A": "傷口感染(wound infection)", "B": "血清血腫(seroma)", "C": "組織壞死(tissue necrosis)", "D": "術後出血(Bleeding)", "E": "肺部血栓(pulmonary emboli)"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下半身提升術(lower body lift)最常見的併發症為『seroma（血清腫）』——因大範圍皮下剝離造成腔隙與淋巴中斷，液體堆積。臨床對策：留置引流管、quilting/progressive tension縫合、加壓衣。其餘如感染、組織壞死、出血、肺栓塞雖須警覺（尤其PE為致命併發症），但發生率均低於seroma。", "peropt": {"A": "✗ 傷口感染有發生但非最常見。", "B": "✓(正解) Seroma為lower body lift最常見併發症。", "C": "✗ 組織壞死較常見於張力過大/抽菸者，非最常見。", "D": "✗ 術後出血相對少見。", "E": "✗ 肺栓塞是最致命但非最常見的併發症。"}, "cite": "待複查（Neligan 減重後身體塑形 記憶佐證）", "conflict": ""}, {"id": "5070", "sub": "AE3", "src": "NG", "years": [104, 105], "stem": "以下關於臀部增大術的敘述，何者錯誤?", "opts": {"A": "根據Singh學者的研究，吸引大多數男性目光的女性體態其腰臀比為0.7", "B": "女性臀型吸引人的關鍵在於脂肪層的厚度與分布，而這些脂肪佔約臀部體積的50~60%", "C": "目前有三種較為接受的增大方式：肌肉內植入物置放、筋膜層下植入物置放、自體微脂肪移植", "D": "在必要的情況下，也可以採用皮下層置放植入物的方式。", "E": "不同種族的審美觀對於臀部大小、側面臀部與大腿的飽滿度需求也不同。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臀部增大術（選『錯誤』者）：目前可接受的三種增大方式為肌肉內（intramuscular）、筋膜下（subfascial）植入及自體脂肪移植；『皮下層（subcutaneous/subdermal）置放植入物』因併發症高（位移、可觸、感染、莢膜攣縮）並非可接受方式，故 D 錯。易混淆：Singh 研究吸引男性目光的女性腰臀比為 0.7。", "peropt": {"A": "✗（正確）Singh 研究理想 WHR 約 0.7。", "B": "✗（正確）臀部脂肪約佔體積 50–60%，其厚度與分布為關鍵。", "C": "✗（正確）三種可接受方式：肌肉內、筋膜下、自體脂肪移植。", "D": "✓（正解，錯誤敘述）皮下層置放植入物併發症高，非可接受方式。", "E": "✗（正確）不同種族審美對臀型需求不同。"}, "cite": "待複查（Neligan 臀部增大 記憶佐證）", "conflict": ""}, {"id": "5071", "sub": "AE1", "src": "NG", "years": [104], "stem": "以下關於brachioplasty的敘述，何者錯誤?", "opts": {"A": "由於減肥手術的快速成長，減肥後的手臂外觀不良成為整形外科醫師日趨增加面對的臨床挑戰。", "B": "接受brachioplasty的適合者為健康、達到穩定體重的個體，BMI小於28，且減重成功至少約50磅(23公斤)", "C": "術後最常見的併發症是皮膚未癒合裂開，約佔四分之一的個案", "D": "Seroma是第二常見的的併發症，約佔十分之一的個案，大多數在上臂遠端三分之一的外側緣", "E": "以上選項皆非(None of above)。"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty（上臂整形）併發症：最常見為傷口癒合不良/裂開（wound dehiscence，約 1/4）與肥厚性疤痕；seroma 亦可見。D 選項對 seroma 之發生率與位置的描述有誤（非如此比例/固定於遠端外側緣），為本題錯誤敘述。候選者一般為健康、體重穩定、BMI 較低且顯著減重者。", "peropt": {"A": "✗ 減重手術盛行使減重後上臂外觀不良之臨床需求增加，正確。", "B": "✗ 適合者為健康、體重穩定、BMI 較低且顯著減重者，敘述可接受。", "C": "✗ 傷口裂開為最常見併發症（約 1/4），正確。", "D": "✓（正解，即錯誤敘述）Seroma 的比例/固定位置描述有誤，為本題錯誤處。", "E": "✗ 已有錯誤選項，故非『以上皆非』。"}, "cite": "待複查（Neligan 上臂整形/brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5072", "sub": "AE1", "src": "NG", "years": [104, 105], "stem": "以下關於Post-bariatric reconstruction的敘述，何者錯誤?", "opts": {"A": "一般用來檢測是否肥胖的標準是身體質量指數(body mass index, BMI)，根據WHO的標準，BMI=25~29.99算體重過重，BMI≧30則是肥胖。", "B": "大量減重的定義為減重成功至少約50磅(23公斤)", "C": "目前美國最常見的減肥手術是gastric bypass或是roux-en-Y gastric bypass", "D": "在大量減重病人的身體輪廓重建手術中，參與手術人員對於手術的熟悉度、麻醉科人員對於病人的生理與構造改變敏感度都非常重要，以確保病人安全與手術時間縮短。避免低體溫尤其重要，最低體溫不能低於攝氏35度。", "E": "以上選項皆非(None of above)。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題為「找錯誤」，正解為 E（以上皆非，即 A–D 皆正確）。須熟記：WHO 之 BMI 25–29.99 為過重、≥30 為肥胖；massive weight loss 定義為減重≥約 50 磅（23 kg）或減去多餘體重 50%；美國最常見減重手術為 Roux-en-Y gastric bypass；大量減重病人重建須注意團隊熟悉度與體溫維持（核心體溫不低於 35°C）。四項皆正確，故選 E。", "peropt": {"A": "✗ WHO BMI 25–29.99 過重、≥30 肥胖，敘述正確。", "B": "✗ MWL 定義為減重≥約 50 磅（23 kg），正確。", "C": "✗ 美國最常見減肥手術為 Roux-en-Y gastric bypass，正確。", "D": "✗ 維持體溫（≥35°C）與團隊熟悉度確為安全重點，正確。", "E": "✓(正解) A–D 皆正確，故本題「找錯誤」之答案為「以上皆非」。"}, "cite": "待複查（Neligan post-bariatric reconstruction 記憶佐證）", "conflict": ""}, {"id": "5073", "sub": "AE11", "src": "NG", "years": [104, 105], "stem": "以下關於生殖器美容手術的敘述，何者錯誤?", "opts": {"A": "自我認同與自尊自信跟個人對自己生殖器的外觀息息相關，病人的自我意識使得外生殖器美容手術蓬勃發展，並且成為整形外科醫生新的臨床挑戰。", "B": "陰莖增長術是將陰莖的suspensory ligament鬆開，並搭配V-Y flap，可延長陰莖未勃起時的長度。病人術後必須使用stretching devices數月甚至數年以拉長海綿體。", "C": "隱匿性陰莖(Hidden penis)對於病人的自信心影響很大，此重建手術部分技巧來自於治療pediatric buried penis。術後一般來說都非常成功，對於病人自信與自尊的改善很多。", "D": "小陰唇肥大的縮小術(Labia minora reduction)可因嚴重影響其自信與嚴重不舒服 感，最早可在12歲時進行手術", "E": "以上選項皆非(None of above)。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 生殖器美容手術敘述皆正確，故『以上皆非(none is wrong)』為正解。要點：外生殖器外觀與自尊自信相關;陰莖增長以鬆解suspensory ligament搭配V-Y flap延長鬆弛態長度並需長期stretching;隱匿性陰莖重建借鑑pediatric buried penis;小陰唇肥大縮小術最早可於約12歲(青春期發育後)進行。", "peropt": {"A": "✗(敘述正確) 生殖器外觀與自我認同/自尊密切相關，推動美容手術發展。", "B": "✗(敘述正確) 陰莖增長鬆解suspensory ligament加V-Y flap，術後需長期stretching。", "C": "✗(敘述正確) 隱匿性陰莖重建技巧部分源自pediatric buried penis，成效良好。", "D": "✗(敘述正確) 小陰唇縮小術最早約12歲可施行。", "E": "✓(正解) 以上A-D皆為正確敘述，故無錯誤者，選『以上皆非』。"}, "cite": "待複查（Neligan 生殖器美容 記憶佐證）", "conflict": ""}, {"id": "5074", "sub": "AE4", "src": "NG", "years": [104, 108], "stem": "有關頭頸部解剖構造的描述，何者為非?", "opts": {"A": "Superficial temporal fascia進入mid face，變成SMAS，包覆顏面表情肌。", "B": "跨過zygomatic arch時，frontal branch of facial nerve is superficial to superficial temporal fascia", "C": "Deep temporal fascia進入midface，變成parotid-masseteric fascia", "D": "Pitanguy's line是定位frontal branch of facial nerve的走向。", "E": "咀嚼肌包括temporalis, masseter, lateral pterygoid muscle和medial pterygoid muscle，由trigeminal nerve的mandibular division支配。"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頭頸部筋膜層次（選錯誤者）：跨越顴弓（zygomatic arch）時，facial nerve的frontal branch走在temporoparietal fascia（superficial temporal fascia）的深面/其內，而非其淺面，故B『superficial to superficial temporal fascia』為錯誤。正確層次觀念：superficial temporal fascia向下延續為SMAS並包覆表情肌；deep temporal fascia向下延續為parotid-masseteric fascia；Pitanguy's line定位frontal branch走向；咀嚼肌由三叉神經下頜支支配。", "peropt": {"A": "✗ 敘述正確：superficial temporal fascia入中臉延續為SMAS，包覆表情肌。", "B": "✓(正解，即錯誤敘述) frontal branch跨顴弓時走於superficial temporal fascia之深面/內，非其淺面。", "C": "✗ 敘述正確：deep temporal fascia入中臉延續為parotid-masseteric fascia。", "D": "✗ 敘述正確：Pitanguy's line用以定位frontal branch走向。", "E": "✗ 敘述正確：咀嚼四肌由三叉神經mandibular division支配。"}, "cite": "待複查（Neligan 頭頸部筋膜解剖 記憶佐證）", "conflict": ""}, {"id": "5075", "sub": "AE9", "src": "NG", "years": [105], "stem": "關於肉毒桿菌毒素(botulinum toxin)的注射，下列何者為非？", "opts": {"A": "已知Clostridium botulinum 可製造多種肉毒桿菌毒素，其中在醫療上已被作為商品化製劑的為Botulinum toxin types A and B", "B": "可應用在部分神經肌肉傳導疾病的治療，如limb spasticity, cervical dystonias, 以及Lambert–Eaton myasthenic syndrome", "C": "為避免術後發生bruising or ecchymosis, 病人在術前兩週應停用 aspirin 及 NSAID 藥物", "D": "術後應避免提重物 劇烈運動等大量消耗體力的活動", "E": "必要時可同時併用filler injection或是Laser，以達到更好的術後效果"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 BoNT作用於突觸前，抑制ACh釋放。可治療上運動元性/肌張力異常疾病（limb spasticity、cervical dystonia）；但『Lambert–Eaton myasthenic syndrome』本身為突觸前NMJ傳導缺陷，使用BoNT會加重無力，屬禁忌，故選項B為非。其餘關於商品化A/B型、術前停aspirin/NSAID 2週、術後避免劇烈活動、可併用filler或laser皆正確。", "peropt": {"A": "✗ 正確。醫療商品化製劑為Botulinum toxin type A與B。", "B": "✓(正解，為錯誤敘述) LEMS為突觸前NMJ疾病，屬BoNT禁忌，不應列為適應症。", "C": "✗ 正確。術前2週停aspirin/NSAID以減少瘀青。", "D": "✗ 正確。術後避免劇烈活動與提重物。", "E": "✗ 正確。可併用filler或laser以增強效果。"}, "cite": "待複查（Neligan BoNT臨床應用 記憶佐證）", "conflict": ""}, {"id": "5076", "sub": "AE9", "src": "NG", "years": [105], "stem": "關於皮下注射填充物(filler)所產生併發症之敘述，下列何者為是？(複選)", "opts": {"A": "常見之併發症為皮膚腫塊, 不規則隆起, 疼痛, 血腫瘀青等", "B": "玻尿酸(HA)發生過敏反應的發生率約1/3000", "C": "一次注射較多量的填充物，產生sterile abscess 的機率較高", "D": "產生nodule lesion時，治療方式包括局部按摩，類固醇注射或是局部切除", "E": "玻尿酸注射在真皮層若是太表淺，可能產生bluish discoloration (Tyndall effect)"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 皮下填充物併發症（複選，選『為是』者）：ABCDE 皆正確——常見併發症含腫塊/不規則/疼痛/瘀青；量大注射易致 sterile abscess；nodule 治療含按摩、類固醇注射、局部切除；太表淺致 Tyndall effect（bluish discoloration）。⚠跨年數值差異：本題（105/Neligan 3e）HA 過敏率『約 1/3000』，而 110（Neligan 4e）改為『約 0.03%』，須依該年題幹版本作答。", "peropt": {"A": "✓ 常見併發症包含腫塊、不規則、疼痛、瘀青。", "B": "✓ 本版（105）HA 過敏率約 1/3000（⚠與 110 之 0.03% 不同版本）。", "C": "✓ 單次大量注射 sterile abscess 機率較高。", "D": "✓ nodule 治療含按摩、類固醇注射、局部切除。", "E": "✓ 真皮太表淺注射致 Tyndall effect。"}, "cite": "待複查（Neligan 3e 填充物併發症 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 4e）：B: 105「玻尿酸(HA)發生過敏反應的發生率約1/3000」 vs 110「玻尿酸(HA)發生過敏反應的發生率約0.03%」 ‖ 跨年數值差異（Neligan 3e vs Neligan 3e）：題幹數值不同"}, {"id": "5077", "sub": "AE10", "src": "NG", "years": [105, 107], "stem": "關於Aging face的敘述，下列何者為非？", "opts": {"A": "真皮層的collagen(尤其是type I和type III)以及elastin會減少", "B": "臉部骨骼肌萎縮50%以上，包括咀嚼相關肌肉，如temporalis以及masseter", "C": "forehead/eyebrow complex 會隨年齡增長而下垂，造成上眼瞼假性過多的現象", "D": "上顎(maxilla)的內縮(retrusion)會使淚溝(tear trough)及法令紋(nasolabial fold)較不明顯", "E": "platysma muscle隨著下臉部及頸部老化而延長"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 老化臉部骨骼與軟組織：上顎（maxilla）隨年齡發生 retrusion/resorption，會使 tear trough 與 nasolabial fold『更加明顯』（因中臉支撐流失、軟組織下垂），故 D 說『較不明顯』為錯誤。真皮 collagen（I、III）與 elastin 減少、額眉複合體下垂造成上瞼假性皮膚過多、platysma 隨頸部老化延長，皆為正確老化變化。", "peropt": {"A": "✗ 真皮 type I/III collagen 與 elastin 減少，正確。", "B": "✗ 咀嚼肌等臉部肌肉隨老化萎縮，敘述視為正確。", "C": "✗ 額/眉複合體下垂造成上瞼假性皮膚過多，正確。", "D": "✓（正解，即錯誤敘述）Maxilla retrusion 會使 tear trough 與 nasolabial fold『更明顯』，非較不明顯。", "E": "✗ Platysma 隨下臉/頸老化而延長，正確。"}, "cite": "待複查（Neligan 老化臉部解剖 記憶佐證）", "conflict": ""}, {"id": "5078", "sub": "AE2", "src": "NG", "years": [105], "stem": "有關眼皮手術，下列何者敘述為是？(複選)", "opts": {"A": "Transconjunctival blepharoplasty 適合用來治療下眼瞼皮膚過多及canthal position不好的病人", "B": "Orbicularis repositioning可以除去hypotonic and herniated orbicularis muscle，同時也可以縮短下眼瞼至臉頰的距離", "C": "後天上眼瞼下垂(congenital ptosis)最常見的原因是Levator aponeurosis disinsertion或dehiscence", "D": "常運用\"distraction\" 或是 \"snap\" test來評估下眼瞼的鬆弛度", "E": "Retrobulbar hemorrhage不會發生在眼皮手術術後，不需特別在意"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題找「正確」敘述（複選）：Orbicularis repositioning 可去除鬆弛疝出之眼輪匝肌並縮短瞼-頰距離（B 對）；後天（aponeurotic）ptosis 最常見原因為 levator aponeurosis disinsertion/dehiscence（C 對，內容指後天鬆脫）；distraction/snap test 評估下眼瞼鬆弛（D 對）。錯誤者：transconjunctival 入路「不」處理多餘皮膚或 canthal 位置（A 錯）；retrobulbar hemorrhage 為術後可致失明之急症，絕不可忽視（E 錯）。", "peropt": {"A": "✗ Transconjunctival blepharoplasty 主要處理眶脂，無法去除多餘皮膚或矯正 canthal 位置，敘述錯誤故不選。", "B": "✓ Orbicularis repositioning 去除鬆弛疝出肌肉並縮短瞼-頰距離，正確。", "C": "✓ Levator aponeurosis disinsertion/dehiscence 為（後天 aponeurotic）ptosis 最常見原因，正確。", "D": "✓ Distraction/snap test 用於評估下眼瞼鬆弛度，正確。", "E": "✗ Retrobulbar hemorrhage 可發生於眼瞼術後且為視力威脅急症，須高度警覺，敘述錯誤故不選。"}, "cite": "待複查（Neligan 眼瞼整形 記憶佐證）", "conflict": ""}, {"id": "5079", "sub": "AE2", "src": "NG", "years": [105, 110], "stem": "Canthoplasty手術與其適應症之配對，下列何者為非？", "opts": {"A": "Tarsal strip lateral canthoplasty without lid laxity or ectropion Lower lid canthal malposition", "B": "Tarsal strip lateral canthoplasty with horizontal lid shortening  Lid laxity or ectropion", "C": "Dermal-orbicular pennant lateral canthoplasty  Bone to soft tissue distance of >1 cm", "D": "Inferior retinacular lateral canthoplasty  Bone to soft tissue distance of >1 cm", "E": "Vertical spacer graft  Vertical deficiency from release of midlamellar cicatrix or skin deficiency"}, "ans": "D", "multi": false, "etype": "ai", "expl": "考生建議：D應該也對 建議刪除", "key": "🎯 Canthoplasty術式與適應症配對(選錯誤配對)。要點：無鬆弛/外翻用tarsal strip矯正下瞼canthal malposition;合併水平縮短用於lid laxity/ectropion;dermal-orbicular pennant用於骨到軟組織距離大者;vertical spacer graft用於midlamellar cicatrix或皮膚不足的垂直缺損。⚠原檔記載『考生建議D亦為正確配對、建議刪題』，本題答案有爭議。", "peropt": {"A": "✗ 配對正確：無鬆弛/外翻的tarsal strip用於下瞼canthal malposition。", "B": "✗ 配對正確：合併水平瞼縮短用於lid laxity或ectropion。", "C": "✗ 配對正確：dermal-orbicular pennant lateral canthoplasty用於骨到軟組織距離>1cm。", "D": "✓(正解，惟有爭議) 依原檔認定此配對為誤;但考生指出inferior retinacular canthoplasty亦可對應相關情境，配對正確性有疑義。", "E": "✗ 配對正確：vertical spacer graft用於midlamellar cicatrix鬆解或皮膚不足之垂直缺損。"}, "cite": "原檔詳解（答案疑義，建議人工複查）", "conflict": "⚠爭議·不計分：本題選項邏輯瑕疵（C/D 同印 >1cm），全庫 3 題 disputed 之一；作答錨定該年官方答案，成績不計分。"}, {"id": "5080", "sub": "AE2", "src": "NG", "years": [105, 107], "stem": "關於Medial epicanthoplasty的敘述下列何者為非？", "opts": {"A": "對於亞洲人的眼瞼手術有更好的術後成果而言很重要，", "B": "傳統的術式如Mustarde technique不太容易在medial canthal area造成scar", "C": "Skin redraping method藉由medial subciliary incision以及release medial epicanthal adhesions來達到減少疤痕形成的目的", "D": "常見的併發症為unnatural dimpling", "E": "可藉由half Z-plasty technique來解決medial canthoplasty造成的scar問題"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 內眥成形術（medial epicanthoplasty，選錯誤者）：傳統術式（如Mustarde technique）反而『容易』在內眥區留下可見疤痕，故B『不太容易造成scar』為錯誤。正確觀念：對亞洲人眼瞼手術成果重要、skin redraping method藉medial subciliary incision並release epicanthal adhesions以減少疤痕、常見併發症為unnatural dimpling、half Z-plasty可矯正內眥疤痕。", "peropt": {"A": "✗ 敘述正確：內眥成形對亞洲人眼瞼術後成果很重要。", "B": "✓(正解，即錯誤敘述) 傳統Mustarde等術式『容易』在內眥留下疤痕，而非不易。", "C": "✗ 敘述正確：skin redraping法藉medial subciliary切口與鬆解epicanthal adhesion減少疤痕。", "D": "✗ 敘述正確：unnatural dimpling為常見併發症。", "E": "✗ 敘述正確：half Z-plasty可處理內眥成形造成的疤痕。"}, "cite": "待複查（Neligan Medial epicanthoplasty 記憶佐證）", "conflict": ""}, {"id": "5081", "sub": "AE8", "src": "NG", "years": [105], "stem": "相較高加索人種而言，亞洲人種容易有underprojected nasal tip，下列何種方法可以矯正此一外觀？", "opts": {"A": "Alloplastic materials around the nasal tip", "B": "Cartilaginous work for nasal tip projection", "C": "Onlay graft", "D": "Septal extension graft", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 亞洲人常見underprojected（低）nasal tip，矯正策略為多管齊下、皆可採用：軟骨性抬高（cartilaginous tip work如cartilage grafting）、onlay tip graft、septal extension graft，以及在鼻尖使用alloplastic材料墊高。故答案為『以上皆是』。臨床重點：亞洲鼻整形常需增量支撐(structural support)，septal extension graft對維持長期projection與旋轉控制尤佳。", "peropt": {"A": "✗ 於鼻尖使用alloplastic材料可增加projection（雖有extrusion風險），為方法之一。", "B": "✗ 軟骨work（tip suturing/grafting）可提升projection。", "C": "✗ Onlay graft為增加tip projection的常用方法。", "D": "✗ Septal extension graft可穩定抬高並控制tip。", "E": "✓(正解) 以上方法皆可矯正低鼻尖。"}, "cite": "待複查（Neligan 亞洲鼻整形 記憶佐證）", "conflict": ""}, {"id": "5082", "sub": "AE11", "src": "NG", "years": [105], "stem": "下列關於facial contouring surgery的敘述，下列何者不正確？", "opts": {"A": "subperiosteal dissection可減少出血及術後水腫之情形", "B": "在做mandible angle osteotomy 時，容易受傷的神經為inferior alveolar nerve", "C": "Malar reduction有多種approach的方式，包括intraoral, bicoronal, 以及preauricular incisions，其中以bicoronal incision最受歡迎", "D": "Mandible reduction常伴隨narrowing genioplasty以達到更好的下巴塑型效果", "E": "在做malar reduction時，若過度dissection則可能破壞zygomatico-cutaneous ligaments而造成軟組織下垂"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面輪廓手術（selecting『不正確』者）：Malar reduction 雖有 intraoral、bicoronal、preauricular 等入路，但『最受歡迎的是 intraoral（±短的鬢角/preauricular 輔助）』而非 bicoronal（過於侵入），故 C 錯。易混淆：mandible angle osteotomy 易傷 inferior alveolar nerve；subperiosteal 剝離可減少出血與水腫。", "peropt": {"A": "✗（正確）subperiosteal 剝離減少出血與術後水腫。", "B": "✗（正確）下顎角截骨易傷 inferior alveolar nerve。", "C": "✓（正解，不正確）malar reduction 最受歡迎入路為 intraoral，非 bicoronal。", "D": "✗（正確）mandible reduction 常併 narrowing genioplasty。", "E": "✗（正確）過度剝離破壞 zygomatico-cutaneous ligaments 致軟組織下垂。"}, "cite": "待複查（Neligan 顏面輪廓 記憶佐證）", "conflict": ""}, {"id": "5083", "sub": "AE10", "src": "NG", "years": [105], "stem": "關於facial nerve的敘述，下列何者為是？(複選)", "opts": {"A": "temporal branch 走向一般沿著tragus下0.5公分到眉毛側緣外1.5公分之連線", "B": "zygomatic and buccal branches走出parotid gland後深度約在parotid masseteric fascia上", "C": "mandibular branches穿出parotid gland後大約在mandibular angle的位置，接著沿mandible border往前", "D": "cervical branches 支配 platysma", "E": "buccal branch和 zygomatic branch通常沒有彼此交通，因此一旦其中一個分支受傷，功能多半無法代償性的回復"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經分支解剖（何者為是・複選）。**官方答案 ACD（依原卷計分）**。A：temporal branch 沿 Pitanguy line；C：mandibular branch 出腺體於下頷角沿下緣前行；D：cervical branch 支配 platysma；E 為假（buccal 與 zygomatic 有交通支、可代償）。⚠ B（zygomatic/buccal 走行層次）在 Neligan 5e 可成立，但原卷未納入正解，計分不選 B。", "peropt": {"A": "◎ Temporal branch 沿 Pitanguy line（tragus 下 0.5 cm 至眉外 1.5 cm），正確。", "B": "依官方答案不納入正解。（註：Neligan 5e 認為 upper buccal trunk 走 parotid–masseteric fascia 深面可成立，但原卷未列 B。）", "C": "◎ Mandibular branch 出腺體約在下頷角並沿下頷緣前行，正確。", "D": "◎ Cervical branch 支配 platysma，正確。", "E": "✗ Buccal 與 zygomatic 分支間有交通支，受損多可代償恢復；此敘述錯誤。"}, "cite": "待複查（Neligan 5e Vol.2 Ch9.2 顏面神經分支 5e裁定 記憶佐證）", "conflict": "依 Neligan 5e Vol.2 Ch9.2（Mendelson & Wong）裁定：zygomatic branch 走在咬肌筋膜上、upper buccal trunk 走在 parotid–masseteric fascia 深面 → 選項 B 成立；5e 明載 upper buccal 與 zygomatic、lower buccal 與 mandibular 之間有交通支 → 選項 E 為假。正解 ABCD，與 NG110(4e) 一致。原檔 ACD 更正為 ABCD（2026-07-10 Jason 授權依 5e 裁定）。 ｜ 2026-07-16 Jason 裁定：依原卷計分改回官方答 ACD（曾更正為 ABCD）。"}, {"id": "5084", "sub": "AE4", "src": "NG", "years": [105, 107, 110, 114, 115], "stem": "何者是face lift最常見的術後併發症？", "opts": {"A": "Alopecia", "B": "Infection", "C": "Hypertrophic scars", "D": "Hematoma", "E": "Skin loss"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 最常見術後併發症為「血腫（hematoma）」，好發於術後早期、與高血壓與男性性別相關，須及早引流以免壓迫致皮瓣壞死。易混：切口旁禿頭（alopecia，張力所致）、感染、肥厚性疤痕、皮膚壞死皆屬併發症但發生率均低於血腫。", "peropt": {"A": "✗ Alopecia（切口旁禿頭）由張力引起，發生率低。", "B": "✗ 感染少見（約 0.3%）。", "C": "✗ 肥厚性疤痕非最常見併發症。", "D": "✓(正解) Hematoma 為 facelift 最常見併發症。", "E": "✗ 皮膚壞死好發吸菸者張力區，發生率仍低於血腫。"}, "cite": "待複查（Neligan facelift 併發症 記憶佐證）", "conflict": ""}, {"id": "5085", "sub": "AE4", "src": "NG", "years": [105], "stem": "Which of the following statements are true about the secondary deformities and the secondary facelift? (複選)", "opts": {"A": "For submental incision, the incision should be placed directly along the submental crease.", "B": "In the youthful appearing attractive ear, the long axis of the lobule should be 15-degree posterior to the long axis of pinna.", "C": "Prominent submandibular glands are commonly seen in patients presenting for secondary facelifts.", "D": "Prominent anterior belly of the digastric muscle is not commonly recognized as part of secondary neck deformity.", "E": "\"Drapery lines\" and \"lateral sweep\" are common problems following a \"skin-only\" facelift."}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 二次拉皮與續發畸形(複選選正確)。要點：年輕美觀耳垂長軸相對pinna約後傾15度;二次拉皮病人常見prominent submandibular glands;skin-only拉皮易出現drapery lines與lateral sweep。易錯點：submental切口不應直接落在submental crease上(會加深皺褶);prominent anterior belly of digastric確實是續發頸部畸形的一部分(該敘述否定之，故錯)。", "peropt": {"A": "✗(非答案) 錯誤敘述：submental切口不應直接置於crease上，以免加深皺褶。", "B": "✓ 正確：年輕美觀耳垂長軸相對pinna約後傾15度。", "C": "✓ 正確：prominent submandibular glands常見於二次拉皮病人。", "D": "✗(非答案) 此敘述稱digastric前腹『不』被視為續發頸畸形，實則屬之，故此敘述錯誤，非正確項。", "E": "✓ 正確：drapery lines與lateral sweep為skin-only拉皮常見問題。"}, "cite": "待複查（Neligan 二次拉皮 記憶佐證）", "conflict": ""}, {"id": "5086", "sub": "AE6", "src": "NG", "years": [105], "stem": "Which of the following statements about neck rejuvenation are right? (複選)", "opts": {"A": "Less skin is needed in the neck once the obtuse cervicomental angle is converted to a pleasing neckline.", "B": "In terms of ideal facial proportion in frontal view, the distance from medial canthus to top of the brow is roughly equal to the vertical distance from commissure to Menton", "C": "Among the variations of platysmal anatomy in the submental region, type I (Interdigitation of the platysmal muscles 1-2cm posterior to the mandibular symphysis) is most common.", "D": "About ideal profile dimensions, a Reidel's line is a tangent drawn from upper lip to lower lip. Ideal chin position should fall on this.", "E": "Among the complications following neck rejuvenation surgery, the diagnosis of parotid fistula is confirmed by measuring the amylase level in the blood."}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頸部年輕化（選正確，複選）：C正確——頦下platysma變異以Type I（下頜聯合後1–2 cm交錯，約75%）最常見；D正確——Reidel's line為上唇至下唇之切線，理想頦部位置應落於此線上。錯誤者：A『轉為銳利頸線後需要較少皮膚』有誤（重塑cervicomental angle後需重新覆蓋、非單純需較少皮膚）；B之臉部比例對應敘述有誤；E腮腺廔管（parotid fistula）診斷應測『引流液』之amylase而非血中amylase。", "peropt": {"A": "✗ 轉為銳利頸線的過程涉及皮膚重新覆蓋，此『需較少皮膚』敘述不正確。", "B": "✗ 所述臉部比例對應關係不正確。", "C": "✓ platysma變異以Type I（後1–2 cm交錯，約75%）最常見。", "D": "✓ Reidel's line為上下唇切線，理想頦部應落在此線上。", "E": "✗ 腮腺廔管確診應測『引流液/唾液』amylase，非血中amylase。"}, "cite": "待複查（Neligan Neck rejuvenation 記憶佐證）", "conflict": ""}, {"id": "5087", "sub": "AE9", "src": "NG", "years": [105], "stem": "About structural fat grafting, which of the following statement is the most appropriate?", "opts": {"A": "The most forgiving area to learn structural fat grafting is the dorsum of the hand and the least forgiving area is the eyelid.", "B": "Centrifugation at 1286 g is considered optimal by Yoshimura and may enhance fat graft take and prevent long-term atrophy of the transplanted tissue", "C": "Growth factors and stem cells have been isolated and appear to be concentrated in the densest portions of centrifuged fat.", "D": "While technically considered minimally invasive, significant bruising and tissue edema generally result from fat grafting.", "E": "All of above are true."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Structural fat grafting（Coleman技術）核心觀念皆成立故選『All of above』：學習曲線上手背最寬容、眼瞼最不寬容（皮薄易顯不平/結節）；離心約1286g（≈3000rpm 3分）被認為理想並可能提升take；生長因子與幹細胞集中於離心後最密實層；雖屬微創但仍常見明顯瘀青與組織水腫。故答案E。", "peropt": {"A": "✗ 正確。手背最寬容、眼瞼最不寬容。", "B": "✗ 正確（依本題）。1286g離心被視為理想，可能提升存活並防長期萎縮。", "C": "✗ 正確。生長因子與幹細胞濃聚於離心最密實部分。", "D": "✗ 正確。雖屬微創仍常見明顯瘀青與水腫。", "E": "✓(正解) 以上皆為真。"}, "cite": "待複查（Neligan structural fat grafting 記憶佐證）", "conflict": ""}, {"id": "5088", "sub": "AE11", "src": "NG", "years": [105], "stem": "About facial skeletal augmentation, which of the following statements are right? (複選)", "opts": {"A": "The subperiosteal plane is preferred for implant placement.", "B": "Screw fixation of the implant prevents gaps between the implant and the skeleton", "C": "Placement of incision directly over implant is suggested.", "D": "An intraoral incision should be placed on the sulcus to provide easier exposure to the menton.", "E": "The intraoral approach for the placement of chin implant can associated with superior malposition of implants and lower lip dysfunction resulting from mentalis muscle division."}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面骨骼增大（複選，選『正確』者）：ABE 正確——subperiosteal plane 為植入首選；螺絲固定可消除植入物與骨面間隙；口內入路植入 chin implant 可能因 mentalis 分離致植入物上移位與下唇功能障礙。易混淆：切口不應『直接位於植入物正上方』（C 錯，增加外露風險）；口內切口位置應保留 mentalis cuff 而非直接落在 sulcus（D 錯）。", "peropt": {"A": "✓ subperiosteal plane 為植入首選。", "B": "✓ 螺絲固定消除植入物與骨骼間隙。", "C": "✗ 切口不應直接位於植入物正上方（增加外露）。", "D": "✗ 口內切口不應直接落於 sulcus，須保留 mentalis cuff。", "E": "✓ 口內 chin implant 可致上移位與 mentalis 分離之下唇障礙。"}, "cite": "待複查（Neligan 骨骼增大 記憶佐證）", "conflict": ""}, {"id": "5089", "sub": "AE7", "src": "NG", "years": [105], "stem": "About nasal anatomy and rhinoplasty, which of the following statements is the most appropriate?", "opts": {"A": "The dorsal aesthetic lines are determined by a line drawn from the medial brow to the tip defining points, and should be two gently diverging curves.", "B": "The columellar artery is transected during the external nasal approach, but this has little effect because of the multiple branches that perfuse the region of the nasal dome.", "C": "The safety of the external approach in secondary rhinoplasty is increased by dissection directly above perichondrium.", "D": "Airflow can be diminished by inadvertent injury to transverse nasalis muscle.", "E": "All of above are true."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部解剖與鼻整形四個正確概念集合（本題 all of above）：①dorsal aesthetic lines 由 medial brow 畫至 tip defining points，應為兩條和緩發散曲線；②external approach 會切斷 columellar artery，但因鼻穹頂有多重血供故影響小；③二次鼻整形時貼緊軟骨膜（perichondrium）上方剝離可增加安全性；④誤傷 transverse nasalis 可能減少氣流。四者皆真。", "peropt": {"A": "✗（即此敘述為真）Dorsal aesthetic lines 為兩條和緩發散曲線，正確。", "B": "✗（為真）Columellar artery 被切斷但因多重血供影響小，正確。", "C": "✗（為真）貼軟骨膜上方剝離增加二次鼻整形安全性，正確。", "D": "✗（為真）誤傷 transverse nasalis 可減少氣流，正確。", "E": "✓（正解）以上皆為真。"}, "cite": "待複查（Neligan 鼻部解剖/鼻整形 記憶佐證）", "conflict": ""}, {"id": "5090", "sub": "AE8", "src": "NG", "years": [105], "stem": "About open technique rhinoplasty, which of the following statements is the most appropriate?", "opts": {"A": "Spreader grafts are indicated in primary rhinoplasty to recreate the dorsal aesthetic lines, widen the midvault, or correct the deviated nose.", "B": "Septal cartilage is the primary choice for autogenous grafts in rhinoplasty.", "C": "The flaccidity of ear cartilage does not allow it to be used where structural support is necessary.", "D": "The action of the depressor septi muscles creates or accentuates the deformity characterized by descent of the nasal tip, shortening of the upper lip, and a transverse crease in the mid philtral area.", "E": "All of above are true"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形基本觀念（本題四項皆正確，選 E）：spreader graft 於初次鼻整形用以重建 dorsal aesthetic lines、加寬中鼻拱或矯正歪鼻；septal cartilage 為自體移植首選；耳軟骨柔軟、不適合需結構支撐處；depressor septi 收縮會造成鼻尖下垂、上唇縮短與中人中橫紋。四者皆真，故選 E。", "peropt": {"A": "✓ Spreader graft 用於重建 dorsal aesthetic lines、加寬 midvault、矯正歪鼻，正確。", "B": "✓ Septal cartilage 為鼻整形自體移植首選來源，正確。", "C": "✓ 耳軟骨柔軟，不宜用於需結構支撐之處，正確。", "D": "✓ Depressor septi 收縮致鼻尖下垂、上唇縮短、人中橫紋，正確。", "E": "✓(正解) A–D 皆正確，故選「以上皆是」。"}, "cite": "待複查（Neligan open rhinoplasty 記憶佐證）", "conflict": ""}, {"id": "5091", "sub": "AE8", "src": "NG", "years": [105], "stem": "About rhinoplasty, which of the following statements is the most appropriate?", "opts": {"A": "The \"post-rhinoplasty red nose\" is a cutaneous manifestation of postoperative circulatory readjustment. Laser treatment is simple and effective.", "B": "The most common complication is a decrease in postoperative airway size.", "C": "The notoriety of rib grafts to warp postoperatively can be avoided by observing their internal stresses as grafts are shaped, and by noting that ribs progressively calcify as patients age.", "D": "The intercartilaginous incision gives access to the dorsum, upper and lower lateral cartilages, and the septal angles.", "E": "All of the above are ture."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 此題各鼻整形敘述皆恰當，故『以上皆是』為正解。要點：post-rhinoplasty red nose為術後循環再調適的皮膚表現，雷射處理簡單有效;最常見併發症為術後鼻道(呼吸)空間變小;肋軟骨warping可藉平衡carving內應力及利用年齡鈣化特性減輕;intercartilaginous切口可進入鼻背、上下外側軟骨與septal angle。", "peropt": {"A": "✗(非正解) 敘述正確：red nose為循環再調適表現，雷射有效。", "B": "✗(非正解) 敘述正確：最常見併發症為術後呼吸道空間縮小。", "C": "✗(非正解) 敘述正確：觀察內應力平衡carving並利用肋軟骨鈣化可減少warping。", "D": "✗(非正解) 敘述正確：intercartilaginous切口可達鼻背、上下外側軟骨及septal angle。", "E": "✓(正解) A-D皆為適當正確敘述，故選以上皆是。"}, "cite": "待複查（Neligan 鼻整形 記憶佐證）", "conflict": ""}, {"id": "5092", "sub": "AE7", "src": "NG", "years": [105], "stem": "About deviated nose, which of the following statements is the most appropriate?", "opts": {"A": "The open rhinoplasty is the preferred approach for correction of the deviated nose", "B": "The internal nasal valve is defined by the angle between the junction of the nasal septum and the caudal margin of the upper lateral cartilage.", "C": "The most common septal deviation is septal tilt.", "D": "In most cases of septal tilt, the internal deviation of the septum is to the left and the external deviation of the nose is to the right.", "E": "All of the above are true."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 歪鼻（deviated nose，選最適當者為E『以上皆是』）：A開放式鼻整形為矯正歪鼻的首選入路（視野與對稱調整佳）；B internal nasal valve由鼻中膈與upper lateral cartilage尾側緣之夾角定義；C最常見的鼻中膈偏曲類型為septal tilt；D多數septal tilt個案中，中膈內偏向左、外鼻偏向右。四者皆正確故選E。", "peropt": {"A": "✗ 單獨看敘述正確：open rhinoplasty為歪鼻矯正首選入路。", "B": "✗ 單獨看敘述正確：internal nasal valve由septum與ULC尾側緣夾角定義。", "C": "✗ 單獨看敘述正確：最常見鼻中膈偏曲為septal tilt。", "D": "✗ 單獨看敘述正確：多數septal tilt內偏向左、外鼻偏右。", "E": "✓(正解) 以上A–D皆正確。"}, "cite": "待複查（Neligan Deviated nose 記憶佐證）", "conflict": ""}, {"id": "5093", "sub": "AE8", "src": "NG", "years": [105], "stem": "About secondary rhinoplasty, which of the following statements is the most appropriate?", "opts": {"A": "The horizontal mattress suture corrects convexities of septal cartilages.", "B": "In many secondary cases, problems are due to deficiencies in the cartilaginous or bony framework of the nose. Cartilage grafting is the mainstay for the correction of these problems.", "C": "Patients tend to have swelling and could be treated with triamcinolone.", "D": "The suture algorithm for secondary rhinoplasty is identical to that for primary rhinoplasty, beginning with a hemi-transdomal suture.", "E": "All of the above are true."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Secondary rhinoplasty的多項原則皆正確故選『All of the above』：horizontal mattress suture可矯正鼻中膈軟骨凸面；多數二次個案問題源於軟骨/骨性框架不足，cartilage grafting為矯正主軸；病人常有腫脹可用triamcinolone處理；二次鼻整形的縫合演算法與初次相同，皆自hemi-transdomal suture起始。故答案E。", "peropt": {"A": "✗ 正確。horizontal mattress suture可矯正septal cartilage凸面。", "B": "✗ 正確。二次個案多因框架不足，軟骨移植為主軸。", "C": "✗ 正確。腫脹可用triamcinolone。", "D": "✗ 正確。縫合演算法與初次相同，自hemi-transdomal suture起始。", "E": "✓(正解) 以上皆為真。"}, "cite": "待複查（Neligan 二次鼻整形 記憶佐證）", "conflict": ""}, {"id": "5094", "sub": "AE3", "src": "NG", "years": [105], "stem": "有關抽脂手術的wetting solution,下列何者為正確? (複選)", "opts": {"A": "做wetting solution抽脂，宜在打入solution後7至30分鐘內開始抽脂", "B": "常用的wetting solution 成份為lactated Ringer's solution, normal saline, marcaine, lidocaine and epinephrine", "C": "即使在大容量抽脂的病患，都要小心 xylocaine 不可超過 7mg/kg", "D": "有肝功能異常的患者,不會增加lidocaine中毒的機會", "E": "有研究指出，epinephrine 使用於局部麻醉時，每個手術的劑量為 15mg ; 然而還是要注意，epinephrine 即使在低濃度的情況下，都可能對心血管系統的造成重大影響"}, "ans": "AE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 抽脂 wetting solution（複選，選『正確』者）：AE 正確——打入溶液後宜 7–30 分鐘（epinephrine 血管收縮達峰）開始抽脂；epinephrine 單次手術劑量研究值與其低濃度仍影響心血管。錯誤點：大容量 tumescent 下 lidocaine 可達 35–55mg/kg（非 7mg/kg，C 錯）；肝功能異常『會』增加 lidocaine 中毒（D 錯）；成分不含 marcaine（B 敘述可疑）。⚠跨年（3e vs 5e）A/E 數值與描述於 114 版不同（hydrodissection、劑量上限），依版本作答。", "peropt": {"A": "✓ 打入溶液後宜 7–30 分鐘開始抽脂（epinephrine 峰值）。（⚠114 版改述 hydrodissection）", "B": "✗ 常用成分不含 marcaine（bupivacaine），此敘述有誤。", "C": "✗ tumescent 下 lidocaine 上限遠高於 7mg/kg（35–55mg/kg）。", "D": "✗ 肝功能異常『會』增加 lidocaine 中毒風險。", "E": "✓ epinephrine 每手術劑量之研究值，且低濃度仍影響心血管。（⚠114 版改述劑量上限）"}, "cite": "待複查（Neligan 3e 抽脂溶液 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 5e）：A: 105「做wetting solution抽脂，宜在打入solution後7至30分鐘內」 vs 114「做 wetting solution 抽脂，好處包括 hydrodissecti」；E: 105「有研究指出，epinephrine 使用於局部麻醉時，每個手術的劑量為 15mg」 vs 114「有研究指出，epinephrine 使用於局部麻醉時，每個手術的「劑量上限為 1」"}, {"id": "5095", "sub": "AE1", "src": "NG", "years": [105], "stem": "以下關於Lipoabdominoplasty的敘述，何者正確? (複選)", "opts": {"A": "表淺抽脂是一個不破壞穿通支又可大大提高腹壁皮瓣移動性的方法", "B": "在抽脂的時候為了較佳的視野及腹壁的較大的的移動性，需把Scarpa's fascia層的脂肪抽掉。", "C": "在selective undermining的時候，其範圍限制在兩條腹直肌的內側緣之間，以保留最大的血管穿通枝", "D": "Pitanguy 的 marking 方法，兩側各是: 12—14 公分的水平長度及 7–8 公分的斜線長度（斜線約略與iliac crest 夾角40–45°）", "E": "lipoabdominoplasty 主要可節省手術時間，而其手術併發症其實與傳統的abdominoplasty差不多"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Lipoabdominoplasty 核心：表淺抽脂可在『不破壞穿通支』下提升腹壁皮瓣移動性；selective undermining 侷限於兩側腹直肌內側緣之間以保留最大穿通枝；Pitanguy marking 兩側各約 12–14 cm 水平、7–8 cm 斜線。B 錯誤（不應抽掉 Scarpa's fascia 層脂肪，需保留以維持血供/淋巴）；E 錯誤（lipoabdominoplasty 因保留穿通支反而『降低』壞死/seroma 等併發症，非與傳統相當）。", "peropt": {"A": "✓ 表淺抽脂不破壞穿通支又提升皮瓣移動性，正確。", "B": "✗ 不應抽除 Scarpa's fascia 層脂肪；保留以維持血供與淋巴引流。", "C": "✓ Selective undermining 侷限於兩腹直肌內緣間以保留穿通枝，正確。", "D": "✓ Pitanguy marking 約 12–14 cm 水平、7–8 cm 斜線（約 40–45°），正確。", "E": "✗ Lipoabdominoplasty 保留穿通支降低併發症，非與傳統 abdominoplasty 相當。"}, "cite": "待複查（Neligan lipoabdominoplasty 記憶佐證）", "conflict": ""}, {"id": "5096", "sub": "AE1", "src": "NG", "years": [105, 114, 115], "stem": "以下有關Brachioplasty的術後complications ，何者正確? (複選)", "opts": {"A": "血清血腫 (seroma)", "B": "皮膚壞死 (skin necrosis)", "C": "傷口癒合不良 (skin dehiscence)", "D": "傷口感染 (wound infection)", "E": "臂神經叢受損 (brachial plexus injury)"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty（上臂拉皮）常見併發症以傷口相關為主：seroma、皮膚壞死、傷口裂開（skin dehiscence）、傷口感染（ABCD 皆是）。關鍵鑑別：本手術的神經風險是「MABC（medial antebrachial cutaneous nerve）」損傷造成前臂內側感覺異常，而非「臂神經叢（brachial plexus）」損傷——故 E 錯誤，不選。", "peropt": {"A": "✓ Seroma 為 brachioplasty 常見併發症。", "B": "✓ 皮膚壞死可發生，尤其張力大或吸菸者。", "C": "✓ 傷口裂開常見（切口長、活動張力）。", "D": "✓ 傷口感染為常見併發症。", "E": "✗ 神經風險為 MABC 損傷，非 brachial plexus injury，故不選。"}, "cite": "待複查（Neligan brachioplasty 併發症 記憶佐證）", "conflict": ""}, {"id": "5097", "sub": "AE6", "src": "NG", "years": [105], "stem": "As regards the features of the supraorbital nerve, which is incorrect?", "opts": {"A": "The deep branch of the supraorbital nerve travels within the galea..", "B": "The deep branch runs in a 1-cm-wide band medial to the palpable temporal crest line", "C": "The deep branch innervates the frontoparietal scalp", "D": "The superficial branch of the supraorbital nerve courses over the surface of the frontalis muscle", "E": "The superficial branch of the supraorbital nerve provide sensation to the central forehead"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 眶上神經(supraorbital nerve)雙分支解剖(選錯誤)。Deep(lateral)branch走在periosteum與galea『之間』(非within galea)，位於palpable temporal crest內側約1cm寬帶內，支配frontoparietal頭皮;superficial(medial)branch走在frontalis表面，支配central forehead。臨床意義：內視鏡提眉須保護此深支於骨膜與galea間的走行帶。", "peropt": {"A": "✓(正解) 錯誤敘述：deep branch走在periosteum與galea之間，而非within the galea。", "B": "✗ 正確：deep branch位於temporal crest內側約1cm寬帶。", "C": "✗ 正確：deep branch支配frontoparietal頭皮。", "D": "✗ 正確：superficial branch走在frontalis肌表面。", "E": "✗ 正確：superficial branch提供central forehead感覺。"}, "cite": "待複查（Neligan 眶上神經解剖 記憶佐證）", "conflict": ""}, {"id": "5098", "sub": "AE6", "src": "NG", "years": [105], "stem": "A line extending from 0.5 cm below the tragus to a point 1 cm above the lateral edge of the eyebrow (or 1 cm lateral to the lateral canthus) defines the approximate trajectory of the frontal branch of facial nerve, and this imaginary line is called:", "opts": {"A": "Ramirez's line", "B": "Pitanguy's line;", "C": "Gosain's line", "D": "Gilli's line", "E": "Dingman's line"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 定位facial nerve frontal（temporal）branch走向的經典連線：由耳屏下0.5 cm至眉外側緣上方1 cm（或外眥外側1 cm）之假想線，稱為Pitanguy's line。臨床上用以於顳區手術時保護frontal branch。勿與其他人名line混淆。", "peropt": {"A": "✗ Ramirez非此定位線名稱。", "B": "✓(正解) 此線即Pitanguy's line，定位frontal branch走向。", "C": "✗ Gosain非此線名稱。", "D": "✗ Gilli（Gillies）非此定位線。", "E": "✗ Dingman非此線名稱。"}, "cite": "待複查（Neligan Pitanguy's line 記憶佐證）", "conflict": ""}, {"id": "5099", "sub": "AE5", "src": "NG", "years": [106], "stem": "關於Rosacea (玫瑰斑)的敘述，下列何者為非？", "opts": {"A": "常見於三十歲以上白種人，容易與acne混淆", "B": "常見危險因子有光害及基因", "C": "與飲食無關", "D": "治療包括抗生素(metronidazole)、杜鵑花酸(Azelaic acid)及NSAIDs", "E": "雷射治療常使用脈衝光、染料雷射或二氧化碳雷射"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Rosacea（玫瑰斑）好發30歲以上白種人、易與acne混淆，危險因子含光害與基因；治療含外用metronidazole、azelaic acid、口服四環黴素、雷射（脈衝光/染料/CO2）。錯誤在選項C『與飲食無關』——飲食與誘因（辛辣食物、酒精、熱飲、高溫、日曬、情緒）確可誘發或惡化玫瑰斑，故C為非。", "peropt": {"A": "✗ 正確。好發30歲以上白種人，易與acne混淆。", "B": "✗ 正確。光害與基因為常見危險因子。", "C": "✓(正解，為錯誤敘述) 玫瑰斑與飲食/誘因相關（辛辣、酒精、熱飲等可惡化），並非無關。", "D": "✗ 正確。治療含metronidazole、azelaic acid等。", "E": "✗ 正確。可用脈衝光、染料雷射或CO2雷射治療。"}, "cite": "待複查（Neligan Rosacea 記憶佐證）", "conflict": ""}, {"id": "5100", "sub": "AE9", "src": "NG", "years": [106], "stem": "關於肉毒桿菌毒素(botulinum toxin)的注射，下列何者為非？", "opts": {"A": "BoNT-A產品之間可互相換算劑量使用", "B": "可應用在limb spasticity, cervical dystonias, strabismus and blepharospasm", "C": "為避免術後發生bruising or ecchymosis, 病人在術前兩週應停用 aspirin 及 NSAID 藥物", "D": "BoNT-B比起BoNT-A有更快的onset，但是注射處更疼痛及較短的duration", "E": "必要時可同時併用filler injection或是Laser，以達到更好的術後效果"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌毒素（選『為非』者）：不同廠牌 BoNT-A（Botox/Dysport/Xeomin）『不可』1:1 互相換算劑量（單位定義不同），故 A 錯。易混淆：BoNT-B 相較 A 起效較快、注射較痛、作用時間較短（D 正確）；適應症含 limb spasticity、cervical dystonia、strabismus、blepharospasm。", "peropt": {"A": "✓（正解，錯誤敘述）不同 BoNT-A 產品單位不可直接互換換算。", "B": "✗（正確）適應症含肢體痙攣、頸部肌張力異常、斜視、眼瞼痙攣。", "C": "✗（正確）術前兩週停 aspirin/NSAID 減少瘀青。", "D": "✗（正確）BoNT-B 起效快、較痛、作用短。", "E": "✗（正確）可併用 filler 或雷射。"}, "cite": "待複查（Neligan 肉毒桿菌 記憶佐證）", "conflict": ""}, {"id": "5101", "sub": "AE9", "src": "NG", "years": [106], "stem": "關於皮下注射填充物(filler)所產生併發症之敘述，下列何者為是？(複選)", "opts": {"A": "常見之併發症為皮膚腫塊, 不規則隆起, 疼痛, 血腫瘀青等", "B": "玻尿酸(HA)發生過敏反應的發生率約1/3000", "C": "一次注射較多量的填充物，產生sterile abscess 的機率較高", "D": "產生nodule lesion時，治療方式包括局部按摩，類固醇注射或是局部切除", "E": "玻尿酸注射在真皮層若是太表淺，可能產生reddish discoloration (Tyndall effect)"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 填充物（filler）併發症：常見腫塊、不規則隆起、疼痛、瘀青血腫；HA 過敏發生率約 1/3000；單次大量注射易致 sterile abscess；nodule 可局部按摩、類固醇注射或切除。E 為錯誤：HA 注射過『淺』於真皮所產生的 Tyndall effect 是『偏藍（bluish）』變色，而非 reddish，故不納入正確組合。", "peropt": {"A": "✓ 常見腫塊、隆起、疼痛、瘀青血腫，正確。", "B": "✓ HA 過敏發生率約 1/3000，正確。", "C": "✓ 單次大量注射 sterile abscess 機率較高，正確。", "D": "✓ Nodule 可按摩、類固醇注射或局部切除，正確。", "E": "✗ Tyndall effect 為偏藍變色而非 reddish，敘述錯誤，不納入答案。"}, "cite": "待複查（Neligan 填充物併發症 記憶佐證）", "conflict": ""}, {"id": "5102", "sub": "AE5", "src": "NG", "years": [106], "stem": "關於換膚之敘述，下列何者為非？", "opts": {"A": "做深層雷射治療臉部只需要酒精棉片擦拭即可，沒有感染風險", "B": "飛梭雷射比起選擇性光熱解對組織有更少的傷害", "C": "表淺化學性換膚(Chemical peel)常使用alpha hydroxy acids (AHA).", "D": "中層化學性換膚(Chemical peel)常使用trichloroacetic acid (TCA)", "E": "深層化學性換膚(Chemical peel)常使用phenol"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題找「錯誤」：深層雷射為 ablative、會造成開放性創面，「僅用酒精棉片擦拭、無感染風險」明顯錯誤（須嚴格消毒並常規抗病毒/抗菌預防）。其餘為正確標準觀念：飛梭（fractional）僅治療部分皮膚柱狀區、相對熱傷害較侷限；AHA 表淺、TCA 中層、phenol 深層化學換膚。", "peropt": {"A": "✓(正解,錯誤敘述) 深層雷射造成開放創面，有感染風險，非酒精棉片即可，敘述錯誤故選。", "B": "✗ 飛梭雷射因分段作用，組織傷害相對侷限，敘述可接受，不選。", "C": "✗ 表淺化學換膚常用 AHA，正確。", "D": "✗ 中層化學換膚常用 TCA，正確。", "E": "✗ 深層化學換膚常用 phenol，正確。"}, "cite": "待複查（Neligan 換膚/雷射 記憶佐證）", "conflict": ""}, {"id": "5103", "sub": "AE10", "src": "NG", "years": [106], "stem": "關於Aging face的敘述，下列何者為是？", "opts": {"A": "真皮層的collagen(尤其是type II)以及elastin會減少", "B": "臉部骨骼肌萎縮50%以上，較少影響咀嚼相關肌肉，如temporalis以及masseter", "C": "臉頰的true ligament為Zygomatic and Masseteric ligament", "D": "上顎(maxilla)的內縮(retrusion)會使淚溝(tear trough)及法令紋(nasolabial fold)較明顯", "E": "Platysma muscle隨著下臉部及頸部老化而縮短"}, "ans": "C", "multi": false, "etype": "ai", "expl": "考生建議：C敘述改為臉頰的true osseouscutaneous ligament，如此答案為D較無爭議", "key": "🎯 臉部老化(aging face)綜合題，主檔答 C。臉頰的真性韌帶(true/osseocutaneous retaining ligaments)＝zygomatic ligament 與 masseteric ligament，是固定 SMAS 至骨/深筋膜的關鍵支撐，鬆弛即致中臉下垂與 nasolabial fold 加深。⚠此題為「何者為是」，選項 C 與 D 皆屬正確敘述(D：maxilla retrusion 使 tear trough/法令紋更明顯亦為真)，屬跨年爭議題，作答錨定該年官方答案 C；記概念勿背字母。", "peropt": {"A": "✗ 錯誤：真皮 collagen 流失以 type I 為主，非 type II；elastin 亦減少。", "B": "✗ 錯誤：咀嚼肌(temporalis/masseter)因持續使用相對較不萎縮，此敘述比例與方向有誤。", "C": "✓(正解) 臉頰真性韌帶為 zygomatic 與 masseteric ligament（osseocutaneous retaining ligaments），固定 SMAS 於骨/深部，老化鬆弛致中臉下垂。", "D": "△ 敘述本身正確（maxilla retrusion 減少中臉骨支撐，使 tear trough 與 nasolabial fold 更明顯），但本題官方答案錨定 C；此為爭議題，作答以該年官方答案為準。", "E": "✗ 錯誤：platysma 隨下臉與頸部老化而鬆弛延長，非縮短。"}, "cite": "原檔詳解（C/D 皆可爭議，官方答 C；待人工複查）", "conflict": ""}, {"id": "5104", "sub": "AE6", "src": "NG", "years": [106, 110], "stem": "關於forehead感覺神經的敘述，以下何者為是? (複選)", "opts": {"A": "Nasal dorsum及medial orbital rim的感覺由infratrochlear nerve支配", "B": "Corrugator resection最常傷到的神經為supratrochlear nerve", "C": "Supraorbital nerve從spraorbital foramen穿出，因此在forehead blind dissection時，在supraorbital rim上方約1cm便須停止，避免傷到神經", "D": "Supraorbital nerve的deep branch行經periosteum以及deep galea之間", "E": "Zygomaticotemporal nerve的位置在lateral orbital rim以及sentinel vein上方"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 前額感覺神經（選正確，複選）：A正確——鼻背與內側眶緣由infratrochlear nerve支配；B正確——corrugator切除最常傷及supratrochlear nerve；D正確——supraorbital nerve深支走於periosteum與deep galea之間。錯誤者：C『在眶上緣上方約1 cm即須停止blind dissection』數據不當（深支續向上走行，須更謹慎保護）；E zygomaticotemporal nerve與sentinel vein之相對位置敘述不正確。", "peropt": {"A": "✓ 鼻背與內側眶緣感覺由infratrochlear nerve支配。", "B": "✓ Corrugator切除最常傷及supratrochlear nerve。", "C": "✗ 『眶上緣上方1 cm即停止盲剝離』的定位敘述不正確，深支續向上走需更謹慎。", "D": "✓ supraorbital nerve深支走於periosteum與deep galea之間。", "E": "✗ zygomaticotemporal nerve與sentinel vein之相對位置敘述不正確。"}, "cite": "待複查（Neligan Forehead 感覺神經 記憶佐證）", "conflict": ""}, {"id": "5105", "sub": "AE2", "src": "NG", "years": [106], "stem": "有關眼皮手術，下列何者敘述為是？(複選)", "opts": {"A": "Transconjunctival blepharoplasty is the preferred procedure for fat reduction in patients without excess skin and with good canthal position.", "B": "Orbital fat transposition適合用在Patients with tear trough deformities who have prominent medial fat pads. 常會使用medial and central fat pad.", "C": "後天上眼瞼下垂(acquired ptosis)最常見的原因是Levator aponeurosis disinsertion或dehiscence", "D": "常運用Herring's law來協助評估ptosis", "E": "Asymmetry is common postoperatively and can be caused by edema, bruising. 建議要在 8 weeks內做revision."}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 眼瞼手術重點（複選正確為ABCD）：無皮膚多餘且canthal位置良好者，transconjunctival blepharoplasty為減脂首選；tear trough合併內側脂肪墊突出者適合orbital fat transposition（常用medial與central脂肪墊）；後天ptosis最常見原因為levator aponeurosis disinsertion/dehiscence；Herring's law用於評估對側代償性ptosis。E錯：術後不對稱常因水腫/瘀青，應待數月消腫後再評估revision，不宜在8週內急於修整。", "peropt": {"A": "✓(正解) 無皮膚多餘且canthal位置佳者，經結膜減脂為首選。", "B": "✓(正解) tear trough合併內側脂肪墊突出適合fat transposition，用medial與central墊。", "C": "✓(正解) 後天ptosis最常見為levator aponeurosis dehiscence/disinsertion。", "D": "✓(正解) Herring's law用於評估ptosis之對側代償。", "E": "✗ 術後不對稱多為暫時性（水腫/瘀青），應待消腫數月再評估修整，非8週內。"}, "cite": "待複查（Neligan 眼瞼成形 記憶佐證）", "conflict": ""}, {"id": "5106", "sub": "AE2", "src": "NG", "years": [106], "stem": "Canthoplasty手術與其適應症之配對，下列何者為非？", "opts": {"A": "Tarsal strip lateral canthoplasty without lid laxity or ectropion  Lower lid canthal malposition", "B": "Tarsal strip lateral canthoplasty with horizontal lid shortening  Lid laxity or ectropion", "C": "Dermal-orbicular pennant lateral canthoplasty  Bone to soft tissue distance of <1 cm", "D": "Inferior retinacular lateral canthoplasty  Bone to soft tissue distance of <1 cm", "E": "Vertical spacer graft  Vertical deficiency from release of midlamellar cicatrix or skin deficiency"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Canthoplasty 適應症配對（選『為非』者）：C 之 Dermal-orbicular pennant lateral canthoplasty 與『bone-to-soft-tissue distance <1cm』配對錯誤；<1cm 屬 inferior retinacular lateral canthoplasty 的適應（D 正確）。易混淆：tarsal strip 依有無 lid laxity/ectropion 決定是否合併 horizontal shortening。", "peropt": {"A": "✗（正確）無鬆弛/外翻時之 tarsal strip 用於下瞼 canthal malposition。", "B": "✗（正確）有 laxity/ectropion 時 tarsal strip 併 horizontal shortening。", "C": "✓（正解，錯誤配對）Dermal-orbicular pennant 不對應 <1cm 距離。", "D": "✗（正確）inferior retinacular canthoplasty 適用 bone-soft tissue <1cm。", "E": "✗（正確）vertical spacer graft 用於垂直不足（cicatrix/皮膚不足）。"}, "cite": "待複查（Neligan 眼角成形 記憶佐證）", "conflict": ""}, {"id": "5107", "sub": "AE4", "src": "NG", "years": [106], "stem": "在面神經的五個分支中，其中哪兩支因有較多的相互交通支，若於拉皮手術發生損傷則較易恢復功能？", "opts": {"A": "Temporal branch and buccal branch", "B": "Buccal branch and marginal mandibular branch", "C": "Marginal mandibular branch and cervical branch", "D": "Temporal branch and marginal mandibular branch", "E": "Buccal branch and zygomatic branch"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經五分支中，buccal 與 zygomatic branch 之間有最多相互交通支（arborization），故此二支於拉皮受損後最易代償恢復功能；反之 temporal 與 marginal mandibular 屬終末支、交通少，損傷後恢復差、後遺症明顯。", "peropt": {"A": "✗ Temporal 屬交通少之終末支，非易恢復配對。", "B": "✗ Marginal mandibular 交通少，非最易恢復。", "C": "✗ Marginal mandibular/cervical 非最多交通支之配對。", "D": "✗ Temporal 與 marginal mandibular 皆為交通最少之終末支，恢復最差。", "E": "✓（正解）Buccal 與 zygomatic branch 交通支最多，最易代償恢復。"}, "cite": "待複查（Neligan 顏面神經交通支 記憶佐證）", "conflict": ""}, {"id": "5108", "sub": "AE4", "src": "NG", "years": [106], "stem": "Which following is not typical problems seen in the patient presenting for secondary facelift?", "opts": {"A": "Hairline displacement", "B": "Wide scar", "C": "Eyelid dysfunction", "D": "Hypertrichosis", "E": "Tragal distortion"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 二次拉皮（secondary facelift）常見待處理問題源自前次手術後遺：hairline displacement（髮際線移位）、wide scar（疤痕變寬）、eyelid dysfunction（如下瞼外翻/退縮）、tragal distortion（耳屏變形）。Hypertrichosis（多毛）並非典型二次拉皮問題——反而 alopecia（禿髮）才是——故選 D。", "peropt": {"A": "✗ 髮際線移位為二次拉皮常見問題。", "B": "✗ 疤痕變寬為常見待矯正問題。", "C": "✗ 眼瞼功能障礙（外翻/退縮）為典型後遺。", "D": "✓(正解) Hypertrichosis（多毛）非典型二次拉皮問題（典型為禿髮 alopecia），故選。", "E": "✗ 耳屏變形（tragal distortion）為典型二次拉皮所見。"}, "cite": "待複查（Neligan secondary facelift 記憶佐證）", "conflict": ""}, {"id": "5109", "sub": "AE6", "src": "NG", "years": [106], "stem": "Which following is the early complication of neck rejuvenation surgery?", "opts": {"A": "Contour irregularities", "B": "Sialoma", "C": "Asymmetrical fat removal", "D": "Inadequate reduction", "E": "Overcorrection"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頸部年輕化手術的『早期』併發症應與唾液腺損傷相關——sialoma(唾液囊腫/漏)，源自過度去脂傷及submandibular gland，屬術後早期出現。易混淆點：contour irregularities、asymmetrical fat removal、inadequate reduction、overcorrection皆屬結果/晚期評估的問題，非早期併發症。", "peropt": {"A": "✗ 輪廓不規則屬晚期結果問題，非早期併發症。", "B": "✓(正解) Sialoma(唾液囊腫/漏)為submandibular gland受損所致，屬早期併發症。", "C": "✗ 不對稱去脂屬技術/晚期外觀問題。", "D": "✗ 減量不足為晚期結果評估問題。", "E": "✗ 過度矯正屬晚期外觀問題。"}, "cite": "待複查（Neligan 頸部年輕化併發症 記憶佐證）", "conflict": ""}, {"id": "5110", "sub": "AE9", "src": "NG", "years": [106], "stem": "How strong of gravity(g) of centrifugation is considered optimal (Yoshimura) and may enhance fat graft take and prevent long-term atrophy of the transplanted tissue?", "opts": {"A": "1268", "B": "1286", "C": "1826", "D": "1862", "E": "1628"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 脂肪移植離心力（Yoshimura）：最佳離心強度約為1286 g（相當於3000 rpm/3 min，即Coleman技術），此強度可濃縮有活性脂肪、去除油脂與水分並提升graft take、預防長期萎縮；離心力過高（>3000 g）會破壞脂肪細胞。記憶關鍵：1286 g≈3000 rpm。", "peropt": {"A": "✗ 1268非公認最佳值。", "B": "✓(正解) 1286 g（≈3000 rpm）為Yoshimura建議之最佳離心強度。", "C": "✗ 1826數字錯誤。", "D": "✗ 1862數字錯誤。", "E": "✗ 1628數字錯誤。"}, "cite": "待複查（Neligan Fat graft centrifugation 記憶佐證）", "conflict": ""}, {"id": "5111", "sub": "AE10", "src": "NG", "years": [106], "stem": "Consensus about the ideal profile relation portrays a convex face with the upper lip projecting approximately __(X)__ mm beyond the lower lip and the lower lip projecting approximately __(Y)__ mm beyond the chin?", "opts": {"A": "X=1, Y=1", "B": "X=2, Y=2", "C": "X=3, Y=3", "D": "X=4, Y=4", "E": "X=5, Y=5"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 理想側面輪廓的共識：微凸(convex)側臉——上唇約突出下唇2mm、下唇約突出頦部(chin)2mm，即X=2、Y=2。臨床應用：評估正顎/頦成形與唇部投影時，以此2mm–2mm階梯關係作為美學基準。", "peropt": {"A": "✗ 1mm–1mm階梯不足以呈現理想凸側臉。", "B": "✓(正解) 上唇突出下唇2mm、下唇突出頦2mm為共識理想值。", "C": "✗ 3mm–3mm過大。", "D": "✗ 4mm–4mm過大。", "E": "✗ 5mm–5mm過大。"}, "cite": "待複查（Neligan 側面輪廓美學 記憶佐證）", "conflict": ""}, {"id": "5112", "sub": "AE10", "src": "NG", "years": [106], "stem": "Which following description is not true about the facial soft tissue landmarks?", "opts": {"A": "Vertex (v): The highest seen point on the head with the head in Frankfort horizontal", "B": "Pronasale (prn): The most prominent point of the nasal tip", "C": "Stomion (sto): The midline point where the upper lip touches the lower lip", "D": "Pogonion (pg): The most prominent point of the chin in the midline", "E": "Endocanthion (en): The point of the lateral canthus where the upper and lower lids join"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面軟組織測量標記（選『not true』者）：Endocanthion（en）為『內眥（medial canthus）』上下瞼交會點，非外眥；外眥點為 exocanthion（ex），故 E 錯。易混淆：Vertex 為 Frankfort 水平下頭頂最高點；Pronasale 鼻尖最突點；Stomion 上下唇中線接觸點；Pogonion 下巴中線最突點。", "peropt": {"A": "✗（正確）Vertex 為 Frankfort 水平下頭部最高可見點。", "B": "✗（正確）Pronasale 為鼻尖最突點。", "C": "✗（正確）Stomion 為上下唇中線接觸點。", "D": "✗（正確）Pogonion 為下巴中線最突點。", "E": "✓（正解，錯誤敘述）Endocanthion 為內眥而非外眥交會點。"}, "cite": "待複查（Neligan 顏面測量標記 記憶佐證）", "conflict": ""}, {"id": "5113", "sub": "AE7", "src": "NG", "years": [106], "stem": "What percentage of the tip lies anterior to the vertical line adjacent to the most projecting part of the upper lip, tip projection is considered normal?", "opts": {"A": "30-40%", "B": "40-50%", "C": "50-60%", "D": "60-70%", "E": "70-80%"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻尖投影（tip projection）正常判準：以最突出上唇畫一垂直線，正常時鼻尖約有 50–60% 位於此線之前。此為評估 over/under-projection 的常用臨床基準（另有 Goode ratio 0.55–0.60 相呼應）。", "peropt": {"A": "✗ 30–40% 過低，屬 under-projection。", "B": "✗ 40–50% 偏低。", "C": "✓（正解）50–60% 為正常 tip projection。", "D": "✗ 60–70% 偏高。", "E": "✗ 70–80% 屬 over-projection。"}, "cite": "待複查（Neligan 鼻尖投影測量 記憶佐證）", "conflict": ""}, {"id": "5114", "sub": "AE8", "src": "NG", "years": [106], "stem": "If there is concern about pneumothorax during costal cartilage ventilation, what procedure should not be considered?", "opts": {"A": "The wound is filled with Hydrogen peroxide and positive-pressure ventilation can be performed by the anesthesia provider", "B": "If the parietal pleura has been violated, the tip of a red rubber catheter is inserted into the defect and a 3-0 Vicryl purse-string suture is performed around the catheter.", "C": "The anesthesia provider performs a Valsalva maneuver while suction is applied to the red rubber catheter", "D": "As the catheter is withdrawn, the purse-string suture is tied to seal the parietal pleural defect followed by wound closure", "E": "Upright chest X-ray"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肋軟骨取骨疑似氣胸（pneumothorax）之處置：傷口內注入「生理食鹽水」並由麻醉端正壓通氣觀察有無氣泡（bubbling test），而非灌注 hydrogen peroxide——H₂O₂ 會產生氣體干擾判讀且有空氣栓塞疑慮，故「不應」採用。標準修補：紅橡皮導管置入胸膜缺損、3-0 Vicryl 荷包縫合，Valsalva 下抽吸排氣後抽管束緊，再攝立位 CXR 確認。", "peropt": {"A": "✓(正解,不應採用) 應以生理食鹽水（非 hydrogen peroxide）灌注做氣泡測試；H₂O₂ 產氣干擾且有栓塞風險，故不應考慮。", "B": "✗ 胸膜破損時置入紅橡皮導管並荷包縫合為正確步驟。", "C": "✗ 麻醉端 Valsalva 同時抽吸導管以排空胸膜腔氣體，正確。", "D": "✗ 邊抽管邊束緊荷包縫線封閉缺損後關閉傷口，正確。", "E": "✗ 術後立位 CXR 確認有無殘餘氣胸，正確。"}, "cite": "待複查（Neligan 肋軟骨取骨/氣胸處置 記憶佐證）", "conflict": ""}, {"id": "5115", "sub": "AE8", "src": "NG", "years": [106], "stem": "Which following cannot be used for rhinoplasty or nasal reconstruction?", "opts": {"A": "Septal cartilage", "B": "Conchal cartilage", "C": "Calvarial bone", "D": "Costal cartilage", "E": "All of the above can be the material"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻整形/鼻重建的移植材料——septal cartilage、conchal cartilage、calvarial bone、costal cartilage皆為可用之自體材料，故『以上皆可(all can be material)』為正解。各有優劣：septal最方便但量有限;conchal彎曲適合alar;肋軟骨量大但有warping風險;calvarial bone為堅硬骨性支撐。", "peropt": {"A": "✗ Septal cartilage為首選自體移植材料，可用。", "B": "✗ Conchal cartilage可用(尤適alar/彎曲處)。", "C": "✗ Calvarial bone為可用之骨性移植材料。", "D": "✗ Costal cartilage為可用之大量軟骨來源。", "E": "✓(正解) 上述材料皆可用於鼻整形/鼻重建。"}, "cite": "待複查（Neligan 鼻整形移植材料 記憶佐證）", "conflict": ""}, {"id": "5116", "sub": "AE7", "src": "NG", "years": [106], "stem": "The internal nasal valve is defined by the angle between the junction of the nasal septum and the caudal margin of the upper lateral cartilage. What is the typical angle?", "opts": {"A": "5-10°", "B": "10-15°", "C": "15-20°", "D": "20-25°", "E": "25-30°"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 內鼻閥（internal nasal valve）由鼻中膈與upper lateral cartilage尾側緣之夾角構成，正常角度約為10–15°，是鼻氣道阻力最大的部位（最狹窄處）。此角度變小（如中膈偏曲、ULC塌陷）會造成鼻塞，spreader graft即用以撐開此角度。", "peropt": {"A": "✗ 5–10°過小，非正常範圍。", "B": "✓(正解) internal nasal valve正常夾角約10–15°。", "C": "✗ 15–20°偏大。", "D": "✗ 20–25°過大。", "E": "✗ 25–30°過大。"}, "cite": "待複查（Neligan Internal nasal valve 記憶佐證）", "conflict": ""}, {"id": "5117", "sub": "AE8", "src": "NG", "years": [106], "stem": "Which following is not true to avoid or treat skin necrosis after open rhinoplasty?", "opts": {"A": "Ask patients to stop smoking 10 days before surgery", "B": "In the patient that has significant surgical scars on the nose, atrophy of the skin or severely discolored skin, the open approach is deferred", "C": "The skin flap is never defatted other than to pull away any soft tissue that is hanging from the dorsal skin with a pair of forceps", "D": "Open approach should not extend along the entire alar groove", "E": "Excision of the wound with grafting should be employed generally"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 開放式鼻整形皮膚壞死的預防與處置：術前戒菸10天、皮膚已有明顯疤痕/萎縮/嚴重變色者改採closed approach、皮瓣『幾乎不做defatting』僅移除懸垂軟組織、切口不沿整條alar groove延伸。選項E錯——一旦壞死不應『一般性地』採切除加植皮，而應以保守換藥、讓其二期癒合為主，切除植皮為最後手段。", "peropt": {"A": "✗ 正確做法。術前戒菸10天。", "B": "✗ 正確做法。皮膚條件差者延緩/改用closed approach。", "C": "✗ 正確做法。皮瓣不做defatting，僅移除懸垂軟組織。", "D": "✗ 正確做法。開放切口不延伸至整條alar groove。", "E": "✓(正解，為非) 壞死不應常規切除植皮，應以保守換藥、二期癒合為主，植皮為最後手段。"}, "cite": "待複查（Neligan 開放式鼻整形併發症 記憶佐證）", "conflict": ""}, {"id": "5118", "sub": "AE10", "src": "NG", "years": [106], "stem": "Which of the following statements about the facial nerve is incorrect?", "opts": {"A": "The 'Pitanguy's line' is used to describe the location of the temporal branch.", "B": "Injury to a single zygomatic or buccal branch usually goes unnoticed due to the number of communications between the divisions.", "C": "Facial lacerations medial to the level of the lateral canthus are usually not amenable to exploration or repair of the facial nerve.", "D": "The marginal mandibular nerve is usually above the mandibular border after crossing the facial vessels.", "E": "The temporal branch courses under the deep temporal fascia at the level above the zygomatic arch"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經（選『incorrect』者）：temporal branch 在顴弓上方走行於『temporoparietal（superficial temporal）fascia 內／deep temporal fascia 之淺面』，並非位於 deep temporal fascia 之『下方』，故 E 錯。易混淆：Pitanguy's line 描述顳枝走向；單一 zygomatic/buccal 分支損傷因交通支多常不易察覺；marginal mandibular 越過 facial vessels 後通常位於下顎緣上方。", "peropt": {"A": "✗（正確）Pitanguy's line 描述顳枝位置。", "B": "✗（正確）單一 zygomatic/buccal 分支損傷因分支交通常不被察覺。", "C": "✗（正確）外眥內側之顏面裂傷分支太細，通常不宜探查修補。", "D": "✗（正確）marginal mandibular 越過 facial vessels 後通常位於下顎緣上方。", "E": "✓（正解，錯誤敘述）顳枝在顴弓上方走於 deep temporal fascia 之淺面/TPF 內，非其下方。"}, "cite": "待複查（Neligan 顏面神經 記憶佐證）", "conflict": ""}, {"id": "5119", "sub": "AE9", "src": "NG", "years": [107], "stem": "關於肉毒桿菌毒素(botulinum toxin)注射的敘述，下列何者為非？", "opts": {"A": "已知 Clostridium botulinum 可製造多種肉毒桿菌毒素，其中在醫療上已被 作為商品化製劑的為 Botulinum toxin types A and B", "B": "BoNT‐B 比起 BoNT‐A 有更快的 onset，但是注射處更疼痛及較短的 duration", "C": "為避免注射後發生 bruising or ecchymosis, 病人在術前兩週應停用 aspirin 及 NSAID 藥物", "D": "可應用在部分神經肌肉傳導疾病的治療，如 limb spasticity, cervical dystonias, 以及 Lambert–Eaton myasthenic syndrome", "E": "必要時可同時併用 filler injection 或是 Laser，以達到更好的效果"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌毒素臨床應用：可治療 limb spasticity、cervical dystonia 等『突觸前過度活化』疾病，但 Lambert–Eaton myasthenic syndrome (LEMS) 與 myasthenia gravis 皆為神經肌肉接合處疾病，屬『禁忌症』而非適應症。D 將 LEMS 列為可治療對象，為錯誤敘述。BoNT-B onset 較快、較痛、duration 較短；術前 2 週停 aspirin/NSAID 減少瘀青，皆正確。", "peropt": {"A": "✗ 醫療用商品化製劑為 type A 與 B，正確。", "B": "✗ BoNT-B 較快 onset、注射較痛、duration 較短，正確。", "C": "✗ 術前 2 週停 aspirin/NSAID 減少瘀青，正確。", "D": "✓（正解，即錯誤敘述）LEMS 為神經肌肉接合處疾病，屬禁忌症而非適應症。", "E": "✗ 可併用 filler 或雷射，正確。"}, "cite": "待複查（Neligan 肉毒桿菌毒素 記憶佐證）", "conflict": ""}, {"id": "5120", "sub": "AE6", "src": "NG", "years": [107, 110, 115], "stem": "關於眼眶外側的顏面神經-顳分支(temporal branch)的 landmarks，下列何者錯誤？", "opts": {"A": "The posterior third of the palpable zygomatic arch", "B": "1.5cm lateral to the tail of the eyebrow", "C": "Parallel and adjacent to the inferior temporal septum", "D": "Immediately superior to the Sentinel vein(medial zygomaticotemporal vein)", "E": "以上皆是"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經顳分支（temporal branch）於眶外側區之定位標記：可觸及顴弓的「中三分之一（middle third）」而非「後三分之一」——此為本題錯誤選項。其餘標記正確：眉尾外側 1.5 cm、沿 inferior temporal septum 平行走行、位於 sentinel vein（medial zygomaticotemporal vein）正上方。剝離時緊貼 deep temporal fascia 深面可保護此支。", "peropt": {"A": "✓(正解,錯誤標記) 應為可觸顴弓之「中三分之一」，題目寫 posterior third 有誤，故選。", "B": "✗ 眉尾外側 1.5 cm 為正確標記。", "C": "✗ 平行且鄰近 inferior temporal septum 走行，正確。", "D": "✗ 位於 sentinel vein 正上方，正確。", "E": "✗ 因 A 為錯誤，故非「以上皆是」。"}, "cite": "待複查（Neligan 顳分支解剖 記憶佐證）", "conflict": ""}, {"id": "5121", "sub": "AE9", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. 關於皮下注射填充物(filler)所產生的併發症，下列何者為是？(複選)", "opts": {"A": "常見之併發症為皮膚腫塊, 不規則隆起, 疼痛, 血腫瘀青等", "B": "玻尿酸(HA)發生過敏反應的發生率約 1/3000", "C": "一次注射較多量的填充物，產生 sterile abscess 的機率較高", "D": "產生 nodule lesion 時，治療方式包括局部按摩，類固醇注射或是局部切除", "E": "玻尿酸注射在真皮層若是太表淺，可能產生 bluish discoloration (Tyndall effect)"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 皮下填充劑併發症(複選選正確)皆成立：常見腫塊/不規則/疼痛/瘀青;HA過敏率約1/3000;單次注射量大→sterile abscess機率較高;nodule處理含按摩、類固醇注射、局部切除;真皮太表淺注射HA→bluish discoloration(Tyndall effect)。⚠跨年數值差異：107年『HA過敏約1/3000』與110年『HA過敏約0.03%』為同一概念不同表述(1/3000≈0.033%)。", "peropt": {"A": "✓ 常見併發症為腫塊、不規則隆起、疼痛與瘀青血腫。", "B": "✓ HA過敏發生率約1/3000(⚠他年表述為約0.03%，數值等義)。", "C": "✓ 單次注射量較多時，sterile abscess機率較高。", "D": "✓ Nodule處理包括局部按摩、類固醇注射或局部切除。", "E": "✓ HA注射過淺於真皮可產生bluish discoloration(Tyndall effect)。"}, "cite": "待複查（Neligan 填充劑併發症 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 3e）：題幹數值不同 ‖ 跨年數值差異（Neligan 3e vs Neligan 4e）：B: 107「玻尿酸(HA)發生過敏反應的發生率約 1/3000」 vs 110「玻尿酸(HA)發生過敏反應的發生率約0.03%」"}, {"id": "5122", "sub": "AE2", "src": "NG", "years": [107], "stem": "複選2. 關於Blepharoplasty的敘述，以下何者為非? (複選)", "opts": {"A": "最常見的complication為chemosis", "B": "若術後有出現asymmetry或是ptosis，需在8周內再進行手術調整，以免情況惡化", "C": "Retrobulbar hemorrhage 是嚴重的complication，若病患出現severe orbital pain則須懷疑", "D": "若出現visual change如diplopia，最有可能是傷及視神經，需要馬上照會眼科處理。", "E": "若病患術前有dry eye的問題，術後有可能會加劇"}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 眼瞼整形併發症（選錯誤，複選）：B錯誤——術後出現不對稱或眼瞼下垂應『觀察等待數月』待腫脹消退再評估修補，而非在8週內急於再手術以免『惡化』；D錯誤——術後複視（diplopia）多為外眼肌（尤其inferior oblique）受損，而非視神經（視神經受損表現為視力喪失而非複視）。正確者：A最常見併發症為chemosis；C retrobulbar hemorrhage表現severe orbital pain需警覺；E術前乾眼術後可能加劇。", "peropt": {"A": "✗ 敘述正確：最常見併發症為chemosis（結膜水腫）。", "B": "✓(正解，即錯誤敘述) 術後不對稱/下垂應觀察數月再修補，非8週內急於再手術。", "C": "✗ 敘述正確：retrobulbar hemorrhage為嚴重併發症，severe orbital pain須警覺。", "D": "✓(正解，即錯誤敘述) 複視多為外眼肌（inferior oblique）受損，非視神經；視神經傷害表現為視力喪失。", "E": "✗ 敘述正確：術前乾眼者術後可能加劇。"}, "cite": "待複查（Neligan Blepharoplasty 併發症 記憶佐證）", "conflict": ""}, {"id": "5123", "sub": "AE10", "src": "NG", "years": [107], "stem": "複選3. 關於 facial nerve 的敘述，下列何者為是？(複選)", "opts": {"A": "temporal branch 之走向，一般沿著 tragus 下 0.5 公分，到眉毛側緣外 1.5 公分之連線", "B": "zygomatic and buccal branches 走出 parotid gland 後，深度約在 parotid masseteric fascia 上", "C": "mandibular branches 穿出 parotid gland 後大約在 mandibular angle 的位置， 接著沿 mandible border 往前", "D": "facelift術後有 pseudo paralysis，表示可能傷及buccal branch of facial nerve", "E": "buccal branch 和 zygomatic branch 通常沒有彼此交通，因此一旦其中一個分支受傷，功能多半無法代償性的回復"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經分支解剖（複選正確為ACD）：temporal branch沿tragus下0.5cm至眉尾外1.5cm連線(Pitanguy line)（A對）；mandibular branch出腮腺後約於下頜角處沿mandible border前行（C對）；facelift後pseudo-paralysis多因buccal branch受損，因buccal分支間有豐富交通可代償恢復（D對）。⚠ 跨年題幹微調：105年考cervical branch支配platysma、107年改考buccal branch之pseudoparalysis，測點雖同屬顏面神經走行但敘述有差異。B錯：zygomatic/buccal分支走在parotid-masseteric fascia『深面』而非其上；E錯：buccal與zygomatic分支間有豐富交通，受傷後多可代償恢復。", "peropt": {"A": "✓(正解) temporal branch沿tragus下0.5cm至眉尾外1.5cm走行。", "B": "✗ zygomatic/buccal分支出腮腺後走在parotid-masseteric fascia『深面』，非其淺面之上。", "C": "✓(正解) mandibular branch出腮腺後約於下頜角沿mandible border前行。", "D": "✓(正解) facelift後pseudoparalysis多為buccal branch受損，因分支交通豐富可恢復。", "E": "✗ buccal與zygomatic分支間有豐富交通(arborization)，一支受傷多能代償回復。"}, "cite": "待複查（Neligan 顏面神經解剖 記憶佐證）", "conflict": "跨年數值差異（Neligan 3e vs Neligan 3e）：A: 105「temporal branch 走向一般沿著tragus下0.5公分到眉毛側緣外」 vs 107「temporal branch 之走向，一般沿著 tragus 下 0.5 公分」；D: 105「cervical branches 支配 platysma」 vs 107「facelift術後有 pseudo paralysis，表示可能傷及bucca」"}, {"id": "5124", "sub": "AE6", "src": "NG", "years": [107], "stem": "Which of the following statements about platysma muscle is wrong?", "opts": {"A": "thin, bilateral structures that are continuous with the SMAS in the face", "B": "vertically oriented in the neck and predominantly horizontal in the lower face", "C": "The platysma has osseous connections to the mandible as it ascends over the mandibular border", "D": "Among the 3 variations in platysma, type 1 is the most common, which accounts for about 75% of population", "E": "In type 2 variation, there is no interdigitation of the platysma muscle"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Platysma（選『wrong』者，Cardoso de Castro 分類）：Type 1（約 75%，最常見）僅在頦下 1–2cm 交錯；Type 2 從下頦聯合至甲狀軟骨完全交錯；Type 3 則『無交錯（no interdigitation）』纖維向外走行。故 E 將『no interdigitation』歸為 type 2 屬錯誤（應為 type 3）。易混淆：platysma 與 SMAS 連續，頸部縱向、下臉多水平。", "peropt": {"A": "✗（正確）platysma 為薄的雙側結構，與臉部 SMAS 連續。", "B": "✗（正確）頸部縱向、下臉多水平走向。", "C": "✗（正確）platysma 上行越過下顎緣有骨性連結。", "D": "✗（正確）Type 1 最常見，約佔 75%。", "E": "✓（正解，錯誤敘述）『no interdigitation』屬 Type 3，非 Type 2。"}, "cite": "待複查（Neligan 頸部/platysma 記憶佐證）", "conflict": ""}, {"id": "5125", "sub": "AE11", "src": "NG", "years": [107], "stem": "Which of the following statements regarding the implants of facial skeletal augmentation is wrong?", "opts": {"A": "commercially available materials today including silicone, polyethelene, and polytetrafluoroethylene (PTFE)", "B": "Porous implants have a higher tendency to erode underlying bone", "C": "Smooth implants result in the formation of smooth-walled capsules", "D": "Polyethylene used for facial implants is porous with intramaterial porosity between 125 and 250μm", "E": "The most important implant characteristic that determines the nature of the encapsulation is the implant's surface characteristics"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面骨骼植入物：決定包膜（encapsulation）性質最重要的是植入物『表面特性』。Smooth 植入物形成平滑包膜、較易移動且對深部骨頭產生壓迫性侵蝕；Porous（如 Medpor，孔徑 125–250 μm）則允許組織長入、較不易移動與侵蝕骨頭。B 說 porous 較易侵蝕骨頭，方向相反，為錯誤敘述。", "peropt": {"A": "✗ 常用材料含 silicone、polyethylene、PTFE，正確。", "B": "✓（正解，即錯誤敘述）Smooth（非 porous）植入物較易造成骨侵蝕；porous 允許組織長入反而穩定。", "C": "✗ Smooth 植入物形成平滑壁包膜，正確。", "D": "✗ Facial polyethylene（Medpor）孔徑約 125–250 μm，正確。", "E": "✗ 表面特性是決定包膜性質最重要因素，正確。"}, "cite": "待複查（Neligan 顏面骨植入物 記憶佐證）", "conflict": ""}, {"id": "5126", "sub": "AE7", "src": "NG", "years": [107], "stem": "The internal nasal valve is the angle formed by the junction of the nasal septum and which of the following structure?", "opts": {"A": "cephalic margin of upper lateral cartilage", "B": "cephalic margin of lower lateral cartilage", "C": "caudal margin of upper lateral cartilage", "D": "caudal margin of lower lateral cartilage", "E": "none of above"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Internal nasal valve（內鼻瓣）＝鼻中膈與「upper lateral cartilage 之尾側緣（caudal margin of ULC）」所形成的夾角，正常約 10–15°，為鼻氣道阻力最大處（依 Poiseuille 對半徑高度敏感）。臨床：此角塌陷用 spreader graft 撐開。易混：external valve 由 lower lateral cartilage/鼻翼構成。", "peropt": {"A": "✗ ULC 之頭側緣（cephalic margin）非構成 internal valve 之處。", "B": "✗ LLC 頭側緣與 internal valve 角度無關。", "C": "✓(正解) Internal nasal valve 由鼻中膈與 ULC 尾側緣（caudal margin）構成，正確。", "D": "✗ LLC 尾側緣屬 external valve 區，非 internal valve。", "E": "✗ C 為正解，故非「以上皆非」。"}, "cite": "待複查（Neligan 內鼻瓣解剖 記憶佐證）", "conflict": ""}, {"id": "5127", "sub": "AE7", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. Which of the followings are the main sensory nerves to the nose? (複選)", "opts": {"A": "supratrochlear nerve", "B": "infratrochlear nerve", "C": "infraorbital nerve", "D": "external nasal nerve", "E": "inferior alveolar nerve"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 外鼻主要感覺神經(複選)為infraorbital nerve(V2，支配鼻側/鼻翼)與external nasal nerve(anterior ethmoidal nerve之外鼻支，源自nasociliary/V1，支配鼻背下段與鼻尖)。易混淆點：supratrochlear、infratrochlear多支配鼻根/內眥區屬次要;inferior alveolar nerve支配下顎牙齒，與鼻無關。", "peropt": {"A": "✗ Supratrochlear nerve主要供鼻根/眉間區，非外鼻主要感覺神經。", "B": "✗ Infratrochlear nerve供鼻根/內眥側，非題所指主要外鼻感覺神經。", "C": "✓ Infraorbital nerve供鼻側與鼻翼，為主要感覺神經。", "D": "✓ External nasal nerve(anterior ethmoidal分支)供鼻背下段與鼻尖。", "E": "✗ Inferior alveolar nerve支配下顎牙齒，與外鼻感覺無關。"}, "cite": "待複查（Neligan 鼻部感覺神經 記憶佐證）", "conflict": ""}, {"id": "5128", "sub": "AE8", "src": "NG", "years": [107], "stem": "複選2. Which of the followings are the common types of lateral osteotomies in rhinoplasty? (複選)", "opts": {"A": "low to high", "B": "high to high", "C": "high to low", "D": "low to low", "E": "double level"}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻整形之lateral osteotomy常見型態（選正確，複選）：low-to-low、low-to-high與double-level為常見的側方截骨型態，用以縮窄鼻骨底或矯正歪鼻並保留內鼻閥。high-to-high、high-to-low非標準常見型態。故正解ADE。", "peropt": {"A": "✓ low-to-high為常見側方截骨型態之一。", "B": "✗ high-to-high非常見標準型態。", "C": "✗ high-to-low非常見標準型態。", "D": "✓ low-to-low為常見側方截骨型態。", "E": "✓ double-level為常見側方截骨型態（用於寬鼻骨/凸出者）。"}, "cite": "待複查（Neligan Lateral osteotomy 記憶佐證）", "conflict": ""}, {"id": "5129", "sub": "AE7", "src": "NG", "years": [107], "stem": "複選3. The nasal septum is composed of which of the following structures? (複選)", "opts": {"A": "cribriform
