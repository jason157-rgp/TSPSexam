<!DOCTYPE html>
<html lang="zh-Hant"><head>

<title>AES 美容整外 · 整外專科考古題</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}
</style></head><body>

 </div>

<script>
const DATA=[{"id": "5000", "sub": "AE5", "src": "GS", "years": [110, 111, 112, 114], "stem": "關於chemical peels下列何者為是?", "opts": {"A": "α-hydroxy acids (glycolic acid, lactic acids) are considered superficial peels", "B": "Trichloroacetic acid (TCA) is considered a medium depth peel", "C": "Phenol is considered a deep peel", "D": "Topical tretinoin 0.05% and 0.1% can be used for skin preconditioning before chemical resurfacing", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 化學換膚的核心是「以酸的種類與濃度決定作用深度」：AHA（glycolic/lactic acid）屬 superficial peel（表皮至乳頭真皮）、TCA 為 medium-depth（至上網狀真皮）、Phenol（croton oil）為 deep peel（至中網狀真皮）。術前以 topical tretinoin 0.05–0.1% preconditioning 可使角質層均勻、加速再上皮化並增進滲透一致性。四項敘述皆為標準觀念，故選「以上皆是」。", "peropt": {"A": "✓ AHA（glycolic、lactic acid）確為 superficial peel，作用僅達表皮/乳頭真皮，恢復快、風險低。", "B": "✓ TCA 為典型 medium-depth peel（常用 20–35%），深度可依濃度調整。", "C": "✓ Phenol（搭配 croton oil）為 deep peel，效果最強但色素及心臟毒性風險最高。", "D": "✓ Tretinoin 0.05% 與 0.1% 用於換膚前皮膚 preconditioning，可增進滲透均勻並加速術後癒合。", "E": "✓(正解) A–D 皆為正確標準敘述，故答案為「以上皆是」。"}, "cite": "待複查（G&S 化學換膚 chemical peels 記憶佐證）", "conflict": ""}, {"id": "5001", "sub": "AE9", "src": "GS", "years": [110, 111, 112, 114], "stem": "不小心將玻尿酸注射至下列何處有最高的風險會造成retrograde occlusion of the central retinal artery而失明?", "opts": {"A": "Cheek", "B": "Oral commissure", "C": "Philtrum", "D": "Nasal dorsum", "E": "Nasolabial fold"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 玻尿酸注射失明的機轉為填充劑在高壓下逆行(retrograde)進入眼動脈(ophthalmic artery)系統，再順行栓塞central retinal artery導致視網膜缺血。鼻背(nasal dorsum)由dorsal nasal artery供應，此血管是ophthalmic artery的直接終末分支，與眼動脈連通最直接、逆行距離最短，故風險最高；連同glabella、nasal tip屬最危險區。易混淆點：cheek、nasolabial fold走angular artery雖亦有風險，但需更長的逆行路徑，風險低於鼻背。", "peropt": {"A": "✗ Cheek主要由facial/infraorbital系統供應，與眼動脈連通較間接，栓塞失明風險相對低。", "B": "✗ Oral commissure由inferior/superior labial artery供應，遠離眼動脈系統，風險最低。", "C": "✗ Philtrum由superior labial artery供應，雖近中線但與眼動脈連通不若鼻背直接。", "D": "✓(正解) Nasal dorsum由dorsal nasal artery(ophthalmic artery終末支)供應，與central retinal artery連通最直接、逆行栓塞路徑最短，失明風險最高。", "E": "✗ Nasolabial fold走angular artery，可經angular-ophthalmic吻合致盲，但逆行路徑長於鼻背，風險次之。"}, "cite": "待複查（Grabb & Smith 填充劑血管併發症/眼動脈解剖 記憶佐證）", "conflict": ""}, {"id": "5002", "sub": "AE5", "src": "GS", "years": [110, 111, 112, 114], "stem": "下列何者是使用CO2 ablative laser的clinical end point", "opts": {"A": "Frosting", "B": "Punctuate bleeding", "C": "Subcutaneous fat", "D": "Yellow chamois skin color", "E": "No clinical end point"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 CO2 ablative laser（10600 nm，chromophore為水）逐層汽化表皮與淺層真皮，術中每pass擦拭焦痂後所見的臨床終點是網狀真皮（reticular dermis）呈現的『黃色麂皮/羚羊皮樣（yellow chamois）』色澤，代表已達乳突真皮下緣且尚未過深。易混淆點：Frosting是化學換膚（TCA）的白霜終點；點狀出血（punctate bleeding）代表已進入乳突/網狀真皮深層、過深有疤痕風險；見到皮下脂肪則是嚴重過深。", "peropt": {"A": "✗ Frosting（白霜）是TCA等化學換膚的終點，非雷射換膚終點。", "B": "✗ Punctuate bleeding代表深達乳突真皮下方、已過深，是應停止而非追求的訊號，過深易致疤痕與色素異常。", "C": "✗ 見到皮下脂肪代表汽化過深、全層真皮被破壞，屬嚴重併發風險。", "D": "✓(正解) 黃色麂皮樣色澤（yellow chamois）即網狀真皮外觀，是CO2汽化的理想臨床終點。", "E": "✗ CO2 ablative laser有明確的可視化臨床終點，並非無終點。"}, "cite": "待複查（Grabb & Smith 雷射換膚 clinical endpoint 記憶佐證）", "conflict": ""}, {"id": "5003", "sub": "AE6", "src": "GS", "years": [110, 111, 114], "stem": "關於forehead與brow rejuvenation，下述哪項是錯誤的?", "opts": {"A": "Skin laxity and loss of adipose volume are associated with aging brow. Muscle activity and imbalance of that activity over time play a greater role in the appearance of the neck and midface in aging", "B": "The sentinel vein is an important landmark to establish the position of the temporal branch of the facial nerve", "C": "The temporal branch of the facial nerve can be most practically avoided during brow rejuvenation procedures by adhering to the deep temporal fascia during dissection", "D": "The supraorbital nerve is the dominant source of brow sensation", "E": "The most common complication to occur with the administration of a neuromodulator to the forehead is the dropped brow"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 眉/前額老化的核心：皮膚鬆弛與脂肪容積流失固然存在，但『肌肉活動與其失衡』對於上臉（額紋、眉間、眉下垂）的外觀影響最大——這正是neuromodulator（BoNT）在上臉效果卓越的原理。選項A把『肌肉活動主導』錯置到neck與midface（此兩區以韌帶鬆弛、SMAS及脂肪墊下移為主），故為錯誤敘述。易混點：sentinel vein與temporal (frontal) branch of facial nerve的定位、緊貼deep temporal fascia可保護神經。", "peropt": {"A": "✓(正解，為錯誤敘述) 肌肉活動主導的是額頭/眉部（上臉）的老化外觀，而非neck與midface；後兩者以韌帶與脂肪墊下垂為主，故此句錯置區域。", "B": "✗ 正確。sentinel vein（medial zygomatico-temporal vein）確為定位temporal branch of facial nerve的重要標誌。", "C": "✗ 正確。分離時緊貼deep temporal fascia可最實用地避開位於其淺面的temporal branch。", "D": "✗ 正確。supraorbital nerve確為眉部感覺的主要來源。", "E": "✗ 正確。額肌施打neuromodulator後最常見併發症即為dropped brow（眉下垂）。"}, "cite": "待複查（Grabb & Smith 前額/眉年輕化 記憶佐證）", "conflict": ""}, {"id": "5004", "sub": "AE4", "src": "GS", "years": [110, 111, 112, 114], "stem": "關於facelift，下述哪項是錯誤的?", "opts": {"A": "The most common complication of a facelift is hematoma", "B": "Female gender is the risk factor for hematoma", "C": "The great auricular nerve is the most frequent nerve injury of facelift surgery", "D": "Skin lifts are not universally popular, as most surgeons prefer SMAS manipulation because of the tension that is placed adjacent to or in the suture line.", "E": "SMAS is contiguous with the galea aponeurotica, the temporoparietal fascia, parotid masseteric fascia, platysma muscle"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 併發症與解剖核心：最常見併發症為 hematoma，而 hematoma 的高危險群是『男性』（男性皮脂腺豐富、鬍鬚區血流多、術後血壓較高），故『female gender 是危險因子』的敘述為誤。易混淆點：最常受傷神經是 great auricular nerve（感覺神經），而非運動神經。SMAS 與 galea、temporoparietal fascia、parotidmasseteric fascia、platysma 為同一連續層。⚠此題與 GS113-B09-Q02 為『選項重排家族』，選項集合相同但字母對應不同，務必記概念勿背字母。", "peropt": {"A": "✗（此為正確敘述，非答案）Facelift 最常見併發症確為血腫（hematoma）。", "B": "✓（正解，此為錯誤敘述）血腫的危險因子是『男性』而非女性；男性血流豐富、術後高血壓風險高。", "C": "✗（正確敘述）great auricular nerve 確為 facelift 最常受傷的神經。", "D": "✗（正確敘述）單純 skin lift 因縫線張力大而較不受青睞，多數術者採 SMAS 操作。", "E": "✗（正確敘述）SMAS 與 galea、TPF、parotidmasseteric fascia、platysma 為連續層。"}, "cite": "待複查（Grabb & Smith 拉皮/SMAS 記憶佐證）", "conflict": "選項重排家族：與 GS113-B09-Q02 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5005", "sub": "AE7", "src": "GS", "years": [110, 111, 114], "stem": "About the general guideline to assess nasal aesthetics, which of the following statements is wrong?", "opts": {"A": "Alar base width should be roughly equal to the distance between the medial canthi", "B": "Bony base width should be roughly 50% of the distance between the medial canthi", "C": "The nostril should be two-thirds and the lobule one-third of the nasal height in the worm's eye view", "D": "The length of the nose from radix to tip should be approximately the same as the distance from the stomion to the menton", "E": "Nasolabial angle is usually 95° to 100° in women and 90° to 95° in men"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部美學測量核心比例：Alar base width ≈ 兩內眥間距（intercanthal distance），而 bony base width 約為內眥間距的 80%（非 50%）。此題考的是「骨性鼻基底寬度」的黃金比例，易與 alar base 混淆。其餘 worm's eye view 中 nostril:lobule=2:1、radix–tip 長度≈stomion–menton、nasolabial angle 女 95–100°/男 90–95° 均為標準值，須整組背熟。", "peropt": {"A": "✗ Alar base width 約等於兩內眥間距，為正確敘述。", "B": "✓（正解，即錯誤敘述）Bony base width 應約為內眥間距的 80%，而非 50%；此為本題唯一錯誤處。", "C": "✗ Worm's eye view 下 nostril 佔鼻高 2/3、lobule 佔 1/3，正確。", "D": "✗ Radix 到 tip 的鼻長≈stomion 到 menton 的下臉高，正確。", "E": "✗ Nasolabial angle 女性 95–100°、男性 90–95°，正確。"}, "cite": "待複查（Grabb & Smith 鼻部美學測量 記憶佐證）", "conflict": ""}, {"id": "5006", "sub": "AE2", "src": "GS", "years": [110, 111, 114], "stem": "關於blepharoplasty與相關的解剖構造，下述哪項是錯誤的? (複選)", "opts": {"A": "Snap back test is often used to assess the degree of upper eyelid laxity.", "B": "If the margin of the eyelid is more than 2 mm and lower than the superior limbus, the patient may have eyelid ptosis.", "C": "A lateral canthotomy should be performed emergently to relieve intraorbital pressure in the case of vision-threatening hematomas", "D": "The pretarsal portion of orbicularis is associated with voluntary blinking.", "E": "The superior and inferior oblique muscles are the most commonly injured extraocular muscles in upper and lower blepharoplasty, respectively"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 本題為「找出錯誤敘述」的複選：正解＝敘述有誤者。Snap-back test 評估的是「下」眼瞼（lower eyelid）鬆弛度而非上眼瞼；pretarsal orbicularis 主司「非自主（involuntary）眨眼」，自主眨眼與用力閉眼是 preseptal/orbital 部分。⚠ 本題與 GS113-B09-Q05 為選項重排家族，選項集合相同但字母對應不同——請記「概念」勿背字母。", "peropt": {"A": "✓(錯誤敘述,故選) Snap-back test 評估的是下眼瞼（lower lid）鬆弛，非 upper eyelid，敘述有誤。", "B": "✗ 眼瞼緣低於 superior limbus 超過 2 mm 提示 ptosis，此為正確敘述，故不選。", "C": "✗ 面對 vision-threatening hematoma 需緊急 lateral canthotomy 減壓，正確敘述，不選。", "D": "✓(錯誤敘述,故選) Pretarsal orbicularis 負責「非自主」眨眼；敘述稱 voluntary 有誤，故選。", "E": "✗ Superior/inferior oblique 分別為上/下眼瞼手術最易傷及的眼外肌，屬正確敘述，不選。"}, "cite": "待複查（G&S 眼瞼整形解剖 記憶佐證）", "conflict": "選項重排家族：與 GS113-B09-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5007", "sub": "AE1", "src": "GS", "years": [110, 111], "stem": "執行腹部整形(abdominoplasty)手術時,若傷及鄰近的感覺神經,會造成感覺神經相對應的支配區域在術後產生麻痛或感覺異常的併發症,以下有關感覺神經的描述,何者正確?", "opts": {"A": "Lateral femoral cutaneous nerve途經前上髂棘(ASIS)內側一公分,若於術中受損,後造成前外側大腿麻痛", "B": "執行low horizontal incision時,可能在切口外側傷及Iliohypogastric nerve,造成術後大腿內側麻痛", "C": "執行low horizontal incision時,可能在切口外側傷及Ilioinguinal nerve,造成術後臀部外側麻痛", "D": "Intercostal nerve走在腹內斜肌(internal oblique abdominis)及腹外斜肌(external oblique abdominis)之間,若於術中受損,可能造成腹壁及側腹的麻痛", "E": "以上皆非"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 腹整形感覺神經併發症以神經走行與支配區配對為考點。Lateral femoral cutaneous nerve(LFCN)於ASIS內側約1cm處穿出，損傷造成前外側大腿麻痛(meralgia paresthetica)，是abdominoplasty最典型的神經傷害。易混淆點：iliohypogastric支配恥骨上/側腹而非大腿內側；ilioinguinal支配腹股溝、陰部及大腿內側而非臀外側；intercostal(subcostal)神經走在腹內斜肌與腹橫肌之間(非內外斜肌之間)。", "peropt": {"A": "✓(正解) LFCN於ASIS內側約1cm穿出，術中受損造成前外側大腿麻痛(meralgia paresthetica)，敘述正確。", "B": "✗ Iliohypogastric損傷造成恥骨上/下腹及側臀區感覺異常，非大腿內側，支配區配對錯誤。", "C": "✗ Ilioinguinal支配腹股溝、陰部與大腿內側，非臀部外側，配對錯誤。", "D": "✗ Intercostal(subcostal)神經走在腹內斜肌與腹橫肌(transversus)之間，非內外斜肌之間，層次敘述錯誤。", "E": "✗ 因A為正確敘述，故非以上皆非。"}, "cite": "待複查（Grabb & Smith 腹整形感覺神經解剖 記憶佐證）", "conflict": ""}, {"id": "5008", "sub": "AE1", "src": "GS", "years": [110, 111], "stem": "體雕手術常藉由抽脂改善肢體的輪廓及外觀,但若在zones of adherence區域內執行抽脂,易造成術後外觀的不規則(contour irregularities),下列哪些可以為zones of adherence之區域?", "opts": {"A": "Gluteal crease", "B": "Lateral gluteal depression", "C": "Middle medial thigh", "D": "Distal iliotibial tract", "E": "Distal posterior thigh"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Zones of adherence是皮下組織與深筋膜緊密黏著的區域，此處抽脂易破壞黏著結構而造成術後輪廓凹凸不平（contour irregularities），故應避免或極保守操作。經典五個區域即本題全部選項：gluteal crease、lateral gluteal depression、middle medial thigh、distal iliotibial tract、distal posterior thigh。注意distal（遠端）髂脛束才是黏著區，proximal iliotibial tract則不是。", "peropt": {"A": "✓ Gluteal crease為典型zone of adherence。", "B": "✓ Lateral gluteal depression為典型zone of adherence。", "C": "✓ Middle medial thigh為典型zone of adherence。", "D": "✓ Distal iliotibial tract為典型zone of adherence（proximal則非）。", "E": "✓ Distal posterior thigh為典型zone of adherence。"}, "cite": "待複查（Grabb & Smith Liposuction zones of adherence 記憶佐證）", "conflict": ""}, {"id": "5009", "sub": "AE5", "src": "GS", "years": [111], "stem": "Which Fitzpatrick skin type rarely burns and tans dark easily?", "opts": {"A": "II", "B": "III", "C": "IV", "D": "V", "E": "None of the above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Fitzpatrick skin type以曬傷/曬黑反應分級：type IV『minimal burn, tans easily』，type V『rarely burns, tans darkly (profusely)』，type VI『never burns, deeply pigmented』。題幹『rarely burns and tans dark easily』正對應type V。臨床意義：type IV以上族群雷射/換膚後易發生PIH（post-inflammatory hyperpigmentation），須降能量並前處理。", "peropt": {"A": "✗ Type II易曬傷、極少曬黑，與題幹相反。", "B": "✗ Type III偶爾曬傷、逐漸曬黑，非『rarely burns』。", "C": "✗ Type IV為minimal burn且tans easily，仍偶有曬傷，不及V『rarely burns』貼切。", "D": "✓(正解) Type V：rarely burns、tans darkly，完全符合題幹描述。", "E": "✗ 已有明確符合選項(D)，故非。"}, "cite": "待複查（Fitzpatrick分型 記憶佐證）", "conflict": ""}, {"id": "5010", "sub": "AE11", "src": "GS", "years": [112], "stem": "A 24-year-old patient presents with dissatisfaction of his facial appearance. Examination reveals a retruded chin, and alloplastic chin augmentation is planned. Compared with porous polyethylene implants for facial augmentation, silicone implants have", "opts": {"A": "Low infection rate", "B": "Decreased concern of migration", "C": "Better contour to the facial skeleton", "D": "Easier removal", "E": "Increased visibility"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面骨骼植入物材質比較：silicone（矽膠）表面光滑、無組織長入（no tissue ingrowth），故『容易取出（easier removal）』為其相對於 porous polyethylene（Medpor）的特點；但也因此位移（migration）風險較高、與骨骼貼合度較差。Porous PE 具孔隙讓組織長入→穩定、不易位移、貼合佳，但取出困難。易混淆：silicone 的優勢是『好取出』，缺點才是位移與可觸/可見。", "peropt": {"A": "✗ 感染率兩者無明確以 silicone 較低之優勢，非鑑別點。", "B": "✗ 相反：silicone 因無組織長入，位移疑慮『較高』而非降低。", "C": "✗ 貼合骨骼輪廓 porous PE 較佳（組織長入）。", "D": "✓（正解）silicone 光滑、有纖維囊包覆但無長入，故取出容易。", "E": "✗ 增加可見度非兩者比較之正確特徵描述。"}, "cite": "待複查（Grabb & Smith 顏面輪廓植入物 記憶佐證）", "conflict": ""}, {"id": "5011", "sub": "AE5", "src": "GS", "years": [112, 113, 114], "stem": "The following statements about lasers are true except?", "opts": {"A": "The chromophores in the skin include oxyhemoglobin, deoxyhemoglobin, melanin, water, and tattoo pigment.", "B": "The pulse width above the thermal relaxation time (TRT) can decrease collateral injury within the skin and increase selectivity", "C": "Oxyhemoglobin displays an absorption band from 400 to 1200 nm, with major peaks at 418, 542, and 577 nm and a minor peak that encompasses 1064 nm.", "D": "Laser penetration decreases owing to the ubiquity and highly absorptive nature of water.", "E": "After absorption of laser light, chromophores may reemit photons or undergo photothermal, photomechanical, or photochemical reactions."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 選擇性光熱分解（selective photothermolysis）核心：pulse duration 需「小於或等於」目標的 thermal relaxation time (TRT)，才能把熱侷限在標的、提高選擇性；若 pulse width 大於 TRT，熱會擴散到周邊組織，反而『增加』附帶傷害、『降低』選擇性。B 選項把因果講反，為 true except 的答案。其餘 chromophores（oxyHb/deoxyHb/melanin/water/tattoo）、oxyHb 吸收峰（418/542/577 nm）、水的吸收限制穿透深度、光熱/光機械/光化學反應皆正確。", "peropt": {"A": "✗ 皮膚 chromophores 含 oxyHb、deoxyHb、melanin、water、tattoo pigment，正確。", "B": "✓（正解，即錯誤敘述）Pulse width 大於 TRT 會使熱擴散、增加附帶傷害並降低選擇性；正確概念應為 ≤ TRT。", "C": "✗ OxyHb 吸收帶 400–1200 nm，主峰 418/542/577 nm、1064 nm 有次峰，正確。", "D": "✗ 水普遍存在且吸收強，會使雷射穿透深度下降，正確。", "E": "✗ Chromophore 吸收後可再放光子或行 photothermal/photomechanical/photochemical 反應，正確。"}, "cite": "待複查（Grabb & Smith 雷射物理/選擇性光熱分解 記憶佐證）", "conflict": ""}, {"id": "5012", "sub": "AE2", "src": "GS", "years": [112, 113, 114, 115], "stem": "Which of the following describes evaluation of the Müller muscle function?", "opts": {"A": "Distance of upper lid margin to corneal light reflex midpoint.", "B": "Distance of upper eyelid margin resting below superior limbus.", "C": "Maximal excursion measurement of the lid margin from extreme upgaze to extreme downgaze.", "D": "Instilling 2.5% phenylephrine eye drop and evaluating changes to marginal reflex distance.", "E": "None of the above"}, "ans": "D", "multi": false, "etype": "ai", "expl": "Evaluation of the sympathetically innervated Müller muscle function can be performed by instilling 2.5% phenylephrine eye drops and evaluating changes to marginal reflex distance after 10 minutes.", "key": "🎯 Müller muscle 為交感神經支配的平滑肌，其功能評估以 2.5% phenylephrine 眼藥水滴入後 10 分鐘再測 marginal reflex distance（MRD）變化來判定，若 MRD 上升代表 Müller 有反應、適合行 Müller muscle-conjunctival resection（MMCR）。易混點：MRD1 是測上瞼緣到角膜反光點距離（評估 ptosis 程度），levator function 是測極上／極下凝視間瞼緣移動幅度——兩者皆非 Müller 專屬評估。", "peropt": {"A": "✗ 上瞼緣到角膜反光中點距離為 MRD1，用來量化 ptosis 嚴重度，非評估 Müller 功能。", "B": "✗ 上瞼緣位於 superior limbus 下方之距離屬瞼位描述，非 Müller 功能測試。", "C": "✗ 極上凝視至極下凝視的瞼緣最大移動量測的是 levator function，非 Müller。", "D": "✓(正解) 滴 2.5% phenylephrine 後評估 MRD 變化，即為交感支配之 Müller 肌功能測試。", "E": "✗ D 為正確答案，故非「以上皆非」。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5013", "sub": "AE9", "src": "GS", "years": [112, 114], "stem": "關於 fat grafting 的敘述，下列何者為是？(複選)", "opts": {"A": "Fat graft take following injection is 100%, and therefore the process of fat grafting often needs to be repeated.", "B": "The technique for injection is critical for maximizing outcomes and minimizing complications.", "C": "Fat grafting into the breast following oncologic resection has not been associated with increased risks for tumor recurrence.", "D": "Although early animal studies demonstrated potential benefits of adipose-derived stem cells in wound healing, the true clinical application of these has yet to be recognized.", "E": "In general, the less manipulation of the fat graft, the better the viability."}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 脂肪移植(fat grafting)核心：脂肪存活(graft take)絕非100%，正因部分吸收才需分次移植且常overcorrection。注射技術(層次、微量多線)是決定存活與併發症的關鍵；操作愈輕柔(less manipulation)存活愈佳。乳癌切除後脂肪移植目前實證未顯示增加腫瘤復發風險；ADSC在傷口癒合的動物研究有潛力但臨床應用尚待確立。", "peropt": {"A": "✗(非正解) 脂肪存活率並非100%，正因會部分吸收才需重複施打，敘述本身錯誤。", "B": "✓ 注射技術(層次分布、微量鋪線)對優化結果與降低併發症至關重要。", "C": "✓ 腫瘤切除後乳房脂肪移植目前實證未證實增加復發風險。", "D": "✓ ADSC於傷口癒合的早期動物研究具潛力，但真正臨床應用尚未被確立。", "E": "✓ 一般而言脂肪操作愈少(離心/處理愈輕柔)存活率愈高。"}, "cite": "待複查（Grabb & Smith 脂肪移植 記憶佐證）", "conflict": ""}, {"id": "5014", "sub": "AE6", "src": "GS", "years": [112], "stem": "關於forehead與brow rejuvenation，下述哪項是錯誤的?", "opts": {"A": "Skin laxity and loss of adipose volume和aging brow相關，Muscle activity and imbalance of that activity over time則是影響midface and neck 老化的重要因素", "B": "Sentinel vein是確定 the temporal branch of the facial nerve的重要landmark", "C": "在做brow rejuvenation procedures時緊貼著 deep temporal fascia during dissection可以避免傷到 temporal branch of the facial nerve", "D": "Supraorbital nerve是brow sensation的主要來源", "E": "使用neuromodulator to the forehead最常發生的complication是 Dropped brow"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 老化機轉的分區觀念：在『眉/前額』區域，肌肉活動與長期肌力失衡（frontalis上提 vs corrugator/orbicularis/procerus下拉）是外觀改變的主導力量；而在『中臉與頸部』，皮膚鬆弛與脂肪容積流失才是主導。選項A把兩者對調（說midface/neck由肌肉活動主導），故為錯誤敘述。其餘B（sentinel vein定位facial nerve temporal branch）、C（緊貼deep temporal fascia避開temporal branch）、D（supraorbital nerve為眉部主要感覺來源）、E（neuromodulator最常見併發症為dropped brow）皆正確。", "peropt": {"A": "✓(正解，即錯誤敘述) 對調了機轉：眉/前額由肌肉活動主導，中臉與頸部才由皮膚鬆弛與脂肪流失主導，故此敘述錯誤。", "B": "✗ 敘述正確：sentinel vein是定位facial nerve temporal branch的重要landmark。", "C": "✗ 敘述正確：緊貼deep temporal fascia剝離可最實際地避開temporal branch。", "D": "✗ 敘述正確：supraorbital nerve是眉部感覺的主要來源（角色大於supratrochlear）。", "E": "✗ 敘述正確：前額施打neuromodulator最常見併發症為dropped brow。"}, "cite": "待複查（Grabb & Smith Forehead/Brow rejuvenation 記憶佐證）", "conflict": ""}, {"id": "5015", "sub": "AE7", "src": "GS", "years": [112], "stem": "關於理想鼻形之描述，下列哪項是錯誤的?", "opts": {"A": "Alar base的寬度約等於medial canthi之間的距離", "B": "Bony base的寬度大約是medial canthi距離的50%", "C": "從worm's eye view來看時，Nostril大約佔nasal height的 2/3，lobule佔1/3", "D": "從radix到tip的長度大約等於從stomion到menton的距離", "E": "Nasolabial angle在女性大約是95°到 100°，在男性則是90°到 95°"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 理想鼻部測量的核心比例須熟記：alar base寬度≈intercanthal distance（≈眼裂寬）；bony base（骨性鼻基底）寬度約為intercanthal distance的『80%』而非50%——選項B數值錯誤故為答案。其餘比例：worm's eye view下nostril佔鼻高2/3、lobule1/3；radix→tip≈stomion→menton；nasolabial angle女95–100°、男90–95°。", "peropt": {"A": "✗ 正確。alar base寬度約等於兩內眥(medial canthi)間距。", "B": "✓(正解，為錯誤敘述) 骨性鼻基底寬度約為內眥間距的80%，非50%。", "C": "✗ 正確。worm's eye view下nostril佔鼻高約2/3、lobule約1/3。", "D": "✗ 正確。radix到tip長度約等於stomion到menton距離。", "E": "✗ 正確。nasolabial angle女性95–100°、男性90–95°。"}, "cite": "待複查（Grabb & Smith 鼻部美學測量 記憶佐證）", "conflict": ""}, {"id": "5016", "sub": "AE2", "src": "GS", "years": [112], "stem": "關於blepharoplasty與相關的解剖構造，下述哪項是錯誤的? (複選)", "opts": {"A": "Snap back test常用於評估upper eyelid laxity的程度", "B": "If margin of the eyelid is more than 2 mm and lower than the superior limbus, 病患可能有eyelid ptosis的問題", "C": "如果出現vision-threatening hematomas，應緊急進行lateral canthotomy to relieve intraorbital pressure", "D": "The pretarsal portion of orbicularis和 voluntary blinking有關", "E": "The superior and inferior oblique muscles分別是 upper and lower blepharoplasty手術中最常受傷的extraocular muscles"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 眼瞼整形解剖（複選，選『錯誤』者）：Snap-back test 評估的是『下眼瞼』張力/鬆弛（lower lid laxity），非 upper eyelid，故 A 錯。眼輪匝肌 pretarsal 部分負責『不自主/反射性眨眼（involuntary blink）』，自主用力閉眼靠 preseptal/orbital 部分，故 D『pretarsal 與 voluntary blinking 有關』錯。易混淆：vision-threatening hematoma 須緊急 lateral canthotomy/cantholysis 減壓（C 正確）。", "peropt": {"A": "✓（正解，錯誤敘述）Snap-back test 評估下眼瞼張力，非上眼瞼鬆弛。", "B": "✗（正確敘述）上瞼緣位置低於上輪部 >2mm 提示 ptosis（MRD1 概念）。", "C": "✗（正確敘述）視力威脅性血腫須緊急 lateral canthotomy 減壓。", "D": "✓（正解，錯誤敘述）pretarsal orbicularis 主司不自主眨眼，非 voluntary blinking。", "E": "✗（依考題視為正確）下斜肌於下眼瞼手術（脂肪墊間）最易受傷，本題視 E 為正確敘述。"}, "cite": "待複查（Grabb & Smith 眼瞼解剖 記憶佐證）", "conflict": ""}, {"id": "5017", "sub": "AE1", "src": "GS", "years": [112], "stem": "Which one of the following is NOT a zone of adherence in the lower limb?", "opts": {"A": "Gluteal crease", "B": "Lateral gluteal depression.", "C": "Middle medial thigh", "D": "Proximal iliotibial tract", "E": "Distal posterior thigh"}, "ans": "D", "multi": false, "etype": "ai", "expl": "Grabb&Smith Chap 64 Liposuction\n\nZones of adherence are recognized regions in which the subcutaneous tissues are securely adherent to the deep fascia. Liposuction should be avoided or used with extreme caution in these areas:\n\nGluteal crease\n\nLateral gluteal depression\n\nMiddle medial thigh\n\nDistal iliotibial tract\n\nDistal posterior thigh", "key": "🎯 Zones of adherence 是皮下組織與深筋膜緊密黏著之處，抽脂於此易造成 contour irregularity，須避開。標準五處：Gluteal crease、Lateral gluteal depression、Middle medial thigh、Distal iliotibial tract、Distal posterior thigh。注意是『Distal（遠端）』ITT 而非 proximal；本題 proximal iliotibial tract 即為非 zone of adherence 的陷阱選項。", "peropt": {"A": "✗ Gluteal crease 為 zone of adherence。", "B": "✗ Lateral gluteal depression 為 zone of adherence。", "C": "✗ Middle medial thigh 為 zone of adherence。", "D": "✓（正解）Proximal iliotibial tract 並非 zone of adherence；黏著區為『Distal』ITT。", "E": "✗ Distal posterior thigh 為 zone of adherence。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5018", "sub": "AE3", "src": "GS", "years": [112], "stem": "Regarding liposuction, which one of the following is safe practice?", "opts": {"A": "Liposuction can be offered as a treatment for obesity as long as patients are within 50% of ideal body weight.", "B": "Lidocaine dosing in wetting solution can be safe up to 45 mg/kg.", "C": "Lipoaspirate amount greater than 5 L is considered large volume liposuction. Maintenance IVF should be started after lipoaspirate volumes exceed 5L.", "D": "Gluteal crease, lateral gluteal depression, middle medial thigh, and distal posterior thigh are safe areas to do liposuction", "E": "Heavy smokers or patients with poorly controlled diabetes are at increased risk of wound healing complications, and operation should be delayed until patient has 4 weeks smoking cessation and HbA1C <7.5."}, "ans": "E", "multi": false, "etype": "ai", "expl": "Grabb&Smith Chap 64 Liposuction\n\nLiposuction should not be offered as a treatment for global obesity or cellulite, and patients should be within 30% of ideal body weight.\n\nMaximal lidocaine dosing is 7 mg/kg. Wetting solution, however, much higher doses, up to 35 mg/kg, have been reported as safe.\n\nLipoaspirate amount greater than 5 L is considered large volume liposuction. Maintenance IVF should be administered up to 5 L. Every 1 mL of aspirate beyond 5 L should be replaced with 0.25 mL of IVF. Overnight monitoring of fluid balance (based on vital signs and urinary output) should be considered.\n\nLiposuction should be avoided in zones of adherence as the risk of contour irregularities is high: Gluteal crease, Lateral gluteal depression, Middle medial thigh, Distal iliotibial tract, Distal posterior thigh", "key": "🎯 抽脂安全實務的關鍵數字與禁區：抽脂非肥胖治療、病人應在理想體重 30% 內；lidocaine 傳統上限 7 mg/kg，但 wetting solution 稀釋下可安全達 35 mg/kg；lipoaspirate >5 L 為 large-volume，超過 5 L 每 1 mL 需補 0.25 mL IVF；zones of adherence 為抽脂禁區（易 contour irregularity）。唯一安全實務為術前優化：重度吸菸／血糖控制不佳者延後手術、戒菸 4 週且 HbA1C<7.5。", "peropt": {"A": "✗ 抽脂不用於治療肥胖，且病人應在理想體重 30%（非 50%）內。", "B": "✗ Lidocaine 在 wetting solution 下安全上限約 35 mg/kg（非 45 mg/kg）。", "C": "✗ 維持性 IVF 應於前 5 L 內即給予，超過 5 L 才另行補充，非「超過 5 L 才開始」。", "D": "✗ 該四區屬 zones of adherence，為抽脂禁區而非安全區。", "E": "✓(正解) 重度吸菸／糖尿病控制不佳增加傷口併發症，宜延後至戒菸 4 週且 HbA1C<7.5，屬正確安全實務。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5019", "sub": "AE1", "src": "GS", "years": [112], "stem": "Regarding body contouring surgery after massive weight loss, which of the following is TRUE?(複選)", "opts": {"A": "Body contouring procedures should allow at least 12 months after bariatric surgery and 6 months of stable weight for patients to achieve metabolic and nutritional homeostasis.", "B": "Patients who have plateaued at higher than ideal BMI or require optimization of medical comorbidities might not be ready for body contouring surgery.", "C": "Delayed wound healing, wound dehiscence, seroma are common complications in body contouring procedures and can often be managed on an outpatient basis.", "D": "Due to risk of wound dehiscence and delayed healing, avoid operating on patients actively using any form of nicotine product.", "E": "Recurrent skin laxity is unpredictable and a source of patient dissatisfaction."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "Body contouring procedures should allow at least 12 months after bariatric surgery and 6 months of stable weight for patients to achieve metabolic and nutritional hemeostasis. (Chap 66, pg 652)\n\nPatients who have plateaued at higher than ideal BMI or require optimization of medical comorbidities might not be ready for major elective body contouring surgery. (Cap 65 pg 644)\n\nDelayed wound healing, wound dehiscence, seroma are common complications in body contouring procedures and can often be managed on outpatient basis. (Chap 65, pg649)\n\nDue to risk of wound dehiscence and delayed healing, it is not advisable to operation on patients actively using any form of nicotine product. (Chap 63,630)\n\nRecurrent skin laxity is unpredictable an a source of patient dissatisfaction.(Chap 65, pg649)", "key": "🎯 大量減重(MWL)後體雕的病人選擇與併發症全屬正確敘述：減重手術後應等至少12個月且體重穩定6個月以達代謝營養homeostasis；BMI仍偏高或共病未優化者尚未適合;傷口延遲癒合、裂開、seroma常見且多可門診處理;任何形式尼古丁使用者應避免手術;復發性皮膚鬆弛不可預測且為病人不滿來源。", "peropt": {"A": "✓ 減重手術後至少12個月且體重穩定6個月，以達代謝與營養平衡。", "B": "✓ 停滯於高於理想BMI或共病未優化者可能尚未適合體雕手術。", "C": "✓ 延遲癒合、傷口裂開、seroma為常見併發症，多可於門診處理。", "D": "✓ 因裂開與延遲癒合風險，應避免對任何形式尼古丁使用者施術。", "E": "✓ 復發性皮膚鬆弛不可預測，是病人不滿意的來源。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5020", "sub": "AE9", "src": "GS", "years": [113], "stem": "Which of the following statements about complications after filler injections is incorrect?", "opts": {"A": "If hyaluronic acids (HAs) are injected too superficially, they can be managed immediately with a massage to help distribute them. If the massage is ineffective, hyaluronidase can be considered.", "B": "The glabellar region is considered high-risk due to the large size of the supratrochlear vessels.", "C": "Blindness after intraarterial filler injection has been linked to the anatomical connection between terminal branches of the angular artery and the ophthalmic artery.", "D": "Hyperbaric oxygen therapy is one of the potential treatments for skin necrosis following HA injections.", "E": "Hypersensitivity reactions to injectable fillers can be treated with intralesional corticosteroids, oral antihistamines, or systemic steroids."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 填充劑併發症題（選錯誤者）：眉間（glabella）之所以是失明/皮膚壞死高風險區，並非因supratrochlear血管『管徑粗大』，恰恰相反——是因為這些是管徑細小、缺乏側枝循環的終末動脈（end arteries），且與眼動脈（ophthalmic artery）系統交通，逆行栓塞即可致盲。故B敘述錯誤。其餘皆正確：淺層HA可先按摩再考慮hyaluronidase、angular artery與ophthalmic artery交通導致失明、HBOT可用於皮膚壞死、過敏反應可用類固醇/抗組織胺處理。", "peropt": {"A": "✗ 敘述正確：HA過淺可先按摩分散，無效再用hyaluronidase。", "B": "✓(正解，即錯誤敘述) glabella高風險不是因supratrochlear血管『粗大』，而是細小終末動脈缺乏側枝且與眼動脈交通，逆行栓塞致盲，故錯誤。", "C": "✗ 敘述正確：angular artery終末支與ophthalmic artery相通，是動脈內注射致盲的解剖基礎。", "D": "✗ 敘述正確：HBOT為HA注射後皮膚壞死的潛在治療之一。", "E": "✗ 敘述正確：填充劑過敏可用病灶內類固醇、口服抗組織胺或全身性類固醇處理。"}, "cite": "待複查（Grabb & Smith Filler 併發症 記憶佐證）", "conflict": ""}, {"id": "5021", "sub": "AE9", "src": "GS", "years": [113], "stem": "Which of the following statements is incorrect regarding to lipofilling?", "opts": {"A": "Harvesting techniques have not been proven to increase fat graft take.", "B": "The survival rate of fat grafting varies, ranging from 50% to 70%.", "C": "Fat grafting after breast cancer oncological resection has been associated with an increased risk of tumor recurrence and distant metastasis.", "D": "Blindness is one of the dreaded complications of facial lipofilling, although fat graft particles are larger than those of hyaluronic acids (HAs).", "E": "Oil cysts or fat necrosis after breast lipofilling may occur and lead to discomfort and palpable masses, for which biopsy may be required to differentiate from malignancy."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Lipofilling（脂肪移植）觀念現代化核心：乳癌腫瘤切除後的自體脂肪移植『並未』被證實增加腫瘤復發或遠端轉移風險（多篇oncological safety研究支持），故選項C為錯誤敘述。易混點：脂肪存活率約50–70%、harvesting手法未證實提升take、臉部注射失明（栓塞）雖脂肪顆粒大於HA仍可能發生、乳房油囊/脂肪壞死可能需切片與惡性鑑別。", "peropt": {"A": "✗ 正確。各種harvesting技術尚未被證實能提高fat graft take。", "B": "✗ 正確。脂肪移植存活率約50–70%。", "C": "✓(正解，為錯誤敘述) 乳癌切除後脂肪移植未被證實增加復發或轉移風險。", "D": "✗ 正確。臉部lipofilling仍可致失明，雖脂肪顆粒大於HA。", "E": "✗ 正確。乳房脂肪移植後油囊/脂肪壞死可形成腫塊，必要時需切片鑑別惡性。"}, "cite": "待複查（Grabb & Smith 脂肪移植 記憶佐證）", "conflict": ""}, {"id": "5022", "sub": "AE6", "src": "GS", "years": [113], "stem": "關於forehead與brow rejuvenation，下述哪項是錯誤的?", "opts": {"A": "Skin laxity and loss of adipose volume are associated with aging brow. Muscle activity and imbalance of that activity over time play a greater role in the appearance of the neck and midface in aging.", "B": "The most common complication to occur with the administration of aneuromodulator to the forehead is the dropped brow.", "C": "The supraorbital nerve is the dominant source of brow sensation.", "D": "The temporal branch of the facial nerve can be most practically avoided during brow rejuvenation procedures by adhering to the deep temporal fascia during dissection.", "E": "The Sentinel vein is an important landmark to establish the position of the temporal branch of the facial nerve."}, "ans": "A", "multi": false, "etype": "ai", "expl": "A: In the neck and midface it is skin laxity and loss of adipose volume that are the dominant forces in the aging process, muscle activity and imbalance of that activity over time play a greater role in the appearance of the brow in aging.\n\nB: Perhaps, the most common complication to occur with administration of a neuromodulator to the forehead is the dropped brow in which the eyebrows sag and brow (and often upper eyelid) ptosis is exaggerated.\n\nC: The supraorbital nerve plays a far more significant role in brow innervation than the supratrochlear nerve.\n\nadhering to the deep temporal fascia during dissection and remaining more than 1.5 cm above the lateral orbital rim.\n\nE: The sentinel vein represents an important landmark, as it can be used to establish the position of the temporal branch of the facial nerve (1 cm lateral and inferior to the sentinel vein) as well as the temporal line of fusion at the temporal crest.", "key": "🎯 前額/眉部年輕化（選『錯誤』者）：老化機轉在不同區域主導因子不同——『眉部（brow）』主要受肌肉活動與其失衡主導；而『頸部與中臉』則以皮膚鬆弛與脂肪體積流失為主導。A 將兩者對調（把 brow 的機轉套在 neck/midface），故為錯誤。易混淆：supraorbital nerve 才是眉部感覺主力（非 supratrochlear）；sentinel vein 為 facial nerve temporal branch 的重要定位標記。", "peropt": {"A": "✓（正解，錯誤敘述）機轉對調：眉部由肌肉活動主導，頸/中臉才由皮膚鬆弛與脂肪流失主導。", "B": "✗（正確）neuromodulator 施打前額最常見併發症為 dropped brow。", "C": "✗（正確）supraorbital nerve 為眉部感覺主要來源。", "D": "✗（正確）緊貼 deep temporal fascia 剝離可最實際地避開 facial nerve 顳枝。", "E": "✗（正確）sentinel vein 為顳枝定位重要標記。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5023", "sub": "AE4", "src": "GS", "years": [113], "stem": "關於facelift，下述哪項是錯誤的?", "opts": {"A": "The great auricular nerve is the most frequent nerve injury of facelift surgery", "B": "Female gender is the risk factor for hematoma.", "C": "The most common complication of a facelift is hematoma", "D": "Skin lifts are not universally popular as most surgeons prefer SMAS manipulation because of the tension that is placed adjacent to or in the suture line.", "E": "SMAS is contiguous with the galea aponeurotica, the temporoparietal fascia, parotid masseteric fascia, platysma muscle"}, "ans": "B", "multi": false, "etype": "ai", "expl": "(B) Hematoma (1.1%) and infection (0.3%) were the most common complications. The same study found male gender an independent factor for hematoma. Body mass index >= 25 and combined procedures increased the infection risk. (E選項parotid masseteric fascia跟SMAS不同層，選項錯誤。)", "key": "🎯 Facelift 併發症重點：最常見併發症為 hematoma（約 1.1%），而 hematoma 的獨立危險因子是『男性』（male gender），非女性；女性反而較少。最常見的神經損傷為 great auricular nerve（感覺神經）。⚠此題屬選項重排家族（與 GS110-B09-Q02、GS111-B09-Q02 同一組選項、字母對應不同），務必記概念而非背字母。E 選項將 parotid-masseteric fascia 列入 SMAS 連續層雖有層次爭議，但本版正解鎖定 B（性別方向錯誤）。", "peropt": {"A": "✗ Great auricular nerve 是 facelift 最常受傷的神經，正確。", "B": "✓（正解，即錯誤敘述）Hematoma 的獨立危險因子為男性而非女性，故此敘述錯誤。", "C": "✗ Facelift 最常見併發症為 hematoma，正確。", "D": "✗ 多數術者偏好 SMAS 操作以避免張力落在縫線處，正確。", "E": "✗ 本版視為正確敘述（SMAS 與 galea、temporoparietal fascia、platysma 連續）；層次細節有爭議但非本題答案。"}, "cite": "原檔詳解", "conflict": "選項重排家族：與 GS110-B09-Q02 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ‖ 選項重排家族：與 GS111-B09-Q02 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5024", "sub": "AE7", "src": "GS", "years": [113], "stem": "關於理想鼻形之描述，下列哪項是錯誤的?", "opts": {"A": "The nostril should be two- thirds and the lobule one-third of the nasal height in the worm's eye view", "B": "Bony base width should be roughly 50% of the distance between the medial canthi", "C": "Alar base width should be roughly equal to the distance between the medial canthi", "D": "The length of the nose from radix to tip should be approximately the same as the distance from the stomion to the menton", "E": "Nasolabial angle is usually 95° to 100° in women and 90° to 95° in men"}, "ans": "B", "multi": false, "etype": "ai", "expl": "(B) Bony base width: This distance should be roughly 80% of the distance between the medial canthi", "key": "🎯 理想鼻形量測的核心比例：bony base width 約為兩內眥（medial canthi）間距的「80%」而非 50%——此為本題錯誤選項所在。其餘標準值須背熟：alar base 寬約等於內眥間距、worm's eye view 中 nostril:lobule≈2:1、鼻長（radix→tip）≈stomion→menton、nasolabial angle 女 95–100°／男 90–95°。", "peropt": {"A": "✗ Worm's eye view 中 nostril 佔 2/3、lobule 佔 1/3，為正確敘述。", "B": "✓(正解,錯誤敘述) Bony base 寬應約為內眥間距 80%，題目寫 50% 有誤，故選。", "C": "✗ Alar base 寬約等於兩內眥間距，正確。", "D": "✗ 鼻長（radix→tip）約等於 stomion→menton 距離，正確。", "E": "✗ Nasolabial angle 女 95–100°、男 90–95°，正確。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5025", "sub": "AE2", "src": "GS", "years": [113], "stem": "關於blepharoplasty與相關的解剖構造，下述哪項是錯誤的? (複選)", "opts": {"A": "Snap back test is often used to assess the degree of upper eyelid laxity", "B": "A lateral canthotomy should be performed emergently to relieve intraorbital pressure in the case of vision-threatening hematomas", "C": "If the margin of the eyelid is more than 2 mm and lower than the superior limbus, the patient may have eyelid ptosis", "D": "The pretarsal portion of orbicularis is associated with voluntary blinking", "E": "The superior and inferior oblique muscles are the most commonly injured extraocular muscles in upper and lower blepharoplasty, respectively"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "(A) snap test是檢查下眼瞼，The degree of lower eyelid laxity is assessed by a snap back test. This is done by distracting the lower lid inferiorly from the globe and seeing how quickly it returns to its original position. A normal lid will snap back into its normal position instantaneously. A delay of 2 to 5 seconds for the lid to return to its native state or the need to blink to return to normal state is indicative of abnormal laxity.\n\n(D) The muscle consists of three concentric circles: pretarsal, preseptal, and orbital. The pretarsal portion is important for involuntary blinking. The preseptal and orbital portions of the orbicularis are involved with voluntary blinking and forced eyelid closure.", "key": "🎯 此題選『錯誤』敘述(複選)，正解AD兩項本身為誤述。⚠選項重排家族(與GS110-B09-Q05選項集合相同、字母不同)，務必記概念勿背字母。核心：Snap back test評估的是『下』眼瞼鬆弛(lower lid laxity)非上眼瞼;orbicularis的pretarsal部分主司『不自主』眨眼(involuntary)，preseptal/orbital部分才主司自主眨眼。", "peropt": {"A": "✓(屬答案) 敘述錯誤：Snap back test評估的是下眼瞼(lower lid)鬆弛程度，非upper eyelid，故為誤述被選。", "B": "✗(非答案) 敘述正確：眼瞼緣低於上輪部(superior limbus)>2mm提示eyelid ptosis。", "C": "✗(非答案) 敘述正確：vision-threatening hematoma應緊急lateral canthotomy釋放眶內壓。", "D": "✓(屬答案) 敘述錯誤：pretarsal orbicularis主司不自主眨眼(involuntary)，非voluntary，故為誤述被選。", "E": "✗(非答案) 敘述正確：inferior/superior oblique分別為下/上眼瞼手術中最易受傷的眼外肌。"}, "cite": "原檔詳解", "conflict": "選項重排家族：與 GS110-B09-Q05 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母"}, {"id": "5026", "sub": "AE3", "src": "GS", "years": [114], "stem": "使用wetting solution technique 中的wet technique施行liposuction時，預估會有多少的blood loss ?", "opts": {"A": "1 % of aspirate volume", "B": "10 % of aspirate volume", "C": "20 % of aspirate volume", "D": "25 % of aspirate volume", "E": "40 % of aspirate volume"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂wetting techniques與失血量對照（以抽吸量%計）：Dry technique約20–45%、Wet technique約20–30%（本題取25%）、Superwet與Tumescent約僅1%。Wet technique每區注入固定量（約200–300 mL）含腎上腺素溶液，失血量仍偏高（因浸潤量不足以完全達血管收縮）。記憶關鍵：加入濕潤液可大幅降低失血，superwet/tumescent因1:1或更高比例浸潤故失血最少。", "peropt": {"A": "✗ 1%為superwet/tumescent technique的失血量，非wet technique。", "B": "✗ 10%低估了wet technique的失血量。", "C": "✗ 20%接近但非本題採用之標準值。", "D": "✓(正解) Wet technique預估失血量約為抽吸量的25%（20–30%範圍）。", "E": "✗ 40%偏向dry technique上限，非wet technique。"}, "cite": "待複查（Grabb & Smith Liposuction wetting technique 記憶佐證）", "conflict": ""}, {"id": "5027", "sub": "AE3", "src": "GS", "years": [114], "stem": "關於 Laser-assisted liposuction (LAL)，不包含哪1個步驟", "opts": {"A": "Infiltration", "B": "Application of energy to the tissue", "C": "Evacuation", "D": "Subdermal skin stimulation", "E": "Final contouring"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Laser-assisted liposuction (LAL)的標準四步驟：Infiltration（灌注腫脹液）→ Application of energy to tissue（雷射能量作用、乳化脂肪並刺激真皮下促皮膚收縮）→ Subdermal skin stimulation → Evacuation（抽吸）。『Final contouring』並非LAL的專屬步驟，故為答案。臨床意義：LAL的賣點在雷射熱能促skin tightening，但須留意熱傷害與燙傷風險。", "peropt": {"A": "✗ 為LAL步驟之一（灌注腫脹液）。", "B": "✗ 為LAL步驟之一（雷射能量作用於組織）。", "C": "✗ 為LAL步驟之一（抽吸乳化後脂肪）。", "D": "✗ 為LAL步驟之一（真皮下刺激促皮膚收縮）。", "E": "✓(正解) Final contouring非LAL的固定步驟，故不包含。"}, "cite": "待複查（Grabb & Smith LAL 記憶佐證）", "conflict": ""}, {"id": "5028", "sub": "AE1", "src": "GS", "years": [114], "stem": "施行lower body lift，評估腹部情況時不包含哪1項", "opts": {"A": "Excessive skin", "B": "Subcutaneous versus intraabdominal fat distribution", "C": "Pelvic muscle stability", "D": "Hernia", "E": "Existing scars"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Lower body lift 術前腹部評估項目：應評估多餘皮膚（excess skin）、脂肪分布（皮下 vs 腹內脂肪）、疝氣（hernia）、既有疤痕（scars）。『Pelvic muscle stability（骨盆肌穩定度）』非腹部評估內容，故為不包含項。易混淆：腹內脂肪多者（intraabdominal）腹壁塑形效果有限，屬重要評估。", "peropt": {"A": "✗ 多餘皮膚為必評估項目。", "B": "✗ 皮下 vs 腹內脂肪分布須評估，影響手術效果。", "C": "✓（正解）骨盆肌穩定度非腹部評估內容。", "D": "✗ 疝氣須術前排除。", "E": "✗ 既有疤痕影響血流與切口設計，須評估。"}, "cite": "待複查（Grabb & Smith 減重後體型雕塑 記憶佐證）", "conflict": ""}, {"id": "5029", "sub": "AE11", "src": "GS", "years": [115], "stem": "A transgender woman (assigned male at birth) presents for facial feminization surgery consultation. On physical examination, which of the following best describes the typical brow position that distinguishes a feminine face from a masculine face?", "opts": {"A": "Eyebrows positioned at the level of the superior orbital rim", "B": "Eyebrows positioned below the superior orbital rim", "C": "Eyebrows positioned above the superior orbital rim", "D": "Eyebrows positioned at the level of the mid-orbit", "E": "Eyebrow position does not differ between masculine and feminine faces"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面女性化手術（FFS）眉位判讀：女性眉毛位於 superior orbital rim『之上』且較弧形高拱，男性眉則位於 rim 之上緣或略下方、較平直。額骨重塑（frontal bossing/brow bossing reduction）合併 browlift 可將眉抬到女性化位置。故最能區分女性臉的是眉位於眶上緣之上。", "peropt": {"A": "✗ 眉位於眶上緣同高偏向中性/男性，非女性特徵最佳描述。", "B": "✗ 眉位於眶上緣『之下』屬男性化特徵。", "C": "✓（正解）女性眉位於 superior orbital rim 之上且高拱，為區分女性臉的典型特徵。", "D": "✗ 眉位於眶中段過低，不符女性眉位。", "E": "✗ 男女眉位確有差異，此敘述錯誤。"}, "cite": "待複查（Grabb & Smith 顏面女性化手術 記憶佐證）", "conflict": ""}, {"id": "5030", "sub": "AE5", "src": "GS", "years": [115], "stem": "一位 48 歲女性，Fitzpatrick skin type III，希望接受全臉換膚改善光老化及細紋。問診過程中，下列哪些情況屬於進行皮膚換膚手術前必須考慮或處理的重要事項？", "opts": {"A": "詢問是否近期使用過 isotretinoin（Accutane），若有使用，需停藥至少1 年後才可進行換膚手術。", "B": "術前需給予口服抗病毒藥物（valacyclovir）預防 herpes simplex 病毒活化，應於術前 2 天開始使用。", "C": "因患者為 Fitzpatrick type III，屬於較深膚色，建議首選全臉 phenol-croton oil deep peel 以達到最佳效果。", "D": "換膚前至少 4–6 週開始使用 topical tretinoin（vitamin A derivative）進行皮膚預處理（preconditioning），以確保均勻滲透深度並加速術後癒合。", "E": "術前常規給予預防性抗真菌及抗生素口服藥物，以降低感染風險。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 本題測「換膚術前不當／錯誤的處置」：對 Fitzpatrick III（偏深膚色）者「首選全臉 phenol-croton oil deep peel」並不恰當——深層 phenol peel 於較深膚色易致 hyper-/hypopigmentation 與 demarcation line，反屬相對禁忌，故此敘述為錯誤選項。正確且必要之術前準備包含：tretinoin preconditioning、抗病毒預防（HSV 病史者）、審視 isotretinoin 使用史等。", "peropt": {"A": "✗ 詢問 isotretinoin 使用史屬必要；惟「停藥 1 年」為過時說法（現多為 6 個月甚至更短），非本題所選之錯誤。", "B": "✗ 有 HSV 病史者術前給 valacyclovir 預防再活化屬合理標準，故非本題選項。", "C": "✓(正解) Fitzpatrick III 首選全臉深層 phenol-croton oil peel 並不恰當（色素併發症風險高），此敘述有誤故選。", "D": "✗ 換膚前 4–6 週開始 topical tretinoin preconditioning 為正確且重要之準備。", "E": "✗ 常規預防性抗真菌並非標準（抗病毒/抗生素依情況），惟非本題最典型的錯誤選項。"}, "cite": "待複查（G&S 換膚術前準備 記憶佐證）", "conflict": ""}, {"id": "5031", "sub": "AE9", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the pharmacology, preparation, and contraindications of botulinum toxin are correct? (複選", "opts": {"A": "Botulinum toxin prevents muscle contraction by causing selective proteolysis of the synaptic protein SNAP-25", "B": "IncobotulinumtoxinA differs from some other proprietary preparations because it is developed without complexing proteins.", "C": "Botulinum toxin is classified as a category A drug, making it completely safe for pregnant and breastfeeding women.", "D": "The clinical effects of botulinum toxin are typically observed immediately, within 1 to 2 hours after injection.", "E": "The use of botulinum toxin is contraindicated in patients with preexisting neuromuscular diseases such as myasthenia gravis."}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素藥理(複選選正確)：機轉為選擇性水解突觸蛋白SNAP-25以阻斷acetylcholine釋放;IncobotulinumtoxinA(Xeomin)特點為不含complexing proteins(裸露neurotoxin)。禁忌包括既有神經肌肉疾病(myasthenia gravis、Lambert-Eaton)。易錯點：BoNT為妊娠category C(非A)，孕哺並不安全;藥效非即時，注射後約24-72小時起效、1-2週達高峰。", "peropt": {"A": "✓ 機轉正確：選擇性水解SNAP-25阻斷神經肌肉接合處acetylcholine釋放。", "B": "✓ 正確：IncobotulinumtoxinA(Xeomin)不含complexing/附屬蛋白。", "C": "✗(非正解) 錯誤：BoNT為category C，孕婦哺乳並非完全安全。", "D": "✗(非正解) 錯誤：藥效非即時，多在24-72小時起效、約2週達高峰。", "E": "✓ 正確：既有神經肌肉疾病(如myasthenia gravis)為使用禁忌。"}, "cite": "待複查（Grabb & Smith 肉毒桿菌素藥理 記憶佐證）", "conflict": ""}, {"id": "5032", "sub": "AE6", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the anatomy and neurovasculature of the forehead and brow region is correct?", "opts": {"A": "The supratrochlear nerve emerges from the supratrochlear notch on average 3.5 cm lateral to the midline.", "B": "The deep division of the supraorbital nerve runs laterally between the periosteum and galea to the midforehead.", "C": "The sentinel vein is reliably located perforating the temporoparietal fascia 5 cm lateral and inferior to the lateral canthus.", "D": "The facial nerve emerges from the skull base at the foramen ovale before dividing within the parenchyma of the parotid gland."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 前額神經血管解剖（選正確者）：supraorbital nerve的deep division（深支）自supraorbital foramen發出後，向外側走行於骨膜（periosteum）與帽狀腱膜（galea）之間，朝向中前額，是內視鏡提眉須保護的關鍵。故B正確。易錯數據：supratrochlear nerve約在中線外側1.7 cm（非3.5 cm），supraorbital約2.7 cm；sentinel vein位於顳區近額顴縫/外側眶緣而非外眥外下5 cm；facial nerve自stylomastoid foramen（非foramen ovale）出顱後於腮腺實質內分支。", "peropt": {"A": "✗ supratrochlear nerve約在中線外側1.7 cm出，不是3.5 cm。", "B": "✓(正解) supraorbital nerve深支走於periosteum與galea之間向外側至中前額，敘述正確。", "C": "✗ sentinel vein並非位於lateral canthus外下5 cm穿temporoparietal fascia，位置數據錯誤。", "D": "✗ facial nerve自stylomastoid foramen（非foramen ovale）出顱，再於腮腺內分支。"}, "cite": "待複查（Grabb & Smith Forehead 神經血管解剖 記憶佐證）", "conflict": ""}, {"id": "5033", "sub": "AE2", "src": "GS", "years": [115], "stem": "A patient presents with pain, decreased extraocular movements, proptosis, and rapidly progressing vision changes several hours after lower blepharoplasty. Examination reveals increased intraocular pressure. What is the most appropriate immediate surgical management for this vision-threatening emergency?", "opts": {"A": "Immediate surgical decompression of the orbit, typically through a lateral canthotomy and cantholysis.", "B": "Conjunctivotomy to assist with fluid egress from beneath the conjunctiva.", "C": "Surgical evacuation of the postseptal space to treat suspected postseptal cellulitis.", "D": "Revision surgery with release of scar tissue and skin grafting of the eyelid."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Retrobulbar/orbital hemorrhage是lower blepharoplasty最可怕的視力威脅急症：疼痛、眼球運動受限、突眼(proptosis)、視力急速惡化、眼內壓上升即orbital compartment syndrome。處置為爭分奪秒的緊急減壓——lateral canthotomy與cantholysis（切開外眥韌帶下支），以立即降低眶內壓、恢復視神經及視網膜灌流。延誤>90分鐘可致不可逆失明。", "peropt": {"A": "✓(正解) 立即行lateral canthotomy與cantholysis減壓眶室，是恢復灌流、挽救視力的第一線急救。", "B": "✗ Conjunctivotomy無法有效解除後眶室高壓。", "C": "✗ 此為postseptal cellulitis處置，與急性出血性壓迫機轉不符。", "D": "✗ 疤痕鬆解與植皮處理的是外翻/攣縮，非急性視力威脅出血。"}, "cite": "待複查（Grabb & Smith 眼瞼成形併發症 記憶佐證）", "conflict": ""}, {"id": "5034", "sub": "AE4", "src": "GS", "years": [115], "stem": "Which of the following statements regarding the anatomy and potential complications of a facelift procedure is correct?", "opts": {"A": "The incidence of skin necrosis following a facelift is reported to be 5 times higher in smokers than in nonsmokers.", "B": "The primary blood supply to the central face comes from the superficial temporal artery", "C": "During dissection, the marginal mandibular and cervical branches of the facial nerve are most at risk of injury in the region of the upper masseteric retaining ligaments.", "D": "An unrecognized hematoma beneath the skin flaps will lead to fibrosis and contour deformity, and must be removed as soon as it is identified."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 解剖與併發症（選『正確』者）：未被察覺的皮瓣下血腫會導致纖維化與輪廓變形，一旦發現須立即清除（D 正確）。易混淆數字/解剖：吸菸者皮膚壞死風險約為非吸菸者的 10 倍以上（非 5 倍）；中臉主要血供來自 facial artery（非 superficial temporal artery）；marginal mandibular/cervical 分支最危險處在下方而非上 masseteric ligament 區。", "peropt": {"A": "✗ 吸菸者皮膚壞死風險約 12 倍，非 5 倍。", "B": "✗ 中臉主要血供為 facial artery，非 superficial temporal artery。", "C": "✗ marginal mandibular/cervical 分支風險處在較下方，非 upper masseteric ligament。", "D": "✓（正解）未察覺之血腫致纖維化與輪廓變形，須立即清除。"}, "cite": "待複查（Grabb & Smith 拉皮併發症 記憶佐證）", "conflict": ""}, {"id": "5035", "sub": "AE8", "src": "GS", "years": [115], "stem": "下列關於鼻尖（nasal tip）結構與鼻整形術（rhinoplasty）之敘述，何者錯誤？", "opts": {"A": "根據 Anderson 的 tripod concept，兩側 lateral crura 與 medial crura 共同決定鼻尖 rotation 與 projection。", "B": "Lateral crural steal 可同時增加 tip rotation，並維持或增加 tip projection。", "C": "傳統 columellar strut 已被證實足以可靠控制長期 tip rotation 與 projection，因此仍為目前 primary rhinoplasty 最主要支撐方式。", "D": "Septal extension graft（SEG）可藉由延長 caudal septum 來控制 tip rotation 與 projection。", "E": "過度 aggressive cephalic trim 可能導致鼻翼支撐不足與功能性問題，因此現代觀念強調 preservation of lateral crus。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻尖支撐現代觀念：傳統 columellar strut『無法』可靠地控制長期 tip rotation 與 projection，現代 primary rhinoplasty 更依賴 septal extension graft (SEG) 固定於 caudal septum 來穩定長期投影與旋轉。C 選項誇大 columellar strut 的長期支撐力，為錯誤敘述。Anderson tripod concept、lateral crural steal（增加旋轉並維持/增加投影）、以及保留 lateral crus、避免過度 cephalic trim 皆為正確現代概念。", "peropt": {"A": "✗ Tripod concept 中 lateral crura 與 medial crura 共同決定 tip rotation/projection，正確。", "B": "✗ Lateral crural steal 可同時增加 rotation 並維持/增加 projection，正確。", "C": "✓（正解，即錯誤敘述）Columellar strut 對長期 rotation/projection 控制並不可靠，非現代最主要支撐；SEG 才是可靠支撐。", "D": "✗ SEG 藉延長 caudal septum 控制 tip rotation/projection，正確。", "E": "✗ 過度 cephalic trim 造成鼻翼支撐不足與功能問題，現代強調保留 lateral crus，正確。"}, "cite": "待複查（Grabb & Smith / 現代鼻整形 tip support 記憶佐證）", "conflict": ""}, {"id": "5036", "sub": "AE11", "src": "GS", "years": [115], "stem": "A 32-year-old woman undergoes chin augmentation with a silicone implant via an intraoral approach. The operation is uneventful. However, at 2-week follow-up, she presents with lower lip ptosis, increased labiomental sulcus depth, and inferior displacement of the chin soft-tissue pad. She reports difficulty maintaining lower lip tone at rest, especially when smiling. On examination, lower facial sensation is intact. Which of the following is the most likely cause of her postoperative deformity?", "opts": {"A": "Injury to the inferior alveolar nerve at the mandibular foramen", "B": "Injury to the mental nerve at the mental foramen", "C": "Failure to adequately re-approximate the mentalis muscle during closure", "D": "Hyperactivity of the depressor anguli oris muscle due to surgical irritation", "E": "Soft tissue ischemia due to excessive subperiosteal dissection"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頦部矽膠植入經口內（intraoral）路徑最典型的軟組織併發症＝mentalis 肌未妥善對合復位，導致 lip incompetence、chin pad 下垂（chin ptosis/witch's chin 傾向）與 labiomental sulcus 加深。鑑別關鍵：下臉感覺完整（sensation intact）可排除 mental nerve 損傷；本併發症為肌肉未縫合而非神經或缺血。", "peropt": {"A": "✗ Inferior alveolar nerve 於 mandibular foramen 損傷會致下唇/牙齒麻木，但本例感覺完整，不符。", "B": "✗ Mental nerve 損傷會造成下唇/頦部麻木；本例 sensation intact，可排除。", "C": "✓(正解) 關閉時 mentalis 肌未充分重新對合，導致下唇下垂、labiomental sulcus 加深與 chin pad 下移，符合表現。", "D": "✗ Depressor anguli oris 過度活動主要影響口角向下，非本例之下唇張力喪失與 chin pad 下垂型態。", "E": "✗ 過度骨膜下剝離之軟組織缺血會致壞死或植入外露，與本例慢性肌肉功能型變形不符。"}, "cite": "待複查（G&S 頦部植入 mentalis 記憶佐證）", "conflict": ""}, {"id": "5037", "sub": "AE11", "src": "GS", "years": [115], "stem": "A plastic surgeon is performing a trim (edge excision) labiaplasty. During preoperative marking, the surgeon identifies the clitoral frenulum as a key landmark for determining the level of maximum resection. The planned incision is extended posteriorly along the labium minora. Which of the following statements best reflects an important technical principle described for this procedure?", "opts": {"A": "The incision should begin anteriorly at the clitoral hood and converge medially to maximize tissue preservation", "B": "The left and right posterior incisions should be placed less than 5 mm apart to ensure symmetric scar contraction", "C": "The marking begins just caudad to the frenulum's junction with the labia minora and extends in a gentle arc posteriorly", "D": "The labia minora should be placed under tension during excision to ensure complete removal of redundant tissue", "E": "An over-and-over running suture is preferred to minimize operative time and reduce bleeding"}, "ans": "C", "multi": false, "etype": "ai", "expl": "A: Incorrect direction and does not reflect described marking technique.\n\nB: Posterior incisions should be separated (≈ ≥1 cm), not closely approximated.\n\nD: Excess tension risks over-resection and amputation-like deformity.\n\nE: Over-and-over running sutures are discouraged due to risk of scalloped edges from swelling between loops.", "key": "🎯 Trim(edge excision)式labiaplasty的標記原則：以clitoral frenulum為最大切除高度的關鍵地標，標記自frenulum與labia minora交會處『稍下方(caudad)』開始，向後方以柔和弧線延伸。易錯點：左右後方切口應相隔約≥1cm(非<5mm)以免癒合狹窄;切除時不宜過度張力(避免over-resection造成amputation畸形);避免over-and-over連續縫合(組織腫脹易致scalloping鋸齒緣)。", "peropt": {"A": "✗ 方向錯誤，非文獻所述標記法(非由clitoral hood前方向內聚合)。", "B": "✗ 後方切口應分開約≥1cm，非<5mm緊靠，過近易致收縮變形。", "C": "✓(正解) 標記自frenulum與labia minora交會處稍下方開始，向後以柔和弧線延伸。", "D": "✗ 切除時過度張力會造成over-resection及amputation樣畸形，不宜。", "E": "✗ Over-and-over連續縫合因組織腫脹易造成scalloped鋸齒緣，不建議。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5038", "sub": "AE3", "src": "GS", "years": [115], "stem": "一名 32 歲女性接受高解析體雕合併臀部自體脂肪移植（HD gluteal fat grafting）。術中術者計畫在腰臀進行抽脂（liposuction），並於臀部進行分層脂肪注射以增加 C point 與中外側臀部投影。為降低併發症並優化美學結果，需同時考慮臀部分區與危險解剖。下列敘述何者正確？（複選）", "opts": {"A": "green zone 可較積極抽脂，主要目的為強化腰臀曲線", "B": "red zone 可進行與 green zone 同等程度的抽脂，以確保一致輪廓", "C": "central buttock 與 midlateral buttock 為主要脂肪增補區域", "D": "danger triangle 位於 posterior superior iliac spine、greater trochanter 與 ischial tuberosity 之間", "E": "脂肪注射進入 gluteus maximus muscle plane 是安全且建議的層次"}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "A 正確，green zone（腰背與上臀）為 high-definition liposuction 區域，用於雕塑 waist-to-hip transition。\n\nB 錯誤，red zone 是 transition zone（過渡區），需保守抽脂以避免邊界凹凸不平。\n\nC 正確，central & midlateral buttock 是主要 augmentation 區域，用於建立 projection 與 S-curve。\n\nD 正確，danger triangle 由posterior superior iliac spine、greater trochanter、ischial tuberosity所構成，是 gluteal fat grafting 最重要的安全邊界。\n\nE 錯誤，intramuscular injection 不建議且高風險，與 fat embolism、sciatic nerve injury 等相關。", "key": "🎯 高解析臀部脂肪移植（HD gluteal fat grafting）安全要點（選正確，複選）：green zone（腰背與上臀）可積極抽脂以雕塑waist-to-hip transition；central與midlateral buttock為主要脂肪增補區以建立projection與S-curve；danger triangle由posterior superior iliac spine、greater trochanter、ischial tuberosity三點構成，為避免脂肪栓塞的安全邊界。關鍵禁忌：red zone（過渡區）須保守抽脂避免凹凸；脂肪絕不可注入gluteus maximus肌肉層（intramuscular injection與致命性fat embolism、sciatic nerve injury高度相關），應僅注於皮下層。", "peropt": {"A": "✓ green zone（腰背/上臀）為高解析抽脂區，用於強化腰臀曲線。", "B": "✗ red zone為過渡區須保守抽脂，不可與green zone同等積極，否則邊界凹凸不平。", "C": "✓ central與midlateral buttock為主要脂肪增補區，建立projection與S-curve。", "D": "✓ danger triangle由PSIS、greater trochanter、ischial tuberosity構成，是最重要安全邊界。", "E": "✗ 脂肪注入gluteus maximus肌肉層高風險，與fat embolism、坐骨神經傷害相關，絕不建議。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5039", "sub": "AE3", "src": "GS", "years": [115], "stem": "A 30-year-old healthy, active woman presents to your plastic surgery clinic to discuss body contouring for stubborn fat deposits. On examination, she has a moderate amount of localized adiposity in her central abdomen and bilateral flanks. Crucially, her skin tone is noted to be excellent with no laxity, and her BMI is 26. You estimate the total volume of fat removal to be approximately 400 mL. To maximize safety and minimize blood loss, which of the following wetting techniques is most appropriate for this specific patient?", "opts": {"A": "Dry technique, because the expected aspirate is only 400 mL and avoiding any fluids will prevent epinephrine-induced tachycardia", "B": "Wet technique, because infiltrating exactly 200 mL per area is the historic gold standard for small volume liposuction.", "C": "Superwet technique, involving a 1:1 ratio of infiltrate volume to the expected lipoaspirate volume, which optimizes hemostasis without fluid overload risk.", "D": "Tumescent technique, infiltrating fluids until extreme skin turgor is achieved, requiring approximately 3 L of fluid to maximize local anesthesia.", "E": "Ultrasound-assisted liposuction without wetting solution, because the thermal energy liquefies fat and provides sufficient coagulation, making epinephrine-containing infiltration unnecessary in small-volume cases."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 抽脂wetting technique選擇：此例為健康、皮膚彈性佳、預估抽出量約400mL的小量抽脂。Superwet technique（灌注量:抽出量≈1:1）在兼顧止血（epinephrine）與避免fluid overload間最平衡，為現代主流。對照：dry technique失血高達20–45%已淘汰；tumescent灌注量大（可達抽出量2–3倍）多用於局麻大量或清醒抽脂，此健康小量個案不需灌注至3L極度腫脹。", "peropt": {"A": "✗ Dry technique失血量高（20–45%）已被淘汰，且『避免任何輸液可防epinephrine心搏過速』論述錯誤。", "B": "✗ 固定灌注200mL/區並非small volume的gold standard，wet technique失血仍偏高。", "C": "✓(正解) Superwet以1:1灌注/抽出比，兼顧hemostasis又避免fluid overload，最適合此健康小量個案。", "D": "✗ 灌注至極度skin turgor、約3L屬過量，非此個案所需。", "E": "✗ UAL仍需含epinephrine腫脹液止血，宣稱可省略wetting solution錯誤。"}, "cite": "待複查（Grabb & Smith 抽脂wetting technique 記憶佐證）", "conflict": ""}, {"id": "5040", "sub": "AE1", "src": "GS", "years": [115], "stem": "A 43-year-old woman lost 150 lb through diet and exercise. She had excess skin in her upper arms and underwent a brachioplasty procedure. The patient has persistent numbness in the volar ulnar surface of the forearm. Which nerve was most likely injured during the procedure:", "opts": {"A": "Intercostobrachial", "B": "Lateral antebrachial cutaneous", "C": "MABC", "D": "Medial brachial cutaneous", "E": "none of the above"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty 神經損傷：術後前臂『掌側尺側（volar ulnar）』麻木，責任神經為 medial antebrachial cutaneous nerve（MABC/MACN），為 brachioplasty 最常受傷的感覺神經。易混淆：intercostobrachial 管腋窩/上臂內側；lateral antebrachial cutaneous 管前臂橈側；medial brachial cutaneous 管上臂內側（非前臂）。", "peropt": {"A": "✗ intercostobrachial 支配腋窩與上臂內側。", "B": "✗ lateral antebrachial cutaneous 支配前臂橈側。", "C": "✓（正解）MABC 支配前臂掌側尺側，為 brachioplasty 最常受傷神經。", "D": "✗ medial brachial cutaneous 支配上臂內側，非前臂。", "E": "✗ 已有明確責任神經（MABC）。"}, "cite": "待複查（Grabb & Smith brachioplasty 記憶佐證）", "conflict": ""}, {"id": "5041", "sub": "AE1", "src": "GS", "years": [115], "stem": "Thighplasty should be avoided in patients with predisposing risk factors, these risk factors include:", "opts": {"A": "History of deep vein thrombosis", "B": "Varicosities", "C": "Enlarged lower extremities, including the feet and toes", "D": "A+B", "E": "A+B+C"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Thighplasty（大腿整形）之禁忌/危險因子：有深部靜脈栓塞（DVT）病史與靜脈曲張（varicosities）者，因下肢靜脈回流受損、術後 DVT 與傷口癒合風險高，應避免或審慎。本題正解為 A+B。單純『下肢（含足趾）腫大』雖臨床上提示 lymphedema 需留意，但非本題所列的核心 predisposing 危險因子組合，故不納入。", "peropt": {"A": "✓（正解組成）DVT 病史為 thighplasty 之危險因子。", "B": "✓（正解組成）Varicosities（靜脈曲張）為危險因子。", "C": "✗ 下肢含足趾腫大（提示淋巴水腫）非本題所列核心危險因子。", "D": "✓（正解）A+B 即 DVT 病史加靜脈曲張，為正確組合。", "E": "✗ A+B+C 多納入 C，超出本題所列危險因子。"}, "cite": "待複查（Grabb & Smith 大腿整形/thighplasty 記憶佐證）", "conflict": ""}, {"id": "5042", "sub": "AE1", "src": "GS", "years": [115], "stem": "Complications of thighplasty include which of the followings?", "opts": {"A": "Wound dehiscence", "B": "Seroma formation", "C": "Lymphedema", "D": "Recurrence of skin laxity", "E": "All of the above"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Thighplasty（大腿拉皮）併發症廣泛，須全部背熟：傷口裂開（wound dehiscence，因張力大且鄰近會陰易污染）、血清腫（seroma）、下肢淋巴水腫（lymphedema，因傷及內側淋巴管）、以及皮膚鬆弛復發（recurrence of laxity，尤其僅內側縫合而未固定於 Colles' fascia 時）。故正解為「以上皆是」。", "peropt": {"A": "✓ 傷口裂開為 thighplasty 常見併發症（切口張力大、鄰近會陰污染）。", "B": "✓ Seroma 常見，尤其伴隨抽脂或廣泛剝離時。", "C": "✓ 淋巴水腫因傷及大腿內側淋巴管而發生。", "D": "✓ 皮膚鬆弛復發常見，尤其固定不足者。", "E": "✓(正解) A–D 皆為 thighplasty 併發症，故選「以上皆是」。"}, "cite": "待複查（G&S/Neligan thighplasty 併發症 記憶佐證）", "conflict": ""}, {"id": "5043", "sub": "AE1", "src": "GS", "years": [115], "stem": "A 30-year-old woman who has lost 110 lb after gastric bypass presents for evaluation. She is interested in addressing the excess skin of her upper arms, as this causes her significant distress and difficulty with clothing fit. When counseling the patient about the risks of surgery, which of the following is most likely to lead to dissatisfaction with results and reoperation?", "opts": {"A": "Wound dehiscence", "B": "Hypertrophic scar", "C": "Seroma", "D": "Numbness", "E": "Contour irregularities"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Brachioplasty(手臂整形)最令病人不滿並導致再手術的併發症為『不良疤痕(尤其hypertrophic/widened scar)』。因手臂內側切口長、張力大、位置外露，疤痕問題發生率高且顯眼，是滿意度與reoperation的主要驅動因子。易混淆點：seroma、numbness(MABC損傷)、傷口裂開雖常見，但多可保守處理，非造成外觀不滿與再手術的首因。", "peropt": {"A": "✗ 傷口裂開多可換藥/延遲癒合處理，非導致不滿再手術的主因。", "B": "✓(正解) 肥厚/增寬性疤痕最外露且難處理，是brachioplasty不滿與再手術的首要原因。", "C": "✗ Seroma常見但可抽吸/引流處理，非主要不滿因子。", "D": "✗ Numbness(常為MABC損傷)多隨時間改善，非再手術主因。", "E": "✗ 輪廓不規則相對少見，非導致再手術的最主要因素。"}, "cite": "待複查（Grabb & Smith 手臂整形併發症 記憶佐證）", "conflict": ""}, {"id": "5044", "sub": "AE1", "src": "GS", "years": [115], "stem": "施行 lower body lift，評估腹部情況時包含哪項?(複選)", "opts": {"A": "Excessive skin", "B": "Subcutaneous versus intraabdominal fat distribution", "C": "Pelvic muscle stability", "D": "Hernia", "E": "Existing scars"}, "ans": "ABDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Lower body lift術前『腹部』評估項目（選包含者，複選）：需評估多餘皮膚（excessive skin）、皮下vs腹內脂肪分布（決定手術效果與安全）、疝氣（hernia，尤其MWL族群ventral/umbilical hernia常見）、既有疤痕（existing scars，影響血流與切口設計）。不屬於腹部評估項目者為pelvic muscle stability（骨盆肌肉穩定度），故C不選。", "peropt": {"A": "✓ 多餘皮膚是腹部評估核心。", "B": "✓ 需評估皮下與腹內脂肪分布。", "C": "✗ Pelvic muscle stability非lower body lift腹部評估之列。", "D": "✓ 疝氣需評估，MWL族群常見ventral/umbilical hernia。", "E": "✓ 既有疤痕會影響血供與切口規劃，需評估。"}, "cite": "待複查（Grabb & Smith Lower body lift 記憶佐證）", "conflict": ""}, {"id": "5045", "sub": "AE9", "src": "NG", "years": [104], "stem": "下列何種病變不可注射botulinum toxin A(BoNT-A)治療？", "opts": {"A": "Myasthenia gravis", "B": "Blepharospasm", "C": "Strabismus", "D": "Cervical dystonia", "E": "Adult with CN VII nerve disorder"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 BoNT-A作用於突觸前抑制acetylcholine釋放。Myasthenia gravis（重症肌無力）本身即NMJ傳導障礙（突觸後AChR抗體），使用BoNT-A會加重肌無力，屬絕對禁忌，故不可注射。相對地blepharospasm、strabismus、cervical dystonia、成人CN VII病變（如facial synkinesis）皆為公認適應症。易混：Lambert–Eaton（突觸前）亦屬禁忌。", "peropt": {"A": "✓(正解) Myasthenia gravis為NMJ疾病，BoNT-A會惡化肌無力，屬禁忌不可注射。", "B": "✗ Blepharospasm為BoNT-A經典適應症。", "C": "✗ Strabismus（斜視）為FDA早期核准適應症之一。", "D": "✗ Cervical dystonia為核准適應症。", "E": "✗ 成人CN VII病變（如synkinesis）可用BoNT-A治療。"}, "cite": "待複查（Neligan BoNT適應症 記憶佐證）", "conflict": ""}, {"id": "5046", "sub": "AE2", "src": "NG", "years": [104], "stem": "上眼瞼有Levator palpebrae superioris，下眼瞼相對應的解剖名稱為何？", "opts": {"A": "Tarsal plate", "B": "Orbital septum", "C": "Inferior oblique muscle", "D": "Orbicularis oculi muscle", "E": "Capsulopalpebral fascia"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 眼瞼縮肌解剖對應：上眼瞼提肌為 levator palpebrae superioris，下眼瞼的對應縮肌（lower lid retractor）為 capsulopalpebral fascia（源自下直肌鞘，functionally analog 於 levator）。易混淆：tarsal plate 是瞼板；orbital septum 是眶隔；inferior oblique 是下斜肌；orbicularis 是眼輪匝肌，皆非『提肌的對應縮肌』。", "peropt": {"A": "✗ tarsal plate 為瞼板，非縮肌。", "B": "✗ orbital septum 為眶隔。", "C": "✗ inferior oblique 為眼外肌，非下瞼縮肌。", "D": "✗ orbicularis oculi 為眼輪匝肌。", "E": "✓（正解）capsulopalpebral fascia 為下眼瞼縮肌，對應上瞼之 levator。"}, "cite": "待複查（Neligan 眼瞼解剖 記憶佐證）", "conflict": ""}, {"id": "5047", "sub": "AE2", "src": "NG", "years": [104, 107], "stem": "上眼皮手術後最常見眼皮下垂（ptosis）原因為何？", "opts": {"A": "Adhesion", "B": "Nerve injury", "C": "Hematoma", "D": "Levator aponeurosis disinsertion or dehiscence", "E": "Redundant skin"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 上眼皮術後真性眼瞼下垂（true ptosis）最常見原因為 levator aponeurosis 之 disinsertion 或 dehiscence（提上瞼肌腱膜自 tarsus 脫離），常因術中牽拉或縫合傷及腱膜。須與 redundant skin 造成的『假性下垂』(pseudoptosis) 區分。", "peropt": {"A": "✗ Adhesion 非上眼皮術後 ptosis 最常見原因。", "B": "✗ 神經損傷少見，非最常見原因。", "C": "✗ Hematoma 可致暫時性下垂，非最常見機轉。", "D": "✓（正解）Levator aponeurosis disinsertion/dehiscence 為術後真性 ptosis 最常見原因。", "E": "✗ Redundant skin 造成假性下垂（pseudoptosis），非真性 ptosis。"}, "cite": "待複查（Neligan 眼瞼整形/ptosis 記憶佐證）", "conflict": ""}, {"id": "5048", "sub": "AE4", "src": "NG", "years": [104], "stem": "臉部拉皮手術(faceLift)最常見的併發症為何？", "opts": {"A": "血腫(Hematoma)", "B": "感染(Infection)", "C": "面神經痲痹(facial nerve palsy)", "D": "皮膚壞死(Skin loss)", "E": "禿頭(Alopecia)"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮（facelift）最常見併發症為「血腫（hematoma）」，多發生於術後 24 小時內、與高血壓及男性性別相關，為需緊急處理之併發症（避免皮瓣壓迫壞死）。易混點：great auricular nerve 是最常受傷的神經、skin necrosis 好發於吸菸者切口張力區，但發生率皆低於 hematoma。", "peropt": {"A": "✓(正解) 血腫（hematoma）為 facelift 最常見併發症，須警覺並及早引流。", "B": "✗ 感染發生率低（約 0.3%），非最常見。", "C": "✗ 面神經麻痺少見，且多為暫時性。", "D": "✗ 皮膚壞死好發於吸菸者張力區，但仍非最常見併發症。", "E": "✗ 切口旁禿頭多因張力過大所致，發生率遠低於血腫。"}, "cite": "待複查（Neligan facelift 併發症 記憶佐證）", "conflict": ""}, {"id": "5049", "sub": "AE4", "src": "NG", "years": [104, 106, 107, 110, 114, 115], "stem": "關於face lift之temporal incision的敘述,若預期術後lateral orbital rim跟temporal hairline的距離超過幾公分,則需考慮切口放在hairline上?", "opts": {"A": "1公分", "B": "2公分", "C": "3公分", "D": "4公分", "E": "5公分"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 拉皮顳部切口設計原則：若預估術後lateral orbital rim到temporal hairline的距離會超過約5公分，代表向上牽引會過度上移顳部髮際線，此時應把切口設在髮際線內(within/along the hairline)以避免髮際線後退變形。此為切口選擇(pretrichial vs intrahairline)的重要判準。", "peropt": {"A": "✗ 1公分過低，尚不至造成明顯髮際線移位，非切換依據。", "B": "✗ 2公分仍在可接受範圍，非決策閾值。", "C": "✗ 3公分未達需改切口位置的關鍵距離。", "D": "✗ 4公分接近但非教科書所述閾值。", "E": "✓(正解) 預估距離超過約5公分時應將切口置於髮際線內，以避免顳部髮際過度上移。"}, "cite": "待複查（Neligan 拉皮顳部切口 記憶佐證）", "conflict": ""}, {"id": "5050", "sub": "AE4", "src": "NG", "years": [104], "stem": "在面神經的五個分支中，其中哪兩支因有較少的相互交通支，若於拉皮手術發生損傷則不易恢復功能？", "opts": {"A": "Temporal branch and buccal branch", "B": "Buccal branch and marginal mandibular branch", "C": "Marginal mandibular branch and cervical branch", "D": "Temporal branch and marginal mandibular branch", "E": "Buccal branch and marginal mandibular branch"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面神經五分支中，temporal（frontal）branch與marginal mandibular branch因末梢分支間交通支（arborization/communicating branches）最少，屬功能性終末分支，一旦於拉皮手術中受損最不易自行恢復，臨床後果分別為前額抬眉癱瘓與下唇下拉肌無力（笑容不對稱）。相對地buccal與zygomatic branch交通支豐富，受損常可代償恢復。", "peropt": {"A": "✗ 含buccal branch，其交通支豐富、恢復較好，非最難恢復組合。", "B": "✗ Buccal branch恢復佳，非答案。", "C": "✗ cervical branch損傷雖可致下唇問題，但marginal搭cervical非本題標準答案組合。", "D": "✓(正解) Temporal與marginal mandibular交通支最少，受損最不易恢復。", "E": "✗ 與B相同（buccal+marginal），且buccal交通支豐富，非答案。"}, "cite": "待複查（Neligan Facial nerve 記憶佐證）", "conflict": ""}, {"id": "5051", "sub": "AE6", "src": "NG", "years": [104], "stem": "在眼眶的外側的手術顏面神經的顳分支(temporal branch)的landmarks何者錯誤？", "opts": {"A": "在 anterior third of the palpable zygomatic arch", "B": "在 eyebrow tail 外側約 1.5 cm", "C": "跟 inferior temporal septum平行且相鄰", "D": "在 sentinel vein 上方旁", "E": "以上皆是"}, "ans": "A", "multi": false, "etype": "ai", "expl": "A. 在 middle third of the palpable zygomatic arch", "key": "🎯 顏面神經temporal (frontal) branch的體表標誌須精準：其橫越顴弓(zygomatic arch)的位置在『middle third（中1/3）』，而非anterior third；並沿Pitanguy line（tragus下0.5cm至眉尾外1.5cm）、與inferior temporal septum平行、走在sentinel vein上方。選項A把中1/3誤為前1/3，故為錯誤。", "peropt": {"A": "✓(正解，為錯誤敘述) 應為顴弓的middle third，非anterior third。", "B": "✗ 正確。約在眉尾外側1.5cm。", "C": "✗ 正確。與inferior temporal septum平行且相鄰。", "D": "✗ 正確。走在sentinel vein上方旁。", "E": "✗ 因A已錯，故『以上皆是』不成立。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5052", "sub": "AE6", "src": "NG", "years": [104], "stem": "關於forehead感覺神經的敘述，以下何者為非?", "opts": {"A": "Nasal dorsum及medial orbital rim的感覺由infratrochlear nerve支配", "B": "Corrugator resection最常傷到的神經為supratrochlear nerve", "C": "Supraorbital nerve從spraorbital foramen穿出，因此在forehead blind dissection時，在. supraorbital rim foramen上方約1cm便須停止，避免傷到神經", "D": "Supraorbital nerve的deep branch行經periosteum以及galea deep layer之間", "E": "Zygomaticotemporal nerve的位置在lateral orbital rim以及sentinel vein下方"}, "ans": "C", "multi": false, "etype": "ai", "expl": "C. 在supraorbital rim foramen上方約2cm便須停止，避免傷到神經", "key": "🎯 前額感覺神經（選『非』者）：supraorbital nerve 由 supraorbital foramen 穿出後，其 deep branch 於 galea 深層與骨膜之間向外走行；forehead blind dissection 時須在眶上緣孔上方『約 2cm』停止以避免傷及深支（原檔），故 C 稱『1cm』為錯誤。易混淆：corrugator resection 最常傷 supratrochlear nerve；infratrochlear 支配鼻背與內側眶緣。", "peropt": {"A": "✗（正確）鼻背與內側眶緣由 infratrochlear nerve 支配。", "B": "✗（正確）corrugator resection 最常傷 supratrochlear nerve。", "C": "✓（正解，錯誤敘述）應在眶上孔上方『約 2cm』停止，非 1cm。", "D": "✗（正確）supraorbital 深支行於骨膜與 galea 深層之間。", "E": "✗（正確）zygomaticotemporal nerve 位於外側眶緣與 sentinel vein 下方。"}, "cite": "原檔詳解", "conflict": ""}, {"id": "5053", "sub": "AE4", "src": "NG", "years": [104], "stem": "若顏面拉皮(facelift)術後有pseudo paralysis，表示可能傷及何條神經：", "opts": {"A": "Temporal branch of facial nerve", "B": "Zygomatic branch of facial nerve", "C": "Buccal branch of facial nerve", "D": "Marginal mandibular branch of facial nerve", "E": "Cervical branch of facial nerve"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Facelift 術後『假性麻痺』(pseudo-paralysis)：損傷 cerv
