<!DOCTYPE html>
<html lang="zh-Hant"><head>

<title>BRE 乳房 · 整外專科考古題</title>
<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px calc(112px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px calc(14px + env(safe-area-inset-bottom));z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id":"2000","sub":"S02","src":"GS","years":[110,111,112,114],"stem":"Which of the following best represents the existing Food and Drug Administration recommendation on screening for silent ruptures in silicone implants used for breast augmentation?","opts":{"A":"MRI annually after placement","B":"MRI 2 years after placement and then every 2 years thereafter","C":"MRI 3 years after placement and then every 2 years thereafter","D":"MRI at 5 years and t hen as needed","E":"MRI only if palpable changes in silicone"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"FDA 對矽膠義乳「無症狀破裂（silent rupture）」的篩檢建議：**置入後第 3 年做第一次 MRI，之後每 2 年一次**。理由是矽膠破裂常無臨床徵象，理學檢查無法偵測。⚠ 本題答案 C，但 GS-023（中文版同題）答案是 D——選項排列不同，數字相同，勿背字母。","peropt":{"A":"每年做 MRI 過於頻繁，非 FDA 建議。","B":"第 2 年開始並非 FDA 建議的起始時間點。","C":"正解。置入後 **3 年**首次 MRI，之後**每 2 年**一次。","D":"第 5 年才做過晚，且「as needed」不符無症狀篩檢的目的。","E":"錯。silent rupture 的定義就是摸不出來，等到可觸及變化才檢查已失去篩檢意義。"},"cite":"Grabb and Smith's, 8th Chapter 55 p563","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 GS114-B10-Q01） ‖ ⚠ FDA 矽膠植入物追蹤影像建議改版：GS110 選項全為 MRI；GS114 改為 Sonography/CT/Chest X-ray（對照 GS114-B10-Q01） ⚠ 同題歷屆重出：FDA對silicone implant silent rupture篩檢建議。2000（110–112年）與2019（114年）皆答C（MRI 3年後起每2年）；2019僅將distractor改寫（A改sonography、B改CT、E改chest X-ray），核心考點與正解不變。記概念不記字母。"},{"id":"2001","sub":"S07","src":"GS","years":[110],"stem":"下列哪個breast reduction的術後併發症發生率(post operation complication rate)正確?","opts":{"A":"Delay wound healing: 1%","B":"Hematoma: 4%","C":"Seroma: 2%","D":"Nipple areola loss: 10%","E":"Loss nipple sensation: 10-15%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 GS-021 同一張發生率卡片（110 年版）：唯一正確的仍是 **Hematoma 4%**。把五個數字綁成一組記：**10 / 4 / 10–15 / 1 / 2**（延遲癒合、血腫、血清腫、NAC 缺損、感覺喪失）。","peropt":{"A":"錯。延遲癒合約 10%。","B":"正解。血腫約 4%。","C":"錯。血清腫約 10–15%。","D":"錯。NAC 缺損約 1%。","E":"錯。乳頭感覺喪失約 2%，不是 10–15%。"},"cite":"Grabb and Smith's, 8th Chapter 56 p572-574","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：A: 110「Delay wound healing: 1%」 vs 111「Delayed wound healing 1%」；E: 110「Loss nipple sensation: 10-15%」 vs 111「Loss of nipple sensation 20%」"},{"id":"2002","sub":"S08","src":"GS","years":[110,111,112,114,115],"stem":"Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?","opts":{"A":"Amphetamines, anabolic steroids, marijuana","B":"Digoxin, ACE inhibitors, spironolactone","C":"Benzodiazepines, risperidone, haloperidol","D":"Testosterone, Estrogen, prednisone","E":"Cephalosporins, metronidazole, isoniazid"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"與男性女乳症相關的藥物四大類：**娛樂性／賀爾蒙類**（安非他命、合成類固醇、大麻、海洛因）、**心血管類**（digoxin、ACE inhibitors、spironolactone）、**精神科用藥**（benzodiazepines、risperidone、haloperidol）、**內分泌類**（testosterone、estrogen、prednisone）。**抗生素類（cephalosporins、metronidazole、isoniazid）不相關**，故為正解。","peropt":{"A":"相關。安非他命、合成類固醇、大麻皆與男性女乳症相關。","B":"相關。Digoxin、ACE inhibitors、spironolactone（抗雄性素作用）。","C":"相關。Benzodiazepines、risperidone、haloperidol（經高泌乳素血症）。","D":"相關。外源性睪固酮（周邊芳香化為雌激素）、雌激素、prednisone。","E":"正解（不相關）。Cephalosporins、metronidazole、isoniazid 屬抗生素／抗結核藥。註：少數文獻曾提及 isoniazid、metronidazole 的個案報告，但標準列表不含此組。"},"cite":"Grabb and Smith's, 8th Chapter 57 p576","conflict":"⚠ 同題歷屆重出：題幹完全相同（選出與gynecomastia無關的藥物組）。2002（110、112、114年）答E、2009（111年）答C——僅選項順序不同（抗生素組cephalosporins/metronidazole/isoniazid被移位）。2197（114、115年）答E，選項經改寫（distractor改為heroin、food contaminants等，正解組改為cephalosporins/penicillins/carbapenems），核心考點仍為「抗生素類與男性女乳症無關」。記概念不記字母。"},{"id":"2003","sub":"S13","src":"GS","years":[110,112],"stem":"In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate to resect?","opts":{"A":"Rib1","B":"Rib2","C":"Rib3","D":"Rib4","E":"Rib5"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"與 GS-008 為同一知識點的鏡像題：顯露 IMA/IMV 時最適合切除的是第 3 肋軟骨。原因是在第 2–3 肋間以下，IMV 尚未分岔為兩條細支，管徑足夠吻合；同時保留第 2 肋可維持胸壁輪廓。","peropt":{"A":"第 1 肋位置太高且被鎖骨覆蓋，無法作為顯露入口。","B":"第 2 肋切除會造成上胸壁明顯凹陷，且該處 IMV 較細。","C":"正解。第 3 肋軟骨切除是標準做法，顯露長度足夠、IMV 口徑理想、胸壁輪廓缺損不明顯。","D":"第 4 肋以下 IMV 常已分為兩條細支，口徑不利吻合。","E":"第 5 肋位置過低，且愈往下 IMA 管徑愈小。"},"cite":"Grabb and Smith's, 8th Chapter 60 p609","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：題幹數值不同"},{"id":"2004","sub":"S17","src":"GS","years":[110,111,112,114],"stem":"Patients with the BRCA gene mutations are at increased risk of developing breast and ovarian cancer as well as which of the other cancers listed below?(複選)","opts":{"A":"Pancreatic cancer","B":"Fallopian tube cancer","C":"Prostate cancer","D":"Lymphoma","E":"Basal cell carcinoma"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"BRCA 突變除乳癌、卵巢癌外，還增加**胰臟癌、輸卵管癌、攝護腺癌**的風險（BRCA2 與男性乳癌、攝護腺癌關聯尤強）。**淋巴瘤與基底細胞癌與 BRCA 無關**。此題於 110、111、112、114 四個年份重複出現，屬高頻。","peropt":{"A":"是。胰臟癌風險升高（尤其 BRCA2）。","B":"是。輸卵管癌（與卵巢／腹膜癌同一譜系）。","C":"是。攝護腺癌，男性 BRCA2 帶因者風險明顯升高。","D":"否。淋巴瘤與 BRCA 突變無關。","E":"否。基底細胞癌與 BRCA 突變無關（與 PTCH1／日曬相關）。"},"cite":"Grabb and Smith's, 8th Chapter 58 p587","conflict":""},{"id":"2005","sub":"S09","src":"GS","years":[110,111],"stem":"管狀乳房(Tuberous breast)為先天性乳房畸形,以下關於管狀乳房的常見表徵與臨床處置,下列敘述何者為非？","opts":{"A":"乳房基底部直徑縮小","B":"乳房下緣線(inframammary fold)向下移位","C":"手術時最常使用的切口為乳暈周圍切口(periareolar incision)","D":"手術重建時,原本的乳房下緣線需修補(obliteration old IMF),避免後續產生double-bubble deformity","E":"乳房下緣線 (inflamammary fold)到乳房距離的距離縮短"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 GS-017 同一考點的中文版：tuberous breast 的 IMF **向上（頭側）移位**，故「向下移位」為錯述。重建三要點：① periareolar 切口最常用；② 手術中必須破壞（obliterate）原本過高的 IMF，否則術後出現 double-bubble；③ nipple-to-IMF 距離縮短。","peropt":{"A":"正確。乳房基底直徑縮小是核心病理。","B":"正解（錯述）。IMF 是**向上移位**（過高），不是向下移位。","C":"正確。手術最常採乳暈周圍切口，可同時處理疝出的實質與 NAC 直徑。","D":"正確。必須破壞原本過高的 IMF 並重新定位，否則義乳撐開下極時會與舊 IMF 形成 double-bubble。","E":"正確。因 IMF 過高，nipple-to-IMF 距離縮短。"},"cite":"Grabb and Smith's 第8版, Ch62","conflict":""},{"id":"2006","sub":"S09","src":"GS","years":[110,111],"stem":"Poland syndrome表現為合併上肢及乳房的畸形,下列有關Poland syndrome的敘述,何者為非？","opts":{"A":"大部分患者為單側表現，且左側居多","B":"典型表徵為胸大肌發育不全或缺失","C":"最佳重建時間為青春期前","D":"自體組織重建最常使用的是闊背肌皮瓣(pedicled latissimus dorsi)","E":"可能合併腎臟的異常,需要安排腎臟超音波的檢查"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Poland syndrome 重建時機的核心：應等乳房與胸壁發育完成（**青春期後**）再做確定性重建，過早手術會被後續生長破壞對稱。故「最佳重建時間為青春期前」為錯述。⚠ 本題選項 A「左側居多」與教科書相反——Poland 為**右側好發**、男性 2–3:1；GS111 同題已改寫為「右側居多」。作答仍選 C，但 A 的內容請記正確版本。","peropt":{"A":"本題（110 年版）寫「左側居多」屬誤植，正確為 **右側好發**。GS111 同題已修正為右側。此選項非答案，但內容錯誤，勿當作正確知識記憶。","B":"正確。典型表徵即 pectoralis major 的**胸骨頭（sternal head）**發育不全或缺失，連帶前腋褶消失。","C":"正解（錯述）。重建應待乳房與胸壁發育成熟（青春期後）再進行；青春期前手術會被後續生長破壞。","D":"正確。自體重建最常用 pedicled latissimus dorsi flap（同時重建前腋褶輪廓）。","E":"正確。Poland 可合併腎臟異常（如腎發育不全），建議安排腎臟超音波篩檢。"},"cite":"Grabb and Smith's 第8版, Ch62","conflict":""},{"id":"2007","sub":"S08","src":"GS","years":[110,111],"stem":"男性女乳症(Gynecomastia)為最常見的男性乳房增生疾病,下列有關男性女乳症的描述,何者為非？","opts":{"A":"青春期時表現的病人大多找不到明顯病因(Idiopathic)","B":"和體內雌激素(Estrogen)的量有關","C":"Klinefelter syndrome合併男性女乳症的病人,其乳癌的風險明顯升高,因此建議需做乳房切除","D":"症狀可能有自發性回覆(resolve spontaneously),但若持續超過半年,則建議手術","E":"常用的手術方式為抽脂合併腺下組織切除(excision of subglandular tissue)"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 男性女乳症(gynecomastia)綜合題（問『何者為非』）。⚠本題答案疑義：官方答案鍵為 D，但醫學上 D『症狀可自發消退，>6月建議手術』屬正確教學；反而 **C 才是明顯錯述**——Klinefelter 病人乳癌風險雖升高，但**不建議常規預防性乳房切除**，應以密切監測為主。建議人工複查官方答案（實務上應為 C）。","peropt":{"A":"✗（正確敘述，非答案）青春期表現者多找不到明確病因(idiopathic)。","B":"✗（正確敘述，非答案）與體內 estrogen／androgen 比值失衡相關。","C":"△（醫學上為錯述）Klinefelter 乳癌風險升高，但不建議常規預防性乳切、以監測為主——此敘述有誤，醫學上 C 才像正解；惟官方答案標為 D，見備註。","D":"✓（依官方答案鍵 D）官方將本題答案標為 D；但此『>6月建議手術』屬正確教學，故列為答案疑義。","E":"✗（正確敘述，非答案）常用術式為抽脂合併腺下組織切除（單靠抽脂無法移除緻密腺體）。"},"cite":"Grabb and Smith's 第8版, Ch62（答案疑義：官方D vs 醫學C，建議人工複查）","conflict":"⚠答案疑義：本題問「何者為非」，官方答案鍵為 D，但醫學上 C（Klinefelter 建議預防性乳切）才是錯述。待 Jason 裁定是否更正為 C。"},{"id":"2008","sub":"S07","src":"GS","years":[111],"stem":"下列Breast reduction術後併發症發生率(post operation complication rate)何者正確?","opts":{"A":"Delayed wound healing 1%","B":"Hematoma 4%","C":"Seroma 2%","D":"Nipple areola loss 10%","E":"Loss of nipple sensation 20%"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"縮乳術後併發症發生率卡片（與 GS-019 原檔詳解一致）：**延遲癒合 10%｜血腫 4%｜血清腫 10–15%｜NAC 缺損 1%｜乳頭感覺喪失 2%**。本題唯一正確的是「Hematoma 4%」。","peropt":{"A":"錯。延遲傷口癒合約 **10%**，不是 1%。","B":"正解。血腫約 **4%**。","C":"錯。血清腫約 **10–15%**，不是 2%。","D":"錯。乳頭乳暈缺損約 **1%**，不是 10%。","E":"錯。乳頭感覺喪失約 **2%**，不是 20%。"},"cite":"Grabb and Smith's, 8th Chapter 56 p572-574","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：A: 110「Delay wound healing: 1%」 vs 111「Delayed wound healing 1%」；E: 110「Loss nipple sensation: 10-15%」 vs 111「Loss of nipple sensation 20%」"},{"id":"2010","sub":"S13","src":"GS","years":[111],"stem":"In preparation for microvascular reconstruction of the left breast with a DIEP flap (pedicle: 2.5 mm artery/3.0 mm vein), exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate to resect?","opts":{"A":"Rib 1","B":"Rib 2","C":"Rib 3","D":"Rib 4","E":"Rib 5"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"與 GS-009 同一知識點的 111 年版（題幹多給了蒂部口徑 2.5 mm 動脈／3.0 mm 靜脈）：顯露 IMA/IMV 時應切除 **第 3 肋軟骨**。此處 IMV 尚未分岔為細支，口徑足以與 3.0 mm 皮瓣靜脈匹配；第 4 肋以下 IMV 常分為兩條細支。","peropt":{"A":"第 1 肋被鎖骨覆蓋，無法安全顯露。","B":"第 2 肋切除造成上胸壁明顯凹陷，且該處 IMV 較細。","C":"正解。第 3 肋軟骨切除為標準做法，IMV 口徑與 3.0 mm 皮瓣靜脈相匹配。","D":"第 4 肋以下 IMV 常已分岔為兩條細支，口徑不足。","E":"第 5 肋位置過低，IMA 管徑亦漸細。"},"cite":"Grabb and Smith's, 8th Chapter 60 p609","conflict":"跨年數值差異（Grabb 8e vs Grabb 8e）：題幹數值不同"},{"id":"2011","sub":"S07","src":"GS","years":[112],"stem":"Which of the following statements regarding postoperative complication of breast reduction is correct?","opts":{"A":"Delayed wound healing 1%","B":"Hematoma 4%","C":"Seroma 2%","D":"Nipple areola loss 10%","E":"Loss of nipple sensation 20%"},"ans":"B","multi":false,"etype":"ai","expl":"Delayed wound healing 10%\n\nHematoma 4%\n\nSeroma 10-15%\n\nNipple areola loss 1%\n\nLoss of nipple sensation 2%","key":"🎯 本題考乳房縮小手術（reduction mammoplasty）各併發症的實際發生率量級，重點在「數量級記憶」而非模糊印象。關鍵記憶：Hematoma 約 4%、Delayed wound healing 約 10%、Seroma 約 10–15%、Nipple-areola necrosis 約 1%、Loss of nipple sensation 約 2%。易混淆點：Wound healing 與 Seroma 的比例遠高於一般直覺，而 NAC 壞死與感覺喪失其實相對低（各約 1–2%），選項刻意把數字對調誘導誤選。","peropt":{"A":"✗ Delayed wound healing 實際約 10%（非 1%），是相對常見併發症，數字被刻意壓低。","B":"✓（正解）Hematoma 發生率約 4%，符合原文量級。","C":"✗ Seroma 實際約 10–15%（非 2%），因大範圍腺體切除死腔大。","D":"✗ Nipple-areola loss（NAC 壞死）實際約 1%（非 10%），選項誇大。","E":"✗ Loss of nipple sensation 實際約 2%（非 20%），永久性感覺完全喪失並不常見。"},"cite":"原檔詳解","conflict":""},{"id":"2012","sub":"S16","src":"GS","years":[112],"stem":"Regarding nipple-areolar complex (NAC) reconstruction, which of the following is TRUE?","opts":{"A":"Reconstruction of the nipple-areolar complex (NAC) is usually performed as soon as possible to restore \"normal\" appearance of breast.","B":"The nipple and areola are reconstructed usually at the same time.","C":"Maintaining nipple projection is one of the greatest challenges in NAC reconstruction.","D":"Flap reconstructions, especially centrally based flaps do not retract overtime, and should be designed to match the size required.","E":"Malposition of the NAC is easily corrected with local transposition flaps without unsightly scarring."},"ans":"C","multi":false,"etype":"ai","expl":"Grabb&Smith Chap 61 NAC reconstruction\n\nReconstruction of the nipple-areolar complex (NAC) is the final step in the breast restoration process and should only be performed when optimal breast symmetry has been achieved.\n\nThe nipple and areola are reconstructed separately.\n\nOne of the greatest challenges in nipple reconstruction is achieving sustained projection.\n\nBoth graft and flap techniques retract over time, with long-term loss of nipple projection between 40% and 70%. Centrally based flaps such as the quadrapod flap are subject to the highest degree of postoperative retraction. Flap design must anticipate long-term loss of projection, and surgeons should aim to create a nipple that is at least 50% larger than required.\n\nMalposition of the NAC can compromise the aesthetic outcome and can be very difficult to correct. Repositioning of the reconstructed NAC usually requires local transposition flaps, which result in additional unfavorable scarring on the breast. Careful initial planning of NAC position and appropriate timing of reconstruction is essential.","key":"NAC 重建三個原則：① 應在乳房丘（breast mound）形態穩定後才做，不宜「越早越好」；② 乳頭與乳暈通常**分階段**重建；③ **維持乳頭突出度（projection）是最大的挑戰**——所有皮瓣型乳頭都會隨時間回縮，設計時必須刻意過度矯正。","peropt":{"A":"錯。應待乳房丘穩定、對稱性確定後再重建 NAC，而非盡快進行。","B":"錯。乳頭與乳暈通常分開、分階段重建（先乳頭，後乳暈刺青或植皮）。","C":"正解。維持乳頭突出度是 NAC 重建最大的難題。","D":"錯。皮瓣型（尤其中央蒂）乳頭會隨時間明顯回縮，設計時必須過度矯正而非「剛好符合」所需大小。","E":"錯。NAC 位置錯置的矯正相當困難，局部轉位皮瓣往往留下明顯疤痕。"},"cite":"Grabb and Smith's, 8th, Ch 61","conflict":""},{"id":"2013","sub":"S09","src":"GS","years":[112],"stem":"Which of the following is NOT a characteristic of tuberous breast?","opts":{"A":"Constricted skin envelope in the vertical and horizontal dimensions","B":"Deficiency in the base diameter with elevated inframammary fold","C":"Long nipple-to-IMF distance","D":"Herniation of the breast parenchyma through the areola, resulting in enlarged diameter of the NAC","E":"Parenchymal hypoplasia and asymmetry"},"ans":"C","multi":false,"etype":"ai","expl":"Grabb&Smith Chap62 Tuberous breast\n\nShort nipple-to-IMF distance (high, tight fold)","key":"Tuberous breast 的核心是「基底受限（constricted base）」：基底直徑縮小、IMF **上移（elevated/cranialized）**、因此 **nipple-to-IMF 距離縮短**；乳腺實質經乳暈疝出使 NAC 直徑變大；實質發育不良且常不對稱。故「Long nipple-to-IMF distance」與病理機轉相反。","peropt":{"A":"是特徵。皮膚囊袋在垂直與水平方向皆受限（constricted skin envelope）。","B":"是特徵。基底直徑不足合併 IMF 上移。","C":"正解（非特徵）。因 IMF 上移，nipple-to-IMF 距離應為**縮短**而非拉長。","D":"是特徵。乳腺實質經乳暈疝出，導致 NAC 直徑增大。","E":"是特徵。實質發育不良（parenchymal hypoplasia）且常有兩側不對稱。"},"cite":"Grabb and Smith's, 8th, Ch 62","conflict":""},{"id":"2014","sub":"S03","src":"GS","years":[113],"stem":"一名 35 歲女性前來接受雙側隆乳(breast augmentation)評估。她對光滑的矽膠圓形裝置(smooth, silicone round device)感興趣，並希望將植入物放置在乳房下方，而不是肌肉下方(placed underneath the breast but not the muscle)。根據植入物的類型和放置的位置，下列哪一種併發症的發生率最高？","opts":{"A":"Widening of the areola","B":"Animation deformity from the pectoralis muscle","C":"Capsular contracture","D":"Deflation and subsequent loss of volume","E":"Superior implant migration"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"義乳併發症的發生率取決於「表面」與「平面」兩個變數：**光滑面（smooth）＋ 腺體下（subglandular）**是莢膜攣縮發生率最高的組合。腺體下平面缺乏肌肉屏障、且與乳管細菌相通（生物膜假說），紋理面能打斷莢膜纖維排列而光滑面不能。","peropt":{"A":"乳暈變寬與義乳表面／平面無直接關係，主要見於乳暈周圍切口或乳暈疝出。","B":"Animation deformity 是**肌肉下**義乳才有的問題；本例刻意放在腺體下，反而不會發生。","C":"正解。光滑面＋腺體下是莢膜攣縮發生率最高的組合。","D":"Deflation 是**鹽水袋**義乳的特徵性併發症；本例為矽膠。","E":"義乳向上移位多與肌肉下平面、胸大肌收縮或囊袋剝離不足有關，非本組合的最高風險。"},"cite":"Grabb and Smith's, 8th, Ch 55, p558","conflict":""},{"id":"2015","sub":"S04","src":"GS","years":[113],"stem":"下列哪一項最能代表美國食品藥物管理局(Food and Drug Administration)關於 breast augmentation and/or reconstruction 使用矽膠植入物(silicone implants)時，篩檢是否發生 silent ruptures 的現有建議?","opts":{"A":"放置植入物後每年接受 MRI 檢查(annually after placement)","B":"放置植入物後一年後接受 MRI 檢查，之後每兩年檢查一次 MRI (1 years after placement and then every 2 years thereafter)","C":"放置植入物後兩年後接受 MRI 檢查，之後每兩年檢查一次 MRI (2 years after placement and then every 2 years thereafter)","D":"放置植入物後三年後接受 MRI 檢查，之後每兩年檢查一次 MRI (3 years after placement and then every 2 years thereafter)","E":"僅當矽膠植入物摸到變化才需要接受 MRI 檢查 (only if palpable changes in silicone)"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 矽膠植入物的『無症狀破裂（silent rupture）』因外殼包覆而無臨床徵象，需影像篩檢。FDA歷史建議（2006）為：植入後『第3年』首次接受MRI，其後每2年一次（3 years then every 2 years thereafter），此即本題所指的『現有建議』故選D。⚠ 現代化更新：FDA於2020年將建議放寬為術後第5–6年首次影像、其後每2–3年一次，且Ultrasound可作為替代；作答時須錨定題目所依版本（GS版本採3年）。單靠可觸摸變化（palpable change）才檢查並不足以偵測silent rupture。","peropt":{"A":"✗ 每年一次過於密集，非FDA建議。","B":"✗ 首檢時間（1年）過早，非該版本建議。","C":"✗ 首檢2年後亦非該版本標準。","D":"✓（正解）放置後第3年首次MRI、其後每2年一次，符合FDA該版對silent rupture的篩檢建議。","E":"✗ 僅在可觸摸變化時才檢查無法偵測無症狀破裂，故錯誤。"},"cite":"待複查（GS silicone implant silent rupture / FDA MRI 建議 記憶佐證）","conflict":""},{"id":"2016","sub":"S07","src":"GS","years":[113],"stem":"以下關於縮乳(breast reduction)手術後併發症的發生率何者有誤？","opts":{"A":"傷口延遲癒合 Delayed wound healing <1%","B":"血腫 Hematoma 4%","C":"血清腫 Seroma 10-15%","D":"乳頭乳暈缺損 Nipple areola loss 1%","E":"乳頭感覺喪失 Loss of nipple sensation 2%"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"同一張卡片的反向出題（113 年）：本題 B（血腫 4%）、C（血清腫 10–15%）、D（NAC 缺損 1%）、E（感覺喪失 2%）全部正確，**唯一有誤的是 A——延遲傷口癒合並非 <1%，而是約 10%**。此題與 GS-021／GS-024 互為完整驗證。","peropt":{"A":"正解（有誤）。延遲傷口癒合約 **10%**，遠高於 <1%。","B":"正確。血腫約 4%。","C":"正確。血清腫約 10–15%。","D":"正確。乳頭乳暈缺損約 1%。","E":"正確。乳頭感覺喪失約 2%。"},"cite":"Grabb and Smith's, 8th, Ch 56, p572-574","conflict":""},{"id":"2017","sub":"S08","src":"GS","years":[113],"stem":"下列哪一組藥物與發生男性女乳症(gynecomastia)較無關?","opts":{"A":"Cephalosporins, penicillin, fluoroquinolones","B":"Amphetamines, anabolic steroids, marijuana","C":"Digoxin, ACE inhibitors, spironolactone","D":"Benzodiazepines, risperidone, haloperidol","E":"Testosterone, Estrogen, prednisone"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"同一組概念的中文版（113 年）：不相關者是**純抗生素組（cephalosporins、penicillin、fluoroquinolones）**，答案為 A。抗生素不影響雌激素／雄性素比值，故與男性女乳症無關；其餘三組分別經由賀爾蒙、抗雄性素、高泌乳素機轉致病。","peropt":{"A":"正解（較無關）。Cephalosporins、penicillin、fluoroquinolones 為抗生素，不影響性荷爾蒙平衡。","B":"相關。安非他命、合成類固醇、大麻。","C":"相關。Digoxin、ACE inhibitors、spironolactone。","D":"相關。Benzodiazepines、risperidone、haloperidol。","E":"相關。Testosterone、estrogen、prednisone。"},"cite":"Grabb and Smith's, 8th, Ch 57, p575-576","conflict":""},{"id":"2018","sub":"S12","src":"GS","years":[113],"stem":"針對一位新診斷的單側乳癌並且計畫接受乳房切除(mastectomy) 的患者，若考慮一次手術使用植入物做為乳房重建(single-stage implant-based breast reconstruction)的方式，可能出現併發症的危險因子有以下哪些？(複選)","opts":{"A":"有乳癌家族史 Family history of breast cancer","B":"抽菸 Smoking","C":"肥胖 Obesity (BMI > 30)","D":"巨大的乳房 Large breasts","E":"糖尿病 Diabetes (HbA1C > 6.5%)"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"單次手術直接置入義乳（single-stage / direct-to-implant）的併發症危險因子：**抽菸、肥胖（BMI>30）、巨乳、糖尿病（HbA1C>6.5%）**——四者共通機轉是乳房切除皮瓣的灌流不足與癒合能力下降。**乳癌家族史只影響腫瘤風險，不影響傷口癒合**，故非併發症危險因子。","peropt":{"A":"否。家族史屬腫瘤學風險，與義乳重建的傷口／義乳併發症無關。","B":"是。尼古丁造成血管收縮，是乳房切除皮瓣壞死最強的可改變風險因子。","C":"是。肥胖增加感染、傷口裂開與皮瓣壞死。","D":"是。巨乳的乳房切除皮瓣面積大、遠端灌流差，壞死風險高。","E":"是。血糖控制不良（HbA1C>6.5%）增加感染與癒合不良。"},"cite":"Grabb and Smith's, 8th, Ch 59, p588-589","conflict":""},{"id":"2020","sub":"S07","src":"GS","years":[114],"stem":"Which of the following statements regarding acute postoperative complication of breast reduction is correct?","opts":{"A":"Delayed wound healing","B":"Hematoma","C":"Seroma","D":"Vascular compromise","E":"Loss of Nipple Areolar Sensation"},"ans":"E","multi":false,"etype":"ai","expl":"Acute complications: Hematoma (4%), Delayed wound healing (10%), Seroma (10 - 15%), and Vascular compromise.\n\nLong-term complications: Asymmetry, Fibrosis and fat necrosis, Inability to Breastfeed, Inverted Nipples, Loss of Nipple Areolar Sensation, Hypertrophic Scarring, and Discovery of Breast Cancer, and High NAC Position.","key":"縮乳術後的**急性期併發症**包括血腫、血清腫、延遲癒合、血管性危害（NAC 缺血）；而**乳頭乳暈感覺喪失屬長期後遺症，非急性併發症**。⚠ 本題問法為「下列關於急性術後併發症何者正確」而答案鍵指向 E，推測原題意應為「何者**不是**急性併發症」。以答案鍵作答，概念記住 A–D 是急性、E 是長期。","peropt":{"A":"屬急性併發症。延遲傷口癒合，發生率約 10%。","B":"屬急性併發症。血腫約 4%。","C":"屬急性併發症。血清腫約 10–15%。","D":"屬急性併發症。血管性危害導致 NAC 缺血。","E":"正解（依答案鍵）。乳頭乳暈感覺喪失（約 2%）屬**長期**後遺症，不是急性期併發症。"},"cite":"Grabb and Smith's, 8th edition, Chapter 56, p572-574","conflict":""},{"id":"2021","sub":"S13","src":"GS","years":[114],"stem":"In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate location for vascular anastomosis?","opts":{"A":"Rib1","B":"Rib3","C":"Rib6.","D":"Rib9","E":"Rib12"},"ans":"B","multi":false,"etype":"ai","expl":"The IMA and particularly the IMV have sufficient size on the left side to match the flap pedicle diameters at rib 3.\n\nIn addition, if the vessel is injured during exposure, there is an opportunity to obtain sufficient exposure to anastomose proximal on the vessels. On the right side, the veins are slightly larger than they are at the same rib level on the left and as such should be of reasonable size for the described flap at either rib 3 or 4.\n\nRib 1 sits just below the clavicle and resection of this rib would not be appropriate for anastomosis.\n\nRib 2 is still located too far superior for anastomosis between the IMA/IMV and DIEA/DIEV. In addition, if any difficulty is encountered during exposure of the IMA/IMV, use of the second rib does not allow sufficient operative exposure superiorly to perform anastomosis. IMV on the left side can be substantially smaller at ribs 4 and 5.","key":"DIEP 接 IMA/IMV 時的顯露位置：切除第 3 肋軟骨，在第 3 肋位置做吻合。此題問「吻合位置」，答案 Rib 3（B）；GS-009 問「切除哪根肋軟骨」，答案同樣是 Rib 3，但字母是 C。兩題並列正是「記概念、勿背字母」的示範。","peropt":{"A":"第 1 肋位置過高，被鎖骨遮蔽、無法安全顯露。","B":"正解。第 3 肋（第 3 肋軟骨切除後）是 IMA/IMV 口徑與可及性的最佳平衡點；IMV 在此仍有足夠管徑，且位置與乳房重建的皮瓣蒂長度相符。","C":"第 6 肋過低，IMV 常已分岔變細、口徑不足。","D":"第 9 肋遠低於內乳血管可用範圍。","E":"第 12 肋屬肋弓外緣，與內乳血管完全無關。"},"cite":"Grabb and Smith's, 8th edition, Chapter 60, p609","conflict":""},{"id":"2022","sub":"S01","src":"GS","years":[114],"stem":"關於reconstruction of the nipple-areolar complex using local skin flap，Nimboriboonporn and Chuthapisith 提出一種分類，何者為非?","opts":{"A":"Laterally based flap","B":"Centrally based flap","C":"Subdermal pedicle local flaps with single pedicle","D":"Subdermal pedicle local flaps with double pedicle","E":"以上皆是"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"Nimboriboonporn 與 Chuthapisith 對局部皮瓣乳頭重建的分類共三類：**centrally based flap（中央蒂）、subdermal pedicle local flaps with single pedicle（單一真皮下蒂）、subdermal pedicle local flaps with double pedicle（雙真皮下蒂）**。**沒有「laterally based flap」這一類**，故為非。","peropt":{"A":"正解（非此分類）。該分類中不存在「laterally based flap」。","B":"屬此分類。Centrally based flap（如 skate flap 的中央蒂型）。","C":"屬此分類。單一真皮下蒂的局部皮瓣。","D":"屬此分類。雙真皮下蒂的局部皮瓣（如 C-V flap）。","E":"A 不屬此分類，故不選以上皆是。"},"cite":"Grabb and Smith's, 8th, Ch 61, P611","conflict":""},{"id":"2023","sub":"S09","src":"GS","years":[114],"stem":"下列敘述何者為是?(複選)","opts":{"A":"Tuberous breast is characterized by decreased inframammary fold","B":"According to Grolleau classification of tuberous breast deformity, type III is both lower quadrants are absent","C":"Treatment algorithm for tuberous breast deformity, 期望conservative size的病人只要放implant即可","D":"Poland syndrome 有可能absence of the nipple","E":"Fat grafting 可改善Poland syndrome造成的subclavicular hollowing，但對absence of the anterior axillay fold較沒有幫助"},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"🎯 本題整合 tuberous breast（管狀乳房）與 Poland syndrome 兩大先天畸形。Tuberous breast 特徵為 base 縮窄、IMF 上移（elevated/constricted，而非下降）、乳腺經 areola 疝出。Grolleau 分類：Type I=下內側象限缺損、Type II=兩下象限缺損、Type III=全部四象限缺損（envelope 全面不足）。⚠ 易錯：把「兩下象限缺損」誤記為 Type III（實為 Type II）。Poland syndrome 可合併乳頭缺失，且脂肪移植對 subclavicular hollowing 有幫助、但無法重建 anterior axillary fold（需 latissimus 等肌瓣）。","peropt":{"A":"✗ 管狀乳房的 IMF 為上移/縮窄（elevated, constricted），並非單純 decreased inframammary fold，敘述不精確。","B":"✗ Grolleau Type III 為全部四象限缺損；兩下象限缺損屬 Type II，本項張冠李戴。","C":"✓ 期望 conservative size 的病人，若下極伸展足夠，單純放置 implant 可作為簡化選項。","D":"✓ Poland syndrome 可合併乳頭乳暈缺失（absence/hypoplasia of the nipple）。","E":"✗ 依答案未選；脂肪移植確可改善 subclavicular hollowing，對 anterior axillary fold 缺失助益有限（需肌瓣），本題答案未納入本項，記概念即可。"},"cite":"待複查（GS tuberous breast / Poland syndrome 記憶佐證）","conflict":""},{"id":"2024","sub":"S07","src":"GS","years":[115],"stem":"A 35-year-old female presents with severe bilateral breast ptosis (Regnault Grade 3) following massive weight loss. Her body mass index (BMI) is 24. Physical examination reveals a narrow breast base width and an upper pole pinch thickness of only 1.5 cm. The patient strongly desires a one-stage augmentation mastopexy to achieve full, lifted breasts. To minimize the long-term risk of lower pole stretch deformity (bottoming out) and ensure the vascular safety of the nipple-areolar complex (NAC), which of the following surgical strategies is most supported by current literature?","opts":{"A":"Inferior pedicle with a Wise-pattern skin excision, using a high-profile implant placed in the subglandular plane.","B":"Superomedial pedicle with a Wise-pattern skin excision, using a moderate or lower-profile implant placed in the dual-plane.","C":"Central mound pedicle with a periareolar skin excision, using an extra-high-profile implant placed in the total submuscular plane.","D":"A one-stage procedure is absolutely contraindicated in patients with severe ptosis; a mastopexy must be performed first, followed by implant placement 6 months later."},"ans":"B","multi":false,"etype":"ai","expl":"Explanation:\n\nThis question tests the critical evaluation of tissue biomechanics and vascularity in augmentation mastopexy.\n\nPedicle Selection: The inferior pedicle's blood supply is severed during implant pocket dissection, rendering the NAC blood supply random and highly prone to ischemia; thus, a superior or superomedial pedicle is strongly recommended.\n\nImplant Profile: High-profile implants exert excessive pressure on a lax skin envelope, significantly increasing the risk of lower pole stretch deformity (bottoming out) over time,. A lower or moderate profile implant (which is wider and taller) is preferred to fill the upper pole while minimizing inferior pressure.\n\nPocket Selection: An upper pole pinch thickness of less than 2 cm is an indication for submuscular or dual-plane placement to prevent implant visibility and rippling.\n\nWhile a staged approach is an option, a one-stage augmentation mastopexy is proven to be safe and effective when tissue-based planning principles are meticulously applied.\n\n(Source: Chapter 62 (Augmentation Mastopexy: Implant Selection & Mastopexy Techniques))","key":"🎯 本題考單期隆乳提乳（one-stage augmentation mastopexy）在組織條件不佳（massive weight loss、窄乳底、上極pinch僅1.5cm）下的安全策略。核心兩大原則：（1）血供安全——植入物囊袋剝離會切斷下方蒂（inferior pedicle）血流，使NAC血供變隨機而易缺血，故應選superior/superomedial pedicle；（2）避免長期bottoming out——高profile植入物對鬆弛皮膚下極壓力過大，應改用moderate/lower-profile並置於dual-plane（上極pinch<2cm需肌肉下/雙平面以防波紋與可見）。⚠ 分期並非絕對禁忌，遵循tissue-based planning時單期可安全執行。","peropt":{"A":"✗ Inferior pedicle 血供於囊袋剝離時被切斷，且high-profile+subglandular加重下極壓力與可見性，風險最高。","B":"✓（正解）Superomedial pedicle 保留NAC安全血供，moderate/lower-profile置於dual-plane，兼顧上極飽滿、降低bottoming out與波紋。","C":"✗ Extra-high-profile 對鬆弛皮膚壓力過大，periareolar切口難以矯正嚴重下垂，選擇矛盾。","D":"✗ 嚴重下垂並非單期手術『絕對』禁忌；tissue-based planning下單期已被證實安全有效。"},"cite":"原檔詳解","conflict":""},{"id":"2025","sub":"S05","src":"GS","years":[115],"stem":"A 47-year-old female, who underwent bilateral breast augmentation with silicone implants 5 years ago, presents with rapid unilateral breast swelling and severe capsular contracture over the past month. Ultrasound imaging reveals a highly aggressive mass with extracapsular spread. Fluid aspiration and tissue biopsy demonstrate negative CD30 expression and the absence of T-cell monoclonality via flow cytometry. Which of the following statements is most accurate?","opts":{"A":"This condition is directly caused by a subclinical bacterial biofilm infection and can be successfully eradicated with implant removal and prolonged antibiotic irrigation.","B":"BIA-ALCL is highly indicated","C":"BIA-SCC is highly indicated and this malignancy exhibits a highly aggressive phenotype; extracapsular spread is common at diagnosis, and short-term mortality rates are reported to be approximately 50%.","D":"The pathogenesis of this tumor is universally linked to an active Epstein-Barr virus (EBV) infection."},"ans":"C","multi":false,"etype":"ai","expl":"Explanation:\n\nThis question evaluates knowledge of breast implant-associated squamous cell carcinoma (BIA-SCC), a newly emerging entity distinct from BIA-ALCL.\n\nOption A. is incorrect: It is a true malignancy, not merely a biofilm-induced subclinical infection.\n\nOption B. is incorrect: BIA-ALCL will have positive CD30 expression and the presence of T-cell monoclonality via flow cytometry.\n\nOption C. is correct:\n\nOption D. is incorrect: Unlike BIA-ALCL, BIA-SCC has been reported in patients with a history of all types of implants, including smooth implants.\n\nSource: Chapter 65 (Emerging Breast Implant Associated Malignancies)","key":"🎯 本題鑑別新興的 BIA-SCC（breast implant-associated squamous cell carcinoma）與 BIA-ALCL。關鍵臨床線索：快速單側腫脹＋嚴重莢膜攣縮＋腫塊＋extracapsular spread，且 CD30 陰性、無 T-cell monoclonality → 排除 BIA-ALCL，指向 BIA-SCC。BIA-SCC 為侵襲性強的真性惡性腫瘤，診斷時常已莢膜外擴散，短期死亡率報告約 50%。⚠ 易混淆：BIA-ALCL 為 CD30 陽性、T-cell 單株性、多以晚發 seroma 表現、預後相對佳；BIA-SCC 則見於各型植入物（含 smooth），且與 EBV 無普遍關聯。","peropt":{"A":"✗ 此為真性惡性腫瘤，非單純 biofilm 亞臨床感染，抗生素沖洗無法根治。","B":"✗ BIA-ALCL 應為 CD30 陽性且有 T-cell monoclonality，本例兩者皆陰性，不符。","C":"✓（正解）符合 BIA-SCC：侵襲性表型、確診時常見莢膜外擴散、短期死亡率約 50%。","D":"✗ BIA-SCC 並非普遍與 active EBV 感染連結；此敘述不成立。"},"cite":"原檔詳解","conflict":""},{"id":"2026","sub":"S13","src":"GS","years":[115],"stem":"A 42-year-old female with a BRCA1 mutation is scheduled for bilateral prophylactic nipple-sparing mastectomies (NSM). She strongly desires autologous tissue reconstruction. However, she has a history of bariatric surgery for morbid obesity and, following weight stabilization, underwent a full abdominoplasty and a medial thigh lift. Furthermore, she explicitly states that she cannot accept any scars on her buttocks, adamantly refusing all gluteal flaps. Excluding the use of implants, which of the following microvascular free flap donor sites is the most feasible and reasonable choice given her anatomic constraints?","opts":{"A":"Free deep inferior epigastric perforator (DIEP) flaps","B":"Free profunda artery perforator (PAP) flaps or transverse upper gracilis (TUG) flaps","C":"Free lumbar artery perforator (LAP) flaps","D":"Pedicled latissimus dorsi flaps without concurrent fat grafting or implants"},"ans":"C","multi":false,"etype":"ai","expl":"Explanation:\n\nA surgical history of an abdominoplasty or panniculectomy destroys the anatomic structure of the deep and superficial inferior epigastric perforators, representing an absolute contraindication for abdominal flaps such as DIEP or TRAM flaps; thus, A. is excluded.\n\nA history of a medial thigh lift typically excises or damages the subcutaneous tissue and perforators of the medial thigh, making PAP and TUG flaps unsafe to perform; thus, B. is excluded.\n\nThe patient refuses gluteal scars, ruling out SGAP and IGAP flaps.\n\nOption D., the pedicled latissimus dorsi flap, typically provides insufficient tissue volume for total breast reconstruction, particularly in massive weight loss patients whose back fat is often thin. Without concurrent implants or fat grafting, it is extremely difficult to achieve symmetric and full bilateral reconstructions.\n\nOption C. is correct. The lumbar artery perforator (LAP) flap utilizes tissue from the posterolateral flank/lumbar region. This area often retains residual pliable tissue with ample volume in massive weight loss patients and avoids the restrictions of the abdomen, medial thighs, and buttocks. Although it is technically demanding and may require vascular grafts due to a limited pedicle length, the LAP flap is a recommended salvage donor site in the literature when all primary donor sites are unavailable and the patient refuses specific surgical scars.","key":"🎯 本題考自體游離皮瓣供區在多重手術史下的排除邏輯。DIEP/TRAM需完整深/淺下腹壁穿支——腹壁整形（abdominoplasty/panniculectomy）已破壞穿支，屬絕對禁忌；PAP/TUG需完整大腿內側穿支——medial thigh lift已切除/破壞該區；病人拒絕臀部疤痕故排除SGAP/IGAP；pedicled LD體積不足以做全乳重建（尤其MWL背部脂肪薄）。⚠ 故唯一合理選擇為LAP（lumbar artery perforator）皮瓣，利用後腰/側腹殘餘充足柔軟組織；缺點是蒂短、技術難、常需血管移植（vein graft），為文獻中的『救援供區』。","peropt":{"A":"✗ 腹壁整形已破壞DIE/SIE穿支，DIEP屬絕對禁忌。","B":"✗ Medial thigh lift 已破壞大腿內側穿支，PAP/TUG不安全。","C":"✓（正解）LAP皮瓣取後腰/側腹組織，避開腹部、大腿內側與臀部，為所有主要供區皆不可用時的合理救援選擇（惟蒂短常需血管移植）。","D":"✗ Pedicled LD 於MWL病人背部脂肪薄、體積不足，無植入/脂肪移植難達雙側對稱飽滿。"},"cite":"原檔詳解","conflict":""},{"id":"2027","sub":"S13","src":"GS","years":[115],"stem":"During a left breast reconstruction using a free DIEP flap, you choose the antegrade left internal mammary artery (IMA) and vein (IMV) as the recipient vessels. Upon releasing the vascular clamps after completing the anastomoses, you observe excellent arterial pulsation. However, the dermal edges of the flap begin oozing dark purple blood, and the flap rapidly becomes swollen and cyanotic. You re-examine the venous anastomosis and confirm it is widely patent with no thrombus; however, you note the patient's left IMV has a caliber of only 1.5 mm following a history of radiation therapy. Which of the following is the most physiologically sound and effective maneuver to salvage this flap?","opts":{"A":"Completely resect the venous anastomosis and replace the venous coupler with a hand-sewn technique to overcome the size discrepancy.","B":"Diagnose this as severe arterial spasm and immediately revise the arterial anastomosis to the thoracodorsal artery to increase arterial inflow.","C":"Perform venous supercharging by anastomosing the flap's superficial inferior epigastric vein (SIEV) to an alternative outflow tract, such as the retrograde IMV or thoracodorsal vein.","D":"Administer systemic tissue plasminogen activator (tPA) and Heparin immediately to dissolve suspected microvascular thrombosis within the flap parenchyma."},"ans":"C","multi":false,"etype":"ai","expl":"Explanation:\n\nC. is the most effective salvage technique: When the primary venous outflow is patent but insufficient to handle the volume, creating a second venous outflow tract (supercharging) using the SIEV is indicated.\n\nA. is incorrect: A hand-sewn anastomosis will not change the inherently restrictive 1.5 mm caliber of the recipient vein.\n\nB. is incorrect: Increasing arterial inflow into an already congested flap will exacerbate the swelling and ischemia.\n\nD. is incorrect: Without evidence of actual thrombosis, administering potent systemic thrombolytics will cause severe bleeding without addressing the mechanical caliber mismatch causing the congestion.\n\n(Source: Chapter 67 & 68 (Microvascular Complications / Venous Congestion))","key":"🎯 本題考游離皮瓣術中「動脈通暢但靜脈回流不足」的靜脈鬱血（venous congestion）處理。臨床線索：動脈搏動良好、皮瓣卻腫脹發紫、真皮邊緣滲暗紫血，且靜脈吻合通暢無血栓，但受區 IMV 因放療僅 1.5 mm 過細 → 屬「口徑不足導致回流量不夠」。正解為靜脈增流（venous supercharging）：將皮瓣的 SIEV 額外吻合至第二條回流路徑（如 retrograde IMV 或 thoracodorsal vein）。⚠ 易錯：重縫吻合口無法改變受區靜脈本身的細口徑；提高動脈灌流會加重鬱血；無血栓證據下全身溶栓將致大出血。","peropt":{"A":"✗ 改成手縫吻合仍無法改變受區靜脈本身 1.5 mm 的限制性口徑。","B":"✗ 此為靜脈鬱血非動脈痙攣；增加動脈流入只會加重腫脹與缺血。","C":"✓（正解）以 SIEV 建立第二條靜脈回流（supercharging）是最符合生理機轉的救援方式。","D":"✗ 無實際血栓證據下給予全身性 tPA/Heparin，無助於口徑不匹配且易致嚴重出血。"},"cite":"原檔詳解","conflict":""},{"id":"2028","sub":"S13","src":"GS","years":[115],"stem":"A 50-year-old female with a BMI of 36 kg/m2 is scheduled for a skin-sparing mastectomy and delayed deep inferior epigastric perforator (DIEP) flap reconstruction for right breast cancer. Her medical history includes: (1) Estrogen receptor-positive tumor currently treated with Tamoxifen; (2) A prior open cholecystectomy leaving a right subcostal scar; (3) Heterozygous Factor V Leiden mutation. As the primary reconstructive surgeon, which of the following statements regarding risk assessment and perioperative management are correct? (複選)","opts":{"A":"Tamoxifen's active metabolites have a half-life of approximately 14 days and increase the risk of microvascular thrombosis; therefore, the medication should be withheld for at least 2 weeks before and 2 weeks after surgery.","B":"The right subcostal scar may transect the superior epigastric vessels, making a pedicled TRAM flap highly prone to necrosis and relatively contraindicated, whereas a free DIEP flap remains a safer alternative.","C":"Heterozygous Factor V Leiden mutation poses an extremely high risk for pedicle thrombosis and is an absolute contraindication for microvascular free flap reconstruction.","D":"Literature indicates that severe obesity (BMI ≥ 35) significantly increases complication rates in abdominally based autologous reconstructions.","E":"To mitigate the high risk of thrombosis associated with Factor V Leiden, thromboelastography (TEG) can be utilized to precisely guide perioperative anticoagulation therapy, improving flap survival."},"ans":"ABDE","multi":true,"etype":"ai","expl":"Explanation:\n\nOption A. is correct: Tamoxifen promotes platelet aggregation and increases the risk of anastomotic thrombosis; it must be paused for 2 weeks perioperatively.\n\nOption B. is correct: A subcostal scar disrupts the superior epigastric artery, increasing pedicled TRAM flap necrosis risk by up to 8-fold, but does not preclude the use of the deep inferior epigastric system (DIEP flap).\n\nOption D. is correct: A BMI ≥ 35 is associated with significantly higher rates of both donor-site (hernia/bulge) and recipient-site (flap loss) complications.\n\nOption E. is correct, making Option C. incorrect: Factor V Leiden is a relative, not absolute, contraindication for microsurgery. Successful microvascular reconstructions have been reported by using TEG-guided anticoagulation protocols.\n\nSource: Chapter 67 (Preoperative Evaluation: Hormonal Treatment, Prior Scars, Obesity, Clotting History)","key":"🎯 本題整合DIEP術前風險評估四大面向：荷爾蒙、既往疤痕、肥胖、凝血。Tamoxifen促進血小板聚集、活性代謝物半衰期約14天，圍術期須停藥約2週以降低吻合血栓；右肋下切口（cholecystectomy）切斷superior epigastric系統，使pedicled TRAM壞死風險大增（達8倍），但不影響deep inferior epigastric系統故DIEP仍安全；BMI≥35顯著提高供/受區併發症。⚠ Factor V Leiden為『相對』而非絕對禁忌，可用TEG導引抗凝提高成功率，故C錯誤。","peropt":{"A":"✓ Tamoxifen 促血小板聚集、代謝物半衰期約14天，須圍術期停藥約2週降低吻合血栓風險。","B":"✓ 右肋下疤痕切斷superior epigastric血管，pedicled TRAM壞死風險大增；DIEP改用deep inferior epigastric系統仍為安全替代。","C":"✗ Heterozygous Factor V Leiden 屬『相對』非『絕對』禁忌，可經抗凝管理下成功完成顯微重建，敘述過度故錯誤。","D":"✓ BMI≥35 顯著增加腹部自體重建的供區（疝氣/膨出）與受區（皮瓣喪失）併發症。","E":"✓ 可用thromboelastography（TEG）精準導引圍術期抗凝，改善Factor V Leiden病人的皮瓣存活。"},"cite":"原檔詳解","conflict":""},{"id":"2029","sub":"S11","src":"GS","years":[115],"stem":"A 55-year-old woman is referred to your office for evaluation of breast reconstruction after a recent diagnosis of invasive ductal carcinoma of the right breast. She is a candidate for breast conservation and has planned to undergo a partial mastectomy followed by radiation therapy. Adjuvant chemotherapy will be determined by her final pathology but is also likely. She is interested in a breast reduction after she completes her cancer treatment. What is the best timeline for an oncoplastic breast reduction for optimal healing?","opts":{"A":"Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 6 weeks after completion of treatment","B":"Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 12 months after completion of treatment","C":"Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 24 months after completion of treatment","D":"Lumpectomy with unilateral oncoplastic reconstruction followed by adjuvant treatments (chemo or radiation), then elective reduction on the contralateral breast for symmetry 6 weeks after completion of treatment","E":"Lumpectomy with oncoplastic reduction/reconstruction and reduction of contralateral breast for symmetry followed by adjuvant treatment (chemo or radiation) approximately 6 weeks post operation"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Oncoplastic reduction 的時序原則：**在腫瘤切除的同一次手術中完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療**。理由是放療後的乳房組織血供與癒合能力永久受損，任何延後到放療之後的選擇性縮乳都會面對更高的傷口併發症；而放療前的乳房尚未纖維化，此時塑形最安全、對稱度也最好。","peropt":{"A":"錯。放療完成後僅 6 週即做選擇性縮乳，組織仍處急性放射性發炎期，傷口併發症率高。","B":"錯。等 12 個月雖較安全，但已錯過最佳塑形時機，且放療後乳房已纖維化、對稱難達成。","C":"錯。等 24 個月同上，且病人須長期忍受不對稱。","D":"錯。對側對稱性縮乳若延到放療之後，會在已放療的患側與未放療的健側間製造二次不對稱與癒合差異。","E":"正解。腫瘤切除的同一次手術即完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療（化療／放療），癒合條件最佳。"},"cite":"Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 69. P 736-737.","conflict":""},{"id":"2030","sub":"S13","src":"GS","years":[115],"stem":"A 42-year-old thin, athletic woman presents with bilateral postmastectomy contour deformity following implant-based breast reconstruction. She states that she has contour deformities both at rest and during activity. She is requesting revisional breast reconstruction. Which of the following is the best course of action for improvement of her concerns?","opts":{"A":"Lipofilling of the breast as a secondary procedure","B":"Secondary reconstruction removing the implant and using an abdominal-based DIEP flap","C":"Secondary reconstruction downsizing her implant to a smaller implant, capsulotomy, and autologous fat grafting","D":"Fat grafting followed by secondary pocket change and capsulectomy","E":"Capsulectomy with implant removal"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Implant-based 重建後、瘦削病人出現「靜止時與活動時皆有」的輪廓變形 → 活動時變形＝animation deformity，代表義乳位於 subpectoral。單靠脂肪或單靠換小義乳都無法解決動態問題，必須改變 pocket 平面。標準策略：先脂肪移植增厚軟組織覆蓋，再二期做 pocket change（subpectoral→prepectoral）＋ capsulectomy。","peropt":{"A":"單做 lipofilling 只改善靜止輪廓，無法消除肌肉收縮造成的動態變形，未解決根本原因。","B":"改用 DIEP 對這位「瘦削、athletic」的病人並不合適——腹部脂肪量不足，且屬過度治療（她要求的是修整，非全自體重建）。","C":"縮小義乳＋capsulotomy＋脂肪移植仍留在原本 subpectoral 平面，animation deformity 依舊存在。","D":"正解。先脂肪移植改善軟組織厚度與 rippling，再二期 pocket change 加 capsulectomy 移除舊莢膜、把義乳改到 prepectoral，同時處理靜止與動態變形。","E":"單純取出義乳並 capsulectomy 等於放棄重建，不符病人「requesting revisional reconstruction」的目標。"},"cite":"Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 71. P 753-754.","conflict":""},{"id":"2031","sub":"S01","src":"GS","years":[115],"stem":"What are complications of skin grafts in nipple and areolar reconstruction?(複選)","opts":{"A":"Donor site dehiscence","B":"Wound infection","C":"Hypertrophic Scar","D":"Failure of skin graft","E":"Nipple projection loss"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"乳頭乳暈重建使用植皮的併發症「全部都是」：供區裂開、傷口感染、肥厚性疤痕、植皮失敗，以及**乳頭突出度流失**（最常見也最難避免——所有重建的乳頭都會隨時間回縮，故設計時必須刻意過度矯正）。","peropt":{"A":"是。供區傷口裂開（尤其對側乳暈或大腿內側供區）。","B":"是。傷口感染。","C":"是。肥厚性疤痕，供區與受區皆可能。","D":"是。植皮失敗（血腫、剪力或感染所致）。","E":"是。乳頭突出度流失，是 NAC 重建最常見的長期問題。"},"cite":"Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 72. P 770-771.","conflict":""},{"id":"2032","sub":"S02","src":"GS","years":[115],"stem":"一位 28 歲 AMAB（assigned male at birth）跨性別女性，接受外源性雌激素治療 18 個月，乳房發育停留在 Tanner Stage 3，希望接受 gender-affirming breast augmentation（GABA）。外科醫師評估時，下列哪些處置或考量符合本章原文所述的正確臨床原則？（複選）","opts":{"A":"AMAB 個體的 base width（BW）平均較大，而 nipple-to-IMF（N-IMF）距離較短，選擇植入物時需特別注意此比例失衡","B":"為避免 animation deformity 及 medial breast separation，應優先考慮 subglandular 而非 submuscular 植入物放置","C":"降低 inframammary fold（IMF）約植入物 BW 的一半，有助於使 NAC 居中並避免 NAC 向下移位","D":"periareolar 切口為 GABA 的首選入路，因其可提供最佳的 IMF 重建效果","E":"Internal pudendal artery perforator flap"},"ans":"ABCE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考 AMAB 跨性別女性之 gender-affirming breast augmentation（GABA）解剖與術式原則。AMAB 胸廓 base width（BW）較大、N-IMF 距離較短，選 implant 需注意此比例失衡；為避免 animation deformity 與 medial breast separation，優先考慮 subglandular 而非 submuscular；下移 IMF 約 BW 一半有助 NAC 置中、避免 NAC 相對下移。⚠ 注意：periareolar 入路並非 GABA 首選（男性乳暈小、不利 IMF 重建，通常採 IMF 入路），故 D 錯。E（Internal pudendal artery perforator flap）於本答案被列為正確選項，惟其屬會陰/陰道成形範疇，於乳房隆乳章節出現略顯突兀，作答錨定該年官方答案。","peropt":{"A":"✓ AMAB 個體 BW 平均較大、N-IMF 較短，選植入物須留意此比例失衡。","B":"✓ 為避免 animation deformity 與 medial separation，優先考慮 subglandular 放置。","C":"✓ 下移 IMF 約植入物 BW 一半，有助 NAC 置中、避免 NAC 下移。","D":"✗ periareolar 並非 GABA 首選入路；男性乳暈小、不利 IMF 重建，通常採 IMF 切口。","E":"✓（依官方答案列為正確）此項與陰部穿支瓣相關，於隆乳情境略突兀，作答以該年答案為準。"},"cite":"待複查（GS gender-affirming breast augmentation 記憶佐證）","conflict":""},{"id":"2033","sub":"S03","src":"NG","years":[104],"stem":"有一女性接受breast augmentation後五年，檢查發現the breast is firmer, the implant can be palpated easily and may be distorted or visible，屬於The Baker classification of capsular contracture的哪一個grade？","opts":{"A":"Grade I","B":"Grade II","C":"Grade III","D":"Grade IV","E":"Grade V"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Baker 分級：I 柔軟如常；II 略硬，義乳**可觸及但看不見**；III **明顯較硬、義乳容易觸及、可能變形或看得見**；IV 堅硬、疼痛、壓痛、明顯變形。本題「較硬＋易觸及＋可能變形或可見」＝ **Grade III**。⚠ 注意：本題答案 C 代表 Grade III，而 NG-168 答案同樣是 C 卻代表 Grade II（因選項從 0 開始）——典型的字母陷阱。","peropt":{"A":"Grade I：乳房柔軟，外觀與觸感如自然乳房。","B":"Grade II：略硬，義乳可觸及但不可見、無變形。","C":"正解。Grade III：明顯變硬、義乳容易觸及、可能變形或看得見。","D":"Grade IV：堅硬、疼痛、壓痛且明顯變形。","E":"Baker 分級**只有 I–IV**，不存在 Grade V。"},"cite":"Neligan 3rd, Vol.5, P36","conflict":""},{"id":"2034","sub":"S04","src":"NG","years":[104],"stem":"關於Secondary breast augmentation，下列敘述何者為非？","opts":{"A":"Revision breast augmentation surgery can be classified into three categories: related to the previous surgery, related to the soft tissues, related to the implant. Problems related to the implant are most common.","B":"Physical examination focus on implant stability should be assessed with the patient in multiple positions including standing with arms at side, arms over head, lying supine and leaning forward.","C":"The quality and quantity of breast tissue in all four quadrants can be done by more objective measures such as the pinch test.","D":"The best way to manage a revision is to have avoided it in the first place.","E":"In the patients with multiple procedures, MRI is useful in identifying the exact plane of the implant and its relation to the pectoral muscle."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"二次隆乳的問題可分三類：與前次手術相關、與軟組織相關、與義乳相關。⚠ 本年答案鍵判定「**與義乳相關的問題最常見**」為錯述。其餘（多姿勢評估義乳穩定度、以 pinch test 客觀評估四象限組織量、最好的處理是一開始就避免、多次手術者以 MRI 判定義乳所在平面）皆正確。","peropt":{"A":"正解（錯述）。三大分類本身正確，但把「義乳相關問題」列為最常見與原文不符。","B":"正確。評估義乳穩定度須在站立垂手、雙手上舉、仰臥、前傾等多種姿勢下進行。","C":"正確。以 pinch test 客觀量測四個象限的乳腺組織質與量。","D":"正確。處理二次手術最好的方法，是第一次就避免它發生。","E":"正確。多次手術病人以 MRI 可精確判定義乳所在平面及其與胸大肌的關係。"},"cite":"Neligan 3rd, Vol.5, P40-42","conflict":""},{"id":"2035","sub":"S03","src":"NG","years":[104],"stem":"The complication of breast surgery with the silicone gel implant，下列敘述何者有誤？","opts":{"A":"Most hematomas develop early, within hours or days of surgery and require surgical removal.","B":"Capsular contracture and trauma may be factors of late hematomas.","C":"Infection after breast augmentation is uncommon. Endogenous bacteria usually cause early infections, either from the skin or from the milk ducts.","D":"The incidence of capsular contracture appears to have been reduced with the evolution of the silicone gel implant.","E":"The classical treatment for capsular contracture was close capsulotomy."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"莢膜攣縮的標準外科處理是 **open capsulotomy／capsulectomy**；**closed capsulotomy（閉合式徒手擠壓破莢膜）已被摒棄**，因會造成義乳破裂、血腫與莢膜攣縮復發，不能稱為「經典治療」。其餘（血腫多早期發生需手術清除、莢膜攣縮與外傷可致遲發性血腫、感染少見且早期感染多來自皮膚或乳管的內源性細菌、新一代矽膠義乳使攣縮率下降）皆正確。","peropt":{"A":"正確。多數血腫在術後數小時至數日內發生，須手術清除。","B":"正確。莢膜攣縮與外傷是遲發性血腫的可能因素。","C":"正確。隆乳後感染不常見；早期感染多為皮膚或乳管來源的內源性細菌。","D":"正確。隨矽膠義乳世代演進，莢膜攣縮發生率已下降。","E":"正解（錯述）。標準治療為 **open** capsulotomy／capsulectomy；closed capsulotomy 因義乳破裂與復發率高已被淘汰。"},"cite":"Neligan 3rd, Vol.5, P103-107","conflict":""},{"id":"2036","sub":"S04","src":"NG","years":[104],"stem":"有關breast augmentation在選擇the plane of insertion pocket的優缺點，下列敘述何者為非？","opts":{"A":"The submuscular plane of insertion has advantages for a marked paucity of breast tissue.","B":"The implant in the submusculofascial plane easily become displaced superior-laterally.","C":"The dual plane insertion decreased the tendency of implants to be positioned too high.","D":"Milder forms of the symmastia(medial malposition) can be corrected by conversion of the implant from the subglandular to the submuscular plane.","E":"Double-bubble deformity is more common with large implants that are inserted in the submuscular plane"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"義乳平面選擇的四項正確概念：軟組織極薄者宜 submuscular；submusculofascial 平面義乳易向**上外**移位；dual plane 可減少義乳過高的傾向；大型義乳置於 submuscular 較易產生 double-bubble。錯的是 D——**submuscular 平面因胸大肌內側起點被剝離，本身就是 symmastia（內側移位）的好發平面**，把義乳從 subglandular 換到 submuscular 並不能矯正 symmastia。","peropt":{"A":"正確。乳腺組織極少者，submuscular 可提供額外覆蓋、減少邊緣可觸及與 rippling。","B":"正確。submusculofascial 平面的義乳容易向上外側移位。","C":"正確。dual plane 藉由釋放胸大肌下緣，降低義乳位置過高的傾向。","D":"正解（錯述）。輕度 symmastia 的矯正靠內側 capsulorrhaphy 或改做 neo-subpectoral pocket 重建內側界線；改為 submuscular 反而是 symmastia 的好發平面。","E":"正確。大型義乳置於 submuscular 時 double-bubble 較常見（義乳撐破原有 IMF）。"},"cite":"Neligan 3rd, Vol.5, P113-116","conflict":""},{"id":"2037","sub":"S06","src":"NG","years":[104],"stem":"有關Lassus vertical scar technique of mastopexy原則，下列敘述何者錯誤？","opts":{"A":"A central wedge resection to reduce the size of the breast","B":"Transposition of the areola on a superiorly-based flap","C":"Addition of a vertical scar component","D":"No undermining of the skin","E":"This procedure is applicable to many breast sizes and skin qualities."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Lassus 垂直疤痕術式的四項原則：中央楔形切除縮小體積、以**上蒂**皮瓣移轉乳暈、加上垂直疤痕、**不做皮膚潛行剝離（no undermining）**。錯的是 E——此術式**並非適用於各種乳房大小與皮膚品質**（皮膚彈性差或極巨乳者不適合）。","peropt":{"A":"正確。中央楔形切除以縮小乳房體積。","B":"正確。以上方為基底的皮瓣移轉乳暈。","C":"正確。加入垂直疤痕成分。","D":"正確。不做皮膚潛行剝離（這是 Lassus 的標誌性原則）。","E":"正解（錯述）。此術式並非適用於各種乳房大小與皮膚品質。"},"cite":"Neligan 3rd, Vol.5, P134","conflict":""},{"id":"2038","sub":"S06","src":"NG","years":[104],"stem":"關於invert-T technique of mastopexy的敘述，下列何者為非？","opts":{"A":"The long horizontal component allows adequate resection of the skin envelope in extremely ptotic breasts","B":"This technique has the ability to see the final shape of the breast while the patient is still in the operating table.","C":"This procedure lack of internal support increases the chance of recurrent ptosis during the subsequent months and years.","D":"This technique decreases the chance of the subsequent revision.","E":"For hiding horizontal lateral visible scar, the lengthening the medial extent should be performed to the midline as possible."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Inverted-T（倒 T）乳房固定術的水平疤痕若要隱藏，應把延長方向放在**外側**並藏入 IMF 內；往**內側（中線）**延長反而製造顯眼的內側疤痕。故 E 為錯述。其餘：長水平段可切除極度下垂者多餘皮膚、術中即可見最終形狀、缺乏內在支撐使日後易再下垂。","peropt":{"A":"正確。長的水平段允許在極度下垂的乳房充分切除多餘皮膚囊袋。","B":"正確。術中在手術檯上即可直接看到乳房最終形狀。","C":"正確。缺乏內在支撐（internal support），日後數月至數年再度下垂的機會增加。","D":"正確（依本年答案鍵）。此術式可降低後續修整手術的機會。","E":"正解（錯述）。為隱藏水平疤痕應向**外側**延長並藏入 IMF，向中線延長會造成明顯的內側疤痕。"},"cite":"Neligan 3rd, Vol.5, P146","conflict":""},{"id":"2039","sub":"S07","src":"NG","years":[104],"stem":"關於vertical scar reduction mammaplasty各項術式，下列敘述何者有誤？","opts":{"A":"Vertical scar reduction mammaplasty has less scarring than inverted-T scar or inferior pedicle breast reduction techniques.","B":"Lassus developed a technique using a superior dermoglandular pedicle for transposition of the nipple-areola complex, and the skin surrounding the excised area was undermined to facilitate gathering of the vertical scar.","C":"The Lejour technique introduced extensive pre-excision liposuction and the superior dermoglandular pedicle was sutured to the pectoralis fascia.","D":"Hall-Findlay's technique used a mosque dome skin marking pattern and a full thickness medial dermoglandular pedicle to transpose the nipple-areola complex.","E":"The Lista's design of skin marking was mosque dome pattern with pointed inferiorly."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"**Lassus 的標誌就是「不做皮膚潛行剝離」**（no undermining）——題目說他「將切除區周圍皮膚潛行剝離以利垂直疤痕聚攏」，與其原則正好相反，故為錯述。對照：Lejour 引入大量預切除抽脂並將上蒂縫至胸肌筋膜；Hall-Findlay 用 mosque dome 標記＋全層內側蒂；Lista 亦為 mosque dome 下尖設計。","peropt":{"A":"正確。垂直疤痕縮乳的疤痕少於倒 T 或下蒂術式。","B":"正解（錯述）。Lassus 使用上蒂沒錯，但其原則是**不做皮膚潛行剝離**。","C":"正確。Lejour 引入大量預切除抽脂，並將上蒂皮腺瓣縫至胸大肌筋膜。","D":"正確。Hall-Findlay 採 mosque dome 標記與全層內側皮腺瓣移轉 NAC。","E":"正確。Lista 的皮膚標記為下方呈尖端的 mosque dome 圖案。"},"cite":"Neligan 3rd, Vol.5, P178","conflict":""},{"id":"2040","sub":"S12","src":"NG","years":[104],"stem":"下列哪些因素致使患者在接受mastectomy後可能存在the potential for positive margins，較不適合immediate breast reconstruction，何者除外？","opts":{"A":"Elder age (>40 years old)","B":"Extensive DCIS","C":"History of neoadjuvant chemotherapy","D":"Infiltrating lobular carcinoma","E":"Her2/neu positivity"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"切緣陽性的高風險因子是 **年輕（<40 歲）**、廣泛 DCIS、新輔助化療病史、浸潤性小葉癌、HER2/neu 陽性。題目把年齡寫成「Elder age（>40 歲）」，方向相反，故為「除外」的那一個。這批病人切緣陽性風險高，較不適合即時重建。","peropt":{"A":"正解（除外）。高風險的是**年輕（<40 歲）**，不是 >40 歲。","B":"是風險因子。廣泛的 DCIS 切緣不易判定。","C":"是風險因子。新輔助化療後腫瘤退縮呈散在分佈，切緣評估困難。","D":"是風險因子。浸潤性小葉癌呈單列浸潤，邊界不清。","E":"是風險因子。HER2/neu 陽性常伴隨較廣泛的病灶。"},"cite":"Neligan 3rd, Vol.5, P298","conflict":""},{"id":"2041","sub":"S02","src":"NG","years":[104],"stem":"關於breast augmentation的敘述，下列何者正確? (複選)","opts":{"A":"Alternations of nipple sensitivity是augmentation mammaplasty術後常見的併發症，surgical approach方式會影響其發生率及嚴重程度。","B":"術後最常見傷口感染源是Staphylococcus epidermidis。","C":"Periprosthetic seroma fluid通常在術後一週內會自行吸收，intraoperative topical antibiotics有助於減少其發生率。","D":"因嚴重感染症移除implant後，需待感染完全清除後6-12個月再施行secondary operation。","E":"Perioperative hematoma應接受immediate evacuation and exploration，只是常找不到hematoma的來源。"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"隆乳併發症四項正確：術後最常見的傷口感染源是 **Staphylococcus epidermidis**（皮膚常在菌，也是生物膜的主角）；義乳周圍血清腫多於一週內自行吸收，術中局部抗生素有助減少；因嚴重感染移除義乳後須待感染完全清除 **6–12 個月**再二次手術；圍手術期血腫應立即清除探查，但常找不到出血點。A 依本年答案鍵為錯述——乳頭感覺改變的發生率與嚴重度**與切口方式並無確立關聯**。","peropt":{"A":"錯（依本年答案鍵）。乳頭感覺改變的發生率與嚴重度與手術入路的關聯性未被確立。","B":"對。最常見的傷口感染源為 Staphylococcus epidermidis。","C":"對。義乳周圍血清腫通常一週內自行吸收；術中局部抗生素有助降低發生率。","D":"對。嚴重感染移除義乳後，須待感染完全清除 6–12 個月再行二次手術。","E":"對。圍手術期血腫應立即清除並探查，惟常找不到明確出血來源。"},"cite":"Neligan 3rd, Vol.5, P32-35","conflict":""},{"id":"2042","sub":"S07","src":"NG","years":[104],"stem":"以下何者為reduction mammaplasty術後產生skin flap necrosis風險因子？(複選)","opts":{"A":"Smoking","B":"BMI > 30","C":"Hypertension","D":"previous breast incisions","E":"The amount of tissue resected"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"縮乳術後皮瓣壞死的風險因子「全部都是」：抽菸、BMI>30、高血壓、既往乳房切口、切除組織量。共通機轉是**皮瓣灌流不足**——抽菸與高血壓損害微循環，肥胖與大量切除使皮瓣長而薄，既往切口已破壞既有血管網。","peropt":{"A":"是。抽菸為最強的可改變風險因子。","B":"是。BMI>30，皮瓣長而厚、遠端灌流差。","C":"是。高血壓伴隨微血管病變。","D":"是。既往乳房切口破壞既有血管網。","E":"是。切除組織量愈大，剩餘皮瓣愈長、張力愈高。"},"cite":"Neligan 3rd, Vol.5, P246","conflict":""},{"id":"2043","sub":"S12","src":"NG","years":[104],"stem":"下列關於Expander-Implants breast reconstructions何者為非","opts":{"A":"Irradiated skin在delay reconstruction是relative contraindication","B":"需有足夠的skin envelope","C":"最常見的complication為infection","D":"Scleroderma正在接受治療的病人不建議使用此重建方法","E":"抽菸的病人需戒菸6個月"},"ans":"C","multi":false,"etype":"ai","expl":"考生建議：CE選項有爭議，此題建議刪除","key":"擴張器－義乳重建**最常見的併發症不是感染，而是莢膜攣縮與不對稱**（感染發生率僅數個百分比）。其餘：放療過的皮膚在延遲重建屬相對禁忌、需足夠皮膚囊袋、治療中的硬皮症病人不宜、抽菸者需戒菸。⚠ 原檔考生註記認為 C、E 兩選項皆有爭議，建議刪題。","peropt":{"A":"正確。放療過的皮膚彈性與血供不佳，延遲重建時屬相對禁忌。","B":"正確。需有足夠的皮膚囊袋才能容納擴張器。","C":"正解（錯述）。最常見併發症是**莢膜攣縮與不對稱**，非感染。","D":"正確。硬皮症（scleroderma）活動治療期病人，皮膚纖維化不適合擴張。","E":"依本年答案鍵視為正確（抽菸者需戒菸；戒菸期長短各家不一，原檔考生註記指此選項有爭議）。"},"cite":"Neligan 3rd, Volume Five, Page 339, 363","conflict":""},{"id":"2044","sub":"S14","src":"NG","years":[104],"stem":"下列關於Latissumus dorsi flap breast reconstruction何者為非","opts":{"A":"合併breast implant的使用可以有better symmetry","B":"它是屬於Type V muscle flap","C":"支配血管為thoracodorsal artery, a branch of subscapular artery","D":"Extended latissumus dorsi flap用於totally autologous breast reconstruction並不reliable","E":"Blood supply亦可以從Posterior intercostal artery而來"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Extended latissimus dorsi flap（帶入背部周邊脂肪的擴大型 LD）**確實可作為完全自體重建的可靠選擇**，尤其在腹部不可用、乳房體積中等的病人。題目說它「並不 reliable」為錯述。其餘敘述（合併義乳提升對稱性、Type V、胸背動脈為肩胛下動脈分支、後肋間動脈亦供血）皆正確。","peropt":{"A":"正確。LD 合併義乳可獲得更好的體積與對稱性，是常見組合。","B":"正確。LD 為 Mathes-Nahai Type V。","C":"正確。胸背動脈是 subscapular artery 的分支。","D":"正解（錯述）。Extended LD flap 用於完全自體重建是可靠的，並非不可靠。","E":"正確。後肋間動脈（節段性次要蒂）亦提供血供，這正是 Type V 的定義。"},"cite":"Neligan 3rd, Volume Five, Page 370, 371","conflict":""},{"id":"2045","sub":"S13","src":"NG","years":[104],"stem":"下列關於Free TRAM breast reconstruction何者為非","opts":{"A":"比起Pedicle TRAM, free TRAM可能會有較低的donor site morbidity及ischemic complication","B":"它是屬於Type II muscle flap","C":"支配血管為deep inferior epigastric artery","D":"重建後接受radiation therapy會有unpredictable result","E":"Zone II為位於Zone I旁cross midline的區域"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"rectus abdominis 的 Mathes-Nahai 分類為 **Type III**（兩條主要血管蒂：superior 與 deep inferior epigastric artery），不是 Type II。此為跨年高頻考點，須與 latissimus dorsi（Type V）、gracilis（Type II）區辨。","peropt":{"A":"正確。free TRAM 相較 pedicled TRAM，因直接接上 DIEA 主蒂，灌流較佳、脂肪壞死等 ischemic complication 較少，肌肉犧牲也較少。","B":"正解（錯述）。腹直肌是 Mathes-Nahai Type III（雙主蒂），不是 Type II。","C":"正確。free TRAM 的供應血管為 deep inferior epigastric artery。","D":"正確。重建後才接受放射治療，結果不可預測（皮瓣攣縮、脂肪壞死），故建議放療後再做自體重建。","E":"正確。Hartrampf 分區中 Zone II 為跨中線、位於 Zone I 對側的區域（Zone I 位於同側腹直肌正上方）。"},"cite":"Neligan 3rd, Volume Five, Page 411","conflict":""},{"id":"2046","sub":"S13","src":"NG","years":[104],"stem":"下列關於deep inferior epigastric artery perforator flap(DIEAP flap)何者為非","opts":{"A":"提供large volume of soft, melleable tissue for reconstruction","B":"比起TRAM flap, 需要較長的learning curve","C":"比起TRAM flap, donor site morbidity較小","D":"Deep inferior epigastric artery分為lateral and medial branch","E":"對experienced surgeon, DIEAP flap loss rate為5%"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"同一 DIEAP 事實群的反向出題：經驗豐富術者的皮瓣完全壞死率應 **<1%**，題目寫 5% 故為錯述。其餘（大量柔軟組織、學習曲線較長、供區傷害較小、DIEA 分內外兩支）皆正確。","peropt":{"A":"正確。DIEAP 提供大量柔軟、可塑形的組織，質地最接近乳房。","B":"正確。相較 TRAM 需要更長的學習曲線。","C":"正確。不犧牲腹直肌，供區傷害較 TRAM 小。","D":"正確。DIEA 分為 medial 與 lateral 兩支。","E":"正解（錯述）。經驗豐富術者的 DIEAP 皮瓣壞死率 <1%，非 5%。"},"cite":"Neligan 3rd, Volume Five, Page 435","conflict":""},{"id":"2047","sub":"S15","src":"NG","years":[104],"stem":"下列關於Omentum reconstruction of the breast何者為非","opts":{"A":"Videolaparoscopic approach約需60-90 minutes to harvest the flap","B":"在failed reconstruction,可以使用omentum flap","C":"可以配合implant的使用","D":"可以用在radical mastectomy的病人","E":"Omentum volume在術前無法確切知道"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"大網膜（omentum）皮瓣的限制：**不適用於 radical mastectomy 的病人**（胸壁組織與皮膚缺損過大，大網膜提供的體積與皮膚覆蓋不足）。其餘：腹腔鏡取瓣約 60–90 分鐘、可用於失敗的重建、可合併義乳、術前無法確知大網膜體積（這正是它的最大缺點）。","peropt":{"A":"正確。腹腔鏡取瓣約需 60–90 分鐘。","B":"正確。可作為重建失敗後的救援選項。","C":"正確。可合併義乳使用以補足體積。","D":"正解（錯述）。不適用於 radical mastectomy 的病人。","E":"正確。術前無法確切得知大網膜體積，是此皮瓣最大的不確定性。"},"cite":"Neligan 3rd, Volume Five, Page 472","conflict":""},{"id":"2048","sub":"S09","src":"NG","years":[104],"stem":"下列關於Congenital anomalies of the breast何者為非","opts":{"A":"Tuberous breast是指a great variety of breast deformities that may present very different anatomical-morphologic characteristics","B":"Hypoplastic tuberous breasts可以分成3個type","C":"共有4個type的flap來重建此deformity","D":"Flap type I and II用來重建type I deformity","E":"Flap type III and IV用來重建type II deformity"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"先天乳房異常的分類數字題：Tuberous breast 涵蓋型態差異極大的一群畸形；hypoplastic tuberous breast 分 **3 型**；重建皮瓣分 **4 型**。⚠ 皮瓣型別與變形型別的配對（本題 D、E）屬冷門細節，依本年答案鍵 D 為錯述、E 為正確；記住「變形 3 型、皮瓣 4 型」即可，勿在配對上耗記憶。","peropt":{"A":"正確。Tuberous breast 是一組解剖與形態差異極大的畸形總稱。","B":"正確。發育不良型的 tuberous breast 分為 3 型。","C":"正確。共有 4 種型別的皮瓣用於重建此類畸形。","D":"正解（錯述）。依答案鍵，flap type I 與 II 並非用於重建 type I 變形。","E":"正確（依答案鍵）。flap type III 與 IV 用於重建 type II 變形。"},"cite":"Neligan 3rd, Volume Five, Page 521","conflict":""},{"id":"2049","sub":"S09","src":"NG","years":[104],"stem":"下列關於Poland syndrome何者為非","opts":{"A":"單側congenital chest deformity","B":"Absence of clavicular portion of pectoralis major","C":"Absence of one or two ribs or costal cartilage","D":"Ipsilateral anomalies of the hand, lower arm or entire upper limb","E":"患者沒有anterior axillary fold"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Poland syndrome 缺損的是 pectoralis major 的 **sternal head（胸骨頭）**，鎖骨頭（clavicular head）通常保留——這正是病人上臂仍能屈曲、卻沒有前腋褶的原因。其餘（單側、肋骨或肋軟骨缺一至兩根、同側上肢異常、無前腋褶）皆正確。","peropt":{"A":"正確。Poland 為單側先天胸壁畸形。","B":"正解（錯述）。缺損的是 **sternal head（胸骨頭）**，不是 clavicular portion；鎖骨頭通常存在。","C":"正確。可合併一至兩根肋骨或肋軟骨缺如。","D":"正確。同側手部、前臂或整個上肢可有異常。","E":"正確。因胸大肌胸骨頭缺失，前腋褶（anterior axillary fold）消失。"},"cite":"Neligan 3rd, Volume Five, Page 548","conflict":""},{"id":"2050","sub":"S14","src":"NG","years":[104],"stem":"下列何者為Alternative flaps for breast reconstruction的選擇 (複選)","opts":{"A":"Transverse upper gracilis free flap (TUG)","B":"Superior gluteal artery free flap (SGAP)","C":"Inferior gluteal artery free flap (IGAP)","D":"Deep femoral artery perforator flap (DFAP)","E":"Lumbar artery perforator flap (LAP)"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"腹部組織不可用時的**替代皮瓣清單**：TUG、SGAP、IGAP、DFAP（deep femoral artery perforator，即 PAP 系統）、LAP 全部都是選項，答案 ABCDE。此題考的是「認得住這五個名字」，深入細節（蒂長、穿通枝路徑）則見 NG-049/065。","peropt":{"A":"是。TUG（橫向股薄肌上部皮瓣），質地柔軟但體積有限。","B":"是。SGAP（上臀動脈穿通枝皮瓣），蒂較短。","C":"是。IGAP（下臀動脈穿通枝皮瓣），蒂較長但鄰近坐骨神經。","D":"是。DFAP／PAP（股深動脈穿通枝皮瓣），蒂長 9–13 cm。","E":"是。LAP（腰動脈穿通枝皮瓣），脂肪量大但蒂短、剝離困難。"},"cite":"Neligan 3rd, Volume Five, Page 457","conflict":""},{"id":"2051","sub":"S16","src":"NG","years":[104],"stem":"下列關於Local flaps in partial breast reconstruction何者為是(複選)","opts":{"A":"High tumor/breast size ratio的病人是使用pedicled flap的indication","B":"在pedicled flap in partial breast reconstruction,通常不需要overcorrection","C":"對側breast有時需接受fat grafting來達到symmetry","D":"可以使用intercostal artery perforator (ICAP) flap","E":"Serratus artery為thoracodorsal artery的分支"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"部分乳房重建用局部皮瓣的正確敘述：腫瘤／乳房體積比高者是帶蒂皮瓣的適應症；對側乳房有時需脂肪移植達到對稱；可用 ICAP 皮瓣；前鋸肌動脈是胸背動脈的分支。錯的是 B——**帶蒂皮瓣用於部分乳房重建時，通常需要 overcorrection（過度矯正）**，因為術後放療會使皮瓣萎縮。","peropt":{"A":"對。腫瘤／乳房體積比高（切除比例大）者，是使用帶蒂皮瓣的適應症。","B":"錯。**需要 overcorrection**——術後放療會造成皮瓣體積萎縮。","C":"對。對側乳房有時需接受脂肪移植以達對稱。","D":"對。可使用肋間動脈穿通枝（ICAP）皮瓣。","E":"對。前鋸肌動脈為胸背動脈的分支。"},"cite":"Neligan 3rd, Volume Five, Page 482,486","conflict":""},{"id":"2052","sub":"S09","src":"NG","years":[104],"stem":"Poland syndrome造成之anomalies可能與胚胎時期哪一血管發育異常有關(複選)","opts":{"A":"Common carotid artery","B":"External carotid artery","C":"Internal carotid artery","D":"Subclavian artery","E":"Vertebral artery"},"ans":"DE","multi":true,"etype":"ai","expl":"","key":"Poland syndrome 的胚胎學假說為 **subclavian artery supply disruption sequence**：胚胎約第 6 週時 subclavian artery 及其分支（含 vertebral artery）血流中斷，導致同側胸大肌胸骨頭、肋骨、乳房與上肢的發育缺陷。故正解 DE。","peropt":{"A":"否。common carotid artery 供應頭頸，與胸壁／上肢發育無關。","B":"否。external carotid artery 供應顏面淺層構造。","C":"否。internal carotid artery 供應腦與眼眶。","D":"是。subclavian artery 為核心——其血流中斷造成同側胸壁與上肢缺陷。","E":"是。vertebral artery 為 subclavian 的分支，同屬此血流中斷序列。"},"cite":"Neligan 3rd, Volume Five, Page 548, 549","conflict":""},{"id":"2053","sub":"S09","src":"NG","years":[105],"stem":"Regarding the treatment of Poland's syndrome, choose the correct description: (複選)","opts":{"A":"Mild forms of Poland's syndrome is similar to adult breast reconstruction, both silicone prostheses as well as autologous tissue reconstruction have been described.","B":"Pedicled latissimus dorsi flaps with or without silicone implants can be accomplished with excellent results, improving chest wall contour in a staged fashion.","C":"In more severe presentations of Poland's syndrome, bony support for chest wall reconstruction has traditionally been accomplished with autologous split-rib grafts or Marlex mesh.","D":"Autologous split-rib grafts tends to result in a flattened appearance and, therefore, tends to be performed in conjunction with latissimus dorsi flaps.","E":"Alternatively mesh prostheses with rib graft, molded silicone prostheses, as well as cryopreserved costal cartilage have been described."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 Poland syndrome的重建須依嚴重度階梯化處理。輕度可比照一般隆乳/重建（矽膠或自體組織）；中至重度常需pedicled latissimus dorsi flap±矽膠植入分期重建改善胸壁輪廓；嚴重伴胸壁骨性缺損者傳統以autologous split-rib graft或Marlex mesh提供支撐，因split-rib易呈扁平外觀常合併LD皮瓣使用；替代方案尚有mesh+rib graft、molded silicone prosthesis、cryopreserved costal cartilage。本題各敘述皆為文獻所述正確選項，故全選。","peropt":{"A":"✓ 輕度Poland類似成人乳房重建，矽膠植入與自體組織重建皆有文獻描述。","B":"✓ Pedicled LD flap±矽膠可分期改善胸壁輪廓且效果良好。","C":"✓ 嚴重型骨性支撐傳統採autologous split-rib graft或Marlex mesh。","D":"✓ Split-rib graft 易呈扁平外觀，故常與LD flap合併施行。","E":"✓ 替代方案含mesh+rib graft、molded silicone prosthesis與cryopreserved costal cartilage，皆有描述。"},"cite":"待複查（NG Poland syndrome 治療 記憶佐證）","conflict":""},{"id":"2054","sub":"S01","src":"NG","years":[105],"stem":"The breast has a rich vascular blood supply from multiple arterial sources, including which vessels? (複選)","opts":{"A":"The internal mammary perforators","B":"The lateral thoracic artery perforators","C":"The anterolateral intercostal perforators","D":"The thoracoacromial artery perforators","E":"The vessels of serratus anterior"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"乳房的血供來自**多重動脈來源**：內乳穿通枝、外胸動脈穿通枝、前外側肋間穿通枝、胸肩峰動脈穿通枝、前鋸肌血管——本題問「包含哪些」，答案 ABCDE。⚠ 注意 NG-053 問「**三個主要**來源」，答案只有 ACE（內乳、外胸、前外側肋間）。同一解剖、兩種問法。","peropt":{"A":"是。內乳動脈穿通枝，供應約 60% 血流，為最主要來源。","B":"是。外胸動脈穿通枝，供應外上象限。","C":"是。前外側肋間穿通枝。","D":"是。胸肩峰動脈穿通枝（次要來源）。","E":"是。前鋸肌的血管亦有貢獻（次要來源）。"},"cite":"Neligan 3rd, Volume 5, Chapter 1, p.7","conflict":""},{"id":"2055","sub":"S01","src":"NG","years":[105,114,115],"stem":"The primary sensory innervation of the nipple areolar complex is provided by which nerve?","opts":{"A":"The cervical plexus","B":"The anterior branches of the 3th intercostal nerve","C":"The anterolateral branches of the 4th intercostal nerve","D":"The anteromedial branches of the 4th intercostal nerve","E":"The anterior branches of the 5th intercostal nerve"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**乳頭乳暈複合體的主要感覺神經＝第 4 肋間神經的前外側分支（anterolateral branch of T4）**。這是乳房手術最重要的單一神經事實：縮乳、隆乳、乳房固定術時外下象限的剝離都可能傷及它。此題於 105、114、115 年重複出現（見 NG-055）。","peropt":{"A":"否。頸神經叢（鎖骨上神經）支配的是乳房上部皮膚，非 NAC。","B":"否。第 3 肋間神經不是 NAC 的主要支配神經。","C":"正解。第 4 肋間神經的**前外側**分支提供 NAC 主要感覺。","D":"否。前內側分支貢獻較小，非主要來源。","E":"否。第 5 肋間神經非 NAC 的主要支配。"},"cite":"Neligan 3rd, Volume 5, Chapter 1, p.5","conflict":""},{"id":"2056","sub":"S03","src":"NG","years":[105],"stem":"Which of the following is not a surgical option for treating capsular contracture?","opts":{"A":"Open capsulotomy","B":"Capsulectomy","C":"Pocket site change","D":"Addtion or interposition of acellular dermal matrix (ADM)","E":"All of above are correct"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"莢膜攣縮的外科選項**全部都是**：open capsulotomy（切開釋放）、capsulectomy（莢膜切除）、pocket site change（改變平面，如 subglandular→submuscular 或建立 neo-subpectoral pocket）、加入 ADM 作為介面阻斷纖維化。答案為「以上皆正確」。","peropt":{"A":"是。開放式莢膜切開術，切開釋放攣縮的莢膜。","B":"是。莢膜切除術，移除整個纖維莢膜（可全或部分）。","C":"是。改變義乳所在平面，讓義乳接觸未受影響的新組織面。","D":"是。置入或介入 ADM，作為抗纖維化的生物介面。","E":"正解。以上皆為治療莢膜攣縮的外科選項。"},"cite":"Neligan 3rd, Volume 5, Chapter 3, p.47","conflict":""},{"id":"2057","sub":"S14","src":"NG","years":[105],"stem":"About endoscopic assisted reconstruction with latissimus dorsi (EARLi) flap for breast reconstruction, which of the following is incorrect?","opts":{"A":"The latissimus dorsi is a Mathes and Nahai type 4 muscle flap.","B":"The EARLi technique is best suitable for women requiring resection of 20-30% of their breast volume.","C":"It is optimal for defects in the upper outer quadrant, the site of occurrence for approximately 75% of breast cancer.","D":"The EARLi flap is performed after lesion excision and confirmation of final pathology reports.","E":"The procedure is best performed in the early postoperative period (1-3 weeks)."},"ans":"A","multi":false,"etype":"ai","expl":"","key":"EARLi（內視鏡輔助闊背肌重建）題的錯誤在第一句：latissimus dorsi 是 Mathes-Nahai **Type V**（一條優勢蒂 thoracodorsal artery ＋多條節段性次要蒂：posterior intercostal 與 lumbar arteries），不是 Type IV。Type V 的特性正是「單靠優勢蒂即可完整存活」，這是 LD 能被翻轉到胸壁的解剖基礎。","peropt":{"A":"正解（錯述）。LD 為 Mathes-Nahai **Type V**，不是 Type 4。Type IV 是節段性多蒂（如 sartorius、tibialis anterior），存活範圍受限。","B":"正確。EARLi 適用於需切除乳房體積 20–30% 的病人（部分乳房缺損重建）。","C":"正確。約 75% 乳癌發生於外上象限，該處缺損最適合以 LD 系統重建。","D":"正確。EARLi 於病灶切除並確認最終病理報告（切緣陰性）後施行，避免重建後才發現切緣陽性。","E":"正確。最佳時機為術後早期（1–3 週）。"},"cite":"Neligan 3rd, Volume 5, Chapter 5, p.88-89","conflict":""},{"id":"2058","sub":"S06","src":"NG","years":[105],"stem":"下列有關breast ptosis的描述，哪些是正確的? (複選)","opts":{"A":"Breast ptosis is defined by its anatomic relationship to the inframammary fold (IMF).","B":"According to Regnault classification, grade II breast ptosis exists when the nipple is 1-3 cm below the IMF but still above the lower pole of the breast.","C":"In glandular ptosis, the nipple rests above the IMF but the majority of breast tissue rests below the IMF.","D":"Pseudoptosis is most common after corrective procedures for glandular ptosis","E":"Tuberous breast deformity is related to parenchymal maldistribution."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"乳房下垂全部五項敘述皆正確。Regnault 分級以**乳頭與 IMF 的相對位置**定義：Grade I 乳頭在 IMF 高度；Grade II 乳頭低於 IMF 1–3 cm 但仍高於乳房最低點；Gra
