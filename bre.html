因子。", "E": "對。抽菸增加脂肪壞死與傷口併發症，屬相對禁忌。"}, "src": "NG", "sub": "S13"}, {"id": "NG-181", "stem": "關於Nipple areolar complex的敘述，以下何者為非?", "opts": {"A": "由keratinizing stratified cuboidal epithelium及乳房上方的皮膚所覆蓋", "B": "包含pigmented skin， 直徑大約4-5cm", "C": "血液供應來自parenchymal vessels 及 subdermal plexus", "D": "乳頭erection由平滑肌所控制", "E": "神經供應主要來自lateral cutaneous branch of the fourth intercostal nerve"}, "ans": "A", "multi": false, "years": ["110"], "cite": "Neligan, volume 5, page 7", "conflict": "", "etype": "ai", "expl": "", "key": "NAC 由**角化複層鱗狀上皮（keratinizing stratified squamous epithelium）**覆蓋，不是立方上皮（cuboidal）——立方細胞在乳腺腺體內。其餘：NAC 直徑約 4–5 cm、血供來自實質血管與真皮下血管叢、乳頭勃起由平滑肌控制、主要神經為第 4 肋間神經外側皮支。", "peropt": {"A": "正解（錯述）。NAC 由角化**複層鱗狀**上皮覆蓋，非 cuboidal epithelium。", "B": "正確。含色素皮膚，直徑約 4–5 cm。", "C": "正確。血供來自實質血管（parenchymal vessels）與真皮下血管叢（subdermal plexus）——這是乳頭保留手術的解剖基礎。", "D": "正確。乳頭勃起由平滑肌收縮控制。", "E": "正確。主要神經為第 4 肋間神經的外側皮支。"}, "src": "NG", "sub": "S01"}, {"id": "NG-168", "stem": "病人於義乳置放四年後，比起健側，觸摸感覺較不柔軟，且可以摸得到置入物，但是看不見明顯的位移，根據Baker clinical classification為第幾級?", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "C", "multi": false, "years": ["110", "112"], "cite": "Neligan, volume 5, page 47", "conflict": "字母陷阱:本題答案C=Baker Grade II;NG-154答案同為C卻是Grade III", "etype": "ai", "expl": "", "key": "「較不柔軟＋可觸及義乳＋看不見變形」＝ **Baker Grade II**。本題選項自 0 開始（A=0、B=I、C=II、D=III、E=IV），故答案 C 對應 **Grade II**；而 NG-154 的答案 C 對應 **Grade III**。同樣是 C，級數不同——請以「可觸及但不可見＝II；易觸及且可見或變形＝III」的敘述定位。", "peropt": {"A": "Grade 0 並非 Baker 分級的正式級別（原始分級自 I 起）。", "B": "Grade I：柔軟如自然乳房。", "C": "正解。Grade II：略硬、義乳可觸及但看不見、無明顯變形。", "D": "Grade III：明顯變硬、義乳易觸及且可能可見或變形。", "E": "Grade IV：堅硬、疼痛、壓痛、明顯變形。"}, "src": "NG", "sub": "S03"}, {"id": "NG-108", "stem": "下列何種方式，在減少義乳產生的莢膜攣縮併發症上，沒有角色?", "opts": {"A": "Subfascial plane", "B": "Nipple shield", "C": "Pocket irrigation with triple antibiotics", "D": "Inframammary incision", "E": "Insertion sleeve"}, "ans": "A", "multi": false, "years": ["110", "112"], "cite": "Neligan, volume 5, page 67", "conflict": "", "etype": "ai", "expl": "", "key": "「14-point plan」中被證實可降低莢膜攣縮的措施包括：**乳頭遮罩（nipple shield）**隔離乳管細菌、**三重抗生素沖洗囊袋**、**乳下緣切口**（避開乳管，較乳暈切口低攣縮率）、**置入套管（insertion sleeve）**避免義乳接觸皮膚。**Subfascial plane 尚無證據可降低莢膜攣縮**，故它「沒有角色」。", "peropt": {"A": "正解（沒有角色）。筋膜下平面對降低莢膜攣縮並無實證支持。", "B": "有角色。乳頭遮罩阻絕乳管內細菌污染囊袋。", "C": "有角色。三重抗生素沖洗降低生物膜形成。", "D": "有角色。乳下緣切口不穿越乳管，攣縮率低於乳暈切口。", "E": "有角色。置入套管使義乳不接觸皮膚，減少細菌帶入。"}, "src": "NG", "sub": "S03"}, {"id": "NG-193", "stem": "關於tuberous breast的敘述，以下何者錯誤?", "opts": {"A": "臨床特徵為constricted lower poles, wide intermammary distance, conical breast shapes", "B": "Cohesive textured implants為首選", "C": "常需要做aggressive upper pole scoring", "D": "Inframammary fold 需要重新被定位", "E": "Circumareolar mastopexy可以減少double-bubble現象"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan, volume 5, page 101-103", "conflict": "", "etype": "ai", "expl": "", "key": "Tuberous breast 手術的關鍵動作是在**下極（lower pole）**做放射狀 scoring 以釋放受限的實質與基底，而非在 upper pole 做 aggressive scoring。其餘要點：IMF 必須重新定位、環乳暈固定術可減少 double-bubble、內聚性紋理義乳為首選。", "peropt": {"A": "正確。臨床三聯：下極受限、兩乳間距寬、圓錐狀乳房外形。", "B": "正確。Cohesive textured implant 為首選（可對抗下極受限、維持形狀）。", "C": "正解（錯述）。scoring 應施於**下極**實質以釋放基底受限，並非 upper pole 的 aggressive scoring。", "D": "正確。過高的 IMF 必須被破壞並重新定位。", "E": "正確。環乳暈乳房固定術可處理疝出的實質與過大的 NAC，減少 double-bubble。"}, "src": "NG", "sub": "S09"}, {"id": "NG-164", "stem": "治療男性女乳症，Ultrasound-assisted liposuction (UAL) 比起Suction-assisted lipectomy (SAL)的優勢，以下何者為非?", "opts": {"A": "減少術後瘀青", "B": "術後胸部輪廓較平順", "C": "術後皮膚收縮力較佳", "D": "減少surgeon手術疲勞度", "E": "減少手術時間"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan, volume 5, page 179", "conflict": "", "etype": "ai", "expl": "", "key": "UAL（超音波輔助抽脂）相對 SAL 的優勢：瘀青少、輪廓平順、皮膚收縮較佳、術者疲勞度降低（超音波先乳化脂肪）。**但 UAL 的手術時間反而較長**（需額外的乳化階段），故「減少手術時間」為非。這與 NG-165／NG-166 的缺點清單（含「增加手術時間」）互相印證。", "peropt": {"A": "是優勢。術後瘀青較少。", "B": "是優勢。術後胸部輪廓較平順。", "C": "是優勢。皮膚收縮力較佳（超音波熱效應）。", "D": "是優勢。脂肪先被乳化，術者體力負擔減少。", "E": "正解（非優勢）。UAL 需額外乳化階段，**手術時間反而增加**。"}, "src": "NG", "sub": "S08"}, {"id": "NG-167", "stem": "男性女乳的成因，以下何者為非?", "opts": {"A": "Cushing's syndrome", "B": "Adrenal adenoma", "C": "Cimetidine", "D": "Starvation", "E": "Nontuberculous Mycobacteria (NTM) infection"}, "ans": "E", "multi": false, "years": ["110"], "cite": "Neligan, volume 5, page 175", "conflict": "", "etype": "ai", "expl": "", "key": "男性女乳症的成因涵蓋**內分泌（Cushing's syndrome、腎上腺腺瘤）、藥物（cimetidine 等 H2 阻斷劑）、營養狀態（飢餓後再進食 refeeding gynecomastia）**。**非結核分枝桿菌（NTM）感染不是成因**——感染造成的是乳房膿瘍或腫塊，機轉與雌激素／雄性素失衡無關。", "peropt": {"A": "是成因。Cushing's syndrome 造成賀爾蒙失衡。", "B": "是成因。腎上腺腺瘤可分泌雌激素前驅物。", "C": "是成因。Cimetidine 具抗雄性素作用。", "D": "是成因。飢餓（及其後的再進食）造成賀爾蒙軸波動。", "E": "正解（非成因）。NTM 感染造成的是乳房感染性病灶，與男性女乳症的內分泌機轉無關。"}, "src": "NG", "sub": "S08"}, {"id": "NG-107", "stem": "一位52歲女性，於1年半以前接受雙側胸大肌下絨毛面果凍矽膠義乳置放術，最近感到右側乳房腫痛，且觸摸到同側腋下腫塊，超音波下發現右側義乳積液，且同側腋下淋巴腫瘤，經細針抽吸，免疫組織化學染色及癌症分期影像檢查，證實為advanced stage breast implant-associated anaplastic large cell lymphoma (BIA-ALCL)，以下敘述，何者為誤?", "opts": {"A": "建議接受全莢膜及義乳移除手術", "B": "若有需要，需會診放射腫瘤科及血液腫瘤科，進行治療計畫的評估", "C": "細針抽吸腫大的腋下淋巴結，偽陽性結果高", "D": "手術移除全莢膜及絨毛面義乳之後，可即時置入光滑面義乳", "E": "免疫組織化學染色會有CD30的表現"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan, volume 5, page 199-201", "conflict": "", "etype": "ai", "expl": "", "key": "BIA-ALCL 的處理原則：**完整移除義乳＋全莢膜切除（total capsulectomy）**，必要時會診放腫與血腫科；免疫組織化學染色 CD30 陽性。錯在 C——腫大淋巴結的細針抽吸**偽陰性率較高**（腫瘤細胞分佈不均、易抽到反應性淋巴球），並非偽陽性率高。", "peropt": {"A": "正確。標準治療為義乳與全莢膜的完整移除。", "B": "正確。進展期需會診放射腫瘤科與血液腫瘤科共同擬定治療計畫。", "C": "正解（錯述）。細針抽吸腫大淋巴結的**偽陰性**率較高，並非偽陽性率高。", "D": "依本年答案鍵視為正確敘述（移除紋理面義乳與全莢膜後可置入光滑面義乳）；惟進展期病例是否立即重建，臨床上仍應個別評估。", "E": "正確。免疫組織化學染色呈 CD30 陽性，是 BIA-ALCL 的診斷標記。"}, "src": "NG", "sub": "S05"}, {"id": "NG-176", "stem": "關於Breast implant-associated anaplastic large cell lymphoma (BIA-ALCL) 的敘述，何者錯誤? (複選)", "opts": {"A": "腫瘤病理樣本分析，包含義乳周圍的積液", "B": "是一種non-Hodgkin's lymphoma (NHL)", "C": "半成病人合併有lymphadenopathy", "D": "免疫組織化學染色會有CD20的表現", "E": "ALK基因在chromosome 2q23上的染色體易位"}, "ans": "CD", "multi": true, "years": ["110"], "cite": "Neligan, volume 5, page 196-197", "conflict": "ALK基因實際位於chromosome 2p23(題目E寫2q23),但該選項未被列為錯誤;CD30(+)非CD20", "etype": "ai", "expl": "", "key": "BIA-ALCL 的免疫表型是 **CD30 陽性、ALK 陰性的 T 細胞（non-Hodgkin）淋巴瘤**。錯述為 C（並非半數病人合併淋巴結腫大，實際比例低得多）與 D（表現 **CD30** 而非 CD20；CD20 是 B 細胞標記）。註：ALK 基因實際位於 **2p23**，本題 E 寫 2q23 但未被列為錯誤選項。", "peropt": {"A": "正確。病理檢體分析須包含義乳周圍的積液（做細胞學與 CD30 染色）。", "B": "正確。BIA-ALCL 屬非何杰金氏淋巴瘤（NHL）。", "C": "錯。合併淋巴結腫大的比例遠低於半數。", "D": "錯。免疫染色為 **CD30 陽性**；CD20 是 B 細胞標記，與 T 細胞來源的 BIA-ALCL 不符。", "E": "依本年答案鍵視為正確。惟 ALK 基因實際位於 chromosome **2p23**（題目寫 2q23），記憶時以 2p23 為準。"}, "src": "NG", "sub": "S05"}, {"id": "NG-040", "stem": "Immediate breast reconstruction (IBR) 比起 delayed reconstruction，有何益處? (複選)", "opts": {"A": "避免病人接受乳房切除後可能產生的精神及情緒後遺症", "B": "較美觀", "C": "減少住院費用", "D": "減少局部復發的可能性", "E": "提高病人存活率"}, "ans": "ABC", "multi": true, "years": ["110"], "cite": "Neligan, volume 5, page 209", "conflict": "", "etype": "ai", "expl": "", "key": "即時重建（IBR）相對延遲重建的益處是**心理／美觀／經濟**三面向：避免乳房切除後的精神情緒後遺症、美觀較佳（保留皮膚囊袋與 IMF）、減少住院與整體費用。**但 IBR 不會降低局部復發率，也不會提高存活率**——腫瘤預後由腫瘤生物學決定，與重建無關，這是最常見的陷阱。", "peropt": {"A": "是。避免病人經歷失去乳房的精神與情緒衝擊。", "B": "是。保留皮膚囊袋與 IMF，美觀效果較佳。", "C": "是。合併手術減少住院次數與整體費用。", "D": "否。重建不影響局部復發率。", "E": "否。重建不影響病人存活率。"}, "src": "NG", "sub": "S12"}, {"id": "NG-178", "stem": "關於Contralateral prophylactic mastectomy的敘述何者正確? (複選)", "opts": {"A": "年輕且有多位一等親家族史病人，建議接受Contralateral prophylactic mastectomy", "B": "超音波乳房檢查的普及，提高乳癌2-3成診斷率，是其中一個手術適應症", "C": "社經地位較高的病人意願也較高", "D": "白人女性居多", "E": "在預防性切除的乳房進行義乳重建，整體而言，會有增加併發症的風險"}, "ans": "ACDE", "multi": true, "years": ["110"], "cite": "Neligan, volume 5, page 217-218", "conflict": "", "etype": "ai", "expl": "", "key": "對側預防性乳房切除（CPM）的正確敘述：年輕且有多位一等親家族史者建議施行；社經地位較高者意願較高；白人女性居多；**在預防性切除的乳房上做義乳重建，整體而言會增加併發症風險**（雙側手術）。錯的是 B——超音波普及提高診斷率並不構成 CPM 的手術適應症。", "peropt": {"A": "對。年輕、多位一等親家族史者，對側原發癌風險高。", "B": "錯。影像診斷率提升不是 CPM 的手術適應症；適應症取決於基因與家族史風險。", "C": "對。社經地位較高的病人接受 CPM 的意願較高。", "D": "對。接受 CPM 者以白人女性為多。", "E": "對。在預防性切除側行義乳重建，整體併發症風險增加。"}, "src": "NG", "sub": "S10"}, {"id": "NG-057", "stem": "What is the contraindication(s) in nipple-sparing mastectomy?", "opts": {"A": "Inflammatory breast cancer", "B": "Tumor location > 2cm from the nipple", "C": "Negative axillary nodes", "D": "HER2/neu negative", "E": "Tumor grade 1 to 2"}, "ans": "A", "multi": false, "years": ["110", "111", "112", "113", "114", "115"], "cite": "Neligan, Volume 5 Chapter 14 Page 220", "conflict": "", "etype": "orig", "expl": "Contraindications include patients with more aggressive breast cancers such as inflammatory type or high histologic grade, involvement of the NAC, bloody nipple discharge, multifocal/multicentric disease, and tumor size >5 cm.", "key": "", "peropt": {}, "src": "NG", "sub": "S10"}, {"id": "NG-076B", "stem": "Which is not the advantage of direct-to-implant breast reconstruction?", "opts": {"A": "Fewer procedures", "B": "Less risk of skin or nipple compromise", "C": "No expansion period", "D": "Fewer recoveries", "E": "More rapid return to life"}, "ans": "B", "multi": false, "years": ["110"], "cite": "Neligan, Volume 5 Chapter 16 Page 249", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-076 同題（110 年版，E 改為「更快回到日常生活」）：DTI 的優點是手術次數少、免除擴張期、恢復次數少、更快回歸生活；**它的缺點正是皮膚／乳頭壞死風險較高**——乳房切除皮瓣立即承受全額義乳體積的張力。", "peropt": {"A": "是優點。手術次數較少。", "B": "正解（非優點）。DTI 讓乳房切除皮瓣立即承受全額體積張力，**皮膚或乳頭壞死風險反而較高**。", "C": "是優點。免除數週至數月的擴張期。", "D": "是優點。只需一次恢復期。", "E": "是優點。可更快回到日常生活。"}, "src": "NG", "sub": "S12"}, {"id": "NG-092", "stem": "Which of the following statements about pedicled TRAM flap is incorrect?", "opts": {"A": "The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the most commonly used autologous methods of breast reconstruction todays", "B": "Patients who have had prior implant-based reconstruction are not suitable for pedicle TRAM flap reconstruction.", "C": "The rectus abdominis muscle is a Mathes and Nahai type III muscle and the pedicled TRAM flap relies on the superior epigastric vessels and its terminal branches", "D": "Patient with surgical history of open cholecystectomy is not the contraindication to ipsilateral pedicle TRAM flap reconstruction.", "E": "The pedicled TRAM is contraindicated in patients with extensively scarred abdomen and in patients with chronic back pain."}, "ans": "D", "multi": false, "years": ["110"], "cite": "Neligan, Volume 5 Chapter 18 Page 281-285", "conflict": "", "etype": "ai", "expl": "", "key": "Pedicled TRAM 依賴 superior epigastric vessels。右上腹橫切口（open cholecystectomy，Kocher incision）會切斷同側上腹壁血管，因此是「同側 pedicled TRAM 的禁忌」。題目 D 說「不是禁忌」，故為錯述。", "peropt": {"A": "正確。Hartrampf 於 1980 年代提出 pedicled TRAM，至今仍是常用自體重建術式之一。", "B": "依本年答案鍵視為正確敘述（曾接受義乳重建者因胸壁疤痕與軟組織條件不佳，一般不列為 pedicled TRAM 的理想人選）。", "C": "正確。rectus 為 Type III 肌肉；pedicled TRAM 靠 superior epigastric vessels 及其終末分支灌流。", "D": "正解（錯述）。open cholecystectomy 的右肋下切口已離斷同側上腹壁血管，是同側 pedicled TRAM 的禁忌，不能說「不是禁忌」。", "E": "正確。腹部廣泛疤痕與慢性背痛者不適合 pedicled TRAM（後者因腹直肌犧牲會加重核心肌群無力）。"}, "src": "NG", "sub": "S13"}, {"id": "NG-089", "stem": "Which of the following statements about free TRAM flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is a Mathes and Nahai type III muscle", "B": "Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap", "C": "Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein", "D": "An abdominal bulge is most often due to attenuation of the anterior rectus sheath", "E": "None of above"}, "ans": "A", "multi": false, "years": ["110"], "cite": "Neligan, Volume 5 Chapter.20.4 Page 351, 358", "conflict": "Free TRAM「MS-0=DIEP」為錯述:選項重排家族,答案字母跨年浮動(NG110=A,NG111=B,NG113=D)。記概念:DIEP保留全肌,MS-0取全寬肌肉;勿背字母", "etype": "ai", "expl": "", "key": "本題核心是 MS 分級：MS-0 = 整條腹直肌全寬橫斷取下；MS-3 = 完整保留肌肉 = DIEP。所以「Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap」是錯述（應為 MS-3）。⚠ 本年（110）答案鍵為 A，但 A 敘述（rectus 為 Mathes-Nahai Type III）是正確的；同一題幹在 109/111 年鍵 B、112–114 年鍵 D，皆指向該 MS-0 錯述選項。以答案鍵為準作答，但務必記住概念而非字母。", "peropt": {"A": "本年鍵為 A。惟依 Mathes-Nahai 分類，rectus abdominis 確為 Type III（雙主蒂：上、下腹壁動脈），此敘述本身正確——此處與他年答案鍵不一致，屬考古題答案分歧。", "B": "此敘述為錯述：完整保留腹直肌應為 MS-3（即 DIEP），MS-0 是全寬肌肉橫斷。他年（109/111）此題正解即為 B。", "C": "正確。free TRAM 常用受區血管為 internal mammary 與 thoracodorsal 血管。", "D": "正確。術後腹壁膨出最常見原因是 anterior rectus sheath 變薄鬆弛，而非真正疝氣。", "E": "本題有錯述選項存在，故非 None of above。"}, "src": "NG", "sub": "S13"}, {"id": "NG-085", "stem": "Which of the following statements about Latissimus dorsi flap is incorrect?", "opts": {"A": "The latissimus myocutaneous (LD) flap is a Mathes and Nahai type V flap", "B": "The blood supply of this flap comes from thoracodorsal artery, posterior intercostal and lumbar arteries", "C": "LD flap reconstruction is indicated for patients with known need for postoperative radiotherapy along with the need for a prosthetic device.", "D": "Latissimus dorsi is an important adductor of the arm and internal rotator of the shoulder. Harvest of this flap can lead to shoulder weakness, stiffness, and loss of mobility.", "E": "Combination of free LD muscular flap transfer and skin graft would provide a flexible, contoured, well-vascularized coverage for reconstruction of lower extremity."}, "ans": "C", "multi": false, "years": ["110"], "cite": "Neligan, Volume 5 Chapter 19 Page 301,306", "conflict": "", "etype": "ai", "expl": "", "key": "LD 皮瓣的核心事實：Mathes-Nahai **Type V**；主蒂為 thoracodorsal artery，次要節段蒂為 posterior intercostal 與 lumbar arteries。關鍵臨床判斷：**已知術後需放射治療、又同時需要義乳者，不適合 LD＋義乳重建**——放療會大幅升高莢膜攣縮率，LD 的肌肉覆蓋並不能抵銷，此時應改為純自體組織重建。", "peropt": {"A": "正確。LD 為 Mathes-Nahai Type V 肌皮瓣。", "B": "正確。血供來自胸背動脈（優勢蒂）與後肋間、腰動脈（節段性次要蒂）。", "C": "正解（錯述）。已知術後需放療且需植入義乳者，並非 LD 重建的適應症，而是應避免的組合（放療＋義乳的莢膜攣縮與失敗率顯著上升）。", "D": "正確。LD 是重要的肩內收與內旋肌，取瓣可造成肩部無力、僵硬與活動度下降。", "E": "正確。游離 LD 肌瓣加植皮可為下肢提供柔軟、貼合輪廓且血流良好的覆蓋。"}, "src": "NG", "sub": "S14"}, {"id": "NG-061", "stem": "What is the specific indication in autologous fat grafting in breast reconstruction?", "opts": {"A": "Depression from fat necrosis", "B": "Radiation deformity in flap reconstruction", "C": "Sharp implant border", "D": "Implant rippling", "E": "All of above"}, "ans": "E", "multi": false, "years": ["110", "111"], "cite": "Neligan, Volume 5 Chapter 24 Page 460", "conflict": "", "etype": "orig", "expl": "Autologous fat grafting can be useful both in prepectoral and retropectoral breast reconstruction. It has been helpful to correct the step-off deformity at the upper pole and to correct contour deformity by reducing wrinkling and rippling. Those deformities can be classified in step-off, intrinsic and extrinsic, as done by Kanchwala.In addition to improving the aesthetic results, autologous fat grafting (AFG) has also been used to treat post-astectomy pain syndrome and capsular contracture. Several articles have reviewed the indications for AFG n settings of previous radiotherapy, both in two-stage reast reconstruction as a preconditioning method, with different protocols, to reduce the grade of capsular contracture and to treat complications. Lipofilling is able to act on the main collateral effects of radiotherapy, such as fibrosis due to fibroblast injury, decreased microcirculation in the targeted areas. The principle factors responsible for this are stem cells, cytokines and growth factors hat are all constituents of AFG", "key": "", "peropt": {}, "src": "NG", "sub": "S16"}, {"id": "NG-062", "stem": "What is the stage of Lymphostatic elephantiasis by International Society of Lymphology(ISL) staging system?", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "D", "multi": false, "years": ["110", "112"], "cite": "Neligan, Volume 5 Chapter 26 Page 491", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-045 同題（110、112 年）：**lymphostatic elephantiasis ＝ ISL Stage III**，也是 ISL 分期的最高級（無 Stage IV）。特徵為非凹陷性水腫、皮膚增厚、疣狀增生與反覆蜂窩組織炎。", "peropt": {"A": "Stage 0：潛伏期。", "B": "Stage I：凹陷性、可逆。", "C": "Stage II：抬高不完全消退、纖維化開始。", "D": "正解。Stage III：象皮病。", "E": "ISL 無 Stage IV。"}, "src": "NG", "sub": "S17"}, {"id": "NG-101B", "stem": "Which pedicled perforator flaps are suitable for reconstruction of medial quadrant defect after partial mastectomy? (複選)", "opts": {"A": "Anterior intercostal artery perforator (AICAP) flap", "B": "Latissimus dorsi (LD) flap", "C": "Thoracodorsal artery perforator (TDAP) flap", "D": "Superior epigastric artery perforator (SEAP) flap", "E": "All of above"}, "ans": "AD", "multi": true, "years": ["110"], "cite": "Neligan, Volume 5 Chapter 23, page 452", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-102 為同一題（110 年版，選項順序與 NG-101 相同）：**內側象限缺損 → AICAP（A）＋ SEAP（D）**。LD 與 TDAP 來自背側／外側，方向不符。此考點的三種字母組合為 AD／BD／DE，請記「內側／下方缺損＝AICAP＋SEAP」。", "peropt": {"A": "適合。AICAP 源自前肋間動脈穿通枝，位於前胸下內側。", "B": "不適合。LD 自背側轉入，用於外側象限。", "C": "不適合。TDAP 源自外側背部的胸背動脈穿通枝。", "D": "適合。SEAP 源自上腹壁動脈穿通枝，自下內側上提。", "E": "並非全部皆適合，不選。"}, "src": "NG", "sub": "S14"}, {"id": "NG-035", "stem": "Comparing free TRAM flap with DIEP flap, which statement(s) is true? (複選)", "opts": {"A": "If breast volume requirement is above 800 c.c, DIEP flap is a better choice", "B": "If breast volume requirement is above 800 c.c, free TRAM flap is a better choice", "C": "If no perforator >1.5mm available, DIEP flap is a better choice", "D": "If no perforator >1.5mm available, free TRAM flap is a better choice", "E": "patient with severe abdominal fat is better candidate for SIEA reconstruction"}, "ans": "BD", "multi": true, "years": ["110", "115"], "cite": "Neligan, Volume 5 Chapter 20 Page 350, 356", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-034 同一組概念（>800 c.c. 及無 >1.5 mm 穿通枝時皆選 free TRAM），差別只在 E 選項換成 SIEA。SIEA 皮瓣灌流範圍最侷限、只適合薄且體積需求小者，腹部脂肪厚重的病人反而是 SIEA 的不良人選。", "peropt": {"A": "錯。大體積需求應選 free TRAM 而非 DIEP。", "B": "對。>800 c.c. 選 free TRAM。", "C": "錯。無 >1.5 mm 穿通枝時不可選 DIEP。", "D": "對。無足夠穿通枝時改 free TRAM。", "E": "錯。SIEA 位於 Scarpa 筋膜淺層、灌流不越中線且範圍小，severe abdominal fat 的病人並非好人選；SIEA 適合薄型腹部、體積需求小者。"}, "src": "NG", "sub": "S13"}, {"id": "NG-087", "stem": "Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)", "opts": {"A": "The deep inferior epigastric artery arises from the femoral artery", "B": "The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap", "C": "The dissection of a DIEAP flap has a steep learning curve", "D": "Abdominal scarring is probably the most important risk factor for raising a DIEAP flap", "E": "Smoking is considered a relative contraindication to raising a DIEAP flap"}, "ans": "BCDE", "multi": true, "years": ["110"], "cite": "Neligan, Volume 5 Chapter 20 Page 324, 327, 340", "conflict": "", "etype": "ai", "expl": "", "key": "DIEAP（DIEP）皮瓣四個常考事實：① DIEA 源自 external iliac artery（非 femoral）；② 皮島最大回流靜脈是 SIEV（表淺系統），故 SIEV 常需備用做 supercharge；③ 學習曲線陡；④ 腹部疤痕是取瓣最重要的風險因子；⑤ 抽菸為相對禁忌。", "peropt": {"A": "錯。Deep inferior epigastric artery 起源於 external iliac artery，不是 femoral artery。", "B": "對。皮島的主要引流靜脈是 superficial inferior epigastric vein，管徑最大；靜脈鬱血時可將 SIEV 額外吻合。", "C": "對。穿通枝肌內剝離技術要求高，學習曲線陡峭。", "D": "對。既往腹部手術疤痕（尤其橫切、下腹正中）可能已破壞穿通枝，是最重要的風險因子。", "E": "對。抽菸增加脂肪壞死與傷口併發症，屬相對禁忌。"}, "src": "NG", "sub": "S13"}, {"id": "NG-196", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)以下何者正確？", "opts": {"A": "如果腫瘤侵犯到莢膜外 (extracapsular disease extension)，則存活率會顯著的下降", "B": "有沒有塊狀的腫瘤與病人的存活率有顯著差異", "C": "晚發的血清腫(seroma) 除了用超音波檢查，須將液體抽出做病理檢查排除BIA-ALCL 的可能性", "D": "大約 70%的病人以血清腫 (seroma or malignant effusion) 表現，30%的病人以腫塊表現", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["111"], "cite": "Neligan, 4th Edision, Volume 4, Chapter 12, page 200-205", "conflict": "跨年答案鍵分歧:同題幹NG-195(109年)僅認D,本題(111年)認E「以上皆是」", "etype": "ai", "expl": "", "key": "與 NG-195 同題，111 年答案為 **E「以上皆是」**：莢膜外侵犯使存活率顯著下降、有無腫塊與存活率顯著相關、遲發血清腫須抽液送病理、約 70% 以血清腫表現而 30% 以腫塊表現——四項皆正確。⚠ 109 年同題只認 D，屬跨年答案鍵分歧，請記概念不記字母。", "peropt": {"A": "正確。腫瘤侵犯至莢膜外（extracapsular extension）存活率顯著下降。", "B": "正確。是否呈現腫塊（mass）與存活率有顯著差異，腫塊型預後較差。", "C": "正確。遲發性血清腫除超音波外，必須抽液做細胞學與 CD30 免疫染色。", "D": "正確。約 70% 以血清腫／惡性積液表現，30% 以腫塊表現。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S05"}, {"id": "NG-166B", "stem": "男性女乳症治療中使用超音波做脂肪移除(ultrasound-assisted liposuction)的缺點可能包含下列哪些？", "opts": {"A": "熱燒傷(thermal injury)", "B": "皮膚壞死(skin necrosis)", "C": "周邊神經去髓鞘化(demyelination of peripheral nerves)", "D": "昂貴的器材及增加手術時間", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["111"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 11, page 179", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-166 同題（111 年版，題幹去掉「複選」標示但選項相同）：UAL 的缺點「以上皆是」——熱燒傷、皮膚壞死、周邊神經去髓鞘化、器材昂貴且**手術時間增加**。前三項皆源自超音波的熱效應。對照 NG-164：「減少手術時間」不是 UAL 的優勢。", "peropt": {"A": "是。超音波熱效應造成熱燒傷。", "B": "是。熱傷害導致皮膚壞死。", "C": "是。周邊神經去髓鞘化，造成感覺異常。", "D": "是。器材昂貴且手術時間增加。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S08"}, {"id": "NG-174", "stem": "關於 free tissue transfer 的乳房重建，以下何者錯誤？", "opts": {"A": "最常使用的 recipient vessel 為第五根肋骨下的內乳動脈(internal mammary vessels)", "B": "Thoracodorsal vessels 及 axillary vessels 亦可作為 recipient vessels", "C": "使用 Thoracodorsal vessels 作為 recipient vessels 較為困難，但比較細(<2mm)", "D": "使用 axillary vessels 作為 recipient vessels 時會限制皮瓣的移動以及塑形", "E": "使用 Thoracodorsal vessels 作為 recipient vessels 容易造成皮瓣側移"}, "ans": "A", "multi": false, "years": ["111"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 1, page 13", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-173、NG-189 完全相同：錯述是「第五根肋骨下的內乳血管」。正確為**第 3 肋軟骨處**。IMV 在第 4 肋以下常分岔為兩條細支，口徑不足。三年重考同一句，屬必背。", "peropt": {"A": "正解（錯述）。最常用受區為第 3 肋處的內乳血管，非第五根肋骨下。", "B": "正確。胸背與腋窩血管亦可作受區。", "C": "正確（依答案鍵）。胸背血管較難顯露且口徑較細（<2 mm）。", "D": "正確。腋窩血管作受區會限制皮瓣移動與塑形。", "E": "正確。胸背血管作受區時皮瓣易側移。"}, "src": "NG", "sub": "S15"}, {"id": "NG-171", "stem": "進行隆乳手術時要注意以下事項，何者正確？(複選)", "opts": {"A": "理想的上胸(upper pole)與下胸(lower pole)的比例為 55%：45%", "B": "若選擇義乳隆乳,當上胸的皮膚與軟組織捏起來(pinch)不到 4 公分的時候，建議把義乳置放於乳腺下(subglandular position)", "C": "目前比較常見的手術切口有下乳腺(inframammary incision)、乳暈旁(periareolar incision)、腋下(axillary incision)與肚臍(transumbilical incision)", "D": "當義乳置放於筋膜下(subfascial plane)時，建議使用紋理植入物(textured implant)", "E": "Mondor's disease 是一種表淺的血栓性靜脈炎(thrombophlebitis)，通常為自限性(limited)，通常不需要手術治療"}, "ans": "CDE", "multi": true, "years": ["111", "112"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 2, page 18, 33, 47", "conflict": "", "etype": "ai", "expl": "", "key": "同 NG-169／NG-170（111、112 年），正解 CDE。此題組跨四年出現，把「45:55」與「薄 ⇒ 肌肉下」兩個方向記牢即可全對。", "peropt": {"A": "錯。上極 45%、下極 55%。", "B": "錯。軟組織薄應置於肌肉下。", "C": "對。四種常見切口。", "D": "對。筋膜下平面建議紋理義乳。", "E": "對。Mondor's disease 為自限性淺層血栓性靜脈炎。"}, "src": "NG", "sub": "S02"}, {"id": "NG-219", "stem": "關於隆乳相關的莢膜攣縮(capsular contracture)，以下何者為可能造成的原因？(複選)", "opts": {"A": "血腫(hematoma)", "B": "血清腫(seroma)", "C": "矽膠滲漏(silicon gel bleed)", "D": "灰塵", "E": "感染"}, "ans": "ABCDE", "multi": true, "years": ["111", "112"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 3, page 47", "conflict": "", "etype": "ai", "expl": "", "key": "同 NG-217／NG-218（111、112 年再度出現）：五項皆為莢膜攣縮的可能成因。跨四個年份重複，顯示這是命題委員偏愛的送分題，務必零失誤。", "peropt": {"A": "是。血腫。", "B": "是。血清腫。", "C": "是。矽膠滲漏。", "D": "是。灰塵等異物。", "E": "是。感染。"}, "src": "NG", "sub": "S03"}, {"id": "NG-208B", "stem": "關於前鋸肌(serratus anterior muscle)的描述，以下何者正確？(複選)", "opts": {"A": "此肌肉走在胸廓前外側第一至第八根肋骨處", "B": "主要血液供應於來自於側胸動脈 (lateral thoracic artery) 及胸背動脈 (thoracodoral artery)", "C": "此肌肉負責旋轉肩胛骨及抬起肩膀", "D": "此肌肉由長胸神經(long thoracic nerve)連結", "E": "隆乳手術時在胸大肌下 blunt dissection 也會舉起一部分的前鋸肌"}, "ans": "ABCDE", "multi": true, "years": ["111"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 1, page 11", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-208／NG-209 同題（111 年版，僅贅字差異）：前鋸肌五項全對——第 **1–8 肋**、**側胸動脈＋胸背動脈**供血、旋轉肩胛骨與抬肩、**長胸神經**支配、隆乳時胸大肌下鈍性剝離會一併掀起部分前鋸肌。記住「長胸神經＝前鋸肌＝翼狀肩胛」。", "peropt": {"A": "對。走行於胸廓前外側第 1–8 肋。", "B": "對。主要血供為側胸動脈與胸背動脈。", "C": "對。負責肩胛骨旋轉與抬肩（前突）。", "D": "對。由長胸神經支配（題目寫「連結」，意指神經支配）。", "E": "對。胸大肌下鈍性剝離時常一併掀起部分前鋸肌。"}, "src": "NG", "sub": "S02"}, {"id": "NG-090", "stem": "Which of the following statements about free TRAM flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is a Mathes and Nahai type III muscle", "B": "Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap", "C": "Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein", "D": "An abdominal bulge is most often due to attenuation of the anterior rectus sheath", "E": "None of above"}, "ans": "B", "multi": false, "years": ["111"], "cite": "Neligan, Volume 5 Chapter.20.4 Page 351, 358", "conflict": "Free TRAM「MS-0=DIEP」為錯述:選項重排家族,答案字母跨年浮動(NG111=B,NG113=D,NG110曾=A)。記概念:DIEP保留全肌,MS-0取全寬肌肉;勿背字母", "etype": "ai", "expl": "", "key": "MS 分級：MS-0 全寬腹直肌橫斷、MS-1 保留外側、MS-2 保留內外側（取中段）、MS-3 完整保留＝DIEP。故「完整保留腹直肌＝MS-0(DIEP)」為錯述。本年（111）答案鍵 B，與 109 年一致。", "peropt": {"A": "正確。rectus abdominis 為 Mathes-Nahai Type III（上、下腹壁動脈兩條主蒂）。", "B": "正解（錯述）。完整保留肌肉是 MS-3＝DIEP；MS-0 反而是全寬肌肉被橫斷取走。", "C": "正確。free TRAM 受區血管為內乳血管與胸背血管。", "D": "正確。腹壁膨出多因前鞘鬆弛（attenuation），非筋膜裂開。", "E": "存在錯述選項，故不選 None of above。"}, "src": "NG", "sub": "S13"}, {"id": "NG-036B", "stem": "Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?", "opts": {"A": "1-3 months", "B": "4-5 months", "C": "6-9 months", "D": "More than one year", "E": "None of above"}, "ans": "C", "multi": false, "years": ["111"], "cite": "Neligan, Volume 5 Ch 25 Page 487", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-036 同題（111 年版，E 選項由「以上皆非」改為 None of above）：**需輔助放療者，游離皮瓣重建應於放療結束後 6–9 個月施行**。太早組織仍在急性放射性發炎期，太晚則纖維化定型。", "peropt": {"A": "太早。1–3 個月仍在放射性急性發炎期。", "B": "太早。4–5 個月組織尚未恢復。", "C": "正解。放療結束後 **6–9 個月**。", "D": "過晚。超過一年纖維化已定型，剝離困難。", "E": "有正確答案，不選 None of above。"}, "src": "NG", "sub": "S15"}, {"id": "NG-174B", "stem": "關於 free tissue transfer 的乳房重建，以下何者錯誤？", "opts": {"A": "最常使用的 recipient vessel 為第五根肋骨下的內乳動脈(internal mammary vessels)", "B": "Thoracodorsal vessels 及 axillary vessels 亦可作為 recipient vessels", "C": "使用 Thoracodorsal vessels 作為 recipient vessels 較為困難，因為血管比較細(<2mm)", "D": "使用 axillary vessels 作為 recipient vessels 時會限制皮瓣的移動以及塑形", "E": "使用 Thoracodorsal vessels 作為 recipient vessels 容易造成皮瓣側移"}, "ans": "A", "multi": false, "years": ["112"], "cite": "Neligan 4th, Volume 5, Chapter 1, p13", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-173／NG-174／NG-189 同題（112 年版，C 選項措辭略異）：錯述是「**第五根肋骨下**的內乳血管」——最常用受區為 **第 3 肋（軟骨）處**的內乳血管。此題跨 109、111、112、113 四年，答案固定為 A。", "peropt": {"A": "正解（錯述）。最常用受區為**第 3 肋**處的內乳血管，非第五根肋骨下。", "B": "正確。胸背血管與腋窩血管亦可作為受區。", "C": "正確（依答案鍵）。胸背血管顯露較困難，因血管較細（<2 mm）。", "D": "正確。使用腋窩血管時皮瓣的移動與塑形受限。", "E": "正確。以胸背血管為受區時，皮瓣容易向外側偏移。"}, "src": "NG", "sub": "S15"}, {"id": "NG-208C", "stem": "關於前鋸肌(serratus anterior muscle)的描述，以下何者正確？(複選)", "opts": {"A": "此肌肉走在胸廓前外側第一至第八根肋骨處", "B": "主要血液供應於來自於側胸動脈 (lateral thoracic artery) 及胸背動脈 (thoracodorsal artery)", "C": "此肌肉負責旋轉肩胛骨及抬起肩膀", "D": "此肌肉由長胸神經(long thoracic nerve)支配", "E": "隆乳手術時在胸大肌下 blunt dissection 也會舉起一部分的前鋸肌"}, "ans": "ABCDE", "multi": true, "years": ["112"], "cite": "Neligan 4th, Volume 5, Chapter 1, p11", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-208／NG-208B 同題（112 年版，D 的「連結」已改為「支配」、B 的 thoracodoral 錯字已修正）：前鋸肌第 1–8 肋、側胸＋胸背動脈、長胸神經支配、功能為肩胛旋轉／抬肩、隆乳鈍性剝離會掀起部分前鋸肌，五項全對。", "peropt": {"A": "對。第 1–8 肋。", "B": "對。側胸動脈與胸背動脈供血。", "C": "對。旋轉肩胛骨、抬起肩膀。", "D": "對。由長胸神經支配（受損即翼狀肩胛）。", "E": "對。胸大肌下鈍性剝離會一併掀起部分前鋸肌。"}, "src": "NG", "sub": "S02"}, {"id": "NG-061B", "stem": "What is the specific indication in autologous fat grafting in breast reconstruction?", "opts": {"A": "Sharp implant border", "B": "Radiation deformity in flap reconstruction", "C": "Implant rippling", "D": "Depression from fat necrosis", "E": "All of above."}, "ans": "E", "multi": false, "years": ["112", "113", "114", "115"], "cite": "Neligan, Volume 5 Chapter 24 Page 460", "conflict": "", "etype": "ai", "expl": "Autologous fat grafting can be useful both in prepectoral and retropectoral breast reconstruction. It has been helpful to correct the step-off deformity at the upper pole and to correct contour deformity by reducing wrinkling and rippling. Those deformities can be classified in step-off, intrinsic and extrinsic, as done by Kanchwala.In addition to improving the aesthetic results, autologous fat grafting (AFG) has also been used to treat post-astectomy pain syndrome and capsular contracture. Several articles have reviewed the indications for AFG n settings of previous radiotherapy, both in two-stage reast reconstruction as a preconditioning method, with different protocols, to reduce the grade of capsular contracture and to treat complications. Lipofilling is able to act on the main collateral effects of radiotherapy, such as fibrosis due to fibroblast injury, decreased microcirculation in the targeted areas. The principle factors responsible for this are stem cells, cytokines and growth factors hat are all constituents of AFG", "key": "與 NG-110 為同一份清單的英文版（112–115 年）：脂肪移植在乳房重建的適應症「以上皆是」——義乳邊緣銳利可觸、皮瓣重建後的放射線變形、義乳 rippling、脂肪壞死造成的凹陷。共通點都是**輪廓瑕疵的微調**；作為唯一的主要重建方式則尚未確立（見 NG-098）。", "peropt": {"A": "是適應症。義乳邊緣銳利可觸（上極 step-off）。", "B": "是適應症。皮瓣重建後的放射線變形。", "C": "是適應症。義乳 rippling（波紋）。", "D": "是適應症。脂肪壞死造成的凹陷。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S16"}, {"id": "NG-091", "stem": "Which of the following statements about free TRAM flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is a Mathes and Nahai type III muscle", "B": "An abdominal bulge is most often due to attenuation of the anterior rectus sheath", "C": "Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein", "D": "Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap", "E": "None of above"}, "ans": "D", "multi": false, "years": ["112", "113", "114"], "cite": "Neligan, Volume 5 Chapter.20.4, p351, 357", "conflict": "Free TRAM「MS-0=DIEP」敘述跨年答案分歧:NG113 keyed D(此D敘述為錯),NG110同題曾keyed A(疑誤)。概念:MS-0=全肌保留? DIEP=不取肌肉;記概念勿背字母", "etype": "ai", "expl": "", "key": "與 NG-089/090 同一題幹，僅選項順序重排：錯述句「完整保留腹直肌＝MS-0(DIEP)」被移到 D。112–114 年皆鍵 D。這一族題目答案字母從 A→B→D 浮動，唯一穩定的是概念：MS-3＝完整保肌＝DIEP；MS-0＝全寬肌肉橫斷。", "peropt": {"A": "正確。rectus abdominis 屬 Mathes-Nahai Type III。", "B": "正確。腹壁膨出最常見成因為前鞘變薄鬆弛。", "C": "正確。受區血管為內乳與胸背血管。", "D": "正解（錯述）。完整保留腹直肌應歸為 MS-3（DIEP），非 MS-0。", "E": "存在錯述選項，不選 None of above。"}, "src": "NG", "sub": "S13"}, {"id": "NG-145", "stem": "以下congenital breast deformities 中, 何者不屬於Hypoplastic deformities?", "opts": {"A": "Breast hypoplasia and amazia", "B": "Polymastia", "C": "Tuberous breast deformity", "D": "Poland syndrome", "E": "Athelia and amastia"}, "ans": "B", "multi": false, "years": ["112", "113"], "cite": "Neligan, Volume 5 Ch.28 Page 510", "conflict": "", "etype": "ai", "expl": "", "key": "先天乳房畸形二分法：**Hypoplastic（發育不足）** 包含 breast hypoplasia／amazia、athelia／amastia、tuberous breast、Poland syndrome；**Polymastia（多乳房）與 polythelia（多乳頭）** 屬「數目過多」的 hyperplastic／supernumerary 類，方向相反。本題答案 B，NG-146 同一考點答案為 E——又一組字母浮動。", "peropt": {"A": "屬 hypoplastic。乳房發育不良與 amazia（有乳頭無腺體）。", "B": "正解（非 hypoplastic）。Polymastia 是多餘乳房組織，屬數目過多的畸形。", "C": "屬 hypoplastic。Tuberous breast 為基底受限的實質發育不良。", "D": "屬 hypoplastic。Poland syndrome 合併胸壁與乳房發育不足。", "E": "屬 hypoplastic。Athelia（無乳頭）與 amastia（無乳房）。"}, "src": "NG", "sub": "S09"}, {"id": "NG-191", "stem": "關於profunda artery perforator flap (PAP flap), 以下何者錯誤?", "opts": {"A": "The dissection of the PAP flap is straightforward through the adductor magnus muscle", "B": "The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh", "C": "The flap donor site well hidden within the upper thigh and buttock crease", "D": "Complications include fat necrosis, donor site seroma and infection", "E": "The PAP flap had a short pedicle, around 5cm."}, "ans": "E", "multi": false, "years": ["112", "113"], "cite": "Neligan, Volume 5 Ch.21.4 Page 410, 414, 415", "conflict": "", "etype": "ai", "expl": "", "key": "PAP 皮瓣蒂長為 **9–13 cm**（非約 5 cm），這是它相對 TUG 的最大優勢，可直接吻合內乳血管。本題其餘敘述（穿行 adductor magnus、profunda 分自 common femoral 進入大腿後側間隔、供區疤痕隱蔽、併發症含脂肪壞死與供區血清腫感染）皆依答案鍵視為正確。", "peropt": {"A": "依答案鍵視為正確。PAP 的穿通枝多行於 adductor magnus（或其與 gracilis 之間的中隔）；惟臨床上剝離仍具難度，並非真正「straightforward」——注意 NG-192／NG-048 把「adductor longus」寫成錯述選項，關鍵字是 **magnus vs longus**。", "B": "正確。profunda femoris artery 自 common femoral artery 分出，進入大腿後側間隔並發出穿通枝。", "C": "正確。供區疤痕可藏於大腿內上方與臀下皺褶。", "D": "正確。併發症含脂肪壞死、供區血清腫與感染。", "E": "正解（錯述）。PAP 蒂長約 9–13 cm，並非短蒂 5 cm；短蒂（5.5–7 cm）是 TUG 的特徵。"}, "src": "NG", "sub": "S14"}, {"id": "NG-036C", "stem": "Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?", "opts": {"A": "1-2 months", "B": "3-5 months", "C": "6-9 months", "D": "More than one year", "E": "More than 2 years."}, "ans": "C", "multi": false, "years": ["112", "113", "114"], "cite": "Neligan, Volume 5 Ch 25 Page 487", "conflict": "112-114年正解6-9個月;115年同題C改為6-12個月(NG-036D)", "etype": "ai", "expl": "", "key": "同一題的 112–114 年版：干擾選項改為 1-2／3-5 個月與「超過 2 年」，正解仍是 **6–9 個月**。這一族題目跨 108–115 六個年份、四種選項組合，唯一不變的是「放療後 6–9 個月」這個窗口。", "peropt": {"A": "太早。1–2 個月仍處急性放射性發炎期。", "B": "太早。3–5 個月組織尚未恢復。", "C": "正解。放療結束後 **6–9 個月**是游離組織轉移的最佳時機。", "D": "過晚。超過一年組織纖維化已定型。", "E": "過晚。超過 2 年更不利於剝離與對稱。"}, "src": "NG", "sub": "S15"}, {"id": "NG-088", "stem": "Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)", "opts": {"A": "The dissection of a DIEAP flap has a steep learning curve", "B": "The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap", "C": "The deep inferior epigastric artery arises from the common iliac artery", "D": "Abdominal scarring is probably the most important risk factor for raising a DIEAP flap", "E": "Smoking is considered a relative contraindication to raising a DIEAP flap"}, "ans": "ABDE", "multi": true, "years": ["112", "113", "115"], "cite": "Neligan, Volume 5 Chapter 20 Page 324, 326, 338, 339", "conflict": "", "etype": "orig", "expl": "C: The deep inferior epigastric artery arises from the external iliac artery, immediately above the inguinal ligament.", "key": "", "peropt": {}, "src": "NG", "sub": "S13"}, {"id": "NG-102", "stem": "Which pedicled perforator flaps are suitable for reconstruction of medial quadrant defect after partial mastectomy? (複選)", "opts": {"A": "Latissimus dorsi (LD) flap", "B": "Anterior intercostal artery perforator (AICAP) flap", "C": "Thoracodorsal artery perforator (TDAP) flap", "D": "Superior epigastric artery perforator (SEAP) flap", "E": "Serratus anterior artery perforator (SAAP) flap"}, "ans": "BD", "multi": true, "years": ["112", "113", "115"], "cite": "Neligan, Volume 5 Chapter 23, page 452", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-101 同一考點的**內側象限**版本：仍是 AICAP（此處為 B）＋ SEAP（此處為 D）。外側來源的 LD、TDAP、SAAP 皆不適合內側缺損。三年份重複出現，屬高頻題。", "peropt": {"A": "不適合。LD 自背側轉入，用於外側象限。", "B": "適合。AICAP 位於前胸下內側，可直接補內側缺損。", "C": "不適合。TDAP 位於外側背部。", "D": "適合。SEAP 自上腹壁向上轉移，補內側／下內側缺損。", "E": "不適合。SAAP（serratus anterior artery perforator）位於外側胸壁。"}, "src": "NG", "sub": "S14"}, {"id": "NG-126", "stem": "下列關於Latissimus dorsi flap 的敘述何者為是？", "opts": {"A": "屬於Mathes and Nahai Type V muscle flap", "B": "The latissimus originate from upper thoracic spine", "C": "Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication", "D": "Donor site seroma is most common complication", "E": "The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries"}, "ans": "ACD", "multi": true, "years": ["112"], "cite": "Neligan, Volume 5 Ch.19 Page 301, 302, 305, 306, 317", "conflict": "", "etype": "orig", "expl": "B: It originates from the lower thoracic spine, the posterior iliac crest, and the thoracolumbar fascia, where it forms the roof of the superior lumbar triangle.\nE: The latissimus myocutaneous flap is a Mathes and Nahai type V, with one dominant pedicle – the thoracodorsal artery – and a secondary segmental blood supply, perforators from the posterior intercostal (lateral) and lumbar arteries (medial).", "key": "", "peropt": {}, "src": "NG", "sub": "S14"}, {"id": "NG-216", "stem": "關於隆乳手術及相關論述，何者為錯誤？", "opts": {"A": "目前比較常見的手術切口有經乳下緣(inframammary incision)、乳暈旁 (periareolar incision)、腋下(axillary incision)與肚臍(transumbilical incision)", "B": "經乳暈旁(periareolar incision)隆乳有較低的感染率及莢膜攣縮率", "C": "經肚臍隆乳只能放saline implant", "D": "經腋下隆乳(axillary incision)有增加血腫,不必要組織傷害的風險", "E": "經乳下緣隆乳(inframammary incision)有較大的術野範圍"}, "ans": "B", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 2, Page 22", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-215 為同一題（113 年重出）：**periareolar 切口的感染率與莢膜攣縮率較高**，因切口穿越含菌的乳管系統（生物膜假說的直接臨床證據）。這也是 14-point plan 建議用乳下緣切口的理由。", "peropt": {"A": "正確。四種常見切口。", "B": "正解（錯述）。乳暈旁切口的感染與莢膜攣縮率較高。", "C": "正確。經肚臍隆乳只能使用鹽水袋。", "D": "正確。腋下切口血腫與組織傷害風險增加。", "E": "正確。乳下緣切口術野最大。"}, "src": "NG", "sub": "S03"}, {"id": "NG-198", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)及相關論述，何者為錯誤的選項？", "opts": {"A": "根據 MD Anderson 做的研究報告指出 BIA-ALCL 只發生在紋理植入物(textured implant)", "B": "任何義乳隆乳手術後超過一年以上才發生的血清腫(seroma)都要懷疑BIA-ALCL 的可能性", "C": "BIA-ALCL 是一種 T 細胞淋巴瘤", "D": "腫瘤細胞會表現 CD30 陽性", "E": "腫瘤細胞為 anaplastic lymphoma kinase (ALK) 陽性"}, "ans": "E", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 12, Page 197-198", "conflict": "", "etype": "ai", "expl": "", "key": "BIA-ALCL 的免疫表型必背：**T 細胞來源、CD30 陽性、ALK 陰性**。題目 E 寫「ALK 陽性」故為錯述。這正是與系統型 ALCL（可為 ALK 陽性）的關鍵鑑別點，也是 3e 舊版（NG-106）與 4e/5e 的最大出入。", "peropt": {"A": "正確。MD Anderson 研究指出 BIA-ALCL 只發生在紋理面義乳。", "B": "正確。任何隆乳一年以上才出現的血清腫都須懷疑 BIA-ALCL。", "C": "正確。BIA-ALCL 是 T 細胞淋巴瘤。", "D": "正確。腫瘤細胞 CD30 陽性。", "E": "正解（錯述）。BIA-ALCL 為 **ALK 陰性**。"}, "src": "NG", "sub": "S05"}, {"id": "NG-211", "stem": "關於男性女乳症(gynecomastia)的治療及相關論述，何者為正確的選項？", "opts": {"A": "Pull-through technique", "B": "Open excision via an inferior periareolar approach", "C": "Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern", "D": "Suction-assisted lipectomy", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 11, Page 176-183", "conflict": "", "etype": "ai", "expl": "", "key": "男性女乳症的治療「以上皆是」：pull-through technique、經下乳暈開放切除、以 Lejour 垂直式皮膚圖案做皮膚縮減併組織切除、抽脂輔助脂肪切除。與 NG-148 為正反題（該題把 modified radical mastectomy 列為非治療）。術式選擇依**腺體 vs. 脂肪比例**與**皮膚鬆弛程度**決定。", "peropt": {"A": "是治療。Pull-through technique。", "B": "是治療。經下乳暈切口開放切除。", "C": "是治療。Lejour 垂直式皮膚縮減併組織切除。", "D": "是治療。抽脂輔助脂肪切除。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S08"}, {"id": "NG-212", "stem": "關於自體脂肪隆乳及相關論述，何者為正確選項？", "opts": {"A": "自體脂肪隆乳建議使用在想要大量增加(massive increase)的隆乳病人", "B": "製備脂肪時，離心後的脂肪要把上方的油脂跟中間血水倒掉，留下底下萃取的脂肪才拿來做脂肪移植使用", "C": "脂肪移植時，建議補脂的順序先補淺層再補深層", "D": "脂肪移植隆乳建議要稍微多補一點脂肪，因為之後大約會有 20-30% 的脂肪會被吸收 (resorption)", "E": "以上皆是"}, "ans": "D", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 5, Page 73, 81-83", "conflict": "自體脂肪三方向:中小量增加/留中層脂肪/先深後淺。NG-214同組但A、C已寫成正確版,答案改為B", "etype": "ai", "expl": "", "key": "自體脂肪隆乳唯一正確者是 **D：需稍微過量補脂，因為約 20–30% 會被吸收**。其餘三項皆為方向相反的錯述：適用於**中小量**增加（非大量）；離心後應留**中層**脂肪（倒掉上層油脂與下層血水）；補脂順序應**先深層再淺層**。", "peropt": {"A": "錯。自體脂肪隆乳適合**中等或少量**增加的病人，不適合追求大量增加者。", "B": "錯。離心後分三層：上層油脂、**中層脂肪**、下層血水。應留**中層**，題目說留「底下」是錯的。", "C": "錯。補脂順序應**先深層、再淺層**（先建立基底再修飾表面）。", "D": "正解。約 20–30% 的移植脂肪會被吸收，故須稍微過量補脂。", "E": "僅 D 正確，不選以上皆是。"}, "src": "NG", "sub": "S16"}, {"id": "NG-173", "stem": "關於 free tissue transfer 的乳房重建相關論述，何者為非？", "opts": {"A": "最常使用的 recipient vessel 為第五根肋骨下的內乳動脈 (internal mammary vessels)", "B": "Thoracodorsal vessels 及 axillary vessels 亦可作為 recipient vessels", "C": "使用 Thoracodorsal vessels 作為 recipient vessels 較為困難，但比較細(<2mm)", "D": "使用 axillary vessels 作為 recipient vessels 時會限制皮瓣的移動以及塑形", "E": "使用 Thoracodorsal vessels 作為 recipient vessels 容易造成皮瓣側移"}, "ans": "A", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 1, Page 13", "conflict": "", "etype": "ai", "expl": "", "key": "游離皮瓣乳房重建最常用的受區是 **第 3 肋軟骨下（第 2–3 肋間）的內乳血管**，不是第五根肋骨下——第 4 肋以下 IMV 常已分岔變細（呼應 GS-008／GS-009 的「切除第 3 肋軟骨」）。此題於 109、111、112、113 年重複出現（見 NG-174／NG-189），答案固定為 A。", "peropt": {"A": "正解（錯述）。最常用的受區為**第 3 肋（軟骨）附近**的內乳血管，非第五根肋骨下。", "B": "正確。胸背血管與腋窩血管亦可作為受區。", "C": "正確（依本年答案鍵）。胸背血管顯露較困難，且口徑較細（<2 mm）。", "D": "正確。使用腋窩血管時，皮瓣的移動與塑形受限。", "E": "正確。以胸背血管為受區時，皮瓣容易向外側偏移。"}, "src": "NG", "sub": "S15"}, {"id": "NG-168B", "stem": "病人於義乳置放四年後，比起健側，觸摸感覺較不柔軟，且可以摸得到置入物，但是看不見明顯的位移，根據Baker clinical classification分級，何者為正確的？", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "C", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 3, Page 47", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-168 同題（113 年版，題幹措辭略異）：「較不柔軟＋可觸及義乳＋看不見位移」＝ **Baker Grade II**。本題選項自 0 起算，故答案 C 對應 **Grade II**；而 NG-154 的答案同樣是 C 卻對應 **Grade III**（選項自 I 起算）。以敘述定位，不要用字母。", "peropt": {"A": "Grade 0 並非 Baker 分級的正式級別。", "B": "Grade I：柔軟如自然乳房。", "C": "正解。Grade II：略硬、義乳可觸及但看不見、無明顯變形。", "D": "Grade III：明顯變硬、義乳易觸及且可能可見或變形。", "E": "Grade IV：堅硬、疼痛、壓痛、明顯變形。"}, "src": "NG", "sub": "S03"}, {"id": "NG-153", "stem": "在減少義乳產生的莢膜攣縮併發症上具有角色的相關論述，何者為非?", "opts": {"A": "Subfascial plane", "B": "Nipple shield", "C": "Pocket irrigation with triple antibiotics", "D": "Inframammary incision", "E": "Insertion sleeve"}, "ans": "A", "multi": false, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 4, Page 67", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-108 完全相同的考點（正反問法）：降低莢膜攣縮有角色者為 nipple shield、三重抗生素沖洗、乳下緣切口、insertion sleeve；**subfascial plane 無實證角色**。兩題答案都是 A，但問法一個是「沒有角色」、一個是「何者為非」。", "peropt": {"A": "正解。Subfascial plane 對降低莢膜攣縮無實證支持。", "B": "有角色。乳頭遮罩阻絕乳管細菌。", "C": "有角色。三重抗生素沖洗囊袋。", "D": "有角色。乳下緣切口避開乳管。", "E": "有角色。置入套管避免義乳接觸皮膚。"}, "src": "NG", "sub": "S03"}, {"id": "NG-169", "stem": "進行隆乳手術時注意事項的相關論述，何者為正確的？(複選)", "opts": {"A": "理想的上胸(upper pole)與下胸(lower pole)的比例為 55%：45%", "B": "若選擇義乳隆乳,當上胸的皮膚與軟組織捏起來(pinch)不到 4 公分的時候，建議把義乳置放於乳腺下(subglandular position)", "C": "目前比較常見的手術切口為下乳腺(inframammary incision)、乳暈旁(periareolar incision)、腋下(axillary incision)與肚臍(transumbilical incision)", "D": "當義乳為置放於筋膜下(subfascial plane)時，建議使用紋理植入物(textured implant)", "E": "Mondor's disease 為一種表淺的血栓性靜脈炎(thrombophlebitis)，通常為自限性(limited)，通常不需要手術治療"}, "ans": "CDE", "multi": true, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapters 2, 3, 4, Page 18, 33, 47", "conflict": "方向陷阱:上極:下極=45%:55%;軟組織薄(pinch<2cm)⇒肌肉下。NG-172同組但A已寫成正確45:55,答案改為B", "etype": "ai", "expl": "", "key": "隆乳注意事項的四年重複題（109、111、112、113），正解固定為 **CDE**。兩個錯述：① 理想上／下極比例是 **45%：55%**（下極較飽滿才自然），題目寫 55:45 方向相反；② 上極 pinch 太薄時應放**肌肉下**，題目寫 subglandular 方向相反。", "peropt": {"A": "錯。理想上極：下極比例為 **45%：55%**，下極應較飽滿。", "B": "錯。上極軟組織捏起來太薄時，應置於**肌肉下（subpectoral）**而非腺體下。（標準門檻為 pinch < 2 cm，見 NG-075／NG-163）", "C": "對。四種常見切口：乳下緣、乳暈旁、腋下、肚臍。", "D": "對。筋膜下平面建議使用紋理義乳（增加穩定度、降低移位）。", "E": "對。Mondor's disease 為淺層血栓性靜脈炎，多為自限性，通常不需手術。"}, "src": "NG", "sub": "S02"}, {"id": "NG-217", "stem": "關於隆乳相關的莢膜攣縮(capsular contracture)相關論述，以下何者為可能的原因？(複選)", "opts": {"A": "血腫(hematoma)", "B": "血清腫(seroma)", "C": "矽膠滲漏(silicon gel bleed)", "D": "灰塵(dust)", "E": "感染(infection)"}, "ans": "ABCDE", "multi": true, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 3, Page 47", "conflict": "", "etype": "ai", "expl": "", "key": "莢膜攣縮的可能成因「全部都是」：血腫、血清腫、矽膠滲漏（gel bleed）、術中落入的**灰塵／滑石粉／棉絮等異物**、感染（生物膜）。共通機轉是異物或發炎刺激導致纖維母細胞活化與膠原過度沉積。此題於 109、111、112、113 年重複出現（見 NG-218／NG-219），屬必背。", "peropt": {"A": "是。血腫的血液分解產物促發纖維化。", "B": "是。血清腫使莢膜腔慢性發炎。", "C": "是。矽膠滲漏（gel bleed）引起異物反應。", "D": "是。術中落入的灰塵、滑石粉、紗布纖維等異物顆粒。", "E": "是。感染與生物膜是目前最被接受的主因。"}, "src": "NG", "sub": "S03"}, {"id": "NG-209", "stem": "關於前鋸肌(serratus anterior muscle)的相關論述，以下何者為正確的選項？(複選)", "opts": {"A": "此肌肉為走在胸廓前外側第一至第八根肋骨處", "B": "主要血液供應為來自於側胸動脈 (lateral thoracic artery) 及胸背動脈 (thoracodoral artery)", "C": "此肌肉功能為負責旋轉肩胛骨及抬起肩膀", "D": "此肌肉的神經支配為長胸神經(long thoracic nerve)", "E": "隆乳手術時在胸大肌下為blunt dissection時，也會舉起一部分的前鋸肌"}, "ans": "ABCDE", "multi": true, "years": ["113"], "cite": "Neligan, 4th Edition, Volume 5, Chapter 1, Page 11", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-208 完全相同（113 年重出）：前鋸肌第 1–8 肋、側胸＋胸背動脈供血、長胸神經支配、功能為肩胛旋轉／抬肩、隆乳鈍性剝離會掀起部分前鋸肌。記住**長胸神經＝前鋸肌**（對照批 2 的 NG-131：胸背神經＝闊背肌），兩者最常被互換考。", "peropt": {"A": "對。第 1–8 肋。", "B": "對。側胸動脈與胸背動脈。", "C": "對。旋轉肩胛骨、抬起肩膀。", "D": "對。長胸神經支配。", "E": "對。胸大肌下鈍性剝離會一併掀起部分前鋸肌。"}, "src": "NG", "sub": "S02"}, {"id": "NG-127", "stem": "下列關於Latissimus dorsi flap 的敘述何者為是？(複選)", "opts": {"A": "屬於Mathes and Nahai Type V muscle flap", "B": "The latissimus originate from upper thoracic spine", "C": "Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication", "D": "Donor site seroma is most common complication", "E": "The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries"}, "ans": "ACD", "multi": true, "years": ["113"], "cite": "Neligan, 4th Edition, vol.5, Ch19, p301, 302, 305, 306, 317", "conflict": "", "etype": "orig", "expl": "B: It originates from the lower thoracic spine, the posterior iliac crest, and the thoracolumbar fascia, where it forms the roof of the superior lumbar triangle.\nE: The latissimus myocutaneous flap is a Mathes and Nahai type V, with one dominant pedicle – the thoracodorsal artery – and a secondary segmental blood supply, perforators from the posterior intercostal (lateral) and lumbar arteries (medial).", "key": "", "peropt": {}, "src": "NG", "sub": "S14"}, {"id": "NG-060", "stem": "What is the proper time for delayed TRAM flap reconstruction after patient completion of radiation therapy?", "opts": {"A": "1-2 months", "B": "3-5 months", "C": "6-9 months", "D": "More than one year", "E": "More than 2 years."}, "ans": "C", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch28 p342", "conflict": "", "etype": "orig", "expl": "Radiation is unpredictable and is recommended to be performed prior to the final TRAM flap reconstruction as it has been shown to be detrimental to not only the aesthetic outcome and shape of the flap but also cause contracture and pigmentation changes if performed after the flap reconstruction. Therefore, the authors approach is to perform flap reconstruction 6–9 months after the completion of radiation therapy with preoperative evaluation and assessment performed in clinic around 6 months after completion of radiation.", "key": "", "peropt": {}, "src": "NG", "sub": "S13"}, {"id": "NG-202", "stem": "關於乳房切除術後重建的incision selection以下何者錯誤？", "opts": {"A": "側側切口（Lateral）可保留最多乳頭血流，最安全", "B": "經乳暈旁(periareolar incision)隆乳有較低的感染率及莢膜攣縮率", "C": "垂直切口（Vertical）可最佳化乳頭位置並使乳頭更加集中和上提", "D": "乳下外側切口（Inferolateral IMF）外觀美觀；有經驗後併發症少", "E": "以上皆是"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch21 p269", "conflict": "", "etype": "ai", "expl": "", "key": "**Periareolar 切口的感染率與莢膜攣縮率較高，不是較低**（穿越含菌的乳管系統）。這與 NG-215／NG-216 是同一句話。其餘關於乳房切除後重建切口的敘述（側方切口保留最多乳頭血流、垂直切口最佳化乳頭位置、乳下外側切口美觀且熟練後併發症少）皆正確。", "peropt": {"A": "正確。側方（lateral）切口保留最多乳頭血流，對 NAC 最安全。", "B": "正解（錯述）。乳暈旁切口的感染率與莢膜攣縮率**較高**。", "C": "正確。垂直切口可最佳化乳頭位置，使乳頭更集中並上提。", "D": "正確。乳下外側（inferolateral IMF）切口外觀美觀，術者熟練後併發症少。", "E": "B 為錯述，不選以上皆是。"}, "src": "NG", "sub": "S02"}, {"id": "NG-082", "stem": "Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?", "opts": {"A": "Amphetamines, Heroin, marijuana", "B": "Digoxin, ACE inhibitors, spironolactone", "C": "Benzodiazepines, risperidone, haloperidol", "D": "Anabolic steroids, Estrogen, Food contaminants", "E": "Cephalosporins, Penicillins, Carbapenems"}, "ans": "E", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch15 p201 Box15.1", "conflict": "同概念不同字母(見GS-015註記)", "etype": "ai", "expl": "", "key": "同一組藥物概念的 Neligan 版（115 年）：不相關者是**純抗生素組（cephalosporins、penicillins、carbapenems）**。此版把「食物污染物（food contaminants）」也列入相關（環境雌激素），並以海洛因取代大麻——但核心判準不變：**只要整組都是抗生素，就是答案**。", "peropt": {"A": "相關。安非他命、海洛因、大麻。", "B": "相關。Digoxin、ACE inhibitors、spironolactone。", "C": "相關。Benzodiazepines、risperidone、haloperidol。", "D": "相關。合成類固醇、雌激素、食物污染物（環境雌激素）。", "E": "正解（不相關）。Cephalosporins、penicillins、carbapenems 皆為抗生素。"}, "src": "NG", "sub": "S08"}, {"id": "NG-042", "stem": "In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned. Which level is the most appropriate to performed?", "opts": {"A": "Rib1-2", "B": "Rib3-4", "C": "Rib5-6", "D": "Rib7-8", "E": "Rib9-10"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch30 p373", "conflict": "", "etype": "orig", "expl": "The mean distances of the artery from the costochondral junction is approximately 1 cm, 2 cm and 3 cm at the costal levels 2, 3 and 4, respectively. The internal mammary venous anatomy demonstrates variation, with veins typically being larger on the right side (up to 3 mm) than the left (<2 mm). The level of bifurcation of the veins also differs, bifurcating most frequently in the third intercostal space on the left, compared to the fourth intercostal space on the right. For these reasons, dissection of the vessels is commonly performed at the level of the left third or fourth rib, and the fourth rib on the right side.", "key": "", "peropt": {}, "src": "NG", "sub": "S13"}, {"id": "NG-086", "stem": "Which of the following statements about Nipple–Areola Complex (NAC) repositioning is incorrect?", "opts": {"A": "Previous radiation therapy and vertical mastectomy incisions are independently predictive of NAC mal- position.", "B": "Moderate malposition between 2 and 3 cm", "C": "True type of NAC malposition is a real malposition of the nipple on the breast and chest wall.", "D": "False type of NAC malposition related to incorrect pocket dissection and wrong implant placement.", "E": "Free nipple-grafting has a high risk of depigmentation and loss of NAC projection, which may jeopardize patient satisfaction"}, "ans": "B", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch26 p323-324", "conflict": "", "etype": "orig", "expl": "Mild: malposition less than 1 cm. Moderate: malposition between 1 and 2 cm. Severe: malposition greater than 2 cm.", "key": "", "peropt": {}, "src": "NG", "sub": "S16"}, {"id": "NG-074", "stem": "Which is not comorbidities that increase risk of complications in breast reconstruction ?", "opts": {"A": "Diabetes", "B": "Smoking", "C": "Alcohol", "D": "Obesity", "E": "Coronary Artery Disease"}, "ans": "C", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch17 p230", "conflict": "酒精在本題不列為增加重建併發症之共病;惟NG-079的ERAS建議術前戒酒,兩題並列易混淆", "etype": "ai", "expl": "", "key": "增加乳房重建併發症風險的共病：**糖尿病、抽菸、肥胖、冠狀動脈疾病**（灌流與癒合相關）。**酒精**在本題答案鍵中不列為增加風險的共病——雖然 ERAS 建議術前戒酒（見 NG-079），但它不屬傳統列舉的共病危險因子。", "peropt": {"A": "是。糖尿病造成微血管病變與感染率上升。", "B": "是。抽菸是最強的可改變危險因子。", "C": "正解（非共病危險因子）。酒精在本題不列為增加重建併發症的共病；惟 ERAS 仍建議術前戒酒。", "D": "是。肥胖增加感染、傷口裂開與皮瓣壞死。", "E": "是。冠狀動脈疾病增加麻醉與長時間手術的風險。"}, "src": "NG", "sub": "S15"}, {"id": "NG-033", "stem": "Breast reconstruction with abdominal tissues remains the gold standard when autologous options are desired, which of the following statements is incorrect?", "opts": {"A": "The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the commonly used autologous methods of breast reconstruction todays", "B": "Superficial Inferior Epigastric Artery flap preserve entire rectus muscle and anterior rectus sheath", "C": "The rectus abdominis is a type III muscle according to the Mathes and Nahai classification.", "D": "Venous congestion is the primary factor associated with DIEP flap failure", "E": "The sensory reinnervation recipient nerve is the anterior cutaneous branch of the 2nd intercostal nerve"}, "ans": "E", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch27 p339", "conflict": "", "etype": "orig", "expl": "The recipient nerve is dissected with the recipient internal mammary artery and vein and is the anterior cutaneous branch of the 3rd intercostal nerve typically identified at the inferior sternochondral junction.", "key": "", "peropt": {}, "src": "NG", "sub": "S17"}, {"id": "NG-037", "stem": "Direct-to-implant breast reconstruction中 胸大肌下（Subpectoral）相較胸大肌上（Prepectoral）的優點為何者? (複選)", "opts": {"A": "Better uplift of breast", "B": "Less pain in first postoperative week", "C": "Better upper pole coverage, smoother contour", "D": "Less or no animation", "E": "All of above"}, "ans": "AC", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch21 p271", "conflict": "", "etype": "ai", "expl": "", "key": "Direct-to-implant 的平面選擇：**Subpectoral（胸大肌下）的優點是提托效果較好、上極覆蓋較佳、輪廓較平順**；代價是術後第一週疼痛較多、且有 animation deformity。**Less pain 與 less animation 都是 Prepectoral 的優點**，不是 subpectoral 的。", "peropt": {"A": "是 subpectoral 優點。胸大肌提供上方支撐，提托效果較好。", "B": "錯。胸大肌被剝離與撐開，術後第一週疼痛**較多**；疼痛少是 prepectoral 的優點。", "C": "是 subpectoral 優點。肌肉覆蓋上極，輪廓較平順、義乳邊緣不明顯。", "D": "錯。Animation deformity 正是 subpectoral 的缺點；無或少 animation 是 prepectoral 的優點。", "E": "並非全部皆是，不選。"}, "src": "NG", "sub": "S12"}, {"id": "NG-177", "stem": "關於Contralateral prophylactic mastectomy (CPM)的敘述何者正確? (複選)", "opts": {"A": "CPM rates are highest among Caucasians, patients with higher socioeconomic status", "B": "Older patient age is considered one of the strongest factors associated with increasing CPM rates", "C": "MRI and genetic test increase CPM amount", "D": "largely physician-driven with evidence-based recommendation", "E": "avoidance of future screening and decreasing related patient anxiety"}, "ans": "ACE", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch17 p225", "conflict": "", "etype": "orig", "expl": "B: Younger patient age is considered one of the strongest factors associated with increasing CPM rates. D: The decision to undergo CPM at the time of unilateral mastec- tomy is complex, but is largely patient-driven. With regards to oncologic benefit of CPM, to our knowl- edge, there are no prospective studies that demonstrate an advantage.", "key": "", "peropt": {}, "src": "NG", "sub": "S10"}, {"id": "NG-041", "stem": "Implant-based breast reconstruction (IBR) 比起 autologous based reconstruction(ABR)，有何益處? (複選)", "opts": {"A": "恢復速度可能較快（Potential quicker recovery）", "B": "學習曲線較簡單（Easier learning curve）", "C": "外觀自然（Natural appearance）", "D": "減少住院費用（Shorter hospitalization）", "E": "恢復速度可能較快（Potential quicker recovery）"}, "ans": "ABDE", "multi": true, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch17 p227", "conflict": "題目瑕疵:選項A與E敘述完全相同(重複選項),兩者皆列入正解ABDE", "etype": "ai", "expl": "", "key": "義乳重建（IBR）相對自體重建（ABR）的優點：恢復較快、學習曲線較簡單、住院時間短、無供區傷害。**「外觀自然」是自體重建（ABR）的優點**，不是義乳重建的。註：本題 A 與 E 為完全相同的敘述（重複選項），兩者皆列入正解。", "peropt": {"A": "是。無供區傷害、手術侵襲較小，恢復可能較快。", "B": "是。不需顯微吻合，學習曲線較簡單。", "C": "否。外觀與觸感自然是**自體重建**的優點；義乳重建相對較不自然。", "D": "是。住院時間較短、費用較低。", "E": "是（與 A 為重複選項）。恢復速度可能較快。"}, "src": "NG", "sub": "S12"}, {"id": "NG-125", "stem": "下列關於Latissimus dorsi flap 的敘述何者正確？ (複選)", "opts": {"A": "屬於Mathes and Nahai Type V muscle flap", "B": "The latissimus originate from upper thoracic spine", "C": "Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication", "D": "Donor site seroma is most common complication", "E": "The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries"}, "ans": "ACD", "multi": true, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch29 p356-360", "conflict": "", "etype": "orig", "expl": "B: It originates from the lower thoracic spine, the posterior iliac crest, and the thoracolumbar fascia, where it forms the roof of the superior lumbar triangle. E: The latissimus myocutaneous flap is a Mathes and Nahai type V, with one dominant pedicle – the thoracodorsal artery – and a secondary segmental blood supply, perforators from the posterior intercostal (lateral) and lumbar arteries (medial).", "key": "", "peropt": {}, "src": "NG", "sub": "S14"}, {"id": "NG-093", "stem": "Which of the following statements about the free Transverse Rectus Abdominis Myocutaneous (TRAM) flap is incorrect?", "opts": {"A": "The rectus abdominis muscle is categorized as a Mathes and Nahai Type III muscle.", "B": "Postoperative abdominal bulging is most frequently caused by the thinning or attenuation of the anterior rectus sheath.", "C": "Standard recipient vessels for a free TRAM flap include the internal mammary vessels and the thoracodorsal vessels.", "D": "A flap that results in the preservation of the entire rectus abdominis muscle is classified as an MS-2 flap.", "E": "None of the above"}, "ans": "D", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch31, p397", "conflict": "", "etype": "ai", "expl": "", "key": "同一 MS 分級家族的 5e 版本：這次錯述改成「完整保留腹直肌＝MS-2」。正確應為 MS-3（＝DIEP）。MS-2 是保留內、外兩側肌條，只取中段肌肉。", "peropt": {"A": "正確。rectus abdominis 為 Mathes-Nahai Type III。", "B": "正確。腹壁膨出最常見於前鞘變薄鬆弛。", "C": "正確。標準受區血管為內乳與胸背血管。", "D": "正解（錯述）。完整保留腹直肌是 MS-3，不是 MS-2。", "E": "存在錯述選項，不選 None of above。"}, "src": "NG", "sub": "S13"}, {"id": "NG-065", "stem": "When abdominal tissue is unavailable, alternative free flaps are utilized for autologous breast reconstruction. Which of the following statements regarding these alternative flaps is/are TRUE? (複選)", "opts": {"A": "The Transverse Upper Gracilis (TUG) flap is limited by a relatively short vascular pedicle (typically 6–7 cm) and can cause donor-site morbidity such as transient or permanent injury to the obturator nerve's posterior division.", "B": "The Superior Gluteal Artery Perforator (SGAP) flap offers a longer vascular pedicle than the Inferior Gluteal Artery Perforator (IGAP) flap but frequently results in a contour deformity that mimics Sciatic nerve compression syndrome.", "C": "The Lumbar Artery Perforator (LAP) flap provides a robust volume of dense fat suitable for large breast reconstruction, but its harvest is technically challenging due to the short pedicle length and the intramuscular course through the erector spinae muscle.", "D": "When harvesting an IGAP flap, the surgeon must carefully identify and preserve the posterior femoral cutaneous nerve (PFCN) to prevent painful neuroma formation or posterior thigh paresthesia.", "E": "Compared to the gluteal flaps, the TUG flap yields a tissue texture that is softer and more compliant, closely mimicking natural breast parenchyma, but is constrained by a more limited total volume capacity."}, "ans": "CDE", "multi": true, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch33,p420-423", "conflict": "", "etype": "ai", "expl": "", "key": "腹部組織不可用時的替代皮瓣比較：TUG 蒂短（約 5.5–7 cm）、體積有限、質地柔軟；供區風險是 **閉孔神經前支**（支配 gracilis）與淋巴水腫。SGAP 蒂**短於** IGAP。LAP 脂肪量大但蒂短、需穿過 erector spinae，技術困難。IGAP 需辨識並保留 posterior femoral cutaneous nerve。", "peropt": {"A": "錯。TUG 蒂短（約 5.5–7 cm）此點正確，但 gracilis 由 **閉孔神經前支（anterior division）** 支配，題目寫 posterior division 為誤。", "B": "錯。SGAP 的蒂**比 IGAP 短**（IGAP 蒂較長），且「輪廓變形模擬坐骨神經壓迫症候群」的敘述不成立——IGAP 才有坐骨神經相關風險。", "C": "對。LAP 提供大量緻密脂肪，適合較大乳房重建，但蒂短且需穿行 erector spinae，取瓣技術困難。", "D": "對。取 IGAP 時須辨識並保留 posterior femoral cutaneous nerve，否則造成神經瘤疼痛或大腿後側感覺異常。", "E": "對。TUG 組織質地較臀部皮瓣柔軟、順應性佳，接近乳腺實質，但總體積受限。"}, "src": "NG", "sub": "S14"}, {"id": "NG-048", "stem": "Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "The profunda femoris artery arises from the common femoral artery and travels directly into the medial compartment of the thigh to give off its perforators.", "B": "The surgical dissection of the PAP flap is straightforward because the primary perforators consistently run an intramuscular course through the adductor longus muscle.", "C": "The resulting donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.", "D": "Common postoperative complications associated with this flap include fat necrosis at the recipient site, as well as donor-site seroma, hematoma, and wound infection.", "E": "None of the above"}, "ans": "B", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch36,p451-452", "conflict": "", "etype": "ai", "expl": "", "key": "PAP 皮瓣的兩個必考陷阱：① 穿通枝主要走行於 **gracilis 與 adductor magnus 之間的中隔皮膚（septocutaneous）路徑**，或穿行 adductor magnus，**不是 adductor longus**；② 剝離並不「straightforward」。此外 profunda femoris artery 由 common femoral artery 分出後進入大腿**後側**間隔，非內側間隔。", "peropt": {"A": "本年答案鍵未列為錯述選項。惟嚴格而言 profunda femoris 分出後供應大腿後側間隔（posterior compartment），此敘述用字寬鬆；作答時以更明確錯誤的 B 為準。", "B": "正解（錯述）。PAP 的穿通枝並非「一致地」以肌內路徑穿過 **adductor longus**（實為 adductor magnus 或 gracilis／adductor magnus 之間的中隔），且剝離技術要求高，並不簡單。", "C": "正確。供區疤痕可藏於大腿內上方與臀下皺褶內，美觀度佳。", "D": "正確。常見併發症為受區脂肪壞死，以及供區血清腫、血腫與傷口感染。", "E": "存在明確錯述選項，不選 None。"}, "src": "NG", "sub": "S14"}, {"id": "NG-039", "stem": "Hybrid breast reconstruction combines autologous tissue transfer with alloplastic implants to optimize aesthetic outcomes. Regarding the surgical principles, planes, and clinical considerations of hybrid breast reconstruction, which of the following statements are TRUE? (複選)", "opts": {"A": "Hybrid breast reconstruction allows patients with a low Body Mass Index (BMI) to achieve adequate breast volume by utilizing a smaller, muscle-sparing autologous flap (e.g., MS-TRAM or DIEP) to provide stable vascularized soft tissue coverage over the implant.", "B": "The plane of implant placement in hybrid reconstruction has increasingly shifted from subpectoral to pre-pectoral, which preserves the pectoralis major muscle, reduces postoperative animation deformity, and decreases long-term capsular contracture.", "C": "In microvascular hybrid reconstruction using abdominal flaps, placing the implant in a delayed staged setting (secondary revision) is strictly contraindicated due to the risk of damaging the deep inferior epigastric pedicle during secondary pocket dissection.", "D": "When performing an immediate hybrid reconstruction with a DIEP flap and a pre-pectoral implant, the autologous tissue serves as a biological matrix that eliminates the clinical need for acellular dermal matrix (ADM) to support the implant.", "E": "The combination of autologous fat grafting (lipofilling) and implants is also considered a forms of hybrid breast reconstruction, typically used to correct contour deformities, upper pole rippling, or step-off deformities post-implant placement"}, "ans": "ABE", "multi": true, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch38, p470-474", "conflict": "hybrid:C「延遲置入義乳為絕對禁忌」為錯;NG-080同概念將「可即時或延遲置入」列為正確,可交叉檢核", "etype": "ai", "expl": "", "key": "Hybrid 重建（自體皮瓣＋義乳）正確者為 ABE：低 BMI 病人可用較小的保肌皮瓣覆蓋義乳；義乳平面已由 subpectoral 轉向 **pre-pectoral**（保留胸大肌、減少 animation、降低長期莢膜攣縮）；**脂肪移植＋義乳也算 hybrid 的一種**。C（延遲分期置入義乳「絕對禁忌」）與 D（自體組織可完全免除 ADM）皆為過度絕對的錯述。", "peropt": {"A": "對。低 BMI 病人以較小的 MS-TRAM／DIEP 提供穩定的血管化軟組織覆蓋義乳，補足體積。", "B": "對。義乳平面由 subpectoral 轉向 pre-pectoral，保留胸大肌、減少 animation deformity、降低長期莢膜攣縮。", "C": "錯。延遲分期置入義乳（二次修整時）是常規可行的做法，並非「絕對禁忌」；謹慎剝離即可保護 DIEA 血管蒂。", "D": "錯。自體組織雖提供覆蓋，仍常需 ADM 支撐 pre-pectoral 義乳的下極與位置，不能說「完全免除 ADM 的臨床需求」。", "E": "對。脂肪移植合併義乳亦屬 hybrid 重建，用於矯正輪廓缺損、上極 rippling 與階梯感。"}, "src": "NG", "sub": "S15"}, {"id": "NG-055", "stem": "The prominent sensory innervation of the nipple areolar complex is provided by which nerve?", "opts": {"A": "The cervical plexus", "B": "The anterior branches of the 3th intercostal nerve", "C": "The anterolateral branches of the 4th intercostal nerve", "D": "The anteromedial branches of the 4th intercostal nerve", "E": "The anterior branches of the 5th intercostal nerve"}, "ans": "C", "multi": false, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch39, p476", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-054 完全相同（114、115 年重出）：**NAC 的主要感覺神經是第 4 肋間神經的前外側分支**。這是全庫最穩定的解剖考點之一，三個年份、同一答案 C。", "peropt": {"A": "否。頸神經叢支配乳房上部皮膚。", "B": "否。第 3 肋間神經非主要來源。", "C": "正解。第 4 肋間神經的前外側分支。", "D": "否。前內側分支貢獻較小。", "E": "否。第 5 肋間神經非主要來源。"}, "src": "NG", "sub": "S16"}, {"id": "NG-079", "stem": "Which is true about enhanced recovery after surgery (ERAS) in breast surgery?", "opts": {"A": "ERAS protocols within plastic surgery have demonstrated significant improvements in postoperative recovery", "B": "The most important aspects of any ERAS protocol can be broken down into preoperative, perioperative, intra-operative, and postoperative interventions.", "C": "The preoperative phase should focus on educating the patient on the surgical experience and optimizing them for surgery through proper nutrition, smoking and/or alcohol cessation, reasonable pain expectations, and preoperative exercise", "D": "Perioperative interventions include multimodal analgesia given on a scheduled basis.", "E": "All of the above"}, "ans": "E", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch42,p513-514", "conflict": "", "etype": "ai", "expl": "", "key": "ERAS 在乳房手術的四項敘述全對：整外領域的 ERAS 已顯示術後恢復顯著改善；可分為術前、圍手術期、術中、術後四階段；**術前重點是衛教、營養優化、戒菸戒酒、合理的疼痛期待與術前運動**；圍手術期採**按時給予的多模式鎮痛**（減少鴉片類用量）。", "peropt": {"A": "對。整形外科的 ERAS 方案已證實顯著改善術後恢復。", "B": "對。ERAS 可分為術前、圍手術期、術中、術後四類介入。", "C": "對。術前階段聚焦衛教、營養、戒菸戒酒、合理疼痛期待與術前運動。", "D": "對。圍手術期以按時（scheduled）給予的多模式鎮痛為核心。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S15"}, {"id": "NG-105", "stem": "Which statements about the thoracodorsal artery perforator (TDAP) flap are true? (複選)", "opts": {"A": "The TDAP flap is one of the main surgical options in immediate or delayed partial breast reconstruction when a volume replacement technique is required", "B": "In the event that the volume obtained from the TDAP flap is insufficient, additional fat grafting may be performed to increase volume using the TDAP flap as an autologous scaffold.", "C": "The TDAP flap offers an alternative for patients in whom abdominal flaps are high-risk or unavailable", "D": "The TDAP flap could be a primary option in patients with small to medium breast size.", "E": "The benefits include avoidance of microsurgery, reduced operative time, reliability of the procedure, low morbidity of the donor area, and efficacy of the technique."}, "ans": "ABCDE", "multi": true, "years": ["114", "115"], "cite": "Neligan, 5th Edition, vol.5, Ch46", "conflict": "", "etype": "ai", "expl": "", "key": "TDAP 皮瓣在**部分乳房重建（volume replacement）**的五項優點全對：可用於即時或延遲重建、體積不足時可以 TDAP 當自體支架再加脂肪移植、是腹部皮瓣高風險或不可用時的替代方案、對中小型乳房可作首選、且**免顯微手術、手術時間短、可靠、供區傷害低**。", "peropt": {"A": "對。TDAP 是需要體積置換技術時，即時或延遲部分乳房重建的主要選項之一。", "B": "對。TDAP 體積不足時，可作為血管化的自體支架再加脂肪移植增量。", "C": "對。腹部皮瓣風險高或不可用時（既往手術、瘦削、需保留腹部），TDAP 為替代方案。", "D": "對。中小型乳房的部分缺損，TDAP 可作為首選。", "E": "對。優點包括免除顯微吻合、手術時間縮短、術式可靠、供區傷害低。"}, "src": "NG", "sub": "S11"}, {"id": "NG-095", "stem": "Which of the following statements is NOT an indication or selection criterion for a Superficial Inferior Epigastric Artery (SIEA) flap in breast reconstruction?", "opts": {"A": "The patient can safely tolerate 5–12 hours of general anesthesia and has no known history of an unmanaged hypercoagulable state.", "B": "The patient has a surgical history of a previous full abdominoplasty or a comprehensive panniculectomy.", "C": "Intraoperative exploration confirms that the external diameter of the SIEA trunk is greater than 1.5 mm.", "D": "The lower abdominal skin paddle remains well-perfused after temporarily occluding the deep inferior epigastric perforators.", "E": "None of the above."}, "ans": "B", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch32, p415-416", "conflict": "", "etype": "ai", "expl": "", "key": "SIEA 皮瓣選用條件：SIEA 外徑 >1.5 mm、暫時夾閉 DIEP 穿通枝後皮島仍灌流良好、病人可耐受長時間麻醉且無未控制的高凝狀態。既往 abdominoplasty 或 panniculectomy 已離斷 SIEA/SIEV，是禁忌而非適應症。", "peropt": {"A": "是選用條件。SIEA 手術耗時，病人需能耐受 5–12 小時全身麻醉，且無未處理的高凝狀態（SIEA 蒂細、易栓塞）。", "B": "正解（非適應症）。先前全腹整形或大範圍脂膜切除已破壞 SIEA/SIEV，無法取瓣。", "C": "是選用條件。術中確認 SIEA 主幹外徑 >1.5 mm 才有足夠灌流。", "D": "是選用條件。暫時阻斷深層穿通枝後皮島仍灌流良好，證明 SIEA 單獨可供養。", "E": "B 明確為非適應症，故不選 None。"}, "src": "NG", "sub": "S13"}, {"id": "NG-050", "stem": "Regarding the use of gluteal free flaps for autologous breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "Gluteal tissue may be harvested based on either the superior gluteal artery perforator (SGAP) system or the inferior gluteal artery perforator (IGAP) system.", "B": "The main disadvantage of the IGAP flap is that its microvascular dissection must be performed adjacent to the sciatic nerve.", "C": "The primary recipient vessel choice for SGAP breast reconstruction is the internal mammary artery and vein.", "D": "The thoracodorsal vessels serve as acceptable alternative recipient vessels if the primary chest wall recipient site is unavailable.", "E": "The superior gluteal vessels exit the pelvis and enter the gluteal region through the lesser sciatic foramen."}, "ans": "E", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch46", "conflict": "", "etype": "ai", "expl": "", "key": "臀部游離皮瓣：superior gluteal 血管經 **greater sciatic foramen（大坐骨孔）於梨狀肌上方**離開骨盆；lesser sciatic foramen 走的是 pudendal 血管與 obturator internus 肌腱，與 SGAP 無關。IGAP 的最大缺點是剝離貼近坐骨神經；SGAP 首選受區為內乳血管，胸背血管為備案。", "peropt": {"A": "正確。臀部組織可依 SGAP 或 IGAP 系統取瓣。", "B": "正確。IGAP 主要缺點即顯微剝離緊鄰坐骨神經。", "C": "正確。SGAP 重建的首選受區血管為 internal mammary artery/vein（蒂短，需居中的受區）。", "D": "正確。若胸壁首選受區不可用，胸背血管為可接受的替代受區。", "E": "正解（錯述）。superior gluteal 血管經 **greater** sciatic foramen 於梨狀肌上緣穿出，不是 lesser sciatic foramen。"}, "src": "NG", "sub": "S14"}, {"id": "NG-049", "stem": "Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?", "opts": {"A": "The primary perforators of the PAP flap typically emerge via a septo-cutaneous course located between the gracilis and adductor magnus muscles.", "B": "The PAP flap provides an anatomically reliable and long vascular pedicle (averaging 9–13 cm), which is significantly longer than that of a Transverse Upper Gracilis (TUG) flap.", "C": "The donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.", "D": "Unlike the DIEP flap, the PAP flap has a severely limited vascular pedicle length of approximately 4 to 5 cm, frequently requiring a vein graft for breast reconstruction.", "E": "Common postoperative complications include fat necrosis at the recipient site, as well as delayed wound healing or seroma formation at the thigh donor site."}, "ans": "D", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch36, p451-452", "conflict": "", "etype": "ai", "expl": "", "key": "PAP 皮瓣的蒂長是關鍵數字：平均 **9–13 cm**，明顯長於 TUG（約 5.5–7 cm），足以直接吻合內乳血管而不需靜脈移植。題目 D 稱其蒂長僅 4–5 cm 且常需靜脈移植，是與事實相反的錯述。", "peropt": {"A": "正確。PAP 主要穿通枝多以 septocutaneous 路徑，行於 gracilis 與 adductor magnus 之間穿出。", "B": "正確。PAP 蒂長平均 9–13 cm，顯著長於 TUG。", "C": "正確。供區疤痕可隱藏於大腿上方與臀下皺褶。", "D": "正解（錯述）。PAP 蒂長並非 4–5 cm，也不常需靜脈移植；此為 TUG 的短蒂特性被錯置於 PAP。", "E": "正確。常見併發症為受區脂肪壞死、供區傷口癒合延遲與血清腫。"}, "src": "NG", "sub": "S14"}, {"id": "NG-047", "stem": "Regarding the Lumbar Artery Perforator (LAP) flap, which statement is FALSE?", "opts": {"A": "The flap tissue is harvested from the lower back or flank region.", "B": "Surgeons only use the upper L1 and L2 arteries, while L3 and L4 are never used.", "C": "The blood vessels pass through the deep muscles of the lower back.", "D": "A common donor-site complication is fluid collection (seroma) in the back."}, "ans": "B", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch37, p461", "conflict": "", "etype": "ai", "expl": "", "key": "Lumbar artery perforator（LAP）皮瓣：腰動脈是腹主動脈的體節分支（相當於胸主動脈的 posterior intercostal arteries），**L1–L4 均可使用**，實務上以第 3、4 腰動脈穿通枝最常用。題目說「只用 L1、L2，L3/L4 從不使用」為錯述。本題僅 A–D 四個選項。", "peropt": {"A": "正確。LAP 取自下背/腰側（俗稱 love handles）的軟組織。", "B": "正解（錯述）。L1–L4 腰動脈穿通枝皆可能被使用，臨床上反而以較低位者（L3、L4）為主，並非「只用 L1、L2」。", "C": "正確。腰動脈穿通枝行經下背深層肌群（穿過 quadratus lumborum、erector spinae），這也是 LAP 剝離困難、蒂短的原因。", "D": "正確。供區血清腫（seroma）是最常見的併發症，因下背筋膜下潛在腔隙大。"}, "src": "NG", "sub": "S14"}, {"id": "NG-068", "stem": "Which is INCORRECT about stacked and conjoined flap for breast reconstruction?", "opts": {"A": "When available tissue from a single donor area is inadequate, stacked or conjoined multi-pedicle flaps from a single or multiple donor area(s) can provide a fully autologous-only breast reconstruction.", "B": "In unilateral cases, the most common option is the stacked or conjoined bi-pedicled deep inferior epigastric perforator (DIEP) flap supplied by two anatomically distinct vascular pedicles.", "C": "In bilateral breast reconstructions, a combination of flaps such as DIEP flap, PAP flap, TUG flap, LAP flap, and IGAP/SGAP flap can be used in the form of a two-flap reconstruction to provide a volume appropriate breast reconstruction.", "D": "Radiation deficits that create an imbalance of chest wall soft tissue and skin availability benefit from a multi-flap breast reconstruction which affords an opportunity to improve radiation-related changes.", "E": "All of above are correct"}, "ans": "C", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch40, p481", "conflict": "stacked/conjoined:單側=雙蒂DIEP,雙側=four-flap。本題C寫two-flap為錯;NG-081同句寫four-flap為對", "etype": "ai", "expl": "", "key": "Stacked／conjoined 皮瓣的關鍵數字：**雙側重建時是「四皮瓣（four-flap）」重建**（每側各兩個皮瓣），不是 two-flap。單側最常見的是雙蒂 stacked DIEP。故 C 為錯述。與 NG-081 為正反題（NG-081 的 C 寫 four-flap 故全對）。", "peropt": {"A": "正確。單一供區組織不足時，可用單一或多個供區的多蒂 stacked／conjoined 皮瓣達成完全自體重建。", "B": "正確。單側最常見的選項是由兩條解剖上獨立血管蒂供養的雙蒂 stacked／conjoined DIEP。", "C": "正解（錯述）。雙側重建時是以 **four-flap**（每側兩瓣）方式組合 DIEP／PAP／TUG／LAP／IGAP/SGAP，而非 two-flap。", "D": "正確。放療造成胸壁軟組織與皮膚不足時，多皮瓣重建可同時改善放射相關變化。", "E": "C 為錯述，不選 All of above。"}, "src": "NG", "sub": "S15"}, {"id": "NG-036D", "stem": "Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?", "opts": {"A": "1-2 months", "B": "3-5 months", "C": "6-12 months", "D": "More than one year", "E": "More than 2 years."}, "ans": "C", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch48 p573", "conflict": "115年C選項改為「6-12 months」(112-114年為6-9);概念:放療後至少半年、一年內", "etype": "ai", "expl": "", "key": "⚠ **115 年版把 C 選項改成「6-12 months」而答案仍是 C**——這是本題族中唯一的實質變動。也就是說 115 年的官方立場把窗口放寬為 **6–12 個月**（112–114 年為 6–9 個月）。作答時以該年選項為準；概念上記住「**放療後至少半年、一年內**」這個區間，不要死記 6–9。", "peropt": {"A": "太早。1–2 個月仍在急性放射性發炎期。", "B": "太早。3–5 個月組織尚未恢復。", "C": "正解（本年）。放療結束後 **6–12 個月**。注意 112–114 年同題的正解寫作「6–9 個月」。", "D": "過晚。超過一年（本年 C 已含 12 個月）不再是最佳時機。", "E": "過晚。超過 2 年纖維化定型。"}, "src": "NG", "sub": "S15"}, {"id": "NG-063", "stem": "What is the stage of non-pitting edema in the setting of fibrotic subcutaneous tissue and overlying skin by International Society of Lymphology (ISL) staging system?", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "C", "multi": false, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch47 p557", "conflict": "ISL Stage跨年矛盾:同題幹NG-064(114年)判Stage III,本題(115年)判Stage II。分界在有無象皮病外觀", "etype": "ai", "expl": "", "key": "⚠ **跨年答案矛盾**：本題（115 年）將「非凹陷性水腫＋皮下與皮膚纖維化」判為 **Stage II**（晚期 Stage II 確實已不再凹陷、開始纖維化）；但 NG-064（114 年）同一題幹判為 **Stage III**。ISL 原文中「late stage II 不再凹陷」與「stage III 為象皮病」的界線本就模糊。作答時以該年答案鍵為準，概念上抓「**有無象皮病外觀（皮膚增厚、疣狀贅生）**」來分辨。", "peropt": {"A": "Stage 0：潛伏期，無可見水腫。", "B": "Stage I：凹陷性水腫，抬高可消退。", "C": "正解（本年，115）。晚期 Stage II：不再凹陷、皮下組織纖維化出現。", "D": "Stage III：象皮病，皮膚增厚、疣狀增生。⚠ NG-064（114 年）同一題幹的正解為此。", "E": "ISL 無 Stage IV。"}, "src": "NG", "sub": "S17"}, {"id": "NG-182", "stem": "關於Nipple-Areola-Complex (NAC) reconstruction 重建，下列敘述何者正確？ (複選)", "opts": {"A": "Areola正常直徑約為4cm，Nipple正常直徑約為1.3cm。", "B": "Upper Pole : Lower Pole Ratio約為55% : 45% 。", "C": "NAC 大約位於Mid-humerus level，相當於手臂自然下垂時上臂中段高度。", "D": "常見的Local flap為C-V flap 、Skate flap 、Star flap", "E": "乳暈重建最常見的方法為Intradermal tattoo"}, "ans": "ACDE", "multi": true, "years": ["115"], "cite": "Neligan, 5th Edition, vol.5, Ch51, p604-605", "conflict": "", "etype": "ai", "expl": "", "key": "NAC 重建四項正確：乳暈直徑約 **4 cm**、乳頭直徑約 **1.3 cm**；NAC 約位於 **mid-humerus level**（手臂自然下垂時上臂中段高度）；常用局部皮瓣為 **C-V flap、Skate flap、Star flap**；乳暈重建最常用 **intradermal tattoo**。錯的是 B——上極:下極應為 **45%:55%**（與批 6 的隆乳題同一數字）。", "peropt": {"A": "對。乳暈直徑約 4 cm，乳頭直徑約 1.3 cm。", "B": "錯。上極:下極比例應為 **45%:55%**（下極較飽滿），非 55%:45%。", "C": "對。NAC 約位於 mid-humerus level，是術中定位的實用參考。", "D": "對。常見局部皮瓣為 C-V flap、Skate flap、Star flap。", "E": "對。乳暈重建最常見的方法是真皮內刺青（intradermal tattoo）。"}, "src": "NG", "sub": "S16"}, {"id": "NG-044", "stem": "In the context of posterior trunk wound reconstruction, which of the following statements about the omental flap is TRUE?", "opts": {"A": "Its vascular pedicle is too short for use in reaching the lumbar region.", "B": "It is contraindicated in spinal instrumentation due to risk of infection.", "C": "It is best suited for patients with prior intra-abdominal malignancy due to immunologic benefit.", "D": "It can be transposed through the retroperitoneum and delivered to the posterior trunk via the 12th rib approach.", "E": "Its harvest typically requires sharp dissection of all peritoneal attachments and ligation of the middle colic vessels."}, "ans": "D", "multi": false, "years": ["114"], "cite": "Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 5. Chap 12. P 378.", "conflict": "", "etype": "ai", "expl": "", "key": "大網膜皮瓣用於**後軀幹（背部）重建**時，可經**腹膜後（retroperitoneum）轉位，並由第 12 肋入路送達後軀幹**。其血管蒂（胃網膜動脈）長度足以到達腰部；它反而是脊椎內固定感染時的救援選項（富含淋巴組織與抗感染能力）。", "peropt": {"A": "錯。以胃網膜血管為蒂的大網膜蒂長充足，可到達腰部。", "B": "錯。大網膜富含淋巴組織與免疫細胞，正是脊椎內固定感染時的**救援**選項，非禁忌。", "C": "錯。既往腹腔內惡性腫瘤反而是相對禁忌（腹腔沾黏、腫瘤播散疑慮），不存在「免疫學好處」。", "D": "正解。可經腹膜後轉位，由第 12 肋入路送達後軀幹。", "E": "錯。取瓣時保留一側胃網膜血管作為蒂，並非結紮中結腸血管（那是結腸的血供）。"}, "src": "NG", "sub": "S17"}, {"id": "NG-099", "stem": "Which of the following statements is not the indications for SIEA flap for breast reconstruction?", "opts": {"A": "The patient can safely tolerate 5–12 h of general anesthesia and does not have a known hypercoagulable state", "B": "History of previous abdominoplasty or panniculectomy", "C": "SIEA >1.5mm in external diameter", "D": "SIEA flap perfused well after temporarily occluded DIEP perforators", "E": "None of above"}, "ans": "B", "multi": false, "years": ["114"], "cite": "Neligan, 5th Edition, vol.5, Ch32, p415-416", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-095 為同一題的前一版本（114 年）：SIEA 三項核心選用條件為耐受長時麻醉／無高凝狀態、SIEA 外徑 >1.5 mm、夾閉 DIEP 穿通枝後仍灌流良好。既往腹整形／脂膜切除是禁忌。", "peropt": {"A": "是適應條件（可耐受 5–12 小時麻醉、無已知高凝狀態）。", "B": "正解（非適應症）。既往 abdominoplasty 或 panniculectomy 已離斷 SIEA。", "C": "是適應條件。SIEA 外徑須 >1.5 mm。", "D": "是適應條件。暫時阻斷深層穿通枝後皮瓣仍灌流良好。", "E": "存在非適應症選項，不選 None。"}, "src": "NG", "sub": "S13"}, {"id": "NG-113", "stem": "下列何者為 Alternative flaps for breast reconstruction ?", "opts": {"A": "Transverse upper gracilis free flap (TUG)", "B": "Superior gluteal artery free flap (SGAP)", "C": "Inferior gluteal artery free flap (IGAP)", "D": "Lumbar artery perforator flap (LAP)", "E": "All of the above"}, "ans": "E", "multi": false, "years": ["114"], "cite": "Neligan, 5th Edition, vol.5, Ch33, p420-421", "conflict": "", "etype": "ai", "expl": "", "key": "腹部組織不可用時的替代游離皮瓣「以上皆是」：TUG、SGAP、IGAP、LAP。與批 2 的 NG-114（另加 DFAP／PAP）為同一份清單。核心記憶：**大腿（TUG／PAP）、臀部（SGAP／IGAP）、腰部（LAP）** 三大區域。", "peropt": {"A": "是。TUG，橫向股薄肌上部皮瓣。", "B": "是。SGAP，上臀動脈穿通枝皮瓣。", "C": "是。IGAP，下臀動脈穿通枝皮瓣。", "D": "是。LAP，腰動脈穿通枝皮瓣。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S17"}, {"id": "NG-191B", "stem": "關於profunda artery perforator flap (PAP flap), 以下何者錯誤 ?", "opts": {"A": "The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh", "B": "The dissection of the PAP flap is straightforward through the adductor longus muscle", "C": "The flap donor site well hidden
