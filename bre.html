<style>

background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}

.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}

.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id": "GS-014", "stem": "Which of the following best represents the existing Food and Drug Administration recommendation on screening for silent ruptures in silicone implants used for breast augmentation?", "opts": {"A": "MRI annually after placement", "B": "MRI 2 years after placement and then every 2 years thereafter", "C": "MRI 3 years after placement and then every 2 years thereafter", "D": "MRI at 5 years and then as needed", "E": "MRI only if palpable changes in silicone"}, "ans": "C", "multi": false, "years": ["110", "111", "112"], "cite": "Grabb and Smith's, 8th Chapter 55 p563", "conflict": "字母浮動:FDA矽膠MRI「3年後首次,其後每2年」;本題答案C,GS-023同概念答案D", "etype": "ai", "expl": "", "key": "FDA 對矽膠義乳「無症狀破裂（silent rupture）」的篩檢建議：**置入後第 3 年做第一次 MRI，之後每 2 年一次**。理由是矽膠破裂常無臨床徵象，理學檢查無法偵測。⚠ 本題答案 C，但 GS-023（中文版同題）答案是 D——選項排列不同，數字相同，勿背字母。", "peropt": {"A": "每年做 MRI 過於頻繁，非 FDA 建議。", "B": "第 2 年開始並非 FDA 建議的起始時間點。", "C": "正解。置入後 **3 年**首次 MRI，之後**每 2 年**一次。", "D": "第 5 年才做過晚，且「as needed」不符無症狀篩檢的目的。", "E": "錯。silent rupture 的定義就是摸不出來，等到可觸及變化才檢查已失去篩檢意義。"}, "src": "GS", "sub": "S02"}, {"id": "GS-024", "stem": "下列哪個breast reduction的術後併發症發生率(post operation complication rate)正確?", "opts": {"A": "Delay wound healing: 1%", "B": "Hematoma: 4%", "C": "Seroma: 2%", "D": "Nipple areola loss: 10%", "E": "Loss nipple sensation: 10-15%"}, "ans": "B", "multi": false, "years": ["110"], "cite": "Grabb and Smith's, 8th Chapter 56 p572-574", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-021 同一張發生率卡片（110 年版）：唯一正確的仍是 **Hematoma 4%**。把五個數字綁成一組記：**10 / 4 / 10–15 / 1 / 2**（延遲癒合、血腫、血清腫、NAC 缺損、感覺喪失）。", "peropt": {"A": "錯。延遲癒合約 10%。", "B": "正解。血腫約 4%。", "C": "錯。血清腫約 10–15%。", "D": "錯。NAC 缺損約 1%。", "E": "錯。乳頭感覺喪失約 2%，不是 10–15%。"}, "src": "GS", "sub": "S07"}, {"id": "GS-015", "stem": "Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?", "opts": {"A": "Amphetamines, anabolic steroids, marijuana", "B": "Digoxin, ACE inhibitors, spironolactone", "C": "Benzodiazepines, risperidone, haloperidol", "D": "Testosterone, Estrogen, prednisone", "E": "Cephalosporins, metronidazole, isoniazid"}, "ans": "E", "multi": false, "years": ["110", "112", "114"], "cite": "Grabb and Smith's, 8th Chapter 57 p576", "conflict": "男性女乳症藥物題四種字母:GS-015=E、GS-016=C、GS-022=A、NG-082=E。判準:整組都是抗生素者即為正解", "etype": "ai", "expl": "", "key": "與男性女乳症相關的藥物四大類：**娛樂性／賀爾蒙類**（安非他命、合成類固醇、大麻、海洛因）、**心血管類**（digoxin、ACE inhibitors、spironolactone）、**精神科用藥**（benzodiazepines、risperidone、haloperidol）、**內分泌類**（testosterone、estrogen、prednisone）。**抗生素類（cephalosporins、metronidazole、isoniazid）不相關**，故為正解。", "peropt": {"A": "相關。安非他命、合成類固醇、大麻皆與男性女乳症相關。", "B": "相關。Digoxin、ACE inhibitors、spironolactone（抗雄性素作用）。", "C": "相關。Benzodiazepines、risperidone、haloperidol（經高泌乳素血症）。", "D": "相關。外源性睪固酮（周邊芳香化為雌激素）、雌激素、prednisone。", "E": "正解（不相關）。Cephalosporins、metronidazole、isoniazid 屬抗生素／抗結核藥。註：少數文獻曾提及 isoniazid、metronidazole 的個案報告，但標準列表不含此組。"}, "src": "GS", "sub": "S08"}, {"id": "GS-009", "stem": "In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate to resect?", "opts": {"A": "Rib1", "B": "Rib2", "C": "Rib3", "D": "Rib4", "E": "Rib5"}, "ans": "C", "multi": false, "years": ["110", "112"], "cite": "Grabb and Smith's, 8th Chapter 60 p609", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-008 為同一知識點的鏡像題：顯露 IMA/IMV 時最適合切除的是第 3 肋軟骨。原因是在第 2–3 肋間以下，IMV 尚未分岔為兩條細支，管徑足夠吻合；同時保留第 2 肋可維持胸壁輪廓。", "peropt": {"A": "第 1 肋位置太高且被鎖骨覆蓋，無法作為顯露入口。", "B": "第 2 肋切除會造成上胸壁明顯凹陷，且該處 IMV 較細。", "C": "正解。第 3 肋軟骨切除是標準做法，顯露長度足夠、IMV 口徑理想、胸壁輪廓缺損不明顯。", "D": "第 4 肋以下 IMV 常已分為兩條細支，口徑不利吻合。", "E": "第 5 肋位置過低，且愈往下 IMA 管徑愈小。"}, "src": "GS", "sub": "S13"}, {"id": "GS-010", "stem": "Patients with the BRCA gene mutations are at increased risk of developing breast and ovarian cancer as well as which of the other cancers listed below?(複選)", "opts": {"A": "Pancreatic cancer", "B": "Fallopian tube cancer", "C": "Prostate cancer", "D": "Lymphoma", "E": "Basal cell carcinoma"}, "ans": "ABC", "multi": true, "years": ["110", "111", "112"], "cite": "Grabb and Smith's, 8th Chapter 58 p587", "conflict": "", "etype": "ai", "expl": "", "key": "BRCA 突變除乳癌、卵巢癌外，還增加**胰臟癌、輸卵管癌、攝護腺癌**的風險（BRCA2 與男性乳癌、攝護腺癌關聯尤強）。**淋巴瘤與基底細胞癌與 BRCA 無關**。此題於 110、111、112、114 四個年份重複出現，屬高頻。", "peropt": {"A": "是。胰臟癌風險升高（尤其 BRCA2）。", "B": "是。輸卵管癌（與卵巢／腹膜癌同一譜系）。", "C": "是。攝護腺癌，男性 BRCA2 帶因者風險明顯升高。", "D": "否。淋巴瘤與 BRCA 突變無關。", "E": "否。基底細胞癌與 BRCA 突變無關（與 PTCH1／日曬相關）。"}, "src": "GS", "sub": "S17"}, {"id": "GS-028", "stem": "管狀乳房(Tuberous breast)為先天性乳房畸形,以下關於管狀乳房的常見表徵與臨床處置,下列敘述何者為非？", "opts": {"A": "乳房基底部直徑縮小", "B": "乳房下緣線(inframammary fold)向下移位", "C": "手術時最常使用的切口為乳暈周圍切口(periareolar incision)", "D": "手術重建時,原本的乳房下緣線需修補(obliteration old IMF),避免後續產生double-bubble deformity", "E": "乳房下緣線 (inflamammary fold)到乳房距離的距離縮短"}, "ans": "B", "multi": false, "years": ["110"], "cite": "Grabb and Smith's 第8版, Ch62", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-017 同一考點的中文版：tuberous breast 的 IMF **向上（頭側）移位**，故「向下移位」為錯述。重建三要點：① periareolar 切口最常用；② 手術中必須破壞（obliterate）原本過高的 IMF，否則術後出現 double-bubble；③ nipple-to-IMF 距離縮短。", "peropt": {"A": "正確。乳房基底直徑縮小是核心病理。", "B": "正解（錯述）。IMF 是**向上移位**（過高），不是向下移位。", "C": "正確。手術最常採乳暈周圍切口，可同時處理疝出的實質與 NAC 直徑。", "D": "正確。必須破壞原本過高的 IMF 並重新定位，否則義乳撐開下極時會與舊 IMF 形成 double-bubble。", "E": "正確。因 IMF 過高，nipple-to-IMF 距離縮短。"}, "src": "GS", "sub": "S09"}, {"id": "GS-011", "stem": "Poland syndrome表現為合併上肢及乳房的畸形,下列有關Poland syndrome的敘述,何者為非？", "opts": {"A": "大部分患者為單側表現，且左側居多", "B": "典型表徵為胸大肌發育不全或缺失", "C": "最佳重建時間為青春期前", "D": "自體組織重建最常使用的是闊背肌皮瓣(pedicled latissimus dorsi)", "E": "可能合併腎臟的異常,需要安排腎臟超音波的檢查"}, "ans": "C", "multi": false, "years": ["110"], "cite": "Grabb and Smith's 第8版, Ch62", "conflict": "Poland好發於右側(男性2-3:1);此題選項A「左側居多」為錯誤內容(非正解但敘述有誤),GS111同題作「右側居多」　Poland統一結論:單側、右側好發、男性2-3:1、缺pectoralis major胸骨頭(sternal head)、肋骨2-4、subclavian artery血流中斷序列　⚠GS110選項A「左側居多」為誤植,GS111已改為右側　⚠本題(110年)選項A「左側居多」為誤植;GS-011B(111年)已勘誤為「右側居多」", "etype": "ai", "expl": "", "key": "Poland syndrome 重建時機的核心：應等乳房與胸壁發育完成（**青春期後**）再做確定性重建，過早手術會被後續生長破壞對稱。故「最佳重建時間為青春期前」為錯述。⚠ 本題選項 A「左側居多」與教科書相反——Poland 為**右側好發**、男性 2–3:1；GS111 同題已改寫為「右側居多」。作答仍選 C，但 A 的內容請記正確版本。", "peropt": {"A": "本題（110 年版）寫「左側居多」屬誤植，正確為 **右側好發**。GS111 同題已修正為右側。此選項非答案，但內容錯誤，勿當作正確知識記憶。", "B": "正確。典型表徵即 pectoralis major 的**胸骨頭（sternal head）**發育不全或缺失，連帶前腋褶消失。", "C": "正解（錯述）。重建應待乳房與胸壁發育成熟（青春期後）再進行；青春期前手術會被後續生長破壞。", "D": "正確。自體重建最常用 pedicled latissimus dorsi flap（同時重建前腋褶輪廓）。", "E": "正確。Poland 可合併腎臟異常（如腎發育不全），建議安排腎臟超音波篩檢。"}, "src": "GS", "sub": "S09"}, {"id": "GS-027", "stem": "男性女乳症(Gynecomastia)為最常見的男性乳房增生疾病,下列有關男性女乳症的描述,何者為非？", "opts": {"A": "青春期時表現的病人大多找不到明顯病因(Idiopathic)", "B": "和體內雌激素(Estrogen)的量有關", "C": "Klinefelter syndrome合併男性女乳症的病人,其乳癌的風險明顯升高,因此建議需做乳房切除", "D": "症狀可能有自發性回覆(resolve spontaneously),但若持續超過半年,則建議手術", "E": "常用的手術方式為抽脂合併腺下組織切除(excision of subglandular tissue)"}, "ans": "D", "multi": false, "years": ["110", "111"], "cite": "Grabb and Smith's 第8版, Ch62", "conflict": "", "etype": "ai", "expl": "", "key": "男性女乳症的錯述在 C：**Klinefelter syndrome 病人乳癌風險確實顯著升高（約 20–50 倍），但並不因此常規建議預防性乳房切除**——臨床做法是加強監測。其餘：青春期型多為原發性（idiopathic）、與體內雌激素量相關、可自發消退但持續逾半年建議手術、常用術式為抽脂合併腺下組織切除。", "peropt": {"A": "正確。青春期表現者多數找不到明確病因。", "B": "正確。與體內雌激素／雄性素比值失衡相關。", "C": "正解（錯述）。Klinefelter 病人乳癌風險雖顯著升高，但**不建議常規預防性乳房切除**，以密切監測為主。", "D": "正確（依本年答案鍵）。可能自發消退，但持續超過半年則建議手術。", "E": "正確。常用術式為抽脂合併腺體下組織切除（單靠抽脂無法移除緻密腺體）。"}, "src": "GS", "sub": "S08"}, {"id": "GS-021", "stem": "下列Breast reduction術後併發症發生率(post operation complication rate)何者正確?", "opts": {"A": "Delayed wound healing 1%", "B": "Hematoma 4%", "C": "Seroma 2%", "D": "Nipple areola loss 10%", "E": "Loss of nipple sensation 20%"}, "ans": "B", "multi": false, "years": ["111"], "cite": "Grabb and Smith's, 8th Chapter 56 p572-574", "conflict": "縮乳併發症率卡片:延遲癒合10%/血腫4%/血清腫10-15%/NAC缺損1%/感覺喪失2%(與GS-019原檔詳解一致)", "etype": "ai", "expl": "", "key": "縮乳術後併發症發生率卡片（與 GS-019 原檔詳解一致）：**延遲癒合 10%｜血腫 4%｜血清腫 10–15%｜NAC 缺損 1%｜乳頭感覺喪失 2%**。本題唯一正確的是「Hematoma 4%」。", "peropt": {"A": "錯。延遲傷口癒合約 **10%**，不是 1%。", "B": "正解。血腫約 **4%**。", "C": "錯。血清腫約 **10–15%**，不是 2%。", "D": "錯。乳頭乳暈缺損約 **1%**，不是 10%。", "E": "錯。乳頭感覺喪失約 **2%**，不是 20%。"}, "src": "GS", "sub": "S07"}, {"id": "GS-016", "stem": "Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?", "opts": {"A": "Amphetamines, anabolic steroids, marijuana", "B": "Digoxin, ACE inhibitors, spironolactone", "C": "Cephalosporins, metronidazole, isoniazid", "D": "Benzodiazepines, risperidone, haloperidol", "E": "Testosterone, Estrogen, prednisone"}, "ans": "C", "multi": false, "years": ["111"], "cite": "Grabb and Smith's, 8th Chapter 57 p576", "conflict": "同概念不同字母(見GS-015註記)", "etype": "ai", "expl": "", "key": "與 GS-015 完全相同的知識點，選項換位：**抗生素組（cephalosporins、metronidazole、isoniazid）為不相關者**，此年答案是 **C**。同一題在 110/112/114 年答案是 E、111 年是 C、113 年是 A、115 年是 E——四個字母、同一個概念。", "peropt": {"A": "相關。安非他命、合成類固醇、大麻。", "B": "相關。Digoxin、ACE inhibitors、spironolactone。", "C": "正解（不相關）。抗生素／抗結核藥組。", "D": "相關。Benzodiazepines、risperidone、haloperidol。", "E": "相關。Testosterone、estrogen、prednisone。"}, "src": "GS", "sub": "S08"}, {"id": "GS-009B", "stem": "In preparation for microvascular reconstruction of the left breast with a DIEP flap (pedicle: 2.5 mm artery/3.0 mm vein), exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate to resect?", "opts": {"A": "Rib 1", "B": "Rib 2", "C": "Rib 3", "D": "Rib 4", "E": "Rib 5"}, "ans": "C", "multi": false, "years": ["111"], "cite": "Grabb and Smith's, 8th Chapter 60 p609", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-009 同一知識點的 111 年版（題幹多給了蒂部口徑 2.5 mm 動脈／3.0 mm 靜脈）：顯露 IMA/IMV 時應切除 **第 3 肋軟骨**。此處 IMV 尚未分岔為細支，口徑足以與 3.0 mm 皮瓣靜脈匹配；第 4 肋以下 IMV 常分為兩條細支。", "peropt": {"A": "第 1 肋被鎖骨覆蓋，無法安全顯露。", "B": "第 2 肋切除造成上胸壁明顯凹陷，且該處 IMV 較細。", "C": "正解。第 3 肋軟骨切除為標準做法，IMV 口徑與 3.0 mm 皮瓣靜脈相匹配。", "D": "第 4 肋以下 IMV 常已分岔為兩條細支，口徑不足。", "E": "第 5 肋位置過低，IMA 管徑亦漸細。"}, "src": "GS", "sub": "S13"}, {"id": "GS-028B", "stem": "管狀乳房(Tuberous breast)為先天性乳房畸形,以下關於管狀乳房的常見表徵與臨床處置,下列敘述何者為非？", "opts": {"A": "乳房基底部直徑縮小", "B": "乳房下緣線(inframammary fold)向下移位", "C": "手術時最常使用的切口為乳暈周圍切口(periareolar incision)", "D": "手術重建時,原本的乳房下緣線需修補(obliteration old IMF),避免後續產生 double-bubble deformity", "E": "乳房下緣線(inframammary fold)到乳房距離的距離縮短"}, "ans": "B", "multi": false, "years": ["111"], "cite": "Grabb and Smith's 8th, Ch62", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-028 相同（111 年版，選項 E 錯字已修正）：tuberous breast 的 IMF **向上（頭側）移位**，故「向下移位」為錯述。三個必記：基底直徑縮小、IMF 上移、nipple-to-IMF 距離縮短；手術須破壞舊 IMF 否則出現 double-bubble。", "peropt": {"A": "正確。乳房基底直徑縮小是核心病理。", "B": "正解（錯述）。IMF 是**向上移位**（過高），不是向下。", "C": "正確。最常用乳暈周圍切口，可同時處理疝出實質與過大的 NAC。", "D": "正確。必須破壞並重新定位原本過高的 IMF，避免 double-bubble。", "E": "正確。因 IMF 過高，乳頭到 IMF 的距離縮短。"}, "src": "GS", "sub": "S09"}, {"id": "GS-011B", "stem": "Poland syndrome 表現為合併上肢及乳房的畸形,下列有關 Poland syndrome 的敘述,何者為非？", "opts": {"A": "大部分患者為單側表現，且右側居多", "B": "典型表徵為胸大肌發育不全或缺失", "C": "最佳重建時間為青春期前", "D": "自體組織重建最常使用的是闊背肌皮瓣(pedicled latissimus dorsi)", "E": "可能合併腎臟的異常,需要安排腎臟超音波的檢查"}, "ans": "C", "multi": false, "years": ["111"], "cite": "Grabb and Smith's 8th, Ch62", "conflict": "GS110同題選項A誤植「左側居多」,本題(111年)已勘誤為「右側居多」。Poland右側好發、男性2-3:1、缺sternal head", "etype": "ai", "expl": "", "key": "⚠ **本題（111 年）是 GS-011（110 年）的勘誤版**：選項 A 已從「左側居多」改為 **「右側居多」**，這才是正確敘述。答案仍是 C——**Poland syndrome 的重建應待胸壁與乳房發育成熟（青春期後）**，青春期前手術會被後續生長破壞。把 110／111 兩題並列比對，即可確認「右側好發」是教科書立場。", "peropt": {"A": "正確（本年已勘誤）。Poland 多為單側，且**右側好發**（男性中約 2–3:1）。110 年同題此處誤植為「左側居多」。", "B": "正確。典型為 pectoralis major 的**胸骨頭（sternal head）**發育不全或缺失，鎖骨頭多保留。", "C": "正解（錯述）。最佳重建時間是**青春期後**、胸壁與乳房發育成熟時，不是青春期前。", "D": "正確。自體重建最常用帶蒂闊背肌皮瓣，可同時重建前腋褶輪廓。", "E": "正確。可合併腎臟異常，建議安排腎臟超音波。"}, "src": "GS", "sub": "S09"}, {"id": "GS-019", "stem": "Which of the following statements regarding postoperative complication of breast reduction is correct?", "opts": {"A": "Delayed wound healing 1%", "B": "Hematoma 4%", "C": "Seroma 2%", "D": "Nipple areola loss 10%", "E": "Loss of nipple sensation 20%"}, "ans": "B", "multi": false, "years": ["112"], "cite": "Grabb and Smith's, 8th edition, Chapter 56, p572-574", "conflict": "", "etype": "orig", "expl": "Delayed wound healing 10%\nNipple areola loss 1%\nLoss of nipple sensation 2%", "key": "", "peropt": {}, "src": "GS", "sub": "S07"}, {"id": "GS-012", "stem": "Regarding nipple-areolar complex (NAC) reconstruction, which of the following is TRUE?", "opts": {"A": "Reconstruction of the nipple-areolar complex (NAC) is usually performed as soon as possible to restore normal appearance of breast.", "B": "The nipple and areola are reconstructed usually at the same time.", "C": "Maintaining nipple projection is one of the greatest challenges in NAC reconstruction.", "D": "Flap reconstructions, especially centrally based flaps do not retract overtime, and should be designed to match the size required.", "E": "Malposition of the NAC is easily corrected with local transposition flaps without unsightly scarring."}, "ans": "C", "multi": false, "years": ["112"], "cite": "Grabb and Smith's, 8th, Ch 61", "conflict": "", "etype": "ai", "expl": "", "key": "NAC 重建三個原則：① 應在乳房丘（breast mound）形態穩定後才做，不宜「越早越好」；② 乳頭與乳暈通常**分階段**重建；③ **維持乳頭突出度（projection）是最大的挑戰**——所有皮瓣型乳頭都會隨時間回縮，設計時必須刻意過度矯正。", "peropt": {"A": "錯。應待乳房丘穩定、對稱性確定後再重建 NAC，而非盡快進行。", "B": "錯。乳頭與乳暈通常分開、分階段重建（先乳頭，後乳暈刺青或植皮）。", "C": "正解。維持乳頭突出度是 NAC 重建最大的難題。", "D": "錯。皮瓣型（尤其中央蒂）乳頭會隨時間明顯回縮，設計時必須過度矯正而非「剛好符合」所需大小。", "E": "錯。NAC 位置錯置的矯正相當困難，局部轉位皮瓣往往留下明顯疤痕。"}, "src": "GS", "sub": "S16"}, {"id": "GS-017", "stem": "Which of the following is NOT a characteristic of tuberous breast?", "opts": {"A": "Constricted skin envelope in the vertical and horizontal dimensions", "B": "Deficiency in the base diameter with elevated inframammary fold", "C": "Long nipple-to-IMF distance", "D": "Herniation of the breast parenchyma through the areola, resulting in enlarged diameter of the NAC", "E": "Parenchymal hypoplasia and asymmetry"}, "ans": "C", "multi": false, "years": ["112"], "cite": "Grabb and Smith's, 8th, Ch 62", "conflict": "", "etype": "ai", "expl": "", "key": "Tuberous breast 的核心是「基底受限（constricted base）」：基底直徑縮小、IMF **上移（elevated/cranialized）**、因此 **nipple-to-IMF 距離縮短**；乳腺實質經乳暈疝出使 NAC 直徑變大；實質發育不良且常不對稱。故「Long nipple-to-IMF distance」與病理機轉相反。", "peropt": {"A": "是特徵。皮膚囊袋在垂直與水平方向皆受限（constricted skin envelope）。", "B": "是特徵。基底直徑不足合併 IMF 上移。", "C": "正解（非特徵）。因 IMF 上移，nipple-to-IMF 距離應為**縮短**而非拉長。", "D": "是特徵。乳腺實質經乳暈疝出，導致 NAC 直徑增大。", "E": "是特徵。實質發育不良（parenchymal hypoplasia）且常有兩側不對稱。"}, "src": "GS", "sub": "S09"}, {"id": "GS-020", "stem": "一名 35 歲女性前來接受雙側隆乳(breast augmentation)評估。她對光滑的矽膠圓形裝置(smooth, silicone round device)感興趣，並希望將植入物放置在乳房下方，而不是肌肉下方(placed underneath the breast but not the muscle)。根據植入物的類型和放置的位置，下列哪一種併發症的發生率最高？", "opts": {"A": "Widening of the areola", "B": "Animation deformity from the pectoralis muscle", "C": "Capsular contracture", "D": "Deflation and subsequent loss of volume", "E": "Superior implant migration"}, "ans": "C", "multi": false, "years": ["113"], "cite": "Grabb and Smith's, 8th, Ch 55, p558", "conflict": "", "etype": "ai", "expl": "", "key": "義乳併發症的發生率取決於「表面」與「平面」兩個變數：**光滑面（smooth）＋ 腺體下（subglandular）**是莢膜攣縮發生率最高的組合。腺體下平面缺乏肌肉屏障、且與乳管細菌相通（生物膜假說），紋理面能打斷莢膜纖維排列而光滑面不能。", "peropt": {"A": "乳暈變寬與義乳表面／平面無直接關係，主要見於乳暈周圍切口或乳暈疝出。", "B": "Animation deformity 是**肌肉下**義乳才有的問題；本例刻意放在腺體下，反而不會發生。", "C": "正解。光滑面＋腺體下是莢膜攣縮發生率最高的組合。", "D": "Deflation 是**鹽水袋**義乳的特徵性併發症；本例為矽膠。", "E": "義乳向上移位多與肌肉下平面、胸大肌收縮或囊袋剝離不足有關，非本組合的最高風險。"}, "src": "GS", "sub": "S03"}, {"id": "GS-023", "stem": "下列哪一項最能代表美國食品藥物管理局關於 breast augmentation 使用矽膠植入物時，篩檢是否發生 silent ruptures 的現有建議?", "opts": {"A": "放置植入物後每年接受 MRI 檢查", "B": "放置植入物後一年後接受 MRI 檢查，之後每兩年檢查一次 MRI", "C": "放置植入物後兩年後接受 MRI 檢查，之後每兩年檢查一次 MRI", "D": "放置植入物後三年後接受 MRI 檢查，之後每兩年檢查一次 MRI", "E": "僅當矽膠植入物摸到變化才需要接受 MRI 檢查"}, "ans": "D", "multi": false, "years": ["113"], "cite": "Grabb and Smith's, 8th, Ch 55, p556", "conflict": "字母浮動:同GS-014概念,本題答案D", "etype": "ai", "expl": "", "key": "與 GS-014 完全相同的知識點（中文版）：FDA 建議矽膠義乳置入後 **3 年**首次 MRI，其後**每 2 年**一次。本題答案 D，而 GS-014 答案 C——同一數字、不同字母，是「記概念、勿背字母」的直接示範。", "peropt": {"A": "每年 MRI 過於頻繁。", "B": "一年後開始並非 FDA 建議。", "C": "兩年後開始並非 FDA 建議。", "D": "正解。置入後 3 年首次 MRI，之後每 2 年一次。", "E": "錯。無症狀破裂無法以觸診偵測，等到摸得出變化已太遲。"}, "src": "GS", "sub": "S02"}, {"id": "GS-026", "stem": "以下關於縮乳(breast reduction)手術後併發症的發生率何者有誤？", "opts": {"A": "傷口延遲癒合 Delayed wound healing <1%", "B": "血腫 Hematoma 4%", "C": "血清腫 Seroma 10-15%", "D": "乳頭乳暈缺損 Nipple areola loss 1%", "E": "乳頭感覺喪失 Loss of nipple sensation 2%"}, "ans": "A", "multi": false, "years": ["113"], "cite": "Grabb and Smith's, 8th, Ch 56, p572-574", "conflict": "同上發生率卡片,反向出題", "etype": "ai", "expl": "", "key": "同一張卡片的反向出題（113 年）：本題 B（血腫 4%）、C（血清腫 10–15%）、D（NAC 缺損 1%）、E（感覺喪失 2%）全部正確，**唯一有誤的是 A——延遲傷口癒合並非 <1%，而是約 10%**。此題與 GS-021／GS-024 互為完整驗證。", "peropt": {"A": "正解（有誤）。延遲傷口癒合約 **10%**，遠高於 <1%。", "B": "正確。血腫約 4%。", "C": "正確。血清腫約 10–15%。", "D": "正確。乳頭乳暈缺損約 1%。", "E": "正確。乳頭感覺喪失約 2%。"}, "src": "GS", "sub": "S07"}, {"id": "GS-022", "stem": "下列哪一組藥物與發生男性女乳症(gynecomastia)較無關?", "opts": {"A": "Cephalosporins, penicillin, fluoroquinolones", "B": "Amphetamines, anabolic steroids, marijuana", "C": "Digoxin, ACE inhibitors, spironolactone", "D": "Benzodiazepines, risperidone, haloperidol", "E": "Testosterone, Estrogen, prednisone"}, "ans": "A", "multi": false, "years": ["113"], "cite": "Grabb and Smith's, 8th, Ch 57, p575-576", "conflict": "同概念不同字母(見GS-015註記)", "etype": "ai", "expl": "", "key": "同一組概念的中文版（113 年）：不相關者是**純抗生素組（cephalosporins、penicillin、fluoroquinolones）**，答案為 A。抗生素不影響雌激素／雄性素比值，故與男性女乳症無關；其餘三組分別經由賀爾蒙、抗雄性素、高泌乳素機轉致病。", "peropt": {"A": "正解（較無關）。Cephalosporins、penicillin、fluoroquinolones 為抗生素，不影響性荷爾蒙平衡。", "B": "相關。安非他命、合成類固醇、大麻。", "C": "相關。Digoxin、ACE inhibitors、spironolactone。", "D": "相關。Benzodiazepines、risperidone、haloperidol。", "E": "相關。Testosterone、estrogen、prednisone。"}, "src": "GS", "sub": "S08"}, {"id": "GS-029", "stem": "針對一位新診斷的單側乳癌並且計畫接受乳房切除(mastectomy) 的患者，若考慮一次手術使用植入物做為乳房重建(single-stage implant-based breast reconstruction)的方式，可能出現併發症的危險因子有以下哪些？(複選)", "opts": {"A": "有乳癌家族史 Family history of breast cancer", "B": "抽菸 Smoking", "C": "肥胖 Obesity (BMI > 30)", "D": "巨大的乳房 Large breasts", "E": "糖尿病 Diabetes (HbA1C > 6.5%)"}, "ans": "BCDE", "multi": true, "years": ["113"], "cite": "Grabb and Smith's, 8th, Ch 59, p588-589", "conflict": "", "etype": "ai", "expl": "", "key": "單次手術直接置入義乳（single-stage / direct-to-implant）的併發症危險因子：**抽菸、肥胖（BMI>30）、巨乳、糖尿病（HbA1C>6.5%）**——四者共通機轉是乳房切除皮瓣的灌流不足與癒合能力下降。**乳癌家族史只影響腫瘤風險，不影響傷口癒合**，故非併發症危險因子。", "peropt": {"A": "否。家族史屬腫瘤學風險，與義乳重建的傷口／義乳併發症無關。", "B": "是。尼古丁造成血管收縮，是乳房切除皮瓣壞死最強的可改變風險因子。", "C": "是。肥胖增加感染、傷口裂開與皮瓣壞死。", "D": "是。巨乳的乳房切除皮瓣面積大、遠端灌流差，壞死風險高。", "E": "是。血糖控制不良（HbA1C>6.5%）增加感染與癒合不良。"}, "src": "GS", "sub": "S12"}, {"id": "GS-014B", "stem": "Which of the following best represents the existing Food and Drug Administration recommendation on screening for silent ruptures in silicone implants used for breast augmentation?", "opts": {"A": "Sonography annually after placement", "B": "CT scan 2 years after placement and then every 2 years thereafter", "C": "MRI 3 years after placement and then every 2 years thereafter", "D": "MRI at 5 years and then as needed", "E": "Chest X-ray only if palpable changes in silicone"}, "ans": "C", "multi": false, "years": ["114"], "cite": "Grabb and Smith's, 8th edition, Chapter 55 p563", "conflict": "干擾選項改為超音波/CT/胸部X光,正解不變(MRI 3年後,每2年)。記概念勿背字母", "etype": "ai", "expl": "", "key": "與 GS-014／GS-023 同一考點的 114 年版，**干擾選項改成不同的影像工具**（超音波、CT、胸部 X 光），但正解不變：**FDA 建議矽膠義乳置入後第 3 年首次 MRI，其後每 2 年一次**。這正說明為何要記「3 年 → 每 2 年 → MRI」這組概念，而不是背 C。", "peropt": {"A": "錯。超音波敏感度不足以偵測無症狀破裂，且非 FDA 建議的篩檢工具。", "B": "錯。CT 有輻射且對矽膠破裂的判讀不如 MRI，非建議工具。", "C": "正解。置入後 **3 年**首次 MRI，之後**每 2 年**一次。", "D": "錯。第 5 年才做過晚，且「as needed」不符無症狀篩檢目的。", "E": "錯。胸部 X 光完全無法評估義乳完整性；且 silent rupture 依定義即摸不出來。"}, "src": "GS", "sub": "S02"}, {"id": "GS-018", "stem": "Which of the following statements regarding acute postoperative complication of breast reduction is correct?", "opts": {"A": "Delayed wound healing", "B": "Hematoma", "C": "Seroma", "D": "Vascular compromise", "E": "Loss of Nipple Areolar Sensation"}, "ans": "E", "multi": false, "years": ["114"], "cite": "Grabb and Smith's, 8th edition, Chapter 56, p572-574", "conflict": "題幹問「急性術後併發症何者正確」但答案鍵指向E(乳頭感覺喪失=長期後遺症),推測原題意為「何者非急性併發症」", "etype": "ai", "expl": "", "key": "縮乳術後的**急性期併發症**包括血腫、血清腫、延遲癒合、血管性危害（NAC 缺血）；而**乳頭乳暈感覺喪失屬長期後遺症，非急性併發症**。⚠ 本題問法為「下列關於急性術後併發症何者正確」而答案鍵指向 E，推測原題意應為「何者**不是**急性併發症」。以答案鍵作答，概念記住 A–D 是急性、E 是長期。", "peropt": {"A": "屬急性併發症。延遲傷口癒合，發生率約 10%。", "B": "屬急性併發症。血腫約 4%。", "C": "屬急性併發症。血清腫約 10–15%。", "D": "屬急性併發症。血管性危害導致 NAC 缺血。", "E": "正解（依答案鍵）。乳頭乳暈感覺喪失（約 2%）屬**長期**後遺症，不是急性期併發症。"}, "src": "GS", "sub": "S07"}, {"id": "GS-008", "stem": "In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned with a rib cartilage resection. Which rib is the most appropriate location for vascular anastomosis?", "opts": {"A": "Rib1", "B": "Rib3", "C": "Rib6.", "D": "Rib9", "E": "Rib12"}, "ans": "B", "multi": false, "years": ["114"], "cite": "Grabb and Smith's, 8th edition, Chapter 60, p609", "conflict": "", "etype": "ai", "expl": "", "key": "DIEP 接 IMA/IMV 時的顯露位置：切除第 3 肋軟骨，在第 3 肋位置做吻合。此題問「吻合位置」，答案 Rib 3（B）；GS-009 問「切除哪根肋軟骨」，答案同樣是 Rib 3，但字母是 C。兩題並列正是「記概念、勿背字母」的示範。", "peropt": {"A": "第 1 肋位置過高，被鎖骨遮蔽、無法安全顯露。", "B": "正解。第 3 肋（第 3 肋軟骨切除後）是 IMA/IMV 口徑與可及性的最佳平衡點；IMV 在此仍有足夠管徑，且位置與乳房重建的皮瓣蒂長度相符。", "C": "第 6 肋過低，IMV 常已分岔變細、口徑不足。", "D": "第 9 肋遠低於內乳血管可用範圍。", "E": "第 12 肋屬肋弓外緣，與內乳血管完全無關。"}, "src": "GS", "sub": "S13"}, {"id": "GS-010B", "stem": "Patients with the BRCA gene mutations are at increased risk of developing breast and ovarian cancer as well as which of the other cancers listed below?", "opts": {"A": "Pancreatic cancer", "B": "Fallopian tube cancer", "C": "Prostate cancer", "D": "Lymphoma", "E": "Basal cell carcinoma"}, "ans": "ABC", "multi": true, "years": ["114"], "cite": "Grabb and Smith's, 8th edition, Chapter 58, p587", "conflict": "", "etype": "ai", "expl": "", "key": "與 GS-010 相同（114 年版，題幹去掉「複選」標示）：BRCA 突變除乳癌、卵巢癌外，還增加**胰臟癌、輸卵管癌、攝護腺癌**風險。**淋巴瘤與基底細胞癌與 BRCA 無關**。", "peropt": {"A": "是。胰臟癌風險升高，BRCA2 尤甚。", "B": "是。輸卵管癌與卵巢／腹膜癌屬同一譜系。", "C": "是。攝護腺癌，男性 BRCA2 帶因者風險顯著升高。", "D": "否。淋巴瘤與 BRCA 無關。", "E": "否。基底細胞癌與 PTCH1／日曬相關，與 BRCA 無關。"}, "src": "GS", "sub": "S17"}, {"id": "GS-030", "stem": "關於reconstruction of the nipple-areolar complex using local skin flap，Nimboriboonporn and Chuthapisith 提出一種分類，何者為非?", "opts": {"A": "Laterally based flap", "B": "Centrally based flap", "C": "Subdermal pedicle local flaps with single pedicle", "D": "Subdermal pedicle local flaps with double pedicle", "E": "以上皆是"}, "ans": "A", "multi": false, "years": ["114"], "cite": "Grabb and Smith's, 8th, Ch 61, P611", "conflict": "", "etype": "ai", "expl": "", "key": "Nimboriboonporn 與 Chuthapisith 對局部皮瓣乳頭重建的分類共三類：**centrally based flap（中央蒂）、subdermal pedicle local flaps with single pedicle（單一真皮下蒂）、subdermal pedicle local flaps with double pedicle（雙真皮下蒂）**。**沒有「laterally based flap」這一類**，故為非。", "peropt": {"A": "正解（非此分類）。該分類中不存在「laterally based flap」。", "B": "屬此分類。Centrally based flap（如 skate flap 的中央蒂型）。", "C": "屬此分類。單一真皮下蒂的局部皮瓣。", "D": "屬此分類。雙真皮下蒂的局部皮瓣（如 C-V flap）。", "E": "A 不屬此分類，故不選以上皆是。"}, "src": "GS", "sub": "S01"}, {"id": "GS-025", "stem": "下列敘述何者為是?", "opts": {"A": "Tuberous breast is characterized by decreased inframammary fold", "B": "According to Grolleau classification of tuberous breast deformity, type III is both lower quadrants are absent", "C": "Treatment algorithm for tuberous breast deformity, 期望conservative size的病人只要放implant即可", "D": "Poland syndrome 有可能absence of the nipple", "E": "Fat grafting 可改善Poland syndrome造成的subclavicular hollowing，但對absence of the anterior axillay fold較沒有幫助"}, "ans": "CD", "multi": true, "years": ["114"], "cite": "Grabb and Smith's, 8th, Ch 62, P616-621", "conflict": "", "etype": "ai", "expl": "", "key": "本題把 tuberous breast 與 Poland 兩個先天畸形放在一起考。正解 CD。關鍵：Grolleau 分型 I＝下**內**象限缺損、II＝兩個下象限缺損、III＝四象限（整個基底）缺損；tuberous breast 的 IMF 是**上移**不是下移；Poland 可合併乳頭缺如（athelia）。", "peropt": {"A": "錯。Tuberous breast 的 IMF 是**上移／位置過高**（elevated, cranialized），不是 decreased。", "B": "錯。Grolleau 分型中「兩個下象限皆缺損」是 **type II**；type III 是整個乳房基底（四象限）皆缺損。", "C": "對（依本年答案鍵）。期望保守體積的病人，治療流程可僅放置義乳（仍須配合下極實質 scoring 釋放基底）。", "D": "對。Poland syndrome 可合併乳頭缺如（athelia）與乳房缺如（amastia）。", "E": "錯。脂肪移植對 subclavicular hollowing 有效，對前腋褶（anterior axillary fold）區域的輪廓亦有改善作用；真正需要立體重建前腋褶時才靠 LD 轉位。"}, "src": "GS", "sub": "S09"}, {"id": "GS-001", "stem": "A 35-year-old female presents with severe bilateral breast ptosis (Regnault Grade 3) following massive weight loss. Her body mass index (BMI) is 24. Physical examination reveals a narrow breast base width and an upper pole pinch thickness of only 1.5 cm. The patient strongly desires a one-stage augmentation mastopexy to achieve full, lifted breasts. To minimize the long-term risk of lower pole stretch deformity (bottoming out) and ensure the vascular safety of the nipple-areolar complex (NAC), which of the following surgical strategies is most supported by current literature?", "opts": {"A": "Inferior pedicle with a Wise-pattern skin excision, using a high-profile implant placed in the subglandular plane.", "B": "Superomedial pedicle with a Wise-pattern skin excision, using a moderate or lower-profile implant placed in the dual-plane.", "C": "Central mound pedicle with a periareolar skin excision, using an extra-high-profile implant placed in the total submuscular plane.", "D": "A one-stage procedure is absolutely contraindicated in patients with severe ptosis; a mastopexy must be performed first, followed by implant placement 6 months later."}, "ans": "B", "multi": false, "years": ["115"], "cite": "", "conflict": "", "etype": "orig", "expl": "Explanation: This question tests the critical evaluation of tissue biomechanics and vascularity in augmentation mastopexy. Pedicle Selection: The inferior pedicle's blood supply is severed during implant pocket dissection, rendering the NAC blood supply random and highly prone to ischemia; thus, a superior or superomedial pedicle is strongly recommended. Implant Profile: High-profile implants exert excessive pressure on a lax skin envelope, significantly increasing the risk of lower pole stretch deformity (bottoming out) over time,. A lower or moderate profile implant (which is wider and taller) is preferred to fill the upper pole while minimizing inferior pressure. Pocket Selection: An upper pole pinch thickness of less than 2 cm is an indication for submuscular or dual-plane placement to prevent implant visibility and rippling. While a staged approach is an option, a one-stage augmentation mastopexy is proven to be safe and effective when tissue-based planning principles are meticulously applied. (Source: Chapter 62 (Augmentation Mastopexy: Implant Selection & Mastopexy Techniques))", "key": "", "peropt": {}, "src": "GS", "sub": "S07"}, {"id": "GS-004", "stem": "A 47-year-old female, who underwent bilateral breast augmentation with silicone implants 5 years ago, presents with rapid unilateral breast swelling and severe capsular contracture over the past month. Ultrasound imaging reveals a highly aggressive mass with extracapsular spread. Fluid aspiration and tissue biopsy demonstrate negative CD30 expression and the absence of T-cell monoclonality via flow cytometry. Which of the following statements is most accurate?", "opts": {"A": "This condition is directly caused by a subclinical bacterial biofilm infection and can be successfully eradicated with implant removal and prolonged antibiotic irrigation.", "B": "BIA-ALCL is highly indicated", "C": "BIA-SCC is highly indicated and this malignancy exhibits a highly aggressive phenotype; extracapsular spread is common at diagnosis, and short-term mortality rates are reported to be approximately 50%.", "D": "The pathogenesis of this tumor is universally linked to an active Epstein-Barr virus (EBV) infection."}, "ans": "C", "multi": false, "years": ["115"], "cite": "", "conflict": "", "etype": "orig", "expl": "Explanation: This question evaluates knowledge of breast implant-associated squamous cell carcinoma (BIA-SCC), a newly emerging entity distinct from BIA-ALCL. Option A. is incorrect: It is a true malignancy, not merely a biofilm-induced subclinical infection. Option B. is incorrect: BIA-ALCL will have positive CD30 expression and the presence of T-cell monoclonality via flow cytometry. Option C. is correct: Option D. is incorrect: Unlike BIA-ALCL, BIA-SCC has been reported in patients with a history of all types of implants, including smooth implants. Source: Chapter 65 (Emerging Breast Implant Associated Malignancies)", "key": "", "peropt": {}, "src": "GS", "sub": "S05"}, {"id": "GS-002", "stem": "A 42-year-old female with a BRCA1 mutation is scheduled for bilateral prophylactic nipple-sparing mastectomies (NSM). She strongly desires autologous tissue reconstruction. However, she has a history of bariatric surgery for morbid obesity and, following weight stabilization, underwent a full abdominoplasty and a medial thigh lift. Furthermore, she explicitly states that she cannot accept any scars on her buttocks, adamantly refusing all gluteal flaps. Excluding the use of implants, which of the following microvascular free flap donor sites is the most feasible and reasonable choice given her anatomic constraints?", "opts": {"A": "Free deep inferior epigastric perforator (DIEP) flaps", "B": "Free profunda artery perforator (PAP) flaps or transverse upper gracilis (TUG) flaps", "C": "Free lumbar artery perforator (LAP) flaps", "D": "Pedicled latissimus dorsi flaps without concurrent fat grafting or implants"}, "ans": "C", "multi": false, "years": ["115"], "cite": ".", "conflict": "", "etype": "orig", "expl": "Explanation: The patient refuses gluteal scars, ruling out SGAP and IGAP flaps. Option D., the pedicled latissimus dorsi flap, typically provides insufficient tissue volume for total breast reconstruction, particularly in massive weight loss patients whose back fat is often thin. Without concurrent implants or fat grafting, it is extremely difficult to achieve symmetric and full bilateral reconstructions. Option C. is correct. The lumbar artery perforator (LAP) flap utilizes tissue from the posterolateral flank/lumbar region. This area often retains residual pliable tissue with ample volume in massive weight loss patients and avoids the restrictions of the abdomen, medial thighs, and buttocks. Although it is technically demanding and may require vascular grafts due to a limited pedicle length, the LAP flap is a recommended salvage donor site in the literature when all primary donor sites are unavailable and the patient refuses specific surgical scars.", "key": "", "peropt": {}, "src": "GS", "sub": "S13"}, {"id": "GS-007", "stem": "During a left breast reconstruction using a free DIEP flap, you choose the antegrade left internal mammary artery (IMA) and vein (IMV) as the recipient vessels. Upon releasing the vascular clamps after completing the anastomoses, you observe excellent arterial pulsation. However, the dermal edges of the flap begin oozing dark purple blood, and the flap rapidly becomes swollen and cyanotic. You re-examine the venous anastomosis and confirm it is widely patent with no thrombus; however, you note the patient's left IMV has a caliber of only 1.5 mm following a history of radiation therapy. Which of the following is the most physiologically sound and effective maneuver to salvage this flap?", "opts": {"A": "Completely resect the venous anastomosis and replace the venous coupler with a hand-sewn technique to overcome the size discrepancy.", "B": "Diagnose this as severe arterial spasm and immediately revise the arterial anastomosis to the thoracodorsal artery to increase arterial inflow.", "C": "Perform venous supercharging by anastomosing the flap's superficial inferior epigastric vein (SIEV) to an alternative outflow tract, such as the retrograde IMV or thoracodorsal vein.", "D": "Administer systemic tissue plasminogen activator (tPA) and Heparin immediately to dissolve suspected microvascular thrombosis within the flap parenchyma."}, "ans": "C", "multi": false, "years": ["115"], "cite": "", "conflict": "", "etype": "orig", "expl": "Explanation: (Source: Chapter 67 & 68 (Microvascular Complications / Venous Congestion))", "key": "", "peropt": {}, "src": "GS", "sub": "S13"}, {"id": "GS-005", "stem": "A 50-year-old female with a BMI of 36 kg/m2 is scheduled for a skin-sparing mastectomy and delayed deep inferior epigastric perforator (DIEP) flap reconstruction for right breast cancer. Her medical history includes: (1) Estrogen receptor-positive tumor currently treated with Tamoxifen; (2) A prior open cholecystectomy leaving a right subcostal scar; (3) Heterozygous Factor V Leiden mutation. As the primary reconstructive surgeon, which of the following statements regarding risk assessment and perioperative management are correct? (複選)", "opts": {"A": "Tamoxifen's active metabolites have a half-life of approximately 14 days and increase the risk of microvascular thrombosis; therefore, the medication should be withheld for at least 2 weeks before and 2 weeks after surgery.", "B": "The right subcostal scar may transect the superior epigastric vessels, making a pedicled TRAM flap highly prone to necrosis and relatively contraindicated, whereas a free DIEP flap remains a safer alternative.", "C": "Heterozygous Factor V Leiden mutation poses an extremely high risk for pedicle thrombosis and is an absolute contraindication for microvascular free flap reconstruction.", "D": "Literature indicates that severe obesity (BMI ≥ 35) significantly increases complication rates in abdominally based autologous reconstructions.", "E": "To mitigate the high risk of thrombosis associated with Factor V Leiden, thromboelastography (TEG) can be utilized to precisely guide perioperative anticoagulation therapy, improving flap survival."}, "ans": "A", "multi": false, "years": ["115"], "cite": ", B, D, E", "conflict": "", "etype": "orig", "expl": "Explanation: Option A. is correct: Tamoxifen promotes platelet aggregation and increases the risk of anastomotic thrombosis; it must be paused for 2 weeks perioperatively. Option B. is correct: A subcostal scar disrupts the superior epigastric artery, increasing pedicled TRAM flap necrosis risk by up to 8-fold, but does not preclude the use of the deep inferior epigastric system (DIEP flap). Option D. is correct: A BMI ≥ 35 is associated with significantly higher rates of both donor-site (hernia/bulge) and recipient-site (flap loss) complications. Option E. is correct, making Option C. incorrect: Factor V Leiden is a relative, not absolute, contraindication for microsurgery. Successful microvascular reconstructions have been reported by using TEG-guided anticoagulation protocols. Source: Chapter 67 (Preoperative Evaluation: Hormonal Treatment, Prior Scars, Obesity, Clotting History) Grabb and Smith's 9th, Part VI 69-73, Part VII 74-75", "key": "", "peropt": {}, "src": "GS", "sub": "S13"}, {"id": "GS-006", "stem": "A 55-year-old woman is referred to your office for evaluation of breast reconstruction after a recent diagnosis of invasive ductal carcinoma of the right breast. She is a candidate for breast conservation and has planned to undergo a partial mastectomy followed by radiation therapy. Adjuvant chemotherapy will be determined by her final pathology but is also likely. She is interested in a breast reduction after she completes her cancer treatment. What is the best timeline for an oncoplastic breast reduction for optimal healing?", "opts": {"A": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 6 weeks after completion of treatment", "B": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 12 months after completion of treatment", "C": "Lumpectomy followed by adjuvant treatments (chemo or radiation), then elective breast reduction 24 months after completion of treatment", "D": "Lumpectomy with unilateral oncoplastic reconstruction followed by adjuvant treatments (chemo or radiation), then elective reduction on the contralateral breast for symmetry 6 weeks after completion of treatment", "E": "Lumpectomy with oncoplastic reduction/reconstruction and reduction of contralateral breast for symmetry followed by adjuvant treatment (chemo or radiation) approximately 6 weeks post operation"}, "ans": "E", "multi": false, "years": ["115"], "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 69. P 736-737.", "conflict": "", "etype": "ai", "expl": "", "key": "Oncoplastic reduction 的時序原則：**在腫瘤切除的同一次手術中完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療**。理由是放療後的乳房組織血供與癒合能力永久受損，任何延後到放療之後的選擇性縮乳都會面對更高的傷口併發症；而放療前的乳房尚未纖維化，此時塑形最安全、對稱度也最好。", "peropt": {"A": "錯。放療完成後僅 6 週即做選擇性縮乳，組織仍處急性放射性發炎期，傷口併發症率高。", "B": "錯。等 12 個月雖較安全，但已錯過最佳塑形時機，且放療後乳房已纖維化、對稱難達成。", "C": "錯。等 24 個月同上，且病人須長期忍受不對稱。", "D": "錯。對側對稱性縮乳若延到放療之後，會在已放療的患側與未放療的健側間製造二次不對稱與癒合差異。", "E": "正解。腫瘤切除的同一次手術即完成患側 oncoplastic reduction 與對側對稱性縮乳，術後約 6 週再開始輔助治療（化療／放療），癒合條件最佳。"}, "src": "GS", "sub": "S11"}, {"id": "GS-003", "stem": "A 42-year-old thin, athletic woman presents with bilateral postmastectomy contour deformity following implant-based breast reconstruction. She states that she has contour deformities both at rest and during activity. She is requesting revisional breast reconstruction. Which of the following is the best course of action for improvement of her concerns?", "opts": {"A": "Lipofilling of the breast as a secondary procedure", "B": "Secondary reconstruction removing the implant and using an abdominal-based DIEP flap", "C": "Secondary reconstruction downsizing her implant to a smaller implant, capsulotomy, and autologous fat grafting", "D": "Fat grafting followed by secondary pocket change and capsulectomy", "E": "Capsulectomy with implant removal"}, "ans": "D", "multi": false, "years": ["115"], "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 71. P 753-754.", "conflict": "", "etype": "ai", "expl": "", "key": "Implant-based 重建後、瘦削病人出現「靜止時與活動時皆有」的輪廓變形 → 活動時變形＝animation deformity，代表義乳位於 subpectoral。單靠脂肪或單靠換小義乳都無法解決動態問題，必須改變 pocket 平面。標準策略：先脂肪移植增厚軟組織覆蓋，再二期做 pocket change（subpectoral→prepectoral）＋ capsulectomy。", "peropt": {"A": "單做 lipofilling 只改善靜止輪廓，無法消除肌肉收縮造成的動態變形，未解決根本原因。", "B": "改用 DIEP 對這位「瘦削、athletic」的病人並不合適——腹部脂肪量不足，且屬過度治療（她要求的是修整，非全自體重建）。", "C": "縮小義乳＋capsulotomy＋脂肪移植仍留在原本 subpectoral 平面，animation deformity 依舊存在。", "D": "正解。先脂肪移植改善軟組織厚度與 rippling，再二期 pocket change 加 capsulectomy 移除舊莢膜、把義乳改到 prepectoral，同時處理靜止與動態變形。", "E": "單純取出義乳並 capsulectomy 等於放棄重建，不符病人「requesting revisional reconstruction」的目標。"}, "src": "GS", "sub": "S13"}, {"id": "GS-013", "stem": "What are complications of skin grafts in nipple and areolar reconstruction?(複選)", "opts": {"A": "Donor site dehiscence", "B": "Wound infection", "C": "Hypertrophic Scar", "D": "Failure of skin graft", "E": "Nipple projection loss"}, "ans": "ABCDE", "multi": true, "years": ["115"], "cite": "Grabb and Smith’s, 9th Edition, Kevin C. Chung, Chap 72. P 770-771.", "conflict": "", "etype": "ai", "expl": "", "key": "乳頭乳暈重建使用植皮的併發症「全部都是」：供區裂開、傷口感染、肥厚性疤痕、植皮失敗，以及**乳頭突出度流失**（最常見也最難避免——所有重建的乳頭都會隨時間回縮，故設計時必須刻意過度矯正）。", "peropt": {"A": "是。供區傷口裂開（尤其對側乳暈或大腿內側供區）。", "B": "是。傷口感染。", "C": "是。肥厚性疤痕，供區與受區皆可能。", "D": "是。植皮失敗（血腫、剪力或感染所致）。", "E": "是。乳頭突出度流失，是 NAC 重建最常見的長期問題。"}, "src": "GS", "sub": "S01"}, {"id": "NG-154", "stem": "有一女性接受breast augmentation後五年，檢查發現the breast is firmer, the implant can be palpated easily and may be distorted or visible，屬於The Baker classification of capsular contracture的哪一個grade？", "opts": {"A": "Grade I", "B": "Grade II", "C": "Grade III", "D": "Grade IV", "E": "Grade V"}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P36", "conflict": "字母陷阱:本題答案C=Baker Grade III;NG-168答案同為C卻是Grade II(選項自0起算)", "etype": "ai", "expl": "", "key": "Baker 分級：I 柔軟如常；II 略硬，義乳**可觸及但看不見**；III **明顯較硬、義乳容易觸及、可能變形或看得見**；IV 堅硬、疼痛、壓痛、明顯變形。本題「較硬＋易觸及＋可能變形或可見」＝ **Grade III**。⚠ 注意：本題答案 C 代表 Grade III，而 NG-168 答案同樣是 C 卻代表 Grade II（因選項從 0 開始）——典型的字母陷阱。", "peropt": {"A": "Grade I：乳房柔軟，外觀與觸感如自然乳房。", "B": "Grade II：略硬，義乳可觸及但不可見、無變形。", "C": "正解。Grade III：明顯變硬、義乳容易觸及、可能變形或看得見。", "D": "Grade IV：堅硬、疼痛、壓痛且明顯變形。", "E": "Baker 分級**只有 I–IV**，不存在 Grade V。"}, "src": "NG", "sub": "S03"}, {"id": "NG-183", "stem": "關於Secondary breast augmentation，下列敘述何者為非？", "opts": {"A": "Revision breast augmentation surgery can be classified into three categories: related to the previous surgery, related to the soft tissues, related to the implant. Problems related to the implant are most common.", "B": "Physical examination focus on implant stability should be assessed with the patient in multiple positions including standing with arms at side, arms over head, lying supine and leaning forward.", "C": "The quality and quantity of breast tissue in all four quadrants can be done by more objective measures such as the pinch test.", "D": "The best way to manage a revision is to have avoided it in the first place.", "E": "In the patients with multiple procedures, MRI is useful in identifying the exact plane of the implant and its relation to the pectoral muscle."}, "ans": "A", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P40-42", "conflict": "", "etype": "ai", "expl": "", "key": "二次隆乳的問題可分三類：與前次手術相關、與軟組織相關、與義乳相關。⚠ 本年答案鍵判定「**與義乳相關的問題最常見**」為錯述。其餘（多姿勢評估義乳穩定度、以 pinch test 客觀評估四象限組織量、最好的處理是一開始就避免、多次手術者以 MRI 判定義乳所在平面）皆正確。", "peropt": {"A": "正解（錯述）。三大分類本身正確，但把「義乳相關問題」列為最常見與原文不符。", "B": "正確。評估義乳穩定度須在站立垂手、雙手上舉、仰臥、前傾等多種姿勢下進行。", "C": "正確。以 pinch test 客觀量測四個象限的乳腺組織質與量。", "D": "正確。處理二次手術最好的方法，是第一次就避免它發生。", "E": "正確。多次手術病人以 MRI 可精確判定義乳所在平面及其與胸大肌的關係。"}, "src": "NG", "sub": "S04"}, {"id": "NG-052", "stem": "The complication of breast surgery with the silicone gel implant，下列敘述何者有誤？", "opts": {"A": "Most hematomas develop early, within hours or days of surgery and require surgical removal.", "B": "Capsular contracture and trauma may be factors of late hematomas.", "C": "Infection after breast augmentation is uncommon. Endogenous bacteria usually cause early infections, either from the skin or from the milk ducts.", "D": "The incidence of capsular contracture appears to have been reduced with the evolution of the silicone gel implant.", "E": "The classical treatment for capsular contracture was close capsulotomy."}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P103-107", "conflict": "", "etype": "ai", "expl": "", "key": "莢膜攣縮的標準外科處理是 **open capsulotomy／capsulectomy**；**closed capsulotomy（閉合式徒手擠壓破莢膜）已被摒棄**，因會造成義乳破裂、血腫與莢膜攣縮復發，不能稱為「經典治療」。其餘（血腫多早期發生需手術清除、莢膜攣縮與外傷可致遲發性血腫、感染少見且早期感染多來自皮膚或乳管的內源性細菌、新一代矽膠義乳使攣縮率下降）皆正確。", "peropt": {"A": "正確。多數血腫在術後數小時至數日內發生，須手術清除。", "B": "正確。莢膜攣縮與外傷是遲發性血腫的可能因素。", "C": "正確。隆乳後感染不常見；早期感染多為皮膚或乳管來源的內源性細菌。", "D": "正確。隨矽膠義乳世代演進，莢膜攣縮發生率已下降。", "E": "正解（錯述）。標準治療為 **open** capsulotomy／capsulectomy；closed capsulotomy 因義乳破裂與復發率高已被淘汰。"}, "src": "NG", "sub": "S03"}, {"id": "NG-156", "stem": "有關breast augmentation在選擇the plane of insertion pocket的優缺點，下列敘述何者為非？", "opts": {"A": "The submuscular plane of insertion has advantages for a marked paucity of breast tissue.", "B": "The implant in the submusculofascial plane easily become displaced superior-laterally.", "C": "The dual plane insertion decreased the tendency of implants to be positioned too high.", "D": "Milder forms of the symmastia(medial malposition) can be corrected by conversion of the implant from the subglandular to the submuscular plane.", "E": "Double-bubble deformity is more common with large implants that are inserted in the submuscular plane"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P113-116", "conflict": "", "etype": "ai", "expl": "", "key": "義乳平面選擇的四項正確概念：軟組織極薄者宜 submuscular；submusculofascial 平面義乳易向**上外**移位；dual plane 可減少義乳過高的傾向；大型義乳置於 submuscular 較易產生 double-bubble。錯的是 D——**submuscular 平面因胸大肌內側起點被剝離，本身就是 symmastia（內側移位）的好發平面**，把義乳從 subglandular 換到 submuscular 並不能矯正 symmastia。", "peropt": {"A": "正確。乳腺組織極少者，submuscular 可提供額外覆蓋、減少邊緣可觸及與 rippling。", "B": "正確。submusculofascial 平面的義乳容易向上外側移位。", "C": "正確。dual plane 藉由釋放胸大肌下緣，降低義乳位置過高的傾向。", "D": "正解（錯述）。輕度 symmastia 的矯正靠內側 capsulorrhaphy 或改做 neo-subpectoral pocket 重建內側界線；改為 submuscular 反而是 symmastia 的好發平面。", "E": "正確。大型義乳置於 submuscular 時 double-bubble 較常見（義乳撐破原有 IMF）。"}, "src": "NG", "sub": "S04"}, {"id": "NG-155", "stem": "有關Lassus vertical scar technique of mastopexy原則，下列敘述何者錯誤？", "opts": {"A": "A central wedge resection to reduce the size of the breast", "B": "Transposition of the areola on a superiorly-based flap", "C": "Addition of a vertical scar component", "D": "No undermining of the skin", "E": "This procedure is applicable to many breast sizes and skin qualities."}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P134", "conflict": "", "etype": "ai", "expl": "", "key": "Lassus 垂直疤痕術式的四項原則：中央楔形切除縮小體積、以**上蒂**皮瓣移轉乳暈、加上垂直疤痕、**不做皮膚潛行剝離（no undermining）**。錯的是 E——此術式**並非適用於各種乳房大小與皮膚品質**（皮膚彈性差或極巨乳者不適合）。", "peropt": {"A": "正確。中央楔形切除以縮小乳房體積。", "B": "正確。以上方為基底的皮瓣移轉乳暈。", "C": "正確。加入垂直疤痕成分。", "D": "正確。不做皮膚潛行剝離（這是 Lassus 的標誌性原則）。", "E": "正解（錯述）。此術式並非適用於各種乳房大小與皮膚品質。"}, "src": "NG", "sub": "S06"}, {"id": "NG-190", "stem": "關於invert-T technique of mastopexy的敘述，下列何者為非？", "opts": {"A": "The long horizontal component allows adequate resection of the skin envelope in extremely ptotic breasts", "B": "This technique has the ability to see the final shape of the breast while the patient is still in the operating table.", "C": "This procedure lack of internal support increases the chance of recurrent ptosis during the subsequent months and years.", "D": "This technique decreases the chance of the subsequent revision.", "E": "For hiding horizontal lateral visible scar, the lengthening the medial extent should be performed to the midline as possible."}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P146", "conflict": "", "etype": "ai", "expl": "", "key": "Inverted-T（倒 T）乳房固定術的水平疤痕若要隱藏，應把延長方向放在**外側**並藏入 IMF 內；往**內側（中線）**延長反而製造顯眼的內側疤痕。故 E 為錯述。其餘：長水平段可切除極度下垂者多餘皮膚、術中即可見最終形狀、缺乏內在支撐使日後易再下垂。", "peropt": {"A": "正確。長的水平段允許在極度下垂的乳房充分切除多餘皮膚囊袋。", "B": "正確。術中在手術檯上即可直接看到乳房最終形狀。", "C": "正確。缺乏內在支撐（internal support），日後數月至數年再度下垂的機會增加。", "D": "正確（依本年答案鍵）。此術式可降低後續修整手術的機會。", "E": "正解（錯述）。為隱藏水平疤痕應向**外側**延長並藏入 IMF，向中線延長會造成明顯的內側疤痕。"}, "src": "NG", "sub": "S06"}, {"id": "NG-194", "stem": "關於vertical scar reduction mammaplasty各項術式，下列敘述何者有誤？", "opts": {"A": "Vertical scar reduction mammaplasty has less scarring than inverted-T scar or inferior pedicle breast reduction techniques.", "B": "Lassus developed a technique using a superior dermoglandular pedicle for transposition of the nipple-areola complex, and the skin surrounding the excised area was undermined to facilitate gathering of the vertical scar.", "C": "The Lejour technique introduced extensive pre-excision liposuction and the superior dermoglandular pedicle was sutured to the pectoralis fascia.", "D": "Hall-Findlay's technique used a mosque dome skin marking pattern and a full thickness medial dermoglandular pedicle to transpose the nipple-areola complex.", "E": "The Lista's design of skin marking was mosque dome pattern with pointed inferiorly."}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P178", "conflict": "", "etype": "ai", "expl": "", "key": "**Lassus 的標誌就是「不做皮膚潛行剝離」**（no undermining）——題目說他「將切除區周圍皮膚潛行剝離以利垂直疤痕聚攏」，與其原則正好相反，故為錯述。對照：Lejour 引入大量預切除抽脂並將上蒂縫至胸肌筋膜；Hall-Findlay 用 mosque dome 標記＋全層內側蒂；Lista 亦為 mosque dome 下尖設計。", "peropt": {"A": "正確。垂直疤痕縮乳的疤痕少於倒 T 或下蒂術式。", "B": "正解（錯述）。Lassus 使用上蒂沒錯，但其原則是**不做皮膚潛行剝離**。", "C": "正確。Lejour 引入大量預切除抽脂，並將上蒂皮腺瓣縫至胸大肌筋膜。", "D": "正確。Hall-Findlay 採 mosque dome 標記與全層內側皮腺瓣移轉 NAC。", "E": "正確。Lista 的皮膚標記為下方呈尖端的 mosque dome 圖案。"}, "src": "NG", "sub": "S07"}, {"id": "NG-118", "stem": "下列哪些因素致使患者在接受mastectomy後可能存在the potential for positive margins，較不適合immediate breast reconstruction，何者除外？", "opts": {"A": "Elder age (>40 years old)", "B": "Extensive DCIS", "C": "History of neoadjuvant chemotherapy", "D": "Infiltrating lobular carcinoma", "E": "Her2/neu positivity"}, "ans": "A", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P298", "conflict": "", "etype": "ai", "expl": "", "key": "切緣陽性的高風險因子是 **年輕（<40 歲）**、廣泛 DCIS、新輔助化療病史、浸潤性小葉癌、HER2/neu 陽性。題目把年齡寫成「Elder age（>40 歲）」，方向相反，故為「除外」的那一個。這批病人切緣陽性風險高，較不適合即時重建。", "peropt": {"A": "正解（除外）。高風險的是**年輕（<40 歲）**，不是 >40 歲。", "B": "是風險因子。廣泛的 DCIS 切緣不易判定。", "C": "是風險因子。新輔助化療後腫瘤退縮呈散在分佈，切緣評估困難。", "D": "是風險因子。浸潤性小葉癌呈單列浸潤，邊界不清。", "E": "是風險因子。HER2/neu 陽性常伴隨較廣泛的病灶。"}, "src": "NG", "sub": "S12"}, {"id": "NG-186", "stem": "關於breast augmentation的敘述，下列何者正確? (複選)", "opts": {"A": "Alternations of nipple sensitivity是augmentation mammaplasty術後常見的併發症，surgical approach方式會影響其發生率及嚴重程度。", "B": "術後最常見傷口感染源是Staphylococcus epidermidis。", "C": "Periprosthetic seroma fluid通常在術後一週內會自行吸收，intraoperative topical antibiotics有助於減少其發生率。", "D": "因嚴重感染症移除implant後，需待感染完全清除後6-12個月再施行secondary operation。", "E": "Perioperative hematoma應接受immediate evacuation and exploration，只是常找不到hematoma的來源。"}, "ans": "BCDE", "multi": true, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P32-35", "conflict": "", "etype": "ai", "expl": "", "key": "隆乳併發症四項正確：術後最常見的傷口感染源是 **Staphylococcus epidermidis**（皮膚常在菌，也是生物膜的主角）；義乳周圍血清腫多於一週內自行吸收，術中局部抗生素有助減少；因嚴重感染移除義乳後須待感染完全清除 **6–12 個月**再二次手術；圍手術期血腫應立即清除探查，但常找不到出血點。A 依本年答案鍵為錯述——乳頭感覺改變的發生率與嚴重度**與切口方式並無確立關聯**。", "peropt": {"A": "錯（依本年答案鍵）。乳頭感覺改變的發生率與嚴重度與手術入路的關聯性未被確立。", "B": "對。最常見的傷口感染源為 Staphylococcus epidermidis。", "C": "對。義乳周圍血清腫通常一週內自行吸收；術中局部抗生素有助降低發生率。", "D": "對。嚴重感染移除義乳後，須待感染完全清除 6–12 個月再行二次手術。", "E": "對。圍手術期血腫應立即清除並探查，惟常找不到明確出血來源。"}, "src": "NG", "sub": "S02"}, {"id": "NG-147", "stem": "以下何者為reduction mammaplasty術後產生skin flap necrosis風險因子？(複選)", "opts": {"A": "Smoking", "B": "BMI > 30", "C": "Hypertension", "D": "previous breast incisions", "E": "The amount of tissue resected"}, "ans": "ABCDE", "multi": true, "years": ["104"], "cite": "Neligan 3rd, Vol.5, P246", "conflict": "", "etype": "ai", "expl": "", "key": "縮乳術後皮瓣壞死的風險因子「全部都是」：抽菸、BMI>30、高血壓、既往乳房切口、切除組織量。共通機轉是**皮瓣灌流不足**——抽菸與高血壓損害微循環，肥胖與大量切除使皮瓣長而薄，既往切口已破壞既有血管網。", "peropt": {"A": "是。抽菸為最強的可改變風險因子。", "B": "是。BMI>30，皮瓣長而厚、遠端灌流差。", "C": "是。高血壓伴隨微血管病變。", "D": "是。既往乳房切口破壞既有血管網。", "E": "是。切除組織量愈大，剩餘皮瓣愈長、張力愈高。"}, "src": "NG", "sub": "S07"}, {"id": "NG-123", "stem": "下列關於Expander-Implants breast reconstructions何者為非", "opts": {"A": "Irradiated skin在delay reconstruction是relative contraindication", "B": "需有足夠的skin envelope", "C": "最常見的complication為infection", "D": "Scleroderma正在接受治療的病人不建議使用此重建方法", "E": "抽菸的病人需戒菸6個月"}, "ans": "C", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 339, 363", "conflict": "【原檔考生註記】CE選項有爭議，此題建議刪除", "etype": "ai", "expl": "", "key": "擴張器－義乳重建**最常見的併發症不是感染，而是莢膜攣縮與不對稱**（感染發生率僅數個百分比）。其餘：放療過的皮膚在延遲重建屬相對禁忌、需足夠皮膚囊袋、治療中的硬皮症病人不宜、抽菸者需戒菸。⚠ 原檔考生註記認為 C、E 兩選項皆有爭議，建議刪題。", "peropt": {"A": "正確。放療過的皮膚彈性與血供不佳，延遲重建時屬相對禁忌。", "B": "正確。需有足夠的皮膚囊袋才能容納擴張器。", "C": "正解（錯述）。最常見併發症是**莢膜攣縮與不對稱**，非感染。", "D": "正確。硬皮症（scleroderma）活動治療期病人，皮膚纖維化不適合擴張。", "E": "依本年答案鍵視為正確（抽菸者需戒菸；戒菸期長短各家不一，原檔考生註記指此選項有爭議）。"}, "src": "NG", "sub": "S12"}, {"id": "NG-130", "stem": "下列關於Latissumus dorsi flap breast reconstruction何者為非", "opts": {"A": "合併breast implant的使用可以有better symmetry", "B": "它是屬於Type V muscle flap", "C": "支配血管為thoracodorsal artery, a branch of subscapular artery", "D": "Extended latissumus dorsi flap用於totally autologous breast reconstruction並不reliable", "E": "Blood supply亦可以從Posterior intercostal artery而來"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 370, 371", "conflict": "", "etype": "ai", "expl": "", "key": "Extended latissimus dorsi flap（帶入背部周邊脂肪的擴大型 LD）**確實可作為完全自體重建的可靠選擇**，尤其在腹部不可用、乳房體積中等的病人。題目說它「並不 reliable」為錯述。其餘敘述（合併義乳提升對稱性、Type V、胸背動脈為肩胛下動脈分支、後肋間動脈亦供血）皆正確。", "peropt": {"A": "正確。LD 合併義乳可獲得更好的體積與對稱性，是常見組合。", "B": "正確。LD 為 Mathes-Nahai Type V。", "C": "正確。胸背動脈是 subscapular artery 的分支。", "D": "正解（錯述）。Extended LD flap 用於完全自體重建是可靠的，並非不可靠。", "E": "正確。後肋間動脈（節段性次要蒂）亦提供血供，這正是 Type V 的定義。"}, "src": "NG", "sub": "S14"}, {"id": "NG-124", "stem": "下列關於Free TRAM breast reconstruction何者為非", "opts": {"A": "比起Pedicle TRAM, free TRAM可能會有較低的donor site morbidity及ischemic complication", "B": "它是屬於Type II muscle flap", "C": "支配血管為deep inferior epigastric artery", "D": "重建後接受radiation therapy會有unpredictable result", "E": "Zone II為位於Zone I旁cross midline的區域"}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 411", "conflict": "", "etype": "ai", "expl": "", "key": "rectus abdominis 的 Mathes-Nahai 分類為 **Type III**（兩條主要血管蒂：superior 與 deep inferior epigastric artery），不是 Type II。此為跨年高頻考點，須與 latissimus dorsi（Type V）、gracilis（Type II）區辨。", "peropt": {"A": "正確。free TRAM 相較 pedicled TRAM，因直接接上 DIEA 主蒂，灌流較佳、脂肪壞死等 ischemic complication 較少，肌肉犧牲也較少。", "B": "正解（錯述）。腹直肌是 Mathes-Nahai Type III（雙主蒂），不是 Type II。", "C": "正確。free TRAM 的供應血管為 deep inferior epigastric artery。", "D": "正確。重建後才接受放射治療，結果不可預測（皮瓣攣縮、脂肪壞死），故建議放療後再做自體重建。", "E": "正確。Hartrampf 分區中 Zone II 為跨中線、位於 Zone I 對側的區域（Zone I 位於同側腹直肌正上方）。"}, "src": "NG", "sub": "S13"}, {"id": "NG-138", "stem": "下列關於deep inferior epigastric artery perforator flap(DIEAP flap)何者為非", "opts": {"A": "提供large volume of soft, melleable tissue for reconstruction", "B": "比起TRAM flap, 需要較長的learning curve", "C": "比起TRAM flap, donor site morbidity較小", "D": "Deep inferior epigastric artery分為lateral and medial branch", "E": "對experienced surgeon, DIEAP flap loss rate為5%"}, "ans": "E", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 435", "conflict": "", "etype": "ai", "expl": "", "key": "同一 DIEAP 事實群的反向出題：經驗豐富術者的皮瓣完全壞死率應 **<1%**，題目寫 5% 故為錯述。其餘（大量柔軟組織、學習曲線較長、供區傷害較小、DIEA 分內外兩支）皆正確。", "peropt": {"A": "正確。DIEAP 提供大量柔軟、可塑形的組織，質地最接近乳房。", "B": "正確。相較 TRAM 需要更長的學習曲線。", "C": "正確。不犧牲腹直肌，供區傷害較 TRAM 小。", "D": "正確。DIEA 分為 medial 與 lateral 兩支。", "E": "正解（錯述）。經驗豐富術者的 DIEAP 皮瓣壞死率 <1%，非 5%。"}, "src": "NG", "sub": "S13"}, {"id": "NG-133", "stem": "下列關於Omentum reconstruction of the breast何者為非", "opts": {"A": "Videolaparoscopic approach約需60-90 minutes to harvest the flap", "B": "在failed reconstruction,可以使用omentum flap", "C": "可以配合implant的使用", "D": "可以用在radical mastectomy的病人", "E": "Omentum volume在術前無法確切知道"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 472", "conflict": "本題(104年)與NG-133B(105年)題幹相同但選項完全不同", "etype": "ai", "expl": "", "key": "大網膜（omentum）皮瓣的限制：**不適用於 radical mastectomy 的病人**（胸壁組織與皮膚缺損過大，大網膜提供的體積與皮膚覆蓋不足）。其餘：腹腔鏡取瓣約 60–90 分鐘、可用於失敗的重建、可合併義乳、術前無法確知大網膜體積（這正是它的最大缺點）。", "peropt": {"A": "正確。腹腔鏡取瓣約需 60–90 分鐘。", "B": "正確。可作為重建失敗後的救援選項。", "C": "正確。可合併義乳使用以補足體積。", "D": "正解（錯述）。不適用於 radical mastectomy 的病人。", "E": "正確。術前無法確切得知大網膜體積，是此皮瓣最大的不確定性。"}, "src": "NG", "sub": "S15"}, {"id": "NG-121", "stem": "下列關於Congenital anomalies of the breast何者為非", "opts": {"A": "Tuberous breast是指a great variety of breast deformities that may present very different anatomical-morphologic characteristics", "B": "Hypoplastic tuberous breasts可以分成3個type", "C": "共有4個type的flap來重建此deformity", "D": "Flap type I and II用來重建type I deformity", "E": "Flap type III and IV用來重建type II deformity"}, "ans": "D", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 521", "conflict": "", "etype": "ai", "expl": "", "key": "先天乳房異常的分類數字題：Tuberous breast 涵蓋型態差異極大的一群畸形；hypoplastic tuberous breast 分 **3 型**；重建皮瓣分 **4 型**。⚠ 皮瓣型別與變形型別的配對（本題 D、E）屬冷門細節，依本年答案鍵 D 為錯述、E 為正確；記住「變形 3 型、皮瓣 4 型」即可，勿在配對上耗記憶。", "peropt": {"A": "正確。Tuberous breast 是一組解剖與形態差異極大的畸形總稱。", "B": "正確。發育不良型的 tuberous breast 分為 3 型。", "C": "正確。共有 4 種型別的皮瓣用於重建此類畸形。", "D": "正解（錯述）。依答案鍵，flap type I 與 II 並非用於重建 type I 變形。", "E": "正確（依答案鍵）。flap type III 與 IV 用於重建 type II 變形。"}, "src": "NG", "sub": "S09"}, {"id": "NG-134", "stem": "下列關於Poland syndrome何者為非", "opts": {"A": "單側congenital chest deformity", "B": "Absence of clavicular portion of pectoralis major", "C": "Absence of one or two ribs or costal cartilage", "D": "Ipsilateral anomalies of the hand, lower arm or entire upper limb", "E": "患者沒有anterior axillary fold"}, "ans": "B", "multi": false, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 548", "conflict": "Poland:缺損為sternal head(胸骨頭),非clavicular portion。且右側好發、男性2-3:1　Poland統一結論:單側、右側好發、男性2-3:1、缺pectoralis major胸骨頭(sternal head)、肋骨2-4、subclavian artery血流中斷序列", "etype": "ai", "expl": "", "key": "Poland syndrome 缺損的是 pectoralis major 的 **sternal head（胸骨頭）**，鎖骨頭（clavicular head）通常保留——這正是病人上臂仍能屈曲、卻沒有前腋褶的原因。其餘（單側、肋骨或肋軟骨缺一至兩根、同側上肢異常、無前腋褶）皆正確。", "peropt": {"A": "正確。Poland 為單側先天胸壁畸形。", "B": "正解（錯述）。缺損的是 **sternal head（胸骨頭）**，不是 clavicular portion；鎖骨頭通常存在。", "C": "正確。可合併一至兩根肋骨或肋軟骨缺如。", "D": "正確。同側手部、前臂或整個上肢可有異常。", "E": "正確。因胸大肌胸骨頭缺失，前腋褶（anterior axillary fold）消失。"}, "src": "NG", "sub": "S09"}, {"id": "NG-114", "stem": "下列何者為Alternative flaps for breast reconstruction的選擇 (複選)", "opts": {"A": "Transverse upper gracilis free flap (TUG)", "B": "Superior gluteal artery free flap (SGAP)", "C": "Inferior gluteal artery free flap (IGAP)", "D": "Deep femoral artery perforator flap (DFAP)", "E": "Lumbar artery perforator flap (LAP)"}, "ans": "ABCDE", "multi": true, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 457", "conflict": "", "etype": "ai", "expl": "", "key": "腹部組織不可用時的**替代皮瓣清單**：TUG、SGAP、IGAP、DFAP（deep femoral artery perforator，即 PAP 系統）、LAP 全部都是選項，答案 ABCDE。此題考的是「認得住這五個名字」，深入細節（蒂長、穿通枝路徑）則見 NG-049/065。", "peropt": {"A": "是。TUG（橫向股薄肌上部皮瓣），質地柔軟但體積有限。", "B": "是。SGAP（上臀動脈穿通枝皮瓣），蒂較短。", "C": "是。IGAP（下臀動脈穿通枝皮瓣），蒂較長但鄰近坐骨神經。", "D": "是。DFAP／PAP（股深動脈穿通枝皮瓣），蒂長 9–13 cm。", "E": "是。LAP（腰動脈穿通枝皮瓣），脂肪量大但蒂短、剝離困難。"}, "src": "NG", "sub": "S14"}, {"id": "NG-132", "stem": "下列關於Local flaps in partial breast reconstruction何者為是(複選)", "opts": {"A": "High tumor/breast size ratio的病人是使用pedicled flap的indication", "B": "在pedicled flap in partial breast reconstruction,通常不需要overcorrection", "C": "對側breast有時需接受fat grafting來達到symmetry", "D": "可以使用intercostal artery perforator (ICAP) flap", "E": "Serratus artery為thoracodorsal artery的分支"}, "ans": "ACDE", "multi": true, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 482,486", "conflict": "", "etype": "ai", "expl": "", "key": "部分乳房重建用局部皮瓣的正確敘述：腫瘤／乳房體積比高者是帶蒂皮瓣的適應症；對側乳房有時需脂肪移植達到對稱；可用 ICAP 皮瓣；前鋸肌動脈是胸背動脈的分支。錯的是 B——**帶蒂皮瓣用於部分乳房重建時，通常需要 overcorrection（過度矯正）**，因為術後放療會使皮瓣萎縮。", "peropt": {"A": "對。腫瘤／乳房體積比高（切除比例大）者，是使用帶蒂皮瓣的適應症。", "B": "錯。**需要 overcorrection**——術後放療會造成皮瓣體積萎縮。", "C": "對。對側乳房有時需接受脂肪移植以達對稱。", "D": "對。可使用肋間動脈穿通枝（ICAP）皮瓣。", "E": "對。前鋸肌動脈為胸背動脈的分支。"}, "src": "NG", "sub": "S16"}, {"id": "NG-046", "stem": "Poland syndrome造成之anomalies可能與胚胎時期哪一血管發育異常有關(複選)", "opts": {"A": "Common carotid artery", "B": "External carotid artery", "C": "Internal carotid artery", "D": "Subclavian artery", "E": "Vertebral artery"}, "ans": "DE", "multi": true, "years": ["104"], "cite": "Neligan 3rd, Volume Five, Page 548, 549", "conflict": "", "etype": "ai", "expl": "", "key": "Poland syndrome 的胚胎學假說為 **subclavian artery supply disruption sequence**：胚胎約第 6 週時 subclavian artery 及其分支（含 vertebral artery）血流中斷，導致同側胸大肌胸骨頭、肋骨、乳房與上肢的發育缺陷。故正解 DE。", "peropt": {"A": "否。common carotid artery 供應頭頸，與胸壁／上肢發育無關。", "B": "否。external carotid artery 供應顏面淺層構造。", "C": "否。internal carotid artery 供應腦與眼眶。", "D": "是。subclavian artery 為核心——其血流中斷造成同側胸壁與上肢缺陷。", "E": "是。vertebral artery 為 subclavian 的分支，同屬此血流中斷序列。"}, "src": "NG", "sub": "S09"}, {"id": "NG-051", "stem": "The breast has a rich vascular blood supply from multiple arterial sources, including which vessels? (複選)", "opts": {"A": "The internal mammary perforators", "B": "The lateral thoracic artery perforators", "C": "The anterolateral intercostal perforators", "D": "The thoracoacromial artery perforators", "E": "The vessels of serratus anterior"}, "ans": "ABCDE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 1, p.7", "conflict": "同解剖兩種問法:本題問「包含哪些」故ABCDE;NG-053問「三個主要來源」故僅ACE", "etype": "ai", "expl": "", "key": "乳房的血供來自**多重動脈來源**：內乳穿通枝、外胸動脈穿通枝、前外側肋間穿通枝、胸肩峰動脈穿通枝、前鋸肌血管——本題問「包含哪些」，答案 ABCDE。⚠ 注意 NG-053 問「**三個主要**來源」，答案只有 ACE（內乳、外胸、前外側肋間）。同一解剖、兩種問法。", "peropt": {"A": "是。內乳動脈穿通枝，供應約 60% 血流，為最主要來源。", "B": "是。外胸動脈穿通枝，供應外上象限。", "C": "是。前外側肋間穿通枝。", "D": "是。胸肩峰動脈穿通枝（次要來源）。", "E": "是。前鋸肌的血管亦有貢獻（次要來源）。"}, "src": "NG", "sub": "S01"}, {"id": "NG-054", "stem": "The primary sensory innervation of the nipple areolar complex is provided by which nerve?", "opts": {"A": "The cervical plexus", "B": "The anterior branches of the 3th intercostal nerve", "C": "The anterolateral branches of the 4th intercostal nerve", "D": "The anteromedial branches of the 4th intercostal nerve", "E": "The anterior branches of the 5th intercostal nerve"}, "ans": "C", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 1, p.5", "conflict": "", "etype": "ai", "expl": "", "key": "**乳頭乳暈複合體的主要感覺神經＝第 4 肋間神經的前外側分支（anterolateral branch of T4）**。這是乳房手術最重要的單一神經事實：縮乳、隆乳、乳房固定術時外下象限的剝離都可能傷及它。此題於 105、114、115 年重複出現（見 NG-055）。", "peropt": {"A": "否。頸神經叢（鎖骨上神經）支配的是乳房上部皮膚，非 NAC。", "B": "否。第 3 肋間神經不是 NAC 的主要支配神經。", "C": "正解。第 4 肋間神經的**前外側**分支提供 NAC 主要感覺。", "D": "否。前內側分支貢獻較小，非主要來源。", "E": "否。第 5 肋間神經非 NAC 的主要支配。"}, "src": "NG", "sub": "S01"}, {"id": "NG-084", "stem": "Which of the following is not a surgical option for treating capsular contracture?", "opts": {"A": "Open capsulotomy", "B": "Capsulectomy", "C": "Pocket site change", "D": "Addtion or interposition of acellular dermal matrix (ADM)", "E": "All of above are correct"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 3, p.47", "conflict": "", "etype": "ai", "expl": "", "key": "莢膜攣縮的外科選項**全部都是**：open capsulotomy（切開釋放）、capsulectomy（莢膜切除）、pocket site change（改變平面，如 subglandular→submuscular 或建立 neo-subpectoral pocket）、加入 ADM 作為介面阻斷纖維化。答案為「以上皆正確」。", "peropt": {"A": "是。開放式莢膜切開術，切開釋放攣縮的莢膜。", "B": "是。莢膜切除術，移除整個纖維莢膜（可全或部分）。", "C": "是。改變義乳所在平面，讓義乳接觸未受影響的新組織面。", "D": "是。置入或介入 ADM，作為抗纖維化的生物介面。", "E": "正解。以上皆為治療莢膜攣縮的外科選項。"}, "src": "NG", "sub": "S03"}, {"id": "NG-032", "stem": "About endoscopic assisted reconstruction with latissimus dorsi (EARLi) flap for breast reconstruction, which of the following is incorrect?", "opts": {"A": "The latissimus dorsi is a Mathes and Nahai type 4 muscle flap.", "B": "The EARLi technique is best suitable for women requiring resection of 20-30% of their breast volume.", "C": "It is optimal for defects in the upper outer quadrant, the site of occurrence for approximately 75% of breast cancer.", "D": "The EARLi flap is performed after lesion excision and confirmation of final pathology reports.", "E": "The procedure is best performed in the early postoperative period (1-3 weeks)."}, "ans": "A", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 5, p.88-89", "conflict": "", "etype": "ai", "expl": "", "key": "EARLi（內視鏡輔助闊背肌重建）題的錯誤在第一句：latissimus dorsi 是 Mathes-Nahai **Type V**（一條優勢蒂 thoracodorsal artery ＋多條節段性次要蒂：posterior intercostal 與 lumbar arteries），不是 Type IV。Type V 的特性正是「單靠優勢蒂即可完整存活」，這是 LD 能被翻轉到胸壁的解剖基礎。", "peropt": {"A": "正解（錯述）。LD 為 Mathes-Nahai **Type V**，不是 Type 4。Type IV 是節段性多蒂（如 sartorius、tibialis anterior），存活範圍受限。", "B": "正確。EARLi 適用於需切除乳房體積 20–30% 的病人（部分乳房缺損重建）。", "C": "正確。約 75% 乳癌發生於外上象限，該處缺損最適合以 LD 系統重建。", "D": "正確。EARLi 於病灶切除並確認最終病理報告（切緣陰性）後施行，避免重建後才發現切緣陽性。", "E": "正確。最佳時機為術後早期（1–3 週）。"}, "src": "NG", "sub": "S14"}, {"id": "NG-119", "stem": "下列有關breast ptosis的描述，哪些是正確的? (複選)", "opts": {"A": "Breast ptosis is defined by its anatomic relationship to the inframammary fold (IMF).", "B": "According to Regnault classification, grade II breast ptosis exists when the nipple is 1-3 cm below the IMF but still above the lower pole of the breast.", "C": "In glandular ptosis, the nipple rests above the IMF but the majority of breast tissue rests below the IMF.", "D": "Pseudoptosis is most common after corrective procedures for glandular ptosis", "E": "Tuberous breast deformity is related to parenchymal maldistribution."}, "ans": "ABCDE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 7, p.121-122", "conflict": "", "etype": "ai", "expl": "", "key": "乳房下垂全部五項敘述皆正確。Regnault 分級以**乳頭與 IMF 的相對位置**定義：Grade I 乳頭在 IMF 高度；Grade II 乳頭低於 IMF 1–3 cm 但仍高於乳房最低點；Grade III 乳頭低於 IMF 超過 3 cm 且位於乳房最低點。Glandular ptosis 是乳頭在 IMF 之上但腺體多數落在 IMF 之下；Pseudoptosis 則是乳頭位置未降、下極卻鬆垂。", "peropt": {"A": "對。下垂的定義即以乳頭相對 IMF 的解剖位置界定。", "B": "對。Grade II：乳頭低於 IMF 1–3 cm，但仍高於乳房下極最低點。", "C": "對。腺體性下垂（glandular ptosis）乳頭仍在 IMF 之上，但多數乳腺組織落在 IMF 之下。", "D": "對。Pseudoptosis 最常見於腺體性下垂矯正手術之後（乳頭固定但下極再度鬆垂）。", "E": "對。Tuberous breast 的本質是實質分佈異常（parenchymal maldistribution）。"}, "src": "NG", "sub": "S06"}, {"id": "NG-187", "stem": "關於breast cancer，下列哪些是正確的? (複選)", "opts": {"A": "Screening mammography has shown to reduce mortality by early detection of disease.", "B": "Core needle biopsy is the preferred diagnostic strategy.", "C": "Based on the prognostic markers estrogen receptor, progesterone receptor and the HER2/neu oncoprotein, several unique molecular subtypes of breast cancer have been identified.", "D": "The basal subtype is ER, PR, HER2/neu negative, or the so-called triple negative subtype, typically with high grade and high proliferation rates.", "E": "Many stage 0, stage I, or stage II breast cancer patients planning for mastectomy are candidates for immediate breast reconstruction."}, "ans": "ABCDE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 10, p.266", "conflict": "", "etype": "ai", "expl": "", "key": "乳癌腫瘤學五項基本事實全對：篩檢乳房攝影可經早期發現降低死亡率；**粗針切片（core needle biopsy）是首選診斷方式**；依 ER／PR／HER2 可分出分子亞型；basal 型即三陰性（高惡性度、高增殖）；stage 0/I/II 且計畫乳房切除者多為即時重建的合適人選。", "peropt": {"A": "對。篩檢乳房攝影經早期偵測疾病而降低死亡率。", "B": "對。粗針切片是首選診斷策略（可取得組織學與受體狀態）。", "C": "對。依 ER、PR、HER2/neu 三個預後標記可分出獨特的分子亞型。", "D": "對。Basal 亞型即 ER／PR／HER2 三陰性，典型為高惡性度、高增殖率。", "E": "對。多數 stage 0、I、II 且計畫乳房切除者，是即時重建的合適人選。"}, "src": "NG", "sub": "S12"}, {"id": "NG-157", "stem": "有關partial breast reconstruction，下列何者錯誤?", "opts": {"A": "Poor cosmetic results following breast conservation therapy are usually due to breast shape, tumor size, tumor location, and postoperative radiation.", "B": "Partial breast reconstruction, when indicated, is best performed at the time of resection (immediate reconstruction).", "C": "When the concern of positive margins does exist, the reconstruction can be delayed until confirmation of negative margins.", "D": "Patients at increased risk of positive margins included younger age(< 40 years old), extensive DCIS, high grade, infiltrating lobular carcinoma, HER2/neu positivity.", "E": "Delayed-immediate reconstruction is usually following radiation therapy."}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 11, p.296-298", "conflict": "考生註記:E於新版已修正為正確敘述(delayed-immediate指放療前先置擴張器),舊版答案E　【原檔考生註記】此題唯一答案E, 於新版已修正為一正確敘述,故不算錯", "etype": "ai", "expl": "", "key": "Partial breast reconstruction 的時序：有指徵時**最好在切除的同一次手術即時重建**；若擔心切緣陽性，可延後至確認切緣陰性再做。⚠ 選項 E「Delayed-immediate reconstruction 通常在放療之後」——舊版判為錯述（答案 E），但原檔考生註記指出**新版已把此敘述修正為正確**（delayed-immediate 指放療前先置擴張器佔位）。依年份作答，概念記「delayed-immediate ＝ 先佔位、待病理與放療計畫確定後再定案」。", "peropt": {"A": "正確。乳房保留治療後美觀不佳，主因為乳房形狀、腫瘤大小、腫瘤位置與術後放療。", "B": "正確。有指徵時，部分乳房重建最好在切除當次即時完成。", "C": "正確。若擔心切緣陽性，可延後重建至確認切緣陰性。", "D": "正確。切緣陽性高風險族群：年齡 <40 歲、廣泛 DCIS、高惡性度、浸潤性小葉癌、HER2/neu 陽性。", "E": "本年判為錯述（答案 E）。原檔考生註記：新版已將此敘述修正為正確——delayed-immediate 的擴張器置放是在**放療之前**做為佔位，此選項在新版不算錯。"}, "src": "NG", "sub": "S11"}, {"id": "NG-109", "stem": "下列何者不是breast reduction可能發生的complication?", "opts": {"A": "Hematoma", "B": "Nipple areola ischemia", "C": "Fat necrosis", "D": "Asymmetry", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 9, p.243", "conflict": "", "etype": "ai", "expl": "", "key": "縮乳可能的併發症「以上皆是」：血腫、乳頭乳暈缺血、脂肪壞死、不對稱。核心機轉是**蒂部（pedicle）灌流與皮膚囊袋張力**的平衡；切除量愈大、蒂愈長，缺血與脂肪壞死風險愈高。", "peropt": {"A": "是。血腫（約 4%）。", "B": "是。乳頭乳暈缺血，蒂部過長或張力過大時發生。", "C": "是。脂肪壞死，尤其在切除量大、蒂部灌流邊緣處。", "D": "是。兩側不對稱是常見的次要修整原因。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S07"}, {"id": "NG-083", "stem": "Which of the following imaging techniques can be used in preoperative mapping of donor areas in breast reconstruction?", "opts": {"A": "Hand-held Doppler ultrasound", "B": "Color Doppler imaging", "C": "Multidetector-row computed tomography (MDCT)", "D": "Magnetic resonance imaging (MRI)", "E": "All of the above"}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 13, p.326-328", "conflict": "", "etype": "ai", "expl": "", "key": "術前供區穿通枝定位的影像工具「全部都是」：手持式都卜勒、彩色都卜勒、**多排電腦斷層（MDCT，目前最準確、可顯示穿通枝走行與口徑）**、磁振造影（無輻射，適合年輕病人）。", "peropt": {"A": "是。手持式都卜勒超音波，簡便但特異性低。", "B": "是。彩色都卜勒可評估血流方向與速度。", "C": "是。MDCT 為目前最準確的術前穿通枝定位工具。", "D": "是。MRI 無輻射，適合年輕或需重複檢查者。", "E": "正解。以上皆可用於術前供區定位。"}, "src": "NG", "sub": "S15"}, {"id": "NG-120", "stem": "下列有關breast reduction的敘述，何者錯誤?", "opts": {"A": "The inferior pedicle procedure remains one of the most common technique", "B": "The blood supply of inferior pedicle is only from the intercostal perforators.", "C": "The Lassus, Lejour, and Lista techiniques for breast reduction are all based on the superior pedicle.", "D": "The Hall-Findlay technique is based on the medial pedicle.", "E": "The technique principle is that \"what is most important is what remains, not what is removed\"."}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume 5, Chapter 8, p.170, P178", "conflict": "", "etype": "ai", "expl": "", "key": "下蒂（inferior pedicle）的血供**不只來自肋間穿通枝**，還包括內乳動脈的穿通枝（尤其第 4–6 肋間），這正是它灌流可靠的原因。故 B 為錯述。其餘：下蒂術式仍是最常用之一；Lassus／Lejour／Lista 皆基於上蒂；Hall-Findlay 基於內側蒂；核心原則是「重要的是留下什麼，而不是切掉什麼」。", "peropt": {"A": "正確。下蒂術式仍是最常用的縮乳技術之一。", "B": "正解（錯述）。下蒂的血供**不只**肋間穿通枝，還有內乳動脈穿通枝。", "C": "正確。Lassus、Lejour、Lista 三種術式皆以上蒂（superior pedicle）為基礎。", "D": "正確。Hall-Findlay 技術以內側蒂（medial pedicle）為基礎。", "E": "正確。核心原則是「what remains, not what is removed」。"}, "src": "NG", "sub": "
