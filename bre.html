S07"}, {"id": "NG-122", "stem": "下列關於Expander-Implants breast reconstructions何者為是:", "opts": {"A": "Saline implant比silicone gel implant更易產生capsule contracture.", "B": "In INAMED pass study, infection was the most common reason for implant removal through 5 years.", "C": "Any convincing theory for capsular contracture is tightly related to an upregulated response to foreign bodies, IFN-γ is effective in preventing fibrosis and reducing the extent of collagen reaction when a capsule has been formed.", "D": "If the nipple areola complex was not preserved, may be reconstructed in a second stage with a local flaps technique 3 months after the second surgical stage.", "E": "In the Michigan Breast Reconstruction Outcome Study, post-OP one-year total complication rates between the expander-implant group and the combined TRAM flap groups showed no significant difference."}, "ans": "E", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 337, 362-366", "conflict": "【原檔考生註記】此題大部分的敘述和新版內容有出入(D選項應該也對, 另外A選項不同章節出現不同說法", "etype": "ai", "expl": "", "key": "本題僅 E 為正確：Michigan Breast Reconstruction Outcome Study 顯示擴張器－義乳組與 TRAM 組**術後一年總併發症率無顯著差異**。⚠ 原檔考生註記指出本題多數敘述與新版有出入（D 選項應該也對；A 選項在不同章節說法不同），屬低品質題，記結論即可。", "peropt": {"A": "依本年答案鍵為錯述（鹽水袋是否比矽膠更易莢膜攣縮，不同章節說法不一，屬有爭議敘述）。", "B": "錯。INAMED 研究中五年內義乳移除最常見原因並非感染。", "C": "錯。IFN-γ 並非「有效」預防纖維化或減少已形成莢膜的膠原反應。", "D": "依本年答案鍵為錯述；惟原檔考生註記認為此敘述（NAC 未保留者可於第二階段手術後 3 個月以局部皮瓣重建）也說得通。", "E": "正解。Michigan 研究顯示擴張器－義乳組與 TRAM 組術後一年總併發症率無顯著差異。"}, "src": "NG", "sub": "S03"}, {"id": "NG-131", "stem": "下列關於Latissumus dorsi flap breast reconstruction何者為非:", "opts": {"A": "The most common complication is seroma at the back donor site.", "B": "Postoperative muscle atrophy of 20–25% should be taken into consideration during the insetting and sizing of the flap.", "C": "The intact long thoracic nerve may help preserve maximum volume of the flap in the long term.", "D": "它是屬於Type V muscle flap", "E": "This is a hardy flap that has an excellent and reliable circulation; necrosis of the mastectomy skin flaps is a more common complication."}, "ans": "C", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 389", "conflict": "", "etype": "ai", "expl": "", "key": "維持 LD 皮瓣長期體積的關鍵是 **thoracodorsal nerve（胸背神經）保持完整**，肌肉才不會去神經萎縮；long thoracic nerve 支配的是 serratus anterior，與 LD 無關。故 C 為錯述。另需記住：術後肌肉萎縮 20–25%，塑形時要預留。", "peropt": {"A": "正確。背部供區血清腫是最常見併發症。", "B": "正確。術後肌肉萎縮約 20–25%，皮瓣置入與體積估算時須預先補償。", "C": "正解（錯述）。維持皮瓣體積者為完整的 **thoracodorsal nerve**；long thoracic nerve 支配前鋸肌，與 LD 體積無關。", "D": "正確。LD 為 Type V 肌皮瓣。", "E": "正確。LD 血循極佳、皮瓣本身壞死少見，反而是乳房切除皮瓣（mastectomy skin flap）壞死較常見。"}, "src": "NG", "sub": "S14"}, {"id": "NG-136", "stem": "下列關於TRAM breast reconstruction何者為非:", "opts": {"A": "In the normal risk patient, the bilateral pedicled TRAM is preferred over the bilateral free TRAM. The unilateral free TRAM is preferred over the unilateral pedicle TRAM.", "B": "Moon and Taylor described three basic arterial schemata of the TRAM flap, most patients showed symmetry vascular patterns between their rectus muscles, only 2% of patients showed different on each side.", "C": "The two most common recipient vessel sites in free TRAM reconstruction of the breast are the thoracodorsal vessels and the internal mammary vessels.", "D": "The incidence of loss of native skin of the breast can be reduced with the use of dye techniques such as fluorescein or the new SPY technique. These techniques are particularly helpful in pigmented patients.", "E": "The blood supply of the lower anterior abdominal wall comes from both the superior and inferior deep epigastric arteries which connect to one another via \"choke\" vessels in the mid-abdomen."}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 394", "conflict": "", "etype": "ai", "expl": "", "key": "Moon 與 Taylor 描述 TRAM 皮瓣三種基本動脈型態，關鍵結論是：**兩側腹直肌的血管型態大多不對稱**，僅少數（約 2%）左右完全相同。題目把結論反過來寫，故 B 為錯述。", "peropt": {"A": "依本年答案鍵視為正確敘述（一般風險病人的術式選擇順序）。", "B": "正解（錯述）。Moon 與 Taylor 的觀察是多數病人兩側血管型態**不對稱**，只有約 2% 兩側相同；題目敘述方向相反。", "C": "正確。free TRAM 最常用的兩處受區血管即胸背血管與內乳血管。", "D": "正確。fluorescein 或 SPY（ICG）等染劑技術可降低乳房原生皮膚壞死率，對深膚色病人特別有幫助。", "E": "正確。下腹壁由上、下深腹壁動脈共同供應，兩者在中腹部經 choke vessels 相連。"}, "src": "NG", "sub": "S13"}, {"id": "NG-137", "stem": "下列關於deep inferior epigastric artery perforator flap(DIEAP flap)何者為是(複選):", "opts": {"A": "The main advantage of the DIEAP flap is the preservation of full rectus abdominis muscle function (less donor site morbidity).", "B": "比起TRAM flap, 需要較長的learning curve", "C": "The deep inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap.", "D": "Deep inferior epigastric artery分為lateral and medial branch", "E": "For an experienced surgeon, DIEAP flap loss rate is < 1%"}, "ans": "ABDE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 437", "conflict": "", "etype": "ai", "expl": "", "key": "DIEAP 四項正確事實：保留完整腹直肌功能（供區傷害小）、學習曲線比 TRAM 長、DIEA 分為內側與外側兩支、經驗豐富術者皮瓣壞死率 <1%。錯的是 C：皮島最大引流靜脈是 **SIEV**（表淺系統），不是 deep inferior epigastric vein。", "peropt": {"A": "對。DIEAP 最大優點即完整保留腹直肌功能，供區傷害最小。", "B": "對。穿通枝肌內剝離技術門檻高，學習曲線比 TRAM 長。", "C": "錯。皮島最大回流靜脈為 superficial inferior epigastric vein（SIEV）；深層靜脈雖為主要吻合對象，但引流皮島的口徑最大者是 SIEV。", "D": "對。DIEA 進入腹直肌後分為 medial 與 lateral 兩支。", "E": "對。經驗豐富術者的 DIEAP 皮瓣完全壞死率 <1%。"}, "src": "NG", "sub": "S13"}, {"id": "NG-175", "stem": "關於Alternative flaps for breast reconstruction的描述, 何者錯誤:", "opts": {"A": "While harvesting the transverse upper gracilis free flap (TUG), keep the saphenous vein intact could decrease lymphedema.", "B": "When dissecting the internal mammary vessels in the chest, leave the first perforator; it is often the dominant perforator.", "C": "The most common revision for the donor site of inferior gluteal artery free flap (IGAP) is liposuction of the lateral trochanter fat for contouring.", "D": "Deep femoral artery perforator flap (DFAP) has a large septocutaneous perforator with excellent flap profusion.", "E": "The advantage of lumbar artery perforator flap (LAP) is good volume of fat without causing a buttock contour deformity."}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 470", "conflict": "", "etype": "ai", "expl": "", "key": "替代皮瓣的四項正確細節：TUG 取瓣時保留 saphenous vein 可降低淋巴水腫；IGAP 供區最常見的修整是抽脂改善大轉子外側輪廓；DFAP 有粗大中隔穿通枝、灌流極佳；LAP 提供大量脂肪且不造成臀部輪廓變形。⚠ B 被判為錯述，但「內乳血管第一穿通枝是否為優勢支」在文獻中並非定論，記憶時抓「顯露內乳血管以吻合為優先」的原則即可。", "peropt": {"A": "正確。取 TUG 時保留大隱靜脈可降低下肢淋巴水腫風險。", "B": "正解（本年判為錯述）。不應為保留第一穿通枝而犧牲內乳血管的顯露與吻合品質；「第一穿通枝即為優勢支」的說法亦非通則。", "C": "正確。IGAP 供區最常見的二次修整是抽脂處理大轉子外側脂肪以修飾輪廓。", "D": "正確。DFAP 具粗大的 septocutaneous 穿通枝，皮瓣灌流優異。", "E": "正確。LAP 的優點正是脂肪量足夠，且不造成臀部輪廓缺損（取自腰側而非臀部）。"}, "src": "NG", "sub": "S14"}, {"id": "NG-133B", "stem": "下列關於Omentum reconstruction of the breast何者為非", "opts": {"A": "可以配合implant、mesh來使用。", "B": "主要用於skin-sparing mastectomy的病患上", "C": "可以同時用在bilateral breast reconstruction", "D": "Omentum flap是放置於pectoralis major muscle的後方", "E": "其pedicle是right branch of the gastroepiploic artery and vein"}, "ans": "D", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 473-477", "conflict": "本題(105年)與NG-133(104年)題幹相同但五個選項完全不同,先前曾被誤合併。大網膜置於胸大肌前方(皮下)", "etype": "ai", "expl": "", "key": "⚠ **本題（105 年）與 NG-133（104 年）題幹相同但五個選項完全不同**，先前曾被誤合併。105 年版考的是解剖位置：**大網膜皮瓣置於胸大肌「前方」（皮下）**，不是後方——因此 D 為錯述。其蒂為**右側胃網膜動靜脈**，可合併義乳／網膜使用，可用於雙側重建，主要用於 skin-sparing mastectomy。", "peropt": {"A": "正確。可配合義乳與網膜（mesh）使用以補足體積與支撐。", "B": "正確。主要用於保留皮膚的乳房切除（skin-sparing mastectomy）病人。", "C": "正確。大網膜可分為左右兩半，同時用於雙側乳房重建。", "D": "正解（錯述）。大網膜皮瓣置於胸大肌**前方（皮下）**以塑造乳房丘，不是置於肌肉後方。", "E": "正確。其血管蒂為 right gastroepiploic artery and vein（右胃網膜動靜脈）。"}, "src": "NG", "sub": "S15"}, {"id": "NG-117", "stem": "下列哪些pedicled perforator flap較適合用來重建inferomedial quadrant breast partial defect（複選）", "opts": {"A": "Latissumus dorsi flap (LD)", "B": "Thoracodorsal artery perforator flap (TDAP)", "C": "Serratus anterior artery perforator flap (SAAP)", "D": "Anterior intercostal artery perforator flap (AICAP)", "E": "Superior epigastric artery perforator flap (SEAP)"}, "ans": "DE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 489", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-101／NG-102 完全相同的概念，字母再度換位：**下內側象限缺損 → AICAP（D）＋ SEAP（E）**。LD、TDAP、SAAP 皆為外側／背側來源。三題並列即是「記概念、勿背字母」的最佳訓練。", "peropt": {"A": "不適合。LD 為背側肌皮瓣，用於外側象限。", "B": "不適合。TDAP 源自外側背部的胸背動脈穿通枝。", "C": "不適合。SAAP 位於外側胸壁（前鋸肌區）。", "D": "適合。AICAP 來自前肋間動脈穿通枝，位置正對下內側。", "E": "適合。SEAP 自上腹壁動脈穿通枝上提，補下內側缺損。"}, "src": "NG", "sub": "S14"}, {"id": "NG-140", "stem": "下列關於fat grafting to the breast的敘述何者為非", "opts": {"A": "多用在breast contour deformity 的患者", "B": "可用於Congenital beast deformity如Poland symdrome的患者", "C": "對於有breast cancer risk的年輕女性也可放心使用", "D": "理論上可用於Primary breast reconstruction", "E": "術後若breast持續swelling超過2個月，可能要懷疑是fat necrosis或liponecrotic cyst產生"}, "ans": "C", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 594", "conflict": "", "etype": "ai", "expl": "", "key": "乳房脂肪移植的爭議核心：對於**具乳癌風險的年輕女性不可「放心」使用**——脂肪移植會產生鈣化與囊腫影響影像判讀，且移植脂肪的旁分泌環境對潛在腫瘤細胞的影響尚無定論，須審慎評估與追蹤。其餘（輪廓缺損、Poland 等先天畸形、理論上可作主要重建、術後腫脹逾 2 個月須懷疑脂肪壞死或液化囊腫）皆正確。", "peropt": {"A": "正確。最主要適應症即乳房輪廓缺損的微調。", "B": "正確。可用於 Poland syndrome 等先天畸形的輪廓填補。", "C": "正解（錯述）。對有乳癌風險的年輕女性不能說「放心使用」；影像干擾與腫瘤微環境疑慮尚未完全排除。", "D": "正確。理論上可作為主要重建方式（需多次施打），但尚非公認的單一標準術式。", "E": "正確。術後腫脹持續超過 2 個月，應懷疑脂肪壞死或液化性囊腫（liponecrotic cyst）。"}, "src": "NG", "sub": "S16"}, {"id": "NG-135", "stem": "下列關於Poland syndrome何者為非（複選）", "opts": {"A": "好發於left-sided及female", "B": "Absence of clavicular portion of pectoralis major", "C": "通常在childhood就可以診斷", "D": "在女性患者中，依chest deformity嚴重程度分成4個group來治療", "E": "只有group III的女性患者才可能用到tissue expander來重建"}, "ans": "ABCDE", "multi": true, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 548-552", "conflict": "Poland:「左側/女性好發」與「缺clavicular portion」皆為錯述。正解:右側好發、男性2:1-3:1、缺sternal head(胸骨頭)　Poland統一結論:單側、右側好發、男性2-3:1、缺pectoralis major胸骨頭(sternal head)、肋骨2-4、subclavian artery血流中斷序列", "etype": "ai", "expl": "", "key": "本題五個敘述**全部錯誤**（答案 ABCDE）。逐一對照正確版本：Poland 為 **右側**好發、**男性**居多；缺 **sternal head** 而非 clavicular portion；多在**青春期**乳房發育時才明顯而被診斷；女性依胸壁變形嚴重度分 **3 個 group**；擴張器的使用並不限於 group III。", "peropt": {"A": "錯。正確為右側好發、男性居多（男女比約 2:1）。", "B": "錯。缺損為 pectoralis major 的胸骨頭（sternal head），非鎖骨頭。", "C": "錯。多數要到青春期乳房開始發育、兩側不對稱明顯時才被診斷，非童年即確診。", "D": "錯。女性病人依胸壁變形嚴重度分為 3 個 group（非 4 個）。", "E": "錯。擴張器的使用不限於 group III；依軟組織與胸壁條件決定。"}, "src": "NG", "sub": "S09"}, {"id": "NG-141", "stem": "下列關於massive weight loss患者的contouring改變及治療何者為非", "opts": {"A": "嚴重的bat wing deformity可用brachioplasty來治療", "B": "嚴重的breast ptosis合併有lateral chest roll形成，用traditional mastopexy治療即可", "C": "Pseudogynecomastia只是增加subareolar fat，並非glandular tissue的增大", "D": "Excison with dermoglandular flap重建pseudogynecomastia，nipple posiiton很重要", "E": "若有moderate to severe amounts of skin redundancy，需施行excisional procedure"}, "ans": "B", "multi": false, "years": ["105"], "cite": "Neligan 3rd, Volume Five, Page 566", "conflict": "", "etype": "ai", "expl": "", "key": "大量減重（MWL）病人的**嚴重乳房下垂合併外側胸壁脂肪捲，傳統 mastopexy 並不足夠**——必須以自體實質重排（autoaugmentation）或延伸至外側的切除術式一併處理 lateral chest roll，否則外側殘留變形。其餘（bat wing 用 brachioplasty、pseudogynecomastia 只是乳暈下脂肪增加、皮腺瓣重建須注意乳頭位置、中重度皮膚鬆弛需切除術式）皆正確。", "peropt": {"A": "正確。嚴重的蝙蝠翼變形以 brachioplasty 治療。", "B": "正解（錯述）。嚴重下垂合併外側胸壁脂肪捲，**傳統 mastopexy 不足**，須合併外側切除或自體實質重排。", "C": "正確。Pseudogynecomastia 是乳暈下脂肪增加，非腺體增生。", "D": "正確。以皮腺瓣切除重建 pseudogynecomastia 時，乳頭位置的規劃至關重要。", "E": "正確。中至重度皮膚鬆弛須施行切除性手術。"}, "src": "NG", "sub": "S08"}, {"id": "NG-210", "stem": "關於理想乳房外觀的敘述，下列何者錯誤？", "opts": {"A": "Size, symmetry, proportionality and the location of the breast and its landmarks on the chest all play a role in the attractiveness of the breast.", "B": "The appearance of the ideal breast is somewhat objective.", "C": "The distance from the sternal notch/midclavicular line to the nipple is 19-21cm.", "D": "The distance from nipple to inframammary fold is 5-7cm.", "E": "The Distance from the nipple to the midline is 9-11cm."}, "ans": "B", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 1", "conflict": "", "etype": "ai", "expl": "", "key": "理想乳房外觀的關鍵陷阱：**「理想乳房」的外觀是相當主觀（subjective）而非客觀**。可量化的參考值：胸骨上切跡／鎖骨中線到乳頭 **19–21 cm**、乳頭到 IMF **5–7 cm**、乳頭到中線 **9–11 cm**。", "peropt": {"A": "正確。大小、對稱、比例與胸壁上的位置共同決定乳房的吸引力。", "B": "正解（錯述）。理想乳房的外觀相當**主觀**（subjective），受文化與個人偏好影響。", "C": "正確。胸骨上切跡／鎖骨中線至乳頭距離 19–21 cm。", "D": "正確。乳頭至 IMF 距離 5–7 cm。", "E": "正確。乳頭至中線距離 9–11 cm。"}, "src": "NG", "sub": "S01"}, {"id": "NG-180", "stem": "關於NAC (Nipple Areola Complex)的敘述，下列何者正確？", "opts": {"A": "The ducts transition from stratified epithelium on the surface to columnar cells within ducts, and ultimately to cuboidal cells of the lactiferous glands itself.", "B": "Preservation of the underlying parenchyma, with its robust arterial contributions, will maintain the viability of the nipple, as well as help to preserve lactation function.", "C": "Branches of the lateral branch of the 5th intercostal nerve provide primary innervation.", "D": "Both location and function of the NAC are important when performing breast surgery.", "E": "Internal mammary perforators, lateral thoracic perforators and intercostal perforators all provide arterial supply of NAC."}, "ans": "BDE", "multi": true, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 5", "conflict": "", "etype": "ai", "expl": "", "key": "NAC 三項正確：保留下方的乳腺實質（含其豐富動脈貢獻）可維持乳頭存活與哺乳功能；NAC 的**位置與功能**在乳房手術中皆重要；內乳、外胸與肋間穿通枝**共同**供應 NAC。錯的是 A（上皮轉換方向寫反）與 C（主要神經是**第 4** 肋間神經，不是第 5）。", "peropt": {"A": "錯。上皮的轉換方向為：表面的**角化複層鱗狀上皮** → 乳管內的柱狀細胞 → 乳腺腺體的立方細胞；題目把表面寫成 stratified epithelium 而未指明鱗狀，且順序描述有誤。", "B": "對。保留下方乳腺實質及其動脈貢獻，可維持乳頭存活並保存哺乳功能。", "C": "錯。主要感覺由**第 4** 肋間神經的外側分支提供，不是第 5。", "D": "對。乳房手術時 NAC 的位置與功能同等重要。", "E": "對。內乳穿通枝、外胸穿通枝與肋間穿通枝皆供應 NAC。"}, "src": "NG", "sub": "S01"}, {"id": "NG-163", "stem": "有關隆乳手術相關敘述，下列何者正確？", "opts": {"A": "Saline implants were performed earlier than silicon implants for breast augmentation.", "B": "Due to overfilled saline implants may result in knuckle-like palpation and unnatural firmness, underfilling the saline implants is recommended.", "C": "The first generation of silicon implants were round shaped.", "D": "Preoperative mammography is recommended for patients over 45 years of age or any age with significant risk factors for breast cancer.", "E": "The skin pinch test with result of <2cm will often indicate a need for subpectoral placement of the implants."}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 13-16", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-075 同一鐵則的正向出題：**pinch test < 2 cm ⇒ 需放 subpectoral（肌肉下）**。其餘四項皆為錯述：矽膠義乳早於鹽水袋問世；鹽水袋應**足量或略過量充填**（低充填反而波紋明顯）；第一代矽膠義乳為**淚滴形**；術前乳房攝影建議 **>40 歲**（或任何年齡具明顯乳癌風險者）。", "peropt": {"A": "錯。矽膠義乳（1962）早於鹽水袋用於隆乳。", "B": "錯。低充填（underfilling）會造成波紋與皺褶；應足量充填以避免摺痕與破裂。", "C": "錯。第一代矽膠義乳為淚滴（anatomic）形，非圓形。", "D": "錯。術前乳房攝影建議年齡為 **>40 歲**（或任何年齡具明顯乳癌風險因子者），非 45 歲。", "E": "正解。皮膚 pinch test < 2 cm 時需將義乳置於肌肉下（subpectoral）。"}, "src": "NG", "sub": "S02"}, {"id": "NG-142", "stem": "下列關於隆乳手術的計畫敘述，下列何者錯誤？", "opts": {"A": "Four types of incision are commonly performed: transaxillary, inframammary, periareolar, and transumbilical.", "B": "Transumbilical incision can be used only with saline implants.", "C": "In the theory, the best position for mammary implant is in the subglandular plane due to anatomically correct position to maintain natural shape and form.", "D": "Implant selection is related from breast height lesser than breast width.", "E": "Surgeon should select an implant that is equal to the existing breast width."}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 19, 20, 25", "conflict": "", "etype": "ai", "expl": "", "key": "義乳尺寸選擇的原則是以**乳房基底寬度（base width）為基準，選擇寬度略小於或等於基底寬度**，並扣除軟組織厚度；直接「選擇等於現有乳房寬度」的義乳會造成外側緣可見與 lateral malposition。此外乳房高度小於寬度，是選擇義乳形狀的依據之一。", "peropt": {"A": "正確。四種常見切口。", "B": "正確。經肚臍入路只能置入鹽水袋。", "C": "正確（依本年答案鍵）。理論上腺體下是解剖上正確的位置，最能維持自然形狀。", "D": "正確。乳房高度小於寬度，此關係影響義乳形狀的選擇。", "E": "正解（錯述）。義乳寬度應**略小於或依基底寬度扣除軟組織厚度**後決定，不是直接等於現有乳房寬度。"}, "src": "NG", "sub": "S02"}, {"id": "NG-116", "stem": "下列何者為隆乳手術相關的可能併發症？", "opts": {"A": "Alterations of nipple sensitivity", "B": "Capsular contracture", "C": "Infection", "D": "Mondor's disease", "E": "ALCL (anaplastic large cell lymphoma)"}, "ans": "ABCDE", "multi": true, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 32-38", "conflict": "", "etype": "ai", "expl": "", "key": "隆乳的可能併發症「全部都是」：乳頭感覺改變、莢膜攣縮、感染、Mondor's disease（乳房淺靜脈血栓性靜脈炎）、以及 ALCL（BIA-ALCL）。此題把常見與罕見併發症一次列出，答案 ABCDE。", "peropt": {"A": "是。乳頭感覺改變，與切口位置及剝離範圍相關。", "B": "是。莢膜攣縮，最常見的長期併發症。", "C": "是。感染，發生率低但後果嚴重。", "D": "是。Mondor's disease，乳房淺靜脈血栓性靜脈炎，多自限。", "E": "是。BIA-ALCL，與紋理面義乳相關的罕見淋巴瘤。"}, "src": "NG", "sub": "S05"}, {"id": "NG-161", "stem": "有關於secondary breast augmentation可能遭遇的困難，下列何者錯誤？", "opts": {"A": "external and internal scarring", "B": "previous dissected tissue planes", "C": "thinning and stretching of the overlying soft tissues", "D": "presence of capsule and pre-existing implant", "E": "surgeon's preference"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 39", "conflict": "", "etype": "ai", "expl": "", "key": "二次隆乳的困難來自**病人與組織的客觀條件**：內外疤痕、既往剝離過的組織平面、覆蓋軟組織變薄拉伸、既存莢膜與舊義乳。「術者偏好」是主觀選擇，不是二次手術本身的困難。", "peropt": {"A": "是困難。內外部疤痕使解剖平面辨識困難。", "B": "是困難。既往已剝離的組織平面失去正常層次。", "C": "是困難。覆蓋軟組織變薄、被撐鬆，易見義乳邊緣與 rippling。", "D": "是困難。既存莢膜與舊義乳增加處理複雜度。", "E": "正解（非困難）。術者偏好屬主觀決策，並非二次隆乳的客觀困難。"}, "src": "NG", "sub": "S04"}, {"id": "NG-159", "stem": "有關於capsular contracture的敘述，下列何者正確？", "opts": {"A": "the 2nd most common reason in secondary breast implant surgery", "B": "implant filled-material and surface", "C": "infection and radiation", "D": "bleeding or previous hematoma", "E": "over-dissection of the pocket"}, "ans": "BCD", "multi": true, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 40", "conflict": "", "etype": "ai", "expl": "", "key": "莢膜攣縮的成因（BCD）：義乳的**填充材質與表面性質**、**感染與放射治療**、**出血或既往血腫**。A 錯在排序——莢膜攣縮是二次義乳手術的**最常見**原因而非第二常見。E 的囊袋過度剝離會造成義乳**位置不良**，不是莢膜攣縮。", "peropt": {"A": "錯。莢膜攣縮是二次義乳手術的第一常見原因，不是第二。", "B": "對。填充材質與表面（光滑 vs 紋理）影響攣縮率。", "C": "對。感染（生物膜）與放射治療是強力危險因子。", "D": "對。出血或既往血腫，血液分解產物促發纖維化。", "E": "錯。囊袋過度剝離導致義乳位置不良（malposition），非莢膜攣縮。"}, "src": "NG", "sub": "S03"}, {"id": "NG-160", "stem": "有關於malposition of breast implant的敘述，下列何者錯誤？", "opts": {"A": "Soft tissue change is one of the preoperative evaluation factor, such as ptosis.", "B": "Implant malposition may be classified by direction, including high riding, double bubble, symmastia or lateral.", "C": "The malposition may always be single direction.", "D": "Postoperative fluid collections such as hematoma or seroma may contribute unexpected over-dissection of pocket and end as malposition of the implant.", "E": "Patients with Poland syndrome or pectus excavatum are at high risk for medial malposition of implant."}, "ans": "C", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 53-55", "conflict": "", "etype": "ai", "expl": "", "key": "義乳位置不良（malposition）的核心觀念是：**常為多方向合併**（例如同時偏外又偏下），不會「永遠只有單一方向」，故 C 為錯述。分類依方向分為 high riding、double bubble、symmastia、lateral；術後血腫／血清腫可造成非預期的囊袋過度擴大而導致移位。", "peropt": {"A": "正確。術前須評估軟組織變化（如下垂程度）。", "B": "正確。依方向分為 high riding、double bubble、symmastia、lateral 等。", "C": "正解（錯述）。義乳移位常是多方向合併，並非總是單一方向。", "D": "正確。術後血腫或血清腫會使囊袋非預期擴大，導致義乳移位。", "E": "正確（依本年答案鍵）。Poland syndrome 或漏斗胸病人因胸壁與胸大肌異常，義乳位置不良風險高。"}, "src": "NG", "sub": "S04"}, {"id": "NG-158", "stem": "有關於breast reconstruction after mastectomy的敘述，下列何者錯誤？", "opts": {"A": "Autologous techniques include pedicle flap or free flap reconstruction.", "B": "The best possible outcomes for reconstruction result after a skin-sparing or nipple-sparing mastectomy, in any size of breasts.", "C": "Combination of implant and pedicle flap may also provide a choice of reconstruction.", "D": "Lower abdominal flaps are most commonly used due to anatomic versatility of the region, the ability to hide the donor site under clothes, and the character of the soft tissue.", "E": "Implant-based reconstruction has minimal donor site morbidities, but is generally less natural in appearance and feel."}, "ans": "B", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 287-290", "conflict": "", "etype": "ai", "expl": "", "key": "Skin-sparing／nipple-sparing mastectomy 的最佳重建結果**並非適用於任何大小的乳房**——巨乳或明顯下垂者，保留過大的皮膚囊袋會造成鬆垂與皮瓣壞死，往往需要縮乳型切除或分期處理。故 B 為錯述。", "peropt": {"A": "正確。自體重建包含帶蒂皮瓣與游離皮瓣。", "B": "正解（錯述）。SSM／NSM 的最佳結果限於**中小型、下垂不嚴重**的乳房，並非任何大小皆適用。", "C": "正確。義乳合併帶蒂皮瓣是可行的重建組合。", "D": "正確。下腹部皮瓣最常用：解剖多樣、供區隱蔽、軟組織質地最接近乳房。", "E": "正確。義乳重建供區傷害極小，但外觀與觸感一般較不自然。"}, "src": "NG", "sub": "S12"}, {"id": "NG-162", "stem": "有關於放射線治療對於breast reconstruction after mastectomy影響的敘述，下列何者正確？", "opts": {"A": "increasing scarring", "B": "loss of skin coverage", "C": "greatly increased rate of complications with both implant-based and autologous tissue reconstruction", "D": "aesthetic outcomes", "E": "all of above"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, Volume V, Page 290", "conflict": "", "etype": "ai", "expl": "", "key": "放射治療對乳房重建的影響「全部都是」：疤痕增加、皮膚覆蓋喪失、**義乳與自體重建兩者的併發症率皆大幅上升**、美觀結果變差。這也是「預期需 PMRT 就避免即時義乳重建」的理論基礎。", "peropt": {"A": "是。放療造成纖維化與疤痕增加。", "B": "是。皮膚品質下降、覆蓋喪失。", "C": "是。義乳為主與自體組織重建的併發症率皆大幅上升（義乳更明顯）。", "D": "是。美觀結果受損。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S12"}, {"id": "NG-098", "stem": "Which of the following statements is not a well established indication for fat grafting in breasts?", "opts": {"A": "primary reconstruction as the sole method", "B": "irregularities in mastectomy flap thickness", "C": "radiation deformity in flap reconstruction", "D": "depression from fat necrosis", "E": "flap border step-off"}, "ans": "A", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 584", "conflict": "", "etype": "ai", "expl": "", "key": "乳房脂肪移植的**確立適應症**是「輪廓微調」：乳房切除皮瓣厚度不均、皮瓣重建後的放射線變形、脂肪壞死造成的凹陷、皮瓣邊緣階梯感。**「以脂肪移植作為唯一的主要重建方式」尚未被確立**（需多次施打、體積不可預測、影像干擾）。", "peropt": {"A": "正解（非確立適應症）。單以脂肪移植作為主要重建方式尚未確立。", "B": "是適應症。乳房切除皮瓣厚度不均的填補。", "C": "是適應症。皮瓣重建後的放射線變形。", "D": "是適應症。脂肪壞死造成的凹陷。", "E": "是適應症。皮瓣邊緣階梯感（step-off）。"}, "src": "NG", "sub": "S16"}, {"id": "NG-078", "stem": "Which is the most common complication following implant based breast reconstruction?", "opts": {"A": "asymmetry and capsular contracture", "B": "wrinkling", "C": "infection", "D": "hematoma and seroma", "E": "implant malposition"}, "ans": "A", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 362", "conflict": "", "etype": "ai", "expl": "", "key": "**義乳為主的乳房重建最常見併發症＝不對稱與莢膜攣縮**。與 NG-059（再手術最常見原因）、NG-112（擴張器重建最常見再手術原因）為同一組概念的三種問法。", "peropt": {"A": "正解。不對稱與莢膜攣縮是義乳重建後最常見的併發症。", "B": "Wrinkling 常見但排序在後，多與軟組織覆蓋薄有關。", "C": "感染發生率低（數個百分比），但一旦發生後果嚴重。", "D": "血腫與血清腫屬早期併發症，發生率低於莢膜攣縮。", "E": "義乳位置不良較不對稱／莢膜攣縮少見。"}, "src": "NG", "sub": "S03"}, {"id": "NG-038", "stem": "For most surgeons, which are the recipient vessels of choice free-flap breast reconstruction?", "opts": {"A": "thoracodorsal vessels", "B": "internal mammary vessels", "C": "thoraco-acromial vessels", "D": "lateral thoracic vessels", "E": "superior thoracic artery"}, "ans": "AB", "multi": true, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 422", "conflict": "", "etype": "ai", "expl": "", "key": "游離皮瓣乳房重建的受區血管首選為 **internal mammary vessels 與 thoracodorsal vessels** 兩者。內乳血管是現代多數術者的首選（位置居中、利於塑形、不受腋窩清掃影響）；胸背血管為傳統選項與備案。其餘（thoraco-acromial、lateral thoracic、superior thoracic）皆非常規受區。", "peropt": {"A": "是。胸背血管為傳統受區選項，腋窩清掃後常已顯露。", "B": "是。內乳血管為現代首選受區。", "C": "否。Thoraco-acromial 血管位置與口徑不適合。", "D": "否。Lateral thoracic 血管口徑細、變異大。", "E": "否。Superior thoracic artery 過細，不作受區。"}, "src": "NG", "sub": "S15"}, {"id": "NG-100", "stem": "Which of the statements is wrong about muscle sparing TRAM flap?", "opts": {"A": "MS-0 flap: rectus muscle is completely transected", "B": "MS-1 flap: only the lateral portion of the rectus muscle is preserved", "C": "MS-2 flap: only the medial portion of the rectus muscle is preserved", "D": "MS-3 flap: the entire muscle is preserved", "E": "The MS-3 flap is also known as DIEP flap."}, "ans": "C", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 423", "conflict": "MS分級:MS-0全肌橫斷、MS-3全肌保留(=DIEP)。與4e/5e「MS-0=DIEP」錯述題為同一概念家族,記概念勿背字母", "etype": "ai", "expl": "", "key": "MS 分級的正向定義題（3e）：MS-0 全寬腹直肌橫斷；MS-1 只保留外側肌條；MS-2 保留內、外兩側肌條（取中段）；MS-3 整條肌肉保留＝DIEP。故「MS-2 只保留內側」為錯述。此題與 4e/5e 的「MS-0＝DIEP」錯述題屬同一概念家族，反向出題。", "peropt": {"A": "正確。MS-0：腹直肌被完全橫斷取走。", "B": "正確。MS-1：僅保留外側（lateral）肌條。", "C": "正解（錯述）。MS-2 保留的是內側與外側兩條肌帶，並非「只保留內側」。", "D": "正確。MS-3：整條肌肉保留。", "E": "正確。MS-3 即 DIEP flap。"}, "src": "NG", "sub": "S13"}, {"id": "NG-096", "stem": "Which of the following statements is not a common complication associated with nipple reconstruction?", "opts": {"A": "loss of projection", "B": "partial flap loss", "C": "infection", "D": "malposition", "E": "loss of sensation"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 519", "conflict": "", "etype": "ai", "expl": "", "key": "乳頭重建的常見併發症：**突出度流失（最常見）**、部分皮瓣壞死、感染、位置不良。**感覺喪失不算「併發症」**——重建的乳頭本來就沒有正常感覺（皮瓣為局部組織，無感覺神經重建），這是預期結果而非併發症。", "peropt": {"A": "是常見併發症。突出度隨時間流失，最常見。", "B": "是常見併發症。部分皮瓣壞死（蒂部灌流不足）。", "C": "是常見併發症。感染。", "D": "是常見併發症。位置不良，且矯正困難。", "E": "正解（非併發症）。重建的乳頭本就無正常感覺，感覺喪失是預期結果而非併發症。"}, "src": "NG", "sub": "S16"}, {"id": "NG-103", "stem": "Which statement is not true about Poland syndrome?", "opts": {"A": "incidence ranges from 1/7000-1/100000 births", "B": "bilateral congenital deformity with autosomal recessive inheritance", "C": "absence of the sternal portion of the pectoralis major mscle", "D": "male predilection of 2:1", "E": "right sided-predilection in females of 2-3:1"}, "ans": "BE", "multi": true, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 548", "conflict": "Poland側別/性別:NG106明確為「右側好發、男性2-3:1」。可佐證GS111「右側」正確、GS110「左側」為誤植　【原檔考生註記】Poland syndrome incidence neligan 已改1/7000-1/100000　Poland統一結論:單側、右側好發、男性2-3:1、缺pectoralis major胸骨頭(sternal head)、肋骨2-4、subclavian artery血流中斷序列", "etype": "ai", "expl": "", "key": "Poland syndrome 三個必記結論：**單側**（非雙側、非體染色體隱性）、缺 **pectoralis major 的胸骨頭**、**右側好發且男性居多（男性中右側 2–3:1，整體男女比約 2:1）**。發生率新版已改為 1/7000–1/100000。故錯述為 B 與 E。", "peropt": {"A": "正確（新版）。發生率 1/7000–1/100000 活產；舊版曾寫 1/30000。", "B": "正解（錯述）。Poland 為**單側**畸形，且多為散發性，並非雙側或體染色體隱性遺傳。", "C": "正確。缺損為 pectoralis major 的 **sternal portion（胸骨頭）**。", "D": "正確。男性好發，男女比約 2:1。", "E": "正解（錯述）。右側好發是在**男性**中呈 2–3:1，題目寫成 females 故錯。"}, "src": "NG", "sub": "S09"}, {"id": "NG-104", "stem": "Which statement is right about Poland syndrome?", "opts": {"A": "also knonw as acrocephalosyndactyly", "B": "multi-organ anomalies involving the lung and heart", "C": "hand anomalies, ranged from syndactyly to mitten hand", "D": "aplasia of ribs 1-2 is common", "E": "right-sided predilection in males of 2-3:1"}, "ans": "CE", "multi": true, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 548-549", "conflict": "Poland側別/性別:NG106明確為「右側好發、男性2-3:1」。可佐證GS111「右側」正確、GS110「左側」為誤植　Poland統一結論:單側、右側好發、男性2-3:1、缺pectoralis major胸骨頭(sternal head)、肋骨2-4、subclavian artery血流中斷序列", "etype": "ai", "expl": "", "key": "與 NG-103 互為正反題：Poland 的正確敘述是「手部異常（併指到 mitten hand）」與「男性中右側好發 2–3:1」。acrocephalosyndactyly 是 Apert；Poland 不合併肺、心多器官異常；缺損肋骨為第 2–4 肋（非第 1–2 肋）。", "peropt": {"A": "錯。acrocephalosyndactyly 是 **Apert syndrome** 的別名。", "B": "錯。Poland 不以肺、心等多器官異常為特徵（可合併腎異常但非典型多器官侵犯）。", "C": "正解。手部異常從併指（syndactyly）到 mitten hand（symbrachydactyly）皆可能。", "D": "錯。肋骨缺損多見於第 2–4 肋，第 1–2 肋缺如並不常見。", "E": "正解。男性中右側好發，比例 2–3:1。"}, "src": "NG", "sub": "S09"}, {"id": "NG-067", "stem": "Which in not a characteristic features of the breast following massive weight loss?", "opts": {"A": "significant ptosis", "B": "stretched skin envelope", "C": "volume deflation with flattening of shape", "D": "lateralized nipple areola complex", "E": "lateral chest roll"}, "ans": "D", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 564", "conflict": "", "etype": "ai", "expl": "", "key": "大量減重（MWL）後的乳房特徵：嚴重下垂、皮膚囊袋被撐鬆、體積流失而外形扁平、外側胸壁脂肪捲（lateral chest roll）。NAC 隨下垂而**向下（並常偏內下）**移位，並非外移，故 D 非其特徵。", "peropt": {"A": "是特徵。顯著下垂。", "B": "是特徵。皮膚囊袋被撐大而鬆弛。", "C": "是特徵。體積流失、外形扁平化。", "D": "正解（非特徵）。NAC 隨下垂向下移位，並非外側化（lateralized）。", "E": "是特徵。外側胸壁脂肪捲，常需一併處理。"}, "src": "NG", "sub": "S06"}, {"id": "NG-077", "stem": "Which is the least common donor sites for areola reconstruction by skin grafting?", "opts": {"A": "contralateral areola", "B": "inner thigh", "C": "excess/discarded skin", "D": "scar revision skin", "E": "labial tissue"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 517", "conflict": "NG-185問「常見供區包含哪些」時labial tissue仍列入答案;本題問「最不常用」故選labial。「最不常用」≠「不用」", "etype": "ai", "expl": "", "key": "乳暈重建植皮的供區依常用程度排序：對側乳暈、大腿內側、多餘／丟棄的皮膚、疤痕修整取得的皮膚，而 **labial tissue（陰唇組織）最不常用**（色素雖佳但取材侵入性高、病人接受度低）。⚠ 注意 NG-185 問「常見供區包含哪些」時，labial tissue 仍列在答案內——「最不常用」不等於「不用」。", "peropt": {"A": "常用。對側乳暈色澤與質地最相符。", "B": "常用。大腿內側色素較深、隱蔽。", "C": "常用。手術中多餘或丟棄的皮膚。", "D": "常用。疤痕修整時取得的皮膚。", "E": "正解（最不常用）。陰唇組織雖色素佳，但取材侵入性高、接受度低。"}, "src": "NG", "sub": "S16"}, {"id": "NG-097", "stem": "Which of the following statements is not a common feature of tuberous breast?", "opts": {"A": "reduced distance of the nipple-areola-complex", "B": "the inframammary fold is very cranialized or absent", "C": "mammary tissue herniated into areola", "D": "the inferior pole is absent, flat or concave", "E": "absence of one or two ribs"}, "ans": "E", "multi": false, "years": ["106"], "cite": "Neligan 3rd, volume 5, page 526", "conflict": "", "etype": "ai", "expl": "", "key": "「缺一到兩根肋骨」是 **Poland syndrome** 的特徵，不是 tuberous breast。Tuberous breast 的四大特徵：NAC 相關距離縮短、IMF 過高或缺如、乳腺實質經乳暈疝出、下極缺失／扁平／凹陷。", "peropt": {"A": "是特徵。因 IMF 上移，NAC 到 IMF 的距離縮短。", "B": "是特徵。IMF 明顯上移（cranialized）甚至缺如。", "C": "是特徵。乳腺實質經乳暈疝出（herniation）。", "D": "是特徵。下極缺失、扁平或凹陷。", "E": "正解（非特徵）。肋骨缺如屬 Poland syndrome，與 tuberous breast 無關。"}, "src": "NG", "sub": "S09"}, {"id": "NG-073", "stem": "Which is incorrect about mastopexy?", "opts": {"A": "The Benelli modifications allow the periareolar technique to be used to treat larger breasts.", "B": "The fundamental concept behind the Benelli mastopexy is treatment of the skin and gland as two separate components", "C": "Goes periareolar technique involved formation of a resistant lining of the breast by the use of a layer of prosthetic mesh.", "D": "The mesh can support the breast for a longer time during the healing and cicatrization process.", "E": "Any mastopexy technique that requires wide undermining of skin flaps could be combined with subglandular augmentation."}, "ans": "E", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 7, page 127, 132, 142", "conflict": "", "etype": "ai", "expl": "", "key": "Mastopexy 的安全原則：**需要廣泛皮瓣潛行剝離（wide undermining）的術式，不應同時合併 subglandular 隆乳**——皮膚血供已被削弱，再加義乳張力會顯著提高皮膚壞死與 NAC 缺血。故 E 為錯述。其餘關於 Benelli（皮膚與腺體分開處理，改良後可用於較大乳房）與 Goes（以人工網膜形成支撐襯裡）皆正確。", "peropt": {"A": "正確。Benelli 的改良使環乳暈術式得以應用於較大的乳房。", "B": "正確。Benelli 的核心概念是把皮膚與腺體視為兩個獨立成分分別處理。", "C": "正確。Goes 的環乳暈技術以人工網膜形成具抗力的乳房襯裡。", "D": "正確。網膜可在癒合與瘢痕化過程中提供較長時間的支撐。", "E": "正解（錯述）。需廣泛皮瓣剝離的 mastopexy 不宜同時併行 subglandular 隆乳，血供風險過高。"}, "src": "NG", "sub": "S06"}, {"id": "NG-069", "stem": "Which is correct about oncoplasty?", "opts": {"A": "It was introduced in 1993 by Audretsch.", "B": "Balancing the resection with breast landmarks and shape to preserve breast aesthetics are the fundamentals of oncoplastic surgery.", "C": "These technique draw from a number of priciples inherent to plastic surgery procedures on the breast such as breast reduction or mastopexy.", "D": "All of the above.", "E": "None of the above."}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 10, page 277", "conflict": "", "etype": "ai", "expl": "", "key": "Oncoplasty 三項基礎皆正確：**1993 年由 Audretsch 提出**；核心是「切除範圍與乳房地標／形狀之間取得平衡以保存美觀」；技術基礎來自整形外科既有的乳房手術原則（縮乳、乳房固定術）。故答案為 All of the above。", "peropt": {"A": "正確。Audretsch 於 1993 年提出 oncoplastic surgery 的概念。", "B": "正確。在腫瘤切除範圍與乳房地標、形狀之間取得平衡，以保存美觀，是核心原則。", "C": "正確。技術源自縮乳成形術、乳房固定術等既有整形外科術式的原理。", "D": "正解。以上皆正確。", "E": "有正確選項，不選 None。"}, "src": "NG", "sub": "S11"}, {"id": "NG-043", "stem": "In the absence of a deleterious BRCA mutation, the expected incidence of contralateral primary breast cancer is about ____% per year of life?", "opts": {"A": "0.3", "B": "0.5", "C": "0.7", "D": "0.9", "E": "1.5"}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 10, page 284", "conflict": "", "etype": "ai", "expl": "", "key": "**無 BRCA 致病突變者，對側原發性乳癌的發生率約每年 0.7%**（十年約 7%）。這個數字是評估對側預防性乳房切除（CPM）必要性的核心依據——沒有 BRCA 突變時，CPM 的腫瘤學效益有限。", "peropt": {"A": "0.3% 過低。", "B": "0.5% 過低。", "C": "正解。約每年 **0.7%**。", "D": "0.9% 過高。", "E": "1.5% 接近 BRCA 突變帶因者的等級，非一般族群。"}, "src": "NG", "sub": "S10"}, {"id": "NG-075", "stem": "Which is not correct about augmentation mammaplasty?", "opts": {"A": "We can use inframammary, periareolar, transaxillary or transumbilical approach.", "B": "Subfascial pocket is more superior to subglandular pocket because it provides an additional durable layer between the implant and the gland.", "C": "We can still use subglandular plane even with a pinch test < 2cm.", "D": "The disadvantage of periareolar approach includes the potential risk of contamination if the lactiferous ducts are transected.", "E": "If a hematoma does develop in the perioperative period, immediate evacuation of the hematoma and exploration of the pocket is recommended."}, "ans": "C", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 2, page 20", "conflict": "", "etype": "ai", "expl": "", "key": "隆乳平面選擇的鐵則：**上極 pinch test < 2 cm 代表軟組織覆蓋不足，必須放 subpectoral（肌肉下）**，不可用 subglandular（腺體下），否則義乳邊緣可見、rippling 明顯且莢膜攣縮率高。故 C 為錯述。", "peropt": {"A": "正確。四種常見入路：乳下緣、乳暈旁、腋下、肚臍。", "B": "正確（依本年答案鍵）。筋膜下囊袋在義乳與腺體間多一層耐久的筋膜。", "C": "正解（錯述）。pinch test < 2 cm 時**不可**使用腺體下平面，必須改為肌肉下。", "D": "正確。乳暈旁入路若切斷乳管，有污染（細菌）風險。", "E": "正確。圍手術期若發生血腫，建議立即清除並探查囊袋。"}, "src": "NG", "sub": "S02"}, {"id": "NG-066", "stem": "Which disease/syndrome is superficial thrombophlebitis of the breast?", "opts": {"A": "Poland's syndrome", "B": "Mondor's disease", "C": "Möbius syndrome", "D": "Waardenburg syndrome", "E": "Crouzon sydrome"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 2, page 25", "conflict": "", "etype": "ai", "expl": "", "key": "Mondor's disease ＝ 乳房（或胸壁）淺層靜脈的 **superficial thrombophlebitis**，臨床見皮下條索狀硬結、牽拉時凹陷，常見於隆乳或乳房手術後，多為自限性，以熱敷與 NSAID 保守治療。", "peropt": {"A": "否。Poland's syndrome 是胸大肌胸骨頭缺失合併同側上肢異常的先天畸形。", "B": "正解。Mondor's disease 即乳房淺靜脈的血栓性靜脈炎。", "C": "否。Möbius syndrome 為先天顏面神經與外展神經麻痺。", "D": "否。Waardenburg syndrome 為聽力障礙合併色素異常。", "E": "否。Crouzon syndrome 為顱縫早閉症候群。"}, "src": "NG", "sub": "S02"}, {"id": "NG-072", "stem": "Which is incorrect about capsular contracture?", "opts": {"A": "There is no capsular contracture after invention of newer 3rd, 4th and 5th generation implants.", "B": "Surface texturing of silicone gel implants reduces the incidence of capsular contracture.", "C": "More common with subglandular implants than with submuscular implans.", "D": "Capsular contracture tended to recur after closed capsulotomy.", "E": "Pain could be a symptom of capsular contracture."}, "ans": "A", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 6, page 106", "conflict": "", "etype": "ai", "expl": "", "key": "莢膜攣縮的四個必記事實：① **新世代義乳只是降低發生率，並未消除**；② 紋理表面可降低攣縮率；③ 腺體下比肌肉下常見；④ 閉合式莢膜切開後容易復發；⑤ 疼痛可為症狀之一（Baker IV）。", "peropt": {"A": "正解（錯述）。第 3、4、5 代義乳問世後莢膜攣縮率下降，但**並未消失**；所有義乳都會形成莢膜。", "B": "正確。矽膠義乳的表面紋理化可降低莢膜攣縮發生率。", "C": "正確。腺體下（subglandular）比肌肉下（submuscular）常見。", "D": "正確。閉合式莢膜切開後容易復發（且有義乳破裂風險），故已不建議。", "E": "正確。疼痛可為莢膜攣縮的症狀（Baker Grade IV 的定義即含疼痛）。"}, "src": "NG", "sub": "S03"}, {"id": "NG-071", "stem": "Which is incorrect about breast cancer? (複選)", "opts": {"A": "BIRADS 1 means negative in mammography", "B": "CT was used more than MRI for breast cancer image.", "C": "The \"linguine sign\" indicates evidence of ruptured silicone breast implants in MRI.", "D": "Endocrine therapy is for HER2/neu oncoprotein receptor", "E": "BRCA1 and BRCA2 are important for DNA double strand break repair."}, "ans": "BD", "multi": true, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 10, page 267-270", "conflict": "", "etype": "ai", "expl": "", "key": "乳癌的兩個錯述：**MRI 的使用多於 CT**（CT 不是乳癌的標準影像工具）；**內分泌治療針對的是 ER／PR（荷爾蒙受體），不是 HER2/neu**（HER2 用標靶治療如 trastuzumab）。其餘正確：BIRADS 1 為陰性、linguine sign 代表矽膠義乳破裂、BRCA1/2 參與 DNA 雙股斷裂修復。", "peropt": {"A": "正確。BIRADS 1 代表乳房攝影陰性。", "B": "錯。乳癌影像以 MRI 為主，CT 使用遠少於 MRI。", "C": "正確。MRI 的 linguine sign（麵條徵象）代表矽膠義乳破裂。", "D": "錯。內分泌治療針對 **ER／PR**；HER2/neu 用標靶藥物（trastuzumab）。", "E": "正確。BRCA1 與 BRCA2 在 DNA 雙股斷裂修復中扮演關鍵角色。"}, "src": "NG", "sub": "S10"}, {"id": "NG-053", "stem": "The primary arterial supply of breast includes three main sources: (複選)", "opts": {"A": "The internal mammary perforators", "B": "Superior epigastric artery", "C": "Lateral thoracic artery", "D": "Posterolateral intercostal perforators", "E": "Anterolateral intercostal perforators."}, "ans": "ACE", "multi": true, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 1, page 6-7", "conflict": "同解剖兩種問法:本題問「三個主要來源」故ACE;NG-051問「包含哪些」故ABCDE", "etype": "ai", "expl": "", "key": "乳房的**三大主要動脈來源**：**內乳穿通枝（約 60%）、外胸動脈、前外側肋間穿通枝**。上腹壁動脈與後外側肋間穿通枝並非主要來源。⚠ 與 NG-051 對照：那題問「包含哪些」故五個全對；本題問「三個主要」故只有 ACE。", "peropt": {"A": "是主要來源。內乳穿通枝供應約 60% 的乳房血流。", "B": "否。上腹壁動脈供應腹壁上部，非乳房主要來源。", "C": "是主要來源。外胸動脈供應乳房外上部。", "D": "否。主要的是**前**外側肋間穿通枝，不是後外側。", "E": "是主要來源。前外側肋間穿通枝。"}, "src": "NG", "sub": "S01"}, {"id": "NG-106", "stem": "Which were correct about anaplastic large cell lymphoma (ALCL) in patients with breast implants? (複選)", "opts": {"A": "It also occurred in patients without implants", "B": "It is a rare peripheral B cell lymphoma", "C": "It is associated with an oncogene anaplastic lymphocyte kinase (ALK) expression.", "D": "The 5-year survival ranges from 15% for ALCL-nodal, ALK-neg to 90% with the cutaneous form of ALCL", "E": "The clinical presentation includes late periprosthetic fluid collection."}, "ans": "ACDE", "multi": true, "years": ["107"], "cite": "Neligan 3rd, Volume 3, Chapter 2, page 37", "conflict": "3e舊述:ALCL與ALK expression相關(選C為正解);4e/5e明確指出BIA-ALCL為ALK陰性。以新版為準:BIA-ALCL=ALK(-),CD30(+),T細胞　3e舊版將「與ALK expression相關」列為正確(C);4e/5e明確BIA-ALCL為ALK陰性。以新版為準", "etype": "ai", "expl": "", "key": "⚠ **本題為 3e 舊版，與 4e/5e 相衝突**。3e 敘述 ALCL「與 ALK 表現相關」故 C 被列為正確；但 4e/5e 已明確指出 **BIA-ALCL 為 ALK 陰性、CD30 陽性的 T 細胞淋巴瘤**。考場上依該年版本作答，但正確醫學知識請以新版為準（見 NG-198、NG-199、NG-200）。其餘：ALCL 也發生在無義乳者、5 年存活率因型別而異、典型表現為遲發性義乳周圍積液。", "peropt": {"A": "正確。ALCL 本身也發生於沒有義乳的病人（系統型、皮膚型）。", "B": "錯。ALCL 是 **T 細胞**淋巴瘤，不是 B 細胞。", "C": "本年（3e）列為正確。惟 4e/5e 已修正：**BIA-ALCL 為 ALK 陰性**；此處指的是系統型 ALCL 的 ALK 表現，勿與 BIA-ALCL 混淆。", "D": "正確（依 3e 敘述）。5 年存活率由 nodal、ALK 陰性型的約 15% 到皮膚型的約 90% 不等。", "E": "正確。臨床表現包括遲發性的義乳周圍積液（late periprosthetic fluid collection）。"}, "src": "NG", "sub": "S05"}, {"id": "NG-111", "stem": "下列何者不是利用擴張器-義乳(Expander-Implant Technique)作乳房重建的好處?", "opts": {"A": "Minimal morbidity", "B": "Reduced operative time", "C": "If the patient becomes dissatisfied with the result, secondary reconstruction is available", "D": "Less contour irregularities", "E": "No donor site morbidity"}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 339", "conflict": "", "etype": "ai", "expl": "", "key": "擴張器－義乳重建的好處是：侵襲低、手術時間短、無供區傷害、若病人不滿意仍可改自體重建。**「輪廓不規則較少」不是它的優點**——恰恰相反，義乳重建的 rippling、上極階梯感、輪廓不規則比自體組織重建更常見。", "peropt": {"A": "是好處。手術侵襲小、morbidity 低。", "B": "是好處。手術時間較自體重建短。", "C": "是好處。若結果不滿意，仍可保留改行自體重建的機會。", "D": "正解（非好處）。義乳重建的輪廓不規則（rippling、上極階梯）反而**較多**。", "E": "是好處。無供區傷害。"}, "src": "NG", "sub": "S12"}, {"id": "NG-112", "stem": "下列何者是利用擴張器-義乳(Expander-Implant Technique)作乳房重建時需reoperation 最常見的原因?", "opts": {"A": "Infection", "B": "Correction of capsular contracture", "C": "Hematoma", "D": "Implant malposition", "E": "Wrinkling"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 362", "conflict": "", "etype": "ai", "expl": "", "key": "**擴張器－義乳重建需要再手術的最常見原因是矯正莢膜攣縮**。與 NG-059、NG-078 同屬「莢膜攣縮是義乳重建的頭號麻煩」這一組核心事實。", "peropt": {"A": "感染會導致義乳移除，但發生率低於莢膜攣縮。", "B": "正解。矯正莢膜攣縮是需要再手術的最常見原因。", "C": "血腫屬早期併發症，發生率低。", "D": "義乳位置不良需再手術，但排序在莢膜攣縮之後。", "E": "Wrinkling 多以脂肪移植或換義乳處理，非再手術首因。"}, "src": "NG", "sub": "S03"}, {"id": "NG-152", "stem": "以闊背肌作乳房重建最常見的donor site併發症為？", "opts": {"A": "Infection", "B": "Seroma", "C": "Hematoma", "D": "Skin necrosis", "E": "Loss of shoulder mobility"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5", "conflict": "", "etype": "ai", "expl": "", "key": "**闊背肌皮瓣最常見的供區併發症是血清腫（seroma）**——背部剝離後的潛在腔隙大、剪力活動多，發生率可達數成。這與批 2 的 NG-129／NG-131 是同一條事實。肩部活動度下降雖然存在，但不是「最常見」。", "peropt": {"A": "感染發生率低。", "B": "正解。背部供區血清腫是最常見的併發症。", "C": "血腫較血清腫少見。", "D": "皮膚壞死不常見（LD 血循極佳）。", "E": "肩部活動度喪失可發生，但非最常見的供區併發症。"}, "src": "NG", "sub": "S01"}, {"id": "NG-184", "stem": "關於TRAM flap何者為非？", "opts": {"A": "The primary blood supply to the lower rectus muscle is from the deep inferior epigastric artery", "B": "Most patients showed symmetry vascular patterns between their rectus muscles", "C": "The rectus abdominis muscle is a type III muscle, as described by Mathes", "D": "The epigastric vessels send perforators through the rectus muscle that cross the anterior rectus sheath generally in two rows, one medial and one lateral.", "E": "The majority of patients in the vascular anatomy of the epigastric arteries exhibited a type II system"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 394-395", "conflict": "", "etype": "ai", "expl": "", "key": "Moon 與 Taylor 的腹壁血管研究結論：兩側腹直肌血管型態**多數不對稱**；同時多數病人的上、下腹壁動脈屬 Type II 系統。故「Most patients showed symmetry vascular patterns」為錯述——與 NG-136 為同一考點的不同年份版本。", "peropt": {"A": "正確。下段腹直肌主要由 deep inferior epigastric artery 供應。", "B": "正解（錯述）。多數病人兩側腹直肌的血管型態並不對稱，僅約 2% 完全相同。", "C": "正確。rectus abdominis 為 Mathes 分類 Type III。", "D": "正確。穿通枝穿過腹直肌、穿出前鞘時通常排成內、外兩列。", "E": "正確。多數病人上/下腹壁動脈解剖屬 Type II 系統。"}, "src": "NG", "sub": "S13"}, {"id": "NG-179", "stem": "關於Free TRAM的recipient vessel敘述何者為非？", "opts": {"A": "The two most common recipient vessel sites are the thoracodorsal vessels and the internal mammary vessels", "B": "The thoracodorsal vessels are either fully or partially exposed after a modified radical mastectomy", "C": "The thoracodorsal vessels are usually chosen as long as the autologous flap for reconstruction has a sufficiently long donor pedicle", "D": "For many surgeons, the thoracodorsal vessels are the recipient vessels of choice in delayed free-flap breast reconstruction", "E": "The internal mammary vessels have been used preferentially when mastectomy combined with sentinel node biopsy is performed."}, "ans": "D", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 422-424", "conflict": "考生建議D也對(delayed free-flap常選thoracodorsal),原題爭議;記概念:IMA為現代首選recipient　【原檔考生註記】[D 應該也對 建議不要出]", "etype": "ai", "expl": "", "key": "Free TRAM 受區血管的現代共識：**internal mammary vessels 為多數術者的首選**（位置居中、易塑形、不受腋窩清掃影響）。thoracodorsal 血管則多用於 delayed 重建或 IMA 不可用時的備案。⚠ 本題 D 說「delayed free-flap 時 thoracodorsal 為多數術者首選」被判為錯述，但原檔已有考生註記認為 D 也說得通、建議刪題；記結論「IMA 為現代首選」即可。", "peropt": {"A": "正確。兩個最常用受區部位即胸背血管與內乳血管。", "B": "正確。modified radical mastectomy 後腋窩已清掃，胸背血管多已完全或部分顯露。", "C": "正確。皮瓣蒂夠長時可選用胸背血管。", "D": "本年判為錯述（答案鍵 D）。現代多數術者在 delayed free-flap 重建仍以 internal mammary 為首選受區。此選項具爭議，原檔考生建議「D 應該也對」。", "E": "正確。合併前哨淋巴結切片而未清掃腋窩時，胸背血管不易顯露，故優先選用內乳血管。"}, "src": "NG", "sub": "S13"}, {"id": "NG-139", "stem": "下列關於deep inferior epigastric artery perforator flap(DIEAP flap)何者為非?", "opts": {"A": "The average pedicle length is 10.3 cm and the average vessel diameter is 3.6 mm.", "B": "The deep inferior epigastric artery divides into two branches, with a dominant medial branch", "C": "The sensory nerve that runs with the perforating vessels is often much larger", "D": "The lateral perforators are often dominant and easier to dissect because they run more perpendicularly through the muscle", "E": "The medial perforators provide better perfusion of the flap but they have a longer intramuscular course"}, "ans": "B", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 436", "conflict": "", "etype": "ai", "expl": "", "key": "DIEAP 解剖細節題（3e）：平均蒂長 10.3 cm、血管外徑 3.6 mm；DIEA 分為兩支，**外側支常為優勢支**且穿行較垂直、易剝離；內側支穿通枝灌流較佳但肌內走行較長。故「dominant medial branch」為錯述。", "peropt": {"A": "正確。平均蒂長約 10.3 cm、平均管徑約 3.6 mm。", "B": "正解（錯述）。DIEA 分為兩支，優勢支通常是 **lateral branch**，非 medial branch。", "C": "正確。與穿通枝伴行的感覺神經常較粗大（可用於神經化皮瓣）。", "D": "正確。外側穿通枝常為優勢支，且較垂直穿過肌肉，剝離較容易。", "E": "正確。內側穿通枝灌流（尤其跨中線）較佳，但肌內走行較長、剝離較費時。"}, "src": "NG", "sub": "S13"}, {"id": "NG-110", "stem": "下列何者不是fat grafting用為乳房重建的適應症?", "opts": {"A": "Flap border step-off", "B": "Radiation deformity in flap reconstruction", "C": "Sharp implant border", "D": "Implant rippling", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 584", "conflict": "", "etype": "ai", "expl": "", "key": "脂肪移植用於乳房重建的適應症「以上皆是」：皮瓣邊緣階梯感、皮瓣重建後的放射線變形、義乳邊緣銳利可觸、義乳 rippling。共通點都是**輪廓瑕疵的微調**——對照 NG-098：作為唯一的主要重建方式則尚未確立。", "peropt": {"A": "是適應症。皮瓣邊緣階梯感。", "B": "是適應症。皮瓣重建後的放射線變形。", "C": "是適應症。義乳邊緣銳利可觸（上極）。", "D": "是適應症。義乳 rippling（波紋）。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S16"}, {"id": "NG-144", "stem": "乳癌病人切除乳房後，想接受背濶肌肌肉皮瓣重建手術(Latissimus Dorsi Flap)，何者不是適應症? (複選)", "opts": {"A": "Breast reconstruction after a skin-sparing mastectomy", "B": "Purely autogenous breast reconstruction may not be candidates for the TRAM flap", "C": "Previous posterolateral thoracotomy in which the latissimus muscle had been divided", "D": "Breast reconstruction after prophylactic mastectomy", "E": "Previous division of the thoracodorsal nerve during an axillary dissection"}, "ans": "CE", "multi": true, "years": ["107"], "cite": "Neligan 3rd, Volume 5, Page 374-381", al thoracic artery)", "B": "乳房的皮膚感覺由肋間神經(intercostal nerves)分枝與頸神經叢(cervical plexus)支配", "C": "乳頭(nipple)的感覺主要由第5肋間神經支配", "D": "手術傷及外胸神經(lateral thoracic nerve)會造成winged scapula", "E": "乳房血液供應有60%是內乳動脈(internal mammary artery)來的"}, "ans": "ABDE", "multi": true, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 1, page 4-7", "conflict": "題目用詞錯誤:造成winged scapula者為long thoracic nerve(長胸神經),非選項D的lateral thoracic nerve,但答案鍵將D列為正確", "etype": "ai", "expl": "", "key": "乳房解剖四項正確：血供來自內乳、外胸與肋間動脈；皮膚感覺由肋間神經分支與**頸神經叢（鎖骨上神經）**共同支配；**內乳動脈供應約 60%**；⚠ 選項 D 稱傷及「lateral thoracic nerve」造成翼狀肩胛——**實際上造成翼狀肩胛的是 long thoracic nerve（長胸神經，支配前鋸肌）**，但本年答案鍵將 D 列為正確，應屬題目用詞錯誤。錯的是 C：乳頭感覺主要來自**第 4**（非第 5）肋間神經。", "peropt": {"A": "正確。主要血供為內乳動脈、外胸動脈與肋間動脈（括號內英文有誤，但敘述方向正確）。", "B": "正確。乳房皮膚感覺由肋間神經分支與頸神經叢（鎖骨上神經）共同支配。", "C": "錯。乳頭感覺主要由**第 4** 肋間神經支配，不是第 5。", "D": "依本年答案鍵為正確。惟造成 winged scapula 的是 **long thoracic nerve**（長胸神經）而非 lateral thoracic nerve，題目用詞有誤——記住「長胸神經＝前鋸肌＝翼狀肩胛」。", "E": "正確。乳房血供約 60% 來自內乳動脈。"}, "src": "NG", "sub": "S01"}, {"id": "NG-172", "stem": "進行隆乳手術時要注意以下事項，何者錯誤？", "opts": {"A": "理想的上胸(upper pole)與下胸(lower pole)的比例為45%：55%", "B": "若選擇義乳隆乳，當上胸的皮膚與軟組織捏起來(pinch)不到4公分的時候，建議把義乳置放於乳腺下(subglandular position)", "C": "目前比較常見的手術切口有下乳腺(inframammary incision)、乳暈旁(periareolar incision)、腋下(axillary incision)與肚臍(transumbilical incision)", "D": "當義乳置放於筋膜下(subfascial plane)時，建議使用紋理植入物(textured implant)", "E": "Mondor's disease是一種表淺的血栓性靜脈炎(thrombophlebitis)，通常為自限性(limited)，通常不需要手術治療"}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 2, page 18, 33, 47", "conflict": "同組題A在本年寫成正確的45:55,唯一錯述為B。字母完全不可靠", "etype": "ai", "expl": "", "key": "同一題組的反向問法（108 年）：此年 A 已寫成正確的 **45%：55%**，因此唯一錯述是 B——上極軟組織薄時應置於**肌肉下**而非腺體下。同一組選項在不同年份「A 對 A 錯」翻轉，字母完全不可靠。", "peropt": {"A": "正確（本年已寫成 45%：55%）。", "B": "正解（錯述）。上極 pinch 太薄時應放**肌肉下（subpectoral）**，題目寫 subglandular 方向相反。", "C": "正確。四種常見切口。", "D": "正確。筋膜下平面建議使用紋理義乳。", "E": "正確。Mondor's disease 為自限性淺層血栓性靜脈炎。"}, "src": "NG", "sub": "S02"}, {"id": "NG-220", "stem": "關於隆乳相關的莢膜攣縮(capsular contracture)，以下何者錯誤？", "opts": {"A": "莢膜攣縮的成因很多種，包括血腫(hematoma)、血清腫(seroma)、矽膠滲漏(silicon gel bleed)、灰塵或感染都可能導致莢膜攣縮", "B": "使用紋理植入物(textured implant)可能可以減少莢膜攣縮的機率", "C": "隆乳術後若有小量且沒有變大的血腫，可以考慮觀察就好不用手術", "D": "Grade V的莢膜攣縮為嚴重的莢膜攣縮，乳房呈現堅硬、疼痛、壓痛與變形", "E": "所有的義乳隆乳(implant)都或多或少有莢膜攣縮"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 3, page 47", "conflict": "", "etype": "ai", "expl": "", "key": "**Baker 分級只有 I–IV，沒有 Grade V**。Grade IV 即為「堅硬、疼痛、壓痛與變形」。其餘：成因多元（血腫／血清腫／矽膠滲漏／灰塵／感染）、紋理義乳可降低攣縮率、小而不擴大的血腫可觀察、所有義乳都會形成莢膜（程度不一）。", "peropt": {"A": "正確。成因包含血腫、血清腫、矽膠滲漏、灰塵與感染。", "B": "正確。紋理義乳可能降低莢膜攣縮機率。", "C": "正確。小量且未擴大的血腫可考慮觀察。", "D": "正解（錯述）。**Baker 分級無 Grade V**；堅硬、疼痛、壓痛與變形是 Grade IV。", "E": "正確。所有義乳都會形成莢膜，只是攣縮程度不同。"}, "src": "NG", "sub": "S03"}, {"id": "NG-214", "stem": "關於自體脂肪隆乳，以下何者錯誤？", "opts": {"A": "自體脂肪隆乳建議使用在想要中等或小量增加(moderate or even very moderate increase)的隆乳病人", "B": "製備脂肪時，離心後的脂肪要把上方的油脂跟中間血水倒掉，留下底下萃取的脂肪才拿來做脂肪移植使用", "C": "脂肪移植時，建議補脂的順序先補深層再補淺層", "D": "脂肪移植隆乳建議要稍微多補一點脂肪，因為之後大約會有20-30%的脂肪會被吸收(resorption)", "E": "補過多的脂肪也可能會造成脂肪壞死，手術時應盡量避免"}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 4, Chapter 5, page 73, 81-83", "conflict": "同組題本年A、C寫成正確版,唯一錯述為B(應留中層脂肪)", "etype": "ai", "expl": "", "key": "同一組概念的反向出題（108 年）：本年 A（中小量增加）、C（先深後淺）已寫成正確版本，因此**唯一錯述是 B——離心後應保留「中層」脂肪，而非「底下」的**。底層是血水、上層是油脂，兩者都要倒掉。三題並列即可把三個方向一次釘死。", "peropt": {"A": "正確。適用於中等或非常少量增加的病人。", "B": "正解（錯述）。離心後應留**中層**脂肪；上層油脂與**下層血水**皆須倒掉。", "C": "正確。補脂順序為先深層再淺層。", "D": "正確。約 20–30% 會被吸收，須稍微過量補脂。", "E": "正確。補過多脂肪會造成脂肪壞死，應盡量避免。"}, "src": "NG", "sub": "S16"}, {"id": "NG-201", "stem": "關於乳房下垂(breast ptosis)的分類，下列何者錯誤？", "opts": {"A": "Regnault Grade I ptosis表示乳頭高度大約在下乳線左右", "B": "Regnault Grade II ptosis表示乳頭高度大約低於下乳線1-3公分，且位在乳房最低點", "C": "Regnault Grade III ptosis表示乳頭位在乳房的最低點，而且高度低於下乳線3公分以上了", "D": "Pseudoptosis常見為乳房固定術(mastopexy)後乳頭位置維持在固定高度，但是乳頭到下乳線距離增加造成下垂", "E": "筒狀乳房(tuberous breast or constricted breast)指乳房實質不正常分佈(parenchymal maldistribution)造成過高的下乳線等問題"}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 6, page 89-91", "conflict": "", "etype": "ai", "expl": "", "key": "Regnault 分級的分界關鍵在「乳頭是否位於乳房最低點」：Grade I 乳頭約與 IMF 齊高；**Grade II 乳頭低於 IMF 1–3 cm，但仍高於乳房最低點**；Grade III 乳頭低於 IMF 逾 3 cm 且位於乳房最低點。題目 B 把「位在乳房最低點」加到 Grade II，故為錯述。", "peropt": {"A": "正確。Grade I：乳頭高度約在 IMF 水平。", "B": "正解（錯述）。Grade II 的乳頭雖低於 IMF 1–3 cm，但**仍高於乳房最低點**；位於最低點者已是 Grade III。", "C": "正確。Grade III：乳頭低於 IMF 超過 3 cm 且位於乳房最低點。", "D": "正確。Pseudoptosis 指乳頭位置維持、但下極鬆垂使 nipple-to-IMF 距離拉長，常見於 mastopexy 之後。", "E": "正確。Tuberous／constricted breast 的本質為實質分佈異常，導致 IMF 過高等問題。"}, "src": "NG", "sub": "S06"}, {"id": "NG-143", "stem": "乳房固定術(mastopexy)有許多種方式，其中哪一種方式強調使用人工網膜(mesh)增加效果？", "opts": {"A": "Graf and Biggs method", "B": "Lassus method", "C": "Gall-Findlay method", "D": "Goes method", "E": "Vertical method"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 6, page 94", "conflict": "", "etype": "ai", "expl": "", "key": "**Goes method** 是唯一強調使用人工網膜（mesh）作為乳房內在支撐襯裡的乳房固定術，藉此延緩術後復發性下垂。對照：Graf and Biggs 使用胸大肌懸吊帶（muscle sling）、Lassus／Vertical 為垂直疤痕術式、Hall-Findlay 為內側蒂。", "peropt": {"A": "Graf and Biggs 使用胸大肌懸吊帶提供支撐，非人工網膜。", "B": "Lassus method 為垂直疤痕、上蒂術式，不用網膜。", "C": "Hall-Findlay（題目寫 Gall-Findlay）為內側蒂垂直疤痕術式，不用網膜。", "D": "正解。Goes method 以人工網膜形成具抗力的乳房襯裡。", "E": "Vertical method 為疤痕型態的通稱，非特定使用網膜。"}, "src": "NG", "sub": "S06"}, {"id": "NG-148", "stem": "以下哪個不屬於男性女乳症(gynecomastia)的治療", "opts": {"A": "Pull-through technique", "B": "Open excision via an inferior periareolar approach", "C": "Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern", "D": "Suction-assisted lipectomy", "E": "Modified radical mastectomy"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 11, page 176-183", "conflict": "", "etype": "ai", "expl": "", "key": "男性女乳症的治療選項：pull-through technique、經下乳暈開放切除、以 Lejour 垂直式皮膚圖案做皮膚縮減併組織切除、抽脂輔助脂肪切除。**Modified radical mastectomy 是乳癌的腫瘤手術，不是男性女乳症的治療**（男性女乳症為良性疾病）。", "peropt": {"A": "是治療。Pull-through technique（經小切口拉出腺體）。", "B": "是治療。經下乳暈切口的開放式切除。", "C": "是治療。以 Lejour 垂直式皮膚圖案做皮膚縮減與組織切除（適用皮膚鬆弛者）。", "D": "是治療。抽脂輔助脂肪切除，處理脂肪為主的成分。", "E": "正解（非治療）。改良式根除性乳房切除是乳癌手術，男性女乳症為良性疾病，不適用。"}, "src": "NG", "sub": "S08"}, {"id": "NG-165", "stem": "男性女乳症治療中使用超音波做脂肪移除(ultrasound-assisted liposuction)的缺點可能包含下列哪些？（複選）", "opts": {"A": "熱燒傷(thermal injury)", "B": "皮膚壞死(skin necrosis)", "C": "周邊神經去髓鞘化(demyelination of peripheral nerves)", "D": "昂貴的器材", "E": "增加手術時間"}, "ans": "ABCDE", "multi": true, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 11, page 179", "conflict": "", "etype": "ai", "expl": "", "key": "UAL 的缺點「全部都是」：熱燒傷、皮膚壞死、周邊神經去髓鞘化、器材昂貴、**手術時間增加**。前三項皆源自超音波的**熱效應**——這也是 UAL 必須維持探頭移動、使用足量膨脹液的原因。", "peropt": {"A": "是。超音波熱效應造成熱燒傷。", "B": "是。熱傷害導致皮膚壞死（尤其真皮下停留過久）。", "C": "是。周邊神經去髓鞘化，造成感覺異常。", "D": "是。超音波器材昂貴。", "E": "是。需額外乳化階段，手術時間增加。"}, "src": "NG", "sub": "S08"}, {"id": "NG-199", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)的敘述以下何者正確？(複選)", "opts": {"A": "根據MD Anderson做的研究報告指出BIA-ALCL只發生在紋理植入物(textured implant)", "B": "任何義乳隆乳手術後超過一年以上才發生的血清腫(seroma)都要懷疑BIA-ALCL的可能性", "C": "BIA-ALCL是一種T細胞淋巴瘤", "D": "腫瘤細胞會表現CD30陽性", "E": "腫瘤細胞為anaplastic lymphoma kinase (ALK)陰性"}, "ans": "ABCDE", "multi": true, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 12, page 197-198", "conflict": "", "etype": "ai", "expl": "", "key": "BIA-ALCL 五項正確敘述：只發生於紋理面義乳（MD Anderson）、隆乳滿一年後的遲發血清腫須懷疑、T 細胞淋巴瘤、**CD30 陽性**、**ALK 陰性**。這是最完整的一題，可當作本主題的標準答案卡。", "peropt": {"A": "正確。MD Anderson 報告指出 BIA-ALCL 僅見於紋理面義乳。", "B": "正確。隆乳一年以上出現的血清腫皆須抽液排除 BIA-ALCL。", "C": "正確。屬 T 細胞來源的非何杰金氏淋巴瘤。", "D": "正確。腫瘤細胞表現 CD30 陽性。", "E": "正確。腫瘤細胞 **ALK 陰性**——與系統型 ALCL 的關鍵鑑別。"}, "src": "NG", "sub": "S05"}, {"id": "NG-197", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)以下何者錯誤？", "opts": {"A": "如果腫瘤侵犯到莢膜外(extracapsular disease extension)，則存活率會顯著的下降", "B": "有沒有塊狀的腫瘤與病人的存活率有顯著差異", "C": "晚發的血清腫(seroma)除了用超音波檢查，須將液體抽出做病理檢查排除BIA-ALCL的可能性", "D": "BIA-ALCL的第一線治療建議使用化學療法(chemotherapy)", "E": "大約70%的病人以血清腫(seroma or malignant effusion)表現，30%的病人以腫塊表現"}, "ans": "D", "multi": false, "years": ["108"], "cite": "Neligan, 4th Edision, Volume 4, Chapter 12, page 200-205", "conflict": "", "etype": "ai", "expl": "", "key": "BIA-ALCL 的**第一線治療是外科完整切除**——移除義乳、全莢膜切除（en bloc capsulectomy）並切除任何腫塊；**化療不是第一線**，僅用於進展期、無法完整切除或有全身侵犯者。其餘（莢膜外侵犯預後差、腫塊與否影響存活、遲發血清腫須抽液送檢、70% 血清腫／30% 腫塊）皆正確。", "peropt": {"A": "正確。莢膜外侵犯者存活率顯著下降。", "B": "正確。有無腫塊與存活率有顯著差異。", "C": "正確。遲發血清腫須抽液做細胞學與免疫染色。", "D": "正解（錯述）。第一線治療是**手術完整切除（義乳＋全莢膜）**，而非化學療法。", "E": "正確。約 70% 以血清腫表現、30% 以腫塊表現。"}, "src": "NG", "sub": "S05"}, {"id": "NG-056", "stem": "What is the contraindication(s) in nipple-sparing mastectomy?", "opts": {"A": "Inflammatory breast cancer", "B": "Nipple retraction", "C": "Bloody nipple discharge", "D": "HER2/neu positive", "E": "All of above"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 14 Page 220", "conflict": "", "etype": "ai", "expl": "", "key": "**乳頭保留乳房切除（NSM）的禁忌「全部都是」**：發炎性乳癌（皮膚受侵）、乳頭凹陷（提示乳頭下方受侵）、血性乳頭分泌（提示乳管內病灶）、HER2/neu 陽性（依本年答案鍵，屬較侵襲性生物行為）。核心判準是**乳頭乳暈是否可能受腫瘤侵犯**。", "peropt": {"A": "是禁忌。發炎性乳癌侵犯皮膚淋巴管。", "B": "是禁忌。乳頭凹陷提示乳頭下方乳管受侵。", "C": "是禁忌。血性乳頭分泌提示乳管內病灶。", "D": "是禁忌（依本年答案鍵）。HER2/neu 陽性屬較侵襲性的生物行為。", "E": "正解。以上皆為 NSM 的禁忌。"}, "src": "NG", "sub": "S10"}, {"id": "NG-076", "stem": "Which is not the advantage of direct-to-implant breast reconstruction?", "opts": {"A": "Fewer procedures", "B": "Less risk of skin or nipple compromise", "C": "No expansion period", "D": "Fewer recoveries", "E": "All of above"}, "ans": "B", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 16 Page 249", "conflict": "", "etype": "ai", "expl": "", "key": "Direct-to-implant（一次到位）的優點是：手術次數少、免除擴張期、恢復次數少。**它的缺點正是皮膚／乳頭壞死風險較高**——因為乳房切除皮瓣立刻要承受全額義乳體積的張力，灌流邊緣的皮膚容易壞死。故 B 不是優點。", "peropt": {"A": "是優點。手術次數較少（一次完成）。", "B": "正解（非優點）。DTI 讓乳房切除皮瓣立即承受全額體積張力，**皮膚或乳頭壞死風險反而較高**。", "C": "是優點。免除數週至數月的擴張期。", "D": "是優點。只需一次恢復期。", "E": "B 非優點，不選 All of above。"}, "src": "NG", "sub": "S12"}, {"id": "NG-059", "stem": "What is the most common driver for revisionary breast surgery?", "opts": {"A": "Implant malposition", "B": "ptosis", "C": "Capsular contracture", "D": "Implant visibility or palpability", "E": "None of above"}, "ans": "C", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 17 Page 268", "conflict": "", "etype": "ai", "expl": "", "key": "**莢膜攣縮是義乳再次手術（revisionary surgery）最常見的原因**，也是義乳重建後最常見的併發症與再手術理由。這條事實在 NG-059／NG-078／NG-112 三題以不同問法反覆出現，是跨年高頻核心。", "peropt": {"A": "義乳位置不良是常見原因之一，但非最常見。", "B": "下垂多為續發問題，不是再手術的主因。", "C": "正解。莢膜攣縮是再次乳房義乳手術最常見的驅動因素。", "D": "義乳可見或可觸及（rippling）屬軟組織覆蓋問題，發生率低於莢膜攣縮。", "E": "存在明確答案，不選 None。"}, "src": "NG", "sub": "S03"}, {"id": "NG-151", "stem": "以下關於pedicled TRAM flap 的敘述何者為非？", "opts": {"A": "The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the most commonly used autologous methods of breast reconstruction today.", "B": "The rectus abdominis muscle is a Mathes and Nahai type III muscle and the pedicled TRAM flap relies on the superior epigastric vessels and its terminal branches", "C": "The pedicled TRAM is contraindicated in patients with extensively scarred abdomen and in patients with chronic back pain", "D": "The skin island has been subdivided into four perfusion zones. Zone I implies the best perfused area which overlies the rectus muscle.", "E": "Younger woman still in their childbearing years who expect for pregnancies with vaginal deliveries are absolute contraindicated for pedicled TRAM flap reconstruction."}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 18 Page 281-285", "conflict": "", "etype": "ai", "expl": "", "key": "Pedicled TRAM 的禁忌是「腹部廣泛疤痕、慢性背痛、抽菸、肥胖、既往上腹血管離斷」等；**未來懷孕並非絕對禁忌**——文獻已有 TRAM 後成功懷孕並自然生產的報告，故 E 為錯述。", "peropt": {"A": "正確。Hartrampf 於 1980 年代提出，至今仍是常用自體重建術式。", "B": "正確。rectus 為 Type III；pedicled TRAM 靠 superior epigastric vessels 及其終末分支。", "C": "正確。腹部廣泛疤痕與慢性背痛為禁忌。", "D": "正確。皮島分四個灌流區，Zone I 位於腹直肌正上方、灌流最佳。", "E": "正解（錯述）。育齡婦女未來懷孕與陰道生產並非 pedicled TRAM 的**絕對**禁忌，僅需術前充分討論腹壁強度與時序。"}, "src": "NG", "sub": "S13"}, {"id": "NG-128", "stem": "下列關於Latissimus dorsi flap 的敘述何者為非？", "opts": {"A": "The latissimus myocutaneous flap is a Mathes and Nahai type IV flap", "B": "The blood supply of this flap comes from thoracodorsal artery, posterior intercostal and lumbar arteries", "C": "Patients with known need for postoperative radiotherapy along with the need for a prosthetic device is contraindicated for LD flap reconstruction", "D": "Latissimus dorsi is an important adductor of the arm and internal rotator of the shoulder. Harvest of this flap can lead to shoulder weakness, stiffness, and loss of mobility.", "E": "All of above are correct"}, "ans": "A", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 19 Page 301,306", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-085 為同一組事實的反向出題：錯的是「LD 為 Mathes-Nahai **Type IV**」——正確為 **Type V**。同時注意 C（已知需術後放療又需義乳者為 LD 重建禁忌）在本題被視為**正確**敘述，與 NG-085 的 C（寫成 indicated）互為反述，可交叉檢核。", "peropt": {"A": "正解（錯述）。LD 為 Mathes-Nahai **Type V**，非 Type IV。", "B": "正確。血供為胸背動脈（優勢蒂）＋後肋間與腰動脈（節段性次要蒂）。", "C": "正確。已知術後需放療且需義乳者，屬 LD 重建的禁忌。", "D": "正確。LD 為肩內收與內旋肌，取瓣後可致肩部無力、僵硬與活動度受限。", "E": "A 為錯述，故不選 All of above are correct。"}, "src": "NG", "sub": "S14"}, {"id": "NG-188", "stem": "關於fat grafting to the breast, 下列敘述何者正確？", "opts": {"A": "If swelling persists for over 2 months, it may signal the development of fat necrosis or a liponecrotic cyst. Watchful waiting is the best course of action.", "B": "The most commonly seen abnormalities are calcifications. Preoperative mammography is recommended for comparison purposes in the event of any abnormality developing later.", "C": "Liponecrotic cyst occur in areas of walled-off liquefaction necrosis. The development probably correlates with improper technique of inadequately distributing the grafted fat.", "D": "Fat grafted into well-vascularized muscle surviving at a higher rate than into a relatively oxygen-poor environment.", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 24 Page 476", "conflict": "", "etype": "ai", "expl": "", "key": "乳房脂肪移植四項全對：腫脹持續逾 2 個月要懷疑脂肪壞死或液化囊腫（可先觀察）；**最常見的影像異常是鈣化**，故建議術前乳房攝影作為日後比對基準；液化囊腫源於脂肪分佈不當（一次注入過多形成團塊）；**移植到血供良好的肌肉存活率高於缺氧環境**——這正是「少量多層次、線狀退針」技術的理論基礎。", "peropt": {"A": "對。腫脹持續超過 2 個月可能是脂肪壞死或液化囊腫，可先觀察追蹤。", "B": "對。最常見的影像異常是鈣化；術前乳房攝影可作為日後比對基準。", "C": "對。液化囊腫發生於被包裹的液化壞死區，多因脂肪分佈不當（團塊注射）。", "D": "對。移植至血供良好的肌肉，存活率高於相對缺氧的環境。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S16"}, {"id": "NG-036", "stem": "Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?", "opts": {"A": "1-3 months", "B": "4-5 months", "C": "6-9 months", "D": "More than one year", "E": "以上皆非"}, "ans": "C", "multi": false, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 25 Page 487", "conflict": "", "etype": "ai", "expl": "", "key": "**需輔助放療者，游離皮瓣重建應於放療結束後 6–9 個月施行**——太早（<6 個月）組織仍在急性放射性發炎期，太晚則纖維化已定型。此題橫跨 **108、111、112、113、114、115 六個年份**，是本領域出現頻率最高的單一數字，務必零失誤。", "peropt": {"A": "太早。1–3 個月仍處放射性急性發炎期，併發症率高。", "B": "太早。4–5 個月組織尚未恢復。", "C": "正解。放療結束後 **6–9 個月**是游離組織轉移的最佳時機。", "D": "過晚。超過一年組織纖維化已定型，剝離困難且對稱難達成。", "E": "有正確答案，不選以上皆非。"}, "src": "NG", "sub": "S15"}, {"id": "NG-034", "stem": "Comparing free TRAM flap with DIEP flap, which statement(s) is true? (複選)", "opts": {"A": "If breast volume requirement is above 800 c.c, DIEP flap is a better choice", "B": "If breast volume requirement is above 800 c.c, free TRAM flap is a better choice", "C": "If no perforator >1.5mm available, DIEP flap is a better choice", "D": "If no perforator >1.5mm available, free TRAM flap is a better choice", "E": "The free TRAM flap may provide more predictable outcomes in obese and morbidly obese patients"}, "ans": "BDE", "multi": true, "years": ["108"], "cite": "Neligan, Volume 5 Chapter 20 Page 350, 356", "conflict": "", "etype": "ai", "expl": "", "key": "free TRAM 與 DIEP 的取捨核心：DIEP 保留肌肉、供區傷害小，但灌流依賴少數穿通枝；當需要大體積（>800 c.c.）、找不到 >1.5 mm 的穿通枝、或病人肥胖時，帶一段肌肉的 free TRAM 灌流更可靠。", "peropt": {"A": "錯。體積需求大時 DIEP 的單一穿通枝灌流不足以支撐大範圍皮瓣，不是較佳選擇。", "B": "對。>800 c.c. 時 free TRAM（帶肌肉、含較多穿通枝）灌流較可預測。", "C": "錯。沒有 >1.5 mm 穿通枝正是 DIEP 的禁忌，不能硬做 DIEP。", "D": "對。無足夠口徑穿通枝時，改取 free TRAM 帶一段肌肉保全多支穿通枝。", "E": "對。肥胖與病態肥胖病人脂肪厚、穿通枝灌流範圍相對不足，free TRAM 結果較可預測（脂肪壞死率較低）。"}, "src": "NG", "sub": "S13"}, {"id": "NG-101", "stem": "Which pedicled perforator flaps are suitable for reconstruction of inferomedial quadrant defect after partial mastectomy? (複選)", "opts": {"A": "Anterior intercostal artery perforator (AICAP) flap", "B": "Latissimus dorsi (LD) flap", "C": "Thoracodorsal artery perforator (TDAP) flap", "D": "Superior epigastric artery perforator (SEAP) flap", "E": "All of above"}, "ans": "AD", "multi": true, "years": ["108", "111"], "cite": "Neligan, Volume 5 Chapter 23, page 452", "conflict": "", "etype": "ai", "expl": "", "key": "部分乳房切除後的**下內側象限**缺損，需要從內側／下方帶入組織：正解為 AICAP（anterior intercostal artery perforator）與 SEAP（superior epigastric artery perforator）。LD 與 TDAP 來自背側／外側，適合外側與外上象限，方向錯誤。此題與 NG-102、NG-117 為同一考點，答案字母分別是 AD、BD、DE——請記「內側／下方缺損＝AICAP＋SEAP」，勿背字母。", "peropt": {"A": "適合。AICAP 源自前肋間動脈穿通枝，位於下內側，可直接轉入該象限。", "B": "不適合。LD 由背側轉入，適合外側／外上象限缺損。", "C": "不適合。TDAP 源自胸背動脈穿通枝，位於外側背部，方向不符。", "D": "適合。SEAP 源自上腹壁動脈穿通枝，自下內側上提，最適合下內側缺損。", "E": "並非全部皆適合，故不選。"}, "src": "NG", "sub": "S14"}, {"id": "NG-031", "stem": "About alternative free flaps for breast reconstruction, which statement(s) is true? (複選)", "opts": {"A": "The superior gluteal artery and vein exits the pelvis through the greater sciatic foramen below the piriformis.", "B": "The gracilis muscle is a type III musculocutaneous flap", "C": "When harvesting profounda artery perforator (PAP) flap, retracting the gracilis muscle anteriorly to expose the adductor magnus fascia is necessary", "D": "The main disadvantage of the IGAP flap is dissection adjacent to the sciatic nerve, which can cause transient sciatica", "E": "None of above"}, "ans": "CD", "multi": true, "years": ["108", "114"], "cite": "Neligan, Volume 5 Chapter 21, page 376, 378, 392, 412", "conflict": "", "etype": "ai", "expl": "", "key": "四個替代皮瓣的解剖陷阱：① superior gluteal 血管經 greater sciatic foramen 於 piriformis **上方**穿出（題目寫 below 為錯）；② gracilis 是 Mathes-Nahai **Type II**（單一優勢蒂＋次要蒂），非 Type III；③ 取 PAP 時需將 gracilis 往前牽開才能顯露 adductor magnus 筋膜；④ IGAP 剝離貼近坐骨神經，可致暫時性坐骨神經痛。", "peropt": {"A": "錯。superior gluteal artery/vein 經 greater sciatic foramen 於梨狀肌（piriformis）**上緣**離開骨盆，不是下方（下方走的是 inferior gluteal 血管）。", "B": "錯。gracilis 為 Mathes-Nahai **Type II** 肌皮瓣（主蒂為 medial circumflex femoral artery 分支，另有遠端次要蒂）。", "C": "對。取 PAP 皮瓣時將 gracilis 向前方牽開，方能顯露 adductor magnus 筋膜與其穿通枝。", "D": "對。IGAP 的主要缺點即剝離範圍緊鄰坐骨神經，可能造成暫時性坐骨神經痛。", "E": "有正確選項存在，故不選 None。"}, "src": "NG", "sub": "S14"}, {"id": "NG-208", "stem": "關於前鋸肌(serratus anterior muscle)的描述，以下何者正確？（複選）", "opts": {"A": "此肌肉走在胸廓前外側第一至第八根肋骨處", "B": "主要血液供應來自於側胸動脈(lateral thoracic artery)及胸背動脈(thoracodoral artery)", "C": "此肌肉負責旋轉肩胛骨及抬起肩膀", "D": "此肌肉由長胸神經(long thoracic nerve)連結", "E": "隆乳手術時在胸大肌下blunt dissection也會舉起一部分的前鋸肌"}, "ans": "ABCDE", "multi": true, "years": ["109"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 1, page 11", "conflict": "", "etype": "ai", "expl": "", "key": "前鋸肌（serratus anterior）五項全對：起於胸廓前外側第 **1–8 肋**；血供為 **lateral thoracic artery ＋ thoracodorsal artery**；功能為使肩胛骨前突／上旋（rotate scapula、抬肩）；神經支配為 **long thoracic nerve**（受損即翼狀肩胛）；隆乳時在胸大肌下鈍性剝離常會一併掀起部分前鋸肌。", "peropt": {"A": "對。走行於胸廓前外側第 1–8 肋。", "B": "對。主要血供為側胸動脈與胸背動脈。", "C": "對。負責肩胛骨旋轉與抬肩（前突）。", "D": "對。由長胸神經（long thoracic nerve）支配。", "E": "對。胸大肌下鈍性剝離時常一併掀起部分前鋸肌。"}, "src": "NG", "sub": "S02"}, {"id": "NG-189", "stem": "關於free tissue transfer的乳房重建，以下何者錯誤？（單選）", "opts": {"A": " ict": "", "etype": "ai", "expl": "", "key": "與 NG-217、NG-219 同題：莢膜攣縮成因為血腫、血清腫、矽膠滲漏、灰塵、感染，答案 ABCDE。核心機轉是**異物反應＋亞臨床感染（生物膜）**驅動的纖維化。", "peropt": {"A": "是。血腫。", "B": "是。血清腫。", "C": "是。矽膠滲漏。", "D": "是。灰塵等異物顆粒。", "E": "是。感染／生物膜。"}, "src": "NG", "sub": "S03"}, {"id": "NG-213", "stem": "關於自體脂肪隆乳，以下何者正確？", "opts": {"A": "自體脂肪隆乳建議使用在想要大量增加(massive increase)的隆乳病人", "B": "製備脂肪時，離心後的脂肪要把上方的油脂跟中間血水倒掉，留下底下萃取的脂肪才拿來做脂肪移植使用", "C": "脂肪移植時，建議補脂的順序先補淺層再補深層", "D": "脂肪移植隆乳建議要稍微多補一點脂肪，因為之後大約會有20-30%的脂肪會被吸收(resorption)", "E": "以上皆是"}, "ans": "D", "multi": false, "years": ["109", "111", "112"], "cite": "Neligan, 4th Edision, Volume 4, Chapter 5, page 73, 81-83", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-212 完全相同（109、111、112 年重出）：唯一正確的是 **D（20–30% 吸收率，需過量補脂）**。三個錯項的方向要記牢：**中小量增加、留中層脂肪、先深後淺**。", "peropt": {"A": "錯。適用於中等或少量增加，非大量增加。", "B": "錯。離心後應留**中層**脂肪，倒掉上層油脂與下層血水。", "C": "錯。應先補深層再補淺層。", "D": "正解。約 20–30% 脂肪會被吸收，須稍微過量補脂。", "E": "僅 D 正確，不選以上皆是。"}, "src": "NG", "sub": "S16"}, {"id": "NG-149", "stem": "以下哪個屬於男性女乳症(gynecomastia)的治療", "opts": {"A": "Pull-through technique", "B": "Open excision via an inferior periareolar approach", "C": "Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern", "D": "Suction-assisted lipectomy", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["109", "111", "112", "115"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 11, page 176-183", "conflict": "", "etype": "orig", "expl": "Well-established surgical techniques for gynecomastia treatment include various forms of liposuction, open glandular excision, skin reduction, and combinations of these.", "key": "", "peropt": {}, "src": "NG", "sub": "S08"}, {"id": "NG-166", "stem": "男性女乳症治療中使用超音波做脂肪移除(ultrasound-assisted liposuction)的缺點可能包含下列哪些？（複選）", "opts": {"A": "熱燒傷(thermal injury)", "B": "皮膚壞死(skin necrosis)", "C": "周邊神經去髓鞘化(demyelination of peripheral nerves)", "D": "昂貴的器材及增加手術時間", "E": "以上皆是"}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 11, page 179", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-165 同題（109、111 年），選項合併後答案為「以上皆是」：熱燒傷、皮膚壞死、周邊神經去髓鞘化、器材昂貴且手術時間增加，全部都是 UAL 的缺點。注意 NG-164 反過來問「UAL 的優勢」，兩題互相驗證「手術時間」的方向。", "peropt": {"A": "是。熱燒傷。", "B": "是。皮膚壞死。", "C": "是。周邊神經去髓鞘化。", "D": "是。器材昂貴且手術時間增加。", "E": "正解。以上皆是。"}, "src": "NG", "sub": "S08"}, {"id": "NG-200", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)的敘述以下何者錯誤？", "opts": {"A": "根據MD Anderson做的研究報告指出BIA-ALCL只發生在紋理植入物(textured implant)", "B": "任何義乳隆乳手術後超過一年以上才發生的血清腫(seroma)都要懷疑BIA-ALCL的可能性", "C": "BIA-ALCL是一種T細胞淋巴瘤", "D": "腫瘤細胞會表現CD30陽性", "E": "腫瘤細胞為anaplastic lymphoma kinase (ALK)陽性"}, "ans": "E", "multi": false, "years": ["109", "111", "112"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 12, page 197-198", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-198／NG-199 同一組事實的反向出題：錯述為「**ALK 陽性**」。正確是 ALK **陰性**。三年份（109、111、112）重複考同一句，屬必背中的必背：**BIA-ALCL ＝ 紋理面義乳、遲發血清腫、T 細胞、CD30(+)、ALK(−)**。", "peropt": {"A": "正確。MD Anderson 研究指出僅發生於紋理面義乳。", "B": "正確。隆乳一年以上的遲發血清腫須懷疑 BIA-ALCL。", "C": "正確。T 細胞淋巴瘤。", "D": "正確。CD30 陽性。", "E": "正解（錯述）。BIA-ALCL 為 ALK **陰性**，不是陽性。"}, "src": "NG", "sub": "S05"}, {"id": "NG-195", "stem": "關於「乳房植入物相關變性大細胞淋巴瘤」(BIA-ALCL)以下何者正確？", "opts": {"A": "如果腫瘤侵犯到莢膜外(extracapsular disease extension)，則存活率會顯著的下降", "B": "有沒有塊狀的腫瘤與病人的存活率有顯著差異", "C": "晚發的血清腫(seroma)除了用超音波檢查，須將液體抽出做病理檢查排除BIA-ALCL的可能性", "D": "大約70%的病人以血清腫(seroma or malignant effusion)表現，30%的病人以腫塊表現", "E": "以上皆是"}, "ans": "D", "multi": false, "years": ["109"], "cite": "Neligan, 4th Edision, Volume 4, Chapter 12, page 200-205", "conflict": "跨年答案鍵分歧:同題幹NG-196(111年)正解為E「以上皆是」,本題(109年)僅認D。概念上A/B/C/D皆為正確敘述", "etype": "ai", "expl": "", "key": "⚠ **本題與 NG-196 為同一題幹、同一選項，但兩年答案不同**：109 年只認 D（約 70% 以血清腫表現、30% 以腫塊表現），111 年認 E「以上皆是」。臨床上 A（莢膜外侵犯存活率顯著下降）、B（有無腫塊影響存活）、C（遲發血清腫須抽液送病理）皆為正確敘述。以各年答案鍵作答，概念上四項全對。", "peropt": {"A": "醫學上正確（腫瘤侵犯莢膜外，存活率顯著下降），但本年答案鍵未選。", "B": "醫學上正確（是否呈現腫塊與存活率顯著相關），本年答案鍵未選。", "C": "醫學上正確（遲發血清腫須抽液做細胞學與 CD30 染色排除 BIA-ALCL），本年答案鍵未選。", "D": "正解（本年）。約 70% 以血清腫／惡性積液表現，30% 以腫塊表現。", "E": "本年答案鍵未選「以上皆是」；但 111 年同題（NG-196）正解即為 E。"}, "src": "NG", "sub": "S05"}, {"id": "NG-215", "stem": "關於隆乳手術以下何者錯誤？", "opts": {"A": "目前比較常見的手術切口有經乳下緣(inframammary incision)、乳暈旁(periareolar incision)、腋下(axillary incision)與肚臍(transumbilical incision)", "B": "經乳暈旁(periareolar incision)隆乳有較低的感染率及莢膜攣縮率", "C": "經肚臍隆乳只能放saline implant", "D": "經腋下隆乳(axillary incision)有增加血腫，不必要組織傷害的風險", "E": "經乳下緣隆乳(inframammary incision)有較大的術野範圍"}, "ans": "B", "multi": false, "years": ["109", "111", "112"], "cite": "Neligan, 4th Edision, Volume 5, Chapter 2, page 22", "conflict": "", "etype": "ai", "expl": "", "key": "隆乳切口比較的核心：**乳暈周圍（periareolar）切口穿越乳管，感染與莢膜攣縮率較高，不是較低**。乳下緣切口術野最大且不經乳管；腋下切口為遠端盲視剝離，血腫與不必要組織傷害風險增加；經肚臍只能放鹽水袋（矽膠無法經此小通道置入）。", "peropt": {"A": "正確。四種常見切口即乳下緣、乳暈旁、腋下、肚臍。", "B": "正解（錯述）。乳暈旁切口穿越乳管與細菌接觸，感染率與莢膜攣縮率**較高**。", "C": "正確。經肚臍隆乳僅能置入鹽水袋（先置空袋再注水）。", "D": "正確。腋下切口為遠距盲視剝離，血腫與非必要組織傷害風險增加。", "E": "正確。乳下緣切口提供最大術野，直視下剝離囊袋與止血。"}, "src": "NG", "sub": "S03"}, {"id": "NG-146", "stem": "以下congenital breast deformities中, 何者不屬於Hypoplastic deformities?", "opts": {"A": "Breast hypoplasia and amazia", "B": "Athelia and amastia", "C": "Tuberous breast deformity", "D": "Poland syndrome", "E": "Polymastia"}, "ans": "E", "multi": false, "years": ["109", "111"], "cite": "Neligan 4th Ed Vol.5 Ch.28 Page 510", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-145 完全相同的概念，選項換位：Polymastia 為多乳房（supernumerary），不屬 hypoplastic deformities。此題答案 E、NG-145 答案 B——請記「Polymastia 是唯一的『多』」，不背字母。", "peropt": {"A": "屬 hypoplastic。", "B": "屬 hypoplastic。Athelia／amastia。", "C": "屬 hypoplastic。Tuberous breast。", "D": "屬 hypoplastic。Poland syndrome。", "E": "正解（非 hypoplastic）。Polymastia 屬多乳房畸形。"}, "src": "NG", "sub": "S09"}, {"id": "NG-058", "stem": "What is the indication(s) in nipple-sparing mastectomy?", "opts": {"A": "Inflammatory breast cancer", "B": "Nipple retraction", "C": "Paget's disease", "D": "Bloody nipple discharge", "E": "HER2/neu negative"}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan 4th Ed Vol.5 Ch.14 Page 221", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-056 互為正反題：NSM 的**適應症是 HER2/neu 陰性**（生物行為較不侵襲）；而發炎性乳癌、乳頭凹陷、Paget's disease（乳頭表皮受侵）、血性乳頭分泌全部都是**禁忌**。判準同樣是「乳頭乳暈受侵風險」。", "peropt": {"A": "禁忌。發炎性乳癌。", "B": "禁忌。乳頭凹陷提示乳頭下方受侵。", "C": "禁忌。Paget's disease 是乳頭表皮的癌細胞侵犯，絕對不能保留乳頭。", "D": "禁忌。血性乳頭分泌。", "E": "正解（適應症）。HER2/neu 陰性。"}, "src": "NG", "sub": "S10"}, {"id": "NG-115", "stem": "下列何者為post-mastectomy radiation的適應症？", "opts": {"A": "Locally advanced disease-T4 tumor", "B": "T3 tumor with evidence of node involvement upon pathology", "C": "Margins positive for invasive disease upon pathology", "D": "Tumor of any size with 4+ involved nodes", "E": "All of above"}, "ans": "E", "multi": false, "years": ["109"], "cite": "Neligan 4th Ed Vol.5 Ch.14 Page 220", "conflict": "", "etype": "ai", "expl": "", "key": "乳房切除後放療（PMRT）的適應症「全部都是」：**T4（局部進展）**、**T3 且病理證實有淋巴結侵犯**、**切緣有浸潤癌殘留**、**任何大小腫瘤合併 ≥4 顆陽性淋巴結**。這四項是重建時序決策的關鍵——只要預期需 PMRT，就應考慮延遲或 delayed-immediate 策略。", "peropt": {"A": "是。局部進展的 T4 腫瘤。", "B": "是。T3 腫瘤且病理證實淋巴結侵犯。", "C": "是。切緣有浸潤性癌殘留。", "D": "是。任何大小的腫瘤合併 4 顆以上淋巴結侵犯。", "E": "正解。以上皆為 PMRT 適應症。"}, "src": "NG", "sub": "S12"}, {"id": "NG-150", "stem": "以下關於free TRAM flap 的敘述何者為非？", "opts": {"A": "The rectus abdominis muscle is a Mathes and Nahai type III muscle", "B": "Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap", "C": "Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein", "D": "An abdominal bulge is most often due to attenuation of the anterior rectus sheath", "E": "None of above"}, "ans": "B", "multi": false, "years": ["109"], "cite": "Neligan 4th Ed Vol.5 Ch.20.4 Page 351, 358", "conflict": "Free TRAM「MS-0=DIEP」為錯述:選項重排家族,答案字母跨年浮動(NG109/111=B,NG113=D,NG110=A)。記概念:DIEP保留全肌,MS-0取全寬肌肉;勿背字母", "etype": "ai", "expl": "", "key": "與 NG-090 相同：錯述為「完整保留腹直肌＝MS-0(DIEP)」，正確應為 MS-3。109 年答案鍵 B，與 111 年一致；110 年同題鍵 A、112–114 年鍵 D，字母浮動但概念不變。", "peropt": {"A": "正確。rectus abdominis 為 Mathes-Nahai Type III。", "B": "正解（錯述）。完整保留腹直肌是 MS-3＝DIEP；MS-0 為全寬肌肉橫斷。", "C": "正確。受區血管為內乳與胸背血管。", "D": "正確。腹壁膨出多因前鞘變薄鬆弛。", "E": "存在錯述選項，不選 None of above。"}, "src": "NG", "sub": "S13"}, {"id": "NG-129", "stem": "下列關於Latissimus dorsi flap 的敘述何者為非？", "opts": {"A": "屬於Mathes and Nahai Type V muscle flap", "B": "The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries", "C": "Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication", "D": "Donor site seroma is most common complication", "E": "None of above"}, "ans": "B", "multi": false, "years": ["109", "111"], "cite": "Neligan 4th Ed Vol.5 Ch.19 Page 304, 306, 318", "conflict": "", "etype": "ai", "expl": "", "key": "LD 的血供必須指名 **thoracodorsal artery**（subscapular artery 的分支），輔以 posterior intercostal 與 lumbar arteries。dorsal scapular artery 供應的是 rhomboid 與提肩胛肌區，與 LD 無關，故 B 為錯述。此外供區血清腫是最常見併發症；既往後外側開胸切斷 LD 則為禁忌。", "peropt": {"A": "正確。LD 屬 Mathes-Nahai Type V 肌皮瓣。", "B": "正解（錯述）。血供來自 **thoracodorsal artery**（＋後肋間動脈），並非 dorsal scapular artery。", "C": "正確。既往後外側開胸手術已切斷 LD 者為禁忌（肌肉連續性與血供已破壞）。", "D": "正確。供區血清腫是 LD 皮瓣最常見的併發症。", "E": "存在錯述選項，不選 None of above。"}, "src": "NG", "sub": "S14"}, {"id": "NG-045", "stem": "International Society of Lymphology(ISL) staging中, Lymphostatic elephantiasis屬於stage?", "opts": {"A": "0", "B": "I", "C": "II", "D": "III", "E": "IV"}, "ans": "D", "multi": false, "years": ["109"], "cite": "Neligan 4th Ed Vol.5 Ch.26 Page 491", "conflict": "", "etype": "ai", "expl": "", "key": "**ISL 分期：Stage 0 潛伏期（無外觀腫脹）｜Stage I 早期，凹陷性水腫、抬高可消退｜Stage II 抬高無法完全消退，開始出現組織纖維化（晚期 Stage II 已不再凹陷）｜Stage III ＝ lymphostatic elephantiasis，非凹陷性、皮膚增厚與贅生物**。故象皮病為 Stage III。", "peropt": {"A": "Stage 0：亞臨床潛伏期，淋巴運輸已受損但無可見腫脹。", "B": "Stage I：凹陷性水腫，抬高患肢可消退。", "C": "Stage II：抬高無法完全消退，組織纖維化出現。", "D": "正解。Stage III：淋巴滯留性象皮病（lymphostatic elephantiasis）。", "E": "ISL 分期只到 Stage III，無 Stage IV。"}, "src": "NG", "sub": "S17"}, {"id": "NG-192", "stem": "關於profunda artery perforator flap(PAP flap), 以下何者錯誤:", "opts": {"A": "The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh", "B": "The dissection of the PAP flap is straightforward through the adductor longus muscle", "C": "The flap donor site well hidden within the upper thigh and buttock crease", "D": "Complications include fat necrosis, donor site seroma and infection", "E": "None of above"}, "ans": "B", "multi": false, "years": ["109", "111"], "cite": "Neligan 4th Ed Vol.5 Ch.21.4 Page 410, 415", "conflict": "跨年答案鍵矛盾:本題判B(adductor longus)為錯;114年NG-191B同句被視為正確", "etype": "ai", "expl": "", "key": "本題的錯述在肌肉名稱：PAP 的穿通枝行經 **adductor magnus**（或 gracilis 與 adductor magnus 之間的中隔），而非 **adductor longus**。與 NG-191 對照可見：同一族題目一年考「蒂長」、一年考「肌肉名稱」，兩個關鍵字都要記牢。", "peropt": {"A": "正確。profunda artery 自 common femoral artery 分出，進入大腿後側間隔。", "B": "正解（錯述）。穿通枝並非穿行 **adductor longus**，而是 adductor magnus／中隔路徑；且剝離並不簡單。", "C": "正確。供區疤痕隱藏於大腿上方與臀下皺褶。", "D": "正確。併發症包含脂肪壞死、供區血清腫與感染。", "E": "存在錯述選項，不選 None of above。"}, "src": "NG", "sub": "S14"}, {"id": "NG-207", "stem": "關於利用profunda artery perforator flap(PAP flap)需要考慮的complication包括以下何者(複選)", "opts": {"A": "Fat necrosis", "B": "Donor site seroma", "C": "Donor site hematoma", "D": "Donor site infection", "E": "Lower extremity lymphedema"}, "ans": "ABCD", "multi": true, "years": ["109", "111"], "cite": "Neligan 4th Ed Vol.5 Ch.21.4 Page 415", "conflict": "", "etype": "ai", "expl": "", "key": "PAP 皮瓣須考慮的併發症為 ABCD：受區脂肪壞死，供區血清腫、血腫、傷口感染（供區位於大腿內側、活動與剪力大，傷口癒合延遲常見）。**下肢淋巴水腫並非 PAP 的典型併發症**——那是 TUG 的風險（因剝離接近大隱靜脈與腹股溝淋巴系統）。", "peropt": {"A": "是。受區脂肪壞死為常見併發症。", "B": "是。供區血清腫常見，因大腿內側潛在腔隙大。", "C": "是。供區血腫。", "D": "是。供區傷口感染與癒合延遲（會陰鄰近、剪力大）。", "E": "否。下肢淋巴水腫是 TUG 取瓣（近腹股溝淋巴與大隱靜脈）的風險，非 PAP 的典型併發症。"}, "src": "NG", "sub": "S14"}, {"id": "NG-206", "stem": "關於使用gluteal free flap於乳房重建, 以下何者正確(複選)", "opts": {"A": "Gluteal tissue may be harvested based on the superior gluteal artery (SGAP) or the inferior gluteal artery (IGAP)", "B": "The main disadvantage of the IGAP flap is dissection adjacent to the sciatic nerve", "C": "The primary recipient vessel choice for SGAP reconstruction is the internal mammary artery and vein", "D": "Thoracodorsal vessels are alternative recipient vessels", "E": "The main perforators of the superior gluteal artery can be found by palpating the lesser sciatic foramen"}, "ans": "ABCD", "multi": true, "years": ["109"], "cite": "Neligan 4th Ed Vol.5 Ch.21.2 Page 377, 379, Fig. 21.2.5", "conflict": "", "etype": "ai", "expl": "", "key": "臀部游離皮瓣的四項正確事實（SGAP／IGAP 皆可取瓣、IGAP 缺點為貼近坐骨神經、SGAP 首選受區為內乳血管、胸背血管為備案），錯在 E：superior gluteal artery 的主要穿通枝定位需觸診 **greater sciatic foramen（大坐骨孔）**，不是 lesser sciatic foramen。", "peropt": {"A": "對。臀部組織可依 SGAP 或 IGAP 系統取瓣。", "B": "對。IGAP 主要缺點為剝離緊鄰坐骨神經。", "C": "對。SGAP 蒂短，首選受區為內乳動靜脈。", "D": "對。胸背血管為替代受區。", "E": "錯。上臀動脈主要穿通枝的體表定位參考 **greater** sciatic foramen；lesser sciatic foramen 通過的是陰部血管神經與閉孔內肌腱。"}, "src": "NG", "sub": "S14"}, {"id": "NG-204", "stem": "關於使用Deep inferior epigastric artery perforator(DIEAP) flap於乳房重建, 以下何者正確(複選)", "opts": {"A": "The deep inferior epigastric artery arises from the femoral artery", "B": "The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap", "C": "The dissection of a DIEAP flap has a steep learning curve", "D": "Abdominal scarring is probably the most important risk factor for raising a DIEAP flap", "E": "Smoking is considered a relative contraindication to raising a DIEAP flap"}, "ans": "BCDE", "multi": true, "years": ["109", "111"], "cite": "Neligan 4th Ed Vol.5 Ch.20.2 Page 324, 327, 340", "conflict": "", "etype": "ai", "expl": "", "key": "與 NG-087 完全相同的 DIEAP 五項事實（109、111 年重複出現，屬高頻題）：DIEA 起自 external iliac artery（非 femoral）；SIEV 是皮島最大引流靜脈；學習曲線陡；腹部疤痕為最重要風險因子；抽菸為相對禁忌。", "peropt": {"A": "錯。DIEA 起源於 external iliac artery。", "B": "對。SIEV 是皮島口徑最大的引流靜脈，靜脈鬱血時可加接。", "C": "對。穿通枝剝離學習曲線陡峭。", "D": "對。腹部疤痕（既往手術）是取瓣最重要的風險
