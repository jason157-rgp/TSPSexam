Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap","C":"Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein","D":"An abdominal bulge is most often due to attenuation of the anterior rectus sheath","E":"None of above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 NG-090 相同：錯述為「完整保留腹直肌＝MS-0(DIEP)」，正確應為 MS-3。109 年答案鍵 B，與 111 年一致；110 年同題鍵 A、112–114 年鍵 D，字母浮動但概念不變。","peropt":{"A":"正確。rectus abdominis 為 Mathes-Nahai Type III。","B":"正解（錯述）。完整保留腹直肌是 MS-3＝DIEP；MS-0 為全寬肌肉橫斷。","C":"正確。受區血管為內乳與胸背血管。","D":"正確。腹壁膨出多因前鞘變薄鬆弛。","E":"存在錯述選項，不選 None of above。"},"cite":"Neligan 4th Ed Vol.5 Ch.20.4 Page 351, 358","conflict":""},{"id":"2152","sub":"S17","src":"NG","years":[109],"stem":"International Society of Lymphology(ISL) staging中, Lymphostatic elephantiasis屬於stage?","opts":{"A":"0","B":"I","C":"II","D":"III","E":"IV"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"**ISL 分期：Stage 0 潛伏期（無外觀腫脹）｜Stage I 早期，凹陷性水腫、抬高可消退｜Stage II 抬高無法完全消退，開始出現組織纖維化（晚期 Stage II 已不再凹陷）｜Stage III ＝ lymphostatic elephantiasis，非凹陷性、皮膚增厚與贅生物**。故象皮病為 Stage III。","peropt":{"A":"Stage 0：亞臨床潛伏期，淋巴運輸已受損但無可見腫脹。","B":"Stage I：凹陷性水腫，抬高患肢可消退。","C":"Stage II：抬高無法完全消退，組織纖維化出現。","D":"正解。Stage III：淋巴滯留性象皮病（lymphostatic elephantiasis）。","E":"ISL 分期只到 Stage III，無 Stage IV。"},"cite":"Neligan 4th Ed Vol.5 Ch.26 Page 491","conflict":""},{"id":"2153","sub":"S14","src":"NG","years":[109,111,114],"stem":"關於profunda artery perforator flap(PAP flap), 以下何者錯誤:","opts":{"A":"The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh","B":"The dissection of the PAP flap is straightforward through the adductor longus muscle","C":"The flap donor site well hidden within the upper thigh and buttock crease","D":"Complications include fat necrosis, donor site seroma and infection","E":"None of above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"本題的錯述在肌肉名稱：PAP 的穿通枝行經 **adductor magnus**（或 gracilis 與 adductor magnus 之間的中隔），而非 **adductor longus**。與 NG-191 對照可見：同一族題目一年考「蒂長」、一年考「肌肉名稱」，兩個關鍵字都要記牢。","peropt":{"A":"正確。profunda artery 自 common femoral artery 分出，進入大腿後側間隔。","B":"正解（錯述）。穿通枝並非穿行 **adductor longus**，而是 adductor magnus／中隔路徑；且剝離並不簡單。","C":"正確。供區疤痕隱藏於大腿上方與臀下皺褶。","D":"正確。併發症包含脂肪壞死、供區血清腫與感染。","E":"存在錯述選項，不選 None of above。"},"cite":"Neligan 4th Ed Vol.5 Ch.21.4 Page 410, 415","conflict":"⚠ 同題歷屆重出：2153（109、111年）與2207（114年）選項完全相同（PAP flap何者錯誤），但官方答案不一致——2153答B（adductor longus dissection straightforward為錯），2207答E（none of above）。屬答案key歧異，記PAP flap概念不記字母。（同cluster之2181因選項改為adductor magnus並新增短pedicle 5cm考點，另計不併。）"},{"id":"2154","sub":"S14","src":"NG","years":[109,111,114],"stem":"關於利用profunda artery perforator flap(PAP flap)需要考慮的complication包括以下何者(複選)","opts":{"A":"Fat necrosis","B":"Donor site seroma","C":"Donor site hematoma","D":"Donor site infection","E":"Lower extremity lymphedema"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"PAP 皮瓣須考慮的併發症為 ABCD：受區脂肪壞死，供區血清腫、血腫、傷口感染（供區位於大腿內側、活動與剪力大，傷口癒合延遲常見）。**下肢淋巴水腫並非 PAP 的典型併發症**——那是 TUG 的風險（因剝離接近大隱靜脈與腹股溝淋巴系統）。","peropt":{"A":"是。受區脂肪壞死為常見併發症。","B":"是。供區血清腫常見，因大腿內側潛在腔隙大。","C":"是。供區血腫。","D":"是。供區傷口感染與癒合延遲（會陰鄰近、剪力大）。","E":"否。下肢淋巴水腫是 TUG 取瓣（近腹股溝淋巴與大隱靜脈）的風險，非 PAP 的典型併發症。"},"cite":"Neligan 4th Ed Vol.5 Ch.21.4 Page 415","conflict":""},{"id":"2155","sub":"S14","src":"NG","years":[109,114],"stem":"關於使用gluteal free flap於乳房重建, 以下何者正確(複選)","opts":{"A":"Gluteal tissue may be harvested based on the superior gluteal artery (SGAP) or the inferior gluteal artery (IGAP)","B":"The main disadvantage of the IGAP flap is dissection adjacent to the sciatic nerve","C":"The primary recipient vessel choice for SGAP reconstruction is the internal mammary artery and vein","D":"Thoracodorsal vessels are alternative recipient vessels","E":"The main perforators of the superior gluteal artery can be found by palpating the lesser sciatic foramen"},"ans":"ABCD","multi":true,"etype":"ai","expl":"","key":"臀部游離皮瓣的四項正確事實（SGAP／IGAP 皆可取瓣、IGAP 缺點為貼近坐骨神經、SGAP 首選受區為內乳血管、胸背血管為備案），錯在 E：superior gluteal artery 的主要穿通枝定位需觸診 **greater sciatic foramen（大坐骨孔）**，不是 lesser sciatic foramen。","peropt":{"A":"對。臀部組織可依 SGAP 或 IGAP 系統取瓣。","B":"對。IGAP 主要缺點為剝離緊鄰坐骨神經。","C":"對。SGAP 蒂短，首選受區為內乳動靜脈。","D":"對。胸背血管為替代受區。","E":"錯。上臀動脈主要穿通枝的體表定位參考 **greater** sciatic foramen；lesser sciatic foramen 通過的是陰部血管神經與閉孔內肌腱。"},"cite":"Neligan 4th Ed Vol.5 Ch.21.2 Page 377, 379, Fig. 21.2.5","conflict":"跨年誘答選項事實置換，概念同但測到的事實不同（對照 NG114-B14-Q13） ⚠ 同題歷屆重出：gluteal free flap複選，2155（109年）與2214（114年）皆答ABCD，A–D選項相同；僅E選項distractor改寫（2155為「觸診lesser sciatic foramen找主要穿通枝」，2214為「superior gluteal vessels經lesser sciatic foramen出骨盆」，兩者皆為錯誤敘述故不選）。記概念不記字母。"},{"id":"2156","sub":"S13","src":"NG","years":[109,110,111],"stem":"關於使用Deep inferior epigastric artery perforator(DIEAP) flap於乳房重建, 以下何者正確(複選)","opts":{"A":"The deep inferior epigastric artery arises from the femoral artery","B":"The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap","C":"The dissection of a DIEAP flap has a steep learning curve","D":"Abdominal scarring is probably the most important risk factor for raising a DIEAP flap","E":"Smoking is considered a relative contraindication to raising a DIEAP flap"},"ans":"BCDE","multi":true,"etype":"ai","expl":"","key":"與 NG-087 完全相同的 DIEAP 五項事實（109、111 年重複出現，屬高頻題）：DIEA 起自 external iliac artery（非 femoral）；SIEV 是皮島最大引流靜脈；學習曲線陡；腹部疤痕為最重要風險因子；抽菸為相對禁忌。","peropt":{"A":"錯。DIEA 起源於 external iliac artery。","B":"對。SIEV 是皮島口徑最大的引流靜脈，靜脈鬱血時可加接。","C":"對。穿通枝剝離學習曲線陡峭。","D":"對。腹部疤痕（既往手術）是取瓣最重要的風險因子。","E":"對。抽菸增加脂肪壞死與傷口併發症，屬相對禁忌。"},"cite":"Neligan 4th Ed Vol.5 Ch.20.2 Page 324, 327, 340","conflict":""},{"id":"2157","sub":"S09","src":"NG","years":[110],"stem":"Which of the following is not the clinical presentation of Poland syndrome?","opts":{"A":"unilateral absence of the clavicular head of the pectoralis major muscle","B":"breast hypoplasia or aplasia","C":"deformed ribs","D":"axillary alopecia","E":"upper extremity brachysyndactyly"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 本題問「何者非 Poland syndrome 之臨床表徵」。Poland syndrome 特徵為單側缺乏胸大肌「胸骨頭（sternal head）」、乳房發育不良/缺失、肋骨缺失或變形、腋毛缺失（axillary alopecia）、同側上肢短小併指（brachysyndactyly）。⚠ 關鍵陷阱：缺失的是胸大肌「胸骨頭」，而非「鎖骨頭（clavicular head）」；選項 A 誤寫為 clavicular head，故 A 即為「非臨床表徵」＝答案。","peropt":{"A":"✓（正解＝非表徵）Poland 缺的是胸大肌「胸骨頭」，非「鎖骨頭」，故本項不符。","B":"✗（屬表徵）乳房發育不良/缺失為典型表現。","C":"✗（屬表徵）肋骨缺失或變形常見。","D":"✗（屬表徵）腋毛缺失（axillary alopecia）為特徵之一。","E":"✗（屬表徵）同側上肢短小併指（brachysyndactyly）為典型。"},"cite":"待複查（NG Poland syndrome 記憶佐證）","conflict":""},{"id":"2158","sub":"S01","src":"NG","years":[110],"stem":"關於Nipple areolar complex的敘述，以下何者為非?","opts":{"A":"由keratinizing stratified cuboidal epithelium及乳房上方的皮膚所覆蓋","B":"包含pigmented skin， 直徑大約4-5cm","C":"血液供應來自parenchymal vessels 及 subdermal plexus","D":"乳頭erection由平滑肌所控制","E":"神經供應主要來自lateral cutaneous branch of the fourth intercostal nerve"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"NAC 由**角化複層鱗狀上皮（keratinizing stratified squamous epithelium）**覆蓋，不是立方上皮（cuboidal）——立方細胞在乳腺腺體內。其餘：NAC 直徑約 4–5 cm、血供來自實質血管與真皮下血管叢、乳頭勃起由平滑肌控制、主要神經為第 4 肋間神經外側皮支。","peropt":{"A":"正解（錯述）。NAC 由角化**複層鱗狀**上皮覆蓋，非 cuboidal epithelium。","B":"正確。含色素皮膚，直徑約 4–5 cm。","C":"正確。血供來自實質血管（parenchymal vessels）與真皮下血管叢（subdermal plexus）——這是乳頭保留手術的解剖基礎。","D":"正確。乳頭勃起由平滑肌收縮控制。","E":"正確。主要神經為第 4 肋間神經的外側皮支。"},"cite":"Neligan, volume 5, page 7","conflict":""},{"id":"2159","sub":"S03","src":"NG","years":[110,112,113],"stem":"病人於義乳置放四年後，比起健側，觸摸感覺較不柔軟，且可以摸得到置入物，但是看不見明顯的位移，根據Baker clinical classification為第幾級?","opts":{"A":"0","B":"I","C":"II","D":"III","E":"IV"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"「較不柔軟＋可觸及義乳＋看不見變形」＝ **Baker Grade II**。本題選項自 0 開始（A=0、B=I、C=II、D=III、E=IV），故答案 C 對應 **Grade II**；而 NG-154 的答案 C 對應 **Grade III**。同樣是 C，級數不同——請以「可觸及但不可見＝II；易觸及且可見或變形＝III」的敘述定位。","peropt":{"A":"Grade 0 並非 Baker 分級的正式級別（原始分級自 I 起）。","B":"Grade I：柔軟如自然乳房。","C":"正解。Grade II：略硬、義乳可觸及但看不見、無明顯變形。","D":"Grade III：明顯變硬、義乳易觸及且可能可見或變形。","E":"Grade IV：堅硬、疼痛、壓痛、明顯變形。"},"cite":"Neligan, volume 5, page 47","conflict":""},{"id":"2160","sub":"S03","src":"NG","years":[110,112,113],"stem":"下列何種方式，在減少義乳產生的莢膜攣縮併發症上，沒有角色?","opts":{"A":"Subfascial plane","B":"Nipple shield","C":"Pocket irrigation with triple antibiotics","D":"Inframammary incision","E":"Insertion sleeve"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"「14-point plan」中被證實可降低莢膜攣縮的措施包括：**乳頭遮罩（nipple shield）**隔離乳管細菌、**三重抗生素沖洗囊袋**、**乳下緣切口**（避開乳管，較乳暈切口低攣縮率）、**置入套管（insertion sleeve）**避免義乳接觸皮膚。**Subfascial plane 尚無證據可降低莢膜攣縮**，故它「沒有角色」。","peropt":{"A":"正解（沒有角色）。筋膜下平面對降低莢膜攣縮並無實證支持。","B":"有角色。乳頭遮罩阻絕乳管內細菌污染囊袋。","C":"有角色。三重抗生素沖洗降低生物膜形成。","D":"有角色。乳下緣切口不穿越乳管，攣縮率低於乳暈切口。","E":"有角色。置入套管使義乳不接觸皮膚，減少細菌帶入。"},"cite":"Neligan, volume 5, page 67","conflict":""},{"id":"2161","sub":"S09","src":"NG","years":[110],"stem":"關於tuberous breast的敘述，以下何者錯誤?","opts":{"A":"臨床特徵為constricted lower poles, wide intermammary distance, conical breast shapes","B":"Cohesive textured implants為首選","C":"常需要做aggressive upper pole scoring","D":"Inframammary fold 需要重新被定位","E":"Circumareolar mastopexy可以減少double-bubble現象"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Tuberous breast 手術的關鍵動作是在**下極（lower pole）**做放射狀 scoring 以釋放受限的實質與基底，而非在 upper pole 做 aggressive scoring。其餘要點：IMF 必須重新定位、環乳暈固定術可減少 double-bubble、內聚性紋理義乳為首選。","peropt":{"A":"正確。臨床三聯：下極受限、兩乳間距寬、圓錐狀乳房外形。","B":"正確。Cohesive textured implant 為首選（可對抗下極受限、維持形狀）。","C":"正解（錯述）。scoring 應施於**下極**實質以釋放基底受限，並非 upper pole 的 aggressive scoring。","D":"正確。過高的 IMF 必須被破壞並重新定位。","E":"正確。環乳暈乳房固定術可處理疝出的實質與過大的 NAC，減少 double-bubble。"},"cite":"Neligan, volume 5, page 101-103","conflict":""},{"id":"2162","sub":"S08","src":"NG","years":[110],"stem":"治療男性女乳症，Ultrasound-assisted liposuction (UAL) 比起Suction-assisted lipectomy (SAL)的優勢，以下何者為非?","opts":{"A":"減少術後瘀青","B":"術後胸部輪廓較平順","C":"術後皮膚收縮力較佳","D":"減少surgeon手術疲勞度","E":"減少手術時間"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"UAL（超音波輔助抽脂）相對 SAL 的優勢：瘀青少、輪廓平順、皮膚收縮較佳、術者疲勞度降低（超音波先乳化脂肪）。**但 UAL 的手術時間反而較長**（需額外的乳化階段），故「減少手術時間」為非。這與 NG-165／NG-166 的缺點清單（含「增加手術時間」）互相印證。","peropt":{"A":"是優勢。術後瘀青較少。","B":"是優勢。術後胸部輪廓較平順。","C":"是優勢。皮膚收縮力較佳（超音波熱效應）。","D":"是優勢。脂肪先被乳化，術者體力負擔減少。","E":"正解（非優勢）。UAL 需額外乳化階段，**手術時間反而增加**。"},"cite":"Neligan, volume 5, page 179","conflict":""},{"id":"2163","sub":"S08","src":"NG","years":[110],"stem":"男性女乳的成因，以下何者為非?","opts":{"A":"Cushing's syndrome","B":"Adrenal adenoma","C":"Cimetidine","D":"Starvation","E":"Nontuberculous Mycobacteria (NTM ) infection"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"男性女乳症的成因涵蓋**內分泌（Cushing's syndrome、腎上腺腺瘤）、藥物（cimetidine 等 H2 阻斷劑）、營養狀態（飢餓後再進食 refeeding gynecomastia）**。**非結核分枝桿菌（NTM）感染不是成因**——感染造成的是乳房膿瘍或腫塊，機轉與雌激素／雄性素失衡無關。","peropt":{"A":"是成因。Cushing's syndrome 造成賀爾蒙失衡。","B":"是成因。腎上腺腺瘤可分泌雌激素前驅物。","C":"是成因。Cimetidine 具抗雄性素作用。","D":"是成因。飢餓（及其後的再進食）造成賀爾蒙軸波動。","E":"正解（非成因）。NTM 感染造成的是乳房感染性病灶，與男性女乳症的內分泌機轉無關。"},"cite":"Neligan, volume 5, page 175","conflict":""},{"id":"2164","sub":"S05","src":"NG","years":[110],"stem":"一位52歲女性，於1年半以前接受雙側胸大肌下絨毛面果凍矽膠義乳置放術，最近感到右側乳房腫痛，且觸摸到同側腋下腫塊，超音波下發現右側義乳積液，且同側腋下淋巴腫瘤，經細針抽吸，免疫組織化學染色及癌症分期影像檢查，證實為advanced stage breast implant-associated anaplastic large cell lymphoma (BIA-ALCL)，以下敘述，何者為誤?","opts":{"A":"建議接受全莢膜及義乳移除手術","B":"若有需要，需會診放射腫瘤科及血液腫瘤科，進行治療計畫的評估","C":"細針抽吸腫大的腋下淋巴結，偽陽性結果高","D":"手術移除全莢膜及絨毛面義乳之後，可即時置入光滑面義乳","E":"免疫組織化學染色會有CD30的表現"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"BIA-ALCL 的處理原則：**完整移除義乳＋全莢膜切除（total capsulectomy）**，必要時會診放腫與血腫科；免疫組織化學染色 CD30 陽性。錯在 C——腫大淋巴結的細針抽吸**偽陰性率較高**（腫瘤細胞分佈不均、易抽到反應性淋巴球），並非偽陽性率高。","peropt":{"A":"正確。標準治療為義乳與全莢膜的完整移除。","B":"正確。進展期需會診放射腫瘤科與血液腫瘤科共同擬定治療計畫。","C":"正解（錯述）。細針抽吸腫大淋巴結的**偽陰性**率較高，並非偽陽性率高。","D":"依本年答案鍵視為正確敘述（移除紋理面義乳與全莢膜後可置入光滑面義乳）；惟進展期病例是否立即重建，臨床上仍應個別評估。","E":"正確。免疫組織化學染色呈 CD30 陽性，是 BIA-ALCL 的診斷標記。"},"cite":"Neligan, volume 5, page 199-201","conflict":""},{"id":"2165","sub":"S05","src":"NG","years":[110],"stem":"關於Breast implant-associated anaplastic large cell lymphoma (BIA-ALCL) 的敘述，何者錯誤? (複選)","opts":{"A":"腫瘤病理樣本分析，包含義乳周圍的積液","B":"是一種non-Hodgkin's lymphoma (NHL)","C":"半成病人合併有lymphadenopathy","D":"免疫組織化學染色會有CD20的表現","E":"ALK基因在chromosome 2q23上的染色體易位"},"ans":"CD","multi":true,"etype":"ai","expl":"","key":"BIA-ALCL 的免疫表型是 **CD30 陽性、ALK 陰性的 T 細胞（non-Hodgkin）淋巴瘤**。錯述為 C（並非半數病人合併淋巴結腫大，實際比例低得多）與 D（表現 **CD30** 而非 CD20；CD20 是 B 細胞標記）。註：ALK 基因實際位於 **2p23**，本題 E 寫 2q23 但未被列為錯誤選項。","peropt":{"A":"正確。病理檢體分析須包含義乳周圍的積液（做細胞學與 CD30 染色）。","B":"正確。BIA-ALCL 屬非何杰金氏淋巴瘤（NHL）。","C":"錯。合併淋巴結腫大的比例遠低於半數。","D":"錯。免疫染色為 **CD30 陽性**；CD20 是 B 細胞標記，與 T 細胞來源的 BIA-ALCL 不符。","E":"依本年答案鍵視為正確。惟 ALK 基因實際位於 chromosome **2p23**（題目寫 2q23），記憶時以 2p23 為準。"},"cite":"Neligan, volume 5, page 196-197","conflict":""},{"id":"2166","sub":"S12","src":"NG","years":[110],"stem":"Immediate breast reconstruction (IBR) 比起 delayed reconstruction，有何益處? (複選)","opts":{"A":"避免病人接受乳房切除後可能產生的精神及情緒後遺症","B":"較美觀","C":"減少住院費用","D":"減少局部復發的可能性","E":"提高病人存活率"},"ans":"ABC","multi":true,"etype":"ai","expl":"","key":"即時重建（IBR）相對延遲重建的益處是**心理／美觀／經濟**三面向：避免乳房切除後的精神情緒後遺症、美觀較佳（保留皮膚囊袋與 IMF）、減少住院與整體費用。**但 IBR 不會降低局部復發率，也不會提高存活率**——腫瘤預後由腫瘤生物學決定，與重建無關，這是最常見的陷阱。","peropt":{"A":"是。避免病人經歷失去乳房的精神與情緒衝擊。","B":"是。保留皮膚囊袋與 IMF，美觀效果較佳。","C":"是。合併手術減少住院次數與整體費用。","D":"否。重建不影響局部復發率。","E":"否。重建不影響病人存活率。"},"cite":"Neligan, volume 5, page 209","conflict":""},{"id":"2167","sub":"S10","src":"NG","years":[110],"stem":"關於Contralateral prophylactic mastectomy的敘述何者正確? (複選)","opts":{"A":"年輕且有多位一等親家族史病人，建議接受Contralateral prophylactic mastectomy","B":"超音波乳房檢查的普及，提高乳癌2-3成診斷率，是其中一個手術適應症","C":"社經地位較高的病人意願也較高","D":"白人女性居多","E":"在預防性切除的乳房進行義乳重建，整體而言，會有增加併發症的風險"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"對側預防性乳房切除（CPM）的正確敘述：年輕且有多位一等親家族史者建議施行；社經地位較高者意願較高；白人女性居多；**在預防性切除的乳房上做義乳重建，整體而言會增加併發症風險**（雙側手術）。錯的是 B——超音波普及提高診斷率並不構成 CPM 的手術適應症。","peropt":{"A":"對。年輕、多位一等親家族史者，對側原發癌風險高。","B":"錯。影像診斷率提升不是 CPM 的手術適應症；適應症取決於基因與家族史風險。","C":"對。社經地位較高的病人接受 CPM 的意願較高。","D":"對。接受 CPM 者以白人女性為多。","E":"對。在預防性切除側行義乳重建，整體併發症風險增加。"},"cite":"Neligan, volume 5, page 217-218","conflict":""},{"id":"2168","sub":"S10","src":"NG","years":[110,111,112,113,114,115],"stem":"What is the contraindication(s) in nipple-sparing mastectomy?","opts":{"A":"Inflammatory breast cancer","B":"Tumor location > 2cm from the nipple","C":"Negative axillary nodes","D":"HER2/neu negative","E":"Tumor grade 1 to 2"},"ans":"A","multi":false,"etype":"ai","expl":"","key":"🎯 Nipple-sparing mastectomy（NSM）的禁忌著重於腫瘤學安全與乳頭受侵風險。發炎性乳癌（inflammatory breast cancer）因皮膚/淋巴管廣泛受侵，屬NSM禁忌。⚠ 相對地，腫瘤距乳頭>2cm、腋下淋巴結陰性、HER2陰性、低惡性度（grade 1–2）皆屬『有利/適合』條件，非禁忌；勿誤選。","peropt":{"A":"✓（正解）Inflammatory breast cancer為NSM之禁忌。","B":"✗ 腫瘤距乳頭>2cm為有利條件，非禁忌。","C":"✗ 腋下淋巴結陰性為有利條件，非禁忌。","D":"✗ HER2陰性非禁忌。","E":"✗ 低惡性度（grade 1–2）為有利條件，非禁忌。"},"cite":"待複查（NG nipple-sparing mastectomy 禁忌 記憶佐證）","conflict":""},{"id":"2170","sub":"S13","src":"NG","years":[110],"stem":"Which of the following statements about pedicled TRAM flap is incorrect?","opts":{"A":"The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the most commonly used autologous methods of breast reconstruction todays","B":"Patients who have had prior implant-based reconstruction are not suitable for pedicle TRAM flap reconstruction.","C":"The rectus abdominis muscle is a Mathes and Nahai type III muscle and the pedicled TRAM flap relies on the superior epigastric vessels and its terminal branches","D":"Patient with surgical history of open cholecystectomy is not the contraindication to ipsilateral pedicle TRAM flap reconstruction.","E":"The pedicled TRAM is contraindicated in patients with extensively scarred abdomen and in patients with chronic back pain."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"Pedicled TRAM 依賴 superior epigastric vessels。右上腹橫切口（open cholecystectomy，Kocher incision）會切斷同側上腹壁血管，因此是「同側 pedicled TRAM 的禁忌」。題目 D 說「不是禁忌」，故為錯述。","peropt":{"A":"正確。Hartrampf 於 1980 年代提出 pedicled TRAM，至今仍是常用自體重建術式之一。","B":"依本年答案鍵視為正確敘述（曾接受義乳重建者因胸壁疤痕與軟組織條件不佳，一般不列為 pedicled TRAM 的理想人選）。","C":"正確。rectus 為 Type III 肌肉；pedicled TRAM 靠 superior epigastric vessels 及其終末分支灌流。","D":"正解（錯述）。open cholecystectomy 的右肋下切口已離斷同側上腹壁血管，是同側 pedicled TRAM 的禁忌，不能說「不是禁忌」。","E":"正確。腹部廣泛疤痕與慢性背痛者不適合 pedicled TRAM（後者因腹直肌犧牲會加重核心肌群無力）。"},"cite":"Neligan, Volume 5 Chapter 18 Page 281-285","conflict":""},{"id":"2172","sub":"S14","src":"NG","years":[110],"stem":"Which of the following statements about Latissimus dorsi flap is incorrect?","opts":{"A":"The latissimus myocutaneous (LD) flap is a Mathes and Nahai type V flap","B":"The blood supply of this flap comes from thoracodorsal artery, posterior intercostal and lumbar arteries","C":"LD flap reconstruction is indicated for patients with known need for postoperative radiotherapy along with the need for a prosthetic device.","D":"Latissimus dorsi is an important adductor of the arm and internal rotator of the shoulder. Harvest of this flap can lead to shoulder weakness, stiffness, and loss of mobility.","E":"Combination of free LD muscular flap transfer and skin graft would provide a flexible, contoured, well-vascularized coverage for reconstruction of lower extremity."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"LD 皮瓣的核心事實：Mathes-Nahai **Type V**；主蒂為 thoracodorsal artery，次要節段蒂為 posterior intercostal 與 lumbar arteries。關鍵臨床判斷：**已知術後需放射治療、又同時需要義乳者，不適合 LD＋義乳重建**——放療會大幅升高莢膜攣縮率，LD 的肌肉覆蓋並不能抵銷，此時應改為純自體組織重建。","peropt":{"A":"正確。LD 為 Mathes-Nahai Type V 肌皮瓣。","B":"正確。血供來自胸背動脈（優勢蒂）與後肋間、腰動脈（節段性次要蒂）。","C":"正解（錯述）。已知術後需放療且需植入義乳者，並非 LD 重建的適應症，而是應避免的組合（放療＋義乳的莢膜攣縮與失敗率顯著上升）。","D":"正確。LD 是重要的肩內收與內旋肌，取瓣可造成肩部無力、僵硬與活動度下降。","E":"正確。游離 LD 肌瓣加植皮可為下肢提供柔軟、貼合輪廓且血流良好的覆蓋。"},"cite":"Neligan, Volume 5 Chapter 19 Page 301,306","conflict":""},{"id":"2174","sub":"S17","src":"NG","years":[110,112,113],"stem":"What is the stage of Lymphostatic elephantiasis by International Society of Lymphology(ISL) staging system?","opts":{"A":"0","B":"I","C":"II","D":"III","E":"IV"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"與 NG-045 同題（110、112 年）：**lymphostatic elephantiasis ＝ ISL Stage III**，也是 ISL 分期的最高級（無 Stage IV）。特徵為非凹陷性水腫、皮膚增厚、疣狀增生與反覆蜂窩組織炎。","peropt":{"A":"Stage 0：潛伏期。","B":"Stage I：凹陷性、可逆。","C":"Stage II：抬高不完全消退、纖維化開始。","D":"正解。Stage III：象皮病。","E":"ISL 無 Stage IV。"},"cite":"Neligan, Volume 5 Chapter 26 Page 491","conflict":""},{"id":"2175","sub":"S13","src":"NG","years":[108,110,115],"stem":"Comparing free TRAM flap with DIEP flap, which statement(s) is true? (複選)","opts":{"A":"If breast volume requirement is above 800 c.c, DIEP flap is a better choice","B":"If breast volume requirement is above 800 c.c, free TRAM flap is a better choice","C":"If no perforator >1.5mm available, DIEP flap is a better choice","D":"If no perforator >1.5mm available, free TRAM flap is a better choice","E":"patient with severe abdominal fat is better candidate for SIEA reconstruction"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯 本題比較free TRAM與DIEP之取捨。關鍵在血供量與穿支條件：大體積需求（>800cc）時，保留部分肌肉的free TRAM血供較充足、較DIEP可靠；當無足夠管徑穿支（無>1.5mm perforator）時，強行做DIEP風險高，改用free TRAM較安全。⚠ SIEA適用於較小體積且血管條件良好者，並非嚴重腹部肥厚的較佳選擇，故E錯誤。","peropt":{"A":"✗ 錯誤——體積>800cc時free TRAM（而非DIEP）為較佳選擇。","B":"✓ 正確——體積>800cc時free TRAM血供較充足，較佳。","C":"✗ 錯誤——無>1.5mm穿支時應改用free TRAM，非DIEP。","D":"✓ 正確——無足夠管徑穿支時，free TRAM較安全可靠。","E":"✗ 錯誤——SIEA血供有限，嚴重腹部肥厚者並非較佳SIEA候選。"},"cite":"待複查（NG free TRAM vs DIEP 記憶佐證）","conflict":"⚠ 同題歷屆重出：free TRAM vs DIEP比較（複選）。2132（108年）答BDE、2175（110、115年）答BD——A–D選項相同，差異僅E選項：2132之E（free TRAM在肥胖病人更可預期，正確故入選）改為2175之E（severe abdominal fat適合SIEA，錯誤故不選）。核心考點（>800cc與無>1.5mm穿通枝時選free TRAM）不變，記概念不記字母。"},{"id":"2176","sub":"S09","src":"NG","years":[111,112,113,114],"stem":"Poland syndrome 會有何者臨床表徵？ (複選)","opts":{"A":"單側缺乏胸大肌胸骨頭 (unilateral absence of the sternal head of the pectoralis major muscle)","B":"乳房發育不良 (breast hypoplasia or aplasia)","C":"肋骨發育不良且變形 (absence or deformed ribs)","D":"無腋毛 (axillary alopecia)","E":"同側上肢短且併指 (ipsilateral upper extremity shortening and brachysyndactyly)"},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考 Poland syndrome 之臨床表徵（複選），答案為全部皆是。五大典型：單側缺乏胸大肌「胸骨頭（sternal head）」、乳房發育不良/缺失（hypoplasia/aplasia）、肋骨缺失或變形、腋毛缺失（axillary alopecia）、同側上肢短小併指（brachysyndactyly）。⚠ 關鍵記憶：缺的是胸大肌「胸骨頭」而非「鎖骨頭」；此題五選項皆為正確表徵，與 NG110-B09-Q03（問「非表徵」，答案為誤植 clavicular head 者）為極性相反的姊妹題，切勿混記。","peropt":{"A":"✓ 單側缺乏胸大肌胸骨頭（sternal head）為 Poland 核心特徵。","B":"✓ 乳房發育不良/缺失為典型表現。","C":"✓ 肋骨缺失或變形常見。","D":"✓ 腋毛缺失（axillary alopecia）為特徵之一。","E":"✓ 同側上肢短小併指（brachysyndactyly）為典型。"},"cite":"待複查（NG Poland syndrome 記憶佐證）","conflict":"⚠ 同題歷屆重出：Poland syndrome臨床表徵（複選），2176（111、112、114年）與2186（113年）皆答ABCDE；僅選項順序不同。記概念不記字母。"},{"id":"2178","sub":"S16","src":"NG","years":[110,111,112,113,114,115],"stem":"What is the specific indication in autologous fat grafting in breast reconstruction?","opts":{"A":"Sharp implant border","B":"Radiation deformity in flap reconstruction","C":"Implant rippling","D":"Depression from fat necrosis","E":"All of above."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題考自體脂肪移植於乳房重建的特定適應症，答案為以上皆是。四大用途：遮蓋 sharp implant border、改善放療畸形、改善 implant rippling、修飾 fat necrosis 凹陷。⚠ 選項重排家族：與 NG110-B13-Q06（2173）選項集合相同、僅字母排列不同，兩題答案皆為「以上皆是」；務必記概念、勿背字母位置。","peropt":{"A":"✓ 遮蓋植入物銳利邊緣（sharp border）。","B":"✓ 改善皮瓣重建後之放療畸形。","C":"✓ 改善植入物波紋（rippling）。","D":"✓ 修飾 fat necrosis 造成的凹陷。","E":"✓（正解）以上皆為特定適應症。"},"cite":"待複查（NG autologous fat grafting 記憶佐證）","conflict":"選項重排家族：與 NG110-B13-Q06 選項集合相同、字母對應不同 → 各自在其選項下正確，記概念勿背字母 ⚠ 同題歷屆重出：autologous fat grafting之specific indication，2173（110、111年）與2178（112–115年）皆答E（以上皆是）；僅選項順序不同（sharp implant border、rippling、fat necrosis depression、radiation deformity互換位置）。記概念不記字母。"},{"id":"2179","sub":"S13","src":"NG","years":[110,112,113,114],"stem":"Which of the following statements about free TRAM flap is incorrect?","opts":{"A":"The rectus abdominis muscle is a Mathes and Nahai type III muscle","B":"An abdominal bulge is most often due to attenuation of the anterior rectus sheath","C":"Recipient vessels for the free TRAM flap include the internal mammary and the thoracodorsal artery and vein","D":"Preservation of the entire rectus abdominis muscle is classified as an MS-0(DIEP) flap","E":"None of above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題為反向作答（挑『錯誤』者）。Rectus abdominis屬Mathes-Nahai Type III肌（雙主要蒂：superior/deep inferior epigastric）；腹部膨出（bulge）多因anterior rectus sheath鬆弛/減弱所致；free TRAM受區血管含internal mammary與thoracodorsal系統。⚠ 關鍵錯誤在D：肌肉節省分類中，保留『整條』rectus肌者為MS-3（即DIEP），而非MS-0（MS-0代表不保留肌肉、取全寬），故D敘述錯誤。（跨年4e/5e僅措辭不同，概念一致。）","peropt":{"A":"✗ 正確敘述——rectus abdominis為Mathes-Nahai Type III肌。","B":"✗ 正確敘述——腹部膨出多因anterior rectus sheath鬆弛。","C":"✗ 正確敘述——受區血管含internal mammary與thoracodorsal。","D":"✓（為答案／錯誤敘述）保留整條rectus肌應分類為MS-3（DIEP），非MS-0，故錯誤。","E":"✗ 『None of above』不成立，因D為錯誤敘述。"},"cite":"待複查（NG free TRAM / muscle-sparing 分類 記憶佐證；⚠4e vs 5e 措辭差異）","conflict":"跨年數值差異（Neligan 4e vs Neligan 5e）：A: 112「The rectus abdominis muscle is a Mathes 」 vs 115「The rectus abdominis muscle is categoriz」；B: 112「An abdominal bulge is most often due to 」 vs 115「Postoperative abdominal bulging is most 」；C: 112「Recipient vessels for the free TRAM flap」 vs 115「Standard recipient vessels for a free TR」；D: 112「Preservation of the entire rectus abdomi」 vs 115「A flap that results in the preservation 」；E: 112「None of above」 vs 115「None of the above」 ⚠ 同題歷屆重出：free TRAM何者錯誤。2179（112–114年）答D（MS-0=DIEP保留全肌之敘述為錯）；2171（110年）選項相同僅順序不同，但官方答案標為A（type III）——屬答案key歧異/選項移位。記概念不記字母。"},{"id":"2181","sub":"S14","src":"NG","years":[112,113],"stem":"關於profunda artery perforator flap (PAP flap), 以下何者錯誤?","opts":{"A":"The dissection of the PAP flap is straightforward through the adductor magnus muscle","B":"The profunda artery arises from the common femoral artery traveling into the posterior compartment of the thigh","C":"The flap donor site well hidden within the upper thigh and buttock crease","D":"Complications include fat necrosis, donor site seroma and infection","E":"The PAP flap had a short pedicle, around 5cm."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題為反向作答（挑『錯誤』者）。PAP flap之profunda（deep femoral）動脈自股動脈分出走入大腿後間室；主要穿支多於gracilis與adductor magnus之間以septocutaneous走行；供區疤痕可藏於大腿上方/臀下皺褶；併發症含fat necrosis、供區seroma、感染。⚠ 關鍵錯誤在E：PAP蒂『長』（約7–13cm），並非短蒂約5cm，故E敘述錯誤。（對照2224版本，錯誤敘述亦圍繞『蒂短需血管移植』的誤述。）","peropt":{"A":"✗ 正確敘述——PAP剝離經adductor magnus層次相對直接。","B":"✗ 正確敘述——profunda（deep femoral）自股動脈分出走入後間室。","C":"✗ 正確敘述——供區疤痕可藏於大腿上方/臀下皺褶。","D":"✗ 正確敘述——併發症含fat necrosis、供區seroma與感染。","E":"✓（為答案／錯誤敘述）PAP為長蒂（約7–13cm），非短蒂5cm，故錯誤。"},"cite":"待複查（NG PAP flap 蒂長度/解剖 記憶佐證）","conflict":""},{"id":"2182","sub":"S15","src":"NG","years":[108,111,112,113,114,115],"stem":"Delayed autologous reconstruction is the gold standard for breast reconstruction in patients needing adjuvant radiation. What is the proper time for free tissue transfer after completion of radiation therapy?","opts":{"A":"1-2 months","B":"3-5 months","C":"6-9 months","D":"More than one year","E":"More than 2 years."},"ans":"C","multi":false,"etype":"ai","expl":"","key":"**需輔助放療者，游離皮瓣重建應於放療結束後 6–9 個月施行**——太早（<6 個月）組織仍在急性放射性發炎期，太晚則纖維化已定型。此題橫跨 **108、111、112、113、114、115 六個年份**，是本領域出現頻率最高的單一數字，務必零失誤。","peropt":{"A":"太早。1–3 個月仍處放射性急性發炎期，併發症率高。","B":"太早。4–5 個月組織尚未恢復。","C":"正解。放療結束後 **6–9 個月**是游離組織轉移的最佳時機。","D":"過晚。超過一年組織纖維化已定型，剝離困難且對稱難達成。","E":"有正確答案，不選以上皆非。"},"cite":"Neligan, Volume 5 Chapter 25 Page 487","conflict":"跨年數值差異（Neligan 4e vs Neligan 5e）：C: 112「6-9 months」 vs 115「6-12 months」 ‖ 跨年數值差異（Neligan 4e vs Neligan 4e）：A: 108「1-3 months」 vs 112「1-2 months」；B: 108「4-5 months」 vs 112「3-5 months」；E: 108「以上皆非」 vs 112「More than 2 years.」 ‖ 跨年數值差異（Neligan 4e vs Neligan 4e）：A: 111「1-3 months」 vs 112「1-2 months」；B: 111「4-5 months」 vs 112「3-5 months」；E: 111「None of above」 vs 112「More than 2 years.」 ⚠ 同題歷屆重出：放療後free tissue transfer時機。2131（108、111年）答C（6–9月，選項A/B為1–3、4–5月）；2182（112–114年）答C（6–9月）；2228（115年）答C，但正解選項C由「6–9 months」改為「6–12 months」。核心考點相同，記概念不記字母。"},{"id":"2183","sub":"S13","src":"NG","years":[112,113,114,115],"stem":"Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)","opts":{"A":"The dissection of a DIEAP flap has a steep learning curve","B":"The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap","C":"The deep inferior epigastric artery arises from the common iliac artery","D":"Abdominal scarring is probably the most important risk factor for raising a DIEAP flap","E":"Smoking is considered a relative contraindication to raising a DIEAP flap"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考 DIEAP flap 正確敘述（複選）。核心：剝離學習曲線陡（steep learning curve）；SIEV（superficial inferior epigastric vein）為引流皮島最大的靜脈（故靜脈鬱血時常作為 supercharging 來源）；腹部疤痕（abdominal scarring）是取瓣最重要危險因子；抽菸為相對禁忌。⚠ 解剖陷阱：DIEA 起自 external iliac artery，而非 common iliac artery，故 C 錯。","peropt":{"A":"✓ DIEAP flap 剝離學習曲線陡峭。","B":"✓ SIEV 為引流皮島最大的靜脈。","C":"✗ DIEA 起自 external iliac artery，非 common iliac artery。","D":"✓ 腹部疤痕為取瓣最重要之危險因子。","E":"✓ 抽菸為取瓣之相對禁忌。"},"cite":"待複查（NG DIEAP flap 記憶佐證）","conflict":""},{"id":"2184","sub":"S14","src":"NG","years":[112,113,115],"stem":"Which pedicled perforator flaps are suitable for reconstruction of medial quadrant defect after partial mastectomy? (複選)","opts":{"A":"Latissimus dorsi (LD) flap","B":"Anterior intercostal artery perforator (AICAP) flap","C":"Thoracodorsal artery perforator (TDAP) flap","D":"Superior epigastric artery perforator (SEAP) flap","E":"Serratus anterior artery perforator (SAAP) flap"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯 部分乳房切除（partial mastectomy）後之內側象限（medial quadrant）缺損，須選擇蒂部位於內側/上方、能到達內側的perforator flap。AICAP（anterior intercostal artery perforator）源自內乳系統的前肋間穿支，可覆蓋內下象限；SEAP（superior epigastric artery perforator）源自上腹壁動脈，蒂位內下亦可到達內側。⚠ 相對地LD、TDAP、SAAP皆為外側/後方來源，適合外側象限，無法可靠達內側，故排除。","peropt":{"A":"✗ LD flap來源於後外側，適合外側缺損，非內側象限首選。","B":"✓ AICAP（前肋間穿支，源自內乳系統）可覆蓋內側象限缺損。","C":"✗ TDAP為外側（thoracodorsal）來源，適合外側象限。","D":"✓ SEAP（上腹壁動脈穿支）蒂位內下，可到達內側象限。","E":"✗ SAAP（serratus anterior穿支）為外側來源，非內側象限適用。"},"cite":"待複查（NG oncoplastic 部分乳房重建 perforator flap 記憶佐證）","conflict":""},{"id":"2185","sub":"S14","src":"NG","years":[109,111,112,113,114,115],"stem":"下列關於Latissimus dorsi flap 的敘述何者為是？","opts":{"A":"屬於Mathes and Nahai Type V muscle flap","B":"The latissimus originate from upper thoracic spine","C":"Previous posterolateral thoracotomy, in which the latissimus muscle had been divided is contraindication","D":"Donor site seroma is most common complication","E":"The blood supply of this flap comes from dorsal scapular artery, posterior intercostal arteries"},"ans":"ACD","multi":true,"etype":"ai","expl":"","key":"🎯 本題問 Latissimus dorsi flap「何者為是」（複選）。正確：屬 Mathes-Nahai Type V；曾行 posterolateral thoracotomy 使 LD 已被切斷者為禁忌；供區 seroma 為最常見併發症。⚠ 兩大陷阱：(1) LD 起自「下段」胸椎（T7–12 棘突）、腰椎、薦椎與髂嵴，非「upper thoracic spine」，故 B 錯；(2) 主要血供為 thoracodorsal artery（次要 segmental posterior intercostal/lumbar），並非「dorsal scapular artery」，故 E 錯。","peropt":{"A":"✓ LD 屬 Mathes-Nahai Type V 肌瓣。","B":"✗ LD 起自下段胸椎/腰椎/薦椎/髂嵴，非 upper thoracic spine。","C":"✓ 曾行 posterolateral thoracotomy 切斷 LD 者為禁忌。","D":"✓ 供區 seroma 為最常見併發症。","E":"✗ 主要血供為 thoracodorsal artery，非 dorsal scapular artery。"},"cite":"待複查（NG Latissimus dorsi flap 記憶佐證）","conflict":"⚠ 同題歷屆重出：2151（109、111年）問「何者為非」答B（血供誤植為dorsal scapular artery）；2185（112–115年）改為複選「何者為是」答ACD，選項A/C/D文字相同，另將「none of above」改為「起源於upper thoracic spine」之distractor。核心考點同為LD flap屬Mathes-Nahai Type V、血供為thoracodorsal artery（非dorsal scapular）、曾行thoracotomy為禁忌、donor seroma最常見；記概念不記字母。"},{"id":"2187","sub":"S17","src":"NG","years":[114],"stem":"In the context of posterior trunk wound reconstruction, which of the following statements about the omental flap is TRUE?","opts":{"A":"Its vascular pedicle is too short for use in reaching the lumbar region.","B":"It is contraindicated in spinal instrumentation due to risk of infection.","C":"It is best suited for patients with prior intra-abdominal malignancy due to immunologic benefit.","D":"It can be transposed through the retroperitoneum and delivered to the posterior trunk via the 12th rib approach.","E":"Its harvest typically requires sharp dissection of all peritoneal attachments and ligation of the middle colic vessels."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"大網膜皮瓣用於**後軀幹（背部）重建**時，可經**腹膜後（retroperitoneum）轉位，並由第 12 肋入路送達後軀幹**。其血管蒂（胃網膜動脈）長度足以到達腰部；它反而是脊椎內固定感染時的救援選項（富含淋巴組織與抗感染能力）。","peropt":{"A":"錯。以胃網膜血管為蒂的大網膜蒂長充足，可到達腰部。","B":"錯。大網膜富含淋巴組織與免疫細胞，正是脊椎內固定感染時的**救援**選項，非禁忌。","C":"錯。既往腹腔內惡性腫瘤反而是相對禁忌（腹腔沾黏、腫瘤播散疑慮），不存在「免疫學好處」。","D":"正解。可經腹膜後轉位，由第 12 肋入路送達後軀幹。","E":"錯。取瓣時保留一側胃網膜血管作為蒂，並非結紮中結腸血管（那是結腸的血供）。"},"cite":"Plastic Surgery, 4th Edition, Neligan, Peter C. Vol 5. Chap 12. P 378.","conflict":""},{"id":"2188","sub":"S07","src":"NG","years":[114,115],"stem":"在乳房縮小手術中，最常見且關鍵的乳頭乳暈複合體（NAC）血供來源為哪一條動脈？","opts":{"A":"外側胸動脈（Lateral thoracic artery）","B":"內乳動脈（Internal mammary artery）","C":"胸肩峰動脈（Thoracoacromial artery）","D":"第四肋間動脈穿支（4th intercostal perforator）","E":"胸背動脈（Thoracodorsal artery）"},"ans":"B","multi":false,"etype":"ai","expl":"(請註明資料書名及頁次) Neligan, Chapter 5, p69","key":"🎯 本題考乳房縮小手術中乳頭乳暈複合體（NAC）最關鍵且最常見的血供來源，答案為內乳動脈（internal mammary/internal thoracic artery）。其穿支（尤其第 2 肋間）供應乳房內上部與 NAC，故 superomedial pedicle 廣受採用。⚠ 易混淆：外側胸動脈（lateral thoracic）與第 4 肋間外側穿支雖有貢獻（第 4 肋間外側支尤與 NAC「感覺」相關），但血供主軸為 internal mammary。切勿把「感覺神經來源」與「主要血供」混為一談。","peropt":{"A":"✗ 外側胸動脈為外側輔助血供，非最主要 NAC 來源。","B":"✓（正解）內乳動脈（含其穿支）為 NAC 最主要且最常見之血供。","C":"✗ 胸肩峰動脈主供胸大肌，非 NAC 主源。","D":"✗ 第 4 肋間穿支較與 NAC 感覺相關，非主要血供來源。","E":"✗ 胸背動脈供 latissimus dorsi，非 NAC 主源。"},"cite":"原檔詳解","conflict":""},{"id":"2189","sub":"S04","src":"NG","years":[114,115],"stem":"一位接受矽膠植入物乳房重建的女性，MRI 顯示植入物內部出現多條低訊號曲線於高訊號的矽膠中(Linguine sign)。下列哪一個診斷最符合此影像特徵？","opts":{"A":"莢膜攣縮（Capsular contracture）","B":"植入物破裂（Implant rupture）","C":"自體脂肪壞死（Fat necrosis）","D":"乳癌局部復發（Local recurrence）","E":"囊袋內積液（Periprosthetic fluid）"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 Linguine sign（麵條徵）為矽膠植入物『囊內破裂（intracapsular rupture）』於MRI的特徵性表現：塌陷的植入物外殼漂浮於外滲矽膠中，形成高訊號矽膠背景中的多條低訊號曲線。故此影像最符合植入物破裂之診斷。⚠ 易混：capsular contracture以臨床硬度/變形為主、periprosthetic fluid為囊袋周圍積液（另有snowstorm/stepladder等徵象），皆非linguine sign所指。","peropt":{"A":"✗ 莢膜攣縮以臨床硬度變形為主，無linguine sign影像。","B":"✓（正解）Linguine sign為矽膠植入物（囊內）破裂之MRI特徵。","C":"✗ 脂肪壞死非此影像特徵。","D":"✗ 乳癌局部復發非linguine sign表現。","E":"✗ 囊袋內積液為植入物周圍liquid，非塌陷外殼所致的麵條徵。"},"cite":"待複查（NG 矽膠植入物破裂 linguine sign 記憶佐證）","conflict":""},{"id":"2190","sub":"S05","src":"NG","years":[114,115],"stem":"一位病人植入義乳已五年，近期出現單側乳房腫脹，超音波顯示囊袋周圍積液 >50mL。依據 BIA-ALCL 診斷流程，下一步最合適的處置為何？","opts":{"A":"立即進行乳房植入物與莢膜移除手術","B":"行細針抽吸術（FNA）並進行細胞學檢查與免疫染色","C":"先給予抗生素並觀察","D":"核磁共振檢查以確認莢膜厚度","E":"更換植入物並追蹤復原狀況"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"🎯 本題考植入物旁晚發積液（late periprosthetic seroma）的標準診斷流程。植入 >1 年出現單側腫脹、超音波示積液 >50 mL，下一步應行超音波導引細針抽吸（FNA），送 cytology 並做免疫染色（CD30）與 flow cytometry 排除 BIA-ALCL。⚠ 陷阱：切勿未確診即直接手術切除或更換植入物，也勿僅給抗生素觀察而延誤診斷；MRI 對莢膜厚度非此流程首選。","peropt":{"A":"✗ 未確診前不宜立即行植入物與莢膜移除手術。","B":"✓（正解）FNA 抽液送 cytology＋免疫染色（CD30）為標準下一步。","C":"✗ 僅抗生素觀察會延誤 BIA-ALCL 診斷。","D":"✗ MRI 評估莢膜厚度非此積液診斷流程首選。","E":"✗ 未診斷即更換植入物並不恰當。"},"cite":"待複查（NG BIA-ALCL workup 記憶佐證）","conflict":""},{"id":"2191","sub":"S03","src":"NG","years":[114,115],"stem":"一位接受乳房植入手術的病患表示乳房變硬，外觀變形且出現疼痛，檢查時可見植入物輪廓並可觸摸。依據 Baker 分級，此屬於哪一級莢膜攣縮？","opts":{"A":"Baker Grade I","B":"Baker Grade II","C":"Baker Grade III","D":"Baker Grade IV","E":"Baker Grade V"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 Baker分級用於評估莢膜攣縮：Grade I 乳房柔軟、外觀正常；Grade II 稍硬但外觀正常；Grade III 較硬、變形且可見植入物輪廓；Grade IV 硬、變形、可觸摸植入物『且伴疼痛』。本題描述『變硬、外觀變形、可見輪廓且伴疼痛』符合Grade IV。⚠ 疼痛（painful）為區分III與IV的關鍵；Baker分級標準為I–IV，並無Grade V。","peropt":{"A":"✗ Grade I 為柔軟、外觀正常，不符。","B":"✗ Grade II 稍硬但外觀正常，不符。","C":"✗ Grade III 硬且變形/可見輪廓，但『無疼痛』，不符本題。","D":"✓（正解）Grade IV 硬、變形、可觸摸植入物並伴疼痛，符合描述。","E":"✗ Baker分級無Grade V，屬干擾選項。"},"cite":"待複查（NG Baker classification 莢膜攣縮 記憶佐證）","conflict":""},{"id":"2192","sub":"S06","src":"NG","years":[114,115],"stem":"下列哪一位患者最適合接受 augmentation mastopexy？","opts":{"A":"42歲女性，拒絕乳房上有任何明顯疤痕","B":"36歲女性，有全乳放射線治療病史，並有慢性皮膚纖維化","C":"29歲女性，因哺乳後乳腺組織萎縮並有輕度下垂，想改善上胸飽滿度","D":"35歲女性，仍在每日使用電子煙並拒絕戒菸","E":"40歲女性，單純訴求乳頭下移但不希望增加體積"},"ans":"C","multi":false,"etype":"ai","expl":"(請註明資料書名及頁次) Neligan, Chapter 5, p. 71, Box 5.1","key":"🎯 本題考 augmentation mastopexy（隆乳併乳房固定）之理想適應對象。最適合者為需同時「增加上極飽滿度」＋「矯正輕度下垂」且無禁忌之病人：29 歲、哺乳後腺體萎縮、輕度下垂、想改善上胸飽滿。⚠ 排除要點：拒絕任何可見疤痕者不適合（術式必留疤）；全乳放療＋慢性皮膚纖維化為傷口/血運高風險；持續吸菸/電子煙且拒戒者為相對禁忌；僅要求乳頭上移而不加體積者應行單純 mastopexy 而非 augmentation mastopexy。","peropt":{"A":"✗ 拒絕乳房任何明顯疤痕者不適合，mastopexy 必留疤。","B":"✗ 全乳放療＋慢性皮膚纖維化，傷口癒合與血運風險高，屬禁忌。","C":"✓（正解）哺乳後腺體萎縮、輕度下垂、想改善上極飽滿，為理想適應對象。","D":"✗ 每日使用電子煙且拒絕戒菸，為相對禁忌（傷口/NAC 缺血風險）。","E":"✗ 僅要求乳頭下移矯正、不加體積者，應行單純 mastopexy 非 augmentation mastopexy。"},"cite":"原檔詳解","conflict":""},{"id":"2193","sub":"S03","src":"NG","years":[114,115],"stem":"關於乳房植入物摘除手術中囊袋處理（capsule management）的各項術式，下列敘述何者正確？(複選)","opts":{"A":"Capsulotomy 可應用於BIA-ALCL（Breast implant-associated anaplastic large cell lymphoma）或囊袋內含矽膠(silicone embedded in the capsule)的情況","B":"Partial capsulectomy 是目前臨床上最常見的莢膜攣縮處理方式之一","C":"Total capsulectomy 為所有患者的首選術式，併發症發生率最低","D":"En bloc capsulectomy 適用於診斷明確的 BIA-ALCL患者","E":"Neosubpectoral pocket 建立適用於所有囊袋感染或破裂病患"},"ans":"BD","multi":true,"etype":"ai","expl":"","key":"🎯 植入物摘除時之囊袋處理術式各有適應症。Partial capsulectomy為臨床上處理莢膜攣縮最常見術式之一；En bloc capsulectomy（整塊完整切除）適用於『診斷明確』的BIA-ALCL以確保腫瘤學邊界。⚠ 陷阱：Capsulotomy（切開）不足以處理BIA-ALCL（需切除）；Total capsulectomy並非所有病人首選、也非併發症最低；Neosubpectoral pocket並非所有感染/破裂病患皆適用，故A、C、E錯誤。","peropt":{"A":"✗ 錯誤——BIA-ALCL或矽膠殘留於囊袋者需capsulectomy/en bloc切除，capsulotomy（切開）不足。","B":"✓ 正確——partial capsulectomy為臨床最常見的莢膜攣縮處理方式之一。","C":"✗ 錯誤——total capsulectomy並非所有病人首選，且併發症未必最低。","D":"✓ 正確——en bloc capsulectomy適用於診斷明確的BIA-ALCL。","E":"✗ 錯誤——neosubpectoral pocket並非所有囊袋感染/破裂病患皆適用。"},"cite":"待複查（NG capsule management / BIA-ALCL 手術 記憶佐證）","conflict":""},{"id":"2194","sub":"S03","src":"NG","years":[114,115],"stem":"下列哪些策略與降低乳房植入物手術後莢膜攣縮（capsular contracture）發生率有關？(複選)","opts":{"A":"無接觸植入技術（No-touch technique）","B":"使用抗生素沖洗手術腔隙（Pocket irrigation with antibiotics）","C":"使用乳暈下切口（Periareolar incision）","D":"將植入物放置於胸大肌下層（Submuscular implant pocket）","E":"使用插入導套（Insertion sleeve）"},"ans":"ABDE","multi":true,"etype":"ai","expl":"","key":"🎯 本題考降低莢膜攣縮（capsular contracture）發生率的策略（複選）。實證有效者：無接觸植入技術（no-touch）、抗生素沖洗囊袋（pocket irrigation）、胸大肌下（submuscular）放置、使用插入導套（insertion sleeve），皆藉「降低細菌污染/biofilm」降低攣縮。⚠ 陷阱：periareolar 切口因穿越乳腺導管、細菌負荷較高，反而與較高攣縮/感染風險相關，並非降低攣縮之策略，故 C 不選；一般偏好 IMF 切口。","peropt":{"A":"✓ No-touch technique 減少植入物污染，降低攣縮。","B":"✓ 抗生素沖洗囊袋降低細菌/biofilm 負荷。","C":"✗ Periareolar 切口穿越乳腺導管、細菌負荷高，反與較高攣縮相關。","D":"✓ 胸大肌下放置與較低攣縮率相關。","E":"✓ 使用插入導套減少植入物與皮膚接觸污染。"},"cite":"待複查（NG capsular contracture prevention 記憶佐證）","conflict":""},{"id":"2195","sub":"S13","src":"NG","years":[114,115],"stem":"What is the proper time for delayed TRAM flap reconstruction after patient completion of radiation therapy?","opts":{"A":"1-2 months","B":"3-5 months","C":"6-9 months","D":"More than one year","E":"More than 2 years."},"ans":"C","multi":false,"etype":"ai","expl":"Radiation is unpredictable and is recommended to be performed prior to the final TRAM flap reconstruction as it has been shown to be detrimental to not only the aesthetic outcome and shape of the flap but also cause contracture and pigmentation changes if performed after the flap reconstruction. Therefore, the authors approach is to perform flap reconstruction 6–9 months after the completion of radiation therapy with preoperative evaluation and assessment performed in clinic around 6 months after completion of radiation.\n\n4.以下哪個屬於男性女乳症(gynecomastia)的治療？\n\nA. Pull-through technique\n\nB. Open excision via an inferior periareolar approach\n\nC. Skin reduction and tissue resection with LeJour vertical mammoplasty skin pattern\n\nD. Suction-assisted lipectomy\n\nE. 以上皆是","key":"🎯 放射治療對皮瓣外觀、形狀有害，且延遲重建常導致攣縮與色素改變，故建議放療應在最終TRAM重建『前』完成。作者建議於放療完成後6–9個月施行皮瓣重建（約放療後6個月門診評估），讓組織自急性放射炎恢復。故正確時機為6–9個月。","peropt":{"A":"✗ 1–2個月過早，組織仍處急性放射反應期。","B":"✗ 3–5個月仍偏早。","C":"✓（正解）放療完成後6–9個月為延遲TRAM重建之適當時機。","D":"✗ 超過一年並非必要，會不必要延誤重建。","E":"✗ 超過兩年過度延遲，無此建議。"},"cite":"原檔詳解","conflict":""},{"id":"2196","sub":"S02","src":"NG","years":[114,115],"stem":"關於乳房切除術後重建的incision selection以下何者錯誤？","opts":{"A":"側側切口（Lateral）可保留最多乳頭血流，最安全","B":"經乳暈旁(periareolar incision)隆乳有較低的感染率及莢膜攣縮率","C":"垂直切口（Vertical）可最佳化乳頭位置並使乳頭更加集中和上提","D":"乳下外側切口（Inferolateral IMF）外觀美觀；有經驗後併發症少","E":"以上皆是"},"ans":"B","multi":false,"etype":"ai","expl":"6.Which of the following grouping contains a medication or drugs NOT associated with gynecomastia?\n\nA. Amphetamines, Heroin, marijuana\n\nB. Digoxin, ACE inhibitors, spironolactone\n\nC. Benzodiazepines, risperidone, haloperidol\n\nD. Anabolic steroids, Estrogen, Food contaminants\n\nE. Cephalosporins, Penicillins, Carbapenems","key":"**Periareolar 切口的感染率與莢膜攣縮率較高，不是較低**（穿越含菌的乳管系統）。這與 NG-215／NG-216 是同一句話。其餘關於乳房切除後重建切口的敘述（側方切口保留最多乳頭血流、垂直切口最佳化乳頭位置、乳下外側切口美觀且熟練後併發症少）皆正確。","peropt":{"A":"正確。側方（lateral）切口保留最多乳頭血流，對 NAC 最安全。","B":"正解（錯述）。乳暈旁切口的感染率與莢膜攣縮率**較高**。","C":"正確。垂直切口可最佳化乳頭位置，使乳頭更集中並上提。","D":"正確。乳下外側（inferolateral IMF）切口外觀美觀，術者熟練後併發症少。","E":"B 為錯述，不選以上皆是。"},"cite":"Neligan, 5th Edition, vol.5, Ch21 p269","conflict":""},{"id":"2198","sub":"S13","src":"NG","years":[114,115],"stem":"In preparation for microvascular reconstruction of the left breast with a DIEP flap exposure of the IMA/IMV is planned. Which level is the most appropriate to performed?","opts":{"A":"Rib1-2","B":"Rib3-4","C":"Rib5-6","D":"Rib7-8","E":"Rib9-10"},"ans":"B","multi":false,"etype":"ai","expl":"The mean distances of the artery from the costochondral junction is approximately 1 cm, 2 cm and 3 cm at the costal levels 2, 3 and 4, respectively. The internal mammary venous anatomy demonstrates variation, with veins typically being larger on the right side (up to 3 mm) than the left (<2 mm). The level of bifurcation of the veins also differs, bifurcating most frequently in the third intercostal space on the left, compared to the fourth intercostal space on the right. For these reasons, dissection of the vessels is commonly performed at the level of the left third or fourth rib, and the fourth rib on the right side.","key":"🎯 本題考游離 DIEP 皮瓣以 IMA/IMV 為受區血管時的暴露肋骨高度，答案為第 3–4 肋（Rib 3-4）。原因：IMV 口徑左側常 <2 mm、右側可達 3 mm；靜脈分叉在左側最常見於第 3 肋間、右側第 4 肋間，故臨床常在左側第 3/4 肋、右側第 4 肋暴露血管以取得足夠口徑。⚠ 過高（1-2 肋）血管深且口徑不利，過低（5 肋以下）動脈變細。","peropt":{"A":"✗ 第 1–2 肋位置過高、血管口徑與暴露不利。","B":"✓（正解）第 3–4 肋為 IMA/IMV 暴露最合適高度（口徑與分叉最利）。","C":"✗ 第 5–6 肋處動脈已較細，非首選。","D":"✗ 第 7–8 肋過低，不適合。","E":"✗ 第 9–10 肋遠離適當受區範圍。"},"cite":"原檔詳解","conflict":""},{"id":"2199","sub":"S16","src":"NG","years":[114,115],"stem":"Which of the following statements about Nipple–Areola Complex (NAC) repositioning is incorrect?","opts":{"A":"Previous radiation therapy and vertical mastectomy incisions are independently predictive of NAC mal- position.","B":"Moderate malposition between 2 and 3 cm","C":"True type of NAC malposition is a real malposition of the nipple on the breast and chest wall.","D":"False type of NAC malposition related to incorrect pocket dissection and wrong implant placement.","E":"Free nipple-grafting has a high risk of depigmentation and loss of NAC projection, which may jeopardize patient satisfaction"},"ans":"B","multi":false,"etype":"ai","expl":"Mild: malposition less than 1 cm.\n\nModerate: malposition between 1 and 2 cm.\n\nSevere: malposition greater than 2 cm.","key":"🎯 本題為反向作答（挑『錯誤』者）。NAC malposition分級：mild <1cm、moderate 1–2cm、severe >2cm。既往放療與vertical mastectomy切口為NAC移位的獨立預測因子；『真性（true）』移位為乳頭在乳房/胸壁上真正錯位，『假性（false）』移位則因囊袋剝離不當/植入物位置錯誤所致；free nipple graft有高度去色素與投影喪失風險。⚠ 錯誤在B：中度應為1–2cm，而非2–3cm。","peropt":{"A":"✗ 正確敘述——既往放療與vertical切口為NAC移位的獨立預測因子。","B":"✓（為答案／錯誤敘述）中度移位應為1–2cm，非2–3cm，故錯誤。","C":"✗ 正確敘述——true type為乳頭於乳房/胸壁的真正錯位。","D":"✗ 正確敘述——false type與囊袋剝離不當/植入物位置錯誤有關。","E":"✗ 正確敘述——free nipple graft有高度去色素與投影喪失風險。"},"cite":"原檔詳解","conflict":""},{"id":"2200","sub":"S15","src":"NG","years":[114,115],"stem":"Which is not comorbidities that increase risk of complications in breast reconstruction ?","opts":{"A":"Diabetes","B":"Smoking","C":"Alcohol","D":"Obesity","E":"Coronary Artery Disease"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"增加乳房重建併發症風險的共病：**糖尿病、抽菸、肥胖、冠狀動脈疾病**（灌流與癒合相關）。**酒精**在本題答案鍵中不列為增加風險的共病——雖然 ERAS 建議術前戒酒（見 NG-079），但它不屬傳統列舉的共病危險因子。","peropt":{"A":"是。糖尿病造成微血管病變與感染率上升。","B":"是。抽菸是最強的可改變危險因子。","C":"正解（非共病危險因子）。酒精在本題不列為增加重建併發症的共病；惟 ERAS 仍建議術前戒酒。","D":"是。肥胖增加感染、傷口裂開與皮瓣壞死。","E":"是。冠狀動脈疾病增加麻醉與長時間手術的風險。"},"cite":"Neligan, 5th Edition, vol.5, Ch17 p230","conflict":""},{"id":"2201","sub":"S17","src":"NG","years":[114,115],"stem":"Breast reconstruction with abdominal tissues remains the gold standard when autologous options are desired, which of the following statements is incorrect?","opts":{"A":"The pedicled TRAM flap was introduced by Dr. Carl Hartrampf in the 1980s and remains one of the commonly used autologous methods of breast reconstruction todays","B":"Superficial Inferior Epigastric Artery flap preserve entire rectus muscle and anterior rectus sheath","C":"The rectus abdominis is a type III muscle according to the Mathes and Nahai classification.","D":"Venous congestion is the primary factor associated with DIEP flap failure","E":"The sensory reinnervation recipient nerve is the anterior cutaneous branch of the 2nd intercostal nerve"},"ans":"E","multi":false,"etype":"ai","expl":"The recipient nerve is dissected with the recipient internal mammary artery and vein and is the anterior cutaneous branch of the 3rd intercostal nerve typically identified at the inferior sternochondral junction.","key":"🎯 本題問腹部組織乳房重建之「何者錯誤」。正確敘述：pedicled TRAM 由 Hartrampf 於 1980 年代提出、迄今常用；SIEA flap 完整保留腹直肌與前鞘；rectus abdominis 屬 Mathes-Nahai Type III；venous congestion 為 DIEP 皮瓣失敗主因。⚠ 錯誤在 E：感覺重建之受區神經為第 3 肋間神經之 anterior cutaneous branch（於 inferior sternochondral junction 附近辨識），並非第 2 肋間，故 E＝答案。","peropt":{"A":"✗（非錯誤）pedicled TRAM 由 Hartrampf 於 1980s 提出並沿用至今，正確。","B":"✗（非錯誤）SIEA flap 保留整條腹直肌與前鞘，正確。","C":"✗（非錯誤）rectus abdominis 屬 Mathes-Nahai Type III，正確。","D":"✗（非錯誤）venous congestion 為 DIEP 失敗主因，正確。","E":"✓（正解＝錯誤敘述）受區感覺神經為第 3 肋間神經前皮支，非第 2 肋間。"},"cite":"原檔詳解","conflict":""},{"id":"2202","sub":"S12","src":"NG","years":[114,115],"stem":"Direct-to-implant breast reconstruction中 胸大肌下（Subpectoral）相較胸大肌上（Prepectoral）的優點為何者? (複選)","opts":{"A":"Better uplift of breast","B":"Less pain in first postoperative week","C":"Better upper pole coverage, smoother contour","D":"Less or no animation","E":"All of above"},"ans":"AC","multi":true,"etype":"ai","expl":"","key":"Direct-to-implant 的平面選擇：**Subpectoral（胸大肌下）的優點是提托效果較好、上極覆蓋較佳、輪廓較平順**；代價是術後第一週疼痛較多、且有 animation deformity。**Less pain 與 less animation 都是 Prepectoral 的優點**，不是 subpectoral 的。","peropt":{"A":"是 subpectoral 優點。胸大肌提供上方支撐，提托效果較好。","B":"錯。胸大肌被剝離與撐開，術後第一週疼痛**較多**；疼痛少是 prepectoral 的優點。","C":"是 subpectoral 優點。肌肉覆蓋上極，輪廓較平順、義乳邊緣不明顯。","D":"錯。Animation deformity 正是 subpectoral 的缺點；無或少 animation 是 prepectoral 的優點。","E":"並非全部皆是，不選。"},"cite":"Neligan, 5th Edition, vol.5, Ch21 p271","conflict":""},{"id":"2203","sub":"S10","src":"NG","years":[114,115],"stem":"關於Contralateral prophylactic mastectomy (CPM)的敘述何者正確? (複選)","opts":{"A":"CPM rates are highest among Caucasians, patients with higher socioeconomic status","B":"Older patient age is considered one of the strongest factors associated with increasing CPM rates","C":"MRI and genetic test increase CPM amount","D":"largely physician-driven with evidence-based recommendation","E":"avoidance of future screening and decreasing related patient anxiety"},"ans":"ACE","multi":true,"etype":"ai","expl":"B: Younger patient age is considered one of the strongest factors associated with increasing CPM rates.  \nD: The decision to undergo CPM at the time of unilateral mastec- tomy is complex, but is largely patient-driven.  \nWith regards to oncologic benefit of CPM, to our knowl- edge, there are no prospective studies that demonstrate an advantage.\n\n13.Implant-based reconstruction (IBR) 比起 autologous based reconstruction(ABR)，有何益處? (複選)\n\nA. 恢復速度可能較快（Potential quicker recovery）\n\nB. 學習曲線較簡單（Easier learning curve）\n\nC. 外觀自然（Natural appearance）\n\nD. 減少住院費用（Shorter hospitalization）\n\nE. 恢復速度可能較快（Potential quicker recovery）","key":"🎯 對側預防性乳房切除（CPM）的流行病學：CPM率在白人、社經地位較高者最高；MRI與基因檢測會增加CPM量；病人常藉此避免未來篩檢並降低焦慮。⚠ 兩大陷阱：（1）『年輕』而非年長病人才是CPM上升的最強相關因子；（2）CPM決策主要為『病人主導（patient-driven）』而非醫師主導/實證建議（目前無前瞻研究證實其腫瘤學益處）。故B、D錯誤，答案為ACE。","peropt":{"A":"✓ 正確——CPM率在白人、社經地位較高者最高。","B":"✗ 錯誤——『年輕』而非年長病人才是CPM上升的最強相關因子。","C":"✓ 正確——MRI與基因檢測會增加CPM量。","D":"✗ 錯誤——CPM決策主要為病人主導，而非醫師主導/實證建議。","E":"✓ 正確——避免未來篩檢並降低相關病人焦慮為常見動機。"},"cite":"原檔詳解","conflict":""},{"id":"2204","sub":"S12","src":"NG","years":[114,115],"stem":"Implant-based reconstruction (IBR) 比起 autologous based reconstruction(ABR)，有何益處? (複選)","opts":{"A":"恢復速度可能較快（Potential quicker recovery）","B":"學習曲線較簡單（Easier learning curve）","C":"外觀自然（Natural appearance）","D":"減少住院費用（Shorter hospitalization）","E":"恢復速度可能較快（Potential quicker recovery）"},"ans":"ABDE","multi":true,"etype":"ai","expl":"14.Which of the following statements about deep inferior epigastric artery perforator (DIEAP) flap are correct? (複選)\n\nA. The dissection of a DIEAP flap has a steep learning curve\n\nB. The superficial inferior epigastric vein is the largest vein draining the skin paddle of the DIEAP flap\n\nC. The deep inferior epigastric artery arises from the common iliac artery\n\nD. Abdominal scarring is probably the most important risk factor for raising a DIEAP flap\n\nE. Smoking is considered a relative contraindication to raising a DIEAP flap","key":"🎯 本題比較 implant-based reconstruction（IBR）相較 autologous-based reconstruction（ABR）的益處（複選）。IBR 優勢：恢復可能較快（potential quicker recovery）、學習曲線較簡單、住院時間較短、避免供區併發症。⚠ 陷阱：外觀「自然（natural appearance）」與觸感較佳實為「自體重建（ABR）」的優勢，非 IBR，故 C 不選。另注意本題選項 A 與 E 文字重複（皆為 potential quicker recovery），兩者皆計入正確。","peropt":{"A":"✓ IBR 恢復速度可能較快。","B":"✓ 學習曲線較簡單。","C":"✗ 外觀自然為自體重建（ABR）之優勢，非 IBR。","D":"✓ 住院時間較短、費用較低。","E":"✓ 恢復速度可能較快（與 A 為重複選項，同屬正確）。"},"cite":"待複查（NG IBR vs ABR 記憶佐證）","conflict":""},{"id":"2205","sub":"S13","src":"NG","years":[114],"stem":"Which of the following statements is not the indications for SIEA flap for breast reconstruction?","opts":{"A":"The patient can safely tolerate 5–12 h of general anesthesia and does not have a known hypercoagulable state","B":"History of previous abdominoplasty or panniculectomy","C":"SIEA >1.5mm in external diameter","D":"SIEA flap perfused well after temporarily occluded DIEP perforators","E":"None of above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 NG-095 為同一題的前一版本（114 年）：SIEA 三項核心選用條件為耐受長時麻醉／無高凝狀態、SIEA 外徑 >1.5 mm、夾閉 DIEP 穿通枝後仍灌流良好。既往腹整形／脂膜切除是禁忌。","peropt":{"A":"是適應條件（可耐受 5–12 小時麻醉、無已知高凝狀態）。","B":"正解（非適應症）。既往 abdominoplasty 或 panniculectomy 已離斷 SIEA。","C":"是適應條件。SIEA 外徑須 >1.5 mm。","D":"是適應條件。暫時阻斷深層穿通枝後皮瓣仍灌流良好。","E":"存在非適應症選項，不選 None。"},"cite":"Neligan, 5th Edition, vol.5, Ch32, p415-416","conflict":""},{"id":"2206","sub":"S17","src":"NG","years":[114],"stem":"下列何者為 Alternative flaps for breast reconstruction ?","opts":{"A":"Transverse upper gracilis free flap (TUG)","B":"Superior gluteal artery free flap (SGAP)","C":"Inferior gluteal artery free flap (IGAP)","D":"Lumbar artery perforator flap (LAP)","E":"All of the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"腹部組織不可用時的替代游離皮瓣「以上皆是」：TUG、SGAP、IGAP、LAP。與批 2 的 NG-114（另加 DFAP／PAP）為同一份清單。核心記憶：**大腿（TUG／PAP）、臀部（SGAP／IGAP）、腰部（LAP）** 三大區域。","peropt":{"A":"是。TUG，橫向股薄肌上部皮瓣。","B":"是。SGAP，上臀動脈穿通枝皮瓣。","C":"是。IGAP，下臀動脈穿通枝皮瓣。","D":"是。LAP，腰動脈穿通枝皮瓣。","E":"正解。以上皆是。"},"cite":"Neligan, 5th Edition, vol.5, Ch33, p420-421","conflict":""},{"id":"2208","sub":"S14","src":"NG","years":[114],"stem":"Which is false about the lumbar artery perforator (LAP) flap?","opts":{"A":"Lumbar arteries are somatic segmental branches of the abdominal aorta and correspond to the posterior intercostal arteries of the thoracic aorta","B":"Only the upper two (L1 and L2) are of interest to the reconstructive surgeon","C":"The blood vessels pass behind the psoas major muscle, run past the transverse process of the vertebrae and cross the quadratus lumborum","D":"The pedicle pierces the thoracolumbar fascia or is sometimes encased by it then enters the subcutaneous fat of the “love handles” and branches out from medial to lateral to perfuse the skin surface overlying the iliac crest","E":"The skin island is innervated by the superior cluneal nerves, that also emerge from beneath the thoracolumbar fascia"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"與 NG-047 同一考點：腰動脈為腹主動脈的體節分支，**L1–L4 皆具重建價值**（臨床以較低位穿通枝為主），並非「只有上兩條 L1、L2 有意義」。其餘關於行經路徑（psoas major 後方、越過橫突與 quadratus lumborum）、穿出 thoracolumbar fascia 進入 love handles 脂肪、以及 superior cluneal nerves 支配皮島的敘述皆正確。","peropt":{"A":"正確。腰動脈是腹主動脈的體節性分支，相當於胸主動脈的後肋間動脈。","B":"正解（錯述）。並非只有 L1、L2 有臨床價值；L3、L4 的穿通枝實為 LAP 常用來源。","C":"正確。血管行經 psoas major 後方，越過椎體橫突，橫跨 quadratus lumborum。","D":"正確。蒂穿出（或被包覆於）thoracolumbar fascia 後進入 love handles 的皮下脂肪，由內向外分支灌流髂脊上方皮膚。","E":"正確。皮島由 superior cluneal nerves 支配，該神經同樣自 thoracolumbar fascia 下方穿出。"},"cite":"Neligan, 5th Edition, vol.5, Ch37, p461","conflict":""},{"id":"2209","sub":"S15","src":"NG","years":[114],"stem":"Which is true about hybrid breast reconstruction?","opts":{"A":"It combining autologous tissue and implants for breast reconstruction","B":"The plane of implant placement in hybrid breast reconstruction has transitioned from the submuscular to the pre-pectoral plane","C":"Options include immediate or delayed implant placement","D":"Microsurgical hybrid breast reconstruction with abdominal flaps is associated with excellent clinical outcomes, with the generous soft tissue provided by the abdominal flap allowing for stable soft tissue coverage of the implant.","E":"All of the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"Hybrid 乳房重建四項敘述全對：結合自體組織與義乳；義乳平面已由 submuscular 轉向 **pre-pectoral**；義乳可即時或延遲置入；以腹部皮瓣行顯微 hybrid 重建臨床結果優異，皮瓣提供的豐厚軟組織可穩定覆蓋義乳。與 NG-039 對照可知：C「延遲置入」在此被列為**正確**，故 NG-039 稱其「絕對禁忌」自然是錯述。","peropt":{"A":"對。Hybrid ＝ 自體組織＋義乳的組合重建。","B":"對。義乳平面已從 submuscular 轉向 pre-pectoral。","C":"對。義乳可選擇即時或延遲（分期）置入。","D":"對。腹部皮瓣的顯微 hybrid 重建結果優異，豐厚軟組織穩定覆蓋義乳。","E":"正解。以上皆是。"},"cite":"Neligan, 5th Edition, vol.5, Ch38, p470, 474","conflict":""},{"id":"2210","sub":"S15","src":"NG","years":[114],"stem":"Which is true about stacked and conjoined flap for breast reconstruction?","opts":{"A":"When available tissue from a single donor area is inadequate, stacked or conjoined multi-pedicle flaps from a single or multiple donor area(s) can provide a fully autologous-only breast reconstruction.","B":"In unilateral cases, the most common option is the stacked or conjoined bipedicled deep inferior epigastric perforator (DIEP) flap supplied by two anatomically distinct vascular pedicles","C":"In bilateral breast reconstructions, a combination of flaps such as DIEP flap, PAP flap, TUG flap, LAP flap, and IGAP/SGAP flap can be used in the form of a four-flap reconstruction to provide a volume appropriate breast reconstruction","D":"Radiation deficits that create an imbalance of chest wall soft tissue and skin availability benefit from a multi-flap breast reconstruction which affords an opportunity to improve radiation-related changes","E":"All of the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"與 NG-068 互為正反題：本題 C 寫「雙側重建以 **four-flap** 方式組合」是**正確**的，故答案為 All of the above。請把數字釘死：**單側＝雙蒂 stacked DIEP；雙側＝四皮瓣**。","peropt":{"A":"對。單一供區不足時，多蒂 stacked／conjoined 皮瓣可達成完全自體重建。","B":"對。單側最常見為兩條獨立血管蒂供養的雙蒂 stacked DIEP。","C":"對。雙側重建可組合 DIEP／PAP／TUG／LAP／IGAP/SGAP，以 four-flap 形式提供足夠體積。","D":"對。多皮瓣重建可改善放療造成的胸壁軟組織與皮膚不足。","E":"正解。以上皆是。"},"cite":"Neligan, 5th Edition, vol.5, Ch40, p481","conflict":""},{"id":"2211","sub":"S15","src":"NG","years":[114,115],"stem":"Which is true about enhanced recovery after surgery (ERAS) in breast surgery?","opts":{"A":"ERAS protocols within plastic surgery have demonstrated significant improvements in postoperative recovery, patient opioid usage, patient LOS, and PONV","B":"The most important aspects of any ERAS protocol can be broken down into preoperative, perioperative, intra-operative, and postoperative interventions.","C":"The preoperative phase should focus on educating the patient on the surgical experience and optimizing them for surgery through proper nutrition, smoking and/or alcohol cessation, reasonable pain expectations, and preoperative exercise","D":"Perioperative interventions include multimodal analgesia given on a scheduled basis.","E":"All of the above"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"ERAS 在乳房手術的四項敘述全對：整外領域的 ERAS 已顯示術後恢復顯著改善；可分為術前、圍手術期、術中、術後四階段；**術前重點是衛教、營養優化、戒菸戒酒、合理的疼痛期待與術前運動**；圍手術期採**按時給予的多模式鎮痛**（減少鴉片類用量）。","peropt":{"A":"對。整形外科的 ERAS 方案已證實顯著改善術後恢復。","B":"對。ERAS 可分為術前、圍手術期、術中、術後四類介入。","C":"對。術前階段聚焦衛教、營養、戒菸戒酒、合理疼痛期待與術前運動。","D":"對。圍手術期以按時（scheduled）給予的多模式鎮痛為核心。","E":"正解。以上皆是。"},"cite":"Neligan, 5th Edition, vol.5, Ch42,p513-514","conflict":""},{"id":"2213","sub":"S13","src":"NG","years":[114],"stem":"Which of the following statements are the indications for a unipedicled free TRAM flap?(複選)","opts":{"A":"Flap weight is expected to be twice the mastectomy weight","B":"Flap weight is not expected to be twice the mastectomy weight","C":"Patient having a midline vertical scar","D":"ICG angiography showed a sufficient perfusion area after temporarily clamping of the contralateral key perforator","E":"All of above"},"ans":"AD","multi":true,"etype":"ai","expl":"","key":"單蒂（unipedicled）free TRAM 的適應是「單側穿通枝灌流足以支撐所需皮瓣體積」。術中 ICG 血管攝影在暫時夾閉對側關鍵穿通枝後仍顯示灌流區域充足（D），即可安全採單蒂。⚠ A 選項在不同版本敘述方向相反（部分版本把「皮瓣重量預期為乳房切除重量兩倍」列為需雙蒂的情況），本年答案鍵將 A 列為適應症，作答以答案鍵為準。","peropt":{"A":"依本年答案鍵列為適應症。此敘述在版本間有出入，記憶時抓「灌流是否足夠支撐所需體積」的原則，勿死背數字關係。","B":"依本年答案鍵不列為適應症（與 A 互為反述）。","C":"腹部正中垂直疤痕會阻斷跨中線灌流，通常限制皮瓣只能用同側，不是單蒂 free TRAM 的適應症而是限制條件。","D":"適應症。ICG 於暫時夾閉對側關鍵穿通枝後仍顯示灌流面積足夠，直接證明單蒂可行。","E":"並非所有選項皆為適應症，故不選。"},"cite":"Neligan, 5th Edition, vol.5, Ch31, p.410","conflict":""},{"id":"2215","sub":"S11","src":"NG","years":[114,115],"stem":"Which statements about the thoracodorsal artery perforator (TDAP) flap are true?(複選)","opts":{"A":"The TDAP flap is one of the main surgical options in immediate or delayed partial breast reconstruction when a volume replacement technique is required","B":"In the event that the volume obtained from the TDAP flap is insufficient, additional fat grafting may be performed to increase volume using the TDAP flap as an autologous scaffold.","C":"The TDAP flap offers an alternative for patients in whom abdominal flaps are high-risk or unavailable","D":"The TDAP flap could be a primary option in patients with small to medium breast size.","E":"The benefits include avoidance of microsurgery, reduced operative time, reliability of the procedure, low morbidity of the donor area, and efficacy of the technique."},"ans":"ABCDE","multi":true,"etype":"ai","expl":"","key":"TDAP 皮瓣在**部分乳房重建（volume replacement）**的五項優點全對：可用於即時或延遲重建、體積不足時可以 TDAP 當自體支架再加脂肪移植、是腹部皮瓣高風險或不可用時的替代方案、對中小型乳房可作首選、且**免顯微手術、手術時間短、可靠、供區傷害低**。","peropt":{"A":"對。TDAP 是需要體積置換技術時，即時或延遲部分乳房重建的主要選項之一。","B":"對。TDAP 體積不足時，可作為血管化的自體支架再加脂肪移植增量。","C":"對。腹部皮瓣風險高或不可用時（既往手術、瘦削、需保留腹部），TDAP 為替代方案。","D":"對。中小型乳房的部分缺損，TDAP 可作為首選。","E":"對。優點包括免除顯微吻合、手術時間縮短、術式可靠、供區傷害低。"},"cite":"Neligan, 5th Edition, vol.5, Ch46","conflict":""},{"id":"2216","sub":"S17","src":"NG","years":[114,115],"stem":"What is the stage of non-pitting edema in the setting of fibrotic subcutaneous tissue and overlying skin by International Society of Lymphology(ISL) staging system?","opts":{"A":"0","B":"I","C":"II","D":"III","E":"IV"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 ISL 淋巴水腫分期。**官方答案 D（Stage III，依原卷計分）**：非凹陷性水腫＋皮下組織與表層皮膚纖維化＝象皮病範疇。⚠ 跨年爭議：NG115 同題曾判 Stage II（晚期 II 也不再凹陷），界線在「有無象皮病外觀（皮膚增厚、疣狀增生）」；本卷/NG114 官方為 III。","peropt":{"A":"Stage 0：潛伏期，無可見水腫。","B":"Stage I：凹陷性水腫，抬高可消退。","C":"⚠ Stage II（晚期 Stage II 已不再凹陷）；NG115 本卷曾答此，但依原卷/NG114 官方為 D。","D":"◎ 官方答案 Stage III：非凹陷性水腫＋皮下與表層皮膚纖維化＝lymphostatic elephantiasis。","E":"ISL 分期無 Stage IV。"},"cite":"Neligan, 5th Edition, vol.5, Ch47 p557","conflict":"ISL 分期跨年衝突：NG114 原答 D(III)、NG115 答 C(II)。依新版（115）為準，更正為 C（2026-07-10 Jason 裁定）。 ⚠ 同題歷屆重出：ISL lymphedema分期，2216（114年）與2229（115年）題目與選項相同，皆答C（Stage II）；僅標點空白差異。 ｜ 2026-07-16 Jason 裁定：依原卷計分改回官方答 D（曾更正為 C）。"},{"id":"2217","sub":"S08","src":"NG","years":[115],"stem":"一名 15歲男生 因雙側乳房隆起就診，已持續 18個月。過去無特殊病史，BMI正常，未服用任何藥物。理學檢查顯示乳房主要為纖維腺體組織，乳頭位置正常，無明顯皮膚鬆弛。無溢乳（galactorrhea）、視野缺損或睪丸異常。根據本文內容，下列何者正確？（複選）","opts":{"A":"持續超過1年的 gynecomastia，因纖維化與玻璃樣變增加，較可能需要手術治療","B":"此病人應立即接受內分泌檢查，因所有青春期男性女乳症皆需排除內分泌疾病","C":"若乳房主要為腺體組織且無皮膚鬆弛，liposuction alone 可作為治療選項","D":"直接切除腺體時需避免乳頭下方過度切除，以免產生 saucer deformity","E":"青少年患者即使只有輕度 persistent gynecomastia，也可能出現顯著 psychosocial distress"},"ans":"ACDE","multi":true,"etype":"ai","expl":"A. 正確，持續超過 1年 的 gynecomastia 較容易出現 fibrosis 與 hyalinization，因此手術需求增加。\n\nB. 錯誤，只有出現 galactorrhea、視野異常、睪丸異常或 Klinefelter 特徵 時才需進一步內分泌評估。\n\nC. 正確，Simon grade 1、2a 或 Rohrich Ia、IIa（無皮膚鬆弛、乳頭位置佳）可考慮 liposuction alone。\n\nD. 正確，乳頭下方過度切除會造成典型的 saucer deformity（凹陷乳頭畸形）。\n\nE. 正確，pediatric gynecomastia 與 顯著心理社會困擾 有關，可能影響青少年社交與認知發展。","key":"🎯 本題為 15 歲持續性青春期男性女乳症之臨床決策（複選）。核心：持續 >1 年者因 fibrosis 與 hyalinization 增加，較可能需手術；腺體為主且無皮膚鬆弛者（Simon 1、2a／Rohrich Ia、IIa）可考慮 liposuction alone；直接腺體切除需避免乳頭下方過度切除以免 saucer deformity；即使輕度持續性 gynecomastia 亦可能造成顯著心理社會困擾。⚠ 陷阱：並非「所有」青春期男性女乳症皆需立即內分泌檢查，僅在 galactorrhea、視野缺損、睪丸異常或 Klinefelter 特徵等紅旗徵象時才進一步評估，故 B 錯。","peropt":{"A":"✓ 持續 >1 年因 fibrosis/hyalinization 增加，較可能需手術。","B":"✗ 並非所有青春期男性女乳症皆需立即內分泌檢查，僅紅旗徵象時才評估。","C":"✓ 腺體為主且無皮膚鬆弛（Simon 1/2a、Rohrich Ia/IIa）可考慮單純抽脂。","D":"✓ 乳頭下方過度切除會造成 saucer deformity，須避免。","E":"✓ 即使輕度持續性亦可能造成顯著心理社會困擾。"},"cite":"原檔詳解","conflict":""},{"id":"2218","sub":"S13","src":"NG","years":[115],"stem":"Which of the following statements about the free Transverse Rectus Abdominis Myocutaneous (TRAM) flap is incorrect?","opts":{"A":"The rectus abdominis muscle is categorized as a Mathes and Nahai Type III muscle.","B":"Postoperative abdominal bulging is most frequently caused by the thinning or attenuation of the anterior rectus sheath.","C":"Standard recipient vessels for a free TRAM flap include the internal mammary vessels and the thoracodorsal vessels.","D":"A flap that results in the preservation of the entire rectus abdominis muscle is classified as an MS-2 flap.","E":"None of the above"},"ans":"D","multi":false,"etype":"ai","expl":"","key":"同一 MS 分級家族的 5e 版本：這次錯述改成「完整保留腹直肌＝MS-2」。正確應為 MS-3（＝DIEP）。MS-2 是保留內、外兩側肌條，只取中段肌肉。","peropt":{"A":"正確。rectus abdominis 為 Mathes-Nahai Type III。","B":"正確。腹壁膨出最常見於前鞘變薄鬆弛。","C":"正確。標準受區血管為內乳與胸背血管。","D":"正解（錯述）。完整保留腹直肌是 MS-3，不是 MS-2。","E":"存在錯述選項，不選 None of above。"},"cite":"Neligan, 5th Edition, vol.5, Ch31, p397","conflict":"跨年數值差異（Neligan 4e vs Neligan 5e）：A: 112「The rectus abdominis muscle is a Mathes 」 vs 115「The rectus abdominis muscle is categoriz」；B: 112「An abdominal bulge is most often due to 」 vs 115「Postoperative abdominal bulging is most 」；C: 112「Recipient vessels for the free TRAM flap」 vs 115「Standard recipient vessels for a free TR」；D: 112「Preservation of the entire rectus abdomi」 vs 115「A flap that results in the preservation 」；E: 112「None of above」 vs 115「None of the above」"},{"id":"2219","sub":"S14","src":"NG","years":[115],"stem":"When abdominal tissue is unavailable, alternative free flaps are utilized for autologous breast reconstruction. Which of the following statements regarding these alternative flaps is/are TRUE? (複選)","opts":{"A":"The Transverse Upper Gracilis (TUG) flap is limited by a relatively short vascular pedicle (typically 6–7 cm) and can cause donor-site morbidity such as transient or permanent injury to the obturator nerve's posterior division.","B":"The Superior Gluteal Artery Perforator (SGAP) flap offers a longer vascular pedicle than the Inferior Gluteal Artery Perforator (IGAP) flap but frequently results in a contour deformity that mimics Sciatic nerve compression syndrome.","C":"The Lumbar Artery Perforator (LAP) flap provides a robust volume of dense fat suitable for large breast reconstruction, but its harvest is technically challenging due to the short pedicle length and the intramuscular course through the erector spinae muscle.","D":"When harvesting an IGAP flap, the surgeon must carefully identify and preserve the posterior femoral cutaneous nerve (PFCN) to prevent painful neuroma formation or posterior thigh paresthesia.","E":"Compared to the gluteal flaps, the TUG flap yields a tissue texture that is softer and more compliant, closely mimicking natural breast parenchyma, but is constrained by a more limited total volume capacity."},"ans":"CDE","multi":true,"etype":"ai","expl":"","key":"腹部組織不可用時的替代皮瓣比較：TUG 蒂短（約 5.5–7 cm）、體積有限、質地柔軟；供區風險是 **閉孔神經前支**（支配 gracilis）與淋巴水腫。SGAP 蒂**短於** IGAP。LAP 脂肪量大但蒂短、需穿過 erector spinae，技術困難。IGAP 需辨識並保留 posterior femoral cutaneous nerve。","peropt":{"A":"錯。TUG 蒂短（約 5.5–7 cm）此點正確，但 gracilis 由 **閉孔神經前支（anterior division）** 支配，題目寫 posterior division 為誤。","B":"錯。SGAP 的蒂**比 IGAP 短**（IGAP 蒂較長），且「輪廓變形模擬坐骨神經壓迫症候群」的敘述不成立——IGAP 才有坐骨神經相關風險。","C":"對。LAP 提供大量緻密脂肪，適合較大乳房重建，但蒂短且需穿行 erector spinae，取瓣技術困難。","D":"對。取 IGAP 時須辨識並保留 posterior femoral cutaneous nerve，否則造成神經瘤疼痛或大腿後側感覺異常。","E":"對。TUG 組織質地較臀部皮瓣柔軟、順應性佳，接近乳腺實質，但總體積受限。"},"cite":"Neligan, 5th Edition, vol.5, Ch33,p420-423","conflict":""},{"id":"2220","sub":"S14","src":"NG","years":[115],"stem":"Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?","opts":{"A":"The profunda femoris artery arises from the common femoral artery and travels directly into the medial compartment of the thigh to give off its perforators.","B":"The surgical dissection of the PAP flap is straightforward because the primary perforators consistently run an intramuscular course through the adductor longus muscle.","C":"The resulting donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.","D":"Common postoperative complications associated with this flap include fat necrosis at the recipient site, as well as donor-site seroma, hematoma, and wound infection.","E":"None of the above"},"ans":"B","multi":false,"etype":"ai","expl":"","key":"PAP 皮瓣的兩個必考陷阱：① 穿通枝主要走行於 **gracilis 與 adductor magnus 之間的中隔皮膚（septocutaneous）路徑**，或穿行 adductor magnus，**不是 adductor longus**；② 剝離並不「straightforward」。此外 profunda femoris artery 由 common femoral artery 分出後進入大腿**後側**間隔，非內側間隔。","peropt":{"A":"本年答案鍵未列為錯述選項。惟嚴格而言 profunda femoris 分出後供應大腿後側間隔（posterior compartment），此敘述用字寬鬆；作答時以更明確錯誤的 B 為準。","B":"正解（錯述）。PAP 的穿通枝並非「一致地」以肌內路徑穿過 **adductor longus**（實為 adductor magnus 或 gracilis／adductor magnus 之間的中隔），且剝離技術要求高，並不簡單。","C":"正確。供區疤痕可藏於大腿內上方與臀下皺褶內，美觀度佳。","D":"正確。常見併發症為受區脂肪壞死，以及供區血清腫、血腫與傷口感染。","E":"存在明確錯述選項，不選 None。"},"cite":"Neligan, 5th Edition, vol.5, Ch36,p451-452","conflict":""},{"id":"2221","sub":"S15","src":"NG","years":[115],"stem":"Hybrid breast reconstruction combines autologous tissue transfer with alloplastic implants to optimize aesthetic outcomes. Regarding the surgical principles, planes, and clinical considerations of hybrid breast reconstruction, which of the following statements are TRUE? (複選)","opts":{"A":"Hybrid breast reconstruction allows patients with a low Body Mass Index (BMI) to achieve adequate breast volume by utilizing a smaller, muscle-sparing autologous flap (e.g., MS-TRAM or DIEP) to provide stable vascularized soft tissue coverage over the implant.","B":"The plane of implant placement in hybrid reconstruction has increasingly shifted from subpectoral to pre-pectoral, which preserves the pectoralis major muscle, reduces postoperative animation deformity, and decreases long-term capsular contracture.","C":"In microvascular hybrid reconstruction using abdominal flaps, placing the implant in a delayed staged setting (secondary revision) is strictly contraindicated due to the risk of damaging the deep inferior epigastric pedicle during secondary pocket dissection.","D":"When performing an immediate hybrid reconstruction with a DIEP flap and a pre-pectoral implant, the autologous tissue serves as a biological matrix that eliminates the clinical need for acellular dermal matrix (ADM) to support the implant.","E":"The combination of autologous fat grafting (lipofilling) and implants is also considered a forms of hybrid breast reconstruction, typically used to correct contour deformities, upper pole rippling, or step-off deformities post-implant placement"},"ans":"ABE","multi":true,"etype":"ai","expl":"","key":"Hybrid 重建（自體皮瓣＋義乳）正確者為 ABE：低 BMI 病人可用較小的保肌皮瓣覆蓋義乳；義乳平面已由 subpectoral 轉向 **pre-pectoral**（保留胸大肌、減少 animation、降低長期莢膜攣縮）；**脂肪移植＋義乳也算 hybrid 的一種**。C（延遲分期置入義乳「絕對禁忌」）與 D（自體組織可完全免除 ADM）皆為過度絕對的錯述。","peropt":{"A":"對。低 BMI 病人以較小的 MS-TRAM／DIEP 提供穩定的血管化軟組織覆蓋義乳，補足體積。","B":"對。義乳平面由 subpectoral 轉向 pre-pectoral，保留胸大肌、減少 animation deformity、降低長期莢膜攣縮。","C":"錯。延遲分期置入義乳（二次修整時）是常規可行的做法，並非「絕對禁忌」；謹慎剝離即可保護 DIEA 血管蒂。","D":"錯。自體組織雖提供覆蓋，仍常需 ADM 支撐 pre-pectoral 義乳的下極與位置，不能說「完全免除 ADM 的臨床需求」。","E":"對。脂肪移植合併義乳亦屬 hybrid 重建，用於矯正輪廓缺損、上極 rippling 與階梯感。"},"cite":"Neligan, 5th Edition, vol.5, Ch38, p470-474","conflict":""},{"id":"2222","sub":"S13","src":"NG","years":[115],"stem":"Which of the following statements is NOT an indication or selection criterion for a Superficial Inferior Epigastric Artery (SIEA) flap in breast reconstruction?","opts":{"A":"The patient can safely tolerate 5–12 hours of general anesthesia and has no known history of an unmanaged hypercoagulable state.","B":"The patient has a surgical history of a previous full abdominoplasty or a comprehensive panniculectomy.","C":"Intraoperative exploration confirms that the external diameter of the SIEA trunk is greater than 1.5 mm.","D":"The lower abdominal skin paddle remains well-perfused after temporarily occluding the deep inferior epigastric perforators.","E":"None of the above."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"SIEA 皮瓣選用條件：SIEA 外徑 >1.5 mm、暫時夾閉 DIEP 穿通枝後皮島仍灌流良好、病人可耐受長時間麻醉且無未控制的高凝狀態。既往 abdominoplasty 或 panniculectomy 已離斷 SIEA/SIEV，是禁忌而非適應症。","peropt":{"A":"是選用條件。SIEA 手術耗時，病人需能耐受 5–12 小時全身麻醉，且無未處理的高凝狀態（SIEA 蒂細、易栓塞）。","B":"正解（非適應症）。先前全腹整形或大範圍脂膜切除已破壞 SIEA/SIEV，無法取瓣。","C":"是選用條件。術中確認 SIEA 主幹外徑 >1.5 mm 才有足夠灌流。","D":"是選用條件。暫時阻斷深層穿通枝後皮島仍灌流良好，證明 SIEA 單獨可供養。","E":"B 明確為非適應症，故不選 None。"},"cite":"Neligan, 5th Edition, vol.5, Ch32, p415-416","conflict":""},{"id":"2223","sub":"S14","src":"NG","years":[115],"stem":"Regarding the use of gluteal free flaps for autologous breast reconstruction, which of the following statements is INCORRECT?","opts":{"A":"Gluteal tissue may be harvested based on either the superior gluteal artery perforator (SGAP) system or the inferior gluteal artery perforator (IGAP) system.","B":"The main disadvantage of the IGAP flap is that its microvascular dissection must be performed adjacent to the sciatic nerve.","C":"The primary recipient vessel choice for SGAP breast reconstruction is the internal mammary artery and vein.","D":"The thoracodorsal vessels serve as acceptable alternative recipient vessels if the primary chest wall recipient site is unavailable.","E":"The superior gluteal vessels exit the pelvis and enter the gluteal region through the lesser sciatic foramen."},"ans":"E","multi":false,"etype":"ai","expl":"","key":"臀部游離皮瓣：superior gluteal 血管經 **greater sciatic foramen（大坐骨孔）於梨狀肌上方**離開骨盆；lesser sciatic foramen 走的是 pudendal 血管與 obturator internus 肌腱，與 SGAP 無關。IGAP 的最大缺點是剝離貼近坐骨神經；SGAP 首選受區為內乳血管，胸背血管為備案。","peropt":{"A":"正確。臀部組織可依 SGAP 或 IGAP 系統取瓣。","B":"正確。IGAP 主要缺點即顯微剝離緊鄰坐骨神經。","C":"正確。SGAP 重建的首選受區血管為 internal mammary artery/vein（蒂短，需居中的受區）。","D":"正確。若胸壁首選受區不可用，胸背血管為可接受的替代受區。","E":"正解（錯述）。superior gluteal 血管經 **greater** sciatic foramen 於梨狀肌上緣穿出，不是 lesser sciatic foramen。"},"cite":"Neligan, 5th Edition, vol.5, Ch46","conflict":""},{"id":"2224","sub":"S14","src":"NG","years":[115],"stem":"Regarding the Profunda Artery Perforator (PAP) flap for breast reconstruction, which of the following statements is INCORRECT?","opts":{"A":"The primary perforators of the PAP flap typically emerge via a septo-cutaneous course located between the gracilis and adductor magnus muscles.","B":"The PAP flap provides an anatomically reliable and long vascular pedicle (averaging 9–13 cm), which is significantly longer than that of a Transverse Upper Gracilis (TUG) flap.","C":"The donor-site scar is aesthetically favorable, as it can be well-hidden within the upper thigh and the infraguteal (buttock) crease.","D":"Unlike the DIEP flap, the PAP flap has a severely limited vascular pedicle length of approximately 4 to 5 cm, frequently requiring a vein graft for breast reconstruction.","E":"Common postoperative complications include fat necrosis at the recipient site, as well as delayed wound healing or seroma formation at the thigh donor site."},"ans":"D","multi":false,"etype":"ai","expl":"","key":"🎯 本題為反向作答（挑『錯誤』者）。PAP flap之主要穿支多於gracilis與adductor magnus間以septocutaneous走行；蒂『長』（約9–13cm），明顯長於TUG；供區疤痕可藏於大腿上方/臀下皺褶；併發症含受區fat necrosis、供區延遲癒合與seroma。⚠ 關鍵錯誤在D：宣稱PAP蒂『嚴重受限約4–5cm且常需血管移植』與其長蒂事實矛盾，故D為錯誤敘述（此點正與DIEP/其他版本形成對照）。","peropt":{"A":"✗ 正確敘述——主要穿支於gracilis與adductor magnus間septocutaneous走行。","B":"✗ 正確敘述——PAP蒂長約9–13cm，明顯長於TUG。","C":"✗ 正確敘述——供區疤痕可藏於大腿上方/臀下皺褶。","D":"✓（為答案／錯誤敘述）PAP為長蒂，宣稱蒂僅4–5cm且常需vein graft與事實矛盾，故錯誤。","E":"✗ 正確敘述——併發症含受區fat necrosis、供區延遲癒合與seroma。"},"cite":"待複查（NG PAP flap 蒂長度/併發症 記憶佐證）","conflict":""},{"id":"2225","sub":"S14","src":"NG","years":[115],"stem":"Which of the following complication is the least likely to be a concern when planning an autologous breast reconstruction using a Profunda Artery Perforator (PAP) flap?","opts":{"A":"Fat necrosis","B":"Donor site seroma","C":"Donor site hematoma","D":"Donor site infection","E":"Lower extremity lymphedema"},"ans":"E","multi":false,"etype":"ai","expl":"","key":"🎯 本題問規劃 PAP（profunda artery perforator）皮瓣自體乳房重建時「最不需擔心」的併發症，答案為下肢淋巴水腫（lower extremity lymphedema）。PAP 取自大腿後內側，供區併發症以 fat necrosis（受區）、供區 seroma、hematoma、感染、傷口延遲癒合為主。⚠ 關鍵：PAP 剝離不顯著破壞下肢主要淋巴引流，故下肢淋巴水腫最不常見；此與腹股溝/腋下淋巴結廓清後的淋巴水腫風險不同，切勿混淆。","peropt":{"A":"✗ Fat necrosis 為 PAP 常見受區併發症之一，須擔心。","B":"✗ 供區 seroma 為常見併發症。","C":"✗ 供區 hematoma 為可能併發症。","D":"✗ 供區感染為可能併發症。","E":"✓（正解）下肢淋巴水腫最不需擔心；PAP 不顯著破壞下肢淋巴引流。"},"cite":"待複查（NG PAP flap complications 記憶佐證）","conflict":""},{"id":"2226","sub":"S14","src":"NG","years":[115],"stem":"Regarding the Lumbar Artery Perforator (LAP) flap, which statement is FALSE?","opts":{"A":"The flap tissue is harvested from the lower back or flank region.","B":"Surgeons only use the upper L1 and L2 arteries, while L3 and L4 are never used.","C":"The blood vessels pass through the deep muscles of the lower back.","D":"A common donor-site complication is fluid collection (seroma) in the back."},"ans":"B","multi":false,"etype":"ai","expl":"","key":"Lumbar artery perforator（LAP）皮瓣：腰動脈是腹主動脈的體節分支（相當於胸主動脈的 posterior intercostal arteries），**L1–L4 均可使用**，實務上以第 3、4 腰動脈穿通枝最常用。題目說「只用 L1、L2，L3/L4 從不使用」為錯述。本題僅 A–D 四個選項。","peropt":{"A":"正確。LAP 取自下背/腰側（俗稱 love handles）的軟組織。","B":"正解（錯述）。L1–L4 腰動脈穿通枝皆可能被使用，臨床上反而以較低位者（L3、L4）為主，並非「只用 L1、L2」。","C":"正確。腰動脈穿通枝行經下背深層肌群（穿過 quadratus lumborum、erector spinae），這也是 LAP 剝離困難、蒂短的原因。","D":"正確。供區血清腫（seroma）是最常見的併發症，因下背筋膜下潛在腔隙大。"},"cite":"Neligan, 5th Edition, vol.5, Ch37, p461","conflict":""},{"id":"2227","sub":"S15","src":"NG","years":[115],"stem":"Which is INCORRECT about stacked and conjoined flap for breast reconstruction?","opts":{"A":"When available tissue from a single donor area is inadequate, stacked or conjoined multi-pedicle flaps from a single or multiple donor area(s) can provide a fully autologous-only breast reconstruction.","B":"In unilateral cases, the most common option is the stacked or conjoined bi-pedicled deep inferior epigastric perforator (DIEP) flap supplied by two anatomically distinct vascular pedicles.","C":"In bilateral breast reconstructions, a combination of flaps such as DIEP flap, PAP flap, TUG flap, LAP flap, and IGAP/SGAP flap can be used in the form of a two-flap reconstruction to provide a volume appropriate breast reconstruction.","D":"Radiation deficits that create an imbalance of chest wall soft tissue and skin availability benefit from a multi-flap breast reconstruction which affords an opportunity to improve radiation-related changes.","E":"All of above are correct"},"ans":"C","multi":false,"etype":"ai","expl":"","key":"Stacked／conjoined 皮瓣的關鍵數字：**雙側重建時是「四皮瓣（four-flap）」重建**（每側各兩個皮瓣），不是 two-flap。單側最常見的是雙蒂 stacked DIEP。故 C 為錯述。與 NG-081 為正反題（NG-081 的 C 寫 four-flap 故全對）。","peropt":{"A":"正確。單一供區組織不足時，可用單一或多個供區的多蒂 stacked／conjoined 皮瓣達成完全自體重建。","B":"正確。單側最常見的選項是由兩條解剖上獨立血管蒂供養的雙蒂 stacked／conjoined DIEP。","C":"正解（錯述）。雙側重建時是以 **four-flap**（每側兩瓣）方式組合 DIEP／PAP／TUG／LAP／IGAP/SGAP，而非 two-flap。","D":"正確。放療造成胸壁軟組織與皮膚不足時，多皮瓣重建可同時改善放射相關變化。","E":"C 為錯述，不選 All of above。"},"cite":"Neligan, 5th Edition, vol.5, Ch40, p481","conflict":""},{"id":"2230","sub":"S16","src":"NG","years":[115],"stem":"關於Nipple-Areola-Complex (NAC) reconstruction 重建，下列敘述何者正確？ (複選)","opts":{"A":"Areola正常直徑約為4cm，Nipple正常直徑約為1.3cm。","B":"Upper Pole : Lower Pole Ratio約為55% : 45% 。","C":"NAC 大約位於Mid-humerus level，相當於手臂自然下垂時上臂中段高度。","D":"常見的Local flap為C-V flap 、Skate flap 、Star flap","E":"乳暈重建最常見的方法為Intradermal tattoo"},"ans":"ACDE","multi":true,"etype":"ai","expl":"","key":"NAC 重建四項正確：乳暈直徑約 **4 cm**、乳頭直徑約 **1.3 cm**；NAC 約位於 **mid-humerus level**（手臂自然下垂時上臂中段高度）；常用局部皮瓣為 **C-V flap、Skate flap、Star flap**；乳暈重建最常用 **intradermal tattoo**。錯的是 B——上極:下極應為 **45%:55%**（與批 6 的隆乳題同一數字）。","peropt":{"A":"對。乳暈直徑約 4 cm，乳頭直徑約 1.3 cm。","B":"錯。上極:下極比例應為 **45%:55%**（下極較飽滿），非 55%:45%。","C":"對。NAC 約位於 mid-humerus level，是術中定位的實用參考。","D":"對。常見局部皮瓣為 C-V flap、Skate flap、Star flap。","E":"對。乳暈重建最常見的方法是真皮內刺青（intradermal tattoo）。"},"cite":"Neligan, 5th Edition, vol.5, Ch51, p604-605","conflict":""}];
const LS='bre_all_v3', LSv2='bre_all_v2', LSv1='bre_all_v1';
const SUBS={"S01":"乳房/NAC解剖與美學","S02":"隆乳-平面/切口","S03":"莢膜攣縮","S04":"義乳併發症/malposition","S05":"BIA-ALCL/BIA-SCC","S06":"下垂與mastopexy","S07":"縮乳成形術","S08":"男性女乳症","S09":"先天乳房異常","S10":"乳癌腫瘤學基礎","S11":"Oncoplasty/partial","S12":"義乳為主重建","S13":"腹部皮瓣重建","S14":"其他自體皮瓣","S15":"進階重建技術","S16":"NAC重建/脂肪移植","S17":"其他(淋巴水腫)"};
const SUBORDER=Object.keys(SUBS);
const DIDX={};DATA.forEach((q,i)=>DIDX[q.id]=i+1);
const DAY=864e5;
// ===== FSRS-6 排程 =====
const FW=[0.212,1.2931,2.3065,8.2956,6.4133,0.8334,3.0194,0.001,1.8722,0.1666,0.796,1.4835,0.0614,0.2629,1.6483,0.6014,1.8729,0.5425,0.0912,0.0658,0.1542];
const REQ_R=0.90;                 // 目標記憶留存率
const DECAY=-FW[20], FACTOR=Math.pow(0.9,1/DECAY)-1;
const MASTERED_S=21;              // 穩定度≥21天視為「已掌握」
const clampD=d=>Math.min(10,Math.max(1,d));
const clampS=s=>Math.min(36500,Math.max(0.01,s));
const initS=G=>clampS(FW[G-1]);
const initD=G=>clampD(FW[4]-Math.exp(FW[5]*(G-1))+1);
function nextD(D,G){let d=D-FW[6]*(G-3)*(10-D)/9;const d0e=FW[4]-Math.exp(FW[5]*3)+1;return clampD(FW[7]*d0e+(1-FW[7])*d);}
const retr=(t,S)=>Math.pow(1+FACTOR*t/S,DECAY);
const interval=S=>Math.max(1,Math.round((S/FACTOR)*(Math.pow(REQ_R,1/DECAY)-1)));
function sRecall(D,S,R,G){const hard=G===2?FW[15]:1,easy=G===4?FW[16]:1;return clampS(S*(Math.exp(FW[8])*(11-D)*Math.pow(S,-FW[9])*(Math.exp(FW[10]*(1-R))-1)*hard*easy+1));}
function sForget(D,S,R){return clampS(FW[11]*Math.pow(D,-FW[12])*(Math.pow(S+1,FW[13])-1)*Math.exp(FW[14]*(1-R)));}
function sShort(S,G){return clampS(S*Math.exp(FW[17]*(G-3+FW[18]))*Math.pow(S,-FW[19]));}
// 依「作答對錯＋信心度」推導 FSRS 評級：錯=Again(1)；對+沒把握=Hard(2)；對+普通=Good(3)；對+有把握=Easy(4)
function gradeOf(ok,conf){return !ok?1:(conf==='l'?2:(conf==='h'?4:3));}
function fsrsReview(p,G,now){
  if(!p||p.S===undefined){const S=initS(G),D=initD(G);return {D,S,reps:1,lapses:G===1?1:0,last:now,due:now+interval(S)*DAY};}
  const t=Math.max(0,(now-(p.last||now))/DAY),R=retr(t,p.S);
  const D=nextD(p.D,G);let S;
  if(G===1)S=sForget(p.D,p.S,R);
  else if(t<1)S=sShort(p.S,G);
  else S=sRecall(p.D,p.S,R,G);
  return {D,S,reps:(p.reps||0)+1,lapses:(p.lapses||0)+(G===1?1:0),last:now,due:now+interval(S)*DAY};
}
// 舊 schema {n,s,m,f,w,due} → v3
function migrateEntry(op){
  const SRlegacy=[1,3,7,16,30];
  const seedS=op.w?1:SRlegacy[Math.min(op.s||0,4)];
  return {D:5,S:seedS,reps:op.n||1,lapses:op.w?1:0,last:Date.now(),due:op.due||Date.now()+seedS*DAY,
    f:(op.f!==undefined?op.f:null),n:op.n||1,postC:0,postN:0,conf:null,w:!!op.w};
}
function normalizeP(P){for(const id in P){const e=P[id];if(e&&e.S===undefined&&(e.s!==undefined||e.n!==undefined))P[id]=migrateEntry(e);}return P;}

let S={P:{},star:{},note:{},last:null,shuffle:true};
let pool=[], idx=0, sel=new Set(), locked=false, mode='home', curCat=null, curType=null;
let orderMap={}, addedRetry=new Set();

function load(){
  try{const r=localStorage.getItem(LS);if(r){const o=JSON.parse(r);S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}catch(e){}
  // 自 v2(固定間隔模型)遷移 → FSRS，保留 star/note
  try{if(!Object.keys(S.P).length){const r2=localStorage.getItem(LSv2);if(r2){const o=JSON.parse(r2);const op=o.P||{};for(const id in op)S.P[id]=migrateEntry(op[id]);S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}}catch(e){}
  // 自 v1(status模型)遷移
  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}
}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));flash();}catch(e){const s=document.getElementById('save');if(s)s.textContent='(存檔受限,請匯出)';}}
function flash(){const s=document.getElementById('save');if(!s)return;s.textContent='✓ 已存檔';setTimeout(()=>s.textContent='自動存檔',900);}
const rec=id=>S.P[id];
const mastered=p=>!!p&&p.S>=MASTERED_S&&!p.w;
const seenN=()=>Object.keys(S.P).length;
const masteredN=()=>{let n=0;for(const k in S.P)if(mastered(S.P[k]))n++;return n;};
const firstAcc=()=>{const v=Object.values(S.P).filter(p=>p.f!==null&&p.f!==undefined);if(!v.length)return null;let f=0;v.forEach(p=>{if(p.f)f++;});return Math.round(f/v.length*100);};
