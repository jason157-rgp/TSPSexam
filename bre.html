const postAcc=()=>{let c=0,n=0;for(const k in S.P){c+=S.P[k].postC||0;n+=S.P[k].postN||0;}return n?Math.round(c/n*100):null;};
const starIds=()=>Object.keys(S.star).filter(id=>S.star[id]);
const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!mastered(S.P[id]));
const dueIds=()=>{const n=Date.now();return Object.keys(S.P).filter(id=>S.P[id].due&&S.P[id].due<=n);};
const hfList=()=>DATA.filter(isHF);
const conflictList=()=>DATA.filter(q=>q.conflict);
// 錯題四型：盲區(有把握卻錯)>死穴(屢錯≥3)>新錯(近3天)>易忘(其餘/低穩定)
function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}
const TYPES=['盲區','死穴','新錯','易忘'];
const TYPEDESC={'盲區':'有把握卻答錯（最該優先）','死穴':'反覆遺忘（≥3次）','新錯':'近三天內答錯','易忘':'記憶穩定度偏低'};
function wrongTypeCounts(){const c={盲區:0,死穴:0,新錯:0,易忘:0};wrongActiveIds().forEach(id=>{const t=wrongType(S.P[id]);if(t)c[t]++;});return c;}

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(mastered(p))m++;if(p.w&&!mastered(p))w++;}}
  return {t,a,m,w,hf};
}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='wrongtype'){const w=new Set(wrongActiveIds().filter(id=>wrongType(S.P[id])===curType));pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}
  else if(mode==='cat'){pool=DATA.filter(q=>q.sub===curCat);}

  else if(mode==='conflict'){pool=conflictList();}
  else if(mode==='due'){const d=dueIds();const set=new Map(d.map(id=>[id,S.P[id].due]));pool=DATA.filter(q=>set.has(q.id));pool.sort((x,y)=>set.get(x.id)-set.get(y.id));}
  else pool=DATA.slice();

}

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};

}

  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
