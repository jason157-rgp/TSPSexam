<style>
:root{--green:#4A7C59;--forest:#2C4A38;--steel:#6B7B8D;--pale:#A8D5B5;--amber:#C99A3B;
--bg:#F4F6F3;--card:#FFF;--ink:#22322A;--mut:#6B7B8D;--line:#E1E7E0;
--right:#3E8E5A;--rightbg:#E9F5EC;--wrong:#C0503F;--wrongbg:#FBEDEA;--missbg:#FFF6E6;--star:#E0A93B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 96px}
header{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;
margin:0 -14px 14px;padding:12px 16px;border-radius:0 0 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.htitle{font-weight:700;font-size:15px}.hsub{font-size:11px;color:var(--pale);margin-top:2px}
.stat{font-size:12px;color:var(--pale);text-align:right;white-space:nowrap}.stat b{color:#fff;font-size:15px}
.saved{font-size:10px;color:var(--pale);opacity:.75}
.bar2{height:6px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden;position:relative}
.bar2>.seen{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0;transition:width .3s}
.bar2>.mast{position:absolute;left:0;top:0;height:100%;background:#fff;width:0;transition:width .3s}
.blabel{display:flex;justify-content:space-between;font-size:9.5px;color:var(--pale);margin-top:3px}
.tabs{display:flex;gap:5px;margin-top:10px}
.tab{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:600;
background:rgba(255,255,255,.12);color:var(--pale);cursor:pointer;border:1px solid transparent}
.tab.on{background:var(--pale);color:var(--forest)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:11px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.id{background:var(--forest);color:#fff}.pill.yr{background:#EEF3EC;color:var(--green)}
.pill.multi{background:var(--amber);color:#fff}.pill.single{background:var(--steel);color:#fff}
.pill.flag{background:var(--wrongbg);color:var(--wrong);border:1px solid #E7C3BC}
.pill.mast{background:var(--rightbg);color:var(--right);border:1px solid #BFE0C8}
.pill.srcNG{background:#E7F0F6;color:#3B6A8D}.pill.srcGS{background:#F1EAF8;color:#6E4A9B}
.pill.sub{background:#EDF2EB;color:#5C6E4E;border:1px solid #DCE6D6}
.pill.hf{background:#FBF2DE;color:#9B7220;border:1px solid #EBD9A9}
.starbtn{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:#CBD3CC;padding:0 2px}
.starbtn.on{color:var(--star)}
.stem{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.55}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1.5px solid var(--line);
border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt .lt{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--steel);
color:var(--steel);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.opt .tx{flex:1;font-size:14px;line-height:1.5;padding-top:1px}
.opt.sel{border-color:var(--green);background:#F1F7F2}.opt.sel .lt{background:var(--green);color:#fff;border-color:var(--green)}
.opt.correct{border-color:var(--right);background:var(--rightbg)}.opt.correct .lt{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrongbg)}.opt.wrong .lt{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.missed{border-style:dashed;border-color:var(--amber);background:var(--missbg)}.opt.missed .lt{background:var(--amber);color:#fff;border-color:var(--amber)}
.opt.locked{cursor:default}
.oexp{flex-basis:100%;font-size:12.5px;color:#4a5a50;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);line-height:1.55}
.oexp b{color:var(--wrong)}
.verdict{font-size:15px;font-weight:700;padding:10px 12px;border-radius:10px;margin:12px 0}
.verdict.ok{background:var(--rightbg);color:var(--right)}.verdict.no{background:var(--wrongbg);color:var(--wrong)}
.keybox{background:#F0F5F1;border-left:4px solid var(--green);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13.5px;color:var(--forest);font-weight:600;line-height:1.55}
.keybox.warn{background:#FBF2DE;border-left-color:var(--amber);color:#8a6212}
.src{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;font-size:11px;color:var(--mut)}
.srctag{font-weight:700;padding:3px 9px;border-radius:6px;font-size:10px}
.srctag.orig{background:#E9F5EC;color:var(--green);border:1px solid #BFE0C8}
.srctag.ai{background:#FBF2DE;color:#9B7220;border:1px dashed var(--amber)}
.srctag.none{background:#F1F2F4;color:#6B7B8D;border:1px solid #D5DAE0}
.keybox.nodetail{background:#F5F6F8;border-left:3px solid #B6BEC7;color:#6B7B8D;font-size:12px}
.cite{font-size:11px;color:var(--mut)}
.retry{margin-top:10px;text-align:center}
.retry button{background:#FBF2DE;color:#8a6212;border:1px solid #EBD9A9;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.retry button.done{background:var(--rightbg);color:var(--right);border-color:#BFE0C8}
.done{text-align:center;padding:34px 16px}.done h2{color:var(--forest);margin:.2em 0}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:6px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:9px 14px;z-index:15}
.foot .in{max-width:720px;margin:0 auto;display:flex;gap:9px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}
.btn:disabled{background:#C7D3C9}.btn.next{background:var(--forest)}
.icon{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:0 13px;font-size:12px;cursor:pointer;flex:none}
.h3{font-weight:700;color:var(--forest);font-size:15px;margin:2px 0 10px}
.dim{font-size:12px;color:var(--mut);line-height:1.6}
.wlist .wrow{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wlist .wrow:last-child{border-bottom:none}
.wlist .wq{flex:1;font-size:13.5px}.wlist .wid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.wid.w{color:var(--wrong);background:var(--wrongbg)}.wid.s{color:#8a6212;background:#FBF2DE}
.ta{width:100%;height:80px;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:11px;font-family:monospace;resize:vertical}
.row{display:flex;gap:8px;margin-top:8px}.row .btn{font-size:13px;padding:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.sw{width:44px;height:26px;border-radius:14px;background:#CBD3CC;position:relative;cursor:pointer;transition:.2s;flex:none}
.sw.on{background:var(--green)}.sw>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on>i{left:21px}
.hmhero{background:linear-gradient(135deg,#F0F5F1,#E7F0EA);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hmhero .t{font-weight:700;color:var(--forest);font-size:15px}
.hmhero .d{font-size:12px;color:var(--mut);margin-top:3px}
.hmhero .hb{height:8px;background:#E1EAE0;border-radius:5px;margin-top:9px;overflow:hidden;position:relative}
.hmhero .hb>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.hmhero .hb>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.hmhero .lb{display:flex;gap:14px;font-size:10.5px;color:var(--mut);margin-top:5px}
.hmhero .lb i{font-style:normal}.hmhero .lb .k{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.entries{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.entry{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}
.entry .em{font-size:19px;flex:none}.entry .et{font-size:12.5px;font-weight:700;color:var(--forest);line-height:1.25}
.entry .en{font-size:10.5px;color:var(--mut)}
.entry.wide{grid-column:1/3}
.entry.pri{background:var(--green);border-color:var(--green)}.entry.pri .et{color:#fff}.entry.pri .en{color:var(--pale)}
.secttl{font-size:12px;font-weight:700;color:var(--mut);margin:2px 2px 9px;letter-spacing:.03em}
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.catcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.catcard:active{transform:scale(.98)}
.catcard .cn{font-weight:700;font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.25}
.catcard .cc{flex:none;width:19px;height:19px;border-radius:6px;background:var(--forest);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.catcard .hfp{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;color:#9B7220;background:#FBF2DE;border:1px solid #EBD9A9;border-radius:10px;padding:1px 6px}
.catcard .cbar{height:7px;background:#EDF1EC;border-radius:4px;margin:9px 0 6px;overflow:hidden;position:relative}
.catcard .cbar>.s{position:absolute;left:0;top:0;height:100%;background:var(--pale);width:0}
.catcard .cbar>.m{position:absolute;left:0;top:0;height:100%;background:var(--green);width:0}
.catcard .cm{font-size:10.5px;color:var(--mut)}.catcard .cm b{color:var(--forest)}
.catcard .cm .we{color:var(--wrong);font-weight:700}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.crumb .bk{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer}
.crumb .cur{font-weight:700;color:var(--forest)}
.ovl{position:fixed;inset:0;background:rgba(20,30,24,.55);z-index:40;display:none;align-items:flex-end}
.ovl.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:720px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px 22px;max-height:80vh;overflow:auto}
.sheet .h3{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.cell{position:relative;aspect-ratio:1;border-radius:9px;border:1.5px solid var(--line);background:#fff;
display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--mut);cursor:pointer}
.cell.ok{background:var(--rightbg);border-color:#BFE0C8;color:var(--right)}
.cell.mast{background:var(--green);border-color:var(--green);color:#fff}
.cell.wrong{background:var(--wrongbg);border-color:#E7C3BC;color:var(--wrong)}
.cell.cur{outline:2.5px solid var(--forest);outline-offset:1px}
.cell .st{position:absolute;top:-5px;right:-4px;font-size:12px;color:var(--star)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--mut);margin-top:12px}
.legend i{font-style:normal}.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;border:1px solid var(--line)}
.close{background:none;border:none;font-size:14px;color:var(--green);font-weight:700;cursor:pointer}

<script>
const DATA=[{"id": "4000", "sub": "HN3", "src": "GS", "years": [110], "stem": "一50歲病患，因車禍導致80%頭皮壞死顱骨暴露，下列何者重建方式為恰當？(複選)", "opts": {"A": "全層皮膚移植。", "B": "植入組織擴張器(Tissue expansion)後局部皮瓣覆蓋。", "C": "大網膜游離皮瓣(Free omental flap)合併裂層皮膚移植。", "D": "人工真皮合併裂層皮膚移植。", "E": "頭皮局部皮瓣覆蓋。"}, "ans": "CD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮全層壞死＋顱骨外露＝血供床已失，無法承接皮膚移植；80% 大範圍缺損也超出局部皮瓣/組織擴張器的即時覆蓋能力。機制：裸露顱骨無骨膜→無血管床→植皮必敗；需帶自身血供的游離皮瓣（free omental/latissimus）鋪底＋植皮，或人工真皮（Integra）先建血管化真皮床再植皮。⚠易混：組織擴張器需完整頭皮才能撐開，急性大範圍壞死無皮可擴；局部皮瓣在 80% 缺損下無足夠鄰近組織。", "peropt": {"A": "✗ 全層皮膚移植需血管化床，裸露顱骨無骨膜無法存活。", "B": "✗ 組織擴張器需先有健康頭皮供擴張，急性大面積壞死無可用頭皮，且非急性期覆蓋方案。", "C": "✓ Free omental flap 帶自身血供可覆蓋裸顱骨，其上再植裂層皮，為大範圍頭皮缺損顱骨外露的標準重建（本題主檔註記即此）。", "D": "✓ 人工真皮（如 Integra）可在裸顱骨上（必要時鑽孔誘導肉芽/血管化）建立真皮床，二期植裂層皮，為可行選項。", "E": "✗ 80% 缺損無足夠鄰近頭皮做局部皮瓣。"}, "cite": "Grabb&Smith 頭皮重建原則（scalp reconstruction）", "conflict": ""}, {"id": "4001", "sub": "HN3", "src": "GS", "years": [110], "stem": "About eyelid anatomic and reconstruction, which of the following is correct?", "opts": {"A": "Establishing a stable structure with adequate height and functional closure, and on maintaining a nonkeratinized mucosal posterior surface to avoid abrasion to the underlying cornea are prior to restoration of symmetry and appearance.", "B": "For eyelid protractor muscles, orbital subunit functions in forced closure, whereas the preseptal and pretarsal subunits are employed for blinking and voluntary winking.", "C": "Generally, Temporal, zygomatic, and buccal branches of the facial nerve innervate the protractor muscle while oculomotor nerve and sympathetic nerve innervate the retractor muscle.", "D": "The medial fat pad in upper eyelid is more pale yellow in color and is separated from the central fat pad by the trochlea of the superior oblique muscle.", "E": "All of the above is correct"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 眼瞼重建四大原則整合題，答案 E（以上皆對）。核心：①穩定的高度＋功能性閉合＋後表面須為非角化黏膜（避免磨損角膜）優先於對稱與外觀；②protractor（orbicularis oculi）分 orbital（用力閉眼）與 preseptal/pretarsal（眨眼、隨意眨眼）；③facial nerve（顳、顴、頰支）支配 protractor，動眼神經＋交感支配 retractor（levator＋Müller）；④上瞼內側脂肪墊較蒼白，被上斜肌滑車(trochlea)與中央墊分隔。臨床後果：後層黏膜化不足會角膜糜爛。", "peropt": {"A": "✓ 功能（閉合、黏膜後表面保護角膜）優先於對稱與外觀，為重建優先次序原則。", "B": "✓ Orbital orbicularis 主用力閉眼；preseptal/pretarsal 主眨眼與隨意眨眼。", "C": "✓ 顏面神經顳/顴/頰支支配 protractor；動眼神經與交感支配 retractor。", "D": "✓ 上瞼內側脂肪墊色較蒼白，由上斜肌滑車與中央脂肪墊分隔。", "E": "✓ 以上皆正確，為正解。"}, "cite": "待複查（Neligan eyelid anatomy，記憶佐證）", "conflict": ""}, {"id": "4002", "sub": "HN2", "src": "GS", "years": [110], "stem": "For the nasal reconstruction, which of the following is wrong?", "opts": {"A": "Described by Burget and Menick, the nose possesses seven distinct esthetic subunits, including the dorsum, tip, columella and paired sidewalls and alae", "B": "If more than 50% of a given subunit is involved in a nasal defect, the entire subunit should be excised prior to any reconstruction.", "C": "Small defects over the nasal dorsum and sidewalls can often be closed primarily without tension or disruption of the surrounding nasal and facial anatomy.", "D": "The caudal third of the nose, primarily the nasal tip and ala, which consist of thick, pitted, and sebaceous skin that lacks independent mobility from its underlying cartilaginous structure.", "E": "Reconstruction of the nasal dorsum and sidewall subunits, because of their rigid structure and linear shape, are almost always replaced with grafts from the nasal septum or rib that have limited malleability."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Burget & Menick 鼻部美學亞單位＝9 個（非 7）：dorsum、tip、columella、paired sidewalls、paired alae、paired soft triangles。此題問「錯的」→ A 說「seven」故錯。臨床原則：亞單位受累 >50% 應切除整個亞單位再重建（subunit principle）以隱藏疤痕於亞單位交界。⚠易混：鼻尖/鼻翼皮膚厚、皮脂腺多、與軟骨黏著；鼻背/側壁皮膚薄可移動。", "peropt": {"A": "✓(選此為答) 錯述：Burget & Menick 定義鼻為 9 個亞單位，非 seven。", "B": "✗ 正確：亞單位受累 >50% 應切除整個亞單位再重建（subunit principle）。", "C": "✗ 正確：鼻背/側壁小缺損常可無張力初級縫合。", "D": "✗ 正確：鼻尾側 1/3（尖、翼）皮膚厚、多皮脂腺、與軟骨黏著缺乏獨立活動度。", "E": "✗ 正確：鼻背/側壁因結構剛硬線性，常以鼻中隔或肋軟骨移植重建。"}, "cite": "Grabb&Smith 鼻重建 subunit principle（Burget & Menick）", "conflict": ""}, {"id": "4003", "sub": "HN6", "src": "GS", "years": [110], "stem": "關於Head and neck cancer的敘述，下列何者為非?", "opts": {"A": "Leukoplasia and erythroplakia are considered premalignant lesions.", "B": "Human papillomavirus has been recognized as a major etiologic factor in SCCs of the oropharynx.", "C": "Nasopharyngeal cancer (NPC) is most common in southern China and is associated with Epstein-Barr virus.", "D": "HPV-associated cancers tend to be younger, healthier, and have a worse prognosis", "E": "NPC is a radiosensitive malignancy and radiation therapy with or without concurrent chemotherapy is the mainstay of treatment for all types of NPC."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 HPV 陽性口咽癌預後『較佳』非較差，此為關鍵反差。D 說 worse prognosis 故為非。機制：HPV+ 腫瘤放化療反應佳、存活率高，患者較年輕健康。對照：NPC 好發華南、與 EBV 相關、放射敏感。白斑/紅斑為癌前病變。", "peropt": {"A": "✗ 正確：leukoplakia、erythroplakia 為癌前病變。", "B": "✗ 正確：HPV 為口咽 SCC 主要病因。", "C": "✗ 正確：NPC 好發華南、與 EBV 相關。", "D": "✓(選此為答) 錯述：HPV 相關癌患者較年輕健康但預後『較佳』，非 worse。", "E": "✗ 正確：NPC 放射敏感，放療±化療為主要治療。"}, "cite": "Grabb&Smith 頭頸癌（HPV+ 口咽癌預後較佳）", "conflict": ""}, {"id": "4004", "sub": "HN3", "src": "GS", "years": [110], "stem": "下列關於頭皮重建的敘述何者為非?", "opts": {"A": "Tissue expander may paly a role in the reconstruction of the scalp.", "B": "The scalp defects could be reconstructed with skin grafts if there was no calvarium exposure.", "C": "The scalp is considered to have high pliability and could be primary closed safely even when the defect was greater than 5 cm in diameter", "D": "For the scalp, the superficial temporal vessels are the typical first-line option as recipient vessels for microsurgical reconstruction.", "E": "Undermining in the subgaleal layer and galeal scoring are adjunctive techniques that can reduce closure tension when reconstructing a scalp defect."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頭皮初級縫合的張力極限：頭皮延展性『低』(low pliability)，因galea aponeurotica剛硬，大缺損（>3cm 多需輔助技術，遠超 5cm 無法安全初縫）。C 說高延展性且 >5cm 可安全初縫→錯。機制：galea 限制延展→需 subgaleal 剝離＋galeal scoring 減張；顱骨外露需游離皮瓣，首選 superficial temporal vessels 為受區血管。", "peropt": {"A": "✗ 正確：組織擴張器在頭皮重建有其角色。", "B": "✗ 正確：無顱骨外露的頭皮缺損可植皮。", "C": "✓(選此為答) 錯述：頭皮延展性『低』，>5cm 無法安全初級縫合。", "D": "✗ 正確：superficial temporal vessels 為顯微重建首選受區血管。", "E": "✗ 正確：subgaleal 剝離＋galeal scoring 為減張輔助技術。"}, "cite": "Grabb&Smith 頭皮重建（galeal scoring、STA 受區血管）", "conflict": ""}, {"id": "4005", "sub": "HN1", "src": "GS", "years": [110], "stem": "For facial paralysis, which of the followings are correct？", "opts": {"A": "In traumatic/iatrogenic cases of facial paralysis in which distal nerve stumps are available, nerve repair or transfer is best performed within 72 hours of injury, prior to depletion of neurotransmitter in the distal stump", "B": "The standard technique for smile reanimation remains free functional muscle transfer in children. Local muscle transfers reliably improve resting tone and appearance (in both children and adults) but ability to animate remains variable and often inferior to that provided by free functional muscle transfer", "C": "Only use of cross-facial nerve grafts can lead to smile under emotional control", "D": "Ocular protection is of utmost importance in patients with facial paralysis which must be initiated early to protect ocular integrity in setting of exposure", "E": "Bell palsy is the most common diagnosis for facial paralysis in adults. It is a diagnosis of exclusion and likely caused by a latent herpes simplex virus infection"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經麻痺綜合題，答案 BCDE。關鍵時窗：外傷/醫源性且遠端斷端可用者，理想在傷後 72 小時內修復（神經傳導物質尚未耗竭前可電刺激定位遠端），非 A 所述機制錯置。BCDE 皆正確：兒童微笑重建首選 free functional muscle transfer；只有 cross-face nerve graft 能達情緒性微笑（emotional smile）；眼球保護最優先須早期介入；Bell palsy 為成人最常見、排除診斷、與 HSV 潛伏感染有關。", "peropt": {"A": "✗ 錯述：時窗確為 72 小時內，但『在神經傳導物質耗竭前』的敘述機制不精確——臨床重點是遠端斷端仍可電刺激定位（約 72h 內）；此選項被判為不正確。", "B": "✓ 兒童微笑重建標準為 free functional muscle transfer；局部肌肉轉位改善靜態張力但動態表現不穩、常遜於游離肌肉。", "C": "✓ 唯有 cross-facial nerve graft 可達情緒控制的微笑（spontaneous emotional smile）。", "D": "✓ 眼球保護最重要，暴露時須早期介入以保角膜完整。", "E": "✓ Bell palsy 為成人最常見顏面麻痺，屬排除診斷，與潛伏 HSV 感染有關。"}, "cite": "Neligan facial reanimation（72h、CFNG emotional smile、Bell palsy）", "conflict": ""}, {"id": "4006", "sub": "HN10", "src": "GS", "years": [110, 111], "stem": "關於全喉切除後重建手術常見的皮瓣選擇為Anterior lateral thigh free flap和 jejunum free flap, 使用Anterior lateral thigh free的優點為下列何者? (複選)", "opts": {"A": "Tolerate longer ischemia time", "B": "Potential for outer skin resurfacing", "C": "Less chance of fistula formation", "D": "Less chance of stricture formation", "E": "Allow tracheoesophageal puncture"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 全喉切除後咽食道重建：ALT（筋膜皮瓣）vs jejunum（腸皮瓣）。ALT 優點＝可耐較長缺血時間、可外皮重鋪(outer skin resurfacing)、可做 tracheoesophageal puncture 發聲。答案 ABE。⚠易混：fistula/stricture 誰較少有爭議——腸瓣濕潤黏膜對狹窄率的說法各版本不一，本題 CD 未選；jejunum 反而分泌黏液、狹窄與瘻管議題複雜，管狀 ALT 在多數比較有較低瘻管/狹窄，但本題官方僅取 ABE。", "peropt": {"A": "✓ ALT 為筋膜皮瓣，可耐受較長缺血時間（腸瓣缺血耐受短）。", "B": "✓ ALT 可提供外皮重鋪頸部皮膚缺損。", "C": "✗ 未列為 ALT 官方優點（瘻管率比較有爭議，非本題取用）。", "D": "✗ 未列為 ALT 官方優點（狹窄率比較有爭議）。", "E": "✓ ALT 管狀化後可施行 tracheoesophageal puncture 以利發聲復健。"}, "cite": "待複查（ALT vs jejunum 咽食道重建優缺，記憶佐證）", "conflict": ""}, {"id": "4007", "sub": "HN8", "src": "GS", "years": [111], "stem": "Risk factors for developing ORN of the mandible include which of the following? (複選)", "opts": {"A": "Radiation at doses higher than 30 Gy", "B": "Extraction of tooth to the area of radiated bone after RT", "C": "Tobacco use", "D": "Poor oral hygiene", "E": "Alcohol use"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 下頷骨 ORN 危險因子：放射劑量『>60–65 Gy』(非 30Gy)、放療後拔牙（照射骨區創傷）、抽菸、口腔衛生不良、飲酒。答案 BCDE，A 錯在劑量門檻太低。機制：高劑量放射→hypovascular-hypocellular-hypoxic 骨組織（Marx 三低理論）→創傷（拔牙）誘發無法癒合之骨壞死。", "peropt": {"A": "✗ 30 Gy 過低；ORN 風險顯著上升在 >60 Gy（一般 >65 Gy）。", "B": "✓ 放療後於照射骨區拔牙為典型誘因。", "C": "✓ 抽菸為危險因子。", "D": "✓ 口腔衛生不良增加風險。", "E": "✓ 飲酒為危險因子。"}, "cite": "Grabb&Smith ORN 危險因子（Marx 三低理論）", "conflict": ""}, {"id": "4008", "sub": "HN6", "src": "GS", "years": [111], "stem": "A 60- year- old woman presents with a 1.5cm SCC of the right lingual mandibular gingival and an upper cervical neck mass. Full- thickness cortical invasion of the tumor into the mandible is observed on computed tomography (CT) scan. In addition to neck dissection, the most appropriate surgical treatment is:", "opts": {"A": "Wide local excision.", "B": "Transoral robotic surgery", "C": "Transoral laser surgery.", "D": "Marginal mandibulectomy.", "E": "Segmental mandibulectomy."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下頷骨齦 SCC＋全層皮質侵犯(full-thickness cortical invasion)＝腫瘤已穿透骨皮質→需 segmental mandibulectomy（節段性切除連續性中斷）＋重建。答案 E。⚠易混：marginal mandibulectomy（邊緣切除保留下緣連續性）僅適用於骨膜受累或表淺皮質侵犯，全層侵犯禁用邊緣切除。", "peropt": {"A": "✗ 廣泛局部切除不足以處理骨全層侵犯。", "B": "✗ TORS 不適用於已侵骨的下頷齦癌。", "C": "✗ 經口雷射手術不適用於骨全層侵犯。", "D": "✗ Marginal mandibulectomy 僅限骨膜/表淺皮質侵犯；全層侵犯禁用。", "E": "✓ 全層皮質侵犯需 segmental mandibulectomy（節段切除）＋游離骨瓣重建。"}, "cite": "Grabb&Smith 口腔癌下頷骨處理（marginal vs segmental）", "conflict": ""}, {"id": "4009", "sub": "HN2", "src": "GS", "years": [111, 113], "stem": "What is the number of esthetic subunits that compose the surface anatomy of the nose?", "opts": {"A": "Six.", "B": "Seven.", "C": "Eight.", "D": "Nine.", "E": "Ten."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻部美學亞單位＝9 個（dorsum、tip、columella、雙 sidewalls、雙 alae、雙 soft triangles）。答案 D(Nine)。與 CN4002 呼應：記住『9』這個數字，Burget & Menick 定義。", "peropt": {"A": "✗ 六個為錯。", "B": "✗ 七個為常見陷阱錯答（易與臉部亞單位混淆）。", "C": "✗ 八個為錯。", "D": "✓ 九個亞單位為正解。", "E": "✗ 十個為錯。"}, "cite": "Grabb&Smith 鼻亞單位（Burget & Menick, 9 subunits）", "conflict": ""}, {"id": "4010", "sub": "HN1", "src": "GS", "years": [111], "stem": "A 22-year-old woman was stabbed in the cheek during an altercation and brought immediately to the emergency room. She has unilateral difficulty with smiling. You suspect that she has suffered sharp laceration to zygomaticobuccal branches of the facial nerve on that side. She has no other obvious injuries. Ideally, the longest you should wait before bringing her to the operating room for exploration and repair is:", "opts": {"A": "24 hours.", "B": "72 hours.", "C": "1 week.", "D": "6 month.", "E": "36 months."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 銳器裂傷致顏面神經分支斷裂＋遠端斷端可定位→理想探查修復時窗為傷後『72 小時內』(答 B)，因遠端斷端在 Wallerian degeneration 前仍可用電刺激辨識。機制：>72h 神經傳導物質耗竭、遠端無法電刺激定位。此題與 CN4005-A 同一觀念的正向版。", "peropt": {"A": "✗ 24 小時非時窗上限（可等到 72h）。", "B": "✓ 72 小時為理想上限，遠端斷端仍可電刺激定位以利精準修復。", "C": "✗ 1 週已超過遠端可刺激時窗。", "D": "✗ 6 個月過晚。", "E": "✗ 36 個月過晚，屬慢性期需其他重建。"}, "cite": "Neligan facial nerve 銳傷修復時窗（72h）", "conflict": ""}, {"id": "4011", "sub": "HN6", "src": "GS", "years": [111, 113], "stem": "A 40-year-old man presents with a neck mass that is found to be SCC on FNA biopsy. Subsequent examination demonstrates that he has a tonsillar primary cancer that is positive for HPV on biopsy. Which of the following statements are false regarding HPV- positive oropharyngeal cancer? (複選)", "opts": {"A": "The cancer is contagious.", "B": "The patient should get an HPV vaccination.", "C": "The patient's spouse should get an HPV vaccination.", "D": "The patient's children should get HPV vaccinations.", "E": "This cancer is also frequently related to EBV infection."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 HPV+ 口咽癌衛教觀念：癌症本身不具傳染性(A 錯)；HPV 疫苗為預防性(prophylactic)非治療性，對已患病者無治療益處(B 錯)、配偶已可能暴露也非重點施打對象(C 錯)、但子女屬適齡預防接種對象；此癌與 EBV 無關(E 錯，EBV 相關為 NPC)。題問『false』→答 ABCE（D 為真：子女應接種）。", "peropt": {"A": "✓(false) 癌症本身不會傳染。", "B": "✓(false) 疫苗為預防性，對已患病者無治療效益。", "C": "✓(false) 配偶多已暴露，非以施打疫苗為重點處置。", "D": "✗(true) 子女接種 HPV 疫苗為合理預防，屬正確敘述故不選。", "E": "✓(false) 口咽 HPV+ 癌與 EBV 無關（EBV 相關者為鼻咽癌）。"}, "cite": "Grabb&Smith HPV 口咽癌衛教（疫苗為預防性）", "conflict": ""}, {"id": "4012", "sub": "HN4", "src": "GS", "years": [112, 113], "stem": "Which of the following statement is wrong about parotid gland tumors?", "opts": {"A": "Pleomorphic adenomas are treated by surgical excision and are associated with very low recurrence rates.", "B": "15% of pleomorphic adenomas may undergo malignant transformation into a lesion known as carcinoma ex pleomorphic adenoma.", "C": "High-grade mucoepidermoid carcinoma may progress rapidly and cause pain, nerve deficits, and local soft tissue invasion.", "D": "Mucoepidermoid carcinoma is the most common bilateral salivary gland tumor.", "E": "Adenoid cystic carcinoma is the second most common malignancy of the salivary glands, with 3 histologic subtypes: cribriform,tubular, and solid."}, "ans": "D", "multi": false, "etype": "ai", "expl": "Warthin tumors predominantly occur in males of 50 to 70 years of age, most frequently smokers, and are the most common bilateral salivary gland tumors (5%–14%).", "key": "🎯 唾液腺腫瘤最常見雙側者＝Warthin tumor（非 mucoepidermoid）。D 說 mucoepidermoid 最常雙側→錯，故為答 D。⚠A類跨年衝突：本題(GS112)官方答 D；GS114 同題原答 C 已依 Jason 裁定更正為 D（Warthin=最常見雙側）。機制記憶：Warthin＝老年男性吸菸者、雙側；pleomorphic adenoma 最常見良性、約 15% 惡性轉變(carcinoma ex pleomorphic adenoma)；mucoepidermoid＝最常見唾液腺惡性；adenoid cystic＝第二常見惡性、嗜神經侵犯。", "peropt": {"A": "✗ 正確：pleomorphic adenoma 手術切除、復發率低。", "B": "✗ 正確：約 15% 可惡性轉變為 carcinoma ex pleomorphic adenoma。", "C": "✗ 正確：高惡性度 mucoepidermoid 進展快、疼痛、神經缺損、局部侵犯。", "D": "✓(選此為答) 錯述：最常見雙側唾液腺腫瘤為 Warthin tumor，非 mucoepidermoid。", "E": "✗ 正確：adenoid cystic 為第二常見惡性，三亞型 cribriform/tubular/solid。"}, "cite": "原詳解：Warthin tumor 好發吸菸男性、最常見雙側(5–14%)", "conflict": "⚠A類跨年答案衝突【parotid tumors】GS112 答 D vs GS114 原答 C（已更正為 D）；作答錨定各年官方答案。"}, {"id": "4013", "sub": "HN1", "src": "GS", "years": [112, 113, 114], "stem": "Which of the following is not an advantage of contralateral facial nerve (via cross-facial nerve graft) for facial paralysis?", "opts": {"A": "The only donor capable of generating emotional control of smile.", "B": "Single-stage procedure when used in innervation of free muscle transfers.", "C": "Can use corresponding contralateral branches for blink.", "D": "No significant donor deficit", "E": "Capable of generating good excursion in smile."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Cross-facial nerve graft (CFNG) 的優缺：優點＝唯一能產生情緒性微笑、可用對側對應分支做眨眼、供區無顯著缺損、可產生良好微笑幅度。缺點＝『需分兩期(two-stage)』(先植神經graft待軸突長入babysitting，再接游離肌肉)，非單期。B 說 single-stage→非其優點，故答 B。", "peropt": {"A": "✗ 是優點：唯一能產生情緒控制微笑之供源。", "B": "✓(選此為答) 非優點：CFNG 常為分期手術（先 graft 後接肌肉），非單期。", "C": "✗ 是優點：可用對側對應分支達成眨眼。", "D": "✗ 是優點：供區無顯著功能缺損。", "E": "✗ 是優點：可產生良好微笑幅度。"}, "cite": "Neligan CFNG 優缺（分期特性）", "conflict": ""}, {"id": "4014", "sub": "HN5", "src": "GS", "years": [113], "stem": "關於面部移植的敘述，以下哪些是正確的？(請選擇所有正確答案) (複選)", "opts": {"A": "面部移植的患者普遍使用與上肢或實體器官移植相似的免疫抑制治療，其中以Sirolimus為主要用藥。", "B": "面部移植對於嚴重且毀容的顏面骨骼和軟組織損傷患者是唯一可行的正常面貌恢復選項。", "C": "幾乎所有接受面部移植的患者都在3至8個月內恢復了近乎正常的感覺功能，並且在6至18個月內恢復了一定程度的運動功能。", "D": "面部移植的功能結果難以統一量化，因為臉部功能的復雜性和受者傷害範圍的廣泛差異。", "E": "至少已有五例與面部移植相關的死亡報告，包括術後早期死亡、腫瘤復發死亡和免疫抑制不遵循導致的死亡。"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部移植綜合題，答案 BCDE。關鍵陷阱：主要免疫抑制並非以 Sirolimus 為主，而是與實體器官移植類似的『tacrolimus(calcineurin inhibitor)＋MMF＋steroid』三聯療法(A 錯)。BCDE 正確：對嚴重毀容者為唯一恢復近常面貌選項、感覺 3–8 月/運動 6–18 月漸恢復、功能結果難統一量化、已有≥5 例相關死亡(含免疫抑制不遵從)。", "peropt": {"A": "✗ 錯述：主力免疫抑制為 tacrolimus＋MMF＋類固醇，非以 Sirolimus 為主。", "B": "✓ 對嚴重毀容之顏面骨與軟組織損傷，臉部移植為唯一恢復近常面貌選項。", "C": "✓ 多數患者 3–8 月恢復近常感覺、6–18 月恢復部分運動功能。", "D": "✓ 因臉部功能複雜與傷害範圍差異，功能結果難統一量化。", "E": "✓ 已有≥5 例相關死亡（術後早期、腫瘤復發、免疫抑制不遵從）。"}, "cite": "待複查（Neligan facial transplantation 免疫抑制與結果，記憶佐證）", "conflict": ""}, {"id": "4015", "sub": "HN10", "src": "GS", "years": [113], "stem": "Which of the following statements is incorrect in the comparison of free anterolateral thigh (ALT) and jejunal flaps in hypopharyngeal reconstruction?", "opts": {"A": "The jejunal flap has a shorter tolerable ischemia time than the ALT flap.", "B": "The jejunal flap has no potential for external neck resurfacing and requires a second flap for reconstruction. C In follow-up, hypopharyngeal defects reconstructed with a jejunal flap have higher rates of fistula and stricture compared to those reconstructed with an ALT flap.", "C": "C In follow-up, hypopharyngeal defects reconstructed with a jejunal flap have higher rates of fistula and stricture compared to those reconstructed with an ALT flap.", "D": "There is a higher rate of return to oral diet in patients reconstructed with an ALT flap.", "E": "Distal anastomosis is most prone to leak in patients reconstructed with an ALT flap."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下咽重建 ALT vs jejunal 比較。此題問『錯的』→答 C。實情：jejunal 皮瓣缺血耐受短、無外頸皮重鋪能力需第二皮瓣、返回經口飲食率較 ALT 低；ALT 最易漏處為『遠端吻合(distal anastomosis)』。C 說 jejunal 瘻管與狹窄率『較 ALT 高』——實際上腸瓣濕潤黏膜通常吻合癒合佳、狹窄/瘻管率『不高於甚至低於』ALT，故 C 為錯述。⚠此題選項排版有重複(B/C 黏連)，以官方答 C 為準。", "peropt": {"A": "✗ 正確：jejunal 缺血耐受時間短於 ALT。", "B": "✗ 正確：jejunal 無外頸皮重鋪能力，需第二皮瓣。", "C": "✓(選此為答) 錯述：jejunal 之瘻管/狹窄率並非高於 ALT。", "D": "✗ 正確：ALT 重建者返回經口飲食率較高。", "E": "✗ 正確：ALT 重建以遠端吻合最易滲漏。"}, "cite": "待複查（ALT vs jejunal 下咽重建，記憶佐證）", "conflict": ""}, {"id": "4016", "sub": "HN6", "src": "GS", "years": [113], "stem": "Which of the innervation of the below common free flaps for oral cavity reconstruction is incorrect?", "opts": {"A": "Radial forearm flap, lateral antebrachial cutaneous nerve", "B": "Ulnar artery perforator flap, medial antebrachial cutaneous nerve", "C": "Anterolateral thigh (ALT) flap, lateral femoral cutaneous nerve", "D": "Profunda artery perforator (PAP) flap, motor branch to vastus lateralis", "E": "Lateral arm flap, posterior cutaneous nerve of forearm"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 口腔重建常用游離皮瓣的『感覺』神經配對：RFFF→lateral antebrachial cutaneous n.；ulnar perforator→medial antebrachial cutaneous n.；ALT→lateral femoral cutaneous n.；lateral arm→posterior cutaneous n. of forearm。PAP 皮瓣的感覺神經為 posterior femoral cutaneous nerve 分支，非『vastus lateralis 運動支』(那是 ALT 攜帶的運動神經)。D 錯，故答 D。", "peropt": {"A": "✗ 正確配對：RFFF - lateral antebrachial cutaneous n.。", "B": "✗ 正確配對：ulnar artery perforator - medial antebrachial cutaneous n.。", "C": "✗ 正確配對：ALT - lateral femoral cutaneous n.。", "D": "✓(選此為答) 錯誤：PAP 皮瓣感覺神經為 posterior femoral cutaneous n.分支，非 vastus lateralis 運動支。", "E": "✗ 正確配對：lateral arm - posterior cutaneous n. of forearm。"}, "cite": "待複查（口腔游離皮瓣感覺神經配對，記憶佐證）", "conflict": ""}, {"id": "4017", "sub": "HN7", "src": "GS", "years": [113], "stem": "Which of the following statements is correct regarding the application of Botulinum Toxin (BoNT) for chronic migraines? (複選)", "opts": {"A": "The pathophysiology of chronic migraines is still not completely understood. The current model suggests abnormal excitability in both central and peripheral neurons, particularly in the trigeminal neurovascular bundle.", "B": "There is still a lack of open-label clinical trials on BOTOX for chronic migraines.", "C": "BOTOX is thought to interrupt neurotransmitter release only, but not the release of neuropeptides from sensory neurons.", "D": "Chronic migraines are not yet indicated for BOTOX injection by the FDA.", "E": "BOTOX is currently used for the treatment of chronic migraines, defined as at least 15 days per month with headaches that last 4 hours or longer."}, "ans": "AE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 肉毒桿菌素治療慢性偏頭痛，答案 AE。慢性偏頭痛定義＝每月≥15 天、每次頭痛≥4 小時(E 正確)；病理生理未完全明瞭，模型為中樞與周邊神經(尤 trigeminal neurovascular bundle)異常興奮(A 正確)。錯誤選項：BOTOX 已有大量隨機對照試驗(非缺乏)、可抑制神經胜肽(CGRP 等)釋放非僅神經傳導物質、且已獲 FDA 核准用於慢性偏頭痛。", "peropt": {"A": "✓ 病生理未完全明瞭，模型含中樞與周邊(三叉神經血管束)神經異常興奮。", "B": "✗ 錯述：BOTOX 治慢性偏頭痛已有大量對照試驗（PREEMPT 系列），非缺乏。", "C": "✗ 錯述：BOTOX 亦抑制感覺神經之神經胜肽(如 CGRP)釋放，非僅神經傳導物質。", "D": "✗ 錯述：慢性偏頭痛已獲 FDA 核准 BOTOX 適應症。", "E": "✓ 慢性偏頭痛定義：每月≥15 天、每次≥4 小時。"}, "cite": "待複查（BoNT 慢性偏頭痛 PREEMPT/FDA，記憶佐證）", "conflict": ""}, {"id": "4018", "sub": "HN4", "src": "GS", "years": [114], "stem": "Which of the following statement is wrong about parotid gland tumors?", "opts": {"A": "Pleomorphic adenomas are treated by surgical excision and are associated with very low recurrence rates.", "B": "15% of pleomorphic adenomas may undergo malignant transformation into a lesion known as carcinoma ex pleomorphic adenoma.", "C": "High-grade mucoepidermoid carcinoma may progress rapidly and cause pain, nerve deficits, and local soft tissue invasion.", "D": "Mucoepidermoid carcinoma is the most common bilateral salivary gland tumor.", "E": "Adenoid cystic carcinoma is the second most common malignancy of the salivary glands, with 3 histologic subtypes: cribriform,tubular, and solid."}, "ans": "C", "multi": false, "etype": "ai", "expl": "Warthin tumors predominantly occur in males of 50 to 70 years of age, most frequently smokers, and are the most common bilateral salivary gland tumors (5%–14%).", "key": "🎯 唾液腺腫瘤（何者為非）。**官方答案 C（依原卷計分）**。⚠答案爭議：嚴格醫學上 D 才是錯述（Warthin＝最常見雙側，非 mucoepidermoid），GS112 同題官方即答 D；惟 GS114 此卷官方答 C，考試以 C 計分。記憶點：Warthin＝老年吸菸男/雙側；mucoepidermoid＝最常見惡性；adenoid cystic＝第二常見惡性、嗜神經。", "peropt": {"A": "✗ 正確敘述：pleomorphic adenoma 手術切除、復發率低。", "B": "✗ 正確敘述：約 15% 惡性轉變為 carcinoma ex pleomorphic adenoma。", "C": "◎ 考選部官方答案（依原卷計分選此）。⚠註：此敘述（高惡性度 mucoepidermoid 進展快、疼痛、神經缺損）醫學上其實正確，見爭議說明。", "D": "⚠ 此敘述其實才真正錯誤：最常見「雙側」唾液腺腫瘤為 Warthin，非 mucoepidermoid（GS112 同題即答 D）。但 GS114 本卷官方答 C，計分以 C 為準。", "E": "✗ 正確敘述：adenoid cystic 為第二常見惡性、嗜神經。"}, "cite": "原詳解＋Jason 裁定：Warthin=最常見雙側；ans 由 C 更正為 D", "conflict": "⚠A類跨年答案衝突【parotid tumors】GS114 原答 C（其詳解自相矛盾）已更正為 D；GS112 同題答 D。ans_original=C，更正依據 Warthin=最常見雙側，2026-07-10 Jason 裁定。 ｜ 2026-07-16 Jason 裁定：依原卷計分改回官方答 C（ans_original 記錄曾醫學更正為 D）。", "ans_original": "C"}, {"id": "4019", "sub": "HN1", "src": "GS", "years": [115], "stem": "A 45-year-old woman undergoes resection of a large left acoustic neuroma. The facial nerve is sacrificed at the level of the internal auditory canal during tumor extirpation. She presents to your clinic 3 weeks postoperatively with complete flaccid left facial paralysis. Proximal and distal facial nerve stumps are identified on review of the operative report. The nerve gap is estimated at 4 cm. Which of the following is the most appropriate initial reconstructive strategy?", "opts": {"A": "Tension-free direct nerve coaptation with 8-0 nylon suture", "B": "Cross-facial nerve graft (CFNG) alone using sural nerve, with the expectation of complete reinnervation within 6 months", "C": "Masseteric nerve transfer to distal facial nerve stump combined with cross-facial nerve graft (babysitter procedure)", "D": "Immediate free functional gracilis muscle transfer innervated by the masseteric nerve", "E": "Observation for 12 months to allow spontaneous recovery prior to any surgical intervention"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 acoustic neuroma 術中犧牲 FN、3 週後完全弛緩性麻痺、近遠端斷端皆可辨識、gap 4cm→肌肉尚未失神經萎縮(仍在時窗)。最佳初始策略＝babysitter procedure：masseteric nerve transfer 至遠端 FN 斷端『快速』提供神經支配防肌肉萎縮，合併 cross-facial nerve graft 待對側軸突長入以達自發情緒微笑。答 C。⚠易混：4cm gap 無法無張力直接縫合(A 錯)；CFNG 單獨 6 月內完全再支配不切實際、且延遲期間肌肉萎縮(B 錯)；肌肉尚可救援不需立即游離肌肉(D 過度)；觀察 12 月會錯過肌肉存活時窗(E 錯，此為醫源性離斷非 Bell)。", "peropt": {"A": "✗ 4cm gap 無法無張力直接吻合，需神經移植橋接。", "B": "✗ CFNG 單獨無法於 6 月內完全再支配，且等待期肌肉去神經萎縮。", "C": "✓ Babysitter：masseteric→遠端 FN 快速供養防萎縮＋CFNG 待自發情緒微笑，為最佳初始策略。", "D": "✗ 患側原生肌肉尚在時窗可救援，立即游離 gracilis 為過度處置。", "E": "✗ 醫源性完全離斷不會自發恢復，觀察 12 月將喪失肌肉存活時窗。"}, "cite": "待複查（babysitter procedure，記憶佐證）", "conflict": ""}, {"id": "4020", "sub": "HN8", "src": "GS", "years": [115], "stem": "A 58-year-old man undergoes right hemimandibulectomy including the condyle for a T4 squamous cell carcinoma of the right retromolar trigone. The defect extends to the right body and involves a posterior intraoral soft tissue defect in the retromolar region requiring mobile soft tissue coverage. CT angiography confirms three-vessel runoff bilaterally with no peronea magna variant. Virtual surgical planning is used to guide reconstruction. To ensure vascularization of all bone segments including the ramus, and to provide a mobile skin paddle for the intraoral defect, which of the following fibula flap configurations is most appropriate?", "opts": {"A": "Right (ipsilateral) fibula, orthotopic orientation — pedicle posteriorly, septum inferiorly", "B": "Right (ipsilateral) fibula, heterotopic orientation — pedicle anteriorly, septum superiorly", "C": "Left (contralateral) fibula, orthotopic orientation — pedicle anteriorly, septum inferiorly", "D": "Left (contralateral) fibula, heterotopic orientation — pedicle posteriorly, septum superiorly", "E": "Deep circumflex iliac artery (DCIA) flap from right side — pedicle anteriorly with internal oblique for intraoral lining"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Fibula 皮瓣重建下頷需兼顧『各骨段(含 ramus)血供＋可動 skin paddle 朝向口內缺損』。腓骨血供為 peroneal vessels 沿骨後內側骨膜、septum(隔膜)攜帶 skin paddle。右側 hemimandibulectomy＋口內後方軟組織缺損，選同側右腓骨、heterotopic(異位)擺位使 pedicle 朝前、septum 朝上→讓 skin paddle 轉入口內、pedicle 前伸接頸部受區血管並確保近端 ramus 段亦有血供。答 B。此為 VSP＋皮瓣定向的空間推理題，關鍵是 septum/skin paddle 需朝缺損側(口內=上內)。", "peropt": {"A": "✗ 正位(pedicle 後、septum 下)使 skin paddle 朝下外，無法覆蓋口內缺損。", "B": "✓ 同側右腓骨、異位(pedicle 前、septum 上)使 skin paddle 轉入口內並確保各骨段含 ramus 血供。", "C": "✗ 對側腓骨正位使幾何方向不利，且未達 skin paddle 朝口內。", "D": "✗ 對側異位方向組合不符缺損幾何。", "E": "✗ DCIA 皮瓣 skin paddle 笨重、可動性差，不適合需可動口內襯裡之此情境。"}, "cite": "待複查（fibula 定向 VSP 幾何，記憶佐證）", "conflict": ""}, {"id": "4021", "sub": "HN7", "src": "GS", "years": [115], "stem": "A 35-year-old woman presents with a 10-year history of chronic migraine headaches that begin at the temple, predominantly on one side, and are worse in the morning. She reports a history of teeth grinding at night and frequent jaw pain, for which she was previously diagnosed with temporomandibular joint disorder. Diagnostic nerve block of the involved nerve provides temporary relief. Which of the following structures is most likely responsible for nerve compression at this trigger point?", "opts": {"A": "Corrugator supercilii muscle compressing the supraorbital nerve", "B": "Semispinalis capitis muscle compressing the greater occipital nerve", "C": "Temporalis muscle, deep temporal fascia, or vessels compressing the zygomaticotemporal branch of the trigeminal nerve", "D": "Septal contact point irritating the nasal mucosal sensory branches of the maxillary nerve", "E": "Trapezius fascia compressing the lesser occipital nerve"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛 trigger site 定位：起於顳部、單側、晨起加重、合併磨牙(bruxism)/顳顎關節痛、診斷性神經阻斷可暫時緩解→Site II(顳側)＝zygomaticotemporal branch of trigeminal nerve 受 temporalis 肌/深顳筋膜/血管壓迫。答 C。Guyuron trigger site 對照：Site I 額(corrugator 壓 supraorbital/supratrochlear)、Site II 顳(ZT branch)、Site III 鼻(septal contact/turbinate)、Site IV 枕(greater occipital n. 受 semispinalis capitis 壓)、Site V/VI 次要。磨牙→顳肌活躍→壓迫 ZT branch 為此題線索。", "peropt": {"A": "✗ Corrugator 壓 supraorbital 為額部 Site I，非顳部表現。", "B": "✗ Semispinalis 壓 greater occipital 為枕部 Site IV。", "C": "✓ 顳肌/深顳筋膜/血管壓迫 zygomaticotemporal branch＝顳部 Site II，符合磨牙、晨起、單側顳痛。", "D": "✗ 鼻中隔接觸點刺激為鼻部 Site III。", "E": "✗ Trapezius 壓 lesser occipital 屬枕/頸部，非顳部。"}, "cite": "待複查（Guyuron 偏頭痛 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4022", "sub": "HN4", "src": "NG", "years": [104], "stem": "下列哪一唾液腺腫瘤,發生惡性的機率最高？", "opts": {"A": "腮腺", "B": "舌下腺", "C": "頷下腺", "D": "小唾液腺", "E": "耳下腺"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 唾液腺腫瘤『腺體越小、惡性比例越高』反比法則：腮腺(parotid)約 75-80% 良性、頷下腺約 50%、舌下腺與小唾液腺(minor salivary gland)惡性比例最高(可達 >80%)。答 D 小唾液腺。⚠易混：選項 A腮腺=E耳下腺為同一腺體(parotid)，故正解落在最小的小唾液腺。", "peropt": {"A": "✗ 腮腺(=耳下腺)良性佔多數(約 75-80%)。", "B": "✗ 舌下腺惡性比例高但小唾液腺更高。", "C": "✗ 頷下腺惡性約 50%。", "D": "✓ 小唾液腺惡性機率最高（腺體越小惡性比例越高之反比原則）。", "E": "✗ 耳下腺即腮腺，良性居多。"}, "cite": "Grabb&Smith 唾液腺腫瘤（腺體大小與惡性比反比）", "conflict": ""}, {"id": "4023", "sub": "HN9", "src": "NG", "years": [104], "stem": "有關sleep apnea之敘述，何者不正確？", "opts": {"A": "Obstruction occurs at three defined anatomic levels: nose, palate, and base of tongue.", "B": "Continuous positive airway pressure (CPAP) is the first line of treatment in adult patients with OSA.", "C": "Maxillomandibular advancement (MMA) aims to enlarge the velo-oropharyngeal airway and associated soft tissue by skeletal advancement.", "D": "An apnea–hypopnea index (AHI) of greater than 6 is diagnostic of OSA.", "E": "Physiologic and psychological changes accompany the sleep disturbance, including cardiovascular disease, daytime sleepiness, and decreased concentration and motor skills."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 OSA 診斷閾值：AHI（apnea-hypopnea index）>5 才診斷(非 >6)，D 錯故為答。其餘正確：阻塞三平面(鼻、顎、舌根)、CPAP 為成人首選、MMA(上下頷前移)擴大 velo-oropharyngeal 氣道、伴心血管病與日間嗜睡。記憶：AHI 5-15 輕、15-30 中、>30 重度。", "peropt": {"A": "✗ 正確：阻塞三平面—鼻、顎、舌根。", "B": "✗ 正確：CPAP 為成人 OSA 首選治療。", "C": "✗ 正確：MMA 藉骨骼前移擴大顎咽氣道。", "D": "✓(選此為答) 錯述：診斷閾值為 AHI>5，非 >6。", "E": "✗ 正確：伴心血管疾病、日間嗜睡、專注與動作技能下降。"}, "cite": "Neligan OSA（AHI>5 診斷、CPAP 首選）", "conflict": ""}, {"id": "4024", "sub": "HN3", "src": "NG", "years": [104], "stem": "針對scalp replantation之敘述，以下何者錯誤？", "opts": {"A": "對於整片的amputated scalp，replantation比起任何重建方式的outcome都好。", "B": "scalp replantation若能成功吻合一條superficial temporal artery就可以供應scalp存活。", "C": "scalp replantation只需要重接一條vein。", "D": "replantation通常會有大量的失血，術前需備血。。", "E": "若是病人hemodynamic unstable則視為scalp replantation的contraindication。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頭皮再植原則：整片撕脫頭皮再植 outcome 優於任何重建；一條 STA 可供全頭皮動脈灌流，但『靜脈回流不足』需重接『多條靜脈』(≥1 條動脈＋足夠靜脈)——C 說只需接一條靜脈→錯。機制：頭皮靜脈壓力低易鬱血，靜脈吻合不足→venous congestion 皮瓣失敗。大量失血需備血；血流動力不穩為禁忌。", "peropt": {"A": "✗ 正確：整片撕脫頭皮再植 outcome 優於重建。", "B": "✗ 正確：一條 STA 可供全頭皮動脈灌流。", "C": "✓(選此為答) 錯述：靜脈回流關鍵，通常需重接多條靜脈以防鬱血。", "D": "✗ 正確：常大量失血，術前需備血。", "E": "✗ 正確：血流動力不穩為再植禁忌。"}, "cite": "待複查（scalp replantation 靜脈回流，記憶佐證）", "conflict": ""}, {"id": "4025", "sub": "HN2", "src": "NG", "years": [104], "stem": "關於使用forehead flap重建鼻部，下列敘述何者錯誤？", "opts": {"A": "Forehead flap 的pedicle 為 supratrochlear vessels", "B": "設計皮瓣時，Pedicle 寬度約為1.2-1.5公分寬。", "C": "採用three-stage forehead flap重建鼻部，約在第一階段手術過後四週進行intermediate stage，將多餘的 subcutaneous fat 和frontalis muscle修剪去除。", "D": "通常donor site不容易primary closure，常常需要skin graft協助closure", "E": "在組織不足的forehead，也可以使用tissue expander增加組織面積協助重建"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Forehead flap 重建鼻部：pedicle＝supratrochlear vessels、蒂寬約 1.2-1.5cm、three-stage 於第一期後約 4 週行 intermediate stage 修薄(去多餘皮下脂肪與 frontalis)。錯誤在 D：額部供區血供極佳、彈性好，通常『可初級縫合(primary closure)』，罕需植皮，故 D 錯為答。組織不足時可先用擴張器。", "peropt": {"A": "✗ 正確：蒂為 supratrochlear vessels。", "B": "✗ 正確：蒂寬約 1.2-1.5cm。", "C": "✗ 正確：three-stage 於術後約 4 週行 intermediate 修薄。", "D": "✓(選此為答) 錯述：額部供區通常可初級縫合，罕需植皮。", "E": "✗ 正確：組織不足可用擴張器增加面積。"}, "cite": "Grabb&Smith forehead flap 鼻重建（supratrochlear、3-stage）", "conflict": ""}, {"id": "4026", "sub": "HN1", "src": "NG", "years": [104], "stem": "對於顏面神經麻痺的治療，下列敘述何者正確？", "opts": {"A": "對於單側lower lip plasy的患者，可以考慮切除健側的depressor labii inferioris，使兩側趨於對稱。", "B": "在上眼瞼植入金片來治療眼瞼閉合不全時，金片植入的位置愈靠近lid margin愈好。", "C": "對於單側神經麻痺的患者，使用健側的facial nerve合併cross-facial nerve graft來重建，優點是可以和健側產生spontaneous synchronous smile，但通常力量較弱。", "D": "選擇masseter nerve作為donor nerve來重建smile，即使經過復健和訓練，所有患者還是需要做咬合的動作才能產生smile，不可能有spontaneous smile。", "E": "\"babysitter procedure\"，是利用患側健全的masseter nerve或hypoglossal nerve來提供患側顏面肌肉temporary innervation，避免肌肉denervation atrophy。"}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面神經麻痺治療綜合，答案 ACE。正確：A 單側下唇麻痺可切除『健側』depressor labii inferioris 求對稱；C 健側 FN＋CFNG 可達自發同步微笑但力量較弱；E babysitter＝以患側健全 masseter/hypoglossal n. 暫時支配防去神經萎縮。錯誤：B 金片應植於接近上瞼板(tarsus)而非越靠 lid margin 越好(過近緣易外露/位移)；D masseter 驅動微笑經訓練後『部分患者可達自發微笑』，非全部須刻意咬合。", "peropt": {"A": "✓ 切除健側 depressor labii inferioris 使雙側下唇動態趨對稱。", "B": "✗ 錯述：金片位置非越靠 lid margin 越好，過近易外露/移位，應置於適當 tarsal 位置。", "C": "✓ 健側 FN＋CFNG 可產生自發同步微笑，惟力量通常較弱。", "D": "✗ 錯述：masseter 驅動經復健後部分患者可達近自發微笑，非全部須咬合誘發。", "E": "✓ babysitter＝以 masseter/hypoglossal 暫時供養防肌肉去神經萎縮。"}, "cite": "待複查（facial palsy 治療綜合，記憶佐證）", "conflict": ""}, {"id": "4027", "sub": "HN6", "src": "NG", "years": [104], "stem": "口腔癌切除後的自由皮瓣重建，以下哪項敘述為是？ (複選)", "opts": {"A": "病人最好能在術前及術後各戒煙至少兩週", "B": "Radial forearm flap是一塊很薄的fasciocutaneous flap，很適合Oral lining的 restoration。", "C": "Patient with child's class B or C cirrhosis had more complication than those with class A cirrhosis", "D": "DM 對口腔癌重建並非是risk factor", "E": "Advanced Age is a contraindication for extended-duration microsurgery"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 口腔癌游離皮瓣重建圍術期考量，答案 ABC。正確：A 術前後各戒菸≥2 週改善皮瓣結局；B RFFF 薄、柔軟，適合口腔內襯；C Child B/C 肝硬化併發症多於 Child A。錯誤：D DM 為重建危險因子(非非危險因子)；E 高齡『非』延時顯微手術的絕對禁忌，生理年齡與共病較重要。", "peropt": {"A": "✓ 術前後各戒菸≥2 週可改善皮瓣與傷口癒合。", "B": "✓ RFFF 為薄之筋膜皮瓣，適合口腔襯裡重建。", "C": "✓ Child B/C 肝硬化併發症高於 Child A。", "D": "✗ 錯述：DM 為重建危險因子。", "E": "✗ 錯述：高齡非延時顯微手術禁忌，須看生理狀態與共病。"}, "cite": "待複查（口腔癌重建圍術期，記憶佐證）", "conflict": ""}, {"id": "4028", "sub": "HN6", "src": "NG", "years": [104], "stem": "下列關於methods of surgical access to tumors of the head and neck何者為是?(複選)", "opts": {"A": "Trotter approach(Extension of the mandibulotomy)-- along the floor of the mouth for exposure of the tonsil or retromolartrigone or midline through the tongue and palate to expose the nasopharynx, posterior pharynx or supraglottic larynx", "B": "Caldwell-Luc approach—Unilateral exposure to the nose, sinuses, palate and orbit can be obtained", "C": "Weber-Ferguson approach—For access to the nose, paranasal sinuses and orbit, the incision in the superior alveolar sulcus", "D": "Midface degloving approach--Extension of the incision in the unilatero-superior alveolar sulcus across the midline and laterally along both sulci to provide access to the total midface", "E": "Lip splitting (labiotomy) incisions are usually planned as midline to allow the best symmetry and to avoid vascular embarrassment."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭頸腫瘤手術入路，答案 ADE。正確：A Trotter(mandibulotomy 延伸)沿口底暴露扁桃/retromolar 或中線經舌顎達鼻咽/後咽/聲門上；D midface degloving 經雙側齦頰溝跨中線暴露整個中臉；E 唇裂開切口多採中線以求對稱並避免血供受損。錯誤：B Caldwell-Luc 為上頷竇前壁進路(進上頷竇)非達鼻/竇/顎/眶之廣泛暴露(此描述誇大)；C Weber-Ferguson 切口為顏面(唇裂＋鼻側＋下瞼)非『superior alveolar sulcus』，敘述有誤。", "peropt": {"A": "✓ Trotter approach 描述正確。", "B": "✗ 錯述：Caldwell-Luc 為上頷竇前壁開窗進路，非該廣泛暴露描述。", "C": "✗ 錯述：Weber-Ferguson 為顏面皮膚切口(唇-鼻側-下瞼)，非上齦溝切口。", "D": "✓ Midface degloving 描述正確。", "E": "✓ 唇裂開切口採中線以求對稱、避免血供受損。"}, "cite": "待複查（頭頸手術入路，記憶佐證）", "conflict": ""}, {"id": "4029", "sub": "HN3", "src": "NG", "years": [104], "stem": "About local flaps design for facial coverage, which one is incorrect? (複選)", "opts": {"A": "There are only certain basic well-defined tissue manipulations; these are based on the concepts of advancement, transposition, and rotation.", "B": "An extensive subcutaneous pedicle dissection provides an extremely mobile flap. However, this mobilization will produce worse flap vascularization.", "C": "Rhomboid flap is frequently used in reconstruction of the defect of the forehead. Horizontal donor sites are preferred to vertical sites, which may cause an upward shift of the eyebrows or downward repositioning the forehead hairline", "D": "Large forehead reconstruction can be treated by tissue expander. Post-expansion size increases will decrease when the expander is removed and this must be taken into consideration", "E": "A scalp island flap based on the temporal blood supply or an alternative technique is micro-hair transplants with frequent trimming can be used for eyebrow reconstruction."}, "ans": "BC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面局部皮瓣設計，答案 BC(錯誤者)。B 錯：廣泛皮下蒂剝離雖增活動度，但保留皮下蒂本身即維持血供，『不必然使血供變差』(subcutaneous pedicle flap 靠蒂供血)。C 錯：額部 rhomboid 皮瓣『垂直』供區才順皮膚張力線；水平供區反而上移眉毛/下移髮際——選項將 horizontal 說成較佳為錯。正確：A 基本操作＝advancement/transposition/rotation；D 擴張後移除擴張器體積會回縮須預留；E 眉重建可用顳部血供島狀瓣或微植髮。", "peropt": {"A": "✗ 正確：局部皮瓣基本操作為推進/轉位/旋轉。", "B": "✓(錯述) 皮下蒂剝離維持蒂供血，不必然惡化血供。", "C": "✓(錯述) 額部 rhomboid 應以垂直供區順張力線；水平供區反造成眉/髮際位移。", "D": "✗ 正確：擴張後回縮須預留餘量。", "E": "✗ 正確：眉重建用顳部島狀瓣或微植髮。"}, "cite": "待複查（顏面局部皮瓣設計，記憶佐證）", "conflict": ""}, {"id": "4030", "sub": "HN7", "src": "NG", "years": [104], "stem": "Which are currently identified common trigger sites of migrane headache? (複選)", "opts": {"A": "Frontal trigger", "B": "Zygomatic trigger", "C": "occipital trigger", "D": "Septonasal trigger", "E": "Temporal triggers"}, "ans": "ACDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 偏頭痛常見 trigger sites：frontal(額)、temporal(顳)、occipital(枕)、septonasal(鼻中隔/鼻甲)、以及 auriculotemporal 等。答案 ACDE。B zygomatic『顴』非公認獨立 trigger site(顳側者為 zygomaticotemporal branch，但命名為 temporal trigger)，故不選。Guyuron 四大主要＋延伸位點記憶。", "peropt": {"A": "✓ Frontal trigger（supraorbital/supratrochlear）為主要位點。", "B": "✗ 『Zygomatic trigger』非公認獨立命名位點。", "C": "✓ Occipital trigger（greater occipital n.）為主要位點。", "D": "✓ Septonasal trigger（rhinogenic）為位點之一。", "E": "✓ Temporal trigger（zygomaticotemporal branch）為主要位點。"}, "cite": "待複查（偏頭痛 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4031", "sub": "HN4", "src": "NG", "years": [105], "stem": "以下有關耳下腺腫瘤的描述，何者為非？", "opts": {"A": "耳下腺瘤當中，約80%係為良性腫瘤", "B": "耳下腺分泌的唾液，成分以serous而非 mucus 為主", "C": "顏面神經係由stylomastoid foramen穿越出並離開顱骨 而stylomastoid foramen的位置係處在 styloid process, 前方", "D": "Fine needle aspiration (FNA)係為一重要的術前診斷工具", "E": "孩童的耳下腺瘤主要診斷是hemangioma"}, "ans": "C", "multi": false, "etype": "ai", "expl": "考生建議：選項E 新版好像沒提到是hemangioma or VM;反倒GS CHAPTER 37寫pleomorphic adenoma是成人跟小孩最常見的", "key": "🎯 耳下腺(腮腺)腫瘤：約 80% 良性；分泌以 serous 為主；FNA 為重要術前診斷。錯誤在 C：facial nerve 確經 stylomastoid foramen 出顱，但該孔位於 styloid process 之『後方(posterior)』，非前方——C 說前方故錯為答。⚠選項 E：原詳解提醒新版 GS 第37章載 pleomorphic adenoma 為成人與小孩最常見腮腺腫瘤(非 hemangioma)，故 E 亦有爭議；但本題官方答 C，作答錨定 C。", "peropt": {"A": "✗ 正確：腮腺瘤約 80% 為良性。", "B": "✗ 正確：腮腺唾液以 serous 為主。", "C": "✓(選此為答) 錯述：stylomastoid foramen 位於 styloid process『後方』，非前方。", "D": "✗ 正確：FNA 為重要術前診斷工具。", "E": "✗(官方視為正確) 傳統說法孩童腮腺瘤以 hemangioma 常見；惟新版 GS 指 pleomorphic adenoma 最常見，此選項有爭議，作答錨定官方答 C。"}, "cite": "原詳解：新版 GS ch37 稱 pleomorphic adenoma 成人與孩童最常見；本題錨定答 C", "conflict": "選項 E 之孩童最常見腫瘤說法新舊版本不一（hemangioma vs pleomorphic adenoma），本題官方答仍為 C。"}, {"id": "4032", "sub": "HN1", "src": "NG", "years": [105], "stem": "The average gold weight used to correct lagophthalmos problem for facial paralysis patient ranged about:", "opts": {"A": "0.3-0.8 gm", "B": "0.8-1.8 gm", "C": "1.8-3.0 gm", "D": "3.0-5.0 gm", "E": "5.0-8.0 gm"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面麻痺兔眼(lagophthalmos)上瞼金片(gold weight)平均重量約 0.8-1.8 gm(答 B)。機制：金片藉重力於閉眼時輔助上瞼下降；過輕無效、過重上瞼下垂/外露。臨床以術前試重(taping trial)決定。", "peropt": {"A": "✗ 0.3-0.8gm 偏輕，多不足。", "B": "✓ 平均 0.8-1.8gm 為常用範圍。", "C": "✗ 1.8-3.0gm 偏重易致下垂。", "D": "✗ 3.0-5.0gm 過重。", "E": "✗ 5.0-8.0gm 遠超範圍。"}, "cite": "待複查（gold weight 0.8-1.8g，記憶佐證）", "conflict": ""}, {"id": "4033", "sub": "HN9", "src": "NG", "years": [105], "stem": "Which of the following description about obstructive sleep apnea (OSA) is/are correct? (複選)", "opts": {"A": "OSA is associated with the development of left ventricular hypertrophy and stroke", "B": "An AHI of greater than 5 is diagnostic of OSA", "C": "CPAP therapy in OSA patients may decrease systemic blood pressure.", "D": "OSA affects 42% of adult men", "E": "First line of treatment in adult patients with OSA is surgery"}, "ans": "ABC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 OSA 描述，答案 ABC。正確：A 伴左心室肥厚與中風；B AHI>5 診斷；C CPAP 可降低全身血壓。錯誤：D 盛行率非 42%(男性約 4-24% 依定義，42% 過高)；E 成人 OSA 首選為 CPAP 非手術。", "peropt": {"A": "✓ OSA 與左心室肥厚、中風相關。", "B": "✓ AHI>5 為診斷閾值。", "C": "✓ CPAP 可降低全身血壓。", "D": "✗ 錯述：42% 盛行率過高，實際依定義約個位到二十餘 %。", "E": "✗ 錯述：成人 OSA 首選 CPAP，非手術。"}, "cite": "Neligan OSA（AHI>5、CPAP 首選）", "conflict": ""}, {"id": "4034", "sub": "HN3", "src": "NG", "years": [105], "stem": "Secondary facial reconstruction assumes a previous operative procedure, the cause of which is from congenital malformations to various types of trauma, including burns, ballistic injuries, motor vehicle accidents, and animal bites. Which of the following general principle of secondary facial reconstruction is incorrect?", "opts": {"A": "Restore to their normal location uninjured or partially injured anatomical features.", "B": "Repair scar contracture and if possible place the scars along the natural crease lines.", "C": "The presence of scars is more important than restoration of contour.", "D": "Use local flap options with better color and texture match as advancement or transposition flaps to provide better cutaneous coverage of de-epithelialized, previously placed distant free flaps that may have been used.", "E": "Carry out functional restoration of absent muscles of facial expression, especially for restitution of a smile and adequate closure of the eyelids and mouth. The options of free muscle transfer, with and without nerve grafts or local or regional muscle transfers of functioning muscle, can all be considered."}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 次級顏面重建通則，錯誤在 C。原則優先次序：『恢復輪廓(contour)重於疤痕存在與否』——C 反過來說疤痕比輪廓重要，故錯為答。正確：A 復位未傷/部分受傷結構；B 修復攣縮、疤痕沿自然紋線；D 用色澤質地佳之局部皮瓣覆蓋先前去表皮之遠端游離皮瓣；E 恢復表情肌功能(微笑、眼口閉合)可用游離肌肉±神經移植或局部/區域功能肌轉位。", "peropt": {"A": "✗ 正確：復位未傷或部分受傷之解剖結構。", "B": "✗ 正確：修復疤痕攣縮並沿自然紋線置放疤痕。", "C": "✓(選此為答) 錯述：輪廓重建優先於疤痕存在與否，非相反。", "D": "✗ 正確：以色澤質地佳的局部皮瓣覆蓋先前游離皮瓣。", "E": "✗ 正確：恢復表情肌功能，游離/局部肌肉±神經移植皆可考量。"}, "cite": "待複查（次級顏面重建通則，記憶佐證）", "conflict": ""}, {"id": "4035", "sub": "HN5", "src": "NG", "years": [105], "stem": "Facial transplant is a new arising field in plastic surgery, with only 20 transplants from November 2005 to February 2012. Which of the followings about facial transplant is incorrect?", "opts": {"A": "In practical immunosuppressive treatment, injection of antilymphocyte serum begins in the operating room just after the end anastomosis.", "B": "The induction protocol includes MMF(CellCeft), Tacrolimus, thymoglobulin, prednisolone, and antiviral prophylaxis.", "C": "The monitoring of the treatment requires accurate dosing in the days after surgery. For tacrolimus, it is necessary to have blood level of 10-15 ng/ml.", "D": "For the MMF, repeated testing is performed in the days after surgery to estimate the average concentration by using the area under curve(AUC), which should be in the range of 40-50 ng/ml.", "E": "The superficial temporalis pedicle perfuses at least 80% of the scalp and that the occipital artery is more important than posterior auricular arteries for scalp blood supply."}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部移植，錯誤在 E(移花接木鼻部/頭皮血供敘述誤植)。A-D 描述免疫抑制/監測(反淋巴球血清術中開始、誘導含 MMF/Tacrolimus/thymoglobulin/prednisolone/抗病毒、tacrolimus 目標血中 10-15 ng/ml、MMF 以 AUC 監測)。E 說 superficial temporal pedicle 灌注≥80% 頭皮且 occipital a. 比 posterior auricular 重要——與臉部移植免疫主題不符且血供敘述不確，為錯述故答 E。", "peropt": {"A": "✗ 正確：反淋巴球血清於術中吻合完成即開始。", "B": "✗ 正確：誘導含 MMF、Tacrolimus、thymoglobulin、prednisolone、抗病毒預防。", "C": "✗ 正確：tacrolimus 目標血中濃度約 10-15 ng/ml。", "D": "✗ 正確：MMF 以 AUC 監測平均濃度。", "E": "✓(選此為答) 錯述：此頭皮血供敘述與主題不符且不精確。"}, "cite": "待複查（臉部移植免疫抑制監測，記憶佐證）", "conflict": ""}, {"id": "4036", "sub": "HN3", "src": "NG", "years": [105], "stem": "Which of the followings is incorrect in using local flaps for facial coverage?", "opts": {"A": "in the forehead, horizonatal donor sites are preferred to vertical donor sites, which may cause an upward shift of the eyebrows or downward repositioning the forehead hairline.", "B": "the eyebrow is complex and reconstruction is difficult", "C": "In the bridgeline region of nasal reconstruction, the glabella is the preferred donor site.", "D": "By using the same principles as the Abbe flap on the lip, a similar reconstruction can be used for defects of the upper lid. The lower lid vessel is then divided at 2-3 weeks.", "E": "The methods using in lip reconstruction are Abbe flap, Fan flaps, Karapandzic technique, and Gillies fan flap."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面局部皮瓣，錯誤在 A（與 CN4029-C 同一觀念）。額部供區應以『垂直(vertical)』順張力線，水平供區會上移眉毛/下移髮際——A 說 horizontal 較佳故錯為答。正確：B 眉重建困難；C 鼻背區重建以 glabella 為佳供區；D 仿 Abbe flap 概念可重建上瞼、2-3 週斷蒂；E 唇重建法含 Abbe、Fan、Karapandzic、Gillies fan。", "peropt": {"A": "✓(選此為答) 錯述：額部應以垂直供區順張力線；水平供區致眉/髮際位移。", "B": "✗ 正確：眉毛結構複雜、重建困難。", "C": "✗ 正確：鼻背橋區以 glabella 為優先供區。", "D": "✗ 正確：仿 Abbe 概念可重建上瞼，2-3 週斷蒂。", "E": "✗ 正確：唇重建含 Abbe/Fan/Karapandzic/Gillies fan。"}, "cite": "待複查（顏面局部皮瓣、唇重建法，記憶佐證）", "conflict": ""}, {"id": "4037", "sub": "HN6", "src": "NG", "years": [105], "stem": "Which of the followings about oral cavity and oropharyngeal cancer is incorrect? (複選)", "opts": {"A": "The major risk factor is tobacco use which increases risk 7.5 times over nonsmokers.", "B": "The presence of nodal metastasis has a profound negative impact on patient survival, decreasing 5-year survival by 50%.", "C": "The American Cancer Society states that over 40% of patients with oral cavity and pharyngeal squamous cell carcinomas present with regional metastasis at their initial examination.", "D": "Levels I, III, and V are the highest risk for occult metastasis from oral cavity.", "E": "Modified neck dissection spares sternocleidomastoid muscle, external jugular vein, and spinal accessory nerve."}, "ans": "ADE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 口腔/口咽癌，答案 ADE(錯誤者)。A 錯：抽菸增加風險，但常引數約 5-9 倍依文獻，『7.5 倍』為過度精確之陷阱數值(本題判錯)。D 錯：口腔癌隱匿轉移最高風險為 Level I、II、III(非 I/III/V；IV、V 相對低)。E 錯：modified radical neck dissection 保留 SCM、internal jugular vein、spinal accessory n.(是 internal 非 external jugular)——選項說 external jugular 故錯。正確：B 淋巴轉移使 5 年存活降約 50%；C >40% 初診已區域轉移。", "peropt": {"A": "✓(錯述) 抽菸風險倍數敘述被判不精確。", "B": "✗ 正確：淋巴轉移使 5 年存活約降 50%。", "C": "✗ 正確：>40% 初診已有區域轉移。", "D": "✓(錯述) 口腔癌隱匿轉移高風險為 Level I/II/III，非 I/III/V。", "E": "✓(錯述) MRND 保留者為 internal jugular vein，非 external。"}, "cite": "待複查（口腔癌 neck level、MRND，記憶佐證）", "conflict": ""}, {"id": "4038", "sub": "HN7", "src": "NG", "years": [105], "stem": "Which of the followings about migraine headaches is incorrect? (複選)", "opts": {"A": "It is more common in males than females", "B": "There are two subtypes of migraine headaches: migraine with aura and migraine without aura", "C": "The four major trigger sites are: frontal, temporal, occipital, and parietal", "D": "All migraine headaches can be treated surgically", "E": "In the surgical evaluation of patients with migraine headaches, the trigger site can be confirmed by botulinum toxin A injection or nerve block. If the CT scan findings are strongly indicative of a specific trigger site, this step can be bypassed."}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 偏頭痛，答案 ACD(錯誤者)。A 錯：女性多於男性(約 3:1)。C 錯：四大 trigger site 為 frontal/temporal/occipital/『septonasal(rhinogenic)』，非 parietal。D 錯：並非所有偏頭痛皆可手術，須經 trigger site 確認且對神經阻斷/BoNT 有反應者。正確：B 偏頭痛分有先兆與無先兆兩型；E 以 BoNT 或神經阻斷確認 trigger site。", "peropt": {"A": "✓(錯述) 偏頭痛女性多於男性。", "B": "✗ 正確：分有先兆(with aura)與無先兆(without aura)兩型。", "C": "✓(錯述) 四大 trigger 為 frontal/temporal/occipital/septonasal，非 parietal。", "D": "✓(錯述) 並非所有偏頭痛皆可手術。", "E": "✗ 正確：以 BoNT 或神經阻斷確認 trigger site。"}, "cite": "待複查（偏頭痛流病與 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4039", "sub": "HN3", "src": "NG", "years": [106], "stem": "Which of the following statements about soft tissue injuries of the face is incorrect?", "opts": {"A": "Avulsed parts of the face can survive on surprisingly small pedicles, due to the good perfusion.", "B": "When considering secondary healing, convex surfaces of the nose, oral lips, helix of ear show better results than concave surfaces of the nose, eyes, and ears.", "C": "Total avulsion of the scalp is best treated with microsurgical replantation whenever possible", "D": "In situations with eyebrow defects, when possible, advance the lateral brow medially rather than advance the medial brow laterally.", "E": "Nonsurgical treatment of eyelid injuries with tissue loss is not advisable because the natural contraction may distort the lid."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面軟組織傷，錯誤在 B。二期癒合(secondary healing)：『凹面(concave)』如鼻凹、內眥、耳凹癒合結果較佳；『凸面(convex)』如鼻背凸、唇、耳輪易增生/攣縮致外觀差——B 把凸面說成優於凹面，恰相反故錯為答。正確：A 顏面撕脫部靠小蒂可存活(灌流佳)；C 全頭皮撕脫首選顯微再植；D 眉缺損宜將外側眉向內推(保留內側眉頭形態)；E 有組織缺損之眼瞼傷不宜非手術(收縮致變形)。", "peropt": {"A": "✗ 正確：顏面灌流佳，撕脫部靠小蒂可存活。", "B": "✓(選此為答) 錯述：凹面二期癒合較佳，凸面較差，選項說反。", "C": "✗ 正確：全頭皮撕脫首選顯微再植。", "D": "✗ 正確：眉缺損宜外側眉向內推。", "E": "✗ 正確：有組織缺損之眼瞼傷不宜非手術，收縮致變形。"}, "cite": "待複查（顏面軟組織傷二期癒合凹凸面，記憶佐證）", "conflict": ""}, {"id": "4040", "sub": "HN4", "src": "NG", "years": [106], "stem": "Which benign tumor is the most common tumor of the salivary glands?", "opts": {"A": "Pleomorphic adenoma", "B": "Monomorphic adenoma", "C": "Warthin's tumor", "D": "Oncocytoma", "E": "Hemangioma"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 唾液腺『最常見良性腫瘤』＝pleomorphic adenoma(多形性腺瘤)，答 A。與『最常見雙側＝Warthin』、『最常見惡性＝mucoepidermoid』三者需分清。記憶：pleomorphic 最常見整體與良性、好發腮腺淺葉、約 15% 惡變。", "peropt": {"A": "✓ Pleomorphic adenoma 為最常見唾液腺腫瘤(良性)。", "B": "✗ Monomorphic adenoma 少見。", "C": "✗ Warthin 為第二常見良性、最常見雙側，非整體最常見。", "D": "✗ Oncocytoma 罕見。", "E": "✗ Hemangioma 為孩童常見但非整體最常見良性。"}, "cite": "Grabb&Smith 唾液腺（pleomorphic adenoma 最常見）", "conflict": ""}, {"id": "4041", "sub": "HN2", "src": "NG", "years": [106], "stem": "Which statement about nasal reconstruction with the forehead flap is incorrect?", "opts": {"A": "The forehead flap is the first choice for most nasal repairs due to its superior color, texture, size, reach, vascularity, and forgiving donor site.", "B": "The paramedian forehead flap is based on the supratrochlear vessels.", "C": "The two-staged and three-staged method differ at the additional sculpturing of the undersurface of the flap between the two phases of flap elevation and pedicle division.", "D": "The pedicle is usually divided 3-4 weeks later for both two-staged and three-staged methods.", "E": "The unused pedicle can be returned to the donor site after division of the pedicle in cases when the donor site cannot be closed primarily."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 Forehead flap 鼻重建，錯誤在 D。斷蒂時機：paramedian forehead flap 通常於術後約『3 週』斷蒂(D 說 3-4 週且宣稱二/三期皆同，敘述被判錯)；二期與三期差別在兩階段間對皮瓣底面的額外修薄雕塑。正確：A 為多數鼻修補首選(色澤/質地/大小/到達/血供/供區佳)；B 基於 supratrochlear vessels；E 無法初縫時蒂可回置供區。", "peropt": {"A": "✗ 正確：forehead flap 為多數鼻修補首選。", "B": "✗ 正確：paramedian forehead flap 基於 supratrochlear vessels。", "C": "✗ 正確：二/三期差別在階段間底面修薄雕塑。", "D": "✓(選此為答) 錯述：斷蒂時機敘述不當（典型約 3 週，非一律 3-4 週且二三期相同）。", "E": "✗ 正確：未用之蒂可回置供區助關閉。"}, "cite": "待複查（paramedian forehead flap 斷蒂時機，記憶佐證）", "conflict": ""}, {"id": "4042", "sub": "HN10", "src": "NG", "years": [106], "stem": "Which statements about free flap reconstruction for hypopharyngeal reconstruction with the ALT flap, the jejunal flap, and the radial forearm flap are true?", "opts": {"A": "The ALT flap has the lowest donor site morbidity.", "B": "The jejunal flap has the lowest stricture rate.", "C": "Circumferential defects are best reconstructed with ALT or jejunal flaps.", "D": "The ALT flap is contraindicated in severely obese patients.", "E": "Comparing to the ALT and radial forearm flaps, the time of postoperative barium swallowing study should be performed later in jejunal flaps."}, "ans": "ACD", "multi": true, "etype": "ai", "expl": "考生建議：由於neligan 和 GS 對於stricture and fistula rate 有不同見解 建議此類型題目刪除", "key": "🎯 下咽游離皮瓣(ALT/jejunal/RFFF)，答案 ACD。正確：A ALT 供區併發症最低；C 環周(circumferential)缺損以 ALT 或 jejunal 重建最佳；D ALT 於嚴重肥胖者為相對禁忌(皮瓣過厚)。⚠爭議：B 狹窄率、E 鋇劑吞嚥時機——原詳解註 Neligan 與 GS 對 stricture/fistula rate 見解不同，考生曾建議刪題；本題官方取 ACD，作答錨定官方。", "peropt": {"A": "✓ ALT 供區併發症最低。", "B": "✗ 狹窄率比較有版本爭議，本題不選。", "C": "✓ 環周缺損以 ALT 或 jejunal 重建最佳。", "D": "✓ ALT 於嚴重肥胖者相對禁忌（皮瓣過厚）。", "E": "✗ 鋇劑吞嚥時機敘述有爭議，本題不選。"}, "cite": "原詳解：Neligan vs GS 對 stricture/fistula 見解不同；本題錨定官方答 ACD", "conflict": "Neligan 與 GS 對 hypopharyngeal 皮瓣 stricture/fistula rate 見解不一，跨書衝突，作答錨定該年官方答案 ACD。"}, {"id": "4043", "sub": "HN8", "src": "NG", "years": [106, 112], "stem": "有關head and neck cancer的放射性骨壞死(osteoradionecrosis, ORN),下列敘述何者正確? (複選)", "opts": {"A": "The incidence of ORN increases with more intensive radiation therapy (>4000 Gray).", "B": "The mandible is the bone most commonly affected by ORN.", "C": "Healthy muscle covering the bone is helpful for avoiding ORN.", "D": "Extraction of diseased teeth should be carried out at least 6 weeks prior to radiation", "E": "Prophylactic fluoride therapy 可prevent radiation caries."}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭頸癌放射性骨壞死(ORN)，答案 BCE(正確者)。B 下頷骨(mandible)為最易受 ORN 侵犯之骨(血供較上頷差、密質骨、放療劑量高)；C 健康肌肉覆蓋骨面有助避免 ORN(血供保護)；E 預防性氟化物治療可預防放射性齲齒(radiation caries)。錯誤：A ORN 顯著上升在放射 >60(常述 >65)Gray，非 >4000 Gray(4000 cGy=40Gy 過低，且 4000 Gray 單位誤植)；D 病牙拔除應在放療前『至少 2-3 週(≥14-21 天)』完成以利癒合，非 6 週(選項數值本題判不取)。⚠與 CN4007 ORN 危險因子呼應。", "peropt": {"A": "✗ 錯述：ORN 上升在 >60-65 Gy；『>4000 Gray』單位/門檻敘述有誤。", "B": "✓ 下頷骨為 ORN 最常受侵犯之骨。", "C": "✓ 健康肌肉覆蓋骨面（血供）有助避免 ORN。", "D": "✗ 本題未取：病牙拔除宜於放療前至少約 2-3 週完成，非 6 週。", "E": "✓ 預防性氟化物治療可預防放射性齲齒。"}, "cite": "待複查（ORN 好發下頷、拔牙時機、氟化物，記憶佐證）", "conflict": ""}, {"id": "4044", "sub": "HN5", "src": "NG", "years": [106], "stem": "哪些facial tissue elements 的破壞是indications for facial transplantation列為重要的考量? (複選)", "opts": {"A": "facial nerves", "B": "masseteric muscle", "C": "orbicularis occuli muscle", "D": "frontalis muscle", "E": "orbicularis oris muscle"}, "ans": "CE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部移植的重要適應考量在於『無法以傳統重建復原之關鍵表情/括約肌功能單位』被破壞，尤其 orbicularis oculi(眼輪匝肌，眼閉合)與 orbicularis oris(口輪匝肌，口括約)——答 CE。這兩者的環狀括約功能傳統皮瓣難重建，為移植主要適應。masseter(咀嚼非表情)、frontalis(額肌，非關鍵括約)、facial nerve 本身(可經神經重建)相對非核心適應考量。", "peropt": {"A": "✗ Facial nerve 破壞可經神經重建/移植處理，非移植的核心組織適應。", "B": "✗ Masseter 為咀嚼肌，非表情括約單位。", "C": "✓ Orbicularis oculi 破壞（眼閉合括約）為移植重要考量。", "D": "✗ Frontalis 非關鍵括約單位。", "E": "✓ Orbicularis oris 破壞（口括約，如彈道傷）為移植重要考量。"}, "cite": "待複查（臉部移植適應之括約肌單位，記憶佐證）", "conflict": ""}, {"id": "4045", "sub": "HN7", "src": "NG", "years": [106, 107, 112], "stem": "The four major trigger sites of migraine headaches, except", "opts": {"A": "frontal", "B": "temporal", "C": "occipital", "D": "parietal", "E": "septonasal"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛四大主要 trigger site＝frontal、temporal、occipital、septonasal(rhinogenic)。題問 except→答 D parietal(頂部非主要位點)。與 CN4038-C 同觀念。", "peropt": {"A": "✗ Frontal 為主要位點。", "B": "✗ Temporal 為主要位點。", "C": "✗ Occipital 為主要位點。", "D": "✓ Parietal 非四大主要 trigger site，為正解(except)。", "E": "✗ Septonasal 為四大主要位點之一。"}, "cite": "待複查（偏頭痛四大 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4046", "sub": "HN3", "src": "NG", "years": [107], "stem": "針對anterior hearline scalp defect，下列何種local flap較適合?", "opts": {"A": "Orticochea flap", "B": "Juri flap", "C": "Pinwheel flap", "D": "Mustarde flap", "E": "Karapandzic flap"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 前髮際(anterior hairline)頭皮缺損重建首選＝Juri flap(顳頂枕帶毛髮之延遲軸型皮瓣)，可攜帶毛髮修復前髮際、方向自然。答 B。易混：Orticochea(三瓣頭皮閉合)、pinwheel(多旋轉瓣)為一般頭皮閉合；Mustardé(頰旋轉瓣，眼周)、Karapandzic(唇)皆非頭皮髮際用。", "peropt": {"A": "✗ Orticochea 為一般頭皮多瓣閉合，非專為髮際。", "B": "✓ Juri flap 帶毛髮之顳頂枕延遲軸型瓣，適合前髮際缺損。", "C": "✗ Pinwheel flap 為一般頭皮旋轉瓣。", "D": "✗ Mustardé flap 用於頰/眼周。", "E": "✗ Karapandzic 用於唇重建。"}, "cite": "待複查（Juri flap 前髮際，記憶佐證）", "conflict": ""}, {"id": "4047", "sub": "HN2", "src": "NG", "years": [107], "stem": "有關forehead flap 下列敘述何者錯誤?", "opts": {"A": "被視為大部分鼻部重建的第一選擇", "B": "若採取二階段手術，則約3-4周後可將flap division", "C": "Donor site可以primary closure 或 secondary healing", "D": "Pedicle 為supraorbital artery", "E": "Pedicle寬度大約1.2-1.5cm"}, "ans": "D", "multi": false, "etype": "ai", "expl": "[考生建議：題目改成paramedian forehead flap，若泛稱forehead flap 則supraorbital artery其實也可以用]", "key": "🎯 Forehead flap，錯誤在 D：paramedian forehead flap 蒂為『supratrochlear artery』，非 supraorbital。答 D。⚠原詳解提醒：若泛稱 forehead flap，supraorbital a. 其實亦可為蒂，題目宜改成 paramedian forehead flap；作答錨定官方答 D。正確：A 為多數鼻重建首選；B 二期約 3-4 週斷蒂；C 供區可初縫或二期癒合；E 蒂寬約 1.2-1.5cm。", "peropt": {"A": "✗ 正確：為多數鼻重建首選。", "B": "✗ 正確：二期約 3-4 週斷蒂。", "C": "✗ 正確：供區可初縫或二期癒合。", "D": "✓(選此為答) 錯述：paramedian forehead flap 蒂為 supratrochlear a.，非 supraorbital。", "E": "✗ 正確：蒂寬約 1.2-1.5cm。"}, "cite": "原詳解：泛稱 forehead flap 時 supraorbital 亦可；本題錨定官方答 D", "conflict": "若泛稱 forehead flap，supraorbital a. 亦可作蒂；本題以 paramedian 標準答 D 為準。"}, {"id": "4048", "sub": "HN1", "src": "NG", "years": [107], "stem": "下列何者不是較常使用的functional muscle transplantation 治療facial paralysis?", "opts": {"A": "Gracilis", "B": "Pectoralis major", "C": "Rectus abdominis", "D": "Latissimus dorsi", "E": "Serratus femoris"}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 治療顏面麻痺常用的功能性游離肌肉：gracilis(最常用)、pectoralis minor、rectus abdominis、latissimus dorsi、serratus anterior。題問『非』常用→答 B(此處 pectoralis major 少用於臉部 reanimation；常用者為 pectoralis minor)。⚠注意：選項 E『serratus femoris』為虛構名詞(無此肌)，但官方答為 B。gracilis 因蒂長、供區隱蔽、閉孔神經可靠為首選。", "peropt": {"A": "✗ Gracilis 為最常用功能肌，為常用者。", "B": "✓(選此為答) Pectoralis major 非常用於臉部 reanimation（常用者為 pectoralis minor）。", "C": "✗ Rectus abdominis 為可用之功能肌。", "D": "✗ Latissimus dorsi 為可用之功能肌。", "E": "✗ 『serratus femoris』實為不存在之名詞；官方以 B 為答，此選項亦非常用選項。"}, "cite": "待複查（facial reanimation 功能肌選擇，記憶佐證）", "conflict": ""}, {"id": "4049", "sub": "HN8", "src": "NG", "years": [107], "stem": "複選2. 選擇fibula osteoseptocutaneous flap重建左側mandibule合併口內缺損時，考量其方向性，以下何者正確? (複選)", "opts": {"A": "取左側fibula，pedicle走前側頸部，血管可接左側頸部", "B": "取左側fibula，pedicle走前側頸部，血管可接右側頸部", "C": "取左側fibula，pedicle走外側頸部，血管可接左側頸部", "D": "取右側fibula，pedicle走前側頸部，血管可接右側頸部", "E": "取右側fibula，pedicle走外側頸部，血管可接左側頸部"}, "ans": "ABE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Fibula OSC flap 重建『左側』下頷＋口內缺損之方向性，答案 ABE。腓骨 peroneal pedicle 位於後內側，取瓣後蒂端多從一端引出接頸部血管；本題官方取 ABE＝(A)左腓骨蒂前接左頸、(B)左腓骨蒂前接右頸、(E)右腓骨蒂外側接左頸皆列為可行方向組合，反映臨床可依 pedicle 幾何、可用受區血管(同/對側)彈性選擇。重點：septocutaneous perforator 需朝口內以供皮島襯裡。", "peropt": {"A": "✓ 左腓骨、蒂走前側頸、接左頸血管—方向可行。", "B": "✓ 左腓骨、蒂走前側頸、接右頸血管—跨中線接對側受區亦可行。", "C": "✗ 蒂走外側頸接左頸之組合本題未取。", "D": "✗ 右腓骨蒂前接右頸之組合本題未取。", "E": "✓ 右腓骨、蒂走外側頸、接左頸—對側取瓣接患側受區可行。"}, "cite": "待複查（fibula 方向性與受區選擇，記憶佐證）", "conflict": ""}, {"id": "4050", "sub": "HN4", "src": "NG", "years": [107], "stem": "複選3. 下列有關Salivary gland tumor 何者正確? (複選)", "opts": {"A": "高惡性度的腫瘤在MRI T2下會呈現高訊號的表現", "B": "Warthin's tumor 是最常見的salivary gland tumor", "C": "Mucoepidermoid carcinoma是最常見的malignancy of salivary glands", "D": "Squamous cell carcinoma 有高度 regional nodal metastases 的機會", "E": "Frey syndrome 是因為parotidctomy時將交感和副交感神經一併切斷，副交感神經 regeneration 時卻接上原先由交感神經支配的汗腺所導致"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 唾液腺腫瘤，答案 CDE(正確者)。C mucoepidermoid＝最常見唾液腺惡性；D 唾液腺 SCC 高區域淋巴轉移；E Frey syndrome＝腮腺術後交感/副交感被切斷，副交感再生錯接原交感支配之汗腺→進食時患側潮紅出汗(auriculotemporal syndrome)。錯誤：A 高惡性度腫瘤 MRI T2 常呈『低訊號』(細胞密、含水少)非高訊號；B 最常見唾液腺腫瘤為 pleomorphic adenoma 非 Warthin。", "peropt": {"A": "✗ 錯述：高惡性度腫瘤 T2 常呈低訊號（細胞緻密），非高訊號。", "B": "✗ 錯述：最常見唾液腺腫瘤為 pleomorphic adenoma，非 Warthin。", "C": "✓ Mucoepidermoid carcinoma 為最常見唾液腺惡性。", "D": "✓ 唾液腺 SCC 有高區域淋巴轉移機會。", "E": "✓ Frey syndrome 機轉為副交感錯接汗腺（味覺性出汗）。"}, "cite": "待複查（唾液腺 MRI/Frey syndrome，記憶佐證）", "conflict": ""}, {"id": "4051", "sub": "HN6", "src": "NG", "years": [107], "stem": "Which of the followings is correct regarding to oral reconstruction after tumor excision?", "opts": {"A": "The reconstruction of the defect should begin with repair of the orbicularis oris.", "B": "For all oral cavity sites, over 90% of all malignant lesions are squamous cell carcinoma (SCC).", "C": "The sequelae of radiation treatment include trismus, xerostomia, dental caries and potential for osteoradionecrosis", "D": "Larger reconstructions, using Karapandzic or fan flaps, will cause significant microstoma", "E": "All of them"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 腫瘤切除後口腔重建，答案 E(以上皆對)。B 口腔各部位 >90% 惡性為 SCC；C 放療後遺症＝牙關緊閉(trismus)、口乾(xerostomia)、齲齒、ORN 風險；D 大範圍以 Karapandzic/fan flap 重建易致小口(microstomia)。A『以修復 orbicularis oris 為起始』對口周/唇重建成立。故 E。", "peropt": {"A": "✗(屬正確) 唇/口周重建以恢復 orbicularis oris 為起始原則。", "B": "✗(屬正確) 口腔各部位 >90% 惡性為 SCC。", "C": "✗(屬正確) 放療後遺症含 trismus/xerostomia/齲齒/ORN。", "D": "✗(屬正確) 大範圍 Karapandzic/fan 重建易致小口。", "E": "✓ 以上皆正確，為正解。"}, "cite": "待複查（口腔重建原則與放療後遺症，記憶佐證）", "conflict": ""}, {"id": "4052", "sub": "HN6", "src": "NG", "years": [107], "stem": "〔複選〕\n複選1. 關於頭頸癌，下列哪些敘述為真？(複選)", "opts": {"A": "Cancer of the oral cavity and pharynx is thought to be caused by accumulated genetic alteration initiated by toxins from tobacco", "B": "Surgery or radiotherapy are both effective in early stage tumors", "C": "surgery followed by postoperative adjuvant radiotherapy is preferable in Stage III or above tumors", "D": "serious complications after surgery and radiotherapy are osteoradionecrosis, carotid exposure, fistula and hemorrhage", "E": "According to TNM clinical staging system for lip and oral cavity, N2 stands for Single ipsilateral node <3 cm"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭頸癌，答案 ABCD(真)。A 菸草毒素累積基因改變致癌；B 早期腫瘤手術或放療皆有效；C Stage III 以上首選手術＋術後輔助放療；D 手術/放療嚴重併發症＝ORN、頸動脈外露、瘻管、出血。錯誤：E TNM 分期 N2 定義非『單一同側 <3cm』(那是 N1)——N2 含單一同側 3-6cm 或多顆/對側，故 E 為錯不選。", "peropt": {"A": "✓ 菸草毒素累積基因改變致口咽癌。", "B": "✓ 早期腫瘤手術或放療皆有效。", "C": "✓ Stage III↑首選手術＋術後放療。", "D": "✓ 嚴重併發症含 ORN、頸動脈外露、瘻管、出血。", "E": "✗ 錯述：N1 才是單一同側 <3cm；N2 為 3-6cm 或多顆/對側，故不選。"}, "cite": "待複查（頭頸癌 TNM N 分期，記憶佐證）", "conflict": ""}, {"id": "4053", "sub": "HN5", "src": "NG", "years": [107], "stem": "複選2. Which of the followings regarding to facial transplantation are correct? (複選)", "opts": {"A": "Indication for face transplant is a combination of three elements: the defect, the patient, and the transplantation team.", "B": "The facial defect can be summarized in two types of transplant: upper face transplant for orbicularis occuli and lower face transplant for orbicularis oris", "C": "The transplant can be limited to the lower face when the orbicularis oris is destroyed, which can be seen in ballistic trauma", "D": "The indication is limited to the anatomical aspect of the defect and no need to concern about the immunological, nor the psychological aspect.", "E": "Contraindications are mostly psychological instability, borderline personalities, addiction, and any psychiatric disorder."}, "ans": "ABCE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 臉部移植，答案 ABCE(正確者)。A 適應＝缺損＋病人＋團隊三要素綜合；B 上臉移植(orbicularis oculi)vs 下臉移植(orbicularis oris)兩型；C 口輪匝肌破壞(如彈道傷)可限於下臉移植；E 禁忌多為心理不穩、邊緣型人格、成癮、精神疾患。錯誤：D 適應不能只看解剖，必須併同免疫學與心理層面評估，故 D 為錯不選。", "peropt": {"A": "✓ 適應為缺損、病人、團隊三要素綜合。", "B": "✓ 分上臉(orbicularis oculi)與下臉(orbicularis oris)移植兩型。", "C": "✓ 口輪匝肌破壞可限於下臉移植。", "D": "✗ 錯述：適應須併同免疫與心理評估，非僅解剖，故不選。", "E": "✓ 禁忌多為心理不穩、成癮、精神疾患。"}, "cite": "待複查（臉部移植適應與禁忌，記憶佐證）", "conflict": ""}, {"id": "4054", "sub": "HN3", "src": "NG", "years": [107], "stem": "複選3. Which of the followings is incorrect in using local flaps for facial coverage? (複選)", "opts": {"A": "in the forehead, horizonatal donor sites are preferred to vertical donor sites, which may cause an upward shift of the eyebrows or downward repositioning the forehead hairline.", "B": "the eyebrow is complex and reconstruction is difficult", "C": "In the bridgeline region of nasal reconstruction, the glabella is the preferred donor site", "D": "By using the same principles as the Abbe flap on the lip, a similar reconstruction can be used for defects of the upper lid. The lower lid vessel is then divided at 2-3 weeks", "E": "The methods using in lip reconstruction are Abbe flap, Fan flaps, Karapandzic technique, and Gillies fan flap"}, "ans": "BCDE", "multi": true, "etype": "ai", "expl": "[考生建議：題幹錯誤 應改為何者正確]", "key": "🎯 ⚠題幹判讀陷阱！原詳解註『題幹錯誤，應改為何者正確』。本題官方答 BCDE——即以『何者正確』作答時 BCDE 為正確敘述，A(額部水平供區較佳)為錯述。與 CN4029/4036 同組。作答務必先確認該年題幹問法(何者錯/何者對)再套用。內容：B 眉重建困難、C 鼻背橋區以 glabella 為供區、D 仿 Abbe 上瞼重建 2-3 週斷蒂、E 唇重建法 Abbe/Fan/Karapandzic/Gillies fan。", "peropt": {"A": "✗ 錯述：額部應垂直供區順張力線，水平供區致眉/髮際位移。", "B": "✓ 眉毛結構複雜、重建困難。", "C": "✓ 鼻背橋區以 glabella 為優先供區。", "D": "✓ 仿 Abbe 概念重建上瞼，2-3 週斷蒂。", "E": "✓ 唇重建含 Abbe/Fan/Karapandzic/Gillies fan。"}, "cite": "原詳解：題幹問法有誤，應為『何者正確』；官方答 BCDE", "conflict": "題幹方向（何者錯/對）該年敘述有瑕疵，官方以 BCDE 為正確敘述作答。"}, {"id": "4055", "sub": "HN3", "src": "NG", "years": [108], "stem": "關於頭部軟組織損傷以下何者錯誤？", "opts": {"A": "眉毛髮根生長方向由中下(inferior-medial)向外上(superior-lateral)方向生長", "B": "眉毛外側撕裂傷可能造成面神經顳支損傷", "C": "一般來說小於 5 公分撕裂傷都可直接縫合", "D": "頭皮完全撕脫傷(Total scalp avulsion)可承受高達18小時冷缺血", "E": "頭皮完全撕脫傷(Total scalp avulsion)使用顯微再植可獲得最佳結果"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頭部軟組織傷，錯誤在 C。頭皮延展性低(galea 剛硬)，並非『<5cm 皆可直接縫合』——一般 <3cm 才較可初縫，>3cm 多需輔助技術，故 C 錯為答。正確：A 眉毛髮根由內下向外上生長(切開/縫合須順向避免禿眉)；B 外側眉撕裂可傷及顏面神經顳支；D 全頭皮撕脫可耐約 18 小時冷缺血；E 全頭皮撕脫顯微再植獲最佳結果。", "peropt": {"A": "✗ 正確：眉毛髮根由內下向外上生長。", "B": "✗ 正確：外側眉撕裂可傷顏面神經顳支。", "C": "✓(選此為答) 錯述：頭皮延展性低，非 <5cm 皆可直接縫合（一般 <3cm）。", "D": "✗ 正確：全頭皮撕脫可耐約 18 小時冷缺血。", "E": "✗ 正確：全頭皮撕脫顯微再植獲最佳結果。"}, "cite": "待複查（頭皮縫合極限、眉毛方向，記憶佐證）", "conflict": ""}, {"id": "4056", "sub": "HN7", "src": "NG", "years": [108], "stem": "常見的偏頭痛誘發點 (trigger site) 不包含何者？", "opts": {"A": "Septonasal trigger", "B": "Temporal trigger", "C": "Frontal trigger", "D": "Ocular trigger", "E": "Occipital trigger"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛 trigger site 不含者→答 D(Ocular)。四大主要位點＝frontal、temporal、occipital、septonasal(rhinogenic)；『ocular(眼)』非獨立 trigger site。與 CN4045/4038 同觀念。", "peropt": {"A": "✗ Septonasal 為 trigger site。", "B": "✗ Temporal 為 trigger site。", "C": "✗ Frontal 為 trigger site。", "D": "✓ Ocular 非 trigger site，為正解。", "E": "✗ Occipital 為 trigger site。"}, "cite": "待複查（偏頭痛 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4057", "sub": "HN2", "src": "NG", "years": [108], "stem": "關於鼻重建的原則，何者為真？", "opts": {"A": "為了安全起見，應盡量多取軟組織以避免組織不足", "B": "應多使用組織擴張器以增加Forehead flap 組織量", "C": "重建的結果主要跟疤痕的數量有關，應該盡量減少疤痕", "D": "依據傷口大小，為了達到好的重建結果，有時需要使用多個皮瓣或植皮", "E": "在做皮瓣轉移時為了避免植入物外露，不可同時放置支持結果"}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻重建原則，答 D(為真)。正確原則：依缺損大小，達良好結果有時需多個皮瓣或植皮組合(如襯裡＋支架＋覆蓋三層)。錯誤：A 應精準取量非盲目多取；B 非『多用』擴張器(視需要)；C 結果非主要取決於疤痕數量而是恢復亞單位與三層結構；E 皮瓣轉移時『應同時』放置軟骨支架防塌陷/攣縮，非不可放。", "peropt": {"A": "✗ 錯述：應依亞單位精準取量，非盲目多取。", "B": "✗ 錯述：擴張器視需要使用，非一律多用。", "C": "✗ 錯述：結果取決於亞單位與三層重建，非僅疤痕數量。", "D": "✓ 正確：依缺損大小，良好結果有時需多皮瓣或植皮。", "E": "✗ 錯述：皮瓣轉移應同時放支架防塌陷，非不可放。"}, "cite": "待複查（鼻重建三層原則，記憶佐證）", "conflict": ""}, {"id": "4058", "sub": "HN3", "src": "NG"
