, "years": [108], "stem": "下列何者是defect analysis of scalp reconstruction的考量要點?", "opts": {"A": "Location of the defect", "B": "Aesthetic subunits", "C": "Exposed structures", "D": "Surrounding soft tissue", "E": "All of them"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 頭皮重建缺損分析(defect analysis)考量＝缺損位置、美學亞單位、外露結構(顱骨/硬膜/血管)、周圍軟組織狀態→答 E(以上皆是)。此為系統性缺損評估，決定植皮/局部瓣/游離瓣之選擇。", "peropt": {"A": "✗(屬正確) 缺損位置為考量。", "B": "✗(屬正確) 美學亞單位為考量。", "C": "✗(屬正確) 外露結構為考量。", "D": "✗(屬正確) 周圍軟組織為考量。", "E": "✓ 以上皆為缺損分析要點，為正解。"}, "cite": "待複查（頭皮缺損分析要點，記憶佐證）", "conflict": ""}, {"id": "4059", "sub": "HN1", "src": "NG", "years": [108], "stem": "對於顏面神經麻痺的治療，下列敘述何者正確？(複選)", "opts": {"A": "對於單側 lower lip plasy 的患者，可以考慮切除健側的 depressor labii inferioris，使兩側趨於對稱。", "B": "在上眼瞼植入金片來治療眼瞼閉合不全時，金片植入的位置愈靠近 lid margin 愈好。", "C": "對於單側神經麻痺的患者，使用健側的 facial nerve 合併 cross-facial nerve graft 來重建，優點是可以和健側產生spontaneous synchronous smile，但通常力量較弱。", "D": "選擇 masseter nerve 作為 donor nerve 來重建 smile，即使經過復健和訓練，所有患者還是需要做咬合的動作才能產生 smile，不可能有 spontaneous smile。", "E": "\"babysitter procedure\"，是利用健側健全的 masseter nerve 或 hypoglossal nerve 來提供患側顏面肌肉 temporary innervation，避免肌肉 denervation atrophy。"}, "ans": "AC", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面麻痺治療(NG108版)，官方答 AC。與 CN4026(答 ACE)為同組跨年題但官方答略異——本題僅取 AC。A 切除健側 depressor labii inferioris 求下唇對稱；C 健側 FN＋CFNG 可自發同步微笑但力量弱。B 錯(金片非越靠 lid margin 越好)、D 錯(masseter 驅動經訓練部分可達近自發)、E 之 babysitter 敘述本題官方未取(注意 E 敘述『健側 masseter』用詞，機轉應為患側供養，跨年措辭差異)。⚠作答錨定該年官方答案。", "peropt": {"A": "✓ 切除健側 depressor labii inferioris 使下唇對稱。", "B": "✗ 錯述：金片非越靠 lid margin 越好。", "C": "✓ 健側 FN＋CFNG 可自發同步微笑但力量較弱。", "D": "✗ 錯述：masseter 驅動經復健部分患者可達近自發微笑。", "E": "✗ 本題官方未取（babysitter 措辭『健側』與機轉表述跨年有差異）。"}, "cite": "待複查（facial palsy 治療，NG108 官方答 AC）", "conflict": "與 CN4026(NG104)同組但官方答不同(AC vs ACE)，作答錨定各年官方答案。"}, {"id": "4060", "sub": "HN6", "src": "NG", "years": [108, 112, 114, 115], "stem": "關於頭頸鱗狀上皮癌(SCC)及人類乳突病毒(HPV)，下列何者為非？", "opts": {"A": "HPV為一種RNA病毒，有超過120種分型(subtypes) 。", "B": "HPV分型16可見於超過90%由HPV引發的頭頸部SCC。", "C": "與HPV相關的頭頸癌在男女性皆可見，預估至2020年，HPV引發的頭頸癌盛行率將超過同與HPV相關的子宮頸癌。", "D": "其產物E6及E7 protein，會與p53及retinoblastoma (Rb) gene 交互作用。", "E": "E6之致癌機轉為促進p53(腫瘤抑制蛋白)之降解。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 HPV 為『DNA 病毒』非 RNA 病毒——A 錯為答。機制：HPV 為雙股 DNA 病毒，>120 型；型 16 佔 HPV 相關頭頸 SCC >90%；E6 促 p53 降解、E7 抑制 Rb→細胞週期失控致癌。預估 HPV 頭頸癌盛行率將超越子宮頸癌。", "peropt": {"A": "✓(選此為答) 錯述：HPV 為 DNA 病毒，非 RNA 病毒。", "B": "✗ 正確：型 16 佔 HPV 相關頭頸 SCC >90%。", "C": "✗ 正確：HPV 頭頸癌盛行率預估超越子宮頸癌。", "D": "✗ 正確：E6/E7 與 p53/Rb 交互作用。", "E": "✗ 正確：E6 促 p53 降解。"}, "cite": "Grabb&Smith HPV 分子機制（DNA 病毒、E6/E7）", "conflict": ""}, {"id": "4061", "sub": "HN4", "src": "NG", "years": [108], "stem": "關於唾液腺腫瘤，何者為是？", "opts": {"A": "可分為三種，包括parotid, submandibular 及 minor salivary glands。", "B": "Parotid glands tumor最少見。", "C": "Minor salivary glands之腫瘤惡性機率最高，可達百分之九十五。", "D": "Pleomorphic adenoma是唾液腺第二常見的良性腫瘤。", "E": "Pleomorphic adenoma手術做parotidectomy而不是enucleation，可將復發率從4%降至1%。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 唾液腺腫瘤敘述，答 E(為是)。E 正確：pleomorphic adenoma 應行 parotidectomy(含安全邊緣)而非單純 enucleation，可將復發率由約 4% 降至 1%。錯誤：A 唾液腺分大(parotid/submandibular/sublingual)與 minor 而非僅三種且分類不全；B parotid tumor 最常見(非最少見)；C minor salivary gland 惡性率高但非 95%(過高)；D pleomorphic adenoma 為『最常見』良性(非第二常見)。", "peropt": {"A": "✗ 錯述：分類不全（尚有 sublingual）。", "B": "✗ 錯述：parotid tumor 最常見，非最少見。", "C": "✗ 錯述：minor salivary gland 惡性率高但非達 95%。", "D": "✗ 錯述：pleomorphic adenoma 為最常見良性，非第二常見。", "E": "✓ 正確：parotidectomy 優於 enucleation，復發率 4%→1%。"}, "cite": "待複查（唾液腺分類與復發率，記憶佐證）", "conflict": ""}, {"id": "4062", "sub": "HN5", "src": "NG", "years": [108, 112], "stem": "有關臉部移植(facial transplanataion)，何者為非？", "opts": {"A": "HIV及五年內的癌症仍為absolute contraindication。", "B": "對於失明(blindness)患者的臉部移植，許多人仍採保留態度。", "C": "失明患者若家庭支持不夠，可能因無法發現早期排斥而產生巨大損失。", "D": "因使用免疫抑制劑，de novo malignancy的機會是原本的2至4倍。", "E": "以上皆是。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部移植敘述，答 E(以上皆是為真→即 A-D 皆正確)。A HIV 及五年內癌症為絕對禁忌；B 失明者臉部移植多存保留態度；C 失明者若家庭支持不足，難察覺早期排斥致重大損失；D 免疫抑制致 de novo 惡性風險增 2-4 倍。故 E。", "peropt": {"A": "✗(屬正確) HIV 與五年內癌症為絕對禁忌。", "B": "✗(屬正確) 失明者臉部移植多存保留態度。", "C": "✗(屬正確) 失明＋家庭支持不足難察早期排斥。", "D": "✗(屬正確) 免疫抑制致 de novo 惡性增 2-4 倍。", "E": "✓ 以上皆是，為正解。"}, "cite": "待複查（臉部移植禁忌與風險，記憶佐證）", "conflict": ""}, {"id": "4063", "sub": "HN9", "src": "NG", "years": [109], "stem": "造成 obstructive sleep apnea 的physical characteristic 包含哪些?", "opts": {"A": "Body mass index over 35", "B": "Craniofacial abnormalities affecting the air way", "C": "Nasal obstruction", "D": "onsil hypertrophy", "E": "以上皆是"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 OSA 的身體特徵→答 E(以上皆是)。BMI>35(肥胖)、影響氣道之顱顏異常、鼻阻塞、扁桃腺肥大皆為 OSA 危險/身體特徵。多平面阻塞概念(鼻-顎-舌根)。", "peropt": {"A": "✗(屬正確) BMI>35 肥胖為特徵。", "B": "✗(屬正確) 顱顏異常影響氣道。", "C": "✗(屬正確) 鼻阻塞為特徵。", "D": "✗(屬正確) 扁桃腺肥大為特徵。", "E": "✓ 以上皆是，為正解。"}, "cite": "待複查（OSA 身體特徵，記憶佐證）", "conflict": ""}, {"id": "4064", "sub": "HN3", "src": "NG", "years": [109], "stem": "下列何者為是？ (複選)", "opts": {"A": "The risk of malignant degeneration of nevus sebaceous, mostly to squamous cell carcinoma, has been reported as anywhere from 10-15%, which is an indication for excision of these lesions.", "B": "Cicatrical scalp alopecia can be managed by the use of tissue expansion and subsequent flap advancement", "C": "Primary closure is possible for scalp defect up to a maximum of 2-3 cm in diameter", "D": "There are few regional flaps available for scalp reconstruction, one exception is the trapezius myocutaneous flap.", "E": "For the larger central defect involving glabella area, free flap is preferred to local transposition and advancement flaps"}, "ans": "BCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮重建概念(NG109版)，官方答 BCD(為是)。B 瘢痕性禿髮可用組織擴張＋皮瓣推進；C 頭皮缺損初縫上限約 2-3cm；D 頭皮區域瓣少，trapezius myocutaneous flap 為例外可用。錯誤：A nevus sebaceous 惡變率並非 10-15%(現代認為顯著較低，多為 basal cell 而非 SCC)；E glabella 區大中央缺損未必以游離瓣優於局部轉位/推進瓣。⚠與 CN4078 同族(選項數/敘述跨年略異)。", "peropt": {"A": "✗ 錯述：nevus sebaceous 惡變率被高估且多非 SCC。", "B": "✓ 瘢痕性禿髮可用組織擴張＋皮瓣推進。", "C": "✓ 頭皮缺損初縫上限約 2-3cm。", "D": "✓ 頭皮區域瓣少，trapezius myocutaneous 為例外。", "E": "✗ 錯述：glabella 區缺損未必游離瓣優於局部瓣。"}, "cite": "待複查（頭皮初縫上限、nevus sebaceous，記憶佐證）", "conflict": ""}, {"id": "4065", "sub": "HN2", "src": "NG", "years": [109], "stem": "關於aesthetic nasal reconstruction，下列何者為非？", "opts": {"A": "Despite of greater than 50% of nasal tip defect, do not discard adjacent normal tissue within the subunit", "B": "The reconstructive goal must be to restore the unit, rather than fill the hole", "C": "The nasal unit consists of the tip, dorsum, columella, and paired alae, sidewalls, and soft triangle subunits.", "D": "For nasal reconstruction, bilobed flap are designed with a 180 degree rotation.", "E": "Forehead flap is suitable for nasal reconstruction"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "考生建議：D也錯:新版已將此LOBE設計改為90~100度, 非180度", "key": "🎯 鼻美學重建，問『何者為非』，官方答 AD。A 錯：鼻尖缺損 >50% 亞單位時『應切除亞單位內鄰近正常組織』重建整個亞單位(subunit principle)，A 說不要捨棄故錯。D 錯：bilobed flap 傳統設計曾用大角度旋轉，⚠原詳解提醒『新版已改為 90-100 度』而非 180 度，故 D 亦錯。正確：B 目標恢復亞單位非填洞、C 鼻亞單位組成、E forehead flap 適合鼻重建。", "peropt": {"A": "✓(選此為答/為非) 錯述：>50% 亞單位受累應切除亞單位內鄰近正常組織重建整單位。", "B": "✗ 正確：目標恢復亞單位而非填洞。", "C": "✗ 正確：鼻亞單位組成敘述正確。", "D": "✓(選此為答/為非) 錯述：bilobed flap 新版設計為 90-100 度旋轉，非 180 度。", "E": "✗ 正確：forehead flap 適合鼻重建。"}, "cite": "原詳解：bilobed flap 新版 90-100 度；subunit principle", "conflict": "bilobed flap 旋轉角度新舊版不同（180 度→90-100 度），採新版觀念。"}, {"id": "4066", "sub": "HN8", "src": "NG", "years": [109, 111, 114, 115], "stem": "有關下頷骨mandibular reconstruction，下列何者有誤？", "opts": {"A": "最常使用free fibula flap。", "B": "Osteoradionecrosis屬於chronic complication。", "C": "OPAC(osteomyocutaneous peroneal artery combined) flap比起OSC(osteoseptocutaneous) flap較能預防osteoradionecrosis發生。", "D": "當發生osteoradionecrosis，最好的方法是wide excision。", "E": "Hyperbaric oxygen therapy(HBO)對osteoradionecrosis絕對有效。"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 下頷骨重建，問『有誤』，答 E。E 錯：高壓氧(HBO)對 ORN 『非絕對有效』，證據有限、非萬靈，嚴重者仍需清創＋游離骨瓣。正確：A 最常用 free fibula flap；B ORN 屬慢性併發症；C OPAC flap(帶較多肌肉血供)較 OSC 更能預防 ORN；D 確立之 ORN 最佳處置為 wide excision＋血管化重建。", "peropt": {"A": "✗ 正確：下頷重建最常用 free fibula flap。", "B": "✗ 正確：ORN 屬慢性併發症。", "C": "✗ 正確：OPAC 較 OSC 更能預防 ORN。", "D": "✗ 正確：確立之 ORN 最佳處置為 wide excision。", "E": "✓(選此為答) 錯述：HBO 對 ORN 非絕對有效，證據有限。"}, "cite": "待複查（ORN 處置、HBO 爭議，記憶佐證）", "conflict": ""}, {"id": "4067", "sub": "HN1", "src": "NG", "years": [109], "stem": "有關facial paralysis下列何者錯誤？", "opts": {"A": "可分成primary或secondary。", "B": "若facial paralysis < 12個月之內，則認為facial muscle尚可以re-innervation。", "C": "若facial paralysis超過12個月，則認為muscle出現irreversibly atrophy。", "D": "處置的方法包含static procedure 如sling的方法，或dynamic procedure如functional muscle transfer。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 ⚠facial paralysis 肌肉不可逆萎縮時窗跨年/跨版差異題！問『錯誤』，官方答 C。本題(NG109)版本：C 說『超過 12 個月 muscle 不可逆萎縮』被判為錯——因對照 NG111/NG114 版本改為『超過 10 個月』(Neligan 5e)，故此 12 個月敘述在本題被視為錯述。B 說 <12 月尚可 re-innervation。此為家族衝突題，作答務必錨定該年官方數字。正確概念：去神經肌肉存活時窗約 6-18 個月，版本間門檻不同。", "peropt": {"A": "✗ 正確：facial paralysis 可分 primary/secondary。", "B": "✗ 正確：<12 個月內肌肉尚可 re-innervation（該年版本）。", "C": "✓(選此為答) 本年判為錯：新版門檻改為 10 個月（NG111/114），非 12 個月。", "D": "✗ 正確：處置含 static(sling)與 dynamic(functional muscle transfer)。"}, "cite": "原詳解：跨年數值 12→10 個月（Neligan 4e→5e）", "conflict": "⚠跨年/跨版數值差異【facial paralysis 肌肉萎縮時窗】NG109『12 月』vs NG111/114『10 月』(Neligan 4e vs 5e)；跨年選項數不同視為不同題。作答錨定各年官方答案。"}, {"id": "4068", "sub": "HN1", "src": "NG", "years": [109], "stem": "下列何者可以是適當的muscle options for microneurovascular transplantation in facial paralysis？ (複選)", "opts": {"A": "Gracilis。", "B": "Latissimus dorsi。", "C": "Serratus anterior。", "D": "Abductor hallucis。", "E": "Extensor carpi radialis longus。"}, "ans": "ABCD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 顏面 reanimation 微神經血管游離肌肉選項，答 ABCD。Gracilis(最常用)、latissimus dorsi、serratus anterior、abductor hallucis 皆為可用功能肌。E extensor carpi radialis longus(前臂伸腕肌)非顏面 reanimation 標準游離肌選項故不選。gracilis 因蒂長、閉孔神經、供區隱蔽為首選。", "peropt": {"A": "✓ Gracilis 為最常用游離功能肌。", "B": "✓ Latissimus dorsi 可用（胸背神經）。", "C": "✓ Serratus anterior 可用。", "D": "✓ Abductor hallucis 可用（小型肌，適合眼周/局部）。", "E": "✗ Extensor carpi radialis longus 非顏面 reanimation 標準選項。"}, "cite": "待複查（顏面游離功能肌選項，記憶佐證）", "conflict": ""}, {"id": "4069", "sub": "HN2", "src": "NG", "years": [109, 111, 112], "stem": "關於鼻子解剖構造與重建的概念以下何者錯誤？ (複選)", "opts": {"A": "鼻尖(tip)與鼻翼(ala)的皮膚通常較薄且平滑", "B": "鼻樑(dorsum)與鼻側壁(sidewalls)的皮膚通常較厚且硬， 且含有皮脂腺(sebaceous gland)", "C": "通常可將鼻子分為以下次單位：鼻樑(dorsum)、鼻尖(tip) 、鼻小柱(columella)、鼻側壁(sidewalls)、鼻翼(alae)以及鼻軟三角(soft triangles)", "D": "根據鼻子次單位的概念，任何一部份之損傷大於20%，就應建議將整個單位切除方能進行重建", "E": "外科醫師需辨別需重建區域的大小、範圍、深度以及相關解剖位置，以利後續手術"}, "ans": "ABD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻解剖與重建，問『錯誤』，答 ABD。A 錯：鼻尖/鼻翼皮膚厚且皮脂腺多(非薄且平滑)。B 錯：鼻背/側壁皮膚薄可移動(非厚硬多皮脂腺)——AB 把厚薄區域『對調』故皆錯。D 錯：subunit principle 為受累『>50%』才切除整單位，非 >20%。正確：C 鼻亞單位組成、E 術前辨識缺損大小範圍深度與解剖位置。", "peropt": {"A": "✓(錯述) 鼻尖/鼻翼皮膚厚、多皮脂腺，非薄且平滑。", "B": "✓(錯述) 鼻背/側壁皮膚薄可移動，非厚硬多皮脂腺。", "C": "✗ 正確：鼻亞單位組成敘述正確。", "D": "✓(錯述) 亞單位切除門檻為 >50%，非 >20%。", "E": "✗ 正確：術前辨識缺損大小/範圍/深度/位置。"}, "cite": "Grabb&Smith 鼻皮膚厚薄分區與 subunit principle(>50%)", "conflict": ""}, {"id": "4070", "sub": "HN5", "src": "NG", "years": [109, 111], "stem": "下列那些免疫抑制劑(immunosuppression)不用在臉部移植的病人身上？", "opts": {"A": "Anti-IL-2Rαchain antibody(Daclizumab or Basiliximab)", "B": "Anti-CD52(alemtuzumab)", "C": "Mycophenolate mofetil(MMF)", "D": "FK506(tacrolimus)", "E": "Anti-PD-1 monoclonal antibody(Pembrolizumab)"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部移植『不用』的免疫抑制劑→答 E(Pembrolizumab, anti-PD-1)。PD-1 抑制劑為『免疫檢查點抑制劑(抗癌免疫刺激)』，會促進免疫反應→誘發排斥，與移植抗排斥目標相反，禁用於移植。A-D(daclizumab/basiliximab、alemtuzumab、MMF、tacrolimus)皆為移植常用免疫抑制/誘導藥。", "peropt": {"A": "✗ Anti-IL-2Rα(daclizumab/basiliximab)為誘導用免疫抑制。", "B": "✗ Alemtuzumab(anti-CD52)為誘導用免疫抑制。", "C": "✗ MMF 為維持用免疫抑制。", "D": "✗ Tacrolimus 為維持用免疫抑制。", "E": "✓ Pembrolizumab(anti-PD-1)為免疫刺激劑，誘發排斥，禁用於移植。"}, "cite": "待複查（免疫抑制 vs 檢查點抑制劑機轉，記憶佐證）", "conflict": ""}, {"id": "4071", "sub": "HN7", "src": "NG", "years": [110], "stem": "關於surgical treatment of migraine headaches 的描述,下列何者為非?", "opts": {"A": "Medical management is the first line of treatment, but poorly controlled or uncontrolled MH can be treated surgically, specifically since severe migraine could be disabling.", "B": "The four major trigger sites are frontal, temporal, occipital, and orbital", "C": "The temporal trigger site is treated by avulsion/decompression of the zygomaticotemporal branch of trigeminal nerve (ZTBTN) as it emerges from deep temporal fascia.", "D": "In the frontal trigger site, the supraorbital and supratrochlear nerves can be irritated by adjacent structures like frowning muscles, vessels, bands over the supra-orbital notch, or bony tunnel.", "E": "The occipital trigger site is located in the posterior part of the neck where the greater occipital nerve is passing through the semispinalis capitis muscle and trapezius fascia and crosses over the occipital artery."}, "ans": "B", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛手術，問『為非』，答 B。B 錯：四大 trigger site 為 frontal、temporal、occipital、『septonasal(rhinogenic)』，非 orbital。正確：A 藥物為第一線，難控者可手術；C 顳部以 avulsion/decompression ZTBTN(自深顳筋膜穿出處)處理；D 額部 supraorbital/supratrochlear n. 受皺眉肌/血管/眶上切跡帶狀/骨隧道刺激；E 枕部 greater occipital n. 穿 semispinalis capitis 與 trapezius 筋膜並跨越枕動脈。", "peropt": {"A": "✗ 正確：藥物第一線，難控者可手術。", "B": "✓(選此為答) 錯述：第四位點為 septonasal，非 orbital。", "C": "✗ 正確：顳部處理 ZTBTN。", "D": "✗ 正確：額部 supraorbital/supratrochlear n. 受鄰近結構壓迫。", "E": "✗ 正確：枕部 GON 穿 semispinalis 與 trapezius 筋膜、跨枕動脈。"}, "cite": "待複查（偏頭痛四大 trigger sites 與解剖，記憶佐證）", "conflict": ""}, {"id": "4072", "sub": "HN2", "src": "NG", "years": [110], "stem": "Which of the following statement is NOT related to intranasal lining injury？", "opts": {"A": "Intranasal cocaine.", "B": "Wegener's granulomatosis.", "C": "Infectious disease – syphilis, leishmaniasis, yaws, leprosy, TB, actinomycosis.", "D": "Killer \"T\" cell lymphoma.", "E": "All of the above statements are related to intranasal lining injury"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 鼻內襯裡(intranasal lining)破壞的病因整合，答 E(以上皆相關)。可破壞鼻中隔/鼻內襯裡者：古柯鹼(cocaine 血管收縮致中隔穿孔)、Wegener 肉芽腫(GPA，壞死性血管炎)、感染(梅毒、leishmaniasis、yaws、痲瘋、結核、放線菌)、NK/T 細胞淋巴瘤(致命中線肉芽腫)。皆致鞍鼻/中隔穿孔，故 E。", "peropt": {"A": "✗(相關) 鼻內古柯鹼致血管收縮、中隔穿孔。", "B": "✗(相關) Wegener 肉芽腫致壞死性破壞。", "C": "✗(相關) 梅毒等感染破壞鼻襯裡。", "D": "✗(相關) NK/T 細胞淋巴瘤(中線致命肉芽腫)。", "E": "✓ 以上皆與鼻內襯裡破壞相關，為正解。"}, "cite": "待複查（鼻中隔穿孔/襯裡破壞病因，記憶佐證）", "conflict": ""}, {"id": "4073", "sub": "HN7", "src": "NG", "years": [110], "stem": "以下何者並非主要常見的偏頭痛誘發點 (trigger site)？", "opts": {"A": "Rhinogenic trigger", "B": "Temporal trigger", "C": "Frontal trigger", "D": "Occipital trigger", "E": "Auricular trigger"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 偏頭痛非主要 trigger site→答 E(Auricular)。主要位點＝rhinogenic(septonasal)、temporal、frontal、occipital。auricular(耳)非主要位點。與 CN4045/4056 同觀念。", "peropt": {"A": "✗ Rhinogenic 為主要位點。", "B": "✗ Temporal 為主要位點。", "C": "✗ Frontal 為主要位點。", "D": "✗ Occipital 為主要位點。", "E": "✓ Auricular 非主要 trigger site，為正解。"}, "cite": "待複查（偏頭痛四大 trigger sites，記憶佐證）", "conflict": ""}, {"id": "4074", "sub": "HN3", "src": "NG", "years": [110], "stem": "關於Scalp and forehead reconstruction 的描述,下列何者為是? (複選)", "opts": {"A": "The scalp and forehead are often considered as a single unit due to its similar composition of tissue layers, which can be remembered by the mnemonic \"SCALP\", where S is the skin, C is the subcutaneous tissue, A is the aponeurotic layer, L is the loose areolar tissue, and P is the pericranium.", "B": "In local flaps for scalp reconstruction, Small pin wheel flaps (two-flap \"yingyang\", and three-flap \"Isle-of-Man\") are commonly used for small defects", "C": "Juri flap which considered the hair-bearing flaps, has been reconstructed the anterior hairline. This flap is based on the posterior parietal branch of the superficial temporal artery and typically, because long hair-bearing flaps are needed to restore the hairline, it is safer to delay this flap.", "D": "There are very few regional flaps available for scalp reconstruction. The trapezius myocutaneous flap, based on the transverse or descending branch of the transverse cervical vascular pedicle, used to reconstruct auricular and posterior scalp defects. The latissimus dorsi, pectoralis myocutaneous, and extended submental platysma myocutaneous pedicle flaps have also been described for repair of defects of the temporal, post auricular, and most peripheral scalp defects.", "E": "For temporal unit reconstruction, Advancement flaps that do not distort the surrounding tissues work best: VY, extended VY, and double extended VY flaps have all been used effectively."}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮與前額重建綜合，答 ABCDE(皆為是)。A SCALP 記憶法(Skin/subCutaneous/Aponeurosis/Loose areolar/Pericranium)；B pinwheel(陰陽兩瓣、Isle-of-Man 三瓣)用於小缺損；C Juri flap 帶毛髮修前髮際、基於 STA 後頂支、需延遲(delay)；D 頭皮區域瓣少，trapezius(頸橫血管橫/降支)、latissimus、pectoralis、extended submental platysma 皆曾用於週邊/耳後/顳部缺損；E 顳部單位以不扭曲周圍之推進瓣(VY/extended VY/double extended VY)最佳。此為統整記憶題，全部正確。", "peropt": {"A": "✓ SCALP 五層記憶法正確。", "B": "✓ pinwheel(陰陽/Isle-of-Man)用於小缺損。", "C": "✓ Juri flap 帶毛髮修前髮際、基於 STA 後頂支、宜延遲。", "D": "✓ 區域瓣少，trapezius/latissimus/pectoralis/submental platysma 皆可用。", "E": "✓ 顳部以 VY 系列推進瓣最佳。"}, "cite": "待複查（頭皮前額重建統整，記憶佐證）", "conflict": ""}, {"id": "4075", "sub": "HN11", "src": "NG", "years": [110], "stem": "Which of the following statements about the goal of reconstructive goals for midface and maxillary defects are right ?", "opts": {"A": "Obliterate the maxillectomy defect", "B": "Restore barrier between sinonasal cavity and anterior cranial fossa", "C": "Support orbital contents/maintenance of ocular globe position", "D": "Maintain patent nasal airway", "E": "Facial contour"}, "ans": "ABCDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 中臉/上頷缺損重建目標，答 ABCDE(皆對)。五大目標：①填補上頷切除死腔(obliterate defect)②重建鼻竇腔與前顱窩間屏障(防腦脊液漏/腦膜炎)③支撐眼球內容物、維持眼球位置(防複視/眼球下陷)④維持鼻氣道通暢⑤恢復顏面輪廓。此為功能＋結構＋外觀綜合目標。", "peropt": {"A": "✓ 填補上頷切除死腔。", "B": "✓ 重建鼻竇腔與前顱窩屏障。", "C": "✓ 支撐眼球內容、維持眼球位置。", "D": "✓ 維持鼻氣道通暢。", "E": "✓ 恢復顏面輪廓。"}, "cite": "待複查（中臉/上頷重建目標，記憶佐證）", "conflict": ""}, {"id": "4076", "sub": "HN4", "src": "NG", "years": [110], "stem": "關於唾液腺腫瘤下列何者為非？", "opts": {"A": "可分為四種，包括parotid, submandibular, sublingual及minor salivary glands。", "B": "Parotid glands tumor最常見。", "C": "Minor salivary glands之腫瘤惡性機率最低，約20%。", "D": "Pleomorphic adenoma是唾液腺最常見的良性腫瘤。", "E": "Pleomorphic adenoma手術做parotidectomy而不是enucleation，可將復發率從4%降至1%。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 唾液腺腫瘤(NG110版)，問『為非』，答 C。C 錯：minor salivary gland 惡性機率『最高』(可達 >80%)，非最低 20%——腺體越小惡性比越高。正確：A 分四類(parotid/submandibular/sublingual/minor)；B parotid 最常見；D pleomorphic adenoma 最常見良性；E parotidectomy 優於 enucleation(復發 4%→1%)。⚠與 CN4061(NG108)為姊妹題，此版 A/D/E 已修正為正確敘述。", "peropt": {"A": "✗ 正確：唾液腺分四類。", "B": "✗ 正確：parotid tumor 最常見。", "C": "✓(選此為答) 錯述：minor salivary gland 惡性機率最高，非最低。", "D": "✗ 正確：pleomorphic adenoma 最常見良性。", "E": "✗ 正確：parotidectomy 優於 enucleation，復發 4%→1%。"}, "cite": "Grabb&Smith 唾液腺（腺小惡性高、pleomorphic 最常見良性）", "conflict": ""}, {"id": "4077", "sub": "HN5", "src": "NG", "years": [110], "stem": "有關臉部移植(facial transplanataion)，下列何者為非？", "opts": {"A": "HIV及十年內的癌症仍為absolute contraindication。", "B": "對於失明(blindness)患者的臉部移植，許多人仍採保留態度。", "C": "失明患者若家庭支持不夠，可能因無法發現早期排斥而產生巨大損失。", "D": "因使用免疫抑制劑，de novo malignancy的機會是原本的2至4倍。", "E": "以上皆是。"}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部移植(NG110版)，問『為非』，答 A。A 錯：絕對禁忌為『五年內癌症』(非十年)——此版把 5 年改為 10 年故 A 為錯述。⚠與 CN4062(NG108，答 E 皆正確)為姊妹題，差別即在此年將 5 年竄改為 10 年製造錯項。B-D 正確(失明保留態度、家庭支持、de novo 惡性 2-4 倍)。", "peropt": {"A": "✓(選此為答) 錯述：絕對禁忌為五年內癌症，非十年。", "B": "✗ 正確：失明者移植多存保留態度。", "C": "✗ 正確：失明＋家庭支持不足難察早期排斥。", "D": "✗ 正確：de novo 惡性增 2-4 倍。", "E": "✗ 此版非全對(因 A 錯)，故不選 E。"}, "cite": "待複查（臉部移植 5 年癌症禁忌；姊妹題 CN4062）", "conflict": "與 CN4062(NG108)姊妹題，此年將『5 年』改為『10 年』製造錯項；作答錨定各年官方答案。"}, {"id": "4078", "sub": "HN3", "src": "NG", "years": [111], "stem": "下列何者為是？(複選)", "opts": {"A": "In congenital hairy nevi (congenital nevomelanocytic nevi), the malignant degeneration is developing squamous cell carcinoma.", "B": "Primary closure is possible for scalp defect up to a maximum of 5 cm in diameter, and it is usually necessary to utilize some scoring of the galea.", "C": "There are few regional flaps available for scalp reconstruction, one exception is the trapezius myocutaneous flap.", "D": "For the suprabrow and glabella defect, it is important not to distort the brow.", "E": "Cicatrical scalp alopecia, caused by trauma or burn, can be managed by the use of tissue expansion and subsequent flap advancement"}, "ans": "CDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮重建(NG111版)，答 CDE(為是)。C 頭皮區域瓣少，trapezius myocutaneous 為例外；D suprabrow/glabella 缺損重建須不扭曲眉毛；E 瘢痕性禿髮(外傷/燒傷)可用組織擴張＋皮瓣推進。錯誤：A congenital hairy nevi 惡變為『melanoma(黑色素瘤)』非 SCC；B 頭皮初縫上限約 2-3cm 非 5cm(galea scoring 輔助)。⚠與 CN4064(NG109)同族但選項數/敘述跨年不同。", "peropt": {"A": "✗ 錯述：congenital nevomelanocytic nevi 惡變為 melanoma，非 SCC。", "B": "✗ 錯述：頭皮初縫上限約 2-3cm，非 5cm。", "C": "✓ 頭皮區域瓣少，trapezius myocutaneous 為例外。", "D": "✓ suprabrow/glabella 缺損須不扭曲眉毛。", "E": "✓ 瘢痕性禿髮可用組織擴張＋皮瓣推進。"}, "cite": "待複查（頭皮初縫上限、congenital nevi 惡變為 melanoma）", "conflict": "與 CN4064(NG109)同族，跨年選項數/敘述不同視為不同題。"}, {"id": "4079", "sub": "HN2", "src": "NG", "years": [111, 113, 114], "stem": "關於 aesthetic nasal reconstruction，下列何者為非？(複選)", "opts": {"A": "\"small defect\" is less than 3cm", "B": "If the defect greater than 50% of nasal tip, discard adjacent normal tissue within the subunit and resurface the entire subunit.", "C": "The nasal unit consists of the tip, dorsum, and paired alae, sidewalls, and soft triangle subunits.", "D": "Bilobed flap is based laterally and the second lobe lies within the more mobile skin of upper nose.", "E": "Nasolabial flap is used to nasal alae and side wall defect up to 4cm in width."}, "ans": "ACE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻美學重建(NG111版)，問『為非』，答 ACE。A 錯：small defect 定義敘述不完整/被判錯(本題官方判 A 為非)。C 錯：鼻亞單位遺漏 columella(此版列 tip/dorsum/paired alae/sidewalls/soft triangle 未含 columella)故錯。E 錯：nasolabial flap 用於鼻翼/側壁缺損但寬度上限敘述被判過大(4cm 過大)。正確(非為非者)：B >50% 鼻尖缺損應切除亞單位內鄰近正常組織重建整單位、D bilobed flap 基於側方、第二瓣位於較可動之上鼻皮膚。⚠與 CN4089(NG115)同族但問法相反(為非 vs 為是)。", "peropt": {"A": "✓(為非) small defect 定義敘述不完整，本題判錯。", "B": "✗(屬正確) >50% 鼻尖缺損切除亞單位內正常組織重建整單位。", "C": "✓(為非) 鼻亞單位遺漏 columella，敘述不全故錯。", "D": "✗(屬正確) bilobed flap 基於側方、第二瓣位上鼻可動皮膚。", "E": "✓(為非) nasolabial flap 寬度上限敘述過大(4cm)被判錯。"}, "cite": "待複查（鼻亞單位含 columella、nasolabial flap 寬度）", "conflict": "與 CN4089(NG115)同族，問法相反(為非 vs 為是)，選項相同須錨定該年問法。"}, {"id": "4080", "sub": "HN1", "src": "NG", "years": [111, 113], "stem": "有關 facial paralysis 下列何者錯誤?", "opts": {"A": "可分成 primary 或 secondary", "B": "若 facial paralysis < 12 個月之內,則認為 facial muscle 尚可以 re-innervation", "C": "若 facial paralysis 超過 12 個月,則認為 muscle 出現 irreversibly atrophy", "D": "處置的方法包含 static procedure 如 sling 的方法,或 dynamic procedure 如functional muscle transfer", "E": "造成原因諸多有些則不明"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 ⚠facial paralysis 時窗題(NG111版)，問『錯誤』，官方答 C。本題 C 說『超過 12 個月不可逆萎縮』被判錯——因 Neligan 5e 改為『10 個月』(見 CN4085)。此為與 CN4067(NG109)/CN4085(NG114)之家族衝突題。B 說 <12 月尚可 re-innervation。作答錨定各年官方數字。", "peropt": {"A": "✗ 正確：可分 primary/secondary。", "B": "✗ 正確：<12 個月尚可 re-innervation（該年版本）。", "C": "✓(選此為答) 本年判為錯：新版門檻為 10 個月，非 12 個月。", "D": "✗ 正確：處置含 static(sling)與 dynamic(functional muscle transfer)。", "E": "✗ 正確：成因諸多，部分不明。"}, "cite": "原詳解族：跨年 12→10 個月（Neligan 4e→5e）", "conflict": "⚠家族衝突【facial paralysis 萎縮時窗】NG111『12 月』與 NG109/NG114 版本並列；跨年選項/數值不同視為不同題，錨定各年官方答案。"}, {"id": "4081", "sub": "HN1", "src": "NG", "years": [111, 113, 114, 115], "stem": "下列何者非適當的 muscle options for microneurovascular transplantation in facial paralysis?", "opts": {"A": "Gracilis", "B": "Latissimus dorsi", "C": "Serratus anterior", "D": "Abductor hallucis", "E": "Extensor carpi radialis longus"}, "ans": "E", "multi": false, "etype": "ai", "expl": "", "key": "🎯 顏面 reanimation 游離肌肉選項(NG111版)，問『非適當』，答 E(Extensor carpi radialis longus)。與 CN4068 同組(該題答 ABCD 為適當)。gracilis/latissimus/serratus anterior/abductor hallucis 皆適當；伸腕肌非顏面 reanimation 標準選項。", "peropt": {"A": "✗ Gracilis 為最常用，屬適當。", "B": "✗ Latissimus dorsi 屬適當。", "C": "✗ Serratus anterior 屬適當。", "D": "✗ Abductor hallucis 屬適當。", "E": "✓ Extensor carpi radialis longus 非適當選項，為正解。"}, "cite": "待複查（顏面游離功能肌選項，記憶佐證）", "conflict": ""}, {"id": "4082", "sub": "HN3", "src": "NG", "years": [112, 113, 114], "stem": "Which of the following is true regarding tissue expansion for reconstruction of the scalp and forehead?", "opts": {"A": "Serial expansion occurs to expand normal tissue which can subsequently be used to reconstruct adjacent scarred areas.", "B": "This technique can be considered acutely for open wounds.", "C": "It typically takes 2–3 months to expand the tissue sufficiently to perform the reconstruction.", "D": "The best results are obtained with simple advancement flaps after tissue expansion.", "E": "Complications are rare, which include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars."}, "ans": "AC", "multi": true, "etype": "ai", "expl": "This technique cannot be used acutely, when there are any open wounds or any evidence of infection.\n\nThe best results are obtained with transposition or rotation flaps, rather than simple advancement flaps.\n\nComplication rates as high as 48% have been described. Common complications include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars.", "key": "🎯 頭皮/前額組織擴張，答 AC(為真)。A 連續擴張(serial expansion)擴張正常組織以重建相鄰疤痕區；C 通常需 2-3 個月充分擴張。錯誤：B 不可用於急性開放傷口或感染(禁忌)；D 最佳結果為『transposition/rotation 瓣』非單純 advancement 瓣；E 併發症率高(可達 48%，非罕見)含血腫/植入物外露/感染/皮瓣壞死/禿髮/疤痕變寬。原詳解已明確佐證。", "peropt": {"A": "✓ 連續擴張正常組織以重建相鄰疤痕區。", "B": "✗ 錯述：不可用於急性開放傷口/感染。", "C": "✓ 通常需 2-3 個月充分擴張。", "D": "✗ 錯述：最佳結果為 transposition/rotation 瓣，非單純 advancement。", "E": "✗ 錯述：併發症率高達 48%，非罕見。"}, "cite": "原詳解：不可急性用；最佳為 transposition/rotation；併發症達 48%", "conflict": ""}, {"id": "4083", "sub": "HN4", "src": "NG", "years": [113], "stem": "Which of the following statements is not one of the primary considerations in deciding to surgically remove salivary gland neoplasms?", "opts": {"A": "Uncertainty in distinguishing benign from malignant pathology with preoperative fine needle aspiration (FNA).", "B": "Pleomorphic adenomas have a risk of malignant transformation.", "C": "As the tumor grows larger, the surgical procedure may become more challenging, increasing the risk to the facial nerve during parotid surgery.", "D": "To reduce the risk of developing both salivary gland carcinoma and breast cancer simultaneously.", "E": "Cosmetic concerns."}, "ans": "D", "multi": false, "etype": "ai", "expl": "", "key": "🎯 決定手術切除唾液腺腫瘤的『主要考量』，問『非』，答 D。D 為無稽敘述(降低同時罹患唾液腺癌與乳癌風險)——無此臨床根據故為答。真正考量：A FNA 難確定良惡性、B pleomorphic adenoma 有惡變風險、C 腫瘤越大手術越難且顏面神經風險增、E 美觀考量。", "peropt": {"A": "✗(屬考量) FNA 難確定良惡性故傾向切除。", "B": "✗(屬考量) pleomorphic adenoma 有惡變風險。", "C": "✗(屬考量) 腫瘤越大手術越難、顏面神經風險增。", "D": "✓(選此為答) 非考量：降低同時罹患唾液腺癌與乳癌之敘述無臨床根據。", "E": "✗(屬考量) 美觀考量。"}, "cite": "待複查（唾液腺腫瘤手術決策考量，記憶佐證）", "conflict": ""}, {"id": "4084", "sub": "HN5", "src": "NG", "years": [113], "stem": "Which of the following statements about facial transplantation is incorrect?", "opts": {"A": "An induction immunosuppressive regimen is usually unnecessary before the surgery.", "B": "Skin has been considered the most antigenic tissue compared to other tissues in the human body.", "C": "HIV and malignancy within a 5-year period remain absolute contraindications.", "D": "The first successful face transplant was performed by Bernard Devauchelle and Jean-Michel Dubernard in France.", "E": "Once recognized, the treatment of acute rejection involves pulse intravenous steroids."}, "ans": "A", "multi": false, "etype": "ai", "expl": "", "key": "🎯 臉部移植，問『不正確』，答 A。A 錯：臉部移植『需要』術前誘導免疫抑制(induction regimen，如 thymoglobulin/alemtuzumab)，非不必要。正確：B 皮膚為人體最具抗原性組織(排斥監測重點)；C HIV 與五年內癌症為絕對禁忌；D 首例成功臉部移植由法國 Devauchelle 與 Dubernard(2005)完成；E 急性排斥以脈衝式靜脈類固醇治療。", "peropt": {"A": "✓(選此為答) 錯述：臉部移植需要術前誘導免疫抑制。", "B": "✗ 正確：皮膚為最具抗原性組織。", "C": "✗ 正確：HIV 與五年內癌症為絕對禁忌。", "D": "✗ 正確：首例成功移植由法國 Devauchelle 與 Dubernard 完成(2005)。", "E": "✗ 正確：急性排斥以脈衝靜脈類固醇治療。"}, "cite": "待複查（臉部移植誘導免疫抑制、皮膚抗原性、首例，記憶佐證）", "conflict": ""}, {"id": "4085", "sub": "HN1", "src": "NG", "years": [114], "stem": "有關 facial paralysis 下列何者錯誤?", "opts": {"A": "可分成 primary 或 secondary", "B": "若 facial paralysis < 12 個月之內，則認為 facial muscle 尚可以 re-innervation", "C": "若 facial paralysis 超過 10 個月，則認為 muscle 出現 irreversibly atrophy", "D": "處置的方法包含 static procedure 如 sling 的方法，或 dynamic procedure 如functional muscle transfer", "E": "造成原因諸多，有些則不明"}, "ans": "C", "multi": false, "etype": "ai", "expl": "If a healthy proximal facial nerve segment is not available for reconstruction, or the time that has elapsed since the facial nerve trauma may not allow the regenerating facial nerve fibers to reach the neuromuscular junctions within 12 to 24 months after denervation (regeneration rate of 1–2mm per day), alternative strategies for muscle reanimation may be more reliable and provide better functional outcomes.", "key": "🎯 ⚠facial paralysis 時窗題(NG114版，Neligan 5e)，問『錯誤』，官方答 C。此版 C 說『超過 10 個月不可逆萎縮』被判為錯——原詳解闡明：去神經後神經纖維須在 12-24 個月內到達神經肌肉接合處(再生速率 1-2mm/日)，故『10 個月即不可逆』過早、被判錯。B 說 <12 月尚可 re-innervation。⚠此為與 CN4067/CN4080 之家族核心：同一題幹跨年把數字在 10 vs 12 個月間變動，作答務必錨定該年官方答案。", "peropt": {"A": "✗ 正確：可分 primary/secondary。", "B": "✗ 正確：<12 個月尚可 re-innervation。", "C": "✓(選此為答) 錯述：神經再生須 12-24 月到達 NMJ，『10 個月即不可逆』過早。", "D": "✗ 正確：處置含 static 與 dynamic procedure。", "E": "✗ 正確：成因諸多，部分不明。"}, "cite": "原詳解：去神經後再生須 12-24 月達 NMJ（1-2mm/日）", "conflict": "⚠家族衝突核心【facial paralysis 萎縮時窗】NG114『10 月』vs NG109/NG111『12 月』(Neligan 5e vs 4e)；跨年數值差異視為不同題，錨定各年官方答案。"}, {"id": "4086", "sub": "HN11", "src": "NG", "years": [114], "stem": "根據Cordeiro P.G 等人，將maxilla 視為一個六面體而做maxillary and midfacial defect 的分類，下列那些不對? (複選)", "opts": {"A": "Type I 是指一側或兩側的 maxillary wall 缺損，但不包括 palate。", "B": "Type II 是指包括 maxillary arch, palate, anterior and lateral walls 包括部份 orbital floor。", "C": "Type IIIA 是指 subtotal maxillary defect 再加上全部的 orbital floor，但不 包括眼窩內容物。", "D": "Type IIIB 是指 total maxillary defect 加上 orbital exenteration。", "E": "Type IV 是指 orbitomaxillary defects 包括眼窩內容物及所有 maxillary walls"}, "ans": "BCE", "multi": true, "etype": "ai", "expl": "(B) 不包括 orbital floor (C) Total maxillary defect (E) 保留 palatal wall", "key": "🎯 Cordeiro 上頷/中臉缺損分類(六面體)，問『不對』，答 BCE。原詳解校正：(B)Type II 『不含 orbital floor』(僅上頷弓/顎/前外側壁)——選項含 orbital floor 故錯；(C)Type IIIA 應為 subtotal maxillectomy 含部分/全 orbital floor 但保留眼球，選項敘述『total』錯置(原詳解註 Total maxillary defect 有誤)；(E)Type IV 為 orbitomaxillary defect『保留 palatal wall』——選項說含所有 maxillary walls 故錯。正確：A Type I=一/兩側 maxillary wall 缺損不含顎；D Type IIIB=total maxillectomy＋orbital exenteration。⚠與 CN4090(NG115)同題但問法相反。", "peropt": {"A": "✗(屬正確) Type I：一/兩側 maxillary wall 缺損不含 palate。", "B": "✓(不對) Type II 不含 orbital floor，選項誤含。", "C": "✓(不對) Type IIIA 敘述誤植 total（應為 subtotal＋orbital floor 保眼球）。", "D": "✗(屬正確) Type IIIB：total maxillectomy＋orbital exenteration。", "E": "✓(不對) Type IV 保留 palatal wall，選項誤稱含所有 maxillary walls。"}, "cite": "原詳解：(B)不含 orbital floor (C)Total 誤 (E)保留 palatal wall", "conflict": "與 CN4090(NG115)同題、問法相反(不對 vs 正確)；選項近同須錨定該年問法。"}, {"id": "4087", "sub": "HN1", "src": "NG", "years": [115], "stem": "一位 52 歲女性，於左側 parotid malignancy 切除術後 18 個月求診，術中 facial nerve 於近端被犧牲且患側無可用之 proximal stump，對側 facial nerve 功能完整。EMG 顯示患側顏面肌肉有 fibrillation potentials，但無自主性 motor unit。病人積極且身體狀況良好，主要目標為恢復自發性、帶情緒的微笑 (spontaneous emotional smile)。下列何種重建策略最為適當？", "opts": {"A": "單階段 masseteric nerve 驅動之 free gracilis transfer，因其可穩定提供最大的 commissure excursion 及最佳之自發性微笑。", "B": "同側 facial nerve 以 sural cable graft 直接修補至遠端分支。", "C": "兩階段手術，先行 cross-face nerve graft，再行 free gracilis transfer，但須接受其 commissure excursion 可能仍低於健側。", "D": "Lengthening temporalis myoplasty，因為在 18 個月時患側原生肌肉已不具活性，dynamic reinnervation 已不可行。", "E": "單獨施行 hypoglossal-to-facial nerve transfer，因其可同時提供良好的 resting tone 與自發性情緒微笑。"}, "ans": "C", "multi": false, "etype": "ai", "expl": "", "key": "🎯 綜合臨床決策：術後 18 個月、近端無 stump、對側 FN 完整、患側 EMG 有 fibrillation 但無自主 motor unit(＝肌肉已去神經、瀕臨/已失活)、目標為自發情緒微笑。最適＝『兩階段 cross-face nerve graft→free gracilis transfer』(答 C)，因唯 CFNG 可達自發情緒微笑，惟須接受 excursion 可能低於健側。⚠關鍵陷阱：患側原生肌肉已去神經 18 月不可救，故不能只做 nerve transfer 期待原肌復活；須引入『游離肌肉』提供新的可收縮單位＋CFNG 提供情緒來源。A(masseter 驅動)excursion 大但『非自發情緒』微笑；D 誤稱 dynamic 已不可行(游離肌肉仍可)；E hypoglossal 無法產生情緒微笑。", "peropt": {"A": "✗ masseter 驅動 excursion 大但需咬合誘發，非自發情緒微笑，不符主要目標。", "B": "✗ 近端無可用 stump，且原生肌肉已去神經 18 月，直接修補無效。", "C": "✓ 兩階段 CFNG→free gracilis 為唯一可達自發情緒微笑之策略，須接受 excursion 或低於健側。", "D": "✗ 錯述：18 月原生肌雖失活，但游離肌肉移植使 dynamic reinnervation 仍可行。", "E": "✗ hypoglossal-facial transfer 提供張力但無自發情緒微笑。"}, "cite": "待複查（去神經肌肉不可救＋CFNG+gracilis 兩階段，記憶佐證）", "conflict": ""}, {"id": "4088", "sub": "HN3", "src": "NG", "years": [115], "stem": "Which of the following is incorrect regarding tissue expansion for reconstruction of the scalp and forehead? (複選)", "opts": {"A": "Serial expansion occurs to expand normal tissue which can subsequently be used to reconstruct adjacent scarred areas.", "B": "This technique can be considered acutely for open wounds.", "C": "It typically takes 2–3 months to expand the tissue sufficiently to perform the reconstruction.", "D": "The best results are obtained with simple advancement flaps after tissue expansion.", "E": "Complications are rare, which include hematoma, implant exposure, infection, flap necrosis, alopecia, and widened scars."}, "ans": "BDE", "multi": true, "etype": "ai", "expl": "", "key": "🎯 頭皮/前額組織擴張，問『不正確』，答 BDE。與 CN4082 同題但問法相反(此問錯誤者)。B 錯(不可急性用於開放傷口)、D 錯(最佳為 transposition/rotation 非 advancement)、E 錯(併發症率高達 48% 非罕見)。正確：A 連續擴張正常組織重建相鄰疤痕；C 通常需 2-3 個月。", "peropt": {"A": "✗(屬正確) 連續擴張正常組織重建相鄰疤痕區。", "B": "✓(不正確) 不可急性用於開放傷口/感染。", "C": "✗(屬正確) 通常需 2-3 個月充分擴張。", "D": "✓(不正確) 最佳結果為 transposition/rotation 瓣，非單純 advancement。", "E": "✓(不正確) 併發症率高達 48%，非罕見。"}, "cite": "原詳解族：不可急性用；最佳 transposition/rotation；併發症 48%", "conflict": "與 CN4082(NG112)同題、問法相反(為真 vs 不正確)；錨定該年問法。"}, {"id": "4089", "sub": "HN2", "src": "NG", "years": [115], "stem": "關於 aesthetic nasal reconstruction，下列何者為是？(複選)", "opts": {"A": "A \"small defect\" is less than 3 cm in diameter. There is enough residual skin for local flap to \"share\" over the entire nasal surface without excessive closure tension and landmark distortion.", "B": "If the defect greater than 50% of nasal tip, discard adjacent normal tissue within the subunit and resurface the entire subunit.", "C": "The nasal unit consists of the tip, dorsum, and paired alae, sidewalls, and soft triangle subunits.", "D": "Bilobed flap is based laterally and the second lobe lies within the more mobile skin of upper nose.", "E": "Nasolabial flap is used to nasal alae and side wall defect up to 4 cm in width."}, "ans": "BD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 鼻美學重建(NG115版)，問『為是』，答 BD。B 正確：>50% 鼻尖缺損應切除亞單位內鄰近正常組織、重鋪整個亞單位(subunit principle)；D 正確：bilobed flap 基於側方、第二瓣位於較可動之上鼻皮膚。錯誤(非為是)：A small defect 定義敘述被判不當、C 鼻亞單位遺漏 columella、E nasolabial flap 寬度上限 4cm 過大。⚠與 CN4079(NG111)同族、問法相反(為是 vs 為非)，同組選項注意錨定該年問法。", "peropt": {"A": "✗(非為是) small defect 定義敘述本題判不當。", "B": "✓ >50% 鼻尖缺損切除亞單位內正常組織重鋪整單位。", "C": "✗(非為是) 鼻亞單位遺漏 columella，敘述不全。", "D": "✓ bilobed flap 基於側方、第二瓣位上鼻可動皮膚。", "E": "✗(非為是) nasolabial flap 寬度上限敘述過大(4cm)。"}, "cite": "待複查（subunit principle、bilobed flap；與 CN4079 同族）", "conflict": "與 CN4079(NG111)同族、問法相反(為是 vs 為非)；選項相同須錨定該年問法。"}, {"id": "4090", "sub": "HN11", "src": "NG", "years": [115], "stem": "根據 Cordeiro P.G. 等人，將 maxilla 視為一個六面體而做 maxillary and midfacial defect 的分類，下列哪些正確？(複選)", "opts": {"A": "Type I 是指一側或兩側的 maxillary wall 缺損，但不包括 palate。", "B": "Type II 是指包括 maxillary arch, palate, anterior and lateral walls，包括部份 orbital floor。", "C": "Type IIIA 是指 subtotal maxillary defect 再加上全部的 orbital floor，但不包括眼窩內容物。", "D": "Type IIIB 是指 total maxillary defect 加上 orbital exenteration。", "E": "Type IV 是指 orbitomaxillary defects，包括眼窩內容物及所有 maxillary walls。"}, "ans": "AD", "multi": true, "etype": "ai", "expl": "", "key": "🎯 Cordeiro 上頷/中臉分類(NG115版)，問『正確』，答 AD。A 正確：Type I=一/兩側 maxillary wall 缺損不含 palate；D 正確：Type IIIB=total maxillectomy＋orbital exenteration。錯誤(非正確)：B Type II 不含 orbital floor(選項誤含)、C Type IIIA 應 subtotal 保眼球(選項誤植 total)、E Type IV 保留 palatal wall(選項誤稱含所有 maxillary walls)。⚠與 CN4086(NG114)同題、問法相反(正確 vs 不對)——AD 正確⇔BCE 不對，互為鏡像，作答務必看清該年問『正確』或『不對』。", "peropt": {"A": "✓ Type I：一/兩側 maxillary wall 缺損不含 palate。", "B": "✗(非正確) Type II 不含 orbital floor，選項誤含。", "C": "✗(非正確) Type IIIA 應為 subtotal＋orbital floor 保眼球，非 total。", "D": "✓ Type IIIB：total maxillectomy＋orbital exenteration。", "E": "✗(非正確) Type IV 保留 palatal wall，選項誤稱含所有 maxillary walls。"}, "cite": "原詳解族(對照 CN4086)：Cordeiro 分類 Type I-IV", "conflict": "與 CN4086(NG114)同題、問法相反(正確 vs 不對)；AD 正確⇔BCE 不對，須錨定該年問法。"}];

const retr=(t,S)=>Math.pow(1+FACTOR*t/S,DECAY);
const interval=S=>Math.max(1,Math.round((S/FACTOR)*(Math.pow(REQ_R,1/DECAY)-1)));
function sRecall(D,S,R,G){const hard=G===2?FW[15]:1,easy=G===4?FW[16]:1;return clampS(S*(Math.exp(FW[8])*(11-D)*Math.pow(S,-FW[9])*(Math.exp(FW[10]*(1-R))-1)*hard*easy+1));}
function sForget(D,S,R){return clampS(FW[11]*Math.pow(D,-FW[12])*(Math.pow(S+1,FW[13])-1)*Math.exp(FW[14]*(1-R)));}
function sShort(S,G){return clampS(S*Math.exp(FW[17]*(G-3+FW[18]))*Math.pow(S,-FW[19]));}
// 依「作答對錯＋信心度」推導 FSRS 評級：錯=Again(1)；對+沒把握=Hard(2)；對+普通=Good(3)；對+有把握=Easy(4)
function gradeOf(ok,conf){return !ok?1:(conf==='l'?2:(conf==='h'?4:3));}
function fsrsReview(p,G,now){
  if(!p||p.S===undefined){const S=initS(G),D=initD(G);return {D,S,reps:1,lapses:G===1?1:0,last:now,due:now+interval(S)*DAY};}
  const t=Math.max(0,(now-(p.last||now))/DAY),R=retr(t,p.S);
  const D=nextD(p.D,G);let S;
  if(G===1)S=sForget(p.D,p.S,R);
  else if(t<1)S=sShort(p.S,G);
  else S=sRecall(p.D,p.S,R,G);
  return {D,S,reps:(p.reps||0)+1,lapses:(p.lapses||0)+(G===1?1:0),last:now,due:now+interval(S)*DAY};
}
// 舊 schema {n,s,m,f,w,due} → v3
function migrateEntry(op){
  const SRlegacy=[1,3,7,16,30];
  const seedS=op.w?1:SRlegacy[Math.min(op.s||0,4)];
  return {D:5,S:seedS,reps:op.n||1,lapses:op.w?1:0,last:Date.now(),due:op.due||Date.now()+seedS*DAY,
    f:(op.f!==undefined?op.f:null),n:op.n||1,postC:0,postN:0,conf:null,w:!!op.w};
}
function normalizeP(P){for(const id in P){const e=P[id];if(e&&e.S===undefined&&(e.s!==undefined||e.n!==undefined))P[id]=migrateEntry(e);}return P;}

let S={P:{},star:{},note:{},last:null,shuffle:true};
let pool=[], idx=0, sel=new Set(), locked=false, mode='home', curCat=null, curType=null;
let orderMap={}, addedRetry=new Set();

function load(){
  try{const r=localStorage.getItem(LS);if(r){const o=JSON.parse(r);S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}catch(e){}
  // 自 v2(固定間隔模型)遷移 → FSRS，保留 star/note
  try{if(!Object.keys(S.P).length){const r2=localStorage.getItem(LSv2);if(r2){const o=JSON.parse(r2);const op=o.P||{};for(const id in op)S.P[id]=migrateEntry(op[id]);S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);}}}catch(e){}
  // 自 v1(status模型)遷移
  try{if(!Object.keys(S.P).length){const r1=localStorage.getItem(LSv1);if(r1){const o=JSON.parse(r1);const st=o.status||{};for(const id in st){const ok=st[id]==='ok';S.P[id]=migrateEntry({n:1,s:ok?1:0,f:ok?1:0,w:!ok});}S.star=o.star||{};S.last=o.last||null;}}}catch(e){}
}

const postAcc=()=>{let c=0,n=0;for(const k in S.P){c+=S.P[k].postC||0;n+=S.P[k].postN||0;}return n?Math.round(c/n*100):null;};

const isHF=q=>Array.isArray(q.years)&&q.years.length>=3;
const wrongActiveIds=()=>Object.keys(S.P).filter(id=>S.P[id].w&&!mastered(S.P[id]));

// 錯題四型：盲區(有把握卻錯)>死穴(屢錯≥3)>新錯(近3天)>易忘(其餘/低穩定)
function wrongType(p){if(!p||!p.w)return null;if(p.conf==='h')return '盲區';if((p.lapses||0)>=3)return '死穴';if(p.last&&(Date.now()-p.last)<3*DAY)return '新錯';return '易忘';}
const TYPES=['盲區','死穴','新錯','易忘'];
const TYPEDESC={'盲區':'有把握卻答錯（最該優先）','死穴':'反覆遺忘（≥3次）','新錯':'近三天內答錯','易忘':'記憶穩定度偏低'};
function wrongTypeCounts(){const c={盲區:0,死穴:0,新錯:0,易忘:0};wrongActiveIds().forEach(id=>{const t=wrongType(S.P[id]);if(t)c[t]++;});return c;}

function catStats(code){
  let t=0,a=0,m=0,w=0,hf=0;
  for(const q of DATA){if(q.sub!==code)continue;t++;if(isHF(q))hf++;const p=S.P[q.id];if(p){a++;if(mastered(p))m++;if(p.w&&!mastered(p))w++;}}
  return {t,a,m,w,hf};
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function optOrder(q){const base=Object.keys(q.opts).sort();if(!S.shuffle)return base;if(!orderMap[q.id])orderMap[q.id]=shuffle(base.slice());return orderMap[q.id];}

function buildPool(){
  if(mode==='wrong'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='wrongcat'){const w=new Set(wrongActiveIds());pool=DATA.filter(q=>q.sub===curCat&&w.has(q.id));}
  else if(mode==='wrongtype'){const w=new Set(wrongActiveIds().filter(id=>wrongType(S.P[id])===curType));pool=DATA.filter(q=>w.has(q.id));}
  else if(mode==='star'){const s=new Set(starIds());pool=DATA.filter(q=>s.has(q.id));}
  else if(mode==='cat'){pool=DATA.filter(q=>q.sub===curCat);}
  else if(mode==='hf'){pool=hfList();}
  else if(mode==='conflict'){pool=conflictList();}
  else if(mode==='due'){const d=dueIds();const set=new Map(d.map(id=>[id,S.P[id].due]));pool=DATA.filter(q=>set.has(q.id));pool.sort((x,y)=>set.get(x.id)-set.get(y.id));}

}

function grade(conf){
  if(sel.size===0)return;
  const q=pool[idx],ans=new Set(q.ans.split('')),ch=new Set(sel);
  const ok=ans.size===ch.size&&[...ans].every(a=>ch.has(a));
  locked=true;
  const now=Date.now(),prev=S.P[q.id],first=!prev;
  const G=gradeOf(ok,conf);
  const np=fsrsReview(prev,G,now);
  np.f=first?(ok?1:0):(prev.f!==undefined?prev.f:(ok?1:0));
  np.n=(prev?prev.n||0:0)+1;
  np.postC=(prev?prev.postC||0:0)+((!first&&ok)?1:0);
  np.postN=(prev?prev.postN||0:0)+(!first?1:0);
  np.conf=conf;np.w=!ok;
  S.P[q.id]=np;save();
  const days=Math.max(1,Math.round((np.due-now)/DAY));
  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.l;o.classList.remove('sel');o.classList.add('locked');o.onclick=null;
    const iA=ans.has(L),iS=ch.has(L);
    if(iA&&iS)o.classList.add('correct');else if(!iA&&iS)o.classList.add('wrong');else if(iA&&!iS)o.classList.add('missed');
    let t=(q.etype==='ai'&&q.peropt&&q.peropt[L])?q.peropt[L]:'';
    if(t){const e=document.createElement('div');e.className='oexp';e.innerHTML=fmt(t);o.querySelector('.tx').appendChild(e);}
  });
  const card=document.querySelector('.card');
  const cflab={h:'有把握',m:'普通',l:'沒把握'}[conf];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'no');
  v.textContent=(ok?'✓ 答對':'✗ 答錯')+'（'+cflab+'）　正解：'+q.ans.split('').join('、')+'　⏱ 下次複習約 '+days+' 天後'+(mastered(np)?'　★已掌握':'');
  card.appendChild(v);
  if(!ok&&conf==='h'){const b=document.createElement('div');b.className='keybox warn';b.innerHTML='🕳️ <b>盲區警示</b>：你「有把握」卻答錯——這類最危險，已標記為盲區優先複習。';card.appendChild(b);}
  if(q.etype==='ai'&&q.key){const k=document.createElement('div');k.className='keybox'+(q.key.indexOf('⚠')>=0?' warn':'');k.innerHTML='🎯 '+fmt(q.key);card.appendChild(k);}
  if(q.etype==='orig'&&q.expl){const k=document.createElement('div');k.className='keybox';k.innerHTML='📖 原檔詳解：'+fmt(q.expl);card.appendChild(k);}
  else if(q.etype==='orig'){const k=document.createElement('div');k.className='keybox nodetail';k.innerHTML='⚠️ 本題原檔未附詳解（下方僅為出處）';card.appendChild(k);}
  const s=document.createElement('div');s.className='src';
  s.innerHTML=(q.etype==='ai'?'<span class="srctag ai">AI補寫 · 待複查</span>':(q.expl?'<span class="srctag orig">原檔詳解</span>':'<span class="srctag none">無詳解</span>'))+(q.cite?'<span class="cite">'+esc(q.cite)+'</span>':'');
  card.appendChild(s);
  if(q.conflict){var cf=document.createElement('div');cf.className='keybox warn';cf.innerHTML='⚠ 跨年／跨書分歧：'+fmt(q.conflict);card.appendChild(cf);}
  const nb=document.createElement('div');nb.className='notewrap';nb.style.cssText='margin-top:12px';
  nb.innerHTML='<div style="font-weight:700;color:var(--forest);font-size:13px;margin-bottom:6px">📝 我的筆記</div>';
  const nta=document.createElement('textarea');nta.className='ta';nta.placeholder='寫下你對這題的筆記／口訣／易錯點（自動儲存，會隨「匯出進度」一起備份）';
  nta.value=(S.note&&S.note[q.id])?S.note[q.id]:'';
  const nst=document.createElement('div');nst.className='mini';nst.style.textAlign='left';nst.textContent='';
  nta.oninput=()=>{ if(!S.note)S.note={}; const v=nta.value; if(v.trim())S.note[q.id]=v; else delete S.note[q.id]; clearTimeout(nta._t); nst.textContent='輸入中…'; nta._t=setTimeout(()=>{ save(); nst.textContent='✓ 筆記已存'; setTimeout(()=>nst.textContent='',1200); },600); };
  nb.appendChild(nta);nb.appendChild(nst);card.appendChild(nb);
  const rt=document.createElement('div');rt.className='retry';
  const rb=document.createElement('button');rb.textContent='🔁 稍後再問我（本回合尾端再考）';
  rb.onclick=()=>{if(!addedRetry.has(q.id)){pool.push(q);addedRetry.add(q.id);rb.textContent='✓ 已加入本回合尾端';rb.className='done';}};
  rt.appendChild(rb);card.appendChild(rt);
  hdr();
  const sk=document.getElementById('skip');if(sk)sk.style.display='none';
  const act=document.getElementById('act');act.textContent='下一題 →';act.className='btn next';act.style.display='block';
}
function next(){idx++;if(idx>=pool.length){finish();return;}render();scrollTo({top:0,behavior:'smooth'});}
function finish(){
  const seen=seenN(),mast=masteredN();
  const label={cat:'子類 '+curCat,wrong:'錯題',wrongcat:'錯題 '+curCat,wrongtype:'錯題 '+curType,due:'今日複習',hf:'高頻必刷',conflict:'爭議題',star:'收藏',all:'本清單'}[mode]||'本清單';
  document.getElementById('app').innerHTML=crumbHTML()+'<div class="card done"><h2>'+label+' 完成 🎉</h2>'
   +'<div class="mini">全庫已作答 '+seen+' / '+DATA.length+' · 已掌握 '+mast+'</div>'
   +'<div class="entries" style="margin-top:16px"><div class="entry pri wide" id="dHome"><div class="em">←</div><div><div class="et">回首頁看進度</div><div class="en">雙色進度條 · 弱項雷達</div></div></div></div></div>';
  document.getElementById('act').style.display='none';idx=0;bindCrumb();hideConfidence();
  const d=document.getElementById('dHome');if(d)d.onclick=()=>{mode='home';render();scrollTo({top:0});};
}
function renderData(){
  const st=starIds();
  let h='<div class="card"><div class="h3">練習設定</div>'
   +'<div class="toggle"><div><div style="font-weight:600;font-size:13.5px">選項洗牌</div><div class="dim">重做時打散選項順序，破除「背第幾個」</div></div><div class="sw '+(S.shuffle?'on':'')+'" id="swShuf"><i></i></div></div>'
   +'<div class="toggle" style="border-bottom:none"><div><div style="font-weight:600;font-size:13.5px">FSRS 間隔複習</div><div class="dim">依每題記憶狀態動態排下次複習（目標留存率 90%）。作答對錯＋信心度＝FSRS 評級；穩定度≥21天視為已掌握。</div></div></div></div>';
  h+='<div class="card"><div class="h3">收藏題（'+st.length+'）</div>';
  if(!st.length)h+='<div class="dim">尚無收藏。作答時點右上角 ☆ 收藏。</div>';
  else{h+='<div class="wlist">';st.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">★ 第'+DIDX[id]+'題</span><span class="wq">'+esc(q.stem.slice(0,42))+(q.stem.length>42?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  const nids=S.note?Object.keys(S.note).filter(id=>(S.note[id]||'').trim()):[];
  h+='<div class="card"><div class="h3">📝 我的筆記（'+nids.length+'）</div>';
  if(!nids.length)h+='<div class="dim">尚無筆記。作答送出後，題目下方會出現「📝 我的筆記」欄；寫下的內容自動存並隨「匯出進度」一起備份。</div>';
  else{h+='<div class="wlist">';nids.forEach(id=>{const q=DATA.find(x=>x.id===id);if(!q)return;const nt=S.note[id];h+='<div class="wrow" data-goto="'+id+'"><span class="wid s">📝 第'+DIDX[id]+'題</span><span class="wq">'+esc(nt.slice(0,54))+(nt.length>54?'…':'')+'</span></div>';});h+='</div>';}
  h+='</div>';
  h+='<div class="card"><div class="h3">進度存檔（匯出／匯入）</div>'
   +'<div class="dim">含<b>FSRS記憶狀態＋收藏＋筆記＋設定</b>，可跨裝置還原；日後也能交回給我彙整複習。</div>'
   +'<textarea class="ta" id="io" placeholder="進度代碼會顯示在此，或貼上要匯入的代碼"></textarea>'
   +'<div class="row"><button class="btn" id="exp">匯出全部進度</button><button class="btn" id="imp">匯入</button></div>'
   +'<div class="row"><button class="icon" id="cpy" style="flex:1">複製</button><button class="icon" id="clr" style="flex:1">清除全部</button></div>'
   +'<div class="mini" id="iomsg" style="text-align:left"></div></div>';
  const app=document.getElementById('app');app.innerHTML=h;
  document.getElementById('swShuf').onclick=function(){S.shuffle=!S.shuffle;this.classList.toggle('on',S.shuffle);orderMap={};save();};
  app.querySelectorAll('.wrow').forEach(r=>r.onclick=()=>gotoId(r.dataset.goto));
  document.getElementById('exp').onclick=()=>{document.getElementById('io').value=btoa(unescape(encodeURIComponent(JSON.stringify(S))));msg('已產生完整進度代碼，請複製保存。');};
  document.getElementById('imp').onclick=()=>{try{const v=document.getElementById('io').value.trim();const o=JSON.parse(decodeURIComponent(escape(atob(v))));S.P=normalizeP(o.P||{});S.star=o.star||{};S.note=o.note||{};S.last=o.last||null;S.shuffle=(o.shuffle!==false);save();msg('✓ 匯入成功（作答 '+Object.keys(S.P).length+' · 收藏 '+Object.keys(S.star).length+' · 筆記 '+Object.keys(S.note).length+'）');hdr();renderData();}catch(e){msg('✗ 代碼無效，請確認。');}};
  document.getElementById('cpy').onclick=()=>{const t=document.getElementById('io');if(!t.value){msg('請先按「匯出全部進度」產生代碼。');return;}t.select();
    const fb=()=>{try{document.execCommand('copy');msg('已複製。');}catch(e){msg('請長按手動複製。');}};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>msg('已複製。')).catch(fb);}else fb();};
  document.getElementById('clr').onclick=function(){
    const b=this;
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='⚠ 再按一次確認清除';
      b.style.background='#FBE9E7'; b.style.color='#B3261E'; b.style.borderColor='#E7A9A0';
      msg('將清除全部作答、記憶狀態、收藏與筆記。5 秒內未再次點擊即取消。');
      b._t=setTimeout(()=>{b.dataset.armed='0';b.textContent='清除全部';b.style.background='';b.style.color='';b.style.borderColor='';msg('已取消清除。');},5000);
      return;
    }
    clearTimeout(b._t);
    S={P:{},star:{},note:{},last:null,shuffle:S.shuffle};
    orderMap={}; addedRetry=new Set(); pool=[]; idx=0; sel=new Set(); locked=false;
    try{localStorage.removeItem(LS);localStorage.removeItem(LSv2);localStorage.removeItem(LSv1);}catch(e){}
    save(); hdr(); renderData();
    msg('✓ 已清除全部進度。');
  };
}
function gotoId(id){const i=DATA.findIndex(q=>q.id===id);if(i<0)return;mode='cat';curCat=DATA[i].sub;buildPool();idx=pool.findIndex(q=>q.id===id);if(idx<0)idx=0;render();scrollTo({top:0});}
function gotoNum(n){n=parseInt(n,10);if(!n||n<1||n>DATA.length){toast('請輸入 1 – '+DATA.length+' 之間的題號。');return;}document.getElementById('ovl').classList.remove('on');mode='all';buildPool();idx=n-1;render();scrollTo({top:0});}
function msg(t){const m=document.getElementById('iomsg');if(m)m.textContent=t;}
function toast(t){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:86%;background:#2C4A38;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.22);opacity:0;transition:opacity .18s';
    document.body.appendChild(el);}
  el.textContent=t; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='0';},2600);
}
function openPick(){
  if(['home','wronghome','data'].includes(mode))return;
  const g=document.getElementById('grid');let h='';
  pool.forEach((q,i)=>{const p=S.P[q.id];let c=p?(mastered(p)?'mast':(p.w?'wrong':'ok')):'';const cur=(i===idx)?' cur':'';
    h+='<div class="cell '+c+cur+'" data-i="'+i+'">'+(i+1)+(S.star[q.id]?'<span class="st">★</span>':'')+'</div>';});
  g.innerHTML=h;
  document.getElementById('pickTitle').textContent=(mode==='cat'?(curCat+' '+SUBS[curCat]):mode==='wrongcat'?('錯題 '+curCat):mode==='wrongtype'?('錯題 '+curType):{wrong:'錯題本',star:'收藏',due:'今日複習',hf:'高頻必刷',conflict:'爭議題',all:'全部'}[mode]||'')+' · 選題';
  g.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{idx=+c.dataset.i;document.getElementById('ovl').classList.remove('on');render();scrollTo({top:0});});
  document.getElementById('ovl').classList.add('on');
}
document.getElementById('act').onclick=()=>{locked?next():showConfidence();};
document.getElementById('pick').onclick=openPick;
document.getElementById('jumpGo').onclick=()=>gotoNum(document.getElementById('jumpN').value);
document.getElementById('jumpN').addEventListener('keydown',e=>{if(e.key==='Enter')gotoNum(e.target.value);});
document.getElementById('closePick').onclick=()=>document.getElementById('ovl').classList.remove('on');
document.getElementById('ovl').onclick=e=>{if(e.target.id==='ovl')document.getElementById('ovl').classList.remove('on');};
document.getElementById('tabHome').onclick=()=>{mode='home';render();scrollTo({top:0});};
document.getElementById('tabAll').onclick=()=>{mode='all';if(S.last){const i=DATA.findIndex(q=>q.id===S.last);if(i>=0)idx=i;}render();scrollTo({top:0});};
document.getElementById('tabWrong').onclick=()=>{mode='wronghome';render();scrollTo({top:0});};
document.getElementById('tabStar').onclick=()=>{mode='star';idx=0;render();scrollTo({top:0});};
document.getElementById('tabData').onclick=()=>{mode='data';render();};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/✔/g,'<b>✔</b>').replace(/✗/g,'<b>✗</b>').replace(/⚠/g,'<b style="color:#C99A3B">⚠</b>');}
load();
render();
</script></body></html>
